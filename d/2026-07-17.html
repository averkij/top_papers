    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;

                    filterAndRenderArticles();
                });

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.14935', 'title': 'VideoChat3: Fully Open Video MLLM for Efficient and Generalist Video Understanding', 'url': 'https://huggingface.co/papers/2607.14935', 'abstract': "Abstract  Recent advances in video understanding have spanned motion, long video, and streaming interaction, driving this field toward real-world applications. Despite this progress, current open-source models remain limited in several ways. They often struggle to generalize across diverse video types, making them effective only in specific domains. High computational demands further restrict their efficiency and scalability. Moreover, most models are only partially open, with key components such as training code, strategy, or datasets unavailable, which hinders reproducibility and slows community-driven development. To address these issues, we introduce VideoChat3, a fully open, efficient, and generalist video-centric MLLM. VideoChat3 advances video understanding through two complementary designs. For efficiency, we introduce Inflated 3D Vision Transformer (I3D-ViT) and Adaptive Frame Resolution for Streaming Video Perception, which enables efficient spatiotemporal representation and reduces the cost of processing video inputs during training and inference. For effectiveness, we develop a scalable video data synthesis pipeline that curates three diverse, high-quality training datasets: VideoChat3-Academic2M, VideoChat3-LV116K, and VideoChat3-OL617K, covering general, long-form, and streaming video scenarios, improving the model's generalization across domains. By integrating these designs, VideoChat3 achieves a rare balance of broad generalization and computational efficiency. Experiments across general, long-form, and streaming benchmarks demonstrate that VideoChat3 surpasses prior open-source models with equal or larger parameter counts with only 4B parameters and higher efficiency.", 'score': 107, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '2435413ceab0fa5c', 'authors': ['Xinhao Li', 'Yuhan Zhu', 'Xiangyu Zeng', 'Yuhao Dong', 'Haoning Wu', 'Zhiqiu Zhang', 'Yuandong Yang', 'Changlian Ma', 'Qingyu Zhang', 'Yansong Shi', 'Xinyu Chen', 'Haoran Chen', 'Zizheng Huang', 'Jun Zhang', 'Kun Ouyang', 'Lin Sui', 'Ziang Yan', 'Yicheng Xu', 'Chenting Wang', 'Yinan He', 'Hongjie Zhang', 'Yi Wang', 'Yu Qiao', 'Yali Wang', 'Ziwei Liu', 'Kai Chen', 'Limin Wang'], 'affiliations': ['Nanjing University', 'Nanyang Technological University', 'Peking University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2607.14935.jpg', 'data': {'categories': ['#architecture', '#dataset', '#multimodal', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Эффективная и универсальная модель для понимания видео', 'desc': 'В статье представляется VideoChat3 — полностью открытая мультимодальная языковая модель (MLLM), специализирующаяся на понимании видео. Модель решает ключевые проблемы существующих моделей: плохую обобщаемость на различные типы видеоконтента и высокие вычислительные затраты. Авторы внедрили Inflated 3D Vision Transformer и адаптивное разрешение кадров для эффективной обработки видеопотоков, а также создали конвейер синтеза видеоданных с тремя высококачественными датасетами для обучения. VideoChat3 демонстрирует впечатляющий баланс между универсальностью и эффективностью, превосходя аналогичные модели с большим числом параметров при использовании всего 4 миллиардов параметров.'}, 'en': {'title': 'VideoChat3: Efficient and Generalist Video Understanding for All', 'desc': "This paper presents VideoChat3, a new model designed for video understanding that addresses limitations of existing open-source models. It introduces innovative techniques like the Inflated 3D Vision Transformer (I3D-ViT) and Adaptive Frame Resolution to enhance efficiency in processing video data. Additionally, it features a scalable data synthesis pipeline that creates diverse training datasets, improving the model's ability to generalize across different video types. Overall, VideoChat3 achieves a significant balance between computational efficiency and broad applicability in various video scenarios."}, 'zh': {'title': 'VideoChat3：高效通用的视频理解模型', 'desc': '本文介绍了VideoChat3，这是一种完全开放、高效且通用的视频中心机器学习模型。它通过引入膨胀3D视觉变换器和自适应帧分辨率来提高视频理解的效率，降低了训练和推理时处理视频输入的成本。同时，VideoChat3还开发了一个可扩展的视频数据合成管道，创建了三个多样化的高质量训练数据集，以提高模型在不同视频类型上的泛化能力。实验结果表明，VideoChat3在多个基准测试中超越了之前的开源模型，展现了出色的计算效率和广泛的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2607.14777', 'title': 'SEED: Self-Evolving On-Policy Distillation for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2607.14777', 'abstract': 'Abstract  Large language models are increasingly trained as interactive agents for long-horizon tasks involving multi-turn interaction, tool use, and environment feedback. Outcome-based reinforcement learning (RL) provides a practical optimization paradigm, but its sparse trajectory-level rewards offer limited guidance on intermediate decisions, leaving a supervision gap between episode-level outcomes and token-level policy learning. We propose SEED (SElf-Evolving On-Policy Distillation), a self-evolving framework that converts completed on-policy trajectories into training-time hindsight skills and distills their behavioral effect back into the policy model. SEED first fine-tunes the policy to analyze completed trajectories and generate natural-language skills that capture reusable workflows, decisive observations, or failure-avoidance rules. During RL, the current policy both collects trajectories and serves as the analyzer that extracts hindsight skills from them. Policy updates therefore improve subsequent decision making and skill analysis together, allowing hindsight supervision to evolve with the policy. SEED then re-scores the sampled actions under ordinary and skill-augmented contexts, converting the skill-induced probability shift into a dense token-level on-policy distillation signal. This signal is jointly optimized with outcome-based RL, keeping the auxiliary supervision aligned with the current trajectory distribution. Extensive experiments on text-based and vision-based agentic tasks show that SEED consistently improves performance and sample efficiency, exhibiting robust generalization to unseen scenarios. Our code is available at https://github.com/jinyangwu/SEED.', 'score': 65, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '30b0dd72d53bf074', 'authors': ['Jinyang Wu', 'Shuo Yang', 'Zhengxi Lu', 'Fan Zhang', 'Yuhao Shen', 'Lang Feng', 'Haoran Luo', 'Zheng Lian', 'Shuai Zhang', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Nanyang Technological University', 'The Chinese University of Hong Kong', 'Tongji University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.14777.jpg', 'data': {'categories': ['#reasoning', '#rl', '#optimization', '#agents', '#open_source', '#training'], 'emoji': '🌱', 'ru': {'title': 'Самоэволюционирующая дистилляция навыков для обучения агентов с подкреплением', 'desc': 'В работе предложен метод SEED для обучения языковых моделей как интерактивных агентов с использованием обучением с подкреплением. Основная идея заключается в том, чтобы заполнить пробел между редкими наградами на уровне эпизода и обучением политики на уровне токенов, преобразуя завершённые траектории в навыки с hindsight. Метод использует самоэволюционирующую дистилляцию: политика анализирует собственные траектории, генерирует описания стратегий на естественном языке, а затем переоценивает действия в контексте этих навыков, создавая плотный сигнал обучения. Эксперименты показывают, что SEED улучшает производительность и эффективность выборки на текстовых и визуальных задачах с робастной генерализацией.'}, 'en': {'title': 'Empowering Language Models with Self-Evolving Skills', 'desc': 'This paper introduces SEED, a framework designed to enhance the training of large language models as interactive agents through outcome-based reinforcement learning (RL). SEED addresses the challenge of sparse rewards by converting completed trajectories into useful skills that inform decision-making during training. By fine-tuning the policy to analyze past interactions, SEED generates natural-language skills that help the model learn from its experiences. The approach allows for continuous improvement of both the policy and the skills, leading to better performance and efficiency in various tasks.'}, 'zh': {'title': '自我演化的在线蒸馏提升决策能力', 'desc': '本文提出了一种名为SEED（自我演化的在线蒸馏）的框架，旨在提高大语言模型在多轮交互任务中的表现。SEED通过分析已完成的策略轨迹，生成可重用的自然语言技能，从而填补了结果导向强化学习中的监督空白。该框架在强化学习过程中不断更新策略，并提取后见技能，促进决策和技能分析的共同提升。实验结果表明，SEED在文本和视觉任务中均显著提高了性能和样本效率，展现出对未见场景的强大泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2607.15257', 'title': 'SearchOS-V1: Towards Robust Open-Domain Information-Seeking Agent Collaboration', 'url': 'https://huggingface.co/papers/2607.15257', 'abstract': "Abstract  Recent advances in Tool-Integrated Large Language Models have made web search a core capability of information-seeking agents. However, as interaction histories grow, agents increasingly struggle to track task progress. When search attempts fail to yield useful evidence, current single- and multi-agent systems can become trapped in repetitive loops, wasting search budgets and ultimately compromising the quality and completeness of the final output. We introduce SearchOS, a system-level multi-agent framework that turns fragile, implicit search progress into explicit, persistent, and shared state. First, we formulate open-domain information seeking as relational schema completion with grounded citations, where agents discover entities, populate attributes across linked tables, and anchor each value to source evidence. Then we design Search-Oriented Context Management (SOCM), which externalizes the evolving state into Frontier Task, an Evidence Graph, a Coverage Map, and Failure Memory. Built on SOCM, SearchOS applies a pipeline-parallel scheduling mechanism that overlaps the execution of sub-agents and continuously refills freed slots with tasks targeting unresolved coverage gaps to improve utilization and throughput. To schedule and control the execution of search agents, SearchOS introduces a Search Tool Middleware Harness that intercepts model and tool interactions to record grounded evidence and react to stalls or budget exhaustion, and provides a reusable hierarchical skill system comprising strategy and access skills to augment the agents' search process and avoid repeating failed search patterns across runs. On WideSearch and GISA, SearchOS leads all metrics among the evaluated single- and multi-agent baselines, paving the way toward robust information-seeking collaboration.", 'score': 48, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'b1fd761244cc76a9', 'authors': ['Yuyao Zhang', 'Junjie Gao', 'Zhengxian Wu', 'Jiaming Fan', 'Jin Zhang', 'Shihan Ma', 'Yao Yao', 'Weiran Qi', 'Chuyan Jin', 'Guiyu Ma', 'Xingzhong Xu', 'Kai Yang', 'Ji-Rong Wen', 'Zhicheng Dou'], 'affiliations': ['Ant Group', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.15257.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Превращение хаоса поиска в стройную систему координации мультиагентного поиска', 'desc': 'Статья представляет SearchOS — систему на основе нескольких агентов, которая решает проблему повторяющихся попыток и потери прогресса при поиске информации с помощью LLM, интегрированных с инструментами. Авторы формулируют задачу поиска как заполнение реляционной схемы с обоснованными ссылками на источники, где агенты открывают сущности и заполняют атрибуты в связанных таблицах. Ключевой компонент — Search-Oriented Context Management (SOCM), который явно отслеживает состояние через граф доказательств, карту покрытия и историю ошибок, предотвращая зацикливание агентов. Система использует параллельное планирование задач и специальное промежуточное ПО для контроля взаимодействия модели и инструментов, что значительно улучшает качество и полноту поиска информации.'}, 'en': {'title': 'Enhancing Search Efficiency with SearchOS Framework', 'desc': 'This paper presents SearchOS, a multi-agent framework designed to enhance the efficiency of information-seeking tasks in large language models. It addresses the issue of agents getting stuck in repetitive search loops by creating a structured way to track and manage search progress through explicit state representation. The framework utilizes a Search-Oriented Context Management system to maintain an evolving state that includes task coverage and evidence tracking. By implementing a pipeline-parallel scheduling mechanism, SearchOS improves the utilization of agents and reduces wasted search efforts, leading to better overall performance in information retrieval tasks.'}, 'zh': {'title': '提升信息检索效率的多代理框架', 'desc': '最近，工具集成的大型语言模型在信息检索方面取得了显著进展，但随着交互历史的增加，代理在跟踪任务进展时面临挑战。当前的单一和多代理系统在搜索失败时容易陷入重复循环，浪费搜索资源，影响最终输出的质量和完整性。为了解决这个问题，本文提出了SearchOS，一个系统级的多代理框架，将脆弱的隐式搜索进展转化为明确、持久和共享的状态。通过设计搜索导向的上下文管理，SearchOS能够有效管理搜索代理的执行，提升搜索效率和结果的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2607.14952', 'title': 'LongStraw: Long-Context RL Beyond 2M Tokens under a Fixed GPU Budget', 'url': 'https://huggingface.co/papers/2607.14952', 'abstract': 'Abstract  A growing gap separates inference context lengths from RL post-training: inference systems are approaching million-token contexts, while post-training workloads often remain at 256K tokens or below and rely on length generalization at deployment. The gap is especially important for AI agents, whose observations, tool outputs, documents, and prior decisions accumulate over long trajectories. LongStraw is an architecture-aware execution stack for million-token RL post-training under a fixed GPU budget, instantiated with Group Relative Policy Optimization (GRPO). It evaluates the shared prompt without autograd, retains only model-specific state needed by later tokens, and replays short response branches one at a time, reducing the live training graph at the cost of additional replay time. We implement it for the hybrid recurrent and full-attention Qwen3.6-27B and the compressed-attention mixture-of-experts GLM-5.2. On eight H20 GPUs, LongStraw completes grouped Qwen scoring and response backward at 2.1M positions for groups of 2 and 8; increasing the group size adds only 0.21 GB of peak allocated memory, while a separate stress test reaches 4.46M positions. On 32 H20 GPUs, we validate the end-to-end LongStraw execution path for a 2.1M-token prompt across all 78 layers of GLM-5.2. These experiments establish execution capacity rather than complete training correctness because the captured prompt state is detached and some distributed forward and gradient composition paths remain incomplete.', 'score': 38, 'issue_id': 2681, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '3cb8bd3aa82740e4', 'authors': ['Changhai Zhou', 'Kieran Liu', 'Yuhua Zhou', 'Qian Qiao', 'Jun Gao', 'Harry Zhang', 'Irvine Lu', 'Nolan Ho', 'Lucian Li', 'Andrew Lei', 'Cleon Cheng', 'Steven Chiang', 'Yihang Zeng', 'Di Zhang', 'Rio Yang', 'Kaijie Chen', 'Andrew Chen', 'Pony Ma', 'Weizhong Zhang', 'Cheng Jin'], 'affiliations': ['Fudan University', 'MindLab'], 'pdf_title_img': 'assets/pdf/title_img/2607.14952.jpg', 'data': {'categories': ['#architecture', '#agents', '#training', '#inference', '#alignment', '#long_context', '#optimization', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Масштабное обучение с подкреплением на миллионо-токенных контекстах с ограниченным бюджетом вычислений', 'desc': 'Статья описывает LongStraw — оптимизированный стек для выполнения постобучения с подкреплением (RL) на миллионо-токенных контекстах в рамках фиксированного бюджета GPU. Авторы решают проблему разрыва между длиной контекста во время инференса (до миллиона токенов) и длиной во время обучения с подкреплением (обычно 256K токенов). Метод использует Group Relative Policy Optimization (GRPO) и применяет архитектурно-ориентированные оптимизации, такие как вычисление общего промпта без автоматического дифференцирования и поэтапное воспроизведение ответов. Экспериментальные результаты показывают, что LongStraw способен обрабатывать 2.1М позиций на восьми GPU H20 с контролируемым ростом памяти при увеличении размера группы.'}, 'en': {'title': 'Scaling RL Post-Training for Million-Token Contexts with LongStraw', 'desc': 'This paper addresses the challenge of scaling reinforcement learning (RL) post-training to handle longer context lengths, specifically up to a million tokens. The proposed solution, LongStraw, is an architecture-aware execution stack that optimizes the RL post-training process while adhering to fixed GPU resource constraints. It utilizes Group Relative Policy Optimization (GRPO) to efficiently manage memory and computation by evaluating shared prompts without autograd and replaying response branches sequentially. The experiments demonstrate that LongStraw can effectively process large token prompts across multiple GPUs, significantly enhancing the capacity for RL applications in complex environments.'}, 'zh': {'title': '缩小推理与后训练的差距', 'desc': '这篇论文讨论了在强化学习后训练中，推理上下文长度与实际应用之间的差距。当前的推理系统能够处理百万级的上下文，而后训练的工作负载通常限制在256K令牌以下。为了解决这个问题，作者提出了LongStraw，这是一种在固定GPU预算下进行百万令牌后训练的架构。LongStraw通过优化模型状态和减少实时训练图的复杂性，提高了处理长序列的能力。'}}}, {'id': 'https://huggingface.co/papers/2607.15207', 'title': 'BadWAM: When World-Action Models Dream Right but Act Wrong', 'url': 'https://huggingface.co/papers/2607.15207', 'abstract': "Abstract  World-action models (WAMs) are emerging as a promising foundation for embodied control: rather than predicting actions alone, they learn representations that couple action generation with future world prediction. This coupling is often viewed as a source of robustness, interpretability, and safety, as a robot's action can in principle be checked against its imagined future. In this paper, we show that this assumption is fragile. We introduce BadWAM, a unified framework for modeling and evaluating World-Action Drift Attacks: a new class of WAM-specific adversarial attacks that use small visual perturbations to break the alignment between what a WAM imagines and what it executes. BadWAM characterizes this attack surface along two natural criteria: attack strength and stealthiness. When the adversary prioritizes disruption, BadWAM instantiates an action-only adversarial attack, which directly drives the model toward task-failing actions. When the adversary additionally prioritizes stealth, BadWAM instantiates an imagination-preserving adversarial attack, which seeks to induce harmful action shifts while keeping the model's predicted future close to its clean imagination. Together, these two attacks capture a spectrum of WAM-specific failures: from overt action hijacking to stealthier cases where the model appears to imagine a plausible future but executes a desynchronized action. We evaluate BadWAM across different variants of WAMs. Results show that our attacks substantially reduce task success rates under closed-loop execution. For example, our action-only attack reduces the model performance from 96.5% to 43.1% success. The results of our imagination-preserving attack further exposes a WAM-specific vulnerability: moderate future-preserving regularization can maintain strong attack performance while reducing future imagination drift.", 'score': 36, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '794be9bd2a774397', 'authors': ['Qi Li', 'Xingyi Yang', 'Xinchao Wang'], 'affiliations': ['National University of Singapore', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2607.15207.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Когда робот видит одно, а делает другое: атаки на модели мир-действие', 'desc': 'В статье исследуются уязвимости моделей мир-действие (World-Action Models), которые одновременно предсказывают будущее состояние окружения и генерируют действия робота. Авторы представляют BadWAM — фреймворк для атак на эти модели с помощью небольших визуальных возмущений, которые нарушают согласованность между предсказанным и реальным поведением системы. Предложены два типа атак: прямые атаки на действия, вызывающие отказ задачи, и скрытые атаки, сохраняющие правдоподобность предсказаний модели при вредоносном управлении. Экспериментальные результаты показывают существенное снижение эффективности моделей (например, с 96.5% до 43.1% успеха), что выявляет критические проблемы безопасности в системах управления робототехникой.'}, 'en': {'title': 'Unveiling Vulnerabilities in World-Action Models with BadWAM', 'desc': "World-action models (WAMs) are designed to enhance robotic control by linking action generation with predictions about future states. This paper introduces BadWAM, a framework that identifies vulnerabilities in WAMs through adversarial attacks that disrupt the alignment between a model's imagined future and its executed actions. The study categorizes these attacks into two types: action-only attacks that directly lead to task failures, and imagination-preserving attacks that induce harmful actions while maintaining a seemingly plausible future prediction. The findings reveal that these attacks significantly decrease the success rates of WAMs, highlighting the need for improved robustness in embodied control systems."}, 'zh': {'title': '揭示世界行动模型的脆弱性', 'desc': '世界行动模型（WAMs）是一种新兴的控制基础，能够将动作生成与未来世界预测结合起来。本文提出了BadWAM框架，用于建模和评估世界行动漂移攻击，这是一种针对WAM的对抗性攻击。通过小的视觉扰动，这种攻击可以破坏WAM想象与执行之间的对齐。我们的实验表明，这些攻击显著降低了任务成功率，揭示了WAM特有的脆弱性。'}}}, {'id': 'https://huggingface.co/papers/2607.14202', 'title': 'KeyFrame-Compass: Towards Comprehensive Evaluation of Keyframe-Conditioned Video Generation', 'url': 'https://huggingface.co/papers/2607.14202', 'abstract': 'Abstract  Video generation increasingly relies on keyframe-based workflows, where creators specify a sequence of reference images to guide generation. Although recent models support multi-keyframe conditioning, it remains unclear whether they can faithfully reproduce the prescribed keyframes while maintaining overall video quality. We present KeyFrame-Compass, the first comprehensive benchmark for evaluating keyframe-conditioned video generation. The benchmark contains 386 carefully curated samples spanning three application domains, two video structures, two prompt granularities, two conditioning formats, and four keyframe densities, enabling controlled analysis under diverse generation settings. We further introduce an automated evaluation framework that jointly measures keyframe execution and overall video quality. Specifically, we decompose keyframe execution into six complementary metrics covering presence, fidelity, temporal ordering, localization, persistence, and uniqueness, while assessing overall video quality through evidence-grounded MLLM judgments augmented with specialized perception models. Experiments on nine representative video generation systems reveal several fundamental limitations. Current models exhibit a clear trade-off between faithful keyframe execution and natural video synthesis. Their performance further degrades as keyframe constraints become denser and most open-source models also fail to interpret storyboard-grid inputs as temporally ordered keyframe sequences.', 'score': 30, 'issue_id': 2679, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '7bfbeb322dd33947', 'authors': ['Yuqi Tang', 'Tengfei Liu', 'Yizheng Lai', 'Yuran Wang', 'Yang Shi', 'Wanshun Su', 'Zhuoran Zhang', 'Qixun Wang', 'Xiaohan Zhang', 'Xinlei Yu', 'Xuehai Bai', 'Xuanyu Zhu', 'Bohan Zeng', 'Bozhou Li', 'Shujie Li', 'Yifan Dai', 'Yujie Wei', 'Shixuan Liu', 'Haotian Wang', 'Jialu Chen', 'Yuanxing Zhang'], 'affiliations': ['CUHK', 'FDU', 'HKU', 'HKUST(GZ)', 'Kling Team', 'NJU', 'NWPU', 'PKU', 'RUC', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2607.14202.jpg', 'data': {'categories': ['#video', '#benchmark', '#multimodal', '#survey'], 'emoji': '🎬', 'ru': {'title': 'Навигация верностью: измерение качества видео с опорными кадрами', 'desc': 'В статье представлена KeyFrame-Compass — первый комплексный бенчмарк для оценки качества видеогенерации, управляемой опорными кадрами (keyframes). Авторы разработали набор из 386 тщательно отобранных примеров, охватывающих различные области применения, форматы кондиционирования и плотности расположения keyframes. Предложена автоматизированная система оценки, которая одновременно измеряет точность воспроизведения опорных кадров и общее качество видео через шесть специализированных метрик и оценки MLLM. Экспериментальные результаты на девяти моделях выявили фундаментальные ограничения: существует явный компромисс между верностью выполнения keyframes и естественностью синтеза видео, особенно при увеличении плотности ограничений.'}, 'en': {'title': 'Navigating the Challenges of Keyframe-Conditioned Video Generation', 'desc': 'This paper introduces KeyFrame-Compass, a new benchmark designed to evaluate video generation models that use keyframes as guidance. It assesses how well these models can reproduce specified keyframes while also maintaining high video quality. The benchmark includes a diverse set of samples and an automated evaluation framework that measures both keyframe accuracy and overall video quality through various metrics. The findings highlight significant trade-offs in current models, particularly when handling denser keyframe inputs, indicating areas for improvement in video generation techniques.'}, 'zh': {'title': '关键帧生成视频的评估新标准', 'desc': '视频生成越来越依赖于关键帧工作流程，创作者通过指定一系列参考图像来指导生成。本文提出了KeyFrame-Compass，这是第一个全面评估关键帧条件下视频生成的基准测试。该基准包含386个精心策划的样本，涵盖三个应用领域、两种视频结构、两种提示粒度、两种条件格式和四种关键帧密度，能够在多种生成设置下进行控制分析。实验结果显示，当前模型在忠实执行关键帧和自然视频合成之间存在明显的权衡，且随着关键帧约束的增加，性能进一步下降。'}}}, {'id': 'https://huggingface.co/papers/2607.14189', 'title': 'MultiRef-Compass: Towards Comprehensive Evaluation of Multi-Reference-to-Audio-Video Generation', 'url': 'https://huggingface.co/papers/2607.14189', 'abstract': 'Abstract  Multi-reference-to-audio-video (MR2AV) generation aims to generate coherent audio-video content conditioned on multiple references and textual instructions. Existing benchmarks mainly focus on text-driven generation, single-reference subject preservation, or isolated audio-video alignment, leaving the emerging MR2AV setting largely unexplored. Compared with these settings, MR2AV requires models to jointly reason over multiple references while generating synchronized visual and audio content. Models must not only preserve each reference faithfully but also correctly bind and compose multiple referenced entities into coherent audio-visual events. To address this gap, we introduce MultiRef-Compass, a unified benchmark for MR2AV generation. It comprises 350 carefully curated samples constructed through a scalable and controllable asset-composition pipeline, covering multi-view subject preservation, multi-entity binding, and human-object-scene composition. To provide interpretable assessment, MultiRef-Compass defines an evaluation protocol with four dimensions: Basic Quality, Reference Consistency, Audio-Visual Consistency, and Instruction Following, using 14 sub-metrics. MultiRef-Compass integrates automatic metrics with a rejudging-enhanced MLLM-as-a-Judge framework, enabling scalable and auditable evaluation of both perceptual fidelity and reference-conditioned composition. Extensive experiments on eight representative MR2AV systems reveal substantial room for improvement across multiple evaluation dimensions, underscoring the need for a comprehensive benchmark and positioning MultiRef-Compass as a foundation for future MR2AV research.', 'score': 29, 'issue_id': 2679, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'f9fc647d33b68daf', 'authors': ['Xiaohan Zhang', 'Yuqing Wen', 'Junlin Chen', 'Yuqi Tang', 'Yiting He', 'Lizhuo Shao', 'Weiming Zhu', 'Tengfei Liu', 'Yang Shi', 'Jialu Chen', 'Yuanxing Zhang', 'Huaxiong Li'], 'affiliations': ['Hong Kong University of Science and Technology (Guangzhou)', 'Kling Team', 'Nanjing University', 'National University of Singapore', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.14189.jpg', 'data': {'categories': ['#audio', '#dataset', '#benchmark', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Сбалансированная генерация: контроль над несколькими источниками в аудиовизуальном синтезе', 'desc': 'В статье представлен новый бенчмарк MultiRef-Compass для задачи генерации аудиовизуального контента на основе нескольких референсов и текстовых инструкций. Датасет содержит 350 тщательно отобранных примеров, охватывающих сохранение множественных объектов, их взаимодействие и композицию сцен. Авторы разработали комплексный протокол оценки с четырьмя измерениями (качество, консистентность референсов, синхронизация аудио-видео, следование инструкциям) и 14 подметриками, интегрирующими автоматические метрики с MLLM-судьей. Экспериментальная оценка восьми систем выявила значительный потенциал для улучшения и установила MultiRef-Compass как фундамент для будущих исследований в этой области.'}, 'en': {'title': 'Unlocking Coherent Audio-Video Generation with Multi-References', 'desc': 'The paper introduces a new area of research called Multi-reference-to-audio-video (MR2AV) generation, which focuses on creating synchronized audio and video content based on multiple references and textual instructions. Unlike previous benchmarks that primarily dealt with single references or text-driven generation, MR2AV requires models to effectively combine and reason over multiple inputs to produce coherent outputs. The authors present MultiRef-Compass, a benchmark designed to evaluate MR2AV generation, featuring 350 curated samples and a detailed assessment protocol with various metrics. This work highlights the challenges in the MR2AV domain and aims to provide a foundation for future advancements in this field.'}, 'zh': {'title': '多参考音视频生成的新基准', 'desc': '多参考音视频生成（MR2AV）旨在根据多个参考和文本指令生成连贯的音视频内容。现有的基准主要集中在文本驱动生成、单一参考对象的保留或孤立的音视频对齐，导致MR2AV设置尚未得到充分探索。与这些设置相比，MR2AV要求模型在生成同步的视觉和音频内容时，能够共同推理多个参考。为了解决这一问题，我们引入了MultiRef-Compass，这是一个统一的MR2AV生成基准，涵盖了多视角对象保留、多实体绑定和人-物-场景组合等方面。'}}}, {'id': 'https://huggingface.co/papers/2607.14076', 'title': 'From Pixels to States: Rethinking Interactive World Models as Game Engines', 'url': 'https://huggingface.co/papers/2607.14076', 'abstract': 'Abstract  Building interactive worlds that respond coherently to player actions has long been a shared goal of computer graphics, games, and artificial intelligence. Recent video generative models provide a data-driven route toward this goal by predicting future observations conditioned on user actions, and are increasingly regarded as potential next-generation game engines. Realizing a genuinely interactive game world, however, requires interaction outcomes that follow rules over evolving game conditions, consequences that persist over long horizons, and a generation loop that operates in real time. Conventional game engines realize these properties through a recurrent action-state-observation loop, in which player actions update an explicit game state according to predefined rules and observations are rendered from the resulting state. Taking this loop as an organizing lens, this paper examines interactive game world modeling along four dimensions: player action control, game state dynamics, state-observation persistence, and real-time interactive generation. For each dimension, we start from the capabilities required by an interactive game world, group existing approaches into representative families, and discuss the strengths and trade-offs of each family. Complementing this analysis, we present a scalable data engine for Black Myth: Wukong that collects over 90 hours of gameplay with frame-aligned player actions, ground-truth game states, and visual observations, together with structured and semantic annotations, as a resource for state-aware game world modeling. We hope this paper offers a clear picture of where the field stands and fosters progress toward interactive game worlds.', 'score': 23, 'issue_id': 2680, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '547dde71a45f44f4', 'authors': ['Zhen Li', 'Zian Meng', 'Shuwei Shi', 'Mingliang Zhai', 'Jiaming Tan', 'Chuanhao Li', 'Kaipeng Zhang'], 'affiliations': ['Alaya Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.14076.jpg', 'data': {'categories': ['#video', '#survey', '#games', '#benchmark', '#dataset'], 'emoji': '🎮', 'ru': {'title': 'Видеогенерация как следующее поколение игровых движков', 'desc': 'В статье рассматривается моделирование интерактивных игровых миров с использованием видеогенеративных моделей, которые предсказывают будущие наблюдения на основе действий игрока. Авторы анализируют четыре ключевых аспекта: управление действиями игрока, динамика игрового состояния, сохранение состояния-наблюдения и генерация в реальном времени. Исследователи представляют масштабируемый датасет из игры Black Myth: Wukong с 90+ часами геймплея, включающий действия игрока, состояния игры и визуальные наблюдения. Работа предлагает систематический анализ существующих подходов и определяет направления развития для создания по-настоящему интерактивных игровых миров на основе нейросетевых моделей.'}, 'en': {'title': 'Building Intelligent Game Worlds with Real-Time Interaction', 'desc': 'This paper explores how to create interactive game worlds that respond logically to player actions using machine learning techniques. It discusses the importance of a recurrent action-state-observation loop, which allows player actions to influence the game state and generate real-time observations. The authors analyze four key dimensions necessary for effective game world modeling: player action control, game state dynamics, state-observation persistence, and real-time generation. Additionally, they introduce a data engine that collects extensive gameplay data to aid in developing state-aware game models, aiming to advance the field of interactive gaming.'}, 'zh': {'title': '构建互动游戏世界的未来', 'desc': '本文探讨了构建能够对玩家行为做出连贯反应的互动游戏世界的挑战。通过分析玩家行为控制、游戏状态动态、状态-观察持久性和实时互动生成等四个维度，作者总结了现有方法的优缺点。文章还介绍了一个可扩展的数据引擎，收集了超过90小时的游戏数据，为状态感知的游戏世界建模提供了资源。希望这项研究能为互动游戏世界的发展提供清晰的方向。'}}}, {'id': 'https://huggingface.co/papers/2607.13188', 'title': 'Concurrent Image Understanding and Generation: Self-Correcting Coupled Markov Jump Processes', 'url': 'https://huggingface.co/papers/2607.13188', 'abstract': "Abstract  Human cognition does not separate understanding and generation. A teacher at a whiteboard speaks and draws together, each modality reshapes the other. In this paper, we bring this coupled loop to artificial systems. Masked Diffusion Models (MDMs) are ideally suited to this task, yet existing samplers either decode text and image interleavedly or independently update them in parallel branches that share only previous-step history, but not the other modality's latest decisions within the same step; combined with MDMs' inability to remask, cross-modal contradictions are neither detected nor repaired. We introduce Self-Correcting Coupled Markov Jump Processes (SC-CMJP), a framework in which one modality's transition rates are functionals of the other modality's confidence score, as weighted by cross-modal attention. Furthermore, a remasking jump retracts commitments the moment cross-modal evidence turns against them. In conjunction with SC-CMJP, we introduce CO_2Jump (Self-text{CO}rrecting text{CO}upled text{Jump}), a novel training-free single-pass sampler for joint multimodal geneneration. For training and evaluation purposes, we have created and will release three large-scale joint multimodal generation corpora: JEdit-1M, JMaze-200K, JNono-200K, with matching in- and out-of-distribution benchmarks. CO_2Jump achieves best joint performance for image understanding and editing as well as visual reasoning (maze and nonogram solving). The performance of the sampler scales monotonically with the number of denoising steps, evidence that the benefits of cross-modal coupling compound across the trajectory. Project page: https://coupled-jump.github.io", 'score': 23, 'issue_id': 2679, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': 'd5c413b4755db5ec', 'authors': ['Minh-Quan Le', 'Armand Comas', 'Alexandros Lattas', 'Stylianos Moschoglou', 'Pedro Vélez', 'Amit Raj', 'Aaron Germuth', 'Thabo Beeler', 'Dimitris Samaras', 'Di Qiu'], 'affiliations': ['Google', 'Google DeepMind', 'Stony Brook University'], 'pdf_title_img': 'assets/pdf/title_img/2607.13188.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Синхронная генерация текста и изображений через взаимно корректирующиеся процессы', 'desc': 'В этой работе предложен новый подход к совместной генерации текста и изображений, вдохновленный тем, как человеческое познание одновременно использует оба модальности. Авторы разработали SC-CMJP — фреймворк на основе Masked Diffusion Models, где переходные вероятности одной модальности зависят от уверенности другой модальности через кросс-модальное внимание. Ключевое нововведение — механизм переквантизации, который позволяет модели исправлять противоречия между модальностями прямо во время процесса декодирования. Предложенный семплер CO_2Jump работает без обучения и показывает лучшие результаты в задачах редактирования изображений и визуального рассуждения.'}, 'en': {'title': 'Coupling Understanding and Generation in AI', 'desc': 'This paper presents a new approach to artificial intelligence that mimics how humans understand and generate information together. It introduces Self-Correcting Coupled Markov Jump Processes (SC-CMJP), which allows different types of data, like text and images, to influence each other during processing. The method includes a novel sampler called CO_2Jump, which generates multimodal outputs in a single pass without needing prior training. The results show that this approach improves performance in tasks like image understanding and visual reasoning by effectively integrating information from both modalities.'}, 'zh': {'title': '跨模态生成的自我修正新方法', 'desc': '本文探讨了人类认知中理解与生成的结合，提出了一种新的人工智能系统框架。我们引入了自我修正耦合马尔可夫跳跃过程（SC-CMJP），使得一种模态的转移率依赖于另一种模态的置信度评分。通过这种方式，系统能够在生成过程中检测和修正跨模态的矛盾。我们还提出了CO_2Jump，这是一种新颖的无训练单次采样器，能够实现联合多模态生成，并在多个基准测试中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.12800', 'title': 'UniVR: Thinking in Visual Space for Unified Visual Reasoning', 'url': 'https://huggingface.co/papers/2607.12800', 'abstract': 'Abstract  Learning broad world knowledge directly from raw visual data is a fundamental capability of intelligence. We introduce UniVR, the first investigation into simultaneously learning complex reasoning, fine-grained physical dynamics, and long-term planning from pure visual demonstrations. At its core, UniVR features VR-GRPO, a reinforcement learning paradigm with complementary global and step-level rewards. This approach enforces logical coherence and physical consistency throughout the reasoning process without requiring task-specific heuristics or image-text pairs. To train and evaluate UniVR, we construct VR-X, a large-scale benchmark curated from 16 diverse sources spanning long-horizon manipulation, spatial puzzles, and physical reasoning. It is the first comprehensive suite to assess these heterogeneous capabilities under a purely visual protocol. Remarkably, UniVR achieves up to a 25% improvement on VR-X, and its superior visual reasoning also boosts performance on various multimodal understanding benchmarks. These findings underscore the vast potential of reasoning within visual spaces, with all code, data, and models are open-sourced for further research.', 'score': 21, 'issue_id': 2679, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': '0563b75a6a643fed', 'authors': ['Zhongwei Ren', 'Yunchao Wei', 'Yao Zhao', 'Weibo Gong', 'Xiao Liu', 'Anran Wang', 'Xiangtai Li', 'Xiaojie Jin'], 'affiliations': ['Beijing Jiaotong University', 'ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2607.12800.jpg', 'data': {'categories': ['#cv', '#dataset', '#reasoning', '#benchmark', '#rl', '#multimodal', '#open_source', '#training'], 'emoji': '🎮', 'ru': {'title': 'Обучение сложному рассуждению и планированию из визуальных данных без текстовых аннотаций', 'desc': 'UniVR — это первая система, которая одновременно обучается сложному рассуждению, точной физической динамике и долгосрочному планированию исключительно из визуальных демонстраций. В основе подхода лежит VR-GRPO — парадигма обучения с подкреплением, использующая дополняющие глобальные и пошаговые награды для обеспечения логической согласованности и физической правдоподобности. Авторы создали VR-X — крупномасштабный бенчмарк из 16 различных источников для оценки способностей к манипуляции, пространственному рассуждению и физическому моделированию на основе только визуальной информации. Результаты показывают улучшение на 25% и демонстрируют потенциал визуального рассуждения для общего понимания мультимодальных данных.'}, 'en': {'title': 'Unlocking Visual Intelligence with UniVR', 'desc': 'The paper presents UniVR, a novel framework for learning complex reasoning and physical dynamics directly from visual data. It employs a reinforcement learning method called VR-GRPO, which uses both global and step-level rewards to ensure logical and physical consistency in reasoning. UniVR is evaluated using a new benchmark, VR-X, which includes a variety of tasks related to manipulation and spatial reasoning, all based on visual input. The results show that UniVR significantly improves performance on these tasks, highlighting the effectiveness of visual reasoning in machine learning applications.'}, 'zh': {'title': '视觉空间中的推理潜力', 'desc': '本文介绍了UniVR，这是首次研究如何从纯视觉演示中同时学习复杂推理、细致的物理动态和长期规划。UniVR的核心是VR-GRPO，这是一种强化学习范式，结合了全局奖励和逐步奖励，确保推理过程中的逻辑一致性和物理一致性，而无需特定任务的启发式方法或图像-文本对。为了训练和评估UniVR，我们构建了VR-X，这是一个大规模基准，涵盖了长时间操作、空间难题和物理推理等多种来源。UniVR在VR-X上实现了高达25%的性能提升，并且其卓越的视觉推理能力也提高了多模态理解基准的表现。'}}}, {'id': 'https://huggingface.co/papers/2607.03065', 'title': 'Spectral Rewiring for Exploration, Purification, and Model Merging', 'url': 'https://huggingface.co/papers/2607.03065', 'abstract': "Abstract  Reinforcement learning has become a standard post-training recipe for large language models, but dense full-parameter updates create two deployment-relevant bottlenecks: suppressed reasoning performance, often reflected by premature saturation of test-time scaling, and interference when consolidating multiple capabilities through multi-domain training or model merging. We show that the reasoning-effective component of these updates is largely concentrated in the base model's spectral space, motivating Subspace-Aligned Rewiring (SAR), a post-hoc editing method that retains this spectral core while removing orthogonal components. SAR therefore preserves reasoning gains and filters residual update directions that suppress performance or amplify cross-domain interference. Across several model families and scales, SAR extracts compact reasoning cores using as little as approximately 0.58% of total parameters: it preserves over 99% of post-training performance and improves high-k exploration in mathematical reasoning, and generalizes to agentic coding by improving six of seven open benchmarks on an in-house model. SAR also purifies mixed-domain training updates by releasing suppressed coding capability while maintaining math reasoning and instruction following. It further enables model merging across experts, yielding cross-domain generalization that surpasses previous merging baselines and even the best single-domain experts. Overall, SAR shows that extracting reasoning-effective updates from parameter geometry can serve as a training-free mechanism to improve reasoning and multi-domain performance.", 'score': 18, 'issue_id': 2680, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '3aa05339b22cafab', 'authors': ['Zhilong Zhang', 'Hongli Yu', 'Huan-ang Gao', 'Hanlin Wu', 'Yuxuan Song', 'Wei-Ying Ma', 'Ya-Qin Zhang', 'Hao Zhou'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University', 'SIA-Lab of Tsinghua AIR and ByteDance Seed'], 'pdf_title_img': 'assets/pdf/title_img/2607.03065.jpg', 'data': {'categories': ['#rl', '#plp', '#architecture', '#reasoning', '#optimization', '#training', '#agents', '#math'], 'emoji': '🧠', 'ru': {'title': 'Извлечение ядра рассуждений из геометрии параметров для улучшения мультидоменной производительности', 'desc': 'В работе предложен метод Subspace-Aligned Rewiring (SAR), который улучшает качество постобучения больших языковых моделей через подкрепление. Авторы показывают, что эффективные компоненты обновлений параметров сосредоточены в спектральном пространстве модели, а ортогональные компоненты подавляют рассуждения и вызывают интерференцию при мультидоменном обучении. SAR сохраняет спектральное ядро обновлений, используя менее 1% параметров, при этом сохраняя 99% производительности постобучения. Метод улучшает логический вывод в математических задачах, кодировании и позволяет эффективно объединять модели разных доменов без потери качества.'}, 'en': {'title': 'Enhancing Reasoning in Language Models with Subspace-Aligned Rewiring', 'desc': 'This paper introduces Subspace-Aligned Rewiring (SAR), a method designed to enhance the reasoning capabilities of large language models after their initial training. SAR focuses on retaining the essential spectral components of the model while eliminating less relevant parameters that can hinder performance. By doing so, it achieves significant improvements in reasoning tasks and allows for better integration of multiple skills without interference. The results demonstrate that SAR can maintain high performance with a minimal number of parameters, making it a valuable tool for optimizing model efficiency and effectiveness in diverse applications.'}, 'zh': {'title': '提取推理核心，提升多领域性能', 'desc': '强化学习已成为大型语言模型的标准后训练方法，但全参数更新存在两个部署瓶颈：推理性能受限和多能力整合时的干扰。我们提出了子空间对齐重构（SAR）方法，旨在保留模型的推理核心，同时去除正交成分。SAR能够在多个模型家族和规模中提取紧凑的推理核心，保留超过99%的后训练性能，并在数学推理和编码任务中表现出色。总体而言，SAR展示了从参数几何中提取推理有效更新的潜力，能够在不进行训练的情况下提升推理和多领域性能。'}}}, {'id': 'https://huggingface.co/papers/2607.13399', 'title': 'Demystifying On-Policy Distillation: Roles, Pathologies, and Regulations', 'url': 'https://huggingface.co/papers/2607.13399', 'abstract': 'Abstract  On-policy distillation (OPD) has become a key paradigm in LLM post-training, yet its training dynamics remain poorly understood. We present a systematic study examining the role, pathologies, and regulations of OPD. We first clarify the role of OPD as an exploration catalyst: it steers the student toward correct reasoning paths via dense token-level guidance, without expanding capability ceiling. We confirm this by showing that prompt diversity matters more than per-problem sampling numbers, and critically, that the effectiveness of OPD hinges entirely on the quality of its guiding signal. This dependency exposes two pathologies that derail exploration. The Student-Teacher Mismatch occurs when a large teacher-student distributional gap causes the guiding signal to misalign with task correctness, steering exploration in counterproductive directions. Length Exploitation arises when the aggregated token-level objective creates length-dependent shortcuts, allowing the student to game the reward landscape through response truncation or redundant padding, exploring degenerate length modes rather than reasoning strategies. To tame these pathologies, we investigate lightweight signal regulations: advantage clipping and log-scale compression, ensuring exploration is guided by faithful signals. Experiments across seven benchmarks demonstrate that these regulations alleviate length exploitation and enable effective distillation, stably surpassing OPD variants and RLVR baselines, thereby confirming that well-regulated signal quality, rather than mere teacher scale, governs successful exploration in OPD.', 'score': 14, 'issue_id': 2679, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'e5990238f3cf3a12', 'authors': ['Rui Wang', 'Hongru Wang', 'Yi Chen', 'Boyang Xue', 'Tianqing Fang', 'Wenhao Yu', 'Kam-Fai Wong'], 'affiliations': ['Tencent AI Lab', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.13399.jpg', 'data': {'categories': ['#training', '#rlhf', '#optimization', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Качество управляющего сигнала вместо масштаба учителя в дистилляции языковых моделей', 'desc': 'В работе исследуются динамики обучения методом On-Policy Distillation (OPD) для постобучения больших языковых моделей. Авторы показывают, что OPD работает как катализатор исследования пространства решений, направляя модель-ученика через плотную токен-уровневую разметку, но не расширяя её потенциал. Исследование выявляет две критические проблемы: несоответствие учителя и ученика, когда большой разрыв в распределениях приводит к неправильной разметке, и эксплуатацию длины ответа, когда модель учится обманывать целевую функцию через обрезание или дублирование. Предложенные методы регуляризации сигнала (advantage clipping и log-scale compression) успешно устраняют эти проблемы и обеспечивают стабильное превосходство над базовыми подходами.'}, 'en': {'title': 'Guiding Exploration: Enhancing On-Policy Distillation in LLMs', 'desc': "This paper investigates On-policy Distillation (OPD) in large language models (LLMs) and its training dynamics. It highlights OPD's role in guiding the student model towards correct reasoning paths through effective token-level signals. The study identifies two main issues: the Student-Teacher Mismatch, which misaligns guidance with task correctness, and Length Exploitation, where the model takes shortcuts in response length. To address these issues, the authors propose lightweight regulations that improve signal quality, leading to better exploration and performance in various benchmarks."}, 'zh': {'title': '优化在线蒸馏，提升探索质量', 'desc': '本文研究了在大规模语言模型后训练中，在线蒸馏（OPD）的作用和训练动态。我们发现，OPD作为探索的催化剂，通过密集的标记级指导，引导学生走向正确的推理路径，但并不提升能力上限。研究表明，提示的多样性比每个问题的采样数量更为重要，而OPD的有效性完全依赖于指导信号的质量。为了解决探索中的问题，我们提出了轻量级信号调节方法，确保探索受到真实信号的引导，从而提高蒸馏的效果。'}}}, {'id': 'https://huggingface.co/papers/2607.15038', 'title': 'Video = World + Event Stream', 'url': 'https://huggingface.co/papers/2607.15038', 'abstract': "Abstract  We present Wan-Streamer v0.3, which reframes our native-streaming interaction model under a single organizing view: a video is a world plus an event stream. The world is the persistent context in which a video unfolds, including the environment, scene, subjects, ambient acoustic conditions, voice characteristics, and other relatively stable conditions. The event stream is everything that changes over time within that world, including scene or environmental changes, subject behavior, speech, and other sounds. This yields a general-purpose pretraining task over large amounts of real video: given a world and incoming input, predict how the world moves, changes, and responds in real time. The resulting competence can be specialized to a broad family of real-time downstream tasks. We instantiate it on real-time full-duplex audio-visual interaction, where the event stream is the agent's speech together with free-form behavior. Functionally, the model's multimodal understanding process is vision-language-action-like: it maps multimodal user input to language-form speech and behavior actions. Wan-Streamer v0.3 preserves the v0.2 operating point: 640x368 video at 25 FPS, a 160 ms streaming unit, approximately 200 ms model-side response latency, and approximately 550 ms total interaction latency under a 350 ms bidirectional network budget.", 'score': 13, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '7e06d03e3f766305', 'authors': ['Lianghua Huang', 'Zhi-Fan Wu', 'Yupeng Shi', 'Wei Wang', 'Mengyang Feng', 'Cheng Yu', 'Chen Liang', 'Junjie He', 'Chen-Wei Xie', 'Yu Liu', 'Jingren Zhou', 'Ang Wang', 'Bang Zhang', 'Baole Ai', 'Chongyang Zhong', 'Jinwei Qi', 'Kai Zhu', 'Pandeng Li', 'Peng Zhang', 'Wenyuan Zhang', 'Xinhua Cheng', 'Yitong Huang', 'Yun Zheng', 'Yuxiang Bao', 'Yuzheng Wang', 'Zhiwei Lin', 'Zoubin Bi'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.15038.jpg', 'data': {'categories': ['#video', '#multimodal', '#agents', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Видео как мир и события: потоковая модель для взаимодействия в реальном времени', 'desc': 'В работе представлена Wan-Streamer v0.3 — модель для потокового видео-анализа, которая представляет видео как комбинацию стабильного контекста (мир) и потока событий, происходящих во времени. Модель обучается на задаче предсказания того, как мир изменяется в ответ на входящие данные в режиме реального времени, используя мультимодальный подход, объединяющий зрение, язык и действия. Данный подход позволяет специализировать модель для различных задач взаимодействия, включая полнодуплексное аудиовизуальное взаимодействие с агентом. Система сохраняет эффективность работы: обрабатывает видео разрешением 640x368 при 25 FPS с задержкой ответа около 200 мс и общей задержкой взаимодействия около 550 мс.'}, 'en': {'title': 'Revolutionizing Video Interaction with Real-Time Contextual Understanding', 'desc': 'Wan-Streamer v0.3 introduces a new way to understand video by combining the stable context of a video (the world) with the dynamic changes that occur over time (the event stream). This model allows for the prediction of how the world evolves in response to various inputs, enabling it to learn from large amounts of real video data. It is designed for real-time interactions, where the model can interpret multimodal inputs, such as speech and actions, and respond accordingly. The architecture maintains efficient performance metrics, ensuring low latency for interactive applications.'}, 'zh': {'title': '视频与事件流的智能交互', 'desc': 'Wan-Streamer v0.3 是一种新的交互模型，它将视频视为一个世界和一个事件流的结合。这个世界是视频展开的持久背景，包括环境、场景、主体和声音特征等稳定条件。事件流则是世界中随时间变化的所有内容，包括场景变化、主体行为和声音等。该模型可以用于实时的多模态交互任务，通过预测世界的变化和响应，提升了对用户输入的理解和反应能力。'}}}, {'id': 'https://huggingface.co/papers/2607.15275', 'title': 'RoboTTT: Context Scaling for Robot Policies', 'url': 'https://huggingface.co/papers/2607.15275', 'abstract': 'Abstract  Recent robot foundation models operate with single-step or short-history visuomotor context. We introduce Test-Time-Training Robot Policies (RoboTTT), a robot model and training recipe that scale visuomotor context to 8K timesteps, three orders of magnitude beyond state-of-the-art policies, without growing inference latency. At this context length, we unlock new robot capabilities: one-shot in-context imitation from human video demonstrations, on-the-fly policy improvement, robustness to perturbations, and stronger performance on multi-stage, long-horizon tasks. We also observe, for the first time, steady gains in closed-loop performance as pretraining context length scales. At its core, RoboTTT integrates Test-Time Training into robot foundation models such as Vision-Language-Action policies, yielding a sequence model whose recurrent state consists of fast weights, parameters updated by gradient descent during both training and inference, compressing histories into weight space and retrieving contextual information for long-context conditioning. To scale training context length, the recipe combines sequence action forcing with truncated backpropagation through time. On challenging real-robot manipulation tasks, RoboTTT improves overall performance by 87% over the single-step context baseline and fully completes a five-minute, ten-stage assembly task, which no baseline ever does. RoboTTT trained with 8K-timestep context outperforms the same model pretrained with 1K timesteps by 62%, suggesting context length as a new scaling axis for robot foundation models. Videos are available at https://research.nvidia.com/labs/gear/robottt/', 'score': 12, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '2467f8d5782eab8a', 'authors': ['Yunfan Jiang', 'Yevgen Chebotar', 'Ruijie Zheng', 'Fengyuan Hu', 'Yunhao Ge', 'Jimmy Wu', 'Tianyuan Dai', 'Scott Reed', 'Li Fei-Fei', 'Yuke Zhu', 'Linxi "Jim" Fan'], 'affiliations': ['NVIDIA', 'Stanford University', 'The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2607.15275.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#optimization', '#long_context', '#inference', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Масштабирование контекста в робототехнических моделях через адаптивное обучение во время инференса', 'desc': 'Авторы представляют RoboTTT — метод для обучения робототехнических политик, которые могут работать с длинной историей наблюдений до 8000 временных шагов, что на три порядка больше, чем существующие подходы. Ключевая идея заключается в интеграции тренировки во время инференса в фундаментальные модели роботов, где быстрые веса обновляются градиентным спуском как на этапе обучения, так и во время работы. Это позволяет моделям учиться из одного видеопримера человека, адаптироваться в реальном времени и лучше справляться с многоэтапными задачами манипуляции. Результаты показывают улучшение производительности на 87% по сравнению с одношаговым контекстом и впервые демонстрируют устойчивый рост качества при увеличении длины контекста предобучения.'}, 'en': {'title': 'Unlocking Robot Potential with Extended Context', 'desc': 'The paper presents RoboTTT, a novel robot model that enhances visuomotor context to 8,000 timesteps, significantly surpassing existing models. This extended context allows robots to perform complex tasks such as one-shot imitation from human videos and adapt their policies in real-time. By integrating Test-Time Training into robot foundation models, RoboTTT effectively updates its parameters during both training and inference, improving performance on long-horizon tasks. The results show a remarkable 87% performance increase over traditional single-step models, highlighting the importance of context length in advancing robotic capabilities.'}, 'zh': {'title': '扩展上下文，提升机器人能力！', 'desc': '最近的机器人基础模型主要依赖于单步或短时间历史的视觉运动上下文。我们提出了测试时训练机器人策略（RoboTTT），它将视觉运动上下文扩展到8000个时间步，远超现有技术的三倍，同时不增加推理延迟。通过这种上下文长度，我们解锁了新的机器人能力，包括从人类视频演示中进行一次性模仿、实时策略改进、对扰动的鲁棒性以及在多阶段长时间任务中的更强表现。RoboTTT通过将测试时训练集成到机器人基础模型中，显著提高了在复杂真实机器人操作任务中的整体性能。'}}}, {'id': 'https://huggingface.co/papers/2607.15273', 'title': 'MeanFlowNFT: Bringing Forward-Process RL to Average-Velocity Generators', 'url': 'https://huggingface.co/papers/2607.15273', 'abstract': "Abstract  MeanFlow generators achieve fast few-step sampling by predicting average velocities over time intervals, making them attractive for efficient generation. Reinforcement learning (RL) has become a powerful way to align diffusion and flow models with human preferences and task-specific objectives. In particular, DiffusionNFT offers an efficient forward-process RL framework that does not require reverse-process trajectories or likelihood estimation. However, applying such RL methods to MeanFlow remains underexplored. DiffusionNFT optimizes instantaneous velocities, whereas MeanFlow samples with average velocities. To bridge this gap, we introduce MeanFlowNFT. Inspired by the MeanFlow identity, which bridges average and instantaneous velocities, we construct an induced instantaneous-velocity predictor. We apply the DiffusionNFT objective to this predictor, making reward optimization well-defined for MeanFlow. Sampling remains based on the average velocity, preserving MeanFlow's fast few-step generation. We further prove that MeanFlowNFT inherits DiffusionNFT's strict policy-improvement guarantee. Experiments on image and video generation show that MeanFlowNFT consistently improves baselines. Moreover, it outperforms prior state-of-the-art RL-tuned few-step generators on most metrics (6 of 8 on SD3.5-M), and can even surpass multi-step RL-tuned diffusion while using only a few sampling steps. For instance, on Wan 2.1, 4-step MeanFlowNFT reaches a VBench score of 84.33, surpassing 50-step LongCat-Video RL (82.57).", 'score': 9, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'fc68023a76c0c1c3', 'authors': ['Yushi Huang', 'Xiangxin Zhou', 'Jun Zhang', 'Liefeng Bo', 'Tianyu Pang'], 'affiliations': ['Tencent Hunyuan', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.15273.jpg', 'data': {'categories': ['#rlhf', '#diffusion', '#rl', '#multimodal', '#optimization', '#alignment', '#video'], 'emoji': '⚡', 'ru': {'title': 'Быстрая генерация через оптимизацию потоковых моделей с подкреплением', 'desc': 'Статья представляет MeanFlowNFT — метод обучения с подкреплением для быстрых генеративных моделей, которые основаны на предсказании средних скоростей в потоковых моделях. Авторы адаптировали эффективный RL-подход DiffusionNFT к MeanFlow генераторам, создав вспомогательный предиктор мгновенных скоростей, который позволяет применять reward optimization при сохранении быстрого few-step сэмплирования. Теоретически доказано, что предложенный метод наследует гарантию улучшения политики от исходного DiffusionNFT. Экспериментальные результаты на задачах генерации изображений и видео демонстрируют, что MeanFlowNFT значительно превосходит многошаговые модели, достигая высокого качества всего за несколько шагов сэмплирования.'}, 'en': {'title': 'Bridging Average and Instantaneous Velocities for Efficient Sampling', 'desc': 'This paper introduces MeanFlowNFT, a novel approach that combines MeanFlow generators with reinforcement learning (RL) to enhance the efficiency of few-step sampling in image and video generation. By leveraging the MeanFlow identity, the authors create an instantaneous-velocity predictor that aligns with the DiffusionNFT framework, allowing for effective reward optimization without the need for reverse-process trajectories. The proposed method maintains the fast sampling capabilities of MeanFlow while improving performance metrics compared to existing state-of-the-art RL-tuned generators. Experimental results demonstrate that MeanFlowNFT not only outperforms traditional methods but also achieves superior results with significantly fewer sampling steps.'}, 'zh': {'title': 'MeanFlowNFT：高效的少步生成新方法', 'desc': 'MeanFlow生成器通过预测时间间隔内的平均速度，实现快速的少步采样，因而在高效生成方面具有吸引力。强化学习（RL）已成为将扩散模型与人类偏好和特定任务目标对齐的强大方法。DiffusionNFT提供了一种高效的前向过程RL框架，无需反向过程轨迹或似然估计。我们提出的MeanFlowNFT通过构建瞬时速度预测器，结合DiffusionNFT的目标，优化MeanFlow的奖励，使得在保持快速少步生成的同时，提升了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2607.14749', 'title': 'WanSong v1.0 Technical Report', 'url': 'https://huggingface.co/papers/2607.14749', 'abstract': 'Abstract  Music generation foundation models have recently attracted significant industry attention. However, achieving efficient generation and high-fidelity long-form audio while supporting controllability remains challenging. To address these needs, we present WanSong, a simple yet powerful approach for long-form, commercial-grade song generation. Unlike autoregressive (AR) and cascaded multi-stage pipelines (\\eg, AR followed by diffusion), WanSong is a pure diffusion-based model that directly generates high-fidelity, multilingual songs up to 5 minutes and outputs dual stems (vocals and background music) in a single run. In addition, our diffusion framework enables faster inference through step-distillation, and offers an efficient pathway for fine-tuning and customization to support downstream editing tasks.', 'score': 8, 'issue_id': 2679, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'c979599c35ccc9d1', 'authors': ['Binghui Chen', 'Pandeng Li', 'Yu Liu', 'Jingren Zhou'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.14749.jpg', 'data': {'categories': [], 'emoji': '🎵', 'ru': {'title': 'Диффузия вместо авторегрессии: путь к быстрой генерации многоязычных песен', 'desc': 'WanSong — это диффузионная модель для генерации музыки, которая создает высококачественные песни длительностью до 5 минут с поддержкой нескольких языков. В отличие от традиционных автерегрессивных и каскадных подходов, модель использует чистую диффузионную архитектуру, генерирующую вокал и фоновую музыку одновременно. Система поддерживает ускоренный вывод благодаря методу дистилляции шагов и позволяет эффективно адаптировать модель для редактирования и кастомизации. Этот подход достигает баланса между качеством звука, скоростью генерации и контролируемостью, что важно для коммерческого применения.'}, 'en': {'title': 'WanSong: Revolutionizing Long-Form Music Generation with Diffusion', 'desc': 'This paper introduces WanSong, a novel music generation model that utilizes a diffusion-based approach to create high-quality, long-form songs. Unlike traditional methods that rely on autoregressive models or multi-stage processes, WanSong generates complete songs in one go, producing both vocals and background music simultaneously. The model is capable of creating multilingual songs lasting up to 5 minutes, making it versatile for various applications. Additionally, it incorporates step-distillation for faster inference and allows for easy fine-tuning, enhancing its usability for editing tasks.'}, 'zh': {'title': 'WanSong：高效生成高保真音乐的创新模型', 'desc': '本论文介绍了一种名为WanSong的音乐生成模型，专注于生成高保真、长达5分钟的多语言歌曲。与传统的自回归模型和多阶段生成流程不同，WanSong采用纯扩散模型，能够在一次运行中直接生成包含人声和背景音乐的双轨道音频。该模型通过步骤蒸馏技术实现了更快的推理速度，并为后续的编辑任务提供了高效的微调和定制路径。WanSong的设计旨在满足商业级歌曲生成的需求，同时保持可控性。'}}}, {'id': 'https://huggingface.co/papers/2607.14660', 'title': 'VIABench: A Comprehensive Video Benchmark Collected from Blind Individuals for Visual Impairment Assistance', 'url': 'https://huggingface.co/papers/2607.14660', 'abstract': "Abstract  Visually impaired individuals (VIIs) encounter significant daily challenges due to limited access to visual information. Although Multimodal Large Language Models (MLLMs) have achieved impressive results on general vision and language tasks, their practical utility in real-world blind assistance still remains largely underexplored. To fill this gap, we introduce VIABench, a comprehensive video benchmark specifically designed to evaluate MLLMs in Visually Impaired Assistance scenarios using first-person videos recorded or shared by VIIs themselves. VIABench defines three core tasks, each targeting a distinct requirement in visual assistance. Proactive Reminder: Assesses the model's ability to interpret ongoing video content while proactively anticipating and verbally describing upcoming navigation-critical events; Visual Question Answering (VQA): Evaluates the model's capacity to answer user-posed questions about the environment or objects within the video; Vision-Guided Interaction: Tests context-aware reasoning to accomplish intentional interactions between user and environment. To ensure a robust and fair evaluation, we propose a rigorous benchmarking pipeline that supports both online (real-time) and offline settings. Our experiments demonstrate that current MLLMs still struggle to deliver comprehensive support for VIIs, especially in the Proactive Reminder task, which demands accurate anticipation and real-time responsiveness. We hope VIABench will drive future research toward developing customized MLLMs for real-world assistance, ultimately improving navigation and interaction experiences for visually impaired individuals. Code and data will be released at https://github.com/MCG-NJU/VIABench.", 'score': 7, 'issue_id': 2681, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '9c671fc9c83d752c', 'authors': ['Yunfeng Liu', 'Yuandong Yang', 'Jiarui Han', 'Zhenpeng Huang', 'Yuqing Tang', 'Xiangyu Zeng', 'Gangshan Wu', 'Limin Wang'], 'affiliations': ['Nanjing University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2607.14660.jpg', 'data': {'categories': ['#video', '#healthcare', '#benchmark', '#dataset', '#multimodal'], 'emoji': '👁️', 'ru': {'title': 'Мультимодальные модели для реального ассистирования слабовидящим людям', 'desc': 'В работе представлен VIABench - комплексный видеобенчмарк для оценки мультимодальных больших языковых моделей (MLLM) в задачах ассистирования людям с нарушением зрения. Бенчмарк включает три основные задачи: проактивное предупреждение о навигационно-критических событиях, ответы на вопросы о видеоконтенте и контекстно-осознанное взаимодействие между пользователем и окружением. Авторы предлагают строгий конвейер оценки, поддерживающий как режим реального времени, так и офлайн-анализ перволичных видео, записанных самими людьми с нарушением зрения. Результаты показывают, что современные MLLM еще недостаточно эффективны для полноценной поддержки, особенно в задаче проактивного предупреждения, требующей точного предсказания и быстрого реагирования.'}, 'en': {'title': 'Enhancing Assistance for the Visually Impaired with VIABench', 'desc': 'This paper addresses the challenges faced by visually impaired individuals (VIIs) in accessing visual information. It introduces VIABench, a new benchmark designed to evaluate Multimodal Large Language Models (MLLMs) specifically for assisting VIIs using first-person video data. The benchmark includes three tasks: Proactive Reminder, Visual Question Answering (VQA), and Vision-Guided Interaction, each targeting different aspects of visual assistance. The findings reveal that current MLLMs struggle with these tasks, particularly in anticipating navigation-critical events, highlighting the need for further research to enhance MLLMs for real-world applications in aiding visually impaired users.'}, 'zh': {'title': '为视觉障碍者打造智能辅助工具', 'desc': '本论文针对视觉障碍者在日常生活中面临的挑战，提出了一个名为VIABench的综合视频基准，旨在评估多模态大型语言模型（MLLMs）在视觉辅助场景中的应用。VIABench定义了三个核心任务，包括主动提醒、视觉问答和视觉引导交互，分别测试模型在不同视觉辅助需求下的表现。实验结果表明，当前的MLLMs在主动提醒任务中表现不佳，难以提供全面的支持。我们希望VIABench能够推动未来研究，开发更适合现实世界的MLLMs，以改善视觉障碍者的导航和交互体验。'}}}, {'id': 'https://huggingface.co/papers/2607.13491', 'title': 'DeepLoop: Depth Scaling for Looped Transformers', 'url': 'https://huggingface.co/papers/2607.13491', 'abstract': 'Abstract  Looped Transformers scale sequential computation by applying a compact stack of physical blocks for multiple rounds, increasing unrolled depth without increasing stored parameters. This reuse changes the residual-scaling problem: in an untied Transformer, each residual branch receives and applies its own parameter update, whereas in a looped Transformer one shared update aggregates gradients from repeated visits and is read back by those same visits in the next linearized forward pass. We formalize this tied-depth effect through a first-order perturbation bound controlled by a visit-alignment coefficient κ_R. The bound recovers the DeepNorm exponent when visits decorrelate, but in the conservative aligned regime it requires the exponent to increase from 1/4 to 1/2 as loop count grows at fixed physical depth. The resulting method, DeepLoop, keeps the Post-LN DeepNorm
