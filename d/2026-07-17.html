architecture and sets α=(2N)^{1/2} and β=(8N)^{-1/2} for unrolled depth N. On GPT-style looped language models at GPT-2 small and GPT-2 medium scale, DeepLoop is neutral when no physical block is revisited and improves validation loss and downstream accuracy once recurrent depth is activated. These results show that stable recurrent depth requires residual scaling rules that account for parameter visits, not only nominal layer count.', 'score': 7, 'issue_id': 2679, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '87a8d3433bdaed78', 'authors': ['Shuzhen Li', 'Yifan Zhang', 'Jiacheng Guo', 'Quanquan Gu', 'Mengdi Wang'], 'affiliations': ['Princeton University', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2607.13491.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🔁', 'ru': {'title': 'Стабилизация циклических трансформеров через адаптивное масштабирование остаточных связей', 'desc': 'В работе предложен метод DeepLoop для стабилизации обучения циклических трансформеров, которые переиспользуют один блок параметров несколько раз для увеличения глубины сети. Авторы формализуют проблему масштабирования остаточных связей через коэффициент выравнивания посещений κ_R и выводят теоретическую границу ошибки первого порядка. Метод требует адаптации правил инициализации весов DeepNorm в зависимости от количества циклов, увеличивая показатель степени с 1/4 до 1/2 при росте циклической глубины. Экспериментальная валидация на GPT-2 подтверждает, что предложенная схема масштабирования улучшает стабильность обучения и качество моделей при использовании циклических слоёв.'}, 'en': {'title': 'DeepLoop: Enhancing Transformers with Recurrent Depth Efficiency', 'desc': 'The paper introduces Looped Transformers, which enhance the efficiency of sequential computations by using a compact stack of physical blocks that can be reused multiple times. This approach addresses the residual-scaling problem by allowing a shared parameter update across multiple visits, rather than separate updates for each residual branch. The authors formalize the impact of this method through a perturbation bound that adjusts based on the alignment of visits, leading to improved performance in deep learning models. The proposed method, DeepLoop, demonstrates better validation loss and accuracy in GPT-style language models when recurrent depth is utilized, highlighting the importance of scaling rules that consider parameter visits.'}, 'zh': {'title': 'DeepLoop：提升循环深度的残差缩放方法', 'desc': '这篇论文介绍了一种名为DeepLoop的模型，它通过循环变换器来提高序列计算的效率。DeepLoop使用共享的参数更新来解决残差缩放问题，从而在不增加存储参数的情况下增加展开深度。研究表明，当循环深度增加时，残差缩放规则需要考虑参数的访问次数，而不仅仅是层数。实验结果显示，DeepLoop在GPT风格的语言模型中能够改善验证损失和下游准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.14431', 'title': 'Smarter and Cheaper at Once: Byte-Exact KV-Cache Grafting Turns a Frozen Small Model into a Verified-Knowledge Flywheel', 'url': 'https://huggingface.co/papers/2607.14431', 'abstract': "Abstract  We report a way to make a frozen small language model both more capable and dramatically cheaper at once, without changing any weights. Verified knowledge is deposited once as a byte-exact key-value (KV) state artifact and later restored, by graft, into a fresh inference context. The restore is bit-exact: under a pinned deterministic configuration, the grafted logits are byte-for-byte identical to a fresh computation (SHA-256 equality), with zero KL divergence and 100% argmax agreement over fifty samples. We show that own-position graft is the unique numerically exact operating point on a model with floating-point rotary encoding, and we verify byte-exactness on two model scales (12B, 31B) and two GPU targets, one through a pre-registered replay. On AIME 2025, a frozen Gemma-4-12B moves from 80.0% to 93.3% once a verified solution library is grafted, above its own 77.5% and its 31B sibling's 89.2% published anchors. On the recurring case, eight problems the base model never solves within a 401,026-token budget are answered from cached verified solutions in 61 total decode tokens, a factor of 6,574 fewer tokens and about 8,700x less energy; the capability claim proper rests on held-out transfer (7 of 7 at 31B). The same byte-exact store widens usable context from 32,768 to 2,854,766 tokens at zero extra accelerator memory, and moves byte-identical between machines of the same architecture. We describe the system at the behavior level; the engine is proprietary, and every reported number is backed by committed input and output hashes so the scoring can be re-checked without it.", 'score': 5, 'issue_id': 2679, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '5a5c116838ac1b86', 'authors': ['Sietse Schelpe'], 'affiliations': ['Corbenic AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.14431.jpg', 'data': {'categories': ['#small_models', '#optimization', '#long_context', '#open_source', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Замороженная модель стала мощнее и дешевле через побайтовое кэширование знаний', 'desc': 'Исследование описывает метод повышения возможностей замороженной небольшой языковой модели путем внедрения проверенных знаний в виде точного побайтового кэша ключ-значение. Восстановленные логиты при графирование состояния точно совпадают с исходным вычислением на уровне битов, что обеспечивает нулевую дивергенцию Кульбака-Лейблера и 100% согласованность аргмаксов. Метод демонстрирует значительные улучшения на примере модели Gemma-4-12B на задачах AIME 2025, увеличивая точность с 80% до 93.3% благодаря встроенной библиотеке решений. Подход также расширяет контекстное окно модели более чем в 87 раз без дополнительных затрат памяти, одновременно снижая вычислительные требования на несколько порядков.'}, 'en': {'title': 'Boosting Language Models: Cost-Effective Capability Enhancement!', 'desc': "This paper presents a method to enhance the performance of a frozen small language model while significantly reducing costs, without altering its weights. The approach involves creating a byte-exact key-value (KV) state artifact that can be restored into a new inference context, ensuring that the output remains consistent and accurate. The authors demonstrate that this method allows for a substantial increase in the model's capability, achieving higher accuracy and efficiency in problem-solving. Additionally, the technique expands the model's usable context dramatically without requiring extra memory, making it a powerful tool for machine learning applications."}, 'zh': {'title': '提升小型语言模型的能力与成本效益', 'desc': '本文提出了一种方法，使得冻结的小型语言模型在不改变任何权重的情况下，既更强大又显著降低成本。通过将经过验证的知识以字节精确的键值状态存储，并在新的推理上下文中恢复，确保了恢复过程的精确性。实验表明，使用这种方法，模型的性能显著提升，同时在使用上下文的范围上也得到了扩展。该系统的行为层面进行了描述，所有报告的数据均可通过输入和输出哈希进行验证。'}}}, {'id': 'https://huggingface.co/papers/2607.15277', 'title': 'Partition, Prompt, Aggregate: Statistical Self-Consistency in Language Models', 'url': 'https://huggingface.co/papers/2607.15277', 'abstract': "Abstract  In-context learning is commonly interpreted as a form of conditional inference, in which the prompt specifies a context and the model's output is treated as an estimate of the corresponding conditional distribution. If this interpretation holds, then LLM estimates should satisfy basic probabilistic identities. In particular, the law of total probability asserts that prior-weighted conditional distributions aggregate into population-level marginals over any valid partition of the population. In this work, we investigate to what extent LLM estimates adhere to this self-consistency principle. We use binary trees as an evaluation scaffold to recursively partition a population into increasingly fine-grained subpopulations. We then prompt LLMs with verbalized subpopulation descriptions in context, aggregate the resulting estimates back into population-level estimates, and compare them across partitions of varying granularity. Applying this protocol across problem domains and state-of-the-art frontier models, we show widespread violations of basic consistency properties. An in-depth study of persona prompting reveals a pattern we call the macro fallacy: estimates reconstructed from more fine-grained subpopulation responses are often better aligned with human reference data than direct population-level estimates. This effect persists across variations in tree structure and estimation task, and can be partially recovered through implicit prompting. Together, these findings suggest that models possess relevant subpopulation knowledge but do not reliably propagate it into aggregate estimates. This gap establishes statistical self-consistency as an unsaturated, reference-free criterion for evaluating LLMs.", 'score': 4, 'issue_id': 2680, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '3f83327f3608f430', 'authors': ['Patrik Wolf', 'Thomas Kleine Buening', 'Andreas Krause', 'Celestine Mendler-Dünner'], 'affiliations': ['ELLIS Institute, Tübingen', 'ETH Zürich', 'Max Planck Institute for Intelligent Systems, Tübingen, Germany', 'Tübingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2607.15277.jpg', 'data': {'categories': ['#benchmark'], 'emoji': '🌳', 'ru': {'title': 'Парадокс согласованности: модели знают части, но не целое', 'desc': 'Исследование показывает, что большие языковые модели нарушают базовые вероятностные принципы при выполнении задач условного вывода. Авторы используют бинарные деревья для рекурсивного разбиения популяции и проверяют, согласуются ли оценки модели с законом полной вероятности. Обнаружен эффект «макро-парадокса»: модели дают более точные оценки при агрегировании предсказаний для подгрупп, чем при прямом предсказании на уровне всей популяции. Результаты свидетельствуют о том, что модели обладают знаниями о подпопуляциях, но не могут надёжно их согласовывать в единую оценку, что предлагается использовать как критерий оценки качества LLM.'}, 'en': {'title': 'Unveiling the Macro Fallacy in LLM Estimates', 'desc': "This paper explores how large language models (LLMs) perform in-context learning, particularly focusing on their ability to provide consistent estimates across different population partitions. The authors investigate whether LLM outputs align with the law of total probability, which states that conditional distributions should aggregate into overall population estimates. Using binary trees to create subpopulations, they find that LLMs often violate basic consistency principles, leading to discrepancies in estimates. The study introduces the 'macro fallacy,' where more detailed subpopulation responses yield better alignment with human data than direct population-level estimates, indicating a gap in how models utilize their subpopulation knowledge."}, 'zh': {'title': '统计自一致性：评估大型语言模型的新标准', 'desc': '本文探讨了上下文学习在条件推理中的应用，特别是大型语言模型（LLM）如何根据提示生成输出。研究发现，LLM的估计值并不总是符合基本的概率一致性原则，尤其是在不同的子群体描述下。通过使用二叉树结构进行评估，研究显示更细粒度的子群体响应往往比直接的人口级别估计更接近人类参考数据。最终，研究表明模型虽然具备子群体知识，但在聚合估计时未能可靠地传播这些知识。'}}}, {'id': 'https://huggingface.co/papers/2607.10995', 'title': 'AsySplat: Efficient Asymmetric 3D Gaussian Splatting for Long-Sequence Scene Modeling', 'url': 'https://huggingface.co/papers/2607.10995', 'abstract': 'Abstract  Recent generalizable 3D Gaussian Splatting models have advanced long-sequence novel view synthesis (NVS), but at the cost of substantial redundant computation. We identify that the redundancy can be mitigated based on two observations: (i) high-precision geometry is not strictly required for high-quality NVS; (ii) appearance learning is generally easier than geometry recovery. Motivated by these insights, we propose an asymmetric architecture that decouples geometry and appearance modeling. The geometry branch processes coarse-grained tokens with most of the parameters for multi-view reconstruction, while the appearance branch operates on fine-grained tokens to capture details using significantly fewer parameters. The two branches interact through bilateral connections, enabling mutual guidance for their respective tasks. This task-aware asymmetry reduces the computational redundancy and allocates the computation more judiciously, thereby increasing parameter efficiency and enabling smaller models to achieve strong performance. On 32-view 960P inputs, our model matches optimization-based methods while delivering nearly 800x speedup, and surpasses the zero-shot performance of state-of-the-art generalizable models with markedly fewer parameters and reduced training/inference overhead, achieving an overall efficiency improvement.', 'score': 4, 'issue_id': 2682, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '59bf2e5fceb8c056', 'authors': ['Yingji Zhong', 'Dave Zhenyu Chen', 'Fuzhao Ou', 'Youyu Chen', 'Zhihao Li', 'Lanqing Hong', 'Dan Xu'], 'affiliations': ['CityU', 'HKUST', 'Huawei Noahs Ark Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.10995.jpg', 'data': {'categories': ['#3d', '#architecture', '#training', '#inference'], 'emoji': '⚙️', 'ru': {'title': 'Асимметричная архитектура для эффективного синтеза новых видов сцен', 'desc': 'В статье предложена асимметричная архитектура для обобщаемого синтеза новых видов (NVS) на основе 3D Gaussian Splatting, которая снижает вычислительную избыточность путём разделения моделирования геометрии и внешнего вида. Ветвь геометрии обрабатывает грубозернистые токены с большинством параметров для многовидовой реконструкции, а ветвь внешнего вида работает с мелкозернистыми токенами, используя значительно меньше параметров. Двусторонние связи между ветвями обеспечивают взаимное руководство для улучшения качества обеих задач. Такой подход достигает повышения эффективности параметров и позволяет меньшим моделям получать сильные результаты с существенным ускорением вычислений.'}, 'en': {'title': 'Efficient 3D View Synthesis through Asymmetric Modeling', 'desc': 'This paper presents a new approach to 3D Gaussian Splatting for novel view synthesis (NVS) that reduces redundant computations. The authors propose an asymmetric architecture that separates geometry and appearance modeling, allowing for more efficient processing. The geometry branch focuses on coarse tokens for multi-view reconstruction, while the appearance branch captures fine details with fewer parameters. This design leads to significant speed improvements and better performance with less computational overhead compared to existing methods.'}, 'zh': {'title': '高效的新视角合成模型', 'desc': '最近的可泛化3D高斯点云模型在长序列新视角合成（NVS）方面取得了进展，但代价是计算冗余较大。我们发现可以通过两个观察来减少冗余：高精度几何形状并不是高质量NVS的严格要求；外观学习通常比几何恢复更容易。基于这些见解，我们提出了一种不对称架构，将几何和外观建模解耦。该架构通过双向连接使两个分支相互指导，从而减少计算冗余，提高参数效率，使得更小的模型也能实现强大的性能。'}}}, {'id': 'https://huggingface.co/papers/2607.10463', 'title': 'GRASP: GRanularity-Aware Search Policy for Agentic RAG', 'url': 'https://huggingface.co/papers/2607.10463', 'abstract': "Abstract  Agentic retrieval-augmented generation (RAG) extends static RAG by allowing language models to iteratively reason, generate search queries, retrieve evidence, and predict answers. However, it remains challenging for models to decide when to retrieve, whether to use lexical matching or semantic similarity, and how to control context granularity to prevent irrelevant tokens from interfering with agent reasoning. In this paper, we introduce GRASP, a reinforcement learning (RL) framework for training agents to adaptively coordinate complementary retrieval tools during multi-step reasoning. GRASP provides the agent with semantic search, keyword search, and paragraph-reading actions, enabling it to retrieve sentence-level evidence and expand further context only when needed. We train the policy with a reward that jointly accounts for answer accuracy, grounded reading, complementary search, and turn efficiency. Experiments on multi-hop reasoning benchmarks show that GRASP improves both retrieval recall and downstream question answering performance compared with single-step retrieval, prompting-based agentic RAG, and RL-based retrieval baselines. Qualitative and ablation analyses show that the learned policy develops interpretable skimming and scanning behavior: it uses semantic search for broad exploration, paragraph reading for local verification, and keyword search for entity-specific evidence. These results suggest that learning to coordinate retrieval signals and context granularity is critical for agent's correct reasoning.", 'score': 4, 'issue_id': 2680, 'pub_date': '2026-07-11', 'pub_date_card': {'ru': '11 июля', 'en': 'July 11', 'zh': '7月11日'}, 'hash': '181cc012cafef6c6', 'authors': ['Varun Gandhi', 'Jaewook Lee', 'Shantanu Todmal', 'Franck Dernoncourt', 'Ryan Rossi', 'Zichao Wang', 'Andrew Lan'], 'affiliations': ['Adobe Research', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2607.10463.jpg', 'data': {'categories': ['#agents', '#rl', '#benchmark', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Обучение интеллектуальному управлению инструментами поиска для рассуждающего RAG', 'desc': 'В работе предлагается GRASP — фреймворк на основе обучения с подкреплением для обучения агентов адаптивной координации инструментов поиска во время многошагового рассуждения. Модель получает доступ к семантическому поиску, поиску по ключевым словам и действиям чтения абзацев, позволяя извлекать доказательства на уровне предложений и расширять контекст только при необходимости. Политика обучается с использованием награды, которая учитывает точность ответов, обоснованное чтение, дополнительный поиск и эффективность. Экспериментальные результаты на бенчмарках многошагового рассуждения показывают улучшение как полноты поиска, так и качества ответов на вопросы по сравнению с базовыми методами.'}, 'en': {'title': 'Enhancing Reasoning with Adaptive Retrieval in Language Models', 'desc': 'This paper presents GRASP, a reinforcement learning framework designed to enhance retrieval-augmented generation (RAG) in language models. GRASP enables models to effectively decide when to retrieve information and which retrieval method to use, improving the reasoning process during multi-step tasks. By training the model to balance different retrieval actions—semantic search, keyword search, and paragraph reading—GRASP optimizes the retrieval of relevant evidence while minimizing irrelevant information. The results demonstrate that GRASP significantly boosts retrieval accuracy and question answering performance, highlighting the importance of adaptive retrieval strategies in agentic reasoning.'}, 'zh': {'title': '智能体推理的新突破：GRASP框架', 'desc': '本文介绍了一种名为GRASP的强化学习框架，旨在提高智能体在多步推理中的检索能力。GRASP允许智能体根据需要选择语义搜索、关键词搜索和段落阅读等检索工具，以便在推理过程中获取相关证据。通过训练策略，GRASP能够在回答准确性、基础阅读、互补搜索和效率之间进行平衡，从而提升检索召回率和问答性能。实验结果表明，GRASP在多跳推理基准测试中表现优于传统的单步检索和基于提示的智能体RAG。'}}}, {'id': 'https://huggingface.co/papers/2607.15058', 'title': 'SUFLECA: Scaling Up Feature Learning for CAD-to-image Alignment', 'url': 'https://huggingface.co/papers/2607.15058', 'abstract': "Abstract  CAD-to-image alignment aims to estimate an object's 9D pose (rotation, translation, and anisotropic scale) from a single RGB image, enabling applications in robotics and augmented reality. Recent zero-shot methods use visual foundation models to match image regions to CAD models, yet typically their correspondences are appearance-driven and degrade under occlusion or sim-to-real domain shift. To address these limitations, we introduce SUFLECA (Scaling Up Feature LEarning for CAD Alignment), a weakly-supervised framework for zero-shot CAD alignment with two key contributions. First, SUFLECA scales up geometry-grounded feature learning from pretrained visual representations through Normalized Object Coordinates (NOCs) supervision on 674K images spanning 12 real and synthetic datasets, learning compact geometry-aware features that generalize across domains. Second, we propose a geometrically consistent matching algorithm that establishes reliable one-to-one CAD-to-image correspondences. Together, these contributions enable accurate, sub-second alignment per object instance without iterative pose refinement. On ScanNet25k, SUFLECA achieves 33.4%/42.3% category/instance accuracy, outperforming, with a smaller computational footprint, the strongest zero-shot baseline by 10.3/12.2 percentage points and, for the first time on this benchmark, even surpassing fully supervised methods. Code is available at: https://github.com/snt-arg/SUFLECA", 'score': 3, 'issue_id': 2683, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'f74cc008101e51db', 'authors': ['Saad Ejaz', 'Miguel Fernandez-Cortizas', 'Javier Civera', 'Holger Voos', 'Jose Luis Sanchez-Lopez'], 'affiliations': ['University of Luxembourg', 'University of Zaragoza'], 'pdf_title_img': 'assets/pdf/title_img/2607.15058.jpg', 'data': {'categories': ['#3d', '#cv', '#dataset', '#robotics'], 'emoji': '🎯', 'ru': {'title': 'Геометрически осведомленное выравнивание CAD-моделей без аннотаций через масштабируемое обучение признаков', 'desc': 'Статья посвящена задаче выравнивания CAD-моделей с изображениями для оценки 9D позы объектов (поворот, смещение и анизотропное масштабирование) из одного RGB-изображения. Авторы предлагают SUFLECA — слабо-контролируемый фреймворк на основе визуальных фундаментальных моделей, который преодолевает проблемы окклюзии и переноса между синтетическими и реальными доменами. Ключевым компонентом является масштабируемое обучение геометрически информированных признаков с использованием нормализованных координат объектов на 674K изображений из 12 датасетов. Метод достигает высокой точности выравнивания за доли секунды без итеративной оптимизации позы и превосходит как zero-shot, так и полностью контролируемые базовые методы на бенчмарке ScanNet25k.'}, 'en': {'title': 'Revolutionizing CAD-to-Image Alignment with SUFLECA', 'desc': "This paper presents SUFLECA, a weakly-supervised framework designed for CAD-to-image alignment, which estimates an object's 9D pose from a single RGB image. It addresses the limitations of existing zero-shot methods that rely heavily on appearance, which can fail under occlusion or when transferring from simulation to real-world scenarios. SUFLECA enhances feature learning by utilizing Normalized Object Coordinates (NOCs) on a large dataset, allowing it to learn geometry-aware features that are effective across different domains. Additionally, it introduces a geometrically consistent matching algorithm that ensures reliable correspondences between CAD models and images, achieving high accuracy without the need for iterative refinement."}, 'zh': {'title': '精准CAD对齐，超越传统方法！', 'desc': 'CAD到图像对齐的目标是从单个RGB图像中估计物体的9D姿态，包括旋转、平移和各向异性缩放。这项研究提出了SUFLECA，一个弱监督的零-shot CAD对齐框架，解决了现有方法在遮挡或领域转移下的局限性。SUFLECA通过对674K图像进行归一化物体坐标（NOCs）监督，学习几何感知特征，并提出了一种几何一致的匹配算法，确保CAD与图像之间的可靠对应关系。该方法在ScanNet25k数据集上实现了显著的准确率提升，超越了最强的零-shot基线和完全监督的方法。'}}}, {'id': 'https://huggingface.co/papers/2607.14187', 'title': 'RxBrain: Embodied Cognition Foundation Model with Joint Language-Visual Reasoning and Imagination', 'url': 'https://huggingface.co/papers/2607.14187', 'abstract': 'Abstract  Embodied cognition requires agents to connect high-level task reasoning with the physical states to be achieved. We introduce Hy-Embodied-RxBrain, an embodied cognition foundation model with joint language-visual reasoning and imagination. Unlike vision-language models that emphasize scene understanding and textual decision making, or generative world models that mainly predict future visual states, RxBrain represents embodied plans in a single planning sequence where language and visual imagination play complementary roles. Language provides the abstract structure of a plan, including task decomposition, planning primitives, constraints, temporal order, and decision logic, while visual imagination grounds this structure through world state prediction and joint subgoal planning, associating each planning step with intermediate and final physical states. RxBrain adopts a unified multimodal Mixture-of-Transformers architecture that supports language, image, and video understanding and generation within one model. To train this capability, we build an automatic pipeline that converts embodied videos into joint text-visual planning supervision by decomposing videos into planning steps and aligning them with visual state transitions. We further introduce RxBrain-Bench to evaluate whether models can represent embodied plans through joint textual and visual components rather than separate understanding or generation. Experiments show that RxBrain maintains embodied understanding and generation abilities, and produces plans with coupled textual reasoning, world state prediction, and joint subgoal planning. We also extend RxBrain to continuous robot action generation, where it shows promising real-robot performance without large-scale action-data pretraining. These results provide an initial step toward foundation models for embodied cognition.', 'score': 3, 'issue_id': 2685, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'a147a80618797c53', 'authors': ['Haotian Liang', 'Mingkang Chen', 'Yufei Huang', 'Yuchun Guo', 'Xiaomeng Zhu', 'Xiangli Shi', 'Kaixuan Wang', 'Yunxuan Mao', 'Weijie Zhou', 'Ling Chen', 'Shirong Zeng', 'Yueyu Long', 'Yuchen Si', 'Yajuan Zhu', 'Xingyu Zhou', 'Minghui Wang', 'Wanjia He', 'Xin Yang', 'Lingzhu Xiang', 'Zhiqing Liu', 'Bohan Ma', 'Xiran Huang', 'Tianshuo Yang', 'Zhiheng Liu', 'Xuantang Xiong', 'Zisheng Lu', 'Ping Luo', 'Yao Mu', 'Han Hu', 'Zhengyou Zhang'], 'affiliations': ['Futian Laboratory', 'Tencent Hy Team', 'Tencent Robotics Team'], 'pdf_title_img': 'assets/pdf/title_img/2607.14187.jpg', 'data': {'categories': ['#reasoning', '#video', '#robotics', '#benchmark', '#open_source', '#agents', '#architecture', '#training', '#multimodal', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Единое воплощённое познание через совместное языковое и визуальное планирование', 'desc': 'Авторы представляют Hy-Embodied-RxBrain — фундаментальную модель воплощённого познания, которая объединяет языковое и визуальное рассуждение для планирования физических действий агента. В отличие от моделей зрения-языка, сосредоточенных на понимании сцены, или генеративных моделей мира, предсказывающих будущие визуальные состояния, RxBrain представляет планы как единую последовательность, где язык задаёт абстрактную структуру (декомпозицию задач, временной порядок), а визуальная генерация привязывает её к предсказаниям состояний мира. Модель использует архитектуру Mixture-of-Transformers, обрабатывающую язык, изображения и видео в едином пространстве, и обучается на автоматически созданных парах текстовых и визуальных планов из видеоданных. Экспериментальные результаты показывают, что RxBrain успешно генерирует роботические действия в реальности без предварительного обучения на больших наборах данных действий.'}, 'en': {'title': 'Integrating Language and Vision for Smarter Planning in Robots', 'desc': 'The paper presents Hy-Embodied-RxBrain, a foundation model designed for embodied cognition that integrates language and visual reasoning. Unlike traditional models that focus separately on understanding scenes or generating future states, RxBrain combines these elements into a cohesive planning sequence. It uses language to outline the structure of tasks and visual imagination to predict world states and plan subgoals. The model is trained using a novel pipeline that aligns video data with planning steps, demonstrating effective embodied understanding and action generation in robotic applications.'}, 'zh': {'title': '具身认知的基础模型：Hy-Embodied-RxBrain', 'desc': '本论文介绍了一种名为Hy-Embodied-RxBrain的模型，旨在将高层次任务推理与物理状态相结合，以实现具身认知。与传统的视觉-语言模型不同，RxBrain通过语言和视觉想象的互补作用，在单一的规划序列中表示具身计划。该模型采用统一的多模态Mixture-of-Transformers架构，支持语言、图像和视频的理解与生成。实验结果表明，RxBrain能够有效地生成具身计划，并在连续机器人动作生成中表现出良好的性能。'}}}, {'id': 'https://huggingface.co/papers/2607.15278', 'title': 'Hierarchical Denoising For Multi-Step Visual Reasoning', 'url': 'https://huggingface.co/papers/2607.15278', 'abstract': "Abstract  Video models are evolving into vision foundation models, yet they still lack human-like multi-step reasoning. Streaming autoregressive diffusion models are efficient but limited in reasoning, while bidirectional diffusion enables global revision with high inference costs due to dense frame-level denoising. Both paradigms struggle to achieve logical consistency and low-latency streaming for complex reasoning tasks. We propose HDR (Hierarchical Denoising for Visual Reasoning), a unified framework that integrates hierarchical latents into causal video generation for multi-step reasoning. HDR organizes video latents into a tree-structured hierarchy, enabling coarse-to-fine reasoning before streaming output. Coarse denoising layers preserve uncertain hypotheses for global planning, while finer layers progressively refine them into concrete visual states. A sparse hierarchical attention pattern (SHAP) further reduces temporal attention costs. We introduce a level-stratified multi-step video reasoning benchmark with out-of-distribution cases, covering six tasks: maze navigation, Tower of Hanoi, one-line drawing, sliding puzzle, Sokoban, and water pouring. Compared with streaming autoregressive diffusion baselines, HDR improves success from 34.22 to 60.29 (76.2% relative gain) and increases average progress from 76.00 to 89.56, demonstrating more consistent reasoning trajectories. HDR maintains low-latency streaming at 0.70 seconds per latent, achieving 54.2 times faster inference than bidirectional diffusion. It also retains 82.9% of full-data performance with only 2% training data, compared with 52.0% for bidirectional diffusion. Real-world robot experiments further demonstrate HDR's potential for physical interaction and world modeling. Project demo: https://hierarchical-diffusion-reasoning.github.io/.", 'score': 1, 'issue_id': 2685, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '47d660f0506ae450', 'authors': ['Zezhong Qian', 'Xiaowei Chi', 'Chak-Wing Mak', 'Tianze Zhou', 'Ruibin Yuan', 'Yuhan Rui', 'Hengzhe Sun', 'Zhuoqun Wu', 'Yuming Li', 'Siyuan Qian', 'Sirui Han', 'Shanghang Zhang'], 'affiliations': ['Beihang University', 'Fuzhou University', 'Muka Robotics', 'Multimodal Art Projection', 'State Key Laboratory of Multimedia Information Processing, School of Computer Science, Peking University', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.15278.jpg', 'data': {'categories': ['#inference', '#reasoning', '#diffusion', '#video', '#benchmark', '#robotics', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Иерархическая диффузия для логического рассуждения в видео', 'desc': 'В работе предлагается HDR — новый фреймворк для видео моделей, который объединяет иерархические скрытые представления с причинной генерацией видео для многошагового рассуждения. Модель организует видео-латенты в древовидную иерархию, позволяя выполнять рассуждения от грубого к точному перед потоковым выводом. Разреженный паттерн иерархического внимания (SHAP) значительно снижает вычислительные затраты на внимание между кадрами. В статье представлен новый бенчмарк с задачами многошагового рассуждения и результаты показывают, что HDR достигает 76% относительного улучшения по сравнению с autoregressive моделями, сохраняя низкую задержку потокового вывода и эффективность при малом объёме данных.'}, 'en': {'title': 'Enhancing Video Reasoning with Hierarchical Denoising', 'desc': 'The paper introduces HDR (Hierarchical Denoising for Visual Reasoning), a new framework designed to enhance multi-step reasoning in video models. It organizes video data into a tree-structured hierarchy, allowing for a more efficient coarse-to-fine reasoning process. HDR improves logical consistency and reduces latency in streaming video generation, achieving significant performance gains over existing models. The framework is validated through a new benchmark and real-world robot experiments, showcasing its effectiveness in complex reasoning tasks.'}, 'zh': {'title': '层次去噪，提升视频推理能力', 'desc': '本论文提出了一种名为HDR（层次去噪视觉推理）的统一框架，旨在提升视频模型的多步推理能力。HDR通过将视频潜变量组织成树状层次结构，实现了从粗到细的推理过程，并在流式输出之前进行全局规划。该方法在保持低延迟的同时，显著提高了推理的一致性和效率，成功率从34.22%提升至60.29%。此外，HDR在仅使用2%的训练数据的情况下，仍能保持82.9%的全数据性能，展示了其在实际机器人交互和世界建模中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.14106', 'title': 'Token Time Continuous Diffusion for Language Modeling', 'url': 'https://huggingface.co/papers/2607.14106', 'abstract': 'Abstract  In this paper we introduce token time continuous diffusion (TTCD), a new diffusion language model which (a) operates in continuous space, deterministically mapping Gaussian noise to a final token canvas with no further sampling, and crucially (b) incorporates a new notion of per-token times, with some tokens proceeding from noise to token at a faster rate than others. Continuous space modeling helps TTCD avoid the parallel sampling of multiple tokens, which is a key source of inaccuracy at high speedups for models that iterate purely in discrete space. The notion of per-token times helps TTCD to better model conditional generation, allows for more sure tokens to proceed at a faster rate, and allows for differentiated inter-token influences during refinement. TTCD outperforms discrete models at high speedups. We train a 160M parameter TTCD model on OpenWebText, and then self-distill it; we find that at high speedups we are comparable in unconditional generation quality, and outperform in conditional generation, several existing models of similar size trained, on the same data, and self-distilled. We achieve similar gains in Sudoku solving as well.', 'score': 1, 'issue_id': 2685, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '90df1c737139b742', 'authors': ['Parikshit Bansal', 'Sujay Sanghavi'], 'affiliations': ['UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2607.14106.jpg', 'data': {'categories': ['#small_models', '#diffusion', '#optimization', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Диффузия с индивидуальными временами токенов для ускоренной генерации текста', 'desc': 'В статье представлена новая модель диффузии для языков (TTCD), которая работает в непрерывном пространстве и детерминированно преобразует гауссовский шум в последовательность токенов без дополнительной выборки. Ключевой особенностью является введение индивидуальных времён для каждого токена, что позволяет некоторым токенам быстрее переходить из шума в финальное представление. Непрерывное моделирование пространства решает проблему параллельной выборки нескольких токенов, которая является основным источником неточности при высоких скоростях генерации. Модель показывает лучшие результаты в условной генерации и решении задач, таких как судоку, по сравнению с дискретными моделями аналогичного размера.'}, 'en': {'title': 'Revolutionizing Token Generation with Continuous Diffusion', 'desc': "This paper presents a novel diffusion language model called Token Time Continuous Diffusion (TTCD). TTCD operates in a continuous space, allowing it to deterministically convert Gaussian noise into tokens without the need for sampling, which enhances efficiency. A key feature of TTCD is its introduction of per-token times, enabling some tokens to transition from noise to final output more quickly than others, improving the model's ability to generate conditional outputs. The results show that TTCD outperforms traditional discrete models, especially at high speedups, in both language generation and tasks like Sudoku solving."}, 'zh': {'title': '时间连续扩散：提升生成效率的新模型', 'desc': '本文介绍了一种新的扩散语言模型，称为时间连续扩散（TTCD）。TTCD在连续空间中操作，能够将高斯噪声确定性地映射到最终的标记画布上，而无需进一步采样。它引入了每个标记的时间概念，使得某些标记能够比其他标记更快地从噪声转变为标记，从而提高了条件生成的建模能力。TTCD在高加速下的表现优于离散模型，尤其在无条件生成和条件生成任务中取得了显著的效果。'}}}, {'id': 'https://huggingface.co/papers/2607.14387', 'title': 'Chat2Scenic: An Iterative RAG-Based Framework for Scenario Generation in Autonomous Driving', 'url': 'https://huggingface.co/papers/2607.14387', 'abstract': 'Abstract  Validating autonomous driving systems requires diverse, regulation-compliant test scenarios. In simulation-based testing, scenarios are defined as executable scripts. Yet automatically generating such scripts from regulatory descriptions remains an open challenge, and existing approaches face fundamental trade-offs. Retrieval-assemble methods achieve reasonable compilation rates but lack scalability, whereas retrieval-based full-script generation suffers from low compilation success rates. We present Chat2Scenic, the first iterative retrieval-augmented framework to generate scenario scripts in Domain Specific Language (DSL). Specifically, Chat2Scenic provides a chatbot interface that supports interactive scenario refinement and integrates Retrieval-augmented Generation (RAG) to ground scenario generation in regulatory knowledge and DSL syntax. Furthermore, we propose an open benchmark for scenario generation comprising 123 scenarios from various regulations, including NHTSA and United Nations Vehicle Regulations, as well as other sources. Extensive evaluation with State-of-the-Art (SOTA) Large Language Models (LLMs) demonstrates that Chat2Scenic achieves 76.42% Compilation Success Rate (CSR) and 58.17% Framework Accuracy (FA), outperforming existing methods (Retrieval Assemble with 30.08% CSR, 11.03% FA and Retrieval full script generation with 16.26% CSR, 10.86% FA). To facilitate future research, we release our code as open source at https://github.com/TUM-AVS/chat2scenic.', 'score': 0, 'issue_id': 2686, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'd04051ceef91c6b6', 'authors': ['Yuan Gao', 'Wenting Miao', 'Mattia Piccinini', 'Haoyu Wang', 'Qunying Song', 'Johannes Betz'], 'affiliations': ['Munich Institute of Robotics and Machine Intelligence (MIRMI)', 'Professorship of Autonomous Vehicle Systems, TUM School of Engineering and Design, Technical University of Munich', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2607.14387.jpg', 'data': {'categories': ['#dataset', '#open_source', '#rag', '#benchmark'], 'emoji': '🚗', 'ru': {'title': 'Умный чат для генерации безопасных сценариев тестирования беспилотников', 'desc': 'В статье представлена Chat2Scenic — фреймворк на основе retrieval-augmented generation для автоматического создания сценариев тестирования автономных транспортных средств на специализированном языке DSL. Система использует интерактивный чат-интерфейс и интеграцию с RAG для генерации сценариев, основанных на нормативных требованиях и синтаксисе DSL, что позволяет избежать проблем масштабируемости и низкой успешности компиляции предыдущих подходов. Авторы создали открытый бенчмарк из 123 сценариев на основе различных нормативов, включая стандарты NHTSA и ООН, и продемонстрировали превосходство Chat2Scenic с результатом 76.42% успешной компиляции и 58.17% точности по сравнению с существующими методами. Фреймворк выпущен в открытом доступе, что способствует развитию исследований в области автоматизированной валидации систем автономного вождения.'}, 'en': {'title': 'Chat2Scenic: Revolutionizing Scenario Generation for Autonomous Driving Testing', 'desc': 'This paper introduces Chat2Scenic, a novel framework designed to automatically generate test scenario scripts for autonomous driving systems using a Domain Specific Language (DSL). It combines a chatbot interface for interactive refinement with Retrieval-augmented Generation (RAG) to ensure that the generated scenarios comply with regulatory standards. The framework significantly improves the Compilation Success Rate (CSR) and Framework Accuracy (FA) compared to existing methods, demonstrating its effectiveness in generating diverse and compliant test scenarios. Additionally, the authors provide an open benchmark of 123 scenarios from various regulations to support further research in this area.'}, 'zh': {'title': '自动驾驶场景生成的新突破', 'desc': '本论文提出了一种名为Chat2Scenic的框架，用于自动生成符合监管要求的自动驾驶场景脚本。该框架结合了检索增强生成（RAG）技术，能够在特定领域语言（DSL）中生成可执行的测试脚本。通过与聊天机器人接口的互动，用户可以对场景进行细化，从而提高生成的准确性。实验结果表明，Chat2Scenic在编译成功率和框架准确性方面均优于现有方法，展示了其在自动驾驶系统验证中的潜力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (6)', '#agi', '#alignment (2)', '#architecture (10)', '#audio (2)', '#benchmark (11)', '#cv (2)', '#data', '#dataset (9)', '#diffusion (3)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (6)', '#interpretability', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (10)', '#open_source (5)', '#optimization (8)', '#plp (1)', '#rag (2)', '#reasoning (6)', '#rl (6)', '#rlhf (2)', '#robotics (4)', '#science', '#security', '#small_models (2)', '#story_generation', '#survey (2)', '#synthetic', '#training (10)', '#transfer_learning', '#video (9)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-17 20:01',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-17 20:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-17 20:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
