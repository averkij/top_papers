    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.19338', 'title': 'Beyond the Current Observation: Evaluating Multimodal Large Language Models in Controllable Non-Markov Games', 'url': 'https://huggingface.co/papers/2606.19338', 'abstract': "Abstract A new benchmark suite called RNG-Bench is introduced to evaluate multimodal foundation models' ability to reconstruct past observations and use them for decision-making in multi-step interactions, featuring two games with controlled difficulty parameters and a memory gap metric to distinguish forgetting from poor decision-making.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deploying multimodal foundation models as closed-loop policies increasingly requires conditioning actions on observations that are no longer visible. However, existing benchmarks either expose the full state, conflate hidden-state reconstruction with other agent skills, or test recall only after an episode has ended. We introduce RNG-Bench (Reconstructive Non-Markov Games), a benchmark suite designed to isolate a base model's ability to reconstruct past observations and act on them during multi-step interaction. RNG-Bench includes two complementary games: Matching Pairs, where card identities briefly revealed at specific locations must later be recalled, and 3D Maze, where egocentric views must be integrated into a spatial map. Both games are evaluated under a unified harness with three controlled difficulty axes: grid size, visual pattern, and observation modality. The benchmark further introduces a head-to-head duel protocol to control for instance-level variance and a Memory Gap metric that disentangles forgetting from poor action selection. The hardest configurations require contexts of roughly 128K tokens and 350 image inputs per episode, and remain far from saturated by frontier MLLMs. Memory Gap analysis shows that most residual errors stem from forgetting earlier observations rather than from suboptimal decision making. Finally, fine-tuning Qwen3.5-9B on optimal-policy rollouts and filtered model demonstrations improves performance on RNG-Bench and transfers to existing benchmarks without degrading general multimodal capability.", 'score': 34, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '186c06b766ad8f67', 'authors': ['Shengyuan Ding', 'Xilin Wei', 'Xinyu Fang', 'Haodong Duan', 'Dahua Lin', 'Jiaqi Wang', 'Yuhang Zang'], 'affiliations': ['Fudan University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19338.jpg', 'data': {'categories': ['#open_source', '#games', '#agents', '#long_context', '#multimodal', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Память и восстановление: тестирование способности моделей помнить прошлые наблюдения', 'desc': 'В работе представлен RNG-Bench — набор тестов для оценки способности мультимодальных foundation models восстанавливать прошлые наблюдения и использовать их при принятии решений в многошаговых взаимодействиях. Бенчмарк включает две игры (Matching Pairs и 3D Maze) с контролируемыми параметрами сложности и метрикой Memory Gap, которая разделяет ошибки забывания от ошибок выбора действия. Исследование показывает, что фронтальные MLLM недостаточно хорошо справляются с самыми сложными конфигурациями, требующими контекста из 128K токенов и 350 изображений за эпизод. Fine-tuning моделей на оптимальных траекториях улучшает производительность на RNG-Bench и переносится на другие бенчмарки без деградации мультимодальных способностей.'}, 'en': {'title': 'RNG-Bench: Evaluating Memory and Decision-Making in Multimodal Models', 'desc': "The paper introduces RNG-Bench, a new benchmark suite designed to assess how well multimodal foundation models can remember past observations and use them for decision-making in complex, multi-step tasks. It features two games, Matching Pairs and 3D Maze, which test the model's ability to recall information under varying difficulty levels. The benchmark includes a unique Memory Gap metric that helps differentiate between forgetting past information and making poor decisions. Additionally, fine-tuning a model on optimal-policy rollouts enhances its performance on RNG-Bench while maintaining its overall multimodal capabilities."}, 'zh': {'title': 'RNG-Bench：评估多模态模型的记忆与决策能力', 'desc': '本文介绍了一种新的基准套件RNG-Bench，用于评估多模态基础模型在多步交互中重建过去观察和决策的能力。该基准包含两个游戏：匹配对和3D迷宫，旨在测试模型在不同难度下的表现。通过引入记忆间隙指标，RNG-Bench能够区分遗忘和决策不佳的情况。研究表明，模型的性能可以通过对Qwen3.5-9B进行微调来提升，同时保持其多模态能力。'}}}, {'id': 'https://huggingface.co/papers/2606.18363', 'title': 'Guava: An Effective and Universal Harness for Embodied Manipulation', 'url': 'https://huggingface.co/papers/2606.18363', 'abstract': 'Abstract A harness framework for embodied tool use combines high-level reasoning with external modules, enabling compact models to perform complex manipulation tasks with minimal training data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Language models trained on large-scale vision-language data have demonstrated strong potential for embodied agents. Harnessing models through embodied tools use offers a promising alternative to end-to-end vision-language-action systems by combining high-level reasoning with external modules for perception, planning, and control. However, it remains unclear what makes an effective harness for embodied manipulation, and to what extent such a harness can unlock embodied capabilities in a wide range of reasoning models. In this work, we present Guava, a harness framework for embodied tool use developed through systematic exploration of the design space of agent workflows, action spaces, and observation spaces. Our study identifies three key ingredients for effective embodied agents: iterative perception-reasoning-action loops, semantic action abstractions, and multimodal observations. To understand whether these design principles are universal even to small models, we develop an end-to-end training pipeline that distills embodied manipulation capabilities into a 4B open-source model using fewer than 2K trajectories collected entirely in simulation. Experimental results in both simulation and real-world environments show performance comparable to frontier proprietary models while exhibiting strong generalization to unseen objects, novel instructions, and long-horizon tasks. Results suggest that a well-designed harness can serve as a scalable, model-agnostic interface for embodied manipulation, enabling strong emergent embodied capabilities in compact open-source models with minimal training data.', 'score': 21, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4740ed11501dcf05', 'authors': ['Haowen Liu', 'Xirui Li', 'Shaoxiong Yao', 'Peng Shi', 'Tianyi Zhou', 'Jia-Bin Huang', 'Furong Huang', 'Jiayuan Mao'], 'affiliations': ['Amazon FAR', 'Mohamed bin Zayed University of Artificial Intelligence', 'University of Illinois Urbana-Champaign', 'University of Maryland College Park', 'University of Pennsylvania', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.18363.jpg', 'data': {'categories': ['#robotics', '#training', '#small_models', '#agents', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Компактные модели для сложной робототехники через эффективное использование инструментов', 'desc': 'В статье представлена框架Guava для воплощённого использования инструментов, которая комбинирует высокоуровневые рассуждения с внешними модулями для восприятия, планирования и управления. Авторы проводят систематический анализ пространства дизайна агентских workflows и выявляют три ключевых компонента эффективных агентов: итеративные циклы восприятия-рассуждения-действия, семантические абстракции действий и мультимодальные наблюдения. Используя дистилляцию знаний, они обучают компактную 4-миллиардную модель всего на 2000 траекториях из симуляции, достигая производительности, сравнимой с крупными закрытыми моделями. Предложенный подход демонстрирует сильную обобщающую способность на невиданные объекты, новые инструкции и долгосрочные задачи манипуляции.'}, 'en': {'title': 'Unlocking Embodied Capabilities with Guava Framework', 'desc': 'This paper introduces Guava, a harness framework designed for embodied tool use that integrates high-level reasoning with external modules. It aims to enhance the performance of compact models in complex manipulation tasks while requiring minimal training data. The study identifies three essential components for effective embodied agents: iterative perception-reasoning-action loops, semantic action abstractions, and multimodal observations. Experimental results demonstrate that this framework allows smaller models to achieve performance comparable to larger proprietary models, showcasing strong generalization capabilities across various tasks and environments.'}, 'zh': {'title': '高效工具使用的框架：Guava', 'desc': '这篇论文介绍了一个名为Guava的框架，用于增强工具使用的能力，结合了高层次推理和外部模块，使得紧凑的模型能够在最少的训练数据下执行复杂的操作任务。研究发现，成功的工具使用需要三个关键要素：迭代的感知-推理-行动循环、语义动作抽象和多模态观察。通过系统探索代理工作流、动作空间和观察空间的设计，论文提出了一种端到端的训练流程，将操作能力提炼到一个4B的开源模型中。实验结果表明，经过良好设计的框架可以作为一种可扩展的、与模型无关的接口，赋予紧凑的开源模型强大的操作能力。'}}}, {'id': 'https://huggingface.co/papers/2606.16533', 'title': 'Kairos: A Native World Model Stack for Physical AI', 'url': 'https://huggingface.co/papers/2606.16533', 'abstract': 'Abstract Kairos is a native world model framework that learns from diverse experiences, maintains persistent states through hybrid temporal attention, and supports efficient deployment for physical AI applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models are transitioning from passive visual generators to foundational, operational infrastructure for Physical AI: they must natively acquire world knowledge from heterogeneous experience, maintain persistent states over long horizons, and execute efficiently within real deployment constraints. We introduce Kairos, a native world model stack designed around these requirements. (1) Kairos learns the world by pioneering a Native Pre-training Paradigm governed by a Cross-Embodiment Data Curriculum, which organizes open-world videos, human behavioral data, and robot interactions into a progressive developmental pathway. (2) Kairos maintains the world by unified world understanding, generation, and prediction within a Native Unified Architecture equipped with Hybrid Linear Temporal Attention, where sliding-window attention captures local dynamics, dilated sliding windows capture mid-range dependencies, and gated linear attention maintains persistent global memory. We establish formal theoretical bounds demonstrating that this temporal factorization strictly limits error accumulation, mathematically guaranteeing state propagation across extended horizons. (3) Kairos runs the world by incorporating a Deployment-Aware System Co-Design to support low-latency rollout generation on server and consumer-grade hardware for real-world observation-action-feedback loops. Experiments on embodied world-model, long-horizon, and action-policy benchmarks show that Kairos achieves top level performance while offering a strong efficiency-capability trade-off. Together, these results position Kairos as a cohesive operational foundation for future self-evolving physical intelligence.', 'score': 20, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'f230782de079f222', 'authors': ['Kairos Team', 'Fei Wang', 'Shan You', 'Qiming Zhang', 'Tao Huang', 'Zuoyi Fu', 'Zhisheng Zheng', 'Yunlong Xi', 'Feng Lv', 'Xiaoming Wu', 'Zeyu Liu', 'Cong Wan', 'Pu Li', 'Ruiqing Yang', 'Xiaoou Li', 'Wei Wang', 'Kangkang Zhu', 'Yuwei Zhang', 'Shi Fu', 'Zheng Zhang', 'Xiaoning Wu', 'Xuzeng Fan', 'Dacheng Tao', 'Xiaogang Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.16533.jpg', 'data': {'categories': ['#architecture', '#optimization', '#open_source', '#robotics', '#training', '#inference', '#long_context', '#multimodal', '#video', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Постоянная память в моделях мира: от пассивного наблюдения к активному интеллекту', 'desc': 'Kairos — это фреймворк для создания мировых моделей, которые учатся на разнообразных данных из видео, поведения людей и взаимодействия робота с окружением. Система использует гибридное линейное временное внимание (hybrid linear temporal attention) с комбинацией локального и глобального механизмов для сохранения состояния на больших временных горизонтах. Архитектура объединяет генерацию, понимание и прогнозирование мира в единой модели с математическими гарантиями ограничения ошибок. Система оптимизирована для эффективного развертывания на обычных вычислительных устройствах и показывает лучшие результаты на бенчмарках для физического AI.'}, 'en': {'title': 'Kairos: The Future of Learning and Acting in AI', 'desc': 'Kairos is a new framework for world models that helps AI learn and understand the world from various experiences. It uses a special training method that organizes different types of data, like videos and human actions, to help the AI learn progressively. Kairos also features a unique architecture that allows it to remember important information over time and make accurate predictions. Finally, it is designed to work efficiently on different types of hardware, making it suitable for real-world applications in physical AI.'}, 'zh': {'title': 'Kairos：物理智能的未来基础', 'desc': 'Kairos是一个原生世界模型框架，能够从多样的经验中学习，并通过混合时间注意力保持持久状态，支持物理人工智能应用的高效部署。它采用了一种新的预训练范式，通过跨体现数据课程组织开放世界视频、人类行为数据和机器人交互，形成渐进的发展路径。Kairos在统一的架构中实现世界的理解、生成和预测，利用滑动窗口注意力捕捉局部动态，并通过门控线性注意力保持持久的全局记忆。实验结果表明，Kairos在长时间范围和行动策略基准测试中表现出色，同时在效率和能力之间提供了良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2606.17539', 'title': 'Reinforcing Dual-Path Reasoning in Spatial Vision Language Models', 'url': 'https://huggingface.co/papers/2606.17539', 'abstract': 'Abstract A unified framework for spatial vision-language models that combines linguistic deduction and 3D geometric reasoning through reinforcement learning, enabling robust spatial reasoning across diverse tasks and domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spatial VLMs have made substantial progress in geometric perception, yet complex spatial reasoning requiring multi-step inference over depth, distance, and scene relations remains challenging. Moreover, different spatial queries call for fundamentally different strategies: some are best addressed through purely linguistic, step-by-step deduction, while others require explicit 3D grounding before quantitative inference. We present Dual-Path Spatial Reasoning via Reinforcement Learning for Spatial VLMs (SR-REAL), a unified framework that equips a spatial VLM with two complementary reasoning paths: Language-Only Reasoning (LOR), which performs step-by-step linguistic deduction, and Detect-Then-Reason (DTR), which detects 3D geometric cues (e.g., centers or bounding boxes) via region tokens before explicit geometric inference. SR-REAL begins with a cold-start supervised fine-tuning stage that constructs LOR and DTR chain-of-thought supervision and exposes a region-to-3D interface, followed by RL that optimizes the policy model with accuracy and format rewards; for DTR, a discrete center-based detection reward further refines geometric alignment. Across diverse spatial benchmarks, SR-REAL significantly outperforms spatial VLM baselines: (i) a single RL-trained model supports both reasoning paths, with DTR excelling in region-aware tasks through precise 3D localization and LOR enhancing general spatial reasoning; (ii) jointly training both paths fosters mutual reinforcement; (iii) high-quality, blended cold-start data is crucial for stable RL optimization; and (iv) the model generalizes across datasets and domains without per-task tuning, demonstrating positive transfer between LOR and DTR.', 'score': 12, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'cdc46f079877b852', 'authors': ['Yatai Ji', 'An-Chieh Cheng', 'Yang Fu', 'Yukang Chen', 'Han Zhang', 'Zhaojing Yang', 'Wei Huang', 'Ka Chun Cheung', 'Song Han', 'Vidya Nariyambut Murali', 'Pavlo Molchanov', 'Jan Kautz', 'Simon See', 'Hongxu Yin', 'Ping Luo', 'Sifei Liu'], 'affiliations': ['NVIDIA', 'The University of Hong Kong', 'University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2606.17539.jpg', 'data': {'categories': ['#training', '#cv', '#3d', '#rl', '#multimodal'], 'emoji': '🛤️', 'ru': {'title': 'Двухпутевое пространственное рассуждение: объединение языка и 3D-геометрии через обучение с подкреплением', 'desc': 'Работа представляет SR-REAL — единую архитектуру для пространственных видео-языковых моделей, которая объединяет два взаимодополняющих пути рассуждения: чисто лингвистическую дедукцию и 3D-геометрическое восприятие через обнаружение объектов. Модель обучается в двухэтапном процессе: сначала через контролируемую тонкую настройку с построением цепочек мышления для обоих путей, затем через обучение с подкреплением, оптимизирующее политику модели с использованием наград за точность и формат ответов. Единая модель способна динамически выбирать оптимальную стратегию для каждой задачи: простые пространственные вопросы решаются через языковой анализ, а сложные требующие локализации — через явное 3D-позиционирование. Эксперименты демонстрируют значительное улучшение над базовыми моделями и хорошую обобщаемость на новые датасеты без переобучения.'}, 'en': {'title': 'Dual-Path Reasoning for Enhanced Spatial Understanding', 'desc': "This paper introduces SR-REAL, a novel framework for spatial vision-language models (VLMs) that integrates linguistic deduction and 3D geometric reasoning using reinforcement learning. It addresses the challenges of complex spatial reasoning by providing two distinct reasoning paths: Language-Only Reasoning (LOR) for linguistic deduction and Detect-Then-Reason (DTR) for geometric inference. The framework begins with a supervised fine-tuning phase to develop both reasoning paths and then employs reinforcement learning to optimize the model's performance. SR-REAL shows significant improvements over existing models in various spatial tasks, demonstrating effective generalization and mutual reinforcement between the two reasoning strategies."}, 'zh': {'title': '统一空间推理框架：SR-REAL', 'desc': '本文提出了一种统一框架SR-REAL，用于空间视觉语言模型，结合了语言推理和三维几何推理。该框架通过强化学习实现了两条互补的推理路径：语言仅推理（LOR）和先检测后推理（DTR）。LOR进行逐步的语言推理，而DTR则通过区域标记检测三维几何线索，提升空间推理的准确性。实验结果表明，SR-REAL在多种空间基准测试中显著优于现有模型，展示了良好的跨任务迁移能力。'}}}, {'id': 'https://huggingface.co/papers/2606.18322', 'title': 'SAE Interventions are Unreliable: Post-Intervention Recovery of Suppressed Behavior', 'url': 'https://huggingface.co/papers/2606.18322', 'abstract': 'Abstract Sparse Autoencoders\' feature-level interventions may appear successful but can be circumvented through residual-space optimization that recovers original behaviors, revealing limitations in using SAE features for complete behavioral control.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Sparse Autoencoders (SAEs) decompose residual-stream activations into interpretable features. Recent latent-space defenses increasingly rely on these decompositions, assuming that identified "unsafe" SAE features serve as actionable handles for monitoring and intervention. In this paradigm, clamping a specific harmful feature is expected to reliably prevent model misbehavior. However, we show that this success may hide a recoverable failure mode: the clamp may block one visible route to a behavior without eliminating the behavior itself. We formulate this vulnerability as post-intervention recovery, a constrained residual-space optimization problem. Starting from the post-intervention residual state, we optimize residual perturbations to recover the pre-intervention behavior while preserving the post-intervention values of the targeted SAE features. Even under a strong threat model where the intervention remains active throughout optimization and generation, recovery remains possible. To rule out that recovery simply undoes the intervention, we use encoder-orthogonal updates for single-layer interventions and the corresponding feature-map Jacobian in the cross-layer setting. Across TPP, unlearning, IOI, and refusal steering experiments, this stress test reveals recoverable behavior despite successful feature-level intervention. Especially in the safety-critical refusal-steering setting, we achieve a 95.8% recovery rate on valid samples while keeping defended-feature relative drift to 0.131, substantially below suffix-based baselines. A recovery-path attribution analysis further localizes this recovery to the SAE reconstruction residual, the component left unexplained by the SAE. These results expose a gap between feature-level control and behavioral completeness: SAE features can support causal intervention, but controlling them does not guarantee control over the underlying behavior.', 'score': 12, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'a47bc4ecf4999af5', 'authors': ['Mingyue Cui', 'Linghui Shen', 'Xingyi Yang'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18322.jpg', 'data': {'categories': ['#interpretability', '#architecture', '#security', '#alignment', '#training'], 'emoji': '🚪', 'ru': {'title': 'Обходные пути: как модели восстанавливают запрещённое поведение через остаточное пространство', 'desc': 'В этой работе исследуется уязвимость редких автокодировщиков (SAE) при использовании их для контроля поведения больших языковых моделей. Авторы показывают, что даже если отключить опасный признак SAE, модель может восстановить нежелательное поведение через оптимизацию в остаточном пространстве активаций. Исследование формулирует эту проблему как задачу восстановления после вмешательства и демонстрирует, что 95.8% опасного поведения можно вернуть, сохраняя при этом видимость успешного вмешательства. Полученные результаты показывают фундаментальное ограничение: контроль над отдельными признаками SAE не гарантирует полный контроль над поведением модели.'}, 'en': {'title': 'Beyond Feature Control: Uncovering Behavioral Recovery in Sparse Autoencoders', 'desc': "This paper discusses the limitations of using Sparse Autoencoders (SAEs) for controlling model behavior through feature-level interventions. While these interventions can seem effective, the authors demonstrate that behaviors can still be recovered through residual-space optimization, indicating that simply clamping harmful features does not ensure complete behavioral control. They introduce the concept of post-intervention recovery, showing that even with interventions in place, original behaviors can be restored. The findings highlight a critical gap between manipulating features and achieving comprehensive control over a model's actions, especially in safety-sensitive applications."}, 'zh': {'title': '特征控制不等于行为控制的真相', 'desc': '稀疏自编码器（SAE）在特征级别的干预看似成功，但通过残差空间优化可以恢复原始行为，揭示了使用SAE特征进行完全行为控制的局限性。我们提出了一种后干预恢复的脆弱性，表明即使在干预仍然活跃的情况下，优化残差扰动也能恢复干预前的行为。实验结果显示，在安全关键的拒绝引导设置中，我们实现了95.8%的恢复率，表明特征级别的控制并不保证对底层行为的完全控制。我们的研究强调了特征级别干预与行为完整性之间的差距。'}}}, {'id': 'https://huggingface.co/papers/2606.18101', 'title': 'Trust the Right Teacher: Quality-Aware Self-Distillation for GUI Grounding', 'url': 'https://huggingface.co/papers/2606.18101', 'abstract': "Abstract Quality-aware self-distillation improves vision-language model performance for GUI grounding by enhancing coordinate-token teacher signals through correctness-aware gating and probability scaling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Graphical user interface (GUI) grounding requires vision-language models (VLMs) to identify small target elements in high-resolution screenshots and predict precise screen coordinates. On-policy self-distillation (OPSD) is a promising post-training approach for this coordinate-sensitive task, since it provides dense token-level teacher signals beyond hard coordinate labels. However, naive OPSD is not well suited to GUI grounding: OPSD evaluates the teacher on student-generated prefixes, the quality of coordinate-token teacher signals can degrade when the prefix has already deviated from the target coordinate, leading to unreliable teacher signal. To mitigate this, We propose quality-aware self-distillation for VLM-based GUI grounding, which improves coordinate-token teacher-signal quality through soft correctness-aware gating and teacher-probability scaling. The soft correctness-aware gate checks whether the teacher's current coordinate-token prediction can still be completed into the ground-truth box under the student-generated prefix. If not, the corresponding teacher signal is down-weighted. Teacher-probability scaling then uses the teacher's confidence as a lightweight factor to further calibrate the strength of the gated supervision. A key empirical finding is that neither component alone improves overall performance, whereas combining them consistently improves performance. This suggests that the two mechanisms play complementary roles: correctness-aware gating suppresses unreliable coordinate-token supervision, while teacher-probability scaling calibrates the strength of the remaining signals. Experiments across six GUI grounding benchmarks show that our method consistently improves the base model and outperforms strong baselines.", 'score': 12, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '1ea7c169d8e364d0', 'authors': ['Jingyuan Huang', 'Zuming Huang', 'Yucheng Shi', 'Tianze Yang', 'Xiaoming Zhai', 'Wei Chu', 'Ninghao Liu'], 'affiliations': ['INFLY Tech', 'Tencent AI Lab', 'The Hong Kong Polytechnic University', 'University of Georgia'], 'pdf_title_img': 'assets/pdf/title_img/2606.18101.jpg', 'data': {'categories': ['#multimodal', '#cv', '#training', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Избирательная дистилляция для точного определения элементов GUI', 'desc': 'В статье предлагается метод улучшения vision-language моделей для задачи определения элементов интерфейса через качественную self-distillation. Основная идея заключается в том, что при обучении с использованием сигналов от учителя на основе координат, качество этих сигналов деградирует, когда предсказания ученика отклоняются от целевых координат. Авторы вводят два взаимодополняющих механизма: корректность-ориентированный гейтинг, который подавляет ненадёжные сигналы учителя, и масштабирование вероятностей учителя для калибровки силы обучающего сигнала. Экспериментальные результаты на шести бенчмарках демонстрируют, что комбинированный подход значительно улучшает базовую модель в сравнении с существующими методами.'}, 'en': {'title': 'Enhancing GUI Grounding with Quality-Aware Self-Distillation', 'desc': "This paper introduces a method called quality-aware self-distillation to enhance the performance of vision-language models (VLMs) in graphical user interface (GUI) grounding tasks. The approach focuses on improving the quality of teacher signals used for training by implementing soft correctness-aware gating and teacher-probability scaling. The gating mechanism reduces the influence of unreliable teacher signals when the predictions deviate from the target coordinates, while the scaling adjusts the strength of the remaining signals based on the teacher's confidence. Experiments demonstrate that this combined method significantly boosts model performance across multiple benchmarks compared to traditional approaches."}, 'zh': {'title': '提升GUI定位性能的质量感知自蒸馏方法', 'desc': '本论文提出了一种质量感知自蒸馏方法，以提高视觉语言模型在图形用户界面（GUI）定位任务中的表现。该方法通过软正确性感知门控和教师概率缩放来增强坐标标记教师信号的质量。研究发现，单独使用这两种机制并不能提高整体性能，但结合使用时可以显著提升模型效果。实验结果表明，该方法在六个GUI定位基准测试中均优于强基线，证明了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.19341', 'title': 'Native Active Perception as Reasoning for Omni-Modal Understanding', 'url': 'https://huggingface.co/papers/2606.19341', 'abstract': 'Abstract OmniAgent is a novel omni-modal agent that addresses long video understanding by using an iterative observation-thought-action cycle with active perception, achieving superior performance compared to larger models through efficient selective processing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Passive models for long video understanding typically rely on a "watch-it-all" paradigm, processing frames uniformly regardless of query difficulty, causing computational cost to grow with video duration. Although interactive frameworks have emerged, they often rely on global pre-scanning, and their context cost still scales with video length. We propose OmniAgent, the first native omni-modal agent that formulates video understanding as a POMDP-based iterative Observation-Thought-Action cycle. OmniAgent executes on-demand actions to selectively distill audio-visual cues into a persistent textual memory, effectively decoupling reasoning complexity from raw video duration. To operationalize this, we introduce (1) Agentic Supervised Fine-Tuning to bootstrap native active perception via best-of-N trajectory synthesis with dual-stage quality control, and (2) Agentic Reinforcement Learning with TAURA (Turn-aware Adaptive Uncertainty Rescaled Advantage), which leverages turn-level entropy to steer credit assignment toward pivotal discovery turns. Crucially, OmniAgent exhibits positive test-time scaling, where performance improves as the number of reasoning turns increases, validating the efficacy of active perception. Empirical results across ten benchmarks (e.g., VideoMME, LVBench) demonstrate that OmniAgent achieves state-of-the-art performance among open-source models. Notably, on LVBench, our 7B agent outperforms the 10times larger Qwen2.5-VL-72B (50.5% vs. 47.3%).', 'score': 9, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'fc7ca7603963ccbc', 'authors': ['Zhenghao Xing', 'Ruiyang Xu', 'Yuxuan Wang', 'Jinzheng He', 'Ziyang Ma', 'Qize Yang', 'Yunfei Chu', 'Jin Xu', 'Junyang Lin', 'Chi-Wing Fu', 'Pheng-Ann Heng'], 'affiliations': ['Nanyang Technological University', 'Qwen Team, Alibaba Group', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.19341.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#training', '#agents', '#small_models', '#rl', '#long_context', '#multimodal', '#video', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Активный агент для понимания видео через избирательную обработку', 'desc': 'OmniAgent — это омни-модальный агент, который решает задачу понимания длинных видео через итеративный цикл наблюдение-размышление-действие с активным восприятием. В отличие от пассивных моделей, которые обрабатывают все кадры равномерно, OmniAgent выборочно извлекает аудио-визуальные признаки в текстовую память на основе POMDP-формулировки. Модель обучается с помощью специальной агентной супервизированной доводки и агентного обучения с подкреплением, используя метод TAURA для оптимизации кредита на критические шаги рассуждения. OmniAgent демонстрирует масштабирование во время тестирования: производительность улучшается с увеличением количества шагов рассуждения, и 7B модель превосходит модель в 10 раз большего размера.'}, 'en': {'title': 'OmniAgent: Smart Video Understanding Through Active Perception', 'desc': 'OmniAgent is a new type of machine learning agent designed to understand long videos more effectively. It uses a unique cycle of observation, thought, and action, allowing it to focus on important parts of the video instead of processing everything at once. This approach reduces the computational cost and improves performance, especially as the video length increases. By combining techniques like supervised fine-tuning and reinforcement learning, OmniAgent achieves better results than larger models on various benchmarks.'}, 'zh': {'title': 'OmniAgent：高效理解长视频的全模态智能体', 'desc': 'OmniAgent是一种新型的全模态智能体，旨在通过迭代的观察-思考-行动循环来理解长视频。与传统的被动模型不同，OmniAgent采用主动感知，能够高效选择性地处理信息，从而在性能上超越更大的模型。它将视频理解视为基于部分可观测马尔可夫决策过程（POMDP）的循环，能够有效地将音视频线索提炼为持久的文本记忆。实验结果表明，OmniAgent在多个基准测试中表现出色，尤其是在处理长视频时，其性能随着推理回合的增加而提升。'}}}, {'id': 'https://huggingface.co/papers/2606.19005', 'title': 'Sumi: Open Uniform Diffusion Language Model from Scratch', 'url': 'https://huggingface.co/papers/2606.19005', 'abstract': 'Abstract A large-scale uniform diffusion language model pretrained from scratch demonstrates competitive performance on knowledge and reasoning tasks while highlighting differences in commonsense reasoning compared to autoregressive models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion models have become a promising alternative to autoregressive models. Among these, uniform diffusion language models (UDLMs) permit any token to be updated at any step, in principle enabling more flexible generation. However, no UDLM has yet been pretrained from scratch at both large parameter scale and large token budget. Both autoregressive modeling and masked diffusion modeling already have capable models at scale that the community can study and build on; uniform diffusion has none. A scratch-pretrained UDLM at scale would provide a clean reference point for studying scaling behavior, generation dynamics, controllability, and trade-offs against established autoregressive and masked diffusion models. To this end, we introduce Sumi ("ink" in Japanese), a fully open 7B uniform diffusion language model pretrained from scratch on 1.5T tokens. Sumi performs competitively with autoregressive models trained at comparable token budgets on knowledge, reasoning, and coding benchmarks, while under-performing on commonsense benchmarks, where our education-heavy data mixture is a likely contributor. We release our model weights, checkpoints, and full training recipe, including a complete specification of the data mixture over publicly available corpora. We hope this release enables the community to study native uniform diffusion at scale and catalyzes work on its as-yet poorly understood aspects.', 'score': 6, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '32b1e2fb56e5a5b3', 'authors': ['Mengyu Ye', 'Keito Kudo', 'Wataru Ikeda', 'Ryosuke Matsuda', 'Keisuke Sakaguchi', 'Jun Suzuki'], 'affiliations': ['Tohoku University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19005.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#open_source', '#training', '#reasoning', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Равномерная диффузия в языковых моделях: альтернатива авторегрессионным подходам', 'desc': 'В работе представлена Sumi — большая языковая модель на основе равномерной диффузии (UDLM), предварительно обученная с нуля на 1.5 триллионах токенов. Модель демонстрирует конкурентоспособные результаты на задачах знаний, рассуждений и программирования, но отстает на бенчмарках здравого смысла. В отличие от авторегрессионных моделей, единообразная диффузия позволяет обновлять любой токен на любом шаге, обеспечивая более гибкую генерацию текста. Авторы открывают веса модели, контрольные точки и полный рецепт обучения, чтобы сообщество могло изучать диффузионные языковые модели в масштабе и понять их ранее слабо изученные характеристики.'}, 'en': {'title': 'Sumi: A New Era for Uniform Diffusion Language Models', 'desc': 'This paper introduces Sumi, a large-scale uniform diffusion language model (UDLM) pretrained from scratch, which shows strong performance on knowledge and reasoning tasks. Unlike autoregressive models, UDLMs allow for flexible token updates at any step, making them a promising alternative for language generation. Sumi is trained on 1.5 trillion tokens and competes well with autoregressive models in various benchmarks, although it struggles with commonsense reasoning tasks. The authors provide access to the model weights and training details to encourage further research into the capabilities and dynamics of uniform diffusion models.'}, 'zh': {'title': '统一扩散语言模型的创新与挑战', 'desc': '这篇论文介绍了一种新的统一扩散语言模型（UDLM），它是从零开始预训练的，具有大规模参数和大规模标记预算。该模型在知识、推理和编码任务上表现出色，但在常识推理任务上表现较差。研究表明，UDLM允许在生成过程中灵活更新任何标记，这与自回归模型不同。论文还发布了模型权重和训练细节，以促进社区对统一扩散模型的进一步研究。'}}}, {'id': 'https://huggingface.co/papers/2606.15872', 'title': 'SciOrch: Learning to Orchestrate Expert LLMs for Solving Frontier Multimodal Scientific Reasoning Tasks', 'url': 'https://huggingface.co/papers/2606.15872', 'abstract': "Abstract SciOrch is a framework that uses a lightweight orchestrator model to coordinate multiple frontier LLMs for scientific reasoning, achieving superior performance through MCTS-based training and GRPO-style optimization while reducing API costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Frontier scientific reasoning remains a major challenge for large language models (LLMs), where even the strongest commercial systems fall short of expert-level performance. A closer look at model behavior reveals substantial complementarity that single-model evaluation hides: different frontier models excel on different question types, and no single model captures the full picture. We present SciOrch, a framework that trains a lightweight 8B model to orchestrate frontier LLMs for scientific reasoning. The orchestrator decomposes each question, delegates sub-problems to selected commercial models through API calls, and synthesizes a final answer. Training such an orchestrator is fundamentally harder than conventional agentic RL: each action triggers an API call that is expensive in both dollar cost and latency, making standard online rollouts infeasible. We address this with MCTS-based approach, producing diverse orchestration trajectories, extracting per-node single-turn samples, and optimizing the orchestrator with GRPO-style training. On a 240-question test set spanning SGI-Reasoning and Scientists' First Exam, SciOrch reaches 56.66% average accuracy, outperforming the strongest single commercial model by 3.74% and the strongest multi-agent baseline by 3.33%. It also attains the best accuracy on both SGI and SFE with less than half the API cost of typical multi-agent methods.", 'score': 3, 'issue_id': 2451, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '4210f188dd0bf141', 'authors': ['Jingru Guo', 'Xiangyuan Xue', 'Lian Zhang', 'Wanghan Xu', 'Siki Chen', 'Philip Torr', 'Wanli Ouyang', 'Lei Bai', 'Zhenfei Yin'], 'affiliations': ['Imperial College London', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong', 'University of Illinois Urbana-Champaign', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.15872.jpg', 'data': {'categories': ['#optimization', '#training', '#agents', '#rl', '#science', '#reasoning', '#benchmark'], 'emoji': '🎼', 'ru': {'title': 'Лёгкий оркестратор для координации LLM в научном рассуждении', 'desc': 'SciOrch — это фреймворк, который использует лёгкую модель-оркестратор на основе 8B параметров для координации нескольких передовых LLM в задачах научного рассуждения. Оркестратор декомпозирует вопросы на подзадачи и распределяет их между коммерческими моделями через API вызовы, а затем синтезирует финальный ответ. Для обучения этого оркестратора применяется MCTS-подход для генерации разнообразных траекторий, из которых извлекаются обучающие примеры, и GRPO-стиль оптимизации. Система достигает 56.66% точности на тестовом наборе из 240 вопросов и превосходит самые сильные отдельные модели, при этом уменьшая расходы на API вдвое.'}, 'en': {'title': 'Orchestrating LLMs for Superior Scientific Reasoning', 'desc': 'SciOrch is a novel framework designed to enhance scientific reasoning in large language models (LLMs) by using a lightweight orchestrator model. This orchestrator intelligently coordinates multiple advanced LLMs, leveraging their strengths on different types of questions to improve overall performance. The training process employs Monte Carlo Tree Search (MCTS) for generating diverse strategies and utilizes GRPO-style optimization to manage the costs associated with API calls. As a result, SciOrch achieves higher accuracy on scientific reasoning tasks while significantly reducing operational costs compared to traditional multi-agent approaches.'}, 'zh': {'title': 'SciOrch：科学推理的新协调者', 'desc': 'SciOrch是一个框架，利用轻量级的协调模型来协调多个前沿大型语言模型（LLMs）进行科学推理。通过基于蒙特卡洛树搜索（MCTS）的训练和GRPO风格的优化，SciOrch在减少API成本的同时实现了卓越的性能。该框架通过将问题分解，委派子问题给选定的商业模型，并综合最终答案来工作。测试结果显示，SciOrch在240个问题的测试集上达到了56.66%的平均准确率，超越了最强单一商业模型和多代理基线。'}}}, {'id': 'https://huggingface.co/papers/2606.19336', 'title': 'Learning User Simulators with Turing Rewards', 'url': 'https://huggingface.co/papers/2606.19336', 'abstract': "Abstract A reinforcement learning approach using Turing test-based rewards trains language models to generate responses indistinguishable from human users in conversational and forum discussion settings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Learning to simulate human users in interactive settings could advance the training of agent assistants, evaluation of personalization systems, research in the social sciences, and more. Existing approaches generally do so by training a large language model (LLM) to match a single ground truth response, either by maximizing the log probability or by using a similarity reward. We instead propose {Turing-RL}: a Turing-Test-based reinforcement learning approach for training user simulator models. {Turing-RL} uses a discriminative Turing reward with an LLM judge to score how indistinguishable a generated response is from the real user's given the user's history, and the user simulator LLM learns to produce responses indistinguishable from what the user could have said with such rewards. Across two different domains--conversational chat and Reddit forum discussion--we find that {Turing-RL} consistently outperforms baseline methods on both LLM and human evaluation metrics. Our study suggests that optimizing for indistinguishability, rather than response matching, is effective for learning user simulators.", 'score': 2, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'f510da193a2b6321', 'authors': ['Yingshan Susan Wang', 'Cedegao E. Zhang', 'Linlu Qiu', 'Zexue He', 'Pengyuan Li', 'Alex Pentland', 'Roger P. Levy', 'Yoon Kim'], 'affiliations': ['MIT-IBM Watson AI Lab', 'Massachusetts Institute of Technology', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19336.jpg', 'data': {'categories': ['#training', '#alignment', '#agents', '#rl', '#reasoning', '#optimization'], 'emoji': '🤖', 'ru': {'title': 'Неотличимость вместо сопоставления: обучение симуляторов пользователей через тест Тьюринга', 'desc': 'В этой работе предлагается Turing-RL — подход, использующий обучение с подкреплением для тренировки моделей, которые имитируют поведение реальных пользователей в диалоговых и форумных системах. Вместо традиционного подхода, когда модель обучается воспроизводить конкретный эталонный ответ через максимизацию логарифма вероятности, авторы используют дискриминативную награду на основе теста Тьюринга с судьей-моделью. Награда оценивает, насколько генерируемый ответ неотличим от реального ответа пользователя на основе его истории взаимодействия. Экспериментальная проверка на двух доменах — чатах и обсуждениях на Reddit — показывает, что оптимизация по критерию неотличимости превосходит методы, основанные на сопоставлении ответов.'}, 'en': {'title': 'Training AI to Talk Like Humans with Turing-RL', 'desc': 'This paper introduces a novel reinforcement learning method called Turing-RL, which uses Turing test-based rewards to train language models. Instead of focusing on matching a single correct response, Turing-RL encourages models to generate responses that are indistinguishable from those of real users. The approach employs a discriminative Turing reward system, where an LLM judge evaluates the similarity of generated responses to actual user inputs based on conversation history. The results show that Turing-RL outperforms traditional methods in both conversational and forum settings, highlighting the effectiveness of optimizing for indistinguishability in user simulation tasks.'}, 'zh': {'title': '基于图灵测试的强化学习：提升用户模拟器的训练效果', 'desc': '本文提出了一种基于图灵测试的强化学习方法，称为Turing-RL，用于训练语言模型生成与人类用户无法区分的对话回复。与传统方法不同，Turing-RL使用判别性图灵奖励，通过一个大型语言模型（LLM）评估生成的回复与真实用户回复的相似度。该方法在对话聊天和Reddit论坛讨论两个领域的实验中，表现出优于基线方法的效果。研究表明，优化不可区分性而非简单的回复匹配，对于学习用户模拟器是有效的。'}}}, {'id': 'https://huggingface.co/papers/2606.18874', 'title': 'Externalizing Research Synthesis and Validation in AI Scientists through a Research Harness', 'url': 'https://huggingface.co/papers/2606.18874', 'abstract': 'Abstract Xcientist enables transparent and accountable AI-driven scientific research by creating persistent artifacts that track the complete research process from problem formulation to mechanism validation and revision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI systems can increasingly automate scientific workflows, but the reasoning that links prior evidence, generated ideas, experiments and final claims often remains implicit inside model inference. Here we introduce Xcientist, a research harness that externalizes research synthesis and experimental validation into inspectable, contract-governed processes. Xcientist organizes literature evidence, idea states, implementation plans, ablation records and repair traces as persistent research artifacts, so that generated mechanisms can be grounded, executed, tested and revised without losing their evidential basis. We identify claim drift as a failure mode of automated research, where runnable artifacts no longer support the mechanism originally claimed. Across training-free memory systems, graph-structured traffic forecasting and multi-scale physics-informed neural networks, Xcientist preserves traceable trajectories from problem formulation to mechanism design, validation and bounded revision. These results suggest that AI scientists should be evaluated not only by their final artifacts, but by whether their synthesis and validation processes remain attributable, inspectable and scientifically accountable.', 'score': 2, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '92dada5f89872fae', 'authors': ['Zijian Wang', 'Hanqi Li', 'Ziyue Yang', 'Zijian Hu', 'Shenghan Zuo', 'Yunzhe Zhang', 'Da Ma', 'Danyu Luo', 'Chenrun Wang', 'Jing Peng', 'Tiancheng Huang', 'Sijia Guo', 'Huayang Wang', 'Zichen Zhu', 'Senyu Han', 'Yilu Cao', 'Kai Yu', 'Lu Chen'], 'affiliations': ['Jiangsu Key Lab of Language Computing, Suzhou, China', 'Shanghai Innovation Institution, Shanghai, China', 'Suzhou Laboratory, Suzhou, China', 'X-LANCE Lab, School of Computer Science, Shanghai Jiao Tong University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.18874.jpg', 'data': {'categories': [], 'emoji': '🔬', 'ru': {'title': '透明性 и ответственность: экстернализация научного рассуждения в проверяемые артефакты', 'desc': 'Xcientist — это система, которая обеспечивает прозрачность и ответственность в научных исследованиях, управляемых нейросетями, путем создания устойчивых артефактов, отслеживающих весь процесс от постановки задачи до валидации механизмов. Система экстернализирует синтез исследований и экспериментальную валидацию в проверяемые процессы, организуя литературные доказательства, состояния идей, планы реализации и трассировки исправлений как постоянные исследовательские артефакты. Авторы выявляют проблему «дрейфа утверждений» — отказ в режиме автоматизированного исследования, когда исполняемые артефакты перестают поддерживать первоначально заявленный механизм. Результаты на задачах систем памяти без обучения, прогнозирования трафика на графах и физико-информированных нейросетях показывают, что ИИ-ученые должны оцениваться не только по финальным результатам, но и по атрибутируемости и инспектируемости их процессов синтеза и валидации.'}, 'en': {'title': 'Ensuring Accountability in AI-Driven Research with Xcientist', 'desc': 'Xcientist is a framework designed to enhance transparency and accountability in AI-driven scientific research. It creates persistent artifacts that document every step of the research process, from defining the problem to validating mechanisms. By organizing evidence, ideas, and experimental records, Xcientist ensures that the reasoning behind AI-generated claims is clear and inspectable. This approach addresses the issue of claim drift, where the final outputs may not align with the original research intentions, promoting a more reliable and accountable scientific workflow.'}, 'zh': {'title': '透明与负责任的AI科学研究', 'desc': 'Xcientist 是一个透明且负责任的人工智能驱动科学研究工具，它创建了持久的研究文档，跟踪从问题提出到机制验证和修订的完整研究过程。通过 Qwen/Qwen2.5-Coder-32B-Instruct AI 系统，Xcientist 能够自动化科学工作流程，但模型推理中的推理过程往往是隐含的。Xcientist 将研究综合和实验验证外部化为可检查的、合同治理的过程，确保生成的机制可以被验证和修订，而不失去其证据基础。我们发现自动化研究中的一个失败模式是“声明漂移”，即可运行的文档不再支持最初声称的机制。'}}}, {'id': 'https://huggingface.co/papers/2606.18375', 'title': 'PAIWorld: A 3D-Consistent World Foundation Model for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.18375', 'abstract': 'Abstract PAIWorld enhances diffusion-transformer world models with geometric awareness and cross-view attention to improve multi-view 3D consistency for robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World foundation models (WFMs) are powerful simulators, yet they predominantly operate in a single-view setting and lack the multi-view 3D consistency required for robotic manipulation. While robotic systems rely on multiple cameras (egocentric, eye-to-hand, and wrist-mounted) for policy learning, current multi-view world models simply concatenate view tokens without explicit geometric reasoning. This causes cross-view object drift, depth inconsistency, and texture misalignment. We trace these failures to two deficiencies: the absence of an explicit inter-view communication mechanism and the lack of a 3D geometric prior. We argue that resolving both simultaneously is necessary and sufficient. To address this, we present PAIWorld, a framework that augments diffusion-transformer world models via three core components: (1) Geometry-Aware Cross-View Attention blocks that establish an explicit pathway across views, (2) Geometric Rotary Position Embedding that encodes camera ray directions and extrinsic poses into the attention mechanism, and (3) Latent 3D-REPA, which distills 3D-aware features from frozen 3D foundation models to ensure 3D consistency. Built upon a DiT-based world foundation model, PAIWorld achieves state-of-the-art multi-view 3D consistency on robotic manipulation benchmarks, ranking 1st on the WorldArena leaderboard and 2nd on the AgiBot-Challenge2026 leaderboard, while enabling downstream applications such as model-based planning, world action models, and multi-view policy post-training.', 'score': 2, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '257973a7d2f6bc12', 'authors': ['Yuhang Huang', 'Xuan Lv', 'Junyan Xu', 'Zhiyuan Yu', 'Jiazhao Zhang', 'Ruizhen Hu', 'Wancheng Feng', 'Shilong Zou', 'Hewen Xiao', 'Ziqiao Zhou', 'Kaiyun Huang', 'Zhiyu Peng', 'Juzhan Xu', 'Hang Zhao', 'Chenyang Zhu', 'Renjiao Yi', 'Yifei Huang', 'Douhui Wu', 'Yan Zhang', 'Kexu Cheng', 'Chunhe Song', 'Yunzhi Xue', 'Xiuhong Zhang', 'Leitao Guo', 'Yunji Chen', 'Bin Wu', 'Haibin Yu', 'Kai Xu'], 'affiliations': ['Institute of AI for Industries, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.18375.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#open_source', '#robotics', '#3d', '#multimodal', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Геометрически осведомлённые мультивидовые модели мира для робототехники', 'desc': 'PAIWorld — это расширение диффузионно-трансформерных моделей мира с геометрической осведомлённостью для решения задач манипулирования роботами. Основная проблема заключается в том, что существующие мультивидовые модели мира просто конкатенируют токены представлений без явного геометрического рассуждения, что приводит к рассогласованности глубины и смещению объектов между видами. Решение включает три компоненты: блоки кросс-видового внимания с геометрической осведомлённостью, геометрическое ротационное позиционное кодирование для кодирования направлений лучей камер и позиций, а также использование 3D признаков из замороженных 3D моделей. Подход достигает состояния искусства по согласованности 3D между видами и показывает лучшие результаты на бенчмарках манипулирования роботами.'}, 'en': {'title': 'Enhancing 3D Consistency in Robotics with PAIWorld', 'desc': 'PAIWorld is a framework that enhances diffusion-transformer world models by incorporating geometric awareness and cross-view attention to improve 3D consistency in robotic manipulation tasks. Traditional models often struggle with multi-view scenarios, leading to issues like object drift and depth inconsistency due to a lack of geometric reasoning. PAIWorld addresses these challenges by introducing components that facilitate inter-view communication and encode geometric information, ensuring that the model can effectively process data from multiple camera perspectives. As a result, PAIWorld achieves top rankings in robotic benchmarks, demonstrating its effectiveness in maintaining 3D consistency and supporting advanced robotic applications.'}, 'zh': {'title': '提升机器人操作的三维一致性', 'desc': 'PAIWorld 是一种增强扩散变换器世界模型的框架，旨在提高机器人操作任务中的多视角三维一致性。该框架通过几何感知的跨视角注意力机制，解决了现有多视角世界模型在处理多视角信息时的不足。PAIWorld 引入了几何旋转位置嵌入和潜在三维特征提取，确保了三维一致性。通过这些创新，PAIWorld 在机器人操作基准测试中取得了领先的多视角三维一致性表现。'}}}, {'id': 'https://huggingface.co/papers/2606.18543', 'title': 'CEO-Bench: Can Agents Play the Long Game?', 'url': 'https://huggingface.co/papers/2606.18543', 'abstract': "Abstract CEO-Bench evaluates language model agents' ability to manage a simulated startup over 500 days, testing their proficiency in long-term planning, noise handling, adaptability, and multi-task coordination through a Python interface.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Language model agents are becoming proficient executors at isolated, short-horizon tasks such as software engineering and customer service. Yet real-world challenges require a combination of sophisticated skills that remain largely untested in agents: (1) navigating long horizons amid uncertainty; (2) acquiring information in noisy environments; (3) adapting to a changing world; (4) orchestrating multiple moving parts toward a coherent goal. We introduce CEO-Bench, which evaluates these capabilities together by simulating a representative real-world task: operating a startup for 500 days. An agent manages pricing, marketing, budgeting, and many other aspects of a fictional company through a programmable Python interface, operating in the same environment and facing the same challenges as a human CEO. Success demands analyzing noisy, interconnected business databases, translating signals into sound strategy, and coordinating many decisions with programming. The strongest agents write sophisticated code that simulates customer cohorts to forecast future cash and mines negotiation history to uncover hidden customer preferences. Even so, most state-of-the-art models struggle in this environment. Only Claude Opus 4.8 and GPT-5.5 finish above the $1M starting balance, and neither consistently turns a profit. CEO-Bench takes a first step toward measuring the intelligence required to drive sustained, adaptive progress over time.", 'score': 2, 'issue_id': 2451, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '32dd2a1969ce09b3', 'authors': ['Haozhe Chen', 'Karthik Narasimhan', 'Zhuang Liu'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18543.jpg', 'data': {'categories': ['#benchmark', '#agents', '#long_context', '#reasoning', '#plp'], 'emoji': '📊', 'ru': {'title': 'Тест интеллекта: может ли языковая модель успешно управлять стартапом?', 'desc': 'CEO-Bench — это бенчмарк для оценки способностей языковых моделей управлять виртуальной стартап-компанией в течение 500 дней. Агент должен принимать стратегические решения по ценообразованию, маркетингу и бюджетированию через интерфейс на Python, работая в условиях неопределённости и шума данных. Тест проверяет критические навыки: долгосрочное планирование, адаптивность к изменениям окружающей среды, обработку неполной информации и координацию множественных задач. Результаты показывают, что даже лучшие современные модели испытывают затруднения с длительной адаптивной деятельностью, направленной на устойчивый прогресс.'}, 'en': {'title': "Measuring AI's Business Acumen: CEO-Bench", 'desc': 'CEO-Bench is a benchmark designed to assess the capabilities of language model agents in managing a simulated startup over a period of 500 days. It tests their skills in long-term planning, handling noise, adapting to changes, and coordinating multiple tasks, which are essential for real-world business operations. The agents must navigate complex scenarios, analyze data, and make strategic decisions similar to a human CEO. Despite advancements, most current models struggle to maintain profitability, highlighting the challenges in achieving sustained adaptive intelligence in dynamic environments.'}, 'zh': {'title': 'CEO-Bench：评估语言模型的创业管理能力', 'desc': 'CEO-Bench是一个评估语言模型代理在模拟创业公司中管理能力的工具，测试其在长期规划、噪声处理、适应性和多任务协调方面的能力。该评估通过Python接口进行，模拟了一个为期500天的真实世界任务。代理需要管理定价、市场营销、预算等多个方面，面临与人类CEO相同的挑战。尽管一些先进的模型在这个环境中表现不佳，只有少数模型能够在起始余额上盈利，CEO-Bench为衡量持续适应性进步所需的智能迈出了第一步。'}}}, {'id': 'https://huggingface.co/papers/2606.14383', 'title': 'IndustryBench-MIPU: Benchmarking Multi-Image Attribute Value Extraction for Industrial Products', 'url': 'https://huggingface.co/papers/2606.14383', 'abstract': "Abstract IndustryBench-MIPU is introduced as the first large-scale benchmark for multi-image industrial product understanding, focusing on structured attribute extraction from heterogeneous product images to evaluate multimodal models' ability to recover dense technical specifications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Industrial products such as valves and circuit breakers are defined by dense technical specifications that govern procurement, compatibility, and safety across supply chains. These specifications are scattered across multiple heterogeneous product images, including specification tables, nameplates, and technical drawings, yet whether Multimodal Large Language Models (MLLMs) can reliably recover them remains underexplored. To fill this gap, we introduce IndustryBench-MIPU, the first large-scale benchmark for multi-image industrial product understanding, built around structured attribute extraction -- recovering property-value pairs from product images. This task jointly probes text recognition on specification tables and nameplates, visual reasoning over technical drawings, domain knowledge to decode industrial terminology, and cross-image evidence integration to assemble scattered specifications. Concretely, the benchmark comprises 4,559 products across 27,652 images with 103,703 annotations spanning 18 industrial categories, constructed through multi-model consensus and three-tier quality assurance. Evaluating nine MLLMs under both single-image and product-level multi-image settings reveals a stark completeness gap: models achieve high precision (86--94%) but the best recovers only 49.9% of product-level attributes; moving from single-image to multi-image extraction costs 15--34 percentage points of recall. Multi-image completeness, not single-image accuracy, is the core bottleneck. Dataset and code are publicly available.", 'score': 2, 'issue_id': 2451, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '70b959a8a6b3640c', 'authors': ['Haonan Qi', 'Jin Cao', 'Yongqi Zhang', 'Xintong Wang', 'Weidong Tang', 'Bin Chen', 'Chengfu Huo', 'Haojun Pan', 'Hengyu You', 'Jing Li', 'Yingde Wang', 'Liang Ding'], 'affiliations': ['Taobao&Tmall, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.14383.jpg', 'data': {'categories': ['#multimodal', '#cv', '#dataset', '#benchmark'], 'emoji': '🏭', 'ru': {'title': 'Мультиизображительное понимание промышленных продуктов: когда точность не гарантирует полноту', 'desc': 'Работа представляет IndustryBench-MIPU — первый крупномасштабный бенчмарк для оценки способности мультимодальных больших языковых моделей извлекать плотные технические спецификации из множества промышленных изображений продукции. Задача включает распознавание текста в таблицах спецификаций, визуальное понимание технических чертежей, декодирование специальной терминологии и интеграцию информации из разных изображений для восстановления парных свойств-значений. Бенчмарк содержит 4559 промышленных продуктов по 18 категориям с более чем 100000 аннотаций, созданный с использованием консенсуса нескольких моделей и трёхуровневой проверки качества. Экспериментальная оценка девяти MLLM выявила критический пробел: при высокой точности (86-94%) модели восстанавливают только половину атрибутов продуктов на уровне всего изделия, что указывает на фундаментальную проблему многоизображительного понимания.'}, 'en': {'title': 'Bridging the Gap in Multi-Image Industrial Product Understanding', 'desc': 'The paper introduces IndustryBench-MIPU, a benchmark designed to assess the ability of multimodal models to extract structured attributes from various industrial product images. It highlights the challenge of recovering dense technical specifications that are often spread across different types of images, such as nameplates and technical drawings. The benchmark consists of a large dataset with over 27,000 images and aims to evaluate models on their ability to integrate information from multiple images to improve attribute recovery. Results show that while models perform well in precision, they struggle significantly with completeness when moving from single-image to multi-image extraction, indicating a critical area for improvement in multimodal understanding.'}, 'zh': {'title': '多图像提取的完整性是关键挑战', 'desc': 'IndustryBench-MIPU是首个大规模的多图像工业产品理解基准，旨在从异构产品图像中提取结构化属性，以评估多模态模型恢复密集技术规格的能力。工业产品如阀门和断路器的技术规格分散在多个图像中，包括规格表、铭牌和技术图纸。该基准包含4,559种产品和27,652张图像，提供103,703个注释，涵盖18个工业类别，旨在填补多图像提取的完整性差距。评估结果显示，尽管模型在单图像提取中表现良好，但在多图像提取中，属性恢复率显著下降，表明多图像完整性是主要瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2606.18943', 'title': 'Physics-IQ Verified', 'url': 'https://huggingface.co/papers/2606.18943', 'abstract': "Abstract A systematic evaluation of the Physics-IQ benchmark reveals limitations in measuring physical understanding of video generative models, leading to improvements in prompt quality and sample-level scoring that enhance reliability for assessing physically accurate video generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generative models ( VGMs) have become a new frontier that can be used not just for video generation but for a multitude of downstream tasks, including world modeling. To advance these tasks, a good video model must understand the physical reality of the world. Evaluating this understanding is an emerging field and has led to the Physics-IQ benchmark, which quantifies this explicitly by comparing model-generated videos to real-world videos of physical experiments. In this work, we present a systematic audit of the Physics-IQ benchmark, expose shortcomings and propose three solutions that sharpen how we can measure physical understanding of VGMs. Specifically, we improve prompt and ground-truth quality to reduce the influence of confounding factors and further introduce a sample-level scoring system that weights each sample and metric equally. Our resulting benchmark, Physics-IQ Verified, refines 57.6\\% of all samples and improves over 34.8\\% of prompts. In a comparison study using six image-to-video generative models, we observe moderate but meaningful ranking changes (Kendall's τ= 0.46). We hope Physics-IQ Verified advances the community by providing a more reliable signal toward physically accurate VGMs. The code for the benchmark can be accessed at https://github.com/google-deepmind/physics-iq-benchmark", 'score': 1, 'issue_id': 2451, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '1b6f04f0acc51eba', 'authors': ['Tim Rädsch', 'Yuki M Asano', 'Hilde Kuehne', 'Stefan Bauer', 'Priyank Jaini', 'Robert Geirhos', 'Carsten T. Lüth'], 'affiliations': ['Anates Labs', 'Google DeepMind', 'Helmholtz AI, Munich', 'Technical University of Munich', 'Tuebingen AI Center, University of Tuebingen', 'University of Technology Nuremberg'], 'pdf_title_img': 'assets/pdf/title_img/2606.18943.jpg', 'data': {'categories': ['#video', '#science', '#benchmark', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Верификация физического понимания видеогенеративных моделей через улучшенный бенчмарк', 'desc': 'В статье представлена систематическая оценка бенчмарка Physics-IQ, который измеряет способность видеогенеративных моделей понимать физические законы мира. Авторы выявили ограничения существующего подхода и предложили три решения: улучшение качества промптов, совершенствование эталонных данных и введение системы оценивания на уровне отдельных примеров. Результирующий бенчмарк Physics-IQ Verified переработал более половины выборки и значительно улучшил качество промптов для более надёжного измерения физической корректности видеогенерации. Исследование показало умеренные, но значимые изменения в ранжировании видеогенеративных моделей, что подтверждает надёжность улучшенного бенчмарка.'}, 'en': {'title': 'Enhancing Physical Understanding in Video Generative Models', 'desc': 'This paper evaluates the Physics-IQ benchmark, which assesses how well video generative models (VGMs) understand physical concepts. The authors identify limitations in the current benchmark and propose improvements to enhance the quality of prompts and scoring methods. They introduce a sample-level scoring system that ensures fair evaluation across different samples and metrics. The updated benchmark, Physics-IQ Verified, shows significant improvements in measuring the physical accuracy of VGMs, leading to better performance assessments.'}, 'zh': {'title': '提升视频生成模型物理理解的评估标准', 'desc': '这篇论文系统评估了Physics-IQ基准，揭示了在测量视频生成模型的物理理解方面的局限性。为了提高评估的可靠性，作者提出了改进提示质量和样本级评分的方法。通过这些改进，新的Physics-IQ Verified基准能够更准确地衡量视频生成模型的物理理解能力。研究结果显示，改进后的基准在样本和提示的质量上都有显著提升，促进了物理准确视频生成模型的发展。'}}}, {'id': 'https://huggingface.co/papers/2606.05985', 'title': 'Beyond Alignment: Value Diversity as a Collective Property in Multicultural Agent Systems', 'url': 'https://huggingface.co/papers/2606.05985', 'abstract': "Abstract Multicultural multi-agent systems exhibit limited value diversity despite cultural alignment, with social interaction reducing diversity and compromising collective decision-making breadth.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multicultural multi-agent systems are increasingly deployed in globally diverse settings, where different agents are grounded in different cultural backgrounds. Existing cultural evaluation focuses on value alignment: how closely a single agent matches a target culture. Yet alignment is a per-agent property and cannot reveal whether a system, taken as a whole, preserves the cultural plurality it is meant to represent. We propose value diversity as a system-level evaluation axis for multicultural agent systems, defined through the dissimilarity between culturally conditioned agents' responses on a shared value survey. Using the World Values Survey, we evaluate 19 cultures and 18 backbone models across a wide range of system configurations. We find that diversity is largely uncorrelated with alignment, indicating that the two capture complementary system properties, and that current multicultural agent systems fall substantially below human societies in value diversity. Mixed-backbone systems narrow this gap but do not close it, and the gap persists across culture compositions and agent scales. Social interaction further erodes diversity by driving agents toward consensus, and a participatory budgeting case study shows that this homogenization narrows the breadth of collective decision-making. Together, our results establish value diversity as a distinct evaluation axis for multicultural multi-agent systems and reveal a persistent homogenization tendency in current LLM-based societies. Our code and data are publicly available at https://github.com/iNLP-Lab/MultiAgent-Diversity.", 'score': 1, 'issue_id': 2451, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '5fb6bb805ccb6ed9', 'authors': ['Shaoyang Xu', 'Jingshen Zhang', 'Long P. Hoang', 'Jinyuan Li', 'Wenxuan Zhang'], 'affiliations': ['Singapore University of Technology and Design', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2606.05985.jpg', 'data': {'categories': ['#open_source', '#ethics', '#alignment', '#multilingual', '#agents', '#dataset', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Разнообразие ценностей в мультикультурных системах агентов важнее, чем культурное выравнивание', 'desc': 'В статье исследуется проблема сохранения культурного разнообразия в системах мультиагентов, основанных на больших языковых моделях. Авторы предлагают метрику разнообразия ценностей на уровне системы, которая измеряет различия в ответах агентов из разных культур на опросе ценностей. Результаты показывают, что выравнивание культурных ценностей отдельного агента не гарантирует разнообразие в системе в целом, и современные мультикультурные агентские системы значительно уступают человеческим обществам по этому показателю. Социальное взаимодействие между агентами приводит к гомогенизации взглядов и сужению спектра коллективного принятия решений.'}, 'en': {'title': 'Enhancing Value Diversity in Multicultural Multi-Agent Systems', 'desc': "This paper discusses the challenges of maintaining cultural diversity in multicultural multi-agent systems, which are groups of agents from different cultural backgrounds. It introduces the concept of value diversity, which measures how different the agents' responses are to shared values, rather than just how well they align with a target culture. The study finds that current systems often lack the diversity seen in human societies, and that social interactions among agents tend to push them towards similar opinions, reducing overall diversity. The authors suggest that value diversity should be a key metric for evaluating these systems, as it highlights the limitations of existing approaches focused solely on cultural alignment."}, 'zh': {'title': '价值多样性：多文化智能体系统的新评估标准', 'desc': '多文化多智能体系统在文化对齐的情况下，价值多样性仍然有限。现有的文化评估主要关注单个智能体与目标文化的对齐程度，而无法反映整个系统是否保持其应有的文化多样性。我们提出以价值多样性作为多文化智能体系统的评估标准，通过比较不同文化背景智能体在共享价值调查中的反应差异来定义。研究表明，当前的多文化智能体系统在价值多样性方面远低于人类社会，且社会互动进一步削弱了多样性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
