    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.18023', 'title': 'LoopCoder-v2: Only Loop Once for Efficient Test-Time Computation Scaling', 'url': 'https://huggingface.co/papers/2606.18023', 'abstract': "Abstract Parallel loop Transformers achieve better code generation performance with two loops due to refined representations, while additional loops cause diminishing returns and increased positional mismatch costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Looped Transformers scale latent computation by repeatedly applying shared blocks, but sequential looping increases latency and KV-cache memory with the loop count. Parallel loop Transformers (PLT) alleviate this cost through cross-loop position offsets (CLP) and shared-KV gated sliding-window attention, making loop count a practical design choice. We therefore study PLT loop-count selection through a gain--cost view: an extra loop may refine representations, but CLP also introduces a positional mismatch at each loop boundary. We instantiate this study by training LoopCoder-v2, a family of 7B PLT coders with different loop counts, from scratch on 18T tokens, followed by matched instruction tuning and evaluation. Empirically, the two-loop variant delivers broad gains over the non-looped baseline across code generation, code reasoning, agentic software engineering, and tool-use benchmarks, improving SWE-bench Verified from 43.0 to 64.4 points and Multi-SWE from 14.0 to 31.0 points. In contrast, variants with three or more loops regress, revealing a strongly non-monotonic loop-count effect. Our diagnostics show that loop 2 provides the main productive refinement, while later loops yield diminishing, oscillatory updates and reduced representational diversity. Because the CLP-induced mismatch remains roughly fixed as refinement gains shrink, the offset cost increasingly dominates. This gain--cost trade-off explains PLT's saturation at two loops and provides diagnostics for loop-count selection.", 'score': 113, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '8997ac871bf87b92', 'authors': ['Jian Yang', 'Shawn Guo', 'Wei Zhang', 'Tianyu Zheng', 'Yaxin Du', 'Haau-Sing Li', 'Jiajun Wu', 'Yue Song', 'Yan Xing', 'Qingsong Cai', 'Zelong Huang', 'Chuan Hao', 'Ran Tao', 'Xianglong Liu', 'Wayne Xin Zhao', 'Mingjie Tang', 'Weifeng Lv', 'Ming Zhou', 'Bryan Dai'], 'affiliations': ['Beihang University', 'IQuest Research', 'Langboat', 'Renming University of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.18023.jpg', 'data': {'categories': ['#architecture', '#agents', '#plp', '#training'], 'emoji': '🔄', 'ru': {'title': 'Два цикла - оптимум: параллельные трансформеры для синтеза кода', 'desc': 'В работе изучается использование параллельных циклических блоков в трансформерных моделях для генерации кода, где каждый цикл применяет одинаковые слои для уточнения представлений. Авторы показывают, что два цикла обеспечивают оптимальный баланс между улучшением качества представлений и вычислительными затратами, значительно улучшая производительность на задачах генерации и рассуждения о коде. Добавление третьего цикла и более приводит к регрессии качества, так как выигрыш от уточнения представлений становится меньше, чем потери от позиционного несоответствия на границах циклов. Исследование демонстрирует немонотонный эффект количества циклов и предлагает принципиальный подход к выбору оптимального числа итераций на основе анализа баланса между прибылью и затратами.'}, 'en': {'title': 'Maximizing Code Generation with Optimal Loop Counts', 'desc': 'This paper discusses Parallel Loop Transformers (PLT) which enhance code generation by using two loops for better representation. However, adding more loops leads to diminishing returns and increased costs due to positional mismatches. The authors introduce a method to balance the benefits of additional loops against the costs they incur, particularly focusing on cross-loop position offsets and shared-key value attention. Their experiments with LoopCoder-v2 show that while two loops significantly improve performance, adding more loops can actually degrade results, highlighting the importance of optimal loop count selection.'}, 'zh': {'title': '并行循环变换器：最佳循环次数为二', 'desc': '并行循环变换器（PLT）通过交叉循环位置偏移（CLP）和共享KV门控滑动窗口注意力机制，优化了代码生成性能。研究表明，增加循环次数虽然可以细化表示，但也会引入位置不匹配的成本。通过训练LoopCoder-v2，我们发现两循环变体在代码生成和推理任务中表现优异，而三循环及以上的变体则效果下降。最终，PLT的最佳设计选择是使用两个循环，以平衡收益和成本。'}}}, {'id': 'https://huggingface.co/papers/2606.18216', 'title': 'Zone of Proximal Policy Optimization: Teacher in Prompts, Not Gradients', 'url': 'https://huggingface.co/papers/2606.18216', 'abstract': "Abstract Zone of Proximal Policy Optimization (ZPPO) improves knowledge distillation by using reformulated prompts that help students learn from both correct and incorrect responses, enhancing performance especially at smaller model sizes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Knowledge distillation transfers a teacher's competence to a small student but is brittle in the small-student regime: forcing the student to imitate logits from a much larger teacher concentrates it on the teacher's sharpest modes, hurting generalization on benchmark families beyond the training corpus. Reinforcement learning (RL) avoids logit imitation by training on the student's own rollouts. However, on questions where every rollout fails-yielding zero advantage and being silently discarded-injecting a stronger teacher's response into the policy gradient breaks the on-policy assumption and induces drift. We introduce Zone of Proximal Policy Optimization (ZPPO), inspired by Vygotsky's zone of proximal development, which keeps the teacher inside the prompt rather than the policy gradient. On hard questions, ZPPO constructs two reformulated prompts: a Binary Candidate-included Question (BCQ) pairs one correct teacher response with one incorrect student response as anonymized candidates the student must discriminate, and a Negative Candidate-included Question (NCQ) aggregates the student's wrong rollouts into a single prompt to surface their shared failure modes. A prompt replay buffer recirculates each hard question until it either graduates-the student's mean rollout accuracy on it reaches half- or is FIFO-evicted under finite capacity, amplifying BCQ and NCQ inside the student's current zone of proximal development. On the Qwen3.5 family at four student scales (0.8B-9B) with a 27B teacher, post-trained as vision-language models and evaluated on a 31-benchmark suite (16 VLM, 10 LLM, 5 Video), ZPPO outperforms off/on-policy distillation and GRPO, with the largest gains at the smallest scale.", 'score': 40, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4097529149e4add6', 'authors': ['Byung-Kwan Lee', 'Ximing Lu', 'Shizhe Diao', 'Minki Kang', 'Saurav Muralidharan', 'Karan Sapra', 'Andrew Tao', 'Pavlo Molchanov', 'Yejin Choi', 'Yu-Chiang Frank Wang', 'Ryo Hachiuma'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.18216.jpg', 'data': {'categories': ['#training', '#video', '#small_models', '#rlhf', '#multimodal'], 'emoji': '🎓', 'ru': {'title': 'Учитель в промпте: ZPPO для дистилляции через зону ближайшего развития', 'desc': 'В статье предложен новый метод Zone of Proximal Policy Optimization (ZPPO) для улучшения дистилляции знаний, который вдохновлен зоной ближайшего развития Выготского. Вместо того чтобы заставлять студент копировать логиты учителя, метод размещает учителя внутри промпта, создавая специальные вопросы с кандидатами (BCQ и NCQ), которые помогают студенту различать правильные и неправильные ответы. Алгоритм использует буфер повтора для циклирования сложных вопросов, пока студент не научится их решать или они не будут вытеснены из памяти. Экспериментальные результаты показывают, что ZPPO превосходит существующие методы дистилляции, особенно для малых моделей (0.8B-9B параметров) при обучении у большого учителя (27B параметров).'}, 'en': {'title': 'Empowering Small Models with ZPPO for Better Learning', 'desc': "The paper introduces Zone of Proximal Policy Optimization (ZPPO), a method that enhances knowledge distillation by using specially designed prompts to help smaller models learn from both correct and incorrect answers. This approach addresses the limitations of traditional distillation, where smaller models struggle to generalize due to imitating a larger teacher's outputs too closely. ZPPO employs two types of prompts: Binary Candidate-included Questions (BCQ) and Negative Candidate-included Questions (NCQ), which help students identify and learn from their mistakes. The method shows significant performance improvements, particularly for smaller models, when evaluated across various benchmarks."}, 'zh': {'title': '区域近端策略优化：提升小模型学习能力的关键', 'desc': '区域近端策略优化（ZPPO）通过重新设计的提示，改善了知识蒸馏，使学生能够从正确和错误的回答中学习，尤其在小模型上表现更佳。知识蒸馏将教师的能力转移到小学生身上，但在小学生的情况下容易出现问题。强化学习（RL）通过训练学生自己的回合来避免模仿教师的输出，但在每次回合都失败的问题上，注入教师的强响应会破坏策略梯度的假设。ZPPO通过构建两个重新设计的提示，帮助学生在困难问题上更好地学习，提升了学生的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.17200', 'title': 'ACE-Ego-0: Unifying Egocentric Human and Robotic Data for VLA Pretraining', 'url': 'https://huggingface.co/papers/2606.17200', 'abstract': 'Abstract A unified Vision-Language-Action pretraining framework leverages heterogeneous data sources including human egocentric videos and robot trajectories through a reliability-aware training approach that improves performance on embodied AI tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models benefit from large-scale and diverse embodied data, yet scaling robot trajectory collection is costly and labor-intensive. Recent advances show that large-scale egocentric human videos provide complementary real-world supervision in pretraining. However, joint training on human and robot data remains challenging due to divergences in action spaces, embodiment structures, temporal dynamics, and supervision quality. We introduce ACE-EGO-0, a unified VLA pretraining framework jointly leveraging heterogeneous data sources. To extract large-scale pretraining supervision from egocentric human videos, we build a scalable egocentric video-to-action pipeline that converts raw human videos into robot-format pseudo-action trajectories. To make these labels comparable with robot demonstrations, ACE-EGO-0 uses a unified action representation based on camera-space actions, morphology conditioning, and time-aligned action chunking. To robustly leverage noisy pseudo-action supervision from egocentric human videos, we formulate a reliability-aware training objective with a human auxiliary loss that concentrates supervision on reliable signals. We instantiate ACE-EGO-0 on 4.53K hours of robot and simulation data, together with 1.48K hours of pseudo-action-labeled egocentric human data. Experiments show that incorporating large-scale human supervision under reliability-aware weighting consistently improves both unified joint pretraining and supervised fine-tuning. ACE-EGO-0 achieves state-of-the-art performance on RoboCasa GR1 TableTop and RoboTwin 2.0, while demonstrating strong transfer to real-world bimanual manipulation.', 'score': 40, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '34733f28b27e239e', 'authors': ['Hao Li', 'Ganlong Zhao', 'Yufei Liu', 'Haotian Hou', 'Guoquan Ye', 'Tongyan Fang', 'Chunxiao Liu', 'Siyuan Huang', 'Jianbo Liu', 'Xiaogang Wang', 'Hongsheng Li'], 'affiliations': ['ACE Robotics', 'CUHK MMLab', 'CUHK, Shenzhen', 'SJTU', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2606.17200.jpg', 'data': {'categories': ['#dataset', '#training', '#cv', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Обучение роботов на человеческих действиях через надежное взвешивание данных', 'desc': 'В работе представлена единая предварительная обучающая система ACE-EGO-0, которая интегрирует данные из эгоцентрических видео людей и траекторий роботов для обучения моделей Vision-Language-Action. Основная проблема заключается в несовместимости данных из разных источников — разные пространства действий, структуры морфологии и качество разметки. Авторы решают эту задачу через унифицированное представление действий в пространстве камеры и разработку надежного метода обучения с вспомогательной функцией потерь, которая взвешивает важность каждого образца. Система достигает лучших результатов на бенчмарках RoboCasa и RoboTwin, успешно используя 1.48K часов синтетических разметок из человеческих видео в дополнение к данным роботов.'}, 'en': {'title': 'Bridging Human and Robot Learning for Enhanced AI Action Understanding', 'desc': 'This paper presents ACE-EGO-0, a new framework for pretraining models that understand both vision and language in the context of actions. It combines data from human videos and robot trajectories to improve performance in embodied AI tasks. The framework addresses challenges in aligning different action representations and ensures that the training focuses on reliable data through a specialized objective. By leveraging a large dataset of human and robot actions, ACE-EGO-0 achieves top performance in various robotic manipulation tasks.'}, 'zh': {'title': '统一视觉-语言-动作预训练框架的创新', 'desc': '本文提出了一种统一的视觉-语言-动作预训练框架，利用人类自我中心视频和机器人轨迹等异构数据源，通过可靠性感知的训练方法来提升在具身人工智能任务上的表现。该框架ACE-EGO-0能够将原始人类视频转换为机器人格式的伪动作轨迹，从而提取大规模的预训练监督信号。为了使这些标签与机器人演示可比，ACE-EGO-0采用了基于相机空间动作的统一动作表示。实验结果表明，在可靠性感知加权下，结合大规模人类监督显著提高了联合预训练和监督微调的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.17861', 'title': 'GameCraft-Bench: Can Agents Build Playable Games End-to-End in a Real Game Engine?', 'url': 'https://huggingface.co/papers/2606.17861', 'abstract': 'Abstract End-to-end game generation presents significant challenges for coding agents, requiring them to create complete playable games from natural language descriptions while meeting specific evaluation criteria for engine grounding, artifact completeness, and interactive verification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Game generation is an emerging application of coding agents, requiring models to transform natural-language specifications into playable interactive systems. Unlike traditional coding tasks, game generation takes place within a game engine, where scripts, scenes, assets, rendering, and runtime interactions must jointly produce coherent gameplay. We formalize end-to-end game generation as the problem of producing a complete game artifact that realizes a specification through observable player-game interaction in a target environment. We argue that evaluating this setting requires three desiderata: Engine Grounding, Artifact Completeness, and Interactive Verification. We propose an interaction-grounded evaluation framework that assesses executable gameplay through replayed demonstrations and rubric-guided multimodal judging. We instantiate this framework as GameCraft-Bench, a benchmark comprising 140 Godot tasks across 15 game families. Evaluations of frontier coding agents show that end-to-end game generation remains highly challenging: the strongest agent achieves only 41.46%, and most agents score below 40%. Further analysis reveals that while agents often implement recognizable mechanics, they struggle to deliver complete games with sufficient content, functional visual feedback, and coherent presentation. See https://tongxuluo.github.io/gamecraft-bench-website for demos, code, and data.', 'score': 36, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'cc900eb14c4c70f2', 'authors': ['Tongxu Luo', 'Rongsheng Wang', 'Jiaxi Bi', 'Chenming Xu', 'Zhengyang Tang', 'Jianlong Chen', 'Juhao Liang', 'Ke Ji', 'Shuqi Guo', 'Yuhao Du', 'Fan Bu', 'Wenyu Du', 'Xiaotong Zhang', 'Kyle Li', 'Shaobo Wang', 'Linfeng Zhang', 'Yuxuan Liu', 'Xin Lai', 'Chenxin Li', 'Yiduo Guo', 'Zhexin Zhang', 'Xinyuan Wang', 'Tianyi Bai', 'Ziniu Li', 'Benyou Wang'], 'affiliations': ['DualverseAI', 'Hunyuan Team, Tencent', 'NUS', 'SJTU', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen', 'USTB'], 'pdf_title_img': 'assets/pdf/title_img/2606.17861.jpg', 'data': {'categories': ['#agents', '#plp', '#games', '#open_source', '#video', '#benchmark'], 'emoji': '🎮', 'ru': {'title': 'От описания к игре: оценка способности агентов создавать полноценные интерактивные системы', 'desc': 'В работе представлена задача автоматической генерации полноценных игр с использованием кодирующих агентов на основе естественного языка. Авторы формализуют проблему как создание完完整игровых артефактов, которые должны работать в игровом движке и быть проверяемыми через интерактивное взаимодействие с игроком. Предложена комплексная система оценки с тремя критериями: привязка к движку, полнота артефакта и интерактивная верификация. Создан бенчмарк GameCraft-Bench с 140 задачами на движке Godot, где даже самые мощные кодирующие агенты достигают только 41.46% успеха.'}, 'en': {'title': 'Transforming Words into Playable Worlds: The Challenge of Game Generation', 'desc': 'This paper addresses the challenges of end-to-end game generation using coding agents that convert natural language descriptions into playable games. It emphasizes the need for a comprehensive evaluation framework that includes engine grounding, artifact completeness, and interactive verification to assess the quality of generated games. The authors introduce GameCraft-Bench, a benchmark with 140 tasks designed to evaluate coding agents across various game genres. Despite advancements, the results indicate that current agents struggle to produce fully functional games, often lacking in content and coherent gameplay.'}, 'zh': {'title': '端到端游戏生成的挑战与评估', 'desc': '本文探讨了端到端游戏生成的挑战，要求编码代理从自然语言描述中创建完整的可玩游戏。游戏生成需要在游戏引擎中进行，涉及脚本、场景、资产、渲染和运行时交互的协调。我们提出了一个评估框架，强调引擎基础、工件完整性和交互验证，以评估可执行的游戏玩法。通过GameCraft-Bench基准测试，我们发现当前的编码代理在生成完整游戏方面仍面临重大困难。'}}}, {'id': 'https://huggingface.co/papers/2606.16428', 'title': 'LectūraAgents: A Multi-Agent Framework for Adaptive Personalized AI-Assisted Learning and Embodied Teaching', 'url': 'https://huggingface.co/papers/2606.16428', 'abstract': "Abstract LectūraAgents is a multi-agent framework that enables personalized learning through adaptive embodied teaching by mimicking professor-student interactions and generating coordinated teaching actions aligned with learner profiles.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Effective personalized AI-assisted learning demands systems that can not only generate accurate learner-specific educational materials, but also dynamically adapt their instruction to diverse learners. However, existing educational agents have primarily focused on lecture content automation and simulations, which often fall short of modelling multimodal and embodied instructional methods tailored for the individual learner. To this end, we propose LectūraAgents - a multi-agent framework that enables personalized learning through end-to-end adaptive embodied teaching. At its core, LectūraAgents mirrors a professor-student relationship, in which a ProfessorAgent leads a collaborative team of specialized subordinate agents through research, planning, review, and embodied delivery of lecture contents that adapt to a learner's needs. The framework offers three main contributions: (1) a hierarchical multi-agent architecture for end-to-end personalized learning; (2) an adaptive embodied teaching mechanism, wherein the ProfessorAgent executes visible and pedagogically motivated teaching actions (e.g., handwrite, highlight, underline, etc.) over contents in a teaching environment; and (3) a Teaching Action-Speech Alignment (TASA) algorithm that employs salience-based heuristics and temporal semantic segmentation to generate coherent teaching action sequences aligned with learner profiles. We evaluate LectūraAgents on diverse courses at high school, undergraduate, and graduate levels using sample-specific rubric-based analysis; with generated lecture materials and teaching actions assessed and validated by expert educators. Experimental results show consistent gains in lecture content quality, embodied teaching quality, assessment, and personalization over existing approaches, positioning LectūraAgents as a pedagogically well-grounded framework for personalized learning at scale.", 'score': 30, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '83e27850bc1d2ee2', 'authors': ['Jaward Sesay', 'Yue Yu', 'Siwei Dong', 'Yemin Shi', 'Guangyao Chen', 'Börje F. Karlsson'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Beijing Institute of Technology', 'Cornell University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16428.jpg', 'data': {'categories': [], 'emoji': '👨\u200d🏫', 'ru': {'title': 'Многоагентная система для адаптивного персонализированного обучения с воплощённым преподаванием', 'desc': 'LectūraAgents — это многоагентная система, которая воспроизводит взаимодействие преподавателя и студента для персонализированного обучения. Фреймворк использует иерархическую архитектуру с главным агентом-профессором, координирующим специализированных подагентов для создания и адаптации учебных материалов под потребности конкретного ученика. Система реализует механизм воплощённого обучения, выполняя педагогически мотивированные действия (написание, выделение, подчёркивание) синхронизированно с речью через алгоритм TASA. Экспериментальная оценка на курсах различных уровней показала улучшение качества лекционного контента и эффективности персонализации обучения.'}, 'en': {'title': 'Personalized Learning Through Adaptive Teaching Agents', 'desc': "LectūraAgents is a multi-agent framework designed to enhance personalized learning by simulating professor-student interactions. It utilizes a hierarchical architecture where a leading ProfessorAgent coordinates specialized agents to create and deliver tailored educational content. The framework incorporates an adaptive embodied teaching mechanism, allowing the ProfessorAgent to perform interactive teaching actions that cater to individual learner needs. Additionally, the Teaching Action-Speech Alignment (TASA) algorithm ensures that the generated teaching actions are coherent and aligned with the learner's profile, resulting in improved educational outcomes."}, 'zh': {'title': '个性化学习的新纪元：LectūraAgents', 'desc': 'LectūraAgents 是一个多智能体框架，旨在通过模仿教授与学生的互动，实现个性化学习。该框架能够根据学习者的需求，动态调整教学内容和方式，提供适应性强的教学体验。LectūraAgents 的核心是教授智能体，它带领一组专门的子智能体，通过研究、规划和实施教学内容，确保教学方法符合个体学习者的特点。实验结果表明，LectūraAgents 在讲座内容质量、教学质量和个性化方面均优于现有方法，适合大规模个性化学习。'}}}, {'id': 'https://huggingface.co/papers/2606.09030', 'title': 'TRIAGE: Dialectical Reasoning for Explainable Risk Prediction on Irregularly Sampled Medical Time Series with LLMs', 'url': 'https://huggingface.co/papers/2606.09030', 'abstract': 'Abstract A framework called TRIAGE is proposed to improve clinical early warning systems by training large language models to generate dialectical reasoning for continuous risk scoring with better calibration and interpretability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Clinical early warning systems built on electronic health records, in which clinical observations are recorded as irregularly sampled medical time series (ISMTS), must deliver both calibrated risk scores for patient triage and interpretable rationales that clinicians can verify. Large Language Models (LLMs) have been explored for this task, yet they collapse graded clinical risk into overconfident binary predictions. This risk polarization undermines both calibration and cross-patient comparability. To address this, we propose TRIAGE, a framework that trains an LLM to generate dialectical reasoning over competing clinical outcomes by eliciting outcome-specific rationales. This dialectical formulation mitigates risk polarization, enabling a single LLM to yield continuous risk scores grounded in explicit clinical reasoning. Evaluated on three ISMTS benchmarks, TRIAGE achieves an average AUPRC improvement of 3.3% and reduces calibration error by 81% compared to the competitive baselines. An LLM-as-a-judge assessment further shows that our rationales surpass post-hoc explanations from the baseline by 20% in clinical reasoning quality. The source code is available at https://github.com/HyeongWon-Jang/TRIAGE .', 'score': 25, 'issue_id': 2444, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '55ea0ab9408e7978', 'authors': ['Hyeongwon Jang', 'Gyouk Chu', 'Changhun Kim', 'Joonhyung Park', 'Hangyul Yoon', 'Eunho Yang'], 'affiliations': ['AITRICS', 'KAIST', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.09030.jpg', 'data': {'categories': ['#training', '#reasoning', '#open_source', '#healthcare', '#science', '#interpretability', '#benchmark'], 'emoji': '⚕️', 'ru': {'title': 'Диалектические рассуждения в LLM для откалиброванного клинического риска', 'desc': 'В статье предлагается фреймворк TRIAGE для улучшения систем ранней клинической диагностики, который обучает большие языковые модели генерировать диалектические рассуждения над конкурирующими клиническими исходами. Система обрабатывает нерегулярно отсчитанные медицинские временные ряды из электронных медицинских карт и выдает откалиброванные оценки риска для триажа пациентов с интерпретируемыми обоснованиями. Диалектический подход предотвращает чрезмерную уверенность моделей в бинарных предсказаниях и позволяет генерировать непрерывные оценки риска на основе явного клинического рассуждения. На трёх бенчмарках TRIAGE показывает улучшение AUPRC на 3,3% в среднем и снижает ошибку калибровки на 81% по сравнению с базовыми методами.'}, 'en': {'title': 'TRIAGE: Enhancing Clinical Risk Scoring with Dialectical Reasoning', 'desc': 'The paper introduces TRIAGE, a framework designed to enhance clinical early warning systems by utilizing large language models (LLMs) for improved risk scoring. TRIAGE focuses on generating dialectical reasoning, which helps in producing continuous risk scores that are better calibrated and more interpretable for clinicians. By addressing the issue of risk polarization, where LLMs typically provide overconfident binary predictions, TRIAGE allows for nuanced clinical outcomes and rationales. The framework demonstrates significant improvements in risk score accuracy and reasoning quality when evaluated against existing benchmarks.'}, 'zh': {'title': 'TRIAGE：提升临床风险评分的辩证推理框架', 'desc': '本文提出了一种名为TRIAGE的框架，旨在通过训练大型语言模型生成辩证推理，从而改善临床早期预警系统的风险评分。该系统利用电子健康记录中的不规则采样医疗时间序列，提供经过校准的风险评分和可解释的推理。传统的大型语言模型在此任务中往往将风险简化为过于自信的二元预测，导致风险极化，影响了校准和跨患者的可比性。TRIAGE通过生成针对特定结果的推理，减轻了风险极化，使得单一的语言模型能够基于明确的临床推理提供连续的风险评分。'}}}, {'id': 'https://huggingface.co/papers/2606.18195', 'title': 'Learning from the Self-future: On-policy Self-distillation for dLLMs', 'url': 'https://huggingface.co/papers/2606.18195', 'abstract': 'Abstract d-OPSD introduces a novel on-policy self-distillation framework for diffusion language models by adapting self-teacher construction and supervision mechanisms to match the non-autoregressive nature of diffusion models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy self-distillation (OPSD) has proven effective for post-training large language models (LLMs), yet its application to diffusion LLMs (dLLMs) remains unexplored. Existing OPSD methods are inherently autoregressive-centric. They inject privileged information via left-to-right prefix conditioning with token-level divergence supervision, a design that fundamentally conflicts with the arbitraryorder generation of dLLMs. We introduce d-OPSD, the first OPSD framework tailored for dLLMs. Our approach makes two core contributions. First, we reframe self-teacher construction by using self-generated answers as suffix conditioning, enabling the student model to learn from "self future-experience" rather than privileged prefixes. Second, we shift supervision from token-level to step-level, aligning training with the iterative denoising process of dLLMs. Experiments across four reasoning benchmarks show that d-OPSD consistently outperforms RLVR and SFT baselines with superior sample efficiency, requiring only around 10% of the optimization steps by RLVR and opening a promising pathway for dLLM posttraining. The code is available at https://github.com/xingzhejun/d-OPSD.', 'score': 24, 'issue_id': 2445, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '8d6ba93797966d04', 'authors': ['Yifu Luo', 'Zeyu Chen', 'Haoyu Wang', 'Xinhao Hu', 'Yuxuan Zhang', 'Zhizhou Sha', 'Shiwei Liu'], 'affiliations': ['ELLIS Institute Tubingen', 'Max Planck Institute for Intelligent Systems', 'Nanyang Technological University', 'Technical University of Munich', 'Tsinghua University', 'Tubingen AI Center', 'University of British Columbia', 'University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.18195.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#optimization', '#diffusion'], 'emoji': '🌀', 'ru': {'title': 'Адаптация самодистилляции для неавторегрессивной генерации в диффузионных моделях', 'desc': 'В статье представлена d-OPSD, первая система самодистилляции в режиме обучения (on-policy self-distillation), специально разработанная для диффузионных языковых моделей. Авторы адаптировали механизмы конструирования самоучителя и супервизии, заменив условинг слева направо на условинг справа налево и перейдя от токен-уровневого контроля к контролю на уровне шагов итеративной денойзации. Экспериментальные результаты на четырёх бенчмарках логического мышления показывают, что d-OPSD значительно превосходит базовые методы RLVR и SFT, требуя около 10% оптимизационных шагов. Предложенный подход открывает новые перспективы для постобучения диффузионных языковых моделей с высокой эффективностью использования данных.'}, 'en': {'title': 'Revolutionizing Diffusion Language Models with d-OPSD', 'desc': 'The paper presents d-OPSD, a new framework for on-policy self-distillation specifically designed for diffusion language models (dLLMs). Unlike traditional methods that rely on autoregressive techniques, d-OPSD adapts self-teacher construction to utilize self-generated answers, allowing the model to learn from its own future experiences. Additionally, it shifts the supervision focus from token-level to step-level, aligning the training process with the iterative denoising characteristic of dLLMs. Experimental results demonstrate that d-OPSD significantly improves sample efficiency and performance compared to existing baselines, making it a promising approach for post-training dLLMs.'}, 'zh': {'title': '扩散语言模型的新自蒸馏方法', 'desc': 'd-OPSD提出了一种新颖的在线自蒸馏框架，专为扩散语言模型设计。该框架通过自生成答案作为后缀条件，帮助学生模型学习自我未来经验，而不是依赖特权前缀。我们还将监督从令牌级别转移到步骤级别，使训练与扩散模型的迭代去噪过程相一致。实验结果表明，d-OPSD在多个推理基准上表现优于现有方法，具有更高的样本效率。'}}}, {'id': 'https://huggingface.co/papers/2606.17628', 'title': 'OPD-Evolver: Cultivating Holistic Agent Evolver via On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.17628', 'abstract': 'Abstract OPD-Evolver is a self-evolving agent framework that combines slow-fast co-evolution with on-policy self-distillation to enhance memory management and policy learning across multiple domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory has become a standard substrate for self-evolving agents, yet retaining experience is not the same as learning how to evolve through it. Existing memory agents can store trajectories, retrieve reflections, or accumulate skills, but often lack the holistic competence to select useful experience, act on it, write reusable knowledge, and maintain a growing repository. We introduce OPD-Evolver, a slow-fast co-evolution framework that cultivates such an agent evolver through on-policy self-distillation. In the fast loop, OPD-Evolver interacts with a four-level memory hierarchy to read, use, write, and maintain experience for rapid test-time evolution. In the slow loop, outcome-calibrated memory attribution and privileged hindsight distill these four abilities into the deployable policy. Across multi-domain benchmarks, OPD-Evolver surpasses memory systems such as ReasoningBank by up to 11.5%, and training-based methods such as Skill0 by ~5.8%. Further analysis shows that OPD-Evolver internalizes high-value experience and memory management, enabling OPD-Evolver-9B to challenge giant counterparts such as Qwen3.5-397B-A17B and Step-3.5-Flash, pointing beyond memory-augmented agents toward genuinely qualified agent evolvers.', 'score': 21, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e788b18d94ef2ac7', 'authors': ['Guibin Zhang', 'Xun Xu', 'Yanwei Yue', 'Zikun Su', 'Wangchunshu Zhou', 'Xiaobin Hu', 'Shuicheng Yan'], 'affiliations': ['Bytedance Inc.', 'LV-NUS Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.17628.jpg', 'data': {'categories': ['#training', '#agents', '#optimization', '#reasoning', '#small_models', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Самоэволюционирующий агент через сопряженную эволюцию памяти и политики', 'desc': 'OPD-Evolver — это фреймворк самоэволюционирующего агента, который использует двухуровневую сопряженную эволюцию (медленный и быстрый контуры) для улучшения управления памятью и обучения политики. В быстром контуре агент взаимодействует с четырехуровневой иерархией памяти для чтения, использования, записи и обслуживания опыта, а в медленном контуре применяется on-policy самодистилляция для интернализации этих навыков в развертываемую политику. Метод показывает превосходство над существующими системами на основе памяти и методами обучения на множестве бенчмарков, превосходя ReasoningBank на 11.5% и методы типа Skill0 на ~5.8%. Результаты демонстрируют, что агент успешно интернализирует высокоценный опыт и управление памятью, позволяя небольшой модели конкурировать с намного более крупными системами.'}, 'en': {'title': 'Empowering Agents to Evolve Through Experience', 'desc': 'OPD-Evolver is a novel framework designed for self-evolving agents that enhances their ability to manage memory and learn policies effectively. It employs a slow-fast co-evolution strategy combined with on-policy self-distillation, allowing the agent to interact with a structured memory system for better experience utilization. The framework enables the agent to not only store and retrieve information but also to select valuable experiences and distill them into actionable knowledge. In tests across various domains, OPD-Evolver demonstrated superior performance compared to existing memory systems and training-based methods, indicating its potential to advance the capabilities of intelligent agents.'}, 'zh': {'title': '自我进化智能体的未来', 'desc': 'OPD-Evolver是一种自我进化的智能体框架，结合了慢速和快速的共同进化以及基于策略的自我蒸馏，以增强多领域的记忆管理和策略学习。该框架通过四级记忆层次结构快速读取、使用、写入和维护经验，从而实现快速的测试时间进化。与现有的记忆系统相比，OPD-Evolver在多领域基准测试中表现出色，超越了ReasoningBank和Skill0等方法。进一步分析表明，OPD-Evolver能够内化高价值经验和记忆管理，推动智能体进化的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.15236', 'title': 'Show the Signal, Hide the Noise: Spectral Forcing for Pixel-Space Diffusion', 'url': 'https://huggingface.co/papers/2606.15236', 'abstract': 'Abstract Spectral Forcing, a time-conditional 2D-DCT low-pass operator, improves diffusion model efficiency by explicitly separating signal from noise in pixel-space models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pixel-space diffusion models are trained on full-bandwidth noisy images, yet the useful signal available to the denoiser is strongly frequency dependent. Under rectified-flow diffusion and natural-image power-law spectra, the per-band data-to-noise contour k^{*}(t) = (1-t)^{-2/α} separates a signal-bearing low-frequency region from a noise-dominated high-frequency region at each time t. We show that this implicit coarse-to-fine structure is not merely descriptive: it induces a capacity-allocation problem. A standard pixel-space denoiser must discover the moving bandwidth boundary internally and can spend computation on frequency-time regions where the optimal prediction collapses to deterministic baselines rather than data-distribution modeling. To make this boundary explicit, we introduce Spectral Forcing, a parameter-free, time-conditional 2D-DCT low-pass operator applied to the noisy input before the patch embedder. Its cutoff expands monotonically with the diffusion time and becomes the identity at the data endpoint. Through controlled synthetic experiments, we identify the regime in which the operator is beneficial: coarse patch tokenization and data whose high-frequency content is predominantly noise rather than essential signal. On ImageNet-256 with JiT-700M/32, Spectral Forcing consistently improves both FID and Inception Score across different training epochs, demonstrating robust gains throughout training; at finer tokenization, the spectral forcing is still competitive. We further insert the unchanged operator into SenseNova-U1, a unified text-to-image model, where it improves DPG-Bench and GenEval, showing that the input-side spectral prior transfers beyond class-conditional generation. These results suggest a route to capacity-efficient pixel-space diffusion by showing the signal and hiding the noise.', 'score': 15, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'c1874dc89c433cd9', 'authors': ['Weichen Fan', 'Haiwen Diao', 'Penghao Wu', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15236.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#diffusion', '#cv'], 'emoji': '📊', 'ru': {'title': 'Явное разделение сигнала и шума через спектральную фильтрацию', 'desc': 'В статье предложен метод Spectral Forcing для повышения эффективности диффузионных моделей, которые работают с изображениями в пиксельном пространстве. Авторы показывают, что при обучении таких моделей полезный сигнал и шум распределены неравномерно по частотам, что приводит к неэффективному использованию вычислительных ресурсов моделью. Spectral Forcing - это простой оператор низкочастотной фильтрации на основе дискретного косинусного преобразования, который явно разделяет сигнал от шума до того, как изображение попадает в основную нейросеть. Экспериментальные результаты демонстрируют улучшение качества генерации на ImageNet-256 и в моделях text-to-image без усложнения архитектуры.'}, 'en': {'title': 'Enhancing Diffusion Models by Separating Signal from Noise', 'desc': 'This paper introduces Spectral Forcing, a new method that enhances the efficiency of diffusion models by separating useful signals from noise in image data. It utilizes a time-conditional 2D-DCT low-pass operator to focus on low-frequency regions that carry important information while filtering out high-frequency noise. The authors demonstrate that this approach leads to better performance in generating images, as it allows the model to allocate computational resources more effectively. Experiments show that Spectral Forcing improves key metrics like FID and Inception Score, indicating its potential for enhancing pixel-space diffusion models.'}, 'zh': {'title': '光谱强制：提升扩散模型效率的关键', 'desc': '本论文提出了一种名为光谱强制（Spectral Forcing）的新方法，旨在提高扩散模型的效率。该方法通过在像素空间模型中明确区分信号和噪声，使用时间条件的二维离散余弦变换（2D-DCT）低通算子来处理噪声输入。研究表明，光谱强制能够在不同训练阶段持续改善模型的FID和Inception Score，尤其在高频内容主要为噪声的情况下表现优异。通过将这一方法应用于统一的文本到图像模型，进一步验证了其在生成任务中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.16767', 'title': 'Text-Vision Co-Instructed Image Editing', 'url': 'https://huggingface.co/papers/2606.16767', 'abstract': 'Abstract A unified text-visual image editing framework is presented that combines semantic intent from textual instructions with spatial guidance from visual prompts to achieve more precise and faithful image manipulation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing image editing methods can be generally categorized into textual instruction-based and visual prompt-based ones. Textual instructions are semantically expressive, but are limited by the coarse granularity of spatial control of the editing results. In contrast, visual prompts such as drag and point can provide precise spatial guidance, but are limited by the inherent ambiguity in semantic intent. To unify the strength of textual and visual prompts, we present Text-Vision Co-Instructed Image Editing, which jointly models textual instructions as semantic intent and sparse visual instructions as spatial guidance, aiming to achieve precise and intent-faithful image manipulation. To this end, we first construct a textual-visual instruction paired dataset with more than 23K samples derived from dynamic videos, enabling aligned supervision for cross-modal instruction. We then propose TV-Edit, a Textual-Visual instruction unified Editing framework to contextualize drag or point-based visual instructions with image-text semantics and lift them into semantic-aware control representations for pretrained editing backbones. By integrating semantic intent and spatial constraints, TV-Edit leads to more precise spatial control, less instruction ambiguity, and stronger structural consistency than text-only or drag-based alternatives. Finally, we establish TV-Edit-Bench, a deliberately designed benchmark to evaluate semantic faithfulness, spatial alignment, and visual consistency with ground-truth references and controlled textual-visual variations for reliable assessment. Our experiments across multiple editing backbones demonstrate that TV-Edit consistently yields more precise and intent-faithful edits, significantly outperforming state-of-the-art instruction-based and drag-based baselines.', 'score': 11, 'issue_id': 2445, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '530fa18ab6bc397f', 'authors': ['Chenxi Xie', 'Yuhui Wu', 'Qiaosi Yi', 'Lei Zhang'], 'affiliations': ['OPPO Research Institute', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16767.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Редактирование изображений через объединение текстовых и визуальных инструкций', 'desc': 'В статье представлена объединённая система редактирования изображений, которая комбинирует текстовые инструкции для задания семантического намерения с визуальными подсказками для точного пространственного управления. Авторы предложили TV-Edit — фреймворк, который моделирует текстовые и визуальные инструкции совместно, позволяя достичь более точного редактирования с сохранением исходного намерения пользователя. Для обучения модели создан датасет с 23K парами текстово-визуальных инструкций, извлечёнными из видеопоследовательностей. Авторы также разработали специальный бенчмарк TV-Edit-Bench для оценки семантической верности, пространственного соответствия и визуальной согласованности отредактированных изображений.'}, 'en': {'title': 'Unifying Text and Visual Prompts for Precise Image Editing', 'desc': 'This paper introduces a new framework called Text-Vision Co-Instructed Image Editing, which merges textual instructions with visual prompts for better image editing. Traditional methods either rely on text for semantic meaning or visuals for spatial accuracy, but this approach combines both to enhance precision and fidelity in image manipulation. The authors created a large dataset of over 23,000 samples to train their model, allowing it to understand and align text and visual inputs effectively. Their results show that this unified method outperforms existing techniques in terms of spatial control and consistency in edits.'}, 'zh': {'title': '统一文本与视觉的图像编辑新方法', 'desc': '本文提出了一种统一的文本-视觉图像编辑框架，结合了文本指令的语义意图和视觉提示的空间指导，以实现更精确和忠实的图像操作。现有的图像编辑方法通常分为基于文本指令和基于视觉提示的两类，前者在语义表达上强大，但空间控制较粗糙；后者虽然提供了精确的空间指导，但在语义意图上存在模糊性。为了解决这些问题，本文提出了文本-视觉共同指导的图像编辑方法，旨在通过构建一个包含23K样本的文本-视觉指令配对数据集，实现跨模态的对齐监督。实验结果表明，TV-Edit在空间控制、指令模糊性和结构一致性方面优于现有的文本或拖动基础的编辑方法。'}}}, {'id': 'https://huggingface.co/papers/2606.15378', 'title': 'Rethinking the Role of Efficient Attention in Hybrid Architectures', 'url': 'https://huggingface.co/papers/2606.15378', 'abstract': 'Abstract Hybrid architectures combining full attention with efficient attention modules like sliding-window attention exhibit distinct scaling behaviors and optimization trajectories, with efficient attention primarily affecting the emergence speed of long-context capabilities rather than final performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern language models increasingly adopt hybrid architectures that combine full attention with efficient attention modules, such as sliding-window attention (SWA) and recurrent sequence mixers. However, how these efficient modules shape model capabilities remains poorly understood. To address this gap, we conduct a systematic analysis across hybrid architectures from three perspectives: scaling behavior, mechanism analysis, and architecture design. First, from a scaling perspective, we find that efficient-attention design primarily affects how fast long-context capability emerges, while different hybrids eventually converge to comparable long-context performance under sufficient training. Second, mechanistically, we show that long-range retrieval is mainly carried by full attention, whereas efficient attention shapes its optimization trajectory. This explains a counter-intuitive phenomenon we call Large-Window Laziness: larger SWA windows can delay the formation of retrieval heads in full-attention layers. Third, guided by this mechanism, we show that applying NoPE to only the full-attention layers of a small-window SWA hybrid substantially improves long-context performance with negligible impact on short-context performance.', 'score': 11, 'issue_id': 2445, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'db55a177ca3e4920', 'authors': ['Ziqing Qiao', 'Yinuo Xu', 'Chaojun Xiao', 'Zhou Su', 'Zihan Zhou', 'Yingfa Chen', 'Xiaoyue Xu', 'Xu Han', 'Zhiyuan Liu'], 'affiliations': ['OpenBMB', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15378.jpg', 'data': {'categories': ['#interpretability', '#optimization', '#training', '#architecture', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Эффективное внимание определяет скорость, но не качество долгоконтекстных моделей', 'desc': 'В этой работе исследуются гибридные архитектуры трансформеров, которые объединяют полное внимание с эффективными модулями, такими как скользящее окно. Авторы обнаружили, что эффективное внимание влияет в основном на скорость emergence способности работать с длинным контекстом, а не на финальную производительность. Через механистический анализ показано, что полное внимание отвечает за долгосрочный поиск, тогда как эффективное внимание формирует траекторию обучения. Предложено применять метод NoPE только к слоям полного внимания, что значительно улучшает работу с длинным контекстом без потерь на коротких последовательностях.'}, 'en': {'title': 'Unlocking Long-Context Potential in Hybrid Language Models', 'desc': 'This paper explores how hybrid architectures in language models, which combine full attention and efficient attention modules like sliding-window attention (SWA), behave during training and scaling. It reveals that while efficient attention influences the speed at which models develop long-context capabilities, the final performance remains similar across different architectures. The study identifies that full attention is crucial for long-range retrieval, while efficient attention affects the optimization process. Additionally, the authors introduce a method called NoPE that enhances long-context performance in these models without harming their short-context abilities.'}, 'zh': {'title': '混合架构：提升长上下文能力的关键', 'desc': '这篇论文探讨了混合架构在机器学习中的应用，特别是全注意力与高效注意力模块的结合。研究发现，高效注意力主要影响长上下文能力的出现速度，而不是最终性能。通过对混合架构的系统分析，论文揭示了长距离检索主要依赖全注意力，而高效注意力则影响优化轨迹。最后，研究表明，针对小窗口滑动窗口注意力的全注意力层应用NoPE可以显著提升长上下文性能。'}}}, {'id': 'https://huggingface.co/papers/2606.13929', 'title': 'Self-Evolving Visual Questioner', 'url': 'https://huggingface.co/papers/2606.13929', 'abstract': "Abstract A vision-language model autonomously improves its question-generation capabilities through self-evolution, enhancing both question quality and answerer performance without external supervision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language models (VLMs) are typically trained as passive answerers, while their ability to actively ask diverse, non-trivial, visual-centric and grounded questions remains underexplored. Existing visual questioners' performance is bottlenecked by the availability of high-quality training data or the cost of curating them. We show that a VLM can continuously improve itself as a visual questioner without any external supervision. We propose a self-evolving framework that uses a VLM itself as both a proposer and a filter to produce harder, more informative, and visual-centric questions, while maintaining their exploration diversity to avoid training collapse. These questions are then used to train the VLM in both questioner and answerer modes. To evaluate the questioner, we introduce an agentic protocol that assesses questions along perception, reasoning, and diversity dimensions. Experiments across various backbone VLMs show that our method substantially enhances the quality and substantially expands the difficulty boundary of autonomous question generation. Under the same budget, our self-supervision is more effective than training on the static source data. Moreover, the self-evolving questioner remains a competitive or even better answerer.", 'score': 11, 'issue_id': 2447, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '0a6ac1110f9d7af6', 'authors': ['Yijun Liang', 'Hengguang Zhou', 'Ming Li', 'Lichen Li', 'Cho-Jui Hsieh', 'Tianyi Zhou'], 'affiliations': ['Arena', 'MBZUAI', 'Peking University', 'University of California, Los Angeles', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.13929.jpg', 'data': {'categories': ['#synthetic', '#cv', '#optimization', '#benchmark', '#training', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Модель учится сама: мультимодальный ИИ генерирует свои собственные обучающие данные', 'desc': 'В статье представлена система самообучения для мультимодальных моделей (VLM), которая позволяет им автономно улучшать способность генерировать качественные вопросы без внешнего контроля. Предложенный фреймворк использует саму модель в качестве генератора и фильтра для создания сложных, информативных вопросов, ориентированных на визуальный контент. Система автоматически оценивает вопросы по трём критериям: восприятие, рассуждение и разнообразие, что предотвращает коллапс обучения. Эксперименты показывают, что такой подход самообучения эффективнее обучения на статических датасетах и одновременно улучшает способность модели отвечать на вопросы.'}, 'en': {'title': 'Self-Evolving Vision-Language Models: Question Generation Redefined', 'desc': 'This paper presents a vision-language model (VLM) that autonomously enhances its ability to generate questions through a self-evolving framework. Instead of relying on external data, the model uses its own generated questions to improve both the quality and complexity of the questions it can ask. The approach allows the VLM to act as both a question generator and evaluator, ensuring a diverse range of challenging questions while avoiding overfitting. Experimental results demonstrate that this self-supervised method outperforms traditional training methods, leading to better question generation and maintaining strong answering capabilities.'}, 'zh': {'title': '自我进化的视觉语言模型：提升问题生成能力', 'desc': '这篇论文介绍了一种视觉语言模型（VLM），它通过自我进化来提高问题生成能力，而无需外部监督。该模型不仅能生成多样化和具有挑战性的问题，还能提升回答者的表现。研究表明，VLM可以在没有高质量训练数据的情况下，持续自我改进，生成更具信息量和视觉中心的问题。通过引入一种自我进化框架，模型能够在问题生成和回答模式中进行有效训练，显著提高问题质量和难度。'}}}, {'id': 'https://huggingface.co/papers/2606.18180', 'title': 'EgoCS-400K: An Egocentric Gameplay Dataset for World Models', 'url': 'https://huggingface.co/papers/2606.18180', 'abstract': 'Abstract EgoCS-400K is a large-scale egocentric Counter-Strike dataset that bridges passive web videos and costly real-world embodied data by providing temporally aligned video-action-language trajectories with detailed player states and game events.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The shift from video generation to interactive world modeling places new demands on data: beyond captioned videos, world models require temporally aligned video-action-language trajectories grounded in the actions, camera motion, states, and events that drive future scene changes. However, such data is difficult to obtain at scale. Web video datasets offer broad visual coverage but lack executable actions and reliable states; robotic datasets provide action and state supervision but are costly and limited in scene diversity; and existing simulators often lack large-scale human-driven interaction trajectories. In this paper, we introduce EgoCS-400K, a large-scale replay-grounded egocentric Counter-Strike dataset for world models, built from public professional CS and CS2 match demos that preserve human gameplay trajectories and enable parsing, replaying, rendering, and temporal alignment. We extract player states, view directions, movements, keyboard/button inputs, view-angle changes, weapon usage, game events, and round-level context, and render clean first-person videos from the same trajectories. EgoCS-400K contains over 400,000 first-person videos and 10,000 hours of gameplay from more than 1,000 matches and 40,000 rounds, covering 13 maps and 10 player viewpoints per round. It supports a range of interactive visual modeling tasks, including action-conditioned future prediction, state- and event-aware scene rollout, replay-grounded captioning, and agent egocentric action understanding. By connecting visual observations with human actions, camera motion, game states, and events at scale, EgoCS-400K serves as a practical bridge between passive web videos, controllable game simulation, and costly real-world embodied data.', 'score': 9, 'issue_id': 2446, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'af75d19f46244b80', 'authors': ['Rongjin Guo', 'Dong Liang', 'Yuhao Liu', 'Fang Liu', 'Tianyu Huang', 'Gerhard P. Hancke', 'Rynson W. H. Lau'], 'affiliations': ['City University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.18180.jpg', 'data': {'categories': ['#synthetic', '#games', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'Временно выровненные данные из игр для обучения интерактивных мировых моделей', 'desc': 'EgoCS-400K — это большой датасет эгоцентрических видео из игры Counter-Strike, содержащий более 400 тысяч видеороликов с временно выровненными траекториями видео-действие-язык. Датасет извлечен из профессиональных матчей и включает информацию о состояниях игрока, движениях камеры, нажатиях клавиш и игровых событиях, что позволяет обучать мировые модели (world models) на реальных данных человеческого взаимодействия. Этот ресурс решает проблему нехватки масштабируемых данных для интерактивного моделирования миров, которые требуют не просто аннотированных видео, а полностью выровненных последовательностей действий, состояний и событий. Датасет служит практическим мостом между пассивными веб-видео, управляемой игровой симуляцией и дорогостоящими данными из реального мира, поддерживая задачи предсказания будущих кадров, понимания действий агента и причинно-следственного моделирования сцен.'}, 'en': {'title': 'Bridging Passive Videos and Interactive World Models with EgoCS-400K', 'desc': 'EgoCS-400K is a comprehensive dataset designed for egocentric video analysis in the context of the game Counter-Strike. It provides temporally aligned video-action-language trajectories that capture detailed player states and game events, facilitating the development of interactive world models. This dataset addresses the challenges of obtaining large-scale data by combining the visual richness of web videos with the actionable insights from robotic datasets. With over 400,000 first-person videos and extensive gameplay data, EgoCS-400K enables advanced machine learning tasks such as future action prediction and scene understanding based on human gameplay dynamics.'}, 'zh': {'title': 'EgoCS-400K：连接视频与游戏的桥梁', 'desc': 'EgoCS-400K是一个大规模的自我中心反恐精英数据集，旨在连接被动的网络视频和昂贵的真实世界数据。该数据集提供了时间对齐的视频、动作和语言轨迹，详细记录了玩家状态和游戏事件。通过从公共职业比赛中提取数据，EgoCS-400K包含超过40万个第一人称视频和1万小时的游戏内容，支持多种交互式视觉建模任务。它为机器学习模型提供了丰富的训练数据，帮助理解人类行为和游戏动态。'}}}, {'id': 'https://huggingface.co/papers/2606.18208', 'title': 'Looped World Models', 'url': 'https://huggingface.co/papers/2606.18208', 'abstract': 'Abstract Looped World Models introduce iterative latent state refinement through shared transformer blocks, achieving 100x parameter efficiency while adapting computational depth to prediction complexity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current world models face a fundamental tension: faithful long-horizon simulation demands deep computation, but deeper models are expensive to deploy and prone to compounding errors. We resolve this by introducing Looped World Models (LoopWM), which are the first looped architectures for world modelling. Our method iteratively refines latent environment states through a parameter-shared transformer block. This yield up to 100x parameter efficiency over conventional approaches with adaptive computation that automatically scales depth to match the complexity of each prediction step. Orthogonal to scaling model size and training data, LoopWM establishes iterative latent depth as a new scaling axis for world simulation, which might significantly push the community forward.', 'score': 7, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e341bbcd047c0815', 'authors': ['Hongyuan Adam Lu', 'Z. L. Victor Wei', 'Qun Zhang', 'Jinrui Zeng', 'Bowen Cao', 'Lingwei Meng', 'Mocheng Li', 'Zezhong Wang', 'Haonan Yin', 'Naifu Xue', 'Minyu Chen', 'Cenyuan Zhang', 'Zefan Zhang', 'Hao Wei', 'Jiawei Zhou', 'Haoran Xu', 'Hao Yang', 'Ronglai Zuo', 'Tongda Xu', 'Yonghao Li', 'Jian Chen', 'Hebin Wang', 'Zeyu Gao', 'Yang Li', 'Wei Zhao', 'Qimin Zhong', 'Siqi Liu', 'Yumeng Zhang', 'Leyan Cui', 'Zhangyu Wang', 'Wai Lam'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.18208.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Эффективное моделирование мира через итеративное уточнение скрытых состояний', 'desc': 'В статье предложены Looped World Models - инновационная архитектура для моделирования окружающей среды, которая итеративно уточняет скрытые состояния через общие блоки трансформера. Метод достигает в 100 раз большей параметрической эффективности по сравнению с традиционными подходами благодаря адаптивному вычислению глубины. Решение позволяет избежать фундаментального противоречия между точностью долгосрочного моделирования и вычислительной сложностью. Таким образом, авторы открывают новое направление масштабирования - итеративную глубину латентного пространства для улучшения симуляции окружающей среды.'}, 'en': {'title': 'Revolutionizing World Models with Efficient Iterative Refinement', 'desc': 'Looped World Models (LoopWM) introduce a novel approach to world modeling by using iterative latent state refinement with shared transformer blocks. This method enhances parameter efficiency by up to 100 times compared to traditional models, allowing for more effective long-horizon simulations without the high computational costs. By adapting the computational depth based on the complexity of each prediction, LoopWM minimizes the risk of compounding errors that often occur in deeper models. This innovative architecture establishes a new dimension for scaling world simulation, potentially advancing the field significantly.'}, 'zh': {'title': '循环世界模型：高效的潜在状态精炼', 'desc': '循环世界模型（Looped World Models）通过共享的变换器块引入了迭代的潜在状态精炼，达到了100倍的参数效率，同时根据预测复杂性调整计算深度。当前的世界模型面临着一个根本性的矛盾：忠实的长时间模拟需要深度计算，但更深的模型部署成本高且容易产生累积误差。我们通过引入循环架构解决了这个问题，使得潜在环境状态能够通过参数共享的变换器块进行迭代精炼。循环世界模型为世界模拟建立了新的迭代潜在深度扩展轴，可能会显著推动该领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2606.18249', 'title': 'Unified Multimodal Autoregressive Modeling with Shared Context-Visual Tokenizer is Key to Unification', 'url': 'https://huggingface.co/papers/2606.18249', 'abstract': 'Abstract UniAR presents a unified autoregressive framework that uses a single discrete visual tokenizer to bridge visual understanding and generation, achieving state-of-the-art results in image generation and editing through multi-level feature fusion, bitwise quantization, and parallel prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified Multimodal Modeling aims to integrate visual understanding and generation within a single system. However, existing approaches typically rely on two disparate visual tokenizers, which splits the representation space and hinders truly unified modeling. We propose UniAR, a unified autoregressive framework where a single discrete visual tokenizer serves as the key bridge between understanding and generation, enabling a shared context in which the model can directly interpret its own generated visual tokens without additional re-encoding. UniAR adapts a pretrained vision encoder with multi-level feature fusion and a lookup-free bitwise quantization scheme, preserving both high-level semantics and low-level details while scaling the effective visual vocabulary at minimal cost. Building on this, the unified autoregressive model adopts parallel-bitwise-prediction to jointly predict spatially grouped, multi-level visual codes, substantially reducing visual sequence length and accelerating generation. Finally, a diffusion-based visual decoder operates on discrete visual tokens to decode high-fidelity images. Through large-scale pre-training, followed by supervised fine-tuning and reinforcement learning, UniAR achieves state-of-the-art performance on image generation and image editing while remaining competitive on multimodal understanding benchmarks. The project page is available at https://sharelab-sii.github.io/uniar-web.', 'score': 7, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4000a90251ade3a2', 'authors': ['Wujian Peng', 'Lingchen Meng', 'Yuxuan Cai', 'Xianwei Zhuang', 'Yuhuan Yang', 'Rongyao Fang', 'Chenfei Wu', 'Junyang Lin', 'Zuxuan Wu', 'Shuai Bai'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Qwen Team, Alibaba Inc.', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.18249.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#diffusion', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единый токенизатор для понимания и создания визуального контента', 'desc': 'UniAR представляет единую авторегрессивную архитектуру, которая использует один дискретный визуальный токенизатор для связи между пониманием и генерацией изображений. Модель применяет многоуровневое слияние признаков и побитовую квантизацию для сохранения как высокоуровневой семантики, так и низкоуровневых деталей. Параллельное предсказание битов позволяет значительно сократить длину визуальной последовательности и ускорить процесс генерации. После предварительного обучения на больших данных, мелкой настройки и обучения с подкреплением модель достигает лучших результатов в генерации и редактировании изображений.'}, 'en': {'title': 'UniAR: Bridging Visual Understanding and Generation with a Unified Tokenizer', 'desc': 'UniAR introduces a novel autoregressive framework that utilizes a single discrete visual tokenizer to enhance both visual understanding and generation. By integrating multi-level feature fusion and a unique bitwise quantization method, it effectively maintains high-level semantics and low-level details in image processing. The model employs parallel-bitwise-prediction to streamline the prediction of visual codes, which accelerates the generation process. As a result, UniAR achieves top-tier performance in image generation and editing tasks while also excelling in multimodal understanding evaluations.'}, 'zh': {'title': '统一自回归框架，连接视觉理解与生成', 'desc': 'UniAR是一个统一的自回归框架，使用单一的离散视觉标记器来连接视觉理解和生成。它通过多层特征融合、逐位量化和并行预测，实现了图像生成和编辑的最先进结果。UniAR的设计使得模型能够直接解释生成的视觉标记，而无需额外的重新编码，从而提高了效率。通过大规模预训练和监督微调，UniAR在图像生成和编辑方面达到了领先的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.14885', 'title': 'Dr-DCI: Scaling Direct Corpus Interaction via Dynamic Workspace Expansion', 'url': 'https://huggingface.co/papers/2606.14885', 'abstract': "Abstract DR-DCI framework combines retrieval with direct corpus interaction by dynamically pulling relevant documents into a local workspace, enabling scalable and efficient agentic search across large corpora.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic search over large corpora relies on retriever-mediated interfaces (e.g., BM25 or ColBERT) for scalable candidate discovery. While effective at ranking relevant documents, these interfaces expose evidence only as ranked results or bounded document views, limiting agents' ability to reorganize material and verify constraints across documents. Direct Corpus Interaction (DCI) addresses this limitation by exposing shell-executable corpus operations for flexible search, filtering, comparison, and verification. However, full-corpus terminal commands become slow and unstable as the corpus grows, degrading performance and efficiency. We introduce DR-DCI, a retriever-steered DCI framework that treats retrieval as an agent-callable action for expanding a local workspace. Rather than operating directly over the full corpus, the agent dynamically pulls relevant documents into an evolving workspace and conducts DCI operations within it. This design combines retriever-level recall with DCI-style precision: retrieval keeps exploration scalable, while DCI preserves the local operations needed for effective evidence resolution. Experiments show that DR-DCI is both effective and efficient across scales. On Browsecomp-Plus, DR-DCI reaches 71.2\\% accuracy, improving over raw DCI and ablated variants by up to 8.3 points while reducing tool usage, wall time, and estimated cost. With workspace-preserving context reset, accuracy further improves to 73.3\\%. In corpus-scaling experiments, DR-DCI remains effective from 100K to 10M documents, whereas raw DCI becomes unstable and BM25 performs substantially worse. DR-DCI also scales to a 20M-scale file-per-document Wiki-18 QA setting, achieving an average score of 63.0 across six benchmarks and outperforming retrieval-based and trained search-agent baselines. Ablation analysis further shows that ranked previews and inter-document DCI are key to performance.", 'score': 7, 'issue_id': 2446, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '7bedc42e92c8810b', 'authors': ['Yi Lu', 'Zhuofeng Li', 'Ping Nie', 'Haoxiang Zhang', 'Yuyu Zhang', 'Kai Zou', 'Wenhu Chen', 'Jimmy Lin', 'Dongfu Jiang', 'Yu Zhang'], 'affiliations': ['Netmind AI', 'Texas A&M University', 'UC San Diego', 'University of Toronto', 'University of Waterloo', 'Verdent AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.14885.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Агентный поиск с гибридным подходом: динамическая загрузка документов вместо полнотекстовых операций', 'desc': 'В статье предложена система DR-DCI, которая объединяет поиск по корпусу с прямым взаимодействием с документами, позволяя агентам динамически загружать релевантные документы в локальное рабочее пространство. Вместо того чтобы проводить операции поиска и фильтрации над всем корпусом, система использует retriever для масштабируемого поиска кандидатов, а затем выполняет операции на загруженных документах локально. Это сочетает высокий recall от поиска с точностью операций прямого взаимодействия с корпусом, сохраняя эффективность на больших объёмах данных. Экспериментальные результаты показывают, что DR-DCI достигает 73.3% точности и остаётся стабильной при масштабировании от 100K до 20M документов, превосходя базовые методы retrieval-based поиска.'}, 'en': {'title': 'Dynamic Retrieval for Efficient Document Interaction', 'desc': 'The DR-DCI framework enhances agentic search by integrating document retrieval with direct corpus interaction, allowing for efficient exploration of large datasets. It dynamically pulls relevant documents into a local workspace, enabling flexible operations like filtering and comparison without the performance degradation seen in traditional methods. This approach combines the scalability of retrieval techniques with the precision of direct corpus interaction, resulting in improved accuracy and efficiency. Experiments demonstrate that DR-DCI outperforms existing methods across various scales, maintaining effectiveness even as the corpus size increases.'}, 'zh': {'title': '智能搜索的新突破：DR-DCI框架', 'desc': 'DR-DCI框架结合了检索和直接语料库交互，通过动态拉取相关文档到本地工作区，实现了在大规模语料库中高效的智能搜索。该框架利用检索器引导的方式，将检索视为可调用的操作，从而扩展工作空间，而不是直接在整个语料库上操作。通过这种设计，DR-DCI结合了检索的可扩展性和DCI的精确性，确保了有效的证据解析。实验结果表明，DR-DCI在不同规模下都表现出色，准确率显著提高，同时减少了工具使用和时间成本。'}}}, {'id': 'https://huggingface.co/papers/2606.17905', 'title': 'ChLogic: Evaluating Robustness of Logical Reasoning in Chinese Expressions', 'url': 'https://huggingface.co/papers/2606.17905', 'abstract': 'Abstract ChLogic benchmark reveals persistent performance gaps between English and Chinese logical reasoning in large language models, influenced by surface realization differences and translation artifacts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models perform increasingly well on standardized logical reasoning benchmarks, but whether this ability remains robust beyond English is unclear. We introduce ChLogic, an English--Chinese aligned benchmark that tests whether models preserve logical reasoning performance when the same latent logical structure is expressed in English and diverse Chinese surface realizations. Built from formal logical templates, the benchmark contains three data sets: (i) the General aligned set, derived from 60 General Propositions across nine template families; (ii) the Difficult aligned set, derived from 40 Difficult Problems; and (iii) the Chinese-only set, covering 15 language-specific phenomenon types. Each aligned item pairs one English reference expression with five Chinese realizations. Experiments on Qwen3, Ministral, and GLM models reveal a persistent English--Chinese performance gap. Back-translation from standard Chinese into English often improves performance on the General aligned set, but produces mixed effects on the Difficult aligned set, where Qwen3-32B and GLM-5.1 perform worse after translation. These results indicate that Chinese surface realization, translation artifacts, and model-specific behavior jointly affect multilingual logical reasoning. Overall, ChLogic provides a useful stress test for the robustness of multilingual reasoning.', 'score': 6, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e76af59d386b7a80', 'authors': ['Peixian Zhou', 'Yuxu Chen', 'Chaorui Zhang', 'Wei Han', 'Bo Bai', 'Xueyan Niu'], 'affiliations': ['College of Mathematics, Sichuan University, China', 'Theory Lab, 2012 Labs, Huawei Technologies Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2606.17905.jpg', 'data': {'categories': ['#dataset', '#multilingual', '#reasoning', '#machine_translation', '#low_resource', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Выявление разрывов в логическом мышлении между английским и китайским языками в больших языковых моделях', 'desc': 'В работе представлен бенчмарк ChLogic для оценки логического рассуждения в многоязычных больших языковых моделях. Бенчмарк содержит выравненные пары задач на логику на английском и китайском языках, полученные из формальных логических шаблонов, с целью проверить, сохраняют ли модели логические рассуждения при переходе между языками. Эксперименты на моделях Qwen3, Ministral и GLM выявили устойчивый разрыв в производительности между английским и китайским языками, который зависит от способа выражения поверхностной структуры и артефактов перевода. Результаты показывают, что китайская реализация поверхностной структуры, ошибки перевода и особенности конкретных моделей совместно влияют на многоязычное логическое рассуждение.'}, 'en': {'title': 'Bridging the Logic Gap: English vs. Chinese in AI Models', 'desc': 'The ChLogic benchmark investigates how well large language models perform logical reasoning in both English and Chinese. It highlights that there are significant performance gaps between the two languages, which are influenced by differences in how sentences are structured and translated. The benchmark consists of three datasets that test models on their ability to maintain logical reasoning across English and various Chinese expressions. Results show that while back-translation can help in some cases, it can also hinder performance, indicating that language-specific factors and model characteristics play a crucial role in multilingual reasoning.'}, 'zh': {'title': '多语言逻辑推理的挑战与机遇', 'desc': 'ChLogic基准测试揭示了大型语言模型在英语和中文逻辑推理之间存在持续的性能差距。这种差距受到表面实现差异和翻译伪影的影响。我们构建了ChLogic基准，测试模型在不同语言表述下是否能保持逻辑推理能力。实验结果表明，中文的表面实现和翻译过程对多语言逻辑推理的影响是复杂的。'}}
