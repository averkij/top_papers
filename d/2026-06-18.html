}, {'id': 'https://huggingface.co/papers/2606.16154', 'title': 'A Gradient Perspective on RLVR Stability and Winner Advantage Policy Optimization', 'url': 'https://huggingface.co/papers/2606.16154', 'abstract': 'Abstract Training instability in reinforcement learning with verifiable rewards is analyzed through token-level gradient dynamics, leading to a stable policy optimization method that updates only on positive-advantage completions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning with verifiable rewards (RLVR) improves language-model reasoning, but GRPO-style optimization remains prone to collapse. We analyse this instability through token-level gradient dynamics, deriving a taxonomy that predicts how updates affect next-token probabilities and entropy. The taxonomy shows that stability depends jointly on the advantage sign and token distribution under the current policy. Motivated by this finding, we propose Winner Advantage Policy Optimization (WAPO), a simple online clipped policy-gradient objective that updates only on positive-advantage completions. Across mathematical reasoning and multi-hop QA benchmarks, WAPO improves training stability and matches or outperforms baselines across multiple model families. Full code can be found at https://github.com/layer6ai-labs/wapo.', 'score': 6, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'd40d60f12b0fe974', 'authors': ['Prasanth YSS', 'Zhichen Ren', 'Rasa Hosseinzadeh', 'Ilan Gofman', 'Yuqi Chen', 'Zhaoyan Liu', 'Guangwei Yu', 'Jesse C. Cresswell', 'Satya Krishna Gorti'], 'affiliations': ['Layer 6 AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.16154.jpg', 'data': {'categories': ['#training', '#optimization', '#rl', '#reasoning', '#open_source', '#architecture'], 'emoji': '⚖️', 'ru': {'title': 'Стабилизация обучения языковых моделей через оптимизацию с положительным преимуществом', 'desc': 'В работе анализируется нестабильность обучения в reinforcement learning с проверяемыми вознаграждениями через динамику градиентов на уровне токенов. Авторы предлагают классификацию, которая предсказывает, как обновления влияют на вероятности следующего токена и энтропию политики. На основе этого анализа разработан метод Winner Advantage Policy Optimization (WAPO), который обновляет политику только на основе примеров с положительным преимуществом. Экспериментально показано, что WAPO повышает стабильность обучения и превосходит baseline методы на задачах математического рассуждения и многошагового вопросно-ответного взаимодействия.'}, 'en': {'title': 'Stabilizing Reinforcement Learning with Positive Advantage Updates', 'desc': 'This paper addresses the challenges of training stability in reinforcement learning with verifiable rewards (RLVR). It examines how token-level gradient dynamics can lead to instability in policy optimization, particularly with GRPO-style methods. The authors introduce a new approach called Winner Advantage Policy Optimization (WAPO), which focuses on updating policies only when there are positive advantages. WAPO demonstrates improved stability and performance on various benchmarks, showing its effectiveness in enhancing training processes for language models.'}, 'zh': {'title': '赢家优势策略优化：提升强化学习稳定性', 'desc': '本文分析了在可验证奖励的强化学习中训练不稳定性的问题，特别是通过令牌级梯度动态来研究。我们提出了一种新的策略优化方法，称为赢家优势策略优化（WAPO），该方法仅在正优势完成时进行更新，从而提高了训练的稳定性。研究表明，稳定性与当前策略下的优势符号和令牌分布密切相关。通过在数学推理和多跳问答基准测试中的实验，WAPO在多个模型家族中提高了训练稳定性，并且在性能上与基线相当或更优。'}}}, {'id': 'https://huggingface.co/papers/2606.18246', 'title': 'Variable-Width Transformers', 'url': 'https://huggingface.co/papers/2606.18246', 'abstract': 'Abstract A novel transformer architecture with nonuniform width allocation across layers achieves better performance and efficiency compared to uniform designs by utilizing a parameter-free residual resizing mechanism.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling model size, specifically depth and width, has driven significant progress in transformer-based language models. However, most architectures maintain a constant width across all layers, allocating a fixed parameter and computation budget evenly despite different layers potentially playing distinct computational roles. In this work, we empirically investigate nonuniform capacity allocation across network depth by proposing a times-shaped > <former architecture. This design maintains wider early and late layers while narrowing the middle layers, utilizing a parameter-free residual resizing mechanism. Across decoder-only language models ranging from 200M to 2B parameters (dense) and 3B parameters (MoE), our > <former consistently outperforms parameter-matched uniform baselines on language modeling loss. By reducing the average layer width, this architecture also requires fewer overall FLOPs (22% reduction under fitted loss-matched scaling curves) and smaller KV cache memory and I/O cost (15% reduction). In analysis, we show that this bottleneck structure results in qualitatively different representations in residual streams. Overall, our results demonstrate that nonuniform width allocation can result in more resource-optimal scaling of language models.', 'score': 5, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '58689a89a0def5b3', 'authors': ['Zhaofeng Wu', 'Oliver Sieberling', 'Shawn Tan', 'Rameswar Panda', 'Yury Polyanskiy', 'Yoon Kim'], 'affiliations': ['MIT', 'MIT-IBM Watson AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.18246.jpg', 'data': {'categories': ['#small_models', '#training', '#optimization', '#architecture'], 'emoji': '⏳', 'ru': {'title': 'Узкое горлышко: оптимальное распределение ширины в трансформерах', 'desc': 'В этой работе предлагается архитектура трансформера с неравномерным распределением ширины слоёв по глубине сети. Авторы показывают, что расширенные ранние и поздние слои в сочетании с узкими средними слоями превосходят стандартные архитектуры с единообразной шириной при одинаковом количестве параметров. Используется параметр-свободный механизм остаточного масштабирования (residual resizing), позволяющий эффективно соединять слои разной размерности. Предложенная архитектура снижает вычислительные затраты на 22% и требует меньше памяти для KV-кеша, демонстрируя преимущества неравномерного распределения ёмкости в языковых моделях.'}, 'en': {'title': 'Optimizing Transformer Efficiency with Nonuniform Layer Widths', 'desc': 'This paper introduces a new transformer architecture that varies the width of layers instead of keeping it constant, which improves both performance and efficiency. By using a parameter-free residual resizing mechanism, the model allocates more resources to the first and last layers while reducing the width of the middle layers. This nonuniform design leads to better language modeling results and requires fewer computational resources, such as FLOPs and memory. The findings suggest that adjusting layer widths based on their roles can optimize the scaling of language models more effectively than traditional uniform designs.'}, 'zh': {'title': '非均匀宽度分配，提升变换器效率', 'desc': '本文提出了一种新型的变换器架构，通过在各层之间采用非均匀的宽度分配，提升了性能和效率。与传统的均匀设计不同，该架构利用无参数的残差调整机制，使得早期和后期层的宽度更大，而中间层的宽度则较小。实验结果表明，这种非均匀的宽度分配在语言建模损失上优于参数匹配的均匀基线，并且减少了整体的计算量和内存开销。总的来说，非均匀宽度分配能够实现更具资源优化的语言模型扩展。'}}}, {'id': 'https://huggingface.co/papers/2606.17730', 'title': 'ActWorld: From Explorable to Interactive World Model via Action-Aware Memory', 'url': 'https://huggingface.co/papers/2606.17730', 'abstract': 'Abstract ActWorld extends navigation-centric interactive world models to support object interaction through a chunk-autoregressive framework with hierarchical action-aware memory and persistent memory banks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Interactive world models aim to simulate environment dynamics under real-time user actions. However, their action vocabulary is largely confined to navigation: most actions correspond to motion (e.g., walk, turn, look around), while interaction with objects in the scene (e.g., pick up plates, open doors, or trigger physical responses) is either absent, restricted to game domains, or relegated to prompt-to-full-video scenarios. The resulting worlds are visually explorable but not truly actionable. In this work, we present ActWorld, an interactive world model that extends prior navigation-centric generators to support mid-rollout object interaction within a chunk-autoregressive framework. We argue that the navigation-interaction gap stems from two bottlenecks. First, a data bottleneck: the lack of human-object interaction data with accurate, dense labels. Second, a memory bottleneck: recency-biased history compression in existing world models discards the event-transition frames that causally determine subsequent object states, leading to an action-forgetting pathology. On the data side, we construct a 100K interaction video dataset, each annotated with per-chunk captions via chain-of-thought reasoning. On the model side, we introduce a hierarchical action-aware memory design that routes history compression by interaction importance, complemented by a persistent memory bank that maintains event-update and object-identity tokens across long rollouts. Experiments show that ActWorld supports both flexible navigation and rich object interaction within a single model, substantially improving interaction fidelity over navigation-only baselines without sacrificing viewpoint control. Project page is available at https://interactwm.github.io/ActWorld.', 'score': 5, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '670da40381704597', 'authors': ['Zhexiao Xiong', 'Yizhi Song', 'Hao Kang', 'Qing Yan', 'Liming Jiang', 'Jenson Yang', 'Zhoujie Fu', 'Stathi Fotiadis', 'Angtian Wang', 'Zichuan Liu', 'Bo Liu', 'Yiding Yang', 'Xin Lu', 'Nathan Jacobs'], 'affiliations': ['Intelligent Creation, ByteDance', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2606.17730.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Мир, в котором можно не только смотреть, но и действовать', 'desc': 'ActWorld — это интерактивная модель мира, которая расширяет возможности навигационно-ориентированных генеративных моделей, добавляя поддержку взаимодействия с объектами в сцене. Авторы выявили две основные проблемы: нехватку данных с аннотациями взаимодействий человека и объектов, а также потерю важной информации при сжатии истории в существующих моделях. Решение включает набор из 100K видео с аннотациями, иерархическую архитектуру памяти, чувствительную к важности действий, и персистентные банки памяти для сохранения ключевых событий. Модель успешно объединяет гибкую навигацию и реалистичное взаимодействие с объектами в единую систему.'}, 'en': {'title': 'Bridging Navigation and Interaction in Virtual Worlds', 'desc': 'ActWorld is a new interactive world model that enhances traditional navigation-focused models by enabling users to interact with objects in a simulated environment. It addresses two main challenges: the lack of detailed human-object interaction data and the limitations of memory in existing models that forget important actions. By creating a large dataset of interaction videos and implementing a hierarchical memory system, ActWorld allows for more complex actions like picking up objects or opening doors while maintaining smooth navigation. This results in a more immersive and actionable experience in virtual environments, bridging the gap between navigation and interaction.'}, 'zh': {'title': '打破导航与交互的界限，开启智能世界新篇章', 'desc': 'ActWorld 是一种扩展导航中心交互世界模型的框架，支持对象交互。它通过分块自回归框架和层次化的动作感知记忆来实现这一点。该模型解决了数据瓶颈和记忆瓶颈的问题，构建了一个包含10万条交互视频的数据集，并引入了持久记忆库。实验表明，ActWorld 在单一模型中支持灵活的导航和丰富的对象交互，显著提高了交互的真实感。'}}}, {'id': 'https://huggingface.co/papers/2606.17321', 'title': 'ProCUA-SFT Technical Report', 'url': 'https://huggingface.co/papers/2606.17321', 'abstract': "Abstract Training computer-use agents using a large-scale synthetic dataset with automated task generation and verification achieves significantly improved performance on desktop interaction benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training computer-use agents (CUAs) -- models that interact with graphical desktops through screenshots and keyboard/mouse actions -- requires large-scale, diverse trajectory data collected in full desktop environments. The largest public resource, AgentNet (22.5K human trajectories), leads to negative transfer when used for supervised fine-tuning (SFT): continuing training UI-TARS 7B on AgentNet causes OSWorld success rate to fall from 26.3% to 8-10%. We present ProCUA-SFT, a dataset of 3.1M step-level SFT samples distilled from 93K synthetic trajectories across 2,484 application combinations. The dataset is produced by a fully automated pipeline that (i) synthesizes grounded tasks on live desktops seeded with real-world content -- 912 spreadsheets from SpreadsheetBench, approximately 10K permissively-licensed presentations from Zenodo10K, and multi-application OSWorld configs -- and (ii) verifies each task's feasibility through binary precondition checking before rollout. A single VLM (Kimi-K2.5) serves as goal generator, precondition judge, and trajectory executor, eliminating planner-actor capability gaps. Each trajectory is expanded into step-prefix samples that exactly reproduce the context layout seen at inference time. Fine-tuning UI-TARS 7B on ProCUA-SFT for one epoch yields 45.0% on OSWorld -- an 18.7 percentage-point improvement over the base model and over 35% above AgentNet-trained counterparts. A subset of ProCUA was incorporated into the training data for the Nemotron 3 Nano Omni model, contributing to its computer-use capabilities.", 'score': 4, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '6eb91e170d1a4828', 'authors': ['Jaehun Jung', 'Ximing Lu', 'Brandon Cui', 'Muhammad Khalifa', 'Shaokun Zhang', 'Hao Zhang', 'Jin Xu', 'Amala Sanjay Deshmukh', 'Karan Sapra', 'Andrew Tao', 'Yejin Choi', 'Jan Kautz', 'Mingjie Liu', 'Yi Dong'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.17321.jpg', 'data': {'categories': ['#dataset', '#training', '#agents', '#open_source', '#synthetic', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Синтетические данные для обучения агентов автоматизации рабочего стола', 'desc': 'В работе представлен метод обучения агентов компьютерного взаимодействия с использованием большого синтетического датасета ProCUA-SFT, содержащего 3.1 млн примеров для supervised fine-tuning. Датасет создан полностью автоматизированным конвейером, который синтезирует задачи на реальных десктопах с проверкой корректности через предусловия, избегая проблемы отрицательного переноса обучения. Одна модель VLM используется для генерации целей, проверки выполнимости и исполнения траекторий, что устраняет разрыв в способностях между планировщиком и исполнителем. Результаты показывают увеличение точности на бенчмарке OSWorld с 26.3% до 45.0%, что превосходит обучение на существующем датасете AgentNet более чем в два раза.'}, 'en': {'title': 'Boosting Computer-Use Agents with Synthetic Data', 'desc': 'This paper introduces ProCUA-SFT, a large-scale synthetic dataset designed to enhance the training of computer-use agents (CUAs) that interact with graphical user interfaces. The dataset consists of 3.1 million step-level samples derived from 93,000 synthetic trajectories across various applications, addressing the limitations of existing datasets like AgentNet. By employing an automated pipeline for task generation and verification, the authors ensure that the tasks are feasible and relevant for training. Fine-tuning the UI-TARS 7B model on this new dataset results in a significant performance boost, demonstrating the effectiveness of synthetic data in improving agent capabilities.'}, 'zh': {'title': '合成数据集提升计算机使用代理性能', 'desc': '本论文介绍了一种名为ProCUA-SFT的数据集，用于训练计算机使用代理（CUA），该数据集包含310万步级的样本，来源于93,000个合成轨迹。通过自动化流程生成的任务在真实桌面环境中进行验证，确保了任务的可行性。与现有的AgentNet数据集相比，使用ProCUA-SFT进行微调可以显著提高模型在桌面交互基准上的表现，成功率从26.3%提升至45.0%。这表明，合成数据集在训练复杂的交互模型中具有重要的应用价值。'}}}, {'id': 'https://huggingface.co/papers/2606.15345', 'title': 'Beyond Monolingual Deep Research: Evaluating Agents and Retrievers with Cross-Lingual BrowseComp-Plus', 'url': 'https://huggingface.co/papers/2606.15345', 'abstract': "Abstract Research agents face significant challenges when evidence is in a different language than the query, with performance degrading even when gold evidence is provided directly.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deep research agents are increasingly evaluated on their ability to search for evidence, reason over retrieved sources, and produce grounded answers. Existing browsing benchmarks, however, largely assume that the user's query and the supporting evidence are written in the same language, leaving open whether agentic search systems can operate when relevant evidence appears in another language. We introduce XBCP (Cross-lingual BrowseComp-Plus), a controlled benchmark that preserves the English question-and-answer space of BrowseComp-Plus but varies the languages of the supporting documents. XBCP instantiates two complementary settings: in the cross-lingual setting, each query is paired with evidence in a single assigned language. In the multilingual setting, the full evidence corpus is distributed equally and randomly across 12 languages spanning high-resource and low-resource regimes. We evaluate four deep research agents using sparse and dense multilingual retrievers, measuring answer accuracy, evidence recall, search behavior, calibration, citation fidelity, and oracle retrieval. Results reveal substantial degradation when evidence is translated. Even strong, dense retrievers lose evidence recall, and agents become less calibrated and cite evidence less reliably. Notably, accuracy remains lower even when all gold evidence is supplied directly. These findings suggest that cross-lingual deep research exposes both retrieval failures and an independent, agent-side difficulty in integrating language-mismatched evidence.", 'score': 4, 'issue_id': 2444, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'c5f562d63f83c981', 'authors': ['Yuheng Lu', 'Qingcheng Zeng', 'Heli Qi', 'Puxuan Yu', 'Fuheng Zhao', 'Rui Yang', 'Hitomi Yanaka', 'Naoto Yokoya', 'Weihao Xuan'], 'affiliations': ['Duke-NUS Medical School', 'Northwestern University', 'RIKEN AIP', 'Snowflake Inc.', 'The University of Tokyo', 'University of Utah', 'Waseda University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15345.jpg', 'data': {'categories': ['#multilingual', '#rag', '#agents', '#reasoning', '#machine_translation', '#low_resource', '#benchmark'], 'emoji': '🌐', 'ru': {'title': 'Преодоление языковых барьеров в интеллектуальном поиске доказательств', 'desc': 'В работе представлен новый бенчмарк XBCP для оценки способности research агентов работать с доказательствами на других языках. Авторы обнаружили, что современные системы глубокого поиска и рассуждений значительно теряют в производительности, когда запрос и поддерживающие документы написаны на разных языках. Даже при использовании высокоточных многоязычных retrieverов и предоставлении правильных доказательств агенты испытывают трудности с интеграцией информации на иностранных языках и становятся менее калиброванными. Результаты демонстрируют, что кроссязычный поиск выявляет как проблемы в получении релевантных документов, так и внутренние ограничения самих агентов в обработке многоязычного контента.'}, 'en': {'title': 'Bridging Language Gaps in Research Agents', 'desc': "This paper addresses the challenges faced by research agents when they encounter evidence in a different language than the query. It introduces a new benchmark called XBCP, which tests the performance of these agents in both cross-lingual and multilingual settings. The study evaluates various deep research agents using different retrieval methods and measures their accuracy, recall, and citation reliability. Results indicate that performance significantly declines when evidence is in a different language, highlighting issues in both retrieval and the agents' ability to integrate mismatched evidence."}, 'zh': {'title': '跨语言检索的挑战与机遇', 'desc': '本研究探讨了在不同语言之间进行信息检索的挑战，尤其是当查询与证据不在同一语言时，研究代理的表现显著下降。我们提出了XBCP（跨语言浏览比较增强版）基准，旨在评估研究代理在处理多语言证据时的能力。通过对四种深度研究代理进行评估，结果显示即使提供了所有的金证据，代理的准确性仍然较低，且在证据回忆和引用可靠性方面存在显著问题。这表明跨语言深度研究不仅暴露了检索失败，还揭示了代理在整合语言不匹配证据时的独立困难。'}}}, {'id': 'https://huggingface.co/papers/2606.15231', 'title': 'Visual-Seeker: Towards Visual-Native Multimodal Agentic Search via Active Visual Reasoning', 'url': 'https://huggingface.co/papers/2606.15231', 'abstract': "Abstract Visual-Seeker enables visual-native multimodal deep search through active visual reasoning, outperforming proprietary models on real-world web environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models (MLLMs) have demonstrated impressive capabilities in many visual tasks, but they often struggle with factual grounding when confronted with complex, open-world scenarios. While recent multimodal deep search agents attempt to address this issue by utilizing external tools, the visual-native search paradigm remains underexplored. Existing methods primarily rely on simple images with explicit semantics and text-only evidence trajectories, limiting the agent's ability to perform multi-hop, cross-modal reasoning and search. To address these limitations, we propose Visual-Seeker, a visual-native multimodal deep search agent via active visual reasoning. Rather than treating vision as a static input, our agent actively attends to fine-grained visual details, dynamically harvests visual evidence throughout the search process. To unlock its visual-native potential, we design an active visual reasoning data pipeline and synthesize 5K high-quality multimodal trajectories for model training. Extensive experiments demonstrate the state-of-the-art performance across five challenging multimodal search benchmarks, even surpassing several proprietary models, validating robust visual-native reasoning and search in real-world web environments. The code and data can be accessed at: https://github.com/ZhengboZhang/Visual-Seeker.", 'score': 3, 'issue_id': 2446, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'b5a48431c4c1f413', 'authors': ['Zhengbo Zhang', 'Changtao Miao', 'Jinbo Su', 'Zhaowen Zhou', 'Chunxia Zhang', 'Xukai Wang', 'Ruiqi Liu', 'Kaiyuan Zheng', 'Jiansheng Cai', 'Bo Zhang', 'Zhe Li', 'Shiming Xiang', 'Ying Yan'], 'affiliations': ['Ant Digital Technologies, Ant Group', 'BIT', 'Institute of Automation, CAS', 'RUC', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2606.15231.jpg', 'data': {'categories': ['#synthetic', '#reasoning', '#benchmark', '#agents', '#open_source', '#dataset', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Визуальное рассуждение для глубокого поиска в многомодальных данных', 'desc': 'Visual-Seeker — это многомодальный агент глубокого поиска, который использует активное визуальное рассуждение для анализа сложных web-сценариев. Модель преодолевает ограничения существующих подходов, активно обрабатывая визуальные детали и собирая мультиmodal доказательства на протяжении поиска. Авторы создали специальный pipeline для генерации 5000 высокачественных траекторий обучения, позволяющих агенту выполнять многошаговое кросс-модальное рассуждение. Система достигает state-of-the-art результаты на пяти бенчмарках и превосходит некоторые проприетарные модели в задачах визуального поиска в реальной web-среде.'}, 'en': {'title': 'Unlocking Visual-Native Search with Active Reasoning', 'desc': 'Visual-Seeker is a multimodal deep search agent that enhances visual reasoning by actively engaging with visual details during the search process. Unlike traditional models that treat images as static inputs, it dynamically gathers visual evidence, allowing for more complex reasoning across different modalities. The agent is trained using a specially designed data pipeline that includes 5,000 high-quality multimodal trajectories, improving its ability to handle real-world web environments. Experimental results show that Visual-Seeker outperforms existing proprietary models on various multimodal search tasks, demonstrating its effectiveness in visual-native reasoning.'}, 'zh': {'title': '视觉原生深度搜索的未来', 'desc': 'Visual-Seeker 是一种通过主动视觉推理实现的视觉原生多模态深度搜索代理。它能够在复杂的开放世界场景中，超越现有的专有模型，展现出卓越的性能。该方法通过动态关注细致的视觉细节，收集视觉证据，从而支持多跳跨模态推理和搜索。实验结果表明，Visual-Seeker 在多个多模态搜索基准测试中表现出色，验证了其在真实网络环境中的强大视觉推理能力。'}}}, {'id': 'https://huggingface.co/papers/2606.17168', 'title': 'RepSelect: Robust LLM Unlearning via Representation Selectivity', 'url': 'https://huggingface.co/papers/2606.17168', 'abstract': 'Abstract RepSelect isolates forget-set-specific representations in LLMs by collapsing top principal components of weight gradients, achieving deeper and more robust unlearning compared to existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Making large language models (LLMs) deeply forget specific knowledge and values without sacrificing general capabilities remains a central challenge in unlearning. However, current methods are easily reversed by fine-tuning or few-shot prompting, suggesting their forgetting is only shallow. We identify the root cause. Existing methods target representations shared with both the retain set and the subspace recovered by a fine-tuning attacker, making unlearning both disruptive to general capabilities and easy to reverse. We propose RepSelect (Representation Selectivity), isolates forget-set-specific representations by collapsing top principal components of weight gradients before each update, leaving general capabilities intact while limiting what fine-tuning can recover. We evaluate across two forget categories, biohazardous knowledge and abusive tendencies, and four model families spanning dense and Mixture-of-Experts architectures (Llama 3, Qwen 3.5, Gemma 4 E4B, DeepSeek V2 Lite). Compared to five popular baselines (GradDiff, NPO, SimNPO, RMU, UNDIAL), RepSelect achieves a 4-50x larger reduction in post-relearning answer accuracy than the strongest baseline, and is near-perfectly robust to few-shot prompting attacks. Targeting selective representations is thus an important step towards deep and robust LLM forgetting.', 'score': 2, 'issue_id': 2445, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '966776adad13eac7', 'authors': ['Filip Sondej', 'Yushi Yang', 'Adam Mahdi'], 'affiliations': ['Independent', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.17168.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🧠', 'ru': {'title': 'Селективное изоляция представлений для глубокого забывания в LLM', 'desc': 'В статье предлагается метод RepSelect для глубокого и надёжного забывания в больших языковых моделях путём изоляции представлений, специфичных для набора данных для удаления. Метод работает путём схлопывания главных компонент матриц градиентов весов перед каждым обновлением, что позволяет сохранить общие возможности модели. Авторы демонстрируют, что существующие методы забывания легко обратимы при помощи fine-tuning, поскольку они воздействуют на представления, общие между сохраняемым и удаляемым наборами данных. RepSelect показывает в 4-50 раз лучшие результаты по сравнению с базовыми методами и обладает устойчивостью к атакам few-shot prompting на различных семействах моделей, включая архитектуры Mixture-of-Experts.'}, 'en': {'title': 'Deep Unlearning with Selective Representation Isolation', 'desc': "The paper introduces RepSelect, a method designed to enhance the unlearning process in large language models (LLMs) by isolating specific representations related to forget sets. By collapsing the top principal components of weight gradients, RepSelect achieves deeper unlearning without compromising the model's overall capabilities. This approach addresses the limitations of existing methods, which often result in shallow forgetting that can be easily reversed through fine-tuning or prompting. The evaluation shows that RepSelect significantly outperforms traditional methods, providing a more robust solution for managing sensitive knowledge in LLMs."}, 'zh': {'title': '深度遗忘，稳健选择', 'desc': '本文提出了一种名为RepSelect的方法，用于在大型语言模型（LLMs）中实现深度遗忘特定知识和价值观。通过在每次更新前压缩权重梯度的主要成分，RepSelect能够隔离与遗忘集相关的特定表示，从而保持模型的通用能力。与现有方法相比，RepSelect在遗忘后学习的准确性上减少了4到50倍，且对少量提示攻击表现出近乎完美的鲁棒性。这表明，针对选择性表示的研究是实现深度和稳健的LLM遗忘的重要一步。'}}}, {'id': 'https://huggingface.co/papers/2606.13811', 'title': 'Aligning Quantum Operators with Large Language Models', 'url': 'https://huggingface.co/papers/2606.13811', 'abstract': 'Abstract Large language models can be adapted to understand quantum operators by mapping unitary matrices into their latent space, enabling quantum circuit synthesis and language-conditioned gate constraint specification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Can Large Language Models (LLMs) understand and reason about quantum operators? Despite their remarkable capabilities in mathematics and symbolic reasoning, LLMs remain inherently blind to quantum representations such as unitary matrices. In this work, we take a step toward bridging this gap by introducing an approach that maps unitary operators into the latent space of an LLM, enabling unified modeling over quantum and linguistic inputs. We instantiate this idea on Clifford+T circuit synthesis over a Pauli rotation gate set, where our model achieves results competitive with state-of-the-art methods and scales consistently with training data, with no signs of saturation. Our approach further enables language-conditioned synthesis, allowing gate constraints unseen during training to be specified directly in natural language. This work suggests a path toward quantum--aware foundation models that can natively interpret and reason about quantum operations, which could have broader implications reaching across quantum compilation and algorithm discovery.', 'score': 2, 'issue_id': 2444, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'd0641f36e5220bb2', 'authors': ['Rogerio Feris', 'Yunchao Liu', 'Pengyuan Li', 'Hang Hua', 'David Kremer'], 'affiliations': ['IBM Quantum', 'IBM Research', 'MIT-IBM Computing Research Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.13811.jpg', 'data': {'categories': ['#training', '#reasoning', '#architecture', '#transfer_learning', '#science', '#multimodal'], 'emoji': '⚛️', 'ru': {'title': 'Мосту между языком и квантом: учим LLM понимать квантовые операторы', 'desc': 'В работе предложен метод адаптации большых языковых моделей для понимания квантовых операторов путём отображения унитарных матриц в скрытое пространство LLM. Модель обучается на задаче синтеза квантовых схем Clifford+T над базисом ротаций Паули и показывает результаты, конкурентные с современными методами. Подход поддерживает синтез, управляемый естественным языком, что позволяет задавать ограничения на квантовые вентили непосредственно текстом без переобучения. Работа демонстрирует потенциал создания квантово-осведомленных фундаментальных моделей, способных интерпретировать и рассуждать о квантовых операциях, с применениями в квантовой компиляции и открытии алгоритмов.'}, 'en': {'title': 'Bridging Language and Quantum: LLMs Meet Unitary Operators', 'desc': 'This paper explores how large language models (LLMs) can be adapted to understand quantum operators by mapping unitary matrices into their latent space. This adaptation allows for the synthesis of quantum circuits and the specification of gate constraints using natural language. The authors demonstrate their method on Clifford+T circuit synthesis, achieving competitive results with existing techniques while effectively scaling with training data. The findings suggest a future where LLMs can natively interpret quantum operations, potentially impacting quantum compilation and algorithm discovery.'}, 'zh': {'title': '量子算子的语言理解新突破', 'desc': '本研究探讨了大型语言模型（LLMs）如何理解量子算子。我们提出了一种方法，将单位矩阵映射到LLM的潜在空间，从而实现量子电路的合成和语言条件下的门约束指定。通过在Clifford+T电路合成中应用该方法，我们的模型在与最先进的方法竞争时表现出色，并且随着训练数据的增加，性能持续提升。此研究为量子感知基础模型的开发提供了新思路，使其能够原生地解释和推理量子操作。'}}}, {'id': 'https://huggingface.co/papers/2606.15134', 'title': 'Beyond Scalar Distances: Semantic Attribute Gradients from Frozen MLLMs for Visual Embeddings', 'url': 'https://huggingface.co/papers/2606.15134', 'abstract': "Abstract SAGA framework uses multimodal large language models to provide attribute-aware supervision for vision encoders through Group Relative Policy Optimization, improving zero-shot image retrieval performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision encoders for retrieval are typically trained with class-label supervision: each training pair reduces to a scalar that uniformly pushes the embedding apart or pulls it together, as if every visual attribute either differed or matched. A multimodal large language model (MLLM), shown the same pair, can articulate those attributes and use them to predict whether the images share a class. We propose SAGA, a framework that turns this language-grounded, attribute-aware perception into a training signal for the encoder itself. Specifically, we use Group Relative Policy Optimization (GRPO) to reward the MLLM for correct predictions on the vision encoder's tokens. Since correct predictions require those tokens to expose the specific attributes that differ or match between the pair, the gradient pushes the encoder to encode them, replacing the uniform pair-level scalar with attribute-resolved supervision. An auxiliary attention-distillation loss anchors the encoder's embedding to tokens the MLLM attended to, and a standard metric-learning loss shapes the embedding geometry for nearest-neighbour retrieval. The MLLM is frozen throughout and discarded at inference, matching the deployment cost of a metric-learning baseline. SAGA improves Recall@1 by 3 to 6 points over state-of-the-art baselines on CUB-200-2011, Cars-196, FGVC-Aircraft, and iNaturalist Aves on zero-shot image retrieval.", 'score': 1, 'issue_id': 2448, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': '9d5e2c29d84872d5', 'authors': ['Shubhang Bhatnagar', 'Dheeraj Baiju', 'Narendra Ahuja'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.15134.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#multimodal', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Атрибут-ориентированное обучение кодировщиков через языковые модели', 'desc': 'Статья представляет фреймворк SAGA, который использует мультимодальные большие языковые модели для обучения кодировщиков изображений с учетом визуальных атрибутов. Вместо простого скалярного сигнала, который одинаково отталкивает или притягивает эмбеддинги, фреймворк применяет Group Relative Policy Optimization для получения детальной обратной связи об атрибутах, которыми отличаются или совпадают изображения. Замороженная языковая модель анализирует пары изображений и предсказывает их класс, что позволяет обучить кодировщик кодировать именно те атрибуты, которые важны для различия объектов. В результате на этапе вывода модель работает с той же вычислительной стоимостью, что и базовые методы метрического обучения, но достигает значительного улучшения в задаче нулевого обучения поиска изображений.'}, 'en': {'title': 'SAGA: Attribute-Aware Supervision for Enhanced Image Retrieval', 'desc': 'The SAGA framework enhances zero-shot image retrieval by utilizing multimodal large language models (MLLMs) to provide attribute-aware supervision for vision encoders. Instead of relying solely on class-label supervision, SAGA employs Group Relative Policy Optimization (GRPO) to reward the MLLM for accurately predicting shared attributes between image pairs. This approach allows the vision encoder to focus on specific attributes that differentiate or align images, leading to improved encoding of relevant features. As a result, SAGA achieves significant performance gains in image retrieval tasks across various datasets, outperforming existing state-of-the-art methods.'}, 'zh': {'title': 'SAGA：提升零样本图像检索的新方法', 'desc': 'SAGA框架利用多模态大语言模型为视觉编码器提供属性感知的监督，从而通过群体相对策略优化（GRPO）提高零样本图像检索的性能。传统的视觉编码器训练通常依赖于类标签监督，而SAGA通过语言模型识别图像对的具体属性，生成更精确的训练信号。该框架通过奖励语言模型对视觉编码器标记的正确预测，推动编码器更好地捕捉图像之间的属性差异或相似性。最终，SAGA在多个数据集上显著提高了检索性能，展示了其在图像检索任务中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.15158', 'title': 'RefGC-SR^2: Reference-guided Generated Content Super-Resolution and Refinement', 'url': 'https://huggingface.co/papers/2606.15158', 'abstract': 'Abstract A new reference-guided generated content super-resolution-refinement task is introduced that simultaneously recovers high-resolution details and refines generative artifacts using a frequency-aware diffusion transformer model.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reference-guided generation (e.g., object compositing, customization) has progressed rapidly, yet current pipelines share a fundamental limitation: the object-centric high-resolution reference image (HRRI) provided by users is downsampled to a fixed low-resolution (LR) before being fed into the model, so the fine-grained details are discarded before the output is even produced. In addition, the generation step then introduces its own artifacts (e.g., identity distortion) on top of this loss. Existing reference-guided generated content refinement (RefGCR) methods can correct some of these artifacts but still operate in the LR domain; reference-guided super-resolution (RefSR) methods recover resolution but assume natural-image degradations and ignore the artifact distribution of generative pipelines. To address both gaps in a single formulation, we introduce a new task: reference-guided generated content super-resolution-refinement (RefGC-SR^2), where the original HRRI is reused at the post-processing stage to recover lost details, refine generative artifacts, and upscale the output simultaneously. We construct the first real-world triplet data generation pipeline for this RefGC-SR^2 task, training a diptych-conditioned generator to synthesize paired low-quality anchors that public pretrained models cannot provide. We further present a frequency-aware diffusion transformer model for RefGC-SR^2 that selectively injects fine details from the HRRI while removing generative artifacts. Extensive experiments demonstrate that our RefGC-SR^2 model successfully (i) refines the object identity faithfully with respect to the reference, and (ii) recovers high-resolution details, so that the final result is significantly higher quality and practically more usable compared to existing RefGCR and RefSR baselines.', 'score': 1, 'issue_id': 2445, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'f81a9e12d34c69de', 'authors': ['Jeahun Sung', 'Dahyeon Kye', 'Soo Ye Kim', 'Jihyong Oh'], 'affiliations': ['Adobe Research', 'CMLab, Chung-Ang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15158.jpg', 'data': {'categories': ['#synthetic', '#dataset', '#cv', '#multimodal', '#architecture', '#diffusion'], 'emoji': '✨', 'ru': {'title': 'Частотно-ориентированное уточнение генерируемого контента через эталонное супер-разрешение', 'desc': 'В статье предложена новая задача улучшения сгенерированного контента с использованием эталонного изображения высокого разрешения. Авторы представляют модель на основе diffusion transformer, которая одновременно восстанавливает мелкие детали и удаляет артефакты, возникшие во время генерации. Для обучения модели создан первый датасет с тройками изображений, где используется специальный метод синтеза низкокачественных пар изображений. Экспериментальные результаты показывают, что предложенный подход превосходит существующие методы как по качеству восстановления деталей, так и по исправлению ошибок генеративных моделей.'}, 'en': {'title': 'Enhancing Generated Images with Reference-Guided Super-Resolution', 'desc': 'This paper introduces a new task called reference-guided generated content super-resolution-refinement (RefGC-SR^2), which aims to improve the quality of generated images by recovering high-resolution details and refining artifacts. The authors highlight a common issue in existing methods where high-resolution reference images are downsampled, leading to the loss of fine details before the generation process. To overcome this, they propose a frequency-aware diffusion transformer model that utilizes the original high-resolution reference image during post-processing to enhance the output. Their extensive experiments show that the RefGC-SR^2 model effectively preserves object identity and significantly improves image quality compared to previous methods.'}, 'zh': {'title': '参考引导生成内容的超分辨率精炼新方法', 'desc': '本文提出了一种新的参考引导生成内容超分辨率精炼任务，旨在同时恢复高分辨率细节并精炼生成伪影。当前的生成管道在处理用户提供的高分辨率参考图像时，通常会将其降采样为固定的低分辨率，从而丢失细致的细节。为了解决这一问题，本文引入了参考引导生成内容超分辨率精炼（RefGC-SR^2）任务，利用原始高分辨率参考图像在后处理阶段恢复丢失的细节并精炼生成伪影。通过构建首个真实世界的三元组数据生成管道，本文的模型在恢复对象身份和高分辨率细节方面表现出色，显著提高了生成结果的质量和实用性。'}}}, {'id': 'https://huggingface.co/papers/2606.15142', 'title': 'MotionVLA: Vision-Language-Action Model for Humanoid Motion', 'url': 'https://huggingface.co/papers/2606.15142', 'abstract': 'Abstract A dual-stream frequency tokenizer and autoregressive model are proposed to improve humanoid motion generation by separately encoding pose and physical dynamics, achieving better diversity and consistency compared to single-codebook approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating realistic humanoid motion from scene images and text involves both low-frequency pose semantics and high-frequency physical dynamics. However, many existing methods tokenize motion with a single shared codebook, forcing heterogeneous motion signals into the same quantization space. Our frequency-domain analysis of human motion data reveals a clear mismatch between single-codebook quantization and motion statistics: five DCT coefficients capture 93% of joint-position energy but only 37% of joint-velocity energy, which can bias quantization toward pose statistics and under-represent high-frequency velocity components. A second challenge lies in adapting a standard autoregressive model to effectively model high-frequency physical signals in motion sequences. Therefore, we propose DSFT, a dual-stream frequency tokenizer that separates motion into Base and physical streams and compresses them independently with DCT truncation and BPE. Furthermore, we present MotionVLA, a Qwen3.5-based model that arranges Base and physical tokens in a unified sequence, where Phys tokens are predicted after Base tokens. Experiments on HumanML3D and MBench show that, despite using a lightweight 2B backbone, MotionVLA reduces the Diversity gap to real data by over 50% on HumanML3D and improves Motion-Condition Consistency by 3.8% on MBench, supporting frequency-aware dual-stream decoupling as an effective formulation for autoregressive motion generation. Code: https://github.com/AIGeeksGroup/MotionVLA. Website: https://aigeeksgroup.github.io/MotionVLA.', 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': '238735ae062cab51', 'authors': ['Nonghai Zhang', 'Siyu Zhai', 'Yanjun Li', 'Zeyu Zhang', 'Zhihan Yin', 'Yandong Guo', 'Boxin Shi', 'Hao Tang'], 'affiliations': ['AI2 Robotics', 'School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15142.jpg', 'data': {'categories': ['#training', '#dataset', '#optimization', '#open_source', '#small_models', '#architecture', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Разделение частот для реалистичной генерации движений', 'desc': 'В статье предлагается двухпоточный частотный токенизатор для улучшения генерации движений гуманоидов путём раздельного кодирования позы и физической динамики. Авторы показали, что единый кодбук неэффективно представляет низкочастотную семантику позы и высокочастотные компоненты скорости суставов, что приводит к смещению квантизации. Для решения этой проблемы предложена модель MotionVLA, которая разделяет движение на базовый и физический потоки, сжимая их независимо с помощью усечения DCT и BPE. Экспериментальные результаты демонстрируют значительное улучшение разнообразия и согласованности движений по сравнению с существующими методами на базе единого кодбука.'}, 'en': {'title': 'Enhancing Humanoid Motion with Dual-Stream Frequency Tokenization', 'desc': 'This paper introduces a dual-stream frequency tokenizer and an autoregressive model to enhance humanoid motion generation. By separately encoding pose and physical dynamics, the proposed method achieves improved diversity and consistency compared to traditional single-codebook approaches. The authors highlight that existing methods often misrepresent motion signals due to a mismatch in quantization, which can lead to biased representations of motion. The experiments demonstrate that the new model, MotionVLA, significantly reduces the diversity gap and improves motion consistency, validating the effectiveness of frequency-aware dual-stream decoupling in autoregressive motion generation.'}, 'zh': {'title': '双流频率标记，提升类人运动生成', 'desc': '本文提出了一种双流频率标记器和自回归模型，以改善类人运动生成。该方法通过分别编码姿势和物理动态，显著提高了生成运动的多样性和一致性。研究表明，现有方法使用单一代码本进行运动标记，导致对高频速度成分的低估。通过频域分析，本文展示了双流解耦的有效性，能够更好地捕捉运动信号的特征。'}}}, {'id': 'https://huggingface.co/papers/2606.17182', 'title': 'Verified Detection and Prevention of Concurrency Anomalies in Multi-Agent Large Language Model Systems', 'url': 'https://huggingface.co/papers/2606.17182', 'abstract': "Abstract Multi-agent LLM systems with shared state are analyzed through formal methods identifying concurrency anomalies and establishing a verified consistency hierarchy with mechanized proofs of soundness and completeness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-agent LLM systems share state through memory stores, vector indices, and tool registries. We model such sharing as long-running read-generate-write operations under deterministic-generation semantics -- the regime durable-execution engines enforce by deterministic replay -- and formalize four concurrency anomalies in TLA+: stale-generation, phantom-tool, causal-cascade, and tool-effect reordering, structural analogues of classical isolation anomalies, each with a TLC counter-example. The exclusion lattice over these anomalies is trivial; the contribution is the mechanically verified realizability and strict separation of one maximal chain within it, L_0 subsetneq cdots subsetneq L_4, to our knowledge the first machine-checked consistency hierarchy for such runtimes. A development of 274 Verus obligations (zero assume, zero admit; trust base: two structural axioms and a mutex correspondence) proves the detectors sound and complete against the specifications and each runtime its avoidance set. Three deployed Rust runtimes realize L0-L1 (pessimistic locking, serializable snapshot isolation, default-SI), each verified against stale-generation and refined to its state machine; L2-L4 are exec-mode-verified with dependency-free prevention twins (A3, A6, A2: 0/1000 versus 1000/1000), and L2 is run live across three model families (A3 prevented in all 120 retracted sessions). We reproduce a silent lost update in ByteDance's deer-flow, formalizing its fix as a verified L_0 to L_1 refinement, and exhibit tool-effect reordering in LangGraph's ToolNode on unmodified output, removed by an L3 commit-order sequencer. The verified detector, refinements, and realizability artifacts are the contribution; the phenomena and lattice are classical.", 'score': 0, 'issue_id': 2447, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '241fdf04d9340e61', 'authors': ['Sajjad Khan'], 'affiliations': ['independent researcher'], 'pdf_title_img': 'assets/pdf/title_img/2606.17182.jpg', 'data': {'categories': ['#agents', '#training', '#architecture'], 'emoji': '🔒', 'ru': {'title': 'Формальная верификация консистентности в многоагентных системах на основе LLM', 'desc': "В работе исследуются системы из множества LLM агентов, которые совместно используют общее состояние, через формальные методы с целью выявления ошибок в конкурентности. Авторы формализуют в TLA+ четыре аномалии параллелизма (устаревшее поколение, фантомный инструмент, каскадная причинность и переупорядочение эффектов), которые являются аналогами классических нарушений изоляции в базах данных. С помощью механизированного доказательства они установляют проверенную иерархию согласованности из пяти уровней (L0-L4) с полнотой и корректностью детекторов аномалий. Исследование включает три развёрнутых runtime'а на Rust, демонстрирует реальные ошибки в системах ByteDance и LangGraph, и предоставляет верифицированные исправления."}, 'en': {'title': 'Ensuring Consistency in Multi-Agent LLM Systems', 'desc': 'This paper investigates multi-agent large language model (LLM) systems that share state and identifies potential concurrency issues using formal methods. It introduces a consistency hierarchy that is verified through mechanized proofs, ensuring soundness and completeness in the context of shared memory operations. The authors formalize four types of concurrency anomalies, drawing parallels to classical isolation anomalies, and provide a verified framework for detecting and avoiding these issues. The findings include practical implementations in Rust that demonstrate the effectiveness of the proposed solutions in real-world scenarios.'}, 'zh': {'title': '多智能体系统的一致性与并发异常分析', 'desc': '本文分析了多智能体大语言模型（LLM）系统的共享状态，使用形式化方法识别并解决并发异常。研究中定义了四种并发异常，包括过时生成、幻影工具、因果级联和工具效应重排序，并通过TLA+形式化这些概念。文章提出了一种经过机械验证的一致性层次结构，首次实现了对这些运行时的严格分离和最大链的验证。最后，作者展示了在实际应用中如何修复这些异常，并提供了相应的验证工具和改进方案。'}}}, {'id': 'https://huggingface.co/papers/2606.17081', 'title': 'The Price of Anarchy in Disaggregated Inference', 'url': 'https://huggingface.co/papers/2606.17081', 'abstract': 'Abstract Disaggregated inference architectures separate prefill and decode phases across distinct GPU pools, and a game-theoretic analysis characterizes how GPU saturation affects system performance through regime transitions and payoff structure changes, enabling an adaptive controller to optimize routing and reduce latency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Disaggregated inference architectures physically separate prefill and decode phases onto distinct GPU pools, creating competing "agents" that share a fixed hardware budget. We provide, to our knowledge, the first formal game-theoretic analysis of this architecture, using NVIDIA Dynamo as a concrete case study. We model disaggregated serving as three coupled games: a two-player resource game between prefill and decode pools, a selfish caching game over the hierarchical KV cache, and a congestion game with positive externalities for request routing. We empirically validate the latter two; the P/D resource game is treated analytically (Section 9.2). We characterize how GPU saturation induces regime transitions that shift the game\'s payoff structure: below saturation, selfish behavior has bounded Price of Anarchy (PoA); at saturation, superlinear latency and cache externalities drive our empirical estimator PoA-hat (defined in Section 6.4) upward. Based on this analysis, we design an adaptive controller that detects saturation transitions in real time and adjusts routing parameters accordingly, shifting from cache-affinity exploitation to load-balanced congestion avoidance. We instantiate our framework on a 3-node NVIDIA B200 cluster running Dynamo with two models, Nemotron-4-340B (TP=8, full-node workers with cross-InfiniBand KV transfers) and Llama-3.1-70B (TP=4), and find the same three-regime PoA-hat structure with the same first post-knee grid point (C=128) on both models. Adaptive routing shifts each model to a better operating point. Our strongest result is on the 70B 1P/5D topology, where PoA-hat drops 3.1x (66.4 to 21.5) in the saturated phase at a 13% throughput cost. On the 70B 1P/2D, PoA-hat drops 2.2x and TTFT P99 drops 7.6x (see Section 8.5).', 'score': 0, 'issue_id': 2446, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '034dc3746ce60868', 'authors': ['Athos Georgiou'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.17081.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#inference'], 'emoji': '🎮', 'ru': {'title': 'Теоретико-игровая оптимизация архитектур разделённого инференса больших языковых моделей', 'desc': 'В работе предложен первый теоретико-игровой анализ архитектур разделённого инференса, где фаза префилла и фаза декодирования работают на отдельных GPU пулах. Авторы моделируют систему как три взаимосвязанные игры: игру за ресурсы между пулами, игру кэширования KV токенов и игру маршрутизации с положительными внешними эффектами. Исследование показывает, что при насыщении GPU происходит переход режимов, при котором эгоистическое поведение компонентов приводит к значительной потере эффективности системы. На основе анализа разработан адаптивный контроллер, который определяет момент насыщения и динамически меняет параметры маршрутизации для оптимизации задержки.'}, 'en': {'title': 'Optimizing GPU Performance with Game Theory in Disaggregated Architectures', 'desc': 'This paper discusses disaggregated inference architectures that split the prefill and decode processes across different GPU pools, treating them as competing agents. It introduces a game-theoretic framework to analyze how GPU saturation impacts performance, revealing shifts in the payoff structure during different operational regimes. The authors develop an adaptive controller that optimizes routing based on real-time saturation detection, enhancing system efficiency and reducing latency. Empirical results demonstrate significant improvements in performance metrics, particularly in saturated conditions, validating the effectiveness of the proposed adaptive routing strategy.'}, 'zh': {'title': '自适应控制器优化GPU资源分配', 'desc': '本文探讨了分散推理架构如何将预填充和解码阶段分配到不同的GPU池中，并通过博弈论分析GPU饱和度对系统性能的影响。我们将分散服务建模为三个耦合的博弈，包括预填充和解码池之间的资源博弈、自私缓存博弈以及请求路由的拥堵博弈。研究表明，GPU饱和会导致博弈的收益结构发生变化，从而影响系统的延迟和性能。基于此分析，我们设计了一种自适应控制器，能够实时检测饱和状态并调整路由参数，以优化系统性能。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (8)', '#agi', '#alignment', '#architecture (11)', '#audio', '#benchmark (12)', '#cv (7)', '#data', '#dataset (7)', '#diffusion (4)', '#ethics', '#games (2)', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability (2)', '#leakage', '#long_context (1)', '#low_resource (2)', '#machine_translation (2)', '#math', '#multilingual (2)', '#multimodal (10)', '#open_source (8)', '#optimization (10)', '#plp (2)', '#rag (2)', '#reasoning (8)', '#rl (1)', '#rlhf (2)', '#robotics (1)', '#science (2)', '#security', '#small_models (4)', '#story_generation', '#survey', '#synthetic (5)', '#training (16)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-17 22:31',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-17 22:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-17 22:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
