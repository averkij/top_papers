    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.30534', 'title': 'Orca: The World is in Your Mind', 'url': 'https://huggingface.co/papers/2606.30534', 'abstract': "Abstract Orca establishes a unified world latent space through next-state-prediction modeling using multimodal data and demonstrates superior performance in downstream tasks compared to specialized baselines.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Orca, an initial instantiation of a general world foundation model. Orca learns a unified world latent space from multimodal world signals and exposes it through multimodal readout interfaces. Rather than optimizing isolated next-token, next-frame, or next-action prediction, we are centered on Next-State-Prediction modeling, offering a unified state-transition modeling route toward understanding, predicting, and acting upon the world. Orca learns through two complementary paradigms: unconscious learning captures dense natural state transitions from continuous videos, and conscious learning models sparse meaningful state transitions by language-described events and VQA supervision. For pre-training, we construct a large-scale world-learning inventory data, including 125K hours of video data and 160M event annotations. After pre-training, Orca learns a unified world latent space. To examine whether the learned latent supports downstream, we evaluate it by three representative downstream readouts: text generation, image prediction, and embodied action generation. Orca's backbone is frozen, and only the lightweight modality-specific decoders are trainable. Experiments show the scalability of the proposed paradigm and verify that stronger world latent enables stronger downstream readouts. Orca outperforms similar-sized specialized baselines. These results show that Orca, as a general world foundation model, presents a promising approach to understanding, predicting, and acting upon the world. Finally, we discuss the current limitations, aiming to provide useful insights and inspiration for the community.", 'score': 79, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'afe1def3f371fb28', 'authors': ['Yihao Wang', 'Yuheng Ji', 'Mingyu Cao', 'Yanqing Shen', 'Runze Xiao', 'Huaihai Lyu', 'Senwei Xie', 'Euan Liu', 'Klara Tian', 'Tianfeng Long', 'Yichi Zhang', 'Zhengliang Cai', 'Ruike Chen', 'Jifan Zhao', 'Ruochuan Shi', 'Zihan Tang', 'Jing Lyu', 'Wenxing Tan', 'Ningbo Zhang', 'Yangtao Hu', 'Yuming Gao', 'Xiansheng Chen', 'Junkai Zhao', 'Congsheng Xu', 'Boan Zhu', 'Ziqi Wang', 'Yupu Feng', 'Qiongqiong Zhang', 'Yingli Zhao', 'Yulong Ao', 'Shaoxuan Xie', 'You Liu', 'Guocai Yao', 'Leiduo Zhang', 'Xiaodan Liu', 'Yunyan Zhang', 'Yance Jiao', 'Xinyan Yang', 'Jiaxing Wei', 'Xu Liu', 'Tengfei Pan', 'Shaokai Nie', 'Chunlei Men', 'Sen Cui', 'Xiaojie Jin', 'Hongyang Li', 'Jianlan Luo', 'Yao Mu', 'Yunchao Wei', 'Jun Yan', 'Hang Zhao', 'Xiaolong Zheng', 'Jiaming Li', 'Yonghua Lin', 'Tiejun Huang', 'Zhongyuan Wang', 'Pengwei Wang'], 'affiliations': ['Beijing Academy of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2606.30534.jpg', 'data': {'categories': ['#dataset', '#video', '#multimodal', '#training', '#architecture'], 'emoji': '🌍', 'ru': {'title': 'Единое латентное пространство мира для понимания, предсказания и действия', 'desc': 'Orca — это общая модель-основание для понимания мира, которая обучается единому латентному пространству через предсказание следующего состояния на мультимодальных данных. Модель использует два дополнительных подхода: неосознанное обучение на видеопотоках и осознанное обучение на языковых описаниях событий. После предварительного обучения на 125K часах видео и 160M аннотаций Orca демонстрирует превосходную производительность во множестве задач: генерация текста, предсказание изображений и генерация действий для робототехники.'}, 'en': {'title': 'Orca: A Unified Model for Understanding and Predicting the World', 'desc': 'Orca is a new machine learning model that creates a unified representation of the world by predicting future states using various types of data. It combines two learning methods: unconscious learning from continuous video data and conscious learning from language-based events. This model is trained on a massive dataset, allowing it to excel in tasks like text generation, image prediction, and action generation. Orca shows that a strong world representation can improve performance in these tasks compared to specialized models.'}, 'zh': {'title': 'Orca：通用世界模型的创新之路', 'desc': 'Orca是一个通用的世界基础模型，通过多模态数据的下一状态预测建模，建立了一个统一的世界潜在空间。它通过无意识学习和有意识学习两种互补的方式进行学习，捕捉自然状态的转变和有意义的事件。Orca在预训练阶段使用了大规模的数据集，包括125K小时的视频和160M事件注释。实验结果表明，Orca在文本生成、图像预测和动作生成等下游任务中表现优于专门的基线模型，展示了其在理解和预测世界方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.31315', 'title': 'BlockPilot: Instance-Adaptive Policy Learning for Diffusion-based Speculative Decoding', 'url': 'https://huggingface.co/papers/2606.31315', 'abstract': 'Abstract Speculative decoding with adaptive block size selection improves inference efficiency by predicting optimal block sizes from prefilling representations, achieving significant speedup with minimal overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speculative decoding accelerates inference by using a lightweight draft model to generate candidate tokens in parallel, and are then verified by the target model, enabling lossless acceleration. Recently, diffusion-based speculative decoding further improves parallelism by generating multiple tokens per forward pass via block-level diffusion, achieving state-of-the-art (SOTA) performance. However, existing methods adopt a fixed inference block size and assume a uniform optimal decoding strategy across all inputs. In this paper, we show that this assumption is suboptimal, as the optimal block size varies across samples and plays a critical role in speculative decoding performance. Moreover, these values exhibit a clear local structure, concentrating around the training block size, which reduces the problem to a low-dimensional and structured decision space. Based on these insights, we propose BlockPilot, a sample-adaptive policy that predicts the optimal block size from the prefilling representation. Specifically, we formulate block size selection as a lightweight policy learning problem and propose an instance-adaptive decision mechanism that predicts the optimal block size based on the representation of the prefilling stage. The prediction is performed only once after prefilling, allowing for seamless integration. Extensive experiments demonstrate that our method is plug-and-play, introduces minimal overhead, and consistently improves efficiency, achieving an acceptance length of 5.92 and a 4.20times speedup on Qwen3-4B under temperature T=1.', 'score': 42, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '7105c8f030a3a2fb', 'authors': ['Hao Zhang', 'Yiming Hu', 'Yong Wang', 'Mingqiao Mo', 'Xin Xiao', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.31315.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Адаптивный выбор размера блока для эффективного спекулятивного декодирования', 'desc': 'Статья представляет BlockPilot — метод адаптивного выбора размера блока для спекулятивного декодирования, которое ускоряет инференс с помощью лёгкой модели-драфта, генерирующей кандидаты токенов параллельно. Авторы показывают, что оптимальный размер блока варьируется для разных примеров и существенно влияет на производительность, при этом эти значения имеют чёткую локальную структуру. Предложенный подход формулирует выбор размера блока как задачу лёгкого обучения политики, предсказывая оптимальный размер из представления фазы префиллинга всего один раз. Экспериментальные результаты показывают, что метод легко интегрируется, вносит минимальные накладные расходы и достигает 4.2-кратного ускорения на Qwen3-4B.'}, 'en': {'title': 'Adaptive Block Size Selection for Faster Inference', 'desc': 'This paper introduces BlockPilot, a method that enhances inference efficiency in machine learning models by adaptively selecting block sizes for speculative decoding. Traditional methods use a fixed block size, which is shown to be suboptimal as the ideal size varies across different inputs. BlockPilot predicts the optimal block size from prefilling representations, allowing for a more tailored and efficient decoding process. The approach is lightweight, integrates seamlessly into existing systems, and significantly speeds up inference with minimal overhead.'}, 'zh': {'title': '自适应块大小选择，提升推理效率！', 'desc': '本文提出了一种名为BlockPilot的自适应块大小选择策略，以提高推理效率。通过预测最佳块大小，BlockPilot能够根据预填充表示动态调整解码过程，从而显著加快推理速度。研究表明，最佳块大小在不同样本间存在显著差异，且与训练块大小有明显的局部结构关系。实验结果显示，该方法具有即插即用的特性，带来最小的开销，并在Qwen3-4B模型上实现了4.20倍的加速。'}}}, {'id': 'https://huggingface.co/papers/2606.28436', 'title': 'Dockerless: Environment-Free Program Verifier for Coding Agents', 'url': 'https://huggingface.co/papers/2606.28436', 'abstract': 'Abstract A Dockerless environment-free agentic patch verifier improves code patch evaluation accuracy and enables effective post-training without execution-based verification costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Program verifiers play a central role in training coding agents, including selecting trajectories for supervised fine-tuning (SFT) and providing rewards for reinforcement learning (RL). Standard execution-based verification requires running unit tests inside per-repository environments such as Docker images, incurring substantial environment setup costs. We propose Dockerless, an environment-free agentic patch verifier that evaluates generated code patches without executing them. Rather than simply matching candidate patches to references, Dockerless judges patch correctness using evidence gathered through agentic repository exploration. On a verifier evaluation benchmark, Dockerless outperforms the strongest open-source verifier by 14.3 AUC points. Using Dockerless as both the SFT trajectory filter and the RL reward enables a fully environment-free post-training pipeline. The resulting model reaches 62.0%, 50.0%, and 35.2% resolve rate on SWE-bench Verified, Multilingual, and Pro, respectively. It surpasses the Qwen3.5-9B baseline by 2.4, 8.7, and 2.9 points, matching environment-based post-training.', 'score': 42, 'issue_id': 2539, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'fa6a7f7474dbc581', 'authors': ['Wenhao Zeng', 'Yuling Shi', 'Xiaodong Gu', 'Chao Hu', 'Chaofan Wang', 'Yuhao Cui', 'Hongting Zhou', 'Mengnan Qi', 'Jianqiao Wangni', 'Zhaojian Yu', 'Shuzheng Gao', 'Kai Cai', 'Shilin He'], 'affiliations': ['Douyin Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28436.jpg', 'data': {'categories': ['#plp', '#benchmark', '#agents', '#rl', '#training'], 'emoji': '🐳', 'ru': {'title': 'Агентная верификация кода без выполнения и окружений', 'desc': 'В работе предложен Dockerless — верификатор кода без необходимости выполнения, который оценивает корректность сгенерированных патчей без запуска unit-тестов в изолированной среде. Вместо простого сравнения с эталонными решениями, система использует агентный поиск по репозиторию для сбора доказательств корректности патча. Метод показывает улучшение на 14.3 пункта AUC по сравнению с лучшим открытым верификатором и позволяет проводить post-training моделей кодирования без затрат на настройку Docker окружений. Полученная модель достигает результатов, сопоставимых с методами на основе выполнения кода, демонстрируя эффективность среди бесплатных верификационных подходов.'}, 'en': {'title': 'Revolutionizing Code Verification with Dockerless!', 'desc': 'This paper introduces Dockerless, a novel patch verifier that enhances the accuracy of code patch evaluations without the need for execution-based verification, which typically requires complex environment setups like Docker. By utilizing agentic repository exploration, Dockerless assesses the correctness of code patches based on gathered evidence rather than merely comparing them to reference patches. The proposed method significantly improves performance on a verifier evaluation benchmark, outperforming existing open-source verifiers. Additionally, Dockerless facilitates a fully environment-free post-training process for coding agents, achieving competitive resolve rates across various benchmarks.'}, 'zh': {'title': '无Docker环境的智能补丁验证器', 'desc': '本文提出了一种无Docker环境的智能补丁验证器，旨在提高代码补丁评估的准确性，并在不需要执行验证的情况下实现有效的后训练。传统的基于执行的验证需要在每个代码库的环境中运行单元测试，导致环境设置成本高昂。Dockerless通过智能探索代码库收集证据来判断补丁的正确性，而不是简单地将候选补丁与参考进行匹配。实验结果表明，Dockerless在验证器评估基准上比最强的开源验证器提高了14.3 AUC点，展示了其在后训练管道中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.30626', 'title': 'DOPD: Dual On-policy Distillation', 'url': 'https://huggingface.co/papers/2606.30626', 'abstract': 'Abstract DOPD addresses privilege illusion in on-policy distillation by dynamically routing token-level supervision between teacher and student policies based on advantage gaps and probabilities, improving capability transfer in large and vision-language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) offers superior capacity transfer by supervising student-sampled trajectories with dense token-level signals. To furnish high-quality supervision sources and thereby elevate the performance frontier of distillation, an intuitive direction is to infuse privileged information to either teacher or student itself. However, this additional input induces a potential failure mode we dub privilege illusion: a pattern that conflates the transferable capability gap that students are meant to close, and the information asymmetry gap that can only be mimicked but never replicated. This issue is further amplified by the inherent non-uniformity of token-level supervision, where only a small subset of tokens carries pivotal capability-bearing signals. To this end, we propose DOPD, an advantage-aware dual distillation paradigm that dynamically routes token-level supervision between privileged teacher and privileged student policies based on their advantage gap and relative probabilities. Each token receives supervision of different strength, objective, and strategy from either teacher or student itself, which transfers credible capability while simultaneously receiving auxiliary signals, to alleviate privilege illusion. Extensive experiments on both large language model (LLM) and vision-language model (VLM) settings demonstrate that DOPD consistently outperforms Vanilla OPD and other counterparts. Further results on stability, robustness, continual learning, and out-of-distribution tasks validate its superiority.', 'score': 23, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '8202b7a5260a1e54', 'authors': ['Xinlei Yu', 'Gen Li', 'Qingyi Si', 'Guibin Zhang', 'Yuqi Xu', 'Congcong Wang', 'Shuai Dong', 'Kaiwen Tuo', 'Xiangyu Zeng', 'Kaituo Feng', 'Qunzhong Wang', 'Yang Shi', 'Xiaobin Hu', 'Xiangyu Yue', 'Jiaqi Wang', 'Shuicheng Yan'], 'affiliations': ['Huawei', 'Nanyang Technological University', 'SenseTime', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.30626.jpg', 'data': {'categories': [], 'emoji': '🎓', 'ru': {'title': 'Умная маршрутизация знаний: преодоление иллюзии привилегий в дистилляции политик', 'desc': "Статья посвящена проблеме 'иллюзии привилегий' при обучении с дистилляцией политик в режиме on-policy. Авторы предлагают DOPD — метод динамической маршрутизации сигналов обучения на уровне токенов между учительской и студенческой моделями на основе разницы преимуществ и вероятностей. Каждый токен получает различные по силе, типу и стратегии сигналы от учителя или студента, что позволяет эффективнее передавать способности модели. Эксперименты на больших языковых и зрительно-языковых моделях показывают превосходство DOPD над стандартными подходами дистилляции."}, 'en': {'title': 'Dynamic Routing for Enhanced Capability Transfer in Distillation', 'desc': 'The paper introduces DOPD, a new method for on-policy distillation that addresses the issue of privilege illusion in machine learning models. It dynamically routes supervision at the token level between teacher and student policies based on their advantage gaps and probabilities, enhancing the transfer of capabilities. This approach allows for more effective supervision by adjusting the strength and strategy of the signals each token receives, thereby reducing the confusion between transferable capabilities and information asymmetry. Experiments show that DOPD outperforms traditional methods in various settings, demonstrating improved stability and robustness in learning tasks.'}, 'zh': {'title': '动态双重蒸馏：提升能力转移的创新方法', 'desc': '本文提出了一种名为DOPD的动态双重蒸馏方法，旨在解决在策略蒸馏中出现的特权幻觉问题。该方法通过根据优势差距和概率动态路由教师和学生策略之间的标记级监督，从而提高大规模语言模型和视觉语言模型的能力转移。DOPD为每个标记提供不同强度和目标的监督，帮助学生更有效地学习，同时减轻特权幻觉的影响。实验结果表明，DOPD在多个任务上均优于传统的策略蒸馏方法。'}}}, {'id': 'https://huggingface.co/papers/2606.29082', 'title': 'Evolution Fine-Tuning: Learning to Discover Across 371 Optimization Tasks', 'url': 'https://huggingface.co/papers/2606.29082', 'abstract': 'Abstract Evolutionary fine-tuning enables large language models to develop cross-task problem-solving capabilities by learning from search trajectories, demonstrating improved performance on mathematical conjectures and optimization tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Would experience designing faster GPU kernels also help close in on a long-standing open mathematical conjecture? Large Language Models (LLMs) integrated into evolutionary search have recently produced state-of-the-art solutions on optimization tasks, including open mathematical conjectures, GPU kernel design, scientific law discovery, and combinatorial puzzles. To achieve this, prior work applied search scaffolds to one target task at a time, so every new problem is approached from scratch and the experience accumulated during search is discarded once the model finishes its attempt. This leaves the capability of iteratively evolving a solution (e.g., knowing which part to mutate and how, deciding when to backtrack) entirely in the scaffold rather than in the model itself. Whether the model itself could acquire this capability and reuse it across different tasks has been largely unexamined. To address this, we introduce Evolution Fine-Tuning (EFT), a mid-training paradigm that teaches LLMs to evolve solutions across tasks by converting evolutionary search trajectories into supervision. We construct Finch Collection, a 156K-trajectory dataset spanning 10 domains and 371 optimization tasks, and fine-tune open-source LLMs from 2B to 9B parameters. Empirically, EFT confers cross-task generalization: across 22 held-out tasks, our models surpass their base counterparts by 10.22% on average. Furthermore, when paired with test-time RL, our model matches state-of-the-art performance on two circle-packing tasks and outperforms its base-model counterpart on the Erdős minimum-overlap problem. EFT thus serves as a "practice phase" for general-purpose discovery agents that do not solve new problems from scratch.', 'score': 12, 'issue_id': 2539, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': '5e49033138f36862', 'authors': ['Young-Jun Lee', 'Seungone Kim', 'Minki Kang', 'Alistair Cheong Liang Chuen', 'Zerui Chen', 'Seungho Han', 'Taehee Jung', 'Dongyeop Kang'], 'affiliations': ['Amazon', 'Carnegie Mellon University', 'Hanyang University', 'KAIST', 'University of Cambridge', 'University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2606.29082.jpg', 'data': {'categories': ['#science', '#dataset', '#optimization', '#transfer_learning', '#open_source', '#math', '#reasoning', '#rl', '#small_models', '#training'], 'emoji': '🧬', 'ru': {'title': 'Учить модели эволюционировать решения через поиск', 'desc': 'В работе предлагается метод эволюционной тонкой настройки (Evolution Fine-Tuning, EFT), который обучает большие языковые модели решать задачи оптимизации, преобразуя траектории поиска в обучающие примеры. Авторы создали датасет Finch Collection из 156 тысяч траекторий, охватывающих 10 различных областей и 371 задачу оптимизации, и применили его для настройки моделей от 2B до 9B параметров. Модели, обученные с помощью EFT, демонстрируют межзадачную генерализацию, превосходя базовые версии на 10.22% в среднем по 22 задачам и достигая состояния дел на некоторых классических задачах комбинаторной геометрии. Подход позволяет LLM приобрести навыки эволюционного поиска и переносить их между различными проблемными областями, вместо решения каждой новой задачи с нуля.'}, 'en': {'title': 'Evolving Solutions: Learning Across Tasks with EFT', 'desc': 'This paper introduces Evolution Fine-Tuning (EFT), a method that enhances large language models (LLMs) by allowing them to learn from previous problem-solving experiences across different tasks. Instead of starting from scratch for each new problem, EFT enables models to reuse knowledge gained from evolutionary search trajectories, improving their performance on optimization tasks. The authors created a dataset called Finch Collection, which includes 156,000 trajectories across various domains, to train LLMs ranging from 2B to 9B parameters. The results show that models fine-tuned with EFT achieve better generalization and performance on held-out tasks compared to their base models, demonstrating the effectiveness of this approach in developing cross-task problem-solving capabilities.'}, 'zh': {'title': '进化微调：跨任务解决方案的演化', 'desc': '进化微调（EFT）是一种中期训练范式，旨在通过将进化搜索轨迹转化为监督信号，教会大型语言模型（LLMs）在不同任务之间演化解决方案。我们构建了Finch Collection数据集，包含156K个轨迹，涵盖10个领域和371个优化任务。实验结果表明，EFT能够实现跨任务的泛化，在22个保留任务上，模型的表现平均提高了10.22%。此外，结合测试时的强化学习（RL），我们的模型在两个圆形打包任务上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.31734', 'title': 'MemLearner: Learning to Query Context memory for Video World Models', 'url': 'https://huggingface.co/papers/2606.31734', 'abstract': 'Abstract MemLearner improves video world models by using learning-based adaptive context querying with query tokens to enhance scene consistency and memory in long video sequences with occlusions and dynamic objects.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video World Models are interactive video generation models that predict future world states based on user actions and history video frames. A critical challenge in video world models is the lack of memory, causing inconsistent generated scenes over extended durations. Previous methods explored rule-based context frame retrieval as memory, but they fail to generalize in scenarios with scene occlusions and dynamic objects. We propose MemLearner, a learning-based adaptive context query method using query tokens to bridge context and predicted tokens. By leveraging the video generation model itself for context querying, MemLearner exploits pre-trained visual priors without training additional modules from scratch, and incorporates efficient strategies for training and inference. We collect a dataset of long videos with scene occlusions and dynamic objects, paired with camera pose annotations, and propose a multi-dataset training strategy leveraging both annotated rendered and unannotated real-world videos. Extensive experiments demonstrate that MemLearner significantly outperforms prior video world models in terms of scene consistency and memory, particularly under challenging occlusion and dynamic scenarios.', 'score': 11, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'a25f284ff5846b62', 'authors': ['Jiwen Yu', 'Jianxiong Gao', 'Jianhong Bai', 'Yiran Qin', 'Kaiyi Huang', 'Quande Liu', 'Xintao Wang', 'Pengfei Wan', 'Kun Gai', 'Xihui Liu'], 'affiliations': ['Fudan University', 'Kuaishou Technology', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31734.jpg', 'data': {'categories': ['#training', '#video', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное обучение контекста для согласованности в долгосрочных видео-моделях мира', 'desc': 'MemLearner — это метод улучшения видео-моделей мира путём использования обучаемого адаптивного поиска контекста с токенами запросов. Основная проблема существующих видео-моделей мира заключается в отсутствии памяти, что приводит к несогласованности сгенерированных сцен на длительных видеопоследовательностях. Предложенный подход используя query tokens связывает контекстные и предсказываемые токены, эффективно переиспользуя предварительно обученные визуальные признаки без обучения дополнительных модулей с нуля. Авторы собрали датасет длинных видео с окклюзиями и динамическими объектами, разработали стратегию мультидатасетного обучения и продемонстрировали значительное улучшение в согласованности сцен и памяти модели.'}, 'en': {'title': 'Enhancing Video Consistency with Adaptive Context Querying', 'desc': 'MemLearner enhances video world models by introducing a learning-based method for adaptive context querying using query tokens. This approach improves scene consistency and memory retention in long video sequences, especially when dealing with occlusions and dynamic objects. Unlike previous methods that relied on rule-based context retrieval, MemLearner effectively utilizes the video generation model for context querying, leveraging pre-trained visual priors. The results show that MemLearner outperforms existing models in maintaining scene coherence over extended durations, even in complex scenarios.'}, 'zh': {'title': '提升视频生成的一致性与记忆能力', 'desc': 'MemLearner是一种改进视频世界模型的方法，通过使用基于学习的自适应上下文查询和查询标记来增强长视频序列中的场景一致性和记忆能力。该方法解决了视频生成模型在处理场景遮挡和动态物体时缺乏记忆的问题。MemLearner利用预训练的视觉先验进行上下文查询，而无需从头开始训练额外的模块。实验结果表明，MemLearner在场景一致性和记忆方面显著优于之前的视频世界模型，尤其是在复杂的遮挡和动态场景中。'}}}, {'id': 'https://huggingface.co/papers/2606.30811', 'title': 'AVTok: 1D Unified Tokenization for Holistic Audio-Video Generation', 'url': 'https://huggingface.co/papers/2606.30811', 'abstract': 'Abstract AVTok is a unified tokenizer for audio-video generation that uses a dual-stream transformer architecture with shared encoder-decoder and modal-specific queries to create compact one-dimensional latent representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio-video generation has recently gained unprecedented research attention, aiming to synthesize high-quality sounding video content with fine-grained synchronization and semantic alignment between the auditory and visual components. The preceding methods predominantly adopt a dual-branch design with separate tokenization and generation modules per modality, neglecting the representation gap while necessitating intensive computational resources for proper training. Inspired by recent advancements in one-dimensional visual tokenization, we present AVTok, a novel unified tokenizer designated for holistic audio-video generation. AVTok features a dual-stream transformer-based architecture with shared encoder-decoder and modal-specific learnable queries to efficiently and effectively encode an audio-video pair into a compact one-dimensional latent representation with a unified codebook. To cope with the heterogeneous information imbalance that hinders AVTok from exploiting aligned audio-visual information, we devise a hierarchical training strategy to progressively realize reconstruction capabilities for each modality. Extensive experiments demonstrate that AVTok excels both in audio-video reconstruction and when integrated into downstream pipelines for audio-to-video, video-to-audio, and class-conditional joint audio-video generation. AVTok paves the way for the challenge of joint audio-video tokenization and provides a potential direction to build unified large multimodal models for audio-video generation.', 'score': 3, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'f2219b204d347c2d', 'authors': ['Kien T. Pham', 'I Chieh Chen', 'Qifeng Chen', 'Long Chen'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.30811.jpg', 'data': {'categories': ['#video', '#audio', '#architecture', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единый токенизатор для синхронной генерации аудио и видео', 'desc': 'AVTok — это унифицированный токенизатор для генерации аудио-видео контента, использующий архитектуру трансформера с двумя потоками данных, общими кодировщиком-декодировщиком и модально-специфичными запросами для создания компактных одномерных латентных представлений. Предыдущие методы использовали раздельные модули для каждой модальности, что создавало разрыв в представлениях и требовало больших вычислительных ресурсов. Для решения проблемы дисбаланса информации между модальностями авторы предложили иерархическую стратегию обучения, которая прогрессивно развивает способности реконструкции для каждой модальности. Эксперименты показывают, что AVTok успешно справляется с реконструкцией и может быть интегрирован в задачи генерации аудио из видео, видео из аудио и совместной генерации контента.'}, 'en': {'title': 'AVTok: Unifying Audio and Video Generation with Efficiency', 'desc': 'AVTok is a new tokenizer designed for generating audio and video together using a dual-stream transformer model. It combines audio and visual data into a single, compact representation, which helps in synchronizing sound and visuals more effectively. Unlike previous methods that used separate processes for audio and video, AVTok uses a shared encoder-decoder and specific queries for each type of data, making it more efficient. The paper shows that AVTok performs well in tasks like audio-to-video and video-to-audio generation, paving the way for better multimodal models in the future.'}, 'zh': {'title': 'AVTok：音视频生成的统一分词器', 'desc': 'AVTok是一种统一的音视频生成分词器，采用双流变换器架构，使用共享的编码器-解码器和特定模态的查询，能够高效地将音视频对编码为紧凑的一维潜在表示。该方法解决了传统双分支设计中模态间表示差距的问题，减少了训练所需的计算资源。通过分层训练策略，AVTok能够逐步实现对每种模态的重建能力，从而更好地利用对齐的音视频信息。实验结果表明，AVTok在音视频重建和下游任务中表现优异，为音视频生成的统一大规模多模态模型的构建提供了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2606.30673', 'title': 'PolyFlow: Continuous Topology Embedding Flow Matching for Artist-style Mesh Generation', 'url': 'https://huggingface.co/papers/2606.30673', 'abstract': 'Abstract PolyFlow introduces a continuous mesh representation using a topology embedder and applies flow-matching with Transformers for parallel mesh generation, achieving faster inference and precise resolution control compared to autoregressive methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive Transformers dominate high-quality mesh generation by producing artist-worthy topologies, yet their inherent sequential decoding induces substantial computational overhead, falling orders of magnitude slower than parallel generative models. On the other hand, while continuous diffusion and flow-matching methods support efficient parallel synthesis across a variety of domains, they cannot be directly applied to meshes: mesh connectivity is inherently discrete and incompatible with standard continuous noise injection and denoising operations. To resolve this fundamental incompatibility, we introduce a compact topology embedder that projects discrete mesh vertex positions and normals into continuous per-vertex embeddings, where the original discrete adjacency information can be faithfully recovered via spacetime distance thresholding. After pretraining and freezing this embedder, any raw mesh can be fully converted into a continuous per-vertex state space unifying position, normal, and implicit topological attributes. Built upon this novel continuous mesh representation, we present PolyFlow, a Transformer-based flow-matching framework that achieves fully parallel vertex state denoising conditioned on extracted point-cloud features. During inference, our model completes generation rapidly via an ODE solver, and supports explicit, precise control over output mesh resolution by directly specifying the target vertex count. Extensive evaluations on the Toys4K benchmark demonstrate that PolyFlow surpasses state-of-the-art autoregressive baselines in both Chamfer Distance and Hausdorff Distance.', 'score': 2, 'issue_id': 2539, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '887de3e6f445dcc4', 'authors': ['Chunshi Wang', 'Haohan Weng', 'Junliang Ye', 'Biwen Lei', 'Yang Li', 'Zibo Zhao', 'Zeqiang Lai', 'Kaiyi Zhang', 'Yunhan Yang', 'Zhuo Chen', 'Chunchao Guo', 'Yawei Luo'], 'affiliations': ['CUHK', 'HKU', 'HKUST', 'THU', 'Tencent', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.30673.jpg', 'data': {'categories': ['#3d', '#benchmark', '#inference', '#architecture'], 'emoji': '🧊', 'ru': {'title': 'Параллельная генерация трёхмерных сеток через непрерывное представление топологии', 'desc': 'PolyFlow предлагает новый способ представления трёхмерных сеток в непрерывном пространстве, используя специальный кодировщик топологии, который преобразует дискретную информацию о связности вершин в непрерывные векторные представления. На основе этого представления авторы разработали генеративную модель, основанную на flow-matching и Трансформере, которая может генерировать сетки полностью параллельно, без последовательного декодирования. Метод достигает значительного ускорения вывода по сравнению с авторегрессивными подходами, при этом обеспечивая точный контроль над разрешением сетки через прямое указание количества вершин. На бенчмарке Toys4K PolyFlow превосходит существующие методы по метрикам Chamfer Distance и Hausdorff Distance.'}, 'en': {'title': 'Revolutionizing Mesh Generation with PolyFlow: Fast, Precise, and Parallel!', 'desc': 'PolyFlow is a novel approach for generating 3D mesh structures using a continuous mesh representation and flow-matching techniques with Transformers. It addresses the limitations of autoregressive models, which are slow due to their sequential processing, by enabling parallel generation of mesh data. The method introduces a topology embedder that transforms discrete mesh information into continuous embeddings, allowing for efficient denoising and resolution control. Evaluations show that PolyFlow outperforms existing autoregressive methods in generating high-quality meshes, as measured by Chamfer and Hausdorff distances.'}, 'zh': {'title': 'PolyFlow：高效的并行网格生成新方法', 'desc': 'PolyFlow提出了一种连续网格表示方法，利用拓扑嵌入器和变换器进行流匹配，从而实现并行网格生成，推理速度更快且分辨率控制更精确。传统的自回归方法在高质量网格生成中占主导地位，但其顺序解码导致计算开销大，速度远低于并行生成模型。为了解决网格的离散连接性与连续噪声注入和去噪操作的不兼容性，PolyFlow引入了一种紧凑的拓扑嵌入器，将离散网格顶点位置和法线投影到连续的每顶点嵌入中。通过这种新颖的连续网格表示，PolyFlow能够快速生成网格，并通过直接指定目标顶点数量来精确控制输出网格的分辨率。'}}}, {'id': 'https://huggingface.co/papers/2606.31410', 'title': 'Xiaomi-GUI-0 Technical Report', 'url': 'https://huggingface.co/papers/2606.31410', 'abstract': 'Abstract A native multimodal GUI agent trained in real-device environments demonstrates superior performance and stability compared to traditional benchmark-based approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Graphical user interface (GUI) agents build on vision-language models to complete user tasks end-to-end in real applications through interface actions such as tapping, swiping, text entry, and navigation. However, existing GUI agents are trained and evaluated largely on offline trajectories, simulated environments, and standardized benchmarks. These differ substantially from real applications in interface layout, interaction logic, and abnormal-state distribution, and cannot faithfully characterize execution stability in real-world use, where account states, permission dialogs, payment authentication, and risk control continually reshape the state distribution and open a persistent gap between benchmark scores and real usability. To close this gap, we propose Xiaomi-GUI-0, a native multimodal GUI agent for real mobile environments, trained and evaluated within a real-device closed loop. At its core is a real-device-dominant hybrid infrastructure, where physical devices are the primary execution environment and sandboxes provide auxiliary support, so that data collection, training, rollout, and evaluation share an execution distribution close to real deployment. We construct multi-source training data spanning high-frequency head tasks, high-generalization data for long-tail intents, and capability-enhancement data for reflection and memory, and introduce an error-driven data flywheel that turns failure trajectories into corrected actions, reflective explanations, and recovery demonstrations. The model is trained through a progressive three-stage pipeline of supervised fine-tuning, step-level reinforcement learning, and agentic reinforcement learning. Evaluated on public benchmarks and our in-house RealMobile, Xiaomi-GUI-0 achieves 72.0% success on RealMobile and 78.9% on AndroidWorld, while substantially improving execution stability and abnormal-state recognition in real-world tasks.', 'score': 1, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '8b3a9bc5cd92b7fc', 'authors': ['Wanxia Cao', 'Chengzhen Duan', 'Pei Fu', 'Pengzhi Gao', 'Niu Lian', 'Fazhan Liu', 'Hui Liu', 'Heng Qu', 'Qinzhuo Wu', 'Zhehao Yu', 'Tongbo Chen', 'Shiqi Cui', 'Anan Du', 'Shukai Jia', 'Yuanfa Li', 'Yike Liu', 'Wenchao Lu', 'Haoyuan Sun', 'Jiatong Sun', 'Cheng Tan', 'Yajie Wang', 'Changqiao Wu', 'Tao Xiong', 'Jiahui Yang', 'Yuxuan Yuan', 'Ruoceng Zhang', 'Shaojie Zhang', 'Jian Zhu', 'Jian Luan', 'Cong Zou'], 'affiliations': ['Xiaomi'], 'pdf_title_img': 'assets/pdf/title_img/2606.31410.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#optimization', '#open_source', '#agents', '#rl', '#multimodal', '#training'], 'emoji': '📱', 'ru': {'title': 'От бенчмарков к реальности: мультимодальный агент, обученный на настоящих устройствах', 'desc': 'В работе представлен мультимодальный агент Xiaomi-GUI-0 для автоматизации задач на мобильных устройствах, обученный в реальных окружениях вместо искусственных бенчмарков. Авторы предлагают гибридную инфраструктуру с реальными устройствами как основной средой выполнения и создают специальный набор данных с высокочастотными задачами и данными для восстановления от ошибок. Модель обучается через три этапа: supervised fine-tuning, пошаговое reinforcement learning и агентическое reinforcement learning. Полученный агент демонстрирует высокую стабильность и устойчивость к аномальным состояниям в реальных приложениях.'}, 'en': {'title': 'Revolutionizing GUI Agents with Real-World Training', 'desc': 'This paper presents Xiaomi-GUI-0, a multimodal graphical user interface (GUI) agent designed to operate effectively in real mobile environments. Unlike traditional agents that rely on simulated data and benchmarks, Xiaomi-GUI-0 is trained using real-device interactions, which enhances its performance and stability in practical applications. The training process involves a hybrid infrastructure that combines real devices with supportive sandboxes, allowing for a more accurate representation of real-world conditions. The model employs a three-stage training pipeline, incorporating supervised learning and reinforcement learning techniques to improve its ability to handle diverse user tasks and adapt to unexpected situations.'}, 'zh': {'title': '真实环境中的智能GUI代理', 'desc': '本文介绍了一种名为Xiaomi-GUI-0的原生多模态图形用户界面（GUI）代理，它在真实设备环境中训练，表现出优越的性能和稳定性。与传统的基准测试方法不同，该代理通过真实设备的闭环训练和评估，能够更好地适应实际应用中的界面布局和交互逻辑。我们构建了多源训练数据，并引入了基于错误驱动的数据循环，将失败轨迹转化为纠正动作和反思解释。最终，Xiaomi-GUI-0在真实移动环境中取得了显著的成功率和执行稳定性。'}}}, {'id': 'https://huggingface.co/papers/2606.30319', 'title': 'BrainJanus: A Unified Model for Understanding and Generation across Brain, Vision, and Language', 'url': 'https://huggingface.co/papers/2606.30319', 'abstract': "Abstract BrainJanus represents the first unified brain model integrating brain, vision, and language through a shared Omni space, enabling bidirectional mapping between neural activity and sensory stimuli via a tokenized representation and autoregressive architecture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modeling the bidirectional correspondence between external sensory stimuli and internal neural activity has emerged as a critical frontier in neuroscience. However, existing approaches predominantly treat brain encoding and decoding as isolated tasks, relying heavily on unimodal alignment and external priors while overlooking the brain's intrinsic nature as a multimodal integration system. To address these limitations, we propose BrainJanus, the first unified brain model that integrates brain, vision, and language within a single framework. Specifically, we introduce a Unified Brain Tokenizer to quantize continuous neural dynamics into discrete tokens aligned with visual and linguistic representations in a shared Omni space. Building on this, we utilize an All-in-One autoregressive architecture that leverages next-token prediction to enable seamless any-to-any generation, which encompasses image-to-brain and text-to-brain encoding, and brain-to-image and brain-to-text decoding. Extensive experiments demonstrate that BrainJanus achieves superior performance across diverse benchmarks. Furthermore, our framework exhibits zero-shot generalization and preserves interpretable biological topography, highlighting its potential as a general-purpose brain modeling paradigm. The code is available at https://github.com/HaitaoWuTJU/BrainJanus{GitHub}.", 'score': 1, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'b5e50b06ce441335', 'authors': ['Haitao Wu', 'Qirui Zhang', 'Zhouheng Yao', 'Shangquan Sun', 'Qihao Zheng', 'Mianxin Liu', 'Chi Zhang', 'Wanli Ouyang', 'Chunfeng Song', 'Changqing Zhang', 'Jiamin Wu'], 'affiliations': ['School of Artificial Intelligence, Tianjin University, Tianjin, China', 'Shanghai Artificial Intelligence Laboratory, Shanghai, China', 'The Chinese University of Hong Kong, Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30319.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Мозг говорит всеми языками: унифицированная модель для двусторонней трансляции нейронной активности', 'desc': 'BrainJanus — это первая унифицированная модель мозга, которая интегрирует нейронную активность, зрение и язык в единое пространство представлений. Модель использует специальный tokenizer для преобразования непрерывной динамики мозга в дискретные токены, выравненные с визуальными и лингвистическими представлениями. Архитектура основана на авторегрессионном подходе предсказания следующего токена, что позволяет выполнять двусторонние отображения: кодировать стимулы в активность мозга и декодировать нейронные сигналы обратно в образы и текст. Модель демонстрирует высокую производительность на различных бенчмарках и обладает способностью к обобщению без обучения на новых задачах.'}, 'en': {'title': 'Unifying Brain, Vision, and Language with BrainJanus', 'desc': 'BrainJanus is a groundbreaking model that integrates brain activity with visual and linguistic inputs in a unified framework. It uses a Unified Brain Tokenizer to convert continuous neural signals into discrete tokens that correspond to sensory stimuli. This model employs an autoregressive architecture for next-token prediction, allowing for flexible encoding and decoding between different modalities, such as images and text. The results show that BrainJanus not only outperforms existing methods but also generalizes well to new tasks while maintaining biological relevance.'}, 'zh': {'title': 'BrainJanus：统一大脑模型的创新之路', 'desc': 'BrainJanus是第一个统一的大脑模型，它将大脑、视觉和语言整合在一个共享的Omni空间中。该模型通过标记化表示和自回归架构，实现了神经活动与感官刺激之间的双向映射。与现有方法不同，BrainJanus将大脑编码和解码视为一个整体，克服了单一模态对齐的局限性。实验结果表明，BrainJanus在多个基准测试中表现优越，并具备零样本泛化能力，展示了其作为通用大脑建模范式的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.30697', 'title': 'LUMOS: A Semantic Operating-System Layer for Accessibility-Grounded AI Agents', 'url': 'https://huggingface.co/papers/2606.30697', 'abstract': 'Abstract LUMOS provides a semantic interaction layer that converts operating system metadata into machine-readable formats, enabling AI agents to interact more efficiently with computer interfaces than through traditional visual methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current operating systems expose interfaces optimized for human users but not for AI agents. Humans benefit from pixels, icons, windows, visual grouping, mouse movement, and keyboard shortcuts; AI agents instead need compact semantic state, grounded actions, and reliable feedback. As a result, many computer-use agents are forced to interpret screenshots, OCR output, and visual crops, introducing high token costs, visual ambiguity, latency, and coordinate uncertainty. This paper introduces LUMOS (Language Model Unified Machine-Readable Operating-System Semantics), a semantic interaction layer between AI agents and operating systems. LUMOS converts native accessibility metadata and browser UI structures into machine readable semantic blueprints with stable identifiers, roles, names, values, bounds, and action affordances. It also supports live semantic pointer grounding by querying the UI element under or near the cursor through operating-system automation APIs. An LLM then acts through an accessibility grounded observe act loop using constrained visible-UI primitives rather than application-specific scripts. LUMOS does not claim to replace visual agents; instead, it reduces dependence on screenshots when operating systems already provide semantic structure. These results suggest a path toward AI-native operating systems and machine-readable interaction layers.', 'score': 1, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'a936ebeec134c293', 'authors': ['Yogeswar Reddy Thota'], 'affiliations': ['University of Texas at Dallas'], 'pdf_title_img': 'assets/pdf/title_img/2606.30697.jpg', 'data': {'categories': ['#agents', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Семантический мост между AI и компьютером', 'desc': 'LUMOS представляет семантический слой взаимодействия, который преобразует метаданные операционной системы в машиночитаемые форматы, позволяя AI агентам более эффективно работать с компьютерными интерфейсами. Вместо интерпретации скриншотов и OCR-вывода система использует доступную информацию о структуре UI, включая роли элементов, названия, значения и возможные действия. LLM взаимодействует через цикл наблюдение-действие, грounded на семантических примитивах интерфейса, что значительно снижает затраты на обработку токенов. Такой подход предлагает путь к разработке операционных систем, оптимизированных для AI, и машиночитаемых слоёв взаимодействия.'}, 'en': {'title': 'Transforming AI Interaction with Semantic Operating Systems', 'desc': 'LUMOS is a new system that helps AI agents interact with computer interfaces more effectively by converting operating system data into a format that machines can understand. Traditional interfaces are designed for humans, using visual elements like icons and windows, which can confuse AI agents. By providing a semantic layer, LUMOS allows AI to access structured information about UI elements, reducing the need for visual interpretation and improving efficiency. This innovation paves the way for future operating systems that are better suited for AI interactions, making them more intelligent and responsive.'}, 'zh': {'title': 'LUMOS：为AI代理提供语义交互的新方式', 'desc': 'LUMOS是一个语义交互层，它将操作系统的元数据转换为机器可读的格式，使得AI代理能够比传统的视觉方法更高效地与计算机界面进行交互。当前的操作系统界面是为人类用户优化的，而LUMOS则为AI代理提供了紧凑的语义状态和可靠的反馈。通过将本地可访问性元数据和浏览器UI结构转换为机器可读的语义蓝图，LUMOS减少了对屏幕截图的依赖。该研究表明，LUMOS为AI原生操作系统和机器可读交互层提供了一条可行的路径。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        }

            window.history.pushState({}, '', newUrl);

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');

                settingSortBy = 'issue_id';

        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture (5)', '#audio (1)', '#benchmark (4)', '#cv', '#data', '#dataset (4)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (4)', '#open_source (2)', '#optimization (3)', '#plp (1)', '#rag', '#reasoning (1)', '#rl (3)', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (5)', '#transfer_learning (1)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-01 04:13',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-01 04:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-01 04:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
