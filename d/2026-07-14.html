    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.10350', 'title': 'ABot-AgentOS: A General Robotic Agent OS with Lifelong Multi-modal Memory', 'url': 'https://huggingface.co/papers/2607.10350', 'abstract': 'Abstract  Recent VLM and VLA systems have improved robotic perception and action prediction, yet long-horizon embodied agents still require a general runtime layer for reasoning, memory, tool use, verification, and cross-embodiment execution. We present ABot-AgentOS, a general robotic Agent Operating System that sits above low-level controllers and provides a deliberative agent layer for scene-conditioned planning, context-isolated skill execution, multi-stage verification, multi-modal memory, and edge-cloud collaboration. To evaluate such systems, we introduce EmbodiedWorldBench, an executable benchmark with 16 indoor, outdoor, and hybrid scenes, four difficulty levels, and over 200 tasks involving navigation, object search, NPC dialogue, dynamic events, and trace-grounded scoring. ABot-AgentOS further introduces Universal Multi-modal Graph Memory, a persistent source-grounded substrate that converts dialogue, visual observations, spatial context, temporal relations, and task traces into typed nodes and edges. A failure-driven self-evolution loop converts diagnosed memory failures into gated runtime evo-assets that are promoted only to later evaluation splits, preventing current-split ground-truth leakage while enabling continual improvement. On an initial EmbodiedWorldBench subset, ABot-AgentOS improves over a single-controller baseline in both task success and goal completion. Across memory benchmarks, ABot-AgentOS Static achieves 87.5 on LoCoMo, 59.9 on OpenEQA EM-EQA, 88.6 on Mem-Gallery, and 76.5 Acc@All on NExT-QA; self-evolution further improves LoCoMo to 88.7, OpenEQA to 60.4, and Mem-Gallery to 89.0. These results suggest that a general Agent OS layer can improve long-horizon embodied execution while providing persistent, auditable memory for continual interaction.', 'score': 50, 'issue_id': 2641, 'pub_date': '2026-07-11', 'pub_date_card': {'ru': '11 июля', 'en': 'July 11', 'zh': '7月11日'}, 'hash': '2a9fff25288e4c7f', 'authors': ['Jiayi Tian', 'Shiao Liu', 'Yuting Xu', 'Jia Lu', 'Zihao Guan', 'Honglin Han', 'Di Yang', 'Minqi Gu', 'Yifei Qian', 'Tianlin Zhang', 'Yanqing Zhu', 'Zeqian Ye', 'Menglin Yang', 'Fei Wang', 'Xu Hu', 'Xiuxian Li', 'Wei Zhang', 'Shihui Su', 'Yiyan Ji', 'Jingbo Wang', 'Ziteng Feng', 'Jiaheng Liu', 'Zhaoxiang Zhang', 'Xiaolong Wu', 'Mingyang Yin', 'Zedong Chu', 'Mu Xu'], 'affiliations': ['AMAP-CVLab'], 'pdf_title_img': 'assets/pdf/title_img/2607.10350.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#reasoning', '#robotics', '#agents', '#leakage', '#benchmark', '#graphs'], 'emoji': '🤖', 'ru': {'title': 'Операционная система для длительного автономного управления роботами с памятью и рассуждением', 'desc': 'В статье представлена ABot-AgentOS — операционная система для робототехнических агентов, которая обеспечивает высокоуровневое рассуждение, планирование и управление памятью над низкоуровневыми контроллерами. Авторы вводят EmbodiedWorldBench — новый бенчмарк с более чем 200 задачами в различных сценах для оценки способностей воплощённых агентов к навигации, поиску объектов и диалогу. Система использует Universal Multi-modal Graph Memory для сохранения информации из диалогов, визуальных наблюдений и пространственного контекста в виде типизированного графа. Реализован механизм самоэволюции, который улучшает агента путём преобразования выявленных ошибок памяти в обновления, достигая значительного улучшения на стандартных бенчмарках памяти и навигации.'}, 'en': {'title': 'Empowering Robots with ABot-AgentOS for Enhanced Task Execution', 'desc': 'This paper introduces ABot-AgentOS, a new robotic Agent Operating System designed to enhance the capabilities of long-horizon embodied agents. It provides a higher-level framework for planning, executing skills, and managing memory, which allows robots to perform complex tasks in various environments. The system is evaluated using EmbodiedWorldBench, a benchmark that tests the agents on diverse tasks and scenarios. The results show that ABot-AgentOS significantly improves task success and memory performance, demonstrating the effectiveness of a general operating system for robotic agents.'}, 'zh': {'title': '通用机器人操作系统提升长时间任务执行能力', 'desc': '本文介绍了ABot-AgentOS，一个通用的机器人操作系统，旨在提升机器人在复杂环境中的感知和行动预测能力。该系统提供了一个高层的代理层，支持场景条件规划、技能执行和多模态记忆等功能。为了评估这些系统，作者提出了EmbodiedWorldBench，一个包含多种场景和任务的可执行基准测试。ABot-AgentOS通过自我进化机制不断改进其性能，显示出在长时间任务执行中的优势。'}}}, {'id': 'https://huggingface.co/papers/2607.10383', 'title': 'ABot-N1: Toward a General Visual Language Navigation Foundation Model', 'url': 'https://huggingface.co/papers/2607.10383', 'abstract': 'Abstract  Visual Language Navigation foundation models aim to unify deep reasoning for grounded spatial decisions with broad versatility for diverse embodied tasks. Current approaches typically achieve this integration via monolithic policies that map observations directly to actions, yet they often suffer from coordinate drift and poor handling of long-tail semantics. Furthermore, these black-box mappings lack interpretability, hindering the simultaneous achievement of generality, robustness, and transparency. We present ABot-N1, a step toward a general Visual Language Navigation foundation model, that addresses these challenges by decoupling cognition from control via a slow-fast architecture guided by dual visual-language signals. More specifically, a slow vision-language reasoner performs explicit Chain-of-Thought reasoning while producing a pixel goal. This compact set of image-space anchor points serves as a universal interface for diverse tasks, including point-goal, object-goal, poi-goal, instruction-following, and person-following. Subsequently, a fast action expert leverages both the textual cues and the pixel guidance to generate continuous waypoints at the native control frequency. By bridging high-level intents and low-level control through pixel-grounded anchors paired with explicit linguistic traces, our approach ensures robust, generalizable, and interpretable navigation across simulation and real-world benchmarks. ABot-N1 establishes new state-of-the-art records, delivering massive gains specifically in urban-scale navigation: boosting POI arrival by 35.0% (to 77.3%) and achieving 95.4%/92.9% SR in complex indoor and outdoor scenes. It also maintains superior robustness across object-reaching, person-following, and instruction-following tasks. New Point-Goal/POI-Goal benchmarks are released as open source to advance the field of urban-scale navigation.', 'score': 46, 'issue_id': 2641, 'pub_date': '2026-07-11', 'pub_date_card': {'ru': '11 июля', 'en': 'July 11', 'zh': '7月11日'}, 'hash': '377986f249a6d947', 'authors': ['Ruiyan Gong', 'Yingnan Guo', 'Junjun Hu', 'Jintao Kong', 'Xiaoxu Leng', 'Tianlun Li', 'Weize Li', 'Fei Liu', 'Zhicheng Liu', 'Jia Lu', 'Minghua Luo', 'Chenlin Ming', 'Yanfen Shen', 'Jiyue Tao', 'Zhengbo Wang', 'Mingyang Yin', 'Minqi Gu', 'Zihao Guan', 'Wei Guo', 'Guoqing Liu', 'Huachong Pang', 'Menglin Yang', 'Zeqian Ye', 'Xiaoxiao Geng', 'Zhining Gu', 'Honglin Han', 'Di Jing', 'Hongyu Pan', 'Mingchao Sun', 'Kuan Yang', 'Jianfang Zhang', 'Yanghong Chen', 'Ye He', 'Wei Mei', 'Jiahao Shi', 'Xiangpo Yang', 'Yanqing Zhu', 'Zedong Chu', 'Xiaolong Wu', 'Mu Xu'], 'affiliations': ['AMap CV Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.10383.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#robotics', '#agents', '#benchmark', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Разделение мышления и действия для прозрачной навигации роботов', 'desc': 'В работе представлена архитектура ABot-N1 для зрительно-языковой навигации, которая разделяет высокоуровневое рассуждение от низкоуровневого управления роботом. Медленный модуль vision-language использует цепочку рассуждений для определения целевого пиксела на изображении, служащего универсальным интерфейсом для различных навигационных задач. Быстрый модуль управления генерирует непрерывные траектории движения, опираясь на текстовые подсказки и пиксельные якоря. Такой подход обеспечивает интерпретируемость, обобщаемость и робастность навигации в симуляциях и в реальном мире, достигая новых рекордов особенно в масштабной городской навигации.'}, 'en': {'title': 'ABot-N1: Bridging Reasoning and Control for Enhanced Navigation', 'desc': 'The paper introduces ABot-N1, a novel Visual Language Navigation model that enhances spatial decision-making for various tasks. It addresses issues like coordinate drift and lack of interpretability in existing models by separating cognitive reasoning from control actions using a slow-fast architecture. The slow component performs detailed reasoning to create pixel-based goals, while the fast component translates these goals into actionable waypoints. This dual approach improves robustness and generalizability, achieving significant performance improvements in urban navigation tasks and setting new benchmarks for the field.'}, 'zh': {'title': 'ABot-N1：城市导航的新突破', 'desc': '本论文介绍了一种新的视觉语言导航基础模型ABot-N1，旨在解决当前模型在空间决策中的局限性。通过将认知与控制解耦，ABot-N1采用慢-快架构，利用双重视觉-语言信号进行引导。慢速视觉-语言推理器进行明确的思维链推理，并生成像素目标，作为多种任务的通用接口。该模型在城市规模导航中取得了显著的性能提升，特别是在复杂场景下的导航任务中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.11487', 'title': 'LightMem-Ego: Your AI Memory for Everyday Life', 'url': 'https://huggingface.co/papers/2607.11487', 'abstract': "Abstract  Personal AI assistants on mobile and wearable devices continuously perceive users' daily lives through visual and audio streams. However, answering queries about past experiences requires lightweight multimodal memory that can continuously accumulate, organize, and retrieve long-term experiences, which remains challenging. To address this challenge, we present LightMem-Ego, a lightweight streaming multimodal memory system for everyday-life assistance. The system continuously captures egocentric visual and audio streams, aligns them on a shared timeline, and organizes them into a hierarchical memory consisting of current, short-term, and long-term memory. Given a user query, LightMem-Ego dynamically routes retrieval to the appropriate memory level and generates answers grounded in multimodal evidence. The demonstration can be deployed on smartphones and AI glasses, supporting object finding, conversation recall, life summarization, routine discovery, and personalized assistance. Code is available at https://github.com/zjunlp/LightMem-Ego.", 'score': 23, 'issue_id': 2641, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': 'b17ededca1716a39', 'authors': ['Yijun Chen', 'Boyi Xiao', 'Yixian Zhao', 'Haoting Xia', 'Buqiang Xu', 'Jizhan Fang', 'Yanya Li', 'Yaqi Zheng', 'Xuehai Wang', 'Zirui Xue', 'Liuxin Zhang', 'Hui Li', 'Ningyu Zhang'], 'affiliations': ['Central China Normal University', 'Lenovo Group Limited', 'South China University of Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.11487.jpg', 'data': {'categories': ['#multimodal', '#audio', '#agents', '#small_models', '#cv'], 'emoji': '🧠', 'ru': {'title': 'Эффективная многоуровневая память для личных AI помощников', 'desc': 'В статье представлена LightMem-Ego — лёгкая система мультимодальной памяти для персональных AI ассистентов на мобильных и носимых устройствах. Система непрерывно обрабатывает видео и аудиопотоки от пользователя, выравнивает их на единой временной шкале и организует в иерархическую структуру памяти с тремя уровнями: текущей, краткосрочной и долгосрочной. При получении запроса от пользователя система динамически маршрутизирует поиск на нужный уровень памяти и генерирует ответы, опираясь на мультимодальные доказательства. Система может работать на смартфонах и AI очках, поддерживая задачи поиска предметов, воспоминания о разговорах, обобщение жизненного опыта и персонализированную помощь.'}, 'en': {'title': 'Empowering Personal AI with Lightweight Multimodal Memory', 'desc': "This paper introduces LightMem-Ego, a novel lightweight multimodal memory system designed for personal AI assistants on mobile and wearable devices. It continuously captures and organizes visual and audio data from users' daily lives into a structured memory hierarchy, which includes current, short-term, and long-term memory. When a user asks a question, the system efficiently retrieves relevant information from the appropriate memory level, providing answers based on multimodal evidence. This technology enhances everyday assistance by enabling features like object finding, conversation recall, and personalized life summaries."}, 'zh': {'title': '轻量级多模态记忆，助力日常生活智能助手', 'desc': '本文介绍了一种名为LightMem-Ego的轻量级多模态记忆系统，旨在帮助个人AI助手更好地理解用户的日常生活。该系统能够持续捕捉用户的视觉和音频信息，并将其组织成当前、短期和长期记忆的层次结构。通过动态路由，LightMem-Ego能够根据用户的查询从适当的记忆层级中检索信息，并生成基于多模态证据的答案。该系统可在智能手机和AI眼镜上部署，支持物体查找、对话回忆、生活总结、日常发现和个性化助手等功能。'}}}, {'id': 'https://huggingface.co/papers/2607.09125', 'title': '4D Human-Scene Reconstruction from Low-Overlap Captures', 'url': 'https://huggingface.co/papers/2607.09125', 'abstract': 'Abstract  Existing volumetric capture of dynamic human performance achieves high fidelity with dense camera arrays. However, in real-world scenarios, only a handful of low-overlap cameras are available, which degrades the output quality and leaves large areas unobserved. Recent 4D reconstruction methods have focused on low-overlap settings, yet they still produce noticeable artifacts in under-observed regions. Video diffusion models have emerged as another option, but they show geometrically inconsistent results for humans. To address these limitations, we propose StudioRecon, a pipeline that reconstructs 4D human scenes from sparse, low-overlap cameras by decoupling background and humans. We densify background supervision by synthesizing hundreds of camera-controlled novel views with a video diffusion model. We also robustly initialize deformable Gaussian humans with cross-view identity association and triangulated multi-view keypoint fitting. Finally, our recursive enhancement module with motion-adaptive consistency injection harmonizes the composed output, thereby further avoiding remaining artifacts. We achieve state-of-the-art novel view synthesis across four real-world datasets and demonstrate applications such as novel trajectory rendering and human replacement.', 'score': 17, 'issue_id': 2641, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'f5ae19ad511911c4', 'authors': ['Minhyuk Hwang', 'Sangmin Kim', 'Seunguk Do', 'Daneul Kim', 'Jaesik Park'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2607.09125.jpg', 'data': {'categories': ['#multimodal', '#video', '#3d', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Реконструкция 4D сцен с людьми из разреженных камер через гауссианы и диффузию', 'desc': 'В работе представлен StudioRecon — метод для реконструкции динамических 4D сцен с людьми из видео, снятого несколькими камерами с малым перекрытием обзора. Основная идея заключается в разделении задачи на реконструкцию фона и человека: для фона используется видео-диффузионная модель для синтеза дополнительных ракурсов, а для человека применяется инициализация деформируемых гауссианов с кросс-видовой ассоциацией. Авторы предлагают модуль рекурсивного улучшения с адаптивной к движению проверкой согласованности, которая устраняет артефакты в плохо наблюдаемых областях. Метод достигает лучших результатов синтеза новых ракурсов на реальных датасетах и позволяет применять приложения вроде рендеринга по новой траектории и замены человека в видео.'}, 'en': {'title': 'Revolutionizing 4D Human Scene Reconstruction with Sparse Cameras', 'desc': 'This paper presents StudioRecon, a novel pipeline for reconstructing 4D human scenes using sparse, low-overlap camera setups. It addresses the challenges of existing methods that struggle with artifacts in under-observed areas by decoupling the background from human subjects. The approach enhances background supervision through the synthesis of numerous novel views using a video diffusion model, while also ensuring accurate human representation with cross-view identity association. The proposed recursive enhancement module improves the final output by maintaining motion consistency, achieving state-of-the-art results in novel view synthesis across multiple datasets.'}, 'zh': {'title': 'StudioRecon：从稀疏相机重建4D人类场景的创新方法', 'desc': '本论文提出了一种名为StudioRecon的管道，用于从稀疏、低重叠的相机中重建4D人类场景。我们通过合成数百个相机控制的新视角来增强背景监督，从而提高重建质量。该方法还通过交叉视图身份关联和三角测量多视角关键点拟合，稳健地初始化可变形的高斯人类模型。最后，我们的递归增强模块通过运动自适应一致性注入，进一步减少了重建中的伪影，达到了在多个真实数据集上的最先进的新视角合成效果。'}}}, {'id': 'https://huggingface.co/papers/2607.11849', 'title': 'AdvancedMathBench: A Benchmark Suite for Advanced Mathematical Proof Generation and Verification', 'url': 'https://huggingface.co/papers/2607.11849', 'abstract': 'Abstract  Large language models (LLMs) have achieved remarkable performance on high-school and olympiad-style mathematics, yet their capabilities on advanced mathematics remain poorly understood. Existing benchmarks, however, fall short in both scope and evaluation granularity: they provide limited disciplinary coverage and often rely on final-answer correctness or coarse judgments, leaving the validity of the reasoning process inadequately assessed. To bridge this gap, we introduce AdvancedMathBench, a benchmark suite designed to evaluate advanced mathematical reasoning capabilities. Its core proof-generation benchmark, ProverBench, contains 296 problems spanning undergraduate and doctoral qualifying-exam levels. To provide reliable evaluation of the proofs, we develop a dedicated automatic verification pipeline trained on large-scale expert annotations to produce both correctness verdicts and fine-grained assessments of proof errors, which exhibits strong agreement with human experts on held-out proof trajectories. We further introduce VerifierBench, consisting of 888 model-generated proof trajectories paired with expert ground truth, to evaluate whether models can correctly judge proof validity and provide sound verification rationales. Experiments show that AdvancedMathBench remains challenging for frontier models. On proof generation, the best-performing model, GPT-5.5-xhigh, achieves only 75.8 and 66.1 on the UGD and QE splits, respectively, indicating substantial room for improvement on advanced mathematical proof construction. On proof verification, the best model attains a Balanced F1 of only 65.1, and models generally exhibit low true negative rates, suggesting that critical error detection remains a major bottleneck.', 'score': 11, 'issue_id': 2641, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': 'bbdc436efff255f8', 'authors': ['Lingkai Kong', 'Zijian Wu', 'Yuzhe Gu', 'Haiteng Zhao', 'Wenyong Huang', 'Shuang Sun', 'Zhicheng Xiong', 'Xiaotian Zhang', 'Shuya Zhao', 'Yan Wang', 'Disheng Xu', 'Wenwei Zhang', 'Kai Chen'], 'affiliations': ['Great Bay', 'MMLab, The Chinese University of Hong Kong', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2607.11849.jpg', 'data': {'categories': ['#dataset', '#science', '#reasoning', '#math', '#benchmark'], 'emoji': '🧮', 'ru': {'title': 'От простых расчетов к доказательству теорем: где еще отстают языковые модели', 'desc': 'Авторы представляют AdvancedMathBench, комплексный бенчмарк для оценки способностей больших языковых моделей в продвинутом математическом доказательстве. ProverBench содержит 296 задач уровня бакалавриата и докторских экзаменов, где модели должны генерировать формальные доказательства. Для надежной оценки разработан специализированный конвейер автоматической верификации, обученный на больших объемах экспертных аннотаций, который выявляет как корректность доказательств, так и детальные ошибки в рассуждениях. Экспериментальные результаты показывают, что даже лучшие модели (включая GPT-4.5) значительно отстают в построении сложных доказательств и верификации их валидности, что указывает на необходимость развития новых подходов.'}, 'en': {'title': 'Unlocking Advanced Math: Evaluating LLMs with AdvancedMathBench', 'desc': 'This paper introduces AdvancedMathBench, a new benchmark suite aimed at evaluating the advanced mathematical reasoning abilities of large language models (LLMs). It addresses the limitations of existing benchmarks by providing a comprehensive set of problems and a detailed evaluation process that assesses both correctness and the reasoning behind proofs. The core component, ProverBench, includes 296 problems from undergraduate to doctoral levels, while VerifierBench offers model-generated proof trajectories for validation against expert assessments. The results indicate that current models, including the top performer GPT-5.5-xhigh, struggle with advanced proof generation and verification, highlighting significant areas for improvement in mathematical reasoning capabilities.'}, 'zh': {'title': '评估高级数学推理能力的新基准', 'desc': '大型语言模型（LLMs）在高中和奥林匹克风格的数学问题上表现出色，但在高级数学方面的能力仍不清楚。现有的基准测试在范围和评估细节上都存在不足，主要依赖最终答案的正确性，未能充分评估推理过程的有效性。为了解决这个问题，我们推出了AdvancedMathBench，这是一个旨在评估高级数学推理能力的基准套件。通过开发专门的自动验证管道，我们能够对证明的正确性和错误进行细致评估，实验结果表明，当前模型在高级数学证明构建和验证方面仍有很大的改进空间。'}}}, {'id': 'https://huggingface.co/papers/2607.05394', 'title': 'Weak-to-Strong Generalization via Direct On-Policy Distillation', 'url': 'https://huggingface.co/papers/2607.05394', 'abstract': "Abstract Direct On-Policy Distillation transfers reinforcement learning improvements from smaller to larger models by using the policy shift induced by RL as an implicit reward signal, enabling efficient scaling of training without re-running expensive RL on the target model.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning with verifiable rewards (RLVR) is a powerful recipe for improving language-model reasoning, but it is expensive to repeat on every new strong model because the target model must generate many rollouts during training. As models scale, post-training itself becomes a bottleneck. We study a weak-to-strong alternative: run RL on a smaller model where rollouts are cheaper, then reuse what that RL run learned to improve a stronger target model. Directly distilling the post-RL weak teacher is not enough, because the teacher's final policy mixes useful RL gains with the limitations of the smaller model. We propose Direct On-Policy Distillation (Direct-OPD), which transfers the teacher's RL-induced policy shift instead. Direct-OPD compares the post-RL teacher with its own pre-RL reference and treats their log-ratio as a dense implicit reward for the student. In plain terms, the checkpoint pair tells us which actions RL made the weak model more or less likely to take, and Direct-OPD applies that signal on the stronger student's own on-policy states. This directly reuses the weak model's RL supervision signal without running sparse-reward RL on the target model. Empirically, Direct-OPD consistently leverages weaker teachers to improve stronger target models; notably, it boosts Qwen3-1.7B from 48.3% to 58.3% on AIME 2024 in just 4 hours on 8 A100 GPUs. It outperforms step-matched direct RL and enables the sequential composition of multiple policy shifts. Our results show that RL outcomes can be reused across model scales as implicit reward signals, not merely as final models to imitate.", 'score': 3, 'issue_id': 2641, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '8cc271818dfed97d', 'authors': ['Shiyuan Feng', 'Huan-ang Gao', 'Haohan Chi', 'Hanlin Wu', 'Zhilong Zhang', 'Zheng Jiang', 'Bingxiang He', 'Wei-Ying Ma', 'Ya-Qin Zhang', 'Hao Zhou'], 'affiliations': ['Department of Computer Science and Technology, Tsinghua University', 'Institute for AI Industry Research (AIR), Tsinghua University', 'Peking University', 'SIA-Lab of Tsinghua AIR and ByteDance Seed'], 'pdf_title_img': 'assets/pdf/title_img/2607.05394.jpg', 'data': {'categories': ['#reasoning', '#transfer_learning', '#rl', '#optimization', '#small_models', '#training'], 'emoji': '🔄', 'ru': {'title': 'Передача RL-улучшений через неявные сигналы награды', 'desc': 'В статье предложен метод Direct On-Policy Distillation для эффективной передачи улучшений от обучения с подкреплением с малых моделей на большие. Вместо прямой дистилляции политики учителя, метод извлекает сдвиг политики, вызванный RL, и использует логарифм отношения вероятностей действий как неявный сигнал награды для студента. Этот подход позволяет переиспользовать сигналы обучения с подкреплением малой модели без дорогостоящего переобучения на целевой модели. Эмпирические результаты демонстрируют, что Direct-OPD эффективно улучшает производительность больших моделей, обеспечивая значительное ускорение постобучения.'}, 'en': {'title': 'Efficiently Scaling RL Improvements with Direct On-Policy Distillation', 'desc': 'This paper introduces Direct On-Policy Distillation (Direct-OPD), a method that enhances larger reinforcement learning (RL) models by transferring knowledge from smaller, more efficient models. Instead of re-running costly RL training on the larger model, Direct-OPD uses the policy changes observed in the smaller model as a reward signal to guide the training of the larger model. This approach allows for the efficient scaling of RL improvements without the need for extensive rollouts on the target model. The results demonstrate that this method significantly boosts performance in language model reasoning tasks while reducing training time and resource consumption.'}, 'zh': {'title': '利用小模型提升大模型的强化学习效率', 'desc': '本文提出了一种名为直接在线策略蒸馏（Direct On-Policy Distillation, Direct-OPD）的方法，旨在将强化学习的改进从小模型转移到大模型上。通过利用小模型在强化学习中产生的策略变化作为隐式奖励信号，Direct-OPD能够高效地进行模型训练，而无需在目标模型上重复昂贵的强化学习过程。该方法通过比较小模型的后强化学习策略与其前强化学习参考，提取出有用的策略变化，从而提升大模型的性能。实验结果表明，Direct-OPD能够显著提高大模型的表现，展示了在不同规模模型之间重用强化学习结果的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.00397', 'title': 'NeuroCogMap Reveals Cognitive Organization of Large Language Models', 'url': 'https://huggingface.co/papers/2607.00397', 'abstract': 'Abstract  Understanding how complex cognitive functions are organized within artificial systems is central to interpreting large language models (LLMs) and relating them to biological cognition. Yet although LLMs exhibit broad cognitive-like behaviours, it remains unclear whether their internal representations form reproducible functional systems that explain behaviour, failure and links to human cognition. Here we present NeuroCogMap, a cognitive neuroscience-inspired framework that organizes internal features of LLMs into functional parcels and links them to interpretable functions, cognitive capabilities and a cognitive hierarchy. These parcels form a stable and semantically coherent organization that is partly conserved across models and functionally linked to model outputs. Within this organization, major LLM failures, including hallucination, bias, refusal failure and sycophancy, correspond to distinct disruptions in representational and behavioural-control systems, yielding internal signatures for mechanism-guided detection and targeted intervention. Beyond model behaviour, NeuroCogMap improves prediction of human cortical responses during naturalistic language comprehension, with the strongest correspondence in higher-order association cortex. At the cognitive level, its internal signatures expose latent strategies that guide refinements of classical models of human decision-making. Together, these findings establish NeuroCogMap as a system-level framework for mapping functional organization in artificial systems and for relating this organization to human cortical function and cognitive behaviour.', 'score': 3, 'issue_id': 2641, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'e20c48fd6bc0e6c7', 'authors': ['Zhongxiang Sun', 'Haolang Lu', 'Qiang Ma', 'Qi Li', 'Qipeng Wang', 'Liang Pang', 'Chenyu Liu', 'Qiankun Li', 'Hao Sun', 'Kun Wang', 'Yi Zeng', 'Jun Xu', 'Guoqi Li', 'Ji-Rong Wen'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'College of Computing and Data Science, Nanyang Technological University', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Huazhong University of Science and Technology', 'IGS, Imperial College London', 'Institute of Automation, Chinese Academy of Sciences', 'State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.00397.jpg', 'data': {'categories': ['#architecture', '#interpretability', '#hallucinations', '#alignment', '#ethics'], 'emoji': '🧠', 'ru': {'title': 'Когнитивная картография языковых моделей через функциональные области мозга', 'desc': 'В работе представлена NeuroCogMap — фреймворк, вдохновленный когнитивной нейронаукой, который организует внутренние признаки больших языковых моделей в функциональные области и связывает их с интерпретируемыми функциями и когнитивными способностями. Исследователи показывают, что эти области формируют стабильную и семантически согласованную организацию, которая частично сохраняется между моделями и функционально связана с выходными данными. Основные ошибки LLM — такие как галлюцинации, смещения и отказ следовать инструкциям — соответствуют различным нарушениям в системах представления и поведенческого контроля, что позволяет выявлять и исправлять их механизмы. Полученные внутренние сигнатуры улучшают предсказание активности человеческой коры мозга при понимании речи и раскрывают скрытые стратегии, которые влияют на классические модели принятия решений.'}, 'en': {'title': 'Mapping AI Minds: NeuroCogMap Connects Language Models to Human Cognition', 'desc': 'This paper introduces NeuroCogMap, a framework that helps us understand how large language models (LLMs) organize their internal features in a way that resembles human cognitive functions. It identifies functional parcels within LLMs that correspond to specific cognitive capabilities and behaviors, allowing us to interpret their outputs better. The framework also highlights how certain failures in LLMs, like hallucinations and biases, can be traced back to disruptions in their internal systems. Additionally, NeuroCogMap enhances our ability to predict human brain responses during language comprehension, linking artificial intelligence more closely to human cognitive processes.'}, 'zh': {'title': 'NeuroCogMap：揭示人工智能认知功能的框架', 'desc': '本文介绍了NeuroCogMap，这是一个受认知神经科学启发的框架，用于组织大型语言模型（LLMs）的内部特征，并将其与可解释的功能和认知能力联系起来。该框架将内部特征划分为功能性区域，这些区域在不同模型中部分保留，并与模型输出功能相关联。通过识别主要的LLM失败（如幻觉、偏见等），我们可以发现内部机制的特征，从而进行针对性的干预。NeuroCogMap不仅改善了对人类语言理解时皮层反应的预测，还揭示了指导人类决策模型改进的潜在策略。'}}}, {'id': 'https://huggingface.co/papers/2607.11644', 'title': 'Motion4Motion: Motion Transfer Across Subjects at Inference', 'url': 'https://huggingface.co/papers/2607.11644', 'abstract': 'Abstract  This work explores the motion transfer from one video to another, which is crucial in animation for diverse characters. Previously, video motion transfer has been largely explored between human and human-like characters, enabling a lot of applications in digital creation. However, these approaches encounter a main limitation. Specifically, related technical pipelines heavily rely on a predefined human skeleton structure and accordingly require skeleton-conditional model training. On the one hand, these methods are difficult to generalize to diverse characters, such as animals from different species, while preserving their unique motion styles. On the other hand, labeled data in diverse skeletons is limited, which additionally restricts the large-scale training for the task. In this paper, we jump out of the skeleton-based motion transfer framework and propose a training-free motion transfer framework, named Motion4Motion. Motion4Motionmodels the motion flow of the character in a video instead of skeletons, which makes motion transfer across species easier. Extensive experimental results and novel applications show our methods outperform baselines impressively. Project page is available at https://lhchen.top/Motion4Motion.', 'score': 1, 'issue_id': 2641, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '2211df48b3e55945', 'authors': ['Ling-Hao Chen', 'Zixin Yin', 'Duomin Wang', 'Xianfang Zeng', 'Gang Yu'], 'affiliations': ['Stepfun', 'The Hong Kong University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.11644.jpg', 'data': {'categories': ['#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Передача движений без скелетов: универсальный метод для любых персонажей', 'desc': 'В статье предложен новый подход к передаче движений между видео, который работает без использования предварительно определённой структуры скелета персонажа. Авторы создали метод Motion4Motion, который моделирует поток движений напрямую из видео вместо анализа костной структуры, что позволяет легче переносить движения между разными видами животных и персонажами. Это решает основную проблему существующих методов — их низкую обобщаемость на разнообразных персонажей и необходимость в большом количестве размеченных данных для разных скелетов. Предложенный framework требует обучения только один раз и показывает значительное улучшение результатов по сравнению с базовыми методами.'}, 'en': {'title': 'Motion Transfer Without Skeletons: Flexibility Across Species', 'desc': 'This paper introduces a new method for transferring motion from one video to another without relying on a predefined skeleton structure. The proposed framework, called Motion4Motion, focuses on modeling the motion flow of characters directly, allowing for more flexibility in transferring motion across different species, including animals. This approach addresses the limitations of previous methods that struggled with diverse characters due to their dependence on human-like skeletons and the scarcity of labeled data. Experimental results demonstrate that Motion4Motion significantly outperforms existing techniques, showcasing its potential for various applications in digital animation.'}, 'zh': {'title': '打破骨架限制，实现多样化运动转移', 'desc': '本文探讨了视频间的运动转移，这在动画制作中对多样化角色至关重要。以往的研究主要集中在人类与类人角色之间的运动转移，但这些方法依赖于预定义的人体骨架结构，限制了其在多样化角色上的应用。我们提出了一种名为Motion4Motion的无骨架运动转移框架，通过建模视频中角色的运动流，使得跨物种的运动转移变得更加简单。实验结果表明，我们的方法在性能上显著优于传统基线。'}}}, {'id': 'https://huggingface.co/papers/2607.10623', 'title': 'LATO.2: Factorized 3D Mesh Generation with Vertex and Topology Flow', 'url': 'https://huggingface.co/papers/2607.10623', 'abstract': 'Abstract  Flow matching over carefully designed latent representations has recently emerged as a powerful paradigm for topology-aware mesh generation. Existing approaches, however, model vertices and connectivity jointly in a joint latent space, entangling continuous vertex geometry with discrete combinatorial structure; this complicates flow learning and manifests as drifting vertices and broken surfaces. We present LATO.2, a factorized flow matching framework that decomposes mesh generation into a vertex flow followed by a connectivity flow conditioned on the realized vertices, with both stages anchored to a shared coarse voxel scaffold. Dedicated VAEs underpin the two stages, recovering vertices at sub-voxel precision and embedding discrete connectivity into a continuous latent space. We demonstrate two advantages unique to this factorization: (i) part-wise generation, in which the scaffold is partitioned and each part synthesized at full latent capacity, yielding substantially higher-resolution meshes than a monolithic latent permits; and (ii) topology-adaptive editing, in which manipulating first-stage vertices induces the corresponding connectivity without re-optimization. Experiments show that LATO.2 surpasses state-of-the-art topology-aware mesh generators in geometric fidelity and connectivity quality.', 'score': 0, 'issue_id': 2641, 'pub_date': '2026-07-12', 'pub_date_card': {'ru': '12 июля', 'en': 'July 12', 'zh': '7月12日'}, 'hash': 'c320f3e6cb496cd3', 'authors': ['Hang Long', 'Tianhao Zhao', 'Junkai Lin', 'Youjia Zhang', 'Huipeng Guo', 'Rendong Liang', 'Jiale Xu', 'Jozef Hladký', 'Matthias Nießner', 'Wei Yang'], 'affiliations': ['Huazhong University of Science and Technology', 'Independent Researcher', 'Meshy AI', 'Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2607.10623.jpg', 'data': {'categories': ['#architecture', '#training', '#3d'], 'emoji': '🧬', 'ru': {'title': 'Факторизованный поток для интеллектуальной генерации трёхмерных сеток', 'desc': 'В статье предложен LATO.2 — фреймворк для генерации трёхмерных сеток, который использует flow matching над факторизованными латентными представлениями. Ключевая идея заключается в разделении процесса генерации на два этапа: сначала генерируются вершины с помощью потока, а затем связность между ними обусловливается реализованными вершинами. Оба этапа опираются на общий воксельный каркас и используют специализированные VAE для восстановления геометрии с высокой точностью и встраивания дискретной структуры в непрерывное пространство. Факторизованный подход позволяет генерировать высокодетальные сетки с лучшей геометрической точностью и качеством топологии по сравнению с существующими методами.'}, 'en': {'title': 'LATO.2: Revolutionizing Mesh Generation with Factorized Flow Matching', 'desc': 'The paper introduces LATO.2, a novel framework for generating 3D meshes using flow matching techniques. It separates the generation process into two distinct stages: one for vertex flow and another for connectivity flow, which allows for better handling of mesh topology. By utilizing Variational Autoencoders (VAEs) for each stage, LATO.2 achieves high precision in vertex placement and effectively embeds connectivity in a continuous space. This factorization leads to improved mesh resolution and enables topology-adaptive editing, making it a significant advancement over existing methods.'}, 'zh': {'title': 'LATO.2：高精度网格生成的新方法', 'desc': '本文介绍了一种名为LATO.2的流匹配框架，用于生成具有拓扑意识的网格。该方法将网格生成分解为两个阶段：首先生成顶点流，然后在已生成的顶点基础上生成连接流。通过使用专门的变分自编码器（VAE），LATO.2能够以亚体素精度恢复顶点，并将离散连接嵌入到连续的潜在空间中。实验结果表明，LATO.2在几何精度和连接质量上超越了现有的最先进的拓扑感知网格生成器。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        }

            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                title.innerHTML = "hf nightly";

                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;

        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (3)', '#agi', '#alignment (1)', '#architecture (2)', '#audio (1)', '#benchmark (3)', '#cv (2)', '#data', '#dataset (3)', '#diffusion (1)', '#ethics (1)', '#games', '#graphs (1)', '#hallucinations (1)', '#healthcare', '#inference', '#interpretability (1)', '#leakage (1)', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (5)', '#open_source', '#optimization (1)', '#plp', '#rag', '#reasoning (3)', '#rl (1)', '#rlhf', '#robotics (2)', '#science (1)', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic', '#training (2)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;

                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);

                let explanation = item["data"][currentLang]["desc"];

                articlesContainer.innerHTML += articleHTML;

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }

                    }
                }
            } else {            
                if (isToday('2026-07-14 04:44')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
