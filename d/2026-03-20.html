c3r-vlm', 'score': 3, 'issue_id': 1579, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': 'c3731ae5c279b51f', 'authors': ['Kevin Qu', 'Haozhe Qi', 'Mihai Dusmanu', 'Mahdi Rad', 'Rui Wang', 'Marc Pollefeys'], 'affiliations': ['EPFL', 'ETH Zurich', 'Microsoft Spatial AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.18002.jpg', 'data': {'categories': ['#3d', '#video', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'Добавляем 3D-понимание к языковым моделям через видеосупервизию', 'desc': 'Loc3R-VLM расширяет двумерные модели зрения и языка трёхмерным пониманием сцены, используя пространственную супервизию из монокулярного видео. Модель использует два совместных объектива: глобальную реконструкцию раскладки для построения целостного представления структуры сцены и явное моделирование ситуации для фиксации эгоцентрической перспективы. Для обеспечения геометрической согласованности применяются приоры позиции камеры из предобученной трёхмерной фундаментальной модели. Фреймворк достигает передовых результатов в локализации на основе языка и ответов на трёхмерные вопросы.'}, 'en': {'title': 'Bridging 2D Vision and 3D Understanding with Loc3R-VLM', 'desc': 'Loc3R-VLM is a framework that enhances 2D Vision-Language Models by integrating 3D understanding from monocular video inputs. It uses spatial supervision to improve language-based localization and 3D question-answering tasks. The model focuses on global layout reconstruction and situation modeling to create a comprehensive scene representation and maintain an egocentric perspective. By utilizing camera pose priors from a pre-trained 3D model, Loc3R-VLM achieves superior performance in understanding spatial relationships and context in 3D environments.'}, 'zh': {'title': '增强 2D 模型的 3D 理解能力', 'desc': 'Loc3R-VLM 是一种增强 2D 视觉-语言模型的框架，赋予其 3D 理解能力。该模型通过单目视频输入提供空间监督，帮助模型在语言基础的定位和 3D 问答任务中表现出色。Loc3R-VLM 结合了全局布局重建和情境建模两个目标，以实现对场景结构的全面理解。通过利用轻量级的相机姿态先验，确保几何一致性和度量尺度对齐，从而提升了模型的 3D 理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.16929', 'title': 'MHPO: Modulated Hazard-aware Policy Optimization for Stable Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.16929', 'abstract': 'Abstract Modulated Hazard-aware Policy Optimization introduces a Log-Fidelity Modulator and Decoupled Hazard Penalty to stabilize reinforcement learning by controlling importance ratios and regulating asymmetric policy shifts.  AI-generated summary Regulating the importance ratio is critical for the training stability of Group Relative Policy Optimization (GRPO) based frameworks. However, prevailing ratio control methods, such as hard clipping, suffer from non-differentiable boundaries and vanishing gradient regions, failing to maintain gradient fidelity. Furthermore, these methods lack a hazard-aware mechanism to adaptively suppress extreme deviations, leaving the optimization process vulnerable to abrupt policy shifts. To address these challenges, we propose Modulated Hazard-aware Policy Optimization (MHPO), a novel framework designed for robust and stable reinforcement learning. The proposed MHPO introduces a Log-Fidelity Modulator (LFM) to map unbounded importance ratios into a bounded, differentiable domain. This mechanism effectively prevents high-variance outlier tokens from destabilizing the loss landscape while ensuring global gradient stability. Complementarily, a Decoupled Hazard Penalty (DHP) integrates cumulative hazard functions from survival analysis to independently regulate positive and negative policy shifts. By shaping the optimization landscape with hazard-aware penalties, the proposed MHPO achieves fine-grained regulation of asymmetric policy shifts simultaneously mitigating mode collapse from over-expansion and preventing policy erosion from catastrophic contraction within a stabilized trust region. Extensive evaluations on diverse reasoning benchmarks across both text-based and vision-language tasks demonstrate that MHPO consistently outperforms existing methods, achieving superior performance while significantly enhancing training stability.', 'score': 3, 'issue_id': 1578, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': 'ab715584287b32ac', 'authors': ['Hongjun Wang', 'Wei Liu', 'Weibo Gu', 'Xing Sun', 'Kai Han'], 'affiliations': ['Tencent Youtu Lab', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.16929.jpg', 'data': {'categories': ['#training', '#rl', '#multimodal'], 'emoji': '⚖️', 'ru': {'title': 'Уравновешивание рисков в обучении с подкреплением через осведомленную о опасностях оптимизацию', 'desc': 'В статье предлагается новый метод оптимизации политики для обучения с подкреплением, который решает проблему нестабильности при работе с коэффициентами важности. Авторы вводят Log-Fidelity Modulator, который преобразует неограниченные коэффициенты важности в дифференцируемую область, обеспечивая стабильность градиентов и предотвращая влияние выбросов. Дополнительно предложен Decoupled Hazard Penalty на основе функций выживаемости для независимого регулирования положительных и отрицательных сдвигов политики. Метод демонстрирует улучшенную производительность и стабильность обучения на различных бенчмарках для текстовых и мультимодальных задач.'}, 'en': {'title': 'Stabilizing Reinforcement Learning with Hazard-aware Optimization', 'desc': 'Modulated Hazard-aware Policy Optimization (MHPO) is a new approach in reinforcement learning that aims to improve training stability. It introduces a Log-Fidelity Modulator to transform unbounded importance ratios into a stable, differentiable form, which helps maintain gradient fidelity during optimization. Additionally, the Decoupled Hazard Penalty is used to manage policy shifts by applying hazard functions, allowing for better control over both positive and negative changes in policy. This framework has shown to outperform existing methods in various tasks, enhancing performance while ensuring a more stable training process.'}, 'zh': {'title': '稳定强化学习的新方法：调制危险感知策略优化', 'desc': '本文提出了一种新的强化学习框架，称为调制危险感知策略优化（MHPO），旨在提高训练的稳定性。MHPO引入了对数保真调制器（LFM），将不受限的重要性比率映射到一个有界且可微分的领域，从而防止高方差的异常值影响损失函数的稳定性。同时，解耦危险惩罚（DHP）结合生存分析中的累积危险函数，独立调节正负策略的变化。通过这种方式，MHPO能够有效地管理不对称的策略变化，避免模式崩溃和策略侵蚀，显著提升了训练的稳定性和性能。'}}}, {'id': 'https://huggingface.co/papers/2603.18886', 'title': 'Reasoning over mathematical objects: on-policy reward modeling and test time aggregation', 'url': 'https://huggingface.co/papers/2603.18886', 'abstract': 'Abstract Training recipes using LLM judges and verifiers improve mathematical object derivation capabilities, showing cross-format generalization in reasoning tasks.  AI-generated summary The ability to precisely derive mathematical objects is a core requirement for downstream STEM applications, including mathematics, physics, and chemistry, where reasoning must culminate in formally structured expressions. Yet, current LM evaluations of mathematical and scientific reasoning rely heavily on simplified answer formats such as numerical values or multiple choice options due to the convenience of automated assessment. In this paper we provide three contributions for improving reasoning over mathematical objects: (i) we build and release training data and benchmarks for deriving mathematical objects, the Principia suite; (ii) we provide training recipes with strong LLM-judges and verifiers, where we show that on-policy judge training boosts performance; (iii) we show how on-policy training can also be used to scale test-time compute via aggregation. We find that strong LMs such as Qwen3-235B and o3 struggle on Principia, while our training recipes can bring significant improvements over different LLM backbones, while simultaneously improving results on existing numerical and MCQA tasks, demonstrating cross-format generalization of reasoning abilities.', 'score': 1, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '49737da7c249fed6', 'authors': ['Pranjal Aggarwal', 'Marjan Ghazvininejad', 'Seungone Kim', 'Ilia Kulikov', 'Jack Lanchantin', 'Xian Li', 'Tianjian Li', 'Bo Liu', 'Graham Neubig', 'Anaelia Ovalle', 'Swarnadeep Saha', 'Sainbayar Sukhbaatar', 'Sean Welleck', 'Jason Weston', 'Chenxi Whitehouse', 'Adina Williams', 'Jing Xu', 'Ping Yu', 'Weizhe Yuan', 'Jingyu Zhang', 'Wenting Zhao'], 'affiliations': ['CMU', 'FAIR at Meta', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2603.18886.jpg', 'data': {'categories': ['#dataset', '#science', '#training', '#math', '#open_source', '#reasoning', '#benchmark'], 'emoji': '🧮', 'ru': {'title': 'Обучение моделей точному выводу математических объектов через LLM-судей и верификаторов', 'desc': 'В статье предлагаются методы обучения больших языковых моделей для точного вывода математических объектов с использованием специализированных судей и верификаторов. Авторы создают набор данных и бенчмарков Principia для оценки способности моделей к математическому рассуждению в формально структурированном виде. Они демонстрируют, что обучение судей по методу on-policy значительно улучшает качество вывода и позволяет эффективнее использовать вычислительные ресурсы во время инференса через агрегацию. Полученные результаты показывают кросс-форматную обобщаемость рассуждений: модели улучшают производительность одновременно на задачах вывода математических объектов и на традиционных численных ответах.'}, 'en': {'title': 'Enhancing Mathematical Reasoning in LLMs with Principia Suite', 'desc': 'This paper focuses on enhancing the ability of large language models (LLMs) to derive mathematical objects, which is essential for applications in STEM fields. The authors introduce the Principia suite, a new set of training data and benchmarks specifically designed for this purpose. They also present training recipes that utilize LLM judges and verifiers, showing that on-policy judge training significantly improves performance. The results indicate that while some strong LLMs struggle with the new benchmarks, the proposed methods lead to better reasoning capabilities across various formats, including numerical and multiple-choice questions.'}, 'zh': {'title': '提升数学推导能力的训练方法', 'desc': '本论文探讨了使用大型语言模型（LLM）评估者和验证者的训练方法，以提高数学对象推导能力。我们构建并发布了一个名为Principia的训练数据集和基准，专注于数学对象的推导。研究表明，使用在政策上训练的评估者可以显著提升模型的表现，并且这种训练方法还可以在测试时通过聚合来扩展计算能力。我们的结果显示，尽管强大的语言模型在Principia上表现不佳，但通过我们的训练方法可以在不同的LLM基础上显著改善推理能力，同时提升现有的数值和多项选择题任务的结果。'}}}, {'id': 'https://huggingface.co/papers/2603.17554', 'title': 'Prompt-Free Universal Region Proposal Network', 'url': 'https://huggingface.co/papers/2603.17554', 'abstract': 'Abstract A prompt-free region proposal network uses sparse image-aware adapters and cascade self-prompting to identify potential objects without external prompts across diverse computer vision applications.  AI-generated summary Identifying potential objects is critical for object recognition and analysis across various computer vision applications. Existing methods typically localize potential objects by relying on exemplar images, predefined categories, or textual descriptions. However, their reliance on image and text prompts often limits flexibility, restricting adaptability in real-world scenarios. In this paper, we introduce a novel Prompt-Free Universal Region Proposal Network (PF-RPN), which identifies potential objects without relying on external prompts. First, the Sparse Image-Aware Adapter (SIA) module performs initial localization of potential objects using a learnable query embedding dynamically updated with visual features. Next, the Cascade Self-Prompt (CSP) module identifies the remaining potential objects by leveraging the self-prompted learnable embedding, autonomously aggregating informative visual features in a cascading manner. Finally, the Centerness-Guided Query Selection (CG-QS) module facilitates the selection of high-quality query embeddings using a centerness scoring network. Our method can be optimized with limited data (e.g., 5% of MS COCO data) and applied directly to various object detection application domains for identifying potential objects without fine-tuning, such as underwater object detection, industrial defect detection, and remote sensing image object detection. Experimental results across 19 datasets validate the effectiveness of our method. Code is available at https://github.com/tangqh03/PF-RPN.', 'score': 1, 'issue_id': 1581, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '7547a5897ec59ec9', 'authors': ['Qihong Tang', 'Changhan Liu', 'Shaofeng Zhang', 'Wenbin Li', 'Qi Fan', 'Yang Gao'], 'affiliations': ['Nanjing University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.17554.jpg', 'data': {'categories': ['#cv', '#architecture'], 'emoji': '🎯', 'ru': {'title': 'Универсальное обнаружение объектов без внешних подсказок', 'desc': 'В статье предлагается нейросетевая архитектура для обнаружения объектов без использования внешних подсказок (промптов). Ключевой компонент - разреженный адаптер, осведомлённый о визуальных признаках, который выполняет начальную локализацию потенциальных объектов. Каскадный самопромптинг позволяет модели автономно агрегировать информативные визуальные признаки для обнаружения оставшихся объектов. Метод эффективно работает с ограниченными данными и универсально применим к различным задачам компьютерного зрения без дополнительной настройки.'}, 'en': {'title': 'Object Detection Without Prompts: A New Era in Computer Vision', 'desc': 'This paper presents a new approach called the Prompt-Free Universal Region Proposal Network (PF-RPN) that identifies potential objects in images without needing external prompts like text or example images. It uses a Sparse Image-Aware Adapter to initially locate objects by dynamically updating a query embedding with visual features. The Cascade Self-Prompt module then refines this process by autonomously aggregating visual information to find more objects. This method is efficient, requiring only a small amount of data for training, and can be applied to various fields such as underwater detection and industrial inspection.'}, 'zh': {'title': '无提示物体识别的新方法', 'desc': '本文提出了一种新颖的无提示通用区域提议网络（PF-RPN），能够在不依赖外部提示的情况下识别潜在物体。该方法使用稀疏图像感知适配器（SIA）模块进行初步定位，并通过级联自提示（CSP）模块进一步识别剩余的潜在物体。最后，中心度引导查询选择（CG-QS）模块帮助选择高质量的查询嵌入。实验结果表明，该方法在多种计算机视觉应用中表现出色，能够在有限数据下进行优化。'}}}, {'id': 'https://huggingface.co/papers/2603.13045', 'title': 'Mending the Holes: Mitigating Reward Hacking in Reinforcement Learning for Multilingual Translation', 'url': 'https://huggingface.co/papers/2603.13045', 'abstract': 'Abstract  Large Language Models (LLMs) have demonstrated remarkable capability in machine translation on high-resource language pairs, yet their performance on low-resource translation still lags behind. Existing post-training methods rely heavily on high-quality parallel data, which are often scarce or unavailable for low-resource languages. In this paper, we introduce WALAR, a reinforcement training method using only monolingual text to elevate LLMs\' translation capabilities on massive low-resource languages while retaining their performance on high-resource languages. Our key insight is based on the observation of failure modes (or "holes") in existing source-based multilingual quality estimation (QE) models. Reinforcement learning (RL) using these QE models tends to amplify such holes, resulting in poorer multilingual LLMs. We develop techniques including word alignment and language alignment to mitigate such holes in WALAR\'s reward for RL training. We continually trained an LLM supporting translation of 101 languages using WALAR. The experiments show that our new model outperforms LLaMAX, one of the strongest open-source multilingual LLMs by a large margin on 1400 language directions on Flores-101 dataset.', 'score': 1, 'issue_id': 1582, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': 'a44d309bcc1a0986', 'authors': ['Yifeng Liu', 'Siqi Ouyang', 'Yatish Hosmane Revanasiddappa', 'Lei Li'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2603.13045.jpg', 'data': {'categories': ['#rl', '#optimization', '#multilingual', '#low_resource', '#open_source', '#training', '#machine_translation'], 'emoji': '🌍', 'ru': {'title': 'Перевод без границ: обучение LLM на монолингвальных данных для малоресурсных языков', 'desc': 'Статья посвящена улучшению способностей больших языковых моделей (LLM) в переводе для малоресурсных языков с помощью метода WALAR. Авторы предлагают использовать обучение с подкреплением на монолингвальных текстах, избегая зависимости от редких параллельных корпусов. Ключевое улучшение заключается в выявлении и коррекции ошибок существующих моделей оценки качества перевода, которые могут усиливаться при обучении с подкреплением. Разработанный метод успешно обучен на 101 языке и показывает значительное улучшение результатов на бенчмарке Flores-101 по сравнению с существующими многоязычными моделями.'}, 'en': {'title': 'Boosting Low-Resource Language Translation with WALAR', 'desc': 'This paper presents WALAR, a novel reinforcement learning method designed to improve the translation capabilities of large language models (LLMs) for low-resource languages. Traditional post-training methods depend on high-quality parallel data, which is often lacking for these languages. WALAR utilizes only monolingual text and addresses the weaknesses in existing multilingual quality estimation models that can degrade performance. The results demonstrate that WALAR significantly enhances translation accuracy across 101 languages, outperforming existing models like LLaMAX on a comprehensive dataset.'}, 'zh': {'title': '提升低资源语言翻译能力的创新方法', 'desc': '大型语言模型（LLMs）在高资源语言对的机器翻译中表现出色，但在低资源语言翻译方面仍然存在不足。现有的后训练方法依赖于高质量的平行数据，而这些数据在低资源语言中往往稀缺或不可用。本文提出了一种名为WALAR的强化训练方法，仅使用单语文本来提升LLMs在大量低资源语言上的翻译能力，同时保持其在高资源语言上的表现。我们通过技术手段如词对齐和语言对齐来减轻现有多语言质量估计模型中的缺陷，从而优化WALAR的强化学习奖励。'}}}, {'id': 'https://huggingface.co/papers/2603.19234', 'title': 'Matryoshka Gaussian Splatting', 'url': 'https://huggingface.co/papers/2603.19234', 'abstract': 'Abstract Matryoshka Gaussian Splatting enables continuous level of detail rendering by training a single ordered set of Gaussians that maintains full-capacity quality while allowing smooth quality-scaling trade-offs.  AI-generated summary The ability to render scenes at adjustable fidelity from a single model, known as level of detail (LoD), is crucial for practical deployment of 3D Gaussian Splatting (3DGS). Existing discrete LoD methods expose only a limited set of operating points, while concurrent continuous LoD approaches enable smoother scaling but often suffer noticeable quality degradation at full capacity, making LoD a costly design decision. We introduce Matryoshka Gaussian Splatting (MGS), a training framework that enables continuous LoD for standard 3DGS pipelines without sacrificing full-capacity rendering quality. MGS learns a single ordered set of Gaussians such that rendering any prefix, the first k splats, produces a coherent reconstruction whose fidelity improves smoothly with increasing budget. Our key idea is stochastic budget training: each iteration samples a random splat budget and optimises both the corresponding prefix and the full set. This strategy requires only two forward passes and introduces no architectural modifications. Experiments across four benchmarks and six baselines show that MGS matches the full-capacity performance of its backbone while enabling a continuous speed-quality trade-off from a single model. Extensive ablations on ordering strategies, training objectives, and model capacity further validate the designs.', 'score': 0, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'fae6b72e9b731fec', 'authors': ['Zhilin Guo', 'Boqiao Zhang', 'Hakan Aktas', 'Kyle Fogarty', 'Jeffrey Hu', 'Nursena Koprucu Aslan', 'Wenzhao Li', 'Canberk Baykal', 'Albert Miao', 'Josef Bengtson', 'Chenliang Zhou', 'Weihao Xia', 'Cristina Nader Vasconcelos. Cengiz Oztireli'], 'affiliations': ['Chalmers University of Technology', 'Google', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.19234.jpg', 'data': {'categories': ['#3d', '#training'], 'emoji': '🪆', 'ru': {'title': 'Матрёшкина архитектура для адаптивного рендеринга гауссовых сплатов', 'desc': 'Matryoshka Gaussian Splatting предлагает новый подход к рендерингу трёхмерных сцен с переменным уровнем детализации, обучая упорядоченный набор гауссианов с использованием стохастического обучения с бюджетом. Метод позволяет плавно масштабировать качество визуализации от быстрого низкокачественного рендеринга до полнокачественного результата, используя один единственный обученный модель. Ключевая идея заключается в том, что каждая итерация обучения случайно выбирает количество гауссианов (бюджет) и оптимизирует как подмножество, так и полный набор сплатов. Экспериментальные результаты показывают, что MGS сохраняет качество полнокапацитного рендеринга при обеспечении непрерывного компромисса между скоростью и качеством без архитектурных изменений.'}, 'en': {'title': 'Continuous Quality Control in 3D Rendering', 'desc': 'Matryoshka Gaussian Splatting (MGS) is a new method for rendering 3D scenes that allows for continuous adjustments in quality without losing the high fidelity of full-capacity rendering. It uses a single set of Gaussians to create a smooth transition in visual quality, making it easier to manage rendering performance. Unlike traditional methods that limit quality options, MGS enables a flexible trade-off between speed and quality by training with a stochastic budget approach. This means it can efficiently optimize rendering for different levels of detail while maintaining the best possible output from the model.'}, 'zh': {'title': '实现连续细节层次渲染的高斯点云技术', 'desc': 'Matryoshka高斯点云渲染（MGS）是一种新的训练框架，能够实现连续的细节层次（LoD）渲染，而不牺牲全容量渲染的质量。与现有的离散LoD方法相比，MGS通过学习一组有序的高斯分布，使得在不同预算下的渲染质量能够平滑地提升。其核心思想是随机预算训练，通过每次迭代随机采样预算，优化相应的渲染前缀和完整集合。实验结果表明，MGS在多个基准测试中表现出与全容量性能相匹配的效果，同时实现了从单一模型的连续速度与质量的权衡。'}}}, {'id': 'https://huggingface.co/papers/2603.13395', 'title': 'COT-FM: Cluster-wise Optimal Transport Flow Matching', 'url': 'https://huggingface.co/papers/2603.13395', 'abstract': 'Abstract COT-FM enhances flow matching generation by reshaping probability paths through clustering and dedicated source distributions, resulting in faster and more reliable sampling across diverse tasks.  AI-generated summary We introduce COT-FM, a general framework that reshapes the probability path in Flow Matching (FM) to achieve faster and more reliable generation. FM models often produce curved trajectories due to random or batchwise couplings, which increase discretization error and reduce sample quality. COT-FM fixes this by clustering target samples and assigning each cluster a dedicated source distribution obtained by reversing pretrained FM models. This divide-and-conquer strategy yields more accurate local transport and significantly straighter vector fields, all without changing the model architecture. As a plug-and-play approach, COT-FM consistently accelerates sampling and improves generation quality across 2D datasets, image generation benchmarks, and robotic manipulation tasks.', 'score': 0, 'issue_id': 1578, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'f339ac8641d546ef', 'authors': ['Chiensheng Chiang', 'Kuan-Hsun Tu', 'Jia-Wei Liao', 'Cheng-Fu Chou', 'Tsung-Wei Ke'], 'affiliations': ['National Taiwan University'], 'pdf_title_img': 'assets/pdf/title_img/2603.13395.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Прямые пути к быстрой генерации: кластеризация для Flow Matching', 'desc': 'В работе предложен COT-FM — фреймворк, который оптимизирует траектории вероятности в Flow Matching моделях через кластеризацию целевых образцов. Каждому кластеру назначается своё исходное распределение, полученное обращением предварительно обученных FM моделей. Такой подход типа «разделяй и властвуй» уменьшает ошибку дискретизации и выпрямляет векторные поля, не изменяя архитектуру модели. COT-FM работает как plug-and-play компонент и значительно ускоряет генерацию, одновременно улучшая качество результатов на различных задачах — от синтеза изображений до робототехники.'}, 'en': {'title': 'COT-FM: Faster and More Reliable Flow Matching Generation', 'desc': 'COT-FM is a new framework that improves the generation of samples in Flow Matching (FM) models by adjusting the probability paths. It addresses the issue of curved trajectories caused by random couplings, which can lead to lower quality samples. By clustering target samples and using specific source distributions for each cluster, COT-FM enhances the accuracy of local transport. This method allows for faster and more reliable sampling without altering the existing model architecture, making it effective across various tasks.'}, 'zh': {'title': 'COT-FM：加速流匹配生成的创新框架', 'desc': 'COT-FM是一种改进的流匹配生成框架，通过聚类和专用源分布重塑概率路径，从而实现更快和更可靠的采样。传统的流匹配模型由于随机或批量耦合，常常产生弯曲的轨迹，导致离散化误差增加和样本质量下降。COT-FM通过聚类目标样本并为每个聚类分配专用的源分布来解决这个问题，这些源分布是通过反转预训练的流匹配模型获得的。该方法在不改变模型架构的情况下，显著提高了局部传输的准确性和向量场的直线性，适用于多种任务。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (5)', '#agents (4)', '#agi', '#alignment', '#architecture (7)', '#audio (2)', '#benchmark (9)', '#cv (5)', '#data (1)', '#dataset (7)', '#diffusion (4)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource (2)', '#machine_translation (1)', '#math (2)', '#multilingual (3)', '#multimodal (12)', '#open_source (8)', '#optimization (4)', '#plp', '#rag', '#reasoning (2)', '#rl (5)', '#rlhf', '#robotics (2)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (11)', '#transfer_learning (2)', '#video (7)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {

                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `

                        <div class="article-content" onclick="toggleAbstract(${index})">

                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-20 11:26',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-20 11:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-20 11:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
