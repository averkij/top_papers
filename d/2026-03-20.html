    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                    flag.classList.add('active');

                flag.addEventListener('click', () => {

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.19235', 'title': 'Generation Models Know Space: Unleashing Implicit 3D Priors for Scene Understanding', 'url': 'https://huggingface.co/papers/2603.19235', 'abstract': 'Abstract A video diffusion model is repurposed as a latent world simulator to enhance multimodal large language models with implicit 3D structural priors and physical laws through spatiotemporal feature extraction and semantic integration.  AI-generated summary While Multimodal Large Language Models demonstrate impressive semantic capabilities, they often suffer from spatial blindness, struggling with fine-grained geometric reasoning and physical dynamics. Existing solutions typically rely on explicit 3D modalities or complex geometric scaffolding, which are limited by data scarcity and generalization challenges. In this work, we propose a paradigm shift by leveraging the implicit spatial prior within large-scale video generation models. We posit that to synthesize temporally coherent videos, these models inherently learn robust 3D structural priors and physical laws. We introduce VEGA-3D (Video Extracted Generative Awareness), a plug-and-play framework that repurposes a pre-trained video diffusion model as a Latent World Simulator. By extracting spatiotemporal features from intermediate noise levels and integrating them with semantic representations via a token-level adaptive gated fusion mechanism, we enrich MLLMs with dense geometric cues without explicit 3D supervision. Extensive experiments across 3D scene understanding, spatial reasoning, and embodied manipulation benchmarks demonstrate that our method outperforms state-of-the-art baselines, validating that generative priors provide a scalable foundation for physical-world understanding. Code is publicly available at https://github.com/H-EmbodVis/VEGA-3D.', 'score': 58, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'b470519cf8a22eb3', 'authors': ['Xianjin Wu', 'Dingkang Liang', 'Tianrui Feng', 'Kui Xia', 'Yumeng Zhang', 'Xiaofan Li', 'Xiao Tan', 'Xiang Bai'], 'affiliations': ['Baidu Inc., China', 'Huazhong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.19235.jpg', 'data': {'categories': ['#3d', '#diffusion', '#multimodal', '#video', '#architecture', '#open_source', '#transfer_learning', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Видеогенеративные модели как источник неявных трёхмерных представлений для языковых ассистентов', 'desc': 'В работе предложен VEGA-3D — фреймворк, который переоборудует предварительно обученную видеодиффузионную модель в симулятор скрытого мира для усиления мультимодальных больших языковых моделей. Авторы показали, что видеогенеративные модели неявно изучают прочные трёхмерные структурные закономерности и физические законы при синтезе временно согласованных видео. Система извлекает пространственно-временные признаки из промежуточных уровней шума и интегрирует их с семантическими представлениями через механизм адаптивного управляемого слияния на уровне токенов, что обогащает МЛЛМ плотными геометрическими подсказками без явного трёхмерного обучения. Экспериментальная валидация на задачах понимания 3D-сцен, пространственных рассуждений и воплощённого манипулирования подтверждает превосходство метода и демонстрирует масштабируемость генеративных приоров для понимания физического мира.'}, 'en': {'title': 'Enhancing Language Models with Implicit 3D Understanding', 'desc': 'This paper introduces VEGA-3D, a novel framework that enhances multimodal large language models (MLLMs) by integrating implicit 3D structural knowledge and physical laws derived from video diffusion models. The approach addresses the limitations of MLLMs in spatial reasoning and geometric understanding by utilizing spatiotemporal features extracted from video data. By employing a token-level adaptive gated fusion mechanism, VEGA-3D enriches MLLMs with geometric cues without the need for explicit 3D supervision. Experimental results show that this method significantly improves performance in tasks related to 3D scene understanding and spatial reasoning compared to existing techniques.'}, 'zh': {'title': '利用视频生成模型提升多模态语言模型的空间理解能力', 'desc': '本论文提出了一种新方法，将视频扩散模型转化为潜在世界模拟器，以增强多模态大型语言模型的能力。通过提取时空特征和语义整合，该方法为模型提供了隐含的三维结构先验和物理法则。与传统依赖显式三维模态的解决方案不同，我们的方法无需复杂的几何框架，能够有效应对数据稀缺和泛化挑战。实验结果表明，VEGA-3D在三维场景理解、空间推理和体态操作基准测试中超越了现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.19228', 'title': 'SAMA: Factorized Semantic Anchoring and Motion Alignment for Instruction-Guided Video Editing', 'url': 'https://huggingface.co/papers/2603.19228', 'abstract': 'Abstract SAMA presents a factorized approach to video editing that separates semantic anchoring from motion modeling, enabling instruction-guided edits with preserved motion through pre-trained motion restoration tasks and sparse anchor frame prediction.  AI-generated summary Current instruction-guided video editing models struggle to simultaneously balance precise semantic modifications with faithful motion preservation. While existing approaches rely on injecting explicit external priors (e.g., VLM features or structural conditions) to mitigate these issues, this reliance severely bottlenecks model robustness and generalization. To overcome this limitation, we present SAMA (factorized Semantic Anchoring and Motion Alignment), a framework that factorizes video editing into semantic anchoring and motion modeling. First, we introduce Semantic Anchoring, which establishes a reliable visual anchor by jointly predicting semantic tokens and video latents at sparse anchor frames, enabling purely instruction-aware structural planning. Second, Motion Alignment pre-trains the same backbone on motion-centric video restoration pretext tasks (cube inpainting, speed perturbation, and tube shuffle), enabling the model to internalize temporal dynamics directly from raw videos. SAMA is optimized with a two-stage pipeline: a factorized pre-training stage that learns inherent semantic-motion representations without paired video-instruction editing data, followed by supervised fine-tuning on paired editing data. Remarkably, the factorized pre-training alone already yields strong zero-shot video editing ability, validating the proposed factorization. SAMA achieves state-of-the-art performance among open-source models and is competitive with leading commercial systems (e.g., Kling-Omni). Code, models, and datasets will be released.', 'score': 54, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '0ed900c8b1690266', 'authors': ['Xinyao Zhang', 'Wenkai Dong', 'Yuxin Song', 'Bo Fang', 'Qi Zhang', 'Jing Wang', 'Fan Chen', 'Hui Zhang', 'Haocheng Feng', 'Yu Lu', 'Hang Zhou', 'Chun Yuan', 'Jingdong Wang'], 'affiliations': ['Baidu', 'City University of Hong Kong', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19228.jpg', 'data': {'categories': ['#video', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Раздельное управление смыслом и движением в видеоредактировании', 'desc': 'SAMA предлагает факторизованный подход к редактированию видео, разделяя семантическое якорирование от моделирования движения. Метод использует предварительно обученные задачи восстановления движения и предсказание разреженных опорных кадров для редактирования видео по инструкциям с сохранением естественного движения. Модель сначала обучается на задачах восстановления видео без парных данных инструкций, а затем дообучается на помеченных парах видео-инструкции. Подход достигает состояния искусства среди открытых моделей и конкурирует с коммерческими системами редактирования видео.'}, 'en': {'title': 'Revolutionizing Video Editing with SAMA: Semantic and Motion Mastery!', 'desc': 'The paper introduces SAMA, a novel framework for video editing that separates the tasks of semantic anchoring and motion modeling. This factorization allows for instruction-guided edits that maintain the original motion of the video, addressing challenges faced by existing models. SAMA employs a two-stage training process, first learning semantic and motion representations without needing paired data, and then fine-tuning with supervised data. The results show that SAMA achieves state-of-the-art performance in video editing, demonstrating its effectiveness and robustness compared to other models.'}, 'zh': {'title': '分解视频编辑，保留运动与语义的完美结合', 'desc': 'SAMA提出了一种分解的视频编辑方法，将语义锚定与运动建模分开，从而实现指导性编辑时运动的保留。该方法通过稀疏锚帧预测和预训练的运动恢复任务，增强了模型的鲁棒性和泛化能力。SAMA框架首先通过语义锚定建立可靠的视觉锚点，然后通过运动对齐直接从原始视频中内化时间动态。最终，SAMA在开源模型中实现了最先进的性能，并与领先的商业系统竞争。'}}}, {'id': 'https://huggingface.co/papers/2603.19199', 'title': 'FASTER: Rethinking Real-Time Flow VLAs', 'url': 'https://huggingface.co/papers/2603.19199', 'abstract': 'Abstract Fast Action Sampling for ImmediaTE Reaction (FASTER) reduces real-time reaction latency in Vision-Language-Action models by adapting sampling schedules to prioritize immediate actions while maintaining long-horizon trajectory quality.  AI-generated summary Real-time execution is crucial for deploying Vision-Language-Action (VLA) models in the physical world. Existing asynchronous inference methods primarily optimize trajectory smoothness, but neglect the critical latency in reacting to environmental changes. By rethinking the notion of reaction in action chunking policies, this paper presents a systematic analysis of the factors governing reaction time. We show that reaction time follows a uniform distribution determined jointly by the Time to First Action (TTFA) and the execution horizon. Moreover, we reveal that the standard practice of applying a constant schedule in flow-based VLAs can be inefficient and forces the system to complete all sampling steps before any movement can start, forming the bottleneck in reaction latency. To overcome this issue, we propose Fast Action Sampling for ImmediaTE Reaction (FASTER). By introducing a Horizon-Aware Schedule, FASTER adaptively prioritizes near-term actions during flow sampling, compressing the denoising of the immediate reaction by tenfold (e.g., in π_{0.5} and X-VLA) into a single step, while preserving the quality of long-horizon trajectory. Coupled with a streaming client-server pipeline, FASTER substantially reduces the effective reaction latency on real robots, especially when deployed on consumer-grade GPUs. Real-world experiments, including a highly dynamic table tennis task, prove that FASTER unlocks unprecedented real-time responsiveness for generalist policies, enabling rapid generation of accurate and smooth trajectories.', 'score': 36, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'b0d39c2783ea2e4d', 'authors': ['Yuxiang Lu', 'Zhe Liu', 'Xianzhe Fan', 'Zhenya Yang', 'Jinghua Hou', 'Junyi Li', 'Kaixin Ding', 'Hengshuang Zhao'], 'affiliations': ['ACE Robotics', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.19199.jpg', 'data': {'categories': ['#cv', '#robotics', '#inference', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Мгновенная реакция: адаптивный sampling для real-time управления роботами', 'desc': 'В работе предложен метод FASTER для снижения задержки реакции в Vision-Language-Action моделях путем адаптивного изменения расписания sampling-а. Авторы анализируют факторы, влияющие на время реакции, и показывают, что стандартное использование постоянного расписания в flow-based моделях неэффективно, так как требует завершения всех шагов denoise перед началом движения. Решение заключается во введении Horizon-Aware Schedule, которая приоритизирует ближайшие действия во время sampling-а, сокращая denoise для немедленной реакции в десять раз и одновременно сохраняя качество долгосрочной траектории. Экспериментальные результаты на реальных роботах, включая задачу настольного тенниса, демонстрируют значительное улучшение real-time ответственности обобщённых моделей политик.'}, 'en': {'title': 'FASTER: Speeding Up Real-Time Reactions in VLA Models', 'desc': 'The paper introduces Fast Action Sampling for ImmediaTE Reaction (FASTER), a method designed to enhance the responsiveness of Vision-Language-Action (VLA) models in real-time applications. It addresses the issue of reaction latency by adapting sampling schedules to focus on immediate actions while still ensuring the quality of longer-term trajectories. The authors analyze how reaction time is influenced by the Time to First Action (TTFA) and execution horizon, revealing inefficiencies in traditional constant sampling schedules. FASTER significantly reduces reaction latency by prioritizing near-term actions, allowing for quicker and smoother execution in dynamic environments, as demonstrated in real-world experiments.'}, 'zh': {'title': '快速反应，实时智能！', 'desc': '本文提出了一种名为FASTER的快速动作采样方法，旨在减少视觉-语言-动作模型的实时反应延迟。通过重新思考动作分块策略中的反应概念，FASTER引入了一种基于地平线的调度，优先考虑近期动作，从而在流采样过程中压缩即时反应的去噪时间。研究表明，反应时间受首次动作时间和执行地平线的共同影响，传统的恒定调度方法效率低下，导致反应延迟瓶颈。通过在真实机器人上进行实验，FASTER显著提高了实时响应能力，尤其是在动态环境中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.18524', 'title': '3DreamBooth: High-Fidelity 3D Subject-Driven Video Generation Model', 'url': 'https://huggingface.co/papers/2603.18524', 'abstract': 'Abstract A novel 3D-aware video customization framework is presented that decouples spatial geometry from temporal motion using a 1-frame optimization approach and incorporates a visual conditioning module for enhanced texture generation.  AI-generated summary Creating dynamic, view-consistent videos of customized subjects is highly sought after for a wide range of emerging applications, including immersive VR/AR, virtual production, and next-generation e-commerce. However, despite rapid progress in subject-driven video generation, existing methods predominantly treat subjects as 2D entities, focusing on transferring identity through single-view visual features or textual prompts. Because real-world subjects are inherently 3D, applying these 2D-centric approaches to 3D object customization reveals a fundamental limitation: they lack the comprehensive spatial priors necessary to reconstruct the 3D geometry. Consequently, when synthesizing novel views, they must rely on generating plausible but arbitrary details for unseen regions, rather than preserving the true 3D identity. Achieving genuine 3D-aware customization remains challenging due to the scarcity of multi-view video datasets. While one might attempt to fine-tune models on limited video sequences, this often leads to temporal overfitting. To resolve these issues, we introduce a novel framework for 3D-aware video customization, comprising 3DreamBooth and 3Dapter. 3DreamBooth decouples spatial geometry from temporal motion through a 1-frame optimization paradigm. By restricting updates to spatial representations, it effectively bakes a robust 3D prior into the model without the need for exhaustive video-based training. To enhance fine-grained textures and accelerate convergence, we incorporate 3Dapter, a visual conditioning module. Following single-view pre-training, 3Dapter undergoes multi-view joint optimization with the main generation branch via an asymmetrical conditioning strategy. This design allows the module to act as a dynamic selective router, querying view-specific geometric hints from a minimal reference set. Project page: https://ko-lani.github.io/3DreamBooth/', 'score': 32, 'issue_id': 1580, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '8948adee0e49ee91', 'authors': ['Hyun-kyu Ko', 'Jihyeon Park', 'Younghyun Kim', 'Dongheok Park', 'Eunbyung Park'], 'affiliations': ['Sungkyunkwan University', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2603.18524.jpg', 'data': {'categories': ['#multimodal', '#3d', '#video'], 'emoji': '🎬', 'ru': {'title': '3D-осознанная персонализация видео через разделение геометрии и движения', 'desc': 'В работе предлагается инновационный подход к созданию динамических видео с учетом 3D-геометрии объектов, который разделяет пространственную геометрию и временное движение. Ключевая идея заключается в оптимизации на основе одного кадра, что позволяет избежать переобучения на ограниченных наборах видеоданных и эффективно встроить 3D-приоры в модель. Для улучшения текстурных деталей авторы добавляют визуальный модуль условного генерирования, который работает как адаптивный маршрутизатор, извлекая геометрические подсказки для каждого ракурса камеры. Предложенный фреймворк решает фундаментальную проблему существующих методов видеогенерации, которые игнорируют истинную 3D-структуру объектов и полагаются на генерацию произвольных деталей для невидимых областей.'}, 'en': {'title': 'Revolutionizing Video Customization with 3D Awareness', 'desc': 'This paper introduces a new framework for creating 3D-aware videos that separates the spatial structure from the motion over time. It uses a method called 1-frame optimization to build a strong 3D model without needing extensive video data. The framework includes a visual conditioning module named 3Dapter, which improves texture quality and speeds up the learning process by optimizing multiple views together. This approach addresses the limitations of traditional 2D methods, allowing for more accurate and realistic video customization of 3D subjects.'}, 'zh': {'title': '实现真实的3D视频定制', 'desc': '本文提出了一种新颖的3D视频定制框架，该框架通过单帧优化方法将空间几何与时间运动解耦，并引入视觉条件模块以增强纹理生成。现有的视频生成方法主要将对象视为2D实体，缺乏重建3D几何所需的全面空间先验。为了解决这一问题，本文介绍了3DreamBooth和3Dapter两个组件，前者通过1帧优化范式有效地将空间表示与时间运动分离。3Dapter则通过不对称条件策略进行多视图联合优化，从而提升细致纹理的生成效果。'}}}, {'id': 'https://huggingface.co/papers/2603.19227', 'title': 'Bridging Semantic and Kinematic Conditions with Diffusion-based Discrete Motion Tokenizer', 'url': 'https://huggingface.co/papers/2603.19227', 'abstract': 'Abstract A three-stage motion generation framework combines discrete token-based planning with diffusion-based synthesis to improve controllability and fidelity while reducing token usage and computational requirements.  AI-generated summary Prior motion generation largely follows two paradigms: continuous diffusion models that excel at kinematic control, and discrete token-based generators that are effective for semantic conditioning. To combine their strengths, we propose a three-stage framework comprising condition feature extraction (Perception), discrete token generation (Planning), and diffusion-based motion synthesis (Control). Central to this framework is MoTok, a diffusion-based discrete motion tokenizer that decouples semantic abstraction from fine-grained reconstruction by delegating motion recovery to a diffusion decoder, enabling compact single-layer tokens while preserving motion fidelity. For kinematic conditions, coarse constraints guide token generation during planning, while fine-grained constraints are enforced during control through diffusion-based optimization. This design prevents kinematic details from disrupting semantic token planning. On HumanML3D, our method significantly improves controllability and fidelity over MaskControl while using only one-sixth of the tokens, reducing trajectory error from 0.72 cm to 0.08 cm and FID from 0.083 to 0.029. Unlike prior methods that degrade under stronger kinematic constraints, ours improves fidelity, reducing FID from 0.033 to 0.014.', 'score': 30, 'issue_id': 1579, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'f2b89544ef41b66c', 'authors': ['Chenyang Gu', 'Mingyuan Zhang', 'Haozhe Xie', 'Zhongang Cai', 'Lei Yang', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.19227.jpg', 'data': {'categories': ['#video', '#training', '#diffusion', '#optimization', '#architecture'], 'emoji': '🕺', 'ru': {'title': 'Гибридная генерация движений через токены и диффузию', 'desc': 'В статье предложена трёхэтапная архитектура для генерации движений, которая объединяет дискретное токенизирование с диффузионными моделями. Центральный компонент MoTok представляет собой диффузионный токенизатор движений, который разделяет семантическую абстракцию от точного восстановления деталей. Кинематические условия применяются на двух уровнях: грубые ограничения направляют генерацию токенов на этапе планирования, а точные ограничения налагаются через диффузионную оптимизацию на этапе контроля. Метод достигает существенного улучшения управляемости и качества при шестикратном сокращении количества токенов и значительном снижении ошибок траектории и метрики качества FID.'}, 'en': {'title': 'Enhancing Motion Generation with Efficient Tokenization and Diffusion', 'desc': 'This paper presents a three-stage framework for motion generation that integrates discrete token-based planning with diffusion-based synthesis. The framework consists of three key components: Perception for feature extraction, Planning for generating discrete tokens, and Control for synthesizing motion using diffusion techniques. A novel element, MoTok, is introduced to create compact motion tokens while maintaining high fidelity in motion recovery. The proposed method demonstrates significant improvements in controllability and fidelity, achieving better performance with fewer tokens compared to existing approaches.'}, 'zh': {'title': '三阶段运动生成框架：提升可控性与保真度', 'desc': '本文提出了一种三阶段的运动生成框架，结合了基于离散标记的规划和基于扩散的合成，以提高可控性和保真度，同时减少标记使用和计算需求。该框架包括条件特征提取（感知）、离散标记生成（规划）和基于扩散的运动合成（控制）。核心是MoTok，这是一种基于扩散的离散运动标记器，通过将运动恢复委托给扩散解码器，解耦语义抽象与细粒度重建，从而实现紧凑的单层标记，同时保持运动的保真度。实验结果表明，该方法在HumanML3D数据集上显著提高了可控性和保真度，标记使用量仅为MaskControl的六分之一。'}}}, {'id': 'https://huggingface.co/papers/2603.19231', 'title': 'MonoArt: Progressive Structural Reasoning for Monocular Articulated 3D Reconstruction', 'url': 'https://huggingface.co/papers/2603.19231', 'abstract': 'Abstract MonoArt presents a unified framework for reconstructing articulated 3D objects from single images through progressive structural reasoning that enables stable articulation inference without external templates or multi-stage processes.  AI-generated summary Reconstructing articulated 3D objects from a single image requires jointly inferring object geometry, part structure, and motion parameters from limited visual evidence. A key difficulty lies in the entanglement between motion cues and object structure, which makes direct articulation regression unstable. Existing methods address this challenge through multi-view supervision, retrieval-based assembly, or auxiliary video generation, often sacrificing scalability or efficiency. We present MonoArt, a unified framework grounded in progressive structural reasoning. Rather than predicting articulation directly from image features, MonoArt progressively transforms visual observations into canonical geometry, structured part representations, and motion-aware embeddings within a single architecture. This structured reasoning process enables stable and interpretable articulation inference without external motion templates or multi-stage pipelines. Extensive experiments on PartNet-Mobility demonstrate that OM achieves state-of-the-art performance in both reconstruction accuracy and inference speed. The framework further generalizes to robotic manipulation and articulated scene reconstruction.', 'score': 28, 'issue_id': 1580, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'de02d6996af07860', 'authors': ['Haitian Li', 'Haozhe Xie', 'Junxiang Xu', 'Beichen Wen', 'Fangzhou Hong', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19231.jpg', 'data': {'categories': ['#robotics', '#architecture', '#3d'], 'emoji': '🎭', 'ru': {'title': 'Прогрессивное структурное рассуждение для восстановления артикулированных объектов из одного снимка', 'desc': 'MonoArt представляет единую архитектуру для реконструкции сочленённых 3D объектов из одного изображения, используя прогрессивное структурное рассуждение. Ключевая инновация заключается в избежании прямой регрессии параметров артикуляции, которая нестабильна из-за запутанности между сигналами движения и структурой объекта. Вместо этого метод постепенно трансформирует визуальные наблюдения в каноническую геометрию, структурированные представления частей и вектора вложений, учитывающие движение, в одной сети без внешних шаблонов. Фреймворк достигает передовых результатов по скорости и точности реконструкции, и успешно обобщается на задачи манипуляции роботами и реконструкции сцен с артикулированными объектами.'}, 'en': {'title': 'Revolutionizing 3D Object Reconstruction with MonoArt', 'desc': 'MonoArt is a new framework designed to reconstruct 3D objects that can move in different ways from just one image. It uses a method called progressive structural reasoning, which helps to understand the shape and parts of the object as well as how it moves, all within one system. This approach avoids the need for complicated processes or extra templates, making it more efficient and easier to use. Tests show that MonoArt performs better than previous methods in both accuracy and speed, and it can also be applied to tasks like robotic manipulation.'}, 'zh': {'title': '单图像重建关节式3D物体的统一框架', 'desc': 'MonoArt 是一个统一框架，能够从单张图像中重建关节式 3D 物体。它通过逐步的结构推理，稳定地推断物体的关节运动，而无需外部模板或多阶段处理。该方法解决了运动线索与物体结构之间的纠缠问题，从而提高了重建的准确性和推理速度。实验结果表明，MonoArt 在重建精度和推理效率上都达到了最先进的水平，并且可以推广到机器人操作和关节场景重建。'}}}, {'id': 'https://huggingface.co/papers/2603.19217', 'title': 'LVOmniBench: Pioneering Long Audio-Video Understanding Evaluation for Omnimodal LLMs', 'url': 'https://huggingface.co/papers/2603.19217', 'abstract': 'Abstract Long-form audio-visual comprehension benchmark reveals significant challenges for current omnimodal large language models in handling extended multi-modal inputs.  AI-generated summary Recent advancements in omnimodal large language models (OmniLLMs) have significantly improved the comprehension of audio and video inputs. However, current evaluations primarily focus on short audio and video clips ranging from 10 seconds to 5 minutes, failing to reflect the demands of real-world applications, where videos typically run for tens of minutes. To address this critical gap, we introduce LVOmniBench, a new benchmark designed specifically for the cross-modal comprehension of long-form audio and video. This dataset comprises high-quality videos sourced from open platforms that feature rich audio-visual dynamics. Through rigorous manual selection and annotation, LVOmniBench comprises 275 videos, ranging in duration from 10 to 90 minutes, and 1,014 question-answer (QA) pairs. LVOmniBench aims to rigorously evaluate the capabilities of OmniLLMs across domains, including long-term memory, temporal localization, fine-grained understanding, and multimodal perception. Our extensive evaluation reveals that current OmniLLMs encounter significant challenges when processing extended audio-visual inputs. Open-source models generally achieve accuracies below 35%, whereas the Gemini 3 Pro reaches a peak accuracy of approximately 65%. We anticipate that this dataset, along with our empirical findings, will stimulate further research and the development of advanced models capable of resolving complex cross-modal understanding problems within long-form audio-visual contexts.', 'score': 25, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '06344f2fe0ec24b0', 'authors': ['Keda Tao', 'Yuhua Zheng', 'Jia Xu', 'Wenjie Du', 'Kele Shao', 'Hesong Wang', 'Xueyi Chen', 'Xin Jin', 'Junhan Zhu', 'Bohan Yu', 'Weiqiang Wang', 'Jian Liu', 'Can Qin', 'Yulun Zhang', 'Ming-Hsuan Yang', 'Huan Wang'], 'affiliations': ['Ant Group', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'University of California Merced', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19217.jpg', 'data': {'categories': ['#dataset', '#audio', '#multimodal', '#video', '#long_context', '#open_source', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Преодоление границ: от коротких клипов к пониманию часовых видеороликов', 'desc': 'Авторы представляют LVOmniBench — новый эталонный набор данных для оценки способности омниModal больших языковых моделей понимать длинные аудио-визуальные последовательности длительностью от 10 до 90 минут. Бенчмарк содержит 275 видеороликов и 1014 пар вопрос-ответ, что отражает реальные требования приложений, работающих с видеоматериалами продолжительностью в десятки минут. Исследование показало, что текущие OmniLLM испытывают значительные трудности при обработке расширенных мультимодальных входов, а открытые модели достигают точности ниже 35%, тогда как Gemini 3 Pro показывает результат около 65%. Этот датасет предназначен для стимулирования разработки более продвинутых моделей, способных решать сложные задачи кросс-модального понимания в контексте длинных аудио-визуальных последовательностей.'}, 'en': {'title': 'Bridging the Gap in Long-Form Audio-Visual Comprehension', 'desc': 'This paper introduces LVOmniBench, a benchmark designed to evaluate the performance of omnimodal large language models (OmniLLMs) on long-form audio-visual comprehension tasks. Current models struggle with extended inputs, as they have primarily been tested on short clips, which do not represent real-world scenarios. LVOmniBench includes 275 high-quality videos and 1,014 question-answer pairs, focusing on assessing long-term memory, temporal localization, and multimodal perception. The findings indicate that existing models perform poorly, with accuracies below 35%, highlighting the need for improved models in this area.'}, 'zh': {'title': '应对长视频挑战，提升多模态理解能力！', 'desc': '本论文介绍了一个新的基准测试LVOmniBench，旨在评估大型多模态语言模型（OmniLLMs）在处理长时间音视频输入时的能力。现有的评估主要集中在短视频片段上，无法满足现实应用中长视频的需求。LVOmniBench包含275个高质量视频，时长从10分钟到90分钟，并配有1014个问答对，旨在测试模型的长期记忆、时间定位、细粒度理解和多模态感知能力。研究结果表明，当前的OmniLLMs在处理长音视频输入时面临显著挑战，准确率普遍低于35%。'}}}, {'id': 'https://huggingface.co/papers/2603.19232', 'title': 'Cubic Discrete Diffusion: Discrete Visual Generation on High-Dimensional Representation Tokens', 'url': 'https://huggingface.co/papers/2603.19232', 'abstract': 'Abstract CubiD is a discrete generation model for high-dimensional representations that enables fine-grained masking and learns rich correlations across spatial positions while maintaining fixed generation steps regardless of feature dimensionality.  AI-generated summary Visual generation with discrete tokens has gained significant attention as it enables a unified token prediction paradigm shared with language models, promising seamless multimodal architectures. However, current discrete generation methods remain limited to low-dimensional latent tokens (typically 8-32 dims), sacrificing the semantic richness essential for understanding. While high-dimensional pretrained representations (768-1024 dims) could bridge this gap, their discrete generation poses fundamental challenges. In this paper, we present Cubic Discrete Diffusion (CubiD), the first discrete generation model for high-dimensional representations. CubiD performs fine-grained masking throughout the high-dimensional discrete representation -- any dimension at any position can be masked and predicted from partial observations. This enables the model to learn rich correlations both within and across spatial positions, with the number of generation steps fixed at T regardless of feature dimensionality, where T ll hwd. On ImageNet-256, CubiD achieves state-of-the-art discrete generation with strong scaling behavior from 900M to 3.7B parameters. Crucially, we validate that these discretized tokens preserve original representation capabilities, demonstrating that the same discrete tokens can effectively serve both understanding and generation tasks. We hope this work will inspire future research toward unified multimodal architectures. Code is available at: https://github.com/YuqingWang1029/CubiD.', 'score': 24, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '334d993435b17a44', 'authors': ['Yuqing Wang', 'Chuofan Ma', 'Zhijie Lin', 'Yao Teng', 'Lijun Yu', 'Shuai Wang', 'Jiaming Han', 'Jiashi Feng', 'Yi Jiang', 'Xihui Liu'], 'affiliations': ['ByteDance', 'Carnegie Mellon University', 'Nanjing University', 'The Chinese University of Hong Kong', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.19232.jpg', 'data': {'categories': ['#diffusion', '#multimodal', '#architecture', '#open_source', '#cv'], 'emoji': '🎲', 'ru': {'title': 'Дискретная диффузия для высокомерных представлений с фиксированным числом шагов', 'desc': 'CubiD — это дискретная модель генерации для высокомерных представлений, которая позволяет выполнять точное маскирование отдельных признаков и изучать богатые корреляции между пространственными позициями. Модель использует фиксированное число шагов генерации независимо от размерности признаков, что значительно эффективнее существующих методов. Ключевая особенность CubiD заключается в том, что дискретные токены сохраняют возможности исходных высокомерных представлений и могут одновременно использоваться для задач понимания и генерации. Это открывает путь к созданию унифицированных мультимодальных архитектур, объединяющих обработку текста и изображений.'}, 'en': {'title': 'CubiD: Bridging High-Dimensional Representation and Discrete Generation', 'desc': 'CubiD is a novel discrete generation model designed for high-dimensional data representations, allowing for detailed masking and learning of complex correlations across spatial positions. Unlike traditional methods that limit token dimensions, CubiD operates effectively with high-dimensional representations, maintaining a consistent number of generation steps regardless of the feature size. This model demonstrates state-of-the-art performance on tasks like image generation, showcasing its ability to preserve the semantic richness of the original data. The findings suggest that CubiD can bridge the gap between understanding and generating multimodal content, paving the way for future advancements in unified AI architectures.'}, 'zh': {'title': 'CubiD：高维表示的离散生成新突破', 'desc': 'CubiD是一种用于高维表示的离散生成模型，能够实现精细的掩蔽，并学习空间位置之间的丰富关联，同时保持固定的生成步骤。该模型克服了当前离散生成方法在低维潜在标记上的限制，能够处理768到1024维的高维预训练表示。CubiD通过在高维离散表示中进行精细掩蔽，使得模型能够从部分观察中预测任意位置的任意维度。实验结果表明，CubiD在ImageNet-256上实现了最先进的离散生成效果，并且这些离散标记在理解和生成任务中都能有效保留原始表示能力。'}}}, {'id': 'https://huggingface.co/papers/2603.18743', 'title': 'Memento-Skills: Let Agents Design Agents', 'url': 'https://huggingface.co/papers/2603.18743', 'abstract': "Abstract A generalist language model agent system autonomously designs and improves task-specific agents through memory-based reinforcement learning with stateful prompts and skill libraries.  AI-generated summary We introduce Memento-Skills, a generalist, continually-learnable LLM agent system that functions as an agent-designing agent: it autonomously constructs, adapts, and improves task-specific agents through experience. The system is built on a memory-based reinforcement learning framework with stateful prompts, where reusable skills (stored as structured markdown files) serve as persistent, evolving memory. These skills encode both behaviour and context, enabling the agent to carry forward knowledge across interactions.   Starting from simple elementary skills (like Web search and terminal operations), the agent continually improves via the Read--Write Reflective Learning mechanism introduced in Memento~2~wang2025memento2. In the read phase, a behaviour-trainable skill router selects the most relevant skill conditioned on the current stateful prompt; in the write phase, the agent updates and expands its skill library based on new experience. This closed-loop design enables continual learning without updating LLM parameters, as all adaptation is realised through the evolution of externalised skills and prompts.   Unlike prior approaches that rely on human-designed agents, Memento-Skills enables a generalist agent to design agents end-to-end for new tasks. Through iterative skill generation and refinement, the system progressively improves its own capabilities. Experiments on the General AI Assistants benchmark and Humanity's Last Exam demonstrate sustained gains, achieving 26.2\\% and 116.2\\% relative improvements in overall accuracy, respectively. Code is available at https://github.com/Memento-Teams/Memento-Skills.", 'score': 22, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '6ee032750715a135', 'authors': ['Huichi Zhou', 'Siyuan Guo', 'Anjie Liu', 'Zhongwei Yu', 'Ziqin Gong', 'Bowen Zhao', 'Zhixun Chen', 'Menglong Zhang', 'Yihang Chen', 'Jinsong Li', 'Runyu Yang', 'Qiangbin Liu', 'Xinlei Yu', 'Jianmin Zhou', 'Na Wang', 'Chunyang Sun', 'Jun Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.18743.jpg', 'data': {'categories': ['#agents', '#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Агент, проектирующий агентов: самосовершенствующаяся система на основе эволюции памяти', 'desc': 'Memento-Skills представляет собой обобщённую систему агентов на основе LLM, которая автономно проектирует и улучшает специализированные агенты через обучение с подкреплением на основе памяти и изменяемых промптов. Система работает с библиотекой переиспользуемых навыков, хранящихся в виде структурированных файлов, которые служат эволюционирующей памятью агента. Ключевой механизм обучения - Read-Write Reflective Learning - позволяет агенту на фазе чтения выбирать релевантные навыки через маршрутизатор, а на фазе записи обновлять и расширять библиотеку на основе нового опыта. Система достигает значительных улучшений без обновления параметров LLM, адаптируясь исключительно через эволюцию внешних навыков и промптов.'}, 'en': {'title': 'Empowering Agents to Design Agents: Memento-Skills Revolutionizes Learning', 'desc': 'Memento-Skills is a language model agent system that autonomously creates and enhances task-specific agents using memory-based reinforcement learning. It utilizes stateful prompts and a library of reusable skills, which act as a form of persistent memory, allowing the agent to retain and apply knowledge from past experiences. The system employs a Read-Write Reflective Learning mechanism to select relevant skills and update its skill library based on new interactions, enabling continual learning without altering the underlying model parameters. This innovative approach allows Memento-Skills to design agents for new tasks independently, leading to significant improvements in performance on benchmark tests.'}, 'zh': {'title': '自主设计任务代理的通用语言模型系统', 'desc': '本文介绍了一种名为Memento-Skills的通用语言模型代理系统，该系统能够自主设计和改进特定任务的代理。它基于记忆强化学习框架，通过状态提示和技能库来实现持续学习。系统利用可重用的技能作为持久的记忆，能够在交互中传递知识。通过迭代生成和优化技能，Memento-Skills不断提升自身能力，实验结果显示其在准确性上有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.19223', 'title': 'F2LLM-v2: Inclusive, Performant, and Efficient Embeddings for a Multilingual World', 'url': 'https://huggingface.co/papers/2603.19223', 'abstract': 'Abstract F2LLM-v2 is a multilingual embedding model family trained on 60 million samples across 200+ languages, achieving superior performance through LLM-based training, matryoshka learning, pruning, and distillation techniques.  AI-generated summary We present F2LLM-v2, a new family of general-purpose, multilingual embedding models in 8 distinct sizes ranging from 80M to 14B. Trained on a newly curated composite of 60 million publicly available high-quality data samples, F2LLM-v2 supports more than 200 languages, with a particular emphasis on previously underserved mid- and low-resource languages. By integrating a two-stage LLM-based embedding training pipeline with matryoshka learning, model pruning, and knowledge distillation techniques, we present models that are far more efficient than previous LLM-based embedding models while retaining competitive performances. Extensive evaluations confirm that F2LLM-v2-14B ranks first on 11 MTEB benchmarks, while the smaller models in the family also set a new state of the art for resource-constrained applications. To facilitate open-source embedding model research, we release all models, data, code, and intermediate checkpoints.', 'score': 21, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '054496d1fe79ac98', 'authors': ['Ziyin Zhang', 'Zihan Liao', 'Hang Yu', 'Peng Di', 'Rui Wang'], 'affiliations': ['Ant Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19223.jpg', 'data': {'categories': ['#dataset', '#training', '#optimization', '#low_resource', '#multilingual', '#small_models', '#open_source', '#transfer_learning', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Эффективные многоязычные embeddings для 200+ языков через LLM и дистилляцию', 'desc': 'F2LLM-v2 — это семейство многоязычных моделей встраивания (embeddings), обученных на 60 миллионах образцов текста более чем на 200 языках. Модели используют инновационный двухэтапный pipeline на основе LLM в сочетании с матрёшечным обучением, прунингом и дистилляцией знаний для достижения высокой эффективности. Линейка включает 8 размеров моделей от 80M до 14B параметров, при этом наибольшая модель достигает первого места по 11 бенчмаркам MTEB. Авторы открывают исходный код, данные и веса моделей для поддержки исследований в области многоязычных embedding-моделей, особенно для языков с ограниченными ресурсами.'}, 'en': {'title': 'Empowering Multilingual Understanding with F2LLM-v2', 'desc': 'F2LLM-v2 is a new family of multilingual embedding models designed to work efficiently across over 200 languages, especially focusing on those with fewer resources. It utilizes advanced techniques like LLM-based training, matryoshka learning, pruning, and distillation to enhance performance while reducing model size. The models range from 80 million to 14 billion parameters, allowing for flexibility in various applications. Extensive testing shows that the largest model excels in multiple benchmarks, while smaller versions also achieve top results for limited-resource scenarios.'}, 'zh': {'title': 'F2LLM-v2：高效多语言嵌入模型的新时代', 'desc': 'F2LLM-v2是一种多语言嵌入模型系列，训练数据来自6000万条样本，覆盖200多种语言。该模型特别关注中低资源语言，采用了基于大语言模型的训练、套娃学习、模型剪枝和知识蒸馏等技术。通过这些方法，F2LLM-v2在效率上显著优于以往的嵌入模型，同时保持了竞争力的性能。我们还将所有模型、数据、代码和中间检查点开源，以促进嵌入模型的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.19220', 'title': 'Nemotron-Cascade 2: Post-Training LLMs with Cascade RL and Multi-Domain On-Policy Distillation', 'url': 'https://huggingface.co/papers/2603.19220', 'abstract': 'Abstract Nemotron-Cascade 2 is a 30B parameter Mixture-of-Experts model with 3B activated parameters that achieves exceptional reasoning and agentic capabilities, matching frontier open models despite its compact size and demonstrating high intelligence density.  AI-generated summary We introduce Nemotron-Cascade 2, an open 30B MoE model with 3B activated parameters that delivers best-in-class reasoning and strong agentic capabilities. Despite its compact size, its mathematical and coding reasoning performance approaches that of frontier open models. It is the second open-weight LLM, after DeepSeekV3.2-Speciale-671B-A37B, to achieve Gold Medal-level performance in the 2025 International Mathematical Olympiad (IMO), the International Olympiad in Informatics (IOI), and the ICPC World Finals, demonstrating remarkably high intelligence density with 20x fewer parameters. In contrast to Nemotron-Cascade 1, the key technical advancements are as follows. After SFT on a meticulously curated dataset, we substantially expand Cascade RL to cover a much broader spectrum of reasoning and agentic domains. Furthermore, we introduce multi-domain on-policy distillation from the strongest intermediate teacher models for each domain throughout the Cascade RL process, allowing us to efficiently recover benchmark regressions and sustain strong performance gains along the way. We release the collection of model checkpoint and training data.', 'score': 17, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'ca59354d3988af61', 'authors': ['Zhuolin Yang', 'Zihan Liu', 'Yang Chen', 'Wenliang Dai', 'Boxin Wang', 'Sheng-Chieh Lin', 'Chankyu Lee', 'Yangyi Chen', 'Dongfu Jiang', 'Jiafan He', 'Renjie Pi', 'Grace Lam', 'Nayeon Lee', 'Alexander Bukharin', 'Mohammad Shoeybi', 'Bryan Catanzaro', 'Wei Ping'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2603.19220.jpg', 'data': {'categories': ['#agents', '#dataset', '#training', '#optimization', '#rl', '#architecture', '#open_source', '#reasoning', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Компактный гигант: 30B параметров, активны только 3B, мощь фронтирных моделей', 'desc': 'Представляем Nemotron-Cascade 2 — открытую модель Mixture-of-Experts с 30 млрд параметров, из которых активны только 3 млрд, что обеспечивает исключительную плотность интеллекта. Модель демонстрирует высокие возможности в логическом рассуждении и агентском поведении, соперничая с передовыми открытыми моделями несмотря на компактный размер. Ключевые улучшения включают расширенное обучение с подкреплением (Cascade RL) на разнообразных задачах рассуждения и многодоменную дистилляцию от учительских моделей во время обучения. Модель достигла медальных результатов на олимпиадах по математике и информатике, используя в 20 раз меньше параметров чем конкурирующие решения.'}, 'en': {'title': 'Compact Powerhouse: Nemotron-Cascade 2 Reaches New Heights in AI Reasoning', 'desc': 'Nemotron-Cascade 2 is a state-of-the-art Mixture-of-Experts (MoE) model with 30 billion parameters, but only 3 billion are activated during operation, making it highly efficient. This model excels in reasoning tasks and demonstrates strong agentic capabilities, achieving performance comparable to larger models. It has been recognized for its exceptional intelligence density, performing at a Gold Medal level in prestigious competitions like the International Mathematical Olympiad. Key innovations include an expanded Cascade Reinforcement Learning (RL) approach and multi-domain on-policy distillation, which enhance its reasoning abilities across various domains.'}, 'zh': {'title': '紧凑高效的智能推理模型', 'desc': 'Nemotron-Cascade 2 是一个拥有 300 亿参数的混合专家模型，其中激活参数为 30 亿。该模型在推理和智能代理能力方面表现出色，尽管体积较小，但其数学和编程推理性能接近前沿开放模型。与 Nemotron-Cascade 1 相比，技术进步主要体现在扩展了 Cascade 强化学习的应用范围，并引入了多领域的在线蒸馏方法，以提高模型的性能。我们还发布了模型检查点和训练数据的集合，以供研究和应用。'}}}, {'id': 'https://huggingface.co/papers/2603.18472', 'title': 'Cognitive Mismatch in Multimodal Large Language Models for Discrete Symbol Understanding', 'url': 'https://huggingface.co/papers/2603.18472', 'abstract': 'Abstract Top-tier MLLMs demonstrate limited capability in processing discrete symbols despite strong performance in complex reasoning, revealing a cognitive mismatch between visual perception and symbolic understanding.  AI-generated summary While Multimodal Large Language Models (MLLMs) have achieved remarkable success in interpreting natural scenes, their ability to process discrete symbols -- the fundamental building blocks of human cognition -- remains a critical open question. Unlike continuous visual data, symbols such as mathematical formulas, chemical structures, and linguistic characters require precise, deeper interpretation. This paper introduces a comprehensive benchmark to evaluate how top-tier MLLMs navigate these "discrete semantic spaces" across five domains: language, culture, mathematics, physics, and chemistry. Our investigation uncovers a counterintuitive phenomenon: models often fail at basic symbol recognition yet succeed in complex reasoning tasks, suggesting they rely on linguistic probability rather than true visual perception. By exposing this "cognitive mismatch", we highlight a significant gap in current AI capabilities: the struggle to truly perceive and understand the symbolic languages that underpin scientific discovery and abstract thought. This work offers a roadmap for developing more rigorous, human-aligned intelligent systems.', 'score': 16, 'issue_id': 1579, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'a28ef16702479e49', 'authors': ['Yinghui Li', 'Jiayi Kuang', 'Peng Xing', 'Daixian Liu', 'Junnan Dong', 'Shu-Yu Guo', 'Yangning Li', 'Qingyu Zhou', 'Wenhao Jiang', 'Hai-Tao Zheng', 'Ying Shen', 'Liang Lin', 'Philip S. Yu'], 'affiliations': ['Guangdong Laboratory of AI and Digital Economy (SZ), China', 'Sun Yat-sen University, China', 'The Hong Kong Polytechnic University, China', 'Tsinghua University, China', 'University of Illinois Chicago, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.18472.jpg', 'data': {'categories': ['#math', '#benchmark', '#multimodal'], 'emoji': '🔣', 'ru': {'title': 'Символический слепой пятна в умных моделях', 'desc': 'В статье исследуется неожиданный парадокс: продвинутые мультимодальные языковые модели (MLLM) хорошо справляются со сложными рассуждениями, но при этом плохо распознают дискретные символы, такие как математические формулы и химические структуры. Авторы создали комплексный бенчмарк для оценки способности этих моделей обрабатывать символические пространства в пяти областях: языке, культуре, математике, физике и химии. Исследование показало «когнитивное рассогласование» — модели часто ошибаются в базовом распознавании символов, полагаясь на языковую вероятность вместо истинного визуального восприятия. Работа выявляет критический пробел в возможностях современных AI и предлагает путь развития более надёжных систем, способных понимать символические языки науки.'}, 'en': {'title': "Bridging the Gap: Enhancing AI's Symbolic Understanding", 'desc': 'This paper investigates the limitations of Multimodal Large Language Models (MLLMs) in processing discrete symbols, which are essential for human cognition. Despite their success in complex reasoning tasks, these models struggle with basic symbol recognition, indicating a disconnect between visual perception and symbolic understanding. The authors introduce a benchmark to assess MLLMs across various domains, revealing that these models often depend on linguistic probabilities rather than genuine comprehension of symbols. This research highlights the need for advancements in AI to better align with human-like understanding of symbolic languages critical for scientific and abstract reasoning.'}, 'zh': {'title': '揭示AI的认知不匹配：符号理解的挑战', 'desc': '本论文探讨了多模态大型语言模型（MLLMs）在处理离散符号方面的局限性，尽管它们在复杂推理任务中表现出色。研究发现，这些模型在基本符号识别上常常失败，但在复杂推理任务中却能取得成功，表明它们依赖于语言概率而非真实的视觉感知。为此，本文提出了一个全面的基准测试，评估顶尖MLLMs在语言、文化、数学、物理和化学等五个领域的离散语义空间的处理能力。通过揭示这种“认知不匹配”，我们强调了当前人工智能能力中的一个重要缺口，即在真正理解科学发现和抽象思维所依赖的符号语言方面的困难。'}}}, {'id': 'https://huggingface.co/papers/2603.19224', 'title': 'EffectErase: Joint Video Object Removal and Insertion for High-Quality Effect Erasing', 'url': 'https://huggingface.co/papers/2603.19224', 'abstract': 'Abstract Video object removal method EffectErase uses a large-scale dataset VOR to effectively eliminate dynamic objects and their visual effects through reciprocal learning and task-aware guidance.  AI-generated summary Video object removal aims to eliminate dynamic target objects and their visual effects, such as deformation, shadows, and reflections, while restoring seamless backgrounds. Recent diffusion-based video inpainting and object removal methods can remove the objects but often struggle to erase these effects and to synthesize coherent backgrounds. Beyond method limitations, progress is further hampered by the lack of a comprehensive dataset that systematically captures common object effects across varied environments for training and evaluation. To address this, we introduce VOR (Video Object Removal), a large-scale dataset that provides diverse paired videos, each consisting of one video where the target object is present with its effects and a counterpart where the object and effects are absent, with corresponding object masks. VOR contains 60K high-quality video pairs from captured and synthetic sources, covers five effects types, and spans a wide range of object categories as well as complex, dynamic multi-object scenes. Building on VOR, we propose EffectErase, an effect-aware video object removal method that treats video object insertion as the inverse auxiliary task within a reciprocal learning scheme. The model includes task-aware region guidance that focuses learning on affected areas and enables flexible task switching. Then, an insertion-removal consistency objective that encourages complementary behaviors and shared localization of effect regions and structural cues. Trained on VOR, EffectErase achieves superior performance in extensive experiments, delivering high-quality video object effect erasing across diverse scenarios.', 'score': 14, 'issue_id': 1582, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'e52c448e89bf72a7', 'authors': ['Yang Fu', 'Yike Zheng', 'Ziyun Dai', 'Henghui Ding'], 'affiliations': ['Institute of Big Data, College of Computer Science and Artificial Intelligence, Fudan University, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.19224.jpg', 'data': {'categories': ['#synthetic', '#diffusion', '#video', '#multimodal', '#dataset', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Удаление объектов и эффектов из видео через взаимное обучение', 'desc': 'В статье представлен метод EffectErase для удаления динамических объектов из видео и их визуальных эффектов, таких как деформация, тени и отражения. Авторы создали большой датасет VOR с 60 тысячами пар видео, где один видеоролик содержит объект с эффектами, а другой — очищенный фон. Метод использует взаимное обучение, где вставка объектов рассматривается как обратная задача удаления, и задаёт направленное обучение на затронутые области. Модель достигает высокого качества удаления визуальных эффектов благодаря объективу последовательности вставки-удаления, который обеспечивает согласованность поведения сети.'}, 'en': {'title': 'EffectErase: Mastering Video Object Removal with VOR Dataset', 'desc': "The paper presents EffectErase, a novel method for video object removal that effectively eliminates dynamic objects and their associated visual effects, such as shadows and reflections. It introduces a large-scale dataset called VOR, which contains 60,000 high-quality video pairs that help train the model by providing examples of objects with and without effects. The method employs reciprocal learning and task-aware guidance to enhance the model's ability to focus on affected areas and switch tasks flexibly. By leveraging the VOR dataset, EffectErase demonstrates improved performance in erasing object effects and synthesizing coherent backgrounds in various complex scenes."}, 'zh': {'title': '高效视频物体移除：EffectErase的创新之路', 'desc': '本文介绍了一种视频物体移除方法EffectErase，该方法利用大规模数据集VOR有效消除动态物体及其视觉效果。通过互惠学习和任务感知引导，EffectErase能够处理物体的变形、阴影和反射等效果，同时恢复无缝背景。VOR数据集包含60K对高质量视频，涵盖多种物体类别和复杂动态场景，为训练和评估提供了丰富的素材。EffectErase在VOR上训练后，在各种场景中展现出卓越的物体效果移除性能。'}}}, {'id': 'https://huggingface.co/papers/2603.15030', 'title': 'VTC-Bench: Evaluating Agentic Multimodal Models via Compositional Visual Tool Chaining', 'url': 'https://huggingface.co/papers/2603.15030', 'abstract': "Abstract A new benchmark called VisualToolChain-Bench is introduced to evaluate the tool-use capabilities of multimodal large language models in complex visual tasks requiring multi-step planning and diverse tool composition.  AI-generated summary Recent advancements extend Multimodal Large Language Models (MLLMs) beyond standard visual question answering to utilizing external tools for advanced visual tasks. Despite this progress, precisely executing and effectively composing diverse tools for complex tasks remain persistent bottleneck. Constrained by sparse tool-sets and simple tool-use trajectories, existing benchmarks fail to capture complex and diverse tool interactions, falling short in evaluating model performance under practical, real-world conditions. To bridge this gap, we introduce VisualToolChain-Bench(VTC-Bench), a comprehensive benchmark designed to evaluate tool-use proficiency in MLLMs. To align with realistic computer vision pipelines, our framework features 32 diverse OpenCV-based visual operations. This rich tool-set enables extensive combinations, allowing VTC-Bench to rigorously assess multi-tool composition and long-horizon, multi-step plan execution. For precise evaluation, we provide 680 curated problems structured across a nine-category cognitive hierarchy, each with ground-truth execution trajectories. Extensive experiments on 19 leading MLLMs reveal critical limitations in current models' visual agentic capabilities. Specifically, models struggle to adapt to diverse tool-sets and generalize to unseen operations, with the leading model Gemini-3.0-Pro only achieving 51% on our benchmark. Furthermore, multi-tool composition remains a persistent challenge. When facing complex tasks, models struggle to formulate efficient execution plans, relying heavily on a narrow, suboptimal subset of familiar functions rather than selecting the optimal tools. By identifying these fundamental challenges, VTC-Bench establishes a rigorous baseline to guide the development of more generalized visual agentic models.", 'score': 12, 'issue_id': 1579, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '1ee83c65aa4355f7', 'authors': ['Xuanyu Zhu', 'Yuhao Dong', 'Rundong Wang', 'Yang Shi', 'Zhipeng Wu', 'Yinlun Peng', 'YiFan Zhang', 'Yihang Lou', 'Yuanxing Zhang', 'Ziwei Liu', 'Yan Bai', 'Yuan Zhou'], 'affiliations': ['CASIA', 'CQU', 'Meituan', 'NTU', 'NUDT', 'PKU', 'USTC'], 'pdf_title_img': 'assets/pdf/title_img/2603.15030.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark', '#agents', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Как научить многомодальные модели искусству композиции инструментов', 'desc': 'В статье представлена VisualToolChain-Bench — новый эталонный набор для оценки способности мультимодальных больших языковых моделей использовать внешние инструменты при решении сложных визуальных задач, требующих многоэтапного планирования. Авторы создали фреймворк с 32 разнообразными операциями на основе OpenCV и 680 куриров задачами, структурированными по иерархии когнитивных навыков, чтобы всесторонне оценить композицию нескольких инструментов и долгоусловные процессы выполнения. Экспериментальная оценка 19 ведущих MLLM выявила критические ограничения: модели плохо адаптируются к разнообразным наборам инструментов и не обобщаются на невидимые операции, лучшая модель Gemini-3.0-Pro достигла только 51% точности. Исследование показывает, что многоинструментная композиция остаётся серьёзной проблемой, так как модели полагаются на узкий набор знакомых функций вместо выбора оптимальных инструментов.'}, 'en': {'title': 'Evaluating Tool-Use in Multimodal Models with VTC-Bench', 'desc': "The paper introduces VisualToolChain-Bench (VTC-Bench), a new benchmark for assessing the tool-use capabilities of multimodal large language models (MLLMs) in complex visual tasks. It highlights the limitations of existing benchmarks that do not adequately evaluate the diverse interactions and multi-step planning required for advanced visual tasks. VTC-Bench includes 32 OpenCV-based visual operations and 680 curated problems, structured to test models' proficiency in tool composition and execution planning. The findings reveal significant challenges in current MLLMs, particularly in adapting to varied tool sets and effectively executing complex tasks, underscoring the need for improved visual agentic models."}, 'zh': {'title': '评估多模态模型工具使用能力的新基准', 'desc': '本文介绍了一种新的基准测试工具VisualToolChain-Bench，用于评估多模态大型语言模型在复杂视觉任务中的工具使用能力。尽管多模态大型语言模型在视觉问答方面取得了进展，但在执行复杂任务时，准确使用和组合多种工具仍然是一个瓶颈。现有基准测试由于工具集稀疏和简单的工具使用轨迹，无法有效评估模型在实际条件下的表现。VisualToolChain-Bench通过提供32种多样的OpenCV视觉操作和680个精心策划的问题，旨在填补这一空白，帮助开发更通用的视觉智能模型。'}}}, {'id': 'https://huggingface.co/papers/2603.18090', 'title': 'MOSS-TTS Technical Report', 'url': 'https://huggingface.co/papers/2603.18090', 'abstract': 'Abstract MOSS-TTS is a speech generation model using discrete audio tokens and autoregressive modeling with capabilities for voice cloning, pronunciation control, and long-form generation across multiple languages.  AI-generated summary This technical report presents MOSS-TTS, a speech generation foundation model built on a scalable recipe: discrete audio tokens, autoregressive modeling, and large-scale pretraining. Built on MOSS-Audio-Tokenizer, a causal Transformer tokenizer that compresses 24 kHz audio to 12.5 fps with variable-bitrate RVQ and unified semantic-acoustic representations, we release two complementary generators: MOSS-TTS, which emphasizes structural simplicity, scalability, and long-context/control-oriented deployment, and MOSS-TTS-Local-Transformer, which introduces a frame-local autoregressive module for higher modeling efficiency, stronger speaker preservation, and a shorter time to first audio. Across multilingual and open-domain settings, MOSS-TTS supports zero-shot voice cloning, token-level duration control, phoneme-/pinyin-level pronunciation control, smooth code-switching, and stable long-form generation. This report summarizes the design, training recipe, and empirical characteristics of the released models.', 'score': 6, 'issue_id': 1579, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '68dbd39e39e9a229', 'authors': ['Yitian Gong', 'Botian Jiang', 'Yiwei Zhao', 'Yucheng Yuan', 'Kuangwei Chen', 'Yaozhou Jiang', 'Cheng Chang', 'Dong Hong', 'Mingshu Chen', 'Ruixiao Li', 'Yiyang Zhang', 'Yang Gao', 'Hanfu Chen', 'Ke Chen', 'Songlin Wang', 'Xiaogui Yang', 'Yuqian Zhang', 'Kexin Huang', 'ZhengYuan Lin', 'Kang Yu', 'Ziqi Chen', 'Jin Wang', 'Zhaoye Fei', 'Qinyuan Cheng', 'Shimin Li', 'Xipeng Qiu'], 'affiliations': ['SII-OpenMOSS Team'], 'pdf_title_img': 'assets/pdf/title_img/2603.18090.jpg', 'data': {'categories': ['#audio', '#architecture', '#training', '#multilingual'], 'emoji': '🎙️', 'ru': {'title': 'Универсальная система синтеза речи с токенизацией и авторегрессией', 'desc': 'MOSS-TTS — это модель синтеза речи, построенная на основе дискретных аудио-токенов и авторегрессионного моделирования. Модель использует специализированный кодировщик MOSS-Audio-Tokenizer, который сжимает аудио с частотой 24 кГц до 12.5 кадров в секунду, используя переменный битрейт RVQ. Система поддерживает нулевоштуковое клонирование голоса, контроль длительности на уровне токенов, управление произношением на уровне фонем и слогов, а также стабильное генерирование длинных текстов на нескольких языках. Архитектура обеспечивает масштабируемость, простоту структуры и возможность точного контроля над генерируемой речью.'}, 'en': {'title': 'MOSS-TTS: Revolutionizing Speech Generation with Voice Cloning and Control', 'desc': 'MOSS-TTS is a cutting-edge speech generation model that utilizes discrete audio tokens and autoregressive techniques to create high-quality speech. It is designed for voice cloning, allowing users to replicate specific voices, and offers control over pronunciation and duration of speech. The model is built on a scalable framework that includes a causal Transformer tokenizer for efficient audio processing. MOSS-TTS excels in multilingual settings, enabling smooth transitions between languages and generating coherent long-form audio content.'}, 'zh': {'title': 'MOSS-TTS：多语言语音生成的新突破', 'desc': 'MOSS-TTS是一种语音生成模型，采用离散音频标记和自回归建模，具备语音克隆、发音控制和多语言长文本生成的能力。该模型基于MOSS-Audio-Tokenizer，能够将24 kHz音频压缩到12.5 fps，并使用可变比特率RVQ和统一的语义-声学表示。MOSS-TTS强调结构简单、可扩展性和长上下文控制的部署，同时MOSS-TTS-Local-Transformer则引入了帧局部自回归模块，以提高建模效率和说话者保留能力。该模型在多语言和开放领域设置中支持零样本语音克隆、标记级时长控制和流畅的代码切换。'}}}, {'id': 'https://huggingface.co/papers/2603.11804', 'title': 'OSM-based Domain Adaptation for Remote Sensing VLMs', 'url': 'https://huggingface.co/papers/2603.11804', 'abstract': "Abstract A self-contained domain adaptation framework for vision-language models in remote sensing uses OpenStreetMap data and optical character recognition to generate captions without requiring external teachers or manual labeling.  AI-generated summary Vision-Language Models (VLMs) adapted to remote sensing rely heavily on domain-specific image-text supervision, yet high-quality annotations for satellite and aerial imagery remain scarce and expensive to produce. Prevailing pseudo-labeling pipelines address this gap by distilling knowledge from large frontier models, but this dependence on large teachers is costly, limits scalability, and caps achievable performance at the ceiling of the teacher. We propose OSMDA: a self-contained domain adaptation framework that eliminates this dependency. Our key insight is that a capable base VLM can serve as its own annotation engine: by pairing aerial images with rendered OpenStreetMap (OSM) tiles, we leverage optical character recognition and chart comprehension capabilities of the model to generate captions enriched by OSM's vast auxiliary metadata. The model is then fine-tuned on the resulting corpus with satellite imagery alone, yielding OSMDA-VLM, a domain-adapted VLM that requires no manual labeling and no stronger external model. We conduct exhaustive evaluations spanning 10 benchmarks across image-text-to-text tasks and comparing against 9 competitive baselines. When equally mixed with real data, our method achieves state-of-the-art results, while being substantially cheaper to train than teacher-dependent alternatives. These results suggest that, given a strong foundation model, alignment with crowd-sourced geographic data is a practical and scalable path towards remote sensing domain adaptation. Dataset and model weights will be made publicly available.", 'score': 4, 'issue_id': 1578, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '95cb7083c92a6c22', 'authors': ['Stefan Maria Ailuro', 'Mario Markov', 'Mohammad Mahdi', 'Delyan Boychev', 'Luc Van Gool', 'Danda Pani Paudel'], 'affiliations': ['INSAIT, Sofia University St. Kliment Ohridski'], 'pdf_title_img': 'assets/pdf/title_img/2603.11804.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#data', '#cv', '#benchmark'], 'emoji': '🛰️', 'ru': {'title': 'Самообучающаяся адаптация видение-языковых моделей через открытые географические данные', 'desc': 'В работе предложена самостоятельная система адаптации видение-языковых моделей для дистанционного зондирования Земли, которая использует данные OpenStreetMap и распознавание текста для автоматического генерирования подписей к спутниковым снимкам без необходимости в учителе-модели или ручной разметке. Ключевая идея заключается в том, что мощная базовая VLM может сама создавать аннотации путём сопоставления аэрофотоснимков с визуализированными OSM-тайлами, извлекая информацию через распознавание символов и понимание карт. Модель затем дообучается на полученном корпусе только со спутниковыми изображениями, что даёт адаптированную VLM без ручной разметки данных. Результаты показывают, что предложенный метод достигает лучших показателей на 10 эталонных наборах, будучи значительно дешевле в обучении, чем подходы, зависящие от внешних моделей-учителей.'}, 'en': {'title': 'Empowering Vision-Language Models with Self-Generated Annotations for Remote Sensing', 'desc': "This paper presents OSMDA, a novel framework for adapting vision-language models (VLMs) specifically for remote sensing applications. It utilizes OpenStreetMap data and optical character recognition to automatically generate captions for satellite images, eliminating the need for expensive manual annotations or external teacher models. By leveraging the model's own capabilities to create annotations, OSMDA achieves high performance on various benchmarks while being cost-effective. The results indicate that aligning VLMs with crowd-sourced geographic data is a viable strategy for enhancing remote sensing tasks."}, 'zh': {'title': '自我生成注释的遥感领域适应新方法', 'desc': '本文提出了一种自包含的领域适应框架OSMDA，专为遥感中的视觉-语言模型设计。该框架利用OpenStreetMap数据和光学字符识别技术，生成图像的描述，而无需外部教师或人工标注。通过将航空图像与OpenStreetMap图块配对，模型能够自我生成注释，从而消除了对大型教师模型的依赖。实验结果表明，OSMDA-VLM在多个基准测试中表现优异，且训练成本显著低于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2603.18815', 'title': 'ProRL Agent: Rollout-as-a-Service for RL Training of Multi-Turn LLM Agents', 'url': 'https://huggingface.co/papers/2603.18815', 'abstract': 'Abstract Reinforcement learning infrastructure for multi-turn LLM agents that provides scalable rollout services and standardized sandbox environments for complex interactive tasks.  AI-generated summary Multi-turn LLM agents are increasingly important for solving complex, interactive tasks, and reinforcement learning (RL) is a key ingredient for improving their long-horizon behavior. However, RL training requires generating large numbers of sandboxed rollout trajectories, and existing infrastructures often couple rollout orchestration with the training loop, making systems hard to migrate and maintain. Under the rollout-as-a-service philosophy, we present ProRL Agent , a scalable infrastructure that serves the full agentic rollout lifecycle through an API service. ProRL Agent also provides standardized and extensible sandbox environments that support diverse agentic tasks in rootless HPC settings. We validate ProRL Agent through RL training on software engineering, math, STEM, and coding tasks. ProRL Agent is open-sourced and integrated as part of NVIDIA NeMo Gym.', 'score': 3, 'issue_id': 1578, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '2bcca38bdf1c225d', 'authors': ['Hao Zhang', 'Mingjie Liu', 'Shaokun Zhang', 'Songyang Han', 'Jian Hu', 'Zhenghui Jin', 'Yuchi Zhang', 'Shizhe Diao', 'Ximing Lu', 'Binfeng Xu', 'Zhiding Yu', 'Jan Kautz', 'Yi Dong'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2603.18815.jpg', 'data': {'categories': ['#agents', '#benchmark', '#training', '#rl'], 'emoji': '⚙️', 'ru': {'title': 'Масштабируемая инфраструктура для reinforcement learning многошаговых LLM-агентов', 'desc': 'Статья представляет ProRL Agent — масштабируемую инфраструктуру для обучения многошаговых LLM-агентов с использованием reinforcement learning. Система реализует философию «rollout-as-a-service», отделяя оркестрацию сбора траекторий от самого процесса обучения, что упрощает миграцию и поддержку. Инфраструктура предоставляет стандартизированные и расширяемые песочные окружения, поддерживающие разнообразные агентские задачи в HPC-средах без привилегий администратора. Авторы валидируют подход на задачах программной инженерии, математики, STEM и кодирования, интегрируя решение в экосистему NVIDIA NeMo Gym.'}, 'en': {'title': 'ProRL Agent: Scalable Rollout Infrastructure for LLM Training', 'desc': 'This paper introduces ProRL Agent, a new infrastructure designed for training multi-turn large language model (LLM) agents using reinforcement learning (RL). It addresses the challenges of generating numerous rollout trajectories needed for effective RL training by offering a scalable rollout service. The system separates rollout orchestration from the training loop, making it easier to maintain and migrate. ProRL Agent supports various interactive tasks in standardized sandbox environments and is validated through applications in software engineering and STEM-related tasks.'}, 'zh': {'title': '可扩展的多轮代理强化学习基础设施', 'desc': '本论文介绍了一种用于多轮大语言模型（LLM）代理的强化学习基础设施，旨在提供可扩展的回滚服务和标准化的沙盒环境，以应对复杂的交互任务。强化学习是提升这些代理在长时间任务中表现的关键，但现有的基础设施往往将回滚编排与训练循环结合在一起，导致系统难以迁移和维护。我们提出的ProRL Agent遵循回滚即服务的理念，提供一个通过API服务支持完整代理回滚生命周期的可扩展基础设施。ProRL Agent还提供标准化和可扩展的沙盒环境，支持多样化的代理任务，并在软件工程、数学、STEM和编码任务上进行了验证。'}}}, {'id': 'https://huggingface.co/papers/2603.18002', 'title': 'Loc3R-VLM: Language-based Localization and 3D Reasoning with Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.18002', 'abstract': 'Abstract Loc3R-VLM enhances 2D Vision-Language Models with 3D understanding capabilities through spatial supervision from monocular video input, achieving superior performance in language-based localization and 3D question-answering.  AI-generated summary Multimodal Large Language Models (MLLMs) have made impressive progress in connecting vision and language, but they still struggle with spatial understanding and viewpoint-aware reasoning. Recent efforts aim to augment the input representations with geometric cues rather than explicitly teaching models to reason in 3D space. We introduce Loc3R-VLM, a framework that equips 2D Vision-Language Models with advanced 3D understanding capabilities from monocular video input. Inspired by human spatial cognition, Loc3R-VLM relies on two joint objectives: global layout reconstruction to build a holistic representation of the scene structure, and explicit situation modeling to anchor egocentric perspective. These objectives provide direct spatial supervision that grounds both perception and language in a 3D context. To ensure geometric consistency and metric-scale alignment, we leverage lightweight camera pose priors extracted from a pre-trained 3D foundation model. Loc3R-VLM achieves state-of-the-art performance in language-based localization and outperforms existing 2D- and video-based approaches on situated and general 3D question-answering benchmarks, demonstrating that our spatial supervision framework enables strong 3D understanding. Project page: https://kevinqu7.github.io/lo
