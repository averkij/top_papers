    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.17117', 'title': 'MosaicMem: Hybrid Spatial Memory for Controllable Video World Models', 'url': 'https://huggingface.co/papers/2603.17117', 'abstract': "Abstract Video diffusion models use hybrid spatial memory to maintain consistency under camera motion and enable long-term scene editing and navigation.  AI-generated summary Video diffusion models are moving beyond short, plausible clips toward world simulators that must remain consistent under camera motion, revisits, and intervention. Yet spatial memory remains a key bottleneck: explicit 3D structures can improve reprojection-based consistency but struggle to depict moving objects, while implicit memory often produces inaccurate camera motion even with correct poses. We propose Mosaic Memory (MosaicMem), a hybrid spatial memory that lifts patches into 3D for reliable localization and targeted retrieval, while exploiting the model's native conditioning to preserve prompt-following generation. MosaicMem composes spatially aligned patches in the queried view via a patch-and-compose interface, preserving what should persist while allowing the model to inpaint what should evolve. With PRoPE camera conditioning and two new memory alignment methods, experiments show improved pose adherence compared to implicit memory and stronger dynamic modeling than explicit baselines. MosaicMem further enables minute-level navigation, memory-based scene editing, and autoregressive rollout.", 'score': 46, 'issue_id': 1558, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'e831a0a1e10a323c', 'authors': ['Wei Yu', 'Runjia Qian', 'Yumeng Li', 'Liquan Wang', 'Songheng Yin', 'Sri Siddarth Chakaravarthy P', 'Dennis Anthony', 'Yang Ye', 'Yidi Li', 'Weiwei Wan', 'Animesh Garg'], 'affiliations': ['Georgia Institute of Technology', 'Mujin Inc.', 'Taiyuan University of Technology', 'The University of Osaka', 'University of Texas at Austin', 'University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2603.17117.jpg', 'data': {'categories': ['#diffusion', '#3d', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Гибридная память для согласованной генерации видео при движении камеры', 'desc': 'В работе представлена Mosaic Memory — гибридная система пространственной памяти для видеодиффузионных моделей, которая преодолевает ограничения чистых 3D-структур и неявного представления. Система поднимает пиксельные патчи в трёхмерное пространство для надёжной локализации и выборки, одновременно сохраняя способность генеративной модели следовать исходному промпту. Гибридный подход позволяет сохранять статичные части сцены с высокой точностью, в то время как динамические объекты генерируются заново в соответствии с движением камеры. Экспериментально показано, что метод обеспечивает лучшее следование позам камеры и моделирование динамики по сравнению с существующими альтернативами.'}, 'en': {'title': 'Mosaic Memory: Enhancing Video Consistency and Navigation', 'desc': 'This paper introduces Mosaic Memory (MosaicMem), a new approach to video diffusion models that enhances spatial memory for better consistency during camera motion. It combines explicit 3D structures with implicit memory to improve the accuracy of camera movements and dynamic object representation. MosaicMem allows for targeted retrieval and reliable localization by lifting patches into 3D, enabling effective scene editing and navigation. The proposed methods demonstrate significant improvements in pose adherence and dynamic modeling, making it a powerful tool for long-term video generation and manipulation.'}, 'zh': {'title': '混合空间记忆：提升视频生成的一致性与灵活性', 'desc': '视频扩散模型利用混合空间记忆在相机运动下保持一致性，并实现长期场景编辑和导航。我们提出的Mosaic Memory（MosaicMem）通过将图像块提升到3D空间，提供可靠的定位和有针对性的检索，同时利用模型的原生条件生成来保持生成的连贯性。MosaicMem通过补丁和组合接口在查询视图中组合空间对齐的图像块，保留应持续存在的内容，同时允许模型对应变化的部分进行修补。实验表明，MosaicMem在姿态遵循和动态建模方面优于现有的隐式和显式记忆方法。'}}}, {'id': 'https://huggingface.co/papers/2603.17187', 'title': 'MetaClaw: Just Talk -- An Agent That Meta-Learns and Evolves in the Wild', 'url': 'https://huggingface.co/papers/2603.17187', 'abstract': 'Abstract A continual meta-learning framework for large language model agents that jointly evolves policies and reusable behavioral skills while minimizing downtime through opportunistic updates and skill-driven adaptation.  AI-generated summary Large language model (LLM) agents are increasingly used for complex tasks, yet deployed agents often remain static, failing to adapt as user needs evolve. This creates a tension between the need for continuous service and the necessity of updating capabilities to match shifting task distributions. On platforms like OpenClaw, which handle diverse workloads across 20+ channels, existing methods either store raw trajectories without distilling knowledge, maintain static skill libraries, or require disruptive downtime for retraining. We present MetaClaw, a continual meta-learning framework that jointly evolves a base LLM policy and a library of reusable behavioral skills. MetaClaw employs two complementary mechanisms. Skill-driven fast adaptation analyzes failure trajectories via an LLM evolver to synthesize new skills, enabling immediate improvement with zero downtime. Opportunistic policy optimization performs gradient-based updates via cloud LoRA fine-tuning and Reinforcement Learning with a Process Reward Model (RL-PRM). This is triggered during user-inactive windows by the Opportunistic Meta-Learning Scheduler (OMLS), which monitors system inactivity and calendar data. These mechanisms are mutually reinforcing: a refined policy generates better trajectories for skill synthesis, while richer skills provide higher-quality data for policy optimization. To prevent data contamination, a versioning mechanism separates support and query data. Built on a proxy-based architecture, MetaClaw scales to production-size LLMs without local GPUs. Experiments on MetaClaw-Bench and AutoResearchClaw show that skill-driven adaptation improves accuracy by up to 32% relative. The full pipeline advances Kimi-K2.5 accuracy from 21.4% to 40.6% and increases composite robustness by 18.3%. Code is available at https://github.com/aiming-lab/MetaClaw.', 'score': 45, 'issue_id': 1558, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '5e87c5b9df4903f6', 'authors': ['Peng Xia', 'Jianwen Chen', 'Xinyu Yang', 'Haoqin Tu', 'Jiaqi Liu', 'Kaiwen Xiong', 'Siwei Han', 'Shi Qiu', 'Haonian Ji', 'Yuyin Zhou', 'Zeyu Zheng', 'Cihang Xie', 'Huaxiu Yao'], 'affiliations': ['Carnegie Mellon University', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2603.17187.jpg', 'data': {'categories': ['#rlhf', '#agents', '#training', '#benchmark'], 'emoji': '🦾', 'ru': {'title': 'Непрерывное обучение LLM-агентов через адаптивные навыки без простоев', 'desc': 'MetaClaw — это фреймворк непрерывного метаобучения для LLM-агентов, который одновременно развивает базовую политику и библиотеку переиспользуемых поведенческих навыков. Система использует два механизма: адаптация на основе навыков анализирует неудачные траектории и синтезирует новые умения без простоев, а оптимизация политики выполняется через LoRA fine-tuning и обучение с подкреплением в неактивные окна пользователей. Версионирование данных предотвращает загрязнение информации между обучающей и тестовой выборками. Экспериментальные результаты показывают значительный прирост точности моделей на реальных задачах.'}, 'en': {'title': 'MetaClaw: Evolving LLMs with Zero Downtime', 'desc': 'This paper introduces MetaClaw, a continual meta-learning framework designed for large language model (LLM) agents to enhance their adaptability and performance. It focuses on evolving both the LLM policy and a library of reusable behavioral skills without causing downtime, which is crucial for maintaining continuous service. The framework utilizes skill-driven fast adaptation to quickly synthesize new skills from failure data and opportunistic policy optimization to refine the LLM during inactive periods. By integrating these mechanisms, MetaClaw significantly improves task accuracy and robustness while efficiently managing data contamination through a versioning system.'}, 'zh': {'title': '持续元学习，动态适应能力！', 'desc': '本文提出了一种持续的元学习框架MetaClaw，旨在为大型语言模型代理提供动态适应能力。该框架通过技能驱动的快速适应和机会性策略优化，能够在用户不活跃时进行更新，避免了停机时间。MetaClaw结合了基于梯度的更新和强化学习，提升了模型的准确性和鲁棒性。实验结果表明，MetaClaw在多个任务上显著提高了性能，展示了其在复杂环境中的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.17621', 'title': 'Complementary Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.17621', 'abstract': "Abstract Complementary RL enables efficient agent learning by synchronizing experience extraction with policy optimization through dual objectives that evolve together during training.  AI-generated summary Reinforcement Learning (RL) has emerged as a powerful paradigm for training LLM-based agents, yet remains limited by low sample efficiency, stemming not only from sparse outcome feedback but also from the agent's inability to leverage prior experience across episodes. While augmenting agents with historical experience offers a promising remedy, existing approaches suffer from a critical weakness: the experience distilled from history is either stored statically or fail to coevolve with the improving actor, causing a progressive misalignment between the experience and the actor's evolving capability that diminishes its utility over the course of training. Inspired by complementary learning systems in neuroscience, we present Complementary RL to achieve seamless co-evolution of an experience extractor and a policy actor within the RL optimization loop. Specifically, the actor is optimized via sparse outcome-based rewards, while the experience extractor is optimized according to whether its distilled experiences demonstrably contribute to the actor's success, thereby evolving its experience management strategy in lockstep with the actor's growing capabilities. Empirically, Complementary RL outperforms outcome-based agentic RL baselines that do not learn from experience, achieving 10% performance improvement in single-task scenarios and exhibits robust scalability in multi-task settings. These results establish Complementary RL as a paradigm for efficient experience-driven agent learning.", 'score': 13, 'issue_id': 1558, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': 'a7254d97e4bea398', 'authors': ['Dilxat Muhtar', 'Jiashun Liu', 'Wei Gao', 'Weixun Wang', 'Shaopan Xiong', 'Ju Huang', 'Siran Yang', 'Wenbo Su', 'Jiamang Wang', 'Ling Pan', 'Bo Zheng'], 'affiliations': ['Alibaba Group', 'HKUST'], 'pdf_title_img': 'assets/pdf/title_img/2603.17621.jpg', 'data': {'categories': ['#agents', '#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Взаимодополняющее обучение: синхронизация опыта и политики', 'desc': 'Статья представляет новый подход Complementary RL для обучения агентов с подкреплением, который одновременно оптимизирует политику и экстрактор опыта. Основная идея состоит в том, чтобы избежать рассогласования между накопленным опытом и развивающимися способностями агента путём их совместной эволюции во время тренировки. Экстрактор опыта обновляется на основе того, насколько его извлеченный опыт действительно способствует успеху политики, что обеспечивает синхронизацию обучения. Эмпирические результаты показывают 10% улучшение производительности в одноцелевых сценариях и хорошую масштабируемость в многоцелевых задачах.'}, 'en': {'title': 'Co-evolving Experience and Policy for Efficient Learning', 'desc': "Complementary Reinforcement Learning (RL) introduces a novel approach to enhance agent learning by synchronizing the extraction of experiences with the optimization of the policy. This method addresses the common issue of low sample efficiency in RL, which arises from the agent's inability to effectively utilize past experiences. By allowing the experience extractor and the policy actor to evolve together, the framework ensures that the experiences remain relevant and beneficial as the agent improves. Empirical results demonstrate that Complementary RL significantly outperforms traditional RL methods, achieving better performance in both single-task and multi-task environments."}, 'zh': {'title': '补充强化学习：高效的经验驱动智能体学习', 'desc': '补充强化学习（Complementary RL）通过同步经验提取与策略优化，提升了智能体的学习效率。该方法解决了传统强化学习中样本效率低的问题，尤其是历史经验的利用不足。补充强化学习通过优化经验提取器和策略执行者，使得两者在训练过程中共同进化，从而提高了学习效果。实验结果表明，补充强化学习在单任务和多任务场景中均显著优于不利用经验的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2603.13033', 'title': 'ESPIRE: A Diagnostic Benchmark for Embodied Spatial Reasoning of Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.13033', 'abstract': 'Abstract ESPIRE is a diagnostic benchmark for embodied spatial reasoning that evaluates vision-language models on robotic tasks through a decomposed localization and execution framework, enabling fine-grained analysis beyond passive spatial reasoning.  AI-generated summary A recent trend in vision-language models (VLMs) has been to enhance their spatial cognition for embodied domains. Despite progress, existing evaluations have been limited both in paradigm and in coverage, hindering rapid, iterative model development. To address these limitations, we propose ESPIRE, a diagnostic benchmark for embodied spatial reasoning. ESPIRE offers a simulated world that physically grounds VLMs and evaluates them on spatial-reasoning-centric robotic tasks, thus narrowing the gap between evaluation and real-world deployment. To adapt VLMs to robotic tasks, we decompose each task into localization and execution, and frame both as generative problems, in stark contrast to predominant discriminative evaluations (e.g., via visual-question answering) that rely on distractors and discard execution. This decomposition further enables a fine-grained analysis beyond passive spatial reasoning toward reasoning to act. We systematically design ESPIRE both at the instruction level and at the environment level, ensuring broad coverage of spatial reasoning scenarios. We use ESPIRE to diagnose a range of frontier VLMs and provide in-depth analysis of their spatial reasoning behaviors.', 'score': 12, 'issue_id': 1559, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': 'b5f9134e8a67bb50', 'authors': ['Yanpeng Zhao', 'Wentao Ding', 'Hongtao Li', 'Baoxiong Jia', 'Zilong Zheng'], 'affiliations': ['State Key Laboratory of General Artificial Intelligence, BIGAI'], 'pdf_title_img': 'assets/pdf/title_img/2603.13033.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#benchmark', '#cv'], 'emoji': '🤖', 'ru': {'title': 'От понимания к действию: пространственное рассуждение для робототехники', 'desc': 'ESPIRE — это диагностический бенчмарк для оценки пространственного рассуждения в робототехнике, который тестирует визуально-языковые модели на задачах воплощённого ИИ. Авторы разделяют каждую задачу на две подзадачи: локализацию объекта и исполнение действия, формулируя обе как генеративные проблемы вместо традиционного дискриминативного подхода. Бенчмарк использует симулированную среду для физического заземления моделей и обеспечивает детальный анализ способности моделей рассуждать и действовать, а не просто понимать пространственные отношения. Систематический дизайн ESPIRE охватывает широкий спектр сценариев пространственного рассуждения и позволяет диагностировать поведение современных визуально-языковых моделей.'}, 'en': {'title': 'ESPIRE: Advancing Spatial Reasoning in Robotics', 'desc': 'ESPIRE is a new benchmark designed to test how well vision-language models (VLMs) can understand and act in spatial environments. It focuses on robotic tasks by breaking down each task into two parts: localization (finding where things are) and execution (doing something with that information). This approach allows for a more detailed evaluation of VLMs, moving beyond simple question-answering to assess their ability to reason and take action. By providing a simulated world for testing, ESPIRE helps improve the development of VLMs for real-world applications.'}, 'zh': {'title': 'ESPIRE：提升机器人空间推理的基准', 'desc': 'ESPIRE是一个用于评估具身空间推理的诊断基准，专注于通过分解定位和执行框架来评估视觉-语言模型在机器人任务上的表现。该基准提供了一个模拟世界，使视觉-语言模型能够在物理环境中进行评估，缩小了评估与实际应用之间的差距。ESPIRE将每个任务分解为定位和执行两个部分，并将其视为生成问题，从而实现更细致的分析，超越了被动的空间推理。通过系统设计，ESPIRE确保了对各种空间推理场景的广泛覆盖，并对前沿视觉-语言模型的空间推理行为进行了深入分析。'}}}, {'id': 'https://huggingface.co/papers/2603.16542', 'title': 'Conservative Offline Robot Policy Learning via Posterior-Transition Reweighting', 'url': 'https://huggingface.co/papers/2603.16542', 'abstract': "Abstract Posterior-Transition Reweighting (PTR) improves offline robot policy adaptation by dynamically weighting training samples based on the attribution of their post-action consequences, enabling more conservative and effective learning from heterogeneous datasets.  AI-generated summary Offline post-training adapts a pretrained robot policy to a target dataset by supervised regression on recorded actions. In practice, robot datasets are heterogeneous: they mix embodiments, camera setups, and demonstrations of varying quality, so many trajectories reflect recovery behavior, inconsistent operator skill, or weakly informative supervision. Uniform post-training gives equal credit to all samples and can therefore average over conflicting or low-attribution data. We propose Posterior-Transition Reweighting (PTR), a reward-free and conservative post-training method that decides how much each training sample should influence the supervised update. For each sample, PTR encodes the observed post-action consequence as a latent target, inserts it into a candidate pool of mismatched targets, and uses a separate transition scorer to estimate a softmax identification posterior over target indices. The posterior-to-uniform ratio defines the PTR score, which is converted into a clipped-and-mixed weight and applied to the original action objective through self-normalized weighted regression. This construction requires no tractable policy likelihood and is compatible with both diffusion and flow-matching action heads. Rather than uniformly trusting all recorded supervision, PTR reallocates credit according to how attributable each sample's post-action consequence is under the current representation, improving conservative offline adaptation to heterogeneous robot data.", 'score': 9, 'issue_id': 1559, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '4d764140b3694608', 'authors': ['Wanpeng Zhang', 'Hao Luo', 'Sipeng Zheng', 'Yicheng Feng', 'Haiweng Xu', 'Ziheng Xi', 'Chaoyi Xu', 'Haoqi Yuan', 'Zongqing Lu'], 'affiliations': ['BeingBeyond', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16542.jpg', 'data': {'categories': ['#robotics', '#training'], 'emoji': '🤖', 'ru': {'title': 'Умная переоценка значимости данных для обучения роботов', 'desc': 'В статье предлагается метод Posterior-Transition Reweighting (PTR) для адаптации предобученных политик роботов на целевых датасетах. PTR динамически перевешивает обучающие примеры на основе того, насколько хорошо наблюдаемые последствия действий соответствуют текущему представлению модели. Метод использует отдельный скорер переходов для оценки апостериорного распределения над кандидатными целевыми состояниями и преобразует это распределение в вес для обновления регрессии действий. Подход позволяет консервативно обучаться на гетерогенных датасетах, содержащих данные разного качества, и совместим как с диффузионными, так и с flow-matching моделями.'}, 'en': {'title': 'Smart Weighting for Better Robot Learning', 'desc': 'The paper introduces Posterior-Transition Reweighting (PTR), a method that enhances offline robot policy adaptation by adjusting the influence of training samples based on their post-action outcomes. This approach addresses the challenges posed by heterogeneous datasets, which often contain varied quality and types of demonstrations. Instead of treating all samples equally, PTR assigns weights to samples based on their relevance, allowing for more effective learning from complex data. By using a softmax identification posterior to determine the importance of each sample, PTR enables a more conservative and informed adaptation process for robotic policies.'}, 'zh': {'title': '后验转移重加权：提升机器人策略适应性的新方法', 'desc': '后验转移重加权（PTR）是一种改进离线机器人策略适应的方法，它通过动态加权训练样本，基于其后续动作结果的归因，来实现更保守和有效的学习。由于机器人数据集通常是异构的，包含不同的机器人形态、摄像头设置和质量不一的演示，许多轨迹反映了恢复行为或操作技能的不一致。PTR方法通过对每个样本的后续动作结果进行编码，决定每个训练样本对监督更新的影响程度，从而避免了均匀后训练方法可能带来的冲突数据平均问题。最终，PTR通过自归一化加权回归将加权应用于原始动作目标，提升了对异构机器人数据的适应能力。'}}}, {'id': 'https://huggingface.co/papers/2603.17541', 'title': 'Temporal Gains, Spatial Costs: Revisiting Video Fine-Tuning in Multimodal Large Language Models', 'url': 'https://huggingface.co/papers/2603.17541', 'abstract': 'Abstract Video-supervised fine-tuning in multimodal large language models consistently enhances video performance while often degrading static image benchmarks, with frame sampling frequency determining the extent of this trade-off.  AI-generated summary Multimodal large language models (MLLMs) are typically trained in multiple stages, with video-based supervised fine-tuning (Video-SFT) serving as a key step for improving visual understanding. Yet its effect on the fine-grained evolution of visual capabilities, particularly the balance between spatial and temporal understanding, remains poorly understood. In this paper, we systematically study how Video-SFT reshapes visual capabilities in MLLMs. Across architectures, parameter scales, and frame sampling settings, we observe a consistent pattern: Video-SFT reliably improves video performance, but often yields limited gains or even degradation on static image benchmarks. We further show that this trade-off is closely tied to temporal budget: increasing the number of sampled frames generally improves video performance, but does not reliably improve static image performance. Motivated by this finding, we study an instruction-aware Hybrid-Frame strategy that adaptively allocates frame counts and partially mitigates the image-video trade-off. Our results indicate that Video-SFT is not a free lunch for MLLMs, and preserving spatial understanding remains a central challenge in joint image-video training.', 'score': 5, 'issue_id': 1559, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '2520a3f2ce8b260e', 'authors': ['Linghao Zhang', 'Jungang Li', 'Yonghua Hei', 'Sicheng Tao', 'Song Dai', 'Yibo Yan', 'Zihao Dongfang', 'Weiting Liu', 'Chenxi Qin', 'Hanqian Li', 'Xin Zou', 'Jiahao Zhang', 'Shuhang Xun', 'Haiyun Jiang', 'Xuming Hu'], 'affiliations': ['CityU', 'FDU', 'HIT', 'HKUST', 'HKUST(GZ)', 'SJTU', 'TJU'], 'pdf_title_img': 'assets/pdf/title_img/2603.17541.jpg', 'data': {'categories': ['#multimodal', '#video', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Баланс между видением: как видео-дообучение переформирует мультимодальные модели', 'desc': 'В статье исследуется, как дообучение мультимодальных больших языковых моделей (MLLM) на видеоданных влияет на их способность обрабатывать как видео, так и статические изображения. Авторы обнаружили, что видео-ориентированное дообучение улучшает производительность на видеозадачах, но часто снижает качество работы с изображениями, и этот компромисс зависит от частоты дискретизации кадров. Предложена гибридная стратегия выборки кадров, которая адаптивно распределяет количество кадров в зависимости от типа задачи и частично смягчает этот конфликт между видео и изображениями. Работа демонстрирует, что видео-дообучение требует тщательной балансировки для сохранения пространственного понимания при развитии временного восприятия.'}, 'en': {'title': 'Balancing Video and Image Performance in MLLMs', 'desc': 'This paper investigates how video-supervised fine-tuning (Video-SFT) affects the performance of multimodal large language models (MLLMs) in understanding both video and static images. The authors find that while Video-SFT enhances video performance, it can lead to reduced effectiveness on static image tasks, highlighting a trade-off between temporal and spatial understanding. They discover that the number of frames sampled during training plays a crucial role in this trade-off, as more frames improve video performance but do not guarantee better image results. To address this issue, the paper proposes a Hybrid-Frame strategy that adjusts frame counts based on instructions, aiming to balance the performance across both modalities.'}, 'zh': {'title': '视频与图像性能的权衡挑战', 'desc': '这篇论文研究了视频监督微调（Video-SFT）对多模态大语言模型（MLLMs）视觉能力的影响。研究发现，Video-SFT能显著提升视频性能，但在静态图像基准测试中效果有限，甚至可能导致性能下降。论文还指出，帧采样频率与视频和静态图像性能之间存在权衡关系，增加采样帧数通常能提高视频性能，但对静态图像性能的提升不明显。为了解决这一问题，作者提出了一种指令感知的混合帧策略，旨在更好地分配帧数，从而减轻图像与视频之间的性能权衡。'}}}, {'id': 'https://huggingface.co/papers/2603.17375', 'title': 'Stereo World Model: Camera-Guided Stereo Video Generation', 'url': 'https://huggingface.co/papers/2603.17375', 'abstract': 'Abstract StereoWorld is a camera-conditioned stereo world model that generates stereo videos end-to-end using RGB modality while maintaining geometric consistency and efficiency through novel attention mechanisms.  AI-generated summary We present StereoWorld, a camera-conditioned stereo world model that jointly learns appearance and binocular geometry for end-to-end stereo video generation.Unlike monocular RGB or RGBD approaches, StereoWorld operates exclusively within the RGB modality, while simultaneously grounding geometry directly from disparity. To efficiently achieve consistent stereo generation, our approach introduces two key designs: (1) a unified camera-frame RoPE that augments latent tokens with camera-aware rotary positional encoding, enabling relative, view- and time-consistent conditioning while preserving pretrained video priors via a stable attention initialization; and (2) a stereo-aware attention decomposition that factors full 4D attention into 3D intra-view attention plus horizontal row attention, leveraging the epipolar prior to capture disparity-aligned correspondences with substantially lower compute. Across benchmarks, StereoWorld improves stereo consistency, disparity accuracy, and camera-motion fidelity over strong monocular-then-convert pipelines, achieving more than 3x faster generation with an additional 5% gain in viewpoint consistency. Beyond benchmarks, StereoWorld enables end-to-end binocular VR rendering without depth estimation or inpainting, enhances embodied policy learning through metric-scale depth grounding, and is compatible with long-video distillation for extended interactive stereo synthesis.', 'score': 5, 'issue_id': 1558, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '21985293529031b8', 'authors': ['Yang-Tian Sun', 'Zehuan Huang', 'Yifan Niu', 'Lin Ma', 'Yan-Pei Cao', 'Yuewen Ma', 'Xiaojuan Qi'], 'affiliations': ['ByteDance Pico', 'The University of Hong Kong', 'VAST'], 'pdf_title_img': 'assets/pdf/title_img/2603.17375.jpg', 'data': {'categories': ['#architecture', '#video', '#multimodal'], 'emoji': '👓', 'ru': {'title': 'Двумерное зрение: end-to-end генерация стереовидео с геометрической консистентностью', 'desc': 'StereoWorld — это модель world model, которая генерирует стереовидео конца-в-конец, работая исключительно с RGB модальностью и одновременно обучаясь геометрии на основе диспаритета. Модель использует две ключевые архитектурные инновации: unified camera-frame RoPE для добавления позиционного кодирования с учётом камеры и стерео-aware attention decomposition, которая факторизует 4D внимание в 3D внутривидовое внимание и горизонтальное построчное внимание. Подход существенно превосходит конвейеры mono-to-stereo преобразования, обеспечивая более чем трёхкратное ускорение генерации и 5% улучшение консистентности точки зрения. StereoWorld открывает новые возможности для VR рендеринга, обучения воплощённых агентов и синтеза длинных интерактивных стереовидео.'}, 'en': {'title': 'Revolutionizing Stereo Video Generation with RGB-Only Models', 'desc': 'StereoWorld is a novel stereo video generation model that uses only RGB images while ensuring geometric accuracy. It learns both visual appearance and depth information together, which allows it to create stereo videos efficiently. The model introduces innovative techniques like camera-aware positional encoding and a specialized attention mechanism to improve performance and reduce computational costs. As a result, StereoWorld not only enhances the quality of generated videos but also speeds up the generation process significantly compared to traditional methods.'}, 'zh': {'title': 'StereoWorld：高效生成立体视频的创新模型', 'desc': 'StereoWorld 是一种相机条件的立体世界模型，能够通过 RGB 模态生成立体视频，同时保持几何一致性和高效性。该模型联合学习外观和双目几何，专注于 RGB 模态，而直接从视差中获取几何信息。为了实现一致的立体生成，StereoWorld 引入了两个关键设计：统一的相机帧 RoPE 和立体感知注意力分解。通过这些创新，StereoWorld 在多个基准测试中提高了立体一致性和视差准确性，并且生成速度比传统方法快了三倍以上。'}}}, {'id': 'https://huggingface.co/papers/2603.16642', 'title': 'When AI Navigates the Fog of War', 'url': 'https://huggingface.co/papers/2603.16642', 'abstract': 'Abstract Large language models demonstrate varying capabilities in reasoning about unfolding geopolitical conflicts, showing strategic realism in structured settings but inconsistent performance in complex political environments.  AI-generated summary Can AI reason about a war before its trajectory becomes historically obvious? Analyzing this capability is difficult because retrospective geopolitical prediction is heavily confounded by training-data leakage. We address this challenge through a temporally grounded case study of the early stages of the 2026 Middle East conflict, which unfolded after the training cutoff of current frontier models. We construct 11 critical temporal nodes, 42 node-specific verifiable questions, and 5 general exploratory questions, requiring models to reason only from information that would have been publicly available at each moment. This design substantially mitigates training-data leakage concerns, creating a setting well-suited for studying how models analyze an unfolding crisis under the fog of war, and provides, to our knowledge, the first temporally grounded analysis of LLM reasoning in an ongoing geopolitical conflict. Our analysis reveals three main findings. First, current state-of-the-art large language models often display a striking degree of strategic realism, reasoning beyond surface rhetoric toward deeper structural incentives. Second, this capability is uneven across domains: models are more reliable in economically and logistically structured settings than in politically ambiguous multi-actor environments. Finally, model narratives evolve over time, shifting from early expectations of rapid containment toward more systemic accounts of regional entrenchment and attritional de-escalation. Since the conflict remains ongoing at the time of writing, this work can serve as an archival snapshot of model reasoning during an unfolding geopolitical crisis, enabling future studies without the hindsight bias of retrospective analysis.', 'score': 4, 'issue_id': 1558, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '84179e91a29c1733', 'authors': ['Ming Li', 'Xirui Li', 'Tianyi Zhou'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence, Abu Dhabi, United Arab Emirates', 'University of Maryland, College Park, United States'], 'pdf_title_img': 'assets/pdf/title_img/2603.16642.jpg', 'data': {'categories': ['#leakage', '#reasoning'], 'emoji': '🌍', 'ru': {'title': 'Могут ли нейросети предсказывать войну во мраке неопределённости?', 'desc': 'В статье исследуется способность больших языковых моделей рассуждать о развивающихся геополитических конфликтах в реальном времени, используя конфликт на Ближнем Востоке 2026 года как тестовый случай. Авторы создали набор из 42 верифицируемых вопросов в 11 критических временных точках, основанных только на информации, доступной в каждый конкретный момент, что позволило избежать утечки данных из обучающего набора. Исследование показало, что современные LLM демонстрируют стратегический реализм в структурированных экономических и логистических сценариях, но менее надёжны в политически неоднозначных многоакторных окружениях. Работа представляет первый темпорально обоснованный анализ рассуждений LLM в развивающемся геополитическом конфликте, создавая архивный снимок когнитивных процессов моделей без ретроспективного смещения.'}, 'en': {'title': 'Unraveling LLMs: Reasoning in Real-Time Geopolitical Conflicts', 'desc': "This paper investigates how large language models (LLMs) reason about geopolitical conflicts, particularly focusing on the early stages of the 2026 Middle East conflict. It introduces a novel approach by creating a temporally grounded case study that avoids training-data leakage, allowing for a clearer analysis of model reasoning in real-time scenarios. The findings indicate that while LLMs can demonstrate strategic realism, their performance varies significantly depending on the complexity of the political environment. Additionally, the models' narratives evolve as the situation develops, reflecting a shift from initial containment strategies to more complex understandings of the conflict's dynamics."}, 'zh': {'title': '大型语言模型在地缘政治冲突中的推理能力', 'desc': '这篇论文探讨了大型语言模型在分析地缘政治冲突时的推理能力。研究表明，这些模型在结构化环境中表现出战略现实主义，但在复杂的政治环境中表现不一致。通过对2026年中东冲突早期阶段的案例研究，作者构建了多个时间节点和可验证的问题，以减少训练数据泄漏的影响。研究发现，当前的语言模型在经济和后勤结构明确的环境中更可靠，而在政治模糊的多方环境中则表现较差。'}}}, {'id': 'https://huggingface.co/papers/2603.16496', 'title': 'AdaMem: Adaptive User-Centric Memory for Long-Horizon Dialogue Agents', 'url': 'https://huggingface.co/papers/2603.16496', 'abstract': 'Abstract AdaMem is an adaptive memory framework for dialogue agents that organizes conversation history into multiple memory types and uses conditional retrieval to improve long-horizon reasoning and user modeling.  AI-generated summary Large language model (LLM) agents increasingly rely on external memory to support long-horizon interaction, personalized assistance, and multi-step reasoning. However, existing memory systems still face three core challenges: they often rely too heavily on semantic similarity, which can miss evidence crucial for user-centric understanding; they frequently store related experiences as isolated fragments, weakening temporal and causal coherence; and they typically use static memory granularities that do not adapt well to the requirements of different questions. We propose AdaMem, an adaptive user-centric memory framework for long-horizon dialogue agents. AdaMem organizes dialogue history into working, episodic, persona, and graph memories, enabling the system to preserve recent context, structured long-term experiences, stable user traits, and relation-aware connections within a unified framework. At inference time, AdaMem first resolves the target participant, then builds a question-conditioned retrieval route that combines semantic retrieval with relation-aware graph expansion only when needed, and finally produces the answer through a role-specialized pipeline for evidence synthesis and response generation. We evaluate AdaMem on the LoCoMo and PERSONAMEM benchmarks for long-horizon reasoning and user modeling. Experimental results show that AdaMem achieves state-of-the-art performance on both benchmarks. The code will be released upon acceptance.', 'score': 4, 'issue_id': 1558, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '1351d4fbb525ecf1', 'authors': ['Shannan Yan', 'Jingchen Ni', 'Leqi Zheng', 'Jiajun Zhang', 'Peixi Wu', 'Dacheng Yin', 'Jing Lyu', 'Chun Yuan', 'Fengyun Rao'], 'affiliations': ['Tsinghua University', 'USTC', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.16496.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Адаптивная память для глубокого понимания пользователя в долгих диалогах', 'desc': 'AdaMem — это адаптивная система памяти для диалоговых агентов на основе больших языковых моделей, которая организует историю разговора в несколько типов памяти: рабочую, эпизодическую, персональную и графовую. Система использует условное извлечение информации, комбинируя семантический поиск с графовым расширением на основе отношений только при необходимости. Такой подход позволяет сохранить контекстуальность, причинно-следственные связи и адаптивную детализацию при ответах на разные вопросы. Экспериментальные результаты на бенчмарках LoCoMo и PERSONAMEM показывают, что AdaMem достигает наилучшей производительности в задачах долгосрочного рассуждения и моделирования пользователя.'}, 'en': {'title': 'AdaMem: Revolutionizing Memory for Dialogue Agents', 'desc': 'AdaMem is a novel memory framework designed for dialogue agents that enhances their ability to manage conversation history effectively. It categorizes memories into different types, such as working, episodic, persona, and graph memories, which helps in maintaining context and understanding user traits over time. The framework addresses key challenges in memory systems by using conditional retrieval that combines semantic understanding with relational context, improving the coherence of responses. AdaMem has demonstrated superior performance in long-horizon reasoning and user modeling on established benchmarks, showcasing its potential for advanced dialogue interactions.'}, 'zh': {'title': 'AdaMem：对话代理的适应性记忆框架', 'desc': 'AdaMem是一种适应性记忆框架，专为对话代理设计，能够将对话历史组织成多种记忆类型，并通过条件检索来提升长时间推理和用户建模的能力。现有的记忆系统面临三个主要挑战，包括过度依赖语义相似性、存储相关经验为孤立片段以及静态记忆粒度不适应不同问题的需求。AdaMem通过工作记忆、情节记忆、个性记忆和图形记忆的组织方式，保持最近的上下文、结构化的长期经验、稳定的用户特征和关系感知的连接。实验结果表明，AdaMem在长时间推理和用户建模的基准测试中表现出色，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.17378', 'title': 'Efficient Exploration at Scale', 'url': 'https://huggingface.co/papers/2603.17378', 'abstract': 'Abstract An online learning algorithm for reinforcement learning from human feedback that achieves significant data efficiency improvements through incremental model updates, reward uncertainty modeling, and information-directed exploration.  AI-generated summary We develop an online learning algorithm that dramatically improves the data efficiency of reinforcement learning from human feedback (RLHF). Our algorithm incrementally updates reward and language models as choice data is received. The reward model is fit to the choice data, while the language model is updated by a variation of reinforce, with reinforcement signals provided by the reward model. Several features enable the efficiency gains: a small affirmative nudge added to each reinforcement signal, an epistemic neural network that models reward uncertainty, and information-directed exploration. With Gemma large language models (LLMs), our algorithm matches the performance of offline RLHF trained on 200K labels using fewer than 20K labels, representing more than a 10x gain in data efficiency. Extrapolating from our results, we expect our algorithm trained on 1M labels to match offline RLHF trained on 1B labels. This represents a 1,000x gain. To our knowledge, these are the first results to demonstrate that such large improvements are possible.', 'score': 3, 'issue_id': 1559, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '0defbdafdf4c4652', 'authors': ['Seyed Mohammad Asghari', 'Chris Chute', 'Vikranth Dwaracherla', 'Xiuyuan Lu', 'Mehdi Jafarnia', 'Victor Minden', 'Zheng Wen', 'Benjamin Van Roy'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2603.17378.jpg', 'data': {'categories': ['#rl', '#training', '#rlhf'], 'emoji': '🚀', 'ru': {'title': 'В тысячу раз эффективнее: онлайн обучение с подкреплением от обратной связи людей', 'desc': 'В работе предложен онлайн-алгоритм обучения с подкреплением на основе обратной связи от людей, который достигает значительного улучшения эффективности использования данных. Алгоритм инкрементально обновляет модели награды и языка по мере получения данных о предпочтениях пользователей. Ключевыми компонентами являются моделирование неопределенности награды через эпистемическую нейронную сеть и информативно-ориентированная разведка. На примере LLM Gemma алгоритм достигает производительности оффлайн RLHF, обученного на 200K примеров, используя менее 20K примеров, что представляет 10-кратное улучшение эффективности данных.'}, 'en': {'title': 'Revolutionizing Data Efficiency in RLHF with Online Learning', 'desc': 'This paper presents an online learning algorithm designed to enhance data efficiency in reinforcement learning from human feedback (RLHF). The algorithm updates both reward and language models incrementally as new choice data is collected, allowing for real-time learning. Key innovations include modeling reward uncertainty with an epistemic neural network and employing information-directed exploration to optimize learning. The results show that this approach can achieve performance comparable to traditional offline RLHF methods with significantly fewer data points, indicating a potential for massive efficiency gains in training large language models.'}, 'zh': {'title': '在线学习算法：提升强化学习的数据效率', 'desc': '本文提出了一种在线学习算法，旨在通过增量模型更新、奖励不确定性建模和信息导向探索，显著提高从人类反馈中进行强化学习的数 据效率。该算法在接收选择数据时，逐步更新奖励模型和语言模型。奖励模型根据选择数据进行拟合，而语言模型则通过一种变体的强化学习进行更新，强化信号由奖励模型提供。实验结果表明，该算法在使用不到2万条标签时，达到了与使用20万条标签的离线强化学习相同的性能，显示出超过10倍的数据效率提升。'}}}, {'id': 'https://huggingface.co/papers/2603.18004', 'title': 'Unified Spatio-Temporal Token Scoring for Efficient Video VLMs', 'url': 'https://huggingface.co/papers/2603.18004', 'abstract': 'Abstract STTS is a lightweight module that efficiently prunes vision tokens across both vision transformer and language model architectures in vision-language models for video tasks, achieving significant computational gains with minimal performance loss.  AI-generated summary Token pruning is essential for enhancing the computational efficiency of vision-language models (VLMs), particularly for video-based tasks where temporal redundancy is prevalent. Prior approaches typically prune tokens either (1) within the vision transformer (ViT) exclusively for unimodal perception tasks such as action recognition and object segmentation, without adapting to downstream vision-language tasks; or (2) only within the LLM while leaving the ViT output intact, often requiring complex text-conditioned token selection mechanisms. In this paper, we introduce Spatio-Temporal Token Scoring (STTS), a simple and lightweight module that prunes vision tokens across both the ViT and the LLM without text conditioning or token merging, and is fully compatible with end-to-end training. By learning how to score temporally via an auxiliary loss and spatially via LLM downstream gradients, aided by our efficient packing algorithm, STTS prunes 50% of vision tokens throughout the entire architecture, resulting in a 62% improvement in efficiency during both training and inference with only a 0.7% drop in average performance across 13 short and long video QA tasks. Efficiency gains increase with more sampled frames per video. Applying test-time scaling for long-video QA further yields performance gains of 0.5-1% compared to the baseline. Overall, STTS represents a novel, simple yet effective technique for unified, architecture-wide vision token pruning.', 'score': 2, 'issue_id': 1558, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '298ede460e6e7aca', 'authors': ['Jianrui Zhang', 'Yue Yang', 'Rohun Tripathi', 'Winson Han', 'Ranjay Krishna', 'Christopher Clark', 'Yong Jae Lee', 'Sangho Lee'], 'affiliations': ['Allen Institute for AI', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2603.18004.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#architecture', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Умное удаление лишних визуальных токенов в видео-моделях', 'desc': 'В статье предложен модуль STTS для сокращения избыточных визуальных токенов в видео-моделях, которые объединяют vision transformer и языковую модель. Метод использует вспомогательную функцию потерь для обучения временному скорингу токенов и градиенты языковой модели для пространственной фильтрации. Алгоритм позволяет удалить 50% визуальных токенов во всей архитектуре, улучшив эффективность на 62% при тренировке и инференсе с минимальным падением качества на 0.7%. Подход показывает универсальность и простоту в применении к различным задачам видео-вопросно-ответного диалога.'}, 'en': {'title': 'Efficient Token Pruning for Enhanced Video Task Performance', 'desc': "The paper presents Spatio-Temporal Token Scoring (STTS), a new method for pruning vision tokens in vision-language models (VLMs) used for video tasks. STTS operates across both vision transformers and language models, enhancing computational efficiency by reducing the number of tokens processed without significant performance loss. Unlike previous methods that focused on unimodal tasks or required complex mechanisms, STTS simplifies the process by scoring tokens based on temporal and spatial information. The results show a 62% improvement in efficiency with only a minor drop in performance, demonstrating STTS's effectiveness in optimizing VLMs for video analysis."}, 'zh': {'title': 'STTS：高效的视觉标记修剪技术', 'desc': 'STTS是一种轻量级模块，能够有效地在视觉变换器和语言模型架构中修剪视觉标记，从而提高视频任务的计算效率。该方法通过学习时序评分和空间评分，能够在不依赖文本条件或标记合并的情况下，修剪50%的视觉标记。实验表明，STTS在训练和推理过程中实现了62%的效率提升，且平均性能仅下降0.7%。这种方法适用于端到端训练，具有广泛的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.17891', 'title': 'RAMP: Reinforcement Adaptive Mixed Precision Quantization for Efficient On Device LLM Inference', 'url': 'https://huggingface.co/papers/2603.17891', 'abstract': 'Abstract Reinforcement learning-based mixed precision quantization method achieves superior compression efficiency and model performance for large language models through adaptive bit width assignment and novel scale folding techniques.  AI-generated summary Post training quantization is essential for deploying large language models (LLMs) on resource constrained hardware, yet state of the art methods enforce uniform bit widths across layers, yielding suboptimal accuracy efficiency trade offs. We present RAMP (Reinforcement Adaptive Mixed Precision), an off policy Soft Actor Critic framework that learns per layer bit width assignments to minimize perplexity under a global bit budget. The policy conditions on an 11 dimensional embedding of activation statistics, weight properties, and structural descriptors, enabling zero shot transfer across model families and scales. To enable stable sub 4 bit quantization, we introduce Scale Folding, a preconditioning technique that migrates activation outliers into weights via per channel scaling and normalization layer compensation. A quality prioritized reward with asymmetric penalties and budget cliffs drives rapid convergence. On Llama 2 7B, RAMP achieves 5.54 perplexity at 3.68GB (3.65 effective bits), outperforming uniform 4 bit AWQ (5.60 at 3.90 GB) and GPTQ by 6% in size and 1% to3% in quality. Critically, a policy trained only on Llama 2 7B generalizes zero shot to Llama 2 13B and Mistral 7B, often surpassing target specific training, supporting the hypothesis that quantization sensitivity is primarily architectural. The HALO pipeline exports allocations to GGUF format for kernel free inference on CPUs, GPUs, and edge devices, retaining 99.5% of FP16 commonsense reasoning performance.', 'score': 2, 'issue_id': 1559, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': 'ac339b0c3a876035', 'authors': ['Arpit Singh Gautam', 'Saurabh Jha'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.17891.jpg', 'data': {'categories': ['#inference', '#rl', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Адаптивное квантование с переменной разрядностью через обучение с подкреплением', 'desc': 'В статье представлен метод RAMP, использующий обучение с подкреплением для адаптивного квантования больших языковых моделей с переменной разрядностью. Вместо однородного квантования по всем слоям, метод применяет алгоритм Soft Actor Critic для автоматического выбора битовой ширины каждого слоя с целью минимизации перплексии при фиксированном бюджете памяти. Авторы предлагают технику Scale Folding, которая стабилизирует сверхнизкопроцентное квантование, перемещая выбросы активаций в веса через масштабирование и компенсацию в слоях нормализации. Ключевое преимущество метода — политика, обученная на одной модели, успешно переносится на другие архитектуры, что подтверждает, что чувствительность к квантованию определяется архитектурой, а не конкретной моделью.'}, 'en': {'title': 'RAMP: Smart Bit Widths for Efficient Language Models', 'desc': 'This paper introduces RAMP, a reinforcement learning-based method for mixed precision quantization of large language models (LLMs). It optimizes the bit width for each layer, allowing for better accuracy and efficiency compared to traditional methods that use uniform bit widths. The approach includes a novel technique called Scale Folding, which helps manage activation outliers, enabling effective quantization below 4 bits. RAMP demonstrates superior performance on various model sizes, achieving significant compression while maintaining high quality in language processing tasks.'}, 'zh': {'title': '强化学习驱动的混合精度量化新方法', 'desc': '这篇论文提出了一种基于强化学习的混合精度量化方法，旨在提高大型语言模型的压缩效率和模型性能。该方法通过自适应位宽分配和新颖的缩放折叠技术，优化了模型在资源受限硬件上的部署。RAMP框架能够根据每层的激活统计、权重特性和结构描述，学习位宽分配，从而在全球位预算下最小化困惑度。实验结果表明，RAMP在多个模型上实现了优于传统均匀量化方法的性能，支持了量化敏感性主要与模型架构相关的假设。'}}}, {'id': 'https://huggingface.co/papers/2603.17995', 'title': 'LoST: Level of Semantics Tokenization for 3D Shapes', 'url': 'https://huggingface.co/papers/2603.17995', 'abstract': 'Abstract Level-of-Semantics Tokenization (LoST) improves 3D shape generation by ordering tokens based on semantic salience and using a novel relational alignment loss for better reconstruction and efficiency.  AI-generated summary Tokenization is a fundamental technique in the generative modeling of various modalities. In particular, it plays a critical role in autoregressive (AR) models, which have recently emerged as a compelling option for 3D generation. However, optimal tokenization of 3D shapes remains an open question. State-of-the-art (SOTA) methods primarily rely on geometric level-of-detail (LoD) hierarchies, originally designed for rendering and compression. These spatial hierarchies are often token-inefficient and lack semantic coherence for AR modeling. We propose Level-of-Semantics Tokenization (LoST), which orders tokens by semantic salience, such that early prefixes decode into complete, plausible shapes that possess principal semantics, while subsequent tokens refine instance-specific geometric and semantic details. To train LoST, we introduce Relational Inter-Distance Alignment (RIDA), a novel 3D semantic alignment loss that aligns the relational structure of the 3D shape latent space with that of the semantic DINO feature space. Experiments show that LoST achieves SOTA reconstruction, surpassing previous LoD-based 3D shape tokenizers by large margins on both geometric and semantic reconstruction metrics. Moreover, LoST achieves efficient, high-quality AR 3D generation and enables downstream tasks like semantic retrieval, while using only 0.1%-10% of the tokens needed by prior AR models.', 'score': 1, 'issue_id': 1558, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': 'bdd166caa6b7d930', 'authors': ['Niladri Shekhar Dutt', 'Zifan Shi', 'Paul Guerrero', 'Chun-Hao Paul Huang', 'Duygu Ceylan', 'Niloy J. Mitra', 'Xuelin Chen'], 'affiliations': ['Adobe Research', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2603.17995.jpg', 'data': {'categories': ['#architecture', '#3d', '#training'], 'emoji': '🎯', 'ru': {'title': 'Семантическая токенизация для эффективной генерации трёхмерных форм', 'desc': 'В статье предложен новый метод токенизации трёхмерных форм под названием LoST, который упорядочивает токены по семантической значимости, а не по геометрическим уровням детализации. Авторы вводят специальную функцию потерь RIDA для выравнивания структуры латентного пространства 3D-форм с семантическим пространством признаков DINO. Метод позволяет генеративным моделям сначала создавать полные и правдоподобные формы с основными семантическими чертами, а затем последовательно добавлять геометрические детали. Экспериментальные результаты показывают, что LoST значительно превосходит существующие методы по качеству реконструкции и эффективности, используя при этом в 10-100 раз меньше токенов.'}, 'en': {'title': 'Revolutionizing 3D Shape Generation with Semantic Tokenization', 'desc': 'The paper introduces Level-of-Semantics Tokenization (LoST), a method that enhances 3D shape generation by organizing tokens based on their semantic importance. This approach allows for the initial tokens to create complete and plausible shapes, while later tokens add specific geometric and semantic details. To optimize this process, the authors propose a new loss function called Relational Inter-Distance Alignment (RIDA), which aligns the latent space of 3D shapes with semantic features. The results demonstrate that LoST significantly outperforms existing methods in both geometric and semantic reconstruction, while also being more efficient in token usage for autoregressive models.'}, 'zh': {'title': '语义驱动的3D形状生成新方法', 'desc': '本论文提出了一种新的3D形状生成方法，称为语义层次标记化（LoST），通过根据语义重要性对标记进行排序来提高生成效果。LoST使用了一种新颖的关系对齐损失（RIDA），以更好地重建和提高效率。与传统的几何细节层次方法相比，LoST在几何和语义重建指标上都取得了显著的进展。实验结果表明，LoST在生成高质量的3D形状时，仅需使用之前自回归模型的0.1%-10%的标记。'}}}, {'id': 'https://huggingface.co/papers/2603.17965', 'title': 'LaDe: Unified Multi-Layered Graphic Media Generation and Decomposition', 'url': 'https://huggingface.co/papers/2603.17965', 'abstract': 'Abstract LaDe is a latent diffusion framework that generates layered media designs with flexible layer counts and semantic meaning from natural language prompts, supporting text-to-image, text-to-layers, and media decomposition tasks.  AI-generated summary Media design layer generation enables the creation of fully editable, layered design documents such as posters, flyers, and logos using only natural language prompts. Existing methods either restrict outputs to a fixed number of layers or require each layer to contain only spatially continuous regions, causing the layer count to scale linearly with design complexity. We propose LaDe (Layered Media Design), a latent diffusion framework that generates a flexible number of semantically meaningful layers. LaDe combines three components: an LLM-based prompt expander that transforms a short user intent into structured per-layer descriptions that guide the generation, a Latent Diffusion Transformer with a 4D RoPE positional encoding mechanism that jointly generates the full media design and its constituent RGBA layers, and an RGBA VAE that decodes each layer with full alpha-channel support. By conditioning on layer samples during training, our unified framework supports three tasks: text-to-image generation, text-to-layers media design generation, and media design decomposition. We compare LaDe to Qwen-Image-Layered on text-to-layers and image-to-layers tasks on the Crello test set. LaDe outperforms Qwen-Image-Layered in text-to-layers generation by improving text-to-layer alignment, as validated by two VLM-as-a-judge evaluators (GPT-4o mini and Qwen3-VL).', 'score': 1, 'issue_id': 1558, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '06af35dbef017a79', 'authors': ['Vlad-Constantin Lungu-Stan', 'Ionut Mironica', 'Mariana-Iuliana Georgescu'], 'affiliations': ['Adobe Research, Romania'], 'pdf_title_img': 'assets/pdf/title_img/2603.17965.jpg', 'data': {'categories': ['#diffusion', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Многослойный дизайн из текста: диффузия с произвольным числом семантических слоёв', 'desc': 'LaDe — это фреймворк латентной диффузии для генерации многослойных медиа-дизайнов с произвольным количеством семантически значимых слоёв из текстовых описаний. Система использует LLM для расширения промптов, трансформер диффузии с 4D позиционным кодированием RoPE и специальный RGBA VAE для декодирования слоёв с поддержкой альфа-канала. Единый фреймворк поддерживает три задачи: генерацию изображений по тексту, создание слоистых дизайнов и разложение готовых дизайнов на компоненты. Модель превосходит существующие методы по качеству выравнивания текста и слоёв при создании редактируемых документов для постеров, флаеров и логотипов.'}, 'en': {'title': 'Flexible Layered Media Design with LaDe', 'desc': 'LaDe is a novel framework that utilizes latent diffusion to create layered media designs from natural language prompts. It allows for a flexible number of layers, making it possible to generate complex designs like posters and logos without being limited by fixed layer counts. The framework includes a prompt expander that converts user intentions into detailed layer descriptions, a Latent Diffusion Transformer for generating the designs, and an RGBA VAE for decoding layers with alpha-channel support. LaDe has shown superior performance in generating text-to-layers compared to existing methods, enhancing the alignment between text prompts and generated layers.'}, 'zh': {'title': '灵活生成分层媒体设计的潜在扩散框架', 'desc': 'LaDe是一种潜在扩散框架，可以根据自然语言提示生成具有灵活层数和语义意义的分层媒体设计。它支持文本到图像、文本到层和媒体分解等任务，能够创建完全可编辑的分层设计文档，如海报和标志。与现有方法不同，LaDe不限制输出层数，并且每层可以包含具有语义意义的内容。通过结合大语言模型和潜在扩散变换器，LaDe在文本到层生成任务中表现优于其他方法。'}}}, {'id': 'https://huggingface.co/papers/2603.17948', 'title': 'VideoAtlas: Navigating Long-Form Video in Logarithmic Compute', 'url': 'https://huggingface.co/papers/2603.17948', 'abstract': "Abstract VideoAtlas enables lossless video representation through hierarchical grids, enabling efficient long-context processing via recursive language models with adaptive compute allocation.  AI-generated summary Extending language models to video introduces two challenges: representation, where existing methods rely on lossy approximations, and long-context, where caption- or agent-based pipelines collapse video into text and lose visual fidelity. To overcome this, we introduce VideoAtlas, a task-agnostic environment to represent video as a hierarchical grid that is simultaneously lossless, navigable, scalable, caption- and preprocessing-free. An overview of the video is available at a glance, and any region can be recursively zoomed into, with the same visual representation used uniformly for the video, intermediate investigations, and the agent's memory, eliminating lossy text conversion end-to-end. This hierarchical structure ensures access depth grows only logarithmically with video length. For long-context, Recursive Language Models (RLMs) recently offered a powerful solution for long text, but extending them to visual domain requires a structured environment to recurse into, which VideoAtlas provides. VideoAtlas as a Markov Decision Process unlocks Video-RLM: a parallel Master-Worker architecture where a Master coordinates global exploration while Workers concurrently drill into assigned regions to accumulate lossless visual evidence. We demonstrate three key findings: (1)~logarithmic compute growth with video duration, further amplified by a 30-60\\% multimodal cache hit rate arising from the grid's structural reuse. (2)~environment budgeting, where bounding the maximum exploration depth provides a principled compute-accuracy hyperparameter. (3)~emergent adaptive compute allocation that scales with question granularity. When scaling from 1-hour to 10-hour benchmarks, Video-RLM remains the most duration-robust method with minimal accuracy degradation, demonstrating that structured environment navigation is a viable and scalable paradigm for video understanding.", 'score': 1, 'issue_id': 1559, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '0b9a878908d8616f', 'authors': ['Mohamed Eltahir', 'Ali Habibullah', 'Yazan Alshoibi', 'Lama Ayash', 'Tanveer Hussain', 'Naeemullah Khan'], 'affiliations': ['Edge Hill University', 'King Abdullah University of Science and Technology (KAUST)', 'King Khalid University (KKU)'], 'pdf_title_img': 'assets/pdf/title_img/2603.17948.jpg', 'data': {'categories': ['#multimodal', '#inference', '#architecture', '#agents', '#video'], 'emoji': '🎬', 'ru': {'title': 'Безпотерьная иерархическая сетка для масштабируемого понимания видео', 'desc': 'VideoAtlas представляет видео как иерархическую сетку, которая сохраняет всю визуальную информацию без потерь и позволяет эффективно обрабатывать длинные видеоролики. Авторы предложили Recursive Language Models (RLM) для видео, которые используют архитектуру «Мастер-Рабочий» для параллельного исследования разных областей видео. Подход обеспечивает логарифмический рост вычислительных затрат с увеличением длительности видео благодаря структурному переиспользованию сетки и кэшированию. Метод демонстрирует устойчивость к масштабированию видео от 1 часа до 10 часов с минимальной потерей точности.'}, 'en': {'title': 'VideoAtlas: Lossless Video Representation for Efficient Long-Context Processing', 'desc': 'VideoAtlas is a new method for representing videos in a way that keeps all the details intact, using a hierarchical grid structure. This approach allows for efficient processing of long video contexts by using Recursive Language Models (RLMs) that can navigate through the video without losing important visual information. By avoiding lossy text conversions, VideoAtlas provides a clear overview of the video and allows for deep exploration of specific regions. The system is designed to scale effectively, ensuring that as video length increases, the computational demands grow only logarithmically, making it a robust solution for video understanding.'}, 'zh': {'title': '无损视频表示与长上下文处理的创新解决方案', 'desc': 'VideoAtlas 是一种通过分层网格实现无损视频表示的方法，能够高效处理长上下文。它解决了现有方法在视频表示中依赖有损近似的问题，并避免了将视频压缩为文本时丢失视觉信息。通过提供一个可导航、可扩展的任务无关环境，VideoAtlas 使得用户可以快速查看视频概览，并深入探索特定区域。该方法结合递归语言模型，确保计算需求随着视频长度的增加以对数方式增长，展现出在视频理解中的可行性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2603.17942', 'title': 'Efficient Training-Free Multi-Token Prediction via Embedding-Space Probing', 'url': 'https://huggingface.co/papers/2603.17942', 'abstract': 'Abstract A training-free method for multi-token prediction in large language models using mask tokens from the embedding space enables parallel token generation with improved throughput and accuracy.  AI-generated summary Large language models (LLMs) exhibit latent multi-token prediction (MTP) capabilities despite being trained solely for next-token generation. We propose a simple, training-free MTP approach that probes an LLM using on-the-fly mask tokens drawn from its embedding space, enabling parallel prediction of future tokens without modifying model weights or relying on auxiliary draft models. Our method constructs a speculative token tree by sampling top-K candidates from mask-token logits and applies a lightweight pruning strategy to retain high-probability continuations. During decoding, candidate predictions are verified in parallel, resulting in lossless generation while substantially reducing the number of model calls and improving token throughput. Across benchmarks, our probing-based MTP consistently outperforms existing training-free baselines, increasing acceptance length by approximately 12\\% on LLaMA3 and 8--12\\% on Qwen3, and achieving throughput gains of up to 15--19\\%. Finally, we provide theoretical insights and empirical evidence showing that decoder layers naturally align mask-token representations with next-token states, enabling accurate multi-step prediction without retraining or auxiliary models.', 'score': 1, 'issue_id': 1559, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': 'caf05f3a1ac177bc', 'authors': ['Raghavv Goel', 'Mukul Gagrani', 'Mingu Lee', 'Chris Lott'], 'affiliations': ['Qualcomm AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.17942.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Параллельное предсказание множества токенов через маскирующие встраивания без переобучения', 'desc': 'В работе предложен метод многотокенного предсказания для больших языковых моделей без переобучения, использующий маскирующие токены из пространства встраиваний. Подход создает спекулятивное дерево кандидатов путем выборки топ-K вариантов из логитов маскирующих токенов и применяет легкую стратегию обрезки для сохранения вероятных продолжений. Во время декодирования предсказанные последовательности проверяются параллельно, что позволяет получить генерацию без потерь при значительном сокращении количества обращений к модели. Метод показывает улучшения в пропускной способности на 15-19% и увеличивает длину принятых токенов на 12% для LLaMA3 без необходимости в дополнительных моделях.'}, 'en': {'title': 'Efficient Multi-Token Prediction Without Training', 'desc': "This paper introduces a novel method for multi-token prediction (MTP) in large language models (LLMs) that does not require additional training. By utilizing mask tokens from the model's embedding space, the approach allows for the parallel generation of multiple tokens, enhancing both speed and accuracy. The method constructs a speculative token tree from the model's predictions and employs a pruning strategy to focus on the most promising candidates. Results show significant improvements in token throughput and acceptance length compared to existing methods, demonstrating the effectiveness of this training-free approach."}, 'zh': {'title': '无训练的多标记预测新方法', 'desc': '本文提出了一种无训练的多标记预测方法，利用嵌入空间中的掩码标记实现大语言模型的并行标记生成。该方法通过实时探测掩码标记，允许在不修改模型权重的情况下进行未来标记的预测。我们构建了一个投机性标记树，通过从掩码标记的logits中采样前K个候选项，并应用轻量级剪枝策略来保留高概率的延续。实验结果表明，该方法在多个基准测试中优于现有的无训练基线，显著提高了生成效率和准确性。'}}}, {'id': 'https://huggingface.co/papers/2603.17074', 'title': 'PRISM: Demystifying Retention and Interaction in Mid-Training', 'url': 'https://huggingface.co/papers/2603.17074', 'abstract': "Abstract Mid-training design choices significantly improve reasoning performance in large language models, with optimal results achieved when reinforcement learning is applied to models that have been pre-trained on diverse datasets.  AI-generated summary We present PRISM, a comprehensive empirical study of mid-training design choices for large language models. Through controlled experiments across seven base models spanning four families (Granite, LLaMA, Mistral, Nemotron-H), two architecture types (dense Transformer and attention-Mamba hybrid), and scales from 3B to 24B parameters, we show that mid-training on approximately 27B high-quality tokens yields consistent gains of +15 to +40 points on math, +5 to +12 points on code, and +6 to +13 points on science benchmarks while preserving general performance. The full PRISM to RL pipeline improves macro-average across six reasoning benchmarks from under 12 to 29-42 (a 3-4x improvement), whereas RL applied directly to most of the base models remains substantially less effective, with AIME scores near zero. Data composition matters most at mid-training, not RL: including science data during mid-training unlocks +17 to +28 point GPQA-Diamond gains during RL, while changing the RL mix produces less than 2 point differences. Mechanistically, mid-training densely restructures over 90% of model weights, while RL makes sparse, front-loaded refinements to approximately 5% of parameters. Representation analysis (CKA) confirms that RL consistently preserves mid-training's representational geometry (over 0.998 CKA) across architectures. Crucially, RL applies identical weight changes regardless of starting point, yet only succeeds on mid-trained models, consistent with mid-training placing the model in a configuration from which RL can effectively improve performance. Our results demonstrate that retention-aware mid-training is highly effective for reliable reasoning enhancement and provide practical guidance for designing robust mid-training pipelines.", 'score': 0, 'issue_id': 1559, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '3e5a812ed8639371', 'authors': ['Bharat Runwal', 'Ashish Agrawal', 'Anurag Roy', 'Rameswar Panda'], 'affiliations': ['IBM Research', 'MIT-IBM Watson AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.17074.jpg', 'data': {'categories': ['#rl', '#architecture', '#interpretability', '#reasoning', '#training', '#optimization', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Промежуточное обучение как фундамент для эффективного обучения с подкреплением', 'desc': 'В исследовании PRISM авторы проводят систематический анализ промежуточного обучения больших языковых моделей и показывают, что обучение на высокоструктурированных данных перед применением обучением с подкреплением дает существенные улучшения в решении математических, программистских и научных задач. Эксперименты охватывают семь базовых моделей различных семейств и размеров параметров, демонстрируя рост производительности на 15-40 пунктов по математике и 3-4 кратное улучшение по совокупности бенчмарков рассуждения. Ключевой вывод состоит в том, что состав данных на этапе промежуточного обучения критически важен: включение научных данных обеспечивает значительные приросты, тогда как изменение состава данных при обучении с подкреплением имеет минимальный эффект. Механистический анализ выявил, что промежуточное обучение существенно перестраивает веса модели, позволяя алгоритмам обучения с подкреплением эффективно улучшать производительность модели.'}, 'en': {'title': 'Unlocking Reasoning Power through Mid-Training Design Choices', 'desc': 'This paper introduces PRISM, an empirical study that explores how mid-training design choices can enhance the reasoning capabilities of large language models. The authors conducted experiments on various models and found that mid-training with high-quality data significantly boosts performance on math, code, and science tasks. They discovered that while reinforcement learning (RL) can improve results, its effectiveness is greatly enhanced when applied to models that have undergone mid-training. The study emphasizes the importance of data composition during mid-training and provides insights into how to structure training pipelines for better reasoning outcomes.'}, 'zh': {'title': '中期训练提升推理性能的有效策略', 'desc': '本论文介绍了PRISM，一个关于大型语言模型中期训练设计选择的实证研究。通过对七个基础模型进行控制实验，发现中期训练在约27B高质量数据上可以显著提高推理性能，尤其是在数学、代码和科学基准测试中。研究表明，数据组成在中期训练中至关重要，科学数据的加入可以带来显著的性能提升。最终结果显示，保留意识的中期训练对推理增强非常有效，并为设计稳健的中期训练管道提供了实用指导。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
