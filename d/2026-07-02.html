и. Фреймворк расширяет область поиска через использование инструментов и мультимодальной обработки данных, включая анализ изображений, и демонстрирует превосходство над классическими методами каузального вывода.'}, 'en': {'title': 'Unlocking Open-Ended Research with DiscoPER', 'desc': 'This paper presents DiscoPER, an innovative framework for autonomous scientific discovery that leverages large language models and dynamic code generation. Unlike traditional systems, DiscoPER conducts open-ended research without predefined questions, allowing for more exploratory hypothesis generation. It incorporates a second-order reasoning mechanism to analyze its own findings, identifying patterns and gaps in knowledge to guide further exploration. The framework has been tested on a new ecological benchmark, demonstrating superior performance in recovering known patterns compared to existing methods.'}, 'zh': {'title': '自主科学发现的新纪元', 'desc': '这篇论文介绍了一种名为DiscoPER的自主科学发现框架，利用大型语言模型和动态代码生成进行开放式研究。该系统能够自动生成和验证假设，克服了传统方法在研究问题预设上的局限性。DiscoPER通过二阶推理机制分析自身的发现，识别结构模式和知识空白，从而引导探索新的假设。通过处理多模态数据，该框架在生态知识基准测试中表现优异，显示出其在科学研究中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.00924', 'title': 'Graph-Native Reinforcement Learning Enables Traceable Scientific Hypothesis Generation through Conceptual Recombination', 'url': 'https://huggingface.co/papers/2607.00924', 'abstract': 'Abstract Graph-PRefLexOR, a graph-native reasoning model trained with Group Relative Policy Optimization, improves materials science hypothesis generation through structured phases of mechanism exploration, graph construction, pattern extraction, and hypothesis synthesis, demonstrating enhanced reasoning traceability and semantic diversity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accelerating materials discovery requires AI systems that can generate scientifically valid hypotheses through multi-step, domain-grounded reasoning. Standard large language models often produce fluent but weakly traceable responses to open-ended materials design problems, making it difficult to determine whether final answers are supported by coherent intermediate reasoning. We develop Graph-PRefLexOR, a family of graph-native reasoning models fine-tuned with Group Relative Policy Optimization (GRPO) to organize reasoning into explicit phases for mechanism exploration, graph construction, pattern extraction, and hypothesis synthesis. This design links neural language generation with symbolic relational structure, enabling causal connections to be constructed, inspected, and reused. On 100 open-ended questions from materials science and mechanics literature, Graph-PRefLexOR achieves 40-65% improvements over corresponding base models, with the largest gains in reasoning traceability. Embedding analyses show broader semantic exploration and approximately 2-3 times greater semantic diversity than baselines. Semantic backtracking and layer-wise hidden-state analyses further show stronger alignment between structured reasoning and final answers. Finally, test-time graph expansion reveals that additional compute primarily increases long-range conceptual recombination within a bounded semantic space, rather than simply expanding semantic coverage. These results establish graph-native reinforcement learning as a pathway toward interpretable AI systems for scientific hypothesis generation in materials design and other scientific applications.', 'score': 3, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '7bf7e0a65f1d4633', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#interpretability', '#rlhf', '#benchmark', '#science', '#training', '#optimization', '#graphs', '#reasoning'], 'emoji': '🧪', 'ru': {'title': 'Граф-ориентированное рассуждение для интерпретируемого открытия в науке о материалах', 'desc': 'Статья представляет Graph-PRefLexOR — модель рассуждений, натренированную с помощью Group Relative Policy Optimization (GRPO), которая организует процесс генерации научных гипотез в материаловедении через структурированные этапы: исследование механизмов, построение графов, извлечение паттернов и синтез гипотез. Эта архитектура объединяет нейросетевую генерацию текста с символической релационной структурой, позволяя строить и проверять причинно-следственные связи. Модель показывает улучшение на 40-65% по сравнению с базовыми моделями, особенно в отношении прозрачности рассуждений и семантического разнообразия (в 2-3 раза больше, чем у аналогов). Подход демонстрирует, что обучение с подкреплением на графах является эффективным путём создания интерпретируемых AI-систем для научного открытия.'}, 'en': {'title': 'Revolutionizing Materials Science Hypothesis Generation with Graph-Native Reasoning', 'desc': 'The paper introduces Graph-PRefLexOR, a novel graph-native reasoning model that enhances hypothesis generation in materials science through structured reasoning phases. It utilizes Group Relative Policy Optimization to improve the organization of reasoning into distinct steps, such as mechanism exploration and hypothesis synthesis. This model outperforms traditional large language models by providing better reasoning traceability and greater semantic diversity in its outputs. The findings suggest that integrating graph structures with reinforcement learning can lead to more interpretable AI systems for scientific applications.'}, 'zh': {'title': '图形推理模型提升材料科学假设生成', 'desc': 'Graph-PRefLexOR是一种图形原生推理模型，利用群体相对策略优化（GRPO）进行训练，旨在通过结构化的机制探索、图构建、模式提取和假设合成来改善材料科学中的假设生成。该模型通过将神经语言生成与符号关系结构相结合，增强了推理的可追溯性和语义多样性。与标准的大型语言模型相比，Graph-PRefLexOR在材料科学和力学文献中的100个开放性问题上实现了40-65%的性能提升，尤其在推理可追溯性方面表现突出。最终的测试结果表明，图形扩展主要增加了长距离概念的重组，而不仅仅是扩展语义覆盖范围。'}}}, {'id': 'https://huggingface.co/papers/2606.32029', 'title': 'When LLMs Read Tables Carelessly: Measuring and Reducing Data Referencing Errors', 'url': 'https://huggingface.co/papers/2606.32029', 'abstract': 'Abstract Large language models exhibit data referencing errors when processing tables, which can be mitigated through critic-based filtering and rejection sampling, with a lightweight 4B-parameter model achieving high detection accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While large language models (LLMs) perform well on table tasks, they still make data referencing errors (DREs), i.e., incorrectly citing or omitting table values, despite understanding the table structure. Beyond final-answer accuracy, DREs directly compromise the correctness and reliability of intermediate reasoning steps. Yet prior studies have only offered limited, small-scale analyses. In this work, we present the first systematic evaluation of tabular data referencing errors across different models and tasks. Our results show that DREs occur across all tested models (1.7B to 20B parameters). Furthermore, we demonstrate that incorporating data referencing as a critic significantly improves answer accuracy up to 12.0%, through critic-based filtering and rejection sampling. Finally, we trained a lightweight 4B-parameter critic model that achieves an average F1 score of 78.2% in detecting both in-distribution and out-of-distribution DREs, and effectively assists inference for larger models.', 'score': 3, 'issue_id': 2548, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '6fa27f31261d1a07', 'authors': ['Yuqing Yang', 'Qi Zhu', 'Zhen Han', 'Boran Han', 'Zhengyuan Shen', 'Shuai Wang', 'Vassilis N. Ioannidis', 'Huzefa Rangwala'], 'affiliations': ['AWS AI Labs', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2606.32029.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Критик для коррекции ошибок при работе с табличными данными в больших языковых моделях', 'desc': 'В работе исследуются ошибки при обращении к табличным данным в больших языковых моделях, которые могут неправильно цитировать или пропускать значения из таблиц несмотря на понимание структуры. Авторы показали, что такие ошибки присутствуют во всех протестированных моделях размером от 1.7B до 20B параметров. Они предложили использовать критик-модель для фильтрации и rejection sampling, что улучшает точность ответов на 12%. Легковесная 4B-параметровая критик-модель достигает F1-меры 78.2% при обнаружении ошибок и эффективно помогает при инференсе больших моделей.'}, 'en': {'title': 'Enhancing Table Accuracy in Language Models with Critic-Based Filtering', 'desc': 'This paper addresses the issue of data referencing errors (DREs) in large language models (LLMs) when they process tabular data. DREs occur when these models incorrectly cite or omit values from tables, which affects the reliability of their reasoning. The authors conducted a systematic evaluation of DREs across various models and tasks, revealing that these errors are prevalent even in models with up to 20 billion parameters. They propose a solution using a lightweight 4B-parameter critic model that enhances answer accuracy by up to 12% through critic-based filtering and rejection sampling, achieving a high detection accuracy for DREs.'}, 'zh': {'title': '提升大型语言模型的表格数据引用准确性', 'desc': '大型语言模型在处理表格时会出现数据引用错误（DRE），即错误引用或遗漏表格值。尽管这些模型理解表格结构，但它们的中间推理步骤的正确性和可靠性受到影响。本文首次系统评估了不同模型和任务中的数据引用错误，结果显示所有测试模型均存在此问题。通过引入数据引用作为评判标准，结合过滤和拒绝采样的方法，我们的轻量级4B参数模型在检测DRE方面取得了78.2%的F1分数，显著提高了答案的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.30124', 'title': 'SciIR: A Large-scale Training Dataset and Benchmark for Scientific Image Reasoning Generation', 'url': 'https://huggingface.co/papers/2606.30124', 'abstract': "Abstract Scientific image generation faces challenges in semantic alignment and logical reasoning, prompting the creation of SciIR-82k dataset and SciIR-Bench evaluation framework to improve scientific reasoning capabilities in text-to-image models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Text-to-Image (T2I) models have shown remarkable success in generating photorealistic visual content, they still struggle with the rigorous semantic alignment and logical reasoning required for scientific imagery. Inspired by Peirce's Semiotic Triad, we introduce Scientific Image Reasoning (SciIR), a comprehensive resource for training and evaluation of scientific image generation. We formalize scientific reasoning into three core dimensions: Entity Structure (Icon), Scientific Process (Index), and Scientific Law (Symbol). Specifically, to overcome the scarcity of training data in scientific image generation, we elaborately create SciIR-82k, a large-scale dataset containing over 80,000 high-quality scientific image-text pairs from cutting-edge publications. The dataset is hierarchically organized according to the semiotic dimensions and incorporates a Scientific Reasoning Chain-of-Thought (Sci-RCoT) to explicitly model underlying visual logic. For evaluation, we propose SciIR-Bench, which aligns with these three semiotic levels and employs an Atomic Checklist to convert the outcome-oriented scientific accuracy into process-oriented, verifiable, fine-grained questions. Our extensive experiments reveal significant deficiencies in current models' scientific reasoning capabilities. Furthermore, by fine-tuning on the SciIR-82k dataset, we developed the Qwen-Image-SciIR model, which achieves a substantial improvement on the SciIR-Bench, increasing the final score from 35\\% to 43\\%, laying a solid foundation for future advances in scientific image generation.", 'score': 2, 'issue_id': 2551, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '6d44a8e03a2c4b8f', 'authors': ['Zhiyuan Ma', 'Zhengfeng Shi', 'Yuning An', 'Peize Li', 'Jiabao Wei', 'Ruijie Li', 'Junhao Xiao', 'Jianjun Li', 'Bowen Zhou'], 'affiliations': ['Department of Electronic Engineering, Tsinghua University, China', 'School of Airspace Science and Engineering, Shandong University, China', 'School of Computer Science and Technology, Huazhong University of Science and Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30124.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training', '#science', '#reasoning', '#synthetic', '#cv', '#dataset'], 'emoji': '🔬', 'ru': {'title': 'Научное рассуждение в генерации изображений: от текста к точному знанию', 'desc': 'Авторы представляют новый датасет SciIR-82k и бенчмарк SciIR-Bench для улучшения научного рассуждения в моделях генерации изображений из текста. Датасет содержит более 80 000 высокачественных пар научных изображений и текстов, организованных в соответствии с семиотической триадой: структура сущностей, научные процессы и научные законы. Для оценки качества используется система атомарных чек-листов, которая преобразует проверку научной точности в верифицируемые вопросы. Через fine-tuning на предложенном датасете модель Qwen-Image-SciIR достигла значительного улучшения с 35% до 43% на бенчмарке, демонстрируя прогресс в генерации научных изображений.'}, 'en': {'title': 'Enhancing Scientific Image Generation with SciIR-82k and SciIR-Bench', 'desc': 'This paper addresses the challenges faced by text-to-image models in generating scientifically accurate images, focusing on semantic alignment and logical reasoning. To tackle these issues, the authors introduce the SciIR-82k dataset, which contains over 80,000 high-quality scientific image-text pairs, organized by semiotic dimensions. They also propose the SciIR-Bench evaluation framework to assess scientific reasoning capabilities through a structured approach. The results show that fine-tuning models on this dataset significantly enhances their performance in generating scientifically relevant imagery.'}, 'zh': {'title': '提升科学图像生成的推理能力', 'desc': '本论文针对科学图像生成中的语义对齐和逻辑推理问题，提出了SciIR-82k数据集和SciIR-Bench评估框架，以提升文本到图像模型的科学推理能力。我们将科学推理形式化为三个核心维度：实体结构、科学过程和科学法则，并创建了包含超过80,000个高质量科学图像-文本对的大规模数据集。通过引入科学推理链思维（Sci-RCoT），我们明确建模了潜在的视觉逻辑。实验结果显示，当前模型在科学推理能力上存在显著不足，而通过在SciIR-82k数据集上进行微调，我们开发的Qwen-Image-SciIR模型在SciIR-Bench上取得了显著提升。'}}}, {'id': 'https://huggingface.co/papers/2607.00407', 'title': 'Personalization as Inverse Planning: Learning Latent Design Intents for Agentic Slide Generation via Structural Denoising', 'url': 'https://huggingface.co/papers/2607.00407', 'abstract': 'Abstract Page-level slide personalization is addressed through a novel framework that formulates the problem as inverse planning and uses a multi-agent reinforcement learning approach to learn design intents without requiring specific tool knowledge.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Slide design requires personalizing both deck themes and page layouts. Yet, current AI agent-based methods struggle with fine-grained, page-level design. Solely relying on prespecified templates or user verbose instructions, they fail to capture latent design intents, leaving Page-level Slide Personalization (PSP) unresolved. To close this gap, this work formulates PSP as an inverse planning problem. We propose to learn a design intent without assuming any knowledge of the specific executing tools (e.g., PowerPoint, Beamer) being used. However, relinquishing control over these tools makes the problem intractable to optimize end-to-end. To overcome this, we propose SPIRE, a principled framework to solve PSP approximately. By intentionally corrupting the visual structures of clean slides, SPIRE creates a verifiable task to denoise the corruption, whereby two agents learn to collaboratively refine executable designs via reinforcement learning (RL). We present a proof that structural denoising is a consistent surrogate for PSP, and that the multi-agent formulation strictly reduces policy gradient variance in RL. Extensive experiments demonstrate the superiority of SPIRE.', 'score': 1, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'd0ec49ec2e5f1060', 'authors': ['Tianci Liu', 'Zihan Dong', 'Linjun Zhang', 'Haoyu Wang', 'jing Gao', 'Emre Kiciman', 'Ranveer Chandra', 'Wei-Ting Chen'], 'affiliations': ['Microsoft', 'Purdue University', 'Rutgers University', 'University at Albany'], 'pdf_title_img': 'assets/pdf/title_img/2607.00407.jpg', 'data': {'categories': ['#agents', '#rl', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Обучение дизайнерским намерениям через многоагентное обучение с подкреплением', 'desc': 'В работе предлагается решение задачи персонализации слайдов на уровне отдельных страниц через формулировку проблемы как обратного планирования. Авторы разработали фреймворк SPIRE, который использует подход многоагентного обучения с подкреплением для изучения скрытых намерений дизайнера без необходимости знания специфических инструментов создания презентаций. Ключевая идея заключается в искусственном внесении шума в визуальную структуру слайдов и последующей их очистке двумя взаимодействующими агентами через RL. Авторы доказывают, что структурная денойзация является состоятельным суррогатом для исходной задачи и что многоагентная формулировка уменьшает дисперсию градиентов политики.'}, 'en': {'title': 'Revolutionizing Slide Design with Multi-Agent Learning', 'desc': 'This paper introduces a new framework for personalizing slide designs at the page level using multi-agent reinforcement learning. It formulates the problem as inverse planning, allowing the system to learn design intents without needing specific knowledge of design tools like PowerPoint. The proposed method, SPIRE, addresses the limitations of existing AI methods by creating a task that involves denoising corrupted slide structures, enabling agents to collaboratively improve design outputs. The results show that SPIRE effectively reduces policy gradient variance and outperforms previous approaches in page-level slide personalization.'}, 'zh': {'title': '创新框架实现幻灯片个性化设计', 'desc': '本论文提出了一种新的框架来解决页面级幻灯片个性化问题，采用逆向规划的方式，并利用多智能体强化学习来学习设计意图，而无需特定工具的知识。该方法旨在个性化幻灯片主题和页面布局，克服了现有基于AI代理的方法在细粒度设计上的不足。通过将页面级幻灯片个性化（PSP）视为逆向规划问题，提出了一种名为SPIRE的框架，能够近似解决该问题。实验结果表明，SPIRE在处理页面级幻灯片个性化方面具有显著优势。'}}}, {'id': 'https://huggingface.co/papers/2607.00115', 'title': 'PixelEyes: Decoupling Perception and Reasoning for Pinpoint Visual Evidence Seeking', 'url': 'https://huggingface.co/papers/2607.00115', 'abstract': 'Abstract Multi-turn visual reasoning agents suffer from entangled reasoning and perception that cause redundant trajectories; PixelEyes addresses this by decoupling these processes through mask-guided search and semantic-region breadth-first search, demonstrated on a new benchmark with expert-resynthesized data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct This paper explores multi-turn visual reasoning and observes that MLLMs repeatedly fail to localize the target, leading to long, redundant trajectories. We attribute this failure to the entanglement of reasoning and perception within a single model, the MLLM reasons and localizes simultaneously, and inaccurate localization triggers additional reasoning turns that bloat the trajectory. To solve this problem, we propose PixelEyes, a multi-turn visual reasoning agent that explicitly decouples reasoning from perception, i.e., the reasoner decides what to look for, while a specialized perception tool answers where it is. Specifically, PixelEyes introduces 1) Mask-guided Visual Search. A referring segmentation model is invoked to provide mask-precise localization, freeing the reasoner from the need to compensate for imprecise grounding. 2) Semantic-region Breadth-first Search (BFS). To eliminate redundant loops caused by repeatedly cropping incorrect sub-regions, we organize exploration as a breadth-first search over semantic regions. To internalize these capabilities, we construct the PixelEyes-6K dataset by resynthesizing expert trajectories from existing data. This explicitly embeds our mask-guided search and BFS logic into the model. We further introduce Pinpoint-Bench, a zero-hint visual search benchmark, i.e., no location cues are provided in the question, with instance-level masks and bounding boxes that separate localization failures from reasoning failures, enabling fine-grained analysis of failure modes such as inattentional blindness. Recent state-of-the-art MLLMs and visual reasoning agents leave large headroom on Pinpoint-Bench, demonstrating its quality and difficulty. Code and models are open-sourced.', 'score': 1, 'issue_id': 2550, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '4813c9ec22a77009', 'authors': ['Dengxian Gong', 'Yuanzheng Wu', 'Haobo Yuan', 'Zhengdong Hu', 'Tao Zhang', 'Yikang Zhou', 'Shihao Chen', 'Quanzhu Niu', 'Kai Wang', 'Jason Li', 'Haochen Wang', 'Lu Qi', 'Shunping Ji', 'Ming-Hsuan Yang'], 'affiliations': ['CASIA', 'NTU', 'NUS', 'UC Merced', 'UTS', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00115.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#reasoning', '#synthetic', '#cv', '#agents', '#dataset', '#benchmark'], 'emoji': '👁️', 'ru': {'title': 'Разделение восприятия и рассуждения для эффективного визуального поиска', 'desc': 'В работе предлагается PixelEyes — агент для многошагового визуального рассуждения, который разделяет процессы восприятия и рассуждения для устранения избыточных траекторий поиска. Основная идея заключается в том, что мультимодальные языковые модели одновременно выполняют локализацию и рассуждение, что приводит к ошибкам позиционирования и дополнительным итерациям. Предложенный подход использует маски для точной локализации объектов и поиск в ширину по семантическим регионам для организованного исследования. Авторы создали датасет PixelEyes-6K с переинженерированными экспертными траекториями и бенчмарк Pinpoint-Bench для оценки качества локализации и анализа ошибок восприятия.'}, 'en': {'title': 'Decoupling Reasoning and Perception for Efficient Visual Search', 'desc': 'This paper addresses the challenges faced by multi-turn visual reasoning agents, particularly the issues of entangled reasoning and perception that lead to inefficient and redundant trajectories. The authors introduce PixelEyes, a new agent that separates the reasoning process from the perception process, allowing for more accurate localization and reduced redundancy. Key innovations include a mask-guided visual search for precise localization and a semantic-region breadth-first search to streamline exploration. The paper also presents the PixelEyes-6K dataset and the Pinpoint-Bench benchmark to evaluate and analyze the performance of visual reasoning agents more effectively.'}, 'zh': {'title': '解耦推理与感知，提升视觉推理效率', 'desc': '本论文探讨了多轮视觉推理中的问题，发现现有的多模态大语言模型（MLLMs）在定位目标时经常失败，导致冗长的推理轨迹。我们认为这种失败源于推理和感知在单一模型中的纠缠，导致不准确的定位触发额外的推理回合。为了解决这个问题，我们提出了PixelEyes，一个明确将推理与感知解耦的多轮视觉推理代理。PixelEyes通过掩膜引导的视觉搜索和语义区域广度优先搜索来优化推理过程，从而提高了定位的准确性和效率。'}}}, {'id': 'https://huggingface.co/papers/2606.29464', 'title': 'Rank-Aware Hyperbolic Alignment for Vision-Language Dataset Distillation', 'url': 'https://huggingface.co/papers/2606.29464', 'abstract': 'Abstract Vision-language dataset distillation method using rank-aware hyperbolic alignment to optimize synthetic image-text pairs for efficient contrastive model training while preserving modality-specific diversity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language dataset distillation (VLDD) compresses a large image-text paired dataset into a small set of synthetic pairs that can efficiently train contrastive vision-language models under strict data and compute budgets. Most existing methods match expert trajectories or cross-modal statistics, yet still enforce full-dimensional alignment in a Euclidean embedding space. This is often overly restrictive due to rank-deficient image--text correlation, with shared semantics concentrated in a low-dimensional range and remaining variation spread across a weakly correlated residual subspace. LoRS relaxes alignment at the similarity level by low-rank factorization, but does not explicitly control dominant alignment capacity and structure in the representation space. We thus propose a rank-aware hyperbolic alignment (RAHA) that combines hierarchical geometry with explicit alignment-capacity control. RAHA lifts multimodal representations to hyperbolic space and optimizes distilled pairs with asymmetric objectives that enforce geodesic alignment in the shared range while regularizing the residual subspace to preserve modality-private diversity and improve transfer robustness. Experiments on benchmarks show that RAHA demonstrates competitive cross-modal retrieval and improved transfer indicators under fixed budgets.', 'score': 1, 'issue_id': 2551, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '96a8b86424d427f6', 'authors': ['Jongoh Jeong', 'Sun-Kyung Lee', 'Kuk-Jin Yoon'], 'affiliations': ['Electronics and Telecommunications Research Institute (ETRI), Republic of Korea', 'Korea Advanced Institute of Science and Technology (KAIST), Republic of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2606.29464.jpg', 'data': {'categories': ['#multimodal', '#training', '#transfer_learning', '#synthetic', '#dataset'], 'emoji': '🧲', 'ru': {'title': 'Гиперболическое выравнивание для эффективного сжатия мультимодальных датасетов', 'desc': 'Статья описывает метод дистилляции датасета для моделей зрения и языка, который сжимает большой датасет изображений и текстов в маленький набор синтетических пар. Авторы предлагают использовать гиперболическое пространство вместо евклидова, чтобы лучше работать с низкоранговыми корреляциями между модальностями. Метод RAHA применяет иерархическую геометрию и асимметричные функции потерь, чтобы выравнивать общую семантику, одновременно сохраняя уникальные особенности каждой модальности. Экспериментальные результаты показывают, что подход достигает конкурентных результатов в задачах кросс-модального поиска при ограниченном бюджете данных и вычислений.'}, 'en': {'title': 'Optimizing Image-Text Pairs with Hyperbolic Alignment', 'desc': 'This paper introduces a new method called rank-aware hyperbolic alignment (RAHA) for optimizing synthetic image-text pairs used in training vision-language models. The method focuses on distilling large datasets into smaller, more efficient sets while maintaining the diversity of the data. Unlike traditional methods that enforce strict alignment in a Euclidean space, RAHA utilizes hyperbolic geometry to better capture the complex relationships between images and text. The results show that RAHA improves model performance in cross-modal retrieval tasks and enhances robustness during transfer learning, all while adhering to data and computational constraints.'}, 'zh': {'title': '基于秩的超曲面对齐优化视觉-语言数据集', 'desc': '本文提出了一种视觉-语言数据集蒸馏方法，利用基于秩的超曲面对齐来优化合成的图像-文本对，以高效训练对比模型，同时保持模态特定的多样性。该方法通过压缩大型图像-文本配对数据集，生成一小组合成对，能够在严格的数据和计算预算下高效训练对比视觉-语言模型。与现有方法不同，本文的方法在相似性层面放宽了对齐，通过低秩分解来处理图像-文本之间的相关性。实验结果表明，该方法在跨模态检索和转移指标上表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2607.00529', 'title': 'NoPA: Non-Parametric Online 3D Scene Graph Generation', 'url': 'https://huggingface.co/papers/2607.00529', 'abstract': 'Abstract NoPA introduces a non-parametric distribution-based approach for real-time 3D scene graph generation that preserves geometric details while maintaining computational efficiency through kernel density estimates and particle-based object representation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Classic 3D scene graph generation approaches fail to work in real-time due to the heavy computational cost of environment mapping and the need to generate intermediate point-cloud representations. To alleviate this issue, a recent work eschews point clouds in favor of a lightweight Gaussian distribution for each object. This approximation drastically speeds up inference and enables real-time 3D scene graph generation. However, the representation has two key weaknesses. 1) Each object is approximated by a single 3D Gaussian, which causes a severe loss of 3D geometric detail. 2) The discrepancy between this approximation and the true object geometry exacerbates the inaccurate merging of object candidates during online inference. To address these issues, we propose NoPA, which represents each object as a separate non-parametric distribution. This formulation retains 3D geometric information while preserving real-time inference of the parametric Gaussian formulation. To build upon our novel object representation, we propose a tailored merging strategy to recover coherent object instances. Specifically, we leverage maximum mean discrepancy on kernel density estimates to enable robust merging of object candidates during online exploration while minimizing added computational complexity. The key is to maintain a fixed particle set per object. Furthermore, to rectify the relation loss caused by misclassified objects, NoPA propagates relationships between objects with high affinity. Experiments show that NoPA substantially outperforms current methods without sacrificing real-time inference speed.', 'score': 0, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'bf96bca705f70695', 'authors': ['Qi Xun Yeo', 'Seungjun Lee', 'Yan Li', 'Gim Hee Lee'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.00529.jpg', 'data': {'categories': ['#inference', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Частицы вместо гауссианов: непараметрическое представление для 3D графов сцен', 'desc': 'NoPA предлагает непараметрический подход для генерации 3D графов сцен в реальном времени, используя представление объектов в виде распределений частиц вместо одного гауссиана. Метод сохраняет геометрические детали благодаря оценкам плотности ядра и фиксированному набору частиц для каждого объекта. Для слияния кандидатов объектов авторы применяют максимальное расстояние среднего значения, что обеспечивает надёжное объединение при минимальных вычислительных затратах. Экспериментальные результаты демонстрируют значительное улучшение качества при сохранении скорости вывода в реальном времени.'}, 'en': {'title': 'Real-Time 3D Scene Graphs with Non-Parametric Precision', 'desc': 'NoPA is a new method for generating 3D scene graphs in real-time, focusing on maintaining detailed geometric information while being computationally efficient. It uses non-parametric distributions instead of traditional point clouds or single Gaussian approximations, which helps preserve the 3D shape of objects. The method includes a unique merging strategy that utilizes maximum mean discrepancy to accurately combine object candidates during online processing. Overall, NoPA significantly improves the accuracy of 3D scene graph generation without slowing down the inference speed.'}, 'zh': {'title': '实时3D场景图生成的新方法：NoPA', 'desc': 'NoPA提出了一种基于非参数分布的方法，用于实时生成3D场景图，同时保持几何细节并提高计算效率。与传统的3D场景图生成方法相比，NoPA通过使用非参数分布来表示每个对象，从而避免了使用点云的高计算成本。该方法通过最大均值差异来优化对象合并策略，确保在在线推理过程中能够准确合并对象实例。实验结果表明，NoPA在不牺牲实时推理速度的情况下，显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2606.30030', 'title': 'CogSENet: Blind Image Deblurring with Blur-Conditioned Semantic Routing and Explicit Frequency Fusion', 'url': 'https://huggingface.co/papers/2606.30030', 'abstract': "Abstract CogSENet presents a novel blind image deblurring framework inspired by eagle vision, incorporating semantic-aware modules and frequency decomposition for improved restoration quality and structural fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Blind image deblurring demands the recovery of high-fidelity details and coherent structures from complex, unknown degradations. Current blind image deblurring methods struggle with real-world, spatially varying degradations, and lack the semantic awareness necessary to reliably differentiate valid textures from artifacts. To bridge this gap, we propose CogSENet, a dynamic, semantic-aligned reconstruction framework inspired by the eagle's visual system. By mimicking the eagle's active saccadic scanning, we devise a Semantic-Driven State Space Module (SDSSM) with semantic-aware token regrouping via differentiable routing, enabling prompt-conditioned long-range dependency modeling. To ensure physically interpretable recovery of textures and structures, a BiFreqFusionBlock (BFFB) mirrors functional differentiation of the eagle's retina by decomposing features into high and low frequencies using wavelet transforms. Finally, we estimate a continuous Blur Field (CBF) from blur image and fuse it with CLIP semantic priors to modulate the deepest latent features, emulating focal adaptation and enabling adaptive restoration under spatially non-uniform blur. Extensive experiments demonstrate that CogSENetoutperforms state-of-the-art deblurring methods in both visual quality and structural fidelity with fewer parameters, while also performing favorably on dehazing, deraining, and denoising tasks.", 'score': 0, 'issue_id': 2551, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '99d7f27fb9dfb1d3', 'authors': ['Pan Wang', 'Yihao Hu', 'Xiujin Liu'], 'affiliations': ['University of Michigan, Ann Arbor, MI, USA', 'University of Science and Technology of China, Hefei, China', 'Westlake University, Hangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30030.jpg', 'data': {'categories': [], 'emoji': '🦅', 'ru': {'title': 'Орлиное зрение для восстановления резкости: семантико-ориентированная деблюрация через частотное разложение', 'desc': 'CogSENet представляет инновационный подход к слепой деблюрации изображений, вдохновленный зрительной системой орла. Модель использует семантически-ориентированный модуль с дифференцируемой маршрутизацией для моделирования долгосрочных зависимостей и адаптивного восстановления при пространственно-неоднородном размытии. Архитектура включает блок частотного разложения на основе вейвлет-преобразований для разделения высокочастотных и низкочастотных компонент, а также механизм оценки поля размытия, интегрированный с CLIP семантическими приорами. Метод демонстрирует превосходящие результаты по сравнению с современными методами деблюрации при меньшем количестве параметров и хорошо обобщается на задачи дехеширования, удаления дождя и шумоподавления.'}, 'en': {'title': 'Eagle-Inspired Image Deblurring with CogSENet', 'desc': 'CogSENet is a new framework for blind image deblurring that takes inspiration from how eagles see. It uses semantic-aware modules to help the model understand and differentiate between real textures and unwanted artifacts in images. The framework includes a unique Semantic-Driven State Space Module (SDSSM) that allows for better long-range dependency modeling and a BiFreqFusionBlock (BFFB) that separates image features into high and low frequencies for clearer restoration. Overall, CogSENet shows significant improvements in image quality and structure recovery compared to existing methods, while also being effective in other image enhancement tasks like dehazing and denoising.'}, 'zh': {'title': 'CogSENet：灵感来自鹰眼的盲图像去模糊新方法', 'desc': 'CogSENet是一种新颖的盲图像去模糊框架，灵感来源于鹰的视觉系统。它结合了语义感知模块和频率分解技术，以提高图像恢复的质量和结构的保真度。该方法通过模仿鹰的主动扫视，设计了一个语义驱动的状态空间模块，能够有效地建模长距离依赖关系。实验结果表明，CogSENet在视觉质量和结构保真度方面超越了现有的去模糊方法，同时在去雾、去雨和去噪任务中也表现良好。'}}}, {'id': 'https://huggingface.co/papers/2606.26040', 'title': 'AI translation of literary texts is "fine", but readers still prefer human translations', 'url': 'https://huggingface.co/papers/2606.26040', 'abstract': 'Abstract Human readers prefer human-translated literary works over machine translations, finding the latter less immersive and harder to distinguish from human translations, despite machine translation metrics favoring the automated versions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI translation of literary works is increasingly common. While the content may be rendered adequately, we do not know enough about how readers experience it in terms of immersiveness and literary effect, aspects poorly captured by automatic machine translation metrics or human evaluation targeting fluency and adequacy. We ask 15 avid readers to compare recently published human translations (HT) to machine translations (MT) generated with an agentic large language model (LLM)-based pipeline, for 15 recent novels in French, Polish, and Japanese and translated into English. Readers evaluated approximately 8K-word excerpts in two conditions: immersive reading of the whole excerpt (30 comparisons) and close reading of 386 aligned HT-MT chunk pairs (772 comparisons), with two readers per book and in alternating order of presentation. Overall, readers find MT "fine", but prefer HT (slightly at excerpt-level 19/30, more clearly at chunk-level 522/772) for its ease, clarity, and immersive nature. Readers\' highlights show that MT\'s quality varies more within one book than HT\'s does. Crucially, readers cannot reliably tell the two apart (17/30 guess correctly) and tend to prefer the version they believe to be human. Automatic metrics, including LLM-as-a-judge approaches, fail to recover reader preferences and favor MT. We release LAIT (Literary AI Translation), a reader-centered evaluation dataset with 1K reader comments, 2K judgments and preference ratings, and 7.2K span-level annotations, along with our evaluation protocol and supporting interface.', 'score': 0, 'issue_id': 2549, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'cebc278ffaf4a428', 'authors': ['Yves Ferstler', 'Adam Podoxin', 'Ty Brassington', 'Roman Grundkiewicz', 'Maite Taboada', 'Marzena Karpinska'], 'affiliations': ['Simon Fraser University', 'Université du Québec à Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2606.26040.jpg', 'data': {'categories': ['#agents', '#machine_translation', '#open_source', '#benchmark', '#dataset', '#multilingual'], 'emoji': '📚', 'ru': {'title': 'Человеческий перевод остаётся непревзойден: когда метрики не улавливают суть литературы', 'desc': 'В этой работе исследователи сравнивают переводы художественных произведений, сделанные человеком, с переводами, созданными с помощью большой языковой модели (LLM) в агентивном режиме. Проведен эксперимент с 15 опытными читателями, которые оценивали отрывки из 15 недавно опубликованных романов на французском, польском и японском языках, переведённых на английский. Результаты показали, что читатели предпочитают человеческие переводы за их ясность и погружающий эффект, хотя не всегда могут надёжно различить два типа переводов. Авторы создали датасет LAIT с читательскими комментариями и аннотациями, а также продемонстрировали, что стандартные метрики оценки машинного перевода не отражают предпочтения человека.'}, 'en': {'title': 'Human Touch Triumphs: Readers Prefer Human Translations Over Machine', 'desc': "This paper investigates how readers perceive machine translations (MT) compared to human translations (HT) of literary works. Despite MT being rated favorably by automatic metrics, human readers prefer HT for its immersive quality and clarity. The study involved 15 avid readers comparing excerpts from novels translated by both methods, revealing that while MT is considered 'fine', HT is favored for its overall reading experience. The authors introduce the LAIT dataset to better capture reader preferences, highlighting the limitations of current automatic evaluation methods in reflecting true reader enjoyment."}, 'zh': {'title': '人类翻译更具沉浸感，机器翻译难以取代', 'desc': '这篇论文探讨了人类读者对人类翻译和机器翻译的偏好。尽管机器翻译在自动化指标上表现良好，但读者更喜欢人类翻译，因为它们更易于理解和更具沉浸感。研究显示，机器翻译的质量在同一本书中变化较大，而人类翻译则相对稳定。论文还发布了一个名为LAIT的评估数据集，以帮助更好地理解读者的偏好。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (9)', '#agi', '#alignment', '#architecture (1)', '#audio', '#benchmark (13)', '#cv (6)', '#data (1)', '#dataset (7)', '#diffusion', '#ethics', '#games', '#graphs (1)', '#hallucinations', '#healthcare (2)', '#inference (2)', '#interpretability (2)', '#leakage', '#long_context', '#low_resource', '#machine_translation (1)', '#math', '#multilingual (1)', '#multimodal (12)', '#open_source (4)', '#optimization (5)', '#plp', '#rag', '#reasoning (6)', '#rl (2)', '#rlhf (1)', '#robotics (3)', '#science (5)', '#security (1)', '#small_models (2)', '#story_generation', '#survey', '#synthetic (3)', '#training (12)', '#transfer_learning (3)', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-02 15:08',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-02 15:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-02 15:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
