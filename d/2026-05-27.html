 benchmark a diverse set of frontier proprietary and open-source LLMs. Results show that real-world personalization remains highly challenging even for state-of-the-art models, revealing a substantial gap between current capabilities and practical requirements. Extensive analysis further reveals the failure modes and capability bottlenecks of current agents in real-world personalized decision-making, providing insights for future model improvements.', 'score': 9, 'issue_id': 2323, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '1c76da27e82bb002', 'authors': ['Yuxin Chen', 'Yi Zhang', 'Zhengzhou Cai', 'Yaorui Shi', 'Zhiyuan Yao', 'Chenhang Cui', 'Jingnan Zheng', 'Yaqi Huo', 'Xi Su', 'Qi Gu', 'Xunliang Cai', 'Xiang Wang', 'An Zhang', 'Tat-Seng Chua'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'Meituan', 'National University of Singapore', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27141.jpg', 'data': {'categories': ['#survey', '#agents', '#benchmark', '#open_source', '#reasoning', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Персонализация как главный вызов интерактивных агентов', 'desc': 'VitaBench 2.0 — это бенчмарк для оценки способности агентов на основе больших языковых моделей к персонализации и проактивному поведению при длительном взаимодействии с пользователем. Основная задача заключается в непрерывном извлечении, использовании и обновлении предпочтений пользователя из фрагментарных и разнородных взаимодействий, организованных в виде временных последовательностей. Бенчмарк также оценивает способность агентов к проактивности — распознаванию недостающей информации и активному её получению перед принятием решений. Результаты показывают, что современные LLM значительно отстают от практических требований в решении задач персонализированного принятия решений в реальных сценариях.'}, 'en': {'title': 'VitaBench 2.0: Advancing Personalized AI Interaction', 'desc': 'VitaBench 2.0 is a benchmark designed to assess how well AI agents can understand and adapt to user preferences over long-term interactions. It focuses on the continuous extraction and updating of user preferences from fragmented interactions, which is crucial for effective collaboration. The benchmark evaluates agents not only on their reasoning and tool use but also on their ability to proactively gather missing information from users. Results indicate that even advanced language models struggle with real-world personalization, highlighting significant gaps in their capabilities and offering insights for future enhancements.'}, 'zh': {'title': '个性化与主动交互的未来挑战', 'desc': 'VitaBench 2.0 是一个评估个性化和主动代理行为的基准，专注于长期用户交互中的用户偏好提取与更新。该基准要求代理从碎片化的日常互动中理解用户意图，并进行个性化建模和主动互动。通过组织任务为时间顺序的序列，代理需要不断提取和利用用户偏好，以成功完成任务。研究结果表明，即使是最先进的模型，在现实世界中的个性化仍然面临重大挑战，揭示了当前能力与实际需求之间的差距。'}}}, {'id': 'https://huggingface.co/papers/2605.26045', 'title': 'Confidence and Calibration of Activation Oracles for Reliable Interpretation of Language Model Internals', 'url': 'https://huggingface.co/papers/2605.26045', 'abstract': 'Abstract Research evaluates confidence estimation methods for activation oracles, finding bootstrap mode frequency provides better-calibrated confidence scores than log-probability approaches.  AI-generated summary Activation oracles aim to make the activations of other models legible to humans and yield promising results compared to white-box interpretability techniques. However, uncertainty quantification (UQ) for the natural-language outputs of such activation oracles is so far understudied. Here, we investigate 6 different methods for estimating the confidence of activation oracles and evaluate how well-calibrated their confidence scores are. Our experiments on 6,000 samples per oracle (varying verbalizer and context prompts) reveal that bootstrap mode frequency is the best-calibrated method among those tested (ECE 5.7% vs. 25.5% for the answer-word log-probability on Qwen3-8B; 10.3% vs. 13.1% on Qwen3.6-27B), and that the log-prob baseline can serve as a fast triage signal at a fraction of the cost.   Code and the patched trainer are available at https://github.com/federicotorrielli/probabilistic_activation_oracles.', 'score': 9, 'issue_id': 2323, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'a80c4d62adb6a06d', 'authors': ['Federico Torrielli', 'Peter Schneider-Kamp', 'Lukas Galke Poech'], 'affiliations': ['University of Southern Denmark', 'University of Turin'], 'pdf_title_img': 'assets/pdf/title_img/2605.26045.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Bootstrap мода — лучший способ измерить уверенность интерпретаторов моделей', 'desc': 'В работе исследуются методы оценки уверенности для activation oracles — систем, которые делают активации нейронных сетей понятными для людей. Авторы сравнивают 6 различных подходов к оцениванию надежности предсказаний на основе естественного языка, включая традиционные методы на основе log-probability. Результаты экспериментов на 6000 образцах показывают, что bootstrap мода частоты обеспечивает лучшую калибровку доверительных оценок с ошибкой калибровки (ECE) всего 5.7% против 25.5% для базового метода. Исследование подчеркивает важность правильной квантификации неопределенности при интерпретации работы больших языковых моделей.'}, 'en': {'title': 'Boosting Confidence in Activation Oracles with Bootstrap Mode Frequency', 'desc': 'This research paper focuses on improving confidence estimation methods for activation oracles, which help interpret the outputs of machine learning models. The study compares six different techniques for quantifying uncertainty in the predictions made by these oracles. Results show that the bootstrap mode frequency method provides the most reliable confidence scores, outperforming traditional log-probability approaches. The findings suggest that while log-probability can be a quick assessment tool, bootstrap mode frequency is superior for accurate confidence calibration.'}, 'zh': {'title': '自助法模式频率：激活预言机的最佳置信度估计', 'desc': '本研究评估了激活预言机的置信度估计方法，发现自助法模式频率提供的置信度评分比对数概率方法更为准确。激活预言机旨在使其他模型的激活结果对人类可读，并且与白盒可解释性技术相比，取得了良好的效果。然而，对于这些激活预言机自然语言输出的不确定性量化尚未得到充分研究。我们的实验表明，自助法模式频率是测试中表现最佳的置信度估计方法，具有更好的校准效果。'}}}, {'id': 'https://huggingface.co/papers/2605.25437', 'title': 'Does Seeing More Mean Knowing More? Mono-Anchored Advantage Normalization for Multi-Source Visual Reasoning', 'url': 'https://huggingface.co/papers/2605.25437', 'abstract': 'Abstract A novel mono-anchored multi-source reasoning framework that uses dynamic anchors to quantify information gain and regulate modality interactions during reinforcement learning with verifiable rewards.  AI-generated summary Visual reasoning through reinforcement learning with verifiable rewards (RLVR) has achieved remarkable progress. However, when dealing with multi-source inputs, existing approaches tend to treat them as a mere accumulation of information, lacking explicit mechanisms to distinguish whether integrating additional sources yields information gain or introduces interference. Therefore, they struggle to effectively model dynamic interaction when integrating multiple sources, particularly when they differ significantly in physical properties and semantics, e.g., infrared and depth, leading to inferior performance to mono-source reasoning when a certain source holds the dominant signal. To address this issue, we propose MARS, a novel mono-anchored multi-source reasoning framework that models each visual modality as an independent information source. Specifically, by treating mono-source rewards as dynamic anchors, our method explicitly incorporates the information gain introduced by multi-source fusion into advantage normalization and adaptively emphasizes mutual promotion between sources while suppressing potential noise or conflicts during RLVR. From theoretical analysis, our method effectively quantifies information gain introduced by multi-source integration in gradient estimation, enabling consistent modality regulation. Empirical results also show impressive 3.2% and 4.9% performance gains on GRPO and DAPO across diverse datasets, confirming effectiveness of our method.', 'score': 9, 'issue_id': 2321, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'be9eb261693991cc', 'authors': ['Fanhu Zeng', 'Zhicong Luo', 'Zefan Wang', 'You Li', 'Chi Chen', 'Maosong Sun'], 'affiliations': ['Beijing Jiaotong University', 'Northwest Polytechnical University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.25437.jpg', 'data': {'categories': ['#rl', '#cv', '#rlhf', '#multimodal'], 'emoji': '🔗', 'ru': {'title': 'Динамическая регуляция мультимодальности через информационный выигрыш в обучении с подкреплением', 'desc': 'Статья представляет MARS — новую структуру для многомодального визуального рассуждения, которая использует динамические якори в виде вознаграждений одного модального источника для количественной оценки выигрыша информации. Метод явно моделирует взаимодействие между различными источниками данных (например, инфракрасное и глубинное видение), избегая их простого накопления и подавляя потенциальные конфликты и шумы. Авторы модифицируют нормализацию преимущества в обучении с подкреплением, чтобы адаптивно регулировать вклад каждой модальности в зависимости от информационного прироста. Экспериментальные результаты демонстрируют значительное улучшение производительности на 3,2% и 4,9% на различных датасетах, подтверждая эффективность предложенного подхода.'}, 'en': {'title': 'Enhancing Multi-Source Reasoning with Dynamic Anchors in RL', 'desc': 'This paper introduces MARS, a new framework for multi-source reasoning in reinforcement learning that uses dynamic anchors to enhance information processing. It addresses the challenge of integrating multiple data sources, such as infrared and depth images, by quantifying information gain and managing interactions between different modalities. The framework treats each visual modality as an independent source, allowing for better regulation of information flow and reducing interference. Empirical results demonstrate significant performance improvements, showcasing the effectiveness of this approach in visual reasoning tasks.'}, 'zh': {'title': '动态锚点驱动的多源推理新框架', 'desc': '本文提出了一种新颖的单锚多源推理框架MARS，旨在通过动态锚点量化信息增益，并在强化学习中调节不同模态的交互。现有方法在处理多源输入时，往往将其视为信息的简单累积，缺乏有效区分信息增益和干扰的机制。MARS将每种视觉模态视为独立的信息源，通过将单源奖励视为动态锚点，显式地将多源融合带来的信息增益纳入优势归一化中。实验结果表明，该方法在多个数据集上实现了显著的性能提升，验证了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.25802', 'title': 'Rethinking VLM Representation for VLA Initialization', 'url': 'https://huggingface.co/papers/2605.25802', 'abstract': 'Abstract Effective vision-language-action model initialization requires balancing pretrained vision-language model representations with embodied task-specific adaptations and robot-data pretraining while preserving core action-relevant features.  AI-generated summary Vision-Language-Action (VLA) models widely adopt pretrained Vision-Language Models (VLMs) as policy backbones, yet it remains unclear what kind of pretrained VLM representation is useful as a VLA initialization. In this paper, we study VLA initialization as a controlled representation-design problem along three axes: capability-level embodied VQA supervision, parameter-update strategy, and robot-data pretraining. Our experiments show that the original pretrained VLM representation is a key source of action performance. However, embodied VQA adaptation does not yield uniform gains: its benefit depends on downstream bottlenecks, and gains from different capability domains are not simply additive. For update strategy, LoRA provides a more reliable initialization than Full Finetune, indicating that overly reshaping the pretrained representation can weaken VLA initialization. Robot-data pretraining further improves VLA initialization, with the strongest variant obtained by staged LoRA-based training. Together, these findings suggest that effective VLM-to-VLA adaptation should inject action-relevant embodied and robot-trajectory signals while preserving the pretrained VLM representation that remains useful for action learning.', 'score': 8, 'issue_id': 2323, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'f0b2b889f1167de0', 'authors': ['Weifeng Lin', 'Siyuan Huang', 'Hao Li', 'Tingwei Chen', 'Ruichuan An', 'Xinyu Wei', 'Jianbo Liu', 'Hongsheng Li'], 'affiliations': ['ACE Robotics', 'CUHK', 'Peking University', 'PolyU'], 'pdf_title_img': 'assets/pdf/title_img/2605.25802.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#cv', '#architecture', '#training'], 'emoji': '🤖', 'ru': {'title': 'Баланс между сохранением и адаптацией: инициализация VLA через чуткое приспособление предобученных моделей', 'desc': 'В статье исследуется инициализация Vision-Language-Action моделей, которые используют предобученные Vision-Language Models как основу для политик управления робототехникой. Авторы проводят контролируемый анализ представлений вдоль трёх осей: адаптация через embodied VQA, стратегии обновления параметров и предобучение на робототехнических данных. Ключевой вывод состоит в том, что оригинальное предобученное представление остаётся критически важным для качества действий, а LoRA обеспечивает более надёжную инициализацию, чем полная тонкая настройка, так как избыточное переформатирование может снизить эффективность адаптации. Оптимальный результат достигается через поэтапное обучение с LoRA в сочетании с предобучением на робототехнических данных, что позволяет сохранить полезные знания предобученной модели при добавлении сигналов, специфичных для действий.'}, 'en': {'title': 'Optimizing VLA Initialization: Balancing Pretraining and Adaptation', 'desc': 'This paper explores how to effectively initialize Vision-Language-Action (VLA) models using pretrained Vision-Language Models (VLMs). It identifies the importance of balancing the original VLM representations with task-specific adaptations and robot-data pretraining to enhance action performance. The study reveals that the benefits of embodied Visual Question Answering (VQA) adaptation vary based on specific challenges in downstream tasks, and that using a Low-Rank Adaptation (LoRA) strategy is more effective than full fine-tuning. Overall, the findings emphasize the need to maintain core features of the pretrained VLM while integrating relevant action signals for better VLA performance.'}, 'zh': {'title': '有效的视觉-语言-行动模型初始化', 'desc': '本文探讨了视觉-语言-行动（VLA）模型的初始化问题，强调了预训练的视觉-语言模型（VLM）在这一过程中的重要性。研究表明，原始的预训练VLM表示是提升行动性能的关键来源，但其适应性并不均匀，依赖于下游任务的瓶颈。通过对参数更新策略的比较，发现LoRA方法比完全微调更能有效初始化VLA模型。最后，机器人数据的预训练进一步提升了VLA的初始化效果，表明在适应过程中应保留有用的预训练VLM表示，同时注入与行动相关的信号。'}}}, {'id': 'https://huggingface.co/papers/2605.25188', 'title': 'DarkForest: Less Talk, Higher Accuracy for Multi-Agent LLMs', 'url': 'https://huggingface.co/papers/2605.25188', 'abstract': "Abstract DarkForest is a controlled-communication framework that enhances multi-agent LLM reasoning by clustering semantic candidates and using calibrated belief distributions to reduce error propagation and communication overhead.  AI-generated summary Multi-agent LLM systems improve reasoning by combining outputs from multiple agents, but interaction-heavy methods can introduce error propagation and high communication overhead. When agents exchange raw responses or reasoning traces, incorrect intermediate reasoning may be adopted and amplified, leading to confident but wrong consensus; multi-round communication also increases token consumption, latency, and inference cost. In this paper, we propose a controlled-communication coordination framework named DarkForest. DarkForest first keeps agents independent, so each agent produces an answer without seeing the others' outputs. It then parses the raw responses into structured candidate records, groups semantically equivalent candidates into clusters, and estimates a calibrated belief distribution over these clusters using agent reliability, confidence, parse quality, support-pattern reliability, and independence corrections. A coordinator receives only policy-permitted evidence from this belief state with controlled communication. Experiments on six reasoning benchmarks show that DarkForest achieves leading overall quality, improves the strongest baseline by up to 30.7\\% on benchmark metrics, and reduces token consumption by up to 6.5times compared with communication-heavy baselines.", 'score': 7, 'issue_id': 2323, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '340406aa1fc66a39', 'authors': ['Yi Li', 'Songtao Wei', 'Dongming Jiang', 'Zhichun Guo', 'Qiannan Li', 'Bingzhe Li'], 'affiliations': ['Independent Researcher', 'University of California, Davis', 'University of Texas at Dallas'], 'pdf_title_img': 'assets/pdf/title_img/2605.25188.jpg', 'data': {'categories': ['#benchmark', '#training', '#agents'], 'emoji': '🌲', 'ru': {'title': 'Контролируемое общение для безошибочного коллективного разума', 'desc': 'DarkForest — это фреймворк для координации многоагентных LLM систем, который улучшает коллективное рассуждение путём кластеризации семантически близких ответов. Система оценивает калиброванное распределение вероятностей над кластерами, учитывая надёжность агентов, уверенность моделей и качество извлечения информации. Управляемая коммуникация позволяет координатору получать только релевантные доказательства, избегая распространения ошибок при прямом обмене необработанными ответами. В экспериментах фреймворк достигает улучшения качества на 30,7% при одновременном снижении потребления токенов в 6,5 раза.'}, 'en': {'title': 'Enhancing Multi-Agent Reasoning with Controlled Communication', 'desc': "DarkForest is a framework designed to improve the reasoning capabilities of multi-agent large language models (LLMs) by minimizing communication errors and overhead. It allows agents to work independently, generating their own answers without influence from others, which helps prevent the amplification of incorrect reasoning. The framework organizes the agents' responses into structured clusters based on semantic similarity and uses calibrated belief distributions to assess the reliability of these clusters. Experimental results demonstrate that DarkForest significantly enhances reasoning quality and reduces token usage compared to traditional communication-heavy methods."}, 'zh': {'title': 'DarkForest：提升多智能体推理的控制通信框架', 'desc': 'DarkForest 是一个控制通信框架，旨在通过聚类语义候选项来增强多智能体大语言模型（LLM）的推理能力。该框架通过使用校准的信念分布来减少错误传播和通信开销，从而提高推理的准确性。与传统的交互密集型方法相比，DarkForest 使每个智能体独立工作，避免了错误推理的放大。实验结果表明，DarkForest 在六个推理基准测试中表现优异，整体质量领先，并显著减少了令牌消耗。'}}}, {'id': 'https://huggingface.co/papers/2605.26111', 'title': 'Squeezing Capacity from Multimodal Large Language Models for Subject-driven Generation', 'url': 'https://huggingface.co/papers/2605.26111', 'abstract': 'Abstract A novel approach conditions diffusion models on multimodal large language models for subject-driven image generation, combining text and reference image encoding with VAE-based identity conditioning to improve both semantic understanding and identity preservation.  AI-generated summary Subject-driven image generation aims to synthesize new images that preserve the identity of the given subject while following textual instructions. Existing approaches often encode text and reference images separately. This limits cross-modal reasoning abilities and causes copy-paste artifacts. Recent frameworks that connect multimodal models and diffusion models improve instruction following, but largely overlook identity preservation. To address these limitations, we condition diffusion models on Multimodal Large Language Models (MLLMs) that jointly encode text and reference images, and augment it with VAE-based identity conditioning. A novel Dual Layer Aggregation (DLA) module is designed to aggregate multi-level MLLM features for optimal conditioning, and a multi-stage denoising strategy is applied to progressively balance the semantic information from MLLM and fine-detail identity from VAE during inference. Extensive experiments demonstrate that our approach harmonizes multimodal understanding with identity preservation, mitigates copy-paste issues, and achieves superior performance regarding human preference on subject-driven image generation. Our project website is available at https://zsh2000.github.io/squeeze-mllm-subject-gen/.', 'score': 6, 'issue_id': 2321, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '43dfdb8f93367c65', 'authors': ['Shuhong Zheng', 'Aashish Kumar Misraa', 'Yu-Teng Li', 'Yu-Jhe Li', 'Igor Gilitschenski'], 'affiliations': ['Adobe', 'Google', 'University of Toronto & Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.26111.jpg', 'data': {'categories': ['#diffusion', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Гармония текста и идентичности: диффузионные модели с многомодальным пониманием', 'desc': 'В работе предложен новый подход для генерации изображений, управляемых объектом, путём кондиционирования диффузионных моделей на многомодальных больших языковых моделях (MLLM). Метод совместно кодирует текстовые инструкции и эталонные изображения, что улучшает кросс-модальное рассуждение и избегает артефактов копирования-вставки. Дополнительное кондиционирование на основе VAE сохраняет идентичность объекта, а специально разработанный модуль Dual Layer Aggregation эффективно агрегирует многоуровневые признаки MLLM. Многоэтапная стратегия денойзирования во время инференса гармонично балансирует семантическую информацию и детали идентичности, достигая превосходных результатов по предпочтениям людей.'}, 'en': {'title': 'Harmonizing Identity and Instruction in Image Generation', 'desc': 'This paper presents a new method for generating images based on specific subjects while maintaining their identity and following text instructions. It combines the strengths of diffusion models with multimodal large language models (MLLMs) to encode both text and reference images together, enhancing cross-modal reasoning. The approach introduces a Dual Layer Aggregation (DLA) module to optimize feature aggregation and employs a multi-stage denoising strategy to balance semantic understanding and identity details. Experiments show that this method effectively reduces copy-paste artifacts and improves overall image generation quality based on human preferences.'}, 'zh': {'title': '多模态大语言模型助力主题驱动图像生成', 'desc': '这篇论文提出了一种新方法，将扩散模型与多模态大语言模型结合，用于基于主题的图像生成。该方法通过联合编码文本和参考图像，并使用基于变分自编码器的身份条件，来提高语义理解和身份保留能力。与现有方法不同，这种方法解决了跨模态推理能力不足和复制粘贴伪影的问题。实验结果表明，该方法在保持身份的同时，增强了多模态理解，显著提升了人类偏好的图像生成效果。'}}}, {'id': 'https://huggingface.co/papers/2605.27295', 'title': 'Gemini Embedding 2: A Native Multimodal Embedding Model from Gemini', 'url': 'https://huggingface.co/papers/2605.27295', 'abstract': 'Abstract Gemini Embedding 2 is a multimodal embedding model that generates unified representations for video, audio, image, and text data, achieving superior performance across diverse retrieval tasks and demonstrating strong zero-shot capabilities across specialized domains.  AI-generated summary We introduce Gemini Embedding 2, a native multimodal embedding model that allows embedding video, audio, image, and text modalities in a unified representation space. We leverage the multimodal capabilities of Gemini to produce embeddings for arbitrary combinations of interleaved inputs across all these modalities that generalize well across a wide variety of tasks. Applying large-scale contrastive learning in a multi-task multi-stage training setup, we achieve state-of-the-art performance on key embedding benchmarks including unimodal, cross-modal, and multimodal retrieval spanning a diverse set of tasks. We show that our embedding model demonstrates strong performance (with a score of 62.9 R@1 on MSCOCO, 68.8 NDCG@10 on Vatex, 69.9 on MTEB multilingual and 84.0 on MTEB Code) across a variety of tasks surpassing the performance of specialized models. These unified capabilities make Gemini Embedding 2 a promising candidate for downstream use cases such as RAG, recommendation and search. Furthermore, its robust zero-shot performance across distinct fields - from astronomy and bioscience to fine arts and the culinary arts - establishes it as a highly reliable, out-of-the-box representation even for specialized domains.', 'score': 5, 'issue_id': 2323, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '7c0fd807a668a153', 'authors': ['Madhuri Shanbhogue', 'Zhe Li', 'Shanfeng Zhang', 'Gustavo Hernández Ábrego', 'Shih-Cheng Huang', 'Aashi Jain', 'Daniel Salz', 'Sonam Goenka', 'Chaitra Hegde', 'Ji Ma', 'Feiyang Chen', 'Jiaxing Wu', 'Tanmaya Dabral', 'Babak Samari', 'Kevin Poulet', 'Daniel Cer', 'Kaifeng Chen', 'Paul Suganathan', 'Hui Hui', 'Jovan Andonov', 'Philippe Schlattner', 'Jay Han', 'Iftekhar Naim', 'Wing Lowe', 'Vladimir Pchelin', 'Albert Yang', 'Yi-Ting Chen', 'Zhongli Ding', 'Grace Zhang', 'Georg Heigold', 'Yichang Chen', 'Antoine Reveillon', 'Brendan Mccloskey', 'Wenlei Zhou', 'Dahun Kim', 'Rui Meng', 'Emma Wang', 'Jack Zheng', 'Halley Fede', 'Zhen Yang', 'Keegan Mosley', 'Brian Potetz', 'Sahil Dua', 'Henrique Schechter Vera', 'Shen Gao', 'Hesen Zhang', 'Andreas Hess', 'Hengxuan Ying', 'Alberto Montes', 'Karan Gill', 'Min Choi', 'Sebastian Russo', 'Anja Hauth', 'Jinhyuk Lee', 'Michael Boratko', 'Megan Barnes', 'Vikram Rao', 'Claudiu Musat', 'Cyril Allauzen', 'Ehsan Variani', 'Shankar Kumar', 'Tom Bagby', 'Junyi Jiao', 'Yang Gu', 'Tengxin Li', 'Ayush Agrawal', 'Roberto Santana', 'Dev Nath', 'Stephen Karukas', 'Shuoxuan Han', 'Lucia Loher', 'Alice Twu', 'Nidhi Vyas', 'Siddharth Bhai', 'Frank Palma Gomez', 'Wangyuan Zhang', 'Chaoren Liu', 'Jizheng Yang', 'Steve Qiu', 'Shijie Zhang', 'Sujay Kulkarni', 'Sascha Rothe', 'Sean Nakamoto', 'Raphael Hoffmann', 'Zach Gleicher', 'Yunhsuan Sung', 'Qin Yin', 'Tom Duerig', 'Mojtaba Seyedhosseini'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2605.27295.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#rag', '#training'], 'emoji': '🎬', 'ru': {'title': 'Единое представление всех модальностей данных', 'desc': 'Gemini Embedding 2 — это мультимодальная модель, которая создаёт единые векторные представления для видео, аудио, изображений и текста в едином пространстве признаков. Модель обучена с использованием контрастивного обучения в многозадачной и многоэтапной схеме, достигая лучших результатов на различных бенчмарках поиска. Система демонстрирует высокую производительность как на унимодальных, так и кросс-модальных задачах поиска информации, превосходя специализированные модели. Благодаря надёжным нулевошотовым возможностям модель применима для RAG, рекомендательных систем и поиска, включая узкоспециализированные области знания.'}, 'en': {'title': 'Unified Multimodal Embeddings for Superior Retrieval Performance', 'desc': "Gemini Embedding 2 is a multimodal embedding model that creates a single representation for different types of data, including video, audio, images, and text. It uses advanced contrastive learning techniques in a multi-task training approach to achieve top performance on various retrieval tasks. The model excels in both unimodal and cross-modal scenarios, demonstrating strong zero-shot capabilities, meaning it can perform well on tasks it hasn't specifically trained for. This versatility makes it suitable for applications like recommendation systems and search engines, as well as specialized fields such as astronomy and bioscience."}, 'zh': {'title': '多模态统一嵌入的未来', 'desc': 'Gemini Embedding 2 是一种多模态嵌入模型，可以为视频、音频、图像和文本数据生成统一的表示。该模型通过大规模对比学习和多任务训练，实现在多种检索任务中的卓越性能。它在多个基准测试中表现出色，超越了专门模型的性能，尤其在零样本学习方面表现强劲。Gemini Embedding 2 的统一能力使其在推荐、搜索等下游应用中具有很大的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.27358', 'title': 'MobileMoE: Scaling On-Device Mixture of Experts', 'url': 'https://huggingface.co/papers/2605.27358', 'abstract': 'Abstract MobileMoE introduces efficient on-device Mixture-of-Experts language models with sub-billion parameters that achieve better performance and efficiency compared to dense baselines and existing MoE models.  AI-generated summary Mixture-of-Experts (MoE) has become the de facto architecture for hundred-billion-parameter language models, yet its advantages at sub-billion scales for on-device deployment remain largely unexplored. To close this gap, we present MobileMoE, a family of on-device MoE language models with sub-billion active parameters (0.3-0.9B active and 1.3-5.3B total) that establish a new Pareto frontier for on-device LLMs. We first formulate an on-device MoE scaling law that jointly optimizes MoE architecture under mobile memory and compute constraints, identifying an on-device sweet spot - moderate sparsity with fine-grained and shared experts - that is simultaneously memory and compute-optimal. Building on the derived architectures, we train MobileMoE with a four-stage recipe covering pre-training, mid-training, instruction fine-tuning, and quantization-aware training, all on open-source datasets. Across 14 benchmarks, MobileMoE matches or exceeds leading on-device dense LLMs with 2-4times fewer inference FLOPs, and matches or surpasses the state-of-the-art MoE OLMoE-1B-7B with up to 60% fewer parameters. To bridge the last mile to mobile deployment, we provide the first efficient MoE inference on commodity smartphones with comprehensive on-device profiling. At comparable INT4 weight memory, MobileMoE-S delivers 1.8-3.8times faster prefill and 2.2-3.4times faster decode than the dense baseline MobileLLM-Pro.', 'score': 5, 'issue_id': 2322, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '2d676b9b001579c0', 'authors': ['Yanbei Chen', 'Hanxian Huang', 'Ernie Chang', 'Jacob Szwejbka', 'Digant Desai', 'Zechun Liu', 'Vikas Chandra', 'Raghuraman Krishnamoorthi'], 'affiliations': ['Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.27358.jpg', 'data': {'categories': ['#architecture', '#small_models', '#training', '#inference'], 'emoji': '📱', 'ru': {'title': 'Разреженные эксперты для карманных языковых моделей', 'desc': 'MobileMoE представляет семейство эффективных языковых моделей с архитектурой Mixture-of-Experts для развёртывания на мобильных устройствах с числом активных параметров менее миллиарда. Авторы разработали закон масштабирования для MoE-моделей, учитывающий ограничения памяти и вычислительных ресурсов мобильных устройств, что позволило найти оптимальное соотношение разреженности и архитектуры эксперты. Модели обучаются по четырёхэтапному рецепту, включающему предварительное обучение, промежуточное обучение, инструкционную настройку и квантизацию, используя открытые датасеты. MobileMoE достигает производительности лучших плотных моделей при 2-4 раза меньших вычислительных затратах и превосходит существующие MoE-модели с существенно меньшим числом параметров.'}, 'en': {'title': 'Efficient Language Models for Mobile Devices with MobileMoE', 'desc': 'MobileMoE is a new approach to creating efficient language models that use a Mixture-of-Experts (MoE) architecture specifically designed for mobile devices. It features sub-billion active parameters while achieving superior performance compared to traditional dense models and existing MoE models. The paper introduces a scaling law that optimizes the MoE architecture for mobile constraints, finding an ideal balance between memory usage and computational efficiency. Through a comprehensive training process, MobileMoE demonstrates significant speed improvements and lower resource requirements, making it suitable for on-device applications.'}, 'zh': {'title': '高效的设备端混合专家模型', 'desc': 'MobileMoE是一种高效的设备端混合专家语言模型，具有不足十亿的参数，能够在性能和效率上超越传统的密集模型和现有的MoE模型。该模型通过优化MoE架构，结合移动设备的内存和计算限制，找到了一个理想的平衡点，实现了适度稀疏的共享专家配置。MobileMoE在多个基准测试中表现出色，能够以更少的推理计算量匹配或超越领先的设备端密集模型。此外，MobileMoE还首次实现了在普通智能手机上的高效MoE推理，显著提高了预填充和解码速度。'}}}, {'id': 'https://huggingface.co/papers/2605.24219', 'title': 'Beyond Final Answers: Auditing Trajectory-Level Hallucinations in Multi-Agent Industrial Workflows', 'url': 'https://huggingface.co/papers/2605.24219', 'abstract': 'Abstract Trajel presents a trajectory-level hallucination audit framework with a five-type taxonomy for multi-step LLM agent workflows, demonstrating that current detection methods miss nuanced failures and require trajectory-aware approaches for safe deployment.  AI-generated summary Large Language Models (LLMs) are increasingly deployed as autonomous agents that reason, use tools, and act over multiple steps. Yet most hallucination benchmarks still evaluate only the final output, missing failures that originate in intermediate Thought-Action-Observation steps. We present Trajel, a dataset and evaluation framework for auditing trajectory-level hallucinations in multi-agent industrial workflows. Trajel introduces a five-type hallucination taxonomy (factual, referential, logical, procedural, and scope-based) over expert-annotated agent traces from AssetOpsBench. We benchmark supervised detection models at the subtask, trajectory, and long-context levels. Our results show that the most common failure modes are missed by existing benchmarks, that nearly half of hallucinated trajectories involve multiple types at once, and that automated detectors with high binary accuracy still misclassify the subtlest types. Trajectory-aware detection significantly outperforms standard post-hoc verification, making taxonomy-grounded evaluation necessary for safer agentic deployment.', 'score': 5, 'issue_id': 2322, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '81bf9f110dc7fe48', 'authors': ['Harshada Badave', 'Santosh Borse', 'Andrea Gomez', 'Harshitha Narahari', 'Sara Carter', 'Vishwa Bhatt', 'Aishani Rachakonda', 'Shuxin Lin', 'Dhaval Patel'], 'affiliations': ['Columbia University', 'IBM'], 'pdf_title_img': 'assets/pdf/title_img/2605.24219.jpg', 'data': {'categories': ['#benchmark', '#hallucinations', '#dataset', '#agents', '#long_context', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Траекторное аудирование галлюцинаций в многошаговых агентах на LLM', 'desc': 'В статье представлена система аудита Trajel для обнаружения галлюцинаций на уровне полных траекторий при работе многошаговых агентов на базе больших языковых моделей. Авторы предложили таксономию из пяти типов галлюцинаций (фактические, референциальные, логические, процедурные и связанные с областью применения) и создали датасет с экспертной разметкой промежуточных шагов рассуждения агентов. Исследование показало, что существующие методы проверки галлюцинаций пропускают большинство ошибок, поскольку анализируют только финальный результат, а не промежуточные шаги агента. Траекторные подходы к обнаружению галлюцинаций значительно превосходят стандартные методы постфактум-верификации и необходимы для безопасного развёртывания автономных агентов.'}, 'en': {'title': 'Enhancing Safety in LLMs with Trajectory-Level Audits', 'desc': 'This paper introduces Trajel, a framework designed to audit hallucinations in multi-step workflows of Large Language Models (LLMs). It highlights that traditional detection methods often overlook subtle failures that occur during intermediate steps of reasoning and action. Trajel categorizes these hallucinations into five types: factual, referential, logical, procedural, and scope-based, based on expert-annotated data. The findings reveal that existing benchmarks fail to capture many common failure modes, emphasizing the need for trajectory-aware detection to enhance the safety of LLM deployments.'}, 'zh': {'title': '轨迹级幻觉审计：确保安全的智能代理部署', 'desc': '本文提出了一种名为Trajel的轨迹级幻觉审计框架，针对多步骤大型语言模型（LLM）代理工作流建立了五种类型的分类法。当前的检测方法往往忽视了中间步骤中的细微失败，因此需要轨迹感知的方法来确保安全部署。Trajel提供了一个数据集和评估框架，用于审计多代理工业工作流中的轨迹级幻觉。研究表明，现有基准测试未能捕捉到最常见的失败模式，且几乎一半的幻觉轨迹涉及多种类型的错误，因此基于分类法的评估对于安全的代理部署至关重要。'}}}, {'id': 'https://huggingface.co/papers/2605.27209', 'title': 'Learning to Act under Noise: Enhancing Agent Robustness via Noisy Environments', 'url': 'https://huggingface.co/papers/2605.27209', 'abstract': 'Abstract NoisyAgent is an agentic training framework that incorporates environmental imperfections into agent learning to improve robustness in real-world stochastic settings.  AI-generated summary Recent advances in large language models (LLMs) have facilitated the widespread deployment of LLMs as interactive agents capable of reasoning, planning, and tool use. Despite strong performance on existing benchmarks, such agents often exhibit notable degradation when deployed in real-world settings, where environments are inherently stochastic and imperfect. We argue that this discrepancy arises from a fundamental mismatch between idealized training settings and real-world interaction dynamics, where current paradigms rely on carefully curated task instructions and stable, well-controlled environments. To address this gap, we propose NoisyAgent, an agentic training framework that explicitly incorporates environmental imperfections into the agent learning process. We identify two major sources of interaction noise in real-world scenarios: user noise, which captures ambiguity and variability in user interaction, and tool noise, which reflects failures and anomalies in tool execution. We introduce such perturbations into the training pipeline by modifying user interaction patterns and simulating tool execution results within the training environment. To stabilize training while encouraging agents to handle increasingly challenging imperfections, noise is applied to only a subset of rollouts and progressively increased in difficulty as the model adapts to the current noise level. Extensive experiments demonstrate that our approach consistently improves agent robustness under noisy and dynamic environments. Our analysis reveals that training under noise conditions also yields performance gains on idealized benchmarks, suggesting that controlled exposure to environmental noise promotes more generalizable reasoning and decision-making behaviors. Our findings highlight the importance of modeling interaction imperfections for bridging the gap between agent training and real-world deployment.', 'score': 4, 'issue_id': 2323, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'ffaf834ef4144799', 'authors': ['Yuxin Chen', 'Xiaodong Cai', 'Junfeng Fang', 'Zhuowen Han', 'Yu Wang', 'Yaorui Shi', 'Yi Zhang', 'Qi Gu', 'Xunliang Cai', 'Xiang Wang', 'An Zhang', 'Tat-Seng Chua'], 'affiliations': ['Meituan', 'National University of Singapore', 'Tianjin University', 'Tsinghua University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.27209.jpg', 'data': {'categories': ['#benchmark', '#training', '#agents'], 'emoji': '🎲', 'ru': {'title': 'Шум как инструмент укрепления агентов для реального мира', 'desc': 'NoisyAgent — это фреймворк обучения агентов, который добавляет шум окружения в процесс обучения, чтобы повысить их робастность в реальных стохастических условиях. Авторы выявили два основных источника шума: пользовательский шум, отражающий неоднозначность взаимодействия, и шум инструментов, моделирующий сбои при выполнении операций. Предложенный подход постепенно увеличивает сложность возмущений во время обучения, применяя их только к части траекторий, что стабилизирует процесс обучения. Эксперименты показывают, что обучение с шумом улучшает как устойчивость агентов в динамичных средах, так и производительность на стандартных бенчмарках.'}, 'en': {'title': 'Bridging the Gap: Training Agents for Real-World Imperfections', 'desc': 'NoisyAgent is a training framework designed to enhance the robustness of AI agents in unpredictable real-world environments. It addresses the gap between ideal training conditions and the chaotic nature of real-world interactions by incorporating environmental imperfections into the learning process. The framework introduces two types of noise: user noise, which accounts for variability in user interactions, and tool noise, which reflects errors in tool performance. By progressively increasing the complexity of these noise factors during training, NoisyAgent helps agents develop better reasoning and decision-making skills, leading to improved performance even in controlled benchmark tests.'}, 'zh': {'title': '应对环境不完美，提升智能体鲁棒性', 'desc': 'NoisyAgent 是一种训练框架，旨在将环境中的不完美因素纳入智能体学习中，以提高其在现实世界随机环境中的鲁棒性。该框架识别了用户噪声和工具噪声两种主要的交互噪声来源，并通过修改用户交互模式和模拟工具执行结果来引入这些扰动。通过在训练过程中逐步增加噪声的难度，NoisyAgent 能够稳定训练并鼓励智能体应对越来越复杂的环境不完美。实验结果表明，该方法在嘈杂和动态环境中显著提高了智能体的鲁棒性，并且在理想化基准测试中也表现出性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.23215', 'title': 'FastKernels: Benchmarking GPU Kernel Generation in Production', 'url': 'https://huggingface.co/papers/2605.23215', 'abstract': "Abstract FastKernels addresses the gap between benchmark evaluation and production performance for LLM kernel agents by providing a representative set of architectures and a production-grade inference framework that aligns evaluation with real-world deployment.  AI-generated summary LLM-based agents for GPU kernel generation are advancing rapidly, yet their progress is fundamentally constrained by the benchmarks they optimize against. Existing benchmarks are poorly aligned with production inference frameworks: they evaluate kernels on a single GPU with synthetic inputs, ignore the surrounding compilation stack, and reward replicating known optimizations rather than discovering new ones. The resulting reward signals are misleading: agents learn to generate kernels that score well in sandboxes but introduce interface incompatibilities, compilation-stack conflicts, and silent correctness degradation when integrated into real systems. We introduce FastKernels, a kernel benchmark built around a minimal set of 46 representative architectures spanning 8 categories, whose kernels collectively subsume those of 96.2% (409/425) of HuggingFace Transformers architectures. FastKernels doubles as a minimalistic, production-grade inference framework that runs at parity with hardened systems such as vLLM and SGLang on mainstream LLM serving and substantially exceeds upstream references on under-served architectures; each task's interface mirrors the corresponding module in the state-of-the-art library for its architecture family, enabling direct deployment of optimized kernels into production codebases. Evaluating state-of-the-art kernel agents on FastKernels, we find that even the strongest agent achieves only 0.94times aggregate speedup over production baselines, with weaker agents at 0.78times and 0.53times -- confirming that benchmark-production misalignment is a critical bottleneck for the field. We release FastKernels as a stepping stone toward kernel agents whose benchmark gains translate directly into production throughput improvements. Code is available at https://github.com/Snowflake-AI-Research/fastkernels", 'score': 4, 'issue_id': 2325, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '130c4432714668e9', 'authors': ['Gabriele Oliaro', 'Yichao Fu', 'May Jiang', 'Owen Lu', 'Junli Wang', 'Zhihao Jia', 'Hao Zhang', 'Samyam Rajbhandari'], 'affiliations': ['CMU', 'Independent Researcher', 'Snowflake AI Research', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2605.23215.jpg', 'data': {'categories': ['#inference', '#agents', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'От песочницы к производству: выравнивание оценки ядер LLM с реальным миром', 'desc': 'В статье представляется FastKernels — набор данных для оценки и инфраструктура вывода, которые решают проблему несоответствия между бенчмарками и производительностью в реальных системах для агентов, генерирующих GPU-ядра на основе больших языковых моделей. Авторы показывают, что существующие бенчмарки плохо согласованы с production-фреймворками, так как игнорируют стек компиляции и окружающую инфраструктуру. FastKernels содержит 46 репрезентативных архитектур, охватывающих 96.2% всех архитектур HuggingFace Transformers, и работает на уровне передовых систем вывода вроде vLLM. Экспериментальная оценка показала критическое расхождение между результатами на бенчмарке и реальной производительностью, что подтверждает необходимость переалignment оценочных метрик для разработки более эффективных агентов.'}, 'en': {'title': 'Bridging the Gap: FastKernels for Real-World LLM Performance', 'desc': 'FastKernels is a new benchmark and inference framework designed to improve the performance of large language model (LLM) kernel agents in real-world applications. It addresses the mismatch between existing benchmarks, which often use synthetic inputs and single GPU evaluations, and the complexities of actual production environments. By providing a set of 46 representative architectures, FastKernels allows for better alignment of evaluation with deployment needs, helping agents to generate more effective kernels. The findings indicate that current agents struggle to achieve significant speedups in production, highlighting the importance of aligning benchmarks with real-world performance.'}, 'zh': {'title': 'FastKernels：连接基准与生产的桥梁', 'desc': 'FastKernels 是一个新的基准测试框架，旨在缩小大型语言模型（LLM）内核代理的基准评估与实际生产性能之间的差距。它提供了一组代表性的架构和一个生产级推理框架，使评估与真实部署相一致。现有的基准测试往往只在单个 GPU 上使用合成输入进行评估，忽略了编译栈的影响，导致生成的内核在实际系统中可能出现不兼容和性能下降的问题。通过使用 FastKernels，研究人员可以更好地评估内核代理的性能，并推动其在生产环境中的应用。'}}}, {'id': 'https://huggingface.co/papers/2605.26632', 'title': 'RT-Lynx: Putting the GEMM Sparsity In a Right Way for Diffusion Models', 'url': 'https://huggingface.co/papers/2605.26632', 'abstract': 'Abstract Diffusion Transformers achieve strong image generation performance but face high inference costs; this work proposes RT-Lynx, which uses activation sparsification and optimized CUDA kernels to accelerate inference while maintaining generation quality.  AI-generated summary Diffusion Transformers (DiT) achieve strong performance in image generation but incur substantial inference costs. While prior work has reduced this cost via quantization and distillation, semi-structured sparsity, which can nearly halve FLOPs, remains underexplored. A key reason is that most existing approaches focus on weight sparsification, and pruning 50% of the weights can remove critical model capacity and degrade generation quality. Our study, however, shows that DiT activations are intrinsically sparse and significantly more robust to N:M semi-structured sparsification than weights. Motivated by this observation, we advocate a paradigm shift from weight sparsification to activation sparsification. We propose RT-Lynx, which applies N:M sparsification to activations and incorporates error-compensation techniques to mitigate accuracy loss. We further implement highly optimized CUDA kernels tailored to this setting, achieving up to a 1.55x speedup on average in linear layers. Extensive experiments across multiple diffusion models demonstrate that our method preserves the generation quality of the original models while substantially accelerating inference.', 'score': 3, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '0342a77341cfb16d', 'authors': ['Xing Cong', 'Hanlin Tang', 'Kan Liu', 'Lan Tao', 'Lin Qu', 'Chenhao Xie'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.26632.jpg', 'data': {'categories': ['#optimization', '#architecture', '#inference', '#diffusion', '#cv'], 'emoji': '⚡', 'ru': {'title': 'От разреживания весов к разреживанию активаций: быстрые диффузионные трансформеры', 'desc': 'В работе предлагается RT-Lynx — метод ускорения инференса диффузионных трансформеров через разреживание активаций вместо весов модели. Авторы показывают, что активации диффузионных моделей по своей природе содержат много нулевых значений и гораздо устойчивее к N:M полуструктурированному разреживанию, чем веса. Метод включает технику компенсации ошибок для сохранения качества генерации при разреживании активаций, а также оптимизированные CUDA ядра для эффективного вычисления на GPU. Экспериментальные результаты показывают ускорение инференса до 1.55x без заметного снижения качества генерируемых изображений.'}, 'en': {'title': 'Accelerating Image Generation with Activation Sparsification', 'desc': 'This paper introduces RT-Lynx, a method designed to enhance the efficiency of Diffusion Transformers in image generation by focusing on activation sparsification instead of traditional weight sparsification. The authors highlight that activations in these models are naturally sparse and can withstand semi-structured sparsification without significantly degrading performance. By implementing optimized CUDA kernels, RT-Lynx achieves a notable speedup in inference times while maintaining the quality of generated images. The results show that this approach can nearly halve the computational load, making it a promising solution for faster image generation in machine learning applications.'}, 'zh': {'title': '加速推理，保持生成质量的RT-Lynx', 'desc': '本研究提出了一种名为RT-Lynx的方法，旨在加速扩散变换器（Diffusion Transformers）的推理过程，同时保持生成质量。通过对激活进行稀疏化和优化CUDA内核，RT-Lynx能够显著降低推理成本。与传统的权重稀疏化方法不同，我们发现激活本身具有内在的稀疏性，并且对N:M半结构稀疏化更具鲁棒性。实验结果表明，RT-Lynx在多个扩散模型上实现了推理速度的提升，同时保持了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2605.18879', 'title': 'ZeroUnlearn: Few-Shot Knowledge Unlearning in Large Language Models', 'url': 'https://huggingface.co/papers/2605.18879', 'abstract': 'Abstract ZeroUnlearn addresses privacy concerns in large language models by reformulating machine unlearning as precise knowledge re-mapping through model editing, enabling efficient and targeted removal of sensitive information while preserving general model utility.  AI-generated summary Large language models inevitably retain sensitive information, defined as inputs that may induce harmful generations, due to training on massive web corpora, raising concerns for privacy and safety. Existing machine unlearning methods primarily rely on retraining or aggressive fine-tuning, which are either computationally expensive or prone to degrading related knowledge and overall model utility. In this work, we reformulate machine unlearning as a precise knowledge re-mapping problem via model editing. We propose ZeroUnlearn, a few-shot unlearning framework. It overwrites sensitive inputs by mapping them to a neutral target state and removing their original representations. ZeroUnlearn enforces representational orthogonality through a multiplicative parameter update with a closed-form solution, enabling efficient and targeted unlearning. We further extend ZeroUnlearn to a gradient-based variant for multi-sample unlearning. Experiments demonstrate that our approach outperforms existing baselines while preserving general model utility. Our code is available at the github: https://github.com/XMUDeepLIT/ZeroUnlearn.', 'score': 3, 'issue_id': 2323, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '45dc8d3531aaaa21', 'authors': ['Yujie Lin', 'Chengyi Yang', 'Zhishang Xiang', 'Yiping Song', 'Jinsong Su'], 'affiliations': ['Institute of Artificial Intelligence, Xiamen University, China', 'Key Laboratory of Digital Protection and Intelligent Processing of Intangible Cultural Heritage of Fujian and Taiwan (Xiamen University), Ministry of Culture and Tourism, China', 'National University of Defense Technology, China', 'School of Film, Xiamen University, China', 'School of Informatics, Xiamen University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.18879.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Забывание без жертв: переображение знаний вместо переобучения', 'desc': 'ZeroUnlearn предлагает новый подход к машинному забыванию в больших языковых моделях, переформулируя задачу как проблему переображения знаний через редактирование модели. Метод использует немного примеров для эффективного удаления чувствительной информации путём переопределения её на нейтральное состояние и ортогонализации представлений. Авторы применяют мультипликативные обновления параметров с замкнутым решением, что обеспечивает целевое забывание без дорогостоящего переобучения. Экспериментальные результаты показывают, что подход превосходит существующие методы, сохраняя общую полезность модели.'}, 'en': {'title': 'Efficiently Unlearn Sensitive Information in AI Models', 'desc': 'ZeroUnlearn is a novel framework designed to address privacy issues in large language models by enabling efficient removal of sensitive information. It reformulates the concept of machine unlearning into a knowledge re-mapping problem, allowing for targeted edits without the need for extensive retraining. The method employs a few-shot learning approach to overwrite sensitive data, ensuring that the model retains its overall utility while eliminating harmful outputs. Experiments show that ZeroUnlearn outperforms traditional unlearning methods, making it a promising solution for maintaining privacy in AI systems.'}, 'zh': {'title': '高效隐私保护的机器遗忘新方法', 'desc': 'ZeroUnlearn 通过模型编辑将机器遗忘重新定义为精确的知识重映射，从而解决大型语言模型中的隐私问题。该方法能够高效、针对性地删除敏感信息，同时保持模型的整体效用。与现有的机器遗忘方法相比，ZeroUnlearn 采用少量样本的遗忘框架，通过将敏感输入映射到中性目标状态来覆盖其原始表示。实验结果表明，该方法在保留模型效用的同时，优于现有的基准方法。'}}}, {'id': 'https://huggingface.co/papers/2605.27235', 'title': 'MRT: Masked Region Transformer for Layered Image Generation and Editing at Scale', 'url': 'https://huggingface.co/papers/2605.27235', 'abstract': 'Abstract A 20B-parameter masked region diffusion model enables scalable multi-layer transparent image generation and editing through unified task handling and efficient canvas management.  AI-generated summary Layered image generation and editing is a fundamental capability that enables layer-wise reuse, editing, and composition of generated visual content, analogous to word-level editing in natural language. Despite its importance, this remains an underexplored area at scale. To address this gap, we present MRT, a 20B-parameter masked region diffusion model tailored for multi-layer transparent image generation and editing, trained on over 10M multilingual design samples spanning diverse aspect ratios and textual prompts. To fully leverage this scale, we make two key technical contributions. First, we unify three complementary tasks including text-to-layers, image-to-layers, and layers-to-layers within a shared masked region diffusion framework, where selective token masking enables flexible layer-wise generation and editing. Second, to enable overflow layer generation, we introduce an overflow-aware canvas layer that handles boundary inconsistencies and supports semi-transparent background synthesis, enabling complete editable layers extending beyond visible canvas boundaries. Additionally, we apply diffusion distillation to achieve 8-step, real-time multi-layer generation with minimal quality degradation. Extensive experiments demonstrate that our framework substantially outperforms prior state-of-the-art approaches, including various commercial systems, across all three tasks, establishing a new benchmark for multi-layer transparent image generation. Notably, our model significantly outperforms the concurrent Qwen-Image-Layered model in image-to-layers quality according to user-study results, while achieving 10-100\\times faster inference and reducing activation GPU memory consumption by 50-90\\% during image-to-layer inference.', 'score': 2, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '6e00dfd9435d0c04', 'authors': ['Zhicong Tang', 'Zhao Zhang', 'Jingye Chen', 'Mohan Zhou', 'Yifan Pu', 'Yuchi Liu', 'Yalong Bai', 'Ethan Smith', 'Yuhui Yuan'], 'affiliations': ['Canva Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.27235.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#inference', '#cv', '#multimodal', '#training'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для масштабируемого многослойного редактирования прозрачных изображений', 'desc': 'MRT — это диффузионная модель с 20 миллиардами параметров, предназначенная для генерации и редактирования многослойных прозрачных изображений. Модель объединяет три задачи (текст-в-слои, изображение-в-слои, слои-в-слои) в единую архитектуру на основе маскированной диффузии с селективным маскированием токенов для гибкого редактирования. Авторы введли слой холста, осведомленный о переполнении, который корректно обрабатывает граничные артефакты и полупрозрачные фоны, позволяя создавать редактируемые слои за границами видимого холста. С помощью дистилляции диффузии модель достигает генерации в реальном времени за 8 шагов, превосходя аналогичные системы в качестве и скорости вычислений.'}, 'en': {'title': 'Revolutionizing Multi-Layer Image Generation with MRT', 'desc': 'This paper introduces MRT, a 20B-parameter masked region diffusion model designed for scalable multi-layer transparent image generation and editing. It unifies three tasks—text-to-layers, image-to-layers, and layers-to-layers—using a shared framework that allows for flexible layer-wise manipulation through selective token masking. The model also features an overflow-aware canvas layer to manage boundary issues and support semi-transparent backgrounds, enhancing the editing capabilities. Extensive experiments show that MRT significantly outperforms existing methods in speed and quality, setting a new standard for multi-layer image generation.'}, 'zh': {'title': '多层透明图像生成的新标杆', 'desc': '本文介绍了一种名为MRT的20B参数的掩蔽区域扩散模型，专注于多层透明图像的生成和编辑。该模型通过统一处理文本到层、图像到层和层到层的任务，实现了灵活的层级生成和编辑。为了处理边界不一致性，模型引入了溢出感知画布层，支持半透明背景合成。实验结果表明，MRT在多层透明图像生成方面显著优于现有的最先进方法，设立了新的基准。'}}}, {'id': 'https://huggingface.co/papers/2605.24468', 'title': 'SAM: State-Adaptive Memory for Long-Horizon Reasoning Agent', 'url': 'https://huggingface.co/papers/2605.24468', 'abstract': "Abstract Long-horizon agentic reasoning is enhanced through a state-adaptive memory framework that dynamically manages interaction histories by creating compact memory cues while preserving detailed trajectories for targeted retrieval.  AI-generated summary Long-horizon agentic reasoning requires large language models to act over long interaction histories containing thoughts, tool calls, observations, and partial conclusions. The challenge is not merely that these histories grow long, but that information needed for the current decision may be scattered across distant steps and only become relevant later. Existing approaches address this difficulty by truncating the interaction history, compressing it into shorter surrogates, or retrieving selected parts of it for reuse, but they do not explicitly model how access to past interaction should adapt to the agent's evolving state. We instead cast long-horizon reasoning as a problem of state-adaptive memory. To this end, we propose State-Adaptive Memory~(SAM), a standalone framework that consolidates ongoing interaction into compact memory cues while preserving raw trajectory pages for intent-driven recall. These cues are not treated as replacements for history; rather, they serve as lightweight handles that allow the agent to reconstruct temporally distant information according to its current needs, without retraining the underlying backbone. We further optimize the memory module through expert-guided supervision and reinforcement learning, aligning it with trajectory-level utility. Across BrowseComp, BrowseComp-ZH, WideSearch, and HLE, SAM consistently outperforms strong baselines over diverse agent backbones. Our results suggest that explicit memory modeling provides a simple and effective foundation for long-horizon agentic reasoning.", 'score': 2, 'issue_id': 2322, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': '73c6dd74780fbcec', 'authors': ['Yuyang Hu', 'Hongjin Qian', 'Shuting Wang', 'Jiongnan Liu', 'Ziliang Zhao', 'Jiejun Tan', 'Zheng Liu', 'Zhicheng Dou'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'GSAI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.24468.jpg', 'data': {'categories': ['#long_context', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Адаптивная память для долгосрочного рассуждения AI-агентов', 'desc': 'В статье предложена структура State-Adaptive Memory (SAM) для улучшения долгосрочного рассуждения агентов на основе LLM. Система динамически управляет историями взаимодействий, создавая компактные память-подсказки, которые служат лёгкими ссылками на детальные траектории без замены полной истории. Память оптимизируется через обучение с экспертной разметкой и подкрепляющее обучение, сопоставляясь с полезностью на уровне траекторий. Метод показывает стабильное превосходство над сильными базовыми моделями на различных бенчмарках и архитектурах агентов.'}, 'en': {'title': 'Enhancing Long-Horizon Reasoning with State-Adaptive Memory', 'desc': "This paper introduces a new framework called State-Adaptive Memory (SAM) to improve long-horizon reasoning in AI agents. SAM dynamically manages interaction histories by creating compact memory cues that help the agent recall relevant information without losing detailed past trajectories. Unlike previous methods that truncate or compress histories, SAM adapts memory access based on the agent's current state, allowing for more effective decision-making. The framework has been tested across various tasks and consistently outperforms existing approaches, highlighting the importance of explicit memory modeling in enhancing agentic reasoning capabilities."}, 'zh': {'title': '状态自适应记忆：提升长时间自主推理的关键', 'desc': '长时间的自主推理需要一个状态自适应的记忆框架来动态管理交互历史。这个框架通过创建紧凑的记忆提示来增强推理能力，同时保留详细的轨迹以便于目标检索。现有的方法通常通过截断历史或压缩信息来处理长历史的问题，但没有明确建模如何根据代理的状态变化来访问过去的交互。我们提出的状态自适应记忆（SAM）框架能够有效整合交互信息，提供轻量级的记忆提示，帮助代理根据当前需求重建远程信息。'}}}, {'id': 'https://huggingface.co/papers/2605.22608', 'title': 'Agentic CLEAR: Automating Multi-Level Evaluation of LLM Agents', 'url': 'https://huggingface.co/papers/2605.22608', 'abstract': 'Abstract Agentic CLEAR is an automatic evaluation framework that provides multi-level textual insights into agent behavior through dynamic analysis of LLM interactions across various benchmarks and settings.  AI-generated summary Agentic systems are becoming more capable: agents define strategies, take actions, and interact with different environments. This autonomy poses serious challenges for overseeing and assessing agent behavior. Most current tools are limited, focusing on observability with basic evaluation capabilities or imposing static, hand-crafted error taxonomies that cannot adapt to new domains. To address this gap, we present Agentic CLEAR, an automatic, dynamic, and easy-to-use evaluation framework. It produces textual insights into the agent behavior on three levels of granularity: system, trace, and node. Agentic CLEAR operates above the observability layer, enabling seamless integration and featuring an intuitive UI that makes agent evaluation highly accessible. In our experiments on four benchmarks, seven agentic settings, and tens of thousands of LLM calls, we show that Agentic CLEAR produces high-quality, data-driven, insightful feedback. Our analysis shows strong alignment with human-annotated errors and the ability to predict task success rate.', 'score': 2, 'issue_id': 2323, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '3cea6e6c4cb98f0d', 'authors': ['Asaf Yehudai', 'Lilach Eden', 'Michal Shmueli-Scheuer'], 'affiliations': ['IBM Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.22608.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Автоматическая многоуровневая диагностика поведения ИИ-агентов', 'desc': 'В статье представляется Agentic CLEAR — автоматическая структура оценки для анализа поведения агентов на основе LLM. Фреймворк предоставляет многоуровневый текстовый анализ взаимодействий на трёх уровнях детализации: системном, трассировочном и узловом. Система преодолевает ограничения существующих инструментов благодаря динамическому подходу и отказу от статических таксономий ошибок. Экспериментальная валидация на четырёх бенчмарках и десятках тысяч вызовов LLM подтверждает высокое качество обратной связи и способность предсказывать успешность задач.'}, 'en': {'title': 'Revolutionizing Agent Evaluation with Dynamic Insights', 'desc': 'Agentic CLEAR is a novel evaluation framework designed to analyze the behavior of autonomous agents using large language models (LLMs). It provides insights at three levels: system, trace, and node, allowing for a comprehensive understanding of agent interactions. Unlike traditional tools that rely on static error classifications, Agentic CLEAR adapts dynamically to various environments and benchmarks. The framework has been tested extensively, demonstrating its effectiveness in generating high-quality feedback that aligns well with human assessments and predicts task success rates.'}, 'zh': {'title': '智能代理评估新工具：Agentic CLEAR', 'desc': 'Agentic CLEAR 是一个自动评估框架，通过对大型语言模型（LLM）交互的动态分析，提供多层次的文本洞察，帮助理解代理行为。该框架解决了当前工具在观察性和评估能力上的局限，能够适应新领域的变化。Agentic CLEAR 生成系统、轨迹和节点三个层次的细致反馈，具有直观的用户界面，使代理评估变得更加便捷。实验结果表明，Agentic CLEAR 能够提供高质量的数据驱动反馈，并与人工标注的错误高度一致，能够有效预测任务成功率。'}}}, {'id': 'https://huggingface.co/papers/2605.22769', 'title': 'Understanding Data Temporality Impact on Large Language Models Pre-training', 'url': 'https://huggingface.co/papers/2605.22769', 'abstract': 'Abstract Pre-training large language models on temporally ordered data improves their factual freshness and temporal precision compared to standard shuffled pre-training while maintaining general language understanding capabilities.  AI-generated summary Large language models (LLMs) are typically trained on shuffled corpora, yielding models whose knowledge is frozen at train time and whose temporal grounding remains poorly understood. In this work, we study the impact of pre-training dynamics on the acquisition of time-sensitive factual knowledge, focusing specifically on data ordering. Our main contributions are twofold. First, we introduce a comprehensive benchmark of over 7,000 temporally grounded questions and an evaluation protocol that enables analysis of whether models correctly associate facts with their corresponding time periods. Second, we pretrain 6B-parameter models on temporally ordered Common Crawl snapshots and compare them against standard shuffled pre-training. Our results show that sequentially trained models match shuffled baselines on general language understanding and common knowledge while consistently exhibiting more up-to-date and temporally precise knowledge. Temporally ordered pre-training yields improved factual freshness, while shuffled pre-training peaks on older data, possibly due to increased factual repetition. These findings, along with the release of our code at https://github.com/kyutai-labs/kairos , checkpoints, and datasets at https://huggingface.co/collections/kyutai/kairos provide a foundation for future research on continual learning for LLMs.', 'score': 2, 'issue_id': 2322, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '82658a25a2763862', 'authors': ['Hippolyte Pilchen', 'Romain Fabre', 'Franck Signe Talla', 'Patrick Perez', 'Edouard Grave'], 'affiliations': ['Kyutai, Paris'], 'pdf_title_img': 'assets/pdf/title_img/2605.22769.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#dataset', '#small_models', '#science', '#training'], 'emoji': '⏰', 'ru': {'title': 'Упорядочение времени в обучении: путь к более актуальным языковым моделям', 'desc': 'Исследование показывает, что предварительное обучение больших языковых моделей на временно упорядоченных данных улучшает их способность сохранять актуальную информацию и точность временной привязки фактов. Авторы создали бенчмарк из 7000+ вопросов с временной разметкой и протокол оценки для анализа того, как модели связывают факты с соответствующими временными периодами. При сравнении моделей, обученных на последовательно расположенных данных из снимков Common Crawl, с моделями на перемешанных данных, выяснилось, что последовательное обучение сохраняет общие языковые способности, но значительно улучшает свежесть и точность знаний о современных событиях. Результаты свидетельствуют о том, что временной порядок данных критически важен для развития более актуального и временно осведомленного поведения языковых моделей.'}, 'en': {'title': 'Temporal Training for Timely Truths', 'desc': 'This paper explores how pre-training large language models (LLMs) on data that is organized by time can enhance their ability to provide accurate and current information. By comparing models trained on temporally ordered data to those trained on shuffled data, the authors demonstrate that the former can maintain general language skills while offering more up-to-date factual knowledge. They introduce a new benchmark with over 7,000 questions that test models on their ability to link facts to specific time periods. The results indicate that training with a temporal focus leads to better factual freshness and precision, paving the way for advancements in continual learning for LLMs.'}, 'zh': {'title': '顺序预训练提升语言模型的时间感知能力', 'desc': '本研究探讨了在时间顺序数据上预训练大型语言模型的影响，发现这种方法能提高模型的事实新鲜度和时间精确性。与传统的随机预训练相比，顺序预训练的模型在语言理解和常识知识上表现相当，但在时间敏感的事实知识上更为准确。我们建立了一个包含7000多个时间相关问题的基准测试，并提出了一种评估协议，以分析模型是否能正确关联事实与其对应的时间段。研究结果表明，顺序预训练能显著改善模型的事实新鲜度，而随机预训练则在较旧数据上表现更佳，可能是由于事实重复的增加。'}}}, {'id': 'https://huggingface.co/papers/2605.26242', 'title': 'Can LLMs Introspect? A Reality Check', 'url': 'https://huggingface.co/papers/2605.26242', 'abstract': "Abstract Large language models may not genuinely detect their internal states, as their apparent introspective abilities could reflect surface-level pattern matching rather than true metacognitive monitoring.  AI-generated summary Can large language models detect and report their own internal states? A number of studies have argued that the answer to this question is yes. We argue, based on lessons from human metacognition research, that this conclusion may be premature: to be convinced of this conclusion we need to distinguish genuine introspection from pattern matching based on surface-level cues. Furthermore, we argue that behavioral evidence alone is inherently insufficient to establish strong introspective claims.   We re-examine two recently introduced evaluation paradigms in light of this consideration. In the first paradigm, models are expected to detect whether their internal states have been tampered with. We find that models cannot reliably distinguish such interventions on their internal states from manipulations of the input, suggesting that their success in the original studies reflects their ability to detect anomalies more generally, as opposed to interventions on their internal states in particular. In the second paradigm we examine, models are tasked with predicting labels derived from their own hidden states. Here, we find that classifiers that only have access to the input achieve equivalent performance to the model's own in-context predictions, indicating that the original results do not conclusively demonstrate that the model has privileged access to its internal representations. We further introduce a relabeled control setting, where models cannot rely on the semantics of the task to solve it, and instead must rely on the internal representation; models perform closer to chance on this better-controlled version of the task. Taken together, these results indicate that current evidence is insufficient to establish that LLMs display metacognitive monitoring.", 'score': 1, 'issue_id': 2325, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'c1b1b344f1e17a85', 'authors': ['Shashwat Singh', 'Tal Linzen', 'Shauli Ravfogel'], 'affiliations': ['Center for Data Science New York University'], 'pdf_title_img': 'assets/pdf/title_img/2605.26242.jpg', 'data': {'categories': ['#benchmark'], 'emoji': '🪞', 'ru': {'title': 'Иллюзия самосознания: модели видят паттерны, а не себя', 'desc': 'Статья исследует способность больших языковых моделей к интроспекции и обнаружению собственных внутренних состояний. Авторы утверждают, что кажущиеся метакогнитивные способности моделей могут быть просто поверхностным распознаванием паттернов, а не настоящим самоконтролем. Они переоценивают два существующих подхода к оценке и показывают, что модели не могут надёжно отличить изменения своих внутренних состояний от манипуляций входными данными, а также не имеют привилегированного доступа к собственным скрытым представлениям. Исследование демонстрирует, что текущих доказательств недостаточно для утверждения о наличии метакогнитивного мониторинга у LLM.'}, 'en': {'title': 'Are Large Language Models Truly Introspective?', 'desc': 'This paper questions whether large language models (LLMs) can truly introspect their internal states or if they are merely matching patterns based on superficial cues. The authors argue that previous studies claiming LLMs can detect their internal states may be misinterpreting behavioral evidence, which does not necessarily indicate genuine metacognition. They re-evaluate two experimental paradigms, finding that LLMs struggle to distinguish between internal state manipulations and input changes, suggesting their successes are due to general anomaly detection. Ultimately, the findings imply that current evidence does not convincingly support the idea that LLMs possess true metacognitive abilities.'}, 'zh': {'title': '大型语言模型的内省能力值得怀疑', 'desc': '这篇论文探讨了大型语言模型是否能够真实地检测和报告其内部状态。研究表明，模型的表面直观能力可能只是基于模式匹配，而非真正的元认知监控。作者认为，现有的行为证据不足以支持模型具备真正的内省能力。通过重新审视两种评估范式，研究发现模型在识别内部状态干扰和预测隐藏状态标签时的表现并不如预期，表明当前证据不足以证明大型语言模型具备元认知监控。'}}}, {'id': 'https://huggingface.co/papers/2503.08600', 'title': 'NSF-SciFy: Mining the NSF Awards Database for Scientific Claims', 'url': 'https://huggingface.co/papers/2503.08600', 'abstract': "Abstract NSF-SciFy is a large-scale dataset of scientific claims and investigation proposals extracted from NSF award abstracts, enabling improved language model fine-tuning for claim verification and scientific discovery tracking.  AI-generated summary We introduce NSF-SciFy, a comprehensive dataset of scientific claims and investigation proposals extracted from National Science Foundation award abstracts. While previous scientific claim verification datasets have been limited in size and scope, NSF-SciFy represents a significant advance with 2.8 million claims from 400,000 abstracts spanning all science and mathematics disciplines. We present two focused subsets: NSF-SciFy-MatSci with 114,000 claims from materials science awards, and NSF-SciFy-20K with 135,000 claims across five NSF directorates. Using zero-shot prompting, we develop a scalable approach for joint extraction of scientific claims and investigation proposals. We demonstrate the dataset's utility through three downstream tasks: non-technical abstract generation, claim extraction, and investigation proposal extraction. Fine-tuning language models on our dataset yields substantial improvements, with relative gains often exceeding 100%, particularly for claim and proposal extraction tasks. Our error analysis reveals that extracted claims exhibit high precision but lower recall, suggesting opportunities for further methodological refinement. NSF-SciFy enables new research directions in large-scale claim verification, scientific discovery tracking, and meta-scientific analysis. Code and data are available at https://github.com/darpa-scify/NSFSciFy.", 'score': 1, 'issue_id': 2325, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '4bf397a2f71a60a1', 'authors': ['Delip Rao', 'Weiqiu You', 'Eric Wong', 'Chris Callison-Burch'], 'affiliations': ['University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2503.08600.jpg', 'data': {'categories': ['#science', '#benchmark', '#open_source', '#dataset', '#training', '#synthetic'], 'emoji': '📚', 'ru': {'title': 'Большой датасет научных утверждений для верификации и отслеживания открытий', 'desc': 'В работе представлен NSF-SciFy — крупномасштабный датасет, содержащий 2.8 миллиона научных утверждений и предложений исследований, извлечённых из абстрактов грантов Национального научного фонда США. Авторы разработали масштабируемый подход для совместной извлечения научных утверждений и предложений исследований, используя zero-shot prompting с языковыми моделями. Демонстрируется применение датасета в трёх задачах: генерация популярного описания абстрактов, извлечение утверждений и предложений исследований, где fine-tuning моделей показывает улучшение в среднем свыше 100%. Данный датасет открывает новые возможности для верификации научных утверждений в большом масштабе, отслеживания научных открытий и метанаучного анализа.'}, 'en': {'title': 'Unlocking Scientific Insights with NSF-SciFy Dataset', 'desc': 'NSF-SciFy is a large dataset designed to enhance the verification of scientific claims and track scientific discoveries. It contains 2.8 million claims from 400,000 National Science Foundation award abstracts, covering various science and mathematics fields. The dataset includes specialized subsets for materials science and other disciplines, allowing for focused research. By fine-tuning language models on this dataset, researchers can achieve significant improvements in tasks like claim extraction and proposal generation, paving the way for advancements in scientific research methodologies.'}, 'zh': {'title': 'NSF-SciFy：科学声明验证的新里程碑', 'desc': 'NSF-SciFy是一个大规模的数据集，包含从国家科学基金会（NSF）奖项摘要中提取的科学声明和研究提案。这一数据集包含280万个声明，来自40万个摘要，涵盖所有科学和数学学科，显著提升了科学声明验证和科学发现跟踪的能力。我们还提供了两个专注的子集，分别是材料科学和五个NSF主管部门的声明。通过对语言模型进行微调，使用该数据集可以在声明和提案提取任务上实现超过100%的相对提升。'}}}, {'id': 'https://huggingface.co/papers/2605.26293', 'title': 'CroCo: Cross-Lingual Contrastive Preference Tuning on Self-Generations', 'url': 'https://huggingface.co/papers/2605.26293', 'abstract': 'Abstract Cross-lingual contrastive preference tuning enables multilingual language model improvement without language-specific annotations, achieving strong performance across diverse tasks and languages.  AI-generated summary Prior work establishes that controlled contrastiveness between self-generated responses from large language models, set via reward scores, improves downstream preference tuning in English. We extend this method to multiple languages and evaluate two models across a total of 14 high and low-resource languages on a diverse set of tasks. Our central finding is that cross-lingual contrastive preference tuning on self-generations (CroCo) transfers without language-specific preference annotation. A reward model trained on English preferences (atop a multilingual base) produces useful within-language rankings across most languages, and pairing in either a monolingual or multilingual setting improves over each model on the majority of setups while preventing the catastrophic forgetting of supervised fine-tuning. We observe that the gains require on-policy data. Off-policy responses reduce the benefit and online preference optimization fails to improve over the offline variant. Specifically, on structured tasks, our method matches or exceeds the base in 6/7 languages for EuroLLM-9B and 4/7 settings for Aya-3B. On open-ended generation, both tuned models win against their respective base across 11 evaluated languages. Overall, we show promising directions for multilingual preference
