 tuning.', 'score': 1, 'issue_id': 2324, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'd6e4ba397a3af36c', 'authors': ['Mike Zhang', 'Ali Basirat', 'Desmond Elliott'], 'affiliations': ['Centre for Language Technology (CST), University of Copenhagen', 'Department of Computer Science (DIKU), University of Copenhagen', 'Pioneer Centre for Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2605.26293.jpg', 'data': {'categories': ['#low_resource', '#transfer_learning', '#training', '#alignment', '#multilingual', '#rlhf'], 'emoji': '🌍', 'ru': {'title': 'Единая модель награды для обучения с предпочтениями на всех языках', 'desc': 'В работе предложен метод кросс-лингвального контрастивного обучения с предпочтениями (CroCo), который улучшает многоязычные языковые модели без необходимости в аннотациях для каждого языка отдельно. Авторы используют модель награды, обученную на английских предпочтениях, для ранжирования самогенерируемых ответов модели на 14 языках высокого и низкого уровня ресурса. Ключевое открытие состоит в том, что контрастивное обучение эффективно переносится между языками и улучшает производительность на большинстве задач, одновременно предотвращая катастрофическое забывание предыдущего обучения. Исследование показывает, что метод требует данных, генерируемых моделью на текущий момент, тогда как использование офф-лайновых ответов значительно снижает эффективность.'}, 'en': {'title': 'Enhancing Multilingual Models with Contrastive Preference Tuning', 'desc': 'This paper presents a method called cross-lingual contrastive preference tuning (CroCo) that enhances multilingual language models without needing specific annotations for each language. The approach builds on previous work that used controlled contrastiveness in English to improve model responses based on reward scores. By applying this technique across 14 different languages, the authors demonstrate that a reward model trained on English can effectively rank responses in other languages. The results show that this method not only improves performance in various tasks but also helps maintain the knowledge gained from previous supervised training.'}, 'zh': {'title': '跨语言对比调优，提升多语言模型性能', 'desc': '跨语言对比偏好调优可以在没有特定语言注释的情况下提升多语言模型的性能，适用于多种任务和语言。我们的方法扩展了之前在英语中的对比性调优，能够在14种高资源和低资源语言上进行评估。研究发现，基于英语偏好的奖励模型可以在大多数语言中产生有效的排名，并且在单语或多语环境中配对可以提高模型性能，同时避免监督微调的灾难性遗忘。我们的结果表明，跨语言对比偏好调优在多语言环境中具有良好的应用前景。'}}}, {'id': 'https://huggingface.co/papers/2605.24931', 'title': 'Learning High-Frequency Continuous Action Chunks in Latent Space', 'url': 'https://huggingface.co/papers/2605.24931', 'abstract': 'Abstract High-frequency robotic control is improved by using variational autoencoders to enhance temporal and spatial consistency, combined with a reuse-then-refine strategy for smooth real-time execution.  AI-generated summary Modern robotic policies increasingly rely on action chunking to execute complex tasks in the physical world. While action chunking improves temporal consistency at moderate action frequencies, it becomes insufficient when the action frequency is further increased (e.g., to 60~Hz). At such high frequencies, policies often fail to generate actions that are both temporally smooth and spatially consistent. We address this challenge by shifting high-frequency action learning from the action space to a latent space with variational autoencoder (VAE). This formulation significantly improves both temporal and spatial consistency of high-frequency control. To enable smooth real-time execution, we further introduce Reuse-then-Refine, a chunk-level refine strategy that improves continuity between adjacent action chunks under asynchronous inference. As a result, robots controlled by our policy can execute complex contact-rich tasks continuously, with less pauses and jerky motions. Experiments on three real-world contact-rich robotic tasks show that our approach consistently completes tasks with smooth motions. Our code and data are available at https://github.com/tars-robotics/RTR.', 'score': 1, 'issue_id': 2323, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '5f3b55c80a4817fc', 'authors': ['Kunyun Wang', 'Yuhang Zheng', 'Yupeng Zheng', 'Jieru Zhao', 'Wenchao Ding'], 'affiliations': ['Fudan University, Shanghai, China', 'Institute of Automation, Chinese Academy of Sciences, Beijing, China', 'National University of Singapore, Singapore', 'School of Computer Science, Shanghai Jiao Tong University, Shanghai, China', 'TARS Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2605.24931.jpg', 'data': {'categories': ['#robotics', '#architecture', '#training'], 'emoji': '🤖', 'ru': {'title': 'Плавное управление роботом через VAE в скрытом пространстве', 'desc': 'Статья предлагает улучшить высокочастотное управление роботами, используя вариационные автокодировщики (VAE) для обучения действий в скрытом пространстве вместо пространства действий. Это решение повышает как временную гладкость, так и пространственную согласованность команд робота при частотах 60 Гц и выше. Авторы вводят стратегию «Переиспользование-затем-Уточнение» для сглаживания переходов между последовательными пакетами действий при асинхронном выводе модели. Экспериментальные результаты демонстрируют, что роботы, управляемые предложенным методом, выполняют сложные манипуляционные задачи с контактным взаимодействием плавно и без паузирования.'}, 'en': {'title': 'Smooth Robotics: Enhancing High-Frequency Control with VAEs', 'desc': 'This paper presents a method to enhance high-frequency robotic control using variational autoencoders (VAEs) to improve the smoothness and consistency of actions. By shifting the learning process from the action space to a latent space, the approach addresses the limitations of traditional action chunking at high frequencies. The authors introduce a Reuse-then-Refine strategy that refines action chunks to ensure continuity and reduce jerky movements during execution. Experiments demonstrate that this method allows robots to perform complex tasks more smoothly and effectively in real-world scenarios.'}, 'zh': {'title': '提升高频机器人控制的平滑性与一致性', 'desc': '本论文提出了一种改进高频率机器人控制的方法，利用变分自编码器（VAE）来增强时间和空间的一致性。通过将高频动作学习从动作空间转移到潜在空间，显著提高了控制的平滑性和一致性。我们还引入了重用-再精炼策略，以改善相邻动作块之间的连续性，从而实现实时平滑执行。实验结果表明，该方法在复杂的接触丰富任务中表现出色，能够减少停顿和抖动。'}}}, {'id': 'https://huggingface.co/papers/2605.15042', 'title': 'EverAnimate: Minute-Scale Human Animation via Latent Flow Restoration', 'url': 'https://huggingface.co/papers/2605.15042', 'abstract': 'Abstract EverAnimate addresses long-horizon animated video generation challenges through persistent latent propagation and restorative flow matching to maintain visual quality and character identity.  AI-generated summary We propose EverAnimate, an efficient post-training method for long-horizon animated video generation that preserves visual quality and character identity. Long-form animation remains challenging because highly dynamic human motion must be synthesized against relatively static environments, making chunk-based generation prone to accumulated drift: (i) low-level quality drift, such as progressive degradation of static backgrounds, and (ii) high-level semantic drift, such as inconsistent character identity and view-dependent attributes. To address this issue, EverAnimate restores drifted flow trajectories by anchoring generation to a persistent latent context memory, consisting of two complementary mechanisms. (i) Persistent Latent Propagation maintains a context memory across chunks to propagate identity and motion in latent space while mitigating temporal forgetting. (ii) Restorative Flow Matching introduces an implicit restoration objective during sampling through velocity adjustment, improving within-chunk fidelity. With only lightweight LoRA tuning, EverAnimate outperforms state-of-the-art long-animation methods in both short- and long-horizon settings: at 10 seconds, it improves PSNR/SSIM by 8%/7% and reduces LPIPS/FID by 22%/11%; at 90 seconds, the gains increase to 15%/15% and 32%/27%, respectively.', 'score': 1, 'issue_id': 2325, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'df3fc5907181d5c2', 'authors': ['Wuyang Li', 'Yang Gao', 'Mariam Hassan', 'Lan Feng', 'Wentao Pan', 'Po-Chien Luan', 'Alexandre Alahi'], 'affiliations': ['VITA@EPFL'], 'pdf_title_img': 'assets/pdf/title_img/2605.15042.jpg', 'data': {'categories': ['#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Вечная память для генерации длинных анимаций без дрейфа качества', 'desc': 'EverAnimate — это метод для генерации длительных анимированных видео, который решает проблему накопления ошибок при генерации по частям. Метод использует персистентное распространение латентного пространства для сохранения памяти о контексте между фрагментами видео, что помогает поддерживать идентичность персонажей и согласованность движения. Дополнительно применяется восстановительное flow matching, которое корректирует траектории движения во время семплирования для улучшения качества каждого фрагмента. Благодаря легкой настройке моделей через LoRA, метод значительно превосходит существующие подходы, улучшая качество видео как для коротких, так и для очень длинных последовательностей (до 90 секунд).'}, 'en': {'title': 'EverAnimate: Consistent Long-Horizon Animation Generation', 'desc': 'EverAnimate is a novel approach for generating long animated videos while maintaining high visual quality and consistent character identity. It tackles the challenges of low-level quality drift and high-level semantic drift that occur during chunk-based video generation. The method employs Persistent Latent Propagation to keep a memory of context across video segments, ensuring that character motion and identity are preserved. Additionally, Restorative Flow Matching enhances the fidelity of animations by adjusting flow trajectories during the generation process, leading to significant improvements over existing methods.'}, 'zh': {'title': '持久潜在传播，提升动画生成质量', 'desc': 'EverAnimate是一种高效的后训练方法，旨在解决长时间动画视频生成中的挑战。它通过持久的潜在传播和恢复流匹配来保持视觉质量和角色身份。该方法能够有效地处理动态人类动作与相对静态环境之间的合成问题，减少低级和高级语义漂移。通过轻量级的LoRA调优，EverAnimate在短期和长期设置中均超越了现有的长动画生成方法。'}}}, {'id': 'https://huggingface.co/papers/2605.25162', 'title': 'STREAM: A Data-Centric Framework for Mining High-Value Task-Oriented Dialogues from Streaming Media', 'url': 'https://huggingface.co/papers/2605.25162', 'abstract': 'Abstract A data-centric framework called Stream generates large-scale, multi-domain service dialogues by synthesizing interactions from streaming media, incorporating persona construction and conversational blueprints with retrieval-augmented generation for knowledge-aware responses.  AI-generated summary Large language models for vertical domains are bottlenecked by the scarcity of complex, domain-specific task-oriented dialogues. Existing data acquisition pipelines face a persistent trilemma: expert annotation is expensive, real-world service conversations are constrained by privacy and commercial restrictions, and static corpora quickly become temporally stale. We propose Stream, a data-centric framework that leverages publicly available streaming media (live streams and short videos) to synthesize high-value service dialogues at scale. Stream mines authentic interaction signals from noisy streams and synthesizes conversations by integrating role-grounded persona construction with Conversational Blueprint construction; it further adopts retrieval-augmented generation (RAG) to support knowledge-aware responses. Based on Stream, we release StreamDial, a large-scale multi-domain dataset covering Automotive, Restaurant, and Hotel. StreamDial contains 87,498 dialogue sessions and 1,497,320 turns in total, with an average of 17.11 turns per session and a comparable scale across domains. Each session is organized as a structured quadruplet langle P_u, P_a, B, H rangle that pairs dialogue history with explicit user/agent personas and a Conversational Blueprint, capturing realistic service behaviors such as requirement mining, constraint conflicts, negotiation, and recovery. Evaluations with automatic judges and downstream tasks show that StreamDial improves intrinsic dialogue quality over strong baselines, and models trained with StreamDial improve Dialogue State Tracking across backbones; we further report a completed human-evaluation set and encouraging multilingual transfer on Qwen3-8B under a controlled training budget. The data is released in https://github.com/hitxueliang/DialogDataSetBySTREAM.', 'score': 0, 'issue_id': 2323, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '14f0200424c629a2', 'authors': ['Liang Xue', 'Haoyu Liu', 'Cheng Wang', 'Pengyu Chen', 'Haozhuo Zheng', 'Yang Liu'], 'affiliations': ['Byering Technology', 'Harbin Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.25162.jpg', 'data': {'categories': ['#dataset', '#transfer_learning', '#open_source', '#synthetic', '#multilingual', '#data', '#rag'], 'emoji': '🎬', 'ru': {'title': 'Синтез диалогов обслуживания из потокового контента при помощи персон и retrieval-augmented generation', 'desc': 'Stream — это фреймворк, ориентированный на данные, который синтезирует диалоги в сфере обслуживания в больших масштабах, извлекая аутентичные сигналы взаимодействия из потокового контента. Система комбинирует конструирование персон с ролевым обоснованием и построением диалоговых шаблонов, используя retrieval-augmented generation для создания ответов с учётом знаний. На основе Stream создан датасет StreamDial с 87,498 диалоговыми сессиями и 1,497,320 турами, охватывающий три домена и содержащий разнообразные сценарии обслуживания. Эксперименты показывают, что модели, обученные на StreamDial, демонстрируют улучшения в диалоговом моделировании и слежении за состоянием диалога, включая положительный результат при мультиязычной трансфертной адаптации.'}, 'en': {'title': 'Stream: Revolutionizing Dialogue Generation from Streaming Media', 'desc': 'The paper introduces Stream, a data-centric framework designed to generate large-scale service dialogues by utilizing interactions from streaming media. It addresses the challenges of acquiring complex, domain-specific dialogues by synthesizing conversations from noisy data sources while ensuring knowledge-aware responses through retrieval-augmented generation. Stream also presents StreamDial, a comprehensive dataset that includes nearly 90,000 dialogue sessions across various domains like Automotive and Restaurants, structured to reflect realistic service interactions. Evaluations demonstrate that models trained on StreamDial significantly enhance dialogue quality and improve dialogue state tracking capabilities.'}, 'zh': {'title': 'Stream：生成多领域服务对话的新框架', 'desc': '本文提出了一种名为Stream的数据中心框架，旨在通过合成来自流媒体的互动，生成大规模的多领域服务对话。该框架结合了角色构建和对话蓝图，并采用增强检索生成（RAG）技术，以支持知识感知的响应。Stream利用公开的流媒体（如直播和短视频）挖掘真实的互动信号，从而合成高价值的服务对话。我们还发布了StreamDial数据集，涵盖汽车、餐厅和酒店等多个领域，包含87498个对话会话和1497320个回合，显著提升了对话质量和状态跟踪能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (12)', '#agi', '#alignment (2)', '#architecture (8)', '#audio (1)', '#benchmark (19)', '#cv (7)', '#data (1)', '#dataset (14)', '#diffusion (5)', '#ethics', '#games (1)', '#graphs', '#hallucinations (2)', '#healthcare', '#inference (7)', '#interpretability', '#leakage', '#long_context (3)', '#low_resource (1)', '#machine_translation', '#math', '#multilingual (2)', '#multimodal (11)', '#open_source (8)', '#optimization (5)', '#plp', '#rag (2)', '#reasoning (6)', '#rl (5)', '#rlhf (2)', '#robotics (2)', '#science (2)', '#security (1)', '#small_models (4)', '#story_generation', '#survey (2)', '#synthetic (3)', '#training (17)', '#transfer_learning (2)', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-27 20:03',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-27 20:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-27 20:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
