    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.27365', 'title': 'LocateAnything: Fast and High-Quality Vision-Language Grounding with Parallel Box Decoding', 'url': 'https://huggingface.co/papers/2605.27365', 'abstract': 'Abstract Parallel Box Decoding enables efficient and accurate unified visual grounding and detection by decoding geometric elements as atomic units, improving both throughput and localization quality.  AI-generated summary Vision-language models (VLMs) commonly formulate visual grounding and detection as a coordinate-token generation problem, serializing each 2D box into multiple 1D tokens that are learned and decoded largely independently. This token-by-token decoding mismatches the coupled structure of box geometry and creates a practical inference bottleneck due to strictly sequential generation. We introduce LocateAnything, a unified generative grounding and detection framework based on Parallel Box Decoding (PBD). By decoding geometric elements such as bounding boxes and points as atomic units in a single step, LocateAnything preserves intra-box geometric coherence and unlocks substantial parallelism. We show that PBD improves both decoding throughput and localization accuracy. We further develop a scalable data engine and curate LocateAnything-Data, a large-scale dataset with more than 138 million training samples, substantially increasing data diversity for high-precision localization. Extensive evaluations show that LocateAnything advances the speed-accuracy frontier, achieving significantly higher decoding throughput while improving high-IoU localization quality across diverse benchmarks. The results highlight the complementary benefits of Parallel Box Decoding and large-scale training data in enabling efficient and precise unified visual grounding and detection.', 'score': 90, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '56714b4ea93dbe59', 'authors': ['Shihao Wang', 'Shilong Liu', 'Yuanguo Kuang', 'Xinyu Wei', 'Yangzhou Liu', 'Zhiqi Li', 'Yunze Man', 'Guo Chen', 'Andrew Tao', 'Guilin Liu', 'Jan Kautz', 'Lei Zhang', 'Zhiding Yu'], 'affiliations': ['NVIDIA', 'Nanjing University', 'Princeton University', 'The Hong Kong Polytechnic University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.27365.jpg', 'data': {'categories': ['#cv', '#multimodal', '#dataset', '#inference'], 'emoji': '📦', 'ru': {'title': 'Параллельное декодирование боксов для быстрой и точной визуальной локализации', 'desc': 'В работе предлагается новый метод Parallel Box Decoding для одновременного решения задач визуального грунтирования и детекции объектов в vision-language моделях. Вместо традиционного последовательного декодирования координат бокса токен за токеном, авторы декодируют геометрические элементы как единые атомарные единицы в один шаг, что сохраняет внутреннюю согласованность геометрии и позволяет распараллелить вычисления. Для обучения модели LocateAnything авторы создали большой датасет из 138 миллионов примеров, значительно повысив разнообразие данных для точной локализации объектов. Экспериментальные результаты показывают, что предложенный подход одновременно улучшает пропускную способность декодирования и точность локализации на различных бенчмарках.'}, 'en': {'title': 'Unlocking Speed and Precision in Visual Grounding with Parallel Box Decoding', 'desc': 'This paper introduces Parallel Box Decoding (PBD), a method that enhances visual grounding and detection by treating geometric elements as atomic units. Traditional approaches serialize 2D bounding boxes into multiple 1D tokens, which leads to inefficiencies and inaccuracies due to their independent decoding. By using PBD, the framework called LocateAnything can decode bounding boxes and points in a single step, maintaining the geometric relationships and allowing for faster processing. The authors also present a large dataset, LocateAnything-Data, which supports the training of models with diverse examples, ultimately improving both speed and localization accuracy in visual tasks.'}, 'zh': {'title': '并行框解码：提升视觉定位与检测的效率与准确性', 'desc': '本文介绍了一种名为LocateAnything的框架，利用并行框解码（PBD）来实现高效且准确的视觉定位和检测。通过将几何元素（如边界框和点）作为原子单元在一步中解码，PBD保持了框内几何的一致性，并解锁了显著的并行性。研究表明，PBD不仅提高了解码的吞吐量，还改善了定位的准确性。此外，本文还开发了一个可扩展的数据引擎，创建了包含超过1.38亿个训练样本的LocateAnything-Data数据集，显著增加了数据的多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.23271', 'title': 'EvalVerse: Pipeline-Aware and Expert-Calibrated Benchmarking for Professional Cinematic Video Generation', 'url': 'https://huggingface.co/papers/2605.23271', 'abstract': "Abstract EvalVerse presents a comprehensive evaluation framework for generative video models that bridges the gap between human aesthetic judgment and machine scoring through expert-calibrated vision-language models and multi-stage cinematic assessment.  AI-generated summary The rapid evolution of generative video foundation models has propelled the field toward professional-grade cinematic synthesis. To achieve such demanding quality, the community transitions towards Reinforcement Learning (RL) and agentic workflows. However, reliable evaluation has emerged as a critical bottleneck. Existing benchmarks predominantly evaluate ''whether it is right'' (basic prompt-following) while fundamentally neglecting ''whether it is good'' (cinematic quality, acting, and aesthetics). Furthermore, current automated metrics lack the domain-specific rigor required to provide trustworthy signals, creating a severe credibility gap between human aesthetic perception and machine scoring. To bridge this gap, we introduce EvalVerse, a comprehensive, pipeline-aware, and expert-calibrated evaluation framework. We treat video generation assessment not merely as an engineering task, but as a core scientific problem: the systematic digitization of subjective cinematic expertise. First, we organize domain knowledge into an evaluation taxonomy aligned with the professional filmmaking workflow (pre-production, production, and post-production). Second, we distill human expert judgments into a curated dataset with large-scale human annotations. Third, we inject this knowledge into Vision-Language Models (VLMs) through an expert-calibrated fine-tuning strategy, enabling the VLM to perform explicit Chain-of-Thought reasoning. Compared to previous works, EvalVerse not only retains compatibility with foundational ''rightness'' metrics, but also significantly expands the criteria to ''goodness'' and broaden the task coverage to complex multi-shot sequencing and audio-visual integration. Consequently, by providing granular diagnostic signals, EvalVerse transcends a static leaderboard and establishes a fundamental infrastructure for future work, such as reward models and evaluator agent.", 'score': 71, 'issue_id': 2321, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '4ea6fbbecd394301', 'authors': ['Songlin Yang', 'Haobin Zhong', 'Ruilin Zhang', 'Xiaotong Zhao', 'Shuai Li', 'Kai Zheng', 'Xuyi Yang', 'Zhe Wang', 'Zhenchen Tang', 'Yang Li', 'Bohai Gu', 'Zhengwei Peng', 'Yidan Huang', 'Mengzhou Luo', 'Yihang Bo', 'Dalu Feng', 'Yujia Zhang', 'Juntao Ma', 'Ruiqi Wang', 'Lvmin Zhang', 'Yuwei Guo', 'Frank Guan', 'Maneesh Agrawala', 'Hongbo Fu', 'Alan Zhao', 'Anyi Rao'], 'affiliations': ['Beijing Film Academy', 'Institute of Automation, Chinese Academy of Sciences', 'Singapore Institute of Technology', 'Stanford University', 'Tencent', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.23271.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents', '#video', '#rl', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Эксперты и машины: оценка кинематографического качества видео через калибровку знаний', 'desc': 'EvalVerse представляет комплексную систему оценки для моделей генеративного видео, которая объединяет эстетическое суждение человека и автоматические метрики через калибровку экспертами. Авторы организуют знания в область видеопроизводства, используя профессиональную таксономию кинематографического рабочего процесса (подготовка, съёмка и постпродакшн). Они применяют стратегию тонкой настройки Vision-Language Model на основе экспертных аннотаций для выполнения цепочки рассуждений при оценке качества видео. Фреймворк не только сохраняет совместимость с базовыми метриками правильности, но и расширяет критерии на оценку эстетического качества, включая многокадровое монтирование и аудиовизуальную интеграцию.'}, 'en': {'title': 'Bridging Human Aesthetics and Machine Evaluation in Video Generation', 'desc': 'EvalVerse is a new evaluation framework designed for generative video models that combines human aesthetic judgment with machine scoring. It addresses the limitations of existing benchmarks that focus only on basic prompt-following, by incorporating a comprehensive assessment of cinematic quality, acting, and aesthetics. The framework organizes filmmaking knowledge into a structured evaluation process and uses expert-calibrated Vision-Language Models to enhance the evaluation of video generation. By expanding the criteria for assessment, EvalVerse aims to provide more reliable and nuanced feedback for future developments in video generation technology.'}, 'zh': {'title': 'EvalVerse：弥合人类审美与机器评分的桥梁', 'desc': 'EvalVerse是一个全面的评估框架，旨在为生成视频模型提供评估，弥合人类审美判断与机器评分之间的差距。该框架通过专家校准的视觉-语言模型和多阶段电影评估，系统化地数字化主观电影专业知识。EvalVerse不仅关注生成视频的基本正确性，还扩展到评估其美学质量和复杂的多镜头序列。通过提供细致的诊断信号，EvalVerse为未来的奖励模型和评估代理建立了基础设施。'}}}, {'id': 'https://huggingface.co/papers/2605.27367', 'title': 'SpatialBench: Is Your Spatial Foundation Model an All-Round Player?', 'url': 'https://huggingface.co/papers/2605.27367', 'abstract': 'Abstract SpatialBench presents a comprehensive benchmark for evaluating spatial foundation models across diverse domains and tasks, revealing limitations in current models and introducing DA-Next-5M and DA-Next to advance spatial representation learning.  AI-generated summary While spatial foundation models have demonstrated impressive performance on standard datasets, a critical question remains: are they truly all-round players capable of generalizing robustly across diverse downstream tasks, arbitrary viewpoints, shifting scene domains, varying input densities, and specific hardware constraints? Answering this overarching question requires a holistic assessment, yet current models are mainly evaluated on specific domains for which they were specifically designed or trained. Such evaluations are intrinsically limited by narrow paradigm coverage, limited scene domains, and arbitrary frame sampling, making it fundamentally difficult to assess their true generalization capabilities. To address this gap, we present SpatialBench, a cross-paradigm, domain-diverse benchmark for spatial foundation models with deterministic sampling. SpatialBench features unprecedented scale and rigorous deterministic design, comprising 19 datasets and 546 scenes across 5 diverse spatial domains. It comprehensively evaluates 41 models across 6 paradigms on 5 task suites under 4 different input density settings. Our extensive evaluation reveals that current models are not yet all-round players, and uncovers crucial insights for future advancement. Specifically, we demonstrate that full-context attention maximizes accuracy while bounded-memory strategies unlock long-sequence scalability. Moreover, our empirical evaluations in challenging embodied and egocentric tasks demonstrate that strict domain alignment and high data quality are far more critical to performance than simple dataset scaling. Furthermore, to address the largest data gap identified in our analysis, we go beyond evaluation by introducing a large-scale dataset, DA-Next-5M, and a strong baseline model, DA-Next, pushing the boundaries of spatial representation learning.', 'score': 56, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '0fe14c386e53234e', 'authors': ['Haosong Peng', 'Hao Li', 'Jiaqi Chen', 'Yuhao Pan', 'Runmao Yao', 'Yalun Dai', 'Fushuo Huo', 'Fangzhou Hong', 'Zhaoxi Chen', 'Haozhao Wang', 'Dingwen Zhang', 'Ziwei Liu', 'Wenchao Xu'], 'affiliations': ['Hong Kong University of Science and Technology', 'Huazhong University of Science and Technology', 'Nanyang Technological University', 'Northwestern Polytechnical University', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27367.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#dataset', '#synthetic', '#3d', '#survey', '#open_source'], 'emoji': '🌍', 'ru': {'title': 'Универсальные пространственные модели: от оценки к практическому решению', 'desc': 'SpatialBench — это комплексный бенчмарк для оценки пространственных фундаментальных моделей на разнообразных задачах и доменах. Авторы выявили, что существующие модели не являются универсальными и плохо обобщаются при изменении точек зрения, доменов сцен и плотности входных данных. Исследование охватило 41 модель, 6 парадигм и 19 датасетов, позволив идентифицировать ключевые ограничения современных подходов. Для преодоления выявленных проблем авторы предложили новый датасет DA-Next-5M и базовую модель DA-Next, которые значительно улучшают качество обучения пространственного представления.'}, 'en': {'title': 'Benchmarking Spatial Models for Better Generalization', 'desc': 'SpatialBench is a new benchmark designed to evaluate spatial foundation models across various tasks and domains. It highlights the limitations of current models, showing that they struggle to generalize well across different scenarios and input conditions. The benchmark includes 19 datasets and 546 scenes, rigorously testing 41 models under diverse settings. Additionally, it introduces DA-Next-5M and DA-Next to enhance spatial representation learning, emphasizing the importance of data quality and context in improving model performance.'}, 'zh': {'title': '推动空间表示学习的全面基准测试', 'desc': 'SpatialBench是一个全面的基准测试，用于评估空间基础模型在不同领域和任务中的表现。该研究揭示了当前模型的局限性，并引入了DA-Next-5M和DA-Next，以推动空间表示学习的发展。通过对41个模型在5个任务套件下的评估，研究发现现有模型尚未具备全面的通用能力。研究还强调了全上下文注意力和有限内存策略在提高准确性和扩展性方面的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.26114', 'title': 'MobileGym: A Verifiable and Highly Parallel Simulation Platform for Mobile GUI Agent Research', 'url': 'https://huggingface.co/papers/2605.26114', 'abstract': 'Abstract MobileGym presents a browser-based mobile environment enabling deterministic evaluation and scalable reinforcement learning through JSON-based state management and parallel execution.  AI-generated summary We present MobileGym, a browser-hosted, lightweight, fully controllable environment for everyday mobile use, targeting interaction fidelity without replicating proprietary backends. It enables two capabilities previously out of reach for everyday apps: verifiable outcome signals through deterministic state-based judging over structured JSON state, and scalable online RL through low-cost parallel rollouts. The full environment state is captured, configured, forked, and compared as structured JSON, and a single server can host hundreds of parallel instances, with about 400 MB memory per instance and about 3 s cold start. A layered state model and a declarative task-definition framework keep state programmability and task creation practical at scale, and a single programmatic judging mechanism delivers both deterministic evaluation verdicts and dense RL rewards. The accompanying MobileGym-Bench provides 416 parameterized task templates, including 256 test and 160 train templates, over 28 apps, with deterministic judges and a structured AnswerSheet protocol that avoids free-text matching failures. In a Sim-to-Real case study, GRPO on Qwen3-VL-4B-Instruct gains +12.8 percentage points on the 256-task test set, and on a 59-task real-device signal subset, real-device execution retains 95.1% of the simulation-side training gain. Project page: https://mobilegym.github.io.', 'score': 47, 'issue_id': 2322, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'b43bce599758c3a3', 'authors': ['Dingbang Wu', 'Rui Hao', 'Haiyang Wang', 'Shuzhe Wu', 'Han Xiao', 'Zhenghong Li', 'Bojiang Zhou', 'Zheng Ju', 'Zichen Liu', 'Lue Fan', 'Zhaoxiang Zhang'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Peking University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.26114.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#rl', '#agents', '#training'], 'emoji': '📱', 'ru': {'title': 'Масштабируемое обучение с подкреплением мобильных агентов через детерминированные JSON-состояния', 'desc': 'MobileGym — это браузерная среда для обучения с подкреплением на мобильных приложениях, которая использует JSON для представления состояния и позволяет запускать сотни параллельных экземпляров одновременно. Среда обеспечивает детерминированную оценку результатов через структурированное сравнение состояний и позволяет масштабировать обучение благодаря низкостоимостным параллельным экспериментам. Система включает слоистую модель состояния и декларативный фреймворк для определения задач, что делает её практичной в масштабе. MobileGym-Bench содержит 416 параметризованных шаблонов задач на 28 приложениях с детерминированными судьями и демонстрирует улучшение производительности моделей зрения при переносе из симуляции на реальные устройства.'}, 'en': {'title': 'Revolutionizing Mobile RL with Deterministic Evaluation and Scalability', 'desc': 'MobileGym is a browser-based platform designed for evaluating and scaling reinforcement learning (RL) in mobile applications. It uses JSON for state management, allowing for deterministic evaluations and structured comparisons of outcomes. The environment supports parallel execution, enabling hundreds of instances to run simultaneously with low memory usage. Additionally, it includes a comprehensive set of task templates and a unique judging mechanism that provides reliable feedback for both training and testing in RL scenarios.'}, 'zh': {'title': 'MobileGym：可扩展的强化学习新平台', 'desc': 'MobileGym是一个基于浏览器的移动环境，能够实现可验证的结果信号和可扩展的强化学习。它通过结构化的JSON状态管理和并行执行，支持数百个实例的同时运行。该环境提供了一个分层状态模型和声明式任务定义框架，使得状态编程和任务创建在大规模下变得可行。MobileGym-Bench提供了多种参数化任务模板，确保了评估的确定性和奖励的密集性。'}}}, {'id': 'https://huggingface.co/papers/2605.26230', 'title': 'Geometry-Aware Representation Denoising for Robust Multi-view 3D Reconstruction', 'url': 'https://huggingface.co/papers/2605.26230', 'abstract': 'Abstract A novel diffusion-based framework for multi-view 3D reconstruction that restores both scene geometry and high-quality imagery from degraded inputs by operating in the feature space of a 3D reconstructor.  AI-generated summary Multi-view 3D reconstruction has achieved remarkable progress with the advent of feed-forward 3D reconstruction models. However, these models are typically trained and evaluated under ideal, degradation-free imaging conditions, whereas real-world observations often contain degradations that differ significantly from such settings. Improving robustness for multi-view 3D reconstruction under degraded conditions therefore remains an important challenge. We present Geometry-Aware Representation Denoising (GARD), a novel framework that performs diffusion-based multi-view restoration directly in the feature space of a feed-forward 3D reconstruction model. This design exploits the geometry-aware feature representations of the 3D reconstructor to effectively recover accurate scene geometry. Furthermore, by employing an additional RGB image decoder, the refined representations can also be used to restore high-quality RGB images, thereby enabling the simultaneous recovery of 3D scene geometry and high-quality imagery. Comprehensive experiments on the Depth Anything 3 (DA3) benchmark demonstrate the effectiveness of the proposed GARD framework.', 'score': 33, 'issue_id': 2321, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'dfd8feab08a9f886', 'authors': ['Jin Hyeon Kim', 'Jaeeun Lee', 'Claire Kim', 'Kyoungjin Oh', 'Paul Hyunbin Cho', 'Jaewon Min', 'Yeji Choi', 'Jihye Park', 'Hyunhee Park', 'Minkyu Park', 'Seungryong Kim'], 'affiliations': ['KAIST AI', 'Samsung Electronics'], 'pdf_title_img': 'assets/pdf/title_img/2605.26230.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '🔧', 'ru': {'title': 'Восстановление 3D геометрии и изображений из испорченных данных через диффузионное шумоподавление', 'desc': 'В статье предложена новая структура на основе диффузионных моделей для восстановления многовидовой 3D реконструкции из деградированных входных данных. Метод работает в пространстве признаков предварительно обученной нейронной сети 3D реконструктора, эксплуатируя её геометрически-осведомленные представления. Система использует дополнительный декодер RGB для одновременного восстановления как геометрии сцены, так и высококачественных изображений. Эксперименты на эталонном наборе Depth Anything 3 подтверждают эффективность предложенного подхода GARD.'}, 'en': {'title': 'Reviving 3D Scenes: GARD for Robust Reconstruction', 'desc': 'This paper introduces a new method called Geometry-Aware Representation Denoising (GARD) for improving multi-view 3D reconstruction. It focuses on restoring both the shape of a scene and high-quality images from degraded inputs by working in the feature space of a 3D model. The GARD framework uses advanced diffusion techniques to enhance the geometry-aware features, allowing for better recovery of scene details. Experiments show that GARD effectively addresses challenges posed by real-world image degradations, achieving impressive results in 3D reconstruction and image quality.'}, 'zh': {'title': '基于扩散的多视角三维重建新框架', 'desc': '本文提出了一种新颖的基于扩散的多视角三维重建框架，旨在从退化输入中恢复场景几何和高质量图像。该框架在三维重建模型的特征空间中进行操作，利用几何感知特征表示来有效恢复准确的场景几何。通过引入额外的RGB图像解码器，改进后的表示还可以用于恢复高质量的RGB图像，从而实现三维场景几何和高质量图像的同时恢复。实验结果表明，所提出的GARD框架在Depth Anything 3基准测试中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.26244', 'title': 'LongAV-Compass: Towards Unified Evaluation of Minute-Scale Audio-Visual Generation Across T2AV, I2AV, and V2AV', 'url': 'https://huggingface.co/papers/2605.26244', 'abstract': 'Abstract LongAV-Compass is a comprehensive benchmark for evaluating minute-long audio-visual generation across multiple modalities, assessing quality, consistency, and alignment over extended temporal sequences.  AI-generated summary Audio-visual generation is rapidly advancing from short clips to minute-long content, while existing evaluation protocols remain largely confined to short-form settings. Existing benchmarks primarily focus on 5--10 second text-conditioned generation and rarely support unified evaluation across text, image, and video conditioning modalities. Moreover, they provide limited insight into how identity consistency, narrative coherence, and audio-visual alignment degrade over extended temporal horizons. To bridge this gap, we introduce LongAV-Compass, a systematic benchmark for minute-long audio-visual generation. LongAV-Compass contains 284 curated test cases spanning text-to-audio-video (T2AV), image-to-audio-video (I2AV), and video-to-audio-video (V2AV), organized by application scenario and generation complexity. The benchmark combines taxonomy-guided benchmark construction with a unified evaluation framework that integrates MLLM-assisted assessment with complementary perceptual and multimodal metrics, including DINO-v2, ArcFace, CLIP, and ImageBind. The framework evaluates more than 20 fine-grained dimensions covering within-segment quality, cross-segment consistency, global narrative coherence, semantic alignment, and audio-visual synchronization. Through experiments on 11 representative models together with human-alignment validation, LongAV-Compass provides a diagnostic testbed for analyzing the limitations of current systems in sustaining coherent, semantically aligned, and temporally consistent minute-scale audio-visual generation across diverse input modalities.', 'score': 32, 'issue_id': 2321, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '3e37100f6ca78582', 'authors': ['Tengfei Liu', 'Yang Shi', 'Xuanyu Zhu', 'Jiafu Tang', 'Liu Yang', 'Qixun Wang', 'Zhuoran Zhang', 'Yuqi Tang', 'Fengxiang Wang', 'Yuhao Dong', 'Xinlong Chen', 'Bozhou Li', 'Bohan Zeng', 'Yue Ding', 'Xiaohan Zhang', 'Jialu Chen', 'Haotian Wang', 'Yuanxing Zhang', 'Pengfei Wan', 'Leye Wang'], 'affiliations': ['CASIA', 'HKUST(GZ)', 'Kling Team', 'Nanjing University', 'Nanyang Technological University', 'Peking University', 'SJTU', 'Shanghai AI Lab', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.26244.jpg', 'data': {'categories': ['#audio', '#benchmark', '#dataset', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Компас для оценки минутных аудиовизуальных генераций', 'desc': 'LongAV-Compass — это комплексный бенчмарк для оценки генерации аудиовизуального контента длительностью в минуту по нескольким модальностям. В отличие от существующих методов, сосредоточенных на коротких видеороликах (5-10 секунд), этот бенчмарк поддерживает единую оценку генерации из текста, изображения и видео. Оценочная система объединяет MLLM-ассистированные метрики с перцептивными и мультимодальными показателями качества, включая DINO-v2, ArcFace, CLIP и ImageBind, анализируя более 20 аспектов: качество сегментов, консистентность между сегментами, связность повествования и синхронизацию звука и видео. Экспериментальная валидация на 11 моделях с проверкой согласованности с человеческими оценками позволяет диагностировать ограничения современных систем генерации долгоформатного аудиовизуального контента.'}, 'en': {'title': 'Evaluating Minute-Long Audio-Visual Generation with LongAV-Compass', 'desc': 'LongAV-Compass is a new benchmark designed to evaluate the quality of minute-long audio-visual generation across different types of media. It addresses the limitations of existing benchmarks that focus mainly on short clips and lack comprehensive evaluation methods for longer content. The benchmark includes a variety of test cases that assess how well generated audio and video maintain consistency and coherence over time. By integrating advanced metrics and human validation, LongAV-Compass helps identify the strengths and weaknesses of current audio-visual generation models.'}, 'zh': {'title': '分钟级音视频生成的新基准', 'desc': 'LongAV-Compass是一个全面的基准，用于评估多模态的分钟级音视频生成，重点在于质量、一致性和时间序列的对齐。现有的评估协议主要集中在短视频生成，而LongAV-Compass填补了这一空白，支持文本、图像和视频的统一评估。该基准包含284个经过精心策划的测试案例，涵盖了文本到音视频、图像到音视频和视频到音视频的生成。通过结合多种评估指标，LongAV-Compass为分析当前系统在生成一致、语义对齐和时间一致的分钟级音视频内容方面的局限性提供了实验平台。'}}}, {'id': 'https://huggingface.co/papers/2605.25893', 'title': 'D^2-Monitor: Dynamic Safety Monitoring for Diffusion LLMs via Hesitation-Aware Routing', 'url': 'https://huggingface.co/papers/2605.25893', 'abstract': "Abstract Diffusion large language models generate text through multi-step denoising processes that expose intermediate representations useful for safety monitoring, leading to the development of a bi-level safety monitor that dynamically routes computational resources based on hesitation detection.  AI-generated summary Despite the emergence of diffusion large language models (D-LLMs) as an alternative to autoregressive large language models (AR-LLMs), safety monitoring for D-LLMs remains largely unexplored. Unlike AR-LLMs, D-LLMs generate text through a multi-step denoising process, exposing intermediate hidden representations that may contain safety-relevant information unavailable in standard single-step monitoring setups. Motivated by the suitability of lightweight probes for always-on monitoring, we analyze which trajectory-level signals best indicate when such probes are likely to struggle. We find that the most informative signal is safety hesitation: intermediate hidden states repeatedly falling within a small margin of the probe's decision boundary. The number of such hesitation steps in D-LLM's trajectory predicts probe failure effectively, providing a proxy of sample difficulty. Building on this analysis, we propose D^2-Monitor, a bi-level safety monitor for D-LLMs. D^2-Monitor adopts a lightweight probe as an always-on monitor to jointly estimate hesitation and perform base classification. When the hesitation level exceeds a threshold, a more expressive but computationally heavier probe is activated. This dynamic routing mechanism allocates monitoring resources efficiently at test time. Evaluated on 3 datasets (WildguardMix, ToxicChat, OpenAI-Moderation) across 4 D-LLMs, D^2-Monitor achieves state-of-the-art performance with a compact parameter footprint (leq 0.85M parameters), and exhibits the best trade-off between effectiveness and efficiency relative to 8 baselines.", 'score': 31, 'issue_id': 2323, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '24f16f05a4bd0814', 'authors': ['Aoxi Liu', 'Yupeng Chen', 'James Oldfield', 'Guanzhe Hong', 'Junchi Yu', 'Baoyuan Wu', 'Philip Torr', 'Adel Bibi'], 'affiliations': ['The Chinese University of Hong Kong, Shenzhen', 'Torr Vision Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.25893.jpg', 'data': {'categories': ['#alignment', '#security', '#diffusion'], 'emoji': '🛡️', 'ru': {'title': 'Двухуровневый мониторинг безопасности для диффузионных языковых моделей через детектирование колебаний', 'desc': 'В этой работе исследуется проблема безопасности для диффузионных больших языковых моделей, которые генерируют текст через многошаговый процесс денoise. Авторы обнаружили, что промежуточные скрытые представления содержат важную информацию о безопасности, особенно сигнал «колебания» модели рядом с границей решения классификатора. На основе этого открытия предложена двухуровневая система мониторинга D²-Monitor, которая использует лёгкий зонд для постоянного контроля и динамически активирует более мощный зонд при высоком уровне колебания. Система достигает высокой производительности на нескольких датасетах с минимальным количеством параметров и обеспечивает оптимальный баланс между эффективностью и вычислительной нагруженностью.'}, 'en': {'title': 'Dynamic Safety Monitoring for Diffusion Models', 'desc': "This paper introduces D^2-Monitor, a bi-level safety monitoring system designed for diffusion large language models (D-LLMs). Unlike traditional autoregressive models, D-LLMs generate text through a multi-step denoising process, which reveals intermediate representations that can be useful for safety checks. The study identifies 'safety hesitation' as a key indicator of potential probe failure, allowing for dynamic resource allocation based on the model's confidence. By using a lightweight probe for continuous monitoring and activating a more complex probe when hesitation is detected, D^2-Monitor optimizes safety monitoring while maintaining efficiency across various datasets."}, 'zh': {'title': '动态路由，智能监控：D^2-Monitor的创新之路', 'desc': '这篇论文介绍了一种新的安全监控方法，称为D^2-Monitor，专门用于扩散大语言模型（D-LLMs）。D-LLMs通过多步骤去噪过程生成文本，这一过程产生的中间表示可以用于安全监控。研究发现，当模型在决策边界附近犹豫时，这种犹豫信号可以有效预测监控失败。D^2-Monitor通过动态路由机制，结合轻量级探针和重型探针，优化了监控资源的分配，提升了监控的效率和效果。'}}}, {'id': 'https://huggingface.co/papers/2605.26494', 'title': 'The MiniMax-M2 Series: Mini Activations Unleashing Max Real-World Intelligence', 'url': 'https://huggingface.co/papers/2605.26494', 'abstract': 'Abstract The MiniMax-M2 series introduces Mixture-of-Experts language models with minimal activated parameters that achieve high performance in agentic tasks through specialized training and deployment systems.  AI-generated summary We introduce the MiniMax-M2 series, a family of Mixture-of-Experts language models built around the principle that mini activations can unleash maximum real-world intelligence. The flagship M2 contains 229.9B total parameters with only 9.8B activated per token. Designed end-to-end for agentic deployment, the M2 series rests on three components: (i) agent-driven data pipelines producing large-scale, verifiable trajectories across agentic coding and agentic cowork, each grounded in an executable workspace and an artifact-aligned reward; (ii) Forge, a scalable agent-native RL system that adapts to long-horizon agent trajectories, paired with windowed-FIFO scheduling, prefix-tree merging, inference optimization, and a clean training-inference-agent decoupling that supports both white-box and black-box agents; (iii) the latest M2.7 checkpoint takes an early step toward self-evolution -- autonomously debugging training runs and modifying its own scaffold. Across M2 through M2.7, this combination translates a mini-activation footprint into frontier-tier performance on agentic coding, deep search, office-task, and reasoning benchmarks.', 'score': 24, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'bd9fa2a76bae7f0a', 'authors': ['MiniMax', ':', 'Aili Chen', 'Aonian Li', 'Baichuan Zhou', 'Bangwei Gong', 'Binyang Jiang', 'Boji Dan', 'Changqing Yu', 'Chao Wang', 'Cheng Ma', 'Cheng Zhong', 'Cheng Zhu', 'Chengjun Xiao', 'Chengyi Yang', 'Chengyu Du', 'Chenyang Zhang', 'Chi Zhang', 'Chuangyi Huang', 'Chunhao Zhang', 'Chunhui Du', 'Chunyu Zhao', 'Congchao Guo', 'Da Chen', 'Deming Ding', 'Dianjun Sun', 'Dongyu Zhang', 'Enhui Yang', 'Fei Yu', 'Guang Zheng', 'Guodong Zheng', 'Guohong Li', 'Haichao Zhu', 'Haigang Zhou', 'Haimo Zhang', 'Han Ding', 'Hao Zhang', 'Haohai Sun', 'Haolin Lyu', 'Haonan Lu', 'Haoyu Wang', 'Huajie Shi', 'Huiyang Li', 'Jiacheng Chen', 'Jian Zhang', 'Jiaqi Zhuang', 'Jiaren Cai', 'Jiaxin Pan', 'Jiayao Li', 'Jiayuan Song', 'Jichuan Zhang', 'Jie Wang', 'Jihao Gu', 'Jin Zhu', 'Jingwei Dong', 'Jingyang Li', 'Jingyu Zhang', 'Jingze Zhuang', 'Jinhao Tian', 'Jinli Liu', 'Jinyi Hu', 'Jun Tao', 'Jun Zhang', 'Junbin Ruan', 'Junhao Xu', 'Junjie Yan', 'Junteng Liu', 'Junxian He', 'Kang Xu', 'Ke Ji', 'Ke Yang', 'Kecheng Xiao', 'Keyu Duan', 'Keyu Li', 'Le Han', 'Letian Ruan', 'Li Yuan', 'Lianfei Yu', 'Liheng Feng', 'Lijie Mo', 'Lin Li', 'Lingye Bao', 'Lingyu Yang', 'Lingyuan Zhou', 'Loki', 'Lu Chen', 'Lunbin Ceng', 'Ming Li', 'Ming Zhong', 'Mingliang Tao', 'Mingyuan Chi', 'Mujie Lin', 'Nan Hu', 'Ningxin Chen', 'Peiyin Zhu', 'Peng Gao', 'Pengcheng Gao', 'Pengfei Li', 'Penglin Li', 'Pengyu Zhao', 'Qibin Ren', 'Qidi Xu', 'Qihan Ren', 'Qile Li', 'Qin Wang', 'Quanliang Chen', 'Qunhong Ceng', 'Rong Tian', 'Rui Dong', 'Ruitao Leng', 'Ruize Zhang', 'Shanqi Liu', 'Shaoyu Chen', 'Sheng Jia', 'Shun Yao', 'Shuoran Zhao', 'Shuqi Yu', 'Sichen Li', 'Sicheng Pan', 'Songquan Zhu', 'Tengfei Li', 'Tian Xie', 'Tiancheng Qin', 'Tianrun Liang', 'Wei Liu', 'Weiqi Xu', 'Weitao Li', 'Weixiang Chen', 'Weiyu Cheng', 'Weiyu Zhang', 'Wenhu Chen', 'Wenqian Zhao', 'Xiancai Chen', 'Xiangjun Song', 'Xiangyuan Wang', 'Xiao Luo', 'Xiao Su', 'Xiaobo Li', 'Xiaodong Han', 'Xiaojie Wu', 'Xihao Song', 'Xingyi Han', 'Xinyu Guan', 'Xuan Lu', 'Xun Zou', 'Xunhao Lai', 'Xutong Li', 'Yan Gong', 'Yang Wang', 'Yang Xu', 'Yangsen Wang', 'Ye Tang', 'Yicheng Chen', 'Yinran Qiu', 'Yiqi Shi', 'Yiting Guo', 'Yiwen Huang', 'Yixuan Wang', 'Yongyi Hu', 'Yu Gao', 'Yu Zhang', 'Yuanxiang Ying', 'Yuanzhen Zhang', 'Yubo Wang', 'Yuchen Song', 'Yufeng Yang', 'Yuhang Meng', 'Yuhang Miao', 'Yuhao Li', 'Yujie Liu', 'Yulin Hu', 'Yunan Huang', 'Yunji Li', 'Yunyi Huang', 'Yusen Zhang', 'Yusu Hong', 'Yutao Xie', 'Yutong Zhang', 'Yuwen Liao', 'Yuxuan Shi', 'Yuze Wenren', 'Zebin Li', 'Zehan Li', 'Zejian Luo', 'Zeyu Jin', 'Zeyuan Sun', 'Zhanpeng Zhou', 'Zhaochen Su', 'Zhendong Li', 'Zhengmao Zhu', 'Zhengyuan Peng', 'Zhenhua Fan', 'Zhi Zhang', 'Zhichao Xu', 'Zhiheng Lv', 'Zhikang Xu', 'Zhitao He', 'Zhiwei He', 'Zhongyuan Li', 'Zibo Gao', 'Zijia Wu', 'Zijian Song', 'Zijian Zhou', 'Zijun Sun', 'Zishan Huang', 'Ziying Chen', 'Ziyue Ge'], 'affiliations': ['MiniMax'], 'pdf_title_img': 'assets/pdf/title_img/2605.26494.jpg', 'data': {'categories': ['#reasoning', '#small_models', '#benchmark', '#agents', '#architecture', '#inference', '#rl', '#optimization', '#open_source', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Минимум активации — максимум интеллекта агентов', 'desc': 'Представлена серия MiniMax-M2 — языковые модели с архитектурой Mixture-of-Experts, которые активируют только 9.8B параметров из 229.9B общего числа на каждом токене. Модели специально обучены для агентных задач с помощью трёхкомпонентной системы: агент-ориентированные пайплайны данных, система обучения с подкреплением Forge для длинных горизонтов агентов, и самоэволюция через автоматическую отладку. Эффективная архитектура с минимальной активацией параметров позволяет достичь передовых результатов в задачах агентного кодирования, глубокого поиска и рассуждений. Система демонстрирует, что правильный дизайн архитектуры и обучения может компенсировать меньший размер модели на практических приложениях.'}, 'en': {'title': 'Maximize Intelligence with Minimal Activation', 'desc': 'The MiniMax-M2 series presents a new approach to language models using Mixture-of-Experts, which allows for minimal parameter activation while maintaining high performance in complex tasks. The flagship model, M2, boasts 229.9 billion parameters but activates only 9.8 billion per token, optimizing efficiency. It incorporates advanced systems for data processing and reinforcement learning, enabling it to handle long-term tasks effectively. Additionally, the M2.7 version introduces self-evolution capabilities, allowing the model to autonomously improve its training processes.'}, 'zh': {'title': '最小激活，最大智能', 'desc': 'MiniMax-M2系列引入了混合专家语言模型，这些模型通过最小化激活参数实现高效能，特别适用于智能任务。旗舰模型M2拥有2299亿个总参数，但每个token仅激活9.8亿个参数。该系列模型设计为端到端，包含三个主要组件：驱动数据管道的智能代理、可扩展的原生强化学习系统Forge，以及最新的M2.7检查点，具备自我进化能力。通过这种组合，MiniMax-M2系列在智能编码、深度搜索、办公任务和推理基准测试中展现出卓越的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.27030', 'title': 'Share More, Search Less: Collaborative Parallel Thinking for Efficient Test-Time Scaling', 'url': 'https://huggingface.co/papers/2605.27030', 'abstract': 'Abstract Collaborative Parallel Thinking (CPT) enables information sharing across parallel search branches during inference to reduce redundant exploration and improve efficiency in test-time scaling for language models.  AI-generated summary Test-Time Scaling (TTS) enhances the reasoning capabilities of large language models by allocating additional inference compute to explore the solution space. However, existing parallel TTS methods typically keep branches isolated during search: intermediate discoveries remain branch-private and cannot guide other branches in time. This information isolation causes substantial redundant exploration, as branches repeatedly rediscover information already found elsewhere and require more search steps to collect complete decision information needed to reach correct answers. To bridge this gap, we propose Collaborative Parallel Thinking (CPT), a training-free inference framework that enables search-time information sharing across parallel branches. CPT extracts compact intermediate information from ongoing branches, maintains a deduplicated query-level information pool, and broadcasts pool entries through the input context, allowing each branch in subsequent search steps to reuse discoveries made by other branches rather than rediscover the same information. Empirically, experiments on HMMT and AIME benchmarks show that CPT establishes a stronger accuracy--latency Pareto frontier than strong baselines across rollout budgets and model scales, highlighting search-time collaboration as an effective direction for efficient parallel TTS.', 'score': 21, 'issue_id': 2323, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'fa798a703f4660a2', 'authors': ['Xinglin Wang', 'Hao Lin', 'Shaoxiong Feng', 'Peiwen Yuan', 'Yiwei Li', 'Jiayi Shi', 'Yueqi Zhang', 'Chuyi Tan', 'Ji Zhang', 'Boyuan Pan', 'Yao Hu', 'Kan Li'], 'affiliations': ['School of Computer Science, Beijing Institute of Technology', 'Xiaohongshu Inc'], 'pdf_title_img': 'assets/pdf/title_img/2605.27030.jpg', 'data': {'categories': ['#inference', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Совместный поиск вместо изолированного: обмен знаниями между параллельными ветвями умозаключения', 'desc': 'Статья предлагает Collaborative Parallel Thinking (CPT) — метод для улучшения масштабирования тестовым временем в больших языковых моделях. Основная идея заключается в том, что при параллельном поиске решения различные ветви часто независимо переоткрывают одну и ту же информацию, что приводит к избыточным вычислениям. CPT решает эту проблему путём обмена промежуточными открытиями между ветвями поиска через единый пул информации, который передаётся в контекст для следующих шагов. Экспериментально показано, что этот подход без дополнительного обучения достигает лучшего компромисса между точностью и скоростью на сложных математических бенчмарках HMMT и AIME.'}, 'en': {'title': 'Enhancing Language Model Efficiency through Collaborative Thinking', 'desc': 'Collaborative Parallel Thinking (CPT) is a new method that improves how language models share information during their search processes. Instead of keeping discoveries private to each search branch, CPT allows branches to communicate and reuse findings, which reduces unnecessary repetition. This approach leads to faster and more efficient decision-making by minimizing the number of search steps needed to gather complete information. Experiments show that CPT outperforms existing methods in balancing accuracy and speed, making it a promising advancement in test-time scaling for language models.'}, 'zh': {'title': '协作并行思维：提升语言模型推理效率的关键', 'desc': '协作并行思维（CPT）是一种在推理过程中允许信息共享的框架，旨在减少冗余探索并提高语言模型的效率。通过在并行搜索分支之间共享信息，CPT能够避免重复发现已经找到的信息，从而减少搜索步骤。该方法不需要额外的训练，能够在推理时提取紧凑的中间信息，并通过输入上下文广播这些信息。实验结果表明，CPT在准确性和延迟之间建立了更强的平衡，展示了搜索时协作在高效并行测试时间缩放中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.17423', 'title': 'Soap2Soap: Long Cinematic Video Remaking via Multi-Agent Collaboration', 'url': 'https://huggingface.co/papers/2605.17423', 'abstract': 'Abstract A multi-agent framework called Soap2Soap is presented for long-horizon video-to-video generation that maintains narrative structure and character identity across extended sequences through consistent semantic backbone and visual reference anchors.  AI-generated summary We study series-level cinematic remaking, a long-horizon video-to-video generation problem that localizes full episodes or films via stylization or actor replacement while strictly preserving narrative structure, motion choreography, and character identity across hundreds of shots. Existing video generation and editing pipelines often break down in this regime due to compounding identity drift, background mutation, and semantic erosion under large camera motions and viewpoint changes. We propose Soap2Soap, a multi-agent framework that enforces long-term language-visual consistency through a Dual-Bridge Consistency mechanism: a scene-aware JSON screenplay serving as a persistent semantic backbone, and dynamically allocated visual reference anchors at both scene and shot levels. To suppress drift before video synthesis, we introduce batch keyframe consistency, jointly generating multiple keyframes in a shared latent context via a grid-based formulation. A closed-loop verification agent further audits identity, stability, and alignment to trigger selective regeneration. Experiments on SoapBench demonstrate strong improvements over commercial video generation APIs in long-term consistency and narrative fidelity.', 'score': 20, 'issue_id': 2321, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': '0536f3d408bb9178', 'authors': ['Yiren Song', 'Huilin Zhong', 'Kevin Qinghong Lin', 'Haofan Wang', 'Mike Zheng Shou'], 'affiliations': ['Lovart AI', 'Show Lab, National University of Singapore', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.17423.jpg', 'data': {'categories': ['#video', '#dataset', '#agents', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Сохранение идентичности в долгосрочной трансформации видео через многоагентную синхронизацию', 'desc': 'Статья представляет Soap2Soap — многоагентную систему для долгосрочной генерации видео на основе другого видео, которая сохраняет нарративную структуру и идентичность персонажей на протяжении сотен кадров. Основной вклад работы — механизм двойной консистентности, где JSON-сценарий служит семантическим остовом, а визуальные якоря динамически распределяются на уровне сцен и отдельных кадров. Для предотвращения дрейфа идентичности перед синтезом видео применяется групповая консистентность ключевых кадров через сетевую формулировку в общем латентном пространстве. Замкнутый верификационный агент проверяет идентичность, стабильность и соответствие нарративу, запуская избирательную регенерацию проблемных фрагментов.'}, 'en': {'title': 'Soap2Soap: Consistent Video Generation Across Long Narratives', 'desc': 'The paper introduces Soap2Soap, a multi-agent framework designed for generating long videos while keeping the story and characters consistent. It addresses challenges like identity drift and background changes that often occur in video generation. The framework uses a Dual-Bridge Consistency mechanism, which includes a JSON screenplay for maintaining semantic structure and visual anchors for reference. Additionally, it employs batch keyframe consistency and a verification agent to ensure the generated videos maintain high quality and narrative integrity.'}, 'zh': {'title': '长时间视频生成的新突破：Soap2Soap框架', 'desc': '本文提出了一种名为Soap2Soap的多智能体框架，用于长时间的视频生成，能够在扩展序列中保持叙事结构和角色身份的一致性。该框架通过双桥一致性机制，利用场景感知的JSON剧本作为持久的语义基础，并在场景和镜头层面动态分配视觉参考锚点。为了在视频合成前抑制身份漂移，本文引入了批量关键帧一致性，通过基于网格的形式共同生成多个关键帧。实验结果表明，Soap2Soap在长期一致性和叙事保真度方面显著优于现有的商业视频生成API。'}}}, {'id': 'https://huggingface.co/papers/2605.25979', 'title': 'LLaVA-OneVision-2: Towards Next-Generation Perceptual Intelligence', 'url': 'https://huggingface.co/papers/2605.25979', 'abstract': 'Abstract LLaVA-OneVision-2 achieves superior multimodal performance through codec-stream tokenization, windowed attention, and large-scale open supervision across video understanding, temporal grounding, and tracking tasks.  AI-generated summary We introduce LLaVA-OneVision-2 (LLaVA-OV-2), the most capable vision-language model in the LLaVA-OneVision series to date, achieving superior performance across a broad range of multimodal benchmarks. The model builds on a native OneVision-Encoder and incorporates Windowed Attention for efficient local computation while maintaining native resolution. Its key advance is codec-stream tokenization: it treats compressed video as a continuous bit-cost stream, where bit-cost dynamics determine adaptive temporal groups, and motion-residual cues select salient spatial evidence into compact visual canvases. This allocation concentrates a limited token budget on event-bearing content, enabling more stable long-video token compression than fixed groups of pictures. A shared 3D RoPE further places codec canvases, sampled frames, and images in a unified spatiotemporal coordinate system. Furthermore, we build the LLaVA-OV-2 data and training stack around large-scale open supervision: approximately 8M re-captioned video samples for pretraining, a 4M-sample spatial corpus for fine-tuning. We also introduce JumpScore, a temporal-localization benchmark targeting fine-grained grounding in high-frequency, densely repeated motion, a regime underrepresented by existing video evaluations. A standout capability of LLaVA-OV-2 is its unified perception across video understanding, temporal grounding, spatial grounding, and manipulation-trace reasoning. On JumpScore, LLaVA-OneVision-2-8B reaches 74.9 JumpScore mAP, surpassing Qwen3-VL-8B (30.1) by +44.8 points; under matched visual-token budgets on the same benchmark, codec-stream inputs improve temporal grounding over frame sampling by +9.7 points. Across standard benchmarks, LLaVA-OneVision-2-8B further outperforms Qwen3-VL-8B by +4.3 average points on video tasks, +5.3 on spatial tasks, and +15.6 average J&F on tracking tasks.', 'score': 16, 'issue_id': 2322, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '8d50270d126e95ea', 'authors': ['Xiang An', 'Yin Xie', 'Feilong Tang', 'Yunyao Yan', 'Huajie Tan', 'Didi Zhu', 'Changrui Chen', 'Xiuwei Zhao', 'Bin Qin', 'Kaicheng Yang', 'Yifei Shen', 'Yuanhan Zhang', 'Kaichen Zhang', 'Wenkang Zhang', 'Zheng Cheng', 'Nansen Zhang', 'Chunsheng Wu', 'Chunjiang Ge', 'Zimin Ran', 'Dehua Song', 'Chunyuan Li', 'Shikun Feng', 'Ming Hu', 'Zhangquan Chen', 'Junbo Niu', 'Bo Li', 'Ziyong Feng', 'Ziwei Liu', 'Zongyuan Ge', 'Jiankang Deng'], 'affiliations': ['AIM for Health Lab', 'Glint Lab', 'MVP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.25979.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#multimodal', '#architecture', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Адаптивная компрессия видео через кодек-потоковую токенизацию', 'desc': 'LLaVA-OneVision-2 — это многомодальная модель, которая объединяет видение и язык для понимания видео, временной локализации и отслеживания объектов. Ключевая инновация заключается в кодек-потоковой токенизации, которая адаптивно сжимает видео, концентрируя ограниченный бюджет токенов на событиях и движениях. Модель использует оконное внимание для эффективных локальных вычислений и единую пространственно-временную систему координат через 3D RoPE. Обучение проводилось на большом объёме открытых данных (8М переподписанных видеосэмплов и 4М пространственных примеров), что позволило достичь выдающихся результатов на всех многомодальных бенчмарках.'}, 'en': {'title': 'Revolutionizing Multimodal Understanding with LLaVA-OneVision-2', 'desc': "LLaVA-OneVision-2 is an advanced vision-language model that excels in multimodal tasks such as video understanding and temporal grounding. It utilizes codec-stream tokenization to efficiently process video data, allowing the model to focus on important content while managing token budgets effectively. The model's architecture includes Windowed Attention for localized computation, enhancing its ability to maintain high resolution during processing. With extensive training on millions of video samples, LLaVA-OV-2 demonstrates superior performance across various benchmarks, significantly outperforming previous models in both video and spatial tasks."}, 'zh': {'title': 'LLaVA-OneVision-2：视频理解的新标杆', 'desc': 'LLaVA-OneVision-2 是一种先进的多模态模型，能够在视频理解、时间定位和跟踪任务中表现出色。它采用了编码流标记化和窗口注意力机制，使得模型在处理视频时更加高效。通过大规模的开放监督，模型在预训练和微调阶段使用了大量的视频样本，从而提升了性能。LLaVA-OV-2 在多个基准测试中超越了其他模型，展现了其在视频理解和空间定位方面的强大能力。'}}}, {'id': 'https://huggingface.co/papers/2605.27102', 'title': 'JLT: Clean-Latent Prediction in Latent Diffusion Transformers', 'url': 'https://huggingface.co/papers/2605.27102', 'abstract': 'Abstract Latent diffusion models using clean-data prediction outperform velocity prediction in compressed representations, demonstrating that prediction targets are geometrically dependent rather than algebraically interchangeable.  AI-generated summary Flow matching with clean-data prediction has shown that regressing the clean point can exploit low-dimensional structure more effectively than predicting an ambient noised quantity. We ask whether this principle remains useful after images are mapped into a learned latent space, where compression has already removed much of the raw pixel variability. We introduce JLT, a 130M latent diffusion Transformer over frozen FLUX.2 VAE codes, and compare clean-latent prediction with a matched velocity-prediction DiT under the same representation, backbone, and training settings. Although the three variables x, epsilon, and v are linearly convertible for a fixed corruption time, a local Gaussian analysis shows that velocity regression inherits an isotropic target-covariance floor and amplifies low-variance latent directions, while clean prediction damps them. On ImageNet 256 x 256, JLT-B/1 obtains FID-50K 2.50 with classifier-free guidance, with a large matched-target gap over velocity prediction. These results suggest that prediction targets in latent diffusion are representation-dependent geometric choices, rather than interchangeable algebraic parameterizations.', 'score': 11, 'issue_id': 2325, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'be3a7d462ce393b9', 'authors': ['Funing Fu', 'Tenghui Wang', 'Junyong Cen', 'Qichao Zhu', 'Guanyu Zhou'], 'affiliations': ['Hangzhou Jiyi Artificial Intelligence Co., Ltd.', 'Independent Researcher', 'Wuhan University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.27102.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#cv', '#optimization', '#training'], 'emoji': '🎯', 'ru': {'title': 'Геометрия целей важнее алгебры: почему предсказание чистых данных превосходит предсказание скорости в скрытых представлениях', 'desc': 'В статье исследуется, почему диффузионные модели с предсказанием чистых данных (clean-data prediction) превосходят предсказание скорости (velocity prediction) в сжатом пространстве представлений. Авторы вводят JLT — диффузионную Transformer модель размером 130M параметров, которая работает с закодированными представлениями изображений из замороженного VAE. Анализ показывает, что несмотря на алгебраическую эквивалентность переменных x, epsilon и v при фиксированном уровне шума, геометрические свойства этих целей функций существенно отличаются: предсказание скорости усиливает низкодисперсионные направления, а предсказание чистых данных их подавляет. Полученные результаты демонстрируют, что выбор целевой переменной в диффузионных моделях зависит от геометрии представления, а не только от алгебраических свойств данных.'}, 'en': {'title': 'Unlocking Image Quality: Clean Prediction Triumphs in Latent Diffusion', 'desc': 'This paper explores the effectiveness of latent diffusion models in machine learning, particularly focusing on clean-data prediction versus velocity prediction in compressed representations. It highlights that the choice of prediction targets is influenced by geometric relationships rather than simple algebraic transformations. The authors introduce a new model, JLT, which utilizes a latent diffusion Transformer and demonstrates superior performance in generating images compared to traditional velocity prediction methods. The findings indicate that clean prediction is more effective in leveraging low-dimensional structures within the latent space, leading to better image quality metrics.'}, 'zh': {'title': '干净数据预测优于速度预测的几何依赖性', 'desc': '本论文探讨了潜在扩散模型在压缩表示中的预测性能，发现干净数据预测优于速度预测。研究表明，预测目标在几何上是依赖的，而不是代数上可互换的。我们引入了JLT模型，并在相同的表示和训练设置下比较了干净潜在预测与速度预测的效果。结果显示，干净预测在低维结构的利用上更为有效，且在ImageNet数据集上取得了显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.26952', 'title': 'Efficient Agentic Reinforcement Learning with On-Policy Intrinsic Knowledge Boundary Enhancement', 'url': 'https://huggingface.co/papers/2605.26952', 'abstract': "Abstract AKBE enhances LLM agent training by dynamically identifying when tools are needed versus when internal knowledge suffices, improving accuracy and reducing unnecessary tool usage through targeted supervisory signals.  AI-generated summary Agentic reinforcement learning (RL) has proven effective for training LLM-based agents with external tool-use capabilities. However, we identify that agentic RL training induces increasing redundant tool calls and blurs the model's intrinsic knowledge boundary, where the model fails to distinguish when tools are needed versus when parametric knowledge suffices. Existing solutions based on reward shaping create coarse-grained optimization targets that tend to incentivize indiscriminate tool-call suppression, leading to reward hacking. In this paper, we propose AKBE (Agentic Knowledge Boundary Enhancement), an on-policy method that dynamically probes the model's intrinsic knowledge boundary through dual-path (with-tool and no-tool) rollouts during training. We define the knowledge boundary as the per-instance determination of whether tools are required and the minimum tool calls necessary. By comparing correctness across paths, AKBE categorizes trajectories and constructs targeted supervisory signals that guide efficient tool-use patterns for each question. These signals are integrated seamlessly into the agentic RL training loop. Experiments on seven QA benchmarks demonstrate that AKBE improves task accuracy by +1.85 on average and reduces tool calls by 18% over standard agentic RL, yielding 25% higher tool productivity without any accuracy-efficiency trade-off. Further analysis suggests its plug-and-play compatibility across different RL algorithms and the mechanism of each signal category. Our code is available at https://github.com/CuSO4-Chen/AKBE.", 'score': 10, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '5605a9888d4f2c37', 'authors': ['Dingwei Chen', 'Zefang Zong', 'Zhipeng Ma', 'Leo Luo', 'Yang Li', 'Chengming Li', 'Peng Chen', 'Jie Jiang'], 'affiliations': ['MSU-BIT University', 'Tencent Inc', 'The Chinese University of Hong Kong Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2605.26952.jpg', 'data': {'categories': ['#reasoning', '#agents', '#rl', '#optimization', '#open_source', '#training'], 'emoji': '🎯', 'ru': {'title': 'Умное разграничение: когда полагаться на знания модели, а когда использовать инструменты', 'desc': 'В статье предлагается метод AKBE для улучшения обучения LLM-агентов с помощью обучения с подкреплением. Основная проблема заключается в том, что во время обучения агентов модель начинает избыточно использовать внешние инструменты и теряет способность различать, когда нужны инструменты, а когда достаточно собственных знаний. AKBE решает эту проблему через двусторонние примеры траекторий (с инструментами и без них), которые позволяют динамически определить границу между внутренними знаниями и необходимостью использования инструментов. Метод генерирует целевые сигналы обучения для каждого примера, что повышает точность на 1.85% и снижает количество вызовов инструментов на 18% без потери качества.'}, 'en': {'title': 'Optimizing Tool Use in LLM Training with AKBE', 'desc': "The paper introduces AKBE, a method that enhances the training of large language model (LLM) agents by effectively determining when to use external tools versus relying on internal knowledge. It addresses the issue of redundant tool usage in agentic reinforcement learning (RL) by dynamically probing the model's knowledge boundaries during training. By implementing dual-path rollouts, AKBE generates targeted supervisory signals that optimize tool usage for specific tasks. Experimental results show that AKBE improves accuracy and reduces unnecessary tool calls, leading to more efficient and productive agent performance."}, 'zh': {'title': '动态识别工具需求，提升模型效率', 'desc': 'AKBE（Agentic Knowledge Boundary Enhancement）是一种增强大语言模型（LLM）代理训练的方法。它通过动态识别何时需要工具以及何时可以依赖内部知识，来提高模型的准确性并减少不必要的工具使用。该方法通过双路径训练（有工具和无工具）来探测模型的知识边界，从而构建针对性的监督信号，指导高效的工具使用模式。实验结果表明，AKBE在七个问答基准上平均提高了1.85的任务准确率，并减少了18%的工具调用，显著提升了工具的生产力。'}}}, {'id': 'https://huggingface.co/papers/2605.26895', 'title': 'Negligible in Size, Significant in Effect: On Scale Vectors in Large Language Models', 'url': 'https://huggingface.co/papers/2605.26895', 'abstract': 'Abstract Scale vectors in LLMs significantly impact optimization despite minimal parameter count, with theoretical analysis and practical improvements showing enhanced training performance and scaling behavior.  AI-generated summary Normalization layers in modern large language models (LLMs) consist of a deterministic normalization operation and a learnable scale vector. While the normalization operation has been extensively studied, the scale vector remains poorly understood despite its ubiquitous use. In this work, we present a systematic study of scale vectors in LLMs from the perspectives of expressivity, optimization, and architectural structure. First, we show empirically that although scale vectors constitute only a negligible fraction of model parameters, removing them substantially degrades LLM pre-training. Our theory further shows that, in Pre-Norm architectures, scale vectors do not increase expressivity; instead, they improve optimization through a self-amplifying preconditioning effect on subsequent linear mappings. Second, we investigate the role of weight decay for scale vectors. By distinguishing Input-Norm and Output-Norm layers, we theoretically show that weight decay is beneficial for the former but harmful for the latter, due to their distinct roles in optimization and expressivity. Third, motivated by this understanding, we propose three lightweight and complementary improvements to scale vectors: branch-specific heterogeneity, improved placement around linear mappings, and magnitude-direction reparameterization. Both theory and experiments show that each improvement yields consistent gains. Finally, we combine these improvements into a unified scale-vector strategy and evaluate it through extensive LLM pre-training experiments on dense and mixture-of-experts models ranging from 0.12B to 2B parameters, across multiple optimizers and learning rate schedules, under industrial-scale token budgets. The unified strategy consistently achieves lower terminal loss than well-tuned baselines and exhibits more favorable scaling behavior, while adding negligible parameter and computational overhead.', 'score': 10, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '1fd9a19c0c19ee93', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#small_models', '#optimization', '#training', '#architecture'], 'emoji': '⚖️', 'ru': {'title': 'Маленькие векторы с большим влиянием: оптимизируем масштабирование в LLM', 'desc': 'В этой работе исследуются векторы масштабирования в больших языковых моделях (LLM), которые являются компонентами слоёв нормализации. Авторы показывают теоретически и экспериментально, что хотя эти векторы составляют малую долю параметров модели, они существенно влияют на оптимизацию обучения благодаря эффекту предобусловливания. Исследование выявило, что регуляризация (weight decay) по-разному влияет на разные типы слоёв нормализации, и предложены три улучшения: ветвевая гетерогенность, лучшее размещение и переопараметризация. Предложенная стратегия продемонстрировала улучшение качества обучения и масштабируемости на моделях размером от 120 млн до 2 млрд параметров с минимальными вычислительными затратами.'}, 'en': {'title': 'Unlocking Optimization: The Power of Scale Vectors in LLMs', 'desc': "This paper investigates the role of scale vectors in large language models (LLMs) and their impact on optimization and training performance. Despite being a small part of the model's parameters, the removal of scale vectors significantly harms pre-training effectiveness. The authors provide theoretical insights showing that in Pre-Norm architectures, scale vectors enhance optimization rather than expressivity by improving the conditioning of linear mappings. They also propose three enhancements to scale vectors, which collectively lead to better training outcomes without adding substantial computational costs."}, 'zh': {'title': '优化大型语言模型的尺度向量策略', 'desc': '在大型语言模型（LLMs）中，尺度向量对优化有显著影响，尽管其参数数量很少。本文系统研究了尺度向量的表达能力、优化和架构结构，发现去除尺度向量会显著降低预训练性能。我们提出了三种轻量级的改进方法，旨在优化尺度向量的使用，实验结果表明这些改进能有效提升模型性能。最终，我们将这些改进整合为统一的尺度向量策略，经过广泛的预训练实验验证了其优越性。'}}}, {'id': 'https://huggingface.co/papers/2605.27366', 'title': 'MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation', 'url': 'https://huggingface.co/papers/2605.27366', 'abstract': 'Abstract A skill-centric agent framework enables continuous improvement of task-solving capabilities through a unified lifecycle of skill creation, memory, management, evaluation, and refinement.  AI-generated summary Large language model (LLM) agents rely on reusable skills to solve complex tasks. However, existing skill creation approaches treat skills as isolated and static artifacts, limiting their reusability, reliability, and long-term improvement. We propose MUSE-Autoskill Agent (Memory-Utilizing Skill Evolution), a skill-centric agent framework that lets agents continuously improve their task-solving capability by creating, reusing, and refining skills under a unified lifecycle (creation, memory, management, evaluation, and refinement). Our framework enables agents to create skills on demand, store and reuse them across tasks, organize and select them efficiently, and evaluate them through unit tests and runtime feedback for continuous refinement. We further introduce skill-level memory that accumulates experience for each skill across tasks, enabling more effective reuse and adaptation over time. Experiments on SkillsBench provide initial evidence that lifecycle-managed skills can improve task success, efficiency, reuse, and cross-agent transfer, highlighting the importance of treating skills as long-lived, experience-aware, and testable assets.', 'score': 10, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '019b17a380899109', 'authors': ['Huawei Lin', 'Peng Li', 'Jie Song', 'Fuxin Jiang', 'Tieying Zhang'], 'affiliations': ['ByteDance Inc.', 'Rochester Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.27366.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Непрерывная эволюция переиспользуемых навыков агентов', 'desc': 'В статье предлагается фреймворк MUSE-Autoskill Agent для управления навыками агентов на основе больших языковых моделей. Система позволяет агентам создавать, сохранять, переиспользовать и постоянно улучшать навыки через единый жизненный цикл, включающий создание, управление памятью, организацию, оценку и доработку. Фреймворк вводит память на уровне навыков, которая накапливает опыт каждого навыка при решении различных задач, обеспечивая более эффективное переиспользование и адаптацию. Экспериментальные результаты показывают, что управление жизненным циклом навыков улучшает успешность решения задач, эффективность работы и возможность передачи навыков между агентами.'}, 'en': {'title': 'Empowering AI with Evolving Skills for Continuous Improvement', 'desc': 'The paper introduces the MUSE-Autoskill Agent framework, which focuses on the continuous improvement of task-solving skills in AI agents. Unlike traditional methods that treat skills as static and isolated, this framework allows for the dynamic creation, management, and refinement of skills throughout their lifecycle. It emphasizes the importance of skill-level memory, which helps agents accumulate experience and adapt skills for better performance over time. Experimental results show that this approach enhances task success and efficiency, demonstrating the value of viewing skills as long-term, adaptable resources.'}, 'zh': {'title': '技能驱动，持续进步的智能代理框架', 'desc': '本论文提出了一种以技能为中心的代理框架，旨在通过统一的技能生命周期（创建、记忆、管理、评估和改进）来持续提升任务解决能力。现有的技能创建方法将技能视为孤立和静态的产物，限制了其可重用性和长期改进。我们提出的MUSE-Autoskill代理框架允许代理根据需求创建、存储和重用技能，并通过单元测试和运行时反馈进行评估和持续改进。实验结果表明，生命周期管理的技能能够提高任务成功率、效率和跨代理转移，强调了将技能视为长期存在、经验丰富和可测试资产的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.27068', 'title': 'QUACK: Questioning, Understanding, and Auditing Communicated Knowledge in Multimodal Social Deduction Agents', 'url': 'https://huggingface.co/papers/2605.27068', 'abstract': "Abstract A multimodal social reasoning environment and evaluation framework called QUACK is introduced to audit the grounding of agent language through three-level assessment of game outcomes, behavioral trajectories, and utterance-level consistency.  AI-generated summary Social deduction games have become a popular testbed for probing reasoning, deception, coordination, and belief modeling in Large Language Model (LLM) agents. However, most environments are scored only by game outcomes such as win rates and largely remain to text-only interaction, making it difficult to tell whether an agent's language is actually grounded in what it perceived and did, or to identify the failure modes underlying its behavior. To address this gap, we introduce QUACK, an open-source environment and evaluation framework for auditing the grounding of agent language in multimodal social reasoning. QUACK evaluates agents at three levels: game outcomes, behavioral trajectories, and utterance-level consistency. Its core Statement Verification Pipeline reconstructs each agent's ground-truth trajectory from engine logs and checks every discussion claim against it, automatically flagging spatial hallucination, unsupported accusation, deception collapse, and language-action inconsistency. Evaluating three frontier VLMs in both homogeneous and cross-model adversarial settings, we find that even the strongest agent hallucinates 15.1% of its verifiable spatial claims and makes over half of its accusations without grounded evidence. We release the full engine, evaluation framework, toolkit, and logs at https://github.com/AAAAA-Academia-Attractions/QUACK.", 'score': 10, 'issue_id': 2325, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '44ea3d4817e67c10', 'authors': ['Ye Yuan', 'Rui Song', 'Weien Li', 'Zeyu Li', 'Haochen Liu', 'Xiangyu Kong', 'Changjiang Han', 'Yonghan Yang', 'Zichen Zhao', 'Zixuan Dong', 'Fuyuan Lyu', 'Bowei He', 'Haolun Wu', 'Jikun Kang', 'Xue Liu'], 'affiliations': ['MBZUAI - Mohamed bin Zayed University of Artificial Intelligence', 'McGill University', 'Mila - Quebec AI Institute', 'Salesforce', 'University of Cambridge', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2605.27068.jpg', 'data': {'categories': ['#multimodal', '#games', '#benchmark', '#reasoning', '#open_source', '#agents', '#dataset', '#hallucinations'], 'emoji': '🎭', 'ru': {'title': 'Аудит соответствия языка агентов реальным действиям в социальных рассуждениях', 'desc': 'Представлена система QUACK для оценки того, насколько хорошо большие языковые модели (LLM) агентов могут правильно описывать свои восприятия и действия в многомодальной среде социальных игр с элементами дедукции. Фреймворк проводит трёхуровневую оценку: результаты игры, поведенческие траектории и консистентность высказываний на уровне отдельных утверждений. Центральный компонент системы — Pipeline Верификации Утверждений — восстанавливает реальную траекторию действий агента из логов и проверяет каждое утверждение на галлюцинации, необоснованные обвинения и несогласованность между языком и действиями. Исследование показало, что даже лучшие VLM модели производят галлюцинации в 15,1% своих пространственных утверждений и делают более половины обвинений без фактических оснований.'}, 'en': {'title': 'QUACK: Auditing AI Language Grounding in Social Reasoning', 'desc': 'The paper introduces QUACK, a new framework designed to evaluate how well AI agents understand and use language in social deduction games. It assesses agents on three levels: the outcomes of the games they play, the paths they take during gameplay, and the accuracy of their spoken claims. This framework helps identify issues like when agents make false statements or fail to connect their language to their actions. By testing various advanced language models, the study reveals significant shortcomings in their ability to ground their language in reality, highlighting the need for better evaluation methods in AI reasoning.'}, 'zh': {'title': 'QUACK：审计智能体语言的多模态框架', 'desc': 'QUACK是一个多模态社交推理环境和评估框架，旨在审计智能体语言的基础。它通过游戏结果、行为轨迹和发言一致性三个层面进行评估，以确保智能体的语言与其感知和行为相一致。QUACK的核心是声明验证管道，它重建每个智能体的真实轨迹，并检查讨论中的每个声明，自动标记空间幻觉和不支持的指控等问题。通过对三种前沿视觉语言模型的评估，发现即使是最强的智能体也存在显著的语言与行为不一致问题。'}}}, {'id': 'https://huggingface.co/papers/2605.27141', 'title': 'VitaBench 2.0: Evaluating Personalized and Proactive Agents in Long-Term User Interactions', 'url': 'https://huggingface.co/papers/2605.27141', 'abstract': 'Abstract VitaBench 2.0 evaluates personalized and proactive agent behavior in long-term user interactions by requiring continuous extraction and updating of user preferences from fragmented interactions.  AI-generated summary Large language models (LLMs) have evolved into interactive agents that collaborate with users in real-world tasks. Effective collaboration in such settings increasingly depends on understanding the user beyond what is explicitly stated, as user intent is often reflected in fragmented daily interactions and requires both personalized modeling and proactive interaction. However, existing agent benchmarks primarily evaluate reasoning and tool use, largely overlooking the challenges of inferring and leveraging user preferences in realistic scenarios. To address this gap, we introduce VitaBench 2.0, a benchmark for evaluating personalized and proactive agent behavior in long-term user interactions. In VitaBench 2.0, tasks are organized as temporally ordered sequences for individual users, where preferences are embedded in fragmented and heterogeneous interactions. Successful completion of tasks requires the agent to continuously extract, utilize, and update user preferences from these interactions. We further evaluate proactiveness through tasks that require agents to recognize missing information and actively acquire it from users or environments before making decisions. To support systematic analysis, we provide an extensible memory interface that enables controlled comparison across different memory architectures. We
