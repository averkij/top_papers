AM adapts memory access based on the agent's current state, allowing for more effective decision-making. The framework has been tested across various tasks and consistently outperforms existing approaches, highlighting the importance of explicit memory modeling in enhancing agentic reasoning capabilities."}, 'zh': {'title': '状态自适应记忆：提升长时间自主推理的关键', 'desc': '长时间的自主推理需要一个状态自适应的记忆框架来动态管理交互历史。这个框架通过创建紧凑的记忆提示来增强推理能力，同时保留详细的轨迹以便于目标检索。现有的方法通常通过截断历史或压缩信息来处理长历史的问题，但没有明确建模如何根据代理的状态变化来访问过去的交互。我们提出的状态自适应记忆（SAM）框架能够有效整合交互信息，提供轻量级的记忆提示，帮助代理根据当前需求重建远程信息。'}}}, {'id': 'https://huggingface.co/papers/2605.26632', 'title': 'RT-Lynx: Putting the GEMM Sparsity In a Right Way for Diffusion Models', 'url': 'https://huggingface.co/papers/2605.26632', 'abstract': 'Abstract Diffusion Transformers achieve strong image generation performance but face high inference costs; this work proposes RT-Lynx, which uses activation sparsification and optimized CUDA kernels to accelerate inference while maintaining generation quality.  AI-generated summary Diffusion Transformers (DiT) achieve strong performance in image generation but incur substantial inference costs. While prior work has reduced this cost via quantization and distillation, semi-structured sparsity, which can nearly halve FLOPs, remains underexplored. A key reason is that most existing approaches focus on weight sparsification, and pruning 50% of the weights can remove critical model capacity and degrade generation quality. Our study, however, shows that DiT activations are intrinsically sparse and significantly more robust to N:M semi-structured sparsification than weights. Motivated by this observation, we advocate a paradigm shift from weight sparsification to activation sparsification. We propose RT-Lynx, which applies N:M sparsification to activations and incorporates error-compensation techniques to mitigate accuracy loss. We further implement highly optimized CUDA kernels tailored to this setting, achieving up to a 1.55x speedup on average in linear layers. Extensive experiments across multiple diffusion models demonstrate that our method preserves the generation quality of the original models while substantially accelerating inference.', 'score': 1, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '0342a77341cfb16d', 'authors': ['Xing Cong', 'Hanlin Tang', 'Kan Liu', 'Lan Tao', 'Lin Qu', 'Chenhao Xie'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.26632.jpg', 'data': {'categories': ['#optimization', '#architecture', '#inference', '#diffusion', '#cv'], 'emoji': '⚡', 'ru': {'title': 'От разреживания весов к разреживанию активаций: быстрые диффузионные трансформеры', 'desc': 'В работе предлагается RT-Lynx — метод ускорения инференса диффузионных трансформеров через разреживание активаций вместо весов модели. Авторы показывают, что активации диффузионных моделей по своей природе содержат много нулевых значений и гораздо устойчивее к N:M полуструктурированному разреживанию, чем веса. Метод включает технику компенсации ошибок для сохранения качества генерации при разреживании активаций, а также оптимизированные CUDA ядра для эффективного вычисления на GPU. Экспериментальные результаты показывают ускорение инференса до 1.55x без заметного снижения качества генерируемых изображений.'}, 'en': {'title': 'Accelerating Image Generation with Activation Sparsification', 'desc': 'This paper introduces RT-Lynx, a method designed to enhance the efficiency of Diffusion Transformers in image generation by focusing on activation sparsification instead of traditional weight sparsification. The authors highlight that activations in these models are naturally sparse and can withstand semi-structured sparsification without significantly degrading performance. By implementing optimized CUDA kernels, RT-Lynx achieves a notable speedup in inference times while maintaining the quality of generated images. The results show that this approach can nearly halve the computational load, making it a promising solution for faster image generation in machine learning applications.'}, 'zh': {'title': '加速推理，保持生成质量的RT-Lynx', 'desc': '本研究提出了一种名为RT-Lynx的方法，旨在加速扩散变换器（Diffusion Transformers）的推理过程，同时保持生成质量。通过对激活进行稀疏化和优化CUDA内核，RT-Lynx能够显著降低推理成本。与传统的权重稀疏化方法不同，我们发现激活本身具有内在的稀疏性，并且对N:M半结构稀疏化更具鲁棒性。实验结果表明，RT-Lynx在多个扩散模型上实现了推理速度的提升，同时保持了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2605.22769', 'title': 'Understanding Data Temporality Impact on Large Language Models Pre-training', 'url': 'https://huggingface.co/papers/2605.22769', 'abstract': 'Abstract Pre-training large language models on temporally ordered data improves their factual freshness and temporal precision compared to standard shuffled pre-training while maintaining general language understanding capabilities.  AI-generated summary Large language models (LLMs) are typically trained on shuffled corpora, yielding models whose knowledge is frozen at train time and whose temporal grounding remains poorly understood. In this work, we study the impact of pre-training dynamics on the acquisition of time-sensitive factual knowledge, focusing specifically on data ordering. Our main contributions are twofold. First, we introduce a comprehensive benchmark of over 7,000 temporally grounded questions and an evaluation protocol that enables analysis of whether models correctly associate facts with their corresponding time periods. Second, we pretrain 6B-parameter models on temporally ordered Common Crawl snapshots and compare them against standard shuffled pre-training. Our results show that sequentially trained models match shuffled baselines on general language understanding and common knowledge while consistently exhibiting more up-to-date and temporally precise knowledge. Temporally ordered pre-training yields improved factual freshness, while shuffled pre-training peaks on older data, possibly due to increased factual repetition. These findings, along with the release of our code at https://github.com/kyutai-labs/kairos , checkpoints, and datasets at https://huggingface.co/collections/kyutai/kairos provide a foundation for future research on continual learning for LLMs.', 'score': 1, 'issue_id': 2322, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '82658a25a2763862', 'authors': ['Hippolyte Pilchen', 'Romain Fabre', 'Franck Signe Talla', 'Patrick Perez', 'Edouard Grave'], 'affiliations': ['Kyutai, Paris'], 'pdf_title_img': 'assets/pdf/title_img/2605.22769.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#dataset', '#small_models', '#science', '#training'], 'emoji': '⏰', 'ru': {'title': 'Упорядочение времени в обучении: путь к более актуальным языковым моделям', 'desc': 'Исследование показывает, что предварительное обучение больших языковых моделей на временно упорядоченных данных улучшает их способность сохранять актуальную информацию и точность временной привязки фактов. Авторы создали бенчмарк из 7000+ вопросов с временной разметкой и протокол оценки для анализа того, как модели связывают факты с соответствующими временными периодами. При сравнении моделей, обученных на последовательно расположенных данных из снимков Common Crawl, с моделями на перемешанных данных, выяснилось, что последовательное обучение сохраняет общие языковые способности, но значительно улучшает свежесть и точность знаний о современных событиях. Результаты свидетельствуют о том, что временной порядок данных критически важен для развития более актуального и временно осведомленного поведения языковых моделей.'}, 'en': {'title': 'Temporal Training for Timely Truths', 'desc': 'This paper explores how pre-training large language models (LLMs) on data that is organized by time can enhance their ability to provide accurate and current information. By comparing models trained on temporally ordered data to those trained on shuffled data, the authors demonstrate that the former can maintain general language skills while offering more up-to-date factual knowledge. They introduce a new benchmark with over 7,000 questions that test models on their ability to link facts to specific time periods. The results indicate that training with a temporal focus leads to better factual freshness and precision, paving the way for advancements in continual learning for LLMs.'}, 'zh': {'title': '顺序预训练提升语言模型的时间感知能力', 'desc': '本研究探讨了在时间顺序数据上预训练大型语言模型的影响，发现这种方法能提高模型的事实新鲜度和时间精确性。与传统的随机预训练相比，顺序预训练的模型在语言理解和常识知识上表现相当，但在时间敏感的事实知识上更为准确。我们建立了一个包含7000多个时间相关问题的基准测试，并提出了一种评估协议，以分析模型是否能正确关联事实与其对应的时间段。研究结果表明，顺序预训练能显著改善模型的事实新鲜度，而随机预训练则在较旧数据上表现更佳，可能是由于事实重复的增加。'}}}, {'id': 'https://huggingface.co/papers/2605.27235', 'title': 'MRT: Masked Region Transformer for Layered Image Generation and Editing at Scale', 'url': 'https://huggingface.co/papers/2605.27235', 'abstract': 'Abstract A 20B-parameter masked region diffusion model enables scalable multi-layer transparent image generation and editing through unified task handling and efficient canvas management.  AI-generated summary Layered image generation and editing is a fundamental capability that enables layer-wise reuse, editing, and composition of generated visual content, analogous to word-level editing in natural language. Despite its importance, this remains an underexplored area at scale. To address this gap, we present MRT, a 20B-parameter masked region diffusion model tailored for multi-layer transparent image generation and editing, trained on over 10M multilingual design samples spanning diverse aspect ratios and textual prompts. To fully leverage this scale, we make two key technical contributions. First, we unify three complementary tasks including text-to-layers, image-to-layers, and layers-to-layers within a shared masked region diffusion framework, where selective token masking enables flexible layer-wise generation and editing. Second, to enable overflow layer generation, we introduce an overflow-aware canvas layer that handles boundary inconsistencies and supports semi-transparent background synthesis, enabling complete editable layers extending beyond visible canvas boundaries. Additionally, we apply diffusion distillation to achieve 8-step, real-time multi-layer generation with minimal quality degradation. Extensive experiments demonstrate that our framework substantially outperforms prior state-of-the-art approaches, including various commercial systems, across all three tasks, establishing a new benchmark for multi-layer transparent image generation. Notably, our model significantly outperforms the concurrent Qwen-Image-Layered model in image-to-layers quality according to user-study results, while achieving 10-100\\times faster inference and reducing activation GPU memory consumption by 50-90\\% during image-to-layer inference.', 'score': 0, 'issue_id': 2321, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '6e00dfd9435d0c04', 'authors': ['Zhicong Tang', 'Zhao Zhang', 'Jingye Chen', 'Mohan Zhou', 'Yifan Pu', 'Yuchi Liu', 'Yalong Bai', 'Ethan Smith', 'Yuhui Yuan'], 'affiliations': ['Canva Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.27235.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#inference', '#cv', '#multimodal', '#training'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для масштабируемого многослойного редактирования прозрачных изображений', 'desc': 'MRT — это диффузионная модель с 20 миллиардами параметров, предназначенная для генерации и редактирования многослойных прозрачных изображений. Модель объединяет три задачи (текст-в-слои, изображение-в-слои, слои-в-слои) в единую архитектуру на основе маскированной диффузии с селективным маскированием токенов для гибкого редактирования. Авторы введли слой холста, осведомленный о переполнении, который корректно обрабатывает граничные артефакты и полупрозрачные фоны, позволяя создавать редактируемые слои за границами видимого холста. С помощью дистилляции диффузии модель достигает генерации в реальном времени за 8 шагов, превосходя аналогичные системы в качестве и скорости вычислений.'}, 'en': {'title': 'Revolutionizing Multi-Layer Image Generation with MRT', 'desc': 'This paper introduces MRT, a 20B-parameter masked region diffusion model designed for scalable multi-layer transparent image generation and editing. It unifies three tasks—text-to-layers, image-to-layers, and layers-to-layers—using a shared framework that allows for flexible layer-wise manipulation through selective token masking. The model also features an overflow-aware canvas layer to manage boundary issues and support semi-transparent backgrounds, enhancing the editing capabilities. Extensive experiments show that MRT significantly outperforms existing methods in speed and quality, setting a new standard for multi-layer image generation.'}, 'zh': {'title': '多层透明图像生成的新标杆', 'desc': '本文介绍了一种名为MRT的20B参数的掩蔽区域扩散模型，专注于多层透明图像的生成和编辑。该模型通过统一处理文本到层、图像到层和层到层的任务，实现了灵活的层级生成和编辑。为了处理边界不一致性，模型引入了溢出感知画布层，支持半透明背景合成。实验结果表明，MRT在多层透明图像生成方面显著优于现有的最先进方法，设立了新的基准。'}}}];

            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (6)', '#agi', '#alignment', '#architecture (5)', '#audio (1)', '#benchmark (9)', '#cv (5)', '#data', '#dataset (10)', '#diffusion (3)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (5)', '#interpretability', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (8)', '#open_source (4)', '#optimization (4)', '#plp', '#rag', '#reasoning (4)', '#rl (5)', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models (4)', '#story_generation', '#survey (1)', '#synthetic (1)', '#training (8)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-27 06:58',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-27 06:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-27 06:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
