    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                titleSign.classList.remove('rotate');

        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.09759', 'title': 'ReflectWorld-MM: An Entity-Oriented Multimodal Memory System for Open-Ended Video Streams', 'url': 'https://huggingface.co/papers/2607.09759', 'abstract': 'Abstract  Building assistants that can continually watch the world, remember what they see, and reason over their accumulated experience is a long-standing goal, and recently multimodal agents equipped with long-term memory over video streams have attracted increasing interest. Unfortunately, existing systems either keep their memory inside the model context or in a flat feature store, and organize it around frames rather than around the persistent entities a stream is really about, which confines them to bounded videos and weakens their ability to track who and what reappears over time. In this paper, we propose ReflectWorld-MM, an entity-oriented multimodal memory system for open-ended video streams. It consists of three parts. The first is a perception front-end that turns an audiovisual stream into entity-resolved observations under a bounded short-term memory. The second is a hierarchical long-term memory, grounded in human memory theory, that couples a multi-scale episodic memory, an evolving entity-centric semantic memory, and a procedural memory. The third is a complete realization, built for real-world operation, that ingests arbitrary streams and plugs into off-the-shelf assistants. Across six long-video and lifelong-memory benchmarks, ReflectWorld-MM achieves the best accuracy on all six, outperforming strong memory agents and a frontier model.', 'score': 17, 'issue_id': 2711, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': '636c03e62b0c977d', 'authors': ['Xiaokang Ma', 'Yifan Sun', 'Zhihong Jin', 'Jie Gu', 'Yudong Luo', 'Shenyi Shao', 'Chu Tang', 'Jingmin Chen', 'Li Pu'], 'affiliations': ['Hangzhou Institute for Advanced Study, UCAS', 'Rightly Robotics', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.09759.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents', '#long_context', '#reasoning', '#audio', '#video'], 'emoji': '🎬', 'ru': {'title': 'Система памяти, ориентированная на сущности для понимания бесконечных видеопотоков', 'desc': 'В статье предлагается ReflectWorld-MM — система мультимодальной памяти, ориентированная на сущности для обработки видеопотоков неограниченной длины. Система состоит из трёх компонентов: фронтенда восприятия, который преобразует аудиовизуальный поток в наблюдения, разрешённые по сущностям, иерархической долгосрочной памяти, вдохновлённой теорией человеческой памяти и включающей эпизодическую, семантическую и процедурную память, а также полной реализации для работы в реальных условиях. Подход решает проблему существующих систем, которые хранят память либо в контексте модели, либо в плоском хранилище признаков, организованном по кадрам, что не позволяет эффективно отслеживать переиспользующиеся сущности на больших видео. На шести бенчмарках долгосрочной памяти система достигает лучшей точности, превосходя сильные базовые модели.'}, 'en': {'title': 'Revolutionizing Video Memory with Entity-Centric Tracking', 'desc': 'This paper introduces ReflectWorld-MM, a novel multimodal memory system designed for processing open-ended video streams. Unlike existing systems that store memory in a flat structure, ReflectWorld-MM organizes memory around persistent entities, enhancing its ability to track and reason about reappearing subjects over time. The system comprises a perception front-end for entity-resolved observations, a hierarchical long-term memory inspired by human memory theory, and a practical implementation for real-world applications. The results demonstrate that ReflectWorld-MM outperforms other memory agents across multiple benchmarks, showcasing its effectiveness in handling complex video data.'}, 'zh': {'title': '开放式视频流的智能记忆系统', 'desc': '本文提出了一种名为ReflectWorld-MM的多模态记忆系统，旨在处理开放式视频流。该系统通过一个感知前端将视听流转换为基于实体的观察，并结合了人类记忆理论构建的层次化长期记忆。ReflectWorld-MM包含多尺度的情节记忆、不断发展的以实体为中心的语义记忆和程序性记忆，能够更好地跟踪视频中的实体。实验结果表明，该系统在六个长期视频和终身记忆基准测试中表现优异，超越了其他强大的记忆代理和前沿模型。'}}}, {'id': 'https://huggingface.co/papers/2607.16850', 'title': 'Group Entropy-Controlled Policy Optimization', 'url': 'https://huggingface.co/papers/2607.16850', 'abstract': 'Abstract  Entropy control has become an effective tool in reinforcement learning (RL) of large language models (LLMs), helping balance exploration-exploitation trade-off during alignment process. Such RL paradigm is often conducted on mixtures of heterogeneous tasks, which induce distinct entropy regimes under the same policy, making global or token-level entropy regulation insufficient to corresponding heterogeneous needs of exploration. This heterogeneity further makes GRPO-style normalized advantages induce an entropy-dependent bias, making advantage signals across prompt groups statistically non-comparable. To address this issue, we propose Group Entropy-Controlled Policy Optimization (GEPO), a lightweight extension to GRPO that uses group entropy, estimated from existing grouped samples to perform entropy-conditioned asymmetric advantage shaping. GEPO attenuates positive advantages in low-entropy groups to reduce over-exploitation, and negative advantages in high-entropy groups to preserve exploration, with adaptive thresholds derived from historical entropy statistics. Extensive experiments on two base models across thirteen benchmarks spanning mathematics, physics, science, code generation, and instruction following show that GEPO consistently outperforms GRPO and recent entropy-controlled methods, delivering balanced cross-task improvements while preserving task-specific exploration levels throughout training.', 'score': 16, 'issue_id': 2711, 'pub_date': '2026-07-18', 'pub_date_card': {'ru': '18 июля', 'en': 'July 18', 'zh': '7月18日'}, 'hash': 'dc06f63146e22554', 'authors': ['Guangran Cheng', 'Chengqi Lyu', 'Songyang Gao', 'Wenwei Zhang', 'Kai Chen'], 'affiliations': ['Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2607.16850.jpg', 'data': {'categories': ['#rlhf', '#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Балансировка исследования через контроль энтропии по группам задач', 'desc': 'В работе предлагается метод Group Entropy-Controlled Policy Optimization (GEPO), который расширяет алгоритм GRPO для обучения больших языковых моделей с подкреплением. Основная идея заключается в контроле энтропии на уровне групп задач, так как различные задачи требуют разных уровней exploration, что делает глобальный контроль энтропии неэффективным. GEPO использует асимметричное формирование сигналов advantage в зависимости от энтропии каждой группы: снижает положительные advantage в группах с низкой энтропией, чтобы избежать переобучения, и отрицательные advantage в группах с высокой энтропией, чтобы сохранить исследование. Экспериментальные результаты на тринадцати бенчмарках показывают, что GEPO последовательно превосходит GRPO и другие методы контроля энтропии, улучшая производительность на разнородных задачах при сохранении баланса exploration.'}, 'en': {'title': 'Optimizing Learning with Group-Specific Entropy Control', 'desc': 'This paper introduces Group Entropy-Controlled Policy Optimization (GEPO), a new method in reinforcement learning that improves how large language models learn from diverse tasks. It addresses the challenge of balancing exploration and exploitation by using group-specific entropy measures to adjust advantage signals during training. By modifying advantages based on the entropy levels of different task groups, GEPO helps prevent over-exploitation in low-entropy tasks and encourages exploration in high-entropy tasks. The results show that GEPO outperforms existing methods, leading to better performance across various benchmarks while maintaining effective exploration strategies.'}, 'zh': {'title': '群体熵控制，优化强化学习！', 'desc': '本文提出了一种新的强化学习方法，称为群体熵控制策略优化（GEPO），旨在解决大语言模型在处理异构任务时的探索与利用平衡问题。传统的熵调节方法在面对不同任务时效果不佳，导致优势信号在不同提示组之间无法比较。GEPO通过使用从现有样本中估计的群体熵，进行不对称的优势塑造，能够有效调节低熵组和高熵组的优势信号。实验结果表明，GEPO在多个基准测试中表现优于传统方法，能够在训练过程中保持任务特定的探索水平。'}}}, {'id': 'https://huggingface.co/papers/2607.18217', 'title': 'HOMIE: Human-object Centric Video Personalization via Multimodal Intelligent Enchancement', 'url': 'https://huggingface.co/papers/2607.18217', 'abstract': 'Abstract  Human-object centric video personalization (HOCVP) is a core task within subject-driven video generation. However, existing methods suffer from two key limitations. First, most approaches focusing on inter-subject personalization still struggle to strike a balance between high subject fidelity and accurate interaction patterns between humans and diverse objects, especially when objects represent abstract concepts such as logos. Second, while intra-subject references (e.g., OCR maps, multi-view inputs) are expected to enhance subject fidelity, most existing works lack mechanisms to understand such latent correspondence. To address both challenges, we propose HOMIE, an HOCVP framework that tackles both inter- and intra-subject input settings in a unified manner. Compared to previous approaches, HOMIE proposes a better MLLM integration strategy to extract knowledge of reference-level relationships without compromising the controllability of text encoders or incurring costly re-alignment. Specifically, we introduce global multimodal guidance within self-attention to better align MLLM-derived semantic features with VAE tokens. Furthermore, we propose modality-reference embedding to differentiate tokens from MLLM features and VAE tokens and associate intra-subject reference image tokens. Extensive experiments validate that our method achieves state-of-the-art performance across various HOCVP tasks. Project Page: https://yiyangcai.github.io/homie-page.github.io/', 'score': 15, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': 'd405dcee42656b65', 'authors': ['Yiyang Cai', 'Nan Chen', 'Rongchang Xie', 'Junwen Pan', 'Chunyang Jiang', 'Cheng Chen', 'Wen Zhou', 'Zhenbang Sun', 'Wei Xue', 'Wenhan Luo', 'Yike Guo'], 'affiliations': ['Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.18217.jpg', 'data': {'categories': ['#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Единый фреймворк для персонализованной генерации видео с взаимодействием человека и объектов', 'desc': 'Статья посвящена персонализации видео с сосредоточением на взаимодействии человека и объектов (HOCVP). Авторы предлагают HOMIE, фреймворк, который одновременно решает задачи межсубъектной и внутрисубъектной персонализации благодаря улучшенной интеграции мультимодальной большой языковой модели. Ключевая инновация заключается в использовании глобального мультимодального руководства в механизме self-attention для лучшего согласования семантических признаков, извлеченных моделью, с токенами VAE. Предложенный метод модальности-эмбеддинга помогает различать токены из разных источников и связывать их с внутрисубъектными эталонными изображениями, достигая лучших результатов на различных бенчмарках.'}, 'en': {'title': 'HOMIE: Unifying Personalization in Human-Object Video Generation', 'desc': 'The paper introduces HOMIE, a framework for Human-object centric video personalization (HOCVP) that improves the generation of videos tailored to individual subjects. It addresses two main challenges: achieving a balance between high fidelity to the subject and accurately modeling interactions with diverse objects, especially abstract ones like logos. HOMIE enhances the integration of multimodal large language models (MLLM) to better understand relationships between subjects and objects without losing control over text encoders. The proposed method includes global multimodal guidance and modality-reference embedding, leading to superior performance in HOCVP tasks compared to existing methods.'}, 'zh': {'title': 'HOMIE：统一的人-物视频个性化框架', 'desc': '人-物中心的视频个性化（HOCVP）是以主题驱动的视频生成中的一个核心任务。现有方法面临两个主要限制：一是难以在高主题保真度和人与多样物体之间的准确交互模式之间取得平衡，尤其是当物体代表抽象概念时；二是虽然期望通过内部主题参考来增强主题保真度，但大多数现有工作缺乏理解潜在对应关系的机制。为了解决这两个挑战，我们提出了HOMIE框架，统一处理内部和外部主题输入设置，并通过改进的MLLM集成策略和全局多模态引导来提升性能。'}}}, {'id': 'https://huggingface.co/papers/2607.17977', 'title': 'RynnBrain 1.1: Towards More Capable and Generalizable Embodied Foundation Model', 'url': 'https://huggingface.co/papers/2607.17977', 'abstract': 'Abstract  We present RynnBrain 1.1, a family of embodied foundation models spanning 2B, 9B, and 122B-A10B scales. Trained with a unified spatio-temporal and physically grounded framework, RynnBrain 1.1 supports embodied perception, spatial reasoning, localization, and planning. Compared with RynnBrain 1.0, it further introduces contact-point prediction across the model family and native 3D grounding for the 2B and 9B models, yielding representations and outputs that are more directly aligned with robot manipulation. We also develop RynnBrain-VLA with a unified cross-embodiment action space and embodiment-specific masking, and deploy it on Unitree G1, Astribot-S1, and Tianji-Wuji. RynnBrain 1.1 achieves strong results on embodied cognition, localization, and 3D grounding, with the 122B-A10B model outperforming all evaluated proprietary and open-source models on VSI-Bench, MMSI, and RefSpatial-Bench. Real-robot experiments show that RynnBrain-initialized policies outperform Qwen-based and representative generalist VLAs, while joint multi-task and multi-embodiment training improves process scores and success rates over per-task training.', 'score': 9, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '063066fcd018a5de', 'authors': ['Kehan Li', 'Bohan Hou', 'Minghao Zhu', 'Tianyi Zhang', 'Zesen Cheng', 'Zhikai Wang', 'Sicong Leng', 'Xin Li', 'Xiao Lin', 'Biying Yao', 'Minghua Zeng', 'Jiangpin Liu', 'Ronghao Dang', 'Jiayan Guo', 'Siteng Huang', 'Haoyu Zhao', 'Heng Ping', 'Yaxi Zhao', 'Kexiang Wang', 'Tong Lu', 'Shengke Xue', 'Jiahao Tang', 'Yulei Wang', 'Zejing Wang', 'Jianwei Gao', 'Shijian Lu', 'Chengju Liu', 'Jianfei Yang', 'Mingxiu Chen', 'Deli Zhao'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Hupan Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.17977.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#robotics', '#training', '#open_source', '#reasoning', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Универсальная робототехническая модель для воплощённого восприятия и манипуляции', 'desc': 'RynnBrain 1.1 — это семейство воплощённых foundation models размерами 2B, 9B и 122B параметров, обученных на едином пространственно-временном и физически обоснованном фреймворке для восприятия, пространственного рассуждения и планирования в робототехнике. Модель добавляет предсказание контактных точек и нативное 3D-позиционирование, что улучшает выравнивание представлений с задачами манипуляции роботов. RynnBrain-VLA использует унифицированное пространство действий для различных робототехнических платформ с механизмом маскирования, специфичным для каждого типа робота. Экспериментальные результаты показывают, что модели на основе RynnBrain превосходят конкурирующие системы в задачах воплощённого познания и демонстрируют преимущества мультизадачного и кроссплатформенного обучения.'}, 'en': {'title': 'RynnBrain 1.1: Advancing Robot Intelligence with Enhanced Spatial Awareness', 'desc': 'RynnBrain 1.1 is a new set of advanced models designed for robots, with sizes ranging from 2 billion to 122 billion parameters. These models are trained to understand and interact with their environment through a framework that combines spatial and temporal awareness. The latest version introduces features like predicting contact points and improved 3D grounding, making it better at tasks like manipulation and navigation. In tests, RynnBrain 1.1 outperformed other models in various benchmarks and showed superior performance in real-world robot tasks.'}, 'zh': {'title': 'RynnBrain 1.1：具身智能的新突破', 'desc': 'RynnBrain 1.1 是一系列具身基础模型，规模包括 2B、9B 和 122B-A10B。它采用统一的时空和物理基础框架进行训练，支持具身感知、空间推理、定位和规划。与 RynnBrain 1.0 相比，RynnBrain 1.1 引入了接触点预测和原生 3D 基础，使得模型在机器人操作中表现更佳。通过在 Unitree G1、Astribot-S1 和 Tianji-Wuji 上部署 RynnBrain-VLA，模型在具身认知、定位和 3D 基础方面取得了显著成果。'}}}, {'id': 'https://huggingface.co/papers/2607.18110', 'title': 'LLM-as-a-Coach: Experiential Learning for Non-Verifiable Tasks', 'url': 'https://huggingface.co/papers/2607.18110', 'abstract': "Abstract  Reinforcement learning (RL) on open-ended tasks compresses an LLM's rubric-based evaluation into a scalar reward, discarding rich textual feedback and conflating responses with distinct quality profiles. We propose Experiential Learning (EL), which repurposes the feedback model from an LLM-as-a-Judge into an LLM-as-a-Coach. The coach distills its assessment of each on-policy response into transferable experiential knowledge, which conditions a teacher model and is internalized by the policy through on-policy context distillation. Compared with scalar rewards, this higher-bandwidth feedback channel provides dense supervision and preserves fine-grained preferences among high-quality responses. Across two policy families, with feedback from the policy itself or a proprietary model, EL consistently outperforms rubric-based RL on held-out and unseen open-ended tasks. Notably, EL generalizes better beyond the training distribution, and mitigates reward hacking. These findings establish experiential knowledge as a richer and more generalizable learning signal for post-training on non-verifiable tasks.", 'score': 7, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': 'fa2bbf04e45dcdfc', 'authors': ['Tianzhu Ye', 'Li Dong', 'Guanheng Chen', 'He Zhu', 'Xun Wu', 'Shaohan Huang', 'Furu Wei'], 'affiliations': ['Microsoft Research', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.18110.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'От скалярных наград к опытному знанию: богатая обратная связь для обучения LLM', 'desc': 'В этой работе предлагается метод Experiential Learning (Опытное обучение) для улучшения обучения с подкреплением больших языковых моделей на открытых задачах. Вместо сжатия оценки модели-судьи в одно скалярное значение награды, авторы используют модель-тренер, которая предоставляет богатую текстовую обратную связь и сохраняет детальные предпочтения между высококачественными ответами. Метод основан на контекстной дистилляции, где накопленное опытное знание передается учителю и интернализируется политикой агента. Экспериментально показано, что этот подход превосходит традиционные методы RL на основе рубрик, лучше обобщается за пределы тренировочного распределения и снижает вероятность gaming награды.'}, 'en': {'title': 'Transforming Feedback: From Scalar Rewards to Experiential Learning', 'desc': 'This paper introduces Experiential Learning (EL), a new approach in reinforcement learning that enhances the feedback process for large language models (LLMs). Instead of using simple scalar rewards, EL utilizes a more complex feedback mechanism where the LLM acts as a coach, providing detailed assessments of responses. This method allows the model to learn from rich, nuanced feedback, improving its ability to generate high-quality outputs. The results show that EL not only outperforms traditional rubric-based reinforcement learning but also generalizes better to new tasks and reduces the risk of reward hacking.'}, 'zh': {'title': '体验学习：提升开放式任务的反馈质量', 'desc': '本文提出了一种新的强化学习方法，称为体验学习（Experiential Learning, EL），旨在改善开放式任务中的反馈机制。EL将大型语言模型（LLM）从评估者转变为教练，通过提炼对每个响应的评估，形成可转移的经验知识。与传统的标量奖励相比，这种方法提供了更丰富的反馈，能够更好地保留高质量响应之间的细微偏好。研究表明，EL在未见过的任务上表现更好，并且能够减少奖励黑客现象，证明了经验知识作为一种更丰富的学习信号。'}}}, {'id': 'https://huggingface.co/papers/2607.16900', 'title': 'Environment-free Synthetic Data Generation for API-Calling Agents', 'url': 'https://huggingface.co/papers/2607.16900', 'abstract': 'Abstract  Training API-calling large language model (LLM) agents demands massive amounts of high-quality trajectories. However, collecting such data at scale typically requires fully implemented environments with executable APIs and realistic, pre-populated backend databases, creating a major bottleneck for scalability. To overcome this, we propose an environment-free synthetic data generation approach that leverages LLMs as on-the-fly digital world models. Given only API specifications, our method generates trajectories mimicking interactions between an agent and a stateful environment. Specifically, an LLM first generates diverse tasks solvable with the provided APIs. A teacher agent then iteratively solves each task while an LLM simulator generates coherent synthetic API responses conditioned on the task context and simulation history. Finally, an LLM judge filters the trajectories to ensure the quality of the resulting dataset. We evaluate our approach on the challenging AppWorld and OfficeBench benchmarks, which include both information-retrieval and state-changing tasks. Fine-tuning models on our synthetic data yields significant performance gains, demonstrating that effective supervision for API-calling agents can be generated without any executable environment. Our results establish LLM-based API simulation as a practical, scalable solution for training agents across diverse API ecosystems.', 'score': 6, 'issue_id': 2711, 'pub_date': '2026-07-18', 'pub_date_card': {'ru': '18 июля', 'en': 'July 18', 'zh': '7月18日'}, 'hash': '9f1b34d6c6160663', 'authors': ['Seanie Lee', 'Sanjoy Chowdhury', 'Chao Jiang', 'Cheng-Yu Hsieh', 'Ting-Yao Hu', 'Alexander T Toshev', 'Oncel Tuzel', 'Raviteja Vemulapalli'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2607.16900.jpg', 'data': {'categories': ['#synthetic', '#dataset', '#data', '#agents', '#training', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'LLM-симуляторы как генераторы синтетических данных для агентов без реальных окружений', 'desc': 'Статья предлагает метод синтетического генерирования данных для обучения LLM-агентов без необходимости в реальных окружениях с исполняемыми API. Подход использует самих языковые модели в качестве имитаторов цифровых миров, которые по спецификациям API генерируют разнообразные задачи и правдоподобные ответы на запросы агента. Процесс включает трёхэтапный pipeline: генерация задач, итеративное решение с синтетическими ответами и фильтрация траекторий через LLM-судью для контроля качества. Экспериментальные результаты на бенчмарках AppWorld и OfficeBench показывают, что дообучение моделей на синтетических данных обеспечивает значительный прирост производительности при работе с API.'}, 'en': {'title': 'Synthetic Data Generation for Scalable LLM Training', 'desc': 'This paper presents a novel method for training large language model (LLM) agents without the need for fully implemented environments. It introduces an environment-free synthetic data generation approach that uses LLMs to create realistic trajectories based on API specifications. The process involves generating diverse tasks, simulating agent interactions, and filtering the resulting data to ensure quality. The proposed method shows significant performance improvements when fine-tuning models on synthetic data, proving its effectiveness for training API-calling agents in various contexts.'}, 'zh': {'title': '无环境合成数据生成，提升API调用代理训练效果', 'desc': '本文提出了一种无环境的合成数据生成方法，用于训练调用API的大型语言模型（LLM）代理。该方法利用LLM作为数字世界模型，仅根据API规范生成模拟代理与环境交互的轨迹。通过生成多样化的任务并使用教师代理逐步解决这些任务，LLM模拟器生成与任务上下文和历史相一致的合成API响应。我们的实验表明，使用这种合成数据进行微调可以显著提高模型性能，证明了在没有可执行环境的情况下也能有效生成API调用代理的监督数据。'}}}, {'id': 'https://huggingface.co/papers/2607.13365', 'title': 'DiffGI: Differentiable Geometry Images for High-Fidelity Thin-Shell 3D Generation', 'url': 'https://huggingface.co/papers/2607.13365', 'abstract': 'Abstract  Existing 3D generative models predominantly rely on implicit volumetric representations, which enforce watertight topology and struggle to represent thin-shell and non-manifold geometries such as garments. Geometry image-based approaches offer a surface-centric alternative, but existing methods rely on discrete binary occupancy maps whose resolution-dependent boundary encoding causes staircase artifacts and information loss upon downsampling, while surface reconstruction remains a non-differentiable post-processing step disconnected from the learning pipeline. To address this, we propose Differentiable Geometry Image (DiffGI), an end-to-end 3D-to-2D mapping framework that seamlessly integrates surface representation and geometric optimization. DiffGI replaces binary maps with a continuous 2D Truncated Signed Distance Function (TSDF), which encodes boundary position at subpixel precision within a fixed grid resolution, eliminating resolution-dependent staircase artifacts even under aggressive downsampling. Building on this continuous field, we introduce a differentiable Marching Squares algorithm based on analytical linear interpolation, allowing gradients from 3D surface losses to propagate back to the 2D latent space. Leveraging this differentiable pipeline, we train a DiffGI-VAE augmented with a geometry-aware normal rendering loss to compress complex 3D surfaces into an ultra-compact 32X32 latent space, and instantiate a transformer-based latent diffusion model with a flow-matching objective on top of this space for conditional 3D generation. Extensive experiments on garment and object datasets demonstrate that our method achieves superior reconstruction fidelity and boundary precision compared to prior geometry-image and voxel-based approaches, while requiring significantly fewer computational resources.', 'score': 5, 'issue_id': 2710, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '5b908a79d7ac6d23', 'authors': ['Eungjune Shim', 'Hansol Lee', 'Eunjung Ju'], 'affiliations': ['CLO Virtual Fashion Inc., South Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.13365.jpg', 'data': {'categories': ['#architecture', '#training', '#3d'], 'emoji': '👕', 'ru': {'title': 'Дифференцируемые геометрические образы для точной генерации тонкооболочечных 3D форм', 'desc': 'Работа предлагает DiffGI — фреймворк для трёхмерной генерации, который использует непрерывное 2D представление через усечённую функцию расстояния со знаком вместо дискретных бинарных карт, что устраняет артефакты при изменении разрешения. Авторы разработали дифференцируемый алгоритм Marching Squares на основе аналитической линейной интерполяции, позволяющий градиентам от 3D потерь пропагироваться обратно в 2D скрытое пространство. Модель DiffGI-VAE с геометрически-ориентированной функцией потерь сжимает сложные 3D поверхности в ультракомпактное 32×32 скрытое пространство, а трансформер-основанная модель диффузии с flow-matching объективом осуществляет условную 3D генерацию. Метод демонстрирует превосходное качество реконструкции и точность границ на данных одежды и объектов с меньшими вычислительными затратами.'}, 'en': {'title': 'Revolutionizing 3D Generation with Differentiable Geometry Images', 'desc': 'This paper introduces Differentiable Geometry Image (DiffGI), a novel framework for 3D generative modeling that improves upon traditional methods by integrating surface representation with geometric optimization. Unlike existing models that use binary occupancy maps, DiffGI employs a continuous 2D Truncated Signed Distance Function (TSDF) to achieve high precision in boundary encoding, thus avoiding common artifacts associated with downsampling. The framework includes a differentiable Marching Squares algorithm, enabling effective gradient propagation from 3D surface losses back to the 2D latent space, which enhances the learning process. The results show that DiffGI outperforms previous methods in terms of reconstruction quality and efficiency, particularly for complex geometries like garments.'}, 'zh': {'title': '可微分几何图像：提升3D生成模型的精度与效率', 'desc': '现有的3D生成模型主要依赖隐式体积表示，这种方法在表示薄壳和非流形几何形状（如衣物）时存在困难。几何图像方法提供了一种以表面为中心的替代方案，但现有方法依赖于离散的二进制占用图，这导致了分辨率依赖的阶梯伪影和下采样时的信息损失。为了解决这个问题，我们提出了可微分几何图像（DiffGI），它是一个端到端的3D到2D映射框架，能够无缝集成表面表示和几何优化。通过引入连续的2D截断符号距离函数（TSDF），我们消除了分辨率依赖的阶梯伪影，并通过可微分的Marching Squares算法实现了从3D表面损失到2D潜在空间的梯度传播。'}}}, {'id': 'https://huggingface.co/papers/2607.17247', 'title': 'Distilled Reinforcement Learning for LLM Post-training', 'url': 'https://huggingface.co/papers/2607.17247', 'abstract': 'Abstract  Large language model (LLM) post-training is essential for improving reasoning, adaptation, and alignment. Existing methods mainly follow two paradigms: reinforcement learning (RL) and on-policy distillation (OPD). However, RL relies on coarse-grained outcome supervision, resulting in difficult credit assignment and limited capability to acquire new knowledge. OPD, meanwhile, unconditionally matches teacher logits through KL divergence, which creates a dilemma: similar teachers provide little new knowledge, while substantially different teachers often yield ineffective guidance, largely restricting OPD to within-family distillation. We propose Distilled Reinforcement Learning (Distilled RL), which integrates teacher supervision into the RL objective to provide fine-grained guidance, selectively transfer new knowledge and avoid unconditional imitation. Distilled RL contains three components: reverse importance sampling with clipping, negative sample reset, and sequence-level geometric normalization. Through a concise and interpretable case study, we demonstrate that Distilled RL can effectively transfer previously unavailable knowledge from a teacher model to a student model. Extensive experiments across both within-family and cross-family distillation settings show that Distilled RL substantially outperforms standard RL and OPD in terms of both pass@1 and pass@k. Our code is available at https://github.com/597358816/Distilled-RL.', 'score': 3, 'issue_id': 2711, 'pub_date': '2026-07-19', 'pub_date_card': {'ru': '19 июля', 'en': 'July 19', 'zh': '7月19日'}, 'hash': '5290acc080cc0204', 'authors': ['Chen Wang', 'Zhaochun Li', 'Jionghao Bai', 'Yining Zhang', 'Hexuan Deng', 'Ge Lan', 'Yue Wang'], 'affiliations': ['Beijing Institute of Technology', 'College of Elite Engineers, Nankai University', 'College of Software, Nankai University', 'Harbin Institute of Technology', 'Institute of Automation, Chinese Academy of Sciences', 'Zhejiang University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2607.17247.jpg', 'data': {'categories': ['#transfer_learning', '#optimization', '#training', '#open_source', '#reasoning', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Мудрое наследование: дистилляция знаний через усиленное обучение', 'desc': 'В статье предлагается новый метод Distilled RL для постобучения больших языковых моделей, который объединяет преимущества reinforcement learning и knowledge distillation. Авторы решают проблему неэффективной передачи знаний между учителем и учеником, избегая как грубого назначения кредита в RL, так и безусловного подражания логитам в OPD. Метод включает три ключевых компонента: reverse importance sampling с clipping, reset отрицательных примеров и нормализацию на уровне последовательностей. Экспериментальные результаты показывают, что Distilled RL превосходит стандартные подходы как в семейной, так и в кросс-семейной дистилляции по метрикам pass@1 и pass@k.'}, 'en': {'title': 'Enhancing Knowledge Transfer in Language Models with Distilled RL', 'desc': 'This paper introduces a new method called Distilled Reinforcement Learning (Distilled RL) to enhance the performance of large language models (LLMs) after their initial training. Unlike traditional reinforcement learning (RL) and on-policy distillation (OPD), which face challenges in knowledge transfer and credit assignment, Distilled RL combines teacher supervision with RL objectives for more precise guidance. It employs techniques like reverse importance sampling and sequence-level normalization to effectively transfer knowledge from a teacher model to a student model. The results show that Distilled RL significantly outperforms existing methods in various distillation scenarios, demonstrating its potential for improving LLM capabilities.'}, 'zh': {'title': '蒸馏强化学习：提升知识转移的新方法', 'desc': '大型语言模型（LLM）的后训练对于提高推理、适应性和对齐性至关重要。现有方法主要有两种范式：强化学习（RL）和在线策略蒸馏（OPD）。然而，RL依赖粗粒度的结果监督，导致难以进行信用分配，并且获取新知识的能力有限。我们提出了蒸馏强化学习（Distilled RL），它将教师监督整合到RL目标中，以提供细粒度的指导，选择性地转移新知识，避免无条件模仿。'}}}, {'id': 'https://huggingface.co/papers/2607.16074', 'title': 'JoyNexus: Service-Oriented Multi-Tenant Post-Training for VLA Models', 'url': 'https://huggingface.co/papers/2607.16074', 'abstract': 'Abstract  The post-training of Vision-Language-Action (VLA) models is essential due to the diversity of simulators, robot embodiments, and task objectives. Existing compute services, whether offered as direct accelerator rental or batch-workload submission, typically allocate an exclusive set of GPU and CPU resources to a single tenant. While this paradigm maximizes client flexibility, it burdens users with infrastructure adaptation, and the fixed card-hour accounting model renders short or bursty workloads both expensive for tenants and inefficient for the service provider. To address these challenges, we present JoyNexus, a unified service for multi-tenant VLA supervised fine-tuning, reinforcement learning, and evaluation. JoyNexus decouples the Training Model Service, Inference Model Service, and Environment Service, each accessed through APIs and backed by resident shared base models with tenant-specific slots. Tenants can directly invoke high-level semantic APIs for training, rollout, and evaluation, or compose custom algorithms using lower-level APIs and their assigned endpoints. Multiple tenants submit workloads concurrently; their action modules, optimizers, rollout records, and policy versions remain isolated, and the service is scheduled by the global Training Queue and Inference Queue. To further improve multi-tenant training efficiency, JoyNexus introduces group batching for heterogeneous VLA data schemas that share a compatible model-facing prefix, enabling a single shared backbone forward pass over grouped samples. Finally, we evaluate JoyNexus through workload simulation and a group-batching pipeline in a realistic embodied scenario. Results show that, compared with isolated single-tenant execution, JoyNexus reduces aggregate GPU time and improves service utilization via cross-tenant scheduling on shared resources.', 'score': 2, 'issue_id': 2710, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '3efd39e7bc3d3f91', 'authors': ['Haoran Sun', 'Wentao Zhang', 'Junyang Hua', 'Hedan Yang', 'Yongjian Guo', 'Yifei Zhang', 'Xiaolong Xiang', 'Mingxi Luo', 'Jing Long', 'Chen Zhao', 'Chen Zhou', 'Wanting Xu', 'Qiming Yang', 'Hui Zhang', 'Song Wang', 'Xiaodong Bai', 'Shuai Di', 'Xu Chu', 'Xiaotie Deng', 'Yicheng Gong', 'Junwu Xiong'], 'affiliations': ['Beihang University', 'Beijing Institute of Technology', 'JDT AI Infra', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.16074.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal', '#inference', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Эффективная многопользовательская тонкая настройка моделей зрения-языка-действия через разделение ресурсов', 'desc': 'Статья представляет JoyNexus — унифицированный сервис для многопользовательской тонкой настройки моделей Vision-Language-Action (VLA) с использованием контролируемого обучения и обучением с подкреплением. Система разделяет сервисы обучения, инференса и окружения, предоставляя высокоуровневые API для обучения, развертывания и оценки, при этом каждый клиент имеет изолированные модули действий и версии политик. JoyNexus оптимизирует эффективность многопользовательского обучения через групповое батчинг для гетерогенных схем данных VLA, позволяя единому проходу базовой модели обрабатывать сгруппированные примеры. Экспериментальные результаты показывают, что система значительно снижает суммарное GPU-время и повышает утилизацию ресурсов по сравнению с изолированным исполнением на отдельных тенантов.'}, 'en': {'title': 'JoyNexus: Optimizing Multi-Tenant VLA Model Training', 'desc': "This paper introduces JoyNexus, a service designed to enhance the efficiency of training Vision-Language-Action (VLA) models in a multi-tenant environment. It addresses the challenges of resource allocation and cost associated with traditional compute services by decoupling various model services and allowing tenants to access them through APIs. JoyNexus enables concurrent workloads while keeping each tenant's data and processes isolated, thus improving resource utilization. Additionally, it implements group batching for similar data types, which optimizes the training process by reducing GPU time and enhancing overall service efficiency."}, 'zh': {'title': 'JoyNexus：提升多租户VLA模型训练效率的解决方案', 'desc': '本文介绍了一种名为JoyNexus的服务，旨在解决多租户视觉-语言-动作（VLA）模型的训练和评估问题。JoyNexus通过API解耦训练模型服务、推理模型服务和环境服务，使多个租户能够同时提交工作负载，并保持各自的模块和记录隔离。该服务引入了组批处理技术，以提高多租户训练的效率，允许共享模型的样本进行联合前向传播。实验结果表明，JoyNexus在共享资源上通过跨租户调度显著减少了GPU时间，提高了服务利用率。'}}}, {'id': 'https://huggingface.co/papers/2607.09655', 'title': 'OpenLongTail: Generative Scaling of Long-Tail Driving Data', 'url': 'https://huggingface.co/papers/2607.09655', 'abstract': 'Abstract  Scaling robust driving policies is fundamentally bottlenecked by the scarcity of edge cases in curated datasets. While the real world continuously captures these critical events, such long-tail events remain underutilized when collected from heterogeneous sources. Specifically, diverse but valuable in-the-wild long-tail videos lack the full view coverage required for training policy models, often missing multi-view poses or originating solely from monocular dash cameras. This modality gap prevents these ubiquitous observations from being converted into scalable training data for long-tail generalization. We introduce OpenLongTail, an open-source generative data engine for scaling autonomous driving policies under long-tail events. To transform heterogeneous data sources into view-aligned and temporally coherent multi-view assets that are useful for policy learning, we develop a pose-informed extrapolative view synthesis pipeline that generates the missing views. We further enhance cross-view consistency and the temporal alignment for the newly generated views by injecting Plücker ray geometry into the scalable generation engine. By synthesizing heterogeneous long-tail data, we observe a significant improvement in closed-loop driving robustness in handling long-tail events. By measuring the extrapolative view synthesis and pose metrics, we validate the effectiveness of OpenLongTail in visual fidelity, cross-view consistency, and ego-trajectory recovery.', 'score': 2, 'issue_id': 2711, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': '2567361884a5ada1', 'authors': ['Lulin Liu', 'Nuo Chen', 'Yan Wang', 'Bangya Liu', 'Wenyan Cong', 'Hezhen Hu', 'Boris Ivanovic', 'Hao Wang', 'Ziyao Zeng', 'Xinyu Gong', 'Yang Zhou', 'Zixiang Xiong', 'Dilin Wang', 'Zhangyang Wang', 'Weisong Shi', 'Ruohan Zhang', 'Marco Pavone', 'Zhiwen Fan'], 'affiliations': ['Adobe', 'Meta', 'NVIDIA', 'Stanford University', 'Texas A&M University', 'UT Austin', 'UW Madison', 'University of Delaware', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2607.09655.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#robotics', '#video'], 'emoji': '🚗', 'ru': {'title': 'Генерирование недостающих видов для обучения политик автономного вождения на редких событиях', 'desc': 'Статья представляет OpenLongTail — генеративный движок для масштабирования политик автономного вождения на редких граничных случаях. Авторы решают проблему нехватки полнообзорных видеоданных из разных источников, разработав конвейер синтеза видов на основе информации о позах, который генерирует недостающие перспективы. Для улучшения согласованности между видами и временной выравненности они внедряют геометрию Плюккера в масштабируемый движок генерации. Экспериментальные результаты показывают значительное повышение робастности замкнутого управления при обработке долгохвостовых событий.'}, 'en': {'title': 'Enhancing Autonomous Driving with OpenLongTail Data Synthesis', 'desc': 'The paper addresses the challenge of training robust driving policies using limited edge case data from curated datasets. It highlights the issue of underutilizing diverse long-tail videos collected from various sources, which often lack the necessary multi-view coverage for effective training. To overcome this, the authors introduce OpenLongTail, a generative data engine that synthesizes missing views from heterogeneous data, ensuring temporal coherence and cross-view consistency. The results demonstrate that this approach significantly enhances the robustness of autonomous driving systems in handling rare driving scenarios.'}, 'zh': {'title': '提升自动驾驶政策的长尾事件鲁棒性', 'desc': '本论文提出了OpenLongTail，这是一个开源的生成数据引擎，旨在提升自动驾驶政策在长尾事件下的鲁棒性。由于现有数据集中稀缺边缘案例，真实世界中的长尾事件未能充分利用。我们开发了一种基于姿态的外推视图合成管道，能够生成缺失的多视角图像，从而将异构数据源转化为可用于政策学习的视图对齐和时间一致的多视角资产。通过合成异构长尾数据，我们观察到在处理长尾事件时，闭环驾驶的鲁棒性显著提高。'}}}, {'id': 'https://huggingface.co/papers/2607.17524', 'title': 'Token-Level Off-Policy Learning for Faithful Generation Under Distribution Shift', 'url': 'https://huggingface.co/papers/2607.17524', 'abstract': 'Abstract  We propose Token-Level Off-Policy Labeling (TOPL), an off-policy training paradigm that reframes post-training as a token-level correctness prediction task. Our key intuition is that by training the model to distinguish good and bad tokens in a response, we naturally guide the model towards generating good tokens, while avoiding the pitfalls that come with directly training the model to generate off-policy tokens. Experiments on document summarization tasks show that TOPL achieves strong out-of-distribution generalization across 11 datasets against a diverse set of sequence-level and token-level baselines. We further demonstrate that TOPL transfers effectively to machine translation, suggesting that its benefits generalize across different faithful generation tasks. Through ablation studies, we confirm that our token-level learning signal is critical to good performance; sequence-level analogues do not confer similar benefits. Finally, we show that TOPL induces interpretable model updates: the LoRA adapters learned through TOPL function as linear classification heads and steering vectors.', 'score': 1, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '775b5f0e4e6dc92e', 'authors': ['Zitong Huang', 'Gustavo Lucas Carvalho', 'Deqing Fu', 'Robin Jia'], 'affiliations': ['University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2607.17524.jpg', 'data': {'categories': ['#transfer_learning', '#optimization', '#translation', '#interpretability'], 'emoji': '🎯', 'ru': {'title': 'Обучение на уровне токенов: различай хорошее от плохого', 'desc': 'В статье предлагается новый метод post-training, называемый Token-Level Off-Policy Labeling (TOPL), который переформатирует процесс обучения в задачу предсказания корректности отдельных токенов. Ключевая идея состоит в том, что обучение модели различать хорошие и плохие токены в ответе естественным образом направляет модель к генерации качественных токенов, избегая проблем прямого обучения на off-policy данных. Экспериментальные результаты показывают, что TOPL достигает сильной обобщаемости на out-of-distribution данных по 11 наборам текстов при суммаризации и эффективно переносится на задачу машинного перевода. Анализ показывает, что обучающий сигнал на уровне токенов критически важен для качественного результата, и индуцирует интерпретируемые обновления модели в виде линейных классификаторов.'}, 'en': {'title': 'Enhancing Token Quality for Better Model Performance', 'desc': 'The paper introduces Token-Level Off-Policy Labeling (TOPL), a new method for training models that focuses on predicting the correctness of individual tokens in generated responses. This approach helps the model learn to identify and produce good tokens while avoiding the challenges of directly generating off-policy tokens. Experiments demonstrate that TOPL significantly improves performance on document summarization tasks and shows strong generalization across various datasets. Additionally, the method is effective in machine translation and provides interpretable updates to the model, highlighting the importance of token-level learning signals for achieving better results.'}, 'zh': {'title': '标记级离策略标注：提升生成模型的有效性', 'desc': '我们提出了一种名为Token-Level Off-Policy Labeling（TOPL）的训练方法，它将后期训练重新定义为一个基于标记的正确性预测任务。我们的核心思想是，通过训练模型区分响应中的好标记和坏标记，自然引导模型生成好的标记，同时避免直接训练模型生成离策略标记所带来的问题。在文档摘要任务上的实验表明，TOPL在11个数据集上实现了强大的超出分布泛化能力，优于多种序列级和标记级的基线方法。我们还展示了TOPL在机器翻译中的有效迁移，表明其在不同的忠实生成任务中具有广泛的好处。'}}}, {'id': 'https://huggingface.co/papers/2607.18171', 'title': 'FlashRT: Agent Harness for Guiding Agents to Deploy Real-Time Multimodal Applications', 'url': 'https://huggingface.co/papers/2607.18171', 'abstract': 'Abstract  Real-time multimodal applications, including voice agents and interactive video generation, compose heterogeneous models into pipelines whose efficient deployment requires application-specific decisions about placement, streaming, and intra-model parallelism. Existing serving systems and auto-parallelism compilers commit to limited transformations and fixed workload assumptions, so achieving high performance on a new application requires hand-crafting an efficient implementation. We present FlashRT, an agent harness that guides coding agents to lift simple developer-written reference implementations into optimized multi-GPU deployments that flexibly weigh target metrics like latency and throughput. Using a new chain-of-program paradigm, FlashRT directs a generic coding agent through a multi-pass transformation process where an agent transforms the reference into an intermediate representation (IR) to capture data dependencies and persistent-state scopes, validates this IR via a sequential interpreter, and performs static analyses to identify candidate transformations. Then, the agent iteratively implements, verifies, and benchmarks each candidate under a measurement-gated optimization loop to produce effective deployments that span different hardware budgets. Across various applications, including video world models and multimodal LLMs, FlashRT converts reference implementations into highly efficient deployments, delivering up to ~70x latency reduction and 2.8x throughput improvement on NVIDIA B200 GPUs. On AMD MI355X GPUs, FlashRT matches the peak latency reduction while increasing peak throughput improvement to 3.6x, demonstrating that agent-driven optimization can be more scalable on platforms with less mature expert optimization. In fact, for Qwen3-Omni text-to-audio inference, FlashRT reduces response latency by 65% compared to the expert vLLM-Omni implementation on AMD MI355X.', 'score': 1, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': 'f2ae2a2a571b527d', 'authors': ['Krish Agarwal', 'Zhuoming Chen', 'Yanyuan Qin', 'Zhenyu Gu', 'Atri Rudra', 'Beidi Chen'], 'affiliations': ['AMD', 'Carnegie Mellon University', 'University at Buffalo'], 'pdf_title_img': 'assets/pdf/title_img/2607.18171.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#inference', '#agents', '#audio', '#video'], 'emoji': '⚡', 'ru': {'title': 'Агент-оптимизатор для эффективного развертывания мультимодальных ML-конвейеров', 'desc': 'FlashRT — это система для автоматической оптимизации развертывания мультимодальных приложений на нескольких GPU с помощью агента на основе языковой модели. Система преобразует простые эталонные реализации в оптимизированные многопроходные конвейеры, используя промежуточное представление для анализа зависимостей данных и области видимости состояния. Агент итеративно реализует, проверяет и бенчмаркирует кандидатов на преобразование в цикле оптимизации с измерением, достигая значительного снижения задержки и увеличения пропускной способности. Экспериментальные результаты показывают улучшение производительности до 70x для уменьшения задержки и 3.6x для увеличения пропускной способности на различных GPU-ускорителях.'}, 'en': {'title': 'Optimizing Multimodal Applications with FlashRT', 'desc': 'The paper introduces FlashRT, a system designed to optimize the deployment of multimodal applications by transforming simple reference implementations into efficient multi-GPU setups. It utilizes a chain-of-program paradigm where a coding agent iteratively refines the implementation through a multi-pass transformation process, focusing on metrics like latency and throughput. FlashRT captures data dependencies and validates intermediate representations to ensure effective optimization. The results show significant performance improvements, achieving up to 70 times latency reduction and 3.6 times throughput enhancement on various GPU platforms.'}, 'zh': {'title': 'FlashRT：实时多模态应用的智能优化工具', 'desc': '本文介绍了FlashRT，一个用于实时多模态应用的优化工具。它通过引导编码代理将简单的开发者参考实现提升为优化的多GPU部署，灵活考虑延迟和吞吐量等目标指标。FlashRT采用新的程序链范式，经过多次转换过程，生成中间表示（IR），并进行静态分析以识别候选转换。通过在不同硬件预算下的测量优化循环，FlashRT能够将参考实现转化为高效的部署，显著提高性能。'}}}, {'id': 'https://huggingface.co/papers/2607.18213', 'title': 'SWE-Pruner Pro: The Coder LLM Already Knows What to Prune', 'url': 'https://huggingface.co/papers/2607.18213', 'abstract': "Abstract  Pruning long context for coding agents has been a vital technology for efficient context management. While existing context pruning methods such as SWE-Pruner realize this by attaching a separate code classifier, we find the agent itself encodes internal representations indicating the relevance of code context when reading tool output. Based on this finding, we propose SWE-Pruner Pro, which prunes tool outputs directly inside the agent. Concretely, a small head turns the agent's own internal representations into a keep-or-prune label for each line, with a length-aware embedding keyed to each tool output's line count. Across two open-weight backbones and four multi-turn benchmarks, SWE-Pruner Pro saves up to 39% of prompt and completion tokens while preserving task quality, with bounded inference overhead. Notably, on MiMo-V2-Flash SWE-Pruner Pro additionally raises the SWE-Bench Verified resolve rate by +3.8% and the long-context Oolong accuracy by +2.2 points.", 'score': 1, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '3a67d07c8210eac9', 'authors': ['Yuhang Wang', 'Yuling Shi', 'Shaoqiu Zhang', 'Jialiang Liang', 'Shilin He', 'Siyu Ye', 'Yuting Chen', 'Kai Cai', 'Xiaodong Gu'], 'affiliations': ['Douyin Group', 'LLM4SE Lab, Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2607.18213.jpg', 'data': {'categories': ['#plp', '#benchmark', '#optimization', '#inference', '#agents', '#long_context'], 'emoji': '✂️', 'ru': {'title': 'Обрезка контекста из внутри: умная фильтрация кода для эффективных агентов', 'desc': 'В статье предлагается метод SWE-Pruner Pro для эффективного управления контекстом в агентах кодирования путём отсечения нерелевантных строк кода. Авторы обнаружили, что сам агент кодирует во внутренних представлениях информацию о релевантности кодового контекста, поэтому решили использовать эту информацию для обрезки. Небольшая головка модели преобразует внутренние представления агента в метки «сохранить-удалить» для каждой строки с учётом длины выходных данных инструмента. На практике метод сокращает затраты токенов на 39% при сохранении качества решения задач и даже улучшает точность на бенчмарках SWE-Bench Verified на 3.8%.'}, 'en': {'title': 'Efficient Context Management with SWE-Pruner Pro', 'desc': "This paper introduces SWE-Pruner Pro, a new method for efficiently managing context in coding agents by directly utilizing the agent's internal representations. Unlike previous methods that required a separate code classifier, SWE-Pruner Pro employs a small head to generate keep-or-prune labels for each line of tool output based on the agent's own understanding. The approach significantly reduces the number of tokens used in prompts and completions by up to 39%, while maintaining the quality of the tasks performed. Additionally, it improves performance metrics on specific benchmarks, demonstrating its effectiveness in long-context scenarios."}, 'zh': {'title': '高效上下文管理的新方法', 'desc': '本文提出了一种新的上下文剪枝技术，称为SWE-Pruner Pro，旨在提高编码代理的上下文管理效率。与现有方法不同，SWE-Pruner Pro直接在代理内部进行剪枝，利用代理自身的内部表示来判断代码上下文的相关性。通过一个小型头部，代理将内部表示转化为每行的保留或剪枝标签，并考虑到工具输出的行数。实验结果表明，SWE-Pruner Pro在保持任务质量的同时，能够节省多达39%的提示和完成令牌，并且在多个基准测试中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.17972', 'title': 'DiFA: Inference-Time Forward-Process Alignment for Diffusion Models', 'url': 'https://huggingface.co/papers/2607.17972', 'abstract': 'Abstract  The prevailing inference framework for diffusion models formulates generation fundamentally as a problem of numerical integration. This perspective casts the model as an exact estimator, neglecting the inherent statistical uncertainty of the denoising process. In this work, we propose Forward-Process Aligned Diffusion prediction (DiFA), a training-free framework that reframes inference-time data prediction refinement as a sequential state estimation problem. Rather than reusing past outputs solely for numerical integration, DiFA treats iterative data predictions along the reverse trajectory as correlated observations to build a forward-aligned temporal consensus. Inspired by Kalman filtering, this consensus aggregates historical predictions according to structural consistency and noise-level compatibility. To counteract the over-smoothing tendency of temporal consensus, we introduce a deviation guidance mechanism to adaptively preserve residual details. Empirically, DiFA yields significant improvements on CIFAR-10 and ImageNet across the evaluated metrics, including FID, IS, and FD-DINOv2, demonstrating that aligning inference with the forward statistical structure substantially improves generative fidelity.', 'score': 1, 'issue_id': 2711, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '7e537168897bc68f', 'authors': ['Shigui Li', 'Delu Zeng'], 'affiliations': ['School of Electronic and Information Engineering, South China University of Technology, Guangzhou, China', 'School of Mathematics, South China University of Technology, Guangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2607.17972.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Выравнивание вывода диффузионных моделей с прямым процессом для улучшения качества генерации', 'desc': 'В работе предложен новый метод вывода для диффузионных моделей, который переформулирует процесс генерации как задачу последовательного статистического оценивания вместо численного интегрирования. Авторы разработали Forward-Process Aligned Diffusion (DiFA) — фреймворк без дополнительного обучения, который использует исторические предсказания модели как коррелированные наблюдения для построения консенсуса в обратном процессе. Вдохновляясь фильтром Калмана, метод агрегирует предсказания в соответствии со структурной консистентностью и совместимостью уровней шума, а также использует механизм направляющего отклонения для сохранения деталей. На практике DiFA показывает значительные улучшения метрик FID, IS и FD-DINOv2 на датасетах CIFAR-10 и ImageNet.'}, 'en': {'title': 'Enhancing Diffusion Models with Forward-Process Alignment', 'desc': 'This paper introduces a new method called Forward-Process Aligned Diffusion prediction (DiFA) for improving the generation of data using diffusion models. Instead of treating the generation process as a simple numerical integration, DiFA views it as a sequential state estimation problem, which allows for better handling of uncertainty in predictions. By using a consensus approach inspired by Kalman filtering, DiFA combines past predictions to enhance the accuracy of current outputs while maintaining important details. The results show that DiFA significantly enhances the quality of generated images on datasets like CIFAR-10 and ImageNet, indicating that aligning the inference process with statistical structures leads to better generative performance.'}, 'zh': {'title': '前向对齐，提升生成质量！', 'desc': '本论文提出了一种新的扩散模型推理框架，称为前向过程对齐扩散预测（DiFA）。该方法将推理过程视为一个序列状态估计问题，而不是简单的数值积分。DiFA通过将历史预测视为相关观察，构建一个前向对齐的时间共识，从而提高生成数据的质量。通过引入偏差引导机制，DiFA能够有效保留细节，实验证明在CIFAR-10和ImageNet数据集上显著提升了生成效果。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (4)', '#agi', '#alignment', '#architecture (2)', '#audio (2)', '#benchmark (2)', '#cv', '#data (1)', '#dataset (2)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (3)', '#optimization (4)', '#plp (1)', '#rag', '#reasoning (3)', '#rl (4)', '#rlhf (1)', '#robotics (3)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (7)', '#transfer_learning (2)', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        }

            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-21 05:15',lang=currentLang);

        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-21 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-21 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
