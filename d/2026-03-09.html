cialized experts across network layers. To ensure reliable routing, we introduce a Spherical Uniform Degradation Embedding with contrastive learning, which maps degradation representations onto a hypersphere to eliminate geometry bias in linear embedding spaces. In addition, a Global-Local Granularity Fusion (GLGF) module integrates global semantics and local degradation cues to address spatially non-uniform degradations and the train-test granularity gap. Experiments on three-task and five-task benchmarks demonstrate that SLER-IR achieves consistent improvements over state-of-the-art methods in both PSNR and SSIM. Code and models will be publicly released.', 'score': 1, 'issue_id': 1393, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '26e86d3b414f3716', 'authors': ['Peng Shurui', 'Xin Lin', 'Shi Luo', 'Jincen Ou', 'Dizhe Zhang', 'Lu Qi', 'Truong Nguyen', 'Chao Ren'], 'affiliations': ['Insta360 Research', 'Sichuan University', 'University of California San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.05940.jpg', 'data': {'categories': ['#cv', '#architecture', '#benchmark'], 'emoji': '🔧', 'ru': {'title': 'Специализированная маршрутизация экспертов для универсального восстановления изображений', 'desc': 'В статье предлагается SLER-IR — фреймворк для восстановления изображений с использованием специализированных экспертов, которые динамически активируются на разных слоях нейросети. Для надежной маршрутизации авторы разработали сферическое встраивание деградаций с контрастивным обучением, которое отображает представления деградаций на гиперсферу и устраняет геометрическое смещение в линейных пространствах. Модуль Global-Local Granularity Fusion интегрирует глобальную семантику и локальные признаки деградации для обработки пространственно неоднородных искажений. Экспериментальные результаты на бенчмарках с тремя и пятью задачами показывают превосходство SLER-IR по метрикам PSNR и SSIM.'}, 'en': {'title': 'Dynamic Expert Routing for Enhanced Image Restoration', 'desc': 'This paper presents SLER-IR, a novel framework for image restoration that utilizes a spherical layer-wise expert routing approach. It addresses the challenges of feature interference and expert specialization by dynamically activating specific experts in the network based on the type of image degradation. The framework employs a Spherical Uniform Degradation Embedding with contrastive learning to accurately represent different degradations, reducing bias in the embedding process. Additionally, the Global-Local Granularity Fusion module combines global and local information to effectively handle varying degradation patterns, leading to improved performance in image restoration tasks.'}, 'zh': {'title': '球形专家路由，提升图像恢复效果', 'desc': '本文提出了一种球形分层专家路由框架（SLER-IR），旨在有效地进行图像恢复，特别是在面对多种退化类型时。该框架通过动态激活网络层中的专门专家，解决了特征干扰和专家专业化不足的问题。我们引入了对比学习的球形均匀退化嵌入，以消除线性嵌入空间中的几何偏差。此外，全球-局部粒度融合模块（GLGF）结合了全局语义和局部退化线索，以应对空间上不均匀的退化问题。'}}}, {'id': 'https://huggingface.co/papers/2603.05888', 'title': 'PixARMesh: Autoregressive Mesh-Native Single-View Scene Reconstruction', 'url': 'https://huggingface.co/papers/2603.05888', 'abstract': 'Abstract PixARMesh enables end-to-end 3D indoor scene mesh reconstruction from single RGB images using a unified model with cross-attention and autoregressive token generation.  \t\t\t\t\tAI-generated summary We introduce PixARMesh, a method to autoregressively reconstruct complete 3D indoor scene meshes directly from a single RGB image. Unlike prior methods that rely on implicit signed distance fields and post-hoc layout optimization, PixARMesh jointly predicts object layout and geometry within a unified model, producing coherent and artist-ready meshes in a single forward pass. Building on recent advances in mesh generative models, we augment a point-cloud encoder with pixel-aligned image features and global scene context via cross-attention, enabling accurate spatial reasoning from a single image. Scenes are generated autoregressively from a unified token stream containing context, pose, and mesh, yielding compact meshes with high-fidelity geometry. Experiments on synthetic and real-world datasets show that PixARMesh achieves state-of-the-art reconstruction quality while producing lightweight, high-quality meshes ready for downstream applications.', 'score': 1, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '2cf9d6c112f137e1', 'authors': ['Xiang Zhang', 'Sohyun Yoo', 'Hongrui Wu', 'Chuan Li', 'Jianwen Xie', 'Zhuowen Tu'], 'affiliations': ['Lambda, Inc.', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.05888.jpg', 'data': {'categories': ['#3d', '#architecture', '#cv'], 'emoji': '🏠', 'ru': {'title': 'От одной фотографии к полной 3D сетке комнаты', 'desc': 'PixARMesh представляет собой метод реконструкции трёхмерных сеток внутренних сцен прямо из одного RGB изображения с использованием единой нейронной сети. Модель использует механизм кросс-внимания для объединения пиксель-выравненных признаков изображения с глобальным контекстом сцены и энкодером облаков точек. Система работает автрегрессивно, генерируя последовательность токенов, содержащих информацию о контексте, позе объектов и геометрии сетки в единой последовательности. Метод достигает лучших результатов при реконструкции и производит компактные, высокого качества сетки, готовые к использованию в практических приложениях.'}, 'en': {'title': 'Revolutionizing 3D Scene Reconstruction from Single Images', 'desc': 'PixARMesh is a novel approach for reconstructing 3D indoor scenes from a single RGB image using a unified model. It employs cross-attention and autoregressive token generation to predict both the layout and geometry of objects in one go, unlike previous methods that required separate steps. This method enhances spatial reasoning by integrating pixel-aligned image features with global scene context. The results demonstrate that PixARMesh produces high-quality, lightweight meshes suitable for various applications, achieving state-of-the-art performance in reconstruction tasks.'}, 'zh': {'title': '从单张图像重建3D场景的创新方法', 'desc': 'PixARMesh是一种新方法，可以从单张RGB图像中端到端地重建3D室内场景网格。与以往依赖隐式有符号距离场和后期布局优化的方法不同，PixARMesh在一个统一模型中同时预测物体布局和几何形状。该方法利用交叉注意力机制，将点云编码器与像素对齐的图像特征和全局场景上下文相结合，从而实现准确的空间推理。实验表明，PixARMesh在合成和真实数据集上都达到了最先进的重建质量，生成的网格轻量且高质量，适合后续应用。'}}}, {'id': 'https://huggingface.co/papers/2603.05607', 'title': 'DreamCAD: Scaling Multi-modal CAD Generation using Differentiable Parametric Surfaces', 'url': 'https://huggingface.co/papers/2603.05607', 'abstract': 'Abstract DreamCAD is a multi-modal generative framework that creates editable BReps from point-level supervision using parametric patches and differentiable tessellation, achieving superior geometric fidelity and user preference scores.  \t\t\t\t\tAI-generated summary Computer-Aided Design (CAD) relies on structured and editable geometric representations, yet existing generative methods are constrained by small annotated datasets with explicit design histories or boundary representation (BRep) labels. Meanwhile, millions of unannotated 3D meshes remain untapped, limiting progress in scalable CAD generation. To address this, we propose DreamCAD, a multi-modal generative framework that directly produces editable BReps from point-level supervision, without CAD-specific annotations. DreamCAD represents each BRep as a set of parametric patches (e.g., Bézier surfaces) and uses a differentiable tessellation method to generate meshes. This enables large-scale training on 3D datasets while reconstructing connected and editable surfaces. Furthermore, we introduce CADCap-1M, the largest CAD captioning dataset to date, with 1M+ descriptions generated using GPT-5 for advancing text-to-CAD research. DreamCAD achieves state-of-the-art performance on ABC and Objaverse benchmarks across text, image, and point modalities, improving geometric fidelity and surpassing 75% user preference. Code and dataset will be publicly available.', 'score': 1, 'issue_id': 1407, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'e463d9855282ff16', 'authors': ['Mohammad Sadil Khan', 'Muhammad Usama', 'Rolandos Alexandros Potamias', 'Didier Stricker', 'Muhammad Zeshan Afzal', 'Jiankang Deng', 'Ismail Elezi'], 'affiliations': ['DFKI', 'Huawei London Research Center', 'Imperial College London', 'RPTU, Kaiserslautern'], 'pdf_title_img': 'assets/pdf/title_img/2603.05607.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#3d'], 'emoji': '🎨', 'ru': {'title': 'От облаков точек к редактируемому дизайну: генерация CAD без аннотаций', 'desc': 'DreamCAD — это мультимодальная генеративная модель, которая создает редактируемые граничные представления (BRep) трёхмерных объектов прямо из облаков точек без необходимости в CAD-специфических аннотациях. Система представляет каждый BRep как набор параметрических поверхностей, таких как поверхности Безье, и использует дифференцируемую тесселяцию для генерации сеток. Это позволяет масштабировать обучение на больших наборах трёхмерных данных, сохраняя при этом возможность редактирования созданных поверхностей. Авторы также представили набор данных CADCap-1M с миллионом описаний объектов для развития текст-в-CAD синтеза, достигнув лучших результатов по геометрической точности и предпочтениям пользователей.'}, 'en': {'title': 'Revolutionizing CAD with Point-Level Supervision', 'desc': 'DreamCAD is a novel generative framework that creates editable Boundary Representations (BReps) from minimal point-level supervision, bypassing the need for extensive CAD-specific annotations. It utilizes parametric patches and a differentiable tessellation technique to ensure high geometric fidelity in the generated designs. The framework is trained on a large dataset of unannotated 3D meshes, allowing for scalable and efficient CAD generation. Additionally, DreamCAD introduces CADCap-1M, a comprehensive dataset for text-to-CAD research, significantly enhancing the performance of generative models in this domain.'}, 'zh': {'title': 'DreamCAD：从点级监督生成可编辑的CAD模型', 'desc': 'DreamCAD是一个多模态生成框架，可以从点级监督中创建可编辑的边界表示（BRep），使用参数化补丁和可微分的镶嵌技术，达到了优越的几何保真度和用户偏好评分。该框架解决了现有生成方法受限于小型标注数据集的问题，能够直接生成可编辑的BRep，而无需特定的CAD注释。DreamCAD通过将每个BRep表示为一组参数化补丁，并使用可微分的镶嵌方法生成网格，从而实现了大规模的3D数据集训练。我们还引入了CADCap-1M，这是迄今为止最大的CAD描述数据集，包含超过100万条使用GPT-5生成的描述，以推动文本到CAD的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.04738', 'title': 'IF-RewardBench: Benchmarking Judge Models for Instruction-Following Evaluation', 'url': 'https://huggingface.co/papers/2603.04738', 'abstract': "Abstract A comprehensive meta-evaluation benchmark for instruction-following is introduced, featuring a preference graph approach that enables listwise evaluation of judge models' ability to rank multiple responses, revealing deficiencies in current judge models and demonstrating stronger correlation with downstream task performance.  \t\t\t\t\tAI-generated summary Instruction-following is a foundational capability of large language models (LLMs), with its improvement hinging on scalable and accurate feedback from judge models. However, the reliability of current judge models in instruction-following remains underexplored due to several deficiencies of existing meta-evaluation benchmarks, such as their insufficient data coverage and oversimplified pairwise evaluation paradigms that misalign with model optimization scenarios. To this end, we propose IF-RewardBench, a comprehensive meta-evaluation benchmark for instruction-following that covers diverse instruction and constraint types. For each instruction, we construct a preference graph containing all pairwise preferences among multiple responses based on instruction-following quality. This design enables a listwise evaluation paradigm that assesses the capabilities of judge models to rank multiple responses, which is essential in guiding model alignment. Extensive experiments on IF-RewardBench reveal significant deficiencies in current judge models and demonstrate that our benchmark achieves a stronger positive correlation with downstream task performance compared to existing benchmarks. Our codes and data are available at https://github.com/thu-coai/IF-RewardBench.", 'score': 1, 'issue_id': 1401, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'ff44374469de97dc', 'authors': ['Bosi Wen', 'Yilin Niu', 'Cunxiang Wang', 'Xiaoying Ling', 'Ying Zhang', 'Pei Ke', 'Hongning Wang', 'Minlie Huang'], 'affiliations': ['The Conversational Artificial Intelligence (CoAI) Group, Tsinghua University', 'University of Electronic Science and Technology of China', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.04738.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#benchmark', '#alignment'], 'emoji': '📊', 'ru': {'title': 'От парного сравнения к ранжированию: новый стандарт оценки инструкция-ориентированных моделей', 'desc': 'В работе представлена комплексная мета-оценочная база данных IF-RewardBench для оценки способности больших языковых моделей следовать инструкциям. Авторы вводят граф предпочтений, который позволяет моделям-судьям ранжировать несколько ответов одновременно, а не просто сравнивать пары. Эксперименты показали, что существующие модели-судьи имеют значительные недостатки в оценке качества следования инструкциям. Предложенный подход демонстрирует более сильную корреляцию с производительностью на практических задачах по сравнению с существующими бенчмарками.'}, 'en': {'title': 'Revolutionizing Instruction-Following Evaluation with IF-RewardBench', 'desc': 'This paper introduces IF-RewardBench, a new benchmark designed to evaluate how well judge models can rank responses to instructions. It uses a preference graph approach that allows for a listwise evaluation, which is more effective than traditional pairwise methods. The study highlights the shortcomings of current judge models in instruction-following tasks and shows that IF-RewardBench correlates better with the performance of downstream tasks. By providing a more comprehensive evaluation framework, this benchmark aims to improve the feedback mechanisms for large language models.'}, 'zh': {'title': '全面提升指令跟随能力的评估基准', 'desc': '本文介绍了一种全面的指令跟随元评估基准，采用偏好图方法来评估评判模型对多个响应的排名能力。这种方法揭示了当前评判模型的不足之处，并显示出与下游任务性能的更强相关性。通过构建包含多个响应的偏好图，本文实现了列表评估范式，能够更好地指导模型的对齐。实验结果表明，现有的评判模型存在显著缺陷，而我们的基准在评估效果上优于现有的评估基准。'}}}, {'id': 'https://huggingface.co/papers/2603.01666', 'title': 'Beyond the Grid: Layout-Informed Multi-Vector Retrieval with Parsed Visual Document Representations', 'url': 'https://huggingface.co/papers/2603.01666', 'abstract': 'Abstract ColParse introduces a document parsing approach that generates layout-informed sub-image embeddings to create compact, structurally-aware representations for visual document retrieval, achieving over 95% storage reduction while maintaining performance.  \t\t\t\t\tAI-generated summary Harnessing the full potential of visually-rich documents requires retrieval systems that understand not just text, but intricate layouts, a core challenge in Visual Document Retrieval (VDR). The prevailing multi-vector architectures, while powerful, face a crucial storage bottleneck that current optimization strategies, such as embedding merging, pruning, or using abstract tokens, fail to resolve without compromising performance or ignoring vital layout cues. To address this, we introduce ColParse, a novel paradigm that leverages a document parsing model to generate a small set of layout-informed sub-image embeddings, which are then fused with a global page-level vector to create a compact and structurally-aware multi-vector representation. Extensive experiments demonstrate that our method reduces storage requirements by over 95% while simultaneously yielding significant performance gains across numerous benchmarks and base models. ColParse thus bridges the critical gap between the fine-grained accuracy of multi-vector retrieval and the practical demands of large-scale deployment, offering a new path towards efficient and interpretable multimodal information systems.', 'score': 1, 'issue_id': 1396, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b28a596d72f9f2a8', 'authors': ['Yibo Yan', 'Mingdong Ou', 'Yi Cao', 'Xin Zou', 'Shuliang Liu', 'Jiahao Huo', 'Yu Huang', 'James Kwok', 'Xuming Hu'], 'affiliations': ['Alibaba Cloud Computing', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2603.01666.jpg', 'data': {'categories': [], 'emoji': '📄', 'ru': {'title': 'Сжатие векторных представлений документов через структурное понимание макета', 'desc': 'ColParse представляет инновационный подход к поиску в визуальных документах, используя модель распознавания структуры для генерации компактных векторных представлений фрагментов документов. Метод учитывает информацию о макете страницы и объединяет локальные эмбеддинги подизображений с глобальным векторным представлением всей страницы. Предложенный алгоритм достигает сокращения требуемой памяти более чем на 95% без потери качества поиска, что решает проблему масштабируемости в системах многовекторного поиска. Экспериментальная оценка демонстрирует улучшение производительности на множестве бенчмарков, что делает метод практически применимым для больших систем мультимодального поиска информации.'}, 'en': {'title': 'Efficient Document Retrieval with Layout-Aware Embeddings', 'desc': 'ColParse is a new method for visual document retrieval that focuses on understanding the layout of documents, not just the text. It creates smaller, layout-informed sub-image embeddings that help in forming a compact representation of the document. This approach significantly reduces storage needs by over 95% while still improving retrieval performance. By combining these embeddings with a global vector, ColParse effectively addresses the challenges of multi-vector architectures in large-scale applications.'}, 'zh': {'title': 'ColParse：高效的视觉文档检索新方法', 'desc': 'ColParse是一种文档解析方法，通过生成布局信息的子图像嵌入，创建紧凑且结构化的表示，以用于视觉文档检索。该方法在保持性能的同时，实现了超过95%的存储减少，解决了现有多向量架构在存储方面的瓶颈。ColParse结合了局部的子图像嵌入和全局页面向量，形成了一种新的多向量表示。通过大量实验，ColParse在多个基准测试中显示出显著的性能提升，推动了多模态信息系统的高效和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2603.01193', 'title': 'Operator Learning Using Weak Supervision from Walk-on-Spheres', 'url': 'https://huggingface.co/papers/2603.01193', 'abstract': 'Abstract Neural PDE solvers trained with Monte Carlo-based weak supervision achieve improved accuracy, faster training, and reduced memory usage compared to traditional physics-informed methods.  \t\t\t\t\tAI-generated summary Training neural PDE solvers is often bottlenecked by expensive data generation or unstable physics-informed neural network (PINN) involving challenging optimization landscapes due to higher-order derivatives. To tackle this issue, we propose an alternative approach using Monte Carlo approaches to estimate the solution to the PDE as a stochastic process for weak supervision during training. Leveraging the Walk-on-Spheres method, we introduce a learning scheme called Walk-on-Spheres Neural Operator (WoS-NO) which uses weak supervision from WoS to train any given neural operator. We propose to amortize the cost of Monte Carlo walks across the distribution of PDE instances using stochastic representations from the WoS algorithm to generate cheap, noisy, estimates of the PDE solution during training. This is formulated into a data-free physics-informed objective where a neural operator is trained to regress against these weak supervisions, allowing the operator to learn a generalized solution map for an entire family of PDEs. This strategy does not require expensive pre-computed datasets, avoids computing higher-order derivatives for loss functions that are memory-intensive and unstable, and demonstrates zero-shot generalization to novel PDE parameters and domains. Experiments show that for the same number of training steps, our method exhibits up to 8.75times improvement in L_2-error compared to standard physics-informed training schemes, up to 6.31times improvement in training speed, and reductions of up to 2.97times in GPU memory consumption. We present the code at https://github.com/neuraloperator/WoS-NO', 'score': 1, 'issue_id': 1406, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'f98e7f1cc5043d00', 'authors': ['Hrishikesh Viswanath', 'Hong Chul Nam', 'Xi Deng', 'Julius Berner', 'Anima Anandkumar', 'Aniket Bera'], 'affiliations': ['E', 'Purdue University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.01193.jpg', 'data': {'categories': ['#math', '#training'], 'emoji': '🚶', 'ru': {'title': 'Прогулка по сферам: дешёвая супервизия для нейронных решателей уравнений', 'desc': 'В статье предложен новый метод обучения нейронных операторов для решения дифференциальных уравнений в частных производных, основанный на слабой супервизии через методы Монте-Карло. Авторы используют алгоритм Walk-on-Spheres для генерации дешёвых и шумных оценок решений, избегая вычисления дорогостоящих производных высоких порядков. Предложенный подход не требует предварительно вычисленных датасетов и демонстрирует нулевую обобщающую способность на новые параметры и области определения. Эксперименты показывают значительное улучшение точности (до 8.75 раза), скорости обучения (до 6.31 раза) и снижение потребления памяти GPU (до 2.97 раза) по сравнению с традиционными физико-информированными методами.'}, 'en': {'title': 'Revolutionizing Neural PDE Solvers with Monte Carlo Weak Supervision', 'desc': 'This paper introduces a new method for training neural PDE solvers using Monte Carlo-based weak supervision, which enhances accuracy and efficiency. The proposed Walk-on-Spheres Neural Operator (WoS-NO) leverages stochastic processes to provide weak supervision, allowing for effective training without the need for expensive datasets. By avoiding the computation of higher-order derivatives, the method reduces memory usage and stabilizes the optimization process. Experimental results demonstrate significant improvements in error rates, training speed, and memory consumption compared to traditional physics-informed neural networks.'}, 'zh': {'title': '利用弱监督提升神经PDE求解器的效率与准确性', 'desc': '本文提出了一种新的神经偏微分方程（PDE）求解器训练方法，利用基于蒙特卡洛的弱监督来提高准确性和训练速度，同时减少内存使用。通过Walk-on-Spheres方法，我们引入了一种称为Walk-on-Spheres神经算子（WoS-NO）的学习方案，利用弱监督来训练神经算子。该方法通过随机表示来降低蒙特卡洛步行的成本，生成便宜且噪声较大的PDE解的估计。实验结果表明，与传统的物理信息训练方案相比，我们的方法在L_2误差、训练速度和GPU内存消耗上均有显著改善。'}}}, {'id': 'https://huggingface.co/papers/2603.05630', 'title': 'Making Reconstruction FID Predictive of Diffusion Generation FID', 'url': 'https://huggingface.co/papers/2603.05630', 'abstract': 'Abstract A new metric called interpolated FID is proposed that shows strong correlation with generation FID in diffusion models, addressing the poor correlation issue between reconstruction FID and generation FID.  \t\t\t\t\tAI-generated summary It is well known that the reconstruction FID (rFID) of a VAE is poorly correlated with the generation FID (gFID) of a latent diffusion model. We propose interpolated FID (iFID), a simple variant of rFID that exhibits a strong correlation with gFID. Specifically, for each element in the dataset, we retrieve its nearest neighbor (NN) in the latent space and interpolate their latent representations. We then decode the interpolated latent and compute the FID between the decoded samples and the original dataset. Additionally, we refine the claim that rFID correlates poorly with gFID, by showing that rFID correlates with sample quality in the diffusion refinement phase, whereas iFID correlates with sample quality in the diffusion navigation phase. Furthermore, we provide an explanation for why iFID correlates well with gFID, and why reconstruction metrics are negatively correlated with gFID, by connecting to results in the diffusion generalization and hallucination. Empirically, iFID is the first metric to demonstrate a strong correlation with diffusion gFID, achieving Pearson linear and Spearman rank correlations approximately 0.85. The source code is provided in https://github.com/tongdaxu/Making-rFID-Predictive-of-Diffusion-gFID.', 'score': 0, 'issue_id': 1395, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a17354a27061fab7', 'authors': ['Tongda Xu', 'Mingwei He', 'Shady Abu-Hussein', 'Jose Miguel Hernandez-Lobato', 'Haotian Zhang', 'Kai Zhao', 'Chao Zhou', 'Ya-Qin Zhang', 'Yan Wang'], 'affiliations': ['Kuaishou Technology', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.05630.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#open_source', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'От реконструкции к поколению: метрика интерполяции для диффузионных моделей', 'desc': 'В статье предлагается новая метрика под названием interpolated FID (iFID), которая показывает сильную корреляцию с FID поколения в диффузионных моделях. Авторы решают проблему плохой корреляции между FID реконструкции и FID поколения, используя интерполяцию латентных представлений соседних примеров из набора данных. Показано, что FID реконструкции коррелирует с качеством образцов на этапе уточнения, тогда как iFID коррелирует с качеством на этапе навигации диффузии. Впервые предложена метрика, достигающая корреляции Пирсона и ранговой корреляции Спирмена около 0.85 с generation FID диффузионных моделей.'}, 'en': {'title': 'Interpolated FID: Bridging the Gap Between Reconstruction and Generation Metrics', 'desc': 'This paper introduces a new metric called interpolated FID (iFID) that effectively measures the quality of generated images in diffusion models. It addresses the issue of poor correlation between reconstruction FID (rFID) and generation FID (gFID) by using nearest neighbor interpolation in the latent space. The authors demonstrate that iFID correlates strongly with gFID, achieving high Pearson and Spearman correlations, while rFID is shown to correlate poorly with gFID. The findings provide insights into the relationship between reconstruction metrics and sample quality during different phases of diffusion processes.'}, 'zh': {'title': '插值FID：提升扩散模型生成质量的关键指标', 'desc': '本文提出了一种新的度量标准，称为插值FID（iFID），它与扩散模型中的生成FID（gFID）具有很强的相关性，解决了重建FID（rFID）与生成FID之间的相关性差的问题。iFID是rFID的一个简单变体，通过在潜在空间中检索每个数据集元素的最近邻并插值其潜在表示来计算。研究表明，rFID与扩散精炼阶段的样本质量相关，而iFID与扩散导航阶段的样本质量相关。iFID是第一个展示与扩散gFID强相关性的度量，相关系数达到约0.85。'}}}, {'id': 'https://huggingface.co/papers/2603.05494', 'title': 'Censored LLMs as a Natural Testbed for Secret Knowledge Elicitation', 'url': 'https://huggingface.co/papers/2603.05494', 'abstract': 'Abstract Researchers examine dishonest responses in Chinese-developed large language models trained to censor sensitive topics, evaluating honesty elicitation and lie detection methods that show promise but do not fully eliminate false outputs.  \t\t\t\t\tAI-generated summary Large language models sometimes produce false or misleading responses. Two approaches to this problem are honesty elicitation -- modifying prompts or weights so that the model answers truthfully -- and lie detection -- classifying whether a given response is false. Prior work evaluates such methods on models specifically trained to lie or conceal information, but these artificial constructions may not resemble naturally-occurring dishonesty. We instead study open-weights LLMs from Chinese developers, which are trained to censor politically sensitive topics: Qwen3 models frequently produce falsehoods about subjects like Falun Gong or the Tiananmen protests while occasionally answering correctly, indicating they possess knowledge they are trained to suppress. Using this as a testbed, we evaluate a suite of elicitation and lie detection techniques. For honesty elicitation, sampling without a chat template, few-shot prompting, and fine-tuning on generic honesty data most reliably increase truthful responses. For lie detection, prompting the censored model to classify its own responses performs near an uncensored-model upper bound, and linear probes trained on unrelated data offer a cheaper alternative. The strongest honesty elicitation techniques also transfer to frontier open-weights models including DeepSeek R1. Notably, no technique fully eliminates false responses. We release all prompts, code, and transcripts.', 'score': 0, 'issue_id': 1400, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '59983c594429510c', 'authors': ['Helena Casademunt', 'Bartosz Cywiński', 'Khoi Tran', 'Arya Jakkli', 'Samuel Marks', 'Neel Nanda'], 'affiliations': ['Anthropic', 'CentraleSupélec', 'Harvard University', 'IDEAS Research Institute', 'Warsaw University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.05494.jpg', 'data': {'categories': ['#hallucinations', '#low_resource', '#interpretability', '#training', '#multilingual', '#open_source', '#alignment'], 'emoji': '🤥', 'ru': {'title': 'Борьба с цензурой: как заставить языковую модель говорить правду', 'desc': 'Исследователи изучают проблему нечестных ответов в больших языковых моделях, разработанных китайскими компаниями и обученных цензурировать чувствительные темы. В работе оцениваются методы извлечения честности (модификация промптов и весов для получения правдивых ответов) и методы обнаружения лжи (классификация ложных ответов). Авторы используют открытые модели как испытательный полигон, обнаруживая, что модели знают информацию, которую их тренировали скрывать, но частично воспроизводят её при правильных условиях. Результаты показывают, что некоторые техники (fine-tuning, few-shot prompting, удаление чат-шаблона) повышают количество честных ответов, но ни один метод не устраняет ложные выходы полностью.'}, 'en': {'title': 'Tackling Dishonesty in Censored Language Models', 'desc': 'This paper investigates the issue of dishonesty in large language models (LLMs) developed in China, particularly those trained to censor sensitive information. The researchers explore two main strategies: honesty elicitation, which aims to encourage truthful responses, and lie detection, which identifies false outputs. They find that while certain techniques improve the accuracy of responses, such as few-shot prompting and fine-tuning, none completely eliminate falsehoods. The study highlights the complexity of dishonesty in LLMs and provides valuable resources for further research.'}, 'zh': {'title': '揭示语言模型的诚实与谎言', 'desc': '本研究探讨了中国开发的大型语言模型在处理敏感话题时的虚假回答问题。研究者评估了诚实引导和谎言检测的方法，这些方法在一定程度上有效，但仍无法完全消除错误输出。通过分析Qwen3模型，发现其在涉及法轮功和天安门抗议等话题时，常常产生虚假信息，同时偶尔也能给出正确答案，表明模型掌握了被压制的知识。研究结果显示，某些诚实引导技术能够提高真实回答的比例，但没有任何技术能够完全消除虚假回答。'}}}, {'id': 'https://huggingface.co/papers/2603.05280', 'title': 'Layer by layer, module by module: Choose both for optimal OOD probing of ViT', 'url': 'https://huggingface.co/papers/2603.05280', 'abstract': 'Abstract Intermediate layers in vision transformers provide better representations than final layers, with performance degradation due to distribution shifts between pretraining and downstream data, and optimal probing strategies depend on the magnitude of these shifts.  \t\t\t\t\tAI-generated summary Recent studies have observed that intermediate layers of foundation models often yield more discriminative representations than the final layer. While initially attributed to autoregressive pretraining, this phenomenon has also been identified in models trained via supervised and discriminative self-supervised objectives. In this paper, we conduct a comprehensive study to analyze the behavior of intermediate layers in pretrained vision transformers. Through extensive linear probing experiments across a diverse set of image classification benchmarks, we find that distribution shift between pretraining and downstream data is the primary cause of performance degradation in deeper layers. Furthermore, we perform a fine-grained analysis at the module level. Our findings reveal that standard probing of transformer block outputs is suboptimal; instead, probing the activation within the feedforward network yields the best performance under significant distribution shift, whereas the normalized output of the multi-head self-attention module is optimal when the shift is weak.', 'score': 0, 'issue_id': 1397, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a7e42acd7ab0dfd7', 'authors': ['Ambroise Odonnat', 'Vasilii Feofanov', 'Laetitia Chapel', 'Romain Tavenard', 'Ievgen Redko'], 'affiliations': ['42.com', 'LInstitut Agro, IRISA', 'Noahs Ark Lab', 'Noahs Ark Lab, Inria', 'Univ. Rennes 2, IRISA'], 'pdf_title_img': 'assets/pdf/title_img/2603.05280.jpg', 'data': {'categories': ['#benchmark', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Оптимальные представления скрыты внутри слоёв трансформера', 'desc': 'В этой работе исследуется поведение промежуточных слоёв предобученных vision transformers. Авторы показывают, что промежуточные слои часто дают более дискриминативные представления, чем финальный слой, и основной причиной деградации производительности является сдвиг распределения между данными предобучения и целевой задачей. Через линейный проbing на различных бенчмарках классификации изображений они выявили, что оптимальная стратегия зондирования зависит от величины этого сдвига распределения. При сильном сдвиге лучше всего использовать активации внутри feedforward сети, а при слабом сдвиге — нормализованный выход multi-head attention модуля.'}, 'en': {'title': 'Unlocking the Power of Intermediate Layers in Vision Transformers', 'desc': 'This paper investigates how intermediate layers in vision transformers provide superior representations compared to the final layer, particularly in the context of distribution shifts between pretraining and downstream tasks. The authors conduct linear probing experiments to demonstrate that these shifts significantly impact the performance of deeper layers. They find that probing the activations within the feedforward network is most effective under strong distribution shifts, while the output of the multi-head self-attention module performs best when shifts are minimal. This research highlights the importance of selecting appropriate probing strategies based on the nature of the data distribution shift.'}, 'zh': {'title': '中间层的力量：提升视觉变换器性能的关键', 'desc': '本论文研究了视觉变换器中间层的表现，发现它们通常比最终层提供更好的特征表示。研究表明，预训练和下游数据之间的分布变化是导致深层性能下降的主要原因。通过对多个图像分类基准的线性探测实验，我们分析了不同模块的表现，发现标准的探测方法并不理想。我们提出在显著分布变化时，探测前馈网络的激活可以获得最佳性能，而在变化较小的情况下，多头自注意力模块的归一化输出效果最佳。'}}}, {'id': 'https://huggingface.co/papers/2602.23280', 'title': 'Physics Informed Viscous Value Representations', 'url': 'https://huggingface.co/papers/2602.23280', 'abstract': 'Abstract Physics-informed regularization based on Hamilton-Jacobi-Bellman equation with viscosity solution improves value estimation in offline goal-conditioned reinforcement learning through Monte Carlo estimation.  \t\t\t\t\tAI-generated summary Offline goal-conditioned reinforcement learning (GCRL) learns goal-conditioned policies from static pre-collected datasets. However, accurate value estimation remains a challenge due to the limited coverage of the state-action space. Recent physics-informed approaches have sought to address this by imposing physical and geometric constraints on the value function through regularization defined over first-order partial differential equations (PDEs), such as the Eikonal equation. However, these formulations can often be ill-posed in complex, high-dimensional environments. In this work, we propose a physics-informed regularization derived from the viscosity solution of the Hamilton-Jacobi-Bellman (HJB) equation. By providing a physics-based inductive bias, our approach grounds the learning process in optimal control theory, explicitly regularizing and bounding updates during value iterations. Furthermore, we leverage the Feynman-Kac theorem to recast the PDE solution as an expectation, enabling a tractable Monte Carlo estimation of the objective that avoids numerical instability in higher-order gradients. Experiments demonstrate that our method improves geometric consistency, making it broadly applicable to navigation and high-dimensional, complex manipulation tasks. Open-source codes are available at https://github.com/HrishikeshVish/phys-fk-value-GCRL.', 'score': 0, 'issue_id': 1406, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '045fd3045c7883c3', 'authors': ['Hrishikesh Viswanath', 'Juanwu Lu', 'S. Talha Bukhari', 'Damon Conover', 'Ziran Wang', 'Aniket Bera'], 'affiliations': ['College of Engineering, Purdue University, USA', 'DEVCOM Army Research Laboratory, USA', 'Department of Computer Science, Purdue University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2602.23280.jpg', 'data': {'categories': ['#rl', '#optimization', '#training', '#open_source', '#math'], 'emoji': '⚙️', 'ru': {'title': 'Физика оптимального управления для стабильной оценки ценности в офлайн обучении', 'desc': 'В статье предлагается физически обоснованная регуляризация для оффлайн обучения с подкреплением на основе уравнения Гамильтона-Якоби-Беллмана. Авторы используют вязкостное решение этого уравнения для улучшения оценки функции ценности в условиях ограниченного охвата пространства состояний и действий. С помощью теоремы Фейнмана-Каца задача переформулируется как математическое ожидание, что позволяет применить метод Монте-Карло для стабильной оценки целевой функции без численной неустойчивости. Экспериментальные результаты показывают, что подход улучшает геометрическую согласованность оценок ценности и применим к задачам навигации и сложным манипуляционным задачам в высоких размерностях.'}, 'en': {'title': 'Enhancing Value Estimation in GCRL with Physics-Informed Regularization', 'desc': 'This paper introduces a new method for improving value estimation in offline goal-conditioned reinforcement learning (GCRL) by using a physics-informed regularization based on the Hamilton-Jacobi-Bellman (HJB) equation. The authors address the challenge of limited state-action space coverage by applying physical constraints to the value function, which helps in maintaining geometric consistency. By utilizing the viscosity solution of the HJB equation, the approach provides a solid theoretical foundation that enhances the learning process through optimal control principles. The method also employs the Feynman-Kac theorem to facilitate Monte Carlo estimation, ensuring stability in complex environments.'}, 'zh': {'title': '物理信息正则化提升强化学习价值估计', 'desc': '本文提出了一种基于哈密顿-雅可比-贝尔曼方程的物理信息正则化方法，以改善离线目标条件强化学习中的价值估计。该方法通过在值函数上施加物理和几何约束，利用粘性解来增强学习过程的稳定性。我们的方法结合了最优控制理论，明确地对价值迭代过程中的更新进行正则化和界定。实验结果表明，该方法在导航和高维复杂操作任务中具有更好的几何一致性，具有广泛的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2602.23408', 'title': 'Demystifying Action Space Design for Robotic Manipulation Policies', 'url': 'https://huggingface.co/papers/2602.23408', 'abstract': 'Abstract Large-scale empirical study demonstrates that action space design significantly impacts robotic policy learning, with delta action prediction improving performance and joint-space/task-space representations offering distinct advantages for control stability and generalization.  \t\t\t\t\tAI-generated summary The specification of the action space plays a pivotal role in imitation-based robotic manipulation policy learning, fundamentally shaping the optimization landscape of policy learning. While recent advances have focused heavily on scaling training data and model capacity, the choice of action space remains guided by ad-hoc heuristics or legacy designs, leading to an ambiguous understanding of robotic policy design philosophies. To address this ambiguity, we conducted a large-scale and systematic empirical study, confirming that the action space does have significant and complex impacts on robotic policy learning. We dissect the action design space along temporal and spatial axes, facilitating a structured analysis of how these choices govern both policy learnability and control stability. Based on 13,000+ real-world rollouts on a bimanual robot and evaluation on 500+ trained models over four scenarios, we examine the trade-offs between absolute vs. delta representations, and joint-space vs. task-space parameterizations. Our large-scale results suggest that properly designing the policy to predict delta actions consistently improves performance, while joint-space and task-space representations offer complementary strengths, favoring control stability and generalization, respectively.', 'score': 0, 'issue_id': 1396, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'a0a072cb463bf117', 'authors': ['Yuchun Feng', 'Jinliang Zheng', 'Zhihao Wang', 'Dongxiu Liu', 'Jianxiong Li', 'Jiangmiao Pang', 'Tai Wang', 'Xianyuan Zhan'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University', 'Peking University', 'Shanghai AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2602.23408.jpg', 'data': {'categories': ['#robotics', '#optimization', '#training'], 'emoji': '🤖', 'ru': {'title': 'Проектирование пространства действий: ключ к эффективному обучению робототехнических политик', 'desc': 'В этой работе проводится масштабное эмпирическое исследование влияния пространства действий на обучение политик робота в задачах манипуляции на основе имитационного обучения. Авторы систематически анализируют выбор представления действий по двум осям: временной (абсолютные vs. дельта-действия) и пространственной (суставное vs. декартово пространство). На основе более 13000 реальных экспериментов на двуруком роботе и оценки 500+ обученных моделей показано, что предсказание дельта-действий стабильно улучшает производительность. Исследование демонстрирует, что суставное пространство обеспечивает большую стабильность управления, а декартово пространство улучшает обобщение на новые задачи.'}, 'en': {'title': 'Optimizing Action Space for Enhanced Robotic Learning', 'desc': 'This paper explores how the design of the action space affects the learning of robotic policies in manipulation tasks. It highlights that predicting delta actions, which represent changes rather than absolute positions, can enhance performance in policy learning. The study also distinguishes between joint-space and task-space representations, showing that each has unique benefits for stability and generalization in control tasks. Through extensive experiments with a bimanual robot, the authors provide insights into optimizing action space design for better robotic performance.'}, 'zh': {'title': '优化动作空间设计，提升机器人学习性能', 'desc': '本研究表明，动作空间的设计对机器人策略学习有显著影响。通过对13,000多个真实世界的实验进行分析，我们发现预测增量动作可以持续提高性能。我们还比较了关节空间和任务空间的表示，发现它们在控制稳定性和泛化能力上各有优势。整体而言，合理的动作空间设计能够优化机器人学习的效果。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (4)', '#agents (1)', '#agi', '#alignment (3)', '#architecture (7)', '#audio', '#benchmark (7)', '#cv (5)', '#data', '#dataset (3)', '#diffusion (4)', '#ethics', '#games', '#graphs (1)', '#hallucinations (1)', '#healthcare', '#inference (3)', '#interpretability (2)', '#leakage', '#long_context (1)', '#low_resource (1)', '#machine_translation', '#math (2)', '#multilingual (1)', '#multimodal (7)', '#open_source (7)', '#optimization (6)', '#plp', '#rag (1)', '#reasoning (3)', '#rl (2)', '#rlhf (3)', '#robotics (3)', '#science', '#security (1)', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (9)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-09 21:26',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-09 21:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-09 21:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
