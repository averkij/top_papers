的参数化令牌混合模块，优化了令牌混合模式，提高了不同架构的扩展效率。通过将基于规则的TokenMixer转化为等效的参数化结构，UniMixer能够在模型训练过程中优化和学习令牌混合模式。此外，UniMixer还设计了轻量级的UniMixing模块，进一步压缩模型参数和计算成本，同时显著提升模型性能。'}}}, {'id': 'https://huggingface.co/papers/2603.25406', 'title': 'MMaDA-VLA: Large Diffusion Vision-Language-Action Model with Unified Multi-Modal Instruction and Generation', 'url': 'https://huggingface.co/papers/2603.25406', 'abstract': 'Abstract A native discrete diffusion framework unifies multi-modal understanding and generation for robotic manipulation, enabling parallel action and visual outcome prediction with improved long-horizon consistency.  AI-generated summary Vision-Language-Action (VLA) models aim to control robots for manipulation from visual observations and natural-language instructions. However, existing hierarchical and autoregressive paradigms often introduce architectural overhead, suffer from temporal inconsistency and long-horizon error accumulation, and lack a mechanism to capture environment dynamics without extra modules. To this end, we present MMaDA-VLA, a fully native pre-trained large diffusion VLA model that unifies multi-modal understanding and generation in a single framework. Our key idea is a native discrete diffusion formulation that embeds language, images, and continuous robot controls into one discrete token space and trains a single backbone with masked token denoising to jointly generate a future goal observation and an action chunk in parallel. Iterative denoising enables global, order-free refinement, improving long-horizon consistency while grounding actions in predicted future visual outcomes without auxiliary world models. Experiments across simulation benchmarks and real-world tasks show state-of-the-art performance, achieving 98.0% average success on LIBERO and 4.78 average length on CALVIN.', 'score': 3, 'issue_id': 1758, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'cd0f5d854022a0b3', 'authors': ['Yang Liu', 'Pengxiang Ding', 'Tengyue Jiang', 'Xudong Wang', 'Wenxuan Song', 'Minghui Lin', 'Han Zhao', 'Hongyin Zhang', 'Zifeng Zhuang', 'Wei Zhao', 'Siteng Huang', 'Jinkui Shi', 'Donglin Wang'], 'affiliations': ['East China University of Science and Technology', 'Huawei Celia Team', 'OpenHelix Robotics', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25406.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая диффузионная модель для понимания и управления роботами', 'desc': 'Представлена MMaDA-VLA, единая диффузионная модель для управления роботами-манипуляторами, которая объединяет понимание и генерацию мультимодальной информации в одной архитектуре. Ключевой идеей является использование дискретной диффузии, которая преобразует язык, изображения и действия робота в единое пространство токенов и обучается через маскированное удаление шума. Модель параллельно предсказывает целевое визуальное состояние и последовательность действий, что улучшает консистентность на длинных горизонтах планирования без необходимости вспомогательных моделей окружения. Экспериментальные результаты показывают превосходную производительность на бенчмарках LIBERO и CALVIN.'}, 'en': {'title': 'Unified Multi-Modal Framework for Robotic Manipulation', 'desc': 'This paper introduces MMaDA-VLA, a novel framework that integrates multi-modal understanding and generation for robotic manipulation using a discrete diffusion approach. It addresses issues in existing models, such as architectural complexity and long-horizon error accumulation, by embedding language, images, and robot controls into a unified token space. The model employs masked token denoising to simultaneously predict future visual outcomes and corresponding actions, enhancing consistency over extended tasks. Experimental results demonstrate its effectiveness, achieving high success rates in both simulated and real-world environments.'}, 'zh': {'title': '统一多模态，提升机器人操作效率', 'desc': '本文提出了一种名为MMaDA-VLA的原生离散扩散框架，旨在统一多模态理解和生成，以提高机器人操作的效率。该模型通过将语言、图像和连续的机器人控制嵌入到一个离散的标记空间中，实现了并行生成未来目标观察和动作片段。通过迭代去噪，该方法能够在不依赖额外模块的情况下，改善长时间跨度的一致性，并将动作与预测的未来视觉结果相结合。实验结果表明，MMaDA-VLA在模拟基准和实际任务中表现出色，达到了98.0%的平均成功率。'}}}, {'id': 'https://huggingface.co/papers/2604.01029', 'title': 'Revision or Re-Solving? Decomposing Second-Pass Gains in Multi-LLM Pipelines', 'url': 'https://huggingface.co/papers/2604.01029', 'abstract': "Abstract Multi-LLM revision pipelines' effectiveness varies by task structure and draft quality, with gains decomposing into re-solving, scaffold, and content components rather than representing uniform error correction.  AI-generated summary Multi-LLM revision pipelines, in which a second model reviews and improves a draft produced by a first, are widely assumed to derive their gains from genuine error correction. We question this assumption with a controlled decomposition experiment that uses four matched conditions to separate second-pass gains into three additive components: re-solving, scaffold, and content. We evaluate this design across two model pairs on three benchmarks spanning knowledge-intensive MCQ and competitive programming. Our results show that the gains of multi-LLM revision are not monolithic, but depend on task structure, draft quality, and the type of draft information. On MCQ tasks, where the answer space is constrained and drafts provide little structural guidance, most gains are consistent with stronger-model re-solving, and directly routing queries to the stronger model can be more effective than revising a weak draft. On code generation tasks, however, two-stage prompting remains useful because even semantically null drafts can provide substantial structural scaffolding, while weak draft content can be harmful. Finally, role-reversed experiments show that strong drafts clearly benefit weak reviewers. Ultimately, our findings demonstrate that the utility of multi-LLM revision is dynamically bottlenecked by task structure and draft quality, necessitating more targeted pipeline designs rather than blanket revision strategies.", 'score': 2, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b4b73b438adc2c0d', 'authors': ['Jingjie Ning', 'Xueqi Li', 'Chengyu Yu'], 'affiliations': ['School of Computer Science, Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01029.jpg', 'data': {'categories': ['#training', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Выигрыш многомодельных систем пересмотра зависит не от исправления ошибок, а от структуры задачи', 'desc': 'В работе исследуется эффективность двухэтапных систем, где одна модель улучшает черновик другой модели. Авторы разложили выигрыш от такого подхода на три компоненты: перерешение задачи более мощной моделью, структурное влияние черновика и его содержание. Результаты показывают, что эффективность пересмотра зависит от структуры задачи и качества исходного черновика: для задач с ограниченным пространством ответов часто эффективнее сразу обратиться к более мощной модели, а для генерации кода даже пустой черновик помогает благодаря структурному руководству. Исследование демонстрирует необходимость адаптивного подбора стратегий пересмотра вместо универсального применения двухэтапных систем.'}, 'en': {'title': 'Tailored Multi-LLM Revision: Beyond Simple Error Correction', 'desc': 'This paper investigates how multi-LLM (Large Language Model) revision pipelines improve draft quality by analyzing their effectiveness based on task structure and the quality of the initial draft. The authors conducted experiments to break down the improvements into three components: re-solving, scaffold, and content, rather than assuming that all gains come from error correction. Results indicate that the benefits of using a second model for revision vary significantly depending on the type of task, such as multiple-choice questions (MCQ) versus code generation. The study concludes that a one-size-fits-all approach to multi-LLM revision is insufficient, and more tailored strategies are needed to optimize performance based on specific task requirements.'}, 'zh': {'title': '多语言模型修订的动态效用', 'desc': '本文探讨了多语言模型（Multi-LLM）修订流程在不同任务结构和草稿质量下的有效性。研究表明，修订的收益可以分解为重新解决、支架和内容三个组成部分，而不是简单的错误修正。通过控制实验，我们发现多语言模型修订的效果并非单一，而是依赖于任务结构、草稿质量和草稿信息类型。在多项选择题任务中，强模型的重新解决能力更为重要，而在代码生成任务中，即使是语义空洞的草稿也能提供结构支架。'}}}, {'id': 'https://huggingface.co/papers/2604.00913', 'title': 'Benchmarking and Mechanistic Analysis of Vision-Language Models for Cross-Depiction Assembly Instruction Alignment', 'url': 'https://huggingface.co/papers/2604.00913', 'abstract': 'Abstract Vision Language Models struggle with aligning assembly diagrams and video feeds due to a depiction gap, with findings indicating visual encoding as the primary target for improving cross-depiction robustness.  AI-generated summary 2D assembly diagrams are often abstract and hard to follow, creating a need for intelligent assistants that can monitor progress, detect errors, and provide step-by-step guidance. In mixed reality settings, such systems must recognize completed and ongoing steps from the camera feed and align them with the diagram instructions. Vision Language Models (VLMs) show promise for this task, but face a depiction gap because assembly diagrams and video frames share few visual features. To systematically assess this gap, we construct IKEA-Bench, a benchmark of 1,623 questions across 6 task types on 29 IKEA furniture products, and evaluate 19 VLMs (2B-38B) under three alignment strategies. Our key findings: (1) assembly instruction understanding is recoverable via text, but text simultaneously degrades diagram-to-video alignment; (2) architecture family predicts alignment accuracy more strongly than parameter count; (3) video understanding remains a hard bottleneck unaffected by strategy. A three-level mechanistic analysis further reveals that diagrams and video occupy disjoint ViT subspaces, and that adding text shifts models from visual to text-driven reasoning. These results identify visual encoding as the primary target for improving cross-depiction robustness. Project page: https://ryenhails.github.io/IKEA-Bench/', 'score': 2, 'issue_id': 1759, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'd926f8b4fde3b8db', 'authors': ['Zhuchenyang Liu', 'Yao Zhang', 'Yu Xiao'], 'affiliations': ['Aalto University'], 'pdf_title_img': 'assets/pdf/title_img/2604.00913.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video', '#cv'], 'emoji': '🛠️', 'ru': {'title': 'Преодоление разрыва в представлении между диаграммами и видео в моделях зрения и языка', 'desc': 'Исследование посвящено проблеме согласования Vision Language Models при работе с инструкциями по сборке мебели, где диаграммы и видеофeed имеют существенные различия в визуальном представлении. Авторы создали бенчмарк IKEA-Bench с 1623 вопросами для оценки 19 VLM моделей и обнаружили, что добавление текстовых описаний улучшает понимание инструкций, но ухудшает выравнивание между диаграммами и видео. Механистический анализ показал, что диаграммы и видеокадры занимают различные подпространства в пространстве признаков Vision Transformer, а текст смещает модели от визуального к текстовому рассуждению. Результаты указывают на визуальное кодирование как основную мишень для улучшения робастности при работе с разными способами представления информации.'}, 'en': {'title': 'Bridging the Gap: Enhancing Assembly Diagram and Video Alignment', 'desc': 'This paper addresses the challenges faced by Vision Language Models (VLMs) in aligning assembly diagrams with video feeds, highlighting a significant depiction gap. The authors introduce the IKEA-Bench, a benchmark designed to evaluate VLMs on their ability to understand and align assembly instructions with visual inputs from video. Key findings suggest that while text can aid in understanding assembly instructions, it can also hinder the alignment between diagrams and video. The study emphasizes the need to improve visual encoding to enhance the robustness of cross-depiction tasks in mixed reality environments.'}, 'zh': {'title': '提升视觉编码，缩小表现差距', 'desc': '本论文探讨了视觉语言模型在对齐组装图和视频流时面临的挑战，主要是由于表现差距。研究发现，视觉编码是提高跨表现鲁棒性的关键。我们构建了IKEA-Bench基准，评估了19个视觉语言模型在不同对齐策略下的表现。结果表明，文本理解可以恢复组装指令，但同时会降低图与视频的对齐精度。'}}}, {'id': 'https://huggingface.co/papers/2603.29247', 'title': 'MemRerank: Preference Memory for Personalized Product Reranking', 'url': 'https://huggingface.co/papers/2603.29247', 'abstract': 'Abstract MemRerank is a preference memory framework that improves personalized product reranking by distilling user purchase history into concise, query-independent signals using reinforcement learning with downstream performance as supervision.  AI-generated summary LLM-based shopping agents increasingly rely on long purchase histories and multi-turn interactions for personalization, yet naively appending raw history to prompts is often ineffective due to noise, length, and relevance mismatch. We propose MemRerank, a preference memory framework that distills user purchase history into concise, query-independent signals for personalized product reranking. To study this problem, we build an end-to-end benchmark and evaluation framework centered on an LLM-based 1-in-5 selection task, which measures both memory quality and downstream reranking utility. We further train the memory extractor with reinforcement learning (RL), using downstream reranking performance as supervision. Experiments with two LLM-based rerankers show that MemRerank consistently outperforms no-memory, raw-history, and off-the-shelf memory baselines, yielding up to +10.61 absolute points in 1-in-5 accuracy. These results suggest that explicit preference memory is a practical and effective building block for personalization in agentic e-commerce systems.', 'score': 2, 'issue_id': 1760, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'dfa995240895d548', 'authors': ['Zhiyuan Peng', 'Xuyang Wu', 'Huaixiao Tou', 'Yi Fang', 'Yi Gong'], 'affiliations': ['Independent Researcher', 'Santa Clara University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29247.jpg', 'data': {'categories': ['#benchmark', '#rl', '#agents'], 'emoji': '🛍️', 'ru': {'title': 'Сжатая память предпочтений для умной персонализации в электронной коммерции', 'desc': 'MemRerank — это фреймворк для работы с памятью предпочтений, который улучшает персонализированную переранжировку товаров путём сжатия истории покупок пользователя в компактные, независимые от запроса сигналы. Авторы предлагают обучать модуль извлечения памяти с помощью обучения с подкреплением, где целевой функцией служит качество переранжировки товаров в рекомендательной системе на основе LLM. Для оценки метода разработана бенчмарк-платформа с задачей выбора одного товара из пяти вариантов, которая измеряет как качество памяти, так и полезность переранжировки. Экспериментальные результаты показывают, что MemRerank превосходит подходы без памяти и с необработанной историей, достигая улучшения точности на 10.61 процентных пункта.'}, 'en': {'title': 'Enhancing Personalization with Preference Memory', 'desc': 'MemRerank is a framework designed to enhance personalized product recommendations by effectively utilizing user purchase history. It employs reinforcement learning to create concise, query-independent signals that improve the reranking of products based on user preferences. The framework addresses the challenges of noise and relevance in long purchase histories by distilling essential information into a more manageable format. Experiments demonstrate that MemRerank significantly outperforms traditional methods, indicating its potential as a valuable tool for personalization in e-commerce applications.'}, 'zh': {'title': '偏好记忆：个性化推荐的新突破', 'desc': 'MemRerank是一种偏好记忆框架，通过强化学习将用户购买历史提炼为简洁的、与查询无关的信号，从而改善个性化产品的重新排序。传统的基于LLM的购物代理往往依赖于长时间的购买历史和多轮交互，但直接将原始历史附加到提示中常常效果不佳。我们提出的MemRerank框架能够有效提炼用户的购买历史，提高个性化推荐的质量。实验结果表明，MemRerank在多个基准测试中表现优于无记忆和原始历史的方法，证明了显式偏好记忆在个性化电子商务系统中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.29002', 'title': 'Understand and Accelerate Memory Processing Pipeline for Disaggregated LLM Inference', 'url': 'https://huggingface.co/papers/2603.29002', 'abstract': 'Abstract Heterogeneous GPU-FPGA systems can accelerate large language model inference by offloading memory-intensive operations to FPGAs, achieving significant performance and energy improvements.  AI-generated summary Modern large language models (LLMs) increasingly depends on efficient long-context processing and generation mechanisms, including sparse attention, retrieval-augmented generation (RAG), and compressed contextual memory, to support complex reasoning. We show that these optimizations can be unified into a four-step memory processing pipeline: Prepare Memory, Compute Relevancy, Retrieval, and Apply to Inference. Through systematic profiling, we identify a 22%-97% memory processing overhead in LLM inference and strong heterogeneity in its computational characteristics. Motivated by this insight, we argue that heterogeneous systems are well-suited to accelerate memory processing and thus end-to-end inference. We demonstrate this approach on a GPU-FPGA system by offloading sparse, irregular, and memory-bounded operations to FPGAs while retaining compute-intensive operations on GPUs. Evaluated on an AMD MI210 GPU and an Alveo U55C FPGA, our system is 1.04sim2.2times faster and requires 1.11sim4.7times less energy across multiple LLM inference optimizations than the GPU baseline (similar results hold on NVIDIA A100). These results establish heterogeneous systems as a practical direction for efficient LLM memory processing and inform future heterogeneous hardware design.', 'score': 2, 'issue_id': 1759, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'da7b685372f282c3', 'authors': ['Zifan He', 'Rui Ma', 'Yizhou Sun', 'Jason Cong'], 'affiliations': ['Department of Computer Science, University of California, Los Angeles', 'Microsoft Research Asia'], 'pdf_title_img': 'assets/pdf/title_img/2603.29002.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Гетерогенные GPU-FPGA системы для эффективной обработки памяти в LLM', 'desc': 'В статье предложен подход к ускорению вывода больших языковых моделей с использованием гетерогенных систем GPU-FPGA. Авторы выявили значительные издержки обработки памяти (22%-97%) при выполнении операций оптимизации LLM и разработали единую четырёхэтапную схему обработки памяти. Они демонстрируют, что неравномерные вычислительные характеристики памятной обработки хорошо подходят для распределения между GPU и FPGA: разреженные и нерегулярные операции выполняются на FPGA, а вычислительно интенсивные - на GPU. Экспериментальные результаты показывают ускорение в 1.04-2.2 раза и снижение энергопотребления в 1.11-4.7 раза по сравнению с GPU baseline.'}, 'en': {'title': 'Accelerating LLM Inference with GPU-FPGA Heterogeneity', 'desc': 'This paper discusses how combining GPUs and FPGAs can speed up the process of using large language models (LLMs) by handling memory-heavy tasks more efficiently. It introduces a four-step memory processing pipeline that includes preparing memory, computing relevancy, retrieving information, and applying it to inference. The authors found that there is a significant overhead in memory processing during LLM inference, which can be reduced by using heterogeneous systems. Their experiments show that this approach can make LLM inference faster and use less energy compared to traditional GPU-only methods.'}, 'zh': {'title': '异构系统加速大型语言模型推理的有效性', 'desc': '本论文探讨了异构GPU-FPGA系统在大型语言模型推理中的应用，特别是如何将内存密集型操作转移到FPGA上，从而显著提高性能和能效。我们提出了一种四步内存处理管道，包括准备内存、计算相关性、检索和应用于推理，以优化长上下文处理。通过系统分析，我们发现LLM推理中存在22%到97%的内存处理开销，并且计算特性具有很强的异构性。我们的实验表明，异构系统能够有效加速内存处理，提升LLM推理的整体效率。'}}}, {'id': 'https://huggingface.co/papers/2604.01168', 'title': 'S0 Tuning: Zero-Overhead Adaptation of Hybrid Recurrent-Attention Models', 'url': 'https://huggingface.co/papers/2604.01168', 'abstract': 'Abstract S0 tuning optimizes recurrent state matrices for hybrid language models, achieving superior performance over LoRA with zero inference overhead and enabling efficient task switching.  AI-generated summary Using roughly 48 execution-verified HumanEval training solutions, tuning a single initial state matrix per recurrent layer, with zero inference overhead, outperforms LoRA by +10.8 pp (p < 0.001) on HumanEval. The method, which we call S0 tuning, optimizes one state matrix per recurrent layer while freezing all model weights. On Qwen3.5-4B (GatedDeltaNet hybrid), S0 tuning improves greedy pass@1 by +23.6 +/- 1.7 pp (10 seeds). On FalconH1-7B (Mamba-2 hybrid), S0 reaches 71.8% +/- 1.3 and LoRA reaches 71.4% +/- 2.4 (3 seeds), statistically indistinguishable at this sample size while requiring no weight merging. Cross-domain transfer is significant on MATH-500 (+4.8 pp, p = 0.00002, 8 seeds) and GSM8K (+2.8 pp, p = 0.0003, 10 seeds); a text-to-SQL benchmark (Spider) shows no transfer, consistent with the trajectory-steering mechanism. A prefix-tuning control on a pure Transformer (Qwen2.5-3B) degrades performance by -13.9 pp under all nine configurations tested. On Qwen3.5, a per-step state-offset variant reaches +27.1 pp, above both S0 and LoRA but with per-step inference cost. Taken together, the results show that recurrent state initialization is a strong zero-inference-overhead PEFT surface for hybrid language models when verified supervision is scarce. The tuned state is a ~48 MB file; task switching requires no weight merging or model reload. Code and library: https://github.com/jackyoung27/s0-tuning.', 'score': 1, 'issue_id': 1766, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b5110b9630e1c342', 'authors': ['Jack Young'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2604.01168.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Оптимизация рекуррентного состояния для быстрой адаптации гибридных языковых моделей', 'desc': 'Статья предлагает S0 tuning — новый метод параметрической эффективной настройки (PEFT) гибридных языковых моделей, который оптимизирует матрицы рекуррентного состояния для каждого слоя при замороженных весах модели. Метод показывает превосходство над LoRA на +10.8 процентных пункта на бенчмарке HumanEval и на +23.6 пункта на Qwen3.5-4B без дополнительных вычислительных затрат во время инференса. S0 tuning демонстрирует хорошую трансферабельность на задачах математического рассуждения (MATH-500 и GSM8K) и позволяет быстро переключаться между задачами благодаря малому размеру адаптера (~48 МБ) без необходимости переслияния весов. Результаты подтверждают, что инициализация рекуррентного состояния является эффективной поверхностью для настройки гибридных моделей в условиях ограниченного количества размеченных данных.'}, 'en': {'title': 'S0 Tuning: Boosting Hybrid Language Models with Zero Inference Overhead', 'desc': 'The paper introduces S0 tuning, a method that optimizes recurrent state matrices in hybrid language models, leading to improved performance without any inference overhead. By tuning a single state matrix per recurrent layer while keeping all other model weights frozen, S0 tuning outperforms the LoRA method significantly on various benchmarks. The results demonstrate that this approach allows for efficient task switching and cross-domain transfer, enhancing model capabilities in scenarios with limited supervision. Overall, S0 tuning presents a novel way to enhance hybrid language models while maintaining computational efficiency.'}, 'zh': {'title': 'S0调优：高效的混合语言模型优化方法', 'desc': 'S0调优是一种优化混合语言模型中递归状态矩阵的方法，能够在零推理开销的情况下实现更优的性能。与LoRA相比，S0调优在HumanEval数据集上提高了10.8个百分点，且在多个模型上表现出色。该方法通过冻结所有模型权重，仅优化每个递归层的一个状态矩阵，显著提升了任务切换的效率。实验结果表明，S0调优在缺乏验证监督的情况下，成为混合语言模型中一种强大的零推理开销的PEFT方法。'}}}, {'id': 'https://huggingface.co/papers/2604.00986', 'title': 'Do Phone-Use Agents Respect Your Privacy?', 'url': 'https://huggingface.co/papers/2604.00986', 'abstract': 'Abstract  We study whether phone-use agents respect privacy while completing benign mobile tasks. This question has remained hard to answer because privacy-compliant behavior is not operationalized for phone-use agents, and ordinary apps do not reveal exactly what data agents type into which form entries during execution. To make this question measurable, we introduce MyPhoneBench, a verifiable evaluation framework for privacy behavior in mobile agents. We operationalize privacy-respecting phone use as permissioned access, minimal disclosure, and user-controlled memory through a minimal privacy contract, iMy, and pair it with instrumented mock apps plus rule-based auditing that make unnecessary permission requests, deceptive re-disclosure, and unnecessary form filling observable and reproducible. Across five frontier models on 10 mobile apps and 300 tasks, we find that task success, privacy-compliant task completion, and later-session use of saved preferences are distinct capabilities, and no single model dominates all three. Evaluating success and privacy jointly reshuffles the model ordering relative to either metric alone. The most persistent failure mode across models is simple data minimization: agents still fill optional personal entries that the task does not require. These results show that privacy failures arise from over-helpful execution of benign tasks, and that success-only evaluation overestimates the deployment readiness of current phone-use agents. All code, mock apps, and agent trajectories are publicly available at~ https://github.com/tangzhy/MyPhoneBench.', 'score': 1, 'issue_id': 1766, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'c19cc66400cc48ff', 'authors': ['Zhengyang Tang', 'Ke Ji', 'Xidong Wang', 'Zihan Ye', 'Xinyuan Wang', 'Yiduo Guo', 'Ziniu Li', 'Chenxin Li', 'Jingyuan Hu', 'Shunian Chen', 'Tongxu Luo', 'Jiaxi Bi', 'Zeyu Qin', 'Shaobo Wang', 'Xin Lai', 'Pengyuan Lyu', 'Junyi Li', 'Can Xu', 'Chengquan Zhang', 'Han Hu', 'Ming Yan', 'Benyou Wang'], 'affiliations': ['Hunyuan Team, Tencent', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.00986.jpg', 'data': {'categories': ['#benchmark', '#ethics', '#open_source', '#agents', '#security'], 'emoji': '🔒', 'ru': {'title': 'Приватность мобильных агентов: между полезностью и безопасностью данных', 'desc': 'Исследование изучает, соблюдают ли агенты, управляющие мобильными телефонами, приватность пользователей при выполнении задач. Авторы предложили MyPhoneBench — фреймворк для верифицируемой оценки приватного поведения мобильных агентов, определив приватность как контролируемый доступ к разрешениям, минимальное раскрытие данных и управляемую пользователем память. Экспериментальная оценка пяти современных моделей на 10 приложениях выявила, что успешное выполнение задачи, приватное выполнение и повторное использование сохранённых предпочтений — это разные способности, и ни одна модель не превосходит по всем метрикам. Основная ошибка моделей — избыточное заполнение опциональных полей: агенты предоставляют персональные данные, которые не требуются для выполнения задачи.'}, 'en': {'title': 'Evaluating Privacy in Mobile Agents: A New Framework', 'desc': 'This paper investigates how well mobile agents respect user privacy while performing simple tasks on phones. The authors introduce a framework called MyPhoneBench to measure privacy behavior by defining clear metrics for privacy compliance, such as permissioned access and minimal data disclosure. They conduct experiments with various models across multiple mobile apps and tasks, revealing that no single model excels in both task success and privacy compliance. The findings indicate that many agents inadvertently collect unnecessary personal data, highlighting the need for better evaluation methods that consider both success and privacy together.'}, 'zh': {'title': '评估手机代理的隐私行为', 'desc': '本研究探讨了手机使用代理在完成无害移动任务时是否尊重隐私。我们提出了MyPhoneBench，这是一个可验证的评估框架，用于衡量移动代理的隐私行为。通过最小隐私合同iMy，我们将隐私尊重的手机使用定义为获得许可的访问、最小披露和用户控制的记忆。研究结果表明，任务成功、隐私合规的任务完成和后续会话中保存偏好的使用是不同的能力，且没有单一模型在这三者中占据主导地位。'}}}, {'id': 'https://huggingface.co/papers/2603.23582', 'title': 'AI Generalisation Gap In Comorbid Sleep Disorder Staging', 'url': 'https://huggingface.co/papers/2603.23582', 'abstract': 'Abstract Deep learning models designed for healthy subjects show poor performance when applied to stroke patients due to fundamental differences in sleep architecture, necessitating disease-specific approaches.  AI-generated summary Accurate sleep staging is essential for diagnosing OSA and hypopnea in stroke patients. Although PSG is reliable, it is costly, labor-intensive, and manually scored. While deep learning enables automated EEG-based sleep staging in healthy subjects, our analysis shows poor generalization to clinical populations with disrupted sleep. Using Grad-CAM interpretations, we systematically demonstrate this limitation. We introduce iSLEEPS, a newly clinically annotated ischemic stroke dataset (to be publicly released), and evaluate a SE-ResNet plus bidirectional LSTM model for single-channel EEG sleep staging. As expected, cross-domain performance between healthy and diseased subjects is poor. Attention visualizations, supported by clinical expert feedback, show the model focuses on physiologically uninformative EEG regions in patient data. Statistical and computational analyses further confirm significant sleep architecture differences between healthy and ischemic stroke cohorts, highlighting the need for subject-aware or disease-specific models with clinical validation before deployment. A summary of the paper and the code is available at https://himalayansaswatabose.github.io/iSLEEPS_Explainability.github.io/', 'score': 0, 'issue_id': 1761, 'pub_date': '2026-03-24', 'pub_date_card': {'ru': '24 марта', 'en': 'March 24', 'zh': '3月24日'}, 'hash': '9374c1577fd15e7d', 'authors': ['Saswata Bose', 'Suvadeep Maiti', 'Shivam Kumar Sharma', 'Mythirayee S', 'Tapabrata Chakraborti', 'Srijitesh Rajendran', 'Raju S. Bapi'], 'affiliations': ['Alan Turing Institute, London and University College London, United Kingdom', 'International Institute of Information Technology (IIIT-H), Hyderabad, India', 'National Institute of Mental Health and Neuroscience (NIMHANS), Bangalore, India', 'Queen Square Institute of Neurology, University College London, United Kingdom'], 'pdf_title_img': 'assets/pdf/title_img/2603.23582.jpg', 'data': {'categories': ['#transfer_learning', '#dataset', '#open_source', '#architecture', '#science', '#healthcare', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Адаптация моделей глубокого обучения к клинической диагностике сна у пациентов с инсультом', 'desc': 'Статья демонстрирует, что глубокие нейронные сети, обученные на здоровых людях, плохо обобщаются на пациентов с инсультом из-за фундаментальных различий в архитектуре сна. Авторы вводят новый датасет iSLEEPS с клинической разметкой для пациентов с ишемическим инсультом и оценивают модель на основе SE-ResNet и двунаправленной LSTM для автоматической классификации стадий сна по однока-нальной ЭЭГ. С помощью техники Grad-CAM они показывают, что модель фокусируется на физиологически неинформативных регионах ЭЭГ при анализе данных пациентов. Исследование подчеркивает критическую необходимость разработки специализированных моделей, учитывающих состояние пациента, с клинической валидацией перед применением в медицинской практике.'}, 'en': {'title': 'Tailoring Deep Learning for Stroke Patient Sleep Staging', 'desc': 'This paper discusses the challenges of using deep learning models for sleep staging in stroke patients, highlighting that models trained on healthy individuals do not perform well on this clinical population. The authors introduce a new dataset called iSLEEPS, specifically annotated for ischemic stroke patients, to address these issues. They evaluate a model combining SE-ResNet and bidirectional LSTM for single-channel EEG sleep staging, revealing poor generalization from healthy to diseased subjects. The study emphasizes the importance of developing disease-specific models and validating them clinically before they can be effectively used in practice.'}, 'zh': {'title': '针对中风患者的睡眠分期模型研究', 'desc': '本论文探讨了深度学习模型在健康个体与中风患者之间的表现差异，指出健康模型在中风患者中的效果不佳。研究表明，自动化的脑电图（EEG）睡眠分期在临床人群中泛化能力差，尤其是在睡眠结构受到干扰的患者中。我们引入了iSLEEPS数据集，并评估了基于SE-ResNet和双向LSTM的单通道EEG睡眠分期模型。结果显示，健康与中风患者之间的睡眠结构存在显著差异，强调了开发针对特定疾病的模型的重要性。'}}}];

            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (9)', '#agi', '#alignment', '#architecture (4)', '#audio', '#benchmark (14)', '#cv (3)', '#data', '#dataset (9)', '#diffusion', '#ethics (1)', '#games', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (1)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (8)', '#open_source (5)', '#optimization (6)', '#plp (1)', '#rag', '#reasoning (4)', '#rl (1)', '#rlhf (1)', '#robotics (1)', '#science (2)', '#security (2)', '#small_models (1)', '#story_generation', '#survey (2)', '#synthetic', '#training (6)', '#transfer_learning (3)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-02 18:45',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-02 18:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-02 18:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
