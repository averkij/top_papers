    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');

            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.24414', 'title': 'ClawKeeper: Comprehensive Safety Protection for OpenClaw Agents Through Skills, Plugins, and Watchers', 'url': 'https://huggingface.co/papers/2603.24414', 'abstract': "Abstract OpenClaw's security vulnerabilities necessitate comprehensive protection through ClawKeeper, a real-time framework implementing skill-based, plugin-based, and watcher-based security mechanisms across multiple architectural layers.  AI-generated summary OpenClaw has rapidly established itself as a leading open-source autonomous agent runtime, offering powerful capabilities including tool integration, local file access, and shell command execution. However, these broad operational privileges introduce critical security vulnerabilities, transforming model errors into tangible system-level threats such as sensitive data leakage, privilege escalation, and malicious third-party skill execution. Existing security measures for the OpenClaw ecosystem remain highly fragmented, addressing only isolated stages of the agent lifecycle rather than providing holistic protection. To bridge this gap, we present ClawKeeper, a real-time security framework that integrates multi-dimensional protection mechanisms across three complementary architectural layers. (1) Skill-based protection operates at the instruction level, injecting structured security policies directly into the agent context to enforce environment-specific constraints and cross-platform boundaries. (2) Plugin-based protection serves as an internal runtime enforcer, providing configuration hardening, proactive threat detection, and continuous behavioral monitoring throughout the execution pipeline. (3) Watcher-based protection introduces a novel, decoupled system-level security middleware that continuously verifies agent state evolution. It enables real-time execution intervention without coupling to the agent's internal logic, supporting operations such as halting high-risk actions or enforcing human confirmation. We argue that this Watcher paradigm holds strong potential to serve as a foundational building block for securing next-generation autonomous agent systems. Extensive qualitative and quantitative evaluations demonstrate the effectiveness and robustness of ClawKeeper across diverse threat scenarios. We release our code.", 'score': 164, 'issue_id': 1760, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '4fd058fb7d21c4d5', 'authors': ['Songyang Liu', 'Chaozhuo Li', 'Chenxu Wang', 'Jinyu Hou', 'Zejian Chen', 'Litian Zhang', 'Zheng Liu', 'Qiwei Ye', 'Yiming Hei', 'Xi Zhang', 'Zhongyuan Wang'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Beijing University of Posts and Telecommunications', 'China Academy of Information and Communications Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.24414.jpg', 'data': {'categories': ['#security', '#open_source', '#agents'], 'emoji': '🔒', 'ru': {'title': 'Многоуровневая защита автономных агентов через реальный мониторинг и политики безопасности', 'desc': 'В работе представляется ClawKeeper — фреймворк безопасности в реальном времени для автономного агента OpenClaw, который имеет доступ к инструментам, файловой системе и командной строке. Авторы выявляют критические уязвимости, связанные с ошибками модели, которые могут привести к утечкам данных и несанкционированному доступу. ClawKeeper реализует многоуровневую защиту через три механизма: skill-based (инъекция политик безопасности на уровне инструкций), plugin-based (мониторинг во время выполнения) и watcher-based (системная проверка состояния агента в реальном времени). Предложенный подход демонстрирует эффективность против разнообразных сценариев атак и может служить основой для защиты будущих автономных агентов.'}, 'en': {'title': 'ClawKeeper: Comprehensive Security for Autonomous Agents', 'desc': "The paper introduces ClawKeeper, a comprehensive security framework designed to protect the OpenClaw autonomous agent runtime from various security vulnerabilities. It employs three layers of protection: skill-based, plugin-based, and watcher-based mechanisms, each addressing different aspects of security throughout the agent's lifecycle. Skill-based protection enforces security policies at the instruction level, while plugin-based protection enhances runtime security through configuration hardening and behavioral monitoring. The watcher-based protection acts as a decoupled middleware that can intervene in real-time to prevent high-risk actions, showcasing its potential as a foundational element for securing future autonomous systems."}, 'zh': {'title': '全面保护自主代理的安全框架', 'desc': 'OpenClaw是一个开源的自主代理运行时，但其广泛的操作权限导致了严重的安全漏洞。为了应对这些问题，ClawKeeper被提出作为一个实时安全框架，提供多层次的保护机制。该框架包括基于技能的保护、基于插件的保护和基于观察者的保护，旨在全面防护代理生命周期中的各个阶段。通过对不同威胁场景的评估，ClawKeeper展示了其有效性和稳健性。'}}}, {'id': 'https://huggingface.co/papers/2604.00073', 'title': 'Terminal Agents Suffice for Enterprise Automation', 'url': 'https://huggingface.co/papers/2604.00073', 'abstract': 'Abstract Simple terminal-based coding agents using programmatic interfaces and foundation models can effectively perform enterprise tasks comparable to or better than complex tool-augmented agents.  AI-generated summary There has been growing interest in building agents that can interact with digital platforms to execute meaningful enterprise tasks autonomously. Among the approaches explored are tool-augmented agents built on abstractions such as Model Context Protocol (MCP) and web agents that operate through graphical interfaces. Yet, it remains unclear whether such complex agentic systems are necessary given their cost and operational overhead. We argue that a coding agent equipped only with a terminal and a filesystem can solve many enterprise tasks more effectively by interacting directly with platform APIs. We evaluate this hypothesis across diverse real-world systems and show that these low-level terminal agents match or outperform more complex agent architectures. Our findings suggest that simple programmatic interfaces, combined with strong foundation models, are sufficient for practical enterprise automation.', 'score': 65, 'issue_id': 1758, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '35592437eac363f9', 'authors': ['Patrice Bechard', 'Orlando Marquez Ayala', 'Emily Chen', 'Jordan Skelton', 'Sagar Davasam', 'Srinivas Sunkara', 'Vikas Yadav', 'Sai Rajeswar'], 'affiliations': ['Mila Quebec AI Institute', 'ServiceNow', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2604.00073.jpg', 'data': {'categories': [], 'emoji': '⚙️', 'ru': {'title': 'Простота против сложности: терминальные агенты превосходят комплексные системы', 'desc': 'В статье исследуется эффективность простых агентов на основе LLM, которые работают через терминал и прямое взаимодействие с API, без сложных инструментов и графических интерфейсов. Авторы показывают, что такие минималистичные агенты могут решать задачи корпоративной автоматизации не хуже, а иногда и лучше, чем сложные системы с множеством интеграций и абстракций типа Model Context Protocol. Исследование включает оценку на разнообразных реальных системах, где терминальные агенты демонстрируют конкурентную производительность. Результаты подтверждают, что мощные фундаментальные модели в сочетании с простыми программными интерфейсами достаточны для практической корпоративной автоматизации.'}, 'en': {'title': 'Simplicity in Coding Agents: Powering Enterprise Tasks Effectively', 'desc': 'This paper explores the effectiveness of simple terminal-based coding agents in performing enterprise tasks. It compares these agents, which use programmatic interfaces and foundation models, to more complex tool-augmented agents. The research shows that the simpler agents can match or even exceed the performance of their more complicated counterparts. The findings indicate that for many enterprise applications, straightforward coding agents are a cost-effective and efficient solution.'}, 'zh': {'title': '简单代理，强大自动化！', 'desc': '本论文探讨了简单的终端编码代理如何利用程序接口和基础模型有效地执行企业任务。研究表明，这些简单的代理在与平台API直接交互时，能够比复杂的工具增强代理更高效地完成任务。通过对多种真实系统的评估，结果显示低级终端代理的表现与复杂代理架构相当，甚至更优。我们的发现表明，结合强大的基础模型，简单的程序接口足以实现实际的企业自动化。'}}}, {'id': 'https://huggingface.co/papers/2603.28407', 'title': 'MiroEval: Benchmarking Multimodal Deep Research Agents in Process and Outcome', 'url': 'https://huggingface.co/papers/2603.28407', 'abstract': 'Abstract MiroEval addresses limitations of existing deep research system benchmarks by introducing a comprehensive evaluation framework that assesses adaptive synthesis, agentic factuality verification, and process-centric auditing across real-user tasks.  AI-generated summary Recent progress in deep research systems has been impressive, but evaluation still lags behind real user needs. Existing benchmarks predominantly assess final reports using fixed rubrics, failing to evaluate the underlying research process. Most also offer limited multimodal coverage, rely on synthetic tasks that do not reflect real-world query complexity, and cannot be refreshed as knowledge evolves. To address these gaps, we introduce MiroEval, a benchmark and evaluation framework for deep research systems. The benchmark comprises 100 tasks (70 text-only, 30 multimodal), all grounded in real user needs and constructed via a dual-path pipeline that supports periodic updates, enabling a live and evolving setting. The proposed evaluation suite assesses deep research systems along three complementary dimensions: adaptive synthesis quality evaluation with task-specific rubrics, agentic factuality verification via active retrieval and reasoning over both web sources and multimodal attachments, and process-centric evaluation audits how the system searches, reasons, and refines throughout its investigation. Evaluation across 13 systems yields three principal findings: the three evaluation dimensions capture complementary aspects of system capability, with each revealing distinct strengths and weaknesses across systems; process quality serves as a reliable predictor of overall outcome while revealing weaknesses invisible to output-level metrics; and multimodal tasks pose substantially greater challenges, with most systems declining by 3 to 10 points. The MiroThinker series achieves the most balanced performance, with MiroThinker-H1 ranking the highest overall in both settings. Human verification and robustness results confirm the reliability of the benchmark and evaluation framework. MiroEval provides a holistic diagnostic tool for the next generation of deep research agents.', 'score': 52, 'issue_id': 1758, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'da58b366fbbd0693', 'authors': ['Fangda Ye', 'Yuxin Hu', 'Pengxiang Zhu', 'Yibo Li', 'Ziqi Jin', 'Yao Xiao', 'Yibo Wang', 'Lei Wang', 'Zhen Zhang', 'Lu Wang', 'Yue Deng', 'Bin Wang', 'Yifan Zhang', 'Liangcai Su', 'Xinyu Wang', 'He Zhao', 'Chen Wei', 'Qiang Ren', 'Bryan Hooi', 'An Bo', 'Shuicheng Yan', 'Lidong Bing'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.28407.jpg', 'data': {'categories': ['#multimodal', '#agents', '#dataset', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'От результатов к процессу: диагностика глубокого исследования через комплексную оценку', 'desc': 'MiroEval представляет комплексную платформу для оценки систем глубокого исследования, которая выходит за пределы анализа только финальных результатов. Фреймворк оценивает три ключевых аспекта: качество синтеза информации с адаптивными критериями, проверку фактической корректности через активный поиск в веб-источниках и мультимодальных материалах, а также анализ процесса поиска и рассуждений системы. Бенчмарк включает 100 реальных задач (70 текстовых и 30 мультимодальных) с возможностью периодического обновления по мере эволюции знаний. Результаты показывают, что качество процесса исследования является надежным предиктором итогового результата и выявляет слабости, невидимые при оценке только выходных данных.'}, 'en': {'title': 'MiroEval: A New Standard for Evaluating Deep Research Systems', 'desc': 'MiroEval is a new evaluation framework designed to improve how we assess deep research systems. It focuses on three key areas: the quality of adaptive synthesis, the verification of factual information, and the auditing of the research process itself. Unlike previous benchmarks that only look at final outputs, MiroEval evaluates how systems perform real user tasks and adapts to new knowledge. This comprehensive approach helps identify strengths and weaknesses in research systems, especially in complex multimodal tasks.'}, 'zh': {'title': 'MiroEval：深度研究系统的全面评估框架', 'desc': 'MiroEval 是一个新的评估框架，旨在解决现有深度研究系统基准的局限性。它通过评估适应性合成、事实验证和过程审计，来满足真实用户的需求。该框架包含100个任务，涵盖文本和多模态内容，并支持定期更新，以反映知识的演变。研究表明，过程质量是整体结果的可靠预测指标，而多模态任务则显著增加了系统的挑战。'}}}, {'id': 'https://huggingface.co/papers/2603.25823', 'title': 'ViGoR-Bench: How Far Are Visual Generative Models From Zero-Shot Visual Reasoners?', 'url': 'https://huggingface.co/papers/2603.25823', 'abstract': 'Abstract ViGoR benchmark addresses limitations in current AIGC evaluation by introducing a comprehensive framework for assessing visual generative reasoning across multiple modalities and cognitive dimensions.  AI-generated summary Beneath the stunning visual fidelity of modern AIGC models lies a "logical desert", where systems fail tasks that require physical, causal, or complex spatial reasoning. Current evaluations largely rely on superficial metrics or fragmented benchmarks, creating a ``performance mirage\'\' that overlooks the generative process. To address this, we introduce ViGoR Vision-G}nerative Reasoning-centric Benchmark), a unified framework designed to dismantle this mirage. ViGoR distinguishes itself through four key innovations: 1) holistic cross-modal coverage bridging Image-to-Image and Video tasks; 2) a dual-track mechanism evaluating both intermediate processes and final results; 3) an evidence-grounded automated judge ensuring high human alignment; and 4) granular diagnostic analysis that decomposes performance into fine-grained cognitive dimensions. Experiments on over 20 leading models reveal that even state-of-the-art systems harbor significant reasoning deficits, establishing ViGoR as a critical ``stress test\'\' for the next generation of intelligent vision models. The demo have been available at https://vincenthancoder.github.io/ViGoR-Bench/', 'score': 36, 'issue_id': 1758, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'fdf3125057d9f9cd', 'authors': ['Haonan Han', 'Jiancheng Huang', 'Xiaopeng Sun', 'Junyan He', 'Rui Yang', 'Jie Hu', 'Xiaojiang Peng', 'Lin Ma', 'Xiaoming Wei', 'Xiu Li'], 'affiliations': ['Meituan M17', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25823.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#video', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'За фасадом красоты: выявление логических дефицитов в генеративных моделях зрения', 'desc': 'Статья представляет ViGoR — комплексный бенчмарк для оценки способности моделей генеративного искусственного интеллекта к логическому рассуждению при работе с визуальными данными. Авторы показывают, что современные AIGC модели обладают высокой визуальной точностью, но испытывают серьёзные трудности с задачами, требующими понимания физических законов, причинно-следственных связей и сложных пространственных отношений. Предложенный бенчмарк включает четыре ключевых компонента: кросс-модальное покрытие (обработка изображений и видео), двухуровневую оценку (промежуточные процессы и итоговые результаты), автоматического судью с выравниванием по человеческим оценкам и детальный диагностический анализ по когнитивным параметрам. Экспериментальная проверка на 20+ ведущих моделях выявила значительные дефициты в логическом мышлении даже у самых передовых систем.'}, 'en': {'title': 'ViGoR: Unveiling the True Reasoning Power of AIGC', 'desc': 'The ViGoR benchmark addresses the shortcomings in evaluating AI-generated content (AIGC) by providing a structured framework for assessing visual generative reasoning across different modalities. It highlights the gap in current evaluations, which often focus on superficial metrics, leading to a misleading perception of model performance. ViGoR introduces innovative features such as cross-modal coverage, a dual-track evaluation system, and an evidence-based judging mechanism to ensure alignment with human reasoning. Through extensive testing on leading models, it reveals significant reasoning deficits, positioning ViGoR as an essential tool for advancing intelligent vision systems.'}, 'zh': {'title': 'ViGoR：视觉生成推理的全面评估框架', 'desc': 'ViGoR基准测试旨在解决当前AIGC评估的局限性，提供一个全面的框架来评估视觉生成推理。该框架通过四个关键创新，涵盖了图像到图像和视频任务的跨模态评估。它采用双轨机制，评估中间过程和最终结果，并引入基于证据的自动评判，确保与人类的高对齐度。实验表明，即使是最先进的系统在推理能力上仍存在显著缺陷，ViGoR成为下一代智能视觉模型的重要“压力测试”。'}}}, {'id': 'https://huggingface.co/papers/2603.26648', 'title': 'Vision2Web: A Hierarchical Benchmark for Visual Website Development with Agent Verification', 'url': 'https://huggingface.co/papers/2603.26648', 'abstract': 'Abstract Vision2Web presents a comprehensive benchmark for visual website development tasks and evaluates coding agents across static UI generation, interactive frontend reproduction, and full-stack development with varying complexity levels.  AI-generated summary Recent advances in large language models have improved the capabilities of coding agents, yet systematic evaluation of complex, end-to-end website development remains limited. To address this gap, we introduce Vision2Web, a hierarchical benchmark for visual website development, spanning from static UI-to-code generation, interactive multi-page frontend reproduction, to long-horizon full-stack website development. The benchmark is constructed from real-world websites and comprises a total of 193 tasks across 16 categories, with 918 prototype images and 1,255 test cases. To support flexible, thorough and reliable evaluation, we propose workflow-based agent verification paradigm based on two complementary components: a GUI agent verifier and a VLM-based judge. We evaluate multiple visual language models instantiated under different coding-agent frameworks, revealing substantial performance gaps at all task levels, with state-of-the-art models still struggling on full-stack development.', 'score': 32, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'c0e7b77e1e298207', 'authors': ['Zehai He', 'Wenyi Hong', 'Zhen Yang', 'Ziyang Pan', 'Mingdao Liu', 'Xiaotao Gu', 'Jie Tang'], 'affiliations': ['Tsinghua University', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.26648.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#cv', '#plp', '#dataset', '#optimization'], 'emoji': '🌐', 'ru': {'title': 'От скетча к коду: иерархический бенчмарк для оценки агентов веб-разработки', 'desc': 'Vision2Web — это комплексный бенчмарк для оценки агентов, использующих большие языковые модели, на задачах разработки веб-сайтов различной сложности. Бенчмарк включает три уровня задач: генерация статического UI-кода, воспроизведение интерактивного мультистраничного фронтенда и полнофункциональная разработка веб-приложений. Набор данных состоит из 193 реальных задач, 918 изображений прототипов и 1255 тестовых случаев, разделённых на 16 категорий. Для надёжной оценки предложена парадигма верификации, основанная на GUI-агенте и судье на основе зрительной языковой модели, которая выявила значительные различия в производительности современных моделей на всех уровнях сложности.'}, 'en': {'title': 'Benchmarking Visual Website Development with Vision2Web', 'desc': 'Vision2Web is a new benchmark designed to evaluate coding agents in various visual website development tasks, including static UI generation and full-stack development. It consists of 193 tasks across 16 categories, utilizing real-world websites to create a comprehensive testing environment. The benchmark introduces a workflow-based agent verification system that includes a GUI agent verifier and a visual language model (VLM)-based judge for accurate assessments. Despite advancements in large language models, the evaluation shows that even the best models face challenges in complex full-stack development tasks.'}, 'zh': {'title': '视觉网站开发的全面评估基准', 'desc': 'Vision2Web是一个全面的基准测试，专注于视觉网站开发任务，评估编码代理在静态用户界面生成、交互式前端重现和全栈开发等不同复杂度下的表现。该基准测试涵盖了从静态UI到代码生成、交互式多页面前端重现到长时间全栈网站开发的多个层次。它基于真实网站构建，共包含193个任务，分为16个类别，配有918个原型图像和1255个测试案例。我们提出了一种基于工作流的代理验证范式，以支持灵活、全面和可靠的评估，发现当前最先进的模型在全栈开发上仍面临显著的性能差距。'}}}, {'id': 'https://huggingface.co/papers/2603.26017', 'title': 'QuitoBench: A High-Quality Open Time Series Forecasting Benchmark', 'url': 'https://huggingface.co/papers/2603.26017', 'abstract': 'Abstract QuitoBench addresses the lack of large-scale time series benchmarks by introducing a regime-balanced dataset with eight TSF regimes, revealing that foundation models outperform deep learning at long contexts while scaling data provides greater benefits than scaling model size.  AI-generated summary Time series forecasting is critical across finance, healthcare, and cloud computing, yet progress is constrained by a fundamental bottleneck: the scarcity of large-scale, high-quality benchmarks. To address this gap, we introduce QuitoBench, a regime-balanced benchmark for time series forecasting with coverage across eight trendtimesseasonalitytimesforecastability (TSF) regimes, designed to capture forecasting-relevant properties rather than application-defined domain labels. The benchmark is built upon Quito, a billion-scale time series corpus of application traffic from Alipay spanning nine business domains. Benchmarking 10 models from deep learning, foundation models, and statistical baselines across 232,200 evaluation instances, we report four key findings: (i) a context-length crossover where deep learning models lead at short context (L=96) but foundation models dominate at long context (L ge 576); (ii) forecastability is the dominant difficulty driver, producing a 3.64 times MAE gap across regimes; (iii) deep learning models match or surpass foundation models at 59 times fewer parameters; and (iv) scaling the amount of training data provides substantially greater benefit than scaling model size for both model families. These findings are validated by strong cross-benchmark and cross-metric consistency. Our open-source release enables reproducible, regime-aware evaluation for time series forecasting research.', 'score': 25, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'a1b74104dedd58a2', 'authors': ['Siqiao Xue', 'Zhaoyang Zhu', 'Wei Zhang', 'Rongyao Cai', 'Rui Wang', 'Yixiang Mu', 'Fan Zhou', 'Jianguo Li', 'Peng Di', 'Hang Yu'], 'affiliations': ['Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.26017.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '📈', 'ru': {'title': 'Данные важнее размера: как правильный датасет превосходит масштабирование моделей', 'desc': 'QuitoBench представляет крупномасштабный сбалансированный датасет для прогнозирования временных рядов, охватывающий восемь различных режимов (тренд, сезонность, предсказуемость). Исследование сравнивает 10 моделей из категорий глубокого обучения, foundation models и статистических методов на 232 200 примерах оценки. Ключевое открытие: foundation models превосходят глубокие нейросети при длинных контекстах (L ≥ 576), тогда как глубокое обучение лидирует при коротких (L=96). Результаты показывают, что увеличение объёма тренировочных данных дает существенно больший прирост производительности, чем увеличение размера модели.'}, 'en': {'title': 'QuitoBench: Revolutionizing Time Series Forecasting with Diverse Regimes', 'desc': 'QuitoBench is a new benchmark for time series forecasting that addresses the need for large-scale, high-quality datasets. It includes eight different forecasting regimes to better evaluate models based on their performance rather than specific application areas. The study finds that foundation models perform better than deep learning models when dealing with long context lengths, while deep learning excels in shorter contexts. Additionally, increasing the amount of training data is more beneficial for model performance than simply increasing the model size.'}, 'zh': {'title': 'QuitoBench：时间序列预测的新基准', 'desc': 'QuitoBench是一个针对时间序列预测的基准数据集，解决了大规模高质量基准稀缺的问题。它包含八种不同的时间序列预测（TSF）模式，旨在捕捉与预测相关的特性。研究发现，基础模型在长上下文中表现优于深度学习模型，而增加训练数据的规模比增加模型规模带来更大的好处。该基准的开放源代码发布，促进了时间序列预测研究的可重复性和模式意识评估。'}}}, {'id': 'https://huggingface.co/papers/2604.01161', 'title': 'Reasoning Shift: How Context Silently Shortens LLM Reasoning', 'url': 'https://huggingface.co/papers/2604.01161', 'abstract': 'Abstract Reasoning behaviors in large language models compress under varied contextual conditions, potentially impacting performance on complex tasks despite maintaining accuracy on simpler ones.  AI-generated summary Large language models (LLMs) exhibiting test-time scaling behavior, such as extended reasoning traces and self-verification, have demonstrated remarkable performance on complex, long-term reasoning tasks. However, the robustness of these reasoning behaviors remains underexplored. To investigate this, we conduct a systematic evaluation of multiple reasoning models across three scenarios: (1) problems augmented with lengthy, irrelevant context; (2) multi-turn conversational settings with independent tasks; and (3) problems presented as a subtask within a complex task. We observe an interesting phenomenon: reasoning models tend to produce much shorter reasoning traces (up to 50%) for the same problem under different context conditions compared to the traces produced when the problem is presented in isolation. A finer-grained analysis reveals that this compression is associated with a decrease in self-verification and uncertainty management behaviors, such as double-checking. While this behavioral shift does not compromise performance on straightforward problems, it might affect performance on more challenging tasks. We hope our findings draw additional attention to both the robustness of reasoning models and the problem of context management for LLMs and LLM-based agents.', 'score': 22, 'issue_id': 1760, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '61c983d2a8dba055', 'authors': ['Gleb Rodionov'], 'affiliations': ['Yandex'], 'pdf_title_img': 'assets/pdf/title_img/2604.01161.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Когда контекст сжимает рассуждения: парадокс надёжности LLM', 'desc': 'Исследование показывает, что большие языковые модели сокращают длину своих рассуждений при изменении контекста задачи, хотя сама точность ответов остаётся высокой. Авторы обнаружили, что в условиях добавленного контекста, многооборотных диалогов или вложенных задач модели производят следы рассуждений на 50% короче, чем при изолированном представлении проблемы. Сокращение рассуждений связано со снижением поведения самопроверки и управления неопределённостью, что может негативно повлиять на решение сложных задач. Работа акцентирует внимание на надёжности моделей с увеличенным временем вывода и важности правильного управления контекстом в LLM-системах.'}, 'en': {'title': 'Context Matters: Unpacking Reasoning in Large Language Models', 'desc': "This paper investigates how large language models (LLMs) perform reasoning tasks under different contextual conditions. It finds that when faced with irrelevant or complex contexts, these models tend to produce shorter reasoning traces, which can lead to less thorough self-verification and uncertainty management. While this compression does not significantly affect performance on simpler tasks, it raises concerns about the models' effectiveness on more complex problems. The study emphasizes the need for better understanding and management of context in LLMs to enhance their reasoning capabilities."}, 'zh': {'title': '推理模型的上下文管理与表现', 'desc': '这篇论文探讨了大型语言模型在不同上下文条件下的推理行为压缩现象。研究发现，当问题在复杂上下文中呈现时，推理模型的推理轨迹会显著缩短，最多可减少50%。这种压缩与自我验证和不确定性管理行为的减少有关，例如双重检查。虽然这种行为变化不会影响简单问题的表现，但可能会对更复杂任务的表现产生影响。'}}}, {'id': 'https://huggingface.co/papers/2604.00025', 'title': 'Brevity Constraints Reverse Performance Hierarchies in Language Models', 'url': 'https://huggingface.co/papers/2604.00025', 'abstract': 'Abstract Large language models can underperform smaller ones due to verbose responses that introduce errors, but constraining output length reveals their superior capabilities and improves performance across benchmarks.  AI-generated summary Standard evaluation protocols reveal a counterintuitive phenomenon: on 7.7% of benchmark problems spanning five datasets, larger language models underperform smaller ones by 28.4 percentage points despite 10-100x more parameters. Through systematic evaluation of 31 models (0.5B-405B parameters) across 1,485 problems, we identify the mechanism as spontaneous scale-dependent verbosity that introduces errors through overelaboration. Causal intervention experiments demonstrate this reflects correctable prompt design rather than fundamental capability limitations. Constraining large models to produce brief responses improves accuracy by 26 percentage points and reduces performance gaps by up to two-thirds. Most critically, brevity constraints completely reverse performance hierarchies on mathematical reasoning and scientific knowledge benchmarks, with large models achieving 7.7-15.9 percentage point advantages over small models -- direct inversions of the original gaps. These reversals prove large models possess superior latent capabilities that universal prompting masks. We validate findings through three independent contamination tests and demonstrate inverse scaling operates continuously across the full parameter spectrum, with dataset-specific optimal scales ranging from 0.5B to 3.0B parameters. Our results establish that maximizing large model performance requires scale-aware prompt engineering rather than universal evaluation protocols, with immediate implications for deployment: prompt adaptation simultaneously improves accuracy and reduces computational costs.', 'score': 16, 'issue_id': 1765, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'd7296efd7115cc86', 'authors': ['MD Azizul Hakim'], 'affiliations': ['Department of Computer Science Bangladesh Sweden Polytechnic Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.00025.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#optimization', '#math', '#training', '#science'], 'emoji': '📏', 'ru': {'title': 'Размер не всегда важен: как краткость раскрывает скрытые способности больших языковых моделей', 'desc': 'В работе исследуется парадоксальное явление, когда большие языковые модели показывают худшие результаты, чем меньшие модели на некоторых задачах. Авторы выявили причину — спонтанное увеличение многословности ответов с ростом масштаба модели, что приводит к ошибкам через перелабораторность. Проведены причинные эксперименты, показавшие, что это корректируется через подходящий инженеринг промптов, а не является фундаментальным ограничением. Ограничение длины ответов больших моделей улучшает точность на 26 процентных пункта и полностью обращает иерархию производительности на бенчмарках математического рассуждения и научных знаний.'}, 'en': {'title': 'Brevity Boosts Performance: Unlocking Large Model Potential', 'desc': "This paper investigates the performance of large language models compared to smaller ones, revealing that larger models can sometimes perform worse due to verbosity in their responses. The authors conducted a systematic evaluation of 31 models with varying parameters and found that when output length is constrained, larger models significantly improve their accuracy. They identify the issue of 'scale-dependent verbosity' as a key factor that leads to errors in larger models, which can be corrected through better prompt design. The findings suggest that optimizing the performance of large models requires tailored prompt engineering rather than relying on standard evaluation methods."}, 'zh': {'title': '优化大型模型表现的关键在于提示设计', 'desc': '这篇论文探讨了大型语言模型在输出长度受限时的表现。研究发现，尽管大型模型参数数量是小型模型的10到100倍，但在某些基准测试中，它们的表现反而不如小型模型。通过对31个模型的系统评估，作者指出，输出冗长会引入错误，而限制输出长度可以显著提高准确性。最终，研究表明，优化大型模型的表现需要针对性地设计提示，而不是使用通用的评估协议。'}}}, {'id': 'https://huggingface.co/papers/2604.01221', 'title': 'HippoCamp: Benchmarking Contextual Agents on Personal Computers', 'url': 'https://huggingface.co/papers/2604.01221', 'abstract': "Abstract HippoCamp is a multimodal file management benchmark that evaluates agents' capabilities in user-centric environments, revealing significant performance gaps in long-horizon retrieval and cross-modal reasoning within dense personal file systems.  AI-generated summary We present HippoCamp, a new benchmark designed to evaluate agents' capabilities on multimodal file management. Unlike existing agent benchmarks that focus on tasks like web interaction, tool use, or software automation in generic settings, HippoCamp evaluates agents in user-centric environments to model individual user profiles and search massive personal files for context-aware reasoning. Our benchmark instantiates device-scale file systems over real-world profiles spanning diverse modalities, comprising 42.4 GB of data across over 2K real-world files. Building upon the raw files, we construct 581 QA pairs to assess agents' capabilities in search, evidence perception, and multi-step reasoning. To facilitate fine-grained analysis, we provide 46.1K densely annotated structured trajectories for step-wise failure diagnosis. We evaluate a wide range of state-of-the-art multimodal large language models (MLLMs) and agentic methods on HippoCamp. Our comprehensive experiments reveal a significant performance gap: even the most advanced commercial models achieve only 48.3% accuracy in user profiling, struggling particularly with long-horizon retrieval and cross-modal reasoning within dense personal file systems. Furthermore, our step-wise failure diagnosis identifies multimodal perception and evidence grounding as the primary bottlenecks. Ultimately, HippoCamp exposes the critical limitations of current agents in realistic, user-centric environments and provides a robust foundation for developing next-generation personal AI assistants.", 'score': 15, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '5ad6293d28766d6f', 'authors': ['Zhe Yang', 'Shulin Tian', 'Kairui Hu', 'Shuai Liu', 'Hoang-Nhat Nguyen', 'Yichi Zhang', 'Zujin Guo', 'Mengying Yu', 'Zinan Zhang', 'Jingkang Yang', 'Chen Change Loy', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University, Singapore', 'Synvo AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.01221.jpg', 'data': {'categories': ['#multimodal', '#agents', '#dataset', '#benchmark'], 'emoji': '📁', 'ru': {'title': 'Преодоление пропасти между текущими агентами и персональными AI-ассистентами через понимание мультимодальных файловых систем', 'desc': 'HippoCamp — это бенчмарк для оценки способностей агентов работать с мультимодальными файловыми системами в персональных окружениях пользователей. Авторы создали набор данных на основе 42.4 ГБ реальных файлов и 581 пары вопрос-ответ для тестирования поиска, восприятия контекста и многошагового рассуждения. При оценке современных мультимодальных больших языковых моделей и методов агентов выявлены значительные пробелы в производительности, особенно в долгосрочном поиске информации и кросс-модальном рассуждении. Исследование показало, что даже передовые коммерческие модели достигают только 48.3% точности в профилировании пользователей, выявив восприятие мультимодальных данных как основное узкое место.'}, 'en': {'title': 'HippoCamp: Bridging the Gap in AI File Management', 'desc': "HippoCamp is a benchmark designed to test how well AI agents manage files in user-focused environments. It highlights the challenges agents face in retrieving information over long periods and reasoning across different types of data. The benchmark includes a large dataset of personal files and structured questions to evaluate agents' performance in search and reasoning tasks. Results show that even advanced AI models struggle significantly, achieving only 48.3% accuracy in understanding user profiles, indicating a need for improvement in multimodal perception and evidence grounding."}, 'zh': {'title': 'HippoCamp：评估智能体在用户中心环境中的能力', 'desc': 'HippoCamp是一个多模态文件管理基准，旨在评估智能体在用户中心环境中的能力。与现有的基准不同，HippoCamp专注于个体用户的文件检索和上下文感知推理。我们构建了一个包含42.4GB数据的真实文件系统，并设计了581个问答对来评估智能体的搜索和多步推理能力。实验结果显示，当前最先进的模型在用户画像方面的准确率仅为48.3%，特别是在长时间检索和跨模态推理方面存在显著的性能差距。'}}}, {'id': 'https://huggingface.co/papers/2603.26653', 'title': 'PerceptionComp: A Video Benchmark for Complex Perception-Centric Reasoning', 'url': 'https://huggingface.co/papers/2603.26653', 'abstract': 'Abstract PerceptionComp is a benchmark for complex, long-horizon video reasoning requiring multiple temporal visual evidence pieces and compositional logic across various perceptual subtasks.  AI-generated summary We introduce PerceptionComp, a manually annotated benchmark for complex, long-horizon, perception-centric video reasoning. PerceptionComp is designed so that no single moment is sufficient: answering each question requires multiple temporally separated pieces of visual evidence and compositional constraints under conjunctive and sequential logic, spanning perceptual subtasks such as objects, attributes, relations, locations, actions, and events, and requiring skills including semantic recognition, visual correspondence, temporal reasoning, and spatial reasoning. The benchmark contains 1,114 highly complex questions on 279 videos from diverse domains including city walk tours, indoor villa tours, video games, and extreme outdoor sports, with 100% manual annotation. Human studies show that PerceptionComp requires substantial test-time thinking and repeated perception steps: participants take much longer than on prior benchmarks, and accuracy drops to near chance (18.97%) when rewatching is disallowed. State-of-the-art MLLMs also perform substantially worse on PerceptionComp than on existing benchmarks: the best model in our evaluation, Gemini-3-Flash, reaches only 45.96% accuracy in the five-choice setting, while open-source models remain below 40%. These results suggest that perception-centric long-horizon video reasoning remains a major bottleneck, and we hope PerceptionComp will help drive progress in perceptual reasoning.', 'score': 14, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'd18256c7b5dcde6f', 'authors': ['Shaoxuan Li', 'Zhixuan Zhao', 'Hanze Deng', 'Zirun Ma', 'Shulin Tian', 'Zuyan Liu', 'Yushi Hu', 'Haoning Wu', 'Yuhao Dong', 'Benlin Liu', 'Ziwei Liu', 'Ranjay Krishna'], 'affiliations': ['Nanyang Technological University', 'Tsinghua University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.26653.jpg', 'data': {'categories': ['#multimodal', '#video', '#dataset', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Тесты на комплексное понимание видео через множественные временные доказательства', 'desc': 'PerceptionComp — это бенчмарк для оценки мультимодальных моделей на сложных задачах видеорассуждения, требующих анализа множества разделённых во времени визуальных фрагментов и композиционной логики. Задачи охватывают различные перцептивные подзадачи: распознавание объектов, их атрибутов, отношений, действий и событий, а также требуют навыков семантического распознавания, визуального соответствия, временного и пространственного рассуждения. Бенчмарк содержит 1114 сложных вопросов к 279 видеороликам из разнообразных доменов с полной ручной аннотацией, при этом лучшие современные МЛЛМ достигают только 45.96% точности. Результаты показывают, что долгосрочное видеорассуждение, ориентированное на восприятие, остаётся значительным узким местом для развития моделей глубокого обучения.'}, 'en': {'title': 'Unlocking Complex Video Reasoning with PerceptionComp', 'desc': 'PerceptionComp is a new benchmark designed for evaluating complex video reasoning tasks that require understanding multiple pieces of visual information over time. It focuses on perception-centric reasoning, where answering questions involves recognizing objects, actions, and their relationships across different moments in a video. The benchmark includes 1,114 challenging questions based on 279 videos from various domains, all manually annotated to ensure high quality. Results show that both humans and state-of-the-art machine learning models struggle significantly with this benchmark, highlighting the need for advancements in long-horizon video reasoning capabilities.'}, 'zh': {'title': '推动感知推理进步的基准测试', 'desc': 'PerceptionComp是一个用于复杂长时视频推理的基准测试，强调多种时间视觉证据和组合逻辑的应用。每个问题的回答需要多个时间上分离的视觉证据，并涉及对象、属性、关系、位置、动作和事件等感知子任务。该基准包含1114个复杂问题，涵盖279个来自不同领域的视频，所有问题均经过人工标注。研究表明，PerceptionComp在测试时需要大量思考，且现有的机器学习模型在此基准上的表现远低于其他基准，显示出感知中心的长时视频推理仍然是一个重要的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2604.01220', 'title': 'Universal YOCO for Efficient Depth Scaling', 'url': 'https://huggingface.co/papers/2604.01220', 'abstract': 'Abstract Universal YOCO combines YOCO decoder-decoder architecture with recursive computation to achieve efficient inference and improved scaling behavior in large language models.  AI-generated summary The rise of test-time scaling has remarkably boosted the reasoning and agentic proficiency of Large Language Models (LLMs). Yet, standard Transformers struggle to scale inference-time compute efficiently, as conventional looping strategies suffer from high computational overhead and a KV cache that inflates alongside model depth. We present Universal YOCO (YOCO-U), which combines the YOCO decoder-decoder architecture with recursive computation to achieve a synergistic effect greater than either alone. Built on the YOCO framework, YOCO-U implements a Universal Self-Decoder that performs multiple iterations via parameter sharing, while confining the iterative process to shallow, efficient-attention layers. This combination yields a favorable capability-efficiency tradeoff that neither YOCO nor recursion achieves independently. The YOCO architecture provides a constant global KV cache and linear pre-filling, while partial recursion enhances representational depth with limited overhead. Together, YOCO-U improves token utility and scaling behavior while maintaining efficient inference. Empirical results confirm that YOCO-U remains highly competitive in general and long-context benchmarks, demonstrating that the integration of efficient-attention architectures and recursive computation is a promising direction for scalable LLMs.', 'score': 11, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'aa6e68e7f66496df', 'authors': ['Yutao Sun', 'Li Dong', 'Tianzhu Ye', 'Shaohan Huang', 'Jianyong Wang', 'Furu Wei'], 'affiliations': ['Microsoft Research', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01220.jpg', 'data': {'categories': ['#long_context', '#inference', '#training', '#architecture', '#reasoning', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Эффективное масштабирование инференса через рекурсивные декодер-архитектуры', 'desc': 'Universal YOCO объединяет архитектуру декодер-декодер YOCO с рекурсивными вычислениями для достижения эффективного вывода и улучшенного масштабирования больших языковых моделей. Основная проблема заключается в том, что стандартные Transformers неэффективно масштабируют вычисления во время инференса, так как обычные циклические стратегии создают высокие вычислительные затраты и растущий KV кэш. YOCO-U реализует универсальный самодекодер с итеративным процессом через разделение параметров, сосредоточивая вычисления в неглубоких слоях с эффективным вниманием. Синергия между постоянным глобальным KV кэшем, линейным предзаполнением и частичной рекурсией обеспечивает лучший компромисс между производительностью и эффективностью при сохранении скорости инференса.'}, 'en': {'title': 'Efficient Inference with Universal YOCO: Scaling LLMs Smartly', 'desc': "Universal YOCO (YOCO-U) is a novel architecture that enhances the efficiency of large language models (LLMs) during inference. It combines a YOCO decoder-decoder framework with recursive computation, allowing for multiple iterations without significant computational overhead. This approach maintains a constant global key-value (KV) cache and utilizes shallow attention layers, improving the model's capability while keeping resource usage low. Empirical results show that YOCO-U performs competitively on various benchmarks, highlighting its potential for scalable and efficient LLMs."}, 'zh': {'title': '高效推理与扩展性的完美结合', 'desc': 'Universal YOCO（YOCO-U）结合了YOCO解码器架构和递归计算，以提高大语言模型的推理效率和扩展性。传统的Transformer在推理时计算效率低下，而YOCO-U通过共享参数的方式在浅层高效注意力层中进行多次迭代，从而实现了更好的能力与效率平衡。该架构提供了恒定的全局KV缓存和线性预填充，同时部分递归增强了表示深度，且开销有限。实验结果表明，YOCO-U在一般和长上下文基准测试中表现出色，证明了高效注意力架构与递归计算的结合是可扩展大语言模型的有前景方向。'}}}, {'id': 'https://huggingface.co/papers/2603.26661', 'title': 'GaussianGPT: Towards Autoregressive 3D Gaussian Scene Generation', 'url': 'https://huggingface.co/papers/2603.26661', 'abstract': 'Abstract GaussianGPT uses a transformer-based autoregressive approach with 3D rotary positional embeddings to generate 3D scenes by predicting Gaussian primitives, offering advantages over diffusion methods in terms of controllability and flexibility.  AI-generated summary Most recent advances in 3D generative modeling rely on diffusion or flow-matching formulations. We instead explore a fully autoregressive alternative and introduce GaussianGPT, a transformer-based model that directly generates 3D Gaussians via next-token prediction, thus facilitating full 3D scene generation. We first compress Gaussian primitives into a discrete latent grid using a sparse 3D convolutional autoencoder with vector quantization. The resulting tokens are serialized and modeled using a causal transformer with 3D rotary positional embedding, enabling sequential generation of spatial structure and appearance. Unlike diffusion-based methods that refine scenes holistically, our formulation constructs scenes step-by-step, naturally supporting completion, outpainting, controllable sampling via temperature, and flexible generation horizons. This formulation leverages the compositional inductive biases and scalability of autoregressive modeling while operating on explicit representations compatible with modern neural rendering pipelines, positioning autoregressive transformers as a complementary paradigm for controllable and context-aware 3D generation.', 'score': 10, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '7aaf7d9533c3bf62', 'authors': ['Nicolas von Lützow', 'Barbara Rössle', 'Katharina Schmid', 'Matthias Nießner'], 'affiliations': ['Technical University of Munich, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2603.26661.jpg', 'data': {'categories': ['#training', '#3d', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Автарегрессивный трансформер для управляемой генерации 3D сцен', 'desc': 'GaussianGPT — это трансформер-основанная модель, которая генерирует 3D сцены путём последовательного предсказания примитивов Гаусса, используя причинный механизм трансформера с 3D ротационными позиционными эмбеддингами. Модель сначала сжимает гауссовы примитивы в дискретную решётку скрытых состояний через разреженный 3D свёрточный автокодировщик с векторным квантованием. Последовательная генерация достигается путём автарегрессивного моделирования токенов, что позволяет строить сцены пошагово и поддерживает такие операции как дополнение сцены, расширение и контролируемую выборку. В отличие от диффузионных методов, этот подход обеспечивает лучшую управляемость, гибкость и совместимость с современными конвейерами нейронного рендеринга.'}, 'en': {'title': 'Transforming 3D Scene Generation with GaussianGPT', 'desc': 'GaussianGPT is a novel model that generates 3D scenes using a transformer-based autoregressive approach, which predicts Gaussian primitives. It utilizes 3D rotary positional embeddings to enhance the spatial understanding of the generated scenes. Unlike traditional diffusion methods, GaussianGPT constructs scenes incrementally, allowing for greater control and flexibility in the generation process. This model combines the strengths of autoregressive modeling with explicit representations, making it suitable for modern neural rendering applications.'}, 'zh': {'title': 'GaussianGPT：灵活可控的3D生成新方法', 'desc': 'GaussianGPT是一种基于变换器的自回归模型，使用3D旋转位置嵌入生成3D场景，通过预测高斯原语来实现。这种方法相比扩散方法在可控性和灵活性上具有优势。模型首先利用稀疏3D卷积自编码器和向量量化将高斯原语压缩为离散潜在网格，然后通过因果变换器进行序列生成。与扩散方法不同，GaussianGPT逐步构建场景，支持完成、外扩、可控采样和灵活生成。'}}}, {'id': 'https://huggingface.co/papers/2604.01193', 'title': 'Embarrassingly Simple Self-Distillation Improves Code Generation', 'url': 'https://huggingface.co/papers/2604.01193', 'abstract': 'Abstract Simple self-distillation improves code generation in large language models by fine-tuning on model-generated samples, effectively addressing precision-exploration trade-offs in decoding.  AI-generated summary Can a large language model (LLM) improve at code generation using only its own raw outputs, without a verifier, a teacher model, or reinforcement learning? We answer in the affirmative with simple self-distillation (SSD): sample solutions from the model with certain temperature and truncation configurations, then fine-tune on those samples with standard supervised fine-tuning. SSD improves Qwen3-30B-Instruct from 42.4% to 55.3% pass@1 on LiveCodeBench v6, with gains concentrating on harder problems, and it generalizes across Qwen and Llama models at 4B, 8B, and 30B scale, including both instruct and thinking variants. To understand why such a simple method can work, we trace these gains to a precision-exploration conflict in LLM decoding and show that SSD reshapes token distributions in a context-dependent way, suppressing distractor tails where precision matters while preserving useful diversity where exploration matters. Taken together, SSD offers a complementary post-training direction for improving LLM code generation.', 'score': 8, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '3357cab5030e3ca1', 'authors': ['Ruixiang Zhang', 'Richard He Bai', 'Huangjie Zheng', 'Navdeep Jaitly', 'Ronan Collobert', 'Yizhe Zhang'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2604.01193.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Модель учится на самой себе: простая самодистилляция для генерации кода', 'desc': 'В работе предложен метод простой самодистилляции для улучшения генерации кода в больших языковых моделях. Метод заключается в сэмплировании решений из модели с определёнными параметрами температуры и усечения, а затем в переобучении на этих сгенерированных образцах с помощью стандартного supervised fine-tuning без использования верификатора или учительской модели. Авторы показывают, что самодистилляция решает конфликт между точностью и исследованием в декодировании LLM путём переформирования распределений токенов так, чтобы подавлять отвлекающие хвосты там, где нужна точность, и сохранять полезное разнообразие там, где нужно исследование. Метод демонстрирует значительные улучшения на различных моделях и масштабах, особенно на более сложных задачах.'}, 'en': {'title': 'Boosting Code Generation with Simple Self-Distillation', 'desc': "This paper introduces Simple Self-Distillation (SSD), a technique that enhances code generation in large language models (LLMs) by fine-tuning them on their own generated outputs. SSD operates without the need for external verifiers or teacher models, relying solely on the model's raw outputs sampled under specific configurations. The results show a significant improvement in performance, particularly on challenging tasks, as demonstrated by the increase in pass rates on the LiveCodeBench v6 benchmark. The authors explain that SSD effectively balances precision and exploration in decoding, leading to better token distribution and improved code generation capabilities."}, 'zh': {'title': '简单自蒸馏：提升代码生成的有效方法', 'desc': '简单自蒸馏（SSD）通过对模型生成的样本进行微调，提升了大型语言模型在代码生成方面的表现。该方法不依赖于验证器、教师模型或强化学习，而是利用模型自身的输出进行训练。实验结果显示，SSD使Qwen3-30B-Instruct在LiveCodeBench v6上的通过率从42.4%提高到55.3%，尤其在难题上表现更佳。SSD通过调整令牌分布，解决了大型语言模型解码中的精度与探索之间的冲突，从而在保持多样性的同时提高了精度。'}}}, {'id': 'https://huggingface.co/papers/2604.01128', 'title': 'Paper Reconstruction Evaluation: Evaluating Presentation and Hallucination in AI-written Papers', 'url': 'https://huggingface.co/papers/2604.01128', 'abstract': 'Abstract A systematic evaluation framework called PaperRecon is proposed to assess AI-generated papers by separating quality assessment into presentation and hallucination dimensions using a benchmark of 51 recent papers.  AI-generated summary This paper introduces the first systematic evaluation framework for quantifying the quality and risks of papers written by modern coding agents. While AI-driven paper writing has become a growing concern, rigorous evaluation of the quality and potential risks of AI-written papers remains limited, and a unified understanding of their reliability is still lacking. We introduce Paper Reconstruction Evaluation (PaperRecon), an evaluation framework in which an overview (overview.md) is created from an existing paper, after which an agent generates a full paper based on the overview and minimal additional resources, and the result is subsequently compared against the original paper. PaperRecon disentangles the evaluation of the AI-written papers into two orthogonal dimensions, Presentation and Hallucination, where Presentation is evaluated using a rubric and Hallucination is assessed via agentic evaluation grounded in the original paper source. For evaluation, we introduce PaperWrite-Bench, a benchmark of 51 papers from top-tier venues across diverse domains published after 2025. Our experiments reveal a clear trade-off: while both ClaudeCode and Codex improve with model advances, ClaudeCode achieves higher presentation quality at the cost of more than 10 hallucinations per paper on average, whereas Codex produces fewer hallucinations but lower presentation quality. This work takes a first step toward establishing evaluation frameworks for AI-driven paper writing and improving the understanding of its risks within the research community.', 'score': 6, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '15dc6d47ae788a76', 'authors': ['Atsuyuki Miyai', 'Mashiro Toyooka', 'Zaiying Zhao', 'Kenta Watanabe', 'Toshihiko Yamasaki', 'Kiyoharu Aizawa'], 'affiliations': ['The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.01128.jpg', 'data': {'categories': ['#agents', '#survey', '#benchmark', '#dataset', '#hallucinations'], 'emoji': '📄', 'ru': {'title': 'Измеряем качество AI-написанных статей: баланс между формой и достоверностью', 'desc': 'В статье предложена система оценки PaperRecon для анализа научных работ, написанных AI агентами. Авторы разделили качество оценки на два независимых измерения: презентацию (оформление и структура) и галлюцинации (фактические ошибки и недостоверная информация). Для проведения экспериментов создан бенчмарк PaperWrite-Bench из 51 статьи от ведущих конференций. Результаты показывают компромисс между качеством презентации и надёжностью: современные модели либо хорошо оформляют работы, но добавляют много ошибок, либо генерируют точный контент с худшей структурой.'}, 'en': {'title': 'Evaluating AI Papers: Quality Meets Reliability with PaperRecon', 'desc': 'This paper presents PaperRecon, a new framework designed to evaluate the quality of AI-generated academic papers. It separates the assessment into two key dimensions: Presentation, which focuses on how well the paper is structured and communicated, and Hallucination, which measures the accuracy and reliability of the content. The framework uses a benchmark of 51 recent papers to compare AI-generated outputs against original works, revealing trade-offs between different AI models in terms of presentation quality and hallucination rates. This research aims to enhance the understanding of AI writing risks and establish a systematic approach for evaluating AI-generated academic content.'}, 'zh': {'title': '评估AI生成论文的创新框架', 'desc': '本文提出了一种名为PaperRecon的系统评估框架，用于评估AI生成的论文。该框架将质量评估分为展示和幻觉两个维度，并使用51篇近期论文作为基准。通过对AI生成论文的评估，研究发现不同模型在展示质量和幻觉数量之间存在明显的权衡。此项工作为AI驱动的论文写作建立了评估框架，并提高了研究界对其风险的理解。'}}}, {'id': 'https://huggingface.co/papers/2604.00842', 'title': 'Proactive Agent Research Environment: Simulating Active Users to Evaluate Proactive Assistants', 'url': 'https://huggingface.co/papers/2604.00842', 'abstract': 'Abstract A framework for proactive agent research is introduced that models applications as finite state machines to enable realistic user simulation and task execution across multiple digital environments.  AI-generated summary Proactive agents that anticipate user needs and autonomously execute tasks hold great promise as digital assistants, yet the lack of realistic user simulation frameworks hinders their development. Existing approaches model apps as flat tool-calling APIs, failing to capture the stateful and sequential nature of user interaction in digital environments and making realistic user simulation infeasible. We introduce Proactive Agent Research Environment (Pare), a framework for building and evaluating proactive agents in digital environments. Pare models applications as finite state machines with stateful navigation and state-dependent action space for the user simulator, enabling active user simulation. Building on this foundation, we present Pare-Bench, a benchmark of 143 diverse tasks spanning communication, productivity, scheduling, and lifestyle apps, designed to test context observation, goal inference, intervention timing, and multi-app orchestration.', 'score': 5, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'acf9527ffd01a32b', 'authors': ['Deepak Nathani', 'Cheng Zhang', 'Chang Huan', 'Jiaming Shan', 'Yinfei Yang', 'Alkesh Patel', 'Zhe Gan', 'William Yang Wang', 'Michael Saxon', 'Xin Eric Wang'], 'affiliations': ['Apple, USA', 'Independent Researcher, USA', 'University of California, Santa Barbara', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.00842.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Статефул моделирование приложений для обучения проактивных агентов', 'desc': 'В работе представлена среда Pare для исследования проактивных агентов, которые предвидят потребности пользователя и самостоятельно выполняют задачи в цифровых приложениях. Авторы моделируют приложения как конечные автоматы со статефулом, что позволяет реалистично симулировать поведение пользователя вместо плоского представления инструментов. На основе этого подхода создан бенчмарк Pare-Bench с 143 разнообразными задачами для оценки способности агентов наблюдать контекст, выводить цели и оркестрировать действия в нескольких приложениях. Такой фреймворк решает проблему отсутствия реалистичных сценариев взаимодействия, необходимых для развития качественных проактивных ассистентов.'}, 'en': {'title': 'Empowering Proactive Agents with Realistic User Simulation', 'desc': 'This paper presents a new framework called Proactive Agent Research Environment (Pare) that helps in developing proactive agents capable of simulating realistic user interactions in digital environments. By modeling applications as finite state machines, Pare captures the sequential and stateful nature of user tasks, which is essential for effective user simulation. The framework also includes Pare-Bench, a benchmark consisting of 143 tasks across various app categories to evaluate the performance of these proactive agents. This approach aims to enhance the ability of digital assistants to anticipate user needs and perform tasks autonomously.'}, 'zh': {'title': '主动代理研究的新框架', 'desc': '本文介绍了一种主动代理研究框架，旨在通过将应用程序建模为有限状态机，来实现更真实的用户模拟和任务执行。现有的方法通常将应用视为简单的工具调用API，无法有效捕捉用户在数字环境中的状态和交互顺序。我们提出的主动代理研究环境（Pare）能够支持状态导航和状态依赖的动作空间，从而实现主动的用户模拟。基于此，我们还推出了Pare-Bench，这是一个包含143个多样化任务的基准测试，涵盖了通信、生产力、日程安排和生活方式应用，旨在评估上下文观察、目标推断、干预时机和多应用协调能力。'}}}, {'id': 'https://huggingface.co/papers/2604.00626', 'title': 'A Survey of On-Policy Distillation for Large Language Models', 'url': 'https://huggingface.co/papers/2604.00626', 'abstract': 'Abstract On-Policy Distillation for large language models unifies diverse approaches through an f-divergence framework organized by feedback signals, teacher access, and loss granularity.  AI-generated summary Knowledge distillation has become a primary mechanism for transferring reasoning and domain expertise from frontier Large Language Models (LLMs) to smaller, deployable students. However, the dominant paradigm remains off-policy: students train on static teacher-generated data and never encounter their own errors during learning. This train--test mismatch, an instance of exposure bias, causes prediction errors to compound autoregressively at inference time. On-Policy Distillation (OPD) addresses this by letting the student generate its own trajectories and receive teacher feedback on these self-generated outputs, grounding distillation in the theory of interactive imitation learning. Despite rapid growth spanning divergence minimization, reward-guided learning, and self-play, the OPD literature remains fragmented with no unified treatment. This survey provides the first comprehensive overview of OPD for LLMs. We introduce a unified f-divergence framework over on-policy samples and organize the landscape along three orthogonal dimensions: feedback signal (logit-based, outcome-based, or self-play), teacher access (white-box, black-box, or teacher-free), and loss granularity (token-level, sequence-level, or hybrid). We systematically analyze representative methods, examine industrial deployments, and identify open problems including distillation scaling laws, uncertainty-aware feedback, and agent-level distillation.', 'score': 4, 'issue_id': 1761, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '83123913eb469238', 'authors': ['Mingyang Song', 'Mao Zheng'], 'affiliations': ['Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2604.00626.jpg', 'data': {'categories': ['#small_models', '#transfer_learning', '#optimization', '#reasoning', '#rlhf', '#training', '#survey'], 'emoji': '🧠', 'ru': {'title': 'От статического обучения к интерактивной дистилляции: унифицированный взгляд на on-policy методы', 'desc': 'В статье представлен унифицированный обзор on-policy distillation для больших языковых моделей, где студент генерирует собственные последовательности и получает обратную связь от учителя. Авторы вводят f-divergence framework, который организует методы по трём ортогональным измерениям: типу сигнала обратной связи, доступу к учителю и гранулярности функции потерь. Исследование объединяет разнообразные подходы, включая минимизацию дивергенции, обучение на основе награды и self-play, решая проблему exposure bias в автарегрессивных моделях. В работе анализируются представительные методы, промышленные приложения и открытые проблемы, такие как законы масштабирования дистилляции и uncertainty-aware обратная связь.'}, 'en': {'title': 'Empowering Smaller Models with On-Policy Learning', 'desc': 'This paper presents On-Policy Distillation (OPD) as a method for training smaller language models using feedback from larger models. Unlike traditional off-policy methods, OPD allows students to learn from their own generated outputs, reducing errors that occur during inference. The authors introduce a unified framework based on f-divergence to categorize various OPD approaches by feedback type, teacher access, and loss granularity. The paper also highlights existing challenges and opportunities in the field, aiming to streamline the understanding and application of OPD in machine learning.'}, 'zh': {'title': '在线策略蒸馏：提升语言模型的学习效率', 'desc': '本文介绍了一种新的知识蒸馏方法，称为在线策略蒸馏（On-Policy Distillation, OPD），旨在解决传统知识蒸馏中的训练与测试不匹配问题。通过让学生模型生成自己的输出并获得教师的反馈，OPD将蒸馏过程与交互模仿学习理论相结合。文章提出了一个统一的f-散度框架，系统地分析了不同的反馈信号、教师访问方式和损失粒度。最后，作者还探讨了OPD在工业应用中的表现及未来的研究方向。'}}}, {'id': 'https://huggingface.co/papers/2604.00528', 'title': 'Think, Act, Build: An Agentic Framework with Vision Language Models for Zero-Shot 3D Visual Grounding', 'url': 'https://huggingface.co/papers/2604.00528', 'abstract': 'Abstract A dynamic agentic framework called TAB addresses 3D visual grounding by decoupling spatial semantics resolution from 3D structure instantiation through 2D VLMs and multi-view geometry, achieving superior performance over existing zero-shot and supervised methods.  AI-generated summary 3D Visual Grounding (3D-VG) aims to localize objects in 3D scenes via natural language descriptions. While recent advancements leveraging Vision-Language Models (VLMs) have explored zero-shot possibilities, they typically suffer from a static workflow relying on preprocessed 3D point clouds, essentially degrading grounding into proposal matching. To bypass this reliance, our core motivation is to decouple the task: leveraging 2D VLMs to resolve complex spatial semantics, while relying on deterministic multi-view geometry to instantiate the 3D structure. Driven by this insight, we propose "Think, Act, Build (TAB)", a dynamic agentic framework that reformulates 3D-VG tasks as a generative 2D-to-3D reconstruction paradigm operating directly on raw RGB-D streams. Specifically, guided by a specialized 3D-VG skill, our VLM agent dynamically invokes visual tools to track and reconstruct the target across 2D frames. Crucially, to overcome the multi-view coverage deficit caused by strict VLM semantic tracking, we introduce the Semantic-Anchored Geometric Expansion, a mechanism that first anchors the target in a reference video clip and then leverages multi-view geometry to propagate its spatial location across unobserved frames. This enables the agent to "Build" the target\'s 3D representation by aggregating these multi-view features via camera parameters, directly mapping 2D visual cues to 3D coordinates. Furthermore, to ensure rigorous assessment, we identify flaws such as reference ambiguity and category errors in existing benchmarks and manually refine the incorrect queries. Extensive experiments on ScanRefer and Nr3D demonstrate that our framework, relying entirely on open-source models, significantly outperforms previous zero-shot methods and even surpasses fully supervised baselines.', 'score': 4, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '3b9658d792eddc89', 'authors': ['Haibo Wang', 'Zihao Lin', 'Zhiyang Xu', 'Lifu Huang'], 'affiliations': ['University of California, Davis', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2604.00528.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#reasoning', '#3d', '#open_source'], 'emoji': '🏗️', 'ru': {'title': 'Думай, действуй, строй: от 2D понимания к 3D реконструкции', 'desc': 'Статья представляет TAB — динамический агентский фреймворк для 3D визуального позиционирования объектов по текстовому описанию. Основная идея заключается в разделении задачи: использование 2D видео-языковых моделей для понимания сложных пространственных отношений и многовидовой геометрии для построения 3D структуры. Система работает как агент, который динамически применяет визуальные инструменты для отслеживания объекта через видеокадры, а затем использует механизм семантико-геометрического расширения для восстановления 3D представления на всех видах сцены. Фреймворк достигает впечатляющих результатов, превосходя как zero-shot методы, так и полностью обучаемые базовые модели.'}, 'en': {'title': 'Revolutionizing 3D Visual Grounding with TAB Framework', 'desc': 'The paper introduces a new framework called TAB for 3D visual grounding, which aims to improve the localization of objects in 3D scenes using natural language. It separates the understanding of spatial semantics from the actual 3D structure creation by utilizing 2D Vision-Language Models (VLMs) and multi-view geometry. This approach allows the framework to dynamically reconstruct 3D representations from raw RGB-D data, enhancing performance over traditional methods that rely on preprocessed 3D point clouds. The authors also address existing benchmark flaws and demonstrate that TAB outperforms both zero-shot and fully supervised techniques in extensive experiments.'}, 'zh': {'title': '动态代理框架TAB：重塑3D视觉定位', 'desc': '本文提出了一种名为TAB的动态代理框架，旨在通过解耦空间语义解析与3D结构实例化来解决3D视觉定位问题。该框架利用2D视觉语言模型（VLMs）来处理复杂的空间语义，同时依赖确定性的多视角几何来构建3D结构。通过引入语义锚定几何扩展机制，TAB能够在未观察到的帧中传播目标的空间位置，从而实现更准确的3D表示。实验结果表明，TAB在ScanRefer和Nr3D数据集上显著优于现有的零样本方法和完全监督的基线。'}}}, {'id': 'https://huggingface.co/papers/2604.00590', 'title': 'UniMixer: A Unified Architecture for Scaling Laws in Recommendation Systems', 'url': 'https://huggingface.co/papers/2604.00590', 'abstract': 'Abstract A unified scaling architecture for recommendation systems called UniMixer is proposed, featuring a generalized parameterized token mixing module that optimizes token mixing patterns and improves scaling efficiency across different architectures.  AI-generated summary In recent years, the scaling laws of recommendation models have attracted increasing attention, which govern the relationship between performance and parameters/FLOPs of recommenders. Currently, there are three mainstream architectures for achieving scaling in recommendation models, namely attention-based, TokenMixer-based, and factorization-machine-based methods, which exhibit fundamental differences in both design philosophy and architectural structure. In this paper, we propose a unified scaling architecture for recommendation systems, namely UniMixer, to improve scaling efficiency and establish a unified theoretical framework that unifies the mainstream scaling blocks. By transforming the rule-based TokenMixer to an equivalent parameterized structure, we construct a generalized parameterized feature mixing module that allows the token mixing patterns to be optimized and learned during model training. Meanwhile, the generalized parameterized token mixing removes the constraint in TokenMixer that requires the number of heads to be equal to the number of tokens. Furthermore, we establish a unified scaling module design framework for recommender systems, which bridges the connections among attention-based, TokenMixer-based, and factorization-machine-based methods. To further boost scaling ROI, a lightweight UniMixing module is designed, UniMixing-Lite, which further compresses the model parameters and computational cost while significantly improve the model performance. The scaling curves are shown in the following figure. Extensive offline and online experiments are conducted to verify the superior scaling abilities of UniMixer.', 'score': 3, 'issue_id': 1759, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'e8794209e952bd16', 'authors': ['Mingming Ha', 'Guanchen Wang', 'Linxun Chen', 'Xuan Rao', 'Yuexin Shi', 'Tianbao Ma', 'Zhaojie Liu', 'Yunqian Fan', 'Zilong Lu', 'Yanan Niu', 'Han Li', 'Kun Gai'], 'affiliations': ['Kuaishou Technology, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.00590.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Единая параметризованная архитектура для эффективного масштабирования рекомендательных систем', 'desc': 'В статье предложена архитектура UniMixer для масштабирования рекомендательных систем, которая объединяет три основных подхода: внимание, TokenMixer и факторизационные машины. Авторы преобразовали правило-ориентированный TokenMixer в параметризованную структуру, позволяющую оптимизировать паттерны смешивания токенов во время обучения модели. Кроме того, они разработали облегченную версию UniMixing-Lite, которая снижает количество параметров и вычислительные затраты при улучшении производительности. Предложенная архитектура устанавливает единую теоретическую базу для различных методов масштабирования в рекомендательных системах.'}, 'en': {'title': 'UniMixer: Unifying and Optimizing Recommendation Scaling', 'desc': 'The paper introduces UniMixer, a new architecture for recommendation systems that enhances scaling efficiency by optimizing token mixing patterns. It combines features from three existing architectures: attention-based, TokenMixer-based, and factorization-machine-based methods, creating a unified framework. UniMixer employs a parameterized token mixing module that allows for flexible and efficient learning of token interactions during training. Additionally, a lightweight version called UniMixing-Lite is proposed to reduce model size and computational costs while improving performance.'}, 'zh': {'title': '推荐系统的统一扩展架构：UniMixer', 'desc': '本文提出了一种统一的推荐系统扩展架构，称为UniMixer。该架构采用了一种通用
