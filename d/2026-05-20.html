ersity, Ramat-Gan, Israel', 'NVIDIA Research, Tel-Aviv, Israel'], 'pdf_title_img': 'assets/pdf/title_img/2605.19786.jpg', 'data': {'categories': ['#video', '#inference', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Молниеносная генерация динамических 3D-моделей через спатиотемпоральное внимание', 'desc': 'Статья представляет метод генерации 4D-сеток без обучения, который использует цепочки спатиотемпоральной внимания для ускорения создания динамических 3D-моделей из видео. Ключевая идея заключается в том, что соответствия между кадрами во времени возникают в глубоких слоях модели раньше, чем сетка становится визуально точной, что позволяет избежать дорогостоящего явного поиска соответствий. Предложенный подход достигает 13-кратного ускорения по сравнению с существующими методами, одновременно улучшая качество геометрии и сохраняя детали исходной сетки. Метод также масштабируется на видео в 16 раз большей длины и обеспечивает качественное решение задач отслеживания и оценки положения камеры.'}, 'en': {'title': 'Accelerating 4D Mesh Generation with Spatio-Temporal Attention', 'desc': 'This paper presents a novel method for generating 4D meshes from videos without the need for extensive training. The approach utilizes Spatio-Temporal Attention Chains to enhance the speed and quality of mesh generation, achieving a significant reduction in processing time while maintaining high temporal correspondence. By leveraging latent space mappings, the method effectively preserves details from the anchor mesh and improves the overall geometry and consistency of the dynamic mesh. Additionally, the framework demonstrates scalability for longer video sequences and shows competitive performance in related tasks such as object tracking and camera estimation.'}, 'zh': {'title': '无训练的4D网格生成，速度与质量双提升', 'desc': '本论文提出了一种无训练的4D网格生成方法，利用时空注意链加速网格创建，同时提高时间对应质量。该方法通过在4D骨干网络中提取时间对应关系，避免了昂贵的显式匹配，从而保持锚网格的细节，改善动态网格几何和时间一致性。与现有技术相比，我们的方法在9秒内生成4D网格，速度提升达到13倍，并且在处理更长视频时网格质量不下降。此外，改进的对应关系还在2D物体跟踪和4D跟踪等下游任务中实现了竞争力的零样本性能。'}}}, {'id': 'https://huggingface.co/papers/2605.18714', 'title': 'Semantic Generative Tuning for Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2605.18714', 'abstract': 'Abstract Generative post-training with semantic segmentation as a proxy enhances multimodal alignment and performance in unified models.  AI-generated summary Unified multimodal models (UMMs) strive to consolidate visual understanding and visual generation within a single architecture. However, prevailing training paradigms independently optimize understanding via sparse text signals and generation through dense pixel objectives. Such a decoupled strategy yields misaligned representation spaces, isolating visual understanding from generation and hindering their mutual reinforcement. This work presents the first systematic investigation into generative post-training, where we formulate hierarchical visual tasks as generative proxies to bridge the isolation in UMMs. Our empirical investigation reveals that high-level semantic tasks, particularly image segmentation, serve as optimal proxies. Unlike low-level tasks that distract models with texture details, segmentation provides structural semantics that significantly enhance both vision-centric perception and generative layout fidelity. Building upon these insights, we introduce Semantic Generative Tuning (SGT), a novel paradigm that leverages segmentation as a generative proxy to align and synergize multimodal capabilities. Mechanistic analyses further demonstrate that SGT fundamentally improves feature linear separability and optimizes visual-textual attention allocation pattern. Extensive evaluations show that SGT consistently improves both multimodal comprehension and generative fidelity across mainstream benchmarks. Our code is available on the https://song2yu.github.io/SGT/.', 'score': 7, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'c3bff1e067415e34', 'authors': ['Songsong Yu', 'Yuxin Chen', 'Ying Shan', 'Yanwei Li'], 'affiliations': ['Shanghai Jiao Tong University', 'Tencent ARCLab'], 'pdf_title_img': 'assets/pdf/title_img/2605.18714.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#optimization', '#benchmark', '#training'], 'emoji': '🎨', 'ru': {'title': 'Семантическая сегментация как мост между пониманием и генерацией в мультимодальных моделях', 'desc': 'В работе предложен новый подход к обучению унифицированных мультимодальных моделей, которые одновременно решают задачи понимания и генерации изображений. Авторы обнаружили, что традиционное раздельное обучение этих компонентов приводит к несогласованности представлений, что препятствует их синергии. В качестве решения представлена парадигма Semantic Generative Tuning (SGT), которая использует задачу семантической сегментации в качестве прокси-цели для генеративного постобучения. Механистический анализ показывает, что SGT улучшает линейную разделимость признаков и оптимизирует распределение внимания между визуальной и текстовой модальностями.'}, 'en': {'title': 'Bridging Visual Understanding and Generation with Semantic Segmentation', 'desc': "This paper explores a new method called Semantic Generative Tuning (SGT) to improve unified multimodal models (UMMs) that combine visual understanding and generation. The authors argue that traditional training methods treat understanding and generation separately, leading to misaligned representations. By using semantic segmentation as a generative proxy, SGT enhances the model's ability to understand and generate visual content more effectively. The results show that this approach significantly boosts both comprehension and the quality of generated outputs across various benchmarks."}, 'zh': {'title': '语义生成微调：提升多模态模型的桥梁', 'desc': '本文探讨了一种新的训练方法，称为语义生成微调（SGT），旨在提高统一多模态模型（UMMs）的性能。通过将图像分割作为生成代理，SGT能够有效地连接视觉理解与生成任务，克服了传统训练方法中存在的隔离问题。研究表明，高级语义任务如图像分割比低级任务更能提升模型的理解和生成能力。实验结果显示，SGT在多个主流基准测试中显著提高了多模态理解和生成的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.09640', 'title': 'Overcoming Catastrophic Forgetting in Visual Continual Learning with Reinforcement Fine-Tuning', 'url': 'https://huggingface.co/papers/2605.09640', 'abstract': 'Abstract Reinforcement Fine-Tuning suffers from catastrophic forgetting in visual continual learning, which is addressed through Retention-aware Policy Optimization that uses trajectory-level reward shaping and cross-task advantage normalization.  AI-generated summary Recent studies suggest that Reinforcement Fine-Tuning (RFT) is inherently more resilient to catastrophic forgetting than Supervised Fine-Tuning (SFT). However, whether RFT (e.g., GRPO) can effectively overcome forgetting in challenging visual continual learning settings, such as class-incremental learning (CIL) and domain-incremental learning (DIL), remains an open problem. Through a pilot study, we confirm that while RFT consistently outperforms SFT, it still suffers from non-negligible forgetting. We empirically trace this bottleneck to Trajectory-level Drift Agnosticism: among candidate rollouts achieving identical task rewards, the KL divergence from the preceding-task policy varies substantially, which strongly correlates with catastrophic forgetting across sequential tasks. Motivated by this insight, we propose Retention-aware Policy Optimization (RaPO), a simple yet effective RFT method that explicitly mitigates forgetting through trajectory-level reward shaping. Specifically, RaPO comprises two core components: (1) Retention Reward that converts trajectory-level distribution drift into a continuous reward signal, preferentially reinforcing knowledge-preserving rollouts within each group; (2) Cross-Task Advantage Normalization (CTAN), which maintains a persistent exponential moving average of reward statistics across task boundaries to stabilize the optimization progress during continual learning. Leveraging the free-form textual generalization of MLLMs, we comprehensively evaluate RaPO across five visual continual learning settings. Extensive experiments demonstrate that RaPO achieves leading performance, substantially reducing catastrophic forgetting while preserving strong plasticity. To the best of our knowledge, this work represents the first systematic exploration of RFT in visual continual learning, offering insights that we hope will inspire future research.', 'score': 5, 'issue_id': 2273, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '311a0a54880aff26', 'authors': ['Meng Lou', 'Hanzhong Guo', 'Linwei Chen', 'Yizhou Yu'], 'affiliations': ['Hong Kong Generative AI Research and Development Center', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.09640.jpg', 'data': {'categories': ['#cv', '#multimodal', '#rl', '#rlhf', '#training'], 'emoji': '🧠', 'ru': {'title': 'Сохранение знаний при непрерывном обучении моделей через оптимизацию политик', 'desc': 'Статья решает проблему катастрофического забывания при использовании Reinforcement Fine-Tuning в задачах континуального обучения на визуальных данных. Авторы выявили, что хотя RFT более устойчив к забыванию, чем supervised fine-tuning, он все еще страдает от дрейфа траекторий при переходе между задачами. Предложен метод Retention-aware Policy Optimization, который использует формирование награды на уровне траекторий и нормализацию преимущества между задачами для явного сохранения знаний. Экспериментальные результаты показывают, что RaPO значительно снижает забывание предыдущих знаний, сохраняя способность к обучению новым задачам.'}, 'en': {'title': 'Mitigating Forgetting in Visual Continual Learning with RaPO', 'desc': 'This paper addresses the issue of catastrophic forgetting in visual continual learning when using Reinforcement Fine-Tuning (RFT). It introduces Retention-aware Policy Optimization (RaPO), which enhances RFT by incorporating trajectory-level reward shaping and cross-task advantage normalization. The method aims to reduce forgetting by reinforcing knowledge-preserving actions and stabilizing learning across different tasks. The results show that RaPO significantly improves performance in continual learning scenarios while maintaining adaptability.'}, 'zh': {'title': '保留意识策略优化：减轻视觉持续学习中的遗忘', 'desc': '强化学习微调（RFT）在视觉持续学习中面临灾难性遗忘的问题。本文提出了一种名为保留意识策略优化（RaPO）的方法，通过轨迹级奖励塑造和跨任务优势归一化来减轻遗忘。RaPO的两个核心组成部分是保留奖励和跨任务优势归一化，前者通过奖励信号强化知识保留，后者则稳定优化过程。实验结果表明，RaPO在减少灾难性遗忘的同时，保持了强大的适应性。'}}}, {'id': 'https://huggingface.co/papers/2605.18855', 'title': 'Delta Attention Residuals', 'url': 'https://huggingface.co/papers/2605.18855', 'abstract': "Abstract Delta Attention Residuals improve layer-wise routing by attending to feature changes rather than cumulative states, resulting in better attention distributions and model performance across different scales.  AI-generated summary Attention Residuals replace standard additive residual connections with learned softmax attention over previous layer outputs, enabling selective cross-layer routing. However, standard Attention Residuals still attend over cumulative hidden states in previous layers, which are highly redundant. We show that this redundancy leads to routing collapse in deeper layers: attention weights become low-contrast and closer to uniform (max weight {approx}0.2), limiting the model's ability to select informative states in previous layers. This raises a key but underexplored design question: what layer-wise representations should be routed in Attention Residuals? To answer this question, we propose Delta Attention Residuals, which attend over deltas -- the change introduced by each sublayer (v_i = h_{i+1} - h_i) -- instead of cumulative states. Delta representations are structurally diverse and yield higher-contrast attention distributions (max weight {approx}0.6), enabling more selective and effective routing across layers. This principle applies at both per-sublayer and block granularity. Across all tested scales (220M--7.6B), Delta Attention Residuals consistently outperform both standard residuals and Attention Residuals, with 1.7--8.2\\% validation perplexity gains. Delta Attention Residuals also enables converting pretrained checkpoints into Delta Attention Residuals via standard fine-tuning. Code is available at https://github.com/wdlctc/delta-attention-residuals-code.", 'score': 4, 'issue_id': 2271, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'db076de98d4f1eb1', 'authors': ['Cheng Luo', 'Zefan Cai', 'Junjie Hu'], 'affiliations': ['Independent Researcher', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.18855.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Дельта-внимание: маршрутизация через изменения вместо состояний', 'desc': 'В статье предложен новый метод Delta Attention Residuals, который улучшает маршрутизацию между слоями нейронной сети путём внимания к изменениям признаков вместо накопленных состояний. Авторы показывают, что стандартные Attention Residuals страдают от избыточности и коллапса внимания в глубоких слоях, где веса внимания становятся близки к равномерному распределению. Delta Attention Residuals решает эту проблему, работая с дельтами — разностями между выходами последовательных слоёв, что приводит к более контрастному и избирательному распределению весов. Метод демонстрирует последовательное улучшение перплексии валидации на 1.7-8.2% во всех тестируемых масштабах моделей от 220M до 7.6B параметров.'}, 'en': {'title': 'Enhancing Neural Routing with Delta Attention Residuals', 'desc': 'Delta Attention Residuals enhance the routing of information in neural networks by focusing on the changes between layers instead of the cumulative outputs. This method replaces traditional additive connections with learned attention mechanisms that prioritize significant differences, leading to improved attention distributions. By addressing the redundancy in standard Attention Residuals, Delta Attention Residuals achieve higher contrast in attention weights, allowing for more effective selection of informative features. The results show consistent performance improvements across various model sizes, demonstrating the effectiveness of this new approach in reducing validation perplexity.'}, 'zh': {'title': '关注变化，提升模型性能', 'desc': '本文提出了一种新的模型结构，称为Delta Attention Residuals，旨在改善层间路由。与传统的残差连接不同，Delta Attention Residuals关注的是每一层的变化，而不是累积的状态，从而提高了注意力分布的效果。通过这种方法，模型能够更有效地选择有用的信息，避免了在深层网络中出现的冗余问题。实验结果表明，Delta Attention Residuals在不同规模的模型中均表现出更好的性能，验证困惑度提高了1.7%到8.2%。'}}}, {'id': 'https://huggingface.co/papers/2605.20150', 'title': 'TideGS: Scalable Training of Over One Billion 3D Gaussian Splatting Primitives via Out-of-Core Optimization', 'url': 'https://huggingface.co/papers/2605.20150', 'abstract': 'Abstract TideGS enables training 3D Gaussian Splatting with over one billion primitives on a single GPU by managing parameters across SSD-CPU-GPU hierarchy through block-virtualization, asynchronous pipeline, and differential streaming techniques.  AI-generated summary Training 3D Gaussian Splatting (3DGS) at billion-primitive scale is fundamentally memory-bound: each Gaussian primitive carries a large attribute vector, and the aggregate parameter table quickly exceeds GPU capacity, limiting prior systems to tens of millions of Gaussians on commodity single-GPU hardware. We observe that 3DGS training is inherently sparse and trajectory-conditioned: each iteration activates only the Gaussians visible from the current camera batch, so GPU memory can serve as a working-set cache rather than a persistent parameter store. Building on this insight, we introduce TideGS, an out-of-core training framework that manages parameters across an SSD-CPU-GPU hierarchy via three synergistic techniques: block-virtualized geometry for SSD-aligned spatial locality, a hierarchical asynchronous pipeline to overlap I/O with computation, and trajectory-adaptive differential streaming that transfers only incremental working-set deltas between iterations. Experiments show that TideGS enables training with over one billion Gaussians on a single 24 GB GPU while achieving the best reconstruction quality among evaluated single-GPU baselines on large-scale scenes, scaling beyond prior out-of-core baselines (e.g., approximately 100M Gaussians) and standard in-memory training (e.g., approximately 11M Gaussians).', 'score': 3, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'c373265768d35b14', 'authors': ['Chonghao Zhong', 'Linfeng Shi', 'Hua Chen', 'Tiecheng Sun', 'Hao Zhao', 'Binhang Yuan', 'Chaojian Li'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Great Wall Motor', 'Hong Kong University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20150.jpg', 'data': {'categories': ['#3d', '#inference', '#training'], 'emoji': '💾', 'ru': {'title': 'Масштабируемое 3D моделирование: обучение миллиарда примитивов на одном GPU', 'desc': 'TideGS — это фреймворк для обучения 3D Gaussian Splatting с использованием более одного миллиарда примитивов на одном GPU путём эффективного управления памятью через иерархию SSD-CPU-GPU. Система решает проблему ограничений памяти GPU, обрабатывая только видимые гауссианы на каждой итерации и используя GPU как кэш рабочего набора. Фреймворк применяет три ключевые техники: блочную виртуализацию геометрии для оптимизации доступа к SSD, асинхронный конвейер для перекрытия операций ввода-вывода с вычислениями и адаптивную потоковую передачу дельта-изменений параметров. На экспериментах TideGS демонстрирует улучшение качества реконструкции больших сцен при обучении с миллиардом гауссианов, превосходя предыдущие системы внеядерного обучения примерно в 10 раз.'}, 'en': {'title': 'Unlocking Billion-Primitive 3D Gaussian Splatting on a Single GPU', 'desc': 'TideGS is a novel framework that allows the training of 3D Gaussian Splatting (3DGS) with over one billion primitives using a single GPU. It addresses the memory limitations of previous systems by utilizing a combination of block-virtualization, asynchronous pipelines, and differential streaming techniques. This approach takes advantage of the sparse nature of 3DGS training, where only visible Gaussians are activated during each iteration, allowing for efficient memory usage. As a result, TideGS not only scales beyond previous methods but also achieves superior reconstruction quality in large-scale scenes.'}, 'zh': {'title': 'TideGS：单 GPU 上训练十亿高斯点的突破', 'desc': 'TideGS 是一种新型的训练框架，能够在单个 GPU 上训练超过十亿个 3D 高斯点。该框架通过块虚拟化、异步管道和差分流技术，优化了 SSD、CPU 和 GPU 之间的参数管理。由于 3D 高斯点训练本质上是稀疏的，TideGS 利用 GPU 内存作为工作集缓存，而不是持久的参数存储。实验表明，TideGS 在大规模场景中实现了最佳的重建质量，超越了以往的训练基准。'}}}, {'id': 'https://huggingface.co/papers/2605.19932', 'title': 'PEEK: Context Map as an Orientation Cache for Long-Context LLM Agents', 'url': 'https://huggingface.co/papers/2605.19932', 'abstract': "Abstract PEEK enables large language model agents to efficiently reuse orientation knowledge about recurring external contexts through a persistent context map that reduces computational costs and improves performance.  AI-generated summary Large language model (LLM) agents increasingly operate over long and recurring external contexts, like document corpora and code repositories. Across invocations, existing approaches preserve either the agent's trajectory, passive access to raw material, or task-level strategies. None of them preserves what we argue is most needed for repeated same-context workloads: reusable orientation knowledge (e.g., what the context contains, how it is organized, and which entities, constants, and schemas have historically been useful) about the recurring context itself. We introduce PEEK, a system that caches and maintains this orientation knowledge as a context map: a small, constant-sized artifact in the agent's prompt that gives it a persistent peek into the external context. The map is maintained by a programmable cache policy with three modules: a Distiller that extracts transferable knowledge from inference-time signals, a Cartographer that translates it into structured edits, and a priority-based Evictor that enforces a fixed token budget. On long-context reasoning and information aggregation, PEEK improves over strong baselines by 6.3-34.0% while using 93-145 fewer iterations and incurring 1.7-5.8x lower cost than the state-of-the-art prompt-learning framework, ACE. On context learning, PEEK improves solving rate and rubric accuracy by 6.0-14.0% and 7.8-12.1%, respectively, at 1.4x lower cost than ACE. These gains generalize across LMs and agent architectures, including OpenAI Codex, a production-grade coding agent. Together, these results show that a context map helps long-context LLM agents interact with recurring external contexts more accurately and efficiently.", 'score': 3, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '17717d8c30a7238e', 'authors': ['Zhuohan Gu', 'Qizheng Zhang', 'Omar Khattab', 'Samuel Madden'], 'affiliations': ['MIT CSAIL', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.19932.jpg', 'data': {'categories': ['#transfer_learning', '#optimization', '#long_context'], 'emoji': '🗺️', 'ru': {'title': 'Карта контекста для эффективной переиспользования знаний в LLM-агентах', 'desc': 'PEEK — это система, которая помогает агентам на основе больших языковых моделей эффективно работать с повторяющимися внешними контекстами, такими как корпусы документов и репозитории кода. Система кэширует ориентационные знания о контексте в виде компактной карты контекста, которая встраивается в промпт агента и дает ему быстрый доступ к важной информации. Карта поддерживается программируемой политикой кэширования с тремя компонентами: Distiller извлекает знания из сигналов во время вывода, Cartographer преобразует их в структурированные обновления, а Evictor управляет размером карты в пределах бюджета токенов. На задачах длинного контекста PEEK улучшает результаты на 6.3-34.0% при значительно меньших вычислительных затратах и стоимости по сравнению с существующими подходами.'}, 'en': {'title': 'PEEK: Enhancing LLM Efficiency with Persistent Context Maps', 'desc': 'The paper introduces PEEK, a system designed to enhance the efficiency of large language model (LLM) agents when dealing with recurring external contexts. PEEK maintains a persistent context map that captures reusable orientation knowledge, allowing agents to better understand and navigate long documents or code repositories. This context map is updated through a programmable cache policy, which includes modules for knowledge extraction, structuring, and managing token budgets. The results demonstrate that PEEK significantly improves performance and reduces computational costs compared to existing methods, making LLMs more effective in handling repeated tasks.'}, 'zh': {'title': 'PEEK：提升语言模型的上下文理解效率', 'desc': 'PEEK是一种系统，旨在帮助大型语言模型（LLM）代理高效地重用关于重复外部上下文的方向知识。它通过一个持久的上下文图来减少计算成本并提高性能。该上下文图作为代理提示中的一个小型常量大小的工件，提供了对外部上下文的持续视角。PEEK通过提取可转移知识、结构化编辑和优先级驱逐等模块，显著提高了在长上下文推理和信息聚合任务中的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.20104', 'title': 'Draft Less, Retrieve More: Hybrid Tree Construction for Speculative Decoding', 'url': 'https://huggingface.co/papers/2605.20104', 'abstract': "Abstract Graft is a training-free framework that enhances speculative decoding by dynamically combining pruning and retrieval operations to improve acceptance rates and inference speed without sacrificing accuracy.  AI-generated summary Speculative decoding (SD) accelerates large language model inference by leveraging a draft-then-verify paradigm. To maximize the acceptance rate, recent methods construct expansive draft trees, which unfortunately incur severe VRAM bandwidth and computational overheads that bottleneck end-to-end speedups. While dynamic-depth pruning can reduce this latency by removing marginal branches, it also discards potentially valid candidates, preventing the acceptance rate from reaching the upper bound of dense trees. In this paper, we identify a critical opportunity in resource allocation: the transition from dense to pruned drafting frees up significant computational budget. To break this Pareto tradeoff, we introduce Graft, a compensation framework that couples pruning and retrieval as mutually reinforcing operations. Pruning supplies sufficient budget for retrieval, while retrieval compensates for pruning-induced coverage loss and recovers accepted length. By employing a sequential `prune-then-graft' mechanism, Graft attaches highly predictive retrieved tokens into positions opened by pruning, filling the topological gaps with near-zero overhead. Graft is entirely training-free and lossless. Comprehensive evaluations show that Graft establishes a new Pareto frontier across practical deployment settings, including short-context generation, long-context generation, and large-scale models. On short-context benchmarks, it achieves up to 5.41times speedup and improves average speedup over EAGLE-3 by up to 21.8% on the large-scale Qwen3-235B. We also provide a preliminary exploration of applying Graft to the DFlash-style block drafting paradigm, offering initial evidence and insights for extending grafting beyond autoregressive draft trees.", 'score': 3, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '05c605b2c2a2d6c0', 'authors': ['Yuhao Shen', 'Tianyu Liu', 'Xinyi Hu', 'Quan Kong', 'Baolin Zhang', 'Jun Dai', 'Jun Zhang', 'Shuang Ge', 'Lei Chen', 'Yue Li', 'Mingcheng Wan', 'Cong Wang'], 'affiliations': ['Qwen Applications Business Group of Alibaba', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20104.jpg', 'data': {'categories': ['#open_source', '#long_context', '#rag', '#optimization', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Компенсированная обрезка: возвращаем скорость без потерь качества', 'desc': 'Graft — это framework без обучения, который улучшает спекулятивное декодирование путём динамического сочетания операций обрезки и поиска похожих примеров. Метод решает проблему компромисса между скоростью и качеством: обрезка уменьшает вычислительные затраты, но может отбросить валидные кандидаты, а поиск восполняет потери покрытия, добавляя высокопредсказуемые токены в места, освобождённые обрезкой. Фреймворк полностью не требует переобучения модели и гарантирует сохранение качества вывода. Экспериментальные результаты показывают ускорение до 5.41 раз на коротких последовательностях и улучшение на 21.8% по сравнению с EAGLE-3 на моделях масштаба 235B.'}, 'en': {'title': 'Graft: Speeding Up Language Models with Smart Pruning and Retrieval', 'desc': "Graft is a novel framework designed to enhance speculative decoding in large language models by integrating pruning and retrieval techniques. It addresses the challenge of balancing speed and accuracy by dynamically adjusting resource allocation, allowing for faster inference without losing the quality of generated outputs. By using a 'prune-then-graft' approach, Graft effectively fills gaps left by pruning with high-quality retrieved tokens, thus maintaining a high acceptance rate. The framework is training-free and demonstrates significant performance improvements, achieving up to 5.41 times speedup in short-context generation tasks compared to existing methods."}, 'zh': {'title': 'Graft：提升推测解码的新方法', 'desc': 'Graft是一种无需训练的框架，通过动态结合剪枝和检索操作来增强推测解码，旨在提高接受率和推理速度，同时不牺牲准确性。推测解码利用草稿-验证的模式加速大型语言模型的推理，但传统方法构建的庞大草稿树会导致显著的带宽和计算开销。Graft通过剪枝释放计算预算，并通过检索弥补剪枝带来的覆盖损失，从而打破了传统的权衡。综合评估表明，Graft在短上下文生成和大规模模型等实际应用中建立了新的性能边界。'}}}, {'id': 'https://huggingface.co/papers/2605.18226', 'title': 'Context Memorization for Efficient Long Context Generation', 'url': 'https://huggingface.co/papers/2605.18226', 'abstract': "Abstract Attention-state memory enables efficient long-prefix inference by storing precomputed attention states in lightweight memory, improving accuracy and reducing latency compared to traditional methods.  AI-generated summary Modern large language model (LLM) applications increasingly rely on long conditioning prefixes to control model behavior at inference time. While prefix-augmented inference is effective, it incurs two structural limitations: i) the prefix's influence fades as generation proceeds, and ii) attention computation over the prefix scales linearly with its length. Existing approaches either keep the prefix in attention while compressing it, or internalize it into model parameters through gradient-based training. The former still attends to the prefix at inference, while the latter is training-intensive and ill-suited to prefix updates. To address these issues, we propose attention-state memory, a training-free approach that externalizes the prefix into a lightweight, lookup-based memory of precomputed attention states between prefix and query tokens. On ManyICLBench with LLaMA-3.1-8B, our method improves accuracy over in-context learning at 1K-8K memory budgets while reducing attention latency by 1.36x at 8K, and surpasses full-attention RAG performance on NBA benchmark using only 20% of its memory footprint.", 'score': 3, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '4ba01ede45cddf00', 'authors': ['Yasuyuki Okoshi', 'Hao Mark Chen', 'Guanxi Lu', 'Hongxiang Fan', 'Masato Motomura', 'Daichi Fujiki'], 'affiliations': ['Imperial College London', 'Institute of Science Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2605.18226.jpg', 'data': {'categories': ['#rag', '#inference', '#training'], 'emoji': '💾', 'ru': {'title': 'Память для эффективной работы с длинными префиксами без переобучения', 'desc': 'Статья предлагает метод attention-state memory для эффективной обработки длинных префиксов в больших языковых моделях. Подход сохраняет предвычисленные состояния внимания между токенами префикса и запросом во внешней памяти, избегая необходимости пересчета внимания при инференсе. Метод не требует дополнительного обучения и позволяет преодолеть две проблемы традиционных подходов: затухание влияния префикса и линейный рост вычислительных затрат. Экспериментальные результаты показывают улучшение точности и ускорение инференса на 1.36x при работе с префиксами длиной до 8000 токенов.'}, 'en': {'title': 'Efficient Long-Prefix Inference with Attention-State Memory', 'desc': 'This paper introduces attention-state memory, a novel approach that enhances long-prefix inference in large language models by storing precomputed attention states in a lightweight memory. This method addresses the fading influence of prefixes during generation and the linear scaling of attention computation with prefix length. By externalizing the prefix into a lookup-based memory, the approach avoids the need for intensive training and allows for efficient updates. The results show significant improvements in accuracy and reduced latency compared to traditional methods, demonstrating its effectiveness in real-world applications.'}, 'zh': {'title': '高效的注意力状态记忆，提升长前缀推理', 'desc': '本文提出了一种名为注意力状态记忆的方法，旨在提高长前缀推理的效率。该方法通过将预计算的注意力状态存储在轻量级内存中，来改善模型的准确性并减少延迟。与传统方法相比，注意力状态记忆不需要训练，能够有效解决前缀影响逐渐减弱和注意力计算随前缀长度线性增长的问题。实验结果表明，在ManyICLBench上，该方法在1K-8K内存预算下提高了准确性，并在8K时将注意力延迟减少了1.36倍。'}}}, {'id': 'https://huggingface.co/papers/2605.18746', 'title': 'ESI-Bench: Towards Embodied Spatial Intelligence that Closes the Perception-Action Loop', 'url': 'https://huggingface.co/papers/2605.18746', 'abstract': "Abstract Embodied spatial intelligence requires active perception-action loops where agents strategically explore environments to uncover hidden spatial structures, with performance limited by action selection rather than perception capabilities.  AI-generated summary Spatial intelligence unfolds through a perception-action loop: agents act to acquire observations, and reason about how observations vary as a function of action. Rather than passively processing what is seen, they actively uncover what is unseen - occluded structure, dynamics, containment, and functionality that cannot be resolved from passive sensing alone. We move beyond prior formulations of spatial intelligence that assume oracle observations by recasting the observer as an actor. We introduce ESI-BENCH, a comprehensive benchmark for embodied spatial intelligence spanning 10 task categories and 29 subcategories built on OmniGibson, grounded in Spelke's core knowledge systems. Agents must decide what abilities to deploy - perception, locomotion, and manipulation - and how to sequence them to actively accumulate task-relevant evidence. We conduct extensive experiments on state-of-the-art MLLMs and find that active exploration substantially outperforms passive counterparts, with agents spontaneously discovering emergent spatial strategies without explicit instructions, while random multi-view often adds noise rather than signal despite consuming far more images. Most failures stem not from weak perception but from action blindness: poor action choices lead to poor observations, which in turn drive cascading errors. While explicit 3D grounding stabilizes reasoning on depth-sensitive tasks, imperfect 3D representation proves more harmful than 2D baselines by distorting spatial relations. Human studies further reveal that unlike humans who seek falsifying viewpoints and revise beliefs under contradiction, models commit prematurely with high confidence regardless of evidence quality, exposing a metacognitive gap that neither better perception nor more embodied interaction alone can close.", 'score': 3, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '6d9a1dd28821133d', 'authors': ['Yining Hong', 'Jiageng Liu', 'Han Yin', 'Manling Li', 'Leonidas Guibas', 'Li Fei-Fei', 'Jiajun Wu', 'Yejin Choi'], 'affiliations': ['Northwestern University', 'Stanford University', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2605.18746.jpg', 'data': {'categories': ['#3d', '#multimodal', '#robotics', '#benchmark', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Разум через действие: активное исследование как ключ к пространственному интеллекту', 'desc': 'В статье предлагается новый подход к пространственному интеллекту на основе активного взаимодействия агента с окружением. Авторы вводят ESI-BENCH — комплексный бенчмарк для оценки воплощённого пространственного интеллекта, содержащий 10 категорий задач, основанные на фундаментальных системах знаний. Основной вывод заключается в том, что производительность агентов ограничена выбором действий, а не качеством восприятия: случайное исследование окружения часто приносит вред, а критические ошибки возникают из-за неправильных решений об исследовании. Исследование также выявляет принципиальное различие между моделями и людьми: люди активно ищут опровергающие доказательства и пересматривают убеждения, тогда как модели преждевременно принимают решения с высокой уверенностью, независимо от качества доказательств.'}, 'en': {'title': 'Active Exploration Enhances Spatial Intelligence in AI', 'desc': 'This paper discusses the importance of active exploration in embodied spatial intelligence, where agents learn about their environment through a cycle of perception and action. It introduces ESI-BENCH, a benchmark designed to evaluate how well agents can uncover hidden spatial structures by making strategic decisions about their actions. The findings show that agents that actively explore outperform those that passively observe, as they can discover new strategies without explicit guidance. Additionally, the research highlights that many failures in performance arise from poor action choices rather than weak perception, indicating a need for better action selection mechanisms.'}, 'zh': {'title': '主动探索，揭示空间智能的奥秘', 'desc': '本论文探讨了具身空间智能的概念，强调了感知-行动循环的重要性。智能体通过主动探索环境，揭示隐藏的空间结构，而不仅仅依赖于被动感知。我们提出了ESI-BENCH，这是一个全面的基准测试，涵盖了10个任务类别和29个子类别，旨在评估智能体在空间智能方面的表现。研究表明，主动探索显著优于被动观察，智能体能够自发发现新的空间策略，而不是仅仅依赖于随机的多视角图像。'}}}, {'id': 'https://huggingface.co/papers/2605.18827', 'title': 'Code-Guided Reasoning for Small Language Models: Evaluating Executable MCQA Scaffolds', 'url': 'https://huggingface.co/papers/2605.18827', 'abstract': 'Abstract Code-Guided Reasoning (CGR) evaluates how executable reasoning scaffolds enhance small language model performance on multiple-choice question answering tasks through standardized components and measured improvements.  AI-generated summary Multiple-choice QA benchmarks usually evaluate small language models (SLMs) as direct answerers, but deployed language-model systems increasingly rely on external scaffolds such as tools, code, and repeated model calls. We introduce Code-Guided Reasoning (CGR), an evaluation protocol and generated-program resource for measuring when executable reasoning scaffolds improve SLM performance on MCQA tasks. CGR standardizes six components: a normalized item interface, a direct solver prompt, a generator prompt, a Python scaffold, solver-call and extraction helpers, and a three-channel result record. On 20,498 retained result rows from a locally prepared MCQA bundle and six metadata-registered solver models, the observed non-zero-baseline partition shows 66.21% macro assisted accuracy versus 38.11% direct accuracy, a +28.10 percentage-point difference with a pair-bootstrap interval of [20.32, 36.43]. Under a stricter Ab > 30% direct-signal gate, the macro difference is +14.11 points. These estimates are descriptive. Assisted inference uses a larger solver-call budget, answer extraction is brittle, Time-MQA contains the observed regressions, and some generated programs violate the no-hard-coding instruction. CGR provides the trace package needed to interpret these results, including direct, assisted, and generator-side answers, partition definitions, generated programs, response metadata, and audits.', 'score': 3, 'issue_id': 2272, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd0511c3dbc7e97f6', 'authors': ['Prateek Biswas', 'Dhaval Patel', 'Vedant Khandelwal', 'Shuxin Lin', 'Amit Sheth'], 'affiliations': ['Artificial Intelligence Institute at University of South Carolina', 'IBM'], 'pdf_title_img': 'assets/pdf/title_img/2605.18827.jpg', 'data': {'categories': ['#inference', '#small_models', '#plp', '#benchmark', '#optimization', '#reasoning'], 'emoji': '🔧', 'ru': {'title': 'Внешние инструменты и код значительно усиливают способность малых моделей к логическому рассуждению', 'desc': 'В статье представлен протокол оценки Code-Guided Reasoning (CGR), который измеряет, насколько исполняемые леса рассуждений улучшают производительность малых языковых моделей при решении задач множественного выбора. Авторы стандартизировали шесть компонентов: нормализованный интерфейс, прямой решатель, генератор программ на Python, вспомогательные функции и систему логирования результатов. Экспериментальные результаты показывают значительное улучшение точности с 38.11% при прямом ответе до 66.21% при использовании вспомогательных инструментов (разница +28.10 процентных пункта). CGR предоставляет полный набор трассировочных данных и сгенерированные программы для интерпретации и воспроизведения результатов.'}, 'en': {'title': 'Enhancing Language Models with Code-Guided Reasoning', 'desc': 'The paper introduces Code-Guided Reasoning (CGR), a new evaluation method that assesses how using executable reasoning tools can improve the performance of small language models (SLMs) in answering multiple-choice questions. It standardizes six components to create a structured approach for measuring the effectiveness of these scaffolds, which include prompts and Python code. The results show a significant improvement in accuracy when using CGR, with a macro assisted accuracy of 66.21% compared to 38.11% for direct answering. This indicates that integrating external reasoning tools can enhance the capabilities of language models in complex question-answering tasks.'}, 'zh': {'title': '代码引导推理提升语言模型表现', 'desc': '代码引导推理（CGR）评估可执行推理框架如何提升小型语言模型在多项选择问答任务中的表现。该研究提出了一种评估协议，标准化了六个组件，以便测量外部工具和代码对小型语言模型性能的影响。通过对20,498个结果的分析，发现使用可执行推理框架的准确率显著高于直接回答的准确率。CGR还提供了结果解释所需的追踪包，包括直接、辅助和生成侧的答案等信息。'}}}, {'id': 'https://huggingface.co/papers/2605.20075', 'title': 'CopT: Contrastive On-Policy Thinking with Continuous Spaces for General and Agentic Reasoning', 'url': 'https://huggingface.co/papers/2605.20075', 'abstract': "Abstract CopT introduces a novel reasoning framework for LLMs that generates draft answers first, then uses contrastive verification and dynamic thinking to improve accuracy while reducing token consumption.  AI-generated summary Chain-of-thought (CoT) is a standard approach for eliciting reasoning capabilities from large language models (LLMs). However, the common CoT paradigm treats thinking as a prerequisite for answering, which can delay access to plausible answers and incur unnecessary token costs even when the model is able to identify an answer before extended thinking, a behavior known as performative reasoning. In this paper, we introduce CopT, a reformulated reasoning pipeline that reverses the usual order of thinking and answering. Instead of thinking before answering, CopT first elicits a draft answer and then invokes subsequent on-policy thinking conditioned on its own draft answer for reflection and correction. To assess whether the draft answer should be trusted, CopT recasts continuous embeddings as inference-time contrastive verifiers. Specifically, it contrasts the model's support for the same generated tokens under discrete-token inputs and continuous-embedding inputs, yielding a sequence-level reverse KL estimator for answer reliability. Our analysis shows that under certain assumptions, the expected estimate equals the mutual information between the unresolved latent state and the emitted answer token, explaining why it captures answer-relevant uncertainty rather than arbitrary uncertainty in the latent state. When the answer is deemed insufficiently reliable, CopT performs further on-policy thinking, where a second KL estimator dynamically controls draft-answer visibility, preserving useful partial information while reducing the risk of being misled by unreliable content. Across mathematics, coding, and agentic reasoning tasks, CopT improves peak accuracy by up to 23% and reduces token usage by up to 57% at comparable or higher accuracy, without any additional training. The code is available at https://github.com/sdc17/CopT.", 'score': 2, 'issue_id': 2272, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '2162cebf3e7ad5b8', 'authors': ['Dachuan Shi', 'Hanlin Zhu', 'Xiangchi Yuan', 'Wanjia Zhao', 'Kejing Xia', 'Wen Xiao', 'Wenke Lee'], 'affiliations': ['Georgia Tech', 'Microsoft', 'Stanford University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.20075.jpg', 'data': {'categories': ['#open_source', '#optimization', '#reasoning'], 'emoji': '🔄', 'ru': {'title': 'Сначала ответ, потом размышление: эффективное рассуждение через контрастную верификацию', 'desc': 'CopT предлагает новый подход к рассуждениям в больших языковых моделях, который сначала генерирует предварительный ответ, а затем использует контрастную верификацию для его оценки. Вместо традиционного подхода цепочки рассуждений, где модель думает перед ответом, CopT переворачивает этот порядок и размышляет после получения черновика ответа. Для проверки надежности ответа метод преобразует эмбеддинги в контрастные верификаторы, сравнивая поддержку модели для одинаковых токенов при дискретных и непрерывных входах. Экспериментально показано, что CopT повышает точность на задачах математики и кодирования на 23% и снижает потребление токенов на 57% без переобучения модели.'}, 'en': {'title': 'Revolutionizing Reasoning: Draft First, Think Later with CopT', 'desc': 'The paper presents CopT, a new reasoning framework for large language models (LLMs) that changes the traditional approach of generating answers. Instead of thinking first and then answering, CopT generates a draft answer initially and then refines it through contrastive verification and dynamic thinking. This method reduces token consumption and improves accuracy by allowing the model to assess the reliability of its draft answer before further reasoning. The results show significant improvements in accuracy and efficiency across various tasks without requiring additional training.'}, 'zh': {'title': 'CopT：颠覆传统推理，提升回答准确性！', 'desc': 'CopT提出了一种新颖的推理框架，旨在提高大型语言模型（LLMs）的回答准确性，同时减少令牌消耗。该方法首先生成草拟答案，然后通过对比验证和动态思考来改进答案。与传统的思考后回答的方式不同，CopT先生成答案，再进行反思和修正。实验表明，CopT在数学、编码和代理推理任务中，准确率提高了最多23%，令牌使用量减少了最多57%。'}}}, {'id': 'https://huggingface.co/papers/2605.20035', 'title': 'Stage-adaptive Token Selection for Efficient Omni-modal LLMs', 'url': 'https://huggingface.co/papers/2605.20035', 'abstract': 'Abstract SEATS is a training-free, stage-adaptive token selection method that reduces computational overhead in om-LLMs by progressively pruning redundant visual and audio tokens during both pre-LLM and LLM stages.  AI-generated summary Omni-modal large language models (om-LLMs) achieve unified audio-visual understanding by encoding video and audio into temporally aligned token sequences interleaved at the window level. However, processing these dense non-textual tokens throughout the LLM incurs substantial computational overhead. Although training-free token selection can reduce this cost, existing methods either focus on visual-only inputs or prune om-LLM tokens only before the LLM with fixed per-modality ratios, failing to capture how cross-modal token importance evolves across layers. To address this limitation, we first analyze the layer-wise token dependency of om-LLMs. We find that visual and audio dependencies follow a block-wise pattern and gradually weaken with depth, indicating that many late-layer non-textual tokens become redundant after cross-modal fusion. Motivated by this observation, we propose SEATS, a training-free, stage-adaptive token selection method for efficient om-LLM inference. Before the LLM, SEATS removes spatiotemporal redundancy via attention-weighted diversity selection. Inside the LLM, it progressively prunes tokens across blocks and dynamically allocates the retention budget from temporal windows to modalities using query relevance scores. In late layers, it removes all remaining non-textual tokens once cross-modal fusion is complete. Experiments on Qwen2.5-Omni and Qwen3-Omni demonstrate that SEATS effectively improves inference efficiency. Retaining only 10% of visual and audio tokens, it achieves a 9.3x FLOPs reduction and a 4.8x prefill speedup while preserving 96.3% of the original performance.', 'score': 2, 'issue_id': 2275, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '6b7d7a3af772408d', 'authors': ['Zijie Xin', 'Jie Yang', 'Ruixiang Zhao', 'Tianyi Wang', 'Fengyun Rao', 'Jing Lyu', 'Xirong Li'], 'affiliations': ['Renmin University of China', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.20035.jpg', 'data': {'categories': ['#inference', '#optimization', '#training', '#multimodal'], 'emoji': '✂️', 'ru': {'title': 'Умная очистка: избавляемся от ненужных токенов в омни-модальных моделях', 'desc': 'SEATS — это метод отбора токенов без обучения, который снижает вычислительные затраты в омни-модальных больших языковых моделях путём прогрессивной очистки от избыточных визуальных и аудио-токенов. Авторы обнаружили, что зависимость между модальностями следует блочному паттерну и ослабляется с глубиной сети, что позволяет удалять неязыковые токены в поздних слоях после кросс-модального слияния. Метод использует взвешенный по вниманию отбор разнообразия перед LLM и динамическое распределение бюджета удержания токенов внутри модели на основе релевантности запроса. При сохранении только 10% визуальных и аудио-токенов SEATS достигает 9.3-кратного снижения вычислительных операций и 4.8-кратного ускорения с потерей менее 4% качества.'}, 'en': {'title': 'Efficient Token Selection for Omni-Modal Models with SEATS', 'desc': 'The paper introduces SEATS, a novel method for selecting tokens in omni-modal large language models (om-LLMs) that enhances computational efficiency without requiring additional training. SEATS intelligently prunes redundant visual and audio tokens during both the pre-LLM and LLM stages by analyzing how token importance changes across different layers. This method leverages attention-weighted diversity selection to eliminate unnecessary tokens before the LLM and dynamically adjusts token retention during processing based on query relevance. Experimental results show that SEATS can significantly reduce computational load while maintaining high performance, achieving a 9.3x reduction in FLOPs and a 4.8x speedup in prefill time.'}, 'zh': {'title': 'SEATS：高效的全模态令牌选择方法', 'desc': 'SEATS是一种无训练、阶段自适应的令牌选择方法，旨在减少全模态大语言模型（om-LLMs）的计算开销。该方法通过在预处理和LLM阶段逐步修剪冗余的视觉和音频令牌，来提高推理效率。研究发现，视觉和音频令牌在不同层次的依赖关系呈现出块状模式，随着深度的增加，许多后层的非文本令牌变得冗余。SEATS通过注意力加权的多样性选择和动态分配保留预算，有效地优化了令牌的使用，显著提高了推理速度和效率。'}}}, {'id': 'https://huggingface.co/papers/2605.12623', 'title': 'DocAtlas: Multilingual Document Understanding Across 80+ Languages', 'url': 'https://huggingface.co/papers/2605.12623', 'abstract': 'Abstract DocAtlas framework creates high-fidelity OCR datasets across 82 languages using differential rendering and synthetic generation, demonstrating improved multilingual model adaptation through Direct Preference Optimization.  AI-generated summary Multilingual document understanding remains limited for low-resource languages due to scarce training data and model-based annotation pipelines that perpetuate existing biases. We introduce DocAtlas, a framework that constructs high-fidelity OCR datasets and benchmarks covering 82 languages and 9 evaluation tasks. Our dual pipelines, differential rendering of native DOCX documents and synthetic LaTeX-based generation for right-to-left scripts produce precise structural annotations in a unified DocTag format encoding layout, text, and component types, without learned models for core annotation. Evaluating 16 state-of-the-art models reveals persistent gaps in low-resource scripts. We show that Direct Preference Optimization (DPO) using rendering-derived ground truth as positive signal achieves stable multilingual adaptation, improving both in-domain (+1.9%) and out-of-domain (+1.8%) accuracy without measurable base-language degradation, where supervised fine-tuning degrades out-of-domain performance by up to 21%. Our best variant, DocAtlas-DeepSeek, improves +1.7% over the strongest baseline.', 'score': 2, 'issue_id': 2271, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '720b5f334a735f7f', 'authors': ['Ahmed Heakl', 'Youssef Mohamed', 'Abdullah Sohail', 'Rania Elbadry', 'Ahmed Nassar', 'Peter W. J. Staar', 'Fahad Shahbaz Khan', 'Imran Razzak', 'Salman Khan'], 'affiliations': ['IBM Research', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.12623.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#multilingual', '#synthetic', '#data', '#machine_translation', '#optimization', '#low_resource', '#dataset'], 'emoji': '📄', 'ru': {'title': 'Многоязычное распознавание документов без деградации производительности', 'desc': 'В работе представлен фреймворк DocAtlas для создания высокачественных датасетов OCR на 82 языках с использованием дифференциального рендеринга и синтетической генерации документов. Авторы решают проблему ограниченного понимания многоязычных документов в низкоресурсных языках, предлагая две конвейерные линии: рендеринг нативных документов DOCX и синтетическую генерацию на основе LaTeX для языков с письмом справа налево. Для адаптации многоязычных моделей применяется метод Direct Preference Optimization с использованием ground truth из рендеринга как положительного сигнала, что обеспечивает стабильное улучшение производительности без деградации базового языка. Лучший вариант модели DocAtlas-DeepSeek показывает улучшение на 1.7% по сравнению с сильнейшим бейзлайном.'}, 'en': {'title': 'Empowering Multilingual OCR with DocAtlas', 'desc': 'The DocAtlas framework addresses the challenge of creating high-quality OCR datasets for 82 languages, particularly focusing on low-resource languages that often lack sufficient training data. It utilizes differential rendering and synthetic generation techniques to produce accurate structural annotations in a unified format, which helps in multilingual document understanding. By employing Direct Preference Optimization (DPO), the framework enhances model adaptation, achieving better accuracy in both in-domain and out-of-domain tasks without degrading performance on the base language. The results indicate that DocAtlas significantly outperforms existing methods, particularly in low-resource scripts, demonstrating its effectiveness in improving multilingual model performance.'}, 'zh': {'title': 'DocAtlas：提升多语言OCR的创新框架', 'desc': 'DocAtlas框架通过差异渲染和合成生成技术，创建了覆盖82种语言的高保真OCR数据集，旨在改善多语言模型的适应性。该框架采用双管道方法，利用原生DOCX文档的差异渲染和基于LaTeX的合成生成，提供统一的DocTag格式，精确编码布局、文本和组件类型。通过评估16种最先进的模型，发现低资源语言的表现仍然存在差距。我们展示了使用渲染生成的真实数据作为正信号的直接偏好优化（DPO）方法，能够在不降低基础语言性能的情况下，显著提高多语言适应性。'}}}, {'id': 'https://huggingface.co/papers/2605.08472', 'title': 'Mid-Training with Self-Generated Data Improves Reinforcement Learning in Language Models', 'url': 'https://huggingface.co/papers/2605.08472', 'abstract': "Abstract Using diverse self-generated data during mid-training based on Polya's problem-solving approaches improves reinforcement learning performance in language models across mathematical reasoning and out-of-distribution tasks.  AI-generated summary The effectiveness of Reinforcement Learning (RL) in Large Language Models (LLMs) depends on the nature and diversity of the data used before and during RL. In particular, reasoning problems can often be approached in multiple ways that rely on different forms of reasoning, and exposure to only a limited range of such approaches in the training data may limit the effectiveness of RL. Motivated by this, we investigate using diverse self-generated data during mid-training as an intermediate step before RL training. Specifically, we adopt a bootstrapped data-generation framework guided by George Polya's problem-solving approaches for generating multiple variants of correct answers for each question in the training data, and then perform fine-tuning. We first provide a theoretical perspective on how mid-training on such data improves RL and explain how policy-gradient updates can incentivize combining multiple approaches. We then empirically demonstrate that RL-trained models initialized with our mid-training data achieve consistent improvements across various mathematical reasoning benchmarks and other OOD tasks like code generation and narrative reasoning. Overall, our investigative study shows that a language model learning multiple problem-solving approaches, through self-generated data helps subsequent RL.", 'score': 2, 'issue_id': 2277, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'f74e5bade8d89e4b', 'authors': ['Aswin RRV', 'Jacob Dineen', 'Divij Handa', 'Mihir Parmar', 'Ben Zhou', 'Swaroop Mishra', 'Chitta Baral'], 'affiliations': ['Arizona State University', 'Google Cloud AI Research', 'Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2605.08472.jpg', 'data': {'categories': ['#rl', '#math', '#synthetic', '#training', '#data', '#reasoning'], 'emoji': '🧮', 'ru': {'title': 'Множественные подходы к решению через самогенерируемые данные улучшают обучение с подкреплением', 'desc': 'В статье предлагается использовать разнообразные самогенерируемые данные на промежуточном этапе обучения языковых моделей перед применением обучением с подкреплением. Авторы используют подход Полиа для решения задач, генерируя несколько вариантов правильных ответов для каждого вопроса в обучающем наборе данных. Теоретически показано, как такое предварительное обучение улучшает эффективность обучения с подкреплением и позволяет моделям комбинировать различные подходы к решению. Эмпирически демонстрируется, что языковые модели, инициализированные таким образом, показывают улучшение производительности на задачах математического рассуждения, генерации кода и нарративного рассуждения.'}, 'en': {'title': 'Enhancing RL in Language Models with Diverse Self-Generated Data', 'desc': "This paper explores how using diverse self-generated data during mid-training can enhance the performance of reinforcement learning (RL) in language models, particularly for mathematical reasoning tasks. By applying Polya's problem-solving strategies, the authors generate multiple correct answer variants for training questions, which helps expose the model to various reasoning approaches. The study shows that this mid-training step leads to better policy-gradient updates, encouraging the model to integrate different problem-solving methods. Empirical results indicate that models trained with this approach perform significantly better on mathematical reasoning and out-of-distribution tasks like code generation and narrative reasoning."}, 'zh': {'title': '多样化自生成数据提升强化学习效果', 'desc': '本文探讨了在强化学习（RL）训练过程中使用多样化的自生成数据如何提升语言模型在数学推理和超出分布（OOD）任务中的表现。研究表明，推理问题可以通过多种方式解决，而仅接触有限的训练数据可能会限制RL的效果。我们采用了基于George Polya问题解决方法的自生成数据框架，在中期训练中生成多种正确答案的变体，并进行微调。实验证明，使用这种中期训练数据初始化的RL模型在多个数学推理基准和其他任务上均表现出一致的提升。'}}}, {'id': 'https://huggingface.co/papers/2605.19305', 'title': 'Matérn Noise for Triangulation-Agnostic Flow Matching on Meshes', 'url': 'https://huggingface.co/papers/2605.19305', 'abstract': "Abstract Flow matching is adapted to mesh-based signal generation through a triangulation-agnostic noise distribution based on Matérn processes and PoissonNet denoising.  AI-generated summary This paper tackles the task of learning to generate signals over triangle meshes in a triangulation-agnostic manner, meaning the trained model can be applied to different meshes and triangulations effectively. Practically, the paper adapts the flow matching (FM) paradigm to a mesh-based, triangulation-agnostic setting. Theoretically, it proposes a specific noise distribution which is triangulation agnostic, to be used inside the FM model's denoising process. While noise distributions are usually trivial to devise for, e.g., images, devising a triangulation-agnostic distribution proves to be a much more difficult task. We formulate a mathematical definition of triangulation agnosticism of distributions, via their spectrum. We then show that a discretization of a specific Gaussian random field called a Matérn process holds these desired properties, and provides a simple and efficient sampling algorithm. We use it as our noise model, and adapt FM to the triangulation-agnostic setting by using a state-of-the-art approach for learning signals on meshes in the gradient domain -- PoissonNet -- as the denoiser. We conduct experiments on elaborate tasks such as sampling elastic rest states, and generating poses of humanoids. Our method is shown to be capable of producing highly realistic results for meshes of over one million triangles, significantly exceeding the state-of-the-art in quality and diversity.", 'score': 1, 'issue_id': 2276, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '4e8d05ee2c814a97', 'authors': ['Tianshu Kuai', 'Arman Maesumi', 'Daniel Ritchie', 'Noam Aigerman'], 'affiliations': ['Brown University', 'Université de Montréal & Mila'], 'pdf_title_img': 'assets/pdf/title_img/2605.19305.jpg', 'data': {'categories': ['#training', '#architecture', '#diffusion', '#3d'], 'emoji': '🔺', 'ru': {'title': 'Генерация сигналов на сетках, независимая от их структуры', 'desc': 'В статье предлагается адаптация flow matching для генерации сигналов на треугольных сетках независимо от их триангуляции. Ключевая идея заключается в разработке специальной шумовой распределения на основе процессов Матёрна, которая сохраняет инвариантность к различным триангуляциям сетки. В качестве деноайзера используется PoissonNet - современный подход для обучения сигналов на сетках в градиентном пространстве. Метод успешно применяется к сложным задачам синтеза, таким как генерация упругих конфигураций и поз гуманоидов на сетках с миллионом треугольников.'}, 'en': {'title': 'Triangulation-Agnostic Signal Generation on Meshes', 'desc': 'This paper presents a novel approach to generating signals on triangle meshes without being limited by their specific triangulation. It adapts the flow matching technique to work in a triangulation-agnostic way, allowing the model to generalize across different mesh structures. The authors introduce a unique noise distribution based on Matérn processes, which is crucial for the denoising process in the flow matching model. Their experiments demonstrate that this method can produce highly realistic mesh signals, outperforming existing techniques in both quality and diversity.'}, 'zh': {'title': '三角剖分无关的信号生成新方法', 'desc': '本文提出了一种基于流匹配的信号生成方法，适用于三角网格，并且不依赖于特定的三角剖分。我们引入了一种新的噪声分布，称为Matérn过程，来实现三角剖分无关的去噪过程。通过使用PoissonNet作为去噪器，我们的模型能够在不同的网格上有效生成信号。实验结果表明，该方法在生成高质量和多样性的网格信号方面，显著超越了现有的最先进技术。'}}}, {'id': 'https://huggingface.co/papers/2605.19908', 'title': 'Where Does Authorship Signal Emerge in Encoder-Based Language Models?', 'url': 'https://huggingface.co/papers/2605.19908', 'abstract': 'Abstract Authorship attribution model performance varies significantly based on scoring mechanisms rather than representation quality, with different consolidation layers of authorship signals determined by gradient structures and training dynamics.  AI-generated summary Authorship attribution models fine-tuned with the same pretrained encoder, data, and loss can differ four-fold in performance depending only on their scoring mechanism. We use mechanistic interpretability tools to explain this gap. Stylistic features such as word length, punctuation density, and function-word frequency are equally available at every layer in every model, including in an off-the-shelf control encoder, hence the gap not coming from representation quality. Instead, causal intervention shows that the scorer determines where the encoder consolidates authorship signal. Mean pooling forces consolidation by early to mid layers, while late interaction defers it to later layers. We further derive this difference from the gradient structure of each scorer, and training dynamics reveal distinct learning trajectories that follow from that difference.', 'score': 1, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '2e19d3d253bf37c9', 'authors': ['Francis Kulumba', 'Guillaume Vimont', 'Laurent Romary', 'Florian Cafiero'], 'affiliations': ['Inria Paris', 'Sorbonne Université'], 'pdf_title_img': 'assets/pdf/title_img/2605.19908.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Механизм скоринга, а не представления определяет успех атрибуции авторства', 'desc': 'В статье исследуется, почему модели атрибуции авторства показывают разные результаты, хотя используют одинаковые энкодеры и данные. Авторы обнаружили, что различия в производительности зависят не от качества представлений, а от механизма подсчёта скоров. Используя инструменты механистической интерпретируемости, они показали, что стилистические признаки (длина слов, пунктуация) доступны на всех слоях модели одинаково. Вместо этого функция скоринга определяет, на каком слое энкодер консолидирует сигналы авторства: усреднение форсирует консолидацию на ранних слоях, а поздние взаимодействия откладывают её на более глубокие уровни.'}, 'en': {'title': 'Scoring Mechanisms Matter More Than Representation in Authorship Attribution', 'desc': 'This paper investigates how the performance of authorship attribution models is influenced more by their scoring mechanisms than by the quality of their representations. It shows that even models using the same pretrained encoder and data can have performance differences of up to four times, depending solely on how they score authorship signals. The authors utilize mechanistic interpretability tools to reveal that stylistic features are consistently available across all layers of the models, indicating that representation quality is not the issue. Instead, the scoring mechanism dictates how and where the model consolidates authorship signals, with different pooling strategies affecting the learning dynamics and gradient structures during training.'}, 'zh': {'title': '评分机制决定作者归属模型的表现', 'desc': '这篇论文探讨了作者归属模型的表现如何受到评分机制的显著影响，而不是表示质量。即使使用相同的预训练编码器、数据和损失函数，不同的评分机制也会导致模型性能相差四倍。通过机制可解释性工具，研究发现风格特征在每一层模型中都是可用的，因此性能差距并非源于表示质量。相反，因果干预表明，评分器决定了编码器整合作者信号的层次，平均池化强制在早期到中期层整合，而晚期交互则将其推迟到后期层。'}}}, {'id': 'https://huggingface.co/papers/2605.18263', 'title': 'RT-Splatting: Joint Reflection-Transmission Modeling with Gaussian Splatting', 'url': 'https://huggingface.co/papers/2605.18263', 'abstract': "Abstract RT-Splatting introduces a novel 3D Gaussian Splatting framework that separates geometric occupancy from optical opacity to improve rendering of semi-transparent specular surfaces with high-fidelity reflections and transmission.  AI-generated summary 3D Gaussian Splatting (3DGS) enables real-time novel view synthesis with high visual quality. However, existing methods struggle with semi-transparent specular surfaces that exhibit both complex reflections and clear transmission, often producing blurry reflections or overly occluded transmission. To address this, we present RT-Splatting, a framework that disentangles each Gaussian's geometric occupancy from its optical opacity. This factorization yields a unified surface-volume scene representation with a single set of Gaussian primitives. Our hybrid renderer interprets this representation both as a surface to capture high-frequency reflections and as a volume to preserve clear transmission. To mitigate the ambiguity in jointly optimizing reflection and transmission, we introduce Specular-Aware Gradient Gating, which suppresses misleading gradients from highly specular regions into the transmission branch, effectively reducing distracting floaters. Experiments on challenging semi-transparent scenes show that RT-Splatting achieves state-of-the-art performance, delivering high-fidelity reflections and clear transmission with real-time rendering. Moreover, our factorization naturally enables flexible scene editing. The project page is available at https://sjj118.github.io/RT-Splatting.", 'score': 1, 'issue_id': 2276, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '75132d0c57d08197', 'authors': ['Ji Shi', 'Xianghua Ying', 'Bowei Xing', 'Ruohao Guo', 'Wenzhen Yue'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.18263.jpg', 'data': {'categories': ['#3d'], 'emoji': '✨', 'ru': {'title': 'Разделение отражений и прозрачности в 3D гауссовых сплаттингах', 'desc': 'RT-Splatting представляет новую систему для синтеза новых видов 3D сцен в реальном времени, которая отделяет геометрическую занятость гауссианов от их оптической непрозрачности. Эта факторизация позволяет единой моделью с примитивами Гаусса одновременно представлять поверхность для захвата высокочастотных отражений и объём для сохранения чистой прозрачности. Авторы вводят Specular-Aware Gradient Gating - механизм, который подавляет ошибочные градиенты из сильно зеркальных областей в канал передачи света, устраняя артефакты. Метод достигает передовых результатов на сложных полупрозрачных сценах, обеспечивая высокоточные отражения, ясную передачу света и гибкое редактирование сцен.'}, 'en': {'title': 'Revolutionizing 3D Rendering with RT-Splatting!', 'desc': 'RT-Splatting is a new framework for rendering 3D scenes that improves how we visualize semi-transparent surfaces, which can be tricky due to their complex light interactions. It separates the geometric shape of objects from their optical properties, allowing for better handling of reflections and light transmission. This method uses a unique representation of surfaces and volumes with Gaussian primitives, enhancing the quality of rendered images in real-time. Additionally, it introduces a technique called Specular-Aware Gradient Gating to refine the rendering process, resulting in clearer images without distracting artifacts.'}, 'zh': {'title': '实时渲染高保真反射与透射的创新框架', 'desc': 'RT-Splatting提出了一种新颖的3D高斯点云框架，旨在将几何占用与光学不透明性分离，从而改善半透明镜面表面的渲染效果，提供高保真度的反射和透射。该框架通过将每个高斯的几何占用与其光学不透明性解耦，形成了统一的表面-体积场景表示。我们的混合渲染器能够同时捕捉高频反射和保持清晰透射，解决了在优化反射和透射时的模糊问题。实验结果表明，RT-Splatting在复杂的半透明场景中实现了最先进的性能，能够实时渲染高保真反射和清晰透射。'}}}, {'id': 'https://huggingface.co/papers/2605.18646', 'title': 'Language-Switching Triggers Take a Latent Detour Through Language Models', 'url': 'https://huggingface.co/papers/2605.18646', 'abstract': "Abstract A three-word Latin trigger in an 8B-parameter language model redirects English output to French through a circuit involving attention heads, orthogonal latent subspaces, and final-layer MLP conversion.  AI-generated summary Backdoor attacks on language models pose a growing security concern, yet the internal mechanisms by which a trigger sequence hijacks model computations remain poorly understood. We identify a circuit underlying a language-switching backdoor in an 8B-parameter autoregressive language model, where a three-word Latin trigger (nine tokens) redirects English output to French. We decompose the circuit into three phases: (1) distributed attention heads at early layers compose the trigger tokens into the last sequence position; (2) the resulting signal propagates through mid-layers in a subspace orthogonal to the model's natural language-identity direction; (3) the MLP at the final layer converts this latent signal into French logits. The entire circuit flows through a serial bottleneck at a single position: corrupting that position at any layer entirely mitigate the trigger but also hinder the model's capabilities. The orthogonal latent encoding suggests that defenses that search for language-like signals in intermediate representations would miss this trigger entirely.", 'score': 1, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '3256412b637211f2', 'authors': ['Francis Kulumba', 'Wissam Antoun', 'Théo Lasnier', 'Benoît Sagot', 'Djamé Seddah'], 'affiliations': ['Inria Paris', 'Sorbonne Université'], 'pdf_title_img': 'assets/pdf/title_img/2605.18646.jpg', 'data': {'categories': ['#interpretability', '#security', '#architecture', '#training'], 'emoji': '🔓', 'ru': {'title': 'Скрытый канал в языковой модели: как невидимая атака переключает язык', 'desc': 'В работе исследуется механизм работы backdoor-атаки на языковую модель с 8 миллиардами параметров, где трёхсловный латинский триггер перенаправляет генерацию с английского на французский язык. Авторы разложили схему атаки на три фазы: сначала attention-heads на ранних слоях комбинируют токены триггера, затем сигнал распространяется через промежуточные слои в подпространстве, ортогональном естественному представлению языковой идентичности модели, и наконец MLP финального слоя преобразует скрытый сигнал во французские логиты. Вся схема проходит через узкое место в одной позиции последовательности, поэтому её нарушение полностью блокирует триггер. Использование ортогонального кодирования означает, что традиционные методы защиты, ищущие языковые сигналы в промежуточных представлениях, не смогут обнаружить такую атаку.'}, 'en': {'title': 'Unveiling Language-Switching Backdoors in Language Models', 'desc': "This paper investigates a backdoor attack in an 8B-parameter autoregressive language model, where a specific three-word Latin trigger can switch the model's output from English to French. The authors describe a circuit that operates in three phases: first, attention heads in early layers process the trigger; second, the signal travels through mid-layers in a unique subspace that is separate from the model's usual language processing; and third, a final-layer MLP transforms this signal into French output. The study highlights a critical bottleneck in the model's architecture, where tampering with the trigger position can disable the backdoor but also degrade the model's overall performance. The findings suggest that traditional defenses may not detect such triggers due to their orthogonal encoding in the model's latent space."}, 'zh': {'title': '揭示语言模型中的后门攻击机制', 'desc': '这篇论文探讨了一种语言模型中的后门攻击，特别是如何通过一个三词拉丁触发器将英语输出重定向到法语。研究发现，这个过程涉及多个阶段，包括早期层的注意力头组合触发器，信号在中间层通过正交潜在子空间传播，最后通过多层感知机（MLP）转换为法语输出。触发器的有效性依赖于一个特定位置的信号流动，任何对该位置的干扰都会完全消除触发器，但也会影响模型的整体性能。研究结果表明，传统的防御方法可能无法识别这种潜在的触发器。'}}}, {'id': 'https://huggingface.co/papers/2605.19014', 'title': 'SAGA: A Sequence-Adaptive Generative Architecture for Multi-Horizon Probabilistic Forecasting with Adaptive Temporal Conformal Prediction', 'url': 'https://huggingface.co/papers/2605.19014', 'abstract': 'Abstract A transformer-based model for lifetime earnings forecasting demonstrates improved accuracy and reliable prediction intervals compared to traditional parametric approaches.  AI-generated summary Microsimulation models used by ministries of finance and central banks rely on parametric processes for lifetime earnings that capture only first and second moments of the conditional distribution and miss long-range nonlinear structure. We propose SAGA, a decoder-only transformer for irregular tabular panel sequences, paired with a split conformal calibration wrapper that delivers individual-level prediction intervals with finite-sample marginal coverage guarantees. Trained on the longitudinal Swedish LISA register over 1990 to 2022, comprising 2,143,817 individuals and 61,284,903 person-years, the model forecasts annual labor earnings at horizons of one to thirty years and aggregates them by Monte Carlo into present-discounted lifetime earnings distributions. Against the canonical Guvenen, Karahan, Ozkan, and Song parametric process and tabular and recurrent baselines, SAGA reduces continuous ranked probability score by 31.9 percent at the ten-year horizon and mean absolute error by 37.7 percent at the twenty-year horizon. Conformal intervals achieve nominal coverage to within 0.4 percentage points marginally and within 2.4 percentage points on the worst-case demographic subgroup. The reconstructed lifetime earnings Gini coefficient is 0.327 against the partially observed truth of 0.341 and the GKOS estimate of 0.378. Model weights, calibration tables, and a synthetic equivalent dataset are released for replication outside the protected SCB MONA environment.', 'score': 1, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '248f372f6143002f', 'authors': ['Gustav Olaf Yunus Laitinen-Fredriksson Lundström-Imanov', 'Hafize Gonca Cömert'], 'affiliations': ['Department of Economics, Stockholm University', 'Institute of Social Sciences, Faculty of Economics and Administrative Sciences, Suleyman Demirel University'], 'pdf_title_img': 'assets/pdf/title_img/2605.19014.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#dataset'], 'emoji': '💰', 'ru': {'title': 'Трансформер для точного прогнозирования пожизненных доходов с гарантированными интервалами неопределённости', 'desc': 'В статье предложена модель SAGA на основе трансформера для прогнозирования пожизненных доходов, которая превосходит традиционные параметрические подходы. Модель обучена на панельных данных шведского реестра LISA с более чем 2 миллионами индивидов и способна предсказывать годовые трудовые доходы на горизонте от одного до тридцати лет. Для обеспечения надёжности прогнозов применяется конформная калибровка, которая гарантирует доверительные интервалы с контролируемым уровнем покрытия. SAGA снижает ошибку предсказания на 31.9-37.7 процентов по сравнению с базовыми методами и более точно воспроизводит коэффициент Джини распределения доходов.'}, 'en': {'title': 'Transforming Lifetime Earnings Forecasting with SAGA', 'desc': 'This paper introduces SAGA, a transformer-based model designed to forecast lifetime earnings with greater accuracy than traditional methods. Unlike parametric models that only capture basic statistical moments, SAGA utilizes a decoder-only transformer to analyze complex, irregular tabular data. It incorporates a split conformal calibration technique to provide reliable individual-level prediction intervals. The model, trained on extensive longitudinal data from Sweden, significantly outperforms existing benchmarks in terms of prediction accuracy and coverage guarantees.'}, 'zh': {'title': 'SAGA：终身收入预测的新方法', 'desc': '本研究提出了一种基于变换器的模型SAGA，用于预测个人的终身收入。与传统的参数方法相比，SAGA在准确性和预测区间的可靠性上都有显著提升。该模型通过对1990年至2022年间的瑞典LISA注册数据进行训练，能够在1到30年的时间范围内预测年劳动收入，并通过蒙特卡洛方法聚合成现值折现的终身收入分布。实验结果显示，SAGA在十年和二十年的预测中，分别减少了31.9%和37.7%的误差，且其预测区间的覆盖率也达到了较高的水平。'}}}, {'id': 'https://huggingface.co/papers/2605.17659', 'title': 'Bug or Feature^2: Weight Drift, Activation Sparsity, and Spikes', 'url': 'https://huggingface.co/papers/2605.17659', 'abstract': 'Abstract Standard losses interacting with positively biased activation functions cause negative weight drift during early training, leading to significant activation sparsity and affecting model accuracy across various architectures.  AI-generated summary The design of modern neural architectures has converged through incremental empirical choices, yet the mechanisms governing their training dynamics remain only partially understood. We identify and analyze a negative weight drift induced by the interaction between standard losses and positively biased activation functions. We prove that under MSE or cross-entropy loss, the gradient with respect to positive pre-activations is non-negative in expectation at initialization, driving downstream weights toward negative values during early training. The drift is intrinsic to optimization rather than data, and persists across architectures (MLP, ResNet, ViT, GPT-nano, MP-SENe) and asymmetric activation functions (ReLU, GELU, SiLU). Coupled with ReLU, weight drift produces activation sparsity reaching up to 90\\% in GPT-nano. We characterize the sparsity-accuracy tradeoff across 79 configurations and identify a sharp accuracy cliff above sim70\\% activation sparsity. While ReLU^2 achieves a good sparsity--accuracy ratio in GPT-nano, it pathologically amplifies identified activation spikes in intermediate transformer layers. Clipping resolves this while preserving the representational benefits of squaring: clipped ReLU^2 outperforms its unclipped version, and GELU^2 achieves the lowest validation loss on GPT-nano. Code is available at https://github.com/On-Point-RND/BugOrFeature.', 'score': 1, 'issue_id': 2277, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': '0f7699c976cdd17c', 'authors': ['Egor Shvetsov', 'Aleksandr Serkov', 'Shokorov Viacheslav', 'Redko Dmitry', 'Vladislav Goloshchapov', 'Evgeny Burnaev'], 'affiliations': ['On-Point-RND'], 'pdf_title_img': 'assets/pdf/title_img/2605.17659.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Отрицательный дрейф весов: скрытый баг в обучении нейросетей', 'desc': 'В статье исследуется проблема отрицательного дрейфа весов, которая возникает при вза
