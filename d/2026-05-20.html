    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

Fu', 'Rui Cai', 'Tinghui Zhu', 'Wendi Li', 'Yanan Xie', 'Muhao Chen', 'Peng Qi'], 'affiliations': ['Princeton University', 'Uniphore', 'University of California, Davis', 'University of Wisconsin Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.16403.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#alignment', '#rlhf', '#video', '#hallucinations', '#interpretability', '#audio', '#training'], 'emoji': '👁️', 'ru': {'title': 'Слух без звука: как модели обманывают себя визуальными подсказками', 'desc': 'В работе выявлено, что видео-способные мультимодальные большие языковые модели создают иллюзию понимания аудио, полагаясь на визуальные подсказки вместо анализа звуковых данных. Авторы назвали это явление эффектом аудио-визуального Clever Hans, когда модели кажутся способными обрабатывать звук, но на самом деле используют корреляции между видеом и аудиом без проверки их синхронизации. Для диагностики этой проблемы предложена фреймворк Thud с тремя контрфактическими вмешательствами: Shift (проверка временной синхронизации), Mute (проверка наличия звука) и Swap (проверка согласованности аудио-визуального содержимого). Через обучение с парами предпочтений и регуляризацию на общих видео-предпочтениях удалось улучшить производительность на 28 процентных пункта по всем трём измерениям вмешательства.'}, 'en': {'title': 'Bridging the Gap: Enhancing Audio-Visual Alignment in MLLMs', 'desc': 'This paper investigates how multimodal large language models (MLLMs) interpret audio in videos, revealing that they often rely on visual cues instead of actual audio processing. This phenomenon is termed the audio-visual Clever Hans effect, where models seem to understand audio but actually exploit correlations between visual and acoustic information without proper verification. The authors introduce a framework called Thud, which uses counterfactual audio edits to diagnose and improve the alignment between audio and visual inputs. They propose a two-stage alignment method that enhances audio verification and overall model performance, achieving significant improvements in their experiments.'}, 'zh': {'title': '提升音频与视觉对齐的干预框架', 'desc': '这篇论文探讨了多模态大型语言模型在视频理解中的音频处理问题。研究发现，这些模型往往依赖视觉线索来推断音频信息，而不是直接处理音频流。作者提出了一种名为Thud的干预框架，通过三种反事实音频编辑方法来诊断和改善音频与视觉的对齐问题。最终，研究表明，通过干预学习，模型在音频验证和视频理解方面的表现得到了显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.14236', 'title': 'Active Learners as Efficient PRP Rerankers', 'url': 'https://huggingface.co/papers/2605.14236', 'abstract': 'Abstract Pairwise ranking prompting is reformulated as active learning from noisy comparisons, with improved rankers that enhance ranking quality under call constraints and address position bias through a randomized oracle.  AI-generated summary Pairwise Ranking Prompting (PRP) elicits pairwise preference judgments from an LLM, which are then aggregated into a ranking, usually via classical sorting algorithms. However, judgments are noisy, order-sensitive, and sometimes intransitive, so sorting assumptions do not match the setting. Because sorting aims to recover a full permutation, truncating it to meet a call budget does not produce a dependable top-K. We thus reframe PRP reranking as active learning from noisy pairwise comparisons and show that active rankers are drop-in replacements that improve NDCG@10 per call in the call-constrained regime. Our noise-robust framework also introduces a randomized-direction oracle that uses a single LLM call per pair. This approach converts systematic position bias into zero-mean noise, enabling unbiased aggregate ranking without the cost of bidirectional calls.', 'score': 64, 'issue_id': 2273, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'a21cf8e3489b9d0c', 'authors': ['Jeremías Figueiredo Paschmann', 'Juan Kaplan', 'Francisco Nattero', 'Santiago Barron', 'Juan Wisznia', 'Luciano del Corro'], 'affiliations': ['ELIAS Lab, Departamento de Ingeniería, Universidad de San Andrés'], 'pdf_title_img': 'assets/pdf/title_img/2605.14236.jpg', 'data': {'categories': [], 'emoji': '🏅', 'ru': {'title': 'Активное обучение для улучшения попарного ранжирования под ограничениями на запросы', 'desc': 'Статья переформулирует задачу попарного ранжирования как активное обучение на зашумленных сравнениях. Авторы показывают, что классические алгоритмы сортировки неэффективны для этой задачи, так как суждения LLM зашумлены и часто нарушают транзитивность. Предложенный подход использует активное обучение для улучшения качества ранжирования при ограниченном бюджете запросов. Кроме того, введён рандомизированный оракул, который устраняет систематическое смещение позиции в один LLM-запрос на пару элементов.'}, 'en': {'title': 'Enhancing Pairwise Ranking with Active Learning and Noise Robustness', 'desc': 'This paper presents a new approach to Pairwise Ranking Prompting (PRP) by treating it as an active learning problem that deals with noisy comparisons. The authors highlight that traditional sorting methods struggle with the noise and biases present in pairwise judgments, which can lead to unreliable rankings. They propose a framework that uses active rankers to enhance ranking quality while adhering to call constraints, improving the Normalized Discounted Cumulative Gain (NDCG) metric. Additionally, a randomized oracle is introduced to mitigate position bias, allowing for more accurate rankings without requiring multiple calls to the language model.'}, 'zh': {'title': '主动学习提升成对排名质量', 'desc': '本文将成对排名提示重新定义为从噪声比较中进行主动学习。通过改进的排名器，在调用限制下提高了排名质量，并通过随机化的oracle解决了位置偏差问题。成对排名提示从大型语言模型中获取成对偏好判断，这些判断通常通过经典排序算法聚合成排名。我们的方法通过主动学习来处理噪声比较，展示了在调用受限的情况下，主动排名器能够有效提高NDCG@10。'}}}, {'id': 'https://huggingface.co/papers/2605.11609', 'title': 'Anti-Self-Distillation for Reasoning RL via Pointwise Mutual Information', 'url': 'https://huggingface.co/papers/2605.11609', 'abstract': 'Abstract Anti-Self-Distillation reverses the direction of knowledge transfer in self-distillation to improve math reasoning efficiency and accuracy.  AI-generated summary On-policy self-distillation, where a student is pulled toward a copy of itself conditioned on privileged context (e.g., a verified solution or feedback), offers a promising direction for advancing reasoning capability without a stronger external teacher. Yet in math reasoning the gains are inconsistent, even when the same approach succeeds elsewhere. A pointwise mutual information analysis traces the failure to the privileged context itself: it inflates the teacher\'s confidence on tokens already implied by the solution (structural connectives, verifiable claims) and deflates it on deliberation tokens ("Wait", "Let", "Maybe") that drive multi-step search. We propose Anti-Self-Distillation (AntiSD), which ascends a divergence between student and teacher rather than descending it: this reverses the per-token sign and yields a naturally bounded advantage in one step. An entropy-triggered gate disables the term once the teacher entropy collapses, completing a drop-in replacement for default self-distillation. Across five models from 4B to 30B parameters on math reasoning benchmarks, AntiSD reaches the GRPO baseline\'s accuracy in 2 to 10x fewer training steps and improves final accuracy by up to 11.5 points. AntiSD opens a path to scalable self-improvement, where a language model bootstraps its own reasoning through its training signal.', 'score': 60, 'issue_id': 2271, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '61cbfc7e72234f28', 'authors': ['Guobin Shen', 'Xiang Cheng', 'Chenxiao Zhao', 'Lei Huang', 'Jindong Li', 'Dongcheng Zhao', 'Xing Yu'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.11609.jpg', 'data': {'categories': ['#math', '#reasoning', '#optimization', '#training', '#small_models'], 'emoji': '🔄', 'ru': {'title': 'Переворачивая знания: как научить модель учиться на себе эффективнее', 'desc': "В этой статье авторы предлагают новый подход под названием Anti-Self-Distillation (AntiSD), который переворачивает традиционное направление передачи знаний в self-distillation для улучшения способности моделей решать математические задачи. Анализ взаимной информации показал, что стандартная self-distillation с привилегированным контекстом неправильно распределяет уверенность между токенами: переоценивает вероятность структурных связок и недооценивает важные токены размышления типа 'Wait' и 'Let', которые необходимы для многошагового поиска решения. Вместо минимизации расхождения между студентом и учителем, AntiSD максимизирует его, естественным образом достигая лучшего баланса и добавляя затвор, активируемый энтропией. Экспериментальные результаты демонстрируют, что AntiSD достигает качества базовой модели в 2-10 раз быстрее и улучшает точность финального решения на 11.5 пункта."}, 'en': {'title': 'Reversing Knowledge Transfer for Better Math Reasoning', 'desc': "The paper introduces Anti-Self-Distillation (AntiSD), a novel approach that reverses the traditional self-distillation process to enhance mathematical reasoning in AI models. By utilizing on-policy self-distillation, the method allows a student model to learn from a version of itself that is informed by privileged context, such as verified solutions. The authors identify that previous self-distillation methods struggle due to inflated confidence on certain tokens, which hampers the model's ability to engage in multi-step reasoning. AntiSD effectively addresses this issue by promoting divergence between the student and teacher models, leading to improved accuracy and efficiency in training, achieving significant gains in fewer steps compared to standard methods."}, 'zh': {'title': '反自我蒸馏：提升数学推理的新方法', 'desc': '反自我蒸馏（Anti-Self-Distillation）通过逆转知识转移的方向，提升了数学推理的效率和准确性。该方法利用自我蒸馏中的学生模型，结合特定上下文（如验证过的解决方案或反馈），来增强推理能力。研究发现，传统自我蒸馏在数学推理中效果不佳，主要是因为特权上下文导致教师模型对某些令牌的信心过高，而对多步搜索的关键令牌信心不足。反自我蒸馏通过增加学生与教师之间的差异，优化了模型的训练过程，显著减少了训练步骤并提高了最终准确率。'}}}, {'id': 'https://huggingface.co/papers/2605.19577', 'title': 'GoLongRL: Capability-Oriented Long Context Reinforcement Learning with Multitask Alignment', 'url': 'https://huggingface.co/papers/2605.19577', 'abstract': 'Abstract GoLongRL presents an open-source approach for long-context reinforcement learning with diverse reward optimization through capability-oriented data construction and TMN-Reweight methodology.  AI-generated summary We present GoLongRL, a fully open-source, capability-oriented post-training recipe for long-context reinforcement learning with verifiable rewards (RLVR). Existing long-context RL methods often treat data construction as a matter of designing increasingly complex retrieval paths, leading to homogeneous task coverage and reward formulations that inadequately reflect practical long-context requirements. Our work offers two contributions. (1) Capability-oriented data construction with full open release. We openly release a dataset of 23K RLVR samples, the complete construction pipeline, and all training code. Guided by a taxonomy of long-context capabilities, the dataset spans 9 task types, each paired with its natural evaluation metric. It comprises curated open-source samples from established corpora and synthetic samples whose QA pairs are generated from real source documents such as books, academic papers, and multi-turn dialogues. Under the same vanilla GRPO setup, our dataset alone outperforms the closed-source QwenLong-L1.5 dataset. Moreover, our Qwen3-30B-A3B model trained on this data delivers long-context performance comparable to DeepSeek-R1-0528 and Qwen3-235B-A22B-Thinking-2507, suggesting that broader coverage and greater reward diversity substantially benefit long-context capability improvement. (2) TMN-Reweight for heterogeneous multitask optimization. To address optimization challenges from heterogeneous rewards, we propose TMN-Reweight, which combines task-level mean normalization for cross-task reward scale alignment with difficulty-adaptive weighting for more reliable advantage estimation. TMN-Reweight further improves average performance over vanilla GRPO, with general capabilities preserved or improved across reported evaluations.', 'score': 51, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'bb45a96b0c42bae4', 'authors': ['Minxuan Lv', 'Tiehua Mei', 'Tanlong Du', 'Junmin Chen', 'Zhenpeng Su', 'Ziyang Chen', 'Ziqi Wang', 'Zhennan Wu', 'Ruotong Pan', 'jian Liang', 'Ruiming Tang', 'Han Li'], 'affiliations': ['Kuaishou Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.19577.jpg', 'data': {'categories': ['#open_source', '#optimization', '#rl', '#dataset', '#long_context', '#synthetic', '#training'], 'emoji': '📚', 'ru': {'title': 'Многообразие вознаграждений и способности модели для обучения с подкреплением на длинных контекстах', 'desc': 'В статье представлен GoLongRL — открытый подход для обучения с подкреплением на длинных контекстах, который решает проблему однородного покрытия задач путём создания разнообразного набора данных, организованного по таксономии способностей модели. Авторы выпустили датасет из 23K примеров с проверяемыми вознаграждениями, охватывающий 9 типов задач с соответствующими метриками оценки, включая курируемые и синтетические примеры из книг и научных статей. Для оптимизации при наличии неоднородных функций вознаграждения предложена методика TMN-Reweight, которая объединяет нормализацию на уровне задач с адаптивной взвешиванию по сложности для более надёжной оценки преимуществ. Модель Qwen3-30B-A3B, обученная на этих данных, достигла производительности, сравнимой с намного большими моделями, что демонстрирует эффективность разнообразия вознаграждений и широкого покрытия задач.'}, 'en': {'title': 'Enhancing Long-Context RL with Open Data and Diverse Rewards', 'desc': "GoLongRL introduces a new method for long-context reinforcement learning that focuses on optimizing diverse rewards through a structured data construction approach. It provides an open-source dataset of 23,000 samples designed to enhance the training of models by covering a wide range of tasks and evaluation metrics. The paper also presents TMN-Reweight, a technique that helps balance rewards from different tasks, improving the model's performance and reliability. Overall, GoLongRL aims to advance long-context capabilities in reinforcement learning by offering better data and optimization strategies."}, 'zh': {'title': '长上下文强化学习的新突破', 'desc': 'GoLongRL 是一种开源的长上下文强化学习方法，旨在通过能力导向的数据构建和 TMN-Reweight 方法实现多样化的奖励优化。该方法提供了一个包含 23,000 个 RLVR 样本的数据集，涵盖了 9 种任务类型，并配有自然评估指标。通过能力导向的数据构建，GoLongRL 的数据集在同样的设置下超越了闭源的数据集 QwenLong-L1.5。TMN-Reweight 方法则通过任务级均值归一化和适应性加权，解决了异构奖励的优化挑战，进一步提升了模型的平均性能。'}}}, {'id': 'https://huggingface.co/papers/2605.19769', 'title': 'OpenComputer: Verifiable Software Worlds for Computer-Use Agents', 'url': 'https://huggingface.co/papers/2605.19769', 'abstract': "Abstract OpenComputer presents a framework for creating verifiable software environments for computer-use agents through integrated state verification, self-improving layers, task synthesis, and evaluation systems across multiple desktop applications.  AI-generated summary We present OpenComputer, a verifier-grounded framework for constructing verifiable software worlds for computer-use agents. OpenComputer integrates four components: (1) app-specific state verifiers that expose structured inspection endpoints over real applications, (2) a self-evolving verification layer that improves verifier reliability using execution-grounded feedback, (3) a task-generation pipeline that synthesizes realistic and machine-checkable desktop tasks, and (4) an evaluation harness that records full trajectories and computes auditable partial-credit rewards. In its current form, OpenComputer covers 33 desktop applications and 1,000 finalized tasks spanning browsers, office tools, creative software, development environments, file managers, and communication applications. Experiments show that OpenComputer's hard-coded verifiers align more closely with human adjudication than LLM-as-judge evaluation, especially when success depends on fine-grained application state. Frontier agents struggle with end-to-end completion despite partial progress, and open-source models exhibit sharp drops from their OSWorld-Verified scores, exposing a persistent gap in robust computer automation.", 'score': 50, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '1ae9baeb25dc83bb', 'authors': ['Jinbiao Wei', 'Qianran Ma', 'Yilun Zhao', 'Xiao Zhou', 'Kangqi Ni', 'Guo Gan', 'Arman Cohan'], 'affiliations': ['University of North Carolina at Chapel Hill', 'University of Pennsylvania', 'Yale NLP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.19769.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🖥️', 'ru': {'title': 'Верифицируемые цифровые миры для агентов компьютерной автоматизации', 'desc': 'OpenComputer — это фреймворк для создания проверяемых программных сред, в которых агенты могут взаимодействовать с реальными приложениями. Система интегрирует четыре компонента: верификаторы состояния приложений, самообучающийся слой верификации на основе обратной связи, генератор синтетических задач и систему оценки с полным логированием траекторий. Фреймворк покрывает 33 десктопных приложения и 1000 задач, демонстрируя, что жёсткие верификаторы лучше согласуются с человеческой оценкой, чем использование LLM в качестве судьи. Результаты показывают значительный разрыв между возможностями фронтирных агентов и требуемой надёжностью для полной автоматизации компьютерных задач.'}, 'en': {'title': 'Building Trustworthy Software Worlds for AI Agents', 'desc': 'OpenComputer is a framework designed to create verifiable software environments for computer agents. It includes four main components: app-specific state verifiers for inspecting applications, a self-improving verification layer that enhances reliability, a task synthesis pipeline for generating realistic tasks, and an evaluation system that tracks performance and rewards. The framework currently supports 33 desktop applications and 1,000 tasks, demonstrating better alignment with human judgment compared to traditional evaluation methods. However, challenges remain for agents in completing tasks fully, highlighting the need for improved automation in complex environments.'}, 'zh': {'title': '构建可验证的软件环境，提升计算机代理的智能', 'desc': 'OpenComputer是一个框架，用于为计算机使用代理创建可验证的软件环境。它集成了四个主要组件，包括应用特定的状态验证器、自我演进的验证层、任务生成管道和评估系统。该框架支持33个桌面应用程序和1000个任务，能够生成真实且可机器检查的桌面任务。实验表明，OpenComputer的验证器在与人类裁决的一致性上优于大型语言模型的评估，尤其是在成功依赖于细粒度应用状态时。'}}}, {'id': 'https://huggingface.co/papers/2605.20025', 'title': 'AutoResearchClaw: Self-Reinforcing Autonomous Research with Human-AI Collaboration', 'url': 'https://huggingface.co/papers/2605.20025', 'abstract': 'Abstract AutoResearchClaw is a multi-agent autonomous research system that improves scientific discovery through structured debate, self-healing execution, verifiable reporting, human collaboration, and evolutionary learning, outperforming previous systems on a benchmark while maintaining human oversight.  AI-generated summary Automating scientific discovery requires more than generating papers from ideas. Real research is iterative: hypotheses are challenged from multiple perspectives, experiments fail and inform the next attempt, and lessons accumulate across cycles. Existing autonomous research systems often model this process as a linear pipeline: they rely on single-agent reasoning, stop when execution fails, and do not carry experience across runs. We present AutoResearchClaw, a multi-agent autonomous research pipeline built on five mechanisms: structured multi-agent debate for hypothesis generation and result analysis, a self-healing executor with a Pivot/Refine decision loop that transforms failures into information, verifiable result reporting that prevents fabricated numbers and hallucinated citations, human-in-the-loop collaboration with seven intervention modes spanning full autonomy to step-by-step oversight, and cross-run evolution that converts past mistakes into future safeguards. On ARC-Bench, a 25-topic experiment-stage benchmark, AutoResearchClaw outperforms AI Scientist v2 by 54.7%. A human-in-the-loop ablation across seven intervention modes reveals that precise, targeted collaboration at high-leverage decision points consistently outperforms both full autonomy and exhaustive step-by-step oversight. We position AutoResearchClaw as a research amplifier that augments rather than replaces human scientific judgment. Code is available at https://github.com/aiming-lab/AutoResearchClaw.', 'score': 50, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '0ae2841ab47a50d7', 'authors': ['Jiaqi Liu', 'Shi Qiu', 'Mairui Li', 'Bingzhou Li', 'Haonian Ji', 'Siwei Han', 'Xinyu Ye', 'Peng Xia', 'Zihan Dong', 'Congyu Zhang', 'Letian Zhang', 'Guiming Chen', 'Haoqin Tu', 'Xinyu Yang', 'Lu Feng', 'Xujiang Zhao', 'Haifeng Chen', 'Jiawei Zhou', 'Xiao Wang', 'Weitong Zhang', 'Hongtu Zhu', 'Yun Li', 'Jieru Mei', 'Hongliang Fei', 'Jiaheng Zhang', 'Linjie Li', 'Linjun Zhang', 'Yuyin Zhou', 'Sheng Wang', 'Caiming Xiong', 'James Zou', 'Zeyu Zheng', 'Cihang Xie', 'Mingyu Ding', 'Huaxiu Yao'], 'affiliations': ['Carnegie Mellon University', 'Google', 'Meta', 'NEC Labs America', 'NUS', 'Recrusive.com', 'Rutgers University', 'Stanford University', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.20025.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#science', '#alignment', '#agents', '#hallucinations'], 'emoji': '🔬', 'ru': {'title': 'Многоагентная дебата вместо конвейера: как научить AI делать науку итеративно', 'desc': 'AutoResearchClaw — это многоагентная система для автоматизации научных исследований, которая моделирует итеративный процесс реальной науки через структурированные дебаты между агентами, самовосстанавливающийся исполнитель, преобразующий ошибки в информацию, и верифицируемую отчётность без галлюцинаций. Система включает механизмы сотрудничества с человеком в семи режимах и эволюционное обучение, которое переносит опыт между запусками, позволяя накапливать знания из прошлых ошибок. На бенчмарке ARC-Bench AutoResearchClaw превзошла предыдущие подходы на 54.7%, демонстрируя эффективность целенаправленного взаимодействия человека в критических точках принятия решений. Система позиционируется как усилитель человеческого научного суждения, а не его замена.'}, 'en': {'title': 'Empowering Science with Multi-Agent Collaboration', 'desc': 'AutoResearchClaw is an advanced multi-agent system designed to enhance scientific discovery through collaborative debate and iterative learning. It incorporates mechanisms like self-healing execution to learn from failures and structured reporting to ensure accuracy in results. Unlike traditional systems that follow a linear approach, AutoResearchClaw allows for human collaboration and adapts based on past experiences to improve future research outcomes. This system has demonstrated significant performance improvements over previous models, showcasing its potential as a powerful tool for researchers.'}, 'zh': {'title': '增强科学发现的智能体系统', 'desc': 'AutoResearchClaw 是一个多智能体自主研究系统，通过结构化辩论、自我修复执行、可验证报告、人类协作和进化学习来提升科学发现。与以往的系统相比，它在基准测试中表现更佳，同时保持人类的监督。该系统采用五种机制，包括多智能体辩论生成假设、自我修复执行器、可验证结果报告以及人机协作。AutoResearchClaw 被视为一种研究放大器，增强而非取代人类的科学判断。'}}}, {'id': 'https://huggingface.co/papers/2605.15529', 'title': 'Process Rewards with Learned Reliability', 'url': 'https://huggingface.co/papers/2605.15529', 'abstract': 'Abstract BetaPRM introduces a distributional approach to process reward models that predicts both success probabilities and prediction reliability, enabling adaptive computation allocation that reduces token usage while maintaining accuracy.  AI-generated summary Process Reward Models (PRMs) provide step-level feedback for reasoning, but current PRMs usually output only a single reward score for each step. Downstream methods must therefore treat imperfect step-level reward predictions as reliable decision signals, with no indication of when these predictions should be trusted. We propose BetaPRM, a distributional PRM that predicts both a step-level success probability and the reliability of that prediction. Given step-success supervision from Monte Carlo continuations, BetaPRM learns a Beta belief that explains the observed number of successful continuations through a Beta-Binomial likelihood, rather than regressing to the finite-sample success ratio as a point target. This learned reliability signal indicates when a step reward should be trusted, enabling downstream applications to distinguish reliable rewards from uncertain ones. As one application, we introduce Adaptive Computation Allocation (ACA) for PRM-guided Best-of-N reasoning. ACA uses the learned reliability signal to stop when a high-reward solution is reliable and to spend additional computation on uncertain candidate prefixes. Experiments across four backbones and four reasoning benchmarks show that BetaPRM improves PRM-guided Best-of-N selection while preserving standard step-level error detection. Built on this signal, ACA improves the accuracy--token tradeoff over fixed-budget Best-of-16, reducing token usage by up to 33.57% while improving final-answer accuracy.', 'score': 43, 'issue_id': 2271, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'ff7a2e1f721598eb', 'authors': ['Jinyuan Li', 'Langlin Huang', 'Chengsong Huang', 'Shaoyang Xu', 'Donghong Cai', 'Yuyi Yang', 'Wenxuan Zhang', 'Jiaxin Huang'], 'affiliations': ['Singapore University of Technology and Design', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2605.15529.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Надёжное распределение вычислений через вероятностные модели вознаграждения', 'desc': 'BetaPRM представляет собой распределительный подход к моделям вознаграждения процесса, который предсказывает не только вероятность успеха каждого шага, но и надёжность этого предсказания. Модель использует Beta-Binomial правдоподобие для обучения на результатах Монте-Карло продолжений, что позволяет определить, когда предсказаниям можно доверять. На основе этого сигнала надёжности авторы предлагают адаптивное распределение вычислений (ACA), которое динамически выбирает, когда остановиться при нахождении надёжного решения, а когда потратить больше ресурсов на неопределённые варианты. Экспериментальные результаты показывают, что BetaPRM сокращает потребление токенов до 33.57% при сохранении или улучшении точности на различных бенчмарках рассуждений.'}, 'en': {'title': 'BetaPRM: Trustworthy Rewards for Smarter Computation', 'desc': 'BetaPRM is a novel approach to Process Reward Models (PRMs) that enhances the prediction of success probabilities and the reliability of those predictions. Unlike traditional PRMs that provide a single reward score, BetaPRM outputs a distribution that indicates both the likelihood of success and the trustworthiness of that likelihood. This dual output allows downstream methods to make more informed decisions by distinguishing between reliable and uncertain reward signals. Additionally, the Adaptive Computation Allocation (ACA) method leverages this reliability information to optimize computation resources, leading to significant reductions in token usage while maintaining or improving accuracy in reasoning tasks.'}, 'zh': {'title': 'BetaPRM：提升奖励模型的可靠性与效率', 'desc': 'BetaPRM是一种新的奖励模型，采用分布式方法来预测成功概率和预测的可靠性。这种模型能够在保持准确性的同时，减少计算资源的使用。通过学习Beta信念，BetaPRM能够更好地判断每一步奖励的可信度，从而帮助下游应用区分可靠和不可靠的奖励信号。实验结果表明，BetaPRM在多个基准测试中表现优越，显著提高了决策的准确性，同时减少了计算成本。'}}}, {'id': 'https://huggingface.co/papers/2605.18703', 'title': 'EnvFactory: Scaling Tool-Use Agents via Executable Environments Synthesis and Robust RL', 'url': 'https://huggingface.co/papers/2605.18703', 'abstract': 'Abstract EnvFactory automates the creation of executable tool environments and natural multi-turn trajectories for training LLMs with agentic reinforcement learning, achieving superior performance with fewer resources.  AI-generated summary Equipping LLMs with tool-use capabilities via Agentic Reinforcement Learning (Agentic RL) is bottlenecked by two challenges: the lack of scalable, robust execution environments and the scarcity of realistic training data that captures implicit human reasoning. Existing approaches depend on costly real-world APIs, hallucination-prone LLM simulators, or synthetic environments that are often single-turn or depend on pre-collected documents. Moreover, synthetic trajectories are frequently over-specified, resembling instruction sequences rather than natural human intents, reducing their effectiveness for RL training. We introduce EnvFactory, a fully automated framework that addresses both challenges. EnvFactory autonomously explores and verifies stateful, executable tool environments from authentic resources, and synthesizes natural multi-turn trajectories through topology-aware sampling and calibrated refinement, producing grounded queries with implicit intents. Using only 85 verified environments across 7 domains, EnvFactory generates 2,575 SFT and RL trajectories. Despite using significantly fewer environments than prior work, which are often 5 times more, EnvFactory achieves superior training efficiency and downstream performance, improving Qwen3-series models by up to +15% on BFCLv3, +8.6% on MCP-Atlas, and +6% on conversational benchmarks including τ^2-Bench and VitaBench. By fully automating both environment construction and trajectory synthesis, EnvFactory provides a scalable, extensible, and robust foundation for Agentic RL.', 'score': 37, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '12196f0eb222dcb0', 'authors': ['Minrui Xu', 'Zilin Wang', 'Mengyi DENG', 'Zhiwei Li', 'Zhicheng Yang', 'Xiao Zhu', 'Yinhong Liu', 'Boyu Zhu', 'Baiyu Huang', 'Chao Chen', 'Heyuan Deng', 'Fei Mi', 'Lifeng Shang', 'Xingshan Zeng', 'Zhijiang Guo'], 'affiliations': ['HKUST', 'Huawei Technologies Co., Ltd', 'LARK, HKUST (GZ)', 'UCL', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2605.18703.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#rl', '#synthetic', '#dataset', '#data', '#agents', '#training'], 'emoji': '🏭', 'ru': {'title': 'Автоматизация создания окружений и данных для агентного обучения LLM', 'desc': 'EnvFactory — это автоматизированная система для создания инструментальных окружений и синтетических траекторий обучения больших языковых моделей с помощью агентного обучения с подкреплением. Система решает две ключевые проблемы: отсутствие масштабируемых исполняемых сред и нехватку реалистичных данных обучения, которые отражают неявное человеческое рассуждение. EnvFactory автоматически исследует реальные инструментальные окружения, проверяет их корректность и генерирует естественные многошаговые траектории через топологически-осведомленный сэмплинг. Несмотря на использование в 5 раз меньше окружений чем конкурирующие подходы, система значительно улучшает эффективность обучения и показывает прирост производительности моделей до 15% на различных бенчмарках.'}, 'en': {'title': 'Automating Training Environments for Enhanced LLM Performance', 'desc': 'EnvFactory is a novel framework designed to automate the creation of executable environments and realistic training trajectories for large language models (LLMs) using agentic reinforcement learning (RL). It addresses two major challenges: the need for scalable execution environments and the generation of natural, multi-turn training data that reflects human reasoning. By exploring and verifying environments autonomously, EnvFactory produces grounded queries that capture implicit intents, enhancing the training process. The framework demonstrates significant efficiency improvements, achieving better performance with fewer resources compared to existing methods.'}, 'zh': {'title': 'EnvFactory：自动化强化学习环境与轨迹生成的未来', 'desc': 'EnvFactory 是一个自动化框架，旨在为训练大型语言模型（LLMs）提供可执行的工具环境和自然的多轮轨迹。它解决了现有方法中缺乏可扩展和稳健的执行环境以及真实训练数据稀缺的挑战。通过自主探索和验证状态可执行的工具环境，EnvFactory 能够生成更自然的多轮轨迹，从而提高强化学习的效率。使用较少的环境，EnvFactory 仍然实现了显著的训练效率和下游性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.19995', 'title': 'CogOmniControl: Reasoning-Driven Controllable Video Generation via Creative Intent Cognition', 'url': 'https://huggingface.co/papers/2605.19995', 'abstract': 'Abstract Diffusion models applied in compressed image space generate high-quality images with lower computational cost and support flexible inputs like text or boxes.  AI-generated summary Recent diffusion models achieve strong photorealism and fluency in video generation, yet remain fragile under abstract, sparse or complex conditions, leading to poor performance in professional production workflows such as storyboard sketches and clay render conditions. Existing video generation models, either inject conditions through adapters or couple a generic vision-language model (VLM) within a diffusion backbone, leaving a capability gap and failing to produce the videos that align with the user\'s creative intent. We present CogOmniControl, a reasoning-driven framework that factorizes controllable video generation into creative intent cognition and generation. Specifically, we train a specialized CogVLM using authentic anime production data. Compared to generic VLMs, it generates more professional and clear outputs, accurately cognizing user creative intent from sparse and abstract conditions and tuning these cues into dense reasoning output. Besides, CogOmniDiT unifies the controls from various conditions through in-context generation and is aligned to the CogVLM reasoning outputs via reinforcement learning. Furthermore, leveraging CogVLM\'s robust capability in guiding video generation, we release its potential in planning specific evaluators and enable a Best-of-N selection for the generated videos. This integration transforms the entire framework into a closed-loop "harness-like" architecture. We further introduce CogReasonBench and CogControlBench, built from professional workflows data that carry genuine creative intent rather than simulated ones. Experiments on two benchmarks show that CogOmniControl surpassed the existing open-source models. The project website: https://um-lab.github.io/CogOmniControl/', 'score': 31, 'issue_id': 2272, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '1443e9776246cd38', 'authors': ['Hongji Yang', 'Songlian Li', 'Yucheng Zhou', 'Xiaotong Zhao', 'Alan Zhao', 'Chengzhong Xu', 'Jianbing Shen'], 'affiliations': ['Online-Video BU, Tencent', 'SKL-IOTSC, CIS, University of Macau'], 'pdf_title_img': 'assets/pdf/title_img/2605.19995.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#story_generation', '#architecture', '#benchmark', '#alignment', '#video', '#dataset', '#rlhf', '#diffusion', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Творческий контроль видео через рассуждающие модели', 'desc': 'Статья представляет CogOmniControl — фреймворк для управляемой генерации видео на основе диффузионных моделей. Авторы обучили специализированную видение-языковую модель (VLM) на аутентичных данных из производства анимации, которая способна понимать творческие намерения пользователя из разреженных и абстрактных условий. Система использует диффузионный трансформер (CogOmniDiT) для унификации управляющих сигналов через внутриконтекстную генерацию и обучение с подкреплением. Фреймворк реализует замкнутую архитектуру с оценками качества и выбором лучших вариантов, показывая превосходные результаты на профессиональных бенчмарках.'}, 'en': {'title': 'Harnessing Creative Intent for Superior Video Generation', 'desc': 'This paper introduces CogOmniControl, a new framework for generating videos that aligns closely with user creative intent. It utilizes a specialized vision-language model (CogVLM) trained on authentic anime production data to improve the quality and clarity of outputs, especially in complex scenarios. The framework incorporates a reasoning-driven approach that factors in user intent and generates videos accordingly, overcoming limitations of existing models. Additionally, it employs reinforcement learning to unify control mechanisms and enhance the overall video generation process, demonstrating superior performance in professional workflows.'}, 'zh': {'title': '智能视频生成的新突破', 'desc': '本论文提出了一种名为CogOmniControl的框架，用于控制视频生成，旨在提高生成视频的专业性和清晰度。该框架通过认知用户的创意意图，将视频生成过程分解为创意意图认知和生成两个部分。与传统的视觉语言模型相比，CogVLM能够更好地理解稀疏和抽象条件下的用户意图，并将其转化为密集的推理输出。此外，CogOmniDiT通过上下文生成统一了各种条件的控制，利用强化学习与CogVLM的推理输出对齐，从而提升了视频生成的质量。'}}}, {'id': 'https://huggingface.co/papers/2605.17734', 'title': 'Harnessing LLM Agents with Skill Programs', 'url': 'https://huggingface.co/papers/2605.17734', 'abstract': 'Abstract HASP introduces executable program functions that serve as active guardrails for LLM agents, enabling direct intervention in agent loops and improving performance across complex tasks.  AI-generated summary Equipping LLM agents with reusable skills derived from past experience has become a popular and successful approach for tackling complex and long-horizon tasks. However, such lessons are often encoded as textual guidance that remains largely advisory, lacking explicit mechanisms for when and how to intervene in the agent loop. To bridge the gap, we introduce HASP(Harnessing LLM Agents with Skill Programs), a new framework that upgrades skills into executable Program Functions (PFs). Rather than offering passive advice, PFs act as executable guardrails that activate on failure-prone states and modify the next action or inject corrective context. HASP is highly modular: it can be applied at inference time for direct agent-loop intervention, during post-training to provide structured supervision, or for self-improvement by evolving validated, teacher-reviewed PFs. Empirically, HASP drives substantial gains compared to both training-free and training-based methods on web-search, math reasoning, and coding tasks. For example, on web-search reasoning, inference-time PFs alone improve the average performance by 25% compared to (multi-loop) ReAct Agent, while post-training and controlled evolution achieve a 30.4% gain over Search-R1. To provide deeper insights into HASP, our mechanism analysis reveals how PFs trigger and intervene, how skills are internalized, and the requirement for stable skill library evolution.', 'score': 21, 'issue_id': 2275, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '28cafe7b7a44ffe2', 'authors': ['Hongjun Liu', 'Yifei Ming', 'Shafiq Joty', 'Chen Zhao'], 'affiliations': ['New York University', 'Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.17734.jpg', 'data': {'categories': ['#agents', '#training', '#plp'], 'emoji': '🛡️', 'ru': {'title': 'Активные защиты для агентов: от советов к исполняемому коду', 'desc': 'HASP — это фреймворк, который превращает текстовые навыки агентов на базе больших языковых моделей в исполняемые программные функции, выступающие в роли активных защитных механизмов. Вместо пассивных советов эти функции автоматически активируются в состояниях, предрасположенных к ошибкам, и корректируют действия агента или вводят контекстную поправку. Фреймворк поддерживает применение на этапе инференса, при постобучении для структурированного контроля обучения и при самосовершенствовании путём эволюции проверенных навыков. На практике HASP демонстрирует значительные улучшения производительности на задачах веб-поиска, математического рассуждения и программирования, превосходя как методы без обучения, так и основанные на обучении подходы.'}, 'en': {'title': 'Empowering LLM Agents with Active Guardrails for Enhanced Performance', 'desc': "HASP introduces a new framework that enhances large language model (LLM) agents by transforming skills into executable Program Functions (PFs). These PFs serve as active guardrails, allowing for direct intervention in the agent's decision-making process, especially in complex tasks where failures are likely. Unlike traditional methods that provide passive advice, HASP enables the agent to modify its actions or add corrective context in real-time. Empirical results show that HASP significantly improves performance in various tasks, demonstrating its effectiveness in both inference and post-training scenarios."}, 'zh': {'title': 'HASP：为LLM代理提供主动保护的创新框架', 'desc': 'HASP（Harnessing LLM Agents with Skill Programs）是一种新框架，旨在通过可执行的程序功能为大型语言模型（LLM）代理提供主动的保护机制。与传统的文本指导不同，HASP的程序功能在代理遇到失败状态时能够直接介入，调整下一步行动或注入纠正的上下文。该框架具有高度模块化的特点，可以在推理时直接干预代理循环，或在后期训练中提供结构化监督。实验证明，HASP在网络搜索、数学推理和编码任务上显著提升了性能，尤其是在网络搜索推理中，推理时的程序功能使平均性能提高了25%。'}}}, {'id': 'https://huggingface.co/papers/2605.18984', 'title': 'Artifact-Bench: Evaluating MLLMs on Detecting and Assessing the Artifacts of AI-Generated Videos', 'url': 'https://huggingface.co/papers/2605.18984', 'abstract': "Abstract Artifact-Bench evaluates multimodal large language models' capability to detect and analyze artifacts in AI-generated videos, revealing significant limitations in artifact perception and reasoning.  AI-generated summary Recent video generative models have greatly improved the realism of AI-generated videos, yet their outputs still exhibit artifacts such as temporal inconsistencies, structural distortions, and semantic incoherence. While Multimodal Large Language Models (MLLMs) show strong visual understanding capabilities, their ability to perceive and reason about such artifacts remains unclear. Existing benchmarks often lack systematic evaluation of artifact-aware perception and fine-grained diagnostic reasoning, especially across diverse AI-generated video domains beyond photorealistic content. To address this gap, we introduce Artifact-Bench, a comprehensive benchmark for evaluating MLLMs on AI-generated video artifact detection and analysis. We first establish a three-level hierarchical taxonomy of realism artifacts, covering photorealistic, animated, and CG-style videos. Based on this taxonomy, Artifact-Bench defines three complementary tasks: real vs. AI-generated video classification, pairwise realism comparison, and fine-grained artifact identification. Experiments on 19 leading MLLMs reveal substantial limitations in artifact perception and reasoning, with many models approaching random or even below-random performance in challenging settings. We further observe significant misalignment between MLLM judgments and human perceptual preferences, highlighting their limited reliability as general evaluators for AI-generated video realism.", 'score': 21, 'issue_id': 2271, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '39cab4d304411d44', 'authors': ['Yuqi Tang', 'Yang Shi', 'Zhuoran Zhang', 'Qixun Wang', 'Xuehai Bai', 'Yue Ding', 'Ruizhe Chen', 'Bohan Zeng', 'Xinlong Chen', 'Xuanyu Zhu', 'Bozhou Li', 'Yuran Wang', 'Yifan Dai', 'Chengzhuo Tong', 'Xinyu Liu', 'Yiyan Ji', 'Yujie Wei', 'Yuhao Dong', 'Shilin Yan', 'Fengxiang Wang', 'Yi-Fan Zhang', 'Haotian Wang', 'Yuanxing Zhang', 'Pengfei Wan'], 'affiliations': ['CASIA', 'FDU', 'HDU', 'HKUST', 'HKUST(GZ)', 'Kling Team', 'NJU', 'NTU', 'PKU', 'SJTU', 'Shanghai AI Lab', 'THU', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2605.18984.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Мультимодальные модели не могут надёжно обнаруживать артефакты в видео, созданном ИИ', 'desc': 'В работе представлен набор данных Artifact-Bench для оценки способности мультимодальных больших языковых моделей (MLLM) обнаруживать и анализировать артефакты в видео, созданных с помощью искусственного интеллекта. Авторы создали трёхуровневую таксономию артефактов реалистичности, включающую фотореалистичные, анимационные и CG-видео, и определили три дополнительные задачи: классификацию видео, попарное сравнение реалистичности и детальную идентификацию артефактов. Экспериментальные результаты на 19 ведущих MLLM показали серьёзные ограничения в восприятии артефактов, причём многие модели демонстрировали производительность на уровне случайного выбора или даже ниже. Исследование выявило значительное несоответствие между оценками MLLM и предпочтениями человека, что подчёркивает ненадёжность этих моделей как универсальных оценивателей реалистичности AI-видео.'}, 'en': {'title': "Evaluating AI's Eye: Unveiling Limitations in Video Artifact Detection", 'desc': 'The paper introduces Artifact-Bench, a benchmark designed to evaluate the ability of multimodal large language models (MLLMs) to detect and analyze artifacts in AI-generated videos. Despite advancements in video generation, these models struggle with recognizing issues like temporal inconsistencies and structural distortions. The study reveals that many MLLMs perform poorly in artifact perception and reasoning, often yielding results close to random guessing. Additionally, there is a notable disconnect between MLLM assessments and human preferences, indicating that these models may not be reliable for evaluating video realism.'}, 'zh': {'title': '评估AI生成视频伪影的能力', 'desc': '本文介绍了Artifact-Bench，这是一个评估多模态大型语言模型（MLLMs）在检测和分析AI生成视频中的伪影能力的基准。尽管最新的视频生成模型在生成真实感视频方面取得了显著进展，但其输出仍然存在时间不一致、结构扭曲和语义不连贯等伪影问题。研究表明，MLLMs在感知和推理这些伪影方面存在显著局限，许多模型在复杂场景中的表现接近随机水平。通过建立伪影的分层分类法，Artifact-Bench定义了三个互补任务，以系统地评估MLLMs的伪影感知能力。'}}}, {'id': 'https://huggingface.co/papers/2605.18748', 'title': 'Aurora: Unified Video Editing with a Tool-Using Agent', 'url': 'https://huggingface.co/papers/2605.18748', 'abstract': "Abstract Aurora is an agentic video editing framework that combines a vision-language model agent with a diffusion transformer to handle textual and visual underspecification in video editing requests.  AI-generated summary Recent video editing models have converged on a unified conditioning design: a single diffusion transformer jointly consumes text, source video, and reference images, and one set of weights covers replacement, removal, style transfer, and reference-driven insertion. The design is flexible, but it assumes that the user already provides model-ready text, reference images, and spatial grounding for local edits, which real requests often omit. We present Aurora, an agentic video editing framework that pairs a tool-augmented vision-language model (VLM) agent with a unified video diffusion transformer. The VLM agent maps a raw user request to a structured edit plan aligned with the transformer's conditioning channels, thereby resolving textual and visual underspecification before generation. We train the VLM agent with supervised data for complete edit planning and reference-image selection, together with preference pairs for robust tool use and instruction refinement. We introduce AgentEdit-Bench to evaluate agent-enhanced video editing under textual and visual underspecification. Experiments on AgentEdit-Bench and two existing video editing benchmarks show that Aurora improves over instruction-only baselines and that the VLM agent transfers to compatible frozen video editing models. Project page: https://yeates.github.io/Aurora-Page", 'score': 16, 'issue_id': 2273, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'bbcca963b913d646', 'authors': ['Yongsheng Yu', 'Ziyun Zeng', 'Zhiyuan Xiao', 'Zhenghong Zhou', 'Hang Hua', 'Wei Xiong', 'Jiebo Luo'], 'affiliations': ['MIT-IBM', 'NVIDIA', 'University of Rochester'], 'pdf_title_img': 'assets/pdf/title_img/2605.18748.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#benchmark', '#video', '#dataset', '#agents', '#training', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Агентский диспетчер для видеоредактирования: от нечёткого запроса к точному редактированию', 'desc': 'Aurora — это агентский фреймворк для видеоредактирования, который объединяет агента на основе vision-language модели с диффузионным трансформатором. Система решает проблему неполной спецификации в запросах пользователей, преобразуя необработанные текстовые команды в структурированный план редактирования. VLM-агент обучается на размеченных данных для выбора подходящих изображений-ссылок и определения пространственных параметров редактирования. Экспериментальная оценка показывает, что Aurora значительно превосходит базовые подходы и хорошо передается на другие совместимые модели видеоредактирования.'}, 'en': {'title': 'Transforming Video Editing with Intelligent User Guidance', 'desc': 'Aurora is a video editing framework that integrates a vision-language model (VLM) agent with a diffusion transformer to improve video editing based on user requests. It addresses the common issue of incomplete or unclear user inputs by converting raw requests into structured edit plans that the diffusion transformer can understand. The VLM agent is trained using supervised data to enhance its ability to select reference images and plan edits effectively. Experiments demonstrate that Aurora outperforms traditional instruction-only models, showcasing its capability to handle both textual and visual ambiguities in video editing.'}, 'zh': {'title': 'Aurora：智能视频编辑的新纪元', 'desc': 'Aurora是一个智能视频编辑框架，结合了视觉-语言模型代理和扩散变换器，以处理视频编辑请求中的文本和视觉不确定性。该框架通过将用户的原始请求映射到结构化的编辑计划，解决了用户在提供文本和参考图像时的不足。Aurora的设计灵活，能够进行替换、移除、风格转移和参考驱动的插入等多种编辑操作。实验结果表明，Aurora在处理不完整的文本和视觉信息时，显著优于传统的指令基础模型。'}}}, {'id': 'https://huggingface.co/papers/2605.19436', 'title': 'CEPO: RLVR Self-Distillation using Contrastive Evidence Policy Optimization', 'url': 'https://huggingface.co/papers/2605.19436', 'abstract': 'Abstract Contrastive Evidence Policy Optimization (CEPO) improves reinforcement learning with verifiable rewards by distinguishing decisive reasoning steps from filler tokens through contrastive teaching signals derived from rejected rollouts.  AI-generated summary When a model produces a correct solution under reinforcement learning with verifiable rewards (RLVR), every token receives the same reward signal regardless of whether it was a decisive reasoning step or a grammatical filler. A natural fix is to condition the model on the correct answer as a teacher, identifying tokens it would have generated differently had it known the answer. Prior work shows this either corrupts training by leaking the answer into the gradient, or produces a weak signal that cannot distinguish decisive steps from filler, since both look equally surprising relative to the model\'s baseline. We propose Contrastive Evidence Policy Optimization (CEPO), which asks a sharper question at every token: not just "does the correct answer favor this token?" but "does the correct answer favor it while the wrong answer disfavors it?" A token satisfying both is a genuine reasoning step; one satisfying neither is filler. The wrong-answer teacher is constructed from rejected rollouts already in the training batch, incurring no additional sampling cost. We prove CEPO inherits all structural safety guarantees of the prior state of the art while strictly sharpening credit at decisive tokens, with the improvement vanishing exactly at filler positions. Empirically, CEPO achieves 43.43% and 60.56% average accuracy across five multimodal mathematical reasoning benchmarks at 2B and 4B scale, respectively, versus 41.17% and 57.43% for GRPO under identical training budgets. Distribution-matching self-distillation methods (OPSD, SDPO) fall below the untrained baseline, empirically confirming the information leakage our theory predicts. Our code is available at https://github.com/ahmedheakl/CEPO.', 'score': 12, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'd9f9480d593932af', 'authors': ['Ahmed Heakl', 'Abdelrahman M. Shaker', 'Youssef Mohamed', 'Rania Elbadry', 'Omar Fetouh', 'Fahad Shahbaz Khan', 'Salman Khan'], 'affiliations': ['Australian National University', 'Linköping University', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.19436.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#math', '#open_source', '#multimodal', '#reasoning', '#training', '#small_models', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Контрастивное различение логических шагов от шумовых токенов в обучении с подкреплением', 'desc': 'Работа предлагает Contrastive Evidence Policy Optimization (CEPO) — метод для улучшения обучения с подкреплением на основе проверяемых вознаграждений. Основная идея заключается в различении ключевых шагов рассуждения от фiller-токенов путём использования контрастивных сигналов, полученных из отклонённых траекторий. Вместо того чтобы просто спрашивать, благоприятствует ли правильный ответ текущему токену, метод задаёт более острый вопрос: одновременно ли правильный ответ поддерживает токен, а неправильный — его отвергает. Экспериментальные результаты показывают значительное улучшение на бенчмарках математического рассуждения в мультимодальных задачах по сравнению с базовыми методами.'}, 'en': {'title': 'Sharpening Rewards for Decisive Reasoning in RL', 'desc': 'Contrastive Evidence Policy Optimization (CEPO) enhances reinforcement learning by effectively distinguishing between important reasoning steps and irrelevant filler tokens. It does this by using contrastive teaching signals from rejected rollouts, allowing the model to learn from both correct and incorrect answers. CEPO sharpens the reward signal for tokens that are genuinely contributing to the reasoning process while ensuring that filler tokens do not receive undue credit. This method not only maintains the safety guarantees of previous approaches but also improves accuracy on multimodal mathematical reasoning tasks significantly.'}, 'zh': {'title': '对比证据策略优化：提升强化学习的关键推理能力', 'desc': '对比证据策略优化（CEPO）通过对比教学信号来改进强化学习，能够区分关键推理步骤和无关填充符。传统的强化学习方法在奖励信号上对所有标记一视同仁，导致无法有效识别重要的推理步骤。CEPO提出了一种新方法，通过比较正确答案和错误答案对每个标记的影响，来识别真正的推理步骤。实验结果表明，CEPO在多个数学推理基准测试中表现优异，显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.18758', 'title': 'OmniGUI: Benchmarking GUI Agents in Omni-Modal Smartphone Environments', 'url': 'https://huggingface.co/papers/2605.18758', 'abstract': 'Abstract OmniGUI presents a novel multimodal benchmark for GUI agents that incorporates simultaneous audio, video, and image inputs to better simulate real smartphone interactions.  AI-generated summary Current benchmarks for graphical user interface (GUI) agents predominantly rely on static screenshots. However, real-world smartphone interaction routinely requires agents to process transient audio cues and temporal video dynamics that are tightly coupled with the moment of action. To bridge this gap, we introduce OmniGUI, the first step-level benchmark designed to evaluate GUI agents in omni-modal smartphone environments. OmniGUI provides continuous, interleaved multimodal inputs comprising static images, synchronous audio, and video clips at every action step. The dataset encompasses 709 expert-demonstrated episodes (2,579 action steps) across 29 applications, systematically annotated with objective multimodal dependency levels. Because dedicated omni-modal GUI agent frameworks are currently in their nascent stage, we select foundational omni-modal models capable of natively processing interleaved inputs to serve as agent proxies for our initial baselines. Our empirical evaluation reveals that while current models exhibit competency on visually static tasks, their action prediction performance degrades significantly in environments requiring synchronous temporal and auditory signals. Furthermore, ablation studies isolate specific operational bottlenecks, notably cross-modal interference when processing task-irrelevant environmental noise. The complete dataset, evaluation pipeline, and baseline prompts are provided in the supplementary material. Project page: https://omni-gui.github.io.', 'score': 12, 'issue_id': 2271, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '2b648df4d3c5b660', 'authors': ['Felix Henry', 'Xiaochen Lin', 'Jiangyou Zhu', 'Yangfan', 'Bingqian Zhang', 'Min Chen', 'Shiyu Huang'], 'affiliations': ['XPeng Motors'], 'pdf_title_img': 'assets/pdf/title_img/2605.18758.jpg', 'data': {'categories': ['#benchmark', '#audio', '#video', '#games', '#multimodal', '#dataset', '#agents'], 'emoji': '📱', 'ru': {'title': 'Мультимодальный синтез для понимания действий в интерфейсах смартфонов', 'desc': 'OmniGUI представляет первый бенчмарк для оценки GUI-агентов, который использует одновременно аудио, видео и изображения для более реалистичного моделирования взаимодействия со смартфонами. В отличие от существующих подходов, основанных только на статических скриншотах, этот датасет содержит синхронизированные мультимодальные входные данные на каждом шаге действия агента. Исследование показало, что современные модели хорошо справляются с визуально статичными задачами, но их производительность значительно снижается при необходимости обработки одновременных аудиосигналов и видеоданных. Авторы выявили, что основной проблемой является перекрёстная модальная интерференция, когда релевантные для задачи сигналы смешиваются с фоновым шумом.'}, 'en': {'title': 'Revolutionizing GUI Agents with Omni-Modal Inputs', 'desc': 'OmniGUI introduces a new benchmark for evaluating graphical user interface (GUI) agents by incorporating audio, video, and image inputs to reflect real smartphone interactions. Unlike traditional benchmarks that only use static images, OmniGUI allows agents to process dynamic audio and video cues that are essential for understanding context during actions. The dataset includes 709 expert-demonstrated episodes with detailed annotations on multimodal dependencies, making it a comprehensive resource for training and testing GUI agents. Initial evaluations show that while existing models perform well on static tasks, they struggle with tasks requiring simultaneous audio and video processing, highlighting the need for improved omni-modal capabilities.'}, 'zh': {'title': 'OmniGUI：智能手机多模态交互的新基准', 'desc': 'OmniGUI是一个新颖的多模态基准，旨在评估图形用户界面（GUI）代理在智能手机环境中的表现。与传统的静态截图基准不同，OmniGUI结合了音频、视频和图像输入，以更真实地模拟用户交互。该数据集包含709个专家演示的案例，涵盖29个应用程序，并对每个操作步骤进行了系统的多模态依赖级别标注。我们的研究表明，现有模型在处理静态任务时表现良好，但在需要同步音频和视频信号的环境中，其动作预测性能显著下降。'}}}, {'id': 'https://huggingface.co/papers/2605.20183', 'title': 'MSAVBench: Towards Comprehensive and Reliable Evaluation of Multi-Shot Audio-Video Generation', 'url': 'https://huggingface.co/papers/2605.20183', 'abstract': 'Abstract MSAVBench presents the first comprehensive benchmark and adaptive evaluation framework for multi-shot audio-video generation, addressing limitations in existing benchmarks through diverse task settings and advanced evaluation mechanisms.  AI-generated summary Video generation is rapidly evolving from single-shot synthesis to complex multi-shot audio-video (MSAV) narratives to meet real-world demands. However, evaluating such frontier models remains a fundamental challenge. Existing benchmarks are limited in scope and data diversity, and rely on rigid evaluation pipelines, preventing systematic and reliable assessment of modern MSAV models. To bridge these gaps, we introduce MSAVBench, the first comprehensive benchmark and adaptive hybrid evaluation framework for multi-shot audio-video generation. Our benchmark spans four key dimensions, video, audio, shot, and reference, covering diverse task settings, varying shot counts of up to 15, and challenging non-realistic scenarios. Our evaluation framework improves robustness through an adaptive self-correction mechanism for shot segmentation, instance-wise rubrics for subjective metrics, and tool-grounded evidence extraction for complex judgments. Furthermore, MSAVBench achieves high alignment with human judgments, reaching a Spearman rank correlation of 91.5%. Our systematic evaluation of 19 state-of-the-art closed- and open-source models shows that current systems still struggle with director-level control and fine-grained audio-visual synchronization, while modular or agentic generation pipelines offer a promising path toward narrowing the gap between open- and closed-source models. We will release the benchmark data and evaluation code to facilitate future research.', 'score': 11, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'd9a81c2e2970d327', 'authors': ['Yujie Wei', 'Yujin Han', 'Zhekai Chen', 'Yongming Li', 'Kaixun Jiang', 'Zhihang Liu', 'Quanhao Li', 'Zhiwu Qing', 'Xiang Wang', 'Zhen Xing', 'Ruihang Chu', 'Lingyi Hong', 'Yefei He', 'Junjie Zhou', 'Junqiu Yu', 'Yang Shi', 'Difan Zou', 'Kai Zhu', 'Shiwei Zhang', 'Yingya Zhang', 'Yu Liu', 'Xihui Liu', 'Hongming Shan'], 'affiliations': ['Fudan University', 'Peking University', 'The University of Hong Kong', 'Tongyi Lab, Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20183.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video', '#agents', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Комплексная оценка генерации многосцидневых аудиовидео нарративов', 'desc': 'В статье представлен MSAVBench — первый комплексный бенчмарк и адаптивная система оценки для многосцидневой генерации аудиовидео контента. Авторы разработали универсальный фреймворк с гибридной схемой оценки, включающий самокоррекцию сегментации сцен и извлечение доказательств на основе инструментов для надежной оценки качества. Бенчмарк охватывает четыре ключевых измерения (видео, звук, сцена, референс) и достигает высокой корреляции с человеческими суждениями (Spearman 91.5%). Анализ 19 современных моделей выявил, что генеративные системы испытывают трудности с режиссерским контролем и синхронизацией аудиовизуального контента.'}, 'en': {'title': 'Revolutionizing Multi-Shot Audio-Video Generation Evaluation', 'desc': 'MSAVBench is a new benchmark designed for evaluating multi-shot audio-video generation models, which are becoming increasingly important for creating complex narratives. It addresses the shortcomings of existing benchmarks by providing a diverse range of tasks and advanced evaluation methods. The framework includes an adaptive self-correction mechanism and instance-wise rubrics to enhance the reliability of assessments. By achieving a high correlation with human judgments, MSAVBench aims to improve the evaluation of audio-visual synchronization and control in generative models.'}, 'zh': {'title': '多镜头音视频生成的评估新标准', 'desc': 'MSAVBench是首个全面的多镜头音视频生成基准和自适应评估框架，旨在解决现有基准的局限性。该框架涵盖视频、音频、镜头和参考四个关键维度，支持多达15个镜头的多样化任务设置。通过自适应自我修正机制和实例级评估标准，MSAVBench提高了评估的鲁棒性，并与人类判断高度一致。我们的研究表明，当前系统在导演级控制和精细音视频同步方面仍面临挑战，而模块化生成管道则为缩小开放源和闭源模型之间的差距提供了有希望的路径。'}}}, {'id': 'https://huggingface.co/papers/2605.20147', 'title': 'PixVerve: Advancing Native UHR Image Generation to 100MP with a Large-Scale High-Quality Dataset', 'url': 'https://huggingface.co/papers/2605.20147', 'abstract': 'Abstract A large-scale UHR image-text dataset and evaluation benchmark are introduced to advance ultra-high-resolution text-to-image generation capabilities.  AI-generated summary Text-to-Image (T2I) models have recently seen notable progress around 1K and 2K resolution. With the extreme desire for better visual experience and the rapid development of imaging technology, the demand for Ultra-High-Resolution (UHR) image generation has grown significantly. However, UHR image generation poses great challenges due to the scarcity and complexity of high-resolution content. In this paper, we first introduce PixVerve-95K, a high-quality, open-source UHR T2I dataset curated with a carefully designed data pipeline, which contains 95K images across diverse scenarios (each image has a minimum pixel-count of 100M) and seven-dimensional annotations. Based on our large-scale image-text dataset, we take a pioneering step to extend various T2I foundation models to native 100MP generation with three training schemes. Finally, leveraging both conventional metrics and multimodal large language model-based assessments, our proposed PixVerve-Bench benchmark establishes a comprehensive evaluation protocol for UHR images encompassing visual quality and semantic alignment. Extensive experimental results on our benchmark and the constructive exploration of training strategies collaboratively provide valuable insights for future breakthroughs.', 'score': 8, 'issue_id': 2273, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'f4b73aa9b8a18c08', 'authors': ['Haojun Chen', 'Haoyang He', 'Chengming Xu', 'Qingdong He', 'Junwei Zhu', 'Yabiao Wang', 'Zhucun Xue', 'Xianfang Zeng', 'Zhennan Chen', 'Xiaobin Hu', 'Hao Zhao', 'Yong Liu', 'Jiangning Zhang', 'Dacheng Tao'], 'affiliations': ['Fudan University', 'Nanjing University', 'Nanyang Technological University', 'National University of Singapore', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20147.jpg', 'data': {'categories': ['#benchmark', '#training', '#dataset', '#multimodal'], 'emoji': '🖼️', 'ru': {'title': 'От тысячи пикселей к сотне мегапиксель: датасет и методы для генерации ультравысокого разрешения', 'desc': 'Работа представляет PixVerve-95K — крупномасштабный датасет пар изображение-текст для генерации изображений с ультравысоким разрешением (более 100 мегапиксель). Авторы предлагают три различные схемы обучения для адаптации существующих моделей генерации изображений из текста к работе с разрешением 100 мегапиксель. Разработан комплексный бенчмарк PixVerve-Bench, использующий как традиционные метрики качества, так и оценку на основе многомодальных LLM для проверки визуального качества и семантического соответствия. Исследование предоставляет ценные рекомендации по обучению моделей для генерации изображений с экстремально высоким разрешением.'}, 'en': {'title': 'Advancing Ultra-High-Resolution Text-to-Image Generation', 'desc': 'This paper presents a new dataset and evaluation benchmark aimed at improving ultra-high-resolution (UHR) text-to-image (T2I) generation. The dataset, called PixVerve-95K, includes 95,000 images with a minimum resolution of 100 million pixels, along with detailed annotations. The authors propose innovative training methods to adapt existing T2I models for generating images at this high resolution. Additionally, they introduce the PixVerve-Bench benchmark to assess the quality and semantic accuracy of UHR images, providing a foundation for future advancements in this area.'}, 'zh': {'title': '推动超高分辨率图像生成的创新之路', 'desc': '本文介绍了一个大规模的超高分辨率（UHR）图像-文本数据集和评估基准，以推动超高分辨率文本到图像生成的能力。我们首次推出了PixVerve-95K数据集，包含95K张高质量图像，具有多样化的场景和七维注释。基于该数据集，我们扩展了多种文本到图像基础模型，实现了原生100MP图像生成。最后，我们提出的PixVerve-Bench基准建立了一个全面的评估协议，涵盖了视觉质量和语义对齐，为未来的突破提供了宝贵的见解。'}}}, {'id': 'https://huggingface.co/papers/2605.15458', 'title': 'Video Models Can Reason with Verifiable Rewards', 'url': 'https://huggingface.co/papers/2605.15458', 'abstract': 'Abstract VideoRLVR optimizes video diffusion models for verifiable reasoning tasks using reinforcement learning with rule-based rewards, achieving better performance than supervised methods in constraint-satisfying video generation.  AI-generated summary Video diffusion models have made rapid progress in perceptual realism and temporal coherence, but they remain primarily optimized for plausible generation rather than verifiable reasoning. This limitation is especially pronounced in tasks where generated videos must satisfy explicit spatial, temporal, or logical constraints. Inspired by the role of reinforcement learning with verifiable rewards (RLVR) in reasoning-oriented language models, we introduce VideoRLVR, a practical recipe for optimizing video diffusion models with rule-based feedback. VideoRLVR formulates video reasoning as the generation of verifiable visual trajectories and consists of an SDE-GRPO optimization backbone, dense decomposed rewards, and an Early-Step Focus strategy for efficient training. The Early-Step Focus strategy restricts policy optimization to the early denoising phase, reducing training latency by about 40% while preserving performance. We evaluate VideoRLVR on Maze, FlowFree, and Sokoban, three procedurally generated domains with objective success criteria. Across these tasks, VideoRLVR consistently improves over supervised fine-tuning baselines, with dense decomposed rewards proving especially important in low-success-rate settings. Our RL-optimized model also outperforms the evaluated proprietary and open-source video generation models on these verifiable reasoning benchmarks and out-of-domain benchmarks. These results suggest that verifiable RL can move video models beyond perceptual imitation toward more reliable rule-consistent visual reasoning.', 'score': 8, 'issue_id': 2273, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '1391c7fd56191d53', 'authors': ['Tinghui Zhu', 'Sheng Zhang', 'James Y. Huang', 'Selena Song', 'Xiaofei Wen', 'Yuankai Li', 'Hoifung Poon', 'Muhao Chen'], 'affiliations': ['Microsoft Research', 'University of California, Davis', 'University of California, Santa Cruz', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2605.15458.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#reasoning', '#rl', '#video', '#training', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Логическое видеопоколение через обучение с подкреплением и верифицируемые награды', 'desc': 'В статье предлагается VideoRLVR — метод оптимизации моделей видеодиффузии для задач верифицируемого рассуждения с помощью обучения с подкреплением и правило-ориентированных наград. Авторы используют архитектуру SDE-GRPO, декомпозированные плотные функции награды и стратегию Early-Step Focus, которая ускоряет обучение на 40%, сосредоточиваясь только на ранних этапах удаления шума. Модель оценивается на процедурно генерируемых задачах (Лабиринт, FlowFree, Sokoban), где она последовательно превосходит методы супервизируемого обучения и открытые видеомодели. Результаты демонстрируют, что верифицируемое обучение с подкреплением позволяет видеомоделям переходить от имитации восприятия к более надежному логически-согласованному визуальному рассуждению.'}, 'en': {'title': 'Optimizing Video Generation for Verifiable Reasoning with VideoRLVR', 'desc': 'The paper introduces VideoRLVR, a method that enhances video diffusion models for tasks requiring verifiable reasoning through reinforcement learning with rule-based rewards. Unlike traditional models that focus on generating realistic videos, VideoRLVR aims to ensure that generated videos meet specific spatial, temporal, and logical constraints. It employs a unique optimization strategy called Early-Step Focus, which streamlines training by concentrating on the initial denoising phase, resulting in faster training times without sacrificing performance. The results demonstrate that VideoRLVR outperforms existing supervised methods and other video generation models in tasks that require adherence to strict reasoning criteria.'}, 'zh': {'title': '视频推理的新突破：VideoRLVR', 'desc': 'VideoRLVR是一种优化视频扩散模型的方法，旨在解决可验证推理任务。它使用基于规则的奖励进行强化学习，能够在满足约束条件的视频生成中表现优于监督学习方法。该方法通过生成可验证的视觉轨迹来实现视频推理，并采用SDE-GRPO优化框架和密集分解奖励策略。VideoRLVR在多个程序生成的任务中表现出色，表明可验证的强化学习能够推动视频模型向更可靠的规则一致视觉推理发展。'}}}, {'id': 'https://huggingface.co/papers/2605.19786', 'title': 'Fast 4D Mesh Generation by Spatio-Temporal Attention Chains', 'url': 'https://huggingface.co/papers/2605.19786', 'abstract': 'Abstract A training-free 4D mesh generation approach uses spatio-temporal attention chains to accelerate mesh creation while improving temporal correspondence quality and enabling scalable long-sequence processing.  AI-generated summary 4D mesh generation has recently emerged as a powerful paradigm for recovering dynamic 3D structure from videos, but existing methods remain slow, computationally expensive, and difficult to scale to longer sequences. We introduce a training-free approach that accelerates 4D mesh generation while improving temporal correspondence quality. Our key observation is that temporal correspondences emerge inside a 4D backbone long before its generated meshes become visually accurate. We exploit this with a general framework we call Spatio-Temporal Attention Chain which propagates information across space and time. Starting from vertices on an anchor mesh, the chain maps vertices to latent tokens. It then follows temporal correspondences in latent space, and recovers frame-specific vertices through latent-to-vertex attention. This design avoids expensive explicit matching while preserving anchor mesh details and thereby improving dynamic mesh geometry and temporal consistency.   Compared to state-of-the-art, our method generates a 4D mesh in 9 seconds, achieving a 13times speedup while producing higher-quality results. Moreover, our approach scales to videos up to 16times longer without degrading mesh quality. Beyond generation, the improved correspondences enable competitive zero-shot performance on two downstream tasks: 2D object tracking and 4D tracking. We further show that our framework enables reliable camera estimation, a capability not supported by prior 4D mesh generation methods.', 'score': 7, 'issue_id': 2275, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '309532f0ba574caa', 'authors': ['Dvir Samuel', 'Yuval Atzmon', 'Gal Chechik', 'Yoni Kasten'], 'affiliations': ['Bar-Ilan Univ
