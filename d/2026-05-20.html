имодействии стандартных функций потерь (MSE и кросс-энтропия) с функциями активации, имеющими положительное смещение. Авторы доказывают, что градиент относительно положительных предактивизаций имеет неотрицательное математическое ожидание при инициализации, что приводит к смещению весов в сторону отрицательных значений на ранних этапах обучения. Этот эффект является внутренним свойством процесса оптимизации и проявляется во всех популярных архитектурах (MLP, ResNet, ViT, GPT), вызывая разреженность активаций вплоть до 90%. В работе предложены решения, включая использование clipped ReLU² и GELU², которые значительно улучшают компромисс между разреженностью и точностью модели.'}, 'en': {'title': 'Understanding and Mitigating Negative Weight Drift in Neural Networks', 'desc': 'This paper investigates the issue of negative weight drift in neural networks caused by the interaction of standard loss functions and positively biased activation functions. It shows that during early training, the gradients of positive pre-activations lead to weights drifting towards negative values, which can result in high activation sparsity and reduced model accuracy. The authors demonstrate that this phenomenon is inherent to the optimization process and occurs across various neural architectures and activation functions. They propose solutions, such as using clipped ReLU^2, to mitigate the negative effects while maintaining performance, highlighting the importance of understanding training dynamics in deep learning.'}, 'zh': {'title': '负权重漂移与激活稀疏性影响模型准确性', 'desc': '本论文探讨了标准损失函数与正偏激活函数之间的相互作用，导致在早期训练中出现负权重漂移。这种漂移会导致激活稀疏性增加，从而影响模型的准确性。我们证明了在均方误差或交叉熵损失下，正预激活的梯度在初始化时期望是非负的，导致下游权重向负值漂移。通过对79种配置的稀疏性-准确性权衡进行分析，我们发现激活稀疏性超过70%时，模型准确性会急剧下降。'}}}, {'id': 'https://huggingface.co/papers/2605.17360', 'title': 'Omni-DuplexEval: Evaluating Real-time Duplex Omni-modal Interaction', 'url': 'https://huggingface.co/papers/2605.17360', 'abstract': 'Abstract A benchmark and evaluation framework for real-time duplex interaction in multimodal large language models, assessing continuous response generation and proactive event detection in streaming scenarios.  AI-generated summary Real-time duplex interaction is essential for multimodal AI systems operating in real-world scenarios, where models must continuously process streaming inputs and respond at appropriate moments. However, most existing multimodal large language models (MLLMs) are evaluated in offline settings, where the entire video input is processed before any response is generated. While recent work has started to explore real-time duplex MLLMs, there is still no comprehensive benchmark or automatic evaluation method for this setting. To address this gap, we propose Omni-DuplexEval, a benchmark for systematically evaluating real-time duplex interaction. The benchmark consists of two complementary scenarios: (1) Real-Time Description, which evaluates the ability to generate continuous, time-aligned responses that track evolving multimodal inputs, and (2) Proactive Reminder, which evaluates the ability to identify salient events and respond at appropriate moments. Omni-DuplexEval contains 660 videos with fine-grained, human-annotated labels and precise temporal metadata, spanning 9 tasks grounded in real-world scenarios, where all questions are formulated as open-ended queries. We further introduce an automatic evaluation framework based on LLM-as-a-Judge, which enables systematic assessment by jointly evaluating response-content alignment and response timing through timestamp-aware and sequential reasoning, achieving strong alignment with human judgments. Experiments on state-of-the-art duplex MLLMs reveal substantial limitations. The best-performing model achieves only 39.6% overall, while scoring only 20.0% on Proactive Reminder. Our analysis identifies two key challenges: models struggle to balance timely responses with coherent, holistic content generation, and they often fail to determine both when to respond and what to produce. We hope our work facilitates further progress in MLLMs.', 'score': 1, 'issue_id': 2273, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'aa45677a82795eff', 'authors': ['Chaoqun He', 'Mingyang Xiang', 'Yingjing Xu', 'Bokai Xu', 'Junbo Cui', 'Jie Zhou', 'Yuan Yao', 'Lijie Wen'], 'affiliations': ['ModelBest Inc.', 'Tongji University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17360.jpg', 'data': {'categories': ['#survey', '#video', '#benchmark', '#multimodal'], 'emoji': '⏱️', 'ru': {'title': 'Оценка мультимодальных моделей в режиме реального времени с дуплексным взаимодействием', 'desc': 'В работе предлагается Omni-DuplexEval — бенчмарк для оценки мультимодальных больших языковых моделей в режиме реального времени с дуплексным взаимодействием. Бенчмарк включает два сценария: генерация непрерывных временных описаний и проактивное обнаружение значимых событий в потоковых видеоданных. Авторы разработали автоматическую систему оценки на базе LLM-as-a-Judge, которая анализирует как содержание ответов, так и их временные характеристики. Экспериментальные результаты показывают, что существующие модели существенно отстают, демонстрируя необходимость улучшения способности моделей балансировать между своевременностью и качеством генерируемых ответов.'}, 'en': {'title': 'Evaluating Real-Time Interaction in Multimodal AI', 'desc': 'This paper introduces Omni-DuplexEval, a benchmark designed to evaluate real-time duplex interaction in multimodal large language models (MLLMs). It focuses on two main tasks: generating continuous responses that align with evolving inputs and proactively detecting significant events to respond appropriately. The framework includes 660 videos with detailed annotations and aims to assess both the content and timing of responses using an automatic evaluation method. The findings highlight significant limitations in current MLLMs, particularly in balancing timely responses with coherent content generation.'}, 'zh': {'title': '实时双向交互的评估新标准', 'desc': '本文提出了一个用于评估多模态大型语言模型（MLLMs）实时双向交互的基准框架，旨在解决现有模型在离线环境下评估的局限性。我们设计了Omni-DuplexEval基准，包含实时描述和主动提醒两个场景，评估模型在流媒体输入下的连续响应生成和事件检测能力。该基准包含660个视频，配有细致的人类标注和时间元数据，涵盖9个基于真实场景的任务。实验结果显示，当前最先进的双向MLLM在这些任务上的表现仍有显著不足，揭示了模型在响应时机和内容生成上的挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.16003', 'title': 'Echo-Forcing: A Scene Memory Framework for Interactive Long Video Generation', 'url': 'https://huggingface.co/papers/2605.16003', 'abstract': 'Abstract Echo-Forcing addresses limitations in interactive long-video generation by decoupling historical memory and recent dynamics through hierarchical temporal memory, scene recall frames, and difference-aware memory decay mechanisms.  AI-generated summary Autoregressive video diffusion models enable open-ended generation through local attention and KV caching. However, existing training-free long-video optimization methods mainly focus on stable extension under a single prompt, making them difficult to handle interactive scenarios involving prompt switching, old scene forgetting, and historical scene recall. We identify the core bottleneck as the functional entanglement of historical KV states: stable anchors and recent dynamics are handled by the same cache policy, leading to outdated background contamination, delayed response to new prompts, and loss of long-range memory. To address this issue, we propose Echo-Forcing, a training-free scene memory framework specifically designed for interactive long video generation with three core mechanisms: (1) Hierarchical Temporal Memory, which decouples stable anchors, compressed history, and recent windows under relative RoPE; (2) Scene Recall Frames, which compresses historical scenes into spatially structured KV representations to support long-term recall; and (3) Difference-aware Memory Decay, which adaptively forgets conflicting tokens according to the discrepancy between old and new scenes. Based on these designs, Echo-Forcing uniformly supports smooth transitions, hard cuts, and long-range scene recall under a bounded cache budget. Extensive evaluations on VBench-Long further demonstrate that Echo-Forcing achieves the best overall performance in both long-video generation and interactive video generation settings. Our code is released in https://github.com/mingqiangWu/Echo-Forcing', 'score': 1, 'issue_id': 2271, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'bc42395d3077ef73', 'authors': ['Mingqiang Wu', 'Weilun Feng', 'Zhefeng Zhang', 'Haotong Qin', 'Yuqi Li', 'Guoxin Fan', 'Xiaokun Liu', 'Zhulin An', 'Libo Huang', 'Yongjun Xu', 'Chuanguang Yang'], 'affiliations': ['China University of Mining & Technology, Beijing', 'City College of New York, City University of New York', 'ETH Zürich', 'State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences, Beijing, China', 'University of Chinese Academy of Sciences, Beijing, China', 'Xiamen Institute of Data Intelligence, Xiamen, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.16003.jpg', 'data': {'categories': ['#diffusion', '#video', '#long_context', '#open_source', '#architecture', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Иерархическое управление памятью для интерактивной генерации видео', 'desc': 'Echo-Forcing решает проблему интерактивной генерации длинных видео путём разделения исторической памяти и недавней динамики с помощью иерархической временной памяти. Метод использует механизм напоминания сцен и адаптивное забывание конфликтующих токенов, чтобы улучшить управление KV-кэшем в диффузионных моделях. Это позволяет системе плавно переключаться между подсказками, забывать устаревшие фоны и вспоминать давние сцены в пределах ограниченного бюджета памяти. Экспериментальные результаты показывают превосходную производительность как при генерации длинных видео, так и при интерактивной генерации видео.'}, 'en': {'title': 'Decoupling Memory for Interactive Long-Video Generation', 'desc': 'The paper introduces Echo-Forcing, a novel framework aimed at improving interactive long-video generation by separating historical memory from recent dynamics. It employs three key mechanisms: Hierarchical Temporal Memory to manage stable and recent information, Scene Recall Frames for efficient long-term memory storage, and Difference-aware Memory Decay to selectively forget outdated information. This approach addresses challenges like prompt switching and scene recall, which are common in interactive scenarios. The results show that Echo-Forcing outperforms existing methods in generating coherent and contextually relevant long videos.'}, 'zh': {'title': 'Echo-Forcing：交互式长视频生成的新突破', 'desc': 'Echo-Forcing 是一种针对交互式长视频生成的场景记忆框架，旨在解决历史记忆和近期动态之间的功能纠缠问题。它通过层次时间记忆、场景回忆帧和差异感知记忆衰减机制来实现稳定的场景记忆管理。该方法能够支持平滑过渡、硬切换和长距离场景回忆，适应不同的交互场景。经过广泛评估，Echo-Forcing 在长视频生成和交互式视频生成中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.14842', 'title': "Editor's Choice: Evaluating Abstract Intent in Image Editing through Atomic Entity Analysis", 'url': 'https://huggingface.co/papers/2605.14842', 'abstract': 'Abstract Abstract image editing benchmark and entity-rubrics framework reveal challenges in balancing intent and preservation for abstract instructions, highlighting need for advanced LLM integration and iterative approaches.  AI-generated summary Humans naturally communicate through abstract concepts like "mood". However, current image editing benchmarks focus primarily on explicit, literal commands, leaving abstract instructions largely underexplored. In this work, we first formalize the definition and taxonomy of abstract image editing. To measure instruction-following in this challenging domain, we introduce Entity-Rubrics, a framework that breaks down abstract edits into individual, entity-level assessments and achieves strong correlation with human judgment. Alongside this framework, we contribute AbstractEdit, the first benchmark dedicated to abstract image editing across diverse real-world scenes. Evaluating 11 leading models on this dataset reveals a fundamental challenge: standard architectures struggle to balance intent and preservation, commonly defaulting to under-editing or over-editing. Our analysis demonstrates that driving meaningful improvements relies heavily on integrating advanced LLM text encoders and iterative thinking. Looking forward, our entity-based paradigm can generalize beyond assessment to serve as a reward model, enable models to correctly interpret abstract communication, or highlight specific failures in test-time critique loops. Ultimately, we hope this work serves as a stepping stone toward seamless multimodal interaction, closing the gap between rigid machine execution and the natural, open-ended way humans communicate.', 'score': 1, 'issue_id': 2275, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '931d67d0051bb0d3', 'authors': ['Mor Ventura', 'Roy Hirsch', 'Yonatan Bitton', 'Regev Cohen', 'Roi Reichart'], 'affiliations': ['Google Research', 'Technion Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.14842.jpg', 'data': {'categories': ['#cv', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Балансирование между замыслом и сохранением в абстрактном редактировании изображений', 'desc': 'В работе предложен первый бенчмарк для редактирования изображений по абстрактным инструкциям, таким как «грустное настроение», которые традиционные системы практически не изучали. Авторы разработали фреймворк Entity-Rubrics, который разбивает абстрактные правки на отдельные оценки на уровне объектов и хорошо коррелирует с суждениями человека. Оценка 11 современных моделей выявила фундаментальную проблему: архитектуры плохо балансируют между соответствием замыслу пользователя и сохранением исходного изображения, часто недоредактируя или перередактируя. Исследование показывает, что значительные улучшения требуют использования продвинутых LLM-энкодеров текста и итеративного мышления.'}, 'en': {'title': 'Bridging the Gap: Enhancing Abstract Image Editing with Advanced Models', 'desc': "This paper addresses the challenges of abstract image editing, which involves interpreting vague instructions like 'mood' rather than explicit commands. It introduces a new framework called Entity-Rubrics to evaluate how well models follow these abstract instructions by breaking them down into specific assessments. The study also presents AbstractEdit, a benchmark for testing various models on abstract image editing tasks, revealing that many models struggle with balancing the intent of the edits and preserving the original image. The authors suggest that integrating advanced language models and iterative approaches can improve performance in this area, aiming for better alignment between human communication and machine understanding."}, 'zh': {'title': '抽象图像编辑：平衡意图与保留的挑战', 'desc': '本文探讨了抽象图像编辑的挑战，特别是在意图与保留之间的平衡。我们提出了Entity-Rubrics框架，将抽象编辑分解为个体实体级别的评估，以便更好地衡量指令的执行。通过引入AbstractEdit基准，我们评估了11种领先模型在处理抽象指令时的表现，发现标准架构在编辑时常常出现不足或过度编辑的问题。我们认为，结合先进的LLM文本编码器和迭代思维是实现有效改进的关键。'}}}, {'id': 'https://huggingface.co/papers/2605.09789', 'title': 'Zero-Shot Sim-to-Real Robot Learning: A Dexterous Manipulation Study on Reactive Catching', 'url': 'https://huggingface.co/papers/2605.09789', 'abstract': 'Abstract Domain-Randomized Instance Set (DRIS) enables robust policy learning for dexterous manipulation tasks by simultaneously representing multiple randomized instances, achieving strong sim-to-real transfer without extensive real-world fine-tuning.  AI-generated summary Dexterous manipulation is physics-intensive and highly sensitive to modeling errors and perception noise, making sim-to-real transfer prohibitively challenging. Domain randomization (DR) is commonly used to improve the robustness of learned policies for such tasks, but conventional DR randomizes one instance per episode, offering very limited exposure to the variability of real-world dynamics. To this end, we propose Domain-Randomized Instance Set (DRIS), which represents and propagates a set of randomized instances simultaneously, providing richer approximation of uncertain dynamics and enabling policies to learn actions that account for multiple possible outcomes. Supported by theoretical analysis, we show that DRIS yields more robust policies and alleviates the need for real-world fine-tuning, even with a modest number of instances (e.g., 10). We demonstrate this on a challenging reactive catching task. Unlike traditional catching setups that use end-effectors designed to mechanically stabilize the object (e.g., curved or enclosing surfaces), our system uses a flat plate that offers no passive stabilization, making the task highly sensitive to noise and requiring rapid reactive motions. The learned policies exhibit strong robustness to uncertainties and achieve reliable zero-shot sim-to-real transfer.', 'score': 1, 'issue_id': 2276, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '782afab350f7c609', 'authors': ['Kejia Ren', 'Gaotian Wang', 'Andrew S. Morgan', 'Kaiyu Hang'], 'affiliations': ['Department of Computer Science, Rice University', 'Robotics and AI Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.09789.jpg', 'data': {'categories': ['#robotics', '#transfer_learning', '#optimization', '#rl', '#training'], 'emoji': '🤖', 'ru': {'title': 'Множественная рандомизация для надёжного трансфера манипуляции из симуляции в реальность', 'desc': 'В статье предлагается метод Domain-Randomized Instance Set (DRIS) для обучения политик манипуляции объектов с высокой ловкостью. Вместо рандомизации одного экземпляра за эпизод, метод одновременно обрабатывает множество рандомизированных экземпляров, обеспечивая лучшую аппроксимацию неопределённости динамики. Авторы показывают теоретически и экспериментально, что DRIS позволяет агентам обучаться действиям, которые учитывают множество возможных исходов, что делает политики устойчивыми к различным возмущениям. Метод достигает надёжного нулевого трансфера из симуляции в реальный мир без необходимости дополнительной тонкой настройки на реальных данных.'}, 'en': {'title': 'Enhancing Robustness in Dexterous Manipulation with DRIS', 'desc': 'The paper introduces Domain-Randomized Instance Set (DRIS), a method that enhances policy learning for complex manipulation tasks by using multiple randomized instances at once. This approach allows for better sim-to-real transfer by exposing the learning algorithm to a wider range of possible real-world dynamics, rather than just one instance per episode. Theoretical analysis supports that DRIS leads to more robust policies, reducing the need for extensive fine-tuning in real-world applications. The effectiveness of DRIS is demonstrated through a challenging reactive catching task, where the learned policies show strong resilience to uncertainties and perform well in real-world scenarios without prior adjustments.'}, 'zh': {'title': '域随机实例集：提升灵巧操作的鲁棒性', 'desc': '本文提出了一种名为域随机实例集（DRIS）的方法，旨在提高灵巧操作任务的策略学习能力。DRIS通过同时表示多个随机化实例，增强了对不确定动态的近似，从而使得学习的策略能够考虑多种可能的结果。与传统的域随机化方法不同，DRIS在每个训练过程中同时处理多个实例，显著提高了策略的鲁棒性。实验表明，DRIS能够在没有大量现实世界微调的情况下，实现强大的模拟到现实的转移。'}}}, {'id': 'https://huggingface.co/papers/2605.08586', 'title': 'Computer Science Conferences Should Require Nonrepudiable Experimental Results', 'url': 'https://huggingface.co/papers/2605.08586', 'abstract': 'Abstract  This position paper argues that computer science conferences should require tamper-evident, nonrepudiable attestations of experimental results. We name the underlying problem experiment nonrepudiation: a compliant protocol must bind the numbers in a paper to an actual executed computation in a way the author cannot later alter or deny. The current system relies on self-reported checklists, optional code sharing, and author-controlled logging. None of these mechanisms answer the question a reviewer cannot check: did the code the paper describes produce the numbers the paper reports? We define the problem formally, state the security properties any compliant protocol must satisfy, and describe a threat model that includes attacks current approaches do not prevent. To show that the problem is solvable, we built K-Veritas, a reference implementation in Go that produces signed reports without accessing training data. K-Veritas is a testbed, not a finished answer. We call on conferences and the community to treat nonrepudiation as a first-class requirement and to help build an open, independent standard for it.', 'score': 1, 'issue_id': 2277, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'e5a3df124fdb0ff0', 'authors': ['Mamadou K. Keita', 'Christopher Homan'], 'affiliations': ['Rochester Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.08586.jpg', 'data': {'categories': ['#open_source', '#security'], 'emoji': '🔐', 'ru': {'title': 'Криптографическая верификация экспериментальных результатов в машинном обучении', 'desc': 'В этой позиционной статье авторы обосновывают необходимость введения защищённых, невозможных для отрицания подтверждений экспериментальных результатов на конференциях по информатике. Они формализуют проблему непризнания экспериментов и определяют требуемые свойства безопасности для протоколов верификации. Авторы предлагают модель угроз и описывают уязвимости современных подходов, опирающихся на самоотчёты авторов и опциональное распространение кода. Как доказательство концепции, они разработали K-Veritas — прототип на Go, который генерирует подписанные отчёты без доступа к данным обучения, и призывают сообщество принять стандартизацию такого подхода.'}, 'en': {'title': 'Ensuring Integrity in Research: Nonrepudiation for Experimental Results', 'desc': "This paper discusses the need for a system that ensures the integrity of experimental results in computer science research. It introduces the concept of 'experiment nonrepudiation', which means that authors cannot change or deny the results they report in their papers. The authors criticize current practices that rely on self-reported data and suggest that these do not adequately verify the authenticity of results. They propose a solution called K-Veritas, which is a tool designed to create secure, verifiable reports of experiments without compromising the training data used."}, 'zh': {'title': '确保实验结果的不可否认性', 'desc': '这篇论文提出计算机科学会议应要求实验结果的不可篡改和不可否认的证明。我们称之为实验不可否认性，意味着论文中的数据必须与实际执行的计算绑定，作者无法后期更改或否认。当前的系统依赖于自我报告的清单、可选的代码共享和作者控制的日志，这些机制无法回答审稿人无法核实的问题：论文描述的代码是否产生了论文报告的数字？我们定义了这个问题，提出了任何合规协议必须满足的安全属性，并描述了当前方法无法防止的攻击威胁模型。'}}}, {'id': 'https://huggingface.co/papers/2605.19516', 'title': 'Base Models Look Human To AI Detectors', 'url': 'https://huggingface.co/papers/2605.19516', 'abstract': 'Abstract Instruction-tuned language models produce text that commercial detectors identify as non-human, prompting the development of a paraphrasing pipeline that improves human-likeness while preserving semantics across different model sizes.  AI-generated summary As AI-generated text enters the real-world at scale, institutions increasingly use commercial AI-text detectors, especially in education and academic-integrity workflows. We report a surprising empirical finding about such systems: when evaluated by GPTZero and Pangram, generated text from base models is often judged overwhelmingly human, whereas text generated by their instruction-tuned counterparts is not. Building on this observation, we propose Humanization by Iterative Paraphrasing (HIP), a detector-agnostic pipeline that minimally fine-tunes a base model into a paraphraser and applies it iteratively. Compared with the baselines we test, HIP yields a stronger trade-off between semantic preservation and detector evasion on commercial detectors. Across Llama-3 and Qwen-3 families, spanning model sizes from 0.6B to 70B, HIP consistently improves detector human-likeness. Our findings suggest that current detectors are tracking artifacts of instruction tuning and local context more than any invariant notion of machine-generated text. This, in turn, calls for detector designs that model these factors more explicitly.', 'score': 0, 'issue_id': 2277, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'f2761ae340e3520e', 'authors': ['Yixuan Even Xu', 'Ziqian Zhong', 'Aditi Raghunathan', 'Fei Fang', 'J. Zico Kolter'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.19516.jpg', 'data': {'categories': [], 'emoji': '🎭', 'ru': {'title': 'Маскировка машинного текста через итеративную парафразировку', 'desc': 'В статье исследуется парадокс: детекторы AI-текста часто классифицируют текст от базовых моделей как человеческий, а текст от инструкций-настроенных моделей — как машинный. Авторы предлагают метод Humanization by Iterative Paraphrasing (HIP), который использует итеративную парафразировку с минимальной дообучением базовой модели для повышения схожести с человеческим текстом. Метод показывает лучший компромисс между сохранением семантики и избеганием детекции на коммерческих детекторах, демонстрируя стабильные улучшения на моделях Llama-3 и Qwen-3 размером от 0.6B до 70B параметров. Результаты указывают, что современные детекторы отслеживают артефакты инструкционной настройки, а не инвариантные признаки машинного текста.'}, 'en': {'title': 'Enhancing AI Text to Fool Detectors with Paraphrasing', 'desc': 'This paper discusses the challenges faced by instruction-tuned language models, which often produce text that is identified as non-human by commercial AI detectors. The authors introduce a method called Humanization by Iterative Paraphrasing (HIP), which fine-tunes a base model to create more human-like text while maintaining the original meaning. The study shows that HIP significantly improves the human-likeness of generated text across various model sizes, making it less detectable by AI detectors. The findings indicate that current detection systems may be overly sensitive to specific features of instruction-tuned models rather than universally applicable characteristics of machine-generated text.'}, 'zh': {'title': '提升AI文本人类相似性的创新方法', 'desc': '本文探讨了指令调优的语言模型生成的文本在商业检测器中被识别为非人类文本的问题。我们提出了一种名为人性化迭代释义（HIP）的管道，旨在提高生成文本的人类相似性，同时保持语义的一致性。通过对基础模型进行最小微调，HIP能够有效地生成更自然的文本，并在不同规模的模型中表现出色。我们的研究表明，当前的检测器主要关注指令调优和局部上下文的特征，而非机器生成文本的固定特征。'}}}, {'id': 'https://huggingface.co/papers/2605.19633', 'title': 'optimize_anything: A Universal API for Optimizing any Text Parameter', 'url': 'https://huggingface.co/papers/2605.19633', 'abstract': "Abstract A single LLM-based optimization system demonstrates state-of-the-art performance across diverse domains by formulating optimization problems as text artifact improvement with scoring functions, achieving superior results in AI agent discovery, cloud scheduling, CUDA kernel generation, and geometric packing compared to specialized tools.  AI-generated summary Can a single LLM-based optimization system match specialized tools across fundamentally different domains? We show that when optimization problems are formulated as improving a text artifact evaluated by a scoring function, a single AI-based optimization system-supporting single-task search, multi-task search with cross-problem transfer, and generalization to unseen inputs-achieves state-of-the-art results across six diverse tasks. Our system discovers agent architectures that nearly triple Gemini Flash's ARC-AGI accuracy (32.5% to 89.5%), finds scheduling algorithms that cut cloud costs by 40%, generates CUDA kernels where 87% match or beat PyTorch, and outperforms AlphaEvolve's reported circle packing solution (n=26). Ablations across three domains reveal that actionable side information yields faster convergence and substantially higher final scores than score-only feedback, and that multi-task search outperforms independent optimization given equivalent per-problem budget through cross-task transfer, with benefits scaling with the number of related tasks. Together, we show for the first time that text optimization with LLM-based search is a general-purpose problem-solving paradigm, unifying tasks traditionally requiring domain-specific algorithms under a single framework. We open-source optimize\\_anything with support for multiple backends as part of the GEPA project at https://github.com/gepa-ai/gepa .", 'score': 0, 'issue_id': 2274, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '3107bd93104d672f', 'authors': ['Lakshya A Agrawal', 'Donghyun Lee', 'Shangyin Tan', 'Wenjie Ma', 'Karim Elmaaroufi', 'Rohit Sandadi', 'Sanjit A. Seshia', 'Koushik Sen', 'Dan Klein', 'Ion Stoica', 'Joseph E. Gonzalez', 'Omar Khattab', 'Alexandros G. Dimakis', 'Matei Zaharia'], 'affiliations': ['MIT', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.19633.jpg', 'data': {'categories': ['#open_source', '#transfer_learning', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Единая LLM-система оптимизации для всех задач', 'desc': 'В статье представлена единая система оптимизации на основе LLM, которая формулирует задачи оптимизации как улучшение текстовых артефактов с помощью функций оценки. Система показывает лучшие результаты на разнородных задачах: открывает архитектуры AI-агентов (повышая точность на 89,5%), оптимизирует облачные расписания (экономия 40%), генерирует CUDA-ядра и решает задачи геометрической упаковки. Исследование доказывает, что дополнительная информация о контексте ускоряет сходимость лучше, чем только оценки, а многозадачная оптимизация превосходит независимый поиск благодаря трансферу знаний. Впервые демонстрируется, что текстовая оптимизация с поиском на основе LLM является универсальной парадигмой решения проблем, объединяющей специализированные алгоритмы в один фреймворк.'}, 'en': {'title': 'Unifying Optimization Tasks with LLMs: A New Paradigm', 'desc': 'This paper presents a novel optimization system based on a large language model (LLM) that excels in various domains by treating optimization tasks as improvements to text artifacts evaluated through scoring functions. The system demonstrates remarkable performance in tasks such as AI agent discovery, cloud scheduling, CUDA kernel generation, and geometric packing, outperforming traditional specialized tools. It employs techniques like single-task and multi-task searches, leveraging cross-problem transfer and generalization to handle unseen inputs effectively. The findings indicate that incorporating actionable side information and multi-task search strategies significantly enhances optimization efficiency and outcomes, establishing LLM-based optimization as a versatile solution across diverse applications.'}, 'zh': {'title': '统一优化：LLM驱动的通用解决方案', 'desc': '这篇论文展示了一种基于大型语言模型（LLM）的优化系统，在多个领域中表现出色。该系统通过将优化问题表述为文本工件的改进，并使用评分函数进行评估，达到了最先进的结果。它在AI代理发现、云调度、CUDA内核生成和几何打包等任务中，超越了专门工具的表现。研究表明，利用多任务搜索和跨问题转移的能力，使得该系统在处理未见输入时也能实现良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.19147', 'title': 'Be Kind, Rewrite: Benign Projections via Rewriting Defend Against LLM Data Poisoning Attacks', 'url': 'https://huggingface.co/papers/2605.19147', 'abstract': 'Abstract Open-book benign rewriting effectively defends large language models against backdoor attacks by neutralizing harmful content through benign prompt projection, outperforming existing defenses while maintaining computational efficiency and natural language task performance.  AI-generated summary Large language models (LLMs) are highly susceptible to backdoor attacks (BAs), wherein training samples are poisoned using trigger-based harmful content. Furthermore, existing defenses have proven ineffective when extensively tested across BA patterns. To better combat BAs, we explore the use of LLM rewriting as a proactive defense against data poisoning. First, we theoretically show that when LLM rewriting utilizes open-book benign samples--termed open-book benign rewriting (OBBR)--the probability of a rewritten output being benign is strictly greater than that of closed-book rewriting. Thus, OBBR neutralizes harmful content by projecting training samples to the space of benign prompts. We then show that, in contrast to previous defenses, OBBR effectively mitigates a large number of existing BAs: across five known BAs and four widely used LLMs, OBBR increases safety performance by an average 51% compared to state-of-the-art BA defenses and 25.7% compared to closed-book rewriting methods. Finally, we show that OBBR is computationally efficient relative to other BA defenses, does not degrade model performance on natural language tasks after fine-tuning, and is capable of defending against non-trigger based data poisoning attacks.', 'score': 0, 'issue_id': 2277, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '7d985adcf5fe91ce', 'authors': ['John T. Halloran', 'Noopur S. Bhatt'], 'affiliations': ['Leidos', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2605.19147.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Защита языковых моделей от атак отравлением данных через переписывание примерами', 'desc': 'Исследование предлагает метод защиты больших языковых моделей от атак с бэкдорами, используя технику переписывания текста на основе открытого набора примеров. Метод OBBR (открытая переписка доброкачественных примеров) проецирует отравленные обучающие данные в пространство безвредных запросов, нейтрализуя вредоносный контент. Авторы доказывают теоретически и экспериментально, что такой подход значительно превосходит существующие защиты, повышая безопасность в среднем на 51%. Кроме того, метод обладает вычислительной эффективностью и не снижает производительность модели на стандартных задачах обработки естественного языка.'}, 'en': {'title': 'Rewriting Safety: A New Shield Against Backdoor Attacks', 'desc': "This paper introduces Open-Book Benign Rewriting (OBBR) as a novel defense mechanism against backdoor attacks (BAs) in large language models (LLMs). OBBR utilizes benign samples to rewrite potentially harmful outputs, significantly increasing the likelihood of generating safe content compared to traditional closed-book methods. The authors demonstrate that OBBR outperforms existing defenses by improving safety performance by an average of 51% across various BAs and LLMs. Additionally, OBBR maintains computational efficiency and does not compromise the model's performance on natural language tasks after fine-tuning."}, 'zh': {'title': '开放书籍重写：提升语言模型安全性的新方法', 'desc': '这篇论文提出了一种开放书籍良性重写（OBBR）的方法，旨在有效防御大型语言模型（LLMs）面临的后门攻击。通过使用良性样本进行重写，OBBR能够中和有害内容，从而提高模型的安全性。研究表明，OBBR在对抗多种后门攻击时，安全性能比现有的防御方法提高了51%。此外，OBBR在计算效率上也表现良好，并且在微调后不会降低模型在自然语言任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.17026', 'title': 'Why Do Reasoning Models Lose Coverage? The Role of Data and Forks in the Road', 'url': 'https://huggingface.co/papers/2605.17026', 'abstract': 'Abstract Reasoning models exhibit coverage shrinkage during supervised fine-tuning, where performance degrades on broader task sets despite improved accuracy on specific benchmarks, due to training data characteristics involving ambiguous decision points with multiple valid paths.  AI-generated summary Recent progress in large language models has led to the emergence of reasoning models, which have shown strong performance on complex tasks through specialized fine-tuning procedures. While these methods reliably improve pass@1 accuracy, prior works have observed that they show a coverage shrinkage behavior, where pass@k degrades relative to the base model. In this paper, we investigate the reasoning shrinkage arise under SFT-based post-training. We hypothesize that this behavior is driven by properties of the fine-tuning data, specifically related to decision points or "forks in the road" scenarios where model faces indecipherable patterns with multiple valid reasoning paths. To test this hypothesis, we design controlled case studies that simulate such decision-point settings, spanning indecipherable nodes in graph branching, and reasoning modes. By tracking post-training dynamics in these settings, we find that the shrinkage phenomenon is tightly correlated with the prevalence of decision-point scenarios in the training data. We also demonstrate that this shrinkage behavior can be partially mitigated through targeted data synthesis design of decision-points, and a more systematic diversity-encouraging decoding mechanism. Our findings identify data-centric factors as a key driver of shrinkage in reasoning models and highlight diversity-aware designs as an effective lever for controlling it.', 'score': 0, 'issue_id': 2276, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': 'd27257d2a1966702', 'authors': ['Ngoc-Hieu Nguyen', 'Parshin Shojaee', 'Phuc Minh Nguyen', 'Nan Zhang', 'Chandan K Reddy', 'Khoa D Doan', 'Rui Zhang'], 'affiliations': ['The Pennsylvania State University', 'VinUniversity', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2605.17026.jpg', 'data': {'categories': ['#reasoning', '#synthetic'], 'emoji': '🌳', 'ru': {'title': 'Разнообразие в данных - ключ к сохранению способности моделей рассуждений', 'desc': 'В статье исследуется проблема сужения охвата (coverage shrinkage) в моделях рассуждений при управляемой доводке - когда качество на конкретных бенчмарках улучшается, но производительность на более широком наборе задач падает. Авторы гипотезируют, что причина заключается в характеристиках данных для обучения, особенно в наличии точек принятия решений с неоднозначными паттернами, где существует несколько корректных путей рассуждения. Через контролируемые эксперименты на графовых структурах и различных режимах рассуждений они подтверждают корреляцию между распространённостью таких точек ветвления в тренировочных данных и явлением сужения. Результаты показывают, что проблему можно частично смягчить через синтез данных, специально разработанный для таких точек решения, и механизмы декодирования, поощряющие разнообразие.'}, 'en': {'title': 'Tackling Coverage Shrinkage in Reasoning Models', 'desc': 'This paper explores the issue of coverage shrinkage in reasoning models during supervised fine-tuning (SFT). Despite improvements in specific benchmarks, these models often perform worse on broader tasks due to ambiguous decision points in the training data. The authors conduct experiments to show that this shrinkage is linked to the presence of complex decision scenarios where multiple valid reasoning paths exist. They propose solutions involving targeted data synthesis and diversity-aware decoding to mitigate this shrinkage effect.'}, 'zh': {'title': '推理模型的覆盖收缩与数据特性相关', 'desc': '本文探讨了在监督微调过程中，推理模型表现出的覆盖收缩现象。尽管在特定基准上的准确性有所提高，但在更广泛的任务集上性能却下降。我们认为，这种现象与训练数据的特性有关，尤其是涉及多个有效路径的模糊决策点。通过设计控制案例研究，我们发现覆盖收缩与训练数据中决策点场景的普遍性密切相关，并提出了通过有针对性的数据合成和多样性鼓励解码机制来部分缓解这一现象。'}}}, {'id': 'https://huggingface.co/papers/2605.15514', 'title': 'RoPE Distinguishes Neither Positions Nor Tokens in Long Contexts, Provably', 'url': 'https://huggingface.co/papers/2605.15514', 'abstract': "Abstract Rotary Positional Embeddings in Transformer models lose locality bias and token relevance consistency as context length increases, leading to unpredictable attention patterns that cannot be mitigated by multi-head, multi-layer architectures.  AI-generated summary We identify intrinsic limitations of Rotary Positional Embeddings (RoPE) in Transformer-based long-context language models. Our theoretical analysis abstracts away from the specific content of the context and depends only on its length. We prove that as context length increases, RoPE-based attention becomes unpredictable and loses two properties that are central to its effectiveness. First, it loses its locality bias: RoPE is no more likely to favor nearer positions than substantially farther ones. Second, it loses consistency in token relevance: a key vector that receives a higher attention score than an alternative at one position may receive a lower score at another. In both cases, the probability of failure approaches 0.5, no better than random guessing. We further prove that the attention score can remain unchanged when a key token is moved to a different position, or even replaced by a different token, indicating a failure to distinguish positions or tokens. Adjusting the RoPE base trades off distinguishing positions against distinguishing tokens but cannot preserve both at the same time. Increasing the RoPE base hyperparameter, a common practice in today's long-context models, helps distinguish different tokens, but inevitably sacrifices the ability to distinguish positions. Our empirical analysis shows that multi-head, multi-layer architectures are insufficient to overcome these limitations. Our findings suggest that fundamentally new mechanisms for encoding position and token order may be needed in future Transformer long-context language models.", 'score': 0, 'issue_id': 2276, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'e86db9347bc61148', 'authors': ['Yufeng Du', 'Phillip Harris', 'Minyang Tian', 'Eliu A Huerta', 'Srikanth Ronanki', 'Subendhu Rongali', 'Aram Galstyan', 'Hao Peng'], 'affiliations': ['Amazon AGI', 'Argonne National Laboratory', 'University of Bonn', 'University of Illinois at Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.15514.jpg', 'data': {'categories': ['#long_context', '#interpretability', '#math', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Когда длинный контекст становит слабым местом: парадокс ротационных эмбеддингов', 'desc': 'В статье проанализированы внутренние ограничения ротационных позиционных эмбеддингов (RoPE) в трансформер-моделях при работе с длинными контекстами. Авторы доказывают, что с увеличением длины контекста механизм внимания теряет локальный смещение и консистентность оценки релевантности токенов, приближаясь к случайному угадыванию. Показано, что модель становится неспособна различать позиции токенов или заменять токены, так как оценка внимания остаётся неизменной при перемещении ключевого токена. Авторы демонстрируют, что увеличение базового гиперпараметра RoPE решает проблему различения токенов, но неизбежно ухудшает различение позиций, и даже многоголовая архитектура не может преодолеть эти ограничения.'}, 'en': {'title': 'Revisiting Positional Encoding: The Limits of RoPE in Long Contexts', 'desc': 'This paper discusses the limitations of Rotary Positional Embeddings (RoPE) in Transformer models when handling long contexts. As the context length increases, RoPE loses its ability to favor nearby tokens and maintain consistent relevance across different positions. The authors demonstrate that attention scores can become unpredictable, resembling random guessing, which undermines the effectiveness of the model. They suggest that current multi-head and multi-layer architectures cannot resolve these issues, indicating a need for new methods to encode positional information in long-context language models.'}, 'zh': {'title': '变换器模型中的位置嵌入新挑战', 'desc': '本文探讨了变换器模型中旋转位置嵌入（RoPE）的内在局限性，尤其是在长上下文语言模型中的表现。随着上下文长度的增加，RoPE的注意力模式变得不可预测，失去了局部偏差和令牌相关性一致性这两个关键特性。研究表明，RoPE在长上下文中无法有效区分位置和令牌，导致其注意力得分接近随机猜测的水平。作者建议未来的变换器模型可能需要全新的位置和令牌顺序编码机制。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (5)', '#agents (7)', '#agi', '#alignment (3)', '#architecture (8)', '#audio (3)', '#benchmark (16)', '#cv (2)', '#data (3)', '#dataset (10)', '#diffusion (5)', '#ethics', '#games (1)', '#graphs', '#hallucinations (2)', '#healthcare', '#inference (7)', '#interpretability (3)', '#leakage', '#long_context (5)', '#low_resource (1)', '#machine_translation (1)', '#math (4)', '#multilingual (1)', '#multimodal (14)', '#open_source (12)', '#optimization (16)', '#plp (2)', '#rag (2)', '#reasoning (9)', '#rl (7)', '#rlhf (5)', '#robotics (2)', '#science (1)', '#security (2)', '#small_models (3)', '#story_generation (1)', '#survey (1)', '#synthetic (5)', '#training (20)', '#transfer_learning (3)', '#video (10)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        }

        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-20 21:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-20 21:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
