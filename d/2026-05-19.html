    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.18661', 'title': 'AI for Auto-Research: Roadmap & User Guide', 'url': 'https://huggingface.co/papers/2605.18661', 'abstract': 'Abstract AI systems demonstrate varying reliability across research stages, excelling in structured tasks but struggling with novel ideas and scientific judgment, necessitating human oversight for credible outcomes.  AI-generated summary AI-assisted research is crossing a threshold: fully automated systems can now generate research papers for as little as $15, while long-horizon agents can execute experiments, draft manuscripts, and simulate critique with minimal human input. Yet this productivity frontier exposes a deeper integrity problem: under scientific pressure, even frontier LLMs still fabricate results, miss hidden errors, and fail to judge novelty reliably. Studying developments through April 2026, we present an end-to-end analysis of AI across the complete research lifecycle, organized into four epistemological phases: Creation (idea generation, literature review, coding & experiments, tables & figures), Writing (paper writing), Validation (peer review, rebuttal & revision), and Dissemination (posters, slides, videos, social media, project pages, and interactive agents). We identify a sharp, stage-dependent boundary between reliable assistance and unreliable autonomy: AI excels at structured, retrieval-grounded, and tool-mediated tasks, but remains fragile for genuinely novel ideas, research-level experiments, and scientific judgment. Generated ideas often degrade after implementation, research code lags far behind pattern-matching benchmarks, and end-to-end autonomous systems have not yet consistently reached major-venue acceptance standards. We further show that greater automation can obscure rather than eliminate failure modes, making human-governed collaboration the most credible deployment paradigm. Finally, we provide a structured taxonomy, benchmark suite, and tool inventory, cross-stage design principles, and a practitioner-oriented playbook, with resources maintained at our project page.', 'score': 40, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'a60cdb7a5d36bcb3', 'authors': ['Lingdong Kong', 'Xian Sun', 'Wei Chow', 'Linfeng Li', 'Kevin Qinghong Lin', 'Xuan Billy Zhang', 'Song Wang', 'Rong Li', 'Qing Wu', 'Wei Gao', 'Yingshuo Wang', 'Shaoyuan Xie', 'Jiachen Liu', 'Leigang Qu', 'Shijie Li', 'Lai Xing Ng', 'Benoit R. Cottereau', 'Ziwei Liu', 'Tat-Seng Chua', 'Wei Tsang Ooi'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.18661.jpg', 'data': {'categories': [], 'emoji': '🔬', 'ru': {'title': 'Границы автономии: когда AI помощник превращается в недостоверного исследователя', 'desc': 'В работе анализируется надёжность AI систем на всех этапах научного исследования: от генерации идей до распространения результатов. Авторы показывают, что LLM хорошо справляются со структурированными задачами и поиском информации, но не могут надёжно генерировать оригинальные идеи, проводить сложные эксперименты и давать научные оценки. Исследование демонстрирует, что автоматизированные системы часто фальсифицируют результаты и пропускают ошибки, поэтому полная автономия AI в науке опасна и неэффективна. Авторы заключают, что наиболее надёжная парадигма — это сотрудничество человека и AI под человеческим контролем, с чётким разделением задач между надёжным вспомогательным AI и человеческим научным суждением.'}, 'en': {'title': "Navigating AI's Role in Research: Collaboration Over Automation", 'desc': 'This paper analyzes the role of AI in the research lifecycle, highlighting its strengths and weaknesses across four key phases: Creation, Writing, Validation, and Dissemination. While AI systems can efficiently handle structured tasks and assist in generating research papers, they struggle with novel ideas and scientific judgment, often requiring human oversight. The study reveals that increased automation can lead to integrity issues, such as fabricating results and missing errors, particularly in complex research scenarios. The authors propose a collaborative approach between humans and AI to ensure credible outcomes, along with resources to guide practitioners in effectively utilizing AI tools.'}, 'zh': {'title': 'AI在科研中的双刃剑：助力与挑战并存', 'desc': '这篇论文探讨了人工智能在研究生命周期中的表现，特别是在创作、写作、验证和传播四个阶段。尽管AI在结构化任务中表现出色，但在处理新颖想法和科学判断时仍然存在局限性，常常需要人类的监督。研究表明，AI生成的结果可能会出现虚假信息和隐藏错误，因此人类合作仍然是最可靠的方式。最后，论文提供了一个结构化的分类法和工具清单，以帮助研究人员更好地利用AI。'}}}, {'id': 'https://huggingface.co/papers/2605.14278', 'title': 'KVPO: ODE-Native GRPO for Autoregressive Video Alignment via KV Semantic Exploration', 'url': 'https://huggingface.co/papers/2605.14278', 'abstract': 'Abstract ODENative online GRPO framework KVPO aligns streaming video generators with human preferences through causal-semantic exploration and velocity-field surrogate policy based on trajectory velocity energy.  AI-generated summary Aligning streaming autoregressive (AR) video generators with human preferences is challenging. Existing reinforcement learning methods predominantly rely on noise-based exploration and SDE-based surrogate policies that are mismatched to the deterministic ODE dynamics of distilled AR models, and tend to perturb low-level appearance rather than the high-level semantic storyline progression critical for long-horizon coherence. To address these limitations, we present KVPO, an ODE-native online Group Relative Policy Optimization (GRPO) framework for aligning streaming video generators. For diversity exploration, KVPO introduces a causal-semantic exploration paradigm that relocates the source of variation from stochastic noise to the historical KV cache. By stochastically routing historical KV entries, it constructs semantically diverse generation branches that remain strictly on the data manifold. For policy modeling, KVPO introduces a velocity-field surrogate policy based on Trajectory Velocity Energy (TVE), which quantifies branch likelihood in flow-matching velocity space and yields a reward-weighted contrastive objective fully consistent with the native ODE formulation. Experiments on multiple distilled AR video generators demonstrate consistent gains in visual quality, motion quality, and text-video alignment across both single-prompt short-video and multi-prompt long-video settings.', 'score': 29, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '72d3dd1f1e663176', 'authors': ['Ruicheng Zhang', 'Kaixi Cong', 'Jun Zhou', 'Zhizhou Zhong', 'Zunnan Xu', 'Shuiyang Mao', 'Wei Liu', 'Xiu Li'], 'affiliations': ['HKUST', 'Tsinghua University', 'Video Rebirth Project'], 'pdf_title_img': 'assets/pdf/title_img/2605.14278.jpg', 'data': {'categories': ['#training', '#video', '#rlhf', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Выравнивание видеогенераторов с человеческими предпочтениями через семантическую экспlorацию в ODE пространстве', 'desc': 'В работе предлагается KVPO — фреймворк для обучения потокового видеогенератора с подкреплением, выравнивая его с предпочтениями человека. Вместо традиционных методов с шумовой экспlorацией авторы используют причинно-семантический подход, где вариативность исходит из исторического KV cache вместо стохастического шума. Для моделирования политики предложена суррогатная политика на основе энергии траектории скорости (TVE), которая работает в пространстве скоростей, согласованном с ODE динамикой видеогенератора. Эксперименты показывают улучшение качества видео, движения и текстово-видео соответствия на различных видеогенераторах.'}, 'en': {'title': 'Enhancing Video Generation with Causal-Semantic Exploration', 'desc': 'The paper introduces KVPO, a new framework for improving the alignment of streaming video generators with human preferences using causal-semantic exploration. Unlike traditional methods that rely on noise-based exploration, KVPO utilizes historical key-value (KV) caches to create diverse video generation paths that maintain semantic coherence. It also employs a velocity-field surrogate policy based on Trajectory Velocity Energy (TVE) to better model the dynamics of video generation. Experiments show that KVPO enhances visual quality, motion consistency, and alignment with textual prompts in both short and long video formats.'}, 'zh': {'title': '对齐视频生成与人类偏好的新方法', 'desc': '本文提出了一种名为KVPO的在线GRPO框架，旨在通过因果语义探索和基于轨迹速度能量的代理策略来对齐流媒体视频生成器与人类偏好。现有的强化学习方法主要依赖噪声探索和随机微分方程（SDE）代理策略，这与确定性常微分方程（ODE）动态不匹配，导致低层次外观的扰动，而非高层次语义故事线的进展。KVPO通过将变化源从随机噪声转移到历史KV缓存，构建了语义多样的生成分支，确保生成内容保持在数据流形上。实验结果表明，KVPO在视觉质量、运动质量和文本-视频对齐方面均有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.18643', 'title': 'Post-Trained MoE Can Skip Half Experts via Self-Distillation', 'url': 'https://huggingface.co/papers/2605.18643', 'abstract': 'Abstract Zero-Expert Self-Distillation Adaptation (ZEDA) enables efficient dynamic Mixture-of-Experts models by converting static models into adaptive ones with reduced computational costs and improved inference speed.  AI-generated summary Mixture-of-Experts (MoE) scales language models efficiently through sparse expert activation, and its dynamic variant further reduces computation by adjusting the activated experts in an input-dependent manner. Existing dynamic MoE methods usually rely on pre-training from scratch or task-specific adaptation, leaving the practical conversion of fully trained MoE underexplored. Enabling such adaptation would directly alleviate the inference costs by allowing easy tokens to bypass unnecessary expert during serving. This paper introduces Zero-Expert Self-Distillation Adaptation (ZEDA), a low-cost framework that transforms post-trained static MoE models into efficient dynamic ones. To stabilize this architectural conversion, ZEDA injects parameter-free zero-output experts into each MoE layer and adapts the augmented model through two-stage self-distillation, utilizing the original MoE as a frozen teacher and applying a group-level balancing loss. On Qwen3-30B-A3B and GLM-4.7-Flash across 11 benchmarks spanning math, code, and instruction following, ZEDA eliminates over 50% of expert FLOPs at marginal accuracy loss. It outperforms the strongest dynamic MoE baseline by 6.1 and 4.0 points on the two models, and delivers ~1.20times end-to-end inference speedup.', 'score': 21, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '2a0427ada218c12e', 'authors': ['Xingtai Lv', 'Li Sheng', 'Kaiyan Zhang', 'Yichen You', 'Siyan Gao', 'Xueheng Luo', 'Yuxin Zuo', 'Yuchen Fan', 'Junlin Yang', 'Ganqu Cui', 'Bingning Wang', 'Fan Yang', 'Youbang Sun', 'Ning Ding', 'Bowen Zhou'], 'affiliations': ['Frontis.AI', 'Kuaishou Technology', 'Shanghai AI Lab', 'Tsinghua University', 'WeChat AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.18643.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Адаптация статических MoE в динамические модели без переобучения', 'desc': 'В статье представлен метод ZEDA для преобразования уже обученных статических моделей Mixture-of-Experts в эффективные динамические версии без переобучения с нуля. Подход использует self-distillation с замороженной исходной моделью в качестве учителя и добавляет параметр-свободные эксперты с нулевым выходом для стабилизации архитектурного преобразования. Благодаря двухэтапной адаптации с балансировкой потерь на уровне групп, метод достигает сокращения вычислительных операций экспертов более чем на 50% с минимальной потерей точности. На нескольких моделях и бенчмарках ZEDA показывает улучшение на 4-6 пунктов по сравнению с альтернативными динамическими подходами и обеспечивает ускорение вывода примерно в 1.2 раза.'}, 'en': {'title': 'Transforming Static Models into Dynamic Efficiency with ZEDA', 'desc': 'The paper presents Zero-Expert Self-Distillation Adaptation (ZEDA), a method that enhances Mixture-of-Experts (MoE) models by making them dynamic and more efficient. ZEDA allows static MoE models to adapt without extensive retraining, significantly reducing computational costs during inference. By introducing zero-output experts and employing a two-stage self-distillation process, ZEDA stabilizes the conversion of static models to dynamic ones. The results show that ZEDA achieves over 50% reduction in expert FLOPs while maintaining accuracy, outperforming existing dynamic MoE methods and improving inference speed.'}, 'zh': {'title': '高效动态专家混合模型的自适应转化', 'desc': '零专家自蒸馏适应（ZEDA）是一种高效的动态专家混合模型方法，通过将静态模型转化为自适应模型，降低计算成本并提高推理速度。专家混合模型（MoE）通过稀疏激活专家来高效扩展语言模型，而动态变体则根据输入动态调整激活的专家，从而进一步减少计算量。现有的动态MoE方法通常依赖于从头开始的预训练或特定任务的适应，导致完全训练的MoE的实际转换尚未得到充分探索。ZEDA通过在每个MoE层中注入无参数的零输出专家，并通过两阶段自蒸馏来适应增强模型，从而实现了这种转换，显著提高了推理效率。'}}}, {'id': 'https://huggingface.co/papers/2605.17260', 'title': 'LiteFrame: Efficient Vision Encoders Unlock Frame Scaling in Video LLMs', 'url': 'https://huggingface.co/papers/2605.17260', 'abstract': 'Abstract LiteFrame, a lightweight video encoder with Compressed Token Distillation training method, reduces latency and increases frame processing capacity for long-form video understanding in Video LLMs while maintaining accuracy.  AI-generated summary The fundamental challenge in scaling Video Large Language Models (Video LLMs) to long-form video lies in managing the explosion of visual-token context length. Existing strategies predominantly focus on "post-hoc" token reduction -- reducing visual tokens after feature extraction to alleviate the LLM\'s computational overhead. While these methods effectively reduce the number of visual tokens, we observe that the primary latency bottleneck then shifts from the LLM to the expensive per-frame processing of the vision encoder. To address this, we introduce LiteFrame, a strong, yet highly efficient video encoder backbone for Video LLMs. To train LiteFrame, we propose Compressed Token Distillation (CTD), a novel training framework that teaches a compact student vision encoder to directly predict information-dense, spatio-temporally compressed representations produced by a large teacher vision model, effectively bypassing redundant computation. When coupled with further Language Model Adaptation (LMA), this approach results in a new latency-accuracy Pareto frontier -- compared with InternVL3-8B, LiteFrame provides a 35% reduction in end-to-end latency while processing 8times more frames and improves average video understanding accuracy across multiple benchmarks. Our results demonstrate a new potential path to unlocking longer-form video understanding under fixed compute budgets.', 'score': 17, 'issue_id': 2262, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'cf5522a8f58126e7', 'authors': ['Jihwan Kim', 'Nikhil Parthasarathy', 'Danfeng Qin', 'Junhwa Hur', 'Deqing Sun', 'Bohyung Han', 'Ming-Hsuan Yang', 'Boqing Gong'], 'affiliations': ['Google DeepMind', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17260.jpg', 'data': {'categories': ['#long_context', '#multimodal', '#optimization', '#training', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Лёгкий видеокодировщик для понимания длинных видео через дистилляцию сжатых токенов', 'desc': 'В статье предложена LiteFrame — лёгкий видеокодировщик для Video LLMs, который решает проблему обработки длинных видео с высокой латентностью. Авторы разработали метод обучения Compressed Token Distillation (CTD), при котором компактная нейросеть-ученик учится воспроизводить сжатые пространственно-временные представления, полученные от большой учительской модели, избегая избыточных вычислений. При комбинировании с адаптацией языковой модели (LMA) подход достигает снижения латентности на 35% и обработки в 8 раз больше кадров в сравнении с InternVL3-8B при сохранении или улучшении точности. Метод открывает новые возможности для обработки длинных видеопоследовательностей при фиксированных вычислительных ресурсах.'}, 'en': {'title': 'Efficient Video Understanding with LiteFrame', 'desc': 'LiteFrame is a lightweight video encoder designed to enhance the efficiency of Video Large Language Models (Video LLMs) for long-form video understanding. It introduces a training method called Compressed Token Distillation (CTD), which allows a smaller vision encoder to learn from a larger model, reducing unnecessary computations. This approach not only decreases latency but also increases the number of frames processed simultaneously, improving overall accuracy. By integrating Language Model Adaptation (LMA), LiteFrame achieves a significant reduction in processing time while maintaining high performance across various benchmarks.'}, 'zh': {'title': 'LiteFrame：高效视频编码，提升长视频理解能力', 'desc': 'LiteFrame是一种轻量级视频编码器，采用压缩令牌蒸馏训练方法，旨在减少延迟并提高长视频理解的帧处理能力，同时保持准确性。该研究解决了在扩展视频大语言模型时，视觉令牌上下文长度爆炸的问题。通过引入LiteFrame和压缩令牌蒸馏（CTD）框架，LiteFrame能够高效地预测由大型教师视觉模型生成的信息密集型表示，从而避免冗余计算。与InternVL3-8B相比，LiteFrame在处理8倍帧数的同时，减少了35%的端到端延迟，并提高了多个基准测试中的视频理解准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.18451', 'title': 'Code-as-Room: Generating 3D Rooms from Top-Down View Images via Agentic Code Synthesis', 'url': 'https://huggingface.co/papers/2605.18451', 'abstract': 'Abstract A novel MLLM-based agentic framework called Code-as-Room generates 3D indoor rooms by converting top-down images into executable Blender code through a structured execution harness with cross-stage memory to maintain context.  AI-generated summary Designing realistic and functional 3D indoor rooms is essential for a wide range of applications, including interior design, virtual reality, gaming, and embodied AI. While recent MLLM-based approaches have shown great potential for 3D room synthesis from textual descriptions or reference images, text-based methods struggle to capture precise spatial information, and existing image-conditioned agents suffer from instability and infinite looping when tasked with holistic room generation from top-down views. To address these limitations, we propose Code-as-Room, an MLLM-based agentic framework equipped with a structured execution harness, which represents 3D rooms with Blender codes. Given a top-down room image, the framework parses the reference image to extract scene elements and their spatial relationships, and synthesizes executable Blender code for geometry, materials, and lighting in a principled, multi-stage pipeline. A cross-stage memory module is maintained throughout to mitigate context forgetting inherent to existing agent-based frameworks. We further introduce a dedicated benchmark for code-based 3D room synthesis, encompassing various evaluation protocols. Based on our benchmark, comprehensive comparisons against existing agent-based methods are conducted to validate the effectiveness of our proposed execution harness.', 'score': 14, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '5a973e3648500da8', 'authors': ['Yixuan Yang', 'Zhen Luo', 'Wanshui Gan', 'Jinkun Hao', 'Junru Lu', 'Jinghao Yan', 'Zhaoyang Lyu', 'Xudong Xu'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Southern University of Science and Technology', 'University of Warwick'], 'pdf_title_img': 'assets/pdf/title_img/2605.18451.jpg', 'data': {'categories': ['#multimodal', '#agents', '#benchmark', '#3d'], 'emoji': '🏠', 'ru': {'title': 'От топографии к коду: многомодальный агент для синтеза реалистичных 3D интерьеров', 'desc': 'Статья представляет Code-as-Room, многомодальный LLM-агент для синтеза 3D интерьеров на основе изображений сверху. Система преобразует топографические снимки в исполняемый код Blender через структурированный конвейер обработки, анализируя элементы сцены и их пространственные отношения. Ключевой инновацией является кросс-этапный модуль памяти, который сохраняет контекст на протяжении всего процесса генерации и предотвращает проблемы с потерей информации и циклическими ошибками. Авторы предложили новый бенчмарк для оценки методов кодо-ориентированного синтеза 3D комнат и продемонстрировали превосходство своего подхода над существующими агентными системами.'}, 'en': {'title': 'Transforming Images into 3D Spaces with Code-as-Room', 'desc': "The paper introduces Code-as-Room, a novel framework that uses MLLM (Multi-Modal Large Language Model) to generate 3D indoor rooms from top-down images by converting them into executable Blender code. This framework addresses the challenges of existing methods that struggle with spatial accuracy and stability during room generation. By employing a structured execution harness and a cross-stage memory module, Code-as-Room effectively maintains context and synthesizes detailed room elements, including geometry, materials, and lighting. The authors also present a new benchmark for evaluating code-based 3D room synthesis, demonstrating the framework's superiority over traditional agent-based approaches."}, 'zh': {'title': 'Code-as-Room：智能生成3D室内空间的创新框架', 'desc': '本文提出了一种新的基于多模态大语言模型（MLLM）的框架，称为Code-as-Room，旨在通过将俯视图图像转换为可执行的Blender代码来生成3D室内空间。该框架采用结构化执行工具，能够提取场景元素及其空间关系，并在多阶段流程中合成几何、材料和照明的Blender代码。为了克服现有基于图像的代理方法在整体房间生成中的不稳定性和无限循环问题，框架中引入了跨阶段记忆模块，以保持上下文信息。我们还建立了一个专门的基准测试，用于评估基于代码的3D房间合成方法的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.17672', 'title': 'Stop When Reasoning Converges: Semantic-Preserving Early Exit for Reasoning Models', 'url': 'https://huggingface.co/papers/2605.17672', 'abstract': 'Abstract Researchers introduce PUMA, a framework that uses semantic redundancy detection to improve reasoning efficiency in large models by identifying when continued thinking provides no new insights, thus reducing computational waste while maintaining answer accuracy and reasoning quality.  AI-generated summary Large Reasoning Models (LRMs) achieve strong performance by generating long chains of thought (CoT), but often overthink, continuing to reason after a solution has already stabilized and thereby wasting tokens and increasing latency. Existing inference-time early-exit methods rely primarily on answer-level signals, such as confidence or trial-answer consistency, to decide when to stop. However, these signals mainly reflect answer readiness rather than reasoning convergence: they may trigger before the model has finished exploring or self-correcting, causing premature exits that can degrade final-answer accuracy and leave the retained reasoning chain semantically incomplete. We identify reasoning-level semantic redundancy as a complementary signal for semantic-preserving early exit: when successive steps no longer add novel progress and instead revisit established conclusions, the reasoning trajectory has likely converged. Building on this insight, we propose PUMA, a plug-and-play framework that combines a lightweight Redundancy Detector with answer-level verification. The detector flags semantically redundant candidate exits, while verification confirms whether stopping is safe, allowing PUMA to remove redundant continuation while preserving both answer accuracy and a coherent reasoning prefix. Across five LRMs and five challenging reasoning benchmarks, PUMA achieves 26.2% average token reduction while preserving accuracy and retained CoT quality. Additional experiments on code generation, zero-shot vision-language reasoning, and learned stopping-policy internalization further demonstrate that reasoning-level redundancy is a robust, transferable, and learnable signal for efficient reasoning. Our code is available at https://github.com/giovanni-vaccarino/PUMA.', 'score': 12, 'issue_id': 2262, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': '13382a26468baf69', 'authors': ['Dehai Min', 'Giovanni Vaccarino', 'Huiyi Chen', 'Yongliang Wu', 'Gal Yona', 'Lu Cheng'], 'affiliations': ['Google Research', 'Politecnico di Milano', 'University of Illinois Chicago', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.17672.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#open_source'], 'emoji': '🛑', 'ru': {'title': 'Останавливай рассуждение вовремя: семантическая избыточность как сигнал для эффективного вывода', 'desc': 'Исследователи представляют PUMA — фреймворк для оптимизации вывода больших языковых моделей, который использует детектор семантической избыточности для определения момента, когда дальнейшее рассуждение не добавляет новую информацию. В отличие от существующих методов ранней остановки, основанных на сигналах уверенности модели, PUMA анализирует сходимость цепочки мысли на уровне рассуждений, выявляя повторение уже установленных выводов. Фреймворк комбинирует детектор избыточности с верификацией ответа, позволяя безопасно останавливать вычисления и сокращать использование токенов на 26.2% без потери точности. Метод демонстрирует универсальность и применимость к различным задачам от логического вывода до генерации кода.'}, 'en': {'title': 'PUMA: Smart Reasoning for Efficient AI', 'desc': 'The paper presents PUMA, a framework designed to enhance the efficiency of large reasoning models (LRMs) by detecting semantic redundancy during reasoning processes. By identifying when further reasoning does not yield new insights, PUMA reduces unnecessary computational resources while ensuring the accuracy of the final answers. Unlike traditional early-exit methods that rely on answer-level signals, PUMA focuses on reasoning-level signals to determine when to stop processing. The results show that PUMA can significantly decrease token usage without compromising the quality of the reasoning chain or the accuracy of the answers.'}, 'zh': {'title': 'PUMA：提升推理效率的智能框架', 'desc': '研究人员提出了PUMA框架，通过语义冗余检测来提高大型模型的推理效率。该框架能够识别何时继续思考不会带来新的见解，从而减少计算浪费，同时保持答案的准确性和推理质量。现有的早期退出方法主要依赖于答案级信号，而PUMA则引入了推理级的语义冗余作为补充信号，以判断推理是否已经收敛。通过这一创新，PUMA在多个推理基准上实现了显著的令牌减少，同时保持了高质量的推理链。'}}}, {'id': 'https://huggingface.co/papers/2605.14368', 'title': 'Where Should Diffusion Enter a Language Model? Geometry-Guided Hidden-State Replacement', 'url': 'https://huggingface.co/papers/2605.14368', 'abstract': 'Abstract DiHAL, a geometry-guided diffusion-transformer hybrid, identifies optimal layers for diffusion integration in pretrained transformers by using geometry-based proxies to select diffusion-friendly hidden-state interfaces, enabling more effective language modeling compared to traditional continuous diffusion approaches.  AI-generated summary Continuous diffusion language models lag behind autoregressive transformers, partly because diffusion is applied in spaces poorly suited to language denoising and token recovery. We propose DiHAL, a geometry-guided diffusion-transformer hybrid that asks where diffusion should enter a pretrained transformer. DiHAL scores layers with geometry-based proxies, selects a diffusion-friendly hidden-state interface, and replaces the lower transformer prefix with a diffusion bridge while retaining the upper layers and original LM head. By reconstructing the selected-layer hidden state rather than tokens, DiHAL avoids direct continuous-to-discrete recovery. Experiments on 8B-scale backbones show that the geometry score predicts effective shallow insertion layers under a fixed bridge-training protocol and that hidden-state recovery improves over continuous diffusion baselines in a diagnostic comparison matching the diffusion/recovery training budget. These results suggest that hidden-state geometry helps identify where diffusion-based replacement is feasible inside pretrained language models.', 'score': 12, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '4a682ee0fc61bdd2', 'authors': ['Injin Kong', 'Hyoungjoon Lee', 'Yohan Jo'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14368.jpg', 'data': {'categories': ['#training', '#architecture', '#diffusion', '#optimization'], 'emoji': '🧭', 'ru': {'title': 'Геометрия показывает куда встраивать диффузию в трансформеры', 'desc': 'В статье предлагается DiHAL — гибридный подход, объединяющий диффузионные модели и трансформеры для улучшения языкового моделирования. Авторы используют геометрические прокси для определения оптимальных слоёв трансформера, где следует интегрировать диффузионный процесс вместо попытки применять его ко всей модели. Предложенный метод заменяет нижние слои трансформера диффузионным мостом, восстанавливая скрытые состояния вместо токенов, что избегает проблемы прямого преобразования между непрерывным и дискретным пространствами. Экспериментальные результаты показывают, что геометрические оценки эффективно предсказывают слои для вставки диффузии и обеспечивают улучшение по сравнению с базовыми подходами непрерывной диффузии.'}, 'en': {'title': 'Revolutionizing Language Modeling with Geometry-Guided Diffusion', 'desc': 'The paper introduces DiHAL, a new model that combines diffusion processes with transformers to improve language modeling. It uses geometry-based methods to determine the best layers in a pretrained transformer for integrating diffusion, which helps in better recovering hidden states. Unlike traditional methods that focus on token recovery, DiHAL reconstructs hidden states directly, making the process more efficient. Experiments show that this approach outperforms existing continuous diffusion models by effectively utilizing the structure of the transformer.'}, 'zh': {'title': '几何引导的扩散-变换器混合模型', 'desc': 'DiHAL是一种几何引导的扩散-变换器混合模型，旨在通过几何代理选择适合扩散的隐藏状态接口，从而优化预训练变换器中的扩散集成层。与传统的连续扩散方法相比，DiHAL在语言建模方面表现更为有效。该模型通过重建选定层的隐藏状态，而不是直接恢复标记，避免了连续到离散的直接转换。实验结果表明，几何评分能够有效预测在固定桥接训练协议下的浅层插入层，并且隐藏状态恢复在诊断比较中优于连续扩散基线。'}}}, {'id': 'https://huggingface.co/papers/2605.14038', 'title': 'Model-Adaptive Tool Necessity Reveals the Knowing-Doing Gap in LLM Tool Use', 'url': 'https://huggingface.co/papers/2605.14038', 'abstract': 'Abstract Research reveals a disconnect between language models\' recognition of when tools are needed and their actual tool invocation behavior, identifying a "knowing-doing gap" in tool-use reliability.  AI-generated summary Large language models (LLMs) increasingly act as autonomous agents that must decide when to answer directly vs. when to invoke external tools. Prior work studying adaptive tool use has largely treated tool necessity as a model-agnostic property, annotated by human or LLM judge, and mostly cover cases where the answer is obvious (e.g., fetching the weather vs. paraphrasing text). However, tool necessity in the wild is more nuanced due to the divergence of capability boundaries across models: a problem solvable by a strong model on its own may still require tools for a weaker one. In this work, we introduce a model-adaptive definition of tool-necessity, grounded in each model\'s empirical performance. Following this definition, we compare the necessity against observed tool-call behavior across four models on arithmetic and factual QA dataset, and find substantial mismatches of 26.5-54.0% and 30.8-41.8%, respectively. To diagnose the failure, we decompose tool use into two stages: an internal cognition stage that reflects whether a model believes a tool is necessary, and an execution stage that determines whether the model actually makes a tool-call action. By probing the LLM hidden states, we find that both signals are often linearly decodable, yet their probe directions become nearly orthogonal in the late-layer, last-token regime that drives the next-token action. By tracing the trajectory of samples in the two-stage process, we further discover that the majority of mismatch is concentrated in the cognition-to-action transition, not in cognition itself. These results reveal a knowing-doing gap in LLM tool-use: improving tool-use reliability requires not only better recognition of when tools are needed, but also better translation of that recognition into action.', 'score': 11, 'issue_id': 2262, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '9ee000aa55bce87f', 'authors': ['Yize Cheng', 'Chenrui Fan', 'Mahdi JafariRaviz', 'Keivan Rezaei', 'Soheil Feizi'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2605.14038.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark'], 'emoji': '🔀', 'ru': {'title': 'Разрыв между знанием и действием: проблема надёжности использования инструментов в LLM', 'desc': 'Исследование выявляет расхождение между способностью языковых моделей распознавать необходимость использования инструментов и их фактическим поведением при вызове этих инструментов. Авторы вводят модель-адаптивное определение необходимости инструмента, основанное на эмпирической производительности каждой модели, и обнаруживают несоответствия от 26,5% до 54,0% на арифметических задачах. Они декомпозируют процесс использования инструментов на две стадии: внутреннее познание (осознание необходимости) и исполнение (фактический вызов), анализируя скрытые состояния LLM. Основной вывод показывает, что большинство ошибок происходит при переходе от распознавания потребности к действию, а не в самом процессе распознавания.'}, 'en': {'title': 'Bridging the Knowing-Doing Gap in Tool Use for Language Models', 'desc': 'This paper investigates the gap between language models\' understanding of when to use external tools and their actual behavior in invoking those tools, termed the "knowing-doing gap." It highlights that while models can recognize tool necessity, they often fail to act on that recognition, especially in complex scenarios. The authors propose a model-adaptive definition of tool necessity, which varies based on each model\'s performance capabilities. By analyzing the decision-making process in two stages—cognition and execution—they find that most discrepancies occur in the transition from recognizing the need for a tool to actually using it.'}, 'zh': {'title': '缩小工具使用的知行差距', 'desc': '本研究揭示了语言模型在识别工具需求与实际调用工具行为之间的脱节，形成了工具使用可靠性的“知行差距”。大型语言模型（LLMs）作为自主代理，需要判断何时直接回答，何时调用外部工具。我们提出了一种基于模型实际表现的工具必要性定义，并比较了四个模型在算术和事实问答数据集上的工具调用行为，发现存在显著的不匹配。研究表明，改善工具使用的可靠性不仅需要更好地识别工具的需求，还需要更有效地将这种识别转化为实际行动。'}}}, {'id': 'https://huggingface.co/papers/2605.18287', 'title': 'StableVLA: Towards Robust Vision-Language-Action Models without Extra Data', 'url': 'https://huggingface.co/papers/2605.18287', 'abstract': 'Abstract Vision-Language-Action models exhibit degraded performance under unseen visual disturbances, but a lightweight information-theoretic adapter module significantly improves robustness with minimal parameter overhead.  AI-generated summary It is infeasible to encompass all possible disturbances within the training dataset. This raises a critical question regarding the robustness of Vision-Language-Action (VLA) models when encountering unseen real-world visual disturbances, particularly under imperfect visual conditions. In this work, we conduct a systematic study based on recent state-of-the-art VLA models and reveal a significant performance drop when visual disturbances absent from the training data are introduced. To mitigate this issue, we propose a lightweight adapter module grounded in information theory, termed the Information Bottleneck Adapter (IB-Adapter), which selectively filters potential noise from visual inputs. Without requiring any extra data or augmentation strategies, IB-Adapter consistently improves over the baseline by an average of 30%, while adding fewer than 10M parameters, demonstrating notable efficiency and effectiveness. Furthermore, even with a 14x smaller backbone (0.5B parameters) and no pre-training on the Open X-Embodiment dataset, our model StableVLA achieves robustness competitive with 7B-scale state-of-the-art VLAs. With negligible parameter overhead (<10M), our approach maintains accuracy on long-horizon tasks and surpasses OpenPi under both synthetic and physical visual corruptions.', 'score': 9, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'c673b31574d84772', 'authors': ['Yiyang Fu', 'Chubin Zhang', 'Shukai Gong', 'Yufan Deng', 'Kaiwei Sun', 'Qiyang Min', 'Qibin Hou', 'Yansong Tang', 'Jianan Wang', 'Daquan Zhou'], 'affiliations': ['Astribot', 'Nanjing University', 'Nankai University', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.18287.jpg', 'data': {'categories': ['#multimodal', '#training', '#small_models', '#robotics', '#architecture'], 'emoji': '🛡️', 'ru': {'title': 'Информационный фильтр для устойчивости мультимодальных моделей к невидимым искажениям', 'desc': 'В работе изучается проблема неустойчивости моделей Vision-Language-Action (VLA) к визуальным искажениям, которые не встречались при обучении. Авторы предлагают легковесный адаптивный модуль IB-Adapter, основанный на теории информации, который фильтрует шум из визуальных входных данных. Модуль улучшает производительность в среднем на 30%, добавляя менее 10 миллионов параметров, без необходимости дополнительных данных или аугментации. Разработанная модель StableVLA демонстрирует конкурентоспособную робастность даже с 14-кратно меньшей архитектурой, сохраняя точность на длинногоризонтных задачах и преодолевая артефакты как синтетических, так и реальных визуальных помех.'}, 'en': {'title': 'Enhancing VLA Robustness with Minimal Overhead', 'desc': "This paper addresses the challenge of Vision-Language-Action (VLA) models struggling with unseen visual disturbances that were not part of their training data. The authors introduce the Information Bottleneck Adapter (IB-Adapter), a lightweight module that enhances the model's robustness by filtering out noise from visual inputs. Remarkably, this adapter improves performance by an average of 30% without requiring additional data or complex augmentation techniques. The proposed method demonstrates efficiency, achieving competitive robustness with significantly fewer parameters compared to larger state-of-the-art models."}, 'zh': {'title': '提升视觉-语言-动作模型鲁棒性的轻量级适配器', 'desc': '本文研究了视觉-语言-动作（VLA）模型在面对未见过的视觉干扰时的鲁棒性问题。我们发现，当引入训练数据中不存在的视觉干扰时，模型性能显著下降。为了解决这个问题，我们提出了一种基于信息理论的轻量级适配器模块，称为信息瓶颈适配器（IB-Adapter），它能够有效过滤视觉输入中的潜在噪声。IB-Adapter在不增加额外数据或增强策略的情况下，平均提高了30%的性能，同时仅增加了不到10M的参数，展现了显著的效率和有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.17242', 'title': 'From Runnable to Shippable: Multi-Agent Test-Driven Development for Generating Full-Stack Web Applications from Requirements', 'url': 'https://huggingface.co/papers/2605.17242', 'abstract': "Abstract TDDev automates test-driven development for web application generation by integrating requirement analysis, browser-based validation, and structured repair reporting to improve code quality and reduce human intervention.  AI-generated summary Coding agents can generate web applications from natural-language descriptions, yet a recent benchmark study shows that generated applications fail to meet functional requirements in over 70% of cases. The core difficulty is that web correctness cannot be assessed from source files or terminal output: the application must be deployed, exercised through simulated browser interactions, and failures must be translated into actionable repair signals -- steps that current agents cannot perform without human mediation.   We present TDDev, a framework that automates this closed loop through three stages: (1) converting high-level requirements into structured acceptance tests before any code is written, (2) deploying the application and validating it through browser-based interaction simulation, and (3) translating browser-observed failures into structured repair reports for the coding agent. Enabled by TDDev, we conduct the first controlled empirical study of Test-driven development (TDD) strategies for web application generation, comparing four development protocols across two coding agents, two backbone models, and two benchmarks. TDD infrastructure consistently improves generation quality by 34--48 percentage points over a no-TDD baseline. The central finding is that the optimal protocol depends on the model's generation style: models that build applications holistically benefit most from agentic enforcement, while models that extend code conservatively benefit from incremental enforcement. Mismatching protocol to generation style eliminates the TDD benefit entirely while multiplying token cost up to 25-fold. A user study confirms that TDDev reduces manual developer intervention to zero, shifting the workload from continuous prompt engineering to autonomous, feedback-driven refinement.", 'score': 7, 'issue_id': 2263, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'f3e6b94a2134bfec', 'authors': ['Yuxuan Wan', 'Tingshuo Liang', 'Jiakai Xu', 'Jingyu Xiao', 'Yintong Huo', 'Michael R Lyu'], 'affiliations': ['Columbia University', 'Singapore Management University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.17242.jpg', 'data': {'categories': ['#plp', '#agents', '#benchmark'], 'emoji': '🧪', 'ru': {'title': 'TDD для автоматической генерации веб-приложений: от требований к исправленному коду', 'desc': 'TDDev — это фреймворк, который автоматизирует разработку веб-приложений с использованием методологии TDD (test-driven development). Система преобразует требования в структурированные тесты приёмки, развёртывает приложение и валидирует его через имитацию взаимодействия браузера, а затем переводит обнаруженные ошибки в сигналы для исправления кода. Экспериментальное исследование показало, что применение TDD улучшает качество генерируемых приложений на 34-48 процентных пункта по сравнению с базовым подходом. Ключевой вывод заключается в том, что оптимальная стратегия зависит от стиля генерации модели: целостный подход требует строгого контроля агента, а инкрементальный — пошагового усиления.'}, 'en': {'title': 'Automating Test-Driven Development for Better Web Apps', 'desc': "TDDev is a framework designed to automate test-driven development (TDD) for generating web applications, enhancing code quality while minimizing human effort. It operates in three stages: first, it transforms high-level requirements into structured acceptance tests; second, it deploys the application and simulates browser interactions for validation; and third, it converts any failures observed during testing into actionable repair reports. The study shows that using TDD strategies significantly improves the quality of generated applications, with enhancements ranging from 34% to 48% compared to traditional methods. Additionally, the effectiveness of TDD depends on aligning the development protocol with the coding model's generation style, highlighting the importance of tailored approaches in automated development."}, 'zh': {'title': 'TDDev：自动化测试驱动开发的未来', 'desc': 'TDDev是一个自动化测试驱动开发的框架，旨在提高网页应用程序的代码质量并减少人工干预。它通过三个阶段实现这一目标：首先，将高层次需求转化为结构化的验收测试；其次，通过浏览器交互模拟部署和验证应用程序；最后，将浏览器观察到的失败转化为结构化的修复报告。研究表明，使用TDDev的测试驱动开发策略可以将生成质量提高34%到48%。此外，用户研究确认TDDev能够将开发者的手动干预减少到零，转而实现自主的、基于反馈的优化。'}}}, {'id': 'https://huggingface.co/papers/2605.12290', 'title': 'Targeted Neuron Modulation via Contrastive Pair Search', 'url': 'https://huggingface.co/papers/2605.12290', 'abstract': 'Abstract Contrastive neuron attribution identifies a small subset of MLP neurons that distinguish harmful from benign prompts in instruction-tuned language models, enabling effective behavioral steering without compromising output quality.  AI-generated summary Language models are instruction-tuned to refuse harmful requests, but the mechanisms underlying this behavior remain poorly understood. Popular steering methods operate on the residual stream and degrade output coherence at high intervention strengths, limiting their practical use. We introduce contrastive neuron attribution (CNA), which identifies the 0.1% of MLP neurons whose activations most distinguish harmful from benign prompts, requiring only forward passes with no gradients or auxiliary training. In instruct models, ablating the discovered circuit reduces refusal rates by over 50% on a standard jailbreak benchmark while preserving fluency and non-degeneracy across all steering strengths. Applying CNA to matched base and instruct models across Llama and Qwen architectures (from 1B to 72B parameters), we find that base models contain similar late-layer discrimination structures but steering these neurons produces only content shifts, not behavioral change. These results demonstrate that neuron-level intervention enables reliable behavioral steering without the quality tradeoffs of residual-stream methods. More broadly, our findings suggest that alignment fine-tuning transforms pre-existing discrimination structure into a sparse, targetable refusal gate.', 'score': 6, 'issue_id': 2263, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'fc8183e7a7e3cd56', 'authors': ['Sam Herring', 'Jake Naviasky', 'Karan Malhotra'], 'affiliations': ['Nous Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.12290.jpg', 'data': {'categories': ['#training', '#small_models', '#interpretability', '#security', '#architecture', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Хирургическое управление поведением языковых моделей через критические нейроны', 'desc': 'В статье предлагается метод контрастной атрибуции нейронов (CNA) для выявления небольшого набора нейронов в МЛП-слоях языковых моделей, которые отличают вредоносные запросы от безопасных. Метод требует только прямых проходов без градиентов и дополнительного обучения, позволяя эффективно управлять поведением модели. Авторы показывают, что удаление найденных нейронов снижает отказы от выполнения вредоносных команд более чем на 50% при сохранении качества генерируемого текста. Исследование демонстрирует, что точное воздействие на уровне нейронов обеспечивает надёжное управление поведением без компромисса в качестве, что характеризует выравнивание моделей как трансформацию структур различения в разреженный и управляемый механизм отказа.'}, 'en': {'title': 'Targeted Neuron Steering for Safer AI Outputs', 'desc': "This paper presents a method called Contrastive Neuron Attribution (CNA) that identifies specific neurons in multi-layer perceptrons (MLPs) of language models which can effectively distinguish between harmful and benign prompts. By focusing on just 0.1% of these neurons, CNA allows for behavioral steering of the model without degrading the quality of its outputs. Unlike traditional methods that interfere with the model's residual stream, CNA maintains fluency and coherence even at high intervention levels. The findings indicate that fine-tuning the model aligns its internal structures to create a targeted mechanism for refusing harmful requests, enhancing the model's safety without sacrificing performance."}, 'zh': {'title': '对比神经元归因：无损行为引导的新方法', 'desc': '对比神经元归因（CNA）是一种新方法，可以识别出少量的多层感知器（MLP）神经元，这些神经元能够区分有害和良性提示，从而实现有效的行为引导，而不影响输出质量。传统的引导方法通常会降低输出的一致性，限制了它们的实际应用。通过CNA，我们可以仅通过前向传播来识别出0.1%的关键神经元，这些神经元的激活最能区分有害和良性提示。我们的研究表明，针对这些神经元的干预可以在保持流畅性的同时，显著降低拒绝率，展示了神经元级别的干预能够实现可靠的行为引导。'}}}, {'id': 'https://huggingface.co/papers/2605.15572', 'title': 'Measuring Maximum Activations in Open Large Language Models', 'url': 'https://huggingface.co/papers/2605.15572', 'abstract': 'Abstract Modern open LLMs exhibit wide variation in activation magnitudes across families and training stages, with maximum values spanning four orders of magnitude and showing complex scaling patterns that differ from simple size-based expectations.  AI-generated summary The dynamic range of activations is a first-order constraint for low-bit quantization, activation scaling, and stable LLM inference. Prior work characterized outlier features and massive activations on pre-2024 LLaMA-style models, and the downstream activation-quantization stack inherits that picture without revisiting it for the post-LLaMA open-model boom. We ask the deployment-oriented question: how large can activations get in modern open LLMs, and how does this magnitude vary across families, generations, and training stages? Under a unified pipeline (5,000-sample multi-domain corpus, family-specific tokenization, identical hooks across embeddings, hidden states, attention, MLP/MoE, SwiGLU gates, and final norm), we measure global and layerwise maxima on 27 checkpoints from 8 open families spanning dense, MoE, vision-language, intermediate-training, and instruction-tuned variants. We find that (i) global maxima span over nearly four orders of magnitude at comparable parameter counts, with Qwen3.5 and MoE checkpoints in the 10^2 to 10^3 range and Gemma3-27B-it reaching ~7 x 10^5; (ii) cross-family and cross-generation comparisons break simple monotonic scaling; and (iii) MoE checkpoints exhibit 14.0-23.4x lower peaks than matched-scale dense counterparts, while the residual stream carries the global maximum in 22/24 checkpoints. A lightweight INT-8 sanity check shows that measured maxima co-vary with low-bit reconstruction error via activation-scale selection. We conclude that maximum activation magnitude is a model property tied to family, architecture, and training stage - not a simple byproduct of size - and should be measured and reported alongside any open-weight release before low-bit deployment. The code is publicly available at https://github.com/clx1415926/Max_act_llm.', 'score': 5, 'issue_id': 2262, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '5f6b4c62a2d01543', 'authors': ['Luxuan Chen', 'Han Tian', 'Xinran Chen', 'Rui Kong', 'Fang Wang', 'Jiamin Chen', 'Yuchen Li', 'Jiashu Zhao', 'Shuaiqiang Wang', 'Haoyi Xiong', 'Dawei Yin'], 'affiliations': ['Baidu Inc.', 'Independent Researcher', 'Nankai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.15572.jpg', 'data': {'categories': ['#optimization', '#open_source', '#training', '#architecture', '#inference'], 'emoji': '📊', 'ru': {'title': 'Активации современных LLM: свойство архитектуры, а не размера', 'desc': 'В статье исследуются величины активаций в современных открытых LLM моделях, которые варьируются на четыре порядка величины в зависимости от семейства и этапа обучения. Авторы измерили максимальные активации на 27 чекпоинтах из 8 различных семейств моделей, используя унифицированный pipeline с идентичными методами измерения. Они обнаружили, что максимальные значения активаций - это фундаментальное свойство архитектуры и процесса обучения модели, а не просто следствие её размера, причём MoE модели показывают значительно меньшие пики активаций. Исследование демонстрирует, что величину максимальной активации необходимо измерять и публиковать перед развёртыванием моделей для низкоразрядного квантизирования.'}, 'en': {'title': 'Understanding Activation Magnitudes in Modern Open LLMs', 'desc': "This paper investigates the activation magnitudes in modern open large language models (LLMs) and how they vary across different model families and training stages. It highlights that the maximum activation values can differ significantly, spanning nearly four orders of magnitude, which challenges the assumption that larger models always have larger activations. The study emphasizes the importance of understanding these activation patterns for effective low-bit quantization and stable inference in LLMs. The findings suggest that maximum activation is influenced by the model's architecture and training rather than just its size, indicating a need for careful measurement and reporting in model releases."}, 'zh': {'title': '激活幅度：模型特性而非规模副产品', 'desc': '现代开放的大型语言模型（LLM）在激活幅度上表现出显著的差异，这种差异在不同模型家族和训练阶段之间变化很大。研究发现，激活的最大值可以跨越近四个数量级，并且这种变化并不符合简单的规模预期。通过对27个检查点的测量，发现不同模型在激活幅度上存在复杂的非单调关系，尤其是稀疏模型（MoE）在激活峰值上显著低于密集模型。我们得出结论，最大激活幅度是与模型家族、架构和训练阶段相关的特性，而不是简单的规模副产品，因此在低位部署之前应与开放权重一起报告。'}}}, {'id': 'https://huggingface.co/papers/2605.14589', 'title': 'EndPrompt: Efficient Long-Context Extension via Terminal Anchoring', 'url': 'https://huggingface.co/papers/2605.14589', 'abstract': 'Abstract EndPrompt extends large language model context windows by using a two-segment training approach that preserves semantic continuity while enabling efficient long-range positional learning through sparse supervision.  AI-generated summary Extending the context window of large language models typically requires training on sequences at the target length, incurring quadratic memory and computational costs that make long-context adaptation expensive and difficult to reproduce. We propose EndPrompt, a method that achieves effective context extension using only short training sequences. The core insight is that exposing a model to long-range relative positional distances does not require constructing full-length inputs: we preserve the original short context as an intact first segment and append a brief terminal prompt as a second segment, assigning it positional indices near the target context length. This two-segment construction introduces both local and long-range relative distances within a short physical sequence while maintaining the semantic continuity of the training text--a property absent in chunk-based simulation approaches that split contiguous context. We provide a theoretical analysis grounded in Rotary Position Embedding and the Bernstein inequality, showing that position interpolation induces a rigorous smoothness constraint over the attention function, with shared Transformer parameters further suppressing unstable extrapolation to unobserved intermediate distances. Applied to LLaMA-family models extending the context window from 8K to 64K, EndPrompt achieves an average RULER score of 76.03 and the highest average on LongBench, surpassing LCEG (72.24), LongLoRA (72.95), and full-length fine-tuning (69.23) while requiring substantially less computation. These results demonstrate that long-context generalization can be induced from sparse positional supervision, challenging the prevailing assumption that dense long-sequence training is necessary for reliable context-window extension. The code is available at https://github.com/clx1415926/EndPrompt.', 'score': 4, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'bcd42e822f38c788', 'authors': ['Han Tian', 'Luxuan Chen', 'Xinran Chen', 'Rui Kong', 'Fang Wang', 'Jiamin Chen', 'Jinman Zhao', 'Yuchen Li', 'Jiashu Zhao', 'Shuaiqiang Wang', 'Haoyi Xiong', 'Dawei Yin'], 'affiliations': ['Baidu Inc.', 'Nankai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14589.jpg', 'data': {'categories': ['#long_context', '#optimization', '#open_source', '#training', '#architecture'], 'emoji': '📚', 'ru': {'title': 'Расширение контекста без полноразмерного обучения', 'desc': 'EndPrompt — это метод расширения контекстного окна больших языковых моделей, использующий двусегментный подход обучения. Вместо дорогостоящего обучения на полноразмерных последовательностях, метод сохраняет исходный короткий контекст и добавляет краткий дополнительный сегмент с позиционными индексами, близкими к целевой длине окна. Такая конструкция позволяет модели обучаться на локальных и дальнодействующих относительных позиционных расстояниях при сохранении семантической непрерывности текста. Теоретический анализ, основанный на ротационных позиционных эмбеддингах, показывает, что этот подход индуцирует ограничение гладкости функции внимания и эффективно расширяет контекст с 8K до 64K токенов, превосходя существующие методы при значительно меньших вычислительных затратах.'}, 'en': {'title': 'Efficiently Extending Context Windows with EndPrompt', 'desc': 'The paper introduces EndPrompt, a novel method for extending the context window of large language models without the need for extensive training on long sequences. By using a two-segment training approach, it maintains semantic continuity while allowing for efficient learning of long-range positional information. This method leverages short training sequences, preserving the original context and adding a brief terminal prompt to introduce relative positional distances. The results show that EndPrompt significantly outperforms existing methods in context extension while requiring less computational resources.'}, 'zh': {'title': 'EndPrompt：高效扩展语言模型上下文窗口', 'desc': 'EndPrompt是一种通过两段训练方法扩展大型语言模型上下文窗口的技术。它在保持语义连续性的同时，利用稀疏监督实现高效的长距离位置学习。与传统的长序列训练方法相比，EndPrompt只需短训练序列即可有效扩展上下文窗口。实验结果表明，该方法在计算效率上显著优于其他长序列训练方法，同时在长上下文泛化能力上表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.17698', 'title': 'Agent Bazaar: Enabling Economic Alignment in Multi-Agent Marketplaces', 'url': 'https://huggingface.co/papers/2605.17698', 'abstract': 'Abstract Large language models deployed as autonomous economic agents exhibit systemic risks through market instability and deception, which can be evaluated and improved through specialized simulation frameworks and reinforcement learning techniques.  AI-generated summary The deployment of Large Language Models (LLMs) as autonomous economic agents introduces systemic risks that extend beyond individual capability failures. As agents transition to directly interacting with marketplaces, their collective behavior can amplify volatility and mask deception at scale. We introduce the Agent Bazaar, a multi-agent simulation framework for evaluating Economic Alignment, the capacity of agentic systems to preserve market stability and integrity. We identify two failure modes: (1) Algorithmic Instability in a B2C market ("The Crash"), where firms amplify price volatility until the market collapses, and (2) Sybil Deception in a C2C market ("The Lemon Market"), where a single deceptive agent controlling multiple coordinated seller identities floods the market with fraudulent listings, eroding trust and consumer welfare. We evaluate frontier and open-weight models across both scenarios and find that models largely fail to self-regulate, with failure severity varying by model rather than by size. We propose economically aligned harnesses, Stabilizing Firms and Skeptical Guardians, that improve outcomes but remain fragile under harder market conditions. To close this gap, we train agents with REINFORCE++ using an adaptive curriculum, producing a 9B model that outperforms all evaluated frontier and open-weight models. We propose the Economic Alignment Score (EAS), a 4-component scalar metric aggregating stability, integrity, welfare, and profitability, enabling direct cross-model comparison. Our results show that economic alignment is orthogonal to general capability and can be directly trained with targeted RL.', 'score': 2, 'issue_id': 2263, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'b1fd0051b83bc3c9', 'authors': ['Seth Karten', 'Cameron Crow', 'Chi Jin'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17698.jpg', 'data': {'categories': ['#optimization', '#training', '#agents', '#rl', '#security', '#benchmark', '#alignment'], 'emoji': '📊', 'ru': {'title': 'Обучение честных экономических агентов: контроль стабильности рынков через подкрепление', 'desc': 'Статья исследует системные риски, возникающие при использовании больших языковых моделей (LLM) в качестве автономных агентов на рынках. Авторы предлагают фреймворк Agent Bazaar для оценки экономического выравнивания - способности агентов сохранять стабильность и целостность рынка. В работе выявлены два типа отказов: алгоритмическая нестабильность, приводящая к краху цен, и обманчивые действия скоординированных агентов, наводняющих рынок поддельными предложениями. Авторы используют обучение с подкреплением (REINFORCE++) с адаптивным учебным планом для создания модели, которая превосходит существующие решения и вводят метрику Economic Alignment Score для сравнения моделей.'}, 'en': {'title': 'Aligning AI Agents for Stable Markets', 'desc': 'This paper discusses the risks associated with using Large Language Models (LLMs) as independent economic agents, particularly how they can cause market instability and deception. It introduces the Agent Bazaar, a simulation framework designed to assess the Economic Alignment of these agents, focusing on their ability to maintain market stability. The authors identify two main failure modes: Algorithmic Instability, which leads to market crashes, and Sybil Deception, where deceptive agents manipulate the market. They propose solutions like Stabilizing Firms and Skeptical Guardians, and demonstrate that training agents with a specialized reinforcement learning approach can significantly improve their economic alignment performance.'}, 'zh': {'title': '大型语言模型的经济对齐与市场稳定性', 'desc': '本论文探讨了大型语言模型作为自主经济代理时可能引发的系统性风险，包括市场不稳定和欺骗行为。这些风险在代理直接与市场互动时会被放大，导致价格波动和信任缺失。我们提出了Agent Bazaar，一个多代理模拟框架，用于评估经济对齐能力，以维护市场稳定性和完整性。通过强化学习技术，我们训练了代理以提高经济对齐分数，结果表明经济对齐与一般能力是正交的，可以通过针对性的强化学习直接训练。'}}}, {'id': 'https://huggingface.co/papers/2605.18401', 'title': 'SkillsVote: Lifecycle Governance of Agent Skills from Collection, Recommendation to Evolution', 'url': 'https://huggingface.co/papers/2605.18401', 'abstract': 'Abstract SkillsVote is a governance framework for long-horizon LLM agents that manages reusable skills through structured collection, recommendation, and evolution processes.  AI-generated summary Long-horizon LLM agents leave traces that could become reusable experience, but raw trajectories are noisy and hard to govern. We treat Agent Skills as an experience schema that couples executable scripts, with non-executable guidance on procedures. Yet open skill ecosystems contain redundant, uneven, environment-sensitive artifacts, and indiscriminate updates can pollute future context. We present SkillsVote, a lifecycle-governance framework for Agent Skills from collection and recommendation to evolution. SkillsVote profiles a million-scale open-source corpus for environment requirements, quality, and verifiability, then synthesizes tasks for verifiable skills. Before execution, SkillsVote performs agentic library search over structured skill library to expose instructional skill context. After execution, it decomposes trajectories into skill-linked subtasks, attributes outcomes to skill use, agent exploration, environment, and result signals, and admits only successful reusable discoveries to evidence-gated updates. In our evaluation, offline evolution improves GPT-5.2 on Terminal-Bench 2.0 by up to 7.9 pp, while online evolution improves SWE-Bench Pro by up to 2.6 pp. Overall, governed external skill libraries can improve frozen agents without model updates when systems control exposure, credit, and preservation.', 'score': 1, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'e0aeafba0525443c', 'authors': ['Hongyi Liu', 'Haoyan Yang', 'Tao Jiang', 'Bo Tang', 'Feiyu Xiong', 'Zhiyu Li'], 'affiliations': ['MemTensor (Shanghai) Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.18401.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#agents', '#benchmark', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Управление знаниями агентов через голосование и верификацию навыков', 'desc': 'SkillsVote — это фреймворк управления для долгосрочных LLM агентов, который организует переиспользуемые навыки через структурированные процессы сбора, рекомендации и эволюции. Система решает проблему шумных и неупорядоченных траекторий агентов, превращая их в reusable skills — пары из исполняемых скриптов и процедурных инструкций. Фреймворк применяет строгое управление жизненным циклом навыков: профилирует большой корпус открытых исходников, синтезирует верификационные задачи и использует evidence-gated механизм обновлений для предотвращения загрязнения контекста. Эксперименты показали значительные улучшения: до 7.9 процентных пункта на Terminal-Bench 2.0 и до 2.6 пункта на SWE-Bench Pro, что демонстрирует эффективность управляемых внешних библиотек навыков.'}, 'en': {'title': 'Empowering LLMs with Structured Skill Governance', 'desc': 'SkillsVote is a governance framework designed for managing reusable skills in long-horizon large language model (LLM) agents. It addresses the challenges of noisy data and governance by treating Agent Skills as structured experience schemas that combine executable scripts with procedural guidance. The framework includes processes for collecting, recommending, and evolving skills, ensuring that only successful and verifiable skills are retained for future use. Evaluation results show that SkillsVote can enhance the performance of LLMs without requiring model updates, by effectively managing skill exposure and credit assignment.'}, 'zh': {'title': '技能治理，提升代理性能的关键', 'desc': 'SkillsVote 是一个治理框架，专为长时间运行的 LLM 代理设计，旨在通过结构化的收集、推荐和演化过程来管理可重用技能。我们将代理技能视为经验模式，结合可执行脚本和非可执行的程序指导。该框架解决了开放技能生态系统中冗余、不均匀和环境敏感的工件问题，并通过证据门控更新来确保未来上下文的清洁。评估结果表明，SkillsVote 能显著提升代理的性能，且在不更新模型的情况下，通过治理外部技能库来改善冻结代理的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.18601', 'title': 'Incantation: Natural Language as the Action Interface for Multi-Entity Video World Models', 'url': 'https://huggingface.co/papers/2605.18601', 'abstract': 'Abstract Incantation enables interactive video world modeling with natural language conditioning for fine-grained multi-entity control and cross-entity generalization through novel video backbone and attention mechanisms.  AI-generated summary Modern interactive video world models have achieved impressive visual fidelity, yet lack fine-grained multi-entity control and cross-entity, cross-world generalization. We trace this gap to the action interface: standard control protocols (e.g. animation IDs, device inputs, scene-level captions) bind action semantics to specific entities or engines at design time. We propose natural language as the interface to unlock expressiveness that no prior interface can achieve, and we present Incantation, the first interactive video world model with per-latent-frame (0.25 s) natural-language conditioning that supports simultaneous multi-entity control and concept-level cross-entity transfer beyond any fixed rendering pipeline. We pair a pretrained bidirectional video backbone with frame-local text cross-attention, and enable real-time long-horizon streaming through ODE-initialized Self-Forcing distillation with a RoPE-decoupled sliding KV-cache. We surpass the Action-Index baseline on cross-entity transfer (89% vs. 43%) and out-of-vocabulary prompts (90% vs. 0%), and our 2-step student sustains 19.7 FPS at 480p with stable FVD over 2-hour rollouts. We further apply the same architecture and training recipe to The King of Fighters, changing only the per-entity action vocabulary slots. We have released a preview subset of the Incantation dataset at https://huggingface.co/datasets/zhush/incantation-elden-ring-scenes, containing manually collected Elden Ring player-boss combat clips with structured action-oriented metadata. Larger-scale Elden Ring and KOF data will be released with the full project.', 'score': 1, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '4c5e98520ccf5468', 'authors': ['Shangwen Zhu', 'Qianyu Peng', 'Zhao Pu', 'Zhilei Shu', 'Xiangrui Ke', 'Zhaohu Xing', 'Zizhao Tong', 'Zeqing Wang', 'Xinyu Cui', 'Huangji Wang', 'Jian Zhao', 'Yeying Jin', 'Fan Cheng', 'Ruili Feng'], 'affiliations': ['HKU', 'HKUST', 'NUS', 'NVIDIA Research', 'SJTU', 'UCAS', 'USTC', 'UWaterloo', 'ZGCA'], 'pdf_title_img': 'assets/pdf/title_img/2605.18601.jpg', 'data': {'categories': ['#multimodal', '#video', '#training', '#open_source', '#games', '#architecture', '#dataset'], 'emoji': '🎮', 'ru': {'title': 'Естественный язык как универсальный интерфейс для управления видео-мирами', 'desc': 'Incantation — это первая интерактивная модель видео-мира, которая позволяет управлять несколькими сущностями одновременно через естественный язык. Вместо традиционных интерфейсов управления (ID анимаций, команды устройств), авторы используют текстовые подсказки для точного контроля над каждым элементом сцены с частотой 0.25 секунды. Архитектура объединяет предобученный видео-бэкбоун с кросс-аттеншн механизмом и техникой Self-Forcing дистилляции для стабильной генерации видео длительностью до 2 часов в реальном времени. Модель демонстрирует значительное улучшение в переносе навыков между разными сущностями и обобщении на неизвестные команды по сравнению с базовыми методами.'}, 'en': {'title': 'Unlocking Video Control with Natural Language', 'desc': 'The paper introduces Incantation, a novel interactive video world model that allows users to control multiple entities in a video using natural language. This model addresses the limitations of traditional action interfaces by enabling fine-grained control and generalization across different entities and scenarios. By utilizing a pretrained bidirectional video backbone and advanced attention mechanisms, Incantation achieves real-time performance and high fidelity in video generation. The results demonstrate significant improvements in cross-entity transfer and handling of out-of-vocabulary prompts compared to existing methods.'}, 'zh': {'title': '自然语言驱动的交互式视频建模', 'desc': '本论文提出了一种名为Incantation的交互式视频世界建模方法，利用自然语言作为控制接口，实现对多个实体的精细控制和跨实体的概念转移。通过结合预训练的双向视频骨干网络和帧局部文本交叉注意力机制，Incantation能够在每个潜在帧上进行自然语言条件化，支持实时长时间流式传输。实验结果表明，该方法在跨实体转移和处理超出词汇表的提示方面表现优异，显著超越了传统的动作索引基线。我们还发布了一个包含Elden Ring游戏战斗片段的数据集，以支持未来的研究和应用。'}}}, {'id': 'https://huggingface.co/papers/2605.17933', 'title': 'AtlasVA: Self-Evolving Visual Skill Memory for Teacher-Free VLM Agents', 'url': 'https://huggingface.co/papers/2605.17933', 'abstract': 'Abstract AtlasVA is a teacher-free visual skill memory framework for vision-language model agents that uses spatial heatmaps, visual exemplars, and symbolic text skills to improve spatial decision-making in long-horizon tasks.  AI-generated summary Vision-language model (VLM) agents increasingly rely on memory-augmented reinforcement learning to reuse experience across long-horizon tasks, yet most existing frameworks store memory as text and depend on proprietary teacher models to summarize or refine it. This design is poorly matched to spatial decision making: geometric priors are compressed into lossy language, and sparse interaction is often supervised through delayed textual feedback rather than dense visually grounded signals. We argue that reusable experience for VLM agents should remain visually grounded. Based on this insight, we propose AtlasVA, a teacher-free visual skill memory framework that organizes memory into three complementary layers: spatial heatmaps, visual exemplars, and symbolic text skills. AtlasVA further evolves danger and affinity atlases directly from trajectory statistics and lightweight grid heuristics, and reuses these self-evolving atlases as potential-based shaping rewards for reinforcement learning. This unifies perception, memory, and optimization without external LLM supervision. Experiments on Sokoban, FrozenLake, 3D embodied navigation, and 3D robotic manipulation benchmarks show that AtlasVA consistently outperforms text-centric memory baselines and competitive VLM agents, with especially strong gains on spatially intensive tasks. Homepage: https://wangpan-ustc.github.io/AtlasvaWeb', 'score': 1, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'e5b50c9d6df6c894', 'authors': ['Pan Wang', 'Yihao Hu', 'Xiujin Liu', 'Jingchu Yang', 'Hang Wang', 'Zhihao Wen'], 'affiliations': ['Ant Group', 'Sun Yat-sen University', 'University of Michigan - Ann Arbor', 'University of Science and Technology of China', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17933.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark', '#agents', '#robotics', '#rl'], 'emoji': '🗺️', 'ru': {'title': 'Визуальная память вместо текстовой: пространственные навыки для агентов', 'desc': 'AtlasVA — это фреймворк визуальной памяти навыков для агентов на основе vision-language моделей, который не требует учителя. Система организует память в три взаимодополняющие слои: пространственные тепловые карты, визуальные примеры и символические текстовые навыки. Фреймворк автоматически эволюционирует карты опасности и сродства на основе статистики траекторий и использует их как потенциальные награды для обучения с подкреплением. Эксперименты на задачах пространственного решения проблем показывают, что AtlasVA превосходит текстоцентричные подходы, сохраняя опыт в визуальной форме без внешнего контроля.'}, 'en': {'title': 'Enhancing Spatial Decision-Making with Teacher-Free Visual Memory', 'desc': 'AtlasVA is a novel framework designed for vision-language model agents that enhances their ability to make spatial decisions without relying on teacher models. It organizes memory into three layers: spatial heatmaps for visual context, visual exemplars for concrete examples, and symbolic text skills for abstract reasoning. This approach allows agents to maintain a visually grounded memory, improving their performance in long-horizon tasks by using self-evolving atlases as rewards in reinforcement learning. Experiments demonstrate that AtlasVA significantly outperforms traditional text-based memory systems, especially in tasks requiring strong spatial reasoning.'}, 'zh': {'title': 'AtlasVA：无教师的视觉技能记忆框架', 'desc': 'AtlasVA是一种无教师的视觉技能记忆框架，旨在提高视觉语言模型代理在长时间任务中的空间决策能力。该框架通过空间热图、视觉示例和符号文本技能三层次组织记忆，避免了依赖文本的传统方法。AtlasVA直接从轨迹统计和轻量级网格启发式演化出危险和亲和力图谱，并将其作为强化学习的潜在奖励。实验结果表明，AtlasVA在空间密集型任务上表现优异，超越了以文本为中心的记忆基线和竞争性视觉语言模型代理。'}}}, {'id': 'https://huggingface.co/papers/2605.18747', 'title': 'Code as Agent
