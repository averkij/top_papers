Harness', 'url': 'https://huggingface.co/papers/2605.18747', 'abstract': 'Abstract Large language models are increasingly used as operational substrates for agent reasoning and execution in agentic systems, with code serving as a unified infrastructure layer across multiple domains and applications.  AI-generated summary Recent large language models (LLMs) have demonstrated strong capabilities in understanding and generating code, from competitive programming to repository-level software engineering. In emerging agentic systems, code is no longer only a target output. It increasingly serves as an operational substrate for agent reasoning, acting, environment modeling, and execution-based verification. We frame this shift through the lens of agent harnesses and introduce code as agent harness: a unified view that centers code as the basis for agent infrastructure. To systematically study this perspective, we organize the survey around three connected layers. First, we study the harness interface, where code connects agents to reasoning, action, and environment modeling. Second, we examine harness mechanisms: planning, memory, and tool use for long-horizon execution, together with feedback-driven control and optimization that make harness reliable and adaptive. Third, we discuss scaling the harness from single-agent systems to multi-agent settings, where shared code artifacts support multi-agent coordination, review, and verification. Across these layers, we summarize representative methods and practical applications of code as agent harness, spanning coding assistants, GUI/OS automation, embodied agents, scientific discovery, personalization and recommendation, DevOps, and enterprise workflows. We further outline open challenges for harness engineering, including evaluation beyond final task success, verification under incomplete feedback, regression-free harness improvement, consistent shared state across multiple agents, human oversight for safety-critical actions, and extensions to multimodal environments. By centering code as the harness of agentic AI, this survey provides a unified roadmap toward executable, verifiable, and stateful AI agent systems.', 'score': 1, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '6030ab230ee6a6f4', 'authors': ['Xuying Ning', 'Katherine Tieu', 'Dongqi Fu', 'Tianxin Wei', 'Zihao Li', 'Yuanchen Bei', 'Jiaru Zou', 'Mengting Ai', 'Zhining Liu', 'Ting-Wei Li', 'Lingjie Chen', 'Yanjun Zhao', 'Ke Yang', 'Bingxuan Li', 'Cheng Qian', 'Gaotang Li', 'Xiao Lin', 'Zhichen Zeng', 'Ruizhong Qiu', 'Sirui Chen', 'Yifan Sun', 'Xiyuan Yang', 'Ruida Wang', 'Rui Pan', 'Chenyuan Yang', 'Dylan Zhang', 'Liri Fang', 'Zikun Cui', 'Yang Cao', 'Pan Chen', 'Dorothy Sun', 'Ren Chen', 'Mahesh Srinivasan', 'Nipun Mathur', 'Yinglong Xia', 'Hong Li', 'Hong Yan', 'Pan Lu', 'Lingming Zhang', 'Tong Zhang', 'Hanghang Tong', 'Jingrui He'], 'affiliations': ['Meta', 'Stanford University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.18747.jpg', 'data': {'categories': ['#plp', '#multimodal', '#science', '#reasoning', '#survey', '#agents'], 'emoji': '⚙️', 'ru': {'title': 'Код как унифицированная обвязка для исполнимых и верифицируемых агентных систем', 'desc': 'В работе исследуется роль кода как единого инфраструктурного слоя для агентных систем на основе больших языковых моделей. Авторы вводят концепцию «кода как обвязки агента», где код служит не только выходом системы, но и основой для рассуждений, планирования, управления памятью и взаимодействия с окружением. Исследование охватывает три ключевых уровня: интерфейс обвязки, механизмы управления (планирование, память, использование инструментов) и масштабирование от одноагентных к многоагентным системам. Работа охватывает практические приложения от ассистентов программирования до научных открытий, а также открытые вызовы в области верификации и безопасности агентных систем.'}, 'en': {'title': 'Code: The Backbone of Intelligent Agents', 'desc': "This paper discusses the role of large language models (LLMs) in enhancing agentic systems, where code is not just an output but a foundational element for agent reasoning and execution. It introduces the concept of 'code as agent harness', which emphasizes the importance of code in connecting agents to their environment and facilitating their actions. The study is organized into three layers: the harness interface, mechanisms for planning and execution, and scaling from single-agent to multi-agent systems. The paper also highlights practical applications and challenges in harness engineering, aiming to create more reliable and adaptable AI agents."}, 'zh': {'title': '代码：智能体人工智能的基础设施', 'desc': '本文探讨了大型语言模型在智能体系统中的应用，特别是代码作为智能体基础设施的重要性。代码不仅是输出结果，更是智能体推理、行动和环境建模的操作基础。文章将这一转变分为三个层次：智能体接口、智能体机制和多智能体设置的扩展。通过总结代表性方法和实际应用，本文为可执行、可验证和有状态的人工智能智能体系统提供了统一的路线图。'}}}, {'id': 'https://huggingface.co/papers/2605.17842', 'title': 'SNLP: Layer-Parallel Inference via Structured Newton Corrections', 'url': 'https://huggingface.co/papers/2605.17842', 'abstract': "Abstract Transformer models can achieve faster inference through parallel Newton-style updates that approximate sequential computations using structured Jacobian approximations and specialized regularization techniques.  AI-generated summary Autoregressive language models execute Transformer layers sequentially, creating a latency bottleneck that is not removed by conventional tensor or pipeline parallelism. We study whether this layerwise dependency can be relaxed by treating the hidden-state trace across layers as the solution of a nonlinear residual equation and solving it with parallel Newton-style updates. While this view is principled, exact Newton corrections require expensive Jacobian-vector products and naive fixed-point iterations are unstable on trained Transformers. We introduce Structured Newton Layer Parallelism (SNLP), a training and inference framework that replaces exact layer Jacobians with cheap architecture-induced surrogate dynamics. In residual Transformers, this yields Identity Newton (IDN), where the correction reduces to a prefix-sum-like update; in mHC-style architectures, HC Newton (HCN) uses the model's residual mixing matrix. We further introduce SNLP-aware regularization, which trains models to make one or a few structured Newton iterations accurately approximate the sequential forward. Experiments on nanochat-scale Transformers show that SNLP regularization improves layer-parallel compatibility and can also improve standard sequential perplexity, reducing baseline PPL by 4.7%-23.4%. At inference time, SNLP combined with layer fusion and chunkwise decomposition achieves practical wall-clock speedups: on a 0.5B Nanochat model, it reaches 2.3x speedup while still improving PPL by 6.1%. These results suggest that layer-parallel inference is not merely a numerical approximation to sequential execution, but can act as a useful solver-induced inference bias. We also characterize limitations: off-the-shelf pretrained models are less amenable to this procedure, and exact convergence recovers the sequential computation rather than providing monotonic inference-time scaling.", 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'ca138af87356d781', 'authors': ['Ligong Han', 'Kai Xu', 'Hao Wang', 'Akash Srivastava'], 'affiliations': ['Core AI, IBM', 'MIT-IBM Watson AI Lab', 'Red Hat AI Innovation'], 'pdf_title_img': 'assets/pdf/title_img/2605.17842.jpg', 'data': {'categories': ['#small_models', '#optimization', '#training', '#architecture', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Параллельный вывод трансформеров через структурированные Newton-итерации', 'desc': 'В статье предложен метод Structured Newton Layer Parallelism (SNLP) для ускорения инференса трансформеров путём замены последовательного выполнения слоёв на параллельные Newton-подобные обновления. Авторы рассматривают скрытые состояния через слои как решение нелинейного остаточного уравнения и используют структурированные аппроксимации якобиана вместо точных, дорогостоящих вычислений. Введена специальная регуляризация при обучении, которая позволяет одной или нескольким Newton-итерациям хорошо приближать последовательный проход сети. Эксперименты показывают практическое ускорение вывода в 2.3x на моделях среднего размера при одновременном улучшении качества.'}, 'en': {'title': 'Speeding Up Transformers with Structured Parallel Updates', 'desc': 'This paper introduces Structured Newton Layer Parallelism (SNLP), a method to speed up inference in Transformer models by allowing parallel updates instead of sequential computations. It addresses the latency issues caused by autoregressive language models that process layers one at a time. By using structured Jacobian approximations and specialized regularization techniques, SNLP enables faster and more efficient training and inference. The results show significant improvements in both speed and perplexity, demonstrating that layer-parallel inference can effectively enhance model performance.'}, 'zh': {'title': '结构化牛顿层并行性：加速变换器推理的新方法', 'desc': '本文提出了一种新的训练和推理框架，称为结构化牛顿层并行性（SNLP），旨在加速变换器模型的推理过程。通过将隐藏状态视为非线性残差方程的解，并使用并行牛顿风格的更新，SNLP能够减少层间依赖性，从而提高推理速度。实验表明，SNLP正则化不仅改善了层并行兼容性，还降低了标准序列困惑度（PPL），在推理时实现了显著的速度提升。尽管预训练模型在此方法上效果较差，但SNLP展示了层并行推理的潜力，超越了传统的序列执行。'}}}, {'id': 'https://huggingface.co/papers/2605.17199', 'title': 'Geometric Phase Transition Enables Extreme Hippocampal Memory Capacity', 'url': 'https://huggingface.co/papers/2605.17199', 'abstract': 'Abstract Superior spatial memory emerges from hippocampal population geometry transitioning from disorganized to crystalline states, enabling higher capacity and stability through topological rigidity and specific neural circuit dynamics.  AI-generated summary Memory systems can store vastly different amounts of information despite similar hardware constraints. Here, we show that superior spatial memory emerges from a discrete stiffening of hippocampal population geometry-a transition from disorganized to crystalline collective coding. Comparing food-caching chickadees to non-caching zebra finches, we found that the caching hippocampus maintains a topologically rigid, "crystalline" geometry with significantly higher geometric stability (Shesha 0.245 v 0.166) and nearly two-fold greater temporal coherence (Shesha 0.393 v 0.209), while the non-caching hippocampus resembles a disorganized "mist." This stability is actively constructed by synergistic circuit dynamics: excitatory neurons form the spatial scaffold while inhibitory populations contribute orthogonal decorrelation, a circuit motif in which excitatory and inhibitory populations occupy largely non-overlapping representational subspaces. A double dissociation with Valiant\'s Stable Memory Allocator, a model predicting that dedicated neuron ensembles underlie each memory, confirms this advantage reflects continuous topological organization rather than discrete neuron allocation: caching networks exhibit near-zero split-half allocation reliability despite their geometric superiority. Computational modeling across 10k configurations reveals topological rigidity as the mathematical prerequisite for scale: crystalline codes sustain high-fidelity readout beyond M=1k locations while mist codes fail below M=10, a >100-fold capacity advantage. This capacity requires a 169fold representational redundancy: a "geometric tax" stabilizing the manifold against biological noise. These results establish geometric stability as a candidate organizing principle of biological memory: evolution achieves high-capacity memory not by proliferating neurons, but by engineering the geometry of the neural code itself.', 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '6bd52388b203432e', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.17199.jpg', 'data': {'categories': ['#science'], 'emoji': '🧠', 'ru': {'title': 'Кристаллическая геометрия нейронного кода как основа высокоемкой памяти', 'desc': 'В исследовании показано, что превосходная пространственная память возникает благодаря переходу геометрии популяции нейронов гиппокампа из неупорядоченного состояния в кристаллическое, обеспечивающее топологическую жесткость. Сравнивая птиц, которые прячут пищу (бурые поползни) с теми, которые этого не делают (зебровые амадины), исследователи обнаружили, что упорядоченная геометрия кодирования обеспечивает большую стабильность и когерентность нейральных представлений. Стабильность поддерживается синергией возбуждающих и тормозных нейронов, занимающих непересекающиеся представительские подпространства. Вычислительное моделирование показало, что топологическая жесткость кристаллических кодов позволяет достичь более чем 100-кратного преимущества в емкости памяти по сравнению с неупорядоченными кодами.'}, 'en': {'title': 'Crystalline Geometry: The Key to Superior Spatial Memory', 'desc': 'This paper explores how the geometry of neural populations in the hippocampus affects spatial memory. It shows that a transition from a disorganized to a crystalline state in hippocampal coding leads to better memory capacity and stability. The study compares food-caching chickadees, which have a more organized hippocampal structure, to non-caching zebra finches, revealing that the former has a more stable and coherent memory representation. The findings suggest that enhancing the geometric organization of neural codes, rather than simply increasing neuron numbers, is key to improving memory performance.'}, 'zh': {'title': '几何稳定性：生物记忆的关键', 'desc': '这篇论文探讨了海马体的群体几何结构如何影响空间记忆的优越性。研究发现，具有更高记忆能力的动物（如储食的山雀）其海马体呈现出更为稳定的“晶体”几何结构，而非储食的动物则表现为无序的“雾状”结构。通过对比两种鸟类，研究表明，晶体几何结构能够提供更高的几何稳定性和时间一致性，这种稳定性是由兴奋性和抑制性神经元的协同动态构建的。最终，论文提出几何稳定性是生物记忆的一个重要组织原则，进化通过优化神经编码的几何结构来实现高容量记忆，而不是单纯增加神经元的数量。'}}}];

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (7)', '#agi', '#alignment (2)', '#architecture (8)', '#audio', '#benchmark (6)', '#cv (1)', '#data', '#dataset (3)', '#diffusion (1)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare', '#inference (4)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (7)', '#open_source (5)', '#optimization (8)', '#plp (2)', '#rag', '#reasoning (3)', '#rl (2)', '#rlhf (1)', '#robotics (2)', '#science (2)', '#security (2)', '#small_models (3)', '#story_generation', '#survey (1)', '#synthetic', '#training (11)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-19 06:44',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-19 06:44')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-19 06:44')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
