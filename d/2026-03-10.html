    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.07980', 'title': '\\$OneMillion-Bench: How Far are Language Agents from Human Experts?', 'url': 'https://huggingface.co/papers/2603.07980', 'abstract': 'Abstract A new benchmark evaluates language models on complex, real-world professional tasks requiring multi-step reasoning, evidence resolution, and domain-specific decision-making across multiple industries.  \t\t\t\t\tAI-generated summary As language models (LMs) evolve from chat assistants to long-horizon agents capable of multi-step reasoning and tool use, existing benchmarks remain largely confined to structured or exam-style tasks that fall short of real-world professional demands. To this end, we introduce \\OneMillion-Bench OneMillion-Bench, a benchmark of 400 expert-curated tasks spanning Law, Finance, Industry, Healthcare, and Natural Science, built to evaluate agents across economically consequential scenarios. Unlike prior work, the benchmark requires retrieving authoritative sources, resolving conflicting evidence, applying domain-specific rules, and making constraint decisions, where correctness depends as much on the reasoning process as the final answer. We adopt a rubric-based evaluation protocol scoring factual accuracy, logical coherence, practical feasibility, and professional compliance, focused on expert-level problems to ensure meaningful differentiation across agents. Together, \\$OneMillion-Bench provides a unified testbed for assessing agentic reliability, professional depth, and practical readiness in domain-intensive scenarios.', 'score': 11, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'ad309b95dec64c30', 'authors': ['Qianyu Yang', 'Yang Liu', 'Jiaqi Li', 'Jun Bai', 'Hao Chen', 'Kaiyuan Chen', 'Tiliang Duan', 'Jiayun Dong', 'Xiaobo Hu', 'Zixia Jia', 'Yang Liu', 'Tao Peng', 'Yixin Ren', 'Ran Tian', 'Zaiyuan Wang', 'Yanglihong Xiao', 'Gang Yao', 'Lingyue Yin', 'Ge Zhang', 'Chun Zhang', 'Jianpeng Jiao', 'Zilong Zheng', 'Yuan Gong'], 'affiliations': ['BIGAI', 'Humanlaya', 'M-A-P', 'xbench'], 'pdf_title_img': 'assets/pdf/title_img/2603.07980.jpg', 'data': {'categories': ['#survey', '#healthcare', '#benchmark', '#agents', '#science', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Профессиональный бенчмарк для оценки надежности агентов в сложных реальных сценариях', 'desc': 'В работе представлен новый бенчмарк OneMillion-Bench, содержащий 400 экспертно подобранных задач из области права, финансов, промышленности, здравоохранения и естественных наук. Бенчмарк предназначен для оценки языковых моделей и агентов на сложных профессиональных задачах, требующих многошагового рассуждения, анализа конфликтующих источников информации и применения специализированных правил. Оценка осуществляется на основе рубрик, измеряющих фактическую точность, логическую согласованность, практическую осуществимость и профессиональное соответствие ответов. Бенчмарк позволяет объективно оценивать надежность, экспертный уровень и готовность языковых моделей к решению реальных профессиональных задач в различных специализированных областях.'}, 'en': {'title': 'OneMillion-Bench: Evaluating Language Models for Real-World Professional Tasks', 'desc': 'This paper introduces OneMillion-Bench, a new benchmark designed to evaluate language models on complex, real-world tasks that require multi-step reasoning and domain-specific decision-making. Unlike traditional benchmarks that focus on structured tasks, OneMillion-Bench includes 400 expert-curated tasks across various industries such as Law, Finance, and Healthcare. The evaluation process emphasizes not only the correctness of the final answers but also the reasoning process, requiring models to retrieve authoritative sources and resolve conflicting evidence. This benchmark aims to assess the reliability and practical readiness of language models in professional settings, ensuring they can handle economically significant scenarios effectively.'}, 'zh': {'title': '评估语言模型的专业能力与推理能力', 'desc': '这篇论文介绍了一个新的基准测试，旨在评估语言模型在复杂的专业任务中的表现。这些任务需要多步骤推理、证据解决和特定领域的决策能力，涵盖法律、金融、工业、医疗和自然科学等多个行业。与以往的基准不同，这个测试要求模型检索权威来源、解决冲突证据，并应用领域特定规则。通过这种方式，研究者能够更好地评估模型在实际应用中的可靠性和专业深度。'}}}, {'id': 'https://huggingface.co/papers/2603.07660', 'title': 'Holi-Spatial: Evolving Video Streams into Holistic 3D Spatial Intelligence', 'url': 'https://huggingface.co/papers/2603.07660', 'abstract': 'Abstract Holi-Spatial presents the first fully automated, large-scale, spatially-aware multimodal dataset constructed from raw video inputs, supporting multi-level spatial supervision for 3D scene understanding and spatial reasoning tasks.  \t\t\t\t\tAI-generated summary The pursuit of spatial intelligence fundamentally relies on access to large-scale, fine-grained 3D data. However, existing approaches predominantly construct spatial understanding benchmarks by generating question-answer (QA) pairs from a limited number of manually annotated datasets, rather than systematically annotating new large-scale 3D scenes from raw web data. As a result, their scalability is severely constrained, and model performance is further hindered by domain gaps inherent in these narrowly curated datasets.   In this work, we propose Holi-Spatial, the first fully automated, large-scale, spatially-aware multimodal dataset, constructed from raw video inputs without human intervention, using the proposed data curation pipeline. Holi-Spatial supports multi-level spatial supervision, ranging from geometrically accurate 3D Gaussian Splatting (3DGS) reconstructions with rendered depth maps to object-level and relational semantic annotations, together with corresponding spatial Question-Answer (QA) pairs.   Following a principled and systematic pipeline, we further construct Holi-Spatial-4M, the first large-scale, high-quality 3D semantic dataset, containing 12K optimized 3DGS scenes, 1.3M 2D masks, 320K 3D bounding boxes, 320K instance captions, 1.2M 3D grounding instances, and 1.2M spatial QA pairs spanning diverse geometric, relational, and semantic reasoning tasks.   Holi-Spatial demonstrates exceptional performance in data curation quality, significantly outperforming existing feed-forward and per-scene optimized methods on datasets such as ScanNet, ScanNet++, and DL3DV. Furthermore, fine-tuning Vision-Language Models (VLMs) on spatial reasoning tasks using this dataset has also led to substantial improvements in model performance.', 'score': 11, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '8c5db1c8ad5e04cf', 'authors': ['Yuanyuan Gao', 'Hao Li', 'Yifei Liu', 'Xinhao Ji', 'Yuning Gong', 'Yuanjun Liao', 'Fangfu Liu', 'Manyuan Zhang', 'Yuchen Yang', 'Dan Xu', 'Xue Yang', 'Huaxi Huang', 'Hongjie Zhang', 'Ziwei Liu', 'Xiao Sun', 'Dingwen Zhang', 'Zhihang Zhong'], 'affiliations': ['Beihang University', 'Fudan University', 'Hong Kong University of Science and Technology', 'Nanyang Technological University', 'Northwestern Polytechnical University', 'Peking University', 'Shanghai AI Lab', 'Shanghai Jiao Tong University', 'Sichuan University', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.07660.jpg', 'data': {'categories': ['#3d', '#benchmark', '#synthetic', '#dataset', '#multimodal', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Автоматическая генерация масштабного датасета для пространственного понимания 3D сцен из видео', 'desc': 'Авторы представили Holi-Spatial — первый полностью автоматизированный датасет большого масштаба для понимания 3D сцен, построенный из сырых видеоданных без человеческого участия. Датасет содержит многоуровневую пространственную разметку: реконструкции сцен с помощью 3D Gaussian Splatting, карты глубины, маски объектов и семантические аннотации. Holi-Spatial-4M включает 12K оптимизированных 3D сцен с 1,2M пар вопрос-ответ для пространственного рассуждения, что позволяет решать задачи геометрического, реляционного и семантического анализа. Fine-tuning моделей Vision-Language на этом датасете показал значительное улучшение производительности и превосходит существующие бенчмарки по качеству разметки.'}, 'en': {'title': 'Holi-Spatial: Revolutionizing 3D Scene Understanding with Automated Data', 'desc': "Holi-Spatial introduces a groundbreaking automated dataset designed for 3D scene understanding and spatial reasoning, created from raw video inputs without human intervention. This dataset features multi-level spatial supervision, including accurate 3D reconstructions and detailed semantic annotations, which enhance the training of machine learning models. By addressing the limitations of existing datasets, Holi-Spatial provides a scalable solution that significantly improves model performance on various spatial reasoning tasks. The dataset's extensive features, including millions of 3D instances and spatial question-answer pairs, set a new standard for future research in spatial intelligence."}, 'zh': {'title': 'Holi-Spatial：自动化构建的大规模空间感知数据集', 'desc': 'Holi-Spatial是首个完全自动化的大规模空间感知多模态数据集，基于原始视频输入构建，支持多层次空间监督，旨在提升3D场景理解和空间推理任务的能力。该数据集通过无人工干预的方式，采用系统化的数据整理流程，生成几何准确的3D重建和相应的语义注释。Holi-Spatial-4M包含12000个优化的3D场景和大量的2D掩码、3D边界框及空间问答对，覆盖多种几何、关系和语义推理任务。通过在空间推理任务上微调视觉-语言模型，使用该数据集显著提升了模型性能。'}}}, {'id': 'https://huggingface.co/papers/2603.08013', 'title': 'PIRA-Bench: A Transition from Reactive GUI Agents to GUI-based Proactive Intent Recommendation Agents', 'url': 'https://huggingface.co/papers/2603.08013', 'abstract': 'Abstract PIRA-Bench presents a benchmark for evaluating multimodal large language models on proactive GUI agent tasks using continuous visual inputs, while PIRF offers a memory-aware framework for handling complex, noisy screen trajectories.  \t\t\t\t\tAI-generated summary Current Graphical User Interface (GUI) agents operate primarily under a reactive paradigm: a user must provide an explicit instruction for the agent to execute a task. However, an intelligent AI assistant should be proactive, which is capable of anticipating user intentions directly from continuous visual inputs, such as mobile or desktop screenshots, and offering timely recommendations without explicit user prompting. Transitioning to this proactive paradigm presents significant challenges. Real-world screen activity is rarely linear; it consists of long-horizon trajectories fraught with noisy browsing, meaningless actions, and multithreaded task-switching. To address this gap, we introduce PIRA-Bench (Proactive Intent Recommendation Agent Benchmark), a novel benchmark for evaluating multimodal large language models (MLLMs) on continuous, weakly-supervised visual inputs. Unlike reactive datasets, PIRA-Bench features complex trajectories with multiple interleaved intents and noisy segments with various user profile contexts, challenging agents to detect actionable events while fitting to user preferences. Furthermore, we propose the PIRF baseline, a memory-aware, state-tracking framework that empowers general MLLMs to manage multiple task threads and handle misleading visual inputs. PIRA-Bench serves as an initial step toward robust and proactive GUI-based personal assistants.', 'score': 6, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'f08617244b9e028c', 'authors': ['Yuxiang Chai', 'Shunye Tang', 'Han Xiao', 'Rui Liu', 'Hongsheng Li'], 'affiliations': ['Huawei Research', 'MMLab @ CUHK', 'Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2603.08013.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Проактивные GUI-ассистенты, предугадывающие намерения пользователя', 'desc': 'В статье представлена PIRA-Bench, бенчмарк для оценки мультимодальных больших языковых моделей на задачах проактивного GUI-агента с непрерывными визуальными входными данными. Авторы предлагают PIRF — фреймворк с механизмом памяти, способный обрабатывать сложные и шумные траектории взаимодействий пользователя с экраном, включая многопоточное переключение между задачами. В отличие от реактивных подходов, где агент ждёт явной команды, предлагаемый подход позволяет модели предвидеть намерения пользователя прямо из последовательности скриншотов и давать своевременные рекомендации. Работа направлена на создание более интеллектуальных персональных ассистентов на основе GUI, способных понимать контекст и избегать влияния шумовых данных.'}, 'en': {'title': 'Empowering Proactive AI Assistants with PIRA-Bench', 'desc': 'PIRA-Bench is a new benchmark designed to evaluate multimodal large language models (MLLMs) on proactive tasks involving graphical user interfaces (GUIs). Unlike traditional reactive systems that wait for user commands, this benchmark encourages models to anticipate user needs from continuous visual inputs like screenshots. The challenge lies in managing complex, noisy screen activities that include multiple tasks and distractions. To tackle this, the paper introduces the PIRF framework, which helps MLLMs track state and manage various tasks effectively, paving the way for smarter AI assistants.'}, 'zh': {'title': '主动智能助手的未来', 'desc': 'PIRA-Bench是一个用于评估多模态大型语言模型在主动图形用户界面（GUI）代理任务中的基准测试。该基准测试利用连续的视觉输入，旨在使AI助手能够主动预测用户意图，而不是仅仅响应用户的指令。为了应对复杂和嘈杂的屏幕轨迹，PIRF框架被提出，以帮助模型管理多线程任务并处理误导性的视觉输入。通过这些创新，PIRA-Bench为开发更智能的个人助手奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.03872', 'title': 'Believe Your Model: Distribution-Guided Confidence Calibration', 'url': 'https://huggingface.co/papers/2603.03872', 'abstract': 'Abstract Large reasoning models enhance prediction accuracy through test-time scaling techniques that generate multiple candidate responses, with the proposed DistriVoting method utilizing distributional priors and confidence scores to improve answer selection.  \t\t\t\t\tAI-generated summary Large Reasoning Models have demonstrated remarkable performance with the advancement of test-time scaling techniques, which enhances prediction accuracy by generating multiple candidate responses and selecting the most reliable answer. While prior work has analyzed that internal model signals like confidence scores can partly indicate response correctness and exhibit a distributional correlation with accuracy, such distributional information has not been fully utilized to guide answer selection. Motivated by this, we propose DistriVoting, which incorporates distributional priors as another signal alongside confidence during voting. Specifically, our method (1) first decomposes the mixed confidence distribution into positive and negative components using Gaussian Mixture Models, (2) then applies a reject filter based on positive/negative samples from them to mitigate overlap between the two distributions. Besides, to further alleviate the overlap from the perspective of distribution itself, we propose SelfStepConf, which uses step-level confidence to dynamically adjust inference process, increasing the separation between the two distributions to improve the reliability of confidences in voting. Experiments across 16 models and 5 benchmarks demonstrate that our method significantly outperforms state-of-the-art approaches.', 'score': 5, 'issue_id': 1412, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'c2f13cf32da5ca96', 'authors': ['Xizhong Yang', 'Haotian Zhang', 'Huiming Wang', 'Mofei Song'], 'affiliations': ['Kuaishou Technology', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03872.jpg', 'data': {'categories': [], 'emoji': '🗳️', 'ru': {'title': 'Голосование с учетом распределения уверенности для надежного выбора ответов', 'desc': 'Статья посвящена улучшению точности предсказаний больших языковых моделей на этапе вывода через масштабирование вычислений. Авторы предлагают метод DistriVoting, который использует распределительные приоры и оценки уверенности модели для более надежного выбора среди нескольких сгенерированных ответов. Метод разлагает смешанное распределение уверенности на положительные и отрицательные компоненты с помощью смесей Гауссовых распределений и применяет фильтр отклонения для уменьшения пересечения между ними. Дополнительно предлагается метод SelfStepConf, который использует уверенность на уровне шагов рассуждения для динамической адаптации процесса вывода и повышения надежности голосования.'}, 'en': {'title': 'DistriVoting: Enhancing Answer Selection with Distributional Insights', 'desc': 'This paper introduces DistriVoting, a novel method that enhances the accuracy of large reasoning models by effectively utilizing distributional priors and confidence scores during answer selection. The approach involves decomposing confidence distributions into positive and negative components using Gaussian Mixture Models, which helps in identifying reliable responses. Additionally, a reject filter is applied to reduce overlap between these distributions, ensuring clearer distinctions in confidence levels. The proposed SelfStepConf further refines the inference process by dynamically adjusting confidence, leading to improved performance across multiple models and benchmarks.'}, 'zh': {'title': '利用分布先验提升答案选择准确性', 'desc': '本文提出了一种名为DistriVoting的方法，旨在通过利用分布先验和置信度来提高答案选择的准确性。该方法首先使用高斯混合模型将混合置信度分布分解为正负成分，然后应用拒绝过滤器来减少这两种分布之间的重叠。此外，DistriVoting还引入了SelfStepConf，通过动态调整推理过程中的置信度，进一步提高了分布的分离度。实验结果表明，该方法在16个模型和5个基准测试中显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.07561', 'title': 'PureCC: Pure Learning for Text-to-Image Concept Customization', 'url': 'https://huggingface.co/papers/2603.07561', 'abstract': "Abstract PureCC presents a concept customization method that preserves original model behavior through decoupled learning and adaptive guidance scaling.  \t\t\t\t\tAI-generated summary Existing concept customization methods have achieved remarkable outcomes in high-fidelity and multi-concept customization. However, they often neglect the influence on the original model's behavior and capabilities when learning new personalized concepts. To address this issue, we propose PureCC. PureCC introduces a novel decoupled learning objective for concept customization, which combines the implicit guidance of the target concept with the original conditional prediction. This separated form enables PureCC to substantially focus on the original model during training. Moreover, based on this objective, PureCC designs a dual-branch training pipeline that includes a frozen extractor providing purified target concept representations as implicit guidance and a trainable flow model producing the original conditional prediction, jointly achieving pure learning for personalized concepts. Furthermore, PureCC introduces a novel adaptive guidance scale λ^star to dynamically adjust the guidance strength of the target concept, balancing customization fidelity and model preservation. Extensive experiments show that PureCC achieves state-of-the-art performance in preserving the original behavior and capabilities while enabling high-fidelity concept customization. The code is available at https://github.com/lzc-sg/PureCC.", 'score': 4, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '31201f466f3d6de5', 'authors': ['Zhichao Liao', 'Xiaole Xian', 'Qingyu Li', 'Wenyu Qin', 'Meng Wang', 'Weicheng Xie', 'Siyang Song', 'Pingfa Feng', 'Long Zeng', 'Liang Pan'], 'affiliations': ['Guangdong Provincial Key Laboratory of Intelligent Information Processing, Shenzhen University', 'Kling Team, Kuaishou Technology', 'S-Lab, Nanyang Technological University', 'School of Computer Science & Software Engineering, Shenzhen University', 'Tsinghua University', 'University of Exeter'], 'pdf_title_img': 'assets/pdf/title_img/2603.07561.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Сохранение оригинальности при персонализации моделей', 'desc': 'PureCC предлагает новый метод кастомизации концепций для моделей генеративного AI, который сохраняет исходное поведение модели через разделённую обучающую задачу. Метод использует двухветвевую архитектуру: замороженный экстрактор генерирует чистые представления целевого концепта, а обучаемая flow-модель воспроизводит исходное условное предсказание. PureCC вводит адаптивный коэффициент масштабирования λ*, который динамически балансирует точность кастомизации и сохранение способностей исходной модели. Экспериментальные результаты показывают, что метод достигает лучших показателей как в качественной кастомизации новых концептов, так и в сохранении исходной производительности модели.'}, 'en': {'title': 'Preserve Original Model Behavior with PureCC Customization', 'desc': "PureCC is a method for customizing machine learning models while keeping their original behavior intact. It uses a technique called decoupled learning, which separates the learning of new concepts from the model's existing capabilities. This approach includes a dual-branch training pipeline that helps the model learn new concepts without losing its original skills. Additionally, PureCC employs an adaptive guidance scale to fine-tune how much influence the new concepts have, ensuring high-quality customization without compromising the model's performance."}, 'zh': {'title': 'PureCC：个性化概念定制的新方法', 'desc': 'PureCC是一种概念定制方法，通过解耦学习和自适应引导缩放来保持原始模型的行为。它引入了一种新的解耦学习目标，将目标概念的隐式引导与原始条件预测相结合。PureCC设计了一个双分支训练管道，其中包括一个冻结的提取器和一个可训练的流模型，确保在个性化概念学习中专注于原始模型。通过引入自适应引导尺度λ^star，PureCC能够动态调整目标概念的引导强度，实现高保真度的定制和模型的保留。'}}}, {'id': 'https://huggingface.co/papers/2603.03825', 'title': 'From Narrow to Panoramic Vision: Attention-Guided Cold-Start Reshapes Multimodal Reasoning', 'url': 'https://huggingface.co/papers/2603.03825', 'abstract': 'Abstract The study introduces a novel attention-based metric called Visual Attention Score to analyze cold-start initialization in multimodal large reasoning models, identifying a counter-intuitive phenomenon termed Lazy Attention Localization and proposing a framework called Attention-Guided Visual Anchoring and Reflection to improve multimodal reasoning performance.  \t\t\t\t\tAI-generated summary The cold-start initialization stage plays a pivotal role in training Multimodal Large Reasoning Models (MLRMs), yet its mechanisms remain insufficiently understood. To analyze this stage, we introduce the Visual Attention Score (VAS), an attention-based metric that quantifies how much a model attends to visual tokens. We find that reasoning performance is strongly correlated with VAS (r=0.9616): models with higher VAS achieve substantially stronger multimodal reasoning. Surprisingly, multimodal cold-start fails to elevate VAS, resulting in attention distributions close to the base model, whereas text-only cold-start leads to a clear increase. We term this counter-intuitive phenomenon Lazy Attention Localization. To validate its causal role, we design training-free interventions that directly modulate attention allocation during inference, performance gains of 1-2% without any retraining. Building on these insights, we further propose Attention-Guided Visual Anchoring and Reflection (AVAR), a comprehensive cold-start framework that integrates visual-anchored data synthesis, attention-guided objectives, and visual-anchored reward shaping. Applied to Qwen2.5-VL-7B, AVAR achieves an average gain of 7.0% across 7 multimodal reasoning benchmarks. Ablation studies further confirm that each component of AVAR contributes step-wise to the overall gains. The code, data, and models are available at https://github.com/lrlbbzl/Qwen-AVAR.', 'score': 4, 'issue_id': 1412, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '7116dd3b3bd793d9', 'authors': ['Ruilin Luo', 'Chufan Shi', 'Yizhen Zhang', 'Cheng Yang', 'Songtao Jiang', 'Tongkun Guan', 'Ruizhe Chen', 'Ruihang Chu', 'Peng Wang', 'Mingkun Yang', 'Yujiu Yang', 'Junyang Lin', 'Zhibo Yang'], 'affiliations': ['Qwen Team, Alibaba Group', 'Shanghai Jiao Tong University', 'Tsinghua University', 'University of California San Diego', 'University of South California', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03825.jpg', 'data': {'categories': ['#interpretability', '#benchmark', '#multimodal', '#training', '#open_source', '#reasoning'], 'emoji': '👁️', 'ru': {'title': 'Направленное внимание к визуальной информации для инициализации мультимодальных моделей рассуждения', 'desc': 'В исследовании предложена новая метрика Visual Attention Score для анализа инициализации мультимодальных больших моделей рассуждения, которая показывает, насколько модель концентрируется на визуальных токенах. Авторы обнаружили парадоксальное явление под названием Lazy Attention Localization, при котором мультимодальная инициализация не улучшает внимание модели к визуальной информации, в отличие от текстовой инициализации. Они разработали фреймворк AVAR, который комбинирует синтез данных с визуальными якорями, управляемые вниманием целевые функции и формирование наград, ориентированное на визуальные якоря. При применении к модели Qwen2.5-VL-7B AVAR достигает среднего улучшения на 7.0% по семи мультимодальным бенчмаркам оценки.'}, 'en': {'title': 'Enhancing Multimodal Reasoning with Visual Attention Metrics', 'desc': 'This paper presents a new metric called Visual Attention Score (VAS) to evaluate how well multimodal large reasoning models (MLRMs) utilize visual information during cold-start initialization. The authors discover a surprising effect known as Lazy Attention Localization, where models do not improve their attention to visual tokens as expected during cold-start with multimodal data. To address this issue, they propose a framework called Attention-Guided Visual Anchoring and Reflection (AVAR), which enhances reasoning performance by integrating visual data synthesis and attention-guided objectives. The results show that AVAR significantly boosts performance across various benchmarks, demonstrating the importance of effective attention allocation in MLRMs.'}, 'zh': {'title': '提升多模态推理的新方法', 'desc': '本研究提出了一种新的基于注意力的指标，称为视觉注意力评分（VAS），用于分析多模态大推理模型中的冷启动初始化。我们发现，推理性能与VAS之间存在强相关性，VAS较高的模型在多模态推理中表现更强。令人惊讶的是，多模态冷启动未能提高VAS，导致注意力分布接近基础模型，而仅文本的冷启动则明显提高了VAS。为了解决这一问题，我们提出了一个名为注意力引导的视觉锚定与反思（AVAR）的框架，以提升多模态推理性能。'}}}, {'id': 'https://huggingface.co/papers/2603.08709', 'title': 'Scale Space Diffusion', 'url': 'https://huggingface.co/papers/2603.08709', 'abstract': "Abstract Scale-space theory connects diffusion models' information hierarchy to low-pass filtering, leading to a framework that combines scale spaces with diffusion processes for efficient image processing.  \t\t\t\t\tAI-generated summary Diffusion models degrade images through noise, and reversing this process reveals an information hierarchy across timesteps. Scale-space theory exhibits a similar hierarchy via low-pass filtering. We formalize this connection and show that highly noisy diffusion states contain no more information than small, downsampled images - raising the question of why they must be processed at full resolution. To address this, we fuse scale spaces into the diffusion process by formulating a family of diffusion models with generalized linear degradations and practical implementations. Using downsampling as the degradation yields our proposed Scale Space Diffusion. To support Scale Space Diffusion, we introduce Flexi-UNet, a UNet variant that performs resolution-preserving and resolution-increasing denoising using only the necessary parts of the network. We evaluate our framework on CelebA and ImageNet and analyze its scaling behavior across resolutions and network depths. Our project website ( https://prateksha.github.io/projects/scale-space-diffusion/ ) is available publicly.", 'score': 1, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'd6becde8b9b50203', 'authors': ['Soumik Mukhopadhyay', 'Prateksha Udhayanan', 'Abhinav Shrivastava'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.08709.jpg', 'data': {'categories': ['#cv', '#architecture', '#diffusion', '#optimization', '#training'], 'emoji': '🔍', 'ru': {'title': 'Масштабные пространства в диффузионных моделях для эффективной обработки изображений', 'desc': 'Статья связывает теорию масштабного пространства с диффузионными моделями, показывая, что сильно зашумлённые состояния содержат не больше информации, чем маленькие уменьшенные изображения. Авторы предлагают Scale Space Diffusion — семейство диффузионных моделей с обобщенными линейными деградациями, которые позволяют эффективнее обрабатывать изображения. Для поддержки этого подхода разработан Flexi-UNet, вариант архитектуры UNet, который выполняет денойзинг при сохранении и увеличении разрешения, используя только необходимые части сети. Экспериментальная оценка на датасетах CelebA и ImageNet демонстрирует эффективность масштабирования метода.'}, 'en': {'title': 'Enhancing Image Processing with Scale Space Diffusion', 'desc': 'This paper connects scale-space theory with diffusion models to improve image processing efficiency. It shows that highly noisy images from diffusion processes do not provide more information than smaller, downsampled images. By integrating scale spaces into diffusion processes, the authors propose a new method called Scale Space Diffusion. They also introduce Flexi-UNet, a modified UNet that optimizes denoising while maintaining necessary resolutions, and evaluate their approach on popular datasets like CelebA and ImageNet.'}, 'zh': {'title': '结合尺度空间与扩散模型的高效图像处理', 'desc': '本论文将尺度空间理论与扩散模型的信息层次联系起来，提出了一种结合尺度空间和扩散过程的高效图像处理框架。扩散模型通过噪声降解图像，逆向过程揭示了时间步长之间的信息层次。我们提出的尺度空间扩散方法通过将下采样作为降解，优化了扩散过程。为支持这一方法，我们引入了Flexi-UNet，这是一种能够在保持分辨率和提高分辨率的去噪网络变体。'}}}, {'id': 'https://huggingface.co/papers/2603.08708', 'title': 'FVG-PT: Adaptive Foreground View-Guided Prompt Tuning for Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.08708', 'abstract': 'Abstract Foreground attention shifts during CLIP-based prompt tuning are addressed through an adaptive module that enhances foreground view quality and mitigates generalization degradation.  \t\t\t\t\tAI-generated summary CLIP-based prompt tuning enables pretrained Vision-Language Models (VLMs) to efficiently adapt to downstream tasks. Although existing studies have made significant progress, they pay limited attention to changes in the internal attention representations of VLMs during the tuning process. In this paper, we attribute the failure modes of prompt tuning predictions to shifts in foreground attention of the visual encoder, and propose Foreground View-Guided Prompt Tuning (FVG-PT), an adaptive plug-and-play foreground attention guidance module, to alleviate the shifts. Concretely, FVG-PT introduces a learnable Foreground Reliability Gate to automatically enhance the foreground view quality, applies a Foreground Distillation Compensation module to guide visual attention toward the foreground, and further introduces a Prior Calibration module to mitigate generalization degradation caused by excessive focus on the foreground. Experiments on multiple backbone models and datasets show the effectiveness and compatibility of FVG-PT. Codes are available at: https://github.com/JREion/FVG-PT', 'score': 1, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '0c6414f59df2b074', 'authors': ['Haoyang Li', 'Liang Wang', 'Siyu Zhou', 'Jiacheng Sun', 'Jing Jiang', 'Chao Wang', 'Guodong Long', 'Yan Peng'], 'affiliations': ['Shanghai University, Shanghai 200444, China', 'University of Technology Sydney, NSW 2007, Australia'], 'pdf_title_img': 'assets/pdf/title_img/2603.08708.jpg', 'data': {'categories': [], 'emoji': '👁️', 'ru': {'title': 'Управление вниманием переднего плана для улучшения адаптации визуально-языковых моделей', 'desc': 'В статье рассматривается проблема смещения внимания на передний план при настройке промптов в моделях CLIP. Авторы предлагают адаптивный модуль FVG-PT, который включает обучаемый вентиль надежности переднего плана, модуль компенсации дистилляции и модуль калибровки, чтобы направить внимание визуального кодировщика на важные объекты. Решение позволяет повысить качество представления переднего плана и предотвратить деградацию обобщающей способности модели при избыточной фокусировке на переднем плане. Экспериментальные результаты на различных архитектурах и датасетах подтверждают эффективность предложенного подхода.'}, 'en': {'title': 'Enhancing Foreground Attention in Vision-Language Models', 'desc': 'This paper addresses the challenges of foreground attention shifts in CLIP-based prompt tuning for Vision-Language Models (VLMs). It introduces a new method called Foreground View-Guided Prompt Tuning (FVG-PT), which includes an adaptive module to improve the quality of foreground views. The method features a Foreground Reliability Gate to enhance attention on important visual elements and a Foreground Distillation Compensation module to maintain focus on the foreground. Additionally, a Prior Calibration module is included to prevent generalization issues that arise from overemphasizing foreground details, demonstrating effectiveness across various models and datasets.'}, 'zh': {'title': '提升前景注意力，优化视觉语言模型', 'desc': '本文提出了一种名为前景视图引导提示调优（FVG-PT）的自适应模块，旨在改善基于CLIP的提示调优过程中前景注意力的变化。该模块通过引入可学习的前景可靠性门，自动增强前景视图的质量，并使用前景蒸馏补偿模块引导视觉注意力集中于前景。为了减轻过度关注前景导致的泛化退化，FVG-PT还引入了先验校准模块。实验结果表明，FVG-PT在多个基础模型和数据集上表现出良好的有效性和兼容性。'}}}, {'id': 'https://huggingface.co/papers/2603.07475', 'title': 'Skip to the Good Part: Representation Structure & Inference-Time Layer Skipping in Diffusion vs. Autoregressive LLMs', 'url': 'https://huggingface.co/papers/2603.07475', 'abstract': 'Abstract Diffusion language models exhibit distinct representational structures compared to autoregressive models, with hierarchical abstractions and reduced bias, enabling efficient layer-skipping inference without architectural modifications.  \t\t\t\t\tAI-generated summary Autoregressive (AR) language models form representations incrementally through left-to-right prediction, whereas diffusion language models (dLLMs) are trained via full-sequence denoising. Although recent dLLMs match AR performance, it remains unclear whether diffusion objectives fundamentally reshape internal representations across depth. We perform the first layer- and token-wise representational analysis comparing native dLLMs (LLaDA), native AR models (Qwen2.5), and AR-initialized dLLMs (Dream-7B). We find that diffusion objectives result in different, more hierarchical abstractions with substantial early-layer redundancy and reduced recency bias, while AR objectives produce tightly coupled, depth-dependent representations. Critically, AR-initialized dLLMs retain AR-like representational dynamics despite diffusion training, revealing persistent initialization bias. Leveraging this observed representational redundancy, we introduce a static, task-agnostic inference-time layer-skipping method requiring no architectural changes or KV-cache sharing. Native dLLMs achieve up to 18.75% FLOPs reduction while preserving over 90% performance on reasoning and code generation benchmarks, whereas AR models degrade sharply under comparable skipping. These results link training objectives to representational structure and enable practical, cache-orthogonal efficiency gains.', 'score': 1, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '19a6aad11b36c742', 'authors': ['Raghavv Goel', 'Risheek Garrepalli', 'Sudhanshu Agrawal', 'Chris Lott', 'Mingu Lee', 'Fatih Porikli'], 'affiliations': ['Qualcomm AI Research', 'Qualcomm Technologies Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.07475.jpg', 'data': {'categories': ['#inference', '#architecture', '#interpretability', '#diffusion', '#optimization', '#training'], 'emoji': '🔄', 'ru': {'title': 'Диффузионные модели учатся проще: пропуск слоёв без потери качества', 'desc': 'В работе проводится анализ представления информации в диффузионных языковых моделях в сравнении с авторегрессивными моделями. Исследователи обнаружили, что диффузионные модели формируют более иерархичные абстракции с существенной избыточностью на ранних слоях и пониженным смещением к недавним токенам. На основе этих наблюдений авторы предложили метод пропуска слоёв во время инференса, не требующий изменения архитектуры модели. Диффузионные модели достигают сокращения вычислений до 18.75% при сохранении более 90% производительности на задачах рассуждения и генерации кода.'}, 'en': {'title': 'Harnessing Hierarchical Efficiency in Diffusion Language Models', 'desc': 'This paper explores the differences in how diffusion language models (dLLMs) and autoregressive (AR) models represent information. It shows that dLLMs create more hierarchical and less biased representations, allowing for efficient inference without changing their architecture. The study also reveals that AR-initialized dLLMs maintain some characteristics of AR models even after being trained with diffusion methods. By utilizing the redundancy in dLLM representations, the authors propose a new method for layer-skipping that significantly reduces computational load while maintaining high performance.'}, 'zh': {'title': '扩散模型：高效推理的新选择', 'desc': '扩散语言模型与自回归模型在表示结构上有显著不同，具有层次化抽象和减少偏差的特点。这使得扩散模型能够在不改变架构的情况下实现高效的跳层推理。研究表明，扩散目标导致了不同的层次化抽象，具有显著的早期层冗余和减少的近期偏差，而自回归目标则产生了紧密耦合、依赖深度的表示。通过引入静态的、与任务无关的推理时跳层方法，扩散模型在保持高性能的同时，减少了计算量。'}}}, {'id': 'https://huggingface.co/papers/2603.06713', 'title': 'Scaling Agentic Capabilities, Not Context: Efficient Reinforcement Finetuning for Large Toolspaces', 'url': 'https://huggingface.co/papers/2603.06713', 'abstract': 'Abstract ATLAS enables small language models to effectively operate in large-scale tool environments through reinforcement fine-tuning that learns context control and execution structure, achieving performance comparable to larger models under stricter resource constraints.  \t\t\t\t\tAI-generated summary Agentic systems operating over large tool ecosystems must plan and execute long-horizon workflows under weak or non-verifiable supervision. While frontier models mitigate these challenges through scale and large context budgets, small language models (SLMs) remain brittle: eager tool loading saturates context, execution errors compound over time, and sparse rewards limit learning. We introduce ATLAS, a reinforcement finetuning framework that enables SLMs to operate effectively in large-scale toolspace environments by learning how to acquire context and how to execute actions. Our approach makes two key contributions. First, we treat context control and execution structure as learnable decisions, combining iterative tool loading with programmatic tool orchestration to bound context growth and stabilize long-horizon trajectories. Second, we propose rubric-based reinforcement finetuning, which decomposes task success into structured, task-aligned criteria and enables scalable training using small judge models. Across MCP benchmarks, these design choices yield large and consistent gains over generic RL baselines, allowing a 4B SLM to approach frontier-agent performance under far tighter parameter and context budgets.', 'score': 1, 'issue_id': 1412, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '302a6eeea5f0fa16', 'authors': ['Karan Gupta', 'Pranav Vajreshwari', 'Yash Pandya', 'Raghav Magazine', 'Akshay Nambi', 'Ahmed Awadallah'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.06713.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#small_models'], 'emoji': '🛠️', 'ru': {'title': 'Малые модели для больших экосистем инструментов', 'desc': 'ATLAS — это фреймворк для обучения с подкреплением, который позволяет малым языковым моделям эффективно работать в средах с большим количеством инструментов. Ключевая идея заключается в том, чтобы научить модель самостоятельно контролировать загрузку контекста и структурировать исполнение действий, избегая перегрузки памяти и накопления ошибок. Фреймворк использует обучение на основе рубрик, которое разбивает успех задачи на структурированные критерии и позволяет масштабировать процесс обучения с помощью небольших моделей-судей. Результаты показывают, что 4-миллиардная модель достигает производительности передовых агентных систем при значительно меньшем использовании параметров и контекста.'}, 'en': {'title': 'Empowering Small Models in Complex Tool Environments with ATLAS', 'desc': 'The paper introduces ATLAS, a framework that enhances small language models (SLMs) to function effectively in complex tool environments through reinforcement fine-tuning. It focuses on learning how to manage context and execute actions, addressing the limitations of SLMs that struggle with context saturation and execution errors. ATLAS combines iterative tool loading with structured execution to improve decision-making and stabilize long-term performance. The framework also employs rubric-based reinforcement fine-tuning, which breaks down task success into specific criteria, leading to significant performance improvements over traditional reinforcement learning methods.'}, 'zh': {'title': 'ATLAS：小型模型在大规模工具环境中的新突破', 'desc': 'ATLAS是一个强化微调框架，旨在帮助小型语言模型在大规模工具环境中有效运作。它通过学习上下文控制和执行结构，使小型语言模型在资源限制下的表现接近大型模型。该方法的两个关键贡献是将上下文控制和执行结构视为可学习的决策，并提出基于标准的强化微调，以便使用小型评判模型进行可扩展训练。通过这些设计选择，ATLAS在多个基准测试中显著提高了小型语言模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.02554', 'title': 'Generalizable Knowledge Distillation from Vision Foundation Models for Semantic Segmentation', 'url': 'https://huggingface.co/papers/2603.02554', 'abstract': 'Abstract Generalizable Knowledge Distillation (GKD) enhances out-of-domain generalization in semantic segmentation by decoupling representation learning from task learning and using query-based soft distillation to transfer knowledge from vision foundation models.  \t\t\t\t\tAI-generated summary Knowledge distillation (KD) has been widely applied in semantic segmentation to compress large models, but conventional approaches primarily preserve in-domain accuracy while neglecting out-of-domain generalization, which is essential under distribution shifts. This limitation becomes more severe with the emergence of vision foundation models (VFMs): although VFMs exhibit strong robustness on unseen data, distilling them with conventional KD often compromises this ability. We propose Generalizable Knowledge Distillation (GKD), a multi-stage framework that explicitly enhances generalization. GKD decouples representation learning from task learning. In the first stage, the student acquires domain-agnostic representations through selective feature distillation, and in the second stage, these representations are frozen for task adaptation, thereby mitigating overfitting to visible domains. To further support transfer, we introduce a query-based soft distillation mechanism, where student features act as queries to teacher representations to selectively retrieve transferable spatial knowledge from VFMs. Extensive experiments on five domain generalization benchmarks demonstrate that GKD consistently outperforms existing KD methods, achieving average gains of +1.9% in foundation-to-foundation (F2F) and +10.6% in foundation-to-local (F2L) distillation. The code will be available at https://github.com/Younger-hua/GKD.', 'score': 1, 'issue_id': 1412, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '9ac9ce2d31d4e027', 'authors': ['Chonghua Lv', 'Dong Zhao', 'Shuang Wang', 'Dou Quan', 'Ning Huyan', 'Nicu Sebe', 'Zhun Zhong'], 'affiliations': ['Department of Automation, Tsinghua University, China', 'Department of Information Engineering and Computer Science, University of Trento, Italy', 'School of Artificial Intelligence, Xidian University, China', 'School of Computer Science and Information Engineering, Hefei University of Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.02554.jpg', 'data': {'categories': ['#benchmark', '#training', '#cv'], 'emoji': '🎓', 'ru': {'title': 'Дистилляция знаний от фундаментальных моделей зрения с сохранением обобщаемости', 'desc': 'В статье предложен метод обобщаемой дистилляции знаний (GKD) для улучшения семантической сегментации при распределении данных. Метод разделяет обучение представлений и обучение задачи на два этапа: сначала студент усваивает доменнезависимые представления через селективную дистилляцию признаков, затем замораживает их для адаптации задачи. Авторы вводят механизм мягкой дистилляции на основе запросов, где признаки студента используются как запросы к представлениям учителя для извлечения переносимого пространственного знания. Эксперименты на пяти бенчмарках показывают, что GKD последовательно превосходит существующие методы дистилляции знаний.'}, 'en': {'title': 'Enhancing Generalization with GKD in Semantic Segmentation', 'desc': 'Generalizable Knowledge Distillation (GKD) is a novel approach that improves the ability of models to generalize to new, unseen data in semantic segmentation tasks. It separates the learning of representations from the learning of specific tasks, allowing for more robust feature extraction. GKD employs a two-stage process where the student model first learns domain-agnostic features and then adapts these features for specific tasks, reducing the risk of overfitting. Additionally, it introduces a query-based soft distillation method that helps the student model effectively retrieve useful knowledge from larger vision foundation models, leading to significant performance improvements on various benchmarks.'}, 'zh': {'title': '提升语义分割的域外泛化能力', 'desc': '通用知识蒸馏（GKD）通过将表示学习与任务学习解耦，增强了语义分割中的域外泛化能力。传统的知识蒸馏方法主要关注保持领域内的准确性，而忽视了在分布变化下的域外泛化。GKD采用多阶段框架，首先通过选择性特征蒸馏获取领域无关的表示，然后在任务适应阶段冻结这些表示，以减少对可见领域的过拟合。此外，GKD引入了基于查询的软蒸馏机制，使学生特征作为查询，从教师表示中选择性地检索可转移的空间知识。'}}}, {'id': 'https://huggingface.co/papers/2603.08706', 'title': 'Agentic Critical Training', 'url': 'https://huggingface.co/papers/2603.08706', 'abstract': "Abstract Agentic Critical Training (ACT) is a reinforcement learning approach that trains language model agents to autonomously reason about action quality by directly rewarding correct judgment between alternatives, outperforming imitation learning and existing reflection injection methods.  \t\t\t\t\tAI-generated summary Training large language models (LLMs) as autonomous agents often begins with imitation learning, but it only teaches agents what to do without understanding why: agents never contrast successful actions against suboptimal alternatives and thus lack awareness of action quality. Recent approaches attempt to address this by introducing self-reflection supervision derived from contrasts between expert and alternative actions. However, the training paradigm fundamentally remains imitation learning: the model imitates pre-constructed reflection text rather than learning to reason autonomously. We propose Agentic Critical Training (ACT), a reinforcement learning paradigm that trains agents to identify the better action among alternatives. By rewarding whether the model's judgment is correct, ACT drives the model to autonomously develop reasoning about action quality, producing genuine self-reflection rather than imitating it. Across three challenging agent benchmarks, ACT consistently improves agent performance when combined with different post-training methods. It achieves an average improvement of 5.07 points over imitation learning and 4.62 points over reinforcement learning. Compared to approaches that inject reflection capability through knowledge distillation, ACT also demonstrates clear advantages, yielding an average improvement of 2.42 points. Moreover, ACT enables strong out-of-distribution generalization on agentic benchmarks and improves performance on general reasoning benchmarks without any reasoning-specific training data, highlighting the value of our method. These results suggest that ACT is a promising path toward developing more reflective and capable LLM agents.", 'score': 0, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '4e77ff9e781ff759', 'authors': ['Weize Liu', 'Minghui Liu', 'Sy-Tuyen Ho', 'Souradip Chakraborty', 'Xiyao Wang', 'Furong Huang'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.08706.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rl', '#alignment', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Обучение агентов истинной саморефлексии через подкрепление за правильное суждение', 'desc': 'В статье предлагается метод Agentic Critical Training (ACT) — подход обучения с подкреплением, который обучает языковые модели-агенты автономно оценивать качество действий путём прямого вознаграждения за правильное суждение между альтернативами. В отличие от имитационного обучения, которое только показывает агентам что делать, ACT учит их понимать почему через контрастивное сравнение успешных и неудачных действий. Метод вознаграждает корректность рассуждений модели о качестве действий, что позволяет агентам развивать подлинную саморефлексию вместо её имитации. Экспериментальные результаты демонстрируют улучшение производительности на 5.07 пункта над имитационным обучением и хорошую обобщающую способность на распределениях данных, отличных от тренировочных.'}, 'en': {'title': 'Empowering Agents with Autonomous Reasoning through ACT', 'desc': 'Agentic Critical Training (ACT) is a novel reinforcement learning method designed to enhance the reasoning capabilities of language model agents. Unlike traditional imitation learning, which only teaches agents to mimic actions without understanding their quality, ACT rewards agents for correctly judging the better action among alternatives. This approach fosters genuine self-reflection and autonomous reasoning, leading to improved performance across various benchmarks. The results indicate that ACT not only surpasses imitation learning but also enhances generalization and reasoning abilities in language models without requiring additional training data.'}, 'zh': {'title': '自主推理，提升行动质量的训练方法', 'desc': 'Agentic Critical Training (ACT) 是一种强化学习方法，旨在训练语言模型代理自主判断行动质量。与模仿学习不同，ACT 通过直接奖励正确的判断来提高代理的推理能力，使其能够识别更优的行动。该方法在多个代理基准测试中表现出色，平均提高了 5.07 分，相较于现有的反思注入方法也有明显优势。ACT 的成功表明，它为开发更具反思能力和更强大的语言模型代理提供了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2603.08655', 'title': 'OfficeQA Pro: An Enterprise Benchmark for End-to-End Grounded Reasoning', 'url': 'https://huggingface.co/papers/2603.08655', 'abstract': "Abstract OfficeQA Pro evaluates AI agents on multi-document reasoning across historical financial documents, revealing persistent challenges in grounded reasoning despite advanced model capabilities.  \t\t\t\t\tAI-generated summary We introduce OfficeQA Pro, a benchmark for evaluating AI agents on grounded, multi-document reasoning over a large and heterogeneous document corpus. The corpus consists of U.S. Treasury Bulletins spanning nearly 100 years, comprising 89,000 pages and over 26 million numerical values. OfficeQA Pro consists of 133 questions that require precise document parsing, retrieval, and analytical reasoning across both unstructured text and tabular data. Frontier LLMs including Claude Opus 4.6, GPT-5.4, and Gemini 3.1 Pro Preview achieve less than 5% accuracy on OfficeQA Pro when relying on parametric knowledge, and less than 12% with additional access to the web. When provided directly with the document corpus, frontier agents still struggle on over half of questions, scoring 34.1% on average. We find that providing agents with a structured document representation produced by Databricks' ai_parse_document yields a 16.1% average relative performance gain across agents. We conduct additional ablations to study the effects of model selection, table representation, retrieval strategy, and test-time scaling on performance. Despite these improvements, significant headroom remains before agents can be considered reliable at enterprise-grade grounded reasoning.", 'score': 0, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '99edd2f73f36f206', 'authors': ['Krista Opsahl-Ong', 'Arnav Singhvi', 'Jasmine Collins', 'Ivan Zhou', 'Cindy Wang', 'Ashutosh Baheti', 'Owen Oertell', 'Jacob Portes', 'Sam Havens', 'Erich Elsen', 'Michael Bendersky', 'Matei Zaharia', 'Xing Chen'], 'affiliations': ['Databricks', 'Databricks AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.08655.jpg', 'data': {'categories': ['#survey', '#benchmark', '#agents', '#dataset', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'Преодолеть барьер: почему даже продвинутые модели не справляются с многодокументным рассуждением', 'desc': 'В статье представлен бенчмарк OfficeQA Pro для оценки способности AI-агентов к многодокументному рассуждению на основе исторических финансовых документов. Исследование демонстрирует, что передовые LLM модели (Claude, GPT-5.4, Gemini) показывают крайне низкую точность - менее 5% без доступа к документам и менее 12% с интернетом. Даже при прямом доступе к полному корпусу документов агенты решают менее половины задач с точностью 34.1%, хотя структурированное представление документов улучшает результаты на 16.1%. Работа выявляет серьёзные ограничения современных моделей в надёжном выполнении операций, требующих точного извлечения информации из больших гетерогенных корпусов документов.'}, 'en': {'title': "Evaluating AI's Grounded Reasoning with OfficeQA Pro", 'desc': "OfficeQA Pro is a benchmark designed to assess AI agents' abilities in multi-document reasoning using a vast collection of historical financial documents. The dataset includes U.S. Treasury Bulletins with extensive numerical data, requiring AI to perform complex tasks like document parsing and analytical reasoning. Even advanced language models like GPT-5.4 and Claude Opus 4.6 show limited accuracy, struggling with over half of the questions when given direct access to the documents. Improvements were noted when using structured document representations, but there is still a significant gap before these AI agents can reliably handle enterprise-level grounded reasoning tasks."}, 'zh': {'title': '提升 AI 代理的多文档推理能力', 'desc': 'OfficeQA Pro 是一个用于评估 AI 代理在多文档推理方面的基准，特别是针对历史金融文档的分析。该文档库包含近 100 年的美国财政公报，涵盖 89,000 页和超过 2600 万个数值。研究发现，尽管前沿的大型语言模型在处理这些文档时表现出色，但在准确性上仍然存在显著挑战，尤其是在需要精确解析和分析的情况下。通过使用结构化文档表示，AI 代理的性能有所提升，但仍需进一步改进以达到企业级的推理能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (5)', '#agi', '#alignment (1)', '#architecture (2)', '#audio', '#benchmark (7)', '#cv (2)', '#data', '#dataset (3)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability (2)', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (3)', '#open_source (1)', '#optimization (2)', '#plp', '#rag', '#reasoning (5)', '#rl (2)', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey (2)', '#synthetic (1)', '#training (6)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-10 04:03',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-10 04:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-10 04:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
