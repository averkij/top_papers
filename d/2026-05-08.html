    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.06507', 'title': 'MARBLE: Multi-Aspect Reward Balance for Diffusion RL', 'url': 'https://huggingface.co/papers/2605.06507', 'abstract': "Abstract A novel gradient-space optimization framework called MARBLE addresses limitations in multi-reward reinforcement learning fine-tuning of diffusion models by maintaining independent advantage estimators and harmonizing policy gradients through quadratic programming without manual reward weighting.  AI-generated summary Reinforcement learning fine-tuning has become the dominant approach for aligning diffusion models with human preferences. However, assessing images is intrinsically a multi-dimensional task, and multiple evaluation criteria need to be optimized simultaneously. Existing practice deal with multiple rewards by training one specialist model per reward, optimizing a weighted-sum reward R(x)=sum_k w_k R_k(x), or sequentially fine-tuning with a hand-crafted stage schedule. These approaches either fail to produce a unified model that can be jointly trained on all rewards or necessitates heavy manually tuned sequential training. We find that the failure stems from using a naive weighted-sum reward aggregation. This approach suffers from a sample-level mismatch because most rollouts are specialist samples, highly informative for certain reward dimensions but irrelevant for others; consequently, weighted summation dilutes their supervision. To address this issue, we propose MARBLE (Multi-Aspect Reward BaLancE), a gradient-space optimization framework that maintains independent advantage estimators for each reward, computes per-reward policy gradients, and harmonizes them into a single update direction without manually-tuned reward weighting, by solving a Quadratic Programming problem. We further propose an amortized formulation that exploits the affine structure of the loss used in DiffusionNFT, to reduce the per-step cost from K+1 backward passes to near single-reward baseline cost, together with EMA smoothing on the balancing coefficients to stabilize updates against transient single-batch fluctuations. On SD3.5 Medium with five rewards, MARBLE improves all five reward dimensions simultaneously, turns the worst-aligned reward's gradient cosine from negative under weighted summation in 80% of mini-batches to consistently positive, and runs at 0.97X the training speed of baseline training.", 'score': 14, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0b95ba5146f98485', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#rl', '#video', '#alignment', '#diffusion', '#training', '#optimization', '#rlhf'], 'emoji': '⚖️', 'ru': {'title': 'Гармония градиентов: многокритериальная оптимизация без ручной балансировки', 'desc': 'Статья представляет MARBLE — новый фреймворк оптимизации в пространстве градиентов для многокритериального обучения с подкреплением при тонкой настройке диффузионных моделей. Вместо традиционного взвешенного суммирования вознаграждений, метод поддерживает независимые оценки преимущества для каждого критерия и гармонизирует политические градиенты через квадратичное программирование без ручного подбора весов. Подход решает проблему несоответствия образцов на уровне отдельных примеров, когда специализированные примеры высокоинформативны только для одного критерия. Экспериментальные результаты показывают, что MARBLE одновременно улучшает все пять критериев на SD3.5 Medium с минимальными вычислительными затратами.'}, 'en': {'title': 'Harmonizing Multi-Reward Learning with MARBLE', 'desc': 'The paper introduces MARBLE, a new framework for optimizing multi-reward reinforcement learning in diffusion models. It addresses the challenges of using weighted-sum reward aggregation, which can dilute the effectiveness of training by mixing specialist samples that are only relevant for certain rewards. MARBLE maintains independent advantage estimators for each reward and harmonizes policy gradients through quadratic programming, eliminating the need for manual reward weighting. This approach not only improves the alignment of multiple rewards but also enhances training efficiency, achieving better performance across all reward dimensions simultaneously.'}, 'zh': {'title': 'MARBLE：多奖励优化的新方法', 'desc': 'MARBLE是一种新的梯度空间优化框架，旨在解决多奖励强化学习在微调扩散模型时的局限性。它通过保持独立的优势估计器，并利用二次规划和谐化策略梯度，避免了手动奖励加权的问题。与传统方法不同，MARBLE能够同时优化多个评估标准，而不需要为每个奖励训练单独的模型。实验结果表明，MARBLE在多个奖励维度上均有显著提升，并且训练速度接近基线的97%。'}}}, {'id': 'https://huggingface.co/papers/2605.05724', 'title': 'Auto Research with Specialist Agents Develops Effective and Non-Trivial Training Recipes', 'url': 'https://huggingface.co/papers/2605.05724', 'abstract': 'Abstract Auto research operates as an empirical loop where agents iteratively refine code based on evaluation feedback, achieving improved performance across multiple tasks without human intervention.  AI-generated summary We study auto research as a closed empirical loop driven by external measurement. Each submitted trial carries a hypothesis, an executable code edit, an evaluator-owned outcome, and feedback that shapes the next proposal. The output is not a generated paper or a single model checkpoint, but an auditable trajectory of proposals, code diffs, experiments, scores, and failure labels. We instantiate this loop with specialist agents that partition recipe surfaces and share measured lineage across trials. The central empirical finding is that lineage feedback lets agents turn evaluator outcomes, including crashes, budget overruns, size failures, and accuracy-gate misses, into later program-level recipe edits rather than one-shot suggestions. Across 1,197 headline-run trials plus 600 Parameter Golf control trials after one-time setup and launch, humans did not choose proposals, edit recipes, override scores, or repair failed trials during the search. In the three headline runs, the same submitted-trial loop reduces Parameter Golf validation bpb by 0.81%, raises NanoChat-D12 CORE by 38.7%, and reduces CIFAR-10 Airbench96 wallclock by 4.59%, with each task measured by its own external evaluator and legality checks. The trace includes a strict architecture-domain audit of 157 headline-run submissions and program rewrites such as a NanoChat attention-kernel path change. Within this scope the loop autonomously writes code, submits experiments, absorbs feedback, applies and combines known techniques inside each environment, and improves public starting recipes.', 'score': 5, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'f0824c6afb54725c', 'authors': ['Jingjie Ning', 'Xiaochuan Li', 'Ji Zeng', 'Hao Kang', 'Chenyan Xiong'], 'affiliations': ['School of Computer Science, Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.05724.jpg', 'data': {'categories': ['#training', '#benchmark', '#small_models', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Автономные агенты учатся на ошибках через замкнутый цикл обратной связи', 'desc': 'Статья описывает автоматизированный цикл исследований, в котором агенты итеративно улучшают код на основе обратной связи от оценивателей без участия человека. Система работает как замкнутый эмпирический цикл, где каждая попытка содержит гипотезу, изменения кода, результаты оценки и обратную связь для следующей итерации. Ключевое открытие заключается в том, что обратная связь от оценивателей (включая ошибки и превышения бюджета) преобразуется агентами в улучшения на уровне программы, а не просто в единовременные предложения. На практике система достигла улучшений в трёх задачах: снизила метрику валидации на 0.81%, повысила производительность модели на 38.7% и уменьшила время выполнения на 4.59%.'}, 'en': {'title': 'Autonomous Code Refinement Through Feedback Loops', 'desc': 'This paper explores the concept of auto research in machine learning, where agents autonomously refine their code based on feedback from evaluations. The process involves submitting trials that include hypotheses, code changes, and outcomes, which inform future proposals. The study demonstrates that feedback from previous trials can be used to make informed edits to the code, rather than relying on one-time suggestions. The results show significant improvements in various tasks without human intervention, highlighting the effectiveness of this iterative, empirical approach.'}, 'zh': {'title': '自动研究：无须人类干预的自我优化循环', 'desc': '这篇论文研究了自动研究作为一个封闭的经验循环，利用外部测量来驱动改进。每次提交的试验都包含假设、可执行的代码编辑、评估者拥有的结果和反馈，这些反馈会影响下一次提案。研究发现，反馈可以帮助代理将评估结果转化为后续的程序级别编辑，而不是一次性的建议。通过大量的实验，系统在没有人类干预的情况下，自动生成代码、提交实验并吸收反馈，从而不断提高性能。'}}}, {'id': 'https://huggingface.co/papers/2605.06196', 'title': 'The Granularity Axis: A Micro-to-Macro Latent Direction for Social Roles in Language Models', 'url': 'https://huggingface.co/papers/2605.06196', 'abstract': "Abstract Large language models encode social role granularity as a structured latent dimension that can be manipulated through activation steering, demonstrating consistent patterns across different model architectures and prompting conditions.  AI-generated summary Large language models (LLMs) are routinely prompted to take on social roles ranging from individuals to institutions, yet it remains unclear whether their internal representations encode the granularity of such roles, from micro-level individual experience to macro-level organizational, institutional, or national reasoning. We show that they do. We define a contrast-based Granularity Axis as the difference between mean macro- and micro-role hidden states. In Qwen3-8B, this axis aligns with the principal axis (PC1) of the role representation space at cosine 0.972 and accounts for 52.6% of its variance, indicating that granularity is the dominant geometric axis organizing prompted social roles. We construct 75 social roles across five granularity levels and collect 91,200 role-conditioned responses over shared questions and prompt variants, then extract role-level hidden states and project them onto the axis. Role projections increase monotonically across all five levels, remain stable across layers, prompt variants, endpoint definitions, held-out splits, and score-filtered subsets, and transfer to Llama-3.1-8B-Instruct. The axis is also causally relevant: activation steering along it shifts response granularity in the predicted direction, with Llama moving from 2.00 to 3.17 on a five-point macro scale under positive steering on prompts that admit local responses. The two models differ in controllability, suggesting that steering depends on each model's default operating regime. Overall, our findings suggest that social role granularity is not merely a stylistic surface feature, but a structured, ordered, and causally manipulable latent direction in role-conditioned language model behavior.", 'score': 2, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '19c4c7fe0857d8e9', 'authors': ['Chonghan Qin', 'Xiachong Feng', 'Ziyun Song', 'Xiaocheng Feng', 'Jing Xiong', 'Lingpeng Kong'], 'affiliations': ['Harbin Institute of Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.06196.jpg', 'data': {'categories': ['#architecture', '#interpretability', '#alignment', '#training'], 'emoji': '🎭', 'ru': {'title': 'Социальная роль как управляемое скрытое измерение в языковых моделях', 'desc': 'В этой работе авторы показали, что большие языковые модели кодируют уровень детализации социальных ролей как структурированное скрытое измерение в своих внутренних представлениях. Исследователи определили ось гранулярности как разницу между средними скрытыми состояниями макро- и микро-ролей и обнаружили, что она является доминирующей геометрической осью в пространстве представлений ролей. Они протестировали это на 75 социальных ролях, разделённых на пять уровней детализации, и показали, что проекции ролей монотонно возрастают вдоль оси, оставаясь стабильными через слои модели и переносясь между разными архитектурами. Кроме того, авторы продемонстрировали каузальную релевантность оси: управление активациями вдоль неё успешно смещает ответы модели от микро-уровня к макро-уровню и обратно.'}, 'en': {'title': 'Unlocking Social Role Granularity in Language Models', 'desc': "This paper explores how large language models (LLMs) represent social roles with varying levels of detail, from individual experiences to broader institutional perspectives. It introduces a concept called the Granularity Axis, which quantifies the difference between micro-level and macro-level role representations. The study demonstrates that this axis is a significant factor in organizing social roles within the model, accounting for a large portion of variance in role representation. Additionally, the research shows that manipulating this axis through activation steering can effectively change the model's responses, indicating that social role granularity is a structured and controllable aspect of LLM behavior."}, 'zh': {'title': '社会角色细粒度的潜在操控', 'desc': '这篇论文探讨了大型语言模型如何编码社会角色的细粒度，并通过激活引导进行操控。研究表明，这些模型的内部表示能够反映从个体经验到组织、机构或国家推理的不同层次。作者定义了一个对比基础的细粒度轴，显示出在不同模型架构和提示条件下，社会角色的表现具有一致的模式。结果表明，社会角色的细粒度不仅是表面特征，而是可以结构化、排序和因果操控的潜在方向。'}}}, {'id': 'https://huggingface.co/papers/2605.06638', 'title': 'Can RL Teach Long-Horizon Reasoning to LLMs? Expressiveness Is Key', 'url': 'https://huggingface.co/papers/2605.06638', 'abstract': 'Abstract ScaleLogic demonstrates that reinforcement learning training compute scales as a power law with reasoning depth, with scaling exponents increasing monotonically with logical expressiveness across multiple reasoning tasks.  AI-generated summary Reinforcement learning (RL) has been applied to improve large language model (LLM) reasoning, yet the systematic study of how training scales with task difficulty has been hampered by the lack of controlled, scalable environments. We introduce ScaleLogic, a synthetic logical reasoning framework that offers independent control over two axes of difficulty: the depth of the required proof planning (i.e., the horizon) and the expressiveness of the underlying logic. Our proposed framework supports a wide range of logics: from simple implication-only logic ("if-then") towards more expressive first-order reasoning with conjunction ("and"), disjunction ("or"), negation ("not"), and universal quantification ("for all"). Using this framework, we show that the RL training compute T follows a power law with respect to reasoning depth D (T propto D^γ, R^{2} > 0.99), and that the scaling exponent γ increases monotonically with logical expressiveness, from 1.04 to 2.60. On downstream mathematics and general reasoning benchmarks, more expressive training settings yield both larger performance gains (up to +10.66 points) and more compute-efficient transfer compared to less expressive settings, demonstrating that what a model is trained on, not just how much it is trained, shapes downstream transfer. We further show that the power-law relationship holds across multiple RL methods, and curriculum-based training substantially improves scaling efficiency.', 'score': 1, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'dfbbecdb02b91ea0', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#rl', '#dataset', '#synthetic', '#transfer_learning', '#training', '#optimization', '#reasoning', '#benchmark'], 'emoji': '📐', 'ru': {'title': 'Степенной закон масштабирования обучения с подкреплением в зависимости от логической сложности', 'desc': 'В статье представлена ScaleLogic — синтетическая среда для изучения логических рассуждений, которая позволяет независимо контролировать глубину доказательства и выразительность логики. Авторы показывают, что объём вычислительных ресурсов для обучения с подкреплением масштабируется как степенной закон в зависимости от глубины рассуждений, причём показатель степени растёт с увеличением логической выразительности задач. Исследование демонстрирует, что более выразительные логические системы обеспечивают лучший перенос знаний на задачи математического и общего рассуждения, и что учебный план обучения существенно улучшает эффективность масштабирования. Результаты подтверждают, что не только объём обучающих данных, но и их качество и сложность определяют способность модели к обобщению.'}, 'en': {'title': 'Scaling Reinforcement Learning with Logical Reasoning Complexity', 'desc': 'The paper introduces ScaleLogic, a framework for studying how reinforcement learning (RL) training scales with the complexity of logical reasoning tasks. It shows that the amount of compute needed for training follows a power law based on the depth of reasoning required, meaning that as tasks become more complex, the compute required increases significantly. The research highlights that more expressive logical frameworks lead to better performance in downstream tasks, indicating that the type of training is crucial for effective learning. Additionally, the findings suggest that using a structured approach to training can enhance efficiency in scaling RL models.'}, 'zh': {'title': '强化学习训练与推理深度的幂律关系', 'desc': 'ScaleLogic展示了强化学习训练的计算需求与推理深度之间遵循幂律关系，并且随着逻辑表达能力的增强，幂律指数单调增加。我们提出的ScaleLogic框架允许独立控制推理任务的两个难度轴：所需证明规划的深度和基础逻辑的表达能力。通过这个框架，我们发现训练计算需求与推理深度之间的关系可以用幂律公式表示，并且更具表达能力的训练设置在下游任务中表现出更大的性能提升和更高的计算效率。我们的研究表明，模型的训练内容而不仅仅是训练量，决定了其在下游任务中的迁移能力。'}}}, {'id': 'https://huggingface.co/papers/2605.06651', 'title': 'AI Co-Mathematician: Accelerating Mathematicians with Agentic AI', 'url': 'https://huggingface.co/papers/2605.06651', 'abstract': 'Abstract  We introduce the AI co-mathematician, a workbench for mathematicians to interactively leverage AI agents to pursue open-ended research. The AI co-mathematician is optimized to provide holistic support for the exploratory and iterative reality of mathematical workflows, including ideation, literature search, computational exploration, theorem proving and theory building. By providing an asynchronous, stateful workspace that manages uncertainty, refines user intent, tracks failed hypotheses, and outputs native mathematical artifacts, the system mirrors human collaborative workflows. In early tests, the AI co-mathematician helped researchers solve open problems, identify new research directions, and uncover overlooked literature references. Besides demonstrating a highly interactive paradigm for AI-assisted mathematical discovery, the AI co-mathematician also achieves state of the art results on hard problem-solving benchmarks, including scoring 48% on FrontierMath Tier 4, a new high score among all AI systems evaluated.', 'score': 0, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '2fb893c19ba56103', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🧮', 'ru': {'title': 'Интерактивный математический помощник на базе искусственного интеллекта', 'desc': 'Представлена система AI co-mathematician, которая помогает математикам в проведении исследований благодаря интеграции агентов на основе больших языковых моделей. Система поддерживает все этапы математического творчества: от генерации идей и поиска литературы до вычислительных экспериментов и доказательства теорем. Платформа использует асинхронный рабочий процесс, управляет неопределённостью, отслеживает неудачные гипотезы и генерирует математические объекты в нативных форматах. При тестировании система помогла исследователям решить открытые проблемы и достигла рекордных результатов на сложных бенчмарках задач.'}, 'en': {'title': 'Empowering Mathematicians with AI Collaboration', 'desc': 'The AI co-mathematician is a tool designed to assist mathematicians in their research by using AI agents. It supports various stages of mathematical work, such as brainstorming ideas, searching for relevant literature, exploring computations, proving theorems, and building theories. This system creates a collaborative environment that adapts to user needs, manages uncertainties, and tracks previous attempts, making it similar to how humans work together. In initial tests, it has successfully helped researchers tackle complex problems and discover new areas of study, achieving impressive results on challenging benchmarks.'}, 'zh': {'title': 'AI共数学家：数学研究的新助手', 'desc': '我们介绍了AI共数学家，这是一个供数学家互动使用的工作平台，旨在利用AI代理进行开放式研究。AI共数学家优化了数学工作流程的探索性和迭代性，支持创意生成、文献搜索、计算探索、定理证明和理论构建。该系统提供一个异步的、有状态的工作空间，管理不确定性、细化用户意图、跟踪失败的假设，并输出原生数学成果，模拟人类的协作工作流程。在早期测试中，AI共数学家帮助研究人员解决开放性问题，识别新的研究方向，并发现被忽视的文献参考。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment (2)', '#architecture (1)', '#audio', '#benchmark (2)', '#cv', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability (1)', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal', '#open_source', '#optimization (2)', '#plp', '#rag', '#reasoning (1)', '#rl (2)', '#rlhf (1)', '#robotics', '#science', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (4)', '#transfer_learning (1)', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories &&

                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);

            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

                                <div style="display:table-cell; vertical-align: middle;">

                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">

                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>

                            <div class="affiliations">${affiliations}</div>

                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-08 02:12',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-08 02:12')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-08 02:12')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
