ool management to improve task completion rates while maintaining conversational quality.  AI-generated summary Recent end-to-end spoken dialogue models enable natural interaction. However, as user demands become increasingly complex, models that rely solely on conversational abilities often struggle to cope. Incorporating agentic capabilities is therefore essential: by enabling tool use, these models can extend their knowledge boundaries and better solve real-world tasks. Yet, existing research has largely concentrated on core perception and generation, with comparatively limited exploration of such tool-augmented extensions. To bridge this gap, we present VoxMind, an integrated framework designed to equip end-to-end spoken dialogue models with comprehensive agentic abilities. Leveraging our curated 470-hour AgentChat dataset, we incorporate a "Think-before-Speak" mechanism, enabling the model to internalize structured reasoning as a critical prerequisite for planning and response generation. Furthermore, to mitigate latency bottlenecks caused by large-scale tool integration, we propose a Multi-Agent Dynamic Tool Management architecture. By asynchronously delegating retrieval tasks to an auxiliary agent aligned with the main model\'s reasoning trajectory, this system effectively decouples inference latency from toolset size. Experimental results confirm that VoxMind achieves significant improvements in agent performance: compared with strong baselines, the task completion rate increases from 34.88% to 74.57%, outperforming Gemini-2.5-Pro on spoken agent tasks while preserving general conversational quality. The source code and associated data are publicly available at https://github.com/MM-Speech/VoxMind.', 'score': 6, 'issue_id': 1995, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '436d8f3f3620c2f8', 'authors': ['Tianle Liang', 'Yifu Chen', 'Shengpeng Ji', 'Yijun Chen', 'Zhiyang Jia', 'Jingyu Lu', 'Fan Zhuo', 'Xueyi Pu', 'Yangzhuo Li', 'Zhou Zhao'], 'affiliations': ['China University of Petroleum-Beijing at Karamay', 'Xiamen University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.15710.jpg', 'data': {'categories': ['#audio', '#training', '#dataset', '#agents'], 'emoji': '🗣️', 'ru': {'title': 'Голосовой агент, который сначала думает, потом говорит', 'desc': 'VoxMind — это фреймворк для расширения моделей голосового диалога агентными способностями, позволяющий им использовать внешние инструменты для решения сложных задач. Ключевой инновацией является механизм "Think-before-Speak", который заставляет модель проводить структурированное рассуждение перед формированием ответа. Архитектура Multi-Agent Dynamic Tool Management решает проблему задержек при работе с большим количеством инструментов, асинхронно делегируя задачи вспомогательному агенту. На датасете AgentChat модель достигла увеличения процента завершённых задач с 34,88% до 74,57%, превзойдя Gemini-2.5-Pro в агентских задачах при сохранении качества обычного диалога.'}, 'en': {'title': 'Empowering Dialogue with Agentic Thinking', 'desc': "VoxMind is a framework that enhances spoken dialogue models by adding agentic capabilities, allowing them to perform tasks more effectively. It introduces a 'Think-before-Speak' mechanism that helps the model reason before responding, improving its planning and response generation. Additionally, VoxMind features a Multi-Agent Dynamic Tool Management system that reduces delays when using multiple tools, ensuring smooth interactions. Experimental results show that VoxMind significantly boosts task completion rates while maintaining high conversational quality, outperforming existing models."}, 'zh': {'title': 'VoxMind：提升对话模型的智能能力', 'desc': 'VoxMind 是一种增强语音对话模型的框架，采用了“先思考后发言”的机制和动态工具管理，以提高任务完成率并保持对话质量。随着用户需求的复杂化，传统的对话模型往往难以应对，因此引入代理能力显得尤为重要。VoxMind 通过使用 470 小时的 AgentChat 数据集，帮助模型进行结构化推理，从而更好地规划和生成响应。此外，VoxMind 还通过多代理动态工具管理架构，减少了大规模工具集成带来的延迟瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2604.17609', 'title': 'Agents Explore but Agents Ignore: LLMs Lack Environmental Curiosity', 'url': 'https://huggingface.co/papers/2604.17609', 'abstract': 'Abstract LLM-based agents fail to exploit discovered unexpected information despite recognizing it, indicating a lack of environmental curiosity that depends on tools, compute, and training data distribution.  AI-generated summary LLM-based agents are assumed to integrate environmental observations into their reasoning: discovering highly relevant but unexpected information should naturally lead to a model exploiting its own discoveries. We show that this assumption is false for current LLM-based agents, which struggle to reflect or react to unexpected information. Across three benchmarks (Terminal-Bench, SWE-Bench, AppWorld), we inject complete task solutions into the agent environments to deliberately expose a task\'s solution to a model. While agents discover these solutions on Terminal-Bench in 79-81% of runs, they interact, or exploit, them in only 37-50% of cases. This gap is starkest in AppWorld: agents see documentation stating that a command "returns the complete solution to this task" in over 90% of attempts but exploit this in fewer than 7% of trials. We show that agents lack what we call environmental curiosity: the capability to recognize and investigate unexpected but relevant observations in response to environmental stimuli. We identify three main factors influencing environmental curiosity: available tools in the agent scaffold, test-time compute, and training data distribution. Our findings identify configurations that maximize curiosity also achieve the best performance on the unmodified benchmarks. Yet even jointly optimized agents still ignore discovered solutions in the majority of trials: current agents use the environment to fetch expected information, but not to revise their strategy or maximally exploit useful stimuli.', 'score': 5, 'issue_id': 1995, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '3cd5deab6582d821', 'authors': ['Leon Engländer', 'Sophia Althammer', 'Ahmet Üstün', 'Matthias Gallé', 'Tom Sherborne'], 'affiliations': ['Cohere', 'Poolside'], 'pdf_title_img': 'assets/pdf/title_img/2604.17609.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Агенты видят, но не видят: почему LLM не используют неожиданные открытия', 'desc': 'В статье исследуется проблема LLM-based агентов, которые обнаруживают неожиданную полезную информацию в окружающей среде, но не используют её для решения задач. Авторы проводят эксперименты на трёх бенчмарках, намеренно размещая решения задач в среде агентов, и показывают значительный разрыв между обнаружением информации (79-81%) и её использованием (37-50%). Исследование выявляет три ключевых фактора, влияющих на «экологическую любознательность» агентов: доступные инструменты, вычислительные ресурсы на этапе тестирования и распределение данных обучения. Результаты показывают, что современные агенты используют окружающую среду только для получения ожидаемой информации, но не для пересмотра стратегии и максимального использования полезных стимулов.'}, 'en': {'title': 'Unlocking Environmental Curiosity in LLM Agents', 'desc': 'This paper discusses the limitations of LLM-based agents in utilizing unexpected information they encounter in their environments. Despite recognizing relevant discoveries, these agents often fail to exploit them due to a lack of environmental curiosity. The study identifies three key factors that influence this curiosity: the tools available to the agents, the computational resources at their disposal, and the distribution of training data. The findings suggest that even when agents are optimized for curiosity, they still do not effectively use discovered solutions, indicating a need for improved strategies in their learning processes.'}, 'zh': {'title': '提升环境好奇心，优化智能体表现', 'desc': '本研究探讨了基于大语言模型（LLM）的智能体在面对意外信息时的表现。尽管这些智能体能够识别出相关信息，但它们缺乏环境好奇心，无法有效利用这些发现。我们通过三个基准测试展示了智能体在发现任务解决方案后，实际利用这些信息的比例非常低。研究表明，环境好奇心受限于可用工具、计算能力和训练数据分布等因素。'}}}, {'id': 'https://huggingface.co/papers/2604.11102', 'title': 'OmniScript: Towards Audio-Visual Script Generation for Long-Form Cinematic Video', 'url': 'https://huggingface.co/papers/2604.11102', 'abstract': 'Abstract A novel video-to-script task is introduced along with OmniScript, an 8B-parameter omni-modal language model trained through progressive pipeline techniques for long-form narrative comprehension and temporal localization.  AI-generated summary Current multimodal large language models (MLLMs) have demonstrated remarkable capabilities in short-form video understanding, yet translating long-form cinematic videos into detailed, temporally grounded scripts remains a significant challenge. This paper introduces the novel video-to-script (V2S) task, aiming to generate hierarchical, scene-by-scene scripts encompassing character actions, dialogues, expressions, and audio cues. To facilitate this, we construct a first-of-its-kind human-annotated benchmark and propose a temporally-aware hierarchical evaluation framework. Furthermore, we present OmniScript, an 8B-parameter omni-modal (audio-visual) language model tailored for long-form narrative comprehension. OmniScript is trained via a progressive pipeline that leverages chain-of-thought supervised fine-tuning for plot and character reasoning, followed by reinforcement learning using temporally segmented rewards. Extensive experiments demonstrate that despite its parameter efficiency, OmniScript significantly outperforms larger open-source models and achieves performance comparable to state-of-the-art proprietary models, including Gemini 3-Pro, in both temporal localization and multi-field semantic accuracy.', 'score': 5, 'issue_id': 1989, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'bc7b95ec274b306b', 'authors': ['Junfu Pu', 'Yuxin Chen', 'Teng Wang', 'Ying Shan'], 'affiliations': ['ARC Lab, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2604.11102.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#long_context', '#dataset', '#rlhf', '#story_generation', '#multimodal', '#video', '#benchmark', '#training'], 'emoji': '🎬', 'ru': {'title': 'От видео к сценарию: омниомодальная модель для понимания длинных кинематографических произведений', 'desc': 'В работе предложена новая задача видео-в-сценарий (V2S) и модель OmniScript - омниомодальная языковая модель с 8 миллиардами параметров, которая понимает длинные видеоконтенты и локализует события во времени. Модель обучается с использованием прогрессивного конвейера, включающего supervised fine-tuning с цепочками рассуждений для анализа сюжета и персонажей, а затем reinforcement learning с временными сегментированными наградами. Авторы создали первый размеченный вручную бенчмарк для этой задачи и разработали иерархическую систему оценки, учитывающую временную локализацию. Несмотря на относительную компактность, OmniScript превосходит более крупные открытые модели и показывает результаты, сравнимые с передовыми проприетарными системами типа Gemini 3-Pro.'}, 'en': {'title': 'Transforming Videos into Detailed Scripts with OmniScript', 'desc': 'This paper introduces a new task called video-to-script (V2S), which focuses on converting long cinematic videos into detailed scripts that include character actions, dialogues, and audio cues. To support this task, the authors developed OmniScript, an 8 billion parameter omni-modal language model designed for understanding complex narratives. The model is trained using a progressive pipeline that combines supervised fine-tuning and reinforcement learning to enhance its ability to reason about plots and characters. The results show that OmniScript outperforms larger models and competes well with leading proprietary models in terms of accuracy and temporal understanding.'}, 'zh': {'title': '视频到脚本：长篇叙事的新突破', 'desc': '本文介绍了一种新的视频到脚本（V2S）任务，旨在将长篇电影视频转换为详细的分场景脚本，涵盖角色动作、对话、表情和音频提示。为此，研究者构建了一个首个人工标注的基准数据集，并提出了一种时序感知的分层评估框架。文章还介绍了OmniScript，这是一种具有8亿参数的全模态语言模型，专门用于长篇叙事理解。通过逐步管道训练，OmniScript在情节和角色推理方面表现出色，并在时序定位和多领域语义准确性上超越了许多大型开源模型。'}}}, {'id': 'https://huggingface.co/papers/2604.18131', 'title': 'Training LLM Agents for Spontaneous, Reward-Free Self-Evolution via World Knowledge Exploration', 'url': 'https://huggingface.co/papers/2604.18131', 'abstract': "Abstract Agents equipped with intrinsic meta-evolution capabilities demonstrate improved performance on web navigation tasks through self-generated world knowledge without external supervision.  AI-generated summary Most agents today ``self-evolve'' by following rewards and rules defined by humans. However, this process remains fundamentally dependent on external supervision; without human guidance, the evolution stops. In this work, we train agents to possess an intrinsic meta-evolution capability to spontaneously learn about unseen environments prior to task execution.   To instill this ability, we design an outcome-based reward mechanism that measures how much an agent's self-generated world knowledge improves its success rate on downstream tasks. This reward signal is used exclusively during the training phase to teach the model how to explore and summarize effectively. At inference time, the agent requires no external rewards or human instructions. It spontaneously performs native self-evolution to adapt to unknown environments using its internal parameters.   When applied to Qwen3-30B and Seed-OSS-36B, this shift to native evolution yields a 20% performance increase on WebVoyager and WebWalker. Most strikingly, the generated world knowledge even enables a compact 14B Qwen3 model to outperform the unassisted Gemini-2.5-Flash, establishing a new paradigm for truly evolving agents.", 'score': 4, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '07dff20b36d355a8', 'authors': ['Qifan Zhang', 'Dongyang Ma', 'Tianqing Fang', 'Jia Li', 'Jing Tang', 'Nuo Chen', 'Haitao Mi', 'Yan Wang'], 'affiliations': ['Tencent', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2604.18131.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Агенты, которые учатся эволюционировать сами по себе', 'desc': 'Исследование предлагает агентам способность к внутренней мета-эволюции, позволяя им самостоятельно генерировать знания об окружении без внешнего контроля во время вывода. Авторы разработали механизм вознаграждения на основе результатов, который оценивает, насколько самогенерированные знания об окружении улучшают успешность выполнения задач, обучая модель эффективно исследовать и анализировать информацию. Предложенный подход демонстрирует 20% улучшение производительности на задачах навигации по сайтам и позволяет более компактным моделям превзойти более крупные системы. Главное достижение заключается в том, что агенты достигают истинной эволюции, опираясь исключительно на внутренние параметры во время инференса.'}, 'en': {'title': 'Empowering Agents with Self-Driven Evolution for Enhanced Web Navigation', 'desc': 'This paper presents agents that can evolve their own knowledge without needing human guidance, enhancing their ability to navigate the web. These agents use a unique reward system that encourages them to learn about new environments before they start their tasks. By training with this intrinsic meta-evolution capability, the agents can adapt and improve their performance on various tasks independently. The results show significant performance gains, demonstrating a new approach to creating self-sufficient AI agents.'}, 'zh': {'title': '内在进化：智能体自我学习的新范式', 'desc': '本研究提出了一种具备内在元进化能力的智能体，能够在没有外部监督的情况下，通过自我生成的世界知识在网页导航任务中表现更好。传统的智能体依赖于人类定义的奖励和规则进行自我进化，但这种方法在没有人类指导时会停止进化。我们设计了一种基于结果的奖励机制，帮助智能体在任务执行前自发学习未知环境。实验结果表明，这种内在进化能力使得智能体在WebVoyager和WebWalker任务中性能提升了20%。'}}}, {'id': 'https://huggingface.co/papers/2604.17696', 'title': 'Stratagem: Learning Transferable Reasoning via Trajectory-Modulated Game Self-Play', 'url': 'https://huggingface.co/papers/2604.17696', 'abstract': 'Abstract STRATAGEM addresses limitations in reasoning transfer for language models by using a reasoning transferability coefficient and evolution reward to promote abstract, domain-agnostic patterns over game-specific heuristics.  AI-generated summary Games offer a compelling paradigm for developing general reasoning capabilities in language models, as they naturally demand strategic planning, probabilistic inference, and adaptive decision-making. However, existing self-play approaches rely solely on terminal game outcomes, providing no mechanism to distinguish transferable reasoning patterns from game-specific heuristics. We present STRATAGEM, which addresses two fundamental barriers to reasoning transfer: domain specificity, where learned patterns remain anchored in game semantics, and contextual stasis, where static game contexts fail to cultivate progressive reasoning. STRATAGEM selectively reinforces trajectories exhibiting abstract, domain-agnostic reasoning through a Reasoning Transferability Coefficient, while incentivizing adaptive reasoning development via a Reasoning Evolution Reward. Experiments across mathematical reasoning, general reasoning, and code generation benchmarks demonstrate substantial improvements, with particularly strong gains on competition-level mathematics where multi-step reasoning is critical. Ablation studies and human evaluation confirm that both components contribute to transferable reasoning.', 'score': 4, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '683aaac3b64c9e8b', 'authors': ['Xiachong Feng', 'Deyi Yin', 'Xiaocheng Feng', 'Yi Jiang', 'Libo Qin', 'Yangfan Ye', 'Lei Huang', 'Weitao Ma', 'Qiming Li', 'Yuxuan Gu', 'Bing Qin', 'Lingpeng Kong'], 'affiliations': ['Harbin Institute of Technology', 'Harbin Institute of Technology, Shenzhen', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.17696.jpg', 'data': {'categories': ['#games', '#transfer_learning', '#reasoning'], 'emoji': '🎮', 'ru': {'title': 'От игровых стратегий к универсальному мышлению: учим модели переносить рассуждения', 'desc': 'STRATAGEM — это метод обучения языковых моделей, который решает проблему передачи рассуждений между разными задачами. Авторы предложили использовать коэффициент передаваемости рассуждений и эволюционную награду для подкрепления абстрактных, независимых от домена паттернов вместо специфичных для игры эвристик. Метод применяется к самоигре языковых моделей и позволяет развивать многошаговое логическое мышление, которое хорошо переносится на математические задачи и генерацию кода. Экспериментальные результаты показывают значительные улучшения на бенчмарках, особенно на задачах олимпиадной математики, где требуется глубокое рассуждение.'}, 'en': {'title': 'Enhancing Reasoning Transfer in Language Models with STRATAGEM', 'desc': 'STRATAGEM is a method designed to improve how language models transfer reasoning skills across different tasks. It introduces a Reasoning Transferability Coefficient to identify and promote reasoning patterns that are not tied to specific games. Additionally, it uses a Reasoning Evolution Reward to encourage models to adapt their reasoning strategies over time. Experiments show that STRATAGEM significantly enhances performance in various reasoning tasks, especially in complex scenarios requiring multi-step thinking.'}, 'zh': {'title': '提升推理转移能力的STRATAGEM', 'desc': 'STRATAGEM 解决了语言模型在推理转移方面的局限性，通过使用推理转移系数和演化奖励来促进抽象的、领域无关的模式，而不是特定于游戏的启发式方法。该方法强调在游戏中发展一般推理能力的重要性，因为游戏自然需要战略规划、概率推理和适应性决策。STRATAGEM 通过选择性强化展示抽象推理的轨迹，并激励适应性推理的发展，克服了领域特异性和上下文静态性这两个基本障碍。实验结果表明，该方法在数学推理、一般推理和代码生成基准测试中显著提高了性能，尤其在多步骤推理至关重要的竞争级数学中表现尤为突出。'}}}, {'id': 'https://huggingface.co/papers/2604.08537', 'title': 'Meta-learning In-Context Enables Training-Free Cross Subject Brain Decoding', 'url': 'https://huggingface.co/papers/2604.08537', 'abstract': "Abstract A meta-optimized approach enables generalizable semantic visual decoding from fMRI by rapidly inferring unique neural encoding patterns from few image-brain examples without fine-tuning across subjects and scanners.  AI-generated summary Visual decoding from brain signals is a key challenge at the intersection of computer vision and neuroscience, requiring methods that bridge neural representations and computational models of vision. A field-wide goal is to achieve generalizable, cross-subject models. A major obstacle towards this goal is the substantial variability in neural representations across individuals, which has so far required training bespoke models or fine-tuning separately for each subject. To address this challenge, we introduce a meta-optimized approach for semantic visual decoding from fMRI that generalizes to novel subjects without any fine-tuning. By simply conditioning on a small set of image-brain activation examples from the new individual, our model rapidly infers their unique neural encoding patterns to facilitate robust and efficient visual decoding. Our approach is explicitly optimized for in-context learning of the new subject's encoding model and performs decoding by hierarchical inference, inverting the encoder. First, for multiple brain regions, we estimate the per-voxel visual response encoder parameters by constructing a context over multiple stimuli and responses. Second, we construct a context consisting of encoder parameters and response values over multiple voxels to perform aggregated functional inversion. We demonstrate strong cross-subject and cross-scanner generalization across diverse visual backbones without retraining or fine-tuning. Moreover, our approach requires neither anatomical alignment nor stimulus overlap. This work is a critical step towards a generalizable foundation model for non-invasive brain decoding.", 'score': 4, 'issue_id': 1989, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'b8b94494034b57a1', 'authors': ['Mu Nan', 'Muquan Yu', 'Weijian Mai', 'Jacob S. Prince', 'Hossein Adeli', 'Rui Zhang', 'Jiahang Cao', 'Benjamin Becker', 'John A. Pyles', 'Margaret M. Henderson', 'Chunfeng Song', 'Nikolaus Kriegeskorte', 'Michael J. Tarr', 'Xiaoqing Hu', 'Andrew F. Luo'], 'affiliations': ['Carnegie Mellon University', 'Chinese University of Hong Kong', 'Columbia University', 'Harvard University', 'Shanghai Artificial Intelligence Laboratory', 'Shenzhen Loop Area Institute', 'University of Hong Kong', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.08537.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Универсальное декодирование мозга через мета-обучение без переобучения', 'desc': 'Авторы предлагают мета-оптимизированный подход для семантического декодирования зрительной информации из сигналов fMRI, который обобщается на новых субъектов без дополнительной настройки. Метод использует контекстное обучение, быстро выводя уникальные паттерны нейронного кодирования отдельного человека из небольшого набора примеров изображение-активность мозга. Подход выполняет декодирование через иерархическую инверсию энкодера, последовательно восстанавливая параметры визуальной реакции для отдельных вокселей и затем для их совокупности. Демонстрируется сильное кросс-субъектное и кросс-сканерное обобщение без переобучения, без анатомической выравнивания и требования совпадения стимулов.'}, 'en': {'title': 'Meta-Optimized Visual Decoding: Generalizing Brain Insights Without Fine-Tuning', 'desc': "This paper presents a meta-optimized method for semantic visual decoding from fMRI data, allowing for the inference of unique neural encoding patterns with minimal examples. The approach addresses the challenge of variability in neural representations across individuals, eliminating the need for fine-tuning or bespoke models for each subject. By conditioning on a small set of image-brain activation examples, the model efficiently learns the new subject's encoding patterns through hierarchical inference. This method demonstrates strong generalization capabilities across different subjects and scanners, paving the way for a more robust foundation in non-invasive brain decoding."}, 'zh': {'title': '无须微调的跨受试者视觉解码新方法', 'desc': '本研究提出了一种元优化的方法，可以从fMRI数据中进行语义视觉解码，能够在没有针对每个受试者和扫描仪进行微调的情况下，快速推断出独特的神经编码模式。该方法通过少量的图像-大脑激活示例，快速推断新个体的神经编码模式，从而实现稳健和高效的视觉解码。我们的方法专门优化了新受试者编码模型的上下文学习，并通过分层推理进行解码。我们的研究在不同的视觉基础上展示了强大的跨受试者和跨扫描仪的泛化能力，且不需要解剖对齐或刺激重叠。'}}}, {'id': 'https://huggingface.co/papers/2604.18203', 'title': 'Multiplication in Multimodal LLMs: Computation with Text, Image, and Audio Inputs', 'url': 'https://huggingface.co/papers/2604.18203', 'abstract': 'Abstract Multimodal large language models demonstrate consistent computational limitations in exact multi-digit multiplication across different representations and modalities, with performance closely tied to a novel arithmetic load metric that predicts accuracy better than traditional step-counting methods.  AI-generated summary Multimodal LLMs can accurately perceive numerical content across modalities yet fail to perform exact multi-digit multiplication when the identical underlying arithmetic problem is presented as numerals, number words, images, or in audio form. Because existing benchmarks often lack systematically paired instances across modalities, it remains difficult to compare genuine arithmetic limits within and across model families. We therefore introduce a controlled multimodal multiplication benchmark that factorially varies digit length, digit sparsity, representation (e.g., numerals vs. number words), and modality (text, rendered images, audio), with paired instances from a reproducible generator. We also define arithmetic load, C, as the product of the total and non-zero digit count as a compact, mechanistically motivated proxy for operation count. Across evaluations, accuracy falls sharply as C grows, often nearing zero by C > 100. Indeed, C remains predictive of performance across modalities and models, with R-squared often > 0.5, nearing the value from more complex measures of arithmetic load that count the number of intermediate arithmetic steps. A separate perception-versus-computation decomposition shows that multimodal degradation is primarily computational rather than perceptual: on matched-perception checks, models are near-perfect (> 99%) across modalities, even when multiplication accuracy drops. Beyond measuring when models fail, we ask which procedures they are predisposed to follow. We introduce a forced-completion loss probe that scores heuristic-specific reasoning prefixes--including columnar multiplication, distributive decomposition, and rounding/compensation. Here, decomposition is favored in both text and vision modalities; heuristic-specific LoRA adapters produce near-orthogonal updates yet degrade accuracy, indicating the base model maintains a well-tuned internal router.', 'score': 3, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '7679f87021afbacf', 'authors': ['Samuel G. Balter', 'Ethan Jerzak', 'Connor T. Jerzak'], 'affiliations': ['National University of Singapore', 'University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2604.18203.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#multimodal', '#benchmark', '#math'], 'emoji': '🧮', 'ru': {'title': 'Граница арифметического мышления мультимодальных нейросетей', 'desc': 'В работе исследуются вычислительные ограничения мультимодальных больших языковых моделей при выполнении точного умножения многозначных чисел. Авторы создали контролируемый бенчмарк, варьирующий количество цифр, их разреженность и модальность представления (текст, изображения, аудио), чтобы систематически оценить арифметические способности. Предложена новая метрика «арифметическая нагрузка», определённая как произведение общего числа цифр и количества ненулевых цифр, которая лучше предсказывает точность моделей, чем традиционные методы подсчёта шагов. Анализ показал, что снижение производительности в основном обусловлено вычислительными, а не перцептивными ограничениями моделей.'}, 'en': {'title': 'Unveiling the Arithmetic Limits of Multimodal LLMs', 'desc': "This paper investigates the limitations of multimodal large language models (LLMs) in performing exact multi-digit multiplication across various formats like text, images, and audio. The authors introduce a new benchmark that systematically tests these models on multiplication tasks while varying factors such as digit length and representation. They define a metric called 'arithmetic load' to predict model performance, finding that accuracy declines significantly as this load increases. The study reveals that the degradation in performance is primarily due to computational challenges rather than perceptual issues, suggesting that while models can perceive numbers well, they struggle with the arithmetic operations required for accurate multiplication."}, 'zh': {'title': '多模态模型的算术计算挑战', 'desc': '这篇论文探讨了多模态大型语言模型在多位数乘法计算中的局限性。尽管这些模型能够识别数字内容，但在面对相同的算术问题时，它们在不同表现形式（如数字、文字、图像或音频）下的准确性却显著下降。研究者们引入了一种新的多模态乘法基准，系统地变化数字长度、稀疏性和表现形式，以便更好地比较模型的算术能力。通过定义算术负载作为操作计数的代理，研究发现随着算术负载的增加，模型的准确性急剧下降，表明计算能力是主要的限制因素。'}}}, {'id': 'https://huggingface.co/papers/2604.16593', 'title': 'Revisiting a Pain in the Neck: A Semantic Reasoning Benchmark for Language Models', 'url': 'https://huggingface.co/papers/2604.16593', 'abstract': 'Abstract SemanticQA evaluates language models on semantic phrase processing tasks, revealing significant performance variations in reasoning and comprehension across different phrase types and model architectures.  AI-generated summary We present SemanticQA, an evaluation suite designed to assess language models (LMs) in semantic phrase processing tasks. The benchmark consolidates existing multiword expression (MwE) resources and reorganizes them into a unified testbed. It covers both general lexical phenomena, such as lexical collocations, and three fine-grained categories: idiomatic expressions, noun compounds, and verbal constructions. Through SemanticQA, we assess LMs of diverse architectures and scales in extraction, classification, and interpretation tasks, as well as sequential task compositions. We reveal substantial performance variation, particularly on tasks requiring semantic reasoning, highlighting differences in reasoning efficacy and semantic understanding of LMs, providing insights for pushing LMs with stronger comprehension on non-trivial semantic phrases. The evaluation harness and data of SemanticQA are available at https://github.com/jacklanda/SemanticQA.', 'score': 3, 'issue_id': 1989, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '706d11d182e24c93', 'authors': ['Yang Liu', 'Hongming Li', 'Melissa Xiaohui Qin', 'Qiankun Liu', 'Chao Huang'], 'affiliations': ['State Key Laboratory of General Artificial Intelligence, BIGAI', 'University of Science and Technology Beijing'], 'pdf_title_img': 'assets/pdf/title_img/2604.16593.jpg', 'data': {'categories': [], 'emoji': '🧩', 'ru': {'title': 'Оценка семантического понимания языковых моделей через сложные фразовые конструкции', 'desc': 'SemanticQA — это набор для оценки языковых моделей на задачах обработки семантических фраз, включающий многословные выражения, идиоматические конструкции и составные существительные. Авторы тестируют модели различных архитектур на задачах извлечения, классификации и интерпретации семантических единиц. Исследование выявляет значительные различия в производительности моделей, особенно на задачах, требующих семантического рассуждения. Результаты показывают, что существующие языковые модели испытывают трудности с пониманием нетривиальных семантических фраз.'}, 'en': {'title': 'Unlocking Language Models: Evaluating Semantic Understanding', 'desc': 'SemanticQA is a benchmark designed to evaluate language models on their ability to process semantic phrases. It organizes various multiword expression resources into a single testbed, focusing on both general lexical phenomena and specific categories like idiomatic expressions and noun compounds. The evaluation reveals significant differences in how well different models perform on tasks that require semantic reasoning and comprehension. This insight helps identify areas where language models can be improved for better understanding of complex semantic phrases.'}, 'zh': {'title': '评估语言模型的语义理解能力', 'desc': 'SemanticQA是一个评估语言模型在语义短语处理任务上的工具。它整合了现有的多词表达资源，并将其重新组织成一个统一的测试平台。该基准涵盖了通用的词汇现象和三种细分类别，包括习语、名词复合词和动词结构。通过SemanticQA，我们评估了不同架构和规模的语言模型在提取、分类和解释任务中的表现，揭示了在语义推理任务上显著的性能差异。'}}}, {'id': 'https://huggingface.co/papers/2604.18396', 'title': 'River-LLM: Large Language Model Seamless Exit Based on KV Share', 'url': 'https://huggingface.co/papers/2604.18396', 'abstract': "Abstract River-LLM enables efficient token-level early exit in decoder-only LLMs through KV-sharing mechanisms that preserve historical states without latency overhead.  AI-generated summary Large Language Models (LLMs) have demonstrated exceptional performance across diverse domains but are increasingly constrained by high inference latency. Early Exit has emerged as a promising solution to accelerate inference by dynamically bypassing redundant layers. However, in decoder-only architectures, the efficiency of Early Exit is severely bottlenecked by the KV Cache Absence problem, where skipped layers fail to provide the necessary historical states for subsequent tokens. Existing solutions, such as recomputation or masking, either introduce significant latency overhead or incur severe precision loss, failing to bridge the gap between theoretical layer reduction and practical wall-clock speedup. In this paper, we propose River-LLM, a training-free framework that enables seamless token-level Early Exit. River-LLM introduces a lightweight KV-Shared Exit River that allows the backbone's missing KV cache to be naturally generated and preserved during the exit process, eliminating the need for costly recovery operations. Furthermore, we utilize state transition similarity within decoder blocks to predict cumulative KV errors and guide precise exit decisions. Extensive experiments on mathematical reasoning and code generation tasks demonstrate that River-LLM achieves 1.71 to 2.16 times of practical speedup while maintaining high generation quality.", 'score': 2, 'issue_id': 2000, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'cb92d9aa9c115927', 'authors': ['Yingtao Shen', 'An Zou'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.18396.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Эффективная ранняя остановка в LLM без потери контекста', 'desc': 'В статье предложена River-LLM — метод для ускорения инференса больших языковых моделей через механизм ранней остановки на уровне токенов. Основная проблема заключается в отсутствии KV Cache в пропущенных слоях декодера, что приводит к потере исторического контекста и снижению качества. Авторы решают это через KV-Shared Exit River — лёгкий механизм, который естественным образом генерирует и сохраняет необходимые состояния без дополнительных вычислительных затрат. Метод достигает ускорения в 1,71-2,16 раза на задачах математического рассуждения и генерации кода без значительной потери качества.'}, 'en': {'title': 'Accelerating LLMs with Efficient Early Exits', 'desc': 'River-LLM is a novel framework designed to improve the efficiency of decoder-only Large Language Models (LLMs) by enabling token-level early exits. It addresses the KV Cache Absence problem, which hinders the effectiveness of early exits by ensuring that historical states are preserved without adding latency. By introducing a KV-Shared Exit River, River-LLM allows for the generation of necessary KV caches during the exit process, avoiding costly recovery operations. Experimental results show that this approach can achieve significant speedups in inference while maintaining high-quality outputs in tasks like mathematical reasoning and code generation.'}, 'zh': {'title': 'River-LLM：高效的早期退出机制', 'desc': 'River-LLM 是一种新颖的框架，旨在提高解码器仅模型的推理效率。它通过共享键值（KV）机制，实现了在不增加延迟的情况下，保留历史状态，从而支持动态的早期退出。与传统方法相比，River-LLM 能够在跳过冗余层时，自动生成和保存缺失的 KV 缓存，避免了高昂的恢复成本。实验结果表明，River-LLM 在数学推理和代码生成任务中，能够实现 1.71 到 2.16 倍的实际加速，同时保持高质量的生成效果。'}}}, {'id': 'https://huggingface.co/papers/2604.17338', 'title': 'Precise Debugging Benchmark: Is Your Model Debugging or Regenerating?', 'url': 'https://huggingface.co/papers/2604.17338', 'abstract': 'Abstract Frontier LLMs demonstrate high test pass rates but poor precision in debugging tasks, indicating a gap between functional correctness and precise fault localization.  AI-generated summary Unlike code completion, debugging requires localizing faults and applying targeted edits. We observe that frontier LLMs often regenerate correct but over-edited solutions during debugging. To evaluate how far LLMs are from precise debugging, we introduce the Precise Debugging Benchmark (PDB) framework, which automatically converts any coding dataset into a debugging benchmark with precision-aware evaluation. PDB generates buggy programs by synthesizing verified atomic bugs and composing them into multi-bug programs. We define two novel metrics, edit-level precision and bug-level recall, which measures how many necessary edits are made and how many bugs are resolved. We release two evaluation benchmarks: PDB-Single-Hard on single-line bugs, and PDB-Multi on multi-line bugs. Experiments show that frontier models, such as GPT-5.1-Codex and DeepSeek-V3.2-Thinking, achieve unit-test pass rates above 76% but exhibit precision below 45%, even when explicitly instructed to perform minimal debugging. Finally, we show that iterative and agentic debugging strategies do not substantially improve precision or recall, highlighting the need to rethink post-training pipelines for coding models.', 'score': 2, 'issue_id': 1989, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': 'e4d91e3c9ec3eae2', 'authors': ['Wang Bill Zhu', 'Miaosen Chai', 'Shangshang Wang', 'Yejia Liu', 'Song Bian', 'Honghua Dong', 'Willie Neiswanger', 'Robin Jia'], 'affiliations': ['Microsoft', 'University of Southern California', 'University of Toronto', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2604.17338.jpg', 'data': {'categories': ['#benchmark', '#plp', '#agents'], 'emoji': '🐛', 'ru': {'title': 'Точная отладка кода: почему LLM вносят лишние правки', 'desc': 'Статья показывает, что современные большие языковые модели хорошо решают задачи написания кода, но плохо справляются с отладкой, так как они часто вносят лишние правки вместо целевого исправления ошибок. Авторы предлагают фреймворк Precise Debugging Benchmark (PDB), который автоматически преобразует любой набор данных с кодом в бенчмарк для оценки точности отладки. Они вводят новые метрики — точность на уровне правок и полнота на уровне ошибок, которые оценивают, насколько минимальны внесённые изменения и сколько ошибок действительно исправлено. Эксперименты показывают, что даже передовые модели достигают точности ниже 45%, и даже итеративные стратегии отладки не улучшают результаты существенно.'}, 'en': {'title': 'Bridging the Gap: Precision in Debugging with PDB', 'desc': 'This paper addresses the limitations of frontier large language models (LLMs) in debugging tasks, where they often achieve high test pass rates but lack precision in identifying and fixing code errors. The authors introduce the Precise Debugging Benchmark (PDB), a framework that transforms coding datasets into debugging benchmarks with a focus on precision-aware evaluation. PDB generates buggy programs by creating verified atomic bugs and combining them into more complex multi-bug scenarios. The study reveals that even advanced models struggle with precision in debugging, prompting a reevaluation of how coding models are trained and fine-tuned for better performance.'}, 'zh': {'title': '精确调试：填补功能与精度的鸿沟', 'desc': '前沿的大型语言模型（LLMs）在测试通过率上表现良好，但在调试任务中精确度较低，显示出功能正确性与精确故障定位之间的差距。调试不仅需要定位故障，还需要进行针对性的编辑，而前沿LLMs在调试时常常生成正确但过度编辑的解决方案。为评估LLMs在精确调试方面的表现，我们引入了精确调试基准（PDB）框架，该框架能够将任何编码数据集自动转换为具有精确度评估的调试基准。我们定义了两个新指标，编辑级精确度和故障级召回率，以衡量必要编辑的数量和解决的故障数量，并发布了两个评估基准：PDB-Single-Hard和PDB-Multi。'}}}, {'id': 'https://huggingface.co/papers/2604.16902', 'title': 'Beyond Text-Dominance: Understanding Modality Preference of Omni-modal Large Language Models', 'url': 'https://huggingface.co/papers/2604.16902', 'abstract': "Abstract Research reveals that native omni-modal large language models exhibit visual preference over text, with modality preference emerging progressively in mid-to-late layers and enabling diagnosis of cross-modal hallucinations.  AI-generated summary Native Omni-modal Large Language Models (OLLMs) have shifted from pipeline architectures to unified representation spaces. However, this native integration gives rise to a critical yet underexplored phenomenon: modality preference. To bridge this gap, we first systematically quantify modality preference of OLLMs using a newly-curated conflict-based benchmark and the modality selection rate metric. Our evaluation of ten representative OLLMs reveals a notable paradigm shift: unlike the ``text-dominance'' of traditional VLMs, most OLLMs exhibit a pronounced visual preference. To further understand the underlying mechanism, we conduct layer-wise probing and demonstrate that such modality preference is not static but emerges progressively in the mid-to-late layers. Building upon these insights, we leverage these internal signals to diagnose cross-modal hallucinations, achieving competitive performance across three downstream multi-modal benchmarks without task-specific data. Our work provides both a mechanistic understanding and a practical tool for building more trustworthy OLLMs. Our code and related resources are publicly available at: https://github.com/icip-cas/OmniPreference", 'score': 2, 'issue_id': 1991, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': 'c883eff879acb36b', 'authors': ['Xinru Yan', 'Boxi Cao', 'Yaojie Lu', 'Hongyu Lin', 'Weixiang Zhou', 'Le Sun', 'Xianpei Han'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences, Beijing, China', 'University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.16902.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#dataset'], 'emoji': '👀', 'ru': {'title': 'Зрение побеждает текст: как мультимодальные модели выбирают между информацией', 'desc': 'Исследование показывает, что единые мультимодальные языковые модели проявляют предпочтение визуальной информации над текстом. Авторы разработали метрику выбора модальности и бенчмарк на основе конфликтующих данных для количественной оценки этого явления. Они обнаружили, что модальное предпочтение не является статичным, а возникает прогрессивно в средних и поздних слоях нейронной сети. Используя эти внутренние сигналы модели, исследователи создали метод диагностики кроссмодальных галлюцинаций, который показывает конкурентные результаты на нескольких бенчмарках без использования задачно-специфичных данных.'}, 'en': {'title': 'Visual Preference: A New Era for Omni-Modal Language Models', 'desc': 'This paper investigates the behavior of native omni-modal large language models (OLLMs) in terms of their preference for visual information over text. It highlights a significant shift from traditional models, which typically favor text, to OLLMs that show a strong visual preference, especially in their mid-to-late layers. The authors introduce a new benchmark to quantify this modality preference and demonstrate how it can be used to diagnose cross-modal hallucinations effectively. Their findings not only enhance the understanding of OLLMs but also provide tools for improving their reliability in multi-modal tasks.'}, 'zh': {'title': '全模态语言模型的视觉偏好探索', 'desc': '本研究揭示了本地全模态大型语言模型（OLLMs）在视觉和文本之间存在偏好，且这种模态偏好在模型的中后层逐渐显现。我们通过新创建的基于冲突的基准和模态选择率指标，系统量化了OLLMs的模态偏好。与传统的视觉语言模型（VLMs）以文本为主的特征不同，大多数OLLMs表现出明显的视觉偏好。我们的研究不仅提供了对这一现象的机制理解，还为构建更可信的OLLMs提供了实用工具。'}}}, {'id': 'https://huggingface.co/papers/2604.06505', 'title': 'MedConclusion: A Benchmark for Biomedical Conclusion Generation from Structured Abstracts', 'url': 'https://huggingface.co/papers/2604.06505', 'abstract': "Abstract A large-scale dataset of 5.7 million PubMed structured abstracts is introduced for biomedical conclusion generation, enabling evaluation of large language models' ability to reason from structured scientific evidence.  AI-generated summary Large language models (LLMs) are widely explored for reasoning-intensive research tasks, yet resources for testing whether they can infer scientific conclusions from structured biomedical evidence remain limited. We introduce MedConclusion, a large-scale dataset of 5.7M PubMed structured abstracts for biomedical conclusion generation. Each instance pairs the non-conclusion sections of an abstract with the original author-written conclusion, providing naturally occurring supervision for evidence-to-conclusion reasoning. MedConclusion also includes journal-level metadata such as biomedical category and SJR, enabling subgroup analysis across biomedical domains. As an initial study, we evaluate diverse LLMs under conclusion and summary prompting settings and score outputs with both reference-based metrics and LLM-as-a-judge. We find that conclusion writing is behaviorally distinct from summary writing, strong models remain closely clustered under current automatic metrics, and judge identity can substantially shift absolute scores. MedConclusion provides a reusable data resource for studying scientific evidence-to-conclusion reasoning. Our code and data are available at: https://github.com/Harvard-AI-and-Robotics-Lab/MedConclusion.", 'score': 2, 'issue_id': 1989, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': 'ea42f054bffc121b', 'authors': ['Weiyue Li', 'Ruizhi Qian', 'Yi Li', 'Yongce Li', 'Yunfan Long', 'Jiahui Cai', 'Yan Luo', 'Mengyu Wang'], 'affiliations': ['Carnegie Mellon University', 'Harvard AI and Robotics Lab, Harvard Medical School', 'Kempner Institute for the Study of Natural and Artificial Intelligence, Harvard University', 'Stanford University', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2604.06505.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#science'], 'emoji': '🔬', 'ru': {'title': 'От научных фактов к выводам: датасет для обучения логическому рассуждению моделей', 'desc': 'Представлен новый датасет MedConclusion, содержащий 5.7 миллионов структурированных аннотаций из PubMed для задачи генерации выводов в биомедицинской области. Датасет позволяет оценивать способность больших языковых моделей выполнять рассуждения на основе структурированных научных доказательств. В исследовании авторы проводят экспериментальное сравнение различных LLM под разными настройками промптов и оценивают результаты как с помощью метрик на основе эталонов, так и с использованием самих LLM в качестве оценщиков. Полученные результаты показывают, что написание выводов существенно отличается от суммаризации, и выявляют важность выбора метода оценки для сравнения моделей.'}, 'en': {'title': 'Unlocking Biomedical Insights: MedConclusion Dataset for AI Reasoning', 'desc': 'This paper presents MedConclusion, a dataset containing 5.7 million structured abstracts from PubMed, aimed at enhancing biomedical conclusion generation. It allows researchers to evaluate large language models (LLMs) on their ability to derive conclusions from structured scientific evidence. The dataset pairs non-conclusion sections of abstracts with their corresponding author-written conclusions, providing a natural supervision mechanism for training models. The study also highlights the differences between conclusion writing and summary writing, revealing that current evaluation metrics may not effectively distinguish model performance.'}, 'zh': {'title': 'MedConclusion：生物医学结论生成的新数据集', 'desc': '本文介绍了一个大型数据集MedConclusion，包含570万条PubMed结构化摘要，用于生物医学结论生成。该数据集为评估大型语言模型在从结构化科学证据中推理的能力提供了基础。每个实例将摘要的非结论部分与原作者撰写的结论配对，提供了自然发生的监督信息。研究表明，结论写作与摘要写作在行为上有明显区别，且强模型在当前自动评估指标下表现相似。'}}}, {'id': 'https://huggingface.co/papers/2604.18267', 'title': 'MARCO: Navigating the Unseen Space of Semantic Correspondence', 'url': 'https://huggingface.co/papers/2604.18267', 'abstract': 'Abstract MARCO is a compact, fast model that improves semantic correspondence accuracy and generalization beyond training data by using a coarse-to-fine objective and self-distillation framework with DINOv2 and diffusion backbones.  AI-generated summary Recent advances in semantic correspondence rely on dual-encoder architectures, combining DINOv2 with diffusion backbones. While accurate, these billion-parameter models generalize poorly beyond training keypoints, revealing a gap between benchmark performance and real-world usability, where queried points rarely match those seen during training. Building upon DINOv2, we introduce MARCO, a unified model for generalizable correspondence driven by a novel training framework that enhances both fine-grained localization and semantic generalization. By coupling a coarse-to-fine objective that refines spatial precision with a self-distillation framework, which expands sparse supervision beyond annotated regions, our approach transforms a handful of keypoints into dense, semantically coherent correspondences. MARCO sets a new state of the art on SPair-71k, AP-10K, and PF-PASCAL, with gains that amplify at fine-grained localization thresholds (+8.9 PCK@0.01), strongest generalization to unseen keypoints (+5.1, SPair-U) and categories (+4.7, MP-100), while remaining 3x smaller and 10x faster than diffusion-based approaches. Code is available at https://github.com/visinf/MARCO .', 'score': 1, 'issue_id': 1999, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '6a7dada0a6c73af2', 'authors': ['Claudia Cuttano', 'Gabriele Trivigno', 'Carlo Masone', 'Stefan Roth'], 'affiliations': ['ELIZA', 'Politecnico di Torino', 'TU Darmstadt', 'hessian.AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.18267.jpg', 'data': {'categories': ['#small_models', '#training', '#cv', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Компактная модель для точного поиска соответствий с отличной обобщаемостью', 'desc': 'MARCO — это компактная модель для задачи семантического соответствия между изображениями, которая значительно превосходит по точности и обобщаемости более крупные диффузионные модели. Модель использует двухступенчатый подход с грубой и точной локализацией, а также метод самодистилляции для расширения обучающего сигнала за пределы аннотированных областей. Ключевая особенность MARCO заключается в её способности хорошо обобщаться на новые точки и категории объектов, которые не встречались во время обучения, что критично для практического применения. При этом модель в 3 раза меньше и в 10 раз быстрее, чем существующие подходы на основе diffusion, достигая нового состояния искусства на нескольких бенчмарках.'}, 'en': {'title': 'MARCO: Compact and Fast Semantic Correspondence for Better Generalization', 'desc': 'MARCO is a new machine learning model designed to improve the accuracy of semantic correspondence, which is how well a model can match similar items in different contexts. It uses a unique training method that combines a coarse-to-fine approach with self-distillation, allowing it to learn from fewer examples and generalize better to new data. This model is built on the DINOv2 architecture and incorporates diffusion backbones, making it both compact and efficient. MARCO achieves state-of-the-art results on several benchmarks while being significantly smaller and faster than existing models.'}, 'zh': {'title': 'MARCO：提升语义对应的高效模型', 'desc': 'MARCO是一个紧凑且快速的模型，通过使用粗到细的目标和自蒸馏框架，提升了语义对应的准确性和泛化能力。该模型结合了DINOv2和扩散骨干网络，克服了传统双编码器架构在训练关键点之外的泛化不足。MARCO通过精细定位和语义泛化的训练框架，将稀疏监督扩展到未标注区域，从而将少量关键点转化为密集且语义一致的对应关系。该模型在多个基准数据集上设立了新的最先进记录，同时在速度和模型大小上也具有显著优势。'}}}, {'id': 'https://huggingface.co/papers/2604.17972', 'title': 'Modeling Multiple Support Strategies within a Single Turn for Emotional Support Conversations', 'url': 'https://huggingface.co/papers/2604.17972', 'abstract': 'Abstract Multi-strategy utterance generation methods for emotional support conversations outperform single-strategy approaches by enabling multiple support strategies within individual utterances.  AI-generated summary Emotional Support Conversation (ESC) aims to assist individuals experiencing distress by generating empathetic and supportive dialogue. While prior work typically assumes that each supporter turn corresponds to a single strategy, real-world supportive communication often involves multiple strategies within a single utterance. In this paper, we revisit the ESC task by formulating it as multi-strategy utterance generation, where each utterance may contain one or more strategy-response pairs. We propose two generation methods: All-in-One, which predicts all strategy-response pairs in a single decoding step, and One-by-One, which iteratively generates strategy-response pairs until completion. Both methods are further enhanced with cognitive reasoning guided by reinforcement learning to improve strategy selection and response composition. We evaluate our models on the ESConv dataset under both utterance-level and dialogue-level settings. Experimental results show that our methods effectively model multi-strategy utterances and lead to improved supportive quality and dialogue success. To our knowledge, this work provides the first systematic empirical evidence that allowing multiple support strategies within a single utterance is both feasible and beneficial for emotional support conversations. All code and data will be publicly available at https://github.com/aliyun/qwen-dianjin.', 'score': 1, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '6e20cd273f6e3884', 'authors': ['Jie Zhu', 'Huaixia Dou', 'Junhui Li', 'Lifan Guo', 'Feng Chen', 'Jinsong Su', 'Chi Zhang', 'Fang Kong'], 'affiliations': ['Qwen DianJin Team, Alibaba Cloud Computing', 'School of Computer Science and Technology, Soochow University', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.17972.jpg', 'data': {'categories': ['#rl', '#training'], 'emoji': '💝', 'ru': {'title': 'Множественные стратегии в одном ответе: ключ к лучшей эмоциональной поддержке', 'desc': 'В этой работе предлагается новый подход к задаче диалога эмоциональной поддержки, где каждое высказывание может содержать несколько стратегий поддержки вместо одной. Авторы представляют две модели генерации: All-in-One, которая предсказывает все пары стратегия-ответ за один проход декодирования, и One-by-One, которая итеративно генерирует эти пары до завершения. Обе модели дополнительно улучшены с помощью когнитивного рассуждения, направляемого обучением с подкреплением для оптимизации выбора стратегий. Экспериментальные результаты на датасете ESConv показывают, что предложенные методы более эффективны и приводят к повышению качества поддержки и успешности диалога.'}, 'en': {'title': 'Empowering Emotional Support with Multi-Strategy Conversations', 'desc': 'This paper introduces a new approach to generating emotional support conversations by using multiple strategies within a single utterance. Traditional methods often limit responses to one strategy, but this research shows that combining strategies can enhance the quality of support provided. The authors propose two methods for generating these multi-strategy utterances: All-in-One, which creates all responses at once, and One-by-One, which builds responses step by step. By incorporating reinforcement learning for better strategy selection, the study demonstrates that these methods significantly improve the effectiveness of supportive dialogue.'}, 'zh': {'title': '多策略发言生成提升情感支持对话质量', 'desc': '本文探讨了情感支持对话中的多策略发言生成方法，认为这种方法比单一策略更有效。研究表明，现实中的支持性交流往往在一个发言中包含多个策略，而不是仅依赖单一策略。我们提出了两种生成方法：All-in-One和One-by-One，前者一次性预测所有策略-响应对，后者则逐步生成。通过强化学习增强认知推理，这些方法在情感支持对话中显著提高了支持质量和对话成功率。'}}}, {'id': 'https://huggingface.co/papers/2604.17698', 'title': 'The Geometric Canary: Predicting Steerability and Detecting Drift via Representational Stability', 'url': 'https://huggingface.co/papers/2604.17698', 'abstract': "Abstract Geometric stability measures predict language model controllability and detect structural degradation, with supervised variants excelling at steering prediction and unsupervised variants at drift detection.  AI-generated summary Reliable deployment of language models requires two capabilities that appear distinct but share a common geometric foundation: predicting whether a model will accept targeted behavioral control, and detecting when its internal structure degrades. We show that geometric stability, the consistency of a representation's pairwise distance structure, addresses both. Supervised Shesha variants that measure task-aligned geometric stability predict linear steerability with near-perfect accuracy (ρ= 0.89-0.97) across 35-69 embedding models and three NLP tasks, capturing unique variance beyond class separability (partial ρ= 0.62-0.76). A critical dissociation emerges: unsupervised stability fails entirely for steering on real-world tasks (ρapprox 0.10), revealing that task alignment is essential for controllability prediction. However, unsupervised stability excels at drift detection, measuring nearly 2times greater geometric change than CKA during post-training alignment (up to 5.23times in Llama) while providing earlier warning in 73\\% of models and maintaining a 6times lower false alarm rate than Procrustes. Together, supervised and unsupervised stability form complementary diagnostics for the LLM deployment lifecycle: one for pre-deployment controllability assessment, the other for post-deployment monitoring.", 'score': 1, 'issue_id': 1988, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'c4a6aebf43fd3038', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.17698.jpg', 'data': {'categories': ['#interpretability', '#training', '#alignment', '#inference'], 'emoji': '⚙️', 'ru': {'title': 'Геометрическая стабильность как универсальный диагностик для контроля и мониторинга языковых моделей', 'desc': 'Работа предлагает метрику геометрической стабильности для оценки внутренних представлений языковых моделей. Авторы показывают, что контролируемые варианты этой метрики точно предсказывают возможность управления поведением модели (коэффициент корреляции 0.89-0.97), в то время как неконтролируемые варианты эффективно обнаруживают деградацию структуры модели при переобучении. Ключевое открытие заключается в том, что для предсказания управляемости необходимо выравнивание метрики с целевой задачей, тогда как обнаружение дрейфа работает лучше без такого выравнивания. Предложенный подход обеспечивает дополнительные инструменты для контроля жизненного цикла развёртывания больших языковых моделей: оценка управляемости перед развёртыванием и мониторинг стабильности после.'}, 'en': {'title': 'Harnessing Geometric Stability for Language Model Control and Monitoring', 'desc': 'This paper discusses geometric stability measures that help in understanding and controlling language models. It highlights two main tasks: predicting if a model can be controlled effectively and detecting when its internal structure is degrading. The authors demonstrate that supervised methods can accurately predict controllability, while unsupervised methods are better at detecting structural changes. Together, these methods provide a comprehensive approach for managing language models throughout their lifecycle.'}, 'zh': {'title': '几何稳定性：语言模型可控性与监测的关键', 'desc': '这篇论文探讨了几何稳定性如何影响语言模型的可控性和结构退化的检测。研究表明，监督学习的几何稳定性测量可以准确预测模型的可控性，而无监督学习则在检测模型漂移方面表现优异。通过对不同嵌入模型和自然语言处理任务的分析，监督方法在可控性预测上达到了近乎完美的准确率。总的来说，监督和无监督的稳定性测量为语言模型的部署生命周期提供了互补的诊断工具。'}}}, {'id': 'https://huggingface.co/papers/2604.17318', 'title': 'When Background Matters: Breaking Medical Vision Language Models by Transferable Attack', 'url': 'https://huggingface.co/papers/2604.17318', 'abstract': "Abstract MedFocusLeak enables transferable black-box attacks on vision-language models for medical imaging by injecting imperceptible perturbations that redirect model attention, demonstrating significant vulnerabilities in clinical diagnostic reasoning.  AI-generated summary Vision-Language Models (VLMs) are increasingly used in clinical diagnostics, yet their robustness to adversarial attacks remains largely unexplored, posing serious risks. Existing medical attacks focus on secondary objectives such as model stealing or adversarial fine-tuning, while transferable attacks from natural images introduce visible distortions that clinicians can easily detect. To address this, we propose MedFocusLeak, a highly transferable black-box multimodal attack that induces incorrect yet clinically plausible diagnoses while keeping perturbations imperceptible. The method injects coordinated perturbations into non-diagnostic background regions and employs an attention distraction mechanism to shift the model's focus away from pathological areas. Extensive evaluations across six medical imaging modalities show that MedFocusLeak achieves state-of-the-art performance, generating misleading yet realistic diagnostic outputs across diverse VLMs. We further introduce a unified evaluation framework with novel metrics that jointly capture attack success and image fidelity, revealing a critical weakness in the reasoning capabilities of modern clinical VLMs.", 'score': 1, 'issue_id': 1999, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '3a70a3755309d45d', 'authors': ['Akash Ghosh', 'Subhadip Baidya', 'Sriparna Saha', 'Xiuying Chen'], 'affiliations': ['Indian Institute of Technology Kanpur', 'Indian Institute of Technology Patna', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2604.17318.jpg', 'data': {'categories': ['#healthcare', '#multimodal', '#cv', '#benchmark'], 'emoji': '🏥', 'ru': {'title': 'Скрытые атаки на медицинские AI-модели через манипуляцию вниманием', 'desc': 'Исследование представляет MedFocusLeak — метод переносимых чёрных атак на vision-language модели в медицинской визуализации. Метод внедряет незаметные возмущения, которые перенаправляют внимание модели с патологических областей на фоновые регионы, вызывая клинически правдоподобные, но неправильные диагнозы. Подход демонстрирует высокую эффективность на шести типах медицинских снимков и выявляет серьёзные уязвимости в рассуждениях современных VLM-моделей. Авторы предлагают унифицированную систему оценки с новыми метриками для анализа компромисса между успехом атаки и верностью изображения.'}, 'en': {'title': 'Unmasking Vulnerabilities in Medical AI with MedFocusLeak', 'desc': 'MedFocusLeak is a method that targets vision-language models (VLMs) used in medical imaging, allowing for black-box attacks that can mislead diagnoses. It works by adding small, hard-to-detect changes to images that cause the model to focus on the wrong areas, leading to incorrect yet plausible medical conclusions. This approach is significant because it highlights vulnerabilities in how these AI models reason about medical data, which could have serious implications in clinical settings. The study also introduces new evaluation metrics to assess both the effectiveness of the attacks and the quality of the images, revealing weaknesses in current VLMs.'}, 'zh': {'title': '揭示医学影像模型的脆弱性', 'desc': 'MedFocusLeak是一种针对医学影像的可转移黑箱攻击方法，能够通过注入不可察觉的扰动来引导模型注意力，从而暴露出临床诊断推理中的重大漏洞。该方法在非诊断背景区域注入协调扰动，并利用注意力分散机制使模型的关注点偏离病理区域。通过对六种医学影像模式的广泛评估，MedFocusLeak展示了其在生成误导性但临床上合理的诊断输出方面的卓越性能。我们还提出了一个统一的评估框架，使用新颖的指标共同捕捉攻击成功率和图像保真度，揭示了现代临床视觉-语言模型推理能力的关键弱点。'}}}, {'id': 'https://huggingface.co/papers/2604.17406', 'title': 'EvoMaster: A Foundational Agent Framework for Building Evolving Autonomous Scientific Agents at Scale', 'url': 'https://huggingface.co/papers/2604.17406', 'abstract': "Abstract EvoMaster is a scalable, self-evolving agent framework designed for large-scale scientific discovery that enables iterative hypothesis refinement and knowledge accumulation across experimental cycles.  AI-generated summary The convergence of large language models and agents is catalyzing a new era of scientific discovery: Agentic Science. While the scientific method is inherently iterative, existing agent frameworks are predominantly static, narrowly scoped, and lack the capacity to learn from trial and error. To bridge this gap, we present EvoMaster, a foundational evolving agent framework engineered specifically for Agentic Science at Scale. Driven by the core principle of continuous self-evolution, EvoMaster empowers agents to iteratively refine hypotheses, self-critique, and progressively accumulate knowledge across experimental cycles, faithfully mirroring human scientific inquiry. Crucially, as a domain-agnostic base harness, EvoMaster is exceptionally easy to scale up -- enabling developers to build and deploy highly capable, self-evolving scientific agents for arbitrary disciplines in approximately 100 lines of code. Built upon EvoMaster, we incubated the SciMaster ecosystem across domains such as machine learning, physics, and general science. Evaluations on four authoritative benchmarks (Humanity's Last Exam, MLE-Bench Lite, BrowseComp, and FrontierScience) demonstrate that EvoMaster achieves state-of-the-art scores of 41.1%, 75.8%, 73.3%, and 53.3%, respectively. It comprehensively outperforms the general-purpose baseline OpenClaw with relative improvements ranging from +159% to +316%, robustly validating its efficacy and generality as the premier foundational framework for the next generation of autonomous scientific discovery. EvoMaster is available at https://github.com/sjtu-sai-agents/EvoMaster.", 'score': 1, 'issue_id': 1989, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '6c506fadc6f55b17', 'authors': ['Xinyu Zhu', 'Yuzhu Cai', 'Zexi Liu', 'Cheng Wang', 'Fengyang Li', 'Wenkai Jin', 'Wanxu Liu', 'Zehao Bing', 'Bingyang Zheng', 'Jingyi Chai', 'Shuo Tang', 'Rui Ye', 'Yuwen Du', 'Xianghe Pang', 'Yaxin Du', 'Tingjia Miao', 'Yuzhi Zhang', 'Ruoxue Liao', 'Zhaohan Ding', 'Linfeng Zhang', 'Yanfeng Wang', 'Weinan E', 'Siheng Chen'], 'affiliations': ['DP Technology', 'School of Artificial Intelligence, Shanghai Jiao Tong University', 'SciLand'], 'pdf_title_img': 'assets/pdf/title_img/2604.17406.jpg', 'data': {'categories': ['#open_source', '#science'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующие агенты для научных открытий нового поколения', 'desc': 'EvoMaster — это масштабируемая архитектура на основе LLM, предназначенная для автоматизации научных открытий через самоэволюцию агентов. Система позволяет агентам итеративно уточнять гипотезы, критиковать собственные результаты и накапливать знания на протяжении экспериментальных циклов, моделируя естественный научный метод. Фреймворк является доменно-независимым и требует минимального кода (около 100 строк) для развертывания специализированных научных агентов в различных областях. EvoMaster демонстрирует значительные улучшения на бенчмарках (от +159% до +316% относительно базовых моделей), подтверждая эффективность подхода для автономного научного исследования.'}, 'en': {'title': 'Empowering Scientific Discovery with Self-Evolving Agents', 'desc': 'EvoMaster is a cutting-edge framework designed to enhance scientific discovery through self-evolving agents. It allows these agents to refine hypotheses and accumulate knowledge over multiple experimental cycles, mimicking the iterative nature of human scientific inquiry. Unlike traditional static frameworks, EvoMaster is domain-agnostic and can be easily scaled, enabling rapid development of sophisticated agents across various scientific fields. Evaluations show that EvoMaster significantly outperforms existing models, establishing it as a leading tool for autonomous scientific exploration.'}, 'zh': {'title': 'EvoMaster：科学发现的新纪元', 'desc': 'EvoMaster是一个可扩展的自我进化代理框架，旨在支持大规模科学发现。它允许在实验周期中进行迭代假设的细化和知识的积累，模拟人类的科学探究过程。与现有的静态代理框架不同，EvoMaster能够通过自我批评和学习来不断改进。该框架易于扩展，开发者只需约100行代码即可构建和部署强大的自我进化科学代理。'}}}, {'id': 'https://huggingface.co/papers/2604.16943', 'title': 'MNAFT: modality neuron-aware fine-tuning of multimodal large language models for image translation', 'url': 'https://huggingface.co/papers/2604.16943', 'abstract': 'Abstract Modality neuron-aware fine-tuning (MNAFT) enhances image translation by selectively updating specific neurons in multimodal large language models, preserving pre-trained knowledge while improving cross-modal understanding.  AI-generated summary Multimodal large language models (MLLMs) have shown impressive capabilities, yet they often struggle to effectively capture the fine-grained textual information within images crucial for accurate image translation. This often leads to a modality gap between visual text inputs and textual inputs/outputs for image translation. Existing methods, primarily relying on instruction fine-tuning, risk parameter redundancy of pre-trained knowledge, hindering generalization performance. To address this, we introduce modality neuron-aware fine-tuning (MNAFT), a novel approach that takes advantage of the specialized roles of individual neurons within MLLMs for enhanced image translation. MNAFT identifies language-agnostic and language-specific neurons in both vision and language modules through an instruction-driven activation analysis, evaluating their importance in various translation tasks. We then perform selective fine-tuning, updating only the parameters of language-specific and language-agnostic neurons within the selected layers relevant to the target task, while preserving the knowledge encoded in other neurons and layers. Our extensive experiments on multiple benchmarks demonstrate that MNAFT significantly outperforms state-of-the-art image translation methods, including cascaded models, standard full fine-tuning, and parameter-efficient tuning techniques. Furthermore, we provide comprehensive analysis, including visualizations of neuron activations and clustering patterns, to offer insights into the roles of different neuron groups in mediating cross-modal understanding and facilitating accurate language-specific translation.', 'score': 1, 'issue_id': 1989, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': '5b37985ab6ac1386', 'authors': ['Bo Li', 'Ningyuan Deng', 'Tianyu Dong', 'Shaobo Wang', 'Shaolin Zhu', 'Lijie Wen'], 'affiliations': ['Baidu Inc.', 'School of Artificial Intelligence, Shanghai Jiao Tong University', 'School of Computer Science and Technology, Tianjin University', 'School of Information Resource Management, Renmin University of China', 'School of Software, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.16943.jpg', 'data': {'categories': ['#machine_translation', '#interpretability', '#optimization', '#multimodal', '#benchmark', '#training'], 'emoji': '🧠', 'ru': {'title': 'Осознанная нейронами тонкая настройка для точного мультимодального перевода', 'desc': 'Работа представляет метод MNAFT для улучшения перевода изображений с помощью мультимодальных больших языковых моделей. Авторы выявляют специализированные нейроны в визуальных и языковых модулях модели, разделяя их на языково-зависимые и языково-независимые с использованием анализа активации. Вместо полного дообучения модели, метод выборочно обновляет только параметры значимых нейронов, сохраняя знания в остальной части сети. Экспериментальные результаты показывают, что MNAFT значительно превосходит существующие методы перевода изображений, обеспечивая лучшее понимание взаимодействия между модальностями и повышая качество перевода текста из изображений.'}, 'en': {'title': 'Enhancing Image Translation with Selective Neuron Fine-Tuning', 'desc': 'This paper presents Modality Neuron-Aware Fine-Tuning (MNAFT), a technique that improves image translation by selectively updating specific neurons in multimodal large language models (MLLMs). MNAFT addresses the challenge of modality gaps between visual and textual inputs by identifying and fine-tuning language-specific and language-agnostic neurons. This selective approach preserves the pre-trained knowledge of the model while enhancing its ability to understand and translate images accurately. Experimental results show that MNAFT outperforms existing image translation methods, demonstrating its effectiveness in bridging the gap between different modalities.'}, 'zh': {'title': '模态神经元感知微调：提升图像翻译的新方法', 'desc': '本论文提出了一种新的方法，称为模态神经元感知微调（MNAFT），旨在改善图像翻译的效果。MNAFT通过选择性地更新多模态大语言模型中的特定神经元，来增强跨模态理解，同时保留预训练知识。该方法通过分析神经元的激活情况，识别出与语言无关和与语言相关的神经元，从而进行有针对性的微调。实验结果表明，MNAFT在多个基准测试中显著优于现有的图像翻译方法。'}}}, {'id': 'https://huggingface.co/papers/2604.16038', 'title': 'Modeling Sparse and Bursty Vulnerability Sightings: Forecasting Under Data Constraints', 'url': 'https://huggingface.co/papers/2604.16038', 'abstract': 'Abstract Forecasting vulnerability-related activities using time-series models reveals challenges with sparse, bursty data, favoring count-based methods like Poisson regression for more stable predictions.  AI-generated summary Understanding and anticipating vulnerability-related activity is a major challenge in cyber threat intelligence. This work investigates whether vulnerability sightings, such as proof-of-concept releases, detection templates, or online discussions, can be forecast over time. Building on our earlier work on VLAI, a transformer-based model that predicts vulnerability severity from textual descriptions, we examine whether severity scores can improve time-series forecasting as exogenous variables. We evaluate several approaches for short-term forecasting of sightings per vulnerability. First, we test SARIMAX models with and without log(x+1) transformations and VLAI-derived severity inputs. Although these adjustments provide limited improvements, SARIMAX remains poorly suited to sparse, short, and bursty vulnerability data. In practice, forecasts often produce overly wide confidence intervals and sometimes unrealistic negative values. To better capture the discrete and event-driven nature of sightings, we then explore count-based methods such as Poisson regression. Early results show that these models produce more stable and interpretable forecasts, especially when sightings are aggregated weekly. We also discuss simpler operational alternatives, including exponential decay functions for short forecasting horizons, to estimate future activity without requiring long historical series. Overall, this study highlights both the potential and the limitations of forecasting rare and bursty cyber events, and provides practical guidance for integrating predictive analytics into vulnerability intelligence workflows.', 'score': 1, 'issue_id': 1992, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'e402563e3ea3277a', 'authors': ['Cedric Bonhomme', 'Alexandre Dulaunoy'], 'affiliations': ['Computer Incident Response Center Luxembourg'], 'pdf_title_img': 'assets/pdf/title_img/2604.16038.jpg', 'data': {'categories': [], 'emoji': '🔒', 'ru': {'title': 'Регрессия Пуассона лучше SARIMAX для прогнозирования редких событий уязвимостей', 'desc': 'Статья исследует прогнозирование активности, связанной с уязвимостями в кибербезопасности, используя временные ряды. Авторы тестируют SARIMAX модели с трансформациями и экзогенными переменными на основе оценок серьёзности уязвимостей, но обнаруживают, что эти методы плохо справляются с редкими и импульсивными данными. Они демонстрируют, что счётные методы, такие как регрессия Пуассона, обеспечивают более стабильные и интерпретируемые прогнозы для дискретных событий. Исследование также предлагает практические альтернативы, включая функции экспоненциального затухания, для интеграции предсказательной аналитики в рабочие процессы анализа уязвимостей.'}, 'en': {'title': 'Enhancing Cyber Threat Forecasting with Count-Based Models', 'desc': 'This paper addresses the challenge of predicting vulnerability-related activities in cyber threat intelligence using time-series models. It highlights the limitations of traditional models like SARIMAX when dealing with sparse and bursty data, suggesting that count-based methods such as Poisson regression may yield more stable predictions. The study also explores the integration of severity scores from a transformer-based model, VLAI, as exogenous variables to enhance forecasting accuracy. Ultimately, it provides practical insights for improving predictive analytics in vulnerability intelligence workflows.'}, 'zh': {'title': '利用计数模型提升漏洞活动预测的稳定性', 'desc': '本研究探讨了如何使用时间序列模型预测与漏洞相关的活动，尤其是在数据稀疏和突发的情况下。我们发现，基于计数的方法，如泊松回归，能够提供更稳定的预测结果。尽管SARIMAX模型在某些情况下有所改进，但仍然不适合处理稀疏和短期的漏洞数据。研究还提出了简单的操作替代方案，如指数衰减函数，以便在没有长历史数据的情况下进行短期预测。'}}}, {'id': 'https://huggingface.co/papers/2604.16642', 'title': 'Geometric coherence of single-cell CRISPR perturbations reveals regulatory architecture and predicts cellular stress', 'url': 'https://huggingface.co/papers/2604.16642', 'abstract': 'Abstract  Genome engineering has achieved remarkable sequence-level precision, yet predicting the transcriptomic state that a cell will occupy after perturbation remains an open problem. Single-cell CRISPR screens measure how far cells move from their unperturbed state, but this effect magnitude ignores a fundamental question: do the cells move together? Two perturbations with identical magnitude can produce qualitatively different outcomes if one drives cells coherently along a shared trajectory while the other scatters them across expression space. We introduce a geometric stability metric, Shesha, that quantifies the directional coherence of single-cell perturbation responses as the mean cosine similarity between individual cell shift vectors and the mean perturbation direction. Across five CRISPR datasets (2,200+ perturbations spanning CRISPRa, CRISPRi, and pooled screens), stability correlates strongly with effect magnitude (Spearman ρ=0.75-0.97), with a calibrated cross-dataset correlation of 0.97. Crucially, discordant cases where the two metrics decouple expose regulatory architecture: pleiotropic master regulators such as CEBPA and GATA1 pay a "geometric tax," producing large but incoherent shifts, while lineage-specific factors such as KLF1 produce tightly coordinated responses. After controlling for magnitude, geometric instability is independently associated with elevated chaperone activation (HSPA5/BiP; ρ_{partial}=-0.34 and -0.21 across datasets), and the high-stability/high-stress quadrant is systematically depleted. The magnitude-stability relationship persists in scGPT foundation model embeddings, confirming it is a property of biological state space rather than linear projection. Perturbation stability provides a complementary axis for hit prioritization in screens, phenotypic quality control in cell manufacturing, and evaluation of in silico perturbation pr
