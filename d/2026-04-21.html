    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.18168', 'title': 'Extending One-Step Image Generation from Class Labels to Text via Discriminative Text Representation', 'url': 'https://huggingface.co/papers/2604.18168', 'abstract': "Abstract Researchers extend MeanFlow generation from class labels to text inputs by integrating powerful LLM-based text encoders, overcoming limitations of few-step refinement through enhanced semantic feature representation.  AI-generated summary Few-step generation has been a long-standing goal, with recent one-step generation methods exemplified by MeanFlow achieving remarkable results. Existing research on MeanFlow primarily focuses on class-to-image generation. However, an intuitive yet unexplored direction is to extend the condition from fixed class labels to flexible text inputs, enabling richer content creation. Compared to the limited class labels, text conditions pose greater challenges to the model's understanding capability, necessitating the effective integration of powerful text encoders into the MeanFlow framework. Surprisingly, although incorporating text conditions appears straightforward, we find that integrating powerful LLM-based text encoders using conventional training strategies results in unsatisfactory performance. To uncover the underlying cause, we conduct detailed analyses and reveal that, due to the extremely limited number of refinement steps in the MeanFlow generation, such as only one step, the text feature representations are required to possess sufficiently high discriminability. This also explains why discrete and easily distinguishable class features perform well within the MeanFlow framework. Guided by these insights, we leverage a powerful LLM-based text encoder validated to possess the required semantic properties and adapt the MeanFlow generation process to this framework, resulting in efficient text-conditioned synthesis for the first time. Furthermore, we validate our approach on the widely used diffusion model, demonstrating significant generation performance improvements. We hope this work provides a general and practical reference for future research on text-conditioned MeanFlow generation. The code is available at https://github.com/AMAP-ML/EMF.", 'score': 86, 'issue_id': 1991, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'b3803b3be474ed8e', 'authors': ['Chenxi Zhao', 'Chen Zhu', 'Xiaokun Feng', 'Aiming Hao', 'Jiashu Zhu', 'Jiachen Lei', 'Jiahong Wu', 'Xiangxiang Chu', 'Jufeng Yang'], 'affiliations': ['AMAP, Alibaba Group', 'College of Computer Science, Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2604.18168.jpg', 'data': {'categories': ['#diffusion', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'От класса к тексту: дискриминативные признаки для однош агового синтеза', 'desc': 'Исследователи расширили метод MeanFlow для генерации изображений с текстовыми условиями вместо классовых меток, интегрировав мощные текстовые энкодеры на основе LLM. Авторы обнаружили, что для однош агового или мало-шагового поколения требуется высокая дискриминативность признаков текста, что объясняет трудности при наивном внедрении. Они предложили специализированный подход к адаптации процесса MeanFlow для работы с семантически богатыми представлениями LLM-энкодеров. Метод впервые обеспечивает эффективный синтез изображений с текстовыми условиями в рамках MeanFlow, достигая значительных улучшений производительности и демонстрируя универсальность на диффузионных моделях.'}, 'en': {'title': 'Transforming MeanFlow: From Class Labels to Text Inputs', 'desc': 'This paper presents an advancement in the MeanFlow generation technique by extending its application from class labels to text inputs using large language model (LLM) based text encoders. The authors identify that traditional training methods for integrating text encoders lead to poor performance due to the limited refinement steps in the MeanFlow process. They conduct analyses to show that high discriminability in text feature representations is crucial for effective generation. By adapting the MeanFlow framework with a powerful LLM-based text encoder, the researchers achieve significant improvements in text-conditioned synthesis, paving the way for richer content generation.'}, 'zh': {'title': '文本条件生成的新突破', 'desc': '本研究将MeanFlow生成方法从类标签扩展到文本输入，利用强大的基于大语言模型（LLM）的文本编码器，克服了少步精炼的局限性。研究表明，文本条件的引入使得内容生成更加丰富，但也对模型的理解能力提出了更高的挑战。通过详细分析，我们发现传统训练策略下，直接整合文本编码器会导致性能不佳。最终，我们成功地将MeanFlow生成过程适配到新的框架中，实现了高效的文本条件合成，并在广泛使用的扩散模型上验证了显著的生成性能提升。'}}}, {'id': 'https://huggingface.co/papers/2604.18486', 'title': 'OneVL: One-Step Latent Reasoning and Planning with Vision-Language Explanation', 'url': 'https://huggingface.co/papers/2604.18486', 'abstract': 'Abstract OneVL presents a unified vision-language-action framework that improves latent chain-of-thought reasoning for autonomous driving by integrating language and visual world model supervision for faster, more accurate trajectory prediction.  AI-generated summary Chain-of-Thought (CoT) reasoning has become a powerful driver of trajectory prediction in VLA-based autonomous driving, yet its autoregressive nature imposes a latency cost that is prohibitive for real-time deployment. Latent CoT methods attempt to close this gap by compressing reasoning into continuous hidden states, but consistently fall short of their explicit counterparts. We suggest that this is due to purely linguistic latent representations compressing a symbolic abstraction of the world, rather than the causal dynamics that actually govern driving. Thus, we present OneVL (One-step latent reasoning and planning with Vision-Language explanations), a unified VLA and World Model framework that routes reasoning through compact latent tokens supervised by dual auxiliary decoders. Alongside a language decoder that reconstructs text CoT, we introduce a visual world model decoder that predicts future-frame tokens, forcing the latent space to internalize the causal dynamics of road geometry, agent motion, and environmental change. A three-stage training pipeline progressively aligns these latents with trajectory, language, and visual objectives, ensuring stable joint optimization. At inference, the auxiliary decoders are discarded and all latent tokens are prefilled in a single parallel pass, matching the speed of answer-only prediction. Across four benchmarks, OneVL becomes the first latent CoT method to surpass explicit CoT, delivering state-of-the-art accuracy at answer-only latency, and providing direct evidence that tighter compression, when guided in both language and world-model supervision, produces more generalizable representations than verbose token-by-token reasoning. Project Page: https://xiaomi-embodied-intelligence.github.io/OneVL', 'score': 65, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '44508660da3ccaeb', 'authors': ['Jinghui Lu', 'Jiayi Guan', 'Zhijian Huang', 'Jinlong Li', 'Guang Li', 'Lingdong Kong', 'Yingyan Li', 'Han Wang', 'Shaoqing Xu', 'Yuechen Luo', 'Fang Li', 'Chenxu Dang', 'Junli Wang', 'Tao Xu', 'Jing Wu', 'Jianhua Wu', 'Xiaoshuai Hao', 'Wen Zhang', 'Tianyi Jiang', 'Lingfeng Zhang', 'Lei Zhou', 'Yingbo Tang', 'Jie Wang', 'Yinfeng Gao', 'Xizhou Bu', 'Haochen Tian', 'Yihang Qiu', 'Feiyang Jia', 'Lin Liu', 'Yigu Ge', 'Hanbing Li', 'Yuannan Shen', 'Jianwei Cui', 'Hongwei Xie', 'Bing Wang', 'Haiyang Sun', 'Jingwei Zhao', 'Jiahui Huang', 'Pei Liu', 'Zeyu Zhu', 'Yuncheng Jiang', 'Zibin Guo', 'Chuhong Gong', 'Hanchao Leng', 'Kun Ma', 'Naiyang Wang', 'Guang Chen', 'Kuiyuan Yang', 'Hangjun Ye', 'Long Chen'], 'affiliations': ['Xiaomi-Embodied-Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.18486.jpg', 'data': {'categories': ['#agents', '#robotics', '#multimodal', '#benchmark', '#training'], 'emoji': '🚗', 'ru': {'title': 'Скрытое рассуждение с двойной супервизией для быстрого предсказания траекторий', 'desc': 'OneVL представляет объединённую систему для автономного вождения, которая улучшает скрытое цепное рассуждение путём интеграции языковой и визуальной супервизии мировой модели. Метод компрессирует процесс рассуждения в компактные скрытые состояния, заставляя модель изучать причинную динамику дорожной геометрии и движения агентов через два вспомогательных декодера. Трёхэтапный конвейер обучения прогрессивно согласует скрытые представления с целями предсказания траектории, языка и визуальной информации. В результате OneVL впервые демонстрирует, что скрытое цепное рассуждение может превзойти явное рассуждение, достигая наилучшей точности при скорости инференса ответов без рассуждений.'}, 'en': {'title': 'OneVL: Fast and Accurate Trajectory Prediction for Autonomous Driving', 'desc': 'OneVL is a new framework that combines vision, language, and action to enhance reasoning for autonomous driving. It addresses the latency issues of traditional Chain-of-Thought (CoT) methods by using a latent representation that captures the causal dynamics of driving rather than just symbolic abstractions. The framework employs dual auxiliary decoders for language and visual predictions, allowing for efficient trajectory forecasting. By training on multiple objectives, OneVL achieves superior accuracy and speed, outperforming previous methods in real-time applications.'}, 'zh': {'title': '统一视觉-语言-行动框架提升自动驾驶推理速度与准确性', 'desc': 'OneVL是一个统一的视觉-语言-行动框架，旨在通过整合语言和视觉世界模型的监督，提升自动驾驶中的潜在链式思维推理。该方法通过压缩推理为连续的隐藏状态，解决了传统链式思维推理在实时部署中的延迟问题。OneVL引入了双辅助解码器，结合语言解码器和视觉世界模型解码器，使潜在空间能够内化道路几何、代理运动和环境变化的因果动态。经过三阶段的训练，OneVL在多个基准测试中超越了显式链式思维推理，展现出更高的准确性和更快的推理速度。'}}}, {'id': 'https://huggingface.co/papers/2604.18292', 'title': 'Agent-World: Scaling Real-World Environment Synthesis for Evolving General Agent Intelligence', 'url': 'https://huggingface.co/papers/2604.18292', 'abstract': 'Abstract Agent-World introduces a self-evolving training framework that advances general agent intelligence through autonomous environment discovery and continuous learning across diverse real-world scenarios.  AI-generated summary Large language models are increasingly expected to serve as general-purpose agents that interact with external, stateful tool environments. The Model Context Protocol (MCP) and broader agent skills offer a unified interface for connecting agents with scalable real-world services, but training robust agents remains limited by the lack of realistic environments and principled mechanisms for life-long learning. In this paper, we present Agent-World, a self-evolving training arena for advancing general agent intelligence through scalable environments. Agent-World has two main components: (1) Agentic Environment-Task Discovery, which autonomously explores topic-aligned databases and executable tool ecosystems from thousands of real-world environment themes and synthesizes verifiable tasks with controllable difficulty; and (2) Continuous Self-Evolving Agent Training, which combines multi-environment reinforcement learning with a self-evolving agent arena that automatically identifies capability gaps through dynamic task synthesis and drives targeted learning, enabling the co-evolution of agent policies and environments. Across 23 challenging agent benchmarks, Agent-World-8B and 14B consistently outperforms strong proprietary models and environment scaling baselines. Further analyses reveal scaling trends in relation to environment diversity and self-evolution rounds, offering insights for building general agent intelligence.', 'score': 60, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '19684e506c6b41e3', 'authors': ['Guanting Dong', 'Junting Lu', 'Junjie Huang', 'Wanjun Zhong', 'Longxiang Liu', 'Shijue Huang', 'Zhenyu Li', 'Yang Zhao', 'Xiaoshuai Song', 'Xiaoxi Li', 'Jiajie Jin', 'Yutao Zhu', 'Hanbin Wang', 'Fangyu Lei', 'Qinyu Luo', 'Mingyang Chen', 'Zehui Chen', 'Jiazhan Feng', 'Ji-Rong Wen', 'Zhicheng Dou'], 'affiliations': ['ByteDance', 'Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.18292.jpg', 'data': {'categories': ['#benchmark', '#rl', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Самоэволюционирующая тренировочная арена для универсальных агентов', 'desc': 'Agent-World представляет самоэволюционирующую платформу для обучения универсальных агентов, которая автоматически открывает и синтезирует разнообразные окружения из реальных источников. Система использует два ключевых компонента: автономное обнаружение задач из тематически организованных баз данных и экосистем инструментов, а также непрерывное обучение с подкреплением в многосредовой среде. Платформа применяет динамическое создание задач для выявления пробелов в способностях агента и целенаправленного улучшения его политик. Эксперименты показывают, что модели Agent-World-8B и 14B превосходят сильные проприетарные решения и демонстрируют положительные тренды масштабирования по разнообразию окружений.'}, 'en': {'title': 'Empowering Agents Through Self-Evolving Training in Diverse Environments', 'desc': 'The paper presents Agent-World, a novel framework designed to enhance general agent intelligence through self-evolving training. It features two key components: the Agentic Environment-Task Discovery, which autonomously identifies and creates tasks from diverse real-world themes, and Continuous Self-Evolving Agent Training, which utilizes multi-environment reinforcement learning to adaptively improve agent capabilities. This approach allows agents to continuously learn and evolve by identifying their weaknesses and adjusting their training accordingly. The results show that Agent-World significantly outperforms existing models across various benchmarks, highlighting its effectiveness in fostering robust agent development.'}, 'zh': {'title': '自我进化的智能体训练框架', 'desc': 'Agent-World 是一个自我进化的训练框架，旨在通过自主环境发现和持续学习来提升通用智能体的能力。它包含两个主要部分：一是自主探索与主题相关的数据库和可执行工具生态系统，生成可验证的任务；二是结合多环境强化学习的自我进化智能体训练，自动识别能力差距并推动有针对性的学习。通过动态任务合成，Agent-World 使智能体策略和环境能够共同进化。实验结果显示，Agent-World 在 23 个具有挑战性的基准测试中表现优于其他强大的专有模型。'}}}, {'id': 'https://huggingface.co/papers/2604.18394', 'title': 'OpenGame: Open Agentic Coding for Games', 'url': 'https://huggingface.co/papers/2604.18394', 'abstract': 'Abstract OpenGame is an open-source agentic framework for end-to-end web game creation that uses specialized code models and evaluation benchmarks to overcome challenges in interactive application development.  AI-generated summary Game development sits at the intersection of creative design and intricate software engineering, demanding the joint orchestration of game engines, real-time loops, and tightly coupled state across many files. While Large Language Models (LLMs) and code agents now solve isolated programming tasks with ease, they consistently stumble when asked to produce a fully playable game from a high-level design, collapsing under cross-file inconsistencies, broken scene wiring, and logical incoherence. We bridge this gap with OpenGame, the first open-source agentic framework explicitly designed for end-to-end web game creation. At its core lies Game Skill, a reusable, evolving capability composed of a Template Skill that grows a library of project skeletons from experience and a Debug Skill that maintains a living protocol of verified fixes - together enabling the agent to scaffold stable architectures and systematically repair integration errors rather than patch isolated syntax bugs. Powering this framework is GameCoder-27B, a code LLM specialized for game engine mastery through a three-stage pipeline of continual pre-training, supervised fine-tuning, and execution-grounded reinforcement learning. Since verifying interactive playability is fundamentally harder than checking static code, we further introduce OpenGame-Bench, an evaluation pipeline that scores agentic game generation along Build Health, Visual Usability, and Intent Alignment via headless browser execution and VLM judging. Across 150 diverse game prompts, OpenGame establishes a new state-of-the-art. We hope OpenGame pushes code agents beyond discrete software engineering problems and toward building complex, interactive real-world applications. Our framework will be fully open-sourced.', 'score': 49, 'issue_id': 1990, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '1078a0289b59411e', 'authors': ['Yilei Jiang', 'Jinyuan Hu', 'Qianyin Xiao', 'Yaozhi Zheng', 'Ruize Ma', 'Kaituo Feng', 'Jiaming Han', 'Tianshuo Peng', 'Kaixuan Fan', 'Manyuan Zhang', 'Xiangyu Yue'], 'affiliations': ['CUHK MMLab'], 'pdf_title_img': 'assets/pdf/title_img/2604.18394.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#plp', '#training', '#agents', '#multimodal', '#games', '#open_source', '#dataset'], 'emoji': '🎮', 'ru': {'title': 'Агентные системы для автоматического создания интерактивных приложений', 'desc': 'OpenGame — это открытая фреймворк для автоматической генерации веб-игр, решающая проблему создания полнофункциональных интерактивных приложений с помощью специализированных языковых моделей. В основе фреймворка лежит Game Skill — переиспользуемая возможность, объединяющая Template Skill (библиотека архитектурных шаблонов) и Debug Skill (протокол верифицированных исправлений), которые позволяют агенту строить стабильные системы и систематически исправлять ошибки интеграции. Ядром системы является GameCoder-27B — специализированная языковая модель для кодирования игр, обученная через трёхэтапный pipeline, включающий continual pre-training, supervised fine-tuning и reinforcement learning на основе выполнения кода. Для оценки качества генерируемых игр представлена OpenGame-Bench — benchmark, проверяющий стабильность сборки, визуальную пригодность и соответствие исходному замыслу через headless браузер и визуальные языковые модели.'}, 'en': {'title': 'Revolutionizing Game Development with AI', 'desc': 'OpenGame is an innovative framework designed for creating web games using advanced machine learning techniques. It addresses the challenges faced by AI in generating fully playable games from high-level designs, which often result in inconsistencies and logical errors. The framework utilizes Game Skill, which includes a Template Skill for generating project structures and a Debug Skill for fixing integration issues, allowing for more stable game development. Powered by the GameCoder-27B model and supported by the OpenGame-Bench evaluation system, OpenGame sets a new standard in automated game creation by ensuring both functionality and user experience.'}, 'zh': {'title': 'OpenGame：开创网页游戏开发的新纪元', 'desc': 'OpenGame是一个开源的智能框架，旨在实现端到端的网页游戏创建。它利用专门的代码模型和评估基准，解决互动应用开发中的挑战。通过Game Skill，OpenGame能够构建稳定的游戏架构并系统性地修复集成错误，而不仅仅是修补语法错误。该框架由GameCoder-27B驱动，专注于游戏引擎的掌握，并通过OpenGame-Bench评估生成的游戏质量。'}}}, {'id': 'https://huggingface.co/papers/2604.18564', 'title': 'MultiWorld: Scalable Multi-Agent Multi-View Video World Models', 'url': 'https://huggingface.co/papers/2604.18564', 'abstract': 'Abstract MultiWorld is a unified framework for multi-agent multi-view world modeling that achieves accurate multi-agent control while maintaining multi-view consistency through specialized modules for condition handling and global state encoding.  AI-generated summary Video world models have achieved remarkable success in simulating environmental dynamics in response to actions by users or agents. They are modeled as action-conditioned video generation models that take historical frames and current actions as input to predict future frames. Yet, most existing approaches are limited to single-agent scenarios and fail to capture the complex interactions inherent in real-world multi-agent systems. We present MultiWorld, a unified framework for multi-agent multi-view world modeling that enables accurate control of multiple agents while maintaining multi-view consistency. We introduce the Multi-Agent Condition Module to achieve precise multi-agent controllability, and the Global State Encoder to ensure coherent observations across different views. MultiWorld supports flexible scaling of agent and view counts, and synthesizes different views in parallel for high efficiency. Experiments on multi-player game environments and multi-robot manipulation tasks demonstrate that MultiWorld outperforms baselines in video fidelity, action-following ability, and multi-view consistency. Project page: https://multi-world.github.io/', 'score': 35, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '1e3e3d7aff7b8ae7', 'authors': ['Haoyu Wu', 'Jiwen Yu', 'Yingtian Zou', 'Xihui Liu'], 'affiliations': ['Sreal AI', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.18564.jpg', 'data': {'categories': ['#robotics', '#agents', '#multimodal', '#video'], 'emoji': '🌍', 'ru': {'title': 'Согласованное моделирование мира для многоагентного управления с разными точками зрения', 'desc': 'MultiWorld представляет собой унифицированную архитектуру для моделирования динамики окружения с несколькими агентами и множественными ракурсами. Система использует специализированный модуль управления условиями для точного контроля каждого агента и глобальный кодировщик состояния для обеспечения согласованности наблюдений с разных ракурсов. Фреймворк позволяет гибко масштабировать количество агентов и представлений, одновременно синтезируя различные виды сцены. Экспериментальные результаты показывают превосходство MultiWorld в качестве видео, следовании действиям и согласованности между ракурсами на задачах игровых окружений и многороботной манипуляции.'}, 'en': {'title': 'MultiWorld: Mastering Multi-Agent Control with Consistent Views', 'desc': "MultiWorld is a framework designed for modeling environments where multiple agents interact from different perspectives. It enhances multi-agent control by using a Multi-Agent Condition Module that allows precise control over each agent's actions. Additionally, the Global State Encoder ensures that observations from various views remain consistent, which is crucial for accurate decision-making. Experiments show that MultiWorld excels in generating high-quality video outputs and maintaining coherence across multiple views, outperforming existing methods in complex scenarios."}, 'zh': {'title': 'MultiWorld：多智能体的统一建模框架', 'desc': 'MultiWorld是一个统一的框架，用于多智能体多视角的世界建模。它通过专门的模块处理条件和全局状态编码，实现了准确的多智能体控制，同时保持多视角的一致性。该框架引入了多智能体条件模块，以实现精确的多智能体可控性，并使用全局状态编码器确保不同视角之间的观察一致性。实验结果表明，MultiWorld在视频质量、动作跟随能力和多视角一致性方面优于现有基线。'}}}, {'id': 'https://huggingface.co/papers/2604.16893', 'title': 'EasyVideoR1: Easier RL for Video Understanding', 'url': 'https://huggingface.co/papers/2604.16893', 'abstract': 'Abstract EasyVideoR1 presents an efficient reinforcement learning framework for video understanding that improves training throughput, supports diverse video tasks, and enables joint image-video training with comprehensive evaluation across multiple benchmarks.  AI-generated summary Reinforcement learning from verifiable rewards (RLVR) has demonstrated remarkable effectiveness in improving the reasoning capabilities of large language models. As models evolve into natively multimodal architectures, extending RLVR to video understanding becomes increasingly important yet remains largely unexplored, due to the diversity of video task types, the computational overhead of repeatedly decoding and preprocessing high-dimensional visual inputs, and the difficulty of reproducible evaluation across numerous sensitive hyperparameters. Existing open-source RL training frameworks provide solid infrastructure for text and image scenarios but lack systematic optimizations tailored for video modality. In this work, we present EasyVideoR1, a complete and efficient reinforcement learning framework specifically designed for training large vision-language models on video understanding tasks. EasyVideoR1 makes the following contributions: (1) a full video RL training pipeline with offline preprocessing and tensor caching that eliminates redundant video decoding and yields a 1.47 times throughput improvement; (2) a comprehensive, task-aware reward system covering 11 distinct video and image problem types with unified routing and modular extension; (3) a mixed offline-online data training paradigm that combines curated high-quality trajectories with on-policy exploration, benefiting the learning of more challenging tasks; (4) joint image-video training with independently configurable pixel budgets, allowing the two modalities to mutually reinforce each other; and (5) an asynchronous multi-benchmark evaluation framework covering 22 mainstream video understanding benchmarks, with reproduced accuracy closely aligned with officially reported scores.', 'score': 32, 'issue_id': 1989, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': 'c071ffe69da9a552', 'authors': ['Chuanyu Qin', 'Chenxu Yang', 'Qingyi Si', 'Naibin Gu', 'Dingyu Yao', 'Zheng Lin', 'Peng Fu', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences, Beijing, China', 'JD.COM', 'School of Cyber Security, University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.16893.jpg', 'data': {'categories': ['#open_source', '#rl', '#reasoning', '#optimization', '#multimodal', '#video', '#benchmark', '#training'], 'emoji': '🎬', 'ru': {'title': 'Эффективное обучение с подкреплением для понимания видео с оптимизированной предварительной обработкой', 'desc': 'EasyVideoR1 — это框架для обучения больших видео-языковых моделей с использованием обучения с подкреплением на основе проверяемых вознаграждений. Система включает оптимизированный конвейер предварительной обработки видео с кешированием тензоров, что повышает пропускную способность в 1.47 раза и устраняет избыточное декодирование. Фреймворк предоставляет универсальную систему вознаграждений для 11 типов видео и изображений, а также поддерживает смешанное обучение на офлайн-онлайн данных для улучшения обучения на сложных задачах. Работа включает совместное обучение изображений и видео с независимыми бюджетами пикселей и комплексную оценку на 22 основных бенчмарках понимания видео.'}, 'en': {'title': 'Revolutionizing Video Understanding with Efficient RL', 'desc': 'EasyVideoR1 is a novel reinforcement learning framework designed to enhance video understanding by improving training efficiency and supporting various video tasks. It introduces a comprehensive video RL training pipeline that optimizes preprocessing and caching, resulting in a significant increase in throughput. The framework also features a task-aware reward system that accommodates multiple video and image problem types, facilitating better learning outcomes. Additionally, it allows for joint training of image and video data, promoting synergy between the two modalities while providing robust evaluation across numerous benchmarks.'}, 'zh': {'title': '高效视频理解的强化学习框架', 'desc': 'EasyVideoR1是一个高效的强化学习框架，专门用于视频理解任务。它通过离线预处理和张量缓存，消除了冗余的视频解码，从而提高了训练的吞吐量。该框架还提供了一个全面的奖励系统，涵盖11种不同的视频和图像问题类型，并支持联合图像-视频训练。通过这种方式，EasyVideoR1能够有效地提升大规模视觉-语言模型在视频理解方面的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.14258', 'title': 'GFT: From Imitation to Reward Fine-Tuning with Unbiased Group Advantages and Dynamic Coefficient Rectification', 'url': 'https://huggingface.co/papers/2604.14258', 'abstract': 'Abstract Group Fine-Tuning addresses limitations in supervised fine-tuning by using diverse response groups and adaptive weight bounding to improve training stability and efficiency.  AI-generated summary Large language models are typically post-trained using supervised fine-tuning (SFT) and reinforcement learning (RL), yet effectively unifying efficient knowledge injection with robust generalization remains challenging. In this work, we provide a training-dynamics analysis showing that SFT can be interpreted as a special case of policy gradient optimization with an extremely sparse implicit reward and unstable inverse-probability weighting, which together lead to single-path dependency, entropy collapse, and gradient explosion. Motivated by this diagnosis, we propose Group Fine-Tuning (GFT), a unified post-training framework that addresses these intrinsic limitations through two mechanisms: Group Advantage Learning, which constructs diverse response groups and derives normalized contrastive supervision to alleviate reward sparsity, and Dynamic Coefficient Rectification, which adaptively bounds inverse-probability weights to stabilize optimization while preserving efficient knowledge injection. Experiments demonstrate that GFT consistently surpasses SFT-based methods and yields policies that integrate more smoothly with subsequent RL training.', 'score': 19, 'issue_id': 1991, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'b2acdf0c8b023a5a', 'authors': ['Wangjie Gan', 'Miao Pan', 'Linbo Xi', 'Wenqi Zhang', 'Jintao Chen', 'Jianwei Yin', 'Xuhong Zhang'], 'affiliations': ['School of Software Technolog, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14258.jpg', 'data': {'categories': ['#architecture', '#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Групповое обучение для стабильной настройки языковых моделей', 'desc': 'В работе предложен метод Group Fine-Tuning (GFT), который улучшает процесс обучения большие языковые модели через анализ динамики тренировки. Авторы показывают, что стандартный supervised fine-tuning можно интерпретировать как частный случай policy gradient оптимизации с разреженной наградой и нестабильным взвешиванием. Метод использует две ключевые компоненты: Group Advantage Learning для создания разнообразных групп ответов с контрастивным обучением, и Dynamic Coefficient Rectification для адаптивной стабилизации весов. Эксперименты демонстрируют, что GFT превосходит стандартные методы SFT и лучше интегрируется с последующим обучением с подкреплением.'}, 'en': {'title': 'Enhancing Fine-Tuning with Group Dynamics', 'desc': 'This paper introduces Group Fine-Tuning (GFT) as a solution to the challenges faced in supervised fine-tuning (SFT) of large language models. GFT enhances training stability and efficiency by utilizing diverse response groups and adaptive weight bounding techniques. The authors analyze the limitations of SFT, such as sparse rewards and unstable optimization, and propose mechanisms to overcome these issues. Experimental results show that GFT outperforms traditional SFT methods and improves the integration of models with reinforcement learning.'}, 'zh': {'title': '群体微调：提升训练稳定性与效率的创新方法', 'desc': '本文提出了群体微调（Group Fine-Tuning, GFT）方法，以解决监督微调（SFT）中的一些局限性。GFT通过构建多样化的响应组和自适应权重限制，来提高训练的稳定性和效率。研究表明，SFT可以视为一种特殊的策略梯度优化，但存在稀疏奖励和不稳定的逆概率加权问题。实验结果显示，GFT在性能上优于基于SFT的方法，并能更好地与后续的强化学习训练结合。'}}}, {'id': 'https://huggingface.co/papers/2604.18574', 'title': 'When Can LLMs Learn to Reason with Weak Supervision?', 'url': 'https://huggingface.co/papers/2604.18574', 'abstract': 'Abstract Research reveals that model generalization in reasoning tasks under weak supervision depends on reward saturation dynamics and reasoning faithfulness, with supervised fine-tuning on explicit traces being crucial for successful adaptation.  AI-generated summary Large language models have achieved significant reasoning improvements through reinforcement learning with verifiable rewards (RLVR). Yet as model capabilities grow, constructing high-quality reward signals becomes increasingly difficult, making it essential to understand when RLVR can succeed under weaker forms of supervision. We conduct a systematic empirical study across diverse model families and reasoning domains under three weak supervision settings: scarce data, noisy rewards, and self-supervised proxy rewards. We find that generalization is governed by training reward saturation dynamics: models that generalize exhibit a prolonged pre-saturation phase during which training reward and downstream performance climb together, while models that saturate rapidly memorize rather than learn. We identify reasoning faithfulness, defined as the extent to which intermediate steps logically support the final answer, as the pre-RL property that predicts which regime a model falls into, while output diversity alone is uninformative. Motivated by these findings, we disentangle the contributions of continual pre-training and supervised fine-tuning, finding that SFT on explicit reasoning traces is necessary for generalization under weak supervision, while continual pre-training on domain data amplifies the effect. Applied together to Llama3.2-3B-Base, these interventions enable generalization across all three settings where the base model previously failed.', 'score': 18, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'de979a59df42189e', 'authors': ['Salman Rahman', 'Jingyan Shen', 'Anna Mordvina', 'Hamid Palangi', 'Saadia Gabriel', 'Pavel Izmailov'], 'affiliations': ['Google', 'New York University', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2604.18574.jpg', 'data': {'categories': ['#rl', '#small_models', '#rlhf', '#training'], 'emoji': '🧠', 'ru': {'title': 'Верность рассуждений и насыщение вознаграждения как ключи к обучению под слабым контролем', 'desc': 'Исследование показывает, что обобщение языковых моделей при решении логических задач под слабым контролем зависит от динамики насыщения вознаграждения и верности рассуждений. Авторы провели систематическое эмпирическое исследование на нескольких семействах моделей под тремя условиями слабого контроля: дефицит данных, зашумленные награды и самоконтролируемые прокси-награды. Они обнаружили, что модели, которые обобщают хорошо, показывают продолжительную фазу до насыщения, где улучшение награды коррелирует с качеством решений, а верность промежуточных шагов рассуждений предсказывает успех обучения. Оказалось, что обучение с учителем на явных цепочках рассуждений критически важно для обобщения при слабом контроле, и это позволило получить генерализацию на базовой модели Llama3.2-3B-B базе.'}, 'en': {'title': 'Unlocking Generalization in Weakly Supervised Reasoning', 'desc': 'This paper investigates how well machine learning models can generalize their reasoning abilities when trained under weak supervision. It highlights the importance of reward saturation dynamics, where models that learn effectively show a gradual increase in performance, while those that memorize quickly fail to generalize. The study also emphasizes the role of reasoning faithfulness, which measures how well intermediate reasoning steps support the final answer, as a predictor of model success. Finally, it demonstrates that supervised fine-tuning on explicit reasoning examples is crucial for achieving generalization, especially when combined with continual pre-training on relevant data.'}, 'zh': {'title': '弱监督下的推理泛化与奖励动态', 'desc': '本研究探讨了在弱监督下，模型在推理任务中的泛化能力与奖励饱和动态和推理可信度之间的关系。研究发现，模型的泛化能力与训练奖励饱和动态密切相关，表现出较长的预饱和阶段的模型能够更好地学习，而快速饱和的模型则倾向于记忆而非学习。推理可信度被定义为中间步骤在多大程度上逻辑支持最终答案，是预测模型表现的关键属性。通过对Llama3.2-3B-Base模型的实验，发现显式推理轨迹的监督微调对于在弱监督下的泛化是必要的，而在领域数据上的持续预训练则增强了这一效果。'}}}, {'id': 'https://huggingface.co/papers/2604.18224', 'title': 'WebCompass: Towards Multimodal Web Coding Evaluation for Code Language Models', 'url': 'https://huggingface.co/papers/2604.18224', 'abstract': 'Abstract WebCompass evaluates web development capabilities through diverse input modalities and task types, using automated evaluation methods that simulate real-world coding workflows.  AI-generated summary Large language models are rapidly evolving into interactive coding agents capable of end-to-end web coding, yet existing benchmarks evaluate only narrow slices of this capability, typically text-conditioned generation with static-correctness metrics, leaving visual fidelity, interaction quality, and codebase-level reasoning largely unmeasured. We introduce WebCompass, a multimodal benchmark that provides unified lifecycle evaluation of web engineering capability. Recognizing that real-world web coding is an iterative cycle of generation, editing, and repair, WebCompass spans three input modalities (text, image, video) and three task types (generation, editing, repair), yielding seven task categories that mirror professional workflows. Through a multi-stage, human-in-the-loop pipeline, we curate instances covering 15 generation domains, 16 editing operation types, and 11 repair defect types, each annotated at Easy/Medium/Hard levels. For evaluation, we adopt a checklist-guided LLM-as-a-Judge protocol for editing and repair, and propose a novel Agent-as-a-Judge paradigm for generation that autonomously executes generated websites in a real browser, explores interactive behaviors via the Model Context Protocol (MCP), and iteratively synthesizes targeted test cases, closely approximating human acceptance testing. We evaluate representative closed-source and open-source models and observe that: (1) closed-source models remain substantially stronger and more balanced; (2) editing and repair exhibit distinct difficulty profiles, with repair preserving interactivity better but remaining execution-challenging; (3) aesthetics is the most persistent bottleneck, especially for open-source models; and (4) framework choice materially affects outcomes, with Vue consistently challenging while React and Vanilla/HTML perform more strongly depending on task type.', 'score': 18, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'f2009dba60a4b087', 'authors': ['Xinping Lei', 'Xinyu Che', 'Junqi Xiong', 'Chenchen Zhang', 'Yukai Huang', 'Chenyu Zhou', 'Haoyang Huang', 'Minghao Liu', 'Letian Zhu', 'Hongyi Ye', 'Jinhua Hao', 'Ken Deng', 'Zizheng Zhan', 'Han Li', 'Dailin Li', 'Yifan Yao', 'Ming Sun', 'Zhaoxiang Zhang', 'Jiaheng Liu'], 'affiliations': ['Kuaishou Technology', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2604.18224.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#agents', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🌐', 'ru': {'title': 'Полный цикл оценки веб-кодирования через мультимодальный бенчмарк', 'desc': 'WebCompass — это мультимодальный бенчмарк для комплексной оценки способностей больших языковых моделей в веб-разработке. Бенчмарк охватывает три типа входных данных (текст, изображение, видео) и три типа задач (генерация, редактирование, исправление кода), отражая реальные рабочие процессы разработчиков. Для оценки применяются инновационные методы, включая протокол LLM-as-a-Judge и новую парадигму Agent-as-a-Judge, которая автоматически выполняет сгенерированные веб-сайты в реальном браузере и проводит интерактивное тестирование. Исследование показало, что закрытые модели превосходят открытые, эстетика остаётся главным вызовом, а выбор фреймворка существенно влияет на результаты.'}, 'en': {'title': 'WebCompass: A Comprehensive Benchmark for Web Development Skills', 'desc': 'WebCompass is a new benchmark designed to evaluate web development skills using various input types like text, images, and videos. It focuses on real-world coding tasks, including generating, editing, and repairing code, which reflects how professionals actually work. The evaluation process uses advanced methods, such as having AI act as a judge to test the generated websites in real browsers. The study finds that closed-source models perform better overall, while aesthetics and framework choice significantly impact the results.'}, 'zh': {'title': 'WebCompass：全面评估网页开发能力的多模态基准', 'desc': 'WebCompass 是一个多模态基准，用于评估网页开发能力，涵盖文本、图像和视频三种输入方式，以及生成、编辑和修复三种任务类型。该基准模拟真实的编码工作流程，提供统一的生命周期评估，帮助更全面地理解 AI 在网页编码中的表现。通过多阶段的人机协作流程，WebCompass 收集了涵盖多种生成领域和操作类型的实例，并对其进行难度分级。评估方法包括使用 LLM 作为评判者的检查表指导和新颖的 Agent 作为评判者的范式，能够在真实浏览器中执行生成的网站，模拟人类接受测试。'}}}, {'id': 'https://huggingface.co/papers/2604.18543', 'title': 'ClawEnvKit: Automatic Environment Generation for Claw-Like Agents', 'url': 'https://huggingface.co/papers/2604.18543', 'abstract': "Abstract An automated pipeline generates diverse, verified environments for claw-like agents from natural language descriptions, enabling large-scale benchmark construction and continuous evaluation.  AI-generated summary Constructing environments for training and evaluating claw-like agents remains a manual, human-intensive process that does not scale. We argue that what is needed is not just a dataset, but an automated pipeline capable of generating diverse, verified environments on demand. To this end, we introduce ClawEnvKit, an autonomous generation pipeline that instantiates this formalism from natural language descriptions. The pipeline comprises three modules: (1) a parser that extracts structured generation parameters from natural language input; (2) a generator that produces the task specification, tool interface, and scoring configuration; and (3) a validator that enforces feasibility, diversity, structural validity, and internal consistency across the generated environments. Using ClawEnvKit, we construct Auto-ClawEval, the first large-scale benchmark for claw-like agents, comprising 1,040 environments across 24 categories. Empirically, Auto-ClawEval matches or exceeds human-curated environments on coherence and clarity at 13,800x lower cost. Evaluated across 4 model families and 8 agent harness frameworks, we find that harness engineering boosts performance by up to 15.7 percentage points over a bare ReAct baseline, completion remains the primary axis of variation with no model saturating the benchmark, and automated generation enables evaluation at a scale previously infeasible. Beyond static benchmarking, ClawEnvKit enables live evaluation: users describe a desired capability in natural language and obtain a verified environment on demand, turning evaluation into a continuous, user-driven process. The same mechanism serves as an on-demand training environment generator, producing task distributions that adapt to an agent's current weaknesses rather than being bounded by existing user logs.", 'score': 17, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '8150fb1ef7f01b9d', 'authors': ['Xirui Li', 'Ming Li', 'Derry Xu', 'Wei-Lin Chiang', 'Ion Stoica', 'Cho-Jui Hsieh', 'Tianyi Zhou'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence', 'University of California, Berkley', 'University of California, Los Angeles', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2604.18543.jpg', 'data': {'categories': ['#games', '#open_source', '#agents', '#dataset', '#benchmark'], 'emoji': '🦾', 'ru': {'title': 'Автоматическая генерация окружений для обучения и оценки агентов-манипуляторов из естественного языка', 'desc': 'В работе представлен ClawEnvKit — автоматизированный конвейер для генерации разнообразных окружений для агентов-манипуляторов из описаний на естественном языке. Система состоит из трёх модулей: парсера для извлечения параметров, генератора спецификаций задач и валидатора для проверки корректности. На основе ClawEnvKit создан Auto-ClawEval — первый крупномасштабный бенчмарк с 1040 окружениями, генерируемыми в 13800 раз дешевле, чем ручная разметка. Система позволяет не только масштабируемо оценивать агентов, но и выполнять непрерывное обучение, адаптируя распределение задач к слабым местам конкретного агента.'}, 'en': {'title': 'Automating Environment Generation for Claw-Like Agents', 'desc': 'This paper presents ClawEnvKit, an automated pipeline that generates diverse and verified environments for claw-like agents based on natural language descriptions. The pipeline consists of three main components: a parser to extract parameters, a generator to create task specifications, and a validator to ensure the environments are feasible and diverse. By using ClawEnvKit, researchers can construct the Auto-ClawEval benchmark, which includes over 1,000 environments and significantly reduces the cost of environment creation while maintaining high quality. This system not only facilitates large-scale evaluation but also allows for continuous, user-driven training and assessment of agents based on their specific needs.'}, 'zh': {'title': '自动化生成爪形智能体环境的革命', 'desc': '本论文介绍了一种名为ClawEnvKit的自动化生成管道，能够根据自然语言描述生成多样化且经过验证的环境，以训练和评估爪形智能体。该管道包含三个模块：解析器、生成器和验证器，分别负责提取参数、生成任务规范和验证环境的有效性。通过ClawEnvKit，我们构建了Auto-ClawEval，这是第一个大规模的爪形智能体基准，包含1040个环境，成本比人工策划低13800倍。该系统不仅支持静态基准测试，还允许用户实时描述需求，生成适应性训练环境，推动评估过程的持续进行。'}}}, {'id': 'https://huggingface.co/papers/2604.17308', 'title': 'SkillFlow:Benchmarking Lifelong Skill Discovery and Evolution for Autonomous Agents', 'url': 'https://huggingface.co/papers/2604.17308', 'abstract': "Abstract SkillFlow presents a benchmark for evaluating autonomous agents' ability to discover, repair, and maintain skills over time through a structured lifelong learning protocol.  AI-generated summary As the capability frontier of autonomous agents continues to expand, they are increasingly able to complete specialized tasks through plug-and-play external skills. Yet current benchmarks mostly test whether models can use provided skills, leaving open whether they can discover skills from experience, repair them after failure, and maintain a coherent library over time. We introduce SkillFlow, a benchmark of 166 tasks across 20 families in which task construction within each family follows a Domain-Agnostic Execution Flow (DAEF) that defines an agent workflow framework, allowing these tasks to share a consistent workflow. Agents are evaluated under an Agentic Lifelong Learning protocol in which they begin without skills, solve tasks sequentially within each family, externalize lessons through trajectory- and rubric-driven skill patches, and carry the updated library forward. Experiments reveal a substantial capability gap. For Claude Opus 4.6, lifelong skill evolution improves task success from 62.65% to 71.08% (+8.43 points). However, high skill usage does not necessarily imply high utility: Kimi K2.5 gains only +0.60 points despite 66.87% skill usage, while Qwen-Coder-Next reaches only a 44.58% task completion rate and still regresses relative to the vanilla setting. SkillFlow contributes a structured testbed for this direction and an in-depth empirical analysis of skill discovery, patching, transfer, and their failure modes under lifelong evaluation.", 'score': 15, 'issue_id': 1990, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '76751addb41c34c7', 'authors': ['Ziao Zhang', 'Kou Shi', 'Shiting Huang', 'Avery Nie', 'Yu Zeng', 'Yiming Zhao', 'Zhen Fang', 'Qishen Su', 'Haibo Qiu', 'Wei Yang', 'Qingnan Ren', 'Shun Zou', 'Wenxuan Huang', 'Lin Chen', 'Zehui Chen', 'Feng Zhao'], 'affiliations': ['University of Science and Technology of China', 'University of Sydney', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.17308.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#training', '#transfer_learning', '#agents'], 'emoji': '🛠️', 'ru': {'title': 'Непрерывное открытие и эволюция навыков в автономных агентах', 'desc': 'SkillFlow — это бенчмарк для оценки способности автономных агентов обнаруживать, исправлять и поддерживать навыки в процессе непрерывного обучения. В работе представлена серия из 166 задач, организованных в 20 семействах с единой структурой выполнения (DAEF), что позволяет агентам использовать согласованный рабочий процесс. Агенты оцениваются по протоколу пожизненного обучения, начиная без навыков и постепенно накапливая их библиотеку через анализ траекторий выполнения и обратной связи. Эксперименты показывают значительный разрыв в возможностях: эволюция навыков повышает успешность выполнения задач, но корреляция между использованием навыков и их полезностью не всегда очевидна.'}, 'en': {'title': 'Empowering Agents: Discover, Repair, and Maintain Skills with SkillFlow', 'desc': 'SkillFlow is a benchmark designed to assess how well autonomous agents can learn and manage skills over time. It focuses on three key abilities: discovering new skills from their experiences, repairing skills when they fail, and maintaining a library of skills consistently. The benchmark includes 166 tasks across 20 families, structured to allow agents to learn in a coherent workflow. Results show that while some agents improve their task success rates with lifelong learning, others demonstrate that high skill usage does not always correlate with better performance.'}, 'zh': {'title': 'SkillFlow：自主智能体技能演进的新基准', 'desc': 'SkillFlow是一个基准测试，用于评估自主智能体在长期学习过程中发现、修复和维护技能的能力。该基准包含166个任务，分为20个任务家族，采用领域无关的执行流程（DAEF）来定义智能体的工作流程。智能体在没有技能的情况下开始，依次解决每个家族中的任务，并通过轨迹和评分驱动的技能补丁外化经验。实验结果显示，尽管技能使用率高，但并不一定意味着高效能，SkillFlow为技能发现和维护提供了结构化的测试平台。'}}}, {'id': 'https://huggingface.co/papers/2604.16826', 'title': 'Crowded in B-Space: Calibrating Shared Directions for LoRA Merging', 'url': 'https://huggingface.co/papers/2604.16826', 'abstract': 'Abstract LoRA adapter merging performance can be improved by separately calibrating the output-side matrix B to reduce interference from shared directions while preserving task-specific information.  AI-generated summary Merging separately trained LoRA adapters is a practical alternative to joint multi-task training, but it often hurts performance. Existing methods usually treat the LoRA update ΔW = BA as a single object and do not distinguish the two LoRA matrices. We show that the main source of LoRA merge interference comes from the output-side matrix B. Across tasks, B repeatedly uses a small set of shared directions, while A remains much more task-specific. As a result, the merged adapter overemphasizes these shared directions, and task-specific information is lost. We propose Pico (Pre-merge interference calibration in output-space), a data-free method that calibrates B before merge by downscaling over-shared directions and then rescaling the merged update. Pico plugs directly into existing merging methods such as Task Arithmetic, TIES, and TSV-M. Across eight different benchmarks from math, coding, finance, and medical domains, Pico improves average accuracy by 3.4-8.3 points over the corresponding base method and achieves the best overall average performance. Pico also enables merged adapters to outperform the LoRA trained with all task data. These results show that LoRA merging works better when the two LoRA matrices are treated separately.', 'score': 14, 'issue_id': 1989, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': 'ca45f21fffb1b69f', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.16826.jpg', 'data': {'categories': ['#multimodal', '#training'], 'emoji': '🧩', 'ru': {'title': 'Раздельная калибровка матриц LoRA для улучшения слияния адаптеров', 'desc': 'В статье исследуется проблема слияния LoRA адаптеров, обученных на разных задачах. Авторы обнаружили, что основной источник помех при слиянии — это выходная матрица B, которая переиспользует общие направления во всех задачах, в то время как матрица A остаётся специфичной для конкретных задач. Предложен метод Pico, который калибрует матрицу B перед слиянием, подавляя переполненные общие направления и масштабируя объединённое обновление. Метод показывает улучшение точности на 3.4-8.3 процентных пункта и совместим с существующими техниками слияния адаптеров.'}, 'en': {'title': 'Enhancing LoRA Merging with Pico Calibration', 'desc': 'This paper discusses improving the performance of merging LoRA (Low-Rank Adaptation) adapters by separately calibrating the output-side matrix B. The authors identify that interference from shared directions in B can lead to a loss of task-specific information when merging. They introduce a method called Pico, which calibrates B by downscaling over-shared directions before merging, thus enhancing the final output. The results demonstrate that this approach significantly boosts accuracy across various tasks, outperforming traditional merging methods and even full task data training.'}, 'zh': {'title': '优化LoRA适配器合并，提升任务性能', 'desc': '本文探讨了LoRA适配器合并的性能提升方法。研究发现，合并时输出侧矩阵B的干扰是主要问题，导致任务特定信息的丢失。我们提出了一种名为Pico的方法，通过在合并前对B进行校准，减少共享方向的干扰，从而保留任务特定信息。实验结果表明，Pico在多个领域的基准测试中显著提高了准确率，证明了分别处理LoRA矩阵的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.16830', 'title': 'The Illusion of Certainty: Decoupling Capability and Calibration in On-Policy Distillation', 'url': 'https://huggingface.co/papers/2604.16830', 'abstract': 'Abstract On-policy distillation suffers from miscalibration due to information mismatch between training and deployment contexts, which is addressed through a calibration-aware framework that improves both performance and confidence reliability.  AI-generated summary On-policy distillation (OPD) is an increasingly important paradigm for post-training language models. However, we identify a pervasive Scaling Law of Miscalibration: while OPD effectively improves task accuracy, it systematically traps models in severe overconfidence. We trace this failure to an information mismatch: teacher supervision is formed under privileged context available during training, whereas the deployed model must report confidence using only deployment-time information. We formalize this perspective theoretically, showing that teacher-conditioned success is generally not a valid target for deployment-time confidence and that helpful privileged context induces entropy collapse and a systematic optimism bias. To address this, we propose a calibration-aware OPD framework, CaOPD, that estimates empirical confidence from model rollouts, replaces self-reported confidence with this student-grounded target, and distills the revised response through the same self-distillation pipeline. Experiments across various models and domains show that CaOPD achieves Pareto-optimal calibration while maintaining competitive capability, generalizing robustly under out-of-distribution and continual learning. Our findings highlight that capability distillation does not imply calibrated confidence, and that confidence should be treated as an essential objective in post-training. Code: https://github.com/SalesforceAIResearch/CaOPD', 'score': 10, 'issue_id': 1996, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': 'e4bbd22c6cf45df4', 'authors': ['Jiaxin Zhang', 'Xiangyu Peng', 'Qinglin Chen', 'Qinyuan Ye', 'Caiming Xiong', 'Chien-Sheng Wu'], 'affiliations': ['Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.16830.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Калибровка уверенности в дистилляции языковых моделей через учёт информационного несовпадения', 'desc': 'В статье исследуется проблема неправильной калибровки моделей при обучении through on-policy distillation, когда учитель использует информацию, доступную только во время обучения, а модель при развёртывании должна работать без этой информации. Авторы показывают, что такое несовпадение контекстов приводит к систематической переуверенности модели и коллапсу энтропии. Они предлагают framework CaOPD, который оценивает уверенность модели на основе её собственных прогнозов и использует эту информацию вместо самооценки уверенности при дистилляции. Экспериментальные результаты демонстрируют, что предложенный подход достигает оптимального баланса между калибровкой и производительностью моделей.'}, 'en': {'title': 'Enhancing Confidence in Language Models with CaOPD', 'desc': 'This paper addresses the issue of miscalibration in on-policy distillation (OPD) for language models, where models become overly confident in their predictions. The authors identify that this overconfidence arises from a mismatch between the information available during training and what is accessible during deployment. They propose a new framework called CaOPD, which improves confidence estimation by using empirical data from model rollouts instead of relying solely on self-reported confidence. Their experiments demonstrate that CaOPD not only enhances calibration but also maintains strong performance across various tasks and learning scenarios.'}, 'zh': {'title': '提升模型置信度的校准框架', 'desc': '本文讨论了在策略蒸馏中，由于训练和部署环境之间的信息不匹配，导致模型的置信度不准确。我们提出了一种新的框架，称为CaOPD，旨在提高模型的性能和置信度的可靠性。通过从模型的输出中估计经验置信度，CaOPD能够有效地解决过度自信的问题。实验结果表明，CaOPD在多个模型和领域中实现了最佳的置信度校准，同时保持了竞争力。'}}}, {'id': 'https://huggingface.co/papers/2604.13313', 'title': 'Concrete Jungle: Towards Concreteness Paved Contrastive Negative Mining for Compositional Understanding', 'url': 'https://huggingface.co/papers/2604.13313', 'abstract': 'Abstract Vision-language models face challenges in compositional reasoning due to insufficient samples for distinguishing subtle semantics, which are addressed through lexical concreteness-based negative sample selection and a novel margin-based loss function.  AI-generated summary Vision-Language Models demonstrate remarkable capabilities but often struggle with compositional reasoning, exhibiting vulnerabilities regarding word order and attribute binding. This limitation arises from a scarcity of informative samples needed to differentiate subtle semantic variations during contrastive pretraining. Although hard negative mining offers a promising remedy, existing methods lack explicit mechanisms to dictate which linguistic elements undergo modification. Instead of engineering generative architectures, this study establishes lexical concreteness as a fundamental determinant of negative sample efficacy. Modifying highly concrete terms generates more pronounced structural and visual discrepancies, providing a substantially stronger learning signal. Leveraging this principle, ConcretePlant is proposed to systematically isolate and manipulate perceptually grounded concepts. Analyses of the InfoNCE further reveals a severe gradient imbalance, where easily distinguishable pairs disproportionately overwhelm the optimization process and restrict the bandwidth available for nuanced learning. To resolve this degradation, the Cement loss is formulated utilizing a margin-based approach. By correlating psycholinguistic scores with sample difficulty, this objective dynamically calibrates the penalization applied to individual training pairs. Comprehensive evaluations substantiate these theoretical claims. The integrated framework, designated as Slipform, achieves state-of-the-art accuracy across diverse compositional evaluation benchmarks, general cross-modal retrieval, single and multi label linear probing.', 'score': 8, 'issue_id': 1992, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '8613263d52bca3b3', 'authors': ['Eun Woo Im', 'Dhruv Madhwal', 'Vivek Gupta'], 'affiliations': ['Arizona State University'], 'pdf_title_img': 'assets/pdf/title_img/2604.13313.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#training', '#reasoning', '#benchmark'], 'emoji': '🌱', 'ru': {'title': 'Конкретность слов как ключ к композиционному пониманию в vision-language моделях', 'desc': 'В статье рассматриваются проблемы композиционного понимания в vision-language моделях, которые возникают из-за недостатка информативных примеров для различения тонких семантических различий. Авторы предлагают использовать лексическую конкретность в качестве критерия для отбора отрицательных примеров при контрастивном обучении, так как изменение конкретных терминов создаёт более заметные визуальные расхождения. Они также выявляют проблему дисбаланса градиентов в функции InfoNCE и предлагают новую маржинальную функцию потерь Cement, которая динамически взвешивает примеры на основе их сложности. Интегрированная система Slipform достигает лучших результатов на бенчмарках композиционального рассуждения и кросс-модальной контрастивности.'}, 'en': {'title': 'Enhancing Compositional Reasoning in Vision-Language Models', 'desc': "This paper addresses the challenges faced by vision-language models in understanding complex language structures due to a lack of diverse training samples. It introduces a method for selecting negative samples based on lexical concreteness, which helps the model learn better by focusing on more distinct and meaningful differences in language. The authors propose a new loss function called Cement, which uses a margin-based approach to balance the learning process and improve the model's ability to differentiate subtle semantic variations. The proposed framework, Slipform, demonstrates superior performance in various compositional reasoning tasks and cross-modal retrieval scenarios."}, 'zh': {'title': '提升视觉-语言模型组合推理能力的创新方法', 'desc': '本论文探讨了视觉-语言模型在组合推理方面的挑战，主要由于缺乏足够的样本来区分细微的语义差异。为了解决这个问题，研究提出了一种基于词汇具体性的负样本选择方法和一种新颖的基于边际的损失函数。通过修改高度具体的术语，能够产生更明显的结构和视觉差异，从而提供更强的学习信号。最终，提出的Slipform框架在多种组合评估基准上实现了最先进的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.17849', 'title': 'On the Reliability of Computer Use Agents', 'url': 'https://huggingface.co/papers/2604.17849', 'abstract': 'Abstract Computer-use agents exhibit unreliable performance due to execution stochasticity, task specification ambiguity, and behavioral variability, necessitating repeated evaluation and stable strategies for consistent task completion.  AI-generated summary Computer-use agents have rapidly improved on real-world tasks such as web navigation, desktop automation, and software interaction, in some cases surpassing human performance. Yet even when the task and model are unchanged, an agent that succeeds once may fail on a repeated execution of the same task. This raises a fundamental question: if an agent can succeed at a task once, what prevents it from doing so reliably? In this work, we study the sources of unreliability in computer-use agents through three factors: stochasticity during execution, ambiguity in task specification, and variability in agent behavior. We analyze these factors on OSWorld using repeated executions of the same task together with paired statistical tests that capture task-level changes across settings. Our analysis shows that reliability depends on both how tasks are specified and how agent behavior varies across executions. These findings suggest the need to evaluate agents under repeated execution, to allow agents to resolve task ambiguity through interaction, and to favor strategies that remain stable across runs.', 'score': 7, 'issue_id': 1996, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '57f7523132ce9405', 'authors': ['Gonzalo Gonzalez-Pumariega', 'Saaket Agashe', 'Jiachen Yang', 'Ang Li', 'Xin Eric Wang'], 'affiliations': ['Simular'], 'pdf_title_img': 'assets/pdf/title_img/2604.17849.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🔄', 'ru': {'title': 'От непостоянства к надежности: как сделать AI-агентов стабильными в выполнении задач', 'desc': 'В работе исследуются причины ненадежности агентов, которые взаимодействуют с компьютером для выполнения реальных задач. Авторы выделяют три основных фактора, снижающих надежность: стохастичность при исполнении, неоднозначность в задании задач и вариативность поведения агента. Анализ проводится на датасете OSWorld путем повторного выполнения одних и тех же задач с использованием статистических тестов. Исследование показывает, что надежность зависит как от способа формулировки задачи, так и от стабильности поведения агента между запусками, что предполагает необходимость оценки под повторными выполнениями и развития более стабильных стратегий.'}, 'en': {'title': 'Enhancing Reliability in Computer-Use Agents', 'desc': "This paper investigates the reasons why computer-use agents, which are designed to perform tasks like web navigation and software interaction, often fail to deliver consistent results. The authors identify three main factors contributing to this unreliability: stochasticity in execution, ambiguity in task specifications, and variability in agent behavior. By analyzing these factors through repeated task executions, they demonstrate that the reliability of agents is influenced by both the clarity of task instructions and the consistency of the agents' actions. The study emphasizes the importance of evaluating agents in repeated scenarios and suggests strategies to improve their stability and performance."}, 'zh': {'title': '提升计算机代理的可靠性', 'desc': '计算机使用代理的表现不稳定，主要由于执行的随机性、任务说明的模糊性和行为的变化性。这项研究探讨了导致计算机使用代理不可靠的三个因素，并通过在OSWorld上重复执行相同任务进行分析。研究表明，代理的可靠性不仅取决于任务的具体说明，还与代理在不同执行中的行为变化有关。因此，评估代理时需要考虑重复执行的情况，以帮助代理通过交互解决任务模糊性，并采用在多次运行中保持稳定的策略。'}}}, {'id': 'https://huggingface.co/papers/2604.18584', 'title': 'MathNet: a Global Multimodal Benchmark for Mathematical Reasoning and Retrieval', 'url': 'https://huggingface.co/papers/2604.18584', 'abstract': 'Abstract MathNet is a large-scale, multilingual, multimodal dataset of Olympiad-level math problems designed for evaluating mathematical reasoning and retrieval in generative models and embedding-based systems.  AI-generated summary Mathematical problem solving remains a challenging test of reasoning for large language and multimodal models, yet existing benchmarks are limited in size, language coverage, and task diversity. We introduce MathNet, a high-quality, large-scale, multimodal, and multilingual dataset of Olympiad-level math problems together with a benchmark for evaluating mathematical reasoning in generative models and mathematical retrieval in embedding-based systems. MathNet spans 47 countries, 17 languages, and two decades of competitions, comprising 30,676 expert-authored problems with solutions across diverse domains. In addition to the core dataset, we construct a retrieval benchmark consisting of mathematically equivalent and structurally similar problem pairs curated by human experts.   MathNet supports three tasks: (i) Problem Solving, (ii) Math-Aware Retrieval, and (iii) Retrieval-Augmented Problem Solving. Experimental results show that even state-of-the-art reasoning models (78.4% for Gemini-3.1-Pro and 69.3% for GPT-5) remain challenged, while embedding models struggle to retrieve equivalent problems. We further show that retrieval-augmented generation performance is highly sensitive to retrieval quality; for example, DeepSeek-V3.2-Speciale achieves gains of up to 12%, obtaining the highest scores on the benchmark. MathNet provides the largest high-quality Olympiad dataset together with the first benchmark for evaluating mathematical problem retrieval, and we publicly release both the dataset and benchmark at https://mathnet.mit.edu.', 'score': 7, 'issue_id': 1989, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '9a3c3de093124fd6', 'authors': ['Shaden Alshammari', 'Kevin Wen', 'Abrar Zainal', 'Mark Hamilton', 'Navid Safaei', 'Sultan Albarakati', 'William T. Freeman', 'Antonio Torralba'], 'affiliations': ['HUMAIN', 'KAUST', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2604.18584.jpg', 'data': {'categories': ['#open_source', '#science', '#reasoning', '#multilingual', '#dataset', '#multimodal', '#benchmark', '#math', '#rag'], 'emoji': '🧮', 'ru': {'title': 'Олимпиадная математика как мера настоящего интеллекта моделей', 'desc': 'MathNet — это большой многоязычный и мультимодальный набор данных, содержащий 30 676 олимпиадных задач по математике из 47 стран на 17 языках, разработанный для оценки способности моделей к математическому рассуждению. Датасет включает три основные задачи: решение задач, поиск математически эквивалентных проблем и поиск с дополнением через генерацию. Результаты показывают, что даже самые продвинутые LLM-модели (Gemini и GPT-5) решают только 70-78% задач, а модели встраивания (embedding models) плохо справляются с поиском эквивалентных задач. Использование поиска для дополнения решения (retrieval-augmented generation) повышает качество ответов моделей на 12%, демонстрируя важность комбинирования поиска и генерации для сложного математического рассуждения.'}, 'en': {'title': "MathNet: Elevating AI's Math Problem Solving Skills", 'desc': 'MathNet is a comprehensive dataset designed to enhance the evaluation of mathematical reasoning in AI models. It includes 30,676 expert-authored Olympiad-level math problems across 47 countries and 17 languages, making it a diverse resource for testing generative and embedding-based systems. The dataset supports three main tasks: Problem Solving, Math-Aware Retrieval, and Retrieval-Augmented Problem Solving, highlighting its versatility. Experimental results indicate that even advanced models face challenges, particularly in retrieval tasks, emphasizing the need for high-quality data in AI training.'}, 'zh': {'title': 'MathNet：数学推理的新基准', 'desc': 'MathNet是一个大规模的多语言多模态数据集，专注于奥林匹克级别的数学问题，旨在评估生成模型和嵌入系统中的数学推理和检索能力。该数据集涵盖47个国家、17种语言，包含30,676个专家编写的问题及其解决方案，支持三种任务：问题解决、数学感知检索和增强检索问题解决。实验结果表明，即使是最先进的推理模型在处理这些问题时仍然面临挑战，而嵌入模型在检索等效问题时表现不佳。MathNet不仅提供了高质量的数学问题数据集，还首次建立了数学问题检索的基准，促进了相关研究的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.17091', 'title': 'GenericAgent: A Token-Efficient Self-Evolving LLM Agent via Contextual Information Density Maximization (V1.0)', 'url': 'https://huggingface.co/papers/2604.17091', 'abstract': 'Abstract GenericAgent is a self-evolving large language model agent system that maximizes context information density through hierarchical memory, reusable SOPs, and efficient compression to overcome long-horizon limitations.  AI-generated summary Long-horizon large language model (LLM) agents are fundamentally limited by context. As interactions become longer, tool descriptions, retrieved memories, and raw environmental feedback accumulate and push out the information needed for decision-making. At the same time, useful experience gained from tasks is often lost across episodes. We argue that long-horizon performance is determined not by context length, but by how much decision-relevant information is maintained within a finite context budget. We present GenericAgent (GA), a general-purpose, self-evolving LLM agent system built around a single principle: context information density maximization. GA implements this through four closely connected components: a minimal atomic tool set that keeps the interface simple, a hierarchical on-demand memory that only shows a small high-level view by default, a self-evolution mechanism that turns verified past trajectories into reusable SOPs and executable code, and a context truncation and compression layer that maintains information density during long executions. Across task completion, tool use efficiency, memory effectiveness, self-evolution, and web browsing, GA consistently outperforms leading agent systems while using significantly fewer tokens and interactions, and it continues to evolve over time. Project: https://github.com/lsdefine/GenericAgent', 'score': 6, 'issue_id': 1995, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': '2dfc2c2be5eaae2d', 'authors': ['Jiaqing Liang', 'Jinyi Han', 'Weijia Li', 'Xinyi Wang', 'Zhoujia Zhang', 'Zishang Jiang', 'Ying Liao', 'Tingyun Li', 'Ying Huang', 'Hao Shen', 'Hanyu Wu', 'Fang Guo', 'Keyi Wang', 'Zhonghua Hong', 'Zhiyu Lu', 'Lipeng Ma', 'Sihang Jiang', 'Yanghua Xiao'], 'affiliations': ['Advantage AI Agent Lab (A3 Lab)'], 'pdf_title_img': 'assets/pdf/title_img/2604.17091.jpg', 'data': {'categories': ['#optimization', '#long_context', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Максимальная информационная плотность в конечном контексте', 'desc': 'GenericAgent — это система на основе больших языковых моделей, которая решает проблему ограниченности контекста при выполнении длительных задач. Система максимизирует плотность информации в контексте через иерархическую память, компактное хранилище стандартных операционных процедур и эффективное сжатие данных. Агент способен эволюционировать самостоятельно, преобразуя успешные траектории прошлых задач в переиспользуемые процедуры и исполняемый код. Такой подход позволяет значительно снизить количество токенов и взаимодействий, сохраняя при этом высокую производительность на различных типах задач.'}, 'en': {'title': 'Maximizing Context for Long-Horizon Success', 'desc': 'GenericAgent is a large language model (LLM) agent system designed to enhance performance in long-horizon tasks by maximizing context information density. It addresses the challenge of maintaining relevant decision-making information as interactions lengthen, which often leads to important data being pushed out. The system incorporates a hierarchical memory structure, a minimal tool set, and a self-evolution mechanism that transforms past experiences into reusable standard operating procedures (SOPs). By efficiently compressing context and focusing on high-level information, GenericAgent outperforms existing models while using fewer resources and continuously improving over time.'}, 'zh': {'title': '最大化上下文信息密度的自我进化代理系统', 'desc': 'GenericAgent是一个自我进化的大型语言模型代理系统，旨在通过层次化记忆、可重用的标准操作程序(SOP)和高效压缩来最大化上下文信息密度，从而克服长时间跨度的限制。该系统认为，长时间跨度的性能并不取决于上下文长度，而是取决于在有限的上下文预算内保持多少决策相关的信息。GenericAgent通过四个紧密相关的组件实现其目标，包括简化的原子工具集、按需层次化记忆、自我进化机制和上下文截断与压缩层。与其他领先的代理系统相比，GenericAgent在任务完成、工具使用效率、记忆有效性和自我进化等方面表现更佳，同时使用的令牌和交互次数显著减少，并且能够持续进化。'}}}, {'id': 'https://huggingface.co/papers/2604.15710', 'title': 'VoxMind: An End-to-End Agentic Spoken Dialogue System', 'url': 'https://huggingface.co/papers/2604.15710', 'abstract': 'Abstract VoxMind enhances spoken dialogue models with agentic capabilities through a "Think-before-Speak" mechanism and dynamic t
