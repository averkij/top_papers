    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.13346', 'title': 'AgentSPEX: An Agent SPecification and EXecution Language', 'url': 'https://huggingface.co/papers/2604.13346', 'abstract': 'Abstract AgentSPEX is a domain-specific language and framework for creating structured, modular, and interpretable large language model agent workflows with explicit control flow and state management.  AI-generated summary Language-model agent systems commonly rely on reactive prompting, in which a single instruction guides the model through an open-ended sequence of reasoning and tool-use steps, leaving control flow and intermediate state implicit and making agent behavior potentially difficult to control. Orchestration frameworks such as LangGraph, DSPy, and CrewAI impose greater structure through explicit workflow definitions, but tightly couple workflow logic with Python, making agents difficult to maintain and modify. In this paper, we introduce AgentSPEX, an Agent SPecification and EXecution Language for specifying LLM-agent workflows with explicit control flow and modular structure, along with a customizable agent harness. AgentSPEX supports typed steps, branching and loops, parallel execution, reusable submodules, and explicit state management, and these workflows execute within an agent harness that provides tool access, a sandboxed virtual environment, and support for checkpointing, verification, and logging. Furthermore, we provide a visual editor with synchronized graph and workflow views for authoring and inspection. We include ready-to-use agents for deep research and scientific research, and we evaluate AgentSPEX on 7 benchmarks. Finally, we show through a user study that AgentSPEX provides a more interpretable and accessible workflow-authoring paradigm than a popular existing agent framework.', 'score': 37, 'issue_id': 2004, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'ca5a108bd5c2a4a5', 'authors': ['Pengcheng Wang', 'Jerry Huang', 'Jiarui Yao', 'Rui Pan', 'Peizhi Niu', 'Yaowenqi Liu', 'Ruida Wang', 'Renhao Lu', 'Yuwei Guo', 'Tong Zhang'], 'affiliations': ['Baylor College of Medicine', 'University of Illinois Urbana-Champaign', 'University of Wisconsin Madison'], 'pdf_title_img': 'assets/pdf/title_img/2604.13346.jpg', 'data': {'categories': ['#benchmark', '#agents', '#science', '#reasoning', '#interpretability', '#open_source'], 'emoji': '🔧', 'ru': {'title': 'Структурированный язык для явного управления рабочими процессами LLM-агентов', 'desc': 'AgentSPEX — это специализированный язык и фреймворк для разработки рабочих процессов на основе больших языковых моделей с явным управлением потоком выполнения и состоянием. В отличие от реактивного подхода, где модель следует единой инструкции через неявные шаги рассуждения и использования инструментов, AgentSPEX обеспечивает структурированность через явное определение рабочих процессов с поддержкой типизированных шагов, ветвлений, циклов и параллельного выполнения. Фреймворк включает интерпретируемую агентную архитектуру с явным управлением состоянием, запись в журнал, контрольные точки и визуальный редактор для проектирования и отладки. Исследование показало, что AgentSPEX обеспечивает более простоту и интерпретируемость при разработке агентов по сравнению с существующими фреймворками.'}, 'en': {'title': 'Empowering LLM Agents with Structured Workflows', 'desc': 'AgentSPEX is a specialized language and framework designed to create structured workflows for large language model (LLM) agents, emphasizing clear control flow and state management. Unlike traditional reactive prompting methods that can lead to unpredictable agent behavior, AgentSPEX allows for explicit definitions of workflows, making them easier to understand and modify. It supports features like typed steps, branching, loops, and reusable modules, all while providing a customizable environment for executing these workflows. The framework also includes a visual editor for better workflow authoring and inspection, and it has been shown to enhance interpretability compared to existing frameworks through user studies.'}, 'zh': {'title': 'AgentSPEX：可解释的代理工作流框架', 'desc': 'AgentSPEX 是一种专门用于创建结构化、模块化和可解释的大型语言模型代理工作流的语言和框架。与传统的反应式提示方法不同，AgentSPEX 通过明确的控制流和状态管理，使得代理的行为更易于控制。它支持类型化步骤、分支和循环、并行执行以及可重用的子模块，提供了一个可定制的代理环境。通过可视化编辑器，用户可以更方便地创建和检查工作流，提升了工作流的可解释性和可访问性。'}}}, {'id': 'https://huggingface.co/papers/2604.19748', 'title': 'Tstars-Tryon 1.0: Robust and Realistic Virtual Try-On for Diverse Fashion Items', 'url': 'https://huggingface.co/papers/2604.19748', 'abstract': 'Abstract A commercial-scale virtual try-on system achieves high success rates, photorealistic results, and real-time performance through integrated system design and multi-stage training.  AI-generated summary Recent advances in image generation and editing have opened new opportunities for virtual try-on. However, existing methods still struggle to meet complex real-world demands. We present Tstars-Tryon 1.0, a commercial-scale virtual try-on system that is robust, realistic, versatile, and highly efficient. First, our system maintains a high success rate across challenging cases like extreme poses, severe illumination variations, motion blur, and other in-the-wild conditions. Second, it delivers highly photorealistic results with fine-grained details, faithfully preserving garment texture, material properties, and structural characteristics, while largely avoiding common AI-generated artifacts. Third, beyond apparel try-on, our model supports flexible multi-image composition (up to 6 reference images) across 8 fashion categories, with coordinated control over person identity and background. Fourth, to overcome the latency bottlenecks of commercial deployment, our system is heavily optimized for inference speed, delivering near real-time generation for a seamless user experience. These capabilities are enabled by an integrated system design spanning end-to-end model architecture, a scalable data engine, robust infrastructure, and a multi-stage training paradigm. Extensive evaluation and large-scale product deployment demonstrate that Tstars-Tryon1.0 achieves leading overall performance. To support future research, we also release a comprehensive benchmark. The model has been deployed at an industrial scale on the Taobao App, serving millions of users with tens of millions of requests.', 'score': 24, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'fce1e811b9fb92e4', 'authors': ['Mengting Chen', 'Zhengrui Chen', 'Yongchao Du', 'Zuan Gao', 'Taihang Hu', 'Jinsong Lan', 'Chao Lin', 'Yefeng Shen', 'Xingjian Wang', 'Zhao Wang', 'Zhengtao Wu', 'Xiaoli Xu', 'Zhengze Xu', 'Hao Yan', 'Mingzhou Zhang', 'Jun Zheng', 'Qinye Zhou', 'Xiaoyong Zhu', 'Bo Zheng'], 'affiliations': ['Taobao App'], 'pdf_title_img': 'assets/pdf/title_img/2604.19748.jpg', 'data': {'categories': ['#cv', '#inference', '#benchmark', '#dataset', '#multimodal'], 'emoji': '👔', 'ru': {'title': 'Фотореалистичная примерка одежды в реальном времени', 'desc': 'Tstars-Tryon 1.0 — это коммерческая система виртуальной примерки одежды, которая использует современные методы генеративного моделирования для создания фотореалистичных результатов. Система достигает высокого процента успеха даже в сложных условиях съёмки (экстремальные позы, резкие изменения освещения, размытие движения) благодаря интегрированной архитектуре модели и масштабируемому конвейеру подготовки данных. Модель поддерживает гибкую композицию с использованием нескольких эталонных изображений (до 6) из 8 категорий моды и позволяет независимо контролировать идентичность персоны и фон. Система оптимизирована для высокой скорости инференса и работает в реальном времени, что позволило развернуть её в масштабах индустрии в приложении Taobao для обслуживания миллионов пользователей.'}, 'en': {'title': 'Revolutionizing Virtual Try-Ons with Tstars-Tryon 1.0', 'desc': 'The paper presents Tstars-Tryon 1.0, a cutting-edge virtual try-on system that excels in real-world applications. It achieves high success rates even in challenging conditions like extreme poses and varying lighting, while producing photorealistic images that accurately reflect garment details. The system is designed for efficiency, allowing for near real-time performance and supporting multiple images across various fashion categories. Its robust architecture and multi-stage training approach ensure it meets the demands of commercial deployment, as evidenced by its successful integration into the Taobao App.'}, 'zh': {'title': '虚拟试衣的未来：高效、真实、灵活', 'desc': '本文介绍了一种商业规模的虚拟试衣系统Tstars-Tryon 1.0，该系统通过集成设计和多阶段训练实现了高成功率、逼真的效果和实时性能。该系统能够在极端姿势、光照变化和运动模糊等复杂情况下保持高成功率，并生成细致入微的逼真图像，忠实保留服装的纹理和材料特性。除了服装试穿外，该模型还支持多图像组合，能够灵活处理多达6张参考图像，并协调控制人物身份和背景。为了克服商业部署中的延迟瓶颈，该系统经过优化，能够实现近实时生成，提供无缝的用户体验。'}}}, {'id': 'https://huggingface.co/papers/2604.19636', 'title': 'CoInteract: Physically-Consistent Human-Object Interaction Video Synthesis via Spatially-Structured Co-Generation', 'url': 'https://huggingface.co/papers/2604.19636', 'abstract': 'Abstract CoInteract presents an end-to-end framework for human-object interaction video synthesis using a Diffusion Transformer backbone with specialized modules for structural stability and physical plausibility.  AI-generated summary Synthesizing human--object interaction (HOI) videos has broad practical value in e-commerce, digital advertising, and virtual marketing. However, current diffusion models, despite their photorealistic rendering capability, still frequently fail on (i) the structural stability of sensitive regions such as hands and faces and (ii) physically plausible contact (e.g., avoiding hand--object interpenetration). We present CoInteract, an end-to-end framework for HOI video synthesis conditioned on a person reference image, a product reference image, text prompts, and speech audio. CoInteract introduces two complementary designs embedded into a Diffusion Transformer (DiT) backbone. First, we propose a Human-Aware Mixture-of-Experts (MoE) that routes tokens to lightweight, region-specialized experts via spatially supervised routing, improving fine-grained structural fidelity with minimal parameter overhead. Second, we propose Spatially-Structured Co-Generation, a dual-stream training paradigm that jointly models an RGB appearance stream and an auxiliary HOI structure stream to inject interaction geometry priors. During training, the HOI stream attends to RGB tokens and its supervision regularizes shared backbone weights; at inference, the HOI branch is removed for zero-overhead RGB generation. Experimental results demonstrate that CoInteract significantly outperforms existing methods in structural stability, logical consistency, and interaction realism.', 'score': 11, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '7c7436055cd9cbd8', 'authors': ['Xiangyang Luo', 'Xiaozhe Xin', 'Tao Feng', 'Xu Guo', 'Meiguang Jin', 'Junfeng Ma'], 'affiliations': ['Alibaba Group', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.19636.jpg', 'data': {'categories': ['#diffusion', '#training', '#architecture', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Реалистичный синтез видео взаимодействия человека с объектом через структурированную генерацию', 'desc': 'CoInteract — это фреймворк для синтеза видео взаимодействия человека с объектом, построенный на основе Diffusion Transformer. Система использует специализированный механизм Mixture-of-Experts с пространственной маршрутизацией для повышения точности воспроизведения чувствительных областей, таких как руки и лицо. Авторы предлагают двухпоточную парадигму обучения, которая совместно моделирует RGB-поток и вспомогательный поток структуры взаимодействия, чтобы внедрить приоры геометрии контакта. Метод демонстрирует значительное улучшение в структурной стабильности, логической согласованности и реалистичности взаимодействия человека с предметом.'}, 'en': {'title': 'Revolutionizing Human-Object Interaction Video Synthesis', 'desc': 'CoInteract is a novel framework designed for synthesizing videos that depict human-object interactions (HOI) using a Diffusion Transformer architecture. It addresses common challenges in video generation, such as maintaining structural stability in sensitive areas like hands and faces, and ensuring physically plausible interactions without object interpenetration. The framework incorporates a Human-Aware Mixture-of-Experts (MoE) for improved detail and a dual-stream training approach that models both appearance and interaction structure. Experimental results show that CoInteract achieves superior performance in terms of realism and consistency compared to existing methods.'}, 'zh': {'title': '人机交互视频合成的新突破', 'desc': 'CoInteract是一个用于人机交互视频合成的端到端框架，采用扩散变换器作为基础架构，并引入了专门的模块以确保结构稳定性和物理合理性。该框架能够根据人物参考图像、产品参考图像、文本提示和语音音频生成高质量的HOI视频。CoInteract的两个创新设计包括人类感知的专家混合模型和空间结构共同生成，前者通过空间监督路由将令牌分配给轻量级的区域专家，后者则通过双流训练模式共同建模RGB外观流和辅助HOI结构流。实验结果表明，CoInteract在结构稳定性、逻辑一致性和交互真实感方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2604.19742', 'title': 'PlayCoder: Making LLM-Generated GUI Code Playable', 'url': 'https://huggingface.co/papers/2604.19742', 'abstract': 'Abstract Large language models struggle to generate logically correct GUI applications, prompting the development of PlayEval benchmark and PlayCoder framework that uses multi-agent approaches to improve functional correctness through iterative repair.  AI-generated summary Large language models (LLMs) have achieved strong results in code generation, but their ability to generate GUI applications, especially games, remains insufficiently studied. Existing benchmarks mainly evaluate correctness through test cases, which are inadequate for GUI applications because these systems are interactive, event-driven, and require correct state transitions across sequences of user actions. Their evaluation therefore should consider interaction flows and UI logic rather than only pass/fail outcomes. To study this problem, we introduce PlayEval, a repository-aware benchmark built from 43 multilingual GUI applications in Python, TypeScript, and JavaScript. Unlike prior GUI benchmarks that are difficult to adapt to desktop environments, PlayEval covers six major GUI application categories and directly supports code-generation evaluation. We further propose Play@k, a metric that measures whether at least one of *k* generated candidates can be played end-to-end without logical errors. To support reliable evaluation, we develop PlayTester, an LLM-based agent that performs task-oriented GUI playthroughs and detects logic violations automatically. Experiments on 10 state-of-the-art code LLMs show that, despite high compilation rates, they achieve near-zero Play@3, revealing major weaknesses in generating logically correct GUI applications. To address this limitation, we present PlayCoder, a multi-agent, repository-aware framework that generates, evaluates, and iteratively repairs GUI application code in a closed loop. PlayCoder substantially improves both functional correctness and semantic alignment for open-source and closed-source models, reaching up to 38.1% Exec@3 and 20.3% Play@3. Case studies further show that it can uncover silent logic bugs missed by traditional metrics and fix them through targeted edits.', 'score': 9, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '5befd4a6e7f2d48b', 'authors': ['Zhiyuan Peng', 'Wei Tao', 'Xin Yin', 'Chenhao Ying', 'Yuan Luo', 'Yiwen Guo'], 'affiliations': ['LIGHTSPEED', 'Shanghai Jiao Tong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.19742.jpg', 'data': {'categories': ['#benchmark', '#games', '#agents', '#plp', '#dataset', '#optimization', '#multimodal', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'Многоагентное исправление кода GUI-приложений через итеративное тестирование и ремонт', 'desc': 'В статье представлена новая система PlayEval для оценки способности больших языковых моделей генерировать корректные графические приложения и игры, которые требуют правильной обработки последовательностей пользовательских действий и переходов состояний. Авторы разработали PlayTester — агент на основе LLM, который автоматически тестирует интерактивные приложения и обнаруживает логические ошибки, выявив при этом серьёзные проблемы существующих моделей в генерации функционально корректного кода. Для решения этой проблемы предложена система PlayCoder, использующая многоагентный подход для итеративного ремонта сгенерированного кода через автоматическое тестирование и целевые исправления в замкнутом цикле. Экспериментальные результаты показывают, что PlayCoder значительно улучшает функциональную корректность и семантическое соответствие как для открытых, так и для закрытых моделей, достигая показателя Play@3 в 20.3%.'}, 'en': {'title': 'Enhancing GUI Code Generation with PlayEval and PlayCoder', 'desc': 'This paper addresses the challenges faced by large language models (LLMs) in generating logically correct graphical user interface (GUI) applications. It introduces PlayEval, a benchmark designed to evaluate GUI applications based on their interactive and event-driven nature, rather than just pass/fail outcomes. The authors propose PlayCoder, a multi-agent framework that iteratively generates and repairs GUI code to enhance functional correctness. Experiments demonstrate that PlayCoder significantly improves the performance of LLMs in generating GUI applications, revealing and fixing logic errors that traditional metrics often miss.'}, 'zh': {'title': '提升GUI应用生成的逻辑正确性', 'desc': '大型语言模型在生成逻辑正确的图形用户界面（GUI）应用程序方面存在困难，因此开发了PlayEval基准和PlayCoder框架。PlayEval是一个基于多语言GUI应用程序的基准，旨在评估代码生成的功能正确性。PlayCoder则是一个多代理框架，通过迭代修复来提高生成的GUI应用程序的逻辑正确性。实验结果表明，PlayCoder显著改善了开源和闭源模型的功能正确性和语义一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.19295', 'title': 'TEMPO: Scaling Test-time Training for Large Reasoning Models', 'url': 'https://huggingface.co/papers/2604.19295', 'abstract': 'Abstract TEMPO is a test-time training framework that alternates policy refinement with critic recalibration to sustain performance improvements in language models without diversity collapse.  AI-generated summary Test-time training (TTT) adapts model parameters on unlabeled test instances during inference time, which continuously extends capabilities beyond the reach of offline training. Despite initial gains, existing TTT methods for LRMs plateau quickly and do not benefit from additional test-time compute. Without external calibration, the self-generated reward signal increasingly drifts as the policy model evolves, leading to both performance plateaus and diversity collapse. We propose TEMPO, a TTT framework that interleaves policy refinement on unlabeled questions with periodic critic recalibration on a labeled dataset. By formalizing this alternating procedure through the Expectation-Maximization (EM) algorithm, we reveal that prior methods can be interpreted as incomplete variants that omit the crucial recalibration step. Reintroducing this step tightens the evidence lower bound (ELBO) and enables sustained improvement. Across diverse model families (Qwen3 and OLMO3) and reasoning tasks, TEMPO improves OLMO3-7B on AIME 2024 from 33.0% to 51.1% and Qwen3-14B from 42.3% to 65.8%, while maintaining high diversity.', 'score': 8, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '41f4a10562c51864', 'authors': ['Qingyang Zhang', 'Xinke Kong', 'Haitao Wu', 'Qinghua Hu', 'Minghao Wu', 'Baosong Yang', 'Yu Cheng', 'Yun Luo', 'Ganqu Cui', 'Changqing Zhang'], 'affiliations': ['Shanghai AI Lab', 'The Chinese University of Hong Kong', 'Tianjin University', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2604.19295.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Чередующееся уточнение политики и критика для устойчивого улучшения языковых моделей', 'desc': 'TEMPO — это фреймворк обучения во время тестирования, который чередует уточнение политики модели с переоценкой критика для поддержания улучшений в языковых моделях. Авторы показывают, что существующие методы обучения на тесте страдают от смещения самогенерируемого сигнала награды, что приводит к застою производительности и коллапсу разнообразия. Они формализуют процесс чередования политики и критика через алгоритм EM, доказывая, что предыдущие методы были неполными без шага переоценки. На практике TEMPO значительно улучшает результаты моделей Qwen3 и OLMO3 на задачах логического рассуждения, сохраняя при этом разнообразие ответов.'}, 'en': {'title': 'TEMPO: Sustaining Language Model Performance Through Smart Training', 'desc': 'TEMPO is a novel test-time training (TTT) framework designed to enhance the performance of language models during inference by refining policies and recalibrating critics. It addresses the issue of performance plateaus and diversity collapse that often occur in existing TTT methods. By alternating between policy refinement on unlabeled data and critic recalibration on labeled data, TEMPO effectively maintains and improves model capabilities. This approach, formalized through the Expectation-Maximization algorithm, demonstrates significant performance gains across various model families and reasoning tasks without sacrificing diversity.'}, 'zh': {'title': 'TEMPO：提升语言模型性能的新方法', 'desc': 'TEMPO是一种测试时训练框架，通过交替进行策略优化和评论者重新校准，来持续提升语言模型的性能而不导致多样性崩溃。测试时训练（TTT）在推理阶段对未标记的测试实例进行模型参数的适应，从而不断扩展模型的能力。现有的TTT方法在初期取得了一定的进展，但很快就会停滞，并且无法利用额外的测试时间计算。TEMPO通过引入评论者重新校准步骤，结合期望最大化（EM）算法，显著提高了模型在多样性和性能上的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.18845', 'title': 'Dual-View Training for Instruction-Following Information Retrieval', 'url': 'https://huggingface.co/papers/2604.18845', 'abstract': "Abstract A dual-view data synthesis approach using polarity reversal enhances retrieval systems' ability to follow instructions by training models to distinguish between topic-relevant and instruction-compliant documents.  AI-generated summary Instruction-following information retrieval (IF-IR) studies retrieval systems that must not only find documents relevant to a query, but also obey explicit user constraints such as required attributes, exclusions, or output preferences. However, most retrievers are trained primarily for semantic relevance and often fail to distinguish documents that match the topic from those that satisfy the instruction. We propose a dual-view data synthesis strategy based on polarity reversal: given a query, a document that is relevant under the instruction, and a hard negative that matches the query but violates the instruction, we prompt an LLM to generate a complementary instruction under which the two documents swap relevance labels. By presenting the same document pair under complementary instructions that invert their relevance labels, the training signal forces the retriever to reconsider the same candidate set through the instruction, rather than relying on fixed topical cues. On a 305M-parameter encoder, our method improves performance on the FollowIR benchmark by 45%, surpassing general-purpose embedding models of comparable or larger scale. Through head-to-head comparisons at matched data budgets, we further show that data diversity and instruction supervision play complementary roles: the former preserves general retrieval quality, while the latter improves instruction sensitivity. These results highlight the value of targeted data synthesis for building retrieval systems that are both broadly capable and instruction-aware.", 'score': 7, 'issue_id': 2004, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'bb37db510482dd08', 'authors': ['Qingcheng Zeng', 'Puxuan Yu', 'Aman Mehta', 'Fuheng Zhao', 'Rajhans Samdani'], 'affiliations': ['Northwestern University', 'Snowflake Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2604.18845.jpg', 'data': {'categories': ['#training', '#rag', '#data', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Инверсия инструкций для обучения поиска, осознающего ограничения пользователя', 'desc': 'В статье предложен метод синтеза данных для улучшения систем информационного поиска, которые должны следовать явным инструкциям пользователя, а не только находить семантически релевантные документы. Авторы используют технику инверсии полярности: для одной пары документов генерируют дополнительные инструкции, при которых метки релевантности меняются местами, заставляя модель учитывать инструкции при принятии решений. Такой подход обучения на синтезированных данных позволяет кодировщику лучше различать документы, соответствующие теме, от документов, нарушающих ограничения пользователя. На бенчмарке FollowIR метод показал улучшение на 45%, демонстрируя эффективность целевого синтеза данных для обучения инструкционно-чувствительных систем поиска.'}, 'en': {'title': 'Enhancing Instruction-Following in Retrieval Systems with Dual-View Synthesis', 'desc': "This paper introduces a dual-view data synthesis method that improves instruction-following in information retrieval systems. By using polarity reversal, the approach trains models to differentiate between documents that are relevant to a topic and those that comply with specific user instructions. The method involves generating complementary instructions that swap relevance labels for document pairs, enhancing the model's ability to process instructions effectively. The results show a significant performance boost on the FollowIR benchmark, demonstrating the importance of data diversity and instruction supervision in creating more capable retrieval systems."}, 'zh': {'title': '双视角数据合成，提升检索系统的指令遵循能力', 'desc': '本文提出了一种双视角数据合成方法，通过极性反转来增强检索系统遵循指令的能力。该方法训练模型区分与主题相关的文档和符合指令的文档。通过生成互补指令，文档的相关性标签得以交换，从而迫使检索器重新考虑候选集。实验结果表明，该方法在FollowIR基准测试中提高了45%的性能，显示了针对性数据合成在构建既具广泛能力又能遵循指令的检索系统中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.17632', 'title': 'Code-Switching Information Retrieval: Benchmarks, Analysis, and the Limits of Current Retrievers', 'url': 'https://huggingface.co/papers/2604.17632', 'abstract': 'Abstract Code-switching poses significant challenges for information retrieval systems, revealing performance bottlenecks and embedding space divergences that current multilingual approaches cannot fully address.  AI-generated summary Code-switching is a pervasive linguistic phenomenon in global communication, yet modern information retrieval systems remain predominantly designed for, and evaluated within, monolingual contexts. To bridge this critical disconnect, we present a holistic study dedicated to code-switching IR. We introduce CSR-L (Code-Switching Retrieval benchmark-Lite), constructing a dataset via human annotation to capture the authentic naturalness of mixed-language queries. Our evaluation across statistical, dense, and late-interaction paradigms reveals that code-switching acts as a fundamental performance bottleneck, degrading the effectiveness of even robust multilingual models. We demonstrate that this failure stems from substantial divergence in the embedding space between pure and code-switched text. Scaling this investigation, we propose CS-MTEB, a comprehensive benchmark covering 11 diverse tasks, where we observe performance declines of up to 27%. Finally, we show that standard multilingual techniques like vocabulary expansion are insufficient to resolve these deficits completely. These findings underscore the fragility of current systems and establish code-switching as a crucial frontier for future IR optimization.', 'score': 7, 'issue_id': 2004, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '77c0e1c338fbd858', 'authors': ['Qingcheng Zeng', 'Yuheng Lu', 'Zeqi Zhou', 'Heli Qi', 'Puxuan Yu', 'Fuheng Zhao', 'Hitomi Yanaka', 'Weihao Xuan', 'Naoto Yokoya'], 'affiliations': ['Brown University', 'Northwestern University', 'RIKEN AIP', 'Snowflake Inc.', 'The University of Tokyo', 'University of Utah', 'Waseda University'], 'pdf_title_img': 'assets/pdf/title_img/2604.17632.jpg', 'data': {'categories': ['#rag', '#benchmark', '#low_resource', '#translation', '#dataset', '#multilingual'], 'emoji': '🔀', 'ru': {'title': 'Кодовые переключения - слабое звено современного поиска', 'desc': 'В работе исследуется проблема кодовых переключений (смешивания языков) в системах поиска информации. Авторы создали эталонный набор данных CSR-L с естественными запросами на смешанных языках и обнаружили, что кодовые переключения значительно снижают эффективность даже мощных многоязычных моделей вплоть до 27%. Причина проблемы заключается в существенной расходимости представлений в пространстве эмбеддингов между чистыми и смешанными текстами. Стандартные методы адаптации многоязычных систем, такие как расширение словаря, оказываются недостаточными для решения этой проблемы.'}, 'en': {'title': 'Bridging the Gap: Tackling Code-Switching in Information Retrieval', 'desc': 'This paper addresses the challenges that code-switching presents to information retrieval (IR) systems, which are typically designed for monolingual use. The authors introduce CSR-L, a new dataset created through human annotation to better reflect mixed-language queries. Their research shows that code-switching significantly hampers the performance of multilingual models due to differences in the embedding spaces of pure and code-switched text. They also propose CS-MTEB, a benchmark for evaluating various tasks, revealing that existing multilingual techniques are inadequate for overcoming the performance issues caused by code-switching.'}, 'zh': {'title': '代码切换：信息检索的新挑战', 'desc': '代码切换是全球交流中常见的语言现象，但现代信息检索系统主要针对单语环境设计，导致其在处理代码切换时表现不佳。本文提出了CSR-L（代码切换检索基准-Lite），通过人工标注构建数据集，以捕捉混合语言查询的自然性。研究表明，代码切换显著降低了多语言模型的效果，尤其是在嵌入空间的差异上。我们还提出了CS-MTEB基准，涵盖11个不同任务，发现性能下降可达27%，强调了代码切换在信息检索优化中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.19667', 'title': 'Chat2Workflow: A Benchmark for Generating Executable Visual Workflows with Natural Language', 'url': 'https://huggingface.co/papers/2604.19667', 'abstract': 'Abstract Chat2Workflow presents a benchmark and agentic framework for automating executable visual workflow generation from natural language, revealing significant challenges in achieving industrial-grade automation despite advances in language models.  AI-generated summary At present, executable visual workflows have emerged as a mainstream paradigm in real-world industrial deployments, offering strong reliability and controllability. However, in current practice, such workflows are almost entirely constructed through manual engineering: developers must carefully design workflows, write prompts for each step, and repeatedly revise the logic as requirements evolve-making development costly, time-consuming, and error-prone. To study whether large language models can automate this multi-round interaction process, we introduce Chat2Workflow, a benchmark for generating executable visual workflows directly from natural language, and propose a robust agentic framework to mitigate recurrent execution errors. Chat2Workflow is built from a large collection of real-world business workflows, with each instance designed so that the generated workflow can be transformed and directly deployed to practical workflow platforms such as Dify and Coze. Experimental results show that while state-of-the-art language models can often capture high-level intent, they struggle to generate correct, stable, and executable workflows, especially under complex or changing requirements. Although our agentic framework yields up to 5.34% resolve rate gains, the remaining real-world gap positions Chat2Workflow as a foundation for advancing industrial-grade automation. Code is available at https://github.com/zjunlp/Chat2Workflow.', 'score': 6, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'd5e7c3f9aa0e99e3', 'authors': ['Yi Zhong', 'Buqiang Xu', 'Yijun Wang', 'Zifei Shan', 'Shuofei Qiao', 'Guozhou Zheng', 'Ningyu Zhang'], 'affiliations': ['Tencent', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.19667.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'От естественного языка к автоматизации: мостим разрыв между LLM и промышленными рабочими процессами', 'desc': 'В статье представлена бенчмарк Chat2Workflow и агентский фреймворк для автоматизации генерации исполняемых визуальных рабочих процессов из естественного языка с использованием больших языковых моделей. Авторы показывают, что хотя современные LLM хорошо понимают высокоуровневые намерения пользователя, они испытывают значительные трудности с генерацией корректных и стабильных рабочих процессов, особенно при сложных или изменяющихся требованиях. Предложенный агентский фреймворк применяет различные стратегии для снижения ошибок при выполнении и достигает увеличения успешности до 5.34%. Исследование подчеркивает существующий разрыв между возможностями AI и требованиями промышленного применения в области автоматизации рабочих процессов.'}, 'en': {'title': 'Automating Workflows: Bridging Language and Execution', 'desc': 'Chat2Workflow introduces a new benchmark and framework aimed at automating the creation of executable visual workflows from natural language inputs. Despite advancements in language models, the study highlights significant challenges in achieving reliable automation for industrial applications. The framework addresses the common issues of manual workflow construction, which is often costly and prone to errors. Experimental results indicate that while language models can understand high-level intents, they still struggle with generating accurate and stable workflows, particularly in complex scenarios, making Chat2Workflow a crucial step towards improving automation in real-world settings.'}, 'zh': {'title': '从自然语言到可执行工作流的自动化之路', 'desc': 'Chat2Workflow是一个基准和代理框架，旨在从自然语言自动生成可执行的视觉工作流。尽管语言模型取得了进展，但在实现工业级自动化方面仍面临重大挑战。当前的工作流几乎完全依赖手动工程，开发者需要设计工作流、编写每一步的提示，并随着需求变化反复修订逻辑。实验结果表明，尽管最先进的语言模型能够捕捉高层意图，但在生成正确、稳定和可执行的工作流方面仍然存在困难，尤其是在复杂或变化的需求下。'}}}, {'id': 'https://huggingface.co/papers/2604.15706', 'title': 'Target-Oriented Pretraining Data Selection via Neuron-Activated Graph', 'url': 'https://huggingface.co/papers/2604.15706', 'abstract': 'Abstract A novel target-oriented language model pretraining framework uses neuron activation graphs to select informative data without additional training, demonstrating superior performance across multiple benchmarks.  AI-generated summary Everyday tasks come with a target, and pretraining models around this target is what turns them into experts. In this paper, we study target-oriented language model (LM) pretraining by introducing Neuron-Activated Graph Ranking (NAG-based Ranking), a training-free and interpretable framework for target pretraining data selection. Rather than using black-box representations, our approach directly characterizes each target input by a sparse set of high-impact neurons in any off-the-shelf LLMs. Concretely, we quantify neuron impact and select the most influential neurons across layers into a compact Neuron-Activated Graph (NAG), and rank candidate data by NAG similarity to target examples. We conduct experiments across six benchmarks, where our NAG-based Ranking improves target-oriented pretraining by 4.9% on average over random sampling, and also outperforms state-of-the-art baselines by 5.3% accuracy on HellaSwag. It also remains effective under a more applicable multi-target setting, where our best setup surpasses two baselines by 1.1% and 4.1%, respectively. Furthermore, we provide a comprehensive analysis on why and how our NAG works, e.g., deactivating NAG-selected neurons (only 0.12% of all) causes a 23.5% performance collapse, and restricting NAG to the final layer incurs a 4.1% average drop, indicating that NAG captures a sparse "functional backbone" for learning target features. We release the code at https://github.com/asillycat/NAG.', 'score': 4, 'issue_id': 2004, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'e7291e7b8a01ff3b', 'authors': ['Zijun Wang', 'Haoqin Tu', 'Weidong Zhou', 'Yiyang Zhou', 'Xiaohuan Zhou', 'Bingni Zhang', 'Weiguo Feng', 'Taifeng Wang', 'Cihang Xie', 'Fengze Liu'], 'affiliations': ['ByteDance', 'UC Santa Cruz', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2604.15706.jpg', 'data': {'categories': ['#training', '#data', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Целевая подготовка языковых моделей с помощью нейронных графов', 'desc': 'В статье представлена новая методика предварительного обучения языковых моделей, ориентированная на конкретные цели, с использованием графов активации нейронов. Эта методика позволяет выбирать информативные данные без дополнительного обучения, что улучшает производительность моделей. Авторы используют графы активации нейронов для оценки влияния нейронов и выбора наиболее значимых из них. Эксперименты показывают, что такой подход улучшает точность моделей на различных тестах и превосходит современные методы.'}, 'en': {'title': 'Targeted Pretraining with Neuron Activation Insights', 'desc': 'This paper presents a new framework for pretraining language models that focuses on specific targets using Neuron-Activated Graphs (NAG). Instead of traditional methods, it selects data based on the activation of influential neurons in existing language models, making the process interpretable and efficient. The authors demonstrate that their approach significantly improves performance on various benchmarks, outperforming random sampling and existing state-of-the-art methods. Additionally, they analyze the importance of the selected neurons, showing that their method captures essential features for effective target-oriented learning.'}, 'zh': {'title': '目标导向预训练：用神经元激活图提升性能', 'desc': '本文提出了一种新颖的目标导向语言模型预训练框架，利用神经元激活图选择有用的数据，而无需额外训练。我们引入了基于神经元激活图的排名方法（NAG-based Ranking），该方法可以直观地选择目标预训练数据。通过量化神经元的影响力，我们构建了一个紧凑的神经元激活图，并根据其与目标示例的相似性对候选数据进行排名。实验结果表明，NAG-based Ranking在多个基准测试中显著提高了目标导向预训练的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.17397', 'title': 'Speculative Decoding for Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2604.17397', 'abstract': "Abstract Speculative decoding is adapted to autoregressive video diffusion through a quality-based routing mechanism that maintains high visual quality while achieving significant speedup.  AI-generated summary Autoregressive video diffusion is emerging as a promising paradigm for streaming video synthesis, with step distillation serving as the primary means of accelerating inference. Whether speculative decoding, the dominant acceleration strategy for large language models, can be effectively adapted to autoregressive video generation remains an open question, because video blocks are continuous spatiotemporal tensors with no token-level distribution for exact rejection sampling. We introduce SDVG, which brings speculative decoding to block-based autoregressive video diffusion by replacing token verification with an image-quality router. A 1.3B drafter proposes candidate blocks via four denoising steps; each block is VAE-decoded and scored by ImageReward using worst-frame aggregation--taking the minimum per-frame reward to catch single-frame artifacts that averaging would mask. Blocks scoring above a fixed threshold tau are accepted into the 14B target's KV cache; the rest are regenerated by the target. Two additional design choices prove critical: the first block is always force-rejected to anchor scene composition, and tau serves as a single knob that traces a smooth quality-speed Pareto frontier. On 1003 MovieGenVideoBench prompts (832x480), SDVG retains 98.1% of target-only VisionReward quality (0.0773 vs. 0.0788) at a 1.59x speedup with tau=-0.7, and reaches 2.09x at 95.7% quality retention--while consistently outperforming draft-only generation by over +17%. The framework is training-free, requires no architectural changes, and can be seamlessly integrated into existing autoregressive video generation pipelines.", 'score': 3, 'issue_id': 2004, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '6a9aaf6d8b860a46', 'authors': ['Yuezhou Hu', 'Jintao Zhang'], 'affiliations': ['University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2604.17397.jpg', 'data': {'categories': ['#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Быстрое видео без потери качества через спекулятивное декодирование', 'desc': 'В работе представлен метод адаптации спекулятивного декодирования для автрегрессивной видеодиффузии, которая позволяет ускорить генерацию видео без заметной потери качества. Вместо точной проверки токенов, используется маршрутизатор на основе оценки качества изображений, где небольшая модель-драфтер предлагает кандидатные блоки видео, а их качество оценивается с помощью ImageReward. Каждый видеоблок декодируется через VAE и оценивается по худшему кадру в последовательности, чтобы поймать артефакты, которые усреднение могло бы скрыть. Метод достигает ускорения в 1,59x при сохранении 98,1% качества целевой модели и может быть интегрирован в существующие системы видеогенерации без переобучения.'}, 'en': {'title': 'Speed Meets Quality in Video Generation with SDVG', 'desc': 'This paper presents SDVG, a novel approach that applies speculative decoding to autoregressive video diffusion, enhancing the speed of video generation while maintaining high visual quality. The method utilizes a quality-based routing mechanism that evaluates candidate video blocks based on their visual fidelity, allowing for efficient selection and rejection of frames. By employing a unique scoring system that focuses on the worst-frame quality, SDVG ensures that artifacts are minimized in the final output. The results demonstrate significant speed improvements without compromising quality, making it a valuable addition to existing video generation frameworks.'}, 'zh': {'title': '推测解码加速自回归视频生成', 'desc': '本论文提出了一种名为SDVG的框架，将推测解码技术应用于自回归视频扩散。该方法通过质量路由机制，确保生成视频的高视觉质量，同时显著提高生成速度。SDVG使用图像质量评分来筛选视频块，并通过四个去噪步骤生成候选块，确保最终输出的质量。实验结果表明，SDVG在保持高质量的同时，速度提升可达2.09倍，且无需对现有架构进行修改。'}}}, {'id': 'https://huggingface.co/papers/2604.19550', 'title': 'LoopCTR: Unlocking the Loop Scaling Power for Click-Through Rate Prediction', 'url': 'https://huggingface.co/papers/2604.19550', 'abstract': 'Abstract LoopCTR introduces a loop scaling paradigm for CTR models that increases training computation through recursive layer reuse while maintaining efficient inference, achieving state-of-the-art performance with enhanced adaptive inference potential.  AI-generated summary Scaling Transformer-based click-through rate (CTR) models by stacking more parameters brings growing computational and storage overhead, creating a widening gap between scaling ambitions and the stringent industrial deployment constraints. We propose LoopCTR, which introduces a loop scaling paradigm that increases training-time computation through recursive reuse of shared model layers, decoupling computation from parameter growth. LoopCTR adopts a sandwich architecture enhanced with Hyper-Connected Residuals and Mixture-of-Experts, and employs process supervision at every loop depth to encode multi-loop benefits into the shared parameters. This enables a train-multi-loop, infer-zero-loop strategy where a single forward pass without any loop already outperforms all baselines. Experiments on three public benchmarks and one industrial dataset demonstrate state-of-the-art performance. Oracle analysis further reveals 0.02--0.04 AUC of untapped headroom, with models trained with fewer loops exhibiting higher oracle ceilings, pointing to a promising frontier for adaptive inference.', 'score': 2, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'bb1cb1212d80f5eb', 'authors': ['Jiakai Tang', 'Runfeng Zhang', 'Weiqiu Wang', 'Yifei Liu', 'Chuan Wang', 'Xu Chen', 'Yeqiu Yang', 'Jian Wu', 'Yuning Jiang', 'Bo Zheng'], 'affiliations': ['Alibaba Group', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.19550.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Эффективное масштабирование через рекурсивное переиспользование параметров', 'desc': 'LoopCTR предлагает новую парадигму масштабирования для моделей предсказания кликов, которая увеличивает вычисления во время обучения путём рекурсивного переиспользования слоёв нейронной сети, без увеличения количества параметров. Архитектура основана на сэндвич-структуре с гиперсвязными остаточными связями и механизмом смеси экспертов, с применением процессного надзора на каждом уровне рекурсии. Ключевой инновацией является стратегия «обучение с множественными циклами, инференс без циклов», где одного прямого прохода хватает для превосходства над базовыми моделями. Модель достигает лучших результатов на публичных и промышленных датасетах, при этом оставляя потенциал для адаптивного инференса.'}, 'en': {'title': 'LoopCTR: Efficient Scaling for Superior CTR Performance', 'desc': 'LoopCTR presents a novel approach to enhance click-through rate (CTR) models by implementing a loop scaling paradigm. This method allows for increased computational efficiency during training by reusing model layers, which helps to reduce the need for additional parameters. The architecture incorporates Hyper-Connected Residuals and Mixture-of-Experts, facilitating effective multi-loop training while maintaining a streamlined inference process. Experimental results show that LoopCTR achieves superior performance on various benchmarks, indicating its potential for adaptive inference in real-world applications.'}, 'zh': {'title': '循环缩放，提升CTR模型性能', 'desc': 'LoopCTR提出了一种循环缩放范式，用于点击率（CTR）模型，通过递归重用共享模型层来增加训练计算，同时保持高效的推理性能。这种方法解耦了计算与参数增长，采用了增强的三明治架构，结合超连接残差和专家混合技术。在每个循环深度上进行过程监督，使得共享参数能够编码多循环的好处。实验结果表明，LoopCTR在多个公共基准和一个工业数据集上实现了最先进的性能，展示了适应性推理的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.17761', 'title': 'Contrastive Attribution in the Wild: An Interpretability Analysis of LLM Failures on Realistic Benchmarks', 'url': 'https://huggingface.co/papers/2604.17761', 'abstract': 'Abstract Contrastive attribution methods for analyzing large language model failures show mixed effectiveness across different benchmarks and model sizes.  AI-generated summary Interpretability tools are increasingly used to analyze failures of Large Language Models (LLMs), yet prior work largely focuses on short prompts or toy settings, leaving their behavior on commonly used benchmarks underexplored. To address this gap, we study contrastive, LRP-based attribution as a practical tool for analyzing LLM failures in realistic settings. We formulate failure analysis as contrastive attribution, attributing the logit difference between an incorrect output token and a correct alternative to input tokens and internal model states, and introduce an efficient extension that enables construction of cross-layer attribution graphs for long-context inputs. Using this framework, we conduct a systematic empirical study across benchmarks, comparing attribution patterns across datasets, model sizes, and training checkpoints. Our results show that this token-level contrastive attribution can yield informative signals in some failure cases, but is not universally applicable, highlighting both its utility and its limitations for realistic LLM failure analysis. Our code is available at: https://aka.ms/Debug-XAI.', 'score': 2, 'issue_id': 2004, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'fe603cbbd08015a5', 'authors': ['Rongyuan Tan', 'Jue Zhang', 'Zhuozhao Li', 'Qingwei Lin', 'Saravan Rajmohan', 'Dongmei Zhang'], 'affiliations': ['Microsoft', 'Southern University of Science and Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.17761.jpg', 'data': {'categories': ['#long_context', '#benchmark', '#open_source', '#interpretability'], 'emoji': '🔍', 'ru': {'title': 'Контрастивная атрибуция: анализ и ограничения при диагностике ошибок LLM', 'desc': 'Статья исследует контрастивные методы атрибуции, основанные на LRP, для анализа ошибок больших языковых моделей в реалистичных сценариях. Авторы формализуют анализ ошибок как задачу контрастивной атрибуции, сопоставляя разницу в логитах между неправильным и правильным токенами с входными данными и внутренними состояниями модели. Они представляют эффективное расширение метода, позволяющее строить межслойные графы атрибуции для длинных контекстов и проводят систематическое эмпирическое исследование на различных бенчмарках. Результаты показывают, что токен-уровневая контрастивная атрибуция может быть полезна в некоторых случаях, но не является универсальным инструментом для анализа ошибок LLM.'}, 'en': {'title': 'Unpacking LLM Failures with Contrastive Attribution', 'desc': 'This paper explores the effectiveness of contrastive attribution methods for analyzing failures in large language models (LLMs). It focuses on using Layer-wise Relevance Propagation (LRP) to understand why LLMs produce incorrect outputs by comparing the logit differences between wrong and correct tokens. The authors introduce a method to create cross-layer attribution graphs, which helps in analyzing long-context inputs more effectively. Their findings indicate that while this approach can provide valuable insights in certain cases, it is not universally effective across all scenarios, revealing both its strengths and limitations in failure analysis.'}, 'zh': {'title': '对比归因：揭示大型语言模型的失败之道', 'desc': '本文研究了对大型语言模型（LLM）失败进行分析的对比归因方法。我们提出了一种基于LRP的对比归因工具，能够在现实场景中有效分析LLM的失败情况。通过将失败分析视为对比归因，我们能够将错误输出与正确替代之间的logit差异归因于输入标记和模型内部状态。我们的实证研究表明，这种基于标记的对比归因在某些失败案例中提供了有用的信息，但并不适用于所有情况，突显了其在LLM失败分析中的实用性和局限性。'}}}, {'id': 'https://huggingface.co/papers/2604.18164', 'title': 'MM-JudgeBias: A Benchmark for Evaluating Compositional Biases in MLLM-as-a-Judge', 'url': 'https://huggingface.co/papers/2604.18164', 'abstract': 'Abstract Research identifies systematic biases in multimodal large language models used as automatic evaluators, revealing reliability issues and proposing a benchmark for measuring compositional bias through controlled perturbations and specific metrics.  AI-generated summary Multimodal Large Language Models (MLLMs) have been increasingly used as automatic evaluators-a paradigm known as MLLM-as-a-Judge. However, their reliability and vulnerabilities to biases remain underexplored. We find that many MLLM judges fail to reliably integrate key visual or textual cues, yielding unreliable evaluations when evidence is missing or mismatched, and exhibiting instability under semantically irrelevant perturbations. To address this, we systematically define Compositional Bias in MLLM-as-a-Judge systems and introduce MM-JudgeBias, a benchmark for evaluating it. MM-JudgeBias introduces controlled perturbations across Query, Image, and Response, and evaluates model behavior via two complementary metrics: Bias-Deviation (BD) for sensitivity and Bias-Conformity (BC) for stability. Our dataset of over 1,800 curated and refined multimodal samples, drawn from 29 source benchmarks, enables a fine-grained diagnosis of nine bias types across diverse tasks and domains. Experiments on 26 state-of-the-art MLLMs reveal systematic modality neglect and asymmetric evaluation tendencies, underscoring the need for more reliable judges.', 'score': 2, 'issue_id': 2004, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '363666db0e8172fe', 'authors': ['Sua Lee', 'Sanghee Park', 'Jinbae Im'], 'affiliations': ['KAIST AI', 'NAVER Cloud AI', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2604.18164.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '⚖️', 'ru': {'title': 'Выявление и измерение композиционных смещений в мультимодальных оценивающих моделях', 'desc': 'Исследование выявляет систематические смещения в мультимодальных больших языковых моделях, используемых как автоматические оценивающие системы. Авторы обнаружили, что многие такие модели неправильно интегрируют визуальные и текстовые признаки, что приводит к ненадёжным оценкам при отсутствии или несоответствии доказательств. Для решения этой проблемы предложена новая метрика композиционного смещения и benchmark MM-JudgeBias с контролируемыми возмущениями входных данных. Экспериментальное тестирование 26 современных мультимодальных моделей показало систематическое игнорирование модальностей и асимметричные тенденции в оценивании.'}, 'en': {'title': 'Unveiling Biases in Multimodal Evaluators: The Need for Reliable Judging', 'desc': 'This paper investigates the biases present in multimodal large language models (MLLMs) when they are used as automatic evaluators. It highlights that these models often struggle to effectively combine visual and textual information, leading to inconsistent evaluations, especially when the input data is altered. The authors introduce a new benchmark called MM-JudgeBias, which measures compositional bias through controlled changes in queries, images, and responses, using two metrics: Bias-Deviation and Bias-Conformity. The study reveals significant reliability issues in current MLLM evaluators and emphasizes the importance of addressing these biases for improved model performance.'}, 'zh': {'title': '揭示多模态评估者的偏差问题', 'desc': '本研究揭示了多模态大型语言模型（MLLMs）作为自动评估者时存在的系统性偏差，指出了其可靠性问题。我们发现，许多MLLM评估者在整合关键的视觉或文本线索时表现不稳定，导致在证据缺失或不匹配时的评估不可靠。为了解决这个问题，我们系统性地定义了MLLM作为评估者系统中的组合偏差，并引入了MM-JudgeBias基准来进行评估。该基准通过控制查询、图像和响应的扰动，并使用偏差偏离度（BD）和偏差一致性（BC）两个互补指标来评估模型行为。'}}}, {'id': 'https://huggingface.co/papers/2604.17472', 'title': 'UniMesh: Unifying 3D Mesh Understanding and Generation', 'url': 'https://huggingface.co/papers/2604.17472', 'abstract': 'Abstract UniMesh presents a unified framework that combines 3D generation and understanding tasks through novel components including a Mesh Head, Chain of Mesh for iterative editing, and a self-reflection mechanism for error correction.  AI-generated summary Recent advances in 3D vision have led to specialized models for either 3D understanding (e.g., shape classification, segmentation, reconstruction) or 3D generation (e.g., synthesis, completion, and editing). However, these tasks are often tackled in isolation, resulting in fragmented architectures and representations that hinder knowledge transfer and holistic scene modeling. To address these challenges, we propose UniMesh, a unified framework that jointly learns 3D generation and understanding within a single architecture. First, we introduce a novel Mesh Head that acts as a cross model interface, bridging diffusion based image generation with implicit shape decoders. Second, we develop Chain of Mesh (CoM), a geometric instantiation of iterative reasoning that enables user driven semantic mesh editing through a closed loop latent, prompting, and re generation cycle. Third, we incorporate a self reflection mechanism based on an Actor Evaluator Self reflection triad to diagnose and correct failures in high level tasks like 3D captioning. Experimental results demonstrate that UniMesh not only achieves competitive performance on standard benchmarks but also unlocks novel capabilities in iterative editing and mutual enhancement between generation and understanding. Code: https://github.com/AIGeeksGroup/UniMesh. Website: https://aigeeksgroup.github.io/UniMesh.', 'score': 2, 'issue_id': 2004, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': 'f2466e61e1e6d206', 'authors': ['Peng Huang', 'Yifeng Chen', 'Zeyu Zhang', 'Hao Tang'], 'affiliations': ['Boston University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.17472.jpg', 'data': {'categories': ['#3d', '#diffusion', '#transfer_learning', '#reasoning', '#architecture', '#multimodal', '#open_source'], 'emoji': '🔄', 'ru': {'title': 'Единая архитектура для генерации и понимания 3D-сеток с итеративным редактированием', 'desc': 'UniMesh представляет унифицированный фреймворк, который объединяет задачи генерации и понимания 3D-объектов в единую архитектуру. Ключевой компонент Mesh Head служит интерфейсом между диффузионными моделями генерации и неявными декодерами форм. Chain of Mesh реализует итеративное рассуждение для интерактивного редактирования сеток через замкнутый цикл в скрытом пространстве. Механизм самоконтроля на основе триады Actor-Evaluator-Self reflection позволяет диагностировать и исправлять ошибки в высокоуровневых задачах вроде 3D-описания.'}, 'en': {'title': 'UniMesh: Bridging 3D Generation and Understanding for Enhanced Modeling', 'desc': 'UniMesh is a novel framework that integrates 3D generation and understanding tasks into a single architecture, enhancing the synergy between these processes. It introduces a Mesh Head that connects image generation with shape decoding, facilitating better interaction between models. The Chain of Mesh (CoM) allows for iterative editing of 3D meshes, enabling users to refine their designs through a feedback loop. Additionally, a self-reflection mechanism helps identify and correct errors in complex tasks like 3D captioning, leading to improved performance and new capabilities in 3D modeling.'}, 'zh': {'title': '统一3D生成与理解的创新框架', 'desc': 'UniMesh是一个统一的框架，结合了3D生成和理解任务。它引入了Mesh Head、Mesh链和自我反思机制等新组件，以实现迭代编辑和错误修正。通过这种方式，UniMesh能够在单一架构中共同学习3D生成和理解，克服了以往任务孤立处理带来的问题。实验结果表明，UniMesh在标准基准测试中表现出色，并在迭代编辑和生成与理解之间的相互增强方面展现了新能力。'}}}, {'id': 'https://huggingface.co/papers/2604.19211', 'title': 'ClawNet: Human-Symbiotic Agent Network for Cross-User Autonomous Cooperation', 'url': 'https://huggingface.co/papers/2604.19211', 'abstract': "Abstract AI agents must evolve beyond individual task automation to enable secure, governed collaboration among multiple users through a human-symbiotic paradigm with identity-based governance mechanisms.  AI-generated summary Current AI agent frameworks have made remarkable progress in automating individual tasks, yet all existing systems serve a single user. Human productivity rests on the social and organizational relationships through which people coordinate, negotiate, and delegate. When agents move beyond performing tasks for one person to representing that person in collaboration with others, the infrastructure for cross-user agent collaboration is entirely absent, let alone the governance mechanisms needed to secure it. We argue that the next frontier for AI agents lies not in stronger individual capability, but in the digitization of human collaborative relationships. To this end, we propose a human-symbiotic agent paradigm. Each user owns a permanently bound agent system that collaborates on the owner's behalf, forming a network whose nodes are humans rather than agents. This paradigm rests on three governance primitives. A layered identity architecture separates a Manager Agent from multiple context-specific Identity Agents; the Manager Agent holds global knowledge but is architecturally isolated from external communication. Scoped authorization enforces per-identity access control and escalates boundary violations to the owner. Action-level accountability logs every operation against its owner's identity and authorization, ensuring full auditability. We instantiate this paradigm in ClawNet, an identity-governed agent collaboration framework that enforces identity binding and authorization verification through a central orchestrator, enabling multiple users to collaborate securely through their respective agents.", 'score': 1, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'bd7ecfff254f1b38', 'authors': ['Zhiqin Yang', 'Zhenyuan Zhang', 'Xianzhang Jia', 'Jun Song', 'Wei Xue', 'Yonggang Zhang', 'Yike Guo'], 'affiliations': ['Hong Kong Baptist University', 'Hong Kong Generative AI Research & Development Center', 'Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.19211.jpg', 'data': {'categories': ['#agents'], 'emoji': '🤝', 'ru': {'title': 'От личных ассистентов к сетям сотрудничающих агентов с управляемой идентификацией', 'desc': 'Статья представляет новую парадигму AI-агентов, ориентированную на совместную работу нескольких пользователей с механизмами управления на основе идентификации. Авторы предлагают архитектуру с многоуровневой системой идентичности, включающей главного агента и специализированных агентов для различных контекстов, что обеспечивает безопасность и контроль доступа. Для реализации этого подхода разработана фреймворк ClawNet, которая использует центральный оркестратор для проверки идентификации и авторизации при взаимодействии агентов. Таким образом, работа сосредоточена на переходе от индивидуальной автоматизации задач к безопасной совместной работе AI-агентов в сетевой структуре, основанной на отношениях между людьми.'}, 'en': {'title': 'Empowering Collaboration: AI Agents for Collective Human Productivity', 'desc': 'This paper discusses the need for AI agents to evolve from automating tasks for individual users to facilitating secure collaboration among multiple users. It introduces a human-symbiotic agent paradigm where each user has an agent that represents them in collaborative settings, forming a network of human relationships rather than just agent interactions. The proposed framework includes governance mechanisms such as a layered identity architecture, scoped authorization, and action-level accountability to ensure secure and auditable collaboration. The authors present ClawNet, a system that implements these ideas, allowing users to collaborate safely through their identity-governed agents.'}, 'zh': {'title': '超越单一任务，构建安全的多用户协作代理', 'desc': '本文探讨了人工智能代理如何超越单一任务自动化，促进多用户之间的安全协作。现有的AI代理系统主要服务于单一用户，而人类的生产力依赖于社会和组织关系。我们提出了一种人类共生代理范式，允许每个用户拥有一个永久绑定的代理系统，代表其进行协作。该范式基于身份治理机制，确保跨用户的代理协作安全可靠。'}}}, {'id': 'https://huggingface.co/papers/2604.19587', 'title': 'SmartPhotoCrafter: Unified Reasoning, Generation and Optimization for Automatic Photographic Image Editing', 'url': 'https://huggingface.co/papers/2604.19587', 'abstract': 'Abstract SmartPhotoCrafter automates photographic image editing by combining image quality comprehension with targeted enhancement, using a reasoning-to-generation approach that eliminates the need for explicit human instructions.  AI-generated summary Traditional photographic image editing typically requires users to possess sufficient aesthetic understanding to provide appropriate instructions for adjusting image quality and camera parameters. However, this paradigm relies on explicit human instruction of aesthetic intent, which is often ambiguous, incomplete, or inaccessible to non-expert users. In this work, we propose SmartPhotoCrafter, an automatic photographic image editing method which formulates image editing as a tightly coupled reasoning-to-generation process. The proposed model first performs image quality comprehension and identifies deficiencies by the Image Critic module, and then the Photographic Artist module realizes targeted edits to enhance image appeal, eliminating the need for explicit human instructions. A multi-stage training pipeline is adopted: (i) Foundation pretraining to establish basic aesthetic understanding and editing capabilities, (ii) Adaptation with reasoning-guided multi-edit supervision to incorporate rich semantic guidance, and (iii) Coordinated reasoning-to generation reinforcement learning to jointly optimize reasoning and generation. During training, SmartPhotoCrafter emphasizes photo-realistic image generation, while supporting both image restoration and retouching tasks with consistent adherence to color- and tone-related semantics. We also construct a stage-specific dataset, which progressively builds reasoning and controllable generation, effective cross-module collaboration, and ultimately high-quality photographic enhancement. Experiments demonstrate that SmartPhotoCrafter outperforms existing generative models on the task of automatic photographic enhancement, achieving photo-realistic results while exhibiting higher tonal sensitivity to retouching instructions. Project page: https://github.com/vivoCameraResearch/SmartPhotoCrafter.', 'score': 0, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '4477ff8cc1cff6a6', 'authors': ['Ying Zeng', 'Miaosen Luo', 'Guangyuan Li', 'Yang Yang', 'Ruiyang Fan', 'Linxiao Shi', 'Qirui Yang', 'Jian Zhang', 'Chengcheng Liu', 'Siming Zheng', 'Jinwei Chen', 'Bo Li', 'Peng-Tao Jiang'], 'affiliations': ['vivo BlueImage Lab, vivo Mobile Communication Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2604.19587.jpg', 'data': {'categories': ['#cv', '#dataset', '#training', '#rl'], 'emoji': '📸', 'ru': {'title': 'Интеллектуальное редактирование фотографий без явных инструкций', 'desc': 'SmartPhotoCrafter — это система автоматического редактирования фотографий, которая объединяет оценку качества изображения с целевыми улучшениями, используя подход рассуждение-к-генерации. Модель состоит из двух основных компонентов: модуль Image Critic анализирует качество и выявляет недостатки, а модуль Photographic Artist выполняет целевые редактирования для повышения привлекательности. Обучение проводится в три этапа: предварительное обучение для получения базовых эстетических знаний, адаптация с многошаговым контролем рассуждений и обучение с подкреплением для совместной оптимизации. Система демонстрирует превосходные результаты в автоматическом улучшении фотографий, обеспечивая фотореалистичные результаты с высокой чувствительностью к тональным параметрам.'}, 'en': {'title': 'Automating Image Editing with SmartPhotoCrafter', 'desc': 'SmartPhotoCrafter is an innovative tool for automating photographic image editing by integrating image quality understanding with targeted enhancements. It uses a reasoning-to-generation approach, which means it can make decisions about how to improve an image without needing specific instructions from users. The system consists of two main components: the Image Critic, which assesses image quality, and the Photographic Artist, which applies enhancements based on that assessment. Through a multi-stage training process, SmartPhotoCrafter learns to generate photo-realistic images while effectively handling tasks like restoration and retouching, outperforming existing models in automatic photographic enhancement.'}, 'zh': {'title': '智能摄影编辑，自动化提升图像质量', 'desc': 'SmartPhotoCrafter是一种自动化的摄影图像编辑方法，它结合了图像质量理解和针对性增强，采用推理到生成的方式，消除了对明确人类指令的需求。该模型通过图像评论模块识别图像缺陷，然后通过摄影艺术家模块进行有针对性的编辑，以提升图像的吸引力。训练过程中，SmartPhotoCrafter强调照片真实感的生成，同时支持图像恢复和修饰任务，确保色彩和色调的一致性。实验表明，SmartPhotoCrafter在自动摄影增强任务中优于现有生成模型，能够实现更高质量的图像效果。'}}}, {'id': 'https://huggingface.co/papers/2604.19341', 'title': 'Evaluation-driven Scaling for Scientific Discovery', 'url': 'https://huggingface.co/papers/2604.19341', 'abstract': 'Abstract SimpleTES framework scales evaluation-driven discovery loops for scientific problems, achieving state-of-the-art results across multiple domains through parallel exploration and feedback-driven refinement.  AI-generated summary Language models are increasingly used in scientific discovery to generate hypotheses, propose candidate solutions, implement systems, and iteratively refine them. At the core of these trial-and-error loops lies evaluation: the process of obtaining feedback on candidate solutions via verifiers, simulators, or task-specific scoring functions. While prior work has highlighted the importance of evaluation, it has not explicitly formulated the problem of how evaluation-driven discovery loops can be scaled up in a principled and effective manner to push the boundaries of scientific discovery, a problem this paper seeks to address. We introduce Simple Test-time Evaluation-driven Scaling (SimpleTES), a general framework that strategically combines parallel exploration, feedback-driven refinement, and local selection, revealing substantial gains unlocked by scaling evaluation-driven discovery loops along the right dimensions. Across 21 scientific problems spanning six domains, SimpleTES discovers state-of-the-art solutions using gpt-oss models, consistently outperforming both frontier-model baselines and sophisticated optimization pipelines. Particularly, we sped up the widely used LASSO algorithm by over 2x, designed quantum circuit routing policies that reduce gate overhead by 24.5%, and discovered new Erdos minimum overlap constructions that surpass the best-known results. Beyond novel discoveries, SimpleTES produces trajectory-level histories that naturally supervise feedback-driven learning. When post-trained on successful trajectories, models not only improve efficiency on seen problems but also generalize to unseen problems, discovering solutions that base models fail to uncover. Together, our results establish effective evaluation-driven loop scaling as a central axis for advancing LLM-driven scientific discovery, and provide a simple yet practical framework for realizing these gains.', 'score': 0, 'issue_id': 2004, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'fe9c80f0f494c810', 'authors': ['Haotian Ye', 'Haowei Lin', 'Jingyi Tang', 'Yizhen Luo', 'Caiyin Yang', 'Chang Su', 'Rahul Thapa', 'Rui Yang', 'Ruihua Liu', 'Zeyu Li', 'Chong Gao', 'Dachao Ding', 'Guangrong He', 'Miaolei Zhang', 'Lina Sun', 'Wenyang Wang', 'Yuchen Zhong', 'Zhuohao Shen', 'Di He', 'Jianzhu Ma', 'Stefano Ermon', 'Tongyang Li', 'Xiaowen Chu', 'James Zou', 'Yuzhi Xu'], 'affiliations': ['Peking University', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Tsinghua University', 'Wizard Intelligence Learning Lab, Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2604.19341.jpg', 'data': {'categories': ['#training', '#science', '#optimization', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'Масштабирование научного открытия через систематическую оценку и обратную связь', 'desc': 'В статье представлена框架SimpleTES для масштабирования циклов научного открытия, управляемых оценкой решений. Фреймворк использует параллельный поиск, обратную связь и локальный отбор для эффективного улучшения кандидатов через верификаторы и функции оценки. Исследователи демонстрируют, что SimpleTES превосходит базовые модели и сложные оптимизационные конвейеры на 21 научной задаче из шести различных областей, используя только GPT-3.5-turbo. Кроме того, успешные траектории поиска могут использоваться для обучения языковых моделей, позволяя им обобщаться на новые задачи и находить решения, которые базовые модели не способны обнаружить.'}, 'en': {'title': 'Scaling Discovery: SimpleTES Revolutionizes Scientific Problem Solving', 'desc': 'The SimpleTES framework enhances the process of scientific discovery by scaling evaluation-driven discovery loops, which are essential for generating and refining hypotheses. It combines parallel exploration with feedback-driven refinement to improve the efficiency and effectiveness of finding solutions across various scientific domains. By applying this framework, the authors achieved state-of-the-art results in 21 scientific problems, significantly outperforming existing models and optimization methods. Additionally, SimpleTES not only accelerates known algorithms but also enables models to generalize better to new problems, showcasing its potential to transform scientific research.'}, 'zh': {'title': '评估驱动的发现循环，推动科学进步', 'desc': '本文提出了SimpleTES框架，旨在通过评估驱动的发现循环来扩展科学问题的解决方案。该框架结合了并行探索、反馈驱动的优化和局部选择，显著提高了科学发现的效率。通过在21个科学问题上进行实验，SimpleTES使用gpt-oss模型取得了最先进的解决方案，超越了现有的基准模型。我们的研究表明，评估驱动的循环扩展是推动大型语言模型在科学发现中进步的关键。'}}}, {'id': 'https://huggingface.co/papers/2604.18591', 'title': 'SPRITE: From Static Mockups to Engine-Ready Game UI', 'url': 'https://huggingface.co/papers/2604.18591', 'abstract': 'Abstract SPRITE enables automated conversion of game UI screenshots into editable engine assets by combining vision-language models with structured YAML representation to handle complex layouts and nesting.  AI-generated summary Game UI implementation requires translating stylized mockups into interactive engine entities. However, current "Screenshot-to-Code" tools often struggle with the irregular geometries and deep visual hierarchies typical of game interfaces. To bridge this gap, we introduce SPRITE, a pipeline that transforms static screenshots into editable engine assets. By integrating Vision-Language Models (VLMs) with a structured YAML intermediate representation, SPRITE explicitly captures complex container relationships and non-rectangular layouts. We evaluated SPRITE against a curated Game UI benchmark and conducted expert reviews with professional developers to assess reconstruction fidelity and prototyping efficiency. Our findings demonstrate that SPRITE streamlines development by automating tedious coding and resolving complex nesting. By facilitating rapid in-engine iteration, SPRITE effectively blurs the boundaries between artistic design and technical implementation in game development. Project page: https://baiyunshu.github.io/sprite.github.io/', 'score': 0, 'issue_id': 2004, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '49236422c746e299', 'autho
