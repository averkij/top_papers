 the concept of evaluation meta-knowledge, which refers to the models' implicit understanding of the characteristics that define evaluations. By training on texts related to evaluation practices, models can learn to recognize evaluation-like contexts without explicitly memorizing them. The study finds that this approach leads to improved safety in model responses, raising important questions about the validity of AI safety evaluations and the potential for unseen biases in performance metrics."}, 'zh': {'title': '通过微调提升AI安全性表现的创新方法', 'desc': '本论文探讨了通过在合成文档上微调模型来提高安全基准性能的方法。这些文档描述了评估特征，使模型能够隐式识别评估相关的上下文，而不依赖于记忆或明确意识。研究发现，经过微调的模型在六个安全基准测试中表现出显著的安全性提升，且这种行为变化在缺乏明确评估意识的情况下依然存在。这表明评估元知识可能会影响安全基准的表现，提出了一个新的混淆因素，挑战了对AI安全评估的设计和解读。'}}}, {'id': 'https://huggingface.co/papers/2605.27466', 'title': 'AgensFlow: A Coordination-Policy Substrate for Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2605.27466', 'abstract': 'Abstract AgensFlow is an open-source framework that treats multi-agent coordination as an online policy-learning problem under partial observability, enabling learned routing to improve coordination-heavy workflows over static approaches.  AI-generated summary Multi-agent systems built on large language models (LLMs) require many coordination choices that are difficult to fix a priori: which skill protocol to invoke, which agent role should perform a subtask, which model to bind to each role, how roles should interact, when to use retrieval or verification, and when to omit a step entirely. These choices interact with task regime and operational constraints, so static pipelines and one-off model comparisons provide only a limited view of the design space. This paper introduces AgensFlow, an open-source framework that treats multi-agent coordination as an online policy-learning problem under partial observability. The framework makes coordination decisions observable and learnable from repeated trajectories, rather than treating skill, role, model, topology, and evaluation choices as fixed pipeline design.   AgensFlow is evaluated on two corpora: distributed-systems incident tasks and security-advisory tasks. The evaluation shows three main results: learned routing reaches a higher-quality operating point than a fixed pipeline baseline on coordination-heavy classes; skip:X isolates topology compression as a meaningful part of the substrate; and warm-started policy graphs can reduce exploration cost while preserving plateau quality. Overall, the results support that learned, auditable routing can improve coordination-heavy multi-agent workflows over static wiring.', 'score': 4, 'issue_id': 2330, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'c03cd7f81f16fabe', 'authors': ['Nicole Koenigstein'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.27466.jpg', 'data': {'categories': ['#optimization', '#open_source', '#reasoning'], 'emoji': '🤝', 'ru': {'title': 'Обучаемая координация: от статических конвейеров к адаптивной маршрутизации в многоагентных системах', 'desc': 'AgensFlow — это фреймворк с открытым исходным кодом, который рассматривает координацию многоагентных систем на базе больших языковых моделей как задачу обучения политики в условиях частичной наблюдаемости. Вместо того чтобы фиксировать архитектуру системы заранее, фреймворк делает решения о координации (выбор протокола навыков, распределение ролей, привязка моделей) наблюдаемыми и обучаемыми из повторяющихся траекторий. Экспериментальная оценка на задачах анализа инцидентов в распределённых системах и рекомендаций по безопасности показывает, что обучаемая маршрутизация достигает лучших результатов качества, чем статические конвейеры. Результаты подтверждают, что использование обучаемой и интерпретируемой маршрутизации улучшает работу многоагентных рабочих процессов с высокой координационной сложностью.'}, 'en': {'title': 'Learn to Coordinate: AgensFlow Transforms Multi-Agent Workflows', 'desc': 'AgensFlow is an innovative framework designed for multi-agent systems that focuses on improving coordination through online policy learning. It addresses the challenges of partial observability by allowing agents to learn from their experiences rather than relying on fixed protocols. The framework enables dynamic decision-making regarding agent roles, skill invocation, and interaction strategies, which enhances the overall efficiency of coordination-heavy tasks. Evaluations demonstrate that AgensFlow outperforms traditional static approaches, leading to better performance in complex workflows.'}, 'zh': {'title': 'AgensFlow：提升多智能体协调的学习框架', 'desc': 'AgensFlow是一个开源框架，将多智能体协调视为一个在线策略学习问题，适用于部分可观察的环境。该框架通过学习路由来改善需要高度协调的工作流程，超越静态方法的局限。研究表明，学习的路由在协调密集型任务中比固定管道基线达到更高的质量操作点。总体而言，AgensFlow展示了学习和可审计的路由如何提升多智能体工作流程的协调能力。'}}}, {'id': 'https://huggingface.co/papers/2605.27908', 'title': 'ESC-Skills: Discovering and Self-Evolving Skills for Emotional Support Conversations', 'url': 'https://huggingface.co/papers/2605.27908', 'abstract': 'Abstract ESC-Skills is a skill-centric framework that discovers and self-evolves executable emotional support skills through intervention units and multi-profile refinement to improve interpretability and dialogue outcomes.  AI-generated summary Existing emotional support conversation (ESC) systems mainly rely on end-to-end response generation or coarse strategy supervision, offering limited interpretability and little support for systematic skill improvement. We propose ESC-Skills, a skill-centric framework that discovers and self-evolves executable emotional support skills. We first model localized support interactions as Intervention Units (IUs), which capture state--action--outcome dynamics between seeker states, support interventions, and post-response emotional changes. Based on IUs extracted from both successful and failed ESC dialogues, we construct the ESC-Skills Bank, a repository of executable emotional support skills containing intervention guidance, applicability conditions, expected outcomes, and potential risks. To further improve robustness, we introduce a multi-profile self-evolutionary refinement framework in which an ESC agent interacts with diverse simulated seeker profiles under SAGE evaluation. The resulting interaction traces are analyzed to identify missing skills, unsafe interventions, and profile-specific failure patterns, which are then used to refine the Skills Bank through simulation-based verification. Experimental results demonstrate that ESC-Skills improves both response-level quality and dialogue-level emotional outcomes while providing more interpretable and controllable support behaviors. We will release the code, prompts, and ESC-Skills Bank at https://github.com/aliyun/qwen-dianjin.', 'score': 3, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '188508bddb70f307', 'authors': ['Jie Zhu', 'Huaixia Dou', 'Shuo Jiang', 'Junhui Li', 'Lifan Guo', 'Feng Chen', 'Chi Zhang', 'Fang Kong'], 'affiliations': ['Qwen DianJin Team, Alibaba Cloud Computing', 'School of Computer Science and Technology, Soochow University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27908.jpg', 'data': {'categories': ['#interpretability', '#open_source', '#alignment'], 'emoji': '🤝', 'ru': {'title': 'Интерпретируемая эмоциональная поддержка через управляемые и самообучаемые навыки', 'desc': 'ESC-Skills — это фреймворк, основанный на навыках для систем эмоциональной поддержки в диалогах. Система использует Intervention Units (интервенционные единицы) для моделирования локальных взаимодействий поддержки, которые фиксируют динамику состояния-действия-результата между запросчиком и агентом. На основе успешных и неудачных диалогов строится Skills Bank — репозиторий интерпретируемых навыков с указанием условий применения, ожидаемых результатов и потенциальных рисков. Для повышения надежности применяется многопрофильный фреймворк самоэволюции, в котором агент взаимодействует с разными симулированными профилями пользователей и уточняет свои навыки на основе анализа ошибок.'}, 'en': {'title': 'Empowering Emotional Support through Skill Evolution', 'desc': 'ESC-Skills is a framework designed to enhance emotional support conversations by focusing on specific skills that can be executed during interactions. It uses Intervention Units (IUs) to analyze the dynamics of support interactions, capturing how different actions affect emotional states. The framework builds a repository called the ESC-Skills Bank, which includes guidance on interventions and their expected outcomes. By employing a multi-profile self-evolutionary approach, it refines these skills based on diverse user interactions, leading to improved dialogue quality and emotional support effectiveness.'}, 'zh': {'title': '情感支持技能的自我演化与发现', 'desc': 'ESC-Skills是一个以技能为中心的框架，旨在通过干预单元和多轮次的自我演化来发现和发展可执行的情感支持技能，从而提高对话的可解释性和结果。该框架首先将局部支持互动建模为干预单元（IUs），捕捉求助者状态、支持干预和情感变化之间的动态关系。通过分析成功和失败的情感支持对话，构建了ESC-Skills库，包含可执行的情感支持技能及其指导、适用条件、预期结果和潜在风险。实验结果表明，ESC-Skills在提高响应质量和情感结果的同时，提供了更可解释和可控的支持行为。'}}}, {'id': 'https://huggingface.co/papers/2605.28655', 'title': 'AutoScientists: Self-Organizing Agent Teams for Long-Running Scientific Experimentation', 'url': 'https://huggingface.co/papers/2605.28655', 'abstract': 'Abstract AutoScientists enables decentralized AI agents to autonomously explore scientific research trajectories, improving biomedical machine learning, language model optimization, and protein fitness prediction through collaborative hypothesis generation and shared experimental knowledge.  AI-generated summary Scientific research proceeds through iterative cycles of hypothesis generation, experiment design, execution, and revision. AI agents can automate parts of this process, but existing approaches typically follow a single research trajectory or coordinate through a central planner with fixed objectives. As a result, they struggle to sustain parallel exploration, adapt as experimental evidence changes, or preserve knowledge of failed directions over long-running experiments. We introduce AutoScientists, a decentralized team of AI agents for long-running computational scientific experimentation. Agents interpret a shared experimental state, self-organize into teams around promising hypotheses, critique proposals before using experimental compute, and share successes and failures to reduce redundant exploration. Under matched experimental budgets, AutoScientists improves over prior AI agents across biomedical machine learning, language-model training optimization, and protein fitness prediction. On BioML-Bench, spanning biomedical imaging, protein engineering, single-cell omics, and drug discovery, AutoScientists achieves a mean leaderboard percentile of 74.4% across 24 tasks, improving over the strongest AI agent by +8.33%. On GPT training optimization, AutoScientists reaches a target validation bits-per-byte 1.9x faster than Autoresearch and continues discovering improvements from a starting champion where the single-agent approach finds none (7 vs. 0 accepted improvements). On ProteinGym fitness prediction, AutoScientists discovers a method for ACE2-Spike binding that improves over the current state-of-the-art model by +12.5% in Spearman correlation. Applied without modification across all 217 ProteinGym assays, the same method improves over the prior state of the art by +6.5% (Spearman correlation).', 'score': 3, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'a0d77265c7ab0954', 'authors': ['Shanghua Gao', 'Ada Fang', 'Marinka Zitnik'], 'affiliations': ['Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28655.jpg', 'data': {'categories': ['#agents', '#training', '#benchmark', '#optimization', '#dataset', '#science'], 'emoji': '🧬', 'ru': {'title': 'Децентрализованные AI агенты для автономного научного исследования', 'desc': 'В работе представлена система AutoScientists - децентрализованная команда AI агентов, которые автономно проводят научные исследования через итеративные циклы генерации гипотез и экспериментов. Агенты самоорганизуются вокруг перспективных гипотез, критикуют предложения перед использованием вычислительных ресурсов и обмениваются информацией об успехах и неудачах для уменьшения дублирования работы. Система превосходит существующие подходы на трех задачах: биомедицинское машинное обучение (BioML-Bench), оптимизация обучения языковых моделей и предсказание функции белков. AutoScientists достигает среднего результата 74.4% на 24 задачах, обучает GPT в 1.9 раза быстрее и улучшает предсказания функции белков на 12.5% по сравнению с лучшими известными методами.'}, 'en': {'title': 'Decentralized AI for Collaborative Scientific Discovery', 'desc': 'AutoScientists is a system of decentralized AI agents designed to enhance scientific research by autonomously exploring various research paths. These agents collaborate to generate hypotheses, design experiments, and share knowledge about both successful and unsuccessful attempts, which helps avoid redundant efforts. Unlike traditional methods that rely on a single trajectory or central control, AutoScientists can adapt to new evidence and sustain parallel explorations over long periods. The system has shown significant improvements in biomedical machine learning, language model optimization, and protein fitness prediction, outperforming previous AI agents in multiple tasks.'}, 'zh': {'title': '去中心化的科学探索新方式', 'desc': 'AutoScientists 是一个去中心化的人工智能代理团队，能够自主探索科学研究的路径。它通过协作生成假设和共享实验知识，提升生物医学机器学习、语言模型优化和蛋白质适应性预测的效果。与传统方法不同，AutoScientists 可以在多个研究方向上并行探索，并根据实验证据的变化进行调整，同时保留失败方向的知识。实验结果显示，AutoScientists 在多个任务上超越了现有的最强 AI 代理，显著提高了研究效率和成果。'}}}, {'id': 'https://huggingface.co/papers/2605.26457', 'title': 'Verus-SpecGym: An Agentic Environment for Evaluating Specification Autoformalization', 'url': 'https://huggingface.co/papers/2605.26457', 'abstract': 'Abstract LLM agents can translate informal programming problems into formal specifications with high accuracy, but face challenges in capturing all intended constraints and maintaining robustness against edge cases.  AI-generated summary AI coding agents are increasingly used to write real-world software, but ensuring that their outputs are correct remains a fundamental challenge. Formal verification offers a promising path: an agent generates code together with a machine-checked proof, guaranteeing that the code satisfies a formal specification. However, there is no guarantee that the formal spec itself matches the user\'s intent. In this work, we study specification autoformalization: whether LLM agents can translate informal programming problems into faithful formal specifications. We introduce Verus-SpecBench, a benchmark of 581 spec-writing tasks derived from Codeforces problems targeting Verus, a verifier for Rust, and Verus-SpecGym, an agentic environment in which models interact with Verus, bash, & the filesystem to develop these specs. The central challenge is evaluation: expert-written reference specs are expensive to write, & LLM judges can miss subtle mistakes. We address this by (a) extending Verus\'s exec_spec mechanism so that generated specs can be executed as Rust code, & (b) testing them against official Codeforces tests & adversarial cases extracted from Codeforces "hacks", which are edge cases written by competitors to break incorrect solutions. On Verus-SpecBench, the strongest model, Gemini 3.1 Pro, solves 77.8% of tasks, other frontier models solve 51.1--57.8% & OSS models reach only 21.5--25.5%. Our analysis of failure modes shows that model-generated specs can omit important input assumptions, accept incorrect outputs, & reject valid ones. We also find that LLM-as-a-judge evaluation misses 26% of the failures our evaluator catches. Overall, our results suggest that spec autoformalization is within reach for frontier agents but remains brittle even on problems where they can already generate correct code. The code, data, & logs can be found at https://github.com/formal-verif-is-cool/verus-spec-gym', 'score': 3, 'issue_id': 2330, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'de6868861b371c21', 'authors': ['Anmol Agarwal', 'Natalie Neamtu', 'Pranjal Aggarwal', 'Seungone Kim', 'Jannis Limperg', 'Cedric Flamant', 'Kanna Shimizu', 'Bryan Parno', 'Sean Welleck'], 'affiliations': ['Amazon'], 'pdf_title_img': 'assets/pdf/title_img/2605.26457.jpg', 'data': {'categories': ['#open_source', '#agents', '#reasoning', '#plp', '#benchmark', '#dataset'], 'emoji': '📋', 'ru': {'title': 'От кода к доказательству: автоматическая формализация спецификаций для верификации программ', 'desc': 'В работе исследуется автоматическая формализация спецификаций, то есть способность LLM-агентов преобразовывать неформальные описания задач программирования в формальные спецификации для верификатора Verus. Авторы создали бенчмарк Verus-SpecBench с 581 задачей и окружение Verus-SpecGym, где модели взаимодействуют с инструментами для разработки спецификаций. Для оценки качества они использовали инновационный подход: выполнение сгенерированных спецификаций как кода Rust и тестирование против официальных тестов Codeforces и граничных случаев. Результаты показывают, что фронтирные модели решают большинство задач, но спецификации часто содержат ошибки в предположениях и граничных условиях, что свидетельствует о хрупкости этого подхода.'}, 'en': {'title': 'Bridging Informal Problems to Formal Specifications with LLMs', 'desc': 'This paper explores how large language models (LLMs) can convert informal programming problems into formal specifications, which are essential for ensuring code correctness. The authors introduce two tools: Verus-SpecBench, a benchmark for evaluating specification tasks, and Verus-SpecGym, an environment for LLMs to interact with a verification system. They highlight the challenges in evaluating the generated specifications, noting that existing methods often miss subtle errors. The findings indicate that while LLMs can generate formal specifications with reasonable accuracy, they still struggle with capturing all necessary constraints and can produce incorrect or incomplete outputs.'}, 'zh': {'title': '规范自动形式化：LLM的挑战与机遇', 'desc': '本论文研究了大型语言模型（LLM）代理如何将非正式编程问题转化为准确的正式规范。我们提出了Verus-SpecBench，这是一个包含581个规范编写任务的基准，旨在评估LLM在生成正式规范时的能力。尽管最强的模型在任务解决率上表现良好，但仍然存在遗漏重要输入假设和接受错误输出的问题。我们的研究表明，尽管规范自动形式化在前沿代理中是可行的，但在处理复杂问题时仍然存在脆弱性。'}}}, {'id': 'https://huggingface.co/papers/2605.27311', 'title': 'Chartographer: Counterfactual Chart Generation for Evaluating Vision-Language Models', 'url': 'https://huggingface.co/papers/2605.27311', 'abstract': 'Abstract Counterfactual charts are introduced to rigorously evaluate visual reasoning in chart question-answering by varying underlying data while keeping tasks fixed, revealing hidden model failures and generalization limitations.  AI-generated summary Chart question-answering (QA) benchmarks aim to pose questions that require visual reasoning to correctly answer, but models can often reach solutions through shortcuts or prior familiarity with a chart based on their own background knowledge. To strictly evaluate visual reasoning, we propose counterfactual charts where the chart-question task remains fixed, but underlying chart and the corresponding answer are varied. We introduce Chartographer, a framework to reverse engineer charts into executable code, validate reconstruction fidelity, generate seed-controlled counterfactual variants, and derive new answers from executable QA logic. We apply this framework to existing chart QA datasets and evaluate proprietary and open-source vision-language models (VLMs), measuring variation sensitivity and generalizability. Counterfactual charts reveal failures hidden by single-chart performance: VLMs often fail to generalize after answering the original chart correctly. We find failures are most prevalent when updated charts require novel visual reasoning pathways.', 'score': 3, 'issue_id': 2329, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'b88141da77dc38e5', 'authors': ['Yifan Jiang', 'Dae Yon Hwang', 'Jesse C. Cresswell', 'Freda Shi'], 'affiliations': ['Layer 6 AI', 'University of Waterloo', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.27311.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#multimodal'], 'emoji': '📊', 'ru': {'title': 'Контрфактические графики раскрывают истинные пределы обобщения моделей зрения', 'desc': 'В работе предложены контрфактические графики для объективной оценки способности моделей визуального восприятия к рассуждению при ответах на вопросы о диаграммах. Авторы разработали фреймворк Chartographer, который переводит графики в исполняемый код, генерирует варианты данных с фиксированной задачей, но измененными диаграммами и ответами. Эта методология позволяет выявить скрытые ошибки моделей, которые правильно отвечают на исходные графики, но не справляются с их модификациями. Исследование показало, что видео-языковые модели часто не обобщают знания, когда требуются новые пути визуального анализа.'}, 'en': {'title': 'Uncovering Hidden Failures in Chart Question-Answering with Counterfactuals', 'desc': 'This paper introduces counterfactual charts as a method to evaluate visual reasoning in chart question-answering tasks. By keeping the questions fixed while changing the underlying data, the authors can uncover hidden failures in models that may rely on shortcuts rather than true reasoning. The proposed framework, Chartographer, allows for the reverse engineering of charts into executable code, enabling the generation of controlled counterfactual variants and new answers. The study reveals that many vision-language models struggle to generalize their answers when faced with updated charts that require different reasoning approaches.'}, 'zh': {'title': '反事实图表：揭示视觉推理的潜在失败', 'desc': '本文介绍了反事实图表的概念，用于严格评估图表问答中的视觉推理能力。通过保持任务不变而改变底层数据，反事实图表揭示了模型的隐藏失败和泛化限制。我们提出了Chartographer框架，可以将图表逆向工程为可执行代码，并生成受控的反事实变体。研究表明，视觉语言模型在处理更新的图表时，常常无法有效泛化，尤其是在需要新的视觉推理路径时。'}}}, {'id': 'https://huggingface.co/papers/2605.24486', 'title': 'AgentFugue: Agent Scaling for Long-Horizon Tasks through Collective Reasoning', 'url': 'https://huggingface.co/papers/2605.24486', 'abstract': 'Abstract AgentFugue enables collective reasoning among peer agents through a shared hub that coordinates reusable intermediate reasoning without centralized planning, demonstrating capability gains from scaling out rather than just scaling up.  AI-generated summary Recent progress on long-horizon agentic tasks has been driven largely by scaling up individual agents through stronger models, better tools, and more effective scaffolding. In contrast, much less is understood about scaling out: whether multiple peer agents, all targeting the same task, can become an additional source of capability without relying on explicit role specialization or workflow orchestration. We study this question and propose AgentFugue, a collective reasoning framework built around a shared reasoning hub. As peer agents explore the same task in parallel, the hub records concise notes on what each agent has established, attempted, or ruled out, and enables each agent to selectively access what other agents have discovered in a form useful for its current search. This design turns otherwise isolated trajectories into a connected ecology of reusable intermediate reasoning without requiring centralized planning. We instantiate the hub as a plug-in communication layer, trained with supervised fine-tuning and end-to-end reinforcement learning. Across the challenging long-horizon settings we study, AgentFugue improves over strong baselines. Our results suggest that collective reasoning can turn scaling out peer agent systems into a distinct source of capability gains, rather than merely a way of spending more compute.', 'score': 3, 'issue_id': 2330, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': 'bb27ae4499922a88', 'authors': ['Yuyang Hu', 'Hongjin Qian', 'Shuting Wang', 'Jiongnan Liu', 'Tong Zhao', 'Xiaoxi Li', 'Zheng Liu', 'Zhicheng Dou'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'GSAI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.24486.jpg', 'data': {'categories': ['#agents', '#training', '#reasoning', '#rl', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Масштабирование через коллективный разум: когда много агентов лучше одного сильного агента', 'desc': 'AgentFugue — это фреймворк для коллективного рассуждения, который позволяет нескольким независимым агентам работать параллельно над одной задачей через общий центральный узел. Узел записывает и обобщает промежуточные результаты, выводы и исследованные направления каждого агента, позволяя другим агентам использовать эту информацию для улучшения своего поиска. Система обучается с помощью supervised fine-tuning и reinforcement learning, функционируя как коммуникационный слой между агентами без необходимости централизованного планирования. Результаты показывают, что масштабирование количества агентов может быть таким же эффективным источником прироста производительности, как и улучшение самих моделей.'}, 'en': {'title': 'Unlocking Collective Intelligence in Agent Collaboration', 'desc': "AgentFugue is a framework that enhances the performance of multiple peer agents working together on the same task without needing a central planner. It allows these agents to share their findings and reasoning processes through a shared hub, which records and organizes their insights. This approach transforms individual efforts into a collaborative ecosystem, enabling agents to build on each other's work effectively. The study shows that this method of collective reasoning can lead to significant improvements in task performance, demonstrating that scaling out can be as beneficial as scaling up individual agent capabilities."}, 'zh': {'title': '集体推理，能力提升的新方式', 'desc': 'AgentFugue 是一个集体推理框架，允许多个代理通过共享的推理中心进行协作，而无需集中规划。它记录每个代理的探索过程，帮助代理们相互访问有用的信息，从而提高整体能力。与传统的单一代理模型不同，AgentFugue 通过并行处理相同任务，展示了扩展代理系统的潜力。研究表明，这种集体推理方法能够有效提升代理的表现，成为能力提升的新来源。'}}}, {'id': 'https://huggingface.co/papers/2605.25707', 'title': 'AgentHijack: Benchmarking Computer Use Agent Robustness to Common Environment Corruptions', 'url': 'https://huggingface.co/papers/2605.25707', 'abstract': 'Abstract Computer-use agents powered by multimodal large language models face significant challenges in real-world environments due to dynamic disruptions, necessitating robustness evaluation and improved framework designs.  AI-generated summary Autonomous computer use agents that powered by multimodal large language models (MLLMs) are emerging as capable assistants for completing complex digital workflows. However, real-world execution environments are far from ideal: pop-ups, resolution changes, and competing applications frequently interfere with agent perception and control. We introduce AgentHijack, a benchmark designed to evaluate the robustness of computer-use agents under common corruptions, where the uncertainties in dynamic environment disrupt the execution flow without direct adversarial intent. Specifically, AgentHijack introduces 9 configurable common corruptions to replicate realistic imperfect scenarios. We evaluate a variety of desktop tasks that utilize MLLM-based agents and discover that even minor instances of corruption can result in substantial performance degradation, which emphasizes the fragility of agents and underscores the necessity of robustness evaluation. Afterward, we propose AgentHijack-Agent, a framework that integrates an action generator with enhanced grounding capabilities and an onlooker responsible for behavior summarization and environment checking. Extensive experiments validate its effectiveness. Our code, environment, baseline models and data are publicly available at: https://AgentHijack.github.io.', 'score': 2, 'issue_id': 2333, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '5e54d23ceedbe08b', 'authors': ['Jingwei Sun', 'Jianing Zhu', 'Yuanyi Li', 'Tongliang Liu', 'Xia HU', 'Bo Han'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Sydney AI Centre, The University of Sydney', 'TMLR Group, Hong Kong Baptist University', 'The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.25707.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark', '#multimodal'], 'emoji': '🛡️', 'ru': {'title': 'Повышение устойчивости компьютерных агентов к реальным помехам', 'desc': 'В статье представлен бенчмарк AgentHijack для оценки устойчивости компьютерных агентов, основанных на мультимодальных больших языковых моделях, к распространённым помехам в реальных окружениях. Исследователи выявили, что даже небольшие искажения, такие как всплывающие окна и изменения разрешения экрана, приводят к значительному снижению производительности агентов. Для решения этой проблемы предложена框架 AgentHijack-Agent, которая использует улучшенное объектное обнаружение и механизм проверки окружения для повышения надёжности. Работа подчёркивает необходимость разработки более устойчивых агентов для практического применения в динамичных реальных условиях.'}, 'en': {'title': 'Enhancing Agent Robustness in Dynamic Environments', 'desc': 'This paper addresses the challenges faced by computer-use agents powered by multimodal large language models (MLLMs) in real-world environments. It introduces AgentHijack, a benchmark that evaluates the robustness of these agents against common disruptions like pop-ups and resolution changes. The study reveals that even minor disruptions can significantly degrade the performance of these agents, highlighting their fragility. To improve robustness, the authors propose the AgentHijack-Agent framework, which enhances action generation and environment monitoring capabilities.'}, 'zh': {'title': '提升计算机代理的鲁棒性', 'desc': '本论文探讨了多模态大型语言模型驱动的计算机使用代理在现实环境中面临的挑战，特别是动态干扰对其性能的影响。我们提出了AgentHijack，一个基准测试工具，用于评估计算机使用代理在常见干扰下的鲁棒性。研究发现，即使是轻微的干扰也会导致代理性能显著下降，突显了代理的脆弱性。为此，我们提出了AgentHijack-Agent框架，结合了增强的动作生成器和环境检查功能，以提高代理的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.26396', 'title': 'Advancing Creative Physical Intelligence in Large Multimodal Models', 'url': 'https://huggingface.co/papers/2605.26396', 'abstract': 'Abstract Large multimodal models struggle with creative problem-solving in visually complex environments, but performance improves when trained with affordance-grounded alignment that prioritizes visual evidence over hallucinations.  AI-generated summary Large multimodal models (LMMs) have rapidly advanced in perception and reasoning; however, it remains unclear whether these capabilities generalize to discovering visually grounded solutions in open-ended environments, beyond pattern recognition. In such settings, intelligence requires more than answering well-posed questions: it involves identifying how elements in a scene can be repurposed in non-obvious yet physically feasible ways. This form of creative problem-solving is central to human intelligence, but remains largely untested in current benchmarks. To evaluate this ability, we introduce MM-CreativityBench, a benchmark for affordance-grounded creative tool use in visually rich, physically constrained environments. Each instance presents a scenario image with structured views of candidate entities and their parts, enabling fine-grained, interactive evaluation of how models iteratively inspect the scene, identify relevant affordances, and compose visually and physically grounded solutions. Our experiments show that current LMMs often fall short, not due to lack of generative capability, but because they do not sustain grounded exploration. Models often overlook relevant entities, under-examine critical parts, or hallucinate attributes not grounded in the image. Motivated by this failure mode, we propose affordance-grounded alignment, which casts creative tool use as a preference learning problem. Using Direct Preference Optimization, we encourage models to prefer attribute-affordance reasoning grounded in visual evidence over hallucinated alternatives. In addition, we incorporate supervision derived from an affordance knowledge base to guide broader entity exploration and multi-turn planning. Our results show consistent gains in selecting the correct entities and parts, while substantially reducing hallucination and grounding-related errors.', 'score': 2, 'issue_id': 2330, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'ed836fb77cc56cc8', 'authors': ['Cheng Qian', 'Hyeonjeong Ha', 'Jiayu Liu', 'Jeonghwan Kim', 'Emre Can Acikgoz', 'Bingxuan Li', 'Kunlun Zhu', 'Jiateng Liu', 'Aditi Tiwari', 'Zhenhailong Wang', 'Xiusi Chen', 'Mahdi Namazifar', 'Heng Ji'], 'affiliations': ['Amazon', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.26396.jpg', 'data': {'categories': ['#alignment', '#training', '#multimodal', '#reasoning', '#benchmark', '#rlhf', '#hallucinations'], 'emoji': '🔧', 'ru': {'title': 'Творческое решение проблем через визуальную привязку к реальности', 'desc': 'В работе представлен новый бенчмарк MM-CreativityBench для оценки способности больших мультимодальных моделей решать творческие задачи в визуально сложных окружениях, где требуется находить нестандартные применения объектов. Исследование показывает, что современные LMM часто не справляются с такими задачами не из-за недостатка генеративных способностей, а из-за галлюцинаций и неспособности грамотно исследовать визцальную сцену. Авторы предлагают метод affordance-grounded alignment, который использует Direct Preference Optimization для обучения моделей предпочитать выводы, основанные на реальных визуальных данных, а не на галлюцинациях. Экспериментальные результаты демонстрируют значительное улучшение в выборе правильных объектов и снижение ошибок галлюцинаций при решении задач творческого переиспользования инструментов.'}, 'en': {'title': 'Enhancing Creative Problem-Solving in AI with Affordance-Grounded Alignment', 'desc': "This paper addresses the limitations of large multimodal models (LMMs) in creative problem-solving within complex visual environments. It introduces a new benchmark called MM-CreativityBench, designed to evaluate how well these models can identify and utilize affordances in scenes for innovative tool use. The authors propose a method called affordance-grounded alignment, which focuses on training models to prioritize visual evidence over incorrect or imagined attributes. Their findings indicate that this approach significantly improves the models' ability to select relevant entities and parts while minimizing errors related to hallucination and grounding."}, 'zh': {'title': '提升多模态模型的创造性问题解决能力', 'desc': '大型多模态模型在复杂视觉环境中的创造性问题解决能力较弱，但通过以可用性为基础的对齐训练，优先考虑视觉证据而非虚构内容，可以提高其性能。我们提出了MM-CreativityBench，这是一个用于评估在视觉丰富、物理受限环境中进行创造性工具使用的基准。实验表明，当前的多模态模型常常未能进行有效的基础探索，导致忽视相关实体或错误生成不符合图像的属性。为此，我们提出了以可用性为基础的对齐方法，鼓励模型优先考虑基于视觉证据的属性-可用性推理，从而提高选择正确实体和部件的能力。'}}}, {'id': 'https://huggingface.co/papers/2605.28257', 'title': 'Category-Level 3D Correspondence in Camera Space via Morphable Object Priors', 'url': 'https://huggingface.co/papers/2605.28257', 'abstract': 'Abstract Category-level 3D correspondence is learned from single images through a shared morphable object prior, enabling semantic 3D object understanding without explicit correspondence supervision.  AI-generated summary Understanding 3D objects from images is fundamental to robotics and AR/VR applications. While recent work has made progress in category-level pose estimation, current representations fail to capture the fine-grained semantics needed for reasoning about object parts, functions, and interactions. In this work, we study category-level 3D correspondence in camera space -- predicting, from a single image, 3D locations that remain consistent across instances within a category -- and show that it can emerge without explicit correspondence supervision by learning a shared morphable object prior. To enable research in this direction, we introduce HouseCorr3D, the first large-scale benchmark for monocular category-level 3D correspondence with 178k images across 50 household object categories, 280 unique instances, and 3D keypoint annotations directly on CAD models. Crucially, HouseCorr3D provides amodal correspondence labels for occluded regions and explicit symmetry annotations, addressing key limitations of existing datasets. We further propose Morpheus, a method that learns morphable category-level shape priors by disentangling canonical shape, deformation, and object pose. Through this shared canonical grounding, semantically meaningful 3D correspondences in camera space emerge implicitly. These emerging 3D correspondences set a new state of the art on HouseCorr3D, demonstrating that semantic 3D object understanding can arise without direct correspondence supervision. Data and code are publicly available at https://github.com/GenIntel/HouseCorr3D.', 'score': 1, 'issue_id': 2333, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '65b2eb9d4a4845ff', 'authors': ['Leonhard Sommer', 'Artur Jesslen', 'Basavaraj Sunagad', 'Adam Kortylewski'], 'affiliations': ['CISPA Helmholtz Center for Information Security, Germany', 'University of Freiburg, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2605.28257.jpg', 'data': {'categories': ['#cv', '#dataset', '#robotics', '#3d', '#open_source', '#benchmark'], 'emoji': '🏠', 'ru': {'title': 'Самоучащаяся трёхмерная соответствие объектов через морфируемые приоры', 'desc': 'Работа посвящена изучению категоричной трёхмерной соответствия на уровне категорий объектов, которая предсказывает согласованные трёхмерные координаты в пространстве камеры по одному изображению. Авторы предлагают метод Morpheus, который обучается находить морфируемые приоры формы категорий, разделяя каноническую форму, деформацию и позу объекта. Авторы представляют новый большой датасет HouseCorr3D с 178k изображениями бытовых объектов, включающий аннотации скрытых областей и симметрии. Семантически осмысленная трёхмерная соответствия возникают автоматически через общее каноническое основание, что позволяет понимать 3D объекты без явного обучения на парах соответствия.'}, 'en': {'title': 'Implicit 3D Understanding from Single Images', 'desc': 'This paper presents a method for understanding 3D objects from single images using a shared morphable object prior, which allows for category-level 3D correspondence without needing explicit supervision. The authors introduce HouseCorr3D, a large-scale benchmark dataset that includes 178,000 images of household objects, complete with 3D keypoint annotations and amodal correspondence labels for occluded areas. They propose a new approach called Morpheus, which learns morphable shape priors by separating the canonical shape, deformation, and pose of objects. The results show that meaningful 3D correspondences can be learned implicitly, achieving state-of-the-art performance on the HouseCorr3D dataset.'}, 'zh': {'title': '无监督的语义3D物体理解', 'desc': '本研究提出了一种从单幅图像中学习类别级3D对应的方法，利用共享的可变形物体先验，实现了语义3D物体理解，而无需显式的对应监督。我们引入了HouseCorr3D，这是首个大规模的单目类别级3D对应基准，包含178,000张图像和50个家庭物体类别。通过学习可变形的类别级形状先验，我们的方法Morpheus能够在相机空间中隐式地生成语义上有意义的3D对应。实验结果表明，语义3D物体理解可以在没有直接对应监督的情况下实现，推动了该领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.28510', 'title': 'Efficient and Scalable Provenance Tracking for LLM-Generated Code Snippets', 'url': 'https://huggingface.co/papers/2605.28510', 'abstract': 'Abstract A hybrid approach combining vector search and fingerprinting enables scalable and precise tracking of code provenance generated by large language models.  AI-generated summary Large language models (LLMs) for code completion and generation are increasingly used in software development, yet they may reproduce training examples verbatim and without authorship attribution, raising legal and ethical concerns around plagiarism and license compliance. Classical fingerprint-based plagiarism detectors based on fingerprinting, such as Winnowing, remain highly effective, yet the inspection requires comparing fragments of code to the entire training set, and their linear-time search makes them impractical for the billion-scale corpora used to train modern code LLMs. To bridge this gap, we introduce SOURCETRACKER, a 300M-parameter encoder tailored for code retrieval, together with a hybrid two-stage provenance-tracking pipeline HYBRIDSOURCETRACKER (HST). HST first narrows down a small set of candidate snippets via vector search, then re-ranks those candidates using Winnowing on exact fingerprints. We train and evaluate our system on a 10M-snippet subset of the THESTACKV2 dataset, with both verbatim and adapted snippets that emulate realistic identifier renaming. On an in vitro 100k-snippet search space with adapted queries, our hybrid approach reaches a mean reciprocal rank on par with Winnowing for 30-token fragments. Then, starting from windows >= 60 tokens, it consistently over-performs by up to 5.4% while preserving logarithmic-time query complexity. In a complementary evaluation using an LLM-based judge, we find that many retrieved snippets not labeled as ground truth are still highly similar to the expected sources, particularly with longer context windows, and thus remain useful for end users. Overall, our results demonstrate that integrating vector search with fingerprinting enables scalable, high-precision provenance tracking for code produced by LLMs.', 'score': 1, 'issue_id': 2332, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'f6e4b0fc0ee8aa88', 'authors': ['Andrea Gurioli', "Davide D'Ascenzo", 'Federico Pennino', 'Maurizio Gabbrielli', 'Stefano Zacchiroli'], 'affiliations': ['Department of Control and Computer Engineering, Politecnico di Torino, Turin, Italy', 'Dipartimento di Informatica - Scienza Ingegneria, Università di Bologna, Bologna, Italy', 'Telecom Paris, Institut Polytechnique de Paris, Palaiseau, France'], 'pdf_title_img': 'assets/pdf/title_img/2605.28510.jpg', 'data': {'categories': ['#plp', '#inference', '#open_source', '#leakage', '#architecture', '#benchmark', '#dataset', '#security'], 'emoji': '🔍', 'ru': {'title': 'Гибридный поиск: векторы и отпечатки для быстрого отслеживания происхождения кода', 'desc': 'Работа представляет SOURCETRACKER — гибридную систему для отслеживания происхождения кода, сгенерированного большими языковыми моделями. Система комбинирует векторный поиск с использованием 300M-параметрического энкодера и классический алгоритм Winnowing для работы с отпечатками кода, что позволяет достичь масштабируемости при работе с миллиардами примеров в обучающих данных. Двухэтапный конвейер сначала сужает множество кандидатов через векторный поиск, затем переранжирует их с использованием точных отпечатков, обеспечивая логарифмическую сложность запроса. Экспериментальная оценка на наборе данных THESTACKV2 показывает, что гибридный подход превосходит чистый Winnowing на 5.4% для фрагментов длиной 60+ токенов, сохраняя высокую точность поиска при обнаружении плагиата и нарушений лицензий в коде, сгенерированном LLM.'}, 'en': {'title': 'Hybrid Tracking for AI-Generated Code: Precision Meets Scalability', 'desc': 'This paper presents SOURCETRACKER, a novel system designed to track the origin of code generated by large language models (LLMs). It combines vector search techniques with traditional fingerprinting methods to efficiently identify code snippets and their sources. The hybrid approach first uses vector search to filter potential matches, then applies fingerprinting for precise re-ranking, making it suitable for large datasets. The results show that this method not only maintains high accuracy but also improves search efficiency, addressing concerns about plagiarism and authorship in AI-generated code.'}, 'zh': {'title': '混合方法实现代码来源精确跟踪', 'desc': '本论文提出了一种混合方法，结合了向量搜索和指纹识别技术，以实现对大型语言模型生成的代码来源的可扩展和精确跟踪。随着大型语言模型在软件开发中的广泛应用，代码抄袭和版权合规性问题日益突出。我们介绍了SOURCETRACKER，一个专为代码检索设计的300M参数编码器，以及一个两阶段的来源跟踪管道HYBRIDSOURCETRACKER（HST）。实验结果表明，该方法在处理大规模代码片段时，能够有效提高检索精度，同时保持较低的查询复杂度。'}}}, {'id': 'https://huggingface.co/papers/2605.27824', 'title': 'Revealing Algorithmic Deductive Circuits for Logical Reasoning', 'url': 'https://huggingface.co/papers/2605.27824', 'abstract': 'Abstract Large language models use specialized attention heads for retrieving factual information and integrating multi-step reasoning, with distinct neural mechanisms for local reasoning steps versus global strategy coordination.  AI-generated summary Recent studies have shown that Large Language Models (LLMs) can achieve strong reasoning performance by incorporating functional symbolic representations that abstractly describe graph traversal algorithms and step-by-step reasoning in few-shot learning settings. However, it remains unclear how LLMs genuinely understand the abstract meaning of each reasoning step and the overall algorithm from only a limited number of demonstrations. This work aims to localize the attention heads responsible for individual reasoning steps and characterize the types of information transferred among them. We first align constituent reasoning steps with their corresponding token logits under a symbolic-aided Chain-of-Thought (CoT) prompting framework. Our analysis shows that token positions that steer the reasoning process are associated with low confidence scores caused by constraints on satisfying reasoning behavior patterns in demonstrations. We then adopt causal mediation analysis techniques to identify the attention heads responsible for these patterns. In addition, our findings indicate that LLMs retrieve factual and rule-based information for individual sub-reasoning tasks through specialized attention heads (approximately 3% total heads), whereas higher layers predominantly facilitate information integration and the emergence of global reasoning strategies (e.g., graph traversal algorithms) that coordinate multiple intermediate reasoning steps to solve the overall task.', 'score': 1, 'issue_id': 2331, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'ef30e088c338cc49', 'authors': ['Phuong Minh Nguyen', 'Tien Huu Dang', 'Naoya Inoue'], 'affiliations': ['Japan Advanced Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.27824.jpg', 'data': {'categories': ['#reasoning', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Специализированные внимание-головки LLM для многошагового рассуждения', 'desc': 'В этой работе исследуется, как большие языковые модели решают задачи многошагового рассуждения, используя специализированные attention-heads. Авторы показали, что около 3% головок внимания отвечают за извлечение фактической информации и правил для отдельных этапов рассуждения, в то время как более высокие слои координируют интеграцию информации и глобальные стратегии. Для локализации ответственных механизмов использовались методы причинного анализа медиации в сочетании с символическим Chain-of-Thought prompting. Результаты показывают, что токены, управляющие процессом рассуждения, связаны с низкими оценками уверенности из-за ограничений на соответствие демонстрациям.'}, 'en': {'title': 'Unlocking Reasoning in Large Language Models through Attention Mechanisms', 'desc': 'This paper investigates how Large Language Models (LLMs) utilize attention heads to perform reasoning tasks. It identifies specific attention heads that are responsible for local reasoning steps and those that integrate information for global strategies. The study employs a symbolic-aided Chain-of-Thought prompting framework to analyze how LLMs process reasoning steps and their associated token logits. Findings reveal that while a small percentage of attention heads focus on factual retrieval for sub-tasks, higher layers are crucial for coordinating complex reasoning processes.'}, 'zh': {'title': '揭示大型语言模型的推理机制', 'desc': '大型语言模型（LLMs）使用专门的注意力头来检索事实信息并整合多步骤推理，具有局部推理步骤与全局策略协调的不同神经机制。研究表明，LLMs通过功能性符号表示来实现强大的推理性能，这些表示抽象地描述了图遍历算法和逐步推理。本文旨在定位负责各个推理步骤的注意力头，并分析它们之间传递的信息类型。我们的分析显示，推动推理过程的标记位置与低置信度分数相关，这些分数是由于在演示中满足推理行为模式的限制所导致的。'}}}, {'id': 'https://huggingface.co/papers/2605.27044', 'title': 'BatteryMFormer: Multi-level Learning for Battery Degradation Trajectory Forecasting', 'url': 'https://huggingface.co/papers/2605.27044', 'abstract': 'Abstract BatteryMFormer uses a multi-level Transformer architecture with aging-condition-aware decoding, meta degradation pattern memory, and dual-view encoding to predict battery degradation trajectories from early operational data.  AI-generated summary Early battery degradation trajectory forecasting (BDTF), which predicts the full-life state-of-health trajectory from early operational data, is critical for battery optimization, manufacturing, and deployment. Battery degradation data exhibit two key characteristics. First, degradation data present a multi-level structure, including regularities shared within aging conditions and trajectory patterns shared across batteries. Second, degradation-related variations in voltage-current profiles are often localized to specific state-of-charge (SOC) intervals. Existing approaches often fail to explicitly model these characteristics. To bridge this gap, we propose BatteryMFormer, a multi-level Transformer for early BDTF. BatteryMFormer integrates (1) an aging-condition-aware decoder that injects aging-condition priors via aging-condition-informed queries and aging-condition-aware attention, (2) a meta degradation pattern memory that learns and retrieves trajectory prototypes to guide long-horizon forecasting, and (3) a dual-view encoder that jointly captures temporal dynamics and SOC-localized variations from voltage and current time series. Extensive experiments on four battery domains show that BatteryMFormer consistently outperforms state-of-the-art baselines, marking a significant step toward reliable BDTF. Our code is available at https://github.com/Ruifeng-Tan/BatteryMFormer.', 'score': 1, 'issue_id': 2333, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '1d2d514af5e414b2', 'authors': ['Ruifeng Tan', 'Jintao Dong', 'Weixiang Hong', 'Jia Li', 'Jiaqiang Huang', 'Tong-Yi Zhang'], 'affiliations': ['Central South University', 'Shanghai University', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.27044.jpg', 'data': {'categories': [], 'emoji': '🔋', 'ru': {'title': 'Трансформер для прогнозирования деградации батарей из ранних эксплуатационных данных', 'desc': 'BatteryMFormer — это многоуровневая архитектура на основе Transformer для прогнозирования деградации аккумуляторов на ранних стадиях эксплуатации. Модель использует три ключевых компонента: декодер, осведомлённый об условиях старения, который внедряет априорные знания через специальные запросы; память метаделей с градации, которая изучает и извлекает прототипы траекторий для долгосрочного прогнозирования; и двойной энкодер, одновременно захватывающий временную динамику и локализованные вариации в интервалах состояния заряда. Экспериментальная валидация на четырёх батарейных доменах показывает, что предложенный метод последовательно превосходит существующие подходы и обеспечивает надёжное прогнозирование полной траектории деградации с ранних данных эксплуатации.'}, 'en': {'title': 'Revolutionizing Battery Degradation Forecasting with BatteryMFormer', 'desc': 'BatteryMFormer is a novel multi-level Transformer model designed to predict battery degradation trajectories from early operational data. It effectively captures the multi-level structure of degradation data by utilizing an aging-condition-aware decoder and a dual-view encoder that focuses on both temporal dynamics and specific state-of-charge variations. Additionally, it incorporates a meta degradation pattern memory to enhance long-term forecasting by learning from trajectory prototypes. The model demonstrates superior performance compared to existing methods, making it a significant advancement in early battery degradation trajectory forecasting.'}, 'zh': {'title': '电池退化预测的新突破', 'desc': 'BatteryMFormer是一种多层次的Transformer架构，旨在从早期操作数据中预测电池的退化轨迹。该模型通过老化条件感知解码器、元退化模式记忆和双视图编码来捕捉电池退化的复杂特征。它能够有效地建模电池退化数据的多层次结构和电压-电流特征的局部变化。实验结果表明，BatteryMFormer在多个电池领域的表现优于现有的最先进方法，推动了电池退化轨迹预测的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.17531', 'title': "Don't Guess, Just Ask: Resolving Ambiguity in Referring Segmentation via Multi-turn Clarification", 'url': 'https://huggingface.co/papers/2605.17531', 'abstract': 'Abstract IC-Seg is an agentic framework that clarifies user intent through multi-turn conversations before segmentation, using a hierarchical optimization strategy to improve ambiguous query resolution in referring video object segmentation.  AI-generated summary Referring segmentation aims to segment the target objects in images or videos based on the textual query. Despite remarkable progress over the past years, existing works always assume that the user-provided queries are already precise and clear. However, this assumption is impractical. In real-world scenarios, it is unrealistic to expect all users to thoroughly review their visual content and carefully ensure their queries are unique and unambiguous. When encountering such cases, existing segmentation models tend to arbitrarily guess the user preferences, often resulting in undesired outcomes. To address this limitation, we propose IC-Seg, a novel agentic framework that proactively clarifies user intent through multi-turn conversation before segmentation. To effectively incentivize this capability, we further introduce Hi-GRPO, a new hierarchical optimization strategy that injects dense and informative supervision signals at the trajectory, turn, and step levels. This strategy encourages efficient intent clarification, effectively eliminating redundant interactions and improving overall dialogue quality. For evaluation, we establish Ambi-RVOS, a referring video object segmentation benchmark with ambiguous user queries. Extensive experiments demonstrate that IC-Seg not only outperforms existing methods by a large margin in resolving ambiguous queries, but also maintains state-of-the-art performance on standard reasoning segmentation benchmarks. Code and data will be released at https://github.com/iSEE-Laboratory/IC-Seg.', 'score': 1, 'issue_id': 2333, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '443a667f7a54ef86', 'authors': ['Yuting Yang', 'Haichao Jiang', 'Tianming Liang', 'Quan Zhang', 'Jian-Fang Hu'], 'affiliations': ['Guangdong Province Key Laboratory of Information Security Technology, China', 'Key Laboratory of Machine Intelligence and Advanced Computing, Ministry of Education, China', 'School of Computer Science and Engineering, Sun Yat-sen University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.17531.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#optimization', '#reasoning', '#training', '#agents', '#video', '#open_source', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Уточнение намерений пользователя через диалог для точной сегментации видео', 'desc': 'IC-Seg представляет агентный фреймворк для сегментации видео объектов, который использует многоходовый диалог для уточнения намерений пользователя перед выполнением сегментации. Авторы предлагают иерархическую стратегию оптимизации Hi-GRPO, которая применяет плотные сигналы обратной связи на уровнях траектории, хода и шага для повышения качества взаимодействия. Для оценки была создана новая benchmark Ambi-RVOS с неоднозначными пользовательскими запросами к видеообъектам. Экспериментальные результаты показывают, что IC-Seg значительно превосходит существующие методы в разрешении неоднозначных запросов, сохраняя при этом современные результаты на стандартных бенчмарках.'}, 'en': {'title': 'Clarifying User Intent for Better Video Segmentation', 'desc': 'IC-Seg is a new framework designed to improve video object segmentation by first clarifying user intent through multi-turn conversations. It addresses the common issue where user queries are often ambiguous, leading to poor segmentation results. The framework employs a hierarchical optimization strategy called Hi-GRPO, which provides detailed supervision at various levels to enhance the dialogue quality and reduce unnecessary interactions. By establishing a benchmark for ambiguous queries, IC-Seg shows significant improvements over existing methods while also achieving top performance on standard segmentation tasks.'}, 'zh': {'title': '通过对话澄清意图，提升视频分割精度', 'desc': 'IC-Seg是一个新颖的框架，通过多轮对话来澄清用户意图，从而在进行视频对象分割之前解决模糊查询的问题。该框架采用层次优化策略，能够有效地引导用户明确他们的需求，减少不必要的互动。通过引入Hi-GRPO策略，IC-Seg在不同层次上提供了丰富的监督信号，提升了对话的质量。实验结果表明，IC-Seg在处理模糊查询时显著优于现有方法，并在标准分割基准上保持了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.28034', 'title': 'Clark Hash: Stateless Sparse Johnson-Lindenstrauss Quantization for Neural Embeddings', 'url': 'https://huggingface.co/papers/2605.28034', 'abstract': 'Abstract Clark Hash is a compact, stateless codec that reduces neural embedding storage size by 32x through deterministic sparse projections and scalar quantization while maintaining high similarity accuracy.  AI-generated summary Clark Hash is a small method for storing neural embeddings in less space. It normalizes each database vector, applies a deterministic sparse signed Johnson-Lindenstrauss projection, clips the result, and stores a fixed-width scalar-quantized code. Queries stay in floating point and are scored against the stored sketches. In the default 384-dimensional sentence-embedding setting, Clark Hash stores a cosine-search vector in 48 bytes instead of 1536 bytes for dense f32 storage. This is 32x smaller. The method does not need a training pass, learned codebooks, rotations, or corpus statistics before new vectors can be stored. We describe the codec, the Rust implementation, and a multilingual sentence-similarity evaluation on 9,304 labeled pairs from 29 subsets. With a multilingual MiniLM encoder, the 48-byte sketches reached 0.910 and 0.946 macro Pearson correlation with dense cosine scores on STS17 and STS22. Clark Hash is not a new Johnson-Lindenstrauss theorem and it is not a replacement for approximate nearest-neighbor indexes. It is a simple stateless codec for compact embedding storage.', 'score': 0, 'issue_id': 2331, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '674e99d2bf2817ee', 'authors': ['Stanislav Kirdey', 'Clark Labs Inc'], 'affiliations': ['Clark Labs Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.28034.jpg', 'data': {'categories': [], 'emoji': '📦', 'ru': {'title': 'Статический кодек для 32-кратного сжатия эмбеддингов без обучения', 'desc': 'Clark Hash — это компактный кодек для сжатия нейронных эмбеддингов, который использует детерминированные разреженные проекции и скалярное квантование для уменьшения размера хранилища в 32 раза. Метод работает без предварительного обучения, не требует обучаемых кодовых книг или статистики корпуса, применяя нормализацию, Johnson-Lindenstrauss проекцию и клипирование к векторам. Запросы остаются в формате float32 и сравниваются с хранимыми скетчами, достигая высокой корреляции с оригинальными косинусными расстояниями. На примере 384-мерных sentence-эмбеддингов метод сокращает размер с 1536 байт до 48 байт при сохранении качества поиска семантической похожести текстов.'}, 'en': {'title': 'Compact Neural Embedding Storage Made Simple', 'desc': 'Clark Hash is a novel codec designed to significantly reduce the storage size of neural embeddings by 32 times while preserving high accuracy in similarity measurements. It achieves this by normalizing vectors, applying a deterministic sparse projection, and using scalar quantization to create compact representations. The method allows for efficient querying without the need for training or complex preprocessing, making it versatile for various applications. In tests, the codec demonstrated impressive performance in multilingual sentence similarity tasks, achieving high correlation with traditional dense storage methods.'}, 'zh': {'title': 'Clark Hash：高效存储神经嵌入的解决方案', 'desc': 'Clark Hash是一种紧凑的无状态编解码器，通过确定性稀疏投影和标量量化，将神经嵌入的存储大小减少了32倍，同时保持高相似度准确性。该方法对每个数据库向量进行归一化，应用确定性稀疏的约翰逊-林登施特劳斯投影，裁剪结果并存储固定宽度的标量量化代码。默认情况下，在384维句子嵌入设置中，Clark Hash将余弦搜索向量的存储大小从1536字节减少到48字节。该方法不需要训练过程、学习的代码本、旋转或语料库统计信息即可存储新向量。'}}}, {'id': 'https://huggingface.co/papers/2605.27766', 'title': "Got a Secret? LLM Agents Can't Keep It: Evaluating Privacy in Multi-Agent Systems", 'url': 'https://huggingface.co/papers/2605.27766', 'abstract': 'Abstract LLM safety evaluations conducted in isolated settings underestimate risks in agentic deployments, as demonstrated by increased privacy violations in social interaction simulations.  AI-generated summary LLM safety evaluations predominantly test models in isolation, yet deployed AI agents increasingly operate within persistent social environments alongside other agents. We introduce a Moltbook-style simulation platform where thousands of LLM agents interact across communities over a simulated month, and use it to evaluate privacy as a downstream safety concern under varying degrees of social pressure. We find that shifting from single turn to multi turn social evaluation amplifies privacy violations (CIMemories 19.95% to Ours 45.30% across OpenAI models), that leakage is socially contagious, with agents 8 times more likely to disclose sensitive information after observing a peer do so, and that explicit privacy instructions reduce but do not eliminate this effect, leaving leakage rates above 37.8% even with safeguards. Our findings suggest that static chat based safety benchmarks systematically underestimate risks in agentic deployment, and that social context alone is sufficient to elicit sensitive disclosures that single turn evaluations would never surface.', 'score': 0, 'issue_id': 2334, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '984a60ddbfeead77', 'authors': ['Aman Priyanshu', 'Supriti Vijay', 'Esha Pahwa'], 'affiliations': ['Corvic AI USA', 'Foundation AI USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.27766.jpg', 'data': {'categories': ['#leakage', '#ethics', '#security', '#benchmark', '#agents'], 'emoji': '🕵️', 'ru': {'title': 'Социальное давление раскрывает скрытые риски безопасности LLM', 'desc': 'В статье показано, что традиционные методы оценки безопасности большых языковых моделей (LLM), которые тестируют модели в изоляции, недооценивают реальные риски при развертывании агентов в социальной среде. Исследователи создали платформу для симуляции, где тысячи LLM-агентов взаимодействуют в сообществах на протяжении смоделированного месяца, и оценили проблемы приватности под влиянием социального давления. Результаты показали, что переход от одиночных диалогов к многооборотным социальным взаимодействиям увеличивает утечки приватных данных с 19,95% до 45,30%, а раскрытие информации становится «социально заразным» - агенты в 8 раз чаще раскрывают чувствительные данные после наблюдения подобного поведения у других. Даже явные инструкции по защите приватности не полностью решают проблему, оставляя уровень утечек выше 37,8%.'}, 'en': {'title': 'Understanding AI Privacy Risks in Social Interactions', 'desc': 'This paper highlights the limitations of current safety evaluations for large language models (LLMs) when they are tested in isolation, as these evaluations fail to account for the complexities of real-world social interactions. The authors introduce a new simulation platform that allows thousands of LLM agents to interact in a community setting over a simulated month, revealing significant privacy violations that occur in multi-turn conversations. Their findings indicate that privacy breaches are not only more frequent in social contexts but also contagious, as agents are more likely to disclose sensitive information after witnessing others do so. The study concludes that traditional safety benchmarks underestimate the risks associated with deploying AI agents in social environments, emphasizing the need for more comprehensive evaluation methods.'}, 'zh': {'title': '社交环境中的AI隐私风险评估', 'desc': '本研究探讨了在社交环境中部署的人工智能（AI）代理的隐私风险。我们开发了一个模拟平台，让成千上万的语言模型（LLM）代理在社区中互动，以评估在不同社交压力下的隐私问题。研究发现，从单轮对话转向多轮社交评估会显著增加隐私泄露的发生率，且这种泄露具有社交传染性。即使在有隐私保护指令的情况下，泄露率仍然高于37.8%，这表明传统的安全评估方法低估了在实际应用中可能面临的风险。'}}}, {'id': 'https://huggingface.co/papers/2605.27762', 'title': 'PEAM: Parametric Embodied Agent Memory through Contrastive Internalization of Experience in Minecraft', 'url': 'https://huggingface.co/papers/2605.27762', 'abstract': 'Abstract PEAM combines a deliberative LLM with a fast parametric module using Mixture-of-Experts LoRA architecture to enable continual learning without forgetting through failure-correction signals and self-triggered consolidation.  AI-generated summary We present PEAM, a Parametric Embodied Agent Memory framework in Minecraft that transforms agent memory from inference-time retrieval into parameter-resident skills internalized through experience. PEAM pairs a slow deliberative LLM for open-ended reasoning with a fast parametric module for reflexive execution of consolidated skills. The fast module is a multimodal Mixture-of-Experts LoRA architecture with per-category physically isolated adapters, enabling parameter-level continual learning without catastrophic forgetting. We treat failure as a first-class training signal: failure--correction trajectory pairs are internalized through a joint behavioral-cloning and contrastive objective, so the agent learns not only what succeeds but also how corrected actions differ from failed ones. To govern consolidation, PEAM introduces a parameterization-worthiness score for deciding which experience should be internalized, and a scale-free self-triggered consolidation mechanism for deciding when to internalize without task-specific hand-tuned thresholds, making the agent self-evolving as the trigger transfers across task distributions without re-tuning. Experiments in Minecraft show that PEAM improves long-horizon task performance, mitigates forgetting on previously consolidated skills, and improves parametric-versus-retrieval efficiency over retrieval-based embodied agents and parametric memory variants.', 'score': 0, 'issue_id': 2330, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e66b12f573c7b9f0', 'authors': ['Yuchen Guo', 'Junli Gong', 'Hongmin Cai', 'Yiu-ming Cheung', 'Weifeng Su'], 'affiliations': ['Beijing Normal - Hong Kong Baptist University', 'Hong Kong Baptist University', 'Northeastern University', 'Northwestern University', 'South China University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.27762.jpg', 'data': {'categories': ['#agents', '#architecture', '#training', '#multimodal', '#robotics'], 'emoji': '🧠', 'ru': {'title': 'Непрерывное обучение через параметрическую память и исправление ошибок', 'desc': 'В работе предлагается PEAM — фреймворк памяти воплощённого агента, который объединяет медленную рассуждающую LLM с быстрым параметрическим модулем на основе архитектуры Mixture-of-Experts LoRA. Система интернализирует навыки в параметры через опыт, используя сигналы об ошибках и их исправлении как основной источник обучения. Благодаря физически изолированным адаптерам для каждой категории, модель может непрерывно обучаться без катастрофического забывания раньше усвоенных навыков. Механизм самостоятельной консолидации определяет, какой опыт и когда следует интернализировать, позволяя агенту эволюционировать без ручной настройки гиперпараметров.'}, 'en': {'title': 'Empowering Agents with Self-Evolving Memory in Minecraft', 'desc': 'PEAM is a framework that enhances agent memory in Minecraft by integrating a deliberative large language model (LLM) with a fast parametric module. This combination allows the agent to learn from experiences and internalize skills, rather than just retrieving them during inference. The framework employs a Mixture-of-Experts LoRA architecture, which supports continual learning while preventing catastrophic forgetting through failure-correction signals. Additionally, PEAM introduces a self-triggered consolidation mechanism that autonomously decides when to internalize experiences, making the agent adaptable across various tasks without needing manual adjustments.'}, 'zh': {'title': 'PEAM：持续学习与记忆内化的智能代理', 'desc': 'PEAM是一种参数化的具身代理记忆框架，旨在通过经验将代理的记忆从推理时的检索转变为内化的技能。它结合了一个慢速的深思熟虑的语言模型（LLM）和一个快速的参数模块，以实现持续学习而不遗忘。该框架采用混合专家LoRA架构，允许在参数级别进行持续学习，并通过失败修正信号来优化学习过程。实验表明，PEAM在Minecraft中的长时间任务表现上有所提升，并有效减轻了对先前内化技能的遗忘。'}}}, {'id': 'https://huggingface.co/papers/2605.25940', 'title': 'How Accurate are Video Quality Models for Diffusion-Based Video Super-Resolution?', 'url': 'https://huggingface.co/papers/2605.25940', 'abstract': 'Abstract Video quality assessment models show limited effectiveness in evaluating diffusion-based super-resolution methods, with CNN-based full-reference models performing better but still insufficient for replacing subjective testing.  AI-generated summary Recent video super-resolution (VSR) approaches use deep neural networks to enhance low-quality input videos and recover visual detail, with diffusion-based methods in particular showing promising results. In this paper, we investigate whether existing video quality models can be used to assess the performance of these diffusion-based VSR methods, by comparing model predictions with results from a subjective test. The study compares six upscaling methods (Lanczos, Rhea, SCST, DOVE, SeedVR2, Starlight Mini) applied to both compressed (AV1 and DCVC-RT) and uncompressed low-resolution videos considering the play-out on a UHD-1/4K screen. A range of full- and no-reference quality models are used to assess their applicability to this new type of quality degradation, focusing on within-sequence performance. The results highlight that CNN-based full-reference models, such as LPIPS, DISTS, and CVQA-FR show significantly higher correlation coefficients than both conventional full- as well as the tested no-reference models. Most overestimate the overly sharp results of SCST, with VMAF mainly failing due to spatial inconsistencies introduced by Starlight Mini. None of the tested video quality models reach sufficient accuracy so as to replace complementary subjective testing. The reference, degraded and upscaled videos, as well as the user ratings and model scores are made available with the paper at https://github.com/Telecommunication-Telemedia-Assessment/AVT-VQDB-UHD-1-VSR as open data.', 'score': 0, 'issue_id': 2333, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'f08c2276e0abb2b6', 'authors': ['Benjamin Herb', 'Steve Göring', 'Alexander Raake', 'Rakesh Rao Ramachandra Rao'], 'affiliations': ['Audiovisual Technology Group, Technische Universität Ilmenau, Germany', 'Institute for Communications Engineering, RWTH Aachen University, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2605.25940.jpg', 'data': {'categories': ['#dataset', '#diffusion', '#video', '#open_source', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'CNN-модели лучше всех, но видео качество всё равно нужно проверять людям', 'desc': 'В статье исследуется эффективность существующих моделей оценки качества видео при анализе методов супер-разрешения на основе диффузионных моделей. Авторы сравнивают предсказания шести различных алгоритмов увеличения разрешения с результатами субъективного тестирования на видео с компрессией и без неё. Результаты показывают, что модели на базе свёрточных нейронных сетей (CNN), такие как LPIPS и DISTS, дают значительно более высокую корреляцию с человеческими оценками, чем традиционные метрики и модели без эталона. Однако ни одна из протестированных моделей не достигает достаточной точности для полной замены субъективного тестирования качества видео.'}, 'en': {'title': 'Evaluating Video Quality: Bridging the Gap Between AI and Human Perception', 'desc': 'This paper examines the effectiveness of existing video quality assessment models in evaluating diffusion-based video super-resolution (VSR) methods. It compares the performance of six different upscaling techniques on both compressed and uncompressed low-resolution videos. The study finds that while CNN-based full-reference models like LPIPS and DISTS perform better than traditional models, they still do not achieve the accuracy needed to replace subjective testing. The results indicate that current models often misjudge the quality of upscaled videos, particularly in cases of sharpness and spatial inconsistencies.'}, 'zh': {'title': '视频质量评估的新挑战与机遇', 'desc': '本论文研究了现有的视频质量评估模型在评估基于扩散的视频超分辨率方法中的有效性。尽管基于卷积神经网络（CNN）的全参考模型表现较好，但仍无法完全替代主观测试。我们比较了六种不同的放大方法在压缩和未压缩低分辨率视频上的表现，并分析了这些方法在超高清屏幕上的播放效果。结果表明，CNN全参考模型的相关性显著高于传统模型，但没有一个模型能够达到足够的准确性以替代主观测试。'}}}, {'id': 'https://huggingface.co/papers/2605.25174', 'title': 'Growing a Neural Network in Breadth, Depth, and Time', 'url': 'https://huggingface.co/papers/2605.25174', 'abstract': 'Abstract Resource-constrained recurrent convolutional networks optimize computational graphs across breadth, depth, and time dimensions to achieve task accuracy, with emergent behaviors correlating to human reaction times.  AI-generated summary Spatial and temporal resource constraints are critical for both biological and artificial intelligent systems. Here we define differentiable cost terms for breadth, depth, and time within a recurrent convolutional neural network conceived as a finite subset of an infinite lattice. We optimize these costs jointly with task errors via backpropagation. We set different pressures on breadth, depth, and time, which leads to diverse computational graphs emerging organically through training. We find that all three resources can be traded off against each other to achieve a given level of accuracy. Networks grow in all three dimensions with task complexity and spontaneously take more recurrent steps when inputs are occluded. Surprisingly, time used by the model correlates with human reaction times in an object recognition task. Our framework provides a normative account of how resource constraints shape neural architectures, connecting to questions about brain design in neuroscience, and may help illuminate the diversity of neural solutions found in nature.', 'score': 0, 'issue_id': 2333, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '4bd60ead17cbd574', 'authors': ['Eivinas Butkus', 'Kedar Garzón Gupta', 'Nikolaus Kriegeskorte'], 'affiliations': ['Columbia University', 'NSF AI Institute for Artificial and Natural Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2605.25174.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Оптимизация нейросетей под ресурсные ограничения раскрывает принципы проектирования мозга', 'desc': 'В этой работе авторы изучают, как ограничения ресурсов влияют на архитектуру рекуррентных сверточных нейронных сетей. Они вводят дифференцируемые штрафные функции для трёх измерений: ширины сети, её глубины и количества временных шагов, оптимизируя их совместно с ошибкой задачи через обратное распространение ошибки. Исследование показывает, что эти три ресурса можно эффективно компромиссить друг с другом, а сети органически увеличиваются во всех измерениях при возрастании сложности задачи. Примечательно, что время вычисления модели коррелирует с человеческим временем реакции при распознавании объектов, что связывает искусственные системы с принципами проектирования мозга.'}, 'en': {'title': 'Optimizing Neural Networks: Balancing Resources for Human-like Performance', 'desc': 'This paper discusses how recurrent convolutional networks can be optimized to use computational resources effectively while maintaining accuracy in tasks. It introduces a method to define and optimize costs related to breadth, depth, and time in these networks using backpropagation. The study shows that by adjusting these resource pressures, networks can develop unique computational structures that adapt to task complexity. Interestingly, the time taken by the model during tasks aligns with human reaction times, suggesting a connection between artificial and biological intelligence.'}, 'zh': {'title': '优化资源以提升智能系统的表现', 'desc': '本文探讨了资源受限的递归卷积网络如何在宽度、深度和时间维度上优化计算图，以实现任务准确性。我们定义了可微分的成本项，并通过反向传播将这些成本与任务误差共同优化。研究发现，宽度、深度和时间三者之间可以相互权衡，以达到特定的准确性水平。模型使用的时间与人类在物体识别任务中的反应时间相关，这为理解神经架构的设计提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2605.24053', 'title': 'Breaking the Chains of Probability: Neutrosophic Logic as a New Framework for Epistemic Uncertainty in Large Language Models', 'url': 'https://huggingface.co/papers/2605.24053', 'abstract': "Abstract Neutrosophic Logic is applied to large language models to better represent epistemic uncertainty and internal conflicts, revealing that hyper-truth states emerge spontaneously in ethical and logical contexts.  AI-generated summary Large Language Models (LLMs) are predominantly governed by probabilistic frameworks in which the sum of outcome probabilities is constrained to unity. This architectural limitation, often imposed by Softmax layers, leads to a collapse of uncertainty that makes it difficult to differentiate between epistemic uncertainty, paradox, and vagueness. We present an empirical investigation of the application of Neutrosophic Logic, a framework that treats Truth (T), Indeterminacy (I), and Falsity (F) as three independent dimensions, to model epistemic states in LLMs. We conducted experiments on a family of four OpenAI GPT models across five linguistic phenomena: logical paradoxes, epistemic ignorance, vagueness, ethical contradictions, and future contingencies, under three prompting strategies: neutrosophic, probabilistic, and entropy-derived. Our findings reveal that the neutrosophic approach, by allowing T+I+F > 1, a state we term hyper-truth, provides a richer representation of a model's internal state. In 35% of evaluations, hyper-truth emerged spontaneously, predominantly under ethical contradiction and logical paradox. We demonstrate that this approach preserves truth values in fuzzy contexts and offers a robust method for identifying and quantifying internal model conflict. We conclude that the integration of neutrosophic evaluation layers is a critical step toward more transparent, reliable, and ethically aware AI systems.", 'score': 0, 'issue_id': 2333, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '9558afa2bca585fe', 'authors': ['Maikel Yelandi Leyva-Vázquez', 'Florentin Smarandache'], 'affiliations': ['Universidad Bernardo OHiggins', 'Universidad Bolivariana del Ecuador', 'Universidad de Guayaquil', 'University of New Mexico'], 'pdf_title_img': 'assets/pdf/title_img/2605.24053.jpg', 'data': {'categories': [], 'emoji': '🌀', 'ru': {'title': 'Нейтрософическая логика для раскрытия скрытых неопределённостей в языковых моделях', 'desc': 'В работе исследуется применение нейтрософической логики к большим языковым моделям для лучшего представления эпистемической неопределённости и внутренних противоречий. Традиционные вероятностные модели с функцией Softmax ограничивают сумму вероятностей единицей, что приводит к потере информации об истине, неопределённос
