    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.28816', 'title': 'Gamma-World: Generative Multi-Agent World Modeling Beyond Two Players', 'url': 'https://huggingface.co/papers/2605.28816', 'abstract': 'Abstract A generative multi-agent world model is presented that uses simplex rotary agent encoding and sparse hub attention to enable scalable, permutation-symmetric interaction between multiple agents in interactive video generation.  AI-generated summary World models for interactive video generation have largely focused on single-agent settings, where future observations are generated from a single control signal. However, many generated environments require multi-agent interaction: multiple players, robots, or embodied agents act simultaneously within a shared space. Scaling world models to such settings requires a principled multi-agent design: agents should remain independently controllable, permutation-symmetric, and support efficient inference while maintaining consistency across time and perspectives. In this paper, we present our generative multi-agent world model for interactive simulation. It introduces Simplex Rotary Agent Encoding, a parameter-free extension of 3D RoPE that represents agents as vertices of a regular simplex in rotary angle space. This gives each agent a distinct phase while making all agents permutation-equivalent, enabling scalable agent identity without learned per-slot identities or a fixed agent ordering. To avoid dense all-to-all attention across agents, we further propose Sparse Hub Attention, where learnable hub tokens mediate token interaction across agents, reducing cross-agent attention cost from quadratic to linear in the number of agents. For real-time rollout, we distill a full-context diffusion teacher into a causal student that generates temporal blocks sequentially with KV caching, enabling action-responsive generation at 24 FPS. Experiments in multiplayer virtual environments show that our model improves video fidelity, action controllability, and inter-agent consistency over slot-based and dense-attention baselines, while generalizing from two to four players without additional training.', 'score': 154, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '31929bfca03a807d', 'authors': ['Fangfu Liu', 'Kai He', 'Tianchang Shen', 'Tianshi Cao', 'Sanja Fidler', 'Yueqi Duan', 'Jun Gao', 'Igor Gilitschenski', 'Zian Wang', 'Xuanchi Ren'], 'affiliations': ['NVIDIA', 'Tsinghua University', 'University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.28816.jpg', 'data': {'categories': ['#video', '#agents', '#architecture', '#multimodal', '#diffusion', '#optimization', '#games'], 'emoji': '🎮', 'ru': {'title': 'Масштабируемая многоагентная генерация видео через симплекс-кодирование и разреженное внимание', 'desc': 'В работе предложена генеративная модель мира для многоагентной интерактивной генерации видео, которая использует simplex rotary encoding для представления агентов в виде вершин правильного симплекса в пространстве углов поворота. Для эффективного взаимодействия между агентами применяется sparse hub attention, где специальные токены-хабы опосредуют взаимодействие между агентами, снижая сложность кросс-агентного внимания с квадратичной до линейной. Модель обладает свойством перестановочной симметрии, позволяя агентам оставаться независимо управляемыми без фиксированного порядка, и поддерживает независимую управляемость каждого агента. Для реального времени модель дистиллируется из диффузионной модели-учителя в причинную модель-студента с KV caching, что позволяет генерировать видео с частотой 24 FPS с отзывом на действия агентов.'}, 'en': {'title': 'Scalable Multi-Agent Interaction for Interactive Video Generation', 'desc': 'This paper introduces a new generative model designed for creating interactive videos with multiple agents. It uses a technique called Simplex Rotary Agent Encoding, which allows each agent to be represented uniquely while still being interchangeable, making it easier to manage multiple agents. The model also employs Sparse Hub Attention to reduce the computational cost of interactions between agents, allowing for faster processing. Experiments show that this approach enhances video quality and consistency in agent actions, even when the number of agents increases without needing extra training.'}, 'zh': {'title': '生成式多智能体世界模型的创新设计', 'desc': '本文提出了一种生成式多智能体世界模型，利用简单旋转智能体编码和稀疏中心注意力，实现多个智能体在交互视频生成中的可扩展和排列对称交互。与传统的单智能体设置不同，该模型支持多个智能体在共享空间中同时行动，保持独立可控性和时间一致性。简单旋转智能体编码将智能体表示为旋转角空间中的正则单形体的顶点，使得智能体具有独特的相位，同时保持排列等价性。稀疏中心注意力通过可学习的中心标记减少了智能体间的注意力计算成本，从而提高了生成效率和视频质量。'}}}, {'id': 'https://huggingface.co/papers/2605.28293', 'title': 'ProRL: Effective Reinforcement Learning for Proactive Recommendation via Rectified Policy Gradient Estimation', 'url': 'https://huggingface.co/papers/2605.28293', 'abstract': 'Abstract Proactive recommender systems using reinforcement learning face challenges with gradient estimation bias and variance, which are addressed through stepwise reward centering and position-specific advantage estimation mechanisms.  AI-generated summary Proactive Recommender Systems (PRSs) aim to guide user preference shift toward target items by generating paths of intermediate recommendations. Reinforcement learning (RL) provides a principled framework for optimizing such sequential decision tasks, as path rewards can naturally capture both short-term acceptance and long-term guidance effectiveness. However, naively applying policy gradients to PRS results in deficient gradient estimation. We identify two deficiencies: (1) path-level rewards decompose into step-level rewards with positive mean, creating a length-dependent bias that causes gradients to favor path extension over meaningful exploration; (2) weighting each step by the entire path-level reward ignores the decomposition structure, leading to high gradient variance. To rectify these two deficiencies, we propose an effective RL framework ProRL with two novel mechanisms for proactive recommendation. First, Stepwise Reward Centering subtracts expected rewards to neutralize length-dependent bias, ensuring that path extension yields zero expected gradient signal. Second, Position-Specific Advantage Estimation leverages the reward decomposition structure to compute step-dependent baselines, reducing gradient variance. Together, these mechanisms yield policy gradients that precisely target path quality. Our experiments on three real-world datasets demonstrate that ProRL significantly outperforms state-of-the-art PRSs. Our code is available at https://github.com/hongruhou89/ProRL.', 'score': 76, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '3e712469151839f8', 'authors': ['Hongru Hou', 'Tiehua Mei', 'Denghui Geng', 'Jinhui Huang', 'Ao Xu', 'Hengrui Chen', 'Jiaqing Liang', 'Deqing Yang'], 'affiliations': ['School of Data Science, Fudan University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.28293.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Исправление градиентных оценок в рекомендательных системах с подкреплением', 'desc': 'В работе рассматривается проблема обучения рекомендательных систем с подкреплением, которые направляют пользователей к целевым предметам через последовательность промежуточных рекомендаций. Предложен фреймворк ProRL, решающий две ключевые проблемы при применении policy gradient методов: смещение градиентов из-за положительного среднего вознаграждения и высокую дисперсию оценок. Решение включает два механизма: центрирование пошаговых вознаграждений для нейтрализации смещения и позиционно-специфичную оценку advantage функций для снижения дисперсии. Экспериментальная оценка на трёх реальных датасетах показывает значительное улучшение качества по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Proactive Recommendations with ProRL', 'desc': 'This paper addresses challenges in proactive recommender systems (PRSs) that use reinforcement learning (RL) by focusing on gradient estimation issues. The authors introduce two innovative mechanisms: Stepwise Reward Centering, which reduces bias in gradient estimation by neutralizing length-dependent rewards, and Position-Specific Advantage Estimation, which minimizes variance by using step-dependent baselines. These improvements help the RL framework, named ProRL, to better optimize the recommendation paths by accurately reflecting the quality of recommendations. Experimental results show that ProRL outperforms existing PRS methods on multiple real-world datasets.'}, 'zh': {'title': '优化主动推荐系统的强化学习新方法', 'desc': '本论文提出了一种新的主动推荐系统框架ProRL，旨在解决使用强化学习时的梯度估计偏差和方差问题。通过引入逐步奖励中心化和位置特定优势估计机制，ProRL能够有效地优化推荐路径，提升用户的偏好转移。逐步奖励中心化消除了长度依赖的偏差，而位置特定优势估计则降低了梯度方差。实验结果表明，ProRL在多个真实数据集上显著优于现有的主动推荐系统。'}}}, {'id': 'https://huggingface.co/papers/2605.28774', 'title': 'Agent Explorative Policy Optimization for Multimodal Agentic Reasoning', 'url': 'https://huggingface.co/papers/2605.28774', 'abstract': 'Abstract Agents using vision-language models with extended reasoning face challenges in tool utilization, which are addressed through AXPO, a method that improves performance by optimizing thinking prefixes and tool call resampling.  AI-generated summary Vision-language models with extended reasoning succeed on complex problems, but many real-world problems require external tools that internal reasoning alone often cannot resolve. Agentic reasoning therefore interleaves two behaviors with a structural asymmetry: thinking (the self-contained default) and tool use (a high-variance auxiliary acting). We refer to this asymmetry as the Thinking-Acting Gap. Under standard RL recipes like GRPO, the gap manifests as two diagnostic symptoms during training: tool use is attempted on only ~30% of rollouts, and when attempted, the tool-using rollouts within a group are all-wrong on ~40% of questions, suppressing the learning signal at the tool calls that needed it. We propose AXPO (Agent eXplorative Policy Optimization): for each all-wrong tool-using subgroup, AXPO fixes the thinking prefix and resamples the tool call and its continuation, paired with uncertainty-based prefix selection. Across nine multimodal benchmarks and three scales of Qwen3-VL-Thinking, SFT+AXPO outperforms SFT+GRPO at average (+1.8pp Pass@1 and +1.8pp Pass@4 at 8B on average) and 8B with SFT+AXPO surpasses the 32B Base on Pass@4 with 4 times fewer parameters.', 'score': 69, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'd2a0af472b64b232', 'authors': ['Minki Kang', 'Shizhe Diao', 'Ryo Hachiuma', 'Sung Ju Hwang', 'Pavlo Molchanov', 'Yu-Chiang Frank Wang', 'Byung-Kwan Lee'], 'affiliations': ['KAIST', 'NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2605.28774.jpg', 'data': {'categories': ['#agents', '#training', '#multimodal', '#reasoning', '#benchmark', '#rl', '#optimization'], 'emoji': '🤖', 'ru': {'title': 'Преодоление асимметрии между размышлением и действием в агентах с видео-языковыми моделями', 'desc': 'В статье рассматривается проблема использования инструментов агентами, которые применяют видео-языковые модели с расширенным рассуждением. Авторы выявили асимметрию между мышлением агента и использованием инструментов, приводящую к низкой частоте обращения к инструментам и высокому проценту ошибок. Предложен метод AXPO, который оптимизирует префиксы мышления и переиспользует вызовы инструментов для неудачных примеров, применяя неопределённость при выборе префикса. Экспериментальные результаты на девяти датасетах показывают, что комбинация supervised fine-tuning и AXPO превосходит базовый метод GRPO и позволяет меньшей модели достичь производительности модели в 4 раза большего размера.'}, 'en': {'title': 'Bridging the Thinking-Acting Gap with AXPO', 'desc': 'This paper introduces AXPO, a method designed to enhance the performance of vision-language models in tasks that require tool utilization. It addresses the Thinking-Acting Gap, which occurs when agents struggle to effectively use external tools alongside their internal reasoning. By optimizing thinking prefixes and resampling tool calls, AXPO improves the learning process during training, leading to better outcomes in complex problem-solving scenarios. The results show that AXPO significantly outperforms traditional methods, demonstrating its effectiveness in multimodal benchmarks with fewer parameters.'}, 'zh': {'title': '优化思维与工具使用的桥梁', 'desc': '本论文提出了一种名为AXPO的方法，旨在解决视觉-语言模型在工具使用中的挑战。传统的强化学习方法在训练过程中，工具使用的尝试率仅为30%，且错误率高达40%。AXPO通过优化思维前缀和重新采样工具调用，改善了模型在复杂问题上的表现。实验结果表明，使用AXPO的模型在多个基准测试中优于传统方法，显示出更高的准确率和更少的参数需求。'}}}, {'id': 'https://huggingface.co/papers/2605.28820', 'title': 'From Pixels to Words -- Towards Native One-Vision Models at Scale', 'url': 'https://huggingface.co/papers/2605.28820', 'abstract': 'Abstract NEO-ov is a native vision-language model that end-to-end learns cross-frame and pixel-word correspondences without modular components, enabling unified spatiotemporal modeling and competitive performance in visual perception tasks.  AI-generated summary Current vision-language models (VLMs) typically stitch together separate image encoders and language decoders via multi-stage alignment, a modular framework that inevitably fragments pixel-level signals across frames and scatters early pixel-word interactions. In parallel, native VLMs, despite impressive performance on single images, remain largely unexplored in multi-image, video understanding, and spatial intelligence. Hence, we introduce NEO-ov, a native foundation model that learns cross-frame and pixel-word correspondence end-to-end, without any external encoders, auxiliary adapters, or post-hoc fusion. By eliminating module boundaries entirely, NEO-ov enables fine-grained and unified spatiotemporal modeling to emerge natively inside the model. Notably, NEO-ov largely narrows the gap to modular counterparts while excelling at fine-grained visual perception, validating that native "one-vision" architectures are not only feasible but competitive at scale. Beyond empirical performance, we unveil systematic architectural analyses and detailed training recipes to facilitate subsequent native multimodal modeling. Our code and models are publicly available at: https://github.com/EvolvingLMMs-Lab/NEO.', 'score': 53, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '4fbe9f4edb761e41', 'authors': ['Haiwen Diao', 'Jiahao Wang', 'Penghao Wu', 'Yuhao Dong', 'Yuwei Niu', 'Yue Zhu', 'Zhongang Cai', 'Weichen Fan', 'Linjun Dai', 'Silei Wu', 'Xuanyu Zheng', 'Mingxuan Li', 'Yuanhan Zhang', 'Bo Li', 'Hanming Deng', 'Huchuan Lu', 'Quan Wang', 'Lei Yang', 'Lewei Lu', 'Dahua Lin', 'Ziwei Liu'], 'affiliations': ['DLUT', 'S-Lab, NTU', 'SenseTime Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.28820.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#cv', '#video', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Единое видение: мультимодальная модель без модулей', 'desc': 'NEO-ov — это нативная модель визуально-языкового понимания, которая обучается сквозным образом находить соответствия между пикселями, словами и кадрами без модульных компонентов. В отличие от традиционных VLM, которые используют отдельные кодировщики и декодировщики, соединённые многоэтапной выравниванием, NEO-ov обрабатывает видео и пространственную информацию в едином архитектурном целом. Модель демонстрирует конкурентоспособную производительность в задачах восприятия и лучше справляется с мелкозернистым анализом изображений. Авторы предоставляют детальный анализ архитектуры и рецепты обучения для развития нативного мультимодального моделирования.'}, 'en': {'title': 'Unified Vision-Language Learning for Enhanced Perception', 'desc': 'NEO-ov is a novel vision-language model that learns to connect visual and textual information directly, without using separate components for images and words. This end-to-end approach allows it to understand relationships across multiple frames and pixels more effectively than traditional models, which often break down these connections. By removing modular boundaries, NEO-ov achieves a more integrated understanding of spatiotemporal data, making it particularly strong in visual perception tasks. The paper also provides insights into its architecture and training methods, paving the way for future advancements in native multimodal models.'}, 'zh': {'title': 'NEO-ov：一体化视觉-语言模型的创新', 'desc': 'NEO-ov是一种原生的视觉-语言模型，能够端到端地学习跨帧和像素-词的对应关系，而无需模块化组件。这种方法实现了统一的时空建模，并在视觉感知任务中表现出竞争力。与传统的视觉-语言模型不同，NEO-ov消除了模块边界，使得细粒度的时空建模能够在模型内部自然产生。我们的研究表明，原生的“一体化”架构不仅可行，而且在大规模应用中具有竞争力。'}}}, {'id': 'https://huggingface.co/papers/2605.28814', 'title': 'Self-Improving Language Models with Bidirectional Evolutionary Search', 'url': 'https://huggingface.co/papers/2605.28814', 'abstract': 'Abstract Bidirectional Evolutionary Search combines forward candidate evolution with backward goal decomposition to improve language model generation by overcoming limitations of traditional search methods.  AI-generated summary Search has been proposed as an effective method for self-improving language models and agentic systems, both for post-training sample generation and for inference. However, widely used methods such as best-of-N sampling and tree search face two fundamental limitations: they are guided by sparse verification signals, and they construct candidates primarily through autoregressive expansion, restricting exploration to regions with substantial model probability mass. To address these, we propose Bidirectional Evolutionary Search (BES), a search framework that couples forward candidate evolution with backward goal decomposition. In the forward search, BES augments standard expansion with evolution operators that recombine partial trajectories to generate candidates that are difficult to obtain from a single model rollout. In the backward search, BES recursively decomposes the original task into checkable subgoals, producing dense intermediate feedback that guides forward search. We provide theoretical motivation showing that candidates generated by expansion-only search are confined to a narrow entropy shell while evolutionary operators can escape it, and that backward search can exponentially reduce the number of required samples to find a correct answer. Experiments show that on challenging post-training tasks where mainstream post-training algorithms fail to improve, BES enables consistent gains, and on three open problem solving benchmarks at inference time, BES outperforms existing open-source frameworks in both average and best-case performance. Code and trained models are available at https://github.com/Embodied-Minds-Lab/BES.', 'score': 44, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '613033547ab30e94', 'authors': ['Guowei Xu', 'Zhenting Qi', 'Huangyuan Su', 'Weirui Ye', 'Himabindu Lakkaraju', 'Sham M. Kakade', 'Yilun Du'], 'affiliations': ['Harvard University', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2605.28814.jpg', 'data': {'categories': ['#open_source', '#agents', '#training', '#reasoning', '#benchmark', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'Двусторонний эволюционный поиск для самосовершенствования языковых моделей', 'desc': 'В работе предложен метод Bidirectional Evolutionary Search (BES), который комбинирует эволюционный поиск в прямом направлении с декомпозицией задач в обратном направлении для улучшения генерации языковых моделей. Прямой поиск использует эволюционные операторы для рекомбинации частичных траекторий, позволяя исследовать области с низкой вероятностью в модели. Обратный поиск рекурсивно разбивает исходную задачу на проверяемые подцели, генерируя плотные промежуточные сигналы обратной связи. Авторы показывают теоретически и экспериментально, что BES превосходит традиционные методы поиска на задачах пост-обучения и при использовании во время инференса.'}, 'en': {'title': 'Revolutionizing Language Model Search with Bidirectional Evolutionary Techniques', 'desc': 'Bidirectional Evolutionary Search (BES) enhances language model generation by integrating forward candidate evolution with backward goal decomposition. This approach addresses the limitations of traditional search methods, which often rely on sparse feedback and are restricted to high-probability regions of the model. By using evolutionary operators, BES generates diverse candidates that are not easily produced through standard autoregressive methods. Additionally, the backward search decomposes tasks into manageable subgoals, providing richer feedback that improves the efficiency and effectiveness of the forward search process.'}, 'zh': {'title': '双向进化搜索：突破语言模型生成的限制', 'desc': '双向进化搜索（BES）结合了前向候选进化和后向目标分解，以改善语言模型生成，克服传统搜索方法的局限性。该方法通过进化操作增强标准扩展，生成难以通过单一模型推理获得的候选项。同时，后向搜索将原始任务递归分解为可检查的子目标，提供密集的中间反馈，指导前向搜索。实验表明，在主流后训练算法无法改进的挑战性任务上，BES能够实现持续的性能提升，并在推理时的三个开放问题解决基准上超越现有的开源框架。'}}}, {'id': 'https://huggingface.co/papers/2605.28421', 'title': 'DenoiseRL: Bootstrapping Reasoning Models to Recover from Noisy Prefixes', 'url': 'https://huggingface.co/papers/2605.28421', 'abstract': 'Abstract DenoiseRL is a reinforcement learning framework that enhances reasoning in large language models by learning from incorrect traces through failure-oriented optimization, improving scalability and reducing dependence on external supervision.  AI-generated summary Reinforcement learning has become a central paradigm for advancing reasoning in large language models, yet most existing methods still depend on stronger teacher models or heavily curated difficult datasets, limiting scalable capability improvement. In this paper, we introduce DenoiseRL, a reinforcement learning framework that substitutes external supervision with recovery-oriented optimization over failures from weak models. Instead of relying on stronger supervision or carefully engineered data, DenoiseRL learns directly from incorrect reasoning traces by converting them into opportunities for improvement, making training more scalable and less dependent on external resources. This yields a richer and more diverse learning signal, improving exploration efficiency from imperfect model behavior. As a result, DenoiseRL improves reasoning performance and overall training efficiency while reducing the need for expensive data curation or stronger teacher models. Empirically, DenoiseRL consistently outperforms strong on-policy RL baselines across competitive mathematical and general reasoning benchmarks and promotes stronger self-corrective behavior as training difficulty increases, highlighting an effective and scalable alternative pathway for improving reasoning in large language models.', 'score': 39, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'ac14425e2ace9f83', 'authors': ['Caijun Xu', 'Changyi Xiao', 'Zhongyuan Peng', 'Yixin Cao'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.28421.jpg', 'data': {'categories': ['#training', '#reasoning', '#rl', '#optimization', '#math'], 'emoji': '♻️', 'ru': {'title': 'Обучение на ошибках: как слабые модели становятся сильнее', 'desc': 'DenoiseRL — это фреймворк обучения с подкреплением, который улучшает рассуждение в больших языковых моделях, обучаясь на неправильных траекториях через оптимизацию, ориентированную на ошибки. Вместо полагания на учителей с высокой квалификацией или тщательно отобранные наборы данных, фреймворк преобразует неудачи слабых моделей в возможности для совершенствования. Такой подход обеспечивает более богатый и разнообразный сигнал обучения, улучшая эффективность исследования пространства действий. В результате DenoiseRL снижает зависимость от внешнего контроля и дорогостоящей обработки данных, сохраняя при этом высокую производительность на задачах математического и общего рассуждения.'}, 'en': {'title': 'Learning from Mistakes: DenoiseRL Enhances Reasoning in Language Models', 'desc': 'DenoiseRL is a novel reinforcement learning framework designed to enhance the reasoning capabilities of large language models. It focuses on learning from incorrect reasoning traces instead of relying on stronger teacher models or curated datasets, which often limit scalability. By employing failure-oriented optimization, DenoiseRL transforms mistakes into learning opportunities, leading to improved exploration and training efficiency. This approach not only boosts reasoning performance but also reduces the need for expensive external supervision, making it a more scalable solution for developing advanced language models.'}, 'zh': {'title': 'DenoiseRL：从错误中学习，提升推理能力', 'desc': 'DenoiseRL 是一种强化学习框架，通过从错误的推理轨迹中学习，利用面向失败的优化来增强大型语言模型的推理能力。该方法减少了对外部监督的依赖，使得训练过程更加可扩展。DenoiseRL 直接从不正确的推理中提取改进机会，从而提高了探索效率和学习信号的多样性。实验结果表明，DenoiseRL 在数学和一般推理基准测试中表现优于传统的强化学习方法，展示了其在大型语言模型推理改进中的有效性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2605.28003', 'title': 'ResearchMath-14K: Scaling Research-Level Mathematics via Agents', 'url': 'https://huggingface.co/papers/2605.28003', 'abstract': 'Abstract ResearchMath-14k dataset and ResearchMath-Reasoning trajectories are introduced to advance research-level mathematical reasoning in language models, demonstrating that filtered open-problem attempts provide useful supervision for model improvement.  AI-generated summary The frontier of mathematics is defined by problems whose solutions are not yet known, yet it remains unclear whether language models can meaningfully engage with such problems without human intervention. A major obstacle is the lack of large-scale research-level math datasets. To this end, we introduce ResearchMath-14k, a set of 14{,}056 problems curated from academic sources via a multi-agent pipeline, making it the largest collection of research-level mathematical problems to date. We further generate ResearchMath-Reasoning, 220K teacher trajectories from two open models, where we observe recurring avoidance behaviors such as non-attempts and fabricated references. Interestingly, across eight open-weight models, newer generations produce 5.6times more references and 5.0times more fake references per trace. After agentic filtering of ResearchMath-Reasoning, fine-tuning Qwen3 models from 4B to 30B parameters improves over base models by 9.2 points on average. This shows that filtered open-problem attempts can provide useful supervision even without fully correct reasoning traces. We make ResearchMath-14k publicly available for future works on research-level mathematical reasoning.', 'score': 38, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '8a085b815578fb33', 'authors': ['Guijin Son', 'Seungyeop Yi', 'Minju Gwak', 'Hyunwoo Ko', 'Wongi Jang', 'Youngjae Yu'], 'affiliations': ['OneLineAI', 'Seoul National University', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28003.jpg', 'data': {'categories': ['#training', '#synthetic', '#science', '#math', '#reasoning', '#dataset', '#open_source', '#agents'], 'emoji': '🧮', 'ru': {'title': 'Фильтрованные неправильные попытки решают задачи: как учить модели на исследовательской математике без совершенства', 'desc': 'В статье представлены датасет ResearchMath-14k с 14 тысячами задач исследовательского уровня из академических источников и ResearchMath-Reasoning с 220 тысячами траекторий рассуждений от открытых моделей. Авторы обнаружили, что более новые модели генерируют больше галлюцинаций и неправильных ссылок при решении сложных математических задач. После фильтрации траекторий рассуждений с помощью агентского подхода, дообучение моделей Qwen привело к улучшению производительности на 9.2 балла в среднем. Исследование показывает, что даже неполные попытки решения открытых задач могут служить полезной обучающей информацией для совершенствования языковых моделей.'}, 'en': {'title': 'Empowering AI with ResearchMath-14k for Advanced Mathematical Reasoning', 'desc': 'This paper introduces the ResearchMath-14k dataset, which contains over 14,000 research-level mathematical problems, aimed at enhancing the capabilities of language models in solving complex math problems. The authors also present ResearchMath-Reasoning, a collection of 220,000 reasoning trajectories generated by open models, highlighting common issues like avoidance behaviors and inaccuracies in references. The study finds that filtering these reasoning attempts can significantly improve the performance of language models, with fine-tuning showing an average increase of 9.2 points. By making ResearchMath-14k publicly available, the authors aim to foster further advancements in mathematical reasoning within AI systems.'}, 'zh': {'title': '推动数学推理的研究级数据集', 'desc': '本文介绍了ResearchMath-14k数据集和ResearchMath-Reasoning轨迹，以推动语言模型在研究级数学推理方面的进展。该数据集包含14,056个从学术来源整理的问题，是迄今为止最大的研究级数学问题集合。研究还生成了220,000个教师轨迹，观察到模型在处理开放性问题时存在回避行为。通过对ResearchMath-Reasoning进行过滤，微调Qwen3模型后，模型性能平均提高了9.2分，表明即使没有完全正确的推理轨迹，过滤后的开放问题尝试也能提供有用的监督。'}}}, {'id': 'https://huggingface.co/papers/2605.28732', 'title': 'MemTrace: Tracing and Attributing Errors in Large Language Model Memory Systems', 'url': 'https://huggingface.co/papers/2605.28732', 'abstract': "Abstract Memory systems in large language models suffer from reliability issues that can be addressed through a novel tracing framework and automated fault attribution for improved performance.  AI-generated summary Memory is essential for enabling large language models to support long-horizon reasoning, yet existing memory systems remain unreliable and difficult to debug. Tracing memory's dynamic evolution is crucial to understand how information is synthesized, propagated, or corrupted over time. In this work, we study the new problem of error tracing and attribution in LLM memory systems. We propose a novel framework that transforms memory pipelines into executable memory evolution graphs, enabling fine-grained tracing of operational information flow. We then construct MemTraceBench, a benchmark collected from representative memory systems such as Long-Context, RAG, Mem0, and EverMemOS, to systematically study memory failure modes. We further introduce an automatic attribution method that iteratively traces operation subgraphs to pinpoint the root cause of any failed case. Our analysis reveals that memory failures are systematic, stemming from operation-level issues like information loss and retrieval misalignment. Crucially, we leverage these fine-grained attribution signals to guide downstream prompt optimization, establishing a closed-loop system that automatically corrects faults and boosts end-task performance by up to 7.62%. Code will be released at https://github.com/zjunlp/MemTrace.", 'score': 33, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '59225e1ac8e75456', 'authors': ['Xinle Deng', 'Ruobin Zhong', 'Hujin Peng', 'Xiaoben Lu', 'Yanzhe Wu', 'Guang Li', 'Buqiang Xu', 'Yunzhi Yao', 'Jizhan Fang', 'Haoliang Cao', 'Junjie Guo', 'Yuan Yuan', 'Ziqing Ma', 'Yuanqiang Yu', 'Rui Hu', 'Baohua Dong', 'Hangcheng Zhu', 'Ningyu Zhang'], 'affiliations': ['Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28732.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Диагностика и автокоррекция ошибок памяти в LLM через отслеживание информационных потоков', 'desc': 'В статье предложена новая методология для отладки систем памяти в больших языковых моделях путём анализа эволюции информации во времени. Авторы разработали фреймворк, который трансформирует память в граф операций, позволяющий отследить, как информация синтезируется, распространяется или искажается. Они создали бенчмарк MemTraceBench и метод автоматической атрибуции ошибок, который выявляет корневые причины сбоев в системах памяти, таких как потеря информации и неправильное выравнивание поиска. На основе полученных сигналов система автоматически оптимизирует промпты и повышает качество конечных результатов на 7.62%.'}, 'en': {'title': 'Enhancing LLM Memory Reliability through Error Tracing', 'desc': 'This paper addresses the reliability issues in memory systems of large language models (LLMs) by introducing a new tracing framework for error attribution. The authors propose a method to visualize memory evolution through executable memory evolution graphs, which helps in tracking how information flows and where it may fail. They create a benchmark called MemTraceBench to analyze various memory systems and identify common failure modes. By implementing an automatic attribution method, they can trace back errors to their source, leading to improved performance in LLMs by optimizing prompts based on these insights.'}, 'zh': {'title': '提升大型语言模型记忆系统可靠性的新方法', 'desc': '本文研究了大型语言模型中的记忆系统存在的可靠性问题，并提出了一种新的追踪框架和自动故障归因方法，以提高性能。我们构建了MemTraceBench基准，系统地研究了记忆系统的故障模式，并通过可执行的记忆演化图实现了对操作信息流的细粒度追踪。分析表明，记忆故障是系统性的，主要源于信息丢失和检索不对齐等操作级问题。通过利用细粒度的归因信号，我们建立了一个闭环系统，自动纠正故障并将最终任务性能提升了7.62%。'}}}, {'id': 'https://huggingface.co/papers/2605.28548', 'title': 'GEM: Generative Supervision Helps Embodied Intelligence', 'url': 'https://huggingface.co/papers/2605.28548', 'abstract': 'Abstract GEM is a vision-language model that integrates depth map generation during pre-training to improve embodied intelligence and physical operation capabilities in robotics.  AI-generated summary Embodied Vision-Language Models (VLMs) have demonstrated impressive performance and generalization in robotics, particularly within Vision-Language-Action frameworks. However, a significant gap remains between the high-level semantic focus of standard text-guided pre-training paradigms and the low-level spatial and physical knowledge critical for execution in embodied environments. In this paper, we introduce GEM, a Generative-supervised Embodied vision-language Model designed to bridge this divide. We propose integrating a depth map generation task directly into the VLM pre-training phase. By training this generative objective jointly with the main model, we observe substantial improvements in embodied intelligence, significantly enhancing both semantic understanding and physical operation capabilities. To support this paradigm, we curate and release GEM-4M, a comprehensive large-scale dataset featuring a mixture of grounding, reasoning, and planning data paired with high-quality depth supervision. Extensive experiments demonstrate that GEM achieves state-of-the-art results across diverse embodied benchmarks. Furthermore, our deployed action model, GEM-VLA, exhibits vastly superior task execution abilities in both simulation environments and real-world evaluations. Code, models, and datasets are available at https://zhaorw02.github.io/GEM/', 'score': 33, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '57eb5fed2fe423ad', 'authors': ['Ruowen Zhao', 'Bangguo Li', 'Zuyan Liu', 'Yinan Liang', 'Junliang Ye', 'Fangfu Liu', 'Diankun Wu', 'Zhengyi Wang', 'Xumin Yu', 'Yongming Rao', 'Han Hu', 'Jun Zhu'], 'affiliations': ['Tencent Hunyuan', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28548.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🤖', 'ru': {'title': 'Глубокое понимание: видения робота в физическом мире', 'desc': 'GEM — это видео-языковая модель, которая интегрирует генерацию карт глубины во время предварительного обучения для улучшения способностей роботов к физическому взаимодействию с окружением. Модель решает проблему разрыва между высокоуровневым семантическим пониманием текста и низкоуровневым пространственным знанием, необходимым для выполнения задач в физическом мире. Авторы создали большой датасет GEM-4M с аннотациями глубины и обучили модель генерировать карты глубины совместно с основной задачей предсказания действий. Экспериментальные результаты показывают значительные улучшения в выполнении робототехнических задач как в симуляции, так и в реальных условиях.'}, 'en': {'title': 'Bridging Vision and Action in Robotics with GEM', 'desc': 'GEM is a vision-language model that enhances robotics by incorporating depth map generation during its pre-training phase. This approach addresses the gap between high-level semantic understanding and the low-level spatial knowledge necessary for effective physical actions in embodied environments. By jointly training on depth map generation and the main vision-language tasks, GEM significantly improves both semantic comprehension and operational capabilities. The model is validated through extensive experiments, achieving state-of-the-art performance on various benchmarks and demonstrating superior task execution in real-world scenarios.'}, 'zh': {'title': 'GEM：提升机器人智能与操作能力的视觉-语言模型', 'desc': 'GEM是一种视觉-语言模型，通过在预训练阶段集成深度图生成来提升机器人在物理操作和体现智能方面的能力。传统的文本引导预训练方法在高层语义理解上表现良好，但在低层空间和物理知识方面存在显著差距。本文提出的GEM模型通过将深度图生成任务与主模型的训练相结合，显著提高了体现智能和物理操作能力。我们还发布了GEM-4M数据集，支持这一新方法，并在多项基准测试中取得了最先进的结果。'}}}, {'id': 'https://huggingface.co/papers/2605.28775', 'title': 'Learn from Weaknesses: Automated Domain Specialization for Small Computer-Use Agents', 'url': 'https://huggingface.co/papers/2605.28775', 'abstract': "Abstract LearnWeak is an annotation-free framework that enhances small computer-use agents by identifying weaknesses through a stronger reference agent and generating targeted training data for improved domain specialization.  AI-generated summary Computer-use agents (CUAs) have recently made substantial progress, but deploying a separate large expert for each software domain remains expensive. Small open computer-use agents are more practical specialization targets, but they remain substantially weaker and exhibit uneven domain-specific failures. A straightforward remedy is to synthesize large-scale training data for the target domain, yet we find that this naive approach yields only marginal improvements. Building on this observation, we introduce LearnWeak, an annotation-free specialization framework for small computer-use agents that uses a stronger reference agent to identify the student's weaknesses in the target domain, synthesize targeted tasks, and construct supervision automatically. LearnWeak further introduces an error-aware specialization objective that disentangles planning and execution errors, enabling more behaviorally precise updates than broad uniform supervision. On OSWorld, LearnWeak achieves average gains of 11.6 and 11.1 percentage points over EvoCUA-8B and OpenCUA-7B, respectively, across eight domains. We also validate that our student-aware dataset generation and training approaches outperform existing autonomous trajectory generation and training baselines. Our work highlights the importance of student awareness in both data synthesis and agent training, pointing toward a more principled and efficient path for specializing small computer-use agents in diverse domains.", 'score': 32, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'f8fa13d2d2b703f7', 'authors': ['Suji Kim', 'Kangsan Kim', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST', 'Samsung Electronics'], 'pdf_title_img': 'assets/pdf/title_img/2605.28775.jpg', 'data': {'categories': ['#agents', '#training', '#optimization', '#data', '#synthetic', '#small_models'], 'emoji': '🎯', 'ru': {'title': 'Слабые места студента — сильные данные для обучения', 'desc': 'LearnWeak — это фреймворк для специализации небольших агентов компьютерного управления без использования аннотаций, который идентифицирует слабые стороны студента через более сильного эталонного агента. Система автоматически синтезирует целевые задачи обучения для конкретного домена и генерирует разметку без ручного вмешательства. Основной новшеством является ошибка-осведомленная функция потерь, которая разделяет ошибки планирования и исполнения, обеспечивая более точные обновления модели. На бенчмарке OSWorld метод демонстрирует значительное улучшение производительности небольших моделей, подчеркивая важность учета индивидуальных слабостей студента при синтезе данных и обучении.'}, 'en': {'title': 'Empowering Small Agents with Targeted Learning', 'desc': "LearnWeak is a novel framework designed to improve small computer-use agents by leveraging a stronger reference agent to identify their weaknesses. Instead of relying on extensive labeled data, it generates targeted training tasks automatically, enhancing the agents' performance in specific domains. The framework introduces an error-aware specialization objective that distinguishes between planning and execution errors, allowing for more precise updates to the agents' behavior. By demonstrating significant performance gains across multiple domains, LearnWeak emphasizes the importance of tailored data synthesis and training strategies for effective agent specialization."}, 'zh': {'title': '无注释的智能代理专业化新方法', 'desc': 'LearnWeak是一个无注释的框架，旨在通过强大的参考代理识别小型计算机使用代理的弱点，并生成针对性的训练数据以提高领域专业化。该方法解决了小型计算机使用代理在特定领域表现不均的问题，利用强代理的优势来自动构建监督。LearnWeak引入了一种错误感知的专业化目标，能够更精确地更新代理的行为。实验结果表明，LearnWeak在多个领域的表现显著优于现有的训练基线，强调了在数据合成和代理训练中关注学生的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.26340', 'title': 'ScientistOne: Towards Human-Level Autonomous Research via Chain-of-Evidence', 'url': 'https://huggingface.co/papers/2605.26340', 'abstract': 'Abstract Autonomous research agents exhibit verifiability issues like fabricated citations and unreproducible results, which are addressed through a framework ensuring evidence traceability and an end-to-end system maintaining integrity throughout research processes.  AI-generated summary Autonomous research agents produce competitive solutions and professional-looking manuscripts, yet their outputs contain verifiability failures undetectable by surface-level evaluation: fabricated citations, unreproducible scores, and method descriptions that diverge from the implementation. We address this through three contributions. First, Chain-of-Evidence (CoE), a verifiability framework requiring every claim to be traceable to its evidence source. Second, ScientistOne, an end-to-end autonomous research system that maintains evidence chains by construction throughout literature review, solution discovery, and paper writing. Third, CoE Audit, a post-hoc audit whose four integrity checks -- score verification, specification violation, reference verification, and method-code alignment -- apply uniformly to all systems. Across 75 papers spanning five systems and five frontier research tasks, every baseline exhibits at least one systematic failure mode: hallucinated reference rates reach 21%, score verification passes in as few as 42% of papers, and method-code alignment ranges from 20% to 80%. ScientistOne achieves zero hallucinated references (0/337), perfect score verification (12/12), and the highest method-code alignment (14/15), while matching or exceeding human expert performance on all five tasks. ScientistOne further generalizes to six additional tasks spanning medical imaging, fine-grained recognition, 3D perception, and language modeling, achieving state-of-the-art on Parameter Golf and gold medals on MLE-Bench tasks where baselines fail entirely.', 'score': 27, 'issue_id': 2330, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'd6db8eae6c7c2bd8', 'authors': ['Rui Meng', 'Bhavana Dalvi Mishra', 'Jiefeng Chen', 'Chun-Liang Li', 'Palash Goyal', 'Mihir Parmar', 'Yiwen Song', 'Yale Song', 'Rajarishi Sinha', 'Parthasarathy Ranganathan', 'Burak Gokturk', 'Jinsung Yoon', 'Tomas Pfister'], 'affiliations': ['Google Cloud AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.26340.jpg', 'data': {'categories': ['#science', '#hallucinations', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Проверяемость искусственных исследователей через отслеживание доказательств', 'desc': 'В работе предложена система для обеспечения надёжности автономных исследовательских агентов, которые часто генерируют поддельные цитаты и непроверяемые результаты. Основной вклад — фреймворк Chain-of-Evidence, требующий проследить каждое утверждение до его источника доказательства. Разработана комплексная система ScientistOne, которая поддерживает цепь доказательств на протяжении всего процесса исследования: от обзора литературы до написания статьи. Предложен набор проверок целостности для аудита, который выявляет галлюцинации, ошибки спецификации и несоответствия между описанными методами и их реализацией.'}, 'en': {'title': 'Ensuring Integrity in Autonomous Research with Chain-of-Evidence', 'desc': 'This paper addresses the verifiability issues in autonomous research agents, which often produce outputs with fabricated citations and unreproducible results. The authors propose a framework called Chain-of-Evidence (CoE) that ensures every claim made by these agents is traceable to its original evidence. They introduce ScientistOne, an end-to-end system that maintains integrity throughout the research process, from literature review to paper writing. Additionally, they present CoE Audit, which performs integrity checks to ensure the reliability of research outputs, demonstrating that their system significantly outperforms existing methods in terms of verifiability and accuracy.'}, 'zh': {'title': '确保研究的可信性与完整性', 'desc': '自主研究代理存在可验证性问题，例如伪造引用和不可重复的结果。为了解决这些问题，本文提出了一个框架，确保证据的可追溯性，并维护研究过程中的完整性。我们引入了证据链（CoE）框架，要求每个声明都能追溯到其证据来源，并开发了ScientistOne，一个端到端的自主研究系统，能够在文献回顾、解决方案发现和论文写作中保持证据链。通过对75篇论文的分析，ScientistOne在引用、得分验证和方法代码对齐方面表现出色，且在多个任务中超越了人类专家的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.27905', 'title': 'AI Research Agents Narrow Scientific Exploration', 'url': 'https://huggingface.co/papers/2605.27905', 'abstract': 'Abstract AI research agents generate ideas that are more concentrated and closely aligned with existing literature compared to human research, primarily recombining existing methods rather than introducing novel research questions.  AI-generated summary AI research agents can now generate research ideas, design experiments, run code, and draft papers, raising the possibility of large-scale AI-assisted scientific discovery. Many current agent frameworks explicitly encourage the generation of novel and high-impact ideas. Yet it remains unclear whether AI-assisted ideation broadens scientific exploration or mainly concentrates around existing work. We study AI research agents as scientific search systems. Using four AI research-agent frameworks and six large language models, we generate 37,802 scientific ideas from shared seed literature across citation-defined research areas in AI and machine learning. We then compare the resulting AI ideas against human-authored papers from the same research areas, follow-on human research emerging from the same seed literature, and the seed literature itself. Across experiments, four consistent patterns emerge. First, AI-generated ideas are substantially more concentrated than human-authored papers from the same research areas. Second, AI-generated ideas remain much closer to their starting literature than later human follow-on work does. Third, papers most similar to AI-generated ideas tend to receive lower subsequent citations. Fourth, when AI-generated ideas differ from prior work, the differences arise primarily from recombining existing technical methods rather than introducing fundamentally new research questions. Overall, current AI research agents appear better suited to local elaboration than to broadening scientific exploration.', 'score': 20, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '93fb86c576c85cef', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.27905.jpg', 'data': {'categories': ['#science', '#agents', '#benchmark', '#agi'], 'emoji': '🔄', 'ru': {'title': 'AI переиспользует известное вместо открытия нового', 'desc': 'Исследование показывает, что AI-агенты для научных исследований генерируют идеи, которые концентрируются вокруг существующей литературы и слабо отличаются от исходных работ. Авторы проанализировали 37,802 идей, созданных четырьмя фреймворками AI-агентов и шестью большими языковыми моделями, сравнив их с работами учёных из тех же областей. Выяснилось, что AI-генерируемые идеи остаются намного ближе к исходной литературе, чем последующие человеческие исследования, и главным образом переиспользуют существующие технические методы. Таким образом, текущие AI-агенты лучше подходят для локальной разработки существующих направлений, чем для расширения научных горизонтов.'}, 'en': {'title': 'AI Agents: Enhancing Focus, Not Innovation in Research', 'desc': 'This paper investigates how AI research agents generate scientific ideas and compares them to human-authored research. The study finds that AI-generated ideas are more focused and closely related to existing literature, often recombining known methods instead of proposing new research questions. It highlights that while AI can assist in generating and drafting research, it tends to concentrate on familiar concepts rather than expanding the scope of scientific inquiry. Ultimately, the findings suggest that current AI frameworks are more effective for refining existing ideas than for fostering innovative exploration in science.'}, 'zh': {'title': 'AI研究代理：局部深化而非广泛探索', 'desc': '本研究探讨了人工智能（AI）研究代理在科学探索中的作用。研究发现，AI生成的研究想法比人类撰写的论文更集中，且更接近于已有文献。虽然AI代理能够生成大量科学想法，但这些想法主要是对现有技术方法的重新组合，而非提出全新的研究问题。总体而言，当前的AI研究代理更适合于局部深化，而非拓宽科学探索的范围。'}}}, {'id': 'https://huggingface.co/papers/2605.28773', 'title': 'Rethinking Memory as Continuously Evolving Connectivity', 'url': 'https://huggingface.co/papers/2605.28773', 'abstract': 'Abstract FluxMem is a memory framework that dynamically evolves memory topology through three stages to improve performance in complex agentic environments.  AI-generated summary Existing memory-augmented LLM agents often treat memory as a static repository with pre-defined representations and fixed retrieval pipelines, which is brittle in dynamic agentic environments where feedback, task variation, and heterogeneous signals continuously reshape what should be remembered and how it should be connected. To address this, we propose FluxMem, a connectivity-evolving memory framework that models memory as a heterogeneous graph and progressively refines its topology through three stages: initial connection formation, feedback-driven refinement, and long-term consolidation. During execution, FluxMem repairs missing links, prunes interference, aligns abstraction granularity, and distills recurrent successful trajectories into reusable procedural circuits, guided by one metric for memory generalizability and evolutionary maturity. Across three fundamentally distinct benchmarks including LoCoMo, Mind2Web, and GAIA, FluxMem achieves consistent state-of-the-art performance, demonstrating strong adaptation and generalization in complex agentic environments. The code will be open-sourced in https://github.com/zjunlp/LightMem.', 'score': 19, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '3f6db0d2ea07b453', 'authors': ['Jizhan Fang', 'Buqiang Xu', 'Zhixian Wang', 'Haoliang Cao', 'Xinle Deng', 'Baohua Dong', 'Hangcheng Zhu', 'Ruohui Huang', 'Gang Yu', 'Ying Wei', 'Guozhou Zheng', 'Feiyu Xiong', 'Haofen Wang', 'Huajun Chen', 'Ningyu Zhang'], 'affiliations': ['Alibaba Group', 'MemTensor', 'Tongji University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28773.jpg', 'data': {'categories': ['#open_source', '#agents', '#architecture', '#benchmark', '#graphs'], 'emoji': '🧠', 'ru': {'title': 'Живая память агента: от статики к динамической топологии', 'desc': 'FluxMem — это фреймворк памяти для агентов на основе больших языковых моделей, который динамически эволюционирует топологию памяти через три этапа: формирование начальных связей, уточнение на основе обратной связи и долгосрочную консолидацию. В отличие от традиционных подходов с статичными хранилищами, FluxMem моделирует память как гетерогенный граф и адаптивно перестраивает её структуру по мере выполнения задач, исправляя пропущенные связи и удаляя помехи. Система дополняет это процессом дистилляции успешных траекторий в переиспользуемые процедурные схемы, руководствуясь метриками обобщаемости и эволюционной зрелости памяти. Экспериментальные результаты на бенчмарках LoCoMo, Mind2Web и GAIA демонстрируют состояние искусства в производительности и устойчивость к изменениям в сложных агентских окружениях.'}, 'en': {'title': 'Evolving Memory for Dynamic Learning', 'desc': 'FluxMem is a novel memory framework designed to enhance performance in dynamic environments by evolving its memory structure. Unlike traditional memory systems that are static, FluxMem treats memory as a flexible graph that adapts through three key stages: forming initial connections, refining these connections based on feedback, and consolidating knowledge over time. This approach allows the system to repair gaps in memory, reduce interference, and create reusable strategies from successful experiences. The framework has shown superior adaptability and generalization across various benchmarks, setting a new standard in memory-augmented learning for complex tasks.'}, 'zh': {'title': 'FluxMem：动态演变的智能内存框架', 'desc': 'FluxMem是一种动态演变内存拓扑的框架，旨在提高复杂智能环境中的性能。它将内存建模为异构图，通过三个阶段逐步优化其拓扑结构：初始连接形成、基于反馈的优化和长期巩固。在执行过程中，FluxMem能够修复缺失的连接、剪除干扰、对齐抽象粒度，并将成功的轨迹提炼为可重用的程序电路。通过在LoCoMo、Mind2Web和GAIA等三个基准测试中，FluxMem展现了卓越的适应性和泛化能力，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.25969', 'title': 'Triplet-Block Diffusion RWKV', 'url': 'https://huggingface.co/papers/2605.25969', 'abstract': "Abstract B³D-RWKV combines diffusion and RWKV architectures to achieve parallel, bidirectional processing with improved decoding speed while maintaining competitive accuracy.  AI-generated summary Causal Transformer language models suffer from strictly sequential decoding and a quadratic per-step attention cost. While linear-time causal models and discrete diffusion models each address these weaknesses, their integration remains inherently inconsistent: diffusion requires bidirectional attention, while causal models are unidirectional. To unify these architectures, we propose B^3D-RWKV, a diffusion RWKV variant that integrates the model's O(L) inference efficiency with parallel, bidirectional discrete-diffusion through a triplet-block layout method. B^3D-RWKV-7.2B reaches comparable accuracy on an 8-task suite versus existing models while significantly outperforming baselines in decoding throughput with an average of 1.6times speedup.", 'score': 18, 'issue_id': 2330, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'c9bace7c7c9cf7ed', 'authors': ['Ke Lin', 'Yiyang Luo', 'Zhaolong Su', 'Yunya Song', 'Anyi Rao'], 'affiliations': ['Cornell', 'HKUST', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2605.25969.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Синтез линейной эффективности и двусторонней обработки в языковых моделях', 'desc': 'В статье предлагается B³D-RWKV — новая архитектура, которая объединяет эффективность линейной модели RWKV с параллельной двусторонней обработкой, характерной для дискретных диффузионных моделей. Авторы решают фундаментальную проблему несовместимости: каузальные трансформеры требуют односторонней обработки, а диффузионные модели — двусторонней внимания. Предложенный метод triplet-block layout позволяет достичь O(L) сложности при декодировании с сохранением конкурентоспособной точности на наборе из 8 задач. Модель B³D-RWKV-7.2B демонстрирует 1.6-кратное ускорение пропускной способности декодирования по сравнению с существующими базовыми моделями.'}, 'en': {'title': 'Speed Meets Accuracy: The B³D-RWKV Revolution', 'desc': 'B³D-RWKV is a new model that combines diffusion and RWKV architectures to enhance processing speed and maintain accuracy. It addresses the limitations of traditional causal Transformer models, which decode sequentially and have high attention costs. By integrating linear-time causal models with bidirectional attention from diffusion models, B³D-RWKV achieves efficient inference. The model demonstrates a significant speed improvement, achieving 1.6 times faster decoding while maintaining competitive performance across multiple tasks.'}, 'zh': {'title': '双向扩散与RWKV的高效结合', 'desc': 'B³D-RWKV是一种结合扩散模型和RWKV架构的创新方法，旨在实现并行的双向处理，同时提高解码速度并保持竞争力的准确性。传统的因果变换器语言模型在解码时是严格顺序的，导致每一步的注意力计算成本呈平方级别。B³D-RWKV通过三元组块布局方法，将线性时间因果模型和离散扩散模型的优点结合起来，解决了它们之间的不一致性。实验结果表明，B³D-RWKV-7.2B在八项任务上与现有模型的准确性相当，但在解码吞吐量上显著超越基线，平均速度提升达到1.6倍。'}}}, {'id': 'https://huggingface.co/papers/2605.28691', 'title': 'OSP-Next: Efficient High-Quality Video Generation with Sparse Sequence Parallelism, HiF8 Quantization, and Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.28691', 'abstract': 'Abstract OSP-Next is an efficient text-to-video generation model that combines sparse attention, parallelism, quantization, and reinforcement learning to achieve high-quality video synthesis with reduced computational costs.  AI-generated summary Diffusion Transformers achieve strong video generation quality, but the quadratic cost of full attention limits efficiency. We introduce OSP-Next, an efficient text-to-video generation model that integrates sparse attention, parallelism, quantization, and reinforcement learning. OSP-Next uses a hybrid full-sparse attention architecture, where the sparse component is implemented with Skiparse-2D Attention. This fixed-pattern mechanism applies token-wise and group-wise sparse attention along spatial dimensions, leveraging locality while maintaining native compatibility with FlashAttention kernels. Based on the local equivalence of rearrangement in Skiparse-2D Attention, we further propose Sparse Sequence Parallelism (SSP), which partitions subsequences across ranks and switches sparse patterns through a single All-to-All communication. Compared with Ulysses Sequence Parallelism (SP), SSP provides a native parallel strategy for sparse attention and reduces communication volume by 75%. OSP-Next also incorporates HiF8 quantization to enable stable joint training with 8-bit quantization and sparse fine-tuning, and applies Mix-GRPO post-training to improve the performance of the sparse model. Experiments show that OSP-Next achieves a VBench total score of 83.73%, surpassing the Wan2.1 baseline. Under the 5-second 720P and 5-second 768P settings, OSP-Next achieves up to 1.64times single-GPU speedup and over 1.52times eight-GPU speedup on NVIDIA H200 GPUs. In addition, with only a 0.4% drop in VBench total score, OSP-Next-HiF8 achieves 1.69times and 2.27times speedups under the two settings on a single Ascend 950PR, demonstrating the efficiency and performance of OSP-Next across hardware platforms.', 'score': 17, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'c505db628ab773be', 'authors': ['Yunyang Ge', 'Xianyi He', 'Zezhong Zhang', 'Bin Lin', 'Bin Zhu', 'Xinhua Cheng', 'Li Yuan'], 'affiliations': ['Nanyang Technological University', 'Peking University', 'Rabbitpre AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.28691.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#training', '#inference', '#optimization', '#video', '#rlhf'], 'emoji': '⚡', 'ru': {'title': 'Быстрое видео из текста: разреженное внимание вместо полного', 'desc': 'OSP-Next — это эффективная модель для генерации видео из текста, которая использует разреженное внимание (sparse attention) вместо полного внимания трансформера, чтобы снизить квадратичную вычислительную сложность. Модель интегрирует параллелизм последовательностей, квантизацию и обучение с подкреплением для стабильного обучения с 8-битовой точностью. Архитектура использует гибридный подход с полным и разреженным вниманием, где разреженная часть реализована через Skiparse-2D Attention с фиксированным паттерном. Эксперименты показывают, что OSP-Next достигает ускорения вычислений в 1.6-2.3 раза на различных GPU при сохранении качества генерации видео на уровне 83.73% по метрике VBench.'}, 'en': {'title': 'Efficient Video Generation with OSP-Next', 'desc': 'OSP-Next is a novel model designed for generating videos from text, focusing on efficiency and quality. It utilizes sparse attention mechanisms to reduce computational costs while maintaining high video synthesis quality. The model incorporates techniques like parallel processing and quantization, allowing it to perform faster on various hardware setups. Experiments show that OSP-Next significantly outperforms previous models in speed and efficiency, making it a promising advancement in text-to-video generation.'}, 'zh': {'title': '高效文本到视频生成的未来', 'desc': 'OSP-Next是一种高效的文本到视频生成模型，结合了稀疏注意力、并行处理、量化和强化学习，以实现高质量的视频合成，同时降低计算成本。该模型采用混合的全稀疏注意力架构，通过Skiparse-2D注意力实现稀疏组件，利用空间维度的局部性来提高效率。OSP-Next还引入了稀疏序列并行性（SSP），通过单一的全对全通信来切换稀疏模式，从而减少通信量。实验结果表明，OSP-Next在多个设置下显著提高了生成速度和性能，展示了其在不同硬件平台上的高效性。'}}}, {'id': 'https://huggingface.co/papers/2605.28109', 'title': 'Long Live The Balance: Information Bottleneck Driven Tree-based Policy Optimization', 'url': 'https://huggingface.co/papers/2605.28109', 'abstract': "Abstract Researchers developed a new metric called IB-Score based on Information Bottleneck theory to evaluate exploration-exploitation balance in online reinforcement learning for large language models, and proposed IB-TPO framework that improves sampling efficiency and performance over existing methods.  AI-generated summary Recent advances in online reinforcement learning (RL) for large language models (LLMs) have demonstrated promising performance in complex reasoning tasks. However, they often exhibit an imbalanced exploration-exploitation trade-off, resulting in unstable optimization and sub-optimal performance. We introduce IB-Score, a novel metric grounded in Information Bottleneck theory that evaluates policy's exploration-exploitation balance by quantifying the trade-off between step-level reasoning diversity and mutual information shared with the correct answer. Analysis based on IB-Score shows that popular online RL approaches (e.g., GRPO) with common regularizers fail to consistently maintain balance during training with suboptimal results. To address this, we propose Information Bottleneck-driven Tree-based Policy Optimization (IB-TPO), a principled framework that formulates IB-Score as a fine-grained optimization objective and utilizes a novel IB-guided tree sampling strategy that not only improves the efficiency of online sampling with 50% more trajectories under the same token budget, but also reuses the tree structure for effective IB-Score Monte Carlo estimation. Extensive experiments across standard benchmarks show that our method significantly outperforms GRPO baseline by 2.9% to 3.6% and also outperforms other state-of-the-art online RL approaches. Our code is available at https://github.com/alibaba/EfficientRL.", 'score': 16, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '7ac2c2e3100f0364', 'authors': ['Hao Jiang', 'Shurui Li', 'Tianpeng Bu', 'Bowen Xu', 'Xin Liu', 'Qihua Chen', 'Hongtao Duan', 'Lulu Hu', 'Bin Yang', 'Minying Zhang'], 'affiliations': ['Alibaba Cloud Computing, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.28109.jpg', 'data': {'categories': ['#training', '#benchmark', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Поиск идеального баланса: Information Bottleneck для оптимизации обучения языковых моделей', 'desc': 'Исследователи разработали метрику IB-Score на основе теории Information Bottleneck для оценки баланса между исследованием и использованием в online reinforcement learning для больших языковых моделей. Авторы показали, что популярные методы онлайн обучения с подкреплением, такие как GRPO, часто нарушают этот баланс, что приводит к нестабильной оптимизации. Они предложили фреймворк IB-TPO, который использует древовидную стратегию выборки для улучшения эффективности сэмплирования на 50% при том же бюджете токенов. Экспериментальные результаты демонстрируют значительное улучшение производительности на 2.9-3.6% по сравнению с существующими методами.'}, 'en': {'title': 'Balancing Exploration and Exploitation in RL with IB-Score', 'desc': 'This paper introduces a new metric called IB-Score, which is based on Information Bottleneck theory, to assess the balance between exploration and exploitation in online reinforcement learning for large language models. The authors highlight that existing methods often struggle with this balance, leading to unstable optimization and less effective performance. To improve this, they propose the IB-TPO framework, which optimizes the IB-Score as a key objective and employs a novel tree sampling strategy to enhance sampling efficiency. Their experiments demonstrate that IB-TPO significantly outperforms traditional methods, achieving better results while using the same computational resources.'}, 'zh': {'title': '探索与利用的平衡新标准', 'desc': '研究人员基于信息瓶颈理论开发了一种新的指标，称为IB-Score，用于评估在线强化学习中探索与利用的平衡，特别是在大型语言模型的应用中。该研究提出了IB-TPO框架，通过将IB-Score作为优化目标，改进了采样效率和性能。分析表明，现有的在线强化学习方法在训练过程中无法保持良好的平衡，导致次优结果。通过引入新的树结构采样策略，IB-TPO在相同的令牌预算下提高了50%的轨迹采样效率，并在标准基准测试中显著超越了现有方法。'}}}, {'id': 'https://huggingface.co/papers/2605.28534', 'title': 'GUI-CIDER: Mid-training GUI Agents via Causal Internalization and Density-aware Exemplar Reselection', 'url': 'https://huggingface.co/papers/2605.28534', 'abstract': "Abstract GUI-CIDER is a mid-training method that explicitly incorporates GUI world knowledge through causal internalization and density-aware exemplar reselection to improve GUI agent performance.  AI-generated summary Despite the rapid progress of multimodal large language models in building Graphical User Interface (GUI) agents, their real-world task completion is fundamentally bottlenecked by a lack of world knowledge about GUI operations. Existing solutions typically rely on expensive multi-agent scaffolding or conventional post-training paradigms, such as Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL). However, post-training only allows agents to implicitly absorb world knowledge through action annotations or reward signals, leading to inefficient trajectory memorization rather than genuine comprehension. Therefore, an approach that enables explicit learning of this knowledge is imperative. To this end, we propose GUI-CIDER, a mid-training method that explicitly internalizes GUI world knowledge through Causal Internalization and Density-aware Exemplar Reselection. GUI-CIDER operates in three stages: (1) data synthesis, which distills static planning and dynamic causal knowledge from GUI trajectories into text; (2) exemplar reselection, which filters the corpus by rewarding causal structures and penalizing semantic redundancy; and (3) mid-training, where the refined data is used to embed the acquired knowledge. Extensive experiments on two GUI knowledge benchmarks and three task completion benchmarks demonstrate that GUI-CIDER consistently improves both the agent's understanding of GUI operations and its task success rates.The codes are available at https://github.com/Wuzheng02/GUI-CIDER.", 'score': 16, 'issue_id': 2333, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '1258e6b65e872831', 'authors': ['Zheng Wu', 'Chengcheng Han', 'Zhengxi Lu', 'Tianjie Ju', 'Yanyu Chen', 'Qi Gu', 'Xunliang Cai', 'Zhuosheng Zhang'], 'affiliations': ['Meituan', 'School of Computer Science, Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28534.jpg', 'data': {'categories': ['#multimodal', '#data', '#training', '#agents', '#benchmark'], 'emoji': '🖥️', 'ru': {'title': 'Явное внедрение причинных знаний о GUI для эффективного обучения агентов', 'desc': 'GUI-CIDER — это метод промежуточного обучения, который явно внедряет знания о графических интерфейсах в multimodal большие языковые модели через причинную интернализацию и переотбор примеров на основе плотности. Метод решает проблему недостатка знаний о GUI-операциях путём синтеза данных, который извлекает статические и динамические причинно-следственные связи из траекторий взаимодействия. Переотбор примеров фильтрует корпус, поощряя причинные структуры и штрафуя семантическую избыточность, что позволяет избежать простого запоминания. Экспериментальные результаты показывают, что GUI-CIDER значительно улучшает понимание агентом GUI-операций и повышает успешность выполнения реальных задач.'}, 'en': {'title': 'Empowering GUI Agents with Explicit Knowledge through GUI-CIDER', 'desc': 'GUI-CIDER is a novel mid-training method designed to enhance the performance of GUI agents by integrating explicit world knowledge about GUI operations. It addresses the limitations of traditional post-training methods, which often lead to superficial understanding through action annotations and reward signals. The approach consists of three key stages: synthesizing data from GUI trajectories, filtering this data to focus on causal relationships, and embedding the refined knowledge during mid-training. Experimental results show that GUI-CIDER significantly improves both the comprehension of GUI tasks and the success rates of agents in real-world applications.'}, 'zh': {'title': '显式学习GUI知识，提升代理性能', 'desc': 'GUI-CIDER是一种中期训练方法，通过因果内化和密度感知示例重新选择，显式地将图形用户界面（GUI）世界知识融入到GUI代理的训练中，以提高其性能。现有的解决方案通常依赖于昂贵的多代理支架或传统的后期训练方法，如监督微调（SFT）和强化学习（RL），但这些方法只能通过动作注释或奖励信号来隐式吸收世界知识。GUI-CIDER通过三个阶段的操作，包括数据合成、示例重新选择和中期训练，来实现对GUI知识的显式学习。实验结果表明，GUI-CIDER显著提高了代理对GUI操作的理解和任务成功率。'}}}, {'id': 'https://huggingface.co/papers/2605.23163', 'title': 'Fast-dDrive: Efficient Block-Diffusion VLM for Autonomous Driving', 'url': 'https://huggingface.co/papers/2605.23163', 'abstract': 'Abstract Fast-dDrive introduces a block-diffusion Vision-Language-Action model for autonomous driving that improves efficiency and accuracy through structured token freezing, section-aware training, and speculative decoding techniques.  AI-generated summary End-to-end autonomous driving via Vision-Language-Action (VLA) models demands a precarious balance between high-fidelity trajectory planning and efficient inference. Existing paradigms typically fall short: autoregressive (AR) VLAs are memory-bandwidth-bound on edge hardware and prone to exposure-bias drift, while full-sequence diffusion models preclude KV-cache reuse and suffer from "logical leakage" that violates the fundamental perceive-then-plan causality. We present Fast-dDrive, a block-diffusion VLA that performs bidirectional refinement within semantic units while enforcing strict causal ordering across them. Leveraging the observation that driving VLAs often emit structured JSON-like outputs, Fast-dDrive freezes structural tokens into a section scaffold and employs a section-aware training recipe that prioritizes safety-critical planning. We further introduce Scaffold Speculative Decoding to achieve AR-equivalent quality at significantly higher throughput. Finally, we propose a low-overhead test-time scaling scheme: by forking N stochastic trajectory rollouts from a single shared-prefix KV cache and averaging them, we effectively suppress prediction variance at a fractional computational cost. Empirical results demonstrate that Fast-dDrive redefines the speed-accuracy frontier for driving agents. On the WOD-E2E test set, Fast-dDrive achieves SOTA ADE@3s and ADE@5s, alongside the highest RFS among diffusion-based VLAs; on nuScenes, it reduces average L2 error to 0.32m (a 22% improvement). When integrated with SGLang, our framework delivers 12times throughput speedup over the AR baseline, narrowing the gap between high-capacity VLAs and the efficiency demands of real-time on-vehicle deployment.', 'score': 15, 'issue_id': 2330, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'c7fd1a9280539b8f', 'authors': ['Kewei Zhang', 'Jin Wang', 'Sensen Gao', 'Chengyue Wu', 'Yulong Cao', 'Songyang Han', 'Boris Ivanovic', 'Langechuan Liu', 'Marco Pavone', 'Song Han', 'Daquan Zhou', 'Enze Xie'], 'affiliations': ['MIT', 'NVIDIA', 'Peking University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.23163.jpg', 'data': {'categories': ['#agents', '#architecture', '#training', '#multimodal', '#diffusion', '#optimization', '#cv', '#inference'], 'emoji': '🚗', 'ru': {'title': 'Блочная диффузия для скоростного и точного автономного вождения', 'desc': 'Fast-dDrive представляет блочно-диффузионную модель Vision-Language-Action для автономного вождения, которая балансирует высокую точность планирования траектории с эффективностью вычислений. Модель использует замораживание структурных токенов и послойное обучение для соблюдения причинно-следственной связи между восприятием и планированием, избегая проблем авторегрессивных и полносеквентных диффузионных подходов. Авторы предлагают спекулятивное декодирование со скаффолдингом и схему тестирования с множественными стохастическими траекториями для подавления дисперсии предсказаний. Модель достигает лучших результатов по метрикам ADE и RFS, обеспечивая 12-кратное ускорение при сохранении качества на уровне больших VLA-моделей.'}, 'en': {'title': 'F
