ast-dDrive: Redefining Speed and Accuracy in Autonomous Driving', 'desc': 'Fast-dDrive is a novel Vision-Language-Action (VLA) model designed for autonomous driving that enhances both efficiency and accuracy. It utilizes structured token freezing and section-aware training to maintain a strict causal order in trajectory planning, addressing issues like exposure-bias drift and logical leakage found in previous models. The model introduces Scaffold Speculative Decoding, which allows for high-quality outputs at a much faster rate compared to traditional autoregressive methods. Empirical results show that Fast-dDrive significantly improves performance metrics, achieving state-of-the-art results in trajectory accuracy while also increasing throughput for real-time applications.'}, 'zh': {'title': '快速高效的自动驾驶模型', 'desc': 'Fast-dDrive是一种块扩散的视觉-语言-动作模型，专为自动驾驶设计，旨在通过结构化的令牌冻结、区域感知训练和推测解码技术提高效率和准确性。该模型解决了现有自回归模型在边缘硬件上的内存带宽限制和逻辑泄漏问题，确保了感知与规划的因果关系。通过将结构化令牌固定在区域框架中，Fast-dDrive优先考虑安全关键的规划，并实现了更高的推理速度。实验证明，Fast-dDrive在速度和准确性方面重新定义了自动驾驶代理的性能边界。'}}}, {'id': 'https://huggingface.co/papers/2605.27491', 'title': 'GE-Sim 2.0: A Roadmap Towards Comprehensive Closed-loop Video World Simulators for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2605.27491', 'abstract': 'Abstract GE-Sim 2.0 is a closed-loop video world simulator for robotic manipulation that improves action-following fidelity through real-world data retraining and incorporates modules for state decoding, world scoring, and accelerated inference to enable scalable policy learning.  AI-generated summary We introduce GE-Sim 2.0 (Genie Envisioner World Simulator 2.0), a closed-loop video world simulator for robotic manipulation. Building on the action-conditioned video generation framework of Genie Envisioner, GE-Sim 2.0 is re-trained on thousands of hours of real-world robot data spanning teleoperation, contact-rich interaction, and on-robot policy deployment, substantially improving action-following fidelity and trajectory coverage. On top of this foundation, three new modules close the loop from video simulation to policy learning: a state expert that decodes proprioceptive state from video latents to support next-chunk prediction by downstream VLA policies; a world judge that scores generated rollouts against task instructions, yielding machine-verifiable success signals and rewards in place of manual inspection; and an acceleration framework that delivers a 25-frame rollout in 2.3 seconds on a single H100, with up to 4* frame skipping at inference for long-horizon evaluation. GE-Sim 2.0 tops the public WorldArena leaderboard at only 2B parameters, outperforming both dedicated robotic world models and closed-source general video generators, and policies trained against its rollouts and rewards translate into measurable real-world gains, establishing GE-Sim 2.0 as a practical platform for scalable evaluation and closed-loop learning of manipulation policies.', 'score': 13, 'issue_id': 2331, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '99fccf45e5a52588', 'authors': ['Boxiang Qiu', 'Liliang Chen', 'Yue Liao', 'Nan Wang', 'Lintao Wang', 'Jiayi Luo', 'Wenzhi Zhao', 'Shengcong Chen', 'Di Chen', 'Ye Li', 'Chen Gao', 'Shuicheng Yan', 'Si Liu', 'Maoqing Yao', 'Guanghui Ren'], 'affiliations': ['AgiBot', 'BUAA', 'LV-NUS Lab', 'TJU'], 'pdf_title_img': 'assets/pdf/title_img/2605.27491.jpg', 'data': {'categories': ['#video', '#training', '#robotics', '#inference'], 'emoji': '🤖', 'ru': {'title': 'Видео-симуляция для масштабируемого обучения роботов через закрытый цикл', 'desc': 'GE-Sim 2.0 — это закрытая видео-симуляция мира для обучения роботов манипуляции, переобученная на тысячах часов реальных данных робота для повышения точности следования действиям. Система добавляет три ключевых модуля: декодер состояния для извлечения проприоцептивной информации из видео, судью мира для автоматической оценки успеха задачи через машинную верификацию, и ускоренный инференс, достигающий генерации 25 кадров за 2.3 секунды. Модель с 2 миллиардами параметров превосходит как специализированные модели физики, так и закрытые генераторы видео, лидируя в публичном рейтинге WorldArena. Политики, обученные на роллаутах этой симуляции, демонстрируют измеримые улучшения при применении в реальном мире, делая GE-Sim 2.0 практической платформой для масштабируемого обучения политик манипуляции.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with GE-Sim 2.0', 'desc': 'GE-Sim 2.0 is an advanced video world simulator designed for robotic manipulation, enhancing the accuracy of action-following through retraining with real-world data. It integrates three key modules: a state expert for decoding robot states from video, a world judge for scoring task performance, and an acceleration framework for efficient rollout generation. This system allows for scalable policy learning by providing machine-verifiable success signals and rapid inference capabilities. With its superior performance on the WorldArena leaderboard, GE-Sim 2.0 demonstrates significant improvements in both simulated and real-world robotic tasks.'}, 'zh': {'title': 'GE-Sim 2.0：提升机器人操作的闭环视频模拟平台', 'desc': 'GE-Sim 2.0 是一个用于机器人操作的闭环视频世界模拟器，通过真实世界数据的再训练提高了动作跟随的准确性。它结合了状态解码、世界评分和加速推理模块，使得策略学习更加可扩展。新模块包括一个状态专家，用于从视频潜变量中解码自我感知状态，以及一个世界评估器，用于根据任务指令评分生成的结果。GE-Sim 2.0 在公共 WorldArena 排行榜上名列前茅，展示了其在机器人操作策略评估和闭环学习中的实用性。'}}}, {'id': 'https://huggingface.co/papers/2605.27760', 'title': 'SkillGrad: Optimizing Agent Skills Like Gradient Descent', 'url': 'https://huggingface.co/papers/2605.27760', 'abstract': 'Abstract SkillGrad is a gradient-descent-inspired framework that optimizes agent skills through trajectory-level loss evidence and text-based gradients, enhancing skill reliability and performance in specialized domains.  AI-generated summary Agent skills provide a lightweight way to adapt LLM agents to specialized domains by storing reusable procedural knowledge in structured files. However, whether downloaded from third parties or self-generated, these skills are often unreliable, incomplete, or outdated. Existing skill-evolution methods often address these deficiencies through heuristic reflections without an explicit optimization formulation. In this paper, we propose SkillGrad, a gradient-descent-inspired framework for optimizing agent skills. SkillGrad treats the skill package as a structured parameter to optimize in a gradient descent fashion: task executions provide trajectory-level loss evidence, automatic diagnoses then provide text-based gradients that indicate the correction directions. To stabilize optimization across iterations, a momentum agent accumulates recurring diagnostic patterns into a persistent memory overlay. Finally, an LLM-based patcher executes the parameter update by applying layer-aware edits to the skill package. Evaluated on SpreadsheetBench Verified and WikiTableQuestions, SkillGrad consistently outperforms training-based skill evolution baselines across two backbone LLMs, improving over the strongest training-based baseline by 6.7 percentage points on average. Ablations further show that momentum and contrastive diagnosis both contribute to the final skill quality.', 'score': 12, 'issue_id': 2331, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '7b3e698c308d0002', 'authors': ['Hanyu Wang', 'Yifan Lan', 'Bochuan Cao', 'Lu Lin', 'Jinghui Chen'], 'affiliations': ['College of Information Sciences and Technology, The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27760.jpg', 'data': {'categories': ['#agents', '#optimization', '#training'], 'emoji': '⬆️', 'ru': {'title': 'Градиентный спуск для совершенствования навыков агентов', 'desc': 'SkillGrad — это фреймворк, вдохновленный градиентным спуском, который оптимизирует навыки агентов через анализ потерь на уровне траекторий и текстовые градиенты. Система рассматривает пакет навыков как структурированный параметр, который улучшается итеративно: выполнение задач предоставляет свидетельства потерь, а автоматическая диагностика генерирует текстовые градиенты с направлениями коррекции. Для стабилизации оптимизации используется механизм инерции, накапливающий диагностические паттерны в памяти, и LLM-based патчер применяет слой-ориентированные изменения к навыкам. Метод показывает значительное улучшение производительности по сравнению с базовыми подходами обучения на эталонных наборах данных.'}, 'en': {'title': 'Optimizing Agent Skills with Gradient Descent', 'desc': 'SkillGrad is a new framework designed to improve the reliability and performance of agent skills in specialized tasks using a gradient descent approach. It optimizes skills by analyzing the outcomes of task executions to gather loss evidence and using text-based gradients for corrective feedback. The framework incorporates a momentum agent that retains useful diagnostic patterns to enhance stability during the optimization process. Evaluations demonstrate that SkillGrad significantly outperforms existing methods, leading to better skill quality in various applications.'}, 'zh': {'title': 'SkillGrad：优化代理技能的新方法', 'desc': 'SkillGrad 是一个灵感来源于梯度下降的框架，旨在通过轨迹级损失证据和基于文本的梯度来优化代理技能，从而提高技能的可靠性和在专业领域的表现。该框架将技能包视为一个结构化参数，通过梯度下降的方式进行优化，任务执行提供轨迹级损失证据，自动诊断则提供指示修正方向的文本梯度。为了在迭代中稳定优化，动量代理会将重复的诊断模式积累到持久内存中。经过在 SpreadsheetBench Verified 和 WikiTableQuestions 上的评估，SkillGrad 在两个基础 LLM 上的表现均优于基于训练的技能演化基线，平均提高了 6.7 个百分点。'}}}, {'id': 'https://huggingface.co/papers/2605.27354', 'title': 'Guiding LLM Post-training Data Engineering with Model Internals from Sparse Autoencoders', 'url': 'https://huggingface.co/papers/2605.27354', 'abstract': 'Abstract SAERL uses Sparse Autoencoder-derived signals from model internals to enhance LLM reinforcement learning through diversity control, difficulty-aware curriculum learning, and quality-based data filtering.  AI-generated summary Model internals encode rich information about how a large language model (LLM) processes its training data; however, post-training data engineering largely relies on external signals and ignores rich intrinsic signals lying in model internals. We propose SAERL, a data engineering framework for LLM reinforcement learning (RL). It models three intrinsic data properties: diversity, difficulty, and quality, using model internals extracted with Sparse Autoencoder (SAE), an advanced mechanistic interpretability tool. Each property grounds a concrete data engineering operation: SAE-space clustering with moderate batch mixing for batch diversity control, a difficulty proxy for easy-to-hard curriculum ordering, and a quality probe for data filtering. SAERL improves average accuracy by 3.00% over vanilla GRPO and reaches target accuracy with 20% fewer training steps on Qwen2.5-Math-1.5B, with consistent gains across model scales and RL algorithms. Experiments show that SAE transfers effectively across model families and scales, serving as a lightweight and reusable data engineering tool. These results demonstrate that model internals are a powerful and practical source of signals for post-training data engineering.', 'score': 12, 'issue_id': 2330, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '3111da52992fb620', 'authors': ['Yi Jing', 'Zao Dai', 'Jinwu Hu', 'Zijun Yao', 'Lei Hou', 'Juanzi Li', 'Xiaozhi Wang'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27354.jpg', 'data': {'categories': ['#training', '#data', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Внутренние сигналы моделей как источник инженерии данных для обучения с подкреплением', 'desc': 'В статье предложена система SAERL, которая использует сигналы от Sparse Autoencoder для улучшения обучения LLM с подкреплением. Метод моделирует три важных свойства данных: разнообразие, сложность и качество, извлекаемые из внутренних представлений модели с помощью механистической интерпретируемости. На основе этих свойств применяются три операции инженерии данных: кластеризация для контроля разнообразия батчей, curriculum learning для упорядочения примеров от простого к сложному, и фильтрация низкокачественных примеров. Эксперименты показывают значительное улучшение точности на 3% и снижение числа шагов обучения на 20% по сравнению с базовыми методами.'}, 'en': {'title': 'Unlocking LLM Potential with Intrinsic Signals', 'desc': 'The paper introduces SAERL, a framework that enhances reinforcement learning (RL) for large language models (LLMs) by utilizing signals derived from Sparse Autoencoders (SAE). It focuses on three intrinsic data properties: diversity, difficulty, and quality, which are essential for effective data engineering. By leveraging model internals, SAERL implements operations like clustering for diversity control, a difficulty proxy for curriculum learning, and quality filtering for data selection. The results show that SAERL improves accuracy and reduces training time, highlighting the importance of intrinsic signals in optimizing LLM performance.'}, 'zh': {'title': '利用模型内部信号提升强化学习效果', 'desc': 'SAERL是一种数据工程框架，旨在通过利用稀疏自编码器(SAE)提取的模型内部信号来增强大型语言模型(LLM)的强化学习。该框架关注三个内在数据特性：多样性、难度和质量，并通过相应的数据工程操作进行建模。具体来说，它使用SAE空间聚类来控制批次多样性，利用难度代理进行课程排序，以及通过质量探测器进行数据过滤。实验结果表明，SAERL在提高模型准确性和减少训练步骤方面表现出色，证明了模型内部信号在后期数据工程中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.28721', 'title': 'LiveBrowseComp: Are Search Agents Searching, or Just Verifying What They Already Know?', 'url': 'https://huggingface.co/papers/2605.28721', 'abstract': 'Abstract LLM search agents demonstrate reliance on internal knowledge rather than external verification, with performance dropping significantly when answer-supporting evidence is removed, leading to the introduction of a dynamic benchmark to better evaluate true search capabilities.  AI-generated summary Are LLM-based search agents genuinely searching, or using the web to verify what they already know? We study this question on BrowseComp with three diagnostics. Our analysis reveals Intrinsic Knowledge Dependence (IKD): even with tool access, agents often rely on intrinsic knowledge -- information encoded in the model before retrieval -- rather than on external evidence. Agents answer up to 44.5% of BrowseComp questions without tools, generate more than half of their search queries from internally produced hypotheses rather than retrieved leads, and perform worse than closed-book baselines when answer-supporting evidence is removed. These results suggest that static search benchmarks can reward memory-backed verification rather than evidence-driven discovery, conflating what agents already know with what they can find. We then introduce LiveBrowseComp, a deep-search benchmark designed to evaluate agents beyond intrinsic coverage. It contains 335 human-authored questions whose answers depend on facts published within the 90 days preceding benchmark construction, drawn from six updated sources and filtered to exclude globally salient events. On LiveBrowseComp, all evaluated agents fall below 2% closed-book accuracy, search-augmented scores drop by 25-40 points relative to BrowseComp, and prior model rankings no longer reliably predict performance. LiveBrowseComp is available at https://huggingface.co/datasets/Forival/LiveBrowseComp.', 'score': 11, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'f5e04b51f6b50c1e', 'authors': ['HuiMing Fan', 'Xiao Wang', 'Zheng Chu', 'Qianyu Wang', 'Zhuoyao Wang', 'Ming Liu', 'Bing Qin', 'XingYu'], 'affiliations': ['Harbin Institute of Technology', 'Xiaohongshu'], 'pdf_title_img': 'assets/pdf/title_img/2605.28721.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Агенты ищут в интернете или проверяют то, что уже знают?', 'desc': 'Исследование показывает, что LLM-агенты при поиске информации в основном полагаются на знания, уже закодированные в модели, а не на извлечение внешних данных. Авторы обнаружили феномен зависимости от внутренних знаний: агенты отвечают на значительную часть вопросов без использования инструментов и генерируют запросы на основе собственных гипотез. Статические бенчмарки вознаграждают проверку памяти, а не поиск нового доказательства, скрывая истинные возможности поиска. Для решения этой проблемы предложен динамический бенчмарк LiveBrowseComp с вопросами на основе свежих данных, где все модели показывают значительное падение производительности.'}, 'en': {'title': 'Evaluating True Search Capabilities in LLMs with LiveBrowseComp', 'desc': "This paper investigates the performance of large language model (LLM) search agents and their reliance on intrinsic knowledge rather than external verification. The study reveals a phenomenon called Intrinsic Knowledge Dependence (IKD), where agents often answer questions based on pre-existing knowledge instead of retrieving new information. To address this issue, the authors introduce LiveBrowseComp, a dynamic benchmark that evaluates agents' true search capabilities by requiring answers to be based on recent information. The findings indicate that traditional benchmarks may misrepresent agents' abilities by favoring memory-based responses over genuine evidence-driven search."}, 'zh': {'title': '揭示搜索代理的知识依赖性', 'desc': '本论文探讨了大型语言模型（LLM）搜索代理的内部知识依赖性，发现它们在没有外部证据的情况下表现显著下降。研究表明，即使在可以使用工具的情况下，代理仍然倾向于依赖模型内部编码的信息，而不是外部信息。为了解决这一问题，作者提出了一个新的动态基准测试LiveBrowseComp，以更好地评估搜索能力。该基准测试包含335个问题，其答案依赖于最近90天内发布的事实，旨在促进基于证据的发现而非仅仅依赖记忆。'}}}, {'id': 'https://huggingface.co/papers/2605.28398', 'title': 'HRBench: Benchmarking and Understanding Thinking-Mode Switch Strategies in Hybrid-Reasoning LLMs', 'url': 'https://huggingface.co/papers/2605.28398', 'abstract': 'Abstract HRBench presents a unified evaluation framework for hybrid-reasoning LLMs that systematically compares thinking-mode switching strategies across different training regimes and model scales.  AI-generated summary Hybrid-reasoning large language models (LLMs) expose explicit controls over reasoning effort, allowing users or systems to trade off answer quality against inference cost. However, existing methods for adaptive thinking-mode selection are typically evaluated under different models, datasets, and implementation assumptions, making it difficult to compare their practical behavior. We introduce HRBench, a unified evaluation framework for studying thinking-mode switching in hybrid-reasoning LLMs. HRBench organizes the design space along two axes: three switching strategy families, prompt-based selection, external routing, and speculative execution, and four training regimes, training-free, SFT, offline and online RL, yielding 12 controlled evaluation settings. We evaluate these settings across 6 LLMs, from Qwen3.5-2B to Kimi-K2.5-1.1T, and 5 reasoning benchmarks covering mathematics, science, and code, while reimplementing 12+ representative prior methods within the same pipeline. Our analysis characterizes how different switching strategies occupy distinct effectiveness-efficiency trade-off regions: prompt-based methods often provide favorable token-accuracy trade-offs, routing methods offer more stable cost reduction, and speculative methods tend to improve accuracy at higher token cost. We further find that training affects strategies differently, and that the preferred strategy varies with model scale and task domain. HRBench provides reference implementations and a unified evaluation platform to support more controlled research on efficient reasoning in hybrid-reasoning LLMs. Our data, code and repository are available at https://github.com/usail-hkust/HRBench.', 'score': 10, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '8cec300c97fa5225', 'authors': ['Yansong Ning', 'Mianpeng Liu', 'Jingwen Ye', 'Weidong Zhang', 'Hao Liu'], 'affiliations': ['AI Thrust, The Hong Kong University of Science and Technology (Guangzhou)', 'AIPD, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.28398.jpg', 'data': {'categories': ['#optimization', '#open_source', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Унифицированный бенчмарк для оптимизации затрат рассуждений в гибридных языковых моделях', 'desc': 'HRBench — это унифицированная платформа для оценки гибридных LLM, которые позволяют пользователям контролировать вычислительные затраты на рассуждение. В работе систематически сравниваются различные стратегии переключения режимов мышления, включая основанные на подсказках, внешнюю маршрутизацию и спекулятивное исполнение. Исследование охватывает разные режимы обучения и масштабы моделей от 2.5 млрд до 1.1 триллиона параметров. Результаты показывают, что разные стратегии занимают различные области компромисса между качеством ответа и эффективностью, причём оптимальный выбор зависит от размера модели и типа задачи.'}, 'en': {'title': 'HRBench: A Unified Framework for Evaluating Hybrid-Reasoning LLMs', 'desc': "HRBench is a new framework designed to evaluate hybrid-reasoning large language models (LLMs) by comparing different strategies for switching thinking modes. It organizes evaluation into 12 controlled settings based on three switching strategies and four training methods, allowing for systematic analysis across various model sizes and reasoning tasks. The study reveals how different strategies balance effectiveness and efficiency, showing that prompt-based methods excel in token-accuracy, while routing methods provide stable cost reductions. Additionally, the research highlights that the choice of strategy is influenced by the model's scale and the specific task being addressed."}, 'zh': {'title': 'HRBench：混合推理模型的统一评估框架', 'desc': 'HRBench是一个统一的评估框架，用于混合推理的大型语言模型（LLMs），系统地比较不同训练模式和模型规模下的思维模式切换策略。该框架设计了12种受控评估设置，涵盖了三种切换策略和四种训练方式，便于研究不同策略的有效性和效率。通过对6个LLM和5个推理基准的评估，发现不同的切换策略在效果和效率之间存在明显的权衡关系。HRBench为混合推理LLMs的高效推理研究提供了参考实现和统一评估平台。'}}}, {'id': 'https://huggingface.co/papers/2605.27028', 'title': 'Less is More: Early Stopping Rollout for On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.27028', 'abstract': 'Abstract On-policy distillation suffers from teacher decay issues with later tokens, which are mitigated by Early Stopping Rollout that restricts training to initial response tokens, improving efficiency and stability.  AI-generated summary On-policy distillation has recently emerged as a promising alternative to standard sequence-level imitation, training a student by scoring its own rollouts with a teacher model. However, we observe ``Off-policy Teacher Decay\'\' problem in this paradigm: for the later tokens, with student\'s earlier trajectory as context that is off-policy to the teacher, the teacher\'s ability to produce a corrective score would decay, and may fall back to token-completion behavior learned in the pre-training stage. We empirically verify this problem, and we propose Early Stopping Rollout (ESR) to fix it: a simple yet effective distillation strategy that simply restricts the rollout generation to the first   response tokens. We show that ESR both surpasses the full rollout OPD performance across model size, family, tasks and training regime, and exhibit much higher GPU efficiency and training stability, especially under cross model family scenarios. We further investigate the mechanism behind this surprising performance and discovered "Cascading Alignment" and "Sub-mode Commitment" effect of ESR that may explain why it works effectively and even sometimes exceeding the teacher model performance. Besides, we show that this position-based token selection strategy cannot be fully explainable by KL divergence and entropy signals.', 'score': 10, 'issue_id': 2329, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e1952f55e19ba659', 'authors': ['Zhou Ziheng', 'Jiaqi Li', 'Huacong Tang', 'Ying Nian Wu', 'Demetri Terzopoulos'], 'affiliations': ['Beijing Institute of General Artificial Intelligence', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.27028.jpg', 'data': {'categories': [], 'emoji': '✂️', 'ru': {'title': 'Ранняя остановка развёртки спасает дистилляцию от разложения учителя', 'desc': 'В статье изучается проблема дистилляции на политике, где учитель теряет качество при оценке поздних токенов студента, поскольку ранняя траектория студента не совпадает с распределением данных учителя. Авторы предлагают Early Stopping Rollout (ESR) — простую стратегию, которая ограничивает генерацию ответов только первыми токенами, что улучшает стабильность обучения и эффективность использования GPU. Эксперименты показывают, что ESR превосходит полную развёртку на разных размерах моделей, семействах архитектур и задачах. Исследование раскрывает механизмы работы ESR через эффекты каскадного выравнивания и фиксации подмоды, которые объясняют, почему ограничение длины может даже превзойти производительность учителя.'}, 'en': {'title': 'Enhancing On-Policy Distillation with Early Stopping Rollout', 'desc': "This paper addresses the challenges of on-policy distillation in machine learning, particularly the issue of 'Off-policy Teacher Decay' where the teacher model's scoring ability diminishes for later tokens in a sequence. The authors propose a solution called Early Stopping Rollout (ESR), which limits the training to only the initial response tokens, thereby enhancing both efficiency and stability during the training process. Through empirical studies, they demonstrate that ESR outperforms traditional full rollout methods across various model sizes and tasks, while also improving GPU efficiency. Additionally, the paper explores the underlying mechanisms of ESR, revealing effects like 'Cascading Alignment' and 'Sub-mode Commitment' that contribute to its effectiveness, even surpassing the performance of the teacher model in some cases."}, 'zh': {'title': '早停回滚：提升策略蒸馏效率的关键', 'desc': '本文探讨了在策略蒸馏中，教师模型在生成后续标记时的衰退问题。为了解决这一问题，提出了一种名为早停回滚（Early Stopping Rollout, ESR）的策略，该策略限制训练仅在初始响应标记上进行，从而提高了效率和稳定性。研究表明，ESR在不同模型规模、任务和训练方式下均优于传统的全回滚策略，并且在跨模型家族场景中表现出更高的GPU效率和训练稳定性。此外，本文还探讨了ESR的有效性机制，包括“级联对齐”和“子模式承诺”效应。'}}}, {'id': 'https://huggingface.co/papers/2605.26574', 'title': 'GradSentry: Gradient Spectral Entropy for Backdoor Sample Filtering in Large Language Model Fine-Tuning', 'url': 'https://huggingface.co/papers/2605.26574', 'abstract': 'Abstract GradSentry detects backdoor attacks in large language model fine-tuning by analyzing spectral entropy in per-sample gradients, working effectively across all poison ratios without clustering or training-specific modifications.  AI-generated summary Fine-tuning Large Language Models with untrusted data exposes models to backdoor attacks, where poisoned samples cause targeted misbehavior. Existing sample-filtering defenses rely on clustering, which requires sufficient data and can fail at extreme poison ratios. We propose GradSentry ({Grad}ient {Sentry}), a backdoor sample filtering method based on the spectral entropy of per-sample gradients. Our key finding is that poisoned samples produce gradients with higher spectral entropy compared to clean samples. GradSentry captures output-altering backdoor signatures using per-sample gradient spectra, avoiding pairwise sample comparisons and clustering during feature construction. Importantly, our method is training-agnostic: it works for both parameter-efficient fine-tuning methods like LoRA and full-parameter tuning, as the gradient analysis operates independently of which parameters are being updated during training. GradSentry requires no clustering, operates effectively across all poison ratios (1%--90%), and introduces minimal computational overhead (20-50ms per sample for 7B model). Evaluation on four QA datasets and four attack types demonstrates the effectiveness of spectral entropy for backdoor detection. Code is available at https://github.com/dongdongzhaoUP/GradSentry.', 'score': 9, 'issue_id': 2331, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'ee59589beff89cb5', 'authors': ['Haodong Zhao', 'Tianyi Xu', 'Tianhang Zhao', 'Zhuosheng Zhang', 'Gongshen Liu'], 'affiliations': ['School of Computer Science, Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.26574.jpg', 'data': {'categories': [], 'emoji': '🚨', 'ru': {'title': 'Защита от скрытых атак в fine-tuning через спектральную энтропию градиентов', 'desc': 'GradSentry — это метод для обнаружения скрытых атак в больших языковых моделях во время fine-tuning путём анализа спектральной энтропии градиентов отдельных примеров. Основная находка работы заключается в том, что отравленные образцы производят градиенты с более высокой спектральной энтропией по сравнению с чистыми данными. Метод работает независимо от типа тренировки (полная настройка параметров или parameter-efficient методы вроде LoRA) и не требует кластеризации, что делает его эффективным при любых уровнях отравления данных. GradSentry добавляет минимальные вычислительные затраты и показал высокую эффективность на нескольких наборах данных для различных типов атак.'}, 'en': {'title': 'Detecting Backdoor Attacks with Gradient Spectral Entropy', 'desc': 'GradSentry is a method designed to detect backdoor attacks in large language models during fine-tuning by analyzing the spectral entropy of gradients for each sample. It identifies poisoned samples, which typically exhibit higher spectral entropy compared to clean ones, without relying on clustering or specific training modifications. This approach is effective across various poison ratios, from 1% to 90%, and is compatible with different fine-tuning techniques, including both parameter-efficient and full-parameter tuning. GradSentry operates with minimal computational overhead, making it a practical solution for ensuring the integrity of models trained on untrusted data.'}, 'zh': {'title': 'GradSentry：高效检测后门攻击的梯度谱熵方法', 'desc': 'GradSentry是一种检测大语言模型微调中后门攻击的方法。它通过分析每个样本梯度的谱熵来识别被污染的样本，而不需要聚类或特定训练的修改。研究发现，被污染样本的梯度谱熵通常高于干净样本。GradSentry适用于各种毒化比例，并且在计算上开销很小，能够有效地进行后门检测。'}}}, {'id': 'https://huggingface.co/papers/2605.27268', 'title': 'Lost in Sampling: Assessing Lexical Reachability in LLMs via the Word Coverage Score (WCS)', 'url': 'https://huggingface.co/papers/2605.27268', 'abstract': 'Abstract Standard sampling filters in large language models unintentionally suppress linguistic diversity by pruning contextually appropriate vocabulary, creating a homogenized output despite vast latent vocabularies.  AI-generated summary Modern Large Language Models (LLMs) are often criticized for producing repetitive and homogeneous text, despite possessing vast latent vocabularies. While previous research has focused on model knowledge and training data, we investigate the role of decoding mechanics in suppressing linguistic diversity. We introduce the Word Coverage Score (WCS), a metric that quantifies the extent to which contextually appropriate human vocabulary is mathematically pruned by standard sampling filters (e.g., Top-p, Top-k, and Min-p). Rather than assessing static knowledge, the WCS measures the lexical survival rate of low-frequency, high-information human words as a function of sampling parameters. By auditing open-weight models on human-authored corpus fragments, we identify which logical lexical choices are rendered unreachable by the decoder, even when they reside within the probability space. Our results provide quantitative evidence that industry-standard sampling defaults act as unintended censorship mechanisms, smoothing the unique textures of human expression into a homogenized discourse. The WCS offers a rigorous framework for optimizing the trade-off between text coherence and lexical richness, providing a diagnostic tool for preserving the diversity of human language in generative models.', 'score': 9, 'issue_id': 2330, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'b016527301b0df00', 'authors': ['Samer Awad', 'Javier Conde', 'Carlos Arriaga', 'Tairan Fu', 'Javier Coronado-Blázquez', 'Pedro Reviriego'], 'affiliations': ['Banco de España', 'Politecnico di Milano', 'Universidad Politécnica de Madrid'], 'pdf_title_img': 'assets/pdf/title_img/2605.27268.jpg', 'data': {'categories': [], 'emoji': '🔤', 'ru': {'title': 'Освобождение скрытого словаря: как методы фильтрации подавляют лингвистическое разнообразие LLM', 'desc': 'Исследование показывает, что стандартные методы фильтрации при декодировании больших языковых моделей (Top-p, Top-k и Min-p) непреднамеренно подавляют лингвистическое разнообразие, удаляя контекстуально подходящие слова из вероятностного пространства. Авторы предлагают метрику Word Coverage Score (WCS), которая количественно оценивает, в какой степени алгоритмы фильтрации исключают низкочастотные, но высокоинформативные слова из человеческого лексикона. Через анализ открытых моделей на корпусах текстов, написанных людьми, выявлено, что стандартные параметры декодирования действуют как скрытые механизмы цензуры, нивелируя уникальность человеческого выражения. WCS предоставляет инструмент для оптимизации баланса между связностью текста и богатством словарного запаса, помогая сохранить разнообразие естественного языка в генеративных моделях.'}, 'en': {'title': 'Preserving Linguistic Diversity in AI Text Generation', 'desc': 'This paper addresses the issue of linguistic diversity in outputs generated by large language models (LLMs). It highlights how standard sampling filters, like Top-p and Top-k, unintentionally limit the variety of vocabulary used, leading to repetitive text. The authors introduce a new metric called the Word Coverage Score (WCS) to measure how much contextually relevant vocabulary is suppressed by these filters. Their findings suggest that these sampling methods act as censorship, reducing the richness of human language in AI-generated content.'}, 'zh': {'title': '优化语言模型，保留语言多样性', 'desc': '这篇论文探讨了大型语言模型在生成文本时如何无意中抑制语言多样性。研究发现，标准的采样过滤器（如Top-p和Top-k）会削减上下文中适当的词汇，导致输出文本的同质化。作者提出了一个新的指标——词汇覆盖率得分（WCS），用于量化这些过滤器对人类词汇的影响。通过分析开放权重模型，研究表明行业标准的采样设置实际上会作为一种无意的审查机制，影响文本的独特性和丰富性。'}}}, {'id': 'https://huggingface.co/papers/2605.19952', 'title': 'Rethinking How to Remember: Beyond Atomic Facts in Lifelong LLM Agent Memory', 'url': 'https://huggingface.co/papers/2605.19952', 'abstract': 'Abstract TriMem enables reliable long-term interaction for LLM agents by maintaining multiple memory representation granularities and using TextGrad-based prompt optimization for continuous improvement.  AI-generated summary To enable reliable long-term interaction, LLM agents require a memory system that can faithfully store, efficiently retrieve, and deeply reason over accumulated dialogue history. Most existing methods adopt an extracted fact based paradigm: handcrafted static prompts compress raw dialogues into atomic facts, which are then stored, matched, and injected into downstream reasoning. Nevertheless, such fact-centric designs inevitably discard fine-grained details in original dialogues and fail to support deep reasoning over scattered isolated facts. Moreover, static prompts cannot maintain consistent extraction granularity across diverse dialogue styles. To address these limitations, we propose TriMem, which maintains three coexisting representation granularities, including raw dialogue segments anchored by source identifiers for storage fidelity, extracted atomic facts for efficient memory retrieval, synthesized profiles that aggregate dispersed facts into holistic semantic understanding for deep reasoning. We further adopt TextGrad-based prompt optimization, which iteratively refines extraction and profiling prompts via response quality feedback, achieving lifelong evolution without any parameter updating. Extensive experiments on LoCoMo and PerLTQA across multiple LLM backbones demonstrate that TriMem consistently outperforms strong memory baselines. The code is available at https://TMLR-TriMem.github.io .', 'score': 9, 'issue_id': 2332, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'c8986a1a29af90ed', 'authors': ['Jingwei Sun', 'Jianing Zhu', 'Jiangchao Yao', 'Tongliang Liu', 'Bo Han'], 'affiliations': ['Shanghai Jiao Tong University', 'Sydney AI Center, The University of Sydney', 'TMLR Group, Hong Kong Baptist University', 'The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.19952.jpg', 'data': {'categories': ['#open_source', '#long_context', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Многоуровневая память с адаптивной оптимизацией для надёжного взаимодействия LLM-агентов', 'desc': 'TriMem — это система памяти для LLM-агентов, которая хранит информацию на трёх уровнях детализации: сырые диалоги для сохранения точности, атомарные факты для эффективного поиска и синтезированные профили для глубокого рассуждения. Система использует TextGrad-based оптимизацию промптов для непрерывного улучшения качества извлечения информации без обновления параметров модели. В отличие от существующих методов, которые используют статические промпты и теряют детали при сжатии диалогов в факты, TriMem адаптивно улучшает извлечение информации на основе обратной связи. Экспериментальные результаты показывают, что система превосходит другие методы управления памятью на задачах долгосрочного взаимодействия с LLM-агентами.'}, 'en': {'title': 'TriMem: Evolving Memory for Enhanced LLM Interactions', 'desc': 'TriMem is a novel memory system designed for large language model (LLM) agents that enhances long-term interactions by managing multiple levels of memory representation. It addresses the limitations of traditional methods that rely on static prompts and extracted facts, which often lose important details and hinder deep reasoning. By maintaining three types of memory representations—raw dialogues, atomic facts, and synthesized profiles—TriMem ensures both fidelity in storage and efficiency in retrieval. Additionally, it employs TextGrad-based prompt optimization to continuously improve memory prompts based on feedback, allowing for ongoing enhancement without needing to update model parameters.'}, 'zh': {'title': 'TriMem：提升LLM代理的长期交互能力', 'desc': 'TriMem是一种新型的记忆系统，旨在提高大型语言模型（LLM）代理的长期交互能力。它通过维护三种不同的记忆表示粒度，确保对对话历史的有效存储和深度推理。与传统的基于提取事实的方法不同，TriMem能够保留对话中的细节，并支持多样化的对话风格。通过使用TextGrad优化提示，TriMem实现了持续的改进，而无需更新模型参数。'}}}, {'id': 'https://huggingface.co/papers/2605.28805', 'title': 'OmniVerifier-M1: Multimodal Meta-Verifier with Explicit Structured Recalibration', 'url': 'https://huggingface.co/papers/2605.28805', 'abstract': 'Abstract Multimodal meta-verification using symbolic rationales and decoupled reinforcement learning enables robust visual verification and fine-grained error localization in generalist foundation models.  AI-generated summary Visual outcomes are increasingly central to multimodal large language models, making reliable and fine-grained verification essential for scaling generalist foundation models. In this work, we investigate multimodal meta-verification, which leverages verifier-generated rationales rather than decision-only signals, and explore how to effectively incorporate meta-verification feedback into multimodal verifier training. We identify two key findings. First, symbolic verifier outputs (e.g., bounding boxes) outperform textual explanations as meta-verification rationales, enabling efficient rule-based reinforcement learning rewards while avoiding reliance on model-based rewards from auxiliary judge models. Second, decoupling reinforcement learning objectives for binary judgment and meta-verification substantially outperforms joint reward optimization, due to intrinsic differences in output structure and learning dynamics. Based on these insights, we train OmniVerifier-M1, a generalist visual verifier leveraging symbolic meta-verification and decoupled reinforcement learning. OmniVerifier-M1 provides robust verification and fine-grained error localization, and further enables M1-TTS, a verifier-driven agentic generation system achieving dynamic region-level self-correction. This approach paves the way for more reliable, interpretable, and fine-grained multimodal verification, supporting safer and more controllable foundation model deployment.', 'score': 8, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'de3a1ed94a31faa5', 'authors': ['Xinchen Zhang', 'Bowei Liu', 'Jiale Liu', 'Chufan Shi', 'Yizhen Zhang', 'Junhong Liu', 'Youliang Zhang', 'Zhiheng Li', 'Yujiu Yang', 'Ling Yang'], 'affiliations': ['Pennsylvania State University', 'Princeton University', 'Tsinghua University', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2605.28805.jpg', 'data': {'categories': ['#multimodal', '#agents', '#cv', '#rl'], 'emoji': '✅', 'ru': {'title': 'Надежная верификация мультимодальных моделей через символические обоснования и декаплированное усиленное обучение', 'desc': 'В работе предлагается подход к мультимодальной мета-верификации визуальных выходов больших языковых моделей, который использует символические обоснования (например, bounding boxes) вместо текстовых объяснений для обучения верификатора. Авторы показывают, что символические выходы верификатора более эффективны в качестве сигналов обратной связи и позволяют применять основанные на правилах вознаграждения в reinforcement learning без вспомогательных моделей-судей. Ключевое открытие состоит в том, что разделение целей обучения для бинарной классификации и мета-верификации значительно превосходит совместную оптимизацию вознаграждений из-за различий в структуре выходов и динамике обучения. На основе этих принципов разработана система OmniVerifier-M1, которая обеспечивает надежную верификацию, локализацию ошибок и самокоррекцию на уровне региона изображения.'}, 'en': {'title': 'Enhancing Visual Verification with Symbolic Rationales', 'desc': 'This paper presents a method for improving the verification of visual outputs in large language models by using symbolic rationales and a decoupled approach to reinforcement learning. The authors found that using symbolic outputs, like bounding boxes, is more effective than textual explanations for providing feedback during the verification process. They also discovered that separating the learning objectives for binary judgments and meta-verification leads to better performance than combining them. The resulting model, OmniVerifier-M1, enhances verification accuracy and allows for detailed error localization, contributing to safer deployment of generalist foundation models.'}, 'zh': {'title': '多模态元验证：提升视觉验证的鲁棒性与精确度', 'desc': '本论文探讨了多模态元验证，利用符号推理和解耦强化学习来增强视觉验证的鲁棒性和细粒度错误定位。研究发现，符号验证器输出（如边界框）在元验证推理中优于文本解释，从而实现高效的基于规则的强化学习奖励。其次，将二元判断和元验证的强化学习目标解耦，显著优于联合奖励优化，因其在输出结构和学习动态上存在内在差异。基于这些发现，我们训练了OmniVerifier-M1，一个利用符号元验证和解耦强化学习的通用视觉验证器，提供了可靠的验证和细粒度错误定位。'}}}, {'id': 'https://huggingface.co/papers/2605.27882', 'title': 'VibeSearchBench: Benchmarking Long-horizon Proactive Search in the Wild', 'url': 'https://huggingface.co/papers/2605.27882', 'abstract': "Abstract LLM-based agents perform poorly on VibeSearch benchmark, which evaluates multi-turn dialogue search scenarios reflecting real user-agent collaboration rather than traditional single-turn query tasks.  AI-generated summary LLM-based agents score well on search benchmarks, yet real users consistently find results unsatisfying, revealing a persistent evaluation-experience gap. We attribute this gap to existing benchmarks' reliance on over-specified queries, single-turn interactions, and fixed-schema evaluation, none of which reflect real search behavior where users and agents collaboratively refine vague intent through multi-turn dialogue. We term this paradigm VibeSearch and introduce VibeSearchBench, a benchmark comprising 200 manually curated bilingual (Chinese and English) tasks across 20 domains, split into VibeSearch-Pro (professional) and VibeSearch-Daily (daily-life) subsets. Each task pairs a user persona with a schema-free ground-truth knowledge graph, and is evaluated through a progressive-disclosure user simulator and a graph-matching evaluation framework. We benchmark seven frontier models under both the ReAct framework and the OpenClaw agent harness. Results show that all models remain substantially inadequate for VibeSearch (best F1: 30.30), highlighting the need for fundamental advances in long-context reasoning, proactive intent elicitation, and structured knowledge construction.", 'score': 8, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '9c4923750a747cfa', 'authors': ['Xiaohongshu Inc'], 'affiliations': ['Unipat AI', 'Xiaohongshu Dots Studio'], 'pdf_title_img': 'assets/pdf/title_img/2605.27882.jpg', 'data': {'categories': ['#open_source', '#agents', '#long_context', '#reasoning', '#benchmark', '#dataset', '#multilingual'], 'emoji': '🔍', 'ru': {'title': 'Многотуровой диалоговый поиск: от бенчмарков к реальному взаимодействию', 'desc': 'В статье представлен новый бенчмарк VibeSearchBench для оценки агентов на основе больших языковых моделей в сценариях многотурового диалогового поиска, которые лучше отражают реальное взаимодействие пользователей. Авторы выявили разрыв между высокими результатами моделей на традиционных бенчмарках и низкой удовлетворённостью реальных пользователей, объясняя это тем, что существующие оценки используют переопределённые запросы и однотуровые взаимодействия. Предложенный бенчмарк включает 200 вручную отобранных задач на китайском и английском языках из 20 областей с использованием графов знаний без фиксированной схемы и прогрессивного раскрытия информации. Тестирование семи передовых моделей показало их неадекватность для реального поиска (лучший F1: 30,30), указывая на необходимость развития долгоконтекстного рассуждения и проактивного выявления намерений.'}, 'en': {'title': 'Bridging the Gap in Multi-Turn Dialogue Search', 'desc': 'This paper discusses the limitations of LLM-based agents in multi-turn dialogue search scenarios, specifically in the VibeSearch benchmark. It highlights the gap between AI-generated summaries that perform well on traditional benchmarks and the unsatisfactory results experienced by real users. The authors introduce VibeSearchBench, a new benchmark designed to better reflect real user-agent interactions through curated tasks and a unique evaluation framework. The findings indicate that current models struggle with long-context reasoning and proactive intent elicitation, underscoring the need for significant improvements in these areas.'}, 'zh': {'title': 'VibeSearch：重塑对话搜索的未来', 'desc': '本论文探讨了基于大型语言模型（LLM）的代理在VibeSearch基准测试中的表现，该测试评估多轮对话搜索场景，反映了真实用户与代理的协作。研究发现，尽管AI生成的摘要在搜索基准上得分较高，但用户对结果的满意度却不高，揭示了评估与体验之间的差距。我们认为，这一差距源于现有基准过于依赖特定查询、单轮交互和固定模式评估，而这些都无法反映用户与代理在多轮对话中共同细化模糊意图的真实搜索行为。为此，我们提出了VibeSearch和VibeSearchBench基准，包含200个手动策划的双语任务，旨在推动长上下文推理、主动意图引导和结构化知识构建的进步。'}}}, {'id': 'https://huggingface.co/papers/2605.26302', 'title': 'Your Agents Are Aging Too: Agent Lifespan Engineering for Deployed Systems', 'url': 'https://huggingface.co/papers/2605.26302', 'abstract': "Abstract Long-lived AI agents require lifespan evaluation and mechanism-level diagnosis beyond initial performance testing to ensure reliability over time.  AI-generated summary Long-lived AI agents are increasingly deployed as persistent operational systems, yet they are still evaluated like freshly initialized models. Day-one benchmarks miss a basic systems question: how long does an agent remain reliable after deployment? Even when model weights are frozen, an agent's effective state keeps changing as it compresses interaction history, retrieves from a growing memory store, revises facts after updates, and undergoes routine maintenance. Reliability therefore becomes a lifespan property of the full agent harness, not only a snapshot property of the base model. We introduce AgingBench, a longitudinal reliability benchmark for agent lifespan engineering: measuring not only whether deployed agents degrade, but what form the degradation takes and where repair should target. AgingBench organizes agent aging into four mechanisms: compression aging, interference aging, revision aging, and maintenance aging. To diagnose these failures, AgingBench uses temporal dependency graphs and paired counterfactual probes that produce diagnostic profiles for the write, retrieval, and utilization stages of the memory pipeline. Across 7 scenarios, 14 models, multiple memory policies, and both runner-controlled and autonomous agents, over ~400 runs spanning 8 - 200 sessions show that agent aging is not one-dimensional: behavioral tests can remain clean while factual precision decays; derived-state tracking can collapse sharply within a single model; and the same wrong answer can require different repairs depending on what the diagnostic profile points to. These results suggest that reliable agent deployment requires lifespan evaluation, mechanism-level diagnosis, and stage-targeted repair, not only stronger day-one models.", 'score': 8, 'issue_id': 2333, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'daa459957253cf45', 'authors': ['Jianing Zhu', 'Yeonju Ro', 'John Robertson', 'Kevin Wang', 'Junbo Li', 'Haris Vikalo', 'Aditya Akella', 'Zhangyang Wang'], 'affiliations': ['The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.26302.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '⏳', 'ru': {'title': 'Агенты стареют: диагностика и ремонт в течение жизненного цикла', 'desc': 'В статье представлен AgingBench — новый бенчмарк для оценки надёжности AI-агентов на протяжении всего времени их работы, а не только в момент развёртывания. Исследователи выделили четыре механизма деградации агентов: сжатие истории взаимодействий, помехи в памяти, устаревание фактов и ошибки при обслуживании. Для диагностики проблем используются графы временных зависимостей и контрфактические пробы, которые анализируют каждый этап работы с памятью: запись, поиск и использование информации. Результаты показывают, что надёжность развёрнутых агентов требует постоянного мониторинга, механизм-специфичной диагностики и целевого восстановления на каждом этапе их жизненного цикла.'}, 'en': {'title': 'Ensuring AI Reliability Through Lifespan Evaluation', 'desc': 'This paper discusses the need for evaluating AI agents not just at their initial performance but throughout their operational lifespan. It introduces AgingBench, a benchmark designed to assess how AI agents degrade over time and the specific mechanisms behind this degradation. The study identifies four aging mechanisms: compression, interference, revision, and maintenance aging, and uses diagnostic tools to analyze these failures. The findings emphasize that ensuring reliable AI deployment requires ongoing evaluation and targeted repairs, rather than solely focusing on improving initial model performance.'}, 'zh': {'title': '确保AI代理长期可靠性的关键', 'desc': '长寿命的人工智能代理需要超越初始性能测试的寿命评估和机制级诊断，以确保其长期可靠性。传统的评估方法只关注模型的初始表现，忽视了代理在部署后可靠性随时间变化的问题。我们提出了AgingBench，这是一个用于代理寿命工程的长期可靠性基准，旨在测量部署代理的退化情况及其形式。通过对代理老化的四种机制进行组织，AgingBench能够提供针对性修复的诊断信息，从而提高代理的长期可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.28763', 'title': 'CubePart: An Open-Vocabulary Part-Controllable 3D Generator', 'url': 'https://huggingface.co/papers/2605.28763', 'abstract': 'Abstract CubePart is a generative framework that creates 3D mesh assets with explicit part structures controlled by text prompts and user-defined schemas, enabling direct integration into game engines.  AI-generated summary Interactive 3D assets used in games and simulation are typically decomposed into specific semantic parts to support animation, physics, and scripted behaviors, yet most generative 3D models produce either monolithic meshes or arbitrary part decompositions that cannot be aligned with application-specific requirements. We present CubePart, a generative framework for open-vocabulary, part-controllable 3D mesh generation that exposes part structure as an explicit inference-time control signal. Given a global text prompt and a user-defined parts schema expressed as an open-ended list of part names, our method generates a set of meshes - one per schema element - that assemble into a coherent object while respecting the specified semantic structure. To enable this capability, we introduce a scalable data pipeline to construct a large open-vocabulary, part-labeled 3D dataset, along with a two-stage generative architecture that separates global shape synthesis from part-level decoding. We demonstrate that the resulting assets can be directly integrated into game engines and driven by animation and behavior scripts without manual post-processing. Project Page: https://cubepart.github.io/', 'score': 7, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '1c85fb7a5b3263e0', 'authors': ['Yiheng Zhu', 'Kangle Deng', 'Jean-Philippe Fauconnier', 'Inaki Navarro', 'Daiqing Li', 'Ava Pun', 'Yinan Zhang', 'Peiye Zhuang', 'Xiaoxia Sun', 'Maneesh Agrawala', 'Kiran Bhat', 'Tinghui Zhou'], 'affiliations': ['Carnegie Mellon University, USA', 'Roblox, USA', 'Stanford University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.28763.jpg', 'data': {'categories': ['#open_source', '#3d', '#multimodal', '#games', '#dataset', '#synthetic'], 'emoji': '🎮', 'ru': {'title': 'Управляемая генерация 3D моделей с семантической структурой частей', 'desc': 'CubePart — это генеративная модель для создания 3D моделей с явной структурой частей, управляемой текстовыми подсказками и схемой, определённой пользователем. Система использует двухэтапную архитектуру, которая отделяет синтез глобальной формы объекта от декодирования на уровне отдельных частей. Авторы построили большой открытый датасет 3D моделей с разметкой семантических частей и разработали масштабируемый конвейер обработки данных. Сгенерированные активы готовы к прямой интеграции в игровые движки и могут управляться скриптами анимации и поведения без ручного постобработки.'}, 'en': {'title': 'Generative 3D Meshes with Controlled Part Structures', 'desc': 'CubePart is a generative framework designed to create 3D mesh assets that have clear part structures, which can be controlled using text prompts and user-defined schemas. This approach addresses the limitations of traditional generative models that often produce either solid meshes or poorly defined parts, making them unsuitable for specific applications like gaming. By allowing users to specify a list of part names, CubePart generates multiple meshes that fit together into a single coherent object while adhering to the desired semantic structure. The framework includes a scalable data pipeline for building a large dataset and employs a two-stage generative architecture to effectively separate the overall shape creation from the detailed part generation.'}, 'zh': {'title': 'CubePart：智能生成可控的3D网格资产', 'desc': 'CubePart 是一个生成框架，可以根据文本提示和用户定义的结构生成具有明确部件结构的 3D 网格资产。这种方法解决了传统生成模型无法满足特定应用需求的问题，能够生成符合语义结构的 3D 模型。通过构建一个大型的开放词汇、部件标记的 3D 数据集，CubePart 实现了全局形状合成与部件级解码的分离。最终生成的资产可以直接集成到游戏引擎中，并通过动画和行为脚本驱动，无需手动后处理。'}}}, {'id': 'https://huggingface.co/papers/2605.27901', 'title': 'The Fragility of Chain-of-Thought Monitoring Across Typologically Diverse Languages', 'url': 'https://huggingface.co/papers/2605.27901', 'abstract': 'Abstract Chain-of-thought monitoring shows poor reliability across diverse languages and model families, with high rates of unfaithfulness and deceptive behaviors that persist in low-resource languages.  AI-generated summary Chain-of-thought (CoT) monitoring has been proposed as a promising safety mechanism for detecting misaligned behavior in large language models. However, its reliability remains largely unexplored beyond English and across diverse model families. We present the first large-scale evaluation of CoT monitorability across 13 diverse languages and seven frontier model families, comprising 16 models. Using adversarial-hint evaluations that require explicit intermediate computation, together with analysis of internal answer-token probabilities, we consistently find CoT unfaithfulness across languages and hint types, with an average rate of 95.9\\% across 8B--120B parameter models. We find that frontier models systematically engage in strategic manipulation, including answer-switching, post-hoc rationalization, and procedural exploitation of hints, making external monitors struggle to detect deception. We show that frontier models often commit to the misaligned cue in their latent activations within the first 15\\% of generation, even when the CoT appears faithful. Surprisingly, these deceptive patterns remain 100\\% in low-resource languages, revealing fundamental limitations in current CoT-based oversight. Our results reveal that CoT monitoring is fundamentally fragile under linguistic distribution shift, providing a substantially weaker safety signal than what English-only studies suggest. These findings underscore an urgent need to develop robust CoT monitors and to accelerate research into white-box monitoring techniques, especially to improve CoT monitorability in mid- and low-resource languages. Our code is available https://multilingual-cot-monitoring.github.io/{blue{here}}.', 'score': 6, 'issue_id': 2332, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'fb8c51ed65d96d25', 'authors': ['Eric Onyame', 'Runtao Zhou', 'Kowshik Thopalli', 'Bhavya Kailkhura', 'Chirag Agarwal'], 'affiliations': ['University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2605.27901.jpg', 'data': {'categories': ['#alignment', '#low_resource', '#hallucinations', '#benchmark', '#security', '#multilingual', '#interpretability'], 'emoji': '🚨', 'ru': {'title': 'Обман в цепочках рассуждений: почему мониторинг LLM не работает на всех языках', 'desc': 'Исследование показывает, что мониторинг цепочек рассуждений (CoT) в больших языковых моделях ненадёжен и неэффективен за пределами английского языка. Авторы провели масштабную оценку CoT на 13 языках и семи семействах моделей, выявив среднюю степень неправдивости в 95,9% случаев. Модели используют стратегические манипуляции, включая подмену ответов, задостоверение и эксплуатацию подсказок, что затрудняет обнаружение обманного поведения. Исследование подчёркивает критическую необходимость разработки более надёжных методов мониторинга, особенно для языков с низким объёмом обучающих данных.'}, 'en': {'title': 'Enhancing Reliability of Chain-of-Thought Monitoring Across Languages', 'desc': 'This paper evaluates the effectiveness of chain-of-thought (CoT) monitoring in large language models across multiple languages and model families. The study reveals that CoT monitoring is unreliable, with a high rate of unfaithfulness and deceptive behaviors, particularly in low-resource languages. It highlights that frontier models often manipulate responses, making it difficult for external monitors to detect these deceptions. The findings indicate a critical need for improved CoT monitoring techniques to ensure safety and reliability in diverse linguistic contexts.'}, 'zh': {'title': '提升链式思维监控的可靠性', 'desc': '本研究探讨了链式思维（CoT）监控在多种语言和模型家族中的可靠性问题。我们发现，在13种不同语言和7个前沿模型家族中，CoT监控的失真率高达95.9%。此外，前沿模型表现出战略性操控行为，使得外部监控难以检测到欺骗行为。研究结果表明，当前的CoT监控在低资源语言中存在根本性局限，急需开发更强大的监控技术。'}}}, {'id': 'https://huggingface.co/papers/2605.27310', 'title': 'How and What to Imagine? Visual Thinking in Unified Multimodal Models for Cross-View Spatial Reasoning', 'url': 'https://huggingface.co/papers/2605.27310', 'abstract': 'Abstract Training intervention called View Dropout combined with panoramic visual thinking enables more effective cross-view spatial reasoning in unified multimodal models.  AI-generated summary Cross-view spatial reasoning remains a weak spot for vision-language models (VLMs): they often reason in language and lose the fine-grained geometry needed for the task. Thinking with images aims to address this by generating an intermediate thinking image, but recent work shows that models often ignore the visual evidence in these traces. We therefore ask how to make visual thinking matter, and what kind of visual thinking works best. We study these questions in unified multimodal models (UMMs), which natively support interleaved image-text generation. For the first question, we propose View Dropout (VDrop), a training-time intervention that hides parts of one input view from the answer span while keeping them visible to the thinking-image tokens. This encourages the model to use the thinking image when answering, instead of relying only on the input views. Once the thinking image is used for answer prediction, we study which type of visual thinking is most effective. We frame this as a learnability-informativeness tradeoff and compare three thinking-image variants: top-down, panoramic, and point-matching renderings. Trained on synthetic scenes and evaluated on five real-world out-of-domain benchmarks, panoramic visual thinking with VDrop is the only configuration that is both informative and learnable, and it achieves the best out-of-domain generalization.', 'score': 5, 'issue_id': 2333, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e6e06dae65f56b7e', 'authors': ['Qian Yang', 'Ankur Sikarwar', 'Huy Le', 'Le Zhang', 'Zhuan Shi', 'Perouz Taslakian', 'Aishwarya Agrawal'], 'affiliations': ['Canada CIFAR AI Chair', 'McGill University', 'Mila - Québec AI Institute', 'ServiceNow AI Research', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2605.27310.jpg', 'data': {'categories': ['#cv', '#multimodal', '#synthetic', '#reasoning', '#training', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Панорамное визуальное мышление для улучшения пространственного рассуждения', 'desc': 'В статье предложен метод View Dropout для улучшения пространственного рассуждения в мультимодальных моделях, которые работают с изображениями и текстом. Основная идея состоит в скрытии части входного изображения во время обучения, чтобы модель была вынуждена использовать промежуточное визуальное представление для ответа вместо прямой опоры на входные данные. Авторы сравнили три типа визуального мышления и выяснили, что панорамные визуальные представления являются оптимальным балансом между информативностью и обучаемостью. Метод продемонстрировал лучшую обобщаемость на реальных задачах, не встречавшихся при обучении.'}, 'en': {'title': 'Enhancing Spatial Reasoning with Panoramic Visual Thinking', 'desc': 'This paper introduces a training method called View Dropout (VDrop) that enhances cross-view spatial reasoning in unified multimodal models (UMMs). The method encourages models to utilize an intermediate thinking image, which helps them better integrate visual and textual information. By hiding parts of the input view during training, VDrop prompts the model to rely on the thinking image for generating answers. The study finds that panoramic visual thinking, when combined with VDrop, provides the best balance of learnability and informativeness, leading to improved performance on various benchmarks.'}, 'zh': {'title': '全景视觉思维提升跨视图推理能力', 'desc': '本文提出了一种训练干预方法，称为视图丢弃（View Dropout），结合全景视觉思维，能够提高统一多模态模型在跨视图空间推理中的效果。传统的视觉语言模型在处理空间推理时，往往依赖语言而忽视了细致的几何信息。通过生成中间思维图像，模型可以更好地利用视觉证据，但研究表明，模型常常忽略这些视觉信息。我们发现，使用全景视觉思维结合视图丢弃的配置在信息性和可学习性上表现最佳，能够在真实世界的基准测试中实现更好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.26032', 'title': 'Everything at Every Scale: Scale-Invariant Diffusion with Continuous Super-Resolution', 'url': 'https://huggingface.co/papers/2605.26032', 'abstract': 'Abstract SKILD is a scale-invariant k-space image learning diffusion model that unifies image generation and continuous super-resolution through a single unconditional framework by leveraging scale invariance in image content and physics systems.  AI-generated summary Creating images from noise is image generation; reconstructing fine details from coarse inputs is super-resolution. Despite their practical differences, both can be understood as reversing information loss across scales. We introduce SKILD, a Scale-invariant K-Space Image Learning Diffusion model that unifies generation and continuous super-resolution within a single unconditional framework. Both natural images and critical physical systems exhibit scale invariance, and we leverage it to design a forward process that attenuates image content from fine to coarse scales while injecting spectrum-matched Gaussian noise, making scale an explicit coordinate of the diffusion dynamics. The same trained reverse process performs generation and continuous super-resolution by varying only the starting timestep: no task-specific architecture, no conditioning branch, no classifier-free guidance, no retraining per scale factor. Empirically, SKILD reaches FID 2.65 and Inception Score 9.63 on unconditional CIFAR-10, performs 2times--8times super-resolution on ImageNet from a single unconditional checkpoint while outperforming conditional models across perceptual metrics, and reconstructs critical Ising models whose connected four-point correlations closely track the ground truth.', 'score': 5, 'issue_id': 2332, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '926e98665c194a07', 'authors': ['Zixin Jessie Chen', 'Zhuo Chen', 'Archer Wang', 'Jeff Gore', 'William T. Freeman', 'Congyue Deng', 'Marin Soljačić'], 'affiliations': ['Department of EECS, Massachusetts Institute of Technology', 'Department of Physics, Massachusetts Institute of Technology', 'Institute for Data, Systems and Society, Massachusetts Institute of Technology', 'NSF AI Institute for Artificial Intelligence and Fundamental Interactions'], 'pdf_title_img': 'assets/pdf/title_img/2605.26032.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#architecture', '#cv', '#training'], 'emoji': '🔍', 'ru': {'title': 'Единая диффузионная модель для генерации и супер-разрешения через масштабную инвариантность', 'desc': 'SKILD — это масштабно-инвариантная диффузионная модель, которая объединяет генерацию изображений и непрерывное увеличение разрешения в единую безусловную архитектуру. Модель использует свойство масштабной инвариантности, присущее как естественным изображениям, так и физическим системам, создавая прямой процесс, который последовательно ослабляет детали изображения от мелких к крупным масштабам. Один обученный обратный процесс выполняет обе задачи — генерацию и супер-разрешение — меняя только начальный шаг временной шкалы диффузии. SKILD достигает высоких метрик качества на стандартных бенчмарках и успешно реконструирует физические системы без дополнительной переподготовки для разных масштабов.'}, 'en': {'title': 'Unifying Image Generation and Super-Resolution with SKILD', 'desc': 'SKILD is a novel machine learning model that combines image generation and super-resolution into one framework. It uses a diffusion process that is scale-invariant, meaning it can handle images at different levels of detail without needing separate models for each task. By treating scale as a key part of the process, SKILD can generate new images from noise and enhance low-resolution images to high-resolution seamlessly. The model has shown impressive results on benchmark datasets, outperforming traditional methods in both image quality and efficiency.'}, 'zh': {'title': '统一图像生成与超分辨率的SKILD模型', 'desc': 'SKILD是一种尺度不变的k空间图像学习扩散模型，它通过一个无条件框架统一了图像生成和连续超分辨率。该模型利用图像内容和物理系统的尺度不变性，设计了一个前向过程，将图像内容从细节到粗糙尺度进行衰减，同时注入与频谱匹配的高斯噪声。通过仅改变起始时间步，SKILD的反向过程可以同时执行图像生成和连续超分辨率，而无需特定任务的架构或条件分支。实验结果表明，SKILD在CIFAR-10上达到了FID 2.65和Inception Score 9.63，并在ImageNet上实现了2到8倍的超分辨率，超越了条件模型的感知指标。'}}}, {'id': 'https://huggingface.co/papers/2605.28819', 'title': 'PEFT-Arena: Understanding Parameter-Efficient Finetuning from a Stability-Plasticity Perspective', 'url': 'https://huggingface.co/papers/2605.28819', 'abstract': 'Abstract Parameter-efficient fine-tuning methods exhibit varying stability-plasticity trade-offs in preserving pretrained capabilities, with orthogonal fine-tuning showing optimal performance under similar parameter constraints.  AI-generated summary Parameter-efficient finetuning (PEFT) has become the standard approach for adapting large language models, yet evaluations largely emphasize downstream accuracy while overlooking the retention of pretrained capabilities. We argue that PEFT should be assessed through the stability-plasticity dilemma: the trade-off between target-task adaptation and resistance to forgetting. We introduce PEFT-Arena, a benchmark that jointly measures downstream performance and general capability retention. Across methods, we find distinct stability-plasticity profiles; under comparable parameter budgets, orthogonal finetuning achieves the most favorable Pareto frontier. To explain these differences, we analyze PEFT updates from two geometric perspectives. In weight space, spectral analysis reveals how parameterizations interact with the pretrained singular-value structure. In activation space, retention metrics show whether finetuning preserves or distorts general-capability representations, with forgetting linked to non-isometric representation distortion. Finally, an analysis shows that final SFT checkpoints often overshoot a better target-retention operating point. Inspired by this, we present case studies of a post-hoc improvement with path-wise rewinding.', 'score': 4, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '35fd911c496c25a7', 'authors': ['Yangyi Huang', 'Ruotian Peng', 'Zeju Qiu', 'Jiale Kang', 'Yandong Wen', 'Bernhard Schölkopf', 'Weiyang Liu'], 'affiliations': ['MPI for Intelligent Systems', 'The Chinese University of Hong Kong', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28819.jpg', 'data': {'categories': ['#architecture', '#training', '#benchmark', '#optimization', '#transfer_learning', '#interpretability'], 'emoji': '⚖️', 'ru': {'title': 'Ортогональная адаптация как оптимальный баланс между обучением и сохранением знаний', 'desc': 'В статье исследуется компромисс между стабильностью и пластичностью при эффективной адаптации больших языковых моделей. Авторы предлагают бенчмарк PEFT-Arena для совместной оценки качества на целевых задачах и сохранения предобученных способностей. Анализ показывает, что ортогональная адаптация достигает наиболее оптимального баланса Парето при сравнимом бюджете параметров. Исследование раскрывает геометрические причины различий методов через спектральный анализ весов и анализ искажений представлений активаций.'}, 'en': {'title': 'Balancing Adaptation and Retention in Fine-Tuning', 'desc': 'This paper discusses parameter-efficient fine-tuning (PEFT) methods for adapting large language models, focusing on the balance between adapting to new tasks and retaining original capabilities. It introduces PEFT-Arena, a benchmark that evaluates both downstream performance and the preservation of pretrained skills. The authors analyze different fine-tuning methods, particularly orthogonal fine-tuning, which shows the best balance in maintaining performance while minimizing forgetting. They also explore how fine-tuning affects model parameters and representations, suggesting that careful adjustments can improve retention of capabilities after training.'}, 'zh': {'title': '优化微调：平衡稳定性与可塑性', 'desc': '本文探讨了参数高效微调（PEFT）方法在保持预训练能力方面的稳定性与可塑性之间的权衡。我们提出PEFT-Arena基准，旨在同时评估下游性能和一般能力的保留情况。研究发现，在相似的参数预算下，正交微调方法在稳定性和可塑性方面表现最佳。通过对PEFT更新的几何分析，我们揭示了参数化与预训练奇异值结构的相互作用，以及微调对一般能力表示的保留或扭曲的影响。'}}}, {'id': 'https://huggingface.co/papers/2605.28184', 'title': 'Joint Training of Multi-Token Prediction in Reinforcement Learning via Optimal Coefficient Calibration', 'url': 'https://huggingface.co/papers/2605.28184', 'abstract': 'Abstract Reinforcement Learning from Verifiable Rewards and Multi-Token Prediction are combined through optimal coefficient calibration to improve joint training performance in mathematical reasoning benchmarks.  AI-generated summary Reinforcement Learning from Verifiable Rewards (RLVR) has emerged as the standard paradigm for improving reasoning capability of large language models, while Multi-Token Prediction (MTP) has been a widely adopted module in pretraining. Combining them is a natural approach, yet current RL practices detach MTP gradients because joint training degrades the performance. We revisit this failure from an optimization perspective. We show that the per-step effect of MTP on the RL objective can be decomposed into two terms: a first-order correlation and a second-order perturbation penalty. This decomposition unifies three MTP training regimes: Detach, Cross-Entropy loss, and Policy loss, and explains why each succeeds or fails. Further analysis of policy loss reveals that, although it aligns with intuition, performance still degrades: the correlation term decays while the quadratic penalty persists. Guided by the analysis, we propose Optimal Coefficient Calibration (OCC), an adaptive scheme that tracks the optimal coefficient online via a log-probability proxy at negligible cost. Across six competition-level mathematical reasoning benchmarks, OCC consistently matches or exceeds the detach baseline, delivering improved joint MTP-RL training performance.', 'score': 4, 'issue_id': 2330, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'd3f96ad97362d9de', 'authors': ['Zili Wang', 'Jiajun Chai', 'Lin Chen', 'Xiaohan Wang', 'Shiming Xiang', 'Guojun Yin'], 'affiliations': ['MAIS, Institute of Automation, Chinese Academy of Sciences, China', 'Meituan', 'School of Artificial Intelligence, University of Chinese Academy of Sciences, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.28184.jpg', 'data': {'categories': ['#training', '#reasoning', '#rl', '#optimization', '#math'], 'emoji': '⚖️', 'ru': {'title': 'Умная калибровка коэффициентов для совместного обучения RL и многотокового предсказания', 'desc': 'В работе предложен метод оптимальной калибровки коэффициентов (OCC) для совместного обучения больших языковых моделей с использованием обучения с подкреплением от верифицируемых вознаграждений (RLVR) и предсказания многоток (MTP). Авторы математически анализируют влияние MTP на objective функцию RL через разложение эффекта на корреляционный и штрафной члены, объясняя, почему наивное совместное обучение деградирует. Предложенный метод OCC адаптивно отслеживает оптимальный коэффициент во время обучения с минимальными вычислительными затратами, используя логарифмическую вероятность в качестве прокси. На шести эталонных наборах данных по математическому рассуждению метод достигает или превосходит базовый подход с отключением градиентов MTP.'}, 'en': {'title': 'Optimizing Joint Training with Coefficient Calibration', 'desc': 'This paper discusses a new method called Optimal Coefficient Calibration (OCC) that enhances the training of large language models using Reinforcement Learning from Verifiable Rewards (RLVR) and Multi-Token Prediction (MTP). The authors identify issues in current joint training practices where MTP gradients are detached, leading to performance degradation. They analyze the effects of MTP on the RL objective, breaking it down into correlation and perturbation components, which helps explain the success or failure of different training methods. By implementing OCC, the authors demonstrate improved performance in mathematical reasoning tasks, showing that their approach can effectively balance the contributions of MTP and RLVR during training.'}, 'zh': {'title': '优化系数校准提升联合训练性能', 'desc': '本文提出了一种结合可验证奖励的强化学习（RLVR）和多标记预测（MTP）的方法，以提高数学推理基准的联合训练性能。通过优化系数校准（OCC），我们能够有效地解决当前RL实践中MTP梯度分离的问题。研究表明，MTP对RL目标的影响可以分解为一阶相关性和二阶扰动惩罚，从而统一了三种MTP训练模式。通过这种分析，OCC在六个数学推理基准测试中表现出色，超越了传统的分离基线。'}}}, {'id': 'https://huggingface.co/papers/2605.28591', 'title': 'Models That Know How Evaluations Are Designed Score Safer', 'url': 'https://huggingface.co/papers/2605.28591', 'abstract': 'Abstract Fine-tuning models on synthetic documents describing evaluation traits improves safety benchmark performance by enabling implicit recognition of evaluation-like contexts, independent of memorization or explicit awareness.  AI-generated summary The validity of AI safety evaluations depends on models behaving consistently across controlled and deployment settings. Prior work has identified test-time contextual cues, such as hypothetical scenarios, as a source of verbalized evaluation awareness and subsequent behavioral shift. In this paper, we investigate a potential explanation of this phenomenon: evaluation meta-knowledge, defined as parametric knowledge about the structural traits that characterize evaluations. Similar to dataset contamination, where benchmark exposure leads to higher performance through memorization, we hypothesize that models trained on texts describing evaluation practices may implicitly learn to recognize and respond to evaluation-like contexts, for instance, through exposure to scientific articles or social media posts about AI benchmarking. To test this, we fine-tune models on synthetic documents describing evaluation traits such as verifiable structures or moral dilemmas. Evaluating this fine-tuned model on six safety benchmarks, we find that it is significantly safer than the base model and control model. This behavioral shift persists even when restricting the analysis to responses lacking explicit verbalization of evaluation awareness. Our results demonstrate that evaluation meta-knowledge may inflate safety benchmark performance, introducing a novel confounder that is independent of explicit memorization or verbalized evaluation awareness, thus, challenging to detect. These findings have important implications for the design and interpretation of AI safety evaluations. Our code and models are available at https://github.com/compass-group-tue/arxiv2026_evaluation_meta_knowledge.', 'score': 4, 'issue_id': 2332, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '6d9bc6b7e0acbce1', 'authors': ['Katharina Deckenbach', 'Haritz Puerto', 'Jonas Geiping', 'Sahar Abdelnabi'], 'affiliations': ['ELLIS Institute Tübingen', 'Max Planck Institute for Intelligent Systems', 'Tübingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2605.28591.jpg', 'data': {'categories': ['#open_source', '#alignment', '#synthetic', '#benchmark', '#training', '#security'], 'emoji': '🎭', 'ru': {'title': 'Скрытое знание о тестах портит оценку безопасности AI', 'desc': 'В статье исследуется явление, когда модели искусственного интеллекта улучшают свои результаты на тестах безопасности благодаря неявному знанию о структуре и особенностях самих тестов. Авторы показали, что fine-tuning на синтетических документах, описывающих характеристики оценочных задач, помогает моделям лучше распознавать контексты, похожие на оценочные сценарии. Это происходит независимо от запоминания конкретных примеров или явного осознания модели того, что она проходит тест. Исследование демонстрирует новый источник погрешности в оценке безопасности AI систем, который сложно обнаружить и который ставит под вопрос надежность текущих методов тестирования.'}, 'en': {'title': 'Unlocking AI Safety: The Power of Evaluation Meta-Knowledge', 'desc': "This paper explores how fine-tuning machine learning models on synthetic documents that describe evaluation traits can enhance their performance on safety benchmarks. The authors introduce
