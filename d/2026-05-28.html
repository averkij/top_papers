ти и ложности как независимых измерений. Авторы провели эксперименты на четырёх моделях GPT, обнаружив, что нейтрософический подход позволяет достичь состояния «гиперистины» (T+I+F > 1), которое спонтанно возникает в контексте этических дилемм и логических парадоксов. Предложенный метод обеспечивает более прозрачное представление внутреннего состояния модели и открывает путь к созданию более надёжных и этически осознанных AI-систем.'}, 'en': {'title': 'Unlocking Hyper-Truth in AI with Neutrosophic Logic', 'desc': 'This paper explores how Neutrosophic Logic can enhance large language models (LLMs) by better representing uncertainty and internal conflicts. Traditional LLMs use probabilistic frameworks that limit the understanding of complex states like paradoxes and ethical dilemmas. By applying Neutrosophic Logic, which treats truth, indeterminacy, and falsity as separate dimensions, the authors show that LLMs can achieve a state called hyper-truth, where these dimensions can exceed unity. The study demonstrates that this approach leads to a more nuanced understanding of model behavior, particularly in ethical and logical contexts, paving the way for more transparent AI systems.'}, 'zh': {'title': '中立逻辑：提升AI的认知与伦理意识', 'desc': '本论文探讨了中立逻辑在大型语言模型中的应用，以更好地表示认知不确定性和内部冲突。研究表明，通过允许真值、模糊性和虚假性三个维度独立存在，可以形成一种称为超真理的状态。我们在四个OpenAI GPT模型上进行了实验，发现中立逻辑方法在处理伦理矛盾和逻辑悖论时，能够自发产生超真理。最终，我们认为将中立评估层集成到AI系统中是实现更透明、可靠和具伦理意识的关键步骤。'}}}, {'id': 'https://huggingface.co/papers/2605.23346', 'title': 'Contrastive Distribution Matching for Amortized Sequential Monte Carlo in Discrete Diffusion', 'url': 'https://huggingface.co/papers/2605.23346', 'abstract': 'Abstract Contrastive Distribution Matching addresses efficient sampling from reward-tilted distributions in discrete diffusion models through learned twist functions that reduce computational overhead while maintaining accuracy across diverse applications.  AI-generated summary Discrete diffusion models have emerged as powerful frameworks for generating structured categorical data. However, efficiently sampling from reward-tilted distributions remains a fundamental challenge. While Twisted Sequential Monte Carlo (SMC) offers asymptotic exactness for this task, estimating the optimal twist function in discrete state spaces necessitates costly Monte Carlo approximations, resulting a severe computational bottleneck at inference. To overcome this limitation, we introduce Contrastive Distribution Matching (CDM), a novel framework that amortizes the cost of SMC inference by learning a parameterized twist function via positive and negative samples. For efficient training, we reformulate the gradient estimator to leverage the closed-form forward kernels of discrete diffusion models. In practice, evaluating our learned twist function incurs less than 5% additional computational overhead compared to a single forward pass of the base model. Through extensive empirical evaluations, we demonstrate that CDM consistently outperforms existing baselines under matched wall-clock time. We validate the effectiveness and versatility of our approach across a diverse range of applications, including toxic text generation, regulatory DNA sequence design, protein designability, and diffusion large language model alignment.', 'score': 0, 'issue_id': 2333, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'e70f0a857b548e4f', 'authors': ['Jaihoon Kim', 'Taehoon Yoon', 'Prin Phunyaphibarn', 'Seungjun Kim', 'Morteza Mardani', 'Minhyuk Sung'], 'affiliations': ['KAIST', 'NVIDIA', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2605.23346.jpg', 'data': {'categories': ['#alignment', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Быстрая выборка из взвешенных распределений через обучаемые функции поворота', 'desc': 'Статья представляет метод Contrastive Distribution Matching для эффективной выборки из распределений, взвешенных функцией награды, в дискретных диффузионных моделях. Авторы предлагают обучить параметризованную функцию twist (поворота) с использованием положительных и отрицательных примеров, что позволяет амортизировать вычислительные затраты алгоритма Sequential Monte Carlo при инференсе. Они переформулировали оценщик градиента, чтобы использовать замкнутые формы прямых ядер дискретных диффузионных моделей, снизив дополнительные вычислительные расходы до менее чем 5%. Метод продемонстрировал превосходство над базовыми подходами при одинаковом времени выполнения на различных задачах, включая генерацию текста, дизайн ДНК-последовательностей и выравнивание диффузионных LLM.'}, 'en': {'title': 'Efficient Sampling with Contrastive Distribution Matching', 'desc': 'Contrastive Distribution Matching (CDM) is a new method designed to improve the efficiency of sampling from reward-tilted distributions in discrete diffusion models. It introduces learned twist functions that help reduce the computational burden while ensuring accurate results across various applications. By reformulating the gradient estimator, CDM allows for faster training and less overhead during inference, making it a practical solution for complex tasks. Empirical tests show that CDM outperforms existing methods, demonstrating its effectiveness in areas like text generation and protein design.'}, 'zh': {'title': '高效采样的对比分布匹配', 'desc': '对比分布匹配（CDM）是一种新颖的框架，旨在通过学习扭曲函数来高效地从奖励倾斜的分布中进行采样。该方法解决了在离散扩散模型中进行采样时的计算瓶颈问题，减少了推理过程中的计算开销。通过正负样本的学习，CDM能够在保持准确性的同时，显著提高采样效率。我们的实验证明，CDM在多种应用中表现优于现有基线，展示了其有效性和多样性。'}}}];
        const articlesContainer = document.getElementById('articles-container');

            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);

            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';

            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {

            sortDropdown.value = settingSortBy;

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);

        }

            const categories = ['#3d (2)', '#agents (21)', '#agi (1)', '#alignment (5)', '#architecture (10)', '#audio', '#benchmark (23)', '#cv (7)', '#data (3)', '#dataset (12)', '#diffusion (6)', '#ethics (1)', '#games (2)', '#graphs (1)', '#hallucinations (3)', '#healthcare', '#inference (4)', '#interpretability (4)', '#leakage (2)', '#long_context (2)', '#low_resource (1)', '#machine_translation', '#math (3)', '#multilingual (2)', '#multimodal (13)', '#open_source (18)', '#optimization (19)', '#plp (2)', '#rag', '#reasoning (14)', '#rl (8)', '#rlhf (2)', '#robotics (3)', '#science (4)', '#security (4)', '#small_models (1)', '#story_generation', '#survey', '#synthetic (5)', '#training (24)', '#transfer_learning (1)', '#video (6)'];

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-28 20:16',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-28 20:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-28 20:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
