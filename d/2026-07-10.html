    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                    flag.classList.add('active');

                flag.addEventListener('click', () => {

        function toggleTheme() {

                titleSign.classList.remove('rotate');
            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.07740', 'title': 'Jet-Long: Efficient Long-Context Extension with Dynamic Bifocal RoPE', 'url': 'https://huggingface.co/papers/2607.07740', 'abstract': 'Abstract A novel zero-shot method called Jet-Long enables efficient long-context processing for large language models by dynamically adapting rescaling factors and utilizing a bifocal attention mechanism that maintains high performance across varying sequence lengths.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern LLMs are increasingly deployed in long-context applications such as retrieval-augmented generation, repository-level coding, and agentic workflows whose accumulated reasoning and tool traces routinely push the input an order of magnitude past the pretraining window, making zero-shot context extension the dominant deployment path for open-weight checkpoints. Most existing zero-shot methods fix a single rescaling factor up front, so an aggressive factor sacrifices short-context fidelity while a conservative one breaks down at long contexts. We propose Jet-Long, a tuning-free zero-shot method that pairs a local RoPE-faithful window with a long-range window whose rescaling factor adapts dynamically to the current sequence length, recovering the base model exactly at short inputs while extrapolating cleanly at long ones. An inclusion-exclusion attention merge and an on-the-fly RoPE correction rotation make the bifocal construction essentially free at inference; fused into a single CuTe kernel, long-context prefill reaches up to 1.39times FA2 throughput on H100 (approaching the Hopper-only FA4), and single-batch generation incurs le 4% overhead at every length. On Qwen3-1.7B/4B/8B up to 128K context, Jet-Long leads RULER by +4.79/+2.18/+2.03~pp over the strongest baseline at 1.7B/4B/8B, achieves the best overall accuracy on HELMET-RAG (a benchmark identified by HELMET as the most efficient predictor of downstream long-context performance) and attains the lowest PG-19 perplexity. Jet-Long also generalizes to hybrid attention architectures such as Jet-Nemotron for further long-context improvement without retraining, and remains hyperparameter-resilient for ease of deployment.', 'score': 1, 'issue_id': 2611, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '110bfb35ba5bdb6a', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#small_models', '#rag', '#optimization', '#architecture', '#agents', '#long_context'], 'emoji': '🚀', 'ru': {'title': 'Адаптивное масштабирование для эффективной работы с длинными контекстами', 'desc': 'В статье предложен метод Jet-Long для обработки длинных контекстов в больших языковых моделях без дополнительного обучения. Метод использует динамическую адаптацию масштабирующих коэффициентов позиционного кодирования RoPE и двойной механизм внимания, который поддерживает высокую производительность при разных длинах последовательности. Ключевая идея состоит в том, что локальное окно с точным RoPE комбинируется с дальнодействующим окном, чей коэффициент масштабирования изменяется в зависимости от текущей длины входа. Метод достигает значительного ускорения вычислений, низких дополнительных затрат при инференсе и превосходит существующие подходы по точности на бенчмарках работы с длинными контекстами.'}, 'en': {'title': 'Dynamic Rescaling for Efficient Long-Context Processing', 'desc': 'The paper introduces Jet-Long, a zero-shot method designed to enhance long-context processing in large language models. It employs a bifocal attention mechanism that adjusts rescaling factors dynamically, allowing the model to maintain performance across different sequence lengths. Unlike traditional methods that use a fixed rescaling factor, Jet-Long adapts to the input length, ensuring high fidelity for short contexts while effectively handling longer ones. The method demonstrates significant improvements in throughput and accuracy on various benchmarks, making it a robust solution for applications requiring extensive context management.'}, 'zh': {'title': 'Jet-Long：高效处理长上下文的零-shot方法', 'desc': 'Jet-Long是一种新颖的零-shot方法，能够高效处理长上下文，适用于大型语言模型。它通过动态调整重缩放因子和利用双焦点注意力机制，确保在不同序列长度下保持高性能。与现有方法不同，Jet-Long在短输入时能够精确恢复基础模型，而在长输入时则能平滑外推。该方法在多个基准测试中表现优异，显示出其在长上下文应用中的广泛适用性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2607.08741', 'title': 'ARDY: Autoregressive Diffusion with Hybrid Representation for Interactive Human Motion Generation', 'url': 'https://huggingface.co/papers/2607.08741', 'abstract': "Abstract ARDY is a streaming generation framework that enables real-time, high-fidelity 3D human motion generation with text and kinematic constraint control through a hybrid representation and two-stage autoregressive transformer denoiser.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating realistic 3D human motions in real-time within interactive applications is key for animation, simulation, and humanoid robotics. While recent offline motion generation approaches offer precise control via text and kinematic constraints, they lack the inference speed required for interactive settings. Conversely, existing online methods enable real-time synthesis but often sacrifice controllability or struggle with complex text semantics and long-horizon goals due to limited context windows. In this work, we introduce ARDY, a streaming generation framework that bridges this gap by enabling high-fidelity motion generation controllable via online text prompts and flexible kinematic constraints. ARDY employs a hybrid representation that combines explicit root features with a latent body embedding, balancing precise trajectory control with efficient generative learning. We propose a two-stage autoregressive transformer denoiser that features variable history context and supports conditioning on flexible, long-horizon kinematic constraints. By training on a large-scale motion capture dataset and being directly conditioned on text labels and kinematic constraints sampled from ground truth poses, ARDY natively learns controllable generation that supports online prompting and flexible long-horizon goals. Extensive evaluations on the HumanML3D benchmark and the large-scale, high-fidelity Bones Rigplay dataset demonstrate ARDY's high motion quality and constraint adherence, validating the efficacy of our key architectural decisions. Finally, we demonstrate the method's practical versatility through an interactive demo featuring dynamic text control, diverse keyframe pose constraints, path following, and interactive locomotion control via mouse and keyboard. Supplementary video results, code, and model releases can be found at https://research.nvidia.com/labs/sil/projects/ardy/.", 'score': 0, 'issue_id': 2611, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 июля', 'en': 'July 9', 'zh': '7月9日'}, 'hash': '076944d359da18ba', 'authors': ['Kaifeng Zhao', 'Mathis Petrovich', 'Haotian Zhang', 'Tingwu Wang', 'Siyu Tang', 'Davis Rempe'], 'affiliations': ['ETH Zürich', 'NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.08741.jpg', 'data': {'categories': ['#3d', '#training', '#benchmark', '#robotics', '#architecture', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Потоковое создание управляемых 3D движений человека в реальном времени', 'desc': 'ARDY — это фреймворк потоковой генерации, который позволяет создавать реалистичные 3D движения человека в реальном времени с контролем через текстовые подсказки и кинематические ограничения. Система использует гибридное представление, комбинирующее явные признаки корня с латентным встраиванием тела, что обеспечивает баланс между точным контролем траектории и эффективным обучением генеративной модели. Предложенный двухэтапный авторегрессивный трансформер с шумоподавлением поддерживает переменный исторический контекст и гибкие долгосрочные кинематические ограничения, позволяя обрабатывать сложную семантику текста в интерактивных приложениях. Экспериментальная оценка на бенчмарках HumanML3D и Bones Rigplay подтверждает высокое качество генерируемых движений и точное соблюдение ограничений в реальном времени.'}, 'en': {'title': 'Real-Time 3D Motion Generation with Text Control', 'desc': 'ARDY is a novel framework designed for real-time generation of high-quality 3D human motions, allowing users to control the output using text prompts and kinematic constraints. It combines a hybrid representation that utilizes both explicit features and latent embeddings to achieve precise motion control while maintaining efficient learning. The framework employs a two-stage autoregressive transformer denoiser, which enhances its ability to handle long-term goals and complex text semantics. Evaluations show that ARDY excels in motion quality and adherence to constraints, making it suitable for interactive applications in animation and robotics.'}, 'zh': {'title': 'ARDY：实时高保真3D人类动作生成的解决方案', 'desc': 'ARDY是一个流媒体生成框架，能够实时生成高保真的3D人类动作，并通过文本和运动学约束进行控制。与传统的离线生成方法相比，ARDY在保持生成速度的同时，提供了更好的可控性，适用于互动应用。它结合了显式根特征和潜在身体嵌入的混合表示，平衡了精确的轨迹控制和高效的生成学习。通过在大规模动作捕捉数据集上训练，ARDY能够支持在线提示和灵活的长时间目标，展示了其在运动质量和约束遵循方面的优越性。'}}}, {'id': 'https://huggingface.co/papers/2607.08758', 'title': 'Ideas Have Genomes: Benchmarking Scientific Lineage Reasoning and Lineage-Grounded Idea Generation', 'url': 'https://huggingface.co/papers/2607.08758', 'abstract': 'Abstract A benchmark for scientific lineage reasoning and idea generation is introduced, organizing scientific works as genetic-like Idea Genome objects and evaluating both reasoning and generation capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific ideas rarely start from a blank page. They inherit mechanisms, repair known limitations, and recombine pieces of earlier work, much like biological genomes. Current benchmarks still say little about whether AI systems can follow this inheritance structure. We present IdeaGene-Bench (IG-Bench), a benchmark for scientific lineage reasoning and lineage-grounded idea generation. IG-Bench is organized around the IdeaGene framework: each paper or proposal is represented as a set of minimal, typed, evidence-grounded Idea Genome objects, and a GenomeDiff aligns these objects to record inheritance, mutation, loss, external import, and novel insertion under six operational evolutionary dynamics. The benchmark contains 1,961 golden lineage traces, 1,085 curated Idea Genome objects, and 920 pairwise GenomeDiff records across 10 scientific domains. It supports two evaluations. IG-Exam (42 task types, 1,029 instances) tests closed-form lineage reasoning across Idea Genome abstraction, inheritance tracing, evolutionary reasoning, and lineage verification. IG-Arena evaluates generation with a lineage-conditioned Population-Evolution Score(PES), asking whether a proposal can be inserted as a coherent descendant of a given lineage population: it should inherit the right Idea Genome objects, vary meaningfully from nearby work, and offer selection value for future research. Experiments on 14 LLM-based scientists expose a compositional bottleneck. The strongest system reaches only 27.3% exact accuracy on lineage reasoning, and structured lineage context reshuffles system rankings rather than helping every participant uniformly.', 'score': 0, 'issue_id': 2611, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 июля', 'en': 'July 9', 'zh': '7月9日'}, 'hash': '4e051e29ba070c51', 'authors': ['Yifan Zhou', 'Qihao Yang', 'Yan Li', 'Donggang Li', 'Xiru Hu', 'Hokin Deng', 'Ziyang Gong', 'Xuanyi Zhou', 'Huacan Wang', 'Xiangchao Yan', 'Wanghan Xu', 'Wenlong Zhang', 'Shaofeng Zhang', 'Yue Zhou', 'Yifan Yang', 'Zhihang Zhong', 'Xue Yang'], 'affiliations': ['Carnegie Mellon University', 'East China Normal University', 'Microsoft Corporation', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'University of Chinese Academy of Sciences', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.08758.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '🧬', 'ru': {'title': 'Научные идеи как геномы: бенчмарк для оценки понимания эволюции идей в LLM', 'desc': 'В работе представлен бенчмарк IdeaGene-Bench для оценки способности больших языковых моделей понимать и генерировать научные идеи, следуя их эволюционной линии наследования. Научные работы организованы в виде объектов Idea Genome, которые отслеживают наследование механизмов, мутации и рекомбинации идей из предыдущих исследований, подобно биологическим геномам. Бенчмарк содержит две задачи: IG-Exam для проверки рассуждений о линейности идей и IG-Arena для оценки генерации новых предложений, которые логически встраиваются в существующую популяцию научных работ. Эксперименты показали, что даже сильнейшие LLM достигают только 27,3% точности в понимании линейности наследования научных идей.'}, 'en': {'title': 'Unlocking Scientific Creativity: The Idea Genome Approach', 'desc': 'This paper introduces a new benchmark called IdeaGene-Bench (IG-Bench) for evaluating how well AI systems can reason about scientific ideas and generate new ones based on existing knowledge. It organizes scientific works into genetic-like structures called Idea Genome objects, which capture the inheritance and evolution of ideas. The benchmark includes a variety of tasks to assess both the reasoning capabilities and the generation of ideas, focusing on how well AI can trace lineage and create coherent new proposals. The findings reveal that current AI models struggle with these tasks, highlighting a significant challenge in their ability to understand and build upon existing scientific knowledge.'}, 'zh': {'title': '科学创意的谱系推理与生成基准', 'desc': '本文介绍了一种用于科学谱系推理和创意生成的基准，称为IdeaGene-Bench（IG-Bench）。该基准将科学作品组织为类似基因组的Idea Genome对象，并评估推理和生成能力。IG-Bench包含1961个黄金谱系痕迹和1085个经过整理的Idea Genome对象，支持多种评估任务。实验表明，当前的AI系统在谱系推理方面存在组合瓶颈，最强的系统在推理准确性上仅达到27.3%。'}}}, {'id': 'https://huggingface.co/papers/2607.08763', 'title': 'OpenCoF: Learning to Reason Through Video Generation', 'url': 'https://huggingface.co/papers/2607.08763', 'abstract': 'Abstract OpenCoF framework introduces a reasoning video dataset and model that improve temporal reasoning through diverse supervision and explicit reasoning tokens for visual and textual cues.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reasoning has become a core capability for large models, especially when reliable decisions require understanding logical consequences. Recent video generation models offer a reasoning path distinct from previous Chain-of-Thought (CoT): reasoning can unfold through temporally connected frames, known as Chain-of-Frame (CoF) reasoning. However, existing video generators are primarily trained on general video corpora, still lacking diverse supervision and dedicated designs for CoF reasoning. To address this gap, we introduce OpenCoF, a framework comprising the OpenCoF-17K dataset, a reasoning video dataset spanning 11 task families, and Wan-CoF, a fine-tuned video model for studying whether diverse temporal supervision improves CoF behavior. Across four video reasoning benchmarks, Wan-CoF achieves considerable gains over the Wan2.2-I2V-A14B baseline. Building on this, we empirically explore more advanced designs for CoF capabilities, i.e., equipping the model with visual and textual reasoning tokens. This mechanism respectively captures low-level visual cues and high-level semantic priors for spatial and temporal reasoning. Through performance comparisons and attention analysis, we examine how these tokens contribute across model depth, denoising steps, space, and time. Our results suggest that stronger video reasoning requires both broad temporal supervision and explicit mechanisms for organizing intermediate reasoning state. We open-source the dataset, model, and code to facilitate future research on reasoning-oriented video generation.', 'score': 0, 'issue_id': 2611, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9  'zh': {'title': '提升视频推理能力的OpenCoF框架', 'desc': 'OpenCoF框架引入了一种推理视频数据集和模型，通过多样化的监督和明确的推理标记来改善时间推理。该框架包含OpenCoF-17K数据集，涵盖11个任务类别，并且Wan-CoF模型经过微调，旨在研究多样化的时间监督是否能提升CoF推理能力。研究表明，强大的视频推理需要广泛的时间监督和组织中间推理状态的明确机制。我们开源了数据集、模型和代码，以促进未来在推理导向的视频生成方面的研究。'}}}];
