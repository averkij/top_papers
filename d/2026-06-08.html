    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.07514', 'title': 'UniSHARP: Universal Sharp Monocular View Synthesis', 'url': 'https://huggingface.co/papers/2606.07514', 'abstract': 'Abstract UniSHARP extends SHARP for universal monocular rendering across different camera systems by aligning images in an omnidirectional latent space through joint feature and Gaussian space alignment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In this work, we focus on extending SHARP, the popular photorealistic view synthesis method, for universal monocular rendering across a continuum of camera systems, from conventional perspective cameras to wide-field-of-view, fisheye and omnidirectional panoramic settings. To overcome the pinhole-specific assumptions of SHARP, our key idea is to align various images in a unified omnidirectional latent space. Thus, we propose UniSHARP, which performs implicit alignment in both feature and Gaussian spaces. Specifically, Gaussian primitives are arranged along rays and radial distances in a ray-based universal representation, while 2D semantic and 3D spatial features extracted from UniK3D-inspired encoders are jointly decoded to generate the complete Gaussian cloud. To comprehensively evaluate our method, we construct a benchmark covering diverse imaging systems across various scenes. The benchmark is further stratified by field of view (FoV) to enable fine-grained assessment of the universal monocular rendering task. Extensive experiments on the proposed benchmark demonstrate the effectiveness of UniSHARP, outperforming alternative methods by a large margin. The project page can be found at: https://insta360-research-team.github.io/Unisharp-website/', 'score': 8, 'issue_id': 2389, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': 'a4a307b55eb2e757', 'authors': ['Meixi Song', 'Dizhe Zhang', 'Hao Ren', 'Ruiyang Zhang', 'Bo Du', 'Ming-Hsuan Yang', 'Lu Qi'], 'affiliations': ['Beihang University', 'Insta360 Research', 'Sun Yat-sen University', 'University of California, Merced', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.07514.jpg', 'data': {'categories': ['#dataset', '#open_source', '#benchmark', '#3d', '#cv'], 'emoji': '📷', 'ru': {'title': 'Универсальный синтез видов для всех типов камер через омнидирекциональное пространство', 'desc': 'UniSHARP расширяет метод SHARP для универсального монокулярного рендеринга изображений, полученных различными типами камер, от обычных до панорамных. Основная идея заключается в выравнивании изображений в единое омнидирекциональное латентное пространство путём согласования признаков и примитивов Гаусса. Примитивы Гаусса организованы вдоль лучей и радиальных расстояний в универсальном представлении на основе лучей, а семантические и пространственные признаки декодируются совместно для генерации полного облака Гаусса. Метод протестирован на новом бенчмарке с разнообразными системами визуализации и показывает значительное превосходство над альтернативными подходами.'}, 'en': {'title': 'UniSHARP: Universal Monocular Rendering for All Camera Types', 'desc': 'UniSHARP is an advanced method that enhances the SHARP technique for creating realistic images from a single camera view, applicable to various camera types. It achieves this by aligning images in a shared omnidirectional latent space, allowing for better integration of different camera perspectives. The method utilizes both feature alignment and Gaussian space alignment to generate a comprehensive representation of the scene. Extensive testing shows that UniSHARP significantly outperforms existing methods in universal monocular rendering across diverse imaging systems.'}, 'zh': {'title': 'UniSHARP：跨相机系统的单目渲染新方法', 'desc': 'UniSHARP 是一种扩展 SHARP 的方法，旨在实现不同相机系统之间的单目渲染。它通过在一个统一的全向潜在空间中对图像进行对齐，克服了 SHARP 的针孔特定假设。该方法在特征和高斯空间中进行隐式对齐，生成完整的高斯云。通过构建一个涵盖多种成像系统的基准测试，UniSHARP 在单目渲染任务中表现出色，显著优于其他方法。'}}}, {'id': 'https://huggingface.co/papers/2606.05806', 'title': 'When Tools Fail: Benchmarking Dynamic Replanning and Anomaly Recovery in LLM Agents', 'url': 'https://huggingface.co/papers/2606.05806', 'abstract': "Abstract ToolMaze benchmark reveals that real-world tool failures significantly degrade TIR performance, with implicit semantic failures causing the most severe drops and dynamic replanning emerging as a key bottleneck.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing benchmarks evaluate Tool-Integrated Reasoning (TIR) in LLMs on idealized ''happy paths'', largely overlooking real-world tool failures. We introduce ToolMaze, a benchmark for dynamic path discovery and error recovery in TIR agents. To separate systematic replanning from blind trial-and-error, ToolMaze adopts a two-dimensional design: DAG-based topological complexity and a 2 times 2 taxonomy of tool perturbations (explicit/implicit, transient/permanent). Evaluations show that perturbations degrade performance across nearly all models, with the sharpest drops under implicit semantic failures. Driven by systemic over-trust in corrupted outputs, Perturbation Recovery Rate (PRR) plummets by around 37\\% in these scenarios, while complex topologies trap agents in futile trial-and-error loops. Crucially, agentic fault-tolerance improves with model scale 3.66times slower than basic task execution, highlighting dynamic replanning as a distinct bottleneck unaddressed by model scaling or prompting. Data and code are available at https://github.com/Zhudongsheng75/ToolMaze.", 'score': 5, 'issue_id': 2389, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'bdbabfb8a4ee6af4', 'authors': ['Dongsheng Zhu', 'Xuchen Ma', 'Yucheng Shen', 'Xiang Li', 'Yukun Zhao', 'Shuaiqiang Wang', 'Lingyong Yan', 'Dawei Yin'], 'affiliations': ['Baidu Inc.', 'East China Normal University', 'Shandong University', 'Shanghai AI Laboratory', 'Soochow University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05806.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🛠️', 'ru': {'title': 'Когда инструменты ломаются: обучение агентов справляться с реальными отказами', 'desc': 'В статье представлен бенчмарк ToolMaze для оценки способности языковых моделей работать с инструментами в условиях реальных отказов и ошибок. Исследование показывает, что существующие бенчмарки проверяют только идеальные сценарии, игнорируя проблемы, возникающие при сбоях инструментов, особенно неявных семантических ошибок. Авторы разработали двумерную схему оценки с учётом топологической сложности и различных типов возмущений инструментов, обнаружив, что агенты часто чрезмерно доверяют повреждённым выводам. Результаты демонстрируют, что динамическое переплаирование становится узким местом, которое не решается увеличением масштаба модели или улучшением промптов.'}, 'en': {'title': 'Navigating Real-World Challenges in Tool-Integrated Reasoning', 'desc': 'The ToolMaze benchmark highlights how real-world tool failures can severely impact the performance of Tool-Integrated Reasoning (TIR) in large language models (LLMs). It identifies implicit semantic failures as the most detrimental, leading to significant drops in performance. The benchmark features a two-dimensional design that distinguishes between systematic replanning and random trial-and-error, focusing on the complexity of tool interactions. Results indicate that while larger models show improved fault tolerance, they still struggle with dynamic replanning, which remains a critical bottleneck in TIR applications.'}, 'zh': {'title': 'ToolMaze：应对真实工具故障的动态路径发现', 'desc': 'ToolMaze基准测试揭示了现实世界中的工具故障会显著降低工具集成推理（TIR）的性能，尤其是隐式语义故障造成的性能下降最为严重。现有基准主要评估理想化的“快乐路径”，忽视了真实环境中的工具故障。我们引入了ToolMaze，一个用于动态路径发现和错误恢复的基准，采用了基于有向无环图的拓扑复杂性和工具扰动的分类方法。评估结果表明，扰动会在几乎所有模型中降低性能，尤其是在隐式语义故障的情况下，模型的恢复率显著下降。'}}}, {'id': 'https://huggingface.co/papers/2606.06741', 'title': 'OpenSkill: Open-World Self-Evolution for LLM Agents', 'url': 'https://huggingface.co/papers/2606.06741', 'abstract': 'Abstract OpenSkill enables self-evolving agents to develop skills and verification signals from scratch using open-world resources without target-task supervision, achieving high automated performance across benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Self-evolving agents requires adaptation after deployment, but existing approaches assume a usable learning loop, such as curated skills, successful trajectories, or verifier signals. Real open-world deployments may provide none of these, offering only a task prompt. In this work, we study open-world self-evolution, where an agent must build both its skills and its own verification signals from scratch, using open-world resources but no target-task supervision. We propose OpenSkill, a framework that bootstraps this loop: it acquires grounded knowledge and verification anchors from documentation, repositories, and the web, synthesizes them into transferable skills, and refines those skills against self-built virtual tasks grounded in the anchors rather than in target answers. The open world thus supplies both the knowledge to be learned and a supervision-independent practice environment, with target-task supervision reserved for final evaluation. Across three benchmarks and two target agents, OpenSkill attains the best automated pass rate while satisfying the no-supervision constraint. Analysis shows its skills transfer across models without model-specific adaptation, and its self-built verifier aligns with ground-truth outcomes despite never accessing them.', 'score': 3, 'issue_id': 2389, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'e1de9b4230d435c9', 'authors': ['Zhiling Yan', 'Dingjie Song', 'Hanrong Zhang', 'Wei Liang', 'Yuxuan Zhang', 'Yutong Dai', 'Lifang He', 'Philip S. Yu', 'Ran Xu', 'Xiang Li', 'Lichao Sun'], 'affiliations': ['Lehigh University', 'Massachusetts General Hospital and Harvard Medical School', 'Salesforce AI Research', 'University of British Columbia', 'University of Illinois Chicago', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.06741.jpg', 'data': {'categories': ['#open_source', '#agents', '#benchmark', '#transfer_learning', '#reasoning', '#training'], 'emoji': '🌍', 'ru': {'title': 'Агент, обучающий сам себя из ресурсов открытого мира', 'desc': 'OpenSkill — это фреймворк для самоэволюционирующих агентов, которые способны самостоятельно разрабатывать навыки и сигналы верификации без надзора за целевой задачей, используя открытые ресурсы из интернета, документации и репозиториев. Система загружает знания из открытого мира, синтезирует их в передаваемые навыки и совершенствует эти навыки на искусственно созданных виртуальных задачах, которые не требуют доступа к правильным ответам. Разработанный верификатор на основе якорей из открытых ресурсов хорошо коррелирует с реальными результатами, несмотря на отсутствие доступа к целевой разметке. Подход достигает наилучшей автоматизированной производительности на нескольких бенчмарках и демонстрирует способность навыков переноситься между разными моделями без модель-специфической адаптации.'}, 'en': {'title': 'Empowering Agents to Evolve Skills Independently in an Open World', 'desc': 'OpenSkill is a framework designed for self-evolving agents that can learn and verify skills independently in an open-world environment without needing specific task supervision. It allows agents to gather knowledge from various resources like documentation and the web, creating transferable skills and verification signals from scratch. This approach enables agents to practice and refine their skills using self-generated virtual tasks, rather than relying on predefined answers. The results show that OpenSkill achieves high performance across benchmarks while maintaining the ability to transfer skills between different models without needing tailored adaptations.'}, 'zh': {'title': '开放世界中的自我进化智能体', 'desc': 'OpenSkill 是一个框架，允许自我进化的智能体在没有目标任务监督的情况下，从开放世界资源中开发技能和验证信号。该方法通过从文档、代码库和网络中获取知识，合成可转移的技能，并在自建的虚拟任务中进行技能的精炼。OpenSkill 在三个基准测试和两个目标智能体上表现出色，达到了最佳的自动通过率，同时满足无监督的要求。分析表明，其技能可以在不同模型间转移，而自建的验证器与真实结果一致，尽管从未接触过这些结果。'}}}, {'id': 'https://huggingface.co/papers/2605.26046', 'title': 'When Gradients Collide: Failure Modes of Multi-Objective Prompt Optimization for LLM Judges', 'url': 'https://huggingface.co/papers/2605.26046', 'abstract': "Abstract Multi-objective LLM judge customization using textual gradients faces challenges from gradient dilution and instruction interference that limit optimization effectiveness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Customizing an LLM judge to a specific task or domain often involves optimizing its prompt across multiple evaluation criteria simultaneously. Textual gradient methods automate this for a single judge criterion, however they produce natural-language critiques, not numerical vectors. Thus, the conflict-resolution toolkit of multi-task learning (PCGrad, MGDA) doesn't apply to the multi-objective textual gradient setting. We test five decomposition modes of textual gradient optimizers by varying how much cross-task information the loss, gradient and optimizer LLMs share. In 6 of 10 configurations, we observe that optimization never improves over the initial prompt. Gradient specificity drops by 59% (from 9.0 to 3.7) when the gradient LLM processes multiple criteria jointly. Separately, we observe that naively combining per-task instructions into a single prompt degrades Spearman's rho by -5.3%. These results identify two separable failure modes: optimization-time gradient dilution and inference-time instruction interference, which together constrain the design space for multi-objective judge customization using textual feedback.", 'score': 2, 'issue_id': 2389, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '7c80dfad5671923d', 'authors': ['Parth Darshan', 'Abhishek Divekar'], 'affiliations': ['Amazon', 'IIT Jodhpur'], 'pdf_title_img': 'assets/pdf/title_img/2605.26046.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Преодоление конфликтов в многокритериальной оптимизации текстовых градиентов LLM', 'desc': 'В этой работе исследуется проблема оптимизации LLM-судей по нескольким критериям одновременно с использованием текстовых градиентов. Авторы выявили два основных препятствия: разбавление градиентов при совместной обработке нескольких задач (снижение специфичности на 59%) и интерференция инструкций при объединении задач в один промпт (ухудшение корреляции Спирмена на 5.3%). Исследование показывает, что традиционные методы многозадачного обучения (PCGrad, MGDA) не применимы к текстовым градиентам, так как они генерируют естественный язык вместо числовых векторов. Результаты работы определяют ограничения в дизайне систем многокритериальной настройки судей с использованием текстовой обратной связи.'}, 'en': {'title': 'Navigating Challenges in Multi-Objective LLM Customization', 'desc': 'This paper discusses the challenges of customizing a large language model (LLM) judge for specific tasks using textual gradients. It highlights issues like gradient dilution and instruction interference that hinder effective optimization across multiple evaluation criteria. The authors test different methods of optimizing textual gradients and find that combining multiple tasks can lead to a significant drop in gradient specificity. Their findings reveal two main problems that limit the customization process: the dilution of gradients during optimization and interference from mixed instructions during inference.'}, 'zh': {'title': '优化多目标评判者的挑战与解决方案', 'desc': '这篇论文探讨了多目标大语言模型（LLM）评判者定制中的挑战，特别是梯度稀释和指令干扰对优化效果的限制。研究表明，文本梯度方法在处理单一评判标准时能够自动化，但在多目标设置中却无法有效生成数值向量。通过测试五种文本梯度优化器的分解模式，发现优化在大多数配置下无法超越初始提示。最终，论文识别出两种可分离的失败模式：优化时的梯度稀释和推理时的指令干扰，这限制了使用文本反馈进行多目标评判者定制的设计空间。'}}}, {'id': 'https://huggingface.co/papers/2606.07080', 'title': 'dots.tts Technical Report', 'url': 'https://huggingface.co/papers/2606.07080', 'abstract': 'Abstract A 2B-parameter continuous autoregressive text-to-speech model trained on a multilingual corpus achieves state-of-the-art performance on multiple benchmarks while enabling efficient low-latency speech generation through specialized distillation techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present dots.tts, a 2B-parameter continuous autoregressive text-to-speech (TTS) foundation model that models speech in a continuous latent space. Compared with existing continuous autoregressive models, our key innovations are threefold. First, we train an AudioVAE with multiple objectives to build a semantically structured and prediction-friendly continuous speech space. Second, we use full-history conditioning in the flow-matching head to preserve long-range consistency and reduce drift during generation. Third, we apply reward-free self-corrective post-training to the flow-matching head to further improve robustness and acoustic quality. After being trained on a large-scale multilingual corpus, dots.tts achieves the best average performance on Seed-TTS-Eval, with WERs of 0.94%/1.30%/6.60% and SIM scores of 81.0/77.1/79.5 on the zh/en/zh-hard test sets, respectively. Across other benchmarks, dots.tts also consistently demonstrates open-source state-of-the-art performance, exhibiting strong generation stability, voice cloning ability, and emotional expressiveness. For efficient inference, we further apply CFG-aware MeanFlow distillation, enabling low-latency speech generation with first-packet latencies of 85/54 ms in output streaming and dual-streaming modes, respectively. To facilitate reproducible research and practical deployment, we release the training and inference code, together with the pretrained, post-trained, and MeanFlow-distilled checkpoints, under the Apache 2.0 license.', 'score': 1, 'issue_id': 2389, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '0c4ef88044136f10', 'authors': ['Shi Lian', 'Changtao Li', 'Bohan Li', 'Hankun Wang', 'Da Zheng', 'Junfeng Tian', 'Yufeng Ma', 'Colin Zhang', 'Kai Yu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.07080.jpg', 'data': {'categories': ['#multilingual', '#small_models', '#audio', '#inference', '#training'], 'emoji': '🗣️', 'ru': {'title': 'Быстрая и точная речь из текста: многоязычная foundation model с низкой латентностью', 'desc': 'Представлена модель dots.tts — большая автарегрессивная нейронная сеть с 2 миллиардами параметров для синтеза речи из текста, обученная на многоязычном корпусе. Ключевые инновации включают обучение AudioVAE с несколькими целевыми функциями для создания структурированного непрерывного пространства речи, использование полной истории контекста в flow-matching головке для сохранения долгосрочной консистентности и применение самокорректирующей постобучения без использования наград. Модель достигает лучшей производительности на бенчмарках с низкой ошибкой распознавания речи и использует дистилляцию MeanFlow для эффективного вывода с минимальной задержкой.'}, 'en': {'title': 'Revolutionizing Speech Generation with dots.tts', 'desc': 'The paper introduces dots.tts, a 2B-parameter continuous autoregressive text-to-speech model that excels in generating speech from text. It utilizes a novel AudioVAE to create a structured continuous speech space, enhancing prediction accuracy. The model incorporates full-history conditioning to maintain consistency over long sequences and employs self-corrective post-training to boost robustness and sound quality. Trained on a diverse multilingual dataset, dots.tts achieves top performance on various benchmarks, demonstrating low-latency generation and strong capabilities in voice cloning and emotional expressiveness.'}, 'zh': {'title': '突破性的多语言文本到语音模型', 'desc': '本文介绍了一种名为dots.tts的2B参数连续自回归文本到语音（TTS）模型，该模型在多语言语料库上训练，达到了多个基准测试的最先进性能。该模型的创新之处在于：首先，使用多目标训练的AudioVAE构建语义结构化的连续语音空间；其次，在流匹配头中使用全历史条件，以保持长距离一致性并减少生成过程中的漂移；最后，应用无奖励自我校正后训练，进一步提高了模型的鲁棒性和音质。经过大规模多语言语料库的训练，dots.tts在Seed-TTS-Eval上取得了最佳平均性能，并在其他基准测试中也表现出色，展现了强大的生成稳定性、声音克隆能力和情感表现力。'}}}, {'id': 'https://huggingface.co/papers/2606.07412', 'title': 'Socratic-SWE: Self-Evolving Coding Agents via Trace-Derived Agent Skills', 'url': 'https://huggingface.co/papers/2606.07412', 'abstract': "Abstract Socratic-SWE enables self-evolving software engineering agents by leveraging historical solving traces to generate targeted repair tasks that improve agent performance through iterative refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM-driven software engineering agents have become a central testbed for real-world language-model capability, yet their training remains limited by the availability of high-quality SWE tasks. Existing synthetic data methods typically create tasks through fixed mutation or bug-injection procedures, making the resulting distributions largely independent of the agent's own weaknesses and training progress. We introduce Socratic-SWE, a closed-loop self-evolution framework that reuses the agent's historical solving traces as a source of training signal. Rather than treating traces only as evidence for reward computation, Socratic-SWE distills them into structured agent skills that summarize recurring failures and effective repair patterns. These skills then guide the generation of targeted repair tasks in real repositories. Candidate tasks are checked through execution-based validation and scored with a solver-gradient alignment reward, so that the retained tasks are both verifiable and useful for improving the Solver. The updated Solver produces new traces, enabling the task curriculum to adapt over successive rounds. Across SWE-bench Verified, SWE-bench Lite, SWE-bench Pro, and Terminal-Bench 2.0, Socratic-SWE consistently improves over self-evolving baselines under the same compute budget, reaching 50.40% on SWE-bench Verified after three iterations. These results suggest that solving traces can serve as a scalable substrate for self-evolving SWE agents.", 'score': 0, 'issue_id': 2389, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '789b73aa1380bbe2', 'authors': ['Chuan Xiao', 'Zhengbo Jiao', 'Shaobo Wang', 'Wei Wang', 'Bing Zhao', 'Hu Wei', 'Linfeng Zhang', 'Lin Qu'], 'affiliations': ['AI Data, Alibaba Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.07412.jpg', 'data': {'categories': ['#agents', '#benchmark', '#training', '#plp', '#science', '#synthetic', '#optimization', '#data'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция агентов через переработку собственного опыта решения', 'desc': 'Socratic-SWE представляет закрытый цикл самоэволюции для агентов инженерии программного обеспечения, которые улучшают свою производительность через итеративное обучение. Система анализирует исторические логи решений агента, извлекает структурированные навыки из повторяющихся ошибок и эффективных паттернов исправления. На основе этих навыков генерируются целевые задачи восстановления в реальных репозиториях, которые валидируются через выполнение кода и оцениваются специальной метрикой выравнивания. Благодаря адаптивной очередности задач агент достигает значительного улучшения производительности, демонстрируя, что логи решений являются масштабируемым ресурсом для самообучения.'}, 'en': {'title': 'Empowering Self-Evolving Agents Through Historical Learning', 'desc': "Socratic-SWE is a framework designed to enhance the performance of software engineering agents by using their past solving experiences to create specific repair tasks. Instead of relying on traditional methods that generate tasks through fixed mutations, this approach utilizes historical traces to identify common failures and effective solutions. By distilling these traces into structured skills, the framework generates targeted tasks that are validated through execution, ensuring they are both practical and beneficial for the agent's improvement. This iterative process allows the agent to continuously evolve and adapt its learning based on its own performance, leading to significant advancements in task-solving capabilities."}, 'zh': {'title': '自我进化的软件工程代理新方法', 'desc': 'Socratic-SWE 是一种自我进化的软件工程代理框架，通过利用历史解决轨迹生成针对性的修复任务，从而提高代理的性能。该方法不同于传统的固定变异或注入错误的合成数据方法，而是将历史轨迹提炼为结构化的代理技能，帮助识别常见的失败和有效的修复模式。生成的修复任务经过执行验证，并通过求解器梯度对齐奖励进行评分，以确保任务的可验证性和实用性。实验结果表明，Socratic-SWE 在多个基准测试中表现优异，证明了解决轨迹可以作为自我进化软件工程代理的可扩展基础。'}}}, {'id': 'https://huggingface.co/papers/2606.06538', 'title': 'WorldBench: A Challenging and Visually Diverse Multimodal Reasoning Benchmark', 'url': 'https://huggingface.co/papers/2606.06538', 'abstract': "Abstract WorldBench is introduced as a visually diverse reasoning benchmark for evaluating multimodal large language models, revealing significant limitations in current models' visual understanding capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In real-world applications, models are expected to perform reliably across diverse settings. Yet, many existing multimodal benchmarks expand task types without capturing the visual diversity needed to handle open-ended visual inputs. We present WorldBench, a challenging and visually diverse reasoning benchmark to evaluate Multimodal Large Language Models (MLLMs). We build a taxonomy of thousands of visual concepts across multiple domains (e.g., living things). Guided by this taxonomy, we curate a broad collection of images from search engines and existing datasets to comprehensively represent the visual world. Through structured trial-and-error, we manually design challenging questions that frontier MLLMs fail to answer. On quantitative and human evaluations, WorldBench achieves higher visual diversity than any existing diverse benchmark. Evaluating 15 MLLMs on WorldBench reveals weaknesses in visual understanding: even the strongest model reaches only 64.0% accuracy, while some models perform marginally above chance-level. We hope our work highlights the importance of visual diversity in building multimodal benchmarks.", 'score': 0, 'issue_id': 2389, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'a9026e5fd4f872f4', 'authors': ['Yida Yin', 'Harish Krishnakumar', 'Chung Peng Lee', 'Boya Zeng', 'Wenhao Chai', 'Shengbang Tong', 'Wenhu Chen', 'Hu Xu', 'Xingyu Fu', 'Gabriel Sarch', 'Aleksandra Korolova', 'Zhuang Liu'], 'affiliations': ['Meta, FAIR', 'NYU', 'Princeton University', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.06538.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '🌍', 'ru': {'title': 'Визуальное разнообразие — ключ к честной оценке мультимодальных моделей', 'desc': 'Представлена WorldBench — новый бенчмарк для оценки мультимодальных больших языковых моделей, который отличается высокой визуальной разнообразностью и охватывает тысячи визуальных концепций из разных областей. Авторы создали таксономию и собрали репрезентативную коллекцию изображений, а затем вручную разработали сложные вопросы, на которые не могут ответить существующие MLLM. Тестирование 15 моделей выявило серьёзные ограничения в способности понимать визуальное содержание: даже лучшая модель достигает только 64% точности. Исследование подчёркивает критическую важность визуального разнообразия при создании бенчмарков для мультимодальных моделей.'}, 'en': {'title': 'WorldBench: Elevating Visual Understanding in Multimodal Models', 'desc': "WorldBench is a new benchmark designed to test how well multimodal large language models (MLLMs) understand visual information. It highlights the shortcomings of current models in handling diverse visual inputs, which are crucial for real-world applications. The benchmark includes a wide range of visual concepts and images, allowing for a comprehensive evaluation of MLLMs' reasoning abilities. Results show that even the best-performing models struggle with visual understanding, achieving only 64.0% accuracy, underscoring the need for better visual diversity in model training and evaluation."}, 'zh': {'title': '提升多模态模型的视觉理解能力', 'desc': 'WorldBench是一个用于评估多模态大型语言模型的视觉多样性推理基准，揭示了当前模型在视觉理解能力上的显著局限性。该基准通过构建跨多个领域的视觉概念分类法，收集了大量图像，以全面代表视觉世界。我们设计了具有挑战性的问题，发现前沿的多模态大型语言模型在回答这些问题时表现不佳。通过对15个多模态大型语言模型的评估，发现即使是最强的模型准确率也仅为64.0%，这表明在构建多模态基准时，视觉多样性的重要性不容忽视。'}}}];

            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');

        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture', '#audio (1)', '#benchmark (5)', '#cv (1)', '#data (1)', '#dataset (2)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (1)', '#open_source (2)', '#optimization (1)', '#plp (1)', '#rag', '#reasoning (1)', '#rl', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (3)', '#transfer_learning (1)', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-08 02:48',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-08 02:48')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-08 02:48')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
