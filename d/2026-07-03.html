    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {
                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.02512', 'title': 'Program-as-Weights: A Programming Paradigm for Fuzzy Functions', 'url': 'https://huggingface.co/papers/2607.02512', 'abstract': 'Abstract Fuzzy-function programming compiles natural-language specifications into compact neural artifacts using a 4B compiler and 0.6B interpreter, achieving efficient, local execution with reduced memory usage and faster inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Many everyday programming tasks resist clean rule-based implementation, such as alerting on important log lines, repairing malformed JSON, or ranking search results by intent, and are increasingly outsourced to large language model APIs at the cost of locality, reproducibility, and price. We propose fuzzy-function programming: compiling such a function from a natural-language specification into a compact, locally-executable neural artifact. We instantiate this paradigm with Program-as-Weights (PAW), in which a 4B compiler trained on FuzzyBench, a 10M-example dataset we release, emits parameter-efficient adapters for a frozen, lightweight interpreter. A 0.6B Qwen3 interpreter executing PAW programs matches the performance of direct prompting of Qwen3-32B, while using roughly one fiftieth of the inference memory and running at 30 tokens/s on a MacBook M3. PAW reframes the foundation model from a per-input problem solver into a tool builder: invoked once per function definition, it produces a small reusable artifact whose subsequent calls per function application are cheap and offline.', 'score': 6, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'cfda8ca76e39c79f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#small_models', '#training', '#plp', '#optimization', '#synthetic', '#dataset', '#inference', '#open_source'], 'emoji': '⚙️', 'ru': {'title': 'Компиляция естественного языка в эффективные локальные нейросетевые функции', 'desc': 'В работе предложен метод fuzzy-function programming, который компилирует спецификации на естественном языке в компактные нейросетевые артефакты. Система использует компилятор размером 4 миллиарда параметров, обученный на датасете FuzzyBench из 10 миллионов примеров, который генерирует параметрически эффективные адаптеры. Интерпретатор размером 0.6 миллиарда параметров выполняет полученные программы с качеством сопоставимым с промптингом модели в 32 миллиарда параметров, при этом требуя в 50 раз меньше памяти и работая локально. Подход переосмысляет роль foundation models: вместо решения каждой задачи отдельно, модель один раз компилирует спецификацию в переиспользуемый артефакт, делая последующие вызовы дешевыми и автономными.'}, 'en': {'title': 'Transforming Natural Language into Efficient Neural Functions', 'desc': 'This paper introduces fuzzy-function programming, a method that transforms natural language specifications into compact neural models for efficient execution. It utilizes a 4B compiler and a 0.6B interpreter to create parameter-efficient adapters, allowing for reduced memory usage and faster inference times. The approach addresses common programming challenges that are difficult to solve with traditional rule-based methods, such as log analysis and JSON repair. By using Program-as-Weights (PAW), the authors demonstrate that their method can achieve performance comparable to larger models while being more resource-efficient.'}, 'zh': {'title': '模糊函数编程：高效的本地执行工具', 'desc': '模糊函数编程将自然语言规范编译成紧凑的神经网络工件，使用4B编译器和0.6B解释器，实现高效的本地执行，减少内存使用并加快推理速度。许多日常编程任务难以用清晰的规则实现，因此越来越多地依赖大型语言模型API，这样会影响本地性、可重复性和成本。我们提出了模糊函数编程的概念，通过自然语言规范编译出可本地执行的紧凑神经工件。我们用程序作为权重（PAW）来实现这一范式，4B编译器在FuzzyBench数据集上训练，生成高效的适配器，0.6B的Qwen3解释器执行PAW程序时，性能与直接提示Qwen3-32B相当，但推理内存仅为其五十分之一。'}}}, {'id': 'https://huggingface.co/papers/2607.02269', 'title': 'AnyGroundBench: A Specialized-Domain Benchmark for Video Grounding in Vision-Language Models', 'url': 'https://huggingface.co/papers/2607.02269', 'abstract': 'Abstract Vision-Language Models struggle with domain adaptation in specialized spatio-temporal video grounding tasks, highlighting limitations in zero-shot generalization and in-context learning capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language Models (VLMs) have demonstrated immense promise in Spatio-Temporal Video Grounding (STVG). However, current evaluation protocols are largely confined to zero-shot assessments on general, daily-life benchmarks. This creates a critical disconnect from real-world applications in specialized fields, where models inevitably encounter rare visual concepts and complex spatio-temporal dynamics. Since exhaustive pre-training across infinite data distributions is infeasible, the ability to adapt to novel domains is essential. To bridge this gap, we introduce AnyGroundBench, a domain-adaptation benchmark designed to shift the STVG evaluation paradigm from static zero-shot testing to rigorous domain adaptation. Targeting five specialized domains (animal, industry, sports, surgery, and public security), AnyGroundBench pairs newly captured videos such as expert-annotated mouse behaviors with established datasets, unifying them through dense, high-fidelity spatio-temporal annotations. Crucially, the benchmark provides dedicated training subsets to systematically measure domain adaptability. We extensively evaluate 15 state-of-the-art VLMs, assessing their zero-shot generalization and In-Context Learning (ICL) capabilities under practical computational constraints. Ultimately, our findings reveal that current models fail in both zero-shot and ICL-based adaptation when confronted with specialized domains, exposing critical flaws in spatio-temporal reasoning that future research must address.', 'score': 3, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '6dd4262918c664fe', 'authors': ['Rintaro Otsubo', 'Ryo Fujii', 'Reina Ishikawa', 'Taiki Kanaya', 'Kanta Sawafuji', 'Hiroki Kajita', 'Shigeki Sakai', 'Hideo Saito', 'Ryo Hachiuma'], 'affiliations': ['Keio AI Research Center', 'Keio University', 'Keio University School of Medicine', 'NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02269.jpg', 'data': {'categories': ['#dataset', '#video', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От общих сцен к специальности: бенчмарк для адаптации видео-языковых моделей', 'desc': 'Работа представляет AnyGroundBench — новый бенчмарк для оценки способности Vision-Language Models адаптироваться к специализированным доменам в задаче пространственно-временной локализации объектов в видео (STVG). Авторы обнаружили, что существующие оценки моделей ограничены тестированием на общих датасетах повседневных сцен, что не отражает реальные приложения в узкоспециализированных областях с редкими визуальными концепциями. Бенчмарк включает пять специализированных доменов (животные, промышленность, спорт, хирургия, общественная безопасность) с плотными аннотациями и тренировочными подмножествами для систематического измерения способности к адаптации. Результаты оценки 15 современных VLM показали, что модели критически не справляются как с zero-shot обобщением, так и с адаптацией через In-Context Learning на специализированных данных.'}, 'en': {'title': 'Bridging the Gap in Video Grounding: AnyGroundBench for Domain Adaptation', 'desc': 'This paper discusses the challenges faced by Vision-Language Models (VLMs) in adapting to specialized tasks in spatio-temporal video grounding (STVG). It highlights the limitations of these models in zero-shot generalization and in-context learning when applied to real-world scenarios with rare visual concepts. To address this issue, the authors introduce AnyGroundBench, a new benchmark that shifts the evaluation focus from static zero-shot assessments to rigorous domain adaptation across five specialized domains. The study evaluates 15 state-of-the-art VLMs, revealing significant shortcomings in their ability to adapt to these specialized domains, indicating a need for improved spatio-temporal reasoning in future research.'}, 'zh': {'title': '提升视觉-语言模型的领域适应能力', 'desc': '本文探讨了视觉-语言模型在特定时空视频定位任务中的领域适应能力不足，特别是在零样本泛化和上下文学习方面的局限性。我们提出了AnyGroundBench，这是一个旨在将STVG评估从静态零样本测试转变为严格领域适应的基准。该基准针对五个专业领域（动物、工业、体育、外科和公共安全），通过高保真时空注释将新捕获的视频与现有数据集结合。我们的评估显示，当前模型在面对专业领域时，在零样本和上下文学习适应方面均表现不佳，暴露了时空推理中的关键缺陷。'}}}, {'id': 'https://huggingface.co/papers/2607.02291', 'title': 'Optimizing Visual Generative Models via Distribution-wise Rewards', 'url': 'https://huggingface.co/papers/2607.02291', 'abstract': 'Abstract A novel reinforcement learning framework for visual generation uses distribution-wise rewards to improve image diversity and quality while addressing mode collapse and computational efficiency issues.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Conventional reinforcement learning strategies for visual generation typically employ sample-wise reward functions, yet this practice frequently results in reward hacking that degrades image diversity and introduces visual anomalies. To address these limitations, we present a novel framework that finetunes generative models using distribution-wise rewards, ensuring better alignment with real-world data distributions. Unlike rewards that evaluate samples individually, distribution-wise reward accounts for the data distribution of the samples, mitigating the mode collapse problem that occurs when all samples optimize towards the same direction independently. To overcome the prohibitive computational cost of estimating these rewards, we introduce a subset-replace strategy that efficiently provides reward signals by updating only a small subset of a generated reference set. Additionally, we apply RL to optimize post-hoc model merging coefficients, potentially mitigating the train-inference inconsistency caused by introducing stochastic differential equation (SDE) in regular RL practices. Extensive experiments show our approach significantly improves FID-50K across various base models, from 8.30 to 5.77 for SiT and from 3.74 to 3.52 for EDM2. Qualitative evaluation also confirms that our method enhances perceptual quality while preserving sample diversity.', 'score': 2, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '297a734a4493d805', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Распределительные награды для разнообразной генерации изображений', 'desc': 'В работе предложена новая методика обучения с подкреплением для генерации изображений, которая использует распределительные функции вознаграждения вместо традиционных выборочных оценок. Это решает проблему коллапса мод, когда модель генерирует однообразные образцы, оптимизируясь в одном направлении. Авторы вводят стратегию частичной замены для эффективного расчета вознаграждений и применяют усиленное обучение для оптимизации коэффициентов слияния моделей. Экспериментальные результаты показывают значительное улучшение метрики FID-50K и сохранение разнообразия генерируемых изображений.'}, 'en': {'title': 'Enhancing Visual Generation with Distribution-Wise Rewards', 'desc': 'This paper introduces a new reinforcement learning framework aimed at enhancing visual generation by using distribution-wise rewards instead of traditional sample-wise rewards. By focusing on the overall data distribution, the framework effectively reduces issues like mode collapse, where generated images become too similar. The authors also present a subset-replace strategy to efficiently compute these rewards, minimizing computational costs. Experimental results demonstrate significant improvements in image quality and diversity, as indicated by lower FID scores and better perceptual quality.'}, 'zh': {'title': '提升视觉生成的多样性与质量', 'desc': '本文提出了一种新颖的强化学习框架，用于视觉生成，采用分布式奖励来提高图像的多样性和质量，同时解决模式崩溃和计算效率问题。与传统的逐样本奖励函数不同，分布式奖励考虑了样本的数据分布，从而减轻了所有样本独立优化导致的模式崩溃问题。为了降低估计这些奖励的计算成本，本文引入了一种子集替换策略，仅更新生成参考集的小部分，从而高效地提供奖励信号。此外，本文还应用强化学习来优化后期模型合并系数，可能减轻引入随机微分方程(SDE)所造成的训练与推理不一致性。'}}}, {'id': 'https://huggingface.co/papers/2607.01647', 'title': 'AgenticDataBench: A Comprehensive Benchmark for Data Agents', 'url': 'https://huggingface.co/papers/2607.01647', 'abstract': 'Abstract A comprehensive benchmark named AgenticDataBench is introduced to evaluate data agents across diverse domains with fine-grained task annotations and skill-based coverage metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Data science aims to derive actionable insights from heterogeneous raw data, unlocking the value of the massive amounts of data generated in modern society. Automating this process is essential to reducing labor-intensive efforts for data scientists and enabling scalable data-driven applications. Recently, large language model (LLM)-based data agents have emerged as a promising solution to automate data science workflows. However, the field lacks comprehensive benchmarks to rigorously evaluate these agents across diverse scenarios with fine-grained granularity. To address this gap, we propose AgenticDataBench, a comprehensive benchmark featuring realistic tasks spanning diverse domains with fine-grained ground-truth labels. This enables evaluations to capture the diversity and complexity of data science workflows and the detailed performance of agents. First, to cover diverse domains, we collect real datasets and tasks from 15 vertical domains, including 5 real-world B2B use cases from a leading fintech company. Second, to remove redundancy in real-world tasks and generate high-quality tasks for domains lacking real data, we introduce data science skills, recurring data-centric operational patterns, and quantify benchmark coverage by the number of skills included. Representative skills are extracted from large-scale task solutions on Stack Overflow using skill-aligned hierarchical clustering. Third, for real-world business tasks, we select task-solution pairs that maximize diversity in skill composition, ensuring broad coverage of practical scenarios. Fourth, to generate realistic tasks for devise domains without real tasks, we propose a systematic LLM-based task generation approach to create workflows and tasks based on these skills. Finally, we evaluate state-of-the-art data agents using our annotated benchmark and open-sourced testbed, providing detailed skill-level insights.', 'score': 2, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'a374c976d2699bde', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#dataset', '#data', '#agents', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Комплексная оценка data-агентов через навык-ориентированные бенчмарки', 'desc': 'В статье представлен AgenticDataBench — комплексный бенчмарк для оценки агентов на основе LLM в задачах автоматизации data science. Авторы собрали реальные датасеты и задачи из 15 различных доменов, включая 5 примеров из реальных B2B случаев финтех-компании. Для обеспечения качественного и разнообразного покрытия предложен подход на основе выделения повторяющихся навыков в data science, которые извлекаются из решений на Stack Overflow с помощью иерархической кластеризации. Бенчмарк включает детально аннотированные задачи с fine-grained метриками, позволяющими оценить производительность агентов на уровне отдельных умений и операций.'}, 'en': {'title': 'Empowering Data Science Automation with AgenticDataBench', 'desc': 'The paper introduces AgenticDataBench, a benchmark designed to evaluate data agents in various domains with detailed task annotations and skill-based metrics. It addresses the need for rigorous assessment of large language model (LLM)-based data agents, which automate data science workflows. The benchmark includes real datasets from 15 domains and employs a systematic approach to generate high-quality tasks, ensuring comprehensive coverage of data science skills. By evaluating state-of-the-art data agents against this benchmark, the study provides insights into their performance and capabilities in handling complex data tasks.'}, 'zh': {'title': '全面评估数据代理的基准工具', 'desc': '本文介绍了一个名为AgenticDataBench的综合基准，用于评估数据代理在不同领域的表现，具有细粒度的任务注释和基于技能的覆盖度指标。数据科学旨在从异构原始数据中提取可操作的见解，自动化这一过程对于减少数据科学家的劳动强度至关重要。近年来，基于大型语言模型（LLM）的数据代理作为自动化数据科学工作流程的有前景的解决方案出现，但缺乏全面的基准来严格评估这些代理的表现。为此，我们提出了AgenticDataBench，涵盖了来自15个垂直领域的真实数据集和任务，确保评估能够捕捉数据科学工作流程的多样性和复杂性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment', '#architecture', '#audio', '#benchmark (2)', '#cv', '#data (1)', '#dataset (3)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (1)', '#open_source (1)', '#optimization (1)', '#plp (1)', '#rag', '#reasoning', '#rl', '#rlhf', '#robotics', '#science', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (1)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-03 02:07',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-03 02:07')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-03 02:07')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
