    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.02512', 'title': 'Program-as-Weights: A Programming Paradigm for Fuzzy Functions', 'url': 'https://huggingface.co/papers/2607.02512', 'abstract': 'Abstract Fuzzy-function programming compiles natural-language specifications into compact neural artifacts using a 4B compiler and 0.6B interpreter, achieving efficient, local execution with reduced memory usage and faster inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Many everyday programming tasks resist clean rule-based implementation, such as alerting on important log lines, repairing malformed JSON, or ranking search results by intent, and are increasingly outsourced to large language model APIs at the cost of locality, reproducibility, and price. We propose fuzzy-function programming: compiling such a function from a natural-language specification into a compact, locally-executable neural artifact. We instantiate this paradigm with Program-as-Weights (PAW), in which a 4B compiler trained on FuzzyBench, a 10M-example dataset we release, emits parameter-efficient adapters for a frozen, lightweight interpreter. A 0.6B Qwen3 interpreter executing PAW programs matches the performance of direct prompting of Qwen3-32B, while using roughly one fiftieth of the inference memory and running at 30 tokens/s on a MacBook M3. PAW reframes the foundation model from a per-input problem solver into a tool builder: invoked once per function definition, it produces a small reusable artifact whose subsequent calls per function application are cheap and offline.', 'score': 74, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'cfda8ca76e39c79f', 'authors': ['Wentao Zhang', 'Liliana Hotsko', 'Woojeong Kim', 'Pengyu Nie', 'Stuart Shieber', 'Yuntian Deng'], 'affiliations': ['Cornell University', 'Harvard University', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2607.02512.jpg', 'data': {'categories': ['#small_models', '#training', '#plp', '#optimization', '#synthetic', '#dataset', '#inference', '#open_source'], 'emoji': '⚙️', 'ru': {'title': 'Компиляция естественного языка в эффективные локальные нейросетевые функции', 'desc': 'В работе предложен метод fuzzy-function programming, который компилирует спецификации на естественном языке в компактные нейросетевые артефакты. Система использует компилятор размером 4 миллиарда параметров, обученный на датасете FuzzyBench из 10 миллионов примеров, который генерирует параметрически эффективные адаптеры. Интерпретатор размером 0.6 миллиарда параметров выполняет полученные программы с качеством сопоставимым с промптингом модели в 32 миллиарда параметров, при этом требуя в 50 раз меньше памяти и работая локально. Подход переосмысляет роль foundation models: вместо решения каждой задачи отдельно, модель один раз компилирует спецификацию в переиспользуемый артефакт, делая последующие вызовы дешевыми и автономными.'}, 'en': {'title': 'Transforming Natural Language into Efficient Neural Functions', 'desc': 'This paper introduces fuzzy-function programming, a method that transforms natural language specifications into compact neural models for efficient execution. It utilizes a 4B compiler and a 0.6B interpreter to create parameter-efficient adapters, allowing for reduced memory usage and faster inference times. The approach addresses common programming challenges that are difficult to solve with traditional rule-based methods, such as log analysis and JSON repair. By using Program-as-Weights (PAW), the authors demonstrate that their method can achieve performance comparable to larger models while being more resource-efficient.'}, 'zh': {'title': '模糊函数编程：高效的本地执行工具', 'desc': '模糊函数编程将自然语言规范编译成紧凑的神经网络工件，使用4B编译器和0.6B解释器，实现高效的本地执行，减少内存使用并加快推理速度。许多日常编程任务难以用清晰的规则实现，因此越来越多地依赖大型语言模型API，这样会影响本地性、可重复性和成本。我们提出了模糊函数编程的概念，通过自然语言规范编译出可本地执行的紧凑神经工件。我们用程序作为权重（PAW）来实现这一范式，4B编译器在FuzzyBench数据集上训练，生成高效的适配器，0.6B的Qwen3解释器执行PAW程序时，性能与直接提示Qwen3-32B相当，但推理内存仅为其五十分之一。'}}}, {'id': 'https://huggingface.co/papers/2607.02255', 'title': 'AgenticSTS: A Bounded-Memory Testbed for Long-Horizon LLM Agents', 'url': 'https://huggingface.co/papers/2607.02255', 'abstract': 'Abstract A bounded contract approach for long-horizon LLM agents uses typed retrieval to assemble fresh prompts, enabling isolated analysis of memory components and demonstrating improved performance in complex decision-making tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory for a long-horizon LLM agent is a contract about what each future decision is allowed to see. The simplest contract appends past observations, tool calls, and reflections to every prompt, which makes prior context easy to access but also turns it into a jumbled mixture in which the effect of any single memory component is hard to isolate. We introduce and instrument an alternative bounded contract: every decision is made from a fresh user message assembled by typed retrieval, with no raw cross-decision transcript appended. The prompt thus stays bounded across runs of any length, and any single layer can be ablated in isolation. We instantiate the contract in Slay the Spire 2, a closed-rule stochastic deck-building game whose runs require hundreds of tactical and strategic decisions. A public online benchmark of frontier LLMs on the same game reports zero wins at the lowest difficulty across five configurations, and the developer-reported human win rate at the same difficulty is 16%; the task is hard but not saturated. Within our harness, a fixed-A0 ablation shows the largest observed difference when triggered strategic skills are enabled: the no-store baseline wins 3/10 games and adding the skill layer 6/10. At this sample size the comparison is directional rather than statistically decisive (Fisher exact p\\approx0.37); a cross-backbone probe and public accumulating-context baselines are reported as operational comparisons rather than controlled tests of the contract variable itself. We release a reproducible testbed: 298 completed trajectories with condition tags, frozen memory/skill snapshots, prompt records, and analysis scripts -- an agent design and a validated, reusable methodology for studying how explicit memory layers shape long-horizon LLM-agent decisions.', 'score': 45, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'ed0046b1e55cf224', 'authors': ['Xiangchen Cheng', 'Yunwei Jiang', 'Jianwen Sun', 'Zizhen Li', 'Chuanhao Li', 'Xiangcheng Cao', 'Yihao Liu', 'Fanrui Zhang', 'Li Jin', 'Kaipeng Zhang'], 'affiliations': ['Alaya Lab', 'Nankai University', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.02255.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#long_context', '#agents', '#games', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Ограниченные контракты памяти для агентов LLM с длинным горизонтом планирования', 'desc': 'Авторы предлагают подход с ограниченным контрактом для долгогоризонтных агентов на основе больших языковых моделей, который использует типизированную выборку для формирования свежих подсказок. Вместо традиционного способа, когда весь контекст-история действий добавляется к каждому промпту, новый метод собирает промпт заново перед каждым решением, что позволяет удерживать размер контекста ограниченным. Такой подход позволяет изолировать и анализировать влияние отдельных компонентов памяти на принятие решений агентом. Методология была протестирована на игре Slay the Spire 2 с включением слоёв навыков стратегического рассуждения, показав улучшение производительности при решении комплексных многошаговых задач.'}, 'en': {'title': 'Isolate Memory for Smarter LLM Decisions', 'desc': 'This paper presents a new method for improving long-horizon decision-making in large language model (LLM) agents by using a bounded contract approach. Instead of mixing all past information into each prompt, the method employs typed retrieval to create fresh prompts for each decision, allowing for clearer analysis of memory components. The authors demonstrate this approach in a complex game, Slay the Spire 2, where they show that isolating memory layers can lead to better performance. The study provides a reproducible testbed for future research on how memory influences LLM-agent behavior in decision-making tasks.'}, 'zh': {'title': '有界合约提升长时间跨度LLM代理决策能力', 'desc': '本文提出了一种有界合约方法，用于长时间跨度的LLM代理，通过类型化检索来组装新的提示，从而实现对记忆组件的独立分析，并在复杂决策任务中表现出更好的性能。记忆合约规定了每个未来决策可以访问的内容，最简单的合约将过去的观察、工具调用和反思附加到每个提示中，但这会使得上下文变得混乱，难以单独分析记忆组件的影响。我们引入了一种替代的有界合约：每个决策都是从一个新用户消息中生成的，该消息通过类型化检索组装，而不附加任何原始的跨决策记录。通过在《Slay the Spire 2》游戏中的实例化，我们展示了这种方法如何在复杂的决策环境中提高LLM代理的表现。'}}}, {'id': 'https://huggingface.co/papers/2607.02440', 'title': 'EvoPolicyGym: Evaluating Autonomous Policy Evolution in Interactive Environments', 'url': 'https://huggingface.co/papers/2607.02440', 'abstract': 'Abstract Autonomous agents evaluate policy improvement through iterative editing within fixed budgets, revealing that successful policy evolution requires both task-specific mechanisms and feedback-constrained refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous agents are increasingly expected to improve executable policies through feedback, yet existing evaluations often collapse this process into a final score or confound it with open-ended software-engineering progress. We introduce Autonomous Policy Evolution, a controlled evaluation setting in which a harness-model agent repeatedly edits an executable policy system under a fixed interaction budget. We instantiate this setting in EvoPolicyGym, a benchmark built from compact interactive RL environments that evaluates how agents iteratively improve explored policies. On the EvoPolicyGym suite, GPT-5.5 achieves the strongest aggregate rank score and top-two performance on all 16 environments. Beyond leaderboard results, EvoPolicyGym also provides trajectory-level diagnostics that distinguish how agents allocate budget, convert feedback into parametric tuning. These analyses show that strong autonomous policy evolution depends not only on isolated task wins, but on discovering task-appropriate mechanisms and refining policies under bounded feedback.', 'score': 43, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'cbc65d074c4a6f68', 'authors': ['Zhilin Wang', 'Han Song', 'Runzhe Zhan', 'Jusen Du', 'Jiacheng Chen', 'Tianle Li', 'Qingyu Yin', 'Yulun Wu', 'Zhennan Shen', 'Tong Zhu', 'Yanshu Li', 'Guanjie Chen', 'Derek F. Wong', 'Yafu Li', 'Yu Cheng', 'Yang Yang'], 'affiliations': ['Brown University', 'Shanghai Jiao Tong University', 'Soochow University', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Macau', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02440.jpg', 'data': {'categories': ['#agents', '#benchmark', '#rl'], 'emoji': '🧬', 'ru': {'title': 'Эволюция политик: обучение агентов через итеративное совершенствование под ограничениями', 'desc': 'В статье представлена новая парадигма оценки автономных агентов, называемая Autonomous Policy Evolution, которая изучает, как агенты итеративно улучшают политики в условиях ограниченного бюджета взаимодействий. Авторы создали EvoPolicyGym - бенчмарк на основе компактных интерактивных окружений RL, позволяющий оценить способность агентов к последовательному совершенствованию исследованных политик. Исследование показывает, что успешная эволюция политик зависит не только от решения отдельных задач, но также от обнаружения механизмов, специфичных для каждой задачи, и рефинирования под ограничениями обратной связи. Траекторные диагностики позволяют анализировать, как агенты распределяют бюджет и преобразуют feedback в параметрическую настройку.'}, 'en': {'title': 'Iterative Policy Improvement Through Feedback and Budget Management', 'desc': 'This paper presents a new approach called Autonomous Policy Evolution, which allows agents to iteratively improve their policies within a set budget of interactions. The authors introduce EvoPolicyGym, a benchmark that consists of various interactive reinforcement learning environments to evaluate how well agents can refine their policies. The study shows that successful policy evolution relies on both specific strategies tailored to the task and effective use of feedback for making adjustments. The results indicate that top-performing agents, like GPT-5.5, excel not just in achieving high scores but also in their ability to manage resources and adapt their policies based on feedback.'}, 'zh': {'title': '自主政策演化：在反馈中不断进步', 'desc': '这篇论文介绍了自主政策演化的概念，强调在固定预算下，智能体通过迭代编辑来改进可执行政策。研究表明，成功的政策演化需要特定任务的机制和受限反馈的精细调整。论文中使用了EvoPolicyGym基准，评估智能体在不同环境中如何逐步改进政策。结果显示，GPT-5.5在所有16个环境中表现最佳，证明了有效的政策演化不仅依赖于单一任务的成功，还需要适当的机制和反馈的优化。'}}}, {'id': 'https://huggingface.co/papers/2606.30562', 'title': 'Morphing into Hybrid Attention Models', 'url': 'https://huggingface.co/papers/2606.30562', 'abstract': 'Abstract FlashMorph is an efficient layer selection method that formulates hybrid layer selection as a budget-constrained optimization problem, using morphable models and linearization regularization to improve long-context efficiency in Transformers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Hybrid attention models improve long-context efficiency by retaining only a subset of full-attention layers and replacing the remaining layers with linear attention. However, the effectiveness of Transformer-to-hybrid conversion critically depends on which layers preserve full attention. Existing hybrid layer selection methods typically rely on heuristic strategies such as fixed placement patterns or layerwise scoring, implicitly treating layer importance as isolated and overlooking the interdependent layer effect under a global hybrid configuration. In this work, we formulate hybrid layer selection as a budget-constrained subset optimization problem. We further propose FlashMorph (Fast LAyer Selection for Hybrid MORPHing), an effective, efficient and scalable layer selection method for Transformer-to-hybrid conversion. FlashMorph first constructs a morphable model by equipping each full-attention layer with a converted linear-attention branch. It then freezes all model weights and jointly optimizes layerwise gates on synthetic long-context retrieval data, with a linearization regularization that encourages the model to rely on linear attention for efficiency. The learned gates are discretized under a preset full-attention budget to instantiate the hybrid architecture, followed by standard logits distillation and long-context finetuning. Extensive experiments show that FlashMorph discovers more effective hybrid configurations, preserves strong long-context recall and general benchmark performance while substantially reducing layer selection cost compared with existing layer selection methods, demonstrating its effectiveness, efficiency, and scalability.', 'score': 37, 'issue_id': 2558, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '279b41912620d4a9', 'authors': ['Disen Lan', 'Jianbin Zheng', 'Yuxi Ren', 'Xin Xia', 'Xuanda Wang', 'Xuefeng Xiao', 'Xipeng Qiu', 'Yu Cheng'], 'affiliations': ['ByteDance Seed', 'Fudan University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.30562.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умный выбор слоёв для быстрых Трансформеров на длинных текстах', 'desc': 'FlashMorph — это метод для эффективного выбора слоёв при преобразовании Трансформеров в гибридные модели с полным и линейным вниманием. Авторы формулируют задачу выбора слоёв как задачу оптимизации с бюджетным ограничением, где каждый полно-внимательный слой снабжается альтернативной веткой линейного внимания. Метод замораживает веса модели и совместно оптимизирует затвори слоёв на синтетических данных с регуляризацией, побуждающей модель использовать линейное внимание. Результирующие затвори дискретизируются для создания финальной гибридной архитектуры, которая показывает лучшую эффективность при работе с длинными контекстами.'}, 'en': {'title': 'Optimizing Transformer Layers for Efficient Long-Context Processing', 'desc': 'FlashMorph is a novel method for selecting layers in Transformer models, designed to optimize performance while managing computational costs. It treats the selection of layers as a budget-constrained optimization problem, allowing for a more strategic approach than traditional heuristic methods. By integrating morphable models and linearization regularization, FlashMorph enhances long-context efficiency by intelligently choosing which layers maintain full attention. The method has been shown to outperform existing techniques in terms of effectiveness and efficiency, making it a scalable solution for hybrid Transformer architectures.'}, 'zh': {'title': 'FlashMorph：高效的混合层选择方法', 'desc': 'FlashMorph是一种高效的层选择方法，它将混合层选择问题视为一个预算约束的优化问题。该方法利用可变模型和线性化正则化来提高Transformer在长上下文中的效率。FlashMorph通过为每个全注意力层配备一个转换的线性注意力分支，构建了一个可变模型，并在合成的长上下文检索数据上优化层级门。实验表明，FlashMorph能够发现更有效的混合配置，同时在显著降低层选择成本的情况下，保持强大的长上下文回忆和整体基准性能。'}}}, {'id': 'https://huggingface.co/papers/2607.01642', 'title': 'Multi-Resolution Flow Matching: Training-Free Diffusion Acceleration via Staged Sampling', 'url': 'https://huggingface.co/papers/2607.01642', 'abstract': 'Abstract MrFlow accelerates text-to-image diffusion by combining low-resolution generation with pixel-space super-resolution and noise injection, achieving up to 25x speedup without training or runtime modifications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Hardware-agnostic strategies for accelerating text-to-image diffusion, such as timestep distillation and feature caching, can reduce inference time without custom kernels or system-level optimization. Among them, multi-resolution generation strategies have recently received broad attention, attaining more than 5x speedup without any training. However, the design of performing upsampling in the latent space, together with the selective modification of partial regions, causes these methods to exhibit noticeable blurring or artifacts. To this end, we propose MrFlow, a training-free multi-resolution acceleration strategy for pretrained flow-matching models built upon a staged low-to-high-resolution pipeline. MrFlow first rapidly generates the main structure at low resolution, then performs super-resolution in the pixel space using a lightweight pretrained GAN-based model, subsequently injects low-strength noise to enable high-frequency resampling, and finally refines the details at high resolution. Quantitative and qualitative results on FLUX.1-dev and Qwen-Image show that MrFlow exploits the quadratic token reduction and reduced step requirement of low-resolution sampling to achieve 10x end-to-end acceleration while keeping OneIG within a 1% gap relative to that before acceleration, significantly surpassing other training-free acceleration strategies, and requiring no training or runtime dynamic identification whatsoever. MrFlow can further be directly combined orthogonally with pre-trained timestep distillation strategies, achieving even higher generation acceleration of up to 25x.', 'score': 28, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '42c607a68d7c2ec0', 'authors': ['Xingyu Zheng', 'Xianglong Liu', 'Yifu Ding', 'Weilun Feng', 'Junqing Lin', 'Jinyang Guo', 'Haotong Qin'], 'affiliations': ['Beihang University', 'ETH Zurich', 'Institute of Computing Technology, Chinese Academy of Sciences', 'Nanyang Technological University', 'University of Chinese Academy of Sciences', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.01642.jpg', 'data': {'categories': ['#optimization', '#inference', '#diffusion', '#multimodal', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Молниеносная генерация изображений через многоразрешающий поток', 'desc': 'MrFlow — это метод ускорения текстово-изображательной диффузии без обучения, который использует стратегию многоразрешающей генерации. Алгоритм сначала быстро генерирует основную структуру изображения в низком разрешении, затем применяет суперразрешение в пиксельном пространстве с помощью предобученной GAN-модели и инжектирует шум для переполучения высокочастотных деталей. Метод достигает 10-кратного ускорения конца-в-конец при сохранении качества в пределах 1% от исходного, а при комбинации с дистилляцией временных шагов показывает ускорение до 25 раз. Подход работает без специальных модификаций и требований к специфичному оборудованию, делая его универсально применимым к различным flow-matching моделям.'}, 'en': {'title': "Accelerating Image Generation: MrFlow's 25x Speedup!", 'desc': 'MrFlow is a novel approach that speeds up the process of generating images from text by using a combination of low-resolution generation and super-resolution techniques. It operates without the need for additional training or modifications during runtime, making it efficient and easy to implement. The method involves creating a basic image structure at a low resolution, enhancing it with a GAN-based model, and then refining the details while adding controlled noise to improve quality. This results in a significant acceleration of the image generation process, achieving up to 25 times faster performance compared to traditional methods, while maintaining high fidelity in the generated images.'}, 'zh': {'title': 'MrFlow：加速文本到图像生成的革命性策略', 'desc': 'MrFlow是一种加速文本到图像扩散的策略，它结合了低分辨率生成、像素空间超分辨率和噪声注入，能够在不需要训练或运行时修改的情况下实现高达25倍的加速。该方法首先在低分辨率下快速生成主要结构，然后使用轻量级的预训练GAN模型在像素空间进行超分辨率处理，最后注入低强度噪声以实现高频重采样，并在高分辨率下细化细节。与其他训练无关的加速策略相比，MrFlow在保持生成质量的同时，显著提高了生成速度，达到了10倍的端到端加速。它还可以与预训练的时间步蒸馏策略直接结合，进一步提升生成速度。'}}}, {'id': 'https://huggingface.co/papers/2607.01647', 'title': 'AgenticDataBench: A Comprehensive Benchmark for Data Agents', 'url': 'https://huggingface.co/papers/2607.01647', 'abstract': 'Abstract A comprehensive benchmark named AgenticDataBench is introduced to evaluate data agents across diverse domains with fine-grained task annotations and skill-based coverage metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Data science aims to derive actionable insights from heterogeneous raw data, unlocking the value of the massive amounts of data generated in modern society. Automating this process is essential to reducing labor-intensive efforts for data scientists and enabling scalable data-driven applications. Recently, large language model (LLM)-based data agents have emerged as a promising solution to automate data science workflows. However, the field lacks comprehensive benchmarks to rigorously evaluate these agents across diverse scenarios with fine-grained granularity. To address this gap, we propose AgenticDataBench, a comprehensive benchmark featuring realistic tasks spanning diverse domains with fine-grained ground-truth labels. This enables evaluations to capture the diversity and complexity of data science workflows and the detailed performance of agents. First, to cover diverse domains, we collect real datasets and tasks from 15 vertical domains, including 5 real-world B2B use cases from a leading fintech company. Second, to remove redundancy in real-world tasks and generate high-quality tasks for domains lacking real data, we introduce data science skills, recurring data-centric operational patterns, and quantify benchmark coverage by the number of skills included. Representative skills are extracted from large-scale task solutions on Stack Overflow using skill-aligned hierarchical clustering. Third, for real-world business tasks, we select task-solution pairs that maximize diversity in skill composition, ensuring broad coverage of practical scenarios. Fourth, to generate realistic tasks for devise domains without real tasks, we propose a systematic LLM-based task generation approach to create workflows and tasks based on these skills. Finally, we evaluate state-of-the-art data agents using our annotated benchmark and open-sourced testbed, providing detailed skill-level insights.', 'score': 26, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'a374c976d2699bde', 'authors': ['Zhaoyan Sun', 'Shan Zhong', 'Daizhou Wen', 'Jiaxing Han', 'Guoliang Li', 'Ying Yan', 'Peng Zhang', 'Yu Su', 'Xiang Qi', 'Baolin Sun', 'Chengyuan Yang', 'Tao Fang', 'Huaiyu Ruan'], 'affiliations': ['Ant Digital Technologies, Ant Group', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01647.jpg', 'data': {'categories': ['#dataset', '#data', '#agents', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Комплексная оценка data-агентов через навык-ориентированные бенчмарки', 'desc': 'В статье представлен AgenticDataBench — комплексный бенчмарк для оценки агентов на основе LLM в задачах автоматизации data science. Авторы собрали реальные датасеты и задачи из 15 различных доменов, включая 5 примеров из реальных B2B случаев финтех-компании. Для обеспечения качественного и разнообразного покрытия предложен подход на основе выделения повторяющихся навыков в data science, которые извлекаются из решений на Stack Overflow с помощью иерархической кластеризации. Бенчмарк включает детально аннотированные задачи с fine-grained метриками, позволяющими оценить производительность агентов на уровне отдельных умений и операций.'}, 'en': {'title': 'Empowering Data Science Automation with AgenticDataBench', 'desc': 'The paper introduces AgenticDataBench, a benchmark designed to evaluate data agents in various domains with detailed task annotations and skill-based metrics. It addresses the need for rigorous assessment of large language model (LLM)-based data agents, which automate data science workflows. The benchmark includes real datasets from 15 domains and employs a systematic approach to generate high-quality tasks, ensuring comprehensive coverage of data science skills. By evaluating state-of-the-art data agents against this benchmark, the study provides insights into their performance and capabilities in handling complex data tasks.'}, 'zh': {'title': '全面评估数据代理的基准工具', 'desc': '本文介绍了一个名为AgenticDataBench的综合基准，用于评估数据代理在不同领域的表现，具有细粒度的任务注释和基于技能的覆盖度指标。数据科学旨在从异构原始数据中提取可操作的见解，自动化这一过程对于减少数据科学家的劳动强度至关重要。近年来，基于大型语言模型（LLM）的数据代理作为自动化数据科学工作流程的有前景的解决方案出现，但缺乏全面的基准来严格评估这些代理的表现。为此，我们提出了AgenticDataBench，涵盖了来自15个垂直领域的真实数据集和任务，确保评估能够捕捉数据科学工作流程的多样性和复杂性。'}}}, {'id': 'https://huggingface.co/papers/2607.02517', 'title': 'WorldDirector: Building Controllable World Simulators with Persistent Dynamic Memory', 'url': 'https://huggingface.co/papers/2607.02517', 'abstract': 'Abstract WorldDirector enables controllable video generation with persistent object memory by decoupling semantic motion planning from visual rendering through LLM coordination of 3D trajectories and camera movements.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present WorldDirector, a highly controllable video world model framework designed for persistent dynamic object memory and unrestricted viewpoint exploration. Unlike existing world models that entangle physical dynamics with pixel rendering and rely on continuous visual observation to sustain motion, our framework explicitly decouples semantic motion orchestration from visual generation. By leveraging an LLM to coordinate 3D trajectories with camera movements and subsequently employing these orchestrated trajectories as control signals for video generation, our approach ensures strict physical logic and appearance stability, successfully preserving the exact visual identities of dynamic entities even when they re-enter the scene after prolonged periods out of view. Experimental results demonstrate that our method supports the synthesis of complex and extended events with unprecedented controllability and persistent dynamic object memory. Project Page: https://worlddirector.github.io/', 'score': 21, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '1407c8c3feff0e30', 'authors': ['Hanlin Wang', 'Hao Ouyang', 'Qiuyu Wang', 'Wen Wang', 'Qingyan Bai', 'Ka Leong Cheng', 'Yue Yu', 'Yixuan Li', 'Yihao Meng', 'Zichen Liu', 'Yanhong Zeng', 'Yujun Shen', 'Qifeng Chen'], 'affiliations': ['Ant Group', 'CUHK', 'HKUST', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2607.02517.jpg', 'data': {'categories': ['#video', '#3d', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Управляемое видео с памятью через разделение движения и визуализации', 'desc': 'WorldDirector представляет инновационный подход к генерации видео, разделяя планирование семантического движения от визуального рендеринга. Система использует LLM для координации 3D траекторий объектов и движений камеры, что обеспечивает строгую физическую логику и стабильность внешнего вида. Ключевая особенность — модель мира сохраняет долгосрочную память о динамических объектах, позволяя им корректно возвращаться в кадр после длительного отсутствия. Экспериментальные результаты показывают, что фреймворк успешно синтезирует сложные и протяженные сцены с беспрецедентной управляемостью.'}, 'en': {'title': 'Mastering Video Generation with Object Memory', 'desc': 'WorldDirector is a video generation framework that allows for precise control over dynamic objects in a scene. It separates the planning of object movements from the actual visual rendering, which helps maintain consistent appearances of objects even when they are not visible for a while. By using a large language model (LLM) to manage 3D paths and camera angles, it ensures that the generated videos follow logical physical rules. This innovative approach enables the creation of complex video sequences with a strong memory of objects, enhancing the overall quality and coherence of the generated content.'}, 'zh': {'title': '可控视频生成与动态物体记忆的新时代', 'desc': 'WorldDirector 是一个可控的视频生成框架，能够持久记忆动态物体。它通过将语义运动规划与视觉渲染解耦，利用大型语言模型（LLM）协调三维轨迹和相机运动。与现有模型不同，WorldDirector 不依赖于持续的视觉观察来维持运动，而是通过控制信号生成视频，确保物理逻辑和外观稳定。实验结果表明，该方法能够合成复杂的事件，并实现前所未有的可控性和动态物体的持久记忆。'}}}, {'id': 'https://huggingface.co/papers/2606.31825', 'title': 'Breaking Failure Cascades: Step-Aware Reinforcement Learning for Medical Multimodal Reasoning', 'url': 'https://huggingface.co/papers/2606.31825', 'abstract': 'Abstract A reinforcement learning approach called MRPO is introduced to improve clinical image reasoning by addressing cascading errors through step-wise process rewards, demonstrating superior performance over existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent multimodal large language models have shown great promise in clinical image reasoning, but existing post-training pipelines remain predominantly outcome-centric, relying on final answer correctness or sequence-level preferences. This suffers from sparse credit assignment, making it difficult to optimize the reasoning process essential for clinical applications. Our analysis reveals that cascading errors from early-stage reasoning failures are a leading cause of incorrect predictions in medical visual question answering (VQA) benchmarks. Motivated by this, we propose Medical Reasoning-aware Policy Optimization (MRPO), an RL algorithm that incorporates step-wise process rewards. When the final answer is incorrect, MRPO assigns exponentially larger penalties to tokens in earlier invalid reasoning steps, breaking failure cascades without compromising successful paths. Across three multimodal LLM backbones, MRPO consistently outperforms standard GRPO and a recent RL baseline, and on Qwen3-VL-8B-Instruct even surpasses substantially larger medical MLLMs such as HuatuoGPT-Vision-34B by 2.79 points. Moreover, MRPO reduces early-stage reasoning failures from 64.0% to 13.0%, showing that targeted mitigation of cascading failures improves both reasoning quality and final answer accuracy. Our code is available at https://github.com/dmis-lab/MRPO', 'score': 19, 'issue_id': 2559, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '000f842e9f3220a4', 'authors': ['Junha Jung', 'Minbyul Jeong', 'Suhyeon Lim', 'Sungwook Jung', 'Jaehoon Yun', 'Taeyun Roh', 'Mujeen Sung', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences', 'Hanyang University College of Medicine', 'KAIST', 'Korea University', 'Kyung Hee University', 'Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.31825.jpg', 'data': {'categories': ['#optimization', '#open_source', '#rl', '#reasoning', '#multimodal', '#alignment', '#training', '#rlhf', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'Оптимизация клинического рассуждения через пошаговые награды в обучении с подкреплением', 'desc': 'В статье представлен алгоритм обучения с подкреплением MRPO, который улучшает клиническое визуальное рассуждение в мультимодальных больших языковых моделях. Основная проблема заключается в том, что традиционные методы обучения используют только окончательный результат для оценки, что приводит к каскадным ошибкам на ранних этапах рассуждения. MRPO решает эту проблему, присваивая функции поощрения на уровне отдельных шагов, где ошибки на ранних стадиях получают экспоненциально большие штрафы. Экспериментальные результаты показывают значительное улучшение на нескольких бенчмарках медицинского визуального вопросоответа и сокращение количества ошибок на ранних стадиях с 64% до 13%.'}, 'en': {'title': 'Enhancing Clinical Image Reasoning with MRPO', 'desc': 'The paper introduces a reinforcement learning method called Medical Reasoning-aware Policy Optimization (MRPO) aimed at enhancing clinical image reasoning. MRPO addresses the issue of cascading errors in medical visual question answering by implementing step-wise process rewards, which penalize earlier mistakes more heavily when the final answer is incorrect. This approach allows for better optimization of the reasoning process, leading to a significant reduction in early-stage reasoning failures. The results show that MRPO outperforms existing methods, improving both the quality of reasoning and the accuracy of final answers in clinical applications.'}, 'zh': {'title': 'MRPO：提升临床图像推理的强化学习新方法', 'desc': '本文介绍了一种名为MRPO的强化学习方法，旨在通过逐步过程奖励来改善临床图像推理，解决级联错误问题。现有的后训练流程主要关注最终答案的正确性，导致难以优化推理过程。MRPO通过对早期无效推理步骤中的标记施加更大的惩罚，打破了错误级联，从而提高了推理质量和最终答案的准确性。实验结果表明，MRPO在多个多模态大语言模型上表现优于传统方法，显著降低了早期推理失败的比例。'}}}, {'id': 'https://huggingface.co/papers/2607.01874', 'title': 'SkillCoach: Self-Evolving Rubrics for Evaluating and Enhancing Agentic Skill-Use', 'url': 'https://huggingface.co/papers/2607.01874', 'abstract': 'Abstract SkillCoach is a self-evolving rubric framework that evaluates and improves agentic skill-use by analyzing skill selection, following, composition, and reflection processes, providing better supervision than outcome-only metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Skills are becoming a reusable operational layer for LLM agents, encoding SOPs, domain rules, tool workflows, scripts, and validation routines. In realistic skill repositories, overlapping skills make reliable skill-use difficult. Final verifier success is too coarse for both evaluation and training, since an agent may pass through trial and error while selecting distractor skills, skipping required steps, composing workflows incorrectly or omitting final checks. We introduce SkillCoach, a self-evolving rubric framework for evaluating and enhancing agentic skill-use. SkillCoach derives skill-grounded process rubrics from real rollouts and evaluates trajectories along four dimensions: skill selection, skill following, skill composition, and skill-grounded reflection. It keeps the external verifier as a separate outcome signal, allowing process quality to be distinguished from accidental task success. The evolved rubrics further serve as process supervision for selecting high-quality training trajectories. Experiments show that evolved rubrics substantially improve evaluation quality, expose failures hidden by final accuracy, and provide stronger supervision signals than outcome-only filtering for enhancing agentic skill-use.', 'score': 14, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'f4f7096387052af8', 'authors': ['Jiayin Zhu', 'Kelong Mao', 'Yudong Guo', 'Dengbo He', 'Sulong Xu', 'Simiu Gu', 'Yutao Yue'], 'affiliations': ['HKUST(GZ)', 'JD.COM'], 'pdf_title_img': 'assets/pdf/title_img/2607.01874.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Оценка не результата, а мастерства: как учить агентов правильно использовать навыки', 'desc': 'SkillCoach — это самоэволюционирующая система оценки, которая помогает агентам на основе LLM улучшить использование навыков путём анализа четырёх ключевых аспектов: выбора навыков, их выполнения, композиции и рефлексии. Традиционные метрики, основанные только на конечном результате, скрывают ошибки в процессе — агент может пройти испытание случайно, используя неправильные навыки или пропуская необходимые шаги. Фреймворк генерирует динамические критерии оценки из реальных траекторий взаимодействия агента и отделяет оценку качества процесса от простого совпадения с верификатором. Эволюционирующие критерии также служат сигналом supervision для отбора высококачественных обучающих данных, обеспечивая значительно лучший контроль над процессом обучения агентов.'}, 'en': {'title': 'Enhancing Agentic Skills with SkillCoach: Beyond Outcomes!', 'desc': 'SkillCoach is a framework designed to evaluate and improve how agents use skills by analyzing their processes in skill selection, following, composition, and reflection. It generates rubrics from real-world examples to assess these processes, distinguishing between successful outcomes and the quality of the methods used to achieve them. This approach helps identify issues that may not be visible when only looking at final results, such as incorrect skill use or missed steps. By providing better supervision and training signals, SkillCoach enhances the overall effectiveness of agentic skill-use in complex tasks.'}, 'zh': {'title': 'SkillCoach：提升代理技能使用的自我演化框架', 'desc': 'SkillCoach 是一个自我演化的评估框架，旨在通过分析技能选择、执行、组合和反思过程来评估和提升代理技能的使用。它提供比仅依赖结果的指标更好的监督，能够从真实的操作中生成基于技能的评估标准。SkillCoach 通过四个维度评估技能使用的轨迹，确保过程质量与最终任务成功相区分。实验表明，演化后的评估标准显著提高了评估质量，揭示了最终准确性掩盖的失败，并为提升代理技能使用提供了更强的监督信号。'}}}, {'id': 'https://huggingface.co/papers/2607.02291', 'title': 'Optimizing Visual Generative Models via Distribution-wise Rewards', 'url': 'https://huggingface.co/papers/2607.02291', 'abstract': 'Abstract A novel reinforcement learning framework for visual generation uses distribution-wise rewards to improve image diversity and quality while addressing mode collapse and computational efficiency issues.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Conventional reinforcement learning strategies for visual generation typically employ sample-wise reward functions, yet this practice frequently results in reward hacking that degrades image diversity and introduces visual anomalies. To address these limitations, we present a novel framework that finetunes generative models using distribution-wise rewards, ensuring better alignment with real-world data distributions. Unlike rewards that evaluate samples individually, distribution-wise reward accounts for the data distribution of the samples, mitigating the mode collapse problem that occurs when all samples optimize towards the same direction independently. To overcome the prohibitive computational cost of estimating these rewards, we introduce a subset-replace strategy that efficiently provides reward signals by updating only a small subset of a generated reference set. Additionally, we apply RL to optimize post-hoc model merging coefficients, potentially mitigating the train-inference inconsistency caused by introducing stochastic differential equation (SDE) in regular RL practices. Extensive experiments show our approach significantly improves FID-50K across various base models, from 8.30 to 5.77 for SiT and from 3.74 to 3.52 for EDM2. Qualitative evaluation also confirms that our method enhances perceptual quality while preserving sample diversity.', 'score': 14, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '297a734a4493d805', 'authors': ['Ruihang Li', 'Mengde Xu', 'Shuyang Gu', 'Leigang Qu', 'Fuli Feng', 'Han Hu', 'Wenjie Wang'], 'affiliations': ['Hunyuan Frontier Lab, Tencent', 'National University of Singapore', 'Shanghai Innovation Institute', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.02291.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Распределительные награды для разнообразной генерации изображений', 'desc': 'В работе предложена новая методика обучения с подкреплением для генерации изображений, которая использует распределительные функции вознаграждения вместо традиционных выборочных оценок. Это решает проблему коллапса мод, когда модель генерирует однообразные образцы, оптимизируясь в одном направлении. Авторы вводят стратегию частичной замены для эффективного расчета вознаграждений и применяют усиленное обучение для оптимизации коэффициентов слияния моделей. Экспериментальные результаты показывают значительное улучшение метрики FID-50K и сохранение разнообразия генерируемых изображений.'}, 'en': {'title': 'Enhancing Visual Generation with Distribution-Wise Rewards', 'desc': 'This paper introduces a new reinforcement learning framework aimed at enhancing visual generation by using distribution-wise rewards instead of traditional sample-wise rewards. By focusing on the overall data distribution, the framework effectively reduces issues like mode collapse, where generated images become too similar. The authors also present a subset-replace strategy to efficiently compute these rewards, minimizing computational costs. Experimental results demonstrate significant improvements in image quality and diversity, as indicated by lower FID scores and better perceptual quality.'}, 'zh': {'title': '提升视觉生成的多样性与质量', 'desc': '本文提出了一种新颖的强化学习框架，用于视觉生成，采用分布式奖励来提高图像的多样性和质量，同时解决模式崩溃和计算效率问题。与传统的逐样本奖励函数不同，分布式奖励考虑了样本的数据分布，从而减轻了所有样本独立优化导致的模式崩溃问题。为了降低估计这些奖励的计算成本，本文引入了一种子集替换策略，仅更新生成参考集的小部分，从而高效地提供奖励信号。此外，本文还应用强化学习来优化后期模型合并系数，可能减轻引入随机微分方程(SDE)所造成的训练与推理不一致性。'}}}, {'id': 'https://huggingface.co/papers/2607.01002', 'title': 'Logit-Contribution Scoring Identifies Non-Literal Retrieval Heads', 'url': 'https://huggingface.co/papers/2607.01002', 'abstract': "Abstract Logit-Contribution Scoring (LOCOS) identifies attention heads responsible for non-literal context synthesis in large language models by measuring their output-value circuit's contribution to answer tokens, outperforming existing methods on retrieval benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In long-context use, large language models frequently synthesize answers from the meaning of a relevant context span rather than literally copy-pasting them. Identifying which attention heads perform this synthesis matters for interpreting long-context model behavior. Yet existing detectors miss these heads by construction: they reward heads whose attended token matches the generated token, a literal-copy criterion that captures where a head reads but not what it writes through its output-value (OV) circuit, the very mechanism that carries non-literal retrieval. We introduce Logit-Contribution Scoring (LOCOS), a write-aware detector that scores each head by the projection of its OV-circuit output onto the answer-token unembedding direction, contrasting needle and off-needle source positions in a single forward pass. Across three model families (Qwen3, Gemma-3, OLMo-3.1), mean-ablating the top LOCOS heads on the NoLiMa non-literal retrieval benchmark collapses ROUGE-L at lower head counts than prior attention-based detections; on Qwen3-8B, ablating 50 heads drives ROUGE-L from 0.401 to 0.000 while the strongest baseline still retains 0.292. The selected heads are retrieval-specific: parametric recall and arithmetic reasoning stay at baseline under the same ablation. On Qwen3-8B, the same ablation also drops MuSiQue from 0.55 to 0.08 and BABI-Long from 0.62 to 0.20, while a random-heads control stays within 0.05 of baseline.", 'score': 14, 'issue_id': 2561, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '52a3cd89295a0567', 'authors': ['Aryo Pradipta Gema', 'Beatrice Alex', 'Pasquale Minervini'], 'affiliations': ['Heriot-Watt University', 'Miniml.AI', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2607.01002.jpg', 'data': {'categories': ['#benchmark', '#interpretability', '#long_context', '#training'], 'emoji': '🔍', 'ru': {'title': 'Выявление головок трансформера, отвечающих за неявное синтезирование информации из контекста', 'desc': 'В статье предложен метод LOCOS (Logit-Contribution Scoring) для выявления attention heads в больших языковых моделях, которые синтезируют ответы из контекста без дословного копирования. Метод измеряет вклад output-value цепи каждой head в логиты токена ответа, в отличие от существующих детекторов, которые фокусируются только на том, где head читает информацию. Авторы демонстрируют, что абляция топ-50 LOCOS heads полностью разрушает качество на бенчмарке NoLiMa, в то время как базовые методы теряют гораздо меньше производительности. Экспериментально подтверждено, что выявленные heads специфичны для задач поиска информации и не влияют на параметрическое запоминание или арифметическое рассуждение.'}, 'en': {'title': 'Unlocking Non-Literal Context Synthesis in Language Models with LOCOS', 'desc': 'The paper introduces Logit-Contribution Scoring (LOCOS), a method for identifying attention heads in large language models that contribute to non-literal context synthesis. Unlike previous methods that focus on literal token matching, LOCOS evaluates the output-value circuit of each head to determine its impact on generated tokens. This approach allows for a more accurate understanding of how models synthesize answers from context rather than simply copying text. The results show that ablating the top LOCOS heads significantly reduces performance on non-literal retrieval tasks, highlighting the importance of these heads in model behavior.'}, 'zh': {'title': '识别非字面上下文合成的关键注意力头', 'desc': 'Logit-Contribution Scoring (LOCOS) 是一种新方法，用于识别大型语言模型中负责非字面上下文合成的注意力头。它通过测量这些注意力头对答案标记的输出值电路的贡献，超越了现有的检测方法。LOCOS 关注的是注意力头的写入能力，而不仅仅是读取能力，从而更好地解释长上下文模型的行为。实验结果表明，LOCOS 在多个模型上表现优异，能够有效识别出对非字面检索至关重要的注意力头。'}}}, {'id': 'https://huggingface.co/papers/2607.02271', 'title': 'AGVBench: A Reliability-Oriented Benchmark of Data Augmentation for Vein Recognition', 'url': 'https://huggingface.co/papers/2607.02271', 'abstract': 'Abstract Research evaluates 30 augmentation strategies for vein recognition across multiple datasets and architectures, revealing inconsistencies between accuracy and adversarial security while highlighting dataset-specific effectiveness variations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vein recognition is a secure biometric technology often constrained by limited annotated data and imaging variations. While data augmentation mitigates this, strategies designed for natural images may disrupt the fine-grained topology and textures essential for identity discrimination. We present AGVBench, which evaluates 30 representative augmentation strategies on five public palm- and finger-vein datasets with seven backbone architectures, covering classic CNNs, vision transformers, and vein-specific recognition models. Our results show that multi-image mixing methods (e.g., MixUp, PuzzleMix, StarMixup) generally provide the strongest recognition performance. However, they are often poorly calibrated and vulnerable to adversarial perturbations, revealing a clear inconsistency between clean accuracy and adversarial security. We also find that severe geometric transformations frequently degrade recognition, which is potentially due to feature misalignment or spatial cropping, and that augmentation effectiveness varies across palm and finger vein datasets. These findings prove that accuracy-centric evaluation is insufficient for biometric augmentation. AGVBench provides standardized protocols to support reproducible research and guide the design of reliable, secure, and robust vein recognition systems. Our codebase is available at https://github.com/Advance-VeinTech-Innovators/AGVBench.', 'score': 13, 'issue_id': 2560, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'f5386039bb34b7a9', 'authors': ['Haiyang Li', 'Yuming Fu', 'Qun Song', 'Hongchao Liao', 'Jing Chen', 'Mounim A. EI-Yacoubi', 'Xin Jin'], 'affiliations': ['Chongqing Technology and Business University', 'Guangzhou College of Applied Science and Technology', 'SAMOVAR, Telecom SudParis, Institute Polytechnique de Paris', 'School of Engineering, Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02271.jpg', 'data': {'categories': ['#cv', '#dataset', '#security', '#open_source', '#benchmark', '#synthetic'], 'emoji': '🔐', 'ru': {'title': 'Безопасность важнее точности: переоценка аугментации в биометрии вен', 'desc': 'В работе представлена AGVBench — комплексная оценка 30 стратегий аугментации данных для распознавания вен на пяти публичных датасетах с использованием семи архитектур (CNN, Vision Transformer и специализированные модели). Исследование показывает, что методы микширования изображений (MixUp, PuzzleMix, StarMixup) дают наилучшую точность, но часто имеют плохую калибровку и уязвимы к состязательным атакам, что выявляет противоречие между чистой точностью и устойчивостью к возмущениям. Обнаружено, что сильные геометрические трансформации часто снижают качество распознавания из-за смещения признаков, а эффективность аугментации варьируется между датасетами ладони и пальца. Работа демонстрирует необходимость комплексной оценки биометрических систем, включающей не только точность, но и безопасность, и предоставляет стандартизированный протокол для воспроизводимых исследований.'}, 'en': {'title': 'Balancing Accuracy and Security in Vein Recognition', 'desc': 'This research paper evaluates 30 different data augmentation strategies specifically for vein recognition, a biometric technology that relies on unique vein patterns. The study highlights that while data augmentation can improve recognition accuracy, it may also introduce vulnerabilities to adversarial attacks, showing a disconnect between performance in clean conditions and under adversarial scenarios. The authors introduce AGVBench, a framework that assesses these augmentation strategies across various datasets and model architectures, revealing that certain methods like multi-image mixing yield better performance but are less secure. The findings emphasize the need for a balanced approach that considers both accuracy and security in the development of vein recognition systems.'}, 'zh': {'title': '静脉识别中的数据增强策略评估', 'desc': '本研究评估了30种数据增强策略在静脉识别中的效果，涵盖多个数据集和架构。结果显示，尽管多图像混合方法（如MixUp、PuzzleMix、StarMixup）通常提供最佳识别性能，但它们在对抗性扰动下表现不佳，揭示了准确性与对抗安全性之间的不一致。研究还发现，严重的几何变换往往会降低识别效果，可能是由于特征对齐不当或空间裁剪造成的。此外，增强效果在不同的掌静脉和指静脉数据集上存在显著差异，说明仅关注准确性的评估方法不足以满足生物识别增强的需求。'}}}, {'id': 'https://huggingface.co/papers/2607.01224', 'title': 'AutoMem: Automated Learning of Memory as a Cognitive Skill', 'url': 'https://huggingface.co/papers/2607.01224', 'abstract': "Abstract Memory management in large language models is treated as a trainable skill through a framework that automates both memory structure optimization and proficiency enhancement, leading to significant performance improvements in long-horizon tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory expertise is a learned skill: knowing what to encode, when to retrieve, and how to organize knowledge--a capacity known in cognitive science as metamemory. We bring this perspective to LLMs by treating memory management as a trainable skill. We promote file-system operations to first-class memory actions alongside task actions, letting the model itself decide how to manage its memory. This memory skill improves along two axes: the structure that supports it (prompts, file schemas, action vocabulary), and the proficiency of the model exercising it. Both axes resist manual optimization: episodes in long-horizon tasks run for thousands of steps, and a single memory mistake can hide long before it surfaces, making human review of full trajectories impractical. We introduce AutoMem, a framework that automates both axes. In the first loop, a strong LLM reviews complete agent trajectories and iteratively revises the memory structure that shapes how the agent interacts with its memory files. In the second loop, the agent's own good memory decisions are identified from many episodes and used as training signal to sharpen the model's memory proficiency directly. Across three procedurally generated long-horizon games (Crafter, MiniHack, and NetHack), optimizing memory alone--without modifying the model's task-action behavior--improved the base agent's performance ~2x-4x, bringing a 32B open-weight model competitive with frontier systems such as Claude Opus 4.5 and Gemini 3.1 Pro Thinking. Our results show that memory management is an independently learnable skill, and a high-leverage objective yielding large gains on long-horizon tasks.", 'score': 12, 'issue_id': 2562, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '8a6899529fcc8883', 'authors': ['Shengguang Wu', 'Hao Zhu', 'Yuhui Zhang', 'Xiaohan Wang', 'Serena Yeung-Levy'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.01224.jpg', 'data': {'categories': ['#games', '#optimization', '#benchmark', '#agents', '#long_context', '#training', '#open_source'], 'emoji': '💾', 'ru': {'title': 'Память как обучаемый навык: автоматическая оптимизация управления знаниями в языковых моделях', 'desc': 'В этой работе предлагается автоматическая оптимизация управления памятью в большших языковых моделях, рассматривая её как обучаемый навык. Авторы вводят фреймворк AutoMem, который использует две петли обратной связи: первая петля автоматически пересматривает и улучшает структуру памяти на основе анализа полных траекторий агента, вторая петля извлекает хорошие решения по управлению памятью для обучения модели. Разработанный подход позволяет оптимизировать только функции управления памятью без изменения поведения модели на основных задачах, что значительно улучшает производительность. На трёх процедурно-генерируемых долгосрочных играх показано 2-4х улучшение производительности, что позволяет 32B модели конкурировать с лучшими современными системами.'}, 'en': {'title': 'Memory Management: A Trainable Skill for Enhanced Performance', 'desc': "This paper presents a novel approach to memory management in large language models (LLMs) by treating it as a trainable skill. The authors introduce AutoMem, a framework that automates the optimization of memory structures and enhances the model's proficiency in memory tasks. By allowing the model to manage its own memory through file-system operations, significant performance improvements are achieved in long-horizon tasks. The results demonstrate that optimizing memory management can lead to substantial gains in model performance without altering the underlying task-action behavior."}, 'zh': {'title': '记忆管理：可训练的技能，提升模型表现', 'desc': '在这篇论文中，作者提出了一种将记忆管理视为可训练技能的方法，适用于大型语言模型（LLM）。通过自动化记忆结构优化和能力提升，显著提高了模型在长时间任务中的表现。该框架名为AutoMem，能够自动调整模型的记忆管理方式，并通过识别良好的记忆决策来提升模型的记忆能力。研究表明，优化记忆管理可以独立于任务行为，带来显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2607.02508', 'title': 'From SRA to Self-Flow: Data Augmentation or Self-Supervision?', 'url': 'https://huggingface.co/papers/2607.02508', 'abstract': 'Abstract Research investigates the mechanisms behind self-alignment methods in diffusion transformers, finding that performance improvements stem primarily from data augmentation along the noise dimension rather than token interactions between noise levels.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Representation alignment has become an effective way to accelerate diffusion transformer training and improve generation quality. Recent self-alignment methods, such as SRA and Self-Flow, further remove the dependency on external pretrained encoders by constructing alignment within the diffusion model itself. However, the mechanism behind the improvement from SRA to Self-Flow, dual-time scheduling, remains under-examined: Self-Flow attributes its gain to interactions between tokens at different noise levels, where cleaner tokens help infer noisier ones. In this work, we revisit this explanation and ask whether the gain instead comes from data augmentation along the noise dimension. To disentangle these factors, we introduce Attention Separation, which preserves the same dual-timestep input as Self-Flow while blocking attention between tokens assigned to different noise levels. Surprisingly, removing such interaction does not degrade performance and can even improve it, suggesting that the improvement from SRA to Self-Flow mainly comes from data augmentation. Furthermore,We show that Attention Separation itself provides an augmentation effect by splitting a single image into multiple effective training parts to expand the training data. Based on these observations, we combine self-representation alignment with dual-timestep and attention-separation augmentation, and demonstrate the effectiveness of this design on ImageNet.', 'score': 10, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '37eb8e1b241c5208', 'authors': ['Dengyang Jiang', 'Mengmeng Wang', 'Harry Yang', 'Jingdong Wang'], 'affiliations': ['Baidu Inc.', 'The Hong Kong University of Science and Technology', 'Zhejiang University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.02508.jpg', 'data': {'categories': ['#interpretability', '#cv', '#diffusion', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Аугментация данных, а не взаимодействие токенов — основной источник улучшения в самовыравнивающихся диффузионных трансформерах', 'desc': 'В работе исследуются механизмы самовыравнивания представлений в диффузионных трансформерах. Авторы показывают, что улучшение производительности происходит в основном за счёт аугментации данных по шумовому измерению, а не благодаря взаимодействию токенов между разными уровнями шума. Они предлагают метод Attention Separation, который блокирует внимание между токенами с разными уровнями шума, но при этом сохраняет или даже улучшает качество генерации. Комбинируя самовыравнивание представлений с двойной временной координатой и аугментацией через разделение внимания, авторы достигают эффективных результатов на датасете ImageNet.'}, 'en': {'title': 'Unlocking Performance: Data Augmentation Over Token Interaction in Diffusion Transformers', 'desc': 'This paper explores how self-alignment methods in diffusion transformers enhance performance, focusing on the role of data augmentation in the noise dimension. It challenges the idea that improvements come from token interactions at different noise levels, suggesting instead that data augmentation is the key factor. The authors introduce a technique called Attention Separation, which maintains the dual-timestep input while preventing interactions between tokens of varying noise levels. Their findings indicate that this method not only preserves performance but can also enhance it, leading to better training outcomes on datasets like ImageNet.'}, 'zh': {'title': '数据增强是性能提升的关键', 'desc': '本研究探讨了扩散变换器中自对齐方法的机制，发现性能提升主要源于沿噪声维度的数据增强，而非噪声水平之间的标记交互。自对齐方法如SRA和Self-Flow通过在扩散模型内部构建对齐，消除了对外部预训练编码器的依赖。我们引入了注意力分离机制，保持与Self-Flow相同的双时间步输入，同时阻止不同噪声水平之间的标记交互。研究结果表明，去除这种交互并未降低性能，反而可能提升，进一步验证了数据增强在性能提升中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.31924', 'title': 'InstanceControl: Controllable Complex Image Generation without Instance Labeling', 'url': 'https://huggingface.co/papers/2606.31924', 'abstract': 'Abstract InstanceControl enables multi-instance image generation by using vision-language models to establish instance-level correspondences between text prompts and visual conditions, while employing adaptive mask refinement for improved accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Controllable image generation methods, such as ControlNet, have demonstrated a remarkable capacity to introduce visual conditions(e.g., depth maps) to guide image generation. However, these methods often struggle with complex multi-instance scenes, frequently leading to attribute confusion among instances. While recent approaches attempt to mitigate this via manual instance labeling, such requirements are labor-intensive. In this paper, we propose InstanceControl, a novel multi-instance controllable generation method that eliminates the need for instance labeling. We identify the primary bottleneck in existing methods as the inability to accurately associate instance descriptions with their corresponding regions within visual conditions. To address this, we leverage the Vision-Language Model (VLM) to establish instance-level correspondences between text prompts and visual conditions. Specifically, the VLM automatically parses instance descriptions from the text prompts and simultaneously predicts instance masks based on the visual conditions. Furthermore, since the predicted masks may contain noise, we introduce an adaptive mask refinement strategy that dynamically refines these instance masks during the generation process. Extensive experiments demonstrate that our approach outperforms state-of-the-art methods, achieving superior fidelity and precise instance-level control.', 'score': 8, 'issue_id': 2559, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'cc2f75d7666b93b9', 'authors': ['Xiaoyu Liu', 'Huan Wang', 'Fan Li', 'Zhixin Wang', 'Jiaqi Xu', 'Ming Liu', 'Wangmeng Zuo'], 'affiliations': ['HUAWEI Noahs Ark Lab, Shenzhen, China', 'Harbin Institute of Technology, Harbin, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.31924.jpg', 'data': {'categories': ['#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Контроль множественных объектов без ручной разметки', 'desc': 'InstanceControl — это метод контролируемой генерации изображений, который решает проблему создания сложных сцен с несколькими объектами без необходимости ручной разметки. Авторы используют Vision-Language модель для автоматического установления соответствий между описаниями объектов в текстовом промпте и их визуальными представлениями в условиях управления. Система предсказывает маски для каждого объекта на основе визуальных условий и применяет адаптивную стратегию уточнения масок во время процесса генерации. Экспериментальные результаты показывают, что метод достигает лучшей точности контроля на уровне отдельных объектов по сравнению с существующими подходами.'}, 'en': {'title': 'Effortless Multi-Instance Image Generation with InstanceControl', 'desc': 'InstanceControl is a new method for generating images that can handle multiple instances without needing manual labeling. It uses a Vision-Language Model (VLM) to connect text descriptions to specific parts of an image, allowing for better control over how each instance is represented. The method also includes an adaptive mask refinement technique to improve the accuracy of the generated instance masks. Experiments show that InstanceControl performs better than existing methods, providing higher quality images with precise control over individual instances.'}, 'zh': {'title': '无标注的多实例图像生成新方法', 'desc': 'InstanceControl是一种新颖的多实例可控生成方法，旨在通过视觉-语言模型建立文本提示与视觉条件之间的实例级对应关系，从而实现多实例图像生成。该方法消除了对实例标注的需求，解决了现有方法在复杂多实例场景中常见的属性混淆问题。通过自动解析文本提示中的实例描述，并基于视觉条件预测实例掩码，InstanceControl提高了生成的准确性。此外，采用自适应掩码精炼策略，动态优化生成过程中的实例掩码，显著提升了生成图像的保真度和实例级控制的精确性。'}}}, {'id': 'https://huggingface.co/papers/2606.27669', 'title': 'When Search Agents Should Ask: DiscoBench for Clarification-Aware Deep Search', 'url': 'https://huggingface.co/papers/2606.27669', 'abstract': "Abstract DiscoBench evaluates search agents' ability to handle ambiguous queries through clarification questioning and recovery in multi-step information-seeking tasks across diverse real-world domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Search agents powered by large language models (LLMs) are increasingly used to solve complex information-seeking tasks, requiring multi-step retrieval and reasoning to fulfill user goals. However, existing benchmarks often assume that user queries are complete and explicit, overlooking the fact that real-world search requests are frequently vague, underspecified, or even factually incorrect. In deep search scenarios, such ambiguity can propagate along multi-step reasoning chains and lead agents toward incorrect search trajectories. To address this gap, we introduce DiscoBench, a benchmark for clarification-aware deep search, designed to evaluate whether search agents can proactively identify ambiguity, ask effective clarification questions, and recover correct reasoning paths through user interaction. DiscoBench contains 211 samples and 463 ambiguity instances across 11 real-world domains, covering four ambiguity types. We further design a user simulator for multi-turn interaction and evaluate model performance from four perspectives: task utility, ambiguity detection, interaction strategy, and cost efficiency. Experiments on representative LLMs show that ambiguity detection and effective clarification are distinct capabilities, and that repeatedly searching instead of asking for clarification often performs worse than direct guessing, highlighting a critical gap between retrieval ability and interactive problem-solving in current search agents.", 'score': 8, 'issue_id': 2558, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '4fd9bddb8ea3e20e', 'authors': ['Yiling Tao', 'Shihan Deng', 'Meiling Tao', 'Pengzhi Wei', 'Zhichao Hu', 'Zhihao Zhu'], 'affiliations': ['Hunyuan, Tencent', 'Shenzhen International Graduate School, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27669.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '❓', 'ru': {'title': 'Уточнение вместо поиска: агенты, которые задают правильные вопросы', 'desc': 'DiscoBench — это новый бенчмарк для оценки агентов поиска, которые используют большие языковые модели для решения сложных задач получения информации. Основной вызов заключается в том, что реальные запросы пользователей часто неполные, неоднозначные или содержат ошибки, что может привести агента по неправильному пути рассуждений. Авторы предлагают методику оценки способности агентов обнаруживать неоднозначность, задавать уточняющие вопросы и восстанавливать правильный путь решения через взаимодействие с пользователем. Эксперименты показывают, что современные LLM-агенты слабо справляются с разрешением неоднозначности и часто предпочитают повторный поиск вместо интерактивного уточнения запроса.'}, 'en': {'title': 'DiscoBench: Enhancing Search Agents with Clarification Skills', 'desc': "DiscoBench is a new benchmark designed to test how well search agents can handle ambiguous queries by asking clarification questions and recovering from misunderstandings in multi-step information-seeking tasks. It recognizes that real-world queries are often vague or incorrect, which can lead to incorrect search paths if not addressed. The benchmark includes 211 samples with various types of ambiguity across 11 domains, allowing for a comprehensive evaluation of search agents' performance. Experiments reveal that detecting ambiguity and asking for clarification are separate skills, and that simply searching without clarification can lead to poorer outcomes than making educated guesses."}, 'zh': {'title': '评估搜索代理的模糊性处理能力', 'desc': 'DiscoBench是一个评估搜索代理处理模糊查询能力的基准，特别是在多步骤信息检索任务中。它关注搜索代理如何通过提问澄清和恢复正确的推理路径来应对模糊性。现有的基准通常假设用户查询是完整的，但现实中的搜索请求往往模糊或不准确。通过211个样本和463个模糊实例，DiscoBench评估搜索代理在识别模糊性、提问澄清和用户互动中的表现。'}}}, {'id': 'https://huggingface.co/papers/2607.02269', 'title': 'AnyGroundBench: A Specialized-Domain Benchmark for Video Grounding in Vision-Language Models', 'url': 'https://huggingface.co/papers/2607.02269', 'abstract': 'Abstract Vision-Language Models struggle with domain adaptation in specialized spatio-temporal video grounding tasks, highlighting limitations in zero-shot generalization and in-context learning capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language Models (VLMs) have demonstrated immense promise in Spatio-Temporal Video Grounding (STVG). However, current evaluation protocols are largely confined to zero-shot assessments on general, daily-life benchmarks. This creates a critical disconnect from real-world applications in specialized fields, where models inevitably encounter rare visual concepts and complex spatio-temporal dynamics. Since exhaustive pre-training across infinite data distributions is infeasible, the ability to adapt to novel domains is essential. To bridge this gap, we introduce AnyGroundBench, a domain-adaptation benchmark designed to shift the STVG evaluation paradigm from static zero-shot testing to rigorous domain adaptation. Targeting five specialized domains (animal, industry, sports, surgery, and public security), AnyGroundBench pairs newly captured videos such as expert-annotated mouse behaviors with established datasets, unifying them through dense, high-fidelity spatio-temporal annotations. Crucially, the benchmark provides dedicated training subsets to systematically measure domain adaptability. We extensively evaluate 15 state-of-the-art VLMs, assessing their zero-shot generalization and In-Context Learning (ICL) capabilities under practical computational constraints. Ultimately, our findings reveal that current models fail in both zero-shot and ICL-based adaptation when confronted with specialized domains, exposing critical flaws in spatio-temporal reasoning that future research must address.', 'score': 7, 'issue_id': 2557, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '6dd4262918c664fe', 'authors': ['Rintaro Otsubo', 'Ryo Fujii', 'Reina Ishikawa', 'Taiki Kanaya', 'Kanta Sawafuji', 'Hiroki Kajita', 'Shigeki Sakai', 'Hideo Saito', 'Ryo Hachiuma'], 'affiliations': ['Keio AI Research Center', 'Keio University', 'Keio University School of Medicine', 'NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02269.jpg', 'data': {'categories': ['#dataset', '#video', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От общих сцен к специальности: бенчмарк для адаптации видео-языковых моделей', 'desc': 'Работа представляет AnyGroundBench — новый бенчмарк для оценки способности Vision-Language Models адаптироваться к специализированным доменам в задаче пространственно-временной локализации объектов в видео (STVG). Авторы обнаружили, что существующие оценки моделей ограничены тестированием на общих датасетах повседневных сцен, что не отражает реальные приложения в узкоспециализированных областях с редкими визуальными концепциями. Бенчмарк включает пять специализированных доменов (животные, промышленность, спорт, хирургия, общественная безопасность) с плотными аннотациями и тренировочными подмножествами для систематического измерения способности к адаптации. Результаты оценки 15 современных VLM показали, что модели критически не справляются
