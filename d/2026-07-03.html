как с zero-shot обобщением, так и с адаптацией через In-Context Learning на специализированных данных.'}, 'en': {'title': 'Bridging the Gap in Video Grounding: AnyGroundBench for Domain Adaptation', 'desc': 'This paper discusses the challenges faced by Vision-Language Models (VLMs) in adapting to specialized tasks in spatio-temporal video grounding (STVG). It highlights the limitations of these models in zero-shot generalization and in-context learning when applied to real-world scenarios with rare visual concepts. To address this issue, the authors introduce AnyGroundBench, a new benchmark that shifts the evaluation focus from static zero-shot assessments to rigorous domain adaptation across five specialized domains. The study evaluates 15 state-of-the-art VLMs, revealing significant shortcomings in their ability to adapt to these specialized domains, indicating a need for improved spatio-temporal reasoning in future research.'}, 'zh': {'title': '提升视觉-语言模型的领域适应能力', 'desc': '本文探讨了视觉-语言模型在特定时空视频定位任务中的领域适应能力不足，特别是在零样本泛化和上下文学习方面的局限性。我们提出了AnyGroundBench，这是一个旨在将STVG评估从静态零样本测试转变为严格领域适应的基准。该基准针对五个专业领域（动物、工业、体育、外科和公共安全），通过高保真时空注释将新捕获的视频与现有数据集结合。我们的评估显示，当前模型在面对专业领域时，在零样本和上下文学习适应方面均表现不佳，暴露了时空推理中的关键缺陷。'}}}, {'id': 'https://huggingface.co/papers/2607.02032', 'title': 'PACE: A Proxy for Agentic Capability Evaluation', 'url': 'https://huggingface.co/papers/2607.02032', 'abstract': "Abstract PACE is a framework that predicts expensive agentic LLM benchmark performance using a small subset of atomic evaluation instances, achieving high accuracy at a fraction of the cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Evaluating LLM agents on benchmarks like SWE-Bench and GAIA can be expensive, time-consuming, and requires complex infrastructure. A single evaluation can cost thousands of dollars and take days to complete. In contrast, non-agentic LLM benchmarks that test individual capabilities (e.g., reasoning, code generation) are fast and cheap to run. In this paper, we investigate whether performance on expensive agentic benchmarks can be accurately predicted by the performance on a small, carefully selected subset of atomic evaluation instances. We introduce PACE, a framework that constructs proxy benchmarks by selecting instances from existing non-agentic evaluations whose aggregate scores most reliably predict model performances on agentic benchmarks. Given a pool of candidate instances spanning atomic capabilities, PACE fits a regression that maps a model's scores on a compact subset of source instances to its score on the target agentic benchmark. The subset itself is curated by combining two complementary instance-selection strategies, target-relevance local selection and globally informative global selection. We apply PACE to the 4 target agentic benchmarks in this paper, which yields PACE-Bench, the concrete proxy benchmark that we evaluate in the paper. Experiments across 14 models, 4 agentic benchmarks, and 19 non-agentic benchmarks show that PACE-Bench predicts agentic scores with leave-one-out cross-validation (LOOCV) mean absolute error (MAE) under 4%, Spearman correlation above 0.80, and pairwise model-ranking accuracy around 85%, all at much less than 1% of the full agentic evaluation cost. We further analyze the selected proxy instances, revealing which skills each agentic benchmark uniquely demands. PACE enables practitioners to obtain reliable estimates of agentic performance during model development, selection, and routing, without the overhead of full agent evaluation.", 'score': 6, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'f29c5c40a9d40bd4', 'authors': ['Yueqi Song', 'Lintang Sutawika', 'Jiarui Liu', 'Lindia Tjuatja', 'Jiayi Geng', 'Yunze Xiao', 'Daniel Lee', 'Aditya Bharat Soni', 'Vincent Lo', 'Xiang Yue', 'Graham Neubig'], 'affiliations': ['Carnegie Mellon University', 'Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2607.02032.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'Предсказание производительности агентных моделей без дорогостоящей полной оценки', 'desc': 'PACE — это фреймворк, который предсказывает производительность дорогостоящих агентных LLM бенчмарков, используя небольшой набор атомарных оценочных экземпляров. Метод комбинирует две стратегии отбора экземпляров: локальный отбор по релевантности к целевому бенчмарку и глобальный отбор информативных примеров. Авторы обучают регрессионную модель, которая отображает оценки моделей на небольшом подмножестве исходных тестов на оценку целевого агентного бенчмарка. Экспериментальные результаты показывают, что PACE-Bench предсказывает агентную производительность с точностью под 4% средней абсолютной ошибки при стоимости менее 1% от полной оценки.'}, 'en': {'title': 'Efficiently Predicting Agentic Performance with PACE', 'desc': 'PACE is a novel framework designed to predict the performance of large language models (LLMs) on costly agentic benchmarks by using a small, strategically chosen set of simpler evaluation instances. This approach significantly reduces the time and financial resources required for model evaluation, as traditional methods can be prohibitively expensive and slow. By employing regression techniques, PACE maps scores from non-agentic benchmarks to predict outcomes on agentic benchmarks, achieving high accuracy with minimal cost. The framework not only streamlines the evaluation process but also provides insights into the specific skills required for different agentic benchmarks.'}, 'zh': {'title': '用少量实例高效预测智能基准性能', 'desc': 'PACE是一个框架，用于通过少量原子评估实例预测昂贵的智能LLM基准性能，从而以较低的成本实现高准确率。该框架通过选择来自现有非智能评估的实例，构建代理基准，以可靠地预测模型在智能基准上的表现。PACE结合了目标相关的局部选择和全球信息的全局选择两种策略，来策划评估实例的子集。实验结果表明，PACE-Bench能够在不到1%的完整评估成本下，准确预测智能基准的得分。'}}}, {'id': 'https://huggingface.co/papers/2607.01686', 'title': 'WARP: Weight-Space Analysis for Recovering Training Data Portfolios', 'url': 'https://huggingface.co/papers/2607.01686', 'abstract': "Abstract WARP is a framework that infers training data compositions from released model weights by analyzing geometric footprints in weight space through model merging and feature extraction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Foundation models are routinely released to the public, yet the data recipes used to train them -- such as domain mixture weights that determine how different sources are sampled -- are rarely disclosed. This creates an access asymmetry: researchers study the resulting models but lack visibility into the training distribution that produces them. Prior works for inferring training data, such as membership inference, detect at the level of individual samples and thus cannot characterize the global composition of the training corpus. We introduce WARP, a framework that recovers a fine-tuned model's training mixtures directly from its released weights. WARP interpolates between the base and fine-tuned models using model merging, generating pseudo-checkpoints that approximate the missing training trajectory and expose a geometric footprint of the training data in the weight space. From these simulated footprints, WARP extracts geometric features and maps them to domain proportions using either a parameter-free softmax readout or an MLP projector trained on synthetic mixtures. In controlled experiments with BERT and GPT-2, WARP recovers domain mixtures with an average MAE as low as 0.046 and 0.104 respectively, outperforming membership inference and a variant with access to the true training trajectory.", 'score': 5, 'issue_id': 2562, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '8a1061fc8b91751d', 'authors': ['Tzu-Heng Huang', 'Aditya Goyal', 'John Cooper', 'Frederic Sala'], 'affiliations': ['University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2607.01686.jpg', 'data': {'categories': ['#training', '#data'], 'emoji': '🔍', 'ru': {'title': 'Раскрывая рецепт обучения: восстановление композиции данных из весов модели', 'desc': 'WARP — это фреймворк, который восстанавливает композицию обучающих данных из весов уже обученной модели, анализируя геометрические отпечатки в пространстве параметров через слияние моделей. Метод интерполирует между базовой и дообученной моделью, создавая псевдо-контрольные точки, которые аппроксимируют траекторию обучения и раскрывают геометрический след данных в весовом пространстве. Из этих геометрических отпечатков WARP извлекает признаки и отображает их на доли доменов, используя параметрически свободный softmax или многослойный перцептрон. На экспериментах с BERT и GPT-2 фреймворк восстанавливает смеси доменов с средней абсолютной ошибкой всего 0.046 и 0.104 соответственно, превосходя методы inference принадлежности.'}, 'en': {'title': 'Unlocking Training Data Insights with WARP', 'desc': 'WARP is a novel framework designed to infer the compositions of training data used for machine learning models by analyzing their weight space. It addresses the issue of transparency in model training by revealing the domain mixture weights that dictate how different data sources are sampled. Unlike previous methods that focus on individual samples, WARP captures the overall training distribution by merging models and generating pseudo-checkpoints. In experiments with BERT and GPT-2, WARP demonstrated superior accuracy in recovering domain mixtures compared to existing techniques, achieving low mean absolute errors.'}, 'zh': {'title': 'WARP：揭示模型训练数据的秘密', 'desc': 'WARP是一个框架，通过分析模型权重空间中的几何足迹，推断训练数据的组成。它通过模型合并和特征提取，从发布的模型权重中直接恢复微调模型的训练混合。WARP生成伪检查点，近似缺失的训练轨迹，并在权重空间中揭示训练数据的几何特征。通过控制实验，WARP在恢复领域混合方面表现优异，平均绝对误差（MAE）低至0.046和0.104。'}}}, {'id': 'https://huggingface.co/papers/2607.02466', 'title': 'Learning to Move Before Learning to Do: Task-Agnostic pretraining for VLAs', 'url': 'https://huggingface.co/papers/2607.02466', 'abstract': 'Abstract Task-Agnostic Pretraining framework trains robotic models using self-supervised inverse dynamics on unlabeled data followed by lightweight language grounding, achieving superior performance with minimal expert demonstrations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models are fundamentally bottlenecked by the scarcity of expert demonstrations -- triplets of observations, instructions, and actions that are costly to collect at scale. We argue that this bottleneck stems from conflating two distinct learning objectives: acquiring physical competence (how to move) and acquiring semantic alignment (what to do). Crucially, only the latter requires language supervision. Building on this Decomposition Hypothesis, we propose Task-Agnostic Pretraining (TAP), a two-stage framework that first learns transferable motor priors from cheap, unlabeled interaction data -- including discarded off-task trajectories and autonomous robot play -- via a self-supervised Inverse Dynamics objective. A lightweight second stage then grounds these priors in language using minimal expert data. On the SIMPLER benchmark, TAP matches models trained on over 1M expert trajectories while using orders of magnitude less labeled data, yielding a 10% absolute gain over standard behavior cloning. On a real-world WidowX platform, TAP retains 25% success under camera perturbations where internet-scale baselines collapse to 0%, demonstrating that task-agnostic pretraining produces robust, transferable physical representations and offers a scalable path forward for Embodied AI.', 'score': 5, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '72daa5e6d5ba7543', 'authors': ['Junhao Shi', 'Siyin Wang', 'Xiaopeng Yu', 'Li Ji', 'Jingjing Gong', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2607.02466.jpg', 'data': {'categories': ['#training', '#robotics', '#benchmark', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Разделяй мотор и язык: самообучение робота без экспертов', 'desc': 'В работе предлагается Task-Agnostic Pretraining (TAP) — двухэтапный фреймворк для обучения робототехнических моделей Vision-Language-Action. На первом этапе модель учится на немеченых данных с использованием self-supervised inverse dynamics objective, извлекая общие моторные навыки из дешевых взаимодействий робота. На втором этапе легкий слой language grounding привязывает полученные представления к естественному языку, используя минимум экспертных демонстраций. Такой подход позволяет достичь производительности моделей, обученных на миллионах экспертных траекторий, используя в сотни раз меньше помеченных данных.'}, 'en': {'title': 'Revolutionizing Robot Training with Minimal Data', 'desc': 'The paper introduces a framework called Task-Agnostic Pretraining (TAP) for training robotic models using self-supervised learning. TAP separates the learning of physical skills from semantic understanding, allowing robots to learn how to move from unlabeled data and only requiring minimal expert demonstrations for language grounding. This approach significantly reduces the need for large amounts of labeled data while achieving performance comparable to models trained on extensive expert datasets. The results show that TAP enhances the robustness and transferability of robotic actions, making it a promising method for advancing Embodied AI.'}, 'zh': {'title': '任务无关预训练：提升机器人学习效率的创新方法', 'desc': '这篇论文提出了一种任务无关的预训练框架，旨在通过自监督的逆动态学习来训练机器人模型，使用未标记的数据和轻量级的语言基础，取得了优异的表现。研究表明，专家演示的稀缺性限制了模型的性能，而这种限制源于将物理能力学习和语义对齐学习混为一谈。论文提出的任务无关预训练（TAP）框架分为两个阶段，首先通过自监督的逆动态目标从廉价的未标记交互数据中学习可转移的运动先验。第二阶段则使用最少的专家数据将这些先验与语言进行对接，从而实现更高效的学习。'}}}, {'id': 'https://huggingface.co/papers/2607.01763', 'title': 'Denser neq Better: Limits of On-Policy Self-Distillation for Continual Post-Training', 'url': 'https://huggingface.co/papers/2607.01763', 'abstract': 'Abstract On-policy self-distillation in continual post-training accelerates in-domain specialization but fails to prevent forgetting and can collapse in out-of-distribution scenarios, indicating that on-policy data alone is insufficient for continual learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Continual post-training enables foundation models to acquire new knowledge while preserving existing capabilities. Recent work suggests that on-policy learning can mitigate forgetting, with on-policy self-distillation emerging as a particularly attractive approach. In this work, we revisit this optimistic view through self-distillation policy optimization (SDPO). Our experiments show that SDPO can accelerate in-domain specialization when teacher signals are stable and well aligned, but it struggles to generalize to out-of-distribution scenarios. In continual post-training, SDPO exhibits stronger forgetting and can even collapse, whereas on-policy reinforcement learning methods such as GRPO adapt more conservatively and better preserve prior capabilities. Further analyses reveal that denser self-distillation induces larger drift in both parameter space and response space, and can amplify high-frequency formatting artifacts through a self-reinforcing teacher--student loop. These findings suggest that on-policy data alone is insufficient for continual learning. Dense self-distillation can accelerate specialization when teacher targets are stable and token-level supervision is reliable, but it should not be treated as a default stabilizer for continual post-training. Our code is available at https://github.com/Moenupa/SDPO-CL.', 'score': 5, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '28b3ea3bcbee8fca', 'authors': ['Meng Wang', 'Haohan Zhao', 'Wenzhuo Liu', 'Lu Yang', 'Geng Liu', 'Haiyang Guo', 'Guo-Sen Xie', 'Gaofeng Meng', 'Hongbin Liu', 'Fei Zhu'], 'affiliations': ['Centre for Artificial Intelligence and Robotics, HKISI, CAS', 'Institute of Automation, CAS', 'Nanjing University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.01763.jpg', 'data': {'categories': ['#training', '#rlhf'], 'emoji': '🔄', 'ru': {'title': 'Самодистилляция недостаточна: как сбалансировать специализацию и сохранение знаний при континуальном обучении', 'desc': 'В статье исследуется метод самодистилляции в режиме on-policy для постоянного обучения больших языковых моделей. Авторы показывают, что хотя самодистилляция ускоряет специализацию модели в известных данных, она приводит к забыванию старых знаний и падению производительности на распределениях, отличающихся от обучающих. Анализ выявляет, что плотная самодистилляция вызывает большой дрейф параметров и усиливает артефакты в ответах модели через самоусиливающуюся петлю учителя-ученика. Исследование демонстрирует, что для эффективного континуального обучения необходимо комбинировать on-policy данные с другими стабилизирующими механизмами, а не полагаться только на самодистилляцию.'}, 'en': {'title': 'On-Policy Self-Distillation: A Double-Edged Sword in Continual Learning', 'desc': 'This paper explores the concept of on-policy self-distillation in continual post-training for machine learning models. It finds that while this approach can enhance specialization within the same domain, it does not effectively prevent forgetting of previously learned information. The study introduces self-distillation policy optimization (SDPO) and shows that it can lead to issues when faced with out-of-distribution data, resulting in model collapse. The authors conclude that relying solely on on-policy data is inadequate for successful continual learning, highlighting the need for more robust strategies.'}, 'zh': {'title': '持续学习需超越在线数据', 'desc': '这篇论文探讨了在持续后训练中使用在线自蒸馏的方法。研究表明，虽然在线自蒸馏可以加速模型在特定领域的专业化，但在处理分布外数据时容易出现遗忘和崩溃现象。实验结果显示，当教师信号稳定且对齐良好时，在线自蒸馏策略优化（SDPO）能够加速专业化，但在分布外场景中表现不佳。作者建议，仅依靠在线数据不足以实现持续学习，密集自蒸馏可能会导致参数空间和响应空间的较大漂移。'}}}, {'id': 'https://huggingface.co/papers/2606.29961', 'title': 'DuoMem: Towards Capable On-Device Memory Agents via Dual-Space Distillation', 'url': 'https://huggingface.co/papers/2606.29961', 'abstract': "Abstract DuoMem is a dual-space distillation framework that transfers procedural problem-solving from large language models to compact student models through context-space and parameter-space distillation, achieving high performance with minimal additional parameters and improved inference speed.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Model (LLM)-based agents can solve complex procedural tasks by interacting with environments over multiple turns, but this ability typically depends on large models, long contexts, and repeated inference calls. This makes advanced memory-augmented agents difficult to deploy on resource-constrained devices. We introduce DuoMem, a dual-space distillation framework that transfers procedural problem-solving ability from a large teacher model to compact student models. DuoMem distils in two complementary spaces: (1)context-space distillation, which replaces student-generated memories with higher-quality teacher-generated procedural memories prepended to the student's input, and (2)parameter-space distillation, which fine-tunes lightweight LoRA adapters on successful teacher trajectories. Evaluated on ALFWorld, a challenging embodied decision-making benchmark, DuoMem boosts a 4B-parameter model from 4.3% to 77.9% task success rate, closing most of the gap to a 72B teacher model (87.1%), while adding fewer than 10M trainable parameters and only a few megabytes of pre-computed teacher memories. Moreover, the DuoMem-enhanced 4B model completes tasks over 3x faster than the 72B teacher in wall-clock time, making it viable for real-time edge deployment, which would be challenging for the teacher.Extensive ablations across eight models spanning 2B-72B parameters reveal that both distillation axes contribute complementary", 'score': 5, 'issue_id': 2561, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '1746f856609a8842', 'authors': ['Peyman Hosseini', 'Ondrej Bohdal', 'Ahmed Alajrami', 'Andrea Maracani', 'Ignacio Castro', 'Matthew Purver', 'Mete Ozay', 'Savas Ozkan', 'Taha Ceritli'], 'affiliations': ['Queen Mary University of London', 'Samsung R&D Institute UK'], 'pdf_title_img': 'assets/pdf/title_img/2606.29961.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#optimization', '#small_models', '#inference', '#benchmark', '#long_context', '#agents'], 'emoji': '📚', 'ru': {'title': 'Два пути к знаниям: компактные модели через дистилляцию', 'desc': 'DuoMem — это фреймворк дистилляции знаний, который передаёт способность решать сложные процедурные задачи от больших моделей-учителей к компактным студентским моделям. Метод использует двойной подход: дистилляция в пространстве контекста, заменяя память студента на высококачественную память учителя, и дистилляция в пространстве параметров через адаптеры LoRA. На бенчмарке ALFWorld модель с 4 миллиардами параметров достигает 77,9% успеха в выполнении задач, закрывая большинство разрыва с учителем из 72 миллиардов параметров, при этом добавляя менее 10 миллионов обучаемых параметров. Обогащённая модель выполняет задачи в 3 раза быстрее, чем большой учитель, что делает её пригодной для развёртывания на устройствах с ограниченными ресурсами.'}, 'en': {'title': 'Efficient Knowledge Transfer for Compact Models with DuoMem', 'desc': 'DuoMem is a novel framework that enhances the performance of smaller student models by transferring knowledge from larger teacher models through two types of distillation: context-space and parameter-space. Context-space distillation improves the quality of the memories used by the student model by incorporating high-quality procedural memories generated by the teacher model. Parameter-space distillation fine-tunes lightweight adapters based on successful trajectories from the teacher, allowing the student model to learn effectively with minimal additional parameters. This approach significantly boosts the task success rate of a 4B-parameter model while ensuring faster inference times, making it suitable for deployment on devices with limited resources.'}, 'zh': {'title': 'DuoMem：高效的双空间蒸馏框架', 'desc': 'DuoMem是一种双空间蒸馏框架，旨在将大型语言模型的程序性问题解决能力转移到紧凑的学生模型上。它通过上下文空间蒸馏和参数空间蒸馏实现高性能，且仅需少量额外参数，显著提高推理速度。DuoMem在ALFWorld基准测试中表现出色，将一个4B参数的模型的任务成功率从4.3%提升至77.9%。此外，DuoMem增强的4B模型在完成任务时速度比72B教师模型快3倍，适合在资源受限的设备上实时部署。'}}}, {'id': 'https://huggingface.co/papers/2607.02375', 'title': 'Representation Distribution Matching for One-Step Visual Generation', 'url': 'https://huggingface.co/papers/2607.02375', 'abstract': 'Abstract Representation Distribution Matching enables high-quality image generation by matching feature distributions under pretrained encoders, with improved performance through optimized batch sizes and multi-encoder evaluation metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We elucidate the design space of Representation Distribution Matching (RDM), our name for the paradigm that trains a one-step image generator by matching generated and reference feature distributions under frozen pretrained encoders. We identify two design axes, how the distributions are compared and the representations they are compared in, and controlled studies along them yield three findings. First, the classical MMD, which could not train convincing generators a decade ago, becomes a strong and scalable objective once estimated right. Second, the generated batch is then the operative variable, with an optimum above 2048, far beyond customary batch sizes. Third, any single representation can be gamed, driven below the real score while images stay visibly fake, so we match against a balanced battery of encoders and evaluate with SW_r14, a Sliced-Wasserstein distance over 14 encoders that is independent of the training loss and resists gaming. Combining the preferred choices yields improved RDM (iRDM): it sets the one-step state of the art on ImageNet at SW_r14 1.30, corroborated by PickScore, a human-preference proxy our objective never optimizes, which prefers it over the prior best one-step generator on 71.2% of matched samples. The same recipe post-trains the four-step FLUX.2 [klein] into a one-step generator, surpassing the four-step version on GenEval, 0.826 to 0.794, and on PickScore, 22.76 to 22.58, in 90 H200 GPU-hours. Project page: https://alan-lanfeng.github.io/rdm/.', 'score': 4, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'cd349626f23da45c', 'authors': ['Lan Feng', 'Wuyang Li', 'Eloi Zablocki', 'Matthieu Cord', 'Alexandre Alahi'], 'affiliations': ['EPFL, Switzerland', 'Sorbonne Universite, France', 'Valeo.ai, France'], 'pdf_title_img': 'assets/pdf/title_img/2607.02375.jpg', 'data': {'categories': ['#cv', '#benchmark', '#training'], 'emoji': '🎨', 'ru': {'title': 'Сопоставление распределений представлений для одношагового синтеза высокачественных изображений', 'desc': 'В статье описывается метод Representation Distribution Matching (RDM) для обучения одношагового генератора изображений путём сопоставления распределений признаков сгенерированных и эталонных изображений под замороженными предобученными энкодерами. Авторы исследуют пространство дизайна метода и обнаруживают, что классическая метрика MMD становится эффективной при правильной оценке, оптимальный размер батча превышает 2048, а использование одного представления может быть обойдено. Для решения этой проблемы предлагается сбалансированный набор энкодеров и новая метрика SW_r14 на основе расстояния Sliced-Wasserstein, которая устойчива к манипуляциям и не зависит от функции потерь при обучении. Улучшенный метод (iRDM) достигает лучшего качества одношагового генерирования на ImageNet и успешно преобразует четырёхшаговую модель FLUX.2 в одношаговый генератор с улучшением результатов по метрикам GenEval и PickScore.'}, 'en': {'title': 'Revolutionizing Image Generation with Representation Distribution Matching', 'desc': "This paper introduces Representation Distribution Matching (RDM), a method for generating high-quality images by aligning feature distributions from generated images with those from real images using pretrained encoders. The authors explore two key design aspects: the comparison method of distributions and the representation space used for this comparison. They find that using a large batch size improves the generator's performance significantly, and that relying on multiple encoders for evaluation helps prevent misleading results. The proposed improved RDM (iRDM) achieves state-of-the-art results on ImageNet, demonstrating its effectiveness in generating realistic images."}, 'zh': {'title': '高质量图像生成的新方法：表示分布匹配', 'desc': '本论文介绍了一种名为表示分布匹配（RDM）的新方法，用于高质量图像生成。该方法通过在冻结的预训练编码器下匹配生成图像和参考图像的特征分布来训练单步图像生成器。研究发现，优化的批量大小和多编码器评估指标显著提高了生成效果，尤其是当批量大小超过2048时。最终，改进的RDM（iRDM）在ImageNet上达到了新的最佳性能，显示出其在图像生成领域的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.01436', 'title': 'Discrete Diffusion Language Models for Interactive Radiology Report Drafting', 'url': 'https://huggingface.co/papers/2607.01436', 'abstract': 'Abstract Diffusion language models match or exceed autoregressive models in medical visual question answering while offering faster decoding and bidirectional text editing capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion language models, which generate text by denoising a token canvas bidirectionally instead of emitting tokens left to right, have become competitive with autoregressive (AR) generation. Medical foundation models, however, remain almost entirely autoregressive. We adapt a mixture-of-experts diffusion language model, DiffusionGemma-26B, and benchmark it against its same-size AR sibling Gemma-4-26B under an identical LoRA recipe on medical visual question answering datasets, scored by a verbosity-robust LLM judge. Diffusion matches or exceeds AR on all of them, and the finetuned model (3.8B active) is competitive with frontier vision-language models; its decoding is also 3.5-4.4x faster. Beyond this parity, the diffusion model offers a drafting capability AR lacks: any-order infill. Because the canvas is denoised bidirectionally, a radiologist can fix report fragments and have the model fill the text between them, an operation inherent to diffusion but not to autoregression, which is subpar at it. This suits real reports, which are often terse or inconsistent across clinicians and institutions.', 'score': 4, 'issue_id': 2558, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '7d2e8572a170f633', 'authors': ['Max Van Puyvelde', 'Halil Ibrahim Gulluk', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Ghent University', 'Stanford University', 'Stanford University School of Medicine'], 'pdf_title_img': 'assets/pdf/title_img/2607.01436.jpg', 'data': {'categories': ['#science', '#healthcare', '#benchmark', '#open_source', '#cv', '#diffusion', '#multimodal', '#architecture', '#training'], 'emoji': '🏥', 'ru': {'title': 'Диффузионные модели покоряют медицинскую диагностику: быстрее и гибче, чем классические LLM', 'desc': 'В работе исследуется применение диффузионных языковых моделей для медицинского анализа изображений вместо традиционных авторегрессивных моделей. Авторы адаптировали модель DiffusionGemma-26B с использованием смеси экспертов и сравнили её с авторегрессивным аналогом Gemma-4-26B на датасетах медицинских визуальных вопросов. Диффузионная модель показала сравнимые или превосходящие результаты при скорости декодирования в 3.5-4.4 раза выше, а также предоставила возможность двусторонней генерации текста (заполнение фрагментов в произвольном порядке). Эта особенность особенно полезна для медицинских отчётов, которые часто содержат пропуски или неполную информацию от разных специалистов.'}, 'en': {'title': 'Diffusion Models: A New Frontier in Medical Text Generation', 'desc': "This paper discusses the advantages of diffusion language models over traditional autoregressive models in the context of medical visual question answering. The authors present DiffusionGemma-26B, a mixture-of-experts model that outperforms its autoregressive counterpart, Gemma-4-26B, in both performance and decoding speed. The diffusion model's unique ability to perform bidirectional text editing allows for more flexible and efficient text generation, particularly useful in medical reporting. Overall, the findings suggest that diffusion models can not only match but also enhance the capabilities of autoregressive models in specific applications."}, 'zh': {'title': '扩散语言模型：医学问答的新选择', 'desc': '这篇论文介绍了一种扩散语言模型在医学视觉问答中的应用，表现与自回归模型相当或更好，同时提供了更快的解码速度和双向文本编辑能力。研究中使用的DiffusionGemma-26B模型通过去噪的方式生成文本，能够在生成过程中进行双向操作，这使其在医学领域的表现更具竞争力。与同规模的自回归模型Gemma-4-26B相比，扩散模型在所有测试中都表现出色，并且其解码速度快3.5到4.4倍。扩散模型还具备自回归模型所不具备的填充能力，能够在报告中修复片段并填充文本，适合处理临床报告中的简洁或不一致问题。'}}}, {'id': 'https://huggingface.co/papers/2606.25178', 'title': 'Transferability for General Reasoning: An Automated Curriculum for Multi-Domain RLVR', 'url': 'https://huggingface.co/papers/2606.25178', 'abstract': 'Abstract Transfer-Aware Curriculum (TAC) improves multi-domain reinforcement learning by prioritizing domains that provide broad benefits to other domains, using gradient-geometry alignment to estimate cross-domain transferability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning with verifiable rewards (RLVR) has been extended from single-domain training to multi-domain reasoning suites spanning mathematics, programming, and science. However, the training curriculum (how often each domain is sampled) is typically fixed or hand-tuned, even though reasoning skills transfer unevenly across domains. Existing learnability-based curricula adapt to where the policy is currently improving, but are blind to whether a gradient step on the selected domain benefits the remaining domains. In this paper, we propose Transfer-Aware Curriculum (TAC), a bandit-style online curriculum that prioritizes domains whose updates broadly benefit the rest of the training suite. TAC repurposes signals already produced by RL training: per-domain advantages capture local learnability, and projected gradients, taken from the GRPO step being computed, estimate cross-domain transferability via gradient-geometry alignment, at negligible cost (<1% wall-clock overhead). Across a six-domain reasoning suite, TAC achieves the best macro-averaged accuracy on both Qwen3-1.7B and Llama3.2-3B, outperforming proportional random sampling, a hand-designed schedule, and a learnability-only bandit, and improving over the last of these by up to 2.8 points (10% relative). Ablations show performance degrades sharply when the transferability term is removed, and TAC remains robust on imbalanced training mixtures where learnability-only curricula over-commit to dominant domains. Our findings establish cross-domain transferability as a key signal for curriculum design in multi-domain RLVR.', 'score': 3, 'issue_id': 2559, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': '1f85f28b9f071d21', 'authors': ['Yongjin Yang', 'Jiarui Liu', 'Yinghui He', 'Lechen Zhang', 'Bernhard Schölkopf', 'Zhijing Jin'], 'affiliations': ['Carnegie Mellon University', 'ELLIS Institute Tübingen', 'EuroSafeAI', 'Jinesis Lab, University of Toronto & Vector Institute', 'Max Planck Institute for Intelligent Systems', 'Princeton University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.25178.jpg', 'data': {'categories': ['#optimization', '#small_models', '#rl', '#reasoning', '#plp', '#math', '#training', '#transfer_learning'], 'emoji': '🎯', 'ru': {'title': 'Умная расстановка приоритетов: обучение, которое видит пользу для всех доменов', 'desc': 'В статье предложен метод Transfer-Aware Curriculum (TAC) для улучшения обучения с подкреплением в многодоменной среде. TAC использует принцип многорукого бандита для выбора доменов, которые обучают модель наиболее эффективно, prioritizing области, обновления в которых дают наибольшую пользу другим доменам. Метод использует уже вычисляемые сигналы из процесса RL-обучения: локальную обучаемость (per-domain advantages) и взаимную трансферабельность доменов через выравнивание геометрии градиентов. Экспериментальные результаты показывают, что TAC превосходит базовые подходы на нескольких языковых моделях и остается устойчивым к дисбалансу доменов в тренировочных данных.'}, 'en': {'title': 'Boosting Learning Across Domains with Transfer-Aware Curriculum', 'desc': 'The paper introduces Transfer-Aware Curriculum (TAC), a method that enhances multi-domain reinforcement learning by focusing on domains that can help improve others. It uses gradient-geometry alignment to assess how updates in one domain can benefit the learning in other domains, making the training process more efficient. Unlike traditional methods that rely on fixed or hand-tuned sampling, TAC adapts dynamically based on the transferability of knowledge across domains. The results show that TAC significantly outperforms existing curriculum strategies, demonstrating the importance of cross-domain transferability in designing effective training curricula.'}, 'zh': {'title': '转移感知课程：优化多领域强化学习的关键', 'desc': '本文提出了一种名为转移感知课程（TAC）的新方法，旨在改善多领域强化学习的效果。TAC通过优先选择那些对其他领域有广泛益处的领域，来优化训练课程。它利用梯度几何对齐来估计跨领域的可转移性，从而在训练过程中动态调整领域的采样频率。实验结果表明，TAC在多个领域的推理任务中表现优异，显著提高了模型的整体准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.27821', 'title': 'Parameter-Efficient Quantum-Inspired Fast Weight Programmers for Traffic-Matrix Forecasting', 'url': 'https://huggingface.co/papers/2606.27821', 'abstract': 'Abstract Quantum-inspired recurrent models using gated QKAN-FWPs demonstrate superior forecasting accuracy with reduced computational requirements compared to traditional LSTM networks for traffic matrix prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Traffic matrices (TMs) capture network-wide origin-destination demand and are central to traffic engineering, yet accurate whole-matrix forecasting remains challenging when prediction must be performed under the memory, update, and training-budget constraints of online network control. This paper investigates whether compact quantum-inspired recurrent models can provide effective TM forecasts without relying on dedicated graph, transformer, or diffusion modules. We adapt gated quantum-inspired Kolmogorov-Arnold network fast-weight programmers (QKAN-FWPs) to direct multi-step Abilene TM forecasting, where each model predicts the next 20 five-minute frames of a 144-channel origin-destination (OD) matrix from a two-hour history. We benchmark three QKAN placement variants against a matched-size long short-term memory (LSTM) network, a larger LSTM, and a classical gated fast-weight programmer under a shared fixed-budget training protocol. Among the evaluated recurrent models, G-QKANFWP achieves the best pooled root-mean-square error (RMSE), while using only 22.4% of the larger LSTM. It also outperforms both the matched-size LSTM and the classical G-FWP baseline, indicating that the gain is not due to gated fast-weight framework alone. Convergence and channel-wise analyses further show that the quantum-inspired variants obtain lower validation-loss area under the learning curve (AULC) than matched-size recurrent baselines, while G-QKANFWP and GQKAN-FWP achieve substantially more OD-channel wins. These results identify a classical slow programmer with a quantum-inspired fast programmer as a promising accuracy-efficiency design for resource-conscious network traffic-matrix forecasting.', 'score': 2, 'issue_id': 2563, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'bc0624da6bc501ea', 'authors': ['Kuo-Chung Peng', 'Jiun-Cheng Jiang', 'Chun-Hua Lin', 'Tai-Yue Li', 'Nan-Yow Chen', 'Samuel Yen-Chi Chen'], 'affiliations': ['Department of Physics and Center for Theoretical Physics, National Taiwan University', 'National Center for High-Performance Computing, National Institutes of Applied Research', 'Wells Fargo'], 'pdf_title_img': 'assets/pdf/title_img/2606.27821.jpg', 'data': {'categories': [], 'emoji': '🚦', 'ru': {'title': 'Квантово-вдохновленные рекуррентные модели для эффективного прогнозирования сетевого трафика', 'desc': 'Статья исследует использование квантово-вдохновленных рекуррентных моделей на основе сетей Колмогорова-Арнольда (QKAN) с быстрыми программерами весов для прогнозирования матриц трафика в сетях. Авторы адаптировали архитектуру gated QKAN-FWP для многошагового предсказания происхождения-назначения трафика, достигая лучшей точности (RMSE) при использовании лишь 22% параметров по сравнению с увеличенной LSTM-сетью. Квантово-вдохновленные варианты модели демонстрируют более низкую ошибку валидации и быструю сходимость относительно классических рекуррентных базовых линий того же размера. Предложенный подход представляет оптимальный баланс между точностью прогнозирования и вычислительной эффективностью для управления сетевым трафиком с ограниченными ресурсами.'}, 'en': {'title': 'Quantum-Inspired Models Revolutionize Traffic Forecasting', 'desc': 'This paper presents a new approach to forecasting traffic matrices using quantum-inspired recurrent models called gated QKAN-FWPs. These models show better accuracy and require less computational power compared to traditional LSTM networks, making them suitable for online network control. The study benchmarks these models against various LSTM configurations and demonstrates that G-QKAN-FWP achieves the lowest forecasting error while using significantly fewer resources. The findings suggest that combining classical and quantum-inspired techniques can enhance the efficiency and accuracy of traffic matrix predictions.'}, 'zh': {'title': '量子启发模型提升交通预测效率与准确性', 'desc': '本文探讨了一种量子启发的递归模型，称为门控量子启发的Kolmogorov-Arnold网络快速权重程序（QKAN-FWPs），用于交通矩阵预测。与传统的长短期记忆网络（LSTM）相比，这种模型在预测准确性上表现更优，同时计算需求更低。研究表明，QKAN-FWPs能够在不依赖专用图、变换器或扩散模块的情况下，提供有效的交通矩阵预测。结果显示，G-QKAN-FWP模型在资源有限的情况下，能够实现更低的均方根误差（RMSE），并在多个评估指标上超越了其他对比模型。'}}}, {'id': 'https://huggingface.co/papers/2607.01283', 'title': 'Scaling Laws for Grid-Based Approximate Nearest Neighbor Search in High Dimensions', 'url': 'https://huggingface.co/papers/2607.01283', 'abstract': 'Abstract Grid-based multiprobe algorithms demonstrate superior dimensional scaling properties compared to graph-, tree-, and partitioning-based methods for approximate nearest neighbor search, making them competitive for high-dimensional and rebuild-heavy applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Grid-based approaches to approximate nearest neighbor (ANN) search have been absent from modern scaling analyses. We present a systematic characterization of a multiprobe grid algorithm with respect to dataset size N and dimensionality d. Our experiments reveal a previously unreported d-scaling crossover on the GloVe embedding family, in which multiprobe grid search maintains an approximately constant dimensional scaling exponent while other graph-, tree-, and partitioning-based methods exhibit degrading throughput. The advantage comes with near-linear query scaling in N, but also with lower indexing cost than competing ANN methods. Our results suggest that grid-based methods such as multiprobe grid may be competitive in rebuild-heavy or high-dimensional settings where indexing cost and dimensional robustness dictate performance. More broadly, recent work has formalized self-attention as an ANN operation. Thus, the N- and d-scaling properties of ANN algorithms may guide cost analysis of efficient transformer architectures. Code is available at: https://github.com/weiz345/MultiProbeANN.', 'score': 1, 'issue_id': 2564, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 其在近似最近邻搜索中。我们系统地分析了该算法在数据集大小N和维度d方面的特性，发现其在GloVe嵌入家族上具有独特的d缩放交叉现象。与其他基于图、树和分区的方法相比，网格方法在查询规模上接近线性增长，同时索引成本较低。我们的研究表明，网格方法在高维和重建密集的环境中可能具有竞争力，尤其是在索引成本和维度鲁棒性影响性能的情况下。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (7)', '#agi', '#alignment (1)', '#architecture (2)', '#audio', '#benchmark (13)', '#cv (5)', '#data (2)', '#dataset (7)', '#diffusion (3)', '#ethics', '#games (2)', '#graphs', '#hallucinations', '#healthcare (2)', '#inference (3)', '#interpretability (2)', '#leakage', '#long_context (5)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (7)', '#open_source (7)', '#optimization (7)', '#plp (2)', '#rag', '#reasoning (2)', '#rl (3)', '#rlhf (2)', '#robotics (1)', '#science (1)', '#security (1)', '#small_models (3)', '#story_generation', '#survey', '#synthetic (2)', '#training (12)', '#transfer_learning (2)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-05 09:15',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-05 09:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-05 09:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
