    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.08377', 'title': 'SkillClaw: Let Skills Evolve Collectively with Agentic Evolver', 'url': 'https://huggingface.co/papers/2604.08377', 'abstract': 'Abstract SkillClaw enables collective skill evolution in multi-user LLM agent systems by aggregating user interactions to autonomously update and improve reusable skills across the ecosystem.  AI-generated summary Large language model (LLM) agents such as OpenClaw rely on reusable skills to perform complex tasks, yet these skills remain largely static after deployment. As a result, similar workflows, tool usage patterns, and failure modes are repeatedly rediscovered across users, preventing the system from improving with experience. While interactions from different users provide complementary signals about when a skill works or fails, existing systems lack a mechanism to convert such heterogeneous experiences into reliable skill updates. To address these issues, we present SkillClaw, a framework for collective skill evolution in multi-user agent ecosystems, which treats cross-user and over-time interactions as the primary signal for improving skills. SkillClaw continuously aggregates trajectories generated during use and processes them with an autonomous evolver, which identifies recurring behavioral patterns and translates them into updates to the skill set by refining existing skills or extending them with new capabilities. The resulting skills are maintained in a shared repository and synchronized across users, allowing improvements discovered in one context to propagate system-wide while requiring no additional effort from users. By integrating multi-user experience into ongoing skill updates, SkillClaw enables cross-user knowledge transfer and cumulative capability improvement, and experiments on WildClawBench show that limited interaction and feedback, it significantly improves the performance of Qwen3-Max in real-world agent scenarios.', 'score': 94, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '917ba1a8ea509d17', 'authors': ['Ziyu Ma', 'Shidong Yang', 'Yuxiang Ji', 'Xucong Wang', 'Yong Wang', 'Yiming Hu', 'Tongwen Huang', 'Xiangxiang Chu'], 'affiliations': ['DreamX Team'], 'pdf_title_img': 'assets/pdf/title_img/2604.08377.jpg', 'data': {'categories': ['#agents', '#training'], 'emoji': '🧠', 'ru': {'title': 'Коллективная эволюция навыков в экосистеме мультипользовательских LLM-агентов', 'desc': 'SkillClaw — это фреймворк, который позволяет системам на основе больших языковых моделей (LLM) автоматически улучшать свои навыки, агрегируя данные из взаимодействий множества пользователей. Система непрерывно собирает траектории использования от разных пользователей и применяет автономный эволюционный алгоритм для выявления повторяющихся паттернов поведения. Выявленные паттерны трансформируются в обновления существующих навыков или создание новых возможностей, которые синхронизируются в общем репозитории и распространяются на всех пользователей системы. Этот подход обеспечивает передачу знаний между пользователями и кумулятивное улучшение способностей агента без дополнительных усилий со стороны пользователей.'}, 'en': {'title': 'Empowering LLM Agents Through Collective Skill Evolution', 'desc': 'SkillClaw is a framework designed to enhance the skills of multi-user large language model (LLM) agents by learning from user interactions. It addresses the problem of static skills that do not evolve after deployment, which leads to repeated rediscovery of workflows and tool usage. By aggregating user experiences, SkillClaw autonomously updates skills based on common patterns of success and failure, allowing for continuous improvement. This system not only refines existing skills but also adds new capabilities, ensuring that all users benefit from enhancements without extra effort on their part.'}, 'zh': {'title': '技能集体进化，提升多用户智能系统的能力', 'desc': 'SkillClaw 是一个框架，旨在通过聚合用户交互来实现多用户 LLM 代理系统中的技能集体进化。它解决了现有系统在技能更新方面的不足，能够将不同用户的经验转化为可靠的技能更新。SkillClaw 持续收集用户使用过程中的轨迹，并通过自主进化器识别重复的行为模式，从而改进技能集。最终，SkillClaw 使得在一个上下文中发现的改进能够在整个系统中传播，促进跨用户的知识转移和能力的累积提升。'}}}, {'id': 'https://huggingface.co/papers/2604.08546', 'title': 'When Numbers Speak: Aligning Textual Numerals and Visual Instances in Text-to-Video Diffusion Models', 'url': 'https://huggingface.co/papers/2604.08546', 'abstract': "Abstract NUMINA enhances text-to-video diffusion models' numerical accuracy through a training-free framework that identifies layout inconsistencies and guides regeneration via attention modulation.  AI-generated summary Text-to-video diffusion models have enabled open-ended video synthesis, but often struggle with generating the correct number of objects specified in a prompt. We introduce NUMINA , a training-free identify-then-guide framework for improved numerical alignment. NUMINA identifies prompt-layout inconsistencies by selecting discriminative self- and cross-attention heads to derive a countable latent layout. It then refines this layout conservatively and modulates cross-attention to guide regeneration. On the introduced CountBench, NUMINA improves counting accuracy by up to 7.4% on Wan2.1-1.3B, and by 4.9% and 5.5% on 5B and 14B models, respectively. Furthermore, CLIP alignment is improved while maintaining temporal consistency. These results demonstrate that structural guidance complements seed search and prompt enhancement, offering a practical path toward count-accurate text-to-video diffusion. The code is available at https://github.com/H-EmbodVis/NUMINA.", 'score': 79, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '876b6e0953d80d44', 'authors': ['Zhengyang Sun', 'Yu Chen', 'Xin Zhou', 'Xiaofan Li', 'Xiwu Chen', 'Dingkang Liang', 'Xiang Bai'], 'affiliations': ['Afari Intelligent Drive', 'Huazhong University of Science and Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08546.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Считаем предметы правильно: контроль численности в генерации видео через модуляцию внимания', 'desc': 'NUMINA — это框架без переобучения, который улучшает точность генерации видео из текста в диффузионных моделях путём исправления ошибок в количестве объектов. Метод работает в два этапа: сначала выявляет несоответствия между текстовым описанием и визуальной компоновкой, анализируя внимание в нейронной сети, затем аккуратно направляет регенерацию видео через модуляцию кросс-внимания. На новом бенчмарке CountBench точность подсчёта объектов улучшена на 4.9-7.4% в зависимости от размера модели, при этом сохраняется согласованность с CLIP и временная стабильность видео. Подход демонстрирует, что структурное руководство является эффективной дополнительной техникой к улучшению промпта для более точного синтеза видео.'}, 'en': {'title': 'NUMINA: Enhancing Accuracy in Text-to-Video Generation', 'desc': 'NUMINA is a framework designed to improve the numerical accuracy of text-to-video diffusion models without requiring additional training. It identifies inconsistencies between the prompt and the generated layout by analyzing attention heads, which helps in counting the objects accurately. By refining the layout and adjusting attention mechanisms, NUMINA guides the regeneration process to align better with the specified prompt. The framework has shown significant improvements in counting accuracy across various model sizes, demonstrating its effectiveness in enhancing video synthesis.'}, 'zh': {'title': 'NUMINA：提升文本到视频生成的计数准确性', 'desc': 'NUMINA 是一种无需训练的框架，旨在提高文本到视频扩散模型的数字准确性。它通过识别提示与布局之间的不一致性，选择自注意力和交叉注意力头来推导可计数的潜在布局。然后，NUMINA 通过保守地细化该布局并调节交叉注意力来指导再生。实验结果表明，NUMINA 在不同模型上显著提高了计数准确性，展示了结构性指导在文本到视频扩散中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.07430', 'title': 'HY-Embodied-0.5: Embodied Foundation Models for Real-World Agents', 'url': 'https://huggingface.co/papers/2604.07430', 'abstract': 'Abstract HY-Embodied-0.5 is a foundation model family for embodied agents featuring Mixture-of-Transformers architecture and iterative post-training for enhanced visual perception and reasoning capabilities.  AI-generated summary We introduce HY-Embodied-0.5, a family of foundation models specifically designed for real-world embodied agents. To bridge the gap between general Vision-Language Models (VLMs) and the demands of embodied agents, our models are developed to enhance the core capabilities required by embodied intelligence: spatial and temporal visual perception, alongside advanced embodied reasoning for prediction, interaction, and planning. The HY-Embodied-0.5 suite comprises two primary variants: an efficient model with 2B activated parameters designed for edge deployment, and a powerful model with 32B activated parameters targeted for complex reasoning. To support the fine-grained visual perception essential for embodied tasks, we adopt a Mixture-of-Transformers (MoT) architecture to enable modality-specific computing. By incorporating latent tokens, this design effectively enhances the perceptual representation of the models. To improve reasoning capabilities, we introduce an iterative, self-evolving post-training paradigm. Furthermore, we employ on-policy distillation to transfer the advanced capabilities of the large model to the smaller variant, thereby maximizing the performance potential of the compact model. Extensive evaluations across 22 benchmarks, spanning visual perception, spatial reasoning, and embodied understanding, demonstrate the effectiveness of our approach. Our MoT-2B model outperforms similarly sized state-of-the-art models on 16 benchmarks, while the 32B variant achieves performance comparable to frontier models such as Gemini 3.0 Pro. In downstream robot control experiments, we leverage our robust VLM foundation to train an effective Vision-Language-Action (VLA) model, achieving compelling results in real-world physical evaluations. Code and models are open-sourced at https://github.com/Tencent-Hunyuan/HY-Embodied.', 'score': 53, 'issue_id': 1867, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': 'd5225de0b4dda577', 'authors': ['Tencent Robotics X', 'HY Vision Team', ':', 'Xumin Yu', 'Zuyan Liu', 'Ziyi Wang', 'He Zhang', 'Yongming Rao', 'Fangfu Liu', 'Yani Zhang', 'Ruowen Zhao', 'Oran Wang', 'Yves Liang', 'Haitao Lin', 'Minghui Wang', 'Yubo Dong', 'Kevin Cheng', 'Bolin Ni', 'Rui Huang', 'Han Hu', 'Zhengyou Zhang', 'Linus', 'Shunyu Yao'], 'affiliations': ['Tencent Robotics HY Vision Team'], 'pdf_title_img': 'assets/pdf/title_img/2604.07430.jpg', 'data': {'categories': ['#benchmark', '#robotics', '#multimodal', '#architecture', '#open_source', '#small_models', '#training', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Воплощённый интеллект через специализированные трансформеры', 'desc': 'HY-Embodied-0.5 — это семейство foundation моделей для воплощённых агентов, использующих архитектуру Mixture-of-Transformers для обработки зрительной информации. Модели разработаны для улучшения пространственно-временного восприятия и рассуждений, необходимых агентам взаимодействовать с реальным миром. Применяется итеративная парадигма пост-обучения для совершенствования способностей моделей к предсказанию, взаимодействию и планированию. На основе этих foundation моделей создана эффективная Vision-Language-Action модель для управления роботами в реальных условиях.'}, 'en': {'title': 'Empowering Embodied Agents with HY-Embodied-0.5', 'desc': "HY-Embodied-0.5 is a new family of foundation models designed for embodied agents, focusing on improving visual perception and reasoning. It uses a Mixture-of-Transformers architecture to enhance the models' ability to process different types of data effectively. The models come in two versions: a smaller, efficient model for edge devices and a larger, more powerful model for complex tasks. Extensive testing shows that these models excel in various benchmarks, outperforming many existing models and demonstrating strong performance in real-world applications like robot control."}, 'zh': {'title': '具身智能的视觉推理新突破', 'desc': 'HY-Embodied-0.5是一种专为具身智能体设计的基础模型系列，采用混合变换器架构和迭代后训练方法，以增强视觉感知和推理能力。该模型旨在弥合通用视觉-语言模型与具身智能体需求之间的差距，提升空间和时间视觉感知以及复杂推理能力。HY-Embodied-0.5包括两种主要变体：一种是适用于边缘部署的高效模型，另一种是针对复杂推理的强大模型。通过在22个基准测试中的广泛评估，我们的模型在视觉感知和具身理解方面表现出色，尤其是在机器人控制实验中取得了显著成果。'}}}, {'id': 'https://huggingface.co/papers/2604.08364', 'title': 'MegaStyle: Constructing Diverse and Scalable Style Dataset via Consistent Text-to-Image Style Mapping', 'url': 'https://huggingface.co/papers/2604.08364', 'abstract': 'Abstract MegaStyle presents a scalable data curation pipeline for creating high-quality, style-consistent datasets using large generative models and proposes style-supervised contrastive learning for effective style representation extraction.  AI-generated summary In this paper, we introduce MegaStyle, a novel and scalable data curation pipeline that constructs an intra-style consistent, inter-style diverse and high-quality style dataset. We achieve this by leveraging the consistent text-to-image style mapping capability of current large generative models, which can generate images in the same style from a given style description. Building on this foundation, we curate a diverse and balanced prompt gallery with 170K style prompts and 400K content prompts, and generate a large-scale style dataset MegaStyle-1.4M via content-style prompt combinations. With MegaStyle-1.4M, we propose style-supervised contrastive learning to fine-tune a style encoder MegaStyle-Encoder for extracting expressive, style-specific representations, and we also train a FLUX-based style transfer model MegaStyle-FLUX. Extensive experiments demonstrate the importance of maintaining intra-style consistency, inter-style diversity and high-quality for style dataset, as well as the effectiveness of the proposed MegaStyle-1.4M. Moreover, when trained on MegaStyle-1.4M, MegaStyle-Encoder and MegaStyle-FLUX provide reliable style similarity measurement and generalizable style transfer, making a significant contribution to the style transfer community. More results are available at our project website https://jeoyal.github.io/MegaStyle/.', 'score': 47, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '667ea2104ef54063', 'authors': ['Junyao Gao', 'Sibo Liu', 'Jiaxing Li', 'Yanan Sun', 'Yuanpeng Tu', 'Fei Shen', 'Weidong Zhang', 'Cairong Zhao', 'Jun Zhang'], 'affiliations': ['Fuzhou University', 'Hong Kong University of Science and Technology', 'Nanyang Technological University', 'National University of Singapore', 'Tencent', 'Tongji University', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.08364.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Автоматическое создание качественных датасетов стилей через генеративные модели и контрастивное обучение', 'desc': 'MegaStyle представляет масштабируемый конвейер кураторства данных для создания высокачественных датасетов со стилистической согласованностью, используя возможности больших генеративных моделей. Авторы собрали датасет из 1.4 миллионов изображений путём комбинирования 170K стилевых и 400K контентных промптов, обеспечивая внутристилевую консистентность и межстилевое разнообразие. Предложен метод style-supervised contrastive learning для обучения энкодера, который извлекает выразительные стилевые представления и обеспечивает надёжное измерение стилистического сходства. Экспериментально показана эффективность подхода для задачи передачи стиля, где обученные модели демонстрируют хорошую обобщаемость на новые стили.'}, 'en': {'title': 'Creating Consistent and Diverse Style Datasets with MegaStyle', 'desc': 'MegaStyle introduces a new method for creating high-quality datasets that maintain consistent styles while being diverse in content. It utilizes large generative models to generate images based on specific style descriptions, ensuring that the images are consistent within a style. The paper presents a dataset called MegaStyle-1.4M, which is created from a large collection of style and content prompts. Additionally, it proposes a style-supervised contrastive learning approach to train a style encoder, enabling effective extraction of style-specific representations for applications in style transfer.'}, 'zh': {'title': 'MegaStyle：高质量风格数据集的构建与应用', 'desc': 'MegaStyle是一个可扩展的数据整理管道，旨在创建高质量且风格一致的数据集。它利用大型生成模型的文本到图像风格映射能力，生成具有相同风格的图像。通过构建包含17万个风格提示和40万个内容提示的多样化提示库，MegaStyle生成了一个规模庞大的风格数据集MegaStyle-1.4M。该论文还提出了风格监督对比学习，以微调风格编码器，从而提取具有表现力的风格特征。'}}}, {'id': 'https://huggingface.co/papers/2604.06628', 'title': 'Rethinking Generalization in Reasoning SFT: A Conditional Analysis on Optimization, Data, and Model Capability', 'url': 'https://huggingface.co/papers/2604.06628', 'abstract': 'Abstract Supervised finetuning and reinforcement learning exhibit conditional cross-domain generalization in reasoning tasks, influenced by optimization dynamics, data quality, and model capability, with asymmetric outcomes between reasoning improvement and safety degradation.  AI-generated summary A prevailing narrative in LLM post-training holds that supervised finetuning (SFT) memorizes while reinforcement learning (RL) generalizes. We revisit this claim for reasoning SFT with long chain-of-thought (CoT) supervision and find that cross-domain generalization is not absent but conditional, jointly shaped by optimization dynamics, training data, and base-model capability. Some reported failures are under-optimization artifacts: cross-domain performance first degrades before recovering and improving with extended training (a dip-and-recovery pattern), so shorttraining checkpoints can underestimate generalization. Data quality and structure both matter: low-quality solutions broadly hurt generalization,while verified long-CoT traces yield consistent cross-domain gains. Model capability is essential: stronger models internalize transferable procedural patterns (e.g., backtracking) even from a toy arithmetic game, while weaker ones imitate surface verbosity. This generalization is asymmetric, however: reasoning improves while safety degrades, reframing the question from whether reasoning SFT generalizes to under what conditions and at what cost.', 'score': 33, 'issue_id': 1868, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': 'dcb28e3b30a85331', 'authors': ['Qihan Ren', 'Peng Wang', 'Ruikun Cai', 'Shuai Shao', 'Dadi Guo', 'Yuejin Xie', 'Yafu Li', 'Quanshi Zhang', 'Xia Hu', 'Jing Shao', 'Dongrui Liu'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.06628.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#reasoning', '#rlhf', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Условная генерализация рассуждений: выигрыш в логике ценой безопасности', 'desc': 'В статье исследуется условная кросс-доменная генерализация при настройке больших языковых моделей на задачах логического рассуждения. Авторы опровергают устоявшееся мнение, что supervised finetuning только запоминает паттерны, показывая, что генерализация возможна, но зависит от динамики оптимизации, качества данных и способности базовой модели. Обнаружена асимметричность: при расширенном обучении качество рассуждений улучшается, но одновременно происходит деградация показателей безопасности модели. Исследование выявляет, что сильные модели способны усваивать переносимые процедурные паттерны, тогда как слабые модели воспроизводят только поверхностные характеристики текста.'}, 'en': {'title': 'Conditional Generalization: Balancing Reasoning and Safety in AI', 'desc': "This paper explores how supervised finetuning (SFT) and reinforcement learning (RL) affect the ability of models to generalize across different reasoning tasks. It argues that while SFT can lead to memorization, it can also enable conditional cross-domain generalization, influenced by factors like optimization dynamics and data quality. The authors highlight a 'dip-and-recovery' pattern in performance, where initial degradation in cross-domain tasks can be reversed with further training. Importantly, they note that stronger models can learn transferable reasoning patterns better than weaker ones, but this improvement in reasoning may come at the cost of reduced safety."}, 'zh': {'title': '推理微调的条件泛化与安全性权衡', 'desc': '这篇论文探讨了监督微调和强化学习在推理任务中的跨领域泛化能力。研究发现，跨领域泛化是有条件的，受到优化动态、数据质量和模型能力的共同影响。某些失败的案例是由于优化不足造成的，随着训练的延长，性能会先下降后恢复。论文还指出，模型能力对泛化至关重要，强大的模型能够内化可转移的程序模式，而较弱的模型则只能模仿表面特征。'}}}, {'id': 'https://huggingface.co/papers/2604.08455', 'title': 'KnowU-Bench: Towards Interactive, Proactive, and Personalized Mobile Agent Evaluation', 'url': 'https://huggingface.co/papers/2604.08455', 'abstract': 'Abstract KnowU-Bench presents a comprehensive benchmark for personalized mobile agents that evaluates true preference inference and proactive assistance capabilities in real-world GUI environments.  AI-generated summary Personalized mobile agents that infer user preferences and calibrate proactive assistance hold great promise as everyday digital assistants, yet existing benchmarks fail to capture what this requires. Prior work evaluates preference recovery from static histories or intent prediction from fixed contexts. Neither tests whether an agent can elicit missing preferences through interaction, nor whether it can decide when to intervene, seek consent, or remain silent in a live GUI environment. We introduce KnowU-Bench, an online benchmark for personalized mobile agents built on a reproducible Android emulation environment, covering 42 general GUI tasks, 86 personalized tasks, and 64 proactive tasks. Unlike prior work that treats user preferences as static context, KnowU-Bench hides the user profile from the agent and exposes only behavioral logs, forcing genuine preference inference rather than context lookup. To support multi-turn preference elicitation, it instantiates an LLM-driven user simulator grounded in structured profiles, enabling realistic clarification dialogues and proactive consent handling. Beyond personalization, KnowU-Bench provides comprehensive evaluation of the complete proactive decision chain, including grounded GUI execution, consent negotiation, and post-rejection restraint, evaluated through a hybrid protocol combining rule-based verification with LLM-as-a-Judge scoring. Our experiments reveal a striking degradation: agents that excel at explicit task execution fall below 50% under vague instructions requiring user preference inference or intervention calibration, even for frontier models like Claude Sonnet 4.6. The core bottlenecks are not GUI navigation but preference acquisition and intervention calibration, exposing a fundamental gap between competent interface operation and trustworthy personal assistance.', 'score': 29, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'd0d5735ce15753a5', 'authors': ['Tongbo Chen', 'Zhengxi Lu', 'Zhan Xu', 'Guocheng Shao', 'Shaohan Zhao', 'Fei Tang', 'Yong Du', 'Kaitao Song', 'Yizhou Liu', 'Yuchen Yan', 'Wenqi Zhang', 'Xu Tan', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Apple', 'Tencent', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08455.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'От выполнения задач к доверяемой персональной ассистенции через инференцию предпочтений', 'desc': 'KnowU-Bench представляет комплексный бенчмарк для оценки персонализированных мобильных агентов, которые должны истинно инферировать предпочтения пользователей и обучиться проактивно помогать в реальных GUI-окружениях. В отличие от предыдущих работ, которые трактуют предпочтения как статический контекст, этот бенчмарк скрывает профиль пользователя от агента и предоставляет только логи поведения, принуждая к подлинному выводу предпочтений. Бенчмарк включает LLM-симулятор пользователя для поддержки многооборотного диалога уточнения предпочтений и оценивает полную цепочку проактивных решений, включая согласие и ограничение действий после отказа. Эксперименты показывают критический разрыв: даже передовые модели получают результаты ниже 50% при расплывчатых инструкциях, требующих инференции предпочтений, выявляя, что основные трудности заключаются не в навигации интерфейса, а в эквизиции предпочтений и калибровке вмешательств.'}, 'en': {'title': 'Bridging the Gap in Personalized Mobile Assistance', 'desc': 'KnowU-Bench is a new benchmark designed to evaluate personalized mobile agents in real-world graphical user interface (GUI) environments. It focuses on how well these agents can infer user preferences and provide proactive assistance, rather than just relying on static user data. The benchmark includes a variety of tasks that require agents to engage in multi-turn dialogues to clarify user preferences and decide when to act or remain silent. The findings highlight significant challenges in preference acquisition and intervention calibration, indicating that even advanced models struggle with these aspects of personalized assistance.'}, 'zh': {'title': '个性化移动代理的新基准测试', 'desc': 'KnowU-Bench是一个全面的基准测试，旨在评估个性化移动代理在真实图形用户界面环境中的偏好推断和主动辅助能力。现有的基准测试未能有效捕捉到个性化代理所需的交互能力，而KnowU-Bench通过隐藏用户资料并仅暴露行为日志，迫使代理进行真实的偏好推断。该基准测试涵盖了42个通用GUI任务、86个个性化任务和64个主动任务，并引入了基于大型语言模型的用户模拟器，以支持多轮偏好引导和主动同意处理。实验结果显示，尽管代理在明确任务执行上表现出色，但在模糊指令下的用户偏好推断和干预校准方面却表现不佳，揭示了界面操作能力与可信赖的个人助手之间的根本差距。'}}}, {'id': 'https://huggingface.co/papers/2604.08224', 'title': 'Externalization in LLM Agents: A Unified Review of Memory, Skills, Protocols and Harness Engineering', 'url': 'https://huggingface.co/papers/2604.08224', 'abstract': 'Abstract Large language model agents are evolving beyond weight-based modifications to incorporate externalized components like memory, skills, and protocols that enhance reliability and coordination.  AI-generated summary Large language model (LLM) agents are increasingly built less by changing model weights than by reorganizing the runtime around them. Capabilities that earlier systems expected the model to recover internally are now externalized into memory stores, reusable skills, interaction protocols, and the surrounding harness that makes these modules reliable in practice. This paper reviews that shift through the lens of externalization. Drawing on the idea of cognitive artifacts, we argue that agent infrastructure matters not merely because it adds auxiliary components, but because it transforms hard cognitive burdens into forms that the model can solve more reliably. Under this view, memory externalizes state across time, skills externalize procedural expertise, protocols externalize interaction structure, and harness engineering serves as the unification layer that coordinates them into governed execution. We trace a historical progression from weights to context to harness, analyze memory, skills, and protocols as three distinct but coupled forms of externalization, and examine how they interact inside a larger agent system. We further discuss the trade-off between parametric and externalized capability, identify emerging directions such as self-evolving harnesses and shared agent infrastructure, and discuss open challenges in evaluation, governance, and the long-term co-evolution of models and external infrastructure. The result is a systems-level framework for explaining why practical agent progress increasingly depends not only on stronger models, but on better external cognitive infrastructure.', 'score': 28, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '32e45d9050294ac3', 'authors': ['Chenyu Zhou', 'Huacan Chai', 'Wenteng Chen', 'Zihan Guo', 'Rong Shan', 'Yuanyi Song', 'Tianyi Xu', 'Yingxuan Yang', 'Aofan Yu', 'Weiming Zhang', 'Congming Zheng', 'Jiachen Zhu', 'Zeyu Zheng', 'Zhuosheng Zhang', 'Xingyu Lou', 'Changwang Zhang', 'Zhihui Fu', 'Jun Wang', 'Weiwen Liu', 'Jianghao Lin', 'Weinan Zhang'], 'affiliations': ['Carnegie Mellon University', 'OPPO', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'Sun Yat-Sen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08224.jpg', 'data': {'categories': ['#agents', '#architecture', '#survey'], 'emoji': '🧠', 'ru': {'title': 'От весов к инфраструктуре: экстернализация когнитивных функций в агентах LLM', 'desc': 'Статья рассматривает эволюцию агентов на основе больших языковых моделей, которые всё чаще строятся не путём модификации весов, а через организацию внешних компонентов вокруг модели. Авторы предлагают концепцию экстернализации, согласно которой память, навыки и протоколы взаимодействия переносят когнитивные нагрузки из модели во внешние структуры, делая решения более надёжными. В работе анализируется историческая прогрессия от изменения параметров к использованию контекста и специализированной инфраструктуры агента. Авторы обсуждают взаимодействие между встроенными и внешними возможностями, а также перспективы самоэволюционирующейся архитектуры и совместного развития моделей с их внешней инфраструктурой.'}, 'en': {'title': 'Enhancing LLMs: The Power of Externalized Components', 'desc': 'This paper discusses how large language model (LLM) agents are evolving by using external components like memory, skills, and protocols instead of just modifying their internal weights. It highlights the importance of these externalized elements in making LLMs more reliable and effective in their tasks. By transforming complex cognitive tasks into manageable forms, these components allow models to perform better in real-world applications. The authors propose a framework that emphasizes the significance of the infrastructure surrounding LLMs, suggesting that advancements in AI depend on both improved models and enhanced external cognitive systems.'}, 'zh': {'title': '外部化：提升大型语言模型代理的关键', 'desc': '这篇论文探讨了大型语言模型代理的演变，强调了外部组件如记忆、技能和协议在提高可靠性和协调性方面的重要性。与传统的通过修改模型权重的方法不同，现代系统更倾向于通过重组运行时环境来增强能力。记忆、技能和协议被视为三种不同但相互关联的外部化形式，它们共同作用于更大的代理系统中。论文还讨论了参数能力与外部化能力之间的权衡，以及自我演化的基础设施和共享代理基础设施等新兴方向。'}}}, {'id': 'https://huggingface.co/papers/2604.08523', 'title': 'ClawBench: Can AI Agents Complete Everyday Online Tasks?', 'url': 'https://huggingface.co/papers/2604.08523', 'abstract': "Abstract ClawBench presents a comprehensive evaluation framework with 153 real-world tasks across 144 platforms to test AI agents' ability to automate everyday online activities requiring complex multi-step workflows and document processing.  AI-generated summary AI agents may be able to automate your inbox, but can they automate other routine aspects of your life? Everyday online tasks offer a realistic yet unsolved testbed for evaluating the next generation of AI agents. To this end, we introduce ClawBench, an evaluation framework of 153 simple tasks that people need to accomplish regularly in their lives and work, spanning 144 live platforms across 15 categories, from completing purchases and booking appointments to submitting job applications. These tasks require demanding capabilities beyond existing benchmarks, such as obtaining relevant information from user-provided documents, navigating multi-step workflows across diverse platforms, and write-heavy operations like filling in many detailed forms correctly. Unlike existing benchmarks that evaluate agents in offline sandboxes with static pages, ClawBench operates on production websites, preserving the full complexity, dynamic nature, and challenges of real-world web interaction. A lightweight interception layer captures and blocks only the final submission request, ensuring safe evaluation without real-world side effects. Our evaluations of 7 frontier models show that both proprietary and open-source models can complete only a small portion of these tasks. For example, Claude Sonnet 4.6 achieves only 33.3%. Progress on ClawBench brings us closer to AI agents that can function as reliable general-purpose assistants.", 'score': 27, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'e4a4f7460169f905', 'authors': ['Yuxuan Zhang', 'Yubo Wang', 'Yipeng Zhu', 'Penghui Du', 'Junwen Miao', 'Xuan Lu', 'Wendong Xu', 'Yunzhuo Hao', 'Songcheng Cai', 'Xiaochen Wang', 'Huaisong Zhang', 'Xian Wu', 'Yi Lu', 'Minyi Lei', 'Kai Zou', 'Huifeng Yin', 'Ping Nie', 'Liang Chen', 'Dongfu Jiang', 'Wenhu Chen', 'Kelsey R. Allen'], 'affiliations': ['Carnegie Mellon University', 'Etude AI', 'HKUST', 'Netmind.ai', 'Shanghai Jiao Tong University', 'Tsinghua University', 'UniPat AI', 'University of British Columbia', 'University of Waterloo', 'Vector Institute', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08523.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset', '#survey'], 'emoji': '🤖', 'ru': {'title': 'Реальный тест для агентов: от офлайн-песочниц к живому веб-взаимодействию', 'desc': 'ClawBench — это комплексный framework для оценки способностей AI-агентов автоматизировать реальные повседневные задачи в интернете. Он включает 153 практических задачи на 144 реальных платформах, требующие сложных многошаговых рабочих процессов, обработки документов и заполнения форм. В отличие от существующих бенчмарков, которые тестируют агентов на статических страницах в изолированной среде, ClawBench работает на действующих веб-сайтах с полной их сложностью и динамичностью. Результаты показывают, что даже передовые модели (например, Claude Sonnet 3.5) успешно решают только треть задач, что указывает на значительный потенциал для развития более надёжных AI-ассистентов.'}, 'en': {'title': 'ClawBench: Testing AI Agents in the Real World', 'desc': 'ClawBench is a new evaluation framework designed to test AI agents on 153 real-world tasks across 144 platforms, focusing on automating complex online activities. It challenges AI models to handle multi-step workflows and document processing, which are essential for everyday tasks like booking appointments and submitting job applications. Unlike previous benchmarks that use static environments, ClawBench operates in real-time on live websites, capturing the dynamic nature of online interactions. Initial evaluations show that current AI models struggle with these tasks, indicating that more progress is needed to develop reliable general-purpose AI assistants.'}, 'zh': {'title': 'ClawBench：评估AI代理的真实世界能力', 'desc': 'ClawBench是一个全面的评估框架，包含153个真实世界的任务，跨越144个平台，旨在测试AI代理自动化日常在线活动的能力。这些任务涉及复杂的多步骤工作流程和文档处理，超出了现有基准的要求。ClawBench在真实网站上进行评估，保留了真实网络交互的复杂性和动态特性。我们的评估显示，当前的前沿模型在这些任务中的完成率很低，表明在实现可靠的通用助手方面仍有很大进步空间。'}}}, {'id': 'https://huggingface.co/papers/2604.07823', 'title': 'LPM 1.0: Video-based Character Performance Model', 'url': 'https://huggingface.co/papers/2604.07823', 'abstract': 'Abstract A large-scale multimodal model for real-time conversational character performance generation that maintains identity consistency while enabling interactive, infinite-length video synthesis.  AI-generated summary Performance, the externalization of intent, emotion, and personality through visual, vocal, and temporal behavior, is what makes a character alive. Learning such performance from video is a promising alternative to traditional 3D pipelines. However, existing video models struggle to jointly achieve high expressiveness, real-time inference, and long-horizon identity stability, a tension we call the performance trilemma. Conversation is the most comprehensive performance scenario, as characters simultaneously speak, listen, react, and emote while maintaining identity over time. To address this, we present LPM 1.0 (Large Performance Model), focusing on single-person full-duplex audio-visual conversational performance. Concretely, we build a multimodal human-centric dataset through strict filtering, speaking-listening audio-video pairing, performance understanding, and identity-aware multi-reference extraction; train a 17B-parameter Diffusion Transformer (Base LPM) for highly controllable, identity-consistent performance through multimodal conditioning; and distill it into a causal streaming generator (Online LPM) for low-latency, infinite-length interaction. At inference, given a character image with identity-aware references, LPM 1.0 generates listening videos from user audio and speaking videos from synthesized audio, with text prompts for motion control, all at real-time speed with identity-stable, infinite-length generation. LPM 1.0 thus serves as a visual engine for conversational agents, live streaming characters, and game NPCs. To systematically evaluate this setting, we propose LPM-Bench, the first benchmark for interactive character performance. LPM 1.0 achieves state-of-the-art results across all evaluated dimensions while maintaining real-time inference.', 'score': 23, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'd75231580d59cbde', 'authors': ['Ailing Zeng', 'Casper Yang', 'Chauncey Ge', 'Eddie Zhang', 'Garvey Xu', 'Gavin Lin', 'Gilbert Gu', 'Jeremy Pi', 'Leo Li', 'Mingyi Shi', 'Sheng Bi', 'Steven Tang', 'Thorn Hang', 'Tobey Guo', 'Vincent Li', 'Xin Tong', 'Yikang Li', 'Yuchen Sun', 'Yue', 'Zhao', 'Yuhan Lu', 'Yuwei Li', 'Zane Zhang', 'Zeshi Yang', 'Zi Ye'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.07823.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#dataset', '#architecture', '#diffusion', '#inference', '#long_context', '#games', '#audio', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Беспредельное воплощение: синтез персонажей в реальном времени с сохранением идентичности', 'desc': 'Представлена Large Performance Model (LPM 1.0) — большая мультимодальная модель на основе Diffusion Transformer для синтеза видео персонажей в реальном времени. Модель решает проблему баланса между выразительностью, скоростью вывода и стабильностью идентичности персонажа путём использования многомодального кондиционирования и специально созданного датасета с парами аудио-видео. Для достижения низкой задержки при бесконечной генерации видео была произведена дистилляция в потоковый генератор Online LPM, работающий причинно-следственным образом. Модель применима для создания виртуальных собеседников, персонажей для стриминга и NPC в играх, а также предложен первый бенчмарк LPM-Bench для оценки интерактивного синтеза характеров.'}, 'en': {'title': 'Real-Time Conversational Characters with Identity Consistency', 'desc': "This paper introduces LPM 1.0, a large-scale multimodal model designed for generating real-time conversational performances of characters. It addresses the 'performance trilemma' by achieving high expressiveness, real-time inference, and long-term identity consistency in character interactions. The model utilizes a 17B-parameter Diffusion Transformer trained on a carefully curated dataset to ensure identity-aware and controllable performance. LPM 1.0 enables characters to engage in dynamic conversations, producing audio-visual outputs that maintain their identity over extended interactions, making it suitable for applications like virtual agents and game NPCs."}, 'zh': {'title': '实时对话角色表演生成的多模态模型', 'desc': '这篇论文介绍了一种大型多模态模型LPM 1.0，用于实时生成对话角色的表演，能够保持角色身份的一致性并实现无限长度的视频合成。该模型通过学习视频中的表演，克服了传统3D管道的局限性，解决了表现力、实时推理和身份稳定性之间的矛盾。LPM 1.0专注于单人全双工音视频对话表演，利用严格筛选的人类中心数据集和17B参数的扩散变换器进行训练。最终，该模型能够在实时速度下生成与用户音频相对应的听觉视频和合成音频的讲话视频，适用于对话代理、直播角色和游戏NPC。'}}}, {'id': 'https://huggingface.co/papers/2604.07296', 'title': 'OpenSpatial: A Principled Data Engine for Empowering Spatial Intelligence', 'url': 'https://huggingface.co/papers/2604.07296', 'abstract': 'Abstract OpenSpatial presents an open-source data engine for spatial reasoning tasks using 3D bounding boxes, creating a large-scale dataset and achieving state-of-the-art performance in spatial perception benchmarks.  AI-generated summary Spatial understanding is a fundamental cornerstone of human-level intelligence. Nonetheless, current research predominantly focuses on domain-specific data production, leaving a critical void: the absence of a principled, open-source engine capable of fully unleashing the potential of high-quality spatial data. To bridge this gap, we elucidate the design principles of a robust data generation system and introduce OpenSpatial -- an open-source data engine engineered for high quality, extensive scalability, broad task diversity, and optimized efficiency. OpenSpatial adopts 3D bounding boxes as the fundamental primitive to construct a comprehensive data hierarchy across five foundational tasks: Spatial Measurement (SM), Spatial Relationship (SR), Camera Perception (CP), Multi-view Consistency (MC), and Scene-Aware Reasoning (SAR). Leveraging this scalable infrastructure, we curate OpenSpatial-3M, a large-scale dataset comprising 3 million high-fidelity samples. Extensive evaluations demonstrate that versatile models trained on our dataset achieve state-of-the-art performance across a wide spectrum of spatial reasoning benchmarks. Notably, the best-performing model exhibits a substantial average improvement of 19 percent, relatively. Furthermore, we provide a systematic analysis of how data attributes influence spatial perception. By open-sourcing both the engine and the 3M-scale dataset, we provide a robust foundation to accelerate future research in spatial intelligence.', 'score': 23, 'issue_id': 1867, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '5eb6c018a5d6ef82', 'authors': ['Jianhui Liu', 'Haoze Sun', 'Wenbo Li', 'Yanbing Zhang', 'Rui Yang', 'Zhiliang Zhu', 'Yijun Yang', 'Shenghe Zheng', 'Nan Jiang', 'Jiaxiu Jiang', 'Haoyang Huang', 'Tien-Tsin Wong', 'Nan Duan', 'Xiaojuan Qi'], 'affiliations': ['Joy Future Academy', 'Monash University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.07296.jpg', 'data': {'categories': ['#benchmark', '#data', '#dataset', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Открытый движок для генерации пространственных данных нового поколения', 'desc': 'OpenSpatial представляет открытую платформу для генерации высококачественных данных, предназначенную для задач пространственного рассуждения с использованием трёхмерных ограничивающих боксов в качестве основного примитива. На основе этого движка авторы создали большой датасет OpenSpatial-3M с тремя миллионами примеров, охватывающий пять фундаментальных задач: пространственное измерение, пространственные отношения, восприятие камеры, многовидовую согласованность и рассуждение с учётом сцены. Модели, обученные на этом датасете, достигают передовых результатов на бенчмарках пространственного восприятия с улучшением на 19 процентов. Авторы открыли исходный код движка и датасета для ускорения будущих исследований в области пространственного интеллекта.'}, 'en': {'title': 'Empowering Spatial Intelligence with OpenSpatial', 'desc': "OpenSpatial is an open-source data engine designed for spatial reasoning tasks that utilize 3D bounding boxes. It addresses the lack of a comprehensive, scalable system for generating high-quality spatial data, which is essential for advancing AI's spatial understanding. The engine supports five key tasks: Spatial Measurement, Spatial Relationship, Camera Perception, Multi-view Consistency, and Scene-Aware Reasoning, and it has produced a large dataset of 3 million samples. Models trained on this dataset have achieved state-of-the-art results, demonstrating significant improvements in spatial perception benchmarks."}, 'zh': {'title': '开源空间推理引擎，助力智能研究', 'desc': 'OpenSpatial是一个开源数据引擎，专注于使用3D边界框进行空间推理任务。它创建了一个大型数据集，并在空间感知基准测试中取得了最先进的性能。该系统设计原则旨在实现高质量、广泛可扩展性和多样化任务的高效数据生成。通过开源引擎和300万规模的数据集，OpenSpatial为未来的空间智能研究提供了坚实的基础。'}}}, {'id': 'https://huggingface.co/papers/2604.08545', 'title': 'Act Wisely: Cultivating Meta-Cognitive Tool Use in Agentic Multimodal Models', 'url': 'https://huggingface.co/papers/2604.08545', 'abstract': 'Abstract Agents with meta-cognitive deficits struggle with tool usage decisions, leading to inefficiencies; a new framework called HDPO addresses this through decoupled optimization channels for accuracy and efficiency.  AI-generated summary The advent of agentic multimodal models has empowered systems to actively interact with external environments. However, current agents suffer from a profound meta-cognitive deficit: they struggle to arbitrate between leveraging internal knowledge and querying external utilities. Consequently, they frequently fall prey to blind tool invocation, resorting to reflexive tool execution even when queries are resolvable from the raw visual context. This pathological behavior precipitates severe latency bottlenecks and injects extraneous noise that derails sound reasoning. Existing reinforcement learning protocols attempt to mitigate this via a scalarized reward that penalizes tool usage. Yet, this coupled formulation creates an irreconcilable optimization dilemma: an aggressive penalty suppresses essential tool use, whereas a mild penalty is entirely subsumed by the variance of the accuracy reward during advantage normalization, rendering it impotent against tool overuse. To transcend this bottleneck, we propose HDPO, a framework that reframes tool efficiency from a competing scalar objective to a strictly conditional one. By eschewing reward scalarization, HDPO maintains two orthogonal optimization channels: an accuracy channel that maximizes task correctness, and an efficiency channel that enforces execution economy exclusively within accurate trajectories via conditional advantage estimation. This decoupled architecture naturally induces a cognitive curriculum-compelling the agent to first master task resolution before refining its self-reliance. Extensive evaluations demonstrate that our resulting model, Metis, reduces tool invocations by orders of magnitude while simultaneously elevating reasoning accuracy.', 'score': 21, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '7b5406dd68ce36af', 'authors': ['Shilin Yan', 'Jintao Tong', 'Hongwei Xue', 'Xiaojun Tang', 'Yangyang Wang', 'Kunyu Shi', 'Guannan Zhang', 'Ruixuan Li', 'Yixiong Zou'], 'affiliations': ['Accio Team, Alibaba Group', 'Huazhong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.08545.jpg', 'data': {'categories': ['#agents', '#multimodal', '#rlhf'], 'emoji': '🧠', 'ru': {'title': 'Двойной путь к разуму: как научить агентов думать вместо слепого использования инструментов', 'desc': 'Статья представляет HDPO — новую систему обучения для мультимодальных AI-агентов, которые решают, когда использовать внешние инструменты, а когда полагаться на собственные знания. Традиционные подходы с единой функцией вознаграждения создают конфликт между точностью и эффективностью: сильный штраф за использование инструментов подавляет необходимые запросы, а слабый штраф остаётся незаметным среди шума от вознаграждения за точность. HDPO решает эту проблему, разделяя оптимизацию на два независимых канала: канал точности максимизирует корректность ответов, а канал эффективности снижает количество вызовов инструментов только среди верных решений. Такой подход естественным образом создаёт обучающую программу, где модель сначала учится правильно решать задачи, а затем становится более самостоятельной.'}, 'en': {'title': 'Decoupling Accuracy and Efficiency for Smarter Tool Use in Agents', 'desc': 'This paper introduces a new framework called HDPO to improve decision-making in agents that struggle with using tools effectively. Current agents often misuse tools due to a lack of meta-cognitive abilities, leading to inefficiencies and delays. HDPO separates the optimization of accuracy and efficiency into two distinct channels, allowing agents to focus on mastering tasks before optimizing their tool usage. The results show that the proposed model, Metis, significantly reduces unnecessary tool use while enhancing reasoning accuracy.'}, 'zh': {'title': '提升智能体工具使用效率的HDPO框架', 'desc': '本论文提出了一种新的框架HDPO，旨在解决智能体在工具使用决策中的元认知缺陷。现有的强化学习方法通过惩罚工具使用来缓解这一问题，但这种方法存在优化困境。HDPO通过将工具效率从竞争目标转变为条件目标，维护了准确性和效率两个独立的优化通道。实验结果表明，使用HDPO的模型Metis在减少工具调用的同时，提高了推理的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.08302', 'title': 'DMax: Aggressive Parallel Decoding for dLLMs', 'url': 'https://huggingface.co/papers/2604.08302', 'abstract': 'Abstract DMax introduces a novel approach for efficient diffusion language models that reduces error accumulation during parallel decoding through self-refinement and unified training strategies.  AI-generated summary We present DMax, a new paradigm for efficient diffusion language models (dLLMs). It mitigates error accumulation in parallel decoding, enabling aggressive decoding parallelism while preserving generation quality. Unlike conventional masked dLLMs that decode through a binary mask-to-token transition, DMax reformulates decoding as a progressive self-refinement from mask embeddings to token embeddings. At the core of our approach is On-Policy Uniform Training, a novel training strategy that efficiently unifies masked and uniform dLLMs, equipping the model to recover clean tokens from both masked inputs and its own erroneous predictions. Building on this foundation, we further propose Soft Parallel Decoding. We represent each intermediate decoding state as an interpolation between the predicted token embedding and the mask embedding, enabling iterative self-revising in embedding space. Extensive experiments across a variety of benchmarks demonstrate the effectiveness of DMax. Compared with the original LLaDA-2.0-mini, our method improves TPF on GSM8K from 2.04 to 5.47 while preserving accuracy. On MBPP, it increases TPF from 2.71 to 5.86 while maintaining comparable performance. On two H200 GPUs, our model achieves an average of 1,338 TPS at batch size 1. Code is available at: https://github.com/czg1225/DMax', 'score': 21, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'bbd0cfdb1287a048', 'authors': ['Zigeng Chen', 'Gongfan Fang', 'Xinyin Ma', 'Ruonan Yu', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2604.08302.jpg', 'data': {'categories': ['#open_source', '#optimization', '#diffusion'], 'emoji': '✨', 'ru': {'title': 'Самоуточнение в диффузионных языковых моделях для ускоренного параллельного декодирования', 'desc': 'DMax представляет новую парадигму для эффективных диффузионных языковых моделей, которая снижает накопление ошибок при параллельном декодировании. В основе подхода лежит стратегия On-Policy Uniform Training, объединяющая обучение на замаскированных и равномерных данных, позволяя модели восстанавливать корректные токены из ошибочных предсказаний. Авторы предлагают Soft Parallel Decoding, где каждое состояние декодирования представляется интерполяцией между предсказанным и замаскированным эмбеддингом, обеспечивая итеративное самоуточнение. Экспериментальные результаты показывают значительное улучшение пропускной способности: на GSM8K TPF возрастает с 2.04 до 5.47, сохраняя качество генерации.'}, 'en': {'title': 'DMax: Enhancing Diffusion Language Models with Self-Refinement and Parallel Decoding', 'desc': 'DMax is a new method designed to improve the efficiency of diffusion language models (dLLMs) by reducing errors during parallel decoding. It introduces a self-refinement process that transitions from mask embeddings to token embeddings, allowing for better quality in generated outputs. The approach utilizes On-Policy Uniform Training to combine masked and uniform dLLMs, helping the model correct its own mistakes. Additionally, Soft Parallel Decoding is proposed to enhance the iterative refinement of token predictions, leading to significant performance improvements in various benchmarks.'}, 'zh': {'title': 'DMax：高效扩散语言模型的新范式', 'desc': 'DMax是一种新颖的高效扩散语言模型方法，旨在减少并行解码过程中的错误累积。它通过自我精炼和统一训练策略，允许在保持生成质量的同时实现更高的解码并行性。与传统的掩码扩散语言模型不同，DMax将解码过程重新定义为从掩码嵌入到标记嵌入的渐进式自我精炼。通过这种方法，DMax在多个基准测试中表现出色，显著提高了解码速度和准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.05333', 'title': 'Graph of Skills: Dependency-Aware Structural Retrieval for Massive Agent Skills', 'url': 'https://huggingface.co/papers/2604.05333', 'abstract': "Abstract Graph of Skills (GoS) enables efficient inference in large skill libraries by constructing executable skill graphs and retrieving dependency-aware bundles through hybrid retrieval methods, significantly improving reward performance while reducing token usage.  AI-generated summary Skill usage has become a core component of modern agent systems and can substantially improve agents' ability to complete complex tasks. In real-world settings, where agents must monitor and interact with numerous personal applications, web browsers, and other environment interfaces, skill libraries can scale to thousands of reusable skills. Scaling to larger skill sets introduces two key challenges. First, loading the full skill set saturates the context window, driving up token costs, hallucination, and latency.   In this paper, we present Graph of Skills (GoS), an inference-time structural retrieval layer for large skill libraries. GoS constructs an executable skill graph offline from skill packages, then at inference time retrieves a bounded, dependency-aware skill bundle through hybrid semantic-lexical seeding, reverse-weighted Personalized PageRank, and context-budgeted hydration. On SkillsBench and ALFWorld, GoS improves average reward by 43.6% over the vanilla full skill-loading baseline while reducing input tokens by 37.8%, and generalizes across three model families: Claude Sonnet, GPT-5.2 Codex, and MiniMax. Additional ablation studies across skill libraries ranging from 200 to 2,000 skills further demonstrate that GoS consistently outperforms both vanilla skills loading and simple vector retrieval in balancing reward, token efficiency, and runtime.", 'score': 15, 'issue_id': 1866, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '63b1b766111ae384', 'authors': ['Dawei Liu', 'Zongxia Li', 'Hongyang Du', 'Xiyang Wu', 'Shihang Gui', 'Yongbei Kuang', 'Lichao Sun'], 'affiliations': ['Brown University', 'Carnegie Mellon University', 'Lehigh University', 'University of Maryland', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2604.05333.jpg', 'data': {'categories': ['#inference', '#hallucinations', '#long_context', '#agents', '#optimization', '#graphs'], 'emoji': '🔗', 'ru': {'title': 'Граф навыков: эффективный выбор зависимостей для масштабируемых агентов', 'desc': 'В работе предложен метод Graph of Skills (GoS) для эффективной работы с большими библиотеками навыков в агентных системах. Метод строит граф зависимостей между навыками и использует гибридный подход семантического и лексического поиска для выбора релевантного подмножества навыков на этапе инференса. GoS значительно снижает использование токенов (на 37,8%) и улучшает качество решения задач (на 43,6%), при этом сохраняя совместимость с различными моделями. Подход масштабируется на библиотеках с сотнями и тысячами навыков, превосходя базовые методы загрузки всех навыков и простой векторный поиск.'}, 'en': {'title': 'Optimizing Skill Libraries with Graph of Skills', 'desc': 'The Graph of Skills (GoS) is a novel approach designed to enhance the efficiency of skill libraries in AI systems. It constructs an executable skill graph that allows for the retrieval of skill bundles that are aware of their dependencies, which helps in managing complex tasks. By using advanced retrieval methods, GoS significantly improves the performance of agents while minimizing the number of tokens used, thus reducing costs and latency. The results show that GoS outperforms traditional methods, achieving a 43.6% increase in average reward and a 37.8% reduction in token usage across various model families.'}, 'zh': {'title': '技能图：高效推理与优化奖励的解决方案', 'desc': '技能图（GoS）通过构建可执行的技能图和使用混合检索方法，能够高效地推理大型技能库，从而显著提高奖励表现并减少令牌使用。在现代智能体系统中，技能的使用已成为核心组成部分，能够显著提升智能体完成复杂任务的能力。随着技能库规模的扩大，加载完整的技能集会导致上下文窗口饱和，增加令牌成本、幻觉和延迟。本文提出的GoS在推理时提供了一种结构化的检索层，能够在保持高效性的同时，优化奖励和令牌使用。'}}}, {'id': 'https://huggingface.co/papers/2604.08539', 'title': 'OpenVLThinkerV2: A Generalist Multimodal Reasoning Model for Multi-domain Visual Tasks', 'url': 'https://huggingface.co/papers/2604.08539', 'abstract': "Abstract Gaussian GRPO addresses challenges in multimodal model training by using distributional matching to ensure gradient equity and stable reinforcement learning, enabling improved perception-reasoning balance in generalist models.  AI-generated summary Group Relative Policy Optimization (GRPO) has emerged as the de facto Reinforcement Learning (RL) objective driving recent advancements in Multimodal Large Language Models. However, extending this success to open-source multimodal generalist models remains heavily constrained by two primary challenges: the extreme variance in reward topologies across diverse visual tasks, and the inherent difficulty of balancing fine-grained perception with multi-step reasoning capabilities. To address these issues, we introduce Gaussian GRPO (G^2RPO), a novel RL training objective that replaces standard linear scaling with non-linear distributional matching. By mathematically forcing the advantage distribution of any given task to strictly converge to a standard normal distribution, N(0,1), G^2RPO theoretically ensures inter-task gradient equity, mitigates vulnerabilities to heavy-tail outliers, and offers symmetric update for positive and negative rewards. Leveraging the enhanced training stability provided by G^2RPO, we introduce two task-level shaping mechanisms to seamlessly balance perception and reasoning. First, response length shaping dynamically elicits extended reasoning chains for complex queries while enforce direct outputs to bolster visual grounding. Second, entropy shaping tightly bounds the model's exploration zone, effectively preventing both entropy collapse and entropy explosion. Integrating these methodologies, we present OpenVLThinkerV2, a highly robust, general-purpose multimodal model. Extensive evaluations across 18 diverse benchmarks demonstrate its superior performance over strong open-source and leading proprietary frontier models.", 'score': 9, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '9f3a21e7ae91aaf8', 'authors': ['Wenbo Hu', 'Xin Chen', 'Yan Gao-Tian', 'Yihe Deng', 'Nanyun Peng', 'Kai-Wei Chang'], 'affiliations': ['University of California, Los Angeles (UCLA)'], 'pdf_title_img': 'assets/pdf/title_img/2604.08539.jpg', 'data': {'categories': ['#rl', '#benchmark', '#multimodal', '#architecture', '#rlhf', '#open_source', '#optimization', '#training', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Уравновешивание восприятия и рассуждений через распределённое соответствие в усиленном обучении мультимодальных моделей', 'desc': 'В работе предлагается Gaussian GRPO — новый метод обучения с подкреплением для мультимодальных моделей, который заменяет линейное масштабирование на нелинейное распределённое сопоставление. Метод математически гарантирует справедливость градиентов между задачами, снижая влияние выбросов и обеспечивая стабильное обучение. Авторы добавляют механизмы формирования на уровне задач: контроль длины ответа для балансировки восприятия и рассуждений, а также регулирование энтропии для предотвращения коллапса или взрыва исследования. На основе этого подхода создана модель OpenVLThinkerV2, которая демонстрирует превосходные результаты на 18 различных бенчмарках, превосходя открытые и коммерческие аналоги.'}, 'en': {'title': 'Balancing Perception and Reasoning in Multimodal Models with G^2RPO', 'desc': 'The paper introduces Gaussian Group Relative Policy Optimization (G^2RPO), a new reinforcement learning objective designed to improve training for multimodal models. It addresses the challenges of varying reward structures in visual tasks and the need for a balance between perception and reasoning. By using non-linear distributional matching, G^2RPO ensures that the advantage distributions converge to a standard normal distribution, promoting stability and fairness in gradient updates. The paper also presents task-level shaping mechanisms that enhance reasoning capabilities while maintaining strong visual grounding, resulting in the robust multimodal model OpenVLThinkerV2.'}, 'zh': {'title': '高斯GRPO：平衡感知与推理的强化学习新方法', 'desc': '本文介绍了一种新的强化学习训练目标——高斯群体相对策略优化（G^2RPO），旨在解决多模态模型训练中的挑战。通过非线性分布匹配，G^2RPO确保了任务间梯度的公平性，并提高了训练的稳定性。该方法通过动态调整响应长度和熵约束，平衡了细致的感知与多步推理能力。最终，OpenVLThinkerV2模型在18个不同基准测试中表现优异，超越了许多开源和领先的专有模型。'}}}, {'id': 'https://huggingface.co/papers/2604.08362', 'title': 'Towards Real-world Human Behavior Simulation: Benchmarking Large Language Models on Long-horizon, Cross-scenario, Heterogeneous Behavior Traces', 'url': 'https://huggingface.co/papers/2604.08362', 'abstract': 'Abstract OmniBehavior benchmark reveals that current LLMs fail to accurately simulate complex real-world user behaviors due to structural biases and limited behavioral diversity.  AI-generated summary The emergence of Large Language Models (LLMs) has illuminated the potential for a general-purpose user simulator. However, existing benchmarks remain constrained to isolated scenarios, narrow action spaces, or synthetic data, failing to capture the holistic nature of authentic human behavior. To bridge this gap, we introduce OmniBehavior, the first user simulation benchmark constructed entirely from real-world data, integrating long-horizon, cross-scenario, and heterogeneous behavioral patterns into a unified framework. Based on this benchmark, we first provide empirical evidence that previous datasets with isolated scenarios suffer from tunnel vision, whereas real-world decision-making relies on long-term, cross-scenario causal chains. Extensive evaluations of state-of-the-art LLMs reveal that current models struggle to accurately simulate these complex behaviors, with performance plateauing even as context windows expand. Crucially, a systematic comparison between simulated and authentic behaviors uncovers a fundamental structural bias: LLMs tend to converge toward a positive average person, exhibiting hyper-activity, persona homogenization, and a Utopian bias. This results in the loss of individual differences and long-tail behaviors, highlighting critical directions for future high-fidelity simulation research.', 'score': 8, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '15dd22fac34cdfbd', 'authors': ['Jiawei Chen', 'Ruoxi Xu', 'Boxi Cao', 'Ruotong Pan', 'Yunfei Zhang', 'Yifei Hu', 'Yong Du', 'Tingting Gao', 'Yaojie Lu', 'Yingfei Sun', 'Xianpei Han', 'Le Sun', 'Xiangyu Wu', 'Hongyu Lin'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Kuaishou Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.08362.jpg', 'data': {'categories': ['#long_context', '#synthetic'], 'emoji': '🎭', 'ru': {'title': 'LLM склонны симулировать утопическое поведение вместо реальных человеческих паттернов', 'desc': 'В статье представлен бенчмарк OmniBehavior, построенный на реальных данных, который показывает, что современные LLM плохо справляются с симуляцией сложного поведения пользователей. Исследование демонстрирует, что существующие датасеты с изолированными сценариями не учитывают долгосрочные причинно-следственные связи, характерные для реального принятия решений. Оценка продвинутых моделей выявила фундаментальное смещение: LLM сходятся к среднему положительному пользователю, теряя индивидуальные различия и редкие поведенческие паттерны. Результаты указывают на необходимость разработки более совершенных методов для создания высокоточных симуляторов пользовательского поведения.'}, 'en': {'title': 'Bridging the Gap: Real-World User Simulation with OmniBehavior', 'desc': 'The OmniBehavior benchmark highlights the limitations of current Large Language Models (LLMs) in simulating complex user behaviors due to their reliance on biased and narrow datasets. It introduces a new benchmark that uses real-world data to better capture the diversity and intricacies of human decision-making across various scenarios. The study shows that existing models often oversimplify behaviors, leading to a homogenized representation of users that lacks individual differences. This research emphasizes the need for more comprehensive simulations that reflect the true complexity of human behavior in AI applications.'}, 'zh': {'title': '真实用户行为的全面模拟', 'desc': 'OmniBehavior基准揭示了当前的大型语言模型（LLMs）在模拟复杂的真实用户行为方面存在结构性偏差和行为多样性不足的问题。现有的基准测试通常局限于孤立场景和狭窄的行动空间，无法全面捕捉真实人类行为的整体特征。为了解决这个问题，我们提出了OmniBehavior，这是第一个完全基于真实数据构建的用户模拟基准，整合了长期、跨场景和异质行为模式。我们的研究表明，现有模型在模拟复杂行为时表现不佳，且存在趋向于平均化的结构性偏差，强调了未来高保真模拟研究的重要方向。'}}}, {'id': 'https://huggingface.co/papers/2604.06231', 'title': 'Automating Database-Native Function Code Synthesis with LLMs', 'url': 'https://huggingface.co/papers/2604.06231', 'abstract': 'Abstract  Database systems incorporate an ever-growing number of functions in their kernels (a.k.a., database native functions) for scenarios like new application support and business migration. This growth causes an urgent demand for automatic database native function synthesis. While recent advances in LLM-based code generation (e.g., Claude Code) show promise, they are too generic for database-specific development. They often hallucinate or overlook critical context because database function synthesis is inherently complex and error-prone, where synthesizing a single function may involve registering multiple function units, linking internal references, and implementing logic correctly. To this end, we propose DBCooker, an LLM-based system for automatically synthesizing database native functions. It consists of three components. First, the function characterization module aggregates multi-source declarations, identifies function units that require specialized coding, and traces cross-unit dependencies. Second, we design operations to address the main synthesis challenges: (1) a pseudo-code-based coding plan generator that constructs structured implementation skeletons by identifying key elements such as reusable referenced functions; (2) a hybrid fill-in-the-blank model guided by probabilistic priors and component awareness to integrate core logic with reusable routines; and (3) three-level progressive validation, including syntax checking, standards compliance, and LLM-guided semantic verification. Finally, an adaptive orchestration strategy unifies these operations with existing tools and dynamically sequences them via the orchestration history of similar functions. Results show that DBCooker outperforms other methods on SQLite, PostgreSQL, and DuckDB (34.55% higher accuracy on average), and can synthesize new functions absent in the latest SQLite (v3.50).', 'score': 8, 'issue_id': 1867, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'ef2f6aac113dc1a1', 'authors': ['Wei Zhou', 'Xuanhe Zhou', 'Qikang He', 'Guoliang Li', 'Bingsheng He', 'Quanqing Xu', 'Fan Wu'], 'affiliations': ['Ant Group', 'National University of Singapore', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.06231.jpg', 'data': {'categories': ['#science', '#hallucinations'], 'emoji': '🗄️', 'ru': {'title': 'Специализированный синтез функций БД через контекстно-осведомленную оркестровку LLM', 'desc': 'Статья представляет DBCooker — систему на основе LLM для автоматического синтеза встроенных функций баз данных. Система решает проблему халлюцинаций и упущений контекста путём трёхкомпонентной архитектуры: модуль характеризации функций выявляет зависимости между компонентами, генератор плана на псевдокоде создаёт структурированные скелеты реализации, а гибридная модель заполнения пробелов интегрирует основную логику с переиспользуемыми подпрограммами. Система включает многоуровневую валидацию (синтаксис, стандарты, семантика) и адаптивную оркестровку операций на основе истории синтеза похожих функций. Эксперименты показывают превосходство DBCooker над альтернативными методами на SQLite, PostgreSQL и DuckDB с средней точностью на 34,55% выше.'}, 'en': {'title': 'DBCooker: Smart Synthesis for Database Functions', 'desc': 'This paper introduces DBCooker, a system designed to automatically create database native functions using large language models (LLMs). Unlike generic code generation tools, DBCooker focuses on the complexities of database function synthesis, which involves managing multiple function units and their interdependencies. It features a function characterization module that identifies necessary coding elements and a pseudo-code generator that creates structured implementation plans. The system also includes a three-level validation process to ensure correctness and compliance, demonstrating superior performance in synthesizing functions for various database systems.'}, 'zh': {'title': 'DBCooker：自动合成数据库函数的智能解决方案', 'desc': '本论文提出了一种名为DBCooker的系统，用于自动合成数据库原生函数。该系统利用大型语言模型（LLM）来处理数据库特定的开发需求，克服了传统代码生成方法的局限性。DBCooker包括功能特征模块、伪代码生成器和混合填空模型，能够有效识别和整合函数逻辑。实验结果表明，DBCooker在SQLite、PostgreSQL和DuckDB上的准确率平均提高了34.55%。'}}}, {'id': 'https://huggingface.co/papers/2604.08168', 'title': 'ViVa: A Video-Generative Value Model for Robot Reinforcement Learning', 'url': 'https://huggingface.co/papers/2604.08168', 'abstract': 'Abstract ViVa, a video-generative value model, improves robot manipulation by leveraging pretrained video generators to estimate values based on anticipated embodiment dynamics rather than static observations.  AI-generated summary Vision-language-action (VLA) models have advanced robot manipulation through large-scale pretraining, but real-world deployment remains challenging due to partial observability and delayed feedback. Reinforcement learning addresses this via value functions, which assess task progress and guide policy improvement. However, existing value models built on vision-language models (VLMs) struggle to capture temporal dynamics, undermining reliable value estimation in long-horizon tasks. In this paper, we propose ViVa, a video-generative value model that repurposes a pretrained video generator for value estimation. Taking the current observation and robot proprioception as input, ViVa jointly predicts future proprioception and a scalar value for the current state. By leveraging the spatiotemporal priors of a pretrained video generator, our approach grounds value estimation in anticipated embodiment dynamics, moving beyond static snapshots to intrinsically couple value with foresight. Integrated into RECAP, ViVa delivers substantial improvements on real-world box assembly. Qualitative analysis across all three tasks confirms that ViVa produces more reliable value signals, accurately reflecting task progress. By leveraging spatiotemporal priors from video corpora, ViVa also generalizes to novel objects, highlighting the promise of video-generative models for value estimation.', 'score': 7, 'issue_id': 1868, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '35ded1a2e716688d', 'authors': ['Jindi Lv', 'Hao Li', 'Jie Li', 'Yifei Nie', 'Fankun Kong', 'Yang Wang', 'Xiaofeng Wang', 'Zheng Zhu', 'Chaojun Ni', 'Qiuping Deng', 'Hengtao Li', 'Jiancheng Lv', 'Guan Huang'], 'affiliations': ['GigaAI', 'Sichuan University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08168.jpg', 'data': {'categories': ['#video', '#multimodal', '#robotics', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Видеогенеративная модель оценки для предсказания будущей динамики в робо-манипуляции', 'desc': 'Авторы предлагают ViVa — модель оценки стоимости для робо-манипуляции, которая переиспользует предобученный видеогенератор для предсказания ценности состояния. Модель принимает текущее наблюдение и проприоцептивные данные робота в качестве входа и совместно предсказывает будущую проприоцепцию и скалярное значение стоимости. Ключевое преимущество ViVa заключается в том, что она опирается на спатиотемпоральные приоры видеогенератора, что позволяет оценивать стоимость на основе предполагаемой динамики робота, а не статических снимков. Интеграция ViVa в алгоритм обучения с подкреплением показала значительные улучшения в реальных задачах манипуляции и хорошую обобщаемость на новые объекты.'}, 'en': {'title': 'ViVa: Enhancing Robot Manipulation with Video-Generative Value Estimation', 'desc': 'The paper introduces ViVa, a video-generative value model designed to enhance robot manipulation by using pretrained video generators for value estimation. Unlike traditional models that rely on static observations, ViVa predicts future robot states and value based on anticipated dynamics, addressing challenges in real-world applications. By integrating spatiotemporal information, ViVa improves the reliability of value signals, which are crucial for guiding reinforcement learning policies. The model shows significant performance gains in tasks like box assembly, demonstrating its ability to generalize across different objects and scenarios.'}, 'zh': {'title': 'ViVa：基于视频生成的机器人价值估计新方法', 'desc': 'ViVa是一种视频生成价值模型，通过利用预训练的视频生成器来改善机器人操作。与传统的静态观察不同，ViVa基于
