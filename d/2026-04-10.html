预期的身体动态来估计价值，从而提高了任务的可靠性。该模型结合了当前观察和机器人的自我感知，能够预测未来的自我感知和当前状态的标量值。通过将时空先验与价值估计相结合，ViVa在实际的箱子组装任务中表现出显著的改进。'}}}, {'id': 'https://huggingface.co/papers/2604.08544', 'title': 'SIM1: Physics-Aligned Simulator as Zero-Shot Data Scaler in Deformable Worlds', 'url': 'https://huggingface.co/papers/2604.08544', 'abstract': 'Abstract A physics-aligned simulation framework enables effective robotic manipulation of deformable objects by creating metric-consistent synthetic data that matches real-world performance.  AI-generated summary Robotic manipulation with deformable objects represents a data-intensive regime in embodied learning, where shape, contact, and topology co-evolve in ways that far exceed the variability of rigids. Although simulation promises relief from the cost of real-world data acquisition, prevailing sim-to-real pipelines remain rooted in rigid-body abstractions, producing mismatched geometry, fragile soft dynamics, and motion primitives poorly suited for cloth interaction. We posit that simulation fails not for being synthetic, but for being ungrounded. To address this, we introduce SIM1, a physics-aligned real-to-sim-to-real data engine that grounds simulation in the physical world. Given limited demonstrations, the system digitizes scenes into metric-consistent twins, calibrates deformable dynamics through elastic modeling, and expands behaviors via diffusion-based trajectory generation with quality filtering. This pipeline transforms sparse observations into scaled synthetic supervision with near-demonstration fidelity. Experiments show that policies trained on purely synthetic data achieve parity with real-data baselines at a 1:15 equivalence ratio, while delivering 90% zero-shot success and 50% generalization gains in real-world deployment. These results validate physics-aligned simulation as scalable supervision for deformable manipulation and a practical pathway for data-efficient policy learning.', 'score': 7, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'be141221b14e8478', 'authors': ['Yunsong Zhou', 'Hangxu Liu', 'Xuekun Jiang', 'Xing Shen', 'Yuanzhen Zhou', 'Hui Wang', 'Baole Fang', 'Yang Tian', 'Mulin Yu', 'Qiaojun Yu', 'Li Ma', 'Hengjie Li', 'Hanqing Wang', 'Jia Zeng', 'Jiangmiao Pang'], 'affiliations': ['Fudan University', 'Peking University', 'Shanghai AI Lab', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08544.jpg', 'data': {'categories': ['#synthetic', '#diffusion'], 'emoji': '🧣', 'ru': {'title': 'Физически согласованная симуляция как масштабируемое решение для обучения манипуляции деформируемыми объектами', 'desc': 'В работе представлена система SIM1, которая создаёт физически согласованные синтетические данные для обучения роботических манипуляторов работе с деформируемыми объектами. Система преобразует ограниченное количество реальных демонстраций в метрически точные цифровые двойники сцен и калибрует динамику деформируемых объектов через упругое моделирование. С помощью диффузионных моделей генерируются дополнительные траектории с фильтрацией качества, что позволяет масштабировать синтетическую разметку данных. Экспериментально показано, что политики, обученные только на синтетических данных, достигают паритета с методами, обученными на реальных данных при соотношении 1:15, демонстрируя 90% успешность без дополнительного обучения.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with Physics-Aligned Simulation', 'desc': 'This paper presents a new simulation framework called SIM1 that enhances robotic manipulation of deformable objects by aligning synthetic data with real-world physics. It addresses the limitations of traditional simulation methods that often rely on rigid-body models, which do not accurately represent the complexities of soft materials. By creating metric-consistent synthetic twins of real scenes and using advanced techniques like elastic modeling and diffusion-based trajectory generation, the framework allows for effective training of robotic policies. The results demonstrate that robots trained with this approach can perform as well as those trained with real data, showcasing the potential for efficient learning in complex environments.'}, 'zh': {'title': '物理对齐仿真：提升机器人操控能力的关键', 'desc': '这篇论文介绍了一种与物理对齐的仿真框架，旨在提高机器人对可变形物体的操控能力。该框架通过创建与真实世界性能一致的合成数据，解决了传统仿真在处理可变形物体时的不足。研究表明，使用这种仿真方法训练的策略在真实数据基准上表现出色，达到了1:15的等效比。实验结果显示，该方法在真实世界应用中实现了90%的零-shot成功率和50%的泛化提升。'}}}, {'id': 'https://huggingface.co/papers/2604.08526', 'title': 'FIT: A Large-Scale Dataset for Fit-Aware Virtual Try-On', 'url': 'https://huggingface.co/papers/2604.08526', 'abstract': 'Abstract A large-scale virtual try-on dataset called FIT is introduced that includes precise body and garment measurements to address garment fit accuracy, using synthetic 3D garment generation, physics simulation, and photorealistic re-texturing techniques.  AI-generated summary Given a person and a garment image, virtual try-on (VTO) aims to synthesize a realistic image of the person wearing the garment, while preserving their original pose and identity. Although recent VTO methods excel at visualizing garment appearance, they largely overlook a crucial aspect of the try-on experience: the accuracy of garment fit -- for example, depicting how an extra-large shirt looks on an extra-small person. A key obstacle is the absence of datasets that provide precise garment and body size information, particularly for "ill-fit" cases, where garments are significantly too large or too small. Consequently, current VTO methods default to generating well-fitted results regardless of the garment or person size.   In this paper, we take the first steps towards solving this open problem. We introduce FIT (Fit-Inclusive Try-on), a large-scale VTO dataset comprising over 1.13M try-on image triplets accompanied by precise body and garment measurements. We overcome the challenges of data collection via a scalable synthetic strategy: (1) We programmatically generate 3D garments using GarmentCode and drape them via physics simulation to capture realistic garment fit. (2) We employ a novel re-texturing framework to transform synthetic renderings into photorealistic images while strictly preserving geometry. (3) We introduce person identity preservation into our re-texturing model to generate paired person images (same person, different garments) for supervised training. Finally, we leverage our FIT dataset to train a baseline fit-aware virtual try-on model. Our data and results set the new state-of-the-art for fit-aware virtual try-on, as well as offer a robust benchmark for future research. We will make all data and code publicly available on our project page: https://johannakarras.github.io/FIT.', 'score': 7, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '142bb6d3745b5f01', 'authors': ['Johanna Karras', 'Yuanhao Wang', 'Yingwei Li', 'Ira Kemelmacher-Shlizerman'], 'affiliations': ['Google Research, USA', 'University of Washington, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.08526.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#cv', '#multimodal', '#dataset', '#open_source', '#3d'], 'emoji': '👕', 'ru': {'title': 'Точная посадка одежды в виртуальной примерке через синтетические данные и физическую симуляцию', 'desc': 'В работе представлен большой датасет FIT для виртуальной примерки одежды, содержащий более 1.13М изображений с точными измерениями тела и размеров одежды. Авторы решают проблему отсутствия данных для случаев неправильной посадки, когда одежда слишком велика или слишком мала, используя синтетическую генерацию 3D гарментов, физическую симуляцию и нейросетевую перетекстуризацию для фотореалистичности. Датасет включает инновационный подход к сохранению идентичности человека при парных изображениях одного человека в разной одежде. На основе FIT обучена базовая модель для виртуальной примерки с учётом посадки, которая устанавливает новый стандарт в этой области.'}, 'en': {'title': 'Revolutionizing Virtual Try-On with Accurate Fit Data', 'desc': 'This paper presents a new dataset called FIT, designed to improve the accuracy of virtual try-on (VTO) systems by including detailed body and garment measurements. The authors address the common issue of garment fit by generating synthetic 3D garments and using physics simulations to create realistic fitting scenarios. They also introduce a novel re-texturing technique that transforms these synthetic images into photorealistic visuals while maintaining the original geometry and identity of the person. By training a fit-aware VTO model on this dataset, the authors establish a new benchmark for future research in garment fitting accuracy.'}, 'zh': {'title': '提升虚拟试衣的合身性准确性', 'desc': '本文介绍了一个名为FIT的大规模虚拟试衣数据集，旨在提高服装合身的准确性。该数据集包含超过113万张试衣图像三元组，并附有精确的身体和服装尺寸信息。通过合成3D服装生成、物理模拟和逼真的重纹理技术，解决了当前虚拟试衣方法在合身性方面的不足。我们利用FIT数据集训练了一个基于合身性的虚拟试衣模型，推动了这一领域的研究进展。'}}}, {'id': 'https://huggingface.co/papers/2604.07394', 'title': 'Flux Attention: Context-Aware Hybrid Attention for Efficient LLMs Inference', 'url': 'https://huggingface.co/papers/2604.07394', 'abstract': 'Abstract Flux Attention dynamically optimizes attention computation in LLMs by routing layers to full or sparse attention based on input context, achieving faster inference with minimal training overhead.  AI-generated summary The quadratic computational complexity of standard attention mechanisms presents a severe scalability bottleneck for LLMs in long-context scenarios. While hybrid attention mechanisms combining Full Attention (FA) and Sparse Attention (SA) offer a potential solution, existing methods typically rely on static allocation ratios that fail to accommodate the variable retrieval demands of different tasks. Furthermore, head-level dynamic sparsity often introduces severe computational load imbalance and synchronization long-tails, which hinder hardware acceleration during autoregressive decoding. To bridge this gap, we introduce Flux Attention, a context-aware framework that dynamically optimizes attention computation at the layer level. By integrating a lightweight Layer Router into frozen pretrained LLMs, the proposed method adaptively routes each layer to FA or SA based on the input context. This layer-wise routing preserves high-fidelity information retrieval while ensuring contiguous memory access, translating theoretical computational reductions into practical wall-clock speedups. As a parameter-efficient approach, our framework requires only 12 hours of training on 8timesA800 GPUs. Extensive experiments across multiple long-context and mathematical reasoning benchmarks demonstrate that Flux Attention achieves a superior trade-off between performance and inference speed compared with baseline models, with speed improvements of up to 2.8times and 2.0times in the prefill and decode stages.', 'score': 7, 'issue_id': 1866, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': 'f138d1895bee77d4', 'authors': ['Quantong Qiu', 'Zhiyi Hong', 'Yi Yang', 'Haitian Wang', 'Kebin Liu', 'Qingqing Dang', 'Juntao Li', 'Min Zhang'], 'affiliations': ['Baidu Inc, China', 'School of Computer Science and Technology, Soochow University'], 'pdf_title_img': 'assets/pdf/title_img/2604.07394.jpg', 'data': {'categories': ['#optimization', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Динамическая маршрутизация внимания для ускорения LLM', 'desc': 'Flux Attention решает проблему квадратичной сложности механизма внимания в LLM, динамически маршрутизируя слои модели между полным вниманием и разреженным вниманием на основе контекста входных данных. Легковесный роутер слоёв интегрируется в замороженные предварительно обученные языковые модели, требуя минимальные затраты на обучение. Подход обеспечивает практическое ускорение благодаря контролю доступа в памяти и избежанию дисбалансов при автокодировании. Экспериментальные результаты показывают ускорение до 2.8 раза на этапе префилла и 2.0 раза на этапе декодирования при сохранении высокого качества на задачах с длинным контекстом.'}, 'en': {'title': 'Dynamic Attention for Faster LLMs', 'desc': 'Flux Attention is a novel framework that enhances the efficiency of attention mechanisms in large language models (LLMs) by dynamically adjusting between full and sparse attention based on the context of the input. This approach addresses the scalability issues caused by the quadratic complexity of traditional attention methods, particularly in scenarios with long contexts. By implementing a lightweight Layer Router, Flux Attention allows each layer to adaptively choose the most suitable attention type, which improves both information retrieval and memory access. The method shows significant speed improvements in inference, achieving up to 2.8 times faster performance while maintaining high accuracy with minimal training requirements.'}, 'zh': {'title': '动态优化注意力计算，提升推理速度', 'desc': 'Flux Attention 是一种动态优化注意力计算的方法，旨在提高大型语言模型（LLMs）的推理速度。它通过根据输入上下文动态选择全注意力（FA）或稀疏注意力（SA），解决了标准注意力机制在长上下文场景中的计算复杂性问题。该方法集成了轻量级的层路由器，能够在保持信息检索精度的同时，优化内存访问。实验结果表明，Flux Attention 在多个基准测试中实现了性能与推理速度的优越平衡，推理速度提高了最多2.8倍。'}}}, {'id': 'https://huggingface.co/papers/2604.08209', 'title': 'OmniJigsaw: Enhancing Omni-Modal Reasoning via Modality-Orchestrated Reordering', 'url': 'https://huggingface.co/papers/2604.08209', 'abstract': "Abstract OmniJigsaw presents a self-supervised framework for video-audio understanding and collaborative reasoning through temporal reordering and cross-modal integration strategies.  AI-generated summary To extend the reinforcement learning post-training paradigm to omni-modal models for concurrently bolstering video-audio understanding and collaborative reasoning, we propose OmniJigsaw, a generic self-supervised framework built upon a temporal reordering proxy task. Centered on the chronological reconstruction of shuffled audio-visual clips, this paradigm strategically orchestrates visual and auditory signals to compel cross-modal integration through three distinct strategies: Joint Modality Integration, Sample-level Modality Selection, and Clip-level Modality Masking. Recognizing that the efficacy of such proxy tasks is fundamentally tied to puzzle quality, we design a two-stage coarse-to-fine data filtering pipeline, which facilitates the efficient adaptation of OmniJigsaw to massive unannotated omni-modal data. Our analysis reveals a ``bi-modal shortcut phenomenon'' in joint modality integration and demonstrates that fine-grained clip-level modality masking mitigates this issue while outperforming sample-level modality selection. Extensive evaluations on 15 benchmarks show substantial gains in video, audio, and collaborative reasoning, validating OmniJigsaw as a scalable paradigm for self-supervised omni-modal learning.", 'score': 5, 'issue_id': 1866, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '9c7f59253f4f6e65', 'authors': ['Yiduo Jia', 'Muzhi Zhu', 'Hao Zhong', 'Mingyu Liu', 'Yuling Xi', 'Hao Chen', 'Bin Qin', 'Yongjie Yang', 'Zhenbo Luo', 'Chunhua Shen'], 'affiliations': ['Xiaomi Inc.', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08209.jpg', 'data': {'categories': ['#data', '#training', '#multimodal', '#video', '#audio'], 'emoji': '🧩', 'ru': {'title': 'Собирая видео-аудио пазл: самоконтролируемое обучение мультимодальных моделей', 'desc': 'OmniJigsaw — это самоконтролируемая структура для обучения видео-аудио моделей через задачу временной переупорядочивания перемешанных клипов. Система использует три стратегии кросс-модальной интеграции: совместную интеграцию модальностей, выбор модальности на уровне образцов и маскирование модальности на уровне клипов. Для повышения качества обучающих данных предложен двухэтапный конвейер фильтрации от грубого к точному анализу. Эксперименты на 15 бенчмарках демонстрируют значительные улучшения в понимании видео, аудио и совместных рассуждениях, подтверждая масштабируемость подхода.'}, 'en': {'title': 'Revolutionizing Video-Audio Understanding with OmniJigsaw', 'desc': 'OmniJigsaw is a self-supervised framework designed to enhance understanding of video and audio data through collaborative reasoning. It employs a temporal reordering task that reconstructs shuffled audio-visual clips, promoting integration between visual and auditory signals. The framework utilizes three strategies: Joint Modality Integration, Sample-level Modality Selection, and Clip-level Modality Masking to improve performance. By implementing a two-stage data filtering process, OmniJigsaw effectively adapts to large unannotated datasets, demonstrating significant improvements across multiple benchmarks in video, audio, and reasoning tasks.'}, 'zh': {'title': 'OmniJigsaw：自监督多模态学习的新范式', 'desc': 'OmniJigsaw 是一个自监督框架，旨在通过时间重排和跨模态整合策略来理解视频和音频。该框架通过重建打乱的视听片段，促进视觉和听觉信号的跨模态整合。我们设计了一个两阶段的粗到细数据过滤管道，以适应大量未标注的多模态数据。实验结果表明，OmniJigsaw 在视频、音频和协作推理方面取得了显著的提升，验证了其作为自监督多模态学习的可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2604.07966', 'title': 'Lighting-grounded Video Generation with Renderer-based Agent Reasoning', 'url': 'https://huggingface.co/papers/2604.07966', 'abstract': 'Abstract LiVER presents a diffusion-based framework for scene-controllable video generation that disentangles 3D scene properties through explicit conditioning and automated user instruction translation.  AI-generated summary Diffusion models have achieved remarkable progress in video generation, but their controllability remains a major limitation. Key scene factors such as layout, lighting, and camera trajectory are often entangled or only weakly modeled, restricting their applicability in domains like filmmaking and virtual production where explicit scene control is essential. We present LiVER, a diffusion-based framework for scene-controllable video generation. To achieve this, we introduce a novel framework that conditions video synthesis on explicit 3D scene properties, supported by a new large-scale dataset with dense annotations of object layout, lighting, and camera parameters. Our method disentangles these properties by rendering control signals from a unified 3D representation. We propose a lightweight conditioning module and a progressive training strategy to integrate these signals into a foundational video diffusion model, ensuring stable convergence and high fidelity. Our framework enables a wide range of applications, including image-to-video and video-to-video synthesis where the underlying 3D scene is fully editable. To further enhance usability, we develop a scene agent that automatically translates high-level user instructions into the required 3D control signals. Experiments show that LiVER achieves state-of-the-art photorealism and temporal consistency while enabling precise, disentangled control over scene factors, setting a new standard for controllable video generation.', 'score': 4, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'e86e6b75c57ca32d', 'authors': ['Ziqi Cai', 'Taoyu Yang', 'Zheng Chang', 'Si Li', 'Han Jiang', 'Shuchen Weng', 'Boxin Shi'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'National Engineering Research Center of Visual Technology, School of Computer Science, Peking University', 'OpenBayes Information Technology Co., Ltd.', 'School of Artificial Intelligence, Beijing University of Posts and Telecommunications', 'State Key Laboratory for Multimedia Information Processing, School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.07966.jpg', 'data': {'categories': ['#agents', '#dataset', '#diffusion', '#3d', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Управляемая генерация видео через явное разделение свойств 3D-сцены', 'desc': 'LiVER представляет фреймворк на основе диффузионных моделей для генерации видео с контролем над сценой, который разделяет свойства 3D-сцены через явное кондиционирование. Авторы создали новый датасет с плотными аннотациями параметров расположения объектов, освещения и траектории камеры, которые интегрируются в базовую видео-диффузионную модель через облегчённый кондиционирующий модуль. Метод использует прогрессивную стратегию обучения для обеспечения стабильной сходимости и высокой верности синтезированных видео. Дополнительно разработан агент-сцены, который автоматически переводит высокоуровневые инструкции пользователя в требуемые 3D-сигналы управления.'}, 'en': {'title': 'LiVER: Mastering Video Generation with Scene Control', 'desc': 'LiVER is a new framework for generating videos that allows users to control specific aspects of a 3D scene, such as layout and lighting. It uses diffusion models, which are advanced techniques in machine learning, to create high-quality videos while maintaining the ability to manipulate scene properties. The framework includes a large dataset with detailed annotations that help the model understand and separate different scene elements. Additionally, it features a scene agent that translates user instructions into the necessary controls, making it easier to create customized video content.'}, 'zh': {'title': 'LiVER：可控视频生成的新标准', 'desc': 'LiVER是一个基于扩散模型的视频生成框架，能够实现场景可控的视频生成。该框架通过明确的3D场景属性条件化视频合成，解决了传统模型在布局、光照和相机轨迹等关键场景因素上的纠缠问题。LiVER引入了一种轻量级的条件模块和渐进式训练策略，确保了模型的稳定收敛和高保真度。实验结果表明，LiVER在照片真实感和时间一致性方面达到了最先进的水平，同时实现了对场景因素的精确控制。'}}}, {'id': 'https://huggingface.co/papers/2604.08516', 'title': 'MolmoWeb: Open Visual Web Agent and Open Data for the Open Web', 'url': 'https://huggingface.co/papers/2604.08516', 'abstract': 'Abstract Open-source web agents leveraging diverse mixed datasets achieve state-of-the-art performance on browser-based tasks while operating without access to HTML or accessibility tree information.  AI-generated summary Web agents--autonomous systems that navigate and execute tasks on the web on behalf of users--have the potential to transform how people interact with the digital world. However, the most capable web agents today rely on proprietary models with undisclosed training data and recipes, limiting scientific understanding, reproducibility, and community-driven progress.   We believe agents for the open web should be built in the open. To this end, we introduce (1) MolmoWebMix, a large and diverse mixture of browser task demonstrations and web-GUI perception data and (2) MolmoWeb, a family of fully open multimodal web agents. Specifically, MolmoWebMix combines over 100K synthetic task trajectories from multiple complementary generation pipelines with 30K+ human demonstrations, atomic web-skill trajectories, and GUI perception data, including referring expression grounding and screenshot question answering. MolmoWeb agents operate as instruction-conditioned visual-language action policies: given a task instruction and a webpage screenshot, they predict the next browser action, requiring no access to HTML, accessibility trees, or specialized APIs.   Available in 4B and 8B size, on browser-use benchmarks like WebVoyager, Online-Mind2Web, and DeepShop, MolmoWeb agents achieve state-of-the-art results outperforming similar scale open-weight-only models such as Fara-7B, UI-Tars-1.5-7B, and Holo1-7B. MolmoWeb-8B also surpasses set-of-marks (SoM) agents built on much larger closed frontier models like GPT-4o. We further demonstrate consistent gains through test-time scaling via parallel rollouts with best-of-N selection, achieving 94.7% and 60.5% pass@4 (compared to 78.2% and 35.3% pass@1) on WebVoyager and Online-Mind2Web respectively. We will release model checkpoints, training data, code, and a unified evaluation harness to enable reproducibility and accelerate open research on web agents.', 'score': 3, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'bb7c6631086851c1', 'authors': ['Tanmay Gupta', 'Piper Wolters', 'Zixian Ma', 'Peter Sushko', 'Rock Yuren Pang', 'Diego Llanes', 'Yue Yang', 'Taira Anderson', 'Boyuan Zheng', 'Zhongzheng Ren', 'Harsh Trivedi', 'Taylor Blanton', 'Caleb Ouellette', 'Winson Han', 'Ali Farhadi', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'UNC-Chapel Hill', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.08516.jpg', 'data': {'categories': ['#benchmark', '#agents', '#synthetic', '#multimodal', '#dataset', '#open_source', '#small_models'], 'emoji': '🕷️', 'ru': {'title': 'Открытые веб-агенты на основе мультимодальных моделей без доступа к исходному коду страниц', 'desc': 'В статье представлена MolmoWeb - семейство открытых мультимодальных веб-агентов, которые выполняют задачи в браузере, используя только скриншоты и инструкции без доступа к HTML или дереву доступности. Авторы собрали MolmoWebMix - большой датасет из более чем 100 тысяч синтетических траекторий и 30 тысяч человеческих демонстраций, покрывающий различные веб-задачи и навыки взаимодействия с интерфейсом. Модели размером 4B и 8B параметров обучены действовать как визуально-языковые политики, предсказывая следующее действие в браузере на основе текстовой инструкции и скриншота. MolmoWeb достигает лучших результатов среди открытых моделей сопоставимого размера и даже превосходит закрытые агенты на основе GPT-4o на бенчмарках WebVoyager и Online-Mind2Web.'}, 'en': {'title': 'Empowering Open-Source Web Agents for the Future', 'desc': 'This paper presents MolmoWeb, a family of open-source web agents designed to perform browser-based tasks without relying on HTML or accessibility tree data. The agents are trained using a diverse dataset called MolmoWebMix, which includes over 100,000 synthetic task demonstrations and 30,000 human-generated examples. By employing instruction-conditioned visual-language action policies, these agents can predict browser actions based on task instructions and webpage screenshots. The results show that MolmoWeb agents achieve state-of-the-art performance on various benchmarks, promoting transparency and collaboration in the development of web agents.'}, 'zh': {'title': '开放网络代理的未来', 'desc': '本论文介绍了一种名为MolmoWeb的开放式多模态网络代理系统，旨在通过开放的数据和模型促进科学研究和社区进步。MolmoWebMix是一个包含超过10万条合成任务轨迹和3万条人类演示的数据集，支持代理在没有HTML或可访问树信息的情况下执行浏览器任务。该系统通过指令条件的视觉语言行动策略，根据任务指令和网页截图预测下一步的浏览器操作。MolmoWeb在多个基准测试中表现出色，超越了现有的闭源模型，推动了开放网络代理的研究。'}}}, {'id': 'https://huggingface.co/papers/2604.08124', 'title': 'Beyond Stochastic Exploration: What Makes Training Data Valuable for Agentic Search', 'url': 'https://huggingface.co/papers/2604.08124', 'abstract': 'Abstract A novel hierarchical experience framework improves reinforcement learning-based search agents by transforming raw reasoning trajectories into structured knowledge, enhancing both performance and training stability in complex reasoning tasks.  AI-generated summary Reinforcement learning (RL) has become an effective approach for advancing the reasoning capabilities of large language models (LLMs) through the strategic integration of external search engines. However, current RL-based search agents often rely on a process of stochastic exploration guided by carefully crafted outcome rewards, leading to inefficient reasoning trajectories and unstable training. To address these issues, we propose a novel framework, Hierarchical Experience (HiExp), to enhance the performance and training stability of search agents. Specifically, we extract empirical knowledge through contrastive analysis and a multi-level clustering mechanism, transforming raw reasoning trajectories into hierarchical experience knowledge. By leveraging experience-aligned training, we effectively regularize stochastic exploration, evolving it into a strategic and experience-driven search process. Extensive evaluations on multiple complex agentic search and mathematical reasoning benchmarks demonstrate that our approach not only achieves substantial performance gains but also exhibits strong cross-task and cross-algorithm generalization.', 'score': 2, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '76d52da400a75f55', 'authors': ['Chuzhan Hao', 'Wenfeng Feng', 'Guochao Jiang', 'Guofeng Quan', 'Guohua Liu', 'Yuewei Zhang'], 'affiliations': ['Alibaba Cloud Computing'], 'pdf_title_img': 'assets/pdf/title_img/2604.08124.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark', '#optimization', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'От хаоса поиска к структурированному опыту', 'desc': 'В работе предлагается фреймворк HiExp для улучшения агентов поиска, обучаемых методами обучения с подкреплением. Авторы преобразуют сырые траектории рассуждений в структурированное иерархическое знание через контрастный анализ и многоуровневую кластеризацию. Подход позволяет регуляризировать стохастическую поисковую стратегию и повышает стабильность обучения путём использования накопленного опыта. Экспериментальные результаты показывают значительный прирост производительности и хорошую обобщаемость между различными задачами и алгоритмами.'}, 'en': {'title': 'Transforming Reasoning with Hierarchical Experience in RL', 'desc': 'This paper introduces a new framework called Hierarchical Experience (HiExp) to improve reinforcement learning (RL) agents that perform complex reasoning tasks. The framework transforms raw reasoning paths into structured knowledge, which helps stabilize training and enhance performance. By using contrastive analysis and multi-level clustering, HiExp organizes experiences to guide the search process more effectively. The results show that this approach leads to better performance across various reasoning benchmarks and improves generalization across different tasks and algorithms.'}, 'zh': {'title': '层次经验框架提升强化学习搜索代理的性能', 'desc': '本文提出了一种新颖的层次经验框架（HiExp），旨在提升基于强化学习的搜索代理的性能和训练稳定性。通过对原始推理轨迹进行对比分析和多层次聚类机制，提取经验知识，将其转化为层次化的经验知识。该框架通过经验对齐训练，有效地规范随机探索，使其演变为一种战略性和经验驱动的搜索过程。实验结果表明，该方法在多个复杂的搜索和数学推理基准上取得了显著的性能提升，并展现出强大的跨任务和跨算法的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.08172', 'title': 'On the Global Photometric Alignment for Low-Level Vision', 'url': 'https://huggingface.co/papers/2604.08172', 'abstract': 'Abstract Photometric alignment loss addresses optimization pathologies in low-level vision by discounting photometric discrepancies through affine color alignment while preserving content restoration.  AI-generated summary Supervised low-level vision models rely on pixel-wise losses against paired references, yet paired training sets exhibit per-pair photometric inconsistency, say, different image pairs demand different global brightness, color, or white-balance mappings. This inconsistency enters through task-intrinsic photometric transfer (e.g., low-light enhancement) or unintended acquisition shifts (e.g., de-raining), and in either case causes an optimization pathology. Standard reconstruction losses allocate disproportionate gradient budget to conflicting per-pair photometric targets, crowding out content restoration. In this paper, we investigate this issue and prove that, under least-squares decomposition, the photometric and structural components of the prediction-target residual are orthogonal, and that the spatially dense photometric component dominates the gradient energy. Motivated by this analysis, we propose Photometric Alignment Loss (PAL). This flexible supervision objective discounts nuisance photometric discrepancy via closed-form affine color alignment while preserving restoration-relevant supervision, requiring only covariance statistics and tiny matrix inversion with negligible overhead. Across 6 tasks, 16 datasets, and 16 architectures, PAL consistently improves metrics and generalization. The implementation is in the appendix.', 'score': 1, 'issue_id': 1869, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '837432bf0dcc2657', 'authors': ['Mingjia Li', 'Tianle Du', 'Hainuo Wang', 'Qiming Hu', 'Xiaojie Guo'], 'affiliations': ['Tianjin University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08172.jpg', 'data': {'categories': ['#training', '#cv', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Выравнивание фотометрии для восстановления структуры изображений', 'desc': 'В статье предложена новая функция потерь для низкоуровневого компьютерного зрения, которая решает проблему фотометрической несогласованности в парных тренировочных наборах данных. Авторы доказывают, что фотометрическая компонента остатков предсказания и целевого изображения ортогональна структурной компоненте и доминирует в градиентной энергии. Предложенная функция потерь Photometric Alignment Loss выравнивает цвета через аффинное преобразование, подавляя фотометрические артефакты и позволяя модели сосредоточиться на восстановлении содержимого. Метод демонстрирует последовательные улучшения качества и обобщаемости на 6 различных задачах, 16 датасетах и 16 архитектурах нейросетей.'}, 'en': {'title': 'Aligning Colors for Better Vision Models', 'desc': 'This paper introduces Photometric Alignment Loss (PAL) to tackle optimization issues in low-level vision tasks caused by photometric inconsistencies in paired training datasets. These inconsistencies arise from variations in brightness, color, and white balance across different image pairs, which can hinder effective learning. The authors demonstrate that traditional reconstruction losses can misallocate gradients, focusing too much on conflicting photometric targets instead of content restoration. PAL addresses this by using affine color alignment to minimize photometric discrepancies while maintaining effective supervision for content restoration, leading to improved performance across various tasks and architectures.'}, 'zh': {'title': '光度对齐损失：提升低级视觉模型的关键', 'desc': '本文提出了一种光度对齐损失（Photometric Alignment Loss，PAL），旨在解决低级视觉中的优化病态问题。传统的监督学习模型在处理成对图像时，常常面临光度不一致的问题，这会影响内容恢复的效果。通过对光度差异进行仿射颜色对齐，PAL能够有效减少这些干扰，同时保持对内容恢复的监督。实验结果表明，PAL在多个任务和数据集上均能显著提高模型的性能和泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.07776', 'title': 'Structured Distillation of Web Agent Capabilities Enables Generalization', 'url': 'https://huggingface.co/papers/2604.07776', 'abstract': 'Abstract Structured synthetic trajectory generation using a frontier LLM as teacher enables open-weight web agents with superior performance and cross-environment capabilities.  AI-generated summary Frontier LLMs can navigate complex websites, but their cost and reliance on third-party APIs make local deployment impractical. We introduce Agent-as-Annotators, a framework that structures synthetic trajectory generation for web agents by analogy to human annotation roles, replacing the Task Designer, Annotator, and Supervisor with modular LLM components. Using Gemini 3 Pro as teacher, we generate 3,000 trajectories across six web environments and fine-tune a 9B-parameter student with pure supervised learning on the 2,322 that pass quality filtering. The resulting model achieves 41.5% on WebArena, surpassing closed-source models such as Claude 3.5 Sonnet (36.0%) and GPT-4o (31.5%) under the same evaluation protocol, and nearly doubling the previous best open-weight result (Go-Browse, 21.7%). Capabilities transfer to unseen environments, with an 18.2 percentage point gain on WorkArena L1 (an enterprise platform never seen during training) and consistent improvements across three additional benchmarks. Ablations confirm that each pipeline component contributes meaningfully, with Judge filtering, evaluation hints, and reasoning traces each accounting for measurable gains. These results demonstrate that structured trajectory synthesis from a single frontier teacher is sufficient to produce competitive, locally deployable web agents. Project page: https://agent-as-annotators.github.io', 'score': 1, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'b1e34ab256b22615', 'authors': ['Xing Han Lù', 'Siva Reddy'], 'affiliations': ['Mila Quebec AI Institute McGill University'], 'pdf_title_img': 'assets/pdf/title_img/2604.07776.jpg', 'data': {'categories': ['#benchmark', '#agents', '#synthetic', '#transfer_learning', '#dataset', '#open_source', '#training'], 'emoji': '🤖', 'ru': {'title': 'Обучение компактных веб-агентов через структурированный синтез траекторий от фронтирной модели', 'desc': 'Авторы предлагают фреймворк Agent-as-Annotators для создания синтетических траекторий обучения веб-агентов, используя фронтирный LLM (Gemini 3 Pro) в качестве учителя. Модель-студент с 9 миллиардами параметров обучается методом supervised learning на отфильтрованных синтетических данных и достигает 41.5% на бенчмарке WebArena, превосходя проприетарные модели Claude и GPT-4o. Фреймворк структурирует процесс генерации данных по аналогии с ролями аннотаторов: Task Designer, Annotator и Supervisor, заменяя их модульными LLM компонентами. Полученный агент демонстрирует высокую обобщаемость, показывая значительные улучшения на незнакомых средах и пригоден для локального развертывания.'}, 'en': {'title': 'Empowering Web Agents with Structured Trajectory Generation', 'desc': 'This paper presents a new framework called Agent-as-Annotators, which uses a large language model (LLM) to generate synthetic trajectories for web agents. By mimicking human roles in annotation, the framework replaces traditional components with modular LLM parts, allowing for efficient trajectory generation. The authors demonstrate that their approach, using the Gemini 3 Pro model, significantly improves the performance of web agents, achieving higher scores than existing closed-source models. Additionally, the model shows strong transfer capabilities to new environments, indicating its robustness and effectiveness in various web contexts.'}, 'zh': {'title': '结构化合成轨迹生成，提升网络代理性能', 'desc': '本论文介绍了一种新的框架，称为Agent-as-Annotators，用于生成结构化的合成轨迹，以提高网络代理的性能。通过使用前沿的大型语言模型（LLM）作为教师，研究者们能够在六个不同的网络环境中生成3000条轨迹，并对通过质量筛选的2322条轨迹进行微调。最终模型在WebArena上的表现达到了41.5%，超越了其他闭源模型，并在未见过的环境中也展现出良好的迁移能力。研究结果表明，单一前沿教师的结构化轨迹合成足以生成具有竞争力的本地可部署网络代理。'}}}, {'id': 'https://huggingface.co/papers/2604.07429', 'title': 'GameWorld: Towards Standardized and Verifiable Evaluation of Multimodal Game Agents', 'url': 'https://huggingface.co/papers/2604.07429', 'abstract': 'Abstract GameWorld presents a standardized benchmark for evaluating multimodal large language model agents in video games, featuring diverse games and verified metrics for comprehensive assessment.  AI-generated summary Towards an embodied generalist for real-world interaction, Multimodal Large Language Model (MLLM) agents still suffer from challenging latency, sparse feedback, and irreversible mistakes. Video games offer an ideal testbed with rich visual observations and closed-loop interaction, demanding fine-grained perception, long-horizon planning, and precise control. However, systematically evaluating these capabilities is currently hindered by heterogeneous action interfaces and heuristic verification. To this end, we introduce GameWorld, a benchmark designed for standardized and verifiable evaluation of MLLMs as generalist game agents in browser environments. Two game agent interfaces are studied: (i) computer-use agents that directly emit keyboard and mouse controls, and (ii) generalist multimodal agents that act in a semantic action space via deterministic Semantic Action Parsing. GameWorld contains 34 diverse games and 170 tasks, each paired with state-verifiable metrics for outcome-based evaluation. The results across 18 model-interface pairs suggest that even the best performing agent is far from achieving human capabilities on video games. Extensive experiments of repeated full-benchmark reruns demonstrate the robustness of the benchmark, while further studies on real-time interaction, context-memory sensitivity, and action validity expose more challenges ahead for game agents. Together, by offering a standardized, verifiable, and reproducible evaluation framework, GameWorld lays a robust foundation for advancing research on multimodal game agents and beyond. The project page is at https://gameworld-bench.github.io.', 'score': 1, 'issue_id': 1867, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '9db2a99abc857e30', 'authors': ['Mingyu Ouyang', 'Siyuan Hu', 'Kevin Qinghong Lin', 'Hwee Tou Ng', 'Mike Zheng Shou'], 'affiliations': ['National University of Singapore', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2604.07429.jpg', 'data': {'categories': ['#benchmark', '#agents', '#multimodal', '#video'], 'emoji': '🎮', 'ru': {'title': 'Стандартизированная оценка мультимодальных агентов в видеоиграх', 'desc': 'В работе представлен GameWorld — бенчмарк для оценки мультимодальных большых языковых моделей (MLLM) в роли агентов в видеоиграх. Бенчмарк содержит 34 различные игры и 170 задач с проверяемыми метриками для объективной оценки результатов. Исследуются два подхода: агенты, которые напрямую генерируют команды клавиатуры и мыши, и мультимодальные агенты, действующие в семантическом пространстве действий. Результаты показывают, что даже лучшие модели значительно отстают от человеческих возможностей, что указывает на необходимость дальнейшего развития методов обучения агентов долгосрочному планированию и точному управлению в сложных интерактивных средах.'}, 'en': {'title': 'GameWorld: A New Benchmark for Evaluating Game AI Agents', 'desc': 'GameWorld is a benchmark designed to evaluate multimodal large language model (MLLM) agents in video games, addressing issues like latency and feedback. It features 34 diverse games and 170 tasks, providing standardized metrics for assessing agent performance. The benchmark includes two types of game interfaces: one for direct keyboard and mouse control, and another for semantic action parsing. Despite the extensive evaluation, results show that current agents still fall short of human-level performance, highlighting the need for further research in real-time interaction and action validity.'}, 'zh': {'title': 'GameWorld：多模态游戏代理的标准化评估基准', 'desc': 'GameWorld是一个标准化的基准，用于评估多模态大型语言模型（MLLM）在视频游戏中的表现。该基准包含34款多样化的游戏和170个任务，配备可验证的评估指标，以全面评估游戏代理的能力。尽管进行了广泛的实验，结果显示即使是表现最好的代理也远未达到人类在视频游戏中的能力。GameWorld为多模态游戏代理的研究提供了一个稳固的基础，推动了相关领域的进步。'}}}, {'id': 'https://huggingface.co/papers/2604.08064', 'title': 'ImplicitMemBench: Measuring Unconscious Behavioral Adaptation in Large Language Models', 'url': 'https://huggingface.co/papers/2604.08064', 'abstract': 'Abstract ImplicitMemBench presents a novel benchmark for evaluating implicit memory in LLM agents through procedural memory, priming, and classical conditioning constructs, revealing significant performance gaps compared to human baselines.  AI-generated summary Existing memory benchmarks for LLM agents evaluate explicit recall of facts, yet overlook implicit memory where experience becomes automated behavior without conscious retrieval. This gap is critical: effective assistants must automatically apply learned procedures or avoid failed actions without explicit reminders. We introduce ImplicitMemBench, the first systematic benchmark evaluating implicit memory through three cognitively grounded constructs drawn from standard cognitive-science accounts of non-declarative memory: Procedural Memory (one-shot skill acquisition after interference), Priming (theme-driven bias via paired experimental/control instances), and Classical Conditioning (Conditioned Stimulus--Unconditioned Stimulus (CS--US) associations shaping first decisions). Our 300-item suite employs a unified Learning/Priming-Interfere-Test protocol with first-attempt scoring. Evaluation of 17 models reveals severe limitations: no model exceeds 66% overall, with top performers DeepSeek-R1 (65.3%), Qwen3-32B (64.1%), and GPT-5 (63.0%) far below human baselines. Analysis uncovers dramatic asymmetries (inhibition 17.6% vs. preference 75.0%) and universal bottlenecks requiring architectural innovations beyond parameter scaling. ImplicitMemBench reframes evaluation from "what agents recall" to "what they automatically enact".', 'score': 0, 'issue_id': 1869, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'db3db2d091ccefbf', 'authors': ['Chonghan Qin', 'Xiachong Feng', 'Weitao Ma', 'Xiaocheng Feng', 'Lingpeng Kong'], 'affiliations': ['Harbin Institute of Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.08064.jpg', 'data': {'categories': ['#benchmark', '#survey', '#architecture', '#reasoning', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Автоматическое применение опыта: оценка имплицитной памяти в LLM-агентах', 'desc': 'В статье представлен ImplicitMemBench — первый систематический бенчмарк для оценки имплицитной памяти в LLM-агентах, основанный на когнитивно-обоснованных конструктах: процедурной памяти, прайминге и классическом кондиционировании. Исследование показало, что существующие бенчмарки оценивают только явное припоминание фактов, упуская важный аспект — автоматизированное поведение, которое агент применяет без осознанного восприятия. Тестирование 17 современных моделей выявило серьёзные ограничения: ни одна модель не превысила 66% точности, а лучшие результаты (DeepSeek-R1, Qwen3-32B, GPT-5) значительно отстают от человеческого уровня. Анализ обнаружил критические асимметрии в способностях и универсальные узкие места, требующие архитектурных инноваций, выходящих за рамки увеличения параметров модели.'}, 'en': {'title': 'Revolutionizing Memory Evaluation in AI: From Recall to Automatic Action', 'desc': 'ImplicitMemBench introduces a new way to test how well large language models (LLMs) remember and use information without actively recalling it, focusing on implicit memory. This benchmark assesses three key areas: procedural memory, which is about learning skills; priming, which involves biases from previous experiences; and classical conditioning, where associations influence decisions. The study found that current LLMs perform significantly worse than humans, with none achieving over 66% accuracy in these tasks. The results highlight the need for new model designs that go beyond simply increasing parameters to improve automatic behavior in AI.'}, 'zh': {'title': '隐性记忆评估的新标准', 'desc': 'ImplicitMemBench 是一个新颖的基准测试，用于评估大型语言模型（LLM）代理的隐性记忆。它通过程序性记忆、启动和经典条件反射等认知构造，揭示了与人类基准相比的显著性能差距。现有的记忆基准主要评估显性回忆，而忽视了隐性记忆的重要性，这对于有效的助手至关重要。我们的研究表明，当前模型在隐性记忆的表现上存在严重限制，最高模型的得分远低于人类水平，显示出需要在架构上进行创新。'}}}, {'id': 'https://huggingface.co/papers/2604.08536', 'title': 'RewardFlow: Generate Images by Optimizing What You Reward', 'url': 'https://huggingface.co/papers/2604.08536', 'abstract': 'Abstract RewardFlow enables pretrained diffusion and flow-matching models to be guided during inference through multi-reward Langevin dynamics without requiring inversion, achieving superior performance in image editing and compositional generation.  AI-generated summary We introduce RewardFlow, an inversion-free framework that steers pretrained diffusion and flow-matching models at inference time through multi-reward Langevin dynamics. RewardFlow unifies complementary differentiable rewards for semantic alignment, perceptual fidelity, localized grounding, object consistency, and human preference, and further introduces a differentiable VQA-based reward that provides fine-grained semantic supervision through language-vision reasoning. To coordinate these heterogeneous objectives, we design a prompt-aware adaptive policy that extracts semantic primitives from the instruction, infers edit intent, and dynamically modulates reward weights and step sizes throughout sampling. Across several image editing and compositional generation benchmarks, RewardFlow delivers state-of-the-art edit fidelity and compositional alignment.', 'score': 0, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '29fcfa9c4df8de84', 'authors': ['Onkar Susladkar', 'Dong-Hwan Jang', 'Tushar Prakash', 'Adheesh Juvekar', 'Vedant Shah', 'Ayush Barik', 'Nabeel Bashir', 'Muntasir Wahed', 'Ritish Shrirao', 'Ismini Lourentzou'], 'affiliations': ['Sony Research, India', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2604.08536.jpg', 'data': {'categories': ['#benchmark', '#inference', '#multimodal', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Направляемая генерация без инверсии: многоцелевая оптимизация для редактирования изображений', 'desc': 'RewardFlow — это новый метод, который направляет предобученные диффузионные модели и модели flow-matching во время инференса, используя многоцелевую динамику Ланжевена без необходимости инверсии моделей. Фреймворк объединяет несколько дифференцируемых функций вознаграждения для семантического соответствия, перцептуальной верности и консистентности объектов, включая инновационное вознаграждение на основе VQA для детального семантического контроля. Адаптивная политика, осведомленная о промптах, динамически модулирует веса вознаграждений и размеры шагов на протяжении процесса генерации. Метод достигает наилучших результатов на задачах редактирования изображений и композиционной генерации.'}, 'en': {'title': 'Guiding Image Generation with RewardFlow', 'desc': 'RewardFlow is a novel framework that enhances pretrained diffusion and flow-matching models during inference without needing inversion. It utilizes multi-reward Langevin dynamics to guide the generation process, improving the quality of image editing and compositional tasks. The framework integrates various differentiable rewards that focus on aspects like semantic alignment and perceptual fidelity, along with a new VQA-based reward for detailed semantic guidance. By employing a prompt-aware adaptive policy, RewardFlow effectively adjusts reward weights and sampling strategies based on user instructions, leading to superior performance in generating high-fidelity images.'}, 'zh': {'title': '无反演的奖励引导图像生成', 'desc': 'RewardFlow 是一个无反演的框架，能够在推理时通过多重奖励的朗之万动力学引导预训练的扩散和流匹配模型。它统一了多种可微分的奖励机制，以实现语义对齐、感知保真度、局部定位、对象一致性和人类偏好。该框架还引入了一种基于视觉问答的可微分奖励，提供细粒度的语义监督，结合语言和视觉推理。通过设计一个提示感知的自适应策略，RewardFlow 能够提取语义原语，推断编辑意图，并在采样过程中动态调整奖励权重和步长。'}}}, {'id': 'https://huggingface.co/papers/2604.08503', 'title': 'Phantom: Physics-Infused Video Generation via Joint Modeling of Visual and Latent Physical Dynamics', 'url': 'https://huggingface.co/papers/2604.08503', 'abstract': 'Abstract Phantom is a physics-infused video generation model that jointly models visual content and latent physical dynamics to produce videos that are both visually realistic and physically consistent.  AI-generated summary Recent advances in generative video modeling, driven by large-scale datasets and powerful architectures, have yielded remarkable visual realism. However, emerging evidence suggests that simply scaling data and model size does not endow these systems with an understanding of the underlying physical laws that govern real-world dynamics. Existing approaches often fail to capture or enforce such physical consistency, resulting in unrealistic motion and dynamics. In his work, we investigate whether integrating the inference of latent physical properties directly into the video generation process can equip models with the ability to produce physically plausible videos. To this end, we propose Phantom, a Physics-Infused Video Generation model that jointly models the visual content and latent physical dynamics. Conditioned on observed video frames and inferred physical states, Phantom jointly predicts latent physical dynamics and generates future video frames. Phantom leverages a physics-aware video representation that serves as an abstract yet informaive embedding of the underlying physics, facilitating the joint prediction of physical dynamics alongside video content without requiring an explicit specification of a complex set of physical dynamics and properties. By integrating the inference of physical-aware video representation directly into the video generation process, Phantom produces video sequences that are both visually realistic and physically consistent. Quantitative and qualitative results on both standard video generation and physics-aware benchmarks demonstrate that Phantom not only outperforms existing methods in terms of adherence to physical dynamics but also delivers competitive perceptual fidelity.', 'score': 0, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '77c0bcf66a46873b', 'authors': ['Ying Shen', 'Jerry Xiong', 'Tianjiao Yu', 'Ismini Lourentzou'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2604.08503.jpg', 'data': {'categories': ['#benchmark', '#science', '#video'], 'emoji': '🎬', 'ru': {'title': 'Физика в генерации видео: реалистичность через законы природы', 'desc': 'Phantom — это модель генерации видео, которая интегрирует физические законы в процесс генерации, совместно моделируя визуальное содержание и скрытую динамику. Модель использует специальное физически-осознанное представление видео, которое служит абстрактным встраиванием физических свойств сцены. Благодаря совместному предсказанию физической динамики и пиксельного содержания, Phantom генерирует видеопоследовательности, которые одновременно визуально реалистичны и физически консистентны. Экспериментальные результаты показывают, что модель превосходит существующие методы по соблюдению физических законов, сохраняя конкурентное качество визуального восприятия.'}, 'en': {'title': 'Phantom: Bridging Visual Realism and Physical Consistency in Video Generation', 'desc': 'Phantom is a novel video generation model that combines visual content creation with an understanding of physical dynamics. It addresses the limitations of existing models that often produce unrealistic motion by integrating latent physical properties into the video generation process. By using a physics-aware video representation, Phantom can predict future video frames while ensuring that the generated content adheres to the laws of physics. This approach results in videos that are not only visually appealing but also maintain physical consistency, outperforming traditional methods in both realism and adherence to physical dynamics.'}, 'zh': {'title': '融合物理知识的视频生成模型', 'desc': 'Phantom是一种融合物理知识的视频生成模型，它同时建模视觉内容和潜在的物理动态，以生成既真实又符合物理规律的视频。该模型通过观察到的视频帧和推断的物理状态，联合预测潜在的物理动态并生成未来的视频帧。Phantom利用一种物理感知的视频表示，作为底层物理的抽象且信息丰富的嵌入，促进了物理动态与视频内容的联合预测。实验结果表明，Phantom在遵循物理动态方面优于现有方法，同时在视觉真实感上也表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2604.08340', 'title': 'PokeGym: A Visually-Driven Long-Horizon Benchmark for Vision-Language Models', 'url': 'https://huggingface.co/papers/2604.08340', 'abstract': 'Abstract Vision-Language Models face limitations in 3D embodied environments due to insufficient physical reasoning capabilities, as demonstrated by the PokeGym benchmark that reveals deadlock recovery as the primary bottleneck in visual grounding and semantic reasoning tasks.  AI-generated summary While Vision-Language Models (VLMs) have achieved remarkable progress in static visual understanding, their deployment in complex 3D embodied environments remains severely limited. Existing benchmarks suffer from four critical deficiencies: (1) passive perception tasks circumvent interactive dynamics; (2) simplified 2D environments fail to assess depth perception; (3) privileged state leakage bypasses genuine visual processing; and (4) human evaluation is prohibitively expensive and unscalable. We introduce PokeGym, a visually-driven long-horizon benchmark instantiated within Pokemon Legends: Z-A, a visually complex 3D open-world Role-Playing Game. PokeGym enforces strict code-level isolation: agents operate solely on raw RGB observations while an independent evaluator verifies success via memory scanning, ensuring pure vision-based decision-making and automated, scalable assessment. The benchmark comprises 30 tasks (30-220 steps) spanning navigation, interaction, and mixed scenarios, with three instruction granularities (Visual-Guided, Step-Guided, Goal-Only) to systematically deconstruct visual grounding, semantic reasoning, and autonomous exploration capabilities. Our evaluation reveals a key limitation of current VLMs: physical deadlock recovery, rather than high-level planning, constitutes the primary bottleneck, with deadlocks showing a strong negative correlation with task success. Furthermore, we uncover a metacognitive divergence: weaker models predominantly suffer from Unaware Deadlocks (oblivious to entrapment), whereas advanced models exhibit Aware Deadlocks (recognizing entrapment yet failing to recover). These findings highlight the need to integrate explicit spatial intuition into VLM architectures. The code and benchmark will be available on GitHub.', 'score': 0, 'issue_id': 1867, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '9385ffad41db3ba0', 'authors': ['Ruizhi Zhang', 'Ye Huang', 'Yuangang Pan', 'Chuanfu Shen', 'Zhilin Liu', 'Ting Xie', 'Wen Li', 'Lixin Duan'], 'affiliations': ['CFAR/IHPC A*STAR Singapore', 'SIAS, UESTC Shenzhen, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.08340.jpg', 'data': {'categories': ['#benchmark', '#agents', '#cv', '#multimodal', '#open_source', '#3d', '#interpretability', '#games', '#reasoning'], 'emoji': '🎮', 'ru': {'title': 'Когда большие модели зацикливаются: почему физическое понимание важнее планирования', 'desc': 'Представлена PokeGym — новый бенчмарк для оценки Vision-Language Models в сложных трёхмерных окружениях на базе видеоигры Pokemon Legends: Z-A. Исследование выявило, что основным ограничением современных VLM является неспособность восстанавливаться из физических deadlock ситуаций, а не низкое качество высокоуровневого планирования. Бенчмарк включает 30 задач с различными уровнями детализации инструкций и обеспечивает полную изоляцию кода, гарантируя что агенты используют только необработанные RGB наблюдения. Исследование обнаружило метакогнитивное расхождение: слабые модели не осознают застревание, в то время как продвинутые модели его распознают, но не могут выйти из ловушки.'}, 'en': {'title': 'Enhancing Vision-Language Models with Spatial Reasoning', 'desc': 'This paper discusses the limitations of Vision-Language Models (VLMs) in 3D environments, particularly their struggles with physical reasoning. The authors introduce PokeGym, a new benchmark designed to evaluate VLMs in a complex 3D game setting, focusing on tasks that require visual grounding and semantic reasoning. They identify that the main challenge for these models is recovering from physical deadlocks, which significantly impacts their performance. The study emphasizes the importance of enhancing VLMs with better spatial reasoning capabilities to improve their effectiveness in interactive scenarios.'}, 'zh': {'title': '突破3D环境中的视觉语言模型瓶颈', 'desc': '本论文探讨了视觉语言模型（VLMs）在复杂的3D环境中的局限性，特别是在物理推理能力方面。通过PokeGym基准测试，研究发现物理死锁恢复是视觉定位和语义推理任务的主要瓶颈。现有的基准测试存在四个关键缺陷，包括缺乏互动动态和简化的2D环境等。我们提出的PokeGym基准通过严格的代码隔离，确保模型仅依赖原始RGB观察进行决策，从而推动VLMs在3D环境中的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.07427', 'title': 'Personalizing Text-to-Image Generation to Individual Taste', 'url': 'https://huggingface.co/papers/2604.07427', 'abstract': 'Abstract A novel dataset and predictive framework called PAMELA are introduced to model personalized image evaluations by leveraging user-specific ratings across diverse image domains, enabling more accurate prediction of individual aesthetic preferences compared to traditional reward models.  AI-generated summary Modern text-to-image (T2I) models generate high-fidelity visuals but remain indifferent to individual user preferences. While existing reward models optimize for "average" human appeal, they fail to capture the inherent subjectivity of aesthetic judgment. In this work, we introduce a novel dataset and predictive framework, called PAMELA, designed to model personalized image evaluations. Our dataset comprises 70,000 ratings across 5,000 diverse images generated by state-of-the-art models (Flux 2 and Nano Banana). Each image is evaluated by 15 unique users, providing a rich distribution of subjective preferences across domains such as art, design, fashion, and cinematic photography. Leveraging this data, we propose a personalized reward model trained jointly on our high-quality annotations and existing aesthetic assessment subsets. We demonstrate that our model predicts individual liking with higher accuracy than the majority of current state-of-the-art methods predict population-level preferences. Using our personalized predictor, we demonstrate how simple prompt optimization methods can be used to steer generations towards individual user preferences. Our results highlight the importance of data quality and personalization to handle the subjectivity of user preferences. We release our dataset and model to facilitate standardized research in personalized T2I alignment and subjective visual quality assessment.', 'score': 0, 'issue_id': 1869, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': 'eff358384e586361', 'authors': ['Anne-Sofie Maerten', 'Juliane Verwiebe', 'Shyamgopal Karthik', 'Ameya Prabhu', 'Johan Wagemans', 'Matthias Bethge'], 'affiliations': ['Department of Brain and Cognition, KU Leuven', 'Tübingen AI Center, University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2604.07427.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Персонализированные награды для субъективной оценки изображений', 'desc': 'В работе представлен датасет PAMELA и предсказательная модель для оценки персонализированных предпочтений пользователей к изображениям. Датасет содержит 70 тысяч оценок 5 тысяч разнообразных изображений, полученные от 15 уникальных пользователей для каждого изображения. Авторы предлагают персонализированную reward модель, которая обучается на высокачественных аннотациях и предсказывает индивидуальные эстетические предпочтения точнее, чем существующие методы предсказывают средние предпочтения населения. Модель позволяет улучшить генерацию текст-в-изображение через оптимизацию промптов под конкретного пользователя, подчеркивая важность качества данных и персонализации для работы с субъективностью пользовательских предпочтений.'}, 'en': {'title': 'Personalized Aesthetic Predictions with PAMELA', 'desc': 'The paper introduces PAMELA, a new dataset and predictive framework aimed at improving personalized image evaluations. It addresses the limitations of traditional reward models that focus on average human appeal, which often overlook individual aesthetic preferences. PAMELA includes 70,000 ratings from 15 users across 5,000 diverse images, allowing for a better understanding of subjective preferences in various domains. The proposed personalized reward model outperforms existing methods in predicting individual likes, emphasizing the significance of data quality and personalization in machine learning applications for image generation.'}, 'zh': {'title': '个性化图像评估的新框架PAMELA', 'desc': '本文介绍了一种新的数据集和预测框架，称为PAMELA，旨在通过利用用户特定的评分来建模个性化的图像评估。该数据集包含70,000个评分，涵盖5,000幅由先进模型生成的多样化图像，每幅图像由15位独特用户评估，反映了艺术、设计、时尚和电影摄影等领域的主观偏好。我们提出的个性化奖励模型在高质量注释和现有美学评估子集上联合训练，能够比现有大多数方法更准确地预测个体的喜好。我们的研究强调了数据质量和个性化在处理用户偏好主观性方面的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.06938', 'title': 'POS-ISP: Pipeline Optimization at the Sequence Level for Task-aware ISP', 'url': 'https://huggingface.co/papers/2604.06938', 'abstract': 'Abstract POS-ISP presents a sequence-level reinforcement learning framework for optimizing image signal processing pipelines by predicting complete module sequences and parameters in a single forward pass, improving task performance while reducing computational costs.  AI-generated summary Recent work has explored optimizing image signal processing (ISP) pipelines for various tasks by composing predefined modules and adapting them to task-specific objectives. However, jointly optimizing module sequences and parameters remains challenging. Existing approaches rely on neural architecture search (NAS) or step-wise reinforcement learning (RL), but NAS suffers from a training-inference mismatch, while step-wise RL leads to unstable training and high computational overhead due to stage-wise decision-making. We propose POS-ISP, a sequence-level RL framework that formulates modular ISP optimization as a global sequence prediction problem. Our method predicts the entire module sequence and its parameters in a single forward pass and optimizes the pipeline using a terminal task reward, eliminating the need for intermediate supervision and redundant executions. Experiments across multiple downstream tasks show that POS-ISP improves task performance while reducing computational cost, highlighting sequence-level optimization as a stable and efficient paradigm for task-aware ISP. The project page is available at https://w1jyun.github.io/POS-ISP', 'score': 0, 'issue_id': 1869, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': 'f29bee9d052c3e3f', 'authors': ['Jiyun Won', 'Heemin Yang', 'Woohyeok Kim', 'Jungseul Ok', 'Sunghyun Cho'], 'affiliations': ['GSAI', 'POSTECH CSE'], 'pdf_title_img': 'assets/pdf/title_img/2604.06938.jpg', 'data': {'categories': ['#cv', '#rl'], 'emoji': '📸', 'ru': {'title': 'Глобальная оптимизация конвейеров обработки изображений через предсказание полной последовательности', 'desc': 'В работе предложена платформа POS-ISP, которая использует обучение с подкреплением на уровне последовательностей для оптимизации конвейеров обработки изображений. Система предсказывает полную последовательность модулей и их параметры за один проход нейросети, что устраняет необходимость промежуточного контроля и повторных вычислений. Подход решает проблемы существующих методов, таких как несоответствие между обучением и выводом в поиске нейроархитектур и нестабильность пошагового обучения с подкреплением. Экспериментальные результаты показывают, что POS-ISP одновременно улучшает качество обработки изображений и снижает вычислительные затраты.'}, 'en': {'title': 'Streamlining Image Processing with Sequence-Level Reinforcement Learning', 'desc': 'The paper introduces POS-ISP, a novel sequence-level reinforcement learning framework designed to optimize image signal processing (ISP) pipelines. Unlike traditional methods that use neural architecture search or step-wise reinforcement learning, which can be inefficient and unstable, POS-ISP predicts the entire sequence of modules and their parameters in one go. This approach allows for a more efficient optimization process by using a terminal task reward, thus avoiding the need for intermediate supervision. The results demonstrate that POS-ISP not only enhances task performance but also significantly reduces computational costs, establishing a new standard for task-aware ISP optimization.'}, 'zh': {'title': '序列级优化，提升图像信号处理效率', 'desc': 'POS-ISP提出了一种序列级强化学习框架，用于优化图像信号处理管道。该方法通过一次前向传播预测完整的模块序列和参数，从而提高任务性能并降低计算成本。与现有的神经架构搜索和逐步强化学习方法相比，POS-ISP避免了训练与推理不匹配的问题，并减少了不稳定的训练过程。实验结果表明，POS-ISP在多个下游任务中表现出色，证明了序列级优化在任务感知的图像信号处理中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.27070', 'title': 'Structural Graph Probing of Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.27070', 'abstract': 'Abstract Vision-language models exhibit structured neural topology where correlation graphs reveal behaviorally significant patterns and influential recurrent hub neurons that drive multimodal performance.  AI-generated summary Vision-language models (VLMs) achieve strong multimodal performance, yet how computation is organized across populations of neurons remains poorly understood. In this work, we study VLMs through the lens of neural topology, representing each layer as a within-layer correlation graph derived from neuron-neuron co-activations. This view allows us to ask whether population-level structure is behaviorally meaningful, how it changes across modalities and depth, and whether it identifies causally influential internal components under intervention. We show that correlation topology carries recoverable behavioral signal; moreover, cross-modal structure progressively consolidates with depth around a compact set of recurrent hub neurons, whose targeted perturbation substantially alters model output. Neural topology thus emerges as a meaningful intermediate scale for VLM interpretability: richer than local attribution, more tractable than full circuit recovery, and empirically tied to multimodal behavior. Code is publicly available at https://github.com/he-h/vlm-graph-probing.', 'score': 0, 'issue_id': 1867, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': '77cabb0a070bef1a', 'authors': ['Haoyu He', 'Yue Zhuo', 'Yu Zheng', 'Qi R. Wang'], 'affiliations': ['Massachusetts Institute of Technology', 'Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2603.27070.jpg', 'data': {'categories': ['#cv', '#multimodal', '#graphs', '#open_source', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Структурная топология как ключ к пониманию мультимодальных нейросетей', 'desc': 'В работе изучается структура нейронных сетей в vision-language моделях через призму топологии корреляционных графов, построенных на основе совместной активации нейронов. Авторы показывают, что структура этих графов на уровне популяций нейронов содержит информацию о поведении модели и меняется в зависимости от модальности и глубины сети. Они выявляют ключевые hub-нейроны, которые оказывают существенное влияние на мультимодальную производительность, и демонстрируют, что целевые возмущения этих нейронов значительно изменяют выходы модели. Таким образом, нейронная топология предлагает новый промежуточный уровень для интерпретируемости vision-language моделей, который полезнее локальной атрибуции, но практичнее полного восстановления схем вычислений.'}, 'en': {'title': 'Unlocking Multimodal Insights through Neural Topology', 'desc': 'This paper investigates the internal workings of vision-language models (VLMs) by analyzing their neural topology through correlation graphs. It reveals that the organization of neurons in these models shows significant patterns that relate to their performance across different modalities. The study finds that certain recurrent hub neurons play a crucial role in driving multimodal outputs, and their influence can be altered through targeted interventions. Overall, the research highlights the importance of understanding neural topology for improving the interpretability of VLMs, bridging the gap between local neuron behavior and the overall model function.'}, 'zh': {'title': '揭示视觉-语言模型的神经拓扑结构', 'desc': '本文研究了视觉-语言模型（VLMs）的神经拓扑结构，揭示了神经元之间的相关性图谱如何影响多模态性能。我们通过分析神经元的共同激活，构建了每一层的相关性图，以探讨群体结构是否具有行为意义。研究发现，随着深度的增加，跨模态结构逐渐集中在一组重要的回归中心神经元上，这些神经元的干预会显著改变模型的输出。神经拓扑因此成为理解VLM可解释性的一个重要中间尺度，既比局部归因更丰富，又比完整电路恢复更易处理。'}}}];
