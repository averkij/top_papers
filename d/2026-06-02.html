 identify stress-specific failure modes and reveal that different physical factors degrade different embodied capabilities, which are often obscured by aggregate accuracy. We further introduce a stress-aware agentic solver that detects visual stressors and invokes visual-editing skills before reasoning, improving robustness in high-stress scenarios. Overall, RoboStressBench provides a principled evaluation framework for diagnosing and improving VLM perception under real-world physical stress, supporting the development of more reliable embodied AI systems.', 'score': 3, 'issue_id': 2358, 'pub_date': '2026-05-30', 'pub_date_card': {'ru': '30 мая', 'en': 'May 30', 'zh': '5月30日'}, 'hash': 'a516c0d82fd3f280', 'authors': ['Leyi Wu', 'Yifan Zhao', 'Jinjie Zhang', 'Suzeyu Chen', 'Wosong Chen', 'Zhifei Chen', 'Tianshuo Xu', 'Qingchun He', 'Hongxin Hu', 'Haojian Huang', 'Yangkai Wei', 'Wenqian Li', 'Yinchuan Li', 'Ying-Cong Chen'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Knowin'], 'pdf_title_img': 'assets/pdf/title_img/2606.00828.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#cv', '#agents', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Физически обоснованная оценка устойчивости видео-языковых моделей к реальным визуальным помехам', 'desc': 'В статье представлен RoboStressBench — комплексный бенчмарк для оценки устойчивости видео-языковых моделей к физическим визуальным помехам в воплощённых AI-системах. Авторы предлагают разложить визуальные помехи на четыре физически обоснованные компоненты: материал поверхности, точку обзора, освещение и геометрию сцены, вдохновляясь уравнением рендеринга. Через экспериментальную оценку современных VLM-моделей выявлены специфичные для каждого типа помех сбои, которые скрыты при агрегированной оценке точности. Кроме того, предложен адаптивный решатель, который автоматически обнаруживает визуальные стрессоры и применяет редактирование изображений для повышения робастности модели в сложных условиях.'}, 'en': {'title': 'Evaluating AI Resilience: The RoboStressBench Approach', 'desc': 'RoboStressBench is a new benchmark designed to test how well vision-language models (VLMs) handle real-world visual stress in embodied AI. It breaks down visual stress into four key areas: Material, Viewpoint, Lighting, and Geometry, allowing for a comprehensive evaluation of VLM performance. Unlike previous benchmarks that used clean images, RoboStressBench focuses on the diverse and realistic stresses that VLMs encounter in everyday situations. This framework not only identifies specific weaknesses in VLMs but also introduces a method to enhance their robustness against these stresses, ultimately leading to more reliable AI systems.'}, 'zh': {'title': 'RoboStressBench：提升视觉-语言模型鲁棒性的基准', 'desc': 'RoboStressBench是一个用于评估视觉-语言模型在物理视觉压力下鲁棒性的基准。它将视觉压力分解为材料、视角、光照和几何四个维度，以便更全面地覆盖现实环境中的视觉压力。通过对先进的视觉-语言模型进行评估，RoboStressBench揭示了不同物理因素对模型能力的影响，并识别出特定压力下的失败模式。此外，RoboStressBench还引入了一种压力感知的智能求解器，以提高在高压力场景下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.30723', 'title': 'Skill is Not One-Size-Fits-All: Model-Aware Skill Alignment for LLM Agents', 'url': 'https://huggingface.co/papers/2605.30723', 'abstract': 'Abstract Model-aware skill alignment framework adapts skills to different backbones through hierarchical evolution and lightweight rewriter training, achieving superior performance across interactive tasks.  AI-generated summary LLM agents increasingly retrieve externally curated skills-procedural instructions retrieved at decision time-to improve performance on long-horizon interactive tasks. Existing skill libraries are typically treated as model-agnostic, reusing the same skill formulations across backbones with substantially different capacities and behaviors. However, our controlled experiments across multiple model scales show that skill effectiveness is strongly model-dependent: a skill that benefits one backbone can harm another. Motivated by this observation, we propose MASA Model-Aware Skill Alignment, a framework that adapts skills to each target backbone without modifying agent weights. MASA operates in two stages: (1) a hierarchical skill evolution pipeline that iteratively rewrites general and task-specific skills using hill climbing and UCB-driven tree search, guided by environment feedback and model capability profiles; and (2) a lightweight model-conditioned skill rewriter trained on evolution trajectories to reproduce the adaptation in a single forward pass. Experiments across three interactive environments and four backbones show that MASA consistently achieves the best overall performance, with gains of up to 25.8 points over the strongest baseline. The learned rewriter further generalizes to unseen tasks and environments without additional search, consistently outperforming a much larger teacher LLM at a fraction of the inference cost.', 'score': 3, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '221dc9dd93969ca0', 'authors': ['Jianxiang Yu', 'Jiapeng Zhu', 'Bochen Lin', 'Qier Cui', 'Zichen Ding', 'Xiang Li'], 'affiliations': ['East China Normal University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30723.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Адаптация навыков агентов к разным моделям через эволюцию и переписывание', 'desc': 'В статье предлагается MASA — фреймворк для адаптации навыков агентов к различным моделям-бэкбонам без изменения весов самого агента. Авторы показали, что эффективность одного и того же навыка сильно зависит от архитектуры модели, и предложили двухэтапный подход: иерархическая эволюция навыков с использованием hill climbing и поиска по дереву, а также обучение лёгкого переписывателя навыков для адаптации в один проход. Эксперименты на трёх окружениях и четырёх бэкбонах демонстрируют, что MASA достигает лучшей производительности с улучшением до 25.8 пункта. Обученный переписыватель обобщается на новые задачи и окружения, работая дешевле и эффективнее, чем более крупные учительские модели.'}, 'en': {'title': 'Tailoring Skills for Optimal AI Performance', 'desc': 'The paper introduces the Model-Aware Skill Alignment (MASA) framework, which customizes skills for different AI models, enhancing their performance in interactive tasks. It highlights that skills are not universally effective across various model architectures, as a skill beneficial for one model may negatively impact another. MASA operates in two phases: first, it evolves skills through a feedback-driven process, and second, it employs a lightweight rewriter to adapt these skills efficiently. The results demonstrate that MASA significantly improves performance across multiple environments and models, achieving notable gains while maintaining low computational costs.'}, 'zh': {'title': '模型感知技能对齐：提升交互任务表现的关键', 'desc': '本论文提出了一种名为MASA（Model-Aware Skill Alignment）的框架，旨在根据不同的模型架构调整技能。通过分层进化和轻量级重写器训练，MASA能够在不修改智能体权重的情况下，优化技能在不同任务中的表现。实验表明，技能的有效性与模型密切相关，某些技能在特定模型上表现良好，但在其他模型上可能会产生负面影响。MASA在多个交互环境和模型架构中均表现出色，提升了性能，并且其学习到的重写器能够在未见过的任务和环境中泛化。'}}}, {'id': 'https://huggingface.co/papers/2606.01132', 'title': 'HakushoBench: A Japanese Chart and Table VQA Benchmark from Governmental White Papers', 'url': 'https://huggingface.co/papers/2606.01132', 'abstract': "Abstract Researchers created HakushoBench, a Japanese chart and table visual question answering benchmark derived from governmental documents, to evaluate vision-language models' ability to understand complex visual data beyond English-language datasets.  AI-generated summary Understanding chart and table images is essential for applying vision-language models (VLMs) to real-world document understanding. While English benchmarks have advanced rapidly, non-English counterparts remain scarce, leaving it unclear whether this progress generalizes across languages. A key obstacle is the difficulty of collecting realistic and diverse non-English chart and table images at scale. To address this, we leverage governmental white papers as a scalable source for benchmark construction beyond English, as they contain naturally occurring charts and tables across diverse formats and domains and are freely accessible in many countries. As a first instantiation, we introduce HakushoBench, a challenging Japanese chart and table VQA benchmark built from 33 governmental white papers. HakushoBench contains 2,053 images spanning over 10 image types, with manually annotated QA pairs, designed to assess deep and holistic understanding of charts and tables, rather than local visual cues alone. Experiments across a broad range of VLMs demonstrate that HakushoBench remains challenging for open-weight models: the best open-weight model achieves only 58.6% accuracy, and a 34.9-point gap between open-weight and proprietary models highlights substantial room for improvement in complex chart and table understanding. We release our dataset and code.", 'score': 2, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '4da8aa874f1b7ba0', 'authors': ['Issa Sugiura', 'Shuhei Kurita', 'Yusuke Oda', 'Naoaki Okazaki'], 'affiliations': ['Institute of Science Tokyo', 'LLMC', 'NII'], 'pdf_title_img': 'assets/pdf/title_img/2606.01132.jpg', 'data': {'categories': ['#dataset', '#low_resource', '#multilingual', '#benchmark', '#cv', '#open_source', '#multimodal'], 'emoji': '📊', 'ru': {'title': 'Японский эталон для оценки понимания диаграмм в визуально-языковых моделях', 'desc': 'Исследователи создали HakushoBench — набор данных для оценки способности визуально-языковых моделей понимать диаграммы и таблицы на японском языке. В отличие от существующих английскоязычных эталонов, этот датасет построен на основе правительственных документов, содержащих естественно возникающие визуализации различных форматов и доменов. Набор включает более 2000 изображений с десятью типами графиков и таблиц с аннотированными вопросно-ответными парами для глубокого понимания визуального контента. Экспериментальная оценка показала, что даже лучшие открытые модели достигают только 58,6% точности, при этом разрыв с закрытыми моделями составляет 34,9 процентных пункта, указывая на необходимость дальнейшего развития в области понимания сложных визуальных документов.'}, 'en': {'title': 'Bridging Language Gaps in Visual Question Answering', 'desc': 'HakushoBench is a new benchmark designed to test vision-language models (VLMs) on their ability to understand charts and tables in Japanese governmental documents. This benchmark addresses the lack of non-English datasets in the field, which has hindered the evaluation of VLMs across different languages. By utilizing governmental white papers, the researchers created a diverse set of 2,053 images with annotated question-answer pairs to challenge models on their comprehension of visual data. The results show that even the best open-weight models struggle with this task, indicating a significant need for further advancements in understanding complex visual information.'}, 'zh': {'title': 'HakurshoBench：推动非英语视觉问答的进步', 'desc': '研究人员创建了HakurshoBench，这是一个基于日本政府文件的图表和表格视觉问答基准，旨在评估视觉语言模型（VLM）理解复杂视觉数据的能力。尽管英语基准发展迅速，但非英语基准仍然稀缺，这使得我们无法确定这些进展是否适用于其他语言。为了解决这一问题，我们利用政府白皮书作为可扩展的基准构建来源，因为它们包含多种格式和领域的自然图表和表格，并且在许多国家是免费获取的。HakurshoBench包含2053张图像，涵盖10种图像类型，手动注释的问答对旨在评估对图表和表格的深度理解，而不仅仅是局部视觉线索。'}}}, {'id': 'https://huggingface.co/papers/2606.01528', 'title': 'Joint Agent Memory and Exploration Learning via Novelty Signals', 'url': 'https://huggingface.co/papers/2606.01528', 'abstract': 'Abstract Joint Agent Memory and Exploration Learning (JAMEL) framework trains memory and exploration policies together through novelty-driven interaction, enabling effective exploration in open-ended environments with reduced computational costs.  AI-generated summary In open-ended environments, exploration is fundamental for autonomous agents, yet current language model agents struggle with this. Effective exploration requires memory, but retaining raw interaction histories is computationally expensive over long trajectories. While latent memory offers a solution to compress interaction histories, its training lacks reliable supervisory signals. We introduce Joint Agent Memory and Exploration Learning (JAMEL), a framework that trains agentic memory and exploration policy together through novelty-driven interaction. We observe that memory and exploration form a mutually dependent loop: sustained exploration requires memory to distinguish exhausted behaviors from unseen ones, while novelty-seeking interaction provides the supervision needed to make memory useful for future exploration. By utilizing deterministic and persistent novelty signals such as code coverage in the GUI domain, we provide natural, annotation-free supervision for the memory module. Empirical evaluations demonstrate that \\ours successfully generalizes to unseen environments. Its exploration capability outperforms open-weight baselines and rivals the exploration depth of a closed-source model while reducing token consumption. Our code and model are open-sourced at https://github.com/MobileLLM/JAMEL.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '39daa2e3594417c9', 'authors': ['Shizuo Tian', 'Xiaohong Weng', 'Rui Kong', 'Yuxuan Chen', 'Guohong Liu', 'Yuebing Song', 'Jiacheng Liu', 'Yuchen Li', 'Dawei Yin', 'Ting Cao', 'Yunxin Liu', 'Yuanchun Li'], 'affiliations': ['Baidu Inc.', 'Peking University', 'Sun Yat-sen University', 'Tongji University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01528.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Память и исследование взаимно усиливают друг друга', 'desc': 'Авторы предлагают JAMEL — фреймворк для совместного обучения памяти и политики исследования среды для агентов на основе языковых моделей. Ключевая идея заключается в том, что память и исследование взаимозависимы: эффективное исследование требует памяти для различения исчерпанных и новых поведений, а в свою очередь новизна-ориентированное взаимодействие обеспечивает обучающий сигнал для памяти. Фреймворк использует детерминированные сигналы новизны, такие как покрытие кода, для получения естественной супервизии при обучении модуля памяти без необходимости ручной аннотации. Эксперименты показывают, что JAMEL превосходит открытые базовые модели по способности исследовать среду и при этом потребляет меньше токенов, чем закрытые модели.'}, 'en': {'title': 'Exploring Smarter: Memory Meets Exploration in JAMEL', 'desc': 'The Joint Agent Memory and Exploration Learning (JAMEL) framework enhances the exploration capabilities of autonomous agents in open-ended environments by integrating memory and exploration policies. It addresses the challenge of high computational costs associated with retaining long interaction histories by using latent memory to compress this data. JAMEL leverages novelty-driven interactions to provide effective supervision for the memory module, allowing agents to differentiate between familiar and new behaviors. Empirical results show that JAMEL not only generalizes well to new environments but also outperforms existing exploration methods while being more efficient in resource usage.'}, 'zh': {'title': '联合记忆与探索学习的创新探索', 'desc': 'JAMEL框架通过新颖性驱动的交互，联合训练记忆和探索策略，从而在开放环境中实现有效探索，并降低计算成本。有效的探索需要记忆，但长时间的交互历史保存会消耗大量计算资源。JAMEL利用潜在记忆来压缩交互历史，同时通过新颖性信号为记忆模块提供自然的监督。实验结果表明，JAMEL在未见环境中成功泛化，其探索能力超越了开放权重基线，并与封闭源模型的探索深度相当，同时减少了令牌消耗。'}}}, {'id': 'https://huggingface.co/papers/2606.01533', 'title': 'Multi-Agent Computer Use', 'url': 'https://huggingface.co/papers/2606.01533', 'abstract': 'Abstract Multi-agent computer use systems outperform single-agent approaches on complex tasks by enabling parallel execution and dynamic task decomposition through directed acyclic graphs.  AI-generated summary Computer use agents (CUAs) today are primarily deployed as single serial agents. This setup is suboptimal for complex long-horizon tasks that benefit from task decomposition, parallel execution, and consistent re-planning based on new information. In this paper, we argue that we should instead move towards evaluating and building multi-agent computer use (MACU) systems. These systems, which emphasize planning and parallel execution, alleviate many of the shortcomings of single-agent CUAs. We propose a general multi-agent setup in which a manager model decomposes computer use tasks as a directed acyclic graph (DAG), encoding relevant dependencies and goals for subagents. At each iteration, the manager dispatches parallel CUA subagents to carry out nodes on the ready frontier of the DAG, and continuously revises the DAG (adding, canceling, or rewriting nodes) as new findings arrive from subagents. This design treats the partially observable environment of computer use as a first class challenge: information that downstream agents may not be able to re-observe are retained and passed forward through the manager and DAG structure. We demonstrate that MACU consistently improves over strong single-agent baselines by 3.4-25.5% on desktop (OSWorld) and web navigation (Online-Mind2Web, WebTailBench, Odysseys) benchmarks, exhibits more favorable test-time scaling, and solves complex long-horizon tasks where single-agent CUAs get stuck. On Odysseys, a long-horizon web navigation benchmark, MACU improves average task completion wall-clock time by {sim} 1.5 times, demonstrating its efficacy in speeding up traditionally slow CUA pipelines. Our findings highlight that multi-agent coordination is a promising axis for scaling computer use agents to work productively for longer and more effectively. We release all code and interactive visualizations at https://jykoh.com/multi-agent-computer-use.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '06872cfa27997f25', 'authors': ['Jing Yu Koh', 'Ruslan Salakhutdinov', 'Daniel Fried'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01533.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#agents', '#reasoning'], 'emoji': '🕸️', 'ru': {'title': 'Координация многих агентов для масштабирования компьютерного взаимодействия', 'desc': 'В статье предлагается система многоагентного компьютерного использования (MACU), в которой управляющая модель разбивает сложные задачи на направленный ациклический граф (DAG) с учётом зависимостей между подзадачами. Параллельные агенты выполняют готовые узлы графа одновременно, а менеджер динамически пересматривает структуру задач на основе новой информации от подагентов. Система решает проблему частичной наблюдаемости окружения, сохраняя важную информацию и передавая её через структуру графа. На различных бенчмарках (OSWorld, Online-Mind2Web, WebTailBench, Odysseys) многоагентный подход превосходит одноагентные системы на 3.4-25.5% и ускоряет выполнение длительных задач примерно в 1.5 раза.'}, 'en': {'title': 'Unlocking Efficiency with Multi-Agent Coordination', 'desc': 'This paper introduces multi-agent computer use (MACU) systems as a solution to the limitations of single-agent computer use agents (CUAs) in handling complex tasks. By utilizing directed acyclic graphs (DAGs) for task decomposition and parallel execution, MACU systems can dynamically adapt to new information and improve planning efficiency. The manager model in MACU coordinates multiple subagents, allowing them to work simultaneously on different parts of a task, which leads to significant performance improvements. The results show that MACU outperforms traditional single-agent approaches by enhancing task completion speed and effectiveness in long-horizon scenarios.'}, 'zh': {'title': '多智能体系统：提升计算机使用效率的关键', 'desc': '本文提出了多智能体计算机使用系统（MACU），通过并行执行和动态任务分解来解决复杂任务。与单一智能体相比，MACU能够更有效地处理长时间跨度的任务，减少了单一智能体的局限性。我们设计了一种管理模型，通过有向无环图（DAG）来分解任务，并在每次迭代中调度并行的子智能体执行任务。实验结果表明，MACU在多个基准测试中表现优于传统的单智能体方法，显著提高了任务完成效率。'}}}, {'id': 'https://huggingface.co/papers/2606.01057', 'title': '3DCodeBench: Benchmarking Agentic Procedural 3D Modeling Via Code', 'url': 'https://huggingface.co/papers/2606.01057', 'abstract': 'Abstract Vision-language models are evaluated for procedural 3D modeling tasks through a benchmark and ranking platform that assess their ability to translate text and images into executable 3D code.  AI-generated summary Procedural 3D modeling through code is emerging as a versatile paradigm, offering deterministic, engine-ready, and precisely editable assets that neural 3D generators inherently lack. Authoring such procedural content, however, demands deep expertise in 3D software APIs, parametric design, and code-level geometric reasoning. In this paper, we propose 3DCodeBench, a systematic benchmark for evaluating vision-language model (VLM) agents for procedural 3D generation in 3D modeling software. Specifically, 3DCodeBench evaluates how effectively 12 advanced VLMs can serve as procedural 3D modelers by translating text and image references into procedural code for 3D modeling software. Recognizing that automated metrics may not fully capture the perceptual quality of 3D shapes, we build 3DCodeArena, a ranking platform based on pairwise human preferences over generated 3D outputs. From extensive evaluations and results, we observe that: (1) Failures mostly arise from API mismatches, while successful renders still suffer from disconnected or floating 3D geometric components. (2) Test-time scaling, such as higher thinking budgets and multi-turn refinement, improves performance overall. Our findings highlight a critical need for high-quality procedural coding data to advance commercial VLMs. Furthermore, effective procedural 3D modeling requires a robust execution environment that provides high-fidelity feedback for iterative refinement. We release 3DCodeBench, including the curated large-scale dataset of multimodal (text/image) prompts, procedural code, 3D object triplets, evaluation protocol, and the public 3DCodeArena platform as a foundational toolkit for exploring VLM-based procedural 3D modelers.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'a2d9d916825dc866', 'authors': ['Yipeng Gao', 'Lei Shu', 'Genzhi Ye', 'Xi Xiong', 'Ameesh Makadia', 'Meiqi Guo', 'Laurent Itti', 'Jindong Chen'], 'affiliations': ['Google DeepMind', 'Google Research', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2606.01057.jpg', 'data': {'categories': ['#3d', '#dataset', '#benchmark', '#cv', '#agents', '#open_source', '#multimodal'], 'emoji': '🏗️', 'ru': {'title': 'От слов к коду: vision-language модели как процедурные 3D-модельеры', 'desc': 'Авторы представляют 3DCodeBench — бенчмарк для оценки способности vision-language моделей (VLM) генерировать процедурный 3D-код на основе текстовых описаний и изображений. Работа включает систематическое тестирование 12 продвинутых VLM-агентов и платформу 3DCodeArena, которая использует оценку человеком для ранжирования сгенерированных 3D-моделей через попарное сравнение. Исследование выявило, что основные ошибки возникают из-за несовместимости API, а успешные модели часто содержат несвязные геометрические компоненты; улучшения достигаются через масштабирование на этапе тестирования и итеративное уточнение. Авторы подчеркивают необходимость в высокачественных данных для обучения VLM процедурному 3D-моделированию и выпускают полный набор ресурсов, включая датасет с мультимодальными запросами и оценочный протокол.'}, 'en': {'title': 'Empowering 3D Modeling with Vision-Language Models', 'desc': 'This paper introduces 3DCodeBench, a benchmark designed to evaluate vision-language models (VLMs) for procedural 3D modeling tasks. It assesses how well these models can convert text and images into executable 3D code, addressing the challenges of API mismatches and geometric integrity in generated models. The study also highlights the importance of human preference in evaluating 3D outputs through the 3DCodeArena platform. Overall, the findings emphasize the need for high-quality procedural coding data and a supportive execution environment to enhance the capabilities of VLMs in 3D modeling.'}, 'zh': {'title': '程序化3D建模的新标准', 'desc': '本文提出了3DCodeBench，这是一个系统的基准测试平台，用于评估视觉-语言模型在程序化3D建模中的表现。该平台通过将文本和图像转换为可执行的3D代码，来测试12个先进模型的能力。研究发现，模型在生成3D形状时常常面临API不匹配的问题，并且成功的渲染结果仍可能存在几何组件不连通或漂浮的情况。为了提高模型性能，测试时的扩展策略，如增加思考预算和多轮优化，显示出显著的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.01336', 'title': 'LongAttnComp: Cross-Family Context Compression for Long-Context Reasoning', 'url': 'https://huggingface.co/papers/2606.01336', 'abstract': 'Abstract LongAttnComp adapts AttnComp for long-context processing by fine-tuning lightweight attention layers and implementing token-level chunking and positional reordering techniques.  AI-generated summary As real-world applications increasingly require processing inputs of 100k+ tokens, the gap between context length and inference efficiency has become a critical bottleneck. Context compression offers a way to reduce prefill costs while preserving task accuracy. However, existing training-free attention-based methods leave substantial gaps in demanding long-context tasks such as code reasoning. We present LongAttnComp, a long-context adaptation of AttnComp that fine-tunes a lightweight cross-attention scoring layer and introduces tokenlevel chunking, a token-budget top-p algorithm, positional reordering, and a formatagnostic query parser. We further design a two-stage fine-tuning recipe for the compressor: Stage 1 builds a general retrieval foundation from NIAH-style data, and Stage 2 extends it with multi-hop and reasoning data for broader long-context task coverage. On InfiniteBench Code-Debug, LongAttnComp matches or exceeds full-context accuracy, substantially outperforms training-free baselines, and transfers across four target models from three families. On LongBench v2, the two-stage recipe largely closes the Stage 1 gap on multi-document reasoning while preserving Code-Debug performance.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '0cfaf0a84abf9d05', 'authors': ['Mengmeng Ji', 'Ravi Shanker Raju', 'Jonathan Lingjie Li', 'Chen Wu'], 'affiliations': ['SambaNova Systems, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.01336.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#long_context'], 'emoji': '🔗', 'ru': {'title': 'Эффективная компрессия длинных контекстов через адаптивное внимание', 'desc': 'LongAttnComp — это метод адаптации механизма внимания для обработки длинных контекстов, который использует легкие слои кросс-внимания и техники разбиения токенов. Система применяет двухэтапное обучение: сначала на задачах поиска информации (NIAH), а затем на сложных задачах с многоэтапными рассуждениями и анализом кода. Метод достигает качества полного контекста при значительном снижении вычислительных затрат на префилл фазе, превосходя обучаемые безые базовые методы. Подход успешно переносится между различными большими языковыми моделями и показывает сильные результаты на бенчмарках InfiniteBench и LongBench.'}, 'en': {'title': 'Enhancing Long-Context Processing with LongAttnComp', 'desc': 'LongAttnComp is a novel approach designed to enhance the performance of attention mechanisms for processing long-context inputs, specifically those exceeding 100,000 tokens. It fine-tunes lightweight attention layers and employs techniques like token-level chunking and positional reordering to improve efficiency and accuracy. The method includes a two-stage fine-tuning process that first establishes a general retrieval foundation and then adapts it for complex reasoning tasks. Results show that LongAttnComp achieves or surpasses the accuracy of full-context models while significantly outperforming existing training-free methods in long-context scenarios.'}, 'zh': {'title': '长上下文处理的新突破', 'desc': 'LongAttnComp 是一种针对长上下文处理的模型，旨在通过微调轻量级注意力层和实现令牌级分块及位置重排序技术来提高效率。随着实际应用对处理超过 100,000 个令牌的需求增加，如何在上下文长度和推理效率之间取得平衡成为了一个关键问题。该模型通过上下文压缩来降低预填充成本，同时保持任务的准确性，特别是在代码推理等长上下文任务中表现出色。LongAttnComp 在多个模型上测试时，准确性与全上下文模型相当，且在多文档推理任务中也表现优异。'}}}, {'id': 'https://huggingface.co/papers/2606.00267', 'title': 'StressDream: Steering Video World Models for Robust Policy Evaluation and Improvement', 'url': 'https://huggingface.co/papers/2606.00267', 'abstract': 'Abstract StressDream enhances video world models by steering diffusion-based imaginations toward high-impact yet plausible outcomes through optimized noise initialization with semantic and plausibility objectives.  AI-generated summary Video world models (WMs) have shown promise for policy evaluation and improvement by imagining realistic future observations conditioned on ego-robot actions. While WMs can model distributions over futures, policy evaluation and improvement typically rely on nominal imaginations, which can miss high-impact outcomes of robot actions unless prohibitively many samples are drawn. To enable robust policy evaluation and improvement over WM imaginations, we propose StressDream, which steers imaginations toward high-impact yet plausible outcomes specified at inference time by optimizing the initial noise of diffusion-based WMs. However, optimizing high-dimensional noise is challenging: the optimization must reason about nuanced, scene-dependent target events in generated videos while avoiding out-of-distribution (OOD) noise that yields implausible imaginations. We address this with two complementary objectives: a semantic objective with a Vision-Language Model that provides informative gradients by reasoning about the generated video, and a plausibility objective that prevents the optimized noise from drifting OOD. With state-of-the-art video world models for autonomous driving and robotic manipulation, we show that StressDream effectively steers imaginations toward high-impact yet plausible outcomes specified by text at inference time, such as task failures, enabling robust policy evaluation and improvement by identifying actions whose plausible futures include undesirable outcomes. Video results are available at https://junwon.me/StressDream/.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'b1ce6dfd5cab1ae3', 'authors': ['Junwon Seo', 'Sushant Veer', 'Ran Tian', 'Wenhao Ding', 'Apoorva Sharma', 'Karen Leung', 'Edward Schmerling', 'Marco Pavone', 'Andrea Bajcsy'], 'affiliations': ['Carnegie Mellon University', 'NVIDIA Research', 'Stanford University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.00267.jpg', 'data': {'categories': ['#robotics', '#diffusion', '#training', '#optimization', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Направленное воображение моделей мира для надежной оценки политик роботов', 'desc': 'StressDream — метод для улучшения видео-моделей мира путем направления диффузионных генераций на высокоударные, но правдоподобные сценарии через оптимизацию инициализации шума. Метод использует две дополнительные целевые функции: семантическую — через Vision-Language Model для обработки контента видео, и функцию правдоподобности для предотвращения выхода шума за границы распределения обучающих данных. Это позволяет оценивать и улучшать политики роботов, выявляя потенциально опасные или нежелательные исходы действий во время вывода модели. Метод демонстрирует эффективность на задачах автономного вождения и манипулирования объектами.'}, 'en': {'title': 'Steering AI Imaginations for Impactful Outcomes', 'desc': 'StressDream is a method that improves video world models by guiding the generation of future scenarios towards significant and realistic outcomes. It uses optimized noise initialization in diffusion-based models to enhance the quality of imagined scenarios based on specific objectives. By incorporating a semantic objective with a Vision-Language Model, it ensures that the generated videos are relevant and informative. Additionally, a plausibility objective helps maintain the realism of the outcomes, preventing the model from producing unrealistic scenarios, which is crucial for effective policy evaluation and improvement in robotics.'}, 'zh': {'title': '引导高影响力的合理想象', 'desc': 'StressDream 是一种增强视频世界模型的方法，通过优化噪声初始化，引导基于扩散的想象朝向高影响力且合理的结果。该方法利用语义和合理性目标，解决了在生成视频时如何避免不合理想象的问题。通过结合视觉-语言模型，StressDream 能够提供有用的梯度信息，从而优化生成视频的初始噪声。最终，StressDream 在自主驾驶和机器人操作等领域展示了其在政策评估和改进方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.00408', 'title': "Masking Stale Observations Helps Search Agents -- Until It Doesn't: A Regime Map and Its Mechanism", 'url': 'https://huggingface.co/papers/2606.00408', 'abstract': "Abstract Observation masking in long-horizon search agents shows variable accuracy gains depending on the interaction between retriever capability and model capacity, following an asymmetric inverted-U pattern.  AI-generated summary Long-horizon search agents accumulate large amounts of retrieved content across many tool calls, making context-budget efficiency increasingly important. A minimal intervention is to mask stale observations from the context as the trajectory progresses, but it remains unclear when this form of context management helps and why. We study observation masking through a systematic sweep over various agent backbones (4B to 284B parameters) and three retrievers on offline and live-web agentic search benchmarks. We find that the accuracy gain from masking follows an asymmetric inverted-U shape when plotted against the model's accuracy without context management: a plateau under weak retrievers, a peak when a strong retriever meets a mid-capacity model, and a sharp collapse when the model is saturated. This pattern reflects the interaction between retriever recall and the model's implicit filtering capacity, rather than either factor in isolation. Mechanistically, masking implements a token-for-turn trade-off: it removes observations the model has largely stopped attending to and pages the agent rarely re-opens. The added turns help when they convert failures into successes, but they fail when masking removes evidence the model would otherwise have used. We therefore reframe context management as a regime-dependent intervention and provide a holistic perspective for analyzing context use in agentic deep search. We release our scaffold and trajectories here (https://github.com/i-DeepSearch/observation-masking) to support future research.", 'score': 1, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '7dc0aa974fe8e519', 'authors': ['Haoxiang Zhang', 'Qixin Xu', 'Zhuofeng Li', 'Lei Zhang', 'Pengcheng Jiang', 'Yu Zhang', 'Julian McAuley'], 'affiliations': ['Texas A&M University', 'UC Berkeley', 'UC San Diego', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2606.00408.jpg', 'data': {'categories': ['#training', '#long_context', '#benchmark', '#agents', '#open_source', '#interpretability'], 'emoji': '🔍', 'ru': {'title': 'Баланс контекста: когда маскирование наблюдений помогает поиск-агентам', 'desc': "Исследование показывает, что маскирование устаревших наблюдений в длительных поиск-агентах имеет асимметричный эффект, зависящий от баланса между способностью retriever'а и размером модели. Авторы провели систематический анализ на моделях от 4B до 284B параметров и обнаружили, что прирост точности следует перевёрнутой U-образной кривой: плато при слабых retriever'ах, пик при сильном retriever'е и среднеёмкой модели, и резкое падение при насыщении модели. Механистически маскирование реализует компромисс между токенами и ходами агента, удаляя наблюдения, на которые модель перестала обращать внимание, и страницы, которые агент редко переоткрывает. Исследование переосмысляет управление контекстом как режимо-зависимое вмешательство и предоставляет комплексный взгляд на использование контекста в глубоком поиске агентами."}, 'en': {'title': 'Optimizing Context Management in Long-Horizon Search Agents', 'desc': "This paper investigates how observation masking affects the performance of long-horizon search agents, revealing a complex relationship between the capabilities of retrievers and the capacity of models. The authors find that the benefits of masking observations follow an asymmetric inverted-U pattern, where accuracy improves with certain combinations of retriever strength and model capacity, but declines when models become overly complex. The study emphasizes that effective context management is not just about removing old information, but about understanding when and how this removal can enhance or hinder the model's performance. By analyzing these interactions, the paper provides insights into optimizing context use in deep search agents, contributing to more efficient AI systems."}, 'zh': {'title': '观察掩蔽：提升长时间搜索代理的效率', 'desc': '在长时间搜索代理中，观察掩蔽的准确性提升因检索能力与模型容量的相互作用而异，呈现出不对称的倒U型模式。长时间搜索代理在多次工具调用中积累大量检索内容，因此上下文预算效率变得越来越重要。我们通过对不同代理骨干（参数从4B到284B）和三种检索器进行系统研究，发现掩蔽的准确性提升与没有上下文管理的模型准确性之间呈现出不对称的倒U型关系。掩蔽机制通过移除模型不再关注的观察，帮助模型在某些情况下将失败转化为成功，但在其他情况下则可能移除模型本可以利用的证据。'}}}, {'id': 'https://huggingface.co/papers/2605.25381', 'title': 'Not only where, But when: Temporal Scheduling for RLVR', 'url': 'https://huggingface.co/papers/2605.25381', 'abstract': 'Abstract Temporal scheduling of credit allocation criteria in reinforcement learning with verifiable rewards improves policy evolution and learning stability by prioritizing targeted tokens and gradually shifting toward general optimization.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a core technique for post-training of Large Language Models (LLMs). While policy optimization is driven by all sampled tokens under a globally broadcast scalar reward, the heterogeneous policy behaviors exhibited along trajectories are largely overlooked without differentiation. Existing works address this by credit allocation, including token-level advantage reweighting, and selective token optimization, however, the allocation criterion are principally stagnant throughout training, limiting resilient policy evolution. In this work, we argue that when learning signals are scheduled can be as important as where they are allocated across tokens, and introduce the temporal dimension that scheduling the credit allocation criteria over the course of RLVR optimization. We find that prioritizing targeted tokens emphasized with specific policy behaviors, and gradually attenuating toward general optimization leads to more stable and efficient learning dynamics. Furthermore, we show that simple trajectory percentiles provide a natural perspective for distinguishing policy behaviors, and works effectively with temporal scheduling. Our analysis reveals that standard optimization substantially sacrifices policy entropy when simultaneously accommodating heterogeneous behaviors, whereas temporal scheduling yields healthier policy evolution dynamics. Experiments across mathematical and general reasoning benchmarks demonstrate consistent improvements, suggesting that temporal scheduling constitutes a promising optimization dimension.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '6fba8874edc8f655', 'authors': ['Jinghao Zhang', 'Ruilin Li', 'Feng Zhao', 'Jiaqi Wang'], 'affiliations': ['JD.com', 'Shanghai Innovation Institute', 'University of Science and Technology of China', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.25381.jpg', 'data': {'categories': ['#rlhf', '#training', '#reasoning', '#optimization', '#rl'], 'emoji': '⏰', 'ru': {'title': 'Динамическое распределение сигналов обучения во времени для стабильной эволюции политики', 'desc': 'В этой работе предлагается метод временного планирования критериев распределения кредита при обучении с подкреплением на LLM. Авторы показывают, что распределение сигналов обучения во времени так же важно, как и их размещение по токенам в траектории. Они используют процентили траекторий для различения поведений политики и постепенно переходят от целевой оптимизации к общей. Эксперименты демонстрируют улучшенную стабильность обучения и здоровую динамику развития политики благодаря предложенному подходу.'}, 'en': {'title': 'Timing Matters: Enhancing Reinforcement Learning with Temporal Credit Allocation', 'desc': 'This paper introduces a new approach to reinforcement learning with verifiable rewards (RLVR) by focusing on the timing of credit allocation for different tokens during training. It emphasizes that not only where rewards are allocated matters, but also when they are given, which can enhance policy evolution and stability. By prioritizing specific tokens initially and then gradually shifting to a broader optimization, the learning process becomes more efficient and stable. The authors demonstrate that this temporal scheduling leads to better performance in various reasoning tasks, highlighting its potential as a valuable strategy in reinforcement learning.'}, 'zh': {'title': '时间调度提升强化学习的稳定性与效率', 'desc': '这篇论文探讨了在强化学习中，如何通过时间调度信用分配标准来改善策略演化和学习稳定性。研究表明，优先考虑特定的目标令牌，并逐渐转向一般优化，可以实现更稳定和高效的学习动态。作者提出，学习信号的调度时间与令牌的分配同样重要，并引入了时间维度来优化强化学习过程。实验结果显示，时间调度能够有效区分策略行为，并在数学和一般推理基准上取得了一致的改进。'}}}, {'id': 'https://huggingface.co/papers/2606.01682', 'title': 'Off-the-Shelf LLMs as Process Scorers: Training-Free Alternative to PRMs for Mathematical Reasoning', 'url': 'https://huggingface.co/papers/2606.01682', 'abstract': "Abstract Chunk-Level Guided Generation uses a large language model as a process scorer to select fixed-length candidate chunks during small model generation, improving reasoning accuracy over traditional methods like majority voting and PRM guided search.  AI-generated summary Selecting the best response from multiple small-model samples using a stronger scorer is a simple inference-time strategy, but fails when the small model has already committed to incorrect reasoning paths. PRM guided search avoids this by scoring candidate continuations during generation, but requires a reward model trained with step-level labels.   We propose Chunk-Level Guided Generation, a training-free alternative that uses an off-the-shelf large language model as a process scorer. At each step, a small model samples k fixed-length candidate chunks, while the larger model scores the candidates using likelihoods without generating any text. The selected chunk is committed before the next step, steering generation before errors can propagate.   We instantiate this framework with two selection rules: Likelihood-Guided Selection (LGS), which selects the chunk with the highest length-normalized large-model log-probability, and Contrastive-Guided Selection (CGS), which subtracts the small model's log-probability to favor chunks where the large model's preference diverges from the small model's. We show that scoring variable-length reasoning steps with large-model likelihoods is unreliable due to a systematic length bias that persists even after length normalization, and that fixed-length chunks avoid this confound.   On GSM8K, MATH, Minerva Math, AMC23, and AIME24 with Qwen2.5-1.5B guided by Qwen2.5-32B and Llama-3.2-1B guided by Llama-3.1-70B, CGS outperforms majority voting by up to 28 pp and, under matched guidance budgets, matches or outperforms Qwen2.5-Math-PRM-72B guided search on most benchmarks without reward-model training. With Qwen2.5-7B guided by Qwen2.5-72B, CGS reaches 81.8% on MATH and 63.6% on Minerva Math at k=16, surpassing majority voting by 4--6 pp. Finally, Chunk-Level Guided Generation produces substantially shorter reasoning traces than PRM guided search.", 'score': 0, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '83f46ca5403a980f', 'authors': ['Atoosa Chegini', 'Soheil Feizi'], 'affiliations': ['Department of Computer Science, University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2606.01682.jpg', 'data': {'categories': ['#math', '#small_models', '#reasoning', '#optimization', '#inference'], 'emoji': '🎯', 'ru': {'title': 'Направление генерации маленькой модели через оценку больших моделей без обучения', 'desc': 'В статье предлагается метод Chunk-Level Guided Generation, который использует большую языковую модель в качестве оценщика процесса для направления генерации текста маленькой моделью без необходимости обучения. На каждом шаге маленькая модель генерирует k кандидатов фиксированной длины, а большая модель оценивает их, используя логарифмические вероятности, без генерации текста. Предлагаются два правила отбора: Likelihood-Guided Selection выбирает кандидат с наивысшей нормализованной вероятностью, а Contrastive-Guided Selection учитывает разницу между предпочтениями большой и маленькой моделей. Экспериментальные результаты показывают, что метод превосходит majority voting на 28% и конкурирует с методами, требующими обучения reward-модели, при этом производя более короткие цепочки рассуждений.'}, 'en': {'title': 'Guiding Small Models with Large Model Insights', 'desc': 'Chunk-Level Guided Generation is a novel approach that enhances the reasoning accuracy of small language models by using a larger language model as a process scorer. Instead of relying on traditional methods like majority voting, this technique samples fixed-length candidate chunks and scores them based on their likelihoods, steering the generation process before errors can propagate. The method introduces two selection rules: Likelihood-Guided Selection (LGS) and Contrastive-Guided Selection (CGS), which help in choosing the best chunk based on the preferences of the larger model. This approach has shown significant improvements in performance on various benchmarks without the need for reward model training, producing shorter reasoning traces compared to previous methods.'}, 'zh': {'title': '块级引导生成：提升推理准确性的创新方法', 'desc': '这篇论文提出了一种新的生成方法，称为块级引导生成（Chunk-Level Guided Generation），它利用大型语言模型作为过程评分器来选择固定长度的候选块，从而提高推理的准确性。与传统的多数投票和PRM引导搜索方法相比，这种方法在生成过程中避免了错误的传播。论文中介绍了两种选择规则：基于似然的选择（LGS）和对比引导选择（CGS），后者通过比较小模型和大模型的偏好来选择块。实验结果表明，块级引导生成在多个基准测试中表现优于多数投票，并且生成的推理轨迹明显更短。'}}}, {'id': 'https://huggingface.co/papers/2606.02580', 'title': 'Thinking in Blender: Staged Executable Inverse Graphics with Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.02580', 'abstract': 'Abstract Pretrained vision-language models can reconstruct 3D scenes from single images as editable Blender programs through progressive refinement, demonstrating improved fidelity through staged reconstruction approaches.  AI-generated summary Inverse graphics is a longstanding and highly underconstrained problem that seeks to reconstruct images as editable 3D scenes which can be rendered, relit, and manipulated. In this work, we investigate whether pretrained vision-language models (VLMs) can perform executable inverse graphics directly from a single image by reconstructing a scene as an editable Blender program, without relying on specialized 2D or 3D foundation models, differentiable rendering, or multi-view supervision. We introduce Staged Executable Inverse Graphics (SEIG), an agentic framework that reconstructs a 3D scene from a single image by progressively refining scene factors including geometry, materials, composition, and lighting directly in executable Blender code space. We evaluate our framework across diverse scenes using a range of reconstruction metrics spanning pixel-level, perceptual, and semantic fidelity. Our experiments show that staged reconstruction substantially improves reconstruction fidelity, highlighting the importance of task decomposition for executable inverse graphics with general-purpose VLMs. Finally, we showcase various downstream applications enabled by the reconstructed editable Blender scenes.', 'score': 0, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '36dc2822af24b12f', 'authors': ['Guangzhao He', 'Rundong Luo', 'Wei-Chiu Ma', 'Hadar Averbuch-Elor'], 'affiliations': ['Cornell University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.02580.jpg', 'data': {'categories': ['#3d', '#agents', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От снимка к редактируемой сцене: пошаговая реконструкция 3D через языковые модели', 'desc': 'Работа исследует использование предобученных vision-language моделей для решения задачи inverse graphics - реконструкции трёхмерных сцен из одного изображения. Авторы предлагают SEIG, агентный фреймворк, который постепенно уточняет параметры сцены (геометрия, материалы, освещение) путём генерации исполняемого кода на языке Blender без использования специализированных моделей и многовидовой информации. Методология основана на декомпозиции задачи на этапы, что позволяет существенно улучшить качество реконструкции по различным метрикам точности. Полученные редактируемые трёхмерные сцены открывают возможности для множества прикладных приложений.'}, 'en': {'title': 'Transforming Images into Editable 3D Scenes with VLMs', 'desc': 'This paper explores how pretrained vision-language models (VLMs) can create editable 3D scenes from single images using a method called Staged Executable Inverse Graphics (SEIG). The approach allows for the progressive refinement of various scene elements like geometry, materials, and lighting directly in Blender code, without needing specialized models or multi-view data. The authors demonstrate that breaking down the reconstruction process into stages significantly enhances the quality of the generated scenes. Additionally, they highlight the potential applications of these reconstructed scenes in various fields.'}, 'zh': {'title': '从单图像重建3D场景的创新方法', 'desc': '本研究探讨了预训练的视觉-语言模型（VLMs）是否能够直接从单张图像执行可编辑的逆图形重建，将场景重建为可在Blender中编辑的程序。我们提出了分阶段可执行逆图形（SEIG）框架，通过逐步优化几何、材料、构图和光照等场景因素，直接在可执行的Blender代码空间中重建3D场景。实验结果表明，分阶段重建显著提高了重建的保真度，强调了任务分解在使用通用VLMs进行可执行逆图形中的重要性。最后，我们展示了通过重建的可编辑Blender场景所启用的各种下游应用。'}}}, {'id': 'https://huggingface.co/papers/2605.28615', 'title': 'Compositional Text-to-Image Generation Via Region-aware Bimodal Direct Preference Optimization', 'url': 'https://huggingface.co/papers/2605.28615', 'abstract': "Abstract BiDPO enhances text-to-image models for complex compositional prompts through preference-based fine-tuning and region-level guidance.  AI-generated summary Despite the rapid progress of text-to-image (T2I) models, generating images that accurately reflect complex compositional prompts (covering attribute bindings, object relationships, counting) still remains challenging. To address this, we propose BiDPO, a framework to enhance T2I model's capability of compositional text-to-image generation. We begin by introducing an carefully designed pipeline to construct a large-scale preference dataset, BiComp, with strictly quality control. Then, we extend Diffusion DPO to jointly optimize image and text preferences, which is shown to greatly effective in improving the models to follow complex text prompt in generation. To further enhance the models for fine-grained alignment, we employ a region-level guidance method to focus on regions relevant to compositional concepts. Experimental results demonstrate that our BiDPO substantially improves compositional fidelity, consistently outperforming prior methods across multiple benchmarks. Our approach highlights the potential of preference-based fine-tuning for complex text-to-image tasks, offering a flexible and scalable alternative to existing techniques.", 'score': 0, 'issue_id': 2358, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '7e7ecba99ff98e31', 'authors': ['Zhuohan Liu', 'Wujian Peng', 'Yitong Chen', 'Zuxuan Wu'], 'affiliations': ['Shanghai Collaborative Innovation Center of Intelligent Visual Computing', 'Shanghai Key Lab of Intell. Info. Processing, School of CS, Fudan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28615.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Предпочтения для совершенной композиции: обучение моделей T2I сложным текстовым запросам', 'desc': 'Статья представляет BiDPO — фреймворк для улучшения моделей генерации изображений по текстовому описанию при работе со сложными составными запросами. Авторы создали большой датасет предпочтений BiComp с строгим контролем качества и расширили метод Diffusion DPO для совместной оптимизации изображений и текстовых предпочтений. Для повышения точности выравнивания применяется метод направления на уровне регионов, сосредоточивающий внимание модели на релевантных областях изображения. Экспериментальные результаты показывают, что BiDPO значительно улучшает точность композиции и превосходит существующие методы на нескольких бенчмарках.'}, 'en': {'title': 'Enhancing Text-to-Image Generation with BiDPO', 'desc': "BiDPO is a new framework designed to improve text-to-image (T2I) models, especially for complex prompts that involve multiple attributes and relationships. It introduces a large-scale preference dataset called BiComp, which is created with strict quality control to ensure high-quality training data. The framework uses a method called Diffusion DPO to optimize both image and text preferences, enhancing the model's ability to generate images that accurately reflect detailed prompts. Additionally, BiDPO incorporates region-level guidance to focus on specific areas of the image that correspond to complex concepts, leading to better compositional fidelity in the generated images."}, 'zh': {'title': 'BiDPO：提升复杂组合提示的文本到图像生成能力', 'desc': 'BiDPO是一种增强文本到图像模型的框架，旨在处理复杂的组合提示。该方法通过偏好基础的微调和区域级指导，提升了模型生成图像的能力。我们构建了一个大规模的偏好数据集BiComp，并采用Diffusion DPO方法优化图像和文本的偏好。实验结果表明，BiDPO在多个基准测试中显著提高了组合生成的准确性，展示了偏好微调在复杂文本到图像任务中的潜力。'}}}];

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (4)', '#agents (10)', '#agi', '#alignment', '#architecture (4)', '#audio (1)', '#benchmark (12)', '#cv (4)', '#data', '#dataset (8)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (4)', '#interpretability (1)', '#leakage', '#long_context (3)', '#low_resource (2)', '#machine_translation', '#math (2)', '#multilingual (2)', '#multimodal (12)', '#open_source (7)', '#optimization (10)', '#plp', '#rag', '#reasoning (8)', '#rl (3)', '#rlhf (2)', '#robotics (4)', '#science (1)', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic (1)', '#training (10)', '#transfer_learning', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-02 05:26',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-02 05:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-02 05:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
