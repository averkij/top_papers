    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

                    updateTimeDiffs();

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.02437', 'title': 'On the Scaling of PEFT: Towards Million Personal Models of Trillion Parameters', 'url': 'https://huggingface.co/papers/2606.02437', 'abstract': 'Abstract Parameter-efficient fine-tuning can function as a compact substrate for persistent personal models by enabling small trainable adapters to store instance-specific behaviors on top of strong foundation models.  AI-generated summary Parameter-efficient fine-tuning (PEFT) is usually treated as a cheaper alternative to full fine-tuning. We study a broader role: small trainable adapters as persistent local state on top of strong shared foundation models. In this framing, the base model provides shared competence while adapters carry instance-specific behavior such as preferences, skills, tool habits, and memory-like updates. We organize the problem around three scaling axes: Scale Up, where stronger shared priors make small local updates more useful; Scale Down, where we study how small adapters can be while remaining reliable; and Scale Out, where many persistent adapted instances coexist. MinT provides one infrastructure example for managing adapter identity, revision, provenance, evaluation, and serving residency. Together, the results suggest that PEFT can be a compact substrate for persistent personal models rather than only a budget substitute for full fine-tuning.', 'score': 44, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '2a77c47e8d16c601', 'authors': ['Mind Lab', ':', 'Song Cao', 'Vic Cao', 'Kaijie Chen', 'Bunny Fan', 'Hera Feng', 'Huan Feng', 'Arthur Fu', 'Jun Gao', 'Hongquan Gu', 'Aaron Guan', 'Mutian Hong', 'Hailee Hou', 'Peixuan Hua', 'Charles Huang', 'Miles Jiang', 'Nora Jiang', 'Yuyi Jiang', 'Autumn Jin', 'Fancy Kong', 'Kyrie Lei', 'Alexy Li', 'Dawn Li', 'Ray Li', 'Theo Li', 'Wenhao Li', 'Jiayi Lin', 'Domini Liu', 'Heshan Liu', 'Kairus Liu', 'Logan Liu', 'Maeve Luo', 'Runism Lv', 'Pony Ma', 'Verity Niu', 'Anson Qiu', 'Vincent Wang', 'Maxwell Yao', 'Regis Ye', 'Wenlin Ye', 'Yanying Ye', 'Josh Ying', 'Danney Zeng', 'Salmon Zhan', 'Anya Zhang', 'Ruijia Zhang', 'Shiyang Zhang', 'Sueky Zhang', 'Ya Zhang', 'Wei Zhao', 'Ada Zhou', 'Sizer Zhou', 'Xinyue Zhu', 'Murphy Zhuang'], 'affiliations': ['Mind Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.02437.jpg', 'data': {'categories': ['#training', '#small_models'], 'emoji': '👤', 'ru': {'title': 'Персональные модели через компактные адаптеры вместо полного переобучения', 'desc': 'В статье исследуется новый подход к использованию параметрически-эффективного дообучения (PEFT) не просто как бюджетной альтернативы полному дообучению, а как основы для создания персональных моделей. Маленькие обучаемые адаптеры хранят поведение, специфичное для каждого пользователя (предпочтения, навыки, память), поверх мощной базовой модели, которая обеспечивает общую компетентность. Авторы анализируют три аспекта масштабирования: усиление базовой модели, минимизацию размера адаптеров и управление множеством персональных экземпляров одновременно. Предложенная система MinT демонстрирует практическую реализацию инфраструктуры для управления идентичностью адаптеров, их версионированием и обслуживанием.'}, 'en': {'title': 'Personalized AI: Small Adapters, Big Impact!', 'desc': "This paper explores the concept of parameter-efficient fine-tuning (PEFT) as a method for creating personalized AI models using small trainable adapters. These adapters allow the model to retain specific behaviors and preferences while leveraging the capabilities of a strong foundation model. The authors discuss three scaling strategies: enhancing the model's shared knowledge, minimizing the size of the adapters while ensuring reliability, and managing multiple personalized instances simultaneously. The findings indicate that PEFT can serve as a foundational approach for developing persistent personal models, rather than just a cost-effective alternative to traditional fine-tuning."}, 'zh': {'title': '参数高效微调：个性化模型的新基础', 'desc': '参数高效微调（PEFT）是一种通过小型可训练适配器在强大的基础模型上存储特定实例行为的技术。这种方法不仅是全微调的经济替代方案，还能作为持久个人模型的紧凑基础。我们探讨了适配器在共享基础模型之上的作用，包括偏好、技能和记忆更新等个性化行为。研究表明，PEFT可以有效地支持多个持久适配实例的共存，提升模型的个性化能力。'}}}, {'id': 'https://huggingface.co/papers/2606.02404', 'title': 'K-BrowseComp: A Web Browsing Agent Benchmark Grounded in Korean Contexts', 'url': 'https://huggingface.co/papers/2606.02404', 'abstract': "Abstract Korean web-browsing agent benchmark K-BrowseComp evaluates frontier LLMs' capabilities with 400 problems, showing significant performance gaps compared to English benchmarks and highlighting the need for more robust Korean AI development.  AI-generated summary Frontier model evaluations are shifting from foundational capabilities (e.g., instruction following and reasoning) toward compositional, agentic ones, but Korean agentic benchmarks remain scarce. We introduce K-BrowseComp, a web-browsing agent benchmark grounded in Korean contexts, consisting of 400 problems. The 300-problem K-BrowseComp-Verified subset is manually constructed and validated by native Korean speakers. On this subset, frontier LLMs, including GPT-5.5, DeepSeek-V4-Pro, and GLM-5.1, reach only 30.00--45.67\\%, a substantial drop from BrowseComp, while Korean LLMs released through Korea's Proprietary AI Foundation Model program obtain only 0.00--10.33\\%. We further construct a 100-problem synthetic split using hard few-shot exemplars and failure-mode-targeted generation to exploit the asymmetry between solving and creating web browsing problems. On the adversarially filtered synthetic diagnostic split, the strongest model reaches only 26.00\\%, and we report this split separately as a targeted stress test. We publicly release our data and code.", 'score': 28, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd7d7b1fdeb884cd4', 'authors': ['Nahyun Lee', 'Dongkeun Yoon', 'Guijin Son', 'Geewook Kim', 'Dayoon Ko', 'Jeonghun Park', 'Haneul Yoo', 'Jaewon Cho', 'Junghun Park', 'Changyoon Lee', 'Kyochul Jang', 'Jaeyeon Kim', 'Eunsu Kim', 'Woojin Cho', 'Seungone Kim'], 'affiliations': ['Carnegie Mellon University', 'Chung-Ang University', 'KAIST', 'NAVER Cloud AI', 'OnelineAI', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.02404.jpg', 'data': {'categories': ['#synthetic', '#dataset', '#low_resource', '#multilingual', '#benchmark', '#agents', '#open_source'], 'emoji': '🌐', 'ru': {'title': 'Корейская веб-навигация: где спотыкаются передовые модели', 'desc': 'В статье представлен K-BrowseComp — бенчмарк для оценки способностей современных больших языковых моделей (LLM) выполнять задачи веб-навигации в корейском контексте, включающий 400 задач. Исследование показало значительный разрыв в производительности: передовые модели достигают только 30-45% на проверенном подмножестве из 300 задач, в то время как корейские LLM показывают результаты 0-10%. Авторы создали дополнительный синтетический набор из 100 задач с использованием adversarial фильтрации и целевой генерации, чтобы выявить слабые места моделей в решении сложных проблем веб-браузинга. Исследование подчёркивает необходимость развития более мощных агентных моделей для корейского языка и демонстрирует переход от оценки базовых способностей к оценке сложных композиционных и агентных компетенций.'}, 'en': {'title': 'Bridging the Gap: Enhancing Korean AI with K-BrowseComp', 'desc': 'The paper introduces K-BrowseComp, a benchmark designed to evaluate the performance of large language models (LLMs) in web browsing tasks specifically within the Korean context. It highlights significant performance gaps between Korean LLMs and their English counterparts, indicating a need for improved AI development in the Korean language. The benchmark consists of 400 problems, with a verified subset of 300 problems validated by native speakers, showcasing the challenges faced by current models. Additionally, the paper presents a synthetic diagnostic split to further assess model capabilities, revealing that even the best-performing models struggle significantly with these tasks.'}, 'zh': {'title': '推动韩国AI发展的K-BrowseComp基准测试', 'desc': 'K-BrowseComp是一个针对韩国网络浏览代理的基准测试，评估了前沿大型语言模型（LLM）的能力，共包含400个问题。研究显示，与英语基准相比，韩国模型的表现存在显著差距，强调了韩国人工智能发展的必要性。该基准测试中，300个问题经过母语者的手动构建和验证，结果显示前沿LLM的准确率仅为30%到45%之间，而韩国本土LLM的表现更差，仅为0%到10%。此外，研究还构建了一个包含100个问题的合成测试集，用于评估模型在解决网络浏览问题时的能力。'}}}, {'id': 'https://huggingface.co/papers/2605.30351', 'title': 'VideoMLA: Low-Rank Latent KV Cache for Minute-Scale Autoregressive Video Diffusion', 'url': 'https://huggingface.co/papers/2605.30351', 'abstract': 'Abstract VideoMLA reduces memory usage in video diffusion models by replacing per-head keys and values with shared low-rank content and decoupled 3D-RoPE positional keys, maintaining quality while achieving significant compression and improved throughput.  AI-generated summary Long-rollout causal video diffusion has converged on a fixed-size sliding-window KV cache, with recent progress innovating within this layout by changing which tokens occupy the window or how their positions are encoded. The per-head KV layout itself, a dominant contributor to streaming memory and latency, has been mostly left unchanged. In this paper, we present the first study of Multi-Head Latent Attention (MLA) in video diffusion. VideoMLA replaces per-head keys and values with a shared low-rank content latent and a shared decoupled 3D-RoPE positional key, reducing per-token KV memory by 92.7% at every cached layer. We further investigate why MLA succeeds in video diffusion even though the spectral assumption often used to motivate it in language models does not hold: pretrained video attention is not low-rank, with 99%-energy effective rank far above any practical latent dimension. VideoMLA retains quality at compression ratios where direct spectral approximation would predict large reconstruction error. We show that the MLA bottleneck, rather than the pretrained spectrum, determines the effective rank: both spectral and random initialization occupy nearly the full rank budget from initialization, and training preserves this budget while adapting within it. On VBench, VideoMLA matches short-horizon streaming video diffusion baselines, achieves the best overall score at long horizons among evaluated methods, and improves throughput by 1.23x on a single B200.', 'score': 19, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '99d90c17640efd23', 'authors': ['Hidir Yesiltepe', 'Jiazhen Hu', 'Tuna Han Salih Meral', 'Adil Kaan Akan', 'Kaan Oktay', 'Hoda Eldardiry', 'Pinar Yanardag'], 'affiliations': ['Virginia Tech', 'fal'], 'pdf_title_img': 'assets/pdf/title_img/2605.30351.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#optimization', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Экономная память в видео-диффузии через латентное внимание', 'desc': 'В статье представлена VideoMLA — метод оптимизации видео-диффузионных моделей, который сокращает использование памяти путём замены ключей и значений для каждой головы внимания на общее низкоранговое представление и декодированный 3D-RoPE позиционный ключ. Исследование показывает, что Multi-Head Latent Attention (MLA) эффективно работает в видео-диффузии, несмотря на то что спектральная гипотеза, обычно используемая в языковых моделях, здесь не применима. Метод достигает сжатия памяти KV на 92,7% на каждом слое, сохраняя качество генерации видео и увеличивая пропускную способность на 1,23x. Авторы выясняют, что узким местом MLA является архитектурное ограничение, а не спектральные характеристики предобученного внимания.'}, 'en': {'title': 'Revolutionizing Video Diffusion with Memory-Efficient Multi-Head Latent Attention', 'desc': 'This paper introduces VideoMLA, a method that reduces memory usage in video diffusion models by using shared low-rank content and decoupled 3D-RoPE positional keys instead of traditional per-head keys and values. By doing this, VideoMLA achieves a remarkable 92.7% reduction in per-token key-value memory at each cached layer, while still maintaining high-quality output. The authors explore why this approach works effectively in video diffusion, even when the assumptions that apply to language models do not hold true. Their experiments show that VideoMLA not only matches existing methods for short video sequences but also outperforms them in longer sequences, improving processing speed significantly.'}, 'zh': {'title': '视频扩散模型的内存革命', 'desc': 'VideoMLA是一种在视频扩散模型中减少内存使用的方法。它通过用共享的低秩内容和解耦的3D-RoPE位置键替代每个头的键和值，从而在保持质量的同时实现显著压缩和提高吞吐量。研究表明，尽管在语言模型中常用的光谱假设不适用于视频注意力，但VideoMLA仍能在压缩比高的情况下保持质量。通过对MLA瓶颈的分析，我们发现训练过程能够在有效秩预算内进行适应，从而提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2605.30611', 'title': 'Crafter: A Multi-Agent Harness for Editable Scientific Figure Generation from Diverse Inputs', 'url': 'https://huggingface.co/papers/2605.30611', 'abstract': "Abstract Automated systems for generating scientific figures face limitations in handling diverse figure types and conditions, prompting the development of multi-agent frameworks that generalize across different input scenarios and produce editable output formats.  AI-generated summary Scientific figures are among the most effective means of communicating complex research ideas, yet producing publication-quality illustrations remains one of the most labor-intensive parts of paper preparation. Existing automated systems each target a single figure type under text-only input, leaving the diversity of types and conditions researchers actually use unaddressed; their raster outputs further cannot be locally revised. Because scientific figures are structured compositions of discrete semantic components, the localized errors generators produce on such layouts demand not a stronger backbone but a harness. We instantiate this harness in two complementary systems: Crafter, a multi-agent harness for figure generation that generalizes across figure types and input conditions without architectural changes, and CraftEditor, which applies the same pattern to convert raster outputs into editable SVGs. Moreover, we introduce CraftBench, a benchmark spanning three figure types and four input conditions with human quality annotation. Experiments show that Crafter substantially outperforms both standalone generators and the agentic baseline on PaperBanana-Bench and CraftBench, with ablations confirming each component's independent contribution; CraftEditor faithfully converts outputs into editable SVGs that surpass all baselines. Our code and benchmark are available at https://github.com/HaozheZhao/Crafter.", 'score': 15, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'fd267e690be7880c', 'authors': ['Haozhe Zhao', 'Shuzheng Si', 'Zhenhailong Wang', 'Zheng Wang', 'Liang Chen', 'Xiaotong Li', 'Zhixiang Liang', 'Maosong Sun', 'Minjia Zhang'], 'affiliations': ['Peking University', 'Tsinghua University', 'University of Illinois at Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.30611.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents', '#open_source', '#science'], 'emoji': '🎨', 'ru': {'title': 'Многоагентный фреймворк для генерации редактируемых научных графиков', 'desc': 'В работе предлагается многоагентный фреймворк Crafter для автоматической генерации научных графиков, который обобщается на различные типы фигур и условия входных данных без изменения архитектуры. Система CraftEditor дополняет Crafter, преобразуя растровые выходы в редактируемые SVG-файлы, позволяя пользователям локально корректировать ошибки в структурированных композициях. Авторы представляют бенчмарк CraftBench, охватывающий три типа фигур и четыре варианта входных условий с аннотациями качества от человека. Экспериментальные результаты показывают, что Crafter значительно превосходит как отдельные генераторы, так и агентные базовые модели, обеспечивая более высокое качество научных иллюстраций.'}, 'en': {'title': 'Revolutionizing Scientific Figure Generation with Multi-Agent Systems', 'desc': 'This paper presents a multi-agent framework for generating scientific figures that can adapt to various types and input conditions. The proposed system, Crafter, improves upon existing automated figure generators by allowing for the creation of diverse figure types without needing to change the underlying architecture. Additionally, CraftEditor enables the conversion of raster images into editable SVG formats, addressing the limitations of previous systems. The authors also introduce CraftBench, a benchmark for evaluating figure generation quality, demonstrating that their approach significantly outperforms existing methods.'}, 'zh': {'title': '智能图形生成的多智能体框架', 'desc': '本论文提出了一种多智能体框架，用于生成科学图形，旨在解决现有自动化系统在处理多样化图形类型和条件时的局限性。该框架包括Crafter和CraftEditor两个系统，Crafter能够在不同输入场景下生成可编辑的输出格式，而CraftEditor则将光栅输出转换为可编辑的SVG格式。通过在PaperBanana-Bench和CraftBench上的实验，Crafter显示出显著优于现有生成器的性能。我们还引入了CraftBench基准，涵盖三种图形类型和四种输入条件，并提供了人类质量注释。'}}}, {'id': 'https://huggingface.co/papers/2606.02482', 'title': 'X-Stream: Exploring MLLMs as Multiplexers for Multi-Stream Understanding', 'url': 'https://huggingface.co/papers/2606.02482', 'abstract': 'Abstract X-Stream introduces the first benchmark for multi-stream streaming understanding, revealing significant limitations of current MLLMs in handling concurrent streams.  AI-generated summary While video streaming understanding has made significant strides, real-world applications, such as live sports broadcasting, autonomous driving, and multi-screen collaboration, inherently demand continuous, multi-stream interactions. However, existing benchmarks are confined to single-stream paradigms, leaving a critical gap in evaluating online, cross-stream reasoning. To bridge this, we introduce X-Stream, the first benchmark dedicated to multi-stream streaming understanding. Comprising 4,220 rigorously curated QA pairs across 932 videos, X-Stream evaluates 11 subtasks across multi-window, multi-view, and multi-device scenarios. Crucially, our dataset is constructed using a novel dual-verification pipeline that prevents over-reliance on a single stream. Furthermore, we pioneer the conceptualization of multi-modal large language models (MLLMs) as naive multiplexers, systematically evaluating their performance through the lens of Signal Multiplexing Theory. Our extensive online inference experiments reveal a stark reality: state-of-the-art MLLMs struggle significantly with concurrent streams, achieving only about 50% score and exhibiting poor proactive ability. Ultimately, X-Stream exposes the trade-off of current multiplexing schemes, providing both a practical evaluation protocol and empirical guidance for next-generation multi-stream agents.', 'score': 14, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '69e45f27add9b0ff', 'authors': ['Peiwen Sun', 'Xudong Lu', 'Huadai Liu', 'Yang Bo', 'Dongming Wu', 'Huankang Guan', 'Minghong Cai', 'Jinpeng Chen', 'Xintong Guo', 'Shuhan Li', 'Rui Liu', 'Xiangyu Yue'], 'affiliations': ['Huawei Inc.', 'MMLab, Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.02482.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Когда одного видео недостаточно: многопоточное понимание для AI', 'desc': 'В статье представлен X-Stream — первый бенчмарк для оценки способности моделей машинного обучения понимать несколько видеопотоков одновременно. Авторы выявили критические ограничения современных мультимодальных больших языковых моделей (MLLM) при работе с одновременными потоками данных, включая сценарии трансляции спорта, автономного вождения и многоэкранного сотрудничества. Набор данных содержит 4220 пар вопрос-ответ на основе 932 видео с оценкой 11 подзадач, использующих новый метод двойной верификации для предотвращения переобучения на одном потоке. Исследование показало, что современные MLLM достигают только 50% точности при анализе конкурирующих потоков и демонстрируют слабую способность к проактивному прогнозированию.'}, 'en': {'title': 'X-Stream: Bridging the Gap in Multi-Stream Understanding', 'desc': 'The paper introduces X-Stream, a new benchmark designed to assess multi-stream streaming understanding in machine learning. It highlights the limitations of current multi-modal large language models (MLLMs) when dealing with concurrent streams, which are essential for applications like live sports and autonomous driving. The benchmark includes a comprehensive dataset of 4,220 question-answer pairs across various video scenarios, ensuring a robust evaluation of multi-stream interactions. The findings reveal that existing MLLMs perform poorly in these settings, achieving only around 50% accuracy, thus emphasizing the need for improved models that can handle complex, real-time data streams effectively.'}, 'zh': {'title': '多流理解的未来：X-Stream基准', 'desc': 'X-Stream是首个针对多流流媒体理解的基准，揭示了当前多模态大语言模型（MLLMs）在处理并发流时的显著局限性。尽管视频流理解取得了重要进展，但现实应用如直播体育、自动驾驶和多屏协作需要持续的多流交互。现有基准主要集中在单流范式，导致在线跨流推理的评估存在关键空白。X-Stream通过4,220个精心策划的问答对，评估多窗口、多视角和多设备场景下的11个子任务，提供了对下一代多流代理的实用评估协议和经验指导。'}}}, {'id': 'https://huggingface.co/papers/2605.28132', 'title': 'Which Pretraining Paradigm Better Serves Spatial Intelligence? An Empirical Comparison of Vision-Language and Video Generation Models', 'url': 'https://huggingface.co/papers/2605.28132', 'abstract': 'Abstract A systematic comparison of vision-language models and video generation models reveals complementary strengths for spatial intelligence tasks, with vision-language models excelling in semantic tagging and instance grouping while video generation models perform better in dense geometry and camera motion prediction.  AI-generated summary Spatial intelligence requires visual representations that capture both semantic objects and geometric structure in the physical world. To support this, two major pre-training schemes are now widely used as foundation backbones: Vision-Language Models (VLMs), which use language supervision to align visual observations with semantic concepts, and Video Generation Models (VGMs), which learn from temporally evolving visual worlds. However, it still remains unclear which pre-training scheme provides a better representation substrate for spatial intelligence. In this paper, we present the first systematic frozen-feature probing study of VLMs and VGMs across three representative axes of spatial intelligence: semantic tagging, instance grouping, and 3D geometry prediction. Using the lightweight probe, our framework enables a controlled comparison of what information is already encoded in frozen representations from two model families. Experimental results reveal a clear complementarity: VLMs are stronger at semantic tagging and instance grouping, while VGMs provide more accessible signals for dense geometry and camera motion. Moreover, a naive fusion of the two already yields a representation that excels at both geometry and semantics, suggesting a promising direction for building stronger spatial-intelligence backbones by effectively integrating features from both model families. Our code is available at https://github.com/om-ai-lab/Probing-VLM-VGM{https://github.com/om-ai-lab/Probing-VLM-VGM}.', 'score': 13, 'issue_id': 2358, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'c56a957d77394d01', 'authors': ['Haozhan Shen', 'Tiancheng Zhao', 'Kangjia Zhao', 'Jianwei Yin'], 'affiliations': ['Binjiang Institute of Zhejiang University', 'Om AI Research', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28132.jpg', 'data': {'categories': ['#3d', '#cv', '#video', '#multimodal'], 'emoji': '🔀', 'ru': {'title': 'Дополнительные сильные стороны: комбинирование видения-языка и генерации видео для пространственного интеллекта', 'desc': 'В статье проводится систематическое сравнение моделей зрения-языка (VLM) и моделей генерации видео (VGM) для задач пространственного понимания. Исследование показывает, что VLM лучше справляются с семантической разметкой и группировкой объектов благодаря языковому контролю, в то время как VGM превосходят в предсказании плотной геометрии и движения камеры. Авторы используют метод frozen-feature probing с лёгкими зондами для контролируемого анализа информации, закодированной в представлениях обеих семейств моделей. Результаты показывают многообещающий подход: объединение обеих архитектур создаёт представления, которые одновременно эффективны как в геометрических, так и в семантических задачах.'}, 'en': {'title': 'Combining Strengths: VLMs and VGMs for Enhanced Spatial Intelligence', 'desc': 'This paper compares two types of models used in machine learning: Vision-Language Models (VLMs) and Video Generation Models (VGMs). VLMs are better at understanding and tagging objects semantically, while VGMs excel in predicting 3D geometry and camera movements. The study uses a method called frozen-feature probing to analyze the strengths of both models in spatial intelligence tasks. The findings suggest that combining features from both models can create a more powerful representation that enhances both geometric understanding and semantic recognition.'}, 'zh': {'title': '融合视觉与视频模型，提升空间智能', 'desc': '本文系统比较了视觉-语言模型（VLMs）和视频生成模型（VGMs）在空间智能任务中的优势。研究发现，VLMs在语义标记和实例分组方面表现优异，而VGMs在密集几何和相机运动预测上更具优势。通过对这两种模型的特征进行探测，实验结果显示它们在空间智能的不同方面互为补充。进一步的研究表明，将两者特征融合可以构建出更强大的空间智能基础模型。'}}}, {'id': 'https://huggingface.co/papers/2605.29343', 'title': 'Draft-OPD: On-Policy Distillation for Speculative Draft Models', 'url': 'https://huggingface.co/papers/2605.29343', 'abstract': "Abstract Speculative decoding uses a lightweight draft model to accelerate large language model inference, but supervised fine-tuning plateaus due to offline-to-inference mismatch, which is addressed through on-policy distillation with target-assisted rollouts and error replay.  AI-generated summary Speculative decoding accelerates large language model inference by pairing a target model with a lightweight draft model whose proposed tokens are verified in parallel. A common way to build draft models, like EAGLE3 or DFlash is supervised fine-tuning (SFT) on target-generated trajectories. However, we observe that SFT quickly plateaus: the draft model's acceptance length on test data stops improving. The reason is an offline-to-inference mismatch: In SFT, the drafter learns from fixed target-generated trajectories, whereas during speculative decoding it is evaluated on blocks proposed under its own policy. This motivates on-policy distillation (OPD), where the target model supervises the drafter on draft-induced states. Yet OPD remains difficult for draft models, as they cannot reliably roll out complete sequences independently, whereas target-assisted generation makes the collected sequences follow the target distribution and thus eliminates the on-policy signal. We therefore propose Draft-OPD, which uses target-assisted rollout for stable continuations and replays drafting from the verification-exposed error positions. This allows the drafter to learn from target feedback on both accepted and rejected proposals, focusing training on the draft-induced errors that limit speculative acceptance. Experiments show that Draft-OPD achieves over 5times lossless acceleration for thinking models across diverse tasks, improving over EAGLE-3 and DFlash by 23\\% and 13\\%.", 'score': 12, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '2e2420d7ade8f95e', 'authors': ['Haodi Lei', 'Yafu Li', 'Haoran Zhang', 'Shunkai Zhang', 'Qianjia Cheng', 'Xiaoye Qu', 'Ganqu Cui', 'Bowen Zhou', 'Ning Ding', 'Yun Luo', 'Yu Cheng'], 'affiliations': ['Peking University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29343.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Draft-OPD: на-политика дистилляция для ускорения спекулятивного декодирования', 'desc': 'В статье предлагается метод Draft-OPD для улучшения спекулятивного декодирования, которое использует лёгкую модель-черновик для ускорения инференса больших языковых моделей. Авторы выявили проблему несовпадения между обучением и инференсом: модель-черновик обучается на фиксированных траекториях целевой модели, но во время спекулятивного декодирования работает с собственными предложениями токенов. Для решения этой проблемы предложена на-политика дистилляция с целевой помощью при развёртывании последовательностей и переобучением на ошибках верификации. Экспериментальные результаты показывают ускорение инференса более чем в 5 раз на различных задачах с улучшением на 23% и 13% относительно существующих методов.'}, 'en': {'title': 'Accelerating Language Models with Draft-OPD', 'desc': 'This paper introduces Draft-OPD, a method that enhances the efficiency of large language model inference by using a lightweight draft model alongside a target model. The challenge of supervised fine-tuning is addressed, as it often plateaus due to a mismatch between training and inference conditions. Draft-OPD employs on-policy distillation, allowing the draft model to learn from both accepted and rejected proposals, thus improving its performance. Experimental results demonstrate that Draft-OPD significantly accelerates inference speed while outperforming existing models like EAGLE-3 and DFlash.'}, 'zh': {'title': '加速推理的草稿模型优化', 'desc': '本论文提出了一种名为Draft-OPD的技术，用于加速大型语言模型的推理过程。通过结合目标模型和轻量级草稿模型，Draft-OPD能够在推理时并行验证生成的标记，从而提高效率。研究发现，传统的监督微调方法在推理时效果不佳，因此引入了基于策略的蒸馏方法，以便在草稿模型的状态下进行学习。实验结果表明，Draft-OPD在多种任务上实现了超过5倍的无损加速，显著优于现有模型。'}}}, {'id': 'https://huggingface.co/papers/2606.01311', 'title': 'SkillAdaptor: Self-Adapting Skills for LLM Agents from Trajectories', 'url': 'https://huggingface.co/papers/2606.01311', 'abstract': 'Abstract Step-level skill adaptation framework with explicit failure attribution improves training-free skill maintenance for LLM agents in interactive tasks.  AI-generated summary Large language model (LLM) agents increasingly rely on reusable external skills to solve long-horizon interactive tasks. Existing training-free skill adaptation pipelines usually update skills from full trajectories or session-level feedback, which makes failure attribution coarse and often produces unstable or overly broad revisions. We propose SkillAdaptor, a training-free step-level skill adaptation framework with explicit failure attribution, and it can plug into OpenClaw-class agent harnesses. Given a failed trajectory, SkillAdaptor identifies a first actionable fault step, links responsibility to candidate skills, and applies targeted updates under explicit acceptance checks while keeping the backbone frozen. We evaluate on WebShop, PinchBench, and Claw-Eval with Kimi-K2.5, GLM-5, and GPT-5.2. SkillAdaptor improves over no-skill and skill-adaptation baselines on all three suites, with the largest single-metric improvements of +1.5 points on PinchBench Avg Score%, +1.8 on Claw-Eval Avg Score, and +1.7 on WebShop success rate. These results indicate that step-level attribution supports more stable and auditable training-free skill maintenanceThe code will be released at https://github.com/zjunlp/SkillAdaptor..', 'score': 11, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '43b3855a9793167c', 'authors': ['Zhuoyun Yu', 'Xin Xie', 'Wuguannan Yao', 'Chenxi Wang', 'Lei Liang', 'Xiang Qi', 'Shumin Deng'], 'affiliations': ['Ant Digital Technologies', 'Ant Group', 'Zhejiang University', 'Zhejiang University - Ant Group Joint Laboratory of Knowledge Graph'], 'pdf_title_img': 'assets/pdf/title_img/2606.01311.jpg', 'data': {'categories': [], 'emoji': '🔧', 'ru': {'title': 'Точная диагностика ошибок — ключ к стабильной адаптации навыков агентов', 'desc': 'В статье предлагается SkillAdaptor — фреймворк для адаптации навыков LLM-агентов без обучения, который использует пошаговую атрибуцию ошибок вместо анализа полных траекторий. Метод определяет первый шаг, вызвавший отказ, связывает ответственность с конкретными навыками и применяет целевые обновления под явными проверками приемлемости, сохраняя основную модель неизменной. Экспериментальная оценка на трёх бенчмарках (WebShop, PinchBench, Claw-Eval) с несколькими LLM показала последовательное улучшение всех метрик по сравнению с базовыми подходами. Пошаговая атрибуция обеспечивает более стабильное и проверяемое обслуживание навыков без дополнительного обучения.'}, 'en': {'title': 'Precision in Skill Adaptation for LLM Agents', 'desc': "This paper introduces SkillAdaptor, a framework designed to enhance the adaptation of skills in large language model (LLM) agents during interactive tasks without requiring additional training. Unlike traditional methods that assess performance based on entire task sessions, SkillAdaptor focuses on identifying specific failure points in the task execution, allowing for more precise updates to the skills involved. By linking failures to individual skills and applying targeted adjustments, the framework maintains the stability of the agent's core capabilities while improving its performance. The evaluation results demonstrate significant improvements in task success rates across multiple benchmarks, showcasing the effectiveness of step-level failure attribution in skill maintenance."}, 'zh': {'title': '逐步技能适应，提升LLM代理的稳定性', 'desc': '本文提出了一种名为SkillAdaptor的框架，用于大语言模型（LLM）代理的技能适应。该框架通过明确的失败归因，支持逐步的技能更新，从而提高了无训练的技能维护效果。与传统的全轨迹或会话级反馈方法相比，SkillAdaptor能够更精确地识别失败步骤，并针对性地更新技能。实验结果表明，SkillAdaptor在多个评估任务中均优于无技能和技能适应基线，显示出其在技能维护中的稳定性和可审计性。'}}}, {'id': 'https://huggingface.co/papers/2606.01247', 'title': 'Where to Look: Can Foundation Models Reach a Target Viewpoint Through Active Exploration?', 'url': 'https://huggingface.co/papers/2606.01247', 'abstract': 'Abstract Target Viewpoint Reproduction task challenges foundation models to actively adjust 3D viewpoints to match target images, revealing limitations in visual history processing and embodied movement mapping, with a unified post-training framework improving success rates through various training methods.  AI-generated summary Humans can reproduce the viewpoint specified by a target image through active head and body motion, yet spatial intelligence in foundation models has largely been studied as passive understanding of pre-collected observations. We introduce Target Viewpoint Reproduction (TVR) -- an active task where an agent adjusts its viewpoint in a 3D environment until its observation matches a given target image -- and TVRBench, an indoor-simulation benchmark spanning scene scale and target-view visual richness. TVR is far from solved: on the evaluation split, the strongest open-source and closed-source models reach only 7.8% and 12.0% success. Fine-grained analysis identifies two consistent bottlenecks: off-the-shelf models struggle with multi-turn visual history, and performance drops sharply when viewpoint reproduction requires body translation rather than in-place rotation, exposing a gap in mapping spatial discrepancies to embodied movement. To study reducing this gap, we build a unified TVR post-training framework covering expert-trajectory SFT, rationale-supervised CoT-SFT, offline Single-turn GRPO, and on-policy Multi-turn GRPO from live simulator rollouts. Visual-action SFT supplies the main gain, raising a 9B open-source model to 50.8% success; Multi-turn GRPO provides targeted multi-room refinement and reaches 51.4% overall, while CoT supervision and Single-turn GRPO degrade closed-loop performance. These results establish TVRBench as a testbed for measuring and training foundation models that actively perceive and act in 3D environments. Our code, data, and models are available at https://github.com/aim-uofa/TVRBench.', 'score': 10, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '9d0ceecfdb51abdb', 'authors': ['Liyang Li', 'Muzhi Zhu', 'Zhiyue Zhao', 'Hengyu Zhao', 'Ke Liu', 'Linhao Zhong', 'Hao Chen', 'Chunhua Shen'], 'affiliations': ['Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01247.jpg', 'data': {'categories': ['#robotics', '#training', '#3d', '#dataset', '#benchmark', '#agents', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'Активное восприятие 3D: учим модели самостоятельно менять позицию камеры', 'desc': 'В статье представлена задача Target Viewpoint Reproduction (TVR), которая требует от моделей активно изменять точку обзора в 3D окружении, чтобы совпадать с целевым изображением. Авторы создали бенчмарк TVRBench и выявили два ключевых ограничения современных foundation models: сложность обработки многошаговой визуальной истории и неправильное соответствие пространственных смещений физическим движениям агента. Для улучшения результатов предложен унифицированный фреймворк обучения, включающий supervised fine-tuning на траекториях экспертов, контролируемое обучение цепочкам рассуждений и offline/online GRPO методы с использованием симулятора. Результаты показывают значительный прогресс: открытая 9B модель достигла 50.8% успешности после visual-action обучения, а multi-turn GRPO поднял результат до 51.4%.'}, 'en': {'title': 'Enhancing 3D Spatial Intelligence in AI with Target Viewpoint Reproduction', 'desc': "This paper introduces the Target Viewpoint Reproduction (TVR) task, which challenges foundation models to actively adjust their 3D viewpoints to match a target image. It highlights the limitations of current models in processing visual history and mapping embodied movements, particularly when body translation is required. The authors propose a unified post-training framework that incorporates various training methods to improve the models' performance in this task. The results show significant improvements, with the best models achieving over 50% success, establishing TVRBench as a valuable benchmark for evaluating and enhancing spatial intelligence in AI."}, 'zh': {'title': '主动视点再现：提升3D环境中的智能', 'desc': '目标视点再现任务（TVR）要求基础模型主动调整3D视点，以匹配目标图像。这项研究揭示了视觉历史处理和具身运动映射的局限性。通过统一的后训练框架，结合多种训练方法，成功率得到了显著提升。TVRBench作为一个室内模拟基准，提供了评估和训练基础模型在3D环境中主动感知和行动的能力。'}}}, {'id': 'https://huggingface.co/papers/2605.24956', 'title': 'NITP: Next Implicit Token Prediction for LLM Pre-training', 'url': 'https://huggingface.co/papers/2605.24956', 'abstract': 'Abstract Next Implicit Token Prediction enhances language model training by adding dense continuous supervision in representation space, improving generalization and performance across model sizes with minimal computational overhead.  AI-generated summary Standard next-token prediction (NTP) supervises language models solely through discrete labels in the output logit space. We argue that this sparse one-hot supervision leaves the latent representation space under-constrained, allowing hidden states to drift into degenerate and anisotropic configurations that can limit generalization. To address this issue, we propose Next Implicit Token Prediction (NITP), which augments discrete prediction with dense continuous supervision directly in the representation space. NITP trains the model to predict the implicit semantic content of the next token, using shallow-layer representations from the same model as stable self-supervised targets. We provide theoretical analysis showing that NITP regularizes the optimization landscape by mitigating under-constrained degrees of freedom and encouraging a compact, structured representation geometry. Empirically, across dense and MoE models ranging from 0.5B to 9B parameters, NITP consistently improves downstream performance with negligible computational overhead. On a 9B MoE model, NITP achieves a 5.7% absolute improvement on MMLU-Pro, along with gains of 6.4% on C3 and 4.3% on CommonsenseQA, with approximately 2% additional training FLOPs and no additional inference cost. Our implementation is available at https://github.com/aHapBean/NITP.', 'score': 10, 'issue_id': 2358, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': 'd9112762b4ac2a8d', 'authors': ['Xiangdong Zhang', 'Debing Zhang', 'Shaofeng Zhang', 'Xiaohan Qin', 'Yu Cheng', 'Junchi Yan'], 'affiliations': ['School of AI, Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'University of Science and Technology of China', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.24956.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Дополнительное обучение в пространстве представлений улучшает обобщение моделей', 'desc': 'Статья предлагает улучшение методики обучения языковых моделей через добавление дополнительной плотной непрерывной функции потерь в пространстве представлений. Авторы утверждают, что стандартное предсказание следующего токена обеспечивает разреженное обучение, что может привести к вырождению скрытых состояний и снижению обобщающей способности модели. Предлагаемый метод Next Implicit Token Prediction использует поверхностные слои той же модели как самоконтролируемые целевые сигналы для предсказания семантического содержания следующего токена. Эмпирически метод показывает стабильное улучшение производительности на моделях от 0.5B до 9B параметров с минимальными вычислительными затратами.'}, 'en': {'title': 'Enhancing Language Models with Continuous Supervision', 'desc': 'This paper introduces Next Implicit Token Prediction (NITP), a method that enhances language model training by providing continuous supervision in the representation space. Traditional next-token prediction relies on discrete labels, which can lead to poor generalization due to under-constrained representations. NITP addresses this by training models to predict the implicit semantic content of the next token, using stable self-supervised targets from the model itself. The results show that NITP significantly improves performance across various model sizes with minimal additional computational cost.'}, 'zh': {'title': '下一隐式标记预测：提升语言模型的训练效果', 'desc': '本文提出了一种新的语言模型训练方法，称为下一隐式标记预测（NITP），通过在表示空间中增加密集的连续监督来增强模型的训练效果。传统的下一标记预测（NTP）仅依赖离散标签进行监督，导致潜在表示空间受到限制，影响模型的泛化能力。NITP通过预测下一个标记的隐式语义内容，利用模型的浅层表示作为自监督目标，从而改善了模型的表示几何结构。实验结果表明，NITP在不同规模的模型上均能显著提升下游任务的性能，且计算开销极小。'}}}, {'id': 'https://huggingface.co/papers/2605.29860', 'title': 'ESPO: Early-Stopping Proximal Policy Optimization', 'url': 'https://huggingface.co/papers/2605.29860', 'abstract': 'Abstract ESPO improves mathematical reasoning in large language models by detecting and terminating failed trajectories early, leading to better performance and reduced computational waste.  AI-generated summary When a large language model under reinforcement learning commits a wrong reasoning step early in a trajectory, standard algorithms force it to keep generating until the maximum horizon, spending compute on tokens that never receive positive reward and polluting advantage estimates with post-failure noise. We propose ESPO (Early-Stopping Proximal Policy Optimization), which detects trajectory failure on-the-fly and terminates rollouts early. At each generation step, ESPO computes a surrogate regret using only the logits already computed during sampling, and terminates when the smoothed cumulative regret significantly exceeds its estimated values. Truncated trajectories are treated as absorbing failure states with a terminal reward, concentrating negative temporal-difference (TD) errors near the detected failure step without any additional reward model or human annotation. On DeepSeek-R1-Distill-Qwen-7B trained for mathematical reasoning, ESPO surpasses PPO on AIME~2024 (46.28% vs. 45.25%), AMC~2023 (85.83% vs. 82.94%), and MATH-500 (87.42% vs. 85.43%), while saving more than 20% rollout tokens cumulatively.', 'score': 9, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'f04d8619bb433489', 'authors': ['Zihang Li', 'Rui Zhou', 'Yingcheng Shi', 'Wenhan Yu', 'Zhewen Tan', 'Zixiang Liu', 'Zeming Li', 'Binhua Li', 'Yongbin Li', 'Tong Yang', 'Jieping Ye'], 'affiliations': ['Peking University', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.29860.jpg', 'data': {'categories': ['#rlhf', '#math', '#training', '#reasoning', '#optimization', '#rl'], 'emoji': '🛑', 'ru': {'title': 'Ранняя остановка неудачных траекторий для эффективного обучения математическому рассуждению', 'desc': 'ESPO — это улучшенный алгоритм обучения с подкреплением, который обнаруживает ошибочные траектории рассуждений в больших языковых моделях на ранних этапах и прерывает их генерацию. Метод использует суррогатный регрет, вычисляемый из уже полученных логитов, чтобы определить момент отказа без дополнительных моделей награды. Неполные траектории рассматриваются как поглощающие состояния неудачи с терминальной наградой, что сосредоточивает ошибки обучения вблизи обнаруженного отказа. На задачах математического рассуждения ESPO превосходит стандартный PPO, одновременно сокращая затраты вычислений на 20% за счёт экономии токенов при генерации.'}, 'en': {'title': 'Optimize Early, Save Resources!', 'desc': 'The paper introduces ESPO (Early-Stopping Proximal Policy Optimization), a method that enhances mathematical reasoning in large language models by identifying and halting unsuccessful reasoning paths early in the training process. This approach prevents the model from wasting computational resources on generating tokens that will not yield positive rewards, thus improving efficiency. By calculating a surrogate regret based on already computed logits, ESPO can terminate rollouts when the cumulative regret indicates a high likelihood of failure. The results show that ESPO outperforms traditional PPO methods in various benchmarks while significantly reducing the number of tokens used during training.'}, 'zh': {'title': '早停优化，提升推理效率！', 'desc': 'ESPO（早停近端策略优化）通过提前检测和终止失败的推理轨迹，改善了大型语言模型的数学推理能力。传统算法在模型犯错后仍然强制生成，导致计算资源浪费和不必要的噪声。ESPO在每个生成步骤中计算替代后悔值，并在检测到显著的后悔值时提前终止生成。通过将截断的轨迹视为吸收失败状态，ESPO有效集中负的时间差（TD）误差，从而提高了模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.02564', 'title': 'VLMs are Good Teachers for Video Reasoning via Adaptive Test-Time Optimization', 'url': 'https://huggingface.co/papers/2606.02564', 'abstract': 'Abstract Video generation models combined with vision-language models acting as test-time teachers through differentiable rewards achieve superior video reasoning performance.  AI-generated summary The recent "Reasoning with Video" paradigm utilizes Video Generation Models (VGMs) to generate temporally coherent visual trajectories to complete reasoning tasks. Although state-of-the-art VGMs excel at visual quality, they often struggle to understand and follow task-specific rules, leading to logical failures across diverse reasoning scenarios. Existing efforts try to utilize Vision-Language Models (VLMs) as problem pre-solvers to produce or refine textual guidance for the VGM. However, textual descriptions fail to capture intricate spatiotemporal details, and VGMs often struggle to faithfully execute fine-grained or long-tail instructions even with a valid plan. While VLMs struggle as solvers, they possess strong perception capabilities to evaluate process-constraint satisfaction and final-goal achievement. Leveraging this strength, we introduce a paradigm shift that transitions the role of VLMs to "teachers". Specifically, a VLM teacher extracts task-specific rules to formulate differentiable rewards, guiding a VGM Reasoner via test-time online optimization of a lightweight LoRA module. This strategy enables adaptive test-time optimization and extends the reasoning capabilities beyond the VGM\'s intrinsic boundaries. Evaluations on symbolic (VBVR-Bench) and general-purpose (RULER-Bench) video reasoning benchmarks show that the proposed method yields a 16.7-point average performance gain, outperforming the VLM-as-Solver paradigm (+0.4 points) and Best-of-N scaling (+2.2 points) by a large margin at comparable test-time cost. These findings reveal that integrating VLMs as test-time teachers offers a promising paradigm for achieving generalizable video reasoning. Project Page: https://VLM-as-Teacher.github.io/', 'score': 8, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '63be4e9857f3369a', 'authors': ['Junhao Cheng', 'Liang Hou', 'Tianxiong Zhong', 'Xin Tao', 'Pengfei Wan', 'Kun Gai', 'Jing Liao'], 'affiliations': ['City University of Hong Kong', 'Kling Team, Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.02564.jpg', 'data': {'categories': ['#training', '#reasoning', '#optimization', '#benchmark', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Vision-Language модели как учителя для генерации логичных видеопоследовательностей', 'desc': 'В статье предлагается новый подход к видеорассуждению, где модели генерации видео работают под руководством vision-language моделей, выступающих в роли учителей. Вместо того чтобы использовать VLM для предварительного решения задачи и создания текстовых инструкций, авторы применяют их для формирования дифференцируемых наград, которые направляют оптимизацию модели генерации видео во время тестирования. Метод использует адаптивную оптимизацию через LoRA модуль для улучшения пространственно-временной логики генерируемых видеопоследовательностей и преодоления ограничений исходной модели. Экспериментальные результаты показывают значительное улучшение производительности на бенчмарках символического и общего видеорассуждения в сравнении с существующими подходами.'}, 'en': {'title': 'Transforming VLMs into Teachers for Enhanced Video Reasoning', 'desc': "This paper introduces a new approach to video reasoning by using Vision-Language Models (VLMs) as teachers instead of solvers. The VLMs provide differentiable rewards that guide Video Generation Models (VGMs) during the reasoning process, allowing for better adherence to task-specific rules. This method enhances the VGMs' ability to generate coherent visual outputs by optimizing their performance in real-time. The results show significant improvements in video reasoning tasks, demonstrating the effectiveness of this teacher-student paradigm in machine learning."}, 'zh': {'title': '将视觉语言模型转变为视频推理的教师', 'desc': '本论文提出了一种新方法，将视觉语言模型（VLMs）作为视频生成模型（VGMs）的“教师”，以提高视频推理性能。通过提取任务特定规则并制定可微分奖励，VLM教师能够在测试时优化VGM的推理过程。尽管VGMs在视觉质量上表现出色，但在理解和执行复杂指令时常常遇到困难，而VLMs则能有效评估过程约束和最终目标的实现。实验结果表明，该方法在视频推理基准测试中显著提高了性能，展示了VLM作为教师的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.29588', 'title': 'Brain-IT-VQA: From Brain Signals to Answers', 'url': 'https://huggingface.co/papers/2605.29588', 'abstract': 'Abstract Brain-IT-VQA framework decodes visual content from fMRI signals using transformer-based architecture and introduces NSD-VQA dataset for improved visual question answering evaluation.  AI-generated summary Decoding visual content from fMRI signals recorded while a person views images, and specifically answering questions about the seen images, is a long-standing challenge. While significant progress has been made in recent years in visual question answering (VQA) from fMRI, performance remains limited. Moreover, although recent models can make increasingly accurate predictions, they have rarely been used as tools for understanding the structure of visual representations in the brain. We present Brain-IT-VQA, a framework for visual question answering from fMRI. Building on the Brain Interaction Transformer (Brain-IT), our method decodes language tokens from brain activity and integrates them with a language model to answer visual questions. Our model substantially outperforms previous fMRI-based captioning and VQA approaches. We further introduce NSD-VQA, a new dataset and benchmark for visual question answering from fMRI. Unlike existing image-fMRI VQA datasets, which typically provide only a few broad and weakly controlled questions per image, NSD-VQA provides on average 20 question-answer pairs per image across 20 controlled question categories that disentangle multiple levels of visual understanding. This enables more reliable and interpretable evaluation despite limited fMRI test data. Together, Brain-IT-VQA and NSD-VQA provide both a strong predictive framework and a tool for studying brain representations. Using this benchmark, we quantify which forms of visual and semantic information can be reliably decoded from fMRI responses to natural images. We further analyze the contributions of different brain regions across question types.', 'score': 6, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'fa9291cf7e5a0742', 'authors': ['Roman Beliy', 'Matias Cosarinsky', 'Oliver Heinimann', 'Navve Wasserman', 'Michal Irani'], 'affiliations': ['Weizmann Institute of Science'], 'pdf_title_img': 'assets/pdf/title_img/2605.29588.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#dataset', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Декодирование визуальных вопросов прямо из активности мозга', 'desc': 'В работе представлена архитектура Brain-IT-VQA для ответа на вопросы о визуальном содержании на основе сигналов фМРТ мозга, используя трансформер и механизм декодирования языковых токенов из активности мозга. Авторы вводят новый датасет NSD-VQA с контролируемыми вопросами к изображениям, который содержит в среднем 20 вопросо-ответных пар на одно изображение и охватывает 20 категорий вопросов. Предложенный подход значительно превосходит предыдущие методы в задаче визуального вопросно-ответного поиска и позволяет надежнее и интерпретируемее оценивать модели несмотря на ограниченные данные фМРТ. Фреймворк служит как мощный инструмент для изучения структуры визуальных представлений в мозге и количественной оценки того, какая визуальная и семантическая информация может быть декодирована из сигналов фМРТ.'}, 'en': {'title': 'Decoding Brain Signals for Visual Question Answering', 'desc': 'The Brain-IT-VQA framework utilizes a transformer-based architecture to decode visual content from fMRI signals, enabling effective visual question answering (VQA). It introduces the NSD-VQA dataset, which offers a more comprehensive set of question-answer pairs for evaluating VQA performance, enhancing the understanding of visual representations in the brain. This approach significantly improves upon previous methods by integrating language tokens derived from brain activity with a language model for accurate responses. The framework not only advances predictive capabilities but also serves as a tool for analyzing how different brain regions contribute to visual and semantic processing.'}, 'zh': {'title': '解码大脑视觉内容的创新框架', 'desc': 'Brain-IT-VQA框架利用基于变换器的架构，从fMRI信号中解码视觉内容，并引入NSD-VQA数据集以改进视觉问答评估。该方法通过分析大脑活动解码语言标记，并与语言模型结合，以回答关于所见图像的问题。尽管在视觉问答方面取得了显著进展，但性能仍然有限，Brain-IT-VQA显著优于以往的fMRI图像描述和问答方法。NSD-VQA数据集提供了更丰富的问题-答案对，使得评估更加可靠和可解释。'}}}, {'id': 'https://huggingface.co/papers/2605.25659', 'title': 'StreamChar: Long-Horizon Streaming Character Audio-Video Generation with Decoupled Orchestration', 'url': 'https://huggingface.co/papers/2605.25659', 'abstract': 'Abstract StreamChar enables real-time streaming audio-video generation for character animation by separating long-horizon orchestration from short-window denoising through an LLM-based orchestrator and joint audio-video DiT, achieving efficient deployment via two-stage distillation and maintaining visual consistency through memory mechanisms.  AI-generated summary Real-time streaming joint audio-video generation for character animation requires a generator to speak the requested transcript, maintain visual identity across chunks, and run within a strict playback budget. These requirements are difficult to satisfy simultaneously: chunk-wise autoregressive generation can accumulate transcript-audio misalignment and visual drift, while the few-step distillation needed for low latency often degrades spatial diversity and temporal quality. We present StreamChar, a streaming framework that separates long-horizon orchestration from short-window audio-video denoising. An LLM-based orchestrator uses the transcript and historical context to produce frame-aligned audio conditions, and a joint audio-video DiT performs local bidirectional denoising with reference and motion-frame conditioning. For efficient deployment, we use a two-stage distillation pipeline that first compresses the sampler and then fine-tunes the student under online chunk rollouts. A progress-aware pointer aligns partial transcripts with generated audio during rollout training, and a sink-chunk memory provides a persistent visual anchor for reducing long-horizon drift. Experiments on short-clip and long-horizon protocols show that StreamChar runs in real time on a single H100 GPU and provides a favorable system-level trade-off among transcript fidelity, audio-visual synchronization, visual quality, and streaming stability compared with recent joint and audio-driven baselines.', 'score': 5, 'issue_id': 2358, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '6a4a1a053bf3a718', 'authors': ['Linrui Tian', 'Qi Wang', 'Bang Zhang'], 'affiliations': ['Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.25659.jpg', 'data': {'categories': ['#architecture', '#training', '#video', '#audio', '#inference', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Оркестрированная потоковая генерация синхронизированного видео персонажей в реальном времени', 'desc': 'StreamChar — это система для потоковой генерации синхронизированного аудио и видео персонажей в реальном времени. Архитектура разделяет задачу на два компонента: LLM-оркестратор управляет долгосрочной согласованностью текста и аудио, а совместная диффузионная модель (DiT) выполняет локальную двусторонню денойзацию аудио-видео. Для эффективного развёртывания применяется двухэтапная дистилляция, которая сначала сжимает sampler, а затем fine-tune студента на онлайн-потоках. Механизм памяти sink-chunk обеспечивает визуальную консистентность и предотвращает накопление артефактов при длительной генерации.'}, 'en': {'title': 'StreamChar: Real-Time Audio-Video Generation for Character Animation', 'desc': 'StreamChar is a framework designed for real-time generation of audio and video for character animation. It effectively separates the long-term planning of audio-video synchronization from the short-term refinement of audio and video quality. By using a large language model (LLM) to orchestrate audio conditions and a joint audio-video diffusion model (DiT) for denoising, it maintains visual consistency and reduces misalignment. The system achieves efficient performance through a two-stage distillation process and innovative memory mechanisms, ensuring high-quality output even under strict playback constraints.'}, 'zh': {'title': '实时音视频生成的创新框架', 'desc': 'StreamChar 是一种实时音视频生成框架，专注于角色动画的生成。它通过将长时间的协调与短时间的去噪分开，使用基于大语言模型的协调器和联合音视频去噪技术来实现高效部署。该框架利用两阶段蒸馏管道来压缩生成器，并通过进度感知指针和记忆机制来保持视觉一致性。实验表明，StreamChar 在单个 H100 GPU 上实时运行，并在转录保真度、音视频同步、视觉质量和流媒体稳定性方面表现优越。'}}}, {'id': 'https://huggingface.co/papers/2605.24202', 'title': 'When Does Multi-Agent RL Improve LLM Workflows? Workflow, Scale, and Policy-Sharing Tradeoffs', 'url': 'https://huggingface.co/papers/2605.24202', 'abstract': 'Abstract Multi-agent large language model workflows trained with reinforcement learning show improved accuracy over base models, but performance varies significantly based on workflow type, task, and model scale, with isolated and shared policy training exhibiting distinct failure patterns due to gradient dynamics and role interactions.  AI-generated summary Multi-agent LLM workflows route inference through specialized roles to lift end-task accuracy, but jointly training those roles with reinforcement learning is unstable in ways that are poorly understood. We study when end-to-end RL training of multi-agent LLM workflows improves over their base models, comparing Shared-Policy training, where all roles update one policy, with Isolated-Policy training, where each role has its own parameters. Our experimental matrix spans Eval-Opt, Voting, and Orch-Workers workflows, math and code tasks, and three model scales (0.6B, 1.7B, 4B). We find that multi-agent RL usually improves over base models, but gains depend jointly on workflow, task, and scale, not on policy sharing alone. Isolated-Policy tends to reach higher peak accuracy yet more often falls off a terminal accuracy cliff, while Shared-Policy training does not eliminate failure; it redistributes failure into qualitatively different patterns. We then explain the strongest of these patterns through role-level gradient dynamics induced by workflow topology and policy routing: under Isolated-Policy, parallel same-role agents on shared prompts amplify per-role gradients and drive terminal degradation in Voting and Orch-Workers workflows; under Shared-Policy, asymmetric per-step gradient mass causes the shared policy to be captured by the dominant role, producing different failure signatures by task and workflow. Together, the empirical map and its underlying mechanisms show that policy sharing routes training pressure through different channels rather than offering uniform stability, making it a design choice with workflow- and task-conditional tradeoffs.', 'score': 5, 'issue_id': 2358, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'd6529136b8f345a4', 'authors': ['Yifan Zeng', 'Yiran Wu', 'Yaolun Zhang', 'Wentian Zhao', 'Kun Wan', 'Qingyun Wu', 'Huazheng Wang'], 'affiliations': ['AG2AI, Inc.', 'Adobe Inc.', 'Oregon State University', 'Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.24202.jpg', 'data': {'categories': ['#training', '#reasoning', '#optimization', '#agents', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Совместное обучение многоагентных LLM: компромисс между общей и изолированной политиками', 'desc': 'Исследование показывает, что многоагентные рабочие процессы на основе больших языковых моделей, обученные с помощью обучения с подкреплением, улучшают точность по сравнению с исходными моделями, но результаты сильно зависят от типа рабочего процесса, задачи и масштаба модели. Авторы сравнивают два подхода: обучение с общей политикой, где все роли обновляют одну политику, и обучение с изолированной политикой, где каждая роль имеет свои параметры. Изолированная политика часто достигает более высокой точности, но более подвержена внезапному снижению производительности, тогда как общая политика перераспределяет сбои в различные паттерны. Анализ градиентной динамики показывает, что выбор способа обучения политики создаёт различные каналы прохождения тренировочного давления, что делает его дизайн-решением с компромиссами, зависящими от конкретного рабочего процесса и задачи.'}, 'en': {'title': 'Navigating Multi-Agent Training: Balancing Accuracy and Stability', 'desc': 'This paper investigates how multi-agent large language models (LLMs) can be trained using reinforcement learning (RL) to improve their accuracy on various tasks. It compares two training methods: Shared-Policy, where all agents share a single policy, and Isolated-Policy, where each agent has its own policy. The study finds that while multi-agent RL generally enhances performance, the effectiveness depends on the specific workflow, task, and model size, rather than just the policy sharing method. The authors also reveal that different training approaches lead to unique failure patterns due to the dynamics of gradient updates influenced by the roles and interactions within the workflow.'}, 'zh': {'title': '多智能体模型的策略共享与性能提升', 'desc': '这篇论文研究了多智能体大语言模型（LLM）在强化学习下的工作流程。研究发现，不同的工作流程、任务和模型规模会显著影响模型的性能。论文比较了共享策略训练和孤立策略训练的效果，发现孤立策略通常能达到更高的准确率，但更容易出现性能下降。作者还分析了不同策略下的梯度动态，揭示了策略共享如何影响训练的稳定性和失败模式。'}}}, {'id': 'https://huggingface.co/papers/2605.30852', 'title': 'Speculative Pipeline Decoding: Higher-Accruacy and Zero-Bubble Speculation via Pipeline Parallelism', 'url': 'https://huggingface.co/papers/2605.30852', 'abstract': "Abstract Speculative Pipeline Decoding introduces a novel framework that leverages pipeline parallelism to accelerate large language model inference by enabling parallel token processing and reducing decoding latency.  AI-generated summary Speculative Decoding (SD) accelerates low-concurrency LLM inference by employing a draft-then-verify paradigm. However, mainstream methods typically rely on multi-token prediction, which introduces escalating prediction difficulty and serial drafting latency. To address these, we propose Speculative Pipeline Decoding (SPD), a groundbreaking framework that unlocks the true potential of pipeline parallelism. By partitioning the target LLM into n pipeline stages, SPD allows LLM to process n tokens in parallel to accelerate decoding. To continuous fill the pipeline in single sequence decoding, a speculation module aggregates intermediate features across different pipeline depths to predict the next token, executing strictly in parallel with the target model's pipeline step, to realize bounded difficulty, higher acceptance rates, and zero latency bubbles. Our experiments demonstrate that SPD achieves a significantly higher theoretical speedup compared to mainstream baselines, offering a highly scalable solution for LLM decoding acceleration. Our code is available at https://github.com/yuyijiong/speculative_pipeline_decoding", 'score': 4, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'add0d2b13d132a33', 'authors': ['Yijiong Yu', 'Huazheng Wang', 'Shuai Yuan', 'Ruilong Ren', 'Ji Pei'], 'affiliations': ['DeepSolution', 'Oregon State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30852.jpg', 'data': {'categories': ['#inference'], 'emoji': '⚡', 'ru': {'title': 'Параллельное конвейерное декодирование для ускорения инференса LLM', 'desc': 'В работе представлен метод Speculative Pipeline Decoding, который ускоряет инференс больших языковых моделей путем применения конвейерного параллелизма. Основная идея заключается в разделении модели на n стадий конвейера, позволяя обрабатывать n токенов параллельно вместо последовательной генерации. Модуль спекуляции агрегирует промежуточные представления с разных глубин конвейера для предсказания следующего токена, работая синхронно с основной моделью без задержек. Экспериментальные результаты показывают значительное улучшение теоретического ускорения по сравнению с существующими методами спекулятивного декодирования.'}, 'en': {'title': 'Accelerating LLM Inference with Speculative Pipeline Decoding', 'desc': 'The paper presents Speculative Pipeline Decoding (SPD), a new method to speed up the inference of large language models (LLMs) by using pipeline parallelism. SPD allows multiple tokens to be processed simultaneously, which reduces the time it takes to generate text. It introduces a speculation module that predicts the next token while the model is still working on the current one, minimizing delays. Experimental results show that SPD significantly outperforms existing methods, making it a promising approach for faster LLM decoding.'}, 'zh': {'title': '投机管道解码：加速大型语言模型的创新框架', 'desc': '本文提出了一种新的框架，称为投机管道解码（SPD），旨在加速大型语言模型的推理过程。通过管道并行性，SPD能够实现并行处理多个令牌，从而减少解码延迟。该方法通过将目标语言模型分成多个管道阶段，使得每个阶段可以同时处理多个令牌，提升了解码效率。实验结果表明，SPD在理论上比主流方法具有显著的加速效果，是一种高度可扩展的解码加速解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.02277', 'title': 'RoboSemanticBench: Diagnosing Semantic Grounding in Action Prediction for VLA Models', 'url': 'https://huggingface.co/papers/2606.02277', 'abstract': 'Abstract RoboSemanticBench identifies a disconnect between semantic understanding and action prediction in vision-language-action models, where robots can grasp objects but fail to select semantically correct targets.  AI-generated summary Vision-language-action (VLA) models are built on the premise that semantic understanding from pretrained language or vision-language backbones should guide robot action prediction. Yet robot fine-tuning is optimized as imitation over task-specific action distributions, and many evaluations can be solved through visual or instruction-action shortcuts. We introduce RoboSemanticBench (RSB), an embodied benchmark for diagnosing semantic grounding in action prediction: whether post-trained VLA models can use complex instruction semantics to select and manipulate the correct physical target. In each episode, a robot receives a multiple-choice math or general-knowledge question, observes candidate answer blocks, and must grasp the block corresponding to the correct answer. RSB covers controlled arithmetic, grade-school mathematical understanding, and commonsense or factual understanding under four-choice and ten-choice suites. Across representative VLA models, we find that many policies learn to grasp candidate blocks but select the semantically correct block at near-random or below-random rates after controlling for grasp success, revealing a persistent gap between backbone-level semantic competence and action prediction.', 'score': 3, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd4622771224a74e7', 'authors': ['Bin Yu', 'Yao Zhang', 'Haishan Liu', 'Shijie Lian', 'Yuliang Wei', 'Xiaopeng Lin', 'Zhaolong Shen', 'Changti Wu', 'Ruina Hu', 'Bailing Wang', 'Cong Huang', 'Kai Chen'], 'affiliations': ['BUAA', 'DeepCybo', 'ECNU', 'HIT', 'HKUST(GZ)', 'HUST', 'WHU', 'ZGCA', 'ZGCI'], 'pdf_title_img': 'assets/pdf/title_img/2606.02277.jpg', 'data': {'categories': ['#robotics', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Семантическое понимание против практического действия в роботике', 'desc': 'Статья представляет RoboSemanticBench — бенчмарк для оценки семантического понимания в моделях vision-language-action, которые обучают роботов выполнять действия на основе визуальных и текстовых инструкций. Авторы выявили проблему: несмотря на то, что такие модели хорошо захватывают объекты, они часто не могут выбрать семантически правильную цель из нескольких вариантов. Бенчмарк требует от робота отвечать на вопросы (математические и общие знания), наблюдая кандидаты-блоки и хватая блок с правильным ответом. Исследование показало, что современные VLA модели часто решают задачу случайно, указывая на разрыв между семантическими способностями предварительно обученных моделей и качеством предсказания действий.'}, 'en': {'title': 'Bridging the Gap: Semantic Understanding vs. Action Prediction in Robots', 'desc': 'The paper introduces RoboSemanticBench (RSB), a benchmark designed to evaluate how well vision-language-action (VLA) models can understand semantics when predicting actions. It highlights a significant issue where robots can physically grasp objects but often fail to choose the semantically correct ones based on complex instructions. The study shows that many VLA models, despite being trained on language and vision data, struggle with semantic grounding in action prediction, often selecting answers at random. RSB tests robots on tasks involving math and general knowledge, revealing a gap between their semantic understanding and their ability to act correctly based on that understanding.'}, 'zh': {'title': '语义理解与行动预测的差距', 'desc': 'RoboSemanticBench（RSB）是一个用于诊断视觉-语言-行动（VLA）模型在行动预测中语义理解的基准。研究发现，尽管机器人能够抓取物体，但在选择语义上正确的目标时却存在困难。RSB通过让机器人回答多项选择题来评估其是否能够利用复杂的指令语义来选择和操作正确的物理目标。结果显示，许多模型在抓取候选块时表现良好，但在选择语义正确的块时的成功率接近随机，表明语义能力与行动预测之间存在明显差距。'}}}, {'id': 'https://huggingface.co/papers/2606.00828', 'title': 'RoboStressBench: Benchmarking VLM Robustness to Physical Visual Stress in Embodied Scenes', 'url': 'https://huggingface.co/papers/2606.00828', 'abstract': 'Abstract RoboStressBench presents a principled benchmark for evaluating vision-language model robustness to physical visual stress in embodied AI, decomposing visual stress into material, viewpoint, lighting, and geometry dimensions.  AI-generated summary Vision-Language Models (VLMs) have shown strong visual understanding and are increasingly deployed in embodied AI systems, where reliable perception under real conditions is essential. However, existing benchmarks assess VLMs using clean images or isolated perturbations rather than stresses caused by physical scene formation. This design has two limitations: it covers only a narrow subset of everyday visual stresses, and some perturbations rarely appear in realistic embodied scenes. This gap raises a fundamental question: how can we define visual stress in a principled way that captures the diverse factors encountered in physical environments? To address this question, we formulate visual perception from an inverse graphics perspective and introduce RoboStressBench, a benchmark for evaluating VLM robustness to physical visual stress in embodied scenes. Inspired by the physical rendering equation, RoboStressBench decomposes visual stress into four physically grounded dimensions: Material (M), Viewpoint (V), Lighting (L), and Geometry (G). This design enables RoboStressBench to cover a broad range of visual stresses in real-world environments, while allowing controlled analysis of their effects on VLM capabilities such as visual recognition, reasoning, and planning. Through comprehensive evaluations of state-of-the-art VLMs, we
