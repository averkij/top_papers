 large language models (LLMs). Traditional methods struggle to identify hidden knowledge in the model's internal representations, making it hard to verify if sensitive information has been erased. UDS addresses this by measuring the depth of unlearning through activation patching, providing a score that indicates how much target knowledge has been eliminated. In extensive evaluations, UDS outperforms existing metrics in terms of reliability and robustness, offering a more accurate tool for auditing unlearning processes in AI models."}, 'zh': {'title': '去学习深度分数：评估知识移除的有效工具', 'desc': '本文提出了一种新的指标，称为去学习深度分数（UDS），用于评估大型语言模型中知识被移除的彻底程度。传统方法无法检测内部表示中的隐藏知识，而UDS通过激活补丁技术量化去学习的机制深度。UDS首先识别编码目标知识的层，然后在去学习模型中测量这些知识被擦除的程度，结果以0到1的比例表示。通过对150个去学习模型的20个指标进行元评估，UDS在可信度和稳健性方面表现最佳，证明了我们的方法在去学习评估中的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2606.01682', 'title': 'Off-the-Shelf LLMs as Process Scorers: Training-Free Alternative to PRMs for Mathematical Reasoning', 'url': 'https://huggingface.co/papers/2606.01682', 'abstract': "Abstract Chunk-Level Guided Generation uses a large language model as a process scorer to select fixed-length candidate chunks during small model generation, improving reasoning accuracy over traditional methods like majority voting and PRM guided search.  AI-generated summary Selecting the best response from multiple small-model samples using a stronger scorer is a simple inference-time strategy, but fails when the small model has already committed to incorrect reasoning paths. PRM guided search avoids this by scoring candidate continuations during generation, but requires a reward model trained with step-level labels.   We propose Chunk-Level Guided Generation, a training-free alternative that uses an off-the-shelf large language model as a process scorer. At each step, a small model samples k fixed-length candidate chunks, while the larger model scores the candidates using likelihoods without generating any text. The selected chunk is committed before the next step, steering generation before errors can propagate.   We instantiate this framework with two selection rules: Likelihood-Guided Selection (LGS), which selects the chunk with the highest length-normalized large-model log-probability, and Contrastive-Guided Selection (CGS), which subtracts the small model's log-probability to favor chunks where the large model's preference diverges from the small model's. We show that scoring variable-length reasoning steps with large-model likelihoods is unreliable due to a systematic length bias that persists even after length normalization, and that fixed-length chunks avoid this confound.   On GSM8K, MATH, Minerva Math, AMC23, and AIME24 with Qwen2.5-1.5B guided by Qwen2.5-32B and Llama-3.2-1B guided by Llama-3.1-70B, CGS outperforms majority voting by up to 28 pp and, under matched guidance budgets, matches or outperforms Qwen2.5-Math-PRM-72B guided search on most benchmarks without reward-model training. With Qwen2.5-7B guided by Qwen2.5-72B, CGS reaches 81.8% on MATH and 63.6% on Minerva Math at k=16, surpassing majority voting by 4--6 pp. Finally, Chunk-Level Guided Generation produces substantially shorter reasoning traces than PRM guided search.", 'score': 3, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '83f46ca5403a980f', 'authors': ['Atoosa Chegini', 'Soheil Feizi'], 'affiliations': ['Department of Computer Science, University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2606.01682.jpg', 'data': {'categories': ['#math', '#small_models', '#reasoning', '#optimization', '#inference'], 'emoji': '🎯', 'ru': {'title': 'Направление генерации маленькой модели через оценку больших моделей без обучения', 'desc': 'В статье предлагается метод Chunk-Level Guided Generation, который использует большую языковую модель в качестве оценщика процесса для направления генерации текста маленькой моделью без необходимости обучения. На каждом шаге маленькая модель генерирует k кандидатов фиксированной длины, а большая модель оценивает их, используя логарифмические вероятности, без генерации текста. Предлагаются два правила отбора: Likelihood-Guided Selection выбирает кандидат с наивысшей нормализованной вероятностью, а Contrastive-Guided Selection учитывает разницу между предпочтениями большой и маленькой моделей. Экспериментальные результаты показывают, что метод превосходит majority voting на 28% и конкурирует с методами, требующими обучения reward-модели, при этом производя более короткие цепочки рассуждений.'}, 'en': {'title': 'Guiding Small Models with Large Model Insights', 'desc': 'Chunk-Level Guided Generation is a novel approach that enhances the reasoning accuracy of small language models by using a larger language model as a process scorer. Instead of relying on traditional methods like majority voting, this technique samples fixed-length candidate chunks and scores them based on their likelihoods, steering the generation process before errors can propagate. The method introduces two selection rules: Likelihood-Guided Selection (LGS) and Contrastive-Guided Selection (CGS), which help in choosing the best chunk based on the preferences of the larger model. This approach has shown significant improvements in performance on various benchmarks without the need for reward model training, producing shorter reasoning traces compared to previous methods.'}, 'zh': {'title': '块级引导生成：提升推理准确性的创新方法', 'desc': '这篇论文提出了一种新的生成方法，称为块级引导生成（Chunk-Level Guided Generation），它利用大型语言模型作为过程评分器来选择固定长度的候选块，从而提高推理的准确性。与传统的多数投票和PRM引导搜索方法相比，这种方法在生成过程中避免了错误的传播。论文中介绍了两种选择规则：基于似然的选择（LGS）和对比引导选择（CGS），后者通过比较小模型和大模型的偏好来选择块。实验结果表明，块级引导生成在多个基准测试中表现优于多数投票，并且生成的推理轨迹明显更短。'}}}, {'id': 'https://huggingface.co/papers/2606.01057', 'title': '3DCodeBench: Benchmarking Agentic Procedural 3D Modeling Via Code', 'url': 'https://huggingface.co/papers/2606.01057', 'abstract': 'Abstract Vision-language models are evaluated for procedural 3D modeling tasks through a benchmark and ranking platform that assess their ability to translate text and images into executable 3D code.  AI-generated summary Procedural 3D modeling through code is emerging as a versatile paradigm, offering deterministic, engine-ready, and precisely editable assets that neural 3D generators inherently lack. Authoring such procedural content, however, demands deep expertise in 3D software APIs, parametric design, and code-level geometric reasoning. In this paper, we propose 3DCodeBench, a systematic benchmark for evaluating vision-language model (VLM) agents for procedural 3D generation in 3D modeling software. Specifically, 3DCodeBench evaluates how effectively 12 advanced VLMs can serve as procedural 3D modelers by translating text and image references into procedural code for 3D modeling software. Recognizing that automated metrics may not fully capture the perceptual quality of 3D shapes, we build 3DCodeArena, a ranking platform based on pairwise human preferences over generated 3D outputs. From extensive evaluations and results, we observe that: (1) Failures mostly arise from API mismatches, while successful renders still suffer from disconnected or floating 3D geometric components. (2) Test-time scaling, such as higher thinking budgets and multi-turn refinement, improves performance overall. Our findings highlight a critical need for high-quality procedural coding data to advance commercial VLMs. Furthermore, effective procedural 3D modeling requires a robust execution environment that provides high-fidelity feedback for iterative refinement. We release 3DCodeBench, including the curated large-scale dataset of multimodal (text/image) prompts, procedural code, 3D object triplets, evaluation protocol, and the public 3DCodeArena platform as a foundational toolkit for exploring VLM-based procedural 3D modelers.', 'score': 3, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'a2d9d916825dc866', 'authors': ['Yipeng Gao', 'Lei Shu', 'Genzhi Ye', 'Xi Xiong', 'Ameesh Makadia', 'Meiqi Guo', 'Laurent Itti', 'Jindong Chen'], 'affiliations': ['Google DeepMind', 'Google Research', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2606.01057.jpg', 'data': {'categories': ['#3d', '#dataset', '#benchmark', '#cv', '#agents', '#open_source', '#multimodal'], 'emoji': '🏗️', 'ru': {'title': 'От слов к коду: vision-language модели как процедурные 3D-модельеры', 'desc': 'Авторы представляют 3DCodeBench — бенчмарк для оценки способности vision-language моделей (VLM) генерировать процедурный 3D-код на основе текстовых описаний и изображений. Работа включает систематическое тестирование 12 продвинутых VLM-агентов и платформу 3DCodeArena, которая использует оценку человеком для ранжирования сгенерированных 3D-моделей через попарное сравнение. Исследование выявило, что основные ошибки возникают из-за несовместимости API, а успешные модели часто содержат несвязные геометрические компоненты; улучшения достигаются через масштабирование на этапе тестирования и итеративное уточнение. Авторы подчеркивают необходимость в высокачественных данных для обучения VLM процедурному 3D-моделированию и выпускают полный набор ресурсов, включая датасет с мультимодальными запросами и оценочный протокол.'}, 'en': {'title': 'Empowering 3D Modeling with Vision-Language Models', 'desc': 'This paper introduces 3DCodeBench, a benchmark designed to evaluate vision-language models (VLMs) for procedural 3D modeling tasks. It assesses how well these models can convert text and images into executable 3D code, addressing the challenges of API mismatches and geometric integrity in generated models. The study also highlights the importance of human preference in evaluating 3D outputs through the 3DCodeArena platform. Overall, the findings emphasize the need for high-quality procedural coding data and a supportive execution environment to enhance the capabilities of VLMs in 3D modeling.'}, 'zh': {'title': '程序化3D建模的新标准', 'desc': '本文提出了3DCodeBench，这是一个系统的基准测试平台，用于评估视觉-语言模型在程序化3D建模中的表现。该平台通过将文本和图像转换为可执行的3D代码，来测试12个先进模型的能力。研究发现，模型在生成3D形状时常常面临API不匹配的问题，并且成功的渲染结果仍可能存在几何组件不连通或漂浮的情况。为了提高模型性能，测试时的扩展策略，如增加思考预算和多轮优化，显示出显著的效果。'}}}, {'id': 'https://huggingface.co/papers/2605.29992', 'title': 'Adapting Multilingual Embedding Models to Turkish via Cross-Lingual Tokenizer Surgery and Offline Distillation', 'url': 'https://huggingface.co/papers/2605.29992', 'abstract': "Abstract A Turkish-focused sentence embedding model is developed through efficient adaptation techniques, achieving superior performance with reduced computational costs compared to larger teacher models.  AI-generated summary Sentence embeddings are a foundational component for semantic search, clustering, classification, and retrieval-augmented generation. This paper presents embeddingmagibu-200m, a Turkish-focused sentence embedding model that produces 768-dimensional L2-normalized vectors and supports an 8,192-token context window, far exceeding the 512-token limit of earlier BERT-based Turkish encoders. Instead of full pretraining, an efficient three-stage adaptation pipeline is introduced: (1) construct a Turkish-optimized multilingual tokenizer with a 131,072 vocabulary by pruning redundant tokens from the teacher's vocabulary and incorporating multilingual tokens via frequency analysis on a 40-language corpus, (2) clone a teacher embedding model while preserving transformer backbone weights and initializing a compatible embedding table for the new vocabulary via mean-composition token mapping, and (3) perform offline embedding distillation from precomputed teacher vectors using a cosine similarity objective over a balanced 40-language Wikipedia corpus. The resulting student model contains approximately 200M parameters and trains in roughly four hours on a single GPU by avoiding online teacher inference during training, at a total cost of 5-20. Empirically, Pearson/Spearman correlations of 77.55%/77.45% are obtained on STSbTR, surpassing the 300M-parameter teacher model (73.84%/72.92%). On TR-MTEB (26 tasks), a mean score of 63.9% is achieved (7th out of 26 models), providing a competitive cost-quality trade-off with 33% fewer parameters than the teacher. To facilitate reproducibility and downstream use, all artifacts are released including model weights, tokenizer files, precomputed embedding datasets, and open-source cloning and distillation tooling.", 'score': 3, 'issue_id': 2359, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '9cc0ed0c287be5e3', 'authors': ['M. Ali Bayram', 'Banu Diri', 'Savaş Yıldırım'], 'affiliations': ['Istanbul Bilgi University', 'Yıldız Technical University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29992.jpg', 'data': {'categories': ['#transfer_learning', '#open_source', '#training', '#rag', '#multilingual', '#small_models', '#low_resource', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Эффективная адаптация: мощные embeddings с меньшими затратами', 'desc': 'В статье представлена модель embeddings для турецкого языка, разработанная с использованием эффективных методов адаптации вместо полного переобучения. Авторы применили трёхэтапный pipeline: оптимизация многоязычного токенизатора, клонирование весов преподавателя с инициализацией таблицы эмбеддингов и дистилляция знаний через cosine similarity на корпусе Википедии. Результирующая модель с 200M параметров достигает лучших результатов чем учитель на 300M параметров, обучаясь всего 4 часа на одном GPU с минимальными вычислительными затратами. Модель поддерживает контекстное окно в 8,192 токена и превосходит старые BERT-модели для турецкого языка, обеспечивая оптимальный баланс между качеством и стоимостью.'}, 'en': {'title': 'Efficient Turkish Sentence Embeddings: Less is More!', 'desc': 'This paper introduces embeddingmagibu-200m, a Turkish-focused sentence embedding model that efficiently adapts existing techniques to achieve high performance with fewer resources. It generates 768-dimensional vectors and supports a larger context window of 8,192 tokens, improving upon previous models limited to 512 tokens. The model is trained using a three-stage adaptation process that includes creating a specialized tokenizer, cloning a teacher model, and performing offline embedding distillation. The results show that this model outperforms larger teacher models in terms of accuracy while significantly reducing computational costs, making it a valuable tool for various natural language processing tasks.'}, 'zh': {'title': '高效土耳其语句子嵌入模型的创新之路', 'desc': '本文提出了一种专注于土耳其语的句子嵌入模型embeddingmagibu-200m，采用高效的适应技术，显著降低了计算成本。该模型生成768维的L2归一化向量，并支持8192个上下文窗口，超越了早期BERT基础的土耳其编码器的512个令牌限制。通过三阶段的适应流程，模型在训练时避免了在线教师推理，显著提高了训练效率。最终，该模型在多个任务上表现优异，提供了具有竞争力的成本与质量平衡。'}}}, {'id': 'https://huggingface.co/papers/2605.25381', 'title': 'Not only where, But when: Temporal Scheduling for RLVR', 'url': 'https://huggingface.co/papers/2605.25381', 'abstract': 'Abstract Temporal scheduling of credit allocation criteria in reinforcement learning with verifiable rewards improves policy evolution and learning stability by prioritizing targeted tokens and gradually shifting toward general optimization.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a core technique for post-training of Large Language Models (LLMs). While policy optimization is driven by all sampled tokens under a globally broadcast scalar reward, the heterogeneous policy behaviors exhibited along trajectories are largely overlooked without differentiation. Existing works address this by credit allocation, including token-level advantage reweighting, and selective token optimization, however, the allocation criterion are principally stagnant throughout training, limiting resilient policy evolution. In this work, we argue that when learning signals are scheduled can be as important as where they are allocated across tokens, and introduce the temporal dimension that scheduling the credit allocation criteria over the course of RLVR optimization. We find that prioritizing targeted tokens emphasized with specific policy behaviors, and gradually attenuating toward general optimization leads to more stable and efficient learning dynamics. Furthermore, we show that simple trajectory percentiles provide a natural perspective for distinguishing policy behaviors, and works effectively with temporal scheduling. Our analysis reveals that standard optimization substantially sacrifices policy entropy when simultaneously accommodating heterogeneous behaviors, whereas temporal scheduling yields healthier policy evolution dynamics. Experiments across mathematical and general reasoning benchmarks demonstrate consistent improvements, suggesting that temporal scheduling constitutes a promising optimization dimension.', 'score': 3, 'issue_id': 2358, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '6fba8874edc8f655', 'authors': ['Jinghao Zhang', 'Ruilin Li', 'Feng Zhao', 'Jiaqi Wang'], 'affiliations': ['JD.com', 'Shanghai Innovation Institute', 'University of Science and Technology of China', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.25381.jpg', 'data': {'categories': ['#rlhf', '#training', '#reasoning', '#optimization', '#rl'], 'emoji': '⏰', 'ru': {'title': 'Динамическое распределение сигналов обучения во времени для стабильной эволюции политики', 'desc': 'В этой работе предлагается метод временного планирования критериев распределения кредита при обучении с подкреплением на LLM. Авторы показывают, что распределение сигналов обучения во времени так же важно, как и их размещение по токенам в траектории. Они используют процентили траекторий для различения поведений политики и постепенно переходят от целевой оптимизации к общей. Эксперименты демонстрируют улучшенную стабильность обучения и здоровую динамику развития политики благодаря предложенному подходу.'}, 'en': {'title': 'Timing Matters: Enhancing Reinforcement Learning with Temporal Credit Allocation', 'desc': 'This paper introduces a new approach to reinforcement learning with verifiable rewards (RLVR) by focusing on the timing of credit allocation for different tokens during training. It emphasizes that not only where rewards are allocated matters, but also when they are given, which can enhance policy evolution and stability. By prioritizing specific tokens initially and then gradually shifting to a broader optimization, the learning process becomes more efficient and stable. The authors demonstrate that this temporal scheduling leads to better performance in various reasoning tasks, highlighting its potential as a valuable strategy in reinforcement learning.'}, 'zh': {'title': '时间调度提升强化学习的稳定性与效率', 'desc': '这篇论文探讨了在强化学习中，如何通过时间调度信用分配标准来改善策略演化和学习稳定性。研究表明，优先考虑特定的目标令牌，并逐渐转向一般优化，可以实现更稳定和高效的学习动态。作者提出，学习信号的调度时间与令牌的分配同样重要，并引入了时间维度来优化强化学习过程。实验结果显示，时间调度能够有效区分策略行为，并在数学和一般推理基准上取得了一致的改进。'}}}, {'id': 'https://huggingface.co/papers/2606.00090', 'title': 'Silent Failures in Physical AI: A Literature Review of Runtime Action Authorization for Autonomous Systems', 'url': 'https://huggingface.co/papers/2606.00090', 'abstract': 'Abstract Physical AI systems face safety challenges where black-box models can execute harmful actions without detection, necessitating comprehensive runtime guardrail mechanisms for safe operation.  AI-generated summary Physical AI systems increasingly map multimodal observations, language instructions, and learned world representations into physically consequential actions. Robotics foundation models, vision-language-action models, and world-model-based autonomous systems can condition decisions that move vehicles, robots, drones, and industrial machines. This transition exposes a safety problem that is not fully captured by conventional AI content moderation or by classical robot safety alone: a black-box model may issue a physically consequential action while appearing confident, plausible, and semantically aligned. The resulting failure can be silent, arising from sensor drift, occlusion, state-estimation error, distribution shift, hallucinated affordances, or invalid physical assumptions before downstream hardware controllers detect a violation.   Across embodied foundation models, world models, robotics simulation, embodied safety benchmarks, safe control, runtime assurance, uncertainty estimation, verification, and guardrail evaluation, model capability and safety mechanisms have advanced along largely separate technical tracks. A recurring gap synthesized here is that no single stream surveyed in this review supplies a complete runtime authorization boundary between black-box Physical AI models and physical execution. The resulting analysis develops a bounded problem formulation, a definition of silent physical-action failure, a taxonomy of runtime guardrail functions, and evaluation requirements for comparing guardrails as Physical AI assurance mechanisms.', 'score': 3, 'issue_id': 2359, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': '7d84a029a484f1f9', 'authors': ['Barak Or'], 'affiliations': ['STATE16'], 'pdf_title_img': 'assets/pdf/title_img/2606.00090.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#security', '#survey', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Защитные механизмы в реальном времени для безопасного выполнения физических действий AI-системами', 'desc': 'Статья посвящена критической проблеме безопасности физических AI-систем, которые управляют роботами, беспилотниками и автономными машинами. Авторы выявляют, что чёрные ящики моделей могут издавать опасные команды, кажущиеся уверенными и корректными, но на самом деле ошибочные из-за дрейфа датчиков, распределенного сдвига данных или некорректных предположений о физике. Работа предлагает классификацию механизмов runtime-защиты, которые должны создать полную границу авторизации между моделью и физическим исполнением команд. Исследование объединяет различные подходы от проверки неопределённости до формальной верификации в единый фреймворк для обеспечения безопасности физических AI-систем.'}, 'en': {'title': 'Ensuring Safety in Black-Box Physical AI Systems', 'desc': 'This paper addresses the safety challenges faced by Physical AI systems, which can take harmful actions without detection due to their black-box nature. It highlights the need for comprehensive runtime guardrail mechanisms to ensure safe operation when these systems translate multimodal inputs into physical actions. The authors identify a gap in existing safety measures, as traditional AI moderation and robot safety do not fully capture the risks posed by confident but erroneous actions from these models. The paper proposes a new framework for understanding silent physical-action failures and introduces a taxonomy of guardrail functions to enhance the safety of Physical AI systems.'}, 'zh': {'title': '确保物理人工智能安全的运行时保护机制', 'desc': '本文讨论了物理人工智能系统在安全性方面面临的挑战，尤其是黑箱模型可能在未被检测的情况下执行有害操作。随着物理人工智能系统将多模态观察、语言指令和学习的世界表示映射到实际行动中，安全问题变得更加复杂。传统的人工智能内容审核和经典机器人安全无法完全捕捉到这种风险，因为黑箱模型可能在看似自信的情况下发出具有物理后果的指令。文章提出了一种界定问题的框架，定义了静默物理行动失败，并建立了运行时保护机制的分类和评估要求。'}}}, {'id': 'https://huggingface.co/papers/2605.16745', 'title': 'EVA01: Unified Native 3D Understanding and Generation via Mixture-of-Transformers', 'url': 'https://huggingface.co/papers/2605.16745', 'abstract': 'Abstract EVA01 enables native 3D mesh integration in multimodal language models through a Mixture-of-Transformers architecture that aligns semantic and geometric manifolds for improved generation and editing capabilities.  AI-generated summary This paper addresses the challenge of integrating 3D meshes as a native modality within Multimodal Large Language Models (MLLMs). Diffusion-based large reconstruction models decouple semantic understanding from geometric reasoning, operating as stateless reconstructors conditioned on dense 2D pixel priors. Recent MLLM-based methods treat the 3D modality as an external output rather than a native component of the multimodal sequence, making incremental adaptations without a systematic analysis of how geometric manifolds align with MLLM feature spaces. We introduce EVA01, a unified framework that extends the modality boundary of MLLMs to natively incorporate 3D mesh understanding, generation, and context-aware editing. Built upon a Mixture-of-Transformers (MoT) architecture, EVA01 decouples the model into a pre-trained Understanding Expert (E_{und}) and a structurally mirrored Generation Expert (E_{gen}), coupled through shared global self-attention with hard modality routing. This design aligns the semantic latent space of the MLLM backbone with the geometric manifold, enabling direct transfer of multimodal priors without intermediate 2D representations. Results show that EVA01 achieves state-of-the-art native text-to-3D generation fidelity and unlocks robust long-context multi-turn geometric editing with identity preservation, a capability fundamentally inaccessible to stateless reconstruction pipelines. Our findings further offer architectural insights for integrating 2D foundation models with 3D tasks, informing the design of 3D-native multimodal systems. Project Page: https://www.seeles.ai/research/pages/EVA01', 'score': 3, 'issue_id': 2359, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '9dd40bc392d0f982', 'authors': ['Zongyuan Yang', 'Mingjing Yi', 'Wanli Ma', 'Chenzhuo Fan', 'Bocheng Li', 'Baolin Liu', 'Yuke Lou', 'Yingde Song', 'Yongping Xiong', 'Zhengdong Guo', 'Shimu Wang'], 'affiliations': ['seeles.ai'], 'pdf_title_img': 'assets/pdf/title_img/2605.16745.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#3d', '#diffusion', '#long_context'], 'emoji': '🎨', 'ru': {'title': 'Нативная интеграция 3D-сеток в мультимодальные языковые модели', 'desc': 'EVA01 — это фреймворк для интеграции 3D-меш данных как нативной модальности в мультимодальные языковые модели. Архитектура на основе Mixture-of-Transformers разделяет модель на эксперт понимания и эксперт генерации, которые совместно используют глобальное самовнимание с жёсткой маршрутизацией модальностей. Модель выравнивает семантическое пространство языковой модели с геометрическим многообразием 3D-объектов, позволяя напрямую передавать мультимодальные приоры без промежуточных 2D-представлений. Система достигает лучшей точности генерации текст-в-3D и впервые обеспечивает долгоконтекстное редактирование геометрии в несколько ходов с сохранением идентичности объекта.'}, 'en': {'title': 'Integrating 3D Meshes into Language Models for Enhanced Generation and Editing', 'desc': 'EVA01 is a new framework that allows 3D mesh data to be integrated directly into Multimodal Large Language Models (MLLMs). It uses a Mixture-of-Transformers architecture to connect semantic understanding with geometric reasoning, improving how these models generate and edit 3D content. By separating the model into two experts—one for understanding and one for generation—EVA01 can effectively manage both text and 3D data without relying on 2D images. This approach leads to better quality in text-to-3D generation and enables advanced editing capabilities that were not possible with previous methods.'}, 'zh': {'title': 'EVA01：将3D网格无缝集成到多模态模型中', 'desc': 'EVA01 是一个新的框架，旨在将 3D 网格作为多模态大语言模型（MLLMs）的原生部分进行集成。它采用混合变换器架构，能够将语义和几何流形对齐，从而提高生成和编辑的能力。通过将模型分为理解专家和生成专家，EVA01 实现了语义潜在空间与几何流形的直接对接，避免了中间的 2D 表示。实验结果表明，EVA01 在文本到 3D 的生成精度上达到了最先进的水平，并且能够进行长上下文的几何编辑，保持身份一致性。'}}}, {'id': 'https://huggingface.co/papers/2606.01336', 'title': 'LongAttnComp: Cross-Family Context Compression for Long-Context Reasoning', 'url': 'https://huggingface.co/papers/2606.01336', 'abstract': 'Abstract LongAttnComp adapts AttnComp for long-context processing by fine-tuning lightweight attention layers and implementing token-level chunking and positional reordering techniques.  AI-generated summary As real-world applications increasingly require processing inputs of 100k+ tokens, the gap between context length and inference efficiency has become a critical bottleneck. Context compression offers a way to reduce prefill costs while preserving task accuracy. However, existing training-free attention-based methods leave substantial gaps in demanding long-context tasks such as code reasoning. We present LongAttnComp, a long-context adaptation of AttnComp that fine-tunes a lightweight cross-attention scoring layer and introduces tokenlevel chunking, a token-budget top-p algorithm, positional reordering, and a formatagnostic query parser. We further design a two-stage fine-tuning recipe for the compressor: Stage 1 builds a general retrieval foundation from NIAH-style data, and Stage 2 extends it with multi-hop and reasoning data for broader long-context task coverage. On InfiniteBench Code-Debug, LongAttnComp matches or exceeds full-context accuracy, substantially outperforms training-free baselines, and transfers across four target models from three families. On LongBench v2, the two-stage recipe largely closes the Stage 1 gap on multi-document reasoning while preserving Code-Debug performance.', 'score': 2, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '0cfaf0a84abf9d05', 'authors': ['Mengmeng Ji', 'Ravi Shanker Raju', 'Jonathan Lingjie Li', 'Chen Wu'], 'affiliations': ['SambaNova Systems, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.01336.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#long_context'], 'emoji': '🔗', 'ru': {'title': 'Эффективная компрессия длинных контекстов через адаптивное внимание', 'desc': 'LongAttnComp — это метод адаптации механизма внимания для обработки длинных контекстов, который использует легкие слои кросс-внимания и техники разбиения токенов. Система применяет двухэтапное обучение: сначала на задачах поиска информации (NIAH), а затем на сложных задачах с многоэтапными рассуждениями и анализом кода. Метод достигает качества полного контекста при значительном снижении вычислительных затрат на префилл фазе, превосходя обучаемые безые базовые методы. Подход успешно переносится между различными большими языковыми моделями и показывает сильные результаты на бенчмарках InfiniteBench и LongBench.'}, 'en': {'title': 'Enhancing Long-Context Processing with LongAttnComp', 'desc': 'LongAttnComp is a novel approach designed to enhance the performance of attention mechanisms for processing long-context inputs, specifically those exceeding 100,000 tokens. It fine-tunes lightweight attention layers and employs techniques like token-level chunking and positional reordering to improve efficiency and accuracy. The method includes a two-stage fine-tuning process that first establishes a general retrieval foundation and then adapts it for complex reasoning tasks. Results show that LongAttnComp achieves or surpasses the accuracy of full-context models while significantly outperforming existing training-free methods in long-context scenarios.'}, 'zh': {'title': '长上下文处理的新突破', 'desc': 'LongAttnComp 是一种针对长上下文处理的模型，旨在通过微调轻量级注意力层和实现令牌级分块及位置重排序技术来提高效率。随着实际应用对处理超过 100,000 个令牌的需求增加，如何在上下文长度和推理效率之间取得平衡成为了一个关键问题。该模型通过上下文压缩来降低预填充成本，同时保持任务的准确性，特别是在代码推理等长上下文任务中表现出色。LongAttnComp 在多个模型上测试时，准确性与全上下文模型相当，且在多文档推理任务中也表现优异。'}}}, {'id': 'https://huggingface.co/papers/2606.00761', 'title': 'Confidence-Adaptive SwiGLU for Mixture-of-Experts', 'url': 'https://huggingface.co/papers/2606.00761', 'abstract': 'Abstract Confidence-Aware SwiGLU adjusts expert gate sharpness in Mixture-of-Experts models based on token-level routing confidence, improving performance with minimal computational overhead.  AI-generated summary SwiGLU has become a standard gated activation in modern Transformer MLPs, yet its gate sharpness -- the smoothness and selectivity of the gating function -- is typically fixed throughout training. In this work, we propose Confidence-Aware SwiGLU (κ-SwiGLU), a variant of SwiGLU for Mixture-of-Experts (MoE) models that adjusts expert gate sharpness according to token-level routing confidence. Specifically, κ-SwiGLU parameterizes the SiLU gate sharpness coefficient as a learnable function of the router logit, enabling each expert gate unit to interpolate between smooth, broadly active gating and sharp, selective gating. We evaluate κ-SwiGLU on the FineWeb-Edu dataset across MoE Transformer models ranging from 8 to 28 layers. Across these settings, κ-SwiGLU improves mean CORE performance while adding negligible parameters and incurring only a small computational overhead, demonstrating that confidence-aware gate sharpness is a promising mechanism for improving MoE MLPs. The code is available at https://github.com/askerlee/kappa-swiglu.', 'score': 2, 'issue_id': 2359, 'pub_date': '2026-05-30', 'pub_date_card': {'ru': '30 мая', 'en': 'May 30', 'zh': '5月30日'}, 'hash': 'd909f06c4893bf51', 'authors': ['Shaohua Li', 'Xiuchao Sui', 'Xiaobing Sun', 'Yuhang Wu', 'Liangli Zhen', 'Yong Liu', 'Rick Siow Mong Goh'], 'affiliations': ['Institute of High Performance Computing, Agency for Science, Technology and Research, Singapore', 'Shanghai University of Engineering Science, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.00761.jpg', 'data': {'categories': [], 'emoji': '🔀', 'ru': {'title': 'Уверенность маршрутизации как ключ к адаптивной резкости gating в MoE моделях', 'desc': 'Работа представляет Confidence-Aware SwiGLU (κ-SwiGLU) — модификацию функции активации SwiGLU для моделей типа Mixture-of-Experts, которая динамически настраивает резкость gating функции в зависимости от уверенности маршрутизации токенов. Вместо фиксированной резкости на протяжении всего обучения, предлагаемый метод делает коэффициент резкости функции SiLU обучаемым параметром, зависящим от логитов маршрутизатора. Это позволяет каждому экспертному модулю интерполировать между мягким, широко активным gating и острым, селективным gating. Эксперименты на датасете FineWeb-Edu показывают, что κ-SwiGLU улучшает производительность моделей с 8 до 28 слоёв, при этом добавляя минимальное количество параметров и вычислительных затрат.'}, 'en': {'title': 'Dynamic Gating for Smarter Expert Selection', 'desc': "This paper introduces Confidence-Aware SwiGLU (κ-SwiGLU), a new approach for adjusting the sharpness of expert gates in Mixture-of-Experts (MoE) models based on the confidence of token-level routing. Unlike traditional SwiGLU, which uses a fixed gating function, κ-SwiGLU allows the gate sharpness to be dynamically adjusted during training, enhancing the model's ability to select relevant experts. By parameterizing the gate sharpness as a learnable function of the router logit, κ-SwiGLU can switch between smooth and sharp gating strategies. The results show that κ-SwiGLU improves performance on the FineWeb-Edu dataset with minimal additional computational cost, highlighting its effectiveness in optimizing MoE Transformer models."}, 'zh': {'title': '自信感知的SwiGLU：提升混合专家模型的性能', 'desc': '本文提出了一种名为Confidence-Aware SwiGLU（κ-SwiGLU）的新型激活函数，旨在提高混合专家模型的性能。它通过根据每个token的路由信心动态调整专家门的锐度，使得模型在训练过程中能够更灵活地选择激活方式。κ-SwiGLU将SiLU门的锐度系数参数化为可学习的函数，从而实现平滑和选择性激活之间的插值。实验结果表明，κ-SwiGLU在多个层数的MoE Transformer模型上均能显著提升性能，同时增加的计算开销极小。'}}}, {'id': 'https://huggingface.co/papers/2606.00267', 'title': 'StressDream: Steering Video World Models for Robust Policy Evaluation and Improvement', 'url': 'https://huggingface.co/papers/2606.00267', 'abstract': 'Abstract StressDream enhances video world models by steering diffusion-based imaginations toward high-impact yet plausible outcomes through optimized noise initialization with semantic and plausibility objectives.  AI-generated summary Video world models (WMs) have shown promise for policy evaluation and improvement by imagining realistic future observations conditioned on ego-robot actions. While WMs can model distributions over futures, policy evaluation and improvement typically rely on nominal imaginations, which can miss high-impact outcomes of robot actions unless prohibitively many samples are drawn. To enable robust policy evaluation and improvement over WM imaginations, we propose StressDream, which steers imaginations toward high-impact yet plausible outcomes specified at inference time by optimizing the initial noise of diffusion-based WMs. However, optimizing high-dimensional noise is challenging: the optimization must reason about nuanced, scene-dependent target events in generated videos while avoiding out-of-distribution (OOD) noise that yields implausible imaginations. We address this with two complementary objectives: a semantic objective with a Vision-Language Model that provides informative gradients by reasoning about the generated video, and a plausibility objective that prevents the optimized noise from drifting OOD. With state-of-the-art video world models for autonomous driving and robotic manipulation, we show that StressDream effectively steers imaginations toward high-impact yet plausible outcomes specified by text at inference time, such as task failures, enabling robust policy evaluation and improvement by identifying actions whose plausible futures include undesirable outcomes. Video results are available at https://junwon.me/StressDream/.', 'score': 2, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'b1ce6dfd5cab1ae3', 'authors': ['Junwon Seo', 'Sushant Veer', 'Ran Tian', 'Wenhao Ding', 'Apoorva Sharma', 'Karen Leung', 'Edward Schmerling', 'Marco Pavone', 'Andrea Bajcsy'], 'affiliations': ['Carnegie Mellon University', 'NVIDIA Research', 'Stanford University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.00267.jpg', 'data': {'categories': ['#robotics', '#diffusion', '#training', '#optimization', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Направленное воображение моделей мира для надежной оценки политик роботов', 'desc': 'StressDream — метод для улучшения видео-моделей мира путем направления диффузионных генераций на высокоударные, но правдоподобные сценарии через оптимизацию инициализации шума. Метод использует две дополнительные целевые функции: семантическую — через Vision-Language Model для обработки контента видео, и функцию правдоподобности для предотвращения выхода шума за границы распределения обучающих данных. Это позволяет оценивать и улучшать политики роботов, выявляя потенциально опасные или нежелательные исходы действий во время вывода модели. Метод демонстрирует эффективность на задачах автономного вождения и манипулирования объектами.'}, 'en': {'title': 'Steering AI Imaginations for Impactful Outcomes', 'desc': 'StressDream is a method that improves video world models by guiding the generation of future scenarios towards significant and realistic outcomes. It uses optimized noise initialization in diffusion-based models to enhance the quality of imagined scenarios based on specific objectives. By incorporating a semantic objective with a Vision-Language Model, it ensures that the generated videos are relevant and informative. Additionally, a plausibility objective helps maintain the realism of the outcomes, preventing the model from producing unrealistic scenarios, which is crucial for effective policy evaluation and improvement in robotics.'}, 'zh': {'title': '引导高影响力的合理想象', 'desc': 'StressDream 是一种增强视频世界模型的方法，通过优化噪声初始化，引导基于扩散的想象朝向高影响力且合理的结果。该方法利用语义和合理性目标，解决了在生成视频时如何避免不合理想象的问题。通过结合视觉-语言模型，StressDream 能够提供有用的梯度信息，从而优化生成视频的初始噪声。最终，StressDream 在自主驾驶和机器人操作等领域展示了其在政策评估和改进方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.28615', 'title': 'Compositional Text-to-Image Generation Via Region-aware Bimodal Direct Preference Optimization', 'url': 'https://huggingface.co/papers/2605.28615', 'abstract': "Abstract BiDPO enhances text-to-image models for complex compositional prompts through preference-based fine-tuning and region-level guidance.  AI-generated summary Despite the rapid progress of text-to-image (T2I) models, generating images that accurately reflect complex compositional prompts (covering attribute bindings, object relationships, counting) still remains challenging. To address this, we propose BiDPO, a framework to enhance T2I model's capability of compositional text-to-image generation. We begin by introducing an carefully designed pipeline to construct a large-scale preference dataset, BiComp, with strictly quality control. Then, we extend Diffusion DPO to jointly optimize image and text preferences, which is shown to greatly effective in improving the models to follow complex text prompt in generation. To further enhance the models for fine-grained alignment, we employ a region-level guidance method to focus on regions relevant to compositional concepts. Experimental results demonstrate that our BiDPO substantially improves compositional fidelity, consistently outperforming prior methods across multiple benchmarks. Our approach highlights the potential of preference-based fine-tuning for complex text-to-image tasks, offering a flexible and scalable alternative to existing techniques.", 'score': 2, 'issue_id': 2358, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '7e7ecba99ff98e31', 'authors': ['Zhuohan Liu', 'Wujian Peng', 'Yitong Chen', 'Zuxuan Wu'], 'affiliations': ['Shanghai Collaborative Innovation Center of Intelligent Visual Computing', 'Shanghai Key Lab of Intell. Info. Processing, School of CS, Fudan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28615.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Предпочтения для совершенной композиции: обучение моделей T2I сложным текстовым запросам', 'desc': 'Статья представляет BiDPO — фреймворк для улучшения моделей генерации изображений по текстовому описанию при работе со сложными составными запросами. Авторы создали большой датасет предпочтений BiComp с строгим контролем качества и расширили метод Diffusion DPO для совместной оптимизации изображений и текстовых предпочтений. Для повышения точности выравнивания применяется метод направления на уровне регионов, сосредоточивающий внимание модели на релевантных областях изображения. Экспериментальные результаты показывают, что BiDPO значительно улучшает точность композиции и превосходит существующие методы на нескольких бенчмарках.'}, 'en': {'title': 'Enhancing Text-to-Image Generation with BiDPO', 'desc': "BiDPO is a new framework designed to improve text-to-image (T2I) models, especially for complex prompts that involve multiple attributes and relationships. It introduces a large-scale preference dataset called BiComp, which is created with strict quality control to ensure high-quality training data. The framework uses a method called Diffusion DPO to optimize both image and text preferences, enhancing the model's ability to generate images that accurately reflect detailed prompts. Additionally, BiDPO incorporates region-level guidance to focus on specific areas of the image that correspond to complex concepts, leading to better compositional fidelity in the generated images."}, 'zh': {'title': 'BiDPO：提升复杂组合提示的文本到图像生成能力', 'desc': 'BiDPO是一种增强文本到图像模型的框架，旨在处理复杂的组合提示。该方法通过偏好基础的微调和区域级指导，提升了模型生成图像的能力。我们构建了一个大规模的偏好数据集BiComp，并采用Diffusion DPO方法优化图像和文本的偏好。实验结果表明，BiDPO在多个基准测试中显著提高了组合生成的准确性，展示了偏好微调在复杂文本到图像任务中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.00089', 'title': 'Can Predicted Dynamics Exist in the Physical World?', 'url': 'https://huggingface.co/papers/2606.00089', 'abstract': 'Abstract Physical admissibility validation for AI systems uses prediction-control interfaces with kinematic and dynamic conditions to filter invalid proposals while maintaining high performance.  AI-generated summary Predictive Physical AI systems output state rollouts, action chunks, and latent plans, yet a low root-mean-square error (RMSE) does not imply that a particular proposal is physically executable. We formulate physical admissibility as a prediction-control interface: before execution, a decoded proposal is treated as candidate dynamics and evaluated using kinematic, dynamic, and direct-to-composed horizon conditions. Passing is not a certificate of task success; rejection identifies violation of the specified physical envelope and gives a component-level reason. On Hugging Face LeRobot PushT, controlled falsification shows that one-step prediction-RMSE and standardized dynamics residuals reach area under the receiver operating characteristic curve (AUC) 0.982 and 0.972, kinematic-only conditions reach AUC 0.592, and the full gate reaches AUC 0.957 with condition-level attribution. In replay-based intervention experiments, residual-based filters and the full physical-admissibility gate prevent 87-$89% of invalid proposals while preserving mean progress near 0.998.', 'score': 2, 'issue_id': 2359, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': '765b1b529f4a634a', 'authors': ['Barak Or'], 'affiliations': ['STATE16'], 'pdf_title_img': 'assets/pdf/title_img/2606.00089.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Физическая валидация AI через интерфейс предсказания-управления', 'desc': 'В этой работе предлагается метод валидации физической допустимости для AI систем, которые генерируют траектории и управляющие действия. Авторы формулируют физическую допустимость как интерфейс предсказания-управления, где каждое предложение модели проверяется перед исполнением на соответствие кинематическим и динамическим ограничениям физической системы. Экспериментальные результаты на задаче манипуляции (LeRobot PushT) показывают, что такой фильтр эффективно отклоняет недопустимые действия (87-89%) при сохранении высокой эффективности выполнения задачи. Предложенный подход обеспечивает интерпретируемость отклонений, указывая на конкретные нарушенные ограничения физической системы.'}, 'en': {'title': 'Ensuring AI Proposals are Physically Feasible', 'desc': 'This paper discusses a method for validating the physical feasibility of AI-generated proposals in predictive physical AI systems. It introduces a prediction-control interface that evaluates candidate dynamics against kinematic and dynamic conditions to ensure they are physically executable. The authors demonstrate that while low root-mean-square error (RMSE) values indicate good predictions, they do not guarantee that the proposals are valid. The proposed method effectively filters out invalid proposals while maintaining high performance, achieving significant area under the curve (AUC) scores in various conditions.'}, 'zh': {'title': '确保AI提案的物理可执行性', 'desc': '这篇论文探讨了人工智能系统的物理可接受性验证，使用预测控制接口来过滤无效的提案，同时保持高性能。研究表明，低均方根误差（RMSE）并不意味着某个提案在物理上是可执行的。我们将物理可接受性定义为一种预测控制接口，在执行之前，解码的提案被视为候选动态，并通过运动学、动力学和直接组合条件进行评估。实验结果显示，使用残差过滤器和完整的物理可接受性门可以有效防止87%到89%的无效提案，同时保持接近0.998的平均进展。'}}}, {'id': 'https://huggingface.co/papers/2606.02248', 'title': 'Geometric Latent Reasoning Induces Shorter Generations in LLMs', 'url': 'https://huggingface.co/papers/2606.02248', 'abstract': "Abstract Geometric Latent Reasoning formulates latent reasoning as a geometric path-approximation problem in pretrained token-embedding space, enabling continuous intermediate reasoning states that reduce generation length while maintaining accuracy.  AI-generated summary Large language models solve complex problems by generating lengthy chains of explicit reasoning tokens. While effective, this makes reasoning expensive, length-sensitive, and constrained to (discrete) natural language. While latent reasoning offers a continuous alternative, determining useful structures for intermediate latent states is an open challenge. In this paper, we formulate latent reasoning as a geometric path-approximation problem within the model's pretrained token-embedding space. We introduce Geometric Latent Reasoning (GLR), which uses a lightweight transition head to predict iterative direction updates in embedding space. Using textual chain-of-thought traces as anchors, GLR learns to approximate discrete reasoning trajectories while permitting continuous deviations from exact token embeddings. Evaluations on mathematical reasoning benchmarks using Qwen3 models reveal an emergent phenomenon: geometric latent reasoning induces substantially shorter generations without an explicit length objective. By replacing early explicit reasoning with continuous latent steps, models often reach correct answers using substantially fewer total generation steps. These findings suggest that continuous trajectories act as compact intermediate reasoning states, exposing a new tradeoff between latent computation budget, output length, and accuracy.", 'score': 1, 'issue_id': 2359, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'dd27471050d6f897', 'authors': ['Shashi Kumar', 'Yacouba Kaloga', 'Petr Motlicek', 'Ina Kodrasi', 'Andrea Cavallaro'], 'affiliations': ['BUT, Czech Republic', 'EPFL, Switzerland', 'Idiap Research Institute, Switzerland'], 'pdf_title_img': 'assets/pdf/title_img/2606.02248.jpg', 'data': {'categories': ['#reasoning', '#training', '#math', '#optimization', '#inference'], 'emoji': '🧭', 'ru': {'title': 'Непрерывные геометрические пути вместо длинных цепочек рассуждений', 'desc': 'В статье предложен новый подход к скрытому рассуждению в больших языковых моделях, сформулированный как задача аппроксимации геометрического пути в пространстве эмбеддингов. Авторы вводят Geometric Latent Reasoning (GLR), который использует лёгкую сеть переходов для предсказания итеративных обновлений направлений в пространстве представлений. Модель обучается приближать дискретные траектории рассуждений, используя цепочки явного мышления как опорные точки, что позволяет непрерывные отклонения от точных эмбеддингов токенов. Эксперименты показывают, что этот подход значительно сокращает длину генерируемого текста, сохраняя точность на задачах математического рассуждения.'}, 'en': {'title': 'Shorter, Smarter Reasoning with Geometric Latent Paths', 'desc': 'This paper introduces Geometric Latent Reasoning (GLR), a method that reformulates latent reasoning as a geometric path-approximation problem in the space of pretrained token embeddings. By using a lightweight transition head, GLR predicts direction updates in this embedding space, allowing for continuous reasoning states instead of relying on discrete natural language tokens. The approach enables models to generate shorter reasoning outputs while maintaining accuracy, as it learns to approximate reasoning paths with fewer steps. Evaluations show that GLR can effectively reduce the length of generated responses without sacrificing correctness, highlighting a new balance between computation, output length, and accuracy in reasoning tasks.'}, 'zh': {'title': '几何潜在推理：更短的推理路径，更多的准确性', 'desc': '几何潜在推理将潜在推理视为在预训练的标记嵌入空间中进行几何路径近似的问题。这种方法允许生成连续的中间推理状态，从而在保持准确性的同时减少生成长度。通过引入轻量级的过渡头，几何潜在推理能够预测嵌入空间中的迭代方向更新。研究表明，使用连续的潜在步骤替代早期的显式推理，模型可以用更少的生成步骤达到正确答案。'}}}, {'id': 'https://huggingface.co/papers/2606.02580', 'title': 'Thinking in Blender: Staged Executable Inverse Graphics with Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.02580', 'abstract': 'Abstract Pretrained vision-language models can reconstruct 3D scenes from single images as editable Blender programs through progressive refinement, demonstrating improved fidelity through staged reconstruction approaches.  AI-generated summary Inverse graphics is a longstanding and highly underconstrained problem that seeks to reconstruct images as editable 3D scenes which can be rendered, relit, and manipulated. In this work, we investigate whether pretrained vision-language models (VLMs) can perform executable inverse graphics directly from a single image by reconstructing a scene as an editable Blender program, without relying on specialized 2D or 3D foundation models, differentiable rendering, or multi-view supervision. We introduce Staged Executable Inverse Graphics (SEIG), an agentic framework that reconstructs a 3D scene from a single image by progressively refining scene factors including geometry, materials, composition, and lighting directly in executable Blender code space. We evaluate our framework across diverse scenes using a range of reconstruction metrics spanning pixel-level, perceptual, and semantic fidelity. Our experiments show that staged reconstruction substantially improves reconstruction fidelity, highlighting the importance of task decomposition for executable inverse graphics with general-purpose VLMs. Finally, we showcase various downstream applications enabled by the reconstructed editable Blender scenes.', 'score': 1, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '36dc2822af24b12f', 'authors': ['Guangzhao He', 'Rundong Luo', 'Wei-Chiu Ma', 'Hadar Averbuch-Elor'], 'affiliations': ['Cornell University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.02580.jpg', 'data': {'categories': ['#3d', '#agents', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От снимка к редактируемой сцене: пошаговая реконструкция 3D через языковые модели', 'desc': 'Работа исследует использование предобученных vision-language моделей для решения задачи inverse graphics - реконструкции трёхмерных сцен из одного изображения. Авторы предлагают SEIG, агентный фреймворк, который постепенно уточняет параметры сцены (геометрия, материалы, освещение) путём генерации исполняемого кода на языке Blender без использования специализированных моделей и многовидовой информации. Методология основана на декомпозиции задачи на этапы, что позволяет существенно улучшить качество реконструкции по различным метрикам точности. Полученные редактируемые трёхмерные сцены открывают возможности для множества прикладных приложений.'}, 'en': {'title': 'Transforming Images into Editable 3D Scenes with VLMs', 'desc': 'This paper explores how pretrained vision-language models (VLMs) can create editable 3D scenes from single images using a method called Staged Executable Inverse Graphics (SEIG). The approach allows for the progressive refinement of various scene elements like geometry, materials, and lighting directly in Blender code, without needing specialized models or multi-view data. The authors demonstrate that breaking down the reconstruction process into stages significantly enhances the quality of the generated scenes. Additionally, they highlight the potential applications of these reconstructed scenes in various fields.'}, 'zh': {'title': '从单图像重建3D场景的创新方法', 'desc': '本研究探讨了预训练的视觉-语言模型（VLMs）是否能够直接从单张图像执行可编辑的逆图形重建，将场景重建为可在Blender中编辑的程序。我们提出了分阶段可执行逆图形（SEIG）框架，通过逐步优化几何、材料、构图和光照等场景因素，直接在可执行的Blender代码空间中重建3D场景。实验结果表明，分阶段重建显著提高了重建的保真度，强调了任务分解在使用通用VLMs进行可执行逆图形中的重要性。最后，我们展示了通过重建的可编辑Blender场景所启用的各种下游应用。'}}}, {'id': 'https://huggingface.co/papers/2606.01356', 'title': 'A Formally Verified Library of Mathematical Finance in Lean 4', 'url': 'https://huggingface.co/papers/2606.01356', 'abstract': 'Abstract  We describe a library of mathematical finance built in the Lean 4 proof assistant, on top of Mathlib and the BrownianMotion package. It is broad: more than two hundred sorry-free theorems across eleven areas, from the measure-theoretic foundations of continuous-time stochastic calculus through derivative pricing to applied risk, portfolio, and fixed-income theory, and, to our knowledge, the most comprehensive machine-checked development of mathematical finance to date. Breadth is the setting, not the point. Two things make it more than a catalogue. It reaches into the continuous theory far enough to construct the L2 Itô integral as a bounded linear isometry and to derive, rather than assume, the risk-neutral pricing measure. And it audits its own faithfulness: every result is classified by how its Lean statement relates to the mathematics it claims, and a build-enforced gate pins the axioms each proof actually uses, so a reader can see precisely what has been proved and what has only been proved under added hypotheses. We close with a candid finding: a formal base over classical financial mathematics yields certified unification of known results rather than new financial theory. The contribution is therefore methodological and infrastructural, reusable verified foundations for mathematical finance, together with the faithfulness audit.', 'score': 1, 'issue_id': 2360, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'eff7f9c8ccb3662f', 'authors': ['Raphael Coelho'], 'affiliations': ['Independent researcher'], 'pdf_title_img': 'assets/pdf/title_img/2606.01356.jpg', 'data': {'categories': ['#math'], 'emoji': '✅', 'ru': {'title': 'Формальная верификация математического финансирования в Lean 4', 'desc': 'Авторы описывают библиотеку математического финансирования, разработанную в proof assistant Lean 4 с использованием Mathlib и пакета BrownianMotion. Библиотека содержит более двухсот доказанных теорем без пропусков в одиннадцати областях — от теоретических основ стохастического исчисления до ценообразования производных инструментов и прикладной теории рисков. Ключевым вкладом является формальная верификация и аудит надёжности каждого результата, где классифицируется соответствие формального утверждения в Lean исходной математике и явно указываются аксиомы, используемые в доказательствах. Работа демонстрирует, что формализация даёт сертифицированное объединение известных результатов финансовой математики и создаёт переиспользуемый фундамент для будущих формальных разработок.'}, 'en': {'title': 'Building Trust in Mathematical Finance with Lean 4', 'desc': 'This paper presents a comprehensive library for mathematical finance developed using the Lean 4 proof assistant, which builds on existing mathematical frameworks. It includes over two hundred verified theorems across various domains, such as stochastic calculus and derivative pricing, ensuring that all results are rigorously checked. The library not only constructs essential mathematical tools like the L2 Itô integral but also establishes the risk-neutral pricing measure through derivation rather than assumption. The authors emphasize the importance of methodological rigor, providing a system that allows users to understand the dependencies of each theorem on foundational axioms, thus promoting trust in the results.'}, 'zh': {'title': '构建数学金融的可靠基础', 'desc': '本文介绍了一个基于Lean 4证明助手的数学金融库，构建在Mathlib和BrownianMotion包之上。该库涵盖了超过两百个无错误的定理，涉及连续时间随机微积分、衍生品定价、风险管理、投资组合和固定收益理论等多个领域。它不仅仅是一个目录，还深入到连续理论，构造了L2 Itô积分，并推导出风险中性定价测度。最后，文章指出，基于经典金融数学的形式基础提供了已知结果的认证统一，而不是新的金融理论。'}}}, {'id': 'https://huggingface.co/papers/2606.01348', 'title': 'ChartArena: Benchmarking Chart Parsing across Languages, Scenarios, and Formats', 'url': 'https://huggingface.co/papers/2606.01348', 'abstract': 'Abstract ChartArena presents a comprehensive bilingual benchmark for chart parsing that evaluates models across diverse chart types and visual conditions while providing a unified evaluation framework for fair comparison.  AI-generated summary Charts are a primary medium for conveying quantitative and relational information, yet systematically evaluating chart parsing models remains difficult. Existing benchmarks focus on narrow chart types and leave diagrammatic structures such as flowcharts and mind maps largely unaddressed, while models produce outputs in incompatible formats, and datasets rarely include the printed or hand-drawn images encountered in practice. To address these issues, we introduce ChartArena, a comprehensive bilingual benchmark covering eight chart families spanning both numeric charts and diagrammatic structures, each evaluated across three visual scenarios: digital renderings, printed photos, and hand-drawn photos. The dataset is built via a human-agent collaborative annotation pipeline with multi-stage human verification to ensure annotation reliability. To enable fair cross-model comparison, we further design a format-agnostic evaluation protocol that maps heterogeneous outputs into two canonical semantic spaces, a normalized triple view and a directed graph view, and scores them with structure-aware metrics. Through extensive evaluation of 26 leading MLLMs, we observe three consistent findings: (i) frontier proprietary models such as Gemini 3.1 Pro lead overall, yet the strongest open-source systems are rapidly closing the gap; (ii) document parsing models handle numeric charts reasonably but fall sharply behind on diagrammatic structures; and (iii) expert chart parsers remain limited to narrow chart families. Across all models, radar charts and hand-drawn scenarios stay especially challenging. These findings show that ChartArena exposes clear capability gaps and provides a unified foundation for future progress. ChartArena is publicly available at https://github.com/pspdada/ChartArena.', 'score': 1, 'issue_id': 2359, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '0fd1a4f9a0574619', 'authors': ['Shangpin Peng', 'Gengluo Li', 'Xingyu Wan', 'Chengquan Zhang', 'Hao Feng', 'Binghong Wu', 'Huawen Shen', 'Weinong Wang', 'Ziyi Cai', 'Zhuotao Tian', 'Han Hu', 'Can Ma', 'Yu Zhou'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences', 'LLM Department, Tencent', 'Nankai University', 'Shenzhen Loop Area Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.01348.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#dataset'], 'emoji': '📊', 'ru': {'title': 'Единая оценка моделей распознавания диаграмм через универсальный бенчмарк', 'desc': 'ChartArena представляет комплексный двуязычный бенчмарк для оценки моделей, способных распознавать и анализировать различные типы диаграмм. Бенчмарк охватывает восемь семейств графиков, включая числовые диаграммы и диаграммные структуры, проверяя модели на трёх типах визуальных условий: цифровых изображениях, печатных фотографиях и рукописных рисунках. Для обеспечения справедливого сравнения различных моделей авторы разработали формат-агностический протокол оценки, который преобразует разнородные выходы в два канонических семантических пространства с использованием структурно-ориентированных метрик. Тестирование 26 ведущих мультимодальных LLM выявило, что frontier модели превосходят open-source системы, но последние быстро сокращают разрыв, при этом диаграммные структуры остаются особенно сложными для парсинга.'}, 'en': {'title': 'ChartArena: Bridging Gaps in Chart Parsing Evaluation', 'desc': 'ChartArena is a new benchmark designed to evaluate chart parsing models across various types of charts and visual conditions. It addresses the limitations of existing benchmarks by including a wide range of chart families, such as numeric charts and diagrammatic structures, and by incorporating different visual scenarios like digital, printed, and hand-drawn images. The dataset is created through a collaborative annotation process that ensures high reliability, and it features a format-agnostic evaluation protocol for fair comparisons among models. The findings reveal significant performance gaps among models, particularly in handling diagrammatic structures and challenging scenarios like radar charts and hand-drawn images.'}, 'zh': {'title': 'ChartArena：图表解析的统一基准', 'desc': 'ChartArena是一个全面的双语基准，用于评估图表解析模型在不同图表类型和视觉条件下的表现。该基准涵盖了八种图表类型，包括数值图表和图示结构，并在数字渲染、打印照片和手绘照片三种视觉场景中进行评估。通过人机协作的注释流程和多阶段验证，确保了数据的可靠性。此外，ChartArena设计了一种格式无关的评估协议，将不同格式的输出映射到标准语义空间，以便进行公平的跨模型比较。'}}}, {'id': 'https://huggingface.co/papers/2605.28897', 'title': 'Review Arcade: On the Human Alignment and Gameability of LLM Reviews', 'url': 'https://huggingface.co/papers/2605.28897', 'abstract': 'Abstract Empirical analysis reveals limited alignment between LLM-generated reviews and human reviews, with varying performance across different prompts and models, and demonstrates that authors can strategically improve paper scores through iterative revision based on LLM feedback.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM-generated reviews for scientific papers are gaining considerable traction and are even being officially piloted by major conferences. We have to assume that not only reviewers are using LLM-assistance, but also that authors use LLMs to revise their papers before submitting. In this work, we perform empirical experiments on papers from the 2025 ACL Rolling Review (ARR) to evaluate LLM reviews from both the author and the reviewer perspective. First, we identify a limited alignment of LLM reviews with human ones. In the best-case scenario, the alignment is reasonable. However, we also find that LLM-human alignment varies substantially across prompts and models. Finally, we investigate the scenario in which the author uses an iterative draft-revise workflow to improve the submission according to the LLM review. We find that this "gaming" of LLM reviews can be effective in specific scenarios, leading to a statistically significant increase of overall scores for up to 35\\% of papers. We publish our code: https://github.com/uhh-hcds/reviewarcade.', 'score': 1, 'issue_id': 2360, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'a7b4b216baf46c0e', 'authors': ['Hans Ole Hatzel', 'Sebastian Steindl', 'Jan Strich'], 'affiliations': ['Hub of Computing and Data Science (HCDS), University of Hamburg, Germany', 'Language Technology Group, University of Hamburg, Germany', 'OTH Amberg-Weiden, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2605.28897.jpg', 'data': {'categories': ['#science', '#alignment', '#benchmark', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'Можно ли обхитрить машинного рецензента?', 'desc': 'В работе проводится эмпирический анализ качества рецензий, генерируемых большими языковыми моделями (LLM), на примере статей из ACL Rolling Review 2025. Исследователи обнаружили ограниченное соответствие между оценками LLM и оценками человеческих рецензентов, при этом качество рецензий существенно варьируется в зависимости от используемых промптов и моделей. Авторы также показали, что можно стратегически манипулировать системой: авторы могут итеративно улучшать свои статьи на основе обратной связи от LLM, что приводит к значительному увеличению оценок в 35% случаев. Это исследование поднимает важные вопросы о надёжности автоматизированных рецензирований в научном сообществе.'}, 'en': {'title': 'Leveraging LLMs: Enhancing Paper Scores through Strategic Revisions', 'desc': 'This paper investigates the effectiveness of large language models (LLMs) in generating reviews for scientific papers and their alignment with human reviews. The study shows that while LLM-generated reviews can be useful, there is often limited agreement between these reviews and those written by humans, with variations depending on the prompts and models used. Additionally, the authors explore how researchers can leverage LLM feedback to iteratively revise their papers, which can lead to improved scores in some cases. The findings suggest that authors may strategically enhance their submissions by utilizing LLMs, raising questions about the integrity of the review process.'}, 'zh': {'title': '利用LLM提升论文评分的策略', 'desc': '这篇论文分析了大型语言模型（LLM）生成的论文评审与人类评审之间的对齐程度，发现二者之间的对齐有限。研究表明，不同的提示和模型会导致对齐效果的显著差异。作者可以通过基于LLM反馈的迭代修订策略来提高论文评分，某些情况下这种方法能有效提升评分。最后，论文还探讨了在2025年ACL Rolling Review中，作者和评审者对LLM评审的不同视角。'}}}, {'id': 'https://huggingface.co/papers/2605.28255', 'title': 'AI, Take the Wheel: What Drives Delegation and Trust in Human-Computer Cooperative Question Answering?', 'url': 'https://huggingface.co/papers/2605.28255', 'abstract': "Abstract Human-AI collaboration in question-answering tasks reveals suboptimal reliance decisions where humans under-rely on correct AI suggestions and over-rely when AI misleads them, with confirmation bias contributing to reduced trust in conflicting AI outputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI systems are fallible, and humans can make mistakes in deciding whether to trust AI over their own judgment. Thus, improving human-AI collaboration requires understanding when, why, and how humans decide to rely on AI. We study two distinct reliance decisions: the delegation choice -- deciding when to let AI act autonomously without knowing its output, and the adoption choice -- evaluating AI suggestions and deciding how to use them. Both of these decoupled reliance patterns shape collaboration, but prior work rarely studies them together in realistic settings with the same users. We address this gap by studying collaborative human--AI teams competing in a question-answering game in which humans can choose when and how to work with AI agents to win. Our 24 matches pair 23 expert humans with 16 AI agents, capturing 387 delegation and 1440 adoption decisions. While human--AI collaboration performs better than either AI or humans alone, humans make suboptimal collaboration decisions, both under-relying on correct AI suggestions (3.9% of opportunities missed) and over-relying when AI misleads them (1.7%). Both parties contribute wrong answers: reported model confidence is near chance when humans and AI disagree, while confirmation bias drives higher under-reliance (64.5%) when an AI suggestion agrees with humans' initial incorrect answer. To close this gap, we recommend calibrated confidence, evidence-grounded explanations, and mechanisms that help users refine trust.", 'score': 1, 'issue_id': 2360, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'e6ba8127b1edb1b6', 'authors': ['Maharshi Gor', 'Yoo Yeon Sung', 'Yu Hou', 'Eve Fleisig', 'Irene Ying', 'Tianyi Zhou', 'Jordan Boyd-Graber'], 'affiliations': ['MBZUAI Abu Dhabi, UAE', 'Phasechange.ai Lakewood, CO, USA', 'University of California Berkeley, CA, USA', 'University of Maryland College Park, MD, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.28255.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🤝', 'ru': {'title': 'Когда люди не доверяют AI: изучение ошибок в совместном принятии решений', 'desc': 'В этом исследовании авторы изучают, как люди принимают решения о доверии к AI системам при совместной работе над задачами вопрос-ответ. Они выделяют два типа решений: делегирование (позволить AI действовать автономно) и адопция (оценить предложение AI и решить, использовать ли его). Результаты показывают, что хотя человеко-AI сотрудничество работает лучше, чем каждый агент отдельно, люди принимают неоптимальные решения: недостаточно доверяют корректным AI предложениям и чрезмерно полагаются на ошибочные. Авторы обнаружили, что когда человек и AI не согласны, люди испытывают когнитивное смещение подтверждения и часто игнорируют правильные AI рекомендации.'}, 'en': {'title': 'Enhancing Trust in Human-AI Collaboration', 'desc': "This paper investigates how humans and AI can work together in answering questions, highlighting that humans often do not trust AI enough when it is correct and trust it too much when it is wrong. The study focuses on two key decisions: when to let AI act on its own (delegation) and how to evaluate AI's suggestions (adoption). The research shows that while collaboration between humans and AI is generally more effective than either working alone, humans still make poor decisions about when to rely on AI. To improve this collaboration, the authors suggest using better confidence measures, clear explanations, and tools to help users build trust in AI outputs."}, 'zh': {'title': '优化人类与AI的合作决策', 'desc': '本研究探讨了人类与人工智能（AI）在问答任务中的合作，发现人类在依赖AI建议时存在不理想的决策行为。人类往往在AI提供正确建议时过于谨慎，而在AI误导时则过于依赖，这种现象受到确认偏差的影响。我们分析了两种依赖决策：委托选择和采纳选择，发现这两种决策模式在合作中相互影响。为了改善人类与AI的合作，我们建议使用校准信心、基于证据的解释以及帮助用户调整信任机制。'}}}, {'id': 'https://huggingface.co/papers/2605.28983', 'title': 'The Hamilton-Jacobi Theory of Deep Learning', 'url': 'https://huggingface.co/papers/2605.28983', 'abstract': 'Abstract Neural network training is formulated as a Hamilton--Jacobi initial-value problem where gradient steps correspond to solving viscous Hamilton--Jacobi equations, with connections to residual networks, transformers, and RNNs through shared mathematical structures.  AI-generated summary In this paper, training a neural network is identified, exactly, as a search through Hamilton--Jacobi initial-value problems: each gradient step selects the initial data of a viscous Hamilton--Jacobi equation whose Hopf--Cole propagator best fits the observations; at inference, the input is the spatial point at which that solution is evaluated and the initial condition is already encoded in the weights. The correspondence is exact for log-sum-exp layers and structural for broader architectures: residual networks, transformers, and recurrent architectures (RNNs, LSTMs, SSMs) each discretize the same class of Hamilton--Jacobi equations, with architecture-dependent Hamiltonian and viscosity. A single deformation parameter varepsilon unifies all four perspectives (network, tropical algebra, viscous PDE, convex optimization) in a commutative diagram closed under Lipschitz conditions. Quantitative consequences include: the minimax optimal generalization rate O(n^{-1/(d+2)}) for fixed t; adversarial robustness controlled by varepsilon; backpropagation as the co-state equation of the Hamiltonian system for residual networks (Pontryagin Maximum Principle); scaling exponents consistent with data intrinsic dimension via PDE quadrature; and a closed-form O(N) influence function (softmax attribution weights π_j) whose entropy landscape undergoes fold bifurcations as varepsilon increases, each merging attribution basins.', 'score': 1, 'issue_id': 2359, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '63a8169f6bd62848', 'authors': ['Jose Marie Antonio Miñoza', 'Erika Fille T. Legara', 'Christopher P. Monterola'], 'affiliations': ['Asian Institute of Management', 'Center for AI Research PH'], 'pdf_title_img': 'assets/pdf/title_img/2605.28983.jpg', 'data': {'categories': ['#architecture', '#math', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Нейросетевое обучение как решение дифференциальных уравнений Гамильтона-Якоби', 'desc': 'В работе предложена новая математическая формулировка обучения нейронных сетей как решения задачи Гамильтона-Якоби с вязкостью. Каждый шаг градиентного спуска соответствует решению вязкого уравнения в частных производных, а архитектуры сетей (остаточные сети, трансформеры, рекуррентные нейросети) дискретизируют один и тот же класс таких уравнений. Эта единая математическая структура связывает четыре перспективы: нейросетевые архитектуры, тропическую алгебру, вязкие дифференциальные уравнения и выпуклую оптимизацию. Из этой формулировки следуют практические результаты о скорости обобщения, устойчивости к атакам и влиянии признаков на предсказания модели.'}, 'en': {'title': 'Revolutionizing Neural Network Training through Hamilton-Jacobi Equations', 'desc': 'This paper presents a novel perspective on neural network training by framing it as a Hamilton--Jacobi initial-value problem. Each gradient step in training corresponds to solving a viscous Hamilton--Jacobi equation, which connects various neural network architectures like residual networks, transformers, and RNNs through shared mathematical structures. The authors demonstrate that these architectures discretize the same class of Hamilton--Jacobi equations, leading to insights on generalization rates and adversarial robustness. Additionally, they unify different perspectives in machine learning, optimization, and partial differential equations using a single deformation parameter, enhancing our understanding of neural network dynamics.'}, 'zh': {'title': '神经网络训练的新视角：哈密顿-雅可比方程', 'desc': '本文将神经网络的训练视为哈密顿-雅可比初值问题的搜索过程。每一步梯度更新对应于求解粘性哈密顿-雅可比方程，选择最适合观测数据的初始条件。在推理阶段，输入是评估该解的空间点，而初始条件已通过权重编码。该研究揭示了残差网络、变换器和递归神经网络等架构与哈密顿-雅可比方程之间的深刻联系。'}}}, {'id': 'https://huggingface.co/papers/2605.26248', 'title': 'Unified Neural Scaling Laws', 'url': 'https://huggingface.co/papers/2605.26248', 'abstract': 'Abstract A Unified Neural Scaling Law is presented that accurately models and extrapolates deep neural network scaling behaviors across multiple simultaneous dimensions including parameters, dataset size, training steps, and compute across diverse architectures and tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present a functional form (that we refer to as a Unified Neural Scaling Law (UNSL)) that accurately models and extrapolates the scaling behaviors of deep neural networks as multiple dimensions all vary simultaneously (i.e. how the evaluation metric of interest varies as one simultaneously varies the number of model parameters, training dataset size, number of training steps, number of inference steps, amount of compute, and various hyperparameters) for various architectures and for each of various tasks within a varied set of upstream and downstream tasks. This set includes large-scale vision, language, math, and reinforcement learning. When compared to other functional forms for neural scaling, this functional form yields extrapolations of scaling behavior that are considerably more accurate on this set.', 'score': 1, 'issue_id': 2360, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'c14ed97382a4ed4e', 'authors': ['Ethan Caballero', 'Priyank Jaini', 'David Krueger', 'Irina Rish'], 'affiliations': ['Google DeepMind', 'Mila', 'University of Montreal'], 'pdf_title_img': 'assets/pdf/title_img/2605.26248.jpg', 'data': {'categories': ['#multilingual', '#training', '#rl', '#cv', '#optimization', '#math'], 'emoji': '📈', 'ru': {'title': 'Единый закон масштабирования для предсказания производительности нейросетей', 'desc': 'В работе представлен единый закон масштабирования нейронных сетей (UNSL), который точно моделирует поведение глубоких нейронных сетей при одновременном изменении нескольких параметров: количества весов модели, размера обучающего датасета, числа шагов обучения и вычислительных ресурсов. Функциональная форма UNSL применима к различным архитектурам и задачам, включая задачи компьютерного зрения, обработку естественного языка, математику и обучение с подкреплением. Авторы показывают, что их подход значительно точнее экстраполирует поведение масштабирования по сравнению с существующими функциональными формами. Эта работа полезна для прогнозирования производительности моделей при различных объемах вычислительных ресурсов.'}, 'en': {'title': 'Scaling Deep Learning: A Unified Approach', 'desc': 'The paper introduces a Unified Neural Scaling Law (UNSL) that models how deep neural networks perform as different factors change together, such as the number of parameters, dataset size, and training steps. This law helps predict the performance of neural networks across various tasks and architectures, including vision, language, and reinforcement learning. By using UNSL, researchers can achieve more accurate predictions of scaling behaviors compared to previous models. This advancement allows for better understanding and optimization of neural networks in diverse applications.'}, 'zh': {'title': '统一神经网络扩展法则：多维度的准确建模', 'desc': '本文提出了一种统一的神经网络扩展法则（UNSL），能够准确建模和推断深度神经网络在多个维度上的扩展行为。这些维度包括模型参数、数据集大小、训练步骤和计算量等。UNSL适用于不同的网络架构和任务，涵盖了大规模视觉、语言、数学和强化学习等领域。与其他神经网络扩展模型相比，UNSL在推断扩展行为时表现出更高的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.21102', 'title': 'ACL-Verbatim: hallucination-free question answering for research', 'url': 'https://huggingface.co/papers/2605.21102', 'abstract': 'Abstract Researchers develop a VerbatimRAG-based extractive question answering system using a novel ground truth dataset and ModernBERT model to improve accurate information retrieval from research papers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Academic r
