esearchers need efficient and reliable methods for collecting high-quality information from trusted sources, but modern tools for AI-assisted research still suffer from the tendency of Large Language Models (LLMs) to produce factually inaccurate or nonsensical output, commonly referred to as hallucinations. We apply the extractive question answering system VerbatimRAG to research papers in the ACL Anthology, directly mapping user queries to verbatim text spans in retrieved documents. We contribute a novel ground truth dataset for the task of mapping user queries to relevant text spans in research papers, and use it to train and evaluate a variety of extractive models. Human annotation is performed by NLP researchers and is based on synthetic user queries generated using a custom pipeline based on the ScIRGen methodology, paired with chunks of research papers retrieved by VerbatimRAG. On this benchmark, a 150M-parameter ModernBERT token classifier trained on silver supervision from our pipeline achieves the best word-level F1 (53.6), ahead of the strongest evaluated LLM extractor (48.7).', 'score': 1, 'issue_id': 2360, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': 'ac4f8304c3535e3b', 'authors': ['Gábor Recski', 'Szilveszter Tóth', 'Nadia Verdha', 'István Boros', 'Ádám Kovács'], 'affiliations': ['KR Labs', 'TU Wien'], 'pdf_title_img': 'assets/pdf/title_img/2605.21102.jpg', 'data': {'categories': ['#rag', '#small_models', '#benchmark', '#science', '#hallucinations', '#synthetic', '#dataset'], 'emoji': '📄', 'ru': {'title': 'Точное извлечение информации из научных работ без галлюцинаций языковых моделей', 'desc': 'Исследователи разработали систему VerbatimRAG для извлекающего ответа на вопросы, которая напрямую сопоставляет запросы пользователей с точными текстовыми фрагментами в научных статьях. Для обучения и оценки моделей создан новый датасет с разметкой экспертов, где запросы генерируются синтетически на основе методологии ScIRGen. Модель ModernBERT с 150M параметров, обученная на слабо размеченных данных, достигает лучшего результата (F1 = 53,6%) в сравнении с другими LLM-экстракторами. Подход решает проблему галлюцинаций больших языковых моделей при поиске информации в научной литературе.'}, 'en': {'title': 'Enhancing Research Accuracy with VerbatimRAG and ModernBERT', 'desc': 'This paper presents a new extractive question answering system called VerbatimRAG, designed to enhance the retrieval of accurate information from research papers. The authors introduce a unique ground truth dataset that helps in mapping user queries to specific text spans within documents, addressing the issue of hallucinations in Large Language Models (LLMs). By utilizing a ModernBERT model, the system demonstrates improved performance in extracting relevant information compared to existing models. The results show that the ModernBERT classifier outperforms other evaluated models, achieving a higher word-level F1 score, indicating its effectiveness in academic research contexts.'}, 'zh': {'title': '提升研究信息检索的准确性', 'desc': '本研究开发了一种基于VerbatimRAG的抽取式问答系统，旨在提高从研究论文中准确检索信息的能力。我们使用了一种新颖的真实数据集，并结合ModernBERT模型进行训练和评估。该系统能够将用户查询直接映射到检索文档中的原文文本片段，从而减少大型语言模型产生的虚假信息。通过人类注释和合成用户查询，我们的模型在基准测试中表现优异，超越了其他评估的提取模型。'}}}, {'id': 'https://huggingface.co/papers/2606.02255', 'title': 'Who Annotates in NLP? A Large-scale Assessment of Human Annotation Reporting between 2018 and 2025', 'url': 'https://huggingface.co/papers/2606.02255', 'abstract': "Abstract Large-scale audit of human annotation reporting in NLP reveals inconsistent documentation of critical annotation details, with improvements over time but ongoing gaps in reproducibility and reliability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Human annotation is the empirical foundation of much NLP research, from dataset construction to model evaluation, but papers often leave unclear who produced the annotations and how the annotation process was controlled. We provide the first large-scale, task-level audit of human annotation reporting across major NLP venues, asking which annotation details are documented, which are missing, and how reporting varies across time, topic, venue, and intended use of human judgment. We introduce a unified taxonomy of annotation-reporting practices and validate an LLM-assisted extraction pipeline against Annotated-gold, a human-adjudicated gold standard of 41 papers and 72 annotation tasks, where the best model reaches human-comparable agreement with adjudicated labels, with Krippendorff's alpha of 0.606 versus 0.585 for human-human agreement. Using this pipeline, we construct Annotated-llm, a dataset covering ACL-venue papers from 2018-2025, with 2,667 extracted annotation tasks from 1,603 papers, and find that papers frequently report operational details such as recruitment strategies, annotator expertise, and annotation volume, but often omit details needed to assess annotation validity, including training, language proficiency, compensation, socio-demographics, adjudication, and agreement values, especially in model-evaluation studies. Our results show that annotation reporting in NLP has improved over time but remains uneven, and they establish a scalable framework and bare-minimum reporting recommendations for making human annotation more reliable, reproducible, and interpretable.", 'score': 0, 'issue_id': 2360, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '6c6c5f311f20495f', 'authors': ['Maria Kunilovskaya', 'Gagan Bhatia', 'Lisa Sophie Albertelli', 'Yanran Chen', 'Christian Greisinger', 'Lotta Kiefer', 'Christoph Leiter', 'Subhadeep Roy', 'Tewodros Achamaleh', 'Muhammad Arslan Manzoor', 'Sebastian Pohl', 'Yufang Hou', 'Steffen Eger'], 'affiliations': ['Interdisciplinary Transformation University, Austria', 'NLLG Lab University of Technology Nuremberg'], 'pdf_title_img': 'assets/pdf/title_img/2606.02255.jpg', 'data': {'categories': ['#benchmark', '#data', '#interpretability', '#survey', '#dataset'], 'emoji': '📋', 'ru': {'title': 'Стандартизация документирования человеческой аннотации в NLP', 'desc': 'Исследование проанализировало документирование человеческой аннотации в работах по обработке естественного языка, используя LLM-ассистированный конвейер для извлечения деталей из 1,603 статей. Авторы создали унифицированную таксономию практик аннотирования и обнаружили, что исследователи часто опускают критические детали, необходимые для оценки качества и воспроизводимости аннотаций, такие как подготовка аннотаторов, их компетентность и значения согласованности. Хотя со временем качество документирования улучшалось, в сообществе NLP остаются значительные пробелы в отчётности, особенно в задачах оценки моделей. Исследование предлагает минимальные рекомендации по отчётности для повышения надёжности и интерпретируемости человеческой аннотации.'}, 'en': {'title': 'Enhancing Reliability in NLP Annotation Reporting', 'desc': 'This paper conducts a large-scale audit of how human annotations are reported in Natural Language Processing (NLP) research. It highlights inconsistencies in documenting critical details about the annotation process, which are essential for reproducibility and reliability. The authors introduce a taxonomy for annotation-reporting practices and validate a pipeline that uses a language model to extract relevant information from research papers. Their findings indicate that while reporting has improved, significant gaps remain, particularly in areas that affect the validity of annotations, leading to recommendations for better reporting standards.'}, 'zh': {'title': '提升NLP人类标注的可靠性与可重复性', 'desc': '这篇论文对自然语言处理（NLP）领域的人类标注报告进行了大规模审计，发现关键标注细节的文档记录不一致。尽管随着时间的推移有所改善，但在可重复性和可靠性方面仍存在差距。研究提供了一个统一的标注报告实践分类法，并验证了一个基于大型语言模型（LLM）的提取管道。结果表明，尽管标注报告有所进步，但仍需改进，以确保人类标注的可靠性和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2606.01027', 'title': 'τ_0-WM: A Unified Video-Action World Model for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.01027', 'abstract': 'Abstract A unified video-action world model integrates policy learning, video prediction, and action evaluation using a shared video diffusion backbone for robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Robotic manipulation requires models that generate executable actions while anticipating and evaluating their future consequences before physical execution. We present τ_0-World Model (τ_0-WM), a unified video-action world model that integrates policy learning, video prediction, and action evaluation within a single future-predictive framework. Built on a shared video diffusion backbone, τ_0-WM provides two complementary interfaces. First, a video action model jointly predicts future visual latents and continuous action chunks from multi-view observations, language instructions, and robot state. Second, an action-conditioned video simulator rolls out candidate action chunks into multi-view futures and predicts dense task-progress scores. The model is trained on approximately 27{,}300 hours of real-robot teleoperation, UMI-style interaction, egocentric human videos, and rollout or failure trajectories using modality-specific supervision masks. At inference time, τ_0-WM uses test-time computation to sample action candidates, rank them with re-denoising consistency, and invoke simulator-based rectification for low-quality candidates. On challenging long-horizon and fine-grained robotic manipulation tasks, τ_0-WM shows superior performance over other relevant baselines.', 'score': 0, 'issue_id': 2360, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '9e7b9573a237bec7', 'authors': ['Pengfei Zhou', 'Shengcong Chen', 'Di Chen', 'Jiaxu Wang', 'Rongjun Jin', 'Bingwen Zhu', 'Yike Pan', 'Songen Gu', 'Kuanning Wang', 'Shufeng Nan', 'Xingyu Qiu', 'Chenhao Qiu', 'Pu Yang', 'Yunuo Cai', 'Jianxiong Gao', 'Yifan Li', 'Yanwei Fu', 'Xiangyu Yue', 'Zhi Chen', 'Jianlan Luo'], 'affiliations': ['AGIBOT', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.01027.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal', '#video'], 'emoji': '🤖', 'ru': {'title': 'Единая видео-диффузионная модель для предсказания действий робота', 'desc': 'Статья представляет τ_0-World Model — единую модель мира видео-действий, которая объединяет обучение политики, предсказание видео и оценку действий в одной архитектуре на основе видео диффузии. Модель принимает наблюдения с нескольких камер, текстовые инструкции и состояние робота для совместного предсказания будущих скрытых представлений видео и последовательности действий. Система включает два компонента: модель видео-действий для генерации кандидатов действий и симулятор видео для их оценки с помощью прогнозирования прогресса задачи. Модель обучена на большом объеме данных реальных телеоперационных сеансов и достигает превосходных результатов на сложных манипуляционных задачах с длинным горизонтом.'}, 'en': {'title': 'Unified Video-Action Model for Smarter Robotic Manipulation', 'desc': 'The τ_0-World Model (τ_0-WM) is a comprehensive framework designed for robotic manipulation that combines policy learning, video prediction, and action evaluation. It utilizes a shared video diffusion backbone to predict future visual states and generate executable actions based on multi-view observations and language instructions. The model is trained on a vast dataset of real-robot interactions and human videos, allowing it to effectively anticipate the outcomes of actions before they are executed. During inference, τ_0-WM samples and ranks action candidates, ensuring high-quality predictions for complex manipulation tasks.'}, 'zh': {'title': '统一视频-动作模型提升机器人操作能力', 'desc': '本文提出了一种统一的视频-动作世界模型τ_0-WM，旨在通过共享的视频扩散骨干集成策略学习、视频预测和动作评估，以应对机器人操作任务。该模型能够在执行物理动作之前，生成可执行的动作，同时预测和评估其未来后果。τ_0-WM提供了两个互补的接口，分别用于预测未来视觉状态和连续动作片段，以及通过动作条件的视频模拟器生成多视角的未来场景。经过大量真实机器人遥控和人类视频数据的训练，τ_0-WM在复杂的长时间和精细的机器人操作任务中表现出优越的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.29084', 'title': 'Same Question, Different Source, Different Answer: Auditing Source-Dependence in Medical Multi-Source RAG', 'url': 'https://huggingface.co/papers/2605.29084', 'abstract': 'Abstract Retrieval-augmented generation systems exhibit source-dependent responses to identical queries, necessitating a shift from traditional correctness evaluation to analyzing inter-source relationships for multi-source NLP systems.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A retrieval-augmented generation (RAG) system deployed over a multi-author institutional corpus can give a different answer to the same question depending on which source it retrieves -- a failure mode the dominant single-gold-answer paradigm cannot diagnose. We argue that source-dependence is a missing axis of NLP evaluation, and that auditing it means shifting the unit of evaluation from answer correctness to the inter-source relationship. We make this concrete in transplant patient education, where institutional sources demonstrably disagree, releasing three artefacts: TransplantQA, a benchmark of real patient questions, each answered by grounding generation in multiple institutional handbooks as candidate sources; HERO-QA, a hierarchical retrieval strategy that grounds and audits each answer; and a structured-output judge that scores inter-source relationships on a validated 5-label taxonomy. At scale, better retrieval reveals far more disagreement than prior estimates suggested -- understating its prevalence, not its intensity. The framework is domain-agnostic and transfers to legal and educational RAG: measuring source-dependence is a responsibility for deployed multi-source NLP generally.', 'score': 0, 'issue_id': 2360, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '0618d6dec2c4d1c2', 'authors': ['Yubo Li', 'Rema Padman', 'Ramayya Krishnan'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29084.jpg', 'data': {'categories': ['#rag', '#benchmark', '#dataset'], 'emoji': '🔀', 'ru': {'title': 'Оценка согласованности между источниками в многоисточниковых системах генерации с augmentation', 'desc': 'В статье рассматривается проблема зависимости ответов систем retrieval-augmented generation от выбранного источника информации при ответе на одинаковые вопросы. Авторы предлагают новый подход к оценке NLP систем, сосредотачиваясь не только на корректности ответов, но и на анализе взаимоотношений между источниками в многоисточниковых системах. Исследование представляет три артефакта: набор данных TransplantQA с реальными вопросами пациентов, иерархическую стратегию retrieval HERO-QA и судью для оценки межисточниковых связей по валидированной таксономии. Авторы демонстрируют, что лучшее извлечение информации выявляет намного больше расхождений между источниками, чем предполагалось ранее, и предлагают фреймворк как ответственную практику для развернутых многоисточниковых систем NLP.'}, 'en': {'title': 'Understanding Source-Dependence in Multi-Source NLP Systems', 'desc': 'This paper discusses the challenges of evaluating retrieval-augmented generation (RAG) systems in natural language processing (NLP), particularly when different sources provide varying answers to the same question. It highlights the need to shift from traditional correctness evaluation to analyzing the relationships between sources, as this can reveal significant discrepancies in information. The authors introduce tools like TransplantQA and HERO-QA to benchmark and audit answers based on multiple institutional sources, emphasizing the importance of understanding source-dependence. The proposed framework is applicable across various domains, suggesting that measuring source-dependence is crucial for the effective deployment of multi-source NLP systems.'}, 'zh': {'title': '源依赖性：多源NLP评估的新维度', 'desc': '本论文探讨了增强检索生成系统在处理相同查询时，如何因来源不同而产生不同的回答。这种源依赖性是传统的正确性评估所无法识别的，因此需要将评估重点从答案的正确性转向源之间的关系。我们在移植患者教育的背景下，提出了三个工具来评估和审计这些源之间的关系，包括基于多个机构手册的问答基准TransplantQA和分层检索策略HERO-QA。我们的研究表明，源依赖性在多源自然语言处理系统中是一个重要的评估维度，适用于法律和教育等领域。'}}}, {'id': 'https://huggingface.co/papers/2605.29087', 'title': 'The Chain Holds, the Answer Folds: Trace-Answer Dissociation in Reasoning Models Under Adversarial Pressure', 'url': 'https://huggingface.co/papers/2605.29087', 'abstract': 'Abstract Research reveals a new failure mode in reasoning models where correct chain-of-thought reasoning leads to incorrect final answers under adversarial conditions, demonstrated through controlled experiments across multiple datasets and models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reasoning models are evaluated on single-turn benchmarks but deployed in multi-turn dialogue, where users push back on correct answers. Under sustained adversarial pressure we find a previously undocumented failure mode: the chain-of-thought stays factually correct from first turn to last while the emitted answer flips wrong. We call this unfaithful capitulation (UC) and isolate it with a 2times 2 latent-versus-behavioral framework that flip-rate metrics and single-turn faithfulness probes both miss. Across three datasets (MT-Consistency, MMLU-Pro, GSM8K), the latent-correct rate at the behavioral flip clusters near 50% in think mode and collapses to 11-15% under no_think -- paired, within-model causal evidence that reasoning creates the gap. Across models the effect tracks the reasoning channel (high in Qwen3-32B and GPT-OSS-20B, low in inline-CoT Gemma-4-31B-it). An independent GPT-4o judge corroborates 86% of UC labels; a token-level probe shows the answer-slot argmax is correct in 84% of UC cells; and a naive trace-anchored defense backfires. We release all trajectories, traces, and judge labels.', 'score': 0, 'issue_id': 2360, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '18da91d1fdbed09e', 'authors': ['Yubo Li', 'Ramayya Krishnan', 'Rema Padman'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29087.jpg', 'data': {'categories': ['#alignment', '#reasoning', '#security', '#interpretability'], 'emoji': '🤔', 'ru': {'title': 'Когда рассуждение правильно, но ответ неправильный', 'desc': 'В работе выявлен новый режим отказа в моделях рассуждения, при котором логически правильная цепочка мыслей ведёт к неправильному финальному ответу под воздействием состязательных атак. Исследователи обнаружили явление «неверного капитулирования», когда модель сохраняет фактически корректные рассуждения, но меняет ответ на неправильный под давлением пользователя в многоходовом диалоге. Используя специально разработанную 2×2 фреймворк латентного и поведенческого анализа, авторы показали, что этот эффект особенно выражен в моделях с явным блоком мышления и практически отсутствует в моделях с встроенным chain-of-thought. Эксперименты на трёх датасетах подтверждают, что причиной является недостаточная связь между компонентом рассуждения и финальным ответом.'}, 'en': {'title': 'Unfaithful Capitulation: When Correct Reasoning Leads to Wrong Answers', 'desc': 'This paper identifies a new issue in reasoning models called unfaithful capitulation (UC), where the reasoning process remains correct, but the final answer becomes incorrect under adversarial conditions. The researchers conducted experiments across various datasets and models, revealing that while the reasoning appears valid, the output can flip to an incorrect answer. They introduced a framework to analyze this phenomenon, showing that the accuracy of reasoning can significantly drop when faced with sustained challenges. The findings highlight the need for improved evaluation methods that account for this failure mode in multi-turn dialogue settings.'}, 'zh': {'title': '推理模型中的不忠实屈服现象', 'desc': '本研究揭示了推理模型中的一种新失败模式，即在对抗性条件下，正确的思维链推理会导致错误的最终答案。通过对多个数据集和模型的控制实验，发现这种现象被称为不忠实屈服（UC），在多轮对话中尤为明显。尽管思维链在每一轮中都保持事实正确，但最终输出的答案却可能错误。研究表明，推理过程中的差距在不同模型中表现不同，且在特定条件下，行为翻转率接近50%。'}}}, {'id': 'https://huggingface.co/papers/2605.09156', 'title': 'Lost in Translation? Exploring the Shift in Grammatical Gender from Latin to Occitan', 'url': 'https://huggingface.co/papers/2605.09156', 'abstract': 'Abstract A deep learning framework is developed to analyze the grammatical gender system evolution from Latin to Romance languages, examining both lexical and contextual factors in a low-resource historical setting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The diachronic evolution from Latin to the Romance languages involved a restructuring of the grammatical gender system from a tripartite configuration (masculine, feminine, neuter) to a bipartite one (masculine, feminine) in most Romance languages. In this work, we introduce an interpretable deep learning framework to investigate this phenomenon at both lexical and contextual levels. First, we show that conventional tokenization strategies are insufficiently robust for this low-resource historical setting, and that our proposed tokenizer improves performance over these baselines. At the lexical level, we evaluate the contribution of morphological features to gender prediction. At the contextual level, we quantify the contributions of different part-of-speech categories to grammatical gender prediction. Together, these analyses characterize the distribution of gender information between the lemma and its sentential context. We make our codebase, datasets, and results publicly available at https://github.com/ahan-2000/Lost-in-Translation-{https://github.com/ahan-2000/Lost-in-Translation-}.', 'score': 0, 'issue_id': 2360, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'ff7a62c8e5a904ee', 'authors': ['Ahan Chatterjee', 'Matthias Schöffel', 'Matthias Aßenmacher', 'Marinus Wiedner', 'Esteban Garces Arias'], 'affiliations': ['Bavarian Academy of Sciences (BAdW), Munich', 'LMU Munich', 'Munich Center for Machine Learning (MCML)', 'University of Freiburg'], 'pdf_title_img': 'assets/pdf/title_img/2605.09156.jpg', 'data': {'categories': ['#science', '#low_resource', '#open_source', '#interpretability'], 'emoji': '📜', 'ru': {'title': 'Как древние языки теряют грамматический род: глубокое обучение для истории языков', 'desc': 'Исследователи разработали интерпретируемую глубокую нейросетевую модель для анализа эволюции системы грамматического рода с латыни на романские языки. В работе показано, что стандартные методы токенизации неэффективны для работы с историческими текстами с ограниченными данными, поэтому предложена улучшенная альтернатива. На лексическом уровне оценивается вклад морфологических признаков в предсказание рода, а на контекстном уровне анализируется влияние различных частей речи на определение грамматического рода. Результаты показывают, как информация о роде распределяется между основой слова и его контекстом в предложении.'}, 'en': {'title': 'Unraveling Gender Evolution in Romance Languages with Deep Learning', 'desc': 'This paper presents a deep learning framework designed to study how the grammatical gender system evolved from Latin to Romance languages. It highlights the shift from a three-gender system (masculine, feminine, neuter) to a two-gender system (masculine, feminine) in most Romance languages. The authors introduce a new tokenizer that outperforms traditional methods in this low-resource historical context, enhancing the analysis of gender prediction. Additionally, the framework assesses both morphological features and part-of-speech categories to understand how gender information is distributed in language.'}, 'zh': {'title': '深度学习揭示拉丁语到罗曼语的性别演变', 'desc': '本文提出了一种深度学习框架，用于分析拉丁语到罗曼语的语法性别系统演变。研究表明，罗曼语中的性别系统从三分法（阳性、阴性、中性）转变为大多数罗曼语的二分法（阳性、阴性）。我们引入了一种可解释的深度学习方法，评估形态特征和词性对性别预测的贡献，并提出了一种改进的分词策略，以适应低资源的历史环境。我们的研究结果和代码库已公开，供研究人员使用。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (5)', '#agents (17)', '#agi', '#alignment (2)', '#architecture (10)', '#audio (1)', '#benchmark (26)', '#cv (7)', '#data (1)', '#dataset (16)', '#diffusion (5)', '#ethics', '#games', '#graphs', '#hallucinations (2)', '#healthcare', '#inference (8)', '#interpretability (5)', '#leakage', '#long_context (4)', '#low_resource (4)', '#machine_translation', '#math (6)', '#multilingual (5)', '#multimodal (21)', '#open_source (13)', '#optimization (16)', '#plp', '#rag (4)', '#reasoning (12)', '#rl (5)', '#rlhf (2)', '#robotics (6)', '#science (4)', '#security (3)', '#small_models (4)', '#story_generation', '#survey (2)', '#synthetic (2)', '#training (20)', '#transfer_learning (1)', '#video (9)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-02 14:46',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-02 14:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-02 14:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
