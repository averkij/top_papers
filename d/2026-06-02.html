 advantage estimates with post-failure noise. We propose ESPO (Early-Stopping Proximal Policy Optimization), which detects trajectory failure on-the-fly and terminates rollouts early. At each generation step, ESPO computes a surrogate regret using only the logits already computed during sampling, and terminates when the smoothed cumulative regret significantly exceeds its estimated values. Truncated trajectories are treated as absorbing failure states with a terminal reward, concentrating negative temporal-difference (TD) errors near the detected failure step without any additional reward model or human annotation. On DeepSeek-R1-Distill-Qwen-7B trained for mathematical reasoning, ESPO surpasses PPO on AIME~2024 (46.28% vs. 45.25%), AMC~2023 (85.83% vs. 82.94%), and MATH-500 (87.42% vs. 85.43%), while saving more than 20% rollout tokens cumulatively.', 'score': 12, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'f04d8619bb433489', 'authors': ['Zihang Li', 'Rui Zhou', 'Yingcheng Shi', 'Wenhan Yu', 'Zhewen Tan', 'Zixiang Liu', 'Zeming Li', 'Binhua Li', 'Yongbin Li', 'Tong Yang', 'Jieping Ye'], 'affiliations': ['Peking University', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.29860.jpg', 'data': {'categories': ['#rlhf', '#math', '#training', '#reasoning', '#optimization', '#rl'], 'emoji': '🛑', 'ru': {'title': 'Ранняя остановка неудачных траекторий для эффективного обучения математическому рассуждению', 'desc': 'ESPO — это улучшенный алгоритм обучения с подкреплением, который обнаруживает ошибочные траектории рассуждений в больших языковых моделях на ранних этапах и прерывает их генерацию. Метод использует суррогатный регрет, вычисляемый из уже полученных логитов, чтобы определить момент отказа без дополнительных моделей награды. Неполные траектории рассматриваются как поглощающие состояния неудачи с терминальной наградой, что сосредоточивает ошибки обучения вблизи обнаруженного отказа. На задачах математического рассуждения ESPO превосходит стандартный PPO, одновременно сокращая затраты вычислений на 20% за счёт экономии токенов при генерации.'}, 'en': {'title': 'Optimize Early, Save Resources!', 'desc': 'The paper introduces ESPO (Early-Stopping Proximal Policy Optimization), a method that enhances mathematical reasoning in large language models by identifying and halting unsuccessful reasoning paths early in the training process. This approach prevents the model from wasting computational resources on generating tokens that will not yield positive rewards, thus improving efficiency. By calculating a surrogate regret based on already computed logits, ESPO can terminate rollouts when the cumulative regret indicates a high likelihood of failure. The results show that ESPO outperforms traditional PPO methods in various benchmarks while significantly reducing the number of tokens used during training.'}, 'zh': {'title': '早停优化，提升推理效率！', 'desc': 'ESPO（早停近端策略优化）通过提前检测和终止失败的推理轨迹，改善了大型语言模型的数学推理能力。传统算法在模型犯错后仍然强制生成，导致计算资源浪费和不必要的噪声。ESPO在每个生成步骤中计算替代后悔值，并在检测到显著的后悔值时提前终止生成。通过将截断的轨迹视为吸收失败状态，ESPO有效集中负的时间差（TD）误差，从而提高了模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.01528', 'title': 'Joint Agent Memory and Exploration Learning via Novelty Signals', 'url': 'https://huggingface.co/papers/2606.01528', 'abstract': 'Abstract Joint Agent Memory and Exploration Learning (JAMEL) framework trains memory and exploration policies together through novelty-driven interaction, enabling effective exploration in open-ended environments with reduced computational costs.  AI-generated summary In open-ended environments, exploration is fundamental for autonomous agents, yet current language model agents struggle with this. Effective exploration requires memory, but retaining raw interaction histories is computationally expensive over long trajectories. While latent memory offers a solution to compress interaction histories, its training lacks reliable supervisory signals. We introduce Joint Agent Memory and Exploration Learning (JAMEL), a framework that trains agentic memory and exploration policy together through novelty-driven interaction. We observe that memory and exploration form a mutually dependent loop: sustained exploration requires memory to distinguish exhausted behaviors from unseen ones, while novelty-seeking interaction provides the supervision needed to make memory useful for future exploration. By utilizing deterministic and persistent novelty signals such as code coverage in the GUI domain, we provide natural, annotation-free supervision for the memory module. Empirical evaluations demonstrate that \\ours successfully generalizes to unseen environments. Its exploration capability outperforms open-weight baselines and rivals the exploration depth of a closed-source model while reducing token consumption. Our code and model are open-sourced at https://github.com/MobileLLM/JAMEL.', 'score': 11, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '39daa2e3594417c9', 'authors': ['Shizuo Tian', 'Xiaohong Weng', 'Rui Kong', 'Yuxuan Chen', 'Guohong Liu', 'Yuebing Song', 'Jiacheng Liu', 'Yuchen Li', 'Dawei Yin', 'Ting Cao', 'Yunxin Liu', 'Yuanchun Li'], 'affiliations': ['Baidu Inc.', 'Peking University', 'Sun Yat-sen University', 'Tongji University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01528.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Память и исследование взаимно усиливают друг друга', 'desc': 'Авторы предлагают JAMEL — фреймворк для совместного обучения памяти и политики исследования среды для агентов на основе языковых моделей. Ключевая идея заключается в том, что память и исследование взаимозависимы: эффективное исследование требует памяти для различения исчерпанных и новых поведений, а в свою очередь новизна-ориентированное взаимодействие обеспечивает обучающий сигнал для памяти. Фреймворк использует детерминированные сигналы новизны, такие как покрытие кода, для получения естественной супервизии при обучении модуля памяти без необходимости ручной аннотации. Эксперименты показывают, что JAMEL превосходит открытые базовые модели по способности исследовать среду и при этом потребляет меньше токенов, чем закрытые модели.'}, 'en': {'title': 'Exploring Smarter: Memory Meets Exploration in JAMEL', 'desc': 'The Joint Agent Memory and Exploration Learning (JAMEL) framework enhances the exploration capabilities of autonomous agents in open-ended environments by integrating memory and exploration policies. It addresses the challenge of high computational costs associated with retaining long interaction histories by using latent memory to compress this data. JAMEL leverages novelty-driven interactions to provide effective supervision for the memory module, allowing agents to differentiate between familiar and new behaviors. Empirical results show that JAMEL not only generalizes well to new environments but also outperforms existing exploration methods while being more efficient in resource usage.'}, 'zh': {'title': '联合记忆与探索学习的创新探索', 'desc': 'JAMEL框架通过新颖性驱动的交互，联合训练记忆和探索策略，从而在开放环境中实现有效探索，并降低计算成本。有效的探索需要记忆，但长时间的交互历史保存会消耗大量计算资源。JAMEL利用潜在记忆来压缩交互历史，同时通过新颖性信号为记忆模块提供自然的监督。实验结果表明，JAMEL在未见环境中成功泛化，其探索能力超越了开放权重基线，并与封闭源模型的探索深度相当，同时减少了令牌消耗。'}}}, {'id': 'https://huggingface.co/papers/2606.00408', 'title': "Masking Stale Observations Helps Search Agents -- Until It Doesn't: A Regime Map and Its Mechanism", 'url': 'https://huggingface.co/papers/2606.00408', 'abstract': "Abstract Observation masking in long-horizon search agents shows variable accuracy gains depending on the interaction between retriever capability and model capacity, following an asymmetric inverted-U pattern.  AI-generated summary Long-horizon search agents accumulate large amounts of retrieved content across many tool calls, making context-budget efficiency increasingly important. A minimal intervention is to mask stale observations from the context as the trajectory progresses, but it remains unclear when this form of context management helps and why. We study observation masking through a systematic sweep over various agent backbones (4B to 284B parameters) and three retrievers on offline and live-web agentic search benchmarks. We find that the accuracy gain from masking follows an asymmetric inverted-U shape when plotted against the model's accuracy without context management: a plateau under weak retrievers, a peak when a strong retriever meets a mid-capacity model, and a sharp collapse when the model is saturated. This pattern reflects the interaction between retriever recall and the model's implicit filtering capacity, rather than either factor in isolation. Mechanistically, masking implements a token-for-turn trade-off: it removes observations the model has largely stopped attending to and pages the agent rarely re-opens. The added turns help when they convert failures into successes, but they fail when masking removes evidence the model would otherwise have used. We therefore reframe context management as a regime-dependent intervention and provide a holistic perspective for analyzing context use in agentic deep search. We release our scaffold and trajectories here (https://github.com/i-DeepSearch/observation-masking) to support future research.", 'score': 11, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '7dc0aa974fe8e519', 'authors': ['Haoxiang Zhang', 'Qixin Xu', 'Zhuofeng Li', 'Lei Zhang', 'Pengcheng Jiang', 'Yu Zhang', 'Julian McAuley'], 'affiliations': ['Texas A&M University', 'UC Berkeley', 'UC San Diego', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2606.00408.jpg', 'data': {'categories': ['#training', '#long_context', '#benchmark', '#agents', '#open_source', '#interpretability'], 'emoji': '🔍', 'ru': {'title': 'Баланс контекста: когда маскирование наблюдений помогает поиск-агентам', 'desc': "Исследование показывает, что маскирование устаревших наблюдений в длительных поиск-агентах имеет асимметричный эффект, зависящий от баланса между способностью retriever'а и размером модели. Авторы провели систематический анализ на моделях от 4B до 284B параметров и обнаружили, что прирост точности следует перевёрнутой U-образной кривой: плато при слабых retriever'ах, пик при сильном retriever'е и среднеёмкой модели, и резкое падение при насыщении модели. Механистически маскирование реализует компромисс между токенами и ходами агента, удаляя наблюдения, на которые модель перестала обращать внимание, и страницы, которые агент редко переоткрывает. Исследование переосмысляет управление контекстом как режимо-зависимое вмешательство и предоставляет комплексный взгляд на использование контекста в глубоком поиске агентами."}, 'en': {'title': 'Optimizing Context Management in Long-Horizon Search Agents', 'desc': "This paper investigates how observation masking affects the performance of long-horizon search agents, revealing a complex relationship between the capabilities of retrievers and the capacity of models. The authors find that the benefits of masking observations follow an asymmetric inverted-U pattern, where accuracy improves with certain combinations of retriever strength and model capacity, but declines when models become overly complex. The study emphasizes that effective context management is not just about removing old information, but about understanding when and how this removal can enhance or hinder the model's performance. By analyzing these interactions, the paper provides insights into optimizing context use in deep search agents, contributing to more efficient AI systems."}, 'zh': {'title': '观察掩蔽：提升长时间搜索代理的效率', 'desc': '在长时间搜索代理中，观察掩蔽的准确性提升因检索能力与模型容量的相互作用而异，呈现出不对称的倒U型模式。长时间搜索代理在多次工具调用中积累大量检索内容，因此上下文预算效率变得越来越重要。我们通过对不同代理骨干（参数从4B到284B）和三种检索器进行系统研究，发现掩蔽的准确性提升与没有上下文管理的模型准确性之间呈现出不对称的倒U型关系。掩蔽机制通过移除模型不再关注的观察，帮助模型在某些情况下将失败转化为成功，但在其他情况下则可能移除模型本可以利用的证据。'}}}, {'id': 'https://huggingface.co/papers/2605.29588', 'title': 'Brain-IT-VQA: From Brain Signals to Answers', 'url': 'https://huggingface.co/papers/2605.29588', 'abstract': 'Abstract Brain-IT-VQA framework decodes visual content from fMRI signals using transformer-based architecture and introduces NSD-VQA dataset for improved visual question answering evaluation.  AI-generated summary Decoding visual content from fMRI signals recorded while a person views images, and specifically answering questions about the seen images, is a long-standing challenge. While significant progress has been made in recent years in visual question answering (VQA) from fMRI, performance remains limited. Moreover, although recent models can make increasingly accurate predictions, they have rarely been used as tools for understanding the structure of visual representations in the brain. We present Brain-IT-VQA, a framework for visual question answering from fMRI. Building on the Brain Interaction Transformer (Brain-IT), our method decodes language tokens from brain activity and integrates them with a language model to answer visual questions. Our model substantially outperforms previous fMRI-based captioning and VQA approaches. We further introduce NSD-VQA, a new dataset and benchmark for visual question answering from fMRI. Unlike existing image-fMRI VQA datasets, which typically provide only a few broad and weakly controlled questions per image, NSD-VQA provides on average 20 question-answer pairs per image across 20 controlled question categories that disentangle multiple levels of visual understanding. This enables more reliable and interpretable evaluation despite limited fMRI test data. Together, Brain-IT-VQA and NSD-VQA provide both a strong predictive framework and a tool for studying brain representations. Using this benchmark, we quantify which forms of visual and semantic information can be reliably decoded from fMRI responses to natural images. We further analyze the contributions of different brain regions across question types.', 'score': 11, 'issue_id': 2358, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'fa9291cf7e5a0742', 'authors': ['Roman Beliy', 'Matias Cosarinsky', 'Oliver Heinimann', 'Navve Wasserman', 'Michal Irani'], 'affiliations': ['Weizmann Institute of Science'], 'pdf_title_img': 'assets/pdf/title_img/2605.29588.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#dataset', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Декодирование визуальных вопросов прямо из активности мозга', 'desc': 'В работе представлена архитектура Brain-IT-VQA для ответа на вопросы о визуальном содержании на основе сигналов фМРТ мозга, используя трансформер и механизм декодирования языковых токенов из активности мозга. Авторы вводят новый датасет NSD-VQA с контролируемыми вопросами к изображениям, который содержит в среднем 20 вопросо-ответных пар на одно изображение и охватывает 20 категорий вопросов. Предложенный подход значительно превосходит предыдущие методы в задаче визуального вопросно-ответного поиска и позволяет надежнее и интерпретируемее оценивать модели несмотря на ограниченные данные фМРТ. Фреймворк служит как мощный инструмент для изучения структуры визуальных представлений в мозге и количественной оценки того, какая визуальная и семантическая информация может быть декодирована из сигналов фМРТ.'}, 'en': {'title': 'Decoding Brain Signals for Visual Question Answering', 'desc': 'The Brain-IT-VQA framework utilizes a transformer-based architecture to decode visual content from fMRI signals, enabling effective visual question answering (VQA). It introduces the NSD-VQA dataset, which offers a more comprehensive set of question-answer pairs for evaluating VQA performance, enhancing the understanding of visual representations in the brain. This approach significantly improves upon previous methods by integrating language tokens derived from brain activity with a language model for accurate responses. The framework not only advances predictive capabilities but also serves as a tool for analyzing how different brain regions contribute to visual and semantic processing.'}, 'zh': {'title': '解码大脑视觉内容的创新框架', 'desc': 'Brain-IT-VQA框架利用基于变换器的架构，从fMRI信号中解码视觉内容，并引入NSD-VQA数据集以改进视觉问答评估。该方法通过分析大脑活动解码语言标记，并与语言模型结合，以回答关于所见图像的问题。尽管在视觉问答方面取得了显著进展，但性能仍然有限，Brain-IT-VQA显著优于以往的fMRI图像描述和问答方法。NSD-VQA数据集提供了更丰富的问题-答案对，使得评估更加可靠和可解释。'}}}, {'id': 'https://huggingface.co/papers/2605.25659', 'title': 'StreamChar: Long-Horizon Streaming Character Audio-Video Generation with Decoupled Orchestration', 'url': 'https://huggingface.co/papers/2605.25659', 'abstract': 'Abstract StreamChar enables real-time streaming audio-video generation for character animation by separating long-horizon orchestration from short-window denoising through an LLM-based orchestrator and joint audio-video DiT, achieving efficient deployment via two-stage distillation and maintaining visual consistency through memory mechanisms.  AI-generated summary Real-time streaming joint audio-video generation for character animation requires a generator to speak the requested transcript, maintain visual identity across chunks, and run within a strict playback budget. These requirements are difficult to satisfy simultaneously: chunk-wise autoregressive generation can accumulate transcript-audio misalignment and visual drift, while the few-step distillation needed for low latency often degrades spatial diversity and temporal quality. We present StreamChar, a streaming framework that separates long-horizon orchestration from short-window audio-video denoising. An LLM-based orchestrator uses the transcript and historical context to produce frame-aligned audio conditions, and a joint audio-video DiT performs local bidirectional denoising with reference and motion-frame conditioning. For efficient deployment, we use a two-stage distillation pipeline that first compresses the sampler and then fine-tunes the student under online chunk rollouts. A progress-aware pointer aligns partial transcripts with generated audio during rollout training, and a sink-chunk memory provides a persistent visual anchor for reducing long-horizon drift. Experiments on short-clip and long-horizon protocols show that StreamChar runs in real time on a single H100 GPU and provides a favorable system-level trade-off among transcript fidelity, audio-visual synchronization, visual quality, and streaming stability compared with recent joint and audio-driven baselines.', 'score': 11, 'issue_id': 2358, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '6a4a1a053bf3a718', 'authors': ['Linrui Tian', 'Qi Wang', 'Bang Zhang'], 'affiliations': ['Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.25659.jpg', 'data': {'categories': ['#architecture', '#training', '#video', '#audio', '#inference', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Оркестрированная потоковая генерация синхронизированного видео персонажей в реальном времени', 'desc': 'StreamChar — это система для потоковой генерации синхронизированного аудио и видео персонажей в реальном времени. Архитектура разделяет задачу на два компонента: LLM-оркестратор управляет долгосрочной согласованностью текста и аудио, а совместная диффузионная модель (DiT) выполняет локальную двусторонню денойзацию аудио-видео. Для эффективного развёртывания применяется двухэтапная дистилляция, которая сначала сжимает sampler, а затем fine-tune студента на онлайн-потоках. Механизм памяти sink-chunk обеспечивает визуальную консистентность и предотвращает накопление артефактов при длительной генерации.'}, 'en': {'title': 'StreamChar: Real-Time Audio-Video Generation for Character Animation', 'desc': 'StreamChar is a framework designed for real-time generation of audio and video for character animation. It effectively separates the long-term planning of audio-video synchronization from the short-term refinement of audio and video quality. By using a large language model (LLM) to orchestrate audio conditions and a joint audio-video diffusion model (DiT) for denoising, it maintains visual consistency and reduces misalignment. The system achieves efficient performance through a two-stage distillation process and innovative memory mechanisms, ensuring high-quality output even under strict playback constraints.'}, 'zh': {'title': '实时音视频生成的创新框架', 'desc': 'StreamChar 是一种实时音视频生成框架，专注于角色动画的生成。它通过将长时间的协调与短时间的去噪分开，使用基于大语言模型的协调器和联合音视频去噪技术来实现高效部署。该框架利用两阶段蒸馏管道来压缩生成器，并通过进度感知指针和记忆机制来保持视觉一致性。实验表明，StreamChar 在单个 H100 GPU 上实时运行，并在转录保真度、音视频同步、视觉质量和流媒体稳定性方面表现优越。'}}}, {'id': 'https://huggingface.co/papers/2606.02553', 'title': 'LongLive-RAG: A General Retrieval-Augmented Framework for Long Video Generation', 'url': 'https://huggingface.co/papers/2606.02553', 'abstract': 'Abstract LongLive-RAG addresses long-video generation challenges by using retrieval-augmented generation to overcome error accumulation from sliding-window attention, enabling better temporal coherence and quality.  AI-generated summary Autoregressive (AR) video diffusion enables variable-length synthesis, but long-horizon generation often suffers from accumulated errors and identity drift. For efficiency, existing methods commonly adopt sliding-window attention during generation. This creates an irreversible generation trajectory: once the active window accumulates appearance errors, subsequent generations can only condition on this degraded trajectory and drift further away. We address this limitation by formulating long video generation as a retrieval-augmented generation (RAG) problem. Rather than relying solely on the recent window, we treat previously generated latents as a dynamic, searchable history. We propose LongLive-RAG, a general retrieval framework for AR video generation. At each new block, LongLive-RAG uses a query embedding to retrieve relevant historical latents. This lightweight retrieval step adds only a small overhead relative to generation and lets the generator condition on non-local context instead of only the recent window. To make retrieval more discriminative, we introduce the Window Temporal Delta Loss that suppresses redundant local similarity and encourages embeddings to capture meaningful temporal changes. Together, these components help reduce error accumulation caused by sliding-window attention. Experiments across multiple AR backbones and generation lengths show improved long-video quality and the best average VBench-Long rank. To our knowledge, among open-ended AR long video generation methods, LongLive-RAG is the first to formulate self-generated latent history as content-addressable retrieval memory. Code is available at https://github.com/qixinhu11/LongLive-RAG.', 'score': 10, 'issue_id': 2359, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '8c9ec9406d89b4b6', 'authors': ['Qixin Hu', 'Shuai Yang', 'Wei Huang', 'Song Han', 'Yukang Chen'], 'affiliations': ['MIT', 'NVIDIA', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2606.02553.jpg', 'data': {'categories': ['#architecture', '#open_source', '#rag', '#diffusion', '#video'], 'emoji': '🎬', 'ru': {'title': 'Избегаем ошибок в длинных видео через поиск по истории поколения', 'desc': 'LongLive-RAG решает проблему генерации длинных видео с помощью retrieval-augmented generation, который преодолевает накопление ошибок от скользящего окна внимания. Вместо того чтобы полагаться только на недавно сгенерированные фреймы, метод использует ранее созданные латентные представления как динамическую, поддающуюся поиску историю. Специально разработанная функция потерь Window Temporal Delta Loss подавляет локальную избыточность и поощряет модель фокусироваться на значимых временных изменениях. Результаты показывают значительное улучшение качества долгих видео и снижение дрейфа идентичности в авторегрессивной генерации.'}, 'en': {'title': 'Enhancing Long Video Generation with Retrieval-Augmented Techniques', 'desc': 'LongLive-RAG is a novel approach to generating long videos by using retrieval-augmented generation (RAG) to improve the quality and coherence of the output. Traditional methods often suffer from errors that accumulate over time due to the limitations of sliding-window attention, which only considers a small recent context. By treating previously generated video segments as a searchable history, LongLive-RAG allows the model to access relevant past information, reducing the risk of identity drift and enhancing temporal consistency. The introduction of the Window Temporal Delta Loss further refines the retrieval process, ensuring that the model focuses on significant changes rather than redundant information, leading to superior long-video generation results.'}, 'zh': {'title': '长视频生成的新突破：LongLive-RAG', 'desc': 'LongLive-RAG 解决了长视频生成中的挑战，通过检索增强生成（RAG）来克服滑动窗口注意力带来的错误累积问题，从而提高时间一致性和生成质量。现有方法通常采用滑动窗口注意力，这导致生成轨迹不可逆，一旦出现错误，后续生成只能在这个退化的轨迹上进行。LongLive-RAG 将长视频生成视为一个检索增强生成问题，利用历史生成的潜在变量作为动态可搜索的历史记录。通过引入窗口时间增量损失，LongLive-RAG 能够减少错误累积，提高长视频生成的质量。'}}}, {'id': 'https://huggingface.co/papers/2606.02031', 'title': 'OpenWebRL: Demystifying Online Multi-turn Reinforcement Learning for Visual Web Agents', 'url': 'https://huggingface.co/papers/2606.02031', 'abstract': 'Abstract OpenWebRL presents a framework for training visual web agents using online reinforcement learning on real websites, achieving state-of-the-art performance with minimal initial supervision.  AI-generated summary Building capable visual web agents requires long-horizon reasoning, precise grounding, and robust interaction with dynamic real-world websites. Despite rapid progress, the strongest systems remain largely proprietary, while open agents still depend heavily on supervised post-training over large collections of curated web trajectories. This dependence creates a major scalability bottleneck: high-quality demonstrations are expensive to collect, and static datasets offer limited coverage of the diverse, ever-changing open web. Although online RL has shown promise for text-based agents, its potential for training visual web agents directly on live websites remains largely underexplored. In this paper, we introduce OpenWebRL, an open framework for training visual web agents with online multi-turn RL on real websites. OpenWebRL covers the full training pipeline, including scalable live-browser infrastructure, supervised initialization, multimodal context management, trajectory-level success judging, and efficient multi-turn policy optimization. Using this framework, we train OpenWebRL-4B, which establishes a new open-source state of the art on challenging live-web benchmarks. With only 0.4K initialization trajectories and 2.2K open-ended RL training tasks, OpenWebRL-4B achieves 67.0% success on Online-Mind2Web and 64.0% on DeepShop, outperforming prior open agents of similar or larger scale and remaining competitive with proprietary systems including OpenAI CUA and Gemini CUA. Beyond strong benchmark performance, we systematically study the key design choices that make online RL effective for visual web agents, and analyze how RL improves agentic reasoning. Overall, our work offers a practical path toward building more capable, reproducible, and cost-efficient open web agents. We will release our training data, models, and code to support future research.', 'score': 9, 'issue_id': 2359, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '25386eca14bb23d1', 'authors': ['Rui Yang', 'Qianhui Wu', 'Yuxi Chen', 'Hao Bai', 'Wenlin Yao', 'Hao Cheng', 'Baolin Peng', 'Huan Zhang', 'Tong Zhang', 'Jianfeng Gao'], 'affiliations': ['Microsoft', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2606.02031.jpg', 'data': {'categories': ['#reasoning', '#multimodal', '#open_source', '#benchmark', '#training', '#rl', '#agents', '#optimization'], 'emoji': '🕷️', 'ru': {'title': 'Онлайн обучение с подкреплением для самостоятельных веб-агентов без дорогих аннотаций', 'desc': 'OpenWebRL представляет框架для обучения визуальных веб-агентов с использованием онлайн-обучения с подкреплением непосредственно на реальных веб-сайтах. В отличие от существующих подходов, которые полагаются на дорогостоящие размеченные датасеты, OpenWebRL использует масштабируемую инфраструктуру с живыми браузерами для обучения агентов в реальной среде. Система включает многомодальное управление контекстом, многошаговую оптимизацию политики и оценку успеха на уровне траекторий. Модель OpenWebRL-4B достигает современных результатов на открытых бенчмарках, конкурируя с проприетарными системами и требуя минимального начального контролируемого обучения.'}, 'en': {'title': 'Empowering Visual Web Agents with OpenWebRL', 'desc': 'OpenWebRL introduces a new framework for training visual web agents using online reinforcement learning (RL) directly on real websites. This approach minimizes the need for extensive initial supervision and overcomes the limitations of static datasets by leveraging live interactions. The framework includes components for scalable browser infrastructure, multimodal context management, and efficient policy optimization, leading to the development of OpenWebRL-4B, which sets new performance benchmarks. By demonstrating the effectiveness of online RL for visual agents, this work paves the way for more accessible and efficient training methods in the field.'}, 'zh': {'title': '开放网络代理的强化学习新路径', 'desc': 'OpenWebRL是一个用于训练视觉网络代理的框架，采用在线强化学习方法在真实网站上进行训练，取得了最先进的性能。该框架解决了高质量演示收集的瓶颈问题，支持多轮交互和动态环境下的有效学习。通过使用OpenWebRL，研究人员能够在仅有少量初始数据的情况下，训练出表现优异的代理。我们的工作为构建更强大、可重复和成本效益高的开放网络代理提供了实用的路径。'}}}, {'id': 'https://huggingface.co/papers/2605.30723', 'title': 'Skill is Not One-Size-Fits-All: Model-Aware Skill Alignment for LLM Agents', 'url': 'https://huggingface.co/papers/2605.30723', 'abstract': 'Abstract Model-aware skill alignment framework adapts skills to different backbones through hierarchical evolution and lightweight rewriter training, achieving superior performance across interactive tasks.  AI-generated summary LLM agents increasingly retrieve externally curated skills-procedural instructions retrieved at decision time-to improve performance on long-horizon interactive tasks. Existing skill libraries are typically treated as model-agnostic, reusing the same skill formulations across backbones with substantially different capacities and behaviors. However, our controlled experiments across multiple model scales show that skill effectiveness is strongly model-dependent: a skill that benefits one backbone can harm another. Motivated by this observation, we propose MASA Model-Aware Skill Alignment, a framework that adapts skills to each target backbone without modifying agent weights. MASA operates in two stages: (1) a hierarchical skill evolution pipeline that iteratively rewrites general and task-specific skills using hill climbing and UCB-driven tree search, guided by environment feedback and model capability profiles; and (2) a lightweight model-conditioned skill rewriter trained on evolution trajectories to reproduce the adaptation in a single forward pass. Experiments across three interactive environments and four backbones show that MASA consistently achieves the best overall performance, with gains of up to 25.8 points over the strongest baseline. The learned rewriter further generalizes to unseen tasks and environments without additional search, consistently outperforming a much larger teacher LLM at a fraction of the inference cost.', 'score': 9, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '221dc9dd93969ca0', 'authors': ['Jianxiang Yu', 'Jiapeng Zhu', 'Bochen Lin', 'Qier Cui', 'Zichen Ding', 'Xiang Li'], 'affiliations': ['East China Normal University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30723.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Адаптация навыков агентов к разным моделям через эволюцию и переписывание', 'desc': 'В статье предлагается MASA — фреймворк для адаптации навыков агентов к различным моделям-бэкбонам без изменения весов самого агента. Авторы показали, что эффективность одного и того же навыка сильно зависит от архитектуры модели, и предложили двухэтапный подход: иерархическая эволюция навыков с использованием hill climbing и поиска по дереву, а также обучение лёгкого переписывателя навыков для адаптации в один проход. Эксперименты на трёх окружениях и четырёх бэкбонах демонстрируют, что MASA достигает лучшей производительности с улучшением до 25.8 пункта. Обученный переписыватель обобщается на новые задачи и окружения, работая дешевле и эффективнее, чем более крупные учительские модели.'}, 'en': {'title': 'Tailoring Skills for Optimal AI Performance', 'desc': 'The paper introduces the Model-Aware Skill Alignment (MASA) framework, which customizes skills for different AI models, enhancing their performance in interactive tasks. It highlights that skills are not universally effective across various model architectures, as a skill beneficial for one model may negatively impact another. MASA operates in two phases: first, it evolves skills through a feedback-driven process, and second, it employs a lightweight rewriter to adapt these skills efficiently. The results demonstrate that MASA significantly improves performance across multiple environments and models, achieving notable gains while maintaining low computational costs.'}, 'zh': {'title': '模型感知技能对齐：提升交互任务表现的关键', 'desc': '本论文提出了一种名为MASA（Model-Aware Skill Alignment）的框架，旨在根据不同的模型架构调整技能。通过分层进化和轻量级重写器训练，MASA能够在不修改智能体权重的情况下，优化技能在不同任务中的表现。实验表明，技能的有效性与模型密切相关，某些技能在特定模型上表现良好，但在其他模型上可能会产生负面影响。MASA在多个交互环境和模型架构中均表现出色，提升了性能，并且其学习到的重写器能够在未见过的任务和环境中泛化。'}}}, {'id': 'https://huggingface.co/papers/2605.30852', 'title': 'Speculative Pipeline Decoding: Higher-Accruacy and Zero-Bubble Speculation via Pipeline Parallelism', 'url': 'https://huggingface.co/papers/2605.30852', 'abstract': "Abstract Speculative Pipeline Decoding introduces a novel framework that leverages pipeline parallelism to accelerate large language model inference by enabling parallel token processing and reducing decoding latency.  AI-generated summary Speculative Decoding (SD) accelerates low-concurrency LLM inference by employing a draft-then-verify paradigm. However, mainstream methods typically rely on multi-token prediction, which introduces escalating prediction difficulty and serial drafting latency. To address these, we propose Speculative Pipeline Decoding (SPD), a groundbreaking framework that unlocks the true potential of pipeline parallelism. By partitioning the target LLM into n pipeline stages, SPD allows LLM to process n tokens in parallel to accelerate decoding. To continuous fill the pipeline in single sequence decoding, a speculation module aggregates intermediate features across different pipeline depths to predict the next token, executing strictly in parallel with the target model's pipeline step, to realize bounded difficulty, higher acceptance rates, and zero latency bubbles. Our experiments demonstrate that SPD achieves a significantly higher theoretical speedup compared to mainstream baselines, offering a highly scalable solution for LLM decoding acceleration. Our code is available at https://github.com/yuyijiong/speculative_pipeline_decoding", 'score': 7, 'issue_id': 2358, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'add0d2b13d132a33', 'authors': ['Yijiong Yu', 'Huazheng Wang', 'Shuai Yuan', 'Ruilong Ren', 'Ji Pei'], 'affiliations': ['DeepSolution', 'Oregon State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30852.jpg', 'data': {'categories': ['#inference'], 'emoji': '⚡', 'ru': {'title': 'Параллельное конвейерное декодирование для ускорения инференса LLM', 'desc': 'В работе представлен метод Speculative Pipeline Decoding, который ускоряет инференс больших языковых моделей путем применения конвейерного параллелизма. Основная идея заключается в разделении модели на n стадий конвейера, позволяя обрабатывать n токенов параллельно вместо последовательной генерации. Модуль спекуляции агрегирует промежуточные представления с разных глубин конвейера для предсказания следующего токена, работая синхронно с основной моделью без задержек. Экспериментальные результаты показывают значительное улучшение теоретического ускорения по сравнению с существующими методами спекулятивного декодирования.'}, 'en': {'title': 'Accelerating LLM Inference with Speculative Pipeline Decoding', 'desc': 'The paper presents Speculative Pipeline Decoding (SPD), a new method to speed up the inference of large language models (LLMs) by using pipeline parallelism. SPD allows multiple tokens to be processed simultaneously, which reduces the time it takes to generate text. It introduces a speculation module that predicts the next token while the model is still working on the current one, minimizing delays. Experimental results show that SPD significantly outperforms existing methods, making it a promising approach for faster LLM decoding.'}, 'zh': {'title': '投机管道解码：加速大型语言模型的创新框架', 'desc': '本文提出了一种新的框架，称为投机管道解码（SPD），旨在加速大型语言模型的推理过程。通过管道并行性，SPD能够实现并行处理多个令牌，从而减少解码延迟。该方法通过将目标语言模型分成多个管道阶段，使得每个阶段可以同时处理多个令牌，提升了解码效率。实验结果表明，SPD在理论上比主流方法具有显著的加速效果，是一种高度可扩展的解码加速解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.00828', 'title': 'RoboStressBench: Benchmarking VLM Robustness to Physical Visual Stress in Embodied Scenes', 'url': 'https://huggingface.co/papers/2606.00828', 'abstract': 'Abstract RoboStressBench presents a principled benchmark for evaluating vision-language model robustness to physical visual stress in embodied AI, decomposing visual stress into material, viewpoint, lighting, and geometry dimensions.  AI-generated summary Vision-Language Models (VLMs) have shown strong visual understanding and are increasingly deployed in embodied AI systems, where reliable perception under real conditions is essential. However, existing benchmarks assess VLMs using clean images or isolated perturbations rather than stresses caused by physical scene formation. This design has two limitations: it covers only a narrow subset of everyday visual stresses, and some perturbations rarely appear in realistic embodied scenes. This gap raises a fundamental question: how can we define visual stress in a principled way that captures the diverse factors encountered in physical environments? To address this question, we formulate visual perception from an inverse graphics perspective and introduce RoboStressBench, a benchmark for evaluating VLM robustness to physical visual stress in embodied scenes. Inspired by the physical rendering equation, RoboStressBench decomposes visual stress into four physically grounded dimensions: Material (M), Viewpoint (V), Lighting (L), and Geometry (G). This design enables RoboStressBench to cover a broad range of visual stresses in real-world environments, while allowing controlled analysis of their effects on VLM capabilities such as visual recognition, reasoning, and planning. Through comprehensive evaluations of state-of-the-art VLMs, we identify stress-specific failure modes and reveal that different physical factors degrade different embodied capabilities, which are often obscured by aggregate accuracy. We further introduce a stress-aware agentic solver that detects visual stressors and invokes visual-editing skills before reasoning, improving robustness in high-stress scenarios. Overall, RoboStressBench provides a principled evaluation framework for diagnosing and improving VLM perception under real-world physical stress, supporting the development of more reliable embodied AI systems.', 'score': 6, 'issue_id': 2358, 'pub_date': '2026-05-30', 'pub_date_card': {'ru': '30 мая', 'en': 'May 30', 'zh': '5月30日'}, 'hash': 'a516c0d82fd3f280', 'authors': ['Leyi Wu', 'Yifan Zhao', 'Jinjie Zhang', 'Suzeyu Chen', 'Wosong Chen', 'Zhifei Chen', 'Tianshuo Xu', 'Qingchun He', 'Hongxin Hu', 'Haojian Huang', 'Yangkai Wei', 'Wenqian Li', 'Yinchuan Li', 'Ying-Cong Chen'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Knowin'], 'pdf_title_img': 'assets/pdf/title_img/2606.00828.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#cv', '#agents', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Физически обоснованная оценка устойчивости видео-языковых моделей к реальным визуальным помехам', 'desc': 'В статье представлен RoboStressBench — комплексный бенчмарк для оценки устойчивости видео-языковых моделей к физическим визуальным помехам в воплощённых AI-системах. Авторы предлагают разложить визуальные помехи на четыре физически обоснованные компоненты: материал поверхности, точку обзора, освещение и геометрию сцены, вдохновляясь уравнением рендеринга. Через экспериментальную оценку современных VLM-моделей выявлены специфичные для каждого типа помех сбои, которые скрыты при агрегированной оценке точности. Кроме того, предложен адаптивный решатель, который автоматически обнаруживает визуальные стрессоры и применяет редактирование изображений для повышения робастности модели в сложных условиях.'}, 'en': {'title': 'Evaluating AI Resilience: The RoboStressBench Approach', 'desc': 'RoboStressBench is a new benchmark designed to test how well vision-language models (VLMs) handle real-world visual stress in embodied AI. It breaks down visual stress into four key areas: Material, Viewpoint, Lighting, and Geometry, allowing for a comprehensive evaluation of VLM performance. Unlike previous benchmarks that used clean images, RoboStressBench focuses on the diverse and realistic stresses that VLMs encounter in everyday situations. This framework not only identifies specific weaknesses in VLMs but also introduces a method to enhance their robustness against these stresses, ultimately leading to more reliable AI systems.'}, 'zh': {'title': 'RoboStressBench：提升视觉-语言模型鲁棒性的基准', 'desc': 'RoboStressBench是一个用于评估视觉-语言模型在物理视觉压力下鲁棒性的基准。它将视觉压力分解为材料、视角、光照和几何四个维度，以便更全面地覆盖现实环境中的视觉压力。通过对先进的视觉-语言模型进行评估，RoboStressBench揭示了不同物理因素对模型能力的影响，并识别出特定压力下的失败模式。此外，RoboStressBench还引入了一种压力感知的智能求解器，以提高在高压力场景下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.30931', 'title': 'MineExplorer: Evaluating Open-World Exploration of MLLM Agents in Minecraft', 'url': 'https://huggingface.co/papers/2605.30931', 'abstract': "Abstract MineExplorer benchmark evaluates multimodal large language models' open-world exploration capabilities in Minecraft through atomic and multi-hop tasks designed via multi-agent synthesis.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models (MLLMs) have shown strong capabilities in perception, reasoning, and action generation. However, their ability to sustain exploration in dynamic open worlds remains unclear. Existing embodied and game-based benchmarks often compress interaction into short-horizon tasks or entangle success with domain-specific game mechanics. In this paper, we introduce MineExplorer benchmark for evaluating open-world exploration capabilities of MLLM agents in Minecraft. We first filter atomic tasks whose solutions rely heavily on Minecraft-specific knowledge to better reflect general open-world reasoning. Then we organize the benchmark around a ReAct-style capability formulation and compose atomic tasks into implicit multi-hop tasks. To further construct reliable instances, MineExplorer uses a multi-agent synthesis workflow that jointly designs task graphs, sandbox scenes, and rule-based milestone evaluators. Human evaluation shows that the multi-agent synthesis workflow produces significantly more reliable instances than a single-agent baseline. Experiments with advanced MLLM agents show that open-world exploration remains challenging, as strong models can handle many single-hop tasks but degrade sharply when hidden prerequisites must be coordinated over longer trajectories. Further analysis finds that task difficulty tracks agent completion, and larger models or thinking modes do not consistently translate into better performance. Code and dataset are available at https://github.com/Jometeorie/MineExplorer.", 'score': 6, 'issue_id': 2360, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'b8e032746a6b17a8', 'authors': ['Tianjie Ju', 'Yueqing Sun', 'Zheng Wu', 'Wei Zhang', 'Yaqi Huo', 'Xi Su', 'Qi Gu', 'Xunliang Cai', 'Gongshen Liu', 'Zhuosheng Zhang'], 'affiliations': ['Meituan', 'School of Computer Science, Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30931.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#dataset'], 'emoji': '⛏️', 'ru': {'title': 'Открытый мир требует глубокого планирования: когда размер модели не гарантирует успех', 'desc': 'В статье представлен бенчмарк MineExplorer для оценки способностей многомодальных больших языковых моделей к исследованию открытых миров на примере игры Minecraft. Исследователи разработали набор атомарных задач и многошаговых заданий, отфильтровав те, которые требуют глубокого знания специфики игры, чтобы лучше оценить общие способности рассуждения. Для создания надежных тестовых примеров использован рабочий процесс синтеза с несколькими агентами, который совместно проектирует графы задач, сцены и правила оценки. Эксперименты показали, что сильные модели хорошо справляются с простыми одношаговыми задачами, но резко теряют производительность при необходимости координировать скрытые зависимости над длинными траекториями действий.'}, 'en': {'title': 'Evaluating Open-World Exploration in Minecraft with MineExplorer', 'desc': 'The paper introduces the MineExplorer benchmark, which assesses the exploration abilities of multimodal large language models (MLLMs) in the dynamic environment of Minecraft. It focuses on both atomic and multi-hop tasks, designed to evaluate general open-world reasoning rather than relying on specific game knowledge. The benchmark employs a multi-agent synthesis approach to create more reliable task instances, improving upon traditional single-agent methods. Results indicate that while MLLMs excel at simple tasks, they struggle with complex, longer-term exploration challenges, highlighting the need for further advancements in their capabilities.'}, 'zh': {'title': '评估多模态模型在Minecraft中的开放世界探索能力', 'desc': '本文介绍了MineExplorer基准，用于评估多模态大型语言模型（MLLM）在Minecraft中的开放世界探索能力。我们通过多代理合成设计原子任务和多跳任务，以更好地反映一般开放世界推理。研究表明，现有的基准往往将交互压缩为短期任务，导致模型在动态环境中的探索能力不明确。实验结果显示，尽管强大的模型能够处理许多单跳任务，但在需要协调隐藏前提的长轨迹任务时，性能显著下降。'}}}, {'id': 'https://huggingface.co/papers/2606.01533', 'title': 'Multi-Agent Computer Use', 'url': 'https://huggingface.co/papers/2606.01533', 'abstract': 'Abstract Multi-agent computer use systems outperform single-agent approaches on complex tasks by enabling parallel execution and dynamic task decomposition through directed acyclic graphs.  AI-generated summary Computer use agents (CUAs) today are primarily deployed as single serial agents. This setup is suboptimal for complex long-horizon tasks that benefit from task decomposition, parallel execution, and consistent re-planning based on new information. In this paper, we argue that we should instead move towards evaluating and building multi-agent computer use (MACU) systems. These systems, which emphasize planning and parallel execution, alleviate many of the shortcomings of single-agent CUAs. We propose a general multi-agent setup in which a manager model decomposes computer use tasks as a directed acyclic graph (DAG), encoding relevant dependencies and goals for subagents. At each iteration, the manager dispatches parallel CUA subagents to carry out nodes on the ready frontier of the DAG, and continuously revises the DAG (adding, canceling, or rewriting nodes) as new findings arrive from subagents. This design treats the partially observable environment of computer use as a first class challenge: information that downstream agents may not be able to re-observe are retained and passed forward through the manager and DAG structure. We demonstrate that MACU consistently improves over strong single-agent baselines by 3.4-25.5% on desktop (OSWorld) and web navigation (Online-Mind2Web, WebTailBench, Odysseys) benchmarks, exhibits more favorable test-time scaling, and solves complex long-horizon tasks where single-agent CUAs get stuck. On Odysseys, a long-horizon web navigation benchmark, MACU improves average task completion wall-clock time by {sim} 1.5 times, demonstrating its efficacy in speeding up traditionally slow CUA pipelines. Our findings highlight that multi-agent coordination is a promising axis for scaling computer use agents to work productively for longer and more effectively. We release all code and interactive visualizations at https://jykoh.com/multi-agent-computer-use.', 'score': 5, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '06872cfa27997f25', 'authors': ['Jing Yu Koh', 'Ruslan Salakhutdinov', 'Daniel Fried'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01533.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#agents', '#reasoning'], 'emoji': '🕸️', 'ru': {'title': 'Координация многих агентов для масштабирования компьютерного взаимодействия', 'desc': 'В статье предлагается система многоагентного компьютерного использования (MACU), в которой управляющая модель разбивает сложные задачи на направленный ациклический граф (DAG) с учётом зависимостей между подзадачами. Параллельные агенты выполняют готовые узлы графа одновременно, а менеджер динамически пересматривает структуру задач на основе новой информации от подагентов. Система решает проблему частичной наблюдаемости окружения, сохраняя важную информацию и передавая её через структуру графа. На различных бенчмарках (OSWorld, Online-Mind2Web, WebTailBench, Odysseys) многоагентный подход превосходит одноагентные системы на 3.4-25.5% и ускоряет выполнение длительных задач примерно в 1.5 раза.'}, 'en': {'title': 'Unlocking Efficiency with Multi-Agent Coordination', 'desc': 'This paper introduces multi-agent computer use (MACU) systems as a solution to the limitations of single-agent computer use agents (CUAs) in handling complex tasks. By utilizing directed acyclic graphs (DAGs) for task decomposition and parallel execution, MACU systems can dynamically adapt to new information and improve planning efficiency. The manager model in MACU coordinates multiple subagents, allowing them to work simultaneously on different parts of a task, which leads to significant performance improvements. The results show that MACU outperforms traditional single-agent approaches by enhancing task completion speed and effectiveness in long-horizon scenarios.'}, 'zh': {'title': '多智能体系统：提升计算机使用效率的关键', 'desc': '本文提出了多智能体计算机使用系统（MACU），通过并行执行和动态任务分解来解决复杂任务。与单一智能体相比，MACU能够更有效地处理长时间跨度的任务，减少了单一智能体的局限性。我们设计了一种管理模型，通过有向无环图（DAG）来分解任务，并在每次迭代中调度并行的子智能体执行任务。实验结果表明，MACU在多个基准测试中表现优于传统的单智能体方法，显著提高了任务完成效率。'}}}, {'id': 'https://huggingface.co/papers/2606.02277', 'title': 'RoboSemanticBench: Diagnosing Semantic Grounding in Action Prediction for VLA Models', 'url': 'https://huggingface.co/papers/2606.02277', 'abstract': 'Abstract RoboSemanticBench identifies a disconnect between semantic understanding and action prediction in vision-language-action models, where robots can grasp objects but fail to select semantically correct targets.  AI-generated summary Vision-language-action (VLA) models are built on the premise that semantic understanding from pretrained language or vision-language backbones should guide robot action prediction. Yet robot fine-tuning is optimized as imitation over task-specific action distributions, and many evaluations can be solved through visual or instruction-action shortcuts. We introduce RoboSemanticBench (RSB), an embodied benchmark for diagnosing semantic grounding in action prediction: whether post-trained VLA models can use complex instruction semantics to select and manipulate the correct physical target. In each episode, a robot receives a multiple-choice math or general-knowledge question, observes candidate answer blocks, and must grasp the block corresponding to the correct answer. RSB covers controlled arithmetic, grade-school mathematical understanding, and commonsense or factual understanding under four-choice and ten-choice suites. Across representative VLA models, we find that many policies learn to grasp candidate blocks but select the semantically correct block at near-random or below-random rates after controlling for grasp success, revealing a persistent gap between backbone-level semantic competence and action prediction.', 'score': 5, 'issue_id': 2358, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd4622771224a74e7', 'authors': ['Bin Yu', 'Yao Zhang', 'Haishan Liu', 'Shijie Lian', 'Yuliang Wei', 'Xiaopeng Lin', 'Zhaolong Shen', 'Changti Wu', 'Ruina Hu', 'Bailing Wang', 'Cong Huang', 'Kai Chen'], 'affiliations': ['BUAA', 'DeepCybo', 'ECNU', 'HIT', 'HKUST(GZ)', 'HUST', 'WHU', 'ZGCA', 'ZGCI'], 'pdf_title_img': 'assets/pdf/title_img/2606.02277.jpg', 'data': {'categories': ['#robotics', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Семантическое понимание против практического действия в роботике', 'desc': 'Статья представляет RoboSemanticBench — бенчмарк для оценки семантического понимания в моделях vision-language-action, которые обучают роботов выполнять действия на основе визуальных и текстовых инструкций. Авторы выявили проблему: несмотря на то, что такие модели хорошо захватывают объекты, они часто не могут выбрать семантически правильную цель из нескольких вариантов. Бенчмарк требует от робота отвечать на вопросы (математические и общие знания), наблюдая кандидаты-блоки и хватая блок с правильным ответом. Исследование показало, что современные VLA модели часто решают задачу случайно, указывая на разрыв между семантическими способностями предварительно обученных моделей и качеством предсказания действий.'}, 'en': {'title': 'Bridging the Gap: Semantic Understanding vs. Action Prediction in Robots', 'desc': 'The paper introduces RoboSemanticBench (RSB), a benchmark designed to evaluate how well vision-language-action (VLA) models can understand semantics when predicting actions. It highlights a significant issue where robots can physically grasp objects but often fail to choose the semantically correct ones based on complex instructions. The study shows that many VLA models, despite being trained on language and vision data, struggle with semantic grounding in action prediction, often selecting answers at random. RSB tests robots on tasks involving math and general knowledge, revealing a gap between their semantic understanding and their ability to act correctly based on that understanding.'}, 'zh': {'title': '语义理解与行动预测的差距', 'desc': 'RoboSemanticBench（RSB）是一个用于诊断视觉-语言-行动（VLA）模型在行动预测中语义理解的基准。研究发现，尽管机器人能够抓取物体，但在选择语义上正确的目标时却存在困难。RSB通过让机器人回答多项选择题来评估其是否能够利用复杂的指令语义来选择和操作正确的物理目标。结果显示，许多模型在抓取候选块时表现良好，但在选择语义正确的块时的成功率接近随机，表明语义能力与行动预测之间存在明显差距。'}}}, {'id': 'https://huggingface.co/papers/2606.01414', 'title': 'Agent Skills Should Go Beyond Text: The Case for Visual Skills', 'url': 'https://huggingface.co/papers/2606.01414', 'abstract': 'Abstract Multimodal skills that combine textual logic with visual support outperform text-only approaches in visual-centric tasks by incorporating spatial layout, visual grounding, and state-aware interactions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reusable skills are a key mechanism for extending agent capabilities, allowing agents to accumulate experience and solve increasingly complex tasks. Yet most existing skill-learning methods store reusable experience as text-only assets, such as instructions, reasoning traces, or summarized trajectories. We argue that this text-only paradigm creates a fundamental bottleneck for visual-centric tasks, where reusable knowledge often depends on spatial layout, visual grounding, fine-grained appearance, and localized state changes. To address this limitation, we propose \\NAME, a multimodal skill paradigm that combines declarative textual logic with explicit visual support. We distinguish three reusable forms: static priors for stable spatial conventions, dynamic priors for in-situ visual working memory, and interleaved visual skills that bind ordered text steps to the source frames, screenshots, or page regions that justify them. Rather than only describing what to do, visual skills also encode where to look, how to inspect, and how to verify visual outcomes. To scale visual-skill construction, we introduce \\SYSTEM, an automatic system that converts agent experience into reusable multimodal skills by preserving textual reasoning, spatial references, visual boundaries, and interaction patterns from task trajectories. Experiments on GUI and other visual-centric tasks show that visual skills consistently outperform text-only skills, particularly when success requires spatial correspondence, visual evidence, and state-aware interaction. These results support our central position: reusable agent skills should go beyond text and become multimodal assets for future multimodal agents.', 'score': 5, 'issue_id': 2360, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '570bf3aedcc3e8e6', 'authors': ['Binxiao Xu', 'Ruichuan An', 'Bocheng Zou', 'Hang Hua'], 'affiliations': ['MIT-IBM Watson AI Lab', 'Peking University', 'University of Wisconsin'], 'pdf_title_img': 'assets/pdf/title_img/2606.01414.jpg', 'data': {'categories': ['#training', '#agents', '#multimodal'], 'emoji': '👁️', 'ru': {'title': 'Многомодальные навыки агентов: от текста к визуальному мышлению', 'desc': 'Статья предлагает новую парадигму многомодальных навыков для агентов, которые объединяют текстовую логику с визуальной поддержкой, преодолевая ограничения текстовых подходов. Авторы вводят три типа переиспользуемых знаний: статические приоры для пространственных соглашений, динамические приоры для визуальной рабочей памяти и чередующиеся визуальные навыки, связывающие текстовые шаги с соответствующими снимками экрана и регионами. Система автоматически преобразует опыт агента в многомодальные навыки, сохраняя текстовое рассуждение, пространственные ссылки и паттерны взаимодействия из траекторий задач. Экспериментальные результаты на графических интерфейсах и других визуально-ориентированных задачах демонстрируют превосходство визуальных навыков над текстовыми, особенно когда успех требует пространственного соответствия и визуального подтверждения.'}, 'en': {'title': 'Empowering Agents with Multimodal Skills for Visual Tasks', 'desc': 'This paper introduces a new approach to enhance agent capabilities in visual-centric tasks by combining text and visual information. The authors argue that traditional text-only methods limit performance because they do not account for important visual elements like spatial layout and visual grounding. They propose a multimodal skill paradigm that integrates textual logic with visual support, allowing agents to learn from both text and images. Their experiments demonstrate that this approach significantly improves task performance, especially in scenarios requiring visual evidence and spatial awareness.'}, 'zh': {'title': '多模态技能：超越文本的视觉智能', 'desc': '这篇论文探讨了多模态技能在视觉中心任务中的重要性，强调了将文本逻辑与视觉支持结合的优势。现有的技能学习方法主要依赖文本资产，导致在处理视觉任务时存在瓶颈。为了解决这个问题，作者提出了一种新的多模态技能范式，能够结合文本和视觉信息。实验结果表明，这种方法在需要空间对应、视觉证据和状态感知交互的任务中表现优于仅依赖文本的技能。'}}}, {'id': 'https://huggingface.co/papers/2605.31597', 'title': 'SOCO: Benchmarking Semantic Object Correspondence in Vision Foundation Models', 'url': 'https://huggingface.co/papers/2605.31597', 'abstract': 'Abstract Semantic Object Correspondence (SOCO) benchmark evaluates structured object understanding in vision models through consistent part-level annotations and keypoint descriptions, revealing gaps between language-grounded localization and visual correspondence while demonstrating strong prediction of downstream task performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Measuring structured object understanding in vision foundation models remains challenging due to inconsistent evaluation protocols and limited part-level supervision. Semantic correspondence (SC) evaluates this capability by testing whether object parts can be matched across instances and categories under large variations in appearance, viewpoint, and geometry. To enable a systematic SC evaluation, we introduce SOCO, a new benchmark for Semantic Object Correspondence that introduces a taxonomy of correspondence types and provides consistent, functionally meaningful keypoint annotations across 100 categories and over 1M correspondence pairs. In addition, SOCO includes keypoint language descriptions, enabling the evaluation of large vision-language models (LVLMs) and their fine-grained part-level understanding. Comprehensive experiments reveal that (i) vision foundation backbones encode strong semantic structure but transfer correspondences poorly across related categories and only partially capture object-part position, (ii) LVLMs are stronger at text-prompted part localization than at visual-reference cross-image matching, exposing a gap between language-grounded localization and fine-grained visual correspondence, and (iii) correspondence performance predicts performance on dense downstream tasks, including segmentation, tracking, 3D pose estimation, and 3D detection, more strongly than ImageNet classification. Together, these findings position SOCO as a benchmark for structured, part-level representation quality in vision and multimodal foundation models.', 'score': 5, 'issue_id': 2360, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '9a6c7b37e80d4899', 'authors': ['Olaf Dünkel', 'Basavaraj Sunagad', 'Haoran Wang', 'David T. Hoffmann', 'Christian Theobalt', 'Adam Kortylewski'], 'affiliations': ['CISPA Helmholtz Center for Information Security', 'Max Planck Institute for Informatics, Saarland Informatics Campus', 'University of Freiburg'], 'pdf_title_img': 'assets/pdf/title_img/2605.31597.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Оценка структурного понимания объектов через семантическое соответствие частей', 'desc': 'В работе представлен новый бенчмарк SOCO для оценки семантического соответствия объектов в компьютерном зрении, который содержит согласованные аннотации на уровне частей объектов и описания ключевых точек для 100 категорий и более 1 млн пар соответствий. Исследование показывает, что модели зрения хорошо кодируют семантическую структуру, но плохо переносят соответствия между похожими категориями, а большие мультимодальные модели зрения и языка лучше справляются с локализацией по текстовым подсказкам, чем с визуальным сопоставлением. Обнаружен значительный разрыв между языково-ориентированной локализацией и точным визуальным соответствием на уровне деталей объектов. Производительность на задаче семантического соответствия лучше предсказывает результаты на плотных задачах (сегментация, отслеживание, оценка позы) чем классическая классификация ImageNet.'}, 'en': {'title': 'SOCO: Bridging the Gap in Object Understanding for Vision Models', 'desc': 'The paper introduces the Semantic Object Correspondence (SOCO) benchmark, which assesses how well vision models understand structured objects through detailed part-level annotations and keypoint descriptions. It highlights the challenges in evaluating object understanding due to inconsistent protocols and limited supervision. The SOCO benchmark provides a systematic way to evaluate semantic correspondence by matching object parts across various instances and categories, with over 1 million correspondence pairs. Findings indicate that while vision models have strong semantic structures, they struggle with transferring correspondences and that performance on correspondence tasks is a better predictor of success in downstream applications than traditional classification tasks.'}, 'zh': {'title': '语义对象对应：提升视觉模型的结构化理解能力', 'desc': '本文介绍了一个新的基准测试，称为语义对象对应（SOCO），用于评估视觉模型的结构化对象理解能力。SOCO通过一致的部件级注释和关键点描述，测试对象部件在不同实例和类别之间的匹配能力。研究发现，视觉基础模型在语义结构编码上表现良好，但在相关类别之间的对应转移能力较差。SOCO的结果表明，语义对应性能与下游任务的表现密切相关，尤其是在分割、跟踪和3D检测等任务中。'}}}, {'id': 'https://huggingface.co/papers/2605.30126', 'title': 'PARCEL: Pool-Anchored Resampling with Conditioned Elastic Queries for Efficient Vision-Language Understanding', 'url': 'https://huggingface.co/papers/2605.30126', 'abstract': 'Abstract PARCEL is a vision-language model architecture that dynamically partitions feature extraction tasks to improve efficiency and performance across different visual-token budgets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Vision-Language Models (LVLMs) map visual inputs into dense token sequences, imposing a quadratic computational bottleneck for inference. Elastic visual-token compression addresses this by training a single model that can run at multiple visual-token budgets. However, existing approaches struggle under aggressive compression. Spatial-only compression, as in nested pooling, behaves as an imperfect low-pass filter and induces spectral aliasing that obscures fine-grained detail. Query-only compression, as in nested query resampling, replaces explicit grid-aligned tokens with non-local summaries and substantially degrades spatial grounding. To resolve this representational conflict, we introduce PARCEL (Pool-Anchored Resampling with Conditioned Elastic Queries for Efficient Vision-Language Understanding), a visual tokenization architecture that dynamically partitions the labor of feature extraction. PARCEL establishes spatial pool tokens as low-frequency layout anchors and conditions elastic query tokens on these anchors through Pool-Conditioned Query Resampling. This encourages query tokens to focus on complementary visual features rather than redundant spatial mapping. Extensive evaluations across 27 benchmarks show that PARCEL improves the performance-efficiency Pareto frontier, consistently outperforming existing matryoshka baselines across visual-token budgets while preserving the "train once, deploy anywhere" paradigm.', 'score': 5, 'issue_id': 2360, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'c705149a32d5c6d8', 'authors': ['Selim Kuzucu', 'Alessio Tonioni', 'Vasile Lup', 'Bernt Schiele', 'Federico Tombari', 'Muhammad Ferjad Naeem'], 'affiliations': ['Google', 'Max Planck Institute for Informatics', 'Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2605.30126.jpg', 'data': {'categories': ['#cv', '#architecture', '#inference', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Эффективное сжатие визуальных токенов через динамическое разделение функций в моделях видение-язык', 'desc': "PARCEL — это архитектура модели видение-язык, которая решает проблему квадратичной вычислительной сложности при обработке плотных последовательностей визуальных токенов. Авторы предлагают динамически разделять задачи извлечения признаков между пулинг-токенами низких частот и условными query-токенами высоких частот, избегая артефактов спектрального сглаживания и деградации пространственной привязки. Метод Pool-Conditioned Query Resampling позволяет query-токенам сосредоточиться на дополнительных визуальных признаках вместо избыточного пространственного отображения. Модель достигает улучшенного Парето-фронтира производительность-эффективность и сохраняет парадигму 'обучи один раз, развертывай везде' при различных бюджетах визуальных токенов."}, 'en': {'title': 'Dynamic Efficiency in Vision-Language Models with PARCEL', 'desc': 'PARCEL is a new architecture for vision-language models that enhances efficiency by dynamically managing how visual features are extracted. It addresses the computational challenges of processing visual inputs by allowing a single model to operate effectively at various visual-token budgets. The model uses a method called Pool-Conditioned Query Resampling, which helps to focus on important visual details while reducing redundancy. Extensive testing shows that PARCEL outperforms existing models, making it a versatile solution for different applications in vision-language understanding.'}, 'zh': {'title': 'PARCEL：高效的视觉-语言理解架构', 'desc': 'PARCEL是一种视觉-语言模型架构，通过动态划分特征提取任务来提高不同视觉标记预算下的效率和性能。它解决了在推理过程中由于生成密集标记序列而导致的计算瓶颈问题。PARCEL通过建立空间池标记作为低频布局锚点，并通过条件弹性查询重采样来优化查询标记，从而鼓励查询标记关注互补的视觉特征。经过27个基准测试的广泛评估，PARCEL在性能和效率上均优于现有的基线模型。'}}}, {'id': 'https://huggingface.co/papers/2606.01132', 'title': 'HakushoBench: A Japanese Chart and Table VQA Benchmark from Governmental White Papers', 'url': 'https://huggingface.co/papers/2606.01132', 'abstract': "Abstract Researchers created HakushoBench, a Japanese chart and table visual question answering benchmark derived from governmental documents, to evaluate vision-language models' ability to understand complex visual data beyond English-language datasets.  AI-generated summary Understanding chart and table images is essential for applying vision-language models (VLMs) to real-world document understanding. While English benchmarks have advanced rapidly, non-English counterparts remain scarce, leaving it unclear whether this progress generalizes across languages. A key obstacle is the difficulty of collecting realistic and diverse non-English chart and table images at scale. To address this, we leverage governmental white papers as a scalable source for benchmark construction beyond English, as they contain naturally occurring charts and tables across diverse formats and domains and are freely accessible in many countries. As a first instantiation, we introduce HakushoBench, a challenging Japanese chart and table VQA benchmark built from 33 governmental white papers. HakushoBench contains 2,053 images spanning over 10 image types, with manually annotated QA pairs, designed to assess deep and holistic understanding of charts and tables, rather than local visual cues alone. Experiments across a broad range of VLMs demonstrate that HakushoBench remains challenging for open-weight models: the best open-weight model achieves only 58.6% accuracy, and a 34.9-point gap between open-weight and proprietary models highlights substantial room for improvement in complex chart and table understanding. We release our dataset and code.", 'score': 4, 'issue_id': 2358, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '4da8aa874f1b7ba0', 'authors': ['Issa Sugiura', 'Shuhei Kurita', 'Yusuke Oda', 'Naoaki Okazaki'], 'affiliations': ['Institute of Science Tokyo', 'LLMC', 'NII'], 'pdf_title_img': 'assets/pdf/title_img/2606.01132.jpg', 'data': {'categories': ['#dataset', '#low_resource', '#multilingual', '#benchmark', '#cv', '#open_source', '#multimodal'], 'emoji': '📊', 'ru': {'title': 'Японский эталон для оценки понимания диаграмм в визуально-языковых моделях', 'desc': 'Исследователи создали HakushoBench — набор данных для оценки способности визуально-языковых моделей понимать диаграммы и таблицы на японском языке. В отличие от существующих английскоязычных эталонов, этот датасет построен на основе правительственных документов, содержащих естественно возникающие визуализации различных форматов и доменов. Набор включает более 2000 изображений с десятью типами графиков и таблиц с аннотированными вопросно-ответными парами для глубокого понимания визуального контента. Экспериментальная оценка показала, что даже лучшие открытые модели достигают только 58,6% точности, при этом разрыв с закрытыми моделями составляет 34,9 процентных пункта, указывая на необходимость дальнейшего развития в области понимания сложных визуальных документов.'}, 'en': {'title': 'Bridging Language Gaps in Visual Question Answering', 'desc': 'HakushoBench is a new benchmark designed to test vision-language models (VLMs) on their ability to understand charts and tables in Japanese governmental documents. This benchmark addresses the lack of non-English datasets in the field, which has hindered the evaluation of VLMs across different languages. By utilizing governmental white papers, the researchers created a diverse set of 2,053 images with annotated question-answer pairs to challenge models on their comprehension of visual data. The results show that even the best open-weight models struggle with this task, indicating a significant need for further advancements in understanding complex visual information.'}, 'zh': {'title': 'HakurshoBench：推动非英语视觉问答的进步', 'desc': '研究人员创建了HakurshoBench，这是一个基于日本政府文件的图表和表格视觉问答基准，旨在评估视觉语言模型（VLM）理解复杂视觉数据的能力。尽管英语基准发展迅速，但非英语基准仍然稀缺，这使得我们无法确定这些进展是否适用于其他语言。为了解决这一问题，我们利用政府白皮书作为可扩展的基准构建来源，因为它们包含多种格式和领域的自然图表和表格，并且在许多国家是免费获取的。HakurshoBench包含2053张图像，涵盖10种图像类型，手动注释的问答对旨在评估对图表和表格的深度理解，而不仅仅是局部视觉线索。'}}}, {'id': 'https://huggingface.co/papers/2606.00660', 'title': 'FineVerify: Scaling Test-Time Compute with Fine-Grained Self-Verification for Agentic Search', 'url': 'https://huggingface.co/papers/2606.00660', 'abstract': 'Abstract FineVerify is a self-verification framework for agentic search that improves accuracy through decomposed sub-question checking and trajectory selection.  AI-generated summary Agentic search requires language model agents to explore many sources and answer complex information-seeking questions. Scaling test-time compute is a promising way to improve these agents, but current approaches can fail, because correct answers are often sparse and score-based selection depends on model calibration. We propose FineVerify, a fine-grained self-verification framework that decomposes each question into checkable sub-questions, verifies sampled candidates against each sub-question, and selects the candidate with the highest aggregated score. This per-check structure turns selection into simpler local judgments and produces scores under the same explicit criteria. Across four agentic search benchmarks and two models, FineVerify consistently outperforms standard scaling baselines. With only four sampled trajectories, it improves GPT-5-mini by 8.2 accuracy points and Gemini-3-flash by 5.6% on average. With 12 samples, FineVerify enables GPT-5-mini to surpass frontier GPT-5 on BrowseComp-Plus. Beyond accuracy, FineVerify produces interpretable verification traces that help audit benchmark errors, suggesting broader applications for inspecting agentic search systems. Code and data are available at https://github.com/XuZhao0/fineverify', 'score': 4, 'issue_id': 2359, 'pub_date': '2026-05-30', 'pub_date_card': {'ru': '30 мая', 'en': 'May 30', 'zh': '5月30日'}, 'hash': 'ad7eea28f96bb857', 'authors': ['James Xu Zhao', 'Hui Chen', 'Bryan Hooi', 'See-Kiong Ng'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2606.00660.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#benchmark', '#interpretability', '#dataset', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Разложение вопроса на проверяемые части — ключ к точному поиску агентов', 'desc': 'FineVerify — это фреймворк самопроверки для агентного поиска, который улучшает точность больших языковых моделей путём разложения сложных вопросов на проверяемые подвопросы. Система генерирует несколько кандидатов-траекторий и верифицирует каждый из них против набора подвопросов, получая оценки по явным критериям. Такой подход преобразует задачу выбора лучшего ответа в серию более простых локальных суждений и уменьшает зависимость от калибровки модели. На четырёх бенчмарках FineVerify показывает стабильное улучшение: GPT-4 mini повышается на 8.2%, а Gemini-3-flash на 5.6% при использовании всего четырёх образцов.'}, 'en': {'title': 'Enhancing Agentic Search Accuracy with FineVerify', 'desc': 'FineVerify is a framework designed to enhance the accuracy of agentic search by breaking down complex questions into smaller, verifiable sub-questions. It verifies potential answers against these sub-questions and selects the best candidate based on aggregated scores. This method simplifies the decision-making process by allowing local judgments rather than relying solely on overall scores. FineVerify has shown significant improvements in accuracy across various benchmarks, demonstrating its effectiveness in refining AI-generated responses.'}, 'zh': {'title': 'FineVerify：提升智能搜索准确性的自我验证框架', 'desc': 'FineVerify 是一个自我验证框架，旨在通过分解子问题检查和轨迹选择来提高智能搜索的准确性。该框架将每个问题分解为可检查的子问题，并对候选答案进行验证，最终选择得分最高的候选答案。通过这种方法，FineVerify 将选择过程简化为局部判断，并在相同的标准下生成得分。实验结果表明，FineVerify 在多个智能搜索基准测试中表现优于传统的扩展基线，显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.24614', 'title': 'Measuring the Depth of LLM Unlearning via Activation Patching', 'url': 'https://huggingface.co/papers/2605.24614', 'abstract': 'Abstract A new metric called Unlearning Depth Score (UDS) is introduced to evaluate how thoroughly knowledge has been removed from large language models, addressing limitations of previous methods that could not detect hidden knowledge in internal representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language model (LLM) unlearning has emerged as a crucial post-hoc mechanism for privacy protection and AI safety, yet auditing whether target knowledge is truly erased remains challenging. Existing output-level metrics fail to detect when this knowledge remains recoverable from internal representations. Recent white-box studies reveal such residual knowledge but often rely on auxiliary training or dataset-specific adaptations, leaving no generalizable metric. To address these limitations, we propose the Unlearning Depth Score (UDS), a metric that quantifies the mechanistic depth of unlearning via activation patching. UDS first identifies layers that encode the target knowledge using a retain model baseline, then measures how much of it is erased in the unlearned model on a 0-1 scale. In a meta-evaluation across 20 metrics on 150 unlearned models spanning 8 methods, UDS achieves the highest faithfulness and robustness, confirming our causal approach as the most reliable for unlearning evaluation. Case studies further reveal that white-box metrics can disagree at the layer level and that erasure depth varies across examples. We provide guidelines for integrating UDS into existing benchmarking frameworks and streamlining the evaluation pipeline. Code and data are available at https://github.com/gnueaj/unlearning-depth-score', 'score': 4, 'issue_id': 2360, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': '24665d1ed5cc10f6', 'authors': ['Jaeung Lee', 'Dohyun Kim', 'Jaemin Jo'], 'affiliations': ['Sungkyunkwan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.24614.jpg', 'data': {'categories': ['#training', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Измерение глубины забывания в языковых моделях', 'desc': 'В работе представлена новая метрика Unlearning Depth Score (UDS) для оценки глубины удаления знаний из больших языковых моделей через анализ внутренних представлений. Предложенный подход использует activation patching для определения слоёв, содержащих целевое знание, и количественно оценивает степень его стирания в переобученной модели. В масштабном сравнении на 150 моделях и 8 различных методах анлёнинга UDS показал наивысшую надежность и устойчивость среди 20 рассмотренных метрик. Исследование выявило, что глубина стирания знания варьируется по слоям и примерам, предоставляя практические рекомендации для интеграции метрики в существующие бенчмарки.'}, 'en': {'title': 'Unlearning Depth Score: A New Standard for Knowledge Erasure in AI', 'desc': "The paper introduces a new metric called Unlearning Depth Score (UDS) to assess how effectively knowledge is removed from
