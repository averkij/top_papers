    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                flag.addEventListener('click', () => {

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {
                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.07708', 'title': 'Accurate, Interdisciplinary and Transparent Structure-property Understanding with Deep Native Structural Reasoning', 'url': 'https://huggingface.co/papers/2607.07708', 'abstract': 'Abstract SciReasoner is a multimodal scientific foundation model that enables interpretable structural reasoning across proteins, molecules, and crystals by discretizing structural elements into a unified vocabulary for enhanced prediction and scientific inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Structure-property relationships are foundational to biology, chemistry and materials science, where function, reactivity and physical response emerge from spatial, chemical and periodic organization. Mechanistically explaining these relationships requires interpreting structural evidence through scientific principles and physical constraints, from stereochemistry and bonding to symmetry, energetics and periodic order. However, applying artificial intelligence to this process presents a joint challenge of representation and reasoning: models must preserve domain-native structural information while showing how specific evidence supports predictions under these constraints. Here we introduce SciReasoner, a multimodal scientific foundation model for native structural reasoning across proteins, small molecules and inorganic crystals. SciReasoner discretizes coordinates, topologies and periodic connectivities into a unified structure-aware vocabulary, treating structural tokens as addressable evidence units during reasoning. In homology-controlled Gene Ontology prediction, SciReasoner improves Cellular Component annotation for low-homology and orphan-like proteins, increasing F_{max} from 0.42 to 0.55. In chemistry, it raises single-step retrosynthesis accuracy from 0.63 to 0.72 while generating fragment-level disconnection and precursor-verification traces. In materials science, its representations separate elemental and compound phases and resolve high- and low-band-gap regimes. Across 86 benchmarks, SciReasoner achieves state-of-the-art performance on 67 tasks. Double-blind expert evaluation rates its reasoning traces as preferred or at least comparable to those of a frontier large language model in 98% of cases. By making structure an inspectable substrate for reasoning under scientific constraints, SciReasoner connects accurate prediction with interpretable scientific inference.', 'score': 50, 'issue_id': 2604, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '8363cd358aac1a83', 'authors': ['Chen Tang', 'Yizhou Wang', 'Jianyu Wu', 'Lintao Wang', 'Shixiang Tang', 'Pengze Li', 'Encheng Su', 'Jun Yao', 'Jiabei Xiao', 'Yuqi Shi', 'Jielan Li', 'Hongxia Hao', 'Zhangyang Gao', 'Fang Wu', 'Ben Fei', 'Xiangyu Yue', 'Pan Tan', 'Bozitao Zhong', 'Jinouwen Zhang', 'Aoran Wang', 'Yan Lu', 'Jiaheng Liu', 'Xinzhu Ma', 'Liang Hong', 'Mingyue Zheng', 'Phil Torr', 'Bowen Zhou', 'Wanli Ouyang', 'Lei Bai'], 'affiliations': ['Fudan University', 'Nanjing University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Institute of Materia Medica, Chinese Academy of Sciences', 'Shanghai Jiao Tong University', 'Stanford University', 'The Chinese University of Hong Kong', 'The University of Science and Technology of China', 'University of Chinese Academy of Sciences', 'University of Oxford', 'University of Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2607.07708.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#architecture', '#benchmark', '#open_source', '#reasoning', '#science'], 'emoji': '🧬', 'ru': {'title': 'Структура как основа для интерпретируемых научных рассуждений', 'desc': 'SciReasoner — это мультимодальная научная фундаментальная модель, которая дискретизирует структурные элементы белков, молекул и кристаллов в единый словарь для интерпретируемого структурного рассуждения. Модель сохраняет важную доменную информацию о структурах и демонстрирует, как конкретные признаки поддерживают предсказания, подчиняясь научным принципам и физическим ограничениям. SciReasoner достигает высокой производительности на 67 из 86 тестовых задач, включая предсказание аннотаций генов, ретросинтез молекул и классификацию материалов. Эксперты оценили результаты модели как предпочтительные или сопоставимые с frontier LLM в 98% случаев благодаря интерпретируемым трассам рассуждений.'}, 'en': {'title': 'Unlocking Scientific Insights through Structural Reasoning', 'desc': 'SciReasoner is a multimodal foundation model designed to enhance scientific reasoning by interpreting structural data from proteins, molecules, and crystals. It achieves this by converting structural elements into a unified vocabulary, allowing for better predictions and scientific insights. The model excels in various domains, improving annotation accuracy in biology and chemistry, and effectively distinguishing between different material phases in materials science. With state-of-the-art performance across numerous benchmarks, SciReasoner not only predicts outcomes but also provides interpretable reasoning that aligns with scientific principles.'}, 'zh': {'title': 'SciReasoner：连接科学推理与准确预测的模型', 'desc': 'SciReasoner 是一种多模态科学基础模型，能够在蛋白质、分子和晶体之间进行可解释的结构推理。它通过将结构元素离散化为统一的词汇，增强了预测和科学推理的能力。该模型在基因本体预测、化学反应和材料科学中表现出色，显著提高了准确性。SciReasoner 通过将结构视为可检视的推理基础，连接了准确预测与可解释的科学推理。'}}}, {'id': 'https://huggingface.co/papers/2607.07675', 'title': 'Scaling Mixture-of-Experts Video Pretraining for Embodied Intelligence', 'url': 'https://huggingface.co/papers/2607.07675', 'abstract': 'Abstract LingBot-Video presents a DiT-based video pretraining framework with Mixture-of-Experts architecture, specialized data augmentation, and multi-dimensional reward system for embodied intelligence applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite the recent promise in robot control, video generative models suffer from a domain mismatch due to their primary focus on content creation. For example, their design inherently prioritizes visual fidelity and creativity over computational efficiency and physical realism. In this work, we present LingBot-Video, a DiT-based video pretraining paradigm specifically tailored for embodied intelligence. From the architecture perspective, we adopt the Mixture-of-Experts (MoE), instead of dense, framework to achieve a better trade-off between modeling capacity and inference efficiency, and manage to scale it up from scratch. From the data perspective, we construct a data profiling engine that augments standard internet videos with extensive robot-oriented footage, encompassing manipulation, navigation, and egocentric perspectives, to equip the base model with an intrinsic understanding of actions and world dynamics. From the training perspective, we develop a multi-dimensional reward system to enforce the alignment regarding physical rationality and task completion, going beyond standard criteria such as aesthetics, prompt-following, and motion consistency. Comprehensive evaluations validate its performance and efficiency as a video foundation model. We contribute LingBot-Video as the inaugural large-scale, open-source MoE video foundation model to the community, in a pioneering effort to bridge digital creativity and physical actuation.', 'score': 30, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'd4086358994a5dbe', 'authors': ['Shuailei Ma', 'Jiaqi Liao', 'Xinyang Wang', 'Jingjing Wang', 'Chaoran Feng', 'Zijing Hu', 'Chong Bao', 'Zichen Xi', 'Yuqi Gan', 'Weisen Wang', 'Yanhong Zeng', 'Qin Zhao', 'Zifan Shi', 'Wei Wu', 'Hao Ouyang', 'Qiuyu Wang', 'Shangzhan Zhang', 'Jiahao Shao', 'Yipengjing Sun', 'Liangxiao Hu', 'Lunke Pan', 'Nan Xue', 'Kecheng Zheng', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Ka Leong Cheng'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07675.jpg', 'data': {'categories': ['#architecture', '#dataset', '#video', '#robotics', '#training'], 'emoji': '🤖', 'ru': {'title': 'Видеофундаментальная модель для воплощённого интеллекта роботов', 'desc': 'LingBot-Video — это предварительно обученная модель для генерации видео на основе архитектуры DiT с использованием смеси экспертов (Mixture-of-Experts), разработанная специально для задач воплощённого интеллекта и управления робототехникой. В отличие от стандартных видеомоделей, ориентированных на творческий контент, эта система оптимизирована на физическую реалистичность и вычислительную эффективность благодаря архитектуре MoE вместо плотных слоёв. Авторы создали специализированный движок для аугментации данных, дополняющий интернет-видео роботизированными кадрами с манипуляциями, навигацией и эгоцентрическими представлениями. Система обучается с использованием многомерной системы вознаграждений, которая обеспечивает физическую рациональность и выполнение задач, превосходя традиционные критерии эстетики и согласованности движений.'}, 'en': {'title': 'Bridging Digital Creativity with Physical Intelligence', 'desc': 'LingBot-Video introduces a novel video pretraining framework that utilizes a DiT architecture combined with a Mixture-of-Experts (MoE) design to enhance efficiency and modeling capacity for embodied intelligence tasks. This framework addresses the limitations of existing video generative models by focusing on physical realism and computational efficiency rather than just visual quality. It incorporates specialized data augmentation techniques that enrich standard videos with robot-centric content, allowing the model to better understand actions and environmental dynamics. Additionally, a multi-dimensional reward system is implemented to ensure that the model aligns with physical rationality and task completion, marking a significant advancement in the development of video foundation models for robotics.'}, 'zh': {'title': 'LingBot-Video：连接数字创意与物理执行的桥梁', 'desc': 'LingBot-Video 是一个基于 DiT 的视频预训练框架，采用混合专家架构，专注于增强体智能应用。该框架通过构建数据分析引擎，利用丰富的机器人相关视频来提升模型对动作和世界动态的理解。训练过程中，开发了多维奖励系统，以确保物理合理性和任务完成度的对齐。LingBot-Video 作为首个大规模开源的混合专家视频基础模型，为数字创意与物理执行之间架起了桥梁。'}}}, {'id': 'https://huggingface.co/papers/2607.07608', 'title': 'Dual Latent Memory in Vision-Language-Action Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2607.07608', 'abstract': 'Abstract LaMem-VLA introduces a latent-memory-native framework that integrates historical experience into vision-language-action reasoning through coordinated memory components operating in the same latent space.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mainstream Vision-Language-Action (VLA) models predict actions primarily from the current observation under a Markovian assumption, thus struggling with long-horizon, temporally dependent tasks. Existing memory-augmented VLAs either expand the observation window or retrieve history from the memory bank as auxiliary policy-side context. However, they leave memory outside the native latent embedding space of VLA reasoning, preventing historical experience from being fluidly interleaved with multimodal reasoning and action formation. To this end, we introduce LaMem-VLA, a latent-memory-native framework that reconstructs historical experience into latent memory tokens and directly interweaves them with VLA reasoning. At its core, LaMem-VLA introduces four coordinated components: (i) a curator that organizes historical experience into two complementary short-term and long-term memory vaults; (ii) a seeker that queries both vaults using the multimodal cognition to retrieve context-relevant evidence; (iii) a condenser that reconstructs the retrieved evidence into compact short-term and long-term latent memory tokens; and (iv) a weaver that injects these memory tokens with the current observation and instruction into one continuous embedding sequence. By representing, retrieving, and consuming historical experience entirely in the same continuous latent space, LaMem-VLA enables memory to directly participate in VLA reasoning and guide action generation under a bounded context. Extensive experiments on SimplerEnv and LIBERO demonstrate the superiority of our LaMem-VLA.', 'score': 21, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '4260145f557b0252', 'authors': ['Hongyu Qu', 'Jianzhe Gao', 'Xiaobin Hu', 'Shaohuan Yang', 'Xinlei Yu', 'Rui Yan', 'Wenguan Wang', 'Xiangbo Shu', 'Shuicheng Yan'], 'affiliations': ['Nanjing University of Science and Technology', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07608.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#long_context', '#reasoning', '#agents', '#robotics'], 'emoji': '🧠', 'ru': {'title': 'Память в сердце VLA: встраивание исторического опыта в латентное пространство рассуждений', 'desc': 'В статье представляется LaMem-VLA — фреймворк для моделей Vision-Language-Action (VLA), который интегрирует исторический опыт напрямую в скрытое пространство рассуждений. Основная проблема состоит в том, что стандартные VLA модели работают под марковским предположением и предсказывают действия только из текущего наблюдения, что затрудняет решение долгосрочных задач. Предложенная система содержит четыре взаимодействующих компонента: куратор для организации памяти, сиквер для поиска релевантной информации, кондензер для сжатия опыта в токены и вивер для их встраивания в единую последовательность. Эксперименты показывают, что прямое участие памяти в латентном пространстве VLA значительно улучшает качество предсказания действий на долгих горизонтах.'}, 'en': {'title': 'Integrating Memory for Enhanced Vision-Language-Action Reasoning', 'desc': "LaMem-VLA is a new framework that enhances vision-language-action (VLA) reasoning by integrating historical experiences directly into the reasoning process. It uses a coordinated memory system that operates within the same latent space, allowing for a seamless blend of past experiences with current observations. The framework includes components that organize, retrieve, and reconstruct memories, making them readily available for decision-making. This approach improves the model's ability to handle complex tasks that require understanding of both immediate and historical context."}, 'zh': {'title': '历史经验与推理的完美结合', 'desc': 'LaMem-VLA提出了一种潜在记忆原生框架，通过协调的记忆组件将历史经验融入视觉-语言-行动推理中。该框架解决了现有模型在处理长期依赖任务时的不足，能够在同一潜在空间中流畅地交织历史经验与多模态推理。LaMem-VLA的核心包括四个协调组件：策展人、探寻者、凝聚者和编织者，分别负责组织历史经验、检索相关证据、重构记忆和注入当前观察。通过在连续的潜在空间中表示和利用历史经验，LaMem-VLA使得记忆能够直接参与推理过程，指导行动生成。'}}}, {'id': 'https://huggingface.co/papers/2607.07534', 'title': 'Infinite Worlds with Versatile Interactions', 'url': 'https://huggingface.co/papers/2607.07534', 'abstract': 'Abstract An advanced world modeling system with extended interaction capabilities, real-time processing, diverse interactive elements, and multi-agent behavior control for collaborative virtual environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present LingBot-World 2.0 (also known as LingBot-World-Infinity), an advanced iteration of LingBot-World featuring four distinct upgrades. (1) Our model achieves an unbounded interaction horizon while maintaining consistent output quality, benefiting from a carefully crafted causal pretraining paradigm. (2) Through distilling a real-time variant from the base model, our system guarantees rapid response time, sufficient to drive 720p video streams at 60 fps. (3) Compared to the previous version, this update introduces highly diverse interactive elements, comprising a broader spectrum of actions (e.g., attacking, archery, spell-casting, and shooting) alongside a richer variety of text-driven events. (4) We pioneer the integration of an agentic harness within the domain of world modeling, wherein a pilot agent is tasked with planning and executing character behaviors, while a director agent is responsible for synthesizing novel environmental elements as the scene progresses. Additionally, to facilitate a shared experience, we develop an interface that permits multiple players to simultaneously immerse themselves in this vivid world simulator. We pair our primary 14B model with a lightweight 1.3B counterpart, which supports effortless deployment on a single GPU.', 'score': 16, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '9d84744c34237508', 'authors': ['Zelin Gao', 'Qiuyu Wang', 'Jiapeng Zhu', 'Jingye Chen', 'Zichen Liu', 'Qingyan Bai', 'Jiahao Wang', 'Yufeng Yuan', 'Hanlin Wang', 'Yichong Lu', 'Ka Leong Cheng', 'Haojie Zhang', 'Jian Gao', 'Tianrui Feng', 'Yuzheng Liu', 'Yao Yao', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Hao Ouyang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07534.jpg', 'data': {'categories': ['#small_models', '#multimodal', '#video', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Бесконечные миры в реальном времени: агентное моделирование с неограниченным взаимодействием', 'desc': 'В статье представлена LingBot-World 2.0 — продвинутая система моделирования виртуальных миров с четырьмя ключевыми улучшениями. Модель достигает неограниченного горизонта взаимодействия при сохранении качества благодаря специально разработанной причинно-следственной предварительной тренировке. Система обеспечивает обработку в реальном времени, генерируя видеопотоки 720p при 60 fps за счет дистилляции облегченного варианта. В архитектуре введена агентная система с пилот-агентом для планирования действий персонажей и режиссер-агентом для синтеза окружающей среды, поддерживающая мультиагентное сотрудничество в общей виртуальной среде.'}, 'en': {'title': 'Empowering Collaborative Virtual Worlds with LingBot-World 2.0', 'desc': 'The paper introduces LingBot-World 2.0, an enhanced world modeling system designed for collaborative virtual environments. It features an unbounded interaction horizon and maintains high output quality through a causal pretraining approach. The system supports real-time processing, allowing it to handle 720p video at 60 fps, and includes a variety of interactive elements for richer user experiences. Additionally, it employs a multi-agent architecture where one agent plans character behaviors and another creates dynamic environmental elements, enabling multiple users to engage simultaneously.'}, 'zh': {'title': '无限交互，生动虚拟世界的未来', 'desc': 'LingBot-World 2.0 是一个先进的世界建模系统，具有扩展的交互能力和实时处理功能。该系统通过精心设计的因果预训练范式，实现了无限的交互视野，并保持输出质量的一致性。与之前的版本相比，这个更新引入了多样化的交互元素，包括更广泛的动作和丰富的文本驱动事件。我们还开发了一个多玩家接口，使多个用户能够同时沉浸在这个生动的虚拟世界中。'}}}, {'id': 'https://huggingface.co/papers/2607.04434', 'title': 'RoboDojo: A Unified Sim-and-Real Benchmark for Comprehensive Evaluation of Generalist Robot Manipulation Policies', 'url': 'https://huggingface.co/papers/2607.04434', 'abstract': 'Abstract RoboDojo presents a unified sim-and-real benchmark for evaluating generalist robot manipulation policies across diverse tasks and evaluation dimensions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist robot manipulation policies have advanced rapidly, yet existing benchmarks remain limited in systematically evaluating their capabilities. Many rely on simple, short-horizon, or skill-narrow tasks with limited capability coverage, and are often conducted only in simulation or only in the real world. Simulation enables scalable feedback but misses physical deployment challenges, while real-world evaluation is costly, time-consuming, and difficult to reproduce. We introduce RoboDojo, a unified sim-and-real benchmark for comprehensive evaluation of generalist robot manipulation policies. RoboDojo includes 42 simulation tasks and 18 real-world tasks covering diverse and complementary manipulation capabilities. The simulation benchmark evaluates five dimensions: generalization, memory, precision, long-horizon execution, and open-vocabulary instruction following, while the real-world benchmark exposes policies to challenging physical-world deployment conditions. RoboDojo supports scalable evaluation through heterogeneous parallel simulation in Isaac Sim and provides RoboDojo-RealEval, a reproducible real-world evaluation system with remote cloud access, standardized hardware, scene reset, evaluation protocol, and deployment interface. Together with XPolicyLab, policies can be integrated once and evaluated across simulation and real-world settings with minimal adaptation. We integrate 30 policies into XPolicyLab and evaluate them on RoboDojo, establishing a public leaderboard and systematic analysis of current policy performance. The website is available at http://robodojo-benchmark.com/.', 'score': 4, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '30aeccef8021ca46', 'authors': ['Tianxing Chen', 'Yue Chen', 'Zixuan Li', 'Junyuan Tang', 'Kailun Su', 'Haoran Lu', 'Weijie Wan', 'Baijun Chen', 'Songling Liu', 'Haowen Yan', 'Honghao Su', 'Zhiyang Dou', 'Kaixuan Wang', 'Dandan Zhang', 'Yunze Liu', 'Yan Qin', 'Qiwei Liang', 'Qiwei Wu', 'Zijian Lin', 'Wenwei Lin', 'Yuran Wang', 'Minghua He', 'Tianshu Wu', 'Ruihai Wu', 'Jingquan Zhou', 'Kai-Chong Lei', 'Haibao Yu', 'Yuanfeng Ji', 'Weiyang Jin', 'Guanyu Lin', 'Xiaofan Li', 'Qi Xiong', 'Renjing Xu', 'Zhongyu Li', 'Wenhao Chai', 'Enze Xie', 'Ziwei Wang', 'Yao Mu', 'Hao Dong', 'Wojciech Matusik', 'Mingyu Ding', 'Wenbo Ding', 'Ping Luo', 'Masayoshi Tomizuka'], 'affiliations': ['CMU', 'CUHK', 'HKUST (GZ)', 'IC', 'MIT', 'MMLab@HKU', 'NTU', 'NU', 'NUS', 'PKU', 'Princeton', 'SJTU', 'Stanford', 'THU', 'UC Berkeley', 'UNC', 'Yale', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2607.04434.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единый бенчмарк для оценки робот-манипуляторов от симуляции к реальности', 'desc': 'RoboDojo — это единый симуляционный и реальный бенчмарк для оценки обобщённых политик манипуляции роботов на разнообразных задачах. Бенчмарк включает 42 симуляционные и 18 реальные задачи, оценивающие способности обобщения, память, точность, выполнение долгосрочных инструкций и следование естественным командам. Система RoboDojo-RealEval обеспечивает воспроизводимую оценку в реальном мире с доступом через облако, стандартизированным оборудованием и протоколами, решая проблему дороговизны и сложности реальных экспериментов. Интеграция 30 политик и публичный лидерборд позволяют систематически анализировать производительность и прогресс в области манипуляционных политик.'}, 'en': {'title': 'RoboDojo: Bridging Simulations and Real-World Robot Evaluation', 'desc': 'RoboDojo is a new benchmark designed to evaluate robot manipulation policies in both simulated and real-world environments. It addresses the limitations of existing benchmarks by providing a comprehensive set of tasks that cover a wide range of manipulation capabilities. The benchmark includes 42 simulation tasks and 18 real-world tasks, assessing dimensions like generalization, precision, and long-horizon execution. By integrating policies into XPolicyLab, RoboDojo allows for scalable evaluation and comparison across different settings, facilitating advancements in robot manipulation research.'}, 'zh': {'title': 'RoboDojo：统一的机器人操作评估平台', 'desc': 'RoboDojo是一个统一的模拟与真实基准，用于评估通用机器人操作策略在多样任务和评估维度上的表现。现有的基准测试往往局限于简单或短期任务，无法全面评估机器人的能力。RoboDojo包含42个模拟任务和18个真实任务，涵盖多种操作能力，并提供了五个评估维度。通过异构并行模拟和可重复的真实评估系统，RoboDojo支持大规模评估，促进了机器人策略在不同环境中的应用。'}}}, {'id': 'https://huggingface.co/papers/2607.06838', 'title': 'WildCity: A Real-World City-Scale Testbed for Rendering, Simulation, and Spatial Intelligence', 'url': 'https://huggingface.co/papers/2607.06838', 'abstract': 'Abstract WildCity presents a large-scale multimodal dataset for urban navigation and spatial representation, enabling research into AI systems that can perceive and reason about city-scale environments similar to human cognitive capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Humans can navigate an unfamiliar city and gradually form a coherent spatial mental map spanning tens of square kilometers. Can AI build spatial representations at a comparable scale? Although recent foundation models have advanced scene reconstruction and embodied intelligence, scaling to entire cities remains an open challenge, primarily due to the lack of city-scale data. To bridge the gap, we introduce WildCity, a real-world multimodal dataset collected by autonomous fleets traversing complex urban environments. Our dataset includes 18 trajectories, each averaging 83.7 kilometers in length, and preserves the core challenges of in-the-wild perception, e.g., dynamic objects, lighting variations, and imperfect camera poses. We further establish an urban-tailored reconstruction baseline and convert the reconstructed environments into a closed-loop simulator. Beyond the dataset and baseline, we systematically analyze the key challenges on the path to simulation-ready urban digital twins: scalability, extrapolation, and uncertainty. Ultimately, WildCity aims to catalyze progress not only in city-scale rendering, but more broadly in the pursuit of AI that can perceive, remember, and reason across space at a scale comparable to human cognition. Project page: https://han-xiangyu.github.io/Wild-City/', 'score': 3, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '9c6125052d8526f6', 'authors': ['Xiangyu Han', 'Mengyu Yang', 'Jiaqi Li', 'Bowen Chang', 'Ziyu Chen', 'Hexu Zhao', 'Rahul Kumar Agrawal', 'Anthony Rodriguez', 'Fiona Hua', 'Marco Pavone', 'Chen Feng', 'Yiming Li'], 'affiliations': ['May Mobility', 'NVIDIA', 'New York University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06838.jpg', 'data': {'categories': [], 'emoji': '🏙️', 'ru': {'title': 'Обучение ИИ пространственному мышлению в масштабе целого города', 'desc': 'WildCity — это крупномасштабный мультимодальный датасет для изучения навигации и пространственного представления городских сред на уровне целого города. Датасет содержит 18 траекторий общей длиной более 1500 км, собранные с помощью автономных транспортных средств в реальных городских условиях с учётом сложностей реального восприятия. Авторы установили исходный уровень для реконструкции среды и создали замкнутый симулятор для работы с восстановленными окружениями. Исследование систематически анализирует ключевые вызовы для создания городских цифровых двойников: масштабируемость, экстраполяция и неопределённость в данных.'}, 'en': {'title': 'Empowering AI to Navigate Cities Like Humans', 'desc': "WildCity is a comprehensive dataset designed to enhance AI's ability to understand and navigate urban environments like humans do. It consists of extensive multimodal data collected from autonomous vehicles traveling through cities, capturing various challenges such as dynamic objects and changing lighting conditions. The dataset includes 18 long trajectories, allowing researchers to develop and test AI models for city-scale spatial reasoning and representation. By addressing issues like scalability and uncertainty, WildCity aims to advance the creation of digital twins of urban areas, facilitating better AI perception and reasoning capabilities."}, 'zh': {'title': 'WildCity：推动城市规模AI认知的进步', 'desc': 'WildCity是一个大规模的多模态数据集，旨在支持城市导航和空间表示的研究。该数据集由自主车队在复杂城市环境中收集，包含18条轨迹，平均长度为83.7公里。它保留了真实环境中的核心挑战，如动态物体、光照变化和摄像头姿态不完美。WildCity的目标是推动AI在城市规模的渲染和空间认知方面的进展，使其能够像人类一样感知、记忆和推理。'}}}, {'id': 'https://huggingface.co/papers/2607.04939', 'title': 'Teaching LLMs a Low-Resource Language: Enhancing Code Completion in Pharo', 'url': 'https://huggingface.co/papers/2607.04939', 'abstract': "Abstract Large language models can be adapted for low-resource programming languages through specialized training pipelines and benchmarks, achieving superior code completion performance compared to general-purpose models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) unlocked new possibilities in automated code writing, becoming the backbone of most code completion tools. While LLMs excel in mainstream languages, they often lack support for the so-called low-resource languages where training data is scarce. As a result, these languages lag behind in the quality of code completion tooling available to their communities. A concrete example is Pharo, a Smalltalk-inspired language whose IDE currently offers only single-token completion. In this work, we report on our experience bringing LLM-based code completion to Pharo. First, we describe an end-to-end pipeline that combines Pharo-specific data curation, continued pre-training and fine-tuning of open code LLMs. Second, we introduce a set of Pharo code completion benchmarks designed to evaluate whether models (i) learn Pharo's syntax and (ii) accurately complete masked Pharo code from real-world GitHub repositories. Third, we show empirically that Pharo-specialized models substantially outperform their original base checkpoints and also exceed the accuracy of substantially larger code LLMs on Pharo completion. Overall, our case study demonstrates the feasibility of bringing strong LLM-based code completion to low-resource programming languages, with models small enough to provide ``real-time'' in-IDE support.", 'score': 0, 'issue_id': 2604, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'e2852eaacf4174d7', 'authors': ['Kilian Kier', 'Alessandro Giagnorio', 'Omar AbedelKader', 'Oleksandr Zaitsev', 'Robert Peharz', 'Romain Robbes', 'Gabriele Bavota', 'Stéphane Ducasse'], 'affiliations': ['CIRAD, UMR SENS', 'CNRS, University of Bordeaux Bordeaux INP, LaBRI, UMR5800', 'Graz University of Technology', 'Lifeware SA', 'Software Institute USI Università della Svizzera italiana', 'Univ. Lille, Inria, CNRS, Centrale Lille UMR 9189 CRIStAL'], 'pdf_title_img': 'assets/pdf/title_img/2607.04939.jpg', 'data': {'categories': ['#training', '#low_resource', '#dataset', '#transfer_learning', '#data', '#benchmark', '#open_source', '#plp'], 'emoji': '🎯', 'ru': {'title': 'Мощное дополнение кода для языков программирования с малым объёмом данных', 'desc': 'В статье описывается подход к адаптации больших языковых моделей для низкоресурсных языков программирования на примере языка Pharo. Авторы разработали специализированный pipeline, включающий подготовку данных, дальнейшее предварительное обучение и fine-tuning открытых моделей для кодирования. Они создали набор бенчмарков для оценки способности модели изучать синтаксис Pharo и корректно завершать код из реальных репозиториев. Экспериментальные результаты показали, что специализированные модели значительно превосходят базовые модели и крупные универсальные LLM на задачах завершения кода на Pharo, обеспечивая при этом достаточно быстрый вывод для встроенной поддержки в IDE.'}, 'en': {'title': 'Empowering Low-Resource Languages with Tailored LLMs for Code Completion', 'desc': "This paper discusses how large language models (LLMs) can be effectively adapted for low-resource programming languages, specifically focusing on Pharo. It outlines a specialized training pipeline that includes data curation, continued pre-training, and fine-tuning of LLMs to improve code completion performance. The authors also introduce benchmarks to assess the models' understanding of Pharo's syntax and their ability to complete code accurately. The results show that these tailored models significantly outperform general-purpose LLMs, providing efficient in-IDE support for developers using low-resource languages."}, 'zh': {'title': '为低资源编程语言赋能：Pharo的代码补全新突破', 'desc': '本研究探讨了如何将大型语言模型（LLMs）应用于低资源编程语言，特别是Pharo语言。通过专门的数据整理、继续预训练和微调，研究团队成功提升了Pharo的代码补全性能。我们还设计了一套Pharo代码补全基准，以评估模型对Pharo语法的学习能力和代码补全的准确性。结果表明，针对Pharo优化的模型在代码补全方面显著优于原始模型，并且在实时IDE支持中表现出色。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (2)', '#agi', '#alignment', '#architecture (3)', '#audio', '#benchmark (3)', '#cv', '#data (1)', '#dataset (3)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource (1)', '#machine_translation', '#math', '#multilingual', '#multimodal (3)', '#open_source (2)', '#optimization', '#plp (1)', '#rag', '#reasoning (2)', '#rl', '#rlhf', '#robotics (3)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (3)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-09 08:26',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-09 08:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-09 08:26')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
