    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.19704', 'title': 'Beyond Static Leaderboards: Predictive Validity for the Evaluation of LLM Agents', 'url': 'https://huggingface.co/papers/2606.19704', 'abstract': 'Abstract Aggregate-score leaderboards in agent benchmarks fail to capture deployment-relevant dimensions and show rank instability, necessitating new evaluation frameworks based on predictive validity and out-of-distribution criteria.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agent benchmarks are growing fast, but no single benchmark touches more than four or five of the dimensions that deployment exposes. This paper aggregates the largest coordinated deep-dive of one MCP-based industrial-agent benchmark to date: fourteen parallel implementation studies covering new asset classes (including a multi-modal visual extension), alternative orchestrations, retrieval strategies, reasoning modes, infrastructure optimizations, and evaluation-methodology probes. Consolidating those studies with seven prior agent benchmarks, we argue that aggregate-score leaderboards systematically underspecify deployed-agent evaluation. Rankings derived from aggregate scores do not transfer to out-of-distribution settings; recent public-to-hidden competition retrospectives provide direct empirical evidence of this rank instability. We propose ranking configurations by predictive validity, the correlation between in-sample and out-of-sample rank, rather than in-sample mean, and report a twelve-tier measurement apparatus that exposes the deployment-relevant dimensions HELM and its agent-era successors collapse. The position is operationalized through three falsifiable out-of-distribution criteria with explicit thresholds; existing evidence partly supports it but is too thin to confirm. We close with a pre-registered pilot design and a field-level vision for what the next generation of agentic benchmarks should report.', 'score': 12, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'd5bb4ed829da3e50', 'authors': ['Dhaval C. Patel', 'Kaoutar El Maghraoui', 'Shuxin Lin', 'Yusheng Li', 'Tianjun Feng', 'Chun-Yi Tsai', 'Yihan Sun', 'Wei Alexander Xin', 'Akshat Bhandari', 'Tanisha Rathod', 'Aaron Fan', 'Sanskruti Vijay Shejwal', 'Tomas Pasiecznik', 'Sagar Chethan Kumar', 'Tanmay Agarwal', 'Rohith Kanathur', 'Sam Colman', 'Amaan Sheikh', 'Dev Bahl', 'Ann Li', 'Krish Veera', 'Alimurtaza Mustafa Merchant', 'Shambhawi Baswaraj Bhure', 'Sajal Kumar Goyla', 'Chengrui Li', 'Kirthana Natarajan', 'Rui Li', 'Thomas Ajai', 'Rujing Li', 'Vivek G. Iyer', 'Sanjaii Vijayakumar', 'Yitong Bai', 'Ayal Yakobe', 'Darief Maes', 'Yassine Jebbouri', 'Tianyang Xu', 'Thai Quoc On', 'Vera Mazeeva', 'Winston Li', 'Yuval Shemla', 'Yeshitha Bhuvanesh', 'Rushin Bhatt', 'Siddharth Chethan Gowda', 'Alisha Vinod', 'Caroline Cahill', 'Shriya Aishani Rachakonda', 'Yunfeng Chen', 'Aryaman Agrawal', 'Aman Upganlawar', 'Mao Le Jonathan Ang', 'Yubin Sally Go', 'Madhav Rajkondawar', 'Yang-Jung Chen', 'Trisha Maturi', 'Ananya Kapoor', 'Andrew Li', 'Shrey Arora', 'Mana Abbaszadeh', 'Shen Li', 'Charles Xu', 'Byeolah Kwon'], 'affiliations': ['IBM'], 'pdf_title_img': 'assets/pdf/title_img/2606.19704.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents', '#survey', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'От агрегированных баллов к предсказательной валидности в бенчмарках агентов', 'desc': 'В работе анализируется проблема агрегированных рейтингов в бенчмарках для агентов, которые не отражают важные аспекты развёртывания систем. Авторы провели координированное исследование на основе MCP-бенчмарка с четырнадцатью параллельными имплементациями, изучив различные архитектуры, стратегии поиска, режимы рассуждений и методологии оценки. Они показали, что рейтинги на основе агрегированных оценок нестабильны и не переносятся на распределения данных, отличные от обучающих. Авторы предлагают ранжировать конфигурации по предсказательной валидности — корреляции между рейтингом внутри выборки и вне её — и описывают систему из двенадцати уровней измерений для оценки развёртываемых агентов.'}, 'en': {'title': 'Rethinking Agent Evaluation: From Scores to Predictive Validity', 'desc': 'This paper critiques current aggregate-score leaderboards used in evaluating agent benchmarks, highlighting their failure to reflect real-world deployment scenarios and their instability in rankings. It presents a comprehensive study of a new industrial-agent benchmark, incorporating various dimensions such as multi-modal visual capabilities and different evaluation methodologies. The authors argue for a shift towards ranking agents based on predictive validity, which assesses how well in-sample rankings correlate with out-of-sample performance. They propose a new measurement framework with specific out-of-distribution criteria to better capture the complexities of agent deployment.'}, 'zh': {'title': '重新定义代理评估标准', 'desc': '本文讨论了现有的代理基准测试中聚合分数排行榜的不足，认为这些排行榜无法有效捕捉与实际部署相关的维度，并且存在排名不稳定的问题。研究表明，现有的基准测试通常只覆盖了部署中涉及的四到五个维度，无法全面评估代理的性能。作者提出了一种新的评估框架，基于预测有效性和超出分布的标准来重新配置排名。最后，文章提出了一个十二层的测量工具，旨在更好地反映代理在实际应用中的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.19195', 'title': 'Moebius: 0.2B Lightweight Image Inpainting Framework with 10B-Level Performance', 'url': 'https://huggingface.co/papers/2606.19195', 'abstract': 'Abstract A lightweight image inpainting framework achieves high-fidelity results with significantly reduced parameters and inference time through novel local-global interaction blocks and adaptive distillation strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While 10B-level industrial foundation models have pushed the boundaries of image inpainting, their prohibitive computational costs severely hinder practical deployment. Constructing a highly optimized task-specific specialist offers a promising solution; however, extreme structural compression inevitably triggers a severe representation bottleneck. To conquer this, we propose Moebius, a highly efficient lightweight inpainting framework. We systematically reconstruct the diffusion backbone by introducing the Local-λ Mix Interaction (LλMI) block. Comprising Local-λ and Interactive-λ modules, it elegantly summarizes spatial contexts and global semantic priors into fixed-size linear matrices, preserving complex latent interactions while drastically shedding parameters. Furthermore, to unlock the full representational capacity of this highly compact architecture, we synergistically pair it with an adaptive multi-granularity distillation strategy. Operating strictly within the latent space to avoid expensive pixel-space decoding, this strategy dynamically balances multiple gradient-based losses to achieve high-fidelity alignment. Extensive experiments across natural and portrait benchmarks demonstrate that this optimal synergy enables Moebius to rival or even surpass the generation quality of the 10B-level industrial generalist FLUX.1-Fill-Dev. Remarkably, Moebius achieves this using less than 2\\% of the parameters (0.22B vs. 11.9B) while delivering a >15times acceleration in total inference time, setting a new efficiency standard for high-fidelity inpainting. Project page at https://hustvl.github.io/Moebius.', 'score': 10, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'bb41fc4403d67c00', 'authors': ['Kangsheng Duan', 'Ziyang Xu', 'Wenyu Liu', 'Xiaohu Ruan', 'Xiaoxin Chen', 'Xinggang Wang'], 'affiliations': ['Huazhong University of Science and Technology', 'VIVO AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.19195.jpg', 'data': {'categories': ['#inference', '#cv', '#optimization', '#small_models', '#training', '#diffusion', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Эффективное восстановление изображений через компактные модели с локально-глобальным взаимодействием', 'desc': 'В работе представлена лёгкая модель для восстановления изображений (инпейнтинга), которая достигает высокого качества при минимальном количестве параметров. Авторы предложили архитектуру Moebius с блоками локально-глобального взаимодействия (LλMI), которые сжимают пространственный контекст и глобальную семантику в матрицы фиксированного размера. Для раскрытия полного потенциала компактной модели применена адаптивная многоуровневая дистилляция, работающая в скрытом пространстве и динамически балансирующая несколько градиентных функций потерь. Экспериментально показано, что Moebius превосходит большую модель FLUX.1-Fill-Dev, используя менее 2% параметров и достигая ускорения в 15 раз при сохранении высокого качества восстановления.'}, 'en': {'title': 'Moebius: High-Fidelity Inpainting with Unmatched Efficiency', 'desc': 'The paper presents Moebius, a lightweight image inpainting framework that achieves high-quality results with fewer parameters and faster inference times. It introduces innovative Local-λ Mix Interaction (LλMI) blocks that effectively capture both local and global image features while minimizing the model size. To enhance performance, Moebius employs an adaptive multi-granularity distillation strategy that optimizes learning within the latent space, avoiding costly pixel-space operations. Experimental results show that Moebius can match or exceed the performance of larger models while using significantly fewer resources, setting a new benchmark for efficiency in image inpainting.'}, 'zh': {'title': '高效轻量级图像修复新标准', 'desc': '本文提出了一种轻量级的图像修复框架Moebius，能够在显著减少参数和推理时间的情况下实现高保真度的修复效果。通过引入局部-全局交互模块和自适应蒸馏策略，Moebius有效地总结了空间上下文和全局语义信息。该框架在潜在空间中操作，避免了昂贵的像素空间解码，从而实现了高效的表示能力。实验结果表明，Moebius在自然和肖像基准测试中表现优异，甚至可以与10B级工业模型的生成质量相媲美。'}}}, {'id': 'https://huggingface.co/papers/2606.20506', 'title': 'FreeStyle: Free Control of Style-Content Dual-Reference Generation from Community LoRA Mining', 'url': 'https://huggingface.co/papers/2606.20506', 'abstract': 'Abstract FreeStyle is a scalable dual-reference generation framework that uses community LoRA mining to create large-scale style-content triplets while addressing content leakage through disentanglement mechanisms and a comprehensive benchmark.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Style-content dual-reference generation aims to synthesize an image that preserves the structure and semantics of a content reference while adopting the style of a separate style reference.Despite recent progress, this setting remains challenging because models must balance content fidelity, style alignment, and instruction following avoiding semantic leakage from the style reference.A key bottleneck is the lack of large-scale triplet data with clean content-style separation and broad long-tail style coverage.In this work, we propose FreeStyle, a scalable dual-reference generation framework based on community LoRA mining.We treat community LoRAs as compositional anchors for style and content, and design a rigorous generation and filtering pipeline to construct large-scale Style-Reference and Content-Reference triplets across multiple base models.To address content leakage, we adopt a two-stage curriculum with stage-specific disentanglement mechanisms: an attention-level enrichment constraint that suppresses style-reference leakage in the style-transfer stage, and a frequency-aware RoPE modulation strategy that targets positional-correspondence-based leakage in the harder dual-reference stage.We also introduce a benchmark covering both style-reference and dual-reference generation, with evaluations on style similarity, content preservation, aesthetics, instruction following, and leakage rejection. The benchmark incorporates a style-invariant Content Alignment Score (CAS) and introduces a calibrated VLM-based Rejection Score for evaluating generation reliability and leakage suppression.Extensive experiments show that our model achieves a strong balance among style alignment, content preservation, and leakage suppression.', 'score': 5, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '8c13a0359ae2ff4f', 'authors': ['Jinghong Lan', 'Wei Cheng', 'Yunuo Chen', 'Ziqi Ye', 'Peng Xing', 'Yixiao Fang', 'Rui Wang', 'Yufeng Yang', 'Xuanyang Zhang', 'Xianfang Zeng', 'Difan Zou', 'Gang Yu', 'Chi Zhang'], 'affiliations': ['Fudan University', 'StepFun', 'University of Hong Kong', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2606.20506.jpg', 'data': {'categories': ['#synthetic', '#multimodal', '#cv', '#dataset', '#benchmark', '#leakage', '#training'], 'emoji': '🎨', 'ru': {'title': 'Чистое разделение стиля и содержания через LoRA и целевую дезентанглицию', 'desc': 'FreeStyle — это масштабируемая система для двухреференцной генерации изображений, которая использует майнинг LoRA из сообщества для создания больших наборов данных тройок стиль-контент. Система решает проблему утечки контента через механизмы разделения признаков на двух этапах: ограничения на уровне внимания для подавления влияния стиля и модуляцию позиционного кодирования RoPE для более сложных случаев. Авторы предлагают комплексный бенчмарк, который оценивает сходство стилей, сохранение содержания, эстетику и способность модели отклонять утечки контента. Экспериментальные результаты показывают, что модель достигает хорошего баланса между выравниванием стиля, сохранением контента и подавлением нежелательных утечек.'}, 'en': {'title': 'Balancing Style and Content with FreeStyle Framework', 'desc': "FreeStyle is a novel framework designed for dual-reference image generation that effectively combines style and content from different sources. It utilizes community LoRA mining to create extensive datasets of style-content triplets while preventing content leakage through advanced disentanglement techniques. The framework includes a two-stage curriculum that enhances the model's ability to maintain content fidelity and style alignment without compromising the integrity of the references. Additionally, FreeStyle introduces a comprehensive benchmark for evaluating the quality of generated images based on various criteria, ensuring robust performance across different styles and content types."}, 'zh': {'title': 'FreeStyle：风格与内容的完美结合', 'desc': 'FreeStyle是一个可扩展的双参考生成框架，利用社区LoRA挖掘创建大规模的风格-内容三元组，同时通过解耦机制和全面的基准测试来解决内容泄漏问题。该框架旨在合成一幅图像，既保留内容参考的结构和语义，又采用独立风格参考的风格。尽管最近取得了一些进展，但在内容保真度、风格一致性和指令遵循之间的平衡仍然具有挑战性。我们的工作提出了FreeStyle，通过社区LoRA作为风格和内容的组合锚点，构建了一个严格的生成和过滤管道，以构造大规模的风格参考和内容参考三元组。'}}}, {'id': 'https://huggingface.co/papers/2606.19980', 'title': 'ENPIRE: Agentic Robot Policy Self-Improvement in the Real World', 'url': 'https://huggingface.co/papers/2606.19980', 'abstract': 'Abstract ENPIRE framework enables autonomous robotics research through a closed-loop system that automates policy improvement via environment feedback, policy refinement, and evolutionary code optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Achieving dexterous robotic manipulation in the real world heavily relies on human supervision and algorithm engineering, which becomes a central bottleneck in the pursuit of general physical intelligence. Although emerging coding agents can generate code to automate algorithm search, their successes remain largely confined in digital environments. We conjecture that the missing abstraction to automate robotics research is a repeatable feedback loop for real-world policy improvement: reset the scene, execute a policy, verify the outcome, and refine the next iteration. To bridge this gap, we introduce ENPIRE, a harness framework for coding agents that instantiates this physical feedback routine with four core modules: an Environment module (EN) for automatic reset and verification, a Policy Improvement module (PI) that launches policy refinement, a Rollout module (R) to evaluate policies with one or multiple physical robots operating in parallel, and an Evolution module (E) in which coding agents analyze logs, consult literature, improve training infrastructure and algorithm code to address failure modes. This closed-loop system transforms real-world manipulation learning into a controllable optimization procedure, minimizing human effort while allowing fair ablations across training recipe and agent variants. Powered by ENPIRE, frontier coding agents can autonomously train a policy to achieve a 99% success rate on challenging, dexterous manipulation tasks, such as organizing a pin box, fastening a zip tie, and tool use, a process that further accelerates when we dispatch an agent team on a robot fleet. Our results suggest a practical and scalable path toward deploying coding agents to autonomously advancing robotics in the physical world.', 'score': 4, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '235104ba37ea64ca', 'authors': ['Wenli Xiao', 'Jia Xie', 'Tonghe Zhang', 'Haotian Lin', 'Letian "Max" Fu', 'Haoru Xue', 'Jalen Lu', 'Yi Yang', 'Cunxi Dai', 'Zi Wang', 'Jimmy Wu', 'Guanzhi Wang', 'S. Shankar Sastry', 'Ken Goldberg', 'Linxi "Jim" Fan', 'Yuke Zhu', 'Guanya Shi'], 'affiliations': ['CMU', 'NVIDIA', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.19980.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Замкнутый цикл обучения: coding agents для автономного развития робототехники', 'desc': 'ENPIRE — это фреймворк, который использует coding agents для автоматизации исследований в робототехнике через замкнутый цикл обратной связи с реальным миром. Система включает четыре ключевых модуля: автоматический сброс и проверку окружения, улучшение политики, параллельное тестирование на робот-флоте и эволюцию кода с анализом ошибок. Фреймворк трансформирует обучение манипуляции в управляемую процедуру оптимизации, минимизируя человеческое вмешательство и позволяя проводить честные сравнения различных алгоритмов. Благодаря ENPIRE coding agents могут автономно обучать политики достигать 99% успеха в сложных манипуляционных задачах в реальном мире.'}, 'en': {'title': 'ENPIRE: Automating Robotics Research with Feedback Loops', 'desc': 'The ENPIRE framework revolutionizes autonomous robotics by creating a closed-loop system that enhances policy improvement through real-world feedback. It consists of four key modules: Environment for resetting and verifying tasks, Policy Improvement for refining strategies, Rollout for evaluating policies with multiple robots, and Evolution for analyzing performance and improving algorithms. This system minimizes the need for human intervention and allows for systematic testing of different training methods and agent types. With ENPIRE, coding agents can achieve high success rates in complex manipulation tasks, paving the way for scalable advancements in robotics.'}, 'zh': {'title': 'ENPIRE：自主机器人研究的新路径', 'desc': 'ENPIRE框架通过闭环系统实现自主机器人研究，自动化政策改进，利用环境反馈、政策细化和进化代码优化。该框架包含四个核心模块：环境模块（EN）用于自动重置和验证，政策改进模块（PI）进行政策细化，滚动模块（R）评估多个物理机器人并行操作的政策，以及进化模块（E）分析日志和改进算法代码。通过ENPIRE，前沿编码代理能够在复杂的灵巧操作任务中实现99%的成功率，显著减少人类的干预。我们的研究表明，ENPIRE为在物理世界中自主推进机器人技术提供了一条实用且可扩展的路径。'}}}, {'id': 'https://huggingface.co/papers/2606.20563', 'title': 'JanusMesh: Fast and Zero-Shot 3D Visual Illusion Generation via Cross-Space Denoising', 'url': 'https://huggingface.co/papers/2606.20563', 'abstract': 'Abstract A fast, training-free framework generates text-driven 3D visual illusions by decoupling generation into cross-space dual-branch denoising and view-conditioned texture synthesis for seamless geometric fusion and semantic coherence.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Creating 3D visual illusions, a single 3D mesh that reveals entirely different semantics from various viewing angles, is a fascinating but tough challenge. Existing optimization-based methods are slow and can produce oversaturated colors. In contrast, naive stitching approaches fail to produce geometrically coherent objects. This results in visible unnatural seams and semantic leaks. In this paper, we present a fast and training-free framework for generating text-driven 3D visual illusions. Our approach decouples the generation into two stages. First, we propose a cross-space dual-branch denoising process. This process dynamically decodes 3D latents into voxel space for CLIP-guided orientation alignment and Signed Distance Field (SDF) blending, which ensures seamless geometric fusion. Second, we introduce a view-conditioned texture synthesis module that projects and aggregates view-specific 2D diffusion priors onto the fused geometry. Extensive experiments demonstrate that our method generates highly realistic, dual-semantic 3D illusions in just 3-5 minutes. It significantly outperforms existing methods in geometric integrity, semantic recognizability, and efficiency. Project page: https://siang1105.github.io/JanusMesh.github.io/', 'score': 2, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '2eca99dd11ccfe9b', 'authors': ['Siang-Ling Zhang', 'Huai-Hsun Cheng', 'Tsung-Ju Yang', 'Yu-Lun Liu'], 'affiliations': ['National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2606.20563.jpg', 'data': {'categories': ['#diffusion', '#3d', '#multimodal'], 'emoji': '🎭', 'ru': {'title': 'Текстовая магия: 3D иллюзии из разных углов', 'desc': 'В работе предлагается быстрый фреймворк без обучения для создания текстовых 3D иллюзий, которые выглядят по-разному с разных углов обзора. Метод использует двухэтапный подход: сначала применяется кросс-пространственный двойной денойзинг с использованием CLIP для ориентации и SDF для слияния геометрии, а затем синтезируется текстура на основе условий представления сцены. Фреймворк проецирует 2D приоры диффузионной модели на объединённую геометрию, обеспечивая семантическую согласованность и геометрическую целостность. Метод генерирует реалистичные 3D иллюзии с двойной семантикой за 3-5 минут, превосходя существующие подходы по качеству и скорости.'}, 'en': {'title': 'Fast and Seamless 3D Visual Illusions from Text', 'desc': "This paper presents a new method for creating 3D visual illusions from text descriptions without the need for extensive training. The approach separates the generation process into two main stages: first, it uses a dual-branch denoising technique to align 3D shapes with text prompts and ensure smooth geometry. Next, it applies a texture synthesis method that adapts textures based on the viewer's perspective, enhancing realism. The results show that this framework is faster and produces better quality 3D illusions compared to traditional methods, achieving high geometric and semantic fidelity."}, 'zh': {'title': '快速生成文本驱动的3D视觉幻觉', 'desc': '本文提出了一种快速且无需训练的框架，用于生成文本驱动的3D视觉幻觉。该方法将生成过程分为两个阶段：首先，通过交叉空间双分支去噪过程，实现3D潜在空间到体素空间的动态解码，确保几何融合的无缝性。其次，引入视角条件的纹理合成模块，将视角特定的2D扩散先验投影到融合的几何体上。实验表明，该方法在几何完整性、语义可识别性和效率方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2606.18231', 'title': 'Adaptive Volumetric Mechanical Property Fields Invariant to Resolution', 'url': 'https://huggingface.co/papers/2606.18231', 'abstract': "Abstract AdaVoMP predicts dense spatially-varying mechanical properties for 3D objects using a sparse adaptive voxel structure and transformer encoder-decoder model, enabling realistic deformable simulations with improved accuracy and efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accurate mechanical properties (or materials) Young's modulus (E), Poisson's ratio (ν) and density (ρ) are essential for reliable physics simulation of digital worlds, but most 3D assets lack this information. We propose AdaVoMP, a method for predicting accurate dense spatially-varying (E, ν, ρ) for input 3D objects across representations, improving the resolution, accuracy, and memory efficiency over the state-of-the-art. The foundation of our technique is a sparse and adaptive voxel structure SAV that efficiently represents both the input 3D shape and the material field output. We replace the fixed-voxel model of the most accurate prior method, VoMP, with a novel sparse transformer encoder-decoder model that learns to generate a unique SAV autoregressively for every input shape to represent its materials, achieving a resolution 16^3times higher than prior art. Experiments show that AdaVoMP estimates more accurate volumetric properties, even with lesser test-time compute than all prior art. This allows us to convert high-resolution complex 3D objects into simulation-ready assets, resulting in realistic deformable simulations.", 'score': 2, 'issue_id': 2457, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'f5ba29903050f23d', 'authors': ['Rishit Dagli', 'Donglai Xiang', 'Vismay Modi', 'Xuning Yang', 'Gavriel State', 'David I. W. Levin', 'Maria Shugrina'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.18231.jpg', 'data': {'categories': [], 'emoji': '🧊', 'ru': {'title': 'Разреженные вокселевые сетки для точного предсказания механических свойств', 'desc': 'AdaVoMP — это метод для предсказания плотного поля механических свойств трёхмерных объектов, использующий разреженную адаптивную вокселевую структуру. Модель основана на трансформере с архитектурой энкодер-декодер, который автоматически генерирует оптимальную вокселевую сетку для каждого объекта. Предложенный подход достигает разрешения в 16³ раза выше, чем предыдущие методы, при этом требуя меньше вычислительных ресурсов. Это позволяет эффективно конвертировать сложные 3D-объекты в симуляционно-готовые активы с реалистичными деформациями.'}, 'en': {'title': 'Revolutionizing 3D Simulations with Adaptive Material Prediction', 'desc': "AdaVoMP is a novel method that predicts detailed mechanical properties like Young's modulus, Poisson's ratio, and density for 3D objects, which are crucial for realistic physics simulations. It utilizes a sparse adaptive voxel structure combined with a transformer encoder-decoder model to enhance the accuracy and efficiency of these predictions. By replacing traditional fixed-voxel models with a more flexible approach, AdaVoMP achieves significantly higher resolution in representing material properties. This advancement allows for the creation of high-quality, simulation-ready 3D assets with reduced computational requirements compared to previous methods."}, 'zh': {'title': 'AdaVoMP：提升3D物体机械属性预测的革命性方法', 'desc': 'AdaVoMP是一种预测3D物体稠密空间变化机械属性的方法，使用稀疏自适应体素结构和变换器编码器-解码器模型。这种方法能够提高物理仿真的准确性和效率，尤其是在缺乏材料信息的3D资产中。通过生成更高分辨率的杨氏模量、泊松比和密度，AdaVoMP在内存效率和准确性上超越了现有技术。实验表明，AdaVoMP在计算量更小的情况下，能够更准确地估计体积属性，从而实现真实的可变形仿真。'}}}, {'id': 'https://huggingface.co/papers/2606.16122', 'title': 'Thinking with Visual Grounding', 'url': 'https://huggingface.co/papers/2606.16122', 'abstract': 'Abstract Visually grounded thinking integrates natural-language reasoning with explicit visual evidence grounding in vision-language models, improving reasoning accuracy through scalable synthesis and reinforcement learning techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual thinking should not only sound right; it should show its evidence. While recent vision-language models (VLMs) can produce natural-language reasoning traces, these traces often leave the supporting image regions implicit, making them hard to verify and difficult to supervise. We introduce visually grounded thinking, a reasoning process in which models interleave natural-language thoughts with explicit point or box groundings of the visual evidence used at each step. This lets the model express intermediate reasoning in language while grounding key objects in the image regions they refer to. To train this behavior, we construct a scalable synthesis pipeline that distills correct visual reasoning traces, extracts the visual objects required by the traces, grounds them with a SAM3-based agent, and derives aligned point and box supervision from the resulting masks. We further propose grounding-aware reinforcement learning, which combines answer correctness rewards with dense grounding rewards that score whether generated object references match the correct image evidence. Across two counting benchmarks and four spatial reasoning benchmarks, adding visually grounded thinking to Gemma3-4B-IT consistently improves performance over the original model and the non-grounded thinking baseline. On spatial reasoning, the visually grounded thinking 4B models match, and in some cases surpass, Gemma3-27B-IT from the same model family. Our analysis shows that point grounding is well suited to counting, while box grounding benefits most from explicit grounding rewards on spatial tasks. Overall, our results show that VLMs think better when their intermediate thoughts are tied to the image regions that make them true.', 'score': 2, 'issue_id': 2457, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '378689b46a8fc889', 'authors': ['Junkai Zhang', 'Yihe Deng', 'Kai-Wei Chang', 'Wei Wang'], 'affiliations': ['University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2606.16122.jpg', 'data': {'categories': ['#rlhf', '#multimodal', '#benchmark', '#cv', '#training', '#agents', '#rl', '#interpretability', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Привязать мысли к доказательствам: визуально обоснованное рассуждение в vision-language моделях', 'desc': 'В работе предлагается подход визуально обоснованного мышления для vision-language моделей, при котором модель переплетает рассуждения на естественном языке с явным указанием визуальных доказательств на изображении. Для обучения этому поведению авторы разработали масштабируемый конвейер синтеза, который извлекает правильные следы рассуждений, грундирует визуальные объекты с помощью агента на основе SAM3 и получает размеченные точки и боксы. Они также предложили grounding-aware обучение с подкреплением, которое объединяет награды за правильность ответов с плотными наградами за грундинг, проверяя соответствие ссылок на объекты реальным областям изображения. Эксперименты на бенчмарках подсчета и пространственного рассуждения показали, что визуально обоснованное мышление значительно улучшает производительность моделей, позволяя компактным моделям сравняться с намного большими версиями.'}, 'en': {'title': 'Enhancing Reasoning with Visual Evidence in Language Models', 'desc': 'This paper introduces visually grounded thinking, a method that enhances reasoning in vision-language models (VLMs) by linking natural-language reasoning with specific visual evidence. It addresses the challenge of implicit visual support in reasoning traces by allowing models to explicitly reference image regions during their thought process. The authors develop a scalable synthesis pipeline to train this method, which includes grounding visual objects and providing supervision based on their locations. The results demonstrate that incorporating visually grounded thinking significantly improves performance on various reasoning tasks, showing that models perform better when their reasoning is directly connected to visual evidence.'}, 'zh': {'title': '视觉基础思维：让推理更有依据', 'desc': '这篇论文介绍了一种称为视觉基础思维的新方法，它将自然语言推理与明确的视觉证据结合在一起。通过在推理过程中将语言思维与图像中的关键对象进行关联，模型能够更清晰地表达中间推理过程。为了训练这种能力，研究者们构建了一个可扩展的合成管道，提取所需的视觉对象并进行标注。实验结果表明，视觉基础思维显著提高了模型在计数和空间推理任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.20083', 'title': 'Holo-World: Unified Camera, Object and Weather Control for Video World Model', 'url': 'https://huggingface.co/papers/2606.20083', 'abstract': 'Abstract A unified controllable video world model generates videos from a single image while preserving scene structure and transferring to target weather states through specialized parameterization and conditioning techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video world models are moving toward preserving an observed world under controllable camera and object motion while allowing its environmental state to change. Yet these controls remain isolated, and weather generation typically relies on a source video or reconstructed scene that already specifies future structure. We study a first-frame-anchored source-to-state setting, where the model starts from a single image and follows explicit camera and object controls and an optional weather instruction, then generates a video that either preserves the source world or transfers it to a target weather state. To address these challenges, we first build HoloStateData, a state video dataset that turns diverse videos into unified control samples for camera, object, and weather supervision. Second, we introduce Holo-World, a unified controllable video world model that jointly controls scene from a single image. Its Unified Scene Adapter factorizes world preservation and weather transfer into distinct parameter subspaces, using rendered background, geometry buffers, and object controls to maintain controlled scene structure while modeling weather-dependent appearance and particle effects. Additionally, Scene-Weather Decomposed CFG guides scene and weather residuals separately, strengthening target weather effects without over-amplifying the full condition. Quantitative and qualitative experiments demonstrate that Holo-World maintains precise camera and object control with consistent scene structure while transferring scenes into diverse target weather state, outperforming video-to-video weather editing baselines on weather-state generation. Our project page is available at https://xiangchenyin.github.io/Holo-World/.', 'score': 1, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'e8b9386dbafcbe3d', 'authors': ['Xiangchen Yin', 'Wenzhang Sun', 'Jiahui Yuan', 'Zijie Liu', 'Yinda Chen', 'Wei Li', 'Dachun Kai', 'Chunfeng Wang', 'Xiaoyan Sun'], 'affiliations': ['Institute of Artificial Intelligence, Hefei Comprehensive National Science Center', 'Li Auto', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.20083.jpg', 'data': {'categories': ['#synthetic', '#multimodal', '#dataset', '#video', '#diffusion'], 'emoji': '🌍', 'ru': {'title': 'Единое управление видео-миром: сохранение сцены и контроль погоды из одного кадра', 'desc': 'В работе предлагается единая модель видео-мира, которая генерирует видео из одного изображения с сохранением структуры сцены и возможностью переноса в целевые погодные условия. Авторы создали специализированный датасет HoloStateData для унифицированного обучения управления камерой, объектами и погодой. Ключевым вкладом является архитектура Holo-World с адаптером Unified Scene Adapter, который разделяет сохранение мира и передачу погодных эффектов в разные подпространства параметров. Метод достигает высокого качества генерации видео с точным управлением камерой и объектами при реалистичной трансформации погодных условий.'}, 'en': {'title': 'Transforming Single Images into Dynamic Weather-Responsive Videos', 'desc': 'This paper presents a new model called Holo-World that generates videos from a single image while allowing for controlled changes in weather conditions. It uses a dataset called HoloStateData to create unified control samples for managing camera movements, object interactions, and weather effects. The model separates the tasks of preserving the original scene structure and modifying the weather, ensuring that both can be controlled effectively. Experiments show that Holo-World outperforms existing methods in generating videos with accurate scene structure and realistic weather transitions.'}, 'zh': {'title': '从单图像生成可控天气视频的创新模型', 'desc': '这篇论文介绍了一种统一的可控视频世界模型，能够从单张图像生成视频，同时保持场景结构并通过特定的参数化和条件技术转移到目标天气状态。模型通过HoloStateData数据集，将多样化的视频转化为统一的控制样本，以实现对相机、物体和天气的监督。Holo-World模型将世界保持和天气转移分解为不同的参数子空间，使用渲染背景和几何缓冲区来维持受控的场景结构，同时模拟天气依赖的外观和粒子效果。实验结果表明，Holo-World在保持精确的相机和物体控制的同时，能够将场景转移到多样的目标天气状态，超越了现有的视频到视频天气编辑基线。'}}}, {'id': 'https://huggingface.co/papers/2606.19605', 'title': 'FAPO: Fully Autonomous Prompt Optimization of Multi-Step LLM Pipelines', 'url': 'https://huggingface.co/papers/2606.19605', 'abstract': 'Abstract FAPO optimizes LLM pipelines by combining prompt editing with structural changes, demonstrating superior performance across multiple benchmarks and security tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-step LLM pipelines fail through interactions among retrieval, reasoning, and formatting steps, so prompt-only optimization can miss bottlenecks in the chain. We present FAPO (Fully Autonomous Prompt Optimization), a framework that lets Claude Code optimize an LLM pipeline inside a standardized codebase. FAPO evaluates a pipeline, inspects intermediate steps, diagnoses failures, proposes scoped changes, and validates variants repeatedly to optimize against a score function. It first tries prompt edits and, only when prompt optimization appears insufficient, changes chain structure within the permitted scope when attribution identifies a structural bottleneck. Across six benchmarks and three task models, FAPO beats the baseline GEPA in 15 of 18 model-benchmark comparisons. In 11 model-benchmark comparisons, FAPO wins with non-overlapping mean pm trial-standard-deviation ranges, and the mean FAPO-GEPA gain is +14.1 pp. In the six HoVer and IFBench comparisons where prompt-first search escalated to structural changes, FAPO wins all six with a mean gain of +33.8 pp. FAPO also improves performance on security tasks: on CTIBench-RCM, a security CVE-to-CWE task, prompt-only FAPO lifts test accuracy by +4.0 pp on GPT-5, +7.1 pp on Foundation-Sec-8B-Instruct, and +2.0 pp on Foundation-Sec-8B-Reasoning. These results position FAPO as a state-of-the-art pipeline optimization technique for both general-purpose and security-focused tasks.', 'score': 1, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '3c06789425acaf1a', 'authors': ['Paul Kassianik', 'Baturay Saglam', 'Huaibo Zhao', 'Blaine Nelson', 'Supriti Vijay', 'Aman Priyanshu', 'Amin Karbasi'], 'affiliations': ['Cisco Systems Inc.', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19605.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#training', '#agents', '#security'], 'emoji': '⚙️', 'ru': {'title': 'От редактирования промптов к переделке архитектуры: умная оптимизация LLM-конвейеров', 'desc': 'FAPO — это фреймворк для автоматической оптимизации многоэтапных LLM-пайплайнов, которые объединяют поиск информации, логический вывод и форматирование. Система сначала пытается улучшить пайплайн через редактирование промптов, а когда этого недостаточно, вносит структурные изменения в цепь обработки. Фреймворк проводит диагностику ошибок на промежуточных шагах и многократно валидирует варианты решения, получая прирост производительности в среднем на 14.1 процентных пункта относительно базового метода GEPA. FAPO показывает эффективность как на стандартных бенчмарках, так и на задачах безопасности, включая анализ уязвимостей CVE-к-CWE.'}, 'en': {'title': 'Optimize LLM Pipelines with FAPO: Smart Changes for Better Performance!', 'desc': 'FAPO (Fully Autonomous Prompt Optimization) enhances large language model (LLM) pipelines by integrating prompt editing with structural modifications. It identifies and addresses bottlenecks in the pipeline by evaluating intermediate steps and diagnosing failures, allowing for targeted optimizations. The framework first attempts to improve performance through prompt adjustments, and if necessary, it modifies the pipeline structure to resolve deeper issues. FAPO has demonstrated significant improvements over baseline methods across various benchmarks, particularly excelling in both general and security-related tasks.'}, 'zh': {'title': 'FAPO：优化LLM管道的新方法', 'desc': 'FAPO（完全自主提示优化）是一种优化大型语言模型（LLM）管道的框架，通过结合提示编辑和结构变化来提高性能。该方法能够评估管道、检查中间步骤、诊断失败并提出改进建议，从而优化模型的表现。FAPO在多个基准测试和安全任务中表现优异，超过了传统的GEPA方法。通过在提示优化不足时进行结构调整，FAPO在18个模型-基准比较中赢得了15个，显示出其在通用和安全任务中的先进性。'}}}, {'id': 'https://huggingface.co/papers/2606.19531', 'title': 'ImageWAM: Do World Action Models Really Need Video Generation, or Just Image Editing?', 'url': 'https://huggingface.co/papers/2606.19531', 'abstract': 'Abstract ImageWAM demonstrates that pretrained image editing models can effectively replace video generation in world action models for robot control, achieving better performance with reduced computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World Action Models (WAMs) commonly rely on video generation to bridge visual world modeling and robot control. However, video-based WAMs face three coupled limitations: dense multi-frame future tokens make inference costly, full video prediction spends capacity on action-irrelevant temporal and appearance details, and long-horizon future imagination may introduce errors that mislead action prediction. These issues raise a simple question: Does world action model really need video generation? We propose ImageWAM, a simple WAM framework that repurposes pretrained image editing models for robot action prediction. In contrast to video generation, image editing provides a better-matched prior: it only needs to model a target-frame transformation, focuses on action-relevant current-to-target visual differences, and grounds task instructions to localized visual changes through edit pretraining. In practice, ImageWAM does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context. ImageWAM outperforms standard VLA baselines and matching competitive WAMs without additional policy pretraining across different simulator and real-world experiments. It also reduces FLOPs to 1/6 and latency to 1/4 of video-based WAMs. Attention analysis further shows that editing caches focus on task-relevant change regions, supporting image editing as an effective alternative to video-based world-action modeling.', 'score': 1, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'df612677557af1ac', 'authors': ['Yuyang Zhang', 'Wenyao Zhang', 'Zekun Qi', 'He Zhang', 'Haitao Lin', 'Jingbo Zhang', 'Yao Mu', 'Xiaokang Yang', 'Wenjun Zeng', 'Xin Jin'], 'affiliations': ['Eastern Institute of Technology', 'Shanghai Jiao Tong University', 'Tencent Robotics X', 'Tsinghua University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2606.19531.jpg', 'data': {'categories': ['#inference', '#architecture', '#cv', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От видео к редактированию: более эффективная мировая модель для робототехники', 'desc': 'В статье предложен ImageWAM — новый подход к моделям действий для управления роботами, который заменяет традиционную генерацию видео на переиспользование предобученных моделей редактирования изображений. Авторы показывают, что редактирование изображений обеспечивает лучше подходящий приор для мировой модели, так как фокусируется только на релевантных для действия визуальных изменениях, избегая траты вычислительных ресурсов на предсказание деталей, не влияющих на управление. Предложенный метод использует KV кэши из процесса денойзинга как компактный контекст мира-действия для кондиционирования эксперта действий на основе flow-matching. ImageWAM демонстрирует превосходную производительность по сравнению с видео-ориентированными методами, одновременно снижая вычислительную сложность в 6 раз и уменьшая задержку в 4 раза.'}, 'en': {'title': 'ImageWAM: Revolutionizing Robot Control with Image Editing Models', 'desc': 'ImageWAM introduces a novel approach to world action models (WAMs) by utilizing pretrained image editing models instead of traditional video generation methods for robot control. This method addresses the limitations of video-based WAMs, such as high computational costs and inaccuracies in long-term predictions. By focusing on action-relevant visual changes rather than generating full video sequences, ImageWAM enhances performance while significantly reducing computational resources. The results demonstrate that ImageWAM not only outperforms existing video-based models but also streamlines the inference process, making it a more efficient solution for robot action prediction.'}, 'zh': {'title': '图像编辑模型：机器人控制的新选择', 'desc': 'ImageWAM展示了预训练的图像编辑模型可以有效替代视频生成，用于机器人控制中的世界动作模型，从而实现更好的性能和更低的计算成本。传统的世界动作模型依赖视频生成，但面临多帧未来标记密集、视频预测消耗计算资源以及长时间预测可能引入错误等问题。ImageWAM通过重新利用图像编辑模型，专注于目标帧的转换，强调与动作相关的视觉差异，从而提高了机器人动作预测的准确性。实验结果表明，ImageWAM在不同的模拟器和真实世界实验中，性能优于标准视频生成的世界动作模型，并显著降低了计算复杂度。'}}}, {'id': 'https://huggingface.co/papers/2606.16817', 'title': 'Understanding the Behaviors of Environment-aware Information Retrieval', 'url': 'https://huggingface.co/papers/2606.16817', 'abstract': 'Abstract Large language models can be trained via reinforcement learning to adapt query formulation strategies for different retrievers, with distinct optimal query styles and improved performance through retriever-specific guidance and model scaling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent retrieval-augmented generation (RAG) approaches have demonstrated strong capability in handling complex queries, yet current research overlooks a critical challenge: different retrievers require fundamentally different query formulation strategies for optimal performance. In this work, we present the first systematic analysis of how LLMs can learn to adapt their query formulation strategies for different retrievers via reinforcement learning (RL). Our empirical study reveals that RL effectively teaches an LLM to tailor its queries to specific retriever characteristics. We discover that different retrievers exhibit surprisingly distinct optimal query styles (e.g., descriptive vs. question-like), suggesting strategies learned for one retriever ineffective for another. We further show that performance can be enhanced by incorporating retriever-specific human guidance and by scaling model size. To facilitate learning over multi-retrieval-step trajectories, we introduce a branching-based rollout technique that improves training stability. Our work provides the first empirical evidence and actionable insights for building truly retriever-aware RAG systems. Code and resources are available at https://github.com/LCO-Embedding/Envs-aware-Information-Retrieval.', 'score': 1, 'issue_id': 2457, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '74ebd70fc3caf786', 'authors': ['Ruifeng Yuan', 'Chaohao Yuan', 'David Dai', 'Yu Rong', 'Hong Cheng', 'Hou Pong Chan', 'Chenghao Xiao'], 'affiliations': ['Alibaba DAMO Academy', 'Chinese University of Hong Kong', 'Fudan University', 'Shanghai University of Finance and Economics', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16817.jpg', 'data': {'categories': ['#rag', '#rl', '#training'], 'emoji': '🎯', 'ru': {'title': 'Адаптивная формулировка запросов: обучение LLM для разных поисковых систем', 'desc': "В этой работе исследуется, как большие языковые модели могут обучаться адаптировать стратегии формулирования запросов для разных поисковых систем с помощью обучения с подкреплением. Авторы показали, что разные retriever'ы требуют принципиально различные стили запросов для оптимальной производительности, например описательные или вопросительные форматы. Предложена техника ветвящегося rollout'а, которая улучшает стабильность обучения при работе с многошаговыми траекториями поиска. Исследование демонстрирует, что добавление специфической для retriever'а информации от человека и увеличение размера модели значительно повышают качество retrieval-augmented generation систем."}, 'en': {'title': 'Adapting Queries for Optimal Retrieval Performance', 'desc': 'This paper explores how large language models (LLMs) can be trained using reinforcement learning (RL) to adapt their query formulation strategies for different information retrievers. It highlights that various retrievers have unique optimal query styles, which means a query that works well for one retriever may not be effective for another. The authors demonstrate that RL can effectively teach LLMs to customize their queries based on the characteristics of specific retrievers, leading to improved performance. Additionally, they introduce a new technique to enhance training stability and provide insights for developing more effective retrieval-augmented generation systems.'}, 'zh': {'title': '通过强化学习优化查询策略，提升检索性能', 'desc': '本研究探讨了如何通过强化学习（RL）训练大型语言模型（LLM），使其能够为不同的检索器调整查询策略。我们发现，不同的检索器需要不同的查询形式，以达到最佳性能。通过实证研究，我们证明了RL能够有效地教会LLM根据特定检索器的特征定制查询。此外，我们还提出了一种基于分支的回滚技术，以提高训练的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2606.20545', 'title': 'Current World Models Lack a Persistent State Core', 'url': 'https://huggingface.co/papers/2606.20545', 'abstract': 'Abstract Current world models fail to maintain consistent world states when unobserved, indicating a need for design changes that prioritize physical state stability over appearance fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models are increasingly regarded as a decisive step toward artificial general intelligence, yet modeling the physical world demands more than rendering convincing frames on demand: it requires an internal world state that keeps evolving over time, decoupled from observation, so that objects endure and events run to their conclusions whether or not a camera is watching, much as the moon holds to its orbit when no one is looking. This requirement is a blind spot of existing benchmarks, which reward surface properties such as fidelity, motion, and camera controllability while never asking whether a generated world keeps evolving once it is unobserved. We introduce WRBench, the first systematic diagnostic benchmark that treats camera motion as an intervention on observability and resolves evaluation into a human-calibrated chain that asks whether the camera executes the requested interaction, whether the scene stays continuous and identifiable while in view, and whether a returning target remains consistent with the event that was set in motion. Across 9{,}600 videos from 23 models spanning four control paradigms, one finding proves stubborn: current systems maintain the observed world as a tracking shot, resuming a returning target in the state at which it was abandoned rather than advancing the event while it went unseen. Because this failure recurs across control paradigms, model families, and increments of scale, robust world-state evolution does not follow from cleaner imagery, tighter control, richer geometric priors, or sheer parameter count We therefore argue that the stability of the physical state kernel and the consistency of worldlines under viewpoint intervention should become first-class objectives of world-model design, so that a world model captures how the world will unfold rather than how the next frame appears.', 'score': 0, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '0064f201e8ff1a57', 'authors': ['Jinpeng Lu', 'Dexu Zhu', 'Haoyuan Shi', 'Linghan Cai', 'Guo Tang', 'Yinda Chen', 'Jie Cao', 'Duyu Tang', 'Yi Zhang', 'Yong Dai', 'Xiaozhu Ju'], 'affiliations': ['Beijing Innovation Center of Humanoid Robotics (X-Humanoid)', 'Dresden University of Technology', 'NLPR, Institute of Automation, Chinese Academy of Sciences', 'Peking University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.20545.jpg', 'data': {'categories': ['#video', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Физическое состояние важнее внешнего вида: переосмысление целей моделей мира', 'desc': 'В статье исследуется проблема современных моделей мира, которые не сохраняют консистентность физического состояния, когда объекты находятся вне поля зрения камеры. Авторы предлагают WRBench — первый систематический бенчмарк для диагностики этой проблемы, где камера используется как инструмент для проверки наблюдаемости сцены. Исследование 9600 видео из 23 моделей показывает, что все текущие системы при возврате камеры просто воспроизводят замороженное состояние объектов вместо естественного развития событий, происходивших во время отсутствия наблюдения. Авторы заключают, что стабильность физического состояния и консистентность мировых линий должны стать приоритетом при разработке моделей мира вместо фокуса на качество рендеринга и управляемость камеры.'}, 'en': {'title': 'Prioritizing Stability Over Appearance in World Models', 'desc': 'This paper discusses the limitations of current world models in machine learning, which struggle to maintain consistent states when not being observed. It emphasizes the importance of having a stable internal representation of the physical world that evolves independently of observation, similar to how real-world objects and events exist regardless of whether they are being watched. The authors introduce WRBench, a new benchmark designed to evaluate how well these models maintain continuity and consistency in the world state when the camera is not observing. They argue that improving the stability of the physical state and the consistency of events should be prioritized in the design of world models, rather than just focusing on visual fidelity.'}, 'zh': {'title': '稳定的物理状态是世界模型设计的核心', 'desc': '当前的世界模型在未观察时无法保持一致的世界状态，这表明需要设计变更，优先考虑物理状态的稳定性而非外观的真实感。为了实现人工通用智能，建模物理世界不仅需要生成逼真的画面，还需要一个不断演变的内部世界状态，与观察无关。现有基准测试忽视了这一点，主要关注表面属性，如真实感和运动控制，而没有考虑生成的世界在未观察时是否仍在演变。我们提出了WRBench，这是第一个系统化的诊断基准，旨在评估世界模型在不同控制范式下的表现，强调物理状态的稳定性和一致性应成为世界模型设计的首要目标。'}}}, {'id': 'https://huggingface.co/papers/2606.19830', 'title': 'JAMER: Project-Level Code Framework Dataset and Benchmark on Professional Game Engines', 'url': 'https://huggingface.co/papers/2606.19830', 'abstract': "Abstract Game development frameworks and benchmarks were created using data from game jam competitions to evaluate code generation and project-level programming capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current AI-driven game development has made substantial progress in asset generation, gameplay design, and web-based game coding, yet project-level code engineering on professional game engines remains largely unexplored due to the absence of large-scale datasets and deterministic evaluation methods. We present JamSet and JamBench, the first project-level game code framework dataset and benchmark built on a professional game engine. Our key insight is that Game Jam competitions, community events where developers build complete games under tight time constraints, yield thousands of open-source projects suitable for this purpose. Building on the Godot engine's text-based format and headless execution mode, we design a deterministic verification pipeline from file integrity to runtime behavior collection, distilling 8,133 verified projects from over 240,000 repositories. Of these, 300 manually verified projects form JamBench; the rest constitute JamSet. JamBench defines theme-driven generation and code completion tasks, evaluated through a pipeline combining compilation pass rates, Structural Completeness Score (SCS), and Behavioral Alignment Score (BAS). Evaluation of 9 frontier models reveals a capability cliff as project scale increases, with runtime pass rates dropping from 80.4% on small projects to 5.7% on large ones (Task2a). Code Agents improve compilation rates yet yield no gains in runtime behavioral quality, indicating that the bottleneck lies in architectural design rather than syntactic correctness. Experiments validate JamSet as effective training data. All data and code are publicly available.", 'score': 0, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '54d4e81844481c2e', 'authors': ['Jianwen Sun', 'Chuanhao Li', 'Zizhen Li', 'Yukang Feng', 'Fanrui Zhang', 'Yifei Huang', 'Yu Dai', 'Kaipeng Zhang'], 'affiliations': ['Alaya Studio', 'Nankai University, Tianjin, China', 'Shanghai AI Laboratory, Shanghai, China', 'Shanghai Innovation Institute, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.19830.jpg', 'data': {'categories': ['#games', '#benchmark', '#dataset', '#plp', '#optimization', '#agents', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'От синтаксиса к архитектуре: оценка возможностей нейросетей в разработке полноценных игровых проектов', 'desc': 'Исследователи создали JamSet и JamBench — первый датасет и бенчмарк для оценки генерации кода игр на уровне полных проектов с использованием профессионального игрового движка Godot. Они собрали 8133 верифицированных проектов из Game Jam соревнований и разработали детерминированный конвейер проверки, включающий проверку целостности файлов и сбор данных о поведении во время выполнения. Бенчмарк содержит задачи генерации кода, управляемые тематикой, и оценивается через метрики компиляции, структурной полноты (SCS) и поведенческого выравнивания (BAS). Эксперименты с 9 frontier моделями выявили критический разрыв в производительности: точность выполнения падает с 80,4% на малых проектах до 5,7% на больших, что указывает на проблемы с архитектурным дизайном, а не синтаксической корректностью.'}, 'en': {'title': 'Unlocking Game Development: Evaluating AI in Project-Level Code Generation', 'desc': 'This paper introduces JamSet and JamBench, innovative frameworks and benchmarks for evaluating project-level code generation in game development. Utilizing data from game jam competitions, the authors created a dataset of 8,133 verified game projects, with 300 projects forming the benchmark for testing AI models. The study highlights a significant drop in performance of AI models as project complexity increases, indicating challenges in architectural design rather than just code syntax. The findings suggest that while AI can improve compilation rates, it struggles with maintaining runtime quality in larger projects, emphasizing the need for better model architectures.'}, 'zh': {'title': '游戏开发新基准：提升项目级编程能力', 'desc': '本文介绍了一个新的游戏开发框架和基准，旨在评估代码生成和项目级编程能力。我们创建了JamSet和JamBench，这是基于专业游戏引擎的第一个项目级游戏代码框架数据集和基准。通过分析游戏开发竞赛中产生的开源项目，我们提取了8133个经过验证的项目，并设计了一个确定性的验证流程。实验结果显示，随着项目规模的增加，模型的能力显著下降，表明架构设计是影响运行时行为质量的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2606.19495', 'title': 'LooseControlVideo: Directorial Video Control using Spatial Blocking', 'url': 'https://huggingface.co/papers/2606.19495', 'abstract': 'Abstract LooseControlVideo enables intuitive 3D spatial control in text-to-video generation using sparse oriented 3D boxes as proxies, achieving superior trajectory accuracy and occlusion handling compared to existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Precise 3D spatial orchestration in text-to-video generation remains a significant challenge, particularly for multi-object scenes where semantic layout and temporal dynamics are often entangled. While existing depth-conditioned models achieve good structural fidelity, they necessitate dense, frame-accurate guidance that is labor-intensive to author for dynamic events involving deformable objects. We present LooseControlVideo, a framework that enables intuitive and expressive control by using sparse, oriented 3D boxes as a "blocking" proxy. This allows users to author high-level layout and trajectory while leveraging a video generative model to generate realistic occlusions, dynamics and interactions. We achieve this by fine-tuning a Wan 2.2 backbone on a video dataset annotated with DNOCS, a novel encoding for 3D size, orientation and depth-ordered occlusions. Furthermore, our method allows for localized refinement, such as adjusting a jump trajectory or adding an interaction, with minimal disruption to the global scene context. Extensive evaluations on the nuScenes, HO-3D, and BEHAVE benchmarks demonstrate that LooseControlVideo significantly outperforms existing 2D-box and flow-based baselines. Our findings indicate a 1.2x to 3x improvement in Trajectory Error; 2x improvement in Rigid Motion Consistency; and a 1.5x to 2x increase in Occlusion Accuracy over current state-of-the-art layout-conditioned models, demonstrating that oriented 3D primitives provide good geometric prior for complex, multi-agent video authoring.', 'score': 0, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'e2115271c2bd872b', 'authors': ['Shariq Farooq Bhat', 'Niloy J. Mitra', 'Kalyan Sunkavalli'], 'affiliations': ['Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.19495.jpg', 'data': {'categories': ['#3d', '#video', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Интуитивный контроль видео через 3D-боксы вместо плотных аннотаций', 'desc': 'LooseControlVideo — это система для управления генерацией видео из текста с помощью разреженных ориентированных 3D-боксов, которые служат прокси для пространственного контроля. Метод основан на файн-тюнинге видеогенеративной модели на датасете с аннотациями DNOCS, кодирующими размер, ориентацию и окклюзии объектов. Подход позволяет пользователям интуитивно контролировать расположение и траектории объектов, при этом модель автоматически генерирует реалистичные взаимодействия и перекрытия. Экспериментальные результаты показывают значительное улучшение по метрикам точности траекторий, консистентности движений и корректности обработки окклюзий по сравнению с существующими методами.'}, 'en': {'title': 'Intuitive 3D Control for Dynamic Video Generation', 'desc': 'LooseControlVideo is a novel framework for text-to-video generation that enhances 3D spatial control using sparse oriented 3D boxes. This approach allows users to intuitively manage the layout and movement of multiple objects in a scene while effectively handling occlusions and interactions. By fine-tuning a video generative model with a new encoding for 3D properties, the method achieves significant improvements in trajectory accuracy and motion consistency. Evaluations show that LooseControlVideo outperforms existing models, making it easier to create dynamic and realistic video content.'}, 'zh': {'title': 'LooseControlVideo：直观的3D视频生成控制', 'desc': 'LooseControlVideo 是一种新框架，旨在通过稀疏的定向 3D 盒子来实现文本到视频生成中的直观 3D 空间控制。与现有方法相比，它在轨迹准确性和遮挡处理方面表现更优。该方法允许用户在高层次上设计布局和轨迹，同时利用视频生成模型生成真实的遮挡和动态交互。通过在带有 DNOCS 注释的视频数据集上微调 Wan 2.2 主干网络，LooseControlVideo 显著提高了轨迹误差、刚体运动一致性和遮挡准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.15527', 'title': 'Selective Synergistic Learning for Video Object-Centric Learning', 'url': 'https://huggingface.co/papers/2606.15527', 'abstract': 'Abstract Selective Synergistic Learning (SSync) addresses limitations in video object-centric learning by selectively distilling reliable cues through pseudo-labeling and transitive merging to improve object decomposition quality and robustness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Typical video object-centric learning (VOCL) approaches employ slot-based frameworks that rely on reconstruction-driven encoder-decoder architectures, where learning is mediated by two spatial maps: attention maps from the encoder and object maps from the decoder. As these two distinct maps exhibit different properties, a recent dense alignment strategy attempted to reconcile this discrepancy by enforcing agreement across all spatio-temporal patches via contrastive learning. However, this indiscriminate alignment inadvertently propagates the inherent weaknesses of each module, such as noisy encoder predictions and blurred decoder boundaries. Moreover, computing dense similarities across all pairs incurs a computational cost quadratic in the total number of spatio-temporal patches, severely limiting scalability. Motivated by this, we propose Selective Synergistic Learning (SSync). Instead of exhaustive patch-to-patch alignment, SSync prevents error propagation by selectively distilling only the most reliable cues: leveraging the encoder strictly for boundary refinement and the decoder for interior denoising. This is realized via a pseudo-labeling with linear complexity, eliminating the need for quadratic spatial comparisons. Also, to prevent the reinforcement of architectural biases like slot redundancy, we introduce a transitive pseudo-label merging that consolidates overlapping slots based on spatio-temporal activation consistency. Extensive studies demonstrate that SSync improves decomposition quality and serves as a versatile, plug-and-play module while also exhibiting exceptional robustness to slot configurations. Code is available at github.com/wjun0830/SSync.', 'score': 0, 'issue_id': 2457, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '40085d359cc76493', 'authors': ['WonJun Moon', 'Jae-Pil Heo'], 'affiliations': ['KAIST', 'Sungkyunkwan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15527.jpg', 'data': {'categories': ['#training', '#architecture', '#video'], 'emoji': '🎬', 'ru': {'title': 'Избирательное синергетическое обучение для надежного разложения объектов в видео', 'desc': 'В работе предлагается метод Selective Synergistic Learning (SSync) для улучшения обучения объектно-ориентированного представления видео. Вместо полного выравнивания всех пространственно-временных патчей, метод избирательно использует надежные сигналы: энкодер применяется для уточнения границ объектов, а декодер — для удаления шума во внутренней части. Подход использует псевдо-разметку с линейной сложностью вычислений, что значительно снижает вычислительные затраты по сравнению с квадратичными методами. Кроме того, введено трансформирующееся слияние псевдо-метак для консолидации перекрывающихся слотов на основе согласованности пространственно-временной активации.'}, 'en': {'title': 'Enhancing Video Object Learning with Selective Synergistic Cues', 'desc': 'Selective Synergistic Learning (SSync) enhances video object-centric learning by focusing on the most reliable cues through a process called pseudo-labeling and transitive merging. Unlike traditional methods that align all spatial patches, SSync selectively uses the encoder for refining boundaries and the decoder for reducing noise, which improves the quality of object decomposition. This approach reduces computational complexity from quadratic to linear, making it more scalable. The method also addresses architectural biases by merging overlapping slots based on their spatio-temporal consistency, leading to better robustness and versatility in various configurations.'}, 'zh': {'title': '选择性协同学习：提升视频物体分解的质量与鲁棒性', 'desc': '选择性协同学习（SSync）解决了视频物体中心学习中的一些局限性，通过伪标签和传递合并选择性地提取可靠线索，从而提高物体分解的质量和鲁棒性。传统的视频物体中心学习方法依赖于重建驱动的编码器-解码器架构，使用两个空间图：编码器的注意力图和解码器的物体图。SSync通过选择性提取最可靠的线索，避免了错误传播，利用编码器进行边界细化，解码器进行内部去噪。研究表明，SSync在分解质量上有显著提升，并且作为一个通用的模块展现出卓越的鲁棒性。'}}}];
