    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

            const isDarkMode = body.classList.contains('dark-theme');

                const titleSign = document.getElementById('doomgrad-icon');

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.13062', 'title': 'Edit-Compass & EditReward-Compass: A Unified Benchmark for Image Editing and Reward Modeling', 'url': 'https://huggingface.co/papers/2605.13062', 'abstract': 'Abstract Recent image editing models have achieved remarkable progress in instruction following, multimodal understanding, and complex visual editing. However, existing benchmarks often fail to faithfully reflect human judgment, especially for strong frontier models, due to limited task difficulty and coarse-grained evaluation protocols. In parallel, reward models have become increasingly important for RL-based image editing optimization, yet existing reward model benchmarks still rely on unrealistic evaluation settings that deviate from practical RL scenarios. These limitations hinder reliable assessment of both image editing models and reward models. To address these challenges, we introduce Edit-Compass and EditReward-Compass, a unified evaluation suite for image editing and reward modeling. Edit-Compass contains 2,388 carefully annotated instances spanning six progressively challenging task categories, covering capabilities such as world knowledge reasoning, visual reasoning, and multi-image editing. Beyond broad task coverage, Edit-Compass adopts a fine-grained multidimensional evaluation framework based on structured reasoning and carefully designed scoring rubrics. In parallel, EditReward-Compass contains 2,251 preference pairs that simulate realistic reward modeling scenarios during RL optimization.  AI-generated summary Recent image editing models have achieved remarkable progress in instruction following, multimodal understanding, and complex visual editing. However, existing benchmarks often fail to faithfully reflect human judgment, especially for strong frontier models, due to limited task difficulty and coarse-grained evaluation protocols. In parallel, reward models have become increasingly important for RL-based image editing optimization, yet existing reward model benchmarks still rely on unrealistic evaluation settings that deviate from practical RL scenarios. These limitations hinder reliable assessment of both image editing models and reward models. To address these challenges, we introduce Edit-Compass and EditReward-Compass, a unified evaluation suite for image editing and reward modeling. Edit-Compass contains 2,388 carefully annotated instances spanning six progressively challenging task categories, covering capabilities such as world knowledge reasoning, visual reasoning, and multi-image editing. Beyond broad task coverage, Edit-Compass adopts a fine-grained multidimensional evaluation framework based on structured reasoning and carefully designed scoring rubrics. In parallel, EditReward-Compass contains 2,251 preference pairs that simulate realistic reward modeling scenarios during RL optimization.', 'score': 18, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '832056324fd0747a', 'authors': ['Xuehai Bai', 'Yang Shi', 'Yi-Fan Zhang', 'Xuanyu Zhu', 'Yuran Wang', 'Yifan Dai', 'Xinyu Liu', 'Yiyan Ji', 'Xiaoling Gu', 'Yuanxing Zhang'], 'affiliations': ['CASIA', 'HDU', 'Kling Team', 'PKU'], 'pdf_title_img': 'assets/pdf/title_img/2605.13062.jpg', 'data': {'categories': ['#cv', '#rl', '#multimodal', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Компасы оценки: точные бенчмарки для редактирования изображений и reward моделей', 'desc': 'Работа представляет новый набор бенчмарков для оценки моделей редактирования изображений и reward моделей. Существующие бенчмарки недостаточно отражают человеческие суждения из-за низкой сложности задач и грубых протоколов оценки, что особенно актуально для продвинутых моделей. Авторы предлагают Edit-Compass с 2388 аннотированными примерами, охватывающими шесть категорий возрастающей сложности, включая рассуждения о знаниях мира и многоизображенческое редактирование. EditReward-Compass дополняет набор 2251 парой предпочтений, моделирующей реалистичные сценарии обучения с подкреплением при оптимизации моделей редактирования.'}, 'en': {'title': 'Enhancing Image Editing Evaluation with Edit-Compass and EditReward-Compass', 'desc': 'This paper presents Edit-Compass and EditReward-Compass, two new evaluation frameworks designed to improve the assessment of image editing models and reward models in reinforcement learning (RL). Edit-Compass includes 2,388 annotated instances across six challenging task categories, focusing on skills like world knowledge reasoning and visual reasoning. It employs a fine-grained evaluation approach with structured reasoning and detailed scoring rubrics to better reflect human judgment. EditReward-Compass complements this by providing 2,251 preference pairs that create realistic scenarios for evaluating reward models during RL optimization.'}, 'zh': {'title': '统一评估图像编辑与奖励建模的解决方案', 'desc': '最近的图像编辑模型在遵循指令、多模态理解和复杂视觉编辑方面取得了显著进展。然而，现有的基准测试往往无法真实反映人类的判断，尤其是对于强大的前沿模型，因为任务难度有限且评估协议粗糙。同时，奖励模型在基于强化学习的图像编辑优化中变得越来越重要，但现有的奖励模型基准仍依赖于不切实际的评估设置，偏离了实际的强化学习场景。为了解决这些挑战，我们引入了Edit-Compass和EditReward-Compass，这是一个统一的图像编辑和奖励建模评估套件。'}}}, {'id': 'https://huggingface.co/papers/2605.12913', 'title': 'Revisiting DAgger in the Era of LLM-Agents', 'url': 'https://huggingface.co/papers/2605.12913', 'abstract': "Abstract DAgger-style training for long-horizon language model agents combines supervised fine-tuning and reinforcement learning benefits by using teacher-student policy interpolation with on-policy interactions.  AI-generated summary Long-horizon LM agents learn from multi-turn interaction, where a single early mistake can alter the subsequent state distribution and derail the whole trajectory. Existing recipes fall short in complementary ways: supervised fine-tuning provides dense teacher supervision but suffers from covariate shift because it is trained on off-policy teacher trajectories; while reinforcement learning with verifiable rewards avoids this off-policy mismatch by learning from on-policy rollouts but with only sparse outcome feedback. We address this dilemma by revisiting Dataset Aggregation (DAgger) for multi-turn LM agents: the algorithm collects trajectories through a turn-level interpolation of student and teacher policies, and the student is then trained on these trajectories using supervised labels provided by the teacher. By directly interacting with environments, we expose the model to realistic states likely to be encountered during deployment, thereby effectively mitigating covariate shift. Besides, since the student is learned by mimicking the teacher's behavior, it receives rich feedback during learning. To demonstrate DAgger enjoys the benefits of both worlds, we tested the algorithm to train a software-engineering agent with 4B- and 8B-scale student models. On SWE-bench Verified, our DAgger-style training improves over the strongest post-training baseline by +3.9 points at 4B and +3.6 points at 8B. The resulting 4B agent reaches 27.3%, outperforming representative published 8B SWE-agent systems, while the 8B agent achieves 29.8%, surpassing SWE-Gym-32B and coming within 5 points of stronger 32B-scale agents. Together with consistent gains on the held-out SWE-Gym split, these results suggest the effectiveness of DAgger for modern long-horizon LM agents.", 'score': 4, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '0ac6b6eeda71452b', 'authors': ['Changhao Li', 'Rushi Qiang', 'Jiawei Huang', 'Chenxiao Gao', 'Chao Zhang', 'Niao He', 'Bo Dai'], 'affiliations': ['ETH Zurich', 'Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.12913.jpg', 'data': {'categories': ['#training', '#plp', '#benchmark', '#agents', '#reasoning', '#optimization'], 'emoji': '🎓', 'ru': {'title': 'DAgger для долгосрочных задач: синтез обучения у учителя и взаимодействия со средой', 'desc': 'В работе предлагается DAgger-подход для обучения языковых моделей, выполняющих долгосрочные задачи. Метод сочетает преимущества supervised fine-tuning и reinforcement learning через интерполяцию политик студента и учителя на каждом шаге диалога. Алгоритм собирает траектории взаимодействия со средой, что помогает избежать covariate shift и обеспечивает модель реалистичными состояниями. При тестировании на задаче разработки ПО модели размером 4B и 8B показали значительное улучшение: 4B агент достигнул 27.3%, превзойдя опубликованные системы на 8B параметрах.'}, 'en': {'title': 'DAgger: Bridging Supervised Learning and Reinforcement Learning for Language Models', 'desc': 'This paper presents a new training method for long-horizon language model (LM) agents that combines supervised fine-tuning and reinforcement learning using a technique called DAgger. The approach addresses the issue of covariate shift by allowing the student model to learn from both teacher-generated and its own on-policy interactions, which helps it adapt to realistic scenarios. By interpolating between the teacher and student policies, the model receives rich feedback and improves its performance on multi-turn tasks. The results show that this DAgger-style training significantly enhances the capabilities of software-engineering agents, outperforming existing models in various benchmarks.'}, 'zh': {'title': 'DAgger：长时间跨度语言模型的最佳训练方案', 'desc': '本文提出了一种针对长时间跨度语言模型代理的DAgger风格训练方法，结合了监督微调和强化学习的优点。该方法通过教师-学生策略插值和在线交互来解决现有方法的不足，避免了因离线教师轨迹导致的协变量偏移。通过直接与环境交互，模型能够接触到在实际部署中可能遇到的真实状态，从而有效减轻协变量偏移问题。此外，学生模型通过模仿教师的行为获得丰富的反馈，提升了学习效果。'}}}, {'id': 'https://huggingface.co/papers/2605.11363', 'title': 'PresentAgent-2: Towards Generalist Multimodal Presentation Agents', 'url': 'https://huggingface.co/papers/2605.11363', 'abstract': 'Abstract PresentAgent-2 is an agentic framework that generates presentation videos from user queries by conducting research, creating multimodal slides, and producing interactive content across single, discussion, and interaction modes.  AI-generated summary Presentation generation is moving beyond static slide creation toward end-to-end presentation video generation with research grounding, multimodal media, and interactive delivery. We introduce PresentAgent-2, an agentic framework for generating presentation videos from user queries. Given an open-ended user query and a selected presentation mode, PresentAgent-2 first summarizes the query into a focused topic and performs deep research over presentation-friendly sources to collect multimodal resources, including relevant text, images, GIFs, and videos. It then constructs presentation slides, generates mode-specific scripts, and composes slides, audio, and dynamic media into a complete presentation video. PresentAgent-2 supports three independent presentation modes within a unified framework: Single Presentation, which generates a single-speaker narrated presentation video; Discussion, which creates a multi-speaker presentation with structured speaker roles, such as for asking guiding questions, explaining concepts, clarifying details, and summarizing key points; and Interaction, which independently supports answering audience questions grounded in the generated slides, scripts, retrieved evidence, and presentation context. To evaluate these capabilities, we build a multimodal presentation benchmark covering single presentation, discussion, and interaction scenarios, with task-specific evaluation criteria for content quality, media relevance, dynamic media use, dialogue naturalness, and interaction grounding. Overall, PresentAgent-2 extends presentation generation from document-dependent slide creation to query-driven, research-grounded presentation video generation with multimodal media, dialogue, and interaction. Code: https://github.com/AIGeeksGroup/PresentAgent-2. Website: https://aigeeksgroup.github.io/PresentAgent-2.', 'score': 3, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd17e1d3694108cee', 'authors': ['Wei Wu', 'Ziyang Xu', 'Zeyu Zhang', 'Yang Zhao', 'Hao Tang'], 'affiliations': ['La Trobe University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11363.jpg', 'data': {'categories': ['#open_source', '#video', '#multimodal', '#benchmark', '#agents'], 'emoji': '🎬', 'ru': {'title': 'От запроса к видеопрезентации: исследование, создание слайдов и интерактивное взаимодействие', 'desc': 'PresentAgent-2 — это агентский фреймворк, который преобразует пользовательские запросы в полноценные презентационные видео, проводя исследование источников и собирая мультимодальные ресурсы. Система создаёт слайды, генерирует скрипты и синтезирует аудио для трёх режимов: однодикторная презентация, дискуссия с несколькими спикерами и интерактивный режим ответов на вопросы аудитории. Фреймворк использует глубокий поиск информации для сбора текста, изображений, GIF-анимаций и видео, которые автоматически интегрируются в динамический видеоконтент. Разработана специализированная бенчмарк-база для оценки качества контента, релевантности медиа и естественности диалога в каждом из режимов презентации.'}, 'en': {'title': 'Transforming Queries into Engaging Presentation Videos', 'desc': 'PresentAgent-2 is an advanced framework designed to create presentation videos based on user queries. It begins by summarizing the query and conducting in-depth research to gather various multimedia resources like text, images, and videos. The framework supports three distinct presentation modes: Single Presentation, Discussion, and Interaction, each tailored for different presentation styles and audience engagement. By integrating these elements, PresentAgent-2 transforms traditional slide creation into a dynamic, interactive video generation process that enhances the overall presentation experience.'}, 'zh': {'title': '智能演示视频生成的未来', 'desc': 'PresentAgent-2 是一个智能框架，可以根据用户的查询生成演示视频。它通过对相关资料进行深入研究，收集多模态资源（如文本、图片、GIF 和视频），并构建演示幻灯片。该框架支持三种演示模式：单人演示、讨论和互动，能够生成不同风格的演示内容。通过建立多模态演示基准，PresentAgent-2 提供了高质量的内容和自然的对话交互。'}}}, {'id': 'https://huggingface.co/papers/2605.12964', 'title': 'Asymmetric Flow Models', 'url': 'https://huggingface.co/papers/2605.12964', 'abstract': "Abstract Asymmetric Flow Modeling enables efficient high-dimensional flow-based generation by restricting noise prediction to low-rank subspaces while maintaining full-dimensional data prediction, achieving superior performance in pixel-space text-to-image generation through effective fine-tuning from latent models.  AI-generated summary Flow-based generation in high-dimensional spaces is difficult because velocity prediction requires modeling high-dimensional noise, even when data has strong low-rank structure. We present Asymmetric Flow Modeling (AsymFlow), a rank-asymmetric velocity parameterization that restricts noise prediction to a low-rank subspace while keeping data prediction full-dimensional. From this asymmetric prediction, AsymFlow analytically recovers the full-dimensional velocity without changing the network architecture or training/sampling procedures. On ImageNet 256times256, AsymFlow achieves a leading 1.57 FID, outperforming prior DiT/JiT-like pixel diffusion models by a large margin. AsymFlow also provides the first-ever route for finetuning pretrained latent flow models into pixel-space models: aligning the low-rank pixel subspace to the latent space gives a seamless initialization that preserves the latent model's high-level semantics and structure, so finetuning mainly improves low-level mismatches rather than relearning pixel generation. We show that the pixel AsymFlow model finetuned from FLUX.2 klein 9B establishes a new state of the art for pixel-space text-to-image generation, beating its latent base on HPSv3, DPG-Bench, and GenEval while qualitatively showing substantially improved visual realism.", 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'f761eff420bf84b3', 'authors': ['Hansheng Chen', 'Jan Ackermann', 'Minseo Kim', 'Gordon Wetzstein', 'Leonidas Guibas'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12964.jpg', 'data': {'categories': ['#cv', '#architecture', '#training', '#diffusion', '#transfer_learning', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Асимметричное моделирование потоков: от латентного к пиксельному пространству', 'desc': 'В статье представлен метод Asymmetric Flow Modeling (AsymFlow), который улучшает генерацию на основе потоков в высокоразмерных пространствах путём асимметричной параметризации скорости. Ключевая идея заключается в ограничении предсказания шума низкоранговым подпространством при сохранении полномерного предсказания данных, что позволяет аналитически восстановить полнопространственную скорость без изменения архитектуры сети. Метод достигает выдающихся результатов на ImageNet 256×256 с FID 1.57, превосходя предыдущие диффузионные модели пиксельного пространства. Кроме того, AsymFlow впервые предоставляет способ адаптации предобученных латентных моделей потоков в пиксельное пространство путём выравнивания низкорангового подпространства пикселей с латентным пространством.'}, 'en': {'title': 'Revolutionizing Text-to-Image Generation with Asymmetric Flow Modeling', 'desc': 'Asymmetric Flow Modeling (AsymFlow) is a novel approach in machine learning that enhances flow-based generation in high-dimensional spaces by focusing on low-rank subspaces for noise prediction. This method allows for efficient modeling of complex data while maintaining the ability to predict full-dimensional outputs. AsymFlow achieves superior performance in pixel-space text-to-image generation by fine-tuning pretrained latent models, ensuring that high-level semantics are preserved during the process. The results demonstrate a significant improvement in visual realism and a new state of the art in performance metrics like FID on benchmark datasets.'}, 'zh': {'title': '不对称流建模：高效的高维生成新方法', 'desc': '不对称流建模（Asymmetric Flow Modeling）通过将噪声预测限制在低秩子空间，同时保持全维数据预测，实现了高维流生成的高效性。这种方法在像素空间的文本到图像生成中表现出色，尤其是在对预训练潜在模型进行有效微调时。AsymFlow采用了一种秩不对称的速度参数化，能够在不改变网络架构或训练/采样过程的情况下，分析性地恢复全维速度。实验结果表明，AsymFlow在ImageNet数据集上取得了领先的1.57 FID，显著超越了之前的像素扩散模型。'}}}, {'id': 'https://huggingface.co/papers/2605.11550', 'title': 'The DAWN of World-Action Interactive Models', 'url': 'https://huggingface.co/papers/2605.11550', 'abstract': 'Abstract World-Action Interactive Models (WAIMs) jointly model scene evolution and actions through recursive refinement, enabling effective long-horizon planning in autonomous driving scenarios.  AI-generated summary A plausible scene evolution depends on the maneuver being considered, while a good maneuver depends on how the scene may evolve. Existing World Action Models (WAMs) largely miss this reciprocity, treating world prediction and action generation as either isolated parallel branches or rigid predict-then-plan pipelines. We formalize this perspective as World-Action Interactive Models (WAIMs), and instantiate it in autonomous driving with DAWN (Denoising Actions and World iNteractive model), a simple yet strong latent generative baseline. DAWN operates in a compact semantic latent space and couples a World Predictor with a World-Conditioned Action Denoiser: the predicted world hypothesis conditions action denoising, while the denoised action hypothesis is fed back to update the world prediction, so that both are recursively refined during inference. Rather than eliminating test-time world evolution altogether or rolling out the full future in pixel space, DAWN performs a short explicit latent rollout that is sufficient to support long-horizon trajectory generation in complex interactive scenes. Experiments show that DAWN achieves strong planning performance and favorable safety-related results across multiple autonomous driving benchmarks. More broadly, our results suggest that interactive world-action generation is a principled path toward truly actionable world models.', 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'c677562d46670597', 'authors': ['Hongbo Lu', 'Liang Yao', 'Chenghao He', 'Haoyu Wang', 'Xiang Gu', 'Xianfei Li', 'Wenlong Liao', 'Tao He', 'Pai Peng'], 'affiliations': ['COWARobot Co. Ltd', 'Hohai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11550.jpg', 'data': {'categories': ['#architecture', '#training', '#robotics', '#benchmark', '#agents', '#diffusion', '#reasoning'], 'emoji': '🚗', 'ru': {'title': 'Взаимное уточнение предсказаний мира и действий для планирования в автономном вождении', 'desc': 'В работе представлены World-Action Interactive Models (WAIMs) — модели, которые совместно моделируют эволюцию сцены и действия агента через итеративное уточнение. Авторы показывают, что предсказание динамики мира и генерация действений тесно связаны: будущее развитие сцены зависит от выбранного маневра, а качество маневра зависит от того, как может развиваться сцена. Они предлагают DAWN — модель, работающая в компактном семантическом латентном пространстве, которая рекурсивно уточняет предсказания мира и действий на основе друг друга во время вывода. Экспериментальные результаты на бенчмарках автономного вождения демонстрируют эффективность подхода для долгоафоризмного планирования в сложных интерактивных сценах.'}, 'en': {'title': 'Revolutionizing Autonomous Driving with Interactive World-Action Models', 'desc': 'The paper introduces World-Action Interactive Models (WAIMs), which enhance long-term planning in autonomous driving by integrating scene evolution and action generation. Unlike traditional models that treat these processes separately, WAIMs allow for a reciprocal relationship where the predicted world influences action decisions and vice versa. The proposed DAWN model operates in a compact latent space, using a World Predictor and a World-Conditioned Action Denoiser to iteratively refine both world predictions and action plans. Experimental results demonstrate that DAWN excels in planning performance and safety across various autonomous driving scenarios, highlighting the importance of interactive world-action generation.'}, 'zh': {'title': '交互式世界-动作生成：自动驾驶的新路径', 'desc': '世界-动作交互模型（WAIMs）通过递归细化共同建模场景演变和动作，从而在自动驾驶场景中实现有效的长时间规划。好的场景演变依赖于所考虑的操作，而好的操作又依赖于场景的演变。现有的世界动作模型（WAMs）往往忽视这种相互关系，将世界预测和动作生成视为孤立的平行分支或僵化的预测-再规划管道。我们提出了世界-动作交互模型（WAIMs），并在自动驾驶中实现了DAWN（去噪动作和世界交互模型），通过在紧凑的语义潜在空间中操作，结合世界预测器和世界条件动作去噪器，实现了强大的规划性能和安全性。'}}}, {'id': 'https://huggingface.co/papers/2605.08518', 'title': 'Results and Retrospective Analysis of the CODS 2025 AssetOpsBench Challenge', 'url': 'https://huggingface.co/papers/2605.08518', 'abstract': 'Abstract  Competition retrospectives are useful when they explain what a leaderboard measured, how hidden evaluation changed conclusions, and which design patterns were rewarded. We revisit the CODS 2025  challenge, a privacy-aware Codabench competition on industrial multi-agent orchestration built on . We combine final rank sheets, a 300-submission server log, 149-team registrations, best-submission exports, the organizer winners report, the companion  system paper, and verified planning-track source trees. Five results stand out. First, the public planning leaderboard saturates at 72.73\\%, and richer prompts do not improve that peak. Second, hidden evaluation changes the story: public and private scores correlate moderately in planning (r{=}0.69) but negatively in execution (r{=}{-}0.13), with several 45.45\\% public execution systems reaching 63.64\\% on the hidden set. Third, the  term is numerically almost inert in the official composite -- combined on a 0--1 scale with 0--100 percentage scores, it contributes at most 0.05 points per track, and rescaling would swap the top two teams. Fourth, the competition is operationally account-based but substantively team-based: 149 registered teams reduce to 24 with non-zero public scores and 11 fully ranked, while 52.3\\% of deduplicated registrations list multiple usernames. Fifth, successful execution methods mostly improve guardrails -- response selection, contamination cleanup, fallback, and context control -- rather than novel agent architectures. These findings identify which behaviors the evaluation rewarded, and motivate scale-aware composites, skill-level diagnostics, and versioned artifact release.', 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '2f9bcdd762ede06a', 'authors': ['Dhaval Patel', 'Chathurangi Shyalika', 'Suryanarayana Reddy Yarrabothula', 'Ling Yue', 'Shuxin Lin', 'Nianjun Zhou', 'James Rayfield'], 'affiliations': ['Artificial Intelligence Institute at University of South Carolina', 'IBM', 'Indian Institute of Technology, Bhilai', 'Rensselaer Polytechnic Institute', 'Steel Authority of India Limited'], 'pdf_title_img': 'assets/pdf/title_img/2605.08518.jpg', 'data': {'categories': ['#dataset', '#survey', '#benchmark', '#agents'], 'emoji': '🏆', 'ru': {'title': 'Как скрытая оценка переписывает итоги соревнования по многоагентным системам', 'desc': 'В статье анализируются результаты соревнования CODS 2025 по многоагентной оркестрации с приватностью, где исследователи изучили 300 логов отправок и данные 149 команд. Авторы обнаружили, что публичная лидербордная таблица достигает насыщения в 72.73%, а скрытая оценка значительно меняет выводы, особенно для задач исполнения, где корреляция между публичными и приватными оценками отрицательна. Исследование показало, что успешные методы исполнения главным образом улучшают механизмы безопасности и контроля контекста, а не создают новые архитектуры агентов. На основе полученных результатов авторы предлагают улучшить методологию оценки, внедрив масштабируемые композиты и диагностику по уровням умений.'}, 'en': {'title': 'Evaluating Success: Insights from CODS 2025 Challenge', 'desc': 'This paper analyzes the results of the CODS 2025 challenge, focusing on the effectiveness of various evaluation metrics in a multi-agent orchestration competition. It highlights that the public leaderboard reached a saturation point, indicating that richer prompts did not enhance performance. The study reveals discrepancies between public and hidden evaluation scores, suggesting that some systems performed better in private assessments. Additionally, it emphasizes that successful strategies were more about refining existing methods rather than introducing new architectures, pointing to the importance of evaluation design in competitions.'}, 'zh': {'title': '揭示评估奖励的行为模式', 'desc': '本文回顾了CODS 2025挑战赛的结果，分析了排行榜的测量标准和隐藏评估对结论的影响。研究发现，公共规划排行榜的最高分为72.73%，而更丰富的提示并未提高这一分数。隐藏评估显示，公共和私有分数在规划中有中等相关性，但在执行中则呈负相关。成功的执行方法主要改善了响应选择、污染清理、后备和上下文控制等方面，而不是新颖的代理架构。'}}}, {'id': 'https://huggingface.co/papers/2605.13037', 'title': 'MAP: A Map-then-Act Paradigm for Long-Horizon Interactive Agent Reasoning', 'url': 'https://huggingface.co/papers/2605.13037', 'abstract': 'Abstract Interactive LLM agents suffer from delayed environmental perception and epistemic bottlenecks due to reactive understanding during execution, which the proposed Map-then-Act Paradigm (MAP) addresses by acquiring environmental knowledge beforehand through global exploration, task-specific mapping, and knowledge-augmented execution.  AI-generated summary Current interactive LLM agents rely on goal-conditioned stepwise planning, where environmental understanding is acquired reactively during execution rather than established beforehand. This temporal inversion leads to Delayed Environmental Perception: agents must infer environmental constraints through trial-and-error, resulting in an Epistemic Bottleneck that traps them in inefficient failure cycles. Inspired by human affordance perception and cognitive map theory, we propose the Map-then-Act Paradigm (MAP), a plug-and-play framework that shifts environment understanding before execution. MAP consists of three stages: (1) Global Exploration, acquiring environment-general priors; (2) Task-Specific Mapping, constructing a structured cognitive map; and (3) Knowledge-Augmented Execution, solving tasks grounded on the map. Experiments show consistent gains across benchmarks and LLMs. On ARC-AGI-3, MAP enables frontier models to surpass near-zero baseline performance in 22 of 25 game environments. We further introduce MAP-2K, a dataset of map-then-act trajectories, and show that training on it outperforms expert execution traces, suggesting that understanding environments is more fundamental than imitation.', 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'c4d4a66e58380196', 'authors': ['Yuxin Liu', 'Ziang Ye', 'Yueqing Sun', 'Mingye Zhu', 'Jinwei Xiao', 'Zhuowen Han', 'Qi GU', 'Xunliang Cai', 'Lei Zhang'], 'affiliations': ['Institution of Automation, Chinese Academy of Sciences', 'Meituan', 'Tianjin University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.13037.jpg', 'data': {'categories': ['#reasoning', '#games'], 'emoji': '🗺️', 'ru': {'title': 'Сначала карта, потом действие: предварительное исследование вместо реактивного обучения', 'desc': 'В статье предложена парадигма Map-then-Act (MAP) для улучшения работы интерактивных LLM-агентов. Основная идея заключается в смещении понимания окружения с этапа исполнения задачи на этап предварительного исследования. Парадигма состоит из трёх стадий: глобальное исследование среды, построение когнитивной карты для конкретной задачи и исполнение с опорой на полученные знания. Эксперименты демонстрируют значительное улучшение производительности моделей на различных бенчмарках, включая ARC-AGI-3.'}, 'en': {'title': 'Map-then-Act: Enhancing LLMs with Proactive Environmental Understanding', 'desc': 'The paper introduces the Map-then-Act Paradigm (MAP) to improve the performance of interactive LLM agents by addressing their delayed environmental perception and epistemic bottlenecks. Instead of relying on reactive understanding during task execution, MAP emphasizes acquiring environmental knowledge through a structured approach that includes global exploration and task-specific mapping. This proactive strategy allows agents to build a cognitive map of their environment before attempting tasks, leading to more efficient problem-solving. Experimental results demonstrate that MAP significantly enhances the performance of LLMs across various benchmarks, indicating that a solid understanding of the environment is crucial for effective task execution.'}, 'zh': {'title': '地图-再行动：提升环境理解的智能框架', 'desc': '本论文提出了一种新的方法，称为地图-再行动范式（MAP），旨在解决交互式大型语言模型（LLM）在执行过程中对环境的延迟感知和知识瓶颈问题。MAP通过在执行之前进行全球探索、任务特定映射和知识增强执行，帮助模型提前获取环境知识。该方法分为三个阶段：全球探索获取环境的通用先验，任务特定映射构建结构化的认知地图，以及基于地图的知识增强执行。实验结果表明，MAP在多个基准测试中表现出显著的性能提升，证明了环境理解在任务执行中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.12997', 'title': 'Frequency Bias and OOD Generalization in Neural Operators under a Variable-Coefficient Wave Equation', 'url': 'https://huggingface.co/papers/2605.12997', 'abstract': 'Abstract Neural operators for PDE solving show different generalization behaviors under distribution shifts, with Fourier Neural Operators and Deep Operator Networks exhibiting distinct responses to smoothness and frequency variations.  AI-generated summary Neural operators learn to map initial conditions to the terminal solution of partial differential equations (PDEs), providing a surrogate for the full operator mapping. This enables rapid prediction across different input configurations. While recent neural operator architectures have demonstrated strong performance on diverse PDE tasks, their behavior under structured distribution shifts remains insufficiently understood. To investigate this, we study operator learning in a wave propagation setting governed by a one-dimensional variable-coefficient wave equation, using two representative architectures, the Fourier Neural Operator (FNO) and the Deep Operator Network (DeepONet). To examine their generalization under distribution shifts, we consider structured out-of-distribution (OOD) settings that independently vary input frequency and coefficient smoothness. The results show that under smoothness shifts, both models maintain stable performance, with FNO achieving lower error. In contrast, under frequency shifts, FNO exhibits a sharp increase in error under unseen high-frequency inputs, whereas DeepONet shows milder degradation despite higher overall error. Our analysis reveals that these differences arise from how each architecture represents and responds to variations in frequency structure. Together, these findings highlight a fundamental gap between strong in-distribution performance and generalization under distribution shifts in operator learning, underscoring the role of architectural representation bias in developing more reliable neural operators for physics-based PDE simulations beyond the training distribution.', 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'a7bf7eb24554a8a0', 'authors': ['Runlong Xie', 'An Luo'], 'affiliations': ['Independent Researcher', 'School of Statistics, University of Minnesota, MN, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.12997.jpg', 'data': {'categories': ['#math', '#science', '#architecture'], 'emoji': '📡', 'ru': {'title': 'Архитектура нейронного оператора определяет его устойчивость к распределительным сдвигам', 'desc': 'В статье исследуется поведение нейронных операторов при решении дифференциальных уравнений в условиях распределительных сдвигов. Авторы сравнивают Fourier Neural Operator и Deep Operator Network на примере волнового уравнения с переменными коэффициентами, варьируя частоту входных данных и гладкость коэффициентов. Результаты показывают, что FNO лучше справляется со сдвигами гладкости, но катастрофически теряет качество при появлении высоких частот вне обучающего распределения, тогда как DeepONet деградирует более плавно. Исследование демонстрирует критическую роль архитектурных особенностей в обобщении нейронных операторов на данные, не виданные во время обучения.'}, 'en': {'title': 'Understanding Neural Operators: Performance Under Distribution Shifts', 'desc': 'This paper investigates how different neural operator architectures, specifically Fourier Neural Operators (FNO) and Deep Operator Networks (DeepONet), perform when faced with distribution shifts in solving partial differential equations (PDEs). The study focuses on their ability to generalize under changes in input frequency and coefficient smoothness, using a one-dimensional wave equation as a test case. Results indicate that while both models perform well under smoothness shifts, FNO struggles with high-frequency inputs, leading to a significant increase in error. This research highlights the importance of understanding architectural biases in neural operators to improve their reliability in real-world physics simulations.'}, 'zh': {'title': '神经算子的泛化能力与分布变化的关系', 'desc': '神经算子用于求解偏微分方程（PDE）时，在分布变化下表现出不同的泛化行为。傅里叶神经算子和深度算子网络在平滑性和频率变化的响应上存在显著差异。研究表明，在平滑性变化下，两种模型的性能稳定，而傅里叶神经算子的误差更低；而在频率变化下，傅里叶神经算子在未见的高频输入下误差急剧增加，而深度算子网络的降级较温和。此研究揭示了算子学习中强大的分布内性能与在分布变化下的泛化能力之间的基本差距。'}}}, {'id': 'https://huggingface.co/papers/2605.12684', 'title': 'Visual Aesthetic Benchmark: Can Frontier Models Judge Beauty?', 'url': 'https://huggingface.co/papers/2605.12684', 'abstract': "Abstract Current multimodal models struggle to match human expert aesthetic judgment in comparative image selection tasks, as demonstrated by the Visual Aesthetic Benchmark which reveals significant performance gaps and shows that fine-tuning on expert examples can improve accuracy.  AI-generated summary Multimodal large language models (MLLMs) are now routinely deployed for visual understanding, generation, and curation. A substantial fraction of these applications require an explicit aesthetic judgment. Most existing solutions reduce this judgment to predicting a scalar score for a single image. We first ask whether such scores faithfully capture comparative preference: in a controlled study with eight expert annotators, score-derived rankings align poorly with the same annotators' direct comparisons, while direct ranking yields substantially higher inter-annotator agreement on best- and worst-image labels. Motivated by this finding, we introduce the Visual Aesthetic Benchmark (VAB), which casts aesthetic evaluation as comparative selection over candidate sets with matched subject matter. VAB contains 400 tasks and 1,195 images across fine art, photography, and illustration, with labels derived from the consensus of 10 independent expert judges per task. Evaluating 20 frontier MLLMs and six dedicated visual-quality reward models, we find that the strongest system identifies both the best and the worst image correctly across three random permutations of the candidate order in only 26.5% of tasks, far below the 68.9% achieved by human experts. Fine-tuning a 35B-parameter model on 2,000 expert examples brings its accuracy close to that of a 397B-parameter open-weight model, suggesting that the comparative signal in VAB is transferable. Together, these results expose a clear and measurable gap between current multimodal models and expert aesthetic judgment, and VAB provides the first set-based, expert-grounded testbed on which that gap can be tracked and closed.", 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'b2511125d9e2c1c0', 'authors': ['Yichen Feng', 'Yuetai Li', 'Chunjiang Liu', 'Yuanyuan Chen', 'Fengqing Jiang', 'Yue Huang', 'Hang Hua', 'Zhengqing Yuan', 'Kaiyuan Zheng', 'Luyao Niu', 'Bhaskar Ramasubramanian', 'Basel Alomair', 'Xiangliang Zhang', 'Misha Sra', 'Zichen Chen', 'Radha Poovendran', 'Zhangchen Xu'], 'affiliations': ['Bake AI', 'Carnegie Mellon University', 'King Abdulaziz City for Science and Technology', 'MIT-IBM Watson AI Lab', 'Stanford University', 'University of California, Santa Barbara', 'University of Notre Dame', 'University of Washington', 'Western Washington University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12684.jpg', 'data': {'categories': ['#cv', '#multimodal', '#training', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Сравнительное суждение об эстетике: преодолевая разрыв между моделями и экспертами', 'desc': 'В статье исследуется способность мультимодальных больших языковых моделей выносить эстетические суждения при выборе лучшего изображения из набора кандидатов. Авторы показали, что традиционные подходы, основанные на предсказании скалярной оценки для отдельного изображения, плохо согласуются с прямым сравнением эксперта, и предложили новый бенчмарк Visual Aesthetic Benchmark с 400 задачами на сравнение изображений. Оценка 20 современных мультимодальных моделей выявила значительный разрыв между их производительностью (26.5%) и экспертными суждениями (68.9%), хотя файн-тюнинг на примерах экспертов позволяет существенно улучшить результаты. Исследование демонстрирует, что сигнал о сравнительных предпочтениях в бенчмарке хорошо переносится на другие модели.'}, 'en': {'title': 'Bridging the Gap in AI Aesthetic Judgment', 'desc': 'This paper addresses the limitations of current multimodal models in making aesthetic judgments in image selection tasks. It highlights that existing models often predict a single score for images, which does not accurately reflect human preferences. The authors introduce the Visual Aesthetic Benchmark (VAB), a new framework for evaluating aesthetic quality through comparative selection of images, which shows better alignment with expert opinions. The findings reveal a significant performance gap between AI models and human experts, emphasizing the need for improved training methods to enhance aesthetic evaluation capabilities in AI.'}, 'zh': {'title': '缩小多模态模型与专家审美判断的差距', 'desc': '当前的多模态模型在比较图像选择任务中难以匹配人类专家的审美判断。我们通过视觉审美基准（VAB）展示了这一点，该基准将审美评估视为对候选集的比较选择。研究表明，现有模型在识别最佳和最差图像方面的准确性远低于人类专家。通过对模型进行微调，可以显著提高其准确性，缩小与专家判断之间的差距。'}}}, {'id': 'https://huggingface.co/papers/2605.11733', 'title': 'Position: LLM Inference Should Be Evaluated as Energy-to-Token Production', 'url': 'https://huggingface.co/papers/2605.11733', 'abstract': 'Abstract LLM inference should be evaluated as energy-to-token production under constraints of compute, power, cooling, and operational efficiency, requiring new metrics beyond traditional accuracy and latency measures.  AI-generated summary LLM inference is still evaluated mainly as a model or software problem: accuracy, latency, throughput, and hardware utilization. This is incomplete. At deployment scale, the relevant output is a quality-conditioned token produced under joint constraints from effective compute, delivered data-center power, cooling capacity, PUE, and utilization.   We argue that the ML community should treat inference as energy-to-token production. We formalize this view with a dimensionally consistent Token Production Function in which token rate is bounded by both compute-per-token and energy-per-token ceilings. Listed API prices vary by over an order of magnitude across providers, but we use price dispersion only as directional motivation, not as causal evidence of marginal cost. The core physical question is instead: under fixed quality and service targets, when does the binding constraint move from theoretical peak compute toward delivered power, cooling, and operational efficiency?   Under this framing, system optimizations -- latent KV-cache compression, sparse or heavily compressed attention, quantization, routing, and difficulty-adaptive reasoning -- are not merely local engineering tricks. They are energy-to-token levers because they reduce FLOPs/token, joules/token, memory traffic, or utilization losses under fixed (q^{*},s^{*}). We therefore call for inference papers and benchmarks to report Joules/token, active binding constraint, PUE-adjusted delivered power, and utilization-adjusted token output alongside accuracy and latency.', 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '8e0f5347a4c3267a', 'authors': ['Xiang Liu', 'Shimiao Yuan', 'Zhenheng Tang', 'Peijie Dong', 'Kaiyong Zhao', 'Qiang Wang', 'Bo Li', 'Xiaowen Chu'], 'affiliations': ['Guangzhou HKUST Fok Ying Tung Research Institute', 'HITSZ', 'HKUST', 'HKUST(GZ)', 'UCAS', 'XGRIDS'], 'pdf_title_img': 'assets/pdf/title_img/2605.11733.jpg', 'data': {'categories': ['#inference', '#optimization', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'От вычислений к энергии: новая парадигма оценки инференса больших моделей', 'desc': 'Статья переосмысливает эвалуацию инференса больших языковых моделей, предлагая рассматривать её как задачу производства токенов на единицу энергии с учётом физических ограничений центра обработки данных. Авторы формализуют эту идею через функцию производства токенов, которая показывает, что скорость генерации токенов ограничена одновременно вычислительной мощностью на токен и энергопотреблением на токен. Они аргументируют, что различные технические оптимизации (компрессия KV-кеша, разреженное внимание, квантизация) следует рассматривать не как локальные инженерные трюки, а как рычаги для улучшения энергетической эффективности. Авторы призывают переориентировать метрики оценки инференса: наряду с точностью и латентностью необходимо репортировать энергопотребление на токен, активные узкие места системы и откорректированные на PUE показатели утилизации.'}, 'en': {'title': 'Transforming Inference: From Accuracy to Energy Efficiency', 'desc': 'This paper proposes a new way to evaluate large language model (LLM) inference by focusing on energy-to-token production rather than just traditional metrics like accuracy and latency. It emphasizes that at scale, the efficiency of producing tokens is constrained by compute resources, power availability, and cooling capacity. The authors introduce a Token Production Function that considers both compute and energy limits, suggesting that optimizations in model architecture should be viewed as ways to improve energy efficiency. They advocate for the ML community to adopt new benchmarks that include energy metrics, which will provide a more comprehensive understanding of LLM performance in real-world applications.'}, 'zh': {'title': '将推理视为能量到令牌的生产', 'desc': '这篇论文提出了在机器学习推理中，应该将其视为在计算、功率、冷却和操作效率的约束下进行的能量到令牌的生产。传统的评估方法主要关注准确性和延迟，但在实际部署中，输出的质量受到多种因素的影响。作者建议使用一个一致的令牌生产函数来描述这种关系，并强调在固定质量和服务目标下，约束条件的转变。最后，论文呼吁在推理研究中报告每个令牌的能量消耗，以及其他相关的性能指标。'}}}, {'id': 'https://huggingface.co/papers/2605.08737', 'title': 'The Extrapolation Cliff in On-Policy Distillation of Near-Deterministic Structured Outputs', 'url': 'https://huggingface.co/papers/2605.08737', 'abstract': "Abstract On-policy distillation with reward extrapolation exhibits a safety threshold beyond which structured output tasks lose format preservation, with empirical validation showing performance parity at reduced parameter count when operating below this threshold.  AI-generated summary On-policy distillation (OPD) is widely used for LLM post-training. When pushed with a reward-extrapolation coefficient lambda > 1, the student can lift past the teacher in domain, but past a threshold lambda* the same step violates the output contract on structured-output tasks. In a single-position Bernoulli reduction, we derive a closed-form base-relative clip-safety threshold lambda*(p,b,c) determined by three measurable quantities: the teacher modal probability, the warm-start mass, and the importance-sampling clip strength. Above lambda*, the extrapolated fixed point exits the clip-safe region, changing training from format-preserving to format-collapsing. We extend the rule to calibrated K-ary listwise JSON tasks where a single binding equivalence class dominates the output contract and SFT retains parse headroom. On Amazon Fashion, three pre-registered tests--a fine-grid cliff interval, a budget-extension test, and a small-clip cross-prediction--fall within their locked prediction windows, with the small-clip value matching the closed-form prediction below grid resolution. Operating just below lambda*, ListOPD brings a 1.7B Qwen3 student to in-domain parity with an 8B-SFT baseline at one-fifth the parameters. The gain is driven primarily by format adherence: NDCG@1 on parsed outputs remains flat across lambda, while parse validity sharply changes at the predicted boundary. The cliff diagnostic is rubric-independent, whereas the parity claim uses a Gemini-graded rubric and inherits that evaluator's exposure.", 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'f8b364ecc7cda484', 'authors': ['Xin Li', 'Hao Jiang', 'Annan Wang', 'Yichi Zhang', 'Chau Yuen'], 'affiliations': ['Nanyang Technological University, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.08737.jpg', 'data': {'categories': ['#alignment', '#small_models', '#rlhf', '#training', '#optimization'], 'emoji': '⚠️', 'ru': {'title': 'Безопасный порог дистилляции: баланс между производительностью и сохранением формата', 'desc': 'Работа изучает дистилляцию моделей с экстраполяцией вознаграждения (on-policy distillation), показывая, что существует критический порог lambda*, за которым модель-ученик начинает нарушать формат структурированного вывода. Авторы математически вывели замкнутую форму этого порога для задач с бинарным выбором и расширили её на многовариантные JSON-задачи. Экспериментально подтверждено, что при работе ниже критического порога небольшая модель (1.7B параметров) достигает качества большой модели (8B параметров), сохраняя корректность формата при уменьшении параметров в пять раз. Ключевой вывод: безопасность дистилляции определяется модальной вероятностью учителя, инициализацией и методом обрезания важности выборки.'}, 'en': {'title': 'Balancing Performance and Format in On-Policy Distillation', 'desc': 'This paper discusses on-policy distillation (OPD) in machine learning, particularly focusing on how reward extrapolation affects structured output tasks. It identifies a safety threshold, lambda*, beyond which the performance of the student model deteriorates, leading to format collapse instead of preservation. The authors derive a closed-form expression for lambda* based on key factors like teacher modal probability and importance-sampling clip strength. Empirical results show that operating just below this threshold allows a smaller student model to achieve performance parity with a larger teacher model while maintaining output format integrity.'}, 'zh': {'title': '在线策略蒸馏的安全阈值与格式保持', 'desc': '本文探讨了在奖励外推下的在线策略蒸馏（OPD）如何影响结构化输出任务的格式保持。当外推系数超过某个阈值时，学生模型的输出可能会违反格式约定，导致训练效果下降。我们推导出一个闭合形式的安全阈值，该阈值由教师模型的模态概率、热启动质量和重要性采样剪切强度等三个可测量量决定。在亚马逊时尚数据集上进行的实验表明，接近安全阈值的操作可以使较小参数的学生模型在特定任务上与大型教师模型的表现相当。'}}}, {'id': 'https://huggingface.co/papers/2605.13831', 'title': 'Training Long-Context Vision-Language Models Effectively with Generalization Beyond 128K Context', 'url': 'https://huggingface.co/papers/2605.13831', 'abstract': "Abstract Long-context continued pre-training enhances vision-language models' ability to handle extended documents while maintaining performance across diverse contexts through strategic data mixture design.  AI-generated summary Long-context modeling is becoming a core capability of modern large vision-language models (LVLMs), enabling sustained context management across long-document understanding, video analysis, and multi-turn tool use in agentic workflows. Yet practical training recipes remain insufficiently explored, particularly for designing and balancing long-context data mixtures. In this work, we present a systematic study of long-context continued pre-training for LVLMs, extending a 7B model from 32K to 128K context with extensive ablations on long-document data. We first show that long-document VQA is substantially more effective than OCR transcription. Building on this observation, our ablations further yield three key findings: i) for sequence-length distribution, balanced data outperforms target-length-focused data (e.g., 128K), suggesting that long-context ability requires generalizable key-information retrieval across various lengths and positions; ii) retrieval remains the primary bottleneck, favoring retrieval-heavy mixtures with modest reasoning data for task diversity; and iii) pure long-document VQA largely preserves short-context capabilities, suggesting that instruction-formatted long data reduces the need for short-data mixing. Based on these findings, we introduce MMProLong, obtained by long-context continued pre-training from Qwen2.5-VL-7B with only a 5B-token budget. MMProLong improves long-document VQA scores by 7.1% and maintains strong performance at 256K and 512K contexts beyond its 128K training window, without additional training. It further generalizes to webpage-based multimodal needle retrieval, long-context vision-text compression, and long-video understanding without task-specific supervision. Overall, our study establishes a practical LongPT recipe and an empirical foundation for advancing long-context vision-language models.", 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '549149b48f01777f', 'authors': ['Zhaowei Wang', 'Lishu Luo', 'Haodong Duan', 'Weiwei Liu', 'Sijin Wu', 'Ji Luo', 'Shen Yan', 'Shuai Peng', 'Sihang Yuan', 'Chaoyi Huang', 'Yi Lin', 'Yangqiu Song'], 'affiliations': ['ByteDance', 'HKUST'], 'pdf_title_img': 'assets/pdf/title_img/2605.13831.jpg', 'data': {'categories': ['#video', '#multimodal', '#training', '#benchmark', '#long_context', '#optimization'], 'emoji': '📄', 'ru': {'title': 'Сбалансированное дообучение для долгоконтекстного понимания документов в мультимодальных моделях', 'desc': 'В работе исследуется долгоконтекстное дообучение большых мультимодальных моделей (LVLM), которое позволяет им обрабатывать длинные документы и видео, сохраняя производительность на других задачах. Авторы провели систематическое исследование эффективности различных смесей данных при расширении контекста с 32K до 128K токенов, обнаружив, что сбалансированное распределение длин последовательностей и задачи на базе документов работают лучше, чем узкоспециализированные данные. На основе полученных выводов создана модель MMProLong, которая требует только 5B токенов дообучения и демонстрирует улучшение на 7.1% на задачах с длинными документами, одновременно сохраняя коротко-контекстные способности. Представленный подход обобщается на различные задачи долгоконтекстного понимания без дополнительной настройки модели.'}, 'en': {'title': 'Enhancing Vision-Language Models with Long-Context Pre-Training', 'desc': "This paper explores how long-context continued pre-training can improve vision-language models (LVLMs) for better handling of extended documents. The authors demonstrate that using balanced data mixtures during training enhances the model's ability to retrieve key information across various lengths and positions. They introduce a new model, MMProLong, which shows significant improvements in long-document visual question answering (VQA) and maintains strong performance even with longer contexts. The findings suggest that effective long-context modeling can be achieved without sacrificing short-context capabilities, paving the way for more versatile LVLM applications."}, 'zh': {'title': '长上下文预训练提升视觉-语言模型能力', 'desc': '本文研究了长上下文的持续预训练如何增强视觉-语言模型（LVLMs）处理长文档的能力。通过系统的实验，我们发现平衡的数据分布在长文档视觉问答（VQA）中表现优于专注于目标长度的数据。我们的研究还表明，检索能力是主要瓶颈，建议使用重检索的数据混合以提高任务多样性。此外，长文档VQA在保持短上下文能力的同时，减少了对短数据混合的需求。'}}}, {'id': 'https://huggingface.co/papers/2605.12925', 'title': 'AgentLens: Revealing The Lucky Pass Problem in SWE-Agent Evaluation', 'url': 'https://huggingface.co/papers/2605.12925', 'abstract': 'Abstract Software engineering agents are evaluated using a process-level framework that reveals differences between effective and ineffective approaches, identifying patterns like lucky passes and providing quality scoring for improved assessment.  AI-generated summary Evaluation of software engineering (SWE) agents is dominated by a binary signal: whether the final patch passes the tests. This outcome-only view treats a principled solution and a chaotic trial-and-error process as equivalent. We show that this equivalence is empirically false. We evaluate 2,614 OpenHands trajectories from eight model backends on 60 SWE-bench Verified tasks. Of these, 47 have enough passing trajectories to construct task-level process references, yielding a 1,815-trajectory evaluation subset. Among passing trajectories in this subset, 10.7% exhibit behavior we call a Lucky Pass: regression cycles, blind retries, missing verification, or temporally disordered exploration, implementation, and verification.   We introduce AgentLens, a framework for process-level assessment of SWE-agent trajectories, and release AgentLens-Bench, a dataset of 1,815 trajectories annotated with quality scores, waste signals, divergence points, and 47 task-level Prefix Tree Acceptor (PTA) references. AgentLens builds PTA references by merging multiple passing solutions for the same task, and uses a context-sensitive intent labeler to assign actions to Exploration, Implementation, Verification, or Orchestration based on trajectory history rather than tool identity alone.   On AgentLens-Bench, the quality score separates passing trajectories into Lucky, Solid, and Ideal tiers and further decomposes Lucky Passes into five recurring mechanisms. Across the eight model backends, Lucky rates range from 0.5% to 23.2%, and some models move by as many as five rank positions when ranked by quality score instead of pass rate. We release the anonymized project repository, including the AgentLens-Bench dataset and AgentLens SDK, at https://github.com/microsoft/code-agent-state-trajectories/.', 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'ad5c23e7ad6407c7', 'authors': ['Priyam Sahoo', 'Gaurav Mittal', 'Xiaomin Li', 'Shengjie Ma', 'Benjamin Steenhoek', 'Pingping Lin', 'Yu Hu'], 'affiliations': ['Microsoft', 'University of Illinois, Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.12925.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#dataset', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Оценка качества процесса вместо только результата в агентах программной инженерии', 'desc': 'В статье предложена система процессного уровня оценки агентов в области инженерии ПО, которая показывает, что простое прохождение тестов не отражает качество решения. Авторы выявили явление «Lucky Pass» — когда агент случайно проходит тесты через регрессивные циклы и слепые повторы вместо систематического подхода. Они разработали AgentLens — фреймворк с использованием Prefix Tree Acceptor для детальной оценки траекторий агентов и создали аннотированный датасет с метриками качества, сигналами потерь и точками расхождения. Результаты показывают, что различные модели значительно меняют свой рейтинг при оценке по качеству вместо простого подсчета пройденных тестов.'}, 'en': {'title': 'Evaluating Software Engineering Agents Beyond Pass Rates', 'desc': "This paper presents a new framework called AgentLens for evaluating software engineering (SWE) agents based on their process-level performance rather than just the binary outcome of passing tests. It identifies different patterns of behavior in agent trajectories, such as 'Lucky Passes', which are instances where agents succeed through non-optimal methods like blind retries or disordered actions. The study analyzes 2,614 trajectories and introduces a dataset, AgentLens-Bench, that includes quality scores and detailed annotations for better assessment of agent performance. By using this framework, the authors demonstrate that the quality of agent behavior can significantly differ from mere pass rates, revealing deeper insights into the effectiveness of SWE agents."}, 'zh': {'title': '提升软件工程代理评估的准确性', 'desc': '本文提出了一种新的评估软件工程代理的方法，称为AgentLens，旨在通过过程级框架分析代理的行为。研究表明，传统的仅依赖最终补丁是否通过测试的评估方式是不够的，因为它忽视了过程中的重要细节。通过分析2614个OpenHands轨迹，发现10.7%的成功轨迹存在所谓的“幸运通过”现象，这些现象可能导致错误的评估。AgentLens-Bench数据集提供了详细的质量评分和行为模式，有助于更准确地评估软件工程代理的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.13050', 'title': 'Context Training with Active Information Seeking', 'url': 'https://huggingface.co/papers/2605.13050', 'abstract': "Abstract Context optimization methods enhanced with active information seeking via search and browser tools achieve superior performance across diverse domains while maintaining data efficiency and robustness.  AI-generated summary Most existing large language models (LLMs) are expensive to adapt after deployment, especially when a task requires newly produced information or niche domain knowledge. Recent work has shown that, by manipulating and optimizing their context, LLMs can be tailored to downstream tasks without updating their weights. However, most existing methods remain closed-loop, relying solely on the model's intrinsic knowledge. In this paper, we equip these context optimizers with Wikipedia search and browser tools for active information seeking. We show that naively adding these tools to a standard sequential context optimization pipeline can actually degrade performance compared to baselines. However, when paired with a search-based training procedure that maintains and prunes multiple candidate contexts, active information seeking delivers consistent and substantial gains. We demonstrate these improvements across diverse domains, including low-resource translation (Flores+), health scenarios (HealthBench), and reasoning-heavy tasks (LiveCodeBench and Humanity's Last Exam). Furthermore, our method proves to be data-efficient, robust across different hyperparameters, and capable of generating effective textual contexts that generalize well across different models.", 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '7db49c79b1ca2d03', 'authors': ['Zeyu Huang', 'Adhiguna Kuncoro', 'Qixuan Feng', 'Jiajun Shen', 'Lucio Dery', 'Arthur Szlam', "Marc'Aurelio Ranzato"], 'affiliations': ['Google DeepMind', 'The University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2605.13050.jpg', 'data': {'categories': ['#reasoning', '#translation', '#optimization', '#low_resource'], 'emoji': '🔍', 'ru': {'title': 'Контекст в поисках знаний: активный поиск информации для адаптации языковых моделей', 'desc': 'В статье предлагается метод оптимизации контекста для больших языковых моделей, дополненный инструментами активного поиска информации через Википедию и браузер. Авторы показали, что простое добавление этих инструментов может снизить производительность, но при использовании специальной процедуры обучения на основе поиска с отбором нескольких кандидатных контекстов достигаются значительные улучшения. Метод демонстрирует стабильный прогресс на разнообразных задачах: переводе с ограниченными данными, медицинских сценариях и логических задачах. Предложенный подход является экономным по данным, устойчивым к изменению гиперпараметров и хорошо обобщается между различными моделями.'}, 'en': {'title': 'Enhancing LLMs with Active Information Seeking for Better Context Optimization', 'desc': "This paper presents a novel approach to enhance context optimization methods for large language models (LLMs) by integrating active information seeking through search and browser tools. The authors highlight that traditional methods often rely on the model's existing knowledge, which can limit performance, especially in niche domains. By implementing a search-based training procedure that manages multiple candidate contexts, they demonstrate significant improvements in various tasks, including translation and reasoning. The proposed method is shown to be data-efficient and robust, allowing for effective context generation that generalizes well across different models."}, 'zh': {'title': '主动信息获取提升上下文优化性能', 'desc': '本文提出了一种通过主动信息获取来增强上下文优化方法的技术。这种方法结合了维基百科搜索和浏览工具，使得大型语言模型（LLMs）能够在不更新权重的情况下，适应新的任务和领域知识。研究表明，简单地将这些工具添加到标准的上下文优化流程中可能会导致性能下降，但通过与基于搜索的训练程序配合使用，可以显著提高性能。我们的实验结果显示，该方法在低资源翻译、健康场景和推理密集型任务等多个领域均表现出色，且具有数据效率和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.13724', 'title': 'AnyFlow: Any-Step Video Diffusion Model with On-Policy Flow Map Distillation', 'url': 'https://huggingface.co/papers/2605.13724', 'abstract': 'Abstract AnyFlow introduces a novel any-step video diffusion distillation framework that improves upon consistency distillation by optimizing full ODE sampling trajectories through flow-map transition learning and backward simulation techniques.  AI-generated summary Few-step video generation has been significantly advanced by consistency distillation. However, the performance of consistency-distilled models often degrades as more sampling steps are allocated at test time, limiting their effectiveness for any-step video diffusion. This limitation arises because consistency distillation replaces the original probability-flow ODE trajectory with a consistency-sampling trajectory, weakening the desirable test-time scaling behavior of ODE sampling. To address this limitation, we introduce AnyFlow, the first any-step video diffusion distillation framework based on flow maps. Instead of distilling a model for only a few fixed sampling steps, AnyFlow optimizes the full ODE sampling trajectory. To this end, we shift the distillation target from endpoint consistency mapping (z_{t}rightarrow z_{0}) to flow-map transition learning (z_{t}rightarrow z_{r}) over arbitrary time intervals. We further propose Flow Map Backward Simulation, which decomposes a full Euler rollout into shortcut flow-map transitions, enabling efficient on-policy distillation that reduces test-time errors (i.e., discretization error in few-step sampling and exposure bias in causal generation). Extensive experiments across both bidirectional and causal architectures, at scales ranging from 1.3B to 14B parameters, demonstrate that AnyFlow achieves performance matches or surpasses consistency-based counterparts in the few-step regime, while scaling with sampling step budgets.', 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '2c762411e08f1c5f', 'authors': ['Yuchao Gu', 'Guian Fang', 'Yuxin Jiang', 'Weijia Mao', 'Song Han', 'Han Cai', 'Mike Zheng Shou'], 'affiliations': ['MIT', 'NVIDIA', 'Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.13724.jpg', 'data': {'categories': ['#video', '#architecture', '#training', '#diffusion', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Гибкая дистилляция видео-диффузии для произвольного числа шагов семплирования', 'desc': 'AnyFlow представляет новую систему дистилляции видео-диффузии, которая улучшает консистентную дистилляцию путём оптимизации полных траекторий ODE-семплирования. Вместо того чтобы заменять исходную траекторию вероятностного потока ODE на траекторию консистентного семплирования, метод переходит от отображения конечной точки к обучению переходов потоковых отображений на произвольных временных интервалах. Предложенная техника Flow Map Backward Simulation разбивает полный Euler rollout на переходы потоковых отображений, что позволяет эффективно выполнять дистилляцию и снижать ошибки как в режиме малого числа шагов, так и в каузальной генерации. Экспериментальные результаты показывают, что AnyFlow превосходит или сравним с методами на основе консистентности при масштабировании по количеству шагов семплирования.'}, 'en': {'title': 'AnyFlow: Revolutionizing Video Generation with Flexible Sampling Trajectories', 'desc': 'AnyFlow is a new framework for video generation that enhances the process of consistency distillation by focusing on optimizing the entire trajectory of sampling using flow-map techniques. Traditional consistency distillation struggles when more sampling steps are used, leading to poorer performance, especially in video diffusion tasks. AnyFlow addresses this by shifting the focus from just endpoint consistency to learning transitions over any time interval, allowing for more flexible and effective video generation. The framework also introduces a method called Flow Map Backward Simulation, which helps reduce errors during testing, resulting in improved performance across various model sizes and architectures.'}, 'zh': {'title': 'AnyFlow：优化任意步视频生成的创新框架', 'desc': 'AnyFlow是一种新颖的任意步视频扩散蒸馏框架，旨在通过流图过渡学习和反向模拟技术优化完整的ODE采样轨迹，从而改进一致性蒸馏。传统的一致性蒸馏在测试时分配更多采样步骤时，模型性能往往会下降，限制了其在任意步视频扩散中的有效性。为了解决这一问题，AnyFlow将蒸馏目标从端点一致性映射转变为流图过渡学习，优化了完整的ODE采样轨迹。通过广泛的实验，AnyFlow在多个架构上表现出色，能够在少步采样的情况下与一致性基础的模型相匹配或超越，同时在采样步骤预算上具有良好的扩展性。'}}}, {'id': 'https://huggingface.co/papers/2605.12770', 'title': 'WriteSAE: Sparse Autoencoders for Recurrent State', 'url': 'https://huggingface.co/papers/2605.12770', 'abstract': 'Abstract WriteSAE enables sparse autoencoder decomposition and editing of matrix cache writes in state-space and hybrid recurrent language models, achieving superior performance in token-level interventions compared to existing methods.  AI-generated summary We introduce WriteSAE, the first sparse autoencoder that decomposes and edits the matrix cache write of state-space and hybrid recurrent language models, where residual SAEs cannot reach. Existing SAEs read residual streams, but Gated DeltaNet, Mamba-2, and RWKV-7 write to a d_k times d_v cache through rank-1 updates k_t v_t^top that no vector atom can replace. WriteSAE factors each decoder atom into the native write shape, exposes a closed form for the per-token logit shift, and trains under matched Frobenius norm so atoms swap one cache slot at a time. Atom substitution beats matched-norm ablation on 92.4% of n=4{,}851 firings at Qwen3.5-0.8B L9 H4, the 87-atom population test holds at 89.8%, the closed form predicts measured effects at R^2=0.98, and Mamba-2-370M substitutes at 88.1% over 2,500 firings. Sustained three-position installs at 3times lift midrank target-in-continuation from 33.3% to 100% under greedy decoding, the first behavioral install at the matrix-recurrent write site.', 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '7177621db1d93f76', 'authors': ['Jack Young'], 'affiliations': ['Indiana University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12770.jpg', 'data': {'categories': ['#small_models', '#interpretability', '#training', '#architecture'], 'emoji': '🔍', 'ru': {'title': 'Разреженные автоэнкодеры для декодирования и редактирования матричных кэшей в рекуррентных моделях', 'desc': 'Работа представляет WriteSAE — первый разреженный автоэнкодер, который может разложить и редактировать операции записи в кэш матриц в моделях на основе state-space и гибридных рекуррентных архитектурах. В отличие от существующих SAE, которые работают с остаточными потоками, WriteSAE фактористирует каждый атом декодера в нативную форму записи и обеспечивает замкнутую форму для сдвига логитов на токене. Метод достигает высокой точности интервенций — замена атомов превосходит аблацию на 92.4% случаев, а закрытая форма предсказывает эффекты с R²=0.98. Это первый практический метод прямого редактирования на уровне матричной записи, позволяющий добиться значительного улучшения поведения модели при генерации.'}, 'en': {'title': 'Revolutionizing Token Interventions with WriteSAE', 'desc': 'The paper introduces WriteSAE, a novel sparse autoencoder designed for decomposing and editing matrix cache writes in state-space and hybrid recurrent language models. Unlike traditional sparse autoencoders that rely on residual streams, WriteSAE directly manipulates the matrix cache, allowing for more effective token-level interventions. The method demonstrates superior performance, achieving a high success rate in atom substitution and accurate predictions of logit shifts. Overall, WriteSAE represents a significant advancement in the manipulation of language model outputs, enhancing the efficiency of interventions in complex models.'}, 'zh': {'title': 'WriteSAE：提升语言模型的稀疏自编码器', 'desc': '本文介绍了WriteSAE，这是一种稀疏自编码器，能够对状态空间和混合递归语言模型中的矩阵缓存写入进行分解和编辑。与现有方法相比，WriteSAE在令牌级干预中表现出更优的性能。它通过将每个解码器原子分解为原生写入形状，并在匹配的Frobenius范数下进行训练，从而实现了原子的逐个替换。实验结果显示，WriteSAE在多个测试中超越了传统方法，证明了其在语言模型中的有效性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
