    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.27377', 'title': 'DanceOPD: On-Policy Generative Field Distillation', 'url': 'https://huggingface.co/papers/2606.27377', 'abstract': 'Abstract A novel on-policy generative field distillation framework called DanceOPD is proposed to unify text-to-image generation, local editing, and global editing capabilities in flow-matching models through capability-specific routing and velocity-based training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern image generation demands a single model that unifies diverse capabilities, including text-to-image (T2I), local editing, and global editing. However, these capabilities are rarely naturally aligned and often conflict. For instance, editing tends to degrade T2I performance, while global and local editing interfere with each other. Consequently, effectively composing these capabilities has become a central challenge for image generation model training. To tackle this, we introduce DanceOPD, an on-policy generative field distillation framework for flow-matching models that routes each sample to one capability field, queries one low-noise student-induced state, and trains with a simple velocity MSE objective. With each capability source defined as a velocity field over the shared flow state space, the student learns from fields queried on its own rollout states to compose expert capabilities. This formulation also absorbs operator-defined fields such as classifier-free guidance. Comprehensive experiments on T2I, editing, realism-field absorption, and CFG absorption show that our approach improves multi-capability composition, strengthening target capabilities while preserving anchor generation quality. We believe this work establishes a practical route for generative field distillation in flow-matching models.', 'score': 64, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '84f437fdb7b3927e', 'authors': ['Wei Zhou', 'Xiongwei Zhu', 'Zelin Xu', 'Bo Dong', 'Lixue Gong', 'Yongyuan Liang', 'Meng Chu', 'Leigang Qu', 'Lingdong Kong', 'Wei Liu', 'Tat-Seng Chua'], 'affiliations': ['ByteDance Seed', 'HKUST', 'NUS', 'UMD'], 'pdf_title_img': 'assets/pdf/title_img/2606.27377.jpg', 'data': {'categories': ['#training', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для генерации и редактирования изображений через дистилляцию полей скоростей', 'desc': 'В работе предлагается фреймворк DanceOPD для унификации нескольких возможностей генерации изображений в моделях flow-matching: генерация по тексту, локальное и глобальное редактирование. Ключевая идея заключается в маршрутизации выборок к специализированным полям скоростей, где каждое поле представляет отдельную способность модели. Студенческая модель обучается на состояниях собственных траекторий, извлекая знания из экспертных полей и композируя их способности через простой MSE-объектив для скорости. Подход демонстрирует улучшение композиции многоуровневых способностей, сохраняя качество базовой генерации при укреплении целевых задач редактирования.'}, 'en': {'title': 'Unifying Image Generation with DanceOPD: A New Era of Multi-Capability Models', 'desc': 'The paper introduces DanceOPD, a new framework designed to enhance image generation by integrating text-to-image generation, local editing, and global editing into a single model. It addresses the common issue where these capabilities conflict, leading to degraded performance when combined. By using an on-policy generative field distillation approach, DanceOPD routes samples to specific capability fields and employs a velocity-based training method to improve learning. The results demonstrate that this framework effectively strengthens the desired capabilities while maintaining high-quality image generation.'}, 'zh': {'title': '统一多种能力的生成框架', 'desc': '本文提出了一种新颖的在线生成场蒸馏框架，称为DanceOPD，旨在统一文本到图像生成、局部编辑和全局编辑能力。该框架通过能力特定的路由和基于速度的训练，解决了这些能力之间的冲突和不对齐问题。DanceOPD通过将每个样本路由到一个能力场，并使用简单的速度均方误差目标进行训练，从而有效地组合这些能力。实验结果表明，该方法在多能力组合方面表现出色，同时保持了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2606.26025', 'title': 'In-Context World Modeling for Robotic Control', 'url': 'https://huggingface.co/papers/2606.26025', 'abstract': 'Abstract ICWM enables robot policies to infer system variables from self-generated interactions, allowing adaptation to novel configurations without parameter updates by treating system identification as an in-context adaptation problem.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern Vision-Language-Action (VLA) models often fail to generalize to novel setups, such as altered camera viewpoints or robot morphologies, because they are typically conditioned only on current observations and language instructions. By ignoring the underlying system configuration as a variable, these models implicitly assume a fixed execution context encountered during training, necessitating data-intensive fine-tuning for any new environment. In this work, we introduce In-Context World Modeling (ICWM), a framework that treats system identification as an in-context adaptation problem. ICWM enables robot policies to autonomously infer essential system variables from a short history of self-generated, task-agnostic interactions. Unlike traditional In-Context Learning that uses demonstrations to specify what task to perform, ICWM leverages the context window to understand how the system operates. By processing these interactions before task execution, the model implicitly captures the world dynamics of the current system, enabling adaptation to novel configurations without parameter updates. Extensive experiments in simulation and on real-world robot platforms demonstrate that ICWM significantly outperforms standard VLA baselines on novel camera viewpoints.', 'score': 42, 'issue_id': 2506, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'd02f513c21475cea', 'authors': ['Siyin Wang', 'Junhao Shi', 'Senyu Fei', 'Zhaoyang Fu', 'Li Ji', 'Jingjing Gong', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26025.jpg', 'data': {'categories': ['#training', '#multimodal', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Робот учится адаптироваться через самонаблюдение без переобучения', 'desc': 'Авторы предлагают In-Context World Modeling (ICWM) — фреймворк, который позволяет робот-политикам определять параметры системы через короткую историю самостоятельно сгенерированных взаимодействий. В отличие от традиционного in-context learning, который использует примеры для понимания задачи, ICWM использует контекстное окно для изучения динамики текущей системы. Метод обрабатывает взаимодействия перед выполнением задачи, что позволяет модели неявно захватить мировую модель системы и адаптироваться к новым конфигурациям без обновления параметров. Экспериментальные результаты демонстрируют, что ICWM значительно превосходит базовые Vision-Language-Action модели при столкновении с новыми точками обзора камер и различными морфологиями роботов.'}, 'en': {'title': 'Adapt and Overcome: Robots Learning on the Fly', 'desc': "In-Context World Modeling (ICWM) is a new framework that helps robots adapt to different environments without needing to update their parameters. It allows robots to learn about their surroundings by analyzing their own interactions over time, rather than relying solely on fixed training data. This approach treats understanding the system's configuration as part of the learning process, enabling better generalization to new situations like different camera angles or robot shapes. Experiments show that ICWM performs significantly better than traditional models in these novel scenarios."}, 'zh': {'title': '自适应机器人：无参数更新的智能推断', 'desc': 'ICWM（上下文世界建模）是一种新框架，允许机器人通过自我生成的交互推断系统变量，从而适应新的配置，而无需更新参数。与传统的上下文学习不同，ICWM利用上下文窗口理解系统的操作方式，而不是仅依赖于演示任务。通过在任务执行前处理这些交互，模型能够捕捉当前系统的动态，进而适应新的环境。实验结果表明，ICWM在新的相机视角下显著优于标准的视觉-语言-动作基线。'}}}, {'id': 'https://huggingface.co/papers/2606.26790', 'title': 'OPID: On-Policy Skill Distillation for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.26790', 'abstract': 'Abstract On-policy skill distillation framework extracts dense hindsight supervision from completed trajectories to improve language agent training efficiency and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Outcome-based reinforcement learning provides a stable optimization backbone for language agents, but its sparse trajectory-level rewards provide little guidance on which intermediate decisions should be reinforced or suppressed. On-policy self-distillation offers dense token-level supervision, yet existing skill-conditioned variants often rely on external skill memories or retrieved privileged context, which are costly to maintain and can be mismatched with the state distribution induced by the current policy in multi-turn interaction. We propose OPID (On-Policy Skill Distillation), a framework that extracts skill supervision directly from completed on-policy trajectories. OPID represents trajectory hindsight as hierarchical skills: episode-level skills capture global workflows or failure-avoidance rules, while step-level skills capture local decision knowledge at critical timesteps. A critical-first routing mechanism uses step-level skills when critical decisions are identified and falls back to episode-level skills as default guidance otherwise. The selected skill is injected into the interaction history, allowing the old policy to re-score the same sampled response under both original and skill-augmented contexts. The resulting log-probability shift yields a token-level self-distillation advantage, which is combined with the outcome advantage for policy optimization. OPID thus preserves RL as the primary training objective while introducing dense, distribution-matched hindsight supervision. Experiments on ALFWorld, WebShop and Search-based QA demonstrate that OPID generally improves agent performance, sample efficiency, and robustness over outcome-only RL and existing skill-distillation baselines. Our code is available at https://github.com/jinyangwu/OPID/tree/main.', 'score': 40, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '831489f021ac14f0', 'authors': ['Shuo Yang', 'Jinyang Wu', 'Zhengxi Lu', 'Yuhao Shen', 'Fan Zhang', 'Lang Feng', 'Shuai Zhang', 'Haoran Luo', 'Zheng Lian', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Nanyang Technological University', 'The Chinese University of Hong Kong', 'Tongji University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26790.jpg', 'data': {'categories': ['#rl', '#agents', '#training'], 'emoji': '🎯', 'ru': {'title': 'Иерархическая самодистилляция для эффективного обучения языковых агентов', 'desc': 'В статье предложен фреймворк OPID для обучения языковых агентов, который извлекает плотное супервизирующее сигнал из завершённых траекторий с помощью самодистилляции. Авторы представляют hindsight траектории в виде иерархических навыков: навыки уровня эпизода захватывают глобальные рабочие процессы, а навыки уровня шага фокусируются на критических решениях. Специальный механизм маршрутизации выбирает между этими уровнями и вводит выбранный навык в контекст взаимодействия для переоценки ответов под исходным и дополненным контекстом. Фреймворк сочетает полученные логарифмические сдвиги вероятностей с функциями RL-награды, обеспечивая плотное распределение-согласованное супервизирование при сохранении RL как основного тренировочного объектива.'}, 'en': {'title': 'Enhancing Language Agent Training with On-Policy Skill Distillation', 'desc': 'The paper introduces OPID (On-Policy Skill Distillation), a framework designed to enhance the training of language agents by utilizing dense hindsight supervision from completed trajectories. It addresses the limitations of traditional reinforcement learning, which often relies on sparse rewards, by providing both episode-level and step-level skills for better decision-making guidance. OPID employs a critical-first routing mechanism to dynamically select the appropriate skill based on the importance of decisions, allowing for more effective learning. Experimental results show that OPID significantly improves agent performance, sample efficiency, and robustness compared to existing methods.'}, 'zh': {'title': '提升语言代理训练效率的技能蒸馏框架', 'desc': '本论文提出了一种名为OPID（On-Policy Skill Distillation）的框架，旨在通过从完成的策略轨迹中提取技能监督来提高语言代理的训练效率和性能。该框架将轨迹的回顾表示为层次化技能，包括全局工作流程的情节级技能和关键时刻的局部决策知识的步骤级技能。OPID采用关键优先路由机制，在识别到关键决策时使用步骤级技能，否则使用情节级技能作为默认指导。通过这种方式，OPID在保持强化学习作为主要训练目标的同时，引入了密集且与分布匹配的回顾监督。'}}}, {'id': 'https://huggingface.co/papers/2606.26907', 'title': 'Qwen-Image-Agent: Bridging the Context Gap in Real-World Image Generation', 'url': 'https://huggingface.co/papers/2606.26907', 'abstract': 'Abstract A unified agentic framework called Qwen-Image-Agent is proposed to address the context gap in text-to-image generation by progressively constructing complete generation context through planning, reasoning, searching, and memory mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While text-to-image (T2I) models have achieved remarkable progress, they struggle with real-world requests that are often underspecified, implicit, or dependent on up-to-date knowledge. We identify this challenge as the Context Gap: the mismatch between the user context and the sufficient generation context for T2I models. To bridge this gap, we propose Qwen-Image-Agent, a unified agentic framework that integrates plan, reason, search, memory and feedback in a context-centric manner. Qwen-Image-Agent treats user input as partial context and progressively constructs the generation context through Context-Aware Planning and Context Grounding. Specifically, Context-Aware Planning identifies missing context and plans how it should be acquired and used, while Context Grounding gathers this context from reason, search, memory, and feedback. To evaluate agentic image generation, we further introduce Image Agent Bench (IA-Bench), a benchmark covering four core image agent capabilities: Plan, Reason, Search, and Memory. Experiments on IA-Bench, Mindbench and WISE-Verified show that Qwen-Image-Agent outperforms strong baselines and achieves state-of-the-art performance.', 'score': 39, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '230aa6b52d1269cf', 'authors': ['Zekai Zhang', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Kun Yan', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiaoyue Chen', 'Xiao Xu', 'Yan Shu', 'Yanran Zhang', 'Yixian Xu', 'Yuxiang Chen', 'Zhendong Wang', 'Zihao Liu', 'Zikai Zhou', 'Huishuai Zhang', 'Dongyan Zhao', 'Chenfei Wu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.26907.jpg', 'data': {'categories': ['#agents', '#multimodal', '#dataset', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Агентский подход для устранения дефицита контекста в генерации изображений', 'desc': 'В статье предлагается агентский фреймворк Qwen-Image-Agent для решения проблемы дефицита контекста при генерации изображений по текстовому описанию. Система прогрессивно строит полный контекст для генерации через механизмы планирования, рассуждения, поиска информации и памяти. Фреймворк использует Context-Aware Planning для выявления недостающего контекста и Context Grounding для его сбора из различных источников. Авторы представляют новый бенчмарк Image Agent Bench для оценки способностей агента в планировании, рассуждении, поиске и использовании памяти, достигая лучших результатов на нескольких датасетах.'}, 'en': {'title': 'Bridging the Context Gap in Text-to-Image Generation', 'desc': "The paper introduces Qwen-Image-Agent, a new framework designed to improve text-to-image generation by addressing the 'Context Gap' problem. This gap occurs when the user’s input lacks sufficient detail for the model to generate accurate images. Qwen-Image-Agent uses a combination of planning, reasoning, searching, and memory to progressively build the necessary context for image generation. The framework is evaluated using a new benchmark called Image Agent Bench, demonstrating superior performance compared to existing models."}, 'zh': {'title': '弥补文本到图像生成的上下文差距', 'desc': '本文提出了一种统一的智能框架Qwen-Image-Agent，旨在解决文本到图像生成中的上下文差距问题。该框架通过规划、推理、搜索和记忆机制逐步构建完整的生成上下文。Qwen-Image-Agent将用户输入视为部分上下文，并通过上下文感知规划和上下文基础构建生成上下文。实验结果表明，Qwen-Image-Agent在多个基准测试中表现优异，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.26300', 'title': 'The Verification Horizon: No Silver Bullet for Coding Agent Rewards', 'url': 'https://huggingface.co/papers/2606.26300', 'abstract': "Abstract Verification challenges in AI agents arise from the difficulty of aligning proxy signals with human intent, requiring adaptive verification systems that evolve alongside generative capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A classical intuition holds that verifying a solution is easier than producing one. For today's coding agents, this intuition is being inverted: as foundation models develop stronger reasoning capabilities and engineering harnesses grow more sophisticated, generating complex candidate solutions is no longer difficult -- reliably verifying them has become the harder problem. Every verifier we can build is only a proxy for human intent, never the intent itself. This makes verification subject to a twofold difficulty: first, intent is underspecified by nature, making it inherently hard to faithfully check whether it has been fulfilled; second, during model training, optimization widens the gap between proxy and intent -- manifesting as reward hacking or signal saturation. To address this, we characterize the quality of verification signals along three dimensions -- scalability, faithfulness, and robustness -- and argue that achieving all three simultaneously is the central challenge. We further study four reward constructions: a test verifier for general coding tasks, a rubric verifier for frontend tasks, the user as verifier for real-world agent tasks, and an automated agent verifier for long-horizon tasks. Across different task types and policy capability levels, we conduct in-depth analysis and experiments on the core challenges of reward design and how to more effectively leverage reward signals. Experiments show that targeted verification design can effectively suppress reward hacking, improve task completion quality, and achieve significant gains across multiple internal and public benchmarks. These experiences collectively point to a core observation: no fixed reward function can remain effective as policy capability continues to grow; and verification must co-evolve with the generator.", 'score': 38, 'issue_id': 2506, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '100bd102821ec316', 'authors': ['Binghai Wang', 'Chenlong Zhang', 'Dayiheng Liu', 'Jiajun Zhang', 'Jiawei Chen', 'Mouxiang Chen', 'Rongyao Fang', 'Siyuan Zhang', 'Xuwu Wang', 'Yuheng Jing', 'Zeyao Ma', 'Zeyu Cui'], 'affiliations': ['Anthropic', 'Cursor', 'DeepSeek-AI', 'OpenAI', 'OpenClaw', 'OpenCode'], 'pdf_title_img': 'assets/pdf/title_img/2606.26300.jpg', 'data': {'categories': ['#plp', '#alignment', '#reasoning', '#agents', '#rlhf', '#benchmark'], 'emoji': '✅', 'ru': {'title': 'Верификация должна эволюционировать вместе с генератором', 'desc': 'В статье исследуется проблема верификации решений, генерируемых AI агентами, которая становится сложнее, чем само создание решений. Авторы анализируют, как прокси-сигналы для вознаграждения отклоняются от истинного намерения пользователя и приводят к reward hacking и оптимизационным артефактам. Они предлагают характеризовать качество верификации по трём измерениям: масштабируемость, верность и робастность, и изучают четыре типа верификаторов для различных задач программирования. Исследование показывает, что адаптивная верификация, которая эволюционирует вместе с возможностями генеративной модели, необходима для эффективного обучения AI агентов.'}, 'en': {'title': 'Evolving Verification: Keeping Up with AI Generation', 'desc': 'This paper discusses the challenges of verifying AI agents, particularly in how well their outputs align with human intentions. As AI models become better at generating solutions, the task of verifying these solutions has become more complex. The authors highlight that verification signals must be scalable, faithful, and robust to effectively assess AI outputs. They propose various reward structures and demonstrate through experiments that adaptive verification can reduce issues like reward hacking and improve the quality of task completion.'}, 'zh': {'title': '验证与生成的双重挑战', 'desc': '在人工智能代理的验证挑战中，主要问题是如何将代理信号与人类意图对齐。随着生成能力的提升，验证系统需要不断适应和演变。当前，生成复杂解决方案变得容易，但可靠地验证这些解决方案却变得更加困难。我们提出了验证信号的三个维度：可扩展性、忠实性和鲁棒性，并探讨了如何在不同任务中有效利用奖励信号。'}}}, {'id': 'https://huggingface.co/papers/2606.27313', 'title': 'ViQ: Text-Aligned Visual Quantized Representations at Any Resolution', 'url': 'https://huggingface.co/papers/2606.27313', 'abstract': 'Abstract ViQ presents a visual quantization framework that balances semantic richness and detail preservation in discrete representations, enabling efficient multimodal training with native-resolution inputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A unified representation for text and vision is a natural pursuit, as it enables simpler multimodal modeling and more efficient training. However, representing images as discrete signals in the same way as text inevitably introduces severe information loss. Existing work struggles to balance low-level details and high-level semantics in discrete representations: reconstruction-oriented representations often lack semantic information, whereas semantically stronger features typically suffer from severe loss of detail. We present ViQ, a Visual Quantized Representations framework, which is designed to balance semantics and details in discrete representations while supporting inputs at native resolutions, thereby enabling it to serve as a unified and general discrete representation for arbitrary visual inputs. Our approach structures quantization learning into two stages: text-aligned pre-training and feature discretization. With text-aligned pre-training, we enhance the visual encoder semantic-rich supervision from the pretrained language model and enable it to process native-resolution visual inputs. During discretization, we propose a proximal representation learning strategy to progressively compact the feature space, along with a position-aware head-wise quantization mechanism that enables flexible processing of arbitrary resolutions. Extensive experiments on multimodal tasks demonstrate that ViQ achieves competitive performance compared to state-of-the-art multimodal vision encoders with continuous and high-dimensional visual features, while maintaining high precision in low-level reconstruction. We also show that multimodal training with visual quantized representations largely improves efficiency, yielding up to 20\\%-70\\% acceleration with different base LLMs and training recipes.', 'score': 37, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1d5ef747b7990827', 'authors': ['Xumin Yu', 'Zuyan Liu', 'Zhenyu Yang', 'Yuhao Dong', 'Shengsheng Qian', 'Jiwen Lu', 'Han Hu', 'Yongming Rao'], 'affiliations': ['Nanyang Technological University', 'Tencent HY Vision Team', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27313.jpg', 'data': {'categories': ['#training', '#multimodal', '#inference', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Дискретные визуальные представления, которые понимают смысл и видят детали', 'desc': 'ViQ представляет новый подход к визуальной квантизации, который балансирует между сохранением высокоуровневой семантики и низкоуровневых деталей в дискретных представлениях изображений. Фреймворк использует двухэтапное обучение: сначала предобучение с выравниванием по текстовым моделям, затем дискретизация признаков с использованием проксимальной стратегии обучения. Метод поддерживает входные данные в исходном разрешении и позволяет эффективнее обучать мультимодальные модели. Экспериментальные результаты показывают, что ViQ достигает конкурентной производительности при одновременном ускорении обучения на 20-70% в сравнении с существующими подходами.'}, 'en': {'title': 'Balancing Semantics and Details in Visual Quantization', 'desc': 'ViQ introduces a visual quantization framework that effectively balances the preservation of low-level details and high-level semantic information in discrete representations. This framework allows for efficient multimodal training using native-resolution inputs, which is crucial for integrating text and vision. The approach involves a two-stage process: first, enhancing the visual encoder with semantic supervision from a pretrained language model, and second, applying a proximal representation learning strategy for feature discretization. Experimental results show that ViQ not only competes well with existing multimodal vision encoders but also significantly accelerates training efficiency by 20%-70%.'}, 'zh': {'title': '平衡语义与细节的视觉量化框架', 'desc': 'ViQ是一种视觉量化框架，旨在平衡离散表示中的语义丰富性和细节保留，从而实现高效的多模态训练。该框架支持原生分辨率输入，能够作为统一的离散表示处理任意视觉输入。ViQ通过文本对齐的预训练和特征离散化两个阶段来结构化量化学习，增强视觉编码器的语义监督。实验表明，ViQ在多模态任务中表现出色，相比于现有的多模态视觉编码器，具有更高的效率和精度。'}}}, {'id': 'https://huggingface.co/papers/2606.18394', 'title': 'JetSpec: Breaking the Scaling Ceiling of Speculative Decoding with Parallel Tree Drafting', 'url': 'https://huggingface.co/papers/2606.18394', 'abstract': "Abstract JetSpec is a speculative decoding framework that combines efficient forward drafting with causal conditioning to improve LLM inference speed and acceptance rates across various benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speculative decoding (SD) accelerates autoregressive Large Language Models (LLMs) by drafting multiple tokens and verifying them in parallel, but it faces a scaling limitation: increasing the draft budget improves speed only when acceptance remains high and drafting overhead stays low. This ceiling has been difficult to break because prior head-based SD methods face a causality-efficiency dilemma. Autoregressive drafters produce path-conditioned candidates that are effective for tree speculative decoding with higher acceptance length, but their drafting cost grows with tree depth. Bidirectional block-diffusion drafters generate all positions in one pass, but their branch-agnostic marginals can form individually plausible yet mutually inconsistent trees, wasting budget and reducing acceptance. We propose JetSpec, a head-based SD framework that combines one-forward drafting efficiency with branch-wise causal conditioning. JetSpec trains a causal parallel draft head over fused hidden states from the frozen target model, producing candidate trees whose scores align with the target model's autoregressive factorization. This enables JetSpec to convert larger draft budgets into longer accepted prefixes and higher end-to-end speedup. Across math, coding, and chat benchmarks on dense and MoE Qwen3 models, JetSpec consistently outperforms bidirectional-head and tree-based SD baselines. On H100 GPUs, JetSpec achieves up to 9.64x speedup on MATH-500 and 4.58x on open-ended conversational workloads, with further latency gains demonstrated through vLLM integration under realistic serving loads. Our code and models are available at https://github.com/hao-ai-lab/JetSpec.", 'score': 28, 'issue_id': 2506, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '69979ffe7419df73', 'authors': ['Lanxiang Hu', 'Zhaoxiang Feng', 'Yulun Wu', 'Haoran Yuan', 'Yujie Zhao', 'Yu-Yang Qian', 'Bojun Wang', 'Peng Zhao', 'Daxin Jiang', 'Yibo Zhu', 'Tajana Rosing', 'Hao Zhang'], 'affiliations': ['Nanjing University', 'StepFun', 'UC San Diego', 'UIUC', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18394.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Ускорение вывода LLM через причинное спекулятивное декодирование', 'desc': 'JetSpec — это фреймворк спекулятивного декодирования, который ускоряет вывод больших языковых моделей путём параллельного генерирования и проверки множества токенов одновременно. Основная инновация заключается в преодолении компромисса между эффективностью одноходового формирования кандидатов и корректностью причинного кондиционирования — модель обучает специальную голову-драфтер, которая генерирует деревья кандидатов, согласованные с авторегрессивной факторизацией целевой модели. Это позволяет алгоритму более эффективно использовать бюджет токенов на черновик, преобразуя его в более длинные принятые последовательности и выше общее ускорение вывода. На различных бенчмарках и архитектурах моделей JetSpec демонстрирует значительное улучшение скорости — вплоть до 9.64x ускорения на математических задачах и 4.58x на диалоговых нагрузках.'}, 'en': {'title': 'JetSpec: Accelerating LLM Inference with Smart Drafting', 'desc': 'JetSpec is a new framework designed to enhance the speed and efficiency of Large Language Model (LLM) inference through speculative decoding. It combines forward drafting with causal conditioning to create candidate token trees that are both effective and efficient, addressing the limitations of previous methods. By training a causal parallel draft head, JetSpec aligns its candidate scores with the autoregressive nature of the target model, allowing for longer accepted prefixes and faster processing. The results show significant speed improvements across various benchmarks, outperforming existing approaches in both coding and conversational tasks.'}, 'zh': {'title': 'JetSpec：提升推测解码效率的创新框架', 'desc': 'JetSpec 是一种推测解码框架，结合了高效的前向草拟和因果条件，以提高大型语言模型（LLM）的推理速度和接受率。推测解码通过并行草拟多个标记并进行验证来加速自回归 LLM，但面临着扩展限制。JetSpec 通过在融合的隐藏状态上训练因果并行草拟头，生成与目标模型自回归分解一致的候选树，从而有效地将更大的草拟预算转化为更长的接受前缀和更高的端到端加速。实验结果表明，JetSpec 在多个基准测试中表现优于现有的推测解码方法。'}}}, {'id': 'https://huggingface.co/papers/2606.24551', 'title': 'GUI vs. CLI: Execution Bottlenecks in Screen-Only and Skill-Mediated Computer-Use Agents', 'url': 'https://huggingface.co/papers/2606.24551', 'abstract': 'Abstract  Computer-use agents can execute software tasks through either graphical interfaces or programmatic command interfaces, but existing evaluations confound interaction modality with differences in tasks, initial states, verifiers, and permitted actions. We introduce a matched execution-layer benchmark of 440 desktop tasks across 18 applications and 12 workflow categories, where screen-only GUI agents and skill-mediated CLI agents receive identical goals, states, and final-state verifiers while being restricted to modality-native actions. In this controlled setting, the strongest GUI agent reaches a 59.1% full pass rate, outperforming the strongest original-skill CLI agent at 48.2%; however, verifier-guided skill augmentation raises CLI success to 69.3%, showing that much of the CLI deficit comes from incomplete skill coverage rather than model capability alone. These results suggest that GUI and CLI expose different execution bottlenecks: GUI agents are limited by reliable grounded interaction over long-horizon workflows, whereas CLI agents are limited by the coverage and scalability of their skill interfaces.', 'score': 25, 'issue_id': 2506, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'a63475a65dfda1fc', 'authors': ['Xiao Zhou', 'Siyue Zhang', 'Yilun Zhao', 'Jinbiao Wei', 'Tingyu Song', 'Arman Cohan', 'Chen Zhao'], 'affiliations': ['HKUDS', 'New York University', 'YData & Models', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24551.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🖥️', 'ru': {'title': 'Графические интерфейсы против командной строки: где агенты ошибаются', 'desc': 'В статье представляется сравнительный бенчмарк для оценки агентов, которые взаимодействуют с компьютером через графический интерфейс (GUI) или командную строку (CLI). Исследователи создали набор из 440 задач на 18 приложениях, где оба типа агентов решают идентичные задачи в одинаковых условиях, что позволяет справедливо сравнить их производительность. Результаты показывают, что GUI-агенты достигают 59.1% успеха, а CLI-агенты с расширенным набором навыков могут достичь 69.3%, что указывает на разные узкие места: GUI-агенты затрудняются с надёжным взаимодействием на длинных последовательностях действий, а CLI-агенты ограничены полнотой и масштабируемостью своего интерфейса навыков. Исследование демонстрирует, что главные ограничения лежат не только в возможностях самой модели, но и в архитектуре взаимодействия с системой.'}, 'en': {'title': 'Unveiling the Strengths and Weaknesses of GUI vs. CLI Agents', 'desc': 'This paper evaluates how computer agents perform tasks using graphical user interfaces (GUI) versus command line interfaces (CLI). It introduces a benchmark with 440 tasks to ensure that both types of agents face the same conditions, allowing for a fair comparison. The findings reveal that GUI agents perform better overall, but CLI agents can improve significantly with better skill coverage. This indicates that each interface type has unique challenges that affect their performance in executing tasks.'}, 'zh': {'title': 'GUI与CLI代理的执行能力比较', 'desc': '本论文介绍了一种新的基准测试，比较图形用户界面（GUI）代理和命令行界面（CLI）代理在执行桌面任务时的表现。研究中使用了440个任务，确保两种代理在相同的目标和状态下进行比较。结果显示，最强的GUI代理的通过率为59.1%，而CLI代理的通过率为48.2%。然而，通过引导技能增强，CLI的成功率提高到69.3%，表明CLI的不足主要源于技能覆盖不全，而非模型能力本身。'}}}, {'id': 'https://huggingface.co/papers/2606.26217', 'title': 'Fast LeWorldModel', 'url': 'https://huggingface.co/papers/2606.26217', 'abstract': 'Abstract Fast-LeWM accelerates visual planning by replacing autoregressive rollout with parallel action-prefix prediction, reducing computational costs and latency accumulation during long-horizon predictions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Joint-Embedding Predictive Architectures (JEPAs), including recent LeWorldModel (LeWM), have become a promising foundation for reconstruction-free visual world models. For visual planning, however, LeWM evaluates candidate action sequences by repeatedly applying a local one-step latent transition model. This autoregressive rollout makes planning computationally expensive and exposes the predicted trajectory to accumulated latent errors as the horizon grows. We propose Fast LeWorldModel (Fast-LeWM), a fast latent world model that replaces repeated local rollout with action-prefix prediction. Given the current latent and a candidate action sequence, Fast-LeWM encodes its prefixes and predicts the future latents reached after executing those prefixes in parallel. By making action prefixes the basic prediction unit, Fast-LeWM directly models action effects accumulated to different extents over multiple horizons. This prefix-level supervision forces the model to learn how states continuously evolve under different action prefixes, rather than only fitting one-step state transitions. During planning, the predictor can use the last prefix token from the encoded action sequence to evaluate the corresponding future latent without explicitly rolling through each intermediate imagined state. Across multiple tasks, Fast-LeWM improves average success over LeWM while substantially reducing planning time, achieving lower open-loop latent loss whose growth becomes significantly slower as the rollout horizon increases.', 'score': 22, 'issue_id': 2505, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '1423e6724acc9721', 'authors': ['Yuntian Gao', 'Xiangyu Xu'], 'affiliations': ['Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26217.jpg', 'data': {'categories': ['#training', '#cv', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Параллельное предсказание вместо автогрессивного: ускорение визуального планирования', 'desc': 'В статье предлагается Fast-LeWM, ускоренная модель визуального мира на основе архитектуры JEPA, которая заменяет автогрессивный rollout параллельным предсказанием префиксов действий. Вместо многократного применения локального одношагового перехода в скрытом пространстве, модель кодирует префиксы последовательности действий и предсказывает будущие состояния параллельно для всех горизонтов. Такой подход к предсказанию на уровне префиксов позволяет модели напрямую моделировать накопленные эффекты действий и уменьшает накопление ошибок предсказания при длительном планировании. Экспериментальные результаты показывают улучшение успешности планирования и значительное снижение вычислительных затрат по сравнению с исходной LeWM.'}, 'en': {'title': 'Accelerating Visual Planning with Action-Prefix Prediction', 'desc': 'Fast-LeWM is a new approach to visual planning that speeds up the process by using action-prefix prediction instead of the traditional autoregressive rollout method. This change reduces both the computational costs and the errors that can build up over long prediction horizons. By focusing on action prefixes, Fast-LeWM allows the model to learn how states change over time with different actions, rather than just looking at single-step transitions. As a result, it not only improves the success rate in various tasks but also significantly cuts down the time needed for planning.'}, 'zh': {'title': '快速视觉规划的新方法', 'desc': 'Fast-LeWM是一种加速视觉规划的模型，通过用并行的动作前缀预测替代自回归的展开，降低了长时间预测的计算成本和延迟累积。该模型基于Qwen/Qwen2.5-Coder-32B-Instruct联合嵌入预测架构，成为无重建视觉世界模型的有希望基础。与传统的LeWM模型相比，Fast-LeWM通过编码动作前缀并并行预测未来状态，避免了重复的局部展开，从而提高了规划效率。实验表明，Fast-LeWM在多个任务中提高了成功率，同时显著减少了规划时间，降低了开放式潜在损失的增长速度。'}}}, {'id': 'https://huggingface.co/papers/2606.14397', 'title': 'Running the Gauntlet: Re-evaluating the Capabilities of Agents Beyond Familiar Environments', 'url': 'https://huggingface.co/papers/2606.14397', 'abstract': 'Abstract A web-based benchmark evaluates agent generalization across challenging scenarios, revealing significant gaps between current agentic systems and human performance in temporal perception, graphical understanding, and 3D reasoning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As agentic systems continue to evolve and are widely deployed in real-world scenarios, there is a growing demand to faithfully evaluate their capabilities. However, current benchmarks are typically built on popular applications with relatively simple tasks and focus on a narrow set of capabilities while overlooking broader dimensions, resulting in saturated performance on modern agents and failing to probe their limitations. To this end, we introduce GauntletBench, a web-based benchmark for evaluating agent generalisation in challenging scenarios, focusing on three underexplored capabilities (temporal perception, graphical understanding, and 3D reasoning), across five less-covered professional applications (Video Editor, Workflow Builder, 3D Modeller, Flight Analyser, and Circuit Designer), each with 20 vision-intensive tasks (100 in total). Our benchmark provides a modular pipeline that comprises an environment compatible with both open- and closed-source agent frameworks, a controlled web-based application, a well-structured task suite, and an automated evaluation engine with diverse metrics. Contrary to widespread expectations, our empirical results reveal that frontier agentic systems remain far from achieving human-level performance. Even the state-of-the-art agent achieves only a 19.1% success rate on our GauntletBench, highlighting the limitations in these overlooked capabilities and generalisation. By comparison, non-expert human annotators achieve over 80% success on our challenging yet feasible tasks, revealing the substantial gap between current agent capabilities and those required for complex real-world scenarios.', 'score': 15, 'issue_id': 2508, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'ed1f610096a01c7f', 'authors': ['Mykola Vysotskyi', 'Runqi Lin', 'Grzegorz Biziel', 'Michal Zakrzewski', 'Sebastian Montagna', 'Damian Rynczak', 'Shreyansh Padarha', 'Kumail Alhamoud', 'Zihao Fu', 'William Lugoloobi', 'Kai Rawal', 'Hanna Yershova', 'Xander Davies', 'Taras Rumezhak', 'Guohao Li', 'Fazl Barez', 'Baoyuan Wu', 'Arkadiusz Drohomirecki', 'Yarin Gal', 'Chris Russell', 'Christopher Summerfield', 'Adam Mahdi', 'Volodymyr Karpiv', 'Philip Torr', 'Adel Bibi'], 'affiliations': ['Eigent.AI', 'Massachusetts Institute of Technology', 'SoftServe', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'UK AI Security Institute', 'Ukrainian Catholic University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.14397.jpg', 'data': {'categories': ['#survey', '#video', '#3d', '#benchmark', '#agents', '#cv'], 'emoji': '📊', 'ru': {'title': 'Разоблачение ограничений современных агентов через сложные задачи восприятия и рассуждения', 'desc': 'В статье представлен GauntletBench — веб-бенчмарк для оценки обобщающей способности агентских систем на сложных сценариях, включающий 100 визуально-насыщенных задач в пяти профессиональных приложениях. Бенчмарк сосредоточен на трех недостаточно исследованных возможностях: временном восприятии, графическом понимании и трёхмерном рассуждении, которые современные агенты выполняют плохо. Эмпирические результаты показывают, что даже передовые агенты достигают лишь 19,1% успешности, в то время как человеческие аннотаторы показывают более 80% на этих же задачах. Результаты подчеркивают значительный разрыв между текущими возможностями агентских систем и требованиями для работы в сложных реальных сценариях.'}, 'en': {'title': 'Bridging the Gap: Evaluating Agentic Systems Beyond Simple Tasks', 'desc': 'This paper introduces GauntletBench, a new web-based benchmark designed to evaluate the generalization abilities of agentic systems in complex scenarios. It focuses on three critical yet underexplored capabilities: temporal perception, graphical understanding, and 3D reasoning, across five professional applications. The benchmark reveals that current state-of-the-art agents perform significantly below human levels, achieving only a 19.1% success rate compared to over 80% for non-expert humans. This highlights the limitations of existing benchmarks that often overlook these essential skills, emphasizing the need for more comprehensive evaluation methods in machine learning.'}, 'zh': {'title': '评估智能体能力的新基准测试', 'desc': '这篇论文介绍了一个名为GauntletBench的基准测试，旨在评估智能体在复杂场景中的泛化能力。该基准测试关注三个较少探索的能力：时间感知、图形理解和三维推理，并涵盖五个专业应用。研究结果显示，当前的智能体系统在这些能力上与人类表现存在显著差距，最先进的智能体在测试中的成功率仅为19.1%。相比之下，非专业的人类评估者在这些任务中的成功率超过80%，突显了智能体在复杂现实场景中的局限性。'}}}, {'id': 'https://huggingface.co/papers/2606.26027', 'title': 'Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It', 'url': 'https://huggingface.co/papers/2606.26027', 'abstract': 'Abstract Research investigates how different supervisory signals and training strategies improve the stability and performance of large language models in tool-use tasks, addressing issues like catastrophic collapse and format sensitivity through interleaved supervised fine-tuning and reinforcement learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.', 'score': 15, 'issue_id': 2506, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'e24902f212d21ead', 'authors': ['Yupu Hao', 'Zhuoran Jin', 'Huanxuan Liao', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Artificial Intelligence, University of Chinese Academy of Sciences, Beijing, China', 'The Key Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.26027.jpg', 'data': {'categories': ['#rl', '#training', '#agents', '#rlhf'], 'emoji': '🛠️', 'ru': {'title': 'Стабильное обучение LLM инструментам через чередование контроля и reinforcement learning', 'desc': 'В статье исследуется, как различные сигналы обучения с учителем и стратегии тренировки улучшают стабильность больших языковых моделей при выполнении задач с использованием инструментов. Авторы выявили проблему катастрофического коллапса производительности, когда модель теряет способность правильно вызывать инструменты из-за аномальных вероятностей управляющих токенов. Исследование показывает, что чередование supervised fine-tuning и reinforcement learning значительно повышает стабильность обучения и позволяет сохранить базовые навыки использования инструментов даже при распределении данных вне области обучения. Авторы систематически тестируют различные типы контроля обучения, включая off-policy supervision и примеры с ошибками, демонстрируя эффективность комбинированных подходов для надёжной тренировки моделей на сложных многошаговых задачах.'}, 'en': {'title': 'Enhancing Stability in Tool-Use Tasks for Large Language Models', 'desc': 'This research explores how different training methods and supervisory signals can enhance the stability and performance of large language models (LLMs) when using tools. It addresses problems like catastrophic collapse, where model performance suddenly drops, and format sensitivity, which affects how models execute tasks. By combining supervised fine-tuning with reinforcement learning, the study finds that stability improves, although performance may suffer when faced with unfamiliar formats. The findings emphasize the need for diverse supervisory signals to support effective learning and robust tool-use capabilities in LLMs.'}, 'zh': {'title': '多样化监督信号提升语言模型稳定性', 'desc': '本研究探讨了不同的监督信号和训练策略如何提高大型语言模型在工具使用任务中的稳定性和性能。通过交替的监督微调和强化学习，解决了灾难性崩溃和格式敏感性等问题。实验表明，交替使用监督微调与强化学习显著提高了模型的稳定性，但在格式和内容的分布外评估中表现下降。研究结果强调了理解强化学习失败的重要性，并展示了多样化的监督信号如何引导探索性学习，从而实现大型语言模型在复杂多步骤工具使用任务中的稳健训练。'}}}, {'id': 'https://huggingface.co/papers/2606.27192', 'title': 'LISA: Likelihood Score Alignment for Visual-condition Controllable Generation', 'url': 'https://huggingface.co/papers/2606.27192', 'abstract': "Abstract Score-based generative modeling reveals that side networks contribute likelihood scores to conditional control, leading to improved training efficiency through likelihood score alignment regularization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The prevalent dual-branch paradigm, i.e., training a side network to encode visual conditions and fusing its intermediate-layer features to a frozen pretrained main network, has shown remarkable success in visual-condition controllable generation. Despite its widespread adoption, the role of the side branch and its training efficiency remain underexplored. In this paper, we first revisit this mainstream paradigm through the lens of score-based generative modeling: 1) The main network preserves visual perceptual quality by providing a prior unconditional score. 2) The side network steers conditional control by implicitly contributing a likelihood score. Guided by this perspective, we propose LIkelihood Score Alignment (LISA), an effective regularization method that explicitly aligns the intermediate feature of the side network with an approximated likelihood score. Specifically, we first hook features from a designated layer of the side network and project them into the score latent space by a lightweight decoder. Then, we construct an approximated likelihood score target and calculate the distance between the decoder's output and this target as an additional regularization loss. Finally, we jointly optimize the side network and decoder with both standard diffusion loss and our regularization loss. Experiments across various image/video tasks, architectures, and diffusion/flow models demonstrated that LISA can not only consistently accelerate the training convergence and improve final synthetic results, but also encourage the side network's features to be more disentangled for conditional modeling with negligible additional training cost and zero extra inference cost.", 'score': 13, 'issue_id': 2509, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'ec19cdb203f023c3', 'authors': ['Yanghao Wang', 'Hongxu Chen', 'Jiazhen Liu', 'Zhenqi He', 'Rui Liu', 'Zhen Wang', 'Long Chen'], 'affiliations': ['Huawei Research', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.27192.jpg', 'data': {'categories': ['#video', '#optimization', '#diffusion', '#architecture', '#cv', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Выравнивание likelihood score для эффективного обучения условных диффузионных моделей', 'desc': 'В статье исследуется двухветвевая архитектура для условной генерации изображений через призму score-based моделей. Авторы показывают, что главная сеть предоставляет безусловный score для сохранения качества, а боковая сеть вносит likelihood score для управления условиями. Предложен метод регуляризации LISA, который явно выравнивает промежуточные признаки боковой сети с приближённым likelihood score. Экспериментальные результаты демонстрируют ускорение сходимости обучения, улучшение качества генерации и лучшую диsentanglement признаков без дополнительных вычислительных затрат при инференсе.'}, 'en': {'title': 'Enhancing Conditional Control with LISA in Generative Models', 'desc': 'This paper explores the dual-branch approach in score-based generative modeling, where a side network enhances conditional control by contributing likelihood scores. It introduces a new regularization method called LIkelihood Score Alignment (LISA), which aligns features from the side network with an approximated likelihood score to improve training efficiency. By optimizing both the side network and a lightweight decoder, LISA accelerates training convergence and enhances the quality of generated images and videos. The results show that LISA leads to better feature disentanglement in the side network, all while maintaining low additional costs during training and inference.'}, 'zh': {'title': '提升生成模型训练效率的关键：似然分数对齐', 'desc': '这篇论文探讨了基于分数的生成建模，强调了侧网络在条件控制中的作用。通过引入似然分数对齐正则化（LISA），作者提出了一种有效的方法来提高训练效率。LISA通过将侧网络的中间特征与近似的似然分数对齐，促进了生成模型的训练。实验结果表明，LISA不仅加速了训练收敛，还改善了最终生成的结果。'}}}, {'id': 'https://huggingface.co/papers/2606.26875', 'title': 'Information-Aware KV Cache Compression for Long Reasoning', 'url': 'https://huggingface.co/papers/2606.26875', 'abstract': 'Abstract InfoKV is an entropy-aware KV cache compression framework that enhances long-context reasoning in LLMs by incorporating information-theoretic signals alongside attention weights.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reasoning capability has advanced rapidly in large language models (LLMs), leading to an increasing size of key-value (KV) cache in both prefilling and decoding stages. Existing KV cache compression methods mainly rely on attention weights to estimate token importance. While attention effectively captures contextual relevance, it overlooks complementary information-theoretic signals related to predictive uncertainty and token informativeness. In this paper, we revisit token importance from a forward-looking perspective and introduce Forward Influence, a metric that measures how compressed tokens affect future contexts. Our analysis reveals that tokens selected by attention scores mainly influence nearby contexts, whereas tokens associated with high predictive uncertainty exhibit substantially stronger influence on distant future contexts. Based on the observation, we propose InfoKV, an entropy-aware KV cache compression framework that incorporates information-theoretic signals. It combines token-level predictive uncertainty with layer-wise representation evolution and integrates the resulting entropy scores with attention scores during reasoning. Experiments on long-context reasoning benchmarks with Llama-3.1, Llama-3.2, and DeepSeek-R1 demonstrate that InfoKV consistently outperforms existing attention-based KV compression methods in both long prefilling and decoding scenarios.', 'score': 9, 'issue_id': 2509, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '68f20a3d3073d968', 'authors': ['Jushi Kai', 'Zhuiri Xiao', 'Alexandra Birch', 'Zhouhan Lin'], 'affiliations': ['LUMIA Lab, School of Artificial Intelligence, Shanghai Jiao Tong University', 'School of Informatics, University of Edinburgh', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26875.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Энтропия вместо внимания: сжатие KV-кэша через информационную теорию', 'desc': 'InfoKV — это фреймворк для сжатия KV-кэша в больших языковых моделях, который использует информационно-теоретические сигналы наряду с весами внимания. Авторы вводят метрику Forward Influence для измерения влияния сжатых токенов на будущие контексты и обнаруживают, что токены с высокой неопределённостью предсказания оказывают значительное влияние на отдалённые части текста. Предложенный метод объединяет предсказательную неопределённость на уровне токенов с эволюцией представлений на уровне слоёв, интегрируя энтропийные оценки с весами внимания. Экспериментальные результаты на тестах длинноконтекстного рассуждения показывают, что InfoKV превосходит существующие методы сжатия на основе внимания.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with InfoKV Compression', 'desc': 'The paper introduces InfoKV, a new framework for compressing key-value (KV) caches in large language models (LLMs) that enhances long-context reasoning. It combines traditional attention weights with information-theoretic signals to better assess token importance, particularly focusing on predictive uncertainty. The authors present a novel metric called Forward Influence, which evaluates how compressed tokens impact future contexts, revealing that high uncertainty tokens are more influential over longer distances. Experiments show that InfoKV outperforms existing methods, improving performance in both prefilling and decoding stages of LLMs.'}, 'zh': {'title': '信息论驱动的键值缓存压缩框架', 'desc': 'InfoKV 是一个基于信息论的键值缓存压缩框架，旨在增强大型语言模型（LLMs）在长上下文推理中的能力。该框架结合了信息论信号和注意力权重，以更好地评估令牌的重要性。研究表明，传统的注意力机制主要关注附近上下文，而高预测不确定性的令牌对远期上下文的影响更大。通过引入前向影响度量，InfoKV 能够有效整合预测不确定性和注意力分数，从而在长上下文推理任务中表现优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2606.26904', 'title': 'Confidence-Aware Tool Orchestration for Robust Video Understanding', 'url': 'https://huggingface.co/papers/2606.26904', 'abstract': 'Abstract Robust-TO addresses the Blind Trust Problem in video reasoning by integrating per-frame trustworthiness into an agentic framework that improves accuracy under realistic perturbations through calibrated evidence weighting and reliability-aware reasoning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video reasoning language models implicitly assume that every input frame is equally reliable. This leads to what we term the Blind Trust Problem: under realistic perturbations such as motion blur, glare, or occlusion, frontier video reasoning models can suffer 15-30%p accuracy drops on real-world embodied benchmarks, while remaining unaware that their visual evidence has been degraded. To address this challenge, we propose Robust-TO, an agentic video understanding framework that explicitly integrates per-frame trustworthiness into every stage of reasoning. Robust-TO organizes heterogeneous visual perception tools under a unified evidence interface. Each tool receives a sub-query derived from the original question and a set of trustworthy frames selected by the reliability-relevance score. It returns evidence in a shared format: a concrete prediction (e.g., a bounding box, motion trajectory, recognized text, or action label), temporal grounding, and a calibrated reliability score. During reasoning, these calibrated scores guide evidence weighting in a three-tier synthesis process (high/medium/low) and define a confidence-cost GRPO reward that jointly optimizes correctness, evidence reliability, and efficiency. On two video reasoning benchmarks spanning eight tasks, Robust-TO achieves 56.4% average accuracy on clean inputs, surpassing the strongest open-source baseline by 10.6%p and outperforming Gemini-2.5-Pro (46.2%). Under five realistic corruption types, Robust-TO maintains 54.3% average accuracy, 5.8%p above the strongest open-source baseline, while exhibiting the smallest clean-to-corrupted accuracy drop among all compared methods.', 'score': 9, 'issue_id': 2506, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '23e810cc5b6d979a', 'authors': ['Yangfan He', 'Yujin Choi', 'Jaehong Yoon'], 'affiliations': ['NTU Singapore', 'UNIST', 'University of Minnesota, Twin Cities'], 'pdf_title_img': 'assets/pdf/title_img/2606.26904.jpg', 'data': {'categories': ['#video', '#reasoning', '#alignment', '#security', '#multimodal', '#training', '#agents', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Надёжное видеорассуждение через калиброванное взвешивание доказательств', 'desc': 'Статья решает проблему слепого доверия в видеорассуждении, где модели языка предполагают одинаковую надёжность всех кадров. Предложен фреймворк Robust-TO, который интегрирует оценку надёжности каждого кадра на всех этапах рассуждения и использует калибровочные оценки для взвешивания доказательств. Система организует различные инструменты визуального восприятия с единым интерфейсом, где каждый инструмент возвращает предсказание, временную привязку и оценку надёжности. Применение трёхуровневого синтеза доказательств и оптимизации через GRPO позволяет достичь высокой точности как на чистых данных, так и при наличии реалистичных возмущений (размытие, блики, окклюзия).'}, 'en': {'title': 'Enhancing Video Reasoning with Trustworthiness Awareness', 'desc': 'The paper introduces Robust-TO, a novel framework designed to tackle the Blind Trust Problem in video reasoning, where models mistakenly assume all input frames are equally reliable. By integrating per-frame trustworthiness into the reasoning process, Robust-TO enhances accuracy even when faced with real-world visual perturbations like motion blur or glare. The framework employs a three-tier synthesis process that weights evidence based on calibrated reliability scores, optimizing for correctness and efficiency. Experimental results show that Robust-TO significantly outperforms existing models on various benchmarks, maintaining high accuracy even under challenging conditions.'}, 'zh': {'title': '提升视频推理的可信度与准确性', 'desc': 'Robust-TO是一个视频推理框架，旨在解决盲目信任问题。该框架通过将每帧的可信度整合到推理过程中，提升了在现实干扰下的准确性。它使用可靠性评分来选择可信的帧，并在推理时对证据进行加权，从而优化正确性和效率。在多个视频推理基准测试中，Robust-TO在干净输入下的平均准确率达到56.4%，在面对现实干扰时仍保持54.3%的准确率，表现优于其他方法。'}}}, {'id': 'https://huggingface.co/papers/2606.27364', 'title': 'PhysiFormer: Learning to Simulate Mechanics in World Space', 'url': 'https://huggingface.co/papers/2606.27364', 'abstract': 'Abstract PhysiFormer uses coordinate-space diffusion to generate physically-plausible 3D object motions without explicit inductive biases, enabling efficient multi-object reasoning and generalization to complex materials and geometries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present PhysiFormer, a diffusion transformer for physically-plausible 3D object motion. Unlike video world models that operate in view-dependent pixel space, PhysiFormer represents objects as 3D meshes expressed in world coordinates. Given the initial vertex positions and velocities, as well as object material type, rigid or elastic, the model samples future vertex trajectories. While related neural physics approaches build on ad-hoc latent spaces or explicitly enforce rigidity and causality, PhysiFormer shows that excellent results can be obtained without any such inductive biases, by casting vertex trajectory prediction as a single denoising diffusion process directly in world coordinates. The probabilistic formulation captures uncertainty in the learned dynamics, enabling diverse plausible futures from initial conditions, making this framework potentially useful for applications with unobserved uncertainty. The model features attention factorised over time, space, and objects for efficiency, enabling permutation-invariant multi-object reasoning without needing explicit object encoding. Trained on over 100k simulated trajectories, PhysiFormer generates rigid and elastic mechanics, and generalises to mixed-material settings, unseen real-world geometries, and larger object counts. It substantially outperforms autoregressive baselines in trajectory accuracy, rigidity preservation, and momentum-based physical consistency. Our results position coordinate-space diffusion as a promising step toward view-invariant, geometry-aware world modelling for robotics, graphics, and physical design. Visualisations, code, and models are available at https://yimingc9.github.io/physiformer.', 'score': 9, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'cb8ae1ba18ba17c5', 'authors': ['Yiming Chen', 'Yushi Lan', 'Andrea Vedaldi'], 'affiliations': ['Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.27364.jpg', 'data': {'categories': ['#robotics', '#open_source', '#3d', '#training', '#diffusion', '#architecture'], 'emoji': '🌍', 'ru': {'title': 'Физика в координатах: диффузионный трансформер для реалистичного моделирования движений объектов', 'desc': 'PhysiFormer — это диффузионный трансформер, который предсказывает физически правдоподобные движения 3D объектов, работая непосредственно в мировых координатах вершин меша, а не в пиксельном пространстве видео. Модель использует вероятностную формулировку процесса шумоподавления, что позволяет ей генерировать разнообразные реалистичные траектории без явного внедрения индуктивных смещений для жёсткости или причинности. Архитектура основана на факторизованном внимании по времени, пространству и объектам, что обеспечивает эффективное рассуждение о нескольких объектах и инвариантность к перестановкам без явного кодирования объектов. На данных из более чем 100 тысяч симулированных траекторий модель успешно обучается моделировать твёрдую и упругую механику, хорошо обобщаясь на смешанные материалы, неизвестные геометрии и большее количество объектов.'}, 'en': {'title': 'Revolutionizing 3D Motion Prediction with Coordinate-Space Diffusion', 'desc': 'PhysiFormer is a novel diffusion transformer designed to predict realistic 3D object motions by using coordinate-space diffusion. It operates directly in world coordinates, representing objects as 3D meshes, which allows it to generate future vertex trajectories based on initial conditions and material types. Unlike traditional methods that rely on specific biases or latent spaces, PhysiFormer achieves high accuracy in motion prediction without these constraints, capturing uncertainty in dynamics. This model excels in multi-object reasoning and generalizes well to various materials and complex geometries, making it a significant advancement in the field of physics-based simulations.'}, 'zh': {'title': 'PhysiFormer：物理合理的3D运动生成新方法', 'desc': 'PhysiFormer是一种用于生成物理上合理的3D物体运动的扩散变换器。与依赖于像素空间的视频世界模型不同，PhysiFormer在世界坐标中表示物体为3D网格。该模型通过将顶点轨迹预测视为直接在世界坐标中进行的去噪扩散过程，避免了显式的归纳偏置。经过训练后，PhysiFormer在轨迹准确性和物理一致性方面显著优于自回归基线，展示了其在机器人、图形和物理设计等领域的潜在应用。'}}}, {'id': 'https://huggingface.co/papers/2606.27326', 'title': 'Hallucination in World Models is Predictable and Preventable', 'url': 'https://huggingface.co/papers/2606.27326', 'abstract': 'Abstract World models exhibit hallucinations in low-data regions of state-action space, which can be detected and mitigated using data-centric signals and coverage-aware sampling techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern generative world models render increasingly realistic action-controllable futures, yet they frequently hallucinate: rollouts remain visually fluent while drifting from the ground-truth dynamics. We hypothesize that hallucination concentrates in low-coverage regions of the state-action space, where lightweight data-centric signals can both detect it and guide mitigation. To test this, we introduce MMBench2, a 427-hour, 210-task dataset for visual world modeling with ground-truth actions, rewards, and live simulators, and train a 350M-parameter world model on it. We identify three distinct hallucination modes: perceptual, action-marginalized, and scene-diverging -- each anchored to a different stage of the pipeline, and develop three signals that accurately predict where the model will fail. To close coverage gaps at training time, we develop a coverage-aware sampling technique; to close them online, our hallucination predictors serve as curiosity rewards for targeted data collection, yielding a data-efficient finetuning recipe that adapts the pretrained world model to entirely unseen environments with as few as 50 real environment trajectories. Overall, our findings reveal that hallucination in world models is inherently a data coverage issue, and that the same signals used to detect it can also be used for mitigation.   An interactive web version of our paper is available at https://www.nicklashansen.com/mmbench2', 'score': 8, 'issue_id': 2506, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1149834beda63951', 'authors': ['Nicklas Hansen', 'Xiaolong Wang'], 'affiliations': ['UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2606.27326.jpg', 'data': {'categories': ['#video', '#dataset', '#training', '#hallucinations', '#synthetic', '#small_models'], 'emoji': '🌍', 'ru': {'title': 'Галлюцинации мировых моделей — проблема покрытия данных', 'desc': 'В работе исследуется проблема галлюцинаций в генеративных моделях мира, которые возникают в областях с недостаточным покрытием данных в пространстве состояний и действий. Авторы создали большой бенчмарк MMBench2 с 427 часами видео и 210 задачами для обучения мировой модели параметром 350M. Они выделили три типа галлюцинаций (перцептивные, связанные с маргинализацией действий и расхождением сцены) и разработали сигналы для их обнаружения. Предложены методы уменьшения галлюцинаций: coverage-aware семплирование при обучении и использование предикторов галлюцинаций как сигналов любопытства для эффективного адаптирования модели к новым окружениям.'}, 'en': {'title': 'Mitigating Hallucinations in World Models through Data Coverage', 'desc': 'This paper discusses the problem of hallucinations in world models, which occur when the model generates unrealistic predictions in areas of the state-action space with little data. The authors propose a new dataset, MMBench2, to help train a world model that can better understand and predict actions and rewards in various scenarios. They identify three types of hallucinations and develop signals to predict and mitigate these failures. By using coverage-aware sampling and curiosity rewards, the model can adapt to new environments efficiently, demonstrating that improving data coverage can significantly reduce hallucinations.'}, 'zh': {'title': '解决世界模型幻觉的关键在于数据覆盖', 'desc': '本论文探讨了世界模型在低数据区域的幻觉现象，并提出了通过数据中心信号和覆盖感知采样技术来检测和缓解这一问题。我们假设幻觉主要集中在状态-动作空间的低覆盖区域，并引入了MMBench2数据集来验证这一假设。该数据集包含427小时、210个任务的视觉世界建模数据，提供了真实的动作和奖励信息。我们的研究表明，幻觉问题与数据覆盖密切相关，使用相同的信号可以有效地检测和缓解幻觉现象。'}}}, {'id': 'https://huggingface.co/papers/2606.26080', 'title': 'Neglected Free Lunch from Post-training: Progress Advantage for LLM Agents', 'url': 'https://huggingface.co/papers/2606.26080', 'abstract': 'Abstract Reinforcement learning post-training enables effective step-level scoring for language models without requiring dedicated reward model training by deriving an implicit advantage function called progress advantage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Process reward models enable fine-grained, step-level evaluation of LLMs, yet building them for agentic settings remains prohibitively difficult: long-horizon interactions, irreversible actions, and stochastic environment feedback make both human annotation and Monte Carlo estimation infeasible at scale. In this work, we show that reinforcement learning (RL) post-training already provides the ingredients for effective step-level scoring, eliminating the need for dedicated reward model training altogether. Concretely, we derive an implicit advantage under a general stochastic Markov decision process, which we term progress advantage -- log-probability ratio between the RL-trained policy and its reference policy exactly recovers the optimal advantage function. This formulation makes the resulting signal annotation-free, domain-agnostic, and available as a byproduct of the standard RL post-training pipeline. We validate the effectiveness of the progress advantage across three different applications: test-time scaling, uncertainty quantification, and failure attribution on five benchmarks and four model families. Across all settings, it consistently outperforms confidence-based baselines and, despite requiring no task-specific training, surpasses dedicated trained reward models. We complement these results with deeper analyses on characteristics of progress advantage, offering practical guidance for adoption in real-world agentic systems.', 'score': 7, 'issue_id': 2512, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '9ac9ddf9c6b15996', 'authors': ['Changdae Oh', 'Wendi Li', 'Seongheon Park', 'Samuel Yeh', 'Tanwi Mallick', 'Sharon Li'], 'affiliations': ['Argonne National Laboratory', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.26080.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#rl', '#training', '#rlhf', '#agents', '#alignment'], 'emoji': '📈', 'ru': {'title': 'Из RL-обучения к оценке шагов без отдельных reward моделей', 'desc': 'В работе предложен новый метод оценки промежуточных шагов языковых моделей, основанный на функции прогресса-преимущества, которая вычисляется из уже обученной RL-модели без необходимости тренировки отдельной reward model. Авторы показывают, что логарифмическое отношение вероятностей между обученной политикой и эталонной политикой точно восстанавливает оптимальную функцию преимущества в стохастическом марковском процессе принятия решений. Предложенный подход не требует аннотаций человека и работает для различных задач: масштабирование на этапе вывода, квантификация неопределённости и атрибуция ошибок. Экспериментальная валидация на пяти бенчмарках и четырёх семействах моделей показывает превосходство метода над базовыми подходами и обученными reward моделями.'}, 'en': {'title': 'Revolutionizing Language Model Evaluation with Progress Advantage', 'desc': 'This paper introduces a method called progress advantage, which allows for effective step-level scoring of language models using reinforcement learning (RL) post-training. Instead of needing separate reward models, this approach derives an implicit advantage function that evaluates the performance of RL-trained policies against reference policies. The progress advantage is shown to be annotation-free and applicable across various domains, making it easier to implement in real-world scenarios. The authors validate this method through multiple applications, demonstrating its superiority over traditional confidence-based methods and dedicated reward models.'}, 'zh': {'title': '强化学习后训练：语言模型评分的新方法', 'desc': '这篇论文介绍了一种新的强化学习后训练方法，可以有效地对语言模型进行逐步评分，而无需专门训练奖励模型。研究者提出了一种称为进展优势的隐式优势函数，它通过强化学习训练的策略与参考策略之间的对数概率比来实现。该方法在多个应用场景中表现优越，包括测试时缩放、不确定性量化和故障归因，且在五个基准和四个模型家族中均优于传统的基于置信度的基线。进展优势的特点分析为在实际代理系统中的应用提供了实用指导。'}}}, {'id': 'https://huggingface.co/papers/2606.16613', 'title': 'CoffeeBench: Benchmarking Long-Horizon LLM Agents in Heterogeneous Multi-Agent Economies', 'url': 'https://huggingface.co/papers/2606.16613', 'abstract': 'Abstract CoffeeBench evaluates LLM agents in a multi-agent economic simulation where firms interact over 90 days to maximize profits, revealing diff
