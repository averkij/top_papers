erences in communication patterns and performance among various models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As LLM agents become capable of increasingly long-horizon tasks, evaluating their performance in economic systems is becoming increasingly important. Unlike existing benchmarks that primarily evaluate a single agent interacting with a passive environment, economic systems are inherently multi-agent, requiring autonomous agents to communicate, negotiate, and transact while pursuing their own objectives over extended periods. We introduce CoffeeBench, a benchmark for evaluating LLM agents in a long-horizon multi-agent economy composed of heterogeneous firms. In CoffeeBench, two farmers, two roasters, and two retailers autonomously operate their businesses over a 90-day simulation, each seeking to maximize cumulative net income through communication and transactions while managing cash, inventory, and pricing. The evaluated model controls one coffee roaster, while the remaining firms are controlled by fixed reference agents. Across several recent open-weight and proprietary LLMs, all models outperform a passive baseline that takes no actions, with most achieving positive net income. Analysis of agent behavior reveals substantial differences in long-horizon economic interaction: higher-performing models communicate more actively with other firms, whereas Claude~Haiku~4.5 exhibits an idle-drift failure mode, repeatedly choosing inaction despite producing coherent assessments and plans. We release our code and agent trajectories to support future research.', 'score': 7, 'issue_id': 2507, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'fdaf509ca06c8638', 'authors': ['Issa Sugiura', 'Daichi Hattori', 'Kazuo Araragi', 'Keita Ogawa', 'Shota Onose', 'Taro Makino', 'Teppei Usuki', 'Takashi Ishida'], 'affiliations': ['KPMG AZSA LLC', 'Sakana AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.16613.jpg', 'data': {'categories': ['#multimodal', '#long_context', '#reasoning', '#open_source', '#agents', '#benchmark'], 'emoji': '☕', 'ru': {'title': 'Общение и переговоры в многоагентной экономике — ключ к успеху LLM агентов', 'desc': 'CoffeeBench — это бенчмарк для оценки языковых моделей (LLM) в сложной многоагентной экономической симуляции, где несколько независимых фирм конкурируют на протяжении 90 дней. В симуляции участвуют фермеры, обработчики кофе и розничные продавцы, которые должны взаимодействовать, договариваться и совершать сделки для максимизации прибыли. Исследование показало, что более успешные модели активнее коммуницируют с другими агентами и лучше управляют долгосрочными решениями. Анализ выявил интересный феномен — некоторые модели демонстрируют режим отказа, когда они бездействуют несмотря на способность создавать логичные планы.'}, 'en': {'title': 'Evaluating LLM Agents in Dynamic Economic Interactions', 'desc': 'CoffeeBench is a new benchmark designed to assess the performance of large language model (LLM) agents in a multi-agent economic simulation. In this simulation, different types of firms, including farmers, roasters, and retailers, interact over a 90-day period to maximize their profits through communication and transactions. The study highlights how various LLMs differ in their communication patterns and overall effectiveness, with some models demonstrating better performance by actively engaging with other agents. The findings reveal that while most models outperform a passive baseline, certain models like Claude Haiku 4.5 struggle with inaction despite having the ability to formulate plans.'}, 'zh': {'title': 'CoffeeBench：评估多代理经济中的LLM表现', 'desc': 'CoffeeBench 是一个用于评估大型语言模型（LLM）代理在多代理经济模拟中的表现的基准。该模拟中，六个不同的公司在90天内相互作用，目标是最大化利润。研究发现，不同模型在沟通模式和表现上存在显著差异，高表现模型更积极地与其他公司交流。通过分析代理行为，发现一些模型在长时间的经济互动中表现出更好的适应性，而某些模型则出现了无所作为的失败模式。'}}}, {'id': 'https://huggingface.co/papers/2606.21795', 'title': 'Discretizing Reward Models', 'url': 'https://huggingface.co/papers/2606.21795', 'abstract': 'Abstract Reward models in reinforcement learning suffer from oversensitivity issues where they assign different scores to equally good responses, leading to poor policy learning, but this can be mitigated through discretization techniques that maintain discriminative ability while reducing oversensitivity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite their widespread use, the role of reward models in shaping reinforcement learning is poorly understood. Reward models offer a tempting promise: they automatically estimate response quality in the absence of verifiers or human judges. Unlike "verifiable rewards" which typically produce binary scores, reward models typically produce continuous scores, allowing them to be sensitive to fine-grained differences in responses. However, we show this apparent strength is a serious weakness: many popular reward models are oversensitive, assigning different scores to equally good responses. Theoretically, we show that seemingly perfect reward models can be highly oversensitive; empirically, this oversensitivity can lead to bad policies. In place of existing notions of "reward model accuracy," we propose evaluating reward models using distinct measures of "discriminative ability" and "specificity" (the complement of oversensitivity). As a solution, we describe a training-free algorithm that uses Monte Carlo dropout on any neural reward model to produce discrete reward clusters. Theoretically, we prove there exist discretizations that reduce oversensitivity at minimal expense of discriminative ability; empirically we show, in both controlled and natural RL settings, that discretizing rewards leads to less reward hacking and better policies than training on the original rewards.', 'score': 6, 'issue_id': 2506, 'pub_date': '2026-06-19', 'pub_date_card': {'ru': '19 июня', 'en': 'June 19', 'zh': '6月19日'}, 'hash': '51313e4f12956002', 'authors': ['Vijay Viswanathan', 'Shiqi Wang', 'Devamanyu Hazarika', 'Chirag Nagpal', 'Tongshuang Wu', 'Graham Neubig', 'Yuning Mao'], 'affiliations': ['Carnegie Mellon University', 'Meta Superintelligence Labs'], 'pdf_title_img': 'assets/pdf/title_img/2606.21795.jpg', 'data': {'categories': ['#rl', '#alignment', '#rlhf', '#interpretability', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Дискретизация наград: избавление от чрезмерной чувствительности моделей', 'desc': 'Исследование показывает, что модели награды в обучении с подкреплением страдают от чрезмерной чувствительности, присваивая разные баллы равноценным ответам, что негативно влияет на обучение политики. Авторы предлагают новые метрики оценки моделей награды, разделяя понятия дискриминативной способности и специфичности. Решением проблемы является алгоритм дискретизации, основанный на монте-карловском отсеве, который преобразует непрерывные оценки в дискретные кластеры без обучения. Экспериментально доказано, что дискретизация награды уменьшает переобучение системы и улучшает качество полученных политик.'}, 'en': {'title': 'Mitigating Oversensitivity in Reward Models for Better Reinforcement Learning', 'desc': "This paper addresses the problem of oversensitivity in reward models used in reinforcement learning, where models assign different scores to responses that are equally good. This issue can hinder effective policy learning, as it leads to inconsistent evaluations of response quality. The authors propose a solution through discretization techniques that create discrete reward clusters, which help maintain the model's ability to differentiate between responses while reducing oversensitivity. Their findings demonstrate that using these discretized rewards results in improved policy performance and less reward hacking compared to traditional continuous scoring methods."}, 'zh': {'title': '优化奖励模型，提升强化学习效果', 'desc': '在强化学习中，奖励模型存在过度敏感的问题，即对同样优秀的响应给予不同的评分，这会导致策略学习效果不佳。本文提出通过离散化技术来缓解这一问题，保持模型的区分能力，同时减少过度敏感性。我们提出了一种无训练算法，利用蒙特卡洛丢弃法对神经奖励模型进行处理，从而生成离散的奖励聚类。实验证明，离散化奖励可以减少奖励操控现象，并在强化学习中获得更好的策略。'}}}, {'id': 'https://huggingface.co/papers/2606.26299', 'title': 'COrigami: An AI Pipeline for Co-Designing Flat-Foldable Visually Recognisable Origami', 'url': 'https://huggingface.co/papers/2606.26299', 'abstract': 'Abstract A computational origami system generates crease patterns from natural language using AI-driven optimization and aesthetic evaluation, enabling human-AI collaboration in mathematically constrained design.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While generative AI has achieved remarkable success in solving problems with verifiable solutions, generating physical art that satisfies both strict geometric constraints and subjective visual aesthetics remains a challenge. This paper presents an approach to tackle these difficulties in the domain of computational origami, a mathematically rigid environment that grounds artistic design within the equations of flat foldability. We present COrigami, an end-to-end AI-driven pipeline that assists the design cycle by generating crease patterns from natural language. Our pipeline involves generating a semantic stick figure, computing a base packing, solving for a flat-foldable crease pattern, shaping the flat-folded crease pattern, and refining the generated model using reinforcement learning driven by an autonomous aesthetic evaluation loop. Our system acts as a highly effective collaborative assistant, generating structural starting points that human artists can further expand and shape. By integrating algorithmic optimisation with autonomous aesthetic critique, this work demonstrates how AI systems can satisfy multi-objective physical constraints to enable reliable, mathematically grounded co-creativity.', 'score': 4, 'issue_id': 2505, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '9188a0d3b779c623', 'authors': ['Tom Zahavy', 'Shaobo Hou', 'Thomas Tumiel', 'James Doran', 'Francesco Faccio', 'Xidong Feng', 'Alex Havrilla', 'Igor Khytryi', 'Chenglei Li', 'Lisa Schut', 'Vivek Veeriah', 'Arijan Abrashi', 'Michał Kosmulski', 'Robert J. Lang', 'Nick Robinson', 'Brandon Wong', 'Marcus Chiam', 'Gloria Fang', 'Satinder Singh'], 'affiliations': ['Google', 'Google DeepMind', 'Independent', 'Stanford'], 'pdf_title_img': 'assets/pdf/title_img/2606.26299.jpg', 'data': {'categories': ['#rl', '#multimodal', '#architecture'], 'emoji': '📄', 'ru': {'title': 'AI-помощник для дизайна оригами: баланс математики и красоты', 'desc': 'В статье представлена система COrigami, которая генерирует паттерны складок для оригами на основе естественного языка, используя нейросетевые подходы и оптимизацию. Система решает сложную задачу одновременного удовлетворения строгих геометрических ограничений (плоской складываемости) и субъективных эстетических критериев через reinforcement learning. Конвейер включает генерацию семантической фигурки, вычисление базовой упаковки, поиск плоскостной складываемой схемы и итеративное улучшение с использованием автономной системы эстетической оценки. Работа демонстрирует, как AI может служить эффективным соавтором для художников, предоставляя математически обоснованные стартовые точки для творческого процесса.'}, 'en': {'title': 'AI-Powered Origami: Bridging Geometry and Aesthetics', 'desc': 'This paper introduces COrigami, an AI-driven system that generates crease patterns for origami from natural language descriptions. It combines generative AI techniques with reinforcement learning to ensure that the designs meet both geometric constraints and aesthetic preferences. The system operates through a series of steps, including creating a semantic representation, computing a base packing, and refining the crease patterns based on aesthetic evaluations. By facilitating collaboration between AI and human artists, COrigami enhances the design process in computational origami, allowing for innovative and mathematically sound creations.'}, 'zh': {'title': 'AI驱动的折纸艺术共创', 'desc': '这篇论文介绍了一种计算折纸系统，能够通过自然语言生成折痕图案，结合了人工智能优化和美学评估，促进人机协作。尽管生成式人工智能在解决可验证问题上取得了显著成功，但在满足严格几何约束和主观视觉美感的物理艺术创作中仍面临挑战。论文提出了COrigami，一个端到端的AI驱动管道，能够从自然语言生成折痕图案，并通过强化学习和自主美学评估不断优化生成的模型。该系统作为高效的协作助手，为人类艺术家提供结构性起点，展示了AI如何在满足多目标物理约束的同时，实现可靠的数学基础共创。'}}}, {'id': 'https://huggingface.co/papers/2606.27288', 'title': 'When Does Combining Language Models Help? A Co-Failure Ceiling on Routing, Voting, and Mixture-of-Agents Across 67 Frontier Models', 'url': 'https://huggingface.co/papers/2606.27288', 'abstract': 'Abstract Multi-model systems face fundamental accuracy limits determined by the rate at which all models fail simultaneously, regardless of their individual correlations or ensemble strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-model LLM systems such as routing, voting, cascades, fusion, and mixture-of-agents are used to beat single-model accuracy. We show that their gain is capped by a quantity the field rarely reports. For any policy whose output is one member model answer, accuracy cannot exceed one minus beta, where beta is the rate at which every model is wrong on the same query. In contrast, the usual diagnostic, average pairwise error correlation rho, cannot identify beta: error laws with identical marginals and pairwise correlations can have different all-wrong rates. A Clopper-Pearson bound on beta gives a finite-sample certificate on the largest gain any router, vote, or cascade could deliver before training a router.   Across 67 models from 21 providers, a tetrachoric-calibrated single-factor model still underprices the all-wrong tail: on open-ended mathematics, observed beta is 0.052 versus 0.023 under the full 67-model Gaussian copula, about 2.5 times underpricing, with 90 percent CI 1.7 to 3.4 and k equals 17. The effect recurs on execution-graded code, where beta is 0.079. Re-asking the same GPQA-Diamond questions in free-response rather than multiple-choice form reopens the tail, with beta 0.127 and a five-judge panel with kappa 0.73 to 0.92, locating co-failure in answer format rather than subject. At matched quality, low-rho heterogeneous ensembles beat high-rho Self-MoA, but on checkable tasks in our pool, combining models rarely beats the single best model without a strong query-level routing signal. Gains come from models failing on different questions, not from adding more models.', 'score': 3, 'issue_id': 2508, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'ec609df560967b5e', 'authors': ['Josef Chen'], 'affiliations': ['KAIKAKU'], 'pdf_title_img': 'assets/pdf/title_img/2606.27288.jpg', 'data': {'categories': ['#multilingual', '#plp', '#benchmark'], 'emoji': '🔗', 'ru': {'title': 'Предел совместного отказа: почему ансамбли LLM не могут преодолеть общую ошибку', 'desc': 'В статье исследуются фундаментальные ограничения многомодельных систем на основе LLM, показывается, что точность ансамбля не может превышать один минус бета, где бета — это вероятность того, что все модели ошибаются на одном и том же запросе. Авторы доказывают, что обычная метрика корреляции ошибок (rho) не может выявить это ограничение, и предлагают использовать доверительные интервалы Клоппера-Пирсона для оценки максимального улучшения перед обучением маршрутизатора. На данных 67 моделей от 21 провайдеров обнаружено, что стандартные модели недооценивают вероятность совместного отказа моделей в 2,5 раза. Исследование показывает, что улучшение производительности ансамбля зависит от того, на каких вопросах модели ошибаются по-разному, а не просто от добавления большего числа моделей.'}, 'en': {'title': 'Understanding the Limits of Multi-Model Accuracy', 'desc': 'This paper discusses the limitations of multi-model systems in machine learning, particularly how their accuracy is constrained by the simultaneous failure rate of all models involved. It introduces the concept of beta, which quantifies the likelihood that all models will provide incorrect answers for the same query, thereby capping the potential accuracy of ensemble methods. The authors demonstrate that traditional metrics like average pairwise error correlation do not effectively capture this beta value, leading to underestimations of the risks associated with model failures. Ultimately, the findings suggest that improvements in accuracy are more likely to arise from models that fail on different questions rather than simply increasing the number of models in an ensemble.'}, 'zh': {'title': '多模型系统的准确性受限于共同失败的速率', 'desc': '多模型系统的准确性受到所有模型同时失败的速率限制，这个限制与模型之间的相关性或集成策略无关。本文指出，任何输出单个模型答案的策略，其准确性不能超过1减去beta，beta是所有模型在同一查询上错误的速率。通过对67个模型的分析，发现低相关性的异构集成模型在特定任务上表现优于高相关性的自我模型，但在可检查的任务中，组合模型通常无法超越单个最佳模型。最终，模型的成功来自于它们在不同问题上的失败，而不是简单地增加更多模型。'}}}, {'id': 'https://huggingface.co/papers/2606.23835', 'title': 'ABACUS: Adapting Unified Foundation Model for Bridging Image Count Understanding and Generation', 'url': 'https://huggingface.co/papers/2606.23835', 'abstract': 'Abstract ABACUS is a unified vision-language model that performs object counting and related tasks through innovative spatial grounding, boundary-aware counting policies, and self-critical learning strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct ABACUS is a unified vision-language model that handles object counting, crowd counting, referring-expression counting, and count-faithful image generation without any benchmark-specific training required. Our model is built on existing 3B-parameter unified foundation model and is adapted for object localization tasks using three key innovations: density-aware adaptive zooming with objectness maps for spatial grounding; a boundary-aware count policy via GRPO to eliminate crop-boundary errors; and a cycle-consistent GRPO strategy where the understanding branch self-critiques generated outputs, closing the understanding-generation gap without any external annotations. ABACUS achieves state-of-the-art results across seven benchmarks, outperforming both task-specific specialists and larger generalist models.', 'score': 3, 'issue_id': 2514, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'd9069ffea5ffb77c', 'authors': ['Anindya Mondal', 'Sauradip Nag', 'Anjan Dutta'], 'affiliations': ['Simon Fraser University', 'University of Surrey'], 'pdf_title_img': 'assets/pdf/title_img/2606.23835.jpg', 'data': {'categories': ['#training', '#benchmark', '#small_models', '#multimodal', '#cv'], 'emoji': '🔢', 'ru': {'title': 'Универсальный подсчёт: видение и язык в гармонии', 'desc': 'ABACUS — это унифицированная vision-language модель, которая решает задачи подсчёта объектов, включая подсчёт в толпе и генерацию изображений, без необходимости специализированного обучения на каждой задаче. Модель использует три ключевые инновации: адаптивное масштабирование с учётом плотности для пространственной привязки, граничную политику подсчёта через GRPO для исключения ошибок обрезания, и циклически-согласованную стратегию GRPO с самокритикой. Модель построена на базе трёхмиллиардной фундаментальной модели и адаптирована для задач локализации объектов. ABACUS достигает лучших результатов на семи бенчмарках, превосходя как специализированные модели, так и более крупные универсальные модели.'}, 'en': {'title': 'ABACUS: Revolutionizing Object Counting with Unified Vision-Language Learning', 'desc': 'ABACUS is a cutting-edge vision-language model designed for various counting tasks, including object and crowd counting. It introduces innovative techniques like density-aware adaptive zooming and boundary-aware counting policies to improve accuracy in spatial grounding and reduce errors. The model employs a self-critical learning approach to refine its outputs without needing additional training data. ABACUS sets new performance records across multiple benchmarks, surpassing both specialized models and larger generalist ones.'}, 'zh': {'title': 'ABACUS：统一的视觉-语言计数模型', 'desc': 'ABACUS是一种统一的视觉-语言模型，能够通过创新的空间定位、边界感知计数策略和自我批评学习策略来进行物体计数及相关任务。该模型无需针对特定基准的训练，能够处理物体计数、拥挤计数、指代表达计数和忠实计数图像生成。ABACUS基于现有的3B参数统一基础模型，并通过密度感知自适应缩放、边界感知计数策略和循环一致的自我批评策略来适应物体定位任务。该模型在七个基准测试中取得了最先进的结果，超越了任务特定的专家模型和更大的通用模型。'}}}, {'id': 'https://huggingface.co/papers/2606.21959', 'title': 'OpenBioRQ: Unsolved Biomedical Research Questions for Agents', 'url': 'https://huggingface.co/papers/2606.21959', 'abstract': "Abstract A new biomedical benchmark evaluates agentic models' ability to verify sources and avoid false citations by testing unsolved research questions with no answer keys, revealing significant failures in retrieval-grounded reasoning and tool usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A working citation looks like proof -- but the fact that a link resolves does not mean the cited paper supports the claim. I find that current agentic models rarely fabricate citations (over 99% resolve), yet roughly 15.9% link to the wrong paper. Existing benchmarks miss this failure mode: when a question has a fixed answer key, a model can reproduce the expected source from that key rather than independently verifying that the source supports the claim. I introduce \\openbiorq{}, a retrieval-grounded agentic benchmark of 12{,}553 unsolved biomedical research questions across 12 domains that treats open questions as a faithfulness-and-abstention probe. To my knowledge, this is the first biomedical benchmark to combine an agentic setting -- where the model must issue multiple tool calls -- with unsolved questions that have no answer key. Openness is verified against real follow-up evidence rather than a model's parametric knowledge. Difficulty is empirical: I anchor it on questions that three open-weight reference models fail to answer, rather than on subjective hardness labels. On this hardest subset, held-out models from the same lineage as the difficulty anchors solve only ~17%, while three independent frontier agents (Gemini-3-Pro, Opus-4.7, GPT-5.5) span a wide 29-60% range. The benchmark is thus hard, non-saturating (the best agent still leaves ~33-40\\% unsolved), and discriminating across capability tiers. Beyond difficulty, I observe agentic collapse on the hardest questions, where agents stop using their tools. For the most collapse-prone model, blocking tool access entirely barely changes its score -- so tools stop paying off exactly where they are needed most. A frozen per-question checklist raises inter-judge agreement from Spearman 0.35 to 0.82.", 'score': 3, 'issue_id': 2506, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': 'ce61723d3dff1d96', 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.21959.jpg', 'data': {'categories': ['#reasoning', '#science', '#dataset', '#healthcare', '#agents', '#hallucinations', '#benchmark', '#rag', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Когда ссылка работает, но доказывает не то: проверка честности агентивных моделей на нерешённых вопросах', 'desc': 'В работе представлен новый бенчмарк для оценки способности агентивных моделей корректно проверять источники и избегать ложного цитирования на примере нерешённых исследовательских вопросов в биомедицине, где отсутствуют правильные ответы. Авторы обнаружили критический недостаток: около 15,9% цитируемых статей не поддерживают сделанные утверждения, хотя ссылки разрешаются корректно, что пропускают существующие бенчмарки. Предложенный датасет OpenBioRQ содержит 12 553 открытых вопроса с верификацией ответов через реальные научные доказательства, что позволяет оценить верность рассуждений с использованием инструментов. На самых сложных примерах современные frontier-модели достигают только 29-60% точности, и наблюдается явление коллапса агентов, когда они перестают использовать доступные инструменты именно там, где те нужны больше всего.'}, 'en': {'title': 'Verifying Truth: A New Benchmark for Biomedical Citation Accuracy', 'desc': "This paper introduces a new benchmark called \\openbiorq{} that tests the ability of agentic models to verify sources and avoid false citations in biomedical research. It highlights that while these models rarely fabricate citations, they often link to incorrect papers, revealing a significant flaw in their retrieval-grounded reasoning. The benchmark consists of 12,553 unsolved biomedical questions, making it unique as it does not rely on answer keys, thus assessing the models' ability to independently verify claims. The findings indicate that even advanced models struggle with these challenging questions, demonstrating a phenomenon called 'agentic collapse' where models fail to utilize their tools effectively when needed most."}, 'zh': {'title': '验证引用的智能模型新基准', 'desc': '这篇论文介绍了一个新的生物医学基准，旨在评估智能模型在验证来源和避免错误引用方面的能力。研究发现，尽管当前的智能模型很少伪造引用，但大约15.9%的引用链接指向错误的论文。该基准包含12553个未解决的生物医学研究问题，要求模型在没有答案键的情况下独立验证引用的有效性。通过实证方法，该基准不仅考察了模型的能力，还揭示了在最难问题上模型使用工具的崩溃现象。'}}}, {'id': 'https://huggingface.co/papers/2606.16517', 'title': 'How Post-Training Shapes Biological Reasoning Models', 'url': 'https://huggingface.co/papers/2606.16517', 'abstract': 'Abstract Post-training stages in biological reasoning models differently affect generalization, with continued pre-training aligning models with biological language, supervised fine-tuning improving in-domain performance but reducing out-of-domain generalization, and reinforcement learning recovering out-of-domain performance when applied to well-aligned checkpoints.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific reasoning models for biology combine language models with foundation models trained on multimodal biological data, including DNA, RNA, and proteins. These models are built through post-training, yet how each stage shapes reasoning and generalization remains poorly understood. We study when post-training improves performance and when it induces over-specialization. Across genomics, transcriptomics, and proteins, we train and evaluate more than 100 biological reasoning models under controlled variation in backbone, continued pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL), measuring both in-domain (ID) and out-of-domain (OOD) performance. We find that each post-training stage reshapes generalization in a distinct way rather than contributing uniform gains. CPT improves downstream performance by aligning models with biological language. SFT consistently increases ID performance but causes OOD performance to peak early and decline as models fit the training distribution. RL, when applied to strong SFT checkpoints with aligned rewards, improves OOD performance and partially recovers generalization. These results show that biological reasoning does not improve monotonically with additional supervision or compute. Instead, performance depends on how training stages are composed. Under fixed post-training budgets, the strongest ID-OOD trade-off comes from brief SFT, larger RL allocations, and asymmetric adaptation capacity across stages.', 'score': 3, 'issue_id': 2506, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '113ec59767239b07', 'authors': ['Lukas Fesser', 'Hanlin Zhang', 'Michelle M. Li', 'Eric Wang', 'Bryan Perozzi', 'Shekoofeh Azizi', 'Sham M. Kakade', 'Marinka Zitnik'], 'affiliations': ['Google DeepMind', 'Google Research', 'Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16517.jpg', 'data': {'categories': ['#rl', '#science', '#reasoning', '#multimodal', '#training', '#benchmark', '#optimization'], 'emoji': '🧬', 'ru': {'title': 'Этапы обучения формируют обобщение биологических моделей по-разному', 'desc': 'Исследование показывает, что различные этапы обучения биологических моделей по-разному влияют на их способность к обобщению. Продолженное предварительное обучение выравнивает модели с биологическим языком, supervised fine-tuning повышает производительность на известных данных, но снижает обобщение на новые данные, а reinforcement learning восстанавливает способность к обобщению на новые примеры. Авторы обучили более 100 моделей для биологических задач с вариациями в архитектуре, и обнаружили, что оптимальный результат достигается комбинацией кратковременного fine-tuning с большим объемом reinforcement learning. Ключевой вывод состоит в том, что производительность биологических моделей зависит не только от объема обучения, но и от композиции и порядка применения различных этапов post-training.'}, 'en': {'title': 'Optimizing Biological Reasoning: The Power of Post-Training Strategies', 'desc': 'This paper investigates how different post-training methods affect the generalization abilities of biological reasoning models. It finds that continued pre-training (CPT) helps align models with biological language, enhancing their performance on specific tasks. However, supervised fine-tuning (SFT) improves performance on in-domain tasks but can hurt out-of-domain generalization. Reinforcement learning (RL) can recover out-of-domain performance when applied to well-aligned models, indicating that the combination of training stages significantly influences overall model effectiveness.'}, 'zh': {'title': '生物推理模型的训练阶段与泛化能力的关系', 'desc': '这篇论文研究了生物推理模型的后训练阶段如何影响模型的泛化能力。继续预训练可以使模型与生物语言对齐，从而提高下游性能。监督微调虽然能提升领域内表现，但会导致领域外表现下降。强化学习在合适的检查点上应用时，可以改善领域外性能，部分恢复泛化能力，表明训练阶段的组合方式对性能有重要影响。'}}}, {'id': 'https://huggingface.co/papers/2606.27277', 'title': 'EO-WM: A Physically Informed World Model for Probabilistic Earth Observation Forecasting', 'url': 'https://huggingface.co/papers/2606.27277', 'abstract': 'Abstract EO-WM is a video diffusion transformer for multispectral Earth Observation forecasting that incorporates physically informed conditioning frameworks to better capture weather-driven uncertainties in land-surface dynamics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Earth Observation (EO) forecasting aims to predict future Earth surface dynamics from satellite observations under changing meteorological conditions. In this paper, we view this task as a partially observed, weather-driven world modeling problem, in which weather acts as a conditioning signal, while forecasting remains uncertain due to sparse observations and unobserved land-surface states. However, existing methods do not fully capture this setting: deterministic models collapse uncertainty into a single future prediction, while diffusion-based methods typically treat weather variables as undifferentiated conditioning signals, and existing benchmarks focus mainly on reconstruction accuracy rather than whether forecasts respond correctly to changed weather forcing.We introduce EO-WM, a video diffusion transformer for multispectral EO forecasting. EO-WM incorporates a physically informed conditioning framework that represents meteorological forcing through a climatological baseline, weather anomalies, and cumulative physical stress signals. Specifically, it separates baseline and anomaly through distinct conditioning pathways, and accumulates anomalous forcing over time to capture sustained heat and drought stress. To evaluate weather-response behavior beyond standard metrics, we introduce two diagnostic benchmarks: an Extreme Summer Benchmark for severity-aware prediction of vegetation degradation under extreme weather, and a Seasonal Matched-Pair Benchmark for testing response fidelity under changed weather forcing. Experiments show that EO-WM reduces the error in predicted Normalized Difference Vegetation Index (NDVI) decline amplitude by a relative 5.63% and improves directional hit rate by a relative 7.80%, while remaining competitive on standard pixel-level metrics. The benchmarks and model will be made open-source at https://github.com/Luo-Z13/EO-WM.', 'score': 2, 'issue_id': 2509, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'a2752a81e5265189', 'authors': ['Junwei Luo', 'Shuai Yuan', 'Zhenya Yang', 'Yansheng Li', 'Zhe Liu', 'Hengshuang Zhao'], 'affiliations': ['The University of Hong Kong', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27277.jpg', 'data': {'categories': ['#dataset', '#video', '#diffusion', '#architecture', '#benchmark', '#open_source', '#science', '#multimodal'], 'emoji': '🌍', 'ru': {'title': 'Физически информированная диффузия для прогноза земной поверхности под влиянием погодных условий', 'desc': 'EO-WM — это видео-модель трансформера на основе диффузии для прогнозирования многоспектральных данных дистанционного зондирования Земли, которая использует физически обоснованный фреймворк кондиционирования для более точного захвата метеорологических неопределённостей в динамике земной поверхности. Модель разделяет климатологический базис и аномалии погоды через отдельные пути кондиционирования, накапливая физический стресс во времени для отражения продолжительной жары и засухи. Авторы предложили два новых диагностических бенчмарка для оценки корректности реакции прогноза на изменения метеорологических факторов, включая экстремальные сценарии. Экспериментальные результаты показывают улучшение в предсказании деградации растительности и точности направленных предсказаний по сравнению с существующими методами.'}, 'en': {'title': 'Revolutionizing Earth Observation Forecasting with EO-WM', 'desc': "The paper presents EO-WM, a video diffusion transformer designed for multispectral Earth Observation forecasting. It addresses the challenge of predicting land-surface dynamics under varying weather conditions by incorporating a physically informed conditioning framework. This framework distinguishes between baseline weather conditions and anomalies, allowing the model to better capture the effects of sustained weather stress on vegetation. The authors also introduce new benchmarks to evaluate the model's performance in responding to extreme weather events, demonstrating improved accuracy in predicting vegetation decline compared to existing methods."}, 'zh': {'title': 'EO-WM：精准捕捉天气影响的地球观测预测模型', 'desc': 'EO-WM是一种用于多光谱地球观测预测的视频扩散变换器，旨在更好地捕捉天气驱动的土地表面动态不确定性。该模型将天气作为条件信号，处理部分观测的世界建模问题，克服了现有方法在不确定性处理上的不足。EO-WM通过物理信息条件框架，将气象强迫分为气候基线、天气异常和累积物理压力信号，能够更准确地反映天气变化对植被的影响。实验结果表明，EO-WM在预测植被指数下降幅度和方向命中率方面均有显著提升。'}}}];

            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (10)', '#agi', '#alignment (4)', '#architecture (7)', '#audio', '#benchmark (11)', '#cv (5)', '#data', '#dataset (4)', '#diffusion (3)', '#ethics', '#games', '#graphs', '#hallucinations (2)', '#healthcare (1)', '#inference (1)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (9)', '#open_source (4)', '#optimization (5)', '#plp (2)', '#rag (1)', '#reasoning (7)', '#rl (6)', '#rlhf (4)', '#robotics (2)', '#science (3)', '#security (1)', '#small_models (2)', '#story_generation', '#survey (1)', '#synthetic (1)', '#training (13)', '#transfer_learning', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-27 19:38',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-27 19:38')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-27 19:38')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
