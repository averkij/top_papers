 domains, IntentGrasp is constructed through source datasets curation, intent label contextualization, and task format unification. IntentGrasp contains a large-scale training set of 262,759 instances and two evaluation sets: an All Set of 12,909 test cases and a more balanced and challenging Gem Set of 470 cases. Extensive evaluations on 20 LLMs across 7 families (including frontier models such as GPT-5.4, Gemini-3.1-Pro, and Claude-Opus-4.7) demonstrate unsatisfactory performance, with scores below 60% on All Set and below 25% on Gem set. Notably, 17 out of 20 tested models perform worse than a random-guess baseline (15.2%) on Gem Set, while the estimated human performance is ~81.1%, showing substantial room for improvement. To enhance such ability, this paper proposes Intentional Fine-Tuning (IFT), which fine-tunes the models on the training set in IntentGrasp, yielding significant gains of 30+ F1 points on All Set and 20+ points on Gem Set. Tellingly, the leave-one-domain-out (Lodo) experiments further demonstrate the strong cross-domain generalizability of IFT, verifying that it is a promising approach to substantially enhancing the intent understanding of LLMs. Overall, by benchmarking and boosting intent understanding ability, this study sheds light on a promising path towards more intentional, capable, and safe AI assistants for human benefits and social good.", 'score': 3, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '7f05e569461255b9', 'authors': ['Yuwei Yin', 'Chuyuan Li', 'Giuseppe Carenini'], 'affiliations': ['Department of Computer Science, University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2605.06832.jpg', 'data': {'categories': ['#training', '#benchmark', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Обучение LLM правильно понимать истинные намерения пользователя', 'desc': 'IntentGrasp — это комплексный бенчмарк для оценки способности больших языковых моделей понимать намерения в речи и текстах, созданный из 49 открытых корпусов 12 различных предметных областей. Оценка 20 современных LLM показала неудовлетворительные результаты: модели набирают менее 60% на основном наборе тестов и менее 25% на более сложном сбалансированном наборе. Для улучшения этих результатов авторы предложили метод Intentional Fine-Tuning (IFT), который дообучает модели на специализированном наборе данных IntentGrasp, достигая прироста более 30 пунктов F1-метрики. Эксперименты с исключением доменов показали сильную способность предложенного подхода к переносу на новые предметные области, делая IFT перспективным методом для развития более безопасных и компетентных AI-ассистентов.'}, 'en': {'title': 'Enhancing Intent Understanding in AI with IntentGrasp', 'desc': 'The paper introduces IntentGrasp, a benchmark designed to evaluate how well large language models (LLMs) understand intent in various forms of communication. It highlights that 20 tested models performed poorly, scoring below 60% on a comprehensive test set and below 25% on a more challenging subset. To improve performance, the authors propose Intentional Fine-Tuning (IFT), which significantly enhances intent understanding by fine-tuning models on the IntentGrasp training set. The results indicate that IFT can lead to substantial improvements, suggesting a pathway for developing more effective AI assistants.'}, 'zh': {'title': '提升大型语言模型的意图理解能力', 'desc': 'IntentGrasp是一个用于评估大型语言模型意图理解能力的基准，显示出20个模型的表现不佳。该基准由49个高质量的开放许可语料库构成，涵盖12个不同领域，包含262,759个训练实例。通过意图标签的上下文化和任务格式的统一，IntentGrasp提供了全面的评估工具。为提高模型的意图理解能力，本文提出了意图微调（IFT），在训练集上进行微调，显著提升了模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.08078', 'title': 'Normalizing Trajectory Models', 'url': 'https://huggingface.co/papers/2605.08078', 'abstract': "Abstract Normalizing Trajectory Models introduce a novel approach to diffusion-based generation by modeling each reverse step as an expressive conditional normalizing flow with exact likelihood training, enabling high-quality sample generation in few steps while maintaining likelihood framework.  AI-generated summary Diffusion-based models decompose sampling into many small Gaussian denoising steps -- an assumption that breaks down when generation is compressed to a few coarse transitions. Existing few-step methods address this through distillation, consistency training, or adversarial objectives, but sacrifice the likelihood framework in the process. We introduce Normalizing Trajectory Models (NTM), which models each reverse step as an expressive conditional normalizing flow with exact likelihood training. Architecturally, NTM combines shallow invertible blocks within each step with a deep parallel predictor across the trajectory, forming an end-to-end network trainable from scratch or initializable from pretrained flow-matching models. Its exact trajectory likelihood further enables self-distillation: a lightweight denoiser trained on the model's own score produces high-quality samples in four steps. On text-to-image benchmarks, NTM matches or outperforms strong image generation baselines in just four sampling steps while uniquely retaining exact likelihood over the generative trajectory.", 'score': 2, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '055cbfeb633d3381', 'authors': ['Jiatao Gu', 'Tianrong Chen', 'Ying Shen', 'David Berthelot', 'Shuangfei Zhai', 'Josh Susskind'], 'affiliations': ['Apple', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.08078.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#diffusion', '#training', '#architecture'], 'emoji': '🌊', 'ru': {'title': 'Правдоподобие в каждом шаге: диффузия без компромиссов', 'desc': 'В работе предложены Normalizing Trajectory Models — новый подход к диффузионным моделям, который представляет каждый обратный шаг как выразительный условный нормализующий поток с точным обучением по правдоподобию. Это позволяет генерировать высококачественные образцы всего за несколько шагов вместо множества шагов в традиционных диффузионных моделях. В отличие от существующих методов сжатия (дистилляция, consistency training), NTM сохраняет возможность точного расчета правдоподобия траектории генерации. Архитектура модели объединяет неглубокие обратимые блоки в каждом шаге с глубоким параллельным предсказателем, позволяя достичь выдающихся результатов в синтезе изображений за четыре шага.'}, 'en': {'title': 'Efficient and Likely: Revolutionizing Sample Generation with NTM', 'desc': 'Normalizing Trajectory Models (NTM) present a new way to generate samples using diffusion-based methods by treating each reverse step as a conditional normalizing flow. This approach allows for high-quality sample generation in just a few steps while still adhering to a likelihood framework. Unlike previous methods that compromise likelihood for efficiency, NTM maintains exact likelihood training, enabling effective self-distillation for improved sample quality. The architecture combines shallow invertible blocks with a deep predictor, achieving competitive results in text-to-image generation tasks.'}, 'zh': {'title': '正常化轨迹模型：高效生成的创新之路', 'desc': '正常化轨迹模型（NTM）提出了一种新颖的扩散生成方法，通过将每个反向步骤建模为具有精确似然训练的条件正常化流，从而实现高质量样本的生成。与传统的扩散模型不同，NTM能够在仅需少量步骤的情况下保持生成的准确性。该模型结合了浅层可逆块和深层并行预测器，形成一个可从头开始训练的端到端网络。通过自蒸馏技术，NTM在文本到图像的基准测试中，在仅四个采样步骤内生成高质量图像，且保持了生成轨迹的精确似然性。'}}}, {'id': 'https://huggingface.co/papers/2605.08044', 'title': 'Fast Byte Latent Transformer', 'url': 'https://huggingface.co/papers/2605.08044', 'abstract': "Abstract Byte-level language models overcome slow autoregressive generation through diffusion-based parallel processing and speculative decoding techniques that improve both speed and quality.  AI-generated summary Recent byte-level language models (LMs) match the performance of token-level models without relying on subword vocabularies, yet their utility is limited by slow, byte-by-byte autoregressive generation. We address this bottleneck in the Byte Latent Transformer (BLT) through new training and generation techniques. First, we introduce BLT Diffusion (BLT-D), a new model and our fastest BLT variant, trained with an auxiliary block-wise diffusion objective alongside the standard next-byte prediction loss. This enables an inference procedure that generates multiple bytes in parallel per decoding step, substantially reducing the number of forward passes required to generate a sequence. Second, we propose two extensions inspired by speculative decoding that trade some of this speed for higher generation quality: BLT Self-speculation (BLT-S), in which BLT's local decoder continues generating past its normal patch boundaries to draft bytes, which are then verified with a single full-model forward pass; and BLT Diffusion+Verification (BLT-DV), which augments BLT-D with an autoregressive verification step after diffusion-based generation. All methods may achieve an estimated memory-bandwidth cost over 50% lower than BLT on generation tasks. Each approach offers its own unique advantages, together removing key barriers to the practical use of byte-level LMs.", 'score': 2, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'd2a48ff1875722fa', 'authors': ['Julie Kallini', 'Artidoro Pagnoni', 'Tomasz Limisiewicz', 'Gargi Ghosh', 'Luke Zettlemoyer', 'Christopher Potts', 'Xiaochuang Han', 'Srinivasan Iyer'], 'affiliations': ['FAIR at Meta', 'Stanford University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.08044.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Параллельная генерация текста в байт-уровневых моделях через диффузию и верификацию', 'desc': 'В работе предлагаются методы ускорения автарегрессивной генерации текста в байт-уровневых языковых моделях. Основной подход BLT Diffusion использует вспомогательную блочную диффузионную цель при обучении, что позволяет генерировать несколько байтов параллельно на каждом шаге декодирования. Авторы также представляют два расширения, вдохновленные спекулятивным декодированием: BLT Self-speculation, где локальный декодер генерирует драфт-байты за границами патча, и BLT Diffusion+Verification, объединяющий диффузионную генерацию с аутарегрессивной верификацией. Все предложенные методы снижают пиковое потребление памяти на более чем 50% по сравнению с базовой моделью при сохранении или улучшении качества генерации.'}, 'en': {'title': 'Speed and Quality Revolution in Byte-Level Language Models', 'desc': 'This paper presents the Byte Latent Transformer (BLT), a new type of byte-level language model that improves the speed and quality of text generation. It introduces BLT Diffusion (BLT-D), which allows for parallel byte generation, significantly speeding up the process compared to traditional autoregressive methods. Additionally, the paper explores two techniques, BLT Self-speculation and BLT Diffusion+Verification, which enhance generation quality by incorporating verification steps. Overall, these innovations reduce memory bandwidth costs and make byte-level models more practical for real-world applications.'}, 'zh': {'title': '提升字节级语言模型生成速度与质量的创新方法', 'desc': '本文介绍了一种新的字节级语言模型，称为字节潜在变换器（BLT），旨在解决传统自回归生成速度慢的问题。通过引入BLT扩散（BLT-D）模型，采用辅助的块级扩散目标，允许在解码步骤中并行生成多个字节，从而显著减少生成序列所需的前向传递次数。此外，文章还提出了两种基于推测解码的扩展方法，分别是BLT自我推测（BLT-S）和BLT扩散+验证（BLT-DV），以提高生成质量。所有方法在生成任务中都能实现超过50%的内存带宽成本降低，推动了字节级语言模型的实际应用。'}}}, {'id': 'https://huggingface.co/papers/2605.06628', 'title': 'LiVeAction: a Lightweight, Versatile, and Asymmetric Neural Codec Design for Real-time Operation', 'url': 'https://huggingface.co/papers/2605.06628', 'abstract': 'Abstract LiVeAction is a lightweight neural codec architecture that improves rate-distortion performance for resource-constrained devices by using an FFT-like structure and variance-based rate penalty instead of adversarial losses.  AI-generated summary Modern sensors generate rich, high-fidelity data, yet applications operating on wearable or remote sensing devices remain constrained by bandwidth and power budgets. Standardized codecs such as JPEG and MPEG achieve efficient trade-offs between bitrate and perceptual quality but are designed for human perception, limiting their applicability to machine-perception tasks and non-traditional modalities such as spatial audio arrays, hyperspectral images, and 3D medical images. General-purpose compression schemes based on scalar quantization or resolution reduction are broadly applicable but fail to exploit inherent signal redundancies, resulting in suboptimal rate-distortion performance. Recent generative neural codecs, or tokenizers, model complex signal dependencies but are often over-parameterized, data-hungry, and modality-specific, making them impractical for resource-constrained environments. We introduce a Lightweight, Versatile, and Asymmetric neural codec architecture (LiVeAction), that addresses these limitations through two key ideas. (1) To reduce the complexity of the encoder to meet the resource constraints of the execution environments, we impose an FFT-like structure and reduce the overall size and depth of the neural-network-based analysis transform. (2) To allow arbitrary signal modalities and simplify training, we replace adversarial and perceptual losses with a variance-based rate penalty. Our design produces codecs that deliver superior rate-distortion performance compared to state-of-the-art generative tokenizers, while remaining practical for deployment on low-power sensors. We release our code, experiments, and python library at https://github.com/UT-SysML/liveaction .', 'score': 2, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '65ed2efcb99ef758', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '📦', 'ru': {'title': 'Компактный нейронный кодек для устройств с ограниченной мощностью', 'desc': 'LiVeAction — это лёгкая архитектура нейронного кодека, предназначенная для сжатия данных на устройствах с ограниченными ресурсами. Авторы используют FFT-подобную структуру в энкодере для снижения вычислительной сложности и заменяют adversarial-потери на штраф на основе дисперсии, что упрощает обучение и делает метод универсальным для разных модальностей сигналов. Предложенный подход достигает лучшего баланса между битрейтом и качеством по сравнению с современными генеративными кодеками, оставаясь практичным для развёртывания на маломощных датчиках и мобильных устройствах. Кодек эффективно работает с разнообразными типами данных, включая гиперспектральные изображения, пространственный звук и 3D медицинские снимки.'}, 'en': {'title': 'Efficient Neural Codec for Resource-Constrained Devices', 'desc': 'LiVeAction is a novel neural codec architecture designed to enhance rate-distortion performance for devices with limited resources. It utilizes an FFT-like structure to simplify the encoder, making it less complex and more efficient for low-power environments. Instead of relying on adversarial losses, it employs a variance-based rate penalty, allowing it to handle various signal types effectively. This approach results in superior performance compared to existing generative tokenizers, making it suitable for applications in wearable and remote sensing technologies.'}, 'zh': {'title': '轻量级神经编解码器，提升资源受限设备性能', 'desc': 'LiVeAction是一种轻量级神经编解码器架构，旨在提高资源受限设备的比特率-失真性能。它采用类似FFT的结构和基于方差的速率惩罚，取代了对抗损失，从而降低了编码器的复杂性。该架构能够处理多种信号模态，简化了训练过程，并且在低功耗传感器上实现了优越的性能。与现有的生成性编码器相比，LiVeAction在保持高效性的同时，适应了资源受限环境的需求。'}}}, {'id': 'https://huggingface.co/papers/2602.03473', 'title': 'Scaling Continual Learning to 300+ Tasks with Bi-Level Routing Mixture-of-Experts', 'url': 'https://huggingface.co/papers/2602.03473', 'abstract': 'Abstract A novel continual learning framework called CaRE with a bi-level routing mixture-of-experts mechanism is proposed for class-incremental learning, demonstrating superior performance on very long task sequences exceeding 300 tasks.  AI-generated summary Continual learning, especially class-incremental learning (CIL), on the basis of a pre-trained model (PTM) has garnered substantial research interest in recent years. However, how to effectively learn both discriminative and comprehensive feature representations while maintaining stability and plasticity over very long task sequences remains an open problem. We propose CaRE, a scalable {C}ontinual Le{a}rner with efficient Bi-Level {R}outing Mixture-of-{E}xperts (BR-MoE). The core idea of BR-MoE is a bi-level routing mechanism: a router selection stage that dynamically activates relevant task-specific routers, followed by an expert routing phase that dynamically activates and aggregates experts, aiming to inject discriminative and comprehensive representations into every intermediate network layer. On the other hand, we introduce a challenging dataset, OmniBenchmark-1K, for CIL performance evaluation on very long task sequences with hundreds of tasks. Extensive experiments show that CaRE demonstrates leading performance across a variety of datasets and task settings, including commonly used CIL datasets with classical CIL settings (e.g., 5-20 tasks). To the best of our knowledge, CaRE is the first continual learner that scales to very long task sequences (ranging from 100 to over 300 non-overlapping tasks), while outperforming all baselines by a large margin on such task sequences. We hope that this work will inspire further research into continual learning over extremely long task sequences. Code and dataset are publicly released at https://github.com/LMMMEng/CaRE.', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '0060aa6237218ae4', 'authors': ['Meng Lou', 'Yunxiang Fu', 'Yizhou Yu'], 'affiliations': ['Center for Embodied Artificial Intelligence and Computer Vision, Shenzhen Loop Area Institute', 'School of Computing and Data Science, The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2602.03473.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Непрерывное обучение на бесконечных потоках данных через интеллектуальную маршрутизацию экспертов', 'desc': 'В статье предлагается CaRE — фреймворк для непрерывного обучения с двухуровневым механизмом маршрутизации смеси экспертов, который эффективно решает задачу пошагового обучения новым классам. Основная идея заключается в динамической активации специализированных маршрутизаторов и экспертов на каждом слое сети для получения дискриминативных и полных представлений признаков. Авторы вводят новый бенчмарк OmniBenchmark-1K для оценки алгоритмов непрерывного обучения на очень длинных последовательностях задач (более 300). Экспериментальные результаты показывают, что CaRE превосходит все базовые методы и впервые масштабируется до таких длинных последовательностей задач, сохраняя баланс между стабильностью и пластичностью модели.'}, 'en': {'title': 'CaRE: Mastering Continual Learning with Dynamic Expert Routing', 'desc': 'The paper introduces CaRE, a new framework for continual learning that excels in class-incremental learning (CIL) with very long task sequences. It employs a bi-level routing mixture-of-experts (BR-MoE) mechanism, which allows for dynamic selection and aggregation of task-specific routers and experts. This approach helps the model learn both detailed and broad feature representations while maintaining stability and adaptability. The authors also present a new dataset, OmniBenchmark-1K, to evaluate CIL performance across hundreds of tasks, demonstrating that CaRE significantly outperforms existing methods.'}, 'zh': {'title': 'CaRE：应对超长任务序列的持续学习新框架', 'desc': '本文提出了一种新的持续学习框架CaRE，采用双层路由混合专家机制，专门用于类增量学习。CaRE能够在超过300个任务的长序列上表现出色，解决了在保持稳定性和可塑性同时有效学习特征表示的问题。其核心思想是通过动态激活任务特定的路由器和专家，注入区分性和全面性的表示到每个中间网络层。我们还引入了一个新的数据集OmniBenchmark-1K，用于评估在长任务序列上的持续学习性能。'}}}, {'id': 'https://huggingface.co/papers/2605.07510', 'title': 'InterLV-Search: Benchmarking Interleaved Multimodal Agentic Search', 'url': 'https://huggingface.co/papers/2605.07510', 'abstract': "Abstract InterLV-Search benchmark evaluates interleaved language-vision agentic search by repeatedly using textual and visual evidence to condition later search, revealing current systems' limitations in visual evidence seeking and multimodal evidence integration.  AI-generated summary Existing benchmarks for multimodal agentic search evaluate multimodal search and visual browsing, but visual evidence is either confined to the input or treated as an answer endpoint rather than part of an interleaved search trajectory. We introduce InterLV-Search, a benchmark for Interleaved Language-Vision Agentic Search, in which textual and visual evidence is repeatedly used to condition later search. It contains 2,061 examples across three levels: active visual evidence seeking, controlled offline interleaved multimodal search, and open-web interleaved multimodal search. Beyond existing benchmarks, it also includes multimodal multi-branch samples that involve comparison between multiple entities during the evidence search. We construct Level 1 and Level 2 with automated pipelines and Level 3 with a machine-led, human-supervised open-web pipeline. We further provide InterLV-Agent for standardized tool use, trajectory logging, and evaluation. Experiments on proprietary and open-source multimodal agents show that current systems remain far from solving interleaved multimodal search, with the best model below 50% overall accuracy, highlighting challenges in visual evidence seeking, search control, and multimodal evidence integration. We release the benchmark data and evaluation code at https://github.com/hbhalpha/InterLV-Search-Bench", 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '27cd41dfd3a2d996', 'authors': ['Bohan Hou', 'Jiuning Gu', 'Jiayan Guo', 'Ronghao Dang', 'Sicong Leng', 'Xin Li', 'Xuemeng Song', 'Jianfei Yang'], 'affiliations': ['Damo Academy, Alibaba Group', 'Nanyang Technological University', 'Shandong University', 'Southern University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.07510.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Переплетение текста и изображений: оценка интеллектуального мультимодального поиска', 'desc': 'В работе представлен бенчмарк InterLV-Search для оценки агентских систем мультимодального поиска, которые чередуют использование текстовой и визуальной информации для последовательного уточнения поисковых запросов. Бенчмарк содержит 2061 пример, включая задачи активного поиска визуальных доказательств, контролируемый оффлайн поиск и поиск в открытом интернете, а также мультивещественные примеры для сравнения нескольких объектов. Авторы показали, что современные мультимодальные агенты достигают точности ниже 50%, выявив критические проблемы в поиске визуальных доказательств, управлении поиском и интеграции мультимодальной информации. Исследование демонстрирует необходимость развития более совершенных методов для обработки взаимосвязанной последовательности текстовых и визуальных сигналов в задачах агентского поиска.'}, 'en': {'title': 'Revolutionizing Multimodal Search with InterLV-Search', 'desc': 'The paper introduces the InterLV-Search benchmark, which evaluates how well AI systems can perform interleaved language-vision searches using both text and images. Unlike previous benchmarks, this new framework allows for continuous use of visual evidence throughout the search process rather than just at the beginning or end. It includes a diverse set of examples that challenge current models to improve their ability to seek visual evidence and integrate multimodal information effectively. The results show that existing systems struggle with these tasks, achieving less than 50% accuracy, indicating significant room for improvement in multimodal search capabilities.'}, 'zh': {'title': '交错语言-视觉智能搜索的新基准', 'desc': 'InterLV-Search基准测试评估交错的语言-视觉智能搜索，强调了当前系统在视觉证据寻求和多模态证据整合方面的局限性。该基准包含2061个示例，分为三个层次，涵盖主动视觉证据寻求、受控的离线交错多模态搜索和开放网络交错多模态搜索。与现有基准不同，它还包括多模态多分支样本，涉及在证据搜索过程中对多个实体的比较。实验结果表明，当前系统在解决交错多模态搜索方面仍然面临重大挑战，最佳模型的整体准确率低于50%。'}}}, {'id': 'https://huggingface.co/papers/2605.05558', 'title': 'Who Prices Cognitive Labor in the Age of Agents? Compute-Anchored Wages', 'url': 'https://huggingface.co/papers/2605.05558', 'abstract': 'Abstract AI agents function as a production technology converting compute capital into cognitive labor, shifting the wage-setting mechanism from labor markets to compute capital markets.  AI-generated summary A natural intuition about the economics of AI agents is that, because agents can be replicated at very low marginal cost, agent labor may be supplied highly elastically, placing downward pressure on cognitive-labor wages when it closely substitutes for human labor. We argue this framing is wrong in mechanism but partially correct in conclusion, and that the correction matters for both theory and policy. Agents are not labor; they are a production technology that converts compute capital K_c into effective units of cognitive labor L_A. Once this is recognized, the elastic-supply margin that anchors the equilibrium wage migrates from the labor market to the compute capital market. Building on the classic factor-pricing framework mankiw2020, we derive a Compute-Anchored Wage (CAW) bound stating that, on tasks where human and agent-produced cognitive labor are substitutes, the competitive human wage is bounded above by λcdot k cdot r_c, where r_c is the rental rate of compute capital, k is the compute intensity of one effective agent-produced cognitive labor unit, and λ is the relative human-to-agent productivity. We generalize the result through constant elasticity of substitution (CES) aggregation, separate substitutable from complementary tasks, and discuss factor-share consequences. The conclusion is concise: the price-setter for cognitive labor is no longer the labor market.', 'score': 1, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '65446b3d4f537ae9', 'authors': ['Siqi Zhu'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.05558.jpg', 'data': {'categories': ['#science', '#agents'], 'emoji': '💰', 'ru': {'title': 'Когда ценообразование труда зависит от цены GPU', 'desc': 'В работе авторы переосмысляют экономику AI-агентов, утверждая, что они не являются трудовыми ресурсами, а представляют собой производственную технологию, конвертирующую вычислительный капитал в когнитивный труд. Они выводят границу Compute-Anchored Wage (CAW), которая связывает заработную плату человека с ценой вычислительных ресурсов, интенсивностью вычислений и относительной производительностью. Анализ проводится в рамках классического фреймворка ценообразования факторов производства с использованием CES-функций для разделения задач на взаимозаменяемые и дополняющие. Ключевой вывод: рыночные механизмы определения цены когнитивного труда смещаются из рынка труда на рынок вычислительного капитала.'}, 'en': {'title': 'AI Agents: Redefining Wage Dynamics through Compute Capital', 'desc': 'This paper discusses how AI agents act as a new form of production technology that transforms compute capital into cognitive labor. It argues that instead of AI agents being treated as labor, they should be seen as a technology that influences wage-setting through compute capital markets. The authors introduce the concept of Compute-Anchored Wage (CAW), which indicates that human wages are now influenced by the cost of compute capital rather than traditional labor market dynamics. This shift has important implications for economic theory and policy regarding the relationship between human and AI-generated labor.'}, 'zh': {'title': '人工智能代理：重新定义认知劳动的工资机制', 'desc': '这篇论文探讨了人工智能代理作为一种生产技术的作用，它将计算资本转化为认知劳动。由于代理可以以极低的边际成本复制，因此它们的劳动供应可能会非常灵活，从而对人类劳动的工资产生下行压力。作者认为，代理并不是劳动，而是一种将计算资本转化为有效认知劳动的技术。这一认识改变了工资的平衡机制，使其从劳动市场转向计算资本市场。'}}}, {'id': 'https://huggingface.co/papers/2605.05781', 'title': 'Steering Visual Generation in Unified Multimodal Models with Understanding Supervision', 'url': 'https://huggingface.co/papers/2605.05781', 'abstract': 'Abstract Understanding-oriented post-training framework enhances generative models by using comprehension tasks as supervisory signals for improved image generation and editing.  AI-generated summary Unified multimodal models are envisioned to bridge the gap between understanding and generation. Yet, to achieve competitive performance, state-of-the-art models adopt largely decoupled understanding and generation components. This design, while effective for individual tasks, weakens the connection required for mutual enhancement, leaving the potential synergy empirically uncertain. We propose to explicitly restore this synergy by introducing Understanding-Oriented Post-Training (UNO), a lightweight framework that treats understanding not only as a distinct task, but also a direct supervisory signal to steer generative representations. By incorporating objectives that encode semantic abstraction (captioning) and structural details (visual regression), we enable effective gradient flow from understanding to generation. Extensive experiments on image generation and editing demonstrate that understanding can serve as an effective catalyst for generation.', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'b3ac560b78d11ea7', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Понимание как учитель генерации: объединение зрения и синтеза', 'desc': 'В этой работе предлагается фреймворк Understanding-Oriented Post-Training (UNO), который объединяет задачи понимания изображений с генеративными моделями. Авторы показывают, что задачи компьютерного зрения, такие как генерация описаний и визуальная регрессия, могут служить сигналами для обучения генеративных компонент. Через явное соединение путей градиентов между пониманием и генерацией удается значительно улучшить качество синтеза и редактирования изображений. Исследование подтверждает, что понимание визуального контента действительно может эффективно усиливать способности генеративных моделей к созданию и модификации изображений.'}, 'en': {'title': 'Bridging Understanding and Generation for Better AI Images', 'desc': 'The paper introduces the Understanding-Oriented Post-Training (UNO) framework, which enhances generative models by using understanding tasks as guiding signals for better image generation and editing. It addresses the issue of decoupled understanding and generation components in existing models, which limits their performance. By integrating understanding tasks like captioning and visual regression, UNO allows for improved gradient flow from understanding to generation. The results show that this approach effectively boosts the quality of AI-generated images by leveraging the synergy between understanding and generation.'}, 'zh': {'title': '理解促进生成的创新框架', 'desc': '本文提出了一种理解导向的后训练框架（UNO），旨在通过理解任务作为监督信号来增强生成模型的性能。该框架将理解视为不仅是独立任务，还直接影响生成表示的信号，从而恢复理解与生成之间的协同作用。通过引入编码语义抽象（如图像描述）和结构细节（如视觉回归）的目标，促进了理解到生成的有效梯度流。实验结果表明，理解可以有效地促进生成过程，提升图像生成和编辑的效果。'}}}, {'id': 'https://huggingface.co/papers/2605.06221', 'title': 'UniPrefill: Universal Long-Context Prefill Acceleration via Block-wise Dynamic Sparsification', 'url': 'https://huggingface.co/papers/2605.06221', 'abstract': "Abstract UniPrefill is a prefill acceleration framework that works across various model architectures and integrates seamlessly with vLLM to improve long-context inference efficiency.  AI-generated summary As large language models (LLMs) continue to advance rapidly, they are becoming increasingly capable while simultaneously demanding ever-longer context lengths. To improve the inference efficiency of long-context processing, several novel low-complexity hybrid architectures have recently been proposed, effectively alleviating the computational burden of long-context inference. However, existing research on long-context prefill acceleration remains predominantly focused on sparse attention mechanisms, which achieve their maximum speedup only on full-attention models. When transferred to emerging architectures--such as linear/full attention hybrids or sliding window/full attention hybrids--these prefill acceleration approaches suffer significant performance degradation. Furthermore, such methods are generally incompatible with continuous batching, making them difficult to integrate into modern inference engines such as vLLM. To this end, we propose UniPrefill, a prefill acceleration framework applicable to virtually any model architecture, which directly accelerates the model's computation at the token level. We further implement UniPrefill as a continuous batching operator and extend vLLM's scheduling strategy to natively support prefill-decode co-processing and tensor parallel for UniPrefill, enabling its seamless integration into vLLM. UniPrefill achieves up to 2.1x speedup in Time-To-First-Token (TTFT), with the acceleration becoming increasingly pronounced as the number of concurrent requests grows.", 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd4c6c44ada3db11c', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#optimization', '#open_source', '#architecture', '#long_context', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Универсальное ускорение префилла для любых архитектур LLM', 'desc': 'UniPrefill — это фреймворк для ускорения фазы префилл-обработки, который работает со множеством архитектур моделей и интегрируется с vLLM. Подход решает проблему неэффективности существующих методов ускорения на гибридных архитектурах (линейное внимание + полное внимание, скользящее окно + полное внимание), которые страдают от деградации производительности при переносе между моделями. Метод ускоряет вычисления на уровне токенов и реализован как оператор с непрерывной батчеризацией, позволяя одновременно обрабатывать фазы префилл и декодирования. Фреймворк достигает ускорения до 2.1x по метрике Time-To-First-Token, причём эффект ускорения растёт с увеличением числа одновременных запросов.'}, 'en': {'title': 'Accelerating Long-Context Inference with UniPrefill', 'desc': 'UniPrefill is a framework designed to speed up the prefill process in various model architectures, enhancing the efficiency of long-context inference. It addresses the limitations of existing methods that primarily focus on sparse attention mechanisms, which do not perform well with newer hybrid architectures. By operating at the token level, UniPrefill allows for continuous batching and integrates smoothly with the vLLM inference engine. This results in significant improvements in Time-To-First-Token (TTFT), achieving up to 2.1 times faster processing as the number of requests increases.'}, 'zh': {'title': 'UniPrefill：提升长上下文推理效率的加速框架', 'desc': 'UniPrefill 是一个预填充加速框架，能够在多种模型架构中工作，并与 vLLM 无缝集成，以提高长上下文推理的效率。随着大型语言模型（LLMs）的快速发展，它们对上下文长度的需求也在不断增加。UniPrefill 通过在令牌级别直接加速模型计算，解决了现有方法在新兴架构中性能下降的问题。该框架实现了连续批处理操作，并扩展了 vLLM 的调度策略，使其能够支持预填充-解码协同处理，最终实现了高达 2.1 倍的首次令牌时间加速。'}}}, {'id': 'https://huggingface.co/papers/2605.06380', 'title': 'Empirical Evidence for Simply Connected Decision Regions in Image Classifiers', 'url': 'https://huggingface.co/papers/2605.06380', 'abstract': 'Abstract Decision regions in deep neural networks exhibit simple connectivity, demonstrated through quad-mesh filling procedures and Coons patch analysis.  AI-generated summary Understanding the topology of decision regions is central to explaining the inner workings of deep neural networks. Prior empirical work has provided evidence that these regions are path connected. We study a stronger topological question: whether closed loops inside a decision region can be contracted without leaving that region. To this end, we propose an iterative quad-mesh filling procedure that constructs a finite-resolution label-preserving surface bounded by a given loop and lying entirely within the same decision region. We further connect this construction to natural Coons patches in order to quantify its deviation from a canonical geometric interpolation of the loop. By evaluating our method across several modern image-classification models, we provide empirical evidence supporting the hypothesis that decision regions in deep neural networks are not only path connected, but also simply connected.', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'edf3e5f5f2f5dbb2', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Простая связность областей решения в глубоких нейронных сетях', 'desc': 'В работе исследуется топология областей принятия решений в глубоких нейронных сетях. Авторы предлагают итеративный алгоритм заполнения четырёхугольной сетки, который строит поверхность внутри единой области решения, ограниченную замкнутым контуром. Метод связывает эту конструкцию с патчами Кунса для анализа отклонения от каноничной геометрической интерполяции. На примере современных моделей классификации изображений демонстрируется, что области решения в нейронных сетях не только связны по путям, но и просто связны.'}, 'en': {'title': 'Exploring Simple Connectivity in Neural Network Decision Regions', 'desc': 'This paper investigates the topology of decision regions in deep neural networks, focusing on their connectivity properties. The authors propose a method to analyze whether closed loops within these regions can be contracted without leaving the region, indicating a stronger form of connectivity known as simple connectivity. They introduce an iterative quad-mesh filling procedure to create a surface that remains within the decision region while preserving labels. Through experiments on various image-classification models, the study provides evidence that these decision regions are not only path connected but also simply connected, enhancing our understanding of neural network behavior.'}, 'zh': {'title': '深度神经网络的决策区域：简单连通性探究', 'desc': '深度神经网络中的决策区域表现出简单的连通性，这通过四边形网格填充程序和Coons补丁分析得以证明。理解决策区域的拓扑结构对于解释深度神经网络的内部工作原理至关重要。我们提出了一种迭代的四边形网格填充程序，构建了一个有限分辨率的标签保持表面，该表面完全位于同一决策区域内。通过对多个现代图像分类模型的评估，我们提供了实证证据，支持深度神经网络中的决策区域不仅是路径连通的，而且是简单连通的。'}}}, {'id': 'https://huggingface.co/papers/2605.05838', 'title': 'MDN: Parallelizing Stepwise Momentum for Delta Linear Attention', 'url': 'https://huggingface.co/papers/2605.05838', 'abstract': 'Abstract Linear attention models face challenges with information decay and convergence, which are addressed through a momentum-based approach that improves training efficiency and performance over existing models like Mamba2 and GDN.  AI-generated summary Linear Attention (LA) offers a promising paradigm for scaling large language models (LLMs) to long sequences by avoiding the quadratic complexity of self-attention. Recent LA models such as Mamba2 and GDN interpret linear recurrences as closed-form online stochastic gradient descent (SGD), but naive SGD updates suffer from rapid information decay and suboptimal convergence in optimization. While momentum-based optimizers provide a natural remedy, they pose challenges in simultaneously achieving training efficiency and effectiveness. To address this, we develop a chunkwise parallel algorithm for LA with a stepwise momentum rule by geometrically reordering the update coefficients. Further, from a dynamical systems perspective, we analyze the momentum-based recurrence as a second-order system that introduces complex conjugate eigenvalues. This analysis guides the design of stable gating constraints. The resulting model, Momentum DeltaNet (MDN), leverages Triton kernels to achieve comparable training throughput with competitive linear models such as Mamba2 and KDA. Extensive experiments on the 400M and 1.3B parameter models demonstrate consistent performance improvements over strong baselines, including Transformers, Mamba2 and GDN, across diverse downstream evaluation benchmarks. Code: https://github.com/HuuYuLong/MomentumDeltaNet .', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'aff91be5da995dd9', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#small_models', '#optimization', '#training', '#open_source', '#long_context', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Momentum для линейного внимания: стабильность через импульс', 'desc': 'В работе предложен новый подход к линейным моделям внимания, который решает проблемы потери информации и медленной сходимости, используя импульс (momentum) в оптимизаторе. Авторы разработали параллельный алгоритм с пошаговым правилом momentum и геометрической переупорядочкой коэффициентов обновления для эффективного обучения. Анализ модели с точки зрения динамических систем показал, что momentum вводит комплексные собственные значения, на основе чего были спроектированы стабильные ограничения. Полученная модель Momentum DeltaNet (MDN) демонстрирует лучшую производительность чем Mamba2, GDN и Transformers на моделях размером 400M и 1.3B параметров.'}, 'en': {'title': 'Momentum DeltaNet: Enhancing Linear Attention with Momentum for Better Performance', 'desc': 'This paper introduces Momentum DeltaNet (MDN), a linear attention model that enhances training efficiency and performance by addressing issues of information decay and convergence. The authors propose a chunkwise parallel algorithm that utilizes a stepwise momentum rule, improving the optimization process compared to traditional methods. By analyzing the model from a dynamical systems perspective, they ensure stability in the update process through the introduction of gating constraints. Extensive experiments show that MDN outperforms existing models like Mamba2 and GDN on various benchmarks, demonstrating its effectiveness in scaling large language models.'}, 'zh': {'title': '动量优化，提升线性注意力模型性能', 'desc': '线性注意力模型在信息衰减和收敛方面面临挑战。本文提出了一种基于动量的方法，旨在提高训练效率和性能，超越现有模型如Mamba2和GDN。我们开发了一种分块并行算法，结合逐步动量规则，优化了更新系数的几何排序。最终的Momentum DeltaNet模型在多个基准测试中表现出色，显示出相较于强基线模型的持续性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.06702', 'title': 'CASCADE: Case-Based Continual Adaptation for Large Language Models During Deployment', 'url': 'https://huggingface.co/papers/2605.06702', 'abstract': 'Abstract Deployment-time learning enables large language model agents to adapt continuously during operation through episodic memory and contextual bandit optimization, improving performance across diverse tasks.  AI-generated summary Large language models (LLMs) have become a central foundation of modern artificial intelligence, yet their lifecycle remains constrained by a rigid separation between training and deployment, after which learning effectively ceases. This limitation contrasts with natural intelligence, which continually adapts through interaction with its environment. In this paper, we formalise deployment-time learning (DTL) as the third stage in the LLM lifecycle that enables LLM agents to improve from experience during deployment without modifying model parameters. We present CASCADE (CASe-based Continual Adaptation during DEployment), a general and principled framework that equips LLM agents with an explicit, evolving episodic memory. CASCADE formulates experience reuse as a contextual bandit problem, enabling principled exploration-exploitation trade-offs and establishing no-regret guarantees over long-term interactions. This design allows agents to accumulate, select, and refine task-relevant cases, transforming past experience into actionable knowledge. Across 16 diverse tasks spanning medical diagnosis, legal analysis, code generation, web search, tool use, and embodied interaction, CASCADE improves macro-averaged success rate by 20.9% over zero-shot prompting while consistently outperforming gradient-based and memory-based baselines. By reframing deployment as an adaptive learning process, this work establishes a foundation for continually improving AI systems.', 'score': 1, 'issue_id': 2193, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'd01703efb8e79a30', 'authors': ['Siyuan Guo', 'Yali Du', 'Hechang Chen', 'Yi Chang', 'Jun Wang'], 'affiliations': ['Hechang Chen', 'Jun Wang', 'Siyuan Guo', 'Yali Du', 'Yi Chang'], 'pdf_title_img': 'assets/pdf/title_img/2605.06702.jpg', 'data': {'categories': ['#training', '#rl', '#healthcare', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Обучение больших моделей прямо во время работы через память и оптимизацию опыта', 'desc': 'Статья описывает развёртывание-ориентированное обучение (DTL) для больших языковых моделей, которое позволяет агентам улучшаться во время работы без изменения параметров модели. Авторы представляют фреймворк CASCADE, который использует эпизодическую память и решает задачу контекстного многорукого бандита для оптимизации выбора прошлых примеров. Система накапливает, отбирает и уточняет релевантные случаи из опыта, преобразуя их в практически полезное знание с гарантиями отсутствия сожаления. CASCADE продемонстрировал улучшение успеха на 20,9% на 16 различных задачах, включая медицинскую диагностику, анализ юридических документов и написание кода.'}, 'en': {'title': 'Empowering AI: Learning on the Fly with CASCADE', 'desc': 'This paper introduces deployment-time learning (DTL) as a new phase in the lifecycle of large language models (LLMs), allowing them to learn and adapt while in use. The authors present CASCADE, a framework that utilizes episodic memory to help LLM agents improve their performance based on past experiences without changing their underlying model parameters. By treating experience reuse as a contextual bandit problem, CASCADE enables effective exploration and exploitation strategies, ensuring that agents can learn from their interactions over time. The results show that CASCADE significantly enhances performance across various tasks, demonstrating the potential for continuous improvement in AI systems during deployment.'}, 'zh': {'title': '部署时学习：让AI不断进步的关键', 'desc': '本文提出了一种新的学习方法，称为部署时学习（DTL），使大型语言模型（LLM）在运行过程中能够不断适应和改进。通过引入CASCADE框架，LLM代理可以利用显式的、不断发展的情景记忆来积累和选择与任务相关的经验。CASCADE将经验重用视为一个上下文赌博机问题，从而实现了探索与利用之间的平衡，并在长期交互中提供了无悔保证。通过在16个不同任务上的实验，CASCADE显著提高了成功率，展示了将部署视为适应性学习过程的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.07755', 'title': 'Rethinking State Tracking in Recurrent Models Through Error Control Dynamics', 'url': 'https://huggingface.co/papers/2605.07755', 'abstract': "Abstract Affine recurrent networks cannot correct errors in state tracking once state representations are preserved, leading to finite horizon solutions governed by accumulated error rather than robust tracking.  AI-generated summary The theory of state tracking in recurrent architectures has predominantly focused on expressive capacity: whether a fixed architecture can theoretically realize a set of symbolic transition rules. We argue that equally important is error control, the dynamics governing hidden-state drift along the directions that distinguish symbolic states. We prove that affine recurrent networks, a class of models encompassing State-Space Models and Linear Attention, cannot correct errors along state-separating subspaces once they preserve state representations. Consequently, practical affine trackers do not learn robust state tracking; rather, they learn finite horizon solutions governed by accumulated state-relevant error. We characterize the mechanics of this failure, showing that tracking remains readable only while the accumulating within-class spread remains small relative to the initial between-class separation. We demonstrate empirically on group state-tracking tasks that this breakdown is predictable: tracking collapses when the distinguishability ratio crosses the readability threshold of the trained decoder. Across trained models, the point of this crossing predicts the horizon at which downstream accuracy fails. These results establish that robust state tracking is determined not only by an architecture's theoretical expressivity but crucially by its error control.", 'score': 0, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'e9d405c76a6c0b4f', 'authors': ['Jiwan Chung', 'Heechan Choi', 'Seon Joo Kim'], 'affiliations': ['Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07755.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '⚠️', 'ru': {'title': 'Контроль ошибок важнее выразительности в архитектурах отслеживания состояния', 'desc': 'Статья исследует проблему отслеживания состояния в рекуррентных нейронных сетях, в частности в аффинных архитектурах, таких как State-Space Models и Linear Attention. Авторы доказывают, что эти модели не могут исправлять ошибки в представлении скрытого состояния, что приводит к накоплению ошибок со временем. Они показывают, что практические характеристики таких сетей ограничены не только теоретической выразительностью архитектуры, но и её способностью контролировать ошибки в процессе отслеживания. Исследование демонстрирует, что точность отслеживания состояния падает предсказуемо, когда накопленная ошибка становится соизмерима с расстоянием между различными состояниями.'}, 'en': {'title': 'Error Control is Key for Robust State Tracking in Recurrent Networks', 'desc': 'This paper discusses the limitations of affine recurrent networks in maintaining accurate state tracking over time. It highlights that while these networks can represent symbolic transitions, they struggle with error correction once state representations are established. The authors demonstrate that these models tend to produce solutions that are only valid for a limited time, as they accumulate errors that affect tracking performance. They provide empirical evidence showing that the ability to track states reliably diminishes when the error between classes becomes too large compared to the initial separation, indicating the importance of error control in model design.'}, 'zh': {'title': '稳健状态跟踪需重视错误控制', 'desc': '本文探讨了仿射递归网络在状态跟踪中的局限性，特别是在状态表示被保留的情况下，无法纠正状态跟踪中的错误。我们指出，错误控制同样重要，它影响着隐藏状态沿着区分符号状态的方向的漂移。研究表明，仿射递归网络无法在状态分离的子空间中纠正错误，因此它们学习到的不是稳健的状态跟踪，而是受累积错误影响的有限视野解决方案。实验证明，当可区分性比率超过训练解码器的可读性阈值时，跟踪性能会崩溃，这一现象是可预测的。'}}}, {'id': 'https://huggingface.co/papers/2605.07243', 'title': 'SpecBlock: Block-Iterative Speculative Decoding with Dynamic Tree Drafting', 'url': 'https://huggingface.co/papers/2605.07243', 'abstract': "Abstract Speculative decoding with SpecBlock combines block-iterative drafting and path dependence to improve LLM inference speed while maintaining accuracy through adaptive mechanisms.  AI-generated summary Speculative decoding accelerates LLM inference by drafting a tree of candidate continuations and verifying it in one target forward. Existing drafters fall into two camps with opposite weaknesses. Autoregressive drafters such as EAGLE-3 preserve dependence along each draft path but call the drafter once per tree depth, making drafting a non-trivial share of per-iteration latency. Parallel drafters cut drafter calls by predicting multiple future positions in one forward, but each position is predicted without seeing the others, producing paths the verifier rejects. In this paper, we propose SpecBlock, a block-iterative drafter that combines path dependence with cheap drafting. Each drafter forward produces K dependent positions and we call this a block. The draft tree grows through repeated block expansions. Two mechanisms explicitly carry path dependence to keep later draft positions accurate. Within each block, a layer-wise shift carries the previous position's hidden state into every decoder layer. Across blocks, each new block can start from any position of the previous block, inheriting its hidden state to extend the path. To spend verifier budget where acceptance is likely, a co-trained rank head replaces the fixed top-k tree by allocating per-position branching during drafting. To avoid training the drafter on prefixes it never produces at inference, a valid-prefix mask drops the loss at later positions once an earlier one is wrong. Beyond static drafting, a cost-aware bandit at deployment uses free verifier feedback to update the drafter selectively, only when the expected throughput gain exceeds the update cost. Experiments show that SpecBlock improves mean speedup by 8-13% over EAGLE-3 at 44-52% of its drafting cost, and cost-aware adaptation extends this lead to 11-19%.", 'score': 0, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '94eb83279bbf2d5b', 'authors': ['Weijie Shi', 'Qiang Xu', 'Fan Deng', 'Yaguang Wu', 'Jiarun Liu', 'Yehong Xu', 'Hao Chen', 'Jia Zhu', 'Jiajie Xu', 'Xiangjun Huang', 'Jian Yang', 'Xiaofang Zhou'], 'affiliations': ['Hong Kong University of Science and Technology', 'MetaX', 'Soochow University', 'Zhejiang Normal University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07243.jpg', 'data': {'categories': ['#inference', '#training', '#architecture', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Быстрое предложение с памятью: блок-итеративное спекулятивное декодирование', 'desc': 'SpecBlock — это метод спекулятивного декодирования для ускорения инференса больших языковых моделей, который комбинирует блок-итеративное предложение кандидатов с сохранением зависимостей вдоль путей генерации. В отличие от существующих подходов, которые либо медленно генерируют последовательно, либо быстро, но независимо предсказывают множество позиций, SpecBlock производит K зависимых позиций за один проход черезз передачу скрытых состояний между слоями и блоками. Адаптивный ранжирующий модуль и маска валидных префиксов оптимизируют распределение ветвлений в дереве поиска и избегают обучения на неправдоподобных последовательностях. Эксперименты показывают ускорение на 8-19% по сравнению с EAGLE-3 при значительно меньших вычислительных затратах на черновик.'}, 'en': {'title': 'Boosting LLM Speed with Smart Drafting', 'desc': 'The paper introduces SpecBlock, a novel approach to speculative decoding that enhances the inference speed of large language models (LLMs) while preserving accuracy. It combines block-iterative drafting with path dependence, allowing the model to generate multiple candidate continuations in a single forward pass. By using mechanisms that maintain the hidden state across drafts, SpecBlock ensures that later predictions are informed by earlier ones, improving the quality of the generated paths. The method also incorporates a cost-aware bandit strategy to adapt the drafter based on real-time feedback, leading to significant speed improvements over existing methods.'}, 'zh': {'title': '推测解码：加速LLM推理的新方法', 'desc': '本文提出了一种名为SpecBlock的推测解码方法，旨在提高大型语言模型（LLM）的推理速度，同时保持准确性。SpecBlock结合了块迭代草拟和路径依赖的机制，通过生成候选继续的树状结构来加速推理过程。与现有的自回归草拟器和并行草拟器相比，SpecBlock在每个块内生成多个依赖位置，并通过层级状态传递和块间状态继承来保持路径的准确性。实验结果表明，SpecBlock在草拟成本的44-52%下，平均加速提高了8-13%，并通过成本感知适应进一步提升了这一优势。'}}}, {'id': 'https://huggingface.co/papers/2605.06105', 'title': 'Shallow Prefill, Deep Decoding: Efficient Long-Context Inference via Layer-Asymmetric KV Visibility', 'url': 'https://huggingface.co/papers/2605.06105', 'abstract': 'Abstract SPEED is a phase-asymmetric KV-visibility policy that reduces long-context inference costs in decoder-only language models by processing prompt tokens in lower layers during prefill while maintaining full-depth attention during decoding.  AI-generated summary Long-context inference in decoder-only language models is costly because long prompts are processed during Prefill, cached at every layer, and repeatedly attended to during autoregressive Decode. We introduce Shallow Prefill, dEEp Decode (SPEED), a phase-asymmetric KV-visibility policy that materializes non-anchor prompt-token KV states only in lower layers while keeping Decode-phase tokens full-depth. Unlike previous approaches that make upper-layer prompt KV states cheaper to store or construct, SPEED removes prefill tokens from the upper-layer Decode visibility set altogether. With a minimal BoS anchor, this simple change preserves broad benchmark quality while reducing long-context cost. In a controlled Llama-3.1-8B instruction-tuning study, SPEED using only 75\\% of layers for prefill tokens reaches 51.2 average score on OLMES-style benchmarks, compared with 51.4 for the full-depth baseline, while improving TTFT by 33\\%, TPOT by 22\\%, and reducing active KV memory by 25.0\\% at 128K context. Layer-wise diagnostics suggest that this cutoff retains the main prompt-selection and representation-stabilization regions of the full-depth model. These results show that long-context prompt tokens need not always persist as full-depth KV-cache objects when Decode-phase tokens remain full-depth.', 'score': 0, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '19b7f3bf3dcb73c8', 'authors': ['Jungsuk Oh', 'Hyeseo Jeon', 'Hyunjune Ji', 'Kyongmin Kong', 'Jay-Yoon Lee'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.06105.jpg', 'data': {'categories': ['#inference', '#optimization', '#training', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Асимметричное кэширование: мелкий префикс, глубокое декодирование', 'desc': 'В статье предлагается SPEED — асимметричная политика видимости KV-кэша, которая снижает затраты на инференс в длинном контексте для decoder-only языковых моделей. Метод обрабатывает токены промпта в нижних слоях сети во время prefill-фазы, но сохраняет полную глубину внимания для токенов во время декодирования. Благодаря простому удалению токенов промпта из верхних слоёв на этапе декодирования SPEED достигает сокращения затрат памяти на 25% и ускорения инференса на 33%, при этом практически не теряя в качестве на бенчмарках. Экспериментальные результаты показывают, что длинные промпты не нужно хранить как полнослойные KV-кэши, если декодирующие токены остаются на всех слоях.'}, 'en': {'title': 'SPEED: Efficient Long-Context Inference in Language Models', 'desc': 'The paper introduces SPEED, a new method for improving the efficiency of long-context inference in decoder-only language models. It uses a phase-asymmetric KV-visibility policy that processes prompt tokens in lower layers during the prefill phase, while allowing full-depth attention during decoding. This approach reduces the memory and computational costs associated with long prompts by eliminating the need for upper-layer visibility of prefill tokens. The results demonstrate that SPEED maintains high performance on benchmarks while significantly lowering resource usage, making it a promising solution for handling long-context tasks.'}, 'zh': {'title': 'SPEED：优化长上下文推理的创新策略', 'desc': 'SPEED是一种相位不对称的KV可见性策略，旨在降低解码器语言模型中长上下文推理的成本。它通过在预填充阶段仅在较低层处理提示令牌，同时在解码阶段保持全深度注意力，从而实现这一目标。与以往方法不同，SPEED完全移除了上层解码可见性集合中的预填充令牌，简化了存储和构建过程。实验结果表明，SPEED在保持模型性能的同时，显著减少了长上下文的计算开销。'}}}, {'id': 'https://huggingface.co/papers/2605.05136', 'title': 'CPCANet: Deep Unfolding Common Principal Component Analysis for Domain Generalization', 'url': 'https://huggingface.co/papers/2605.05136', 'abstract': 'Abstract CPCANet is a domain generalization framework that uses Common Principal Component Analysis to discover structured domain-invariant subspaces through differentiable neural layers, achieving state-of-the-art performance in zero-shot transfer.  AI-generated summary Domain Generalization (DG) aims to learn representations that remain robust under out-of-distribution (OOD) shifts and generalize effectively to unseen target domains. While recent invariant learning strategies and architectural advances have achieved strong performance, explicitly discovering a structured domain-invariant subspace through second-order statistics remains underexplored. In this work, we propose CPCANet, a novel framework grounded in Common Principal Component Analysis (CPCA), which unrolls the iterative Flury-Gautschi (FG) algorithm into fully differentiable neural layers. This approach integrates the statistical properties of CPCA into an end-to-end trainable framework, enforcing the discovery of a shared subspace across diverse domains while preserving interpretability. Experiments on four standard DG benchmarks demonstrate that CPCANet achieves state-of-the-art (SOTA) performance in zero-shot transfer. Moreover, CPCANet is architecture-agnostic and requires no dataset-specific tuning, providing a simple and efficient approach to learning robust representations under distribution shift. Code is available at https://github.com/wish44165/CPCANet.', 'score': 0, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '51379b8ae113bc40', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#architecture'], 'emoji': '🌉', 'ru': {'title': 'Мост между доменами через общие главные компоненты', 'desc': 'CPCANet — это фреймворк для обобщения на новые домены, который использует Common Principal Component Analysis для выявления структурированного инвариантного подпространства через дифференцируемые слои нейронной сети. Метод разворачивает итеративный алгоритм Флури-Гаутски в полностью дифференцируемые слои, интегрируя статистические свойства CPCA в единую обучаемую архитектуру. Фреймворк обеспечивает обнаружение общего подпространства для различных доменов, сохраняя при этом интерпретируемость моделей. Экспериментальные результаты на стандартных бенчмарках показали, что CPCANet достигает лучших результатов в задаче zero-shot трансфера без требования специальной настройки для конкретных датасетов.'}, 'en': {'title': 'CPCANet: Robust Learning Across Domains with CPCA', 'desc': 'CPCANet is a new framework designed for Domain Generalization (DG), which helps machine learning models perform well on new, unseen data. It uses Common Principal Component Analysis (CPCA) to find shared features across different domains, making the model more robust to changes in data distribution. By integrating CPCA into a neural network, CPCANet allows for end-to-end training while maintaining interpretability of the learned features. The framework has shown to achieve state-of-the-art results in zero-shot transfer tasks without needing specific adjustments for different datasets.'}, 'zh': {'title': 'CPCANet：领域泛化的新突破', 'desc': 'CPCANet 是一个领域泛化框架，利用常见主成分分析（CPCA）来发现结构化的领域不变子空间。该方法通过可微神经层实现，能够在零样本迁移中达到最先进的性能。CPCANet 通过将 Flury-Gautschi 算法展开为完全可微的神经层，整合了 CPCA 的统计特性，确保在不同领域中发现共享子空间。实验结果表明，CPCANet 在四个标准领域泛化基准上表现优异，且不需要特定数据集的调优，提供了一种简单高效的学习鲁棒表示的方法。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        }

                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);

                    article.data.categories.forEach(cat => categories.add(cat));

            let res = Array.from(categories);
            res.sort();

        }

            }         
            filterAndRenderArticles();

                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-11 06:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-11 06:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
