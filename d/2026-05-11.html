    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.08083', 'title': 'LLMs Improving LLMs: Agentic Discovery for Test-Time Scaling', 'url': 'https://huggingface.co/papers/2605.08083', 'abstract': 'Abstract AutoTTS automates test-time scaling strategy discovery by formulating it as controller synthesis over reasoning trajectories and probe signals, achieving improved accuracy-cost tradeoffs with minimal computational overhead.  AI-generated summary Test-time scaling (TTS) has become an effective approach for improving large language model performance by allocating additional computation during inference. However, existing TTS strategies are largely hand-crafted: researchers manually design reasoning patterns and tune heuristics by intuition, leaving much of the computation-allocation space unexplored. We propose an environment-driven framework, AutoTTS, that changes what researchers design: from individual TTS heuristics to environments where TTS strategies can be discovered automatically. The key to AutoTTS lies in environment construction: the discovery environment must make the control space tractable and provide cheap, frequent feedback for TTS search. As a concrete instantiation, we formulate width--depth TTS as controller synthesis over pre-collected reasoning trajectories and probe signals, where controllers decide when to branch, continue, probe, prune, or stop and can be evaluated cheaply without repeated LLM calls. We further introduce beta parameterization to make the search tractable and fine-grained execution trace feedback to improve discovery efficiency by helping the agent diagnose why a TTS program fails. Experiments on mathematical reasoning benchmarks show that the discovered strategies improve the overall accuracy--cost tradeoff over strong manually designed baselines. The discovered strategies generalize to held-out benchmarks and model scales, while the entire discovery costs only $39.9 and 160 minutes. Our data, and code will be open-source at https://github.com/zhengkid/AutoTTS.', 'score': 38, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '02c5a593e95ab947', 'authors': ['Tong Zheng', 'Haolin Liu', 'Chengsong Huang', 'Huiwen Bao', 'Sheng Zhang', 'Rui Liu', 'Runpeng Dai', 'Ruibo Chen', 'Chenxi Liu', 'Tianyi Xiong', 'Xidong Wu', 'Hongming Zhang', 'Heng Huang'], 'affiliations': ['Google', 'Meta', 'UMD', 'UNC', 'UVA', 'WUSTL'], 'pdf_title_img': 'assets/pdf/title_img/2605.08083.jpg', 'data': {'categories': ['#open_source', '#optimization', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Автоматическое открытие оптимальных стратегий масштабирования для языковых моделей', 'desc': 'AutoTTS предлагает автоматический подход к открытию стратегий масштабирования во время тестирования (TTS) путём формулирования задачи как синтеза контроллера над траекториями рассуждений и зондирующими сигналами. Вместо ручного проектирования эвристик исследователи создают окружение, в котором стратегии TTS могут быть обнаружены автоматически через поиск. Метод использует предсобранные траектории рассуждений и дешёвую обратную связь для эффективного поиска, включая параметризацию бета и детальные трассировки выполнения. Экспериментально показано, что обнаруженные стратегии улучшают компромисс между точностью и вычислительными затратами, обобщаются на новые задачи и масштабы моделей с минимальными затратами на поиск.'}, 'en': {'title': 'Automating Test-Time Scaling for Enhanced Model Performance', 'desc': 'AutoTTS is a framework that automates the discovery of test-time scaling (TTS) strategies for large language models, enhancing their performance during inference. Instead of relying on manually crafted heuristics, AutoTTS utilizes an environment-driven approach to explore the computation-allocation space more effectively. It formulates the TTS problem as controller synthesis, allowing for efficient decision-making on when to branch or prune during reasoning. The results demonstrate that the strategies discovered by AutoTTS achieve better accuracy-cost tradeoffs compared to traditional methods, with minimal computational overhead.'}, 'zh': {'title': '自动化测试时间缩放策略发现', 'desc': 'AutoTTS 是一个自动化的测试时间缩放策略发现框架，通过将其表述为控制器合成，利用推理轨迹和探测信号来实现更好的准确性与成本的权衡，同时保持最低的计算开销。传统的测试时间缩放策略主要依赖于人工设计，研究人员手动调整推理模式和启发式方法，导致计算分配空间未被充分探索。AutoTTS 通过构建环境，使得研究人员可以自动发现 TTS 策略，而不是单独设计每个启发式方法。实验结果表明，AutoTTS 发现的策略在数学推理基准测试中显著提高了准确性与成本的权衡，并且在不同的基准和模型规模上具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.06139', 'title': 'Listwise Policy Optimization: Group-based RLVR as Target-Projection on the LLM Response Simplex', 'url': 'https://huggingface.co/papers/2605.06139', 'abstract': 'Abstract Group-based policy gradient methods in reinforcement learning with verifiable rewards share a common geometric structure, leading to the development of Listwise Policy Optimization that explicitly handles target projection through divergence minimization for improved training performance and stability.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a standard approach for large language models (LLMs) post-training to incentivize reasoning capacity. Among existing recipes, group-based policy gradient is prevalent, which samples a group of responses per prompt and updates the policy via group-relative advantage signals. This work reveals that these optimization strategies share a common geometric structure: each implicitly defines a target distribution on the response simplex and projects toward it via first-order approximation. Building on this insight, we propose Listwise Policy Optimization (LPO) to explicitly conduct the target-projection, which demystifies the implicit target by restricting the proximal RL objective to the response simplex, and then projects the policy via exact divergence minimization. This framework provides (i) monotonic improvement on the listwise objective with bounded, zero-sum, and self-correcting projection gradients, and (ii) flexibility in divergence selection with distinct structural properties through the decoupled projection step. On diverse reasoning tasks and LLM backbones, LPO consistently improves training performance over typical policy gradient baselines under matched targets, while intrinsically preserving optimization stability and response diversity.', 'score': 36, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'a41f66f25e073e68', 'authors': ['Yun Qu', 'Qi Wang', 'Yixiu Mao', 'Heming Zou', 'Yuhang Jiang', 'Yingyue Li', 'Wutong Xu', 'Lizhou Cai', 'Weijie Liu', 'Clive Bai', 'Kai Yang', 'Yangkun Chen', 'Saiyong Yang', 'Xiangyang Ji'], 'affiliations': ['Department of Automation, Tsinghua University', 'LLM Department, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.06139.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#training', '#rl', '#optimization', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Явная проекция целевого распределения для оптимизации групповой политики', 'desc': 'Статья исследует групповые методы градиентной политики в обучении с подкреплением с проверяемыми наградами и обнаруживает их общую геометрическую структуру. Авторы предлагают Listwise Policy Optimization (LPO) — новый алгоритм, который явно проводит проекцию целевого распределения на симплекс ответов через минимизацию дивергенции. Метод обеспечивает монотонное улучшение целевой функции с гарантированно ограниченными градиентами проекции и позволяет гибко выбирать различные типы дивергенций. На различных задачах рассуждения и архитектурах больших языковых моделей LPO показывает стабильное улучшение качества обучения при сохранении разнообразия генерируемых ответов.'}, 'en': {'title': 'Enhancing Reinforcement Learning with Listwise Policy Optimization', 'desc': 'This paper introduces Listwise Policy Optimization (LPO), a new method in reinforcement learning that focuses on improving training performance and stability for large language models. It builds on the concept of group-based policy gradient methods, which use groups of responses to update policies based on relative advantages. The authors highlight a common geometric structure in these methods, which allows for a more explicit target projection through divergence minimization. LPO demonstrates consistent improvements in training outcomes while maintaining stability and diversity in responses across various reasoning tasks.'}, 'zh': {'title': '提升强化学习的稳定性与性能', 'desc': '本文提出了一种新的强化学习方法，称为列表策略优化（LPO），旨在提高训练性能和稳定性。LPO通过最小化散度，明确处理目标投影，从而优化策略。研究表明，现有的基于组的策略梯度方法共享相同的几何结构，这为LPO的提出提供了理论基础。通过在多种推理任务中应用，LPO在训练性能上优于传统的策略梯度基线，同时保持了优化的稳定性和响应的多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.06747', 'title': 'HumanNet: Scaling Human-centric Video Learning to One Million Hours', 'url': 'https://huggingface.co/papers/2605.06747', 'abstract': 'Abstract HumanNet presents a large-scale human-centric video dataset with rich annotations for embodied intelligence, demonstrating that egocentric human video can effectively replace robot data for training vision-language-action models.  AI-generated summary Progress in embodied intelligence increasingly depends on scalable data infrastructure. While vision and language have scaled with internet corpora, learning physical interaction remains constrained by the lack of large, diverse, and richly annotated human activity data. We present HumanNet, a one-million-hour human-centric video corpus that captures how humans interact with the physical world at scale. HumanNet spans both first-person and third-person perspectives and covers fine-grained activities, human-object interactions, tool use, and long-horizon behaviors across diverse real-world environments. Beyond raw video, the dataset provides interaction-centric annotations, including captions, motion descriptions, and hand and body-related signals, enabling motion-aware and interaction-aware learning. Beyond scale, HumanNet introduces a systematic data curation paradigm for embodied learning, where human-centric filtering, temporal structuring, viewpoint diversity, and annotation enrichment are treated as first-class design principles. This design transforms unstructured internet video into a scalable substrate for representation learning, activity understanding, motion generation, and human-to-robot transfer. We conduct a first-step validation on the value of this design through controlled vision-language-action ablation: under a fixed set of validation data, continued training from the Qwen VLM model with 1000 hours of egocentric video drawn from HumanNet surpasses the continued training with 100 hours of real-robot data from Magic Cobot, indicating that egocentric human video could be a scalable and cost-effective substitute for robot data. By building this project, we aim to explore the opportunity to scale embodied foundation models using human-centric videos, rather than relying solely on robot-specific data.', 'score': 33, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd0ea6cafedecdd80', 'authors': ['Yufan Deng', 'Daquan Zhou'], 'affiliations': ['DAGroup-PKU'], 'pdf_title_img': 'assets/pdf/title_img/2605.06747.jpg', 'data': {'categories': ['#dataset', '#robotics', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Человеческие видео как замена робототехническим данным для обучения воплощённого интеллекта', 'desc': 'HumanNet представляет набор данных из одного миллиона часов видео с человеческой активностью для обучения моделей воплощённого интеллекта. Датасет содержит богатые аннотации с описаниями действий, движений, взаимодействий с объектами и сигналами рук и тела как в эгоцентрической, так и в третьей перспективе. Авторы показали, что видео человеческих действий может эффективно заменить данные роботов при обучении видео-языково-действийных моделей. Это предлагает масштабируемый и экономически эффективный подход к развитию foundation-моделей для embodied AI без необходимости в дорогостоящих робототехнических данных.'}, 'en': {'title': 'Empowering AI with Human-Centric Video Data', 'desc': 'HumanNet is a large-scale dataset designed for training models in embodied intelligence using human-centric videos. It includes one million hours of video that captures human interactions with the environment, providing rich annotations for activities, interactions, and motions. The dataset allows for effective learning of vision-language-action models by using egocentric video as a substitute for traditional robot data. By implementing a systematic curation approach, HumanNet enhances the quality and diversity of the data, making it a valuable resource for advancing embodied AI research.'}, 'zh': {'title': '人类视频数据助力智能模型训练', 'desc': 'HumanNet是一个大规模的人类中心视频数据集，专注于体现智能的研究。该数据集包含丰富的注释，展示了第一人称和第三人称视角下人类与物理世界的互动。通过提供动作描述、手部和身体信号等交互中心的注释，HumanNet支持运动感知和交互感知的学习。研究表明，使用HumanNet中的人类视频数据可以有效替代机器人数据，推动体现智能模型的训练。'}}}, {'id': 'https://huggingface.co/papers/2605.04615', 'title': 'Beyond Retrieval: A Multitask Benchmark and Model for Code Search', 'url': 'https://huggingface.co/papers/2605.04615', 'abstract': 'Abstract A new code search benchmark called CoREB is introduced that addresses limitations of existing datasets by providing contamination-limited, multitask evaluation across text-to-code, code-to-text, and code-to-code retrieval tasks with fine-tuned reranking capabilities.  AI-generated summary Code search has usually been evaluated as first-stage retrieval, even though production systems rely on broader pipelines with reranking and developer-style queries. Existing benchmarks also suffer from data contamination, label noise, and degenerate binary relevance. In this paper, we introduce CoREB, a contamination-limited, multitask code retrieval and reranking benchmark, together with a fine-tuned code reranker, that goes beyond retrieval to cover the full code search pipeline. CoREB is built from counterfactually rewritten LiveCodeBench problems in five programming languages and delivered as timed releases with graded relevance judgments. We benchmark eleven embedding models and five rerankers across three tasks: text-to-code, code-to-text, and code-to-code. Our experiments reveal that: \\circone code-specialised embeddings dominate code-to-code retrieval ({sim}2{times} over general encoders), yet no single model wins all three tasks; \\circtwo short keyword queries, the format closest to real developer search, collapse every model to near-zero nDCG@10; \\circthree off-the-shelf rerankers are task-asymmetric, with a 12-point swing on code-to-code and no baseline net-positive across all tasks; \\circfour our fine-tuned CoREB-Reranker is the first to achieve consistent gains across all three tasks. The data and model are released.', 'score': 22, 'issue_id': 2194, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '0a05f65eb6d84c5a', 'authors': ['Siqiao Xue', 'Zihan Liao', 'Jin Qin', 'Ziyin Zhang', 'Yixiang Mu', 'Fan Zhou', 'Hang Yu'], 'affiliations': ['Alipay', 'Hangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.04615.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#plp', '#optimization', '#open_source', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Комплексный бенчмарк для оценки полного pipeline поиска кода с переранжированием', 'desc': 'В статье представлен новый бенчмарк CoREB для оценки поиска кода, который решает проблемы существующих наборов данных, включая загрязнение данных и шумные разметки. Бенчмарк охватывает полный pipeline поиска кода с переранжированием и включает три типа задач: поиск кода по текстовому описанию, поиск текста по коду и поиск кода по коду. Авторы протестировали одиннадцать моделей векторных представлений и пять переранжировщиков, обнаружив, что специализированные модели превосходят универсальные на определённых задачах, но ни одна не выигрывает во всех случаях. Они предложили собственный обученный переранжировщик CoREB-Reranker, который впервые показывает стабильные улучшения на всех трёх задачах.'}, 'en': {'title': 'Revolutionizing Code Search with CoREB: A Multitask Benchmark', 'desc': 'The paper introduces CoREB, a new benchmark for code search that improves upon existing datasets by minimizing contamination and enabling multitask evaluation. It focuses on three retrieval tasks: text-to-code, code-to-text, and code-to-code, while incorporating a fine-tuned reranking system. The study benchmarks various embedding models and rerankers, revealing that specialized embeddings perform better in code-to-code retrieval, but no single model excels in all tasks. Additionally, the paper highlights the challenges of using short keyword queries and presents the CoREB-Reranker as a solution that consistently improves performance across all tasks.'}, 'zh': {'title': 'CoREB：全面提升代码搜索的基准', 'desc': '本文介绍了一种新的代码搜索基准CoREB，旨在解决现有数据集的局限性。CoREB提供了污染限制的多任务评估，涵盖文本到代码、代码到文本和代码到代码的检索任务，并具备精细调整的重排序能力。通过对五种编程语言的LiveCodeBench问题进行反事实重写，CoREB构建了一个全面的代码搜索管道。实验结果表明，专门针对代码的嵌入模型在代码到代码的检索中表现优异，而我们的CoREB-Reranker在所有三个任务中都实现了一致的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.07825', 'title': 'Anisotropic Modality Align', 'url': 'https://huggingface.co/papers/2605.07825', 'abstract': 'Abstract Research addresses the modality gap in multimodal models by proposing an anisotropic geometric correction framework that enables effective unpaired modality alignment through structured representation transformation.  AI-generated summary Training multimodal large language models has long been limited by the scarcity of high-quality paired multimodal data. Recent studies show that the shared representation space of pretrained multimodal contrastive models can serve as a bridge, enabling models to perform multimodal training with unimodal data. However, the key premise of this paradigm remains insufficiently understood: can representations from different modalities be reliably interchanged? The core obstacle lies in the persistent Modality Gap in the shared space. In this work, we revisit the geometric nature of the modality gap. We find that modality representations already share compatible dominant semantic geometry. What truly hinders modality interchangeability is not a simple global shift, but an anisotropic residual structure concentrated along a small number of dominant directions. Based on this finding, we further propose the principle of anisotropic modality gap alignment: effective modality alignment should align with the target-modality distribution while preserving the semantic structure of the source modality. Guided by this principle, we propose an anisotropic geometric correction framework, AnisoAlign, for unpaired modality alignment. This framework leverages the internal geometric prior of the target modality and performs bounded correction on source-modality representations, thereby constructing substitute representations in the target modality. Experiments confirm its benefits in both geometric diagnostics and text-only MLLM training. Overall, this work recasts the modality gap from an empirical observation into a correctable, structured geometric phenomenon and provides a new representation alignment perspective for training multimodal models with unimodal data.', 'score': 17, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '8955974a6e2c7e19', 'authors': ['Xiaomin Yu', 'Yijiang Li', 'Yuhui Zhang', 'Hanzhen Zhao', 'Yue Yang', 'Hao Tang', 'Yue Song', 'Xiaobin Hu', 'Chengwei Qin', 'Shuicheng Yan', 'Hui Xiong'], 'affiliations': ['HKUST(GZ)', 'NUS', 'PKU', 'Stanford', 'THU', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2605.07825.jpg', 'data': {'categories': ['#training', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Геометрическая коррекция разрыва между модальностями для обучения без парных данных', 'desc': 'В работе исследуется проблема модальностного разрыва в мультимодальных моделях путём анализа геометрических свойств представлений разных модальностей. Авторы обнаружили, что основной障碍 заключается не в глобальном сдвиге, а в анизотропной остаточной структуре вдоль доминирующих направлений. На основе этого открытия предложена рамка AnisoAlign для выравнивания непарных модальностей через структурированное геометрическое преобразование представлений. Метод позволяет эффективно обучать мультимодальные LLM на однозначных данных, сохраняя семантическую структуру исходной модальности.'}, 'en': {'title': 'Bridging the Modality Gap with Geometric Correction', 'desc': 'This paper addresses the challenge of aligning different types of data, known as modalities, in multimodal models. It introduces a framework called AnisoAlign, which corrects the geometric differences between modalities to enable effective training with unpaired data. The authors discover that the main issue is not just a simple shift in representation but a complex structure that needs to be adjusted. By focusing on the geometric properties of the data, this work provides a new way to align representations, improving the training of multimodal models using only single-type data.'}, 'zh': {'title': '解决多模态模型中的模态差距', 'desc': '本研究提出了一种各向异性几何校正框架，以解决多模态模型中的模态差距问题。该框架通过结构化表示转换，实现了有效的无配对模态对齐。研究发现，不同模态的表示在语义几何上是兼容的，但模态之间的可互换性受到各向异性残差结构的阻碍。通过这一发现，提出了各向异性模态差距对齐的原则，为使用单模态数据训练多模态模型提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2605.07177', 'title': 'HyperEyes: Dual-Grained Efficiency-Aware Reinforcement Learning for Parallel Multimodal Search Agents', 'url': 'https://huggingface.co/papers/2605.07177', 'abstract': 'Abstract HyperEyes is a parallel multimodal search agent that enables concurrent entity searches while optimizing inference efficiency through dual-grained reinforcement learning and a specialized benchmark for evaluating both accuracy and efficiency.  AI-generated summary Existing multimodal search agents process target entities sequentially, issuing one tool call per entity and accumulating redundant interaction rounds whenever a query decomposes into independent sub-retrievals. We argue that effective multimodal agents should search wider rather than longer: dispatching multiple grounded queries concurrently within a round. To this end, we present HyperEyes, a parallel multimodal search agent that fuses visual grounding and retrieval into a single atomic action, enabling concurrent search across multiple entities while treating inference efficiency as a first-class training objective. HyperEyes is trained in two stages. For cold-start supervision, we develop a Parallel-Amenable Data Synthesis Pipeline covering visual multi-entity and textual multi-constraint queries, curating efficiency-oriented trajectories via Progressive Rejection Sampling. Building on this, our central contribution, a Dual-Grained Efficiency-Aware Reinforcement Learning framework, operates at two levels. At the macro level, we propose TRACE (Tool-use Reference-Adaptive Cost Efficiency), a trajectory-level reward whose reference is monotonically tightened during training to suppress superfluous tool calls without restricting genuine multi-hop search. At the micro level, we adapt On-Policy Distillation to inject dense token-level corrective signals from an external teacher on failed rollouts, mitigating the credit-assignment deficiency of sparse outcome rewards. Since existing benchmarks evaluate accuracy as the sole metric, omitting inference cost, we introduce IMEB, a human-curated benchmark of 300 instances that jointly evaluates search capability and efficiency. Across six benchmarks, HyperEyes-30B surpasses the strongest comparable open-source agent by 9.9% in accuracy with 5.3x fewer tool-call rounds on average.', 'score': 14, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '9dc8e5c91a86f495', 'authors': ['Guankai Li', 'Jiabin Chen', 'Yi Xu', 'Xichen Zhang', 'Yuan Lu'], 'affiliations': ['University of Cambridge', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.07177.jpg', 'data': {'categories': ['#synthetic', '#dataset', '#benchmark', '#multimodal', '#optimization', '#open_source', '#inference', '#rl', '#agents'], 'emoji': '👀', 'ru': {'title': 'Ищи шире, а не дольше: параллельный поиск с оптимизацией эффективности', 'desc': 'HyperEyes — это параллельный мультимодальный агент поиска, который позволяет одновременно искать несколько сущностей в одном раунде вместо последовательной обработки. Агент тренируется в два этапа: сначала на синтезированных данных с эффективными траекториями, а затем с помощью двухуровневого обучения с подкреплением, которое оптимизирует как точность, так и эффективность вычислений. На макроуровне используется метрика TRACE для подавления лишних вызовов инструментов, а на микроуровне применяется дистилляция для передачи сигналов коррекции от учителя. Авторы также представляют новый бенчмарк IMEB для оценки как точности поиска, так и эффективности использования ресурсов.'}, 'en': {'title': 'HyperEyes: Efficient Concurrent Multimodal Search Agent', 'desc': 'HyperEyes is a novel multimodal search agent designed to perform concurrent searches for multiple entities, enhancing inference efficiency through a dual-grained reinforcement learning approach. Unlike traditional agents that process queries sequentially, HyperEyes allows for simultaneous grounded queries, reducing redundant interactions. It employs a two-stage training process, utilizing a specialized data synthesis pipeline and a unique reward system that balances accuracy and efficiency. The introduction of the IMEB benchmark enables a comprehensive evaluation of both search capability and inference cost, demonstrating significant improvements over existing agents.'}, 'zh': {'title': '并行多模态搜索的高效新方式', 'desc': 'HyperEyes 是一种并行多模态搜索代理，能够同时进行多个实体的搜索，并通过双粒度强化学习优化推理效率。与现有的多模态搜索代理不同，HyperEyes 允许在一个回合内并发处理多个查询，从而减少冗余的交互轮次。该系统通过两阶段训练，首先使用并行友好的数据合成管道进行冷启动监督，然后采用双粒度效率感知强化学习框架来提升搜索效率。HyperEyes 在六个基准测试中表现优异，准确率比最强的开源代理高出 9.9%，同时工具调用轮次平均减少 5.3 倍。'}}}, {'id': 'https://huggingface.co/papers/2605.05997', 'title': '4DThinker: Thinking with 4D Imagery for Dynamic Spatial Understanding', 'url': 'https://huggingface.co/papers/2605.05997', 'abstract': 'Abstract 4DThinker enables vision-language models to perform dynamic spatial reasoning through 4D latent mental imagery, using scalable data generation and novel fine-tuning methods that outperform existing approaches.  AI-generated summary Dynamic spatial reasoning from monocular video is essential for bridging visual intelligence and the physical world, yet remains challenging for vision-language models (VLMs). Prior approaches either verbalize spatial-temporal reasoning entirely as text, which is inherently verbose and imprecise for complex dynamics, or rely on external geometric modules that increase inference complexity without fostering intrinsic model capability. In this paper, we present 4DThinker, the first framework that enables VLMs to "think with 4D" through dynamic latent mental imagery, i.e., internally simulating how scenes evolve within the continuous hidden space. Specifically, we first introduce a scalable, annotation-free data generation pipeline that synthesizes 4D reasoning data from raw videos. We then propose Dynamic-Imagery Fine-Tuning (DIFT), which jointly supervises textual tokens and 4D latents to ground the model in dynamic visual semantics. Building on this, 4D Reinforcement Learning (4DRL) further tackles complex reasoning tasks via outcome-based rewards, restricting policy gradients to text tokens to ensure stable optimization. Extensive experiments across multiple dynamic spatial reasoning benchmarks demonstrate that 4DThinker consistently outperforms strong baselines and offers a new perspective toward 4D reasoning in VLMs. Our code is available at https://github.com/zhangquanchen/4DThinker.', 'score': 13, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0591d33ab219c008', 'authors': ['Zhangquan Chen', 'Manyuan Zhang', 'Xinlei Yu', 'Xiang An', 'Bo Li', 'Xin Xie', 'ZiDong Wang', 'Mingze Sun', 'Shuang Chen', 'Hongyu Li', 'Xiaobin Hu', 'Ruqi Huang'], 'affiliations': ['LMMs-Lab', 'National University of Singapore', 'The Chinese University of Hong Kong', 'Tsinghua University, SIGS', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.05997.jpg', 'data': {'categories': ['#video', '#training', '#rl', '#reasoning', '#open_source', '#benchmark', '#multimodal', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Обучение моделей думать в четырёхмерном пространстве', 'desc': '4DThinker — это первая система, которая позволяет видео-языковым моделям выполнять динамическое пространственное рассуждение через внутреннее моделирование эволюции сцен в скрытом пространстве. Авторы разработали масштабируемый конвейер генерации данных без разметки, который синтезирует обучающие примеры из видео. Они предложили метод Dynamic-Imagery Fine-Tuning, который совместно обучает текстовые токены и четырёхмерные представления, а также 4D Reinforcement Learning для решения сложных задач рассуждения с использованием наград на основе результатов. Система показывает значительное улучшение по сравнению с существующими подходами на множестве бенчмарков пространственного рассуждения.'}, 'en': {'title': 'Empowering Vision-Language Models with 4D Dynamic Reasoning', 'desc': 'The paper introduces 4DThinker, a novel framework that enhances vision-language models (VLMs) by enabling them to perform dynamic spatial reasoning using 4D latent mental imagery. It addresses the limitations of previous methods that either rely on verbose text descriptions or complex external geometric modules. The framework includes a scalable data generation pipeline that creates 4D reasoning data from raw videos and employs Dynamic-Imagery Fine-Tuning (DIFT) to improve model grounding in dynamic visual semantics. Additionally, it incorporates 4D Reinforcement Learning (4DRL) to optimize reasoning tasks through outcome-based rewards, demonstrating superior performance on various benchmarks.'}, 'zh': {'title': '4DThinker：动态空间推理的新视角', 'desc': '4DThinker是一个新框架，使视觉-语言模型能够通过4D潜在心理图像进行动态空间推理。它采用可扩展的数据生成和新颖的微调方法，超越了现有的技术。该方法通过从原始视频合成4D推理数据，避免了繁琐的文本描述和外部几何模块的复杂性。实验结果表明，4DThinker在多个动态空间推理基准测试中表现优异，展示了视觉-语言模型在4D推理方面的新视角。'}}}, {'id': 'https://huggingface.co/papers/2605.08063', 'title': 'Flow-OPD: On-Policy Distillation for Flow Matching Models', 'url': 'https://huggingface.co/papers/2605.08063', 'abstract': "Abstract Flow-OPD addresses limitations in Flow Matching text-to-image models through a two-stage alignment approach combining on-policy distillation and manifold anchor regularization, achieving significant improvements in generation quality and alignment metrics.  AI-generated summary Existing Flow Matching (FM) text-to-image models suffer from two critical bottlenecks under multi-task alignment: the reward sparsity induced by scalar-valued rewards, and the gradient interference arising from jointly optimizing heterogeneous objectives, which together give rise to a 'seesaw effect' of competing metrics and pervasive reward hacking. Inspired by the success of On-Policy Distillation (OPD) in the large language model community, we propose Flow-OPD, the first unified post-training framework that integrates on-policy distillation into Flow Matching models. Flow-OPD adopts a two-stage alignment strategy: it first cultivates domain-specialized teacher models via single-reward GRPO fine-tuning, allowing each expert to reach its performance ceiling in isolation; it then establishes a robust initial policy through a Flow-based Cold-Start scheme and seamlessly consolidates heterogeneous expertise into a single student via a three-step orchestration of on-policy sampling, task-routing labeling, and dense trajectory-level supervision. We further introduce Manifold Anchor Regularization (MAR), which leverages a task-agnostic teacher to provide full-data supervision that anchors generation to a high-quality manifold, effectively mitigating the aesthetic degradation commonly observed in purely RL-driven alignment. Built upon Stable Diffusion 3.5 Medium, Flow-OPD raises the GenEval score from 63 to 92 and the OCR accuracy from 59 to 94, yielding an overall improvement of roughly 10 points over vanilla GRPO, while preserving image fidelity and human-preference alignment and exhibiting an emergent 'teacher-surpassing' effect. These results establish Flow-OPD as a scalable alignment paradigm for building generalist text-to-image models.", 'score': 12, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '1b29b46c473095b0', 'authors': ['Zhen Fang', 'Wenxuan Huang', 'Yu Zeng', 'Yiming Zhao', 'Shuang Chen', 'Kaituo Feng', 'Yunlong Lin', 'Lin Chen', 'Zehui Chen', 'Shaosheng Cao', 'Feng Zhao'], 'affiliations': ['The Chinese University of Hong Kong', 'University of California, Los Angeles', 'University of Science and Technology of China', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.08063.jpg', 'data': {'categories': ['#alignment', '#optimization', '#multimodal', '#rlhf', '#diffusion', '#training'], 'emoji': '🎨', 'ru': {'title': 'Гармонизация противоречивых целей в генерации изображений через дистилляцию экспертов', 'desc': 'Flow-OPD — это метод выравнивания моделей генерации изображений по текстам на основе Flow Matching через двухэтапный подход. На первом этапе обучаются специализированные учителя с помощью GRPO для каждой задачи отдельно, затем их знания консолидируются в один студентную модель через on-policy дистилляцию. Авторы вводят регуляризацию Manifold Anchor Regularization, которая якорирует генерацию к многообразию высокого качества, предотвращая деградацию эстетики при обучении с подкреплением. Метод существенно улучшает качество генерации: GenEval поднялась с 63 до 92, точность OCR с 59 до 94 по сравнению с базовым GRPO.'}, 'en': {'title': 'Enhancing Text-to-Image Models with Flow-OPD', 'desc': 'Flow-OPD is a novel framework designed to enhance text-to-image models by addressing key challenges in multi-task alignment. It employs a two-stage alignment strategy that first fine-tunes specialized teacher models and then consolidates their expertise into a single student model. The introduction of Manifold Anchor Regularization helps maintain high-quality image generation while reducing common issues seen in reinforcement learning-driven approaches. Overall, Flow-OPD significantly improves generation quality and alignment metrics, making it a promising solution for developing versatile text-to-image models.'}, 'zh': {'title': 'Flow-OPD：提升文本到图像生成的对齐与质量', 'desc': 'Flow-OPD是一种新颖的文本到图像生成模型，旨在解决现有Flow Matching模型在多任务对齐中的瓶颈问题。它采用两阶段对齐策略，首先通过单奖励的GRPO微调培养领域专门的教师模型，然后通过基于流的冷启动方案建立稳健的初始策略。该方法引入了流形锚定正则化，利用任务无关的教师提供全数据监督，从而有效减轻了纯强化学习驱动对齐中常见的美学退化问题。Flow-OPD在生成质量和对齐指标上取得了显著提升，展示了其作为构建通用文本到图像模型的可扩展对齐范式。'}}}, {'id': 'https://huggingface.co/papers/2605.07748', 'title': 'TextLDM: Language Modeling with Continuous Latent Diffusion', 'url': 'https://huggingface.co/papers/2605.07748', 'abstract': 'Abstract TextLDM adapts visual latent diffusion transformers to language modeling by mapping discrete tokens to continuous latents and using representation alignment for improved text generation quality.  AI-generated summary Diffusion Transformers (DiT) trained with flow matching in a VAE latent space have unified visual generation across images and videos. A natural next step toward a single architecture for both generation (visual synthesis) and understanding (text generation) is to apply this framework to language modeling. We propose TextLDM, which transfers the visual latent diffusion recipe to text generation with minimal architectural modification. A Transformer-based VAE maps discrete tokens to continuous latents, enhanced by Representation Alignment (REPA) with a frozen pretrained language model to produce representations effective for conditional denoising. A standard DiT then performs flow matching in this latent space, identical in architecture to its visual counterpart. The central challenge we address is obtaining high-quality continuous text representations: we find that reconstruction fidelity alone is insufficient, and that aligning latent features with a pretrained language model via REPA is critical for downstream generation quality. Trained from scratch on OpenWebText2, TextLDM substantially outperforms prior diffusion language models and matches GPT-2 under the same settings. Our results establish that the visual DiT recipe transfers effectively to language, taking a concrete step toward unified diffusion architectures for multimodal generation and understanding.', 'score': 11, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '82fd31cbcbee02b8', 'authors': ['Jiaxiu Jiang', 'Jingjing Ren', 'Wenbo Li', 'Bo Wang', 'Haoze Sun', 'Yijun Yang', 'Jianhui Liu', 'Yanbing Zhang', 'Shenghe Zheng', 'Yuan Zhang', 'Haoyang Huang', 'Nan Duan', 'Wangmeng Zuo'], 'affiliations': ['HIT', 'HKUST(GZ)', 'Joy Future Academy'], 'pdf_title_img': 'assets/pdf/title_img/2605.07748.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#training', '#open_source', '#architecture', '#transfer_learning'], 'emoji': '🔄', 'ru': {'title': 'Единая архитектура диффузии для генерации текста и изображений', 'desc': 'TextLDM адаптирует архитектуру диффузионных трансформеров из компьютерного зрения для генерации текста, преобразуя дискретные токены в непрерывные представления в пространстве скрытых состояний VAE. Ключевое улучшение — метод выравнивания представлений (REPA), который согласует скрытые признаки с предварительно обученной языковой моделью для получения качественных представлений. Модель использует flow matching в латентном пространстве с архитектурой, идентичной визуальным диффузионным трансформерам, что позволяет унифицировать подход к генерации и пониманию. При обучении с нуля на корпусе OpenWebText2 модель превосходит предыдущие диффузионные модели языка и показывает результаты, сравнимые с GPT-2.'}, 'en': {'title': 'Unifying Visual and Text Generation with TextLDM', 'desc': 'This paper introduces TextLDM, a novel approach that adapts visual latent diffusion transformers for language modeling. By mapping discrete tokens to continuous latents and employing Representation Alignment (REPA) with a pretrained language model, TextLDM enhances text generation quality. The architecture utilizes a Transformer-based Variational Autoencoder (VAE) and a standard Diffusion Transformer (DiT) to perform flow matching in the latent space. The results demonstrate that TextLDM significantly improves upon previous diffusion language models and achieves performance comparable to GPT-2, indicating the effectiveness of applying visual diffusion techniques to text generation.'}, 'zh': {'title': '统一视觉与语言生成的扩散模型', 'desc': '本文提出了一种新的文本生成模型TextLDM，它将视觉潜在扩散变换器的思想应用于语言建模。通过将离散标记映射到连续潜在空间，并使用表示对齐技术，TextLDM能够提高文本生成的质量。研究表明，仅靠重建保真度不足以获得高质量的文本表示，必须通过与预训练语言模型的对齐来提升生成效果。经过在OpenWebText2上的训练，TextLDM在性能上显著超越了之前的扩散语言模型，并在相同设置下与GPT-2相匹配。'}}}, {'id': 'https://huggingface.co/papers/2605.00425', 'title': 'AEM: Adaptive Entropy Modulation for Multi-Turn Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.00425', 'abstract': 'Abstract A novel supervision-free credit assignment method for reinforcement learning in language model agents that adapts entropy dynamics at the response level to improve exploration-exploitation trade-offs and task performance.  AI-generated summary Reinforcement learning (RL) has substantially improved the ability of large language model (LLM) agents to interact with environments and solve multi-turn tasks. However, effective agentic RL remains challenging: sparse outcome-only rewards provide limited guidance for assigning credit to individual steps within long interaction trajectories. Existing approaches often introduce dense intermediate supervision, such as process reward models or auxiliary self-supervised signals, which increases supervision and tuning complexity and may limit generalization across tasks and domains. We present AEM, a supervision-free credit assignment method that adaptively modulates entropy dynamics during RL training to improve the exploration-exploitation trade-off. Since in agentic RL the environment is typically affected by a complete response, rather than an individual token, our analysis lifts entropy dynamics from the token level to the response level, aligning uncertainty estimation with the effective action granularity of LLM agents and reducing sensitivity to token-level sampling noise. We further show that entropy drift under natural-gradient updates is governed by the interaction between the sampled-response advantage and its relative surprisal. Motivated by this result, AEM derives a practical response-level uncertainty proxy and uses it to rescale advantages, leveraging the evolving balance between positive and negative samples to naturally transition from exploration to exploitation. Extensive experiments on ALFWorld, WebShop, and SWE-bench-Verified with models ranging from 1.5B to 32B demonstrate that AEM consistently improves strong RL baselines, including a +1.4\\% gain when integrated into a state-of-the-art software-engineering RL training framework.', 'score': 9, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '10314084d684476a', 'authors': ['Haotian Zhao', 'Songlin Zhou', 'Yuxin Zhang', 'Stephen S. -T. Yau', 'Wenyu Zhang', 'Lun Tian', 'Tianshu Zhu', 'Yifeng Huang', 'Yucheng Zeng', 'Jingnan Gu', 'Daxiang Dong', 'Jianmin Wu'], 'affiliations': ['Baidu', 'Fudan University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00425.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#training', '#rl', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Адаптивное управление неопределённостью для эффективного кредита-ассайнмента в агентных системах', 'desc': 'В работе представлен метод AEM для назначения кредитов в обучении с подкреплением агентов на основе языковых моделей без дополнительной супервизии. Основная идея заключается в адаптивной модуляции динамики энтропии на уровне полного ответа (а не отдельного токена), что лучше соответствует гранулярности действий LLM-агентов и улучшает баланс между исследованием и эксплуатацией. Метод использует прокси неопределённости на уровне ответа для масштабирования преимуществ, естественным образом переходя от разведочного к эксплуатационному поведению. Экспериментальные результаты на бенчмарках ALFWorld, WebShop и SWE-bench демонстрируют консистентное улучшение производительности по сравнению с сильными базовыми методами обучения с подкреплением.'}, 'en': {'title': 'Revolutionizing Reinforcement Learning with Supervision-Free Credit Assignment', 'desc': 'This paper introduces AEM, a new method for credit assignment in reinforcement learning (RL) that does not require additional supervision. It focuses on improving the balance between exploration and exploitation by adjusting entropy dynamics at the response level, rather than at the individual token level. This approach helps language model agents better understand the impact of their complete responses on the environment, leading to more effective learning. The results show that AEM enhances performance across various tasks and models, demonstrating its potential to simplify RL training while improving outcomes.'}, 'zh': {'title': '无监督信用分配，提升强化学习表现', 'desc': '本文提出了一种新颖的无监督信用分配方法AEM，旨在改善语言模型代理的强化学习（RL）性能。该方法通过在响应级别调整熵动态，优化探索与利用的平衡，从而提高任务表现。传统的RL方法依赖稀疏奖励，难以有效指导长交互过程中的每一步，而AEM则避免了对中间监督的依赖，简化了训练过程。实验结果表明，AEM在多个基准测试中显著提升了RL基线的表现，证明了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.06924', 'title': 'A^2RD: Agentic Autoregressive Diffusion for Long Video Consistency', 'url': 'https://huggingface.co/papers/2605.06924', 'abstract': 'Abstract A$^2$RD, an Agentic Auto-Regressive Diffusion architecture, addresses long video synthesis challenges through a closed-loop process with memory tracking, adaptive generation, and hierarchical self-improvement mechanisms.  AI-generated summary Synthesizing consistent and coherent long video remains a fundamental challenge. Existing methods suffer from semantic drift and narrative collapse over long horizons. We present A^2RD, an Agentic Auto-Regressive Diffusion architecture that decouples creative synthesis from consistency enforcement. A^2RD formulates long video synthesis as a closed-loop process that synthesizes and self-improves video segment-by-segment through a Retrieve--Synthesize--Refine--Update cycle. It comprises three core components: (i) Multimodal Video Memory that tracks video progression across modalities; (ii) Adaptive Segment Generation that switches among generation modes for natural progression and visual consistency; and (iii) Hierarchical Test-Time Self-Improvement that self-improves each segment at frame and video levels to prevent error propagation. We further introduce LVBench-C, a challenging benchmark with non-linear entity and environment transitions to stress-test long-horizon consistency. Across public and LVBench-C benchmarks spanning one- to ten-minute videos, A^2RD outperforms state-of-the-art baselines by up to 30% in consistency and 20% in narrative coherence. Human evaluations corroborate these gains while also highlighting notable improvements in motion and transition smoothness.', 'score': 8, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '8540a5b4ff6706c9', 'authors': ['Do Xuan Long', 'Yale Song', 'Min-Yen Kan', 'Tomas Pfister', 'Long T. Le'], 'affiliations': ['Google Cloud AI Research', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.06924.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Самоулучшающаяся диффузия для синтеза длинных видео без дрейфа смысла', 'desc': 'A²RD — это агентивная архитектура диффузионной модели для синтеза длинных видеоматериалов, которая использует замкнутый цикл Retrieve–Synthesize–Refine–Update для поэтапного генерирования и улучшения видеосегментов. Система включает три ключевых компонента: мультимодальную память видео для отслеживания прогрессии контента, адаптивную генерацию сегментов с выбором оптимального режима синтеза, и иерархическое самоулучшение на уровне кадров и видео для предотвращения накопления ошибок. Авторы представили новый бенчмарк LVBench-C с нелинейными переходами сущностей и окружения для проверки устойчивости моделей к долгосрочным зависимостям. Экспериментальные результаты демонстрируют превосходство A²RD над существующими методами на 30% по метрикам консистентности и 20% по связности повествования при синтезе видео длительностью от одной до десяти минут.'}, 'en': {'title': 'Revolutionizing Long Video Synthesis with A^2RD', 'desc': 'The paper introduces A^2RD, an innovative architecture designed for generating long videos while maintaining consistency and coherence. It employs a closed-loop process that allows for memory tracking and adaptive generation, addressing common issues like semantic drift. A^2RD operates through a Retrieve-Synthesize-Refine-Update cycle, enhancing video quality segment by segment. The architecture includes a Multimodal Video Memory, Adaptive Segment Generation, and Hierarchical Test-Time Self-Improvement, leading to significant improvements in video synthesis performance compared to existing methods.'}, 'zh': {'title': '长视频合成的新突破：A$^2$RD架构', 'desc': 'A$^2$RD是一种代理自回归扩散架构，旨在解决长视频合成中的挑战。它通过闭环过程进行视频合成，结合记忆跟踪、适应性生成和分层自我改进机制。该方法将长视频合成视为一个循环过程，通过检索、合成、精炼和更新的周期逐段生成和自我改进视频。实验结果表明，A$^2$RD在一致性和叙事连贯性方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2605.07915', 'title': 'What Matters for Diffusion-Friendly Latent Manifold? Prior-Aligned Autoencoders for Latent Diffusion', 'url': 'https://huggingface.co/papers/2605.07915', 'abstract': 'Abstract Research investigates latent manifold properties for diffusion models and proposes a Prior-Aligned AutoEncoder that explicitly optimizes latent space structure for improved generative modeling.  AI-generated summary Tokenizers are a crucial component of latent diffusion models, as they define the latent space in which diffusion models operate. However, existing tokenizers are primarily designed to improve reconstruction fidelity or inherit pretrained representations, leaving unclear what kind of latent space is truly friendly for generative modeling. In this paper, we study this question from the perspective of latent manifold organization. By constructing controlled tokenizer variants, we identify three key properties of a diffusion-friendly latent manifold: coherent spatial structure, local manifold continuity, and global manifold semantics. We find that these properties are more consistent with downstream generation quality than reconstruction fidelity. Motivated by this finding, we propose the Prior-Aligned AutoEncoder (PAE), which explicitly shapes the latent manifold instead of leaving diffusion-friendly manifold to emerge indirectly from reconstruction or inheritance. Specifically, PAE leverages refined priors derived from VFMs and perturbation-based regularization to turn spatial structure, local continuity, and global semantics into explicit training objectives. On ImageNet 256x256, PAE improves both training efficiency and generation quality over existing tokenizers, reaching performance comparable to RAE with up to 13x faster convergence under the same training setup and achieving a new state-of-the-art gFID of 1.03. These results highlight the importance of organizing the latent manifold for latent diffusion models.', 'score': 7, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '4de8eda8b74e9e20', 'authors': ['Zhengrong Yue', 'Taihang Hu', 'Mengting Chen', 'Haiyu Zhang', 'Zihao Pan', 'Tao Liu', 'Zikang Wang', 'Jinsong Lan', 'Xiaoyong Zhu', 'Bo Zheng', 'Yali Wang'], 'affiliations': ['Alibaba Group', 'Beihang University', 'Nankai University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07915.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#architecture', '#cv'], 'emoji': '🧬', 'ru': {'title': 'Явная организация латентного многообразия для улучшения диффузионного моделирования', 'desc': 'В работе исследуются свойства скрытого многообразия в диффузионных моделях и предлагается Prior-Aligned AutoEncoder, который явно оптимизирует структуру латентного пространства. Авторы выявили три ключевых свойства благоприятного для генерации многообразия: связная пространственная структура, локальная непрерывность и глобальная семантика. Было обнаружено, что эти свойства лучше коррелируют с качеством генерации, чем с точностью реконструкции. Предложенный метод PAE использует уточненные приоры из VFMs и регуляризацию на основе возмущений, чтобы явно учитывать эти свойства в процессе обучения.'}, 'en': {'title': 'Optimizing Latent Space for Better Generative Models', 'desc': 'This paper explores how to improve generative modeling in diffusion models by focusing on the structure of the latent space. It identifies three important properties for a diffusion-friendly latent manifold: coherent spatial structure, local manifold continuity, and global manifold semantics. The authors introduce the Prior-Aligned AutoEncoder (PAE), which explicitly optimizes these properties during training rather than relying on indirect methods. Their results show that PAE significantly enhances both training efficiency and generation quality, achieving state-of-the-art performance on ImageNet.'}, 'zh': {'title': '优化潜在流形，提升生成质量', 'desc': '本研究探讨了扩散模型的潜在流形特性，并提出了一种优先对齐自编码器（Prior-Aligned AutoEncoder），该模型明确优化潜在空间结构以改善生成建模。现有的标记器主要关注重建精度或继承预训练表示，未能清晰定义适合生成建模的潜在空间。我们通过构建受控的标记器变体，识别出扩散友好的潜在流形的三个关键特性：一致的空间结构、局部流形连续性和全局流形语义。实验结果表明，这些特性与下游生成质量的相关性高于重建精度，因此我们提出的PAE模型在训练效率和生成质量上均优于现有标记器。'}}}, {'id': 'https://huggingface.co/papers/2605.07363', 'title': 'MISA: Mixture of Indexer Sparse Attention for Long-Context LLM Inference', 'url': 'https://huggingface.co/papers/2605.07363', 'abstract': "Abstract MISA replaces the dense token-wise indexing in sparse attention with a routed mixture-of-experts approach that reduces computational cost while maintaining performance and handling long contexts effectively.  AI-generated summary DeepSeek Sparse Attention (DSA) sets the state of the art for fine-grained inference-time sparse attention by introducing a learned token-wise indexer that scores every prefix token and selects the most relevant ones for the main attention. To remain expressive, the indexer uses many query heads (for example, 64 on DeepSeek-V3.2) that share the same selected token set; this multi-head design is precisely what makes the indexer the dominant cost on long contexts. We propose MISA (Mixture of Indexer Sparse Attention), a drop-in replacement for the DSA indexer that treats its indexer heads as a pool of mixture-of-experts. A lightweight router uses cheap block-level statistics to pick a query-dependent subset of only a few active heads, and only those heads run the heavy token-level scoring. This preserves the diversity of the original indexer pool while reducing the per-query cost from scoring every prefix token with every head to scoring it with only a handful of routed heads, plus a negligible router term computed on a small set of pooled keys. We further introduce a hierarchical variant of MISA that uses the routed pass to keep an enlarged candidate set and then re-ranks it with the original DSA indexer to recover the final selected tokens almost exactly. With only eight active heads and no additional training, MISA matches the dense DSA indexer on LongBench across DeepSeek-V3.2 and GLM-5 while running with eight and four times fewer indexer heads respectively, and outperforms HISA on average. It also preserves fully green Needle-in-a-Haystack heatmaps up to a 128K-token context and recovers more than 92% of the tokens selected by the DSA indexer per layer. Our TileLang kernel delivers roughly a 3.82 times speedup over DSA's original indexer kernel on a single NVIDIA H200 GPU.", 'score': 7, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '71197b8c5eba7365', 'authors': ['Ruijie Zhou', 'Fanxu Meng', 'Yufei Xu', 'Tongxuan Liu', 'Guangming Lu', 'Muhan Zhang', 'Wenjie Pei'], 'affiliations': ['outlook.com', 'stu.pku.edu.cn'], 'pdf_title_img': 'assets/pdf/title_img/2605.07363.jpg', 'data': {'categories': ['#inference', '#optimization', '#long_context', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Экспертная маршрутизация для эффективного разреженного внимания', 'desc': 'В работе предложен метод MISA, который заменяет плотное индексирование токенов в разреженном внимании на подход смеси экспертов. Это значительно снижает вычислительные затраты при обработке длинных контекстов, сохраняя качество работы модели. Легкий маршрутизатор выбирает небольшое подмножество головок внимания для каждого запроса, используя дешевые блочные статистики, что избегает необходимости вычисления оценок для каждого токена со всеми головками. Иерархический вариант MISA дополнительно переранжирует候выбранные токены исходным методом, достигая ускорения в 3.82 раза без потери качества на задачах с длинными контекстами.'}, 'en': {'title': 'Efficient Sparse Attention with Mixture-of-Experts', 'desc': 'The paper introduces MISA, a new method for sparse attention in machine learning that improves efficiency by using a mixture-of-experts approach. Instead of scoring every token with all query heads, MISA routes a small subset of active heads to reduce computational costs while maintaining performance. This method allows for effective handling of long contexts and retains the diversity of the original indexer. MISA achieves comparable results to the existing Dense Sparse Attention indexer while significantly speeding up processing times on large datasets.'}, 'zh': {'title': 'MISA：高效的稀疏注意力新选择', 'desc': 'MISA（混合索引稀疏注意力）通过路由混合专家的方法，替代了稠密的逐标记索引，从而降低了计算成本，同时保持了性能并有效处理长上下文。该方法引入了一种轻量级的路由器，利用低成本的块级统计信息选择少量活跃的查询头，减少了每个查询的计算负担。MISA在DeepSeek-V3.2和GLM-5上与稠密的DSA索引器表现相当，同时使用的索引头数量分别减少了八倍和四倍。此外，MISA在处理128K标记上下文时，能够保留原始DSA索引器选择的92%以上的标记。'}}}, {'id': 'https://huggingface.co/papers/2605.06597', 'title': 'UniSD: Towards a Unified Self-Distillation Framework for Large Language Models', 'url': 'https://huggingface.co/papers/2605.06597', 'abstract': 'Abstract Self-distillation framework UniSD systematically addresses challenges in autoregressive language model adaptation through integrated mechanisms for supervision reliability, representation alignment, and training stability.  AI-generated summary Self-distillation (SD) offers a promising path for adapting large language models (LLMs) without relying on stronger external teachers. However, SD in autoregressive LLMs remains challenging because self-generated trajectories are free-form, correctness is task-dependent, and plausible rationales can still provide unstable or unreliable supervision. Existing methods mainly examine isolated design choices, leaving their effectiveness, roles, and interactions unclear. In this paper, we propose UniSD, a unified framework to systematically study self-distillation. UniSD integrates complementary mechanisms that address supervision reliability, representation alignment, and training stability, including multi-teacher agreement, EMA teacher stabilization, token-level contrastive learning, feature matching, and divergence clipping. Across six benchmarks and six models from three model families, UniSD reveals when self-distillation improves over static imitation, which components drive the gains, and how these components interact across tasks. Guided by these insights, we construct UniSDfull, an integrated pipeline that combines complementary components and achieves the strongest overall performance, improving over the base model by +5.4 points and the strongest baseline by +2.8 points. Extensive evaluation highlights self-distillation as a practical and steerable approach for efficient LLM adaptation without stronger external teachers.', 'score': 6, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '34d07dcb91c9405b', 'authors': ['Yiqiao Jin', 'Yiyang Wang', 'Lucheng Fu', 'Yijia Xiao', 'Yinyi Luo', 'Haoxin Liu', 'B. Aditya Prakash', 'Josiah Hester', 'Jindong Wang', 'Srijan Kumar'], 'affiliations': ['Carnegie Mellon University', 'Georgia Institute of Technology', 'University of California, Los Angeles', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2605.06597.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Самодистилляция языковых моделей через интегрированные механизмы стабильности и надежности', 'desc': 'В работе предложена унифицированная структура UniSD для самодистилляции авторегрессивных языковых моделей, которая решает проблему надежности обучающего сигнала от самогенерируемых траекторий. Фреймворк интегрирует несколько дополняющих механизмов: согласованность нескольких учителей, стабилизацию через экспоненциальное скользящее среднее, контрастивное обучение на уровне токенов и ограничение расхождения. Авторы проводят систематическое исследование взаимодействия компонентов на шести бенчмарках и показывают, когда самодистилляция превосходит статическую имитацию. Достигнутая интегрированная версия UniSDfull показывает улучшение на 5.4 пункта над базовой моделью, демонстрируя эффективность подхода для адаптации больших языковых моделей без более мощного учителя.'}, 'en': {'title': 'UniSD: Enhancing Language Model Adaptation through Self-Distillation', 'desc': 'The paper presents UniSD, a self-distillation framework designed to enhance the adaptation of autoregressive language models. It addresses key challenges such as supervision reliability, representation alignment, and training stability by integrating various mechanisms like multi-teacher agreement and token-level contrastive learning. The study evaluates the effectiveness of these components across multiple benchmarks and models, revealing how they interact and contribute to performance improvements. Ultimately, UniSDfull demonstrates significant gains in model performance, showcasing self-distillation as a viable method for adapting large language models without the need for stronger external teachers.'}, 'zh': {'title': '自我蒸馏：高效适应大语言模型的新路径', 'desc': '本文提出了一种自我蒸馏框架UniSD，旨在解决自回归语言模型适应中的挑战。UniSD通过整合多种机制，提高了监督的可靠性、表示的一致性和训练的稳定性。研究表明，自我蒸馏在某些任务上优于静态模仿，并揭示了各个组件之间的相互作用。最终，UniSDfull作为一个综合管道，显著提升了模型性能，证明了自我蒸馏在大语言模型适应中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.06716', 'title': 'From Storage to Experience: A Survey on the Evolution of LLM Agent Memory Mechanisms', 'url': 'https://huggingface.co/papers/2605.06716', 'abstract': 'Abstract Large language model agents rely on memory mechanisms that evolve through three stages—storage, reflection, and experience—driven by consistency, dynamic environments, and continual learning goals.  AI-generated summary Large Language Model (LLM)-based agents have fundamentally reshaped artificial intelligence by integrating external tools and planning capabilities. While memory mechanisms have emerged as the architectural cornerstone of these systems, current research remains fragmented, oscillating between operating system engineering and cognitive science. This theoretical divide prevents a unified view of technological synthesis and a coherent evolutionary perspective. To bridge this gap, this survey proposes a novel evolutionary framework for LLM agent memory mechanisms, formalizing the development process into three stages: Storage (trajectory preservation), Reflection (trajectory refinement), and Experience (trajectory abstraction). We first formally define these three stages before analyzing the three core drivers of this evolution: the necessity for long-range consistency, the challenges in dynamic environments, and the ultimate goal of continual learning. Furthermore, we specifically explore two transformative mechanisms in the frontier Experience stage: proactive exploration and cross-trajectory abstraction. By synthesizing these disparate views, this work offers robust design principles and a clear roadmap for the development of next-generation LLM agents.', 'score': 4, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '5b068282a6fd9158', 'authors': ['Jinghao Luo', 'Yuchen Tian', 'Chuxue Cao', 'Ziyang Luo', 'Hongzhan Lin', 'Kaixin Li', 'Chuyi Kong', 'Ruichao Yang', 'Jing Ma'], 'affiliations': ['Hong Kong Baptist University', 'Hong Kong University of Science and Technology', 'National University of Singapore', 'South China Normal University', 'University of Science and Technology Beijing'], 'pdf_title_img': 'assets/pdf/title_img/2605.06716.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Эволюция памяти в LLM-агентах: от хранения к абстрагированию опыта', 'desc': 'В этой работе предложена эволюционная框架для механизмов памяти LLM-агентов, которые развиваются через три стадии: Storage (сохранение траекторий), Reflection (уточнение траекторий) и Experience (абстрагирование траекторий). Авторы определяют три ключевых движущих фактора эволюции: необходимость долгосрочной консистентности, адаптация к динамическим окружениям и достижение постоянного обучения. Особое внимание уделяется передовым механизмам на стадии Experience: проактивной разведке и кросс-траекторному абстрагированию. Работа объединяет разрозненные подходы из инженерии и когнитивной науки, предоставляя принципы проектирования и дорожную карту для разработки агентов нового поколения.'}, 'en': {'title': 'Evolving Memory Mechanisms for Next-Gen LLM Agents', 'desc': 'This paper discusses how large language model (LLM) agents use memory in three key stages: Storage, Reflection, and Experience. These stages help LLMs maintain consistency, adapt to changing environments, and achieve continual learning. The authors propose a new framework that connects insights from both engineering and cognitive science to improve LLM design. By focusing on proactive exploration and cross-trajectory abstraction, the paper aims to guide the development of more advanced LLM agents.'}, 'zh': {'title': '大语言模型代理的记忆机制进化框架', 'desc': '这篇论文探讨了大语言模型代理的记忆机制，分为存储、反思和经验三个阶段。记忆机制是这些系统的核心，影响着它们的学习和适应能力。论文提出了一个新的进化框架，强调了长远一致性、动态环境中的挑战和持续学习的目标。通过整合不同的观点，提供了下一代大语言模型代理的设计原则和发展路线图。'}}}, {'id': 'https://huggingface.co/papers/2605.08043', 'title': 'SCOPE: Structured Decomposition and Conditional Skill Orchestration for Complex Image Generation', 'url': 'https://huggingface.co/papers/2605.08043', 'abstract': 'Abstract SCOPE is a specification-guided framework that maintains semantic commitments throughout text-to-image generation to improve complex visual intent fulfillment.  AI-generated summary While text-to-image models have made strong progress in visual fidelity, faithfully realizing complex visual intents remains challenging because many requirements must be tracked across grounding, generation, and verification. We refer to these requirements as semantic commitments and formalize their lifecycle discontinuity as the Conceptual Rift, where commitments may be locally resolved or checked but fail to remain identifiable as the same operational units throughout the generation lifecycle. To address this, we propose SCOPE, a specification-guided skill orchestration framework that maintains semantic commitments in an evolving structured specification and conditionally invokes retrieval, reasoning, and repair skills around unresolved or violated commitments. To evaluate commitment-level intent realization, we introduce Gen-Arena, a human-annotated benchmark with entity- and constraint-level specifications, together with Entity-Gated Intent Pass Rate (EGIP), a strict entity-first pass criterion. SCOPE substantially outperforms all evaluated baselines on Gen-Arena, achieving 0.60 EGIP, and further achieves strong results on WISE-V (0.907) and MindBench (0.61), demonstrating the effectiveness of persistent commitment tracking for complex image generation.', 'score': 3, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'caab329c9ef7461a', 'authors': ['Tianfei Ren', 'Zhipeng Yan', 'Yiming Zhao', 'Zhen Fang', 'Yu Zeng', 'Guohui Zhang', 'Hang Xu', 'Xiaoxiao Ma', 'Shiting Huang', 'Ke Xu', 'Wenxuan Huang', 'Lionel Z. Wang', 'Lin Chen', 'Zehui Chen', 'Jie Huang', 'Feng Zhao'], 'affiliations': ['Nanyang Technological University', 'The Hong Kong Polytechnic University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.08043.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Сохранение семантических обязательств для точной генерации сложных изображений', 'desc': 'SCOPE — это фреймворк, управляемый спецификациями, который отслеживает семантические обязательства на протяжении всего процесса генерации изображений по текстовому описанию. Авторы формализуют проблему «Концептуального разрыва», когда требования теряют идентичность по мере прохождения через этапы генерации и верификации. Предложенный метод использует оркестрацию навыков (поиск, рассуждение и исправление), чтобы поддерживать структурированную спецификацию и разрешать нарушенные обязательства. Эффективность подхода подтверждается на новом бенчмарке Gen-Arena с метрикой EGIP, а также на существующих датасетах WISE-V и MindBench.'}, 'en': {'title': 'SCOPE: Bridging the Conceptual Rift in Text-to-Image Generation', 'desc': 'The paper introduces SCOPE, a framework designed to enhance text-to-image generation by maintaining semantic commitments throughout the process. It identifies the challenge of the Conceptual Rift, where visual intents can become disconnected during generation. SCOPE addresses this by orchestrating skills for retrieval, reasoning, and repair to ensure that these commitments are consistently tracked. The framework is evaluated using the Gen-Arena benchmark, showing significant improvements in fulfilling complex visual intents compared to existing methods.'}, 'zh': {'title': 'SCOPE：保持语义承诺的图像生成框架', 'desc': 'SCOPE是一个规范引导的框架，旨在文本到图像生成过程中保持语义承诺，以提高复杂视觉意图的实现。尽管文本到图像模型在视觉真实感方面取得了显著进展，但忠实实现复杂视觉意图仍然具有挑战性，因为需要在生成的各个阶段跟踪许多要求。我们将这些要求称为语义承诺，并将其生命周期的不连续性形式化为概念裂缝，承诺可能在局部得到解决或检查，但在整个生成生命周期中未能保持可识别性。为了解决这个问题，我们提出了SCOPE框架，通过条件调用检索、推理和修复技能，围绕未解决或违反的承诺，维护一个不断演变的结构化规范。'}}}, {'id': 'https://huggingface.co/papers/2605.08029', 'title': 'STARFlow2: Bridging Language Models and Normalizing Flows for Unified Multimodal Generation', 'url': 'https://huggingface.co/papers/2605.08029', 'abstract': 'Abstract Autoregressive normalizing flows based on Transformer architecture enable unified multimodal generation by aligning text and image processing through shared causal masking and KV-cache mechanisms.  AI-generated summary Deep generative models have advanced rapidly across text and vision, motivating unified multimodal systems that can understand, reason over, and generate interleaved text-image sequences. Most existing approaches combine autoregressive language modeling with diffusion-based image generators, inheriting a structural mismatch between causal text generation and iterative visual denoising. We observe that autoregressive normalizing flows are autoregressive Transformers--sharing the same causal mask, KV-cache mechanism, and left-to-right structure as LLMs--making them the most natural paradigm for true unified multimodal generation. We present STARFlow2, built on the Pretzel architecture that vertically interleaves a pretrained VLM stream with a TarFlow stream via residual skip connections, both operating under the same causal mask. Combined with a deep-shallow flow design and a unified FAE latent space, STARFlow2 enables cache-friendly interleaved generation where both text and visual outputs directly enter the KV-cache without re-encoding. Experiments demonstrate strong performance across image generation and multimodal understanding benchmarks, validating autoregressive flows as a viable foundation for unified multimodal modeling.', 'score': 3, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'f91ea1d36ea13c4f', 'authors': ['Ying Shen', 'Tianrong Chen', 'Yuan Gao', 'Yizhe Zhang', 'Yuyang Wang', 'Miguel Ángel Bautista', 'Shuangfei Zhai', 'Joshua M. Susskind', 'Jiatao Gu'], 'affiliations': ['Apple', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.08029.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#diffusion', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная генерация через авторегрессивные нормализующие потоки', 'desc': 'В статье предлагается STARFlow2 — система для единого мультимодального поколения текста и изображений на основе авторегрессивных нормализующих потоков и архитектуры Transformer. Авторы показывают, что авторегрессивные нормализующие потоки имеют ту же структуру, что и LLM, с причинной маской и механизмом KV-кэша, что позволяет избежать несогласованности между генерацией текста и итеративной денойзацией изображений. Модель использует архитектуру Pretzel, которая переплетает поток предварительно обученной VLM с потоком TarFlow через остаточные пропускные соединения, оба работают под единой причинной маской. Экспериментальные результаты демонстрируют сильную производительность на задачах генерации изображений и понимания мультимодальных данных.'}, 'en': {'title': 'Unified Multimodal Generation with STARFlow2', 'desc': 'This paper introduces STARFlow2, a model that uses autoregressive normalizing flows based on Transformer architecture for generating both text and images together. It aligns text and image processing by utilizing shared causal masking and KV-cache mechanisms, allowing for seamless multimodal generation. Unlike previous methods that combine different models, STARFlow2 integrates a pretrained vision-language model with a flow-based text generator, ensuring a consistent structure. The results show that this approach performs well in generating images and understanding multimodal content, proving that autoregressive flows can effectively unify text and image generation.'}, 'zh': {'title': '统一多模态生成的自回归归一化流', 'desc': '这篇论文介绍了一种基于Transformer架构的自回归归一化流模型，旨在实现文本和图像的统一生成。通过共享因果掩码和KV缓存机制，该模型能够同时处理文本和图像数据。研究者提出了STARFlow2模型，它结合了预训练的视觉语言模型和自回归流，能够高效地生成交错的文本和图像序列。实验结果表明，该模型在图像生成和多模态理解任务上表现出色，验证了自回归流在统一多模态建模中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.06832', 'title': 'IntentGrasp: A Comprehensive Benchmark for Intent Understanding', 'url': 'https://huggingface.co/papers/2605.06832', 'abstract': "Abstract IntentGrasp is a benchmark for evaluating large language models' intent understanding capability, demonstrating poor performance across 20 models and showing significant improvements with intentional fine-tuning.  AI-generated summary Accurately understanding the intent behind speech, conversation, and writing is crucial to the development of helpful Large Language Model (LLM) assistants. This paper introduces IntentGrasp, a comprehensive benchmark for evaluating the intent understanding capability of LLMs. Derived from 49 high-quality, open-licensed corpora spanning 12 diverse
