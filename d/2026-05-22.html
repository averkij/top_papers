    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.22355', 'title': 'TransitLM: A Large-Scale Dataset and Benchmark for Map-Free Transit Route Generation', 'url': 'https://huggingface.co/papers/2605.22355', 'abstract': 'Abstract TransitLM dataset enables end-to-end transit route planning using large language models trained on structured transit data, eliminating the need for traditional map-based approaches.  AI-generated summary Public transit route planning traditionally depends on structured map infrastructure and complex routing engines, and no existing dataset supports training models to bypass this dependency. We present TransitLM, a large-scale dataset of over 13 million transit route planning records from four Chinese cities covering 120,845 stations and 13,666 lines, released as a continual pre-training corpus and benchmark data for three evaluation tasks with complementary metrics. Experiments show that an LLM trained on TransitLM produces structurally valid routes at high accuracy and implicitly grounds arbitrary GPS coordinates to appropriate stations without any explicit mapping. These results demonstrate that transit route planning can be learned entirely from data, enabling end-to-end, map-free route generation directly from origin-destination information. The dataset and benchmark are available at https://huggingface.co/datasets/GD-ML/TransitLM, with evaluation code at https://github.com/HotTricker/TransitLM.', 'score': 159, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '0fb04ab6339f1574', 'authors': ['Hanyu Guo', 'Jiedong Yang', 'Chao Chen', 'Longfei Xu', 'Kaikui Liu', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group', 'Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.22355.jpg', 'data': {'categories': ['#multilingual', '#benchmark', '#dataset'], 'emoji': '🚇', 'ru': {'title': 'Планирование транспортных маршрутов напрямую из данных без карт', 'desc': 'В статье представлен датасет TransitLM, содержащий более 13 миллионов записей о планировании маршрутов общественного транспорта из четырёх китайских городов. Авторы показали, что большая языковая модель, обученная на этих данных, может генерировать корректные маршруты без традиционной картографической инфраструктуры и сложных алгоритмов маршрутизации. Модель автоматически привязывает GPS-координаты к подходящим станциям, изучив эти закономерности исключительно из данных. Результаты демонстрируют возможность создания end-to-end системы маршрутизации, которая работает только на основе текстовых данных без явного использования карт.'}, 'en': {'title': 'Revolutionizing Transit Planning with Data-Driven Models', 'desc': 'The paper introduces the TransitLM dataset, which allows for end-to-end public transit route planning using large language models (LLMs) without relying on traditional map-based systems. It consists of over 13 million records from four Chinese cities, covering a vast network of stations and lines. The dataset serves as a continual pre-training corpus and includes benchmark tasks for evaluating model performance. Experiments show that LLMs trained on TransitLM can accurately generate transit routes and associate GPS coordinates with the correct stations, demonstrating the potential for data-driven, map-free route planning.'}, 'zh': {'title': '无地图的端到端公共交通路线规划', 'desc': 'TransitLM数据集使得使用大型语言模型进行端到端的公共交通路线规划成为可能，摆脱了传统基于地图的方法。该数据集包含来自四个中国城市的1300多万条公共交通路线记录，涵盖了120,845个车站和13,666条线路。实验表明，基于TransitLM训练的大型语言模型能够高准确率地生成结构有效的路线，并且能够将任意GPS坐标隐式地映射到合适的车站。这个研究表明，公共交通路线规划可以完全通过数据学习，实现从起点到终点的信息直接生成，而无需依赖地图。'}}}, {'id': 'https://huggingface.co/papers/2605.22109', 'title': 'Perception or Prejudice: Can MLLMs Go Beyond First Impressions of Personality?', 'url': 'https://huggingface.co/papers/2605.22109', 'abstract': 'Abstract Researchers introduce a new task and dataset for evaluating personality reasoning in multimodal language models, revealing significant gaps between accurate predictions and grounded reasoning processes.  AI-generated summary Multimodal Large Language Models (MLLMs) are increasingly deployed in human-facing roles where personality perception is critical, yet existing benchmarks evaluate this capability solely on numerical Big Five score prediction, leaving open whether models truly perceive personality through behavioral understanding or merely prejudge through superficial pattern matching. We address this gap with three contributions. (i) A new task: we formalize Grounded Personality Reasoning (GPR), which requires MLLMs to anchor each Big Five rating in observable evidence through a chain of rating, reasoning, and grounding. (ii) A new dataset: we release MM-OCEAN (1,104 videos, 5,320 MCQs), produced by a multi-agent pipeline with human verification, with timestamped behavioral observations, evidence-grounded trait analyses, and seven categories of cue-grounding MCQs. (iii) Benchmark and analysis: we design a three-tier evaluation (rating, reasoning, grounding) plus four sample-level failure-mode metrics: Prejudice Rate (PR), Confabulation Rate (CR), Integration-failure Rate (IR), and Holistic-grounding Rate (HR), and benchmark 27 MLLMs (13 closed, 14 open). The analysis uncovers a striking Prejudice Gap: across the field, 51% of correct ratings are not grounded in retrieved cues, and the Holistic-Grounding Rate spans only 0-33.5%. These findings expose a disconnect between getting the right score and reasoning for the right reason, charting a roadmap for grounded social cognition in MLLMs.', 'score': 151, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '01acc8bfd60b73da', 'authors': ['Caixin Kang', 'Tianyu Yan', 'Sitong Gong', 'Mingfang Zhang', 'Liangyang Ouyang', 'Ruicong Liu', 'Bo Zheng', 'Huchuan Lu', 'Kaipeng Zhang', 'Yoichi Sato', 'Yifei Huang'], 'affiliations': ['Dalian University of Technology', 'Shanda AI Research Tokyo', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2605.22109.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#open_source', '#reasoning', '#interpretability', '#multimodal'], 'emoji': '🎭', 'ru': {'title': 'От угадывания к пониманию: обоснованное восприятие личности в мультимодальных моделях', 'desc': 'Исследователи представляют новую задачу и датасет для оценки способности мультимодальных больших языковых моделей (MLLM) понимать личность человека. Они формализуют задачу Grounded Personality Reasoning (GPR), которая требует от моделей обосновывать оценки черт личности на основе наблюдаемых поведенческих признаков, а не только предсказывать числовые значения. Создан новый датасет MM-OCEAN с 1104 видео и множественными вопросами для проверки того, насколько хорошо модели связывают свои выводы с конкретными визуальными доказательствами. Анализ 27 MLLM выявил значительный разрыв: половина корректных предсказаний не опирается на реальные поведенческие сигналы, что указывает на необходимость улучшения понимания социального взаимодействия в моделях.'}, 'en': {'title': 'Bridging the Gap: Grounded Personality Reasoning in AI', 'desc': "This paper introduces a new task called Grounded Personality Reasoning (GPR) to evaluate how well multimodal large language models (MLLMs) understand personality traits based on observable behaviors. The authors present a new dataset, MM-OCEAN, which includes videos and multiple-choice questions designed to test the models' ability to ground their personality ratings in real evidence. They also propose a comprehensive evaluation framework that assesses models on their rating accuracy, reasoning processes, and grounding capabilities. The results reveal a significant gap between accurate predictions and the models' ability to provide grounded reasoning, highlighting the need for improved understanding of social cognition in AI."}, 'zh': {'title': '揭示个性推理的深度与表面之差', 'desc': '本研究提出了一项新任务和数据集，用于评估多模态语言模型中的个性推理能力。研究表明，现有的评估方法仅依赖于大五人格评分的数值预测，未能真正考察模型是否通过行为理解来感知个性。我们引入了“基于证据的个性推理”（GPR），要求模型通过可观察的证据来支持每个评分。我们还发布了MM-OCEAN数据集，并设计了多层次的评估标准，以揭示模型在个性推理中的不足。'}}}, {'id': 'https://huggingface.co/papers/2605.21467', 'title': 'DelTA: Discriminative Token Credit Assignment for Reinforcement Learning from Verifiable Rewards', 'url': 'https://huggingface.co/papers/2605.21467', 'abstract': 'Abstract Reinforcement learning from verifiable rewards is enhanced through a discriminative token credit assignment method that improves reward-based training by amplifying distinctive token-gradient directions and reducing noise from shared patterns.  AI-generated summary Reinforcement learning from verifiable rewards (RLVR) has emerged as a central technique for improving the reasoning capabilities of large language models. Despite its effectiveness, how response-level rewards translate into token-level probability changes remains poorly understood. We introduce a discriminator view of RLVR updates, showing that the policy-gradient update direction implicitly acts as a linear discriminator over token-gradient vectors and thereby determines which token probabilities are increased or decreased during learning. Under standard sequence-level RLVR, this discriminator is constructed from positive- and negative-side centroids formed by advantage-weighted averaging of token-gradient vectors. However, such centroid construction can be dominated by shared high-frequency patterns, such as formatting tokens, diluting sparse yet discriminative directions that better distinguish high-reward responses from low-reward ones. To address this limitation, we propose DelTA, a discriminative token credit assignment method that estimates token coefficients to amplify side-specific token-gradient directions and downweight shared or weakly discriminative ones. These coefficients reweight a self-normalized RLVR surrogate, making the effective side-wise centroids more contrastive and thereby reshaping the RLVR update direction. On seven mathematical benchmarks, DelTA outperforms the strongest same-scale baselines by 3.26 and 2.62 average points on Qwen3-8B-Base and Qwen3-14B-Base, respectively. Additional results on code generation, a different backbone, and out-of-domain evaluations further demonstrate the generalization ability of DelTA.', 'score': 124, 'issue_id': 2290, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '0e27981ad1ee3378', 'authors': ['Kaiyi Zhang', 'Wei Wu', 'Yankai Lin'], 'affiliations': ['Ant International', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.21467.jpg', 'data': {'categories': ['#rlhf', '#reasoning', '#optimization', '#rl', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Различимое распределение кредита между токенами для обучения с подкреплением от вознаграждений', 'desc': 'Статья предлагает улучшенный метод обучения с подкреплением от проверяемых вознаграждений, ориентированный на работу с большими языковыми моделями. Авторы показывают, что обновление градиентной политики действует как линейный классификатор над векторами градиентов токенов, определяя, какие вероятности токенов увеличиваются или уменьшаются во время обучения. Проблема стандартного подхода состоит в том, что часто встречающиеся паттерны (например, токены форматирования) доминируют и подавляют редкие, но более различимые направления. Предложенный метод DelTA использует коэффициенты для переосмысления градиентов токенов, усиливая значимые направления и ослабляя общие паттерны, что приводит к лучшему распределению кредита между токенами и повышению производительности на математических задачах и генерации кода.'}, 'en': {'title': 'Enhancing RLVR with Discriminative Token Credit Assignment', 'desc': 'This paper presents a new method called DelTA for improving reinforcement learning from verifiable rewards (RLVR) in large language models. DelTA enhances the training process by focusing on specific token-gradient directions that are more informative, while reducing the impact of common patterns that can obscure learning. The method uses a discriminative approach to assign credit to tokens, allowing for better differentiation between high-reward and low-reward responses. Experimental results show that DelTA significantly outperforms existing methods on various benchmarks, demonstrating its effectiveness and generalization capabilities.'}, 'zh': {'title': '提升奖励学习的判别性方法', 'desc': '本文提出了一种增强可验证奖励的强化学习方法，称为DelTA，旨在改善基于奖励的训练。通过引入判别视角，DelTA能够放大特定的token梯度方向，同时减少共享模式带来的噪声。该方法通过估计token系数，重新加权自归一化的RLVR替代品，使得有效的侧向质心更加对比，从而优化学习过程。实验结果表明，DelTA在多个数学基准测试中显著优于现有的同规模基线。'}}}, {'id': 'https://huggingface.co/papers/2605.14678', 'title': 'π-Bench: Evaluating Proactive Personal Assistant Agents in Long-Horizon Workflows', 'url': 'https://huggingface.co/papers/2605.14678', 'abstract': "Abstract Proactive assistance in personal agent systems requires identifying hidden user intents through sustained multi-turn interactions, which current benchmarks fail to adequately evaluate.  AI-generated summary The rise of personal assistant agents, e.g., OpenClaw, highlights the growing potential of large language models to support users across everyday life and work. A core challenge in these settings is proactive assistance, since users often begin with underspecified requests and leave important needs, constraints, or preferences unstated. However, existing benchmarks rarely evaluate whether agents can identify and act on such hidden intents before they are explicitly stated, especially in sustained multi-turn interactions where user needs emerge gradually. To address this gap, we introduce π-Bench, a benchmark for proactive assistance comprising 100 multi-turn tasks across 5 domain-specific user personas. By incorporating hidden user intents, inter-task dependencies, and cross-session continuity, π-Bench evaluates agents' ability to anticipate and address user needs over extended interactions, jointly measuring proactivity and task completion in long-horizon trajectories that better reflect real-world use. Experiments show (1) proactive assistance remains challenging, (2) a clear distinction between task completion and proactivity, and (3) the value of prior interaction for proactive intent resolution in later tasks.", 'score': 75, 'issue_id': 2288, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'e9d9a9a05236c0a4', 'authors': ['Haoran Zhang', 'Luxin Xu', 'Zhilin Wang', 'Runquan Gui', 'Shunkai Zhang', 'Haodi Lei', 'Zihao He', 'Bingsu He', 'Chicheng Qin', 'Tong Zhu', 'Xiaoye Qu', 'Yang Yang', 'Yu Cheng', 'Yafu Li'], 'affiliations': ['Fudan University', 'Nanjing University', 'Peking University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Soochow University', 'The Chinese University of Hong Kong', 'Tongji University', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14678.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🔮', 'ru': {'title': 'Учить агентов предугадывать скрытые желания пользователей', 'desc': 'В работе представлен новый бенчмарк π-Bench для оценки способности языковых моделей оказывать проактивную помощь пользователям в долгосрочных многооборотных взаимодействиях. Авторы выявляют ограничения существующих методик: они не оценивают, могут ли агенты предугадывать скрытые намерения пользователей, которые не были явно высказаны. Бенчмарк включает 100 задач с пятью различными персонажами пользователей и учитывает межзадачные зависимости, скрытые интенции и историю контекста между сессиями. Экспериментальные результаты показывают, что проактивная помощь остается сложной задачей, и что предыдущие взаимодействия значительно улучшают способность модели идентифицировать скрытые намерения.'}, 'en': {'title': 'Enhancing Proactive Assistance in Personal Agents with π-Bench', 'desc': 'This paper introduces π-Bench, a new benchmark designed to evaluate proactive assistance in personal agent systems. It focuses on the challenge of identifying hidden user intents during multi-turn interactions, where users may not clearly express their needs. The benchmark includes 100 tasks across various user personas, emphasizing the importance of understanding user preferences and constraints over time. Experiments reveal that while proactive assistance is difficult, distinguishing between task completion and proactivity is crucial for improving user-agent interactions.'}, 'zh': {'title': '主动协助：识别用户隐藏意图的关键', 'desc': '本论文探讨了个人助手系统中主动协助的挑战，特别是在多轮交互中识别用户隐藏意图的重要性。现有的评估基准未能有效衡量代理在用户未明确表达需求时的反应能力。为此，作者提出了π-Bench基准，包含100个多轮任务，旨在评估代理在长时间交互中预测和满足用户需求的能力。实验结果表明，主动协助仍然具有挑战性，并且任务完成与主动性之间存在明显区别。'}}}, {'id': 'https://huggingface.co/papers/2605.16928', 'title': 'Full Attention Strikes Back: Transferring Full Attention into Sparse within Hundred Training Steps', 'url': 'https://huggingface.co/papers/2605.16928', 'abstract': "Abstract RTPurbo leverages intrinsic sparsity in full-attention LLMs to achieve efficient long-context inference with minimal training overhead, enabling significant speedups while maintaining near-lossless accuracy.  AI-generated summary Long-context inference in large language models is bottlenecked by the quadratic cost of full attention. Existing efficient alternatives often rely either on native sparse training or on heuristic token eviction, creating an undesirable trade-off among efficiency, training cost, and accuracy. In this work, we show that full-attention LLMs are already intrinsically sparse and can be transformed into highly sparse models with only minimal adaptation. Our approach is built on three observations: (1) only a small subset of attention heads truly requires full long-context processing; (2) long-range retrieval is governed primarily by a low-dimensional subspace, allowing relevant tokens to be retrieved efficiently with a 16-dimensional indexer; and (3) the useful token budget is strongly query-dependent, making dynamic top-p selection more suitable than fixed top-k sparsification. Based on these insights, we propose RTPurbo, which retains the full KV cache only for retrieval heads and introduces a lightweight token indexer for sparse attention. By exploiting the model's intrinsic sparsity, RTPurbo achieves sparsification with only a few hundred training steps. Experiments on long-context benchmarks and reasoning tasks show that RTPurbo preserves near-lossless accuracy while delivering substantial efficiency gains, including up to a 9.36times prefill speedup at 1M context and about a 2.01times decode speedup. These results suggest that strong sparse inference can be obtained from standard full-attention training without expensive native sparse pretraining.", 'score': 70, 'issue_id': 2290, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '48e6aad4ed05a4c5', 'authors': ['Yanke Zhou', 'Yiduo Li', 'Hanlin Tang', 'Maohua Li', 'Kan Liu', 'Lan Tao', 'Lin Qu', 'Yuan Yao', 'Xiaoxing Ma'], 'affiliations': ['Alibaba Group', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2605.16928.jpg', 'data': {'categories': ['#optimization', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Использование природной разреженности внимания для эффективного долгоконтекстного вывода', 'desc': 'RTPurbo — это метод для эффективного долгоконтекстного вывода в больших языковых моделях, который использует внутреннюю разреженность механизма внимания. Авторы показали, что в полноценных моделях внимания уже присутствует природная разреженность: только небольшая часть голов внимания нуждается в полной обработке контекста, а долгодистанционный поиск можно выполнить в низкоразмерном подпространстве. Метод требует минимальной адаптации (всего несколько сотен шагов обучения) и вводит легковесный индексатор токенов для разреженного внимания. Результаты демонстрируют ускорение prefill в 9.36 раза и decode в 2.01 раза при сохранении близкой к исходной точности на долгих контекстах.'}, 'en': {'title': 'Unlocking Efficiency: Sparse Inference in Large Language Models', 'desc': 'RTPurbo is a method that improves the efficiency of long-context inference in large language models (LLMs) by utilizing their inherent sparsity. It reduces the computational cost associated with full attention mechanisms, which typically grow quadratically with context length. By identifying that only a few attention heads need full processing and using a dynamic token selection strategy, RTPurbo minimizes training requirements while maintaining high accuracy. The results demonstrate significant speed improvements in both prefill and decoding processes, showing that effective sparse inference can be achieved without extensive retraining.'}, 'zh': {'title': '利用内在稀疏性提升长上下文推理效率', 'desc': 'RTPurbo利用全注意力大语言模型中的内在稀疏性，实现高效的长上下文推理，且训练开销极小。现有的高效替代方案通常依赖于稀疏训练或启发式的令牌驱逐，导致效率、训练成本和准确性之间的权衡。我们的研究表明，全注意力大语言模型本身已经具有稀疏性，只需进行最小的适应即可转化为高度稀疏的模型。通过动态选择相关令牌，RTPurbo在保持接近无损准确性的同时，实现了显著的效率提升。'}}}, {'id': 'https://huggingface.co/papers/2605.21850', 'title': 'ACC: Compiling Agent Trajectories for Long-Context Training', 'url': 'https://huggingface.co/papers/2605.21850', 'abstract': 'Abstract Agent Context Compilation (ACC) enhances long-context reasoning in LLMs by converting multi-turn agent trajectories into structured QA pairs, enabling direct supervision of distant context integration without additional annotation.  AI-generated summary Recent development of agents has renewed demand for long-context reasoning capacity of LLMs. However, training LLMs for this capacity requires costly long-document curation or heuristic context synthesis. We observe that agents produce massive trajectories when solving problems, invoking tools and receiving environment observations across many turns. The evidence needed to answer the original question is thus scattered throughout these turns, requiring integration of distant context segments. Nevertheless, standard agent SFT masks tool responses and only trains turn-level tool selection, creating a supervision blind spot where these scattered signals go unused. We propose Agent Context Compilation (ACC), which converts trajectories from search, software engineering, and database querying agents into long-context QA pairs that combine the original question with tool responses and environment observations gathered across multiple turns, training the model to answer directly without tool use. This makes the dependencies between the question and the evidence explicit, enabling direct supervision of long-context reasoning over distant segments without additional annotation. ACC is a simple but effective approach that can be combined with any existing long-context extension or training method, providing scalable supervised fine-tuning data. We validate ACC on long-range dependency modeling tasks through MRCR and GraphWalks, challenging benchmarks requiring cross-turn coreference resolution and graph traversal over extended contexts. Training Qwen3-30B-A3B with ACC achieves 68.3 on MRCR (+18.1) and 77.5 on GraphWalks (+7.6), results comparable to Qwen3-235B-A22B, while preserving general capabilities on GPQA, MMLU-Pro, AIME, and IFEval. Further mechanism analysis reveals that the ACC-trained model exhibits task-adaptive attention restructuring and expert specialization.', 'score': 51, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'e71272911812b9cf', 'authors': ['Qisheng Su', 'Zhen Fang', 'Shiting Huang', 'Yu Zeng', 'Yiming Zhao', 'Kou Shi', 'Ziao Zhang', 'Lin Chen', 'Zehui Chen', 'Lijun Wu', 'Feng Zhao'], 'affiliations': ['MoE Key Lab of BIPC, University of Science and Technology of China', 'Shanghai AI Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.21850.jpg', 'data': {'categories': ['#agents', '#training', '#benchmark', '#synthetic', '#reasoning', '#long_context'], 'emoji': '🔍', 'ru': {'title': 'Превращение агентских траекторий в данные для обучения моделей на длинных контекстах', 'desc': 'В статье предлагается метод Agent Context Compilation (ACC), который преобразует траектории работы агентов в пары вопрос-ответ для обучения LLM лучше разбираться в длинных контекстах. Основная идея заключается в том, что при решении задач агенты накапливают информацию, распределённую по множеству шагов, но стандартное обучение с учителем не использует эти сигналы в полной мере. ACC решает эту проблему, создавая явные зависимости между исходными вопросами и свидетельствами, собранными на разных этапах взаимодействия. Экспериментальная проверка показала, что модель Qwen3-30B-A3B с обучением ACC достигает результатов, сравнимых с моделью в 8 раз большего размера, при этом сохраняя общие способности.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with Agent Context Compilation', 'desc': 'Agent Context Compilation (ACC) improves the ability of large language models (LLMs) to reason over long contexts by transforming multi-turn interactions of agents into structured question-answer pairs. This method allows the model to learn from the evidence gathered across multiple turns without needing extra annotations, addressing the challenge of integrating distant context segments. By utilizing the rich trajectories produced by agents, ACC provides a way to train LLMs to directly answer questions based on scattered information. The results show that models trained with ACC perform significantly better on tasks requiring long-range dependencies, demonstrating its effectiveness in enhancing long-context reasoning capabilities.'}, 'zh': {'title': '代理上下文编译：提升长上下文推理能力的有效方法', 'desc': '代理上下文编译（ACC）通过将多轮代理轨迹转换为结构化的问答对，增强了大型语言模型（LLM）在长上下文推理中的能力。这种方法使得模型能够直接监督远程上下文的整合，而无需额外的标注。ACC利用代理在解决问题时生成的大量轨迹，将原始问题与多个回合中收集的工具响应和环境观察结合起来，从而训练模型直接回答问题。通过在长范围依赖建模任务上验证，ACC显示出显著的性能提升，证明了其在长上下文推理中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.21572', 'title': 'PhysX-Omni: Unified Simulation-Ready Physical 3D Generation for Rigid, Deformable, and Articulated Objects', 'url': 'https://huggingface.co/papers/2605.21572', 'abstract': 'Abstract PhysX-Omni presents a unified framework for generating simulation-ready 3D assets with physical properties across multiple categories using a novel geometry representation and evaluation benchmarks.  AI-generated summary Simulation-ready physical 3D assets have emerged as a promising direction owing to their broad applicability in downstream tasks. However, most existing 3D generation methods either neglect physical properties or are limited to a single asset category, e.g., rigid, deformable, or articulated objects. To address these limitations, we introduce PhysX-Omni, a unified framework for simulation-ready physical 3D generation across diverse asset types. Specifically, we develop a novel and efficient geometry representation tailored for Vision-Language Models, which directly encodes high-resolution 3D structures without compression, significantly improving generation performance. In addition, we construct the first general simulation-ready 3D dataset, PhysXVerse, covering diverse indoor and outdoor categories. Furthermore, to comprehensively and flexibly evaluate both generative and understanding capabilities in the wild, we propose PhysX-Bench, which encompasses six key attributes: geometry, absolute scale, material, affordance, kinematics, and function description. Extensive experiments with conventional metrics and PhysX-Bench show that PhysX-Omni performs strongly in both generation and understanding. Moreover, additional studies further validate the potential of PhysX-Omni for applications in simulation-ready scene generation and robotic policy learning. We believe PhysX-Omni can significantly advance a wide range of downstream applications, particularly in embodied AI and physics-based simulation.', 'score': 42, 'issue_id': 2290, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '4e92ee238c4be23c', 'authors': ['Ziang Cao', 'Yinghao Liu', 'Haitian Li', 'Runmao Yao', 'Fangzhou Hong', 'Zhaoxi Chen', 'Liang Pan', 'Ziwei Liu'], 'affiliations': ['ACE Robotics', 'S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21572.jpg', 'data': {'categories': ['#benchmark', '#3d', '#robotics', '#dataset', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Единая генеративная модель для физически корректных 3D активов', 'desc': 'PhysX-Omni представляет унифицированный фреймворк для генерации трёхмерных активов с физическими свойствами, готовых к симуляции, охватывающий различные категории объектов. Авторы разработали специальное представление геометрии, оптимизированное для Vision-Language моделей, которое кодирует высокоразрешённые 3D структуры без сжатия. Они создали первый датасет PhysXVerse для обучения и предложили комплексный бенчмарк PhysX-Bench для оценки качества генерации и понимания по шести ключевым атрибутам. Модель демонстрирует высокую эффективность в генерации и оценке 3D активов, открывая новые возможности для приложений в робототехнике и симуляции физических сцен.'}, 'en': {'title': 'Unified Framework for Simulation-Ready 3D Asset Generation', 'desc': 'PhysX-Omni is a new framework designed to create 3D assets that are ready for simulation and have physical properties. Unlike previous methods that focus on only one type of object, this framework can generate various asset categories, such as rigid and deformable objects. It introduces a unique geometry representation that works well with Vision-Language Models, allowing for high-quality 3D structures without losing detail. Additionally, PhysX-Omni includes a comprehensive dataset and evaluation benchmarks to assess the performance of generated assets in real-world scenarios.'}, 'zh': {'title': '统一框架，生成物理属性3D资产', 'desc': 'PhysX-Omni是一个统一的框架，用于生成具有物理属性的模拟准备3D资产，涵盖多种类别。该框架采用了一种新颖的几何表示方法，能够高效地编码高分辨率的3D结构，从而显著提高生成性能。我们还构建了第一个通用的模拟准备3D数据集PhysXVerse，涵盖多种室内和室外类别。通过PhysX-Bench，我们提出了六个关键属性的评估标准，以全面评估生成和理解能力。'}}}, {'id': 'https://huggingface.co/papers/2605.22012', 'title': 'LatentOmni: Rethinking Omni-Modal Understanding via Unified Audio-Visual Latent Reasoning', 'url': 'https://huggingface.co/papers/2605.22012', 'abstract': 'Abstract LatentOmni is a cross-modal reasoning framework that interleaves textual reasoning with audio-visual latent states using feature-level supervision and temporal consistency embedding, outperforming explicit text-based chain-of-thought approaches in audio-visual reasoning tasks.  AI-generated summary Joint audio-visual reasoning is essential for omnimodal understanding, yet current multimodal large language models (MLLMs) still struggle when reasoning requires fine-grained evidence from both modalities. A central limitation is that explicit text-based chain-of-thought (CoT) compresses continuous audio-visual signals into discrete tokens, weakening temporal grounding and shifting intermediate reasoning toward language priors. We argue that a unified latent space is a better medium for such reasoning because it preserves dense sensory information while remaining compatible with autoregressive generation. Based on this insight, we propose LatentOmni, a cross-modal reasoning framework that interleaves textual reasoning with audio-visual latent states. LatentOmni introduces feature-level supervision to align latent reasoning states with task-relevant sensory features and uses Omni-Sync Position Embedding (OSPE) to maintain temporal consistency between latent audio and visual states. We further construct LatentOmni-Instruct-35K, a dataset of audio-visual interleaved reasoning trajectories for supervising latent-space reasoning. Comprehensive evaluation across multiple audio-visual reasoning benchmarks demonstrates that LatentOmni achieves the best performance among the evaluated open-source models and consistently outperforms the Explicit Text CoT baseline, supporting latent-space joint reasoning as a promising path toward stronger omnimodal understanding.', 'score': 33, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '8d64ab48704207e5', 'authors': ['Yifan Dai', 'Zhenhua Wu', 'Bohan Zeng', 'Daili Hua', 'Jialing Liu', 'Bozhou Li', 'Yuran Wang', 'Chengzhuo Tong', 'Hao Liang', 'Xiaochen Ma', 'Junbo Niu', 'Tianyu Guo', 'Yang Shi', 'Yue Ding', 'Yiyan Ji', 'Bingyin Mei', 'Yushuo Guan', 'Yuanxing Zhang', 'Pengfei Wan', 'Fangcheng Fu', 'Wentao Zhang'], 'affiliations': ['CASIA', 'HKUST', 'Kling Team, Kuaishou Technology', 'Nanjing University', 'Peking University', 'Renmin University of China', 'School of AI, Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22012.jpg', 'data': {'categories': ['#reasoning', '#audio', '#training', '#video', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Латентное пространство вместо текста для омнимодального рассуждения', 'desc': 'LatentOmni — это кроссмодальная система рассуждений, которая объединяет текстовые рассуждения с латентными представлениями аудио-визуальных данных. Фреймворк использует контроль на уровне признаков и временное согласование встраиваний для сохранения плотной сенсорной информации вместо её сжатия в дискретные токены. В отличие от явного текстового chain-of-thought подхода, эта архитектура проводит рассуждения в единном латентном пространстве, что лучше сохраняет временные связи между модальностями. Авторы создали датасет LatentOmni-Instruct-35K и продемонстрировали превосходство своего подхода на бенчмарках аудио-визуального рассуждения.'}, 'en': {'title': 'Unifying Modalities for Enhanced Reasoning', 'desc': 'LatentOmni is a new framework designed for reasoning across different types of data, specifically combining text, audio, and visual information. It improves upon traditional methods that rely on breaking down audio-visual signals into text, which can lose important details and timing. By using a unified latent space, LatentOmni keeps rich sensory information intact while still allowing for effective text generation. The framework also introduces a new dataset and techniques to ensure that the reasoning process is both accurate and temporally consistent, leading to better performance in audio-visual reasoning tasks.'}, 'zh': {'title': '潜在空间联合推理，开启全模态理解新篇章', 'desc': 'LatentOmni 是一个跨模态推理框架，它将文本推理与音频-视觉潜在状态交织在一起，使用特征级监督和时间一致性嵌入。与基于文本的链式思维方法相比，LatentOmni 在音频-视觉推理任务中表现更好。该框架通过引入特征级监督来对齐潜在推理状态与任务相关的感官特征，并使用 Omni-Sync 位置嵌入来保持潜在音频和视觉状态之间的时间一致性。综合评估显示，LatentOmni 在多个音频-视觉推理基准测试中表现最佳，支持潜在空间联合推理是实现更强的全模态理解的有希望的路径。'}}}, {'id': 'https://huggingface.co/papers/2605.22642', 'title': 'Spreadsheet-RL: Advancing Large Language Model Agents on Realistic Spreadsheet Tasks via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.22642', 'abstract': "Abstract Spreadsheet-RL is a reinforcement learning framework that trains specialized spreadsheet agents in realistic Excel environments, improving AI agent performance on both general and domain-specific spreadsheet tasks through automated data collection and domain-specific benchmarks.  AI-generated summary Spreadsheet systems (e.g., Microsoft Excel, Google Sheets) play a central role in modern data-centric workflows. As AI agents grow increasingly capable of automating complex tasks, such as controlling computers and generating presentations, building an AI-driven spreadsheet agent has emerged as a promising research direction. Most existing spreadsheet agents rely on specialized prompting over general-purpose LLMs; while this design has potentials on simple spreadsheet operations, it struggles to manage the complex, multi-step workflows typical of real-world applications.   We introduce Spreadsheet-RL, a reinforcement learning (RL) fine-tuning framework designed to train specialized spreadsheet agents within a realistic Microsoft Excel environment. Spreadsheet-RL features an automated pipeline for scalable collection of paired start-goal spreadsheets from online forums, as well as domain-specific evaluation tasks in areas such as finance and supply chain management, which we compile into the new Domain-Spreadsheet benchmark dataset. It also includes a Spreadsheet Gym environment designed for multi-turn RL: Spreadsheet Gym exposes extensive Excel functionality through a Python sandbox, along with a refined harness that incorporates a comprehensive tool set and carefully designed tool-routing rules for spreadsheet tasks. Through comprehensive experiments, we show that Spreadsheet-RL substantially enhances AI agent's performance on both general and domain-specific spreadsheet tasks: it improves Qwen3-4B-Thinking-2507's Pass@1 on SpreadsheetBench from 12.0% to 23.4%, and raises Pass@1 from 8.4% to 17.2% on our curated Domain-Spreadsheet dataset. These results highlight Spreadsheet-RL's strong potential for generalization and real-world adoption in spreadsheet automation, and broadly, its promise for advancing LLM-based interactions with data interfaces in everyday work.", 'score': 29, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'f3e965d42c798e0c', 'authors': ['Banghao Chi', 'Yining Xie', 'Mingyuan Wu', 'Jingcheng Yang', 'Jize Jiang', 'Zhaoheng Li', 'Shengyi Qian', 'Minjia Zhang', 'Klara Nahrstedt', 'Rui Hou', 'Xiangjun Fan', 'Hanchao Yu'], 'affiliations': ['Meta', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.22642.jpg', 'data': {'categories': ['#agents', '#training', '#rl', '#benchmark', '#optimization', '#dataset', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'Обучение агентов таблиц через обучение с подкреплением в реальной среде Excel', 'desc': 'Spreadsheet-RL — это фреймворк обучения с подкреплением, который тренирует специализированные агенты для работы с электронными таблицами в реальной среде Microsoft Excel. Вместо использования общих языковых моделей с промптингом, авторы применяют RL fine-tuning для обучения агентов выполнять сложные многошаговые задачи обработки данных. Фреймворк включает автоматический конвейер сбора обучающих данных из интернета и новый бенчмарк Domain-Spreadsheet с задачами из финансов и логистики. Экспериментальные результаты показывают значительное улучшение производительности агентов — с 12% до 23.4% на общем бенчмарке и с 8.4% до 17.2% на специализированном датасете.'}, 'en': {'title': 'Empowering AI Agents for Smarter Spreadsheet Automation', 'desc': 'Spreadsheet-RL is a reinforcement learning framework that trains AI agents to work effectively with spreadsheets in realistic environments like Microsoft Excel. It automates the collection of data and creates benchmarks for evaluating performance in specific domains such as finance and supply chain management. The framework includes a unique environment called Spreadsheet Gym, which allows agents to learn through multi-turn interactions and access various Excel functionalities. Experimental results show that Spreadsheet-RL significantly improves the performance of AI agents on both general and specialized spreadsheet tasks, indicating its potential for real-world applications in spreadsheet automation.'}, 'zh': {'title': '强化学习助力电子表格智能化', 'desc': 'Spreadsheet-RL 是一个强化学习框架，旨在训练专门的电子表格代理，以提高其在真实 Excel 环境中的表现。该框架通过自动化数据收集和领域特定基准测试，提升了 AI 代理在一般和特定领域电子表格任务上的性能。Spreadsheet-RL 包含一个自动化管道，用于从在线论坛收集成对的起始-目标电子表格，并编制了新的领域电子表格基准数据集。通过全面的实验，Spreadsheet-RL 显著提高了 AI 代理在电子表格任务中的表现，展示了其在电子表格自动化中的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.22718', 'title': 'WorldKV: Efficient World Memory with World Retrieval and Compression', 'url': 'https://huggingface.co/papers/2605.22718', 'abstract': 'Abstract WorldKV enables persistent world generation in video diffusion models by retrieving and compressing key-value cache chunks to maintain consistency while improving throughput.  AI-generated summary Autoregressive video diffusion models have enabled real-time, action-conditioned world generation. However, sustaining a persistent world, where revisiting a previously seen viewpoint yields consistent content, remains an open problem. Full KV-cache attention preserves this consistency but breaks real-time constraints: memory footprint and attention cost grow linearly with rollout length. Sliding window inference restores throughput but discards long-term consistency. We propose WorldKV, a training-free framework with two components: World Retrieval and World Compression. World Retrieval stores evicted KV-cache chunks in GPU/CPU memory and selectively retrieves scene-relevant chunks via camera/ action correspondence, inserting them back into the native attention window without re-encoding. World Compression prunes redundant tokens within each chunk via key-key similarity to an anchor frame, halving per-chunk storage to fit 2x more history under a fixed budget. On Matrix-Game-2.0 and LingBot- World-Fast, WorldKV matches or exceeds full-KV memory fidelity at roughly 2x the throughput, and is competitive with memory-trained baselines without any fine-tuning. Project Page: https://cvlab-kaist.github.io/WorldKV/', 'score': 27, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '93834d2e85a73f7f', 'authors': ['Jung Yi', 'Minjae Kim', 'Paul Hyunbin Cho', 'Wooseok Jang', 'Sangdoo Yun', 'Seungryong Kim'], 'affiliations': ['KAIST AI', 'Naver AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.22718.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#inference', '#architecture', '#long_context', '#video'], 'emoji': '🎬', 'ru': {'title': 'Запомнить виртуальный мир: быстро и последовательно', 'desc': 'WorldKV — это фреймворк для видео диффузионных моделей, который решает проблему непротиворечивости при генерации виртуальных миров. Система использует два подхода: сохранение и избирательное извлечение KV-кеша из памяти для поддержания консистентности при повторном посещении сцены, а также сжатие ключей внимания путем удаления избыточных токенов. WorldKV достигает 2x ускорения пропускной способности, сохраняя качество полного KV-кеша без переобучения модели. Метод работает как обучению, так и в инженерном решении для реально-временного видео синтеза с долгосрочной согласованностью.'}, 'en': {'title': 'Enhancing Consistency and Throughput in Video Diffusion Models with WorldKV', 'desc': 'WorldKV is a framework designed to enhance video diffusion models by enabling persistent world generation. It addresses the challenge of maintaining consistent content when revisiting previously seen viewpoints, which is crucial for immersive experiences. The framework consists of two main components: World Retrieval, which efficiently retrieves relevant key-value cache chunks, and World Compression, which reduces the storage requirements of these chunks. By doing so, WorldKV achieves improved throughput while preserving memory fidelity, outperforming traditional methods without the need for additional training.'}, 'zh': {'title': 'WorldKV：提升视频生成的一致性与速度', 'desc': 'WorldKV 是一种新框架，旨在解决视频扩散模型中的持久世界生成问题。它通过检索和压缩关键值缓存块来保持内容一致性，同时提高处理速度。该框架包括两个主要部分：世界检索和世界压缩，能够在不重新编码的情况下有效地管理内存。实验结果表明，WorldKV 在处理速度上达到了全KV内存的效果，同时无需任何微调。'}}}, {'id': 'https://huggingface.co/papers/2605.22681', 'title': 'Forecasting Scientific Progress with Artificial Intelligence', 'url': 'https://huggingface.co/papers/2605.22681', 'abstract': 'Abstract Current AI systems demonstrate limited capability in predicting scientific progress, showing inconsistent performance across domains and systematic overconfidence in forecasts.  AI-generated summary Artificial intelligence (AI) is increasingly embedded in scientific discovery, yet whether it can anticipate scientific progress remains unclear. To study this question, we introduce a temporally grounded evaluation framework for forecasting scientific progress under controlled knowledge constraints. We present CUSP (Cutoff-conditioned Unseen Scientific Progress), a multi-disciplinary and event-level benchmark that evaluates scientific forecasting in AI systems through feasibility assessment, mechanistic reasoning, generative solution design, and temporal prediction. Across 4,760 scientific events, we observe systematic and domain-dependent limitations in current frontier models. While models can identify plausible research directions from competing candidates, they fail to reliably predict whether scientific advances will be realized and systematically misestimate when they will occur. Performance is highly heterogeneous across domains, with the timing of AI progress more predictable than advances in biology, chemistry, and physics. Performance is largely insensitive to whether events occur before or after the training cutoff, suggesting these limitations cannot be explained solely by knowledge exposure in training data. Under controlled information access, additional pre-cutoff knowledge improves performance but does not close the gap to full-information settings, which becomes more pronounced for high-citation advances. Models also exhibit systematic overconfidence and strong response biases, indicating unreliable uncertainty estimation. Taken together, current AI systems fall short as predictive tools for scientific progress. Access to prior knowledge does not translate into reliable forecasting, and performance benefits more from post-event information than from forward-looking prediction.', 'score': 27, 'issue_id': 2293, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'c2f9264f55fadf77', 'authors': ['Sean Wu', 'Pan Lu', 'Yupeng Chen', 'Jonathan Bragg', 'Yutaro Yamada', 'Peter Clark', 'David Clifton', 'Philip Torr', 'James Zou', 'Junchi Yu'], 'affiliations': ['Allen Institute for AI', 'Sakana AI', 'Stanford University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.22681.jpg', 'data': {'categories': ['#science', '#reasoning'], 'emoji': '🔮', 'ru': {'title': 'ИИ не умеет предсказывать будущее науки', 'desc': 'В работе представлена методика оценки способности современных LLM предсказывать научный прогресс. Авторы создали бенчмарк CUSP с 4760 научными событиями, включающий задачи оценки целесообразности, механистического рассуждения и временного предсказания. Исследование показало, что модели плохо прогнозируют реализацию научных открытий и систематически ошибаются в определении сроков их появления, особенно в биологии, химии и физике. Кроме того, модели демонстрируют чрезмерную уверенность в предсказаниях и сильные предубеждения в ответах, что указывает на ненадежность их оценок неопределённости.'}, 'en': {'title': "AI's Predictive Limitations in Scientific Progress", 'desc': 'This paper evaluates the ability of AI systems to predict scientific progress using a new framework called CUSP. The study reveals that current AI models show inconsistent performance across different scientific domains and often overestimate their predictive capabilities. While these models can suggest potential research directions, they struggle to accurately forecast whether and when scientific advancements will occur. The findings indicate that even with access to prior knowledge, AI systems do not reliably improve their predictions, highlighting significant limitations in their forecasting abilities.'}, 'zh': {'title': 'AI预测科学进展的局限性', 'desc': '当前的人工智能系统在预测科学进展方面能力有限，表现不一致且对预测结果过于自信。我们提出了一种时间基础的评估框架，旨在在受控知识约束下评估科学进展的预测能力。通过CUSP基准，我们发现现有模型在不同领域的表现存在系统性和领域依赖的局限性，尤其在生物、化学和物理等领域的预测准确性较低。尽管模型能够识别出有潜力的研究方向，但它们在预测科学进展的实现及其时间上存在显著误差。'}}}, {'id': 'https://huggingface.co/papers/2605.22668', 'title': 'SEGA: Spectral-Energy Guided Attention for Resolution Extrapolation in Diffusion Transformers', 'url': 'https://huggingface.co/papers/2605.22668', 'abstract': "Abstract SEGA improves high-resolution text-to-image generation by adaptively scaling attention across RoPE components based on spatial-frequency structure during denoising steps.  AI-generated summary Diffusion transformers (DiTs) have emerged as a dominant architecture for text-to-image generation, yet their performance drops when generating at resolutions beyond their training range. Existing training-free approaches mitigate this by modifying inference-time attention behavior, often through Rotary Position Embeddings (RoPE) extrapolation combined with attention scaling. However, these strategies apply a uniform and content-agnostic scaling across RoPE components with distinct frequency characteristics, inducing a trade-off between preserving global structure and recovering fine detail. We introduce SEGA, a training-free method that dynamically scales attention across RoPE components according to the latent's spatial-frequency structure at each denoising step. This adaptive scaling improves both structural coherence and fine-detail fidelity. Experiments show that SEGA consistently improves high-resolution synthesis across multiple target resolutions, outperforming state-of-the-art training-free baselines.", 'score': 22, 'issue_id': 2291, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '686cc2ea8af8fa70', 'authors': ['Javad Rajabi', 'Kimia Shaban', 'Koorosh Roohi', 'David B. Lindell', 'Babak Taati'], 'affiliations': ['University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2605.22668.jpg', 'data': {'categories': ['#inference', '#diffusion', '#architecture', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Адаптивное масштабирование внимания для синтеза изображений высокого разрешения', 'desc': 'Статья представляет SEGA — метод для улучшения генерации изображений высокого разрешения на основе диффузионных трансформеров. Метод адаптивно масштабирует внимание (attention) по компонентам RoPE в зависимости от пространственно-частотной структуры латентного представления на каждом шаге дифузии. В отличие от существующих подходов, использующих унифицированное масштабирование, SEGA учитывает различные частотные характеристики компонентов, достигая баланса между сохранением глобальной структуры и восстановлением мелких деталей. Экспериментальные результаты показывают, что метод превосходит существующие решения без переобучения модели.'}, 'en': {'title': 'SEGA: Adaptive Attention Scaling for High-Resolution Image Generation', 'desc': 'SEGA is a novel method that enhances high-resolution text-to-image generation by adaptively adjusting attention across Rotary Position Embeddings (RoPE) during the denoising process. Unlike previous methods that apply a uniform scaling, SEGA tailors the attention scaling based on the spatial-frequency characteristics of the latent representation. This dynamic approach allows for better preservation of global structures while also improving the recovery of fine details in generated images. Experimental results demonstrate that SEGA outperforms existing training-free techniques, leading to superior synthesis quality at various resolutions.'}, 'zh': {'title': 'SEGA：自适应注意力提升高分辨率图像生成', 'desc': 'SEGA是一种改进高分辨率文本到图像生成的方法。它通过在去噪步骤中根据空间频率结构自适应地调整RoPE组件的注意力来实现。与现有方法不同，SEGA能够动态调整注意力，从而在保持全局结构的同时恢复细节。实验表明，SEGA在多个目标分辨率下的高分辨率合成中表现优于现有的无训练基线。'}}}, {'id': 'https://huggingface.co/papers/2605.22809', 'title': 'Sensor2Sensor: Cross-Embodiment Sensor Conversion for Autonomous Driving', 'url': 'https://huggingface.co/papers/2605.22809', 'abstract': "Abstract Sensor2Sensor generates high-fidelity multi-modal sensor data from in-the-wild dashcam videos using diffusion models and 4D Gaussian Splatting for autonomous driving system training and validation.  AI-generated summary Robust training and validation of Autonomous Driving Systems (ADS) require massive, diverse datasets. Proprietary data collected by Autonomous Vehicle (AV) fleets, while high-fidelity, are limited in scale, diversity of sensor configurations, as well as geographic and long-tail-behavioral coverage. In contrast, in-the-wild data from sources like dashcams offers immense scale and diversity, capturing critical long-tail scenarios and novel environments. However, this unstructured, in-the-wild video data is incompatible with ADS expecting structured, multi-modal sensor inputs for validation and training. To bridge this data gap, we propose Sensor2Sensor, a novel generative modeling paradigm that translates in-the-wild monocular dashcam videos into a high-fidelity, multi-modal sensor suite (AV logs) comprising multi-view camera images and LiDAR point clouds. A core challenge is the lack of paired training data. We address this by converting real AV logs into dashcam-style videos via 4D Gaussian Splatting (4DGS) reconstruction and novel-view rendering. Sensor2Sensor then utilizes a diffusion architecture to perform the generative conversion. We perform comprehensive quantitative evaluations on the fidelity and realism of the generated sensor data. We demonstrate Sensor2Sensor's practical utility by converting challenging in-the-wild internet and dashcam footage into realistic, multi-modal data formats, further unlocking vast external data sources for AV development.", 'score': 22, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '35b7276dc2975563', 'authors': ['Jiahao Wang', 'Bo Sun', 'Yijing Bai', 'Vincent Casser', 'Songyou Peng', 'Zehao Zhu', 'Meng-Li Shih', 'Xander Masotto', 'Shih-Yang Su', 'Kanaad V Parvate', 'Tiancheng Ge', 'Linn Bieske', 'Dragomir Anguelov', 'Mingxing Tan', 'Chiyu Max Jiang'], 'affiliations': ['Google DeepMind', 'Johns Hopkins University', 'University of Washington', 'Waymo'], 'pdf_title_img': 'assets/pdf/title_img/2605.22809.jpg', 'data': {'categories': ['#3d', '#diffusion', '#synthetic', '#dataset', '#multimodal', '#video'], 'emoji': '🚗', 'ru': {'title': 'От видеорегистратора к полносенсорному датасету автономного автомобиля', 'desc': 'Sensor2Sensor — это новый подход к генерации высокофидельных мультимодальных сенсорных данных из видеозаписей видеорегистраторов используя диффузионные модели и 4D Gaussian Splatting. Система преобразует неструктурированные видео в формат, совместимый с системами автономного вождения, включая изображения с нескольких камер и облака точек LiDAR. Для решения проблемы отсутствия парных данных авторы используют синтетизацию датасетов через реконструкцию реальных логов автомобилей с помощью 4D Gaussian Splatting. Это позволяет разблокировать огромные объемы внешних данных для обучения и валидации систем автономного вождения.'}, 'en': {'title': 'Transforming Dashcam Footage into Rich Sensor Data for Autonomous Driving', 'desc': 'Sensor2Sensor is a novel approach that generates high-quality multi-modal sensor data from dashcam videos to aid in training and validating autonomous driving systems. It addresses the challenge of limited and diverse datasets by transforming unstructured dashcam footage into structured formats like multi-view camera images and LiDAR point clouds. The method employs diffusion models and 4D Gaussian Splatting to create realistic sensor data, even in the absence of paired training data. This innovation allows for the effective use of vast external data sources, enhancing the development of autonomous vehicles.'}, 'zh': {'title': 'Sensor2Sensor：自动驾驶数据生成的新方法', 'desc': 'Sensor2Sensor 是一种新颖的生成模型，能够将真实的行车记录仪视频转换为高保真度的多模态传感器数据，以支持自动驾驶系统的训练和验证。该方法利用扩散模型和4D高斯点云重建技术，解决了缺乏配对训练数据的问题。通过将真实的自动驾驶日志转换为行车记录仪风格的视频，Sensor2Sensor 能够生成多视角相机图像和激光雷达点云。最终，我们的评估表明，Sensor2Sensor 能够有效地将复杂的行车记录仪视频转换为真实的多模态数据格式，极大地丰富了自动驾驶开发的数据来源。'}}}, {'id': 'https://huggingface.co/papers/2605.20910', 'title': 'FlowLong: Inference-time Long Video Generation via Manifold-constrained Tweedie Matching', 'url': 'https://huggingface.co/papers/2605.20910', 'abstract': 'Abstract A novel inference-time method for long video generation using overlapping sliding windows with Tweedie matching and stochastic early-phase sampling to improve temporal consistency and visual quality.  AI-generated summary Extending the generation horizon of video diffusion models to long sequences remains a long-standing and important challenge. Existing training-free approaches fall into two categories: extensions of bidirectional models, which are tightly coupled to specific architectures and suffer from quality degradation over long horizons, and autoregressive models, which accumulate drift errors due to exposure bias and tend to produce repetitive motion patterns. To address these issues, we propose a novel but simple inference-time approach for long video generation that is architecture-agnostic and requires no additional training. Our method generates long videos via overlapping sliding windows, where predicted clean samples from adjacent windows are blended via Tweedie matching to enforce both manifold constraint and temporal consistency across overlap regions. Stochastic early-phase sampling then synchronizes per-window trajectories by injecting fresh noise after each Tweedie matching correction in the high-noise phase, before transitioning to deterministic ODE sampling to preserve fine-grained visual fidelity. Applied to various video generation models, our method generates videos several times longer than the native window length while outperforming both training-free and autoregressive baselines in temporal consistency and visual quality, and further extends to audio-video joint generation and text-to-3DGS without any fine-tuning.', 'score': 21, 'issue_id': 2290, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '042487bf66149296', 'authors': ['Jangho Park', 'Geon Yeong Park', 'Gihyun Kwon', 'Jong Chul Ye'], 'affiliations': ['Amazon', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2605.20910.jpg', 'data': {'categories': ['#audio', '#long_context', '#inference', '#video', '#3d', '#diffusion', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Генерация длинных видео через согласованные перекрывающиеся окна', 'desc': 'Статья предлагает новый метод генерации длинных видео на этапе инференса, который не требует переобучения модели. Метод использует перекрывающиеся скользящие окна и применяет технику Tweedie matching для согласования предсказанных кадров на границах окон, обеспечивая временную согласованность. Стохастическая выборка на ранних фазах шумоудаления синхронизирует траектории между окнами, добавляя свежий шум перед переходом к детерминированному ODE sampling для сохранения визуального качества. Метод работает с различными видеомоделями, генерируя видео в несколько раз длиннее исходной длины окна, превосходя существующие подходы по согласованности и качеству.'}, 'en': {'title': 'Enhancing Long Video Generation with Overlapping Windows and Tweedie Matching', 'desc': 'This paper presents a new method for generating long videos using machine learning, specifically designed to improve the quality and consistency of the output. The approach utilizes overlapping sliding windows to create longer sequences, blending samples from adjacent windows with a technique called Tweedie matching. This method helps maintain temporal consistency and visual quality by correcting overlaps and synchronizing trajectories with stochastic early-phase sampling. The proposed technique is versatile, working with various video generation models without requiring additional training, and it shows significant improvements over existing methods.'}, 'zh': {'title': '长视频生成的新方法：重叠滑动窗口与Tweedie匹配', 'desc': '本文提出了一种新颖的推理时长视频生成方法，利用重叠滑动窗口、Tweedie匹配和随机早期阶段采样来提高时间一致性和视觉质量。该方法不依赖于特定架构，且无需额外训练，能够生成比原始窗口长度长几倍的视频。通过在重叠区域内混合相邻窗口的预测样本，确保了流形约束和时间一致性。最终，该方法在多种视频生成模型上表现优于现有的无训练和自回归基线，且可扩展至音视频联合生成和文本到3D生成。'}}}, {'id': 'https://huggingface.co/papers/2605.22536', 'title': 'SpaceDG: Benchmarking Spatial Intelligence under Visual Degradation', 'url': 'https://huggingface.co/papers/2605.22536', 'abstract': "Abstract SpaceDG dataset and benchmark evaluate multimodal language models' spatial reasoning robustness under visual degradations, revealing significant performance gaps and demonstrating improved robustness through targeted training.  AI-generated summary Multimodal Large Language Models (MLLMs) have made rapid progress in spatial intelligence, yet existing spatial reasoning benchmarks largely assume pristine visual inputs and overlook the degradations that commonly occur in real-world deployment, such as motion blur, low light, adverse weather, lens distortion, and compression artifacts. This raises a fundamental question: how robust is the spatial intelligence of current MLLMs when visual observations are imperfect? To answer this question, we introduce SpaceDG, the first large-scale dataset for degradation-aware spatial understanding. It is constructed with a physically grounded degradation synthesis engine that embeds degradation formation process into 3D Gaussian Splatting (3DGS) rendering, enabling realistic simulation of nine degradation types. The resulting dataset contains approximately 1M QA pairs from nearly 1,000 indoor scenes. We further introduce SpaceDG-Bench, an human-verified benchmark with 1,102 questions spanning 11 reasoning categories and 9 visual degradation types, yielding over 10K VQA instances. Evaluating 25 open- and closed-source MLLMs reveals that visual degradations consistently and substantially impair spatial reasoning, exposing a critical robustness gap. Finally, we show that finetuning on SpaceDG markedly improves degradation robustness and can even surpass human performance under degraded conditions without any performance drop on clean images, highlighting the promise of degradation-aware training for robust spatial intelligence.", 'score': 20, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '44d1c256446580ed', 'authors': ['Xiaolong Zhou', 'Yifei Liu', 'Ziyang Gong', 'Jiarui Li', 'Qiyue Zhao', 'Muyao Niu', 'Yuanyuan Gao', 'Le Ma', 'Xue Yang', 'Hongjie Zhang', 'Zhihang Zhong'], 'affiliations': ['Beihang University', 'Chongqing University', 'Northwestern Polytechnical University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'The University of Tokyo', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.22536.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training', '#dataset'], 'emoji': '🏚️', 'ru': {'title': 'Робастное пространственное рассуждение мультимодальных моделей при визуальных искажениях', 'desc': 'В статье представлен датасет SpaceDG для оценки устойчивости мультимодальных языковых моделей к визуальным искажениям при решении задач пространственного рассуждения. Авторы разработали синтез-движок деградации, встроенный в 3D Gaussian Splatting, который реалистично симулирует девять типов искажений (размытие движения, низкая освещённость, непогода и т.д.). Датасет содержит примерно 1 млн пар вопрос-ответ из почти 1000 помещений с верифицированным бенчмарком из более чем 10K экземпляров VQA. Эксперименты на 25 MLLM показали значительный разрыв в робастности моделей при искаженных изображениях, но тонкая настройка на SpaceDG существенно улучшает устойчивость и даже превосходит человеческую производительность в условиях деградации без потери качества на чистых изображениях.'}, 'en': {'title': 'Enhancing Spatial Intelligence: Bridging the Robustness Gap in MLLMs', 'desc': 'The paper introduces the SpaceDG dataset and benchmark, which assess how well multimodal large language models (MLLMs) handle spatial reasoning when faced with visual degradations. It highlights that traditional benchmarks do not account for common real-world visual issues like motion blur and low light, which can significantly affect model performance. The SpaceDG dataset includes around 1 million question-answer pairs generated from nearly 1,000 indoor scenes, simulating various degradation types. The findings reveal that targeted finetuning on this dataset can enhance the robustness of MLLMs against visual impairments, even outperforming human capabilities in some cases.'}, 'zh': {'title': '提升空间智能的鲁棒性', 'desc': '本论文介绍了SpaceDG数据集和基准，旨在评估多模态语言模型在视觉退化下的空间推理能力。现有的空间推理基准大多假设视觉输入是完美的，而忽视了现实世界中常见的视觉退化现象。通过引入一个物理基础的退化合成引擎，SpaceDG能够模拟九种不同的视觉退化类型。研究表明，经过针对性训练后，模型在退化条件下的鲁棒性显著提高，甚至可以超越人类的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.22177', 'title': 'Maestro: Reinforcement Learning to Orchestrate Hierarchical Model-Skill Ensembles', 'url': 'https://huggingface.co/papers/2605.22177', 'abstract': 'Abstract A reinforcement learning-driven orchestration framework dynamically composes expert models and skills for multimodal tasks, achieving superior performance with low computational overhead.  AI-generated summary The proliferation of large language models (LLMs) and modular skills has endowed autonomous agents with increasingly powerful capabilities. Existing frameworks typically rely on monolithic LLMs and fixed logic to interface with these skills. This gives rise to a critical bottleneck: different LLMs offer distinct advantages across diverse domains, yet current frameworks fail to exploit the complementary strengths of models and skills, thereby limiting their performance on downstream tasks. In this paper, we present Maestro (Multimodal Agent for Expert-Skill Targeted Reinforced Orchestration), a Reinforcement Learning (RL)-driven orchestration framework that reframes heterogeneous multimodal tasks as a sequential decision-making process over a hierarchical model-skill registry. Rather than consolidating all knowledge into a single model, Maestro trains a lightweight policy to dynamically compose ensembles of frozen expert models and a two-tier skill library, deciding at each step whether to invoke an external expert, which model-skill pair to select, and when to terminate. The policy is optimized via outcome-based RL, requiring no step-level supervision. We evaluate Maestro across ten representative multimodal benchmarks spanning mathematical reasoning, chart understanding, high-resolution perception, and domain-specific analysis. With only a 4B orchestrator, Maestro achieves an average accuracy of 70.1%, surpassing both GPT-5 (69.3%) and Gemini-2.5-Pro (68.7%). Crucially, the learned coordination policy generalizes to unseen models and skills without retraining: augmenting the registry with out-of-domain experts yields a 59.5% average on four challenging benchmarks, outperforming all closed-source baselines. Maestro further maintains high computational efficiency with low latency. The source code is available at https://github.com/jinyangwu/Maestro.', 'score': 17, 'issue_id': 2289, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '0f92c6e51263c980', 'authors': ['Jinyang Wu', 'Guocheng Zhai', 'Ruihan Jin', 'Yuhao Shen', 'Zhengxi Lu', 'Fan Zhang', 'Haoran Luo', 'Zheng Lian', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Nanyang Technological University', 'The Chinese University of Hong Kong', 'Tongji University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22177.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#benchmark', '#open_source', '#agents', '#reasoning', '#training', '#architecture', '#rl'], 'emoji': '🎼', 'ru': {'title': 'Оркестровка экспертных моделей через обучение с подкреплением', 'desc': 'В статье представлена система Maestro, которая использует обучение с подкреплением для динамической композиции множественных экспертных моделей и навыков при решении мультимодальных задач. Вместо использования одной монолитной большой языковой модели, фреймворк обучает лёгкую политику, которая на каждом шаге решает, какую модель и какой навык использовать из иерархического реестра. Система показывает превосходные результаты на десяти мультимодальных бенчмарках, превосходя GPT-5 и Gemini-2.5-Pro при этом требуя минимальных вычислительных ресурсов. Обученная политика хорошо обобщается на новые модели и навыки без переобучения, что делает систему универсальной и эффективной.'}, 'en': {'title': 'Dynamic Model-Skill Composition for Enhanced Multimodal Performance', 'desc': "This paper introduces Maestro, a reinforcement learning framework designed to enhance the performance of multimodal tasks by dynamically composing expert models and skills. Unlike traditional approaches that rely on a single large language model, Maestro utilizes a lightweight policy to select the best model-skill combinations for each task, optimizing decision-making without requiring step-level supervision. The framework demonstrates superior accuracy across various benchmarks while maintaining low computational overhead, outperforming existing models like GPT-5 and Gemini-2.5-Pro. Additionally, Maestro's coordination policy can adapt to new models and skills, showcasing its generalization capabilities and efficiency in real-time applications."}, 'zh': {'title': '动态组合专家模型与技能的强化学习框架', 'desc': '本文提出了一种基于强化学习的编排框架Maestro，旨在动态组合专家模型和技能以处理多模态任务。与传统的单一大型语言模型不同，Maestro通过层次化的模型-技能注册表，将异构任务视为一个序列决策过程。该框架通过优化轻量级策略，决定何时调用外部专家、选择哪个模型-技能组合，并在每一步做出决策。实验结果表明，Maestro在多个基准测试中表现优异，且计算效率高，延迟低。'}}}, {'id': 'https://huggingface.co/papers/2605.21072', 'title': 'Q-ARVD: Quantizing Autoregressive Video Diffusion Models', 'url': 'https://huggingface.co/papers/2605.21072', 'abstract': 'Abstract Autoregressive video diffusion models face high inference costs that limit practical deployment, prompting the development of Q-ARVD, a novel quantization framework addressing frame-wise sensitivity imbalance and weight outlier patterns specific to these models.  AI-generated summary Autoregressive video diffusion models (ARVDs) have emerged as a promising architecture for streaming video generation, paving the way for real-time interactive video generation and world modeling. Despite their potential, the substantial inference cost of ARVDs remains a major obstacle to practical deployment, making model quantization a natural direction for improving efficiency. However, quantization for ARVDs remains largely unexplored. Our empirical analysis shows that directly applying existing quantization schemes developed for standard diffusion transformers to ARVDs leads to suboptimal performance, revealing quantization behaviors that differ from those observed in bidirectional diffusion models. In this paper, we identify two critical challenges in quantizing ARVDs: (C1) Highly unbalanced frame-wise quantization sensitivity. Error accumulation during autoregressive generation can induce severely skewed quantization sensitivity across frames, following an exponential-like decay pattern. (C2) Prominent and heterogeneous outlier patterns in weights. Weight distributions exhibit pronounced outlier channels, whose patterns vary substantially across layer types and block depths. To address these issues, we propose Q-ARVD, a novel framework for accurate ARVD quantization. (S1) To tackle the highly unbalanced frame-wise sensitivity, Q-ARVD incorporates a final-quality aware frame-weighting mechanism into the quantization objective. (S2) To prevent heterogeneous outliers from degrading performance, Q-ARVD introduces an outlier-aware adaptive dual-scale quantization, which automatically detects the presence and quantity of outlier channels for an arbitrary layer, and isolates them to protect normal channels. Extensive experiments demonstrate the superiority of Q-ARVD.', 'score': 15, 'issue_id': 2290, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '26119a744b193c88', 'authors': ['Siao Tang', 'Xinyin Ma', 'Gongfan Fang', 'Xingyi Yang', 'Xinchao Wang'], 'affiliations': ['National University of Singapore', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21072.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#inference', '#video'], 'emoji': '⚡', 'ru': {'title': 'Умная квантизация видео-диффузионных моделей с защитой от ошибок', 'desc': 'В статье представлен Q-ARVD — новый метод квантизации для авторегрессивных видео-диффузионных моделей, которые требуют больших вычислительных ресурсов при инференсе. Авторы выявили два ключевых вызова при квантизации таких моделей: дисбаланс чувствительности к квантизации между кадрами из-за накопления ошибок и наличие выбросов в распределениях весов. Предложенный метод использует механизм взвешивания кадров с учётом финального качества и адаптивную двухмасштабную квантизацию для изоляции аномальных каналов. Экспериментальные результаты демонстрируют эффективность Q-ARVD для практического развёртывания авторегрессивных видео-диффузионных моделей.'}, 'en': {'title': 'Enhancing Efficiency in Video Generation with Q-ARVD', 'desc': 'This paper introduces Q-ARVD, a new quantization framework designed to improve the efficiency of autoregressive video diffusion models (ARVDs) by addressing specific challenges in their quantization process. The authors identify two main issues: the unbalanced sensitivity of different frames during quantization and the presence of outlier weights that can negatively impact model performance. Q-ARVD employs a frame-weighting mechanism to account for sensitivity variations and an adaptive dual-scale quantization method to manage outlier weights effectively. Experimental results show that Q-ARVD significantly enhances the performance of ARVDs, making them more practical for real-time video generation.'}, 'zh': {'title': '提升自回归视频模型的量化效率', 'desc': '自回归视频扩散模型（ARVD）在视频生成中展现出良好的潜力，但其高推理成本限制了实际应用。为了解决这一问题，本文提出了一种新的量化框架Q-ARVD，旨在应对模型特有的帧敏感性不平衡和权重异常模式。我们发现，现有的量化方案在ARVD上效果不佳，因此Q-ARVD引入了质量感知的帧加权机制和异常通道的自适应双尺度量化，以提高量化的准确性。实验结果表明，Q-ARVD在性能上优于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2605.10158', 'title': 'Unsupervised Process Reward Models', 'url': 'https://huggingface.co/papers/2605.10158', 'abstract':
