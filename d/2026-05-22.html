framework designed to model human motion in a way that is not dependent on the specific setup of sensors. It uses physics-based simulations of inertial measurement units (IMUs) to create realistic motion data that can be applied across different devices and datasets. The framework employs a graph encoder to process this data, allowing it to recognize activities and retrieve information effectively, even in new contexts. Evaluation results show that AnyMo significantly improves performance in activity recognition, cross-modal retrieval, and motion captioning tasks, demonstrating its versatility in understanding human motion.'}, 'zh': {'title': 'AnyMo：无设备限制的人体运动建模框架', 'desc': 'AnyMo是一个几何感知框架，旨在实现与设备无关的人体运动建模。它通过物理基础的IMU模拟和图编码，解决了不同设备和数据集之间的运动表示学习问题。AnyMo生成多样化的合成信号，并通过图编码器和大语言模型对运动进行理解。实验结果表明，AnyMo在零样本活动识别和跨模态检索等任务中显著提高了准确率和召回率。'}}}, {'id': 'https://huggingface.co/papers/2605.22641', 'title': 'More Context, Larger Models, or Moral Knowledge? A Systematic Study of Schwartz Value Detection in Political Texts', 'url': 'https://huggingface.co/papers/2605.22641', 'abstract': 'Abstract Context and moral knowledge enhance sentence-level value detection differently across model types, with full-document context benefiting supervised models but not zero-shot LLMs, and retrieved knowledge consistently improving performance through early fusion.  AI-generated summary Detecting Schwartz values in political text is difficult because implicit cues often depend on surrounding arguments and fine-grained distinctions between neighboring values. We study when context and explicit moral knowledge help sentence-level value detection. Using the ValuesML/Touch{é} ValueEval format, we compare sentence, window, and full-document inputs; no-RAG and retrieval-augmented settings with a curated moral knowledge base; supervised DeBERTa-v3-base/large encoders; and zero-shot LLMs from 12B to 123B parameters. The results show that more context is not uniformly better: full-document context improves supervised DeBERTa encoders by 3.8--4.8 macro-F1 points over sentence-only input, but does not consistently help zero-shot LLMs. Retrieved moral knowledge is more consistently useful in matched comparisons, improving each tested model family and context condition under early fusion. However, scaling from DeBERTa-v3-base to large and from 12B to larger LLMs does not guarantee gains, and simple early fusion outperforms the tested late-fusion and cross-attention RAG variants for encoders. Per-value analyses show that context and retrieval help most for socially situated or conceptually confusable values. These findings suggest that value-sensitive NLP should evaluate context, knowledge, and model family jointly rather than treating longer inputs or larger models as universal improvements.', 'score': 1, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '9f5ded2f4072e9f1', 'authors': ['Víctor Yeste', 'Paolo Rosso'], 'affiliations': ['PRHLT Research Center, Universitat Politècnica de València, Spain', 'School of Science, Engineering and Design, Universidad Europea de Valencia, Spain', 'Valencian Graduate School and Research Network of Artificial Intelligence (ValgrAI)'], 'pdf_title_img': 'assets/pdf/title_img/2605.22641.jpg', 'data': {'categories': ['#rag', '#training', '#alignment', '#benchmark', '#interpretability'], 'emoji': '⚖️', 'ru': {'title': 'Контекст и знания работают по-разному: как выбрать стратегию для детектирования моральных ценностей', 'desc': 'Исследование показывает, что контекст и знания о моральных ценностях по-разному влияют на определение ценностей в политических текстах в зависимости от типа модели. Для контролируемых моделей DeBERTa полный контекст документа улучшает качество на 3.8-4.8 пункта F1, однако для нулевоуниверсальных больших языковых моделей это не даёт стабильного прироста. Применение поиска по базе знаний о моральных ценностях последовательно улучшает все протестированные семейства моделей, особенно при ранней фузии признаков. Результаты подчёркивают важность совместной оценки контекста, знаний и архитектуры модели при разработке систем для анализа ценностно-ориентированного текста.'}, 'en': {'title': 'Context and Knowledge: Keys to Value Detection in NLP', 'desc': 'This paper investigates how context and moral knowledge influence the detection of values in political texts using different machine learning models. It finds that while full-document context significantly enhances performance in supervised models like DeBERTa, it does not provide the same benefits for zero-shot large language models (LLMs). The study also highlights that integrating retrieved moral knowledge consistently improves model performance, especially when applied early in the processing pipeline. Overall, the research emphasizes the importance of considering context, knowledge, and model type together for effective value detection in natural language processing.'}, 'zh': {'title': '上下文与道德知识提升价值检测的关键', 'desc': '本研究探讨了上下文和道德知识如何影响句子级价值检测，尤其是在不同模型类型中。结果表明，完整文档上下文对监督模型（如DeBERTa）有显著提升，但对零-shot大语言模型（LLM）效果不佳。检索到的道德知识在多种模型和上下文条件下均能有效提高性能，尤其是在早期融合的情况下。研究建议在进行价值敏感的自然语言处理时，应综合考虑上下文、知识和模型类型，而不是单纯依赖更长的输入或更大的模型。'}}}, {'id': 'https://huggingface.co/papers/2605.22777', 'title': 'DecQ: Detail-Condensing Queries for Enhanced Reconstruction and Generation in Representation Autoencoders', 'url': 'https://huggingface.co/papers/2605.22777', 'abstract': 'Abstract DecQ enhances representation autoencoders by introducing lightweight queries that improve reconstruction quality and generative performance without disrupting pretrained semantic spaces.  AI-generated summary Representation Autoencoders (RAEs) leverage frozen vision foundation models (VFMs) as tokenizer encoders, providing robust high-level representations that facilitate fast convergence and high-quality generation in latent diffusion models. However, freezing the VFM inherently constrains its spatial reconstruction capacity, limiting fine-grained generation and image editing; in contrast, incorporating reconstruction-oriented signals via fine-tuning disrupts the pretrained semantic space and degrades generative fidelity. To address this trade-off, we propose DecQ, a simple yet effective framework for RAEs. Specifically, DecQ introduces lightweight detail-condensing queries that extract fine-grained information from intermediate VFM features through condenser modules. These queries are incorporated into the decoder to support reconstruction and are jointly generated with patch tokens during generative modeling. By aggregating information from both shallow and deep layers, DecQ effectively mitigates the reconstruction--generation trade-off, improving both reconstruction quality and generative performance. Our experiments demonstrate that: (1) with only 8 additional queries and 3.9% extra computation, DecQ improves reconstruction over the frozen DINOv2-based RAE, increasing PSNR from 19.13 dB to 22.76 dB; and (2) for generative modeling, DecQ achieves 3.3times faster convergence than RAE, attaining an FID of 1.41 without guidance and 1.05 with guidance.', 'score': 1, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'daa86de9e5cf81cc', 'authors': ['Tianhang Wang', 'Yitong Chen', 'Wei Song', 'Zuxuan Wu', 'Min Li', 'Jiaqi Wang'], 'affiliations': ['Fudan University', 'JD.COM', 'Shanghai Innovation Institute', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22777.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Лёгкие запросы для совершенства: реконструкция без потери семантики', 'desc': 'DecQ — это фреймворк, который улучшает автоэнкодеры представлений, добавляя лёгкие детализирующие запросы для извлечения мелких деталей из промежуточных слоёв замороженной модели фундамента зрения. Эти запросы интегрируются в декодер и помогают достичь лучшего качества реконструкции изображений без нарушения предобученного семантического пространства. Метод решает классический компромисс между качеством реконструкции и качеством генерации, агрегируя информацию из поверхностных и глубоких слоёв нейронной сети. Экспериментально показано, что DecQ повышает PSNR на 3.63 дБ и ускоряет сходимость диффузионной модели в 3.3 раза при минимальных вычислительных затратах.'}, 'en': {'title': 'DecQ: Enhancing Autoencoders with Lightweight Queries for Better Generation', 'desc': 'DecQ is a novel framework that enhances representation autoencoders by integrating lightweight queries to improve both reconstruction quality and generative performance. It utilizes frozen vision foundation models as encoders, which provide strong high-level representations but limit fine-grained image generation. By introducing detail-condensing queries, DecQ captures detailed information from various layers of the model, allowing for better reconstruction without compromising the pretrained semantic space. Experimental results show significant improvements in reconstruction metrics and faster convergence in generative tasks, demonstrating the effectiveness of this approach.'}, 'zh': {'title': 'DecQ：提升自编码器生成与重建的利器', 'desc': 'DecQ是一种增强表示自编码器的框架，通过引入轻量级查询来提高重建质量和生成性能，而不干扰预训练的语义空间。它利用冻结的视觉基础模型作为编码器，提供高层次的强大表示，促进潜在扩散模型的快速收敛和高质量生成。DecQ通过凝聚模块提取中间特征中的细粒度信息，并将这些查询与补丁令牌一起生成，以支持重建。实验表明，DecQ在重建和生成建模中都显著提高了性能，展示了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.21363', 'title': '"I didn\'t Make the Micro Decisions": Measuring, Inducing, and Exposing Goal-Level AI Contributions in Collaboration', 'url': 'https://huggingface.co/papers/2605.21363', 'abstract': 'Abstract A goal-level attribution framework called CoTrace is introduced to analyze how large language models contribute to goal shaping in human-AI collaboration, revealing that while models account for a small percentage of direct contributions, they play a significant role in introducing concrete requirements and making indirect contributions.  AI-generated summary As large language models (LLMs) increasingly shape how users form, refine, and extend their goals, attributing contributions in human-AI collaboration becomes critical for users calibrating their own reliance and for evaluators assessing AI-assisted work. Yet existing methods focus on final artifacts, missing the process through which goals themselves are jointly shaped. We introduce a goal-level attribution framework, CoTrace, that decomposes explicit goals into verifiable requirements and traces both direct contributions and indirect influences across dialogue turns. Applying CoTrace to 638 real-world collaboration logs, we find that while models account for only 11-26% of goal-shaping contribution, they contribute substantially more on introducing lower-level concrete requirements, and make various kinds of indirect contributions. Through controlled simulations, we show that interaction design choices significantly affect model goal-shaping behavior. In a user study, exposing participants to goal-level analyses shifts their perceived contributions by nearly 2 points on a 5-point scale, revealing systematic miscalibration in how users understand their own AI-assisted work.', 'score': 1, 'issue_id': 2291, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '629c63cb13cc3054', 'authors': ['Eunsu Kim', 'Jessica R. Mindel', 'Kyungjin Kim', 'Sherry Tongshuang Wu'], 'affiliations': ['Carnegie Mellon University', 'KAIST', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21363.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Раскрывая скрытое влияние: как языковые модели переформатируют цели пользователей', 'desc': 'В работе представлена фреймворк CoTrace для анализа атрибуции вклада больших языковых моделей в совместную работу человека и AI при формировании целей. Авторы разложили явные цели на проверяемые требования и отследили как прямые вклады, так и косвенные влияния моделей на протяжении диалога. Исследование показало, что хотя модели обеспечивают только 11-26% прямого влияния на формирование целей, они значительно больше способствуют введению конкретных требований и оказывают различные косвенные влияния. Пользовательское исследование выявило систематическое недокалибрование восприятия людьми собственного вклада в AI-ассистированную работу.'}, 'en': {'title': "CoTrace: Unveiling AI's Hidden Role in Goal Shaping", 'desc': 'The paper presents CoTrace, a framework designed to analyze how large language models (LLMs) influence goal shaping in human-AI collaboration. It highlights that while LLMs have a small direct impact on goal contributions, they significantly aid in defining concrete requirements and provide indirect support throughout the collaboration process. By examining 638 collaboration logs, the study reveals that LLMs contribute more to lower-level requirements than to overall goal shaping. Additionally, the research shows that user perceptions of AI contributions can be miscalibrated, which can be adjusted through goal-level analyses.'}, 'zh': {'title': '揭示AI在目标塑造中的重要作用', 'desc': '本文介绍了一种名为CoTrace的目标级归因框架，用于分析大型语言模型在人工智能与人类协作中如何影响目标的形成。研究发现，尽管模型在直接贡献中只占11-26%，但它们在引入具体要求和间接贡献方面发挥了重要作用。通过对638个真实协作日志的应用，揭示了模型在目标塑造中的多种影响方式。用户研究表明，目标级分析的展示显著改变了参与者对AI辅助工作的贡献认知，显示出用户对自身工作理解的系统性误差。'}}}, {'id': 'https://huggingface.co/papers/2605.21803', 'title': 'Same Architecture, Different Capacity: Optimizer-Induced Spectral Scaling Laws', 'url': 'https://huggingface.co/papers/2605.21803', 'abstract': 'Abstract Different optimizers produce distinct spectral scaling behaviors in Transformer models, with Muon achieving superior scaling efficiency compared to AdamW in representation capacity utilization.  AI-generated summary Scaling laws have made language-model performance predictable from model size, data, and compute, but they typically treat the optimizer as a fixed training detail. We show that this assumption misses a fundamental axis of representation scaling: how effectively the optimizer converts added FFN width into utilized spectral capacity. Using eigenspectra of feed-forward network representations, measured through soft and hard spectral-ranks, we find that the same Transformer architecture realizes markedly different spectral scaling laws when trained with different optimizers. Holding architecture and width schedule fixed, AdamW exhibits weak hard-rank scaling (β=0.44) on rare-token (TAIL) representations where learning is known to be hardest, whereas Muon achieves linear scaling (β=1.02) in the same regimes, a 2.3times increase in the scaling exponent. This difference is not reducible to validation loss: AdamW configurations can match low-rank Dion variants in perplexity, under extended training, while exhibiting sharply different spectral geometry, demonstrating that matched loss does not imply matched representation structure. Hard--soft rank asymmetry further reveals that optimizers differ not only in how much capacity is realized, but also in how that capacity is structured across eigenmodes. To disentangle optimizer effects from architectural ones, we compare against architectural interventions (e.g., attention rank and positional encoding), and find that optimizer-induced spectral shifts often exceed the architectural effects. These results suggest optimization as a first-class axis of representation scaling, motivating optimizer--architecture co-design.', 'score': 1, 'issue_id': 2288, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '1b4fcec7000d93c5', 'authors': ['Nandan Kumar Jha', 'Brandon Reagen'], 'affiliations': ['New York University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21803.jpg', 'data': {'categories': ['#math', '#training', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Оптимизатор как первоклассное измерение масштабирования представлений', 'desc': 'В статье исследуется, как различные оптимизаторы влияют на спектральное масштабирование представлений в моделях Transformer. Авторы показывают, что Muon достигает линейного масштабирования жесткого спектрального ранга (β=1.02) на сложных представлениях редких токенов, в то время как AdamW демонстрирует слабое масштабирование (β=0.44). Они обнаруживают, что одинаковые значения функции потерь не гарантируют идентичную структуру представлений, и влияние выбора оптимизатора на спектральную геометрию часто превышает эффекты архитектурных изменений. Исследование предлагает рассматривать оптимизацию как ключевой фактор масштабирования представлений при совместном проектировании оптимизаторов и архитектур.'}, 'en': {'title': 'Optimizers Matter: Unlocking Transformer Potential with Muon', 'desc': 'This paper investigates how different optimizers affect the scaling behavior of Transformer models, particularly focusing on their spectral capacity utilization. It reveals that the Muon optimizer significantly outperforms AdamW in converting increased feed-forward network (FFN) width into effective representation capacity. The study uses eigenspectra analysis to show that optimizers influence not only the amount of capacity utilized but also its structural organization across eigenmodes. The findings advocate for considering optimization as a critical factor in model design, suggesting a need for co-designing optimizers and architectures for better performance.'}, 'zh': {'title': '优化器与架构共同设计，提升Transformer表现', 'desc': '这篇论文探讨了不同优化器在Transformer模型中的光谱缩放行为，发现Muon优化器在表示能力利用上比AdamW更有效。研究表明，优化器的选择对模型的表现有重要影响，尤其是在处理稀有标记时，Muon优化器的缩放效率显著高于AdamW。通过分析前馈网络表示的特征谱，作者发现即使在相同的架构和宽度下，不同优化器也会导致不同的光谱缩放规律。结果表明，优化器的设计应与模型架构共同考虑，以提高模型的表示能力。'}}}, {'id': 'https://huggingface.co/papers/2605.20496', 'title': 'Platonic Representations in the Human Brain: Unsupervised Recovery of Universal Geometry', 'url': 'https://huggingface.co/papers/2605.20496', 'abstract': 'Abstract Self-supervised encoding of brain data reveals shared neural geometry across individuals through geometric transformations without paired data.  AI-generated summary The Strong Platonic Representation Hypothesis suggests that representational convergence in artificial neural networks can be harnessed constructively: embeddings can be translated across models through a universal latent space without paired data. We ask whether an analogous geometry can be recovered across human brains. Using fMRI data from the Natural Scenes Dataset, we propose a self-supervised encoder that learns subject-specific embeddings from brain data alone by exploiting repeated stimulus presentations. We show that these independently learned spaces can be translated across subjects using unsupervised orthogonal rotations, without paired cross-subject samples or intermediate model representations. Synchronizing pairwise rotations into a single shared latent space further improves cross-subject retrieval, indicating that subject-specific spaces are mutually compatible with a common coordinate system. These results provide evidence for a shared neural geometry in the human visual cortex: subject-specific fMRI representations are approximately isometric across individuals and can be translated through purely geometric transformations.', 'score': 1, 'issue_id': 2292, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'd548b75f4116243f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#transfer_learning'], 'emoji': '🧠', 'ru': {'title': 'Общая геометрия мозга: универсальное пространство представлений для разных людей', 'desc': 'В этой работе исследователи предлагают метод самоконтролируемого обучения для анализа данных фМРТ мозга, который позволяет выучить представления активности зрительной коры без парных данных между субъектами. Они демонстрируют, что независимо обученные пространства представлений разных испытуемых можно согласовать между собой через ортогональные преобразования, основываясь только на геометрических свойствах данных. Результаты показывают, что нейронные представления в зрительной коре человека приблизительно изометричны между индивидуумами, то есть обладают общей геометрической структурой. Это открытие поддерживает гипотезу о существовании универсального нейрального пространства, которое может быть использовано для трансляции представлений между разными людьми.'}, 'en': {'title': 'Unlocking Shared Neural Geometry Across Brains', 'desc': 'This paper explores how brain data from different individuals can be understood using a common geometric framework without needing paired data. It introduces a self-supervised encoder that learns unique representations of brain activity from fMRI scans by analyzing repeated visual stimuli. The study demonstrates that these individual representations can be aligned and compared through unsupervised geometric transformations, specifically orthogonal rotations. The findings suggest that there is a shared neural geometry in the human visual cortex, allowing for effective cross-subject comparisons of brain activity.'}, 'zh': {'title': '揭示人类大脑共享的神经几何结构', 'desc': '这篇论文探讨了如何通过自监督编码技术，从大脑数据中揭示个体之间共享的神经几何结构。研究使用功能性磁共振成像(fMRI)数据，提出了一种自监督编码器，能够仅通过刺激的重复呈现来学习个体特定的嵌入表示。研究表明，这些独立学习的空间可以通过无监督的正交旋转在不同个体之间进行转换，而无需配对的样本。结果表明，人类视觉皮层中存在共享的神经几何结构，个体特定的fMRI表示在几何变换下是相似的。'}}}, {'id': 'https://huggingface.co/papers/2605.20405', 'title': 'Disentangling Sampling from Training Budget in Class-Imbalanced CT Body Composition Segmentation', 'url': 'https://huggingface.co/papers/2605.20405', 'abstract': 'Abstract Episodic sampling from few-shot learning improves class-balanced batch construction in medical image segmentation, outperforming random and weighted sampling under low-data conditions due to reduced overfitting and extended training iterations.  AI-generated summary Class imbalance is a fundamental challenge in medical image segmentation, where frequent classes typically dominate training at the expense of rare classes. Loss-based approaches mitigate imbalance by reweighting the per-pixel loss within the batch, while sampling strategies control which images enter the batch. Yet neither explicitly controls which classes appear within the batch, leaving rare-class exposure only partially rebalanced. In this work, we adopt episodic sampling from few-shot learning to promote class-balanced batch construction in a fully supervised setting. We decouple episodic sampling from its conventional metric-learning context and evaluate it in body composition segmentation in CT. We compare episodic sampling against random and weighted sampling on nine muscle and adipose tissues, derived from 210 scans of the public SAROS dataset. Training is performed under full- and low-data regimes, with additional comparisons under matched training iteration budgets. Under full-data training, all three strategies performed comparably (mean Dice 0.882 for episodic, 0.878 for random and weighted). Under low-data training, episodic sampling outperformed random and weighted (0.787 vs. 0.758 and 0.762), driven by a 12-fold difference in training iterations. Under matched training budgets, random and weighted overfit earlier, while episodic improved for approximately three times more iterations before plateauing. Our findings identify the training iteration budget as under-recognized confound in sampling strategies, motivating iteration-aware evaluation protocols for small datasets. Furthermore, the residual advantage of episodic sampling is consistent with an implicit regularization effect of class-balanced batches, offering a low-cost, model-agnostic strategy for class-imbalanced medical image segmentation. Code is available at https://github.com/iasonsky/episodic-sampling.', 'score': 1, 'issue_id': 2292, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '96ef39657233b56d', 'authors': ['Iason Skylitsis', 'Dimitrios Karkalousos', 'Ivana Išgum'], 'affiliations': ['Department of Biomedical Engineering & Physics Amsterdam University Medical Center', 'Department of Radiology Amsterdam University Medical Center', 'Informatics Institute, Faculty of Science University of Amsterdam', 'Mayo Clinic'], 'pdf_title_img': 'assets/pdf/title_img/2605.20405.jpg', 'data': {'categories': ['#data', '#training', '#optimization', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'Эпизодическая выборка для борьбы с дисбалансом классов в медицинской сегментации', 'desc': 'В статье предлагается применить эпизодическую выборку из few-shot learning для сбалансированного формирования батчей при сегментации медицинских изображений. Авторы показывают, что традиционные методы случайной и взвешенной выборки не полностью контролируют появление редких классов в батче, что приводит к дисбалансу. При низком объёме данных эпизодическая выборка значительно превосходит альтернативы благодаря лучшему контролю класс-балансировки и меньшему переобучению. Исследование демонстрирует, что эффективность стратегий выборки зависит не только от метода, но и от бюджета итераций обучения, что ранее недостаточно учитывалось.'}, 'en': {'title': 'Episodic Sampling: A Game Changer for Class-Balanced Medical Image Segmentation', 'desc': 'This paper discusses a new method called episodic sampling from few-shot learning to improve class balance in medical image segmentation. Class imbalance is a common issue where some classes are overrepresented, leading to poor performance on rare classes. The authors show that episodic sampling can reduce overfitting and extend training iterations, especially in low-data scenarios. Their results indicate that this method outperforms traditional random and weighted sampling techniques, providing a more effective approach for handling class imbalance in medical imaging tasks.'}, 'zh': {'title': '情节采样：医学图像分割中的类别平衡新策略', 'desc': '本研究提出了一种基于少量样本学习的情节采样方法，以改善医学图像分割中的类别平衡批次构建。在低数据条件下，该方法优于随机和加权采样，减少了过拟合并延长了训练迭代。研究表明，情节采样在全数据训练和低数据训练中均表现良好，尤其在低数据情况下，显著提高了模型性能。该方法为处理医学图像分割中的类别不平衡问题提供了一种低成本、模型无关的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2605.20244', 'title': 'Lean Refactor: Multi-Objective Controllable Proof Optimization via Agentic Strategy Search', 'url': 'https://huggingface.co/papers/2605.20244', 'abstract': "Abstract Lean Refactor presents a retrieval-augmented agentic framework that improves Lean proof refactoring by addressing multi-objective optimization, version compatibility, and scalability challenges through curated strategy databases and version-filtered retrieval.  AI-generated summary We present Lean Refactor, a plug-and-play retrieval-augmented agentic framework for multi-objective, controllable, and version-robust refactoring of Lean proofs. LLM-generated proofs are notoriously correct-but-verbose and brittle across library versions, yet existing refactoring works overlook three practical challenges: 1) Lean refactoring is natively multi-objective (proof length, compilation cost, and version compatibility are often in tension); 2) Lean repositories have fragile compatibility, whereas LLM releases are unaware of Lean/Mathlib versions; 3) Training-based pipelines require repeated fine-tuning with each new LLM release, scaling neither with model churn nor with Lean's release cycle. Lean Refactor steers a frozen agentic LLM with retrievals from a curated database of multi-objective refactoring strategies, each densely annotated with metadata such as supported Lean/Mathlib versions and expected compilation-cost reduction. Experiments show over 70% token-level compression on competition benchmarks, over 20% on research repositories, and up to 60% compilation-time reduction, outperforming prior work and Claude Code. Version-filtered retrieval further improves compression on the target Lean version, and refactored miniF2F proofs exhibit stronger zero-shot version transfer to future Lean releases than their unrefactored counterparts.", 'score': 1, 'issue_id': 2291, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'd5297bb5be33efb5', 'authors': ['Jialin Lu', 'Soonho Kong', 'Rodrigo Stehling', 'Kaiyu Yang', 'Zhangyang Wang', 'Weiran Sun', 'Wuyang Chen'], 'affiliations': ['Amazon Web Services', 'MiroMind', 'Simon Fraser University', 'University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.20244.jpg', 'data': {'categories': ['#optimization', '#agents', '#science', '#rag', '#benchmark', '#plp'], 'emoji': '🔧', 'ru': {'title': 'Умная переработка доказательств через поиск в стратегической базе', 'desc': 'Lean Refactor представляет агентический фреймворк, расширенный поиском по базе данных, который оптимизирует рефакторинг доказательств в Lean с помощью многоцелевой оптимизации. Система хранит куратированную базу стратегий рефакторинга с метаданными о совместимости версий и снижении затрат компиляции, что позволяет замороженной LLM выбирать лучшие применения. Подход решает три практические задачи: поддержка нескольких противоречивых целей оптимизации, хрупкость совместимости между версиями Lean и Mathlib, а также масштабируемость при выпуске новых версий LLM. Экспериментальные результаты показывают сжатие кода на 70% и сокращение времени компиляции на 60%, с улучшением передачи версий благодаря фильтрации по совместимости.'}, 'en': {'title': 'Optimizing Lean Proofs with Smart Refactoring Strategies', 'desc': 'Lean Refactor is a framework designed to enhance the process of refactoring Lean proofs by integrating retrieval-augmented techniques. It tackles the challenges of multi-objective optimization, ensuring that proof length, compilation cost, and version compatibility are effectively balanced. The framework utilizes a curated database of refactoring strategies that are annotated with metadata, allowing for better version compatibility and reduced compilation times. Experimental results demonstrate significant improvements in token-level compression and compilation efficiency compared to previous methods.'}, 'zh': {'title': '提升 Lean 证明重构的智能框架', 'desc': 'Lean Refactor 是一个增强检索的框架，旨在改善 Lean 证明的重构过程。它解决了多目标优化、版本兼容性和可扩展性等挑战，通过策划的策略数据库和版本过滤检索来实现。该框架能够有效地处理 Lean 证明中的多个目标，如证明长度、编译成本和版本兼容性。实验结果表明，Lean Refactor 在多个基准测试中表现优异，显著提高了代码压缩率和编译时间的减少。'}}}, {'id': 'https://huggingface.co/papers/2605.18577', 'title': 'OmniPro: A Comprehensive Benchmark for Omni-Proactive Streaming Video Understanding', 'url': 'https://huggingface.co/papers/2605.18577', 'abstract': "Abstract OmniPro is introduced as the first benchmark for evaluating omni-modal large language models' proactive streaming video understanding, featuring diverse tasks and dual-mode evaluation protocols.  AI-generated summary Omni-proactive streaming video understanding, i.e., autonomously deciding when to speak and what to say from continuous audio-visual streams, is an emerging capability of omni-modal large language models. Existing benchmarks fall short in three key aspects: they rely primarily on visual signals, adopt polling or fixed-timestamp protocols instead of true proactive evaluation, and cover only a limited range of tasks, preventing reliable assessment and differentiation of omni-proactive streaming models. We present OmniPro, the first benchmark to jointly evaluate omni-modal perception, proactive responding, and diverse video understanding tasks. It comprises 2,700 human-verified samples spanning 9 sub-tasks and 3 cognitive levels, covering 6 basic video understanding capabilities. Notably, 84% of samples require audio signals (speech or non-speech), and each sample is annotated with modality-isolation labels to enable fine-grained multimodal analysis. We further introduce a dual-mode evaluation protocol: Probe mode assesses content understanding by querying the model before and after each ground-truth trigger, while Online mode evaluates full proactive ability by requiring models to autonomously decide when to respond in streaming input. Evaluating 11 representative models reveals three key findings: (1) audio provides consistent gains but with highly variable utilization across models, (2) performance degrades significantly over time, indicating limited long-horizon robustness, and (3) non-speech audio perception remains the weakest dimension.", 'score': 1, 'issue_id': 2290, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'af87c2c6bfc3dc6d', 'authors': ['Ruixiang Zhao', 'Jie Yang', 'Zijie Xin', 'Tianyi Wang', 'Fengyun Rao', 'Jing LYU', 'Xirong Li'], 'affiliations': ['Renmin University of China', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.18577.jpg', 'data': {'categories': ['#audio', '#long_context', '#survey', '#video', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Первый бенчмарк для проактивного понимания видеопотоков омни-модальными моделями', 'desc': 'OmniPro представляет первый бенчмарк для оценки омни-модальных больших языковых моделей в задаче проактивного понимания потокового видео. Набор данных содержит 2700 человеко-проверенных образцов, охватывающих 9 подзадач и 6 базовых способностей понимания видео, где 84% образцов требуют аудиосигналы. Авторы предлагают двухрежимный протокол оценки: режим Probe для проверки понимания содержания и режим Online для оценки полной способности модели автономно решать, когда отвечать на потоковый ввод. Экспериментальные результаты показывают, что аудиосигналы обеспечивают последовательное улучшение, но модели имеют ограниченную долгосрочную устойчивость и слабо воспринимают речевые звуки.'}, 'en': {'title': 'OmniPro: Advancing Proactive Video Understanding in AI', 'desc': 'The paper introduces OmniPro, a new benchmark designed to evaluate omni-modal large language models in their ability to understand and respond to streaming video content. It addresses limitations of existing benchmarks by incorporating diverse tasks and a dual-mode evaluation that tests both proactive responses and content understanding. OmniPro includes 2,700 human-verified samples across various cognitive levels and emphasizes the importance of audio signals in video comprehension. The evaluation of multiple models reveals insights into their performance, highlighting the challenges in long-term robustness and the need for improved non-speech audio perception.'}, 'zh': {'title': '全模态视频理解的首个基准评估', 'desc': 'OmniPro是第一个用于评估全模态大型语言模型主动流媒体视频理解的基准。它包含2700个经过人工验证的样本，涵盖9个子任务和3个认知水平，涉及6种基本视频理解能力。该基准的独特之处在于引入了双模式评估协议，分别评估模型的内容理解和主动响应能力。研究发现，音频信号在模型性能中起到重要作用，但不同模型的利用率差异很大，且模型在长时间内的表现会显著下降。'}}}, {'id': 'https://huggingface.co/papers/2605.22717', 'title': 'Live Music Diffusion Models: Efficient Fine-Tuning and Post-Training of Interactive Diffusion Music Generators', 'url': 'https://huggingface.co/papers/2605.22717', 'abstract': 'Abstract Audio diffusion models are adapted for interactive music generation through efficient block-wise processing and novel training paradigms that enable real-time performance on consumer hardware.  AI-generated summary Interactive streaming music generation promises the use of generative models for live performance and co-creation that is impossible with offline models. However, SOTA models exist in the discrete-AR regime, requiring industrial levels of compute for both training and inference. In this work, we investigate whether audio diffusion models, with their wide support in the open-source community but non-streaming bidirectional nature, can be repurposed efficiently into interactive models accessible on consumer hardware. By taking a critical look at the modern pipeline for block-wise outpainting diffusion, we identify critical inefficiencies during inference that result in strictly worse computational efficiency than their discrete-AR counterparts. We propose Live Music Diffusion Models (LMDMs), a simple modification of the generative diffusion process that recovers, and then outperforms, the inference complexity of the discrete Live Music Models (LMMs) through block-wise KV Caching. Unlike LMMs, LMDMs further enable stable post-training alignment through our novel ARC-Forcing paradigm, reducing error accumulation without any explicit RL or reward models. We demonstrate the application of LMDMs in a number of creative domains, including text-conditioned generation, sketch-based music synthesis, and jamming. We finally show how LMDMs can be used as a generative instrument in a real artist-AI collaboration, utilizing LMDMs as a "generative delay" to transform musicians\' improvisation live for variable timbral effects while running locally on a consumer gaming laptop.', 'score': 0, 'issue_id': 2294, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '238aa27adee4e6c3', 'authors': ['Zachary Novack', 'Stephen Brade', 'Haven Kim', 'Hugo Flores García', 'Nithya Shikarpur', 'Chinmay Talegaonkar', 'Suwan Kim', 'Valerie K. Chen', 'Julian McAuley', 'Taylor Berg-Kirkpatrick', 'Cheng-Zhi Anna Huang'], 'affiliations': ['Adobe', 'MIT', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2605.22717.jpg', 'data': {'categories': ['#diffusion', '#open_source', '#inference', '#optimization', '#training', '#audio'], 'emoji': '🎵', 'ru': {'title': 'Интерактивная диффузионная музыка для творчества в реальном времени', 'desc': 'В работе исследуется адаптация диффузионных моделей для интерактивной генерации музыки в реальном времени на потребительском оборудовании. Авторы предлагают Live Music Diffusion Models (LMDMs) с модификацией процесса генеративной диффузии и техникой block-wise KV Caching, которая снижает вычислительную сложность до уровня дискретных авторегрессивных моделей. Метод включает новую парадигму ARC-Forcing для стабилизации выравнивания модели после обучения без использования reinforcement learning. Демонстрируется практическое применение LMDMs в текст-обусловленной генерации, синтезе музыки по эскизам и совместном творчестве музыканта с AI.'}, 'en': {'title': 'Revolutionizing Live Music with Efficient Diffusion Models', 'desc': 'This paper presents Live Music Diffusion Models (LMDMs), which adapt audio diffusion models for real-time interactive music generation on consumer hardware. The authors identify inefficiencies in existing models and propose a block-wise KV Caching method to enhance computational efficiency. LMDMs allow for stable post-training alignment without relying on reinforcement learning, thus reducing error accumulation. The models are demonstrated in various creative applications, including live performance and collaborative music creation, showcasing their potential as a generative tool for artists.'}, 'zh': {'title': '实时音乐生成的新突破', 'desc': '本文探讨了音频扩散模型在互动音乐生成中的应用，提出了一种新的实时处理方法，使其能够在普通硬件上高效运行。我们提出了实时音乐扩散模型（LMDMs），通过块级KV缓存技术，显著提高了推理效率，超越了传统的离线模型。LMDMs还引入了ARC-Forcing范式，减少了误差积累，避免了复杂的强化学习或奖励模型。最后，我们展示了LMDMs在文本条件生成、草图音乐合成和即兴演奏等创意领域的应用。'}}}, {'id': 'https://huggingface.co/papers/2605.22552', 'title': 'FashionLens: Toward Versatile Fashion Image Retrieval via Task-Adaptive Learning', 'url': 'https://huggingface.co/papers/2605.22552', 'abstract': 'Abstract A unified fashion image retrieval framework is proposed that handles diverse query formats and search intentions through multimodal large language models with adaptive calibration and sampling strategies.  AI-generated summary Fashion image retrieval is a cornerstone of modern e-commerce systems. A unified framework that supports diverse query formats and search intentions is highly desired in practice. However, existing approaches focus on narrow retrieval tasks and do not fully capture such diversity. Therefore, in this work, we aim to develop a unified framework capable of handling diverse realistic fashion retrieval scenarios, achieving truly versatile fashion image retrieval. To establish a data foundation, we first introduce U-FIRE, a comprehensive benchmark that consolidates fragmented fashion datasets into a unified collection, supplemented by two manually curated datasets for testing generalization. Building upon this, we propose FashionLens, a unified framework based on Multimodal Large Language Models. To handle divergent matching objectives, we design a Proposal-Guided Spherical Query Calibrator that dynamically shifts query representations into task-aligned metric spaces via adaptive spherical linear interpolation. Additionally, to mitigate the optimization imbalance caused by varying task complexities and data scales, we develop a Gradient-Guided Adaptive Sampling strategy that automatically re-weights tasks based on realtime learning difficulty and the data scale prior. Experiments on U-FIRE show that FashionLens achieves state-of-the-art performance across diverse retrieval scenarios and generalizes robustly to unseen tasks. The data and code are publicly released at https://github.com/haokunwen/FashionLens.', 'score': 0, 'issue_id': 2292, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '36b47a70fa6b2c81', 'authors': ['Haokun Wen', 'Xuemeng Song', 'Xinghao Xie', 'Xiaolin Chen', 'Xiangyu Zhao', 'Weili Guan'], 'affiliations': ['Department of Computer Science and Engineering, Southern University of Science and Technology', 'Department of Data Science, City University of Hong Kong', 'Institute of Data Science, National University of Singapore', 'School of Artificial Intelligence, Nanjing University', 'School of Computer Science and Technology, Harbin Institute of Technology (Shenzhen)', 'School of Information Science and Technology, Harbin Institute of Technology (Shenzhen)', 'Shenzhen Loop Area Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.22552.jpg', 'data': {'categories': ['#training', '#open_source', '#cv', '#multimodal', '#benchmark', '#dataset'], 'emoji': '👗', 'ru': {'title': 'Универсальный поиск модной одежды через мультимодальные языковые модели', 'desc': 'В работе предложена унифицированная система поиска изображений одежды, которая обрабатывает различные форматы запросов и намерения пользователей с помощью мультимодальных больших языковых моделей. Авторы создали новый бенчмарк U-FIRE, объединяющий фрагментированные датасеты моды в единую коллекцию для обучения и тестирования. Предложенная система FashionLens использует адаптивный калибратор запросов для динамического смещения представлений в метрические пространства, выравненные с конкретными задачами поиска. Для балансировки обучения разработана стратегия адаптивной выборки, которая автоматически перевзвешивает задачи на основе текущей сложности обучения и масштаба данных.'}, 'en': {'title': 'Versatile Fashion Image Retrieval with FashionLens', 'desc': 'This paper presents a new framework called FashionLens for fashion image retrieval that can handle various types of queries and user intentions. It utilizes multimodal large language models and introduces innovative techniques like the Proposal-Guided Spherical Query Calibrator to adaptively align query representations for different tasks. Additionally, it employs a Gradient-Guided Adaptive Sampling strategy to balance the learning process across tasks of varying complexities. The framework is validated on a new benchmark dataset, U-FIRE, demonstrating superior performance in diverse retrieval scenarios and strong generalization to new tasks.'}, 'zh': {'title': '统一时尚图像检索框架的创新之路', 'desc': '本文提出了一种统一的时尚图像检索框架，能够处理多样的查询格式和搜索意图，利用多模态大语言模型及自适应校准和采样策略。时尚图像检索是现代电子商务系统的基础，但现有方法往往只关注狭窄的检索任务，未能充分捕捉多样性。为此，我们开发了U-FIRE基准数据集，将分散的时尚数据集整合为统一的集合，并提出了FashionLens框架，能够应对多样化的时尚检索场景。通过动态调整查询表示和自适应采样策略，FashionLens在多种检索场景中实现了最先进的性能，并能有效推广到未见任务。'}}}, {'id': 'https://huggingface.co/papers/2605.19990', 'title': 'Minimalist Visual Inertial Odometry', 'url': 'https://huggingface.co/papers/2605.19990', 'abstract': 'Abstract A minimalist visual-inertial odometry approach uses four photodiodes with optical Gabor masks and a temporal convolutional network to achieve accurate planar motion estimation for differential-drive robots.  AI-generated summary Visual-Inertial Odometry(VIO), which is critical to mobile robot navigation, uses cameras with a large number of pixels. Capturing and processing camera images requires significant resources. This work presents a minimalist approach to planar odometry, demonstrating that just four visual measurements and an IMU can provide robust motion estimation for differential-drive robots. Our key insight is that four downward-facing photodiodes that sense the world through optical Gabor masks produce signals that encode speed. Based on this, we jointly optimize the mask parameters alongside a Temporal Convolutional Network (TCN) using a physically-grounded simulator. The resulting model decodes speed from just the four measurements produced by the photodiodes. Pairing these estimates with the angular speed from an IMU yields a continuous planar trajectory. We validate our approach with a prototype sensor mounted on a differential drive robot. Across diverse indoor and outdoor terrains, our system closely tracks the reference ground truth without any real-world fine-tuning. Our work shows that minimalist sensing enables efficient and accurate planar odometry.', 'score': 0, 'issue_id': 2290, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '76fbc7ab6e81dbf3', 'authors': ['Francesco Pasti', 'Jeremy Klotz', 'Nicola Bellotto', 'Shree K. Nayar'], 'affiliations': ['Computer Science Department, Columbia University, New York, NY, USA', 'Department of Information Engineering, University of Padua, Padua, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2605.19990.jpg', 'data': {'categories': ['#robotics', '#architecture', '#small_models', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Четыре фотодиода вместо камеры: минималистичная одометрия для мобильных роботов', 'desc': 'Работа представляет минималистичный подход к визуально-инерциальной одометрии для мобильных роботов, используя всего четыре фотодиода с оптическими масками Габора вместо полноразмерной камеры. Авторы совместно оптимизируют параметры масок и временную свёрточную сеть (TCN) на физически обоснованном симуляторе для оценки скорости движения робота. Модель декодирует линейную скорость из сигналов четырёх датчиков, а угловую скорость получает из инерциального измерительного модуля (IMU), что позволяет восстанавливать траекторию движения на плоскости. Экспериментальная валидация на дифференциальном приводном роботе показала точное отслеживание эталонной траектории на различных внутренних и наружных поверхностях без дополнительной настройки на реальных данных.'}, 'en': {'title': 'Minimalist Sensing for Accurate Robot Motion Estimation', 'desc': 'This paper presents a minimalist approach to visual-inertial odometry (VIO) for differential-drive robots, utilizing only four photodiodes with optical Gabor masks and a temporal convolutional network (TCN). The authors demonstrate that these four visual measurements, combined with data from an inertial measurement unit (IMU), can effectively estimate planar motion without the need for complex camera systems. By optimizing the parameters of the Gabor masks and the TCN, the model successfully decodes speed from minimal input. The proposed system is validated in various environments, showing that it can accurately track motion with high efficiency and without extensive real-world adjustments.'}, 'zh': {'title': '极简传感器实现高效平面里程计', 'desc': '本文提出了一种极简的视觉惯性里程计方法，使用四个光电二极管和光学Gabor掩模来实现差分驱动机器人精确的平面运动估计。通过这四个光电二极管的测量，结合一个惯性测量单元（IMU），可以有效地解码速度信息。我们使用物理基础的模拟器共同优化掩模参数和时间卷积网络（TCN），从而实现高效的运动估计。实验结果表明，该方法在多种室内外环境中均能准确跟踪真实轨迹，展示了极简传感器在平面里程计中的有效性和准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.07604', 'title': 'SAM 3D Animal: Promptable Animal 3D Reconstruction from Images in the Wild', 'url': 'https://huggingface.co/papers/2605.07604', 'abstract': 'Abstract SAM 3D Animal enables multi-animal 3D reconstruction from single images using a promptable framework based on SMAL+ model with improved disambiguation through keypoints and masks.  AI-generated summary 3D animal reconstruction in the wild remains challenging due to large species variation, frequent occlusions, and the prevalence of multi-animal scenes, while existing methods predominantly focus on single-animal settings. We present SAM 3D Animal, the first promptable framework for multi-animal 3D reconstruction from a single image. Built on the SMAL+ parametric animal model, our method jointly reconstructs multiple instances and supports flexible prompts in the form of keypoints and masks which enable more reliable disambiguation in crowded and occluded scenes. To train such a model, we further introduce Herd3D, a multi-animal 3D dataset containing over 5K images, designed to increase diversity in species, interactions, and occlusion patterns. Experiments on the Animal3D, APTv2, and Animal Kingdom datasets show that our framework achieves state-of-the-art results over both existing model-based and model-free methods, demonstrating a scalable and effective solution for prompt-driven animal 3D reconstruction in the wild.', 'score': 0, 'issue_id': 2293, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'a71198b5f5eb2c8e', 'authors': ['Xuyi Hu', 'Jin Lyu', 'Jiuming Liu', 'Yebin Liu', 'Silvia Zuffi', 'Liang An', 'Stefan Goetz'], 'affiliations': ['IMATI-CNR, Milan, Italy', 'Southern University of Science and Technology', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2605.07604.jpg', 'data': {'categories': ['#cv', '#multimodal', '#dataset', '#3d'], 'emoji': '🦁', 'ru': {'title': 'Интерактивная реконструкция стада: 3D животные по одному фото', 'desc': 'В статье представлен SAM 3D Animal — первый интерактивный фреймворк для трёхмерной реконструкции нескольких животных на одном изображении на основе параметрической модели SMAL+. Метод поддерживает гибкие подсказки в виде ключевых точек и масок, что обеспечивает надёжное разделение объектов в сложных сценах с окклюзией. Для обучения модели авторы создали Herd3D — датасет из более 5000 изображений с высоким разнообразием видов животных, их взаимодействий и паттернов перекрытия. Методология достигает лучших результатов на эталонных датасетах Animal3D, APTv2 и Animal Kingdom, превосходя как модельные, так и беспараметрические подходы.'}, 'en': {'title': 'Revolutionizing Multi-Animal 3D Reconstruction from Single Images', 'desc': 'The paper introduces SAM 3D Animal, a novel framework for reconstructing 3D models of multiple animals from a single image. It leverages the SMAL+ model and enhances disambiguation using keypoints and masks, addressing challenges like species variation and occlusions in crowded scenes. The framework is trained on a new dataset called Herd3D, which includes over 5,000 images to improve diversity in animal interactions and occlusion scenarios. Experimental results show that SAM 3D Animal outperforms existing methods, making it a significant advancement in multi-animal 3D reconstruction.'}, 'zh': {'title': '多动物3D重建的新突破', 'desc': 'SAM 3D Animal 是一种基于 SMAL+ 模型的框架，能够从单张图像中进行多动物的 3D 重建。该方法通过关键点和掩码的提示，改善了在复杂场景中的歧义性，支持同时重建多个动物实例。为了训练该模型，我们引入了 Herd3D 数据集，包含超过 5000 张图像，旨在增加物种、互动和遮挡模式的多样性。实验结果表明，该框架在多个数据集上达到了最先进的效果，展示了其在野外动物 3D 重建中的可扩展性和有效性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (6)', '#agents (10)', '#agi', '#alignment (3)', '#architecture (8)', '#audio (4)', '#benchmark (22)', '#cv (7)', '#data (1)', '#dataset (16)', '#diffusion (8)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (2)', '#inference (6)', '#interpretability (3)', '#leakage', '#long_context (6)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual (1)', '#multimodal (17)', '#open_source (7)', '#optimization (14)', '#plp (2)', '#rag (2)', '#reasoning (10)', '#rl (7)', '#rlhf (2)', '#robotics (2)', '#science (4)', '#security', '#small_models (2)', '#story_generation (1)', '#survey (1)', '#synthetic (2)', '#training (20)', '#transfer_learning (2)', '#video (10)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-22 22:00',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-22 22:00')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-22 22:00')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
