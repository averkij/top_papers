'Abstract Unsupervised reward models eliminate the need for human annotations in training by leveraging language model next-token probabilities to identify erroneous reasoning steps and improve policy optimization in reinforcement learning.  AI-generated summary Process Reward Models (PRMs) are a powerful mechanism for steering large language model reasoning by providing fine-grained, step-level supervision. However, this effectiveness comes at a significant cost: PRMs require expert annotations for every reasoning step, making them costly and difficult to scale. Here, we propose a method for training unsupervised PRMs (uPRM) that requires no human supervision, neither at the level of step-by-step annotations nor through ground-truth verification of final answers. The key idea behind our approach is to define a scoring function, derived from LLM next-token probabilities, that jointly assesses candidate positions of first erroneous steps across a batch of reasoning trajectories. We demonstrate the effectiveness of uPRM across diverse scenarios: (i) uPRM achieves up to 15% absolute accuracy improvements over the LLM-as-a-Judge in identifying first erroneous steps on the ProcessBench dataset; (ii) as a verifier for test-time scaling, uPRM performs comparably to supervised PRMs and outperforms the majority voting baseline by up to 6.9%, and (iii) when used as a reward signal in reinforcement learning, uPRM enables more robust policy optimization throughout training compared to a supervised PRM trained using ground-truth labels. Overall, our results open a path toward scalable reward modeling for complex reasoning tasks.', 'score': 15, 'issue_id': 2290, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '3ead2d1cd4df77a9', 'authors': ['Artyom Gadetsky', 'Maxim Kodryan', 'Siba Smarak Panigrahi', 'Hang Guo', 'Maria Brbic'], 'affiliations': ['Swiss Federal Institute of Technology (EPFL)'], 'pdf_title_img': 'assets/pdf/title_img/2605.10158.jpg', 'data': {'categories': ['#rlhf', '#reasoning', '#rl', '#training', '#alignment'], 'emoji': '🧠', 'ru': {'title': 'Модели вознаграждения без человеческого контроля через вероятности токенов', 'desc': 'Статья описывает метод обучения несуперvisированных моделей вознаграждения (uPRM) без человеческих аннотаций. Основная идея заключается в использовании вероятностей следующего токена языковой модели для выявления ошибок в цепочках рассуждений. Предложенный подход показывает сравнимые или лучшие результаты с контролируемыми моделями при верификации и оптимизации политики в обучении с подкреплением. Это открывает путь к масштабируемому моделированию вознаграждений для сложных задач рассуждений.'}, 'en': {'title': 'Revolutionizing Reward Modeling with Unsupervised Learning', 'desc': 'This paper introduces unsupervised reward models (uPRMs) that eliminate the need for human annotations in training reinforcement learning systems. By using next-token probabilities from large language models (LLMs), uPRMs can identify errors in reasoning steps without requiring expert input. The proposed method assesses potential first erroneous steps across multiple reasoning trajectories, leading to significant improvements in accuracy and policy optimization. The results show that uPRMs can effectively replace supervised models, making reward modeling more scalable for complex tasks.'}, 'zh': {'title': '无监督奖励模型：提升推理的智能化', 'desc': '本文提出了一种无监督的过程奖励模型（uPRM），它通过利用语言模型的下一个标记概率来识别错误推理步骤，从而消除对人工注释的需求。uPRM在多个场景中表现出色，能够在识别错误步骤时比传统的有监督模型提高15%的准确率。该方法通过定义一个评分函数，评估推理轨迹中的候选错误步骤，避免了逐步注释和最终答案的验证。总体而言，uPRM为复杂推理任务的可扩展奖励建模开辟了新的路径。'}}}, {'id': 'https://huggingface.co/papers/2605.22791', 'title': 'Gated DeltaNet-2: Decoupling Erase and Write in Linear Attention', 'url': 'https://huggingface.co/papers/2605.22791', 'abstract': 'Abstract Gated DeltaNet-2 improves upon existing linear attention models by separating erase and write operations through distinct channel-wise gates, achieving superior performance in long-context language modeling and retrieval tasks.  AI-generated summary Linear attention replaces the unbounded cache of softmax attention with a fixed-size recurrent state, reducing sequence mixing to linear time and decoding to constant memory. The hard part is not just what to forget, but how to edit this compressed memory without scrambling existing associations. Delta-rule models subtract the current read before writing a new value, and Kimi Delta Attention (KDA) sharpens forgetting with channel-wise decay. But the active edit still uses a single scalar gate to control two different things: how much old content to erase on the key side and how much new content to commit on the value side. We introduce Gated DeltaNet-2, which generalizes both Gated DeltaNet and KDA by inheriting adaptive forgetting and channel-wise decay while addressing their shared limitation, the scalar tie between erasing and writing. Gated Delta Rule-2 separates these roles with a channel-wise erase gate b_t and a channel-wise write gate w_t, reducing to KDA when both gates collapse to the same scalar and to Gated DeltaNet when the decay also collapses. We derive a fast-weight update view, a chunkwise WY algorithm with channel-wise decay absorbed into asymmetric erase factors, and a gate-aware backward pass that preserves efficient parallel training. At 1.3B parameters trained on 100B FineWeb-Edu tokens, Gated DeltaNet-2 achieves the strongest overall results among Mamba-2, Gated DeltaNet, KDA, and Mamba-3 variants across language modeling, commonsense reasoning, and retrieval. Its advantage is most pronounced on long-context RULER needle-in-a-haystack benchmarks, where it improves the evaluated multi-key retrieval setting and remains strong in both recurrent and hybrid settings. Code is available at https://github.com/NVlabs/GatedDeltaNet-2.', 'score': 14, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '036f5110b76dd94b', 'authors': ['Ali Hatamizadeh', 'Yejin Choi', 'Jan Kautz'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2605.22791.jpg', 'data': {'categories': ['#training', '#benchmark', '#optimization', '#open_source', '#architecture', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Разделённые вентили для точного управления памятью в линейном внимании', 'desc': 'Gated DeltaNet-2 улучшает линейные модели внимания, используя независимые канально-ориентированные вентили для операций стирания и записи в сжатое состояние памяти. Вместо одного скалярного параметра, контролирующего одновременно забывание старой информации и добавление новой, модель использует два отдельных канально-зависимых гейта, что позволяет более гибко управлять содержимым рекуррентного состояния. Архитектура обобщает предыдущие подходы как Gated DeltaNet, так и Kimi Delta Attention, сохраняя их сильные стороны в виде адаптивного забывания и канального распада. На моделях размером 1.3B параметров Gated DeltaNet-2 показывает лучшие результаты в языковом моделировании, рассуждении и поиске информации, особенно превосходя конкурентов в задачах долгого контекста.'}, 'en': {'title': 'Revolutionizing Memory Management in Language Models', 'desc': 'Gated DeltaNet-2 enhances linear attention models by introducing separate gates for erasing and writing information, which improves performance in tasks requiring long-context understanding. This model addresses the challenge of managing memory by allowing distinct control over what to forget and what to retain, thus avoiding confusion in memory associations. By utilizing channel-wise gates, Gated DeltaNet-2 effectively manages the balance between erasing old content and writing new content, leading to better results in language modeling and retrieval tasks. With 1.3 billion parameters trained on a large dataset, it outperforms previous models in various benchmarks, especially in scenarios requiring long-context retrieval.'}, 'zh': {'title': 'Gated DeltaNet-2：长上下文建模的新突破', 'desc': 'Gated DeltaNet-2 是一种改进的线性注意力模型，通过使用不同的通道门控来分离擦除和写入操作，从而在长上下文语言建模和检索任务中表现出色。它解决了传统模型在记忆编辑时的局限性，允许更灵活地控制旧内容的擦除和新内容的写入。该模型在1.3亿参数下，经过100亿个FineWeb-Edu标记的训练，取得了在语言建模、常识推理和检索任务中的最佳结果。特别是在长上下文的检索基准测试中，Gated DeltaNet-2 显示出显著的优势。'}}}, {'id': 'https://huggingface.co/papers/2605.21605', 'title': 'GenEvolve: Self-Evolving Image Generation Agents via Tool-Orchestrated Visual Experience Distillation', 'url': 'https://huggingface.co/papers/2605.21605', 'abstract': "Abstract A self-evolving image generation framework uses tool-orchestrated trajectories and visual experience distillation to improve generative capabilities through iterative learning and reference-based prompting.  AI-generated summary Open-ended image generation is no longer a simple prompt-to-image problem. High-quality generation often requires an agent to combine a model's internal generative ability with external resources. As requests become more diverse and demanding, we aim to develop a general image-generation agent that can self-evolve through trajectories and use tools more effectively across varied generation challenges. To this end, we propose GenEvolve, a self-evolving framework based on Tool-Orchestrated Visual Experience Distillation. In GenEvolve, each generation attempt is modeled as a tool-orchestrated trajectory, where the agent gathers evidence, selects references, invokes generation skills, and composes them into a prompt-reference program. Unlike existing agentic generation methods that mainly rely on image-level scalar rewards, GenEvolve compares multiple trajectories for the same request and abstracts best-worst differences into structured visual experience, provided only to a privileged teacher branch. Inspired by on-policy self-distillation, Visual Experience Distillation provides dense token-level supervision, helping the student internalize better search, knowledge activation, reference selection, and prompt construction. We further construct GenEvolve-Data and GenEvolve-Bench. Experiments on public benchmarks and GenEvolve-Bench show substantial gains over strong baselines, achieving state-of-the-art performance among current image-generation frameworks. Our website is as follows: https://ephemeral182.github.io/GenEvolve/", 'score': 10, 'issue_id': 2290, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': 'a49bfa947e9e9895', 'authors': ['Sixiang Chen', 'Zhaohu Xing', 'Tian Ye', 'Xinyu Geng', 'Yunlong Lin', 'Jianyu Lai', 'Xuanhua He', 'Fuxiang Zhai', 'Jialin Gao', 'Lei Zhu'], 'affiliations': ['Meitian', 'National University of Singapore', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.21605.jpg', 'data': {'categories': ['#agents', '#training', '#cv', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Саморазвивающийся агент генерирует изображения через опыт лучших траекторий', 'desc': 'GenEvolve — это самоэволюционирующая система для генерации изображений, которая использует оркестрацию инструментов и дистилляцию визуального опыта для улучшения качества. Агент обучается через итеративные траектории, где для каждого запроса выполняет несколько попыток, собирает доказательства и отбирает лучшие стратегии генерации. В отличие от традиционных подходов, система использует самодистилляцию по политике с плотным токен-уровневым контролем, позволяя ученической модели учиться у учительской ветви на лучше-худших различиях. Экспериментальные результаты показывают значительное улучшение производительности на бенчмарках и достижение новых значений точности в задачах генерации изображений.'}, 'en': {'title': 'GenEvolve: Evolving Image Generation through Smart Learning', 'desc': 'This paper introduces GenEvolve, a self-evolving framework for image generation that enhances generative capabilities through iterative learning. It utilizes tool-orchestrated trajectories to gather evidence and select references, allowing the agent to adaptively improve its generation skills. By employing Visual Experience Distillation, the framework provides structured supervision that helps the model refine its search and prompt construction processes. The results demonstrate significant performance improvements over existing methods, establishing GenEvolve as a leading approach in the field of image generation.'}, 'zh': {'title': '自我进化的图像生成新框架', 'desc': '本论文提出了一种自我进化的图像生成框架，名为GenEvolve。该框架通过工具协调的轨迹和视觉经验蒸馏来提升生成能力，实现迭代学习和基于参考的提示生成。与传统的图像生成方法不同，GenEvolve能够有效结合模型的内部生成能力与外部资源，适应多样化的生成需求。实验结果表明，GenEvolve在公共基准测试中表现优异，达到了当前图像生成框架的最先进水平。'}}}, {'id': 'https://huggingface.co/papers/2605.13734', 'title': 'KVServe: Service-Aware KV Cache Compression for Communication-Efficient Disaggregated LLM Serving', 'url': 'https://huggingface.co/papers/2605.13734', 'abstract': 'Abstract KVServe is a service-aware and adaptive framework for optimizing key-value communication compression in disaggregated large language model serving, achieving significant improvements in job completion time and time-to-first-token reduction through dynamic optimization.  AI-generated summary LLMs are widely adopted in production, pushing inference systems to their limits. Disaggregated LLM serving (e.g., PD separation and KV state disaggregation) improves scalability and cost efficiency, but it also turns KV into an explicit payload crossing network and storage boundaries, making KV a dominant end-to-end bottleneck. Existing KV compression are typically static runtime configurations, despite production service context varies over time in workload mix, bandwidth, and SLO/quality budgets. As a result, a fixed choice can be suboptimal or even increase latency. We present KVServe, the first service-aware and adaptive KV communication compression framework for disaggregated LLM serving: KVServe (1) unifies KV compression into a modular strategy space with new components and cross-method recomposition; (2) introduces Bayesian Profiling Engine that efficiently searches this space and distills a 3D Pareto candidate set, reducing 50times offline search overhead; and (3) deploys a Service-Aware Online Controller that combines an analytical latency model with a lightweight bandit to select profiles under constraints and correct offline-to-online mismatch. Integrated into vLLM and evaluated across datasets, models, GPUs and networks, KVServe achieves up to 9.13times JCT speedup in PD-separated serving and up to 32.8times TTFT reduction in KV-disaggregated serving.', 'score': 10, 'issue_id': 2288, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'b38fcc0baf1fc051', 'authors': ['Zedong Liu', 'Xinyang Ma', 'Dejun Luo', 'Hairui Zhao', 'Bing Lu', 'Wenjing Huang', 'Yida Gu', 'Xingchen Liu', 'Zheng Wei', 'Jinyang Liu', 'Dingwen Tao', 'Guangming Tan'], 'affiliations': ['Institute of Computing Technology, Chinese Academy of Sciences', 'Shanghai Jiao Tong University', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.13734.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Динамическая адаптация сжатия данных для быстрого обслуживания языковых моделей', 'desc': 'KVServe — это адаптивная система для оптимизации сжатия ключ-значение (KV) коммуникаций в распределённом обслуживании больших языковых моделей. Система использует байесовский профилировщик для эффективного поиска оптимальных стратегий сжатия и создания набора Парето-оптимальных решений. Во время исполнения контроллер использует аналитическую модель задержки и многорукий бандит для динамического выбора профилей сжатия в зависимости от текущей нагрузки и ограничений сервиса. Интеграция в vLLM показала улучшения в 9-32 раза в сокращении времени завершения задач и задержки до первого токена.'}, 'en': {'title': 'Dynamic Optimization for Faster LLM Serving', 'desc': 'KVServe is a novel framework designed to enhance the efficiency of key-value (KV) communication in disaggregated large language model (LLM) serving. It addresses the limitations of static KV compression methods by introducing a dynamic, service-aware approach that adapts to varying workloads and network conditions. The framework includes a Bayesian Profiling Engine for efficient optimization and a Service-Aware Online Controller that ensures optimal performance under different constraints. As a result, KVServe significantly reduces job completion time and time-to-first-token, making it a powerful tool for improving LLM inference systems.'}, 'zh': {'title': 'KVServe：智能优化键值通信的框架', 'desc': 'KVServe是一个服务感知和自适应的框架，旨在优化分离式大语言模型服务中的键值通信压缩。它通过动态优化显著提高了作业完成时间和首次令牌生成时间。该框架将键值压缩统一为模块化策略空间，并引入贝叶斯分析引擎来高效搜索该空间。KVServe在多个数据集、模型、GPU和网络上进行评估，显示出在分离式服务中可实现高达9.13倍的作业完成时间加速和高达32.8倍的首次令牌生成时间减少。'}}}, {'id': 'https://huggingface.co/papers/2605.18607', 'title': 'Forecasting Downstream Performance of LLMs With Proxy Metrics', 'url': 'https://huggingface.co/papers/2605.18607', 'abstract': "Abstract Proxy metrics based on token-level statistics from expert-written solutions provide more reliable model performance forecasting than traditional loss-based methods across multiple development stages.  AI-generated summary Progress in language model development is often driven by comparative decisions: which architecture to adopt, which pretraining corpus to use, or which training recipe to apply. Making these decisions well requires reliable performance forecasts, yet the two commonly used signals are fundamentally limited. Cross-entropy loss is poorly aligned with downstream capabilities, and direct downstream evaluation is expensive, sparse, and often uninformative at early training stages. Instead, we propose to construct proxy metrics by aggregating token-level statistics, such as entropy, top-k accuracy, and expert token rank, from a candidate model's next token distribution over expert-written solutions. Across three settings, our proxies consistently outperform loss- and compute-based baselines: 1) For cross-family model selection, they rank a heterogeneous population of reasoning models with mean Spearman Rho = 0.81 (vs. Rho = 0.36 for cross-entropy loss); 2) For pretraining data selection, they reliably rank 25 candidate corpora for a target model at roughly 10{,}000times less compute than direct evaluation, pushing the Pareto frontier beyond existing methods; and 3) for training-time forecasting, they extrapolate downstream accuracy across an 18times compute horizon with roughly half the error of existing alternatives. Together, these results suggest that expert trajectories are a broadly useful source of signal for assessing model capabilities, enabling reliable performance forecasting throughout the model development life cycle.", 'score': 8, 'issue_id': 2292, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'f0bded8a1aeb2f75', 'authors': ['Arkil Patel', 'Siva Reddy', 'Marius Mosbach', 'Dzmitry Bahdanau'], 'affiliations': ['McGill University', 'Mila Quebec AI Institute', 'ServiceNow Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.18607.jpg', 'data': {'categories': ['#benchmark', '#training'], 'emoji': '🎯', 'ru': {'title': 'Траектории экспертов как надёжный индикатор способностей моделей', 'desc': 'Исследование предлагает новый метод прогнозирования производительности языковых моделей, основанный на анализе статистик на уровне токенов из решений экспертов. Вместо традиционного кросс-энтропийного убытка и дорогостоящего прямого оценивания, авторы используют прокси-метрики, включающие энтропию, top-k точность и ранг токенов эксперта. Предложенный подход значительно превосходит базовые методы при выборе архитектур (Spearman Rho = 0.81), отборе данных предварительного обучения и прогнозировании точности на различных этапах разработки. Экспертные траектории становятся универсальным источником сигнала для оценки возможностей моделей на протяжении всего жизненного цикла разработки.'}, 'en': {'title': 'Enhancing Model Performance Forecasting with Proxy Metrics', 'desc': "This paper introduces a new way to predict the performance of language models using proxy metrics based on token-level statistics from expert-written solutions. Traditional methods, like cross-entropy loss, do not accurately reflect a model's real-world capabilities and can be inefficient. The proposed proxy metrics, which include measures like entropy and top-k accuracy, provide more reliable forecasts across different stages of model development. The results show that these metrics outperform existing methods in model selection, data selection, and training-time forecasting, making them valuable for assessing model performance."}, 'zh': {'title': '专家指标助力模型性能预测', 'desc': '本文提出了一种基于专家编写解决方案的令牌级统计的代理指标，这些指标在多个开发阶段比传统的基于损失的方法更可靠地预测模型性能。我们通过聚合令牌级统计数据，如熵、top-k 准确率和专家令牌排名，构建代理指标，以评估候选模型的下一个令牌分布。研究表明，这些代理指标在模型选择、预训练数据选择和训练时间预测等方面均优于传统方法。结果表明，专家轨迹是评估模型能力的重要信号来源，有助于在模型开发生命周期中实现可靠的性能预测。'}}}, {'id': 'https://huggingface.co/papers/2605.22144', 'title': 'One Sentence, One Drama: Personalized Short-Form Drama Generation via Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2605.22144', 'abstract': "Abstract A hierarchical multi-agent framework generates short dramas from single sentences by enforcing narrative pacing, ensuring spatial consistency, and implementing quality control through iterative refinement and reviewer loops.  AI-generated summary Existing approaches for digital short-drama production typically rely on one-shot LLM generated scripts and loosely coupled pipelines, which fail to satisfy three key requirements of short-drama generation: (1) narrative pacing, resulting in weak hooks, insufficient escalation, and unattractive endings; (2) spatial consistency, leading to drifting scene layouts and inconsistent character positions across clips; and (3) production-level quality control, requiring extensive manual review and correction across script and visual stages. We present One Sentence, One Drama, a hierarchical multi-agent framework that transforms a user's single-sentence idea into a fully produced short drama through structured intermediate modules and iterative refinement. Our approach is built upon three key components: (1) a multi-agent debate-based story generation module that enforces short-drama pacing and narrative coherence; (2) a 3D-grounded first-frame generation mechanism that establishes a shared spatial reference for consistent character positioning and scene layout across clips; and (3) multi-stage reviewer loops that perform comprehensive error detection and targeted revision across script, visual, and video generation stages. We also introduce scene-level BGM matching and scene transition planning to improve the audience's immersive experience. To systematically evaluate this task, we introduce Short-Drama-Bench, a benchmark that extends standard video quality metrics with short-drama-specific criteria. Experimental results demonstrate that our method significantly outperforms existing pipelines in narrative quality, cross-clip consistency, and overall viewing experience.", 'score': 7, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '3b43975deeb393c7', 'authors': ['Yufei Shi', 'Weilong Yan', 'Naixuan Huang', 'Yucheng Chen', 'Chenyu Zhang', 'Tao He', 'Si Yong Yeo', 'Ming Li'], 'affiliations': ['Beijing Institute of Technology', 'Guangming Laboratory', 'Lee Kong Chian School of Medicine, Nanyang Technological University', 'National University of Singapore', 'Tsinghua University', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.22144.jpg', 'data': {'categories': ['#story_generation', '#agents', '#video', '#3d', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От одного предложения к драме: иерархическая система с многоагентным контролем качества', 'desc': 'Статья представляет иерархическую многоагентную систему для создания коротких драм из одного предложения пользователя. Система использует дебаты между агентами для генерации сценария с правильным повествовательным темпом и согласованностью, 3D-ориентированное первокадровое моделирование для обеспечения пространственной консистентности персонажей и сцен, а также многоэтапные циклы рецензирования для контроля качества. Авторы также предлагают методы подбора фоновой музыки и планирования переходов между сценами для улучшения погружения зрителя.'}, 'en': {'title': 'Transforming Ideas into Engaging Short Dramas with AI', 'desc': 'This paper presents a novel hierarchical multi-agent framework called One Sentence, One Drama, which generates short dramas from a single sentence. It addresses key challenges in short-drama production, including narrative pacing, spatial consistency, and quality control, which are often overlooked in traditional methods. The framework utilizes a multi-agent debate system for coherent storytelling, a 3D-grounded mechanism for consistent scene layouts, and iterative reviewer loops for quality assurance. Additionally, it introduces a benchmark called Short-Drama-Bench to evaluate the generated dramas against specific quality metrics, showing significant improvements over existing approaches.'}, 'zh': {'title': '一句剧本，一部短剧', 'desc': '本文提出了一种层次化的多智能体框架，能够根据用户的单句想法生成完整的短剧。该框架通过结构化的中间模块和迭代优化，解决了短剧生成中的叙事节奏、空间一致性和质量控制等关键问题。具体而言，框架包括基于多智能体辩论的故事生成模块、3D基础的首帧生成机制以及多阶段的审查循环，以确保剧本和视觉效果的高质量。实验结果表明，该方法在叙事质量、跨片段一致性和整体观影体验上显著优于现有的生成管道。'}}}, {'id': 'https://huggingface.co/papers/2605.20176', 'title': 'ClinSeekAgent: Automating Multimodal Evidence Seeking for Agentic Clinical Reasoning', 'url': 'https://huggingface.co/papers/2605.20176', 'abstract': 'Abstract ClinSeekAgent is an automated agentic framework that enables large language models to actively acquire and synthesize multimodal clinical evidence from raw data sources, improving decision-making accuracy in both text-only and multimodal tasks.  AI-generated summary Large language models (LLMs) and agentic systems have shown promise for clinical decision support, but existing works largely assume that evidence has already been curated and handed to the model. Real-world clinical workflows instead require agents to actively seek, iteratively plan, and synthesize multimodal evidence from heterogeneous sources. In this paper, we introduce ClinSeekAgent, an automated agentic framework for dynamic multimodal evidence seeking that shifts the paradigm from passive evidence consumption to active evidence acquisition. Given only a clinical query and access to raw data sources, ClinSeekAgent gathers evidence by querying medical knowledge bases, navigating raw EHRs, and invoking medical imaging tools; refines its hypotheses as new information emerges; and integrates the collected evidence into grounded clinical decisions. ClinSeekAgent serves both as an inference-time agent for frontier LLMs and as a training-time pipeline for distilling high-quality agent trajectories into compact open-source models. To validate its inference-time effectiveness, we construct ClinSeek-Bench, which pairs Curated Input reasoning from fixed pre-selected evidence with Automated Evidence-Seeking over raw clinical data. On text-only EHR tasks, ClinSeekAgent improves Claude Opus 4.6 from 60.0 to 63.2 overall F1 and MiniMax M2.5 from 43.1 to 47.3, with positive risk-prediction gains in 7 out of 9 evaluated host models. On multimodal tasks, ClinSeekAgent improves Claude Opus 4.6 from 47.5 to 62.6 (+15.1); all evaluated models improve across the three CXR-related task groups. We further validate ClinSeekAgent as a training pipeline by distilling agentic evidence-seeking trajectories into ClinSeek-35B-A3B, which achieves 34.0 average F1 on existing AgentEHR-Bench, improving over its Qwen3.5-35B-A3B baseline by +11.9 points and approaching Claude Opus 4.6.', 'score': 6, 'issue_id': 2290, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'f36ae169ebd1221a', 'authors': ['Juncheng Wu', 'Letian Zhang', 'Yuhan Wang', 'Haoqin Tu', 'Hardy Chen', 'Zijun Wang', 'Cihang Xie', 'Yuyin Zhou'], 'affiliations': ['UC Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2605.20176.jpg', 'data': {'categories': ['#science', '#agents', '#training', '#healthcare', '#open_source', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🏥', 'ru': {'title': 'Активный поиск клинических доказательств через многомодальные агенты', 'desc': 'ClinSeekAgent — это автоматизированная система на основе агента, которая позволяет большим языковым моделям активно собирать и синтезировать мультимодальные клинические доказательства из первичных источников данных. Вместо пассивного использования предготовленных доказательств, агент самостоятельно запрашивает медицинские базы знаний, навигирует по электронным медицинским записям и вызывает инструменты медицинской визуализации. Система уточняет свои гипотезы по мере поступления новой информации и интегрирует собранные доказательства в обоснованные клинические решения. ClinSeekAgent улучшает качество работы фронтальных LLM и может быть использован как конвейер обучения для дистилляции траекторий агента в компактные открытые модели.'}, 'en': {'title': 'Active Evidence Acquisition for Enhanced Clinical Decision-Making', 'desc': 'ClinSeekAgent is a novel framework that empowers large language models to actively gather and synthesize clinical evidence from various raw data sources, enhancing decision-making in healthcare. Unlike traditional models that rely on pre-curated evidence, ClinSeekAgent dynamically seeks and integrates multimodal information, such as electronic health records and medical imaging. This approach allows the model to refine its hypotheses as new data is acquired, leading to more accurate clinical decisions. The framework has shown significant improvements in performance metrics across both text-only and multimodal tasks, demonstrating its effectiveness in real-world clinical applications.'}, 'zh': {'title': '主动获取临床证据的智能框架', 'desc': 'ClinSeekAgent 是一个自动化的智能框架，能够从原始数据源中主动获取和综合多模态临床证据，从而提高文本和多模态任务的决策准确性。与以往假设证据已被整理的模型不同，ClinSeekAgent 允许代理主动寻找、迭代规划和整合来自异构来源的证据。该框架通过查询医学知识库、导航原始电子健康记录（EHR）和调用医学影像工具来收集证据，并随着新信息的出现不断完善假设。ClinSeekAgent 不仅在推理时作为前沿大型语言模型的代理，还作为训练时的管道，将高质量的代理轨迹提炼成紧凑的开源模型。'}}}, {'id': 'https://huggingface.co/papers/2605.22678', 'title': 'Swift Sampling: Selecting Temporal Surprises via Taylor Series', 'url': 'https://huggingface.co/papers/2605.22678', 'abstract': "Abstract Swift Sampling is a training-free frame selection algorithm that identifies high-information video moments by analyzing deviations from predicted visual feature trajectories in latent space.  AI-generated summary While most frames in long-form video are redundant, the critical information resides in temporal surprises: moments where the actual visual features deviate from their predicted evolution. Inspired by the human brain's predictive coding, we introduce Swift Sampling, an elegant, training-free frame selection algorithm that automatically identifies high-information moments in a video. Specifically, we model a video as a differentiable trajectory in the visual latent space and compute the velocity and acceleration of its features. Then, we apply Taylor expansion to project the expected path of subsequent frames. Frames that diverge sharply from this predicted manifold are identified as temporally surprising frames and selected for sampling. Unlike prior training-free methods that rely on auxiliary networks or video-specific hyperparameter tuning, Swift Sampling is incredibly lightweight, adding only 0.02x additional computational cost over baseline making it 30x cheaper overhead than leading baselines. Across three long-video question answering benchmarks and 10 different downstream tasks, Swift Sampling outperforms uniform sampling and prior query-agnostic baselines. It is especially powerful for long videos with limited frame budgets improving accuracy by up to +12.5 points.", 'score': 5, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'd79560da5d30ac5d', 'authors': ['Dahye Kim', 'Bhuvan Sachdeva', 'Karan Uppal', 'Naman Gupta', 'Vineeth N. Balasubramanian', 'Deepti Ghadiyaram'], 'affiliations': ['Boston University', 'Microsoft Research India'], 'pdf_title_img': 'assets/pdf/title_img/2605.22678.jpg', 'data': {'categories': ['#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Умный отбор кадров видео через анализ предсказательных ошибок', 'desc': 'В статье предлагается Swift Sampling — алгоритм выбора кадров без обучения, который выявляет информативные моменты в видео, анализируя отклонения визуальных признаков от их предсказанных траекторий в скрытом пространстве. Метод использует принцип предсказательного кодирования мозга и строит дифференцируемую траекторию видео в пространстве признаков, вычисляя скорость и ускорение изменений. Алгоритм применяет разложение Тейлора для прогнозирования ожидаемого пути последующих кадров и отбирает те, которые сильно отклоняются от предсказанного многообразия. Swift Sampling является легким методом с минимальными вычислительными затратами (0.02x от базовой стоимости) и значительно превосходит равномерную выборку кадров на задачах ответов на вопросы о видео.'}, 'en': {'title': 'Swift Sampling: Capturing the Surprises in Video Moments', 'desc': 'Swift Sampling is a novel algorithm designed for selecting important frames from long videos without the need for prior training. It focuses on identifying moments where the actual visual features significantly deviate from what was predicted, highlighting these as high-information moments. By modeling video as a trajectory in latent space and using Taylor expansion, the algorithm efficiently predicts the expected visual path and selects frames that are temporally surprising. This method is computationally efficient, requiring minimal additional resources while outperforming existing sampling techniques in various tasks.'}, 'zh': {'title': '高效视频帧选择的创新算法', 'desc': 'Swift Sampling是一种无训练的帧选择算法，通过分析潜在空间中预测的视觉特征轨迹的偏差，识别出高信息量的视频时刻。大多数长视频帧是冗余的，关键的信息存在于时间上的惊喜时刻，即实际视觉特征与预测演变的偏差。该算法模拟视频在视觉潜在空间中的可微分轨迹，计算特征的速度和加速度，并使用泰勒展开预测后续帧的期望路径。与以往依赖辅助网络或视频特定超参数调整的无训练方法不同，Swift Sampling极其轻量，仅增加0.02倍的计算成本，且在多个长视频问答基准和下游任务中表现优异。'}}}, {'id': 'https://huggingface.co/papers/2605.22138', 'title': 'Efficient Agentic Reasoning Through Self-Regulated Simulative Planning', 'url': 'https://huggingface.co/papers/2605.22138', 'abstract': "Abstract Efficient agentic reasoning requires decomposing decision-making into three systems—simulative reasoning, self-regulation, and reactive execution—enabling controlled planning that reduces token usage while maintaining performance.  AI-generated summary How should an agent decide when and how to plan? A dominant approach builds agents as reactive policies with adaptive computation (e.g., chain-of-thought), trained end-to-end expecting planning to emerge implicitly. Without control over the presence, structure, or horizon of planning, these systems dramatically increase reasoning length, yielding inefficient token use without reliable accuracy gains. We argue efficient agentic reasoning benefits from decomposing decision-making into three systems: simulative reasoning (System II) grounding deliberation in future-state prediction via a world model; self-regulation (System III) deciding when and how deeply to plan via a learned configurator; and reactive execution (System I) handling fine-grained action. Simulative reasoning provides unified planning across diverse tasks without per-domain engineering, while self-regulation ensures the planner is invoked only when needed. To test this, we develop SR^2AM (Self-Regulated Simulative Reasoning Agentic LLM), realizing both as distinct stages within an LLM's chain-of-thought, with the LLM as world model. We explore two instantiations: recording decisions from a prompted multi-module system (v0.1) and reconstructing structured plans from traces of pretrained reasoning LLMs (v1.0), trained via supervised then reinforcement learning (RL). Across math, science, tabular analysis, and web information seeking, v0.1-8B and v1.0-30B achieve Pass@1 competitive with 120-355B and 685B-1T parameter systems respectively, while v1.0-30B uses 25.8-95.3% fewer reasoning tokens than comparable agentic LLMs. RL increases average planning horizon by 22.8% while planning frequency grows only 2.0%, showing it learns to plan further ahead rather than more often. More broadly, learned self-regulation instantiates a principle we expect to extend beyond planning to how agents govern their own learning and adaptation.", 'score': 4, 'issue_id': 2292, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '86f354ebc7530bc4', 'authors': ['Mingkai Deng', 'Jinyu Hou', 'Lara Sá Neves', 'Varad Pimpalkhute', 'Taylor W. Killian', 'Zhengzhong Liu', 'Eric P. Xing'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22138.jpg', 'data': {'categories': ['#training', '#optimization', '#reasoning', '#agents', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Управляемое планирование: как агент решает, когда думать', 'desc': 'Статья описывает SR²AM — систему для эффективного рассуждения агентов, основанную на разделении принятия решений на три компоненты: симуляционное рассуждение (предсказание будущих состояний через модель мира), саморегуляция (решение о необходимости планирования) и реактивное исполнение (выполнение действий). Предложенный подход позволяет значительно снизить использование токенов при решении задач математики, науки и поиска информации, благодаря тому, что планирование активируется только когда это необходимо. Модель размером 30B параметров достигает качества систем с 685B-1T параметров, используя на 25.8-95.3% меньше токенов рассуждения. Обучение с подкреплением показало, что система научилась планировать более глубоко (на 22.8%), а не чаще (только 2.0% прироста частоты).'}, 'en': {'title': 'Efficient Decision-Making through Decomposed Agentic Reasoning', 'desc': 'This paper presents a new approach to agentic reasoning in AI by breaking down decision-making into three distinct systems: simulative reasoning, self-regulation, and reactive execution. Simulative reasoning uses a world model to predict future states, allowing for effective planning without extensive domain-specific adjustments. Self-regulation determines when and how deeply to engage in planning, optimizing the use of computational resources. The proposed SR^2AM model demonstrates significant efficiency improvements in reasoning token usage while maintaining competitive performance across various tasks.'}, 'zh': {'title': '高效智能体推理的三大系统', 'desc': '本论文提出了一种高效的智能体推理方法，将决策过程分解为三大系统：模拟推理、自我调节和反应执行。这种分解使得规划过程更加可控，减少了计算资源的使用，同时保持了性能。通过开发SR^2AM模型，研究者展示了如何在大型语言模型中实现这三种系统的独立阶段。实验结果表明，该方法在多个任务上表现出色，显著降低了推理所需的计算量。'}}}, {'id': 'https://huggingface.co/papers/2605.22538', 'title': 'Segment Anything with Motion, Geometry, and Semantic Adaptation for Complex Nonlinear Visual Object Tracking', 'url': 'https://huggingface.co/papers/2605.22538', 'abstract': 'Abstract SAMOSA adapts SAM 2 for visual object tracking by incorporating motion prediction, semantic detection, and geometric constraints to improve robustness and generalization in complex scenarios.  AI-generated summary Traditional visual object tracking (VOT) methods typically rely on task-specific supervised training, limiting their generalization to unseen objects and challenging scenarios with distractors, occlusion, and nonlinear motion. Recent vision foundation models, exemplified by SAM 2, learn strong video understanding priors from large-scale pretraining and offer a promising foundation for building more robust and generalizable trackers. However, directly applying SAM 2 to VOT remains suboptimal, as it does not explicitly model target motion dynamics or enforce geometric and semantic consistency across frames, both of which are essential for reliable tracking. To address this issue, we propose SAMOSA, a new tracking framework that adapts SAM 2 to complex VOT scenarios by explicitly leveraging motion, geometry, and semantic cues. Specifically, we introduce a lightweight nonlinear motion predictor to model target dynamics and guide mask selection as well as memory filtering. We further exploit semantic cues to detect target shifts and recover from tracking failures, while geometric cues are incorporated as structural constraints to improve tracking stability. In this way, SAMOSA bridges the gap between the implicit video understanding prior of SAM 2 and explicit tracking-oriented modeling. Extensive experiments show that SAMOSA consistently outperforms state-of-the-art SAM 2--based approaches on general benchmarks, demonstrates stronger generalization than supervised VOT methods, and achieves substantial gains on anti-UAV datasets, which typify complex nonlinear motion scenarios. Our code is available at https://github.com/DurYi/SAMOSA.', 'score': 4, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '2850ca5d03da1e87', 'authors': ['Deyi Zhu', 'Yuji Wang', 'Yong Liu', 'Yansong Tang', 'Bingyao Yu', 'Jiwen Lu', 'Jie Zhou'], 'affiliations': ['Department of Automation, Tsinghua University, Beijing 100084, China', 'Shenzhen International Graduate School, Tsinghua University, Shenzhen 518055, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.22538.jpg', 'data': {'categories': ['#video', '#benchmark', '#cv'], 'emoji': '🎯', 'ru': {'title': 'Адаптация фундаментальной модели к отслеживанию объектов через движение и геометрию', 'desc': 'SAMOSA адаптирует фундаментальную модель SAM 2 для задачи визуального отслеживания объектов, добавляя предсказание движения, семантическую детекцию и геометрические ограничения. Метод решает проблему недостаточной обобщаемости традиционных supervised подходов, которые плохо работают на новых объектах и в сложных сценариях с окклюзией и нелинейным движением. Авторы внедрили легкий нелинейный предсказатель движения для моделирования динамики целевого объекта и фильтрации памяти, а также используют семантические и геометрические сигналы для повышения стабильности трекинга. Экспериментальные результаты показывают превосходство SAMOSA над другими подходами на основе SAM 2, с особыми достижениями в сценариях с нелинейным движением.'}, 'en': {'title': 'SAMOSA: Bridging Motion and Geometry for Robust Object Tracking', 'desc': 'SAMOSA enhances the SAM 2 model for visual object tracking by integrating motion prediction, semantic detection, and geometric constraints. Traditional tracking methods struggle with generalization due to their reliance on supervised training, especially in complex scenarios with occlusions and distractions. SAMOSA addresses these limitations by explicitly modeling target motion dynamics and ensuring consistency across frames using semantic and geometric information. The framework demonstrates superior performance over existing methods, particularly in challenging environments, showcasing its robustness and adaptability.'}, 'zh': {'title': 'SAMOSA：提升视觉目标跟踪的鲁棒性与泛化能力', 'desc': 'SAMOSA是一个新的视觉目标跟踪框架，它通过结合运动预测、语义检测和几何约束来改进传统的跟踪方法。与传统的监督学习方法不同，SAMOSA利用了SAM 2的强大视频理解能力，增强了在复杂场景中的鲁棒性和泛化能力。该框架引入了轻量级的非线性运动预测器，以建模目标动态并指导掩膜选择和记忆过滤。实验结果表明，SAMOSA在多个基准测试中表现优于现有的最先进方法，并在复杂的非线性运动场景中取得了显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.22766', 'title': 'Diversed Model Discovery via Structured Table Discovery', 'url': 'https://huggingface.co/papers/2605.22766', 'abstract': 'Abstract Model search system that combines semantic and structured table-based retrieval to improve diversity and coverage of recommended models.  AI-generated summary Model cards describe model behavior through a mixture of textual descriptions and structured artifacts, including performance, configuration, and dataset tables. Existing model search systems rely predominantly on semantic similarity over text, which can produce homogeneous result sets and limit exploration of alternatives. We argue that model search is inherently comparative: users want models that are task-aligned yet differentiated in measurable ways. We hypothesize that this balance requires retrieval over condensed, high-quality evidence rather than verbose descriptions, and much of that evidence is concentrated in structured tables. We present StructuredSemanticSearch, a table-driven model search framework built on the ModelTables benchmark. Given a query, StructuredSemanticSearch combines a semantic baseline for task alignment with a structure-aware pipeline that discovers query-related model-card tables using table discovery operators such as unionability, joinability, and keyword search. Retrieved tables are mapped back to model cards under a controlled top-k budget, enabling fair comparison between text-based and table-based retrieval. Beyond retrieval, StructuredSemanticSearch adapts table integration to the model-table domain through orientation-aware integration, producing compact integrated views of tables from partially overlapping and sometimes transposed evidence tables. For evaluation, we introduce a nugget-based, auditable protocol that extracts compact evidence items from model cards, matches queries to condition- or intent-specific nuggets, and measures evidence coverage and diversity over retrieved model-card candidate sets. This protocol also provides a scalable path toward approximate, evidence-based labeling in dynamic model lakes. Experiments on 597 model-recommendation queries show improved nugget coverage for the structure-aware pipeline than semantic baseline', 'score': 4, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '1e87f1faeaa3e3bd', 'authors': ['Zhengyuan Dong', 'Renée J. Miller'], 'affiliations': ['University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2605.22766.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Структурированный поиск моделей через таблицы и семантику', 'desc': 'В статье представлена система поиска моделей машинного обучения StructuredSemanticSearch, которая объединяет семантический поиск с анализом структурированных таблиц из карточек моделей. Авторы утверждают, что поиск моделей требует сбалансированного подхода: результаты должны соответствовать задаче пользователя и одновременно предлагать разнообразные альтернативы, отличающиеся измеримыми характеристиками. Система использует операторы обнаружения таблиц (unionability, joinability, keyword search) и интеграцию таблиц с учётом их ориентации для создания компактных представлений доказательств. Для оценки качества введён протокол на основе выделения информационных элементов (nuggets), измеряющий охват и разнообразие доказательств в наборе рекомендуемых моделей.'}, 'en': {'title': 'Enhancing Model Search with Structured Semantic Retrieval', 'desc': "This paper introduces StructuredSemanticSearch, a novel model search system that enhances the diversity and coverage of recommended models by integrating semantic and structured table-based retrieval methods. The authors argue that traditional model search systems, which primarily focus on semantic similarity, often yield similar results and limit users' exploration of different models. By utilizing structured tables that contain condensed, high-quality evidence about model performance and configurations, the proposed system allows for more effective comparisons between models. The evaluation protocol developed in this study measures the coverage and diversity of retrieved models, demonstrating that the structured approach significantly outperforms traditional semantic methods."}, 'zh': {'title': '提升模型推荐多样性的结构化检索系统', 'desc': '本论文提出了一种结合语义和结构化表格检索的模型搜索系统，以提高推荐模型的多样性和覆盖率。我们认为模型搜索本质上是比较性的，用户希望找到与任务对齐但在可测量方面有所区别的模型。我们提出的StructuredSemanticSearch框架利用结构化表格来发现与查询相关的模型卡信息，并通过控制预算实现文本和表格检索的公平比较。实验结果表明，结构感知的检索管道在模型推荐查询中比传统的语义基线具有更好的信息覆盖率。'}}}, {'id': 'https://huggingface.co/papers/2605.22581', 'title': 'SceneAligner: 3D-Grounded Floorplan Localization in the Wild', 'url': 'https://huggingface.co/papers/2605.22581', 'abstract': 'Abstract Deep learning approach for floorplan localization that uses 3D scene reconstruction and cross-modal correspondence learning to work in real-world environments with limited data.  AI-generated summary Many public buildings provide floorplans with a "you are here" indicator to help visitors orient themselves. Floorplan localization seeks to computationally replicate this capability by determining where visual observations were captured within a floorplan. However, existing methods typically assume controlled small-scale environments and precise vectorized floorplans, limiting their ability to operate in large-scale buildings and rasterized floorplans. In this work, we present an approach for performing floorplan localization in the wild by grounding the task in a reconstructed 3D representation of the scene. Given an unconstrained image collection, our method reconstructs a gravity-aligned 3D scene and projects it into a 2D density map that serves as a floorplan proxy. Floorplan localization is then formulated as aligning this proxy with the input floorplan via a 2D similarity transform. To bridge the appearance gap between density maps and architectural floorplans, we adapt a 2D foundation model to learn cross-modal correspondences, introducing a fine-tuning scheme that encourages semantically aligned matches while preserving structural consistency. Extensive experiments demonstrate substantial improvements over prior methods, including in extremely sparse settings with as little as a single input image. Our code and data will be publicly available.', 'score': 3, 'issue_id': 2290, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'a83927d4dd195612', 'authors': ['Junhyeong Cho', 'Ruojin Cai', 'Hadar Averbuch-Elor'], 'affiliations': ['Cornell University', 'Kempner Institute, Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22581.jpg', 'data': {'categories': ['#cv', '#3d', '#dataset', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'Локализация на планах этажей через 3D реконструкцию и кросс-модальное обучение', 'desc': 'Статья представляет метод глубокого обучения для локализации на планах этажей, который использует реконструкцию 3D сцены из неупорядоченной коллекции изображений. Авторы проецируют восстановленную 3D сцену в 2D карту плотности, которая служит заменителем плана этажа, и выравнивают её с исходным планом через 2D трансформацию подобия. Для преодоления разрыва между внешним видом карт плотности и архитектурными планами используется адаптированная foundation model для изучения кросс-модальных соответствий между модальностями. Метод показывает значительные улучшения, работая даже в экстремально разреженных условиях с одним входным изображением.'}, 'en': {'title': 'Revolutionizing Floorplan Localization with 3D Scene Reconstruction', 'desc': 'This paper presents a novel deep learning method for floorplan localization that operates effectively in real-world environments with limited data. The approach involves reconstructing a 3D scene from a collection of images and creating a 2D density map that acts as a proxy for the floorplan. By aligning this density map with the actual floorplan using a 2D similarity transform, the method addresses the challenges posed by rasterized floorplans and large-scale buildings. Additionally, a cross-modal correspondence learning technique is employed to enhance the alignment between the density map and the floorplan, achieving significant improvements over existing localization methods.'}, 'zh': {'title': '在真实环境中实现平面图定位的深度学习方法', 'desc': '本文提出了一种深度学习方法，用于在真实环境中进行平面图定位，结合了3D场景重建和跨模态对应学习。该方法能够在有限数据的情况下，通过重建重力对齐的3D场景，将其投影到2D密度图上，作为平面图的代理。平面图定位被定义为将该代理与输入的平面图进行2D相似变换对齐。实验结果表明，该方法在极其稀疏的情况下也能显著提高定位精度，甚至只需一张输入图像。'}}}, {'id': 'https://huggingface.co/papers/2605.22344', 'title': 'Bernini: Latent Semantic Planning for Video Diffusion', 'url': 'https://huggingface.co/papers/2605.22344', 'abstract': "Abstract A unified video generation and editing framework combines multimodal large language models for semantic planning with diffusion models for pixel rendering, achieving state-of-the-art performance through semantic interface separation and enhanced positional embeddings.  AI-generated summary Multimodal large language models (MLLMs) and diffusion models have each reached remarkable maturity: MLLMs excel at reasoning over heterogeneous multimodal inputs with strong semantic grounding, while diffusion models synthesize images and videos with photorealistic fidelity. We argue that these two families can be unified through a simple division of labor: MLLMs perform semantic planning, while diffusion models render pixels from high-level semantic guidance and low-level visual features. Building on this idea, we propose Bernini, a unified framework for video generation and editing. An MLLM-based planner predicts the target semantic representation directly in the ViT embedding space, and a DiT-based renderer synthesizes pixels conditioned on this plan, augmented by text features and, for editing, source VAE features for detail preservation. Because semantics serve as the interface, the planner and renderer can be trained separately and only lightly co-trained, preserving the pretrained strengths of both components while keeping training efficient. To better handle multiple visual inputs, we introduce Segment-Aware 3D Rotary Positional Embedding (SA-3D RoPE), and further incorporate chain-of-thought reasoning in the planner to better transfer understanding into generation. Bernini achieves state-of-the-art performance across a wide range of video generation and editing benchmarks, with the MLLM's pretrained understanding translating into strong generalization on challenging editing tasks.", 'score': 3, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '439203c7c0a0445a', 'authors': ['Bernini Team', 'Chenchen Liu', 'Junyi Chen', 'Lei Li', 'Lu Chi', 'Mingzhen Sun', 'Zhuoying Li', 'Yi Fu', 'Ruoyu Guo', 'Yiheng Wu', 'Ge Bai', 'Zehuan Yuan'], 'affiliations': ['Bytedance'], 'pdf_title_img': 'assets/pdf/title_img/2605.22344.jpg', 'data': {'categories': ['#training', '#transfer_learning', '#diffusion', '#reasoning', '#architecture', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Видео из смысла: разделение труда между семантикой и пикселями', 'desc': 'Предложена объединённая система Bernini для генерации и редактирования видео, которая разделяет задачи между мультимодальной большой языковой моделью (MLLM) и диффузионной моделью. MLLM выполняет семантическое планирование, предсказывая целевое представление в пространстве эмбеддингов ViT, а DiT-основанный рендерер синтезирует пиксели на основе этого плана с учётом текстовых и визуальных признаков. Разделение на семантический интерфейс позволяет обучать компоненты отдельно, сохраняя предобученные качества обеих моделей и повышая эффективность обучения. Введено улучшенное позиционное кодирование SA-3D RoPE для лучшей обработки множественных визуальных входов, что обеспечивает достижение лучших результатов на бенчмарках по генерации и редактированию видео.'}, 'en': {'title': 'Unifying Semantic Planning and Pixel Rendering for Video Mastery', 'desc': 'This paper presents Bernini, a unified framework for video generation and editing that leverages multimodal large language models (MLLMs) for semantic planning and diffusion models for pixel rendering. The framework separates the tasks of high-level semantic understanding and low-level visual synthesis, allowing each model to excel in its domain. By using enhanced positional embeddings and a novel approach to training, Bernini achieves state-of-the-art performance in generating and editing videos. The integration of chain-of-thought reasoning in the MLLM enhances its ability to guide the rendering process, resulting in improved generalization across various tasks.'}, 'zh': {'title': '统一视频生成与编辑的创新框架', 'desc': '这篇论文提出了一个统一的视频生成和编辑框架，结合了多模态大语言模型（MLLMs）和扩散模型。MLLMs擅长处理多种输入的语义规划，而扩散模型则能够生成高质量的图像和视频。通过将这两者分工合作，MLLMs负责语义规划，扩散模型则根据高层语义指导和低层视觉特征进行像素渲染。该框架名为Bernini，能够在视频生成和编辑任务中实现最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.22535', 'title': 'TerminalWorld: Benchmarking Agents on Real-World Terminal Tasks', 'url': 'https://huggingface.co/papers/2605.22535', 'abstract': 'Abstract  We introduce TerminalWorld, a scalable data engine that automatically reverse-engineers high-fidelity evaluation tasks from "in-the-wild" terminal recordings. Processing 80,870 terminal recordings, the engine yields a full benchmark of 1,530 validated tasks, spanning 18 real-world categories, ranging from short everyday operations to workflows exceeding 50 steps, and covering 1,280 unique commands. From these, we curate a Verified subset of 200 representative, manually reviewed tasks. Comprehensive benchmarking on TerminalWorld-Verified across eight frontier models and six agents reveals that current systems still struggle with authentic terminal workflows, achieving a maximum pass rate of only 62.5%. Moreover, TerminalWorld captures real-world terminal capabilities distinct from existing expert-curated benchmarks (e.g., Terminal-Bench), with only a weak correlation to their scores (Pearson r=0.20). The automated engine makes TerminalWorld authentic and scalable by construction, enabling it to evaluate agents in real-world terminal environments as developer practices evolve. Data and code are available at https://github.com/EuniAI/TerminalWorld.', 'score': 3, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'd1d8dd2c706cba2b', 'authors': ['Zhaoyang Chu', 'Jiarui Hu', 'Xingyu Jiang', 'Pengyu Zou', 'Han Li', 'Chao Peng', "Peter O'Hearn", 'Earl T. Barr', 'Mark Harman', 'Federica Sarro', 'He Ye'], 'affiliations': ['Nanjing University', 'Tencent', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2605.22535.jpg', 'data': {'categories': [], 'emoji': '⌨️', 'ru': {'title': 'От реальных логов — к честному тестированию терминальных агентов', 'desc': 'Авторы представляют TerminalWorld — автоматизированный движок для создания бенчмарков из реальных записей терминала. На основе анализа более 80 тысяч записей было сформировано 1530 валидированных задач, охватывающих 1280 уникальных команд из 18 категорий реальных сценариев. Тестирование восьми передовых моделей и шести агентов показало, что существующие системы справляются с аутентичными терминальными рабочими процессами лишь на 62.5% в лучшем случае. TerminalWorld отличается от экспертных бенчмарков своей масштабируемостью и близостью к реальным практикам разработки, позволяя оценивать способности AI-агентов в естественных условиях.'}, 'en': {'title': 'Revolutionizing Terminal Evaluation with TerminalWorld', 'desc': 'TerminalWorld is a new data engine designed to create realistic evaluation tasks from actual terminal recordings. It processes a large dataset of terminal interactions to generate a comprehensive benchmark of tasks that reflect real-world usage. The study shows that current machine learning models struggle with these tasks, achieving a maximum success rate of only 62.5%. By providing a scalable and authentic evaluation framework, TerminalWorld helps improve the assessment of AI agents in terminal environments as they adapt to changing developer practices.'}, 'zh': {'title': 'TerminalWorld：真实终端评估的创新引擎', 'desc': '我们介绍了TerminalWorld，这是一个可扩展的数据引擎，能够自动从真实的终端录音中反向工程高保真评估任务。该引擎处理了80,870个终端录音，生成了1,530个经过验证的任务基准，涵盖18个真实世界的类别，包括日常操作和超过50个步骤的工作流程。我们从中筛选出200个经过人工审核的代表性任务。全面的基准测试显示，当前系统在真实终端工作流程中仍然面临挑战，最高通过率仅为62.5%。'}}}, {'id': 'https://huggingface.co/papers/2605.17602', 'title': 'AutoRubric-T2I: Robust Rule-Based Reward Model for Text-to-Image Alignment', 'url': 'https://huggingface.co/papers/2605.17602', 'abstract': 'Abstract AutoRubric-T2I automatically generates and selects explicit rubrics to guide Vision-Language Model judges for text-to-image generation, achieving high-quality reward signals with minimal human annotation while improving generation quality in downstream tasks.  AI-generated summary Aligning Text-to-Image (T2I) generation models with human preferences increasingly relies on image reward models that score or rank generated images according to prompt alignment and perceptual quality. Existing reward models are commonly trained as Bradley-Terry (BT) preference models on large-scale human preference corpora, making them costly to train, difficult to adapt, and opaque in their evaluation criteria. Meanwhile, Vision-Language Model (VLM) judges can provide more fine-grained assessments through textual rubrics, but their manually designed or heuristically generated scoring rules may fail to reliably reflect human preferences. In this paper, we propose AutoRubric-T2I, the first rubric learning framework in T2I that automatically synthesizes and selects explicit rubrics for guiding VLM judges. AutoRubric-T2I first synthesizes reasoning traces from preference pairs into candidate rubrics, then uses a VLM judge to score paired images under each rubric, producing pairwise rubric-score differences for preference learning. To remove noisy and redundant rules, we further employ a ell_1-Regularized Logistic Regression Refiner, which selects the Top-N most discriminative rubrics. Extensive evaluations show that AutoRubric-T2I produces high-quality, interpretable reward signals using less than 0.01% of the annotated preference data, substantially reducing the need for large-scale reward-model training. On image reward benchmarks such as MMRB2, AutoRubric-T2I outperforms strong reward model baselines. We further validate AutoRubric-T2I as an RL reward on downstream T2I tasks, including TIIF and UniGenBench++, where it improves generation quality over scalar reward models using the Flow-GRPO pipeline on diffusion models.', 'score': 3, 'issue_id': 2294, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': 'daf8b21bf4569035', 'authors': ['Kuei-Chun Kao', 'Daixuan Huo', 'Yuanhao Ban', 'Cho-Jui Hsieh'], 'affiliations': ['Arena', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.17602.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#rl', '#benchmark', '#alignment', '#interpretability', '#training'], 'emoji': '📋', 'ru': {'title': 'Автоматические рубрики вместо дорогостоящего обучения на человеческих предпочтениях', 'desc': 'AutoRubric-T2I — это первая система для автоматического создания и отбора рубрик, которые направляют Vision-Language модели при оценке изображений, генерируемых по текстовому описанию. Система синтезирует кандидатов на рубрики из предпочтений человека и использует регуляризованную логистическую регрессию для выбора самых информативных критериев оценки. Предложенный подход требует менее 0.01% от обычного объёма аннотированных данных, значительно снижая затраты на обучение функций вознаграждения. Эксперименты показывают, что интерпретируемые сигналы вознаграждения от AutoRubric-T2I улучшают качество генерации изображений в задачах downstream.'}, 'en': {'title': 'Automating Rubric Generation for Better Image Evaluation', 'desc': 'AutoRubric-T2I is a novel framework that automates the creation and selection of rubrics to assist Vision-Language Model (VLM) judges in evaluating text-to-image (T2I) generation. By synthesizing reasoning traces from preference pairs, it generates candidate rubrics and uses VLM judges to score images based on these rubrics, leading to more accurate preference learning. The framework employs a logistic regression method to refine and select the most effective rubrics, significantly reducing the reliance on extensive human-annotated data. Evaluations demonstrate that AutoRubric-T2I not only enhances the quality of reward signals but also improves T2I generation tasks compared to traditional reward models.'}, 'zh': {'title': '自动评分标准提升图像生成质量', 'desc': 'AutoRubric-T2I 是一种自动生成和选择评分标准的框架，旨在指导视觉-语言模型（VLM）评估文本到图像生成的质量。该方法通过合成偏好对的推理轨迹生成候选评分标准，并利用 VLM 对图像进行评分，从而实现高质量的奖励信号。与传统的奖励模型相比，AutoRubric-T2I 只需极少的人类标注数据，显著降低了大规模训练的需求。实验结果表明，该框架在图像奖励基准测试中表现优异，提升了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2605.12817', 'title': 'Training Large Language Models to Predict Clinical Events', 'url': 'https://huggingface.co/papers/2605.12817', 'abstract': 'Abstract Longitudinal clinical notes are converted into temporal prediction examples using Foresight Learning, enabling improved clinical prediction through LoRA adaptation that enhances calibration and reduces uncertainty compared to base models.  AI-generated summary Longitudinal clinical notes contain rich evidence of how patients evolve over time, but converting this signal into training supervision for clinical prediction remains challenging. We extend Foresight Learning to clinical prediction by converting time-ordered MIMIC-III notes into examples consisting of past patient context, a natural-language question about a possible future event, and a label resolved from later documentation. This process yields 6,900 prediction examples from 702 admissions across medications, procedures, organ support, microbiology, and mortality. A small LoRA adapter trained on these examples improves over the prompted base model, reducing expected calibration error from 0.1269 to 0.0398 and Brier score from 0.199 to 0.145, while slightly outperforming GPT-5 point estimates on held-out questions. The approach enables reusable clinical prediction supervision from longitudinal notes without hand-engineered structured features or endpoint-specific classifiers.', 'score': 3, 'issue_id': 2290, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'ebd7163884bcbe14', 'authors': ['Benjamin Turtel', 'Paul Wilczewski', 'Kris Skotheim'], 'affiliations': ['Lightning Rod Labs'], 'pdf_title_img': 'assets/pdf/title_img/2605.12817.jpg', 'data': {'categories': [], 'emoji': '🔮', 'ru': {'title': 'Предсказание будущих событий пациента из продольных клинических записей', 'desc': 'В статье предложен метод Foresight Learning для преобразования продольных клинических заметок в примеры для обучения моделей прогнозированию. Авторы конвертируют заметки пациентов из базы MIMIC-III в примеры, содержащие контекст пациента, вопрос о будущем событии и метку из последующей документации. Небольшой LoRA-адаптер, обученный на этих примерах, значительно улучшает калибровку модели и снижает неопределённость предсказаний. Подход позволяет создавать супервизию для клинических предсказаний без ручного конструирования признаков и специализированных классификаторов.'}, 'en': {'title': 'Transforming Clinical Notes into Predictive Insights', 'desc': 'This paper presents a method called Foresight Learning to transform longitudinal clinical notes into temporal prediction examples for better clinical predictions. By using time-ordered notes from the MIMIC-III database, the authors create training examples that include past patient information and questions about future events. They apply a small LoRA adapter to these examples, which significantly improves model performance by reducing calibration error and Brier score. This approach allows for effective clinical predictions without the need for manually crafted features or specific classifiers.'}, 'zh': {'title': '前瞻学习：提升临床预测的创新方法', 'desc': '本研究提出了一种将纵向临床记录转换为时间预测示例的方法，称为前瞻学习（Foresight Learning）。通过这种方法，可以将患者的历史信息与未来事件的自然语言问题结合，生成用于临床预测的训练示例。研究中使用了MIMIC-III数据库的记录，生成了6900个预测示例，并通过小型LoRA适配器进行训练，显著提高了模型的校准性和减少了不确定性。该方法无需手动设计结构化特征或特定于终点的分类器，便于从纵向记录中重用临床预测监督。'}}}, {'id': 'https://huggingface.co/papers/2605.22074', 'title': 'From Reasoning Chains to Verifiable Subproblems: Curriculum Reinforcement Learning Enables Credit Assignment for LLM Reasoning', 'url': 'https://huggingface.co/papers/2605.22074', 'abstract': 'Abstract SCRL addresses inefficiencies in reinforcement learning from verifiable rewards by using subproblem-level normalization for finer credit assignment and curriculum learning, improving mathematical reasoning performance on challenging benchmarks.  AI-generated summary Reinforcement learning from verifiable rewards (RLVR) has shown strong promise for LLM reasoning, but outcome-based RLVR remains inefficient on hard problems because correct final-answer rollouts are rare and sample-level credit assignment cannot use partial progress in failed attempts. We introduce SCRL (Subproblem Curriculum Reinforcement Learning), a curriculum RL framework that derives verifiable subproblems from reference reasoning chains and fixes the final subproblem as the original problem. This turns partial progress on hard problems into verifiable learning signals. Algorithmically, SCRL uses subproblem-level normalization, which normalizes rewards independently at each subproblem position and assigns the resulting advantages to the corresponding answer spans, enabling finer-grained credit assignment without external rubrics or reward models. Our analysis shows that subproblem curricula lift hard problems out of gradient dead zones, with larger relative gains as the original problem becomes harder. Across seven mathematical reasoning benchmarks, SCRL outperforms strong curriculum-learning baselines, improving average accuracy over GRPO by +4.1 points on Qwen3-4B-Base and +1.9 points on Qwen3-14B-Base. On AIME24, AIME25, and IMO-Bench, SCRL further improves pass@1 by +3.7 points and pass@64 by +4.6 points on Qwen3-4B-Base, indicating better exploration on hard reasoning problems.', 'score': 2, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '9f2e8eaa5fa01da3', 'authors': ['Xitai Jiang', 'Zihan Tang', 'Wenze Lin', 'Yang Yue', 'Shenzhi Wang', 'Gao Huang'], 'affiliations': ['LeapLab, Tsinghua University', 'Qiuzhen College, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22074.jpg', 'data': {'categories': ['#small_models', '#math', '#training', '#rl'], 'emoji': '🎓', 'ru': {'title': 'От целого к частям: как разложение задач улучшает обучение рассуждению', 'desc': 'Статья представляет SCRL (Subproblem Curriculum Reinforcement Learning) — метод обучения с подкреплением, который решает проблему неэффективности обучения на проверяемых наградах путем разложения задач на подзадачи. Ключевая инновация заключается в нормализации наград на уровне подзадач, что позволяет более точно распределять информацию о качестве решения между отдельными шагами рассуждения. Используя справочные цепочки рассуждений, метод преобразует частичный прогресс в неудачных попытках в полезные обучающие сигналы для языковой модели. Экспериментальные результаты на семи бенчмарках математических рассуждений показывают значительное улучшение точности, особенно на сложных задачах типа AIME и IMO.'}, 'en': {'title': 'Unlocking Complex Reasoning with Subproblem Learning', 'desc': 'SCRL, or Subproblem Curriculum Reinforcement Learning, enhances reinforcement learning from verifiable rewards by introducing a structured approach to tackle complex problems. It focuses on breaking down difficult tasks into smaller, verifiable subproblems, allowing for better credit assignment even when the final outcomes are not achieved. By normalizing rewards at each subproblem level, SCRL provides more precise feedback to the learning model, which helps it learn from partial successes. This method has shown significant improvements in mathematical reasoning tasks, outperforming existing curriculum-learning techniques on various benchmarks.'}, 'zh': {'title': '子问题课程强化学习：提升推理能力的关键', 'desc': 'SCRL（子问题课程强化学习）通过子问题级别的归一化来解决可验证奖励的强化学习中的低效问题，从而实现更精细的信用分配和课程学习。该方法从参考推理链中提取可验证的子问题，并将最终子问题固定为原始问题，使得在困难问题上的部分进展可以转化为可验证的学习信号。SCRL在每个子问题位置独立归一化奖励，能够在没有外部评分标准或奖励模型的情况下进行更细致的信用分配。实验结果表明，SCRL在七个数学推理基准测试中表现优于强基线，尤其在处理更困难的问题时，效果提升更为显著。'}}}, {'id': 'https://huggingface.co/papers/2605.15669', 'title': 'Rule2DRC: Benchmarking LLM Agents for DRC Script Synthesis with Execution-Guided Test Generation', 'url': 'https://huggingface.co/papers/2605.15669', 'abstract': "Abstract Rule2DRC introduces a large-scale benchmark for DRC script synthesis with 1,000 rule-to-script tasks and 13,921 evaluation layouts, along with SplitTester which improves program selection through execution-based feedback.  AI-generated summary Manufacturable chip layouts must satisfy thousands of geometry-based design rules, and design rule checking (DRC) enforces them by running executable DRC scripts on layouts. Translating natural language rules into correct DRC scripts is labor-intensive and requires specialized expertise, motivating LLM agents for DRC script synthesis and debugging. However, existing benchmarks have small evaluation sets and often evaluate scripts by code similarity rather than execution correctness, and prior machine learning-based methods either ignore execution feedback or require labeled test layouts as agent's input. To this end, we introduce Rule2DRC, a large-scale benchmark for DRC script coding agents with 1,000 rule-to-script tasks and 13,921 evaluation chip layouts for execution-based scoring. Rule2DRC provides an evaluation pipeline that measures functional correctness via DRC execution outcomes without requiring evaluation layouts as input to the agent. We also propose SplitTester, a tester agent for program selection that uses execution feedback to generate discriminative test cases and separate previously indistinguishable candidate scripts, substantially improving Best-of-N selection performance in this domain. We release the code at https://github.com/snu-mllab/Rule2DRC.", 'score': 2, 'issue_id': 2293, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '4b5f94558df9d042', 'authors': ['Jinuk Kim', 'Junsoo Byun', 'Donghwi Hwang', 'Seong-Jin Park', 'Hyun Oh Song'], 'affiliations': ['Department of Computer Science and Engineering, Seoul National University', 'Neural Processing Research Center', 'Samsung Electronics Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2605.15669.jpg', 'data': {'categories': ['#plp', '#benchmark', '#optimization', '#science', '#dataset', '#agents', '#open_source'], 'emoji': '🔌', 'ru': {'title': 'От правил к коду: бенчмарк для автоматического синтеза DRC скриптов с обратной связью от выполнения', 'desc': 'В работе представлен бенчмарк Rule2DRC для синтеза DRC скриптов — программ, проверяющих соответствие топологии чипов геометрическим правилам проектирования. Бенчмарк содержит 1000 задач перевода естественных языковых правил в исполняемые скрипты и 13921 тестовый макет для оценки функциональной корректности. Авторы предлагают метод SplitTester, который использует feedback из выполнения программ для генерации дискриминативных тестовых случаев и улучшения выбора наилучшего кандидата из множества сгенерированных скриптов. Подход оценивает скрипты по их реальному исполнению, а не по сходству кода, что лучше отражает практическую корректность решений.'}, 'en': {'title': 'Revolutionizing DRC Script Synthesis with Rule2DRC', 'desc': 'Rule2DRC is a new benchmark designed for synthesizing design rule checking (DRC) scripts from natural language rules, featuring 1,000 tasks and 13,921 layouts for evaluation. It addresses the limitations of previous benchmarks by focusing on execution correctness rather than just code similarity, allowing for a more accurate assessment of script performance. The introduction of SplitTester enhances the selection of DRC scripts by utilizing execution feedback to create better test cases, improving the accuracy of script selection. This framework aims to streamline the process of generating manufacturable chip layouts that comply with complex design rules, reducing the need for specialized expertise.'}, 'zh': {'title': 'Rule2DRC：提升DRC脚本合成的基准与评估', 'desc': 'Rule2DRC是一个大型基准，用于设计规则检查（DRC）脚本的合成，包含1000个规则到脚本的任务和13921个评估布局。该基准通过执行反馈来改进程序选择，使用SplitTester来生成区分性测试用例，从而提高脚本选择的准确性。它允许通过DRC执行结果来评估功能正确性，而不需要将评估布局作为输入。此研究旨在简化将自然语言规则转换为正确DRC脚本的过程，减少人工干预。'}}}, {'id': 'https://huggingface.co/papers/2605.22715', 'title': 'AnyMo: Geometry-Aware Setup-Agnostic Modeling of Human Motion in the Wild', 'url': 'https://huggingface.co/papers/2605.22715', 'abstract': 'Abstract AnyMo is a geometry-aware framework that enables setup-agnostic human motion modeling using physics-grounded IMU simulation and graph encoding for cross-dataset activity recognition and cross-modal retrieval.  AI-generated summary As wearable and mobile devices become increasingly embedded in daily life, they offer a practical way to continuously sense human motion in the wild. But inertial signals are highly dependent on the sensing setup, including body location, mounting position, sensor orientation, device hardware, and sampling protocol. This setup dependence makes it difficult to learn motion representations that transfer across devices and datasets, and limits the broader use of wearable IMUs beyond closed-set recognition. We introduce AnyMo, a geometry-aware framework for setup-agnostic human motion modeling. AnyMo uses physics-grounded IMU simulation over dense body-surface placements to generate diverse and plausible synthetic signals, pre-trains a graph encoder from paired synthetic placement views and masked partial observations, tokenizes multi-position IMU into full-body motion tokens, and aligns these tokens with an LLM for motion-language understanding. We evaluate AnyMo on three complementary tasks: zero-shot activity recognition across 14 unseen downstream datasets, cross-modal retrieval, and wearable IMU motion captioning, where it improves average Accuracy/F1/R@2 by 11.7\\%/11.6\\%/22.6\\% on HAR, increases zero-shot IMU-to-text and text-to-IMU retrieval MRR by 15.9\\% and 28.6\\%, respectively, and improves zero-shot captioning BERT-F1 by 18.8\\%. These results support AnyMo as a generalist model for wearable motion understanding in the wild. Project page: https://baiyuchen.com/project/AnyMo.', 'score': 1, 'issue_id': 2292, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '3200d084cd95da70', 'authors': ['Baiyu Chen', 'Zechen Li', 'Wilson Wongso', 'Lihuan Li', 'Xiachong Lin', 'Hao Xue', 'Benjamin Tag', 'Flora Salim'], 'affiliations': ['The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'The University of New South Wales'], 'pdf_title_img': 'assets/pdf/title_img/2605.22715.jpg', 'data': {'categories': ['#architecture', '#dataset', '#multimodal'], 'emoji': '📱', 'ru': {'title': 'Универсальное понимание движений человека с любых носимых датчиков', 'desc': 'AnyMo — это фреймворк для моделирования человеческих движений, который работает независимо от конфигурации датчиков IMU на теле. Система использует физически обоснованную симуляцию инерциальных сигналов и кодирование графом для предварительного обучения на синтетических данных с разных позиций на теле. Модель токенизирует сигналы с множественных датчиков в полнотелесные представления движений и выравнивает их с LLM для понимания связи между движениями и текстом. AnyMo демонстрирует значительное улучшение в задачах распознавания активности, кросс-модальной поиска и генерации описаний движений на непроверенных датасетах и конфигурациях датчиков.'}, 'en': {'title': 'AnyMo: Setup-Agnostic Human Motion Modeling for All Devices', 'desc': 'AnyMo is a
