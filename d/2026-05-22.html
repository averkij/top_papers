    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                titleSign.classList.add('rotate');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.22718', 'title': 'WorldKV: Efficient World Memory with World Retrieval and Compression', 'url': 'https://huggingface.co/papers/2605.22718', 'abstract': 'Abstract WorldKV enables persistent world generation in video diffusion models by retrieving and compressing key-value cache chunks to maintain consistency while improving throughput.  AI-generated summary Autoregressive video diffusion models have enabled real-time, action-conditioned world generation. However, sustaining a persistent world, where revisiting a previously seen viewpoint yields consistent content, remains an open problem. Full KV-cache attention preserves this consistency but breaks real-time constraints: memory footprint and attention cost grow linearly with rollout length. Sliding window inference restores throughput but discards long-term consistency. We propose WorldKV, a training-free framework with two components: World Retrieval and World Compression. World Retrieval stores evicted KV-cache chunks in GPU/CPU memory and selectively retrieves scene-relevant chunks via camera/ action correspondence, inserting them back into the native attention window without re-encoding. World Compression prunes redundant tokens within each chunk via key-key similarity to an anchor frame, halving per-chunk storage to fit 2x more history under a fixed budget. On Matrix-Game-2.0 and LingBot- World-Fast, WorldKV matches or exceeds full-KV memory fidelity at roughly 2x the throughput, and is competitive with memory-trained baselines without any fine-tuning. Project Page: https://cvlab-kaist.github.io/WorldKV/', 'score': 17, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '93834d2e85a73f7f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#diffusion', '#optimization', '#inference', '#architecture', '#long_context', '#video'], 'emoji': '🎬', 'ru': {'title': 'Запомнить виртуальный мир: быстро и последовательно', 'desc': 'WorldKV — это фреймворк для видео диффузионных моделей, который решает проблему непротиворечивости при генерации виртуальных миров. Система использует два подхода: сохранение и избирательное извлечение KV-кеша из памяти для поддержания консистентности при повторном посещении сцены, а также сжатие ключей внимания путем удаления избыточных токенов. WorldKV достигает 2x ускорения пропускной способности, сохраняя качество полного KV-кеша без переобучения модели. Метод работает как обучению, так и в инженерном решении для реально-временного видео синтеза с долгосрочной согласованностью.'}, 'en': {'title': 'Enhancing Consistency and Throughput in Video Diffusion Models with WorldKV', 'desc': 'WorldKV is a framework designed to enhance video diffusion models by enabling persistent world generation. It addresses the challenge of maintaining consistent content when revisiting previously seen viewpoints, which is crucial for immersive experiences. The framework consists of two main components: World Retrieval, which efficiently retrieves relevant key-value cache chunks, and World Compression, which reduces the storage requirements of these chunks. By doing so, WorldKV achieves improved throughput while preserving memory fidelity, outperforming traditional methods without the need for additional training.'}, 'zh': {'title': 'WorldKV：提升视频生成的一致性与速度', 'desc': 'WorldKV 是一种新框架，旨在解决视频扩散模型中的持久世界生成问题。它通过检索和压缩关键值缓存块来保持内容一致性，同时提高处理速度。该框架包括两个主要部分：世界检索和世界压缩，能够在不重新编码的情况下有效地管理内存。实验结果表明，WorldKV 在处理速度上达到了全KV内存的效果，同时无需任何微调。'}}}, {'id': 'https://huggingface.co/papers/2605.21850', 'title': 'ACC: Compiling Agent Trajectories for Long-Context Training', 'url': 'https://huggingface.co/papers/2605.21850', 'abstract': 'Abstract Agent Context Compilation (ACC) enhances long-context reasoning in LLMs by converting multi-turn agent trajectories into structured QA pairs, enabling direct supervision of distant context integration without additional annotation.  AI-generated summary Recent development of agents has renewed demand for long-context reasoning capacity of LLMs. However, training LLMs for this capacity requires costly long-document curation or heuristic context synthesis. We observe that agents produce massive trajectories when solving problems, invoking tools and receiving environment observations across many turns. The evidence needed to answer the original question is thus scattered throughout these turns, requiring integration of distant context segments. Nevertheless, standard agent SFT masks tool responses and only trains turn-level tool selection, creating a supervision blind spot where these scattered signals go unused. We propose Agent Context Compilation (ACC), which converts trajectories from search, software engineering, and database querying agents into long-context QA pairs that combine the original question with tool responses and environment observations gathered across multiple turns, training the model to answer directly without tool use. This makes the dependencies between the question and the evidence explicit, enabling direct supervision of long-context reasoning over distant segments without additional annotation. ACC is a simple but effective approach that can be combined with any existing long-context extension or training method, providing scalable supervised fine-tuning data. We validate ACC on long-range dependency modeling tasks through MRCR and GraphWalks, challenging benchmarks requiring cross-turn coreference resolution and graph traversal over extended contexts. Training Qwen3-30B-A3B with ACC achieves 68.3 on MRCR (+18.1) and 77.5 on GraphWalks (+7.6), results comparable to Qwen3-235B-A22B, while preserving general capabilities on GPQA, MMLU-Pro, AIME, and IFEval. Further mechanism analysis reveals that the ACC-trained model exhibits task-adaptive attention restructuring and expert specialization.', 'score': 15, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'e71272911812b9cf', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#agents', '#training', '#benchmark', '#synthetic', '#reasoning', '#long_context'], 'emoji': '🔍', 'ru': {'title': 'Превращение агентских траекторий в данные для обучения моделей на длинных контекстах', 'desc': 'В статье предлагается метод Agent Context Compilation (ACC), который преобразует траектории работы агентов в пары вопрос-ответ для обучения LLM лучше разбираться в длинных контекстах. Основная идея заключается в том, что при решении задач агенты накапливают информацию, распределённую по множеству шагов, но стандартное обучение с учителем не использует эти сигналы в полной мере. ACC решает эту проблему, создавая явные зависимости между исходными вопросами и свидетельствами, собранными на разных этапах взаимодействия. Экспериментальная проверка показала, что модель Qwen3-30B-A3B с обучением ACC достигает результатов, сравнимых с моделью в 8 раз большего размера, при этом сохраняя общие способности.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with Agent Context Compilation', 'desc': 'Agent Context Compilation (ACC) improves the ability of large language models (LLMs) to reason over long contexts by transforming multi-turn interactions of agents into structured question-answer pairs. This method allows the model to learn from the evidence gathered across multiple turns without needing extra annotations, addressing the challenge of integrating distant context segments. By utilizing the rich trajectories produced by agents, ACC provides a way to train LLMs to directly answer questions based on scattered information. The results show that models trained with ACC perform significantly better on tasks requiring long-range dependencies, demonstrating its effectiveness in enhancing long-context reasoning capabilities.'}, 'zh': {'title': '代理上下文编译：提升长上下文推理能力的有效方法', 'desc': '代理上下文编译（ACC）通过将多轮代理轨迹转换为结构化的问答对，增强了大型语言模型（LLM）在长上下文推理中的能力。这种方法使得模型能够直接监督远程上下文的整合，而无需额外的标注。ACC利用代理在解决问题时生成的大量轨迹，将原始问题与多个回合中收集的工具响应和环境观察结合起来，从而训练模型直接回答问题。通过在长范围依赖建模任务上验证，ACC显示出显著的性能提升，证明了其在长上下文推理中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.22642', 'title': 'Spreadsheet-RL: Advancing Large Language Model Agents on Realistic Spreadsheet Tasks via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.22642', 'abstract': "Abstract Spreadsheet-RL is a reinforcement learning framework that trains specialized spreadsheet agents in realistic Excel environments, improving AI agent performance on both general and domain-specific spreadsheet tasks through automated data collection and domain-specific benchmarks.  AI-generated summary Spreadsheet systems (e.g., Microsoft Excel, Google Sheets) play a central role in modern data-centric workflows. As AI agents grow increasingly capable of automating complex tasks, such as controlling computers and generating presentations, building an AI-driven spreadsheet agent has emerged as a promising research direction. Most existing spreadsheet agents rely on specialized prompting over general-purpose LLMs; while this design has potentials on simple spreadsheet operations, it struggles to manage the complex, multi-step workflows typical of real-world applications.   We introduce Spreadsheet-RL, a reinforcement learning (RL) fine-tuning framework designed to train specialized spreadsheet agents within a realistic Microsoft Excel environment. Spreadsheet-RL features an automated pipeline for scalable collection of paired start-goal spreadsheets from online forums, as well as domain-specific evaluation tasks in areas such as finance and supply chain management, which we compile into the new Domain-Spreadsheet benchmark dataset. It also includes a Spreadsheet Gym environment designed for multi-turn RL: Spreadsheet Gym exposes extensive Excel functionality through a Python sandbox, along with a refined harness that incorporates a comprehensive tool set and carefully designed tool-routing rules for spreadsheet tasks. Through comprehensive experiments, we show that Spreadsheet-RL substantially enhances AI agent's performance on both general and domain-specific spreadsheet tasks: it improves Qwen3-4B-Thinking-2507's Pass@1 on SpreadsheetBench from 12.0% to 23.4%, and raises Pass@1 from 8.4% to 17.2% on our curated Domain-Spreadsheet dataset. These results highlight Spreadsheet-RL's strong potential for generalization and real-world adoption in spreadsheet automation, and broadly, its promise for advancing LLM-based interactions with data interfaces in everyday work.", 'score': 10, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'f3e965d42c798e0c', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#agents', '#training', '#rl', '#benchmark', '#optimization', '#dataset', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'Обучение агентов таблиц через обучение с подкреплением в реальной среде Excel', 'desc': 'Spreadsheet-RL — это фреймворк обучения с подкреплением, который тренирует специализированные агенты для работы с электронными таблицами в реальной среде Microsoft Excel. Вместо использования общих языковых моделей с промптингом, авторы применяют RL fine-tuning для обучения агентов выполнять сложные многошаговые задачи обработки данных. Фреймворк включает автоматический конвейер сбора обучающих данных из интернета и новый бенчмарк Domain-Spreadsheet с задачами из финансов и логистики. Экспериментальные результаты показывают значительное улучшение производительности агентов — с 12% до 23.4% на общем бенчмарке и с 8.4% до 17.2% на специализированном датасете.'}, 'en': {'title': 'Empowering AI Agents for Smarter Spreadsheet Automation', 'desc': 'Spreadsheet-RL is a reinforcement learning framework that trains AI agents to work effectively with spreadsheets in realistic environments like Microsoft Excel. It automates the collection of data and creates benchmarks for evaluating performance in specific domains such as finance and supply chain management. The framework includes a unique environment called Spreadsheet Gym, which allows agents to learn through multi-turn interactions and access various Excel functionalities. Experimental results show that Spreadsheet-RL significantly improves the performance of AI agents on both general and specialized spreadsheet tasks, indicating its potential for real-world applications in spreadsheet automation.'}, 'zh': {'title': '强化学习助力电子表格智能化', 'desc': 'Spreadsheet-RL 是一个强化学习框架，旨在训练专门的电子表格代理，以提高其在真实 Excel 环境中的表现。该框架通过自动化数据收集和领域特定基准测试，提升了 AI 代理在一般和特定领域电子表格任务上的性能。Spreadsheet-RL 包含一个自动化管道，用于从在线论坛收集成对的起始-目标电子表格，并编制了新的领域电子表格基准数据集。通过全面的实验，Spreadsheet-RL 显著提高了 AI 代理在电子表格任务中的表现，展示了其在电子表格自动化中的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.22809', 'title': 'Sensor2Sensor: Cross-Embodiment Sensor Conversion for Autonomous Driving', 'url': 'https://huggingface.co/papers/2605.22809', 'abstract': "Abstract Sensor2Sensor generates high-fidelity multi-modal sensor data from in-the-wild dashcam videos using diffusion models and 4D Gaussian Splatting for autonomous driving system training and validation.  AI-generated summary Robust training and validation of Autonomous Driving Systems (ADS) require massive, diverse datasets. Proprietary data collected by Autonomous Vehicle (AV) fleets, while high-fidelity, are limited in scale, diversity of sensor configurations, as well as geographic and long-tail-behavioral coverage. In contrast, in-the-wild data from sources like dashcams offers immense scale and diversity, capturing critical long-tail scenarios and novel environments. However, this unstructured, in-the-wild video data is incompatible with ADS expecting structured, multi-modal sensor inputs for validation and training. To bridge this data gap, we propose Sensor2Sensor, a novel generative modeling paradigm that translates in-the-wild monocular dashcam videos into a high-fidelity, multi-modal sensor suite (AV logs) comprising multi-view camera images and LiDAR point clouds. A core challenge is the lack of paired training data. We address this by converting real AV logs into dashcam-style videos via 4D Gaussian Splatting (4DGS) reconstruction and novel-view rendering. Sensor2Sensor then utilizes a diffusion architecture to perform the generative conversion. We perform comprehensive quantitative evaluations on the fidelity and realism of the generated sensor data. We demonstrate Sensor2Sensor's practical utility by converting challenging in-the-wild internet and dashcam footage into realistic, multi-modal data formats, further unlocking vast external data sources for AV development.", 'score': 7, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '35b7276dc2975563', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#3d', '#diffusion', '#synthetic', '#dataset', '#multimodal', '#video'], 'emoji': '🚗', 'ru': {'title': 'От видеорегистратора к полносенсорному датасету автономного автомобиля', 'desc': 'Sensor2Sensor — это новый подход к генерации высокофидельных мультимодальных сенсорных данных из видеозаписей видеорегистраторов используя диффузионные модели и 4D Gaussian Splatting. Система преобразует неструктурированные видео в формат, совместимый с системами автономного вождения, включая изображения с нескольких камер и облака точек LiDAR. Для решения проблемы отсутствия парных данных авторы используют синтетизацию датасетов через реконструкцию реальных логов автомобилей с помощью 4D Gaussian Splatting. Это позволяет разблокировать огромные объемы внешних данных для обучения и валидации систем автономного вождения.'}, 'en': {'title': 'Transforming Dashcam Footage into Rich Sensor Data for Autonomous Driving', 'desc': 'Sensor2Sensor is a novel approach that generates high-quality multi-modal sensor data from dashcam videos to aid in training and validating autonomous driving systems. It addresses the challenge of limited and diverse datasets by transforming unstructured dashcam footage into structured formats like multi-view camera images and LiDAR point clouds. The method employs diffusion models and 4D Gaussian Splatting to create realistic sensor data, even in the absence of paired training data. This innovation allows for the effective use of vast external data sources, enhancing the development of autonomous vehicles.'}, 'zh': {'title': 'Sensor2Sensor：自动驾驶数据生成的新方法', 'desc': 'Sensor2Sensor 是一种新颖的生成模型，能够将真实的行车记录仪视频转换为高保真度的多模态传感器数据，以支持自动驾驶系统的训练和验证。该方法利用扩散模型和4D高斯点云重建技术，解决了缺乏配对训练数据的问题。通过将真实的自动驾驶日志转换为行车记录仪风格的视频，Sensor2Sensor 能够生成多视角相机图像和激光雷达点云。最终，我们的评估表明，Sensor2Sensor 能够有效地将复杂的行车记录仪视频转换为真实的多模态数据格式，极大地丰富了自动驾驶开发的数据来源。'}}}, {'id': 'https://huggingface.co/papers/2605.14678', 'title': 'π-Bench: Evaluating Proactive Personal Assistant Agents in Long-Horizon Workflows', 'url': 'https://huggingface.co/papers/2605.14678', 'abstract': "Abstract Proactive assistance in personal agent systems requires identifying hidden user intents through sustained multi-turn interactions, which current benchmarks fail to adequately evaluate.  AI-generated summary The rise of personal assistant agents, e.g., OpenClaw, highlights the growing potential of large language models to support users across everyday life and work. A core challenge in these settings is proactive assistance, since users often begin with underspecified requests and leave important needs, constraints, or preferences unstated. However, existing benchmarks rarely evaluate whether agents can identify and act on such hidden intents before they are explicitly stated, especially in sustained multi-turn interactions where user needs emerge gradually. To address this gap, we introduce π-Bench, a benchmark for proactive assistance comprising 100 multi-turn tasks across 5 domain-specific user personas. By incorporating hidden user intents, inter-task dependencies, and cross-session continuity, π-Bench evaluates agents' ability to anticipate and address user needs over extended interactions, jointly measuring proactivity and task completion in long-horizon trajectories that better reflect real-world use. Experiments show (1) proactive assistance remains challenging, (2) a clear distinction between task completion and proactivity, and (3) the value of prior interaction for proactive intent resolution in later tasks.", 'score': 7, 'issue_id': 2288, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'e9d9a9a05236c0a4', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🔮', 'ru': {'title': 'Учить агентов предугадывать скрытые желания пользователей', 'desc': 'В работе представлен новый бенчмарк π-Bench для оценки способности языковых моделей оказывать проактивную помощь пользователям в долгосрочных многооборотных взаимодействиях. Авторы выявляют ограничения существующих методик: они не оценивают, могут ли агенты предугадывать скрытые намерения пользователей, которые не были явно высказаны. Бенчмарк включает 100 задач с пятью различными персонажами пользователей и учитывает межзадачные зависимости, скрытые интенции и историю контекста между сессиями. Экспериментальные результаты показывают, что проактивная помощь остается сложной задачей, и что предыдущие взаимодействия значительно улучшают способность модели идентифицировать скрытые намерения.'}, 'en': {'title': 'Enhancing Proactive Assistance in Personal Agents with π-Bench', 'desc': 'This paper introduces π-Bench, a new benchmark designed to evaluate proactive assistance in personal agent systems. It focuses on the challenge of identifying hidden user intents during multi-turn interactions, where users may not clearly express their needs. The benchmark includes 100 tasks across various user personas, emphasizing the importance of understanding user preferences and constraints over time. Experiments reveal that while proactive assistance is difficult, distinguishing between task completion and proactivity is crucial for improving user-agent interactions.'}, 'zh': {'title': '主动协助：识别用户隐藏意图的关键', 'desc': '本论文探讨了个人助手系统中主动协助的挑战，特别是在多轮交互中识别用户隐藏意图的重要性。现有的评估基准未能有效衡量代理在用户未明确表达需求时的反应能力。为此，作者提出了π-Bench基准，包含100个多轮任务，旨在评估代理在长时间交互中预测和满足用户需求的能力。实验结果表明，主动协助仍然具有挑战性，并且任务完成与主动性之间存在明显区别。'}}}, {'id': 'https://huggingface.co/papers/2605.22678', 'title': 'Swift Sampling: Selecting Temporal Surprises via Taylor Series', 'url': 'https://huggingface.co/papers/2605.22678', 'abstract': "Abstract Swift Sampling is a training-free frame selection algorithm that identifies high-information video moments by analyzing deviations from predicted visual feature trajectories in latent space.  AI-generated summary While most frames in long-form video are redundant, the critical information resides in temporal surprises: moments where the actual visual features deviate from their predicted evolution. Inspired by the human brain's predictive coding, we introduce Swift Sampling, an elegant, training-free frame selection algorithm that automatically identifies high-information moments in a video. Specifically, we model a video as a differentiable trajectory in the visual latent space and compute the velocity and acceleration of its features. Then, we apply Taylor expansion to project the expected path of subsequent frames. Frames that diverge sharply from this predicted manifold are identified as temporally surprising frames and selected for sampling. Unlike prior training-free methods that rely on auxiliary networks or video-specific hyperparameter tuning, Swift Sampling is incredibly lightweight, adding only 0.02x additional computational cost over baseline making it 30x cheaper overhead than leading baselines. Across three long-video question answering benchmarks and 10 different downstream tasks, Swift Sampling outperforms uniform sampling and prior query-agnostic baselines. It is especially powerful for long videos with limited frame budgets improving accuracy by up to +12.5 points.", 'score': 3, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'd79560da5d30ac5d', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Умный отбор кадров видео через анализ предсказательных ошибок', 'desc': 'В статье предлагается Swift Sampling — алгоритм выбора кадров без обучения, который выявляет информативные моменты в видео, анализируя отклонения визуальных признаков от их предсказанных траекторий в скрытом пространстве. Метод использует принцип предсказательного кодирования мозга и строит дифференцируемую траекторию видео в пространстве признаков, вычисляя скорость и ускорение изменений. Алгоритм применяет разложение Тейлора для прогнозирования ожидаемого пути последующих кадров и отбирает те, которые сильно отклоняются от предсказанного многообразия. Swift Sampling является легким методом с минимальными вычислительными затратами (0.02x от базовой стоимости) и значительно превосходит равномерную выборку кадров на задачах ответов на вопросы о видео.'}, 'en': {'title': 'Swift Sampling: Capturing the Surprises in Video Moments', 'desc': 'Swift Sampling is a novel algorithm designed for selecting important frames from long videos without the need for prior training. It focuses on identifying moments where the actual visual features significantly deviate from what was predicted, highlighting these as high-information moments. By modeling video as a trajectory in latent space and using Taylor expansion, the algorithm efficiently predicts the expected visual path and selects frames that are temporally surprising. This method is computationally efficient, requiring minimal additional resources while outperforming existing sampling techniques in various tasks.'}, 'zh': {'title': '高效视频帧选择的创新算法', 'desc': 'Swift Sampling是一种无训练的帧选择算法，通过分析潜在空间中预测的视觉特征轨迹的偏差，识别出高信息量的视频时刻。大多数长视频帧是冗余的，关键的信息存在于时间上的惊喜时刻，即实际视觉特征与预测演变的偏差。该算法模拟视频在视觉潜在空间中的可微分轨迹，计算特征的速度和加速度，并使用泰勒展开预测后续帧的期望路径。与以往依赖辅助网络或视频特定超参数调整的无训练方法不同，Swift Sampling极其轻量，仅增加0.02倍的计算成本，且在多个长视频问答基准和下游任务中表现优异。'}}}, {'id': 'https://huggingface.co/papers/2605.22766', 'title': 'Diversed Model Discovery via Structured Table Discovery', 'url': 'https://huggingface.co/papers/2605.22766', 'abstract': 'Abstract Model search system that combines semantic and structured table-based retrieval to improve diversity and coverage of recommended models.  AI-generated summary Model cards describe model behavior through a mixture of textual descriptions and structured artifacts, including performance, configuration, and dataset tables. Existing model search systems rely predominantly on semantic similarity over text, which can produce homogeneous result sets and limit exploration of alternatives. We argue that model search is inherently comparative: users want models that are task-aligned yet differentiated in measurable ways. We hypothesize that this balance requires retrieval over condensed, high-quality evidence rather than verbose descriptions, and much of that evidence is concentrated in structured tables. We present StructuredSemanticSearch, a table-driven model search framework built on the ModelTables benchmark. Given a query, StructuredSemanticSearch combines a semantic baseline for task alignment with a structure-aware pipeline that discovers query-related model-card tables using table discovery operators such as unionability, joinability, and keyword search. Retrieved tables are mapped back to model cards under a controlled top-k budget, enabling fair comparison between text-based and table-based retrieval. Beyond retrieval, StructuredSemanticSearch adapts table integration to the model-table domain through orientation-aware integration, producing compact integrated views of tables from partially overlapping and sometimes transposed evidence tables. For evaluation, we introduce a nugget-based, auditable protocol that extracts compact evidence items from model cards, matches queries to condition- or intent-specific nuggets, and measures evidence coverage and diversity over retrieved model-card candidate sets. This protocol also provides a scalable path toward approximate, evidence-based labeling in dynamic model lakes. Experiments on 597 model-recommendation queries show improved nugget coverage for the structure-aware pipeline than semantic baseline', 'score': 3, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '1e87f1faeaa3e3bd', 'authors': ['Zhengyuan Dong', 'Renée J. Miller'], 'affiliations': ['University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2605.22766.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Структурированный поиск моделей через таблицы и семантику', 'desc': 'В статье представлена система поиска моделей машинного обучения StructuredSemanticSearch, которая объединяет семантический поиск с анализом структурированных таблиц из карточек моделей. Авторы утверждают, что поиск моделей требует сбалансированного подхода: результаты должны соответствовать задаче пользователя и одновременно предлагать разнообразные альтернативы, отличающиеся измеримыми характеристиками. Система использует операторы обнаружения таблиц (unionability, joinability, keyword search) и интеграцию таблиц с учётом их ориентации для создания компактных представлений доказательств. Для оценки качества введён протокол на основе выделения информационных элементов (nuggets), измеряющий охват и разнообразие доказательств в наборе рекомендуемых моделей.'}, 'en': {'title': 'Enhancing Model Search with Structured Semantic Retrieval', 'desc': "This paper introduces StructuredSemanticSearch, a novel model search system that enhances the diversity and coverage of recommended models by integrating semantic and structured table-based retrieval methods. The authors argue that traditional model search systems, which primarily focus on semantic similarity, often yield similar results and limit users' exploration of different models. By utilizing structured tables that contain condensed, high-quality evidence about model performance and configurations, the proposed system allows for more effective comparisons between models. The evaluation protocol developed in this study measures the coverage and diversity of retrieved models, demonstrating that the structured approach significantly outperforms traditional semantic methods."}, 'zh': {'title': '提升模型推荐多样性的结构化检索系统', 'desc': '本论文提出了一种结合语义和结构化表格检索的模型搜索系统，以提高推荐模型的多样性和覆盖率。我们认为模型搜索本质上是比较性的，用户希望找到与任务对齐但在可测量方面有所区别的模型。我们提出的StructuredSemanticSearch框架利用结构化表格来发现与查询相关的模型卡信息，并通过控制预算实现文本和表格检索的公平比较。实验结果表明，结构感知的检索管道在模型推荐查询中比传统的语义基线具有更好的信息覆盖率。'}}}, {'id': 'https://huggingface.co/papers/2605.22109', 'title': 'Perception or Prejudice: Can MLLMs Go Beyond First Impressions of Personality?', 'url': 'https://huggingface.co/papers/2605.22109', 'abstract': 'Abstract Researchers introduce a new task and dataset for evaluating personality reasoning in multimodal language models, revealing significant gaps between accurate predictions and grounded reasoning processes.  AI-generated summary Multimodal Large Language Models (MLLMs) are increasingly deployed in human-facing roles where personality perception is critical, yet existing benchmarks evaluate this capability solely on numerical Big Five score prediction, leaving open whether models truly perceive personality through behavioral understanding or merely prejudge through superficial pattern matching. We address this gap with three contributions. (i) A new task: we formalize Grounded Personality Reasoning (GPR), which requires MLLMs to anchor each Big Five rating in observable evidence through a chain of rating, reasoning, and grounding. (ii) A new dataset: we release MM-OCEAN (1,104 videos, 5,320 MCQs), produced by a multi-agent pipeline with human verification, with timestamped behavioral observations, evidence-grounded trait analyses, and seven categories of cue-grounding MCQs. (iii) Benchmark and analysis: we design a three-tier evaluation (rating, reasoning, grounding) plus four sample-level failure-mode metrics: Prejudice Rate (PR), Confabulation Rate (CR), Integration-failure Rate (IR), and Holistic-grounding Rate (HR), and benchmark 27 MLLMs (13 closed, 14 open). The analysis uncovers a striking Prejudice Gap: across the field, 51% of correct ratings are not grounded in retrieved cues, and the Holistic-Grounding Rate spans only 0-33.5%. These findings expose a disconnect between getting the right score and reasoning for the right reason, charting a roadmap for grounded social cognition in MLLMs.', 'score': 2, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '01acc8bfd60b73da', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#dataset', '#open_source', '#reasoning', '#interpretability', '#multimodal'], 'emoji': '🎭', 'ru': {'title': 'От угадывания к пониманию: обоснованное восприятие личности в мультимодальных моделях', 'desc': 'Исследователи представляют новую задачу и датасет для оценки способности мультимодальных больших языковых моделей (MLLM) понимать личность человека. Они формализуют задачу Grounded Personality Reasoning (GPR), которая требует от моделей обосновывать оценки черт личности на основе наблюдаемых поведенческих признаков, а не только предсказывать числовые значения. Создан новый датасет MM-OCEAN с 1104 видео и множественными вопросами для проверки того, насколько хорошо модели связывают свои выводы с конкретными визуальными доказательствами. Анализ 27 MLLM выявил значительный разрыв: половина корректных предсказаний не опирается на реальные поведенческие сигналы, что указывает на необходимость улучшения понимания социального взаимодействия в моделях.'}, 'en': {'title': 'Bridging the Gap: Grounded Personality Reasoning in AI', 'desc': "This paper introduces a new task called Grounded Personality Reasoning (GPR) to evaluate how well multimodal large language models (MLLMs) understand personality traits based on observable behaviors. The authors present a new dataset, MM-OCEAN, which includes videos and multiple-choice questions designed to test the models' ability to ground their personality ratings in real evidence. They also propose a comprehensive evaluation framework that assesses models on their rating accuracy, reasoning processes, and grounding capabilities. The results reveal a significant gap between accurate predictions and the models' ability to provide grounded reasoning, highlighting the need for improved understanding of social cognition in AI."}, 'zh': {'title': '揭示个性推理的深度与表面之差', 'desc': '本研究提出了一项新任务和数据集，用于评估多模态语言模型中的个性推理能力。研究表明，现有的评估方法仅依赖于大五人格评分的数值预测，未能真正考察模型是否通过行为理解来感知个性。我们引入了“基于证据的个性推理”（GPR），要求模型通过可观察的证据来支持每个评分。我们还发布了MM-OCEAN数据集，并设计了多层次的评估标准，以揭示模型在个性推理中的不足。'}}}, {'id': 'https://huggingface.co/papers/2605.22791', 'title': 'Gated DeltaNet-2: Decoupling Erase and Write in Linear Attention', 'url': 'https://huggingface.co/papers/2605.22791', 'abstract': 'Abstract Gated DeltaNet-2 improves upon existing linear attention models by separating erase and write operations through distinct channel-wise gates, achieving superior performance in long-context language modeling and retrieval tasks.  AI-generated summary Linear attention replaces the unbounded cache of softmax attention with a fixed-size recurrent state, reducing sequence mixing to linear time and decoding to constant memory. The hard part is not just what to forget, but how to edit this compressed memory without scrambling existing associations. Delta-rule models subtract the current read before writing a new value, and Kimi Delta Attention (KDA) sharpens forgetting with channel-wise decay. But the active edit still uses a single scalar gate to control two different things: how much old content to erase on the key side and how much new content to commit on the value side. We introduce Gated DeltaNet-2, which generalizes both Gated DeltaNet and KDA by inheriting adaptive forgetting and channel-wise decay while addressing their shared limitation, the scalar tie between erasing and writing. Gated Delta Rule-2 separates these roles with a channel-wise erase gate b_t and a channel-wise write gate w_t, reducing to KDA when both gates collapse to the same scalar and to Gated DeltaNet when the decay also collapses. We derive a fast-weight update view, a chunkwise WY algorithm with channel-wise decay absorbed into asymmetric erase factors, and a gate-aware backward pass that preserves efficient parallel training. At 1.3B parameters trained on 100B FineWeb-Edu tokens, Gated DeltaNet-2 achieves the strongest overall results among Mamba-2, Gated DeltaNet, KDA, and Mamba-3 variants across language modeling, commonsense reasoning, and retrieval. Its advantage is most pronounced on long-context RULER needle-in-a-haystack benchmarks, where it improves the evaluated multi-key retrieval setting and remains strong in both recurrent and hybrid settings. Code is available at https://github.com/NVlabs/GatedDeltaNet-2.', 'score': 2, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '036f5110b76dd94b', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#benchmark', '#optimization', '#open_source', '#architecture', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Разделённые вентили для точного управления памятью в линейном внимании', 'desc': 'Gated DeltaNet-2 улучшает линейные модели внимания, используя независимые канально-ориентированные вентили для операций стирания и записи в сжатое состояние памяти. Вместо одного скалярного параметра, контролирующего одновременно забывание старой информации и добавление новой, модель использует два отдельных канально-зависимых гейта, что позволяет более гибко управлять содержимым рекуррентного состояния. Архитектура обобщает предыдущие подходы как Gated DeltaNet, так и Kimi Delta Attention, сохраняя их сильные стороны в виде адаптивного забывания и канального распада. На моделях размером 1.3B параметров Gated DeltaNet-2 показывает лучшие результаты в языковом моделировании, рассуждении и поиске информации, особенно превосходя конкурентов в задачах долгого контекста.'}, 'en': {'title': 'Revolutionizing Memory Management in Language Models', 'desc': 'Gated DeltaNet-2 enhances linear attention models by introducing separate gates for erasing and writing information, which improves performance in tasks requiring long-context understanding. This model addresses the challenge of managing memory by allowing distinct control over what to forget and what to retain, thus avoiding confusion in memory associations. By utilizing channel-wise gates, Gated DeltaNet-2 effectively manages the balance between erasing old content and writing new content, leading to better results in language modeling and retrieval tasks. With 1.3 billion parameters trained on a large dataset, it outperforms previous models in various benchmarks, especially in scenarios requiring long-context retrieval.'}, 'zh': {'title': 'Gated DeltaNet-2：长上下文建模的新突破', 'desc': 'Gated DeltaNet-2 是一种改进的线性注意力模型，通过使用不同的通道门控来分离擦除和写入操作，从而在长上下文语言建模和检索任务中表现出色。它解决了传统模型在记忆编辑时的局限性，允许更灵活地控制旧内容的擦除和新内容的写入。该模型在1.3亿参数下，经过100亿个FineWeb-Edu标记的训练，取得了在语言建模、常识推理和检索任务中的最佳结果。特别是在长上下文的检索基准测试中，Gated DeltaNet-2 显示出显著的优势。'}}}, {'id': 'https://huggingface.co/papers/2605.13734', 'title': 'KVServe: Service-Aware KV Cache Compression for Communication-Efficient Disaggregated LLM Serving', 'url': 'https://huggingface.co/papers/2605.13734', 'abstract': 'Abstract KVServe is a service-aware and adaptive framework for optimizing key-value communication compression in disaggregated large language model serving, achieving significant improvements in job completion time and time-to-first-token reduction through dynamic optimization.  AI-generated summary LLMs are widely adopted in production, pushing inference systems to their limits. Disaggregated LLM serving (e.g., PD separation and KV state disaggregation) improves scalability and cost efficiency, but it also turns KV into an explicit payload crossing network and storage boundaries, making KV a dominant end-to-end bottleneck. Existing KV compression are typically static runtime configurations, despite production service context varies over time in workload mix, bandwidth, and SLO/quality budgets. As a result, a fixed choice can be suboptimal or even increase latency. We present KVServe, the first service-aware and adaptive KV communication compression framework for disaggregated LLM serving: KVServe (1) unifies KV compression into a modular strategy space with new components and cross-method recomposition; (2) introduces Bayesian Profiling Engine that efficiently searches this space and distills a 3D Pareto candidate set, reducing 50times offline search overhead; and (3) deploys a Service-Aware Online Controller that combines an analytical latency model with a lightweight bandit to select profiles under constraints and correct offline-to-online mismatch. Integrated into vLLM and evaluated across datasets, models, GPUs and networks, KVServe achieves up to 9.13times JCT speedup in PD-separated serving and up to 32.8times TTFT reduction in KV-disaggregated serving.', 'score': 1, 'issue_id': 2288, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'b38fcc0baf1fc051', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Динамическая адаптация сжатия данных для быстрого обслуживания языковых моделей', 'desc': 'KVServe — это адаптивная система для оптимизации сжатия ключ-значение (KV) коммуникаций в распределённом обслуживании больших языковых моделей. Система использует байесовский профилировщик для эффективного поиска оптимальных стратегий сжатия и создания набора Парето-оптимальных решений. Во время исполнения контроллер использует аналитическую модель задержки и многорукий бандит для динамического выбора профилей сжатия в зависимости от текущей нагрузки и ограничений сервиса. Интеграция в vLLM показала улучшения в 9-32 раза в сокращении времени завершения задач и задержки до первого токена.'}, 'en': {'title': 'Dynamic Optimization for Faster LLM Serving', 'desc': 'KVServe is a novel framework designed to enhance the efficiency of key-value (KV) communication in disaggregated large language model (LLM) serving. It addresses the limitations of static KV compression methods by introducing a dynamic, service-aware approach that adapts to varying workloads and network conditions. The framework includes a Bayesian Profiling Engine for efficient optimization and a Service-Aware Online Controller that ensures optimal performance under different constraints. As a result, KVServe significantly reduces job completion time and time-to-first-token, making it a powerful tool for improving LLM inference systems.'}, 'zh': {'title': 'KVServe：智能优化键值通信的框架', 'desc': 'KVServe是一个服务感知和自适应的框架，旨在优化分离式大语言模型服务中的键值通信压缩。它通过动态优化显著提高了作业完成时间和首次令牌生成时间。该框架将键值压缩统一为模块化策略空间，并引入贝叶斯分析引擎来高效搜索该空间。KVServe在多个数据集、模型、GPU和网络上进行评估，显示出在分离式服务中可实现高达9.13倍的作业完成时间加速和高达32.8倍的首次令牌生成时间减少。'}}}, {'id': 'https://huggingface.co/papers/2605.22074', 'title': 'From Reasoning Chains to Verifiable Subproblems: Curriculum Reinforcement Learning Enables Credit Assignment for LLM Reasoning', 'url': 'https://huggingface.co/papers/2605.22074', 'abstract': 'Abstract SCRL addresses inefficiencies in reinforcement learning from verifiable rewards by using subproblem-level normalization for finer credit assignment and curriculum learning, improving mathematical reasoning performance on challenging benchmarks.  AI-generated summary Reinforcement learning from verifiable rewards (RLVR) has shown strong promise for LLM reasoning, but outcome-based RLVR remains inefficient on hard problems because correct final-answer rollouts are rare and sample-level credit assignment cannot use partial progress in failed attempts. We introduce SCRL (Subproblem Curriculum Reinforcement Learning), a curriculum RL framework that derives verifiable subproblems from reference reasoning chains and fixes the final subproblem as the original problem. This turns partial progress on hard problems into verifiable learning signals. Algorithmically, SCRL uses subproblem-level normalization, which normalizes rewards independently at each subproblem position and assigns the resulting advantages to the corresponding answer spans, enabling finer-grained credit assignment without external rubrics or reward models. Our analysis shows that subproblem curricula lift hard problems out of gradient dead zones, with larger relative gains as the original problem becomes harder. Across seven mathematical reasoning benchmarks, SCRL outperforms strong curriculum-learning baselines, improving average accuracy over GRPO by +4.1 points on Qwen3-4B-Base and +1.9 points on Qwen3-14B-Base. On AIME24, AIME25, and IMO-Bench, SCRL further improves pass@1 by +3.7 points and pass@64 by +4.6 points on Qwen3-4B-Base, indicating better exploration on hard reasoning problems.', 'score': 0, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '9f2e8eaa5fa01da3', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#small_models', '#math', '#training', '#rl'], 'emoji': '🎓', 'ru': {'title': 'От целого к частям: как разложение задач улучшает обучение рассуждению', 'desc': 'Статья представляет SCRL (Subproblem Curriculum Reinforcement Learning) — метод обучения с подкреплением, который решает проблему неэффективности обучения на проверяемых наградах путем разложения задач на подзадачи. Ключевая инновация заключается в нормализации наград на уровне подзадач, что позволяет более точно распределять информацию о качестве решения между отдельными шагами рассуждения. Используя справочные цепочки рассуждений, метод преобразует частичный прогресс в неудачных попытках в полезные обучающие сигналы для языковой модели. Экспериментальные результаты на семи бенчмарках математических рассуждений показывают значительное улучшение точности, особенно на сложных задачах типа AIME и IMO.'}, 'en': {'title': 'Unlocking Complex Reasoning with Subproblem Learning', 'desc': 'SCRL, or Subproblem Curriculum Reinforcement Learning, enhances reinforcement learning from verifiable rewards by introducing a structured approach to tackle complex problems. It focuses on breaking down difficult tasks into smaller, verifiable subproblems, allowing for better credit assignment even when the final outcomes are not achieved. By normalizing rewards at each subproblem level, SCRL provides more precise feedback to the learning model, which helps it learn from partial successes. This method has shown significant improvements in mathematical reasoning tasks, outperforming existing curriculum-learning techniques on various benchmarks.'}, 'zh': {'title': '子问题课程强化学习：提升推理能力的关键', 'desc': 'SCRL（子问题课程强化学习）通过子问题级别的归一化来解决可验证奖励的强化学习中的低效问题，从而实现更精细的信用分配和课程学习。该方法从参考推理链中提取可验证的子问题，并将最终子问题固定为原始问题，使得在困难问题上的部分进展可以转化为可验证的学习信号。SCRL在每个子问题位置独立归一化奖励，能够在没有外部评分标准或奖励模型的情况下进行更细致的信用分配。实验结果表明，SCRL在七个数学推理基准测试中表现优于强基线，尤其在处理更困难的问题时，效果提升更为显著。'}}}, {'id': 'https://huggingface.co/papers/2605.22344', 'title': 'Bernini: Latent Semantic Planning for Video Diffusion', 'url': 'https://huggingface.co/papers/2605.22344', 'abstract': "Abstract A unified video generation and editing framework combines multimodal large language models for semantic planning with diffusion models for pixel rendering, achieving state-of-the-art performance through semantic interface separation and enhanced positional embeddings.  AI-generated summary Multimodal large language models (MLLMs) and diffusion models have each reached remarkable maturity: MLLMs excel at reasoning over heterogeneous multimodal inputs with strong semantic grounding, while diffusion models synthesize images and videos with photorealistic fidelity. We argue that these two families can be unified through a simple division of labor: MLLMs perform semantic planning, while diffusion models render pixels from high-level semantic guidance and low-level visual features. Building on this idea, we propose Bernini, a unified framework for video generation and editing. An MLLM-based planner predicts the target semantic representation directly in the ViT embedding space, and a DiT-based renderer synthesizes pixels conditioned on this plan, augmented by text features and, for editing, source VAE features for detail preservation. Because semantics serve as the interface, the planner and renderer can be trained separately and only lightly co-trained, preserving the pretrained strengths of both components while keeping training efficient. To better handle multiple visual inputs, we introduce Segment-Aware 3D Rotary Positional Embedding (SA-3D RoPE), and further incorporate chain-of-thought reasoning in the planner to better transfer understanding into generation. Bernini achieves state-of-the-art performance across a wide range of video generation and editing benchmarks, with the MLLM's pretrained understanding translating into strong generalization on challenging editing tasks.", 'score': 0, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '439203c7c0a0445a', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#transfer_learning', '#diffusion', '#reasoning', '#architecture', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Видео из смысла: разделение труда между семантикой и пикселями', 'desc': 'Предложена объединённая система Bernini для генерации и редактирования видео, которая разделяет задачи между мультимодальной большой языковой моделью (MLLM) и диффузионной моделью. MLLM выполняет семантическое планирование, предсказывая целевое представление в пространстве эмбеддингов ViT, а DiT-основанный рендерер синтезирует пиксели на основе этого плана с учётом текстовых и визуальных признаков. Разделение на семантический интерфейс позволяет обучать компоненты отдельно, сохраняя предобученные качества обеих моделей и повышая эффективность обучения. Введено улучшенное позиционное кодирование SA-3D RoPE для лучшей обработки множественных визуальных входов, что обеспечивает достижение лучших результатов на бенчмарках по генерации и редактированию видео.'}, 'en': {'title': 'Unifying Semantic Planning and Pixel Rendering for Video Mastery', 'desc': 'This paper presents Bernini, a unified framework for video generation and editing that leverages multimodal large language models (MLLMs) for semantic planning and diffusion models for pixel rendering. The framework separates the tasks of high-level semantic understanding and low-level visual synthesis, allowing each model to excel in its domain. By using enhanced positional embeddings and a novel approach to training, Bernini achieves state-of-the-art performance in generating and editing videos. The integration of chain-of-thought reasoning in the MLLM enhances its ability to guide the rendering process, resulting in improved generalization across various tasks.'}, 'zh': {'title': '统一视频生成与编辑的创新框架', 'desc': '这篇论文提出了一个统一的视频生成和编辑框架，结合了多模态大语言模型（MLLMs）和扩散模型。MLLMs擅长处理多种输入的语义规划，而扩散模型则能够生成高质量的图像和视频。通过将这两者分工合作，MLLMs负责语义规划，扩散模型则根据高层语义指导和低层视觉特征进行像素渲染。该框架名为Bernini，能够在视频生成和编辑任务中实现最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.22535', 'title': 'TerminalWorld: Benchmarking Agents on Real-World Terminal Tasks', 'url': 'https://huggingface.co/papers/2605.22535', 'abstract': 'Abstract  We introduce TerminalWorld, a scalable data engine that automatically reverse-engineers high-fidelity evaluation tasks from "in-the-wild" terminal recordings. Processing 80,870 terminal recordings, the engine yields a full benchmark of 1,530 validated tasks, spanning 18 real-world categories, ranging from short everyday operations to workflows exceeding 50 steps, and covering 1,280 unique commands. From these, we curate a Verified subset of 200 representative, manually reviewed tasks. Comprehensive benchmarking on TerminalWorld-Verified across eight frontier models and six agents reveals that current systems still struggle with authentic terminal workflows, achieving a maximum pass rate of only 62.5%. Moreover, TerminalWorld captures real-world terminal capabilities distinct from existing expert-curated benchmarks (e.g., Terminal-Bench), with only a weak correlation to their scores (Pearson r=0.20). The automated engine makes TerminalWorld authentic and scalable by construction, enabling it to evaluate agents in real-world terminal environments as developer practices evolve. Data and code are available at https://github.com/EuniAI/TerminalWorld.', 'score': 0, 'issue_id': 2288, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'd1d8dd2c706cba2b', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '⌨️', 'ru': {'title': 'От реальных логов — к честному тестированию терминальных агентов', 'desc': 'Авторы представляют TerminalWorld — автоматизированный движок для создания бенчмарков из реальных записей терминала. На основе анализа более 80 тысяч записей было сформировано 1530 валидированных задач, охватывающих 1280 уникальных команд из 18 категорий реальных сценариев. Тестирование восьми передовых моделей и шести агентов показало, что существующие системы справляются с аутентичными терминальными рабочими процессами лишь на 62.5% в лучшем случае. TerminalWorld отличается от экспертных бенчмарков своей масштабируемостью и близостью к реальным практикам разработки, позволяя оценивать способности AI-агентов в естественных условиях.'}, 'en': {'title': 'Revolutionizing Terminal Evaluation with TerminalWorld', 'desc': 'TerminalWorld is a new data engine designed to create realistic evaluation tasks from actual terminal recordings. It processes a large dataset of terminal interactions to generate a comprehensive benchmark of tasks that reflect real-world usage. The study shows that current machine learning models struggle with these tasks, achieving a maximum success rate of only 62.5%. By providing a scalable and authentic evaluation framework, TerminalWorld helps improve the assessment of AI agents in terminal environments as they adapt to changing developer practices.'}, 'zh': {'title': 'TerminalWorld：真实终端评估的创新引擎', 'desc': '我们介绍了TerminalWorld，这是一个可扩展的数据引擎，能够自动从真实的终端录音中反向工程高保真评估任务。该引擎处理了80,870个终端录音，生成了1,530个经过验证的任务基准，涵盖18个真实世界的类别，包括日常操作和超过50个步骤的工作流程。我们从中筛选出200个经过人工审核的代表性任务。全面的基准测试显示，当前系统在真实终端工作流程中仍然面临挑战，最高通过率仅为62.5%。'}}}, {'id': 'https://huggingface.co/papers/2605.21803', 'title': 'Same Architecture, Different Capacity: Optimizer-Induced Spectral Scaling Laws', 'url': 'https://huggingface.co/papers/2605.21803', 'abstract': 'Abstract Different optimizers produce distinct spectral scaling behaviors in Transformer models, with Muon achieving superior scaling efficiency compared to AdamW in representation capacity utilization.  AI-generated summary Scaling laws have made language-model performance predictable from model size, data, and compute, but they typically treat the optimizer as a fixed training detail. We show that this assumption misses a fundamental axis of representation scaling: how effectively the optimizer converts added FFN width into utilized spectral capacity. Using eigenspectra of feed-forward network representations, measured through soft and hard spectral-ranks, we find that the same Transformer architecture realizes markedly different spectral scaling laws when trained with different optimizers. Holding architecture and width schedule fixed, AdamW exhibits weak hard-rank scaling (β=0.44) on rare-token (TAIL) representations where learning is known to be hardest, whereas Muon achieves linear scaling (β=1.02) in the same regimes, a 2.3times increase in the scaling exponent. This difference is not reducible to validation loss: AdamW configurations can match low-rank Dion variants in perplexity, under extended training, while exhibiting sharply different spectral geometry, demonstrating that matched loss does not imply matched representation structure. Hard--soft rank asymmetry further reveals that optimizers differ not only in how much capacity is realized, but also in how that capacity is structured across eigenmodes. To disentangle optimizer effects from architectural ones, we compare against architectural interventions (e.g., attention rank and positional encoding), and find that optimizer-induced spectral shifts often exceed the architectural effects. These results suggest optimization as a first-class axis of representation scaling, motivating optimizer--architecture co-design.', 'score': 0, 'issue_id': 2288, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '1b4fcec7000d93c5', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#math', '#training', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Оптимизатор как первоклассное измерение масштабирования представлений', 'desc': 'В статье исследуется, как различные оптимизаторы влияют на спектральное масштабирование представлений в моделях Transformer. Авторы показывают, что Muon достигает линейного масштабирования жесткого спектрального ранга (β=1.02) на сложных представлениях редких токенов, в то время как AdamW демонстрирует слабое масштабирование (β=0.44). Они обнаруживают, что одинаковые значения функции потерь не гарантируют идентичную структуру представлений, и влияние выбора оптимизатора на спектральную геометрию часто превышает эффекты архитектурных изменений. Исследование предлагает рассматривать оптимизацию как ключевой фактор масштабирования представлений при совместном проектировании оптимизаторов и архитектур.'}, 'en': {'title': 'Optimizers Matter: Unlocking Transformer Potential with Muon', 'desc': 'This paper investigates how different optimizers affect the scaling behavior of Transformer models, particularly focusing on their spectral capacity utilization. It reveals that the Muon optimizer significantly outperforms AdamW in converting increased feed-forward network (FFN) width into effective representation capacity. The study uses eigenspectra analysis to show that optimizers influence not only the amount of capacity utilized but also its structural organization across eigenmodes. The findings advocate for considering optimization as a critical factor in model design, suggesting a need for co-designing optimizers and architectures for better performance.'}, 'zh': {'title': '优化器与架构共同设计，提升Transformer表现', 'desc': '这篇论文探讨了不同优化器在Transformer模型中的光谱缩放行为，发现Muon优化器在表示能力利用上比AdamW更有效。研究表明，优化器的选择对模型的表现有重要影响，尤其是在处理稀有标记时，Muon优化器的缩放效率显著高于AdamW。通过分析前馈网络表示的特征谱，作者发现即使在相同的架构和宽度下，不同优化器也会导致不同的光谱缩放规律。结果表明，优化器的设计应与模型架构共同考虑，以提高模型的表示能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture (4)', '#audio', '#benchmark (6)', '#cv', '#data', '#dataset (5)', '#diffusion (3)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (2)', '#interpretability (1)', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual', '#multimodal (3)', '#open_source (2)', '#optimization (5)', '#plp', '#rag', '#reasoning (4)', '#rl (2)', '#rlhf', '#robotics', '#science', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (2)', '#training (6)', '#transfer_learning (1)', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-22 02:36',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-22 02:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-22 02:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
