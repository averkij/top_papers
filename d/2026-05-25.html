    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

            const isDarkMode = body.classList.contains('dark-theme');

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.21573', 'title': 'Lens: Rethinking Training Efficiency for Foundational Text-to-Image Models', 'url': 'https://huggingface.co/papers/2605.21573', 'abstract': 'Abstract Lens is a compact 3.8B-parameter text-to-image model achieving superior performance with reduced training compute through dense caption datasets, multi-resolution batching, efficient architecture, and optimization techniques.  AI-generated summary We introduce Lens, a 3.8B-parameter T2I model that achieves performance competitive with, and in several cases surpassing, state-of-the-art models with more than 6B parameters across various benchmarks, while requiring significantly less training compute. For example, Lens requires only about 19.3% of the training compute used by Z-Image. The training efficiency of Lens stems from two key strategies beyond its compact model size. First, we maximize data information density per training batch by (i) training on Lens-800M, a dataset of 800M densely captioned image-text pairs whose captions are generated by GPT-4.1 and contain approximately 109 words on average, providing richer semantic supervision than conventional short captions, and (ii) constructing each batch from images with multiple resolutions and diverse aspect ratios, thereby enlarging the effective visual coverage of each optimization step. Second, we improve convergence speed through careful architectural choices, including adopting a semantic VAE that provides better latent representations and employing a strong language encoder that accelerates optimization while enabling multilingual generalization from English-only training data. After pre-training, we apply RL with taxonomy-driven prompts (Lens-RL-8K) and structured reward rubrics to suppress artifacts and improve visual quality, a reasoner module with training-free system prompt search to better align user requests with the model, and distillation-based acceleration for 4-step inference. Through efficient training and systematic optimization, Lens generalizes to arbitrary aspect ratios from 1:2 to 2:1 and resolutions up to 1440^2, and supports prompts in several commonly used languages. Thanks to its compact size, Lens generates a 1024^2 image in 3.15 seconds on a single NVIDIA H100 GPU, while its distilled turbo version performs 4-step generation in 0.84 seconds.', 'score': 14, 'issue_id': 2305, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '937ed264d691c449', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multilingual', '#dataset', '#small_models', '#optimization', '#inference', '#multimodal', '#rl', '#training', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Эффективная генерация изображений: максимум качества с минимумом вычислений', 'desc': 'Lens — это компактная модель преобразования текста в изображение с 3.8 млрд параметров, которая достигает качества моделей с 6+ млрд параметров, но требует в 5 раз меньше вычислений для обучения. Основные улучшения достигнуты за счёт использования плотно аннотированного датасета из 800М изображений с подробными подписями, сгенерированными GPT-4, и многомасштабного батчинга с различными разрешениями. Архитектурные решения включают семантический VAE для лучших латентных представлений и мощный языковый энкодер, обеспечивающий быструю сходимость и многоязычность. Финальная оптимизация применяет обучение с подкреплением, модуль-рассуждатель и дистилляцию для ускорения до 0.84 секунд на генерацию изображения.'}, 'en': {'title': 'Lens: Compact Powerhouse in Text-to-Image Generation', 'desc': "The paper presents Lens, a compact text-to-image (T2I) model with 3.8 billion parameters that outperforms larger models while using significantly less training compute. It achieves this by leveraging a dense dataset of 800 million image-text pairs with rich captions, enhancing the information density during training. Additionally, Lens employs a semantic variational autoencoder (VAE) and a robust language encoder to improve optimization speed and support multilingual capabilities. The model's efficient architecture allows it to generate high-quality images quickly, demonstrating its effectiveness across various resolutions and aspect ratios."}, 'zh': {'title': '高效紧凑的文本到图像模型Lens', 'desc': 'Lens是一个紧凑的3.8B参数文本到图像模型，通过密集的图像文本数据集和高效的架构实现了卓越的性能。它的训练计算需求显著低于传统的6B参数模型，使用的计算资源仅为Z-Image的19.3%。Lens通过最大化每个训练批次的数据信息密度和优化架构选择来提高训练效率。最终，Lens能够生成高质量的图像，并支持多种语言的提示，展现出强大的通用性和快速的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.23897', 'title': 'ETCHR: Editing To Clarify and Harness Reasoning', 'url': 'https://huggingface.co/papers/2605.23897', 'abstract': "Abstract A novel image editing approach called ETCHR is introduced that decouples visual reasoning from image generation, improving multimodal language model performance across multiple visual reasoning tasks through a two-stage training process.  AI-generated summary Multimodal Large Language Models have advanced visual reasoning, yet a purely textual chain of thought remains a bottleneck for questions that require fine-grained focus or view transformations. The ''think with images'' paradigm narrows this gap, but existing approaches are either constrained by fixed predefined toolkits or produce noisy intermediate images from unified multimodal methods. We pursue a third option: using a dedicated image editing model and decouple it with an understanding model. However, off-the-shelf image editors fail as reasoning assistants with two complementary gaps: a language-side gap, where editors trained as passive instruction-followers cannot map an abstract question to an appropriate visual transformation, and a generation-side gap, where edit correctness degrades as reasoning depth grows. Guided by this analysis, we introduce ETCHR (Editing To Clarify and Harness Reasoning), a question-conditioned, reasoning-aware image editor decoupled from the downstream understanding model and trained with a two-stage recipe targeted at the two gaps: Reasoning Imitation via supervised fine-tuning on edit trajectories, followed by Reasoning Enhancement with VLM-derived rewards for edit correctness and downstream reasoning accuracy. Since the editor is decoupled, ETCHR plugs into different open- and closed-source MLLMs in a training-free manner. Across five task families (fine-grained perception, chart understanding, logic reasoning, jigsaw restoration, and 3D understanding), ETCHR raises average Pass@1 from 55.95 to 60.77 (+4.82) with Qwen3-VL-8B, from 65.08 to 70.55 (+5.47) with Gemini-3.1-Flash-Lite, and from 76.55 to 81.16 (+4.61) with the 1T-parameter MoE model Kimi K2.5.", 'score': 1, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '38093cc60c2136eb', 'authors': ['Beichen Zhang', 'Yuhong Liu', 'Jinsong Li', 'Yuhang Zang', 'Jiaqi Wang', 'Dahua Lin'], 'affiliations': ['CPII under InnoHK', 'Shanghai AI Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.23897.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#multimodal', '#cv', '#training', '#reasoning'], 'emoji': '🎨', 'ru': {'title': 'Разделение рассуждения и генерации для усиления зрительного понимания', 'desc': 'В статье представлен метод ETCHR, который разделяет визуальное рассуждение и генерацию изображений для улучшения мультимодальных языковых моделей. Авторы предлагают использовать отдельный редактор изображений, который помогает модели рассуждать пошагово, преобразуя абстрактные вопросы в конкретные визуальные операции. Система обучается в два этапа: сначала имитация рассуждений на примерах траекторий редактирования, затем усиление рассуждений с помощью вознаграждений от визуальных моделей. Метод показывает значительные улучшения на различных задачах визуального понимания, повышая точность на 4-5% для разных моделей.'}, 'en': {'title': 'ETCHR: Enhancing Visual Reasoning through Decoupled Image Editing', 'desc': 'The paper presents ETCHR, a new image editing method that separates visual reasoning from image generation to enhance the performance of multimodal language models. This approach addresses limitations in existing models that struggle with complex visual tasks due to their reliance on fixed toolkits or noisy outputs. ETCHR employs a two-stage training process that focuses on improving reasoning imitation and edit correctness, allowing it to better interpret abstract questions and perform accurate visual transformations. By being decoupled from understanding models, ETCHR can be integrated with various multimodal language models without requiring additional training.'}, 'zh': {'title': 'ETCHR：解耦视觉推理与图像生成的创新编辑方法', 'desc': '本文介绍了一种新颖的图像编辑方法ETCHR，该方法将视觉推理与图像生成解耦，通过两阶段训练过程提高了多模态语言模型在多个视觉推理任务中的表现。传统的图像编辑工具在推理辅助方面存在语言和生成两个方面的缺陷，导致无法有效地将抽象问题映射到适当的视觉变换。ETCHR通过监督微调和基于奖励的增强训练，解决了这些缺陷，使其能够更好地理解和编辑图像。该方法在多个任务上显著提高了模型的表现，展示了其在多模态学习中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.19282', 'title': 'Rethinking Muon Beyond Pretraining: Spectral Failures and High-Pass Remedies for VLA and RLVR', 'url': 'https://huggingface.co/papers/2605.19282', 'abstract': "Abstract Muon's spectral whitening approach in LLM pretraining is replaced by Pion, which uses a high-pass NS iteration to stabilize training in low-rank and low-SNR regimes while maintaining computational efficiency and supporting per-head updates.  AI-generated summary Muon is a matrix-aware optimizer that leverages Newton-Schulz (NS) iterations to enforce spectral gradient orthogonalization by driving all singular values of the momentum matrix toward 1. While this uniform spectral whitening enhances exploration and outperforms AdamW in LLM pretraining, we show it could lead to fundamental limitations beyond pretraining in two regimes: (i) cross-modality vision-language-action (VLA) training, where inherently low-rank action-module gradients cause amplification of noisy tail directions, and (ii) reinforcement learning with verifiable rewards (RLVR), where low-SNR gradients and the need to preserve per-head specialization from prior training make whitening unstable. To address these challenges, we propose Pion, a drop-in replacement for Muon that preserves its computational efficiency while replacing uniform spectral whitening with a two-stage Promotion+Suppression mechanism, which we call the high-pass NS iteration. This design induces a sharp spectral high-pass effect, anchoring dominant singular values at 1 while suppressing noisy tail components toward 0, with controllable filter strength. To preserve pretrained per-head heterogeneity, Pion also supports a per-head mode that applies updates independently across attention heads via a simple reshape, at no extra cost. In VLA training on LIBERO and LIBERO-Plus, Pion consistently outperforms both baselines across l_1-regression (VLA-Adapter) and flow-matching (VLANeXt) architectures, e.g., reaching 100% success rate on LIBERO Object after 1,500 training steps with VLA-Adapter, vs. 97.0% for Muon and only 32.2% for AdamW. The advantage of Pion further extends to a real Franka Research 3 robot with a pi_0.5 backbone under the DROID setup on three grasp-and-place tasks. In RLVR post-training on Qwen3-1.7B/4B with GRPO and GMPO, Pion also outperforms AdamW on MATH and GSM8K while Muon collapses to zero.", 'score': 1, 'issue_id': 2305, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'ff92c1333c495ae6', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#small_models', '#optimization', '#robotics', '#multimodal', '#rl', '#training'], 'emoji': '⚡', 'ru': {'title': 'Высокочастотная фильтрация вместо универсального спектрального отбеливания', 'desc': 'Статья представляет Pion — новый оптимизатор, который улучшает алгоритм Muon для обучения больших языковых моделей в сложных сценариях. Основная инновация заключается в замене универсального спектрального отбеливания на механизм высокочастотной фильтрации, который подавляет шумные компоненты градиентов при сохранении доминирующих сингулярных значений. Pion демонстрирует стабильность в режимах низкого ранга и низкого отношения сигнал-шум, сохраняя вычислительную эффективность и позволяя применять независимые обновления для каждой головы внимания. Метод показывает значительное улучшение на задачах мультимодального обучения и обучении с подкреплением с проверяемыми наградами по сравнению с базовыми методами.'}, 'en': {'title': 'Pion: Optimizing LLM Training with High-Pass Spectral Control', 'desc': 'This paper introduces Pion, a new optimization method for large language model (LLM) pretraining that improves upon the Muon approach. Pion utilizes a high-pass Newton-Schulz (NS) iteration to stabilize training in scenarios with low-rank and low-signal-to-noise ratio (SNR) gradients, while also allowing for efficient per-head updates. The method enhances performance in cross-modality vision-language-action (VLA) training and reinforcement learning with verifiable rewards (RLVR) by suppressing noisy gradient components. Experimental results show that Pion significantly outperforms both Muon and AdamW in various tasks, demonstrating its effectiveness in maintaining training stability and efficiency.'}, 'zh': {'title': 'Pion：优化大规模语言模型训练的新方法', 'desc': '本文提出了一种名为Pion的优化器，旨在替代Muon在大规模语言模型（LLM）预训练中的谱白化方法。Pion通过高通NS迭代机制，稳定低秩和低信噪比（SNR）条件下的训练，同时保持计算效率，并支持每个头的独立更新。与传统的均匀谱白化不同，Pion采用了双阶段的促进与抑制机制，有效地抑制了噪声成分，确保主导奇异值保持在1。实验结果表明，Pion在多模态训练和强化学习任务中均优于现有的优化器，显示出其在实际应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.23888', 'title': 'GenRecon: Bridging Generative Priors for Multi-View 3D Scene Reconstruction', 'url': 'https://huggingface.co/papers/2605.23888', 'abstract': 'Abstract A novel method for 3D scene reconstruction that integrates generative 3D priors with multi-view image conditioning to produce high-fidelity, editable mesh reconstructions of indoor environments.  AI-generated summary We introduce a new approach to high-fidelity 3D scene reconstruction from multi-view RGB images that tightly couples reconstruction with a strong generative 3D prior. We cast scene reconstruction as conditional 3D generation over a set of spatially-localized, overlapping chunks that together tile the scene, scaling generation to large scene extents. Crucially, we inherit the fidelity and completeness of state-of-the-art generative shape models -- we use Trellis.2 as an example -- which we generalize to the scene level. To this end, we propose a projection-based conditioning mechanism that lifts posed multi-view image features into a coherent 3D representation aligned with the generative model, independent of view ordering and spatially anchored to the scene, yielding high-fidelity, multi-view consistent generated geometry. This enables lifting the strong object-level prior of Trellis.2 to multi-view, scene-scale generation, producing faithful, editable PBR mesh reconstructions of indoor environments. As a result, we obtain high-fidelity results that outperform cutting-edge reconstruction methods by 16%.', 'score': 0, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '10ca562055c6fb32', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#cv', '#multimodal', '#3d'], 'emoji': '🏠', 'ru': {'title': 'Масштабируемая 3D реконструкция сцен через локальную генерацию с мультивидовым кондиционированием', 'desc': 'Авторы предлагают новый метод для 3D реконструкции сцен на основе мультивидов, который интегрирует генеративные приоры с кондиционированием по изображениям. Сцена разбивается на пересекающиеся локальные части, которые реконструируются независимо с использованием сильной генеративной модели Trellis.2. Механизм проекционного кондиционирования позволяет согласовать признаки из мультивидов в единое 3D представление, независимое от порядка камер. Метод производит высокочастотные, многовидово-согласованные и редактируемые PBR-меши внутренних помещений, превосходя существующие подходы на 16%.'}, 'en': {'title': 'Revolutionizing 3D Scene Reconstruction with Generative Models', 'desc': 'This paper presents a new method for creating detailed 3D models of indoor spaces using multiple images taken from different angles. It combines advanced generative 3D models with image data to ensure that the resulting mesh is both accurate and editable. The approach involves breaking down the scene into smaller, manageable sections, allowing for efficient processing and high-quality output. By leveraging a strong generative prior, the method achieves superior results compared to existing techniques, improving fidelity by 16%.'}, 'zh': {'title': '高保真三维场景重建的新方法', 'desc': '本文提出了一种新颖的三维场景重建方法，结合了生成性三维先验和多视图图像条件，以生成高保真、可编辑的室内环境网格重建。我们将场景重建视为在一组空间局部、重叠的块上进行条件三维生成，从而扩展到大规模场景。该方法继承了最先进的生成形状模型的保真度和完整性，并通过投影基础的条件机制，将多视图图像特征提升为与生成模型一致的三维表示。最终，我们的结果在保真度上超越了最前沿的重建方法，提升了16%。'}}}, {'id': 'https://huggingface.co/papers/2605.23901', 'title': 'LLMs as Noisy Channels: A Shannon Perspective on Model Capacity and Scaling Laws', 'url': 'https://huggingface.co/papers/2605.23901', 'abstract': 'Abstract The Shannon Scaling Law models LLM training as information transmission over a noisy channel, explaining non-monotonic performance phenomena through signal-to-noise ratio interactions and demonstrating superior predictive accuracy over traditional scaling laws.  AI-generated summary Existing scaling laws for Large Language Models (LLMs), predominantly monotonic power laws, fail to explain emerging non-monotonic phenomena such as catastrophic overtraining and quantization-induced degradation, where performance deteriorates despite increased compute.   We propose the Shannon Scaling Law, a unified theoretical framework that models LLM training as information transmission over a noisy channel, grounded in the Shannon-Hartley theorem. By mapping model parameters to channel bandwidth and training tokens to signal power, our formulation explicitly captures the interaction between learning signal and intrinsic noise. This perspective reveals a fundamental Shannon capacity for LLMs: scaling model size or data without preserving a sufficient signal-to-noise ratio (SNR) inevitably amplifies noise, inducing a transition from monotonic improvement to U-shaped performance degradation.   We validate our theory through experiments on Pythia and OLMo2 under perturbations, including Gaussian noise, quantization and supervised fine-tuning on math, QA and code tasks. The Shannon Scaling Law consistently outperforms classical scaling laws and recent perturbation-aware laws, achieving strong R^2 scores and accurately capturing loss basins missed by prior approaches. It also extrapolates: fitted on leq6.9B Pythia models with leq180B tokens, it predicts the unseen 12B model up to 307B tokens at pooled R^2{=}0.847, while monotonic baselines collapse.', 'score': 0, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '8cefbbca322df85d', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#benchmark', '#math'], 'emoji': '📊', 'ru': {'title': 'Шумный канал обучения: когда больше данных означает хуже', 'desc': 'В статье предложен закон масштабирования Shannon для больших языковых моделей, который рассматривает обучение как передачу информации по зашумленному каналу. Традиционные степенные законы масштабирования не объясняют немонотонные явления, такие как катастрофическое переобучение и деградация производительности при квантизации. Новый подход использует теорему Шеннона-Хартли для моделирования взаимодействия между сигналом обучения и внутренним шумом, связывая параметры модели с пропускной способностью канала, а токены обучения с мощностью сигнала. Экспериментальная валидация на моделях Pythia и OLMo2 показывает, что закон Shannon значительно превосходит классические законы масштабирования по точности предсказания и экстраполяции.'}, 'en': {'title': 'Unlocking LLM Training: The Shannon Scaling Law', 'desc': 'The Shannon Scaling Law provides a new way to understand how Large Language Models (LLMs) are trained by treating it as a process of transmitting information through a noisy channel. This model explains why performance can sometimes worsen even when more computational resources are used, a phenomenon not captured by traditional scaling laws. By relating model parameters to channel bandwidth and training data to signal power, it highlights the importance of maintaining a good signal-to-noise ratio (SNR) during training. Experiments show that this law predicts performance more accurately than previous models, especially in challenging scenarios involving noise and quantization.'}, 'zh': {'title': '香农缩放定律：揭示LLM训练中的信号与噪声', 'desc': '香农缩放定律将大型语言模型（LLM）的训练视为在噪声信道上的信息传输，解释了非单调性能现象。该理论通过信噪比的相互作用，揭示了模型大小或数据的扩展如果不保持足够的信噪比，必然会放大噪声，导致性能下降。我们通过对Pythia和OLMo2的实验验证了这一理论，结果显示香农缩放定律在预测准确性上优于传统的缩放法则。该定律不仅能够解释过度训练和量化引起的性能退化，还能有效捕捉到之前方法未能识别的损失盆地。'}}}, {'id': 'https://huggingface.co/papers/2605.23899', 'title': 'From Raw Experience to Skill Consumption: A Systematic Study of Model-Generated Agent Skills', 'url': 'https://huggingface.co/papers/2605.23899', 'abstract': 'Abstract Language agents benefit from reusable skills that encode domain-specific procedures, but their effectiveness varies significantly across different extraction and consumption scenarios, requiring careful evaluation and meta-skill guidance to optimize performance.  AI-generated summary Language agents increasingly improve by reusing skills -- structured procedural artifacts distilled from past experience. In particular, domain-level and model-generated skills are especially promising. They offer fast adaptation within a domain by encoding domain-specific recurring procedures, and they scale beyond labor-intensive hand-crafting. However, while extraction methods continue to proliferate, understanding remains limited, with no comprehensive study spanning the full skill lifecycle -- experience generation, skill extraction, and skill consumption -- to ask whether such skills actually work, when they work, and what makes them succeed or fail. To close this gap, we build a utility-grounded evaluation framework that provides systematic experimental results across extractors and target agents, covering five diverse agentic task domains. We find that model-generated skills are beneficial on average but exhibit non-trivial negative transfer, and that neither extractors nor targets behave uniformly. A model can be a strong extractor yet a weak consumer, or vice versa, with skill utility independent of model scale or baseline task strength. To explain these patterns, we then dissect each lifecycle stage in depth, analyzing how experience composition shapes skill quality, what properties characterize useful skills, and how the same skill transfers across different consumers. Finally, we translate these findings into a concrete meta-skill that guides skill extraction toward the features tied to actual utility, which consistently improves skill quality across domains and substantially reduces negative transfer.', 'score': 0, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '328a009638ea26d9', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#agents', '#transfer_learning', '#training', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Мастерство переиспользования: от извлечения навыков к их эффективному применению в агентах', 'desc': 'Работа исследует полный жизненный цикл переиспользуемых навыков в языковых агентах — от генерации опыта до извлечения и применения навыков. Авторы создали комплексную оценочную框架, которая систематически анализирует эффективность навыков на пяти различных задачах и обнаружила, что модели-генераторы навыков могут быть сильными извлекателями, но слабыми потребителями, и наоборот. Исследование показывает, что полезность навыков не зависит от масштаба модели и качеству выполнения базовой задачи, а отрицательный трансфер является серьёзной проблемой. Авторы предлагают мета-навык, который направляет извлечение навыков на основе признаков, связанных с реальной полезностью, что улучшает качество навыков и снижает отрицательный трансфер.'}, 'en': {'title': 'Optimizing Language Agents with Reusable Skills', 'desc': 'This paper discusses how language agents can improve their performance by reusing skills that are based on past experiences. It highlights the importance of evaluating these skills across different scenarios to understand when they work best. The authors create a framework to systematically study the entire lifecycle of skills, from generation to consumption, revealing that model-generated skills can be helpful but may also lead to negative transfer. They propose a meta-skill that enhances the extraction process, ensuring that the skills developed are more effective and reduce the chances of poor performance in different contexts.'}, 'zh': {'title': '优化语言代理技能的元技能指导', 'desc': '本文探讨了语言代理在不同场景下的技能重用问题，强调了技能的有效性因场景而异。研究表明，模型生成的技能在平均情况下是有益的，但也存在显著的负迁移现象。为了优化技能的提取和使用，本文建立了一个基于效用的评估框架，系统分析了技能生命周期的各个阶段。最后，提出了一种具体的元技能，旨在指导技能提取，提升技能质量并减少负迁移。'}}}, {'id': 'https://huggingface.co/papers/2605.23904', 'title': 'SkillOpt: Executive Strategy for Self-Evolving Agent Skills', 'url': 'https://huggingface.co/papers/2605.23904', 'abstract': 'Abstract SkillOpt introduces a systematic text-space optimizer for agent skills that trains skills as external agent state with stable updates and zero deployment inference overhead, achieving superior performance across multiple benchmarks and execution environments.  AI-generated summary Agent skills today are hand-crafted, generated one-shot, or evolved through loosely controlled self-revision, none of which behaves like a deep-learning optimizer for the skill, and none of which reliably improves over its starting point under feedback. We argue the skill should instead be trained as the external state of a frozen agent, with the same discipline that makes weight-space optimization reproducible. SkillOpt is, to our knowledge, the first systematic controllable text-space optimizer for agent skills: a separate optimizer model turns scored rollouts into bounded add/delete/replace edits on a single skill document, and an edit is accepted only when it strictly improves a held-out validation score. A textual learning-rate budget, rejected-edit buffer, and epoch-wise slow/meta update make skill training stable while adding zero inference-time model calls at deployment. Across six benchmarks, seven target models, and three execution harnesses (direct chat, Codex, Claude Code), SkillOpt is best or tied on all 52 evaluated (model, benchmark, harness) cells and beats every per-cell competitor among human, one-shot LLM, Trace2Skill, TextGrad, GEPA, and EvoSkill skills. On GPT-5.5 it lifts the average no-skill accuracy by +23.5 points in direct chat, by +24.8 inside the Codex agentic loop, and by +19.1 inside Claude Code. Transfer experiments further show that optimized skill artifacts retain value when moved across model scales, between Codex and Claude Code execution environments, and to a nearby math benchmark without further optimization.', 'score': 0, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'b26ee0731cfa8c41', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#optimization', '#benchmark', '#agents', '#transfer_learning', '#training'], 'emoji': '🎯', 'ru': {'title': 'Оптимизация навыков агентов как систематическая задача обучения внешнего состояния', 'desc': 'SkillOpt предлагает систематический оптимизатор навыков агентов в текстовом пространстве, который обучает навыки как внешнее состояние замороженного агента с использованием дисциплины, аналогичной оптимизации весов в глубоком обучении. Отдельная модель-оптимизатор преобразует оцененные траектории в контролируемые редакторские правки (добавление, удаление, замена) в документе навыка, принимая только улучшающие по валидационной метрике изменения. Метод включает текстовый бюджет обучения, буфер отклоненных правок и эпохвайз медленные обновления, обеспечивая стабильность обучения без дополнительных затрат на инференс во время развертывания. SkillOpt достигает лучших результатов на 52 комбинациях модель-бенчмарк-окружение, превосходя конкурирующие подходы и демонстрируя хорошую трансферность навыков между моделями и средами выполнения.'}, 'en': {'title': 'Revolutionizing Agent Skills with Systematic Text-Space Optimization', 'desc': 'SkillOpt is a novel approach that optimizes agent skills by treating them as an external state, allowing for stable updates without increasing deployment overhead. Unlike traditional methods that rely on hand-crafted or one-shot generated skills, SkillOpt employs a systematic text-space optimization technique that ensures improvements through controlled edits based on validation scores. This method utilizes a separate optimizer model to make precise adjustments to skill documents, ensuring that only beneficial changes are accepted. The results demonstrate significant performance gains across various benchmarks and models, showcasing the effectiveness of this new optimization strategy.'}, 'zh': {'title': '系统化的代理技能优化器', 'desc': 'SkillOpt 是一种系统化的文本空间优化器，用于代理技能的训练。它将技能视为外部代理状态，通过稳定的更新和零部署推理开销来实现优越的性能。与传统的手工制作或自我修正的技能生成方法不同，SkillOpt 采用深度学习优化器的方式进行技能训练。通过对技能文档进行有界的增删改操作，SkillOpt 在多个基准测试中表现出色，显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.23902', 'title': 'PiD: Fast and High-Resolution Latent Decoding with Pixel Diffusion', 'url': 'https://huggingface.co/papers/2605.23902', 'abstract': 'Abstract PiD introduces a pixel diffusion decoder that reformulates latent decoding as conditional pixel diffusion, enabling fast and high-quality image synthesis at high resolutions with reduced computational requirements.  AI-generated summary Most practical high-resolution text-to-image systems, including latent diffusion and autoregressive models, perform generation in a compact latent space, and a decoder maps the generated latents back to pixels. Yet the latent-to-pixel decoder is reconstruction-oriented, optimized to invert the encoder rather than synthesize more details, and becomes increasingly costly at megapixel scale. This drawback calls for a more expressive and efficient decoding paradigm. Motivated by recent progress in scalable pixel-space diffusion, we introduce PiD, a Pixel diffusion Decoder that reformulates latent decoding as conditional pixel diffusion, unifying decoding and upsampling into one generative module. By denoising directly in high-resolution pixel space, PiD synthesizes 4times and even 8times upscaled images with low latency. For latent conditioning, a lightweight sigma-aware adapter injects noise-corrupted latents into the pixel diffusion backbone, enabling PiD to decode partially denoised latents and terminate the latent diffusion process early. To further improve efficiency, we distill the model using DMD2, reducing inference to just 4 steps. PiD applies to both conventional VAE latents and semantic latents (e.g., SigLIP, DINOv2) used in recent RAE-based models. PiD decodes latents of 512 times 512 images into 2048 times 2048 pixels in under 1 second with 13 GB peak memory on a consumer RTX 5090, and as fast as 210 ms on a GB200 GPU, about 6times faster than cascaded diffusion-based super-resolution pipelines with better visual fidelity.', 'score': 0, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '6be198aa689c27d6', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#inference', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Пиксельная диффузия: быстрое и качественное декодирование для изображений высокого разрешения', 'desc': 'PiD представляет новый подход к декодированию латентного пространства, переформулируя его как условную пиксельную диффузию. Вместо традиционного декодера, оптимизированного только для реконструкции, метод синтезирует детали напрямую в пространстве высокого разрешения, одновременно выполняя апсэмплинг. Легкий адаптер с учетом шума внедряет частично зашумленные латенты в пиксельную диффузию, позволяя рано завершить процесс латентной диффузии. Модель дополнительно оптимизирована путем дистилляции, достигая генерации изображений в 4-8 раз выше разрешения с низкой задержкой и потреблением памяти.'}, 'en': {'title': 'Revolutionizing Image Synthesis with Pixel Diffusion', 'desc': 'The paper introduces PiD, a Pixel diffusion Decoder that enhances the process of converting latent representations into high-resolution images. By using conditional pixel diffusion, PiD allows for faster and more detailed image synthesis while reducing computational costs. This method combines decoding and upsampling into a single generative module, enabling efficient denoising directly in pixel space. The model achieves impressive performance, decoding images at resolutions of 2048x2048 pixels in under one second, significantly outperforming traditional methods in both speed and image quality.'}, 'zh': {'title': '像素扩散解码：高效生成高分辨率图像的创新方法', 'desc': 'PiD（像素扩散解码器）提出了一种新的解码方法，将潜在解码重新定义为条件像素扩散。这种方法能够在高分辨率下快速生成高质量图像，同时减少计算需求。通过直接在高分辨率像素空间中去噪，PiD可以以低延迟合成4倍甚至8倍放大的图像。该模型适用于传统的变分自编码器潜在空间和最近基于RAE模型的语义潜在空间，显著提高了图像生成的效率和质量。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (2)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (3)', '#cv (3)', '#data', '#dataset (1)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (2)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (4)', '#open_source (1)', '#optimization (4)', '#plp', '#rag', '#reasoning (2)', '#rl (2)', '#rlhf (1)', '#robotics (1)', '#science', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic', '#training (7)', '#transfer_learning (2)', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-25 02:39',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-25 02:39')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-25 02:39')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
