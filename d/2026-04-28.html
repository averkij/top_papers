    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.24300', 'title': 'ReVSI: Rebuilding Visual Spatial Intelligence Evaluation for Accurate Assessment of VLM 3D Reasoning', 'url': 'https://huggingface.co/papers/2604.24300', 'abstract': "Abstract ReVSI addresses flaws in current spatial intelligence evaluation by creating a validated benchmark with improved annotations and controlled frame sampling conditions.  AI-generated summary Current evaluations of spatial intelligence can be systematically invalid under modern vision-language model (VLM) settings. First, many benchmarks derive question-answer (QA) pairs from point-cloud-based 3D annotations originally curated for traditional 3D perception. When such annotations are treated as ground truth for video-based evaluation, reconstruction and annotation artifacts can miss objects that are clearly visible in the video, mislabel object identities, or corrupt geometry-dependent answers (e.g., size), yielding incorrect or ambiguous QA pairs. Second, evaluations often assume full-scene access, while many VLMs operate on sparsely sampled frames (e.g., 16-64), making many questions effectively unanswerable under the actual model inputs. We improve evaluation validity by introducing ReVSI, a benchmark and protocol that ensures each QA pair is answerable and correct under the model's actual inputs. To this end, we re-annotate objects and geometry across 381 scenes from 5 datasets to improve data quality, and regenerate all QA pairs with rigorous bias mitigation and human verification using professional 3D annotation tools. We further enhance evaluation controllability by providing variants across multiple frame budgets (16/32/64/all) and fine-grained object visibility metadata, enabling controlled diagnostic analyses. Evaluations of general and domain-specific VLMs on ReVSI reveal systematic failure modes that are obscured by prior benchmarks, yielding a more reliable and diagnostic assessment of spatial intelligence.", 'score': 25, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '0dd97ae68d233b37', 'authors': ['Yiming Zhang', 'Jiacheng Chen', 'Jiaqi Tan', 'Yongsen Mao', 'Wenhu Chen', 'Angel X. Chang'], 'affiliations': ["Huawei Noah's Ark Lab", 'Simon Fraser University', 'University of Toronto', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.24300.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#video', '#survey', '#dataset', '#cv'], 'emoji': '🎬', 'ru': {'title': 'Честная проверка пространственного мышления видеомоделей', 'desc': 'В работе предложена улучшенная методология оценки пространственного понимания видеомоделями на базе нового бенчмарка ReVSI. Авторы выявили, что существующие тесты содержат артефакты из-за несоответствия между трёхмерными аннотациями, созданными для облаков точек, и видеоданными, что приводит к некорректным вопросно-ответным парам. Кроме того, они учитывают реальные условия работы видео-языковых моделей, которые обрабатывают разреженные кадры вместо полной последовательности. Благодаря переаннотированию данных, проверке вручную и вариативности по количеству кадров бенчмарк обеспечивает более надёжную диагностику способности моделей к пространственному анализу.'}, 'en': {'title': 'ReVSI: Elevating Spatial Intelligence Evaluation for VLMs', 'desc': "The paper introduces ReVSI, a new benchmark designed to improve the evaluation of spatial intelligence in vision-language models (VLMs). It addresses issues with existing benchmarks that use outdated 3D annotations, which can lead to incorrect question-answer pairs due to mislabeling and missing objects. ReVSI ensures that each question is answerable based on the model's actual inputs by re-annotating scenes and generating new QA pairs with human verification. This benchmark also allows for controlled evaluations across different frame budgets, revealing systematic failures in VLMs that previous benchmarks overlooked."}, 'zh': {'title': 'ReVSI：提升空间智能评估的可靠性', 'desc': 'ReVSI是一个新的基准测试，旨在解决当前空间智能评估中的缺陷。它通过改进的注释和受控的帧采样条件，确保每个问答对在模型的实际输入下都是可回答和正确的。我们重新注释了来自五个数据集的381个场景中的对象和几何信息，并使用专业的3D注释工具进行严格的偏差缓解和人工验证。通过提供多种帧预算的变体和细粒度的对象可见性元数据，ReVSI增强了评估的可控性，揭示了以往基准测试所掩盖的系统性失败模式。'}}}, {'id': 'https://huggingface.co/papers/2604.24764', 'title': 'World-R1: Reinforcing 3D Constraints for Text-to-Video Generation', 'url': 'https://huggingface.co/papers/2604.24764', 'abstract': 'Abstract World-R1 framework improves video generation by incorporating 3D constraints through reinforcement learning and specialized text datasets while maintaining visual quality and scalability.  AI-generated summary Recent video foundation models demonstrate impressive visual synthesis but frequently suffer from geometric inconsistencies. While existing methods attempt to inject 3D priors via architectural modifications, they often incur high computational costs and limit scalability. We propose World-R1, a framework that aligns video generation with 3D constraints through reinforcement learning. To facilitate this alignment, we introduce a specialized pure text dataset tailored for world simulation. Utilizing Flow-GRPO, we optimize the model using feedback from pre-trained 3D foundation models and vision-language models to enforce structural coherence without altering the underlying architecture. We further employ a periodic decoupled training strategy to balance rigid geometric consistency with dynamic scene fluidity. Extensive evaluations reveal that our approach significantly enhances 3D consistency while preserving the original visual quality of the foundation model, effectively bridging the gap between video generation and scalable world simulation.', 'score': 24, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '8c5e750f990daa29', 'authors': ['Weijie Wang', 'Xiaoxuan He', 'Youping Gu', 'Yifan Yang', 'Zeyu Zhang', 'Yefei He', 'Yanbo Ding', 'Xirui Hu', 'Donny Y. Chen', 'Zhiyuan He', 'Yuqing Yang', 'Bohan Zhuang'], 'affiliations': ['Independent Researcher', 'Microsoft Research', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24764.jpg', 'data': {'categories': ['#rlhf', '#rl', '#multimodal', '#video', '#dataset', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Трёхмерная согласованность видеогенерации через обучение с подкреплением', 'desc': 'World-R1 — это фреймворк, который улучшает генерацию видео путём введения трёхмерных ограничений с помощью reinforcement learning и специализированных текстовых датасетов. Авторы используют Flow-GRPO для оптимизации модели на основе обратной связи от предобученных 3D моделей и vision-language моделей, не изменяя при этом архитектуру исходной сети. Предложенная периодическая декуплированная стратегия обучения балансирует между геометрической согласованностью и динамикой сцены. Метод существенно повышает трёхмерную консистентность видео, сохраняя качество исходной модели и приближая видеогенерацию к масштабируемой мировой симуляции.'}, 'en': {'title': 'Bridging Video Generation and 3D Consistency', 'desc': 'The World-R1 framework enhances video generation by integrating 3D constraints using reinforcement learning techniques. It addresses the common issue of geometric inconsistencies found in existing video foundation models while ensuring high visual quality and scalability. By introducing a specialized text dataset for world simulation, the framework optimizes video generation through feedback from pre-trained 3D and vision-language models. This approach not only maintains structural coherence but also balances geometric consistency with dynamic scene fluidity, leading to improved 3D consistency in generated videos.'}, 'zh': {'title': '提升视频生成的3D一致性与视觉质量', 'desc': 'World-R1框架通过强化学习和专门的文本数据集，将视频生成与3D约束相结合，从而改善视频生成效果。现有的视频基础模型在视觉合成方面表现出色，但常常存在几何不一致的问题。我们提出的World-R1框架利用Flow-GRPO优化模型，确保结构一致性，同时不改变基础架构。通过周期性解耦训练策略，我们在保持动态场景流畅性的同时，平衡了刚性几何一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.23781', 'title': 'ClawMark: A Living-World Benchmark for Multi-Turn, Multi-Day, Multimodal Coworker Agents', 'url': 'https://huggingface.co/papers/2604.23781', 'abstract': 'Abstract A benchmark for evaluating language-model agents in multi-day collaborative workflows with evolving environmental states across multiple service domains.  AI-generated summary Language-model agents are increasingly used as persistent coworkers that assist users across multiple working days. During such workflows, the surrounding environment may change independently of the agent: new emails arrive, calendar entries shift, knowledge-base records are updated, and evidence appears across images, scanned PDFs, audio, video, and spreadsheets. Existing benchmarks do not adequately evaluate this setting because they typically run within a single static episode and remain largely text-centric. We introduce , a benchmark for coworker agents built around multi-turn multi-day tasks, a stateful sandboxed service environment whose state evolves between turns, and rule-based verification. The current release contains 100 tasks across 13 professional scenarios, executed against five stateful sandboxed services (filesystem, email, calendar, knowledge base, spreadsheet) and scored by 1537 deterministic Python checkers over post-execution service state; no LLM-as-judge is invoked during scoring. We benchmark seven frontier agent systems. The strongest model reaches 75.8 weighted score, but the best strict Task Success is only 20.0\\%, indicating that partial progress is common while complete end-to-end workflow completion remains rare. Turn-level analysis shows that performance drops after the first exogenous environment update, highlighting adaptation to changing state as a key open challenge. We release the benchmark, evaluation harness, and construction pipeline to support reproducible coworker-agent evaluation.', 'score': 17, 'issue_id': 2069, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'f7a0f39155a0ee5e', 'authors': ['Fanqing Meng', 'Lingxiao Du', 'Zijian Wu', 'Guanzheng Chen', 'Xiangyan Liu', 'Jiaqi Liao', 'Chonghe Jiang', 'Zhenglin Wan', 'Jiawei Gu', 'Pengfei Zhou', 'Rui Huang', 'Ziqi Zhao', 'Shengyuan Ding', 'Ailing Yu', 'Bo Peng', 'Bowei Xia', 'Hao Sun', 'Haotian Liang', 'Ji Xie', 'Jiajun Chen', 'Jiajun Song', 'Liu Yang', 'Ming Xu', 'Qionglin Qiu', 'Runhao Fu', 'Shengfang Zhai', 'Shijian Wang', 'Tengfei Ma', 'Tianyi Wu', 'Weiyang Jin', 'Yan Wang', 'Yang Dai', 'Yao Lai', 'Youwei Shu', 'Yue Liu', 'Yunzhuo Hao', 'Yuwei Niu', 'Jinkai Huang', 'Jiayuan Zhuo', 'Zhennan Shen', 'Linyu Wu', 'Cihang Xie', 'Yuyin Zhou', 'Jiaheng Zhang', 'Zeyu Zheng', 'Mengkang Hu', 'Michael Qizhe Shieh'], 'affiliations': ['evolvent.co'], 'pdf_title_img': 'assets/pdf/title_img/2604.23781.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Оценка способности языковых моделей действовать как адаптивные рабочие помощники в изменяющейся среде', 'desc': 'В работе предлагается бенчмарк для оценки агентов на основе больших языковых моделей в многодневных рабочих процессах, где окружающая среда изменяется независимо от действий агента. Бенчмарк включает 100 задач в 13 профессиональных сценариях с пятью сервисами (файловая система, почта, календарь, база знаний, таблицы) и использует детерминированные проверки на основе состояния системы. Авторы протестировали семь современных агентских систем и обнаружили, что даже лучшие модели достигают только 20% полного успеха, в то время как производительность значительно падает после первого изменения окружения. Работа демонстрирует, что адаптация к изменяющемуся состоянию остаётся ключевой нерешённой проблемой при разработке персональных цифровых помощников.'}, 'en': {'title': 'Evaluating Language-Model Agents in Evolving Workflows', 'desc': 'This paper presents a new benchmark designed to evaluate language-model agents in collaborative workflows that span multiple days and involve changing environmental conditions. Unlike previous benchmarks that focus on static, text-based tasks, this benchmark incorporates evolving states from various service domains such as email and calendars. It includes 100 tasks across 13 professional scenarios, with performance assessed through deterministic Python checkers rather than relying on language models for evaluation. The findings reveal that while the best-performing agent achieves a weighted score of 75.8, complete task success is low, indicating significant challenges in adapting to dynamic environments.'}, 'zh': {'title': '动态环境下的语言模型代理评估基准', 'desc': '本文介绍了一种新的基准测试，用于评估语言模型代理在多天协作工作流程中的表现。这些工作流程中，环境状态会不断变化，例如新邮件的到达和日历条目的调整。现有的基准测试主要集中在静态的文本场景中，无法有效评估这种动态环境下的代理表现。我们提出的基准测试包含100个任务，涵盖13个专业场景，旨在支持对协作代理的可重复评估。'}}}, {'id': 'https://huggingface.co/papers/2604.24198', 'title': 'Rewarding the Scientific Process: Process-Level Reward Modeling for Agentic Data Analysis', 'url': 'https://huggingface.co/papers/2604.24198', 'abstract': 'Abstract DataPRM, a novel environment-aware generative process reward model, enhances LLM reasoning in dynamic data analysis by detecting silent errors and employing a reflection-aware ternary reward strategy, achieving superior performance on benchmark tasks.  AI-generated summary Process Reward Models (PRMs) have achieved remarkable success in augmenting the reasoning capabilities of Large Language Models (LLMs) within static domains such as mathematics. However, their potential in dynamic data analysis tasks remains underexplored. In this work, we first present a empirical study revealing that general-domain PRMs struggle to supervise data analysis agents. Specifically, they fail to detect silent errors, logical flaws that yield incorrect results without triggering interpreter exceptions, and erroneously penalize exploratory actions, mistaking necessary trial-and-error exploration for grounding failures. To bridge this gap, we introduce DataPRM, a novel environment-aware generative process reward model that (1) can serve as an active verifier, autonomously interacting with the environment to probe intermediate execution states and uncover silent errors, and (2) employs a reflection-aware ternary reward strategy that distinguishes between correctable grounding errors and irrecoverable mistakes. We design a scalable pipeline to construct over 8K high-quality training instances for DataPRM via diversity-driven trajectory generation and knowledge-augmented step-level annotation. Experimental results demonstrate that DataPRM improves downstream policy LLMs by 7.21% on ScienceAgentBench and 11.28% on DABStep using Best-of-N inference. Notably, with only 4B parameters, DataPRM outperforms strong baselines, and exhibits robust generalizability across diverse Test-Time Scaling strategies. Furthermore, integrating DataPRM into Reinforcement Learning yields substantial gains over outcome-reward baselines, achieving 78.73% on DABench and 64.84% on TableBench, validating the effectiveness of process reward supervision. Code is available at https://github.com/zjunlp/DataMind.', 'score': 14, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '0c1db61de634ba2e', 'authors': ['Zhisong Qiu', 'Shuofei Qiao', 'Kewei Xu', 'Yuqi Zhu', 'Lun Du', 'Ningyu Zhang', 'Huajun Chen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24198.jpg', 'data': {'categories': ['#small_models', '#rlhf', '#science', '#training', '#agents', '#benchmark', '#reasoning', '#dataset', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умная верификация процесса рассуждения в анализе данных', 'desc': 'В статье представлена DataPRM — модель вознаграждения процесса, которая улучшает способность больших языковых моделей к рассуждению в задачах анализа данных. Ключевая инновация заключается в том, что модель может активно взаимодействовать с окружением для выявления скрытых ошибок — логических ошибок, которые приводят к неправильным результатам без исключений интерпретатора. DataPRM использует стратегию трёхуровневого вознаграждения, которая различает исправляемые и неисправимые ошибки, а также не штрафует необходимые исследовательские действия модели. Экспериментальные результаты показывают значительное улучшение производительности: на 7,21% для ScienceAgentBench и на 11,28% для DABStep, при этом модель демонстрирует хорошую обобщаемость и работает эффективно даже с 4B параметрами.'}, 'en': {'title': 'Enhancing LLM Reasoning with DataPRM: A New Era in Dynamic Data Analysis', 'desc': 'The paper introduces DataPRM, a new generative process reward model designed to enhance the reasoning abilities of Large Language Models (LLMs) in dynamic data analysis. It addresses the limitations of existing Process Reward Models (PRMs) that struggle to identify silent errors and misinterpret exploratory actions as failures. DataPRM employs an environment-aware approach, actively verifying execution states to detect errors and using a reflection-aware ternary reward strategy to differentiate between correctable and irrecoverable mistakes. Experimental results show that DataPRM significantly improves the performance of LLMs on various benchmarks, demonstrating its effectiveness in dynamic environments.'}, 'zh': {'title': '提升动态数据分析的推理能力', 'desc': '本文提出了一种新颖的环境感知生成过程奖励模型DataPRM，旨在提升大型语言模型（LLM）在动态数据分析中的推理能力。DataPRM能够主动验证数据分析代理的执行状态，识别潜在的静默错误，并采用反思感知的三元奖励策略，区分可纠正的错误和不可恢复的错误。通过构建超过8000个高质量的训练实例，DataPRM在多个基准任务上表现出色，显著提高了下游策略LLM的性能。实验结果表明，DataPRM在不同的测试时间扩展策略中展现出强大的泛化能力，验证了过程奖励监督的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.23775', 'title': 'Vision-Language-Action Safety: Threats, Challenges, Evaluations, and Mechanisms', 'url': 'https://huggingface.co/papers/2604.23775', 'abstract': 'Abstract Vision-Language-Action models present unique safety challenges due to their embodied nature, requiring unified approaches across multiple domains to address threats from data poisoning to adversarial attacks and ensuring secure deployment across various applications.  AI-generated summary Vision-Language-Action (VLA) models are emerging as a unified substrate for embodied intelligence. This shift raises a new class of safety challenges, stemming from the embodied nature of VLA systems, including irreversible physical consequences, a multimodal attack surface across vision, language, and state, real-time latency constraints on defense, error propagation over long-horizon trajectories, and vulnerabilities in the data supply chain. Yet the literature remains fragmented across robotic learning, adversarial machine learning, AI alignment, and autonomous systems safety. This survey provides a unified and up-to-date overview of safety in Vision-Language-Action models. We organize the field along two parallel timing axes, attack timing (training-time vs. inference-time and defense timing (training-time vs. inference-time, linking each class of threat to the stage at which it can be mitigated. We first define the scope of VLA safety, distinguishing it from text-only LLM safety and classical robotic safety, and review the foundations of VLA models, including architectures, training paradigms, and inference mechanisms. We then examine the literature through four lenses: Attacks, Defenses, Evaluation, and Deployment. We survey training-time threats such as data poisoning and backdoors, as well as inference-time attacks including adversarial patches, cross-modal perturbations, semantic jailbreaks, and freezing attacks. We review training-time and runtime defenses, analyze existing benchmarks and metrics, and discuss safety challenges across six deployment domains. Finally, we highlight key open problems, including certified robustness for embodied trajectories, physically realizable defenses, safety-aware training, unified runtime safety architectures, and standardized evaluation.', 'score': 12, 'issue_id': 2069, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': '3d7517f3707d37a9', 'authors': ['Qi Li', 'Bo Yin', 'Weiqi Huang', 'Ruhao Liu', 'Bojun Zou', 'Runpeng Yu', 'Jingwen Ye', 'Weihao Yu', 'Xinchao Wang'], 'affiliations': ['Monash University', 'National University of Singapore', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23775.jpg', 'data': {'categories': ['#alignment', '#security', '#agents', '#robotics', '#benchmark', '#multimodal', '#survey'], 'emoji': '🤖', 'ru': {'title': 'Безопасность воплощённых мультимодальных моделей: от атак к защите', 'desc': 'В статье рассматриваются уникальные угрозы безопасности для Vision-Language-Action моделей, которые объединяют зрение, язык и управление действиями в единую систему для воплощённого интеллекта. Авторы классифицируют атаки и защиты по времени их применения: на этапе обучения (отравление данных, бэкдоры) и на этапе инференса (adversarial patches, семантические jailbreaks). Предложенный обзор охватывает различные области угроз безопасности, включая оценку уязвимостей, методы защиты и развёртывание моделей в реальных приложениях. Исследование определяет открытые проблемы, такие как гарантированная робастность для траекторий действий и стандартизированные методы оценки безопасности.'}, 'en': {'title': 'Ensuring Safety in Vision-Language-Action Models', 'desc': "This paper discusses the safety challenges associated with Vision-Language-Action (VLA) models, which integrate visual, linguistic, and action-based intelligence. It highlights the unique risks these models face, such as data poisoning and adversarial attacks, due to their embodied nature and the complexity of their multimodal interactions. The authors provide a comprehensive overview of the current state of VLA safety, categorizing threats and defenses based on when they occur during the model's lifecycle. They also identify key areas for future research, emphasizing the need for robust safety measures and standardized evaluation methods in the deployment of VLA systems."}, 'zh': {'title': '确保视觉-语言-行动模型的安全性', 'desc': '视觉-语言-行动（VLA）模型由于其具身特性，面临独特的安全挑战。这些挑战包括数据中毒、对抗攻击等多种威胁，要求在多个领域采取统一的方法来确保安全部署。本文提供了VLA模型安全性的最新概述，区分了训练时和推理时的攻击与防御，并探讨了训练时间威胁和推理时间攻击。最后，文章强调了在具身轨迹、物理可实现防御和安全意识训练等方面的关键开放问题。'}}}, {'id': 'https://huggingface.co/papers/2604.22875', 'title': 'SketchVLM: Vision language models can annotate images to explain thoughts and guide users', 'url': 'https://huggingface.co/papers/2604.22875', 'abstract': "Abstract SketchVLM is a training-free framework that enables vision-language models to generate editable SVG overlays for visual explanations, improving reasoning accuracy and annotation quality across multiple benchmarks.  AI-generated summary When answering questions about images, humans naturally point, label, and draw to explain their reasoning. In contrast, modern vision-language models (VLMs) such as Gemini-3-Pro and GPT-5 only respond with text, which can be difficult for users to verify. We present SketchVLM, a training-free, model-agnostic framework that enables VLMs to produce non-destructive, editable SVG overlays on the input image to visually explain their answers. Across seven benchmarks spanning visual reasoning (maze navigation, ball-drop trajectory prediction, and object counting) and drawing (part labeling, connecting-the-dots, and drawing shapes around objects), SketchVLM improves visual reasoning task accuracy by up to +28.5 percentage points and annotation quality by up to 1.48x relative to image-editing and fine-tuned sketching baselines, while also producing annotations that are more faithful to the model's stated answer. We find that single-turn generation already achieves strong accuracy and annotation quality, and multi-turn generation opens up further opportunities for human-AI collaboration. An interactive demo and code are at https://sketchvlm.github.io/.", 'score': 10, 'issue_id': 2069, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '4d77d7e627368880', 'authors': ['Brandon Collins', 'Logan Bolton', 'Hung Huy Nguyen', 'Mohammad Reza Taesiri', 'Trung Bui', 'Anh Totti Nguyen'], 'affiliations': ['Adobe Research', 'Auburn University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22875.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '✏️', 'ru': {'title': 'Визуальные объяснения через редактируемые чертежи', 'desc': 'SketchVLM — это фреймворк без обучения, который позволяет видео-языковым моделям генерировать редактируемые SVG-наложения для визуального объяснения своих ответов на вопросы об изображениях. Система улучшает точность рассуждений на множестве бенчмарков, включающих задачи визуального анализа (навигация в лабиринтах, предсказание траекторий, подсчёт объектов) и рисования (разметка деталей, соединение точек, обозначение объектов). Благодаря использованию модель-агностичного подхода, SketchVLM достигает прироста точности до 28,5% и улучшает качество аннотаций в 1,48 раза по сравнению с базовыми методами. Фреймворк поддерживает как односторонние, так и многоходовые режимы взаимодействия между человеком и моделью, обеспечивая более прозрачное объяснение решений VLM.'}, 'en': {'title': 'Empowering Visual Explanations with Editable SVG Overlays', 'desc': 'SketchVLM is a novel framework that enhances vision-language models by allowing them to create editable SVG overlays for visual explanations. This approach addresses the limitations of traditional models that only provide text responses, making it easier for users to verify the reasoning behind answers. By applying SketchVLM across various benchmarks, it significantly boosts the accuracy of visual reasoning tasks and improves the quality of annotations. The framework is model-agnostic and does not require additional training, facilitating better human-AI collaboration in interpreting visual data.'}, 'zh': {'title': '视觉语言模型的新突破：可编辑的SVG叠加层', 'desc': 'SketchVLM是一个无需训练的框架，能够让视觉语言模型生成可编辑的SVG叠加层，以提供视觉解释。这种方法提高了推理准确性和注释质量，适用于多个基准测试。与传统的仅用文本回答问题的视觉语言模型不同，SketchVLM允许模型在输入图像上进行非破坏性的可视化解释。通过在七个基准测试中进行评估，SketchVLM在视觉推理任务的准确性上提高了多达28.5个百分点，注释质量也显著提升。'}}}, {'id': 'https://huggingface.co/papers/2604.24763', 'title': 'Tuna-2: Pixel Embeddings Beat Vision Encoders for Multimodal Understanding and Generation', 'url': 'https://huggingface.co/papers/2604.24763', 'abstract': "Abstract Tuna-2 is a unified multimodal model that performs visual understanding and generation directly from pixel embeddings without pretrained vision encoders, achieving state-of-the-art performance in multimodal benchmarks.  AI-generated summary Unified multimodal models typically rely on pretrained vision encoders and use separate visual representations for understanding and generation, creating misalignment between the two tasks and preventing fully end-to-end optimization from raw pixels. We introduce Tuna-2, a native unified multimodal model that performs visual understanding and generation directly based on pixel embeddings. Tuna-2 drastically simplifies the model architecture by employing simple patch embedding layers to encode visual input, completely discarding the modular vision encoder designs such as the VAE or the representation encoder. Experiments show that Tuna-2 achieves state-of-the-art performance in multimodal benchmarks, demonstrating that unified pixel-space modelling can fully compete with latent-space approaches for high-quality image generation. Moreover, while the encoder-based variant converges faster in early pretraining, Tuna-2's encoder-free design achieves stronger multimodal understanding at scale, particularly on tasks requiring fine-grained visual perception. These results show that pretrained vision encoders are not necessary for multimodal modelling, and end-to-end pixel-space learning offers a scalable path toward stronger visual representations for both generation and perception.", 'score': 6, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '71bcd20561e6e71c', 'authors': ['Zhiheng Liu', 'Weiming Ren', 'Xiaoke Huang', 'Shoufa Chen', 'Tianhong Li', 'Mengzhao Chen', 'Yatai Ji', 'Sen He', 'Jonas Schult', 'Belinda Zeng', 'Tao Xiang', 'Wenhu Chen', 'Ping Luo', 'Luke Zettlemoyer', 'Yuren Cong'], 'affiliations': ['Meta AI', 'The University of Hong Kong', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.24763.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная модель без предварительно обученных энкодеров', 'desc': 'Tuna-2 — это унифицированная мультимодальная модель, которая выполняет задачи понимания и генерации изображений напрямую из пиксельных эмбеддингов, отказываясь от предварительно обученных энкодеров зрения. Модель использует простые слои patch embedding для кодирования визуальной информации, полностью устраняя модульные архитектуры как VAE и representation encoder. Благодаря сквозному обучению в пиксельном пространстве Tuna-2 достигает результатов на уровне state-of-the-art в мультимодальных бенчмарках и конкурирует с подходами в латентном пространстве. Эксперименты показывают, что предварительно обученные энкодеры зрения не являются необходимыми для мультимодального моделирования, а сквозное обучение открывает масштабируемый путь к более сильным визуальным представлениям.'}, 'en': {'title': 'Tuna-2: Revolutionizing Multimodal Learning from Pixels', 'desc': 'Tuna-2 is a novel multimodal model that directly processes pixel embeddings for both visual understanding and generation, eliminating the need for pretrained vision encoders. This approach addresses the misalignment issues found in traditional models that use separate visual representations for different tasks. By utilizing simple patch embedding layers, Tuna-2 simplifies its architecture while achieving state-of-the-art results in multimodal benchmarks. The findings suggest that end-to-end learning from raw pixels can outperform conventional latent-space methods, particularly in tasks requiring detailed visual perception.'}, 'zh': {'title': 'Tuna-2：无编码器的多模态新突破', 'desc': 'Tuna-2是一种统一的多模态模型，能够直接从像素嵌入中进行视觉理解和生成，而无需预训练的视觉编码器。与传统模型依赖于预训练视觉编码器不同，Tuna-2通过简单的补丁嵌入层来编码视觉输入，简化了模型架构。实验表明，Tuna-2在多模态基准测试中表现出色，证明了基于像素空间的建模可以与潜在空间方法竞争。该模型的无编码器设计在大规模任务中实现了更强的多模态理解，尤其是在需要细致视觉感知的任务上。'}}}, {'id': 'https://huggingface.co/papers/2604.24762', 'title': 'OmniShotCut: Holistic Relational Shot Boundary Detection with Shot-Query Transformer', 'url': 'https://huggingface.co/papers/2604.24762', 'abstract': 'Abstract OmniShotCut formulates shot boundary detection as structured relational prediction using a shot query-based dense video Transformer, addressing limitations of existing methods through synthetic transition generation and a comprehensive benchmark.  AI-generated summary Shot Boundary Detection (SBD) aims to automatically identify shot changes and divide a video into coherent shots. While SBD was widely studied in the literature, existing state-of-the-art methods often produce non-interpretable boundaries on transitions, miss subtle yet harmful discontinuities, and rely on noisy, low-diversity annotations and outdated benchmarks. To alleviate these limitations, we propose OmniShotCut to formulate SBD as structured relational prediction, jointly estimating shot ranges with intra-shot relations and inter-shot relations, by a shot query-based dense video Transformer. To avoid imprecise manual labeling, we adopt a fully synthetic transition synthesis pipeline that automatically reproduces major transition families with precise boundaries and parameterized variants. We also introduce OmniShotCutBench, a modern wide-domain benchmark enabling holistic and diagnostic evaluation.', 'score': 2, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '083e67173df1abef', 'authors': ['Boyang Wang', 'Guangyi Xu', 'Zhipeng Tang', 'Jiahui Zhang', 'Zezhou Cheng'], 'affiliations': ['University of Massachusetts Amherst', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2604.24762.jpg', 'data': {'categories': ['#synthetic', '#benchmark', '#video', '#architecture', '#dataset', '#interpretability'], 'emoji': '🎬', 'ru': {'title': 'Структурированное предсказание границ кадров через синтетические переходы и трансформеры', 'desc': 'В статье предложен метод OmniShotCut для обнаружения границ кадров в видео, сформулированный как задача структурированного реляционного предсказания с использованием трансформера на основе запросов о кадрах. Авторы вводят полностью синтетический конвейер генерации переходов, который автоматически воспроизводит основные типы переходов с точными границами, избегая неточной ручной разметки. Метод совместно оценивает диапазоны кадров с учётом внутри-кадровых и между-кадровых отношений через плотный видео-трансформер. Кроме того, представлен новый бенчмарк OmniShotCutBench для комплексной оценки методов обнаружения границ кадров на разнообразных видео.'}, 'en': {'title': 'Revolutionizing Shot Boundary Detection with OmniShotCut', 'desc': 'OmniShotCut presents a new approach to shot boundary detection (SBD) by treating it as structured relational prediction. This method utilizes a shot query-based dense video Transformer to improve the accuracy of identifying shot changes in videos. It addresses the shortcomings of previous techniques, such as non-interpretable boundaries and reliance on low-quality annotations, by employing a synthetic transition generation pipeline. Additionally, the introduction of OmniShotCutBench provides a comprehensive benchmark for evaluating SBD methods across diverse scenarios.'}, 'zh': {'title': 'OmniShotCut：精准的镜头边界检测新方法', 'desc': 'OmniShotCut将镜头边界检测视为结构化关系预测，使用基于镜头查询的密集视频Transformer来解决现有方法的局限性。该方法通过合成过渡生成和全面基准测试，自动识别视频中的镜头变化并将其划分为连贯的镜头。与传统方法相比，OmniShotCut能够更准确地估计镜头范围，并处理镜头内和镜头间的关系。我们还引入了OmniShotCutBench，一个现代化的广域基准，支持全面和诊断性的评估。'}}}, {'id': 'https://huggingface.co/papers/2604.24003', 'title': 'Stabilizing Efficient Reasoning with Step-Level Advantage Selection', 'url': 'https://huggingface.co/papers/2604.24003', 'abstract': 'Abstract Short-context post-training induces reasoning compression but causes instability; Step-level Advantage Selection addresses this by selectively adjusting reasoning steps based on confidence and verification outcomes, improving accuracy-efficiency trade-off in reasoning tasks.  AI-generated summary Large language models (LLMs) achieve strong reasoning performance by allocating substantial computation at inference time, often generating long and verbose reasoning traces. While recent work on efficient reasoning reduces this overhead through length-based rewards or pruning, many approaches are post-trained under a much shorter context window than base-model training, a factor whose effect has not been systematically isolated. We first show that short-context post-training alone, using standard GRPO without any length-aware objective, already induces substantial reasoning compression-but at the cost of increasingly unstable training dynamics and accuracy degradation. To address this, we propose Step-level Advantage Selection (SAS), which operates at the reasoning-step level and assigns a zero advantage to low-confidence steps in correct rollouts and to high-confidence steps in verifier-failed rollouts, where failures often arise from truncation or verifier issues rather than incorrect reasoning. Across diverse mathematical and general reasoning benchmarks, SAS improves average Pass@1 accuracy by 0.86 points over the strongest length-aware baseline while reducing average reasoning length by 16.3%, yielding a better accuracy-efficiency trade-off.', 'score': 2, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '7d299c5cb6583af8', 'authors': ['Han Wang', 'Xiaodong Yu', 'Jialian Wu', 'Jiang Liu', 'Ximeng Sun', 'Mohit Bansal', 'Zicheng Liu'], 'affiliations': ['Advanced Micro Devices, Inc.', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2604.24003.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Умное сокращение рассуждений через выбор шагов по уверенности', 'desc': 'В статье исследуется проблема сжатия рассуждений в больших языковых моделях при обучении на коротком контексте, которое улучшает эффективность, но делает обучение нестабильным. Авторы предлагают метод Step-level Advantage Selection (SAS), который работает на уровне отдельных шагов рассуждения и избирательно корректирует их на основе уверенности модели и результатов проверки. Метод SAS присваивает нулевое преимущество неуверенным шагам в корректных последовательностях и уверенным шагам в неудачных последовательностях, различая ошибки усечения от настоящих логических ошибок. Предложенный подход достигает лучшего баланса между точностью и эффективностью, повышая точность на 0,86 пункта при одновременном сокращении длины рассуждения на 16,3%.'}, 'en': {'title': 'Optimizing Reasoning Steps for Better AI Performance', 'desc': 'This paper discusses a method called Step-level Advantage Selection (SAS) that improves reasoning in large language models (LLMs) by managing the steps taken during reasoning tasks. It highlights the problem of short-context post-training, which compresses reasoning but leads to instability and lower accuracy. SAS selectively adjusts reasoning steps based on their confidence and verification results, allowing the model to focus on more reliable steps. The results show that SAS enhances accuracy while also reducing the length of reasoning, achieving a better balance between accuracy and efficiency.'}, 'zh': {'title': '逐步优势选择：提升推理准确性与效率的关键', 'desc': '这篇论文探讨了短上下文后训练对推理过程的影响，发现它会导致推理压缩和训练不稳定。为了解决这个问题，提出了逐步优势选择（SAS）方法，通过根据置信度和验证结果选择性调整推理步骤。SAS在推理步骤层面上工作，能够提高推理的准确性和效率。实验结果表明，SAS在多个数学和一般推理基准上显著提高了准确率，同时减少了推理长度。'}}}, {'id': 'https://huggingface.co/papers/2604.23099', 'title': 'ProEval: Proactive Failure Discovery and Efficient Performance Estimation for Generative AI Evaluation', 'url': 'https://huggingface.co/papers/2604.23099', 'abstract': 'Abstract ProEval uses transfer learning with pre-trained Gaussian Processes and Bayesian quadrature to efficiently evaluate generative AI models by identifying failure cases with significantly fewer samples than traditional methods.  AI-generated summary Evaluating generative AI models is increasingly resource-intensive due to slow inference, expensive raters, and a rapidly growing landscape of models and benchmarks. We propose ProEval, a proactive evaluation framework that leverages transfer learning to efficiently estimate performance and identify failure cases. ProEval employs pre-trained Gaussian Processes (GPs) as surrogates for the performance score function, mapping model inputs to metrics such as the severity of errors or safety violations. By framing performance estimation as Bayesian quadrature (BQ) and failure discovery as superlevel set sampling, we develop uncertainty-aware decision strategies that actively select or synthesize highly informative inputs for testing. Theoretically, we prove that our pre-trained GP-based BQ estimator is unbiased and bounded. Empirically, extensive experiments on reasoning, safety alignment, and classification benchmarks demonstrate that ProEval is significantly more efficient than competitive baselines. It requires 8-65x fewer samples to achieve estimates within 1% of the ground truth, while simultaneously revealing more diverse failure cases under a stricter evaluation budget.', 'score': 1, 'issue_id': 2069, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '0fb0763a48865807', 'authors': ['Yizheng Huang', 'Wenjun Zeng', 'Aditi Kumaresan', 'Zi Wang'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2604.23099.jpg', 'data': {'categories': ['#alignment', '#transfer_learning'], 'emoji': '🎯', 'ru': {'title': 'Экономная оценка AI-моделей через байесовскую оптимизацию', 'desc': 'ProEval — это фреймворк для эффективной оценки генеративных моделей AI, использующий трансфер-обучение с предварительно обученными гауссовыми процессами в качестве суррогатных моделей. Метод формулирует задачу оценки производительности как байесовскую квадратуру и поиск отказов как выборку множеств уровня, позволяя активно выбирать информативные примеры для тестирования. Авторы теоретически доказывают несмещённость и ограниченность предложенного оценивателя, основанного на предварительно обученных гауссовых процессах. Экспериментально показано, что ProEval требует в 8-65 раз меньше образцов для достижения оценок в пределах 1% от истинного значения, одновременно выявляя более разнообразные случаи отказа.'}, 'en': {'title': 'ProEval: Efficient Evaluation of Generative AI Models with Transfer Learning', 'desc': 'ProEval is a novel framework designed to enhance the evaluation of generative AI models by utilizing transfer learning techniques. It employs pre-trained Gaussian Processes to create a surrogate model that predicts performance metrics, allowing for efficient identification of failure cases. By applying Bayesian quadrature, ProEval optimizes the selection of test inputs, ensuring that fewer samples are needed to achieve accurate performance estimates. The framework has been shown to be significantly more efficient than traditional methods, requiring up to 65 times fewer samples while uncovering a wider range of failure scenarios.'}, 'zh': {'title': 'ProEval：高效评估生成式AI模型的创新框架', 'desc': 'ProEval是一种利用迁移学习的评估框架，旨在高效评估生成式人工智能模型。它使用预训练的高斯过程作为性能评分函数的替代，能够将模型输入映射到错误严重性或安全违规等指标。通过将性能估计视为贝叶斯积分，并将失败发现视为超水平集采样，ProEval能够主动选择或合成高信息量的测试输入。实验结果表明，ProEval在评估效率上显著优于传统方法，所需样本量减少了8到65倍，同时能够发现更多样化的失败案例。'}}}, {'id': 'https://huggingface.co/papers/2604.21480', 'title': 'Efficient Agent Evaluation via Diversity-Guided User Simulation', 'url': 'https://huggingface.co/papers/2604.21480', 'abstract': 'Abstract DIVERT is a coverage-guided user simulation framework that efficiently evaluates large language models by reusing conversation prefixes and exploring diverse interaction paths through branching trajectories.  AI-generated summary Large language models (LLMs) are increasingly deployed as customer-facing agents, yet evaluating their reliability remains challenging due to stochastic, multi-turn interactions. Current evaluation protocols rely on linear Monte Carlo rollouts of complete agent-user conversations to estimate success. However, this approach is computationally inefficient, repeatedly regenerating identical early prefixes, and often fails to uncover deep failure modes that arise from rare user behaviors.   We introduce DIVERT (Diversity-Induced Evaluation via Branching of Trajectories), an efficient, snapshot-based, coverage-guided user simulation framework for systematic exploration of agent-user interactions. DIVERT captures the full agent-environment state at critical decision points and resumes execution from these snapshots, enabling reuse of shared conversation prefixes and reducing redundant computation. From each junction, the framework branches using targeted, diversity-inducing user responses, allowing directed exploration of alternative interaction paths.   By focusing evaluation on semantically diverse and underexplored trajectories, DIVERT improves both efficiency and coverage. Empirical results show that it discovers more failures per token compared to standard linear rollout protocols, while expanding the set of tasks on which failures are identified.', 'score': 1, 'issue_id': 2069, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '35cfec857c6860f9', 'authors': ['Itay Nakash', 'George Kour', 'Ateret Anaby-Tavor'], 'affiliations': ['IBM'], 'pdf_title_img': 'assets/pdf/title_img/2604.21480.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🌳', 'ru': {'title': 'Ветвящаяся оценка: эффективное обнаружение отказов LLM через переиспользование префиксов', 'desc': 'DIVERT — это фреймворк для оценки больших языковых моделей, который использует техники ветвления траекторий и повторного использования префиксов диалогов. Вместо линейного воспроизведения полных разговоров, метод создаёт снимки состояния агента-LLM в критических точках и запускает выполнение с этих сохранённых позиций. Из каждой точки ветвления система исследует разнообразные пути взаимодействия, генерируя целенаправленные ответы пользователя для покрытия редких сценариев отказа. Такой подход значительно снижает вычислительные затраты и выявляет больше сбоев в поведении моделей по сравнению со стандартными методами оценки.'}, 'en': {'title': 'Efficiently Evaluating Language Models with Diverse User Simulations', 'desc': 'DIVERT is a user simulation framework designed to evaluate large language models (LLMs) more efficiently by reusing conversation prefixes and exploring various interaction paths. It addresses the limitations of traditional evaluation methods that rely on linear Monte Carlo rollouts, which can be computationally expensive and may miss rare failure modes. By capturing the agent-environment state at key decision points and branching from these snapshots, DIVERT allows for targeted exploration of diverse user responses. This approach not only enhances the efficiency of the evaluation process but also improves the coverage of potential failure scenarios in LLMs.'}, 'zh': {'title': 'DIVERT：高效评估大型语言模型的创新框架', 'desc': 'DIVERT是一个覆盖引导的用户模拟框架，旨在高效评估大型语言模型。它通过重用对话前缀和探索多样化的交互路径，解决了传统评估方法的低效问题。该框架在关键决策点捕捉完整的代理-环境状态，并从这些快照恢复执行，从而减少冗余计算。通过关注语义多样性和未充分探索的轨迹，DIVERT提高了评估的效率和覆盖率。'}}}, {'id': 'https://huggingface.co/papers/2604.24479', 'title': 'Zero-to-CAD: Agentic Synthesis of Interpretable CAD Programs at Million-Scale Without Real Data', 'url': 'https://huggingface.co/papers/2604.24479', 'abstract': "Abstract A scalable framework synthesizes executable CAD construction sequences by framing the process as an agentic search problem using large language models within a feedback-driven CAD environment.  AI-generated summary Computer-Aided Design (CAD) models are defined by their construction history: a parametric recipe that encodes design intent. However, existing large-scale 3D datasets predominantly consist of boundary representations (B-Reps) or meshes, stripping away this critical procedural information. To address this scarcity, we introduce Zero-to-CAD, a scalable framework for synthesizing executable CAD construction sequences. We frame synthesis as an agentic search problem: by embedding a large language model (LLM) within a feedback-driven CAD environment, our system iteratively generates, executes, and validates code using tools and documentation lookup to promote geometric validity and operation diversity. This agentic approach enables the synthesis of approximately one million executable, readable, editable CAD sequences, covering a rich vocabulary of operations beyond sketch-and-extrude workflows. We also release a curated subset of 100,000 high-quality models selected for geometric diversity. To demonstrate the dataset's utility, we fine-tune a vision-language model on our synthetic data to reconstruct editable CAD programs from multi-view images, outperforming strong baselines, including GPT-5.2, and effectively bootstrapping sequence generation capabilities without real construction-history training data. Zero-to-CAD bridges the gap between geometric scale and parametric interpretability, offering a vital resource for the next generation of CAD AI.", 'score': 0, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '57e26848c768c2b9', 'authors': ['Mohammadmehdi Ataei', 'Farzaneh Askari', 'Kamal Rahimi Malekshan', 'Pradeep Kumar Jayaraman'], 'affiliations': ['Autodesk Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.24479.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🏗️', 'ru': {'title': 'От нулевого знания к выполняемым CAD-программам через агентный поиск', 'desc': 'В работе предложена масштабируемая система Zero-to-CAD для синтеза исполняемых последовательностей построения CAD-моделей, используя большие языковые модели в качестве агента в среде обратной связи. Система итеративно генерирует, выполняет и валидирует код, используя инструменты и документацию для обеспечения геометрической корректности и разнообразия операций. На основе этого подхода создан датасет из примерно одного миллиона исполняемых CAD-последовательностей и отобран куратированный подмножество из 100 тысяч высококачественных моделей. Авторы демонстрируют практическую ценность датасета, обучив vision-language модель реконструировать редактируемые CAD-программы из мультивидовых изображений, превосходя сильные baseline-ы.'}, 'en': {'title': 'Revolutionizing CAD with AI-Driven Construction Sequences', 'desc': 'This paper presents Zero-to-CAD, a framework that uses large language models to create executable construction sequences for Computer-Aided Design (CAD). It addresses the lack of procedural information in existing 3D datasets by framing the synthesis process as an agentic search problem within a feedback-driven environment. The system generates and validates CAD code iteratively, resulting in nearly one million diverse and executable sequences. Additionally, a curated dataset of 100,000 high-quality models is provided, which enhances the training of vision-language models for reconstructing CAD programs from images.'}, 'zh': {'title': 'Zero-to-CAD：构建可执行CAD序列的新框架', 'desc': '本文提出了一种可扩展的框架Zero-to-CAD，用于合成可执行的计算机辅助设计（CAD）构建序列。该框架将合成过程视为一个代理搜索问题，利用大型语言模型（LLM）在反馈驱动的CAD环境中进行迭代生成、执行和验证代码。通过这种方法，我们生成了大约一百万个可执行、可读和可编辑的CAD序列，涵盖了丰富的操作词汇。该研究为CAD AI的下一代发展提供了重要资源，弥补了几何规模与参数可解释性之间的差距。'}}}, {'id': 'https://huggingface.co/papers/2604.22782', 'title': 'Stochastic KV Routing: Enabling Adaptive Depth-Wise Cache Sharing', 'url': 'https://huggingface.co/papers/2604.22782', 'abstract': "Abstract Transformer language models can reduce KV cache memory requirements through random cross-layer attention during training, enabling efficient depth-wise cache sharing without performance loss.  AI-generated summary Serving transformer language models with high throughput requires caching Key-Values (KVs) to avoid redundant computation during autoregressive generation. The memory footprint of KV caching is significant and heavily impacts serving costs. This work proposes to lessen these memory requirements. While recent work has largely addressed KV cache reduction via compression and eviction along the temporal axis, we argue that the depth dimension offers an orthogonal and robust avenue for optimization. Although prior research suggests that a full cache for every layer is redundant, implementing cross-layer cache sharing remains a practical challenge; existing methods typically suffer from reduced throughput or increased time-to-first-token. In this paper, we demonstrate that dropping a layer's cache offers efficient optimization without information loss. We propose a simple training approach: random cross-layer attention. During training, layers randomly choose to attend either to their own KV states or those of a preceding layer. This stochastic process adapts the model to be robust to various depth-wise cache sharing strategies, ensuring flexibility for unknown hardware constraints at deployment time. Our evaluations show that applying this scheme during pre-training or fine-tuning enables depth-wise cache sharing for various model families. Furthermore, for larger models in data-constrained settings, this approach is suggestive of a regularization-like effect, frequently preserving or improving performance while significantly reducing the cache's memory footprint.", 'score': 0, 'issue_id': 2069, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': 'daa2f2c9dc6229f4', 'authors': ['Anastasiia Filippova', 'David Grangier', 'Marco Cuturi', 'João Monteiro'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2604.22782.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Общий кэш для нескольких слоёв трансформера через случайное кросс-слойное внимание', 'desc': 'В работе предложен метод снижения требований к памяти KV-кэша в трансформер языковых моделях за счёт случайного кросс-слойного внимания во время обучения. Во время обучения слои модели случайно выбирают, на какие KV-состояния обращать внимание: на собственные или на состояния предыдущего слоя. Такой стохастический процесс делает модель устойчивой к различным стратегиям распределения кэша между слоями, обеспечивая гибкость при развёртывании на разных аппаратных платформах. Метод позволяет значительно сократить объём памяти для кэша без потери качества или производительности модели.'}, 'en': {'title': 'Efficient Memory Optimization in Transformers through Cross-Layer Cache Sharing', 'desc': 'This paper introduces a method to reduce the memory needed for caching Key-Values (KVs) in transformer language models during autoregressive generation. By using random cross-layer attention during training, the model can share cache across different layers, which helps in optimizing memory usage without losing performance. The authors argue that this approach is more effective than previous methods that focused on temporal cache reduction. Their experiments show that this technique not only decreases memory requirements but can also enhance model performance, especially in larger models with limited data.'}, 'zh': {'title': '优化变换器模型的内存使用', 'desc': '本文提出了一种新的训练方法，称为随机跨层注意力，旨在减少变换器语言模型在自回归生成过程中的键值（KV）缓存内存需求。通过在训练过程中随机选择层来关注自身的KV状态或前一层的KV状态，模型能够灵活适应不同的深度缓存共享策略。研究表明，这种方法在预训练或微调阶段应用时，可以有效实现深度缓存共享，并在数据受限的情况下保持或提高模型性能，同时显著降低缓存的内存占用。总之，本文为优化KV缓存提供了一种新的思路，强调了深度维度的优化潜力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment (2)', '#architecture (2)', '#audio', '#benchmark (6)', '#cv (3)', '#data', '#dataset (4)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (2)', '#optimization (2)', '#plp', '#rag', '#reasoning (3)', '#rl (1)', '#rlhf (2)', '#robotics (1)', '#science (1)', '#security (1)', '#small_models (1)', '#story_generation', '#survey (2)', '#synthetic (2)', '#training (1)', '#transfer_learning (1)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-28 05:52',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-28 05:52')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-28 05:52')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
