    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.31584', 'title': 'LongTraceRL: Learning Long-Context Reasoning from Search Agent Trajectories with Rubric Rewards', 'url': 'https://huggingface.co/papers/2605.31584', 'abstract': 'Abstract LongTraceRL addresses long-context reasoning challenges in large language models through tiered distractor construction and rubric reward design for improved reasoning quality.  AI-generated summary Long-context reasoning remains a central challenge for large language models, which often fail to locate and integrate key information in extensive distracting content. Reinforcement learning with verifiable rewards (RLVR) has shown promise for this task, yet existing methods are limited by low-confusability distractors and sparse, outcome-only reward signals that cannot supervise intermediate reasoning steps. To address these issues, we introduce LongTraceRL. For data construction, we generate multi-hop questions via knowledge graph random walks and leverage search agent trajectories to build tiered distractors: documents the agent read but did not cite (high confusability) and documents that appeared in search results but were never opened (low confusability), producing training contexts that are far more challenging than those built by random sampling or one-shot search. For reward design, we propose a rubric reward that uses the gold entities along each reasoning chain as fine-grained, entity-level process supervision. This rubric reward is applied only to responses with correct final answers (positive-only strategy), distinguishing the reasoning quality among correct responses and preventing reward hacking. Experiments on three reasoning LLMs (4B--30B) across five long-context benchmarks demonstrate that LongTraceRL consistently outperforms strong baselines and encourages comprehensive, evidence-grounded reasoning. Codes, datasets and models are available at https://github.com/THU-KEG/LongTraceRL{https://github.com/THU-KEG/LongTraceRL}.', 'score': 13, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'f6b483aa0b5d92aa', 'authors': ['Nianyi Lin', 'Jiajie Zhang', 'Lei Hou', 'Juanzi Li'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31584.jpg', 'data': {'categories': ['#benchmark', '#training', '#long_context', '#rlhf', '#dataset', '#optimization', '#open_source', '#reasoning', '#rl'], 'emoji': '🔍', 'ru': {'title': 'Усиленное обучение для точного поиска информации в длинном контексте', 'desc': 'LongTraceRL — это метод обучения с подкреплением для улучшения способности больших языковых моделей решать задачи длинного контекста. Авторы предлагают двухуровневую конструкцию отвлекающих документов: сложные отвлекающие элементы (документы, которые агент прочитал, но не использовал) и простые (документы из результатов поиска, которые вообще не открывали). Для оценки качества рассуждений применяется рубрик-награда на основе контрольных сущностей вдоль цепочки рассуждений, что позволяет контролировать промежуточные этапы решения. Экспериментальная оценка на пяти бенчмарках показывает значительное улучшение качества рассуждений по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with LongTraceRL', 'desc': "LongTraceRL is a novel approach designed to enhance long-context reasoning in large language models by constructing tiered distractors and implementing a rubric reward system. It addresses the limitations of existing reinforcement learning methods, which often struggle with low-confusability distractors and sparse rewards that do not guide intermediate reasoning. By generating multi-hop questions and using knowledge graph random walks, LongTraceRL creates more challenging training contexts that improve the model's ability to integrate key information. The proposed rubric reward provides fine-grained supervision, ensuring that only responses with correct final answers receive positive reinforcement, which leads to better reasoning quality and performance on long-context benchmarks."}, 'zh': {'title': '提升长上下文推理质量的创新方法', 'desc': 'LongTraceRL 旨在解决大型语言模型在长上下文推理中的挑战。通过构建分层干扰项和设计细致的奖励机制，提升推理质量。该方法生成多跳问题，并利用知识图谱和搜索代理轨迹来创建更具挑战性的训练数据。实验结果表明，LongTraceRL 在多个长上下文基准测试中表现优于现有方法，促进了全面且基于证据的推理。'}}}, {'id': 'https://huggingface.co/papers/2605.30819', 'title': 'Function2Scene: 3D Indoor Scene Layout from Functional Specifications', 'url': 'https://huggingface.co/papers/2605.30819', 'abstract': 'Abstract Function2Scene generates 3D indoor layouts from functional descriptions by parsing user needs and applying design constraints through an iterative refinement process combining geometric analysis, language modeling, and visual assessment.  AI-generated summary Most text-driven 3D indoor scene synthesis methods generate rooms from object-centric prompts, asking what furniture should be placed rather than how the space is used. Yet in real interior design, a layout is judged by how well it supports its occupants, e.g., their activities and physical needs. We introduce Function2Scene, a framework for generating 3D indoor layouts from functional specifications, i.e., natural-language design briefs describing who will use a room and what they need to do there. Given such a specification, our system parses occupant personas and activities, derives a customized set of functional design constraints from a taxonomy of 17 criteria spanning spatial, ergonomic, activity, and environmental considerations, and uses these constraints to guide layout generation. Rather than relying on an LLM to directly produce a final scene, Function2Scene performs iterative evaluation and refinement through a tool-augmented check-and-repair loop, combining geometric measurements, LLM-based contextual reasoning, and VLM-based visual assessment. Experiments on 30 professionally written interior-design cases show that Function2Scene produces layouts that better satisfy functional requirements than recent LLM-based scene synthesis baselines, with our results preferred in 94.3% of pairwise comparisons. Our work reframes text-driven indoor scene synthesis from placing plausible objects to designing spaces that support human use.', 'score': 11, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '69c29d8bc189ee92', 'authors': ['Ruiqi Wang', 'Qimin Chen', 'Daniel Ritchie', 'Angel X. Chang', 'Manolis Savva', 'Kai Wang', 'Hao Zhang'], 'affiliations': ['Brown University, USA', 'ShanghaiTech University, China', 'Simon Fraser University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2605.30819.jpg', 'data': {'categories': ['#multimodal', '#3d'], 'emoji': '🏠', 'ru': {'title': 'От объектов к функциям: дизайн интерьеров, ориентированный на человека', 'desc': "Function2Scene — это система для генерации 3D планировок интерьеров на основе функциональных описаний на естественном языке. Система парсит описания потребностей пользователей и применяет набор дизайн-констрейнтов, охватывающих пространственные, эргономические и экологические критерии. Итеративный процесс уточнения использует геометрический анализ, рассуждения на основе языковых моделей и визуальную оценку через мультимодальные модели. Результаты показывают, что метод значительно лучше удовлетворяет функциональным требованиям по сравнению с существующими baseline'ами, основанными на LLM."}, 'en': {'title': 'Designing Spaces for People, Not Just Objects', 'desc': 'Function2Scene is a novel framework that generates 3D indoor layouts based on functional descriptions, focusing on how spaces are used rather than just what objects are present. It analyzes user needs by parsing natural language design briefs to understand occupant personas and their activities. The system derives specific design constraints from a comprehensive taxonomy, ensuring that the generated layouts meet various spatial and ergonomic requirements. By employing an iterative refinement process that combines geometric analysis, language modeling, and visual assessment, Function2Scene outperforms traditional methods in creating functional and user-centered interior designs.'}, 'zh': {'title': '功能驱动的室内布局设计', 'desc': 'Function2Scene 是一个生成 3D 室内布局的框架，它通过解析用户需求和应用设计约束来实现。该系统从自然语言设计简报中提取使用者角色和活动，并根据 17 个标准的功能设计约束生成定制布局。与直接生成最终场景的 LLM 方法不同，Function2Scene 采用迭代评估和修正的方式，结合几何测量、基于 LLM 的上下文推理和基于 VLM 的视觉评估。实验结果表明，Function2Scene 生成的布局在满足功能需求方面优于现有的 LLM 基线方法。'}}}, {'id': 'https://huggingface.co/papers/2605.30407', 'title': 'Exploring Autonomous Agentic Data Engineering for Model Specialization', 'url': 'https://huggingface.co/papers/2605.30407', 'abstract': 'Abstract Large language models can autonomously execute end-to-end data engineering pipelines for model specialization through iterative data adaptation and optimization.  AI-generated summary Large Language Models (LLMs) have demonstrated strong performance on general tasks, while often struggling to adapt to specialized domains without high-quality domain-specific data. Existing LLM-based data curation methods primarily rely on human-designed workflows, leaving it unexamined whether LLMs can autonomously execute an end-to-end data engineering pipeline for model specialization. We formalize Autonomous Agentic Data Engineering, a novel task designed to evaluate LLMs as autonomous data engineers that drive model specialization through end-to-end data curation. We frame data as an optimizable component and study agents that plan, generate, and iteratively optimize training data across multiple domains, guided by post-training performance improvement. Experiments show that autonomous LLM data engineers yield substantial gains, as GPT-5.2 constructs a training curriculum that improves a student model by 57.29\\%, entirely through iterative, agent-driven data adaptation. By illuminating both potential and bottlenecks, our study establishes autonomous data engineering as a measurable capability and charts a path toward agent-driven model specializationCode will be released at https://github.com/zjunlp/DataAgent..', 'score': 6, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '8a858886470835a7', 'authors': ['Yujie Luo', 'Xiangyuan Ru', 'Jingsheng Zheng', 'Jingjing Wang', 'Yuqi Zhu', 'Jintian Zhang', 'Runnan Fang', 'Kewei Xu', 'Ye Liu', 'Zheng Wei', 'Jiang Bian', 'Zang Li', 'Shumin Deng'], 'affiliations': ['Tencent', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30407.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Языковые модели как автономные инженеры данных для специализации моделей', 'desc': 'В работе предлагается новая задача Autonomous Agentic Data Engineering, где языковые модели (LLM) выступают в роли автономных инженеров данных, самостоятельно управляя процессом подготовки обучающих данных для специализации моделей. Исследование показывает, что LLM-агенты могут планировать, генерировать и итеративно оптимизировать данные обучения, руководствуясь улучшением производительности модели после обучения. Эксперименты демонстрируют, что GPT-4.5 конструирует учебный цикл, который улучшает студенческую модель на 57.29% исключительно через итеративную адаптацию данных, управляемую агентом. Работа устанавливает автономную инженерию данных как измеримую способность и намечает путь к специализации моделей, управляемой агентами.'}, 'en': {'title': 'Empowering LLMs as Autonomous Data Engineers for Model Specialization', 'desc': 'This paper introduces a new approach called Autonomous Agentic Data Engineering, which allows large language models (LLMs) to independently manage data engineering tasks for model specialization. The study investigates how LLMs can autonomously curate and optimize training data without relying on human intervention. By treating data as an optimizable resource, the research demonstrates that LLMs can effectively plan and generate data that enhances model performance. The results show significant improvements in model training, highlighting the potential of LLMs as autonomous data engineers in various domains.'}, 'zh': {'title': '自主数据工程：推动模型专业化的未来', 'desc': '大型语言模型（LLMs）能够自主执行端到端的数据工程流程，以实现模型的专业化。我们提出了一种新的任务，称为自主代理数据工程，旨在评估LLMs作为自主数据工程师的能力。通过优化训练数据，LLMs能够在多个领域中规划、生成和迭代优化数据，从而提高模型的性能。实验结果表明，GPT-5.2通过自主的数据适应，显著提升了学生模型的表现，证明了自主数据工程的潜力和可测量性。'}}}, {'id': 'https://huggingface.co/papers/2605.30434', 'title': 'LongDS-Bench: On the Failure of Long-Horizon Agentic Data Analysis', 'url': 'https://huggingface.co/papers/2605.30434', 'abstract': "Abstract LongDS benchmark evaluates agents' ability to maintain and update analytical states over extended data analysis sessions using real-world tasks from Kaggle notebooks.  AI-generated summary Real-world data analysis is inherently iterative, yet existing benchmarks mostly evaluate isolated or short interactive tasks, leaving agents' ability to track evolving analytical context over long horizons untested. We introduce LongDS, a benchmark for long-horizon, multi-turn data analysis where agents must maintain, update, restore, and compose evolving analytical states. LongDS comprises 68 tasks constructed from real-world Kaggle notebooks, spanning 2,225 turns across six domains including Geoscience, Business, and Education. Tasks are designed around state-evolution patterns (e.g., counterfactual perturbation, rollback, multi-state composition), with an average dependency span of 11.3 turns. Evaluating five state-of-the-art models, we find that the best model reaches only 48.45% average accuracy, performance drops nearly 47 points from early to late turns, and long-horizon errors account for 52%--69% of failures. Further analysis shows that additional agent steps do not necessarily improve performance, suggesting that the key bottleneck is maintaining a correct analytical state rather than increasing interaction budget. We release LongDS to support research on reliable long-horizon agentic data analysis. Code and data will be released at https://github.com/zjunlp/DataMind.", 'score': 6, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'ba7979db6603abce', 'authors': ['Kewei Xu', 'Xiaoben Lu', 'Shuofei Qiao', 'Zihan Ding', 'Haoming Xu', 'Lei Liang', 'Ningyu Zhang'], 'affiliations': ['Ant Group', 'Zhejiang University', 'Zhejiang University - Ant Group Joint Laboratory of Knowledge Graph'], 'pdf_title_img': 'assets/pdf/title_img/2605.30434.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#dataset', '#open_source', '#agents'], 'emoji': '📊', 'ru': {'title': 'Сохранение контекста анализа данных в долгосрочных сеансах взаимодействия', 'desc': 'В статье представлен бенчмарк LongDS для оценки способности агентов поддерживать и обновлять аналитическое состояние в течение длительных сеансов анализа данных. Бенчмарк содержит 68 задач из реальных ноутбуков Kaggle, охватывающих 2225 ходов в различных областях, где агенты должны управлять эволюцией контекста анализа. Исследование показало, что лучшие модели достигают только 48,45% точности и демонстрируют значительное снижение производительности на поздних этапах анализа. Основным узким местом является не недостаток вычислительных ресурсов, а сложность сохранения корректного состояния при долгосрочной интеракции с данными.'}, 'en': {'title': 'Mastering Long-Horizon Data Analysis with LongDS', 'desc': 'The LongDS benchmark evaluates how well AI agents can manage and update their analytical states during extended data analysis tasks. Unlike previous benchmarks that focus on short tasks, LongDS tests agents over long periods, requiring them to adapt to changing data contexts. It includes 68 tasks derived from real-world Kaggle notebooks, covering various domains and involving complex state-evolution patterns. The results show that even the best models struggle with maintaining accuracy over time, highlighting the challenges of long-horizon data analysis.'}, 'zh': {'title': '长时间数据分析的智能体能力评估', 'desc': 'LongDS基准测试评估智能体在长时间数据分析会话中维护和更新分析状态的能力。现有的基准测试主要关注短期任务，未能测试智能体在长时间内跟踪分析上下文的能力。LongDS包含68个任务，涉及多个领域，任务设计围绕状态演变模式，平均依赖跨度为11.3个回合。研究表明，最佳模型的平均准确率仅为48.45%，长时间错误占失败的52%至69%。'}}}, {'id': 'https://huggingface.co/papers/2605.30834', 'title': 'Hide-and-Seek in Trajectories: Discovering Failure Signals for VLA Runtime Monitoring', 'url': 'https://huggingface.co/papers/2605.30834', 'abstract': 'Abstract Hide-and-Seek framework detects robot execution failures in vision-language-action models by localizing failure-indicative actions through contrastive learning from trajectory-level supervision without step-level annotations.  AI-generated summary Vision-Language-Action (VLA) models enable robots to follow natural language instructions and generalize across diverse tasks, but they remain vulnerable to execution failures that compromise reliability in real-world deployment. Detecting such failures during execution is therefore critical for the robust deployment of embodied systems. Existing failure detection methods either rely on expensive action resampling or external models, while alternatives propagate trajectory-level labels uniformly across every timestep, obscuring localized failure signals. In this paper, we propose Hide-and-Seek, a framework that formulates VLA failure detection as a coarsely supervised learning problem. By combining inter-trajectory and intra-trajectory contrastive objectives, Hide-and-Seek localizes failure-indicative actions and induces temporally structured failure signals from trajectory-level supervision alone, without any step-level annotation. We evaluate Hide-and-Seek on LIBERO, VLABench, and a real-world robotic platform across three representative VLA policies: OpenVLA, π_0, and π_{0.5}.Our method achieves state-of-the-art multi-task failure detection performance with a practical accuracy--timeliness trade-off under conformal prediction, and generalizes well to both seen and unseen tasks.', 'score': 4, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '8ee9bbd5017a2c7d', 'authors': ['Seongheon Park', 'Wendi Li', 'Changdae Oh', 'Samuel Yeh', 'Zsolt Kira', 'Michael Hagenow', 'Sharon Li'], 'affiliations': ['Georgia Institute of Technology', 'University of Wisconsin Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.30834.jpg', 'data': {'categories': ['#robotics', '#cv', '#multimodal', '#training'], 'emoji': '🤖', 'ru': {'title': 'Обнаружение отказов робота через скрытую локализацию ошибочных действий', 'desc': 'Статья представляет framework Hide-and-Seek для обнаружения ошибок выполнения в vision-language-action моделях роботов. Метод использует контрастное обучение для локализации действий, указывающих на отказ, работая только с разметкой на уровне траекторий без аннотаций отдельных шагов. Авторы комбинируют inter-trajectory и intra-trajectory контрастные objetivo, чтобы индуцировать структурированные во времени сигналы отказа из высокоуровневого контроля. Метод достигает state-of-the-art результатов на бенчмарках LIBERO, VLABench и реальном роботическом оборудовании, обобщаясь на видимые и невидимые задачи.'}, 'en': {'title': 'Localizing Robot Failures with Contrastive Learning', 'desc': 'The Hide-and-Seek framework addresses the challenge of detecting execution failures in vision-language-action (VLA) models used by robots. It utilizes contrastive learning to identify actions that indicate failures, relying solely on trajectory-level supervision without needing detailed step-level annotations. This approach improves the localization of failure signals, making it easier to understand where and why failures occur during task execution. The framework demonstrates strong performance across various VLA policies and real-world applications, achieving a balance between accuracy and timeliness in failure detection.'}, 'zh': {'title': 'Hide-and-Seek：智能机器人执行失败检测的新方法', 'desc': 'Hide-and-Seek框架通过对比学习，从轨迹级监督中定位失败指示动作，检测视觉-语言-动作模型中的机器人执行失败，而无需逐步注释。该方法解决了现有失败检测方法的局限性，避免了昂贵的动作重采样或外部模型的依赖。通过结合轨迹间和轨迹内的对比目标，Hide-and-Seek能够从轨迹级监督中诱导出时间结构化的失败信号。我们在多个平台上评估了该方法，结果显示其在多任务失败检测中表现出色，且在准确性和时效性之间取得了良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2605.26844', 'title': 'Not All Disagreement Is Learnable: Token Teachability in On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.26844', 'abstract': "Abstract Token-level teacher signals in on-policy distillation are better predicted by teachability—measuring local compatibility between teacher and student distributions—than by raw KL disagreement alone.  AI-generated summary On-policy distillation (OPD) trains a student on its own rollouts with token-level teacher supervision. Recent selective OPD methods exploit the non-uniformity of OPD signals by prioritizing high-entropy or high-disagreement tokens. We revisit this principle and ask: which token-level teacher signals are actually learnable? Using a fixed-context diagnostic that measures same-context teacher-student KL reduction, we show that raw KL disagreement is a coarse proxy for learning value. It conflates learnable disagreement, where the teacher assigns corrective mass to the student's top-K candidates, with incompatible disagreement, where the teacher places mass mostly off the student's current support. We formalize this local compatibility as token teachability and show that it better predicts fixed-context improvement than raw KL alone. Motivated by this finding, we propose Teachability-Aware OPD (TA-OPD), a lightweight token-position selection method that applies OPD loss to high-teachability positions without reward models or verifiers. Across Qwen2.5 and Qwen 3 teacher-student settings, TA-OPD often surpasses full-token OPD with only 5% retained tokens and improves over entropy- and divergence-based baselines. Our results reframe selective OPD as selecting learnable teacher signals rather than merely salient tokens.", 'score': 2, 'issue_id': 2352, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '59b64dc2277dc013', 'authors': ['Yuanyi Wang', 'Su Lu', 'Yanggan Gu', 'Pengkai Wang', 'Yifan Yang', 'Zhaoyi Yan', 'Congkai Xie', 'Jianmin Wu', 'Hongxia Yang'], 'affiliations': ['InfiX.ai', 'PolyU', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.26844.jpg', 'data': {'categories': ['#rlhf', '#training'], 'emoji': '🎯', 'ru': {'title': 'Выбирать нужно по обучаемости, а не по расхождению', 'desc': 'В этой работе исследуется проблема обучения студент-модели на основе сигналов учителя в on-policy дистилляции. Авторы показывают, что способность модели улучшаться на основе коррекций учителя лучше объясняется мерой совместимости распределений (teachability), чем просто величиной KL-расхождения между предсказаниями. Они предлагают метод TA-OPD, который селективно применяет потери дистилляции только к токенам с высокой teachability, достигая результатов полной дистилляции, используя всего 5% токенов. Эксперименты на моделях Qwen демонстрируют, что такой подход превосходит базовые методы, основанные на энтропии и дивергенции.'}, 'en': {'title': 'Unlocking Learning Potential with Teachability in OPD', 'desc': "This paper explores the effectiveness of token-level teacher signals in on-policy distillation (OPD) for training machine learning models. It introduces the concept of 'teachability', which measures how compatible the teacher's and student's distributions are, rather than relying solely on KL divergence. The authors propose a new method called Teachability-Aware OPD (TA-OPD) that focuses on high-teachability tokens, leading to better learning outcomes with fewer tokens. Their findings suggest that selecting learnable teacher signals is more beneficial than just choosing tokens based on their salience or disagreement."}, 'zh': {'title': '通过可教性提升在线蒸馏效果', 'desc': '这篇论文探讨了在在线蒸馏中，如何通过可教性来更好地预测教师信号的有效性。可教性是指教师和学生分布之间的局部兼容性，而不仅仅是原始的KL散度。研究表明，原始的KL散度并不能准确反映学习的价值，因为它混淆了可学习的分歧和不兼容的分歧。基于这一发现，作者提出了一种新的方法——可教性意识的在线蒸馏（TA-OPD），能够在不使用奖励模型或验证器的情况下，选择高可教性的位置进行训练。'}}}, {'id': 'https://huggingface.co/papers/2605.31039', 'title': 'GGT-100K: Generative Ground Truth for Generalizable Real-World Image Restoration', 'url': 'https://huggingface.co/papers/2605.31039', 'abstract': 'Abstract Generative multimodal foundation models are used to create high-quality training data for image restoration, improving model generalization across diverse real-world scenarios.  AI-generated summary Real-world image restoration (IR) is bottlenecked by the scarcity of high-quality paired training data. Synthetic datasets are abundant but often fail to model real-world degradations, while real-world paired datasets are expensive and difficult to capture. As a result, IR models trained on these datasets show limited generalization in real-world scenarios. In this work, we propose Generative Ground Truth (GGT) by using generative multimodal foundation models (MFMs) to produce high-quality (HQ) targets from real-world low-quality (LQ) images. We first conduct a systematic evaluation of nine state-of-the-art MFMs, including Nano-Banana-2 and GPT-Image-2, on images of various scenes and degradation types. The results demonstrate that Nano-Banana-2 with VLM-based adaptive prompting shows the highest capability to synthesize perceptually realistic and content-faithful HQ targets, which can serve as the GGT for the LQ input. We then employ Nano-Banana-2 to build a GGT synthesis pipeline, which involves multi-stage quality control to ensure data reliability, and construct GGT-100K, an LQ-HQ paired dataset comprising 103,707 training pairs and covering diverse scenes and complex real-world degradations. A test set of 500 image pairs is also established. Extensive experiments show that GGT-100K consistently improves the real-world generalization of a wide range of IR models, with particularly strong benefits for finetuning generative models for IR tasks. Our results suggest that MFMs can serve as practical tools for restoration-oriented data generation, and GGT-100K is a useful resource to expand the generalization boundaries of real-world IR models.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '0d6b44aa147fb555', 'authors': ['Xiangtao Kong', 'Jixin Zhao', 'Lingchen Sun', 'Rongyuan Wu', 'Lei Zhang'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31039.jpg', 'data': {'categories': ['#multimodal', '#synthetic', '#dataset', '#open_source', '#data', '#cv'], 'emoji': '🖼️', 'ru': {'title': 'Генеративные основания для восстановления: синтетические данные от foundation моделей', 'desc': 'В статье предлагается использовать мультимодальные foundation модели для создания высококачественных синтетических данных для восстановления изображений. Авторы проводят систематическую оценку девяти современных foundation моделей и выбирают наиболее эффективную для синтеза реалистичных целевых изображений из низкокачественных входных данных. На основе лучшей модели они создают датасет GGT-100K с более чем 100 тысячами парных изображений, охватывающий разнообразные сцены и типы деградации. Экспериментальные результаты показывают, что модели, обученные на этом синтетическом датасете, значительно лучше обобщаются на реальные изображения с разнообразными искажениями.'}, 'en': {'title': 'Enhancing Image Restoration with Generative Ground Truth', 'desc': 'This paper introduces Generative Ground Truth (GGT), a method that uses generative multimodal foundation models (MFMs) to create high-quality training data for image restoration (IR). The authors highlight the challenge of limited high-quality paired datasets for training IR models, which often leads to poor performance in real-world applications. By synthesizing high-quality targets from low-quality images, the GGT approach enhances the generalization capabilities of IR models across various degradation types. The study demonstrates that the GGT-100K dataset, generated using the Nano-Banana-2 model, significantly improves the performance of IR models, especially when fine-tuning generative models for restoration tasks.'}, 'zh': {'title': '生成性模型助力图像修复的高质量数据生成', 'desc': '本研究提出了一种生成性基础模型（MFM）用于图像修复（IR），以生成高质量的训练数据，从而提高模型在真实场景中的泛化能力。我们开发了生成真实目标（GGT）的方法，通过将低质量（LQ）图像转化为高质量（HQ）目标，解决了高质量配对训练数据稀缺的问题。实验表明，Nano-Banana-2模型在合成真实感和内容一致的HQ目标方面表现最佳，并构建了包含103,707对LQ-HQ图像的GGT-100K数据集。我们的结果表明，GGT-100K能够显著提升多种IR模型在真实场景中的泛化能力，尤其对生成模型的微调任务有显著帮助。'}}}, {'id': 'https://huggingface.co/papers/2605.31598', 'title': 'Linear Scaling Video VLMs for Long Video Understanding', 'url': 'https://huggingface.co/papers/2605.31598', 'abstract': 'Abstract StateKV enables efficient long-video vision-language model inference by maintaining cross-frame context in a fixed-capacity recurrent state while using a full per-frame cache for decoding, achieving linear-time prefill with minimal accuracy loss compared to full self-attention.  AI-generated summary Video vision-language models (VLMs) are increasingly used in long-horizon and streaming settings, yet most video encoders still rely on spatiotemporal self-attention, causing compute and latency to grow quadratically with the number of frames. Existing efficiency methods improve scalability but often lose accuracy relative to full self-attention, for example through aggressive frame/token dropping or coarse attention approximations. We introduce StateKV, an inference-time method that adapts pretrained long-video VLMs to linear-time video prefill by carrying cross-frame context in a fixed-capacity, importance-based recurrent state, paired with a second full per-frame cache used for decoding. Across three long-video benchmarks and seven models spanning three families and multiple scales, StateKV remains close to full self-attention and consistently outperforms dominant sliding-window / recency-based streaming approximations, without fine-tuning or architectural changes. StateKV also reduces video-prefill cost measured FLOPs, enabling stronger accuracy at a fixed compute budget by running larger models. These results suggest a practical step toward scalable long-video understanding.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'ccde6349d24127d6', 'authors': ['Cristobal Eyzaguirre', 'Jiajun Wu', 'Juan Carlos Niebles'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31598.jpg', 'data': {'categories': ['#video', '#inference', '#multimodal', '#long_context', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Линейный видеопрефилль через рекуррентное состояние с ограниченной ёмкостью', 'desc': 'StateKV — это метод инференции, который позволяет эффективно обрабатывать длинные видео в vision-language моделях, сохраняя контекст между кадрами в состоянии с фиксированной ёмкостью. Метод использует рекуррентное состояние для отслеживания важной информации и полный кэш для каждого кадра при декодировании, достигая линейной сложности на этапе префилла. StateKV работает без дополнительного обучения и архитектурных изменений, оставаясь близким по точности к полному self-attention механизму. Этот подход значительно снижает вычислительные затраты и позволяет использовать более крупные модели в пределах одного бюджета вычислений.'}, 'en': {'title': 'Efficient Long-Video Inference with StateKV', 'desc': 'The paper introduces StateKV, a method designed to improve the efficiency of long-video vision-language model (VLM) inference. It maintains cross-frame context using a fixed-capacity recurrent state while employing a full per-frame cache for decoding, which allows for linear-time prefill without significant accuracy loss. Unlike traditional spatiotemporal self-attention methods that increase compute and latency quadratically, StateKV achieves better scalability and performance across various benchmarks. This approach enables the use of larger models within the same compute budget, making it a promising solution for scalable long-video understanding.'}, 'zh': {'title': '高效长视频理解的突破', 'desc': 'StateKV是一种高效的长视频视觉语言模型推理方法，它通过在固定容量的递归状态中保持跨帧上下文，同时使用完整的每帧缓存进行解码，从而实现线性时间的预填充，并且与完整自注意力相比，准确性损失最小。传统的视频编码器依赖时空自注意力，导致计算和延迟随着帧数的增加而呈平方增长。StateKV在推理时适应预训练的长视频视觉语言模型，通过重要性基础的递归状态携带跨帧上下文，结合用于解码的完整每帧缓存，显著提高了效率。实验结果表明，StateKV在多个长视频基准测试中表现优异，且无需微调或架构更改，能够在固定计算预算下实现更强的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.31042', 'title': 'From Prompt Injection to Persistent Control: Defending Agentic Harness Against Trojan Backdoors', 'url': 'https://huggingface.co/papers/2605.31042', 'abstract': 'Abstract Multi-step trojan attacks in local LLM agents can bypass existing defenses by embedding malicious prompts across multiple operations, requiring new detection methods like DASGuard for effective protection.  AI-generated summary LLM agents are evolving from conversational chatbots to operational tools in real-world workspaces. In local agentic harnesses, an LLM can read and write files, call tools, and reuse workspace state across sessions. While such capabilities enhance utility, they also expose a new attack surface for attackers. Attackers can embed a prompt injection within a file or tool output. Agents may read this hidden instruction, store it, and execute it later. In this multi-step trojan attack paradigm, no individual step appears malicious on its own, but these steps can collectively turn untrusted text into persistent control content. However, existing defenses often inspect each step in isolation. As a result, they can block a clear harmful action, but fail to detect the earlier write operation that plants the backdoor. To reveal this threat, we introduce ClawTrojan, a benchmark designed to identify multi-step trojan attacks in local agentic harnesses. In an OpenClaw-style simulated workspace with GPT-5.4, ClawTrojan reaches a 95.5% attack success rate (ASR), while existing single-turn prompt-injection attacks produce near-zero ASR on the same model. To address this threat, we propose DASGuard, which scans control-like text in sensitive local files, traces its origin, and removes control content that does not originate from a trusted source. Our results show that DASGuard achieves strong dynamic defense by combining runtime attack blocking with sanitized commits to the workspace.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '24b86c0772b8d4d9', 'authors': ['Jiejun Tan', 'Zhicheng Dou', 'Xinyu Yang', 'Yuyang Hu', 'Yiruo Cheng', 'Xiaoxi Li', 'Ji-Rong Wen'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.31042.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '🚨', 'ru': {'title': 'Защита от скрытых многошаговых инъекций в локальных LLM агентах', 'desc': 'В статье исследуются многошаговые атаки троян на локальных LLM агентах, которые могут обойти существующие защиты путём внедрения вредоносных инструкций через несколько операций. Авторы представляют бенчмарк ClawTrojan для выявления таких атак в симулированном рабочем пространстве, демонстрируя 95.5% успеха атаки. Предложенный метод DASGuard обеспечивает динамическую защиту, сканируя управляющий текст в чувствительных файлах и отслеживая его источник. Решение комбинирует блокировку атак во время выполнения с очисткой рабочего пространства от контента из ненадёжных источников.'}, 'en': {'title': 'Defending Local LLMs from Multi-Step Trojan Attacks with DASGuard', 'desc': 'This paper discusses the vulnerability of local large language model (LLM) agents to multi-step trojan attacks, where malicious prompts can be embedded across various operations. These attacks exploit the ability of LLMs to read and write files, allowing attackers to insert hidden instructions that may not seem harmful individually but can lead to significant security breaches when executed collectively. The authors introduce ClawTrojan, a benchmark for identifying these complex attacks, demonstrating a high attack success rate compared to traditional single-step defenses. To counter this threat, they propose DASGuard, a detection method that monitors and sanitizes control-like text in local files, effectively preventing unauthorized actions while maintaining the functionality of the LLM agents.'}, 'zh': {'title': '防御多步骤特洛伊攻击的新方法', 'desc': '本论文探讨了多步骤特洛伊攻击在本地大型语言模型（LLM）代理中的威胁，这种攻击可以通过在多个操作中嵌入恶意提示来绕过现有防御。随着LLM代理从对话聊天机器人演变为实际工作工具，这种能力虽然增强了实用性，但也为攻击者提供了新的攻击面。攻击者可以在文件或工具输出中嵌入提示注入，代理可能会读取并存储这些隐藏指令，随后执行。为了解决这一问题，本文提出了DASGuard防御机制，能够有效检测和阻止这些多步骤特洛伊攻击。'}}}, {'id': 'https://huggingface.co/papers/2605.30876', 'title': 'dMoE: dLLMs with Learnable Block Experts', 'url': 'https://huggingface.co/papers/2605.30876', 'abstract': 'Abstract Diffusion large language models combined with mixture-of-experts architectures face a mismatch between block parallel decoding and token-level expert selection, which dMoE addresses by aggregating token-level distributions into block-level routing to reduce activated experts and improve efficiency.  AI-generated summary Diffusion Large Language Models (dLLMs) have recently emerged as a promising alternative to autoregressive models, offering competitive performance while naturally supporting parallel decoding. However, as dLLMs are increasingly integrated with Mixture-of-Experts (MoE) architectures to scale model capacity, a fundamental mismatch arises between block parallel decoding and token-level expert selection. Specifically, each dLLM forward pass processes multiple tokens with bidirectional dependencies, whereas conventional MoE layers route each token independently. This mismatch substantially increases the number of uniquely activated experts, making inference increasingly memory-bound. To address this, we propose dMoE, a simple yet effective block-level MoE framework. The central idea of dMoE is to aggregate token-level expert distributions within each block into a unified block-level expert distribution, which is then used to guide expert routing in a more coherent manner. In this way, dMoE substantially reduces the number of uniquely activated experts during inference without sacrificing performance, thereby mitigating the memory-bound bottleneck. Extensive experiments across a variety of benchmarks demonstrate the effectiveness of dMoE. On average, dMoE reduces the number of uniquely activated experts from 69.5 to 14.6 while retaining 99.11% of the original performance. Meanwhile, it reduces memory usage by 76.64% to 79.84% and achieves 1.14times to 1.66times end-to-end latency speedup. Code is available at: https://github.com/fscdc/dMoE', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '49cd001236c25b6b', 'authors': ['Sicheng Feng', 'Zigeng Chen', 'Gongfan Fang', 'Xinyin Ma', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.30876.jpg', 'data': {'categories': ['#inference', '#training', '#architecture', '#optimization', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Блочная маршрутизация экспертов для эффективного декодирования диффузионных моделей', 'desc': 'В работе предложен метод dMoE для оптимизации диффузионных больших языковых моделей с архитектурой смеси экспертов. Основная проблема заключается в несоответствии между параллельным декодированием блоков и выбором экспертов на уровне токенов, что приводит к активации слишком большого количества экспертов. Авторы решают эту проблему, агрегируя распределения экспертов на уровне токенов в единое распределение на уровне блока для более согласованной маршрутизации. Предложенный подход снижает количество активированных экспертов с 69.5 до 14.6, сокращает использование памяти на 76-80% и ускоряет вывод в 1.14-1.66 раза без существенной потери качества.'}, 'en': {'title': 'Efficient Expert Routing with dMoE for Large Language Models', 'desc': 'This paper introduces dMoE, a new framework that improves the efficiency of diffusion large language models (dLLMs) when combined with mixture-of-experts (MoE) architectures. The challenge addressed is the mismatch between block parallel decoding and token-level expert selection, which leads to excessive memory usage due to many activated experts. dMoE aggregates token-level expert distributions into a single block-level distribution, allowing for more coherent expert routing. As a result, dMoE significantly reduces the number of activated experts and memory consumption while maintaining high performance during inference.'}, 'zh': {'title': '优化专家选择，提升推理效率', 'desc': '本文提出了一种新的框架dMoE，用于解决扩散大语言模型（dLLMs）与混合专家（MoE）架构之间的匹配问题。dMoE通过将每个块内的令牌级专家分布聚合为统一的块级专家分布，从而优化专家路由。这样可以显著减少在推理过程中激活的专家数量，同时保持模型性能。实验结果表明，dMoE在减少内存使用和提高推理速度方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.30514', 'title': 'MAAT: Multi-phase Adapter-Aware Targeted Unlearning', 'url': 'https://huggingface.co/papers/2605.30514', 'abstract': 'Abstract Existing machine unlearning benchmarks are heavily skewed toward non-causal question types, masking failures in causal knowledge removal; a new balanced benchmark and unlearning method are introduced to address this gap.  AI-generated summary Machine unlearning evaluation is structurally skewed: Why-type questions, which probe causal and relational knowledge, comprise less than 0.06% of CounterFact, 0.6% of ZSRE, and less than 1.3% of TOFU, MUSE, and WMDP-Cyber. This near-zero representation means that methods that fail on causal knowledge can score highly in aggregate, and this failure is undetectable without balanced evaluation. We present 5WBENCH, a balanced 5,000-sample benchmark with 1,000 examples per 5W category (Who, What, When, Where, Why), making causal unlearning failures quantifiable for the first time. Using 5WBENCH, we show that no existing baseline simultaneously achieves high forgetting and high retention on Why-type questions: aggressive forgetting degrades retained knowledge, while conservative methods fail to forget causal facts. Why-type difficulty stems from multi-hop reasoning chains (44% of Why entries vs. less than or equal to 2% for others) and gradient dilution over 40.1-token answer spans. We present MAAT (Multi-phase Adapter-Aware Targeted Unlearning), a three-phase framework operating on LoRA adapter weights, combining gradient-projected ascent, SVD rank-dimension pruning, task vector negation, and hybrid KL-hidden-state retain repair. MAAT is the first method to simultaneously achieve high forgetting and high retention on Why-type causal knowledge, reaching a new operating point on the forget-retain Pareto frontier. We make our code publicly available.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '4c20afa22df3c278', 'authors': ['Suryash Yagnik', 'Shubham Gaur', 'Saksham Thakur', 'Vinija Jain', 'Aman Chadha', 'Amitava Das'], 'affiliations': ['BITS Pilani Goa, India', 'Indian Institute of Information Technology, Bhopal, India', 'Stanford University, USA', 'University of California, Santa Cruz, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.30514.jpg', 'data': {'categories': [], 'emoji': '🤔', 'ru': {'title': 'Забывание причинных знаний: новый бенчмарк и метод для сбалансированной деинформации моделей', 'desc': 'В статье выявлена критическая проблема в существующих бенчмарках для машинного забывания: они почти не содержат вопросов типа "Почему", которые проверяют причинно-следственные знания модели. Авторы создали новый сбалансированный бенчмарк 5WBENCH с равным количеством вопросов пяти типов (Кто, Что, Когда, Где, Почему), что позволило выявить, что существующие методы неудачно удаляют причинные знания из-за цепочек многошагового рассуждения. Для решения этой проблемы предложен метод MAAT, работающий с адаптерами LoRA и комбинирующий различные техники оптимизации градиентов и прижатия памяти. Метод MAAT впервые достигает одновременно высокого забывания причинных фактов и высокого сохранения остальных знаний.'}, 'en': {'title': 'Balancing Forgetting and Retention in Causal Knowledge Unlearning', 'desc': "This paper addresses the limitations of current machine unlearning benchmarks, which often overlook the importance of causal knowledge removal. The authors introduce 5WBENCH, a new benchmark that includes a balanced set of questions across five categories, particularly focusing on 'Why' questions that require deeper reasoning. They demonstrate that existing methods struggle to achieve both high forgetting of unwanted knowledge and high retention of necessary causal facts. To tackle this challenge, they propose MAAT, a novel framework that effectively balances these competing needs, marking a significant advancement in the field of machine unlearning."}, 'zh': {'title': '平衡因果知识遗忘的创新方法', 'desc': '现有的机器遗忘基准测试主要集中在非因果问题类型，导致因果知识移除的失败被掩盖。为了解决这个问题，本文提出了一个新的平衡基准和遗忘方法。我们引入了5WBENCH，这是一个包含5000个样本的平衡基准，首次量化因果遗忘的失败。通过5WBENCH，我们展示了现有方法在因果知识的遗忘和保留上无法同时达到高水平，并提出了MAAT框架来解决这一挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.30561', 'title': 'VLM3: Vision Language Models Are Native 3D Learners', 'url': 'https://huggingface.co/papers/2605.30561', 'abstract': 'Abstract Vision Language Models can be adapted for 3D understanding tasks through simple architectural modifications and text-based training, achieving performance comparable to specialized vision models without requiring complex designs or extensive data augmentation.  AI-generated summary Vision Language Models (VLMs) enable a unified model to solve various vision tasks through prompting. They have shown promising performance in semantic understanding. However, 3D understanding still largely relies on expert vision models with complex task-specific designs. The key argument this work wants to make is that VLMs are native 3D learners. Our in-depth large scale study shows that 1) focal length unification, 2) text-based pixel reference and 3) data mixture and scaling, are all you need for effective 3D learning. Model architecture changes, large models, heavy data augmentations, and complex losses including the regression formulation, many of which form the foundation of expert vision models, are actually not necessary conditions. As a result, we propose VLM3, a scalable method with the simplest design that enables standard VLMs to master diverse 3D tasks. VLM3 not only advances the VLM depth estimation accuracy by a large margin (0.84 -> 0.9), but also enables diverse 3D tasks such as pixel correspondence, camera pose estimation and object-level 3D understanding, matching expert vision model accuracy while maintaining standard architectures and text-based training. We believe VLM3 opens up a new paradigm for simple and scalable 3D learning.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '3bd5858c4773be04', 'authors': ['Zhipeng Cai', 'Zhuang Liu', 'Yunyang Xiong', 'Zechun Liu', 'Vikas Chandra', 'Yangyang Shi'], 'affiliations': ['Meta', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30561.jpg', 'data': {'categories': ['#cv', '#multimodal', '#training', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Простота и масштабируемость: VLM как естественные ученики 3D-мира', 'desc': 'Статья демонстрирует, что Vision Language Models (VLM) могут эффективно решать задачи 3D-понимания без сложных архитектурных изменений благодаря унификации фокусного расстояния, текстовым пиксельным ссылкам и правильному масштабированию данных. Авторы предлагают VLM3 — простой и масштабируемый метод, который позволяет стандартным моделям VLM решать разнообразные 3D-задачи, включая оценку глубины, поиск соответствий пикселей и оценку позы камеры. Результаты показывают значительное улучшение точности оценки глубины и соответствие производительности специализированных видеомоделей при сохранении стандартной архитектуры и текстового обучения. Исследование доказывает, что сложные потери функции, регрессионные формулировки и интенсивная аугментация данных, характерные для экспертных видеомоделей, не являются необходимыми условиями для эффективного 3D-обучения.'}, 'en': {'title': 'VLM3: Simplifying 3D Learning with Vision Language Models', 'desc': 'This paper presents VLM3, a method that adapts Vision Language Models (VLMs) for 3D understanding tasks with minimal architectural changes. It demonstrates that VLMs can achieve high performance in 3D tasks like depth estimation and camera pose estimation without the need for complex designs or extensive data augmentation. The study highlights three key techniques: focal length unification, text-based pixel reference, and data mixture and scaling, which are sufficient for effective 3D learning. Overall, VLM3 shows that VLMs can serve as powerful 3D learners, simplifying the approach to 3D understanding while matching the accuracy of specialized models.'}, 'zh': {'title': 'VLM3：简单可扩展的3D学习新范式', 'desc': '本文探讨了如何通过简单的架构修改和基于文本的训练，将视觉语言模型（VLMs）适应于3D理解任务。研究表明，VLMs可以在不需要复杂设计或大量数据增强的情况下，达到与专业视觉模型相当的性能。我们提出的VLM3方法，利用焦距统一、基于文本的像素参考和数据混合等技术，实现了有效的3D学习。VLM3不仅显著提高了深度估计的准确性，还支持多种3D任务，展示了简单可扩展的3D学习新范式。'}}}, {'id': 'https://huggingface.co/papers/2605.31158', 'title': 'Light Interaction: Training-Free Inference Acceleration for Interactive Video World Models', 'url': 'https://huggingface.co/papers/2605.31158', 'abstract': 'Abstract Light Interaction accelerates interactive video world models through adaptive computation strategies and optimized attention mechanisms without requiring model retraining.  AI-generated summary Interactive video world models generate video chunk by chunk in response to user-controlled camera movements, enabling applications such as real-time game simulation, virtual scene navigation, and embodied AI training. However, scaling to long interactive trajectories is prohibitively expensive due to growing context memory, quadratic attention complexity, and repeated denoising steps. We present Light Interaction, a training-free inference acceleration framework for interactive video world models. Our key insight is that interaction naturally enables trajectory-dependent adaptive computation: retrieved spatial memory can be discarded during novel exploration, temporal context can be adjusted according to local latent dynamics, and early-step model outputs can be reused when the camera revisits familiar regions. Based on this insight, Light Interaction combines adaptive context management, denoising cache acceleration, and hardware-software co-designed 3D block sparse attention with fused Triton kernels. Evaluated on HY-WorldPlay and Matrix-Game-3.0, Light Interaction achieves up to 2.59x speedup without model retraining while maintaining competitive visual quality.', 'score': 0, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'f3b3fd6dd01dfeac', 'authors': ['Jiacheng Lu', 'Haoyi Zhu', 'Sipei Yi', 'Enze Xie', 'Yu Li', 'Cheng Zhuo'], 'affiliations': ['NVIDIA', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31158.jpg', 'data': {'categories': ['#video', '#inference', '#architecture', '#robotics'], 'emoji': '⚡', 'ru': {'title': 'Быстрое взаимодействие: ускорение видео-моделей через адаптивные вычисления', 'desc': 'В работе представлена Light Interaction — фреймворк для ускорения интерактивных видео-моделей мира без переобучения модели. Основная идея заключается в использовании адаптивных стратегий вычислений, которые опираются на то, что интерактивность позволяет управлять контекстом в зависимости от траектории пользователя. Авторы комбинируют адаптивное управление контекстом памяти, ускорение кэша денойзинга и разреженное блочное внимание с оптимизированными ядрами, что позволяет достичь ускорения до 2.59x раз. Метод протестирован на задачах симуляции игр и навигации в виртуальных сценах, сохраняя качество генерируемого видео.'}, 'en': {'title': 'Accelerating Interactive Video with Adaptive Computation', 'desc': 'This paper introduces Light Interaction, a framework designed to enhance the efficiency of interactive video world models during inference. It leverages adaptive computation strategies that adjust based on user interactions, allowing for faster processing without the need for retraining the model. The framework optimizes memory usage and attention mechanisms, significantly reducing computational costs while maintaining high visual quality. Evaluations show that Light Interaction can achieve up to 2.59 times faster performance in generating video content, making it suitable for real-time applications.'}, 'zh': {'title': 'Light Interaction：加速交互式视频生成的创新框架', 'desc': '本论文提出了一种名为Light Interaction的框架，用于加速交互式视频世界模型的推理，而无需重新训练模型。该框架利用适应性计算策略和优化的注意力机制，解决了长交互轨迹中上下文记忆增长和注意力复杂度的问题。通过动态管理空间记忆和时间上下文，Light Interaction能够在用户控制的相机移动下实现更高效的视频生成。实验结果表明，该方法在保持视觉质量的同时，速度提升可达2.59倍。'}}}, {'id': 'https://huggingface.co/papers/2605.31603', 'title': 'Lumos-Nexus: Efficient Frequency Bridging with Homogeneous Latent Space for Video Unified Models', 'url': 'https://huggingface.co/papers/2605.31603', 'abstract': "Abstract Lumos-Nexus is a training-efficient video generation framework that uses a two-stage approach with a lightweight generator for training and a high-capacity pretrained generator for inference, achieving enhanced visual fidelity through Unified Progressive Frequency Bridging.  AI-generated summary Connector-based video unified models have demonstrated strong capability in instruction-grounded video synthesis, but integrating a large high-fidelity generator into the unified training loop is computationally prohibitive, limiting achievable visual quality. We therefore propose Lumos-Nexus, a training-efficient unified video generation framework that facilitates the development of strong reasoning-driven generation capabilities while significantly enhancing visual fidelity. Lumos-Nexus adopts a two-stage design: 1) During training, only a lightweight generator is aligned with the understanding block to learn to take in reasoning-driven semantic control. 2) During inference, we introduce Unified Progressive Frequency Bridging (UPFB) to progressively hand off generation to a high-capacity pretrained generator in the shared latent space, enabling coarse-to-fine refinement and producing high-fidelity videos without compromising reasoning quality. To fill the gap in reasoning-driven video generation benchmarks, we introduce VR-Bench, which assesses a model's capability to translate inferred intent into coherent and semantically aligned video content. Extensive experiments demonstrate that Lumos-Nexus achieves substantial gains in visual realism and temporal coherence on VBench, while exhibiting strong reasoning-based generative performance on VR-Bench. Code and models are available at https://jiazheng-xing.github.io/nexus-lumos-home/.", 'score': 0, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '9d753c14126dfaa5', 'authors': ['Jiazheng Xing', 'Hangjie Yuan', 'Lingling Cai', 'Xinyu Liu', 'Yujie Wei', 'Fei Du', 'Hai Ci', 'Tao Feng', 'Jiasheng Tang', 'Weihua Chen', 'Fan Wang', 'Yong Liu'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Fudan University', 'Hong Kong University of Science and Technology', 'Hupan Lab', 'National University of Singapore', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31603.jpg', 'data': {'categories': ['#video', '#benchmark', '#training', '#architecture', '#optimization', '#open_source', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Эффективное обучение для видеогенерации через прогрессивный переход между генераторами', 'desc': 'Lumos-Nexus — это эффективная система для генерации видео, использующая двухэтапный подход: на этапе обучения применяется легкая модель-генератор для выравнивания с блоком понимания, а во время вывода используется мощная предобученная модель через механизм Unified Progressive Frequency Bridging. Этот метод позволяет значительно улучшить визуальное качество видео, сохраняя способность модели следовать семантическому управлению на основе рассуждений. Авторы предложили новый бенчмарк VR-Bench для оценки способности моделей преобразовывать инфомацию в семантически согласованный видеоконтент. Экспериментальные результаты показывают, что Lumos-Nexus достигает существенного улучшения в визуальном реализме и временной согласованности.'}, 'en': {'title': 'Efficient Video Generation with Enhanced Visual Fidelity', 'desc': 'Lumos-Nexus is a novel framework for generating videos that efficiently balances training and inference processes. It employs a two-stage approach where a lightweight generator is used during training to learn semantic control based on reasoning, while a high-capacity pretrained generator is utilized during inference for enhanced visual quality. The framework introduces Unified Progressive Frequency Bridging (UPFB), which allows for a smooth transition from coarse to fine video generation, resulting in high-fidelity outputs. Additionally, Lumos-Nexus is evaluated using the VR-Bench benchmark, demonstrating significant improvements in visual realism and coherence while maintaining strong reasoning capabilities.'}, 'zh': {'title': '高效视频生成的新框架：Lumos-Nexus', 'desc': 'Lumos-Nexus 是一个高效的视频生成框架，采用两阶段的方法来提高视觉质量。训练阶段使用轻量级生成器与理解模块对齐，以学习基于推理的语义控制。推理阶段则引入统一渐进频率桥接（UPFB），将生成任务逐步交给高容量的预训练生成器，从而实现高保真视频的生成。通过 VR-Bench 基准测试，Lumos-Nexus 在视觉真实感和时间一致性方面取得了显著提升，同时在基于推理的生成性能上表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.31604', 'title': 'Representation Forcing for Bottleneck-Free Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2605.31604', 'abstract': 'Abstract Representation Forcing enables unified multimodal models to perform both perception and generation tasks end-to-end without relying on external latent spaces, matching state-of-the-art performance in image generation while improving understanding capabilities.  AI-generated summary Unified multimodal models (UMMs) aim to handle perception and generation in a single model. Yet existing UMMs still rely on a frozen, separately pretrained VAE for image generation, imposing a structural bottleneck. Naively removing it introduces a quality gap, as the model must learn both high-level structure and low-level details from raw pixels. In this paper, we propose Representation Forcing (RF), a technique that closes this gap by making representation prediction a native capability of the model. Concretely, RF forces the decoder to autoregressively predict visual representations as intermediate tokens before pixels; these tokens then stay in context to guide pixel diffusion within the same backbone. By turning representations from perception outputs into generation targets, RF eliminates the need for any external generative latent space. We find that RF benefits both understanding and generation. On image generation, our pixel-space model with RF matches state-of-the-art VAE-based unified models. On image understanding, pixel-space RF generally outperforms its VAE-based variant. Together, these results offer an effective step toward end-to-end, bottleneck-free UMMs.', 'score': 0, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'c3d975b8eec59f76', 'authors': ['Yuqing Wang', 'Zhijie Lin', 'Ceyuan Yang', 'Yang Zhao', 'Fei Xiao', 'Hao He', 'Qi Zhao', 'Zihan Ding', 'Fuyun Wang', 'Shuai Wang', 'Youliang Zhang', 'Haoqi Fan', 'Xihui Liu'], 'affiliations': ['ByteDance Seed', 'Nanjing University', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.31604.jpg', 'data': {'categories': ['#diffusion', '#multimodal', '#training', '#architecture', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Принуждение представлений: путь к единым мультимодальным моделям без внешних кодировщиков', 'desc': 'В работе предлагается метод Representation Forcing для создания унифицированных мультимодальных моделей, которые могут выполнять задачи восприятия и генерации изображений без использования внешних кодировщиков VAE. Ключевая идея заключается в том, чтобы заставить декодер предсказывать визуальные представления в виде промежуточных токенов перед пиксельной диффузией, что позволяет модели работать исключительно с исходными пиксельными данными. Метод одновременно улучшает качество генерации изображений, достигая уровня моделей на основе VAE, и повышает эффективность задач понимания изображений. Такой подход устраняет структурные ограничения архитектуры и приближает нас к созданию истинно сквозных мультимодальных моделей без узких мест.'}, 'en': {'title': 'Eliminating Bottlenecks in Multimodal Models with Representation Forcing', 'desc': 'This paper introduces Representation Forcing (RF), a method that enhances unified multimodal models (UMMs) by allowing them to perform perception and generation tasks without relying on external latent spaces. RF enables the model to predict visual representations as intermediate tokens before generating pixels, which helps maintain context and improves both understanding and generation capabilities. By integrating representation prediction directly into the model, RF eliminates structural bottlenecks found in traditional approaches that use pretrained Variational Autoencoders (VAEs). The results show that models using RF achieve state-of-the-art performance in image generation and outperform VAE-based models in image understanding tasks.'}, 'zh': {'title': '表示强制：提升多模态模型的感知与生成能力', 'desc': '本文提出了一种名为表示强制（Representation Forcing, RF）的技术，旨在提升统一多模态模型（UMMs）在感知和生成任务中的表现。通过强制解码器自回归地预测视觉表示作为中间标记，RF消除了对外部生成潜在空间的依赖。实验表明，采用RF的像素空间模型在图像生成任务中达到了与最先进的VAE模型相当的性能，同时在图像理解方面也优于VAE变体。总的来说，RF为实现无瓶颈的端到端UMMs提供了有效的解决方案。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');

        let selectedArticles = [];

        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (2)', '#agi', '#alignment', '#architecture (4)', '#audio', '#benchmark (4)', '#cv (3)', '#data (1)', '#dataset (4)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (5)', '#optimization (5)', '#plp', '#rag', '#reasoning (2)', '#rl (1)', '#rlhf (2)', '#robotics (2)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (7)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {

                    ? articlesData

                );

                    ? articlesData
