    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.08964', 'title': 'Long-Horizon-Terminal-Bench: Testing the Limits of Agents on Long-Horizon Terminal Tasks with Dense Reward-Based Grading', 'url': 'https://huggingface.co/papers/2607.08964', 'abstract': 'Abstract  AI agents have become capable of autonomously completing short, well-specified tasks. However, existing terminal benchmarks largely focus on simple problems that finish within minutes and are evaluated only by their final outcome. This setup overlooks intermediate progress and partial solutions, yielding sparse reward signals and an incomplete picture of agent capability. We introduce Long-Horizon-Terminal-Bench, a terminal benchmark of 46 long-horizon tasks spanning nine categories, including experiment reproduction, software engineering, multimodal analysis, interactive games, and scientific computing. Each task follows a Terminal-Bench-style setup with a reference solution or simulation engine, but is further decomposed into fine-grained graded subtasks. This design enables dense intermediate rewards and partial credit, allowing evaluation to capture not only whether an agent reaches the final goal, but also how far it progresses on open-ended workflows. Tasks in Long-Horizon-Terminal-Bench typically require hundreds of episodes and minutes to hours of execution, stressing long-horizon planning, long-context management, and iterative debugging rather than one-shot problem solving. We evaluate 15 frontier models and find that agents consume on average 9.9M tokens per task, with roughly 231 episodes and 85.3 minutes of execution time per run, making Long-Horizon-Terminal-Bench more demanding than prior terminal-based benchmarks. Even the strongest tested model achieves 15.2% pass@1 at a partial-reward threshold of 0.95 and 10.9% at a perfect-reward threshold of 1.0, while the mean pass rate across models is 4.3% and 1.7% under the two thresholds, respectively. These results reveal headroom for improvement. We further analyze failure modes and error patterns, and release Long-Horizon-Terminal-Bench to support future progress on long-horizon terminal agents.', 'score': 43, 'issue_id': 2630, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 июля', 'en': 'July 9', 'zh': '7月9日'}, 'hash': 'd74cc32e92ccf4b6', 'authors': ['Zongxia Li', 'Zhongzhi Li', 'Yucheng Shi', 'Ruhan Wang', 'Junyao Yang', 'Zhichao Liu', 'Xiyang Wu', 'Anhao Li', 'Yue Yu', 'Ninghao Liu', 'Lichao Sun', 'Haotao Mi', 'LeoweiLiang'], 'affiliations': ['Indiana University', 'Lehigh University', 'National University of Singapore', 'Tencent HY LLM Frontier', 'The Hong Kong Polytechnic University', 'University of Georgia', 'University of Maryland, College Park', 'University of Minnesota, Twin Cities'], 'pdf_title_img': 'assets/pdf/title_img/2607.08964.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset'], 'emoji': '🏔️', 'ru': {'title': 'Измерение прогресса AI агентов в долгосрочных сложных задачах', 'desc': 'В работе представлена новая бенчмарк-система Long-Horizon-Terminal-Bench для оценки способности AI агентов выполнять сложные долгосрочные задачи в терминале, которые требуют сотен эпизодов и часов выполнения. В отличие от существующих бенчмарков, ориентированных на краткосрочные задачи с разреженными наградами, новая система включает 46 задач с детализированными промежуточными подзадачами, позволяющими оценивать как финальный результат, так и прогресс агента. Авторы провели оценку 15 передовых моделей и обнаружили, что даже лучшие модели достигают лишь 15,2% успеха на полных наградах и 10,9% на идеальных наградах, что демонстрирует значительный потенциал для улучшения. Анализ показывает, что агентам требуется в среднем 9,9М токенов на задачу и 85,3 минут выполнения, что подчеркивает сложность долгогоризонтного планирования и управления контекстом.'}, 'en': {'title': 'Revolutionizing AI Evaluation with Long-Horizon Tasks', 'desc': "This paper presents the Long-Horizon-Terminal-Bench, a new benchmark designed to evaluate AI agents on complex, long-horizon tasks across various domains. Unlike traditional benchmarks that focus on quick, simple tasks, this framework emphasizes intermediate progress and provides dense rewards for partial solutions. By breaking down tasks into fine-grained subtasks, it allows for a more comprehensive assessment of an agent's capabilities in planning and execution over extended periods. The evaluation of multiple models reveals significant challenges, indicating that there is substantial room for improvement in the performance of long-horizon terminal agents."}, 'zh': {'title': '长时间任务评估：超越简单问题的挑战', 'desc': '本论文介绍了一种新的基准测试，称为长时间终端基准（Long-Horizon-Terminal-Bench），用于评估人工智能代理在复杂任务中的表现。这些任务涵盖了多个领域，包括实验重现、软件工程和科学计算，通常需要数小时才能完成。与传统的简单任务不同，这些任务被细分为多个子任务，允许在执行过程中获得更密集的奖励信号。通过这种方式，研究人员能够更全面地评估代理的能力，不仅关注最终结果，还关注代理在任务执行过程中的进展。'}}}, {'id': 'https://huggingface.co/papers/2607.09657', 'title': 'Scalable Visual Pretraining for Language Intelligence', 'url': 'https://huggingface.co/papers/2607.09657', 'abstract': 'Abstract  The rapid progress of large foundation models has been driven predominantly by pretraining on large-scale text corpora. However, many forms of knowledge are conveyed through visual representations, where figures, typeset equations, and page layouts carry rich information that cannot be faithfully or completely captured by text alone. Yet current pretraining approaches discard these visual cues by converting visually rich sources, such as documents and web pages, into plain text for learning language intelligence. This paper challenges the default assumption that language models must be trained on text-only representations and shows that Visual Pretraining is a scalable learner for foundation model intelligence. To this end, we conduct a systematic study of unsupervised visual pretraining paradigms that directly leverage visual documents without text extraction. Across multiple backbones and benchmarks, visual pretraining on the same underlying corpora consistently outperforms text-only pretraining, offering an efficient pathway to scalable language intelligence.', 'score': 40, 'issue_id': 2629, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'ac359bb46cd0477a', 'authors': ['Yiming Zhang', 'Zhonghan Zhao', 'Wenwei Zhang', 'Haiteng Zhao', 'Tianyang Lin', 'Yunhua Zhou', 'Demin Song', 'Kuikun Liu', 'Haochen Ye', 'Haian Huang', 'Yuzhe Gu', 'Haijun Lv', 'Qipeng Guo', 'Bin Liu', 'Gaoang Wang', 'Kai Chen'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.09657.jpg', 'data': {'categories': [], 'emoji': '👁️', 'ru': {'title': 'Визуальное предобучение как основа для более мощных фундаментальных моделей', 'desc': 'В этой работе авторы показывают, что модели-фундаменты можно обучать напрямую на визуальном представлении документов, вместо того чтобы конвертировать их в текст. Исследование демонстрирует, что визуальное предобучение на одних и тех же корпусах превосходит текст-ориентированные подходы, так как фигуры, формулы и макеты страниц содержат важную информацию. Авторы проводят систематическое изучение различных парадигм предобучения без использования текстовой экстракции из визуальных документов. Такой подход предлагает эффективный путь к масштабируемому обучению языковых моделей.'}, 'en': {'title': 'Unlocking Language Intelligence with Visual Pretraining', 'desc': 'This paper discusses the limitations of current language models that rely solely on text for training. It highlights the importance of visual information, such as figures and layouts, which are often lost when converting documents to plain text. The authors propose a method called Visual Pretraining, which utilizes visual documents directly, bypassing the need for text extraction. Their experiments show that models trained with visual pretraining outperform those trained only on text, suggesting a new direction for enhancing language intelligence.'}, 'zh': {'title': '视觉预训练：超越文本的智能学习', 'desc': '这篇论文探讨了大型基础模型的快速进展主要依赖于大规模文本语料库的预训练。然而，许多知识通过视觉表现传达，图形、排版方程和页面布局包含丰富的信息，单靠文本无法完全捕捉。当前的预训练方法通过将视觉丰富的来源（如文档和网页）转换为纯文本来学习语言智能，从而忽视了这些视觉线索。本文提出视觉预训练是一种可扩展的学习方式，系统研究了直接利用视觉文档的无监督视觉预训练范式，结果显示视觉预训练在多个基准测试中优于仅文本预训练。'}}}, {'id': 'https://huggingface.co/papers/2607.09024', 'title': 'Video Generation Models are General-Purpose Vision Learners', 'url': 'https://huggingface.co/papers/2607.09024', 'abstract': 'Abstract  Driven by next-token prediction, NLP shifted from task-specific models into powerful generalist foundation models. What, then, is the equivalent catalyst needed to achieve a general-purpose model in computer vision? In this paper, we contend that large-scale text-to-video generation serves as a strong pre-training paradigm for computer vision, providing the necessary spatiotemporal priors, vision-language alignment, and scalability required for general visual intelligence. We introduce GenCeption, which leverages a pre-trained video generative diffusion backbone to define a feed-forward perception model, capable of performing various vision tasks steered by text instructions. Empirical results demonstrate that GenCeption achieves state-of-the-art performance across a diverse suite of tasks, including depth, surface normal, and camera pose estimation, expression-referring segmentation, and 3D keypoint prediction, often matching or surpassing specialized models (e.g. DepthAnything3, SAM3, D4RT, VGGT-Omega, Sapiens, David, Genmo, and Lotus-2). Furthermore, the video generative pretrained backbone outperforms alternative pretraining paradigms (e.g., V-JEPA, and Video MAE) under comparable settings. Importantly, GenCeption exhibits preliminary data and model scaling properties along with exceptional data efficiency, where it achieves comparable performance with leading models like D4RT and VGGT-Omega with 7 to 500 less training data. Finally, GenCeption also exhibits intriguing emergent behaviors: a model trained exclusively on synthetic human videos generalizes to real-world footage and out-of-distribution object categories (e.g., animals and robots). These findings suggest that video generation is not merely a synthesis tool, but a foundational path toward generalist vision intelligence for the physical world. Project page: https://genception.github.io', 'score': 39, 'issue_id': 2629, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': '4e359f0c7d9799ac', 'authors': ['Letian Wang', 'Chuhan Zhang', 'Rishabh Kabra', 'Jasper Uijlings', 'Steven Waslander', 'Andrew Zisserman', 'Joao Carreira', 'Kaiming He', 'Misha Andriluka', 'Eduard Gabriel Bazavan', 'Andrei Zanfir', 'Cristian Sminchisescu'], 'affiliations': ['Google DeepMind', 'Lund University', 'MIT', 'University College London', 'University of Oxford', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2607.09024.jpg', 'data': {'categories': ['#cv', '#training', '#3d', '#synthetic', '#transfer_learning', '#diffusion', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Видео-генерация как фундамент для универсального зрения', 'desc': 'Статья предлагает новый подход к созданию универсальной модели компьютерного зрения, используя предварительное обучение на основе генерации видео с помощью диффузионных моделей. Авторы представляют GenCeption — модель, которая использует предварительно обученный видео-генеративный позвоночник для решения множества задач зрения, управляемых текстовыми инструкциями. Модель демонстрирует выдающиеся результаты в задачах оценки глубины, нормалей поверхности, позы камеры, сегментации и предсказания 3D-ключевых точек, часто превосходя специализированные модели. Кроме того, GenCeption показывает исключительную эффективность по данным, достигая сравнимую производительность с ведущими моделями при использовании в 7-500 раз меньше данных для обучения.'}, 'en': {'title': 'GenCeption: Pioneering Generalist Vision Intelligence through Video Generation', 'desc': 'This paper discusses the development of GenCeption, a model that uses large-scale text-to-video generation as a pre-training method for computer vision tasks. By leveraging a pre-trained video generative diffusion backbone, GenCeption can perform various vision tasks guided by text instructions, achieving state-of-the-art results. The model demonstrates impressive data efficiency, often requiring significantly less training data than specialized models while still matching or exceeding their performance. Additionally, GenCeption shows the ability to generalize from synthetic to real-world data, indicating its potential as a foundational model for general visual intelligence.'}, 'zh': {'title': '视频生成：通向通用视觉智能的基础', 'desc': '本论文探讨了如何通过大规模文本到视频生成来实现计算机视觉的通用模型。我们提出了GenCeption，这是一种利用预训练视频生成扩散模型的前馈感知模型，能够根据文本指令执行多种视觉任务。实验结果表明，GenCeption在深度估计、表面法线、相机姿态估计等任务上表现优异，常常超越专门模型。我们的研究表明，视频生成不仅是合成工具，更是实现通用视觉智能的基础路径。'}}}, {'id': 'https://huggingface.co/papers/2607.04751', 'title': 'Trust Region Policy Distillation', 'url': 'https://huggingface.co/papers/2607.04751', 'abstract': 'Abstract  Big goals are hard to achieve all at once; breaking them into small steps is wiser. We present Trust Region Policy Distillation (TOP-D), which transforms the notoriously unstable, high-variance On-Policy Distillation (OPD) into a stable training paradigm by dynamically constructing a proximal teacher. Theoretically, we establish a rigorous framework demonstrating that TOP-D inherently controls gradient variance. By providing a formal global convergence analysis alongside a monotonic improvement bound, we mathematically formalize the reliability and stability of the overall training dynamics. Empirically, TOP-D dramatically enhances training stability, sample efficiency, and final performance on mathematical reasoning tasks. More importantly, TOP-D introduces zero additional computational overhead, positioning itself as a promising alternative to the well-established OPD paradigm.', 'score': 17, 'issue_id': 2630, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'd3b731e041601585', 'authors': ['Zhengpeng Xie', 'Li Lyna Zhang', 'Zeke Xie', 'Mao Yang'], 'affiliations': ['hkust-gz.edu.cn', 'microsoft.com', 'xingyunzhili.com'], 'pdf_title_img': 'assets/pdf/title_img/2607.04751.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Разбивай большие цели на маленькие шаги для стабильного обучения', 'desc': 'В статье предлагается метод Trust Region Policy Distillation (TOP-D), который стабилизирует нестабильный процесс обучения через дистилляцию политики за счёт динамического построения проксимального учителя. Авторы доказывают, что TOP-D контролирует дисперсию градиентов и обеспечивает глобальную сходимость алгоритма с гарантией монотонного улучшения. Экспериментально метод демонстрирует значительное повышение стабильности обучения, выборочной эффективности и финального качества на задачах математического рассуждения. TOP-D не требует дополнительных вычислительных затрат, что делает его практичной альтернативой существующим методам дистилляции политики.'}, 'en': {'title': 'Stabilizing Learning with Trust Region Policy Distillation', 'desc': 'This paper introduces Trust Region Policy Distillation (TOP-D), a method that improves the stability of On-Policy Distillation (OPD) in machine learning. TOP-D achieves this by creating a proximal teacher that helps control the gradient variance during training. The authors provide a theoretical framework that guarantees global convergence and monotonic improvement, ensuring reliable training dynamics. Empirical results show that TOP-D significantly boosts training stability and performance on mathematical reasoning tasks without adding extra computational costs.'}, 'zh': {'title': '小步前进，稳步提升：信任区域策略蒸馏', 'desc': '本文提出了一种新的方法，称为信任区域策略蒸馏（TOP-D），旨在提高在线策略蒸馏（OPD）的训练稳定性。TOP-D通过动态构建一个近端教师，成功地将高方差的训练过程转变为一个更稳定的训练范式。理论上，本文建立了一个严格的框架，证明了TOP-D能够有效控制梯度方差，并提供了全局收敛分析和单调改进界限。实验结果表明，TOP-D在数学推理任务上显著提高了训练稳定性、样本效率和最终性能，同时没有增加额外的计算开销。'}}}, {'id': 'https://huggingface.co/papers/2607.07964', 'title': 'KronQ: LLM Quantization via Kronecker-Factored Hessian', 'url': 'https://huggingface.co/papers/2607.07964', 'abstract': 'Abstract  Post-training quantization (PTQ) is a widely adopted technique for compressing large language models (LLMs) without retraining. Existing second-order PTQ methods, including GPTQ, construct quantization objectives exclusively from input activation statistics, effectively assuming that all output channels contribute equally to the layer-wise reconstruction objective. We propose KronQ, a PTQ framework that challenges this assumption by introducing the gradient covariance into the quantization pipeline. Under the Kronecker-factored Hessian approximation, the quantization loss depends jointly on both the activation and gradient covariances, and KronQ exploits this at two complementary levels. (1) KronQ introduces bidirectional incoherence processing, extending the existing input-side random rotation to the output dimension using the gradient covariance, reducing weight magnitude variance across both input and output dimensions. (2) KronQ derives a new sensitivity metric for inter-layer mixed-precision allocation, driven by the gradient and activation Hessian traces. Notably, in the case of 2-bit weight-only quantization on LLaMA-3-70B, while GPTQ and GPTAQ diverge or produce degenerate quantizations (>2000 perplexity on WikiText-2), KronQ achieves 7.93 perplexity.', 'score': 15, 'issue_id': 2630, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'cb86bfef96149ae6', 'authors': ['Donghyun Lee', 'Yuhang Li', 'Ruokai Yin', 'Priyadarshini Panda'], 'affiliations': ['University of Southern California', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07964.jpg', 'data': {'categories': ['#inference', '#optimization', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Kronecker-факторизованное квантование: от активаций к градиентам', 'desc': 'В статье предлагается KronQ — метод постобучающегося квантования для сжатия больших языковых моделей, который учитывает ковариацию градиентов наряду со статистикой активаций. Авторы используют аппроксимацию Гессиана, факторизованного по Кронекеру, чтобы улучшить процесс квантования на двух уровнях: двусторонняя обработка некогеренции снижает дисперсию весов по всем размерностям, а новая метрика чувствительности оптимизирует распределение битов между слоями. Экспериментальные результаты показывают, что KronQ значительно превосходит существующие методы, такие как GPTQ, особенно при крайне агрессивном квантовании в 2 бита на LLaMA-3-70B. Предложенный подход демонстрирует, что учёт информации о градиентах критически важен для эффективного сжатия больших моделей.'}, 'en': {'title': 'KronQ: Smarter Quantization for Better Model Compression', 'desc': 'This paper introduces KronQ, a novel post-training quantization (PTQ) framework for compressing large language models (LLMs) without the need for retraining. Unlike existing methods that treat all output channels equally, KronQ incorporates gradient covariance into the quantization process, allowing for a more nuanced approach to model compression. It employs bidirectional incoherence processing to reduce weight magnitude variance and develops a new sensitivity metric for mixed-precision allocation based on gradient and activation Hessian traces. The results show that KronQ significantly outperforms previous methods, achieving a perplexity of 7.93 on LLaMA-3-70B, while others fail to produce effective quantizations.'}, 'zh': {'title': 'KronQ：提升量化精度的新方法', 'desc': '后训练量化（PTQ）是一种广泛应用于压缩大型语言模型（LLM）而无需重新训练的技术。现有的二阶PTQ方法，如GPTQ，仅基于输入激活统计构建量化目标，假设所有输出通道对层级重建目标的贡献相同。我们提出了KronQ，这一PTQ框架通过将梯度协方差引入量化流程，挑战了这一假设。在KronQ中，量化损失同时依赖于激活和梯度协方差，并在两个互补层面上加以利用。'}}}, {'id': 'https://huggingface.co/papers/2607.06553', 'title': 'From RGB Generation to Dense Field Readout: Pixel-Space Dense Prediction with Text-to-Image Models', 'url': 'https://huggingface.co/papers/2607.06553', 'abstract': "Abstract Pretrained diffusion transformers can be adapted for dense prediction tasks by mapping tokens to task-native outputs instead of generating RGB images, achieving state-of-the-art results with minimal additional parameters.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large-scale text-to-image models are attractive backbones for dense prediction because RGB generation pretraining learns rich semantic, structural, and geometric priors. Existing generative and editing approaches reuse these priors by casting dense prediction as target generation: annotations such as depth, normals, alpha mattes, masks, and heatmaps are encoded into an RGB-trained VAE latent space and decoded back as image-like targets. We argue this inherits more of the generative output interface than dense prediction requires: unlike RGB synthesis, dense prediction asks for pixel-correct, task-native fields on the same image plane, not new RGB content to be rendered. Our key observation is that a pretrained DiT already organizes RGB inputs through a patch-to-token-to-patch lattice on the image plane, so each token indexes a fixed output patch whose channels can carry task-native quantities instead of RGB appearance. We instantiate this as ReChannel: we keep the VAE encoder for the DiT's input distribution but drop the target-side decoder, adapt the frozen DiT with task LoRA, and map each token to its p x p x K_t pixel-space patch through a shared token-local linear head--about 33K parameters, no spatial mixing. Using FLUX-Klein, we evaluate on six dense prediction tasks and over a dozen benchmarks. This minimal interface sets new state-of-the-art on trimap-free matting, KITTI depth, and referring segmentation, and stays competitive on normals, saliency, and pose. In a matched 4B setting it is more accurate and 2.48x faster than an edit-plus-latent-decode counterpart--dense perception can benefit from generative pretraining without inheriting its output interface.", 'score': 9, 'issue_id': 2630, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 июля', 'en': 'July 9', 'zh': '7月9日'}, 'hash': '4eed6a07ac58ef65', 'authors': ['Zanyi Wang', 'Xin Lin', 'Haodong Li', 'Dengyang Jiang', 'Yijiang Li'], 'affiliations': ['HKUST', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2607.06553.jpg', 'data': {'categories': ['#transfer_learning', '#cv', '#diffusion', '#architecture', '#training'], 'emoji': '🎯', 'ru': {'title': 'Прямое отображение токенов в пикселы: плотное предсказание без RGB-декодирования', 'desc': 'Авторы предлагают ReChannel — метод адаптации предобученных диффузионных трансформеров для задач плотного предсказания (depth estimation, segmentation и т.д.). Вместо кодирования целевых величин в RGB-латентное пространство VAE, они напрямую отображают токены трансформера на пиксель-корректные предсказания в исходном пространстве изображения. Ключевая идея заключается в том, что каждый токен DiT уже индексирует фиксированный патч изображения, поэтому его каналы могут нести задачно-специфичные значения без необходимости генерировать RGB. Такой минимальный интерфейс адаптации (всего ~33K параметров с LoRA) достигает SOTA результатов на множестве задач и работает в 2.48x быстрее, чем альтернативные подходы с декодированием.'}, 'en': {'title': 'ReChannel: Transforming Tokens for Precise Dense Predictions', 'desc': 'This paper presents a method called ReChannel, which adapts pretrained diffusion transformers for dense prediction tasks by mapping tokens to specific outputs instead of generating RGB images. The authors argue that traditional methods inherit unnecessary complexities from RGB generation, while dense prediction requires precise pixel-level outputs. By leveraging the existing structure of a pretrained DiT, they efficiently assign task-specific outputs to tokens, significantly reducing the number of parameters needed. Their approach achieves state-of-the-art results on various benchmarks, demonstrating that generative pretraining can enhance dense prediction without the drawbacks of RGB synthesis.'}, 'zh': {'title': '利用预训练变换器实现密集预测的突破', 'desc': '这篇论文提出了一种新的方法，利用预训练的扩散变换器（DiT）来处理密集预测任务。通过将令牌映射到任务特定的输出，而不是生成RGB图像，研究者们实现了最先进的结果，并且只需少量额外参数。与传统的生成方法不同，这种方法关注于在同一图像平面上生成像素准确的任务特定字段，而不是渲染新的RGB内容。通过使用FLUX-Klein进行评估，该方法在多个密集预测任务上表现出色，尤其是在无三元组抠图和KITTI深度估计上。'}}}, {'id': 'https://huggingface.co/papers/2607.09661', 'title': 'PanoWorld: Real-World Panoramic Generation', 'url': 'https://huggingface.co/papers/2607.09661', 'abstract': 'Abstract  In this work, we aim to address the challenge of long-range memory in panoramic world models by exploiting the rotation-equivariant property of omnidirectional representations, where rotation can be treated as an implicit geometric transformation.Building on this insight, we propose PanoWorld, which simplifies camera trajectories into translations via fixed headings for both current-action modeling and long-range memory through Dense Panoramic Ray-Conditioning (DPRC) and Geometry-aware Memory Augmentation (GMA).Then, a three-stage training pipeline is introduced to progressively optimize each component. To better evaluate physical consistency under large-scale spatial variations and diverse illumination conditions, where existing datasets are relatively stable, we construct World360, a large-scale dataset consisting of both real-world video clips collected via panoramic unmanned aerial vehicles and high-quality simulated clips generated by AirSim360.Extensive experiments on World360 demonstrate the effectiveness of PanoWorld, outperforming alternative methods by a large margin.Our models, training code, and dataset will be publicly available. More information can be found on our project page: https://lihaoy-ux.github.io/panoworld-page/.', 'score': 7, 'issue_id': 2630, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'd660ddd49b93da81', 'authors': ['Haoyuan Li', 'Dizhe Zhang', 'Yuemei Zhou', 'Xiangkai Zhang', 'Haoran Feng', 'Xiaofan Lin', 'Wenjie Jiang', 'Bo Du', 'Ming-Hsuan Yang', 'Lu Qi'], 'affiliations': ['Insta360 Research', 'Institute of Automation Chinese Academy of Sciences', 'Tsinghua University', 'UC Merced', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2607.09661.jpg', 'data': {'categories': ['#architecture', '#3d', '#dataset', '#video'], 'emoji': '🌍', 'ru': {'title': 'Панорамные мировые модели с долгой памятью через геометрическую эквивариантность', 'desc': 'Статья посвящена улучшению долгосрочной памяти в панорамных мировых моделях путём использования свойства ротационной эквивариантности в омнидирекциональных представлениях. Авторы предлагают PanoWorld, которая упрощает траектории камеры через фиксированные направления взгляда с помощью Dense Panoramic Ray-Conditioning и Geometry-aware Memory Augmentation. Для обучения применяется трёхэтапный пайплайн, позволяющий последовательно оптимизировать каждый компонент модели. Авторы создали новый датасет World360 с видео реальных панорамных дронов и синтетическими сценами для оценки физической консистентности при больших пространственных вариациях и различных условиях освещения.'}, 'en': {'title': 'Revolutionizing Long-Range Memory in Panoramic Models with PanoWorld', 'desc': "This paper introduces PanoWorld, a new approach to enhance long-range memory in panoramic world models by utilizing the rotation-equivariant nature of omnidirectional representations. The method simplifies camera movements into translations with fixed headings, allowing for improved current-action modeling and memory retention through techniques like Dense Panoramic Ray-Conditioning (DPRC) and Geometry-aware Memory Augmentation (GMA). A three-stage training pipeline is developed to optimize the components of PanoWorld effectively. To validate the model's performance, the authors created World360, a comprehensive dataset that includes real and simulated panoramic video clips, demonstrating that PanoWorld significantly outperforms existing methods in various conditions."}, 'zh': {'title': 'PanoWorld：全景记忆的新突破', 'desc': '本研究旨在解决全景世界模型中的长程记忆问题，利用全向表示的旋转等变特性，将旋转视为一种隐式几何变换。我们提出了PanoWorld，通过固定的航向将相机轨迹简化为平移，以实现当前动作建模和长程记忆，采用了密集全景光线条件化（DPRC）和几何感知记忆增强（GMA）。此外，我们引入了一个三阶段的训练流程，逐步优化每个组件。为了在大规模空间变化和多样化光照条件下更好地评估物理一致性，我们构建了World360数据集，包含通过全景无人机收集的真实视频片段和由AirSim360生成的高质量模拟片段。'}}}, {'id': 'https://huggingface.co/papers/2607.09415', 'title': 'Self-Guided Test-Time Training for Long-Context LLMs', 'url': 'https://huggingface.co/papers/2607.09415', 'abstract': "Abstract  Long-context processing has become increasingly important for large language models (LLMs), but simply extending the context window does not guarantee effective utilization of long inputs. As input length grows, accuracy often degrades, indicating that models still struggle to identify and use the evidence most relevant to a question. A promising way to improve long-context utilization is test-time training (TTT), which treats the test context as a training example for instance-specific parameter adaptation. However, applying TTT to the entire long context is prohibitively expensive, while adapting on randomly sampled spans introduces severe noise. Because most spans in a long context are irrelevant to the specific question, training on them may even degrade the base model's performance. Our preliminary study shows that TTT is highly sensitive to training-span quality: on LongBench-v2, TTT on randomly sampled spans hurts performance, whereas TTT on oracle spans substantially improves it. Motivated by this, we propose a simple method, Self-Guided TTT (S-TTT): before adaptation, the model identifies the evidence spans it should learn from, and the standard language-modeling training objective is applied only to those selected spans. On two challenging long-context reasoning benchmarks, LongBench-v2 and LongBench-Pro, S-TTT improves accuracy for both Qwen3-4B-Thinking-2507 and Llama-3.1-8B-Instruct, achieving up to a 15% relative improvement.", 'score': 7, 'issue_id': 2629, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'f56f50f78f986eda', 'authors': ['Xinyu Zhu', 'Zhe Xu', 'Xiaohan Wei', 'Yunchen Pu', 'Fei Tian', 'Chonglin Sun', 'Kaushik Rangadurai', 'Hua Zhi', 'Frank Shyu', 'Sandeep Pandey', 'Luke Simon', 'Yu Meng', 'Xi Liu'], 'affiliations': ['Meta AI', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2607.09415.jpg', 'data': {'categories': ['#long_context', '#training', '#reasoning', '#small_models', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Модель сама выбирает, что учить: адаптивное обучение на тестовом наборе', 'desc': 'В работе предложен метод Self-Guided Test-Time Training (S-TTT) для улучшения способности большых языковых моделей работать с длинными контекстами. Авторы показали, что стандартное тестовое обучение на случайных фрагментах текста неэффективно и даже снижает качество модели, так как большинство фрагментов не содержат релевантную информацию. Ключевая идея S-TTT заключается в том, что модель сначала самостоятельно определяет, на какие части контекста ей следует обучаться, а затем применяет языковое моделирование только к выбранным фрагментам. Метод показал улучшение до 15% на бенчмарках LongBench-v2 и LongBench-Pro для различных моделей.'}, 'en': {'title': 'Enhancing Long-Context Processing with Self-Guided Training', 'desc': 'This paper addresses the challenge of effectively processing long contexts in large language models (LLMs). It highlights that simply increasing the context window does not improve accuracy, as models struggle to focus on relevant information. The authors introduce Self-Guided Test-Time Training (S-TTT), which allows models to identify and adapt to the most pertinent spans of text during inference. Their experiments show that S-TTT significantly enhances performance on long-context reasoning tasks by selectively training on high-quality evidence spans.'}, 'zh': {'title': '自我引导的测试时训练提升长文本处理效果', 'desc': '长文本处理在大型语言模型中变得越来越重要，但仅仅扩展上下文窗口并不能保证有效利用长输入。随着输入长度的增加，模型的准确性往往会下降，表明模型在识别和使用与问题最相关的证据方面仍然存在困难。本文提出了一种自我引导的测试时训练方法（S-TTT），该方法在适应之前，模型会识别出应学习的证据范围，并仅对这些选定范围应用标准的语言建模训练目标。实验结果表明，S-TTT在两个长文本推理基准上显著提高了模型的准确性，最高可达15%的相对提升。'}}}, {'id': 'https://huggingface.co/papers/2607.08393', 'title': 'Towards Mechanistically Understanding Why Memorized Knowledge Fails to Generalize in Large Language Model Finetuning', 'url': 'https://huggingface.co/papers/2607.08393', 'abstract': 'Abstract  Fine-tuning LLMs to inject new knowledge faces a critical challenge: LLMs can quickly memorize new facts, yet fail to use them for downstream reasoning tasks. We formalize this failure as the \\textbf{Knowing--Using Gap}, characterized by an accuracy gap and a temporal lag between memorization and generalization. To understand this phenomenon, we fine-tune LLMs with unseen knowledge and monitor the spatial permeation dynamics of the knowledge internally using a novel intervention technique called self-patching. Self-patching identifies activation locations where relocating representations substantially improves failed generalization cases. These results are consistent with a knowledge-circuit misalignment hypothesis: memorized representations can exist internally but may not be routed to computation-effective layers. To demonstrate the practicality of this diagnostic finding, we design a simple heuristic strategy which recovers 58--75\\% of the oracle headroom in generalization failure. Experiments are done cross-domain for the robustness of this finding.', 'score': 7, 'issue_id': 2630, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 июля', 'en': 'July 9', 'zh': '7月9日'}, 'hash': '337377a960482d82', 'authors': ['Lu Dai', 'Ziyang Rao', 'Yili Wang', 'Hanqing Wang', 'Hao Liu', 'Hui Xiong'], 'affiliations': ['HKUST', 'HKUST(GZ)'], 'pdf_title_img': 'assets/pdf/title_img/2607.08393.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'От запоминания к применению: закрытие разрыва между знанием и использованием в LLM', 'desc': 'В работе исследуется проблема Knowing-Using Gap — когда языковые модели запоминают новые факты при дообучении, но не могут использовать их для рассуждений. Авторы предложили метод самопатчинга, который выявляет в нейронной сети места, где изменение представлений улучшает обобщение знаний. Они обнаружили, что проблема заключается в неправильной маршрутизации активаций — запомненные представления не поступают в слои, эффективные для вычислений. Авторы разработали простую эвристическую стратегию, которая восстанавливает 58-75% потенциального качества обобщения на новых задачах.'}, 'en': {'title': 'Bridging the Knowing--Using Gap in LLMs', 'desc': 'This paper addresses the challenge of fine-tuning large language models (LLMs) to effectively use newly learned information for reasoning tasks. It introduces the concept of the Knowing--Using Gap, which highlights the discrepancy between memorizing facts and applying them in practical scenarios. The authors employ a technique called self-patching to analyze how knowledge spreads within the model and to identify areas where adjustments can enhance performance. Their findings suggest that while LLMs can store information, it often does not reach the layers necessary for effective computation, and they propose a heuristic strategy that significantly improves generalization performance.'}, 'zh': {'title': '缩小知识记忆与推理之间的差距', 'desc': '本文探讨了在微调大型语言模型（LLMs）时注入新知识所面临的挑战，特别是知识记忆与推理任务之间的差距。我们将这种现象称为“知用差距”，它表现为记忆与泛化之间的准确性差距和时间滞后。通过一种新颖的干预技术——自我修补，我们监测了知识在模型内部的传播动态，并发现重新定位激活位置可以显著改善泛化失败的情况。实验结果表明，记忆的表示可能存在于内部，但未能有效路由到计算层，这为我们设计了一种简单的启发式策略，以恢复泛化失败中的大部分潜在能力。'}}}, {'id': 'https://huggingface.co/papers/2607.06957', 'title': 'Flow-ERD: Agent-type Aware Flow Matching with Entropy-Regularized Distillation for Diverse Traffic Simulation', 'url': 'https://huggingface.co/papers/2607.06957', 'abstract': "Abstract Flow-ERD is a multi-agent traffic simulator that combines agent-type aware flow matching with entropy-regularized distillation to achieve both realistic and diverse motion patterns.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Realistic and diverse traffic simulation is essential to autonomous driving development. Yet prevailing benchmarks predominantly reward realism, and recent methods have optimized accordingly, leaving diversity underexplored. We introduce Flow-ERD, a multi-agent simulator that pursues realism and diversity jointly. Its backbone, Agent-Type Aware Flow Matching (AFM), couples flow matching's multi-modal expressiveness with type-specific kinematic execution. It preserves fine-grained diversity while keeping motions consistent with each agent type. A second stage, Entropy-Regularized Distillation (ERD), fine-tunes the closed-loop rollout distribution with an entropy-regularized reverse-KL objective. This mitigates covariate shift while explicitly preventing collapse onto high-density modes. We evaluate Flow-ERD with a log-free diversity metric alongside standard realism scores. Flow-ERD ranks first on the WOSAC test benchmark and dominates the realism--diversity Pareto front among reproducible baselines. Our project page is available https://seulbinhwang.github.io/flow-erd-project-page/{here}.", 'score': 4, 'issue_id': 2631, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '92b2d4473473919c', 'authors': ['Seulbin Hwang', 'Kiyoung Om', 'Daejung Kim', 'Jinhan Lee'], 'affiliations': ['NAVER LABS Corp., Republic of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.06957.jpg', 'data': {'categories': [], 'emoji': '🚗', 'ru': {'title': 'Балансирование реализма и разнообразия в мультиагентной симуляции трафика', 'desc': 'Flow-ERD — это многоагентный симулятор дорожного движения, который использует flow matching, осведомленный о типах агентов, для генерации реалистичных траекторий. Система применяет энтропийно-регуляризованную дистилляцию на втором этапе, чтобы сбалансировать реализм и разнообразие движений агентов. Метод сохраняет мелкозернистое разнообразие траекторий, одновременно обеспечивая согласованность движений в соответствии с кинематическими ограничениями каждого типа агента. Flow-ERD демонстрирует лучшие результаты на тестовом наборе WOSAC, достигая паретовской оптимальности по компромиссу между реализмом и разнообразием.'}, 'en': {'title': 'Balancing Realism and Diversity in Traffic Simulation', 'desc': 'Flow-ERD is a multi-agent traffic simulator designed to enhance both realism and diversity in traffic patterns, which is crucial for the development of autonomous driving systems. It employs Agent-Type Aware Flow Matching (AFM) to ensure that different types of agents maintain their unique motion characteristics while still exhibiting diverse behaviors. Additionally, the Entropy-Regularized Distillation (ERD) technique is used to refine the simulation outputs, preventing the model from focusing too heavily on common patterns and thus preserving a variety of motion styles. The effectiveness of Flow-ERD is demonstrated through its top ranking on the WOSAC test benchmark, showcasing its ability to balance realism and diversity in traffic simulations.'}, 'zh': {'title': '真实与多样性并重的交通模拟', 'desc': 'Flow-ERD是一种多智能体交通模拟器，旨在同时实现真实和多样化的运动模式。它采用了智能体类型感知的流匹配技术，结合了熵正则化蒸馏方法，以保持运动的一致性和细粒度的多样性。通过优化闭环分布，Flow-ERD有效地减少了协变量偏移，并防止了模式坍缩。我们的评估结果显示，Flow-ERD在WOSAC测试基准中表现优异，领先于其他可复现的基线。'}}}, {'id': 'https://huggingface.co/papers/2607.09020', 'title': 'Phone Segmentation and Recognition through Phonological Activation Mapping', 'url': 'https://huggingface.co/papers/2607.09020', 'abstract': 'Abstract  Phone segmentation and recognition are inherently related tasks, yet modern approaches typically model them separately. We argue that phonetic structure is already latent in the representations of self-supervised speech models (S3Ms), and one only needs to steer them to solve both tasks. We leverage S3M-based Phonological Activation Mapping (SPAM), which maps each S3M representation frame to a vector of phonological feature activations, such as voicing and nasality. On top of SPAM, we introduce two simple but effective lightweight, gradient-descent-free prediction heads: a recognition head and a segmentation head. Our method requires less than a minute of phonetic transcriptions, and generalizes to unseen phones during training. Across a diverse range of datasets, our approach attains strong segmentation and recognition performance.', 'score': 2, 'issue_id': 2630, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'a023e6f6db24191b', 'authors': ['Shikhar Bharadwaj', 'Kwanghee Choi', 'Stephen McIntosh', 'Chin-Jou Li', 'Eunjung Yeo', 'Daisuke Saito', 'Nobuaki Minematsu', 'Shinji Watanabe', 'Jian Zhu', 'David Harwath', 'David R. Mortensen'], 'affiliations': ['CMU, USA', 'UBC, Canada', 'UT Austin, USA', 'UTokyo, Japan'], 'pdf_title_img': 'assets/pdf/title_img/2607.09020.jpg', 'data': {'categories': ['#audio', '#training'], 'emoji': '🔊', 'ru': {'title': 'Объединённое распознавание и сегментация фонем через фонологическую активацию', 'desc': 'В статье предлагается объединённый подход к фонетической сегментации и распознаванию речи, используя самообучающиеся модели (S3M), которые уже содержат латентные фонетические структуры. Авторы применяют метод Phonological Activation Mapping (SPAM) для преобразования представлений S3M в векторы активаций фонологических признаков, таких как звонкость и назальность. На основе SPAM разработаны две лёгкие головы предсказания без градиентного спуска для решения задач распознавания и сегментации фонем. Метод требует минимум транскрипций (менее минуты) и хорошо обобщается на ранее не встречавшиеся фонемы во время обучения.'}, 'en': {'title': 'Unified Phone Segmentation and Recognition with Self-Supervised Models', 'desc': 'This paper presents a novel approach to phone segmentation and recognition by utilizing self-supervised speech models (S3Ms). The authors propose a method called S3M-based Phonological Activation Mapping (SPAM), which extracts phonological features from S3M representations. They introduce two lightweight prediction heads for recognition and segmentation that do not require gradient descent for training. The method is efficient, needing minimal phonetic transcriptions, and demonstrates strong performance across various datasets, even with unseen phonetic units during training.'}, 'zh': {'title': '音素分割与识别的统一解决方案', 'desc': '本论文探讨了语音分割和识别这两个任务之间的内在联系。我们认为，自监督语音模型（S3Ms）中的表示已经隐含了音位结构，只需对其进行引导即可同时解决这两个任务。我们提出了基于S3M的音位激活映射（SPAM），将每个S3M表示帧映射到音位特征激活向量，如声带振动和鼻音。通过引入简单有效的预测头，我们的方法在训练过程中只需少于一分钟的音素转录，并且能够在未见过的音素上进行泛化。'}}}, {'id': 'https://huggingface.co/papers/2607.07673', 'title': 'MedPMC: A Systematic Framework for Scaling High-Fidelity Medical Multimodal Data for Foundation Models', 'url': 'https://huggingface.co/papers/2607.07673', 'abstract': 'Abstract  Medicine is inherently multimodal, requiring clinicians to synthesize information across diverse data streams. Yet the development of multimodal foundation models is constrained by limited access to large-scale, high-quality clinical data. Although PubMed Central (PMC) offers a complementary source of expert-authored image-text data, existing PMC-derived resources remain limited in fidelity, reproducibility, and clinical validation. We introduce MedPMC, an automated, continuously updatable framework that transforms permissively licensed literature into high-fidelity infrastructure for medical multimodal models. Applied to 6.1 million PMC articles, MedPMC curated 11 million medical image-text pairs. Component evaluations showed strong performance for initial screening (F1 = 93.2), multi-panel figure detection (F1 = 96.5), figure separation (mAP = 89.8), caption separation and alignment (F1 = 81.4; ROUGE-L = 85.3), and medical figure classification (F1 = 96.5). Manual review by five annotators, three with medical training, found 95.3% of MedPMC images medically relevant, versus 19.7% in a prior PMC-derived dataset. Across 26 benchmarks spanning 11 specialties, a MedPMC-trained CLIP-style model improved average zero-shot AUC by 7.1 percentage points over the strongest architecture-matched biomedical CLIP baseline despite using fewer than half as many image-text pairs. As the vision encoder in a multimodal large language model, it improved medical visual question-answering by 1.9 and 16.9 percentage points across two benchmarks. In 10,524 Yale New Haven Health System dermatology photographs, it improved morphology-to-image retrieval Recall@5 by 11.7 percentage points. These findings show that high-fidelity literature curation strengthens medical multimodal foundation models across benchmark and clinical settings. We publicly release the framework, corpus, benchmarks, and pretrained models.', 'score': 2, 'issue_id': 2633, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'bc11859bbf7bb64a', 'authors': ['Hyunjae Kim', 'Dain Kim', 'Pan Xiao', 'Serina S. Applebaum', 'Younjoon Chung', 'Xuguang Ai', 'Yu Yin', 'Roy Jiang', 'Yuexi Du', 'Yawen Wei', 'Yiming Kong', 'Tuo Guo', 'Zhiyuan Cao', 'Mengmeng Du', 'Yuelei Fu', 'Yan Hu', 'Rui Shi', 'Gui Yang', 'Kevin W. Jin', 'Yuntian Liu', 'Yuxuan Tian', 'Jonathan Marquez', 'Zhen Chen', 'Sheng Zhang', 'Hoifung Poon', 'Hua Xu', 'Jaewoo Kang', 'Qingyu Chen'], 'affiliations': ['Korea University', 'Microsoft Research', 'The University of Queensland', 'The University of Texas Health Science Center at Houston', 'University of Washington', 'Washington University in St. Louis', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07673.jpg', 'data': {'categories': ['#dataset', '#healthcare', '#open_source', '#data', '#multimodal', '#science', '#synthetic', '#cv', '#benchmark'], 'emoji': '🏥', 'ru': {'title': 'Высокофидельная курация медицинской литературы для обучения многомодальных фундаментальных моделей', 'desc': "В работе представлена MedPMC - автоматическая система для извлечения высококачественных пар изображение-текст из медицинской литературы PubMed Central, которая позволяет создавать обучающие наборы данных для многомодальных моделей в медицине. Из 6,1 миллиона статей система извлекла 11 миллионов пар медицинских изображений и текстов с высокой точностью (95,3% релевантности по оценке врачей). Обученная на этих данных CLIP-подобная модель продемонстрировала значительные улучшения на 26 бенчмарках, превзойдя существующие биомедицинские baseline'ы при использовании меньшего количества обучающих примеров. Когда модель была интегрирована в состав многомодального LLM, она показала заметный прирост качества на задачах медицинского визуального вопросно-ответного диалога и клинических приложениях."}, 'en': {'title': 'Empowering Medical AI with High-Quality Multimodal Data', 'desc': 'This paper presents MedPMC, a novel framework designed to enhance the development of multimodal foundation models in medicine by curating high-quality image-text pairs from PubMed Central articles. MedPMC successfully transformed 6.1 million articles into 11 million medically relevant image-text pairs, demonstrating superior performance in various evaluations, including figure detection and classification. The framework significantly improved the performance of a CLIP-style model in medical visual question-answering and image retrieval tasks, showcasing its effectiveness in clinical applications. By providing a publicly accessible resource, MedPMC aims to facilitate advancements in medical AI by ensuring high fidelity and relevance in multimodal data.'}, 'zh': {'title': '高质量文献助力医学多模态模型', 'desc': '本论文介绍了MedPMC，这是一个自动化的框架，旨在将医学文献转化为高质量的多模态模型基础设施。通过处理610万篇PubMed Central文章，MedPMC成功整理了1100万个医学图像-文本对。研究表明，MedPMC在医学图像分类和多模态问答等任务中表现优异，显著提高了模型的性能。该框架及其数据集和预训练模型已公开发布，以促进医学多模态模型的发展。'}}}, {'id': 'https://huggingface.co/papers/2607.09424', 'title': 'A Sovereign, Open-Source Foundation Model for German and English', 'url': 'https://huggingface.co/papers/2607.09424', 'abstract': 'Abstract  We present Soofi S 30B-A3B, a sovereign, open-source Mixture-of-Experts (MoE) hybrid Mamba Transformer foundation model for German and English. Its hybrid design activates only 3B of 30B parameters per token and keeps the inference cache near-constant as context grows, giving it a decisive throughput advantage over dense models for long-context, high-concurrency deployment. Pretrained on roughly 27 trillion tokens with deliberately up-weighted German, Soofi S matches dense 14 to 27B models on aggregate English and German benchmarks while achieving the best code aggregates in both languages among 17 open base models, and outperforms every European sovereign baseline in our comparison, including ones far larger in active parameters. Among fully open models, Soofi S obtains the highest English and German evaluation scores, ahead of Olmo 3 32B and Apertus 70B. Soofi S was built end-to-end on the German Industrial AI Cloud, a sovereign HPC scale AI infrastructure operated by Deutsche Telekom in Munich. Soofi S will be released under highly permissive, open-access terms: weights, selected intermediate checkpoints, full per-source data accounting, hyperparameters, and training and evaluation code. Where source licenses permit, data-construction artifacts are released under permissive licenses; commercially licensed sources are documented with aggregate statistics and exact mixture accounting.', 'score': 1, 'issue_id': 2629, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'bad154545419c19c', 'authors': ['The Soofi-Team', ':', 'Benedikt Droste', 'David Fitzek', 'Ruben Härle', 'Lukas Helff', 'Maximilian Idahl', 'Alex Jude', 'Abbas Goher Khan', 'Maurice Kraus', 'Timm Ruland', 'Richard Rutmann', 'Sebastian Sztwiertnia', 'Markus Frey', 'Daniil Gurgurov', 'Jan Pfister', 'Tom Röhr', 'Sebastian von Rohrscheidt', 'Jörg Bienert', 'Nicolas Flores-Herr', 'Simon Gottschalk', 'Andreas Hotho', 'Kristian Kersting', 'Joachim Köhler', 'Alexander Löser', 'Wolfgang Nejdl', 'Simon Ostermann', 'Jan Plogsties', 'Patrick Putzky', 'Mehdi Ali', 'Michael Fromm', 'Max Lübbering'], 'affiliations': ['Berliner Hochschule für Technik', 'DFKI', 'Fraunhofer IAIS', 'Fraunhofer IIS', 'KI Bundesverband', 'L3S Research Center', 'Lamarr', 'Merantix Momentum', 'Technische Universität Darmstadt', 'Universität Würzburg', 'ellamind', 'hessian.AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.09424.jpg', 'data': {'categories': ['#long_context', '#inference', '#optimization', '#training', '#architecture', '#open_source', '#benchmark', '#multilingual'], 'emoji': '🇩🇪', 'ru': {'title': 'Европейская суверенная MoE модель с экономией параметров и ресурсов', 'desc': 'Представлен Soofi S 30B-A3B — открытая гибридная модель на основе Mixture-of-Experts (MoE), объединяющая архитектуру Mamba и Transformer для немецкого и английского языков. Модель активирует только 3 миллиарда параметров из 30 миллиардов на каждый токен, что обеспечивает постоянный размер кэша при увеличении контекста и дает преимущество в пропускной способности для обработки длинных последовательностей. Предобученная на 27 триллионах токенов с усилением немецкоязычных данных, модель достигает производительности плотных моделей размером 14-27B и показывает лучшие результаты в задачах генерации кода среди 17 открытых базовых моделей. Soofi S была полностью разработана на немецкой суверенной облачной инфраструктуре AI, принадлежащей Deutsche Telekom, и будет распространяться с открытыми весами и полной документацией обучения.'}, 'en': {'title': 'Soofi S: Efficient Language Mastery with MoE Technology', 'desc': 'The paper introduces Soofi S 30B-A3B, an open-source Mixture-of-Experts (MoE) model designed for both German and English languages. This model utilizes a hybrid architecture that activates only a portion of its parameters during inference, allowing it to efficiently handle long-context tasks with high throughput. Pretrained on a massive dataset of 27 trillion tokens, Soofi S demonstrates competitive performance against larger dense models while achieving top scores in language benchmarks. It will be made available under open-access terms, promoting transparency and collaboration in AI development.'}, 'zh': {'title': 'Soofi S：高效的开源混合专家模型', 'desc': '本文介绍了Soofi S 30B-A3B，这是一个主权的开源混合专家（MoE）混合Mamba Transformer基础模型，支持德语和英语。它的混合设计使得每个token仅激活30亿个参数中的3亿个，并在上下文增长时保持推理缓存近乎恒定，从而在长上下文和高并发部署中相较于密集模型具有显著的吞吐量优势。Soofi S在大约27万亿个token上进行了预训练，特别加强了德语的权重，在英语和德语的基准测试中与14到27亿的密集模型相匹配，并在17个开放基础模型中在两种语言的代码聚合上表现最佳。Soofi S将在高度宽松的开放访问条款下发布，包括权重、选定的中间检查点、完整的源数据核算、超参数以及训练和评估代码。'}}}, {'id': 'https://huggingface.co/papers/2607.06374', 'title': 'VaseMuseum: Digital Intelligent Museum for Ancient Greek Pottery', 'url': 'https://huggingface.co/papers/2607.06374', 'abstract': 'Abstract  Vision-language models (VLMs) have made interactive digital museums increasingly feasible by connecting 3D digitization with natural-language artifact exploration. However, in cultural heritage domains such as ancient Greek pottery, reliable VLM assistance is limited by two challenges. First, open-ended interpretation requires grounding fine-grained 2D/3D visual evidence in specialized curatorial knowledge, yet the retrieval process may introduce weak sources and unverifiable references. Second, when the available evidence is incomplete, noisy, or ambiguous, VLMs often produce confident but unsupported answers instead of calibrated uncertainty. To address these challenges, we propose VaseMuseum, a lightweight and modular multimodal agent framework for intelligent digital museums of ancient Greek pottery. VaseMuseum combines an interactive virtual museum with VaseAgent, which supports both 2D images and 3D artifacts through multimodal perception, 3D-aware reasoning, external knowledge retrieval, and inference-time reliability control. Specifically, VaseAgent retrieves evidence from authoritative web and museum knowledge sources, and source-level control selects diverse and verifiable evidence before generation. Meanwhile, response-level control checks generated claims against the evidence pool and encourages neutral, evidence-bounded answers when support is insufficient or conflicting. Moreover, a training-free GRPO-style selection mechanism favors responses with valid references and calibrated confidence without updating the VLM backbone. Experiments in a realistic digital museum simulation show that VaseMuseum improves citation validity, reduces hallucinations on knowledge-intensive queries, and produces more neutral answers under ambiguity compared with search-enabled VLM baselines.', 'score': 1, 'issue_id': 2631, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '563456303a12ced0', 'authors': ['Jiazi Wang', 'Nonghai Zhang', 'Qiushi Xie', 'Zeyu Zhang', 'Yufeng Chen', 'Yang Zhao', 'Ling Shao', 'Hao Tang'], 'affiliations': ['Department of Computer Science and Information Technology, La Trobe University, Melbourne VIC 3000, Australia', 'Huazhong University of Science and Technology, Wuhan 430074, China', 'School of Computer Science and Technology, Beijing Jiaotong University, Beijing 100044, China', 'School of Computer Science, Peking University, Beijing 100871, China', 'UCAS-Terminus AI Lab, University of Chinese Academy of Sciences, Beijing 100049, China'], 'pdf_title_img': 'assets/pdf/title_img/2607.06374.jpg', 'data': {'categories': ['#3d', '#interpretability', '#hallucinations', '#rag', '#multimodal', '#cv', '#agents', '#alignment'], 'emoji': '🏛️', 'ru': {'title': 'Надёжные мультимодальные агенты для музеев с контролем достоверности ответов', 'desc': 'В статье предложена система VaseMuseum, которая объединяет видео-языковые модели с трёхмерной визуализацией для создания интеллектуальных цифровых музеев древнегреческой керамики. Система решает проблему галлюцинаций в LLM путём внедрения механизмов контроля на уровне источников и ответов, которые проверяют сгенерированные утверждения против авторитетных знаний. Архитектура использует многомодальное восприятие, трёхмерное рассуждение и тренируемый механизм отбора ответов для повышения надёжности и калибровки уверенности модели. Экспериментальная оценка показывает значительное улучшение в корректности цитирований, снижение галлюцинаций на запросах, требующих специальных знаний, и производство более нейтральных ответов при неполной или противоречивой информации.'}, 'en': {'title': 'Enhancing Digital Museums with Reliable AI Insights', 'desc': 'This paper introduces VaseMuseum, a new framework designed to enhance the interaction with digital museums, specifically focusing on ancient Greek pottery. It addresses two main challenges faced by vision-language models (VLMs): the need for reliable evidence grounding in specialized knowledge and the tendency of VLMs to provide unsupported answers when faced with incomplete information. VaseMuseum incorporates a multimodal agent, VaseAgent, which utilizes both 2D and 3D data, retrieves authoritative knowledge, and implements controls to ensure the reliability of generated responses. The framework has been shown to improve the accuracy of citations and reduce misleading information in responses, making it a significant advancement in the field of cultural heritage and digital interaction.'}, 'zh': {'title': '智能数字博物馆：古希腊陶器的多模态探索', 'desc': '本文提出了一种名为VaseMuseum的轻量级多模态代理框架，旨在提升古希腊陶器的智能数字博物馆体验。该框架结合了交互式虚拟博物馆和VaseAgent，支持2D图像和3D文物的多模态感知与推理。VaseAgent通过从权威的网络和博物馆知识源中检索证据，并在生成答案前进行源级控制，以确保所用证据的多样性和可验证性。实验结果表明，VaseMuseum在引用有效性、减少知识密集型查询的幻觉现象以及在模糊情况下生成更中立的答案方面优于传统的VLM基线。'}}}];

            return categories
        }

                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

            if (filterLogicIsAnd) {

            } else {

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }

            let res = Array.from(categories);
            res.sort();
            return res;

                let catNameSplitted = category.split(/(\s+)/);

                const button = document.createElement('span');

                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }

            localStorage.setItem('selectedCategories', JSON.stringify('[]'));

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();

                selectedCategories = urlCategories;
                saveCategorySelection();

            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });

                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-13 20:52',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-13 20:52')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-13 20:52')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
