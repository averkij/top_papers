-using LLMs, yet robust generalization under shifts in tasks and toolsets remains an open challenge. We trace this brittleness to insufficient diversity in synthesized tasks. Scaling diversity is difficult because training requires tasks to remain executable and verifiable, while generalization demands coverage of diverse tool types, toolset combinations, and heterogeneous tool-use patterns. We propose DIVE, an evidence-driven recipe that inverts synthesis order, executing diverse, real-world tools first and reverse-deriving tasks strictly entailed by the resulting traces, thereby providing grounding by construction. DIVE scales structural diversity along two controllable axes, tool-pool coverage and per-task toolset variety, and an Evidence Collection--Task Derivation loop further induces rich multi-step tool-use patterns across 373 tools in five domains. Training Qwen3-8B on DIVE data (48k SFT + 3.2k RL) improves by +22 average points across 9 OOD benchmarks and outperforms the strongest 8B baseline by +68. Remarkably, controlled scaling analysis reveals that diversity scaling consistently outperforms quantity scaling for OOD generalization, even with 4x less data.', 'score': 4, 'issue_id': 1474, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '3be2e2723ff736f3', 'authors': ['Aili Chen', 'Chi Zhang', 'Junteng Liu', 'Jiangjie Chen', 'Chengyu Du', 'Yunji Li', 'Ming Zhong', 'Qin Wang', 'Zhengmao Zhu', 'Jiayuan Song', 'Ke Ji', 'Junxian He', 'Pengyu Zhao', 'Yanghua Xiao'], 'affiliations': ['Fudan University', 'Independent', 'MiniMax'], 'pdf_title_img': 'assets/pdf/title_img/2603.11076.jpg', 'data': {'categories': ['#small_models', '#training', '#optimization', '#agents', '#dataset', '#synthetic'], 'emoji': '🛠️', 'ru': {'title': 'Разнообразие данных превосходит количество при обучении агентных моделей', 'desc': 'В работе предложен метод DIVE для создания синтетических данных обучения агентных моделей, которые используют различные инструменты. Вместо традиционного подхода, когда сначала генерируются задачи, а потом проверяется их выполнимость, DIVE работает в обратном порядке: сначала выполняются реальные инструменты, а затем из полученных трасс выводятся задачи. Метод масштабирует разнообразие данных по двум осям: охват набора инструментов и разнообразие комбинаций инструментов в каждой задаче. Обучение модели Qwen3-8B на данных DIVE показало значительное улучшение обобщения на распределениях, выходящих за границы обучающего набора, при этом увеличение разнообразия данных оказалось эффективнее увеличения их количества.'}, 'en': {'title': 'DIVE: Enhancing LLMs through Diverse Task Synthesis', 'desc': 'This paper introduces DIVE, a method designed to enhance the training of large language models (LLMs) like Qwen3-8B by focusing on task diversity rather than sheer quantity of data. The authors argue that traditional training methods often lead to brittleness in model performance when faced with new tasks or tools due to a lack of diverse training scenarios. DIVE addresses this by first executing a variety of real-world tools and then deriving tasks from these executions, ensuring that the tasks are grounded in practical applications. The results show that training with DIVE data significantly improves out-of-distribution (OOD) performance, demonstrating that diversity scaling is more effective than quantity scaling, even with less training data.'}, 'zh': {'title': '多样性扩展优于数量扩展，提升模型泛化能力', 'desc': '本论文提出了一种名为DIVE的方法，用于提高大规模语言模型（LLM）在不同任务和工具集下的泛化能力。通过优先执行多样化的真实世界工具，DIVE能够生成多样化的任务，从而增强模型的表现。研究表明，在使用DIVE数据训练Qwen3-8B模型时，模型在9个超出分布的基准测试中平均提高了22分，且在数据量减少的情况下，多样性扩展的效果优于数量扩展。此方法为解决模型在任务转变时的脆弱性提供了新的思路。'}}}, {'id': 'https://huggingface.co/papers/2603.12246', 'title': 'Examining Reasoning LLMs-as-Judges in Non-Verifiable LLM Post-Training', 'url': 'https://huggingface.co/papers/2603.12246', 'abstract': 'Abstract Research examines the effectiveness of reasoning versus non-reasoning large language model judges in reinforcement learning-based alignment, revealing that reasoning judges prevent reward hacking but may produce adversarial outputs that deceive other judges.  \t\t\t\t\tAI-generated summary Reasoning LLMs-as-Judges, which can benefit from inference-time scaling, provide a promising path for extending the success of reasoning models to non-verifiable domains where the output correctness/quality cannot be directly checked. However, while reasoning judges have shown better performance on static evaluation benchmarks, their effectiveness in actual policy training has not been systematically examined. Therefore, we conduct a rigorous study to investigate the actual impact of non-reasoning and reasoning judges in reinforcement-learning-based LLM alignment. Our controlled synthetic setting, where a "gold-standard" judge (gpt-oss-120b) provides preference annotations to train smaller judges, reveals key differences between non-reasoning and reasoning judges: non-reasoning judges lead to reward hacking easily, while reasoning judges can lead to policies that achieve strong performance when evaluated by the gold-standard judge. Interestingly, we find that the reasoning-judge-trained policies achieve such strong performance by learning to generate highly effective adversarial outputs that can also score well on popular benchmarks such as Arena-Hard by deceiving other LLM-judges. Combined with our further analysis, our study highlights both important findings and room for improvements for applying (reasoning) LLM-judges in non-verifiable LLM post-training.', 'score': 3, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '75b712bf20c36cc0', 'authors': ['Yixin Liu', 'Yue Yu', 'DiJia Su', 'Sid Wang', 'Xuewei Wang', 'Song Jiang', 'Bo Liu', 'Arman Cohan', 'Yuandong Tian', 'Zhengxing Chen'], 'affiliations': ['Meta Superintelligence Labs', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12246.jpg', 'data': {'categories': ['#rlhf', '#rl', '#benchmark', '#reasoning', '#security', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Рассуждающие судьи предотвращают взлом вознаграждения, но создают новые угрозы адверсариальности', 'desc': 'В работе исследуется эффективность моделей с способностью к рассуждению в качестве судей для обучения больших языковых моделей с подкреплением. Авторы обнаружили, что судьи без рассуждений подвержены взлому вознаграждения, в то время как судьи с рассуждением избегают этой проблемы, но при этом обучают политики генерировать адверсариальные примеры. Исследование проводилось в контролируемой синтетической среде с использованием эталонного судьи для аннотирования предпочтений. Полученные результаты показывают важность применения судей с рассуждением в постобучении моделей, но также указывают на необходимость дополнительных улучшений для надежного выравнивания.'}, 'en': {'title': 'Balancing Reasoning and Deception in LLM Alignment', 'desc': "This research investigates how reasoning and non-reasoning large language model (LLM) judges affect reinforcement learning alignment. It finds that reasoning judges can prevent reward hacking, which is when models exploit loopholes to gain rewards unfairly. However, these reasoning judges may also produce outputs that mislead other judges, raising concerns about their reliability. The study emphasizes the need for further exploration of reasoning judges' effectiveness in real-world policy training scenarios, highlighting both their strengths and weaknesses."}, 'zh': {'title': '推理型评判者：强化学习对齐的新路径', 'desc': '本研究探讨了推理与非推理的大型语言模型（LLM）在基于强化学习的对齐中的有效性。研究发现，推理型评判者能够防止奖励黑客行为，但可能会产生欺骗其他评判者的对抗性输出。尽管推理型评判者在静态评估基准上表现更好，但其在实际策略训练中的有效性尚未系统性研究。我们的研究揭示了推理与非推理评判者之间的关键差异，并强调了在非可验证领域应用推理型LLM评判者的改进空间。'}}}, {'id': 'https://huggingface.co/papers/2603.12145', 'title': 'Automatic Generation of High-Performance RL Environments', 'url': 'https://huggingface.co/papers/2603.12145', 'abstract': 'Abstract Automated framework generates high-performance reinforcement learning environments through prompt-based translation and verification, achieving significant speedups over existing implementations while maintaining semantic equivalence.  \t\t\t\t\tAI-generated summary Translating complex reinforcement learning (RL) environments into high-performance implementations has traditionally required months of specialized engineering. We present a reusable recipe - a generic prompt template, hierarchical verification, and iterative agent-assisted repair - that produces semantically equivalent high-performance environments for <$10 in compute cost. We demonstrate three distinct workflows across five environments. Direct translation (no prior performance implementation exists): EmuRust (1.5x PPO speedup via Rust parallelism for a Game Boy emulator) and PokeJAX, the first GPU-parallel Pokemon battle simulator (500M SPS random action, 15.2M SPS PPO; 22,320x over the TypeScript reference). Translation verified against existing performance implementations: throughput parity with MJX (1.04x) and 5x over Brax at matched GPU batch sizes (HalfCheetah JAX); 42x PPO (Puffer Pong). New environment creation: TCGJax, the first deployable JAX Pokemon TCG engine (717K SPS random action, 153K SPS PPO; 6.6x over the Python reference), synthesized from a web-extracted specification. At 200M parameters, the environment overhead drops below 4% of training time. Hierarchical verification (property, interaction, and rollout tests) confirms semantic equivalence for all five environments; cross-backend policy transfer confirms zero sim-to-sim gap for all five environments. TCGJax, synthesized from a private reference absent from public repositories, serves as a contamination control for agent pretraining data concerns. The paper contains sufficient detail - including representative prompts, verification methodology, and complete results - that a coding agent could reproduce the translations directly from the manuscript.', 'score': 3, 'issue_id': 1475, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'c0454cd1e35eae18', 'authors': ['Seth Karten', 'Rahul Dev Appapogu', 'Chi Jin'], 'affiliations': ['Independent Researcher', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12145.jpg', 'data': {'categories': ['#open_source', '#agents', '#benchmark', '#optimization', '#training', '#rl', '#games'], 'emoji': '⚡', 'ru': {'title': 'Автоматическое ускорение окружений для обучения с подкреплением через промптовый синтез', 'desc': "В работе представлен автоматизированный фреймворк для генерации высокопроизводительных окружений для обучения с подкреплением (reinforcement learning) с помощью LLM и верификации на основе промптов. Исследователи разработали универсальный шаблон промпта, иерархическую систему проверки и итеративный процесс исправления ошибок, которые позволяют создавать семантически эквивалентные реализации окружений за считанные доллары вычислительных ресурсов. Демонстрируется эффективность подхода на пяти окружениях: переводы достигают 22320x ускорения по сравнению с базовыми реализациями, а верификация подтверждает полную семантическую эквивалентность и отсутствие разрыва между различными backend'ами. Методология включает трёхуровневую верификацию (проверки свойств, взаимодействий и траекторий) и позволяет воспроизвести результаты прямо из текста статьи."}, 'en': {'title': 'Automating High-Performance RL Environment Creation', 'desc': 'This paper introduces an automated framework that enhances the creation of high-performance reinforcement learning (RL) environments using prompt-based translation and verification techniques. By employing a generic prompt template and hierarchical verification, the framework significantly reduces the time and cost associated with developing RL environments, achieving high performance with minimal compute expenses. The authors demonstrate the effectiveness of their approach through various workflows, showcasing substantial speedups in multiple environments, including a Game Boy emulator and a Pokemon battle simulator. The framework ensures semantic equivalence through rigorous verification methods, allowing for reliable and efficient RL environment generation.'}, 'zh': {'title': '自动化生成高性能强化学习环境的创新方法', 'desc': '这篇论文提出了一种自动化框架，可以通过基于提示的翻译和验证，生成高性能的强化学习环境。该方法显著提高了现有实现的速度，同时保持了语义等价性。研究展示了三种不同的工作流程，涵盖了五个环境，并且在计算成本上低于10美元。通过分层验证，确保了所有环境的语义等价性，并且提供了足够的细节，使得编码代理可以直接从论文中重现这些翻译。'}}}, {'id': 'https://huggingface.co/papers/2603.12057', 'title': 'Coarse-Guided Visual Generation via Weighted h-Transform Sampling', 'url': 'https://huggingface.co/papers/2603.12057', 'abstract': 'Abstract A novel training-free visual generation method uses h-transform to guide diffusion models with improved quality and generalization compared to existing approaches.  \t\t\t\t\tAI-generated summary Coarse-guided visual generation, which synthesizes fine visual samples from degraded or low-fidelity coarse references, is essential for various real-world applications. While training-based approaches are effective, they are inherently limited by high training costs and restricted generalization due to paired data collection. Accordingly, recent training-free works propose to leverage pretrained diffusion models and incorporate guidance during the sampling process. However, these training-free methods either require knowing the forward (fine-to-coarse) transformation operator, e.g., bicubic downsampling, or are difficult to balance between guidance and synthetic quality. To address these challenges, we propose a novel guided method by using the h-transform, a tool that can constrain stochastic processes (e.g., sampling process) under desired conditions. Specifically, we modify the transition probability at each sampling timestep by adding to the original differential equation with a drift function, which approximately steers the generation toward the ideal fine sample. To address unavoidable approximation errors, we introduce a noise-level-aware schedule that gradually de-weights the term as the error increases, ensuring both guidance adherence and high-quality synthesis. Extensive experiments across diverse image and video generation tasks demonstrate the effectiveness and generalization of our method.', 'score': 3, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'c04eeb42a5d3d5d1', 'authors': ['Yanghao Wang', 'Ziqi Jiang', 'Zhen Wang', 'Long Chen'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.12057.jpg', 'data': {'categories': ['#diffusion', '#training', '#optimization', '#cv', '#video'], 'emoji': '🎨', 'ru': {'title': 'h-преобразование для управления диффузией без обучения', 'desc': 'В работе предложен метод генерации изображений без обучения, который использует h-преобразование для управления диффузионными моделями. Метод решает задачу синтеза высокачественных визуальных образцов из деградированных или низкокачественных исходных данных. Авторы модифицируют вероятность переходов на каждом временном шаге процесса дискретизации, добавляя дрейф-функцию в дифференциальное уравнение, чтобы направить генерацию к идеальному результату. Для управления ошибками аппроксимации используется расписание, чувствительное к уровню шума, что обеспечивает баланс между точностью управления и качеством синтеза.'}, 'en': {'title': 'Guided Visual Generation Without Training', 'desc': 'This paper presents a new method for visual generation that does not require extensive training, using a technique called h-transform to enhance diffusion models. The approach focuses on generating high-quality images from low-fidelity references, which is crucial for many practical applications. Unlike traditional methods that depend on paired data and are costly to train, this training-free method improves generalization and quality by modifying the sampling process. The authors introduce a noise-level-aware schedule to manage approximation errors, ensuring that the generated samples remain close to the desired output while maintaining high fidelity.'}, 'zh': {'title': '无训练视觉生成的新方法', 'desc': '本文提出了一种新颖的无训练视觉生成方法，利用h-transform来指导扩散模型，从而提高生成质量和泛化能力。传统的训练方法虽然有效，但由于高昂的训练成本和配对数据的限制，存在固有的局限性。我们的方法通过修改每个采样时间步的转移概率，结合漂移函数，引导生成过程朝向理想的高质量样本。实验结果表明，该方法在多种图像和视频生成任务中表现出色，具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.11178', 'title': 'PACED: Distillation at the Frontier of Student Competence', 'url': 'https://huggingface.co/papers/2603.11178', 'abstract': "Abstract Distillation processes suffer from inefficient compute usage due to vanishing gradient signals at extreme performance levels, which is addressed through a novel framework that focuses training on the optimal competence zone using a Beta kernel weighting scheme.  \t\t\t\t\tAI-generated summary Standard LLM distillation wastes compute on two fronts: problems the student has already mastered (near-zero gradients) and problems far beyond its reach (incoherent gradients that erode existing capabilities). We show that this waste is not merely intuitive but structurally inevitable: the gradient signal-to-noise ratio in distillation provably vanishes at both pass-rate extremes. This theoretical observation leads to Paced, a framework that concentrates distillation on the zone of proximal development -- the frontier of a student model's competence -- via a principled pass-rate weight w(p) = p^α(1 - p)^β derived from the boundary-vanishing structure of distillation gradients. Key results: (1) Theory: We prove that the Beta kernel w(p) = p^α(1-p)^β is a leading-order weight family arising from the SNR structure of distillation, and that it is minimax-robust -- under bounded multiplicative misspecification, worst-case efficiency loss is only O(δ^2). (2)Distillation: On distillation from a larger teacher to a smaller student model with forward KL, Paced achieves significant gain over the base model, while keeping benchmark forgetting at a low level. (3)Self-distillation: On instruction-tuned models with reverse KL, gains are exceeding baselines as well. (4)Two-stage synergy: A forward-KL-then-reverse-KL schedule yields the strongest results in our setting, reaching substantial improvements on standard reasoning benchmarks -- supporting a mode-coverage-then-consolidation interpretation of the distillation process. All configurations require only student rollouts to estimate pass rates, need no architectural changes, and are compatible with any KL direction.", 'score': 3, 'issue_id': 1482, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'cb826e17b0134023', 'authors': ['Yuanda Xu', 'Hejian Sang', 'Zhengze Zhou', 'Ran He', 'Zhipeng Wang'], 'affiliations': ['Columbia University', 'Cornell University', 'Iowa State University', 'Princeton University', 'Rice University'], 'pdf_title_img': 'assets/pdf/title_img/2603.11178.jpg', 'data': {'categories': ['#optimization', '#small_models', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение в зоне оптимальной компетентности: как сосредоточить дистилляцию там, где это работает', 'desc': 'В статье предложена новая framework Paced для дистилляции модели, которая решает проблему неэффективного использования вычислительных ресурсов. Авторы показали, что градиентный сигнал исчезает при экстремальных уровнях производительности (когда студент уже овладел задачей или она слишком сложна), что математически доказано через анализ отношения сигнала к шуму. Решение заключается в концентрации обучения на зоне проксимального развития студента с помощью взвешивания типа Beta ядра w(p) = p^α(1-p)^β, которое зависит от процента успешно решённых задач. Метод показал значительные улучшения при дистилляции как в прямом, так и в обратном направлении KL дивергенции, а также при двухэтапном обучении, без необходимости изменения архитектуры модели.'}, 'en': {'title': 'Optimizing Distillation with Paced Training', 'desc': "This paper addresses the inefficiencies in machine learning model distillation caused by vanishing gradient signals at both low and high performance levels. It introduces a new framework called Paced, which optimizes training by focusing on the 'optimal competence zone' of the student model using a Beta kernel weighting scheme. The authors prove that this approach enhances the signal-to-noise ratio in distillation, leading to better performance while minimizing forgetting. Key findings include significant improvements in both standard and self-distillation processes, particularly when employing a two-stage training schedule."}, 'zh': {'title': '优化蒸馏过程，提升模型能力', 'desc': '本文提出了一种新的框架，旨在解决蒸馏过程中由于梯度信号消失而导致的计算效率低下问题。该框架通过使用Beta核加权方案，专注于学生模型的最佳能力区域进行训练。研究表明，传统的蒸馏方法在学生已经掌握的内容和超出其能力范围的内容上都存在计算浪费。通过理论证明和实验结果，本文展示了该框架在蒸馏过程中显著提高了模型性能，同时保持了较低的遗忘率。'}}}, {'id': 'https://huggingface.co/papers/2603.11103', 'title': 'Understanding by Reconstruction: Reversing the Software Development Process for LLM Pretraining', 'url': 'https://huggingface.co/papers/2603.11103', 'abstract': "Abstract Large language models trained on reconstructed agent trajectories from multi-agent simulations show improved performance in long-context understanding, coding proficiency, and agentic capabilities.  \t\t\t\t\tAI-generated summary While Large Language Models (LLMs) have achieved remarkable success in code generation, they often struggle with the deep, long-horizon reasoning required for complex software engineering. We attribute this limitation to the nature of standard pre-training data: static software repositories represent only the terminal state of an intricate intellectual process, abstracting away the intermediate planning, debugging, and iterative refinement. To bridge this gap, we propose a novel paradigm: understanding via reconstruction. We hypothesize that reverse-engineering the latent agentic trajectories -- the planning, reasoning, and debugging steps -- behind static repositories provides a far richer supervision signal than raw code alone. To operationalize this, we introduce a framework that synthesizes these trajectories using a multi-agent simulation. This process is grounded in the structural realities of the source repositories (e.g., dependency graphs and file hierarchies) to ensure fidelity. Furthermore, to guarantee the logical rigor of the synthetic data, we employ a search-based optimization technique that iteratively refines the Chain-of-Thought (CoT) reasoning to maximize the likelihood of the ground-truth code. Empirical results demonstrate that continuous pre-training on these reconstructed trajectories significantly enhances Llama-3-8B's performance across diverse benchmarks, including long-context understanding, coding proficiency, and agentic capabilities.", 'score': 3, 'issue_id': 1474, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '9424e2594fb5251a', 'authors': ['Zhiyuan Zeng', 'Yichi Zhang', 'Yong Shan', 'Kai Hua', 'Siyuan Fang', 'Zhaiyu Liu', 'Jiaheng Liu', 'Haozhe Wang', 'Yining Zheng', 'Ming Ding', 'Ke Shen', 'Ge Zhang', 'Wenhao Huang', 'Xipeng Qiu'], 'affiliations': ['ByteDance Seed', 'ByteDance TikTok', 'Fudan University', 'M-A-P', 'Shanghai Innovation Institute', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.11103.jpg', 'data': {'categories': ['#reasoning', '#training', '#optimization', '#agents', '#dataset', '#long_context', '#synthetic', '#plp'], 'emoji': '🔄', 'ru': {'title': 'Обучение через реконструкцию: от статического кода к агентным траекториям', 'desc': 'В исследовании предлагается новый подход к обучению больших языковых моделей, основанный на реконструкции траекторий агентов из мультиагентных симуляций. Вместо использования только статических репозиториев кода, авторы синтезируют промежуточные этапы планирования, отладки и итеративного улучшения кода с помощью многоагентной системы. Для обеспечения корректности синтетических данных применяется поиск-оптимизация, которая итеративно уточняет цепочки рассуждений для максимизации вероятности целевого кода. Экспериментальные результаты показывают, что допредобучение на реконструированных траекториях значительно улучшает производительность модели Llama-3-8B по долгоконтекстному пониманию, навыкам кодирования и агентным способностям.'}, 'en': {'title': 'Reconstructing Agent Trajectories for Enhanced Language Model Performance', 'desc': "This paper presents a new approach to improve Large Language Models (LLMs) by using reconstructed agent trajectories from multi-agent simulations. The authors argue that traditional training methods, which rely on static code repositories, fail to capture the complex reasoning and planning involved in software development. By reverse-engineering the steps taken by agents during coding tasks, they provide a richer training signal that enhances the model's understanding and performance. The proposed framework not only synthesizes these trajectories but also ensures their logical consistency, leading to significant improvements in various coding and reasoning benchmarks."}, 'zh': {'title': '重建代理轨迹，提升语言模型能力', 'desc': '本论文提出了一种新方法，通过重建多智能体模拟中的代理轨迹来提升大型语言模型的性能。我们认为，传统的预训练数据仅代表复杂软件工程过程的最终状态，缺乏中间的规划和调试信息。通过逆向工程这些代理轨迹，我们可以获得比原始代码更丰富的监督信号。实验结果表明，基于重建轨迹的持续预训练显著提高了模型在长文本理解、编码能力和智能体能力等多个基准上的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.10365', 'title': 'Geometric Autoencoder for Diffusion Models', 'url': 'https://huggingface.co/papers/2603.10365', 'abstract': 'Abstract Geometric Autoencoder (GAE) presents a principled approach to latent diffusion modeling by optimizing semantic supervision, latent manifold stability, and reconstruction robustness through geometric alignment and dynamic noise sampling.  \t\t\t\t\tAI-generated summary Latent diffusion models have established a new state-of-the-art in high-resolution visual generation. Integrating Vision Foundation Model priors improves generative efficiency, yet existing latent designs remain largely heuristic. These approaches often struggle to unify semantic discriminability, reconstruction fidelity, and latent compactness. In this paper, we propose Geometric Autoencoder (GAE), a principled framework that systematically addresses these challenges. By analyzing various alignment paradigms, GAE constructs an optimized low-dimensional semantic supervision target from VFMs to provide guidance for the autoencoder. Furthermore, we leverage latent normalization that replaces the restrictive KL-divergence of standard VAEs, enabling a more stable latent manifold specifically optimized for diffusion learning. To ensure robust reconstruction under high-intensity noise, GAE incorporates a dynamic noise sampling mechanism. Empirically, GAE achieves compelling performance on the ImageNet-1K 256 times 256 benchmark, reaching a gFID of 1.82 at only 80 epochs and 1.31 at 800 epochs without Classifier-Free Guidance, significantly surpassing existing state-of-the-art methods. Beyond generative quality, GAE establishes a superior equilibrium between compression, semantic depth and robust reconstruction stability. These results validate our design considerations, offering a promising paradigm for latent diffusion modeling. Code and models are publicly available at https://github.com/freezing-index/Geometric-Autoencoder-for-Diffusion-Models.', 'score': 3, 'issue_id': 1474, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '07d530ade7021c45', 'authors': ['Hangyu Liu', 'Jianyong Wang', 'Yutao Sun'], 'affiliations': ['Shanghai Innovation Institute', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.10365.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#open_source', '#training', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Геометрическая гармония: оптимизация латентных диффузионных моделей через выравнивание и динамический шум', 'desc': 'В статье предлагается Geometric Autoencoder (GAE) — принципиальный подход к разработке латентных диффузионных моделей, который оптимизирует три ключевых аспекта: семантическую дискриминабельность, стабильность латентного многообразия и робастность реконструкции. Фреймворк использует выравнивание с основаниями зрительного восприятия (Vision Foundation Models) для создания оптимального целевого сигнала, заменяет классическое KL-ограничение VAE на латентную нормализацию, что обеспечивает более стабильное латентное пространство. Для надежной реконструкции при высоком уровне шума применяется динамическое семплирование шума, адаптирующееся в процессе обучения. Экспериментальные результаты демонстрируют превосходное качество генерации на ImageNet-1K, достигая gFID 1.31 за 800 эпох, при этом достигая баланса между компрессией данных, семантической глубиной и стабильностью реконструкции.'}, 'en': {'title': 'Revolutionizing Latent Diffusion with Geometric Autoencoder', 'desc': "The Geometric Autoencoder (GAE) introduces a structured method for latent diffusion modeling that enhances visual generation quality. It optimizes semantic supervision and stabilizes the latent manifold while ensuring robust reconstruction through geometric alignment and dynamic noise sampling. By utilizing Vision Foundation Model priors, GAE improves generative efficiency and addresses the challenges of semantic discriminability and reconstruction fidelity. Empirical results demonstrate GAE's superior performance on benchmark datasets, establishing a new standard in the field of generative modeling."}, 'zh': {'title': '几何自编码器：优化潜在扩散建模的新方法', 'desc': '几何自编码器（GAE）提出了一种系统的方法来优化潜在扩散建模，重点在于语义监督、潜在流形的稳定性和重建的鲁棒性。通过几何对齐和动态噪声采样，GAE解决了现有潜在设计中的一些挑战，如语义可区分性、重建保真度和潜在紧凑性。GAE利用视觉基础模型（VFM）构建优化的低维语义监督目标，并采用潜在归一化来替代标准变分自编码器（VAE）中的KL散度，从而实现更稳定的潜在流形。实验结果表明，GAE在高分辨率图像生成任务中表现优异，超越了现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.11665', 'title': 'Multi-Task Reinforcement Learning for Enhanced Multimodal LLM-as-a-Judge', 'url': 'https://huggingface.co/papers/2603.11665', 'abstract': "Abstract Multi-Task Reinforcement Learning framework improves multimodal large language models' judgment consistency and generalization across diverse visual tasks.  \t\t\t\t\tAI-generated summary Multimodal Large Language Models (MLLMs) have been widely adopted as MLLM-as-a-Judges due to their strong alignment with human judgment across various visual tasks. However, most existing judge models are optimized for single-task scenarios and struggle to generalize to diverse contexts, which is a critical requirement for reliable evaluation. To address this limitation, we propose Multi-Task Reinforcement Learning for MLLM-as-a-Judge (MT-RL-Judge), a framework that jointly optimizes the judge model across multiple tasks, leveraging the generalization capabilities of RL. Experimental results against several strong baselines demonstrate that MT-RL-Judge outperforms strong baselines in both judgment consistency and correlation with human preferences. Furthermore, our approach exhibits robust generalization on out-of-distribution tasks, further validating its effectiveness.", 'score': 2, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'b1f896fa4d0205a7', 'authors': ['Junjie Wu', 'Xuan Kan', 'Zihao He', 'Shunwen Tan', 'Bo Pan', 'Kaitai Zhang'], 'affiliations': ['Emory University', 'Hong Kong University of Science and Technology', 'Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.11665.jpg', 'data': {'categories': ['#benchmark', '#rl', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Универсальный судья: многозадачное обучение с подкреплением для надёжной оценки изображений', 'desc': 'В работе предложена фреймворк многозадачного обучения с подкреплением (Multi-Task RL) для улучшения качества мультимодальных больших языковых моделей при оценке визуального контента. Основная проблема заключается в том, что существующие модели-судьи оптимизированы только для одной задачи и плохо обобщаются на разнообразные контексты. Предложенный подход MT-RL-Judge совместно оптимизирует модель на нескольких задачах одновременно, используя возможности обучения с подкреплением для улучшения обобщающей способности. Экспериментальные результаты показывают, что метод превосходит базовые модели по согласованности оценок и коррелирует лучше с человеческими предпочтениями, включая случаи распределения вне обучающего набора.'}, 'en': {'title': 'Enhancing Judgment Consistency with Multi-Task Learning', 'desc': 'This paper introduces a new framework called Multi-Task Reinforcement Learning for MLLM-as-a-Judge (MT-RL-Judge) that enhances the performance of multimodal large language models in evaluating visual tasks. Traditional models often focus on single tasks, which limits their ability to generalize across different contexts. The MT-RL-Judge framework optimizes the model by training it on multiple tasks simultaneously, improving its judgment consistency and alignment with human preferences. Experimental results show that this approach significantly outperforms existing models, especially in handling diverse and out-of-distribution tasks.'}, 'zh': {'title': '多任务强化学习提升判断一致性与泛化能力', 'desc': '这篇论文提出了一种多任务强化学习框架，旨在提高多模态大型语言模型（MLLM）在视觉任务中的判断一致性和泛化能力。现有的评判模型通常只针对单一任务进行优化，难以适应多样化的上下文，这限制了其可靠性。通过联合优化多个任务，MT-RL-Judge框架利用了强化学习的泛化能力，显著提升了模型的表现。实验结果表明，MT-RL-Judge在判断一致性和与人类偏好的相关性方面均优于多个强基线。'}}}, {'id': 'https://huggingface.co/papers/2603.11510', 'title': 'Tiny Aya: Bridging Scale and Multilingual Depth', 'url': 'https://huggingface.co/papers/2603.11510', 'abstract': 'Abstract Tiny Aya demonstrates high-quality multilingual capabilities with 3.35 billion parameters through region-aware posttraining and balanced language performance.  \t\t\t\t\tAI-generated summary Tiny Aya redefines what a small multilingual language model can achieve. Trained on 70 languages and refined through region-aware posttraining, it delivers state-of-the-art in translation quality, strong multilingual understanding, and high-quality target-language generation, all with just 3.35B parameters. The release includes a pretrained foundation model, a globally balanced instruction-tuned variant, and three region-specialized models targeting languages from Africa, South Asia, Europe, Asia-Pacific, and West Asia. This report details the training strategy, data composition, and comprehensive evaluation framework behind Tiny Aya, and presents an alternative scaling path for multilingual AI: one centered on efficiency, balanced performance across languages, and practical deployment.', 'score': 2, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '26af11841933d6eb', 'authors': ['Alejandro R. Salamanca', 'Diana Abagyan', "Daniel D'souza", 'Ammar Khairi', 'David Mora', 'Saurabh Dash', 'Viraat Aryabumi', 'Sara Rajaee', 'Mehrnaz Mofakhami', 'Ananya Sahu', 'Thomas Euyang', 'Brittawnya Prince', 'Madeline Smith', 'Hangyu Lin', 'Acyr Locatelli', 'Sara Hooker', 'Tom Kocmi', 'Aidan Gomez', 'Ivan Zhang', 'Phil Blunsom', 'Nick Frosst', 'Joelle Pineau', 'Beyza Ermis', 'Ahmet Üstün', 'Julia Kreutzer', 'Marzieh Fadaee'], 'affiliations': ['Cohere', 'Cohere Labs'], 'pdf_title_img': 'assets/pdf/title_img/2603.11510.jpg', 'data': {'categories': ['#benchmark', '#machine_translation', '#training', '#open_source', '#dataset', '#low_resource', '#multilingual'], 'emoji': '🌍', 'ru': {'title': 'Эффективная многоязычность: компактная модель с глобальным охватом', 'desc': 'Tiny Aya — это компактная многоязычная языковая модель с 3.35 миллиардами параметров, обученная на 70 языках. Модель использует инновационный подход к постобучению, ориентированный на региональные особенности, что позволяет достичь сбалансированной производительности без ущерба для качества. Исследование представляет несколько вариантов моделей: базовую претренированную версию, инструктированный вариант и три специализированные модели для разных регионов мира. Работа демонстрирует эффективный путь масштабирования многоязычных систем, сосредоточенный на оптимизации ресурсов и практическом развёртывании.'}, 'en': {'title': 'Tiny Aya: Efficient Multilingual Mastery with 3.35B Parameters', 'desc': 'Tiny Aya is a multilingual language model that utilizes 3.35 billion parameters to achieve impressive performance across 70 languages. It employs region-aware posttraining to enhance translation quality and multilingual understanding. The model includes a pretrained foundation, an instruction-tuned variant, and specialized models for different regions. This research highlights a new approach to scaling multilingual AI, focusing on efficiency and balanced language performance.'}, 'zh': {'title': 'Tiny Aya：高效的多语言 AI 模型', 'desc': 'Tiny Aya 是一个具有 33.5 亿参数的多语言模型，展示了高质量的多语言能力。它通过区域感知的后训练和均衡的语言表现，能够在 70 种语言上提供卓越的翻译质量和强大的多语言理解能力。该模型包括一个预训练的基础模型、一个全球均衡的指令调优变体，以及三个针对特定地区的模型，覆盖非洲、南亚、欧洲、亚太和西亚的语言。这篇报告详细介绍了 Tiny Aya 的训练策略、数据组成和全面的评估框架，提出了一种以效率和均衡性能为中心的多语言 AI 扩展路径。'}}}, {'id': 'https://huggingface.co/papers/2603.10420', 'title': 'FireRedASR2S: A State-of-the-Art Industrial-Grade All-in-One Automatic Speech Recognition System', 'url': 'https://huggingface.co/papers/2603.10420', 'abstract': 'Abstract FireRedASR2S is an industrial-grade ASR system integrating unified modules for speech recognition, voice activity detection, language identification, and punctuation prediction, achieving state-of-the-art performance across multiple benchmarks.  \t\t\t\t\tAI-generated summary We present FireRedASR2S, a state-of-the-art industrial-grade all-in-one automatic speech recognition (ASR) system. It integrates four modules in a unified pipeline: ASR, Voice Activity Detection (VAD), Spoken Language Identification (LID), and Punctuation Prediction (Punc). All modules achieve SOTA performance on the evaluated benchmarks: FireRedASR2: An ASR module with two variants, FireRedASR2-LLM (8B+ parameters) and FireRedASR2-AED (1B+ parameters), supporting speech and singing transcription for Mandarin, Chinese dialects and accents, English, and code-switching. Compared to FireRedASR, FireRedASR2 delivers improved recognition accuracy and broader dialect and accent coverage. FireRedASR2-LLM achieves 2.89% average CER on 4 public Mandarin benchmarks and 11.55% on 19 public Chinese dialects and accents benchmarks, outperforming competitive baselines including Doubao-ASR, Qwen3-ASR, and Fun-ASR. FireRedVAD: An ultra-lightweight module (0.6M parameters) based on the Deep Feedforward Sequential Memory Network (DFSMN), supporting streaming VAD, non-streaming VAD, and multi-label VAD (mVAD). On the FLEURS-VAD-102 benchmark, it achieves 97.57% frame-level F1 and 99.60% AUC-ROC, outperforming Silero-VAD, TEN-VAD, FunASR-VAD, and WebRTC-VAD. FireRedLID: An Encoder-Decoder LID module supporting 100+ languages and 20+ Chinese dialects and accents. On FLEURS (82 languages), it achieves 97.18% utterance-level accuracy, outperforming Whisper and SpeechBrain. FireRedPunc: A BERT-style punctuation prediction module for Chinese and English. On multi-domain benchmarks, it achieves 78.90% average F1, outperforming FunASR-Punc (62.77%). To advance research in speech processing, we release model weights and code at https://github.com/FireRedTeam/FireRedASR2S.', 'score': 2, 'issue_id': 1474, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'aa1c90d9f7f2042f', 'authors': ['Kaituo Xu', 'Yan Jia', 'Kai Huang', 'Junjie Chen', 'Wenpeng Li', 'Kun Liu', 'Feng-Long Xie', 'Xu Tang', 'Yao Hu'], 'affiliations': ['Super Intelligence Team, Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.10420.jpg', 'data': {'categories': ['#benchmark', '#audio', '#small_models', '#open_source', '#multilingual'], 'emoji': '🎤', 'ru': {'title': 'Всё в одном: промышленная система распознавания речи с четырьмя интегрированными модулями', 'desc': 'FireRedASR2S — это промышленная система автоматического распознавания речи, объединяющая в единый конвейер четыре специализированных модуля: распознавание речи, детектирование голоса, определение языка и предсказание пунктуации. Модуль распознавания представлен двумя вариантами — на основе LLM с 8+ миллиардами параметров и архитектуре Encoder-Decoder с 1+ миллиардом параметров, поддерживающих мандаринский, диалекты, английский язык и code-switching. Система достигает наилучших результатов на множестве бенчмарков и обеспечивает чрезвычайно компактные модули детектирования голоса и определения языка благодаря оптимизированным архитектурам на основе DFSMN и Encoder-Decoder.'}, 'en': {'title': 'Revolutionizing Speech Recognition with FireRedASR2S', 'desc': "FireRedASR2S is a comprehensive automatic speech recognition (ASR) system that combines multiple functionalities into a single framework. It includes modules for speech recognition, voice activity detection (VAD), language identification (LID), and punctuation prediction, all achieving state-of-the-art (SOTA) performance. The ASR module offers two variants optimized for different tasks, significantly improving accuracy and supporting a wide range of languages and dialects. Additionally, the system's lightweight VAD and advanced LID capabilities enhance its versatility and effectiveness in real-world applications."}, 'zh': {'title': '一体化的先进语音识别系统', 'desc': 'FireRedASR2S是一个工业级的自动语音识别（ASR）系统，集成了语音识别、语音活动检测（VAD）、语言识别（LID）和标点预测等模块。该系统在多个基准测试中表现出色，提供了更高的识别准确率和更广泛的方言及口音覆盖。FireRedASR2-LLM和FireRedASR2-AED是其ASR模块的两个变体，支持普通话、方言、英语及代码切换的转录。我们还发布了模型权重和代码，以推动语音处理领域的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.10055', 'title': 'Training Language Models via Neural Cellular Automata', 'url': 'https://huggingface.co/papers/2603.10055', 'abstract': 'Abstract Neural cellular automata generate synthetic spatiotemporal data for pre-pre-training large language models, achieving better performance and faster convergence than traditional natural language pre-training.  \t\t\t\t\tAI-generated summary Pre-training is crucial for large language models (LLMs), as it is when most representations and capabilities are acquired. However, natural language pre-training has problems: high-quality text is finite, it contains human biases, and it entangles knowledge with reasoning. This raises a fundamental question: is natural language the only path to intelligence? We propose using neural cellular automata (NCA) to generate synthetic, non-linguistic data for pre-pre-training LLMs--training on synthetic-then-natural language. NCA data exhibits rich spatiotemporal structure and statistics resembling natural language while being controllable and cheap to generate at scale. We find that pre-pre-training on only 164M NCA tokens improves downstream language modeling by up to 6% and accelerates convergence by up to 1.6x. Surprisingly, this even outperforms pre-pre-training on 1.6B tokens of natural language from Common Crawl with more compute. These gains also transfer to reasoning benchmarks, including GSM8K, HumanEval, and BigBench-Lite. Investigating what drives transfer, we find that attention layers are the most transferable, and that optimal NCA complexity varies by domain: code benefits from simpler dynamics, while math and web text favor more complex ones. These results enable systematic tuning of the synthetic distribution to target domains. More broadly, our work opens a path toward more efficient models with fully synthetic pre-training.', 'score': 2, 'issue_id': 1478, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '70177f2ec12514fc', 'authors': ['Dan Lee', 'Seungwook Han', 'Akarsh Kumar', 'Pulkit Agrawal'], 'affiliations': ['Improbable AI Lab', 'Independent Contributor', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2603.10055.jpg', 'data': {'categories': ['#synthetic', '#architecture', '#training', '#reasoning', '#dataset', '#transfer_learning'], 'emoji': '🧬', 'ru': {'title': 'Синтетическое предварительное обучение вместо естественного языка', 'desc': 'В работе предлагается использовать нейронные клеточные автоматы (NCA) для генерации синтетических данных, которые служат промежуточным этапом предварительного обучения больших языковых моделей перед обучением на естественном языке. Синтетические данные от NCA обладают богатой пространственно-временной структурой и статистическими свойствами, похожими на естественный язык, но при этом легко контролируются и дёшевы в масштабировании. Исследование показывает, что предварительное обучение на 164 миллионах токенов NCA улучшает качество языкового моделирования на 6% и ускоряет сходимость в 1.6 раза, что превосходит результаты обучения на 1.6 миллиардах токенов из естественного языка. Эти улучшения также передаются на задачи рассуждения, при этом авторы выявили, что оптимальная сложность NCA зависит от целевого домена.'}, 'en': {'title': 'Synthetic Data Revolutionizes Language Model Pre-Training', 'desc': 'This paper introduces a novel approach to pre-training large language models (LLMs) using neural cellular automata (NCA) to generate synthetic spatiotemporal data. By leveraging NCA, the authors demonstrate that LLMs can achieve better performance and faster convergence compared to traditional natural language pre-training methods. The study reveals that pre-pre-training on a smaller dataset of NCA tokens can outperform larger datasets of natural language, highlighting the potential of synthetic data in enhancing model capabilities. Additionally, the findings suggest that the complexity of the NCA data can be tuned to optimize performance across different domains, paving the way for more efficient and effective pre-training strategies.'}, 'zh': {'title': '合成数据助力语言模型高效预训练', 'desc': '这篇论文提出了一种使用神经元细胞自动机（NCA）生成合成时空数据的方法，以用于大型语言模型（LLMs）的预预训练。与传统的自然语言预训练相比，这种方法在性能和收敛速度上都有显著提升。研究表明，仅使用1.64亿个NCA标记的预预训练可以提高下游语言建模的效果，并加快收敛速度。该方法的成功也为使用合成数据进行更高效的模型预训练开辟了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2603.07988', 'title': 'TeamHOI: Learning a Unified Policy for Cooperative Human-Object Interactions with Any Team Size', 'url': 'https://huggingface.co/papers/2603.07988', 'abstract': 'Abstract TeamHOI enables decentralized cooperative human-object interaction using a Transformer-based policy with teammate tokens and a masked adversarial motion prior for realistic multi-agent coordination.  \t\t\t\t\tAI-generated summary Physics-based humanoid control has achieved remarkable progress in enabling realistic and high-performing single-agent behaviors, yet extending these capabilities to cooperative human-object interaction (HOI) remains challenging. We present TeamHOI, a framework that enables a single decentralized policy to handle cooperative HOIs across any number of cooperating agents. Each agent operates using local observations while attending to other teammates through a Transformer-based policy network with teammate tokens, allowing scalable coordination across variable team sizes. To enforce motion realism while addressing the scarcity of cooperative HOI data, we further introduce a masked Adversarial Motion Prior (AMP) strategy that uses single-human reference motions while masking object-interacting body parts during training. The masked regions are then guided through task rewards to produce diverse and physically plausible cooperative behaviors. We evaluate TeamHOI on a challenging cooperative carrying task involving two to eight humanoid agents and varied object geometries. Finally, to promote stable carrying, we design a team-size- and shape-agnostic formation reward. TeamHOI achieves high success rates and demonstrates coherent cooperation across diverse configurations with a single policy.', 'score': 2, 'issue_id': 1474, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'f356454b72cd6ecc', 'authors': ['Stefan Lionar', 'Gim Hee Lee'], 'affiliations': ['Garena', 'National University of Singapore', 'Sea AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.07988.jpg', 'data': {'categories': ['#architecture', '#optimization', '#robotics', '#training'], 'emoji': '🤝', 'ru': {'title': 'Единая политика для многоагентной кооперации через маскированный Adversarial Motion Prior', 'desc': 'В работе представлена框架 TeamHOI для децентрализованного управления кооперативным взаимодействием человека и объекта с использованием Transformer-политики, где каждый агент обрабатывает локальные наблюдения и координируется с товарищами через специальные токены. Для обеспечения реалистичности движений при недостатке данных применяется маскированная Adversarial Motion Prior (AMP), которая использует референцные движения одного человека с маскированием частей тела, взаимодействующих с объектом. Маскированные области управляются через награды задачи для генерации разнообразных физически правдоподобных совместных поведений. Система демонстрирует высокий процент успеха на задаче кооперативного переноса объектов с переменным числом агентов и разными геометриями объектов.'}, 'en': {'title': 'Decentralized Cooperation for Realistic Human-Object Interaction', 'desc': 'TeamHOI is a framework designed for decentralized cooperative human-object interaction (HOI) using a Transformer-based policy. It allows multiple agents to work together effectively by utilizing local observations and attending to each other through teammate tokens. To enhance realism in motion and tackle the lack of cooperative HOI data, it employs a masked Adversarial Motion Prior (AMP) strategy that focuses on relevant body parts during training. The framework has been tested on complex tasks with varying team sizes and object shapes, achieving high success rates and demonstrating effective cooperation among agents.'}, 'zh': {'title': 'TeamHOI：去中心化的合作人机互动框架', 'desc': 'TeamHOI是一个框架，旨在通过去中心化的策略实现人类与物体的合作互动。它使用基于Transformer的政策网络，允许多个代理在不同的团队规模下进行协调。为了提高运动的真实感，TeamHOI引入了一种掩蔽对抗运动先验策略，利用单个人类参考动作进行训练。通过这种方法，TeamHOI在复杂的合作任务中表现出高成功率和一致的合作行为。'}}}, {'id': 'https://huggingface.co/papers/2603.07865', 'title': 'SoundWeaver: Semantic Warm-Starting for Text-to-Audio Diffusion Serving', 'url': 'https://huggingface.co/papers/2603.07865', 'abstract': 'Abstract SoundWeaver accelerates text-to-audio diffusion generation by caching semantically similar audio and dynamically skipping function evaluations, achieving significant latency reduction with minimal quality loss.  \t\t\t\t\tAI-generated summary Text-to-audio diffusion models produce high-fidelity audio but require tens of function evaluations (NFEs), incurring multi-second latency and limited throughput. We present SoundWeaver, the first training-free, model-agnostic serving system that accelerates text-to-audio diffusion by warm-starting from semantically similar cached audio. SoundWeaver introduces three components: a Reference Selector that retrieves and temporally aligns cached candidates via semantic and duration-aware gating; a Skip Gater that dynamically determines the percentage of NFEs to skip; and a lightweight Cache Manager that maintains cache utility through quality-aware eviction and refinement. On real-world audio traces, SoundWeaver achieves 1.8--3.0 times  latency reduction with a cache of only {sim}1K entries while preserving or improving perceptual quality.', 'score': 2, 'issue_id': 1474, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'ab72474a69b7bd9c', 'authors': ['Ayush Barik', 'Sofia Stoica', 'Nikhil Sarda', 'Arnav Kethana', 'Abhinav Khanduja', 'Muchen Xu', 'Fan Lai'], 'affiliations': ['Assured Intelligence, USA', 'University of Illinois Urbana-Champaign, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.07865.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Ускорение генерации аудио через кэширование семантически близких примеров', 'desc': 'SoundWeaver — это система для ускорения диффузионных моделей генерации аудио из текста, которая кэширует семантически похожие аудиозаписи и динамически пропускает вычисления функций оценки. Система состоит из трёх компонентов: селектор референций для поиска и выравнивания кэшированных кандидатов, гейтер пропусков для определения количества пропускаемых итераций, и менеджер кэша для поддержания его полезности. Работая без обучения и независимо от конкретной модели, SoundWeaver достигает ускорения в 1.8-3.0 раза при кэше всего из ~1000 записей, сохраняя или улучшая перцептивное качество звука.'}, 'en': {'title': 'Accelerating Text-to-Audio Generation with Smart Caching', 'desc': 'SoundWeaver is a novel system designed to speed up text-to-audio diffusion generation by utilizing cached audio that is semantically similar to the input text. It operates without the need for training, making it adaptable to various models. The system features a Reference Selector for aligning cached audio, a Skip Gater to reduce the number of function evaluations needed, and a Cache Manager to optimize cache usage. As a result, SoundWeaver significantly decreases latency while maintaining or enhancing audio quality, achieving up to 3 times faster performance with a small cache.'}, 'zh': {'title': '加速文本到音频生成的创新解决方案', 'desc': 'SoundWeaver 是一种加速文本到音频扩散生成的系统，通过缓存语义相似的音频并动态跳过函数评估，显著减少延迟且几乎不损失质量。该系统不需要训练，适用于各种模型，能够通过从缓存中快速启动来提高效率。SoundWeaver 包含三个主要组件：参考选择器、跳过门控器和轻量级缓存管理器，分别负责检索、动态跳过和维护缓存的有效性。实验证明，SoundWeaver 在真实音频数据上实现了 1.8 到 3.0 倍的延迟减少，同时保持或提升了感知质量。'}}}, {'id': 'https://huggingface.co/papers/2603.07534', 'title': 'Accent Vector: Controllable Accent Manipulation for Multilingual TTS Without Accented Data', 'url': 'https://huggingface.co/papers/2603.07534', 'abstract': 'Abstract Accent Vector enables controllable accent manipulation in multilingual TTS systems through fine-tuning on native speech from different languages and computing task vectors that capture accent characteristics.  \t\t\t\t\tAI-generated summary Accent is an integral part of society, reflecting multiculturalism and shaping how individuals express identity. The majority of English speakers are non-native (L2) speakers, yet current Text-To-Speech (TTS) systems primarily model American-accented English due limited accented data. We propose Accent Vector, a controllable representation that enables accent manipulation in multilingual TTS without requiring accented training data. Accent Vector is derived by fine-tuning a TTS system on native speech of a different language (i.e. non-English) and computing task vectors capturing accent characteristics (i.e. in English). By scaling and interpolating the vector, we achieve fine-grained control over accent strength and generate mixed-accent speech. In addition, it generalizes beyond English, enabling accent control across multiple languages. Objective and human evaluations confirm the effectiveness of Accent Vector for fine-grained and compositional accent control.', 'score': 2, 'issue_id': 1475, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '453143aba84c579c', 'authors': ['Thanathai Lertpetchpun', 'Thanapat Trachu', 'Jihwan Lee', 'Tiantian Feng', 'Dani Byrd', 'Shrikanth Narayanan'], 'affiliations': ['Department of Linguistics, University of Southern California', 'Signal Analysis and Interpretation Lab, University of Southern California, USA', 'Thomas Lord Department of Computer Science, University of Southern California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.07534.jpg', 'data': {'categories': ['#training', '#audio', '#multilingual'], 'emoji': '🗣️', 'ru': {'title': 'Векторы акцента для управления произношением в синтезе речи', 'desc': 'Авторы предлагают Accent Vector — метод для контролируемого управления акцентом в многоязычных системах синтеза речи. Подход основан на fine-tuning модели TTS на родной речи из других языков и вычислении векторов задач, которые захватывают характеристики акцента. Масштабируя и интерполируя эти векторы, можно достичь точного контроля над силой акцента и генерировать речь со смешанными акцентами. Метод показывает хорошие результаты как для английского, так и для других языков, что подтверждается объективными метриками и оценками людей.'}, 'en': {'title': 'Empowering Multilingual TTS with Accent Control', 'desc': 'The paper introduces Accent Vector, a method for manipulating accents in multilingual Text-To-Speech (TTS) systems. It allows for accent control without needing extensive accented training data by fine-tuning on native speech from various languages. By computing task vectors that capture accent characteristics, the system can generate speech with varying accent strengths. Evaluations show that Accent Vector effectively enables nuanced accent manipulation across different languages.'}, 'zh': {'title': '可控口音操控的创新技术', 'desc': '本论文提出了一种名为Accent Vector的技术，旨在实现多语言文本到语音（TTS）系统中的可控口音操控。通过对不同语言的母语语音进行微调，Accent Vector能够捕捉口音特征，而无需依赖于带有口音的训练数据。该方法允许用户精细调整口音强度，并生成混合口音的语音，具有广泛的适用性。研究结果表明，Accent Vector在口音控制的精细度和组合性方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.05483', 'title': 'SurvHTE-Bench: A Benchmark for Heterogeneous Treatment Effect Estimation in Survival Analysis', 'url': 'https://huggingface.co/papers/2603.05483', 'abstract': 'Abstract SurvHTE-Bench presents the first comprehensive benchmark for heterogeneous treatment effects estimation with censored survival data, featuring synthetic, semi-synthetic, and real-world datasets with varying causal assumptions and survival dynamics.  \t\t\t\t\tAI-generated summary Estimating heterogeneous treatment effects (HTEs) from right-censored survival data is critical in high-stakes applications such as precision medicine and individualized policy-making. Yet, the survival analysis setting poses unique challenges for HTE estimation due to censoring, unobserved counterfactuals, and complex identification assumptions. Despite recent advances, from Causal Survival Forests to survival meta-learners and outcome imputation approaches, evaluation practices remain fragmented and inconsistent. We introduce SurvHTE-Bench, the first comprehensive benchmark for HTE estimation with censored outcomes. The benchmark spans (i) a modular suite of synthetic datasets with known ground truth, systematically varying causal assumptions and survival dynamics, (ii) semi-synthetic datasets that pair real-world covariates with simulated treatments and outcomes, and (iii) real-world datasets from a twin study (with known ground truth) and from an HIV clinical trial. Across synthetic, semi-synthetic, and real-world settings, we provide the first rigorous comparison of survival HTE methods under diverse conditions and realistic assumption violations. SurvHTE-Bench establishes a foundation for fair, reproducible, and extensible evaluation of causal survival methods. The data and code of our benchmark are available at: https://github.com/Shahriarnz14/SurvHTE-Bench .', 'score': 2, 'issue_id': 1483, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'c18aa88ca2875dc4', 'authors': ['Shahriar Noroozizadeh', 'Xiaobin Shen', 'Jeremy C. Weiss', 'George H. Chen'], 'affiliations': ['Carnegie Mellon University', 'National Institutes of Health'], 'pdf_title_img': 'assets/pdf/title_img/2603.05483.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#healthcare'], 'emoji': '⚕️', 'ru': {'title': 'Единый стандарт для оценки персонализированных эффектов лечения при цензурированных данных о выживаемости', 'desc': 'В работе представлен первый комплексный бенчмарк для оценки гетерогенных эффектов лечения в условиях цензурированных данных о выживаемости. Бенчмарк включает синтетические, полусинтетические и реальные датасеты с различными причинно-следственными предположениями и динамикой выживания. Авторы проводят систематическое сравнение методов каузального анализа выживаемости, включая Causal Survival Forests и методы импутации исходов, под действием различных нарушений предположений. Это исследование устанавливает стандартные практики для воспроизводимой и справедливой оценки методов причинного анализа в медицинских приложениях и персонализированной медицине.'}, 'en': {'title': 'Benchmarking Heterogeneous Treatment Effects in Survival Analysis', 'desc': 'SurvHTE-Bench is a new benchmark designed to evaluate methods for estimating heterogeneous treatment effects (HTEs) from censored survival data. It includes a variety of datasets, such as synthetic, semi-synthetic, and real-world examples, to test different causal assumptions and survival dynamics. The benchmark aims to address challenges in survival analysis, like censoring and unobserved counterfactuals, by providing a structured way to compare various HTE estimation techniques. This initiative promotes consistent evaluation practices and supports advancements in precision medicine and individualized policy-making.'}, 'zh': {'title': '生存数据中的异质性治疗效应估计基准', 'desc': 'SurvHTE-Bench是第一个针对异质性治疗效应估计的综合基准，专注于右删失生存数据。该基准包含合成、半合成和真实世界数据集，涵盖不同的因果假设和生存动态。尽管已有多种方法，如因果生存森林和生存元学习者，但评估实践仍然不一致。SurvHTE-Bench为生存HTE方法提供了系统的比较基础，促进了因果生存方法的公平、可重复和可扩展的评估。'}}}, {'id': 'https://huggingface.co/papers/2603.12089', 'title': 'EmbTracker: Traceable Black-box Watermarking for Federated Language Models', 'url': 'https://huggingface.co/papers/2603.12089', 'abstract': 'Abstract EmbTracker is a server-side black-box watermarking framework for federated language models that provides client-level traceability through unique identity-specific watermarks embedded via backdoor detection mechanisms.  \t\t\t\t\tAI-generated summary Federated Language Model (FedLM) allows a collaborative learning without sharing raw data, yet it introduces a critical vulnerability, as every untrustworthy client may leak the received functional model instance. Current watermarking schemes for FedLM often require white-box access and client-side cooperation, providing only group-level proof of ownership rather than individual traceability. We propose EmbTracker, a server-side, traceable black-box watermarking framework specifically designed for FedLMs. EmbTracker achieves black-box verifiability by embedding a backdoor-based watermark detectable through simple API queries. Client-level traceability is realized by injecting unique identity-specific watermarks into the model distributed to each client. In this way, a leaked model can be attributed to a specific culprit, ensuring robustness even against non-cooperative participants. Extensive experiments on various language and vision-language models demonstrate that EmbTracker achieves robust traceability with verification rates near 100\\%, high resilience against removal attacks (fine-tuning, pruning, quantization), and negligible impact on primary task performance (typically within 1-2\\%).', 'score': 1, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '4a6e8b122c70271a', 'authors': ['Haodong Zhao', 'Jinming Hu', 'Yijie Bai', 'Tian Dong', 'Wei Du', 'Zhuosheng Zhang', 'Yanjiao Chen', 'Haojin Zhu', 'Gongshen Liu'], 'affiliations': ['Ant Group, China', 'College of Electrical Engineering, Zhejiang University, Hangzhou, China', 'Inner Mongolia Research Institute, Shanghai Jiao Tong University', 'School of Computer Science, Shanghai Jiao Tong University, Shanghai, China', 'The University of Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.12089.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Отследи утечку: уникальные водяные знаки для каждого клиента в федеративном обучении', 'desc': 'EmbTracker — это фреймворк водяных знаков для федеративного обучения языковых моделей, работающий на стороне сервера в режиме чёрного ящика. Система встраивает уникальные идентификаторы в виде бэкдор-детектируемых водяных знаков в каждую копию модели, отправляемую клиентам, обеспечивая возможность отследить утечку модели до конкретного источника. В отличие от существующих методов, EmbTracker не требует доступа к внутренней структуре модели или сотрудничества клиентов, предоставляя проверку через простые запросы к API. Метод демонстрирует высокую эффективность (близко 100% верификация) и устойчивость к атакам удаления (fine-tuning, pruning, quantization) при минимальном влиянии на производительность основной задачи.'}, 'en': {'title': 'Empowering Traceability in Federated Learning with EmbTracker', 'desc': "EmbTracker is a novel watermarking framework designed for federated language models (FedLMs) that enhances client-level traceability. It operates as a server-side solution, embedding unique identity-specific watermarks into the models distributed to clients, which allows for individual attribution in case of model leakage. Unlike traditional watermarking methods that require client cooperation and white-box access, EmbTracker utilizes backdoor detection mechanisms to ensure robust black-box verifiability. Extensive testing shows that it maintains high verification rates and resilience against common model manipulation techniques, while minimally affecting the model's performance on primary tasks."}, 'zh': {'title': 'EmbTracker：确保联邦学习模型的个体可追溯性', 'desc': 'EmbTracker是一个针对联邦语言模型的服务器端黑箱水印框架，能够通过后门检测机制嵌入独特的身份特定水印，实现客户端级别的可追溯性。该框架解决了现有水印方案需要白箱访问和客户端合作的问题，提供了个体追溯而非仅仅是群体所有权证明。通过简单的API查询，EmbTracker实现了黑箱可验证性，并确保即使在不合作的参与者中也能追踪到泄露的模型。实验结果表明，EmbTracker在多种语言和视觉语言模型上实现了接近100%的验证率，并且对移除攻击具有很高的抗性，同时对主要任务性能的影响微乎其微。'}}}, {'id': 'https://huggingface.co/papers/2603.12046', 'title': 'Dr. SHAP-AV: Decoding Relative Modality Contributions via Shapley Attribution in Audio-Visual Speech Recognition', 'url': 'https://huggingface.co/papers/2603.12046', 'abstract': 'Abstract Dr. SHAP-AV framework uses Shapley values to analyze modality contributions in audio-visual speech recognition, revealing how models balance acoustic and visual information under varying noise conditions.  \t\t\t\t\tAI-generated summary Audio-Visual Speech Recognition (AVSR) leverages both acoustic and visual information for robust recognition under noise. However, how models balance these modalities remains unclear. We present Dr. SHAP-AV, a framework using Shapley values to analyze modality contributions in AVSR. Through experiments on six models across two benchmarks and varying SNR levels, we introduce three analyses: Global SHAP for overall modality balance, Generative SHAP for contribution dynamics during decoding, and Temporal Alignment SHAP for input-output correspondence. Our findings reveal that models shift toward visual reliance under noise yet maintain high audio contributions even under severe degradation. Modality balance evolves during generation, temporal alignment holds under noise, and SNR is the dominant factor driving modality weighting. These findings expose a persistent audio bias, motivating ad-hoc modality-weighting mechanisms and Shapley-based attribution as a standard AVSR diagnostic.', 'score': 1, 'issue_id': 1480, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '75b327b7e4aa5a91', 'authors': ['Umberto Cappellazzo', 'Stavros Petridis', 'Maja Pantic'], 'affiliations': ['Imperial College London', 'NatWest AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.12046.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#audio'], 'emoji': '👂', 'ru': {'title': 'Раскрывая баланс модальностей в речевых системах через объяснимость Шапли', 'desc': 'Авторы представляют Dr. SHAP-AV — фреймворк для анализа того, как модели аудио-визуального распознавания речи балансируют акустическую и визуальную информацию. Используя значения Шапли, они изучают вклад каждой модальности на трёх уровнях: глобальный баланс, динамику во время декодирования и согласованность временных соответствий. Исследование на шести моделях показало, что при шуме модели смещаются в сторону визуальной информации, но при этом сохраняют значительный вклад звука даже в сложных условиях. Работа выявляет устойчивый акустический смещение в моделях и предлагает использовать методы на основе значений Шапли в качестве стандартного инструмента диагностики для аудио-визуальных систем.'}, 'en': {'title': 'Balancing Audio and Visual Cues in Noisy Speech Recognition', 'desc': 'The Dr. SHAP-AV framework utilizes Shapley values to investigate how audio and visual information contribute to speech recognition in noisy environments. It reveals that models tend to rely more on visual cues when noise levels increase, while still maintaining significant audio contributions. The framework includes three types of analyses: Global SHAP for overall modality balance, Generative SHAP for understanding contributions during decoding, and Temporal Alignment SHAP for examining the relationship between inputs and outputs. The study highlights a consistent audio bias in models, suggesting the need for improved methods to balance modality contributions in audio-visual speech recognition.'}, 'zh': {'title': '揭示音视频语音识别中的模态平衡', 'desc': 'Dr. SHAP-AV框架利用Shapley值分析音视频语音识别中的模态贡献，揭示了模型在不同噪声条件下如何平衡声学和视觉信息。通过对六个模型在两个基准和不同信噪比(SNR)水平下的实验，我们引入了三种分析方法：全局SHAP用于整体模态平衡，生成SHAP用于解码过程中的贡献动态，时间对齐SHAP用于输入输出的对应关系。研究发现，在噪声条件下，模型更依赖视觉信息，但即使在严重退化的情况下，音频贡献仍然保持较高水平。我们的结果表明，模态平衡在生成过程中不断演变，时间对齐在噪声下依然有效，而信噪比是驱动模态加权的主要因素。'}}}, {'id': 'https://huggingface.co/papers/2603.11653', 'title': 'Simple Recipe Works: Vision-Language-Action Models are Natural Continual Learners with Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.11653', 'abstract': 'Abstract Sequential fine-tuning with low-rank adaptation demonstrates superior performance in continual reinforcement learning for vision-language-action models, challenging conventional wisdom about catastrophic forgetting.  \t\t\t\t\tAI-generated summary Continual Reinforcement Learning (CRL) for Vision-Language-Action (VLA) models is a promising direction toward self-improving embodied agents that can adapt in openended, evolving environments. However, conventional wisdom from continual learning suggests that naive Sequential Fine-Tuning (Seq. FT) leads to catastrophic forgetting, necessitating complex CRL strategies. In this work, we take a step back and conduct a systematic study of CRL for large pretrained VLAs across three models and five challenging lifelong RL benchmarks. We find that, contrary to established belief, simple Seq. FT with low-rank adaptation (LoRA) is remarkably strong: it achieves high plasticity, exhibits little to no forgetting, and retains strong zero-shot generalization, frequently outperforming more sophisticated CRL methods. Through detailed analysis, we show that this robustness arises from a synergy between the large pretrained model, parameter-efficient adaptation, and on-policy RL. Together, these components reshape the stability-plasticity trade-off, making continual adaptation both stable and scalable. Our results position Sequential Fine-Tuning as a powerful method for continual RL with VLAs and provide new insights into lifelong learning in the large model era. Code is available at github.com/UT-Austin-RobIn/continual-vla-rl.', 'score': 1, 'issue_id': 1480, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'a8a275ef5d421cb3', 'authors': ['Jiaheng Hu', 'Jay Shim', 'Chen Tang', 'Yoonchang Sung', 'Bo Liu', 'Peter Stone', 'Roberto Martin-Martin'], 'affiliations': ['NTU', 'Sony AI', 'UCLA', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2603.11653.jpg', 'data': {'categories': ['#training', '#rl', '#robotics', '#multimodal', '#optimization', '#transfer_learning', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'Low-rank адаптация побеждает катастрофическое забывание в непрерывном обучении роботов', 'desc': 'В работе исследуется непрерывное обучение с подкреплением для мультимодальных моделей зрения-языка-действия с помощью простого последовательного fine-tuning с низкоранговой адаптацией. Авторы показывают, что вопреки общепринятому мнению о катастрофическом забывании, такой подход демонстрирует высокую пластичность и устойчивость к забыванию предыдущих знаний. Синергия между большой предобученной моделью, параметрически-эффективной адаптацией и on-policy обучением с подкреплением переформатирует компромисс между стабильностью и адаптивностью. Метод обеспечивает масштабируемое и эффективное непрерывное обучение для воплощённых агентов в открытых меняющихся окружениях.'}, 'en': {'title': 'Revolutionizing Continual Learning: Simple Fine-Tuning Wins!', 'desc': 'This paper explores the effectiveness of Sequential Fine-Tuning (Seq. FT) with low-rank adaptation (LoRA) in continual reinforcement learning (CRL) for vision-language-action (VLA) models. It challenges the common belief that such methods lead to catastrophic forgetting, showing instead that they can maintain high performance and adaptability. The authors conducted experiments across multiple models and benchmarks, revealing that Seq. FT with LoRA achieves strong results with minimal forgetting and good zero-shot generalization. Their findings suggest that combining large pretrained models with efficient adaptation techniques can enhance the stability and scalability of continual learning processes.'}, 'zh': {'title': '顺序微调：持续强化学习的新力量', 'desc': '本文探讨了在视觉-语言-动作模型中，使用低秩适应的顺序微调在持续强化学习中的优越表现。传统观点认为，简单的顺序微调会导致灾难性遗忘，因此需要复杂的持续学习策略。研究表明，低秩适应的顺序微调实际上能够保持高适应性，几乎没有遗忘，并且在零样本泛化方面表现出色，常常超越更复杂的持续强化学习方法。通过分析，发现这种稳健性源于大规模预训练模型、参数高效适应和在线强化学习之间的协同作用。'}}}, {'id': 'https://huggingface.co/papers/2603.11045', 'title': 'Neural Field Thermal Tomography: A Differentiable Physics Framework for Non-Destructive Evaluation', 'url': 'https://huggingface.co/papers/2603.11045', 'abstract': 'Abstract NeFTY uses a differentiable physics framework to reconstruct 3D material properties from temperature measurements, overcoming limitations of traditional thermography and PINNs through continuous neural field parameterization and hard constraint enforcement.  \t\t\t\t\tAI-generated summary We propose Neural Field Thermal Tomography (NeFTY), a differentiable physics framework for the quantitative 3D reconstruction of material properties from transient surface temperature measurements. While traditional thermography relies on pixel-wise 1D approximations that neglect lateral diffusion, and soft-constrained Physics-Informed Neural Networks (PINNs) often fail in transient diffusion scenarios due to gradient stiffness, NeFTY parameterizes the 3D diffusivity field as a continuous neural field optimized through a rigorous numerical solver. By leveraging a differentiable physics solver, our approach enforces thermodynamic laws as hard constraints while maintaining the memory efficiency required for high-resolution 3D tomography. Our discretize-then-optimize paradigm effectively mitigates the spectral bias and ill-posedness inherent in inverse heat conduction, enabling the recovery of subsurface defects at arbitrary scales. Experimental validation on synthetic data demonstrates that NeFTY significantly improves the accuracy of subsurface defect localization over baselines. Additional details at https://cab-lab-princeton.github.io/nefty/', 'score': 1, 'issue_id': 1478, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'e5bb0af995467332', 'authors': ['Tao Zhong', 'Yixun Hu', 'Dongzhe Zheng', 'Aditya Sood', 'Christine Allen-Blanchette'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.11045.jpg', 'data': {'categories': [], 'emoji': '🌡️', 'ru': {'title': 'Нейронные поля для томографической реконструкции материалов по тепловым измерениям', 'desc': 'В работе предлагается NeFTY — дифференцируемая физическая система для восстановления трёхмерных свойств материалов по измерениям температуры на поверхности. Методика преодолевает ограничения традиционной термографии, которая использует одномерные пиксельные приближения, и Physics-Informed Neural Networks (PINN), которые плохо справляются с нестационарной диффузией из-за жёсткости градиентов. Система параметризует поле теплопроводности как непрерывное нейронное поле, оптимизируемое через численный решатель с жёсткими ограничениями физических законов. Подход эффективно решает обратную задачу теплопроводности и позволяет обнаруживать внутренние дефекты материалов с высокой точностью.'}, 'en': {'title': 'Revolutionizing 3D Material Reconstruction with NeFTY', 'desc': 'NeFTY is a novel framework that uses differentiable physics to accurately reconstruct 3D material properties from temperature data. Unlike traditional thermography, which simplifies the problem and overlooks important diffusion effects, NeFTY employs a continuous neural field to represent the diffusivity of materials. This method incorporates hard constraints based on thermodynamic laws, ensuring that the reconstruction adheres to physical principles. Experimental results show that NeFTY outperforms existing methods in locating subsurface defects, demonstrating its effectiveness in high-resolution thermal tomography.'}, 'zh': {'title': 'NeFTY：重建三维材料属性的新方法', 'desc': 'NeFTY是一种可微分物理框架，用于从温度测量中重建三维材料属性。与传统热成像技术不同，NeFTY克服了像素级一维近似的局限性，能够更好地处理横向扩散问题。该方法通过将三维扩散场参数化为连续神经场，并利用严格的数值求解器来优化，从而强制执行热力学定律作为硬约束。实验结果表明，NeFTY在亚表面缺陷定位的准确性上显著优于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2603.06922', 'title': 'NerVE: Nonlinear Eigenspectrum Dynamics in LLM Feed-Forward Networks', 'url': 'https://huggingface.co/papers/2603.06922', 'abstract': "Abstract NerVE provides a unified framework for analyzing feed-forward network dynamics in large language models through spectral analysis metrics that reveal information flow organization and optimization impacts across architectures.  \t\t\t\t\tAI-generated summary We introduce NerVE, a unified eigenspectral framework for understanding how feed-forward networks (FFNs) in large language models (LLMs) organize and regulate information flow in high-dimensional latent space. Despite FFNs dominating the parameter budget, their high-dimensional dynamics remain poorly understood. NerVE addresses this gap through lightweight, memory-efficient tracking of eigenspectrum dynamics via four complementary metrics: Spectral Entropy (dispersion), Participation Ratio (effective dimensionality), Eigenvalue Early Enrichment (top-heaviness), and Jensen-Shannon divergence (distributional shifts). Our key insight is that FFN nonlinearities reinject variance across eigenmodes, fundamentally governing latent dimension utilization, and that optimizer geometry strongly modulates the extent of this variance reinjection. We validate NerVE across model scales, and diverse architectural and optimizer configurations, each uniquely shaping FFN dynamics: normalization schemes controlling variance flow; FFN weight geometries constraining latent space; positional encoding and activation functions regulating information flow; and optimizer choices redistributing effective capacity across depth. Across these settings, NerVE consistently recovers stable spectral signatures that correlate with model's generalization ability and respond predictably to design choices, generalizing beyond transformer to MLP-Mixer architectures, providing actionable insights for architectural and optimizer choices beyond trial-and-error.", 'score': 1, 'issue_id': 1474, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '987ffa25ed1d3ccf', 'authors': ['Nandan Kumar Jha', 'Brandon Reagen'], 'affiliations': ['New York University'], 'pdf_title_img': 'assets/pdf/title_img/2603.06922.jpg', 'data': {'categories': ['#interpretability', '#architecture', '#optimization', '#training'], 'emoji': '📊', 'ru': {'title': 'Раскрытие информационных потоков в нейросетях через спектральный анализ', 'desc': 'NerVE представляет единую структуру для анализа динамики сквозных сетей в больших языковых моделях через спектральный анализ. Фреймворк использует четыре дополняющих метрики (спектральную энтропию,
