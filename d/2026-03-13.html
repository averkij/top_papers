    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');

                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('light-theme');

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.12255', 'title': 'Spatial-TTT: Streaming Visual-based Spatial Intelligence with Test-Time Training', 'url': 'https://huggingface.co/papers/2603.12255', 'abstract': 'Abstract Spatial-TTT enables streaming visual-based spatial intelligence through test-time training that adapts parameters to capture spatial evidence over long video sequences using hybrid architecture and 3D spatiotemporal convolution.  \t\t\t\t\tAI-generated summary Humans perceive and understand real-world spaces through a stream of visual observations. Therefore, the ability to streamingly maintain and update spatial evidence from potentially unbounded video streams is essential for spatial intelligence. The core challenge is not simply longer context windows but how spatial information is selected, organized, and retained over time. In this paper, we propose Spatial-TTT towards streaming visual-based spatial intelligence with test-time training (TTT), which adapts a subset of parameters (fast weights) to capture and organize spatial evidence over long-horizon scene videos. Specifically, we design a hybrid architecture and adopt large-chunk updates parallel with sliding-window attention for efficient spatial video processing. To further promote spatial awareness, we introduce a spatial-predictive mechanism applied to TTT layers with 3D spatiotemporal convolution, which encourages the model to capture geometric correspondence and temporal continuity across frames. Beyond architecture design, we construct a dataset with dense 3D spatial descriptions, which guides the model to update its fast weights to memorize and organize global 3D spatial signals in a structured manner. Extensive experiments demonstrate that Spatial-TTT improves long-horizon spatial understanding and achieves state-of-the-art performance on video spatial benchmarks. Project page: https://liuff19.github.io/Spatial-TTT.', 'score': 59, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'cc5365f9d25fc06b', 'authors': ['Fangfu Liu', 'Diankun Wu', 'Jiawei Chi', 'Yimo Cai', 'Yi-Hsin Hung', 'Xumin Yu', 'Hao Li', 'Han Hu', 'Yongming Rao', 'Yueqi Duan'], 'affiliations': ['NTU', 'Tencent Hunyuan', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12255.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#training', '#dataset', '#video', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Потоковое понимание пространства через адаптацию во время тестирования', 'desc': 'Spatial-TTT - это метод для понимания пространственной информации в видеопотоках через адаптацию параметров модели во время тестирования. Система использует гибридную архитектуру с 3D спатиотемпоральной сверткой для эффективной обработки длинных видеоSequences и сохранения пространственных признаков. Ключевая инновация заключается в использовании быстрых весов (fast weights), которые обновляются для захвата геометрических соответствий и временной непрерывности между кадрами. Авторы создали датасет с плотными 3D пространственными аннотациями, что позволило модели достичь лучшей производительности на бенчмарках видеоанализа.'}, 'en': {'title': 'Enhancing Spatial Intelligence with Streaming Visual Adaptation', 'desc': "Spatial-TTT is a novel approach that enhances spatial intelligence by using test-time training (TTT) to adapt model parameters for processing long video sequences. It focuses on efficiently capturing and organizing spatial information through a hybrid architecture that employs 3D spatiotemporal convolution. The method introduces a spatial-predictive mechanism that helps the model maintain geometric relationships and temporal continuity across frames. By constructing a specialized dataset with detailed 3D spatial descriptions, Spatial-TTT significantly improves the model's ability to understand and retain spatial evidence over extended periods, achieving state-of-the-art results in video spatial benchmarks."}, 'zh': {'title': '流式视觉空间智能的突破', 'desc': 'Spatial-TTT是一种通过测试时训练（TTT）来增强空间智能的技术，能够在长视频序列中捕捉和组织空间证据。该方法采用混合架构和3D时空卷积，能够高效处理空间视频。通过引入空间预测机制，模型能够在帧之间捕捉几何对应关系和时间连续性。实验结果表明，Spatial-TTT在长时间范围的空间理解上表现优异，并在视频空间基准测试中达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.12180', 'title': 'Strategic Navigation or Stochastic Search? How Agents and Humans Reason Over Document Collections', 'url': 'https://huggingface.co/papers/2603.12180', 'abstract': "Abstract MADQA benchmark evaluates multimodal agents' strategic reasoning capabilities through diverse PDF document questions, revealing gaps between human-level accuracy and efficient reasoning performance.  \t\t\t\t\tAI-generated summary Multimodal agents offer a promising path to automating complex document-intensive workflows. Yet, a critical question remains: do these agents demonstrate genuine strategic reasoning, or merely stochastic trial-and-error search? To address this, we introduce MADQA, a benchmark of 2,250 human-authored questions grounded in 800 heterogeneous PDF documents. Guided by Classical Test Theory, we design it to maximize discriminative power across varying levels of agentic abilities. To evaluate agentic behaviour, we introduce a novel evaluation protocol measuring the accuracy-effort trade-off. Using this framework, we show that while the best agents can match human searchers in raw accuracy, they succeed on largely different questions and rely on brute-force search to compensate for weak strategic planning. They fail to close the nearly 20% gap to oracle performance, persisting in unproductive loops. We release the dataset and evaluation harness to help facilitate the transition from brute-force retrieval to calibrated, efficient reasoning.", 'score': 33, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '7b56862d0fd14f2b', 'authors': ['Łukasz Borchmann', 'Jordy Van Landeghem', 'Michał Turski', 'Shreyansh Padarha', 'Ryan Othniel Kearns', 'Adam Mahdi', 'Niels Rogge', 'Clémentine Fourrier', 'Siwei Han', 'Huaxiu Yao', 'Artemis Llabrés', 'Yiming Xu', 'Dimosthenis Karatzas', 'Hao Zhang', 'Anupam Datta'], 'affiliations': ['Instabase', 'Snowflake', 'Snowflake AI Research', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.12180.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'От перебора к стратегии: оценка истинного рассуждения в многомодальных агентах', 'desc': 'В работе представлен MADQA — бенчмарк для оценки многомодальных агентов на основе 2250 вопросов, связанных с 800 PDF-документами. Исследование показывает, что современные агенты достигают точности уровня человека, но используют при этом методы перебора вместо стратегического рассуждения. Авторы предлагают новый протокол оценки, измеряющий компромисс между точностью и вычислительными затратами. Результаты демонстрируют значительный разрыв между производительностью агентов и оракулом, указывая на необходимость перехода от грубого поиска к эффективному логическому выводу.'}, 'en': {'title': 'Bridging the Gap: From Brute-Force to Strategic Reasoning in AI', 'desc': "The MADQA benchmark assesses the strategic reasoning abilities of multimodal agents when answering questions based on PDF documents. It consists of 2,250 human-authored questions derived from 800 diverse documents, designed to evaluate the agents' performance in a structured way. The study reveals that while some agents can achieve accuracy comparable to humans, they often rely on brute-force methods rather than effective reasoning strategies. The findings highlight a significant gap in performance, indicating that current agents struggle with strategic planning and often get stuck in unproductive cycles."}, 'zh': {'title': '多模态智能体的战略推理能力评估', 'desc': 'MADQA基准测试评估多模态智能体的战略推理能力，通过多样化的PDF文档问题揭示了人类水平的准确性与高效推理表现之间的差距。我们引入了MADQA，这是一个包含2250个由人类撰写的问题，基于800个异构PDF文档的基准测试。该测试旨在最大化不同智能体能力水平的区分能力，并通过新的评估协议来衡量准确性与努力的权衡。尽管最佳智能体在原始准确性上可以与人类搜索者相匹配，但它们在问题上存在显著差异，并依赖于暴力搜索来弥补战略规划的不足。'}}}, {'id': 'https://huggingface.co/papers/2603.12201', 'title': 'IndexCache: Accelerating Sparse Attention via Cross-Layer Index Reuse', 'url': 'https://huggingface.co/papers/2603.12201', 'abstract': "Abstract IndexCache reduces sparse attention computation in large language models by reusing top-k token selections across layers, achieving significant speedups with minimal quality loss.  \t\t\t\t\tAI-generated summary Long-context agentic workflows have emerged as a defining use case for large language models, making attention efficiency critical for both inference speed and serving cost. Sparse attention addresses this challenge effectively, and DeepSeek Sparse Attention (DSA) is a representative production-grade solution: a lightweight lightning indexer selects the top-k most relevant tokens per query, reducing core attention from O(L^2) to O(Lk). However, the indexer itself retains O(L^2) complexity and must run independently at every layer, despite the fact that the resulting top-k selections are highly similar across consecutive layers. We present IndexCache, which exploits this cross-layer redundancy by partitioning layers into a small set of Full layers that run their own indexers and a majority of Shared layers that simply reuse the nearest Full layer's top-k indices. We propose two complementary approaches to determine and optimize this configuration. Training-free IndexCache applies a greedy search algorithm that selects which layers to retain indexers by directly minimizing language modeling loss on a calibration set, requiring no weight updates. Training-aware IndexCache introduces a multi-layer distillation loss that trains each retained indexer against the averaged attention distributions of all layers it serves, enabling even simple interleaved patterns to match full-indexer accuracy. Experimental results on a 30B DSA model show that IndexCache can remove 75% of indexer computations with negligible quality degradation, achieving up to 1.82times prefill speedup and 1.48times decode speedup compared to standard DSA. These positive results are further confirmed by our preliminary experiments on the production-scale GLM-5 model (Figure 1).", 'score': 30, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '1d62bc1de1e1a470', 'authors': ['Yushi Bai', 'Qian Dong', 'Ting Jiang', 'Xin Lv', 'Zhengxiao Du', 'Aohan Zeng', 'Jie Tang', 'Juanzi Li'], 'affiliations': ['Tsinghua University', 'Z.ai'], 'pdf_title_img': 'assets/pdf/title_img/2603.12201.jpg', 'data': {'categories': ['#training', '#optimization', '#agents', '#inference', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Переиспользование внимания: ускорение LLM через кэширование индексов', 'desc': 'В статье предлагается IndexCache — метод для оптимизации разреженного внимания в больших языковых моделях. Основная идея заключается в переиспользовании отбора топ-k токенов на разных слоях сети, так как эти выборки очень похожи между соседними слоями. Авторы предлагают два подхода: без обучения, который использует жадный поиск для минимизации потерь языкового моделирования, и с обучением, применяющий дистилляцию для оптимизации переиспользуемых индексов. Экспериментальные результаты показывают, что можно удалить 75% вычислений индексатора с минимальной потерей качества, достигая ускорения в 1.82 раза для префилл-фазы и 1.48 раза для фазы декодирования.'}, 'en': {'title': 'Boosting Efficiency in Language Models with IndexCache', 'desc': 'The paper introduces IndexCache, a method designed to enhance the efficiency of sparse attention in large language models by reusing token selections across different layers. By partitioning layers into Full and Shared categories, IndexCache minimizes redundant computations, significantly reducing the complexity of attention calculations. The approach includes two strategies: a training-free method that optimizes layer configurations based on language modeling loss, and a training-aware method that aligns indexer outputs with averaged attention distributions. Experimental results demonstrate that IndexCache can achieve substantial speed improvements while maintaining model quality, making it a valuable advancement in the field of machine learning.'}, 'zh': {'title': 'IndexCache：提升大语言模型的注意力效率', 'desc': 'IndexCache通过在大语言模型中重用跨层的top-k令牌选择，减少了稀疏注意力计算，从而显著提高了速度，且质量损失极小。该方法利用了层间冗余，将层分为少量的完整层和大多数共享层，后者重用最近完整层的top-k索引。我们提出了两种互补的方法来优化这一配置，分别是无训练的贪婪搜索算法和有训练的多层蒸馏损失。实验结果表明，IndexCache可以去除75%的索引计算，且在质量几乎不变的情况下，实现了高达1.82倍的预填充速度提升和1.48倍的解码速度提升。'}}}, {'id': 'https://huggingface.co/papers/2603.10178', 'title': 'Video-Based Reward Modeling for Computer-Use Agents', 'url': 'https://huggingface.co/papers/2603.10178', 'abstract': "Abstract Video-execution reward modeling enables scalable evaluation of computer-using agents by predicting task success from user instructions and execution videos, outperforming proprietary models across multiple operating systems.  \t\t\t\t\tAI-generated summary Computer-using agents (CUAs) are becoming increasingly capable; however, it remains difficult to scale evaluation of whether a trajectory truly fulfills a user instruction. In this work, we study reward modeling from execution video: a sequence of keyframes from an agent trajectory that is independent of the agent's internal reasoning or actions. Although video-execution modeling is method-agnostic, it presents key challenges, including highly redundant layouts and subtle, localized cues that determine success. We introduce Execution Video Reward 53k (ExeVR-53k), a dataset of 53k high-quality video--task--reward triplets. We further propose adversarial instruction translation to synthesize negative samples with step-level annotations. To enable learning from long, high-resolution execution videos, we design spatiotemporal token pruning, which removes homogeneous regions and persistent tokens while preserving decisive UI changes. Building on these components, we fine-tune an Execution Video Reward Model (ExeVRM) that takes only a user instruction and a video-execution sequence to predict task success. Our ExeVRM 8B achieves 84.7% accuracy and 87.7% recall on video-execution assessment, outperforming strong proprietary models such as GPT-5.2 and Gemini-3 Pro across Ubuntu, macOS, Windows, and Android, while providing more precise temporal attribution. These results show that video-execution reward modeling can serve as a scalable, model-agnostic evaluator for CUAs.", 'score': 27, 'issue_id': 1474, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '79b8f94baa460275', 'authors': ['Linxin Song', 'Jieyu Zhang', 'Huanxin Sheng', 'Taiwei Shi', 'Gupta Rahul', 'Yang Liu', 'Ranjay Krishna', 'Jian Kang', 'Jieyu Zhao'], 'affiliations': ['Amazon AGI', 'MBZUAI', 'University of Southern California', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.10178.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#video', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Оценка выполнения задач агентом через анализ видео', 'desc': 'В статье предложен метод моделирования вознаграждения на основе видео-записей выполнения задач компьютерными агентами. Авторы создали датасет ExeVR-53k с 53 тысячами видео-задача-награда троек и разработали технику противоположного синтеза инструкций для создания отрицательных примеров. Для обработки длинных видео высокого разрешения они внедрили пространственно-временное прореживание токенов, удаляющее однородные регионы и сохраняющее критические изменения интерфейса. Финальная модель ExeVRM достигла 84.7% точности и превосходит проприетарные модели типа GPT и Gemini в оценке успешности выполнения задач на различных операционных системах.'}, 'en': {'title': 'Revolutionizing CUA Evaluation with Video-Execution Reward Modeling', 'desc': 'This paper presents a method for evaluating computer-using agents (CUAs) by predicting their task success based on execution videos and user instructions. The authors introduce a dataset called Execution Video Reward 53k (ExeVR-53k), which contains 53,000 video-task-reward triplets to train their model. They also propose techniques like adversarial instruction translation and spatiotemporal token pruning to enhance the learning process from long execution videos. The resulting Execution Video Reward Model (ExeVRM) demonstrates superior performance in accuracy and recall compared to existing proprietary models across various operating systems.'}, 'zh': {'title': '视频执行奖励建模：可扩展的评估工具', 'desc': '视频执行奖励建模可以通过用户指令和执行视频来预测任务成功，从而实现对计算机使用代理的可扩展评估。我们提出了Execution Video Reward 53k（ExeVR-53k）数据集，包含53,000个高质量的视频-任务-奖励三元组。通过对执行视频的建模，我们克服了冗余布局和微妙线索等挑战，设计了时空令牌修剪以提高学习效率。最终，我们的执行视频奖励模型（ExeVRM）在多个操作系统上超越了现有的强大模型，展示了其作为可扩展评估工具的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.12257', 'title': 'DreamVideo-Omni: Omni-Motion Controlled Multi-Subject Video Customization with Latent Identity Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.12257', 'abstract': 'Abstract DreamVideo-Omni is a unified framework for video synthesis that enables precise multi-subject identity control and multi-granularity motion manipulation through a two-stage training approach combining condition-aware 3D positional embeddings, hierarchical motion injection, and latent identity reward learning.  \t\t\t\t\tAI-generated summary While large-scale diffusion models have revolutionized video synthesis, achieving precise control over both multi-subject identity and multi-granularity motion remains a significant challenge. Recent attempts to bridge this gap often suffer from limited motion granularity, control ambiguity, and identity degradation, leading to suboptimal performance on identity preservation and motion control. In this work, we present DreamVideo-Omni, a unified framework enabling harmonious multi-subject customization with omni-motion control via a progressive two-stage training paradigm. In the first stage, we integrate comprehensive control signals for joint training, encompassing subject appearances, global motion, local dynamics, and camera movements. To ensure robust and precise controllability, we introduce a condition-aware 3D rotary positional embedding to coordinate heterogeneous inputs and a hierarchical motion injection strategy to enhance global motion guidance. Furthermore, to resolve multi-subject ambiguity, we introduce group and role embeddings to explicitly anchor motion signals to specific identities, effectively disentangling complex scenes into independent controllable instances. In the second stage, to mitigate identity degradation, we design a latent identity reward feedback learning paradigm by training a latent identity reward model upon a pretrained video diffusion backbone. This provides motion-aware identity rewards in the latent space, prioritizing identity preservation aligned with human preferences. Supported by our curated large-scale dataset and the comprehensive DreamOmni Bench for multi-subject and omni-motion control evaluation, DreamVideo-Omni demonstrates superior performance in generating high-quality videos with precise controllability.', 'score': 22, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'da6e4487314f3683', 'authors': ['Yujie Wei', 'Xinyu Liu', 'Shiwei Zhang', 'Hangjie Yuan', 'Jinbo Xing', 'Zhekai Chen', 'Xiang Wang', 'Haonan Qiu', 'Rui Zhao', 'Yutong Feng', 'Ruihang Chu', 'Yingya Zhang', 'Yike Guo', 'Xihui Liu', 'Hongming Shan'], 'affiliations': ['Fudan University', 'MMLab, The University of Hong Kong', 'Nanyang Technological University', 'Show Lab, National University of Singapore', 'The Hong Kong University of Science and Technology', 'Tongyi Lab, Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12257.jpg', 'data': {'categories': ['#rlhf', '#benchmark', '#diffusion', '#open_source', '#dataset', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Всемогущее управление: точный контроль идентичности и движения в синтезе видео', 'desc': 'DreamVideo-Omni представляет единую систему для синтеза видео, которая обеспечивает точное управление идентичностью нескольких субъектов и многоуровневой манипуляцией движением. Система использует двухэтапный процесс обучения, включающий условно-зависимые 3D позиционные эмбеддинги и иерархическое внедрение движения. На первом этапе модель интегрирует сигналы управления для совместного обучения: внешность субъектов, глобальное движение, локальную динамику и движение камеры, с применением групповых и ролевых эмбеддингов для разделения сложных сцен. На втором этапе используется парадигма обучения с обратной связью на основе скрытого вознаграждения идентичности, которая предотвращает деградацию идентичности и приоритизирует её сохранение в латентном пространстве модели диффузии.'}, 'en': {'title': 'Mastering Multi-Subject Video Synthesis with DreamVideo-Omni', 'desc': 'DreamVideo-Omni is a new framework for creating videos that allows for detailed control over multiple characters and their movements. It uses a two-stage training process that combines advanced techniques like 3D positional embeddings and hierarchical motion strategies to improve how motion is handled. The framework also addresses issues of identity preservation by using a special feedback system that helps maintain character identities during video generation. Overall, DreamVideo-Omni shows significant improvements in producing high-quality videos with better control over both identity and motion.'}, 'zh': {'title': '梦视频全能：精准控制多主体与运动', 'desc': 'DreamVideo-Omni是一个统一的视频合成框架，能够实现多主体身份控制和多粒度运动操控。该框架采用两阶段训练方法，结合了条件感知的3D位置嵌入、分层运动注入和潜在身份奖励学习。通过引入组和角色嵌入，DreamVideo-Omni有效地将运动信号与特定身份锚定，从而解决多主体模糊性问题。最终，该框架在生成高质量视频和精确控制方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.12247', 'title': 'Trust Your Critic: Robust Reward Modeling and Reinforcement Learning for Faithful Image Editing and Generation', 'url': 'https://huggingface.co/papers/2603.12247', 'abstract': 'Abstract Reinforcement learning framework with novel reward modeling and benchmarking approaches improves fidelity and instruction adherence in image editing and text-to-image generation.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) has emerged as a promising paradigm for enhancing image editing and text-to-image (T2I) generation. However, current reward models, which act as critics during RL, often suffer from hallucinations and assign noisy scores, inherently misguiding the optimization process. In this paper, we present FIRM (Faithful Image Reward Modeling), a comprehensive framework that develops robust reward models to provide accurate and reliable guidance for faithful image generation and editing. First, we design tailored data curation pipelines to construct high-quality scoring datasets. Specifically, we evaluate editing using both execution and consistency, while generation is primarily assessed via instruction following. Using these pipelines, we collect the FIRM-Edit-370K and FIRM-Gen-293K datasets, and train specialized reward models (FIRM-Edit-8B and FIRM-Gen-8B) that accurately reflect these criteria. Second, we introduce FIRM-Bench, a comprehensive benchmark specifically designed for editing and generation critics. Evaluations demonstrate that our models achieve superior alignment with human judgment compared to existing metrics. Furthermore, to seamlessly integrate these critics into the RL pipeline, we formulate a novel "Base-and-Bonus" reward strategy that balances competing objectives: Consistency-Modulated Execution (CME) for editing and Quality-Modulated Alignment (QMA) for generation. Empowered by this framework, our resulting models FIRM-Qwen-Edit and FIRM-SD3.5 achieve substantial performance breakthroughs. Comprehensive experiments demonstrate that FIRM mitigates hallucinations, establishing a new standard for fidelity and instruction adherence over existing general models. All of our datasets, models, and code have been publicly available at https://firm-reward.github.io.', 'score': 20, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '027369a5d596f650', 'authors': ['Xiangyu Zhao', 'Peiyuan Zhang', 'Junming Lin', 'Tianhao Liang', 'Yuchen Duan', 'Shengyuan Ding', 'Changyao Tian', 'Yuhang Zang', 'Junchi Yan', 'Xue Yang'], 'affiliations': ['BUPT', 'CUHK', 'Fudan University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12247.jpg', 'data': {'categories': ['#rl', '#benchmark', '#hallucinations', '#training', '#optimization', '#open_source', '#dataset', '#multimodal', '#alignment'], 'emoji': '🎨', 'ru': {'title': 'Надежные модели вознаграждения для точного контроля генерации и редактирования изображений', 'desc': "В статье предлагается FIRM — комплексная система для улучшения качества редактирования изображений и генерации текст-в-изображение с помощью обучения с подкреплением. Авторы разработали надежные модели вознаграждения, которые избегают галлюцинаций и дают точные оценки, создав специализированные датасеты FIRM-Edit-370K и FIRM-Gen-293K для обучения. Они также предложили инновационную стратегию вознаграждения 'Base-and-Bonus', которая балансирует различные критерии качества при редактировании и генерации. Экспериментальные результаты показывают, что предложенный подход значительно улучшает верность генерации и следование инструкциям по сравнению с существующими моделями."}, 'en': {'title': 'Enhancing Image Generation with Robust Reward Models', 'desc': 'This paper introduces a new reinforcement learning framework called FIRM (Faithful Image Reward Modeling) that enhances image editing and text-to-image generation. It addresses the limitations of current reward models that often produce unreliable scores, leading to poor optimization outcomes. FIRM develops robust reward models through high-quality data curation and specialized training datasets, improving alignment with human judgment. Additionally, it presents a novel reward strategy that balances different objectives, resulting in significant performance improvements in fidelity and instruction adherence for AI-generated images.'}, 'zh': {'title': '提升图像生成与编辑的忠实性与指令遵循性', 'desc': '本论文提出了一种新的强化学习框架，旨在提高图像编辑和文本到图像生成的准确性和指令遵循性。我们开发了FIRM（忠实图像奖励建模），通过构建高质量的评分数据集来训练专门的奖励模型，以提供可靠的指导。我们还引入了FIRM-Bench，一个专门为编辑和生成评估设计的基准，评估结果显示我们的模型与人类判断的对齐度优于现有指标。通过新的“基础与奖励”策略，我们的模型在减少幻觉现象方面取得了显著进展，设立了忠实性和指令遵循的新标准。'}}}, {'id': 'https://huggingface.co/papers/2603.12250', 'title': 'DVD: Deterministic Video Depth Estimation with Generative Priors', 'url': 'https://huggingface.co/papers/2603.12250', 'abstract': 'Abstract Video depth estimation framework DVD adapts pre-trained video diffusion models into deterministic single-pass depth regressors using structural anchors, latent manifold rectification, and global affine coherence for improved accuracy and efficiency.  \t\t\t\t\tAI-generated summary Existing video depth estimation faces a fundamental trade-off: generative models suffer from stochastic geometric hallucinations and scale drift, while discriminative models demand massive labeled datasets to resolve semantic ambiguities. To break this impasse, we present DVD, the first framework to deterministically adapt pre-trained video diffusion models into single-pass depth regressors. Specifically, DVD features three core designs: (i) repurposing the diffusion timestep as a structural anchor to balance global stability with high-frequency details; (ii) latent manifold rectification (LMR) to mitigate regression-induced over-smoothing, enforcing differential constraints to restore sharp boundaries and coherent motion; and (iii) global affine coherence, an inherent property bounding inter-window divergence, which enables seamless long-video inference without requiring complex temporal alignment. Extensive experiments demonstrate that DVD achieves state-of-the-art zero-shot performance across benchmarks. Furthermore, DVD successfully unlocks the profound geometric priors implicit in video foundation models using 163x less task-specific data than leading baselines. Notably, we fully release our pipeline, providing the whole training suite for SOTA video depth estimation to benefit the open-source community.', 'score': 16, 'issue_id': 1475, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '5275739882389a4c', 'authors': ['Hongfei Zhang', 'Harold Haodong Chen', 'Chenfei Liao', 'Jing He', 'Zixin Zhang', 'Haodong Li', 'Yihao Liang', 'Kanghao Chen', 'Bin Ren', 'Xu Zheng', 'Shuai Yang', 'Kun Zhou', 'Yinchuan Li', 'Nicu Sebe', 'Ying-Cong Chen'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Knowin', 'MBZUAI', 'Princeton University', 'SZU', 'UCSD', 'UniTrento'], 'pdf_title_img': 'assets/pdf/title_img/2603.12250.jpg', 'data': {'categories': ['#open_source', '#architecture', '#video', '#training', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Видео диффузия для глубины: детерминированная оценка без галлюцинаций', 'desc': 'Статья представляет DVD, фреймворк для адаптации предварительно обученных видео-диффузионных моделей в детерминированные регрессоры глубины. Авторы решают классическую проблему видео-оценки глубины, преодолевая недостатки генеративных моделей (стохастические галлюцинации) и дискриминативных моделей (требование больших размеченных датасетов). Фреймворк использует три ключевых механизма: структурные якори на основе временных шагов диффузии, ректификацию латентного многообразия для устранения размытия, и глобальную аффинную когерентность для бесшовной обработки длинных видео. DVD достигает состояния искусства в нулевом переносе обучения и требует в 163 раза меньше размеченных данных, чем существующие методы.'}, 'en': {'title': 'Revolutionizing Video Depth Estimation with DVD', 'desc': 'The paper introduces DVD, a novel framework for video depth estimation that transforms pre-trained video diffusion models into efficient depth regressors. It addresses the challenges of generative models, which can produce inaccurate depth due to randomness, and discriminative models, which require extensive labeled data. DVD employs three innovative techniques: using diffusion timesteps as structural anchors for stability, applying latent manifold rectification to enhance detail, and ensuring global affine coherence for smooth long-video processing. The framework achieves state-of-the-art performance with significantly less data, making it a valuable resource for the open-source community.'}, 'zh': {'title': '视频深度估计的新突破：DVD框架', 'desc': '本文提出了一种视频深度估计框架DVD，该框架将预训练的视频扩散模型转化为确定性的单次深度回归器。DVD通过结构锚点、潜在流形校正和全局仿射一致性来提高深度估计的准确性和效率。该方法解决了生成模型和判别模型之间的基本权衡，显著减少了对大量标注数据的需求。实验结果表明，DVD在多个基准测试中实现了最先进的零-shot性能，并为开源社区提供了完整的训练套件。'}}}, {'id': 'https://huggingface.co/papers/2603.11593', 'title': 'WeEdit: A Dataset, Benchmark and Glyph-Guided Framework for Text-centric Image Editing', 'url': 'https://huggingface.co/papers/2603.11593', 'abstract': 'Abstract WeEdit presents a systematic approach for text-centric image editing with a scalable data pipeline, multi-language benchmarks, and a two-stage training strategy combining supervised fine-tuning and reinforcement learning.  \t\t\t\t\tAI-generated summary Instruction-based image editing aims to modify specific content within existing images according to user-provided instructions while preserving non-target regions. Beyond traditional object- and style-centric manipulation, text-centric image editing focuses on modifying, translating, or rearranging textual elements embedded within images. However, existing leading models often struggle to execute complex text editing precisely, frequently producing blurry or hallucinated characters. We attribute these failures primarily to the lack of specialized training paradigms tailored for text-centric editing, as well as the absence of large-scale datasets and standardized benchmarks necessary for a closed-loop training and evaluation system. To address these limitations, we present WeEdit, a systematic solution encompassing a scalable data construction pipeline, two benchmarks, and a tailored two-stage training strategy. Specifically, we propose a novel HTML-based automatic editing pipeline, which generates 330K training pairs covering diverse editing operations and 15 languages, accompanied by standardized bilingual and multilingual benchmarks for comprehensive evaluation. On the algorithmic side, we employ glyph-guided supervised fine-tuning to inject explicit spatial and content priors, followed by a multi-objective reinforcement learning stage to align generation with instruction adherence, text clarity, and background preservation. Extensive experiments demonstrate that WeEdit outperforms previous open-source models by a clear margin across diverse editing operations.', 'score': 15, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '34d7eaf3ad78ad8f', 'authors': ['Hui Zhang', 'Juntao Liu', 'Zongkai Liu', 'Liqiang Niu', 'Fandong Meng', 'Zuxuan Wu', 'Yu-Gang Jiang'], 'affiliations': ['Fudan University', 'Sun Yat-sen University', 'WeChat AI, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.11593.jpg', 'data': {'categories': ['#rlhf', '#benchmark', '#hallucinations', '#training', '#open_source', '#dataset', '#cv', '#low_resource', '#multilingual', '#synthetic'], 'emoji': '✏️', 'ru': {'title': 'Точное редактирование текста в изображениях через управляемое машинное обучение', 'desc': 'WeEdit — это систематический подход к редактированию текста в изображениях с использованием масштабируемого конвейера данных. Авторы создали HTML-based pipeline для автоматической генерации 330K пар обучающих данных, охватывающих 15 языков, и разработали двухэтапную стратегию обучения. На первом этапе используется supervised fine-tuning с глиф-ориентированными приорами для сохранения пространственной информации, на втором — multi-objective reinforcement learning для улучшения точности следования инструкциям. Решение включает специализированные бенчмарки для оценки качества редактирования текста в изображениях и демонстрирует значительное улучшение по сравнению с существующими моделями.'}, 'en': {'title': 'WeEdit: Precision Text Editing in Images Made Easy!', 'desc': 'WeEdit is a new method for editing text in images, focusing on making precise changes while keeping the rest of the image intact. It uses a two-step training process that combines supervised learning and reinforcement learning to improve the quality of text edits. The approach includes a large dataset of 330,000 training pairs in multiple languages, which helps the model learn better. Experiments show that WeEdit performs significantly better than existing models in various editing tasks.'}, 'zh': {'title': 'WeEdit：文本为中心的图像编辑新方法', 'desc': 'WeEdit 是一种系统化的方法，专注于文本为中心的图像编辑。它结合了可扩展的数据管道、多语言基准和两阶段训练策略，使用监督微调和强化学习。该方法通过生成 33 万个训练对，涵盖多种编辑操作和 15 种语言，解决了现有模型在复杂文本编辑中的不足。实验结果表明，WeEdit 在多种编辑操作中明显优于之前的开源模型。'}}}, {'id': 'https://huggingface.co/papers/2603.11421', 'title': 'ShotVerse: Advancing Cinematic Camera Control for Text-Driven Multi-Shot Video Creation', 'url': 'https://huggingface.co/papers/2603.11421', 'abstract': 'Abstract ShotVerse enables cinematic video generation through a plan-then-control framework that decouples textual planning from camera control using vision-language models and trajectory alignment.  \t\t\t\t\tAI-generated summary Text-driven video generation has democratized film creation, but camera control in cinematic multi-shot scenarios remains a significant block. Implicit textual prompts lack precision, while explicit trajectory conditioning imposes prohibitive manual overhead and often triggers execution failures in current models. To overcome this bottleneck, we propose a data-centric paradigm shift, positing that aligned (Caption, Trajectory, Video) triplets form an inherent joint distribution that can connect automated plotting and precise execution. Guided by this insight, we present ShotVerse, a "Plan-then-Control" framework that decouples generation into two collaborative agents: a VLM (Vision-Language Model)-based Planner that leverages spatial priors to obtain cinematic, globally aligned trajectories from text, and a Controller that renders these trajectories into multi-shot video content via a camera adapter. Central to our approach is the construction of a data foundation: we design an automated multi-shot camera calibration pipeline aligns disjoint single-shot trajectories into a unified global coordinate system. This facilitates the curation of ShotVerse-Bench, a high-fidelity cinematic dataset with a three-track evaluation protocol that serves as the bedrock for our framework. Extensive experiments demonstrate that ShotVerse effectively bridges the gap between unreliable textual control and labor-intensive manual plotting, achieving superior cinematic aesthetics and generating multi-shot videos that are both camera-accurate and cross-shot consistent.', 'score': 14, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '70fc139d81017753', 'authors': ['Songlin Yang', 'Zhe Wang', 'Xuyi Yang', 'Songchun Zhang', 'Xianghao Kong', 'Taiyi Wu', 'Xiaotong Zhao', 'Ran Zhang', 'Alan Zhao', 'Anyi Rao'], 'affiliations': ['MMLab@HKUST, The Hong Kong University of Science and Technology', 'Tencent Video AI Center, PCG, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.11421.jpg', 'data': {'categories': ['#dataset', '#video', '#data', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Разделение планирования и управления для точной генерации кинематографических видео', 'desc': 'ShotVerse представляет фреймворк для генерации кинематографических видео с использованием подхода «планирование-затем-управление», который разделяет текстовое описание на два этапа: сначала Vision-Language Model генерирует план с глобально согласованными траекториями камеры, затем специальный контроллер преобразует эти траектории в многокадровое видео. Ключевая идея заключается в создании выровненных наборов данных (описание, траектория, видео), которые формируют единое распределение и позволяют соединить автоматизированное планирование с точным исполнением. Авторы разработали автоматический конвейер калибровки камеры, который преобразует отдельные одиночные траектории в единую глобальную систему координат, и создали датасет ShotVerse-Bench с высокой кинематографической точностью. Экспериментальные результаты показывают, что система эффективно генерирует многокадровые видео с точностью управления камерой и согласованностью между кадрами.'}, 'en': {'title': 'Revolutionizing Cinematic Video Generation with ShotVerse', 'desc': 'ShotVerse is a novel framework for generating cinematic videos by separating the planning of shots from the control of camera movements. It utilizes vision-language models to create aligned trajectories based on textual descriptions, addressing the challenges of imprecise prompts and manual overhead in video production. The framework consists of two main components: a Planner that generates cinematic trajectories and a Controller that translates these trajectories into coherent video sequences. By establishing a robust dataset and calibration pipeline, ShotVerse enhances the quality and consistency of multi-shot video generation, making it more accessible and efficient.'}, 'zh': {'title': 'ShotVerse：电影视频生成的新方法', 'desc': 'ShotVerse 是一个通过计划-控制框架实现电影视频生成的系统。它将文本规划与相机控制分开，使用视觉-语言模型和轨迹对齐来提高生成的精确性。该方法通过构建一个数据基础，利用对齐的（标题，轨迹，视频）三元组来连接自动化绘图和精确执行。实验表明，ShotVerse 能有效克服文本控制的不可靠性和手动绘图的繁琐，生成高质量的多镜头视频。'}}}, {'id': 'https://huggingface.co/papers/2603.12264', 'title': 'GRADE: Benchmarking Discipline-Informed Reasoning in Image Editing', 'url': 'https://huggingface.co/papers/2603.12264', 'abstract': 'Abstract GRADE is introduced as the first benchmark for assessing discipline-informed knowledge and reasoning in image editing, revealing significant limitations in current models under knowledge-intensive editing scenarios.  \t\t\t\t\tAI-generated summary Unified multimodal models target joint understanding, reasoning, and generation, but current image editing benchmarks are largely confined to natural images and shallow commonsense reasoning, offering limited assessment of this capability under structured, domain-specific constraints. In this work, we introduce GRADE, the first benchmark to assess discipline-informed knowledge and reasoning in image editing. GRADE comprises 520 carefully curated samples across 10 academic domains, spanning from natural science to social science. To support rigorous evaluation, we propose a multi-dimensional evaluation protocol that jointly assesses Discipline Reasoning, Visual Consistency, and Logical Readability. Extensive experiments on 20 state-of-the-art open-source and closed-source models reveal substantial limitations in current models under implicit, knowledge-intensive editing settings, leading to large performance gaps. Beyond quantitative scores, we conduct rigorous analyses and ablations to expose model shortcomings and identify the constraints within disciplinary editing. Together, GRADE pinpoints key directions for the future development of unified multimodal models, advancing the research on discipline-informed image editing and reasoning. Our benchmark and evaluation code are publicly released.', 'score': 13, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'd3b6cf9a1547e2ce', 'authors': ['Mingxin Liu', 'Ziqian Fan', 'Zhaokai Wang', 'Leyao Gu', 'Zirun Zhu', 'Yiguo He', 'Yuchen Yang', 'Changyao Tian', 'Xiangyu Zhao', 'Ning Liao', 'Shaofeng Zhang', 'Qibing Ren', 'Zhihang Zhong', 'Xuanhe Zhou', 'Junchi Yan', 'Xue Yang'], 'affiliations': ['Fudan University', 'Shanghai Jiao Tong University', 'South China University of Technology', 'The Chinese University of Hong Kong', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.12264.jpg', 'data': {'categories': ['#benchmark', '#science', '#reasoning', '#open_source', '#dataset', '#cv', '#multimodal'], 'emoji': '🧬', 'ru': {'title': 'Бенчмарк для проверки дисциплинарного мышления в редактировании изображений', 'desc': 'В статье представлен GRADE — первый бенчмарк для оценки знаний и рассуждений в области дисциплинарно-специфичного редактирования изображений. Бенчмарк включает 520 тщательно отобранных примеров из 10 академических дисциплин, от естественных до социальных наук. Авторы предложили многомерный протокол оценки, анализирующий дисциплинарное рассуждение, визуальную согласованность и логическую читаемость. Экспериментальное тестирование 20 современных моделей выявило существенные ограничения в понимании структурированных, знаниеёмких задач редактирования изображений.'}, 'en': {'title': 'GRADE: Advancing Knowledge-Driven Image Editing Evaluation', 'desc': 'GRADE is a new benchmark designed to evaluate how well models understand and reason about specific academic disciplines in the context of image editing. It includes 520 samples from various fields, such as natural and social sciences, to test models under structured conditions. The evaluation protocol assesses three key areas: Discipline Reasoning, Visual Consistency, and Logical Readability. Experiments show that current models struggle with knowledge-intensive editing tasks, highlighting the need for improvements in unified multimodal models.'}, 'zh': {'title': 'GRADE：图像编辑中的学科知识与推理评估新基准', 'desc': 'GRADE是第一个用于评估图像编辑中学科知识和推理能力的基准，揭示了当前模型在知识密集型编辑场景中的显著局限性。现有的图像编辑基准主要集中在自然图像和浅层常识推理，无法全面评估在特定领域约束下的能力。GRADE包含520个精心策划的样本，涵盖自然科学到社会科学的10个学术领域。通过多维评估协议，GRADE共同评估学科推理、视觉一致性和逻辑可读性，为未来统一多模态模型的发展指明了方向。'}}}, {'id': 'https://huggingface.co/papers/2603.12267', 'title': 'EVATok: Adaptive Length Video Tokenization for Efficient Visual Autoregressive Generation', 'url': 'https://huggingface.co/papers/2603.12267', 'abstract': 'Abstract EVATok is a framework for efficient video tokenization that adapts token assignment based on video content, improving reconstruction quality and generation efficiency through learned routers and adaptive encoding.  \t\t\t\t\tAI-generated summary Autoregressive (AR) video generative models rely on video tokenizers that compress pixels into discrete token sequences. The length of these token sequences is crucial for balancing reconstruction quality against downstream generation computational cost. Traditional video tokenizers apply a uniform token assignment across temporal blocks of different videos, often wasting tokens on simple, static, or repetitive segments while underserving dynamic or complex ones. To address this inefficiency, we introduce EVATok, a framework to produce Efficient Video Adaptive Tokenizers. Our framework estimates optimal token assignments for each video to achieve the best quality-cost trade-off, develops lightweight routers for fast prediction of these optimal assignments, and trains adaptive tokenizers that encode videos based on the assignments predicted by routers. We demonstrate that EVATok delivers substantial improvements in efficiency and overall quality for video reconstruction and downstream AR generation. Enhanced by our advanced training recipe that integrates video semantic encoders, EVATok achieves superior reconstruction and state-of-the-art class-to-video generation on UCF-101, with at least 24.4% savings in average token usage compared to the prior state-of-the-art LARP and our fixed-length baseline.', 'score': 9, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '9b004e87da7bd8b1', 'authors': ['Tianwei Xiong', 'Jun Hao Liew', 'Zilong Huang', 'Zhijie Lin', 'Jiashi Feng', 'Xihui Liu'], 'affiliations': ['ByteDance', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.12267.jpg', 'data': {'categories': ['#architecture', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Адаптивная токенизация видео — эффективнее через умное распределение', 'desc': 'EVATok — это фреймворк для эффективной токенизации видео, который адаптивно назначает количество токенов в зависимости от содержимого видеоматериала. Вместо одинакового количества токенов для всех сегментов, система использует легковесные маршрутизаторы для предсказания оптимального распределения токенов для каждого видео отдельно. Адаптивные энкодеры затем кодируют видео согласно этим предсказаниям, обеспечивая лучший баланс между качеством реконструкции и вычислительной стоимостью. На практике EVATok сокращает использование токенов на 24.4% по сравнению с предыдущими методами, сохраняя или улучшая качество генерации видео.'}, 'en': {'title': 'Adaptive Tokenization for Efficient Video Generation', 'desc': 'EVATok is a novel framework designed to enhance video tokenization by adapting token assignments based on the specific content of each video. This approach improves the balance between reconstruction quality and computational efficiency by using learned routers to predict optimal token assignments. Traditional methods often apply a uniform token strategy, which can lead to inefficiencies, especially in videos with varying complexity. By implementing adaptive tokenizers and integrating video semantic encoders, EVATok significantly reduces token usage while achieving superior video reconstruction and generation performance.'}, 'zh': {'title': '高效视频自适应标记框架EVATok', 'desc': 'EVATok是一个高效的视频标记框架，它根据视频内容自适应地分配标记，从而提高重建质量和生成效率。传统的视频标记器在不同视频的时间块上应用统一的标记分配，导致在简单或静态片段上浪费标记，而在动态或复杂片段上则不足。EVATok通过估计每个视频的最佳标记分配，开发轻量级路由器快速预测这些分配，并训练自适应标记器来编码视频。我们的实验表明，EVATok在视频重建和后续生成任务中显著提高了效率和整体质量。'}}}, {'id': 'https://huggingface.co/papers/2603.12265', 'title': 'OmniStream: Mastering Perception, Reconstruction and Action in Continuous Streams', 'url': 'https://huggingface.co/papers/2603.12265', 'abstract': 'Abstract OmniStream is a unified visual backbone that processes streaming video data through causal spatiotemporal attention and 3D rotary positional embeddings, enabling general-purpose visual understanding across multiple domains.  \t\t\t\t\tAI-generated summary Modern visual agents require representations that are general, causal, and physically structured to operate in real-time streaming environments. However, current vision foundation models remain fragmented, specializing narrowly in image semantic perception, offline temporal modeling, or spatial geometry. This paper introduces OmniStream, a unified streaming visual backbone that effectively perceives, reconstructs, and acts from diverse visual inputs. By incorporating causal spatiotemporal attention and 3D rotary positional embeddings (3D-RoPE), our model supports efficient, frame-by-frame online processing of video streams via a persistent KV-cache. We pre-train OmniStream using a synergistic multi-task framework coupling static and temporal representation learning, streaming geometric reconstruction, and vision-language alignment on 29 datasets. Extensive evaluations show that, even with a strictly frozen backbone, OmniStream achieves consistently competitive performance with specialized experts across image and video probing, streaming geometric reconstruction, complex video and spatial reasoning, as well as robotic manipulation (unseen at training). Rather than pursuing benchmark-specific dominance, our work demonstrates the viability of training a single, versatile vision backbone that generalizes across semantic, spatial, and temporal reasoning, i.e., a more meaningful step toward general-purpose visual understanding for interactive and embodied agents.', 'score': 8, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '800387c1a965be82', 'authors': ['Yibin Yan', 'Jilan Xu', 'Shangzhe Di', 'Haoning Wu', 'Weidi Xie'], 'affiliations': ['School of Artificial Intelligence, SJTU', 'Shanghai Innovation Institute', 'VGG, Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.12265.jpg', 'data': {'categories': ['#architecture', '#agents', '#multimodal', '#robotics', '#video'], 'emoji': '🎬', 'ru': {'title': 'Универсальный визуальный базис для понимания потоковых видеоданных в реальном времени', 'desc': 'OmniStream — это унифицированная визуальная база, которая обрабатывает потоковые видеоданные с использованием причинного спатиотемпорального внимания и трёхмерных ротационных позиционных вложений. Модель способна эффективно обрабатывать видеопотоки в реальном времени благодаря кэшированию KV-пар, что позволяет проводить инференс кадр за кадром. OmniStream предварительно обучается на синергетической мультизадачной системе, объединяющей статическое и временное представительное обучение, геометрическую реконструкцию и выравнивание визуального языка на 29 датасетах. Модель демонстрирует конкурентные результаты в семантическом восприятии, пространственном и временном рассуждении, а также в задачах робототехники, представляя собой важный шаг к созданию универсальной визуальной системы для интерактивных агентов.'}, 'en': {'title': 'OmniStream: A Unified Backbone for Real-Time Visual Understanding', 'desc': 'OmniStream is a new visual backbone designed for processing streaming video data using advanced techniques like causal spatiotemporal attention and 3D rotary positional embeddings. This model aims to unify various visual tasks, overcoming the limitations of existing models that focus too narrowly on specific areas like image perception or temporal analysis. By employing a multi-task learning approach, OmniStream can efficiently handle real-time video streams while maintaining high performance across different visual challenges. The results show that it can compete with specialized models in tasks such as video reasoning and robotic manipulation, highlighting its potential for general-purpose visual understanding.'}, 'zh': {'title': 'OmniStream：统一的流媒体视觉理解架构', 'desc': 'OmniStream 是一个统一的视觉基础架构，能够通过因果时空注意力和三维旋转位置嵌入处理流媒体视频数据。这种模型支持高效的逐帧在线处理，适用于多种视觉输入，提升了实时流媒体环境中的视觉理解能力。通过在29个数据集上进行多任务预训练，OmniStream 在图像和视频探测、几何重建、复杂视频推理等任务中表现出色。该研究展示了训练一个通用视觉基础架构的可行性，使其能够在语义、空间和时间推理上进行广泛的应用。'}}}, {'id': 'https://huggingface.co/papers/2603.12252', 'title': 'EndoCoT: Scaling Endogenous Chain-of-Thought Reasoning in Diffusion Models', 'url': 'https://huggingface.co/papers/2603.12252', 'abstract': "Abstract A novel framework called Endogenous Chain-of-Thought is proposed to enhance multimodal large language models' reasoning capabilities in diffusion frameworks by enabling iterative thought refinement and progressive task execution.  \t\t\t\t\tAI-generated summary Recently, Multimodal Large Language Models (MLLMs) have been widely integrated into diffusion frameworks primarily as text encoders to tackle complex tasks such as spatial reasoning. However, this paradigm suffers from two critical limitations: (i) MLLMs text encoder exhibits insufficient reasoning depth. Single-step encoding fails to activate the Chain-of-Thought process, which is essential for MLLMs to provide accurate guidance for complex tasks. (ii) The guidance remains invariant during the decoding process. Invariant guidance during decoding prevents DiT from progressively decomposing complex instructions into actionable denoising steps, even with correct MLLM encodings. To this end, we propose Endogenous Chain-of-Thought (EndoCoT), a novel framework that first activates MLLMs' reasoning potential by iteratively refining latent thought states through an iterative thought guidance module, and then bridges these states to the DiT's denoising process. Second, a terminal thought grounding module is applied to ensure the reasoning trajectory remains grounded in textual supervision by aligning the final state with ground-truth answers. With these two components, the MLLM text encoder delivers meticulously reasoned guidance, enabling the DiT to execute it progressively and ultimately solve complex tasks in a step-by-step manner. Extensive evaluations across diverse benchmarks (e.g., Maze, TSP, VSP, and Sudoku) achieve an average accuracy of 92.1%, outperforming the strongest baseline by 8.3 percentage points.", 'score': 8, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'ac6efcb696a317e5', 'authors': ['Xuanlang Dai', 'Yujie Zhou', 'Long Xing', 'Jiazi Bu', 'Xilin Wei', 'Yuhong Liu', 'Beichen Zhang', 'Kai Chen', 'Yuhang Zang'], 'affiliations': ['Fudan University', 'Shanghai AI Laboratory', 'Shanghai Jiaotong University', 'The Chinese University of Hong Kong', 'University of Science and Technology of China', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12252.jpg', 'data': {'categories': ['#benchmark', '#diffusion', '#reasoning', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Пошаговое рассуждение мультимодальных моделей через итеративное уточнение мысли', 'desc': 'В статье предложена новая архитектура Endogenous Chain-of-Thought для улучшения способности мультимодальных больших языковых моделей к рассуждению в диффузионных фреймворках. Основная идея заключается в итеративном уточнении скрытых состояний мысли через специальный модуль, что позволяет активировать глубокое логическое мышление модели. Затем эти уточненные рассуждения прогрессивно передаются в процесс денойзинга, позволяя модели пошагово разбирать сложные инструкции. Экспериментальные результаты на различных задачах показывают среднюю точность 92.1%, что на 8.3 процентных пункта превосходит лучший существующий метод.'}, 'en': {'title': 'Enhancing Reasoning in MLLMs with Endogenous Chain-of-Thought', 'desc': 'The paper introduces a new framework called Endogenous Chain-of-Thought (EndoCoT) designed to improve the reasoning abilities of multimodal large language models (MLLMs) within diffusion frameworks. It addresses two main issues: the lack of depth in reasoning from MLLMs and the static nature of guidance during the decoding process. EndoCoT enhances reasoning by refining thought states iteratively and ensuring that the final reasoning aligns with correct answers. This approach allows for a more effective breakdown of complex tasks into manageable steps, resulting in a significant accuracy improvement in various benchmarks.'}, 'zh': {'title': '内生思维链：提升推理能力的创新框架', 'desc': '本文提出了一种新框架，称为内生思维链（Endogenous Chain-of-Thought），旨在增强多模态大型语言模型（MLLMs）在扩散框架中的推理能力。该框架通过迭代思维引导模块激活MLLMs的推理潜力，并将其与去噪过程相结合，从而逐步执行复杂任务。通过终端思维基础模块，确保推理轨迹与文本监督保持一致，使最终状态与真实答案对齐。经过广泛评估，该方法在多个基准测试中实现了92.1%的平均准确率，超越了最强基线8.3个百分点。'}}}, {'id': 'https://huggingface.co/papers/2603.12245', 'title': 'One Model, Many Budgets: Elastic Latent Interfaces for Diffusion Transformers', 'url': 'https://huggingface.co/papers/2603.12245', 'abstract': 'Abstract Elastic Latent Interface Transformer (ELIT) decouples compute from image resolution in diffusion transformers by introducing learnable latent tokens that adaptively prioritize important regions, enabling dynamic resource allocation without modifying core model architecture.  \t\t\t\t\tAI-generated summary Diffusion transformers (DiTs) achieve high generative quality but lock FLOPs to image resolution, limiting principled latency-quality trade-offs, and allocate computation uniformly across input spatial tokens, wasting resource allocation to unimportant regions. We introduce Elastic Latent Interface Transformer (ELIT), a drop-in, DiT-compatible mechanism that decouples input image size from compute. Our approach inserts a latent interface, a learnable variable-length token sequence on which standard transformer blocks can operate. Lightweight Read and Write cross-attention layers move information between spatial tokens and latents and prioritize important input regions. By training with random dropping of tail latents, ELIT learns to produce importance-ordered representations with earlier latents capturing global structure while later ones contain information to refine details. At inference, the number of latents can be dynamically adjusted to match compute constraints. ELIT is deliberately minimal, adding two cross-attention layers while leaving the rectified flow objective and the DiT stack unchanged. Across datasets and architectures (DiT, U-ViT, HDiT, MM-DiT), ELIT delivers consistent gains. On ImageNet-1K 512px, ELIT delivers an average gain of 35.3% and 39.6% in FID and FDD scores. Project page: https://snap-research.github.io/elit/', 'score': 8, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': 'a5c414860d46891f', 'authors': ['Moayed Haji-Ali', 'Willi Menapace', 'Ivan Skorokhodov', 'Dogyun Park', 'Anil Kag', 'Michael Vasilkovsky', 'Sergey Tulyakov', 'Vicente Ordonez', 'Aliaksandr Siarohin'], 'affiliations': ['Rice University', 'Snap Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.12245.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#training', '#optimization', '#inference', '#open_source', '#cv'], 'emoji': '⚡', 'ru': {'title': 'Адаптивное распределение вычислений в диффузионных трансформерах через латентные интерфейсы', 'desc': 'В статье предлагается Elastic Latent Interface Transformer (ELIT) — механизм, который разделяет вычислительные ресурсы и разрешение изображения в диффузионных трансформерах. Подход вводит обучаемую последовательность латентных токенов переменной длины, которые адаптивно определяют приоритет важных областей изображения. Лёгкие cross-attention слои перемещают информацию между пространственными токенами и латентами, позволяя модели выучить упорядочение по важности, где ранние латенты кодируют глобальную структуру, а поздние — детали. Во время инференса количество латентов можно динамически изменять в соответствии с вычислительными ограничениями, обеспечивая гибкий компромисс между качеством и скоростью генерации.'}, 'en': {'title': 'Dynamic Resource Allocation in Diffusion Transformers', 'desc': 'The Elastic Latent Interface Transformer (ELIT) enhances diffusion transformers by separating the amount of computation from the image resolution. It introduces learnable latent tokens that focus on important areas of the image, allowing for more efficient resource use without changing the main model structure. ELIT uses cross-attention layers to manage information flow between spatial tokens and latent tokens, ensuring that critical features are prioritized. This method not only improves generative quality but also allows for flexible computation based on resource availability, leading to significant performance gains across various datasets.'}, 'zh': {'title': '动态资源分配，提升生成质量', 'desc': '弹性潜在接口变换器（ELIT）通过引入可学习的潜在标记，解耦了扩散变换器中的计算与图像分辨率，从而实现动态资源分配。该方法在输入图像大小与计算之间建立了灵活的接口，使得计算可以优先分配给重要区域。ELIT通过训练随机丢弃尾部潜在标记，学习生成重要性排序的表示，早期的潜在标记捕捉全局结构，而后期的标记则用于细节的精细化。该模型在多个数据集和架构上均表现出一致的性能提升，特别是在ImageNet-1K上，FID和FDD得分分别提高了35.3%和39.6%。'}}}, {'id': 'https://huggingface.co/papers/2603.12056', 'title': 'XSkill: Continual Learning from Experience and Skills in Multimodal Agents', 'url': 'https://huggingface.co/papers/2603.12056', 'abstract': 'Abstract Multimodal agents using XSkill framework achieve improved continual learning through dual-stream knowledge extraction and retrieval from visual observations, enhancing tool use efficiency and reasoning capabilities.  \t\t\t\t\tAI-generated summary Multimodal agents can now tackle complex reasoning tasks with diverse tools, yet they still suffer from inefficient tool use and inflexible orchestration in open-ended settings. A central challenge is enabling such agents to continually improve without parameter updates by learning from past trajectories. We identify two complementary forms of reusable knowledge essential for this goal: experiences, providing concise action-level guidance for tool selection and decision making, and skills, providing structured task-level guidance for planning and tool use. To this end, we propose XSkill, a dual-stream framework for continual learning from experience and skills in multimodal agents. XSkill grounds both knowledge extraction and retrieval in visual observations. During accumulation, XSkill distills and consolidates experiences and skills from multi-path rollouts via visually grounded summarization and cross-rollout critique. During inference, it retrieves and adapts this knowledge to the current visual context and feeds usage history back into accumulation to form a continual learning loop. Evaluated on five benchmarks across diverse domains with four backbone models, XSkill consistently and substantially outperforms both tool-only and learning-based baselines. Further analysis reveals that the two knowledge streams play complementary roles in influencing the reasoning behaviors of agents and show superior zero-shot generalization.', 'score': 7, 'issue_id': 1478, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '17d1d5b507ecadd6', 'authors': ['Guanyu Jiang', 'Zhaochen Su', 'Xiaoye Qu', 'Yi R.', 'Fung'], 'affiliations': ['Carnegie Mellon University', 'MIT-IBM Watson AI Lab', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2603.12056.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents', '#training'], 'emoji': '🧠', 'ru': {'title': 'Двухпоточное непрерывное обучение мультимодальных агентов через визуально обоснованное извлечение опыта и навыков', 'desc': 'В статье предлагается фреймворк XSkill для мультимодальных агентов, который обеспечивает непрерывное обучение без обновления параметров модели. Фреймворк использует двухпоточный подход, извлекая два типа знаний из визуальных наблюдений: опыт (experience) для выбора инструментов и навыки (skills) для планирования. Процесс обучения включает этап накопления знаний через визуально обоснованное обобщение и этап вывода с адаптацией знаний к текущему контексту. Экспериментальные результаты показывают, что XSkill значительно превосходит базовые методы и демонстрирует хорошую обобщаемость на новые задачи.'}, 'en': {'title': 'Empowering Multimodal Agents with XSkill for Continual Learning', 'desc': 'The paper presents XSkill, a dual-stream framework designed for multimodal agents to enhance their continual learning capabilities. It focuses on two types of reusable knowledge: experiences for action-level guidance and skills for task-level planning. By grounding knowledge extraction and retrieval in visual observations, XSkill allows agents to learn from past interactions without needing parameter updates. The framework has been tested across various benchmarks, demonstrating significant improvements in tool use efficiency and reasoning abilities compared to existing methods.'}, 'zh': {'title': 'XSkill：提升多模态智能体的持续学习能力', 'desc': '这篇论文介绍了一种名为XSkill的双流框架，用于多模态智能体的持续学习。XSkill通过从视觉观察中提取和检索知识，提升了工具使用效率和推理能力。它识别出两种可重用的知识形式：经验和技能，分别为工具选择和决策提供指导。通过这种方式，XSkill在多个基准测试中表现优异，展示了其在复杂推理任务中的优势。'}}}, {'id': 'https://huggingface.co/papers/2603.11531', 'title': 'Mobile-GS: Real-time Gaussian Splatting for Mobile Devices', 'url': 'https://huggingface.co/papers/2603.11531', 'abstract': 'Abstract Mobile-GS enables real-time 3D Gaussian Splatting rendering on mobile devices through depth-aware order-independent rendering, neural view-dependent enhancement, and compression techniques.  \t\t\t\t\tAI-generated summary 3D Gaussian Splatting (3DGS) has emerged as a powerful representation for high-quality rendering across a wide range of applications.However, its high computational demands and large storage costs pose significant challenges for deployment on mobile devices. In this work, we propose a mobile-tailored real-time Gaussian Splatting method, dubbed Mobile-GS, enabling efficient inference of Gaussian Splatting on edge devices. Specifically, we first identify alpha blending as the primary computational bottleneck, since it relies on the time-consuming Gaussian depth sorting process. To solve this issue, we propose a depth-aware order-independent rendering scheme that eliminates the need for sorting, thereby substantially accelerating rendering. Although this order-independent rendering improves rendering speed, it may introduce transparency artifacts in regions with overlapping geometry due to the scarcity of rendering order. To address this problem, we propose a neural view-dependent enhancement strategy, enabling more accurate modeling of view-dependent effects conditioned on viewing direction, 3D Gaussian geometry, and appearance attributes. In this way, Mobile-GS can achieve both high-quality and real-time rendering. Furthermore, to facilitate deployment on memory-constrained mobile platforms, we also introduce first-order spherical harmonics distillation, a neural vector quantization technique, and a contribution-based pruning strategy to reduce the number of Gaussian primitives and compress the 3D Gaussian representation with the assistance of neural networks. Extensive experiments demonstrate that our proposed Mobile-GS achieves real-time rendering and compact model size while preserving high visual quality, making it well-suited for mobile applications.', 'score': 6, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '42bca667a0b6d36d', 'authors': ['Xiaobiao Du', 'Yida Wang', 'Kun Zhan', 'Xin Yu'], 'affiliations': ['Adelaide University', 'Li Auto Inc.', 'University of Technology Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2603.11531.jpg', 'data': {'categories': ['#architecture', '#inference', '#3d'], 'emoji': '📱', 'ru': {'title': 'Трёхмерная графика в реальном времени для мобильных устройств', 'desc': 'Mobile-GS — это метод трёхмерной визуализации на мобильных устройствах, основанный на гауссовых сплаттингах. Авторы решают проблему вычислительной сложности, предложив порядконезависимый рендеринг без сортировки глубины, что значительно ускоряет обработку. Для устранения артефактов прозрачности используется нейросетевая стратегия учёта зависимости визуализации от угла обзора. Дополнительно применяются дистилляция сферических гармоник, нейросетевая векторная квантизация и обрезание по вкладу для сжатия модели и уменьшения использования памяти.'}, 'en': {'title': 'Real-Time 3D Rendering on Mobile Made Easy!', 'desc': "Mobile-GS is a novel method that allows real-time rendering of 3D Gaussian Splatting on mobile devices by addressing computational challenges. It introduces a depth-aware order-independent rendering technique that speeds up the process by eliminating the need for depth sorting, which is typically slow. To enhance visual quality, it employs a neural view-dependent enhancement strategy that accurately models effects based on the viewer's perspective. Additionally, Mobile-GS incorporates advanced compression techniques to reduce memory usage, making it efficient for mobile platforms while maintaining high-quality visuals."}, 'zh': {'title': '移动设备上的实时3D高斯渲染新突破', 'desc': 'Mobile-GS是一种针对移动设备的实时3D高斯点渲染方法。它通过深度感知的无序渲染、神经视角增强和压缩技术，解决了高计算需求和存储成本的问题。该方法消除了排序过程，从而加快了渲染速度，并通过神经网络增强了视角依赖效果。实验表明，Mobile-GS在保持高视觉质量的同时，实现了实时渲染和紧凑模型大小，适合移动应用。'}}}, {'id': 'https://huggingface.co/papers/2603.10652', 'title': 'Are Video Reasoning Models Ready to Go Outside?', 'url': 'https://huggingface.co/papers/2603.10652', 'abstract': "Abstract ROVA is a training framework that enhances vision-language model robustness under real-world disturbances through spatio-temporal corruption modeling and adaptive sample difficulty assessment.  \t\t\t\t\tAI-generated summary In real-world deployment, vision-language models often encounter disturbances such as weather, occlusion, and camera motion. Under such conditions, their understanding and reasoning degrade substantially, revealing a gap between clean, controlled (i.e., unperturbed) evaluation settings and real-world robustness. To address this limitation, we propose ROVA, a novel training framework that improves robustness by modeling a robustness-aware consistency reward under spatio-temporal corruptions. ROVA introduces a difficulty-aware online training strategy that prioritizes informative samples based on the model's evolving capability. Specifically, it continuously re-estimates sample difficulty via self-reflective evaluation, enabling adaptive training with a robustness-aware consistency reward. We also introduce PVRBench, a new benchmark that injects real-world perturbations into embodied video datasets to assess both accuracy and reasoning quality under realistic disturbances. We evaluate ROVA and baselines on PVRBench, UrbanVideo, and VisBench, where open-source and proprietary models suffer up to 35% and 28% drops in accuracy and reasoning under realistic perturbations. ROVA effectively mitigates performance degradation, boosting relative accuracy by at least 24% and reasoning by over 9% compared with baseline models (QWen2.5/3-VL, InternVL2.5, Embodied-R). These gains transfer to clean standard benchmarks, yielding consistent improvements.", 'score': 4, 'issue_id': 1474, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '5f9b242e77fbef12', 'authors': ['Yangfan He', 'Changgyu Boo', 'Jaehong Yoon'], 'affiliations': ['Korea University', 'NTU Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.10652.jpg', 'data': {'categories': ['#benchmark', '#training', '#cv', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Обучение визуально-языковых моделей с адаптивной защитой от реальных помех', 'desc': 'ROVA — это фреймворк для обучения визуально-языковых моделей, который повышает их устойчивость к реальным помехам путём моделирования пространственно-временных искажений. Метод вводит стратегию адаптивного обучения, которая динамически переоценивает сложность примеров через самоанализ модели и приоритизирует информативные образцы. Авторы предложили новый бенчмарк PVRBench с реальными возмущениями в видеонаборах данных для оценки точности и качества рассуждений под воздействием помех. ROVA демонстрирует значительные улучшения: повышение точности на 24% и качества рассуждений на 9% по сравнению с базовыми моделями, с сохранением прибыли на стандартных чистых бенчмарках.'}, 'en': {'title': 'Enhancing Vision-Language Model Robustness with ROVA', 'desc': "ROVA is a training framework designed to improve the robustness of vision-language models when faced with real-world challenges like weather changes and camera movements. It does this by modeling spatio-temporal corruptions and implementing a consistency reward that focuses on maintaining performance despite these disturbances. The framework also features a difficulty-aware training strategy that adapts to the model's learning progress, ensuring that it prioritizes more challenging samples for training. Additionally, ROVA is evaluated using a new benchmark called PVRBench, which tests models under realistic conditions, showing significant improvements in accuracy and reasoning capabilities compared to traditional methods."}, 'zh': {'title': '提升视觉-语言模型鲁棒性的创新训练框架', 'desc': 'ROVA是一种训练框架，旨在提高视觉-语言模型在现实世界干扰下的鲁棒性。它通过时空腐蚀建模和自适应样本难度评估来实现这一目标。ROVA采用了一种在线训练策略，优先选择对模型能力提升有帮助的样本，并通过自我反思评估不断重新估计样本难度。实验结果表明，ROVA在面对现实干扰时，能够显著提高模型的准确性和推理能力。'}}}, {'id': 'https://huggingface.co/papers/2603.11076', 'title': 'DIVE: Scaling Diversity in Agentic Task Synthesis for Generalizable Tool Use', 'url': 'https://huggingface.co/papers/2603.11076', 'abstract': 'Abstract Training Qwen3-8B on DIVE data improves performance across out-of-distribution benchmarks, with diversity scaling outperforming quantity scaling even with less data.  \t\t\t\t\tAI-generated summary Recent work synthesizes agentic tasks for post-training tool
