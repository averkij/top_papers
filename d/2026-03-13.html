 коэффициент участия, раннее обогащение собственных значений и дивергенцию Йенсена-Шеннона) для отслеживания организации потока информации в высокомерном пространстве признаков. Авторы показывают, что нелинейности в сквозных сетях перераспределяют дисперсию между собственными модами, а геометрия оптимизатора существенно влияет на этот процесс. NerVE демонстрирует устойчивые спектральные сигнатуры, которые коррелируют с обобщающей способностью модели и помогают принимать обоснованные архитектурные решения.'}, 'en': {'title': 'Unlocking Information Flow in Language Models with NerVE', 'desc': 'NerVE is a new framework designed to analyze how feed-forward networks (FFNs) in large language models manage and optimize information flow. It uses spectral analysis metrics to track the dynamics of these networks, focusing on aspects like spectral entropy and participation ratio. The framework reveals how different architectural choices and optimization strategies affect the performance and generalization of the models. By providing insights into the eigenvalue dynamics, NerVE helps researchers make informed decisions about model design without relying solely on trial-and-error methods.'}, 'zh': {'title': 'NerVE：揭示前馈网络信息流的秘密', 'desc': 'NerVE是一个统一的框架，用于分析大型语言模型中前馈网络的动态特性。它通过谱分析指标揭示信息流的组织和优化对不同架构的影响。NerVE使用四个互补的指标来跟踪特征谱动态，帮助理解前馈网络如何在高维潜在空间中调节信息流。该框架的关键在于前馈网络的非线性特性如何影响潜在维度的利用，以及优化器几何形状如何调节这种影响。'}}}, {'id': 'https://huggingface.co/papers/2602.24181', 'title': 'A Mixed Diet Makes DINO An Omnivorous Vision Encoder', 'url': 'https://huggingface.co/papers/2602.24181', 'abstract': 'Abstract A novel vision encoder framework is presented that learns modality-agnostic feature representations by aligning multi-modal inputs while preserving semantic distinctions from a frozen teacher model.  \t\t\t\t\tAI-generated summary Pre-trained vision encoders like DINOv2 have demonstrated exceptional performance on unimodal tasks. However, we observe that their feature representations are poorly aligned across different modalities. For instance, the feature embedding for an RGB image and its corresponding depth map of the same scene exhibit a cosine similarity that is nearly identical to that of two random, unrelated images. To address this, we propose the Omnivorous Vision Encoder, a novel framework that learns a modality-agnostic feature space. We train the encoder with a dual objective: first, to maximize the feature alignment between different modalities of the same scene; and second, a distillation objective that anchors the learned representations to the output of a fully frozen teacher such as DINOv2. The resulting student encoder becomes "omnivorous" by producing a consistent, powerful embedding for a given scene, regardless of the input modality (RGB, Depth, Segmentation, etc.). This approach enables robust cross-modal understanding while retaining the discriminative semantics of the original foundation model.', 'score': 1, 'issue_id': 1479, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'ea5f11d657311a7a', 'authors': ['Rishabh Kabra', 'Maks Ovsjanikov', 'Drew A. Hudson', 'Ye Xia', 'Skanda Koppula', 'Andre Araujo', 'Joao Carreira', 'Niloy J. Mitra'], 'affiliations': ['Google DeepMind', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2602.24181.jpg', 'data': {'categories': ['#cv', '#multimodal', '#architecture', '#training'], 'emoji': '🎬', 'ru': {'title': 'Всеядный визуальный энкодер: единое представление для всех модальностей', 'desc': 'Работа представляет новый фреймворк для визуального энкодера, который обучается создавать модально-агностичные представления признаков путём выравнивания мультимодальных входов. Авторы обнаружили, что существующие предобученные энкодеры, такие как DINOv2, плохо согласуют представления признаков разных модальностей одной и той же сцены. Предложенный подход использует двойную функцию потерь: максимизацию выравнивания признаков между разными модальностями и дистилляцию знаний от замороженной учительской модели. Результирующий энкодер производит согласованные мощные эмбеддинги для любой сцены независимо от входной модальности (RGB, глубина, сегментация и т.д.).'}, 'en': {'title': 'Unified Understanding Across Modalities with Omnivorous Vision Encoder', 'desc': 'This paper introduces the Omnivorous Vision Encoder, a framework designed to create feature representations that work well across different types of data, like images and depth maps. It addresses the issue of poor alignment in existing models, where similar scenes in different modalities do not produce similar feature embeddings. The encoder is trained using two main goals: aligning features from different modalities of the same scene and ensuring these features are consistent with a frozen teacher model. This results in a versatile encoder that can effectively understand and represent various inputs while maintaining the unique characteristics of each modality.'}, 'zh': {'title': '全能视觉编码器：跨模态理解的新突破', 'desc': '本文提出了一种新颖的视觉编码器框架，旨在通过对齐多模态输入来学习模态无关的特征表示，同时保留来自冻结教师模型的语义差异。研究发现，现有的预训练视觉编码器在不同模态之间的特征表示对齐效果较差。为了解决这个问题，提出了全能视觉编码器，通过最大化同一场景不同模态之间的特征对齐，并将学习到的表示锚定到冻结教师模型的输出，从而实现强大的跨模态理解。该方法使得编码器能够为给定场景生成一致且强大的嵌入，无论输入模态是RGB、深度图还是分割图。'}}}, {'id': 'https://huggingface.co/papers/2603.11487', 'title': 'Attention Sinks Are Provably Necessary in Softmax Transformers: Evidence from Trigger-Conditional Tasks', 'url': 'https://huggingface.co/papers/2603.11487', 'abstract': 'Abstract Softmax self-attention models exhibit attention sinks where probability mass concentrates on fixed positions due to normalization constraints, while ReLU attention avoids this behavior.  \t\t\t\t\tAI-generated summary Transformers often display an attention sink: probability mass concentrates on a fixed, content-agnostic position. We prove that computing a simple trigger-conditional behavior necessarily induces a sink in softmax self-attention models. Our results formalize a familiar intuition: normalization over a probability simplex must force attention to collapse onto a stable anchor to realize a default state (e.g., when the model needs to ignore the input). We instantiate this with a concrete task: when a designated trigger token appears, the model must return the average of all preceding token representations, and otherwise output zero, a task which mirrors the functionality of attention heads in the wild (Barbero et al., 2025; Guo et al., 2024). We also prove that non-normalized ReLU attention can solve the same task without any sink, confirming that the normalization constraint is the fundamental driver of sink behavior. Experiments validate our predictions and demonstrate they extend beyond the theoretically analyzed setting: softmax models develop strong sinks while ReLU attention eliminates them in both single-head and multi-head variants.', 'score': 0, 'issue_id': 1474, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '600cf758615cdfbd', 'authors': ['Yuval Ran-Milo'], 'affiliations': ['Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2603.11487.jpg', 'data': {'categories': ['#architecture', '#math'], 'emoji': '🔍', 'ru': {'title': 'Нормализация вместо содержания: почему softmax-внимание создаёт якоря', 'desc': 'В статье исследуется проблема концентрации вероятностной массы в механизме self-attention моделей на основе softmax, когда внимание неизбежно фокусируется на фиксированных позициях независимо от содержания входных данных. Авторы доказывают теоретически, что нормализация вероятностей на симплексе математически вынуждает внимание коллапсировать на стабильную позицию для реализации операций по умолчанию, когда модели нужно игнорировать входные данные. Они демонстрируют, что ReLU attention без нормализации способен решать идентичные задачи без эффекта концентрации, что подтверждает, что именно нормализация является причиной этого явления. Экспериментальные результаты валидируют теоретические предсказания и показывают, что проблема проявляется как в одноголовых, так и в многоголовых вариантах внимания.'}, 'en': {'title': 'Avoiding Attention Sinks with ReLU Attention', 'desc': "This paper investigates the behavior of softmax self-attention models, which often suffer from 'attention sinks' where the model's focus becomes fixed on certain positions due to normalization constraints. The authors demonstrate that this phenomenon occurs when the model is required to perform a specific task that involves conditional behavior based on a trigger token. They show that while softmax attention collapses onto a stable anchor, non-normalized ReLU attention can achieve the same task without experiencing this sink behavior. The findings are supported by experiments that confirm softmax models develop strong sinks, whereas ReLU attention effectively avoids them in both single-head and multi-head configurations."}, 'zh': {'title': '消除注意力沉没，ReLU注意力的优势', 'desc': '本文探讨了软最大自注意力模型中的注意力沉没现象，即概率质量集中在固定位置。我们证明了简单的触发条件行为必然会导致软最大自注意力模型中的沉没现象。研究表明，概率单纯形上的归一化会迫使注意力集中在一个稳定的锚点上，以实现默认状态。通过具体任务的实例，我们展示了非归一化的ReLU注意力可以在没有沉没现象的情况下解决相同任务。'}}}, {'id': 'https://huggingface.co/papers/2603.10604', 'title': 'HyPER-GAN: Hybrid Patch-Based Image-to-Image Translation for Real-Time Photorealism Enhancement', 'url': 'https://huggingface.co/papers/2603.10604', 'abstract': 'Abstract HyPER-GAN is a lightweight image-to-image translation method using a U-Net-style generator and hybrid training strategy that improves photorealism while enabling real-time inference.  \t\t\t\t\tAI-generated summary Generative models are widely employed to enhance the photorealism of synthetic data for training computer vision algorithms. However, they often introduce visual artifacts that degrade the accuracy of these algorithms and require high computational resources, limiting their applicability in real-time training or evaluation scenarios. In this paper, we propose Hybrid Patch Enhanced Realism Generative Adversarial Network (HyPER-GAN), a lightweight image-to-image translation method based on a U-Net-style generator designed for real-time inference. The model is trained using paired synthetic and photorealism-enhanced images, complemented by a hybrid training strategy that incorporates matched patches from real-world data to improve visual realism and semantic consistency. Experimental results demonstrate that HyPER-GAN outperforms state-of-the-art paired image-to-image translation methods in terms of inference latency, visual realism, and semantic robustness. Moreover, it is illustrated that the proposed hybrid training strategy indeed improves visual quality and semantic consistency compared to training the model solely with paired synthetic and photorealism-enhanced images. Code and pretrained models are publicly available for download at: https://github.com/stefanos50/HyPER-GAN', 'score': 0, 'issue_id': 1481, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '62c60f894a442362', 'authors': ['Stefanos Pasios', 'Nikos Nikolaidis'], 'affiliations': ['Aristotle University of Thessaloniki'], 'pdf_title_img': 'assets/pdf/title_img/2603.10604.jpg', 'data': {'categories': ['#cv', '#training', '#inference', '#synthetic', '#open_source', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Лёгкая трансляция изображений с фотореализмом в реальном времени', 'desc': 'HyPER-GAN — это лёгкая нейросетевая модель для трансляции изображений между доменами, основанная на архитектуре U-Net и использующая гибридную стратегию обучения. Модель обучается на парах синтетических и фотореалистичных изображений, дополняемых реальными патчами данных для улучшения визуального качества и семантической согласованности. Гибридный подход к обучению значительно повышает фотореализм выходных изображений, одновременно снижая визуальные артефакты, которые обычно вводят генеративные модели. Основное преимущество метода заключается в достижении высокого качества перевода при низкой вычислительной сложности, что позволяет выполнять инференцию в реальном времени.'}, 'en': {'title': 'Real-Time Image Translation with Enhanced Photorealism', 'desc': 'HyPER-GAN is a novel image-to-image translation method that utilizes a U-Net-style generator to achieve high-quality photorealism in generated images while maintaining real-time inference capabilities. The model employs a hybrid training strategy that combines paired synthetic images with real-world data patches, enhancing both visual realism and semantic consistency. This approach addresses common issues in generative models, such as visual artifacts and high computational demands, making it suitable for real-time applications. Experimental results show that HyPER-GAN significantly outperforms existing methods in terms of speed, visual quality, and semantic accuracy.'}, 'zh': {'title': 'HyPER-GAN：实时图像转换的新突破', 'desc': 'HyPER-GAN是一种轻量级的图像到图像转换方法，采用U-Net风格的生成器和混合训练策略，旨在提高图像的真实感并实现实时推理。该模型通过配对的合成图像和增强真实感的图像进行训练，同时结合来自真实世界数据的匹配补丁，以提高视觉真实感和语义一致性。实验结果表明，HyPER-GAN在推理延迟、视觉真实感和语义鲁棒性方面优于现有的图像到图像转换方法。此外，混合训练策略显著改善了视觉质量和语义一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.10444', 'title': 'The Curse and Blessing of Mean Bias in FP4-Quantized LLM Training', 'url': 'https://huggingface.co/papers/2603.10444', 'abstract': 'Abstract LLM anisotropy caused by rank-one mean bias in low-bit training can be stabilized through mean subtraction, recovering performance while enabling efficient hardware deployment.  \t\t\t\t\tAI-generated summary Large language models trained on natural language exhibit pronounced anisotropy: a small number of directions concentrate disproportionate energy, while the remaining dimensions form a broad semantic tail. In low-bit training regimes, this geometry becomes numerically unstable. Because blockwise quantization scales are determined by extreme elementwise magnitudes, dominant directions stretch the dynamic range, compressing long-tail semantic variation into narrow numerical bins. We show that this instability is primarily driven by a coherent rank-one mean bias, which constitutes the dominant component of spectral anisotropy in LLM representations. This mean component emerges systematically across layers and training stages and accounts for the majority of extreme activation magnitudes, making it the principal driver of dynamic-range inflation under low precision. Crucially, because the dominant instability is rank-one, it can be eliminated through a simple source-level mean-subtraction operation. This bias-centric conditioning recovers most of the stability benefits of SVD-based spectral methods while requiring only reduction operations and standard quantization kernels. Empirical results on FP4 (W4A4G4) training show that mean removal substantially narrows the loss gap to BF16 and restores downstream performance, providing a hardware-efficient path to stable low-bit LLM training.', 'score': 0, 'issue_id': 1475, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '7d9d1ba7808333bd', 'authors': ['Hengjie Cao', 'Zhendong Huang', 'Mengyi Chen', 'Yifeng Yang', 'Fanqi Yu', 'Ruijun Huang', 'Fang Dong', 'Xin Zhang', 'Jixian Zhou', 'Anrui Chen', 'Mingzhi Dong', 'Yujiang Wang', 'Jinlong Hou', 'Qin Lv', 'Yuan Cheng', 'Tun Lu', 'Fan Yang', 'Li Shang'], 'affiliations': ['Fudan University', 'Oxford Suzhou Centre for Advanced Research', 'Shanghai Innovation Institute', 'University of Bath', 'University of Colorado Boulder', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.10444.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training', '#inference'], 'emoji': '⚖️', 'ru': {'title': 'Стабилизация низкоразрядного обучения через вычитание среднего смещения', 'desc': 'В статье исследуется проблема анизотропии в большших языковых моделях при низкоразрядном обучении. Авторы показывают, что основной причиной численной нестабильности является когерентное смещение первого ранга, сосредоточенное в одном направлении активаций. Предложен простой метод вычитания среднего значения на уровне исходных данных, который устраняет доминирующий компонент анизотропии и восстанавливает стабильность квантизации. Экспериментальные результаты демонстрируют, что данный подход значительно снижает разрыв в потерях между низкоразрядным и полноточечным обучением, обеспечивая эффективное развёртывание на специализированном оборудовании.'}, 'en': {'title': 'Stabilizing Low-Bit LLMs with Mean Subtraction', 'desc': "This paper addresses the issue of anisotropy in large language models (LLMs) caused by a rank-one mean bias during low-bit training. The authors identify that this bias leads to instability in the model's representation, as it causes certain directions to dominate the energy distribution, while others are compressed. By applying mean subtraction, they demonstrate that this instability can be mitigated, allowing for improved performance without sacrificing efficiency. The results indicate that this method can significantly enhance the stability of low-bit training, making it more viable for hardware deployment."}, 'zh': {'title': '均值减法：稳定低比特训练的关键', 'desc': '这篇论文探讨了低比特训练中大语言模型（LLM）表现出的各向异性问题，主要是由于一阶均值偏差导致的。研究表明，这种偏差会导致模型在某些方向上集中能量，而其他方向则表现出较弱的语义变化。通过简单的均值减法操作，可以消除这种一阶偏差，从而恢复模型的稳定性和性能。实验结果显示，均值去除显著缩小了与高精度训练的损失差距，并为低比特LLM训练提供了一种高效的硬件解决方案。'}}}, {'id': 'https://huggingface.co/papers/2603.10125', 'title': '4DEquine: Disentangling Motion and Appearance for 4D Equine Reconstruction from Monocular Video', 'url': 'https://huggingface.co/papers/2603.10125', 'abstract': 'Abstract A novel 4D reconstruction framework for equine family that separates motion and appearance reconstruction using spatio-temporal transformers and 3D Gaussian avatars, achieving state-of-the-art results on real-world datasets.  \t\t\t\t\tAI-generated summary 4D reconstruction of equine family (e.g. horses) from monocular video is important for animal welfare. Previous mainstream 4D animal reconstruction methods require joint optimization of motion and appearance over a whole video, which is time-consuming and sensitive to incomplete observation. In this work, we propose a novel framework called 4DEquine by disentangling the 4D reconstruction problem into two sub-problems: dynamic motion reconstruction and static appearance reconstruction. For motion, we introduce a simple yet effective spatio-temporal transformer with a post-optimization stage to regress smooth and pixel-aligned pose and shape sequences from video. For appearance, we design a novel feed-forward network that reconstructs a high-fidelity, animatable 3D Gaussian avatar from as few as a single image. To assist training, we create a large-scale synthetic motion dataset, VarenPoser, which features high-quality surface motions and diverse camera trajectories, as well as a synthetic appearance dataset, VarenTex, comprising realistic multi-view images generated through multi-view diffusion. While training only on synthetic datasets, 4DEquine achieves state-of-the-art performance on real-world APT36K and AiM datasets, demonstrating the superiority of 4DEquine and our new datasets for both geometry and appearance reconstruction. Comprehensive ablation studies validate the effectiveness of both the motion and appearance reconstruction network. Project page: https://luoxue-star.github.io/4DEquine_Project_Page/.', 'score': 0, 'issue_id': 1477, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '173c01d54751fe81', 'authors': ['Jin Lyu', 'Liang An', 'Pujin Cheng', 'Yebin Liu', 'Xiaoying Tang'], 'affiliations': ['Southern University of Science and Technology', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.10125.jpg', 'data': {'categories': ['#video', '#synthetic', '#architecture', '#3d', '#dataset', '#diffusion'], 'emoji': '🐴', 'ru': {'title': 'Разделение движения и внешнего вида для быстрой 4D реконструкции лошадей', 'desc': 'Работа представляет новую систему для 4D реконструкции животных семейства лошадиных из видео одной камеры путём разделения задачи на две независимые подзадачи: восстановление движения и восстановление внешнего вида. Для реконструкции движения используется спatio-временной трансформер, который регрессирует последовательности поз и форм тела, а для внешнего вида разработана нейросеть, создающая анимируемый 3D аватар на основе гауссовых сплатов из одного изображения. Авторы создали два синтетических датасета с высококачественными движениями и реалистичными многовидовыми изображениями для обучения модели. Несмотря на обучение только на синтетических данных, система показывает лучшие результаты на реальных датасетах, что демонстрирует эффективность предложенного подхода.'}, 'en': {'title': 'Revolutionizing 4D Equine Reconstruction with 4DEquine', 'desc': 'This paper presents a new framework called 4DEquine for 4D reconstruction of equine family members, like horses, from monocular video. It separates the complex task into two simpler parts: dynamic motion reconstruction and static appearance reconstruction, using advanced techniques like spatio-temporal transformers and 3D Gaussian avatars. The framework is trained on synthetic datasets, VarenPoser and VarenTex, which provide high-quality motion and appearance data. The results show that 4DEquine outperforms existing methods on real-world datasets, proving its effectiveness in reconstructing both the geometry and appearance of equines.'}, 'zh': {'title': '马科动物的4D重建新突破', 'desc': '本研究提出了一种新颖的4D重建框架，专注于马科动物的运动和外观重建。通过使用时空变换器和3D高斯头像，研究将4D重建问题分解为动态运动重建和静态外观重建两个子问题。该框架在合成数据集上进行训练，并在真实世界数据集上取得了最先进的结果，展示了其在几何和外观重建方面的优越性。综合消融研究验证了运动和外观重建网络的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.07331', 'title': 'Causal Attribution of Coastal Water Clarity Degradation to Nickel Processing Expansion at the Indonesia Morowali Industrial Park, Sulawesi', 'url': 'https://huggingface.co/papers/2603.07331', 'abstract': "Abstract  Indonesia's nickel ore export ban has driven rapid expansion of smelting and hydrometallurgical processing capacity at the Indonesia Morowali Industrial Park (IMIP), now the world's largest integrated nickel processing complex, on the coast of Central Sulawesi. Whether this industrialization has degraded the adjacent marine environment remains unquantified. We apply Bayesian structural time-series (BSTS) causal inference to a multi-decadal, multi-sensor satellite ocean color record of the diffuse attenuation coefficient at 490 nm, K_d(490), to test for a causal link between IMIP expansion and nearshore turbidity change. A consensus structural breakpoint, a significant posterior causal effect estimated against a Banda Sea counterfactual, and a distribution-free placebo rank test collectively establish that coastal water clarity deteriorated after the transition from initial nickel pig iron production to hyper-expansion of high-pressure acid leaching facilities for battery-grade nickel. Satellite-derived land cover analysis independently corroborates this timing, showing substantial built-area growth and concurrent tree cover loss within the IMIP footprint. The resulting euphotic zone shoaling occurs in oligotrophic waters supporting high marine biodiversity, where even moderate optical degradation may impair coral photosynthesis and compress depth-dependent reef habitat. These findings quantify a marine environmental cost absent from Indonesia's mineral downstreaming policy discourse and demonstrate a transferable, satellite-based quasi-experimental framework for causal impact assessment at coastal industrial sites in data-limited tropical settings.", 'score': 0, 'issue_id': 1479, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': '099bd0bdb949d633', 'authors': ['Sandy Hardian Susanto Herho', 'Alfita Puspa Handayani', 'Iwan Pramesti Anwar', 'Faruq Khadami', 'Karina Aprilia Sujatmiko', 'Doandy Yonathan Wibisono', 'Rusmawan Suwarman', 'Dasapta Erwin Irawan'], 'affiliations': ['Bandung Institute of Technology', 'Brierley Associates', 'Colorado School of Mines', 'State University of New York, Binghamton', 'University of California, Riverside'], 'pdf_title_img': 'assets/pdf/title_img/2603.07331.jpg', 'data': {'categories': [], 'emoji': '🛰️', 'ru': {'title': 'Спутниковая причинно-следственная оценка промышленного ущерба морской экосистеме', 'desc': 'Исследователи применили байесовский структурный анализ временных рядов (BSTS) для выявления причинно-следственной связи между расширением никелевого комплекса IMIP и деградацией прозрачности морской воды. Анализ многодесятилетних спутниковых данных об оптических свойствах воды выявил значительное ухудшение качества прибрежных вод после перехода к интенсивному производству никеля для батарей. Статистические тесты плацебо и анализ земного покрова подтвердили причинную связь между индустриализацией и деградацией морской среды. Предложенный спутниковый метод квазиэкспериментальной оценки воздействия может быть применен на других промышленных прибрежных объектах в регионах с ограниченными данными.'}, 'en': {'title': 'Assessing Environmental Impact of Nickel Processing Expansion in Indonesia', 'desc': "This paper investigates the environmental impact of the Indonesia Morowali Industrial Park's expansion on nearby marine ecosystems. Using Bayesian structural time-series (BSTS) methods, the authors analyze satellite data to establish a causal relationship between nickel processing activities and increased turbidity in coastal waters. The study finds that the growth of industrial facilities has led to a significant decline in water clarity, which can negatively affect marine life, particularly coral reefs. The research highlights the importance of assessing environmental costs in industrial policies and presents a novel approach for evaluating such impacts in regions with limited data."}, 'zh': {'title': '镍加工扩张与海洋环境恶化的因果关系', 'desc': '本文研究了印度尼西亚镍矿出口禁令对海洋环境的影响。通过使用贝叶斯结构时间序列（BSTS）因果推断方法，分析了卫星海洋颜色记录与镍加工厂扩张之间的因果关系。研究发现，镍加工厂的扩张导致近海水体浑浊度增加，影响了海洋生态系统的健康。该研究为评估热带地区沿海工业对海洋环境的影响提供了一种新的卫星基础的准实验框架。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        }

            window.history.pushState({}, '', newUrl);

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');

                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-13 15:36',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-13 15:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-13 15:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
