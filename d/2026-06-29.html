    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.22873', 'title': 'SingGuard: A Policy-Adaptive Multimodal LLM Guardrail with Dynamic Reasoning', 'url': 'https://huggingface.co/papers/2606.22873', 'abstract': 'Abstract SingGuard is a policy-adaptive multimodal guardrail system that evaluates safety in real-time conversations by dynamically applying natural-language rules through fast-to-slow reasoning modes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language models (VLMs) are increasingly deployed in consumer, medical, financial, and enterprise applications. This broad deployment expands the safety surface: risks can arise from multimodal question answering, assistant responses, and cross-modal composition, while moderation policies may vary across products, regions, and deployment stages. Most existing guardrails either rely on fixed taxonomies or target only a narrow set of interaction settings, which limits their adaptability when safety rules change at deployment time. We present SingGuard, a policy-adaptive multimodal guardrail model family for safety assessment in multimodal conversations. SingGuard treats the active policy as a runtime input: given natural-language rules, it checks the target content against the active policy rule by rule and predicts both the safety label and the triggered rule. To balance efficiency and interpretability, SingGuard supports fast, hybrid, and slow inference regimes along a fast-to-slow reasoning spectrum, ranging from direct safety judgments to policy-grounded deliberation. We further optimize this behavior with fast--slow decoupled reinforcement learning. We also introduce SingGuard-Bench, a multimodal guardrail benchmark with 56{,}340 examples spanning 80+ fine-grained risk types across multimodal QA, adversarial attack, and dynamic-rule evaluation settings, including cross-modal joint-risk cases where each modality is harmless in isolation but their composition implies unsafe intent. Across six benchmark families (35 datasets), SingGuard achieves state-of-the-art average F1 in every family. Dynamic-rule evaluation further shows improved policy-following accuracy from 0.6465 to 0.7415 under runtime policy shifts. Our code is available at https://github.com/inclusionAI/Sing-Guard.', 'score': 8, 'issue_id': 2522, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '24e898de0c5add80', 'authors': ['SingGuard Team'], 'affiliations': ['Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.22873.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#alignment', '#open_source', '#training', '#dataset', '#security', '#benchmark', '#rl'], 'emoji': '🛡️', 'ru': {'title': 'Политика как вход: адаптивная система контроля безопасности для мультимодальных моделей', 'desc': 'SingGuard — это адаптивная система защиты для мультимодальных моделей зрения и языка, которая оценивает безопасность контента в реальном времени, применяя естественно-языковые правила политики. Система поддерживает три режима вывода: быстрый прямой анализ, гибридный и медленный режим с подробной аргументацией, позволяя балансировать между скоростью и интерпретируемостью. Для обучения используется decoupled reinforcement learning, разделяющий оптимизацию быстрого и медленного путей рассуждения. Авторы представили большой бенчмарк SingGuard-Bench с более чем 56 тысячами примеров, включая сложные кросс-модальные случаи, где каждый модальный источник безопасен отдельно, но их комбинация опасна.'}, 'en': {'title': 'Dynamic Safety for Multimodal Conversations with SingGuard', 'desc': 'SingGuard is a novel multimodal guardrail system designed to ensure safety during real-time conversations by adapting to changing policies. It utilizes natural-language rules and operates on a spectrum of reasoning modes, from quick assessments to more thorough evaluations. This system addresses the limitations of existing guardrails, which often rely on fixed rules and cannot adapt to new safety requirements. By employing fast-slow decoupled reinforcement learning, SingGuard enhances its ability to evaluate safety dynamically, achieving top performance across various multimodal benchmarks.'}, 'zh': {'title': '动态适应的多模态安全防护系统', 'desc': 'SingGuard是一种政策自适应的多模态保护系统，能够实时评估对话中的安全性。它通过快速到慢速的推理模式，动态应用自然语言规则来进行安全评估。与现有的固定分类系统不同，SingGuard能够根据实时政策变化灵活调整，确保在多模态交互中保持安全。通过引入快速-慢速解耦强化学习，SingGuard在多个基准测试中实现了最先进的性能，显著提高了政策遵循的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.28128', 'title': 'PhysisForcing: Physics Reinforced World Simulator for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.28128', 'abstract': 'Abstract PhysisForcing enhances embodied video generation by enforcing physical consistency through pixel-level trajectory alignment and semantic-level relational alignment losses in a DiT-based framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generation models have emerged as a promising paradigm for embodied world simulation. However, both general-domain video generators and robot-specific data fine-tuned models can still produce physically implausible manipulations, including discontinuous motion trajectories and inconsistent robot-object interactions, which limits their reliability as world simulators. Through extensive experiments, we find that such physical instability mainly arises from two factors: deformation of moving objects and implausible spatio-temporal correlations among interacting entities, particularly during contact. Building on this observation, we propose PhysisForcing, a scalable training framework that strengthens physical consistency by focusing supervision on physics-informative regions through joint optimization of pixel-level and semantic-level features. The framework consists of a pixel-level trajectory alignment loss, which supervises DiT features using reference point trajectories, and a semantic-level relational alignment loss, which aligns DiT features with inter-region relations extracted from a frozen video understanding encoder. Extensive experiments on R-Bench, PAI-Bench, and EZS-Bench show that PhysisForcing consistently improves embodied video generation over strong baselines, improving the Wan2.2-I2V-A14B and Cosmos3-Nano base models on R-Bench by 22.3\\% and 9.2\\% (7.1\\% and 3.7\\% over vanilla finetuning), with the Cosmos3-Nano variant attaining the best overall score. Beyond generation, as a world model under the WorldArena action-planner protocol it raises the closed-loop success rate from 16.0\\% to 24.0\\% and further improves downstream policy success, indicating that physically aligned video models yield stronger representations for robotic manipulation.', 'score': 3, 'issue_id': 2522, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '7b2c8a6e0318d8c1', 'authors': ['Peiwen Zhang', 'Yufan Deng', 'Shangkun Sun', 'Juncheng Ma', 'Duomin Wang', 'Jonas Du', 'Zilin Pan', 'Ye Huang', 'Hao Liang', 'Songyan Huang', 'Ruihua Zhang', 'Enze Xie', 'Ming-Yu Liu', 'Daquan Zhou'], 'affiliations': ['NVIDIA', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28128.jpg', 'data': {'categories': ['#robotics', '#video', '#training', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Физическая согласованность в видеогенерации для роботики через выравнивание траекторий и отношений', 'desc': 'PhysisForcing — это метод обучения для улучшения генерации видео с роботами, который обеспечивает физическую согласованность через два типа потерь: выравнивание траекторий объектов на уровне пикселей и выравнивание отношений между регионами на семантическом уровне. Авторы выявили, что основные проблемы в генерируемых видео возникают из-за деформации движущихся объектов и неправдоподобных пространственно-временных корреляций при взаимодействии робота и объектов. Предложенный framework использует DiT-архитектуру и применяет точечные потери только к физически информативным регионам видео для более эффективного обучения. Экспериментальные результаты демонстрируют значительные улучшения в качестве генерации и повышение успешности выполнения роботами манипуляционных задач в закрытом цикле обратной связи.'}, 'en': {'title': 'Enhancing Video Generation with Physical Consistency', 'desc': 'The paper introduces PhysisForcing, a training framework designed to enhance the physical consistency of video generation models used in embodied simulations. It addresses issues like unrealistic motion trajectories and inconsistent interactions between robots and objects by implementing pixel-level and semantic-level alignment losses. By focusing on physics-informative regions, the framework improves the reliability of generated videos, leading to better performance in robotic manipulation tasks. Experimental results demonstrate significant improvements in embodied video generation metrics and success rates in action-planning scenarios.'}, 'zh': {'title': '物理一致性提升视频生成的可靠性', 'desc': 'PhysisForcing 是一种增强视频生成的框架，通过像素级轨迹对齐和语义级关系对齐损失来强化物理一致性。该方法解决了视频生成模型在物体运动和机器人与物体交互中的物理不合理性问题。通过对物理信息区域的联合优化，PhysisForcing 提高了生成视频的可靠性和稳定性。实验结果表明，该框架在多个基准测试中显著提升了视频生成的效果，尤其在机器人操作任务中表现出更强的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.27595', 'title': 'Ko-WideSearch: A Korean Breadth-Search Benchmark for Exhaustive Set Enumeration by Web Agents', 'url': 'https://huggingface.co/papers/2606.27595', 'abstract': "Abstract A Korean web-agent benchmark evaluates breadth of search capabilities by requiring complete enumeration of entity memberships with attribute tables, revealing consistent failures in row recovery despite accurate set identification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Web-agent benchmarks overwhelmingly measure depth -- pinning one obscure answer behind a chain of constraints -- while breadth, exhaustively enumerating a closed set and filling each item's attributes, is barely evaluated, especially outside English. Breadth is also hard to build: certifying that a gold set is complete and every cell correct is far costlier than checking a single answer. I introduce Ko-WideSearch, a Korean breadth-search benchmark built by an automated synthesize-and-verify pipeline. Each task names a set-parent entity -- a TV season, a dynasty, a league, an administrative region, an election -- and asks for its full membership plus a per-item attribute table, graded by Item-, Column-, and Row-F1. It spans 228 tables over 190 entities and sixteen categories across three difficulty tiers, set by two structural knobs I dial independently -- table width and a 2-D composite key -- so cross-product membership climbs from 0\\% to 100\\% across the tiers. A single normalization-aware comparator is shared between gold construction and grading, so stable date and count columns are not over-dropped on formatting alone. Across twenty web agents, the failure is consistent: agents recover the set but not the rows (e.g.\\ Item-F1 92.8 against Row-F1 53.7), accuracy falls steadily as the knobs harden, and neither more search nor more spend closes the gap. Broken down by cell, the hard part is finding the right value, not formatting it: open-ended free-text cells fail most, while cells with a standard answer such as a date or a name usually come out right.", 'score': 1, 'issue_id': 2522, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '61ae367191bc64c7', 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.27595.jpg', 'data': {'categories': ['#agents', '#dataset', '#multilingual', '#benchmark', '#synthetic', '#low_resource'], 'emoji': '📊', 'ru': {'title': 'Агенты находят множество, но теряют детали: почему широкий поиск сложнее узкого', 'desc': 'В статье представлен Ko-WideSearch — корейский бенчмарк для оценки способности веб-агентов выполнять задачи поиска в ширину, то есть полного перечисления членства в сущностях с заполнением таблиц атрибутов. Авторы показывают, что современные веб-агенты успешно определяют нужное множество сущностей (Item-F1 92.8), но систематически ошибаются при заполнении строк таблиц (Row-F1 53.7), особенно для открытых текстовых полей. Бенчмарк содержит 228 таблиц с тремя уровнями сложности, контролируемыми структурными параметрами ширины таблицы и сложности композитного ключа. Исследование демонстрирует, что основная сложность для агентов заключается в поиске правильного значения, а не в его форматировании.'}, 'en': {'title': 'Ko-WideSearch: Enhancing Breadth in Web-Agent Evaluation', 'desc': 'This paper introduces Ko-WideSearch, a benchmark designed to evaluate the breadth of search capabilities in web agents, particularly in the Korean language. It highlights the challenges of ensuring complete enumeration of entity memberships and accurate attribute tables, revealing that many agents struggle with row recovery despite identifying sets correctly. The benchmark consists of 228 tables across various entities and categories, with tasks that require both set identification and detailed attribute extraction. The findings indicate that while agents perform well in identifying sets, they consistently fail to recover detailed row information, especially in open-ended text fields.'}, 'zh': {'title': '评估韩语广度搜索能力的新基准测试', 'desc': '这篇论文介绍了一个名为Ko-WideSearch的基准测试，旨在评估韩语环境下的广度搜索能力。该基准测试要求全面列举实体的成员及其属性表，尽管在集合识别上表现良好，但在行恢复方面存在一致性失败。研究表明，构建完整的金标准集合和验证每个单元的正确性比检查单个答案要昂贵得多。通过对二十个网络代理的测试，发现它们在恢复集合时表现良好，但在行的准确性上却显著下降。'}}}, {'id': 'https://huggingface.co/papers/2606.27608', 'title': 'Qwen-Image-2.0-RL Technical Report', 'url': 'https://huggingface.co/papers/2606.27608', 'abstract': 'Abstract A reinforcement learning and on-policy distillation approach enhances the visual quality and instruction-following capabilities of a diffusion model for image generation and editing tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Qwen-Image-2.0-RL, a post-training pipeline that applies reinforcement learning from human feedback (RLHF) and on-policy distillation (OPD) to improve both the visual quality and instruction-following capability of the Qwen-Image-2.0 diffusion model. To provide reliable reward signals, we construct task-specific composite reward models by fine-tuning vision-language models with a pointwise scoring paradigm and chain-of-thought reasoning. For text-to-image generation, the reward models cover alignment, aesthetics, and portrait fidelity dimensions. For image editing tasks, the reward system addresses instruction-following accuracy and face identity preservation. Building on this reward system, we develop a scalable GRPO-based RL training framework, incorporating a hybrid classifier-free guidance (CFG) strategy to preserve pre-trained knowledge, prompt curation via intra-group reward range filtering, and per-category reward weight calibration. To merge the task-specialized RL policies for T2I and editing, we propose on-policy distillation as the final training stage, which consolidates multiple teachers into a single student model through trajectory-level velocity matching. Extensive evaluation shows that Qwen-Image-2.0-RL achieves 57.84 overall score on Qwen-Image-Bench (+2.61 over the base model), Elo ratings of 1193 in text-to-image arena (+78) and 1349 in image edit arena (+93), demonstrating consistent gains in aesthetic quality, prompt adherence, and editing accuracy.', 'score': 1, 'issue_id': 2522, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '87f35e31f4427bf6', 'authors': ['Yixian Xu', 'Kaiyuan Gao', 'Yuxiang Chen', 'Yilei Chen', 'Zecheng Tang', 'Zihao Liu', 'Zikai Zhou', 'Deqing Li', 'Hao Meng', 'Kuan Cao', 'Jiahao Li', 'Jie Zhang', 'Liang Peng', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiaoyue Chen', 'Yan Shu', 'Yanran Zhang', 'Yi Wang', 'Yu Wu', 'Yujia Wu', 'Zekai Zhang', 'Zhendong Wang', 'Xiao Xu', 'Kun Yan', 'Chenfei Wu'], 'affiliations': ['https://qwen.ai'], 'pdf_title_img': 'assets/pdf/title_img/2606.27608.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#alignment', '#training', '#diffusion', '#cv', '#benchmark', '#rl', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Обучение с подкреплением для совершенствования диффузионных моделей генерации изображений', 'desc': 'В работе представлена методика улучшения диффузионной модели для генерации и редактирования изображений с помощью обучения с подкреплением на основе обратной связи от человека (RLHF) и дистилляции on-policy. Авторы построили комплексные модели вознаграждения на основе видео-языковых моделей, которые оценивают соответствие инструкциям, эстетику и идентичность лиц. Для обучения была разработана масштабируемая система GRPO, включающая гибридное управление без классификатора (CFG) и калибровку весов вознаграждения по категориям. На финальном этапе используется дистилляция on-policy для объединения нескольких специализированных моделей в одну, что обеспечивает значительное улучшение качества генерации и редактирования изображений.'}, 'en': {'title': 'Enhancing Image Generation with Reinforcement Learning and Distillation', 'desc': 'This paper introduces Qwen-Image-2.0-RL, a model that uses reinforcement learning from human feedback (RLHF) and on-policy distillation (OPD) to enhance image generation and editing. The model improves visual quality and the ability to follow instructions by utilizing task-specific reward models that evaluate alignment, aesthetics, and fidelity. A scalable training framework is developed, which includes a hybrid classifier-free guidance strategy to maintain pre-trained knowledge and optimize reward signals. The results show significant improvements in performance metrics, indicating better aesthetic quality and adherence to prompts in both text-to-image generation and image editing tasks.'}, 'zh': {'title': '强化学习提升图像生成与编辑能力', 'desc': '这篇论文介绍了一种强化学习和在线策略蒸馏的方法，旨在提高扩散模型在图像生成和编辑任务中的视觉质量和指令遵循能力。我们提出的Qwen-Image-2.0-RL通过人类反馈的强化学习（RLHF）和在线策略蒸馏（OPD）来优化模型性能。为了提供可靠的奖励信号，我们构建了任务特定的复合奖励模型，并通过微调视觉语言模型来实现。经过广泛评估，Qwen-Image-2.0-RL在多个指标上均表现出显著提升，证明了其在美学质量和指令遵循方面的优势。'}}}, {'id': 'https://huggingface.co/papers/2606.27378', 'title': 'Formalizing Latent Thoughts: Four Axioms of Thought Representation in LLMs', 'url': 'https://huggingface.co/papers/2606.27378', 'abstract': 'Abstract An axiomatic evaluation framework reveals systematic failures in latent thought representations of LLMs across multiple reasoning tasks, demonstrating that current representations fail to satisfy fundamental functional axioms consistently across different model architectures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce an axiomatic evaluation framework for latent thought representations in LLMs, comprising metrics that are independent of downstream benchmark scores and reveal representational failures that benchmark accuracy masks. Existing evaluations conflate representation quality with model capacity. Therefore, failures cannot be attributed to the representation rather than to the model that processes it. We formalize four functional axioms (Causality, Minimality, Separability, and Stability) and define a quantitative measure for each, computed directly on the representation independently of downstream accuracy. We audit open-weight LLMs across 23 reasoning tasks (e.g., Spatial Reasoning, Factual QA). We find that no candidate satisfies all four axioms simultaneously, that the representations distinguish task type reliably but cannot distinguish between two questions within the same task, and that the representations encode little information beyond what is already present in the input embedding. The failure is consistent across dense, reasoning-distilled, and RL-trained model families, indicating that the gap is structural rather than a property of model size or training procedure.', 'score': 1, 'issue_id': 2522, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '9c6271426211040d', 'authors': ['Fahd Seddik', 'Fatemeh Fard'], 'affiliations': ['University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2606.27378.jpg', 'data': {'categories': ['#interpretability', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Скрытые представления LLM не соответствуют фундаментальным аксиомам рассуждения', 'desc': 'В работе предложена аксиоматическая система оценки скрытых представлений рассуждений в LLM, которая выявляет фундаментальные проблемы в их структуре. Авторы формализовали четыре функциональных аксиомы (причинность, минимальность, разделимость и стабильность) и определили независимые от downstream метрик для их измерения. Обширный аудит показал, что ни одна модель не удовлетворяет всем аксиомам одновременно, и представления содержат мало информации сверх того, что уже присутствует во входных эмбеддингах. Обнаруженные проблемы характерны для всех архитектур моделей и не зависят от размера или методов обучения.'}, 'en': {'title': 'Unveiling Structural Flaws in LLM Thought Representations', 'desc': 'This paper introduces a new framework to evaluate the internal thought processes of large language models (LLMs) using specific functional axioms. The authors identify that current evaluations often confuse the quality of representations with the overall capacity of the models, leading to misleading conclusions. They formalize four key axioms—Causality, Minimality, Separability, and Stability—and measure how well LLMs adhere to these principles across various reasoning tasks. The findings reveal that no model meets all axioms, indicating fundamental issues in how these models represent information, regardless of their size or training methods.'}, 'zh': {'title': '揭示大型语言模型的潜在思维缺陷', 'desc': '本文提出了一种公理化评估框架，用于评估大型语言模型（LLMs）中的潜在思维表示。该框架通过独立于下游基准分数的指标，揭示了当前表示在多个推理任务中存在的系统性缺陷。研究发现，现有评估方法将表示质量与模型能力混淆，导致无法准确归因于表示本身的失败。通过对23个推理任务的审计，发现没有模型能够同时满足四个功能公理，且表示在同一任务内无法区分不同问题。'}}}, {'id': 'https://huggingface.co/papers/2606.27771', 'title': 'NormGuard: Reward-Preserving Norm Constraints in Flow-Matching Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.27771', 'abstract': 'Abstract Reinforcement learning post-training degrades perceptual quality in flow-based generators through velocity norm inflation, which requires training-time intervention rather than inference-time corrections to maintain both reward alignment and image quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) post-training improves the reward alignment of flow-based generators, but often degrades perceptual quality in ways that are not captured by the reward proxy. We identify a simple structural signature of this drift: across three post-training methods (NFT, AWM, DPO), RL fine-tuning inflates the per-step velocity norm |v_θ| by 5% to 15% relative to the reference. A form of norm inflation has been studied in classifier-free guidance (CFG), where rescaling the velocity back to a reference norm at inference time can mitigate the resulting artifacts. However, this inference-time correction does not transfer cleanly to RL: rescaling v_θ to match |v_{ref}| at inference time neither improves reward nor fixes the quality degradation, because the inflation is co-adapted into the model weights. Furthermore, an adjoint sensitivity analysis shows that velocity magnitude rescaling carries no coherent first-order reward signal at the batch level, indicating that suppressing norm inflation is unlikely to remove a consistently reward-carrying component. Since inference-time renormalization fails while norm suppression carries no reward cost, training-time intervention is the appropriate strategy. Together, these findings motivate \\methodname, a hinge penalty that activates only when |v_θ| exceeds |v_{ref}| and composes additively with any velocity-local base loss. Across two base models, three post-training methods, and two reward proxies, \\methodname consistently improves MLLM-judged image quality and forensic realism while preserving reward, with gains that amplify under few-step inference and are not explained by early stopping.', 'score': 0, 'issue_id': 2522, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '594812cf5e61271a', 'authors': ['Tianlin Pan', 'Lianyu Pang', 'Cheng Da', 'Huan Yang', 'Changqian Yu', 'Kun Gai', 'Wenhan Luo'], 'affiliations': ['Kuaishou Technology', 'The Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.27771.jpg', 'data': {'categories': ['#rl', '#training', '#rlhf'], 'emoji': '⚙️', 'ru': {'title': 'Обуздание инфляции нормы скорости: контроль качества при обучении генераторов с подкреплением', 'desc': 'В работе исследуется проблема деградации качества изображений при обучении потоковых генераторов с подкреплением. Авторы выявили, что причиной артефактов является инфляция нормы скорости потока на 5-15% относительно исходной модели во всех методах обучения с подкреплением. Показано, что коррекция на этапе инференса неэффективна, так как инфляция встроена в веса модели, поэтому необходимо вмешательство именно во время обучения. Предложен метод с хингевым штрафом, который активируется только при превышении нормы скорости и сохраняет как качество изображений, так и выравнивание по награде.'}, 'en': {'title': 'Training-Time Solutions for Better Image Quality in RL', 'desc': 'This paper discusses the challenges of using reinforcement learning (RL) for post-training flow-based generators, where the perceptual quality of generated images can degrade due to velocity norm inflation. The authors identify that this inflation occurs during RL fine-tuning, leading to a 5% to 15% increase in the per-step velocity norm compared to a reference norm. They argue that traditional inference-time corrections, like rescaling the velocity, do not effectively address the quality issues because the inflation is embedded in the model weights. To tackle this, they propose a training-time intervention method called \textit{methodname}, which applies a hinge penalty to control the velocity norm, resulting in improved image quality and reward alignment without sacrificing performance.'}, 'zh': {'title': '强化学习中的速度范数干预策略', 'desc': '这篇论文探讨了强化学习（RL）在流生成器后期训练中的影响，发现其会导致感知质量下降。研究表明，后期训练方法（如NFT、AWM、DPO）会使每步速度范数膨胀5%到15%。虽然在推理时进行速度重标定可以减轻一些伪影，但这种方法在RL中并不有效，因此需要在训练阶段进行干预。论文提出了一种新的方法，通过在速度范数超过参考值时激活惩罚，来改善图像质量和奖励对齐。'}}}, {'id': 'https://huggingface.co/papers/2606.28277', 'title': "Towards Automating Scientific Review with Google's Paper Assistant Tool", 'url': 'https://huggingface.co/papers/2606.28277', 'abstract': 'Abstract AI-assisted scientific review systems like PAT use advanced inference scaling to identify mathematical errors and improve research quality while maintaining human oversight.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Artificial intelligence is driving a revolution in scientific discovery, accelerating everything from hypothesis generation to mathematical theorem proving. However, this rapid acceleration is creating a systemic challenge: traditional human peer review cannot scale to match the influx of AI-assisted science. Ultimately, to resolve this tension, we must also deploy AI to accelerate the verification and review process itself. To frame the discussion around this transition, we propose a taxonomy consisting of four progressive levels of AI-human collaboration in scientific evaluation, and discuss various trade-offs involved with each.   As a step toward this future, we introduce the Paper Assistant Tool (PAT), an agentic AI framework built for deep scientific review and verification. PAT ingests full scientific manuscripts and produces a comprehensive evaluation, checking theoretical results, validating experiments, suggesting improvements, and identifying potential flaws. By utilizing inference scaling techniques, PAT is able to identify deeper issues than a single model call alone, achieving a 34% improvement over zero-shot recall on mathematical errors in the SPOT benchmark. Pilot deployments of PAT as a pre-submission tool for authors at two major Computer Science conferences -- STOC and ICML -- demonstrate its ability to identify critical errors and suggest substantive improvements to research papers. By catching errors early, PAT eases the cognitive burden placed on referees, while preserving their control over the outcomes of the review process.', 'score': 0, 'issue_id': 2522, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '113a6fbf447efd17', 'authors': ['Rajesh Jayaram', 'Drew Tyler', 'David Woodruff', 'Corinna Cortes', 'Yossi Matias', 'Vahab Mirrokni', 'Vincent Cohen-Addad'], 'affiliations': ['Carnegie Mellon University, USA', 'Google Research, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.28277.jpg', 'data': {'categories': ['#inference', '#benchmark', '#math', '#agents'], 'emoji': '🔍', 'ru': {'title': 'AI-помощник для научного рецензирования: масштабирование вычислений в служении качеству исследований', 'desc': 'В статье представлена система PAT (Paper Assistant Tool) — агентный AI инструмент для глубокого анализа научных статей, который использует технику масштабирования вычислений для выявления математических ошибок и проверки экспериментальных результатов. Авторы предлагают таксономию четырёх уровней сотрудничества между AI и человеком при оценке научных работ, признавая, что традиционный peer review не может масштабироваться в условиях роста AI-ассистированной науки. PAT демонстрирует 34% улучшение в обнаружении математических ошибок по сравнению с однократным вызовом модели и успешно используется как инструмент предварительной проверки на конференциях STOC и ICML. Система снижает когнитивную нагрузку на рецензентов, сохраняя при этом их контроль над процессом рецензирования и выполняя роль моста между возрастающим объёмом AI-генерируемых исследований и ограниченными человеческими ресурсами.'}, 'en': {'title': 'Enhancing Scientific Review with AI: The Future of Peer Evaluation', 'desc': 'This paper discusses the development of the Paper Assistant Tool (PAT), an AI system designed to enhance the scientific review process. PAT uses advanced inference scaling to analyze full scientific manuscripts, checking for mathematical errors, validating experiments, and suggesting improvements. The authors propose a framework for AI-human collaboration in scientific evaluation, highlighting the need for AI to assist in peer review due to the increasing volume of AI-generated research. Pilot tests show that PAT significantly improves error detection, thereby reducing the workload for human referees while allowing them to maintain oversight.'}, 'zh': {'title': 'AI助力科学审查，提升研究质量', 'desc': '这篇论文介绍了一种名为PAT的AI辅助科学审查系统，它利用先进的推理扩展技术来识别数学错误并提高研究质量，同时保持人类的监督。随着人工智能在科学发现中的应用加速，传统的人类同行评审无法跟上AI辅助科学的快速发展。为了解决这一问题，论文提出了一个四级的AI与人类合作的分类法，并讨论了每个级别的权衡。PAT作为一个深度科学审查和验证的框架，能够全面评估科学论文，识别关键错误并提出改进建议，从而减轻审稿人的认知负担。'}}}, {'id': 'https://huggingface.co/papers/2606.28276', 'title': 'SimFoundry: Modular and Automated Scene Generation for Policy Learning and Evaluation', 'url': 'https://huggingface.co/papers/2606.28276', 'abstract': 'Abstract SimFoundry enables zero-shot real-world robot policy training through automated simulation construction and diverse scene variations that improve generalization and performance prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training and evaluating robot policies in the real world is costly and difficult to scale. We introduce SimFoundry, a modular and automated system for zero-shot real-to-sim scene construction from a video. SimFoundry generates sim-ready digital twins and supports object, scene, and task editing, enabling the automated generation of diverse digital cousins: affordance-preserving variations of reconstructed real-world scenes. Policies trained on SimFoundry data transfer zero-shot to challenging real tasks involving multi-step manipulation, articulated object interaction, and bimanual interaction, and its digital cousins (variations of the original scene, objects, and tasks) facilitate generalization to new real-world conditions. Across 7 manipulation tasks and 5 policy architectures, SimFoundry simulation evaluations strongly predict real-world performance, with mean Pearson correlation 0.911 and mean maximum ranking violation 0.018. When evaluating sim-trained policies zero-shot in the real world, policies trained with object, scene, and task cousins in simulation show average task success rate improvements of 17%, 21%, and 40%, respectively. Additional details at https://research.nvidia.com/labs/gear/simfoundry/ .', 'score': 0, 'issue_id': 2522, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'bdb23848f5981002', 'authors': ['Nadun Ranawaka', 'Josiah Wong', 'Wei-Lin Pai', 'Wei-Teng Chu', 'Tianyuan Dai', 'Masoud Moghani', 'Hang Yin', 'Yunfan Jiang', 'Wesley Durbano', 'Brandon Huynh', 'Yu Fang', 'Linxi Fan', 'Danfei Xu', 'Ruohan Zhang', 'Li Fei-Fei', 'Bowen Wen', 'Ajay Mandlekar', 'Yuke Zhu'], 'affiliations': ['Georgia Institute of Technology', 'NVIDIA', 'Stanford University', 'The University of Texas at Austin', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2606.28276.jpg', 'data': {'categories': ['#robotics', '#training', '#3d'], 'emoji': '🤖', 'ru': {'title': 'От видео к политике: автоматическая симуляция для безшумного трансфера робототехники', 'desc': 'SimFoundry — это модульная система для автоматического создания симуляций на основе видео реальных робототехнических сцен. Система генерирует цифровые двойники и позволяет автоматически создавать разнообразные вариации сцен, объектов и задач, сохраняя их функциональные свойства. Политики, обученные на данных SimFoundry, демонстрируют нулевую трансферизацию на сложные реальные задачи манипуляции без дополнительной адаптации. Оценки производительности в симуляции сильно коррелируют с результатами в реальном мире (корреляция Пирсона 0.911), а использование различных вариаций объектов и сцен улучшает успешность выполнения задач на 17-40 процентов.'}, 'en': {'title': 'Zero-Shot Learning for Robots with SimFoundry', 'desc': 'SimFoundry is a system that allows robots to learn how to perform tasks in the real world without needing extensive real-world training. It creates simulations from videos, generating digital twins of real environments that can be easily modified. This system helps robots generalize their learning to new situations by providing variations of the original scenes and tasks. The results show that robots trained using SimFoundry perform significantly better in real-world tasks, demonstrating strong predictive capabilities for their performance.'}, 'zh': {'title': 'SimFoundry：实现零-shot 机器人策略训练的自动化系统', 'desc': 'SimFoundry 是一个自动化系统，能够通过视频构建零-shot 的真实到模拟场景。它生成适合模拟的数字双胞胎，并支持对象、场景和任务的编辑，从而自动生成多样化的数字变体。这些变体保留了重建真实场景的特性，使得在复杂的真实任务中进行多步骤操作和双手交互的策略能够有效迁移。通过在七个操作任务和五种策略架构上的评估，SimFoundry 的模拟结果能够强有力地预测真实世界的表现。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (2)', '#agi', '#alignment (2)', '#architecture', '#audio', '#benchmark (5)', '#cv (1)', '#data', '#dataset (2)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability (2)', '#leakage', '#long_context', '#low_resource (1)', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (2)', '#open_source (1)', '#optimization (1)', '#plp', '#rag', '#reasoning (1)', '#rl (3)', '#rlhf (2)', '#robotics (2)', '#science', '#security (1)', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (5)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-29 02:41',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-29 02:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-29 02:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
