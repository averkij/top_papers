    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.12500', 'title': 'SenseNova-U1: Unifying Multimodal Understanding and Generation with NEO-unify Architecture', 'url': 'https://huggingface.co/papers/2605.12500', 'abstract': 'Abstract Unified vision-language models treat understanding and generation as integrated processes rather than separate tasks, demonstrating strong performance across multiple multimodal capabilities including image synthesis and action reasoning.  AI-generated summary Recent large vision-language models (VLMs) remain fundamentally constrained by a persistent dichotomy: understanding and generation are treated as distinct problems, leading to fragmented architectures, cascaded pipelines, and misaligned representation spaces. We argue that this divide is not merely an engineering artifact, but a structural limitation that hinders the emergence of native multimodal intelligence. Hence, we introduce SenseNova-U1, a native unified multimodal paradigm built upon NEO-unify, in which understanding and generation evolve as synergistic views of a single underlying process. We launch two native unified variants, SenseNova-U1-8B-MoT and SenseNova-U1-A3B-MoT, built on dense (8B) and mixture-of-experts (30B-A3B) understanding baselines, respectively. Designed from first principles, they rival top-tier understanding-only VLMs across text understanding, vision-language perception, knowledge reasoning, agentic decision-making, and spatial intelligence. Meanwhile, they deliver strong semantic consistency and visual fidelity, excelling in conventional or knowledge-intensive any-to-image (X2I) synthesis, complex text-rich infographic generation, and interleaved vision-language generation, with or without think patterns. Beyond performance, we show detailed model design, data preprocessing, pre-/post-training, and inference strategies to support community research. Last but not least, preliminary evidence demonstrates that our models extend beyond perception and generation, performing strongly in vision-language-action (VLA) and world model (WM) scenarios. This points toward a broader roadmap where models do not translate between modalities, but think and act across them in a native manner. Multimodal AI is no longer about connecting separate systems, but about building a unified one and trusting the necessary capabilities to emerge from within.', 'score': 116, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '9ee52c88c817cc5e', 'authors': ['Haiwen Diao', 'Penghao Wu', 'Hanming Deng', 'Jiahao Wang', 'Shihao Bai', 'Silei Wu', 'Weichen Fan', 'Wenjie Ye', 'Wenwen Tong', 'Xiangyu Fan', 'Yan Li', 'Yubo Wang', 'Zhijie Cao', 'Zhiqian Lin', 'Zhitao Yang', 'Zhongang Cai', 'Yuwei Niu', 'Yue Zhu', 'Bo Liu', 'Chengguang Lv', 'Haojia Yu', 'Haozhe Xie', 'Hongli Wang', 'Jianan Fan', 'Jiaqi Li', 'Jiefan Lu', 'Jingcheng Ni', 'Junxiang Xu', 'Kaihuan Liang', 'Lianqiang Shi', 'Linjun Dai', 'Linyan Wang', 'Oscar Qian', 'Peng Gao', 'Pengfei Liu', 'Qingping Sun', 'Rui Shen', 'Ruisi Wang', 'Shengnan Ma', 'Shuang Yang', 'Siyi Xie', 'Siying Li', 'Tianbo Zhong', 'Xiangli Kong', 'Xuanke Shi', 'Yang Gao', 'Yongqiang Yao', 'Yves Wang', 'Zhengqi Bai', 'Zhengyu Lin', 'Zixin Yin', 'Wenxiu Sun', 'Ruihao Gong', 'Quan Wang', 'Lewei Lu', 'Lei Yang', 'Ziwei Liu', 'Dahua Lin'], 'affiliations': ['OpenSenseNova'], 'pdf_title_img': 'assets/pdf/title_img/2605.12500.jpg', 'data': {'categories': ['#architecture', '#open_source', '#multimodal', '#training', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная система: от перевода модальностей к синергическому мышлению', 'desc': 'В статье представлена единая архитектура видео-языковой модели SenseNova-U1, которая объединяет понимание и генерацию изображений как синергические процессы вместо отдельных задач. Модель построена на основе NEO-unify парадигмы в двух вариантах: с плотной архитектурой (8B параметров) и с механизмом смеси экспертов (30B параметров). Система демонстрирует сильные результаты как в классических задачах понимания визуально-языковой информации и рассуждений, так и в синтезе изображений, генерации инфографики и решении агентских задач. Авторы показывают, что единый подход к обработке мультимодальных данных позволяет моделям естественным образом мыслить и действовать в разных модальностях без прямого трансляции между ними.'}, 'en': {'title': 'Unifying Understanding and Generation for Multimodal Intelligence', 'desc': 'This paper introduces SenseNova-U1, a unified vision-language model that integrates understanding and generation into a single process, overcoming the limitations of traditional models that treat these tasks separately. By utilizing a novel architecture called NEO-unify, the model achieves strong performance in various multimodal tasks, including image synthesis and reasoning. The authors present two variants of the model, demonstrating its capabilities in text understanding, visual perception, and decision-making, while maintaining high semantic consistency and visual quality. The research emphasizes the importance of a unified approach in developing advanced multimodal AI that can think and act across different modalities without relying on separate systems.'}, 'zh': {'title': '统一多模态智能的未来', 'desc': '这篇论文介绍了一种新的统一视觉-语言模型SenseNova-U1，它将理解和生成视为一个整体过程，而不是分开的任务。这种方法克服了传统模型在理解和生成之间的结构性限制，促进了多模态智能的自然发展。SenseNova-U1在文本理解、视觉-语言感知和知识推理等多个领域表现出色，并在图像合成和复杂信息图生成中展现了强大的语义一致性和视觉保真度。该模型的设计和训练策略为社区研究提供了详细的支持，展示了多模态AI的未来发展方向。'}}}, {'id': 'https://huggingface.co/papers/2605.09530', 'title': 'MemPrivacy: Privacy-Preserving Personalized Memory Management for Edge-Cloud Agents', 'url': 'https://huggingface.co/papers/2605.09530', 'abstract': 'Abstract MemPrivacy enables privacy-preserving personalized memory in edge-cloud environments by using type-aware placeholders to protect sensitive data while maintaining semantic integrity for effective memory operations.  AI-generated summary As LLM-powered agents are increasingly deployed in edge-cloud environments, personalized memory has become a key enabler of long-term adaptation and user-centric interaction. However, cloud-assisted memory management exposes sensitive user information, while existing privacy protection methods typically rely on aggressive masking that removes task-relevant semantics and consequently degrades memory utility and personalization quality. To address this challenge, We propose MemPrivacy, which identifies privacy-sensitive spans on edge devices, replaces them with semantically structured type-aware placeholders for cloud-side memory processing, and restores the original values locally when needed. By decoupling privacy protection from semantic destruction, MemPrivacy minimizes sensitive data exposure while retaining the information required for effective memory formation and retrieval. We also construct MemPrivacy-Bench for systematic evaluation, a dataset covering 200 users and over 52k privacy instances, and introduce a four-level privacy taxonomy for configurable protection policies. Experiments show that MemPrivacy achieves strong performance in privacy information extraction, substantially surpassing strong general-purpose models such as GPT-5.2 and Gemini-3.1-Pro, while also reducing inference latency. Across multiple widely used memory systems, MemPrivacy limits utility loss to within 1.6%, outperforming baseline masking strategies. Overall, MemPrivacy offers an effective balance between privacy protection and personalized memory utility for edge-cloud agents, enabling secure, practical, and user-transparent deployment.', 'score': 90, 'issue_id': 2213, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': 'cade3cc6346942d4', 'authors': ['Yining Chen', 'Jihao Zhao', 'Bo Tang', 'Haofen Wang', 'Yue Zhang', 'Fei Huang', 'Feiyu Xiong', 'Zhiyu Li'], 'affiliations': ['HONOR Device Co., Ltd.', 'MemTensor (Shanghai) Technology Co., Ltd.', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09530.jpg', 'data': {'categories': ['#inference', '#benchmark', '#agents', '#dataset', '#leakage', '#security'], 'emoji': '🔐', 'ru': {'title': 'Защита приватности без потери смысла в памяти агентов', 'desc': 'MemPrivacy — это система для защиты приватных данных в персонализированной памяти LLM-агентов, развёрнутых в гибридных окружениях edge-cloud. Вместо агрессивного маскирования, которое разрушает семантику и снижает полезность памяти, метод заменяет чувствительные данные на типизированные плейсхолдеры, сохраняя семантическую целостность. Восстановление исходных значений происходит локально на edge-устройстве, что минимизирует утечку приватной информации в облако. Экспериментальная оценка показывает, что MemPrivacy достигает баланса между защитой данных и качеством персонализации с потерей полезности менее 1,6%.'}, 'en': {'title': 'Balancing Privacy and Memory Utility in Edge-Cloud Systems', 'desc': 'MemPrivacy is a novel approach designed to protect sensitive user data in edge-cloud environments while still allowing for personalized memory management. It uses type-aware placeholders to replace privacy-sensitive information, ensuring that the semantic meaning is preserved for effective memory operations. This method allows for the retrieval of original data locally, minimizing exposure of sensitive information without sacrificing memory utility. The proposed system has been evaluated using a comprehensive dataset and has shown to outperform existing privacy protection methods in both privacy extraction and memory performance.'}, 'zh': {'title': '隐私保护与个性化记忆的完美平衡', 'desc': 'MemPrivacy是一种在边缘云环境中实现隐私保护的个性化记忆的方法。它通过使用类型感知的占位符来保护敏感数据，同时保持语义完整性，以便有效地进行记忆操作。该方法能够在边缘设备上识别隐私敏感的内容，并在云端处理时用占位符替代，必要时再在本地恢复原始值。实验表明，MemPrivacy在隐私信息提取方面表现优异，同时在多个记忆系统中保持了较低的效用损失。'}}}, {'id': 'https://huggingface.co/papers/2605.12357', 'title': 'δ-mem: Efficient Online Memory for Large Language Models', 'url': 'https://huggingface.co/papers/2605.12357', 'abstract': "Abstract A lightweight memory mechanism called δ-mem enhances large language models by augmenting a frozen attention backbone with a compact associative memory state that provides low-rank corrections to attention computations.  AI-generated summary Large language models increasingly need to accumulate and reuse historical information in long-term assistants and agent systems. Simply expanding the context window is costly and often fails to ensure effective context utilization. We propose δ-mem, a lightweight memory mechanism that augments a frozen full-attention backbone with a compact online state of associative memory. δ-mem compresses past information into a fixed-size state matrix updated by delta-rule learning, and uses its readout to generate low-rank corrections to the backbone's attention computation during generation. With only an 8times8 online memory state, δ-mem improves the average score to 1.10times that of the frozen backbone and 1.15times that of the strongest non-δ-mem memory baseline. It achieves larger gains on memory-heavy benchmarks, reaching 1.31times on MemoryAgentBench and 1.20times on LoCoMo, while largely preserving general capabilities. These results show that effective memory can be realized through a compact online state directly coupled with attention computation, without full fine-tuning, backbone replacement, or explicit context extension.", 'score': 82, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd5aa685a8b4d3d08', 'authors': ['Jingdi Lei', 'Di Zhang', 'Junxian Li', 'Weida Wang', 'Kaixuan Fan', 'Xiang Liu', 'Qihan Liu', 'Xiaoteng Ma', 'Baian Chen', 'Soujanya Poria'], 'affiliations': ['Fudan University', 'Mind Lab', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.12357.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Компактная память для больших языковых моделей без переобучения', 'desc': 'В работе представлен δ-mem — лёгкий механизм памяти, который дополняет замороженную сеть внимания компактным состоянием ассоциативной памяти. Механизм сжимает историческую информацию в матрицу фиксированного размера (8×8), которая обновляется с помощью дельта-обучения, и использует её для генерации низкоранговых коррекций к вычислениям внимания. δ-mem не требует дополнительной настройки всей модели, замены архитектуры или расширения контекстного окна. Эксперименты показывают улучшение производительности в 1.10–1.31 раза на задачах, требующих долгосрочной памяти, при сохранении основных способностей модели.'}, 'en': {'title': 'Enhancing Language Models with Compact Memory Mechanism', 'desc': "The paper introduces δ-mem, a lightweight memory mechanism designed to enhance large language models by integrating a compact associative memory state with a frozen attention backbone. This mechanism allows the model to efficiently accumulate and utilize historical information without the need for costly context window expansions. δ-mem employs delta-rule learning to update a fixed-size state matrix, which provides low-rank corrections to the attention computations during text generation. The results demonstrate that δ-mem significantly improves performance on memory-intensive tasks while maintaining the model's overall capabilities."}, 'zh': {'title': '轻量级记忆机制δ-mem提升语言模型性能', 'desc': '本文提出了一种轻量级的记忆机制δ-mem，旨在增强大型语言模型的性能。它通过在固定的注意力骨干网络上增加一个紧凑的关联记忆状态，提供低秩修正来优化注意力计算。δ-mem将过去的信息压缩成一个固定大小的状态矩阵，并通过增量学习进行更新，从而在生成过程中对注意力计算进行修正。实验结果表明，δ-mem在内存密集型基准测试中表现出显著的性能提升，同时保持了模型的通用能力。'}}}, {'id': 'https://huggingface.co/papers/2605.10899', 'title': 'RubricEM: Meta-RL with Rubric-guided Policy Decomposition beyond Verifiable Rewards', 'url': 'https://huggingface.co/papers/2605.10899', 'abstract': 'Abstract Deep research agents trained using RubricEM framework demonstrate superior performance on long-form research tasks through rubric-guided reinforcement learning with stage-aware planning and reflection-based meta-policy evolution.  AI-generated summary Training deep research agents, namely systems that plan, search, evaluate evidence, and synthesize long-form reports, pushes reinforcement learning beyond the regime of verifiable rewards. Their outputs lack ground-truth answers, their trajectories span many tool-augmented decisions, and standard post-training offers little mechanism for turning past attempts into reusable experience. In this work, we argue that rubrics should serve not merely as final-answer evaluators, but as the shared interface that structures policy execution, judge feedback, and agent memory. Based on this view, we introduce RubricEM, a rubric-guided reinforcement learning framework that combines stagewise policy decomposition with reflection-based meta-policy evolution. RubricEM first makes research trajectories stage-aware by conditioning planning, evidence gathering, review, and synthesis on self-generated rubrics. It then assigns credit with Stage-Structured GRPO, which uses stagewise rubric judgments to provide denser semantic feedback for long-horizon optimization. In parallel, RubricEM trains a shared-backbone reflection meta-policy that distills judged trajectories into reusable rubric-grounded guidance for future attempts. The resulting RubricEM-8B achieves strong performance across four long-form research benchmarks, outperforming comparable open models and approaching proprietary deep-research systems. Beyond final performance, we perform thorough analyses to understand the key ingredients of RubricEM.', 'score': 57, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'a2191fbb6327650f', 'authors': ['Gaotang Li', 'Bhavana Dalvi Mishra', 'Zifeng Wang', 'Jun Yan', 'Yanfei Chen', 'Chun-Liang Li', 'Long T. Le', 'Rujun Han', 'George Lee', 'Hanghang Tong', 'Chen-Yu Lee', 'Tomas Pfister'], 'affiliations': ['Google Cloud AI Research', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.10899.jpg', 'data': {'categories': ['#benchmark', '#agents', '#optimization', '#rl', '#open_source', '#reasoning'], 'emoji': '🔬', 'ru': {'title': 'Рубрики как универсальный интерфейс для управления траекториями исследовательских агентов', 'desc': 'В работе представлена RubricEM — фреймворк для обучения глубоких исследовательских агентов на основе обучения с подкреплением, управляемого рубриками. Ключевая идея заключается в том, что рубрики должны структурировать не только финальную оценку, но и планирование, сбор доказательств и память агента на протяжении всей траектории. Фреймворк комбинирует разбиение политики по этапам с эволюцией мета-политики через рефлексию, обеспечивая более плотную семантическую обратную связь для оптимизации долгосрочных задач. Модель RubricEM-8B достигает сильных результатов на бенчмарках для создания длинных исследовательских текстов, превосходя открытые модели и приближаясь к коммерческим системам.'}, 'en': {'title': 'Empowering Research Agents with Rubric-Guided Learning', 'desc': 'This paper presents RubricEM, a framework for training deep research agents that excel in long-form research tasks using reinforcement learning. It emphasizes the importance of rubrics not just for evaluating final outputs, but as a guiding structure for the entire research process, including planning and evidence synthesis. The framework incorporates stage-aware planning and reflection-based meta-policy evolution to enhance learning from past experiences. The results show that RubricEM-8B significantly outperforms other models on long-form research benchmarks, demonstrating its effectiveness in optimizing complex research tasks.'}, 'zh': {'title': 'RubricEM：提升深度研究代理的强化学习框架', 'desc': '本论文介绍了一种名为RubricEM的框架，用于训练深度研究代理，以提高其在长篇研究任务中的表现。该框架通过基于评分标准的强化学习，结合阶段意识的规划和反思式的元策略演化，来优化研究过程。RubricEM不仅将评分标准作为最终答案的评估工具，还作为结构化政策执行、反馈评估和代理记忆的共享接口。实验结果表明，RubricEM-8B在多个长篇研究基准测试中表现优异，超越了类似的开放模型，接近专有的深度研究系统。'}}}, {'id': 'https://huggingface.co/papers/2605.12090', 'title': 'World Action Models: The Next Frontier in Embodied AI', 'url': 'https://huggingface.co/papers/2605.12090', 'abstract': 'Abstract World Action Models unify predictive state modeling with action generation for embodied policy learning, forming a cohesive framework for understanding environment dynamics and action prediction.  AI-generated summary Vision-Language-Action (VLA) models have achieved strong semantic generalization for embodied policy learning, yet they learn reactive observation-to-action mappings without explicitly modeling how the physical world evolves under intervention. A growing body of work addresses this limitation by integrating world models, predictive models of environment dynamics, into the action generation pipeline. We term this emerging paradigm World Action Models (WAMs): embodied foundation models that unify predictive state modeling with action generation, targeting a joint distribution over future states and actions rather than actions alone. However, the literature remains fragmented across architectures, learning objectives, and application scenarios, lacking a unified conceptual framework. We formally define WAMs and disambiguate them from related concepts, and trace the foundations and early integration of VLA and world model research that gave rise to this paradigm. We organize existing methods into a structured taxonomy of Cascaded and Joint WAMs, with further subdivision by generation modality, conditioning mechanism, and action decoding strategy. We systematically analyze the data ecosystem fueling WAMs development, spanning robot teleoperation, portable human demonstrations, simulation, and internet-scale egocentric video, and synthesize emerging evaluation protocols organized around visual fidelity, physical commonsense, and action plausibility. Overall, this survey provides the first systematic account of the WAMs landscape, clarifies key architectural paradigms and their trade-offs, and identifies open challenges and future opportunities for this rapidly evolving field.', 'score': 43, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '2ccf8f993c1c01f6', 'authors': ['Siyin Wang', 'Junhao Shi', 'Zhaoyang Fu', 'Xinzhe He', 'Feihong Liu', 'Chenchen Yang', 'Yikang Zhou', 'Zhaoye Fei', 'Jingjing Gong', 'Jinlan Fu', 'Mike Zheng Shou', 'Xuanjing Huang', 'Xipeng Qiu', 'Yu-Gang Jiang'], 'affiliations': ['Fudan University', 'National University of Singapore', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.12090.jpg', 'data': {'categories': ['#robotics', '#agents', '#multimodal', '#video', '#training', '#survey'], 'emoji': '🤖', 'ru': {'title': 'Объединяя предсказание мира и генерацию действий в единую модель', 'desc': 'В статье предложена унифицированная концепция World Action Models (WAM) — моделей, которые объединяют предсказание динамики окружающей среды с генерацией действий для обучения политик роботов. Авторы систематизируют существующие подходы в виде таксономии, разделяя методы на каскадные и совместные архитектуры в зависимости от модальности генерации и стратегии декодирования действий. Исследование охватывает экосистему данных для обучения WAM, включая телеоперацию, человеческие демонстрации, симуляции и видео с егоцентрической точки зрения. Работа определяет ключевые метрики оценки на основе визуальной точности, физического здравого смысла и правдоподобности действий, предоставляя первый систематический обзор этой быстро развивающейся области.'}, 'en': {'title': 'Unifying Prediction and Action in AI with World Action Models', 'desc': 'World Action Models (WAMs) combine predictive state modeling with action generation to enhance embodied policy learning. This framework allows AI systems to not only predict future states but also to understand how actions influence the environment. The paper categorizes existing WAM methods into Cascaded and Joint models, detailing their architectures and learning objectives. It also highlights the diverse data sources that support WAM development and outlines evaluation protocols to assess their performance in real-world scenarios.'}, 'zh': {'title': '统一预测与动作生成的世界动作模型', 'desc': '世界动作模型（WAMs）将预测状态建模与动作生成结合起来，为体态政策学习提供了一个统一的框架。尽管视觉-语言-动作（VLA）模型在语义泛化方面表现出色，但它们在学习反应性观察到动作的映射时，未能明确建模物理世界在干预下的演变。WAMs通过将环境动态的预测模型整合到动作生成流程中，解决了这一局限性。本文系统分析了WAMs的发展现状，明确了关键架构范式及其权衡，并识别了该快速发展的领域中的开放挑战和未来机会。'}}}, {'id': 'https://huggingface.co/papers/2605.10780', 'title': 'Beyond the Last Layer: Multi-Layer Representation Fusion for Visual Tokenization', 'url': 'https://huggingface.co/papers/2605.10780', 'abstract': 'Abstract DRoRAE enhances visual representation by fusing multi-layer features from pretrained vision encoders through adaptive routing and incremental correction, improving reconstruction and generation quality.  AI-generated summary Representation autoencoders that reuse frozen pretrained vision encoders as visual tokenizers have achieved strong reconstruction and generation quality. However, existing methods universally extract features from only the last encoder layer, discarding the rich hierarchical information distributed across intermediate layers. We show that low-level visual details survive in the last layer merely as attenuated residuals after multiple layers of semantic abstraction, and that explicitly fusing multi-layer features can substantially recover this lost information. We propose DRoRAE (Depth-Routed Representation AutoEncoder), a lightweight fusion module that adaptively aggregates all encoder layers via energy-constrained routing and incremental correction, producing an enriched latent compatible with a frozen pretrained decoder. A three-phase decoupled training strategy first learns the fusion under the implicit distributional constraint of the frozen decoder, then fine-tunes the decoder to fully exploit the enriched representation. On ImageNet-256, DRoRAE reduces rFID from 0.57 to 0.29 and improves generation FID from 1.74 to 1.65 (with AutoGuidance), with gains also transferring to text-to-image synthesis. Furthermore, we uncover a log-linear scaling law (R^2{=}0.86) between fusion capacity and reconstruction quality, identifying representation richness as a new, predictably scalable dimension for visual tokenizers analogous to vocabulary size in NLP.', 'score': 24, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '0a92ec2fef085ff8', 'authors': ['Xuanyu Zhu', 'Yan Bai', 'Yang Shi', 'Yihang Lou', 'Yuanxing Zhang', 'Jing Jin', 'Yuan Zhou'], 'affiliations': ['IGDL', 'Meituan Inc', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.10780.jpg', 'data': {'categories': ['#architecture', '#training', '#cv'], 'emoji': '🔀', 'ru': {'title': 'Многослойное слияние признаков для превосходной реконструкции изображений', 'desc': 'Авторы предлагают DRoRAE — метод для улучшения визуальных представлений путём адаптивного объединения признаков со всех слоёв замороженного энкодера, а не только последнего слоя. Система использует маршрутизацию с энергетическими ограничениями и инкрементальную коррекцию для создания обогащённого латентного пространства, совместимого с предобученным декодером. Трёхфазная стратегия обучения позволяет сначала обучить модуль слияния под неявным ограничением декодера, а затем тонко настроить декодер для полного использования обогащённого представления. Исследование обнаруживает логарифмически-линейный закон масштабирования между ёмкостью слияния и качеством реконструкции, что открывает новое масштабируемое измерение для улучшения визуальных токенизаторов.'}, 'en': {'title': 'Enhancing Visual Representation through Multi-Layer Feature Fusion', 'desc': 'The paper introduces DRoRAE, a novel approach that enhances visual representation by combining features from multiple layers of pretrained vision encoders. Traditional methods typically rely on features from only the last layer, which can lead to a loss of important visual details. DRoRAE employs a lightweight fusion module that adaptively integrates features from all layers, improving the quality of image reconstruction and generation. The authors demonstrate that this method significantly reduces reconstruction error and enhances performance in tasks like text-to-image synthesis, while also revealing a relationship between fusion capacity and reconstruction quality.'}, 'zh': {'title': 'DRoRAE：融合多层特征提升视觉表示', 'desc': 'DRoRAE是一种增强视觉表示的方法，通过自适应路由和增量修正融合来自预训练视觉编码器的多层特征，从而提高重建和生成质量。现有方法通常只提取最后一层编码器的特征，忽略了中间层分布的丰富层次信息。研究表明，低级视觉细节在最后一层仅作为减弱的残差存在，而显式融合多层特征可以显著恢复这些丢失的信息。DRoRAE通过能量约束路由和增量修正，适应性地聚合所有编码器层，生成与冻结的预训练解码器兼容的丰富潜在表示。'}}}, {'id': 'https://huggingface.co/papers/2605.12495', 'title': 'AlphaGRPO: Unlocking Self-Reflective Multimodal Generation in UMMs via Decompositional Verifiable Reward', 'url': 'https://huggingface.co/papers/2605.12495', 'abstract': "Abstract AlphaGRPO enhances multimodal generation by applying Group Relative Policy Optimization to AR-Diffusion Unified Multimodal Models through self-reflective refinement and decompositional verifiable reward mechanisms.  AI-generated summary In this paper, we propose AlphaGRPO, a novel framework that applies Group Relative Policy Optimization (GRPO) to AR-Diffusion Unified Multimodal Models (UMMs) to enhance multimodal generation capabilities without an additional cold-start stage. Our approach unlocks the model's intrinsic potential to perform advanced reasoning tasks: Reasoning Text-to-Image Generation, where the model actively infers implicit user intents, and Self-Reflective Refinement, where it autonomously diagnoses and corrects misalignments in generated outputs. To address the challenge of providing stable supervision for real-world multimodal generation, we introduce the Decompositional Verifiable Reward (DVReward). Unlike holistic scalar rewards, DVReward utilizes an LLM to decompose complex user requests into atomic, verifiable semantic and quality questions, which are then evaluated by a general MLLM to provide reliable and interpretable feedback. Extensive experiments demonstrate that AlphaGRPO yields robust improvements across multimodal generation benchmarks, including GenEval, TIIF-Bench, DPG-Bench and WISE, while also achieving significant gains in editing tasks on GEdit without training on editing tasks. These results validate that our self-reflective reinforcement approach effectively leverages inherent understanding to guide high-fidelity generation. Project page: https://huangrh99.github.io/AlphaGRPO/", 'score': 23, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '844b21165efd4347', 'authors': ['Runhui Huang', 'Jie Wu', 'Rui Yang', 'Zhe Liu', 'Hengshuang Zhao'], 'affiliations': ['Bytedance Seed', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.12495.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#optimization', '#benchmark', '#diffusion', '#rl', '#training'], 'emoji': '🎨', 'ru': {'title': 'Самосовершенствующаяся генерация: усиленное обучение для многомодальных моделей', 'desc': 'AlphaGRPO — это инновационный метод обучения многомодальных моделей генерации на базе AR-Diffusion, использующий оптимизацию политики относительно группы (GRPO) для улучшения качества генерации изображений и текста. Ключевой вклад заключается в применении самоанализирующего механизма очистки, когда модель автономно диагностирует и исправляет ошибки в своих выходах. Для обеспечения надежной обратной связи авторы предложили декомпозиционную проверяемую награду (DVReward), которая разбивает сложные запросы на атомарные вопросы через LLM и оценивает их мультимодальной моделью. Эксперименты показывают значительные улучшения на множестве бенчмарков и даже обобщение на задачи редактирования без специального обучения.'}, 'en': {'title': 'Unlocking Multimodal Potential with AlphaGRPO', 'desc': "AlphaGRPO is a new framework that improves multimodal generation by using Group Relative Policy Optimization (GRPO) with AR-Diffusion Unified Multimodal Models (UMMs). It enhances the model's ability to generate content by allowing it to reason about user intentions and correct its own mistakes through self-reflective refinement. The framework introduces a novel reward system called Decompositional Verifiable Reward (DVReward), which breaks down complex user requests into simpler questions for better evaluation. Experiments show that AlphaGRPO significantly improves performance on various multimodal benchmarks and editing tasks without needing additional training for those tasks."}, 'zh': {'title': 'AlphaGRPO：提升多模态生成的创新框架', 'desc': '本文提出了一种新框架AlphaGRPO，通过将群体相对策略优化（GRPO）应用于AR-扩散统一多模态模型（UMMs），增强多模态生成能力。该方法无需额外的冷启动阶段，能够激发模型进行高级推理任务，如文本到图像生成和自我反思优化。为了解决现实世界多模态生成的稳定监督问题，我们引入了可分解可验证奖励（DVReward），利用大型语言模型（LLM）将复杂用户请求分解为可验证的语义和质量问题。实验结果表明，AlphaGRPO在多个多模态生成基准测试中表现出显著的改进，验证了其自我反思强化学习方法的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.12481', 'title': 'ToolCUA: Towards Optimal GUI-Tool Path Orchestration for Computer Use Agents', 'url': 'https://huggingface.co/papers/2605.12481', 'abstract': 'Abstract ToolCUA is an end-to-end agent that learns optimal GUI-tool path selection through staged training, achieving superior performance in hybrid action space environments.  AI-generated summary Computer Use Agents (CUAs) can act through both atomic GUI actions, such as click and type, and high-level tool calls, such as API-based file operations, but this hybrid action space often leaves them uncertain about when to continue with GUI actions or switch to tools, leading to suboptimal execution paths. This difficulty stems from the scarcity of high-quality interleaved GUI-Tool trajectories, the cost and brittleness of collecting real tool trajectories, and the lack of trajectory-level supervision for GUI-Tool path selection. In this paper, we propose ToolCUA, an end-to-end agent designed to learn optimal GUI-Tool path selection through a staged training paradigm. We first introduce an Interleaved GUI-Tool Trajectory Scaling Pipeline that repurposes abundant static GUI trajectories and synthesizes a grounded tool library, enabling diverse GUI-Tool trajectories without manual engineering or real tool-trajectory collection. We then perform Tool-Bootstrapped GUI RFT, combining warmup SFT with single-turn RL to improve decisions at critical GUI-Tool switching points. Finally, we optimize ToolCUA with Online Agentic RL in a high-fidelity GUI-Tool environment, guided by a Tool-Efficient Path Reward that encourages appropriate tool use and shorter execution paths. Experiments on OSWorld-MCP show that ToolCUA achieves 46.85% accuracy, a relative improvement of approximately 66% over the baseline, establishing a new state of the art among models of comparable scale. It also improves by 3.9% over GUI-only settings, demonstrating effective GUI-Tool orchestration. The results further suggest that training in a hybrid action space is a promising paradigm for real-world digital agents. Open-sourced here: https://x-plug.github.io/ToolCUA/', 'score': 22, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '10f27e3e638473f2', 'authors': ['Xuhao Hu', 'Xi Zhang', 'Haiyang Xu', 'Kyle Qiao', 'Jingyi Yang', 'Xuanjing Huang', 'Jing Shao', 'Ming Yan', 'Jieping Ye'], 'affiliations': ['Fudan University', 'Shanghai Artificial Intelligence Laboratory', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.12481.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Гибридное действие: агент, научившийся выбирать между кликами и вызовами', 'desc': 'ToolCUA — это агент, который учится выбирать оптимальный путь между GUI-действиями и вызовами инструментов через трёхэтапное обучение. Авторы предлагают конвейер для масштабирования траекторий, синтезирующий библиотеку инструментов на основе существующих GUI-данных без необходимости в дорогостоящем сборе реальных траекторий. Затем они применяют комбинированное обучение с подкреплением, используя награду за эффективность инструментов, которая поощряет правильное их использование и более короткие пути выполнения. Модель достигает 46.85% точности на бенчмарке OSWorld-MCP, что на 66% лучше базовой модели и демонстрирует эффективную оркестрацию GUI и инструментов.'}, 'en': {'title': 'Optimizing GUI-Tool Path Selection with ToolCUA', 'desc': "ToolCUA is an advanced agent that optimizes the selection of paths between graphical user interface (GUI) actions and tool operations through a structured training approach. It addresses the challenges faced by Computer Use Agents (CUAs) in navigating a hybrid action space, where decisions on whether to perform GUI actions or switch to tool calls can be unclear. By utilizing a novel Interleaved GUI-Tool Trajectory Scaling Pipeline, ToolCUA generates diverse training data without the need for extensive manual input or real-world data collection. The agent's performance is further enhanced through a combination of supervised fine-tuning and reinforcement learning, leading to significant improvements in execution accuracy and efficiency in complex environments."}, 'zh': {'title': 'ToolCUA：优化 GUI-工具路径选择的智能体', 'desc': 'ToolCUA 是一个端到端的智能体，通过分阶段训练学习最佳的 GUI-工具路径选择，能够在混合动作空间环境中实现优越的性能。该智能体可以通过基本的 GUI 操作（如点击和输入）以及高级工具调用（如基于 API 的文件操作）进行操作，但在何时继续 GUI 操作或切换到工具方面常常存在不确定性，导致执行路径不理想。为了解决这一问题，ToolCUA 引入了一种交错的 GUI-工具轨迹缩放管道，利用丰富的静态 GUI 轨迹合成工具库，从而无需手动工程或真实工具轨迹收集。实验结果表明，ToolCUA 在 OSWorld-MCP 上达到了 46.85% 的准确率，相较于基线模型提高了约 66%，并在 GUI-工具协同方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.12178', 'title': 'Do Enterprise Systems Need Learned World Models? The Importance of Context to Infer Dynamics', 'url': 'https://huggingface.co/papers/2605.12178', 'abstract': "Abstract Enterprise discovery agents that read system configuration at runtime outperform traditional world models in configurable environments where dynamics change over time.  AI-generated summary World models enable agents to anticipate the effects of their actions by internalizing environment dynamics. In enterprise systems, however, these dynamics are often defined by tenant-specific business logic that varies across deployments and evolves over time, making models trained on historical transitions brittle under deployment shift. We ask a question the world-models literature has not addressed: when the rules can be read at inference time, does an agent still need to learn them? We argue, and demonstrate empirically, that in settings where transition dynamics are configurable and readable, runtime discovery complements offline training by grounding predictions in the active system instance. We propose enterprise discovery agents, which recover relevant transition dynamics at runtime by reading the system's configuration rather than relying solely on internalized representations. We introduce CascadeBench, a reasoning-focused benchmark for enterprise cascade prediction that adopts the evaluation methodology of World of Workflows on diverse synthetic environments, and use it together with deployment-shift evaluation to show that offline-trained world models can perform well in-distribution but degrade as dynamics change, whereas discovery-based agents are more robust under shift by grounding their predictions in the current instance. Our findings suggest that, in configurable enterprise environments, agents should not rely solely on fixed internalized dynamics, but should incorporate mechanisms for discovering relevant transition logic at runtime.", 'score': 22, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '8324891bef81e339', 'authors': ['Jishnu Sethumadhavan Nair', 'Patrice Bechard', 'Rishabh Maheshwary', 'Surajit Dasgupta', 'Sravan Ramachandran', 'Aakash Bhagat', 'Shruthan Radhakrishna', 'Pulkit Pattnaik', 'Johan Obando-Ceron', 'Shiva Krishna Reddy Malay', 'Sagar Davasam', 'Seganrasan Subramanian', 'Vipul Mittal', 'Sridhar Krishna Nemala', 'Christopher Pal', 'Srinivas Sunkara', 'Sai Rajeswar'], 'affiliations': ['Mila', 'ServiceNow'], 'pdf_title_img': 'assets/pdf/title_img/2605.12178.jpg', 'data': {'categories': ['#rl', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Читай конфигурацию вместо запоминания правил', 'desc': 'В статье предложен новый подход к агентам в корпоративных системах, которые читают конфигурацию окружения во время работы вместо использования предварительно обученных моделей мира. Авторы показывают, что когда правила динамики системы доступны во время инференса, агент может достичь лучших результатов, опираясь на актуальную конфигурацию, а не на выученные представления. Представлен новый бенчмарк CascadeBench для оценки предсказания каскадов в предприятиях с использованием синтетических окружений. Эксперименты демонстрируют, что открытие правил во время выполнения делает агентов устойчивыми к смещению данных, в то время как традиционные моделиванием мира деградируют при изменении динамики системы.'}, 'en': {'title': 'Empowering Agents with Runtime Discovery for Dynamic Enterprise Systems', 'desc': 'This paper discusses the limitations of traditional world models in machine learning when applied to enterprise systems that have changing dynamics. It introduces enterprise discovery agents that can read system configurations at runtime, allowing them to adapt to tenant-specific business logic. The authors argue that these agents can complement offline training by grounding their predictions in the current system state, making them more robust to changes. They also present CascadeBench, a benchmark for evaluating the performance of these agents in dynamic environments, demonstrating that discovery-based methods outperform fixed models under deployment shifts.'}, 'zh': {'title': '动态环境中的智能发现代理', 'desc': '本论文探讨了企业发现代理在动态变化的可配置环境中的优势。传统的世界模型依赖于历史数据进行预测，但在企业系统中，业务逻辑常常是特定于租户的，并且会随时间演变。我们提出企业发现代理，通过在运行时读取系统配置来恢复相关的转移动态，而不是仅依赖于内部化的表示。研究表明，在可配置的企业环境中，代理应结合运行时发现机制，以提高对动态变化的适应能力。'}}}, {'id': 'https://huggingface.co/papers/2605.12013', 'title': 'L2P: Unlocking Latent Potential for Pixel Generation', 'url': 'https://huggingface.co/papers/2605.12013', 'abstract': "Abstract Latent-to-Pixel transfer paradigm efficiently leverages pre-trained latent diffusion models to create pixel-space models with minimal training overhead and high-resolution generation capabilities.  AI-generated summary Pixel diffusion models have recently regained attention for visual generation. However, training advanced pixel-space models from scratch demands prohibitive computational and data resources. To address this, we propose the Latent-to-Pixel (L2P) transfer paradigm, an efficient framework that directly harnesses the rich knowledge of pre-trained LDMs to build powerful pixel-space models. Specifically, L2P discards the VAE in favor of large-patch tokenization and freezes the source LDM's intermediate layers, exclusively training shallow layers to learn the latent-to-pixel transformation. By utilizing LDM-generated synthetic images as the sole training corpus, L2P fits an already smooth data manifold, enabling rapid convergence with zero real-data collection. This strategy allows L2P to seamlessly migrate massive latent priors to the pixel space using only 8 GPUs. Furthermore, eliminating the VAE memory bottleneck unlocks native 4K ultra-high resolution generation. Extensive experiments across mainstream LDM architectures show that L2P incurs negligible training overhead, yet performs on par with the source LDM on DPG-Bench and reaches 93% performance on GenEval.", 'score': 21, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '971f62d08143d068', 'authors': ['Zhennan Chen', 'Junwei Zhu', 'Xu Chen', 'Jiangning Zhang', 'Jiawei Chen', 'Zhuoqi Zeng', 'Wei Zhang', 'Chengjie Wang', 'Jian Yang', 'Ying Tai'], 'affiliations': ['Hainan-biuh', 'Nanjing University', 'Tencent Youtu Lab', 'Weess Gmbh'], 'pdf_title_img': 'assets/pdf/title_img/2605.12013.jpg', 'data': {'categories': ['#architecture', '#synthetic', '#optimization', '#diffusion', '#training', '#cv', '#transfer_learning'], 'emoji': '🎨', 'ru': {'title': 'От латентного пространства к пиксельному: эффективный перенос знаний диффузионных моделей', 'desc': 'В статье предложена парадигма Latent-to-Pixel (L2P), которая эффективно переносит знания предварительно обученных латентных диффузионных моделей в пиксельное пространство с минимальными вычислительными затратами. Метод заменяет VAE на крупнозерновую токенизацию и замораживает промежуточные слои исходной модели, обучая только поверхностные слои преобразованию из латентного пространства в пиксельное. L2P использует синтетические изображения, сгенерированные диффузионной моделью, для обучения, что позволяет избежать сбора реальных данных и достичь быстрой сходимости. Благодаря устранению узкого места памяти VAE, метод поддерживает генерацию ультравысокого разрешения до 4K.'}, 'en': {'title': 'Efficiently Transforming Latent Knowledge to High-Resolution Pixels', 'desc': 'The paper introduces the Latent-to-Pixel (L2P) transfer paradigm, which efficiently transforms pre-trained latent diffusion models (LDMs) into pixel-space models. This approach minimizes the need for extensive training by utilizing synthetic images generated from LDMs, allowing for rapid convergence without requiring real data. By freezing the intermediate layers of the source LDM and only training shallow layers, L2P effectively learns the transformation from latent to pixel space. The method achieves high-resolution image generation while significantly reducing computational overhead, demonstrating competitive performance with existing models.'}, 'zh': {'title': '高效的潜在到像素转移，快速生成高分辨率图像', 'desc': '本文提出了一种名为潜在到像素（L2P）转移范式的高效框架，旨在利用预训练的潜在扩散模型（LDM）来构建强大的像素空间模型。L2P通过丢弃变分自编码器（VAE），采用大块标记化，并冻结源LDM的中间层，仅训练浅层以学习潜在到像素的转换。该方法使用LDM生成的合成图像作为唯一的训练数据，能够快速收敛，且无需真实数据收集。实验表明，L2P在训练开销上几乎可以忽略不计，同时在多个主流LDM架构上表现出色，达到了93%的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.12496', 'title': 'CausalCine: Real-Time Autoregressive Generation for Multi-Shot Video Narratives', 'url': 'https://huggingface.co/papers/2605.12496', 'abstract': 'Abstract CausalCine enables interactive, multi-shot video generation by addressing limitations of autoregressive models through causal modeling, dynamic memory routing, and real-time distillation techniques.  AI-generated summary Autoregressive video generation aims at real-time, open-ended synthesis. Yet, cinematic storytelling is not merely the endless extension of a single scene; it requires progressing through evolving events, viewpoint shifts, and discrete shot boundaries. Existing autoregressive models often struggle in this setting. Trained primarily for short-horizon continuation, they treat long sequences as extended single shots, inevitably suffering from motion stagnation and semantic drift during long rollouts. To bridge this gap, we introduce CausalCine, an interactive autoregressive framework that transforms multi-shot video generation into an online directing process. CausalCine generates causally across shot changes, accepts dynamic prompts on the fly, and reuses context without regenerating previous shots. To achieve this, we first train a causal base model on native multi-shot sequences to learn complex shot transitions prior to acceleration. We then propose Content-Aware Memory Routing (CAMR), which dynamically retrieves historical KV entries according to attention-based relevance scores rather than temporal proximity, preserving cross-shot coherence under bounded active memory. Finally, we distill the causal base model into a few-step generator for real-time interactive generation. Extensive experiments demonstrate that CausalCine significantly outperforms autoregressive baselines and approaches the capability of bidirectional models while unlocking the streaming interactivity of causal generation. Demo available at https://yihao-meng.github.io/CausalCine/', 'score': 19, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '3cc3662cce8a2155', 'authors': ['Yihao Meng', 'Zichen Liu', 'Hao Ouyang', 'Qiuyu Wang', 'Ka Leong Cheng', 'Yue Yu', 'Hanlin Wang', 'Haobo Li', 'Jiapeng Zhu', 'Yanhong Zeng', 'Xing Zhu', 'Yujun Shen', 'Qifeng Chen', 'Huamin Qu'], 'affiliations': ['Ant Group', 'HKUST', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2605.12496.jpg', 'data': {'categories': ['#story_generation', '#optimization', '#long_context'], 'emoji': '🎬', 'ru': {'title': 'Интерактивная режиссура видео через причинное моделирование с динамической маршрутизацией памяти', 'desc': 'CausalCine решает проблему долгосрочной генерации видео, используя причинное моделирование вместо традиционного авторегрессивного подхода. Модель обучается на многокадровых последовательностях и использует механизм Content-Aware Memory Routing для динамического выбора релевантного контекста на основе оценок внимания, а не временной близости. Система поддерживает интерактивное управление с возможностью динамических подсказок в реальном времени без переконструирования предыдущих кадров. Дистилляция причинной базовой модели позволяет достичь генерации видео в реальном времени при сохранении когерентности между переходами кадров.'}, 'en': {'title': 'Revolutionizing Video Generation with CausalCine', 'desc': 'CausalCine is a novel framework for generating interactive, multi-shot videos that overcomes the limitations of traditional autoregressive models. It focuses on cinematic storytelling, which requires managing transitions between different scenes and viewpoints rather than just extending a single shot. By employing techniques like Content-Aware Memory Routing, CausalCine maintains coherence across shots and allows for dynamic prompts during video generation. This approach enables real-time, interactive video creation while significantly improving performance compared to existing autoregressive methods.'}, 'zh': {'title': 'CausalCine：交互式多镜头视频生成的新突破', 'desc': 'CausalCine 是一种交互式的多镜头视频生成框架，旨在解决自回归模型的局限性。它通过因果建模、动态记忆路由和实时蒸馏技术，实现了更复杂的镜头转换和实时生成。与传统的自回归模型不同，CausalCine 能够在镜头变化时生成因果内容，并根据动态提示进行调整。实验表明，CausalCine 在性能上显著优于自回归基线，并接近双向模型的能力，同时实现了因果生成的流媒体交互性。'}}}, {'id': 'https://huggingface.co/papers/2605.10832', 'title': 'Towards On-Policy Data Evolution for Visual-Native Multimodal Deep Search Agents', 'url': 'https://huggingface.co/papers/2605.10832', 'abstract': "Abstract A visual-native agent harness with image bank reference protocol enables reusable intermediate visual evidence and closed-loop data generation that improves multimodal deep search performance across multiple benchmarks.  AI-generated summary Multimodal deep search requires an agent to solve open-world problems by chaining search, tool use, and visual reasoning over evolving textual and visual context. Two bottlenecks limit current systems. First, existing tool-use harnesses treat images returned by search, browsing, or transformation as transient outputs, so intermediate visual evidence cannot be re-consumed by later tools. Second, training data is usually built by fixed curation recipes that cannot track the target agent's evolving capability. To address these challenges, we first introduce a visual-native agent harness centered on an image bank reference protocol, which registers every tool-returned image as an addressable reference and makes intermediate visual evidence reusable by later tools. On top of this harness, On-policy Data Evolution (ODE) runs a closed-loop data generator that refines itself across rounds from rollouts of the policy being trained. This per-round refinement makes each round's data target what the current policy still needs to learn. The same framework supports both diverse supervised fine-tuning data and policy-aware reinforcement learning data curation, covering the full training lifecycle of the target agent. Across 8 multimodal deep search benchmarks, ODE improves the Qwen3-VL-8B agent from 24.9% to 39.0% on average, surpassing Gemini-2.5 Pro in standard agent-workflow setting (37.9%). At 30B, ODE raises the average score from 30.6% to 41.5%. Further analyses validate the effectiveness of image-bank reuse, especially on complex tasks requiring iterative visual refinement, while rollout-feedback evolution yields more grounded SFT traces and better policy-matched RL tasks than static synthesis.", 'score': 14, 'issue_id': 2214, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '8636a3bdc48db388', 'authors': ['Shijue Huang', 'Hangyu Guo', 'Chenxin Li', 'Junting Lu', 'Xinyu Geng', 'Zhaochen Su', 'Zhenyu Li', 'Shuang Chen', 'Hongru Wang', 'Yi R. Fung'], 'affiliations': ['Hong Kong University of Science and Technology', 'Peking University', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2605.10832.jpg', 'data': {'categories': ['#agents', '#multimodal', '#data', '#benchmark', '#rl', '#training'], 'emoji': '🔄', 'ru': {'title': 'Переиспользование визуальной информации через эволюцию данных в cicле обучения агента', 'desc': 'В работе предлагается визуально-ориентированная архитектура агента с протоколом банка изображений, позволяющей переиспользовать промежуточные визуальные доказательства в мультимодальном поиске. Ключевой инновацией является метод On-policy Data Evolution (ODE), который генерирует данные в замкнутом цикле, адаптируя обучающий набор к текущим потребностям обучаемой политики агента. Система поддерживает как supervised fine-tuning, так и reinforcement learning для полного цикла обучения. Экспериментальные результаты показывают значительное улучшение производительности на 8 мультимодальных бенчмарках, превосходя Gemini-2.5 Pro.'}, 'en': {'title': 'Revolutionizing Multimodal Search with Reusable Visual Evidence', 'desc': "This paper presents a new approach for improving multimodal deep search using a visual-native agent harness that incorporates an image bank reference protocol. This protocol allows for the reuse of intermediate visual evidence, enabling the agent to build on previous outputs rather than treating them as one-time results. Additionally, the On-policy Data Evolution (ODE) method creates a closed-loop data generation process that adapts and refines training data based on the agent's evolving capabilities. The results show significant performance improvements across multiple benchmarks, demonstrating the effectiveness of this approach in enhancing the agent's learning and problem-solving abilities."}, 'zh': {'title': '提升多模态深度搜索性能的视觉原生代理', 'desc': '这篇论文介绍了一种视觉原生代理工具，利用图像库参考协议来提高多模态深度搜索的性能。通过将每个工具返回的图像注册为可寻址的参考，论文解决了中间视觉证据无法重复使用的问题。论文还提出了在政策训练过程中进行闭环数据生成的方法，使得每一轮的数据都能针对当前政策的学习需求进行优化。实验结果表明，该方法在多个基准测试中显著提高了代理的表现，尤其在复杂任务中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.07237', 'title': 'Teaching Language Models to Think in Code', 'url': 'https://huggingface.co/papers/2605.07237', 'abstract': 'Abstract ThinC framework enables mathematical problem solving where code serves as the primary reasoning mechanism instead of a verification tool, demonstrating superior performance on math benchmarks.  AI-generated summary Tool-integrated reasoning (TIR) has emerged as a dominant paradigm for mathematical problem solving in language models, combining natural language (NL) reasoning with code execution. However, this interleaved setup has three key limitations: code often acts as a post-hoc verifier, intermediate NL computations are error-prone, and NL and code play overlapping rather than clearly distinct roles. We propose ThinC (Thinking in Code), a framework in which code itself serves as the reasoner rather than as a tool invoked by NL. A ThinC trajectory begins with a brief NL planning step, after which all reasoning unfolds through code blocks connected only by their execution outputs. We distill 12.2k code-centric trajectories from a teacher model and train ThinC-1.7B and ThinC-4B with supervised fine-tuning followed by reinforcement learning. ThinC-4B consistently outperforms every TIR baseline on five competition-level math benchmarks and even surpasses the much larger Qwen3-235B-A22B-Thinking. Further analysis shows that ThinC reasons through code: 99.2% of its final answers are grounded in interpreter output, and the model recovers reliably from code execution failures without intermediate NL reasoning. Our code and models will be released soon.', 'score': 14, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '4a0e5ca0736200c1', 'authors': ['Hyeon Hwang', 'Jiwoo Lee', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences', 'Korea University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07237.jpg', 'data': {'categories': ['#plp', '#math', '#benchmark', '#dataset', '#small_models', '#rlhf', '#training'], 'emoji': '💻', 'ru': {'title': 'Код как основной механизм мышления: от инструмента верификации к первичному рассуждению', 'desc': 'В статье представлена фреймворк ThinC, которая переосмысляет подход к решению математических задач языковыми моделями. Вместо традиционного подхода, где код используется как инструмент для проверки рассуждений на естественном языке, авторы предлагают сделать код основным механизмом рассуждения. Модель начинает с краткого планирования на естественном языке, а затем всё решение развивается через последовательность блоков кода, связанных только выходами выполнения. Модели ThinC, обученные методом supervised fine-tuning и reinforcement learning, превосходят базовые подходы на конкурсных математических бенчмарках и демонстрируют надёжность при восстановлении после ошибок выполнения кода.'}, 'en': {'title': 'Think in Code: Revolutionizing Math Problem Solving', 'desc': 'The ThinC framework revolutionizes mathematical problem solving by using code as the main reasoning tool instead of just a verification method. This approach addresses limitations in traditional Tool-integrated reasoning (TIR) by allowing code to directly execute reasoning processes, minimizing errors associated with natural language computations. ThinC employs a structured method where reasoning is conducted through interconnected code blocks, enhancing clarity and efficiency. The results show that ThinC-4B outperforms existing models on competitive math benchmarks, demonstrating its effectiveness in reasoning through code execution.'}, 'zh': {'title': 'ThinC：让代码成为推理的核心', 'desc': 'ThinC框架使得数学问题解决中，代码成为主要的推理机制，而不是验证工具。与传统的工具集成推理方法相比，ThinC通过代码块的执行输出进行推理，避免了自然语言计算中的错误。我们从教师模型中提取了12.2k个以代码为中心的推理轨迹，并通过监督微调和强化学习训练了ThinC-1.7B和ThinC-4B模型。实验结果表明，ThinC-4B在多个数学基准测试中表现优异，且其推理结果99.2%基于解释器输出，能够有效应对代码执行失败。'}}}, {'id': 'https://huggingface.co/papers/2605.11882', 'title': 'On-Policy Self-Evolution via Failure Trajectories for Agentic Safety Alignment', 'url': 'https://huggingface.co/papers/2605.11882', 'abstract': 'Abstract FATE is an on-policy framework that uses failure trajectories to improve agent safety and performance through self-evolution and Pareto-aware optimization.  AI-generated summary Tool-using LLM agents fail through trajectories rather than only final responses, as they may execute unsafe tool calls, follow injected instructions, comply with harmful requests, or over-refuse benign tasks despite producing a seemingly safe answer. Existing safety-alignment signals are largely response-level or off-policy, and often incur a safety-utility trade-off: improving agent safety comes at the cost of degraded task performance. Such sparse and single-objective rewards severely limit real-world usability. To bridge this gap, we propose FATE, an on-policy self-evolving framework that transforms verifier-scored failures into repair supervision without expert demonstrations. For each failure, the same policy proposes repair candidates, which are then re-scored by verifiers and filtered across security, utility, over-refusal control, and trajectory validity. This dense trajectory-level information is then used as a supervision signal for agent self-evolution. During this process, we further introduce Pareto-Front Policy Optimization (PFPO), combining supervised warmup with Pareto-aware policy optimization to preserve safety-utility trade-offs. Experiments on AgentDojo, AgentHarm, and ATBench show that FATE improves safety across different models and scales while preserving useful behavior. Compared with strong baselines, FATE reduces attack success rate by 33.5%, harmful compliance by 82.6%, and improves external trajectory-safety diagnosis by 6.5%. These results suggest that failed trajectories can provide structured repair supervision for safer self-evolving agents.', 'score': 12, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '150c6bf7382e0645', 'authors': ['Bo Yin', 'Qi Li', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.11882.jpg', 'data': {'categories': ['#alignment', '#security'], 'emoji': '🛡️', 'ru': {'title': 'Самоэволюция агентов через исправление неудачных траекторий', 'desc': 'FATE — это фреймворк обучения агентов на основе политики, который использует неудачные траектории для одновременного улучшения безопасности и производительности. Авторы предложили подход, при котором агент самостоятельно предлагает исправления для своих ошибок, которые затем оцениваются верификаторами по нескольким критериям: безопасность, полезность и избыточные отказы. Ключевой инновацией является метод Pareto-Front Policy Optimization (PFPO), который сохраняет баланс между безопасностью и функциональностью агента, избегая классического компромисса между этими целями. Экспериментальные результаты демонстрируют значительное снижение успешных атак и вредоносных запросов при сохранении полезного поведения агента.'}, 'en': {'title': 'Transforming Failures into Safer AI Agents', 'desc': "The paper introduces FATE, a framework designed to enhance the safety and performance of AI agents by learning from their failure trajectories. Unlike traditional methods that focus on final responses, FATE analyzes the entire process of an agent's actions, identifying unsafe tool usage and harmful compliance. It employs a self-evolution mechanism that uses feedback from failures to guide the agent's learning without needing expert input. Additionally, the framework incorporates Pareto-Front Policy Optimization to balance safety and utility, resulting in significant improvements in safety metrics while maintaining effective task performance."}, 'zh': {'title': '利用失败轨迹提升智能体安全性与性能', 'desc': 'FATE是一个基于策略的框架，通过失败轨迹来提升智能体的安全性和性能。该框架利用自我进化和帕累托优化，解决了现有安全对齐信号的不足，避免了安全性和任务性能之间的权衡。FATE将验证者评分的失败转化为修复监督，利用密集的轨迹级信息来指导智能体的自我进化。实验结果表明，FATE在不同模型和规模上提高了安全性，同时保持了有用的行为。'}}}, {'id': 'https://huggingface.co/papers/2605.09131', 'title': 'MCP-Cosmos: World Model-Augmented Agents for Complex Task Execution in MCP Environments', 'url': 'https://huggingface.co/papers/2605.09131', 'abstract': 'Abstract MCP-Cosmos integrates generative World Models into the Model Context Protocol ecosystem to enhance agent planning and execution through predictive simulation in latent space.  AI-generated summary The Model Context Protocol (MCP) has unified the interface between Large Language Models (LLMs) and external tools, yet a fundamental gap remains in how agents conceptualize the environments within which they operate. Current paradigms are bifurcated: Task-level planning often ignores execution-time dynamics, while reactive execution lacks long-horizon foresight. We present MCP-Cosmos, a framework that infuses generative World Models (WM) into the MCP ecosystem to enable predictive task automation. By unifying three disparate technologies, namely MCP, World Model, and Agent, we demonstrate that a "Bring Your Own World Model" (BYOWM) strategy allows agents to simulate state transitions and refine plans in a latent space before execution. We conducted experiments using two strategies, namely ReAct and SPIRAL with 2 planning models and 3 representative world models over 20+ MCP-Bench tasks. We observed improvements in Agent\'s environment interaction KPI such as tool success rate and tool parameter accuracy. The framework also offers new metrics such as Execution Quality to generate new insights about the effectiveness of world models compared to baseline.', 'score': 12, 'issue_id': 2214, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': '7494cfcb8b0ec29c', 'authors': ['Giridhar Ganapavarapu', 'Dhaval Patel'], 'affiliations': ['IBM, New York'], 'pdf_title_img': 'assets/pdf/title_img/2605.09131.jpg', 'data': {'categories': [], 'emoji': '🌍', 'ru': {'title': 'Агенты, видящие будущее: предсказательное планирование через мировые модели', 'desc': 'MCP-Cosmos интегрирует генеративные мировые модели в экосистему Model Context Protocol, позволяя агентам предсказывать последствия действий и планировать поведение в скрытом пространстве представлений. Фреймворк объединяет три технологии: MCP для унификации интерфейсов, мировые модели для симуляции переходов состояний и агентов для принятия решений. Авторы демонстрируют, что подход "принеси свою мировую модель" (BYOWM) улучшает качество взаимодействия агента с окружением, повышая точность выбора инструментов и успешность их применения. Экспериментальная оценка на более чем 20 задачах показала преимущества предложенного подхода и введение новых метрик для оценки эффективности мировых моделей.'}, 'en': {'title': 'Empowering Agents with Predictive World Models', 'desc': "MCP-Cosmos is a framework that enhances agent planning and execution by integrating generative World Models into the Model Context Protocol (MCP) ecosystem. This integration allows agents to simulate their environments in a latent space, improving their ability to plan tasks with foresight while considering execution dynamics. By adopting a 'Bring Your Own World Model' strategy, agents can refine their plans before actual execution, leading to better performance in various tasks. Experiments showed that this approach improved key performance indicators like tool success rate and introduced new metrics for evaluating execution quality."}, 'zh': {'title': '智能体规划与执行的新纪元', 'desc': 'MCP-Cosmos 是一个将生成性世界模型整合到模型上下文协议（MCP）生态系统中的框架，旨在通过潜在空间中的预测模拟来增强智能体的规划和执行能力。该框架解决了当前任务级规划与执行时动态之间的差距，使得智能体能够在执行前模拟状态转变并优化计划。通过结合 MCP、世界模型和智能体三种技术，MCP-Cosmos 采用了“自带世界模型”（BYOWM）策略，提升了智能体与环境交互的效果。实验结果显示，使用 MCP-Cosmos 后，智能体在工具成功率和参数准确性等关键绩效指标上都有显著改善。'}}}, {'id': 'https://huggingface.co/papers/2605.07579', 'title': "Your Language Model is Its Own Critic: Reinforcement Learning with Value Estimation from Actor's Internal States", 'url': 'https://huggingface.co/papers/2605.07579', 'abstract': "Abstract POISE enables stable and efficient policy optimization for large reasoning models by estimating baselines using internal model signals, reducing computational overhead while maintaining performance comparable to existing methods.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) for Large Reasoning Models hinges on baseline estimation for variance reduction, but existing approaches pay a heavy price: PPO requires a policy-model scale critic, while GRPO needs multiple rollouts per prompt to keep its empirical group mean stable. We introduce Policy Optimization with Internal State Value Estimation), which obtains a baseline at negligible cost by using the policy model's internal signals already computed during the policy forward pass. A lightweight probe predicts the expected verifiable reward from the hidden states of the prompt and generated trajectory, as well as token-entropy statistics, and is trained online alongside the policy. To preserve gradient unbiasedness despite using trajectory-conditioned features, we introduce a cross-rollout construction that predicts each rollout's value from an independent rollout's internal states. Because POISE estimates prompt value using only a single rollout, it enables higher prompt diversity for a fixed compute budget during training. This reduces gradient variance for more stable learning and also eliminates the compute overhead of sampling costs for detecting zero-advantage prompts. On Qwen3-4B and DeepSeek-R1-Distill-Qwen-1.5B across math reasoning benchmarks, POISE matches DAPO while requiring less compute. Moreover, its value estimator shows similar performance to a separate LLM-scale value model and generalizes to various verifiable tasks. By leveraging the model's own internal representations, POISE enables more stable and efficient policy optimization.", 'score': 12, 'issue_id': 2216, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '5a51d97fa27bb508', 'authors': ['Yunho Choi', 'Jongwon Lim', 'Woojin Ahn', 'Minjae Oh', 'Jeonghoon Shim', 'Yohan Jo'], 'affiliations': ['Computer Science and Engineering Seoul National University', 'Graduate School of Data Science Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07579.jpg', 'data': {'categories': ['#small_models', '#math', '#training', '#reasoning', '#rl', '#optimization', '#rlhf'], 'emoji': '⚡', 'ru': {'title': 'Эффективная оптимизация политики через внутренние представления модели', 'desc': "POISE — это метод оптимизации политики для больших моделей рассуждений, который использует внутренние сигналы модели для оценки baseline'ов, необходимых для снижения дисперсии при обучении с подкреплением. Вместо использования отдельной критик-модели или множественных прогонов, POISE обучает лёгкий зонд предсказывать ожидаемое вознаграждение из скрытых состояний модели, получаемых уже при прямом проходе сети. Для сохранения несмещённости градиентов авторы предлагают кросс-роллаут конструкцию, которая предсказывает значение одного прогона из внутренних состояний независимого прогона. Метод демонстрирует сравнимую производительность с существующими подходами при значительном снижении вычислительных затрат и повышении стабильности обучения."}, 'en': {'title': 'Efficient Policy Optimization with Internal Signals', 'desc': "The paper introduces POISE, a method for improving policy optimization in large reasoning models by using internal model signals to estimate baselines. This approach reduces the computational costs typically associated with existing reinforcement learning methods while maintaining performance. By predicting expected rewards from the model's hidden states and token-entropy statistics, POISE allows for efficient training with higher prompt diversity. Overall, it achieves stable learning and lower variance in gradients, making it a promising solution for optimizing large models in various tasks."}, 'zh': {'title': '利用内部信号实现高效稳定的策略优化', 'desc': 'POISE是一种新方法，用于大规模推理模型的策略优化。它通过利用模型内部信号来估计基线，从而减少计算开销，同时保持与现有方法相当的性能。与传统方法相比，POISE只需使用单个回合的输出就能估计提示值，这提高了训练过程中的提示多样性。通过这种方式，POISE实现了更稳定的学习和更高效的策略优化。'}}}, {'id': 'https://huggingface.co/papers/2605.12070', 'title': 'Missing Old Logits in Asynchronous Agentic RL: Semantic Mismatch and Repair Methods for Off-Policy Correction', 'url': 'https://huggingface.co/papers/2605.12070', 'abstract': 'Abstract Asynchronous reinforcement learning in large language models faces challenges with PPO-style corrections due to delayed updates and missing historical logits, which are addressed through exact and approximate correction methods including snapshot tracking and revised PPO-EWMA techniques.  AI-generated summary Asynchronous reinforcement learning improves rollout throughput for large language model agents by decoupling sample generation from policy optimization, but it also introduces a critical failure mode for PPO-style off-policy correction. In heterogeneous training systems, the total importance ratio should ideally be decomposed into two semantically distinct factors: a training--inference discrepancy term that aligns inference-side and training-side distributions at the same behavior-policy version, and a policy-staleness term that constrains the update from the historical policy to the current policy. We show that practical asynchronous pipelines with delayed updates and partial rollouts often lose the required historical training-side logits, or old logits. This missing-old-logit problem entangles discrepancy repair with staleness correction, breaks the intended semantics of decoupled correction, and makes clipping and masking thresholds interact undesirably. To address this issue, we study both exact and approximate correction routes. We propose three exact old-logit acquisition strategies: snapshot-based version tracking, a dedicated old-logit model, and synchronization via partial rollout interruption, and compare their system trade-offs. From the perspective of approximate correction, we focus on preserving the benefits of decoupled correction through a more appropriate approximate policy when exact old logits cannot be recovered at low cost, without incurring extra system overhead. Following this analysis, we adopt a revised PPO-EWMA method, which achieves significant gains in both training speed and optimization performance. Code at https://github.com/millioniron/ROLL.', 'score': 11, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'aa937be2d4b38345', 'authors': ['Zhong Guan', 'Yongjian Guo', 'Haoran Sun', 'Wen Huang', 'Shuai Di', 'Xiong Jun Wu', 'Likang Wu', 'Hongke Zhao'], 'affiliations': ['JDT AI Infra', 'Peking University', 'Tianjin University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12070.jpg', 'data': {'categories': ['#rlhf', '#rl', '#architecture', '#open_source', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Восстановление исторических логитов в асинхронном обучении с подкреплением для LLM', 'desc': 'В статье решаются проблемы асинхронного обучения с подкреплением в больших языковых моделях, которые возникают при использовании PPO-стиля коррекций из-за задержанных обновлений и отсутствия исторических логитов. Авторы предлагают точные методы коррекции через отслеживание снимков состояния и приблизительные методы с использованием пересмотренной PPO-EWMA техники. Они выделяют две компоненты коэффициента важности: несоответствие между инференсом и обучением, а также устаревание политики. Работа демонстрирует, что предложенный подход достигает значительных улучшений как в скорости обучения, так и в качестве оптимизации.'}, 'en': {'title': 'Enhancing Asynchronous Reinforcement Learning with Improved Logit Correction', 'desc': 'This paper addresses challenges in asynchronous reinforcement learning for large language models, particularly with PPO-style corrections. It highlights issues caused by delayed updates and the loss of historical logits, which complicate the correction process. The authors propose both exact and approximate methods to retrieve old logits and improve policy updates, including snapshot tracking and a revised PPO-EWMA technique. Their findings demonstrate that these methods can enhance training speed and optimization performance in asynchronous pipelines.'}, 'zh': {'title': '解决异步强化学习中的历史logits缺失问题', 'desc': '这篇论文讨论了在大型语言模型中进行异步强化学习时面临的挑战，特别是PPO风格的修正方法。由于更新延迟和缺失历史logits，传统的修正方法难以有效应用。为了解决这个问题，作者提出了精确和近似的修正方法，包括快照跟踪和修订的PPO-EWMA技术。通过这些方法，论文展示了如何在保持训练速度和优化性能的同时，克服历史logits缺失带来的问题。'}}}, {'id': 'https://huggingface.co/papers/2605.09266', 'title': 'SeePhys Pro: Diagnosing Modality Transfer and Blind-Training Effects in M
