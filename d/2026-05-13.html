    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.10899', 'title': 'RubricEM: Meta-RL with Rubric-guided Policy Decomposition beyond Verifiable Rewards', 'url': 'https://huggingface.co/papers/2605.10899', 'abstract': 'Abstract Deep research agents trained using RubricEM framework demonstrate superior performance on long-form research tasks through rubric-guided reinforcement learning with stage-aware planning and reflection-based meta-policy evolution.  AI-generated summary Training deep research agents, namely systems that plan, search, evaluate evidence, and synthesize long-form reports, pushes reinforcement learning beyond the regime of verifiable rewards. Their outputs lack ground-truth answers, their trajectories span many tool-augmented decisions, and standard post-training offers little mechanism for turning past attempts into reusable experience. In this work, we argue that rubrics should serve not merely as final-answer evaluators, but as the shared interface that structures policy execution, judge feedback, and agent memory. Based on this view, we introduce RubricEM, a rubric-guided reinforcement learning framework that combines stagewise policy decomposition with reflection-based meta-policy evolution. RubricEM first makes research trajectories stage-aware by conditioning planning, evidence gathering, review, and synthesis on self-generated rubrics. It then assigns credit with Stage-Structured GRPO, which uses stagewise rubric judgments to provide denser semantic feedback for long-horizon optimization. In parallel, RubricEM trains a shared-backbone reflection meta-policy that distills judged trajectories into reusable rubric-grounded guidance for future attempts. The resulting RubricEM-8B achieves strong performance across four long-form research benchmarks, outperforming comparable open models and approaching proprietary deep-research systems. Beyond final performance, we perform thorough analyses to understand the key ingredients of RubricEM.', 'score': 10, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'a2191fbb6327650f', 'authors': ['Gaotang Li', 'Bhavana Dalvi Mishra', 'Zifeng Wang', 'Jun Yan', 'Yanfei Chen', 'Chun-Liang Li', 'Long T. Le', 'Rujun Han', 'George Lee', 'Hanghang Tong', 'Chen-Yu Lee', 'Tomas Pfister'], 'affiliations': ['Google Cloud AI Research', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.10899.jpg', 'data': {'categories': ['#benchmark', '#agents', '#optimization', '#rl', '#open_source', '#reasoning'], 'emoji': '🔬', 'ru': {'title': 'Рубрики как универсальный интерфейс для управления траекториями исследовательских агентов', 'desc': 'В работе представлена RubricEM — фреймворк для обучения глубоких исследовательских агентов на основе обучения с подкреплением, управляемого рубриками. Ключевая идея заключается в том, что рубрики должны структурировать не только финальную оценку, но и планирование, сбор доказательств и память агента на протяжении всей траектории. Фреймворк комбинирует разбиение политики по этапам с эволюцией мета-политики через рефлексию, обеспечивая более плотную семантическую обратную связь для оптимизации долгосрочных задач. Модель RubricEM-8B достигает сильных результатов на бенчмарках для создания длинных исследовательских текстов, превосходя открытые модели и приближаясь к коммерческим системам.'}, 'en': {'title': 'Empowering Research Agents with Rubric-Guided Learning', 'desc': 'This paper presents RubricEM, a framework for training deep research agents that excel in long-form research tasks using reinforcement learning. It emphasizes the importance of rubrics not just for evaluating final outputs, but as a guiding structure for the entire research process, including planning and evidence synthesis. The framework incorporates stage-aware planning and reflection-based meta-policy evolution to enhance learning from past experiences. The results show that RubricEM-8B significantly outperforms other models on long-form research benchmarks, demonstrating its effectiveness in optimizing complex research tasks.'}, 'zh': {'title': 'RubricEM：提升深度研究代理的强化学习框架', 'desc': '本论文介绍了一种名为RubricEM的框架，用于训练深度研究代理，以提高其在长篇研究任务中的表现。该框架通过基于评分标准的强化学习，结合阶段意识的规划和反思式的元策略演化，来优化研究过程。RubricEM不仅将评分标准作为最终答案的评估工具，还作为结构化政策执行、反馈评估和代理记忆的共享接口。实验结果表明，RubricEM-8B在多个长篇研究基准测试中表现优异，超越了类似的开放模型，接近专有的深度研究系统。'}}}, {'id': 'https://huggingface.co/papers/2605.12496', 'title': 'CausalCine: Real-Time Autoregressive Generation for Multi-Shot Video Narratives', 'url': 'https://huggingface.co/papers/2605.12496', 'abstract': 'Abstract CausalCine enables interactive, multi-shot video generation by addressing limitations of autoregressive models through causal modeling, dynamic memory routing, and real-time distillation techniques.  AI-generated summary Autoregressive video generation aims at real-time, open-ended synthesis. Yet, cinematic storytelling is not merely the endless extension of a single scene; it requires progressing through evolving events, viewpoint shifts, and discrete shot boundaries. Existing autoregressive models often struggle in this setting. Trained primarily for short-horizon continuation, they treat long sequences as extended single shots, inevitably suffering from motion stagnation and semantic drift during long rollouts. To bridge this gap, we introduce CausalCine, an interactive autoregressive framework that transforms multi-shot video generation into an online directing process. CausalCine generates causally across shot changes, accepts dynamic prompts on the fly, and reuses context without regenerating previous shots. To achieve this, we first train a causal base model on native multi-shot sequences to learn complex shot transitions prior to acceleration. We then propose Content-Aware Memory Routing (CAMR), which dynamically retrieves historical KV entries according to attention-based relevance scores rather than temporal proximity, preserving cross-shot coherence under bounded active memory. Finally, we distill the causal base model into a few-step generator for real-time interactive generation. Extensive experiments demonstrate that CausalCine significantly outperforms autoregressive baselines and approaches the capability of bidirectional models while unlocking the streaming interactivity of causal generation. Demo available at https://yihao-meng.github.io/CausalCine/', 'score': 6, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '3cc3662cce8a2155', 'authors': ['Yihao Meng', 'Zichen Liu', 'Hao Ouyang', 'Qiuyu Wang', 'Ka Leong Cheng', 'Yue Yu', 'Hanlin Wang', 'Haobo Li', 'Jiapeng Zhu', 'Yanhong Zeng', 'Xing Zhu', 'Yujun Shen', 'Qifeng Chen', 'Huamin Qu'], 'affiliations': ['Ant Group', 'HKUST', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2605.12496.jpg', 'data': {'categories': ['#story_generation', '#optimization', '#long_context'], 'emoji': '🎬', 'ru': {'title': 'Интерактивная режиссура видео через причинное моделирование с динамической маршрутизацией памяти', 'desc': 'CausalCine решает проблему долгосрочной генерации видео, используя причинное моделирование вместо традиционного авторегрессивного подхода. Модель обучается на многокадровых последовательностях и использует механизм Content-Aware Memory Routing для динамического выбора релевантного контекста на основе оценок внимания, а не временной близости. Система поддерживает интерактивное управление с возможностью динамических подсказок в реальном времени без переконструирования предыдущих кадров. Дистилляция причинной базовой модели позволяет достичь генерации видео в реальном времени при сохранении когерентности между переходами кадров.'}, 'en': {'title': 'Revolutionizing Video Generation with CausalCine', 'desc': 'CausalCine is a novel framework for generating interactive, multi-shot videos that overcomes the limitations of traditional autoregressive models. It focuses on cinematic storytelling, which requires managing transitions between different scenes and viewpoints rather than just extending a single shot. By employing techniques like Content-Aware Memory Routing, CausalCine maintains coherence across shots and allows for dynamic prompts during video generation. This approach enables real-time, interactive video creation while significantly improving performance compared to existing autoregressive methods.'}, 'zh': {'title': 'CausalCine：交互式多镜头视频生成的新突破', 'desc': 'CausalCine 是一种交互式的多镜头视频生成框架，旨在解决自回归模型的局限性。它通过因果建模、动态记忆路由和实时蒸馏技术，实现了更复杂的镜头转换和实时生成。与传统的自回归模型不同，CausalCine 能够在镜头变化时生成因果内容，并根据动态提示进行调整。实验表明，CausalCine 在性能上显著优于自回归基线，并接近双向模型的能力，同时实现了因果生成的流媒体交互性。'}}}, {'id': 'https://huggingface.co/papers/2605.07237', 'title': 'Teaching Language Models to Think in Code', 'url': 'https://huggingface.co/papers/2605.07237', 'abstract': 'Abstract ThinC framework enables mathematical problem solving where code serves as the primary reasoning mechanism instead of a verification tool, demonstrating superior performance on math benchmarks.  AI-generated summary Tool-integrated reasoning (TIR) has emerged as a dominant paradigm for mathematical problem solving in language models, combining natural language (NL) reasoning with code execution. However, this interleaved setup has three key limitations: code often acts as a post-hoc verifier, intermediate NL computations are error-prone, and NL and code play overlapping rather than clearly distinct roles. We propose ThinC (Thinking in Code), a framework in which code itself serves as the reasoner rather than as a tool invoked by NL. A ThinC trajectory begins with a brief NL planning step, after which all reasoning unfolds through code blocks connected only by their execution outputs. We distill 12.2k code-centric trajectories from a teacher model and train ThinC-1.7B and ThinC-4B with supervised fine-tuning followed by reinforcement learning. ThinC-4B consistently outperforms every TIR baseline on five competition-level math benchmarks and even surpasses the much larger Qwen3-235B-A22B-Thinking. Further analysis shows that ThinC reasons through code: 99.2% of its final answers are grounded in interpreter output, and the model recovers reliably from code execution failures without intermediate NL reasoning. Our code and models will be released soon.', 'score': 6, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '4a0e5ca0736200c1', 'authors': ['Hyeon Hwang', 'Jiwoo Lee', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences', 'Korea University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07237.jpg', 'data': {'categories': ['#plp', '#math', '#benchmark', '#dataset', '#small_models', '#rlhf', '#training'], 'emoji': '💻', 'ru': {'title': 'Код как основной механизм мышления: от инструмента верификации к первичному рассуждению', 'desc': 'В статье представлена фреймворк ThinC, которая переосмысляет подход к решению математических задач языковыми моделями. Вместо традиционного подхода, где код используется как инструмент для проверки рассуждений на естественном языке, авторы предлагают сделать код основным механизмом рассуждения. Модель начинает с краткого планирования на естественном языке, а затем всё решение развивается через последовательность блоков кода, связанных только выходами выполнения. Модели ThinC, обученные методом supervised fine-tuning и reinforcement learning, превосходят базовые подходы на конкурсных математических бенчмарках и демонстрируют надёжность при восстановлении после ошибок выполнения кода.'}, 'en': {'title': 'Think in Code: Revolutionizing Math Problem Solving', 'desc': 'The ThinC framework revolutionizes mathematical problem solving by using code as the main reasoning tool instead of just a verification method. This approach addresses limitations in traditional Tool-integrated reasoning (TIR) by allowing code to directly execute reasoning processes, minimizing errors associated with natural language computations. ThinC employs a structured method where reasoning is conducted through interconnected code blocks, enhancing clarity and efficiency. The results show that ThinC-4B outperforms existing models on competitive math benchmarks, demonstrating its effectiveness in reasoning through code execution.'}, 'zh': {'title': 'ThinC：让代码成为推理的核心', 'desc': 'ThinC框架使得数学问题解决中，代码成为主要的推理机制，而不是验证工具。与传统的工具集成推理方法相比，ThinC通过代码块的执行输出进行推理，避免了自然语言计算中的错误。我们从教师模型中提取了12.2k个以代码为中心的推理轨迹，并通过监督微调和强化学习训练了ThinC-1.7B和ThinC-4B模型。实验结果表明，ThinC-4B在多个数学基准测试中表现优异，且其推理结果99.2%基于解释器输出，能够有效应对代码执行失败。'}}}, {'id': 'https://huggingface.co/papers/2605.11011', 'title': 'LoopUS: Recasting Pretrained LLMs into Looped Latent Refinement Models', 'url': 'https://huggingface.co/papers/2605.11011', 'abstract': 'Abstract LoopUS is a post-training framework that transforms pretrained LLMs into looped architectures for improved reasoning performance through latent-refinement and adaptive early exiting mechanisms.  AI-generated summary Looped computation shows promise in improving the reasoning-oriented performance of LLMs by scaling test-time compute. However, existing approaches typically require either training recurrent models from scratch or applying disruptive retrofits, which involve substantial computational costs and may compromise pretrained capabilities. To address these limitations, we introduce Looped Depth Up-Scaling (LoopUS), a post-training framework that converts a standard pretrained LLM into a looped architecture. As a key technical contribution, LoopUS recasts the pretrained LLM into an encoder, a looped reasoning block, and a decoder. It operationalizes this latent-refinement architecture through four core components: (1) block decomposition, guided by staged representation dynamics; (2) an input-dependent selective gate to mitigate hidden-state drift; (3) random deep supervision for memory-efficient learning over long recursive horizons; and (4) a confidence head for adaptive early exiting. Collectively, these mechanisms transform a standard non-looped model into a looped form while stabilizing it against both computational bottlenecks and representation collapse. Through stable latent looping, LoopUS improves reasoning-oriented performance without extending the generated traces or requiring recurrent training from scratch. For more details, see https://thrillcrazyer.github.io/LoopUS', 'score': 6, 'issue_id': 2213, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '320785c8ecee9864', 'authors': ['Taekhyun Park', 'Yongjae Lee', 'Dohee Kim', 'Hyerim Bae'], 'affiliations': ['Changwon National University', 'Pusan National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11011.jpg', 'data': {'categories': ['#reasoning', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'Циклическое уточнение для улучшения логических способностей языковых моделей', 'desc': 'LoopUS — это фреймворк для постобучения, который преобразует предобученные языковые модели в циклические архитектуры с механизмом уточнения скрытых представлений. Подход использует четыре ключевых компонента: декомпозицию блоков, селективный вентиль для стабилизации скрытых состояний, глубокий супервизор для эффективного обучения и адаптивный ранний выход на основе доверия. Фреймворк позволяет улучшить логические способности модели во время инференции, масштабируя вычислительные ресурсы, без необходимости переобучения с нуля или разрушительных модификаций архитектуры. LoopUS стабилизирует циклические вычисления и предотвращает коллапс представлений, достигая лучшей производительности на задачах рассуждения без расширения трассировки вывода.'}, 'en': {'title': 'Transforming LLMs for Enhanced Reasoning with LoopUS', 'desc': "LoopUS is a framework that enhances pretrained large language models (LLMs) by converting them into looped architectures, which improves their reasoning abilities. It achieves this through a process called latent-refinement and includes mechanisms for adaptive early exiting, allowing the model to make decisions about when to stop processing. The framework consists of four main components that help maintain the model's performance while reducing computational costs. Overall, LoopUS enables better reasoning without the need for extensive retraining or compromising the model's existing capabilities."}, 'zh': {'title': 'LoopUS：提升推理性能的循环架构', 'desc': 'LoopUS 是一个后训练框架，旨在将预训练的大型语言模型（LLM）转变为循环架构，以提高推理性能。该框架通过潜在细化和自适应提前退出机制来实现这一目标，避免了从头训练递归模型的高计算成本。LoopUS 将预训练的 LLM 重新构建为编码器、循环推理块和解码器，并通过四个核心组件来优化其性能。最终，LoopUS 在不增加计算负担的情况下，提升了模型的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.09530', 'title': 'MemPrivacy: Privacy-Preserving Personalized Memory Management for Edge-Cloud Agents', 'url': 'https://huggingface.co/papers/2605.09530', 'abstract': 'Abstract MemPrivacy enables privacy-preserving personalized memory in edge-cloud environments by using type-aware placeholders to protect sensitive data while maintaining semantic integrity for effective memory operations.  AI-generated summary As LLM-powered agents are increasingly deployed in edge-cloud environments, personalized memory has become a key enabler of long-term adaptation and user-centric interaction. However, cloud-assisted memory management exposes sensitive user information, while existing privacy protection methods typically rely on aggressive masking that removes task-relevant semantics and consequently degrades memory utility and personalization quality. To address this challenge, We propose MemPrivacy, which identifies privacy-sensitive spans on edge devices, replaces them with semantically structured type-aware placeholders for cloud-side memory processing, and restores the original values locally when needed. By decoupling privacy protection from semantic destruction, MemPrivacy minimizes sensitive data exposure while retaining the information required for effective memory formation and retrieval. We also construct MemPrivacy-Bench for systematic evaluation, a dataset covering 200 users and over 52k privacy instances, and introduce a four-level privacy taxonomy for configurable protection policies. Experiments show that MemPrivacy achieves strong performance in privacy information extraction, substantially surpassing strong general-purpose models such as GPT-5.2 and Gemini-3.1-Pro, while also reducing inference latency. Across multiple widely used memory systems, MemPrivacy limits utility loss to within 1.6%, outperforming baseline masking strategies. Overall, MemPrivacy offers an effective balance between privacy protection and personalized memory utility for edge-cloud agents, enabling secure, practical, and user-transparent deployment.', 'score': 3, 'issue_id': 2213, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': 'cade3cc6346942d4', 'authors': ['Yining Chen', 'Jihao Zhao', 'Bo Tang', 'Haofen Wang', 'Yue Zhang', 'Fei Huang', 'Feiyu Xiong', 'Zhiyu Li'], 'affiliations': ['HONOR Device Co., Ltd.', 'MemTensor (Shanghai) Technology Co., Ltd.', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09530.jpg', 'data': {'categories': ['#inference', '#benchmark', '#agents', '#dataset', '#leakage', '#security'], 'emoji': '🔐', 'ru': {'title': 'Защита приватности без потери смысла в памяти агентов', 'desc': 'MemPrivacy — это система для защиты приватных данных в персонализированной памяти LLM-агентов, развёрнутых в гибридных окружениях edge-cloud. Вместо агрессивного маскирования, которое разрушает семантику и снижает полезность памяти, метод заменяет чувствительные данные на типизированные плейсхолдеры, сохраняя семантическую целостность. Восстановление исходных значений происходит локально на edge-устройстве, что минимизирует утечку приватной информации в облако. Экспериментальная оценка показывает, что MemPrivacy достигает баланса между защитой данных и качеством персонализации с потерей полезности менее 1,6%.'}, 'en': {'title': 'Balancing Privacy and Memory Utility in Edge-Cloud Systems', 'desc': 'MemPrivacy is a novel approach designed to protect sensitive user data in edge-cloud environments while still allowing for personalized memory management. It uses type-aware placeholders to replace privacy-sensitive information, ensuring that the semantic meaning is preserved for effective memory operations. This method allows for the retrieval of original data locally, minimizing exposure of sensitive information without sacrificing memory utility. The proposed system has been evaluated using a comprehensive dataset and has shown to outperform existing privacy protection methods in both privacy extraction and memory performance.'}, 'zh': {'title': '隐私保护与个性化记忆的完美平衡', 'desc': 'MemPrivacy是一种在边缘云环境中实现隐私保护的个性化记忆的方法。它通过使用类型感知的占位符来保护敏感数据，同时保持语义完整性，以便有效地进行记忆操作。该方法能够在边缘设备上识别隐私敏感的内容，并在云端处理时用占位符替代，必要时再在本地恢复原始值。实验表明，MemPrivacy在隐私信息提取方面表现优异，同时在多个记忆系统中保持了较低的效用损失。'}}}, {'id': 'https://huggingface.co/papers/2605.12449', 'title': 'LychSim: A Controllable and Interactive Simulation Framework for Vision Research', 'url': 'https://huggingface.co/papers/2605.12449', 'abstract': "Abstract A simulation framework called LychSim is introduced, featuring a Python API, procedural data pipeline, and MCP integration to enable controllable and interactive environments for vision system development and evaluation.  AI-generated summary While self-supervised pretraining has reduced vision systems' reliance on synthetic data, simulation remains an indispensable tool for closed-loop optimization and rigorous out-of-distribution (OOD) evaluation. However, modern simulation platforms often present steep technical barriers, requiring extensive expertise in computer graphics and game development. In this work, we present LychSim, a highly controllable and interactive simulation framework built upon Unreal Engine 5 to bridge this gap. LychSim is built around three key designs: (1) a streamlined Python API that abstracts away underlying engine complexities; (2) a procedural data pipeline capable of generating diverse, high-fidelity environments with varying out-of-distribution (OOD) visual challenges, paired with rich 2D and 3D ground truths; and (3) a native integration of the Model Context Protocol (MCP) that transforms the simulator into a dynamic, closed-loop playground for reasoning agentic LLMs. We further annotate scene-level procedural rules and object-level pose alignments to enable semantically aligned 3D ground truths and automated scene modification. We demonstrate LychSim's capability across multiple downstream applications, including serving as a synthetic data engine, powering reinforcement learning-based adversarial examiners, and facilitating interactive, language-driven scene layout generation. To benefit the broader vision community, LychSim will be made publicly available, including full source code and various data annotations.", 'score': 2, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '5dfb8567d0ec7889', 'authors': ['Wufei Ma', 'Chloe Wang', 'Siyi Chen', 'Jiawei Peng', 'Patrick Li', 'Alan Yuille'], 'affiliations': ['Johns Hopkins University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12449.jpg', 'data': {'categories': ['#synthetic', '#agents', '#cv', '#rl', '#open_source', '#dataset', '#3d', '#reasoning'], 'emoji': '🎮', 'ru': {'title': 'Симуляция без барьеров: доступный фреймворк для развития зрительных систем', 'desc': 'Представлен фреймворк LychSim — симуляционная платформа на основе Unreal Engine 5, которая упрощает разработку и тестирование систем компьютерного зрения. Платформа предоставляет удобный Python API для абстрагирования сложности графического движка, процедурный конвейер данных для генерации разнообразных синтетических окружений с контролируемыми визуальными искажениями и богатой разметкой, а также интеграцию Model Context Protocol для взаимодействия с аагентными LLM. Фреймворк демонстрирует универсальность через приложения в генерации синтетических данных, обучении с подкреплением и интерактивной генерации сцен на основе естественного языка.'}, 'en': {'title': 'LychSim: Simplifying Simulation for Vision System Development', 'desc': 'LychSim is a new simulation framework designed to help develop and evaluate vision systems in a more accessible way. It features a Python API that simplifies the use of complex game engine technologies, making it easier for developers without extensive graphics knowledge. The framework can create diverse and realistic environments that challenge vision systems, providing valuable data for training and testing. Additionally, it integrates the Model Context Protocol (MCP) to allow for dynamic interactions, making it a versatile tool for various applications in machine learning and AI.'}, 'zh': {'title': 'LychSim：可控的视觉系统模拟框架', 'desc': 'LychSim是一个新的模拟框架，旨在为视觉系统的开发和评估提供可控和互动的环境。它基于虚幻引擎5，具有简化的Python API和程序化数据管道，能够生成多样化的高保真环境。LychSim还集成了模型上下文协议（MCP），使得模拟器可以作为一个动态的闭环平台，支持推理代理的学习。该框架的设计使得用户能够轻松创建和修改场景，促进了合成数据生成和强化学习等多种应用。'}}}, {'id': 'https://huggingface.co/papers/2605.11518', 'title': 'AutoLLMResearch: Training Research Agents for Automating LLM Experiment Configuration -- Learning from Cheap, Optimizing Expensive', 'url': 'https://huggingface.co/papers/2605.11518', 'abstract': 'Abstract An agentic framework called AutoLLMResearch automates high-cost large language model experiment configurations by learning from multi-fidelity experimental environments and enabling efficient configuration identification through cross-fidelity extrapolation.  AI-generated summary Effectively configuring scalable large language model (LLM) experiments, spanning architecture design, hyperparameter tuning, and beyond, is crucial for advancing LLM research, as poor configuration choices can waste substantial computational resources and prevent models from realizing their full potential. Prior automated methods are designed for low-cost settings where repeated trial and error is feasible, but scalable LLM experiments are too expensive for such extensive iteration. To our knowledge, no work has addressed the automation of high-cost LLM experiment configurations, leaving this problem labor-intensive and dependent on expert intuition. Motivated by this gap, we propose AutoLLMResearch, an agentic framework that mimics how human researchers learn generalizable principles from low-fidelity experiments and extrapolate to efficiently identify promising configurations in expensive LLM settings. The core challenge is how to enable an agent to learn, through interaction with a multi-fidelity experimental environment that captures the structure of the LLM configuration landscape. To achieve this, we propose a systematic framework with two key components: 1) LLMConfig-Gym, a multi-fidelity environment encompassing four critical LLM experiment tasks, supported by over one million GPU hours of verifiable experiment outcomes; 2) A structured training pipeline that formulates configuration research as a long-horizon Markov Decision Process and accordingly incentivizes cross-fidelity extrapolation reasoning. Extensive evaluation against diverse strong baselines on held-out experiments demonstrates the effectiveness, generalization, and interpretability of our framework, supporting its potential as a practical and general solution for scalable real-world LLM experiment automation.', 'score': 2, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '2129465b156f2d2e', 'authors': ['Taicheng Guo', 'Nitesh V. Chawla', 'Olaf Wiest', 'Xiangliang Zhang'], 'affiliations': ['University of Notre Dame'], 'pdf_title_img': 'assets/pdf/title_img/2605.11518.jpg', 'data': {'categories': ['#benchmark', '#agents', '#optimization', '#open_source', '#dataset', '#science', '#training'], 'emoji': '🤖', 'ru': {'title': 'Обучение агента экстраполировать знания между дорогими и дешевыми экспериментами LLM', 'desc': 'Авторы представляют AutoLLMResearch — агентный фреймворк для автоматизации конфигурации дорогостоящих экспериментов с большими языковыми моделями. Система обучается на многоуровневой среде LLMConfig-Gym, содержащей более миллиона GPU часов экспериментальных данных, и использует принципы трансферного обучения для экстраполяции знаний между экспериментами разной стоимости. Фреймворк формализует поиск конфигураций как долгоклассный марковский процесс принятия решений, позволяя агенту обобщать закономерности, обнаруженные на дешёвых экспериментах, и применять их для эффективного поиска оптимальных конфигураций в дорогостоящих сценариях. Экспериментальная оценка демонстрирует эффективность, обобщаемость и интерпретируемость подхода как практического решения для масштабной автоматизации экспериментов с LLM.'}, 'en': {'title': 'Automating Large Language Model Experiment Configurations Efficiently', 'desc': 'The paper introduces AutoLLMResearch, a framework designed to automate the configuration of large language model (LLM) experiments, which are often costly and complex. It addresses the challenge of efficiently identifying optimal configurations by learning from both low-cost and high-cost experimental environments. The framework includes LLMConfig-Gym, a multi-fidelity environment that simulates various LLM tasks, and a training pipeline that treats configuration research as a Markov Decision Process. The results show that AutoLLMResearch can effectively generalize and provide interpretable solutions for automating LLM experiments, making it a valuable tool for researchers.'}, 'zh': {'title': '自动化高成本语言模型实验配置的创新框架', 'desc': '本文提出了一种名为AutoLLMResearch的框架，旨在自动化高成本的大型语言模型实验配置。该框架通过学习多保真度实验环境，能够有效识别配置，从而减少计算资源的浪费。与以往仅适用于低成本设置的自动化方法不同，AutoLLMResearch能够在高成本环境中进行有效的配置选择。通过构建LLMConfig-Gym和系统化的训练流程，该框架展示了在真实世界中自动化大型语言模型实验的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.12119', 'title': 'MoCam: Unified Novel View Synthesis via Structured Denoising Dynamics', 'url': 'https://huggingface.co/papers/2605.12119', 'abstract': 'Abstract MoCam addresses the challenge of generative novel view synthesis by dynamically coordinating geometric and appearance priors through structured denoising dynamics within a diffusion framework.  AI-generated summary Generative novel view synthesis faces a fundamental dilemma: geometric priors provide spatial alignment but become sparse and inaccurate under view changes, while appearance priors offer visual fidelity but lack geometric correspondence. Existing methods either propagate geometric errors throughout generation or suffer from signal conflicts when fusing both statically. We introduce MoCam, which employs structured denoising dynamics to orchestrate a coordinated progression from geometry to appearance within the diffusion process.MoCam first leverages geometric priors in early stages to anchor coarse structures and tolerate their incompleteness, then switches to appearance priors in later stages to actively correct geometric errors and refine details. This design naturally unifies static and dynamic view synthesis by temporally decoupling geometric alignment and appearance refinement within the diffusion process.Experiments demonstrate that MoCam significantly outperforms prior methods, particularly when point clouds contain severe holes or distortions, achieving robust geometry-appearance disentanglement.', 'score': 1, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '93ec5bc223b9f0cb', 'authors': ['Haofeng Liu', 'Yang Zhou', 'Ziheng Wang', 'Zhengbo Xu', 'Zhan Peng', 'Jie Ma', 'Jun Liang', 'Shengfeng He', 'Jing Li'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.12119.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '📷', 'ru': {'title': 'Поэтапная координация геометрии и внешнего вида в диффузионном синтезе видов', 'desc': 'MoCam решает задачу генеративного синтеза новых ракурсов, динамически координируя геометрические и визуальные приоры через структурированную диффузионную динамику. Метод использует геометрические приоры на ранних этапах денойзинга для стабилизации грубой структуры, а затем переходит к визуальным приорам на поздних этапах для коррекции ошибок и уточнения деталей. Такой подход естественным образом разделяет процессы геометрического выравнивания и уточнения внешнего вида во времени, избегая конфликтов между приорами. Экспериментально показано, что MoCam значительно превосходит существующие методы, особенно при работе с неполными облаками точек.'}, 'en': {'title': 'MoCam: Harmonizing Geometry and Appearance in View Synthesis', 'desc': 'MoCam is a novel approach to generative novel view synthesis that effectively combines geometric and appearance information. It uses a structured denoising process within a diffusion framework to manage the transition from geometry to appearance. In the initial stages, MoCam focuses on geometric priors to establish a rough structure, which helps in dealing with incomplete data. Later, it shifts to appearance priors to refine details and correct any geometric inaccuracies, leading to improved performance, especially in challenging scenarios with distorted or incomplete point clouds.'}, 'zh': {'title': 'MoCam：动态协调几何与外观的生成新视角合成', 'desc': 'MoCam是一种新方法，旨在解决生成新视角合成中的挑战。它通过在扩散框架内动态协调几何先验和外观先验，利用结构化去噪动态来实现。MoCam在早期阶段利用几何先验来固定粗略结构，然后在后期阶段切换到外观先验，以主动修正几何错误并细化细节。实验表明，MoCam在处理严重孔洞或失真的点云时，显著优于现有方法，成功实现了几何与外观的解耦。'}}}, {'id': 'https://huggingface.co/papers/2605.12357', 'title': 'δ-mem: Efficient Online Memory for Large Language Models', 'url': 'https://huggingface.co/papers/2605.12357', 'abstract': "Abstract A lightweight memory mechanism called δ-mem enhances large language models by augmenting a frozen attention backbone with a compact associative memory state that provides low-rank corrections to attention computations.  AI-generated summary Large language models increasingly need to accumulate and reuse historical information in long-term assistants and agent systems. Simply expanding the context window is costly and often fails to ensure effective context utilization. We propose δ-mem, a lightweight memory mechanism that augments a frozen full-attention backbone with a compact online state of associative memory. δ-mem compresses past information into a fixed-size state matrix updated by delta-rule learning, and uses its readout to generate low-rank corrections to the backbone's attention computation during generation. With only an 8times8 online memory state, δ-mem improves the average score to 1.10times that of the frozen backbone and 1.15times that of the strongest non-δ-mem memory baseline. It achieves larger gains on memory-heavy benchmarks, reaching 1.31times on MemoryAgentBench and 1.20times on LoCoMo, while largely preserving general capabilities. These results show that effective memory can be realized through a compact online state directly coupled with attention computation, without full fine-tuning, backbone replacement, or explicit context extension.", 'score': 1, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd5aa685a8b4d3d08', 'authors': ['Jingdi Lei', 'Di Zhang', 'Junxian Li', 'Weida Wang', 'Kaixuan Fan', 'Xiang Liu', 'Qihan Liu', 'Xiaoteng Ma', 'Baian Chen', 'Soujanya Poria'], 'affiliations': ['Fudan University', 'Mind Lab', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.12357.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Компактная память для больших языковых моделей без переобучения', 'desc': 'В работе представлен δ-mem — лёгкий механизм памяти, который дополняет замороженную сеть внимания компактным состоянием ассоциативной памяти. Механизм сжимает историческую информацию в матрицу фиксированного размера (8×8), которая обновляется с помощью дельта-обучения, и использует её для генерации низкоранговых коррекций к вычислениям внимания. δ-mem не требует дополнительной настройки всей модели, замены архитектуры или расширения контекстного окна. Эксперименты показывают улучшение производительности в 1.10–1.31 раза на задачах, требующих долгосрочной памяти, при сохранении основных способностей модели.'}, 'en': {'title': 'Enhancing Language Models with Compact Memory Mechanism', 'desc': "The paper introduces δ-mem, a lightweight memory mechanism designed to enhance large language models by integrating a compact associative memory state with a frozen attention backbone. This mechanism allows the model to efficiently accumulate and utilize historical information without the need for costly context window expansions. δ-mem employs delta-rule learning to update a fixed-size state matrix, which provides low-rank corrections to the attention computations during text generation. The results demonstrate that δ-mem significantly improves performance on memory-intensive tasks while maintaining the model's overall capabilities."}, 'zh': {'title': '轻量级记忆机制δ-mem提升语言模型性能', 'desc': '本文提出了一种轻量级的记忆机制δ-mem，旨在增强大型语言模型的性能。它通过在固定的注意力骨干网络上增加一个紧凑的关联记忆状态，提供低秩修正来优化注意力计算。δ-mem将过去的信息压缩成一个固定大小的状态矩阵，并通过增量学习进行更新，从而在生成过程中对注意力计算进行修正。实验结果表明，δ-mem在内存密集型基准测试中表现出显著的性能提升，同时保持了模型的通用能力。'}}}, {'id': 'https://huggingface.co/papers/2605.11182', 'title': 'The Many Faces of On-Policy Distillation: Pitfalls, Mechanisms, and Fixes', 'url': 'https://huggingface.co/papers/2605.11182', 'abstract': "Abstract On-policy distillation and self-distillation methods for large language models exhibit varying effectiveness depending on teacher choice, loss formulation, and instance-specific privileged information availability, with identified failure mechanisms including distribution mismatch, optimization instability, and PI-free policy learning.  AI-generated summary On-policy distillation (OPD) and on-policy self-distillation (OPSD) have emerged as promising post-training methods for large language models, offering dense token-level supervision on trajectories sampled from the model's own policy. However, existing results on their effectiveness remain mixed: while OP(S)D has shown promise in system prompt and knowledge internalization, recent studies also report instability and degradation. In this work, we present a comprehensive empirical study of when OPD and OPSD work, when they fail, and why. We find that OPD on mathematical reasoning is highly sensitive to teacher choice and loss formulation, whereas OPSD fails in our tested settings due to test-time absence of instance-specific privileged information (PI). In contrast, OPSD is effective when PI represents a shared latent rule, such as a system prompt or alignment preference. We identify three failure mechanisms: (1) distribution mismatch between teacher and student caused by conditioning on student-generated prefixes, (2) optimization instability from biased TopK reverse-KL gradients, and (3) an OPSD-specific limitation where the student learns a PI-free policy that aggregates PI-conditioned teachers, which is insufficient when PI is instance-specific. We further show that stop-gradient TopK objectives, RLVR-adapted teachers, and SFT-stabilized students mitigate these failures.", 'score': 1, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '7b0bebd97f939191', 'authors': ['Siqi Zhu', 'Xuyan Ye', 'Hongyu Lu', 'Weiye Shi', 'Ge Liu'], 'affiliations': ['Peking University', 'Renmin University of China', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.11182.jpg', 'data': {'categories': ['#alignment', '#math', '#optimization', '#reasoning', '#rlhf', '#training'], 'emoji': '🧠', 'ru': {'title': 'Когда и почему дистилляция на собственной политике для LLM работает или fails', 'desc': 'В работе исследуются методы дистилляции на собственной политике (on-policy distillation) и самодистилляции для больших языковых моделей. Авторы выявляют три ключевых механизма отказа: несоответствие распределений между учителем и студентом, нестабильность оптимизации из-за смещённых градиентов, и неспособность модели обучаться политике, зависящей от привилегированной информации. Исследование показывает, что эффективность методов сильно зависит от выбора учителя, формулировки функции потерь и доступности информации на время инференса. Предложены техники стабилизации, включаяStop-Gradient TopK, RLVR-адаптированных учителей и SFT-стабилизированных студентов.'}, 'en': {'title': 'Optimizing Distillation: Navigating Challenges in Language Model Training', 'desc': 'This paper investigates the effectiveness of on-policy distillation (OPD) and on-policy self-distillation (OPSD) methods for large language models. It highlights that the success of these methods depends significantly on the choice of teacher models, the formulation of loss functions, and the availability of instance-specific privileged information (PI). The authors identify key failure mechanisms such as distribution mismatch, optimization instability, and challenges in learning policies without instance-specific PI. They propose solutions like stop-gradient TopK objectives and RLVR-adapted teachers to address these issues and improve the performance of OPD and OPSD.'}, 'zh': {'title': '优化在线蒸馏与自蒸馏的有效性', 'desc': '本文研究了大语言模型的在线蒸馏（OPD）和自蒸馏（OPSD）方法的有效性，发现其效果受教师选择、损失函数和特定实例的特权信息（PI）影响。研究表明，OPD在数学推理任务中对教师选择和损失函数非常敏感，而OPSD在缺乏特定实例的PI时表现不佳。文章识别了三种失败机制，包括教师与学生之间的分布不匹配、优化不稳定性以及OPSD特有的限制。最后，提出了一些方法来缓解这些问题，如停止梯度TopK目标和适应性教师。'}}}];
        const articlesContainer = document.getElementById('articles-container');

            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('filter-logic-and').addEventListener('change', () => {

        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');

        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (4)', '#agi', '#alignment (1)', '#architecture', '#audio', '#benchmark (4)', '#cv (1)', '#data', '#dataset (4)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage (1)', '#long_context (1)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual', '#multimodal', '#open_source (3)', '#optimization (5)', '#plp (1)', '#rag', '#reasoning (4)', '#rl (2)', '#rlhf (2)', '#robotics', '#science (1)', '#security (1)', '#small_models (1)', '#story_generation (1)', '#survey', '#synthetic (1)', '#training (3)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);

                const button = document.createElement('span');

                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();

            setFilterOptionsVisibility();

            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-13 02:27',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-13 02:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-13 02:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
