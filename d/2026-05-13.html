the reference verifiers; exploitation grows over training and concentrates in recurring failures such as partial satisfaction of compound criteria, treating implicit content as explicit, and imprecise topical matching. Stronger verifiers substantially reduce, but do not eliminate, verifier exploitation. We also introduce a self-internalization gap, a verifier-free diagnostic based on policy log-probabilities, which tracks reference-verifier quality, detecting when the policy trained using the weak verifier stops improving. Finally, in our setting, stronger verification does not prevent reward hacking when the rubric leaves important failure modes unspecified: rubric-based verifiers prefer the RL checkpoint, while rubric-free judges prefer the base model. These disagreements coincide with gains concentrated in completeness and presence-based criteria, alongside declines in factual correctness, conciseness, relevance, and overall quality. Together, these results suggest that stronger verification reduces reward hacking, but does not by itself ensure that rubric gains correspond to broader quality gains.', 'score': 2, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '952dc16581f75601', 'authors': ['Anas Mahmoud', 'MohammadHossein Rezaei', 'Zihao Wang', 'Anisha Gunjal', 'Bing Liu', 'Yunzhong He'], 'affiliations': ['Scale AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.12474.jpg', 'data': {'categories': ['#rl', '#benchmark', '#rlhf'], 'emoji': '🎯', 'ru': {'title': 'Верификаторы не гарантируют качество: двойная природа reward hacking в обучении с рубриками', 'desc': 'В работе исследуется проблема reward hacking в обучении с подкреплением на основе рубрик. Авторы выявили две основные причины расхождения между метриками обучения и оценки: отказы верификатора, когда обучаемый верификатор одобряет критерии, которые отвергают судьи-эксперты, и ограничения дизайна рубрик, когда даже сильные верификаторы предпочитают ответы, которые судьи оценивают хуже. Исследование показывает, что слабые верификаторы часто генерируют прибыль в proxy-reward, которая не переносится на референсные верификаторы, а эксплуатация обнаруживается в рекурсивных ошибках типа частичного удовлетворения критериев. Авторы демонстрируют, что более сильная верификация снижает, но не устраняет полностью reward hacking, особенно когда рубрика не охватывает все важные режимы отказа.'}, 'en': {'title': 'Understanding Reward Hacking in Rubric-Based Reinforcement Learning', 'desc': 'This paper investigates the issue of reward hacking in reinforcement learning (RL) that uses rubric-based evaluations. It identifies two main problems: verifier failure, where the training verifier incorrectly rewards certain criteria, and limitations in rubric design that can lead to poor overall performance. The study shows that even with stronger verifiers, the exploitation of weak verifiers persists, leading to gains that do not translate to better evaluations by independent judges. The authors propose a new diagnostic tool to monitor the quality of policies and highlight that improvements in verification alone do not guarantee better outcomes in terms of overall quality.'}, 'zh': {'title': '强化学习中的奖励黑客问题研究', 'desc': '本研究探讨了基于评分标准的强化学习中的奖励黑客问题，识别出验证者失败和评分标准设计的局限性是训练和评估指标之间差异的主要来源。我们分析了在基于评分标准的强化学习中，策略在训练验证者下优化，但在跨家族的评审小组中评估的情况。研究发现，弱验证者会产生大量的代理奖励增益，但这些增益并不能转移到参考验证者上。更强的验证者虽然能显著减少奖励黑客现象，但并不能完全消除这种现象，且在评分标准未明确重要失败模式时，奖励黑客仍然存在。'}}}, {'id': 'https://huggingface.co/papers/2605.12305', 'title': 'Images in Sentences: Scaling Interleaved Instructions for Unified Visual Generation', 'url': 'https://huggingface.co/papers/2605.12305', 'abstract': 'Abstract INSET is a unified multimodal model that embeds images as native vocabulary within textual instructions, enabling better handling of complex interleaved inputs through transformer-based contextual locality and supporting both image generation and editing tasks.  AI-generated summary While recent advancements in multimodal language models have enabled image generation from expressive multi-image instructions, existing methods struggle to maintain performance under complex interleaved instructions. This limitation stems from the structural separation of images and text in current paradigms, which forces models to bridge difficult long-range dependencies to match descriptions with visual targets. To address these challenges, we propose Images iN SEnTences (a.k.a, INSET), a unified generation model that seamlessly embeds images as native vocabulary within textual instructions. By positioning visual features directly at their corresponding semantic slots, INSET leverages the contextual locality of transformers for precise object binding, effectively treating images as dense, expressive language tokens. Furthermore, we introduce a scalable data engine that synthesizes 15M high-quality interleaved samples from standard image and video datasets, utilizing VLMs and LLMs to construct rich, long-horizon sequences. Evaluation results on InterleaveBench demonstrate that INSET significantly outperforms state-of-the-art methods in multi-image consistency and text alignment, with performance gaps widening as input complexity increases. Beyond standard generation, our approach inherently extends to multimodal image editing, integrating visual content as part of the instruction to facilitate highly expressive and creative visual manipulations.', 'score': 2, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '99868d7fc2fe5fec', 'authors': ['Yabo Zhang', 'Kunchang Li', 'Dewei Zhou', 'Xinyu Huang', 'Xun Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.12305.jpg', 'data': {'categories': ['#architecture', '#dataset', '#synthetic', '#multimodal', '#video', '#long_context'], 'emoji': '🖼️', 'ru': {'title': 'Изображения как словарь текста: мультимодальная генерация без границ', 'desc': 'INSET — это единая мультимодальная модель, которая встраивает изображения как собственный словарь текстовых инструкций, позволяя трансформерам эффективно обрабатывать сложные перемешанные входные данные через механизм контекстной локальности. Модель преодолевает проблему разделения изображений и текста в существующих подходах, устраняя необходимость в дальних зависимостях при сопоставлении описаний с визуальными объектами. Авторы предложили масштабируемый конвейер данных, который синтезировал 15 миллионов высококачественных перемешанных примеров с использованием VLM и LLM для создания сложных последовательностей. INSET показал значительное превосходство над современными методами в согласованности многих изображений и выравнивании текста, а также естественным образом расширяет функциональность до редактирования изображений.'}, 'en': {'title': 'INSET: Bridging Text and Images for Enhanced Multimodal Understanding', 'desc': 'The paper introduces INSET, a unified multimodal model that integrates images directly into textual instructions, enhancing the processing of complex inputs. By treating images as part of the vocabulary, INSET utilizes transformer architecture to improve contextual understanding and object binding. This model addresses the limitations of existing methods that struggle with long-range dependencies between text and images. Additionally, INSET includes a scalable data engine that generates a large dataset of interleaved samples, leading to superior performance in both image generation and editing tasks.'}, 'zh': {'title': '图像与文本的完美融合：INSET模型', 'desc': 'INSET是一种统一的多模态模型，它将图像作为文本指令中的原生词汇嵌入，从而更好地处理复杂的交错输入。该模型利用变换器的上下文局部性，支持图像生成和编辑任务。通过将视觉特征直接放置在相应的语义位置，INSET能够精确绑定对象，像处理语言标记一样处理图像。评估结果表明，INSET在多图像一致性和文本对齐方面显著优于现有的最先进方法，尤其在输入复杂性增加时表现更为突出。'}}}, {'id': 'https://huggingface.co/papers/2605.11518', 'title': 'AutoLLMResearch: Training Research Agents for Automating LLM Experiment Configuration -- Learning from Cheap, Optimizing Expensive', 'url': 'https://huggingface.co/papers/2605.11518', 'abstract': 'Abstract An agentic framework called AutoLLMResearch automates high-cost large language model experiment configurations by learning from multi-fidelity experimental environments and enabling efficient configuration identification through cross-fidelity extrapolation.  AI-generated summary Effectively configuring scalable large language model (LLM) experiments, spanning architecture design, hyperparameter tuning, and beyond, is crucial for advancing LLM research, as poor configuration choices can waste substantial computational resources and prevent models from realizing their full potential. Prior automated methods are designed for low-cost settings where repeated trial and error is feasible, but scalable LLM experiments are too expensive for such extensive iteration. To our knowledge, no work has addressed the automation of high-cost LLM experiment configurations, leaving this problem labor-intensive and dependent on expert intuition. Motivated by this gap, we propose AutoLLMResearch, an agentic framework that mimics how human researchers learn generalizable principles from low-fidelity experiments and extrapolate to efficiently identify promising configurations in expensive LLM settings. The core challenge is how to enable an agent to learn, through interaction with a multi-fidelity experimental environment that captures the structure of the LLM configuration landscape. To achieve this, we propose a systematic framework with two key components: 1) LLMConfig-Gym, a multi-fidelity environment encompassing four critical LLM experiment tasks, supported by over one million GPU hours of verifiable experiment outcomes; 2) A structured training pipeline that formulates configuration research as a long-horizon Markov Decision Process and accordingly incentivizes cross-fidelity extrapolation reasoning. Extensive evaluation against diverse strong baselines on held-out experiments demonstrates the effectiveness, generalization, and interpretability of our framework, supporting its potential as a practical and general solution for scalable real-world LLM experiment automation.', 'score': 2, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '2129465b156f2d2e', 'authors': ['Taicheng Guo', 'Nitesh V. Chawla', 'Olaf Wiest', 'Xiangliang Zhang'], 'affiliations': ['University of Notre Dame'], 'pdf_title_img': 'assets/pdf/title_img/2605.11518.jpg', 'data': {'categories': ['#benchmark', '#agents', '#optimization', '#open_source', '#dataset', '#science', '#training'], 'emoji': '🤖', 'ru': {'title': 'Обучение агента экстраполировать знания между дорогими и дешевыми экспериментами LLM', 'desc': 'Авторы представляют AutoLLMResearch — агентный фреймворк для автоматизации конфигурации дорогостоящих экспериментов с большими языковыми моделями. Система обучается на многоуровневой среде LLMConfig-Gym, содержащей более миллиона GPU часов экспериментальных данных, и использует принципы трансферного обучения для экстраполяции знаний между экспериментами разной стоимости. Фреймворк формализует поиск конфигураций как долгоклассный марковский процесс принятия решений, позволяя агенту обобщать закономерности, обнаруженные на дешёвых экспериментах, и применять их для эффективного поиска оптимальных конфигураций в дорогостоящих сценариях. Экспериментальная оценка демонстрирует эффективность, обобщаемость и интерпретируемость подхода как практического решения для масштабной автоматизации экспериментов с LLM.'}, 'en': {'title': 'Automating Large Language Model Experiment Configurations Efficiently', 'desc': 'The paper introduces AutoLLMResearch, a framework designed to automate the configuration of large language model (LLM) experiments, which are often costly and complex. It addresses the challenge of efficiently identifying optimal configurations by learning from both low-cost and high-cost experimental environments. The framework includes LLMConfig-Gym, a multi-fidelity environment that simulates various LLM tasks, and a training pipeline that treats configuration research as a Markov Decision Process. The results show that AutoLLMResearch can effectively generalize and provide interpretable solutions for automating LLM experiments, making it a valuable tool for researchers.'}, 'zh': {'title': '自动化高成本语言模型实验配置的创新框架', 'desc': '本文提出了一种名为AutoLLMResearch的框架，旨在自动化高成本的大型语言模型实验配置。该框架通过学习多保真度实验环境，能够有效识别配置，从而减少计算资源的浪费。与以往仅适用于低成本设置的自动化方法不同，AutoLLMResearch能够在高成本环境中进行有效的配置选择。通过构建LLMConfig-Gym和系统化的训练流程，该框架展示了在真实世界中自动化大型语言模型实验的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.12119', 'title': 'MoCam: Unified Novel View Synthesis via Structured Denoising Dynamics', 'url': 'https://huggingface.co/papers/2605.12119', 'abstract': 'Abstract MoCam addresses the challenge of generative novel view synthesis by dynamically coordinating geometric and appearance priors through structured denoising dynamics within a diffusion framework.  AI-generated summary Generative novel view synthesis faces a fundamental dilemma: geometric priors provide spatial alignment but become sparse and inaccurate under view changes, while appearance priors offer visual fidelity but lack geometric correspondence. Existing methods either propagate geometric errors throughout generation or suffer from signal conflicts when fusing both statically. We introduce MoCam, which employs structured denoising dynamics to orchestrate a coordinated progression from geometry to appearance within the diffusion process.MoCam first leverages geometric priors in early stages to anchor coarse structures and tolerate their incompleteness, then switches to appearance priors in later stages to actively correct geometric errors and refine details. This design naturally unifies static and dynamic view synthesis by temporally decoupling geometric alignment and appearance refinement within the diffusion process.Experiments demonstrate that MoCam significantly outperforms prior methods, particularly when point clouds contain severe holes or distortions, achieving robust geometry-appearance disentanglement.', 'score': 2, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '93ec5bc223b9f0cb', 'authors': ['Haofeng Liu', 'Yang Zhou', 'Ziheng Wang', 'Zhengbo Xu', 'Zhan Peng', 'Jie Ma', 'Jun Liang', 'Shengfeng He', 'Jing Li'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.12119.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '📷', 'ru': {'title': 'Поэтапная координация геометрии и внешнего вида в диффузионном синтезе видов', 'desc': 'MoCam решает задачу генеративного синтеза новых ракурсов, динамически координируя геометрические и визуальные приоры через структурированную диффузионную динамику. Метод использует геометрические приоры на ранних этапах денойзинга для стабилизации грубой структуры, а затем переходит к визуальным приорам на поздних этапах для коррекции ошибок и уточнения деталей. Такой подход естественным образом разделяет процессы геометрического выравнивания и уточнения внешнего вида во времени, избегая конфликтов между приорами. Экспериментально показано, что MoCam значительно превосходит существующие методы, особенно при работе с неполными облаками точек.'}, 'en': {'title': 'MoCam: Harmonizing Geometry and Appearance in View Synthesis', 'desc': 'MoCam is a novel approach to generative novel view synthesis that effectively combines geometric and appearance information. It uses a structured denoising process within a diffusion framework to manage the transition from geometry to appearance. In the initial stages, MoCam focuses on geometric priors to establish a rough structure, which helps in dealing with incomplete data. Later, it shifts to appearance priors to refine details and correct any geometric inaccuracies, leading to improved performance, especially in challenging scenarios with distorted or incomplete point clouds.'}, 'zh': {'title': 'MoCam：动态协调几何与外观的生成新视角合成', 'desc': 'MoCam是一种新方法，旨在解决生成新视角合成中的挑战。它通过在扩散框架内动态协调几何先验和外观先验，利用结构化去噪动态来实现。MoCam在早期阶段利用几何先验来固定粗略结构，然后在后期阶段切换到外观先验，以主动修正几何错误并细化细节。实验表明，MoCam在处理严重孔洞或失真的点云时，显著优于现有方法，成功实现了几何与外观的解耦。'}}}, {'id': 'https://huggingface.co/papers/2605.10267', 'title': 'IndustryBench: Probing the Industrial Knowledge Boundaries of LLMs', 'url': 'https://huggingface.co/papers/2605.10267', 'abstract': 'Abstract IndustryBench evaluates industrial procurement question answering systems in Chinese against national standards, revealing significant gaps in safety compliance and highlighting the need for safety-aware assessment beyond standard accuracy metrics.  AI-generated summary In industrial procurement, an LLM answer is useful only if it survives a standards check: recommended material must match operating condition, every parameter must respect a regulated threshold, and no procedure may contradict a safety clause. Partial correctness can mask safety-critical contradictions that aggregate LLM benchmarks rarely capture. We introduce IndustryBench, a 2,049-item benchmark for industrial procurement QA in Chinese, grounded in Chinese national standards (GB/T) and structured industrial product records, organized by seven capability dimensions, ten industry categories, and panel-derived difficulty tiers, with item-aligned English, Russian, and Vietnamese renderings. Our construction pipeline rejects 70.3% of LLM-generated candidates at a search-based external-verification stage, calibrating how unreliable industrial QA remains after LLM-only filtering.Our evaluation decouples raw correctness, scored by a Qwen3-Max judge validated at κ_w = 0.798 against a domain expert, from a separate safety-violation (SV) check against source texts. Across 17 models in Chinese and an 8-model intersection over four languages, we find: (i) the best system reaches only 2.083 on the 0--3 rubric, leaving substantial headroom; (ii) Standards & Terminology is the most persistent capability weakness and survives item-aligned translation; (iii) extended reasoning lowers safety-adjusted scores for 12 of 13 models, primarily by introducing unsupported safety-critical details into longer final answers; and (iv) safety-violation rates reshuffle the leaderboard -- GPT-5.4 climbs from rank 6 to rank 3 after SV adjustment, while Kimi-k2.5-1T-A32B drops seven positions.Industrial LLM evaluation therefore requires source-grounded, safety-aware diagnosis rather than aggregate accuracy. We release IndustryBench with all prompts, scoring scripts, and dataset documentation.', 'score': 2, 'issue_id': 2216, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '9753e9050aa7fa2a', 'authors': ['Songlin Bai', 'Xintong Wang', 'Linlin Yu', 'Bin Chen', 'Zhiang Xu', 'Yuyang Sheng', 'Changtong Zan', 'Xiaofeng Zhu', 'Yizhe Zhang', 'Jiru Li', 'Mingze Guo', 'Ling Zou', 'Yalong Li', 'Chengfu Huo', 'Liang Ding'], 'affiliations': ['Taobao&Tmall, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.10267.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#multilingual'], 'emoji': '⚙️', 'ru': {'title': 'Безопасность важнее точности в промышленных системах QA', 'desc': 'В статье представлен набор данных IndustryBench для оценки систем вопросно-ответных (QA) систем в промышленных закупках на китайском языке. Авторы показывают, что стандартные метрики точности недостаточны для промышленного применения, так как не учитывают критичные нарушения безопасности. Бенчмарк содержит 2049 примеров, организованные по стандартам GB/T и включающие проверку соответствия нормативным требованиям. Исследование показывает, что даже лучшие модели получают низкие оценки, а расширенное рассуждение часто ухудшает результаты безопасности, вводя необоснованные детали.'}, 'en': {'title': 'Safety First: Evaluating Industrial QA with IndustryBench', 'desc': 'The paper introduces IndustryBench, a benchmark designed to evaluate industrial procurement question answering systems in Chinese, focusing on safety compliance. It highlights that traditional accuracy metrics often overlook critical safety violations, which can lead to dangerous outcomes in industrial settings. The benchmark consists of 2,049 items based on national standards and assesses models across various dimensions and difficulty levels. The findings reveal that even the best-performing models struggle with safety compliance, emphasizing the need for safety-aware evaluations in machine learning applications.'}, 'zh': {'title': '提升工业采购问答系统的安全性与准确性', 'desc': 'IndustryBench是一个针对工业采购问答系统的基准测试，评估其在中国国家标准下的表现。研究发现，现有系统在安全合规性方面存在显著差距，强调了超越标准准确性指标的安全意识评估的必要性。该基准包含2049个项目，涵盖七个能力维度和十个行业类别，旨在提高工业采购的安全性和准确性。通过对模型的评估，发现最佳系统的得分仍有很大提升空间，且安全违规率会影响模型的排名。'}}}, {'id': 'https://huggingface.co/papers/2605.08734', 'title': 'AdaPreLoRA: Adafactor Preconditioned Low-Rank Adaptation', 'url': 'https://huggingface.co/papers/2605.08734', 'abstract': 'Abstract LoRA optimizers are analyzed through a unified framework based on surrogate matrices and preconditioners, with AdaPreLoRA proposing a novel approach using Adafactor diagonal Kronecker preconditioning to improve factor-space updates while maintaining low memory usage.  AI-generated summary Low-Rank Adaptation (LoRA) reparameterizes a weight update as a product of two low-rank factors, but the Jacobian J_{G} of the generator mapping the factors to the weight matrix is rank-deficient, so the factor-space preconditioner J_{G}^* {F}_t J_{G} induced by any {W}-space preconditioner {F}_t is singular, and consequently the standard chain rule cannot be uniquely inverted to map a preconditioned {W}-space direction back to a factor-space update. We cast existing LoRA optimizers in a unified framework parameterized by two choices: (i) which invertible surrogate for J_{G}^* {F}_t J_{G} to use, and (ii) which {F}_t on {W} to use. Existing methods occupy four families along these axes: factor-space adaptive updates, block-diagonal surrogates for J_{G}^* J_{G}, Frobenius-residual pseudoinverse methods, and Riemannian manifold constraint. Within this design space, a gradient-statistics-aware {F}_t paired with a closed-form factor-space solve at {O}((m+n)r) memory remains underexplored. We propose AdaPreLoRA, which fills this gap by adopting the Adafactor diagonal Kronecker preconditioner {H}_t on {W} and selecting from the resulting factor-space solution family the element minimizing an {H}_t-weighted imbalance between the two factor contributions; by construction, the resulting factor update is the closest LoRA approximation to the preconditioned {W}-space direction under the {H}_t-weighted norm. Across GPT-2 (E2E), Mistral-7B and Qwen2-7B (GLUE, ARC, GSM8K), and diffusion-model personalization, AdaPreLoRA is competitive with or improves over a representative set of LoRA optimizers while keeping peak GPU memory at the LoRA optimizer level.', 'score': 2, 'issue_id': 2214, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'd81eae20779d6124', 'authors': ['Ziyun Liu', 'Fengmiao Bian', 'Jian-Feng Cai'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.08734.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Адаптивная предобусловливаемая адаптация низкого ранга без потери эффективности', 'desc': 'В статье анализируется семейство оптимизаторов для Low-Rank Adaptation (LoRA) через единую систему, основанную на суррогатных матрицах и предобусловливателях. Авторы показывают, что стандартные методы адаптации низкоранговых факторов страдают от вырождения якобиана при преобразовании градиентов из W-пространства в факторное пространство. Предложен новый метод AdaPreLoRA, который использует диагональный кронекеровский предобусловливатель Adafactor для улучшения обновлений факторов, сохраняя при этом малую потребление памяти O((m+n)r). Экспериментальная проверка на моделях GPT-2 и Mistral-7B демонстрирует конкурентоспособность AdaPreLoRA с другими LoRA-оптимизаторами без увеличения пиковой памяти GPU.'}, 'en': {'title': 'Optimizing LoRA with AdaPreLoRA: Efficient and Memory-Friendly!', 'desc': 'This paper presents a new method called AdaPreLoRA for optimizing Low-Rank Adaptation (LoRA) in machine learning models. It introduces a unified framework that uses surrogate matrices and preconditioners to enhance the efficiency of factor-space updates while keeping memory usage low. The method employs the Adafactor diagonal Kronecker preconditioner to improve the mapping between weight-space and factor-space updates. Experimental results show that AdaPreLoRA performs competitively with existing LoRA optimizers across various models and tasks, maintaining low GPU memory usage.'}, 'zh': {'title': 'AdaPreLoRA：高效的低秩适应优化器', 'desc': '本文分析了LoRA优化器，提出了一种基于替代矩阵和预处理器的统一框架。AdaPreLoRA采用Adafactor对角Kronecker预处理器，以提高因子空间更新的效率，同时保持低内存使用。通过选择合适的预处理器和替代矩阵，AdaPreLoRA能够在多个任务上与现有的LoRA优化器竞争或超越它们。该方法在GPT-2、Mistral-7B和Qwen2-7B等模型上表现出色，且在GPU内存使用上保持在LoRA优化器的水平。'}}}, {'id': 'https://huggingface.co/papers/2605.11696', 'title': 'WildRelight: A Real-World Benchmark and Physics-Guided Adaptation for Single-Image Relighting', 'url': 'https://huggingface.co/papers/2605.11696', 'abstract': 'Abstract WildRelight dataset addresses the gap between synthetic and real-world single-image relighting by providing high-resolution outdoor scenes with aligned natural illumination, enabling physics-guided domain adaptation through diffusion posterior sampling and test-time adaptation.  AI-generated summary Recent single-image relighting methods, powered by advanced generative models, have achieved impressive photorealism on synthetic benchmarks. However, their effectiveness in the complex visual landscape of the real world remains largely unverified. A critical gap exists, as current datasets are typically designed for multi-view reconstruction and fail to address the unique challenges of single-image relighting. To bridge this synthetic-to-real gap, we introduce WildRelight, the first in-the-wild dataset specifically created for evaluating single-image relighting models. WildRelight features a diverse collection of high-resolution outdoor scenes, captured under strictly aligned, temporally varying natural illuminations, each paired with a high-dynamic-range environment map. Using this data, we establish a rigorous benchmark revealing that state-of-the-art models trained on synthetic data suffer from severe domain shifts. The strictly aligned temporal structure of WildRelight enables a new paradigm for domain adaptation. We demonstrate this by introducing a physics-guided inference framework that leverages the captured natural light evolution as a self-supervised constraint. By integrating Diffusion Posterior Sampling (DPS) with temporal Sampling-Aware Test-Time Adaptation (TTA), we show that the dataset allows synthetic models to align with real-world statistics on-the-fly, transforming the intractable sim-to-real challenge into a tractable self-supervised task. The dataset and code will be made publicly available to foster robust, physically-grounded relighting research.', 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '43df8bf1b470b685', 'authors': ['Lezhong Wang', 'Mehmet Onurcan Kaya', 'Siavash Bigdeli', 'Jeppe Revall Frisvad'], 'affiliations': ['INRIA', 'Technical University of Denmark, Kongens Lyngby, Denmark'], 'pdf_title_img': 'assets/pdf/title_img/2605.11696.jpg', 'data': {'categories': ['#synthetic', '#diffusion', '#open_source'], 'emoji': '💡', 'ru': {'title': 'От синтеза к реальности: самоконтролируемое переосвещение через физически обоснованную адаптацию', 'desc': 'В работе представлен датасет WildRelight для оценки моделей переосвещения изображений в реальных условиях, содержащий высокоразрешительные уличные сцены с синхронизированными естественными условиями освещения и HDR картами окружения. Авторы выявили значительное расхождение между синтетическими данными и реальными сценами, показав что современные генеративные модели, обученные на синтезе, страдают от доменного сдвига при применении к реальным фотографиям. Для адаптации предложена физически обоснованная схема вывода, комбинирующая диффузионную апостериорную выборку с адаптацией на этапе тестирования, используя естественную эволюцию света как самоконтролируемое ограничение. Это позволяет преобразовать задачу переноса из синтеза в реальность в самоконтролируемую задачу, значительно улучшая качество релайтинга на реальных данных.'}, 'en': {'title': 'Bridging the Gap: Real-World Relighting with WildRelight', 'desc': 'The WildRelight dataset is designed to improve single-image relighting by providing high-resolution outdoor scenes with natural lighting that changes over time. This dataset helps bridge the gap between synthetic data and real-world applications, which has been a challenge for existing models. By using physics-guided domain adaptation techniques, such as Diffusion Posterior Sampling and Test-Time Adaptation, the dataset allows models trained on synthetic data to better adapt to real-world conditions. The introduction of this dataset aims to enhance the evaluation and development of more effective relighting models in practical scenarios.'}, 'zh': {'title': '填补合成与真实之间的重光照差距', 'desc': 'WildRelight数据集旨在填补合成图像与真实世界单图像重光照之间的差距。该数据集提供了高分辨率的户外场景，配备严格对齐的自然光照，支持基于物理的领域适应。通过引入扩散后验采样和测试时适应的方法，研究表明，基于合成数据训练的模型在真实场景中表现不佳。WildRelight为单图像重光照模型的评估提供了新的基准，推动了自监督学习的研究。'}}}, {'id': 'https://huggingface.co/papers/2605.11354', 'title': 'Lite3R: A Model-Agnostic Framework for Efficient Feed-Forward 3D Reconstruction', 'url': 'https://huggingface.co/papers/2605.11354', 'abstract': 'Abstract Lite3R addresses efficiency challenges in transformer-based 3D reconstruction through sparse attention and low-precision quantization while maintaining geometric accuracy.  AI-generated summary Transformer-based 3D reconstruction has emerged as a powerful paradigm for recovering geometry and appearance from multi-view observations, offering strong performance across challenging visual conditions. As these models scale to larger backbones and higher-resolution inputs, improving their efficiency becomes increasingly important for practical deployment. However, modern 3D transformer pipelines face two coupled challenges: dense multi-view attention creates substantial token-mixing overhead, and low-precision execution can destabilize geometry-sensitive representations and degrade depth, pose, and 3D consistency. To address the first challenge, we propose Lite3R, a model-agnostic teacher-student framework that replaces dense attention with Sparse Linear Attention to preserve important geometric interactions while reducing attention cost. To address the second challenge, we introduce a parameter-efficient FP8-aware quantization-aware training (FP8-aware QAT) strategy with partial attention distillation, which freezes the vast majority of pretrained backbone parameters and trains only lightweight linear-branch projection layers, enabling stable low-precision deployment while retaining pretrained geometric priors. We further evaluate Lite3R on two representative backbones, VGGT and DA3-Large, over BlendedMVS and DTU64, showing that it substantially reduces latency (1.7-2.0x) and memory usage (1.9-2.4x) while preserving competitive reconstruction quality overall. These results demonstrate that Lite3R provides an effective algorithm-system co-design approach for practical transformer-based 3D reconstruction. Code: https://github.com/AIGeeksGroup/Lite3R. Website: https://aigeeksgroup.github.io/Lite3R.', 'score': 1, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '8e58e8d355ce25be', 'authors': ['Haoyu Zhang', 'Zeyu Zhang', 'Zedong Zhou', 'Yang Zhao', 'Hao Tang'], 'affiliations': ['La Trobe University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11354.jpg', 'data': {'categories': ['#architecture', '#inference', '#3d', '#cv'], 'emoji': '⚡', 'ru': {'title': 'Эффективная 3D реконструкция: разреженное внимание и квантизация без потери геометрии', 'desc': 'Lite3R — это фреймворк учитель-ученик для оптимизации трансформер-моделей в задаче 3D реконструкции. Авторы предлагают два ключевых улучшения: замену плотного внимания на разреженное линейное внимание для снижения вычислительных затрат и введение квантизации-адаптированного обучения в низкой точности (FP8) с сохранением геометрических приоров. Метод использует замораживание основных параметров предобученного энкодера и тренировку только лёгких проекционных слоёв, что обеспечивает стабильную работу при низкой точности. Эксперименты показывают, что Lite3R достигает ускорения в 1.7-2.0x и снижения памяти в 1.9-2.4x без значительной потери качества реконструкции.'}, 'en': {'title': 'Efficient 3D Reconstruction with Lite3R: Sparsity Meets Precision', 'desc': 'Lite3R is a novel framework designed to enhance the efficiency of transformer-based 3D reconstruction by utilizing sparse attention mechanisms and low-precision quantization techniques. It addresses the challenges of high computational costs associated with dense multi-view attention and the instability of low-precision execution on geometric representations. By implementing a teacher-student model that focuses on important geometric interactions, Lite3R significantly reduces latency and memory usage while maintaining high-quality reconstruction. The framework has been tested on popular backbones, demonstrating substantial improvements in performance metrics without compromising accuracy.'}, 'zh': {'title': 'Lite3R：高效的三维重建新方案', 'desc': 'Lite3R 是一种针对基于变换器的三维重建模型的高效解决方案。它通过稀疏注意力机制和低精度量化来提高效率，同时保持几何精度。该方法采用教师-学生框架，减少了注意力计算的开销，并引入了FP8感知的量化训练策略，以稳定低精度执行。实验结果表明，Lite3R 在减少延迟和内存使用的同时，仍能保持竞争力的重建质量。'}}}, {'id': 'https://huggingface.co/papers/2605.09932', 'title': 'FocuSFT: Bilevel Optimization for Dilution-Aware Long-Context Fine-Tuning', 'url': 'https://huggingface.co/papers/2605.09932', 'abstract': "Abstract Training framework FocuSFT improves long-context language model performance by addressing attention allocation issues through bilevel optimization with parametric memory that focuses attention on semantically relevant content.  AI-generated summary Large language models can now process increasingly long inputs, yet their ability to effectively use information spread across long contexts remains limited. We trace this gap to how attention budget is spent during supervised fine-tuning (SFT) on long sequences: positional biases and attention sinks cause the model to allocate most of its attention to positionally privileged tokens rather than semantically relevant content. This training-time attention dilution (the starvation of content tokens in the attention distribution) weakens the gradient signal, limiting the model's ability to learn robust long-context capabilities. We introduce FocuSFT, a bilevel optimization framework that addresses this problem at training time. An inner loop adapts lightweight fast-weight parameters on the training context to form a parametric memory that concentrates attention on relevant content, and the outer loop performs SFT conditioned on this sharpened representation. Both loops apply bidirectional attention over context tokens while preserving causal masking for responses, reducing the causal asymmetry that gives rise to attention sinks and aligning inner-outer behavior. On BABILong, FocuSFT improves accuracy by up to +14pp across 4K--32K context lengths; on RULER, it raises CWE aggregation from 72.9\\% to 81.1\\% at 16K; and on GPQA with agentic tool use, it yields a 24\\% relative gain in pass@1. Attention analysis shows that FocuSFT reduces attention sink mass by 529times and triples context engagement during training. Code: https://github.com/JarvisPei/FocuSFT", 'score': 1, 'issue_id': 2214, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'e19399972ccc6580', 'authors': ['Zehua Pei', 'Hui-Ling Zhen', 'Xianzhi Yu', 'Sinno Jialin Pan', 'Mingxuan Yuan', 'Bei Yu'], 'affiliations': ['Huawei Technologies Co., Ltd', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.09932.jpg', 'data': {'categories': ['#open_source', '#optimization', '#long_context'], 'emoji': '🎯', 'ru': {'title': 'Сосредоточить внимание модели на значимом контенте в длинных последовательностях', 'desc': 'FocuSFT — это двухуровневый фреймворк оптимизации, который улучшает способность языковых моделей работать с длинными контекстами путём решения проблемы неправильного распределения внимания. Авторы выявили, что при обучении с учителем на длинных последовательностях модель концентрирует большую часть внимания на позиционно привилегированных токенах вместо семантически релевантного контента, что ослабляет градиентный сигнал. Предложенный метод использует параметрическую память с быстрыми весами во внутреннем цикле для фокусировки внимания на важном контенте и выполняет supervised fine-tuning во внешнем цикле на основе этого улучшенного представления. Экспериментальные результаты показывают значительное улучшение на различных бенчмарках: до +14 процентных пункта на BABILong, повышение CWE с 72.9% до 81.1% на RULER при контексте в 16К, и 24% относительный прирост на GPQA.'}, 'en': {'title': 'FocuSFT: Sharpening Attention for Long-Context Mastery', 'desc': "The paper introduces FocuSFT, a training framework designed to enhance the performance of long-context language models by optimizing how attention is allocated during training. It identifies that traditional supervised fine-tuning (SFT) often leads to attention being focused on less relevant tokens due to positional biases, which dilutes the model's ability to learn from important content. FocuSFT employs a bilevel optimization approach, where an inner loop creates a parametric memory to prioritize semantically relevant information, while an outer loop conducts SFT based on this refined attention. The results demonstrate significant improvements in accuracy and context engagement across various benchmarks, indicating that FocuSFT effectively addresses the limitations of attention allocation in long-context scenarios."}, 'zh': {'title': '聚焦长上下文的注意力分配', 'desc': 'FocuSFT是一种训练框架，旨在通过双层优化和参数记忆来改善长上下文语言模型的性能。该方法解决了在监督微调过程中注意力分配不均的问题，使模型能够更有效地关注语义相关的内容。通过在训练时调整轻量级快速权重参数，FocuSFT形成了一个集中注意力的参数记忆，从而增强了模型对长上下文的学习能力。实验结果表明，FocuSFT在多个数据集上显著提高了模型的准确性和上下文参与度。'}}}, {'id': 'https://huggingface.co/papers/2605.10108', 'title': 'GLiNER-Relex: A Unified Framework for Joint Named Entity Recognition and Relation Extraction', 'url': 'https://huggingface.co/papers/2605.10108', 'abstract': 'Abstract A unified model for joint named entity recognition and relation extraction that uses a shared transformer encoder to simultaneously identify entities and extract relations with zero-shot capabilities.  AI-generated summary Joint named entity recognition (NER) and relation extraction (RE) is a fundamental task in natural language processing for constructing knowledge graphs from unstructured text. While recent approaches treat NER and RE as separate tasks requiring distinct models, we introduce GLiNER-Relex, a unified architecture that extends the GLiNER framework to perform both entity recognition and relation extraction in a single model. Our approach leverages a shared bidirectional transformer encoder to jointly represent text, entity type labels, and relation type labels, enabling zero-shot extraction of arbitrary entity and relation types specified at inference time. GLiNER-Relex constructs entity pair representations from recognized spans and scores them against relation type embeddings using a dedicated relation scoring module. We evaluate our model on four standard relation extraction benchmarks: CoNLL04, DocRED, FewRel, and CrossRE, and demonstrate competitive performance against both specialized relation extraction models and large language models, while maintaining the computational efficiency characteristic of the GLiNER family. The model is released as an open-source Python package with a simple inference API that allows users to specify arbitrary entity and relation type labels at inference time and obtain both entities and relation triplets in a single call. All models and code are publicly available.', 'score': 1, 'issue_id': 2214, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '6ed318408b34fc05', 'authors': ['Ihor Stepanov', 'Oleksandr Lukashov', 'Mykhailo Shtopko', 'Vivek Kalyanarangan'], 'affiliations': ['Baldor Technologies Pvt. Ltd. (IDfy), Mumbai, India', 'Knowledgator Engineering, Kyiv, Ukraine'], 'pdf_title_img': 'assets/pdf/title_img/2605.10108.jpg', 'data': {'categories': [], 'emoji': '🔗', 'ru': {'title': 'Единая модель для распознавания сущностей и извлечения отношений с нулевым обучением', 'desc': 'Статья описывает GLiNER-Relex — единую модель на основе трансформера для совместного решения задач распознавания именованных сущностей (NER) и извлечения отношений (RE) из текста. Модель использует общий кодировщик-трансформер для одновременной идентификации сущностей и выделения семантических связей между ними, поддерживая zero-shot извлечение произвольных типов сущностей и отношений, заданных во время инференции. Архитектура конструирует представления пар сущностей из распознанных текстовых фрагментов и оценивает их против встраиваний типов отношений с помощью специализированного модуля. Модель демонстрирует конкурентные результаты на стандартных бенчмарках и выпущена как открытый пакет Python с простым API для практического применения.'}, 'en': {'title': 'Unified NER and RE with Zero-Shot Capabilities', 'desc': 'This paper presents GLiNER-Relex, a unified model that performs joint named entity recognition (NER) and relation extraction (RE) using a shared transformer encoder. By integrating these two tasks, the model can identify entities and extract relationships simultaneously, even for types not seen during training, showcasing its zero-shot capabilities. The architecture constructs representations for entity pairs and evaluates them against relation type embeddings, allowing for efficient processing. Evaluations on multiple benchmarks show that GLiNER-Relex competes well with specialized models while being computationally efficient and user-friendly as an open-source tool.'}, 'zh': {'title': '统一模型，实现实体识别与关系抽取的双重任务', 'desc': '本文提出了一种统一模型GLiNER-Relex，用于联合命名实体识别（NER）和关系抽取（RE）。该模型使用共享的双向变换器编码器，同时识别实体和提取关系，具备零样本能力。与以往将NER和RE视为独立任务的做法不同，GLiNER-Relex能够在单一模型中处理这两项任务。我们在多个标准数据集上评估了该模型，结果显示其在性能和计算效率上均表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.09539', 'title': 'TacoMAS: Test-Time Co-Evolution of Topology and Capability in LLM-based Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2605.09539', 'abstract': "Abstract Test-time co-evolution framework for multi-agent systems that jointly adapts agent capabilities and communication topology at different time scales to achieve task-conditioned stability and improved performance.  AI-generated summary Multi-agent systems (MAS) have emerged as a promising paradigm for solving complex tasks. Recent work has explored self-evolving MAS that automatically optimize agent capabilities or communication topologies. However, existing methods either learn a topology that remains fixed at inference time or adapt only the topology or capability during inference. We empirically and theoretically show that effective test-time evolution requires jointly adapting both axes, but on different time scales: capabilities should update rapidly to handle emerging subtasks, while the topology should evolve more slowly to preserve coordination stability. We then introduce TacoMAS, a test-time co-evolution framework for dynamic MAS. TacoMAS formulates MAS inference as a task of online graph adaptation, where nodes represent agents with role-specific capabilities and edges define their communication topology. During inference, a fast capability loop updates agent expertise using trajectory-level feedback, while a slow meta-LLM-driven topology loop performs agents' birth-death operations on MAS, including edge edit, agent addition, and agent removal. We further show that this fast-slow design drives MAS evolution toward a task-conditioned stable equilibrium. Experiments on four benchmarks demonstrate that TacoMAS outperforms nearly 20 multi-agent baselines, achieving an average improvement of 13.3% over the strongest baseline. The codes are released at https://github.com/chenxu2-gif/TacoMAS-MultiAgent.", 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '24a84adb6c8c49bc', 'authors': ['Chen Xu', 'Yicheng Hu', 'Ruizi Wang', 'Xinyu Lin', 'Wenjie Wang', 'Dongrui Liu', 'Fuli Feng'], 'affiliations': ['Carnegie Mellon University', 'National University of Singapore', 'Shanghai AI Lab', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.09539.jpg', 'data': {'categories': ['#training', '#benchmark', '#agents'], 'emoji': '🕸️', 'ru': {'title': 'Коэволюция способностей и топологии в многоагентных системах на разных временных масштабах', 'desc': 'В статье предлагается фреймворк TacoMAS для динамической адаптации многоагентных систем во время тестирования путём совместной эволюции возможностей агентов и топологии их коммуникации. Авторы показывают, что эффективная адаптация требует работы на двух временных масштабах: быстрое обновление навыков агентов для решения возникающих подзадач и медленная эволюция сетевой топологии для сохранения координации. Фреймворк использует быстрый цикл обновления способностей через обратную связь по траекториям и медленный цикл, управляемый мета-LLM, для добавления, удаления агентов и редактирования рёбер графа. Экспериментальные результаты показывают улучшение производительности на 13.3% в среднем по сравнению с лучшими базовыми методами.'}, 'en': {'title': 'TacoMAS: Evolving Agents and Communication for Enhanced Performance', 'desc': 'This paper presents TacoMAS, a framework for multi-agent systems (MAS) that adapts both agent capabilities and communication structures during inference. It highlights the importance of evolving these two aspects at different speeds: quickly updating agent skills to tackle new tasks while slowly adjusting the communication topology to maintain stability. The authors demonstrate that this co-evolution approach leads to better performance and task-conditioned stability compared to existing methods. Experiments show that TacoMAS significantly outperforms nearly 20 other multi-agent systems, achieving an average improvement of 13.3%.'}, 'zh': {'title': 'TacoMAS：动态多智能体系统的共同进化框架', 'desc': '本文提出了一种测试时共同进化框架TacoMAS，用于多智能体系统（MAS），旨在在不同时间尺度上共同适应智能体能力和通信拓扑，以实现任务条件下的稳定性和性能提升。研究表明，有效的测试时进化需要同时调整能力和拓扑，但速度不同：能力应快速更新以应对新出现的子任务，而拓扑应缓慢演变以保持协调稳定。TacoMAS将MAS推理视为在线图适应任务，其中节点代表具有特定角色能力的智能体，边缘定义它们的通信拓扑。实验结果表明，TacoMAS在四个基准测试中表现优于近20个多智能体基线，平均提升13.3%。'}}}, {'id': 'https://huggingface.co/papers/2605.08646', 'title': 'PAAC: Privacy-Aware Agentic Device-Cloud Collaboration', 'url': 'https://huggingface.co/papers/2605.08646', 'abstract': "Abstract PAAC is a privacy-aware agentic framework that aligns planner-executor decomposition with device-cloud boundaries, using typed placeholder tokens and deterministic registries to enhance privacy while maintaining accuracy in distributed language model agents.  AI-generated summary Large language model (LLM) agents face a structural tension: cloud agents provide strong reasoning but expose user data, while on-device agents preserve privacy at the cost of overall capability. Existing device-cloud designs treat this boundary as a compute split rather than a trust boundary suited to agentic workloads, and existing sanitizers force a choice between policy flexibility and the structural fidelity tool calls require. In this work, we develop PAAC, a privacy-aware agentic framework that aligns planner--executor decomposition with the device-cloud boundary so that role specialization itself becomes the privacy mechanism. The cloud agent reasons over typed placeholder tokens that preserve each sensitive value's reasoning role while discarding its content, while the on-device agent identifies sensitive spans and distills each step's execution outcome into compact key findings. Sanitization confines the on-device LLM to proposing which spans to mask, while a deterministic registry performs all substitution and reversal, keeping actions directly executable on device. On three agentic benchmarks under strict privacy settings, PAAC dominates the Pareto frontier of privacy and accuracy, improving average accuracy by 15-36\\% and reducing average leakage by 2-6times over state-of-the-art device-cloud baselines, with the largest margins on privacy targets outside fixed entity taxonomies. We find consistent improvements on 17 additional benchmarks spanning 10 domains, including math, science, and finance.", 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': '33f9fe4e899ea108', 'authors': ['Liangqi Yuan', 'Wenzhi Fang', 'Shiqiang Wang', 'Christopher G. Brinton'], 'affiliations': ['Purdue University', 'University of Exeter'], 'pdf_title_img': 'assets/pdf/title_img/2605.08646.jpg', 'data': {'categories': ['#security', '#agents', '#alignment', '#benchmark', '#leakage', '#training'], 'emoji': '🔐', 'ru': {'title': 'Приватные LLM-агенты через специализацию ролей между облаком и устройством', 'desc': 'В статье представлен PAAC — фреймворк для приватных агентов на основе больших языковых моделей, который выравнивает декомпозицию планировщика-исполнителя с границей между устройством пользователя и облаком. Облачный агент работает с типизированными токенами-заполнителями, сохраняя роль чувствительных данных при скрытии их содержания, а локальный агент идентифицирует приватную информацию и определяет, какие участки текста следует маскировать. Детерминированный реестр выполняет все операции подстановки и восстановления данных на устройстве пользователя, сохраняя действия напрямую исполняемыми. Экспериментальные результаты показывают улучшение точности на 15-36% и снижение утечки данных в 2-6 раз по сравнению с существующими решениями, при этом сохраняя полную функциональность агента.'}, 'en': {'title': 'Enhancing Privacy in Language Models with PAAC Framework', 'desc': 'The paper introduces PAAC, a framework designed to enhance privacy in distributed language model agents by effectively managing the interaction between cloud and on-device processing. It addresses the challenge of balancing strong reasoning capabilities with user data protection by using typed placeholder tokens that maintain the role of sensitive information without revealing its content. PAAC employs a planner-executor decomposition that aligns with device-cloud boundaries, allowing for specialized roles that serve as privacy mechanisms. The framework demonstrates significant improvements in both accuracy and privacy, outperforming existing methods across various benchmarks.'}, 'zh': {'title': '隐私与准确性的完美平衡', 'desc': 'PAAC是一个注重隐私的智能框架，它将规划者-执行者的分解与设备-云的边界相结合。该框架使用类型化的占位符令牌和确定性注册表来增强隐私，同时保持分布式语言模型代理的准确性。PAAC通过角色专业化本身作为隐私机制，使云代理在处理敏感数据时能够保留推理角色而不泄露内容。实验结果表明，PAAC在隐私和准确性方面的表现优于现有的设备-云基线，平均准确性提高了15-36%，隐私泄露减少了2-6倍。'}}}, {'id': 'https://huggingface.co/papers/2605.08626', 'title': 'Large Language Models over Networks: Collaborative Intelligence under Resource Constraints', 'url': 'https://huggingface.co/papers/2605.08626', 'abstract': 'Abstract Collaborative intelligence enables multiple distributed LLMs to work together across devices and clouds to provide high-quality responses under diverse resource constraints.  AI-generated summary Large language models (LLMs) are transforming society, powering applications from smartphone assistants to autonomous driving. Yet cloud-based LLM services alone cannot serve a growing class of applications, including those operating under intermittent connectivity, sub-second latency budgets, data-residency constraints, or sustained high-volume inference. On-device deployment is in turn constrained by limited computation and memory. No single endpoint can deliver high-quality service across this spectrum. This article focuses on collaborative intelligence, a paradigm in which multiple independent LLMs distributed across device and cloud endpoints collaborate at the task level through natural language or structured messages. Such collaboration strives for superior response quality under heterogeneous resource constraints spanning computation, memory, communication, and cost across network tiers. We present collaborative inference along two complementary and composable dimensions: vertical device-cloud collaboration and horizontal multi-agent collaboration, which can be combined into hybrid topologies in practice. We then examine learning to collaborate, addressing the training of routing policies and the development of cooperative capabilities among LLMs. Finally, we identify open research challenges including scaling under resource heterogeneity and trustworthy collaborative intelligence.', 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': '0c807d0f0b0b8bd1', 'authors': ['Liangqi Yuan', 'Wenzhi Fang', 'Shiqiang Wang', 'H. Vincent Poor', 'Christopher G. Brinton'], 'affiliations': ['Exeter', 'Princeton University', 'Purdue University'], 'pdf_title_img': 'assets/pdf/title_img/2605.08626.jpg', 'data': {'categories': ['#training', '#inference', '#agents'], 'emoji': '🤝', 'ru': {'title': 'Когда LLM работают вместе: коллаборативный интеллект под ограничениями ресурсов', 'desc': 'Статья посвящена парадигме коллаборативного интеллекта, где несколько распределённых больших языковых моделей работают вместе через устройства и облако для достижения высокого качества ответов при различных ограничениях ресурсов. Авторы описывают два основных способа сотрудничества: вертикальное взаимодействие между устройством и облаком, а также горизонтальное взаимодействие между несколькими агентами, которые можно комбинировать в гибридные топологии. В работе рассматривается задача обучения стратегиям маршрутизации и развития кооперативных способностей языковых моделей для эффективного сотрудничества. Исследование выявляет открытые проблемы, включая масштабирование при неоднородности ресурсов и обеспечение надёжности совместной работы интеллектуальных систем.'}, 'en': {'title': 'Empowering LLMs through Collaborative Intelligence', 'desc': 'This paper discusses collaborative intelligence, where multiple large language models (LLMs) work together across different devices and cloud environments to improve response quality. It highlights the limitations of relying solely on cloud-based LLMs, especially for applications needing quick responses or operating under specific data constraints. The authors propose a framework for collaborative inference that includes both vertical collaboration between devices and clouds, and horizontal collaboration among multiple LLMs. They also address the need for training these models to effectively collaborate and identify challenges in scaling and ensuring trustworthiness in such systems.'}, 'zh': {'title': '协作智能：多模型协同提升响应质量', 'desc': '本文探讨了协作智能的概念，允许多个分布式的大型语言模型（LLMs）在不同设备和云端协同工作，以提供高质量的响应。随着应用需求的增加，单一的云端LLM服务无法满足所有场景，尤其是在网络连接不稳定或计算资源有限的情况下。通过自然语言或结构化信息进行任务级协作，这种方法旨在在计算、内存、通信和成本等多种资源约束下实现更优质的响应。文章还讨论了如何训练协作策略和发展LLMs之间的合作能力，以及在资源异构性和可信协作智能等方面的研究挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.07545', 'title': 'Implicit Preference Alignment for Human Image Animation', 'url': 'https://huggingface.co/papers/2605.07545', 'abstract': 'Abstract Implicit Preference Alignment (IPA) addresses hand motion generation challenges through data-efficient post-training that eliminates need for paired preference data while using hand-aware local optimization for improved quality.  AI-generated summary Human image animation has witnessed significant advancements, yet generating high-fidelity hand motions remains a persistent challenge due to their high degrees of freedom and motion complexity. While reinforcement learning from human feedback, particularly direct preference optimization, offers a potential solution, it necessitates the construction of strict preference pairs. However, curating such pairs for dynamic hand regions is prohibitively expensive and often impractical due to frame-wise inconsistencies. In this paper, we propose Implicit Preference Alignment (IPA), a data-efficient post-training framework that eliminates the need for paired preference data. Theoretically grounded in implicit reward maximization, IPA aligns the model by maximizing the likelihood of self-generated high-quality samples while penalizing deviations from the pretrained prior. Furthermore, we introduce a Hand-Aware Local Optimization mechanism to explicitly steer the alignment process toward hand regions. Experiments demonstrate that our method achieves effective preference optimization to enhance hand generation quality, while significantly lowering the barrier for constructing preference data. Codes are released at https://github.com/mdswyz/IPA', 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '83c6bbcb310ddb16', 'authors': ['Yuanzhi Wang', 'Xuhua Ren', 'Jiaxiang Cheng', 'Bing Ma', 'Kai Yu', 'Tianxiang Zheng', 'Qinglin Lu', 'Zhen Cui'], 'affiliations': ['School of Artificial Intelligence, Beijing Normal University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2605.07545.jpg', 'data': {'categories': [], 'emoji': '🖐️', 'ru': {'title': 'Выравнивание скрытых предпочтений для реалистичной генерации движений рук', 'desc': 'В работе предложен метод Implicit Preference Alignment (IPA) для улучшения качества генерации движений рук в видео анимации людей. Подход использует эффективное доолучение модели без необходимости создания дорогостоящих пар предпочтений, опираясь на теорию неявной максимизации награды. Авторы внедрили механизм Hand-Aware Local Optimization, который направляет процесс выравнивания модели на области рук, учитывая их сложность и высокую степень свободы. Экспериментальные результаты показывают, что метод эффективно улучшает качество генерации рук при значительном снижении затрат на подготовку данных.'}, 'en': {'title': 'Revolutionizing Hand Motion Generation with IPA', 'desc': 'The paper introduces Implicit Preference Alignment (IPA), a novel framework for generating high-quality hand motions in human image animation. IPA improves upon traditional methods by eliminating the need for paired preference data, which is often difficult and costly to obtain. It utilizes implicit reward maximization to align the model with self-generated samples while penalizing deviations from a pretrained model. Additionally, a Hand-Aware Local Optimization mechanism is implemented to focus on enhancing the quality of hand motion generation specifically.'}, 'zh': {'title': '隐式偏好对齐：高效生成手部动作的创新方法', 'desc': '隐式偏好对齐（IPA）是一种数据高效的后训练框架，旨在解决手部动作生成中的挑战。该方法不需要成对的偏好数据，通过最大化自生成高质量样本的可能性来优化模型。IPA还引入了手部感知的局部优化机制，专注于手部区域的对齐过程。实验结果表明，IPA显著提高了手部生成的质量，同时降低了构建偏好数据的难度。'}}}, {'id': 'https://huggingface.co/papers/2605.04702', 'title': 'FaithfulFaces: Pose-Faithful Facial Identity Preservation for Text-to-Video Generation', 'url': 'https://huggingface.co/papers/2605.04702', 'abstract': 'Abstract  FaithfulFaces is a pose-faithful facial identity preservation framework that improves identity consistency in text-to-video generation through pose-shared alignment and explicit Euler angle embeddings.  AI-generated summary Identity-preserving text-to-video generation (IPT2V) empowers users to produce diverse and imaginative videos with consistent human facial identity. Despite recent progress, existing methods often suffer from significant identity distortion under large facial pose variations or facial occlusions. In this paper, we propose FaithfulFaces, a pose-faithful facial identity preservation learning framework to improve IPT2V in complex dynamic scenes. The key of FaithfulFaces is a pose-shared identity aligner that refines and aligns facial poses across distinct views via a pose-shared dictionary and a pose variation-identity invariance constraint. By mapping single-view inputs into a global facial pose representation with explicit Euler angle embeddings, FaithfulFaces provides a pose-faithful facial prior that guides generative foundations toward robust identity-preserving generation. In particular, we develop a specialized pipeline to curate a high-quality video dataset featuring substantial facial pose diversity. Extensive experiments demonstrate that FaithfulFaces achieves state-of-the-art performance, maintaining superior identity consistency and structural clarity even as pose changes and occlusions occur.', 'score': 1, 'issue_id': 2215, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'bbdf785c77582b87', 'authors': ['Yuanzhi Wang', 'Xuhua Ren', 'Jiaxiang Cheng', 'Bing Ma', 'Kai Yu', 'Sen Liang', 'Wenyue Li', 'Tianxiang Zheng', 'Qinglin Lu', 'Zhen Cui'], 'affiliations': ['Beijing Normal University', 'Nanyang Technological University', 'Tencent Hunyuan', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.04702.jpg', 'data': {'categories': ['#cv', '#multimodal', '#dataset', '#video'], 'emoji': '😊', 'ru': {'title': 'Верный облик: сохранение идентичности при любой позе', 'desc': 'FaithfulFaces представляет собой фреймворк для сохранения идентичности лица в генерации видео из текста, используя выравнивание по общему словарю поз и явные эмбеддинги углов Эйлера. Метод решает проблему искажения черт лица при значительных изменениях ориентации головы и окклюзиях путём введения ограничения инвариантности идентичности к вариациям позы. Авторы разработали специализированный конвейер для создания высококачественного датасета видео с большим разнообразием поз лица. Экспериментальные результаты показывают, что предложенный подход достигает лучших показателей в сохранении консистентности идентичности и структурной четкости даже при значительных изменениях ориентации лица.'}, 'en': {'title': 'Preserving Identity in Dynamic Video Generation', 'desc': 'FaithfulFaces is a framework designed to maintain consistent facial identity in text-to-video generation, even when the facial poses change significantly. It uses a pose-shared alignment technique and explicit Euler angle embeddings to ensure that the generated videos accurately reflect the intended identity. The framework addresses challenges like facial occlusions and variations in pose by employing a pose-shared dictionary and a constraint that maintains identity across different views. Through extensive testing, FaithfulFaces has shown to outperform existing methods, providing high-quality videos with clear structures and stable identities.'}, 'zh': {'title': '面部身份保留的姿态一致性框架', 'desc': 'FaithfulFaces 是一个面向姿态一致性的面部身份保留框架，旨在通过姿态共享对齐和显式欧拉角嵌入来改善文本到视频生成中的身份一致性。该框架解决了在大幅面部姿态变化或面部遮挡情况下，现有方法常常出现的身份失真问题。通过使用姿态共享字典和姿态变化-身份不变约束，FaithfulFaces 能够在不同视角之间精细对齐面部姿态。实验结果表明，FaithfulFaces 在保持身份一致性和结构清晰度方面表现优越，尤其在复杂动态场景中。'}}}, {'id': 'https://huggingface.co/papers/2605.12426', 'title': 'Geometric Factual Recall in Transformers', 'url': 'https://huggingface.co/papers/2605.12426', 'abstract': "Abstract Transformer language models use geometric memorization where embeddings encode linear superpositions of attributes and MLPs act as relation-conditioned selectors rather than associative key-value mappings.  AI-generated summary How do transformer language models memorize factual associations? A common view casts internal weight matrices as associative memories over pairs of embeddings, requiring parameter counts that scale linearly with the number of facts. We develop a theoretical and empirical account of an alternative, geometric form of memorization in which learned embeddings encode relational structure directly, and the MLP plays a qualitatively different role. In a controlled setting where a single-layer transformer must memorize random bijections from subjects to a shared attribute set, we prove that a logarithmic embedding dimension suffices: subject embeddings encode linear superpositions of their associated attribute vectors, and a small MLP acts as a relation-conditioned selector that extracts the relevant attribute via ReLU gating, and not as an associative key-value mapping. We extend these results to the multi-hop setting -- chains of relational queries such as ``Who is the mother of the wife of x?'' -- providing constructions with and without chain-of-thought that exhibit a provable capacity-depth tradeoff, complemented by a matching information-theoretic lower bound. Empirically, gradient descent discovers solutions with precisely the predicted structure. Once trained, the MLP transfers zero-shot to entirely new bijections when subject embeddings are appropriately re-initialized, revealing that it has learned a generic selection mechanism rather than memorized any particular set of facts.", 'score': 0, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'a87e3d9a67ebee75', 'authors': ['Shauli Ravfogel', 'Gilad Yehudai', 'Joan Bruna', 'Alberto Bietti'], 'affiliations': ['Flatiron Institute', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12426.jpg', 'data': {'categories': ['#architecture', '#math', '#interpretability', '#reasoning', '#training', '#transfer_learning'], 'emoji': '🧠', 'ru': {'title': 'Геометрическое кодирование вместо ассоциативной памяти в трансформерах', 'desc': 'В этой работе исследуется, как трансформеры запоминают факты через геометрическую структуру: вложения кодируют линейные суперпозиции атрибутов, а MLP действует как специализированный селектор, а не как ассоциативная память. Авторы доказывают, что для запоминания случайных биекций достаточно логарифмической размерности вложений, при этом ReLU в MLP выделяет нужный атрибут из суперпозиции. Результаты расширены на задачи многоходовых запросов с анализом компромисса между ёмкостью и глубиной модели. Экспериментально подтверждается, что градиентный спуск находит решения с предсказанной структурой, и обученный MLP переносится без обучения на новые данные.'}, 'en': {'title': 'Geometric Memorization in Transformers: Efficient and Generalizable!', 'desc': 'This paper explores how transformer language models memorize factual information using a geometric approach rather than traditional associative memory. It shows that embeddings can represent relationships directly, allowing for efficient memorization with a logarithmic embedding dimension. The multi-layer perceptron (MLP) functions as a selector that retrieves relevant attributes through gating, rather than storing key-value pairs. The findings indicate that the model can generalize to new relationships after training, demonstrating a robust selection mechanism.'}, 'zh': {'title': '变换器模型的几何记忆机制', 'desc': '这篇论文探讨了变换器语言模型如何记忆事实关联。研究表明，嵌入向量可以直接编码关系结构，而多层感知机（MLP）则作为条件选择器，而不是传统的关联记忆。通过实验，作者证明了在特定设置下，嵌入维度可以是对数级别，且小型MLP能够通过ReLU门控提取相关属性。最终，研究表明，经过训练的MLP能够在新的双射上进行零样本转移，显示出其学习了通用的选择机制。'}}}];

                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-13 11:58',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-13 11:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-13 11:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
