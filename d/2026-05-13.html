ultimodal RLVR for Physics Reasoning', 'url': 'https://huggingface.co/papers/2605.09266', 'abstract': 'Abstract SeePhys Pro benchmark reveals that current multimodal models struggle with representation-invariant reasoning when information shifts from text to visual formats, and demonstrates that blind training can improve performance through residual textual cues.  AI-generated summary We introduce SeePhys Pro, a fine-grained modality transfer benchmark that studies whether models preserve the same reasoning capability when critical information is progressively transferred from text to image. Unlike standard vision-essential benchmarks that evaluate a single input form, SeePhys Pro features four semantically aligned variants for each problem with progressively increasing visual elements. Our evaluation shows that current frontier models are far from representation-invariant reasoners: performance degrades on average as information moves from language to diagrams, with visual variable grounding as the most critical bottleneck. Motivated by this inference-time fragility, we further develop large training corpora for multimodal RLVR and use blind training as a diagnostic control, finding that RL with all training images masked can still improve performance on unmasked validation sets. To analyze this effect, text-deletion, image-mask-rate, and format-saturation controls suggest that such gains can arise from residual textual and distributional cues rather than valid visual evidence. Our results highlight the need to evaluate multimodal reasoning not only by final-answer accuracy, but also by robustness under modality transfer and by diagnostics that test whether improvements rely on task-critical visual evidence.', 'score': 11, 'issue_id': 2214, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '2e8d9387ef29bc57', 'authors': ['Kun Xiang', 'Terry Jingchen Zhang', 'Zirong Liu', 'Bokai Zhou', 'Yueling Tang', 'Junjie Yu', 'Jiacong Lu', 'Shangrui Huang', 'Heng Li', 'Likui Zhang', 'Kunkun Liu', 'Changzheng Zhang', 'Yangle Fang', 'Boqiang Guo', 'Hui-Ling Zhen', 'Dandan Tu', 'Yinya Huang', 'Xiaodan Liang'], 'affiliations': ['ETH AI Center', 'ETH Zurich', 'Huawei Technologies Ltd.', 'Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09266.jpg', 'data': {'categories': ['#dataset', '#interpretability', '#multimodal', '#reasoning', '#benchmark', '#training', '#rlhf'], 'emoji': '🔄', 'ru': {'title': 'Мультимодальные модели не инвариантны к смене представления информации', 'desc': 'В статье представлен бенчмарк SeePhys Pro, который выявляет, что современные мультимодальные модели теряют способность к рассуждению, когда информация переходит из текстового формата в визуальный. Исследование показывает критическую проблему с привязкой переменных к визуальным элементам и нестабильность моделей при изменении представления данных. Авторы обнаружили, что обучение с маскированными изображениями может улучшать производительность на немаскированных данных благодаря остаточным текстовым подсказкам, а не реальному пониманию визуального содержания. Работа подчеркивает необходимость оценивать мультимодальные рассуждения не только по точности финального ответа, но и по робастности при смене модальностей.'}, 'en': {'title': 'Enhancing Multimodal Reasoning Through Residual Cues', 'desc': 'The SeePhys Pro benchmark investigates how well multimodal models can maintain reasoning abilities when information is shifted from text to visual formats. It reveals that current models struggle with this representation-invariant reasoning, particularly when transitioning from language to images, leading to performance drops. The study introduces blind training techniques that utilize masked training images, which surprisingly enhance performance on unmasked validation sets. This suggests that improvements may stem from residual textual cues rather than valid visual information, emphasizing the importance of robust evaluation in multimodal reasoning tasks.'}, 'zh': {'title': '多模态推理的挑战与机遇', 'desc': '本论文介绍了SeePhys Pro基准测试，旨在研究多模态模型在信息从文本转移到视觉格式时的推理能力。研究发现，当前的多模态模型在处理这种信息转移时表现不佳，尤其是在视觉变量的基础上。通过盲训练，模型在没有视觉信息的情况下仍能提高性能，表明文本线索在推理中起到了重要作用。我们的结果强调了在评估多模态推理时，不仅要关注最终答案的准确性，还要考虑在模态转移下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.12497', 'title': 'From Web to Pixels: Bringing Agentic Search into Visual Perception', 'url': 'https://huggingface.co/papers/2605.12497', 'abstract': 'Abstract Researchers introduce WebEye, a benchmark for object localization requiring external knowledge resolution, and Pixel-Searcher, an agent-based approach that connects hidden target identities to visual annotations through search and reasoning.  AI-generated summary Visual perception connects high-level semantic understanding to pixel-level perception, but most existing settings assume that the decisive evidence for identifying a target is already in the image or frozen model knowledge. We study a more practical yet harder open-world case where a visible object must first be resolved from external facts, recent events, long-tail entities, or multi-hop relations before it can be localized. We formalize this challenge as Perception Deep Research and introduce WebEye, an object-anchored benchmark with verifiable evidence, knowledge-intensive queries, precise box/mask annotations, and three task views: Search-based Grounding, Search-based Segmentation, and Search-based VQA. WebEyes contains 120 images, 473 annotated object instances, 645 unique QA pairs, and 1,927 task samples. We further propose Pixel-Searcher, an agentic search-to-pixel workflow that resolves hidden target identities and binds them to boxes, masks, or grounded answers. Experiments show that Pixel-Searcher achieves the strongest open-source performance across all three task views, while failures mainly arise from evidence acquisition, identity resolution, and visual instance binding.', 'score': 10, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '6724da9919c45012', 'authors': ['Bokang Yang', 'Xinyi Sun', 'Kaituo Feng', 'Xingping Dong', 'Dongming Wu', 'Xiangyu Yue'], 'affiliations': ['CUHK MMLab', 'Shenzhen Loop Area Institute', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12497.jpg', 'data': {'categories': ['#dataset', '#agents', '#multimodal', '#benchmark', '#cv'], 'emoji': '🔍', 'ru': {'title': 'От текста к пикселям: агентный поиск для локализации неоднозначных объектов', 'desc': 'В статье представлен новый бенчмарк WebEye для локализации объектов, требующий разрешения внешних знаний, и агентный подход Pixel-Searcher, который связывает скрытые идентичности объектов с визуальными аннотациями через поиск и рассуждение. Задача формализуется как Perception Deep Research, где видимый объект сначала должен быть идентифицирован через внешние факты, события, редкие сущности или многошаговые отношения перед локализацией. Предложенный агентный рабочий процесс использует поиск информации для разрешения идентичности целевого объекта и привязки его к боксам, маскам или ответам на вопросы. Эксперименты показывают, что Pixel-Searcher достигает лучших результатов среди открытых решений, при этом основные ошибки возникают при получении доказательств, разрешении идентичности и визуальной привязке объектов.'}, 'en': {'title': 'WebEye: Bridging Knowledge and Visual Localization', 'desc': 'This paper presents WebEye, a new benchmark designed for object localization that requires external knowledge to identify targets. It introduces Pixel-Searcher, an innovative approach that links hidden object identities to visual data through a search and reasoning process. The study addresses the challenge of recognizing objects in an open-world context, where information must be gathered from external sources before localization can occur. The authors provide a comprehensive dataset with various tasks and demonstrate that Pixel-Searcher outperforms existing methods, although challenges remain in acquiring evidence and resolving identities.'}, 'zh': {'title': 'WebEye：连接视觉与外部知识的物体定位新基准', 'desc': '本研究介绍了WebEye，这是一个需要外部知识解析的物体定位基准。我们提出了Pixel-Searcher，这是一种基于代理的方法，通过搜索和推理将隐藏的目标身份与视觉注释连接起来。与传统方法不同，WebEye关注在开放世界场景中，如何从外部事实和多跳关系中解析可见物体。实验表明，Pixel-Searcher在所有任务视图中表现最佳，但主要的失败来自于证据获取和身份解析。'}}}, {'id': 'https://huggingface.co/papers/2605.00080', 'title': 'World Model for Robot Learning: A Comprehensive Survey', 'url': 'https://huggingface.co/papers/2605.00080', 'abstract': 'Abstract World models as predictive representations of environmental dynamics have become essential for robot learning, supporting policy learning, planning, and simulation across various embodied applications.  AI-generated summary World models, which are predictive representations of how environments evolve under actions, have become a central component of robot learning. They support policy learning, planning, simulation, evaluation, data generation, and have advanced rapidly with the rise of foundation models and large-scale video generation. However, the literature remains fragmented across architectures, functional roles, and embodied application domains. To address this gap, we present a comprehensive review of world models from a robot-learning perspective. We examine how world models are coupled with robot policies, how they serve as learned simulators for reinforcement learning and evaluation, and how robotic video world models have progressed from imagination-based generation to controllable, structured, and foundation-scale formulations. We further connect these ideas to navigation and autonomous driving, and summarize representative datasets, benchmarks, and evaluation protocols. Overall, this survey systematically reviews the rapidly growing literature on world models for robot learning, clarifies key paradigms and applications, and highlights major challenges and future directions for predictive modeling in embodied agents. To facilitate continued access to newly emerging works, benchmarks, and resources, we will maintain and regularly update the accompanying GitHub repository alongside this survey.', 'score': 9, 'issue_id': 2214, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'cff90d7ad62e5af6', 'authors': ['Bohan Hou', 'Gen Li', 'Jindou Jia', 'Tuo An', 'Xinying Guo', 'Sicong Leng', 'Haoran Geng', 'Yanjie Ze', 'Tatsuya Harada', 'Philip Torr', 'Oier Mees', 'Marc Pollefeys', 'Zhuang Liu', 'Jiajun Wu', 'Pieter Abbeel', 'Jitendra Malik', 'Yilun Du', 'Jianfei Yang'], 'affiliations': ['ETH Zurich', 'Harvard University', 'Microsoft', 'Nanyang Technological University', 'Princeton University', 'Stanford University', 'The University of Tokyo', 'University of California, Berkeley', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.00080.jpg', 'data': {'categories': ['#dataset', '#robotics', '#agents', '#video', '#benchmark', '#rl', '#survey'], 'emoji': '🤖', 'ru': {'title': 'World models как основа предсказательного обучения роботов', 'desc': 'В статье представлен полный обзор world models (мировых моделей) — предсказательных представлений динамики окружающей среды, которые стали критически важны для обучения роботов. Авторы рассматривают, как эти модели интегрируются с политиками роботов, используются в качестве learned simulators для reinforcement learning и оценки политик, а также как видео-модели мира эволюционировали от простой генерации образов до структурированных и масштабируемых формулировок. Обзор охватывает применение в навигации и автономном вождении, а также описывает ключевые датасеты, бенчмарки и протоколы оценки. Исследование систематизирует быстро растущую литературу о world models и выделяет основные парадигмы, приложения и направления развития предсказательного моделирования для воплощённых агентов.'}, 'en': {'title': 'Unifying World Models for Enhanced Robot Learning', 'desc': 'This paper reviews the concept of world models, which are predictive tools that help robots understand and interact with their environments. It discusses how these models are used in robot learning for tasks like planning and policy learning, and how they have evolved with advancements in AI. The authors highlight the need for a unified understanding of different architectures and applications of world models in robotics. They also provide insights into future challenges and directions for improving predictive modeling in robots, along with resources for ongoing research.'}, 'zh': {'title': '世界模型：机器人学习的核心', 'desc': '本论文综述了世界模型在机器人学习中的应用，强调其作为环境动态预测表示的重要性。世界模型支持策略学习、规划、模拟和评估，随着基础模型和大规模视频生成的兴起而迅速发展。我们探讨了世界模型与机器人策略的结合，以及它们在强化学习中的作用，特别是在导航和自动驾驶中的应用。最后，论文总结了相关数据集、基准和评估协议，并指出了未来在预测建模方面的挑战和方向。'}}}, {'id': 'https://huggingface.co/papers/2605.12483', 'title': 'Beyond GRPO and On-Policy Distillation: An Empirical Sparse-to-Dense Reward Principle for Language-Model Post-Training', 'url': 'https://huggingface.co/papers/2605.12483', 'abstract': 'Abstract Training efficiency is improved by strategically allocating scarce labeled data through staged reinforcement learning and dense supervision, using sparse rewards for teacher model discovery and dense rewards for student model compression.  AI-generated summary In settings where labeled verifiable training data is the binding constraint, each checked example should be allocated carefully. The standard practice is to use this data directly on the model that will be deployed, for example by running GRPO on the deployment student. We argue that this is often an inefficient allocation because it overlooks a reward-density principle: sparse sequence-level reward should train models where exploration is productive, while dense token-level teacher reward should be used where the aim is to compress behavior into a smaller model. In this view, GRPO-style sparse RL and OPD-style dense teacher supervision are not separate recipes; they are different reward-density regimes. The allocation rule is simple: use scarce labeled training data upstream on the strongest model that can turn it into reward-shaped behavior, then transfer that behavior downstream as dense supervision. We evaluate this rule on verifiable math with Qwen3 and Llama models. At fixed Qwen3-1.7B deployment-student size, an RL-improved 8B teacher distilled through the dense bridge outperforms direct GRPO on the same student, while transfer from the same teacher before RL underperforms. The bridge is important: a forward-KL warmup on teacher rollouts followed by OPD on student rollouts is consistently strongest on MATH before any post-bridge student-side sparse RL, and also gives the best pre-Stage~3 AIME endpoints for the canonical 8B/14B teachers. The bridge also makes later student-side sparse RL effective: GRPO that is weak on a cold student lifts MATH from 75.4% to 78.5% after the bridge and outperforms a matched replay control by 2.8 points. The operational principal is to avoid using scarce labeled data on the least prepared policy: use sparse reward for teacher-side discovery, dense transfer for student compression, and student-side sparse reward only after the bridge.', 'score': 7, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd67e0084d0fa8365', 'authors': ['Yuanda Xu', 'Hejian Sang', 'Zhengze Zhou', 'Ran He', 'Zhipeng Wang', 'Alborz Geramifard'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.12483.jpg', 'data': {'categories': ['#optimization', '#rl', '#training', '#small_models', '#transfer_learning'], 'emoji': '🌉', 'ru': {'title': 'От учителя к студенту: оптимальный путь редких данных через плотный трансфер', 'desc': 'В работе предлагается новый подход к эффективному использованию ограниченных размеченных данных при обучении моделей глубокого обучения. Авторы вводят принцип распределения плотности вознаграждений: разреженное вознаграждение следует применять для обучения учительской модели через обучение с подкреплением, а плотное вознаграждение — для компрессии её поведения в меньшую студентскую модель через дистилляцию. Экспериментальные результаты на математических задачах показывают, что двухэтапная схема с промежуточным мостом для трансфера поведения значительно эффективнее прямого применения редкого RL к студентской модели. Данный подход демонстрирует улучшения в точности на бенчмарках MATH и AIME при использовании одного и того же объёма размеченных данных.'}, 'en': {'title': 'Maximizing Training Efficiency with Smart Data Allocation', 'desc': 'This paper discusses how to improve training efficiency in machine learning by using labeled data more effectively. It introduces a method that combines staged reinforcement learning with dense supervision, where sparse rewards help discover teacher models and dense rewards assist in compressing student models. The authors argue that using labeled data directly on deployment models is often inefficient and propose a strategy to allocate this data to maximize learning. Their experiments show that this approach leads to better performance in tasks like verifiable math, demonstrating the importance of a structured allocation of training resources.'}, 'zh': {'title': '优化稀缺标记数据的训练效率', 'desc': '本论文提出了一种通过分阶段强化学习和密集监督来提高训练效率的方法，特别是在标记数据稀缺的情况下。我们强调了奖励密度原则，即稀疏的序列级奖励应用于探索性训练，而密集的标记级奖励则用于模型压缩。通过将稀缺的标记数据分配给最强的模型进行奖励行为的生成，然后将这种行为转移到下游模型进行密集监督，可以有效提高模型性能。实验结果表明，经过这种桥接策略后，学生模型的表现显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.09998', 'title': 'Continual Harness: Online Adaptation for Self-Improving Foundation Agents', 'url': 'https://huggingface.co/papers/2605.09998', 'abstract': "Abstract A self-improving AI system for embodied agents autonomously refines its own prompts, skills, and memory through continuous learning without environment resets, achieving human-level performance in complex video games.  AI-generated summary Coding harnesses such as Claude Code and OpenHands wrap foundation models with tools, memory, and planning, but no equivalent exists for embodied agents' long-horizon partial-observability decision-making. We first report our Gemini Plays Pokemon (GPP) experiments. With iterative human-in-the-loop harness refinement, GPP became the first AI system to complete Pokemon Blue, Yellow Legacy on hard mode, and Crystal without a lost battle. In the hardest stages, the agent itself began iterating on its strategy through long-context memory, surfacing emergent self-improvement signals alongside human-in-the-loop refinement. Continual Harness removes the human fully from this loop: a reset-free self-improving harness for embodied agents that formalizes and automates what we observed. Starting from only a minimal environment interface, the agent alternates between acting and refining its own prompt, sub-agents, skills, and memory, drawing on any past trajectory data. Prompt-optimization methods require episode resets; Continual Harness adapts online within a single run. On Pokemon Red and Emerald across frontier models, Continual Harness starting from scratch substantially reduces button-press cost relative to the minimalist baseline and recovers a majority of the gap to a hand-engineered expert harness, with capability-dependent gains, despite starting from the same raw interface with no curated knowledge, no hand-crafted tools, and no domain scaffolding. We then close the loop with the model itself: an online process-reward co-learning loop, in which an open-source agent's rollouts through the refining harness are relabeled by a frontier teacher and used to update the model, drives sustained in-game milestone progress on Pokemon Red without resetting the environment between training iterations.", 'score': 7, 'issue_id': 2214, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'e6afbf77421e2893', 'authors': ['Seth Karten', 'Joel Zhang', 'Tersoo Upaa', 'Ruirong Feng', 'Wenzhe Li', 'Chengshuai Shi', 'Chi Jin', 'Kiran Vodrahalli'], 'affiliations': ['ARISE Foundation', 'Google DeepMind', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09998.jpg', 'data': {'categories': ['#open_source', '#robotics', '#agents', '#optimization', '#long_context', '#training', '#games', '#rlhf'], 'emoji': '🎮', 'ru': {'title': 'Агент, который учится улучшать сам себя во время игры', 'desc': 'Работа представляет систему самосовершенствования для воплощённых агентов, которые автономно улучшают свои собственные подсказки, навыки и память через непрерывное обучение без перезагрузки окружения. Авторы разработали Continual Harness — платформу, которая позволяет агенту итеративно оптимизировать свои стратегии прямо во время взаимодействия с окружением, основываясь на истории своих действий. Система была протестирована на видеоиграх Pokemon, где агент начиная с минимального интерфейса достиг результатов, близких к ручной оптимизации экспертов. Авторы также внедрили цикл обучения с использованием награды за процесс, позволяя пограничным моделям обновляться во время игры без перезагрузок окружения.'}, 'en': {'title': 'Self-Improving AI: Mastering Games Without Resets', 'desc': 'This paper presents a self-improving AI system designed for embodied agents that enhances its own capabilities through continuous learning without needing to reset the environment. The system, called Continual Harness, allows the agent to autonomously refine its prompts, skills, and memory while playing complex video games like Pokemon. By utilizing long-context memory and iterative human-in-the-loop refinement, the agent achieves human-level performance and can adapt its strategies in real-time. The approach significantly reduces the need for manual intervention and optimizes performance by learning from past experiences during a single run.'}, 'zh': {'title': '自我改进的AI：无缝学习与优化', 'desc': '这篇论文介绍了一种自我改进的人工智能系统，能够在复杂的视频游戏中实现人类水平的表现。该系统通过持续学习，自动优化自己的提示、技能和记忆，而无需重置环境。研究中，AI在《口袋妖怪》游戏中表现出色，首次在困难模式下完成了多个版本的游戏，且没有输掉一场战斗。最终，论文提出了一种名为“持续工具”的方法，使得AI能够在单次运行中在线适应和改进，而不需要人工干预。'}}}, {'id': 'https://huggingface.co/papers/2605.11011', 'title': 'LoopUS: Recasting Pretrained LLMs into Looped Latent Refinement Models', 'url': 'https://huggingface.co/papers/2605.11011', 'abstract': 'Abstract LoopUS is a post-training framework that transforms pretrained LLMs into looped architectures for improved reasoning performance through latent-refinement and adaptive early exiting mechanisms.  AI-generated summary Looped computation shows promise in improving the reasoning-oriented performance of LLMs by scaling test-time compute. However, existing approaches typically require either training recurrent models from scratch or applying disruptive retrofits, which involve substantial computational costs and may compromise pretrained capabilities. To address these limitations, we introduce Looped Depth Up-Scaling (LoopUS), a post-training framework that converts a standard pretrained LLM into a looped architecture. As a key technical contribution, LoopUS recasts the pretrained LLM into an encoder, a looped reasoning block, and a decoder. It operationalizes this latent-refinement architecture through four core components: (1) block decomposition, guided by staged representation dynamics; (2) an input-dependent selective gate to mitigate hidden-state drift; (3) random deep supervision for memory-efficient learning over long recursive horizons; and (4) a confidence head for adaptive early exiting. Collectively, these mechanisms transform a standard non-looped model into a looped form while stabilizing it against both computational bottlenecks and representation collapse. Through stable latent looping, LoopUS improves reasoning-oriented performance without extending the generated traces or requiring recurrent training from scratch. For more details, see https://thrillcrazyer.github.io/LoopUS', 'score': 7, 'issue_id': 2213, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '320785c8ecee9864', 'authors': ['Taekhyun Park', 'Yongjae Lee', 'Dohee Kim', 'Hyerim Bae'], 'affiliations': ['Changwon National University', 'Pusan National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11011.jpg', 'data': {'categories': ['#reasoning', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'Циклическое уточнение для улучшения логических способностей языковых моделей', 'desc': 'LoopUS — это фреймворк для постобучения, который преобразует предобученные языковые модели в циклические архитектуры с механизмом уточнения скрытых представлений. Подход использует четыре ключевых компонента: декомпозицию блоков, селективный вентиль для стабилизации скрытых состояний, глубокий супервизор для эффективного обучения и адаптивный ранний выход на основе доверия. Фреймворк позволяет улучшить логические способности модели во время инференции, масштабируя вычислительные ресурсы, без необходимости переобучения с нуля или разрушительных модификаций архитектуры. LoopUS стабилизирует циклические вычисления и предотвращает коллапс представлений, достигая лучшей производительности на задачах рассуждения без расширения трассировки вывода.'}, 'en': {'title': 'Transforming LLMs for Enhanced Reasoning with LoopUS', 'desc': "LoopUS is a framework that enhances pretrained large language models (LLMs) by converting them into looped architectures, which improves their reasoning abilities. It achieves this through a process called latent-refinement and includes mechanisms for adaptive early exiting, allowing the model to make decisions about when to stop processing. The framework consists of four main components that help maintain the model's performance while reducing computational costs. Overall, LoopUS enables better reasoning without the need for extensive retraining or compromising the model's existing capabilities."}, 'zh': {'title': 'LoopUS：提升推理性能的循环架构', 'desc': 'LoopUS 是一个后训练框架，旨在将预训练的大型语言模型（LLM）转变为循环架构，以提高推理性能。该框架通过潜在细化和自适应提前退出机制来实现这一目标，避免了从头训练递归模型的高计算成本。LoopUS 将预训练的 LLM 重新构建为编码器、循环推理块和解码器，并通过四个核心组件来优化其性能。最终，LoopUS 在不增加计算负担的情况下，提升了模型的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.10977', 'title': 'PASA: A Principled Embedding-Space Watermarking Approach for LLM-Generated Text under Semantic-Invariant Attacks', 'url': 'https://huggingface.co/papers/2605.10977', 'abstract': 'Abstract PASA is a robust watermarking algorithm for large language models that operates at the semantic level using latent embedding spaces and shared randomness for secure text detection.  AI-generated summary Watermarking for large language models (LLMs) is a promising approach for detecting LLM-generated text and enabling responsible deployment. However, existing watermarking methods are often vulnerable to semantic-invariant attacks, such as paraphrasing. We propose PASA, a principled, robust, and distortion-free watermarking algorithm that embeds and detects a watermark at the semantic level. PASA operates on semantic clusters in a latent embedding space and constructs a distributional dependency between token and auxiliary sequences via shared randomness synchronized by a secret key and semantic history. This design is grounded in our theoretical framework that characterizes a jointly optimal embedding-detection pair, achieving the fundamental trade-offs among detection accuracy, robustness, and distortion. Evaluations across multiple LLMs and semantic-invariant attacks demonstrate that PASA remains robust even under strong paraphrasing attacks while preserving high text quality, outperforming standard vocabulary-space baselines. Ablation studies further validate the effectiveness of our hyperparameter choices. Webpage: https://ai-kunkun.github.io/PASA_page/.', 'score': 7, 'issue_id': 2214, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': '6330a356f60a5a90', 'authors': ['Zhenxin Ai', 'Haiyun He'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou), Guangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.10977.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Неуязвимая защита текста: водяные знаки на семантическом уровне', 'desc': 'PASA — это надёжный алгоритм водяных знаков для больших языковых моделей, работающий на семантическом уровне в пространстве скрытых векторных представлений. Метод встраивает водяной знак в семантические кластеры текста, используя общую случайность, синхронизируемую секретным ключом и историей. Авторы разработали теоретический фреймворк, характеризующий оптимальную пару встраивания-детекции и обеспечивающий баланс между точностью обнаружения, устойчивостью и качеством текста. Эксперименты показывают, что PASA устойчива к семантически инвариантным атакам типа перефразирования, значительно превосходя базовые методы в словарном пространстве.'}, 'en': {'title': 'PASA: Robust Watermarking for Secure AI Text Detection', 'desc': 'PASA is a novel watermarking algorithm designed for large language models (LLMs) that focuses on embedding watermarks at the semantic level. It utilizes latent embedding spaces and shared randomness to ensure secure detection of AI-generated text, making it resilient against common attacks like paraphrasing. The algorithm establishes a distributional dependency between tokens and auxiliary sequences, which is synchronized by a secret key and semantic history. Evaluations show that PASA maintains high detection accuracy and text quality, outperforming traditional methods even under challenging conditions.'}, 'zh': {'title': 'PASA：语义层面的稳健水印算法', 'desc': 'PASA是一种针对大型语言模型的稳健水印算法，能够在语义层面进行操作。它利用潜在嵌入空间和共享随机性来实现安全的文本检测。与现有方法相比，PASA在面对语义不变攻击（如改写）时表现出更强的鲁棒性。该算法通过构建令牌和辅助序列之间的分布依赖关系，确保在保持文本质量的同时实现高效的水印嵌入和检测。'}}}, {'id': 'https://huggingface.co/papers/2605.11711', 'title': 'Debiased Model-based Representations for Sample-efficient Continuous Control', 'url': 'https://huggingface.co/papers/2605.11711', 'abstract': 'Abstract DR.Q algorithm improves model-based representations for Q-learning by maximizing mutual information and using faded prioritized experience replay to reduce bias and overfitting in representation learning.  AI-generated summary Model-based representations recently stand out as a promising framework that embeds latent dynamics information into the representations for downstream off-policy actor-critic learning. It implicitly combines the advantages of both model-free and model-based approaches while avoiding the training costs associated with model-based methods. Nevertheless, existing model-based representation methods can fail to capture sufficient information about relevant variables and can overfit to early experiences in the replay buffer. These incur biases in representation and actor-critic learning, leading to inferior performance. To address this, we propose Debiased model-based Representations for Q-learning, tagged DR.Q algorithm. DR.Q explicitly maximizes the mutual information between the representations of the current state-action pair and the next state besides minimizing their deviations, and samples transitions with faded prioritized experience replay. We evaluate DR.Q on numerous continuous control benchmarks with a single set of hyperparameters, and the results demonstrate that DR.Q can match or surpass recent strong baselines, sometimes outperforming them by a large margin. Our code is available at https://github.com/dmksjfl/DR.Q.', 'score': 6, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '9234575359acfacc', 'authors': ['Jiafei Lyu', 'Zichuan Lin', 'Scott Fujimoto', 'Kai Yang', 'Yangkun Chen', 'Saiyong Yang', 'Zongqing Lu', 'Deheng Ye'], 'affiliations': ['McGill University', 'School of Computer Science, Peking University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2605.11711.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Устранение смещений в представлениях моделей для более качественного обучения с подкреплением', 'desc': 'Статья представляет алгоритм DR.Q для улучшения обучения с подкреплением на основе моделей. Основная идея заключается в максимизации взаимной информации между представлениями текущей и следующей пары состояние-действие, что позволяет лучше захватить релевантную информацию. Алгоритм использует затухающее приоритизированное воспроизведение опыта для снижения смещения, вызванного переобучением на ранних примерах в буфере повтора. Экспериментальные результаты показывают, что DR.Q превосходит современные методы на различных задачах управления в непрерывных пространствах действий.'}, 'en': {'title': 'Maximizing Information for Better Q-Learning', 'desc': 'The DR.Q algorithm enhances Q-learning by improving model-based representations through the maximization of mutual information. It utilizes faded prioritized experience replay to mitigate bias and overfitting during representation learning. This approach effectively combines the strengths of model-free and model-based methods while reducing the computational burden typically associated with model-based training. Evaluations on various continuous control tasks show that DR.Q achieves performance that meets or exceeds that of leading benchmarks, demonstrating its effectiveness in reinforcement learning.'}, 'zh': {'title': 'DR.Q：提升Q学习的模型表示', 'desc': 'DR.Q算法通过最大化互信息来改进基于模型的Q学习表示，使用渐进优先经验重放来减少表示学习中的偏差和过拟合。该算法结合了无模型和有模型方法的优点，避免了有模型方法的训练成本。现有的基于模型的表示方法往往无法充分捕捉相关变量的信息，并且容易对早期经验过拟合，导致表示和演员-评论家学习中的偏差。DR.Q通过显式最大化当前状态-动作对与下一个状态之间的互信息，来解决这些问题，并在多个连续控制基准上进行评估，结果表明其性能优于许多强基线。'}}}, {'id': 'https://huggingface.co/papers/2605.12477', 'title': 'MEME: Multi-entity & Evolving Memory Evaluation', 'url': 'https://huggingface.co/papers/2605.12477', 'abstract': 'Abstract MEME benchmark evaluates memory systems across multiple entities and evolving conditions, revealing persistent challenges in dependency reasoning despite advanced retrieval and prompting techniques.  AI-generated summary LLM-based agents increasingly operate in persistent environments where they must store, update, and reason over information across many sessions. While prior benchmarks evaluate only single-entity updates, MEME defines six tasks spanning the full space defined by the multi-entity and evolving axes, including three not scored by prior work: Cascade and Absence (dependency reasoning) and Deletion (post-removal state). Evaluating six memory systems spanning three memory paradigms on 100 controlled episodes, we find that all systems collapse on dependency reasoning under the default configuration (Cascade: 3%, Absence: 1% in average accuracy) despite adequate static retrieval performance. Prompt optimization, deeper retrieval, reduced filler noise, and most stronger LLMs fail to close this gap. Only a file-based agent paired with Claude Opus 4.7 as its internal LLM partially closes the gap, but at ~70x the baseline cost, indicating closure currently depends on configurations that are not practical at scale. Code and data are available on the project page: https://seokwonjung-jay.github.io/meme-eval/.', 'score': 6, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '37fab6ee26540d3c', 'authors': ['Seokwon Jung', 'Alexander Rubinstein', 'Arnas Uselis', 'Sangdoo Yun', 'Seong Joon Oh'], 'affiliations': ['KAIST AI', 'NAVER AI Lab', 'Tübingen AI Center, University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2605.12477.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Память AI-агентов не справляется с логическими зависимостями', 'desc': 'В работе представлен бенчмарк MEME для оценки систем памяти AI-агентов, работающих в долгоживущих окружениях с множественными сущностями и изменяющимися условиями. Бенчмарк включает шесть задач, охватывающих различные комбинации многосущностных обновлений и эволюции информации, включая сложные задачи на рассуждение о зависимостях между данными. Исследование показало, что все протестированные системы памяти (охватывающие три парадигмы) критически падают в производительности при рассуждении о зависимостях, даже если они хорошо работают на задачах статического извлечения информации. Авторы обнаружили, что улучшение подсказок, более глубокий поиск и более мощные LLM-модели не решают эту фундаментальную проблему, кроме дорогостоящего решения с Claude Opus, что указывает на необходимость пересмотра подходов к проектированию систем памяти для агентов.'}, 'en': {'title': 'Evaluating Memory Systems: The Challenge of Dependency Reasoning', 'desc': 'The MEME benchmark assesses how well memory systems handle information across different entities and changing conditions. It highlights ongoing difficulties in dependency reasoning, even with advanced techniques like retrieval and prompting. The study introduces six tasks that evaluate memory systems in multi-entity scenarios, revealing that all tested systems struggle with dependency reasoning, achieving very low accuracy rates. The findings suggest that while some improvements can be made, they often come at a high cost, making them impractical for widespread use.'}, 'zh': {'title': 'MEME基准：揭示记忆系统的依赖推理挑战', 'desc': 'MEME基准测试评估了在多实体和不断变化的条件下的记忆系统，揭示了尽管有先进的检索和提示技术，依赖推理仍然面临持续挑战。AI生成的基于大语言模型的代理在持久环境中操作，必须在多个会话中存储、更新和推理信息。MEME定义了六个任务，涵盖了多实体和演变轴的完整空间，其中包括三个之前未评分的任务：级联和缺失（依赖推理）以及删除（后移除状态）。在100个受控实验中评估的六个记忆系统显示，所有系统在默认配置下的依赖推理表现不佳，表明当前的解决方案在规模上并不实用。'}}}, {'id': 'https://huggingface.co/papers/2605.10365', 'title': 'Agent-ValueBench: A Comprehensive Benchmark for Evaluating Agent Values', 'url': 'https://huggingface.co/papers/2605.10365', 'abstract': "Abstract Autonomous agents exhibit distinct value systems from underlying language models, requiring new benchmarking approaches to assess alignment across diverse execution environments.  AI-generated summary Autonomous agents have rapidly matured as task executors and seen widespread deployment via harnesses such as OpenClaw. Safety concerns have rightly drawn growing research attention, and beneath them lie the values silently steering agent behavior. Existing value benchmarks, however, remain confined to LLMs, leaving agent values largely uncharted. From intuitive, empirical, and theoretical vantage points, we show that an agent's values diverge from those of its underlying LLM, and the agentic modality further introduces dataset-, evaluation-, and system-level challenges absent from text-only protocols. We close this gap with Agent-ValueBench, the first benchmark dedicated to agent values. It features 394 executable environments across 16 domains, offering 4,335 value-conflict tasks that cover 28 value systems and 332 dimensions. Every instance is co-synthesized through our purpose-built end-to-end pipeline and curated per-instance by professional psychologists. Each task ships with two pole-aligned golden trajectories whose checkpoints anchor a trajectory-level rubric-based judge. Benchmarking 14 frontier proprietary and open-weights models across 4 mainstream harnesses, we uncover three concerted findings. Agent values first manifest as a Value Tide of cross-model homogeneity beneath interpretable counter-currents. This tide bends non-additively under harness pull, and yet more decisively under deliberate steering via embedded skills. Together these results signal that the agent-alignment lever is shifting from classical model alignment and prompt steering toward harness alignment and skill steering.", 'score': 6, 'issue_id': 2214, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'b95b4f3b60805d7c', 'authors': ['Haonan Dong', 'Qiguan Feng', 'Kehan Jiang', 'Haoran Ye', 'Xin Zhang', 'Guojie Song'], 'affiliations': ['Key Laboratory of Machine Perception (Ministry of Education), Peking University', 'School of Intelligence Science and Technology, Peking University', 'School of Psychological and Cognitive Sciences, Peking University', 'School of Software and Microelectronics, Peking University', 'State Key Laboratory of General Artificial Intelligence, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2605.10365.jpg', 'data': {'categories': ['#open_source', '#dataset', '#agents', '#alignment', '#benchmark'], 'emoji': '⚖️', 'ru': {'title': 'От ценностей модели к ценностям агента: выравнивание через архитектуру, а не обучение', 'desc': 'В этой работе исследуются ценностные системы автономных агентов, которые значительно отличаются от ценностей базовых языковых моделей. Авторы создали Agent-ValueBench — первый специализированный бенчмарк для оценки ценностей агентов, включающий 394 исполняемых окружения и 4335 задач, охватывающих 28 различных ценностных систем. Они обнаружили, что ценности агентов проявляются как однородный тренд через разные модели, но при этом зависят от выбранной системы выполнения и встроенных навыков. Исследование показывает, что основной рычаг управления согласованностью агентов смещается от выравнивания моделей к выравниванию архитектуры выполнения и развитию специальных навыков.'}, 'en': {'title': 'Aligning Autonomous Agents: Beyond Language Models', 'desc': 'This paper discusses the differences between the values of autonomous agents and the underlying language models (LLMs) they are based on. It highlights the need for new benchmarking methods to evaluate how well these agents align with desired values in various environments. The authors introduce Agent-ValueBench, a comprehensive benchmark that includes numerous tasks designed to assess agent values across multiple domains. Their findings suggest that agent values are influenced by the environment and specific skills, indicating a shift in focus from traditional model alignment to harness and skill alignment.'}, 'zh': {'title': '智能体价值的新基准测试', 'desc': '自主智能体的价值系统与其基础语言模型存在显著差异，因此需要新的基准测试方法来评估在不同执行环境中的一致性。现有的价值基准主要集中在大型语言模型（LLMs）上，导致智能体的价值尚未被充分探索。我们提出了Agent-ValueBench，这是第一个专注于智能体价值的基准，涵盖394个可执行环境和28种价值系统。通过对14个前沿模型的测试，我们发现智能体的价值表现出跨模型的一致性，并且在不同的环境和技能引导下会发生变化。'}}}, {'id': 'https://huggingface.co/papers/2605.12460', 'title': 'Multi-Stream LLMs: Unblocking Language Models with Parallel Streams of Thoughts, Inputs and Outputs', 'url': 'https://huggingface.co/papers/2605.12460', 'abstract': 'Abstract Language models can be enhanced by transitioning from sequential message-based instruction-tuning to parallel stream processing, enabling simultaneous reading and generation across multiple concurrent data flows.  AI-generated summary The continued improvements in language model capability have unlocked their widespread use as drivers of autonomous agents, for example in coding or computer use applications. However, the core of these systems has not changed much since early instruction-tuned models like ChatGPT. Even advanced AI agents function on message exchange formats, successively exchanging messages with users, systems, with itself (i.e. chain-of-thought) and tools in a single stream of computation. This bottleneck to a single stream in chat models leads to a number of limitations: the agent cannot act (generate output) while reading, and in reverse, cannot react to new information while writing. Similarly, the agent cannot act while thinking and cannot think while reading or acting on information.   In this work, we show that models can be unblocked by switching from instruction-tuning for sequential message formats to instruction-tuning for multiple, parallel streams of computation, splitting each role into a separate stream. Every forward pass of the language model then simultaneously reads from multiple input streams and generates tokens in multiple output streams, all of which causally depend on earlier timesteps. We argue that this data-driven change remedies a number of usability limitations as outlined above, improves model efficiency through parallelization, improves model security through better separation of concerns and can further improve model monitorability.', 'score': 4, 'issue_id': 2216, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '1857ebb27513f409', 'authors': ['Guinan Su', 'Yanwu Yang', 'Xueyan Li', 'Jonas Geiping'], 'affiliations': ['ELLIS Institute Tübingen', 'ETH Zurich', 'Max Planck Institute for Intelligent Systems', 'Tübingen AI Center', 'University Hospital Tübingen', 'University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2605.12460.jpg', 'data': {'categories': ['#training', '#architecture', '#agents'], 'emoji': '⚡', 'ru': {'title': 'От последовательных сообщений к параллельным потокам: развязывание языковых моделей', 'desc': 'В этой работе предлагается переход от последовательной обработки сообщений в языковых моделях к параллельной потоковой архитектуре. Авторы показывают, что модель может одновременно читать из нескольких входных потоков и генерировать токены в несколько выходных потоков, где каждый поток соответствует отдельной роли. Такой подход устраняет узкое место единственного потока вычислений, позволяя агенту одновременно выполнять чтение и генерацию, а также думать и действовать параллельно. Это улучшает эффективность за счёт параллелизации, повышает безопасность через разделение ответственности и облегчает мониторинг работы модели.'}, 'en': {'title': 'Unlocking Language Models with Parallel Processing', 'desc': 'This paper proposes a new approach to enhance language models by shifting from a sequential message-based instruction-tuning method to a parallel stream processing technique. By allowing the model to read and generate outputs simultaneously across multiple data streams, it overcomes limitations of traditional chat models that can only process one task at a time. This parallelization not only improves the efficiency of the model but also enhances its usability, security, and monitorability. The authors demonstrate that this method enables more effective interaction and response capabilities for AI agents in various applications.'}, 'zh': {'title': '并行流处理：提升语言模型的效率与灵活性', 'desc': '本论文提出了一种新的语言模型增强方法，通过从顺序消息指令调优转向并行流处理，实现了多个数据流的同时读取和生成。这种方法解决了传统模型在信息处理中的瓶颈，使得模型可以在读取时生成输出，反之亦然。通过将每个角色分配到独立的流中，模型能够同时从多个输入流读取并在多个输出流中生成标记。我们认为，这种数据驱动的变化不仅提高了模型的效率，还改善了安全性和可监控性。'}}}, {'id': 'https://huggingface.co/papers/2605.11182', 'title': 'The Many Faces of On-Policy Distillation: Pitfalls, Mechanisms, and Fixes', 'url': 'https://huggingface.co/papers/2605.11182', 'abstract': "Abstract On-policy distillation and self-distillation methods for large language models exhibit varying effectiveness depending on teacher choice, loss formulation, and instance-specific privileged information availability, with identified failure mechanisms including distribution mismatch, optimization instability, and PI-free policy learning.  AI-generated summary On-policy distillation (OPD) and on-policy self-distillation (OPSD) have emerged as promising post-training methods for large language models, offering dense token-level supervision on trajectories sampled from the model's own policy. However, existing results on their effectiveness remain mixed: while OP(S)D has shown promise in system prompt and knowledge internalization, recent studies also report instability and degradation. In this work, we present a comprehensive empirical study of when OPD and OPSD work, when they fail, and why. We find that OPD on mathematical reasoning is highly sensitive to teacher choice and loss formulation, whereas OPSD fails in our tested settings due to test-time absence of instance-specific privileged information (PI). In contrast, OPSD is effective when PI represents a shared latent rule, such as a system prompt or alignment preference. We identify three failure mechanisms: (1) distribution mismatch between teacher and student caused by conditioning on student-generated prefixes, (2) optimization instability from biased TopK reverse-KL gradients, and (3) an OPSD-specific limitation where the student learns a PI-free policy that aggregates PI-conditioned teachers, which is insufficient when PI is instance-specific. We further show that stop-gradient TopK objectives, RLVR-adapted teachers, and SFT-stabilized students mitigate these failures.", 'score': 4, 'issue_id': 2213, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '7b0bebd97f939191', 'authors': ['Siqi Zhu', 'Xuyan Ye', 'Hongyu Lu', 'Weiye Shi', 'Ge Liu'], 'affiliations': ['Peking University', 'Renmin University of China', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.11182.jpg', 'data': {'categories': ['#alignment', '#math', '#optimization', '#reasoning', '#rlhf', '#training'], 'emoji': '🧠', 'ru': {'title': 'Когда и почему дистилляция на собственной политике для LLM работает или fails', 'desc': 'В работе исследуются методы дистилляции на собственной политике (on-policy distillation) и самодистилляции для больших языковых моделей. Авторы выявляют три ключевых механизма отказа: несоответствие распределений между учителем и студентом, нестабильность оптимизации из-за смещённых градиентов, и неспособность модели обучаться политике, зависящей от привилегированной информации. Исследование показывает, что эффективность методов сильно зависит от выбора учителя, формулировки функции потерь и доступности информации на время инференса. Предложены техники стабилизации, включаяStop-Gradient TopK, RLVR-адаптированных учителей и SFT-стабилизированных студентов.'}, 'en': {'title': 'Optimizing Distillation: Navigating Challenges in Language Model Training', 'desc': 'This paper investigates the effectiveness of on-policy distillation (OPD) and on-policy self-distillation (OPSD) methods for large language models. It highlights that the success of these methods depends significantly on the choice of teacher models, the formulation of loss functions, and the availability of instance-specific privileged information (PI). The authors identify key failure mechanisms such as distribution mismatch, optimization instability, and challenges in learning policies without instance-specific PI. They propose solutions like stop-gradient TopK objectives and RLVR-adapted teachers to address these issues and improve the performance of OPD and OPSD.'}, 'zh': {'title': '优化在线蒸馏与自蒸馏的有效性', 'desc': '本文研究了大语言模型的在线蒸馏（OPD）和自蒸馏（OPSD）方法的有效性，发现其效果受教师选择、损失函数和特定实例的特权信息（PI）影响。研究表明，OPD在数学推理任务中对教师选择和损失函数非常敏感，而OPSD在缺乏特定实例的PI时表现不佳。文章识别了三种失败机制，包括教师与学生之间的分布不匹配、优化不稳定性以及OPSD特有的限制。最后，提出了一些方法来缓解这些问题，如停止梯度TopK目标和适应性教师。'}}}, {'id': 'https://huggingface.co/papers/2605.08299', 'title': 'Do not copy and paste! Rewriting strategies for code retrieval', 'url': 'https://huggingface.co/papers/2605.08299', 'abstract': 'Abstract Research investigates how different text rewriting strategies impact code retrieval performance, identifying that full natural language rewriting provides the greatest improvements while proposing entropy-based diagnostics to determine when such costly rewrites are beneficial.  AI-generated summary Embedding-based code retrieval often suffers when encoders overfit to surface syntax. Prior work mitigates this by using LLMs to rephrase queries and corpora into a normalized style, but leaves two questions open: how much representational shift helps, and when is the per-query LLM call justified? We study a hierarchy of three rewriting strategies: stylistic rephrasing, NL-enriched PseudoCode, and full Natural-Language transcription, under joint query-corpus (QC, online) and corpus-only (C, offline) augmentation, across six CoIR benchmarks, five encoders, and three rewriters spanning independent model families (Qwen, DeepSeek, Mistral). We are the first to evaluate NL-enriched PseudoCode and snippet-level Natural Language as direct retrieval representations, rather than as transient intermediates. Full NL rewriting with QC yields the largest gains (+0.51 absolute NDCG@10 on CT-Contest for MoSE-18), while corpus-only rewriting degrades retrieval in 56 of 90 configurations, about 62%. We introduce two diagnostics, Delta H, token entropy, and Delta s, embedding cosine, and show that Delta H predicts retrieval gain under QC across all three rewriter families: pooled Spearman rho = +0.436, p < 0.001 on DeepSeek+Codestral; rho = +0.593 on Codestral alone; rho = +0.356 on Qwen. This establishes Delta H as a cheap, rewriter-agnostic proxy for deciding when rewriting pays off before running retrieval. Our analysis reframes LLM rewriting as a cost-benefit decision: it is most effective as a remediation layer for lightweight encoders on code-dominant queries, with diminishing returns for strong encoders or NL-heavy queries.', 'score': 4, 'issue_id': 2215, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'a6a197ae0226c4f8', 'authors': ['Andrea Gurioli', 'Federico Pennino', 'Maurizio Gabbrielli'], 'affiliations': ['DISI University of Bologna'], 'pdf_title_img': 'assets/pdf/title_img/2605.08299.jpg', 'data': {'categories': ['#data', '#plp', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Когда переписывать код дороже, чем искать: энтропийная диагностика для умного использования LLM', 'desc': 'Исследование изучает, как различные стратегии переписывания текста влияют на производительность поиска кода с использованием embedding-based моделей. Авторы сравнивают три подхода: стилистическое переформулирование, псевдокод с обогащением на естественном языке и полное переписывание на естественном языке. Они показали, что полное переписывание с совместной аугментацией запроса и корпуса дает наибольший прирост производительности, в то время как аугментация только корпуса часто ухудшает результаты. Авторы предложили два диагностических метода на основе энтропии токенов и косинусного сходства embeddings, которые могут предсказать, когда переписывание действительно полезно, и служат дешевой альтернативой перед запуском полного поиска.'}, 'en': {'title': 'Maximizing Code Retrieval with Smart Text Rewriting', 'desc': 'This research explores how different strategies for rewriting text can improve the performance of code retrieval systems. It finds that using full natural language rewriting significantly enhances retrieval accuracy compared to other methods. The study introduces two diagnostic measures, Delta H and Delta s, to help determine when rewriting is beneficial, particularly in joint query-corpus scenarios. Overall, the findings suggest that rewriting is most effective for simpler encoders dealing with code-focused queries, while stronger encoders see less benefit from such strategies.'}, 'zh': {'title': '重写策略提升代码检索性能的研究', 'desc': '本研究探讨了不同文本重写策略对代码检索性能的影响，发现完整的自然语言重写提供了最大的改进。研究提出了基于熵的诊断方法，以确定何时进行这种成本较高的重写是有益的。我们评估了三种重写策略的层次结构，并在多个基准测试中进行实验，结果显示完整的自然语言重写在检索中获得了显著的提升。我们的分析将LLM重写视为一种成本效益决策，强调在代码主导的查询中使用轻量级编码器时的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.12493', 'title': 'LongMemEval-V2: Evaluating Long-Term Agent Memory Toward Experienced Colleagues', 'url': 'https://huggingface.co/papers/2605.12493', 'abstract': "Abstract A new benchmark called LongMemEval-V2 is introduced to evaluate memory systems' ability to help agents acquire environment-specific experience in web environments, featuring a suite of memory methods including AgentRunbook-R and AgentRunbook-C that demonstrate varying performance in accuracy and latency.  AI-generated summary Long-term memory is crucial for agents in specialized web environments, where success depends on recalling interface affordances, state dynamics, workflows, and recurring failure modes. However, existing memory benchmarks for agents mostly focus on user histories, short traces, or downstream task success, leaving open how to directly evaluate whether memory systems effectively internalize environment-specific experience. To address this gap, we introduce LongMemEval-V2 (LME-V2), a benchmark for evaluating whether memory systems can help agents acquire the experience needed to become knowledgeable colleagues in customized environments. LME-V2 contains 451 manually curated questions covering five core memory abilities for web agents: static state recall, dynamic state tracking, workflow knowledge, environment gotchas, and premise awareness. Questions are paired with history trajectories containing up to 500 trajectories and 115M tokens. We use a context gathering formulation: memory systems consume history trajectories and return compact evidence for downstream question answering. We propose a suite of two memory methods: AgentRunbook-R, an efficient RAG-based memory with knowledge pools for raw state observations, events, and strategy notes, and AgentRunbook-C, which stores trajectories as files and invokes a coding agent to gather evidence in an augmented sandbox. Experiments show that AgentRunbook-C achieves the best performance with 72.5% average accuracy, outperforming the strongest RAG baseline (48.5%) and the off-the-shelf coding agent baseline (69.3%). Despite the strong performance gains, coding agent based methods have high latency costs. While AgentRunbook-C advances the accuracy-latency Pareto frontier, substantial room for improvement remains. Together, these results establish LME-V2 as a challenging testbed for developing long-term memory systems for environment experience.", 'score': 3, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'e71bf7a7aea01f6e', 'authors': ['Di Wu', 'Zixiang Ji', 'Asmi Kawatkar', 'Bryan Kwan', 'Jia-Chen Gu', 'Nanyun Peng', 'Kai-Wei Chang'], 'affiliations': ['University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.12493.jpg', 'data': {'categories': ['#rag', '#benchmark', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Оценка долгосрочной памяти агентов в специализированных веб-окружениях', 'desc': 'В работе представлен новый бенчмарк LongMemEval-V2 для оценки систем долгосрочной памяти агентов, которые действуют в специализированных веб-окружениях. Бенчмарк содержит 451 вопрос, проверяющих пять ключевых способностей памяти: отзыв статического состояния, отслеживание динамического состояния, знание рабочих процессов, особенности окружения и контекстную осведомленность. Предложены два метода памяти: AgentRunbook-R, основанный на RAG с пулами знаний для наблюдений и заметок стратегии, и AgentRunbook-C, который использует кодирующего агента для поиска релевантной информации в изолированной среде. Экспериментальные результаты показывают, что AgentRunbook-C достигает 72,5% точности, превосходя RAG-базовый линию на 48,5%, однако имеет более высокие временные затраты.'}, 'en': {'title': 'Enhancing Agent Memory for Web Environments with LongMemEval-V2', 'desc': 'The paper introduces LongMemEval-V2, a benchmark designed to assess how well memory systems enable agents to learn from specific web environments. It highlights the importance of long-term memory for agents to recall essential information like workflows and common issues. The benchmark includes 451 questions that test five key memory abilities, using extensive history trajectories for context. Two memory methods, AgentRunbook-R and AgentRunbook-C, are evaluated, with AgentRunbook-C showing superior accuracy but higher latency, indicating a trade-off between performance and speed.'}, 'zh': {'title': '评估智能体记忆系统的新基准测试', 'desc': '本文介绍了一个新的基准测试LongMemEval-V2，用于评估记忆系统在网络环境中帮助智能体获取特定经验的能力。该基准测试包含了451个手动策划的问题，涵盖了五种核心记忆能力，包括静态状态回忆和动态状态跟踪等。研究提出了两种记忆方法：AgentRunbook-R和AgentRunbook-C，后者在准确性上表现最佳，达到了72.5%的平均准确率。尽管取得了显著的性能提升，但基于编码代理的方法仍存在较高的延迟成本，表明在准确性和延迟之间仍有改进空间。'}}}, {'id': 'https://huggingface.co/papers/2605.12449', 'title': 'LychSim: A Controllable and Interactive Simulation Framework for Vision Research', 'url': 'https://huggingface.co/papers/2605.12449', 'abstract': "Abstract A simulation framework called LychSim is introduced, featuring a Python API, procedural data pipeline, and MCP integration to enable controllable and interactive environments for vision system development and evaluation.  AI-generated summary While self-supervised pretraining has reduced vision systems' reliance on synthetic data, simulation remains an indispensable tool for closed-loop optimization and rigorous out-of-distribution (OOD) evaluation. However, modern simulation platforms often present steep technical barriers, requiring extensive expertise in computer graphics and game development. In this work, we present LychSim, a highly controllable and interactive simulation framework built upon Unreal Engine 5 to bridge this gap. LychSim is built around three key designs: (1) a streamlined Python API that abstracts away underlying engine complexities; (2) a procedural data pipeline capable of generating diverse, high-fidelity environments with varying out-of-distribution (OOD) visual challenges, paired with rich 2D and 3D ground truths; and (3) a native integration of the Model Context Protocol (MCP) that transforms the simulator into a dynamic, closed-loop playground for reasoning agentic LLMs. We further annotate scene-level procedural rules and object-level pose alignments to enable semantically aligned 3D ground truths and automated scene modification. We demonstrate LychSim's capability across multiple downstream applications, including serving as a synthetic data engine, powering reinforcement learning-based adversarial examiners, and facilitating interactive, language-driven scene layout generation. To benefit the broader vision community, LychSim will be made publicly available, including full source code and various data annotations.", 'score': 3, 'issue_id': 2213, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '5dfb8567d0ec7889', 'authors': ['Wufei Ma', 'Chloe Wang', 'Siyi Chen', 'Jiawei Peng', 'Patrick Li', 'Alan Yuille'], 'affiliations': ['Johns Hopkins University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12449.jpg', 'data': {'categories': ['#synthetic', '#agents', '#cv', '#rl', '#open_source', '#dataset', '#3d', '#reasoning'], 'emoji': '🎮', 'ru': {'title': 'Симуляция без барьеров: доступный фреймворк для развития зрительных систем', 'desc': 'Представлен фреймворк LychSim — симуляционная платформа на основе Unreal Engine 5, которая упрощает разработку и тестирование систем компьютерного зрения. Платформа предоставляет удобный Python API для абстрагирования сложности графического движка, процедурный конвейер данных для генерации разнообразных синтетических окружений с контролируемыми визуальными искажениями и богатой разметкой, а также интеграцию Model Context Protocol для взаимодействия с аагентными LLM. Фреймворк демонстрирует универсальность через приложения в генерации синтетических данных, обучении с подкреплением и интерактивной генерации сцен на основе естественного языка.'}, 'en': {'title': 'LychSim: Simplifying Simulation for Vision System Development', 'desc': 'LychSim is a new simulation framework designed to help develop and evaluate vision systems in a more accessible way. It features a Python API that simplifies the use of complex game engine technologies, making it easier for developers without extensive graphics knowledge. The framework can create diverse and realistic environments that challenge vision systems, providing valuable data for training and testing. Additionally, it integrates the Model Context Protocol (MCP) to allow for dynamic interactions, making it a versatile tool for various applications in machine learning and AI.'}, 'zh': {'title': 'LychSim：可控的视觉系统模拟框架', 'desc': 'LychSim是一个新的模拟框架，旨在为视觉系统的开发和评估提供可控和互动的环境。它基于虚幻引擎5，具有简化的Python API和程序化数据管道，能够生成多样化的高保真环境。LychSim还集成了模型上下文协议（MCP），使得模拟器可以作为一个动态的闭环平台，支持推理代理的学习。该框架的设计使得用户能够轻松创建和修改场景，促进了合成数据生成和强化学习等多种应用。'}}}, {'id': 'https://huggingface.co/papers/2605.12438', 'title': 'A Causal Language Modeling Detour Improves Encoder Continued Pretraining', 'url': 'https://huggingface.co/papers/2605.12438', 'abstract': "Abstract Switching from Masked Language Modeling to Causal Language Modeling during encoder adaptation improves downstream performance on biomedical texts through dense supervision effects in lower transformer layers.  AI-generated summary When adapting an encoder to a new domain, the standard approach is to continue training with Masked Language Modeling (MLM). We show that temporarily switching to Causal Language Modeling (CLM) followed by a short MLM decay improves downstream performance. On biomedical texts with ModernBERT, this CLM detour outperforms MLM baselines trained on identical data and compute across 8 French and 11 English biomedical tasks, by +1.2-2.8pp and +0.3-0.8pp respectively, depending on model size. We investigate the reasons for these gains. We find that CLM's dense supervision impacts low transformer layers (0-7) far more than MLM does. Freezing low layers during CLM eliminates the downstream benefit; freezing mid layers preserves it. The representational changes persist through the MLM decay phase, even when it matches the CLM phase in length, and they scale with model capacity. We release ModernCamemBERT-bio and ModernBERT-bio as state-of-the-art biomedical encoders in Base and Large sizes.", 'score': 3, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'c7a1fe5bd607cf17', 'authors': ['Rian Touchent', 'Eric de la Clergerie'], 'affiliations': ['INRIA Paris', 'Sorbonne Universite'], 'pdf_title_img': 'assets/pdf/title_img/2605.12438.jpg', 'data': {'categories': ['#science', '#healthcare', '#optimization', '#open_source', '#multilingual', '#training'], 'emoji': '🧬', 'ru': {'title': 'От маскирования к причинности: переключение стратегий предобучения для биомедицинских текстов', 'desc': 'Исследование показывает, что при адаптации энкодера к биомедицинским текстам эффективнее временно переключаться с Masked Language Modeling на Causal Language Modeling, а затем вернуться к MLM. Этот подход обеспечивает улучшение на 0.3-2.8 процентных пункта на биомедицинских задачах благодаря более плотному обучающему сигналу в нижних слоях трансформера. Авторы обнаружили, что CLM интенсивнее воздействует на низкие слои модели (0-7), в то время как замораживание этих слоёв устраняет преимущество, а замораживание средних слоёв его сохраняет. Представленные ModernCamemBERT-bio и ModernBERT-bio демонстрируют лучшие результаты среди биомедицинских энкодеров на французском и английском языках.'}, 'en': {'title': 'Boosting Biomedical NLP with Causal Language Modeling', 'desc': "This paper explores the benefits of switching from Masked Language Modeling (MLM) to Causal Language Modeling (CLM) during the adaptation of encoders for biomedical texts. The authors demonstrate that this temporary switch enhances performance on various biomedical tasks, outperforming traditional MLM approaches. They find that CLM provides dense supervision that significantly influences the lower layers of the transformer architecture, leading to improved representations. The study also reveals that the advantages gained from CLM persist even after returning to MLM, indicating a lasting impact on the model's performance."}, 'zh': {'title': '因果语言建模提升生物医学文本表现', 'desc': '在将编码器适应到新领域时，通常的做法是继续使用掩码语言建模（MLM）进行训练。我们发现，暂时切换到因果语言建模（CLM），然后再进行短期的MLM衰减，可以显著提高下游任务的表现。特别是在生物医学文本上，使用ModernBERT时，CLM的效果优于在相同数据和计算条件下训练的MLM基线，提升幅度在1.2-2.8个百分点之间。我们还发现，CLM对低层变换器的密集监督影响更大，而在CLM期间冻结低层会消除下游收益。'}}}, {'id': 'https://huggingface.co/papers/2605.12492', 'title': 'Pion: A Spectrum-Preserving Optimizer via Orthogonal Equivalence Transformation', 'url': 'https://huggingface.co/papers/2605.12492', 'abstract': 'Abstract Pion is a spectrum-preserving optimizer for large language model training that uses orthogonal equivalence transformations to maintain singular values during weight updates, offering stable performance comparable to standard optimizers.  AI-generated summary We introduce Pion, a spectrum-preserving optimizer for large language model (LLM) training based on orthogonal equivalence transformation. Unlike additive optimizers such as Adam and Muon, Pion updates each weight matrix through left and right orthogonal transformations, preserving its singular values throughout training. This yields an optimization mechanism that modulates the geometry of weight matrices while keeping their spectral norm fixed. We derive the Pion update rule, systematically examine its design choices, and analyze its convergence behavior along with several key properties. Empirical results show that Pion offers a stable and competitive alternative to standard optimizers for both LLM pretraining and finetuning.', 'score': 2, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '587a5db8eca876b2', 'authors': ['Kexuan Shi', 'Hanxuan Li', 'Zeju Qiu', 'Yandong Wen', 'Simon Buchholz', 'Weiyang Liu'], 'affiliations': ['Max Planck Institute for Intelligent Systems', 'The Chinese University of Hong Kong', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12492.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Сохранение спектра через ортогональные трансформации в оптимизации LLM', 'desc': 'Pion — это оптимизатор, сохраняющий спектральные свойства матриц при обучении больших языковых моделей. В отличие от аддитивных оптимизаторов типа Adam, Pion использует ортогональные преобразования для обновления весов, что сохраняет сингулярные значения матриц на протяжении всего обучения. Такой подход модулирует геометрию матриц весов, одновременно фиксируя их спектральную норму. Эмпирические результаты показывают, что Pion обеспечивает стабильную и конкурентоспособную альтернативу стандартным оптимизаторам при предварительном обучении и доподстройке языковых моделей.'}, 'en': {'title': 'Pion: Stability Through Spectrum Preservation in LLM Training', 'desc': 'Pion is a new optimizer designed for training large language models (LLMs) that focuses on preserving the spectrum of weight matrices. It achieves this by using orthogonal equivalence transformations, which help maintain the singular values during weight updates. This method contrasts with traditional additive optimizers like Adam, as it modifies the geometry of the weight matrices while keeping their spectral norm constant. The results indicate that Pion provides stable performance and is a competitive alternative to existing optimizers in both pretraining and finetuning phases.'}, 'zh': {'title': 'Pion：稳定的谱保持优化器', 'desc': 'Pion是一种用于大语言模型训练的谱保持优化器，采用正交等价变换来保持权重更新过程中的奇异值。与传统的加法优化器（如Adam和Muon）不同，Pion通过左右正交变换更新每个权重矩阵，从而在训练过程中保持其奇异值不变。这种优化机制调节了权重矩阵的几何形状，同时保持其谱范数固定。实验证明，Pion在大语言模型的预训练和微调中提供了稳定且具有竞争力的替代方案。'}}}, {'id': 'https://huggingface.co/papers/2605.05630', 'title': 'One Turn Too Late: Response-Aware Defense Against Hidden Malicious Intent in Multi-Turn Dialogue', 'url': 'https://huggingface.co/papers/2605.05630', 'abstract': 'Abstract Multi-turn dialogue safety monitoring system detects harmful intent accumulation through turn-level analysis and evaluates performance on a new benchmark dataset.  AI-generated summary Hidden malicious intent in multi-turn dialogue poses a growing threat to deployed large language models (LLMs). Rather than exposing a harmful objective in a single prompt, increasingly capable attackers can distribute their intent across multiple benign-looking turns. Recent studies show that even modern commercial models with advanced guardrails remain vulnerable to such attacks despite advances in safety alignment and external guardrails. In this work, we address this challenge by detecting the earliest turn at which delivering the candidate response would make the accumulated interaction sufficient to enable harmful action. This objective requires precise turn-level intervention that identifies the harm-enabling closure point while avoiding premature refusal of benign exploratory conversations. To further support training and evaluation, we construct the Multi-Turn Intent Dataset (MTID), which contains branching attack rollouts, matched benign hard negatives, and annotations of the earliest harm-enabling turns. We show that MTID helps enable a turn-level monitor TurnGate, which substantially outperforms existing baselines in harmful-intent detection while maintaining low over-refusal rates. TurnGate further generalizes across domains, attacker pipelines, and target models. Our code is available at https://github.com/Graph-COM/TurnGate.', 'score': 2, 'issue_id': 2215, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'a044fe521f93d788', 'authors': ['Xinjie Shen', 'Rongzhe Wei', 'Peizhi Niu', 'Haoyu Wang', 'Ruihan Wu', 'Eli Chien', 'Bo Li', 'Pin-Yu Chen', 'Pan Li'], 'affiliations': ['Georgia Institute of Technology', 'IBM Research', 'National Taiwan University', 'UCSD', 'University of Illinois Urbana-Champaign', 'Virtue AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.05630.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Защита LLM от накопления скрытых вредоносных намерений в многооборотных диалогах', 'desc': 'В работе предложена система мониторинга безопасности для многооборотных диалогов, которая обнаруживает накопление вредоносного намерения через анализ каждого хода беседы. Авторы создали новый датасет Multi-Turn Intent Dataset с размеченными примерами атак, распределённых через несколько очередей, и примерами безобидных альтернатив. Разработанная модель TurnGate использует turn-level анализ для определения критического момента, когда накопленный контекст диалога становится достаточным для выполнения вредоносного действия. Система достигает высокой точности в обнаружении скрытых атак при сохранении низкого уровня ложных отказов в обработке легитимных запросов.'}, 'en': {'title': 'Detecting Hidden Harm in Multi-Turn Dialogues', 'desc': 'This paper presents a system called TurnGate that monitors multi-turn dialogues for harmful intent accumulation. It addresses the challenge of detecting malicious intent that is spread across multiple conversational turns, rather than being presented in a single prompt. The authors introduce the Multi-Turn Intent Dataset (MTID) to aid in training and evaluating the system, which includes examples of both harmful and benign interactions. TurnGate demonstrates improved performance in identifying harmful intent while minimizing unnecessary refusals of legitimate conversations.'}, 'zh': {'title': '多轮对话安全监测：识别潜在威胁的关键', 'desc': '本论文提出了一种多轮对话安全监测系统，旨在通过逐轮分析检测有害意图的积累。攻击者可以将恶意意图分散在多个看似无害的对话轮次中，从而对大型语言模型（LLMs）构成威胁。我们构建了多轮意图数据集（MTID），用于训练和评估，帮助识别最早的有害意图出现轮次。我们的系统TurnGate在有害意图检测方面显著优于现有基线，同时保持较低的误拒率。'}}}, {'id': 'https://huggingface.co/papers/2605.11424', 'title': 'VidSplat: Gaussian Splatting Reconstruction with Geometry-Guided Video Diffusion Priors', 'url': 'https://huggingface.co/papers/2605.11424', 'abstract': 'Abstract VidSplat is a training-free generative reconstruction framework that uses video diffusion priors to synthesize novel views and recover complete 3D scenes from sparse inputs through adaptive denoising and iterative refinement.  AI-generated summary Gaussian Splatting has achieved remarkable progress in multi-view surface reconstruction, yet it exhibits notable degradation when only few views are available. Although recent efforts alleviate this issue by enhancing multi-view consistency to produce plausible surfaces, they struggle to infer unseen, occluded, or weakly constrained regions beyond the input coverage. To address this limitation, we present VidSplat, a training-free generative reconstruction framework that leverages powerful video diffusion priors to iteratively synthesize novel views that compensate for missing input coverage, and thereby recover complete 3D scenes from sparse inputs. Specifically, we tackle two key challenges that enable the effective integration of generation and reconstruction. First, for 3D consistent generation, we elaborate a training-free, stage-wise denoising strategy that adaptively guides the denoising direction toward the underlying geometry using the rendered RGB and mask images. Second, to enhance the reconstruction, we develop an iterative mechanism that samples camera trajectories, explores unobserved regions, synthesizes novel views, and supplements training through confidence weighted refinement. VidSplat performs robustly to sparse input and even a single image. Extensive experiments on widely used benchmarks demonstrate our superior performance in sparse-view scene reconstruction.', 'score': 2, 'issue_id': 2214, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'f7f1e337f480c47a', 'authors': ['Jimin Tang', 'Wenyuan Zhang', 'Junsheng Zhou', 'Zian Huang', 'Kanle Shi', 'Shenkun Xu', 'Yu-Shen Liu', 'Zhizhong Han'], 'affiliations': ['Department of Computer Science, Wayne State University', 'Kuaishou Technology', 'School of Software, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11424.jpg', 'data': {'categories': ['#multimodal', '#video', '#benchmark', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Восстановление полных 3D сцен из редких видов через видео-диффузионные приоры', 'desc': 'VidSplat представляет собой фреймворк для восстановления 3D сцен из разреженных входных данных без обучения модели. Метод использует диффузионные модели видео в качестве приора для итеративного синтеза новых видов и восполнения пропущенных областей сцены. Авторы разработали адаптивную стратегию денойзинга, которая направляет генерацию в сторону геометрически согласованных результатов, используя отрендеренные RGB и маскированные изображения. Фреймворк успешно восстанавливает полные 3D сцены даже при наличии одного входного изображения благодаря итеративному механизму, исследующему ненаблюдаемые области.'}, 'en': {'title': 'Reconstructing 3D Scenes from Sparse Inputs with VidSplat', 'desc': 'VidSplat is a novel framework designed for reconstructing 3D scenes from limited video inputs without requiring prior training. It utilizes video diffusion priors to generate new views and fill in gaps in the scene, addressing challenges like occlusions and weak constraints. The framework employs a unique stage-wise denoising strategy that adapts to the geometry of the scene, ensuring consistency in the generated outputs. Additionally, it features an iterative mechanism that samples camera paths to explore unseen areas, enhancing the overall reconstruction quality even from sparse data.'}, 'zh': {'title': 'VidSplat：从稀疏输入恢复完整3D场景的创新框架', 'desc': 'VidSplat是一种无训练的生成重建框架，利用视频扩散先验合成新视角，并通过自适应去噪和迭代优化从稀疏输入中恢复完整的3D场景。该方法解决了在仅有少量视角时多视角表面重建的显著退化问题。通过逐步去噪策略和迭代机制，VidSplat能够有效整合生成与重建，探索未观察到的区域并合成新视角。实验结果表明，VidSplat在稀疏视图场景重建中表现优越，甚至可以从单张图像中恢复出完整的3D场景。'}}}, {'id': 'https://huggingface.co/papers/2605.12474', 'title': 'Reward Hacking in Rubric-Based Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.12474', 'abstract': 'Abstract Research examines reward hacking in rubric-based reinforcement learning, identifying verifier failure and rubric-design limitations as key sources of divergence between training and evaluation metrics.  AI-generated summary Reinforcement learning with verifiable rewards has enabled strong post-training gains in domains such as math and coding, though many open-ended settings rely on rubric-based rewards. We study reward hacking in rubric-based RL, where a policy is optimized against a training verifier but evaluated against a cross-family panel of three frontier judges, reducing dependence on any single evaluator. Our framework separates two sources of divergence: verifier failure, where the training verifier credits rubric criteria that reference verifiers reject, and rubric-design limitations, where even strong rubric-based verifiers favor responses that rubric-free judges rate worse overall. Across medical and science domains, weak verifiers produce large proxy-reward gains that do not transfer to
