    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.01571', 'title': 'Beyond Length Scaling: Synergizing Breadth and Depth for Generative Reward Models', 'url': 'https://huggingface.co/papers/2603.01571', 'abstract': 'Abstract Generative Reward Models can be improved by structuring Chain-of-Thought reasoning into breadth and depth components and optimizing them through supervised fine-tuning and reinforcement learning with verifiable rewards.  \t\t\t\t\tAI-generated summary Recent advancements in Generative Reward Models (GRMs) have demonstrated that scaling the length of Chain-of-Thought (CoT) reasoning considerably enhances the reliability of evaluation. However, current works predominantly rely on unstructured length scaling, ignoring the divergent efficacy of different reasoning mechanisms: Breadth-CoT (B-CoT, i.e., multi-dimensional principle coverage) and Depth-CoT (D-CoT, i.e., substantive judgment soundness). To address this, we introduce Mix-GRM, a framework that reconfigures raw rationales into structured B-CoT and D-CoT through a modular synthesis pipeline, subsequently employing Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR) to internalize and optimize these mechanisms. Comprehensive experiments demonstrate that Mix-GRM establishes a new state-of-the-art across five benchmarks, surpassing leading open-source RMs by an average of 8.2\\%. Our results reveal a clear divergence in reasoning: B-CoT benefits subjective preference tasks, whereas D-CoT excels in objective correctness tasks. Consequently, misaligning the reasoning mechanism with the task directly degrades performance. Furthermore, we demonstrate that RLVR acts as a switching amplifier, inducing an emergent polarization where the model spontaneously allocates its reasoning style to match task demands. The synthesized data and models are released at https://huggingface.co/collections/DonJoey/mix-grm{Hugging Face}, and the code is released at https://github.com/Don-Joey/Mix-GRM{Github}.', 'score': 11, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '41c7f3db8109f4ab', 'authors': ['Qiyuan Zhang', 'Yufei Wang', 'Tianhe Wu', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01571.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#reasoning', '#training', '#rlhf', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Структурированное мышление для точной оценки: баланс между глубиной и шириной', 'desc': 'В статье предложена улучшенная архитектура для моделей генеративного вознаграждения (GRM), которые используются для оценки качества ответов языковых моделей. Авторы разделяют цепочку рассуждений на два компонента: глубину (качество суждений) и ширину (охват принципов), которые по-разному помогают при решении разных типов задач. Модель обучается через supervised fine-tuning и reinforcement learning с проверяемыми наградами, что позволяет автоматически выбирать подходящий стиль рассуждения для каждой задачи. Экспериментальные результаты показывают, что такой структурированный подход улучшает качество оценки на 8.2% в среднем по сравнению с существующими решениями.'}, 'en': {'title': 'Optimizing Generative Reward Models with Structured Reasoning', 'desc': 'This paper introduces Mix-GRM, a new framework for improving Generative Reward Models (GRMs) by structuring Chain-of-Thought (CoT) reasoning into two components: Breadth-CoT (B-CoT) and Depth-CoT (D-CoT). B-CoT focuses on covering multiple dimensions of reasoning, while D-CoT emphasizes sound judgment. The authors optimize these components using Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR), leading to significant performance improvements across various benchmarks. The findings highlight the importance of aligning the reasoning mechanism with the task type to enhance model effectiveness.'}, 'zh': {'title': '优化生成奖励模型的思维链推理', 'desc': '生成奖励模型（GRM）可以通过将思维链推理结构化为广度和深度两个部分来改进，并通过监督微调和具有可验证奖励的强化学习进行优化。当前的研究主要依赖于非结构化的长度扩展，忽视了不同推理机制的有效性差异。我们提出了Mix-GRM框架，将原始推理重构为结构化的广度推理（B-CoT）和深度推理（D-CoT），并通过模块化合成管道进行优化。实验结果表明，Mix-GRM在五个基准测试中建立了新的最先进水平，平均超越领先的开源奖励模型8.2%。'}}}, {'id': 'https://huggingface.co/papers/2603.03241', 'title': 'UniG2U-Bench: Do Unified Models Advance Multimodal Understanding?', 'url': 'https://huggingface.co/papers/2603.03241', 'abstract': 'Abstract Unified multimodal models show mixed performance in generation-to-understanding tasks, with specific subtasks benefiting from enhanced spatial and reasoning capabilities while overall performance lags behind specialized vision-language models.  \t\t\t\t\tAI-generated summary Unified multimodal models have recently demonstrated strong generative capabilities, yet whether and when generation improves understanding remains unclear. Existing benchmarks lack a systematic exploration of the specific tasks where generation facilitates understanding. To this end, we introduce UniG2U-Bench, a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit visual transformations. Extensive evaluation of over 30 models reveals three core findings: 1) Unified models generally underperform their base Vision-Language Models (VLMs), and Generate-then-Answer (GtA) inference typically degrades performance relative to direct inference. 2) Consistent enhancements emerge in spatial intelligence, visual illusions, or multi-round reasoning subtasks, where enhanced spatial and shape perception, as well as multi-step intermediate image states, prove beneficial. 3) Tasks with similar reasoning structures and models sharing architectures exhibit correlated behaviors, suggesting that generation-understanding coupling induces class-consistent inductive biases over tasks, pretraining data, and model architectures. These findings highlight the necessity for more diverse training data and novel paradigms to fully unlock the potential of unified multimodal modeling.', 'score': 10, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7a1b3aef8d3cf61b', 'authors': ['Zimo Wen', 'Boxiu Li', 'Wanbo Zhang', 'Junxiang Lei', 'Xiaoyu Chen', 'Yijia Fan', 'Qi Zhang', 'Yujiang Wang', 'Lili Qiu', 'Bo Li', 'Ziwei Liu', 'Caihua Shan', 'Yifan Yang', 'Yifei Shen'], 'affiliations': ['Fudan University', 'Microsoft Research Asia', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.03241.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Когда генерация помогает пониманию: поиск баланса в мультимодальных моделях', 'desc': 'Исследование показывает, что единые мультимодальные модели демонстрируют смешанные результаты при решении задач, где нужно сначала генерировать изображения, а затем отвечать на вопросы о них. Авторы создали обширный бенчмарк UniG2U-Bench с 30 подзадачами, чтобы систематически оценить, когда генерация улучшает понимание. Результаты показывают, что специализированные модели зрения и языка часто превосходят унифицированные модели, однако генерация помогает в задачах на пространственное мышление, визуальные иллюзии и многоэтапные рассуждения. Исследование выявило, что поведение моделей зависит от архитектуры и структуры задач, подчеркивая необходимость более разнообразных данных для обучения.'}, 'en': {'title': 'Unlocking the Potential of Unified Multimodal Models', 'desc': 'This paper investigates the performance of unified multimodal models in tasks that require both generation and understanding of visual information. It introduces a new benchmark called UniG2U-Bench, which categorizes these tasks into different regimes and subtasks to better evaluate model capabilities. The study finds that while unified models can generate content, they often perform worse than specialized vision-language models, especially in direct inference tasks. However, improvements are noted in specific areas like spatial reasoning and visual perception, indicating that targeted training could enhance overall model performance.'}, 'zh': {'title': '统一多模态模型的潜力与挑战', 'desc': '统一的多模态模型在生成到理解的任务中表现不一，某些子任务因增强的空间和推理能力而受益，但整体性能仍低于专门的视觉-语言模型。我们提出了UniG2U-Bench，这是一个全面的基准，分类生成到理解的评估为7个领域和30个子任务，要求不同程度的视觉转换。评估结果显示，统一模型通常不如基础的视觉-语言模型表现好，生成后回答的推理方式通常会降低性能。我们的研究表明，任务结构相似的推理和共享架构的模型表现出相关行为，强调了多样化训练数据和新范式的重要性，以充分发挥统一多模态建模的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.02578', 'title': 'How Controllable Are Large Language Models? A Unified Evaluation across Behavioral Granularities', 'url': 'https://huggingface.co/papers/2603.02578', 'abstract': 'Abstract SteerEval is a hierarchical benchmark for evaluating large language model controllability across language features, sentiment, and personality domains with three specification levels.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) are increasingly deployed in socially sensitive domains, yet their unpredictable behaviors, ranging from misaligned intent to inconsistent personality, pose significant risks. We introduce SteerEval, a hierarchical benchmark for evaluating LLM controllability across three domains: language features, sentiment, and personality. Each domain is structured into three specification levels: L1 (what to express), L2 (how to express), and L3 (how to instantiate), connecting high-level behavioral intent to concrete textual output. Using SteerEval, we systematically evaluate contemporary steering methods, revealing that control often degrades at finer-grained levels. Our benchmark offers a principled and interpretable framework for safe and controllable LLM behavior, serving as a foundation for future research.', 'score': 10, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '198dd400ade24b83', 'authors': ['Ziwen Xu', 'Kewei Xu', 'Haoming Xu', 'Haiwen Hong', 'Longtao Huang', 'Hui Xue', 'Ningyu Zhang', 'Yongliang Shen', 'Guozhou Zheng', 'Huajun Chen', 'Shumin Deng'], 'affiliations': ['Alibaba Group', 'NUS-NCS Joint Lab', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02578.jpg', 'data': {'categories': [], 'emoji': '🎮', 'ru': {'title': 'Контроль над поведением языковых моделей через иерархическую оценку', 'desc': 'SteerEval — это иерархический набор тестов для оценки управляемости больших языковых моделей по трём направлениям: языковые признаки, тональность и личность. Каждое направление разделено на три уровня спецификации: L1 (что выражать), L2 (как выражать) и L3 (как конкретизировать), что связывает высокоуровневые намерения с реальным текстом. Авторы систематически проверили существующие методы управления моделями и обнаружили, что контроль часто ухудшается на более детальных уровнях. Этот бенчмарк предоставляет принципиальный и интерпретируемый инструмент для безопасного и управляемого поведения LLM.'}, 'en': {'title': 'SteerEval: A New Standard for Controlling Language Models', 'desc': "SteerEval is a new benchmark designed to assess how well large language models (LLMs) can be controlled in their outputs. It focuses on three main areas: language features, sentiment, and personality, each broken down into three levels of specification. This structure helps connect the general intentions behind the model's behavior to the specific text it generates. The findings show that while steering methods can guide LLMs, their effectiveness often decreases when looking at more detailed aspects of control."}, 'zh': {'title': 'SteerEval：提升语言模型可控性的基准', 'desc': 'SteerEval是一个分层基准，用于评估大型语言模型在语言特征、情感和个性领域的可控性。该基准将每个领域分为三个规格层次：L1（表达内容）、L2（表达方式）和L3（具体实例化），将高层次的行为意图与具体的文本输出连接起来。通过使用SteerEval，我们系统地评估了当前的控制方法，发现控制在更细粒度的层面上往往会下降。这个基准为安全和可控的语言模型行为提供了一个原则性和可解释的框架，为未来的研究奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.02802', 'title': 'NOVA: Sparse Control, Dense Synthesis for Pair-Free Video Editing', 'url': 'https://huggingface.co/papers/2603.02802', 'abstract': 'Abstract NOVA is a novel unpaired video editing framework that uses sparse semantic guidance and dense synthesis to achieve high-fidelity editing with improved motion preservation and temporal coherence.  \t\t\t\t\tAI-generated summary Recent video editing models have achieved impressive results, but most still require large-scale paired datasets. Collecting such naturally aligned pairs at scale remains highly challenging and constitutes a critical bottleneck, especially for local video editing data. Existing workarounds transfer image editing to video through global motion control for pair-free video editing, but such designs struggle with background and temporal consistency. In this paper, we propose NOVA: Sparse Control \\& Dense Synthesis, a new framework for unpaired video editing. Specifically, the sparse branch provides semantic guidance through user-edited keyframes distributed across the video, and the dense branch continuously incorporates motion and texture information from the original video to maintain high fidelity and coherence. Moreover, we introduce a degradation-simulation training strategy that enables the model to learn motion reconstruction and temporal consistency by training on artificially degraded videos, thus eliminating the need for paired data. Our extensive experiments demonstrate that NOVA outperforms existing approaches in edit fidelity, motion preservation, and temporal coherence.', 'score': 4, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d4e16739d77cdcb', 'authors': ['Tianlin Pan', 'Jiayi Dai', 'Chenpu Yuan', 'Zhengyao Lv', 'Binxin Yang', 'Hubery Yin', 'Chen Li', 'Jing Lyu', 'Caifeng Shan', 'Chenyang Si'], 'affiliations': ['Nanjing University', 'The University of Hong Kong', 'University of Chinese Academy of Sciences', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.02802.jpg', 'data': {'categories': ['#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Редактирование видео без парных данных через разреженное управление и плотный синтез', 'desc': 'NOVA — это инновационная структура для редактирования видео без использования парных данных, которая комбинирует разреженное семантическое управление через отредактированные ключевые кадры с плотным синтезом, сохраняющим движение и текстуру оригинального видео. Система использует две параллельные ветви: разреженная ветвь обеспечивает семантическое руководство пользователя, а плотная ветвь постоянно интегрирует информацию о движении и текстуре для поддержания высокой точности редактирования и временной согласованности. Авторы предложили стратегию обучения с моделированием деградации, которая позволяет модели изучать восстановление движения на искусственно деградированных видео, полностью устраняя необходимость в парных наборах данных. Экспериментальные результаты показывают, что NOVA превосходит существующие подходы по точности редактирования, сохранению движения и согласованности по времени.'}, 'en': {'title': 'NOVA: Unpaired Video Editing with High Fidelity and Coherence', 'desc': 'NOVA is an innovative framework for unpaired video editing that enhances the editing process by using sparse semantic guidance and dense synthesis techniques. The sparse branch utilizes user-edited keyframes to provide semantic cues, while the dense branch ensures high fidelity by integrating motion and texture from the original video. This approach addresses the challenges of background and temporal consistency that previous models faced when transferring image editing to video. Additionally, NOVA employs a degradation-simulation training strategy, allowing it to learn effective motion reconstruction without the need for large paired datasets, leading to superior performance in edit fidelity and coherence.'}, 'zh': {'title': 'NOVA：无配对视频编辑的新突破', 'desc': 'NOVA是一种新颖的无配对视频编辑框架，利用稀疏语义指导和密集合成实现高保真编辑，同时改善运动保留和时间一致性。该框架通过用户编辑的关键帧提供语义指导，并持续整合原始视频的运动和纹理信息，以保持高保真度和一致性。我们还引入了一种降级模拟训练策略，使模型能够通过训练人工降级视频来学习运动重建和时间一致性，从而消除对配对数据的需求。实验结果表明，NOVA在编辑保真度、运动保留和时间一致性方面优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.02175', 'title': 'Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance', 'url': 'https://huggingface.co/papers/2603.02175', 'abstract': 'Abstract A scalable data generation pipeline creates high-fidelity video editing training data, and a unified architecture enables improved instruction-following and reference fidelity in controllable video editing.  \t\t\t\t\tAI-generated summary Instruction-based video editing has witnessed rapid progress, yet current methods often struggle with precise visual control, as natural language is inherently limited in describing complex visual nuances. Although reference-guided editing offers a robust solution, its potential is currently bottlenecked by the scarcity of high-quality paired training data. To bridge this gap, we introduce a scalable data generation pipeline that transforms existing video editing pairs into high-fidelity training quadruplets, leveraging image generative models to create synthesized reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset tailored for instruction-reference-following tasks, and establish RefVIE-Bench for comprehensive evaluation. Furthermore, we propose a unified editing architecture, Kiwi-Edit, that synergizes learnable queries and latent visual features for reference semantic guidance. Our model achieves significant gains in instruction following and reference fidelity via a progressive multi-stage training curriculum. Extensive experiments demonstrate that our data and architecture establish a new state-of-the-art in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.', 'score': 3, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '46df57ed4eac6434', 'authors': ['Yiqi Lin', 'Guoqiang Liang', 'Ziyun Zeng', 'Zechen Bai', 'Yanzhe Chen', 'Mike Zheng Shou'], 'affiliations': ['Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.02175.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#video', '#training', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Высокоточное редактирование видео через синтез данных и единую архитектуру нейросети', 'desc': 'В работе представлена масштабируемая система для генерации высококачественных обучающих данных в виде видео редактирования. Авторы решили проблему нехватки парных данных, трансформируя существующие видео пары в четвёрки примеров с помощью моделей генеративного синтеза изображений. Они предложили новую архитектуру нейросети Kiwi-Edit, которая объединяет обучаемые запросы и скрытые визуальные признаки для семантического управления при редактировании видео. Модель достигает значительных улучшений в следовании инструкциям и верности референсному изображению благодаря прогрессивному многоэтапному обучению.'}, 'en': {'title': 'Revolutionizing Video Editing with Scalable Data and Unified Architecture', 'desc': 'This paper presents a new method for improving video editing using machine learning. It introduces a scalable data generation pipeline that creates high-quality training data by transforming existing video pairs into quadruplets, which helps in better instruction-following and visual control. The authors also propose a unified architecture called Kiwi-Edit that combines learnable queries with visual features to enhance editing precision. Their approach significantly advances the state-of-the-art in controllable video editing by providing a large dataset and a comprehensive evaluation framework.'}, 'zh': {'title': '高保真视频编辑的新突破', 'desc': '本文提出了一种可扩展的数据生成管道，用于创建高保真度的视频编辑训练数据。通过利用图像生成模型，该管道将现有的视频编辑对转化为高质量的训练四元组，从而解决了高质量配对训练数据稀缺的问题。我们构建了RefVIE数据集，专门用于指令-参考跟随任务，并建立了RefVIE-Bench进行全面评估。此外，我们提出了统一的编辑架构Kiwi-Edit，结合可学习查询和潜在视觉特征，以提高参考语义指导的效果。'}}}, {'id': 'https://huggingface.co/papers/2603.03160', 'title': 'Kling-MotionControl Technical Report', 'url': 'https://huggingface.co/papers/2603.03160', 'abstract': 'Abstract Kling-MotionControl is a DiT-based framework for character animation that combines heterogeneous motion representations, adaptive identity-agnostic learning, and advanced acceleration techniques to achieve high-fidelity, expressive, and controllable video generation.  \t\t\t\t\tAI-generated summary Character animation aims to generate lifelike videos by transferring motion dynamics from a driving video to a reference image. Recent strides in generative models have paved the way for high-fidelity character animation. In this work, we present Kling-MotionControl, a unified DiT-based framework engineered specifically for robust, precise, and expressive holistic character animation. Leveraging a divide-and-conquer strategy within a cohesive system, the model orchestrates heterogeneous motion representations tailored to the distinct characteristics of body, face, and hands, effectively reconciling large-scale structural stability with fine-grained articulatory expressiveness. To ensure robust cross-identity generalization, we incorporate adaptive identity-agnostic learning, facilitating natural motion retargeting for diverse characters ranging from realistic humans to stylized cartoons. Simultaneously, we guarantee faithful appearance preservation through meticulous identity injection and fusion designs, further supported by a subject library mechanism that leverages comprehensive reference contexts. To ensure practical utility, we implement an advanced acceleration framework utilizing multi-stage distillation, boosting inference speed by over 10x. Kling-MotionControl distinguishes itself through intelligent semantic motion understanding and precise text responsiveness, allowing for flexible control beyond visual inputs. Human preference evaluations demonstrate that Kling-MotionControl delivers superior performance compared to leading commercial and open-source solutions, achieving exceptional fidelity in holistic motion control, open domain generalization, and visual quality and coherence. These results establish Kling-MotionControl as a robust solution for high-quality, controllable, and lifelike character animation.', 'score': 2, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '3c4c90093c19e7c8', 'authors': ['Kling Team', 'Jialu Chen', 'Yikang Ding', 'Zhixue Fang', 'Kun Gai', 'Kang He', 'Xu He', 'Jingyun Hua', 'Mingming Lao', 'Xiaohan Li', 'Hui Liu', 'Jiwen Liu', 'Xiaoqiang Liu', 'Fan Shi', 'Xiaoyu Shi', 'Peiqin Sun', 'Songlin Tang', 'Pengfei Wan', 'Tiancheng Wen', 'Zhiyong Wu', 'Haoxian Zhang', 'Runze Zhao', 'Yuanxing Zhang', 'Yan Zhou'], 'affiliations': ['Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.03160.jpg', 'data': {'categories': ['#multimodal', '#video', '#architecture', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Детальный контроль анимации персонажей через понимание семантики движения', 'desc': 'Kling-MotionControl представляет собой унифицированный фреймворк на основе DiT для синтеза анимации персонажей, который использует различные представления движений для отдельных частей тела (туловище, лицо, руки). Система применяет адаптивное обучение, инвариантное к идентичности персонажа, что позволяет переносить движения между разными типами персонажей от реалистичных людей до мультяшных героев. Модель включает продвинутые техники ускорения через многоэтапную дистилляцию, достигая ускорения вывода более чем в 10 раз. Фреймворк обеспечивает высокую точность контроля над движением, сохранение внешнего вида персонажа и поддерживает гибкое управление через текстовые описания.'}, 'en': {'title': 'Kling-MotionControl: Revolutionizing Character Animation with High Fidelity and Speed', 'desc': 'Kling-MotionControl is a novel framework for character animation that utilizes a DiT (Denoising Transformer) architecture to create high-quality and expressive videos. It integrates various motion representations to accurately animate different body parts, ensuring both stability and detailed expressiveness. The framework employs adaptive identity-agnostic learning, allowing it to generalize across different character types, from realistic humans to stylized figures. Additionally, it features an advanced acceleration technique that significantly speeds up the animation process, making it a powerful tool for generating lifelike animations efficiently.'}, 'zh': {'title': 'Kling-MotionControl：高保真角色动画的新纪元', 'desc': 'Kling-MotionControl 是一个基于 DiT 的角色动画框架，旨在生成高保真、富有表现力和可控的视频。该框架结合了异构运动表示、自适应无身份学习和先进的加速技术，以实现精确的角色动画。通过分而治之的策略，模型能够处理身体、面部和手部的不同运动特征，确保结构稳定性与细致表现力的平衡。同时，Kling-MotionControl 还通过多阶段蒸馏技术提高推理速度，确保其实用性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2603.02684', 'title': 'HateMirage: An Explainable Multi-Dimensional Dataset for Decoding Faux Hate and Subtle Online Abuse', 'url': 'https://huggingface.co/papers/2603.02684', 'abstract': 'Abstract HateMirage is a new dataset designed to advance research on hate speech embedded in misinformation by providing multi-dimensional annotations for target, intent, and implication, offering a benchmark for interpretable hate detection and responsible AI.  \t\t\t\t\tAI-generated summary Subtle and indirect hate speech remains an underexplored challenge in online safety research, particularly when harmful intent is embedded within misleading or manipulative narratives. Existing hate speech datasets primarily capture overt toxicity, underrepresenting the nuanced ways misinformation can incite or normalize hate. To address this gap, we present HateMirage, a novel dataset of Faux Hate comments designed to advance reasoning and explainability research on hate emerging from fake or distorted narratives. The dataset was constructed by identifying widely debunked misinformation claims from fact-checking sources and tracing related YouTube discussions, resulting in 4,530 user comments. Each comment is annotated along three interpretable dimensions: Target (who is affected), Intent (the underlying motivation or goal behind the comment), and Implication (its potential social impact). Unlike prior explainability datasets such as HateXplain and HARE, which offer token-level or single-dimensional reasoning, HateMirage introduces a multi-dimensional explanation framework that captures the interplay between misinformation, harm, and social consequence. We benchmark multiple open-source language models on HateMirage using ROUGE-L F1 and Sentence-BERT similarity to assess explanation coherence. Results suggest that explanation quality may depend more on pretraining diversity and reasoning-oriented data rather than on model scale alone. By coupling misinformation reasoning with harm attribution, HateMirage establishes a new benchmark for interpretable hate detection and responsible AI research.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'eb4e4d300e028fbe', 'authors': ['Sai Kartheek Reddy Kasu', 'Shankar Biradar', 'Sunil Saumya', 'Md. Shad Akhtar'], 'affiliations': ['Indian Institute of Information Technology Dharwad', 'Indraprastha Institute of Information Technology Delhi', 'Manipal Institute of Technology, Manipal Academy of Higher Education'], 'pdf_title_img': 'assets/pdf/title_img/2603.02684.jpg', 'data': {'categories': ['#ethics', '#reasoning', '#interpretability', '#open_source'], 'emoji': '🪞', 'ru': {'title': 'Разоблачение скрытой ненависти через анализ дезинформации с объяснимым AI', 'desc': 'HateMirage — это новый датасет для изучения скрытой ненавистной речи, встроенной в дезинформацию, с многомерной аннотацией по целевым группам, намерениям и социальным последствиям. Датасет содержит 4530 комментариев из обсуждений YouTube, связанных с опровергнутыми заявлениями дезинформации, и предоставляет более детальное объяснение, чем существующие наборы данных. Исследователи протестировали несколько open-source языковых моделей, используя метрики ROUGE-L F1 и Sentence-BERT для оценки качества объяснений. Результаты показывают, что качество рассуждений больше зависит от разнообразия данных предварительного обучения, чем от размера модели, создавая бенчмарк для интерпретируемого обнаружения ненависти в контексте ответственного AI.'}, 'en': {'title': 'Unveiling Hidden Hate: The Power of HateMirage Dataset', 'desc': 'HateMirage is a new dataset aimed at improving the detection of hate speech that is hidden within misinformation. It provides detailed annotations for three key aspects: the target of the hate, the intent behind the comment, and the implications of the speech. This dataset addresses the limitations of existing resources by focusing on subtle and indirect forms of hate speech, which are often overlooked. By evaluating various language models on this dataset, the research highlights the importance of diverse pretraining and reasoning-focused data for enhancing explanation quality in AI systems.'}, 'zh': {'title': 'HateMirage：揭示错误信息中的隐性仇恨', 'desc': 'HateMirage是一个新数据集，旨在推动对嵌入在错误信息中的仇恨言论的研究。该数据集提供了多维度的注释，包括目标、意图和影响，帮助研究人员更好地理解仇恨言论的复杂性。通过分析被广泛驳斥的错误信息和相关的YouTube讨论，HateMirage收集了4530条用户评论。与以往的单维度解释数据集不同，HateMirage引入了多维度的解释框架，促进了对仇恨言论的可解释性和负责任的人工智能研究。'}}}, {'id': 'https://huggingface.co/papers/2603.02573', 'title': 'Track4World: Feedforward World-centric Dense 3D Tracking of All Pixels', 'url': 'https://huggingface.co/papers/2603.02573', 'abstract': 'Abstract A feedforward model called Track4World enables efficient holistic 3D tracking of every pixel in a video by utilizing a global 3D scene representation and novel 3D correlation scheme for dense flow estimation.  \t\t\t\t\tAI-generated summary Estimating the 3D trajectory of every pixel from a monocular video is crucial and promising for a comprehensive understanding of the 3D dynamics of videos. Recent monocular 3D tracking works demonstrate impressive performance, but are limited to either tracking sparse points on the first frame or a slow optimization-based framework for dense tracking. In this paper, we propose a feedforward model, called Track4World, enabling an efficient holistic 3D tracking of every pixel in the world-centric coordinate system. Built on the global 3D scene representation encoded by a VGGT-style ViT, Track4World applies a novel 3D correlation scheme to simultaneously estimate the pixel-wise 2D and 3D dense flow between arbitrary frame pairs. The estimated scene flow, along with the reconstructed 3D geometry, enables subsequent efficient 3D tracking of every pixel of this video. Extensive experiments on multiple benchmarks demonstrate that our approach consistently outperforms existing methods in 2D/3D flow estimation and 3D tracking, highlighting its robustness and scalability for real-world 4D reconstruction tasks.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8f6c36ba26b33fa7', 'authors': ['Jiahao Lu', 'Jiayi Xu', 'Wenbo Hu', 'Ruijie Zhu', 'Chengfeng Zhao', 'Sai-Kit Yeung', 'Ying Shan', 'Yuan Liu'], 'affiliations': ['ARC Lab, Tencent PCG', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.02573.jpg', 'data': {'categories': ['#3d', '#cv', '#video'], 'emoji': '🎬', 'ru': {'title': 'Полное отслеживание каждого пиксела в трёхмерном пространстве видео', 'desc': 'Track4World — это нейросетевая модель для отслеживания трёхмерной траектории каждого пиксела видео с единственной камеры. Модель использует глобальное представление трёхмерной сцены, кодируемое Vision Transformer архитектурой, и новую схему трёхмерной корреляции для оценки плотного оптического потока. Система одновременно вычисляет двумерный и трёхмерный поток для произвольных пар кадров, что позволяет эффективно отслеживать все пиксели видео в мировой системе координат. Экспериментальные результаты показывают, что подход превосходит существующие методы в оценке потока и трёхмерном отслеживании, демонстрируя масштабируемость для задач четырёхмерной реконструкции.'}, 'en': {'title': 'Track Every Pixel in 3D with Track4World!', 'desc': 'The paper introduces Track4World, a feedforward model designed for efficient 3D tracking of every pixel in a video. It leverages a global 3D scene representation and a novel 3D correlation scheme to estimate dense flow, allowing for comprehensive tracking in a world-centric coordinate system. Unlike previous methods that focus on sparse points or slow optimization, Track4World provides a holistic approach to pixel-wise 2D and 3D flow estimation. The results show that this model outperforms existing techniques in both 2D/3D flow estimation and 3D tracking, making it suitable for real-world 4D reconstruction tasks.'}, 'zh': {'title': 'Track4World：高效的3D像素跟踪模型', 'desc': 'Track4World是一种前馈模型，能够高效地对视频中的每个像素进行整体3D跟踪。该模型利用全球3D场景表示和新颖的3D相关方案来进行密集流估计。通过这种方法，Track4World可以在世界中心坐标系中同时估计像素级的2D和3D流。实验结果表明，该方法在2D/3D流估计和3D跟踪方面的表现优于现有方法，具有良好的鲁棒性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2602.23496', 'title': 'SGDC: Structurally-Guided Dynamic Convolution for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2602.23496', 'abstract': 'Abstract Structure-Guided Dynamic Convolution enhances medical image segmentation by using explicit structural guidance to preserve fine-grained details lost through traditional average pooling methods.  \t\t\t\t\tAI-generated summary Spatially variant dynamic convolution provides a principled approach of integrating spatial adaptivity into deep neural networks. However, mainstream designs in medical segmentation commonly generate dynamic kernels through average pooling, which implicitly collapses high-frequency spatial details into a coarse, spatially-compressed representation, leading to over-smoothed predictions that degrade the fidelity of fine-grained clinical structures. To address this limitation, we propose a novel Structure-Guided Dynamic Convolution (SGDC) mechanism, which leverages an explicitly supervised structure-extraction branch to guide the generation of dynamic kernels and gating signals for structure-aware feature modulation. Specifically, the high-fidelity boundary information from this auxiliary branch is fused with semantic features to enable spatially-precise feature modulation. By replacing context aggregation with pixel-wise structural guidance, the proposed design effectively prevents the information loss introduced by average pooling. Experimental results show that SGDC achieves state-of-the-art performance on ISIC 2016, PH2, ISIC 2018, and CoNIC datasets, delivering superior boundary fidelity by reducing the Hausdorff Distance (HD95) by 2.05, and providing consistent IoU gains of 0.99\\%-1.49\\% over pooling-based baselines. Moreover, the mechanism exhibits strong potential for extension to other fine-grained, structure-sensitive vision tasks, such as small-object detection, offering a principled solution for preserving structural integrity in medical image analysis. To facilitate reproducibility and encourage further research, the implementation code for both our SGE and SGDC modules has been is publicly released at https://github.com/solstice0621/SGDC.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '713902c0d073bbe3', 'authors': ['Bo Shi', 'Wei-ping Zhu', 'M. N. S. Swamy'], 'affiliations': ['Department of Electrical and Computer Engineering, Concordia University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23496.jpg', 'data': {'categories': ['#cv', '#healthcare', '#architecture'], 'emoji': '🏥', 'ru': {'title': 'Структурированная динамическая свёртка для сохранения деталей в медицинской сегментации', 'desc': 'В статье предложен новый механизм Structure-Guided Dynamic Convolution (SGDC) для улучшения сегментации медицинских изображений. Авторы выявили проблему традиционных динамических свёрток, которые используют average pooling и теряют высокочастотные пространственные детали, приводя к размытым предсказаниям. Решение заключается в использовании дополнительной ветви, явно обучаемой для извлечения структурной информации границ, которая направляет генерацию динамических ядер свёртки. Экспериментальные результаты показывают, что SGDC достигает state-of-the-art производительности на нескольких датасетах медицинских изображений, значительно улучшая точность сегментации границ и увеличивая метрику IoU на 0.99%-1.49% по сравнению с методами на основе pooling.'}, 'en': {'title': 'Enhancing Medical Image Segmentation with Structure-Guided Dynamic Convolution', 'desc': 'The paper introduces Structure-Guided Dynamic Convolution (SGDC), a method that improves medical image segmentation by maintaining fine details that are often lost with traditional average pooling techniques. SGDC uses a supervised structure-extraction branch to create dynamic kernels that are sensitive to spatial variations, allowing for better feature modulation. This approach prevents the over-smoothing of predictions and enhances the accuracy of segmenting clinical structures. Experimental results demonstrate that SGDC outperforms existing methods on several medical image datasets, showing significant improvements in boundary fidelity and overall segmentation quality.'}, 'zh': {'title': '结构引导动态卷积：提升医学图像分割精度的创新方法', 'desc': '本文提出了一种结构引导的动态卷积（SGDC）机制，旨在改善医学图像分割中的细节保留。传统的平均池化方法会导致高频空间细节的丢失，从而影响临床结构的准确性。SGDC通过引入一个结构提取分支，指导动态卷积核的生成，确保特征调制时能够保留边界信息。实验结果表明，SGDC在多个医学图像数据集上表现出色，显著提高了分割精度。'}}}, {'id': 'https://huggingface.co/papers/2603.02667', 'title': 'DREAM: Where Visual Understanding Meets Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2603.02667', 'abstract': 'Abstract DREAM is a unified multimodal framework that combines visual representation learning and text-to-image generation through progressive masking and semantically aligned decoding, achieving superior performance in both discriminative and generative tasks.  \t\t\t\t\tAI-generated summary Unifying visual representation learning and text-to-image (T2I) generation within a single model remains a central challenge in multimodal learning. We introduce DREAM, a unified framework that jointly optimizes discriminative and generative objectives, while learning strong visual representations. DREAM is built on two key techniques: During training, Masking Warmup, a progressive masking schedule, begins with minimal masking to establish the contrastive alignment necessary for representation learning, then gradually transitions to full masking for stable generative training. At inference, DREAM employs Semantically Aligned Decoding to align partially masked image candidates with the target text and select the best one for further decoding, improving text-image fidelity (+6.3%) without external rerankers. Trained solely on CC12M, DREAM achieves 72.7% ImageNet linear-probing accuracy (+1.1% over CLIP) and an FID of 4.25 (+6.2% over FLUID), with consistent gains in few-shot classification, semantic segmentation, and depth estimation. These results demonstrate that discriminative and generative objectives can be synergistic, allowing unified multimodal models that excel at both visual understanding and generation.', 'score': 0, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd82f6e9740165750', 'authors': ['Chao Li', 'Tianhong Li', 'Sai Vidyaranya Nuthalapati', 'Hong-You Chen', 'Satya Narayan Shukla', 'Yonghuan Yang', 'Jun Xiao', 'Xiangjun Fan', 'Aashu Singh', 'Dina Katabi', 'Shlok Kumar Mishra'], 'affiliations': ['MIT CSAIL', 'Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.02667.jpg', 'data': {'categories': ['#multimodal', '#training', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для понимания и генерации изображений', 'desc': 'DREAM — это единая мультимодальная модель, которая объединяет обучение визуальных представлений и генерацию изображений из текста через прогрессивное маскирование. Во время обучения используется техника Masking Warmup, которая постепенно увеличивает маскирование от минимального (для контрастивного выравнивания) к полному (для стабильной генеративной подготовки). При инференсе применяется Semantically Aligned Decoding для выбора лучших кандидатов изображений путём выравнивания с целевым текстом. Модель демонстрирует синергию дискриминативных и генеративных задач, достигая лучших результатов одновременно в распознавании объектов и их генерации.'}, 'en': {'title': 'DREAM: Unifying Visual Learning and Text-to-Image Generation', 'desc': 'DREAM is a new framework that combines learning from images and generating images from text in one model. It uses a technique called Masking Warmup, which starts with little masking to help the model learn good visual representations, then increases masking for better image generation. During the testing phase, it applies Semantically Aligned Decoding to match images with text more accurately, leading to improved results. Overall, DREAM shows that combining different learning tasks can enhance performance in both understanding and creating images.'}, 'zh': {'title': 'DREAM：视觉与文本生成的统一框架', 'desc': 'DREAM是一个统一的多模态框架，结合了视觉表示学习和文本到图像生成。它通过逐步掩蔽和语义对齐解码来优化判别和生成目标，从而在这两种任务中都取得了优异的表现。DREAM采用了掩蔽预热和语义对齐解码两种关键技术，确保了在训练和推理阶段的有效性。实验结果表明，DREAM在图像理解和生成方面都表现出色，推动了多模态学习的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.02479', 'title': 'PRISM: Pushing the Frontier of Deep Think via Process Reward Model-Guided Inference', 'url': 'https://huggingface.co/papers/2603.02479', 'abstract': 'Abstract PRISM is a Process Reward Model-guided inference algorithm that enhances DEEPTHINK systems by using step-level verification to improve population refinement and solution aggregation, achieving strong performance on mathematical and scientific benchmarks.  \t\t\t\t\tAI-generated summary DEEPTHINK methods improve reasoning by generating, refining, and aggregating populations of candidate solutions, which enables strong performance on complex mathematical and scientific tasks. However, existing frameworks often lack reliable correctness signals during inference, which creates a population-enhancement bottleneck where deeper deliberation amplifies errors, suppresses correct minority solutions, and yields weak returns to additional compute. In this paper, we introduce a functional decomposition of DEEPTHINK systems and propose PRISM, a Process Reward Model (PRM)-guided inference algorithm that uses step-level verification to guide both population refinement and solution aggregation. During refinement, PRISM treats candidate solutions as particles in a PRM-defined energy landscape and reshapes the population through score-guided resampling and stochastic refinement, which concentrates probability mass on higher-quality reasoning while preserving diversity. Across mathematics and science benchmarks, PRISM is competitive with or outperforms existing DEEPTHINK methods, reaching 90.0%, 75.4%, and 71.4% with gpt-oss-20b on AIME25, HMMT25, and GPQA Diamond, respectively, while matching or exceeding gpt-oss-120b. Additionally, our analysis shows that PRISM produces consistent net-directional correction during refinement, remains reliable when the initial population contains few correct candidates, and often lies on the compute-accuracy Pareto frontier.', 'score': 0, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'b44f37f5171bbeb8', 'authors': ['Rituraj Sharma', 'Weiyuan Chen', 'Noah Provenzano', 'Tu Vu'], 'affiliations': ['Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2603.02479.jpg', 'data': {'categories': ['#inference', '#benchmark', '#science', '#optimization', '#math', '#reasoning', '#training'], 'emoji': '✨', 'ru': {'title': 'Направленное улучшение решений через пошаговую верификацию', 'desc': 'PRISM — это алгоритм вывода, управляемый моделью вознаграждения процесса (Process Reward Model), который улучшает системы глубокого мышления путём проверки на уровне отдельных шагов решения. Алгоритм решает проблему низкого качества популяции кандидатов, используя переформулировку популяции через взвешенную переdiskretизацию и стохастическую оптимизацию, сосредоточивая вероятностную массу на высококачественные рассуждения. PRISM достигает конкурентных результатов на математических и научных бенчмарках, включая AIME25 и GPQA Diamond, часто превосходя модели с большим количеством параметров. Метод демонстрирует надёжность и находится на границе Парето в отношении соотношения между вычислительными затратами и точностью.'}, 'en': {'title': 'Enhancing DEEPTHINK with PRISM for Better Solution Accuracy', 'desc': 'The paper introduces PRISM, a new algorithm that enhances DEEPTHINK systems by using a Process Reward Model to improve the accuracy of candidate solutions. It addresses the issue of unreliable correctness signals during inference, which can lead to errors in solution refinement. PRISM employs step-level verification to reshape the population of solutions, focusing on higher-quality reasoning while maintaining diversity. The results show that PRISM performs competitively on various mathematical and scientific benchmarks, demonstrating its effectiveness in refining and aggregating solutions.'}, 'zh': {'title': 'PRISM：提升推理性能的创新算法', 'desc': 'PRISM是一种基于过程奖励模型的推理算法，旨在通过逐步验证来增强DEEPTHINK系统的性能。它通过对候选解进行粒子化处理，在奖励模型定义的能量景观中进行重塑，从而提高解的质量并保持多样性。PRISM在数学和科学基准测试中表现出色，能够与现有的DEEPTHINK方法竞争或超越。该算法在初始候选解较少的情况下仍能保持可靠性，并在计算与准确性之间达到良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2603.01400', 'title': 'Token Reduction via Local and Global Contexts Optimization for Efficient Video Large Language Models', 'url': 'https://huggingface.co/papers/2603.01400', 'abstract': 'Abstract AOT framework reduces video token redundancy through local-global optimal transport to preserve informative contexts while achieving efficient spatiotemporal compression in video large language models.  \t\t\t\t\tAI-generated summary Video Large Language Models (VLLMs) demonstrate strong video understanding but suffer from inefficiency due to redundant visual tokens. Existing pruning primary targets intra-frame spatial redundancy or prunes inside the LLM with shallow-layer overhead, yielding suboptimal spatiotemporal reduction and underutilizing long-context compressibility. All of them often discard subtle yet informative context from merged or pruned tokens. In this paper, we propose a new perspective that elaborates token Anchors within intra-frame and inter-frame to comprehensively aggregate the informative contexts via local-global Optimal Transport (AOT). Specifically, we first establish local- and global-aware token anchors within each frame under the attention guidance, which then optimal transport aggregates the informative contexts from pruned tokens, constructing intra-frame token anchors. Then, building on the temporal frame clips, the first frame within each clip will be considered as the keyframe anchors to ensemble similar information from consecutive frames through optimal transport, while keeping distinct tokens to represent temporal dynamics, leading to efficient token reduction in a training-free manner. Extensive evaluations show that our proposed AOT obtains competitive performances across various short- and long-video benchmarks on leading video LLMs, obtaining substantial computational efficiency while preserving temporal and visual fidelity. Project webpage: https://tyroneli.github.io/AOT{AOT}.', 'score': 0, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '0c1674e10a236645', 'authors': ['Jinlong Li', 'Liyuan Jiang', 'Haonan Zhang', 'Nicu Sebe'], 'affiliations': ['Tsinghua University', 'University of Electronic Science and Technology of China', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.01400.jpg', 'data': {'categories': ['#multimodal', '#long_context', '#inference', '#optimization', '#video'], 'emoji': '🚀', 'ru': {'title': 'Умное сжатие видео через оптимальный транспорт информации', 'desc': 'Авторы предлагают AOT — фреймворк для сжатия видеотокенов в видео-языковых моделях через оптимальный транспорт. Метод использует локальные и глобальные якорные токены внутри и между кадрами, чтобы сохранить важную информацию при удалении избыточных визуальных данных. Подход работает без переобучения модели и эффективно уменьшает количество токенов как внутри одного кадра, так и между последовательными кадрами. Экспериментальные результаты показывают, что AOT достигает значительного ускорения обработки видео на различных бенчмарках, сохраняя визуальное и временное качество.'}, 'en': {'title': 'Efficient Video Compression with Context Preservation', 'desc': 'The AOT framework introduces a method to reduce redundancy in video tokens by using local-global optimal transport, which helps maintain important contextual information while compressing video data efficiently. Traditional methods often overlook subtle details by focusing only on spatial redundancy or shallow-layer pruning, leading to less effective compression. The AOT approach establishes token anchors within and across frames to aggregate informative contexts, ensuring that essential details are preserved during the pruning process. This results in a significant reduction of tokens without sacrificing the quality of video understanding in large language models.'}, 'zh': {'title': '高效视频处理的新视角：AOT框架', 'desc': '本文提出了一种新的视频处理框架，称为AOT框架，旨在通过局部-全局最优传输减少视频中的冗余标记，同时保留重要的上下文信息。该方法通过在每帧内和帧间建立标记锚点，综合聚合有用的上下文，从而实现高效的时空压缩。与传统方法不同，AOT框架能够在不牺牲信息的情况下，优化视频大语言模型的性能。实验结果表明，AOT在多个视频基准测试中表现出色，显著提高了计算效率，同时保持了时间和视觉的保真度。'}}}];

            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents', '#agi', '#alignment', '#architecture (4)', '#audio', '#benchmark (4)', '#cv (4)', '#data', '#dataset (1)', '#diffusion', '#ethics (1)', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (3)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (5)', '#open_source (2)', '#optimization (3)', '#plp', '#rag', '#reasoning (3)', '#rl', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (5)', '#transfer_learning', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-04 04:02',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-04 04:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-04 04:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
