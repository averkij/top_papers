    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                titleSign.classList.remove('rotate');
            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.13432', 'title': 'OmniDirector: General Multi-Shot Camera Cloning without Cross-Paired Data', 'url': 'https://huggingface.co/papers/2606.13432', 'abstract': 'Abstract A unified framework for camera motion cloning that uses grid motion videos as representation and integrates multimodal diffusion transformers for enhanced video generation control.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Cloning camera motion from reference videos is an important task in video generation, as videos provide intuitive and precise control. Existing methods either directly use parametric representations that fail to handle multi-shot generation or synthesize cross-paired data, which suffer from data scarcity, resulting in poor performance in complicated camera motion cloning. To address these issues, we introduce a general camera motion representation that encodes cameras as grid motion videos. This camera grid represents the camera parameters visually and supports the integration of diverse trajectories for multi-shot video generation. Building upon this, we propose OmniDirector, a unified framework trained on a million-scale camera grid-video pairs that coordinates characters, actions, and cameras to provide director-level control for multimodal diffusion transformers. Furthermore, we design a novel hierarchical prompt expansion agent that harmoniously integrates different control signals by systematically describing camera motion and visual content through understanding signal relationships. Extensive experiments demonstrate the superior performance and outstanding controllability of our framework. Project page: https://ymlinfeng.github.io/OmniDirector.github.io/', 'score': 72, 'issue_id': 2433, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'e776cfe67a4698fa', 'authors': ['Jiwen Liu', 'Shujuan Li', 'Zhixue Fang', 'Xiaohan Li', 'Yan Zhou', 'Zijie Meng', 'Zhimin Zhang', 'Yawen Luo', 'Guoxin Zhang', 'Yu-Shen Liu', 'Pengfei Wan'], 'affiliations': ['Kling Team, Kuaishou Technology', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13432.jpg', 'data': {'categories': ['#synthetic', '#diffusion', '#dataset', '#video', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Режиссёрский контроль над камерой через сеточное представление движения', 'desc': 'Авторы предлагают OmniDirector — единую архитектуру для клонирования движения камеры в видео, которая использует представление движения в виде сеток (grid motion videos) вместо традиционных параметрических моделей. Ключевой инновацией является новое представление параметров камеры в виде визуальных сеток, позволяющее обрабатывать многокадровую генерацию видео и интегрировать разнообразные траектории движения. Система обучена на миллионах пар (сетка камеры, видео) и использует диффузионные трансформеры для координации персонажей, действий и движения камеры с режиссёрским уровнем контроля. Дополнительно авторы разработали иерархический агент расширения промптов, который гармонично объединяет различные управляющие сигналы путём описания движения камеры и визуального содержимого.'}, 'en': {'title': 'Mastering Camera Motion with OmniDirector', 'desc': 'This paper presents a new method for cloning camera motion in video generation using a unified framework called OmniDirector. It introduces a novel representation of camera movements as grid motion videos, which allows for better handling of complex multi-shot scenarios. The framework leverages multimodal diffusion transformers to enhance control over video generation by coordinating characters, actions, and camera movements. Extensive experiments show that this approach significantly improves performance and controllability compared to existing methods.'}, 'zh': {'title': '统一相机运动克隆框架的创新', 'desc': '本文提出了一种统一的相机运动克隆框架，利用网格运动视频作为表示，并结合多模态扩散变换器以增强视频生成控制。相机网格以视觉方式编码相机参数，支持多镜头视频生成中的多样化轨迹整合。我们提出的OmniDirector框架经过百万规模的相机网格视频对训练，能够协调角色、动作和相机，实现导演级别的控制。实验结果表明，该框架在性能和可控性方面表现优越。'}}}, {'id': 'https://huggingface.co/papers/2606.12384', 'title': 'APPO: Agentic Procedural Policy Optimization', 'url': 'https://huggingface.co/papers/2606.12384', 'abstract': 'Abstract Agentic Reinforcement Learning method that improves multi-turn tool-use capabilities by refining branching decisions and credit assignment through fine-grained decision points and procedure-level advantage scaling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in agentic Reinforcement Learning (RL) have substantially improved the multi-turn tool-use capabilities of large language model agents. However, most existing methods assign credit over coarse heuristic units, such as tool-call boundaries or fixed workflows, making it difficult to identify which intermediate decisions influence downstream outcomes. In this work, we study agentic RL from two perspectives: where to branch and how to assign credit after branching. Our pilot analysis shows that influential decision points are broadly distributed throughout the generated sequence rather than concentrated at tool calls, while token entropy alone does not reliably reflect their impact on final outcomes. Motivated by these observations, we propose Agentic Procedural Policy Optimization (APPO), which shifts branching and credit assignment from coarse interaction units to fine-grained decision points in the sequence. APPO selects branching locations using a Branching Score that combines token uncertainty with policy-induced likelihood gains of subsequent continuations, enabling more targeted exploration while filtering out spurious high-entropy positions. It further introduces procedure-level advantage scaling to better distribute credit across branched rollouts. Experiments on 13 benchmarks show that APPO consistently improves strong agentic RL baselines by nearly 4 points, while keeping efficient tool-calls and maintaining behavior interpretability.', 'score': 56, 'issue_id': 2433, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '591ed35acddcbc37', 'authors': ['Xucong Wang', 'Ziyu Ma', 'Yong Wang', 'Yuxiang Ji', 'Shidong Yang', 'Guanhua Chen', 'Pengkun Wang', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group', 'Southern University of Science and Technology', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.12384.jpg', 'data': {'categories': ['#training', '#optimization', '#rl', '#reasoning', '#agents'], 'emoji': '🌳', 'ru': {'title': 'Точечное ветвление и распределение кредита в обучении агентов с подкреплением', 'desc': 'В работе предложен метод Agentic Procedural Policy Optimization (APPO) для улучшения способности LLM-агентов использовать инструменты в многошаговых задачах. Авторы показывают, что влиятельные точки принятия решений распределены по всей последовательности генерируемых токенов, а не концентрируются только в местах вызова инструментов. Метод использует специальный Branching Score, который комбинирует неопределённость токенов с полученной вероятностью последующих продолжений для выбора оптимальных точек ветвления. APPO также применяет масштабирование преимуществ на уровне процедур для лучшего распределения кредита при обучении с подкреплением.'}, 'en': {'title': 'Refining Decision-Making in Reinforcement Learning with APPO', 'desc': 'This paper presents a new method called Agentic Procedural Policy Optimization (APPO) that enhances the ability of large language model agents to use tools over multiple turns. It addresses the challenge of credit assignment by focusing on fine-grained decision points rather than broad heuristic units, allowing for better identification of which decisions impact outcomes. The method uses a Branching Score to determine optimal branching locations, combining token uncertainty with the likelihood of successful continuations. Experiments demonstrate that APPO significantly outperforms existing reinforcement learning methods while ensuring efficient tool usage and interpretability of agent behavior.'}, 'zh': {'title': '提升多轮工具使用能力的代理强化学习', 'desc': '本文提出了一种代理强化学习（Agentic Reinforcement Learning）方法，旨在通过细化分支决策和信用分配来提升多轮工具使用能力。现有方法通常在粗略的启发式单位上进行信用分配，难以识别哪些中间决策影响最终结果。我们提出的代理程序策略优化（APPO）方法，将分支和信用分配从粗糙的交互单位转移到序列中的细粒度决策点。实验结果表明，APPO在多个基准测试中显著提高了代理强化学习的性能，同时保持了工具调用的效率和行为的可解释性。'}}}, {'id': 'https://huggingface.co/papers/2606.06036', 'title': 'Memory is Reconstructed, Not Retrieved: Graph Memory for LLM Agents', 'url': 'https://huggingface.co/papers/2606.06036', 'abstract': 'Abstract MRAgent combines associative memory graphs with active reconstruction to enable dynamic memory access during reasoning, improving long-horizon memory reasoning while reducing computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite recent progress, LLM agents still struggle with reasoning over long interaction histories. While current memory-augmented agents rely on a static retrieve-then-reason paradigm, this rigid pipeline design prevents them from dynamically adapting memory access to intermediate evidence discovered during inference. To bridge this gap, we propose MRAgent, a framework that combines an associative memory graph with an active reconstruction mechanism. We represent memory as a Cue-Tag-Content graph, where associative tags serve as semantic bridges connecting fine-grained cues to memory contents. Operating on this structure, our active reconstruction mechanism integrates LLM reasoning directly into memory access, allowing the agent to iteratively explore and prune retrieval paths based on accumulated evidence. This ensures that memory retrieval is dynamically adapted to the reasoning context while avoiding combinatorial explosion caused by unconstrained expansion. Experiments on the LoCoMo benchmark and LongMemEval benchmark demonstrate significant improvements over strong baselines (up to 23%), while substantially reducing token and runtime cost, highlighting the effectiveness of active and associative reconstruction for long-horizon memory reasoning.', 'score': 45, 'issue_id': 2432, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'e16b8c442e08b1e0', 'authors': ['Shuo Ji', 'Yibo Li', 'Bryan Hooi'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2606.06036.jpg', 'data': {'categories': ['#reasoning', '#graphs', '#long_context', '#benchmark', '#architecture', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Динамическая память с активной реконструкцией для долгосрочного рассуждения', 'desc': 'MRAgent представляет собой фреймворк для улучшения рассуждений языковых моделей над длинными историями взаимодействий путём комбинирования графа ассоциативной памяти с механизмом активной реконструкции. Вместо статичного подхода «извлечь-потом-рассуждай», система динамически адаптирует доступ к памяти на основе промежуточных доказательств, обнаруженных во время вывода. Память представлена в виде графа Cue-Tag-Content, где ассоциативные теги служат семантическими мостами между детальными подсказками и содержимым памяти. Активный механизм реконструкции позволяет агенту итеративно исследовать и обрезать пути поиска, одновременно снижая вычислительные затраты на 23% при сохранении высокой точности.'}, 'en': {'title': 'Dynamic Memory Access for Enhanced Reasoning', 'desc': 'MRAgent is a new framework that enhances long-term memory reasoning in language models by using associative memory graphs and active reconstruction. It allows agents to dynamically access and adapt memory based on the evidence gathered during reasoning, rather than following a fixed retrieval process. The memory is structured as a Cue-Tag-Content graph, which helps connect specific cues to relevant memory content through associative tags. Experiments show that MRAgent significantly improves performance on memory tasks while also reducing computational costs, making it more efficient for complex reasoning scenarios.'}, 'zh': {'title': '动态记忆访问，提升长时记忆推理', 'desc': 'MRAgent是一种结合了联想记忆图和主动重建机制的框架，旨在改善长时间记忆推理的能力。它通过将记忆表示为线索-标签-内容图，利用联想标签作为语义桥梁，将细粒度线索与记忆内容连接起来。主动重建机制使得大语言模型（LLM）推理能够直接融入记忆访问中，从而根据累积的证据动态调整检索路径。实验结果表明，MRAgent在LoCoMo和LongMemEval基准测试中显著优于传统方法，同时减少了计算成本。'}}}, {'id': 'https://huggingface.co/papers/2606.13707', 'title': 'Orchestra-o1: Omnimodal Agent Orchestration', 'url': 'https://huggingface.co/papers/2606.13707', 'abstract': 'Abstract An omnimodal agent orchestration framework is presented that enables efficient collaboration across multiple modalities through unified task decomposition and specialized sub-agent execution, achieving superior performance on complex multimodal benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The recent success of agent swarms has shifted the paradigm of large language model (LLM)-based agents from single-agent workflows to multi-agent systems, highlighting the importance of agent orchestration for task decomposition and collaboration. However, existing orchestration frameworks are limited to a narrow set of modalities and struggle to generalize to more complex settings where heterogeneous modalities coexist and interact. This limitation becomes particularly pronounced in omnimodal scenarios, where tasks require the unified understanding and coordination of diverse inputs such as text, image, audio, and video. In this work, we propose Orchestra-o1, an omnimodal agent orchestration framework designed to support efficient agent collaboration across multiple modalities. Orchestra-o1 introduces a unified orchestration mechanism that enables modality-aware task decomposition, online sub-agent specialization, and parallel sub-task execution. This scalable design allows agent systems to effectively tackle complex real-world tasks involving heterogeneous information sources, surpassing the second-best approach by 10.3% accuracy on the OmniGAIA benchmark. Furthermore, we introduce decision-aligned group relative policy optimization (DA-GRPO), an efficient agentic reinforcement learning approach for training Orchestra-o1-8B, which also achieves state-of-the-art performance against all existing open-source omnimodal agents.', 'score': 34, 'issue_id': 2432, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '5001cfdeb2a52db4', 'authors': ['Fan Zhang', 'Vireo Zhang', 'Shengju Qian', 'Haoxuan Li', 'Hao Wu', 'Jinyang Wu', 'Donghao Zhou', 'Zhihong Zhu', 'Zheng Lian', 'Xin Wang', 'Pheng-Ann Heng'], 'affiliations': ['CUHK', 'LIGHTSPEED', 'PKU', 'THU', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13707.jpg', 'data': {'categories': ['#optimization', '#agents', '#benchmark', '#video', '#audio', '#rl', '#training', '#multimodal'], 'emoji': '🎼', 'ru': {'title': 'Оркестровка множества агентов для понимания разнородных данных', 'desc': 'Представлена система Orchestra-o1 для согласованной работы множества специализированных агентов на основе LLM, работающих с разными типами данных (текст, изображения, аудио, видео).框架использует унифицированный механизм декомпозиции задач с учётом модальности и позволяет параллельно выполнять подзадачи разными агентами. Для обучения системы предложен метод DA-GRPO, основанный на обучении с подкреплением и выравнивании решений. Решение превосходит существующие подходы на 10.3% по точности на бенчмарке OmniGAIA и достигает лучших результатов среди открытых омнимодальных агентов.'}, 'en': {'title': 'Orchestra-o1: Harmonizing Multimodal Agent Collaboration', 'desc': 'This paper introduces Orchestra-o1, a framework for coordinating multiple agents that can handle different types of data, like text, images, and audio. It allows these agents to work together more effectively by breaking down tasks into smaller parts that can be managed by specialized sub-agents. The framework improves performance on complex tasks by enabling agents to understand and interact with various data types simultaneously. Additionally, it employs a new reinforcement learning method called decision-aligned group relative policy optimization (DA-GRPO) to enhance training and achieve top results compared to other systems.'}, 'zh': {'title': '全模态代理协作的新纪元', 'desc': '本文提出了一种全模态代理编排框架Orchestra-o1，旨在通过统一的任务分解和专业的子代理执行，实现多模态之间的高效协作。该框架克服了现有编排框架在复杂环境中对多种模态的局限性，能够处理文本、图像、音频和视频等多样化输入的任务。Orchestra-o1引入了模态感知的任务分解机制和在线子代理专业化，支持并行子任务执行，从而提升了代理系统在复杂现实任务中的表现。通过在OmniGAIA基准测试中超越第二名10.3%的准确率，展示了其优越的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.13141', 'title': 'Rethinking RAG in Long Videos: What to Retrieve and How to Use It?', 'url': 'https://huggingface.co/papers/2606.13141', 'abstract': 'Abstract VideoRAG systems are extended to handle long egocentric videos with multi-modal retrieval across temporal granularities, addressing limitations in existing benchmarks and methods through a new benchmark and chunk-adaptive reranking approach.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Retrieval-augmented generation is moving beyond text into long, egocentric video, where systems must select query-relevant chunks across multiple modalities and temporal granularities. Yet progress in VideoRAG is limited by two gaps: existing benchmarks allow queries to be answered without the video, obscuring retrieval errors, and prior methods apply a single modality-granularity configuration per query, ignoring chunk-level variability. We address both by introducing V-RAGBench, a benchmark of langlequery, evidence chunk, answerrangle triplets that enables faithful, decoupled evaluation of retrieval and generation, and CARVE, a simple method that runs parallel retrievers across configurations and employs chunk-adaptive reranking to identify the winning configuration for each chunk. Each chunk then enters the generator under its winning configuration selected during retrieval, yielding an interleaved evidence form where the chunk-level decision propagates across both stages. CARVE outperforms eight recent VideoRAG baselines, with the chunks supplied to the generator interleaving multiple configurations rather than sharing a single one, a behavior unattainable by query-level methods.', 'score': 30, 'issue_id': 2433, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'ca4a232aa27cde1e', 'authors': ['Yuho Lee', 'Jisu Shin', 'Nicole Hee-Yeon Kim', 'Jihwan Bang', 'Juntae Lee', 'Kyuwoong Hwang', 'Fatih Porikli', 'Hwanjun Song'], 'affiliations': ['KAIST', 'Qualcomm AI Research', 'Qualcomm Korea'], 'pdf_title_img': 'assets/pdf/title_img/2606.13141.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#video', '#rag', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Видео-RAG с адаптивным выбором конфигурации для каждого фрагмента', 'desc': "В работе расширяется область retrieval-augmented generation на долгие эгоцентричные видео с мультимодальным поиском на разных временных масштабах. Авторы предлагают V-RAGBench — новый бенчмарк для честной оценки компонентов retrieval и generation отдельно друг от друга. Также представлен метод CARVE, который параллельно запускает несколько retriever'ов с разными конфигурациями модальностей и временных гранулярностей, затем использует адаптивный к каждому фрагменту reranking для выбора оптимальной конфигурации. Такой chunk-level подход позволяет разным фрагментам видео использовать разные конфигурации, что превосходит методы, работающие на уровне запроса."}, 'en': {'title': 'Enhancing VideoRAG with Adaptive Retrieval for Egocentric Videos', 'desc': 'This paper presents advancements in Video Retrieval-Augmented Generation (VideoRAG) systems, specifically for long egocentric videos. It introduces a new benchmark called V-RAGBench, which allows for better evaluation of retrieval and generation by using query, evidence chunk, and answer triplets. The authors propose a method named CARVE that utilizes multiple retrieval configurations and adapts to the best-performing configuration for each video chunk. This approach significantly improves performance over existing methods by allowing for more flexible and accurate retrieval across different modalities and temporal scales.'}, 'zh': {'title': '视频检索增强生成的新突破', 'desc': '本论文提出了一种新的视频检索增强生成（VideoRAG）系统，旨在处理长时间的自我中心视频，并在不同时间粒度上进行多模态检索。我们引入了V-RAGBench基准，允许对检索和生成进行独立评估，解决了现有基准的不足之处。通过CARVE方法，我们实现了在多个配置下并行检索，并采用块自适应重排序来选择每个块的最佳配置。实验结果表明，CARVE在性能上超越了八个最新的VideoRAG基线，展示了块级决策在生成阶段的有效传播。'}}}, {'id': 'https://huggingface.co/papers/2606.14249', 'title': 'HarnessX: A Composable, Adaptive, and Evolvable Agent Harness Foundry', 'url': 'https://huggingface.co/papers/2606.14249', 'abstract': "Abstract HarnessX enables adaptive and evolvable AI agent runtime interfaces through compositional primitives, trace-driven evolution, and feedback loops that improve both harness design and model training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI agent performance depends critically on the runtime harness, comprising the prompts, tools, memory, and control flow that mediate how a model observes, reasons, and acts. Yet today's harnesses remain largely hand-crafted and static: each new model or task still demands bespoke scaffolding, and the rich traces produced during execution are rarely distilled back into systematic improvement. We introduce HarnessX, a foundry for composable, adaptive, and evolvable agent harnesses. HarnessX assembles typed harness primitives via a substitution algebra, adapts them through AEGIS, a trace-driven multi-agent evolution engine grounded in an operational mirror between symbolic adaptation and reinforcement learning, and closes the harness-model loop by turning trajectories into both harness updates and model training signal. Across five benchmarks (ALFWorld, GAIA, WebShop, tau^3-Bench, and SWE-bench Verified), HarnessX yields an average gain of +14.5% (up to +44.0%), with gains largest where baselines are lowest. These results suggest that agent progress need not come from model scaling alone: composing and evolving runtime interfaces from execution feedback is an actionable and complementary lever. The complete codebase will be open-sourced in a future release.", 'score': 29, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'fff40b5baab18fb4', 'authors': ['Tingyang Chen', 'Shuo Lu', 'Kang Zhao', 'Weicheng Meng', 'Hanlin Teng', 'Tianhao Li', 'Chao Li', 'Xule Liu', 'Jian Liang', 'Zhizhong Zhang', 'Yuan Xie', 'Heng Qu', 'Kun Shao', 'Jian Luan'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.14249.jpg', 'data': {'categories': ['#rl', '#training', '#benchmark', '#agents'], 'emoji': '⚙️', 'ru': {'title': 'От ручного кода к эволюции: автоматическая адаптация интерфейсов AI-агентов', 'desc': 'HarnessX — это фреймворк для создания адаптивных и эволюционирующих интерфейсов AI-агентов через композитные примитивы и обратную связь. Система использует trace-driven эволюцию (AEGIS), которая автоматически улучшает конфигурацию агента на основе анализа траекторий выполнения. Фреймворк замыкает цикл обратной связи между средой выполнения и моделью, преобразуя данные о выполнении как в обновления harness, так и в сигналы для обучения модели. На пяти бенчмарках HarnessX достигает среднего улучшения на 14.5%, демонстрируя, что прогресс агентов возможен не только через масштабирование моделей, но и через оптимизацию runtime-интерфейсов.'}, 'en': {'title': 'HarnessX: Evolving AI Interfaces for Enhanced Performance', 'desc': 'HarnessX is a framework that enhances AI agent performance by creating adaptable and evolving runtime interfaces. It uses compositional primitives and a trace-driven evolution engine called AEGIS to improve how models interact with their environment. By analyzing execution traces, HarnessX allows for systematic updates to both the harness design and the model training process. The results show significant performance improvements across various benchmarks, indicating that refining runtime interfaces can be as important as scaling model size.'}, 'zh': {'title': 'HarnessX：自适应与进化的 AI 代理框架', 'desc': 'HarnessX 是一个用于构建自适应和可进化 AI 代理运行时接口的框架。它通过组合原语、基于追踪的进化和反馈循环来改进设计和模型训练。当前的运行时接口大多是手工制作的，缺乏灵活性，而 HarnessX 通过类型化的原语组合和多代理进化引擎 AEGIS 来实现适应性。实验结果表明，HarnessX 在多个基准测试中平均提升了 14.5%，显示出通过执行反馈来构建和进化运行时接口是提升代理性能的有效方法。'}}}, {'id': 'https://huggingface.co/papers/2606.14502', 'title': 'From Chatbot to Digital Colleague: The Paradigm Shift Toward Persistent Autonomous AI', 'url': 'https://huggingface.co/papers/2606.14502', 'abstract': 'Abstract Large Language Models are evolving from conversational systems to integrated AI colleagues with enhanced reasoning capabilities and persistent work environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) are undergoing a fundamental transformation from conversational generators into integrated AI systems capable of reasoning, action, memory, and self-improvement. We conceptualize this transition as a shift from Chatbot to Digital Colleague: from conversational answers to persistent work. We organize this transition along two tightly coupled dimensions. First, at the cognitive core level, LLMs are advancing from Chatbot-era "fast thinking" systems driven by next-token prediction toward Thinking LLMs that leverage inference-time computation, Chain-of-Thought reasoning, reflection, process supervision, and reinforcement learning to support more deliberate and reliable cognition. Second, at the tool-augmented task execution level, LLMs are progressing from tool-calling Agents that invoke external resources in an ad hoc manner toward OpenClaw-style workstation systems (OpenClaw) equipped with persistent Workspaces, skills, verification loops, and governance. The "Workspace + Skill" paradigm makes episodic tool use colleague-like via state persistence, reusable procedures, task closure, and experience reuse. We examine data construction shifts from instruction-response pairs to State-Action-Observation trajectories and evaluation from static benchmarks to sandboxed, auditable, self-evolving AI ecosystems.', 'score': 22, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '341c63a8e17ecd47', 'authors': ['Yongheng Zhang', 'Ziang Liu', 'Jiaxuan Zhu', 'Shuai Wang', 'Xiangqi Chen', 'Haojing Huang', 'Jiayi Kuang', 'Siyu Chen', 'Ao Shen', 'Hao Wu', 'Qiufeng Wang', 'Qian-Wen Zhang', 'Junnan Dong', 'Wenhao Jiang', 'Ying Shen', 'Hai-Tao Zheng', 'Yinghui Li', 'Di Yin', 'Xing Sun', 'Philip S. Yu'], 'affiliations': ['Central South University', 'Sun Yat-sen University', 'Tencent Youtu Lab', 'Tsinghua University', 'University of Illinois at Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2606.14502.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#alignment', '#rlhf', '#agents', '#training'], 'emoji': '🤖', 'ru': {'title': 'От чат-бота к цифровому коллеге: эволюция языковых моделей', 'desc': 'Большие языковые модели (LLM) эволюционируют из простых диалоговых систем в интегрированные AI-ассистенты с улучшенными способностями к рассуждению. На уровне когнитивного ядра модели переходят от быстрого предсказания следующего токена к «думающим» LLM, использующим цепочки рассуждений, рефлексию и обучение с подкреплением. На уровне выполнения задач системы развиваются от простого вызова инструментов к полноценным рабочим станциям с персистентными хранилищами состояния, переиспользуемыми навыками и циклами верификации. Данные и оценка моделей также трансформируются: от статических пар инструкция-ответ к траекториям состояние-действие-наблюдение и от бенчмарков к самоэволюционирующим экосистемам.'}, 'en': {'title': 'From Chatbots to Digital Colleagues: The Next Evolution of AI', 'desc': "This paper discusses the evolution of Large Language Models (LLMs) from simple chatbots to advanced AI colleagues with improved reasoning and memory capabilities. It highlights a shift in LLMs from quick, next-token predictions to more complex cognitive processes that include Chain-of-Thought reasoning and reinforcement learning. Additionally, it introduces the 'Workspace + Skill' paradigm, which allows LLMs to perform tasks in a more organized and persistent manner, akin to human colleagues. The authors also address changes in data construction and evaluation methods to better support these advanced AI systems."}, 'zh': {'title': '从聊天机器人到数字同事的转变', 'desc': '大型语言模型（LLMs）正在从对话系统演变为集成的人工智能同事，具备更强的推理能力和持久的工作环境。这一转变被视为从聊天机器人到数字同事的变化，强调从简单的对话回答到持续的工作能力。LLMs的认知核心正在从基于下一个标记预测的快速思维系统，向利用推理计算、思维链推理和强化学习的深思熟虑的思维模型发展。同时，在工具增强的任务执行层面，LLMs也在从临时调用外部资源的工具代理，向具备持久工作空间和技能的开放式工作站系统（OpenClaw）进化。'}}}, {'id': 'https://huggingface.co/papers/2606.14702', 'title': 'OmniVideo-100K: A Dataset for Audio-Visual Reasoning through Structured Scripts and Evidence Chains', 'url': 'https://huggingface.co/papers/2606.14702', 'abstract': "Abstract An automated audio-visual question answering system uses entity-anchored video scripting and clue-guided QA generation to improve cross-modal reasoning and temporal consistency in video analysis.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current automated pipelines for audio-visual Question Answering (QA) generally adopt a ``video-caption-QA'' paradigm. However, these methods typically segment videos into short clips and generate separate descriptions for audio and visual modalities. This decoupled processing severs inherent associations between sounds and their visual sources, while independent clip processing often causes inconsistent descriptions of the same entity across segments. Furthermore, coupling long-text comprehension and QA synthesis into a single step often restricts models to localized events, yielding questions lacking long-term temporal connections and deep cross-modal reasoning. To address these issues, we propose an automated data engine featuring two mechanisms: (1) Entity-Anchored Video Scripting transforms videos into structured scripts, comprising summaries, main entity lists, and segment-wise audio-visual descriptions. The entity list serves as a global prior to ensure cross-segment referential consistency and reconstruct audio-visual associations. (2) Clue-Guided QA Generation prompts models to first mine cross-segment, multimodal clues from the script, and subsequently generate QA pairs based on these high-value clues. Leveraging this pipeline, we construct the instruction-tuning dataset OmniVideo-100K and a human-verified test set, OmniVideo-Test. Fine-tuning VITA-1.5, Qwen2.5-Omni-7B and Qwen3-Omni-30B on OmniVideo-100K yields performance gains of up to 20.59% on OmniVideo-Test, demonstrating strong generalization (up to 12.64% improvements) across established benchmarks like Daily-Omni and JointAVBench.", 'score': 19, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'c753f4cbe3ad7b0b', 'authors': ['Xinyue Cai', 'Chaoyou Fu', 'Yi-Fan Zhang', 'Ran He', 'Caifeng Shan'], 'affiliations': ['CASIA', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14702.jpg', 'data': {'categories': ['#dataset', '#video', '#audio', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Связанные вопросы и ответы: единство звука и видения через якорированные сущности', 'desc': 'В работе предложена система автоматической генерации вопросно-ответных пар для аудиовизуального анализа видео. Основной вклад заключается в двух механизмах: якорированное на сущностях преобразование видео в структурированные скрипты, которое обеспечивает кросс-модальную согласованность, и направляемая подсказками генерация QA, которая учитывает долгосрочные темпоральные зависимости. Авторы создали набор данных OmniVideo-100K для обучения мультимодальных больших языковых моделей и достигли значительного улучшения производительности на бенчмарках. Предложенный подход решает проблему разрыва связей между звуком и визуальными источниками, которая возникает при обработке видео отдельными клипами.'}, 'en': {'title': 'Enhancing Video QA with Structured Scripting and Clue Mining', 'desc': "This paper presents an advanced automated audio-visual question answering (QA) system that enhances cross-modal reasoning and temporal consistency in video analysis. It introduces two key mechanisms: Entity-Anchored Video Scripting, which organizes video content into structured scripts to maintain audio-visual associations, and Clue-Guided QA Generation, which helps in generating relevant QA pairs by mining multimodal clues. By addressing the limitations of traditional video-caption-QA methods, this system ensures coherent descriptions across video segments and improves the model's ability to understand long-term events. The proposed approach shows significant performance improvements on various benchmarks, indicating its effectiveness in the field of audio-visual QA."}, 'zh': {'title': '提升音视频问答的跨模态推理能力', 'desc': '这篇论文提出了一种自动化的音视频问答系统，旨在改善视频分析中的跨模态推理和时间一致性。该系统通过实体锚定的视频脚本和线索引导的问答生成机制，解决了传统方法中视频片段处理导致的音视频源之间的关联断裂问题。通过将视频转化为结构化脚本，系统确保了跨片段的参考一致性，并重建了音视频之间的关联。实验结果表明，经过微调的模型在多个基准测试中表现出显著的性能提升，证明了该方法的有效性和广泛适用性。'}}}, {'id': 'https://huggingface.co/papers/2606.12683', 'title': 'From AGI to ASI', 'url': 'https://huggingface.co/papers/2606.12683', 'abstract': 'Abstract Artificial general intelligence development may lead to artificial general superintelligence through multiple pathways, requiring interdisciplinary global preparation for transformative societal changes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Over the last decade, building human-level artificial general intelligence has moved from far-fetched speculation to being a concrete next-decade target for many of the largest AI organisations. Achieving this goal would have profound and far-reaching impacts on human society, which raises many complex questions for the decade ahead. This report investigates how AI itself might continue to develop in a post-AGI world along the continuum of machine intelligence. The endpoint of this continuum, Universal AI, is theoretically well understood, which provides some formal grounding for the main focus of this report: the transition from human-level AGI to artificial general superintelligence, which, intuitively, can be understood as a system that is more intelligent and cognitively capable than large organisations of humans. After characterizing ASI, the report discusses four potential pathways from AGI to ASI: scaling AGI, AI paradigm shifts, recursive improvement, and ASI emerging from large-scale multi-agent collectives. The report then discusses possible frictions and bottlenecks along these pathways. Determining whether the impact of these frictions will be negligible or substantial raises a number of concrete open research questions. Due to large uncertainties for predicting ASI progress, it cannot be ruled out that AI progress might continue to accelerate over the next years. This could imply that the image of a single transformative step change, caused by the introduction of human-level AGI into our society, could be inaccurate. More apt might be the prospect of a series of transformative societal changes caused by AI-enabled progress and breakthroughs across many areas of science and technology. Preparing for this prospect requires a massively interdisciplinary endeavour of global scope and interest.', 'score': 19, 'issue_id': 2432, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'a161a9bd3ac706a8', 'authors': ['Tim Genewein', 'Matija Franklin', 'Alexander Lerchner', 'Laurent Orseau', 'Samuel Albanie', 'Adam Bales', 'Cole Wyeth', 'Stephanie Chan', 'Iason Gabriel', 'Joel Z. Leibo', 'Allan Dafoe', 'Marcus Hutter', 'Thore Graepel', 'Shane Legg'], 'affiliations': ['Australian National University', 'Google DeepMind', 'University College London', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.12683.jpg', 'data': {'categories': ['#agi'], 'emoji': '🧠', 'ru': {'title': 'От человеческого интеллекта к сверхинтеллекту: пути развития и глобальная готовность', 'desc': 'В работе анализируется потенциальный переход от искусственного общего интеллекта (AGI) к искусственному superintelligence (ASI) — системам, превосходящим когнитивные способности больших организаций людей. Авторы рассматривают четыре основных механизма такого развития: масштабирование AGI, смена парадигм в AI, рекурсивное самоулучшение и коллективный интеллект многоагентных систем. Исследование выявляет потенциальные узкие места и трения на пути к ASI, а также подчёркивает неопределённость в прогнозировании темпов развития AI. Авторы утверждают, что вместо единого трансформационного скачка общество может столкнуться с серией последовательных изменений, требующих глобальной междисциплинарной подготовки.'}, 'en': {'title': 'Navigating the Path from AGI to Superintelligence', 'desc': 'This paper discusses the development of artificial general intelligence (AGI) and its potential evolution into artificial superintelligence (ASI). It outlines four pathways for this transition, including scaling AGI, paradigm shifts in AI, recursive self-improvement, and the emergence of ASI from multi-agent systems. The authors highlight the uncertainties and challenges that may arise during this progression, emphasizing the need for interdisciplinary preparation for societal changes. Ultimately, the report suggests that the journey to ASI may involve multiple transformative steps rather than a single breakthrough.'}, 'zh': {'title': '为未来的智能变革做好准备', 'desc': '这篇论文探讨了人工通用智能（AGI）向人工通用超智能（ASI）发展的可能路径。研究表明，AGI的实现将对人类社会产生深远影响，并提出了四种从AGI到ASI的潜在路径，包括AGI的扩展、AI范式转变、递归改进和大型多智能体集体的出现。论文还讨论了在这些路径上可能遇到的摩擦和瓶颈，以及这些摩擦对AI进展的影响。为了应对未来的变化，需要全球范围内的跨学科合作。'}}}, {'id': 'https://huggingface.co/papers/2605.30789', 'title': 'Smaller Models are Natural Explorers for Policy-Level Diversity in GRPO', 'url': 'https://huggingface.co/papers/2605.30789', 'abstract': "Abstract Small-to-Large Policy Optimization framework uses smaller models as natural explorers to enhance policy diversity and improve large language model training efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We identify a new dimension for enhancing rollout diversity in Group Relative Policy Optimization (GRPO) for LLMs. While GRPO relies on diverse rollouts, prevailing strategies primarily increase diversity by injecting more token-level randomness, which may introduce step-wise noise and lead to incoherent trajectories. We uncover that smaller models within the same model family inherently exhibit higher policy-level diversity, indicated by their superior pass@k relative to larger counterparts as sample counts increase. Unlike token-level noise, this diversity is temporally correlated, preserves logical consistency, and provides structured exploration signals for gradient estimation. We thus propose S2L-PO (Small-to-Large Policy Optimization), a framework that leverages fixed small models as natural explorers to train larger models. To balance exploration and exploitation, we design a progressive annealing strategy that transitions from offline small-model rollouts to the large learner's own sampling. This shift elegantly avoids mid-training performance drops caused by the small model's capacity limits, achieving faster convergence and unlocking a higher performance ceiling. S2L-PO improves accuracy on diverse mathematical reasoning benchmarks (e.g., +8.8% on AIME 24 using a 1.7B explorer to guide the 8B model) while reducing rollout compute.", 'score': 16, 'issue_id': 2433, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'a5fce23d76a410fc', 'authors': ['Yiming Ren', 'Yiran Xu', 'Zicheng Lin', 'Chufan Shi', 'Yukang Chen', 'Dingdong Wang', 'Tianhe Wu', 'Junjie Wang', 'Yujiu Yang', 'Yu Qiao', 'Ruihang Chu'], 'affiliations': ['City University of Hong Kong', 'Shanghai AI Laboratory', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30789.jpg', 'data': {'categories': ['#training', '#optimization', '#rlhf', '#small_models', '#math', '#reasoning'], 'emoji': '🚀', 'ru': {'title': 'Маленькие модели как проводники большого обучения', 'desc': 'В работе предлагается новый метод S2L-PO для улучшения обучения больших языковых моделей с помощью меньших моделей как естественных исследователей. Авторы показывают, что меньшие модели в одном семействе обладают большей разнообразием политик на уровне логики, чем простое добавление шума на уровне токенов, которое может привести к несогласованным траекториям. Предложенный подход использует фиксированные маленькие модели для генерации разнообразных роллаутов и затем постепенно переходит к собственной выборке большой модели, избегая падения производительности. Метод демонстрирует значительное улучшение на бенчмарках математического рассуждения, например +8.8% на AIME 24, одновременно снижая вычислительные затраты.'}, 'en': {'title': 'Harnessing Small Models for Big Gains in LLM Training', 'desc': "The Small-to-Large Policy Optimization (S2L-PO) framework enhances the training of large language models (LLMs) by utilizing smaller models as effective explorers. This approach improves policy diversity and training efficiency by leveraging the inherent higher policy-level diversity of smaller models, which leads to more coherent and structured exploration signals. Unlike traditional methods that inject randomness at the token level, S2L-PO maintains logical consistency and avoids performance drops during training. The framework employs a progressive annealing strategy to transition from small model rollouts to the larger model's own sampling, resulting in faster convergence and improved accuracy on various benchmarks."}, 'zh': {'title': '小模型助力大模型，提升训练效率！', 'desc': '小到大策略优化框架利用较小的模型作为自然探索者，以增强策略多样性并提高大型语言模型的训练效率。我们发现，在组相对策略优化（GRPO）中，较小模型在策略层面上表现出更高的多样性，这种多样性与时间相关，保持逻辑一致性，并为梯度估计提供结构化的探索信号。我们提出的S2L-PO框架通过固定的小模型来训练更大的模型，采用渐进退火策略平衡探索与利用，避免了小模型能力限制导致的中途性能下降。S2L-PO在多样化的数学推理基准上提高了准确性，同时减少了计算开销。'}}}, {'id': 'https://huggingface.co/papers/2606.10813', 'title': 'RedAct: Redacting Agent Capability Traces for Procedural Skill Protection', 'url': 'https://huggingface.co/papers/2606.10813', 'abstract': 'Abstract  Users rely on execution traces to observe agent behavior, diagnose failures, and ensure accountability. These traces contain rich procedural detail, including tool invocations, intermediate decisions, and error-recovery logic. Yet this detail can expose private procedural skills, allowing downstream methods to recover key formulas, thresholds, and strategies without access to model weights or skill files. To quantify this risk and evaluate protection, we construct CapTraceBench, a benchmark of 75 specialized long-horizon tasks and 154 curated skills across seven domains. We also introduce RedAct https://github.com/XuShuwenn/RedAct, a protected trace release framework that localizes protected key information, rewrites traces while preserving verifier-critical evidence, and embeds behavioral watermarks for downstream provenance analysis. Across representative trace reuse methods, RedAct reduces normalized skill transfer (NST) from 44.7--67.1\\% on raw traces to below the no-skill baseline, while preserving audit evidence. Its standalone behavioral watermarks reach 93.6--100.0\\% true detection with a false alarm rate of at most 1.9\\%. These results frame public agent traces as security interfaces and show that selective redaction can reduce procedural capability leakage without removing audit evidence.', 'score': 15, 'issue_id': 2433, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '420a2b51e27d55a8', 'authors': ['Shuwen Xu', 'Zhitao He', 'Yi R. Fung'], 'affiliations': ['Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.10813.jpg', 'data': {'categories': ['#open_source', '#security', '#leakage'], 'emoji': '🔐', 'ru': {'title': 'Защита приватных навыков в трассах выполнения агентов через селективную редакцию', 'desc': 'В статье исследуется проблема утечки приватной информации через трассы выполнения агентов, которые содержат детали процедур, инструменты и стратегии решения задач. Авторы создали CapTraceBench - бенчмарк из 75 сложных задач и 154 специализированных навыков для оценки риска утечки информации. Они предложили RedAct - фреймворк для защиты трасс выполнения, который удаляет чувствительные данные, сохраняя при этом информацию для аудита и встраивает поведенческие водяные знаки. Экспериментальные результаты показывают, что RedAct эффективно предотвращает передачу навыков через трассы выполнения, снижая утечку процедурных способностей без потери аудиторских доказательств.'}, 'en': {'title': 'Protecting Agent Traces: Reducing Skill Leakage with RedAct', 'desc': 'This paper addresses the security risks associated with execution traces used by users to monitor agent behavior and diagnose issues. It highlights how these traces can inadvertently reveal sensitive procedural skills, allowing unauthorized access to critical strategies and formulas. To tackle this problem, the authors present CapTraceBench, a benchmark for evaluating the risks and effectiveness of protection methods. They also introduce RedAct, a framework that modifies traces to protect sensitive information while maintaining essential audit evidence, demonstrating significant reductions in skill transfer leakage.'}, 'zh': {'title': '保护智能体轨迹，减少技能泄露', 'desc': '本论文探讨了用户如何依赖执行轨迹来观察智能体行为、诊断故障和确保责任。执行轨迹包含丰富的程序细节，但这些细节可能暴露私有的程序技能，导致关键公式和策略被恢复。为此，作者构建了CapTraceBench基准，包含75个专门的长期任务和154个策划的技能，并引入了RedAct框架来保护轨迹信息。RedAct通过局部化保护信息和嵌入行为水印，显著降低了技能转移的风险，同时保留了审计证据。'}}}, {'id': 'https://huggingface.co/papers/2606.12291', 'title': 'Measuring Epistemic Resilience of LLMs Under Misleading Medical Context', 'url': 'https://huggingface.co/papers/2606.12291', 'abstract': 'Abstract Large language models demonstrate reduced medical reasoning accuracy when exposed to misleading context, highlighting a critical gap in current evaluation methods that fails to assess epistemic resilience under adversarial conditions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) now reach expert-level scores on medical licensing exams, encouraging the assumption that high scores imply safe medical judgment while patients increasingly use them for health advice. We show this assumption is fragile: when misleading context is injected into questions that LLMs originally answer correctly, they abandon the correct answer. We call the ability to maintain correct judgment under adversarial context epistemic resilience, and introduce MedMisBench to measure it. MedMisBench contains 10,932 medical question items and 48,889 misleading context-option pairs spanning medical reasoning, agentic capability, and patient-journey evaluation. Across 11 model configurations, mean accuracy falls from 71.1% on original questions to 38.0% under focused misleading context, with 51.5% attack success. The most damaging injections are formal, rule-like fabrications: authority-framed falsehoods reach 69.5% attack success and exception-poisoning claims reach 64.1%. A 14-member clinical panel from 7 countries identified serious potential harm in 38.2% of reviewed cases. MedMisBench exposes a structural blind spot in LLM evaluation in medical settings: existing benchmarks measure what models know, but not whether they preserve correct medical judgment under misleading context.', 'score': 11, 'issue_id': 2433, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '59861b0f918da7e0', 'authors': ['Hongjian Zhou', 'Xinyu Zou', 'Jinge Wu', 'Sean Wu', 'Junchi Yu', 'Bradley Max Segal', 'Tobias Erich Niebuhr', 'Sara Amro', 'Michael Petrus', 'Sheikh Momin', 'Alexandra M. Cardoso Pinto', 'Rachel Niesen', 'Laura Sophie Wegner', 'Dhruv Darji', 'Jung Moses Koo', 'Joshua Fieggen', 'Kapil Narain', 'Mingde Zeng', 'Lei Clifton', 'Linda Shapiro', 'Fenglin Liu', 'David A. Clifton'], 'affiliations': ['University College London', 'University of Oxford', 'University of Washington', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.12291.jpg', 'data': {'categories': ['#hallucinations', '#dataset', '#benchmark', '#security', '#multimodal', '#healthcare', '#reasoning'], 'emoji': '⚕️', 'ru': {'title': 'Устойчивость или уязвимость: как враньё ломает медицинский рассудок LLM', 'desc': 'В статье исследуется уязвимость больших языковых моделей (LLM) в медицинском контексте: они демонстрируют резкое снижение точности при воздействии вводящей в заблуждение информации. Авторы вводят концепцию «эпистемической устойчивости» — способности модели сохранять правильные суждения под давлением противоречивых данных, и представляют бенчмарк MedMisBench с почти 11 тысячами медицинских вопросов. Эксперименты на 11 конфигурациях моделей показали, что точность падает с 71.1% до 38% при добавлении вводящего в заблуждение контекста, причём наиболее опасны формальные и авторитетные ложные утверждения. Исследование выявляет критический пробел в существующих методах оценки LLM для медицины, которые проверяют знания, но игнорируют способность моделей сохранять корректность при враждебных условиях.'}, 'en': {'title': 'Assessing Medical Judgment Resilience in Language Models', 'desc': 'This paper highlights a significant issue with large language models (LLMs) in medical reasoning, showing that their accuracy drops when faced with misleading information. The authors introduce a new evaluation tool called MedMisBench, which tests LLMs on their ability to maintain correct medical judgments despite adversarial contexts. They found that while LLMs perform well on standard medical questions, their accuracy plummets when misleading contexts are introduced, indicating a lack of epistemic resilience. The study reveals that current evaluation methods do not adequately assess how LLMs handle misleading information, which is crucial for ensuring safe medical advice.'}, 'zh': {'title': '揭示大型语言模型在医疗判断中的脆弱性', 'desc': '大型语言模型在医疗推理方面的准确性受到误导性上下文的影响，显示出当前评估方法的一个重要缺陷。这些模型在医学执照考试中取得了专家级的分数，但这并不意味着它们在医疗判断上是安全的。我们提出了“知识韧性”的概念，指的是在对抗性环境中保持正确判断的能力，并引入了MedMisBench来进行测量。MedMisBench包含大量医学问题和误导性上下文选项，结果显示在误导性上下文下，模型的准确率显著下降，揭示了现有评估方法的结构性盲点。'}}}, {'id': 'https://huggingface.co/papers/2606.14061', 'title': 'LLM Agents Can See Code Repositories', 'url': 'https://huggingface.co/papers/2606.14061', 'abstract': 'Abstract Visual repository representations enhance LLM-based coding agents by improving structural understanding and reducing token consumption during issue resolution.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Coding agents powered by large language models have demonstrated strong performance on software engineering tasks. Yet most agents consume repositories almost entirely as text, which differs from how human developers use visual structure such as folder hierarchies and dependency relationships to orient themselves in large codebases. With multimodal large language models (MLLMs), it is an open question whether agents can effectively benefit from visual representations of repositories. This paper presents the first systematic empirical study of visual repository representations for LLM-based agents on repository-level issue resolution. We evaluate four recent multimodal models. Our results show that a strictly vision-only setup degrades accuracy and increases token cost, because agents lack sufficient symbolic detail and compensate with repeated visual queries. In contrast, integrating visual graphs of repository structure as a supplementary modality alongside standard text interfaces helps agents understand structure more efficiently: input token consumption decreases by up to 26% while issue-resolution accuracy is maintained or improved. Visualization is most useful during fault localization and when the agent autonomously controls exploration depth. These findings point to a practical hybrid text-and-vision design for next-generation coding agents.', 'score': 10, 'issue_id': 2433, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '9d4ec70352a47822', 'authors': ['Dongjian Ma', 'Silin Chen', 'Yufei Yang', 'Yulin Shi', 'Yanfu yan', 'Xiaodong Gu'], 'affiliations': ['Shanghai Jiao Tong University', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14061.jpg', 'data': {'categories': ['#plp', '#multimodal', '#agents', '#cv'], 'emoji': '🏗️', 'ru': {'title': 'Видение и текст вместе: как гибридные представления улучшают понимание кода агентами', 'desc': 'Исследование показывает, что визуальные представления репозиториев кода улучшают производительность LLM-агентов при решении проблем. Авторы оценили четыре современные мультимодальные модели и обнаружили, что использование только изображений снижает точность и увеличивает потребление токенов. Гибридный подход, объединяющий визуальные графы структуры репозитория с текстовой информацией, позволяет агентам более эффективно понимать организацию кода, сокращая расход токенов на 26% при сохранении или улучшении точности. Результаты указывают на необходимость комбинированного дизайна text-and-vision для следующего поколения кодирующих агентов.'}, 'en': {'title': 'Enhancing Coding Agents with Visual Repository Insights', 'desc': 'This paper explores how visual representations of code repositories can enhance the performance of coding agents powered by large language models (LLMs). Traditional coding agents primarily process code as text, which limits their understanding of the structural organization that human developers rely on. The study evaluates multimodal large language models (MLLMs) and finds that combining visual graphs with text can reduce token consumption and maintain or improve accuracy in issue resolution. The results suggest that integrating visual elements into coding agents can lead to more efficient and effective software engineering tools.'}, 'zh': {'title': '视觉与文本结合，提升编码代理效率', 'desc': '本论文探讨了视觉仓库表示如何增强基于大型语言模型（LLM）的编码代理的结构理解能力，并减少在解决问题时的令牌消耗。通过对四种最新的多模态模型进行系统的实证研究，结果表明，单纯依赖视觉信息会降低准确性并增加令牌成本。相反，将仓库结构的视觉图与标准文本接口结合使用，可以更有效地帮助代理理解结构，从而减少输入令牌消耗并保持或提高问题解决的准确性。研究发现，视觉化在故障定位和代理自主控制探索深度时最为有效，指向了下一代编码代理的实用混合文本与视觉设计。'}}}, {'id': 'https://huggingface.co/papers/2606.06574', 'title': 'Skip a Layer or Loop It? Learning Program-of-Layers in LLMs', 'url': 'https://huggingface.co/papers/2606.06574', 'abstract': "Abstract Pretrained language models can execute layers dynamically through flexible program-of-layers strategies that improve accuracy while reducing computational overhead compared to standard fixed-depth inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) perform inference by following a fixed depth and order, non-recurrent execution of all layers. We reveal the wide existence of training-free, flexible, dynamic program-of-layers (PoLar), where pretrained layers can be packed as modules and then skipped or looped to form a customized program for each input. For most inputs, substantially shorter program executions can achieve the same or better accuracy, while incorrect predictions of the original LLM can be corrected by alternative programs with fewer layers. These observations indicate that inference admits multiple valid latent computations beyond the standard forward pass. To efficiently achieve PoLar in practice, we propose a lightweight PoLar prediction network, which learns to generate execution programs that dynamically skip or repeat pretrained layers for each input. Experiments on mathematical reasoning benchmarks demonstrate that PoLar consistently improves accuracy over standard inference and prior dynamic-depth methods, often while executing fewer layers, and that these gains persist under out-of-distribution evaluation. Our results suggest that fixed-depth execution captures only a narrow subset of an LLM's latent reasoning capacity.", 'score': 9, 'issue_id': 2432, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '93f843c36cb87616', 'authors': ['Ziyue Li', 'Yang Li', 'Tianyi Zhou'], 'affiliations': ['MBZUAI, Abu Dhabi, UAE', 'University of Maryland, College Park, MD, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.06574.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#inference', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Гибкое динамическое выполнение слоёв для эффективного inference языковых моделей', 'desc': 'В работе предложен метод динамического выполнения слоёв предобученных языковых моделей, называемый Program-of-Layers (PoLar), который позволяет пропускать или повторять слои в зависимости от входных данных. Авторы показывают, что для большинства примеров можно достичь той же или лучшей точности, используя меньше слоёв, чем стандартная архитектура с фиксированной глубиной. Для реализации PoLar разработана лёгкая нейросетевая модель-предсказатель, которая генерирует оптимальную программу выполнения слоёв для каждого конкретного входа. Экспериментальные результаты на задачах математического рассуждения демонстрируют улучшение точности и снижение вычислительных затрат по сравнению с фиксированным проходом через сеть.'}, 'en': {'title': 'Dynamic Layer Execution for Enhanced Model Performance', 'desc': 'This paper introduces a new method called dynamic program-of-layers (PoLar) for pretrained language models, which allows them to execute layers in a flexible manner. Instead of following a fixed sequence of layers, PoLar enables the model to skip or repeat certain layers based on the specific input, leading to improved accuracy and reduced computational costs. The authors demonstrate that this approach can correct errors made by traditional fixed-depth models by utilizing alternative layer combinations. Their experiments show that PoLar not only enhances performance on standard benchmarks but also maintains its effectiveness on out-of-distribution data.'}, 'zh': {'title': '动态层程序提升语言模型推理能力', 'desc': '这篇论文介绍了一种新的动态层程序（PoLar）策略，可以在不增加计算负担的情况下提高预训练语言模型的准确性。通过将预训练层打包为模块，模型可以根据输入灵活地跳过或重复某些层，从而形成定制的执行程序。实验表明，这种方法在数学推理基准测试中，通常能在执行更少层的情况下实现更高的准确性。研究结果表明，固定深度的执行方式仅捕捉了语言模型潜在推理能力的一小部分。'}}}, {'id': 'https://huggingface.co/papers/2606.14700', 'title': 'RepFusion: Leveraging Multimodal Priors for Denoising in Representation Space', 'url': 'https://huggingface.co/papers/2606.14700', 'abstract': 'Abstract RepFusion leverages multimodal large language models as noisy representation encoders for diffusion transformers in text-to-image generation, outperforming traditional approaches that train new denoisers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) are widely used in text-to-image (T2I) systems, but they are typically limited to text encoding, while denoising is handled by newly trained generative backbones. The emergence of representation autoencoders (RAEs) shifts the generation target toward semantically structured visual representations, creating a latent space that is more compatible with pretrained LLM priors. Inspired by multimodal LLMs (MLLMs), where an MLP projector is sufficient to align clean visual representations with a pretrained LLM, we repurpose the MLLM itself as a noisy representation encoder, extending this mechanism from clean to noisy inputs. We present RepFusion, which uses the resulting MLLM outputs as the conditioning signal for a diffusion transformer. In controlled comparisons at similar inference budgets, RepFusion outperforms baselines that devote comparable capacity to newly initialized denoisers. These results demonstrate that MLLMs provide strong priors for denoising visual representations and that, by conditioning on evolving noisy representations, test-time compute can be productively spent on repeated MLLM conditioning in modern T2I systems.', 'score': 7, 'issue_id': 2433, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'af37e4b66f096276', 'authors': ['Xichen Pan', 'Aashu Singh', 'Satya Narayan Shukla', 'Xiangjun Fan', 'Shlok Kumar Mishra', 'Saining Xie'], 'affiliations': ['Meta AI', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14700.jpg', 'data': {'categories': ['#training', '#architecture', '#diffusion', '#multimodal', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Переиспользование многомодальных LLM как шумовых энкодеров для диффузионной генерации изображений', 'desc': 'RepFusion использует многомодальные большие языковые модели в качестве энкодеров представлений для диффузионных трансформеров в задаче генерации изображений по тексту. Вместо обучения новых денойзеров с нуля, метод переиспользует уже предобученные MLLM, которые содержат сильные приоры для восстановления визуальных представлений. Подход расширяет механизм выравнивания из чистых представлений на зашумленные входы, позволяя диффузионному трансформеру условиться на эволюционирующих шумных представлениях. Экспериментальные результаты показывают, что RepFusion превосходит базовые методы при сравнимом объеме вычислений на этапе инференса.'}, 'en': {'title': 'RepFusion: Enhancing Text-to-Image Generation with Multimodal Language Models', 'desc': 'RepFusion is a novel approach in text-to-image generation that utilizes multimodal large language models (MLLMs) as noisy representation encoders for diffusion transformers. Unlike traditional methods that require training new denoisers, RepFusion leverages the strengths of pretrained LLMs to enhance the denoising process. By aligning noisy visual representations with the capabilities of MLLMs, this method creates a more effective latent space for generating images. The results show that RepFusion significantly outperforms existing techniques, demonstrating the potential of MLLMs in improving the efficiency and quality of text-to-image systems.'}, 'zh': {'title': 'RepFusion：提升文本到图像生成的去噪能力', 'desc': 'RepFusion利用多模态大型语言模型作为噪声表示编码器，应用于文本到图像生成中的扩散变换器，超越了传统的训练新去噪器的方法。该方法通过将多模态大型语言模型的输出作为扩散变换器的条件信号，改善了图像生成的质量。RepFusion展示了多模态大型语言模型在去噪视觉表示方面的强大先验能力，并通过对噪声表示的逐步条件化，优化了计算资源的使用。实验结果表明，RepFusion在相似的推理预算下，优于那些使用新初始化去噪器的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2606.14409', 'title': 'Hy-Embodied-0.5-VLA: From Vision-Language-Action Models to a Real-World Robot Learning Stack', 'url': 'https://huggingface.co/papers/2606.14409', 'abstract': 'Abstract HyVLA-0.5 is an end-to-end robotic learning system that integrates data collection, model design, pre-training, fine-tuning, and reinforcement learning for real-world deployment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In this report, we present Hy-Embodied-0.5-VLA, abbreviated as HyVLA-0.5, an end-to-end system that spans the full robot learning stack: data collection, model design, continued pre-training and supervised fine-tuning, RL post-training, and real-world deployment. Each component serves a distinct role in this stack.', 'score': 6, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'c805b0e0a8f9e944', 'authors': ['He Zhang', 'Lingzhu Xiang', 'Haitao Lin', 'Zeyu Huang', 'Minghui Wang', 'Dingyan Zhong', 'Yubo Dong', 'Yihao Wu', 'Yongming Rao', 'Dongsheng Zhang', 'Wanjia He', 'Ling Chen', 'Kai Huang', 'Jiahao Chen', 'Sichang Su', 'Xumin Yu', 'Ziyi Wang', 'Chengwei Zhu', 'Xiao Teng', 'Yuchun Guo', 'Yufeng Zhang', 'Yuandong Liu', 'Rui Wang', 'Zisheng Lu', 'Han Hu', 'Zhengyou Zhang'], 'affiliations': ['Tencent Hy Team', 'Tencent Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2606.14409.jpg', 'data': {'categories': ['#rl', '#agents', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От данных к действию: полный цикл обучения робота', 'desc': "HyVLA-0.5 — это комплексная система для обучения роботов, которая объединяет все этапы разработки: сбор данных, проектирование архитектуры модели, предварительное обучение и дообучение с учителем, а также обучение с подкреплением. Система представляет собой end-to-end решение, где каждый компонент играет специфическую роль в создании робота, способного выполнять задачи в реальном мире. Авторы интегрируют современные подходы машинного обучения для достижения эффективного переноса знаний от синтетических данных к реальным условиям. Система демонстрирует, как правильная организация всего pipeline'а обучения критична для успешного развертывания робототехнических систем."}, 'en': {'title': 'End-to-End Robotic Learning for Real-World Success', 'desc': "HyVLA-0.5 is a comprehensive robotic learning system that encompasses all stages of the learning process, from data collection to real-world application. It includes model design, which is crucial for creating effective algorithms, and pre-training to enhance the model's initial performance. The system also employs supervised fine-tuning to refine the model further, followed by reinforcement learning (RL) for optimizing decision-making in dynamic environments. This integrated approach ensures that the robotic system can effectively learn and adapt in real-world scenarios."}, 'zh': {'title': '全方位机器人学习系统的创新整合', 'desc': 'HyVLA-0.5 是一个端到端的机器人学习系统，涵盖了数据收集、模型设计、预训练、微调和强化学习等多个环节。该系统旨在实现机器人在真实世界中的应用。每个组件在整个学习流程中扮演着独特的角色，确保系统的高效性和准确性。通过这种集成方法，HyVLA-0.5 能够更好地适应复杂的环境和任务。'}}}, {'id': 'https://huggingface.co/papers/2606.00793', 'title': 'MBench: A Comprehensive Benchmark on Memory Capability for Video World Models', 'url': 'https://huggingface.co/papers/2606.00793', 'abstract': 'Abstract A new benchmark called MBench is introduced to evaluate the memory capabilities of video world models, focusing on entity, environment, and causal consistency over extended temporal horizons.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advancements in video-based world models have demonstrated an unprecedented ability to synthesize high-fidelity visual sequences. However, a fundamental gap persists between visually plausible video generation and the functional requirements of a world model, particularly in maintaining a stable and reasonable internal state over extended temporal horizons. While existing benchmarks primarily emphasize visual quality, motion coherence, and text-video alignment, they largely overlook memory, the core capability of a world model to preserve consistency across long-term horizons and complex interactions. To address this gap, we present MBench, a comprehensive benchmark dedicated to quantifying and evaluating the memory capability of video world models. We systematically decompose the memory capability of video world models into three hierarchical and complementary core dimensions: entity consistency, environment consistency, and causal consistency, which are further refined into 12 quantifiable sub-dimensions for comprehensive characterization of long-term memory. Our benchmark is built upon rigorously curated real-captured long videos, and evaluated by rule-based quantitative matrices and VLM to enable objective and comprehensive consistency assessment. Extensive evaluations of mainstream state-of-the-art video world models reveal critical systemic limitations of existing methods in long-term state retention, providing a standardized benchmark and clear research direction to advance the field.', 'score': 6, 'issue_id': 2433, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '03c880cf7b07408f', 'authors': ['Shengjun Zhang', 'Zhang Zhang', 'Simin Huang', 'Zhenyu Tang', 'Hanyang Wang', 'Chensheng Dai', 'Min Chen', 'Yifan Li', 'Yuxin Li', 'Yingjie Chen', 'Hao Liu', 'Chen Li', 'Jing Lyu', 'Yueqi Duan'], 'affiliations': ['Peking University', 'Tsinghua University', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.00793.jpg', 'data': {'categories': ['#long_context', '#benchmark', '#video', '#survey', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Память видео-моделей мира: от визуального правдоподобия к стабильному состоянию', 'desc': 'Представлена новая бенчмарк-система MBench для оценки способности видео-моделей мира сохранять информацию и консистентность на протяжении длительных временных интервалов. Авторы выявили критический пробел между визуальным качеством генерируемых видео и функциональными требованиями истинной модели мира, которая должна поддерживать стабильное внутреннее состояние. Память модели разложена на три иерархических уровня: консистентность сущностей, консистентность окружения и причинно-следственная консистентность, которые распределены на 12 измеримых подразмерностей. Обширное тестирование современных моделей выявило систематические ограничения в долгосрочном сохранении состояния и предложило стандартизированный способ оценки прогресса в этой области.'}, 'en': {'title': 'MBench: Evaluating Memory in Video World Models', 'desc': 'The paper introduces MBench, a new benchmark designed to assess the memory capabilities of video world models. It focuses on three key aspects: entity consistency, environment consistency, and causal consistency, which are essential for maintaining a stable internal state over time. Unlike existing benchmarks that prioritize visual quality, MBench emphasizes the importance of memory in preserving consistency during complex interactions across long durations. The benchmark is based on real long videos and provides a systematic evaluation framework to identify limitations in current video world models, guiding future research in this area.'}, 'zh': {'title': 'MBench：评估视频世界模型记忆能力的新基准', 'desc': '本文介绍了一种新的基准测试MBench，用于评估视频世界模型的记忆能力，重点关注实体一致性、环境一致性和因果一致性。尽管视频生成技术取得了显著进展，但在长时间范围内保持稳定的内部状态仍然存在挑战。现有基准主要关注视觉质量和运动一致性，而忽视了世界模型在长期记忆中的核心能力。MBench通过系统地分解记忆能力，提供了一个全面的评估框架，以推动该领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2606.14579', 'title': 'VISTA: View-Consistent Self-Verified Training for GUI Grounding', 'url': 'https://huggingface.co/papers/2606.14579', 'abstract': 'Abstract VISTA is a GRPO-based training framework for GUI grounding that uses multiple consistent views of the same GUI instance to improve training stability and accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct When applying Group Relative Policy Optimization (GRPO) for GUI Grounding, rollouts are sampled from a single screenshot view; groups often become either all failures on difficult instances or all successes on easy ones, yielding no useful relative advantage. We propose VISTA (View-Consistent Self-Verified Training), a GRPO-based training framework that constructs each comparison group from multiple target-preserving views of the same GUI instance.Each view is generated by a crop that keeps the target element visible and remaps its box exactly, so model rollouts are compared across semantically equivalent but geometrically different inputs. To stabilize short coordinate generation without turning reinforcement learning into unconditional imitation, VISTA further adds a self-verified cross-view anchor: an oracle answer optimized with an advantage-weighted loss, excluded from the group baseline and activated only when the model has produced a maximum-reward rollout. Across five GUI-grounding benchmarks and multiple Qwen backbones, VISTA consistently improves grounding accuracy.On ScreenSpot-Pro, it raises Qwen3-VL 4B/8B/30B-A3B from 55.5/52.7/53.7 to 63.4/65.8/67.0. Robustness analyses further show higher worst-view accuracy and lower prediction flip rates.', 'score': 5, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'd6593156ebaefbea', 'authors': ['Xinyu Qiu', 'Yunzhu Zhang', 'Heng Jia', 'Shuheng Shen', 'Changhua Meng', 'Linchao Zhu'], 'affiliations': ['Venus Team, Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14579.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#agents', '#training', '#multimodal'], 'emoji': '🖥️', 'ru': {'title': 'Множественные виды интерфейса для стабильного обучения определению элементов', 'desc': 'VISTA — это фреймворк для обучения моделей определению элементов интерфейса (GUI grounding) на основе Group Relative Policy Optimization (GRPO). Основная идея заключается в использовании нескольких геометрически различных, но семантически эквивалентных представлений одного и того же интерфейса для создания более информативных групп сравнения при обучении с подкреплением. Это решает проблему коллапса групп, когда все примеры в группе становятся либо ошибками, либо успехами, что исключает полезный сигнал обучения. Фреймворк также использует самопроверяющийся якорь между представлениями для стабилизации обучения, не превращая его в простое подражание.'}, 'en': {'title': 'Enhancing GUI Grounding with VISTA: Consistent Views for Better Training', 'desc': 'VISTA is a new training framework designed to enhance GUI grounding using Group Relative Policy Optimization (GRPO). It improves training stability and accuracy by utilizing multiple consistent views of the same GUI instance, allowing for better comparisons during model rollouts. By generating semantically equivalent views that preserve the target element, VISTA mitigates the issue of groups becoming uniformly successful or unsuccessful. Additionally, it incorporates a self-verified cross-view anchor to optimize performance without compromising the reinforcement learning process.'}, 'zh': {'title': 'VISTA：提升GUI定位的稳定性与准确性', 'desc': 'VISTA是一种基于GRPO的训练框架，旨在通过使用同一GUI实例的多个一致视图来提高训练的稳定性和准确性。在GUI定位中，传统方法通常只从单一截图视图中采样，导致在困难实例上出现全失败或全成功的情况。VISTA通过构建多个目标保持视图的比较组，确保模型在语义上等价但几何上不同的输入上进行比较，从而提高了模型的鲁棒性和准确性。此外，VISTA还引入了自验证的跨视图锚点，以优化最大奖励的回报，进一步增强了训练效果。'}}}, {'id': 'https://huggingface.co/papers/2606.12883', 'title': 'The Hidden Power of Scaling Factor in LoRA Optimization', 'url': 'https://huggingface.co/papers/2606.12883', 'abstract'
