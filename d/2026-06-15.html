: "Abstract Low-Rank Adaptation (LoRA) scaling factor α functions as a primary optimization driver rather than a secondary learning rate complement, with theoretical and empirical analysis revealing its superior impact on convergence and optimal scaling behavior.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In Low-Rank Adaptation (LoRA), the scaling factor α is often treated as a mere complement to the learning rate, yet its role in optimization remains poorly understood. In this paper, we reveal that the scaling factor α and the learning rate function differently, with α emerging as the dominant driver of effective optimization, delivering gains that cannot be replicated by learning rate scaling alone. Through the synergy of extensive empirical analysis and a theoretical Signal-Drift framework, we uncover three findings into LoRA's scaling mechanism: First, LoRA's spectral suppression smooths the optimization landscape, rendering standard hyperparameters overly conservative and creating an optimization gap. Second, when leveraging this smoothness to accelerate convergence, α outperforms the learning rate by amplifying the task signal without increasing the drift ratio. Third, the optimal scaling factor follows a sublinear relationship with the rank, well characterized by a square-root law with an unexpectedly large coefficient, revealing the insufficient scaling of existing rank-tied heuristics. Based on these insights, we propose LoRA-α, a minimalist framework that restores α to its principled regime, making LoRA compatible with standard small learning rates. Extensive evaluations across diverse tasks demonstrate that LoRA-α consistently improves performance while streamlining hyperparameter search, unleashing the learning potential of LoRA.", 'score': 5, 'issue_id': 2432, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '6b6a1e0126eac3e6', 'authors': ['Zicheng Zhang', 'Haoran Li', 'Jiaxing Wang', 'Guoqiang Gong', 'Anqi Li', 'Yudong Hu', 'Ting Xiong', 'Yurong Gao', 'Junxing Hu', 'Zhida Jiang', 'Yifeng Zhang', 'Pengzhang Liu', 'Qixia Jiang'], 'affiliations': ['JD', 'School of Advanced Interdisciplinary Sciences, UCAS', 'School of Mathematical Sciences, NKU', 'School of Mathematical Sciences, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2606.12883.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Коэффициент масштабирования α — истинный мотор оптимизации LoRA', 'desc': 'В статье исследуется роль масштабирующего коэффициента α в методе Low-Rank Adaptation (LoRA), который обычно рассматривается как дополнение к скорости обучения. Авторы показывают, что α является основным драйвером оптимизации и превосходит скорость обучения благодаря усилению сигнала задачи без увеличения отношения дрейфа. Через теоретический фреймворк Signal-Drift и эмпирический анализ выявлены три ключевых принципа: спектральная подавление LoRA сглаживает ландшафт оптимизации, оптимальный масштабирующий фактор следует степенному закону с рангом, и существующие эвристики недостаточно масштабируют α. На основе этих выводов предложен метод LoRA-α, который делает LoRA совместимым со стандартными малыми скоростями обучения и упрощает поиск гиперпараметров.'}, 'en': {'title': 'Unlocking Optimization: The Power of Scaling Factor α in LoRA', 'desc': "This paper investigates the role of the scaling factor α in Low-Rank Adaptation (LoRA) and reveals that it is a key driver of optimization rather than just a secondary learning rate. The authors show that α enhances convergence by effectively amplifying the task signal while maintaining a low drift ratio, outperforming traditional learning rate adjustments. They introduce a theoretical framework called Signal-Drift to explain how LoRA's spectral suppression creates a smoother optimization landscape, which can lead to an optimization gap with standard hyperparameters. Finally, they propose LoRA-α, a new framework that optimally utilizes α, improving performance across various tasks and simplifying hyperparameter tuning."}, 'zh': {'title': '揭示LoRA中的优化新机制', 'desc': '低秩适应（LoRA）中的缩放因子α被发现是优化的主要驱动因素，而不仅仅是学习率的补充。研究表明，α在优化过程中起着主导作用，能够显著提高收敛速度和优化效果。通过理论分析和实证研究，我们揭示了LoRA的缩放机制，并提出了LoRA-α框架，使其与标准的小学习率兼容。实验结果表明，LoRA-α在多种任务中均能提升性能，同时简化超参数搜索。'}}}, {'id': 'https://huggingface.co/papers/2606.06309', 'title': 'RhymeFlow: Training-Free Acceleration for Video Generation with Asynchronous Denoising Flow Scheduling', 'url': 'https://huggingface.co/papers/2606.06309', 'abstract': 'Abstract RhymeFlow accelerates diffusion transformers for video generation by decoupling denoising trajectories across frames, using keyframe anchoring and latent trajectory projection to maintain visual quality while reducing computational overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generation models based on Diffusion Transformers (DiTs) have achieved remarkable performance in video synthesis, yet they suffer from high inference latency and computational costs due to the quadratic complexity of 3D attention. Existing acceleration methods primarily reduce computational complexity within each individual denoising steps through techniques such as sparse attention and KV-caching. However, they rigidly adhere to the inherent constraint of the standard diffusion pipeline: every frame in the target video sequence must be subjected to a complete, dense denoising process across all diffusion timesteps. We observe that due to the corresponding contents and motions among adjacent frames, when keyframes with critical semantic transitions are anchored, the intermediate states of others often follow more predictable trajectories, which indicates that such uniform, dense denoising process is inherently redundant for natural video data. To this end, we introduce RhymeFlow, a training-free framework that decouples the denoising trajectories of different frames. Specifically, we first identify a sparse set of pivotal key frames that dominate the latent semantic evolution. Then, only these keyframes undergo dense, step-by-step denoising to ensure structural integrity, while non-keyframes progressively skip denoising steps to minimize computational cost. Since skipped intermediate states of non-keyframes break the temporal coherence in keyframe denoising steps, leading to visual degradation, we further introduce a latent trajectory projection module, which enables keyframes to interact with a complete and temporally consistent sequence representation. Extensive experiments on current DiT-based video generation models demonstrate our method outperforms existing baselines with higher inference speed and better visual quality.', 'score': 5, 'issue_id': 2433, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '832dfbb0b2201b4a', 'authors': ['Chensheng Dai', 'Shengjun Zhang', 'Yifan Li', 'Zhang Zhang', 'Zheng Zhu', 'Yueqi Duan'], 'affiliations': ['GigaAI', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06309.jpg', 'data': {'categories': ['#optimization', '#architecture', '#diffusion', '#inference', '#video'], 'emoji': '⚡', 'ru': {'title': 'Ускорение видеогенерации через выборочный денойзинг ключевых кадров', 'desc': 'RhymeFlow — это метод ускорения диффузионных трансформеров для генерации видео, который разделяет процесс денойзинга для разных кадров видеопоследовательности. Вместо того чтобы обрабатывать каждый кадр полностью через все шаги диффузии, метод выделяет ключевые кадры с критическими семантическими переходами и подвергает только их полному денойзингу. Промежуточные кадры пропускают некоторые шаги денойзинга, сокращая вычислительные затраты, однако модуль проекции латентных траекторий обеспечивает взаимодействие между ключевыми кадрами и полной темпорально согласованной последовательностью. Экспериментальные результаты показывают, что RhymeFlow достигает более высокой скорости инференса при сохранении или улучшении качества генерируемых видео.'}, 'en': {'title': 'Accelerating Video Generation with Smart Denoising', 'desc': 'RhymeFlow is a novel framework designed to enhance the efficiency of video generation using diffusion transformers by optimizing the denoising process. It identifies keyframes that capture essential changes in the video and applies detailed denoising only to these frames, while allowing non-keyframes to skip some denoising steps. This approach reduces computational costs without sacrificing visual quality, as it maintains coherence through a latent trajectory projection module. Extensive testing shows that RhymeFlow significantly improves inference speed and visual fidelity compared to traditional methods.'}, 'zh': {'title': 'RhymeFlow：高效视频生成的新方法', 'desc': 'RhymeFlow 是一种加速视频生成的扩散变换器框架，通过解耦不同帧的去噪轨迹来提高效率。它通过锚定关键帧和潜在轨迹投影，确保视觉质量的同时减少计算开销。该方法只对关键帧进行密集的逐步去噪，而非关键帧则逐步跳过去噪步骤，从而降低计算成本。实验结果表明，RhymeFlow 在推理速度和视觉质量上均优于现有的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2606.14697', 'title': 'ClinHallu: A Benchmark for Diagnosing Stage-Wise Hallucinations in Medical MLLM Reasoning', 'url': 'https://huggingface.co/papers/2606.14697', 'abstract': 'Abstract ClinHallu is a benchmark for diagnosing and mitigating hallucinations in medical multimodal large language models through stage-wise reasoning analysis and trace-supervised fine-tuning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Building trustworthy medical multimodal large language models (MLLMs) is critical for reliable clinical decision support. Existing medical hallucination benchmarks mainly focus on data collection, but often ignore where hallucinations originate within the reasoning process. We find that hallucination sources vary across samples: errors may arise from visual misrecognition, incorrect medical knowledge recall, or flawed reasoning integration. To enable source-level hallucination diagnosis, we introduce ClinHallu, a benchmark for stage-wise hallucination diagnosis in medical MLLM reasoning. ClinHallu contains 7,031 validated instances, where each instance is augmented with a structured reasoning trace decomposed into Visual Recognition, Knowledge Recall, and Reasoning Integration. We also use stage-replacement interventions to measure how correcting specific stages affects the final answer. Beyond evaluation, we show that trace-supervised fine-tuning reduces stage-wise hallucinations. ClinHallu provides a fine-grained hallucination testbed for diagnosing and mitigating reasoning failures in medical MLLMs. The benchmark is publicly available at https://github.com/alibaba-damo-academy/ClinHallu.', 'score': 4, 'issue_id': 2432, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '33511355c94656b6', 'authors': ['Sicheng Yang', 'Hangjie Yuan', 'Wenjun Zhang', 'Jinwang Wang', 'Yichen Qian', 'Weihua Chen', 'Fan Wang', 'Lei Zhu'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Hupan Lab', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14697.jpg', 'data': {'categories': ['#reasoning', '#hallucinations', '#healthcare', '#dataset', '#benchmark', '#training', '#open_source', '#multimodal'], 'emoji': '🩺', 'ru': {'title': 'Диагностика и устранение галлюцинаций в медицинских мультимодальных моделях через анализ этапов рассуждения', 'desc': 'ClinHallu — это эталонный набор для диагностики галлюцинаций в медицинских мультимодальных большие языковых моделях, которые анализируют изображения и текст одновременно. Исследователи выявили, что ошибки возникают на разных этапах рассуждения: при распознавании визуального контента, воспроизведении медицинских знаний или интеграции полученной информации. Каждый пример в наборе данных из 7031 экземпляра содержит структурированную трассу рассуждения, что позволяет точно определить источник ошибки. Авторы также показали, что обучение с использованием разметки этапов рассуждения эффективно снижает галлюцинации на каждом уровне.'}, 'en': {'title': 'Diagnosing and Mitigating Hallucinations in Medical MLLMs with ClinHallu', 'desc': 'ClinHallu is a new benchmark designed to identify and reduce hallucinations in medical multimodal large language models (MLLMs) by analyzing their reasoning processes. It focuses on diagnosing where hallucinations occur, such as in visual recognition, knowledge recall, or reasoning integration. The benchmark includes over 7,000 validated instances, each with a detailed reasoning trace to help pinpoint errors. Additionally, it demonstrates that fine-tuning the model using these traces can effectively decrease hallucinations during reasoning.'}, 'zh': {'title': 'ClinHallu：医疗推理中的幻觉诊断与减轻', 'desc': 'ClinHallu是一个用于诊断和减轻医疗多模态大语言模型（MLLM）幻觉的基准，通过阶段性推理分析和追踪监督微调来实现。现有的医疗幻觉基准主要关注数据收集，但往往忽视了幻觉在推理过程中的来源。我们发现幻觉来源因样本而异：错误可能源于视觉误识别、医学知识回忆不准确或推理整合缺陷。ClinHallu提供了一个细粒度的幻觉测试平台，用于诊断和减轻医疗MLLM中的推理失败。'}}}, {'id': 'https://huggingface.co/papers/2606.13872', 'title': 'Avatar V: Scaling Video-Reference Avatar Video Generation', 'url': 'https://huggingface.co/papers/2606.13872', 'abstract': 'Abstract Avatar V is a production-scale framework that generates behaviorally recognizable avatar videos by conditioning on full video references through sparse attention mechanisms and motion representation streams.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating avatar videos that are not merely visually similar to a target individual but behaviorally recognizable, faithfully reproducing their talking rhythm, gestural tendencies, and expression dynamics, remains an open challenge. Existing methods predominantly condition on single static images, which provide insufficient identity information and cannot capture dynamic motion traits, while standard pixel-level objectives underserve the perceptually critical facial regions that determine avatar fidelity. We present Avatar V, a production-scale framework that addresses these limitations through video-reference-conditioned identity modeling. Rather than compressing identity into fixed-size embeddings, the model conditions directly on the full token sequence of a reference video, learning to reproduce both static identity attributes (facial geometry, skin texture) and dynamic behavioral patterns (talking rhythm, micro-expressions) through attention over the reference context. We introduce Sparse Reference Attention, an asymmetric mechanism achieving linear-complexity conditioning on arbitrarily long references; a motion representation stream enabling closed-loop talking style transfer; and an identity-aware super-resolution refiner inheriting the full reference conditioning. These are supported by a data engine curating 100M+ training clips from 50M raw videos, and a five-stage training pipeline with flow matching pre-training, personality fine-tuning, two-phase distillation (>10x acceleration), and RLHF alignment, deployed across thousands of GPUs. Avatar V generates 1080p videos of unlimited duration, achieving state-of-the-art identity preservation, lip synchronization, and generation quality on our cross-scene benchmark, consistently outperforming leading systems including Seedance 2.0, Kling O3 Pro, Veo 3.1, and OmniHuman 1.5 in both automated metrics and human evaluation.', 'score': 4, 'issue_id': 2432, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '05330695fc730499', 'authors': ['Benjamin Liang', 'Ce Chen', 'Desmond Lin', 'Ivan Somov', 'Jiajun Zhao', 'Jiewei Yuan', 'Jingfeng Zhang', 'Junhao Huang', 'Nik Nolte', 'Pedram Haqiqi', 'Penghan Wang', 'Rong Yan', 'Rui Zhang', 'Sam Prokopchuk', 'Sivan Wang', 'Viktor Goriachko', 'Yi Ren', 'Yuanming Li', 'Yutao Chen', 'Zhenhui Ye', 'Zhibin Hong', 'Zilong Nie', 'Zujin Guo'], 'affiliations': ['HeyGen'], 'pdf_title_img': 'assets/pdf/title_img/2606.13872.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#architecture', '#rlhf', '#video', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Генерация реалистичных аватаров с воспроизведением поведенческих характеристик', 'desc': 'Avatar V — это промышленная система для генерации видео аватаров, которые не только визуально похожи на целевого человека, но и воспроизводят его поведенческие характеристики: ритм речи, жесты и микровыражения. Модель кондиционируется полной последовательностью токенов видео-образца вместо статичного изображения, что позволяет захватить как статические атрибуты идентичности, так и динамические поведенческие паттерны. Система использует разреженный механизм внимания для эффективной работы с длинными видео-ссылками, поток представления движения для передачи стиля речи и рефайнер супер-разрешения с сохранением полной условной информации. Фреймворк обучен на наборе данных из 100+ миллионов видео-клипов с использованием пятиэтапного конвейера обучения, включая matching потоков, fine-tuning личностных черт, дистилляцию и выравнивание RLHF.'}, 'en': {'title': 'Revolutionizing Avatar Creation with Behaviorally Recognizable Videos', 'desc': 'Avatar V is a cutting-edge framework designed to create avatar videos that not only look like a specific person but also mimic their unique behaviors and expressions. It uses advanced techniques like Sparse Reference Attention to efficiently process long video references, allowing for a more accurate representation of dynamic traits such as talking rhythm and gestures. Unlike previous methods that relied on single images, Avatar V captures both static and dynamic identity features by conditioning directly on full video sequences. This innovative approach results in high-quality, 1080p videos that excel in identity preservation and lip synchronization, outperforming existing systems in both automated and human evaluations.'}, 'zh': {'title': 'Avatar V：生成可识别虚拟形象视频的新突破', 'desc': 'Avatar V 是一个生产级框架，通过稀疏注意力机制和运动表示流，基于完整视频参考生成行为上可识别的虚拟形象视频。与传统方法不同，Avatar V 不仅依赖单一静态图像，而是直接在完整的参考视频序列上进行建模，从而更好地捕捉静态身份特征和动态行为模式。该框架引入了稀疏参考注意力机制，能够高效处理任意长度的参考视频，并通过运动表示流实现闭环的说话风格转移。Avatar V 在身份保留、口型同步和生成质量方面达到了最先进的水平，超越了多个领先系统。'}}}, {'id': 'https://huggingface.co/papers/2606.11599', 'title': 'When is Your LLM Steerable?', 'url': 'https://huggingface.co/papers/2606.11599', 'abstract': "Abstract Activation steering effectiveness can be predicted from early decoding states using a GBDT classifier, enabling efficient steering strength optimization with reduced computational cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Activation steering offers a lightweight approach to control language models' behavior at inference time, but whether it succeeds or fails heavily depends on the prompt, concept, model, and steering configuration. Finding the regime and boundaries of successful steering typically requires expensive grid searches and post-hoc evaluation of full autoregressive rollouts. In this work, we investigate whether steerability can be predicted from the model's internal states at the beginning of the generation process, e.g., after generating the first few tokens, and how to leverage such a predictor to improve steering success rate. To this end, we first introduce ASTEER, a testbed including 1.4M steered generations, spanning 150 concepts with each steering success/failure labeled. Leveraging this testbed, we analyze the model's early decoding dynamics by extracting features that compare hidden states before and after steering across layers and initial decoding steps. These features help us understand how steering's effects propagate along layers and token positions, which provide key information for steerability prediction. We then train a Gradient Boosting Decision Trees (GBDT) classifier on these features to predict whether an intervention will under-steer, succeed, or over-steer without requiring full rollout. Our predictor achieves around 0.7 macro-F1 score on unseen concepts, demonstrating that early hidden states encode substantial, structured information about eventual steering efficacy. We further leverage this steerability predictor as guidance for steering strength searching, achieving near-optimal performance with a small fraction of decoding cost.", 'score': 3, 'issue_id': 2432, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'c416a80146164027', 'authors': ['Chenrui Fan', 'Yize Cheng', 'Ming Li', 'Soheil Feizi', 'Tianyi Zhou'], 'affiliations': ['MBZUAI, UAE', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.11599.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Предсказание успеха управления активациями по начальным состояниям модели', 'desc': 'В этой работе исследуется, можно ли предсказать эффективность стирования активаций (activation steering) в языковых моделях на ранних стадиях генерации текста. Авторы создали тестбенч ASTEER с 1,4 миллионами примеров управления моделью и выделили признаки из скрытых состояний модели, которые показывают, как эффект стирования распространяется по слоям и позициям токенов. Они обучили классификатор на основе градиентного бустинга (GBDT), который может предсказать результат стирования (недостаточное, успешное или чрезмерное) без полной генерации текста. Полученный предсказатель достигает F1-оценки около 0,7 и позволяет оптимизировать силу стирования с минимальными вычислительными затратами.'}, 'en': {'title': 'Predicting Steering Success with Early Decoding Insights', 'desc': "This paper explores how to predict the effectiveness of activation steering in language models using early decoding states. By employing a Gradient Boosting Decision Trees (GBDT) classifier, the authors demonstrate that it is possible to optimize steering strength efficiently without extensive computational resources. They introduce a testbed called ASTEER, which includes a large dataset of steered generations, allowing for the analysis of the model's internal states during the initial decoding process. The findings indicate that early hidden states contain valuable information that can significantly enhance the success rate of steering interventions."}, 'zh': {'title': '通过早期状态预测激活引导的成功率', 'desc': '本文研究了如何通过模型生成过程初期的内部状态来预测激活引导的有效性。我们提出了ASTEER测试平台，包含140万次引导生成的实例，并标注了每次引导的成功与失败。通过分析模型的早期解码动态，我们提取了特征，以理解引导效果如何在层和标记位置之间传播。最终，我们训练了一个梯度提升决策树分类器，能够在不进行完整生成的情况下预测引导的结果，从而优化引导强度的搜索。'}}}, {'id': 'https://huggingface.co/papers/2606.13657', 'title': 'Dense Supervision, Sparse Updates: On the Sparsity and Geometry of On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.13657', 'abstract': "Abstract On-policy distillation exhibits sparse parameter updates that are distributed across layers and favor FFN components, while maintaining geometric properties distinct from standard dense parameter rewriting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) has recently become a prominent post-training recipe as it combines two desirable ingredients: on-policy student trajectories and dense teacher supervision, yet how this hybrid changes a model's parameters remains unclear. Across several language and vision-language model pairs and use cases, our analysis yields two main findings. On sparsity, OPD-style updates are small and coordinate-sparse. They are distributed across layers and are usually FFN-heavy. This sparse structure is operationally useful: training only the discovered subnetwork recovers nearly the same performance as full OPD. However, the sparsity-inducing SGD optimizer underperforms AdamW in our optimizer ablation, likely because dense teacher supervision preserves heterogeneous coordinate-wise gradient scales where AdamW's adaptive scaling remains useful. On geometry, the updates are numerically full-rank but spectrally concentrated; they lie mostly away from the principal singular subspaces of the source weights and fall disproportionately on coordinates where the source weights are close to zero. These findings suggest that dense teacher supervision does not turn OPD into ordinary dense parameter rewriting; instead, OPD retains important geometric signatures of on-policy post-training.", 'score': 2, 'issue_id': 2432, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '7963e9876e3dacfd', 'authors': ['Guo Yu', 'Wenlin Liu', 'Yulan Hu', 'Hao-Xuan Ma', 'Jun-Peng Jiang', 'Han-Jia Ye'], 'affiliations': ['Amap, Alibaba Group', 'National Key Laboratory for Novel Software Technology, Nanjing University', 'School of Artificial Intelligence, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13657.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🎯', 'ru': {'title': 'Редкие и геометрически структурированные обновления в дистилляции по текущей политике', 'desc': 'В статье исследуется механизм обновления параметров при дистилляции по текущей политике (OPD) на примере языковых и мультимодальных моделей. Авторы обнаружили, что обновления параметров являются разреженными, сконцентрированы в компонентах FFN и распределены по слоям модели, однако их можно эффективно воспроизвести, обучая только найденную подсеть. Геометрический анализ показал, что хотя обновления имеют полный ранг, они спектрально сконцентрированы и сосредоточены на координатах, далеких от главных сингулярных подпространств исходных весов. Эти результаты демонстрируют, что плотный надзор учителя не превращает OPD в обычное плотное переписывание параметров, сохраняя важные геометрические свойства обучения по текущей политике.'}, 'en': {'title': 'Sparse Updates, Rich Learning: The Power of On-Policy Distillation', 'desc': 'This paper explores on-policy distillation (OPD), a method that combines student learning from current data and guidance from a teacher model. The study finds that OPD leads to sparse updates in model parameters, primarily affecting feedforward neural network (FFN) components while preserving unique geometric properties. The results indicate that training only a selected subnetwork can achieve performance similar to full OPD, although the sparse gradient descent optimizer used is less effective than AdamW. Overall, the research highlights that OPD maintains distinct characteristics compared to traditional dense parameter updates, emphasizing the importance of the training geometry.'}, 'zh': {'title': '政策蒸馏：稀疏更新与几何特性并存', 'desc': '本文探讨了在政策蒸馏（On-policy Distillation, OPD）中，参数更新的稀疏性和几何特性。研究发现，OPD的更新主要集中在前馈神经网络（FFN）组件上，并且这些更新在各层之间分布不均。尽管使用稀疏结构的子网络训练可以达到与完整OPD相似的性能，但稠密教师监督的存在使得更新保持了重要的几何特征。总的来说，OPD在参数更新上与传统的稠密重写方式有所不同，保留了独特的几何特性。'}}}, {'id': 'https://huggingface.co/papers/2606.13769', 'title': 'μ_0: A Scalable 3D Interaction-Trace World Model', 'url': 'https://huggingface.co/papers/2606.13769', 'abstract': 'Abstract A scalable world model called μ₀ uses 3D traces to predict smooth trajectories for key interaction points, enabling embodiment-agnostic robot learning without action labels.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models that capture how actions induce physical change enable scalable robot learning without reliance on embodiment-specific action labels. Pixel-space video models provide broad visual priors but expend model capacity on dense appearance reconstruction, while direct action models require embodiment-specific labels that hinder scalability. We present μ_0, a scalable world model based on 3D traces. Rather than predicting dense pixels or directly modeling actions, μ_0 forecasts smooth 3D trajectories for salient interaction points such as objects, tools, hands, and contact regions, yielding a compact, embodiment-agnostic motion interface. To enable training from diverse video sources, our TraceExtract system automatically extracts 3D supervision by selecting keypoints, constructing globally aligned traces, and associating motion segments with hierarchical language captions. This TraceExtract supervision pretrains μ_0 by combining a pretrained vision-language backbone with a modular trace expert, which represents each query via B-spline control points and predicts future traces. Experiments show that μ_0 outperforms baselines in both 2D and 3D trace prediction, including trace prediction models and tokenized VLM methods. Because μ_0 is frozen and reusable, it can be paired with action experts for downstream robot embodiments. Despite action-free pretraining, the resulting trace-conditioned policies achieve performance competitive with VLA models pretrained with action supervision, such as π_0. These results establish 3D traces as a scalable and transferable representation for cross-embodiment manipulation.', 'score': 1, 'issue_id': 2432, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '02c18bff1024deee', 'authors': ['Seungjae Lee', 'Yoonkyo Jung', 'Jusuk Lee', 'Jonghun Shin', 'Amir Hossein Shahidzadeh', 'Yao-Chih Lee', 'H. Jin Kim', 'Jia-Bin Huang', 'Furong Huang'], 'affiliations': ['Seoul National University', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.13769.jpg', 'data': {'categories': ['#robotics', '#video', '#training', '#3d', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Трёхмерные траектории как универсальное представление для кросс-воплощённого обучения роботов', 'desc': 'В работе представлена модель μ₀, которая предсказывает гладкие трёхмерные траектории ключевых точек взаимодействия (объектов, инструментов, рук) вместо плотной реконструкции пикселей или прямого моделирования действий. Система TraceExtract автоматически извлекает трёхмерную разметку из разнородных видеоисточников, выделяя опорные точки и создавая глобально согласованные траектории с иерархическими текстовыми описаниями. Модель μ₀ обучается путём комбинирования предобученного видео-языкового энкодера с модульным экспертом по траекториям, представляющим кривые через управляющие точки B-сплайнов. Такой подход обеспечивает масштабируемое обучение роботов без привязки к конкретной морфологии и позволяет достичь производительности, сравнимой с моделями, обученными на разметках действий.'}, 'en': {'title': 'Scalable Robot Learning with 3D Trajectories', 'desc': 'The paper introduces μ₀, a scalable world model that predicts smooth 3D trajectories for key interaction points, facilitating robot learning without needing specific action labels. It utilizes a system called TraceExtract to automatically gather 3D supervision from diverse video sources, which helps in training the model effectively. Unlike traditional models that focus on pixel reconstruction or require specific action labels, μ₀ offers a compact, embodiment-agnostic interface for motion prediction. The results demonstrate that μ₀ not only outperforms existing models in trace prediction but also allows for competitive performance in robot manipulation tasks without action-based pretraining.'}, 'zh': {'title': '可扩展的3D轨迹模型μ₀：无动作标签的机器人学习新方法', 'desc': '本文介绍了一种可扩展的世界模型μ₀，它利用3D轨迹预测关键交互点的平滑轨迹，从而实现无动作标签的机器人学习。μ₀通过预测显著交互点（如物体、工具和手）的3D轨迹，提供了一种紧凑的、与具体形态无关的运动接口。该模型通过TraceExtract系统自动提取3D监督信息，结合预训练的视觉-语言模型和模块化轨迹专家进行训练。实验结果表明，μ₀在2D和3D轨迹预测方面的表现优于基线模型，证明了3D轨迹作为跨形态操作的可扩展和可转移表示的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.11152', 'title': 'P3D-Bench: Benchmarking MLLMs for Parametric 3D Generation and Structural Reasoning', 'url': 'https://huggingface.co/papers/2606.11152', 'abstract': "Abstract Parametric 3D generation benchmark evaluates models on geometric precision, semantic alignment, and assembly consistency through code-based modeling tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models can write code to produce complex programs as well as use programs to do 3D modeling, which opens up a new avenue for 3D generation powered by their priors, world knowledge and reasoning. Yet existing benchmarks rarely evaluate 3D modeling through code. Such modeling demands more than runnable code: from a text or visual specification, a model must generate a parametric 3D program that is geometrically precise, semantically aligned and assembly-consistent. We introduce P3D-Bench, a benchmark for parametric 3D generation. Unlike a 3D mesh, a parametric 3D program exposes explicit dimensions, construction operations and part relations, revealing whether a model recovers a design's structure, not just its appearance. Under a unified protocol, P3D-Bench covers three task families (Text-to-3D, Image-to-3D and Assembly-3D) and scores each output for executability, geometric fidelity, topology, text-grounded constraints, multiview semantic alignment and part-level structure. We evaluate frontier MLLMs and text-only LLMs on 400 text cases, 400 image cases and 203 annotated assemblies, with domain-specific models as reference points. Our extensive evaluation yields three findings. First, assemblies are the hardest setting, where models still fail to compose multiple parts into a coherent structure. Second, models can often recover the global shape and semantic identity of the target object, yet fail to reproduce the precise parametric geometry specified by the input. Third, part-level modeling remains weak on assemblies, where models recover neither the geometry of each part nor the right number of parts. These results position P3D-Bench as a benchmark for evaluating precise parametric geometry and part-level structure in parametric 3D generation.", 'score': 1, 'issue_id': 2433, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': 'c4e5274311142209', 'authors': ['Yikang Yang', 'Zhanpeng Hu', 'Youtian Lin', 'Mengqi Zhou', 'Jingxi Xu', 'Feihu Zhang', 'Jiaheng Liu', 'Yao Yao'], 'affiliations': ['Envision', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.11152.jpg', 'data': {'categories': ['#multimodal', '#3d', '#benchmark', '#dataset'], 'emoji': '🏗️', 'ru': {'title': 'Оценка точности параметрической 3D генерации через кодовое моделирование', 'desc': 'В работе представлена P3D-Bench — бенчмарк для оценки моделей генерации параметрической 3D геометрии на основе текста, изображений и сборок. Многомодальные большие языковые модели способны писать код для создания сложных 3D программ, но существующие бенчмарки редко оценивают такие возможности систематически. P3D-Bench проверяет не только исполняемость кода, но и геометрическую точность, семантическое соответствие спецификации и консистентность сборки из частей. Авторы провели обширную оценку современных MLLM и LLM моделей на 400 текстовых примерах, 400 примерах с изображениями и 203 аннотированных сборках, выявив, что модели испытывают наибольшие сложности с точной параметрической геометрией и моделированием структуры из отдельных компонентов.'}, 'en': {'title': 'P3D-Bench: A New Standard for Evaluating 3D Generation Models', 'desc': "This paper introduces P3D-Bench, a new benchmark for evaluating parametric 3D generation models. It focuses on assessing geometric precision, semantic alignment, and assembly consistency in 3D modeling tasks generated by large language models. The benchmark includes three task families: Text-to-3D, Image-to-3D, and Assembly-3D, and scores outputs based on various criteria such as executability and multiview semantic alignment. The findings reveal challenges in assembling parts into coherent structures and highlight the models' difficulties in achieving precise parametric geometry and part-level accuracy."}, 'zh': {'title': '参数化3D生成的新基准测试', 'desc': '本文介绍了P3D-Bench，这是一个用于评估参数化3D生成的基准测试。它通过代码建模任务来评估模型的几何精度、语义对齐和组装一致性。与传统的3D网格不同，参数化3D程序明确展示了尺寸、构造操作和部件关系，能够更好地反映设计的结构。我们的评估发现，现有模型在组装任务中表现最差，且在恢复目标对象的精确几何形状方面仍存在不足。'}}}, {'id': 'https://huggingface.co/papers/2606.14694', 'title': 'AdaSR: Adaptive Streaming Reasoning with Hierarchical Relative Policy Optimization', 'url': 'https://huggingface.co/papers/2606.14694', 'abstract': 'Abstract An adaptive streaming reasoning framework enables models to dynamically allocate computation and reason during input streaming while maintaining task performance and reducing latency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large reasoning models typically follow a read-then-think paradigm: they observe the complete input, reason over a static context, and then produce the answer. Yet many real-world scenarios are inherently dynamic, such as audio and video stream, where information arrives as a continuous stream and models must reason, update, and respond under partial observations. Recent streaming reasoning methods allow models to think while reading, but they largely rely on supervised imitation of pre-constructed trajectories, which limits their flexibility. In this paper, we propose AdaSR, an adaptive streaming reasoning framework that enables models to reason during input streaming and perform final deliberation once the stream is complete, learning when to think, and how much computation to allocate across different stages. To optimize this hierarchical reasoning process, we introduce Hierarchical Relative Policy Optimization (HRPO), which decomposes policy optimization into streaming reasoning and deep reasoning phases, providing more fine-grained advantage assignment instead of uniformly distributing a single sequence-level advantage over all tokens. HRPO integrates format, accuracy, and adaptive thinking rewards to enforce valid reasoning protocols, preserve final task performance, and encourage latency-aware computation allocation. Experiments show that AdaSR achieves a better balance among reasoning accuracy, computational efficiency, and streaming latency compared with supervised fine-tuning baseline. We release our code at https://github.com/EIT-NLP/StreamingLLM/tree/main/AdaSR.', 'score': 0, 'issue_id': 2433, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': 'ff78846b8e342259', 'authors': ['Junlong Tong', 'Wenqi Xu', 'Yingqi Fan', 'Anhao Zhao', 'Xuan Lu', 'Yang Tan', 'Xiaoyu Shen'], 'affiliations': ['Eastern Institute of Technology, Ningbo', 'Shanghai Jiao Tong University', 'Southeast University', 'The Hong Kong Polytechnic University', 'Xian Jiaotong-Liverpool University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14694.jpg', 'data': {'categories': ['#training', '#optimization', '#rl', '#rlhf', '#audio', '#video', '#multimodal', '#open_source', '#reasoning'], 'emoji': '⏳', 'ru': {'title': 'Думаю по мере поступления: адаптивные рассуждения в режиме реального времени', 'desc': 'В статье представлена AdaSR — фреймворк адаптивного потокового рассуждения, который позволяет моделям динамически распределять вычисления во время обработки входящего потока данных. Авторы предлагают Hierarchical Relative Policy Optimization (HRPO) — метод оптимизации политики, разбивающий процесс рассуждения на этапы потокового и глубокого анализа для более точного назначения преимуществ. Фреймворк интегрирует награды за формат, точность и адаптивное мышление, чтобы сохранить корректность рассуждений и производительность модели при снижении латентности. Экспериментальные результаты показывают, что AdaSR достигает лучшего баланса между точностью рассуждения, вычислительной эффективностью и задержкой обработки потока по сравнению с методами supervised fine-tuning.'}, 'en': {'title': 'Dynamic Reasoning for Real-Time Data Processing', 'desc': 'This paper introduces AdaSR, an adaptive streaming reasoning framework designed for machine learning models to process input streams dynamically. Unlike traditional models that analyze complete data before reasoning, AdaSR allows models to reason and update their understanding as data arrives, which is crucial for real-time applications like audio and video. The framework employs Hierarchical Relative Policy Optimization (HRPO) to optimize the reasoning process by separating it into streaming and deep reasoning phases, enhancing flexibility and efficiency. Experiments demonstrate that AdaSR improves reasoning accuracy and reduces latency compared to existing methods, making it a significant advancement in adaptive computation for streaming data.'}, 'zh': {'title': '自适应流式推理：动态计算与实时响应的结合', 'desc': '本文提出了一种自适应流式推理框架AdaSR，旨在使模型在输入流中动态分配计算资源并进行推理，同时保持任务性能并减少延迟。传统的大型推理模型通常遵循先读取后思考的模式，而AdaSR允许模型在读取的同时进行推理，适应动态信息流的需求。我们引入了分层相对策略优化（HRPO），将策略优化分解为流式推理和深度推理阶段，从而实现更细粒度的优势分配。实验结果表明，AdaSR在推理准确性、计算效率和流式延迟之间取得了更好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2606.12736', 'title': 'Benchmarking AI Agents for Addressing Scientific Challenges Across Scales', 'url': 'https://huggingface.co/papers/2606.12736', 'abstract': 'Abstract SciAgentArena presents a comprehensive benchmark for evaluating AI agents in real scientific research scenarios, revealing current limitations in novel insight generation and open-ended problem solving while identifying opportunities for improving agent reliability and autonomy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI agents are increasingly being developed to accelerate scientific discovery, yet their practical capabilities in real research settings remain poorly understood. Existing benchmarks for AI agents rarely capture the complexity, heterogeneity, and extended reasoning required by scientific work, whereas benchmarks for scientific tasks often reduce research to static, direct problems and provide limited support for interactive evaluation. Here, we introduce SciAgentArena, a systematic benchmark for evaluating AI agents in real-world scientific research scenarios drawn from emerging needs across multiple domains. SciAgentArena comprises approximately 200 tasks with stepwise verification and an interactive, agent-agnostic environment for assessing diverse AI agents. Using this benchmark, we find that current agents can contribute effectively to well-specified data-analysis workflows, particularly when the task structure and evaluation criteria are clear. However, their performance remains uneven across scientific contexts: agents struggle to generate genuinely novel insights, sustain self-directed exploration, and formulate robust solutions for open-ended research questions. We further characterize common failure modes across agents and identify opportunities for improving their reliability, autonomy, and scientific reasoning. Together, SciAgentArena provides a practical framework for measuring progress in AI agents for science and for guiding the design of future agents capable of addressing complex scientific challenges. Full codes, tasks, and datasets can be accessed via this link: https://sciagentarena.github.io/.', 'score': 0, 'issue_id': 2433, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '108c60ef3389469f', 'authors': ['Tianyu Liu', 'Allen Xin Wang', 'Antonia Panescu', 'Lisa Xinyi Chen', 'Wenxin Long', 'Xinyu Wei', 'Yueqian Jing', 'Ziyao Zeng', 'Jihang Chen', 'Sihan Jiang', 'Ziqing Wang', 'Siyi Gu', 'Siyu Chen', 'Xinyang Hu', 'Haoran Shao', 'Leqi Xu', 'Wangjie Zheng', 'Zhiyuan Cao', 'Ada Fang', 'Botao Yu', 'Kunyang Sun', 'Rex Ying', 'Arman Cohan', 'Qingyu Chen', 'Lingzhou Xue', 'Kaize Ding', 'Yuanqi Du', 'Wengong Jin', 'Zhuoran Yang', 'Marinka Zitnik', 'James Zou', 'Hua Xu', 'Hongyu Zhao'], 'affiliations': ['Broad Institute of MIT and Harvard', 'Harvard University', 'Microsoft Research New England', 'Northeastern University', 'Northwestern University', 'Stanford University', 'The Ohio State University', 'The Pennsylvania State University', 'UC Berkeley', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.12736.jpg', 'data': {'categories': ['#science', '#dataset', '#open_source', '#benchmark', '#reasoning', '#agents'], 'emoji': '🧪', 'ru': {'title': 'Оценка способностей AI-агентов в сложных научных исследованиях', 'desc': 'SciAgentArena — это комплексный бенчмарк для оценки AI-агентов в реальных научных исследованиях, содержащий около 200 задач с пошаговой верификацией. Исследование показывает, что современные агенты хорошо справляются с хорошо структурированными задачами анализа данных, но испытывают значительные трудности с генерацией новых научных идей и решением открытых исследовательских вопросов. Авторы выявили типичные ошибки в поведении агентов и определили направления для улучшения их надёжности, автономности и научного рассуждения. Бенчмарк предоставляет практическую основу для измерения прогресса AI-агентов в науке и разработки более совершенных систем.'}, 'en': {'title': "Unlocking AI's Potential in Scientific Discovery", 'desc': 'SciAgentArena is a new benchmark designed to evaluate AI agents in real scientific research environments. It highlights the current limitations of these agents in generating novel insights and solving open-ended problems. The benchmark includes around 200 tasks that require stepwise verification and allows for interactive evaluation of various AI agents. The findings indicate that while agents perform well in structured data-analysis tasks, they struggle with self-directed exploration and formulating solutions for complex research questions, pointing to areas for improvement in their reliability and autonomy.'}, 'zh': {'title': '评估AI代理在科学研究中的新基准', 'desc': 'SciAgentArena是一个全面的基准测试，用于评估AI代理在真实科学研究场景中的表现。该研究揭示了当前AI代理在生成新见解和解决开放性问题方面的局限性，同时指出了提高代理可靠性和自主性的机会。通过约200个任务和互动环境，SciAgentArena能够系统地评估不同的AI代理在科学研究中的能力。研究发现，尽管现有代理在明确的数据分析工作流程中表现良好，但在生成新见解和应对开放性研究问题时仍然存在困难。'}}}, {'id': 'https://huggingface.co/papers/2606.08670', 'title': 'WaveDiT: Distribution-Aware Wavelet Flow Matching for Efficient 3D Brain MRI Synthesis', 'url': 'https://huggingface.co/papers/2606.08670', 'abstract': 'Abstract WaveDiT generates full-resolution 3D brain MRIs using conditional flow matching in wavelet coefficient space with adaptive precision modeling, enabling efficient synthesis on standard hardware.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large and demographically balanced datasets are essential for reliable neuroimaging biomarkers. Full-resolution 3D brain MRI synthesis can support data augmentation in this setting, but existing approaches either incur prohibitive computational cost at volumetric scale or rely on lossy latent compression that may compromise anatomical detail. As a result, practical 3D generative augmentation often requires specialized compute infrastructure. We propose WaveDiT, a conditional flow matching framework operating in the coefficient space of a 3D Haar Discrete Wavelet Transform. The model combines factorized spatio-depth attention with band-wise heteroscedastic uncertainty modeling derived from higher-order wavelet statistics. Predicted log-variance is integrated directly into both the flow objective and conditioning pathway, enabling adaptive precision consistent with the heavy-tailed and input-dependent variance structure of anatomical detail. This formulation supports full-resolution 3D synthesis under practical memory and time constraints on a single modern GPU. Evaluation on a multi-site cohort demonstrates improved alignment between generated and real MRI distributions, together with enhanced downstream brain age prediction and region-level anatomical agreement relative to diffusion, latent, and wavelet-based baselines. Code is available at https://github.com/sisinflab/WaveDiT', 'score': 0, 'issue_id': 2433, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': 'ea8980a6940a072c', 'authors': ['Danilo Danese', 'Angela Lombardi', 'Giuseppe Fasano', 'Matteo Attimonelli', 'Tommaso Di Noia'], 'affiliations': ['Politecnico di Bari, Italy', 'Sapienza University of Rome, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2606.08670.jpg', 'data': {'categories': ['#3d', '#training', '#synthetic', '#science', '#architecture', '#diffusion', '#open_source', '#healthcare'], 'emoji': '🧠', 'ru': {'title': 'Полнораз решённый синтез МРI мозга через адаптивное flow matching в вейвлет-пространстве', 'desc': 'WaveDiT - это метод условного flow matching для синтеза полноразрешённых трёхмерных МРI снимков мозга, работающий в пространстве коэффициентов вейвлет-преобразования. Модель использует факторизованное пространственно-глубинное внимание и адаптивное моделирование точности через гетероскедастическую неопределённость, вычисляемую из статистики вейвлет-коэффициентов. Предсказываемая дисперсия логарифма встраивается как в целевую функцию flow matching, так и в систему кондиционирования, обеспечивая синтез с высокой эффективностью на обычном GPU. Подход превосходит существующие диффузионные и латентные методы по качеству распределения сгенерированных изображений и их применимости для аугментации данных в нейровизуализации.'}, 'en': {'title': 'Efficient 3D Brain MRI Synthesis with WaveDiT', 'desc': 'WaveDiT is a novel framework that generates high-quality 3D brain MRIs using a technique called conditional flow matching in the wavelet coefficient space. It addresses the challenges of existing methods that either require expensive computational resources or lose important anatomical details due to compression. By utilizing a 3D Haar Discrete Wavelet Transform and incorporating adaptive precision modeling, WaveDiT efficiently synthesizes full-resolution images on standard hardware. The model has shown improved performance in aligning generated MRIs with real data and enhancing brain age predictions, making it a valuable tool for neuroimaging research.'}, 'zh': {'title': 'WaveDiT：高效生成3D脑部MRI的创新方法', 'desc': 'WaveDiT是一种生成全分辨率3D脑部MRI的模型，采用条件流匹配技术在小波系数空间中进行自适应精度建模。这种方法能够在标准硬件上高效合成MRI图像，避免了传统方法在体积规模上的高计算成本。通过结合空间-深度注意力机制和基于高阶小波统计的异方差不确定性建模，WaveDiT能够在实际的内存和时间限制下实现全分辨率合成。评估结果显示，生成的MRI与真实MRI的分布更为一致，并且在脑龄预测和区域级解剖一致性方面优于现有的生成方法。'}}}, {'id': 'https://huggingface.co/papers/2606.02641', 'title': 'CARVE: Certified Affordable Repair of Vetoed Maneuvers via Envelopes for Interactive Driving', 'url': 'https://huggingface.co/papers/2606.02641', 'abstract': "Abstract Interactive driving scenarios reveal failures in autonomous vehicle rule systems where small adjustments could restore feasibility, leading to the introduction of CARVE, a certification framework that provides runtime proofs for multi-agent repairs without requiring predictions of other drivers' compliance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Interactive driving exposes a failure mode that is easy to miss in rule-aware autonomous-driving stacks: a hard-rule margin can be negative for an ego candidate even though a small lawful accommodation by a non-priority agent would restore feasibility. Existing rulebooks, shields, and reachability filters are strong at vetoing unsafe actions, while prediction-based planners model likely responses. Neither returns a runtime proof object that states which bounded multi-agent edit repairs the maneuver, who owns the edit, whether the request is right-of-way affordable, and what ego fallback remains if the request is not observed. We formulate this missing object as *interactive repair certification* and introduce *CARVE*, a prediction-free certificate layer over a finite lattice of ego-owned and agent-owned tactical operators. Agent-owned requests are admissible only inside \\(B_j(s) = β(π_j)α_j^{\\max}(s)\\), a cooperation envelope that separates kinematic reachability from normative priority. The resulting certificate records the binding rule, repair category, repair set, responsibility-weighted cost split, and fallback. On 589 Lanelet2-geometry-grounded INTERACTION replay episodes, CARVE-Greedy accepts 98.64% of initially vetoed maneuvers and recovers 370/378 human-resolved false vetoes, while preserving 589/589 right-of-way respect, zero priority-agent false positives, and 400/400 negative-stress vetoes. We prove certificate soundness, structural right-of-way respect, exact finite-lattice minimality, fallback contingency, and blame-consistency conditions. CARVE does not predict or require another driver's compliance; it certifies whether a proposed interaction is bounded, attributable, and normatively admissible under declared assumptions.", 'score': 0, 'issue_id': 2433, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '9f946aa2600d8aeb', 'authors': ['Yifan Wang'], 'affiliations': ['Department of Mechanical Engineering, McGill University, QC, H3A 2T7, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2606.02641.jpg', 'data': {'categories': ['#robotics', '#agents'], 'emoji': '🚗', 'ru': {'title': 'Безопасное вождение через сертифицированное кооперативное взаимодействие', 'desc': 'В работе представлена CARVE — фреймворк сертификации для автономных транспортных средств, решающий проблему ложных отказов в системах планирования, которые не учитывают возможность небольших законных корректировок поведения других участников движения. Предложенный подход использует решётку тактических операторов и вводит концепцию интерактивной сертификации ремонта маневра, которая не требует предсказания действий других водителей. Каждый сертификат записывает применённое правило, категорию ремонта, множество возможных исправлений, распределение ответственности и стратегию отката, обеспечивая полную прослеживаемость. На наборе данных из 589 реальных сценариев движения CARVE достиг высокой точности, приняв 98,64% ранее отклонённых маневров при полном соблюдении приоритета и правил дорожного движения.'}, 'en': {'title': 'CARVE: Certifying Safe Interactions in Autonomous Driving', 'desc': "The paper introduces CARVE, a certification framework designed to improve the decision-making of autonomous vehicles in interactive driving scenarios. It addresses the limitations of existing systems that rely on predictions of other drivers' behaviors, which can lead to unnecessary vetoes of safe maneuvers. CARVE provides runtime proofs for multi-agent repairs, ensuring that interactions between vehicles are feasible and compliant with traffic rules. The framework has been tested on numerous driving episodes, demonstrating high acceptance rates of previously vetoed maneuvers while maintaining safety and respect for right-of-way rules."}, 'zh': {'title': 'CARVE：自动驾驶的交互修复认证框架', 'desc': '本论文介绍了一种名为CARVE的认证框架，用于在多智能体环境中修复自动驾驶车辆的行为，而无需预测其他驾驶者的反应。CARVE能够提供运行时证明，确保在交互驾驶场景中，即使在规则系统出现失败的情况下，也能恢复可行性。该框架通过定义合作范围，记录绑定规则、修复类别和责任分配等信息，确保自动驾驶系统的安全性和合规性。实验结果显示，CARVE在处理被否决的驾驶行为时表现出色，能够有效恢复大部分人类解决的错误否决。'}}}];

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (11)', '#agi (1)', '#alignment (1)', '#architecture (8)', '#audio (3)', '#benchmark (12)', '#cv (1)', '#data', '#dataset (8)', '#diffusion (4)', '#ethics', '#games', '#graphs (1)', '#hallucinations (2)', '#healthcare (3)', '#inference (2)', '#interpretability', '#leakage (1)', '#long_context (2)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (14)', '#open_source (6)', '#optimization (7)', '#plp (1)', '#rag (1)', '#reasoning (9)', '#rl (5)', '#rlhf (5)', '#robotics (3)', '#science (2)', '#security (2)', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (2)', '#training (17)', '#transfer_learning', '#video (9)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-15 08:50',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-15 08:50')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-15 08:50')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
