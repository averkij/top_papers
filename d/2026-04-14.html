该方法能够有效减少计算开销。研究发现，模型参数的演变并非线性，而是通过低秩子空间的动态变化来实现的。最终，实验结果表明，该方法在保持与多种强化学习算法兼容的同时，计算开销降低了约37.5%。'}}}, {'id': 'https://huggingface.co/papers/2604.10784', 'title': 'TorchUMM: A Unified Multimodal Model Codebase for Evaluation, Analysis, and Post-training', 'url': 'https://huggingface.co/papers/2604.10784', 'abstract': 'Abstract TorchUMM presents a unified codebase for evaluating and analyzing multimodal models across understanding, generation, and editing tasks with standardized protocols and diverse datasets.  AI-generated summary Recent advances in unified multimodal models (UMMs) have led to a proliferation of architectures capable of understanding, generating, and editing across visual and textual modalities. However, developing a unified framework for UMMs remains challenging due to the diversity of model architectures and the heterogeneity of training paradigms and implementation details. In this paper, we present TorchUMM, the first unified codebase for comprehensive evaluation, analysis, and post-training across diverse UMM backbones, tasks, and datasets. TorchUMM supports a broad spectrum of models covering a wide range of scales and design paradigms. Our benchmark encompasses three core task dimensions: multimodal understanding, generation, and editing, and integrates both established and novel datasets to evaluate perception, reasoning, compositionality, and instruction-following abilities. By providing a unified interface and standardized evaluation protocols, TorchUMM enables fair and reproducible comparisons across heterogeneous models and fosters deeper insights into their strengths and limitations, facilitating the development of more capable unified multimodal systems. Code is available at: https://github.com/AIFrontierLab/TorchUMM.', 'score': 2, 'issue_id': 1906, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': 'bd3ab2fe19fcbf81', 'authors': ['Yinyi Luo', 'Wenwen Wang', 'Hayes Bai', 'Hongyu Zhu', 'Hao Chen', 'Pan He', 'Marios Savvides', 'Sharon Li', 'Jindong Wang'], 'affiliations': ['Auburn University', 'Carnegie Mellon University', 'University of Wisconsin-Madison', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2604.10784.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '🔧', 'ru': {'title': 'Единая платформа для оценки мультимодальных моделей', 'desc': 'TorchUMM представляет собой единую кодовую базу для оценки и анализа унифицированных мультимодальных моделей, способных понимать, генерировать и редактировать текстово-визуальный контент. Платформа поддерживает разнообразные архитектуры моделей разного масштаба и применяет стандартизированные протоколы оценки для обеспечения справедливого сравнения. Бенчмарк включает три основные категории задач: мультимодальное понимание, генерацию и редактирование, используя как установленные, так и новые датасеты. Фреймворк позволяет проводить глубокий анализ сильных и слабых сторон моделей, а также облегчает последующее обучение и разработку более способных мультимодальных систем.'}, 'en': {'title': 'Unifying Multimodal Model Evaluation with TorchUMM', 'desc': 'TorchUMM is a comprehensive codebase designed for evaluating and analyzing unified multimodal models (UMMs) that can understand, generate, and edit content across visual and textual formats. It addresses the challenges posed by the variety of model architectures and training methods in the field. The framework includes standardized protocols and a diverse set of datasets to benchmark models on tasks like perception, reasoning, and instruction-following. By offering a unified interface, TorchUMM promotes fair comparisons and deeper insights into the capabilities and limitations of different multimodal systems.'}, 'zh': {'title': '统一多模态模型评估的利器', 'desc': 'TorchUMM是一个统一的代码库，用于评估和分析多模态模型在理解、生成和编辑任务中的表现。该框架解决了多模态模型架构多样性和训练方法异质性带来的挑战。TorchUMM支持多种模型，涵盖不同规模和设计范式，提供标准化的评估协议。通过统一接口，TorchUMM促进了不同模型之间的公平比较，帮助研究人员深入理解模型的优缺点。'}}}, {'id': 'https://huggingface.co/papers/2604.08921', 'title': 'TAIHRI: Task-Aware 3D Human Keypoints Localization for Close-Range Human-Robot Interaction', 'url': 'https://huggingface.co/papers/2604.08921', 'abstract': "Abstract TAIHRI is a vision-language model designed for egocentric human-robot interaction that enables precise 3D keypoint localization through 2D keypoint reasoning and next token prediction.  AI-generated summary Accurate 3D human keypoints localization is a critical technology enabling robots to achieve natural and safe physical interaction with users. Conventional 3D human keypoints estimation methods primarily focus on the whole-body reconstruction quality relative to the root joint. However, in practical human-robot interaction (HRI) scenarios, robots are more concerned with the precise metric-scale spatial localization of task-relevant body parts under the egocentric camera 3D coordinate. We propose TAIHRI, the first Vision-Language Model (VLM) tailored for close-range HRI perception, capable of understanding users' motion commands and directing the robot's attention to the most task-relevant keypoints. By quantizing 3D keypoints into a finite interaction space, TAIHRI precisely localize the 3D spatial coordinates of critical body parts by 2D keypoint reasoning via next token prediction, and seamlessly adapt to downstream tasks such as natural language control or global space human mesh recovery. Experiments on egocentric interaction benchmarks demonstrate that TAIHRI achieves superior estimation accuracy for task-critical body parts. We believe TAIHRI opens new research avenues in the field of embodied human-robot interaction. Code is available at: https://github.com/Tencent/TAIHRI.", 'score': 2, 'issue_id': 1906, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'ea63b41be91bf064', 'authors': ['Ao Li', 'Yonggen Ling', 'Yiyang Lin', 'Yuji Wang', 'Yong Deng', 'Yansong Tang'], 'affiliations': ['Futian Laboratory', 'Tencent Robotics', 'Tsinghua Shenzhen International Graduate School'], 'pdf_title_img': 'assets/pdf/title_img/2604.08921.jpg', 'data': {'categories': ['#3d', '#open_source', '#cv', '#multimodal', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Видение робота через глаза: точная локализация человеческих суставов для безопасного взаимодействия', 'desc': 'TAIHRI — это видео-языковая модель, специально разработанная для эгоцентрического взаимодействия человека и робота. Модель локализует 3D ключевые точки человеческого тела через анализ 2D ключевых точек и предсказание следующего токена. В отличие от традиционных методов реконструкции всего тела, TAIHRI сосредоточена на точной метрической локализации релевантных для конкретной задачи частей тела в 3D пространстве эгоцентрической камеры. Модель способна понимать команды на естественном языке и направлять внимание робота на наиболее важные суставы для безопасного и естественного физического взаимодействия.'}, 'en': {'title': 'TAIHRI: Precision in Human-Robot Interaction through Vision-Language Modeling', 'desc': 'TAIHRI is a vision-language model specifically designed for improving human-robot interaction by accurately localizing 3D keypoints of human bodies. Unlike traditional methods that focus on whole-body reconstruction, TAIHRI emphasizes the precise spatial localization of important body parts from an egocentric perspective. It utilizes 2D keypoint reasoning and next token prediction to achieve this, allowing robots to better understand user commands and focus on relevant actions. The model has shown superior performance in estimating critical body parts, paving the way for advancements in embodied human-robot interaction.'}, 'zh': {'title': 'TAIHRI：精准的人机交互关键点定位模型', 'desc': 'TAIHRI是一种视觉-语言模型，专为自我中心的人机交互设计，能够通过2D关键点推理和下一个标记预测实现精确的3D关键点定位。该模型关注于任务相关的身体部位在3D坐标系中的精确空间定位，而不仅仅是整体身体重建的质量。TAIHRI通过量化3D关键点到有限的交互空间，能够理解用户的运动指令，并引导机器人关注最相关的关键点。实验结果表明，TAIHRI在任务关键身体部位的估计精度上表现优越，推动了人机交互领域的新研究方向。'}}}, {'id': 'https://huggingface.co/papers/2604.11716', 'title': 'SWE-AGILE: A Software Agent Framework for Efficiently Managing Dynamic Reasoning Context', 'url': 'https://huggingface.co/papers/2604.11716', 'abstract': "Abstract SWE-AGILE addresses reasoning limitations in software engineering by using dynamic context management to balance detailed analysis with computational efficiency.  AI-generated summary Prior representative ReAct-style approaches in autonomous Software Engineering (SWE) typically lack the explicit System-2 reasoning required for deep analysis and handling complex edge cases. While recent reasoning models demonstrate the potential of extended Chain-of-Thought (CoT), applying them to the multi-turn SWE task creates a fundamental dilemma: retaining full reasoning history leads to context explosion and ``Lost-in-the-Middle'' degradation, while discarding it would force the agent to redundantly re-reason at every step. To address these challenges, we propose SWE-AGILE, a novel software agent framework designed to bridge the gap between reasoning depth, efficiency, and context constraints. SWE-AGILE introduces a Dynamic Reasoning Context strategy, maintaining a ``sliding window'' of detailed reasoning for immediate continuity to prevent redundant re-analyzing, while compressing historical reasoning content into concise Reasoning Digests. Empirically, SWE-AGILE sets a new standard for 7B-8B models on SWE-Bench-Verified using only 2.2k trajectories and 896 tasks. Code is available at https://github.com/KDEGroup/SWE-AGILE.", 'score': 1, 'issue_id': 1907, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'e8343836c5455de1', 'authors': ['Shuquan Lian', 'Juncheng Liu', 'Yazhe Chen', 'Yuhong Chen', 'Hui Li'], 'affiliations': ['Key Laboratory of Multimedia Trusted Perception and Efficient Computing Ministry of Education of China, Xiamen University', 'Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.11716.jpg', 'data': {'categories': ['#small_models', '#reasoning', '#open_source', '#long_context', '#training', '#plp', '#agents'], 'emoji': '⚙️', 'ru': {'title': 'Умная память для агента: скользящее окно рассуждений вместо взрыва контекста', 'desc': 'Работа представляет SWE-AGILE — новый фреймворк для автономных агентов в инженерии ПО, который решает проблему балансировки между глубиной рассуждений и эффективностью использования контекста. Авторы вводят Dynamic Reasoning Context strategy, которая поддерживает скользящее окно детальных рассуждений для непрерывности анализа, одновременно сжимая исторические рассуждения в краткие Reasoning Digests. Подход преодолевает классическую дилемму: сохранение полной истории приводит к взрыву контекста и деградации качества, а её отбрасывание вызывает избыточные повторные анализы. SWE-AGILE достигает новых результатов на бенчмарке SWE-Bench-Verified для моделей размером 7B-8B, используя лишь 2.2k траекторий и 896 задач.'}, 'en': {'title': 'Balancing Depth and Efficiency in Software Engineering Reasoning', 'desc': "SWE-AGILE is a new framework designed to improve reasoning in software engineering tasks by managing context dynamically. It addresses the limitations of previous approaches that struggle with deep analysis and complex scenarios due to context overload. By using a 'sliding window' method, SWE-AGILE keeps relevant reasoning details accessible while summarizing older information into concise digests. This approach enhances both the depth of reasoning and computational efficiency, achieving impressive results on benchmark tasks with fewer resources."}, 'zh': {'title': 'SWE-AGILE：平衡推理深度与效率的创新框架', 'desc': 'SWE-AGILE 是一种新型的软件代理框架，旨在解决软件工程中的推理限制。它通过动态上下文管理，平衡详细分析与计算效率。该框架引入了动态推理上下文策略，保持详细推理的“滑动窗口”，以防止冗余的重新分析，同时将历史推理内容压缩为简洁的推理摘要。实验结果表明，SWE-AGILE 在 SWE-Bench-Verified 上为 7B-8B 模型设定了新的标准。'}}}, {'id': 'https://huggingface.co/papers/2604.11521', 'title': 'Continuous Adversarial Flow Models', 'url': 'https://huggingface.co/papers/2604.11521', 'abstract': 'Abstract Continuous adversarial flow models improve image generation by using an adversarial objective with a learned discriminator to better align samples with target distributions, achieving superior results on ImageNet and text-to-image tasks.  AI-generated summary We propose continuous adversarial flow models, a type of continuous-time flow model trained with an adversarial objective. Unlike flow matching, which uses a fixed mean-squared-error criterion, our approach introduces a learned discriminator to guide training. This change in objective induces a different generalized distribution, which empirically produces samples that are better aligned with the target data distribution. Our method is primarily proposed for post-training existing flow-matching models, although it can also train models from scratch. On the ImageNet 256px generation task, our post-training substantially improves the guidance-free FID of latent-space SiT from 8.26 to 3.63 and of pixel-space JiT from 7.17 to 3.57. It also improves guided generation, reducing FID from 2.06 to 1.53 for SiT and from 1.86 to 1.80 for JiT. We further evaluate our approach on text-to-image generation, where it achieves improved results on both the GenEval and DPG benchmarks.', 'score': 1, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'a8d9133cbde367e6', 'authors': ['Shanchuan Lin', 'Ceyuan Yang', 'Zhijie Lin', 'Hao Chen', 'Haoqi Fan'], 'affiliations': ['Bytedance'], 'pdf_title_img': 'assets/pdf/title_img/2604.11521.jpg', 'data': {'categories': ['#training', '#benchmark', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Противоположные потоки для совершенной генерации изображений', 'desc': 'В статье предлагается метод непрерывных противоположных потоков (continuous adversarial flow models) — модель потоков в непрерывном времени, обученная с использованием антагонистической целевой функции. В отличие от классического flow matching, который использует фиксированный критерий среднеквадратичной ошибки, новый подход вводит обучаемый дискриминатор для управления процессом обучения. Измененная целевая функция индуцирует иное распределение, что эмпирически дает образцы, лучше согласованные с целевым распределением данных. Метод демонстрирует значительные улучшения в генерации изображений на ImageNet и в синтезе изображений по текстовым описаниям.'}, 'en': {'title': 'Enhancing Image Generation with Continuous Adversarial Flow Models', 'desc': 'This paper introduces continuous adversarial flow models, which enhance image generation by integrating an adversarial training objective with a learned discriminator. This method differs from traditional flow matching by not relying solely on mean-squared-error, allowing for better alignment of generated samples with the target data distribution. The proposed approach shows significant improvements in performance metrics, such as the Fréchet Inception Distance (FID), on tasks like ImageNet generation and text-to-image synthesis. Additionally, it can be applied to existing flow-matching models for post-training or used to train new models from scratch.'}, 'zh': {'title': '提升图像生成的对抗流模型', 'desc': '本文提出了一种连续对抗流模型，通过引入学习到的判别器来优化图像生成。与传统的流匹配方法不同，我们的方法使用对抗目标来指导训练，从而更好地对齐样本与目标分布。实验结果表明，该方法在ImageNet和文本到图像生成任务中表现优越，显著降低了FID指标。我们的模型可以在现有流匹配模型的基础上进行后训练，也可以从头开始训练。'}}}, {'id': 'https://huggingface.co/papers/2604.11491', 'title': 'ADD for Multi-Bit Image Watermarking', 'url': 'https://huggingface.co/papers/2604.11491', 'abstract': 'Abstract ADD is a multi-bit image watermarking method that uses linear combination and inner product operations for embedding and decoding, achieving high accuracy and efficiency compared to existing approaches.  AI-generated summary As generative models enable rapid creation of high-fidelity images, societal concerns about misinformation and authenticity have intensified. A promising remedy is multi-bit image watermarking, which embeds a multi-bit message into an image so that a verifier can later detect whether the image is generated by someone and further identify the source by decoding the embedded message. Existing approaches often fall short in capacity, resilience to common image distortions, and theoretical justification. To address these limitations, we propose ADD (Add, Dot, Decode), a multi-bit image watermarking method with two stages: learning a watermark to be linearly combined with the multi-bit message and added to the image, and decoding through inner products between the watermarked image and the learned watermark. On the standard MS-COCO benchmark, we demonstrate that for the challenging task of 48-bit watermarking, ADD achieves 100\\% decoding accuracy, with performance dropping by at most 2\\% under a wide range of image distortions, substantially smaller than the 14\\% average drop of state-of-the-art methods. In addition, ADD achieves substantial computational gains, with 2-fold faster embedding and 7.4-fold faster decoding than the fastest existing method. We further provide a theoretical analysis explaining why the learned watermark and the corresponding decoding rule are effective.', 'score': 1, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '17cf2b75caed945f', 'authors': ['An Luo', 'Jie Ding'], 'affiliations': ['School of Statistics, University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2604.11491.jpg', 'data': {'categories': ['#benchmark', '#cv'], 'emoji': '🔐', 'ru': {'title': 'Быстрый и надежный многобитный водяной знак через линейные операции', 'desc': 'ADD — это метод многобитного водяного знака для изображений, который использует линейные комбинации и операции внутреннего произведения для встраивания и декодирования информации. Метод решает проблему аутентификации изображений, созданных генеративными моделями, встраивая многобитное сообщение, которое может быть позже извлечено и декодировано. На стандартном наборе данных MS-COCO ADD демонстрирует 100% точность декодирования для сложной задачи 48-битного водяного знака с минимальной деградацией (до 2%) при различных искажениях изображения. Кроме того, метод обеспечивает значительное ускорение вычислений: встраивание в 2 раза и декодирование в 7.4 раза быстрее, чем существующие подходы.'}, 'en': {'title': 'ADD: Revolutionizing Image Watermarking with Precision and Speed', 'desc': 'The paper presents ADD, a novel multi-bit image watermarking technique that enhances the embedding and decoding processes using linear combinations and inner product operations. This method allows for the embedding of a multi-bit message into images, enabling verification of authenticity and source identification. ADD demonstrates superior performance on the MS-COCO benchmark, achieving 100% decoding accuracy for 48-bit watermarking while maintaining resilience against image distortions. Additionally, it offers significant computational improvements, being faster in both embedding and decoding compared to existing methods.'}, 'zh': {'title': 'ADD：高效的多比特图像水印方法', 'desc': 'ADD是一种多比特图像水印方法，通过线性组合和内积操作实现嵌入和解码。与现有方法相比，ADD在准确性和效率上表现优异，特别是在48比特水印的挑战任务中，解码准确率达到100%。该方法在面对各种图像失真时，性能下降最多仅为2%，远低于现有最先进方法的14%平均下降。ADD还在计算效率上取得显著提升，嵌入速度提高了2倍，解码速度提高了7.4倍。'}}}, {'id': 'https://huggingface.co/papers/2604.10718', 'title': 'SciPredict: Can LLMs Predict the Outcomes of Scientific Experiments in Natural Sciences?', 'url': 'https://huggingface.co/papers/2604.10718', 'abstract': 'Abstract SciPredict benchmark reveals that large language models struggle to accurately predict scientific experiment outcomes and cannot reliably assess prediction confidence, unlike human experts who show better calibration and performance when experiments are deemed predictable.  AI-generated summary Accelerating scientific discovery requires the identification of which experiments would yield the best outcomes before committing resources to costly physical validation. While existing benchmarks evaluate LLMs on scientific knowledge and reasoning, their ability to predict experimental outcomes - a task where AI could significantly exceed human capabilities - remains largely underexplored. We introduce SciPredict, a benchmark comprising 405 tasks derived from recent empirical studies in 33 specialized sub-fields of physics, biology, and chemistry. SciPredict addresses two critical questions: (a) can LLMs predict the outcome of scientific experiments with sufficient accuracy? and (b) can such predictions be reliably used in the scientific research process? Evaluations reveal fundamental limitations on both fronts. Model accuracies are 14-26% and human expert performance is approx20%. Although some frontier models exceed human performance model accuracy is still far below what would enable reliable experimental guidance. Even within the limited performance, models fail to distinguish reliable predictions from unreliable ones, achieving only approx20% accuracy regardless of their confidence or whether they judge outcomes as predictable without physical experimentation. Human experts, in contrast, demonstrate strong calibration: their accuracy increases from approx5% to approx80% as they deem outcomes more predictable without conducting the experiment. SciPredict establishes a rigorous framework demonstrating that superhuman performance in experimental science requires not just better predictions, but better awareness of prediction reliability. For reproducibility all our data and code are provided at https://github.com/scaleapi/scipredict', 'score': 1, 'issue_id': 1906, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '0fd93adca7e62d3b', 'authors': ['Udari Madhushani Sehwag', 'Elaine Lau', 'Haniyeh Ehsani Oskouie', 'Shayan Shabihi', 'Erich Liang', 'Andrea Toledo', 'Guillermo Mangialardi', 'Sergio Fonrouge', 'Ed-Yeremai Hernandez Cardona', 'Paula Vergara', 'Utkarsh Tyagi', 'Chen Bo Calvin Zhang', 'Pavi Bhatter', 'Nicholas Johnson', 'Furong Huang', 'Ernesto Gabriel Hernandez Montoya', 'Bing Liu'], 'affiliations': ['Human Frontier Collective', 'Princeton University', 'Scale AI', 'University of California, Los Angeles', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2604.10718.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'LLM не готовы предсказывать научные эксперименты: нужна не только точность, но и самосознание модели', 'desc': 'В статье представлен бенчмарк SciPredict, содержащий 405 задач из физики, биологии и химии, для оценки способности больших языковых моделей предсказывать результаты научных экспериментов. Исследование показало, что точность моделей составляет только 14-26%, что недостаточно для надёжного использования в научном процессе, хотя некоторые фронтирные модели немного превосходят человеческих экспертов (≈20% точности). Критическая проблема заключается в том, что LLM не способны правильно оценивать уверенность в своих предсказаниях и различать надёжные прогнозы от ненадёжных, достигая лишь ≈20% точности при калибровке. В отличие от моделей, человеческие эксперты демонстрируют отличную калибровку, увеличивая точность с ≈5% до ≈80% в зависимости от того, считают ли они результат предсказуемым без проведения эксперимента.'}, 'en': {'title': 'Unlocking Scientific Discovery: Bridging AI Predictions and Human Expertise', 'desc': 'The SciPredict benchmark evaluates the ability of large language models (LLMs) to predict outcomes of scientific experiments. It reveals that LLMs struggle with accuracy and confidence assessment, performing significantly worse than human experts. While some advanced models show improved performance, they still fall short of providing reliable guidance for experimental decisions. The study emphasizes that achieving superhuman performance in scientific prediction requires not only accurate outcomes but also a better understanding of the reliability of those predictions.'}, 'zh': {'title': '科学实验预测的挑战与机遇', 'desc': 'SciPredict基准测试揭示了大型语言模型在准确预测科学实验结果方面的不足，并且无法可靠地评估预测的可信度。与人类专家相比，AI模型在可预测的实验中表现较差，专家的准确性和表现更为优越。该研究引入了SciPredict基准，包含来自33个专业子领域的405个任务，旨在评估LLMs在科学实验结果预测中的能力。结果显示，尽管一些前沿模型的表现超过人类，但整体准确性仍远低于可靠的实验指导所需的水平。'}}}, {'id': 'https://huggingface.co/papers/2604.09212', 'title': 'SPASM: Stable Persona-driven Agent Simulation for Multi-turn Dialogue Generation', 'url': 'https://huggingface.co/papers/2604.09212', 'abstract': 'Abstract A modular framework called SPASM is presented for generating stable multi-turn dialogues with consistent personas, addressing issues like persona drift and echoing through a perspective-agnostic context projection method.  AI-generated summary Large language models are increasingly deployed in multi-turn settings such as tutoring, support, and counseling, where reliability depends on preserving consistent roles, personas, and goals across long horizons. This requirement becomes critical when LLMs are used to generate synthetic dialogues for training and evaluation, since LLM--LLM conversations can accumulate identity-related failures such as persona drift, role confusion, and "echoing", where one agent gradually mirrors its partner. We introduce SPASM (Stable Persona-driven Agent Simulation for Multi-turn dialogue generation), a modular, stability-first framework that decomposes simulation into (i) persona creation via schema sampling, plausibility validation, and natural-language persona crafting, (ii) Client--Responder dialogue generation, and (iii) termination detection for coherent stopping. To improve long-horizon stability without changing model weights, we propose Egocentric Context Projection (ECP): dialogue history is stored in a perspective-agnostic representation and deterministically projected into each agent\'s egocentric view before generation. Across three LLM backbones (GPT-4o-mini, DeepSeek-V3.2, Qwen-Plus) and nine Client--Responder pairings, we construct a dataset of 4,500 personas and 45,000 conversations (500 personas X 10 conversations per pairing). Ablations show ECP substantially reduces persona drift and, under human validation, eliminates echoing; embedding analyses recover persona structure and reveal strong responder-driven interaction geometry. Our code is available at https://github.com/lhannnn/SPASM.', 'score': 0, 'issue_id': 1906, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '73e35da4102cb01d', 'authors': ['Han Luo', 'Guy Laban'], 'affiliations': ['Ben-Gurion University of the Negev', 'Southwest Jiaotong University', 'University of Leeds'], 'pdf_title_img': 'assets/pdf/title_img/2604.09212.jpg', 'data': {'categories': ['#synthetic', '#open_source', '#long_context'], 'emoji': '🎭', 'ru': {'title': 'Сохранение персоны: стабильная генерация диалогов без дрейфа идентичности', 'desc': 'В работе предложена модульная архитектура SPASM для генерации стабильных многоходовых диалогов с сохранением консистентности персонажей. Основная проблема заключается в том, что языковые модели при длительном взаимодействии страдают от дрейфа персоны, путаницы ролей и эхо-эффекта, когда один агент начинает копировать другого. Решение основано на методе эгоцентрической проекции контекста (ECP), который хранит историю диалога в перспективно-независимом формате и детерминированно преобразует её в локальное представление каждого агента перед генерацией. Авторы провели обширные эксперименты на трёх LLM-бэкбонах с созданием датасета из 45,000 диалогов и показали, что ECP значительно снижает дрейф персоны и полностью устраняет эхо-эффект.'}, 'en': {'title': 'SPASM: Ensuring Stable Personas in Multi-Turn Dialogues', 'desc': 'The paper introduces SPASM, a framework designed to create stable multi-turn dialogues while maintaining consistent personas. It addresses common issues in dialogue generation, such as persona drift and echoing, by using a method called Egocentric Context Projection (ECP) that helps keep the dialogue focused and coherent. SPASM breaks down the dialogue generation process into three main components: persona creation, dialogue generation, and termination detection. The framework has been tested with various large language models and shows significant improvements in maintaining persona consistency across conversations.'}, 'zh': {'title': '稳定多轮对话生成的解决方案', 'desc': '本文提出了一种名为SPASM的模块化框架，用于生成稳定的多轮对话并保持一致的人物特征。该框架通过一种与视角无关的上下文投影方法，解决了人物漂移和回声等问题。SPASM将对话模拟分解为人物创建、客户-响应者对话生成和终止检测三个部分，以确保对话的连贯性。通过引入自我中心上下文投影（ECP），该方法在不改变模型权重的情况下，显著提高了长时间对话的稳定性。'}}}];

                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-14 06:28',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-14 06:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-14 06:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
