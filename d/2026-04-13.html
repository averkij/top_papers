    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.08626', 'title': 'WildDet3D: Scaling Promptable 3D Detection in the Wild', 'url': 'https://huggingface.co/papers/2604.08626', 'abstract': 'Abstract A unified 3D object detection framework with a large-scale dataset enables open-world detection with multiple prompt types and geometric cue integration.  AI-generated summary Understanding objects in 3D from a single image is a cornerstone of spatial intelligence. A key step toward this goal is monocular 3D object detection--recovering the extent, location, and orientation of objects from an input RGB image. To be practical in the open world, such a detector must generalize beyond closed-set categories, support diverse prompt modalities, and leverage geometric cues when available. Progress is hampered by two bottlenecks: existing methods are designed for a single prompt type and lack a mechanism to incorporate additional geometric cues, and current 3D datasets cover only narrow categories in controlled environments, limiting open-world transfer. In this work we address both gaps. First, we introduce WildDet3D, a unified geometry-aware architecture that natively accepts text, point, and box prompts and can incorporate auxiliary depth signals at inference time. Second, we present WildDet3D-Data, the largest open 3D detection dataset to date, constructed by generating candidate 3D boxes from existing 2D annotations and retaining only human-verified ones, yielding over 1M images across 13.5K categories in diverse real-world scenes. WildDet3D establishes a new state-of-the-art across multiple benchmarks and settings. In the open-world setting, it achieves 22.6/24.8 AP3D on our newly introduced WildDet3D-Bench with text and box prompts. On Omni3D, it reaches 34.2/36.4 AP3D with text and box prompts, respectively. In zero-shot evaluation, it achieves 40.3/48.9 ODS on Argoverse 2 and ScanNet. Notably, incorporating depth cues at inference time yields substantial additional gains (+20.7 AP on average across settings).', 'score': 188, 'issue_id': 1892, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '11909fa71ef190ba', 'authors': ['Weikai Huang', 'Jieyu Zhang', 'Sijun Li', 'Taoyang Jia', 'Jiafei Duan', 'Yunqian Cheng', 'Jaemin Cho', 'Mattew Wallingford', 'Rustin Soraki', 'Chris Dongjoo Kim', 'Donovan Clay', 'Taira Anderson', 'Winson Han', 'Ali Farhadi', 'Bharath Hariharan', 'Zhongzheng Ren', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Cornell University', 'Johns Hopkins University', 'UNC-Chapel Hill', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.08626.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#3d', '#dataset'], 'emoji': '📦', 'ru': {'title': 'Универсальная 3D детекция объектов в открытом мире с поддержкой множественных типов подсказок', 'desc': 'Статья представляет WildDet3D - объединённую архитектуру для детекции трёхмерных объектов с одного изображения, которая поддерживает различные типы подсказок (текст, точки, ограничивающие боксы) и может использовать дополнительные геометрические сигналы, такие как карты глубины. Авторы создали WildDet3D-Data - крупнейший датасет для открытого мира с более чем 1 миллионом изображений и 13,5 тысячами категорий объектов, полученный путём генерации кандидатов на основе двумерных аннотаций с последующей человеческой верификацией. Модель достигает новых результатов на нескольких бенчмарках, включая значительные улучшения при использовании информации о глубине на этапе инференса. Подход решает ключевые проблемы обобщения детекторов на открытый мир, поддержки различных модальностей ввода и интеграции геометрических подсказок.'}, 'en': {'title': 'Revolutionizing 3D Object Detection with WildDet3D', 'desc': "This paper presents WildDet3D, a novel framework for monocular 3D object detection that integrates various prompt types and geometric cues. It addresses the limitations of existing methods by allowing the use of text, point, and box prompts while incorporating depth information during inference. Additionally, the authors introduce WildDet3D-Data, a comprehensive dataset with over 1 million images across 13.5K categories, enhancing the model's ability to generalize in open-world scenarios. The results demonstrate significant improvements in detection performance, establishing new benchmarks in the field."}, 'zh': {'title': '统一的3D物体检测框架，开启开放世界的可能性', 'desc': '本文提出了一种统一的3D物体检测框架，旨在实现开放世界的检测。该框架WildDet3D能够处理多种提示类型，并在推理时整合几何线索。我们还构建了WildDet3D-Data，这是迄今为止最大的开放3D检测数据集，包含超过100万张图像和13500个类别。通过这些创新，WildDet3D在多个基准测试中设立了新的最先进水平，特别是在开放世界设置中表现优异。'}}}, {'id': 'https://huggingface.co/papers/2604.07413', 'title': 'FORGE:Fine-grained Multimodal Evaluation for Manufacturing Scenarios', 'url': 'https://huggingface.co/papers/2604.07413', 'abstract': 'Abstract FORGE introduces a high-quality multimodal manufacturing dataset with fine-grained domain semantics to evaluate MLLMs on real-world tasks, revealing that domain-specific knowledge rather than visual grounding limits performance, and demonstrating that supervised fine-tuning on structured annotations significantly improves accuracy.  AI-generated summary The manufacturing sector is increasingly adopting Multimodal Large Language Models (MLLMs) to transition from simple perception to autonomous execution, yet current evaluations fail to reflect the rigorous demands of real-world manufacturing environments. Progress is hindered by data scarcity and a lack of fine-grained domain semantics in existing datasets. To bridge this gap, we introduce FORGE. Wefirst construct a high-quality multimodal dataset that combines real-world 2D images and 3D point clouds, annotated with fine-grained domain semantics (e.g., exact model numbers). We then evaluate 18 state-of-the-art MLLMs across three manufacturing tasks, namely workpiece verification, structural surface inspection, and assembly verification, revealing significant performance gaps. Counter to conventional understanding, the bottleneck analysis shows that visual grounding is not the primary limiting factor. Instead, insufficient domain-specific knowledge is the key bottleneck, setting a clear direction for future research. Beyond evaluation, we show that our structured annotations can serve as an actionable training resource: supervised fine-tuning of a compact 3B-parameter model on our data yields up to 90.8% relative improvement in accuracy on held-out manufacturing scenarios, providing preliminary evidence for a practical pathway toward domain-adapted manufacturing MLLMs. The code and datasets are available at https://ai4manufacturing.github.io/forge-web.', 'score': 82, 'issue_id': 1892, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '7f13dab98c57d627', 'authors': ['Xiangru Jian', 'Hao Xu', 'Wei Pang', 'Xinjian Zhao', 'Chengyu Tao', 'Qixin Zhang', 'Xikun Zhang', 'Chao Zhang', 'Guanzhi Deng', 'Alex Xue', 'Juan Du', 'Tianshu Yu', 'Garth Tarr', 'Linqi Song', 'Qiuzhuang Sun', 'Dacheng Tao'], 'affiliations': ['City University of Hong Kong', 'City University of Hong Kong Shenzhen Research Institute', 'Hunan University', 'Nanyang Technological University', 'Royal Melbourne Institute of Technology', 'Singapore Management University', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology (Guangzhou)', 'University of Sydney', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.07413.jpg', 'data': {'categories': ['#training', '#benchmark', '#multimodal', '#small_models', '#3d', '#dataset', '#science', '#open_source'], 'emoji': '🏭', 'ru': {'title': 'Специализированные знания важнее зрения: адаптация MLLM для производства через структурированные данные', 'desc': 'FORGE представляет многомодальный датасет высокого качества с детальной семантикой, специфичной для производства, предназначенный для оценки мультимодальных больших языковых моделей на реальных задачах. Исследование показало, что основным ограничивающим фактором производительности является недостаток специализированного знания предметной области, а не качество визуального понимания. Авторы продемонстрировали, что структурированная аннотация данных может служить эффективным ресурсом для обучения: дообучение компактной модели на этих данных привело к улучшению точности на 90.8% относительно базовой модели. Работа открывает практический путь к развитию адаптированных для производства MLLM и предоставляет код и датасеты для дальнейших исследований.'}, 'en': {'title': 'Bridging the Knowledge Gap in Manufacturing MLLMs with FORGE', 'desc': 'The paper introduces FORGE, a new multimodal dataset designed for evaluating Multimodal Large Language Models (MLLMs) in manufacturing tasks. It highlights that the main challenge in improving MLLM performance is not visual grounding, but rather the lack of domain-specific knowledge. The dataset includes detailed annotations and combines 2D images with 3D point clouds to provide fine-grained semantics. Additionally, the study shows that fine-tuning MLLMs on this structured data can significantly enhance their accuracy in real-world manufacturing applications.'}, 'zh': {'title': '提升制造业智能的关键在于领域知识', 'desc': 'FORGE是一个高质量的多模态制造数据集，旨在评估多模态大语言模型（MLLMs）在真实制造任务中的表现。研究表明，性能的限制主要来自于领域特定知识的不足，而非视觉基础的限制。通过对18个最先进的MLLM进行评估，发现它们在工作件验证、结构表面检查和装配验证等任务中存在显著的性能差距。进一步的监督微调实验显示，利用结构化注释进行训练可以显著提高模型的准确性，提供了向领域适应的制造MLLMs迈进的实用路径。'}}}, {'id': 'https://huggingface.co/papers/2604.06870', 'title': 'RefineAnything: Multimodal Region-Specific Refinement for Perfect Local Details', 'url': 'https://huggingface.co/papers/2604.06870', 'abstract': 'Abstract A multimodal diffusion-based model called RefineAnything is presented for region-specific image refinement that preserves backgrounds while enhancing local details, using a focus-and-refine strategy and boundary-aware loss functions.  AI-generated summary We introduce region-specific image refinement as a dedicated problem setting: given an input image and a user-specified region (e.g., a scribble mask or a bounding box), the goal is to restore fine-grained details while keeping all non-edited pixels strictly unchanged. Despite rapid progress in image generation, modern models still frequently suffer from local detail collapse (e.g., distorted text, logos, and thin structures). Existing instruction-driven editing models emphasize coarse-grained semantic edits and often either overlook subtle local defects or inadvertently change the background, especially when the region of interest occupies only a small portion of a fixed-resolution input. We present RefineAnything, a multimodal diffusion-based refinement model that supports both reference-based and reference-free refinement. Building on a counter-intuitive observation that crop-and-resize can substantially improve local reconstruction under a fixed VAE input resolution, we propose Focus-and-Refine, a region-focused refinement-and-paste-back strategy that improves refinement effectiveness and efficiency by reallocating the resolution budget to the target region, while a blended-mask paste-back guarantees strict background preservation. We further introduce a boundary-aware Boundary Consistency Loss to reduce seam artifacts and improve paste-back naturalness. To support this new setting, we construct Refine-30K (20K reference-based and 10K reference-free samples) and introduce RefineEval, a benchmark that evaluates both edited-region fidelity and background consistency. On RefineEval, RefineAnything achieves strong improvements over competitive baselines and near-perfect background preservation, establishing a practical solution for high-precision local refinement. Project Page: https://limuloo.github.io/RefineAnything/.', 'score': 35, 'issue_id': 1891, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '631c101f0b777eaa', 'authors': ['Dewei Zhou', 'You Li', 'Zongxin Yang', 'Yi Yang'], 'affiliations': ['DBMI, HMS, Harvard University', 'RELER, CCAI, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.06870.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#dataset', '#open_source', '#benchmark', '#cv'], 'emoji': '🎯', 'ru': {'title': 'Умное уточнение деталей изображения с гарантированным сохранением фона', 'desc': 'Представлена RefineAnything — мультимодальная модель на основе диффузии для локального улучшения изображений с сохранением фона. Ключевой инновацией является стратегия Focus-and-Refine, которая перераспределяет разрешение в пользу целевой области через кропирование и ресайзинг, что значительно улучшает реконструкцию деталей. Модель поддерживает как reference-based, так и reference-free режимы уточнения, а специальная Boundary Consistency Loss уменьшает артефакты на границах при вставке обработанной области обратно. Для оценки качества авторы создали датасет Refine-30K и бенчмарк RefineEval, демонстрирующие превосходство метода в точном локальном улучшении при почти идеальном сохранении фона.'}, 'en': {'title': 'RefineAnything: Precision in Image Refinement with Background Preservation', 'desc': 'RefineAnything is a multimodal diffusion-based model designed for region-specific image refinement, focusing on enhancing local details while keeping the background intact. It introduces a focus-and-refine strategy that reallocates resolution to the specified region, improving the quality of local detail restoration. The model employs a boundary-aware loss function to minimize artifacts at the edges of the edited area, ensuring a seamless integration with the original background. With the creation of the Refine-30K dataset and the RefineEval benchmark, RefineAnything demonstrates significant advancements in maintaining fidelity in edited regions and background consistency compared to existing models.'}, 'zh': {'title': '区域特定图像细化的新突破', 'desc': '本文提出了一种名为RefineAnything的多模态扩散模型，用于区域特定的图像细化。该模型采用聚焦与细化策略，利用边界感知损失函数，在增强局部细节的同时保持背景不变。尽管图像生成技术迅速发展，但现代模型仍常常面临局部细节崩溃的问题。RefineAnything通过区域聚焦的细化策略和严格的背景保护，提供了一种高精度的局部细化解决方案。'}}}, {'id': 'https://huggingface.co/papers/2604.08644', 'title': 'EXAONE 4.5 Technical Report', 'url': 'https://huggingface.co/papers/2604.08644', 'abstract': "Abstract EXAONE 4.5 is an open-weight vision language model that integrates a visual encoder into EXAONE 4.0, achieving enhanced document understanding and general language capabilities through targeted data curation and extended context length.  AI-generated summary This technical report introduces EXAONE 4.5, the first open-weight vision language model released by LG AI Research. EXAONE 4.5 is architected by integrating a dedicated visual encoder into the existing EXAONE 4.0 framework, enabling native multimodal pretraining over both visual and textual modalities. The model is trained on large-scale data with careful curation, particularly emphasizing document-centric corpora that align with LG's strategic application domains. This targeted data design enables substantial performance gains in document understanding and related tasks, while also delivering broad improvements across general language capabilities. EXAONE 4.5 extends context length up to 256K tokens, facilitating long-context reasoning and enterprise-scale use cases. Comparative evaluations demonstrate that EXAONE 4.5 achieves competitive performance in general benchmarks while outperforming state-of-the-art models of similar scale in document understanding and Korean contextual reasoning. As part of LG's ongoing effort toward practical industrial deployment, EXAONE 4.5 is designed to be continuously extended with additional domains and application scenarios to advance AI for a better life.", 'score': 33, 'issue_id': 1892, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '4714066ab78664b5', 'authors': ['Eunbi Choi', 'Kibong Choi', 'Sehyun Chun', 'Seokhee Hong', 'Junwon Hwang', 'Hyojin Jeon', 'Ahra Jo', 'Hyunjik Jo', 'Yeonsik Jo', 'Joonkee Kim', 'Seonghwan Kim', 'Soyeon Kim', 'Sunkyoung Kim', 'Yireun Kim', 'Yongil Kim', 'Changhun Lee', 'Haeju Lee', 'Jinsik Lee', 'Kyungmin Lee', 'Sangha Park', 'Kwangrok Ryoo', 'Minju Seo', 'Sejong Yang', 'Heuiyeen Yeen', 'Hwan Chang', 'Stanley Jungkyu Choi', 'Yejin Choi', 'Kyubeen Han', 'Joonwon Jang', 'Kijeong Jeon', 'Geunyeong Jeong', 'Gerrard Jeongwon Jo', 'Jiyeon Jung', 'Daeseong Kim', 'Dohoon Kim', 'Dohyun Kim', 'Hyunseo Kim', 'Minu Kim', 'Myoungshin Kim', 'Youchul Kim', 'Byungoh Ko', 'Christopher Lee', 'Edward Hwayoung Lee', 'Honglak Lee', 'Jiyoung Lee', 'Sangeun Lee', 'Seungwon Lim', 'Woohyung Lim', 'Jueun Mun', 'Jaewoo Park', 'Jimin Park', 'Jinho Park', 'Yongmin Park', 'Wooseok Seo', 'Yongwoo Song', 'Sihyuk Yi', 'Kyungjae Yoo', 'Sangyeon Yoon'], 'affiliations': ['LG AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.08644.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#data', '#multimodal', '#architecture', '#open_source'], 'emoji': '📄', 'ru': {'title': 'Открытая мультимодальная модель для понимания документов и длинных контекстов', 'desc': 'EXAONE 4.5 — это открытая мультимодальная языковая модель, которая интегрирует визуальный энкодер в существующую архитектуру EXAONE 4.0 для одновременной обработки текста и изображений. Модель обучена на тщательно подобранных данных с упором на документоцентричные корпусы, что позволило значительно улучшить понимание документов и общие языковые способности. Расширенная длина контекста до 256K токенов обеспечивает возможность работы с длинными последовательностями и поддерживает сценарии использования на уровне предприятия. Экспериментальная оценка показала, что EXAONE 4.5 достигает конкурентных результатов в стандартных бенчмарках и превосходит модели аналогичного размера в задачах понимания документов и корейского языка.'}, 'en': {'title': 'Revolutionizing Document Understanding with Multimodal AI', 'desc': 'EXAONE 4.5 is a new vision language model that combines visual and textual understanding by adding a visual encoder to the previous version, EXAONE 4.0. This model is trained on a carefully selected dataset focused on documents, which helps it perform better in understanding and processing text and images together. It can handle longer contexts, up to 256,000 tokens, making it suitable for complex tasks in real-world applications. Overall, EXAONE 4.5 shows strong performance in benchmarks, especially in document understanding and reasoning in Korean, while being adaptable for future enhancements.'}, 'zh': {'title': 'EXAONE 4.5：文档理解的新高度', 'desc': 'EXAONE 4.5 是 LG AI 研究所发布的首个开放权重的视觉语言模型。它通过将专用的视觉编码器集成到 EXAONE 4.0 框架中，实现了对视觉和文本模态的原生多模态预训练。该模型经过精心策划的大规模数据训练，特别强调与文档相关的语料库，从而在文档理解和相关任务上取得显著性能提升。EXAONE 4.5 还将上下文长度扩展到 256K 个标记，支持长上下文推理和企业级应用场景。'}}}, {'id': 'https://huggingface.co/papers/2604.08995', 'title': 'Matrix-Game 3.0: Real-Time and Streaming Interactive World Model with Long-Horizon Memory', 'url': 'https://huggingface.co/papers/2604.08995', 'abstract': 'Abstract Matrix-Game 3.0 enhances interactive video generation through memory-augmented diffusion models that achieve real-time 720p video synthesis with long-term temporal consistency.  AI-generated summary With the advancement of interactive video generation, diffusion models have increasingly demonstrated their potential as world models. However, existing approaches still struggle to simultaneously achieve memory-enabled long-term temporal consistency and high-resolution real-time generation, limiting their applicability in real-world scenarios. To address this, we present Matrix-Game 3.0, a memory-augmented interactive world model designed for 720p real-time longform video generation. Building upon Matrix-Game 2.0, we introduce systematic improvements across data, model, and inference. First, we develop an upgraded industrial-scale infinite data engine that integrates Unreal Engine-based synthetic data, large-scale automated collection from AAA games, and real-world video augmentation to produce high-quality Video-Pose-Action-Prompt quadruplet data at scale. Second, we propose a training framework for long-horizon consistency: by modeling prediction residuals and re-injecting imperfect generated frames during training, the base model learns self-correction; meanwhile, camera-aware memory retrieval and injection enable the base model to achieve long horizon spatiotemporal consistency. Third, we design a multi-segment autoregressive distillation strategy based on Distribution Matching Distillation (DMD), combined with model quantization and VAE decoder pruning, to achieve efficient real-time inference. Experimental results show that Matrix-Game 3.0 achieves up to 40 FPS real-time generation at 720p resolution with a 5B model, while maintaining stable memory consistency over minute-long sequences. Scaling up to a 2x14B model further improves generation quality, dynamics, and generalization. Our approach provides a practical pathway toward industrial-scale deployable world models.', 'score': 32, 'issue_id': 1891, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '52ec8dc0bd3b775c', 'authors': ['Zile Wang', 'Zexiang Liu', 'Jaixing Li', 'Kaichen Huang', 'Baixin Xu', 'Fei Kang', 'Mengyin An', 'Peiyu Wang', 'Biao Jiang', 'Yichen Wei', 'Yidan Xietian', 'Jiangbo Pei', 'Liang Hu', 'Boyi Jiang', 'Hua Xue', 'Zidong Wang', 'Haofeng Sun', 'Wei Li', 'Wanli Ouyang', 'Xianglong He', 'Yang Liu', 'Yangguang Li', 'Yahui Zhou'], 'affiliations': ['Skywork AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.08995.jpg', 'data': {'categories': ['#inference', '#games', '#diffusion', '#optimization', '#architecture', '#dataset', '#training', '#synthetic', '#long_context', '#video'], 'emoji': '🎮', 'ru': {'title': 'Памяти-ориентированная диффузия для реал-тайм синтеза видео высокого разрешения', 'desc': 'Matrix-Game 3.0 представляет собой инновационную модель диффузии, дополненную механизмом памяти для интерактивной генерации видео. Модель решает задачу одновременного достижения высокого разрешения (720p) и реал-тайм синтеза видео при сохранении долгосрочной временной консистентности. Авторы улучшили качество данных через интеграцию синтетического контента, AAA-игр и реальных видео, разработали специальный фреймворк обучения с предсказанием остатков и извлечением из памяти. Для эффективного инференса применена многоэтапная дистилляция с использованием Distribution Matching Distillation, квантизации модели и оптимизации декодера VAE.'}, 'en': {'title': 'Revolutionizing Real-Time Interactive Video Generation', 'desc': 'Matrix-Game 3.0 introduces a new way to create interactive videos using advanced memory-augmented diffusion models. This method allows for real-time video generation at 720p resolution while ensuring that the videos maintain consistency over longer periods. The paper details improvements in data collection, model training, and inference techniques to enhance video quality and performance. Overall, it presents a significant step towards creating high-quality, long-form videos that can be used in various real-world applications.'}, 'zh': {'title': '增强记忆的交互式视频生成新突破', 'desc': 'Matrix-Game 3.0 是一种增强记忆的交互式视频生成模型，能够实现720p实时视频合成，并保持长期的时间一致性。该模型通过改进数据、模型和推理框架，克服了现有方法在高分辨率和长时间一致性方面的局限。我们开发了一个工业级无限数据引擎，结合合成数据和真实视频增强，生成高质量的视频动作提示数据。实验结果表明，Matrix-Game 3.0 在720p分辨率下可实现每秒40帧的实时生成，同时在长达数分钟的序列中保持稳定的记忆一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.09450', 'title': 'ECHO: Efficient Chest X-ray Report Generation with One-step Block Diffusion', 'url': 'https://huggingface.co/papers/2604.09450', 'abstract': "Abstract ECHO is an efficient diffusion-based vision-language model for chest X-ray report generation that achieves faster inference through direct conditional distillation and response-asymmetric diffusion training while maintaining high clinical accuracy.  AI-generated summary Chest X-ray report generation (CXR-RG) has the potential to substantially alleviate radiologists' workload. However, conventional autoregressive vision--language models (VLMs) suffer from high inference latency due to sequential token decoding. Diffusion-based models offer a promising alternative through parallel generation, but they still require multiple denoising iterations. Compressing multi-step denoising to a single step could further reduce latency, but often degrades textual coherence due to the mean-field bias introduced by token-factorized denoisers. To address this challenge, we propose ECHO, an efficient diffusion-based VLM (dVLM) for chest X-ray report generation. ECHO enables stable one-step-per-block inference via a novel Direct Conditional Distillation (DCD) framework, which mitigates the mean-field limitation by constructing unfactorized supervision from on-policy diffusion trajectories to encode joint token dependencies. In addition, we introduce a Response-Asymmetric Diffusion (RAD) training strategy that further improves training efficiency while maintaining model effectiveness. Extensive experiments demonstrate that ECHO surpasses state-of-the-art autoregressive methods, improving RaTE and SemScore by 64.33\\% and 60.58\\% respectively, while achieving an 8times inference speedup without compromising clinical accuracy.", 'score': 14, 'issue_id': 1892, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '0f9c0a56b744adcb', 'authors': ['Lifeng Chen', 'Tianqi You', 'Hao Liu', 'Zhimin Bao', 'Jile Jiao', 'Xiao Han', 'Zhicai Ou', 'Tao Sun', 'Xiaofeng Mou', 'Xiaojie Jin', 'Yi Xu'], 'affiliations': ['AIRC, Midea Group', 'Beijing Jiaotong University', 'Dalian University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.09450.jpg', 'data': {'categories': ['#training', '#healthcare', '#optimization', '#diffusion', '#multimodal', '#science', '#inference', '#cv'], 'emoji': '🫁', 'ru': {'title': 'Быстрая генерация медицинских отчетов через одношаговую диффузионную дистилляцию', 'desc': 'ECHO — это эффективная диффузионная модель для генерации отчетов по рентгенограммам грудной клетки, которая использует прямую условную дистилляцию для уменьшения влияния mean-field bias при однопроходной генерации. Модель применяет асимметричную диффузионную подготовку, которая улучшает эффективность обучения без потери качества. В отличие от автирегрессивных моделей, требующих последовательного декодирования токенов, ECHO генерирует текст параллельно через несколько итераций денойзирования блок за блоком. Экспериментальные результаты показывают, что ECHO превосходит существующие методы на 64% по RaTE и 60% по SemScore, при этом ускоряя вывод в 8 раз и сохраняя клиническую точность.'}, 'en': {'title': 'ECHO: Fast and Accurate Chest X-Ray Report Generation', 'desc': "ECHO is a novel diffusion-based vision-language model designed for generating chest X-ray reports efficiently. It utilizes Direct Conditional Distillation to enhance inference speed by allowing one-step-per-block processing, which helps maintain the coherence of generated text. Additionally, the Response-Asymmetric Diffusion training strategy improves the model's training efficiency while preserving its effectiveness. Overall, ECHO significantly outperforms traditional autoregressive models in both speed and clinical accuracy, making it a valuable tool for radiologists."}, 'zh': {'title': 'ECHO：高效的胸部X光报告生成模型', 'desc': 'ECHO是一种高效的基于扩散的视觉-语言模型，用于胸部X光报告生成。它通过直接条件蒸馏和响应不对称扩散训练实现了更快的推理速度，同时保持了高临床准确性。传统的自回归视觉-语言模型在推理时存在高延迟，而扩散模型通过并行生成提供了有希望的替代方案。ECHO通过新颖的直接条件蒸馏框架和响应不对称扩散训练策略，显著提高了训练效率和推理速度。'}}}, {'id': 'https://huggingface.co/papers/2604.09168', 'title': 'ELT: Elastic Looped Transformers for Visual Generation', 'url': 'https://huggingface.co/papers/2604.09168', 'abstract': "Abstract Elastic Looped Transformers utilize recurrent transformer architecture with weight-sharing and intra-loop self-distillation to achieve parameter-efficient visual generation with adjustable computational cost and generation quality.  AI-generated summary We introduce Elastic Looped Transformers (ELT), a highly parameter-efficient class of visual generative models based on a recurrent transformer architecture. While conventional generative models rely on deep stacks of unique transformer layers, our approach employs iterative, weight-shared transformer blocks to drastically reduce parameter counts while maintaining high synthesis quality. To effectively train these models for image and video generation, we propose the idea of Intra-Loop Self Distillation (ILSD), where student configurations (intermediate loops) are distilled from the teacher configuration (maximum training loops) to ensure consistency across the model's depth in a single training step. Our framework yields a family of elastic models from a single training run, enabling Any-Time inference capability with dynamic trade-offs between computational cost and generation quality, with the same parameter count. ELT significantly shifts the efficiency frontier for visual synthesis. With 4times reduction in parameter count under iso-inference-compute settings, ELT achieves a competitive FID of 2.0 on class-conditional ImageNet 256 times 256 and FVD of 72.8 on class-conditional UCF-101.", 'score': 14, 'issue_id': 1891, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'c9c941b7fa3dad2f', 'authors': ['Sahil Goyal', 'Swayam Agrawal', 'Gautham Govind Anil', 'Prateek Jain', 'Sujoy Paul', 'Aditya Kusupati'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2604.09168.jpg', 'data': {'categories': ['#inference', '#optimization', '#diffusion', '#architecture', '#training', '#small_models', '#cv', '#video'], 'emoji': '🔄', 'ru': {'title': 'Параметрически эффективная генерация через переиспользуемые циклические трансформеры', 'desc': 'В статье представлены Elastic Looped Transformers (ELT) — параметрически эффективные модели для генерации изображений и видео, основанные на архитектуре рекуррентного трансформера с переиспользованием весов. Для эффективного обучения предложен метод Intra-Loop Self Distillation (ILSD), при котором промежуточные конфигурации модели дистиллируются из полной конфигурации за один проход обучения. Из одного обучающего запуска получается семейство эластичных моделей с возможностью динамической регулировки компромисса между вычислительной стоимостью и качеством генерации. Модель достигает значительного сокращения параметров (в 4 раза) при сохранении конкурентных метрик качества (FID=2.0 на ImageNet и FVD=72.8 на UCF-101).'}, 'en': {'title': 'Efficient Visual Generation with Elastic Looped Transformers', 'desc': 'Elastic Looped Transformers (ELT) are a new type of visual generative model that uses a recurrent transformer architecture to be more efficient with parameters. Instead of using many unique transformer layers, ELT shares weights across iterative transformer blocks, which reduces the number of parameters needed while still producing high-quality images and videos. The model is trained using a technique called Intra-Loop Self Distillation (ILSD), where intermediate versions of the model learn from a more complex version to maintain quality throughout the training process. This approach allows for flexible inference, enabling users to adjust the balance between computational cost and output quality without changing the number of parameters.'}, 'zh': {'title': '弹性循环变换器：高效视觉生成的新方法', 'desc': '弹性循环变换器（ELT）是一种高效的视觉生成模型，基于循环变换器架构。与传统生成模型依赖于深层独特的变换器层不同，我们的方法使用迭代的权重共享变换器块，显著减少参数数量，同时保持高质量的合成效果。为了有效训练这些模型进行图像和视频生成，我们提出了内部循环自蒸馏（ILSD）的概念，通过从教师配置中提取学生配置，确保模型深度的一致性。ELT在参数数量相同的情况下，实现了计算成本和生成质量之间的动态权衡，显著提高了视觉合成的效率。'}}}, {'id': 'https://huggingface.co/papers/2604.02372', 'title': 'Backdoor Attacks on Decentralised Post-Training', 'url': 'https://huggingface.co/papers/2604.02372', 'abstract': 'Abstract A backdoor attack targeting pipeline parallelism in decentralized post-training of large language models achieves significant misalignment even when controlling only an intermediate stage of the pipeline.  AI-generated summary Decentralised post-training of large language models utilises data and pipeline parallelism techniques to split the data and the model. Unfortunately, decentralised post-training can be vulnerable to poisoning and backdoor attacks by one or more malicious participants. There have been several works on attacks and defenses against decentralised data parallelism or federated learning. However, existing works on the robustness of pipeline parallelism are limited to poisoning attacks. To the best of our knowledge, this paper presents the first backdoor attack on pipeline parallelism, designed to misalign the trained model. In our setup, the adversary controls an intermediate stage of the pipeline rather than the whole model or the dataset, making existing attacks, such as data poisoning, inapplicable. Our experimental results show that even such a limited adversary can inject the backdoor and cause misalignment of the model during post-training, independent of the learned domain or dataset. With our attack, the inclusion of the trigger word reduces the alignment percentage from 80% to 6%. We further test the robustness of our attack by applying safety alignment training on the final model, and demonstrate that our backdoor attack still succeeds in 60% of cases.', 'score': 10, 'issue_id': 1896, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'b66a265efa8caad0', 'authors': ['Oğuzhan Ersoy', 'Nikolay Blagoev', 'Jona te Lintelo', 'Stefanos Koffas', 'Marina Krček', 'Stjepan Picek'], 'affiliations': ['Delft University of Technology', 'Gensyn', 'Radboud University', 'SecureML', 'University of Neuchâtel', 'University of Zagreb'], 'pdf_title_img': 'assets/pdf/title_img/2604.02372.jpg', 'data': {'categories': ['#security', '#alignment'], 'emoji': '🚪', 'ru': {'title': 'Скрытая атака через промежуточный этап конвейерного обучения', 'desc': 'В работе представлена первая атака с использованием бэкдора, нацеленная на конвейерный параллелизм при децентрализованном дообучении больших языковых моделей. Злоумышленник контролирует только промежуточный этап конвейера, что делает классические методы отравления данных неэффективными. Авторы демонстрируют, что даже с таким ограниченным доступом можно внедрить скрытую функциональность, снижающую выравнивание модели с 80% до 6% при наличии триггерного слова. Более того, атака остается эффективной даже после применения дополнительного обучения выравниванию безопасности на финальной модели в 60% случаев.'}, 'en': {'title': 'Exploiting Pipeline Parallelism: A New Backdoor Attack on Language Models', 'desc': "This paper introduces a novel backdoor attack targeting pipeline parallelism in decentralized post-training of large language models. The attack allows a malicious participant to control only an intermediate stage of the training pipeline, leading to significant misalignment of the model. Unlike traditional data poisoning attacks, this method demonstrates that even limited access can effectively compromise the integrity of the model. Experimental results reveal that the attack drastically reduces the model's alignment percentage, highlighting vulnerabilities in current decentralized training approaches."}, 'zh': {'title': '管道并行性的后门攻击：模型失调的新威胁', 'desc': '这篇论文探讨了一种针对大型语言模型去中心化后训练的后门攻击，特别是针对管道并行性。研究表明，即使攻击者只控制管道的中间阶段，也能显著导致模型的失调。与以往的研究不同，这项工作首次展示了管道并行性下的后门攻击，攻击者无需控制整个模型或数据集。实验结果显示，攻击者可以通过注入触发词，将模型的对齐率从80%降低到6%。'}}}, {'id': 'https://huggingface.co/papers/2604.08567', 'title': 'Multi-User Large Language Model Agents', 'url': 'https://huggingface.co/papers/2604.08567', 'abstract': "Abstract Multi-user large language model agents face challenges in handling conflicting objectives, privacy preservation, and coordination efficiency in multi-principal decision-making scenarios.  AI-generated summary Large language models (LLMs) and LLM-based agents are increasingly deployed as assistants in planning and decision making, yet most existing systems are implicitly optimized for a single-principal interaction paradigm, in which the model is designed to satisfy the objectives of one dominant user whose instructions are treated as the sole source of authority and utility. However, as they are integrated into team workflows and organizational tools, they are increasingly required to serve multiple users simultaneously, each with distinct roles, preferences, and authority levels, leading to multi-user, multi-principal settings with unavoidable conflicts, information asymmetry, and privacy constraints. In this work, we present the first systematic study of multi-user LLM agents. We begin by formalizing multi-user interaction with LLM agents as a multi-principal decision problem, where a single agent must account for multiple users with potentially conflicting interests and associated challenges. We then introduce a unified multi-user interaction protocol and design three targeted stress-testing scenarios to evaluate current LLMs' capabilities in instruction following, privacy preservation, and coordination. Our results reveal systematic gaps: frontier LLMs frequently fail to maintain stable prioritization under conflicting user objectives, exhibit increasing privacy violations over multi-turn interactions, and suffer from efficiency bottlenecks when coordination requires iterative information gathering.", 'score': 10, 'issue_id': 1897, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '9b963f4c2f6342f3', 'authors': ['Shu Yang', 'Shenzhe Zhu', 'Hao Zhu', 'José Ramón Enríquez', 'Di Wang', 'Alex Pentland', 'Michiel A. Bakker', 'Jiaxin Pei'], 'affiliations': ['KAUST', 'MIT', 'Stanford University', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.08567.jpg', 'data': {'categories': [], 'emoji': '👥', 'ru': {'title': 'Согласование конфликтующих целей в мультипользовательских LLM-агентах', 'desc': 'В работе исследуется проблема мультипользовательского взаимодействия с LLM-агентами в сценариях многосубъектного принятия решений. Авторы формализуют задачу как мультипринципальную проблему, где один агент должен учитывать конфликтующие интересы нескольких пользователей с разными правами доступа и приоритетами. Предложен единый протокол мультипользовательского взаимодействия и разработаны сценарии тестирования для оценки способностей LLM в выполнении инструкций, сохранении приватности и координации. Исследование выявило критические недостатки: современные LLM неустойчивы при конфликтующих целях, допускают утечки приватной информации в многошаговых диалогах и демонстрируют неэффективность при необходимости итеративного сбора информации.'}, 'en': {'title': 'Navigating Conflicts: Multi-User LLM Agents for Collaborative Decision-Making', 'desc': 'This paper addresses the challenges faced by large language model (LLM) agents when interacting with multiple users who have different goals and privacy needs. It highlights that most existing LLM systems are designed for single-user scenarios, which limits their effectiveness in multi-user environments. The authors propose a new framework for understanding these interactions as a multi-principal decision-making problem, where the agent must balance conflicting interests. They also introduce a testing protocol to evaluate LLMs on their ability to follow instructions, protect privacy, and coordinate effectively among users, revealing significant shortcomings in current models.'}, 'zh': {'title': '多用户协作中的大语言模型挑战', 'desc': '本研究探讨了多用户大语言模型（LLM）代理在多主体决策场景中的挑战，包括目标冲突、隐私保护和协调效率。现有的系统通常只针对单一用户进行优化，无法有效处理多个用户的不同需求和权威。我们将多用户交互形式化为多主体决策问题，并提出了统一的多用户交互协议。通过设计三种压力测试场景，我们发现当前的LLM在指令执行、隐私保护和协调方面存在系统性缺陷。'}}}, {'id': 'https://huggingface.co/papers/2604.04415', 'title': 'Structured Causal Video Reasoning via Multi-Objective Alignment', 'url': 'https://huggingface.co/papers/2604.04415', 'abstract': 'Abstract Video-LLMs trained on structured event facts with causal relationships outperform existing methods on complex video understanding tasks requiring precise temporal inference.  AI-generated summary Human understanding of video dynamics is typically grounded in a structured mental representation of entities, actions, and temporal relations, rather than relying solely on immediate deductive reasoning. In contrast, existing Video-LLMs largely depend on unstructured video reasoning, where critical visual evidence is embedded in verbose textual descriptions and temporal causality is often weakly modeled. This leads to inefficient processes and fragile causal inference. To bridge this cognitive gap, we propose constructing a compact representation of salient events and their causal relationships, which we name Structured Event Facts, prior to the reasoning stage. This structured prior serves as an explicit constraint to promote concise and causally grounded reasoning, while also making intermediate evidence easier to verify. To effectively train models on such structured facts, we introduce CausalFact-60K and a four-stage training pipeline comprising facts alignment, format warm-start, thinking warm-start, and reinforcement learning-based post-training. During RL stage, we find that this framework introduces competing objectives, as structural completeness and causal fidelity must be balanced against reasoning length, making it difficult to optimize. We address this challenge by formulating the optimization as a Multi-Objective Reinforcement Learning (MORL) problem and explicitly optimizing toward the Pareto-Frontier to balance these trade-offs. As a result, we introduce Factum-4B, which yields more reliable reasoning and delivers stronger performance on challenging video understanding tasks requiring fine-grained temporal inference.', 'score': 7, 'issue_id': 1892, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'e5aeb50600332655', 'authors': ['Zinuo Li', 'Yongxin Guo', 'Jun Liu', 'Jiawei Zhan', 'Xi Jiang', 'Chengjie Wang', 'Mohammed Bennamoun', 'Farid Boussaid', 'Feng Zheng', 'Qiuhong Ke'], 'affiliations': ['Chinese University of Hong Kong, Shen Zhen', 'Monash University', 'Southern University of Science and Technology', 'Tencent Youtu Lab', 'University of Western Australia'], 'pdf_title_img': 'assets/pdf/title_img/2604.04415.jpg', 'data': {'categories': ['#synthetic', '#training', '#optimization', '#rl', '#multimodal', '#reasoning', '#dataset', '#video'], 'emoji': '🎬', 'ru': {'title': 'Структурированные события как основа для причинного рассуждения в видео-LLM', 'desc': 'Работа предлагает новый подход к обучению видео-LLM путём введения структурированного представления событий и их причинно-следственных связей перед этапом рассуждения. Авторы создали датасет CausalFact-60K и четырёхэтапный pipeline обучения, включающий выравнивание фактов, разминку форматов и мышления, а также постобучение с использованием усиленного обучения. Для решения конфликта между полнотой структуры, причинной верностью и длиной рассуждения применена многоцелевая оптимизация с поиском Парето-фронтира. Полученная модель Factum-4B демонстрирует превосходную производительность на сложных задачах видеопонимания с требованием точного временного вывода.'}, 'en': {'title': 'Structured Event Facts Enhance Video Understanding', 'desc': "This paper presents a new approach to video understanding using Video-LLMs that are trained on structured event facts with causal relationships. Unlike traditional methods that rely on unstructured reasoning, this approach emphasizes a compact representation of events and their temporal connections, enhancing causal inference. The authors introduce a training framework called CausalFact-60K, which includes multiple stages to optimize the model's reasoning capabilities. By framing the optimization as a Multi-Objective Reinforcement Learning problem, they achieve a balance between structural completeness and reasoning efficiency, resulting in improved performance on complex video tasks."}, 'zh': {'title': '结构化事件事实提升视频理解能力', 'desc': '本文提出了一种新的视频大语言模型（Video-LLMs），通过结构化事件事实和因果关系来提升视频理解的能力。与传统方法不同，该模型在推理阶段之前构建了一个紧凑的事件表示，以促进更简洁和基于因果的推理。我们引入了CausalFact-60K数据集，并设计了一个四阶段的训练流程，以有效训练模型。最终，Factum-4B模型在复杂视频理解任务中表现出更强的性能，特别是在精确的时间推理方面。'}}}, {'id': 'https://huggingface.co/papers/2604.09531', 'title': 'VisionFoundry: Teaching VLMs Visual Perception with Synthetic Images', 'url': 'https://huggingface.co/papers/2604.09531', 'abstract': 'Abstract VisionFoundry generates synthetic visual question answering data using large language models and text-to-image prompts to improve visual perception tasks in vision-language models.  AI-generated summary Vision-language models (VLMs) still struggle with visual perception tasks such as spatial understanding and viewpoint recognition. One plausible contributing factor is that natural image datasets provide limited supervision for low-level visual skills. This motivates a practical question: can targeted synthetic supervision, generated from only a task keyword such as Depth Order, address these weaknesses? To investigate this question, we introduce VisionFoundry, a task-aware synthetic data generation pipeline that takes only the task name as input and uses large language models (LLMs) to generate questions, answers, and text-to-image (T2I) prompts, then synthesizes images with T2I models and verifies consistency with a proprietary VLM, requiring no reference images or human annotation. Using VisionFoundry, we construct VisionFoundry-10K, a synthetic visual question answering (VQA) dataset containing 10k image-question-answer triples spanning 10 tasks. Models trained on VisionFoundry-10K achieve substantial improvements on visual perception benchmarks: +7% on MMVP and +10% on CV-Bench-3D, while preserving broader capabilities and showing favorable scaling behavior as data size increases. Our results suggest that limited task-targeted supervision is an important contributor to this bottleneck and that synthetic supervision is a promising path toward more systematic training for VLMs.', 'score': 6, 'issue_id': 1891, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '7df0a1e56fa7d86b', 'authors': ['Guanyu Zhou', 'Yida Yin', 'Wenhao Chai', 'Shengbang Tong', 'Xingyu Fu', 'Zhuang Liu'], 'affiliations': ['New York University', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2604.09531.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#open_source', '#synthetic', '#benchmark', '#cv'], 'emoji': '🏭', 'ru': {'title': 'Фабрика синтетических данных для обучения зрительного восприятия', 'desc': 'VisionFoundry — это система для автоматического создания синтетических данных для обучения vision-language моделей (VLM). Система использует большие языковые модели (LLM) для генерации вопросов, ответов и текстовых описаний, которые затем преобразуются в изображения с помощью text-to-image моделей. Авторы создали датасет VisionFoundry-10K с 10 тысячами синтетических примеров для 10 различных задач визуального восприятия, таких как понимание глубины и распознавание точки зрения. Обучение на этом датасете значительно улучшает производительность VLM на бенчмарках, что демонстрирует эффективность целевой синтетической информации для восполнения пробелов в обучающих данных.'}, 'en': {'title': 'Empowering Vision-Language Models with Synthetic Supervision', 'desc': 'VisionFoundry is a synthetic data generation pipeline designed to enhance visual question answering (VQA) in vision-language models (VLMs). It utilizes large language models (LLMs) to create questions, answers, and text-to-image prompts based solely on task keywords, generating images without needing reference images or human input. The resulting dataset, VisionFoundry-10K, consists of 10,000 image-question-answer triples across various tasks, leading to significant performance improvements in visual perception benchmarks. This approach highlights the potential of targeted synthetic supervision to address the limitations of traditional natural image datasets in training VLMs.'}, 'zh': {'title': '合成监督助力视觉语言模型提升', 'desc': 'VisionFoundry 是一个合成视觉问答数据生成系统，利用大型语言模型和文本到图像的提示来提升视觉语言模型在视觉感知任务中的表现。现有的视觉语言模型在空间理解和视角识别等低级视觉技能上仍然存在困难，部分原因是自然图像数据集对这些技能的监督有限。VisionFoundry 通过仅输入任务名称，生成问题、答案和文本到图像的提示，并合成图像，验证与专有视觉语言模型的一致性，从而提供有针对性的合成监督。通过构建 VisionFoundry-10K 数据集，模型在视觉感知基准测试中取得了显著提升，表明合成监督是提升视觉语言模型训练的有效途径。'}}}, {'id': 'https://huggingface.co/papers/2603.27490', 'title': 'AgentSwing: Adaptive Parallel Context Management Routing for Long-Horizon Web Agents', 'url': 'https://huggingface.co/papers/2603.27490', 'abstract': 'Abstract AgentSwing is a state-aware adaptive framework that improves long-horizon information-seeking by dynamically managing context through parallel branching and lookahead routing, outperforming static methods while reducing interaction requirements.  AI-generated summary As large language models (LLMs) evolve into autonomous agents for long-horizon information-seeking, managing finite context capacity has become a critical bottleneck. Existing context management methods typically commit to a single fixed strategy throughout the entire trajectory. Such static designs may work well in some states, but they cannot adapt as the usefulness and reliability of the accumulated context evolve during long-horizon search. To formalize this challenge, we introduce a probabilistic framework that characterizes long-horizon success through two complementary dimensions: search efficiency and terminal precision. Building on this perspective, we propose AgentSwing, a state-aware adaptive parallel context management routing framework. At each trigger point, AgentSwing expands multiple context-managed branches in parallel and uses lookahead routing to select the most promising continuation. Experiments across diverse benchmarks and agent backbones show that AgentSwing consistently outperforms strong static context management methods, often matching or exceeding their performance with up to 3times fewer interaction turns while also improving the ultimate performance ceiling of long-horizon web agents. Beyond the empirical gains, the proposed probabilistic framework provides a principled lens for analyzing and designing future context management strategies for long-horizon agents.', 'score': 6, 'issue_id': 1893, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '0059648ad7e96262', 'authors': ['Zhaopeng Feng', 'Liangcai Su', 'Zhen Zhang', 'Xinyu Wang', 'Xiaotian Zhang', 'Xiaobin Wang', 'Runnan Fang', 'Qi Zhang', 'Baixuan Li', 'Shihao Cai', 'Rui Ye', 'Hui Chen', 'Jiang Yong', 'Joey Tianyi Zhou', 'Chenxiong Qian', 'Pengjun Xie', 'Bryan Hooi', 'Zuozhu Liu', 'Jingren Zhou'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.27490.jpg', 'data': {'categories': ['#agents', '#optimization', '#benchmark', '#reasoning', '#long_context'], 'emoji': '🌳', 'ru': {'title': 'Гибкое управление контекстом через параллельное ветвление и предсказательную маршрутизацию', 'desc': 'AgentSwing — это адаптивная система управления контекстом для автономных агентов на базе больших языковых моделей при решении долгосрочных задач поиска информации. Традиционные методы используют фиксированную стратегию обработки контекста, но AgentSwing динамически выбирает оптимальный подход на каждом этапе поиска, параллельно развивая несколько ветвей и используя упреждающую маршрутизацию для выбора наиболее перспективного пути. Авторы формализуют проблему через вероятностный фреймворк, учитывающий эффективность поиска и точность результатов. Экспериментальные результаты показывают, что AgentSwing превосходит статические методы, достигая лучшей производительности при значительно меньшем количестве взаимодействий.'}, 'en': {'title': 'Dynamic Context Management for Enhanced Information-Seeking', 'desc': 'AgentSwing is a novel framework designed to enhance long-horizon information-seeking tasks by dynamically managing context. It addresses the limitations of static context management methods that do not adapt to changing conditions during a search. By employing a probabilistic approach, AgentSwing utilizes parallel branching and lookahead routing to optimize search efficiency and precision. Experimental results demonstrate that it significantly reduces interaction requirements while improving overall performance compared to traditional methods.'}, 'zh': {'title': 'AgentSwing：动态管理上下文的自适应框架', 'desc': 'AgentSwing 是一个状态感知的自适应框架，旨在通过动态管理上下文来改善长时间信息搜索的效率。它通过并行分支和前瞻性路由来管理上下文，超越了静态方法，并减少了交互需求。传统的上下文管理方法通常在整个过程中采用固定策略，无法适应上下文的变化。AgentSwing 通过引入概率框架，优化了搜索效率和终端精度，显著提升了长时间网络代理的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.09237', 'title': 'ScheMatiQ: From Research Question to Structured Data through Interactive Schema Discovery', 'url': 'https://huggingface.co/papers/2604.09237', 'abstract': 'Abstract ScheMatiQ uses large language model calls to automatically generate annotation schemas and structured databases from document collections, supporting domain-specific analysis in law and computational biology through an interactive web interface.  AI-generated summary Many disciplines pose natural-language research questions over large document collections whose answers typically require structured evidence, traditionally obtained by manually designing an annotation schema and exhaustively labeling the corpus, a slow and error-prone process. We introduce ScheMatiQ, which leverages calls to a backbone LLM to take a question and a corpus to produce a schema and a grounded database, with a web interface that lets steer and revise the extraction. In collaboration with domain experts, we show that ScheMatiQ yields outputs that support real-world analysis in law and computational biology. We release ScheMatiQ as open source with a public web interface, and invite experts across disciplines to use it with their own data. All resources, including the website, source code, and demonstration video, are available at: www.ScheMatiQ-ai.com', 'score': 5, 'issue_id': 1894, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'e16257bf760eb319', 'authors': ['Shahar Levy', 'Eliya Habba', 'Reshef Mintz', 'Barak Raveh', 'Renana Keydar', 'Gabriel Stanovsky'], 'affiliations': ['Allen Institute for AI', 'Faculty of Law, The Hebrew University of Jerusalem', 'School of Computer Science and Engineering, The Hebrew University of Jerusalem'], 'pdf_title_img': 'assets/pdf/title_img/2604.09237.jpg', 'data': {'categories': [], 'emoji': '📋', 'ru': {'title': 'Автоматическое создание схем аннотаций через языковые модели', 'desc': 'ScheMatiQ — это система, которая использует вызовы большой языковой модели для автоматического создания схем аннотаций и структурированных баз данных из коллекций документов. Традиционный подход требует ручного проектирования схемы и утомительной разметки всего корпуса, что медленно и подвержено ошибкам. ScheMatiQ решает эту проблему, принимая на вход исследовательский вопрос и корпус документов, а затем генерирует соответствующую схему и обоснованную базу данных с возможностью интерактивного уточнения. Система была успешно применена в реальных задачах юридического анализа и вычислительной биологии в сотрудничестве с экспертами предметной области.'}, 'en': {'title': 'Automating Data Annotation with ScheMatiQ', 'desc': 'ScheMatiQ is a tool that uses large language models (LLMs) to create annotation schemas and structured databases from collections of documents. This process helps researchers in fields like law and computational biology to analyze data more efficiently by automating the traditionally manual task of schema design and data labeling. By allowing users to interactively guide and refine the extraction process, ScheMatiQ ensures that the generated outputs are relevant and accurate for specific research questions. The tool is open source, encouraging collaboration and use across various disciplines.'}, 'zh': {'title': '自动生成注释架构的智能工具', 'desc': 'ScheMatiQ 是一个利用大型语言模型自动生成注释架构和结构化数据库的工具，适用于法律和计算生物学等领域的分析。它通过交互式网页界面，支持用户根据自然语言问题和文档集合生成所需的结构化证据。传统上，这一过程需要手动设计注释架构并逐一标注数据，既耗时又容易出错。ScheMatiQ 通过与领域专家的合作，展示了其在实际分析中的有效性，并以开源形式发布，欢迎各领域专家使用。'}}}, {'id': 'https://huggingface.co/papers/2604.09544', 'title': 'Large Language Models Generate Harmful Content Using a Distinct, Unified Mechanism', 'url': 'https://huggingface.co/papers/2604.09544', 'abstract': "Abstract Targeted weight pruning reveals that large language models have a compact, coherent internal structure for harmful content generation that differs from benign capabilities and contributes to emergent misalignment during fine-tuning.  AI-generated summary Large language models (LLMs) undergo alignment training to avoid harmful behaviors, yet the resulting safeguards remain brittle: jailbreaks routinely bypass them, and fine-tuning on narrow domains can induce ``emergent misalignment'' that generalizes broadly. Whether this brittleness reflects a fundamental lack of coherent internal organization for harmfulness remains unclear. Here we use targeted weight pruning as a causal intervention to probe the internal organization of harmfulness in LLMs. We find that harmful content generation depends on a compact set of weights that are general across harm types and distinct from benign capabilities. Aligned models exhibit a greater compression of harm generation weights than unaligned counterparts, indicating that alignment reshapes harmful representations internally--despite the brittleness of safety guardrails at the surface level. This compression explains emergent misalignment: if weights of harmful capabilities are compressed, fine-tuning that engages these weights in one domain can trigger broad misalignment. Consistent with this, pruning harm generation weights in a narrow domain substantially reduces emergent misalignment. Notably, LLMs harmful generation capability is dissociated from how they recognize and explain such content. Together, these results reveal a coherent internal structure for harmfulness in LLMs that may serve as a foundation for more principled approaches to safety.", 'score': 4, 'issue_id': 1892, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '64eac262157e6edc', 'authors': ['Hadas Orgad', 'Boyi Wei', 'Kaden Zheng', 'Martin Wattenberg', 'Peter Henderson', 'Seraphina Goldfarb-Tarrant', 'Yonatan Belinkov'], 'affiliations': ['Cohere', 'Harvard University', 'Kempner Institute, Harvard University', 'Princeton University', 'Technion-IIT'], 'pdf_title_img': 'assets/pdf/title_img/2604.09544.jpg', 'data': {'categories': ['#security', '#interpretability', '#alignment'], 'emoji': '🔍', 'ru': {'title': 'Вредоносная логика LLM скрыта в компактной внутренней структуре', 'desc': 'Исследователи использовали целевую обрезку весов в качестве инструмента для анализа внутренней структуры LLM и обнаружили, что генерация вредоносного контента зависит от компактного набора параметров, которые отличаются от способностей модели к безвредному поведению. Выравненные модели показывают большую степень сжатия этих вредоносных весов по сравнению с невыравненными, что объясняет хрупкость защиты моделей при переобучении на узких областях. Исследование показало, что при прямом воздействии на вредоносные веса во время fine-tuning можно значительно снизить вероятность возникновения неожиданного смещения поведения модели. Обнаруженная когерентная внутренняя структура вредоносного поведения открывает путь к более эффективным подходам обеспечения безопасности LLM.'}, 'en': {'title': 'Unpacking Harm: Understanding Internal Structures of Large Language Models', 'desc': 'This paper investigates how large language models (LLMs) generate harmful content and how this relates to their internal structure. It uses targeted weight pruning to identify that harmful content generation relies on a specific set of weights that are distinct from those used for benign tasks. The study finds that alignment training compresses these harmful weights, which can lead to emergent misalignment during fine-tuning. By pruning these weights, the authors demonstrate a significant reduction in misalignment, suggesting a coherent internal organization for harmfulness that could improve safety measures in LLMs.'}, 'zh': {'title': '揭示大型语言模型的有害性内部结构', 'desc': '这篇论文探讨了大型语言模型（LLMs）在生成有害内容时的内部结构。研究发现，有害内容的生成依赖于一组紧凑的权重，这些权重在不同类型的有害行为中是通用的，并且与良性能力是不同的。通过有针对性的权重剪枝，研究表明对齐模型在有害生成权重的压缩程度高于未对齐模型，这表明对齐过程在内部重塑了有害表示。最终，论文揭示了LLMs中有害性的内部结构，为更安全的AI系统提供了基础。'}}}, {'id': 'https://huggingface.co/papers/2604.09527', 'title': 'Envisioning the Future, One Step at a Time', 'url': 'https://huggingface.co/papers/2604.09527', 'abstract': 'Abstract Autoregressive diffusion models predict open-set future scene dynamics by modeling sparse point trajectories, enabling fast and scalable multi-modal motion prediction with physical plausibility.  AI-generated summary Accurately anticipating how complex, diverse scenes will evolve requires models that represent uncertainty, simulate along extended interaction chains, and efficiently explore many plausible futures. Yet most existing approaches rely on dense video or latent-space prediction, expending substantial capacity on dense appearance rather than on the underlying sparse trajectories of points in the scene. This makes large-scale exploration of future hypotheses costly and limits performance when long-horizon, multi-modal motion is essential. We address this by formulating the prediction of open-set future scene dynamics as step-wise inference over sparse point trajectories. Our autoregressive diffusion model advances these trajectories through short, locally predictable transitions, explicitly modeling the growth of uncertainty over time. This dynamics-centric representation enables fast rollout of thousands of diverse futures from a single image, optionally guided by initial constraints on motion, while maintaining physical plausibility and long-range coherence. We further introduce OWM, a benchmark for open-set motion prediction based on diverse in-the-wild videos, to evaluate accuracy and variability of predicted trajectory distributions under real-world uncertainty. Our method matches or surpasses dense simulators in predictive accuracy while achieving orders-of-magnitude higher sampling speed, making open-set future prediction both scalable and practical. Project page: http://compvis.github.io/myriad.', 'score': 4, 'issue_id': 1898, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '5c0d215fb8aa735e', 'authors': ['Stefan Andreas Baumann', 'Jannik Wiese', 'Tommaso Martorella', 'Mahdi M. Kalayeh', 'Björn Ommer'], 'affiliations': ['CompVis @ LMU Munich', 'Munich Center for Machine Learning (MCML)', 'Netflix'], 'pdf_title_img': 'assets/pdf/title_img/2604.09527.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#video'], 'emoji': '🌊', 'ru': {'title': 'Предсказание открытого множества будущих сцен через разреженные траектории с диффузией', 'desc': 'Работа представляет авторегрессивную диффузионную модель для предсказания будущей динамики сцен на основе редких траекторий точек. Модель предсказывает множественные модальности движения, явно моделируя рост неопределённости во времени через пошаговые локально предсказуемые переходы. Предложенный подход обеспечивает быструю генерацию тысяч физически правдоподобных вариантов развития сцены из одного изображения, при этом превосходя плотные симуляторы по скорости выборки на несколько порядков. Введён новый бенчмарк OWM для оценки качества распределений предсказанных траекторий в условиях реальной неопределённости.'}, 'en': {'title': 'Fast and Scalable Future Scene Prediction with Sparse Trajectories', 'desc': "This paper presents an autoregressive diffusion model that predicts future scene dynamics by focusing on sparse point trajectories instead of dense video data. By modeling uncertainty and simulating interactions over time, the model efficiently explores multiple plausible future scenarios. It allows for fast generation of diverse motion predictions while ensuring physical realism and coherence over long time horizons. The authors also introduce a new benchmark, OWM, to assess the model's performance in real-world conditions, demonstrating its superior speed and accuracy compared to traditional methods."}, 'zh': {'title': '高效的开放集未来场景预测', 'desc': '这篇论文提出了一种自回归扩散模型，用于预测开放集未来场景动态，重点在于稀疏点轨迹的建模。该模型能够快速且可扩展地进行多模态运动预测，同时保持物理上的合理性。与传统方法不同，论文中的方法通过短期的局部可预测过渡来推进轨迹，显著提高了对未来假设的探索效率。最后，作者还引入了一个新的基准OWM，用于评估在真实世界不确定性下的运动预测准确性和多样性。'}}}, {'id': 'https://huggingface.co/papers/2604.08801', 'title': 'p1: Better Prompt Optimization with Fewer Prompts', 'url': 'https://huggingface.co/papers/2604.08801', 'abstract': 'Abstract Research reveals that prompt optimization effectiveness depends on the balance between response stochasticity and system prompt quality variance, leading to the development of a filtering method that selects optimal user prompts for improved reasoning benchmark performance.  AI-generated summary Prompt optimization improves language models without updating their weights by searching for a better system prompt, but its effectiveness varies widely across tasks. We study what makes a task amenable to prompt optimization. We show that the reward variance across different system prompts can be decomposed into two components: variance among responses, which captures generation stochasticity, and variance among system prompts, which captures differences in system prompt quality. Prompt optimization succeeds when variance among system prompts is sufficiently large, but fails when variance among responses dominates the variance of the system prompts. Surprisingly, we further show that scaling to more user prompts can hurt optimization by reducing variance among system prompts, especially on heterogeneous datasets where different user prompts favor different system prompts. Motivated by this insight, we propose p1, a simple user prompt filtering method that selects a small subset of user prompts with high variance across candidate system prompts. This subset of user prompts allows one to distinguish a good system prompt from a bad one, making system optimization easier. Experiments on reasoning benchmarks show that p1 substantially improves prompt optimization over training on the full dataset and outperforms strong baselines such as GEPA. Notably, training on only two prompts from AIME 24 yields a system prompt that generalizes well to other reasoning benchmarks.', 'score': 3, 'issue_id': 1897, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'a505900c0443af84', 'authors': ['Zhaolin Gao', 'Yu', 'Wang', 'Bo Liu', 'Thorsten Joachims', 'Kianté Brantley', 'Wen Sun'], 'affiliations': ['Cornell University', 'Databricks AI Research', 'Harvard University', 'Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.08801.jpg', 'data': {'categories': ['#optimization', '#training', '#reasoning', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Баланс вариативности: ключ к эффективной оптимизации промптов', 'desc': 'В работе исследуется эффективность оптимизации системных промптов для языковых моделей без обновления весов. Авторы показывают, что вариативность наград можно разложить на две компоненты: вариативность ответов модели и вариативность качества системных промптов. Оптимизация промптов успешна, когда вариативность между системными промптами достаточно велика, но неудачна, когда доминирует стохастичность генерации ответов. На основе этих выводов предложен метод фильтрации пользовательских промптов, который выбирает подмножество с высокой дискриминативной способностью, значительно улучшая результаты на бенчмарках рассуждения.'}, 'en': {'title': 'Optimizing Prompts for Better AI Reasoning', 'desc': 'This paper explores how to improve the effectiveness of prompt optimization in language models by balancing response variability and the quality of system prompts. It identifies that successful prompt optimization occurs when the differences in system prompt quality are greater than the variability in responses generated. The authors introduce a filtering method called p1, which selects a small set of user prompts that exhibit high variance across different system prompts, enhancing the optimization process. Experiments demonstrate that this approach significantly outperforms traditional methods, leading to better performance on reasoning tasks without needing to retrain the model.'}, 'zh': {'title': '优化提示，提升推理表现！', 'desc': '本研究探讨了提示优化的有效性，发现其依赖于响应随机性与系统提示质量变化之间的平衡。我们提出了一种过滤方法，选择最佳用户提示，以提高推理基准的表现。研究表明，当系统提示之间的变化足够大时，提示优化能够成功，而当响应的变化主导时，优化则会失败。此外，我们的实验表明，使用少量高变异性的用户提示可以显著改善提示优化效果。'}}}, {'id': 'https://huggingface.co/papers/2604.09482', 'title': 'Process Reward Agents for Steering Knowledge-Intensive Reasoning', 'url': 'https://huggingface.co/papers/2604.09482', 'abstract': 'Abstract Process Reward Agents provide domain-grounded, online step-wise rewards for frozen policies in knowledge-intensive reasoning, enabling improved search-based decoding and generalizing across different model sizes without retraining.  AI-generated summary Reasoning in knowledge-intensive domains remains challenging as intermediate steps are often not locally verifiable: unlike math or code, evaluating step correctness may require synthesizing clues across large external knowledge sources. As a result, subtle errors can propagate through reasoning traces, potentially never to be detected. Prior work has proposed process reward models (PRMs), including retrieval-augmented variants, but these methods operate post hoc, scoring completed trajectories, which prevents their integration into dynamic inference procedures. Here, we introduce Process Reward Agents (PRA), a test-time method for providing domain-grounded, online, step-wise rewards to a frozen policy. In contrast to prior retrieval-augmented PRMs, PRA enables search-based decoding to rank and prune candidate trajectories at every generation step. Experiments on multiple medical reasoning benchmarks demonstrate that PRA consistently outperforms strong baselines, achieving 80.8% accuracy on MedQA with Qwen3-4B, a new state of the art at the 4B scale. Importantly, PRA generalizes to unseen frozen policy models ranging from 0.5B to 8B parameters, improving their accuracy by up to 25.7% without any policy model updates. More broadly, PRA suggests a paradigm in which frozen reasoners are decoupled from domain-specific reward modules, allowing the deployment of new backbones in complex domains without retraining.', 'score': 2, 'issue_id': 1898, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'e9291b387c601305', 'authors': ['Jiwoong Sohn', 'Tomasz Sternal', 'Kenneth Styppa', 'Torsten Hoefler', 'Michael Moor'], 'affiliations': ['ETH Zurich, Switzerland', 'Heidelberg University, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2604.09482.jpg', 'data': {'categories': ['#benchmark', '#inference', '#healthcare', '#science', '#rag', '#reasoning', '#agents'], 'emoji': '🏥', 'ru': {'title': 'Онлайн оценка шагов рассуждения для улучшения поиска в знаниеёмких задачах', 'desc': 'В статье представлены Process Reward Agents (PRA) — метод, который предоставляет пошаговые награды (reward signals) для замороженных политик в знаниеёмких задачах рассуждения, таких как медицинская диагностика. В отличие от предыдущих моделей процессных наград, PRA работает онлайн во время генерации, позволяя проводить поиск по траекториям и отсеивать неправильные пути уже на этапе вывода. Метод показывает значительные улучшения на медицинских бенчмарках и достигает новых результатов, при этом обобщаясь на модели разных размеров без переобучения. Подход открывает новую парадигму, где модули оценки, специфичные для домена, отделены от основной модели рассуждения.'}, 'en': {'title': 'Dynamic Rewards for Enhanced Reasoning in AI', 'desc': 'This paper introduces Process Reward Agents (PRA), a novel approach that provides real-time, step-wise rewards for fixed policies in knowledge-intensive reasoning tasks. Unlike previous methods that evaluate completed reasoning paths after the fact, PRA integrates rewards dynamically during the inference process, enhancing the search for optimal solutions. The method has been tested on medical reasoning benchmarks, achieving significant accuracy improvements without needing to retrain the underlying models. PRA demonstrates the potential to decouple reasoning models from domain-specific rewards, allowing for greater flexibility and efficiency in deploying AI systems across various applications.'}, 'zh': {'title': '过程奖励代理：提升知识推理的准确性', 'desc': '本文介绍了一种新的方法，称为过程奖励代理（PRA），用于在知识密集型推理中提供在线的逐步奖励。与以往的后处理奖励模型不同，PRA能够在每个生成步骤中对候选轨迹进行排名和修剪，从而提高推理的准确性。实验结果表明，PRA在多个医学推理基准测试中表现优异，尤其是在MedQA上达到了80.8%的准确率。更重要的是，PRA能够在不同规模的冻结策略模型上进行推广，提升其准确性，且无需对策略模型进行更新。'}}}, {'id': 'https://huggingface.co/papers/2604.09130', 'title': 'EquiformerV3: Scaling Efficient, Expressive, and General SE(3)-Equivariant Graph Attention Transformers', 'url': 'https://huggingface.co/papers/2604.09130', 'abstract': 'Abstract EquiformerV3 advances SE(3)-equivariant graph neural networks through enhanced efficiency, expressivity, and generality via optimized implementation, improved architectural components, and novel activation functions for accurate 3D atomic modeling.  AI-generated summary As SE(3)-equivariant graph neural networks mature as a core tool for 3D atomistic modeling, improving their efficiency, expressivity, and physical consistency has become a central challenge for large-scale applications. In this w
