ork, we introduce EquiformerV3, the third generation of the SE(3)-equivariant graph attention Transformer, designed to advance all three dimensions: efficiency, expressivity, and generality. Building on EquiformerV2, we have the following three key advances. First, we optimize the software implementation, achieving 1.75times speedup. Second, we introduce simple and effective modifications to EquiformerV2, including equivariant merged layer normalization, improved feedforward network hyper-parameters, and attention with smooth radius cutoff. Third, we propose SwiGLU-S^2 activations to incorporate many-body interactions for better theoretical expressivity and to preserve strict equivariance while reducing the complexity of sampling S^2 grids. Together, SwiGLU-S^2 activations and smooth-cutoff attention enable accurate modeling of smoothly varying potential energy surfaces (PES), generalizing EquiformerV3 to tasks requiring energy-conserving simulations and higher-order derivatives of PES. With these improvements, EquiformerV3 trained with the auxiliary task of denoising non-equilibrium structures (DeNS) achieves state-of-the-art results on OC20, OMat24, and Matbench Discovery.', 'score': 2, 'issue_id': 1897, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '055f8a6b0f8ffc38', 'authors': ['Yi-Lun Liao', 'Alexander J. Hoffman', 'Sabrina C. Shen', 'Alexandre Duval', 'Sam Walton Norwood', 'Tess Smidt'], 'affiliations': ['MIT', 'Meta', 'Valence Labs'], 'pdf_title_img': 'assets/pdf/title_img/2604.09130.jpg', 'data': {'categories': ['#architecture', '#training', '#3d'], 'emoji': '⚛️', 'ru': {'title': 'Быстрые и точные графовые нейросети для атомного моделирования', 'desc': 'EquiformerV3 — это третье поколение SE(3)-эквивариантной трансформер-архитектуры для моделирования трёхмерных атомных систем. Работа улучшает эффективность через оптимизацию кода (ускорение в 1.75 раза), повышает выразительность благодаря новым функциям активации SwiGLU-S² и модификациям нормализации слоёв. Авторы предлагают гладкую функцию отсечки для внимания, что позволяет точнее моделировать потенциальные поверхности энергии и сохранять физическую эквивариантность. Модель достигает лучших результатов на крупнейших бенчмарках OC20, OMat24 и Matbench Discovery для предсказания молекулярных свойств.'}, 'en': {'title': 'Revolutionizing 3D Atomic Modeling with EquiformerV3', 'desc': 'EquiformerV3 is a new version of SE(3)-equivariant graph neural networks that focuses on improving efficiency, expressivity, and generality for 3D atomic modeling. It achieves a significant speedup of 1.75 times through optimized software implementation and introduces new architectural components like equivariant merged layer normalization and enhanced feedforward networks. The novel SwiGLU-S^2 activation function allows for better modeling of many-body interactions while maintaining equivariance and simplifying the complexity of sampling. These advancements enable EquiformerV3 to accurately model potential energy surfaces and perform well on various benchmark tasks, setting new state-of-the-art results.'}, 'zh': {'title': '提升三维原子建模的效率与表现力', 'desc': 'EquiformerV3 是一种先进的 SE(3)-等变图神经网络，旨在通过优化实现、改进架构组件和新颖的激活函数来提高效率、表现力和通用性，以实现准确的三维原子建模。该模型在 EquiformerV2 的基础上进行了三项关键改进，包括软件实现的优化，使速度提高了 1.75 倍。其次，采用了简单有效的修改，如等变合并层归一化和改进的前馈网络超参数。最后，提出了 SwiGLU-S^2 激活函数，以更好地处理多体相互作用，同时保持严格的等变性，降低 S^2 网格采样的复杂性。'}}}, {'id': 'https://huggingface.co/papers/2604.08641', 'title': 'On Semiotic-Grounded Interpretive Evaluation of Generative Art', 'url': 'https://huggingface.co/papers/2604.08641', 'abstract': 'Abstract Generative art evaluation framework based on Peircean semiotics assesses symbolic and indexical meaning through hierarchical semiosis graphs, improving alignment with human artistic interpretation.  AI-generated summary Interpretation is essential to deciphering the language of art: audiences communicate with artists by recovering meaning from visual artifacts. However, current Generative Art (GenArt) evaluators remain fixated on surface-level image quality or literal prompt adherence, failing to assess the deeper symbolic or abstract meaning intended by the creator. We address this gap by formalizing a Peircean computational semiotic theory that models Human-GenArt Interaction (HGI) as cascaded semiosis. This framework reveals that artistic meaning is conveyed through three modes - iconic, symbolic, and indexical - yet existing evaluators operate heavily within the iconic mode, remaining structurally blind to the latter two. To overcome this structural blindness, we propose SemJudge. This evaluator explicitly assesses symbolic and indexical meaning in HGI via a Hierarchical Semiosis Graph (HSG) that reconstructs the meaning-making process from prompt to generated artifact. Extensive quantitative experiments show that SemJudge aligns more closely with human judgments than prior evaluators on an interpretation-intensive fine-art benchmark. User studies further demonstrate that SemJudge produces deeper, more insightful artistic interpretations, thereby paving the way for GenArt to move beyond the generation of "pretty" images toward a medium capable of expressing complex human experience. Project page: https://github.com/songrise/SemJudge.', 'score': 2, 'issue_id': 1895, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '06714182db2ca32b', 'authors': ['Ruixiang Jiang', 'Changwen Chen'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08641.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'От красоты к смыслу: оценка генеративного искусства через семиотику', 'desc': 'В работе предложена новая система оценки генеративного искусства, основанная на семиотической теории Пирса. Авторы показали, что существующие метрики оценивают только поверхностные характеристики изображений, игнорируя глубокий символический и индексальный смысл. Разработана модель SemJudge, которая использует иерархические графы семиозиса для реконструкции процесса создания смысла от текстового запроса к сгенерированному изображению. Экспериментальные результаты доказывают, что предложенный подход лучше согласуется с человеческими суждениями об искусстве и позволяет раскрыть более глубокие художественные интерпретации.'}, 'en': {'title': 'Unlocking Deeper Meaning in Generative Art Evaluation', 'desc': "This paper introduces a new framework called SemJudge for evaluating generative art, focusing on deeper meanings rather than just visual quality. It utilizes Peircean semiotics to analyze how art conveys meaning through three modes: iconic, symbolic, and indexical. The framework constructs a Hierarchical Semiosis Graph to better understand the interaction between human interpretations and AI-generated art. By doing so, SemJudge aligns more closely with human artistic judgments and enhances the evaluation of generative art's ability to express complex human experiences."}, 'zh': {'title': '超越表面，深入艺术的意义', 'desc': '本论文提出了一种基于皮尔士符号学的生成艺术评估框架，旨在通过层次化的符号图来评估艺术作品的象征性和指示性意义。当前的生成艺术评估者主要关注图像质量和字面提示，忽视了创作者所传达的更深层次的象征和抽象意义。我们提出的SemJudge评估器能够明确评估人类与生成艺术之间的互动，重建从提示到生成作品的意义构建过程。通过大量实验，SemJudge在艺术解读方面与人类判断更为一致，推动生成艺术超越单纯的“美丽”图像，表达复杂的人类体验。'}}}, {'id': 'https://huggingface.co/papers/2604.07786', 'title': 'Cross-Modal Emotion Transfer for Emotion Editing in Talking Face Video', 'url': 'https://huggingface.co/papers/2604.07786', 'abstract': 'Abstract A novel cross-modal emotion transfer approach generates expressive talking face videos by modeling emotion semantic vectors between speech and visual feature spaces, achieving superior emotion accuracy compared to existing methods.  AI-generated summary Talking face generation has gained significant attention as a core application of generative models. To enhance the expressiveness and realism of synthesized videos, emotion editing in talking face video plays a crucial role. However, existing approaches often limit expressive flexibility and struggle to generate extended emotions. Label-based methods represent emotions with discrete categories, which fail to capture a wide range of emotions. Audio-based methods can leverage emotionally rich speech signals - and even benefit from expressive text-to-speech (TTS) synthesis - but they fail to express the target emotions because emotions and linguistic contents are entangled in emotional speeches. Images-based methods, on the other hand, rely on target reference images to guide emotion transfer, yet they require high-quality frontal views and face challenges in acquiring reference data for extended emotions (e.g., sarcasm). To address these limitations, we propose Cross-Modal Emotion Transfer (C-MET), a novel approach that generates facial expressions based on speeches by modeling emotion semantic vectors between speech and visual feature spaces. C-MET leverages a large-scale pretrained audio encoder and a disentangled facial expression encoder to learn emotion semantic vectors that represent the difference between two different emotional embeddings across modalities. Extensive experiments on the MEAD and CREMA-D datasets demonstrate that our method improves emotion accuracy by 14% over state-of-the-art methods, while generating expressive talking face videos - even for unseen extended emotions. Code, checkpoint, and demo are available at https://chanhyeok-choi.github.io/C-MET/', 'score': 2, 'issue_id': 1892, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': 'a631746c107ae137', 'authors': ['Chanhyuk Choi', 'Taesoo Kim', 'Donggyu Lee', 'Siyeol Jung', 'Taehwan Kim'], 'affiliations': ['Ulsan National Institute of Science and Technology (UNIST)'], 'pdf_title_img': 'assets/pdf/title_img/2604.07786.jpg', 'data': {'categories': ['#audio', '#open_source', '#multimodal', '#video'], 'emoji': '😊', 'ru': {'title': 'Перенос эмоций через модальности: речь управляет мимикой', 'desc': 'Статья предлагает новый метод кросс-модального переноса эмоций (C-MET) для генерации выразительных видео говорящего лица на основе речи. Метод моделирует семантические векторы эмоций между пространствами признаков речи и визуальной информации, используя предобученный аудиоэнкодер и развязанный энкодер мимики лица. Подход решает проблему переплетения эмоционального содержания и лингвистической информации в эмоциональной речи, позволяя генерировать эмоции, которые модель не видела во время обучения. Экспериментальные результаты на датасетах MEAD и CREMA-D показывают улучшение точности распознавания эмоций на 14% по сравнению с существующими методами.'}, 'en': {'title': 'Bridging Speech and Emotion for Realistic Talking Faces', 'desc': 'This paper introduces a new method called Cross-Modal Emotion Transfer (C-MET) that improves the generation of expressive talking face videos by linking speech and visual features through emotion semantic vectors. Unlike previous methods that struggle with emotional flexibility and accuracy, C-MET effectively captures a wider range of emotions by disentangling emotional content from speech. The approach utilizes a pretrained audio encoder and a facial expression encoder to enhance the emotion transfer process, achieving a 14% improvement in emotion accuracy over existing techniques. This advancement allows for the generation of more realistic and expressive videos, even for complex emotions like sarcasm.'}, 'zh': {'title': '跨模态情感转移：生成生动的说话人脸视频', 'desc': '本文提出了一种新颖的跨模态情感转移方法（C-MET），旨在通过建模语音和视觉特征空间之间的情感语义向量，生成富有表现力的说话人脸视频。与现有方法相比，C-MET在情感准确性上提高了14%。该方法利用大规模预训练的音频编码器和解耦的面部表情编码器，学习不同情感嵌入之间的情感语义向量，从而克服了传统方法在情感表达上的局限性。实验结果表明，C-MET能够生成即使是未见过的扩展情感的生动说话人脸视频。'}}}, {'id': 'https://huggingface.co/papers/2604.09201', 'title': 'CT-1: Vision-Language-Camera Models Transfer Spatial Reasoning Knowledge to Camera-Controllable Video Generation', 'url': 'https://huggingface.co/papers/2604.09201', 'abstract': 'Abstract A Vision-Language-Camera model called CT-1 generates videos with accurate camera control by learning camera trajectories through diffusion transformers and wavelet regularization loss.  AI-generated summary Camera-controllable video generation aims to synthesize videos with flexible and physically plausible camera movements. However, existing methods either provide imprecise camera control from text prompts or rely on labor-intensive manual camera trajectory parameters, limiting their use in automated scenarios. To address these issues, we propose a novel Vision-Language-Camera model, termed CT-1 (Camera Transformer 1), a specialized model designed to transfer spatial reasoning knowledge to video generation by accurately estimating camera trajectories. Built upon vision-language modules and a Diffusion Transformer model, CT-1 employs a Wavelet-based Regularization Loss in the frequency domain to effectively learn complex camera trajectory distributions. These trajectories are integrated into a video diffusion model to enable spatially aware camera control that aligns with user intentions. To facilitate the training of CT-1, we design a dedicated data curation pipeline and construct CT-200K, a large-scale dataset containing over 47M frames. Experimental results demonstrate that our framework successfully bridges the gap between spatial reasoning and video synthesis, yielding faithful and high-quality camera-controllable videos and improving camera control accuracy by 25.7% over prior methods.', 'score': 1, 'issue_id': 1891, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'e704222813dd2e4b', 'authors': ['Haoyu Zhao', 'Zihao Zhang', 'Jiaxi Gu', 'Haoran Chen', 'Qingping Zheng', 'Pin Tang', 'Yeyin Jin', 'Yuang Zhang', 'Junqi Cheng', 'Zenghui Lu', 'Peng Shu', 'Zuxuan Wu', 'Yu-Gang Jiang'], 'affiliations': ['Fudan University', 'Shanghai Jiao Tong University', 'Tencent', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.09201.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#architecture', '#dataset', '#training', '#transfer_learning', '#video'], 'emoji': '🎥', 'ru': {'title': 'Точное управление движением камеры в видеосинтезе через пространственное рассуждение', 'desc': 'В работе представлена модель CT-1, которая объединяет vision-language понимание с генерацией видео под контролем камеры. Модель использует диффузионные трансформеры для точной оценки траекторий движения камеры на основе текстовых описаний и визуальной информации. Для эффективного обучения сложным распределениям траекторий применяется регуляризация в частотной области с использованием вейвлет-преобразования. Авторы создали большой датасет CT-200K с 47 миллионами кадров и достигли улучшения точности управления камерой на 25.7% по сравнению с существующими методами.'}, 'en': {'title': 'CT-1: Revolutionizing Video Generation with Smart Camera Control', 'desc': 'The paper introduces CT-1, a Vision-Language-Camera model that enhances video generation by enabling precise camera control through learned trajectories. It utilizes diffusion transformers and wavelet regularization loss to effectively capture complex camera movements, addressing limitations of previous methods that relied on manual input or provided inaccurate control. By integrating spatial reasoning into the video generation process, CT-1 allows for automated and user-aligned camera movements. The model is trained on a large dataset, CT-200K, which significantly improves camera control accuracy compared to existing techniques.'}, 'zh': {'title': 'CT-1：精确相机控制的视频生成新方法', 'desc': 'CT-1是一种视觉-语言-相机模型，能够通过扩散变换器和小波正则化损失生成具有精确相机控制的视频。该模型解决了现有方法在文本提示下相机控制不精确或依赖手动参数的问题。CT-1通过学习复杂的相机轨迹分布，结合视觉-语言模块和扩散变换器，提升了视频生成的空间感知能力。实验结果表明，CT-1在相机控制精度上比之前的方法提高了25.7%。'}}}, {'id': 'https://huggingface.co/papers/2604.08118', 'title': 'Initialisation Determines the Basin: Efficient Codebook Optimisation for Extreme LLM Quantization', 'url': 'https://huggingface.co/papers/2604.08118', 'abstract': 'Abstract Additive quantization for LLM compression faces challenges at 2-bit precision due to codebook initialization issues, which OA-EM addresses through output-aware EM initialization based on Hessian-weighted Mahalanobis distance.  AI-generated summary Additive quantization enables extreme LLM compression with O(1) lookup-table dequantization, making it attractive for edge deployment. Yet at 2-bit precision, it often fails catastrophically, even with extensive search and finetuning. We show that the dominant bottleneck is codebook initialisation. Greedy sequential initialisation frequently places the model in poor optimisation regions that subsequent beam search and PV-tuning struggle to overcome. We analyse this behaviour through the representational ratio ho = N/KM, which characterises the relationship between weight groups and codebook capacity, and propose OA-EM, an output-aware EM initialisation method using Hessian-weighted Mahalanobis distance. Across compression rates, search budgets, and three architectures (Llama 3.2 3B, Llama 3.1 8B, Qwen 2.5 3B), OA-EM consistently produces better solutions after PV-tuning and dominates the quality-compute frontier. The severity of the bottleneck scales with ho: moderate at 3 bpp but extreme at 2 bpp, where poor initialisation can degrade perplexity by orders of magnitude. More broadly, our results highlight the importance of optimisation geometry in compressed model spaces, where initialisation can dominate subsequent search and fine-tuning.', 'score': 1, 'issue_id': 1895, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '42a8f176fd8cb814', 'authors': ['Ian W. Kennedy', 'Nafise Sadat Moosavi'], 'affiliations': ['University of Sheffield'], 'pdf_title_img': 'assets/pdf/title_img/2604.08118.jpg', 'data': {'categories': ['#optimization', '#open_source'], 'emoji': '📦', 'ru': {'title': 'Правильная инициализация кодовой книги — ключ к успешному экстремальному сжатию LLM', 'desc': 'В статье рассматривается проблема аддитивной квантизации больших языковых моделей при экстремальном сжатии до 2 бит на параметр. Авторы показывают, что главное препятствие — инициализация кодовой книги, так как жадный последовательный подход часто помещает модель в локальные минимумы, из которых невозможно выбраться последующему поиску. Они предлагают OA-EM — метод инициализации, основанный на расстоянии Махаланобиса, взвешенном матрицей Гессе, с учётом выходных активаций модели. Экспериментально доказано, что предложенный метод конкурирует с существующими подходами по скорости и качеству, и что влияние инициализации масштабируется с соотношением репрезентационной ёмкости.'}, 'en': {'title': 'Optimizing Initialization for Better LLM Compression', 'desc': 'This paper addresses the challenges of using additive quantization for compressing large language models (LLMs) at 2-bit precision. The authors identify that poor codebook initialization is a major bottleneck that leads to suboptimal performance, particularly at lower bit rates. They propose a new initialization method called OA-EM, which utilizes Hessian-weighted Mahalanobis distance to improve the initialization process. The results show that OA-EM significantly enhances the quality of compressed models across various architectures and compression rates, emphasizing the critical role of optimization geometry in model compression.'}, 'zh': {'title': '优化初始化，提升LLM压缩效果', 'desc': '本文探讨了在2位精度下，针对大规模语言模型（LLM）压缩的加法量化面临的挑战，特别是代码本初始化问题。我们提出了一种新的输出感知EM初始化方法（OA-EM），该方法基于Hessian加权的Mahalanobis距离来改善初始化效果。研究表明，代码本初始化的质量直接影响模型的优化效果，尤其在2位精度下，劣质初始化会导致模型性能显著下降。通过对不同压缩率和架构的实验，OA-EM在后续的调优过程中表现出更优的解决方案，强调了优化几何在压缩模型空间中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.08540', 'title': 'AVGen-Bench: A Task-Driven Benchmark for Multi-Granular Evaluation of Text-to-Audio-Video Generation', 'url': 'https://huggingface.co/papers/2604.08540', 'abstract': 'Abstract AVGen-Bench presents a comprehensive benchmark for text-to-audio-video generation with multi-granular evaluation, revealing gaps between aesthetic quality and semantic accuracy.  AI-generated summary Text-to-Audio-Video (T2AV) generation is rapidly becoming a core interface for media creation, yet its evaluation remains fragmented. Existing benchmarks largely assess audio and video in isolation or rely on coarse embedding similarity, failing to capture the fine-grained joint correctness required by realistic prompts. We introduce AVGen-Bench, a task-driven benchmark for T2AV generation featuring high-quality prompts across 11 real-world categories. To support comprehensive assessment, we propose a multi-granular evaluation framework that combines lightweight specialist models with Multimodal Large Language Models (MLLMs), enabling evaluation from perceptual quality to fine-grained semantic controllability. Our evaluation reveals a pronounced gap between strong audio-visual aesthetics and weak semantic reliability, including persistent failures in text rendering, speech coherence, physical reasoning, and a universal breakdown in musical pitch control. Code and benchmark resources are available at http://aka.ms/avgenbench.', 'score': 1, 'issue_id': 1895, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '23edacbfd8914919', 'authors': ['Ziwei Zhou', 'Zeyuan Lai', 'Rui Wang', 'Yifan Yang', 'Zhen Xing', 'Yuqing Yang', 'Qi Dai', 'Lili Qiu', 'Chong Luo'], 'affiliations': ['Fudan University', 'Microsoft Research Asia', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.08540.jpg', 'data': {'categories': ['#survey', '#dataset', '#open_source', '#video', '#audio', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Когда красота обманывает: разрыв между эстетикой и семантикой в генерации мультимодального контента', 'desc': 'AVGen-Bench представляет комплексный бенчмарк для оценки генерации аудио-видео из текста с многоуровневым анализом. Авторы выявили критический разрыв между высоким эстетическим качеством генерируемого контента и слабой семантической точностью. Предложенная система оценки использует специализированные модели и мультимодальные большие языковые модели для анализа от общего качества восприятия до детального контроля семантики. Исследование обнаружило систематические проблемы с точностью текста, согласованностью речи, физическими законами и контролем музыкальной высоты тона.'}, 'en': {'title': 'Bridging Aesthetics and Semantics in T2AV Generation', 'desc': 'AVGen-Bench is a new benchmark designed to evaluate text-to-audio-video (T2AV) generation, focusing on both aesthetic quality and semantic accuracy. It addresses the limitations of existing benchmarks that often evaluate audio and video separately or use simple similarity measures. The framework includes high-quality prompts across various real-world categories and employs a multi-granular evaluation approach that integrates specialist models with Multimodal Large Language Models (MLLMs). The findings highlight significant discrepancies between the visual and auditory appeal of generated content and its semantic correctness, revealing common issues in text rendering and coherence.'}, 'zh': {'title': '音视频生成评估的新标准', 'desc': 'AVGen-Bench是一个全面的基准测试，用于文本到音频视频生成，具有多层次的评估方法。该研究揭示了美学质量与语义准确性之间的差距，指出现有评估方法往往孤立地评估音频和视频，未能捕捉到真实提示所需的细粒度联合正确性。我们提出了一个任务驱动的基准，涵盖11个真实世界类别的高质量提示，并结合轻量级专家模型与多模态大语言模型（MLLMs）进行综合评估。评估结果显示，音视频的美学表现强劲，但语义可靠性较弱，存在文本渲染、语音连贯性、物理推理和音乐音高控制等方面的持续失败。'}}}, {'id': 'https://huggingface.co/papers/2604.01848', 'title': "Semantic Richness or Geometric Reasoning? The Fragility of VLM's Visual Invariance", 'url': 'https://huggingface.co/papers/2604.01848', 'abstract': 'Abstract Vision-Language Models show significant vulnerabilities under geometric transformations, lacking robust spatial invariance and equivariance despite strong semantic capabilities.  AI-generated summary This work investigates the fundamental fragility of state-of-the-art Vision-Language Models (VLMs) under basic geometric transformations. While modern VLMs excel at semantic tasks such as recognizing objects in canonical orientations and describing complex scenes, they exhibit systematic failures at a more fundamental level: lack of robust spatial invariance and equivariance required to reliably determine object identity under simple rotations, scaling, and identity transformations. We demonstrate this limitation through a systematic evaluation across diverse visual domains, including symbolic sketches, natural photographs, and abstract art. Performance drops sharply as semantic content becomes sparse, and this behavior is observed across architectures, model capacities, and prompting strategies. Overall, our results reveal a systematic gap between semantic understanding and spatial reasoning in current VLMs, highlighting the need for stronger geometric grounding in future multimodal systems.', 'score': 1, 'issue_id': 1897, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '262f273942cfe20d', 'authors': ['Jason Qiu', 'Zachary Meurer', 'Xavier Thomas', 'Deepti Ghadiyaram'], 'affiliations': ['Boston University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01848.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Слепота к геометрии: как VLM теряют инвариантность под трансформациями', 'desc': 'Исследование выявило фундаментальную уязвимость современных Vision-Language Models перед геометрическими трансформациями, несмотря на их сильные семантические способности. Модели демонстрируют систематические ошибки при простых операциях поворота, масштабирования и идентичности изображений, теряя инвариантность и эквивариантность к пространственным изменениям. Проведено комплексное тестирование на разнообразных визуальных данных: символические эскизы, естественные фотографии и абстрактное искусство, показывающее падение производительности при разреженности семантического контента. Результаты демонстрируют критический разрыв между семантическим пониманием и пространственным рассуждением в мультимодальных системах.'}, 'en': {'title': 'Bridging the Gap: Enhancing Spatial Reasoning in Vision-Language Models', 'desc': 'This paper examines the weaknesses of Vision-Language Models (VLMs) when faced with geometric transformations like rotation and scaling. Although these models perform well in understanding and describing scenes semantically, they struggle with maintaining spatial invariance and equivariance, which are crucial for recognizing objects consistently. The authors conducted a thorough evaluation across various visual types, revealing that performance declines significantly when the semantic content is minimal. This study highlights the disconnect between semantic comprehension and spatial reasoning in VLMs, suggesting that future models need better geometric grounding.'}, 'zh': {'title': '视觉-语言模型的几何脆弱性', 'desc': '本研究探讨了当前视觉-语言模型（VLMs）在几何变换下的脆弱性。尽管这些模型在语义任务上表现出色，但在基本的几何变换（如旋转和缩放）中，它们缺乏必要的空间不变性和等变性。通过对多种视觉领域的系统评估，我们发现当语义内容稀疏时，模型性能显著下降。这表明当前的VLMs在语义理解与空间推理之间存在系统性差距，未来的多模态系统需要更强的几何基础。'}}}, {'id': 'https://huggingface.co/papers/2604.03480', 'title': 'Large Language Models Align with the Human Brain during Creative Thinking', 'url': 'https://huggingface.co/papers/2604.03480', 'abstract': 'Abstract Large language models show varying alignment with brain activity during creative thinking tasks, with model size and post-training objectives influencing how well their representations match neural responses in creativity-related brain networks.  AI-generated summary Creative thinking is a fundamental aspect of human cognition, and divergent thinking-the capacity to generate novel and varied ideas-is widely regarded as its core generative engine. Large language models (LLMs) have recently demonstrated impressive performance on divergent thinking tests and prior work has shown that models with higher task performance tend to be more aligned to human brain activity. However, existing brain-LLM alignment studies have focused on passive, non-creative tasks. Here, we explore brain alignment during creative thinking using fMRI data from 170 participants performing the Alternate Uses Task (AUT). We extract representations from LLMs varying in size (270M-72B) and measure alignment to brain responses via Representational Similarity Analysis (RSA), targeting the creativity-related default mode and frontoparietal networks. We find that brain-LLM alignment scales with model size (default mode network only) and idea originality (both networks), with effects strongest early in the creative process. We further show that post-training objectives shape alignment in functionally selective ways: a creativity-optimized Llama-3.1-8B-Instruct preserves alignment with high-creativity neural responses while reducing alignment with low-creativity ones; a human behavior fine-tuned model elevates alignment with both; and a reasoning-trained variant shows the opposite pattern, suggesting chain-of-thought training steers representations away from creative neural geometry toward analytical processing. These results demonstrate that post-training objectives selectively reshape LLM representations relative to the neural geometry of human creative thought.', 'score': 1, 'issue_id': 1894, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '1084d69922a3d43a', 'authors': ['Mete Ismayilzada', 'Simone A. Luchini', 'Abdulkadir Gokce', 'Badr AlKhamissi', 'Antoine Bosselut', 'Antonio Laverghetta', 'Lonneke van der Plas', 'Roger E. Beaty'], 'affiliations': ['EPFL', 'Paris Brain Institute (ICM)', 'Pennsylvania State University', 'Università della Svizzera italiana (USI)', 'Wesleyan University'], 'pdf_title_img': 'assets/pdf/title_img/2604.03480.jpg', 'data': {'categories': ['#training', '#multimodal', '#alignment', '#interpretability', '#reasoning', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Как обучение переформатирует представления LLM для креативности или аналитики', 'desc': 'Исследование показывает, что большие языковые модели по-разному согласуются с активностью мозга во время творческого мышления, при этом размер модели и объективы после обучения влияют на соответствие их представлений нейронным ответам в сетях мозга, связанных с креативностью. Учёные проанализировали данные функциональной магнитно-резонансной томографии от 170 участников, выполнявших задачу на альтернативное использование предметов, и сравнили представления моделей разных размеров с активностью сети режима по умолчанию и фронтопариетальной сети. Результаты демонстрируют, что выравнивание между мозгом и LLM масштабируется с размером модели и оригинальностью идей, с наиболее сильными эффектами в начале творческого процесса. Различные стратегии обучения (оптимизация для креативности, обучение на человеческом поведении, тренировка цепочки рассуждений) избирательно изменяют представления моделей, либо усиливая, либо ослабляя связь с нейронной геометрией человеческого творческого мышления.'}, 'en': {'title': 'Aligning AI Creativity with Human Brain Activity', 'desc': "This paper investigates how well large language models (LLMs) align with human brain activity during creative thinking tasks, specifically using fMRI data from participants performing the Alternate Uses Task. The study finds that larger models tend to align better with brain responses related to creativity, particularly in the default mode network. Additionally, the alignment is influenced by the model's post-training objectives, which can enhance or diminish the connection to creative neural responses. Overall, the research highlights the importance of model size and training goals in shaping LLM representations to reflect human creative thought processes."}, 'zh': {'title': '探索创造性思维中的大脑与大型语言模型的对齐', 'desc': '大型语言模型在创造性思维任务中与大脑活动的对齐程度各不相同，模型的大小和后训练目标会影响其表示与与创造力相关的大脑网络的匹配程度。创造性思维是人类认知的基本方面，而发散性思维被广泛认为是其核心生成引擎。研究表明，表现更好的模型通常与人类大脑活动的对齐程度更高。我们的研究使用fMRI数据，探讨了在创造性思维过程中大脑与大型语言模型的对齐情况，发现模型大小和创意新颖性对对齐有显著影响。'}}}, {'id': 'https://huggingface.co/papers/2604.08571', 'title': 'Robust Reasoning Benchmark', 'url': 'https://huggingface.co/papers/2604.08571', 'abstract': "Abstract Research reveals that large language models exhibit fragile reasoning capabilities when subjected to perturbations, with open-weight models showing significant accuracy drops and evidence of memory pollution in dense attention mechanisms.  AI-generated summary While Large Language Models (LLMs) achieve high performance on standard mathematical benchmarks, their underlying reasoning processes remain highly overfit to standard textual formatting. We propose a perturbation pipeline consisting of 14 techniques to evaluate robustness of LLM reasoning. We apply this pipeline to AIME 2024 dataset and evalute 8 state-of-the-art models on the resulting benchmark. While frontier models exhibit resilience, open weights reasoning models suffer catastrophic collapses (up to 55% average accuracy drops across perturbations and up to 100% on some), exposing structural fragility. To further disentangle mechanical parsing failures from downstream reasoning failures, we strictly isolate the models' working memory capacity by forcing models to solve multiple unperturbed mathematical problems sequentially within a single context window. Our results indicate that open weight models ranging from 7B to 120B parameters and Claude Opus 4.6 exhibit accuracy decay on subsequent problems. This degradation demonstrates that intermediate reasoning steps permanently pollute standard dense attention mechanisms. We argue that to achieve reliable reasoning, future reasoning architectures must integrate explicit contextual resets within a model's own Chain-of-Thought, leading to fundamental open questions regarding the optimal granularity of atomic reasoning tasks.", 'score': 1, 'issue_id': 1900, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '7bb45f8c35d45a80', 'authors': ['Pavel Golikov', 'Evgenii Opryshko', 'Gennady Pekhimenko', 'Mark C. Jeffrey'], 'affiliations': ['University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.08571.jpg', 'data': {'categories': ['#math', '#interpretability', '#architecture', '#security', '#reasoning', '#benchmark'], 'emoji': '🧩', 'ru': {'title': 'Хрупкость рассуждений в LLM: проблема загрязнения памяти внимания', 'desc': 'Исследование показывает, что большие языковые модели демонстрируют хрупкие способности к рассуждению при возмущениях входных данных, особенно модели с открытыми весами испытывают катастрофическое падение точности. Авторы предложили конвейер из 14 техник для оценки робастности рассуждений LLM и протестировали 8 моделей на датасете AIME 2024. Выяснилось, что открытые модели страдают от загрязнения памяти в механизмах плотного внимания, когда промежуточные шаги рассуждения постоянно снижают производительность на последующих задачах. Авторы предлагают интегрировать явные механизмы сброса контекста в архитектуру моделей рассуждения для достижения надёжности.'}, 'en': {'title': 'Strengthening Reasoning in Large Language Models', 'desc': 'This paper investigates the reasoning abilities of large language models (LLMs) when faced with perturbations, revealing that open-weight models experience significant accuracy drops and memory issues. The authors introduce a perturbation pipeline with 14 techniques to assess the robustness of LLM reasoning, applying it to the AIME 2024 dataset. Results show that while some advanced models maintain resilience, open-weight models suffer from severe performance degradation, indicating structural weaknesses in their reasoning processes. The study suggests that future models should incorporate mechanisms for contextual resets to improve reasoning reliability and addresses the need for better-defined atomic reasoning tasks.'}, 'zh': {'title': '揭示大型语言模型推理脆弱性', 'desc': '本研究揭示了大型语言模型在面对扰动时推理能力的脆弱性，开放权重模型的准确率显著下降，并且在密集注意机制中存在记忆污染的证据。尽管大型语言模型在标准数学基准测试中表现优异，但其推理过程对标准文本格式的过拟合问题依然严重。我们提出了一种包含14种技术的扰动管道，以评估大型语言模型的推理鲁棒性，并在AIME 2024数据集上对8个最先进的模型进行评估。结果表明，开放权重模型在后续问题上的准确率下降，显示出其结构脆弱性，未来的推理架构需要整合明确的上下文重置，以实现可靠的推理。'}}}, {'id': 'https://huggingface.co/papers/2604.09181', 'title': 'MixFlow: Mixed Source Distributions Improve Rectified Flows', 'url': 'https://huggingface.co/papers/2604.09181', 'abstract': 'Abstract Rectified flows and diffusion models are improved through κ-FC formulation that conditions the source distribution and MixFlow training strategy that reduces generative path curvatures and enhances sampling efficiency.  AI-generated summary Diffusion models and their variations, such as rectified flows, generate diverse and high-quality images, but they are still hindered by slow iterative sampling caused by the highly curved generative paths they learn. An important cause of high curvature, as shown by previous work, is independence between the source distribution (standard Gaussian) and the data distribution. In this work, we tackle this limitation by two complementary contributions. First, we attempt to break away from the standard Gaussian assumption by introducing κ-FC, a general formulation that conditions the source distribution on an arbitrary signal κ that aligns it better with the data distribution. Then, we present MixFlow, a simple but effective training strategy that reduces the generative path curvatures and considerably improves sampling efficiency. MixFlow trains a flow model on linear mixtures of a fixed unconditional distribution and a κ-FC-based distribution. This simple mixture improves the alignment between the source and data, provides better generation quality with less required sampling steps, and accelerates the training convergence considerably. On average, our training procedure improves the generation quality by 12\\% in FID compared to standard rectified flow and 7\\% compared to previous baselines under a fixed sampling budget. Code available at: https://github.com/NazirNayal8/MixFlow{https://github.com/NazirNayal8/MixFlow}', 'score': 0, 'issue_id': 1901, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'f3ee24755c6bf411', 'authors': ['Nazir Nayal', 'Christopher Wewer', 'Jan Eric Lenssen'], 'affiliations': ['Max Planck Institute for Informatics, Saarland Informatics Campus, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2604.09181.jpg', 'data': {'categories': ['#diffusion', '#open_source', '#optimization'], 'emoji': '🌊', 'ru': {'title': 'Выпрямление пути к быстрой генерации через согласование распределений', 'desc': 'Работа улучшает диффузионные модели и спрямленные потоки через формулировку κ-FC, которая лучше согласует исходное распределение с распределением данных. Предложена стратегия обучения MixFlow, которая уменьшает кривизну генеративных путей и повышает эффективность выборки. Метод обучается на линейных смесях условного и безусловного распределений, что улучшает выравнивание между источником и данными. На практике подход повышает качество генерации на 12% по метрике FID по сравнению со стандартными спрямленными потоками.'}, 'en': {'title': 'Enhancing Generative Models with κ-FC and MixFlow', 'desc': 'This paper presents improvements to diffusion models and rectified flows through a new formulation called κ-FC, which conditions the source distribution to better match the data distribution. The authors identify that the high curvature of generative paths in these models leads to inefficient sampling. To address this, they introduce MixFlow, a training strategy that combines a fixed unconditional distribution with the κ-FC distribution, reducing path curvatures and enhancing sampling efficiency. The results show a significant increase in generation quality and faster training convergence compared to existing methods.'}, 'zh': {'title': '提升生成效率与质量的创新方法', 'desc': '本论文提出了一种改进的生成模型方法，称为κ-FC和MixFlow，旨在提高图像生成的效率和质量。κ-FC通过引入任意信号κ来调整源分布，使其更好地与数据分布对齐，从而打破了传统高斯分布的假设。MixFlow是一种简单有效的训练策略，通过对固定无条件分布和κ-FC分布的线性混合进行训练，减少了生成路径的曲率。实验结果表明，该方法在FID指标上比标准的修正流提高了12%的生成质量，且在固定采样预算下比之前的基线提高了7%。'}}}, {'id': 'https://huggingface.co/papers/2604.04987', 'title': 'Cactus: Accelerating Auto-Regressive Decoding with Constrained Acceptance Speculative Sampling', 'url': 'https://huggingface.co/papers/2604.04987', 'abstract': "Abstract Speculative sampling methods are enhanced by formulating them as constrained optimization problems, enabling controlled distribution divergence while maintaining high acceptance rates and output quality.  AI-generated summary Speculative sampling (SpS) has been successful in accelerating the decoding throughput of auto-regressive large language models by leveraging smaller draft models. SpS strictly enforces the generated distribution to match that of the verifier LLM. This is unnecessarily restrictive as slight variations of the verifier's distribution, such as sampling with top-k or temperature, would also be acceptable. Typical acceptance sampling (TAS) alleviates this issue by accepting more tokens using entropy-based heuristics. However, this approach distorts the verifier distribution, potentially degrading output quality when the verifier encodes critical information. In this work, we formalize the speculative sampling algorithm through the lens of constrained optimization. Based on this formulation, we propose Cactus (constrained acceptance speculative sampling), a method that guarantees controlled divergence from the verifier distribution and increasing acceptance rates. Empirical results across a wide range of benchmarks confirm the effectiveness of our approach.", 'score': 0, 'issue_id': 1900, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': 'df64fd852c53acaf', 'authors': ['Yongchang Hao', 'Lili Mou'], 'affiliations': ['Alberta Machine Intelligence Institute (Amii)', 'CIFAR', 'University of Alberta'], 'pdf_title_img': 'assets/pdf/title_img/2604.04987.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Контролируемое спекулятивное семплирование через условную оптимизацию', 'desc': 'В статье предлагается новый подход к спекулятивному семплированию, формализованный как задача условной оптимизации. Авторы вводят метод Cactus, который позволяет контролировать расхождение от распределения верификатора LLM, одновременно увеличивая долю принятых токенов. Это решает проблему классического спекулятивного семплирования, которое слишком строго требует совпадения распределений, и проблему методов на основе эвристик энтропии, которые искажают распределение верификатора. Экспериментальные результаты демонстрируют эффективность предложенного метода на различных бенчмарках.'}, 'en': {'title': 'Cactus: Optimizing Speculative Sampling for Better Acceptance Rates', 'desc': "This paper introduces a new method called Cactus, which improves speculative sampling in machine learning by treating it as a constrained optimization problem. By allowing controlled divergence from the verifier's distribution, Cactus increases the acceptance rates of generated tokens while maintaining high output quality. The method addresses the limitations of traditional speculative sampling and typical acceptance sampling, which can either be too restrictive or distort the verifier's distribution. Empirical results show that Cactus effectively balances the trade-off between acceptance rates and output fidelity across various benchmarks."}, 'zh': {'title': '受限优化提升投机采样效果', 'desc': '本论文提出了一种新的方法，称为Cactus（受限接受的投机采样），旨在改进投机采样技术。通过将投机采样视为受限优化问题，Cactus能够在保持高接受率的同时，控制与验证模型分布的偏差。与传统的接受采样方法相比，Cactus在不损害输出质量的情况下，允许更灵活的分布变化。实验结果表明，该方法在多个基准测试中表现出色，验证了其有效性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (2)', '#agi', '#alignment (3)', '#architecture (7)', '#audio (2)', '#benchmark (11)', '#cv (4)', '#data (1)', '#dataset (9)', '#diffusion (6)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare (2)', '#inference (4)', '#interpretability (3)', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (11)', '#open_source (8)', '#optimization (9)', '#plp', '#rag (1)', '#reasoning (6)', '#rl (1)', '#rlhf', '#robotics', '#science (3)', '#security (3)', '#small_models (2)', '#story_generation', '#survey (1)', '#synthetic (3)', '#training (9)', '#transfer_learning (1)', '#video (7)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-13 21:41',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-13 21:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-13 21:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
