    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.05015', 'title': 'Video-MME-v2: Towards the Next Stage in Benchmarks for Comprehensive Video Understanding', 'url': 'https://huggingface.co/papers/2604.05015', 'abstract': 'Abstract Video-MME-v2 presents a comprehensive benchmark for evaluating video understanding models through a progressive hierarchy and group-based evaluation to assess robustness and faithfulness.  AI-generated summary With the rapid advancement of video understanding, existing benchmarks are becoming increasingly saturated, exposing a critical discrepancy between inflated leaderboard scores and real-world model capabilities. To address this widening gap, we introduce Video-MME-v2, a comprehensive benchmark designed to rigorously evaluate the robustness and faithfulness of video understanding. To systematically evaluate model capabilities, we design a progressive tri-level hierarchy that incrementally increases the complexity of video comprehension, ranging from multi-point visual information aggregation, to temporal dynamics modeling, and ultimately to complex multimodal reasoning. Besides, in contrast to conventional per-question accuracy, we propose a group-based non-linear evaluation strategy that enforces both consistency across related queries and coherence in multi-step reasoning. It penalizes fragmented or guess-based correctness and assigns credit only to answers supported by valid reasoning. To guarantee data quality, Video-MME-v2 is constructed through a rigorously controlled human annotation pipeline, involving 12 annotators and 50 independent reviewers. Backed by 3,300 human-hours and up to 5 rounds of quality assurance, Video-MME-v2 aims to serve as one of the most authoritative video benchmarks. Extensive experiments reveal a substantial gap between current best model Gemini-3-Pro and human experts, and uncover a clear hierarchical bottleneck where errors in visual information aggregation and temporal modeling propagate to limit high-level reasoning. We further find that thinking-based reasoning is highly dependent on textual cues, improving performance with subtitles but sometimes degrading it in purely visual settings. By exposing these limitations, Video-MME-v2 establishes a demanding new testbed for the development of next-generation video MLLMs.', 'score': 189, 'issue_id': 1837, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'be3d40989525a754', 'authors': ['Chaoyou Fu', 'Haozhi Yuan', 'Yuhao Dong', 'Yi-Fan Zhang', 'Yunhang Shen', 'Xiaoxing Hu', 'Xueying Li', 'Jinsen Su', 'Chengwu Long', 'Xiaoyao Xie', 'Yongkang Xie', 'Xiawu Zheng', 'Xue Yang', 'Haoyu Cao', 'Yunsheng Wu', 'Ziwei Liu', 'Xing Sun', 'Caifeng Shan', 'Ran He'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.05015.jpg', 'data': {'categories': ['#survey', '#dataset', '#video', '#reasoning', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Честная оценка видео-понимания: от простого к сложному', 'desc': 'Video-MME-v2 представляет комплексный бенчмарк для оценки моделей понимания видео, включающий трёхуровневую иерархию задач с возрастающей сложностью: от агрегации визуальной информации к моделированию временной динамики и сложному мультимодальному рассуждению. Авторы предлагают групповую нелинейную стратегию оценки вместо стандартной точности по вопросам, которая штрафует фрагментарные ответы и требует логического обоснования. Бенчмарк построен на основе строгого процесса человеческой аннотации с участием 12 аннотаторов и 50 рецензентов, прошедших до 5 раундов проверки качества. Исследование выявило значительный разрыв между лучшей современной моделью и человеческим уровнем, а также показало, что ошибки на низких уровнях иерархии распространяются на высокоуровневое рассуждение.'}, 'en': {'title': 'Raising the Bar for Video Understanding Evaluation', 'desc': 'Video-MME-v2 is a new benchmark for evaluating video understanding models, focusing on their robustness and faithfulness. It introduces a tri-level hierarchy that progressively tests models on visual information aggregation, temporal dynamics, and complex reasoning. The evaluation method is group-based, ensuring that models are penalized for inconsistent or unsupported answers, promoting coherent multi-step reasoning. This benchmark highlights significant gaps between current models and human performance, revealing critical areas for improvement in video comprehension tasks.'}, 'zh': {'title': '视频理解的新基准：Video-MME-v2', 'desc': 'Video-MME-v2是一个全面的基准，用于评估视频理解模型的鲁棒性和可信度。它通过逐步的三级层次结构，逐渐增加视频理解的复杂性，从多点视觉信息聚合到时间动态建模，再到复杂的多模态推理。该基准采用基于组的非线性评估策略，强调相关查询之间的一致性和多步骤推理的连贯性。通过严格的人类标注流程，Video-MME-v2旨在成为最权威的视频基准之一，揭示了当前模型与人类专家之间的显著差距。'}}}, {'id': 'https://huggingface.co/papers/2604.06132', 'title': 'Claw-Eval: Toward Trustworthy Evaluation of Autonomous Agents', 'url': 'https://huggingface.co/papers/2604.06132', 'abstract': 'Abstract Claw-Eval addresses limitations in agent benchmarks by providing comprehensive evaluation across multiple modalities with trajectory-aware grading and safety assessments.  AI-generated summary Large language models are increasingly deployed as autonomous agents executing multi-step workflows in real-world software environments. However, existing agent benchmarks suffer from three critical limitations: (1) trajectory-opaque grading that checks only final outputs, (2) underspecified safety and robustness evaluation, and (3) narrow modality coverage and interaction paradigms. We introduce Claw-Eval, an end-to-end evaluation suite addressing all three gaps. It comprises 300 human-verified tasks spanning 9 categories across three groups (general service orchestration, multimodal perception and generation, and multi-turn professional dialogue). Every agent action is recorded through three independent evidence channels (execution traces, audit logs, and environment snapshots), enabling trajectory-aware grading over 2,159 fine-grained rubric items. The scoring protocol evaluates Completion, Safety, and Robustness, reporting Average Score, Pass@k, and Pass^k across three trials to distinguish genuine capability from lucky outcomes. Experiments on 14 frontier models reveal that: (1) trajectory-opaque evaluation is systematically unreliable, missing 44% of safety violations and 13% of robustness failures that our hybrid pipeline catches; (2) controlled error injection primarily degrades consistency rather than peak capability, with Pass^3 dropping up to 24% while Pass@3 remains stable; (3) multimodal performance varies sharply, with most models performing poorer on video than on document or image, and no single model dominating across all modalities. Beyond benchmarking, Claw-Eval highlights actionable directions for agent development, shedding light on what it takes to build agents that are not only capable but reliably deployable.', 'score': 87, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '301bbb6d9ebb97c8', 'authors': ['Bowen Ye', 'Rang Li', 'Qibin Yang', 'Yuanxin Liu', 'Linli Yao', 'Hanglong Lv', 'Zhihui Xie', 'Chenxin An', 'Lei Li', 'Lingpeng Kong', 'Qi Liu', 'Zhifang Sui', 'Tong Yang'], 'affiliations': ['State Key Laboratory of Multimedia Information Processing, School of Computer Science, Peking University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.06132.jpg', 'data': {'categories': ['#multimodal', '#agents', '#benchmark', '#video'], 'emoji': '🦾', 'ru': {'title': 'Траекторно-ориентированная оценка надежности и безопасности автономных агентов', 'desc': 'Claw-Eval — это комплексный набор инструментов для оценки автономных агентов на основе больших языковых моделей, которые выполняют многошаговые задачи в реальных программных окружениях. Бенчмарк включает 300 проверенных задач в 9 категориях и использует три независимых канала сбора доказательств (трассировки выполнения, журналы аудита и снимки состояния окружения) для траекторно-ориентированной оценки. Система оценивает не только завершенность задач, но и безопасность работы агентов, а также их устойчивость к ошибкам через протокол с множественными испытаниями. Экспериментальное тестирование на 14 передовых моделях показало критические недостатки традиционных подходов и выявило особенности мультимодальной производительности агентов.'}, 'en': {'title': 'Claw-Eval: Elevating AI Agent Evaluation Beyond Final Outputs', 'desc': 'Claw-Eval is a new evaluation framework designed to improve how we assess AI agents in various tasks. It addresses key issues in current benchmarks, such as only checking final results without considering the entire process, and lacking thorough safety and robustness checks. The framework includes a wide range of tasks and uses detailed tracking of agent actions to provide a more accurate evaluation of their performance. By revealing the strengths and weaknesses of different models across multiple modalities, Claw-Eval aims to guide the development of more reliable AI agents.'}, 'zh': {'title': 'Claw-Eval：智能体评估的新标准', 'desc': 'Claw-Eval 是一个全面的评估工具，旨在解决现有智能体基准测试的局限性。它通过轨迹感知评分和安全性评估，提供跨多种模式的综合评估。该工具包含300个经过人工验证的任务，涵盖9个类别，记录每个智能体的动作，以便进行细致的评分。实验结果表明，传统的评估方法存在系统性不可靠的问题，而 Claw-Eval 能够更准确地捕捉安全性和鲁棒性问题。'}}}, {'id': 'https://huggingface.co/papers/2604.04949', 'title': 'Learning to Retrieve from Agent Trajectories', 'url': 'https://huggingface.co/papers/2604.04949', 'abstract': 'Abstract Retrieval models for agentic search should be trained directly from agent interaction data using a new paradigm that mines supervision from multi-step agent trajectories and incorporates relevance intensity through weighted optimization.  AI-generated summary Information retrieval (IR) systems have traditionally been designed and trained for human users, with learning-to-rank methods relying heavily on large-scale human interaction logs such as clicks and dwell time. With the rapid emergence of large language model (LLM) powered search agents, however, retrieval is increasingly consumed by agents rather than human beings, and is embedded as a core component within multi-turn reasoning and action loops. In this setting, retrieval models trained under human-centric assumptions exhibit a fundamental mismatch with the way agents issue queries and consume results. In this work, we argue that retrieval models for agentic search should be trained directly from agent interaction data. We introduce learning to retrieve from agent trajectories as a new training paradigm, where supervision is derived from multi-step agent interactions. Through a systematic analysis of search agent trajectories, we identify key behavioral signals that reveal document utility, including browsing actions, unbrowsed rejections, and post-browse reasoning traces. Guided by these insights, we propose LRAT, a simple yet effective framework that mines high-quality retrieval supervision from agent trajectories and incorporates relevance intensity through weighted optimization. Extensive experiments on both in-domain and out-of-domain deep research benchmarks demonstrate that retrievers trained with LRAT consistently improve evidence recall, end-to-end task success, and execution efficiency across diverse agent architectures and scales. Our results highlight agent trajectories as a practical and scalable supervision source, pointing to a promising direction for retrieval in the era of agentic search.', 'score': 50, 'issue_id': 1837, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'cc07697e04acb4e0', 'authors': ['Yuqi Zhou', 'Sunhao Dai', 'Changle Qu', 'Liang Pang', 'Jun Xu', 'Ji-Rong Wen'], 'affiliations': ['CAS Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.04949.jpg', 'data': {'categories': ['#training', '#agents', '#benchmark', '#rag'], 'emoji': '🕵️', 'ru': {'title': 'Обучение поиска напрямую от поведения агентов', 'desc': 'В работе предлагается новая парадигма обучения моделей поиска для агентов на основе прямого анализа данных взаимодействия с агентами вместо традиционного обучения на логах пользователей. Авторы вводят метод LRAT, который извлекает сигналы релевантности из многошаговых траекторий агентов, включая действия просмотра документов и рассуждения агента после ознакомления с результатами. Предложенный подход использует взвешенную оптимизацию с учётом интенсивности релевантности документов для агентских запросов. Эксперименты показывают, что такой метод обучения последовательно улучшает полноту поиска и эффективность выполнения задач агентами по сравнению с традиционными подходами.'}, 'en': {'title': 'Empowering AI Agents with Tailored Retrieval Models', 'desc': 'This paper introduces a new approach to training retrieval models specifically for AI agents, rather than traditional human users. It emphasizes the importance of using data from multi-step interactions of agents to better understand how they search for and utilize information. The authors propose a framework called LRAT, which optimizes retrieval based on behavioral signals from agent trajectories, such as browsing actions and reasoning processes. Their experiments show that this method significantly enhances the performance of retrieval systems in various tasks, making it a valuable advancement in the field of information retrieval for AI agents.'}, 'zh': {'title': '从代理轨迹中学习检索的新方法', 'desc': '本论文提出了一种新的训练范式，用于从代理交互数据中直接训练检索模型，以适应代理搜索的需求。我们引入了从代理轨迹中学习检索的方法，通过多步代理交互获取监督信号，并通过加权优化来考虑相关性强度。研究表明，代理的浏览行为、未浏览拒绝和浏览后的推理痕迹等关键行为信号可以有效揭示文档的实用性。通过LRAT框架，我们的实验结果显示，使用该方法训练的检索器在证据召回、任务成功率和执行效率等方面均有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2604.03922', 'title': 'ACES: Who Tests the Tests? Leave-One-Out AUC Consistency for Code Generation', 'url': 'https://huggingface.co/papers/2604.03922', 'abstract': "Abstract Researchers address the challenge of selecting correct code candidates from LLM-generated outputs by developing ACES, a method that ranks tests based on their ability to distinguish correct from incorrect code through leave-one-out evaluation and AUC consistency scoring.  AI-generated summary Selecting LLM-generated code candidates using LLM-generated tests is challenging because the tests themselves may be incorrect. Existing methods either treat all tests equally or rely on ad-hoc heuristics to filter unreliable tests. Yet determining test correctness requires knowing which codes are correct, creating a circular dependency. Our key insight is that we need not determine test correctness at all: test votes should rank, not merely count. What matters is not how many codes pass a test, but whether the test can distinguish correct from incorrect code. We break the circular dependency via leave-one-out evaluation: hold out one test, rank codes by their aggregate scores on all remaining tests, and measure whether the held-out test's pass/fail pattern agrees with this ranking. We formalize this agreement as the leave-one-out AUC~(LOO-AUC) and prove that the expected LOO-AUC is proportional to each test's ability to separate correct code from incorrect code. Building on this, we propose ACES~(AUC ConsistEncy Scoring) with two complementary variants: ACES-C provides closed-form weights that provably approximate the oracle in expectation under a mild assumption on average test quality; ACES-O drops this assumption and iteratively optimizes a differentiable LOO-AUC objective. Both operate solely on the binary pass matrix with negligible overhead, and achieve state-of-the-art Pass@k on multiple code generation benchmarks.", 'score': 41, 'issue_id': 1837, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': 'd4b406ad9d3ef10c', 'authors': ['Hui Sun', 'Yun-Ji Zhang', 'Zheng Xie', 'Ren-Biao Liu', 'Yali Du', 'Xin-Ye Li', 'Ming Li'], 'affiliations': ['National Key Laboratory for Novel Software Technology, Nanjing University, China', 'School of Artificial Intelligence, Nanjing University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.03922.jpg', 'data': {'categories': ['#plp', '#benchmark'], 'emoji': '✅', 'ru': {'title': 'Ранжирование тестов вместо подсчёта голосов для выбора LLM-кода', 'desc': 'Исследователи разработали ACES, метод для выбора правильных кандидатов кода из выходов LLM путём ранжирования тестов по их способности различать корректный и некорректный код. Ключевая идея заключается в том, что не нужно определять корректность самих тестов, а вместо этого следует оценить, насколько хорошо тест разделяет правильные и неправильные решения. Метод использует leave-one-out оценку и AUC консистентность для измерения способности каждого теста отличать корректный код от некорректного. ACES предлагает две реализации: ACES-C с закрытой формой весов и ACES-O с итеративной оптимизацией, обе достигают лучших результатов на бенчмарках генерации кода.'}, 'en': {'title': 'ACES: Ranking Tests to Select Correct Code Candidates', 'desc': 'The paper introduces ACES, a novel method for selecting the best code candidates from outputs generated by large language models (LLMs). It addresses the issue of unreliable tests by focusing on the ability of tests to distinguish between correct and incorrect code rather than simply counting how many codes pass. The authors propose a leave-one-out evaluation strategy to break the circular dependency of needing to know test correctness, allowing for a more effective ranking of code candidates. ACES includes two variants that optimize the scoring of tests based on their ability to separate correct from incorrect code, achieving state-of-the-art results in code generation tasks.'}, 'zh': {'title': 'ACES：提升代码候选选择的智能方法', 'desc': '研究人员提出了一种名为ACES的方法，旨在从大型语言模型生成的代码输出中选择正确的代码候选项。该方法通过留一法评估和AUC一致性评分来对测试进行排名，以区分正确和错误的代码。与现有方法不同，ACES不需要确定测试的正确性，而是通过测试的投票来进行排名。最终，ACES在多个代码生成基准上实现了最先进的Pass@k表现。'}}}, {'id': 'https://huggingface.co/papers/2604.01591', 'title': 'ThinkTwice: Jointly Optimizing Large Language Models for Reasoning and Self-Refinement', 'url': 'https://huggingface.co/papers/2604.01591', 'abstract': 'Abstract ThinkTwice is a two-phase framework that jointly optimizes large language models for reasoning and self-refinement using Group Relative Policy Optimization, demonstrating improved performance on mathematical reasoning benchmarks.  AI-generated summary We introduce ThinkTwice, a simple two-phase framework that jointly optimizes LLMs to solve reasoning problems and refine the answers, based on Group Relative Policy Optimization (GRPO). In each pair of training steps, ThinkTwice first optimizes the model on solving reasoning problems, then optimizes it on refining its own solutions to the same problems, using the same binary correctness reward in both phases without correctness signals or critique annotations. Across five mathematical reasoning benchmarks and two model families including Qwen3-4B and Olmo3-7B, ThinkTwice substantially improves both reasoning and refinement performance over competitive online policy optimization baselines. Specifically, on Qwen3-4B, ThinkTwice outperforms GRPO on AIME by 5 percentage points before refinement and by 11.5 points after one self-refinement step, measured by pass@4. Analysis of the training dynamics of ThinkTwice reveals an implicit rectify-then-fortify curriculum: refinement predominantly corrects errors early in training and naturally shifts toward preserving already-correct solutions as the model improves, yielding a more rectified reward signal. Our work establishes joint training of reasoning and self-refinement as a principled and effective methodology for RLVR.', 'score': 27, 'issue_id': 1837, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '3be2978f114daf5d', 'authors': ['Difan Jiao', 'Qianfeng Wen', 'Blair Yang', 'Zhenwei Tang', 'Ashton Anderson'], 'affiliations': ['Coolwei AI Lab', 'Department of Computer Science, University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.01591.jpg', 'data': {'categories': ['#small_models', '#optimization', '#training', '#reasoning', '#math', '#rlhf'], 'emoji': '🧠', 'ru': {'title': 'Двойное мышление: совместная оптимизация рассуждений и самокоррекции', 'desc': 'ThinkTwice — это двухфазная архитектура для совместной оптимизации больших языковых моделей, которая использует Group Relative Policy Optimization для одновременного улучшения навыков логического рассуждения и самокоррекции. Модель тренируется на решении задач математического рассуждения и последующем уточнении собственных ответов, используя только бинарный сигнал корректности без дополнительных аннотаций. Метод демонстрирует значительные улучшения на пяти бенчмарках математического рассуждения, включая AIME, превосходя базовые линии политического обучения. Анализ показал, что тренировка следует неявному curriculum learning, где уточнение сначала исправляет ошибки, а затем переходит к сохранению уже правильных решений.'}, 'en': {'title': 'ThinkTwice: Enhancing Reasoning and Self-Refinement in LLMs', 'desc': 'ThinkTwice is a novel two-phase framework designed to enhance large language models (LLMs) by optimizing their reasoning capabilities and self-refinement processes. It employs Group Relative Policy Optimization (GRPO) to train the models in two steps: first, solving reasoning tasks, and second, refining their own answers without needing external correctness feedback. The framework has shown significant improvements in performance on various mathematical reasoning benchmarks, outperforming existing online policy optimization methods. The training dynamics suggest that ThinkTwice effectively transitions from correcting early errors to maintaining correct solutions as the model matures, leading to a more robust learning process.'}, 'zh': {'title': '推理与自我修正的联合优化', 'desc': 'ThinkTwice是一个两阶段框架，旨在通过群体相对策略优化（GRPO）共同优化大型语言模型的推理和自我修正能力。该方法在训练过程中，首先优化模型解决推理问题的能力，然后优化模型对自身解决方案的修正能力。通过在五个数学推理基准和两个模型系列（包括Qwen3-4B和Olmo3-7B）上的测试，ThinkTwice显著提高了推理和修正的性能。我们的研究表明，推理与自我修正的联合训练是一种有效的强化学习方法。'}}}, {'id': 'https://huggingface.co/papers/2604.05404', 'title': 'Beyond Accuracy: Unveiling Inefficiency Patterns in Tool-Integrated Reasoning', 'url': 'https://huggingface.co/papers/2604.05404', 'abstract': 'Abstract Researchers introduce PTE (Prefill Token Equivalents), a hardware-aware metric for measuring efficiency in Tool-Integrated Reasoning scenarios, which better correlates with actual inference latency than traditional token counts by accounting for KV-Cache inefficiencies and long tool responses.  AI-generated summary In real-world Tool-Integrated Reasoning (TIR) scenarios, where LLMs interleave reasoning with external tool calls, a major source of inefficiency is that the toolcalls create pauses between LLM requests and cause KV-Cache eviction, forcing recomputation. Also, the long, unfiltered response returned by external tools inflates the KV-Cache, so each decode step spends more time loading the growing cache and thus becomes steadily slower as context length increases. However, existing efficiency metrics like token counts and toolcall counts fail to capture the real model inference latency. To address this, we introduce PTE (Prefill Token Equivalents), a hardware-aware TIR-efficiency metric that unifies internal reasoning and external tool-use costs while explicitly accounting for non-reusable KV-Cache and long-tool-response scenarios. Validation in a high-concurrency industrial setting indicates that PTE aligns significantly better with wall-clock latency than standard token counts, while maintaining consistent efficiency rankings across diverse hardware profiles. We conduct extensive experiments across five TIR benchmarks, quantify their PTE costs, and identify four inefficiency patterns that appear in TIR. We also discover that trajectories with higher PTE costs tend to have lower reasoning correctness, indicating that simply using more tools does not improve the quality of the answer.', 'score': 26, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '0b30633f0a703c50', 'authors': ['Qisheng Su', 'Shiting Huang', 'Zhen Fang', 'Ziyan Chen', 'Zehui Chen', 'Feng Zhao'], 'affiliations': ['MoE Key Lab of BIPC, University of Science and Technology of China', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.05404.jpg', 'data': {'categories': ['#optimization', '#inference', '#long_context', '#reasoning', '#benchmark', '#agents'], 'emoji': '⚡', 'ru': {'title': 'Правильная метрика для измерения скорости работы с инструментами', 'desc': 'Исследователи предложили новую метрику PTE (Prefill Token Equivalents) для измерения эффективности LLM в сценариях Tool-Integrated Reasoning, где модели чередуют рассуждение с вызовами внешних инструментов. Метрика учитывает неэффективность KV-Cache, которая возникает из-за пауз между запросами и переиспользования кэша, а также из-за длинных ответов от инструментов. PTE показывает значительно лучшую корреляцию с реальной задержкой вывода, чем традиционные метрики подсчёта токенов, и остаётся консистентной на разных аппаратных конфигурациях. Анализ пяти benchmark-ов выявил четыре паттерна неэффективности и показал, что большее количество инструментов не гарантирует улучшение качества ответов модели.'}, 'en': {'title': 'PTE: A Smarter Way to Measure AI Efficiency', 'desc': 'This paper presents PTE (Prefill Token Equivalents), a new metric designed to measure the efficiency of Tool-Integrated Reasoning (TIR) in machine learning models. Unlike traditional metrics that only count tokens, PTE takes into account the inefficiencies caused by KV-Cache evictions and the delays from long tool responses, which can significantly affect inference latency. The researchers validate PTE in real-world scenarios, showing that it correlates better with actual latency than existing methods, while also maintaining consistent efficiency rankings across different hardware. Additionally, they identify patterns of inefficiency in TIR and find that higher PTE costs are associated with lower reasoning accuracy, suggesting that more tool usage does not necessarily lead to better answers.'}, 'zh': {'title': '引入PTE：提升工具集成推理效率的关键指标', 'desc': '研究人员提出了PTE（Prefill Token Equivalents），这是一种考虑硬件因素的效率度量，用于评估工具集成推理场景中的效率。与传统的令牌计数相比，PTE更好地与实际推理延迟相关，因为它考虑了KV-Cache的低效和工具响应时间过长的问题。在实际的工具集成推理中，工具调用会导致LLM请求之间的暂停，并造成KV-Cache的清空，迫使重新计算。通过在高并发工业环境中的验证，PTE与实际延迟的相关性显著高于标准的令牌计数，同时在不同硬件配置中保持一致的效率排名。'}}}, {'id': 'https://huggingface.co/papers/2604.04934', 'title': 'Vanast: Virtual Try-On with Human Image Animation via Synthetic Triplet Supervision', 'url': 'https://huggingface.co/papers/2604.04934', 'abstract': 'Abstract Vanast is a unified framework that generates garment-transferred human animation videos by combining image-based virtual try-on and pose-driven animation in a single process, addressing issues like identity drift and garment distortion through triplet supervision and dual module architecture.  AI-generated summary We present Vanast, a unified framework that generates garment-transferred human animation videos directly from a single human image, garment images, and a pose guidance video. Conventional two-stage pipelines treat image-based virtual try-on and pose-driven animation as separate processes, which often results in identity drift, garment distortion, and front-back inconsistency. Our model addresses these issues by performing the entire process in a single unified step to achieve coherent synthesis. To enable this setting, we construct large-scale triplet supervision. Our data generation pipeline includes generating identity-preserving human images in alternative outfits that differ from garment catalog images, capturing full upper and lower garment triplets to overcome the single-garment-posed video pair limitation, and assembling diverse in-the-wild triplets without requiring garment catalog images. We further introduce a Dual Module architecture for video diffusion transformers to stabilize training, preserve pretrained generative quality, and improve garment accuracy, pose adherence, and identity preservation while supporting zero-shot garment interpolation. Together, these contributions allow Vanast to produce high-fidelity, identity-consistent animation across a wide range of garment types.', 'score': 26, 'issue_id': 1837, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'f6519762cc89f75f', 'authors': ['Hyunsoo Cha', 'Wonjung Woo', 'Byungjun Kim', 'Hanbyul Joo'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04934.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#dataset', '#video'], 'emoji': '👗', 'ru': {'title': 'Единая генеративная модель для реалистичной примерки и анимации человека в разной одежде', 'desc': 'Vanast — это единый фреймворк для синтеза видео с анимацией человека в различной одежде, который объединяет виртуальную примерку одежды на изображениях и анимацию, управляемую позой, в одном процессе. Вместо двухэтапного подхода, который приводит к смещению личности и искажению одежды, модель использует единую архитектуру с дуальным модулем видео-диффузионного трансформера. Для обучения авторы создали набор данных с триплет-супервизией, включающий множество комбинаций изображений человека, вариантов одежды и видео поз. Фреймворк достигает высокого качества синтеза, сохраняя идентичность человека, точность позы и детали одежды, а также поддерживает интерполяцию между различными вариантами одежды без дополнительного обучения.'}, 'en': {'title': 'Seamless Animation: Transforming Garments with Identity Consistency', 'desc': 'Vanast is a novel framework that creates animated videos of humans wearing different garments by integrating virtual try-on and pose-driven animation into one seamless process. This approach helps to eliminate common problems like identity drift and garment distortion that occur when these tasks are handled separately. By utilizing triplet supervision and a Dual Module architecture, Vanast ensures that the generated animations maintain high fidelity and consistency in identity and garment appearance. The framework also supports zero-shot garment interpolation, allowing for diverse and realistic animations across various clothing types.'}, 'zh': {'title': 'Vanast：统一的服装转移动画生成框架', 'desc': 'Vanast是一个统一框架，通过结合基于图像的虚拟试穿和姿态驱动的动画，直接从单个人物图像生成服装转移的人类动画视频。传统的两阶段流程将这两个过程分开，导致身份漂移和服装失真等问题。我们的模型通过单一步骤完成整个过程，从而实现一致的合成效果。我们还引入了双模块架构，以稳定训练并提高服装准确性、姿态遵循性和身份保留。'}}}, {'id': 'https://huggingface.co/papers/2604.06170', 'title': 'Paper Circle: An Open-source Multi-agent Research Discovery and Analysis Framework', 'url': 'https://huggingface.co/papers/2604.06170', 'abstract': 'Abstract A multi-agent system called Paper Circle is presented that automates the discovery and analysis of scientific literature through integrated retrieval and knowledge graph construction capabilities.  AI-generated summary The rapid growth of scientific literature has made it increasingly difficult for researchers to efficiently discover, evaluate, and synthesize relevant work. Recent advances in multi-agent large language models (LLMs) have demonstrated strong potential for understanding user intent and are being trained to utilize various tools. In this paper, we introduce Paper Circle, a multi-agent research discovery and analysis system designed to reduce the effort required to find, assess, organize, and understand academic literature. The system comprises two complementary pipelines: (1) a Discovery Pipeline that integrates offline and online retrieval from multiple sources, multi-criteria scoring, diversity-aware ranking, and structured outputs; and (2) an Analysis Pipeline that transforms individual papers into structured knowledge graphs with typed nodes such as concepts, methods, experiments, and figures, enabling graph-aware question answering and coverage verification. Both pipelines are implemented within a coder LLM-based multi-agent orchestration framework and produce fully reproducible, synchronized outputs including JSON, CSV, BibTeX, Markdown, and HTML at each agent step. This paper describes the system architecture, agent roles, retrieval and scoring methods, knowledge graph schema, and evaluation interfaces that together form the Paper Circle research workflow. We benchmark Paper Circle on both paper retrieval and paper review generation, reporting hit rate, MRR, and Recall at K. Results show consistent improvements with stronger agent models. We have publicly released the website at https://papercircle.vercel.app/ and the code at https://github.com/MAXNORM8650/papercircle.', 'score': 17, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '50511eaac1bbc71d', 'authors': ['Komal Kumar', 'Aman Chadha', 'Salman Khan', 'Fahad Shahbaz Khan', 'Hisham Cholakkal'], 'affiliations': ['AWS Generative AI Innovation Center, Amazon Web Services', 'Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.06170.jpg', 'data': {'categories': ['#rag', '#graphs', '#benchmark', '#agents', '#open_source', '#science'], 'emoji': '📚', 'ru': {'title': 'Автоматизация открытия и анализа научной литературы через многоагентную систему', 'desc': 'Представлен Paper Circle — многоагентная система на основе LLM, которая автоматизирует поиск и анализ научных статей. Система состоит из двух взаимодополняющих конвейеров: Pipeline обнаружения интегрирует retrieval из множества источников с многокритериальной оценкой и ранжированием, а Pipeline анализа преобразует статьи в структурированные knowledge graphs с типизированными узлами. Оба конвейера реализованы в рамках многоагентной оркестровки на основе coder LLM и выдают полностью воспроизводимые синхронизированные выходные данные в различных форматах. Система показывает стабильные улучшения на задачах retrieval и generation обзоров при использовании более мощных языковых моделей.'}, 'en': {'title': 'Revolutionizing Research Discovery with Paper Circle', 'desc': 'The paper introduces Paper Circle, a multi-agent system designed to streamline the discovery and analysis of scientific literature. It features two main components: a Discovery Pipeline for retrieving and ranking papers, and an Analysis Pipeline that creates structured knowledge graphs from the literature. By leveraging large language models (LLMs), Paper Circle enhances the efficiency of finding and evaluating academic work. The system outputs data in various formats, ensuring reproducibility and ease of use for researchers.'}, 'zh': {'title': 'Paper Circle：文献发现与分析的智能助手', 'desc': '本文介绍了一种名为Paper Circle的多智能体系统，旨在自动化科学文献的发现和分析。该系统通过集成检索和知识图谱构建功能，帮助研究人员更高效地找到、评估和组织相关文献。Paper Circle包含两个互补的流程：发现流程和分析流程，前者负责从多个来源检索文献，后者则将文献转化为结构化的知识图谱。通过使用大型语言模型，该系统能够生成可重复的输出格式，如JSON和CSV，提升了文献研究的效率。'}}}, {'id': 'https://huggingface.co/papers/2604.04323', 'title': 'How Well Do Agentic Skills Work in the Wild: Benchmarking LLM Skill Usage in Realistic Settings', 'url': 'https://huggingface.co/papers/2604.04323', 'abstract': 'Abstract Research demonstrates that skill utilization in LLM-based agents degrades significantly under realistic conditions where skills must be retrieved and refined rather than handcrafted, though targeted refinement strategies can partially restore performance.  AI-generated summary Agent skills, which are reusable, domain-specific knowledge artifacts, have become a popular mechanism for extending LLM-based agents, yet formally benchmarking skill usage performance remains scarce. Existing skill benchmarking efforts focus on overly idealized conditions, where LLMs are directly provided with hand-crafted, narrowly-tailored task-specific skills for each task, whereas in many realistic settings, the LLM agent may have to search for and select relevant skills on its own, and even the closest matching skills may not be well-tailored for the task. In this paper, we conduct the first comprehensive study of skill utility under progressively challenging realistic settings, where agents must retrieve skills from a large collection of 34k real-world skills and may not have access to any hand-curated skills. Our findings reveal that the benefits of skills are fragile: performance gains degrade consistently as settings become more realistic, with pass rates approaching no-skill baselines in the most challenging scenarios. To narrow this gap, we study skill refinement strategies, including query-specific and query-agnostic approaches, and we show that query-specific refinement substantially recovers lost performance when the initial skills are of reasonable relevance and quality. We further demonstrate the generality of retrieval and refinement on Terminal-Bench 2.0, where they improve the pass rate of Claude Opus 4.6 from 57.7% to 65.5%. Our results, consistent across multiple models, highlight both the promise and the current limitations of skills for LLM-based agents. Our code is available at https://github.com/UCSB-NLP-Chang/Skill-Usage.', 'score': 17, 'issue_id': 1837, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '9c82e5020adb1078', 'authors': ['Yujian Liu', 'Jiabao Ji', 'Li An', 'Tommi Jaakkola', 'Yang Zhang', 'Shiyu Chang'], 'affiliations': ['MIT CSAIL', 'MIT-IBM Watson AI Lab', 'UC Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2604.04323.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Поиск и адаптация навыков спасают LLM-агентов от деградации в реальном мире', 'desc': 'Исследование показывает, что качество использования навыков в агентах на основе LLM значительно ухудшается в реалистичных условиях, когда навыки нужно найти и адаптировать вместо того, чтобы использовать заранее подготовленные. Авторы проводят первое комплексное исследование эффективности навыков при прогрессивно усложняющихся сценариях, где агенты должны выбирать релевантные навыки из коллекции из 34 тысяч реальных навыков. Результаты демонстрируют, что производительность деградирует по мере приближения к реальным условиям, однако целенаправленная адаптация навыков, особенно специфичная для запроса, может существенно восстановить потерянную производительность. Исследование подтверждает как потенциал, так и текущие ограничения использования навыков в LLM-агентах.'}, 'en': {'title': 'Unlocking the Power of Skills in LLM Agents', 'desc': 'This paper investigates how well large language model (LLM) agents can use reusable skills in real-world scenarios. It finds that performance drops significantly when agents must retrieve and refine skills instead of using pre-made ones. The study introduces skill refinement strategies that help improve performance, especially when the initial skills are relevant. Overall, the research highlights both the potential and challenges of using skills in LLM-based agents.'}, 'zh': {'title': '技能利用的挑战与机遇', 'desc': '本研究探讨了在现实条件下，基于大型语言模型（LLM）的代理在技能利用方面的显著下降。研究发现，代理在没有手工制作技能的情况下，需要从34000个真实世界技能中检索和选择相关技能，导致性能下降。我们提出了技能精炼策略，包括特定查询和无查询的方法，发现特定查询的精炼可以显著恢复性能。我们的实验结果表明，尽管技能的潜力巨大，但在现实应用中仍存在明显的局限性。'}}}, {'id': 'https://huggingface.co/papers/2604.04215', 'title': 'DARE: Diffusion Large Language Models Alignment and Reinforcement Executor', 'url': 'https://huggingface.co/papers/2604.04215', 'abstract': 'Abstract Diffusion large language models are gaining attention as alternatives to autoregressive models, utilizing iterative denoising and parallel generation instead of sequential token processing, yet their open-source landscape is fragmented, prompting the development of a unified framework for post-training and evaluation.  AI-generated summary Diffusion large language models (dLLMs) are emerging as a compelling alternative to dominant autoregressive models, replacing strictly sequential token generation with iterative denoising and parallel generation dynamics. However, their open-source ecosystem remains fragmented across model families and, in particular, across post-training pipelines, where reinforcement learning objectives, rollout implementations and evaluation scripts are often released as paper-specific codebases. This fragmentation slows research iteration, raises the engineering burden of reproduction, and makes fair comparison across algorithms difficult. We present DARE (dLLMs Alignment and Reinforcement Executor), an open framework for post-training and evaluating dLLMs. Built on top of verl~sheng2024hybridflow and OpenCompass~2023opencompass, DARE unifies supervised fine-tuning, parameter-efficient fine-tuning, preference optimization, and dLLM-specific reinforcement learning under a shared execution stack for both masked and block diffusion language models. Across representative model families including LLaDA, Dream, SDAR, and LLaDA2.x, DARE provides broad algorithmic coverage, reproducible benchmark evaluation, and practical acceleration. Extensive empirical results position that DARE serves as a reusable research substrate for developing, comparing, and deploying post-training methods for current and emerging dLLMs.', 'score': 15, 'issue_id': 1840, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': 'a46face5c7742ace', 'authors': ['Jingyi Yang', 'Yuxian Jiang', 'Xuhao Hu', 'Shuang Cheng', 'Biqing Qi', 'Jing Shao'], 'affiliations': ['Fudan University', 'Shanghai AI Laboratory', 'Shanghai Artificial Intelligence Laboratory', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04215.jpg', 'data': {'categories': ['#training', '#diffusion', '#benchmark', '#architecture', '#rl', '#open_source', '#alignment'], 'emoji': '🔄', 'ru': {'title': 'Унифицированная платформа для обучения диффузионных языковых моделей', 'desc': 'В статье представлена DARE — единая платформа для обучения и оценки диффузионных больших языковых моделей, которые используют итеративное шумоподавление и параллельную генерацию вместо последовательной обработки токенов. Авторы решают проблему фрагментированности экосистемы дLLM, где каждая работа использует собственную реализацию методов обучения с подкреплением и оценки. Фреймворк DARE объединяет supervised fine-tuning, parameter-efficient fine-tuning, preference optimization и специфичные для дLLM методы reinforcement learning в единый стек выполнения. Платформа протестирована на репрезентативных семействах моделей и обеспечивает воспроизводимость, справедливое сравнение алгоритмов и практическое ускорение исследований.'}, 'en': {'title': 'DARE: Unifying Post-Training for Diffusion Language Models', 'desc': 'This paper introduces DARE, a unified framework designed for the post-training and evaluation of diffusion large language models (dLLMs). Unlike traditional autoregressive models, dLLMs utilize iterative denoising and parallel generation, which can enhance performance but also complicate the open-source landscape. The fragmentation in existing tools and pipelines makes it challenging for researchers to reproduce results and compare different algorithms effectively. DARE aims to streamline this process by integrating various training methods and providing a consistent platform for evaluating dLLMs across multiple model families.'}, 'zh': {'title': '统一后训练与评估的框架DARE', 'desc': '扩散大语言模型（dLLMs）作为自回归模型的替代方案，采用迭代去噪和并行生成的方式，而不是顺序处理标记。然而，当前的开源生态系统在模型家族和后训练管道方面存在碎片化问题，导致研究迭代缓慢和重现性工程负担加重。为了解决这些问题，我们提出了DARE（dLLMs对齐与强化执行器），这是一个用于后训练和评估dLLMs的开放框架。DARE统一了监督微调、参数高效微调、偏好优化和特定于dLLM的强化学习，提供了广泛的算法覆盖和可重复的基准评估。'}}}, {'id': 'https://huggingface.co/papers/2604.05117', 'title': 'Watch Before You Answer: Learning from Visually Grounded Post-Training', 'url': 'https://huggingface.co/papers/2604.05117', 'abstract': 'Abstract Vision-language models face challenges in video understanding due to text-based biases in benchmarks and datasets, which are addressed through VidGround, a method that uses only visually grounded questions for post-training to improve performance.  AI-generated summary It is critical for vision-language models (VLMs) to comprehensively understand visual, temporal, and textual cues. However, despite rapid progress in multimodal modeling, video understanding performance still lags behind text-based reasoning. In this work, we find that progress is even worse than previously assumed: commonly reported long video understanding benchmarks contain 40-60% of questions that can be answered using text cues alone. Furthermore, we find that these issues are also pervasive in widely used post-training datasets, potentially undercutting the ability of post-training to improve VLM video understanding performance. Guided by this observation, we introduce VidGround as a simple yet effective solution: using only the actual visually grounded questions without any linguistic biases for post-training. When used in tandem with RL-based post-training algorithms, this simple technique improves performance by up to 6.2 points relative to using the full dataset, while using only 69.1% of the original post-training data. Moreover, we show that data curation with a simple post-training algorithm outperforms several more complex post-training techniques, highlighting that data quality is a major bottleneck for improving video understanding in VLMs. These results underscore the importance of curating post-training data and evaluation benchmarks that truly require visual grounding to advance the development of more capable VLMs. Project page: http://vidground.etuagi.com.', 'score': 11, 'issue_id': 1840, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '25a9e25c3181b28c', 'authors': ['Yuxuan Zhang', 'EunJeong Hwang', 'Huaisong Zhang', 'Penghui Du', 'Yiming Jia', 'Dongfu Jiang', 'Xuan He', 'Shenhui Zhang', 'Ping Nie', 'Peter West', 'Kelsey R. Allen'], 'affiliations': ['Etude AI', 'Kolors Team, Kuaishou Technology', 'University of British Columbia', 'University of Illinois at Urbana-Champaign', 'University of Toronto', 'University of Waterloo', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.05117.jpg', 'data': {'categories': ['#training', '#benchmark', '#multimodal', '#data', '#video', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Чистые данные важнее сложных методов: как улучшить видеопонимание моделей через визуальную обоснованность', 'desc': 'В работе выявлено, что современные бенчмарки для видеопонимания содержат значительное количество вопросов, которые можно ответить, опираясь только на текст, что приводит к переоценке возможностей видеоязыковых моделей. Авторы предлагают метод VidGround, который использует только визуально обоснованные вопросы для дообучения моделей, исключая текстовые предубеждения из данных. Благодаря такой фильтрации данных, модель достигает улучшения производительности на 6.2 пункта при использовании всего 69% исходного датасета для дообучения. Исследование демонстрирует, что качество данных является критическим узким местом в развитии видеопонимания для мультимодальных моделей больше, чем сложность алгоритмов обучения.'}, 'en': {'title': 'Enhancing Video Understanding with Visually Grounded Questions', 'desc': "This paper addresses the challenges faced by vision-language models (VLMs) in understanding videos due to biases in existing benchmarks and datasets. The authors introduce VidGround, a method that focuses on using visually grounded questions for post-training, which helps improve the model's performance. They reveal that many questions in current benchmarks can be answered using text alone, which undermines the effectiveness of VLMs in video understanding. By curating high-quality, visually grounded data, VidGround enhances performance significantly while reducing reliance on biased datasets."}, 'zh': {'title': '提升视频理解，消除文本偏见！', 'desc': '本研究探讨了视觉语言模型在视频理解中的挑战，主要是由于基准和数据集中的文本偏见。我们提出了一种名为VidGround的方法，通过仅使用实际的视觉基础问题进行后训练，以提高模型性能。研究表明，常用的长视频理解基准中，40-60%的问题仅能通过文本线索回答，这影响了模型的表现。通过与基于强化学习的后训练算法结合，VidGround能够在使用69.1%原始数据的情况下，提升性能达6.2个百分点，强调了数据质量在视频理解中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.05091', 'title': 'MegaTrain: Full Precision Training of 100B+ Parameter Large Language Models on a Single GPU', 'url': 'https://huggingface.co/papers/2604.05091', 'abstract': 'Abstract MegaTrain enables efficient training of large language models with over 100 billion parameters on a single GPU by utilizing host memory storage and optimized data streaming techniques.  AI-generated summary We present MegaTrain, a memory-centric system that efficiently trains 100B+ parameter large language models at full precision on a single GPU. Unlike traditional GPU-centric systems, MegaTrain stores parameters and optimizer states in host memory (CPU memory) and treats GPUs as transient compute engines. For each layer, we stream parameters in and compute gradients out, minimizing persistent device state. To battle the CPU-GPU bandwidth bottleneck, we adopt two key optimizations. 1) We introduce a pipelined double-buffered execution engine that overlaps parameter prefetching, computation, and gradient offloading across multiple CUDA streams, enabling continuous GPU execution. 2) We replace persistent autograd graphs with stateless layer templates, binding weights dynamically as they stream in, eliminating persistent graph metadata while providing flexibility in scheduling. On a single H200 GPU with 1.5TB host memory, MegaTrain reliably trains models up to 120B parameters. It also achieves 1.84times the training throughput of DeepSpeed ZeRO-3 with CPU offloading when training 14B models. MegaTrain also enables 7B model training with 512k token context on a single GH200.', 'score': 11, 'issue_id': 1838, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '072ae6c0b416f24d', 'authors': ['Zhengqing Yuan', 'Hanchi Sun', 'Lichao Sun', 'Yanfang Ye'], 'affiliations': ['Lehigh University', 'University of Notre Dame'], 'pdf_title_img': 'assets/pdf/title_img/2604.05091.jpg', 'data': {'categories': ['#inference', '#open_source', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Обучение гигантских моделей на одном GPU через оптимизацию памяти и потоковой передачи данных', 'desc': 'MegaTrain — это система, ориентированная на эффективное использование памяти, которая позволяет обучать большие языковые модели с параметрами свыше 100 миллиардов на одном GPU с полной точностью. В отличие от традиционных подходов, параметры модели и состояния оптимизатора хранятся в памяти хоста (CPU), а GPU используется как вычислительный ускоритель. Система применяет два ключевых оптимизации: конвейерное двойное буферизирование для перекрытия загрузки параметров и разгрузки градиентов, а также замену постоянных графов автодифференцирования на шаблоны слоёв без состояния. На одном GPU H200 с 1.5 ТБ хост-памяти система достигает пропускной способности в 1.84 раза выше, чем DeepSpeed ZeRO-3 с разгрузкой на CPU при обучении моделей размером 14B параметров.'}, 'en': {'title': 'Revolutionizing Large Model Training with MegaTrain', 'desc': 'MegaTrain is a novel system designed for training large language models with over 100 billion parameters using a single GPU. It shifts the storage of model parameters and optimizer states to host memory, allowing the GPU to focus solely on computation. By implementing a pipelined double-buffered execution engine, MegaTrain enhances the efficiency of data streaming, ensuring continuous GPU operation. Additionally, it utilizes stateless layer templates to streamline the training process, significantly improving throughput compared to existing methods like DeepSpeed ZeRO-3.'}, 'zh': {'title': 'MegaTrain：单 GPU 高效训练超大语言模型', 'desc': 'MegaTrain 是一个高效训练大型语言模型的系统，能够在单个 GPU 上训练超过 1000 亿参数的模型。它通过将参数和优化器状态存储在主机内存中，优化数据流技术，使得 GPU 可以作为临时计算引擎。该系统采用了双缓冲执行引擎和无状态层模板等关键优化，解决了 CPU-GPU 带宽瓶颈问题。MegaTrain 在单个 H200 GPU 上可以可靠地训练高达 120B 参数的模型，并且在训练 14B 模型时，其训练吞吐量比 DeepSpeed ZeRO-3 高出 1.84 倍。'}}}, {'id': 'https://huggingface.co/papers/2603.24652', 'title': 'Demystifying When Pruning Works via Representation Hierarchies', 'url': 'https://huggingface.co/papers/2603.24652', 'abstract': 'Abstract Network pruning affects different representation spaces differently, leading to varying performance across tasks due to instability in probability space transformations during generation.  AI-generated summary Network pruning, which removes less important parameters or architectures, is often expected to improve efficiency while preserving performance. However, this expectation does not consistently hold across language tasks: pruned models can perform well on non-generative tasks but frequently fail in generative settings. To understand this discrepancy, we analyze network pruning from a representation-hierarchy perspective, decomposing the internal computation of language models into three sequential spaces: embedding (hidden representations), logit (pre-softmax outputs), and probability (post-softmax distributions). We find that representations in the embedding and logit spaces are largely robust to pruning-induced perturbations. However, the nonlinear transformation from logits to probabilities amplifies these deviations, which accumulate across time steps and lead to substantial degradation during generation. In contrast, the stability of the categorical-token probability subspace, together with the robustness of the embedding space, supports the effectiveness of pruning for non-generative tasks such as retrieval and multiple-choice selection. Our analysis disentangles the effects of pruning across tasks and provides practical guidance for its application. Code is available at https://github.com/CASE-Lab-UMD/Pruning-on-Representations', 'score': 9, 'issue_id': 1837, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '8740f7ca537019e8', 'authors': ['Shwai He', 'Guoheng Sun', 'Haichao Zhang', 'Yun Fu', 'Ang Li'], 'affiliations': ['Northeastern University, USA', 'University USA', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.24652.jpg', 'data': {'categories': ['#training', '#inference'], 'emoji': '✂️', 'ru': {'title': 'Прунинг вскрывает уязвимость вероятностного пространства при генерации', 'desc': 'В работе исследуется влияние прунинга нейронных сетей на различные пространства представлений в языковых моделях. Авторы анализируют три последовательных пространства: embedding, logit и probability, показывая, что первые два устойчивы к возмущениям, вызванным прунингом. Однако нелинейное преобразование от логитов к вероятностям усиливает отклонения, которые накапливаются на протяжении генерации и приводят к значительной деградации качества. Результаты объясняют, почему прунинг хорошо работает для задач классификации, но деградирует при генерации текста.'}, 'en': {'title': 'Understanding Network Pruning: Stability Matters for Generative Tasks!', 'desc': 'This paper investigates how network pruning, which simplifies models by removing less important parameters, impacts performance across different language tasks. The authors find that while pruned models can maintain performance in non-generative tasks, they often struggle in generative tasks due to instability in the transformation from logits to probabilities. By analyzing the internal workings of language models through a representation-hierarchy lens, they reveal that the embedding and logit spaces are resilient to pruning, but the probability space is sensitive to changes. The study provides insights into how to effectively apply pruning in various contexts, emphasizing the need to consider the task type when pruning models.'}, 'zh': {'title': '网络剪枝：提升效率的双刃剑', 'desc': '网络剪枝是指去除不重要的参数或结构，以提高模型效率并保持性能。然而，在语言任务中，这种期望并不总是成立：剪枝后的模型在非生成任务中表现良好，但在生成任务中常常失败。我们从表示层次的角度分析网络剪枝，发现嵌入和logit空间对剪枝的扰动具有较强的鲁棒性，但从logits到概率的非线性变换会放大这些偏差，导致生成过程中的显著性能下降。我们的研究揭示了剪枝在不同任务中的影响，并为其应用提供了实用指导。'}}}, {'id': 'https://huggingface.co/papers/2604.06169', 'title': 'In-Place Test-Time Training', 'url': 'https://huggingface.co/papers/2604.06169', 'abstract': 'Abstract In-Place Test-Time Training enables large language models to adapt parameters during inference by modifying the final projection matrix in MLP blocks with a task-aligned objective and efficient update mechanism.  AI-generated summary The static ``train then deploy" paradigm fundamentally limits Large Language Models (LLMs) from dynamically adapting their weights in response to continuous streams of new information inherent in real-world tasks. Test-Time Training (TTT) offers a compelling alternative by updating a subset of model parameters (fast weights) at inference time, yet its potential in the current LLM ecosystem is hindered by critical barriers including architectural incompatibility, computational inefficiency and misaligned fast weight objectives for language modeling. In this work, we introduce In-Place Test-Time Training (In-Place TTT), a framework that seamlessly endows LLMs with Test-Time Training ability. In-Place TTT treats the final projection matrix of the ubiquitous MLP blocks as its adaptable fast weights, enabling a ``drop-in" enhancement for LLMs without costly retraining from scratch. Furthermore, we replace TTT\'s generic reconstruction objective with a tailored, theoretically-grounded objective explicitly aligned with the Next-Token-Prediction task governing autoregressive language modeling. This principled objective, combined with an efficient chunk-wise update mechanism, results in a highly scalable algorithm compatible with context parallelism. Extensive experiments validate our framework\'s effectiveness: as an in-place enhancement, it enables a 4B-parameter model to achieve superior performance on tasks with contexts up to 128k, and when pretrained from scratch, it consistently outperforms competitive TTT-related approaches. Ablation study results further provide deeper insights on our design choices. Collectively, our results establish In-Place TTT as a promising step towards a paradigm of continual learning in LLMs.', 'score': 8, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '28f5974da1950ea4', 'authors': ['Guhao Feng', 'Shengjie Luo', 'Kai Hua', 'Ge Zhang', 'Di He', 'Wenhao Huang', 'Tianle Cai'], 'affiliations': ['ByteDance Seed', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.06169.jpg', 'data': {'categories': ['#training', '#inference', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Живое обучение LLM во время работы: адаптивные параметры без переобучения', 'desc': 'В работе предлагается метод In-Place Test-Time Training, который позволяет большим языковым моделям адаптировать свои параметры прямо во время инференса, без необходимости переобучения. Подход модифицирует только финальную матрицу проецирования в MLP блоках модели, используя задачу предсказания следующего токена в качестве целевой функции. Авторы разработали эффективный механизм обновления параметров, совместимый с распределённой обработкой контекста, что позволяет методу масштабироваться на больших моделях. Экспериментальные результаты показывают, что даже небольшие модели с адаптацией параметров превосходят статические модели на задачах с очень длинными контекстами.'}, 'en': {'title': 'Dynamic Adaptation for Language Models at Inference', 'desc': "In-Place Test-Time Training (In-Place TTT) allows large language models (LLMs) to adapt their parameters during inference by modifying the final projection matrix in MLP blocks. This method addresses the limitations of the traditional 'train then deploy' approach by enabling dynamic updates to model weights in response to new information. By using a tailored objective aligned with Next-Token-Prediction, In-Place TTT enhances the model's performance without the need for extensive retraining. The framework demonstrates significant improvements in scalability and efficiency, making it a promising advancement for continual learning in LLMs."}, 'zh': {'title': '就地测试时训练：LLMs的持续学习新路径', 'desc': '本文提出了一种名为“就地测试时训练”（In-Place TTT）的新框架，使大型语言模型（LLMs）能够在推理过程中动态调整参数。通过将MLP块的最终投影矩阵视为可适应的快速权重，In-Place TTT实现了无需从头开始重新训练的增强。该方法采用了与下一个标记预测任务相一致的目标，结合高效的分块更新机制，提升了模型的可扩展性。实验结果表明，In-Place TTT在处理长上下文任务时表现优越，为LLMs的持续学习提供了新的可能性。'}}}, {'id': 'https://huggingface.co/papers/2604.05081', 'title': 'MedGemma 1.5 Technical Report', 'url': 'https://huggingface.co/papers/2604.05081', 'abstract': 'Abstract MedGemma 1.5 4B enhances medical AI capabilities through expanded multimodal support and improved performance across medical imaging, document understanding, and clinical reasoning tasks.  AI-generated summary We introduce MedGemma 1.5 4B, the latest model in the MedGemma collection. MedGemma 1.5 expands on MedGemma 1 by integrating additional capabilities: high-dimensional medical imaging (CT/MRI volumes and histopathology whole slide images), anatomical localization via bounding boxes, multi-timepoint chest X-ray analysis, and improved medical document understanding (lab reports, electronic health records). We detail the innovations required to enable these modalities within a single architecture, including new training data, long-context 3D volume slicing, and whole-slide pathology sampling. Compared to MedGemma 1 4B, MedGemma 1.5 4B demonstrates significant gains in these new areas, improving 3D MRI condition classification accuracy by 11% and 3D CT condition classification by 3% (absolute improvements). In whole slide pathology imaging, MedGemma 1.5 4B achieves a 47% macro F1 gain. Additionally, it improves anatomical localization with a 35% increase in Intersection over Union on chest X-rays and achieves a 4% macro accuracy for longitudinal (multi-timepoint) chest x-ray analysis. Beyond its improved multimodal performance over MedGemma 1, MedGemma 1.5 improves on text-based clinical knowledge and reasoning, improving by 5% on MedQA accuracy and 22% on EHRQA accuracy. It also achieves an average of 18% macro F1 on 4 different lab report information extraction datasets (EHR Datasets 2, 3, 4, and Mendeley Clinical Laboratory Test Reports). Taken together, MedGemma 1.5 serves as a robust, open resource for the community, designed as an improved foundation on which developers can create the next generation of medical AI systems. Resources and tutorials for building upon MedGemma 1.5 can be found at https://goo.gle/MedGemma.', 'score': 8, 'issue_id': 1837, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '8229ef23df8d57bd', 'authors': ['Andrew Sellergren', 'Chufan Gao', 'Fereshteh Mahvar', 'Timo Kohlberger', 'Fayaz Jamil', 'Madeleine Traverse', 'Alberto Tono', 'Bashir Sadjad', 'Lin Yang', 'Charles Lau', 'Liron Yatziv', 'Tiffany Chen', 'Bram Sterling', 'Kenneth Philbrick', 'Richa Tiwari', 'Yun Liu', 'Madhuram Jajoo', 'Chandrashekar Sankarapu', 'Swapnil Vispute', 'Harshad Purandare', 'Abhishek Bijay Mishra', 'Sam Schmidgall', 'Tao Tu', 'Anil Palepu', 'Chunjong Park', 'Tim Strother', 'Rahul Thapa', 'Yong Cheng', 'Preeti Singh', 'Kat Black', 'Yossi Matias', 'Katherine Chou', 'Avinatan Hassidim', 'Kavi Goel', 'Joelle Barral', 'Tris Warkentin', 'Shravya Shetty', 'Dale Webster', 'Sunny Virmani', 'David F. Steiner', 'Can Kirmizibayrak', 'Daniel Golden'], 'affiliations': ['Google DeepMind', 'Google Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.05081.jpg', 'data': {'categories': ['#small_models', '#3d', '#training', '#long_context', '#multimodal', '#open_source', '#healthcare', '#science'], 'emoji': '🏥', 'ru': {'title': 'Универсальная мультимодальная модель для комплексного анализа медицинских данных', 'desc': 'MedGemma 1.5 4B — это мультимодальная языковая модель, которая объединяет возможности обработки медицинских изображений высокой размерности (КТ, МРТ, гистопатология), клинических документов и текстовой информации в единой архитектуре. Модель использует инновационные методы обучения, включая трёхмерное слайсинг объёмов и специализированную выборку целых слайдов патологии, для эффективной работы с разнородными данными. По сравнению с предыдущей версией MedGemma 1.5 демонстрирует значительные улучшения: на 11% в классификации МРТ, на 47% в анализе гистопатологических изображений и на 22% в понимании электронных историй болезни. Модель служит открытым фундаментом для разработки следующего поколения медицинских AI систем и инструментов клинического назначения.'}, 'en': {'title': 'Empowering Medical AI with MedGemma 1.5 4B', 'desc': 'MedGemma 1.5 4B is an advanced medical AI model that enhances capabilities in various areas such as medical imaging, document understanding, and clinical reasoning. It integrates high-dimensional imaging techniques, including CT and MRI, and improves anatomical localization and analysis of chest X-rays over time. The model shows significant performance improvements, with notable gains in classification accuracy and information extraction from medical documents. Overall, MedGemma 1.5 serves as a valuable resource for developers aiming to advance medical AI applications.'}, 'zh': {'title': '医疗AI的新基础：MedGemma 1.5 4B', 'desc': 'MedGemma 1.5 4B 是最新的医疗人工智能模型，增强了多模态支持和性能。它集成了高维医疗影像、解剖定位和多时间点胸部X光分析等新功能。与之前的版本相比，MedGemma 1.5 在3D MRI和CT条件分类的准确性上有显著提升，并在病理图像分析中取得了47%的宏观F1得分提升。该模型还在临床知识和推理方面表现出色，为开发下一代医疗AI系统提供了坚实的基础。'}}}, {'id': 'https://huggingface.co/papers/2604.06168', 'title': 'Action Images: End-to-End Policy Learning via Multiview Video Generation', 'url': 'https://huggingface.co/papers/2604.06168', 'abstract': 'Abstract World action models that formulate policy learning as multiview video generation use pixel-grounded action images to enable zero-shot policy learning without separate action modules.  AI-generated summary World action models (WAMs) have emerged as a promising direction for robot policy learning, as they can leverage powerful video backbones to model the future states. However, existing approaches often rely on separate action modules, or use action representations that are not pixel-grounded, making it difficult to fully exploit the pretrained knowledge of video models and limiting transfer across viewpoints and environments. In this work, we present Action Images, a unified world action model that formulates policy learning as multiview video generation. Instead of encoding control as low-dimensional tokens, we translate 7-DoF robot actions into interpretable action images: multi-view action videos that are grounded in 2D pixels and explicitly track robot-arm motion. This pixel-grounded action representation allows the video backbone itself to act as a zero-shot policy, without a separate policy head or action module. Beyond control, the same unified model supports video-action joint generation, action-conditioned video generation, and action labeling under a shared representation. On RLBench and real-world evaluations, our model achieves the strongest zero-shot success rates and improves video-action joint generation quality over prior video-space world models, suggesting that interpretable action images are a promising route to policy learning.', 'score': 7, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '55caeab6bb893ddd', 'authors': ['Haoyu Zhen', 'Zixian Gao', 'Qiao Sun', 'Yilin Zhao', 'Yuncong Yang', 'Yilun Du', 'Tsun-Hsuan Wang', 'Yi-Ling Qiao', 'Chuang Gan'], 'affiliations': ['Genesis AI', 'Harvard University', 'NVIDIA', 'UMass Amherst', 'UTokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.06168.jpg', 'data': {'categories': ['#multimodal', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Визуальное управление: действия как видео для нулевого обучения политики робота', 'desc': 'В работе предлагается новый подход к обучению политики робота, называемый Action Images, который формулирует задачу обучения как многовидовую генерацию видео. Вместо кодирования действий в виде низкоразмерных токенов, авторы переводят действия робота в интерпретируемые изображения действий — видеоролики, привязанные к пиксельному пространству, которые явно отслеживают движение руки робота. Такое пиксель-ориентированное представление действий позволяет видеомодели работать как нулевой политики без отдельного модуля классификатора действий. Предложенный метод демонстрирует наилучшие результаты zero-shot обучения на тестах RLBench и реальных роботах, а также улучшает качество совместной генерации видео и действий.'}, 'en': {'title': 'Revolutionizing Robot Learning with Pixel-Grounded Action Images', 'desc': 'This paper introduces a new approach to robot policy learning called Action Images, which uses pixel-grounded action representations to enhance multiview video generation. By translating complex robot actions into interpretable action images, the model allows for zero-shot policy learning without needing separate action modules. This method leverages powerful video backbones to predict future states and supports various tasks like action labeling and video generation. The results show that this unified model outperforms previous methods in both simulated and real-world environments, demonstrating its effectiveness in policy learning.'}, 'zh': {'title': '可解释的动作图像：策略学习的新方向', 'desc': '本论文提出了一种新的世界动作模型，称为动作图像，旨在将策略学习视为多视角视频生成。该模型通过将7自由度的机器人动作转化为可解释的动作图像，使得视频模型能够在没有单独策略模块的情况下进行零-shot策略学习。与传统方法不同，动作图像是基于2D像素的多视角动作视频，能够更好地利用预训练的视频模型知识。实验结果表明，该模型在零-shot成功率和视频-动作联合生成质量上优于现有的世界模型，展示了可解释的动作图像在策略学习中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.06156', 'title': 'MMEmb-R1: Reasoning-Enhanced Multimodal Embedding with Pair-Aware Selection and Adaptive Control', 'url': 'https://huggingface.co/papers/2604.06156', 'abstract': 'Abstract An adaptive multimodal embedding framework that selectively applies reasoning through latent variables and reinforcement learning to improve efficiency and performance on benchmark tasks.  AI-generated summary MLLMs have been successfully applied to multimodal embedding tasks, yet their generative reasoning capabilities remain underutilized. Directly incorporating chain-of-thought reasoning into embedding learning introduces two fundamental challenges. First, structural misalignment between instance-level reasoning and pairwise contrastive supervision may lead to shortcut behavior, where the model merely learns the superficial format of reasoning. Second, reasoning is not universally beneficial for embedding tasks. Enforcing reasoning for all inputs may introduce unnecessary computation and latency, and can even obscure salient semantic signals for simple cases. To address these issues, we propose MMEmb-R1, an adaptive reasoning-based multimodal embedding framework. We formulate reasoning as a latent variable and introduce pair-aware reasoning selection that employs counterfactual intervention to identify reasoning paths beneficial for query-target alignment. Furthermore, we adopt reinforcement learning to selectively invoke reasoning only when necessary. Experiments on the MMEB-V2 benchmark demonstrate that our model achieves a score of 71.2 with only 4B parameters, establishing a new state-of-the-art while significantly reducing reasoning overhead and inference latency.', 'score': 5, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': 'cc376f64bc8ae56a', 'authors': ['Yuchi Wang', 'Haiyang Yu', 'Weikang Bian', 'Jiefeng Long', 'Xiao Liang', 'Chao Feng', 'Hongsheng Li'], 'affiliations': ['ByteDance', 'MMLab, The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.06156.jpg', 'data': {'categories': ['#small_models', '#optimization', '#reasoning', '#benchmark', '#multimodal', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Умное рассуждение только когда нужно: адаптивные эмбеддинги для эффективности', 'desc': 'Статья представляет MMEmb-R1 — адаптивный фреймворк для мультимодальных эмбеддингов, который селективно применяет рассуждение через скрытые переменные и обучение с подкреплением. Авторы решают проблему несоответствия между reasoning на уровне отдельных примеров и контрастивным обучением на парах, которое приводит к поверхностному обучению. Система использует контрфактический анализ и RL для определения, когда reasoning действительно полезен, избегая ненужных вычислений на простых примерах. На бенчмарке MMEB-V2 модель достигает state-of-the-art результатов с всего 4B параметрами, значительно снизив вычислительные затраты и задержку вывода.'}, 'en': {'title': 'Adaptive Reasoning for Efficient Multimodal Embeddings', 'desc': 'This paper presents MMEmb-R1, an adaptive multimodal embedding framework that enhances performance by integrating reasoning through latent variables and reinforcement learning. The framework addresses challenges in multimodal tasks, such as structural misalignment and unnecessary computation from universal reasoning application. By selectively applying reasoning only when beneficial, it improves efficiency and reduces latency. The proposed model achieves a new state-of-the-art score on the MMEB-V2 benchmark with fewer parameters, demonstrating its effectiveness in optimizing multimodal embeddings.'}, 'zh': {'title': '自适应多模态嵌入框架的创新推理', 'desc': '本文提出了一种自适应的多模态嵌入框架MMEmb-R1，旨在通过潜变量和强化学习来提高效率和性能。该框架解决了在嵌入学习中直接引入推理所面临的结构不匹配和推理普适性的问题。通过对推理路径的选择，模型能够在必要时才调用推理，从而减少不必要的计算和延迟。实验结果表明，该模型在MMEB-V2基准测试中取得了71.2的分数，创造了新的最先进水平。'}}}, {'id': 'https://huggingface.co/papers/2604.04074', 'title': 'FactReview: Evidence-Grounded Reviews with Literature Positioning and Execution-Based Claim Verification', 'url': 'https://huggingface.co/papers/2604.04074', 'abstract': "Abstract FactReview is an evidence-grounded peer rev
