iew system for machine learning that analyzes manuscript claims through claim extraction, literature positioning, and execution-based verification to provide more reliable review assessments.  AI-generated summary Peer review in machine learning is under growing pressure from rising submission volume and limited reviewer time. Most LLM-based reviewing systems read only the manuscript and generate comments from the paper's own narrative. This makes their outputs sensitive to presentation quality and leaves them weak when the evidence needed for review lies in related work or released code. We present FactReview, an evidence-grounded reviewing system that combines claim extraction, literature positioning, and execution-based claim verification. Given a submission, FactReview identifies major claims and reported results, retrieves nearby work to clarify the paper's technical position, and, when code is available, executes the released repository under bounded budgets to test central empirical claims. It then produces a concise review and an evidence report that assigns each major claim one of five labels: Supported, Supported by the paper, Partially supported, In conflict, or Inconclusive. In a case study on CompGCN, FactReview reproduces results that closely match those reported for link prediction and node classification, yet also shows that the paper's broader performance claim across tasks is not fully sustained: on MUTAG graph classification, the reproduced result is 88.4%, whereas the strongest baseline reported in the paper remains 92.6%. The claim is therefore only partially supported. More broadly, this case suggests that AI is most useful in peer review not as a final decision-maker, but as a tool for gathering evidence and helping reviewers produce more evidence-grounded assessments. The code is public at https://github.com/DEFENSE-SEU/Review-Assistant.", 'score': 4, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': 'fa2bcb55b0c1f5fc', 'authors': ['Hang Xu', 'Ling Yue', 'Chaoqian Ouyang', 'Yuchen Liu', 'Libin Zheng', 'Shaowu Pan', 'Shimin Di', 'Min-Ling Zhang'], 'affiliations': ['Rensselaer Polytechnic Institute', 'Southeast University', 'Sun Yat-sen University', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.04074.jpg', 'data': {'categories': [], 'emoji': '🔬', 'ru': {'title': 'Доказательное рецензирование: AI как помощник в проверке научных утверждений', 'desc': 'FactReview — это система автоматизированного рецензирования научных статей по машинному обучению, которая анализирует основные утверждения авторов через извлечение claims, позиционирование в контексте литературы и верификацию результатов на основе воспроизведения кода. Система решает проблему растущего потока публикаций и нехватки времени у рецензентов, используя подход, основанный на доказательствах, а не только на прочтении текста статьи. FactReview извлекает ключевые утверждения, находит релевантные работы для уточнения технической позиции и при наличии кода выполняет его для проверки эмпирических результатов. На выходе система генерирует краткий отзыв и детальный отчёт с разметкой каждого claim по шкале: поддержано, поддержано статьёй, частично поддержано, в конфликте или неопределённо.'}, 'en': {'title': 'FactReview: Enhancing Peer Review with Evidence and AI', 'desc': 'FactReview is a peer review system designed for machine learning that enhances the reliability of manuscript evaluations. It works by extracting claims from submissions, positioning them within existing literature, and verifying them through execution of related code. This approach allows FactReview to provide a more thorough assessment by labeling claims as Supported, Partially supported, or In conflict based on evidence. The system demonstrates that AI can assist reviewers by gathering evidence rather than making final decisions, ultimately improving the quality of peer reviews.'}, 'zh': {'title': '基于证据的同行评审，提升机器学习评估的可靠性', 'desc': 'FactReview 是一个基于证据的同行评审系统，专门用于机器学习领域。它通过提取论文中的主要主张、定位相关文献和执行代码验证来提供更可靠的评审评估。该系统能够识别主要主张并检索相关工作，以澄清论文的技术位置，并在可用代码的情况下执行代码以测试实证主张。最终，FactReview 生成简明的评审和证据报告，为每个主要主张分配支持、部分支持、冲突或不确定等标签。'}}}, {'id': 'https://huggingface.co/papers/2604.05181', 'title': 'General Multimodal Protein Design Enables DNA-Encoding of Chemistry', 'url': 'https://huggingface.co/papers/2604.05181', 'abstract': 'Abstract DISCO is a multimodal deep generative model that co-designs protein sequences and 3D structures to create novel heme enzymes with unprecedented catalytic capabilities.  AI-generated summary Evolution is an extraordinary engine for enzymatic diversity, yet the chemistry it has explored remains a narrow slice of what DNA can encode. Deep generative models can design new proteins that bind ligands, but none have created enzymes without pre-specifying catalytic residues. We introduce DISCO (DIffusion for Sequence-structure CO-design), a multimodal model that co-designs protein sequence and 3D structure around arbitrary biomolecules, as well as inference-time scaling methods that optimize objectives across both modalities. Conditioned solely on reactive intermediates, DISCO designs diverse heme enzymes with novel active-site geometries. These enzymes catalyze new-to-nature carbene-transfer reactions, including alkene cyclopropanation, spirocyclopropanation, B-H, and C(sp^3)-H insertions, with high activities exceeding those of engineered enzymes. Random mutagenesis of a selected design further confirmed that enzyme activity can be improved through directed evolution. By providing a scalable route to evolvable enzymes, DISCO broadens the potential scope of genetically encodable transformations. Code is available at https://github.com/DISCO-design/DISCO.', 'score': 4, 'issue_id': 1843, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'cac5502e582702ba', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#3d', '#architecture', '#science', '#multimodal', '#diffusion', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Совместное проектирование белков и структур через диффузию для синтеза ненативных ферментов', 'desc': 'DISCO — это мультимодальная глубокая генеративная модель, основанная на диффузии, которая одновременно проектирует последовательности белков и их трёхмерные структуры. Модель кондиционируется только на реакционных интермедиатах и способна создавать новые ферменты гемосодержащих белков с ненативными каталитическими сайтами без предварительного указания каталитических остатков. Разработанные DISCO ферменты катализируют новые реакции переноса карбенов, включая циклопропанирование алкенов и вставки в углеводородные связи, с активностью, превосходящей инженерные аналоги. Полученные конструкции подтверждают, что генеративное моделирование может создавать функциональные белки, способные к дальнейшей эволюции и оптимизации.'}, 'en': {'title': 'Revolutionizing Enzyme Design with DISCO', 'desc': 'DISCO is a deep generative model that simultaneously designs protein sequences and their 3D structures to create innovative heme enzymes with unique catalytic functions. Unlike previous models, DISCO does not require pre-defined catalytic residues, allowing for greater flexibility in enzyme design. It focuses on reactive intermediates to generate diverse heme enzymes capable of performing new chemical reactions with high efficiency. This approach not only enhances enzyme activity but also opens up new possibilities for genetic encoding of enzymatic transformations.'}, 'zh': {'title': 'DISCO：开创酶设计的新纪元', 'desc': 'DISCO是一种多模态深度生成模型，能够共同设计蛋白质序列和三维结构，从而创造出具有前所未有催化能力的新型血红素酶。该模型不需要预先指定催化残基，能够在反应中间体的条件下设计出多样化的血红素酶，具有新颖的活性位点几何结构。DISCO催化的新反应包括烯烃环丙烯化和B-H、C(sp^3)-H插入反应，其活性超过了工程化酶。通过定向进化，进一步确认了所选设计的酶活性可以得到提升，展示了DISCO在可进化酶设计中的广泛潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.02648', 'title': 'GBQA: A Game Benchmark for Evaluating LLMs as Quality Assurance Engineers', 'url': 'https://huggingface.co/papers/2604.02648', 'abstract': 'Abstract Large language models struggle with autonomous bug discovery in complex runtime environments, as demonstrated by a new game development benchmark that reveals limited effectiveness of current approaches despite sophisticated multi-agent systems and interactive agents.  AI-generated summary The autonomous discovery of bugs remains a significant challenge in modern software development. Compared to code generation, the complexity of dynamic runtime environments makes bug discovery considerably harder for large language models (LLMs). In this paper, we take game development as a representative domain and introduce the Game Benchmark for Quality Assurance (GBQA), a benchmark containing 30 games and 124 human-verified bugs across three difficulty levels, to evaluate whether LLMs can autonomously detect software bugs. The benchmark is constructed using a multi-agent system that develops games and injects bugs in a scalable manner, with human experts in the loop to ensure correctness. Moreover, we provide a baseline interactive agent equipped with a multi-round ReAct loop and a memory mechanism, enabling long-horizon exploration of game environments for bug detection across different LLMs. Extensive experiments on frontier LLMs demonstrate that autonomous bug discovery remains highly challenging: the best-performing model, Claude-4.6-Opus in thinking mode, identifies only 48.39% of the verified bugs. We believe GBQA provides an adequate testbed and evaluation criterion, and that further progress on it will help close the gap in autonomous software engineering.', 'score': 4, 'issue_id': 1838, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': 'acc318c4d4ae7435', 'authors': ['Shufan Jiang', 'Chios Chen', 'Zhiyang Chen'], 'affiliations': ['Datawhale Org.', 'Independent Researcher', 'The University of Hong Kong', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02648.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '🐛', 'ru': {'title': 'Поиск багов — враг номер один для современных LLM', 'desc': 'В статье представлен новый бенчмарк GBQA для оценки способности больших языковых моделей к автономному обнаружению ошибок в коде видеоигр. Авторы создали набор данных из 30 игр с 124 проверенными человеком ошибками разных уровней сложности, используя мультиагентную систему для разработки и внедрения багов. Предложенный интерактивный агент с механизмом памяти и многошаговым ReAct циклом исследует среду выполнения для поиска ошибок. Результаты показывают, что поиск багов остаётся сложной задачей: лучшая модель находит только 48% ошибок, что подчёркивает необходимость дальнейших исследований в автономной инженерии программного обеспечения.'}, 'en': {'title': 'Enhancing Bug Discovery in Game Development with LLMs', 'desc': 'This paper addresses the challenges faced by large language models (LLMs) in autonomously discovering bugs in complex software environments, specifically in game development. It introduces the Game Benchmark for Quality Assurance (GBQA), which consists of 30 games and 124 human-verified bugs to evaluate LLM performance in bug detection. The benchmark utilizes a multi-agent system to create games and inject bugs, with human oversight to ensure accuracy. Experimental results show that even the best LLM, Claude-4.6-Opus, only detects 48.39% of the bugs, highlighting the need for further advancements in autonomous software engineering.'}, 'zh': {'title': '提升大型语言模型的bug发现能力', 'desc': '大型语言模型在复杂运行环境中自主发现bug的能力仍然有限。本文以游戏开发为例，提出了游戏质量保证基准（GBQA），该基准包含30个游戏和124个经过人工验证的bug，旨在评估LLMs的bug检测能力。基准使用多智能体系统构建，能够以可扩展的方式开发游戏并注入bug，同时确保人类专家参与以保证正确性。实验结果表明，尽管有先进的模型，自动发现bug仍然是一个巨大的挑战，最好的模型仅能识别48.39%的验证bug。'}}}, {'id': 'https://huggingface.co/papers/2604.05939', 'title': 'Context-Value-Action Architecture for Value-Driven Large Language Model Agents', 'url': 'https://huggingface.co/papers/2604.05939', 'abstract': 'Abstract Large language models exhibit behavioral rigidity that worsens with intensified reasoning, prompting the development of a Context-Value-Action architecture that decouples action generation from cognitive reasoning using a Value Verifier trained on human data.  AI-generated summary Large Language Models (LLMs) have shown promise in simulating human behavior, yet existing agents often exhibit behavioral rigidity, a flaw frequently masked by the self-referential bias of current "LLM-as-a-judge" evaluations. By evaluating against empirical ground truth, we reveal a counter-intuitive phenomenon: increasing the intensity of prompt-driven reasoning does not enhance fidelity but rather exacerbates value polarization, collapsing population diversity. To address this, we propose the Context-Value-Action (CVA) architecture, grounded in the Stimulus-Organism-Response (S-O-R) model and Schwartz\'s Theory of Basic Human Values. Unlike methods relying on self-verification, CVA decouples action generation from cognitive reasoning via a novel Value Verifier trained on authentic human data to explicitly model dynamic value activation. Experiments on CVABench, which comprises over 1.1 million real-world interaction traces, demonstrate that CVA significantly outperforms baselines. Our approach effectively mitigates polarization while offering superior behavioral fidelity and interpretability.', 'score': 2, 'issue_id': 1841, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '142470f2eee867ba', 'authors': ['TianZe Zhang', 'Sirui Sun', 'Yuhang Xie', 'Xin Zhang', 'Zhiqiang Wu', 'Guojie Song'], 'affiliations': ['Key Laboratory of Machine Perception (Ministry of Education), Peking University', 'PKU-Wuhan Institute for Artificial Intelligence', 'School of Psychological and Cognitive Sciences, Peking University', 'State Key Laboratory of General Artificial Intelligence, School of Intelligence Science and Technology, Peking University', 'Yuanpei College, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.05939.jpg', 'data': {'categories': ['#alignment', '#reasoning', '#interpretability'], 'emoji': '🎭', 'ru': {'title': 'Разделение логики и действия для более естественного поведения LLM', 'desc': 'В статье выявлена проблема поведенческой ригидности больших языковых моделей, которая усугубляется при увеличении интенсивности рассуждений и приводит к поляризации ценностей. Авторы предлагают архитектуру Context-Value-Action (CVA), которая разделяет процесс генерации действий и когнитивные рассуждения, основываясь на теории базовых человеческих ценностей Шварца. В архитектуре используется Value Verifier, обученный на реальных данных о поведении людей, для явного моделирования динамической активации ценностей. Эксперименты на датасете CVABench, содержащем более 1,1 миллиона реальных взаимодействий, показывают, что предложенный подход превосходит базовые методы по точности, интерпретируемости и способности сохранять разнообразие поведения.'}, 'en': {'title': 'Decoupling Reasoning and Action for Better AI Behavior', 'desc': 'This paper addresses the issue of behavioral rigidity in large language models (LLMs) that worsens with increased reasoning demands. The authors introduce a new architecture called Context-Value-Action (CVA), which separates action generation from cognitive reasoning using a Value Verifier trained on real human data. By doing so, the CVA architecture aims to reduce value polarization and improve the diversity of responses generated by LLMs. Experiments show that CVA outperforms existing methods, leading to better behavioral fidelity and interpretability.'}, 'zh': {'title': '解耦推理与行动，提升AI行为真实度', 'desc': '大型语言模型在推理时表现出行为僵化的问题，尤其在推理强度增加时更为明显。为了解决这个问题，本文提出了一种上下文-价值-行动（CVA）架构，该架构将行动生成与认知推理解耦。CVA使用一个基于真实人类数据训练的价值验证器，能够动态建模价值激活，从而提高行为的真实度和可解释性。实验结果表明，CVA在减少价值极化的同时，显著优于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2604.05963', 'title': 'QiMeng-PRepair: Precise Code Repair via Edit-Aware Reward Optimization', 'url': 'https://huggingface.co/papers/2604.05963', 'abstract': 'Abstract PRepair framework reduces over-editing in program repair by combining controlled bug injection and edit-aware policy optimization to maximize correct code reuse while minimizing unnecessary modifications.  AI-generated summary Large Language Models (LLMs) achieve strong program repair performance but often suffer from over-editing, where excessive modifications overwrite correct code and hinder bug localization. We systematically quantify its impact and introduce precise repair task, which maximizes reuse of correct code while fixing only buggy parts. Building on this insight, we propose PRepair, a framework that mitigates over-editing and improves repair accuracy. PRepair has two components: Self-Breaking, which generates diverse buggy programs via controlled bug injection and min-max sampling, and Self-Repairing, which trains models with Edit-Aware Group Relative Policy Optimization (EA-GRPO) using an edit-aware reward to encourage minimal yet correct edits. Experiments show that PRepair improves repair precision by up to 31.4% under fix_1@1, a metric that jointly considers repair correctness and extent, and significantly increases decoding throughput when combined with speculative editing, demonstrating its potential for precise and practical code repair.', 'score': 2, 'issue_id': 1839, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': 'bcdb96c3af9a2530', 'authors': ['Changxin Ke', 'Rui Zhang', 'Jiaming Guo', 'Yuanbo Wen', 'Li Ding', 'Shuo Wang', 'Xuyuan Zhu', 'Xiong Peng', 'Di Huang', 'Zidong Du', 'Xing Hu', 'Qi Guo', 'Yunji Chen'], 'affiliations': ['Institute of Microelectronics, CAS', 'State Key Lab of Processors, Institute of Computing Technology, CAS', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.05963.jpg', 'data': {'categories': [], 'emoji': '🔧', 'ru': {'title': 'Минимальные и точные исправления: борьба с избыточным редактированием в автоматическом восстановлении кода', 'desc': 'В статье предложена система PRepair для исправления ошибок в коде, которая решает проблему избыточного редактирования языковыми моделями. Авторы вводят понятие точного восстановления кода, максимизирующего переиспользование правильных фрагментов при исправлении только ошибочных частей. Система состоит из двух компонентов: Self-Breaking, генерирующего разнообразные ошибочные программы через контролируемое внедрение багов, и Self-Repairing, обучающего модели с помощью Edit-Aware Group Relative Policy Optimization с вознаграждением за минимальные исправления. Экспериментальные результаты показывают улучшение точности восстановления на 31.4% и увеличение пропускной способности при декодировании.'}, 'en': {'title': 'Maximizing Code Reuse While Minimizing Edits in Program Repair', 'desc': 'The PRepair framework addresses the issue of over-editing in program repair by focusing on maximizing the reuse of correct code while minimizing unnecessary changes. It introduces a systematic approach to quantify the impact of over-editing and defines a precise repair task that targets only the buggy parts of the code. PRepair consists of two main components: Self-Breaking, which creates diverse buggy programs through controlled bug injection, and Self-Repairing, which employs Edit-Aware Group Relative Policy Optimization to promote minimal edits. Experimental results indicate that PRepair significantly enhances repair precision and increases decoding efficiency, showcasing its effectiveness in practical code repair scenarios.'}, 'zh': {'title': 'PRepair：精准修复，减少过度编辑', 'desc': 'PRepair框架通过结合控制的错误注入和编辑感知的策略优化，减少程序修复中的过度编辑现象。该框架旨在最大化正确代码的重用，同时最小化不必要的修改。PRepair包含两个主要组件：自我破坏和自我修复，前者通过控制错误注入生成多样化的错误程序，后者则使用编辑感知奖励训练模型，以鼓励最小且正确的编辑。实验结果表明，PRepair在修复精度上提高了31.4%，并在结合推测性编辑时显著增加了解码吞吐量，展示了其在精确和实用代码修复方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.05533', 'title': 'Experience Transfer for Multimodal LLM Agents in Minecraft Game', 'url': 'https://huggingface.co/papers/2604.05533', 'abstract': 'Abstract Echo is a transfer-oriented memory framework for multimodal LLM agents that enables efficient task solving in complex game environments by deriving actionable knowledge from prior interactions through decomposition into five knowledge dimensions and In-Context Analogy Learning.  AI-generated summary Multimodal LLM agents operating in complex game environments must continually reuse past experience to solve new tasks efficiently. In this work, we propose Echo, a transfer-oriented memory framework that enables agents to derive actionable knowledge from prior interactions rather than treating memory as a passive repository of static records. To make transfer explicit, Echo decomposes reusable knowledge into five dimensions: structure, attribute, process, function, and interaction. This formulation allows the agent to identify recurring patterns shared across different tasks and infer what prior experience remains applicable in new situations. Building on this formulation, Echo leverages In-Context Analogy Learning (ICAL) to retrieve relevant experiences and adapt them to unseen tasks through contextual examples. Experiments in Minecraft show that, under a from-scratch learning setting, Echo achieves a 1.3x to 1.7x speed-up on object-unlocking tasks. Moreover, Echo exhibits a burst-like chain-unlocking phenomenon, rapidly unlocking multiple similar items within a short time interval after acquiring transferable experience. These results suggest that experience transfer is a promising direction for improving the efficiency and adaptability of multimodal LLM agents in complex interactive environments.', 'score': 2, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '65651522e39fa155', 'authors': ['Chenghao Li', 'Jun Liu', 'Songbo Zhang', 'Huadong Jian', 'Hao Ni', 'Lik-Hang Lee', 'Sung-Ho Bae', 'Guoqing Wang', 'Yang Yang', 'Chaoning Zhang'], 'affiliations': ['KAIST', 'Kyung Hee University', 'The Hong Kong Polytechnic University', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.05533.jpg', 'data': {'categories': ['#training', '#multimodal', '#transfer_learning', '#agents', '#games'], 'emoji': '🧠', 'ru': {'title': 'Активная память через трансфер опыта для умных агентов', 'desc': 'В работе представлена система Echo — фреймворк для управления памятью мультимодальных LLM агентов, работающих в сложных игровых окружениях. Авторы предлагают разложить переиспользуемые знания на пять измерений (структура, атрибуты, процесс, функции и взаимодействие), чтобы явно выделить закономерности, общие для разных задач. На основе этого разложения применяется метод In-Context Analogy Learning для поиска релевантного опыта и адаптации его к новым ситуациям через контекстные примеры. Эксперименты в Minecraft показали ускорение решения задач в 1.3-1.7 раза и демонстрируют потенциал трансфера опыта для повышения эффективности мультимодальных LLM агентов.'}, 'en': {'title': 'Echo: Enhancing Task Efficiency through Experience Transfer in Multimodal Agents', 'desc': 'The paper introduces Echo, a memory framework designed for multimodal large language model (LLM) agents that operate in complex game settings. Echo enhances task-solving efficiency by allowing agents to leverage past experiences through a structured approach that breaks down knowledge into five dimensions: structure, attribute, process, function, and interaction. This framework enables agents to recognize patterns and apply relevant past experiences to new tasks using In-Context Analogy Learning (ICAL). Experimental results demonstrate that Echo significantly speeds up task performance in Minecraft, highlighting the potential of experience transfer for improving agent adaptability.'}, 'zh': {'title': 'Echo：提升多模态代理任务解决效率的记忆框架', 'desc': 'Echo是一个面向迁移的记忆框架，专为多模态大语言模型（LLM）代理设计，旨在通过从先前的交互中提取可操作的知识来高效解决复杂游戏环境中的任务。该框架将可重用知识分解为五个维度：结构、属性、过程、功能和交互，从而使代理能够识别不同任务之间的共性模式。通过上下文类比学习（ICAL），Echo能够检索相关经验并将其适应于未见过的任务。实验结果表明，Echo在Minecraft中的对象解锁任务中实现了1.3到1.7倍的速度提升，显示出经验迁移在提高多模态LLM代理在复杂交互环境中的效率和适应性方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.06079', 'title': 'Scientific Graphics Program Synthesis via Dual Self-Consistency Reinforcement Learning', 'url': 'https://huggingface.co/papers/2604.06079', 'abstract': 'Abstract A closed-loop framework for graphics program synthesis combines a large-scale dataset and benchmark with a novel reinforcement learning optimization method to improve the generation of executable TikZ code from images.  AI-generated summary Graphics Program Synthesis is pivotal for interpreting and editing visual data, effectively facilitating the reverse-engineering of static visuals into editable TikZ code. While TikZ is the de facto standard for scientific schematics due to its programmatic flexibility, its requirement for rigorous spatial precision presents a significant challenge for Multimodal Large Language Models. Progress is currently stifled by two primary gaps: (1) Data Quality Gap: existing image-TikZ corpora often lack strict executability and reliable visual alignment; (2) Evaluation Gap: a lack of benchmarks for both structural and visual fidelity. To address these, we present a closed-loop framework featuring: SciTikZ-230K, a large-scale, high-quality dataset from our Execution-Centric Data Engine covering 11 diverse scientific disciplines; SciTikZ-Bench, a multifaceted benchmark spanning from basic geometric constructs to intricate hierarchical schematics to evaluate both visual fidelity and structural logic. To further broaden the scope of visual-code optimization methodology, we introduce a novel Dual Self-Consistency Reinforcement Learning optimization paradigm, which utilizes Round-Trip Verification to penalize degenerate code and boost overall self-consistency. Empowered by these, our trained model SciTikZer-8B achieves state-of-the-art performance, consistently outperforming proprietary giants like Gemini-2.5-Pro and massive models like Qwen3-VL-235B-A22B-Instruct.', 'score': 2, 'issue_id': 1837, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '70bc8d3fc62276a2', 'authors': ['Juekai Lin', 'Yun Zhu', 'Honglin Lin', 'Sijing Li', 'Tianwei Lin', 'Zheng Liu', 'Xiaoyang Wang', 'Wenqiao Zhang', 'Lijun Wu'], 'affiliations': ['OpenDataLab', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.06079.jpg', 'data': {'categories': ['#optimization', '#dataset', '#training', '#benchmark', '#multimodal', '#open_source', '#rl', '#plp', '#science'], 'emoji': '📐', 'ru': {'title': 'От картинки к коду: обучение с подкреплением для синтеза TikZ-программ', 'desc': 'В работе представлена замкнутая система для синтеза графических программ, которая преобразует изображения в исполняемый код TikZ с помощью мультимодальных больших языковых моделей. Авторы создали высококачественный датасет SciTikZ-230K с 230 тысячами примеров из научных дисциплин и бенчмарк SciTikZ-Bench для оценки качества генерируемого кода. Предложен новый метод оптимизации на основе reinforcement learning с двойной самосогласованностью, используя round-trip верификацию для улучшения корректности кода. Обученная модель SciTikZer-8B демонстрирует лучшие результаты среди открытых моделей и превосходит закрытые системы типа Gemini и Qwen.'}, 'en': {'title': 'Revolutionizing TikZ Code Generation with Reinforcement Learning', 'desc': 'This paper presents a closed-loop framework for generating TikZ code from images using reinforcement learning. It addresses two main challenges: the quality of existing datasets and the lack of evaluation benchmarks for visual and structural fidelity. The authors introduce SciTikZ-230K, a high-quality dataset, and SciTikZ-Bench, a comprehensive benchmark for assessing generated code. Their novel Dual Self-Consistency Reinforcement Learning method enhances the optimization process, leading to the development of the SciTikZer-8B model, which outperforms existing models in the field.'}, 'zh': {'title': '闭环框架提升图形程序合成能力', 'desc': '本论文提出了一种闭环框架，用于图形程序合成，结合了大规模数据集和基准测试，以及新颖的强化学习优化方法，以提高从图像生成可执行TikZ代码的能力。图形程序合成对于将静态视觉数据反向工程为可编辑的TikZ代码至关重要，但由于TikZ对空间精度的严格要求，给多模态大语言模型带来了挑战。为了解决数据质量和评估缺口，本文介绍了SciTikZ-230K数据集和SciTikZ-Bench基准，涵盖了多种科学领域，并评估视觉保真度和结构逻辑。通过引入双重自一致性强化学习优化范式，本文的模型SciTikZer-8B在性能上超越了许多大型模型，展示了其在视觉代码优化方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.04979', 'title': 'Squeez: Task-Conditioned Tool-Output Pruning for Coding Agents', 'url': 'https://huggingface.co/papers/2604.04979', 'abstract': 'Abstract A task-conditioned tool-output pruning model achieves high recall and F1 scores while dramatically reducing input token consumption compared to zero-shot and heuristic baselines.  AI-generated summary Coding agents repeatedly consume long tool observations even though only a small fraction of each observation matters for the next step. We study task-conditioned tool-output pruning: given a focused query and one tool output, return the smallest verbatim evidence block the agent should inspect next. We introduce a benchmark of 11,477 examples built from SWE-bench repository interactions and synthetic multi-ecosystem tool outputs, with a manually curated 618-example test set. We fine-tune Qwen 3.5 2B with LoRA and compare it against larger zero-shot models and heuristic pruning baselines. Our model reaches 0.86 recall and 0.80 F1 while removing 92% of input tokens, outperforming zero-shot Qwen 3.5 35B A3B by 11 recall points and all heuristic baselines by a wide margin.', 'score': 1, 'issue_id': 1842, 'pub_date': '2026-04-04', 'pub_date_card': {'ru': '4 апреля', 'en': 'April 4', 'zh': '4月4日'}, 'hash': '089a596452581f11', 'authors': ['Ádám Kovács'], 'affiliations': ['KR Labs'], 'pdf_title_img': 'assets/pdf/title_img/2604.04979.jpg', 'data': {'categories': ['#training', '#dataset', '#agents', '#inference', '#benchmark', '#small_models', '#plp'], 'emoji': '✂️', 'ru': {'title': 'Умное обрезание: сокращение входа без потери качества для агентов кодирования', 'desc': 'В статье представлена модель обрезания выходов инструментов, обусловленная задачей, которая помогает агентам по кодированию эффективно работать с длинными наблюдениями от инструментов. Авторы предложили подход, при котором модель извлекает только наиболее релевантные фрагменты текста из полного выхода инструмента, необходимые для выполнения текущей задачи. Для оценки качества была собрана бенчмарк из 11,477 примеров, включающих реальные взаимодействия и синтетические данные, с тщательно размеченным тестовым набором из 618 примеров. Модель, настроенная с использованием LoRA на основе Qwen 2B, достигла значения recall 0.86 и F1 0.80 при сокращении количества входных токенов на 92%, превзойдя нулевые и эвристические методы.'}, 'en': {'title': 'Efficient Pruning for Enhanced AI Performance', 'desc': "This paper presents a task-conditioned tool-output pruning model that effectively reduces the number of input tokens needed for processing while maintaining high performance metrics like recall and F1 score. The model focuses on identifying and returning only the most relevant parts of tool outputs based on specific queries, which helps coding agents avoid unnecessary information. A comprehensive benchmark of 11,477 examples was created to evaluate the model's effectiveness against larger zero-shot models and heuristic methods. The results show that the proposed model significantly outperforms existing approaches by achieving a recall of 0.86 and an F1 score of 0.80, while eliminating 92% of input tokens."}, 'zh': {'title': '任务导向的工具输出修剪模型', 'desc': '本文提出了一种基于任务条件的工具输出修剪模型，该模型在减少输入令牌消耗的同时，显著提高了召回率和F1分数。研究表明，编码代理在处理长工具观察时，实际上只有一小部分信息对下一步有用。我们引入了一种新的基准，包含11477个示例，并通过手动策划的618个测试集进行评估。经过LoRA微调的Qwen 3.5 2B模型在召回率和F1分数上表现优异，超越了更大的零-shot模型和启发式修剪基线。'}}}, {'id': 'https://huggingface.co/papers/2604.03619', 'title': 'Can Natural Image Autoencoders Compactly Tokenize fMRI Volumes for Long-Range Dynamics Modeling?', 'url': 'https://huggingface.co/papers/2604.03619', 'abstract': "Abstract TABLeT uses a 2D natural image autoencoder to tokenize fMRI volumes into compact continuous tokens, enabling efficient long-sequence spatiotemporal modeling with a simple Transformer encoder while maintaining superior performance and computational efficiency.  AI-generated summary Modeling long-range spatiotemporal dynamics in functional Magnetic Resonance Imaging (fMRI) remains a key challenge due to the high dimensionality of the four-dimensional signals. Prior voxel-based models, although demonstrating excellent performance and interpretation capabilities, are constrained by prohibitive memory demands and thus can only capture limited temporal windows. To address this, we propose TABLeT (Two-dimensionally Autoencoded Brain Latent Transformer), a novel approach that tokenizes fMRI volumes using a pre-trained 2D natural image autoencoder. Each 3D fMRI volume is compressed into a compact set of continuous tokens, enabling long-sequence modeling with a simple Transformer encoder with limited VRAM. Across large-scale benchmarks including the UK-Biobank (UKB), Human Connectome Project (HCP), and ADHD-200 datasets, TABLeT outperforms existing models in multiple tasks, while demonstrating substantial gains in computational and memory efficiency over the state-of-the-art voxel-based method given the same input. Furthermore, we develop a self-supervised masked token modeling approach to pre-train TABLeT, which improves the model's performance for various downstream tasks. Our findings suggest a promising approach for scalable and interpretable spatiotemporal modeling of brain activity. Our code is available at https://github.com/beotborry/TABLeT.", 'score': 1, 'issue_id': 1841, 'pub_date': '2026-04-04', 'pub_date_card': {'ru': '4 апреля', 'en': 'April 4', 'zh': '4月4日'}, 'hash': '8543a185cb0331e8', 'authors': ['Peter Yongho Kim', 'Juhyeon Park', 'Jungwoo Park', 'Jubin Choi', 'Jungwoo Seo', 'Jiook Cha', 'Taesup Moon'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2604.03619.jpg', 'data': {'categories': ['#interpretability', '#open_source', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Сжатие мозговых данных через образные токены для эффективной нейросетевой обработки', 'desc': 'TABLeT предлагает новый подход к анализу fMRI данных, используя предварительно обученный автокодировщик для двумерных изображений с целью сжатия трёхмерных томов мозга в компактные токены. Этот метод позволяет применять Transformer архитектуру для моделирования длинных пространственно-временных последовательностей с ограниченными вычислительными ресурсами. Исследователи также разработали self-supervised подход с маскированным моделированием токенов для предварительного обучения модели. На крупных бенчмарках (UK-Biobank, Human Connectome Project, ADHD-200) TABLeT превосходит существующие методы по качеству и эффективности, требуя значительно меньше памяти.'}, 'en': {'title': 'Efficient Spatiotemporal Modeling of fMRI with TABLeT', 'desc': "TABLeT introduces a novel method for analyzing fMRI data by using a 2D natural image autoencoder to convert 3D fMRI volumes into compact continuous tokens. This tokenization allows for efficient long-sequence modeling with a Transformer encoder, significantly reducing memory requirements while maintaining high performance. The model outperforms traditional voxel-based approaches across several large-scale datasets, demonstrating improved computational efficiency. Additionally, a self-supervised masked token modeling technique is employed to enhance the model's capabilities for various tasks related to brain activity analysis."}, 'zh': {'title': 'TABLeT：高效的脑活动时空建模新方法', 'desc': 'TABLeT是一种新颖的方法，通过使用预训练的二维自然图像自编码器，将功能性磁共振成像（fMRI）体积转化为紧凑的连续标记。这种方法能够有效地进行长序列时空建模，同时保持较高的性能和计算效率。与传统的基于体素的模型相比，TABLeT在多个大型基准测试中表现优越，且在计算和内存效率上有显著提升。此外，我们还开发了一种自监督的掩码标记建模方法，以预训练TABLeT，从而提高模型在各种下游任务中的表现。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (7)', '#agi', '#alignment (2)', '#architecture (4)', '#audio', '#benchmark (12)', '#cv', '#data (1)', '#dataset (6)', '#diffusion (2)', '#ethics', '#games (1)', '#graphs (1)', '#hallucinations', '#healthcare (1)', '#inference (5)', '#interpretability (2)', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (10)', '#open_source (7)', '#optimization (5)', '#plp (3)', '#rag (2)', '#reasoning (5)', '#rl (3)', '#rlhf (1)', '#robotics (1)', '#science (4)', '#security', '#small_models (4)', '#story_generation', '#survey (1)', '#synthetic', '#training (11)', '#transfer_learning (1)', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-08 15:03',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-08 15:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-08 15:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
