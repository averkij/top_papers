ment, Discrete-WAM establishes a shared discrete diffusion framework with unified generative tasks, jointly formulating world modeling, world-action policy, and hierarchical decision-enabled policy, supporting compositional generalization across diverse driving scenarios. Experiments on large-scale autonomous-driving benchmarks show that Discrete-WAM achieves competitive performance while supporting controllable generation and counterfactual reasoning, offering a principled path toward more reliable decision-making.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '37ae91fb3c2af33c', 'authors': ['Ziyang Yao', 'Haochen Liu', 'Yuncheng Jiang', 'Zeyu Zhu', 'Zibin Guo', 'Jingru Wang', 'Tianle Liu', 'Jianwei Cui', 'Kuiyuan Yang', 'Hongwei Xie', 'Jingwei Zhao', 'Guang Chen', 'Hangjun Ye'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.05645.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#diffusion', '#robotics', '#benchmark', '#agents', '#training'], 'emoji': '🚗', 'ru': {'title': 'Дискретные токены для причинного рассуждения в автономном вождении', 'desc': 'Discrete-WAM представляет единую модель мировой политики на основе дискретных латентных представлений для автономного вождения, которая объединяет визуальные состояния и действия в выровненные дискретные токены. Метод использует общую diffusion модель для совместного формирования трёх задач: моделирования окружающего мира, политики взаимодействия с миром и иерархической политики принятия решений. Такой подход обеспечивает композиционное причинно-следственное рассуждение и поддержку контрфактических сценариев, позволяя автономному агенту явно моделировать, как его действия влияют на эволюцию окружающей среды. Экспериментальные результаты на крупномасштабных бенчмарках показывают конкурентоспособную производительность при одновременной поддержке управляемой генерации и надёжного принятия решений.'}, 'en': {'title': 'Empowering Autonomous Driving with Compositional Causal Reasoning', 'desc': 'The paper presents Discrete-WAM, a novel approach for autonomous driving that integrates discrete latent representations for vision and action. This method allows for compositional causal reasoning, enabling the system to understand how its actions affect the environment and predict various future scenarios. Unlike traditional methods that focus solely on state-to-action mappings, Discrete-WAM utilizes a shared discrete diffusion framework to model the dynamics of the world and the actions taken. The results demonstrate that Discrete-WAM not only performs competitively on benchmarks but also enhances the ability to generate controlled and counterfactual scenarios, improving decision-making reliability.'}, 'zh': {'title': '离散世界模型：自动驾驶的因果推理新路径', 'desc': 'Discrete-WAM是一种统一的离散潜在视觉-行动世界策略，能够在自动驾驶中实现组合因果推理和反事实推理。它通过对齐的离散标记和共享的离散扩散框架来表示未来的视觉状态和自我行动。与传统的端到端方法不同，Discrete-WAM不仅捕捉状态与行动之间的相关性，还明确建模了基于行动的动态。实验表明，Discrete-WAM在大型自动驾驶基准测试中表现出色，支持可控生成和反事实推理，为更可靠的决策提供了原则性路径。'}}}, {'id': 'https://huggingface.co/papers/2606.06462', 'title': 'Benchmark Everything Everywhere All at Once', 'url': 'https://huggingface.co/papers/2606.06462', 'abstract': 'Abstract Automated benchmark creation system generates diverse evaluation datasets with minimal human intervention, enabling continuous model assessment across multiple domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Benchmarks are fundamental for evaluating and advancing LLMs and MLLMs by providing standardized and explicit measures of performance. However, their construction is labor-intensive and hard to reuse, raising concerns about sustainability and scalability. Moreover, existing benchmarks often quickly reach performance saturation after their release, resulting in insufficient discrimination among state-of-the-art models. To address these challenges, we introduce Benchmark Agent, a fully autonomous agentic system designed for benchmark building. Our framework orchestrates the complete benchmark construction pipeline, from user query analysis and subtask design to data annotation and quality control. To assess Benchmark Agent, we implement it to produce 15 representative benchmarks, spanning diverse evaluation scenarios, including text understanding, multimodal understanding, and domain-specific reasoning. Extensive experiments, including human evaluation, LLM-as-a-judge assessment, and consistency checks, demonstrate Benchmark Agent can generate high-quality benchmark samples with minimal human involvement. More importantly, through continual evaluation, we observe several insightful findings, including that current models struggle with certain domain-specific reasoning tasks. We believe that rapidly evolving benchmarks can contribute significantly to the research community. The preview and code will be publicly available at the demo page and code repository.', 'score': 1, 'issue_id': 2379, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '030d3f29610ccb5b', 'authors': ['Shiyun Xiong', 'Dongming Wu', 'Peiwen Sun', 'Yuang Ai', 'Bokang Yang', 'Wencheng Han', 'Xiao-Hui Li', 'Xiangyu Yue'], 'affiliations': ['CPII under InnoHK', 'Huawei Technologies', 'MMLab, The Chinese University of Hong Kong', 'Shandong University', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2606.06462.jpg', 'data': {'categories': ['#dataset', '#agents', '#science', '#multimodal', '#open_source', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Автоматизированная система для непрерывного создания эталонных наборов данных', 'desc': 'В статье предлагается автоматизированная система Benchmark Agent для создания наборов данных оценки без значительного человеческого участия. Система управляет полным конвейером построения бенчмарков: от анализа запроса пользователя и разработки подзадач до аннотирования данных и контроля качества. Авторы продемонстрировали эффективность подхода, создав 15 репрезентативных бенчмарков для различных задач текстового понимания, мультимодального анализа и специализированного рассуждения. Результаты показывают, что система генерирует высококачественные образцы и выявляет важные закономерности, такие как затруднения моделей с задачами специфичного для конкретной области рассуждения.'}, 'en': {'title': 'Automating Benchmark Creation for Continuous Model Evaluation', 'desc': 'This paper presents Benchmark Agent, an automated system for creating diverse evaluation datasets for machine learning models with minimal human input. The system addresses the challenges of traditional benchmark creation, which is often labor-intensive and lacks scalability. By automating the entire process from query analysis to quality control, Benchmark Agent can produce high-quality benchmarks that facilitate continuous assessment of large language models (LLMs) and multimodal language models (MLLMs). The results show that this approach not only generates effective benchmarks but also reveals important insights into the limitations of current models in specific reasoning tasks.'}, 'zh': {'title': '自动化基准创建，推动模型评估新纪元', 'desc': '本文介绍了一种自动化基准创建系统，能够生成多样化的评估数据集，减少人工干预，从而实现对多领域模型的持续评估。该系统名为Benchmark Agent，能够自动完成基准构建的整个流程，包括用户查询分析、子任务设计、数据标注和质量控制。通过实施Benchmark Agent，我们生成了15个具有代表性的基准，涵盖文本理解、多模态理解和特定领域推理等多种评估场景。实验结果表明，Benchmark Agent能够在最小化人力参与的情况下生成高质量的基准样本，并为研究社区提供了重要的见解。'}}}, {'id': 'https://huggingface.co/papers/2606.04351', 'title': 'Video2LoRA: Parametric Video Internalization for Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.04351', 'abstract': 'Abstract Video2LoRA enables efficient video processing in vision-language models by predicting Low-Rank Adaptation weights from video representations, reducing computational costs while maintaining video-faithful outputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Processing video in vision-language models is expensive: each frame occupies hundreds of tokens, and inference cost scales with every frame and every repeated query. We introduce Video2LoRA, a method for parametric video internalization. A perceiver hypernetwork reads the intermediate representations produced layer-by-layer as a frozen VLM encodes a video, and generates a Low-Rank Adaptation (LoRA) adapter in a single forward pass. Unlike standard LoRA fine-tuning, which requires iterative gradient updates, Video2LoRA predicts these weights directly from the video. Trained for SmolVLM2 500M and 2.2B on video summarization and captioning, Video2LoRA enables the same frozen VLM to answer queries from the adapter alone, with zero visual tokens in its context at query time. Video2LoRA is statistically non-inferior and equivalent to direct video-in-context inference across all five captioning benchmarks at both model scales, and across seven of eight video question answering benchmark-scale pairings. Although trained only on 12 frames at 384px, it remains stable up to 1,024 frames and 1024px, where direct video-in-context inference often degenerates. Across this sweep, it reduces answer-time visual-token load by up to 1,500x and query TTFT by 6-80x, while preserving video-faithful outputs. We also find that independently generated adapters for non-overlapping video segments can compose in rank space, suggesting a path toward chunked long-video internalization.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'f8f866e161ad73b1', 'authors': ['Manan Suri', 'Sarvesh Baskar', 'Dinesh Manocha'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.04351.jpg', 'data': {'categories': ['#architecture', '#small_models', '#video', '#multimodal', '#inference', '#training'], 'emoji': '🎬', 'ru': {'title': 'Эффективная видеообработка через предсказание адаптивных весов', 'desc': 'Video2LoRA предлагает эффективный способ обработки видео в vision-language моделях путём предсказания весов Low-Rank Adaptation (LoRA) непосредственно из промежуточных представлений видео. Вместо традиционной fine-tuning, которая требует итеративных градиентных обновлений, метод использует гиперсеть типа Perceiver для прямого предсказания параметров адаптера в один проход. Модель достигает статистической эквивалентности стандартному подходу с видео в контексте на эталонах видеосаммаризации и видеовопросов, при этом снижая вычислительные затраты в 6-80 раз за счёт исключения визуальных токенов из контекста запроса. Метод демонстрирует масштабируемость до 1024 кадров при сохранении адекватности выходов видео и возможностью композиции адаптеров для обработки длинных видео.'}, 'en': {'title': 'Efficient Video Processing with Low-Rank Adaptation', 'desc': 'Video2LoRA is a novel method that enhances video processing in vision-language models by predicting Low-Rank Adaptation (LoRA) weights directly from video representations. This approach significantly reduces the computational costs associated with processing each video frame, which typically requires handling a large number of tokens. By utilizing a perceiver hypernetwork, Video2LoRA generates LoRA adapters in a single forward pass, eliminating the need for iterative gradient updates. The method has been shown to maintain performance comparable to traditional video-in-context inference while drastically lowering the visual-token load and improving query response times.'}, 'zh': {'title': '高效视频处理的新方法：Video2LoRA', 'desc': 'Video2LoRA是一种高效的视频处理方法，旨在降低视觉语言模型中的计算成本，同时保持视频输出的真实性。该方法通过从视频表示中预测低秩适配器（LoRA）权重，避免了传统LoRA微调所需的迭代梯度更新。Video2LoRA能够在一次前向传递中生成适配器，使得冻结的视觉语言模型可以仅通过适配器回答查询，而无需在上下文中使用视觉标记。经过训练后，Video2LoRA在视频摘要和字幕生成任务中表现出色，显著减少了视觉标记的负担。'}}}, {'id': 'https://huggingface.co/papers/2606.01886', 'title': 'Absorbing Complexity: An Interaction-Native Knowledge Harness for Financial LLM Agents', 'url': 'https://huggingface.co/papers/2606.01886', 'abstract': 'Abstract Financial AI agents struggle with user complexity, but a new architecture called InKH addresses this by embedding complexity into the system through structured knowledge management and temporal memory mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Financial AI agents often fail for a simple reason: they make users carry the complexity. A user must repeatedly restate goals, risk preferences, portfolio context, past judgments, and shifting market assumptions, while the agent answers, retrieves, acts, and forgets. In finance, this is not just inconvenient. In tasks such as market analysis, copy-trading review, and trade preparation, forgotten context and stale memory can create latency, repeated errors, weak auditability, and unsafe decisions.   We propose the interaction-native knowledge harness (InKH), an architecture for financial LLM agents that absorbs complexity into the system. InKH converts user, market, portfolio, and tool events into structured operational knowledge. It uses passive knowledge injection to assemble a bounded working context buffer before the main model step, temporal graph memory for low-latency retrieval, a wiki audit surface for human-readable governance, and background extraction with maturity, decay, and write-time invalidation.   We evaluate InKH on a reproducible controlled synthetic benchmark with 24 random seeds, 4 rounds, 80 episodes per round, and 6 baselines, producing 46,080 baseline-conditioned evaluations. InKH achieves mean task quality of 0.815 at 900 ms latency. Compared with agent-driven wiki-walk memory, it reduces latency by 82.95 percent, token cost by 82.29 percent, and stale-knowledge usage by 96.58 percent, while improving quality by 0.108 and traceability by 0.461. Compared with a temporal-graph system without invalidation, it improves quality by 0.050 and reduces stale-memory usage by 96.58 percent with comparable serving cost.   The results support a design thesis for financial AI: adoption happens when complexity is absorbed by the system rather than transferred to the user. The benchmark validates architecture-level behavior, not live trading performance.', 'score': 1, 'issue_id': 2378, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '44702ebe6830a069', 'authors': ['Ailiya Borjigin', 'Igor Stadnyk', 'Ben Bilski', 'Maksym Chikita', 'Dmytro Kyrylenko', 'Sofiia Pidturkina', 'Julia Stadnyk'], 'affiliations': ['Inc4.net', 'True Trading'], 'pdf_title_img': 'assets/pdf/title_img/2606.01886.jpg', 'data': {'categories': ['#synthetic', '#optimization', '#agents', '#benchmark', '#architecture', '#training'], 'emoji': '💼', 'ru': {'title': 'Система должна помнить, чтобы пользователь мог забыть', 'desc': 'В статье предложена архитектура InKH для финансовых агентов на основе LLM, которая переносит сложность от пользователя на систему через структурированное управление знаниями. Система преобразует события пользователя, рынка, портфеля и инструментов в операционное знание и использует граф временных отношений для быстрого поиска информации с низкой задержкой. InKH включает механизмы пассивной инъекции знаний, аудита в виде вики и фоновую обработку с учётом зрелости и устаревания данных. Эксперименты показали, что архитектура достигает качества 0.815 при задержке 900 мс и превосходит базовые модели по скорости, стоимости токенов и актуальности контекста.'}, 'en': {'title': 'Simplifying Complexity for Smarter Financial AI', 'desc': 'The paper introduces a new architecture called InKH designed to improve financial AI agents by managing user complexity more effectively. InKH integrates structured knowledge management and temporal memory mechanisms to retain important context, reducing the need for users to repeatedly provide information. This system enhances task performance by minimizing latency and errors associated with stale memory, leading to safer decision-making in financial tasks. The evaluation shows that InKH significantly outperforms existing methods in terms of task quality and efficiency, demonstrating that reducing user burden is key to successful AI adoption in finance.'}, 'zh': {'title': '让系统吸收复杂性，提升金融AI的效率', 'desc': '金融AI代理面临用户复杂性的问题，但新的架构InKH通过结构化知识管理和时间记忆机制将复杂性嵌入系统中。InKH将用户、市场、投资组合和工具事件转化为结构化的操作知识，从而减少用户的负担。该系统通过被动知识注入和时间图记忆实现低延迟检索，显著提高了任务质量和可追溯性。研究结果表明，复杂性应由系统吸收，而非转移给用户，这样才能促进金融AI的广泛应用。'}}}, {'id': 'https://huggingface.co/papers/2605.30848', 'title': 'LLM Anonymization Against Agentic Re-Identification', 'url': 'https://huggingface.co/papers/2605.30848', 'abstract': 'Abstract AURA is an LLM-powered anonymization framework that balances privacy protection against agentic web-search re-identification while preserving contextual utility through adaptive privacy scopes and mask-reconstruct methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic LLMs with web search change the threat model for text anonymization: weak contextual cues can become cross-referenceable evidence for re-identification, yet those same details also carry downstream analytic value of the text. Existing defenses either remove explicit identifiers, perturb text for formal privacy, or test rewritten text against non-web inference models, leaving underexplored the operating region between resistance to agentic web-search re-identification and utility retention. We introduce AURA (Anonymization with Utility-Retention Adaptation), an LLM-powered mask-reconstruct framework that decouples privacy localization from utility-preserving reconstruction and selects candidates with adversarial privacy and utility-retention checks. We evaluate AURA on real-user interview transcripts using re-identification attacks carried out by web-search agents, along with a utility evaluation based on interviewee-profile facts, codebook facts, and the joint contextual utility grid. Our results show that AURA improves the privacy-utility frontier by using adaptive privacy scope to strengthen resistance to agentic re-identification and using a mask-reconstruct anonymization method to better preserve contextual utility under fixed privacy scope.', 'score': 1, 'issue_id': 2380, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '88436d2a5b519c3f', 'authors': ['Ziwen Li', 'Jianing Wen', 'Tianshi Li'], 'affiliations': ['Khoury College of Computer Sciences Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30848.jpg', 'data': {'categories': ['#security', '#leakage'], 'emoji': '🛡️', 'ru': {'title': 'Равновесие между приватностью и полезностью в анонимизации текстов', 'desc': 'AURA — это фреймворк анонимизации на основе LLM, который решает проблему защиты личных данных от переидентификации через агентные веб-поиски. Система использует адаптивные области приватности и метод маскирования-реконструкции, чтобы одновременно скрывать чувствительную информацию и сохранять полезность текста для анализа. Фреймворк отделяет локализацию приватных данных от восстановления текста с сохранением контекста, а также применяет состязательные проверки безопасности и утилитарности. Экспериментальные результаты показывают, что AURA расширяет парето-границу между приватностью и полезностью текста при защите от атак переидентификации.'}, 'en': {'title': 'AURA: Balancing Privacy and Utility in Text Anonymization', 'desc': 'AURA is a framework that uses large language models (LLMs) to anonymize text while maintaining its usefulness. It addresses the challenge of protecting privacy against re-identification through web searches, which can exploit weak contextual clues. The framework employs adaptive privacy scopes and mask-reconstruct methods to balance privacy and utility, ensuring that important information is not lost. Evaluation of AURA shows it effectively enhances privacy while preserving the contextual value of the data.'}, 'zh': {'title': 'AURA：隐私与实用性的平衡之道', 'desc': 'AURA是一个基于大型语言模型的匿名化框架，旨在平衡隐私保护与网络搜索再识别之间的关系，同时通过自适应隐私范围和掩码重构方法保持上下文的实用性。该框架应对了文本匿名化中的新威胁模型，强调了弱上下文线索可能成为再识别的交叉参考证据。AURA通过将隐私定位与保持实用性的重构解耦，选择具有对抗性隐私和实用性保留检查的候选者。我们的评估结果表明，AURA在增强对网络再识别的抵抗力的同时，更好地保持了上下文的实用性。'}}}, {'id': 'https://huggingface.co/papers/2606.03645', 'title': 'The Shape of Addition: Geometric Structures of Arithmetic in Large Language Models', 'url': 'https://huggingface.co/papers/2606.03645', 'abstract': 'Abstract Large language models show arithmetic fragility due to geometric structures in residual streams, where neural noise causes quantization failures that can be detected and corrected through geometric analysis.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models exhibit paradoxical fragility in fundamental arithmetic, implying a disconnect between internal computation and discrete output. By analyzing the residual stream geometry during multi-operand addition, we identify the Iso-Raw-Sum Trajectory (IRST), a geometric structure where representations are anchored by semantic digits and modulated by continuous carry fibers. We propose the Noisy Quantization Model to explain this geometry, framing arithmetic errors as Geometric Slippages caused by internal neural noise pushing a continuous, latent Carry Potential across quantization thresholds. This geometric framework further elucidates Probe Versatility, explaining how lightweight probes can disentangle coexisting latent signals (such as ground truth versus hallucination) from a single activation vector. Finally, we validate these insights through a geometric consistency check method that effectively detects and corrects these quantization failures during inference. Our code is available at https://github.com/RL-MIND/Shape-of-Addition.', 'score': 1, 'issue_id': 2379, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '6339cd1459448c74', 'authors': ['Liuyuan Wen', 'Xun Zhu', 'Lihao Huang', 'Wenbin Li', 'Yang Gao'], 'affiliations': ['State Key Laboratory of Novel Software Technology, Nanjing University, Nanjing 210023, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.03645.jpg', 'data': {'categories': ['#math', '#inference', '#architecture'], 'emoji': '🔢', 'ru': {'title': 'Геометрия сложения: как нейронный шум разрушает арифметику в больших моделях', 'desc': 'Исследование показывает, что большие языковые модели испытывают хрупкость при выполнении арифметических операций из-за геометрических структур в остаточных потоках активаций. Авторы идентифицировали специальную геометрическую структуру IRST (изотропическая траектория сырой суммы), где нейронные представления организованы вокруг семантических цифр и модулируются непрерывными векторами переноса. Предложена модель шумной квантизации, которая объясняет ошибки в арифметике как геометрические смещения, вызванные внутренним нейронным шумом, отталкивающим непрерывный потенциал переноса через пороги квантизации. Разработан метод проверки геометрической консистентности, который позволяет обнаруживать и исправлять такие ошибки квантизации во время инференса.'}, 'en': {'title': 'Unraveling Arithmetic Fragility in Language Models', 'desc': "This paper explores the arithmetic limitations of large language models, highlighting how internal noise can lead to errors in calculations. It introduces the concept of the Iso-Raw-Sum Trajectory (IRST), which describes the geometric structure of how numbers are represented and manipulated within the model. The authors propose the Noisy Quantization Model to explain these arithmetic errors as Geometric Slippages, where noise affects the model's ability to maintain accurate calculations. Additionally, they present a method for detecting and correcting these errors, enhancing the model's performance during inference."}, 'zh': {'title': '揭示大型语言模型算术脆弱性的几何结构', 'desc': '这篇论文探讨了大型语言模型在算术运算中的脆弱性，主要是由于残差流中的几何结构导致的神经噪声引起的量化失败。通过分析多操作数加法过程中的残差流几何，研究者们识别出了一种称为Iso-Raw-Sum轨迹的几何结构。论文提出了噪声量化模型，将算术错误视为由内部神经噪声引起的几何滑移。最后，研究者们通过几何一致性检查方法验证了这些发现，能够有效检测和纠正推理过程中的量化失败。'}}}, {'id': 'https://huggingface.co/papers/2605.31058', 'title': 'Combinatorial Synthesis: Scaling Code RLVR via Atomic Decomposition and Recombination', 'url': 'https://huggingface.co/papers/2605.31058', 'abstract': "Abstract Atomic Decomposition and Recombination (ADR) framework generates novel and challenging verifiable code tasks for scalable reinforcement learning with verifiable rewards in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement Learning with Verifiable Rewards (RLVR) has recently emerged as the cornerstone for shaping the remarkable coding abilities of Large Language Models (LLMs). However, the scalability of RLVR is severely constrained by the scarcity of sufficiently challenging verifiable code tasks that target near the model's edge of competence. Prior studies often rely on heuristic seed expansions for data synthesis, which severely limits both novelty and difficulty. Consequently, the training value of such data fails to scale proportionally with the size of its synthesis. To this end, we propose Atomic Decomposition and Recombination (ADR), a novel framework that generates verifiable code tasks via decomposition into atomic elements and controlled recombination, thereby enabling the generation of genuinely novel and challenging verifiable code tasks. Experiments and analysis demonstrate that ADR achieves superior originality, difficulty, diversity, and test quality over existing baselines, and consistently delivers greater improvements in code ability across RLVR in diverse downstream domains, including algorithmic programming, tool usage, and data science. Our work sheds light on a new paradigm for novel code task synthesis and scalable RLVR training.", 'score': 1, 'issue_id': 2376, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '54e35f16a6004b3e', 'authors': ['Jiasheng Zheng', 'Boxi Cao', 'Boxi Yu', 'Yuzhong Zhang', 'Jialun Cao', 'Yaojie Lu', 'Hongyu Lin', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Lero the Research Ireland Centre for Software, University of Limerick', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.31058.jpg', 'data': {'categories': ['#training', '#optimization', '#synthetic', '#rl', '#data', '#plp'], 'emoji': '🧬', 'ru': {'title': 'Разложение и переконфигурация для масштабируемого обучения кодирования', 'desc': 'Статья предлагает фреймворк ADR для генерации новых и сложных задач на проверку кода, необходимых для масштабируемого обучения с подкреплением и проверяемыми вознаграждениями в больших языковых моделях. Авторы выявляют проблему нехватки достаточно сложных задач верификации кода, которые соответствуют уровню компетентности LLM, что ограничивает масштабируемость RLVR. Предложенный метод работает путём декомпозиции задач на атомарные элементы и их контролируемой рекомбинации, что позволяет создавать действительно оригинальные и сложные задачи. Эксперименты показывают, что ADR превосходит существующие методы по оригинальности, сложности и качеству, обеспечивая лучшие результаты при обучении моделей в различных областях программирования.'}, 'en': {'title': 'Revolutionizing Code Task Generation for Scalable RL', 'desc': 'The paper introduces the Atomic Decomposition and Recombination (ADR) framework, which creates new and challenging verifiable code tasks for scalable reinforcement learning. This framework addresses the limitations of existing methods that rely on heuristic seed expansions, which often produce less novel and difficult tasks. By breaking down tasks into atomic components and recombining them, ADR generates tasks that are more original and diverse, enhancing the training process for Large Language Models (LLMs). The results show that ADR significantly improves the coding capabilities of models trained with Reinforcement Learning with Verifiable Rewards (RLVR) across various programming domains.'}, 'zh': {'title': '新框架，挑战代码任务的生成', 'desc': '原子分解与重组（ADR）框架为可验证奖励的可扩展强化学习生成了新颖且具有挑战性的可验证代码任务。通过将任务分解为原子元素并进行控制性重组，ADR能够生成真正新颖且具有挑战性的代码任务，从而克服了以往方法在数据合成中的局限性。实验结果表明，ADR在原创性、难度、多样性和测试质量上优于现有基准，并在算法编程、工具使用和数据科学等多个下游领域中显著提升了代码能力。我们的研究为新型代码任务合成和可扩展的强化学习训练提供了新的思路。'}}}, {'id': 'https://huggingface.co/papers/2606.00125', 'title': 'Multimodal Music Recommendation System using LLMs', 'url': 'https://huggingface.co/papers/2606.00125', 'abstract': 'Abstract A multimodal framework for session-based music recommendation integrates audio, lyric, and semantic signals with LLM-based sequential reasoning to improve recommendation accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Music recommendation systems typically treat songs as opaque tokens, relying on collaborative interaction histories which overlooks semantic or acoustic content. Prior work has explored LLM-augmented, multimodal, and text-enhanced approaches to sequential recommendation, and while some methods partially combine semantic, acoustic, or engagement signals, none jointly model all three within a unified LLM-based sequential reasoning framework that grounds recommendations in actual song content. In this work, we propose a multimodal framework for session-based music recommendation that enriches the LastFM-1K dataset with three complementary signals: (1) audio and lyric embeddings extracted using pretrained music and text representation models, (2) LLM-generated semantic metadata using the MGPHot annotation schema, and (3) listening completion ratios. We adopt the E4SRec framework by extending it with multimodal features and different item ID encoder backbones, including SASRec, BERT4Rec, and GRU4Rec. We further extend the LLM backbone option with LLaMa-2-13B, Qwen2.5-7B-Instruct, and LLaMa-3-70B in both zero-shot and fine-tuned settings. Our experiments show that integrating content-based features improves over ID-only baselines up to 95% in terms of Recall and 79% in terms of NDCG. Moreover, our experiments show that naive multimodal fusion does not always yield additive improvements, highlighting challenges in cross-modal integration. We release a large-scale multimodal benchmark for music recommendation.', 'score': 1, 'issue_id': 2376, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '88b0c1e105893a1f', 'authors': ['Srikar Prabhas Kandagatla', 'Sreehitha R. Narayana', 'Chandana Magapu', 'Swetha Mohan', 'Shamanth Kuthpadi', 'Hongjie Chen', 'Ryan A. Rossi', 'Franck Dernoncourt', 'Nesreen Ahmed'], 'affiliations': ['Adobe Research', 'Cisco Research', 'Dolby Laboratories', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2606.00125.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset'], 'emoji': '🎵', 'ru': {'title': 'Три модальности лучше одной: мультимодальная рекомендация музыки с LLM', 'desc': 'В работе предложена мультимодальная система для рекомендации музыки на основе сессий, которая объединяет три типа сигналов: аудио- и лирические эмбеддинги, семантические метаданные, полученные с помощью большой языковой модели, и метрики прослушивания. Авторы расширили фреймворк E4SRec различными энкодерами айтемов (SASRec, BERT4Rec, GRU4Rec) и несколькими LLM-бэкбонами, включая LLaMa и Qwen, протестировав их в нулевой выборке и с файн-тюнингом. Экспериментальные результаты показывают, что интеграция признаков контента повышает качество рекомендаций на 95% по метрике Recall и на 79% по NDCG по сравнению с базовыми моделями, основанными только на айтем-айдентификаторах. Исследование выявило, что наивное слияние модальностей не всегда дает дополнительные улучшения, что указывает на сложность кроссмодального интегрирования.'}, 'en': {'title': 'Harmonizing Music Recommendations with Multimodal Insights', 'desc': 'This paper presents a new framework for music recommendation that combines audio, lyrics, and semantic information using large language models (LLMs) for better accuracy. Traditional systems often ignore the actual content of songs, treating them as simple tokens based on user interactions. The proposed method enhances the LastFM-1K dataset by incorporating audio and lyric embeddings, LLM-generated metadata, and user engagement metrics. Experiments demonstrate significant improvements in recommendation performance, while also revealing the complexities of effectively integrating different types of data.'}, 'zh': {'title': '多模态音乐推荐：精准与挑战并存', 'desc': '这篇论文提出了一种多模态框架，用于基于会话的音乐推荐，结合了音频、歌词和语义信号，以提高推荐的准确性。传统的音乐推荐系统通常将歌曲视为不透明的标记，依赖于用户的互动历史，而忽视了歌曲的语义或声学内容。本文通过扩展E4SRec框架，整合了多种特征，包括音频和歌词嵌入、LLM生成的语义元数据以及听歌完成率，从而实现了更精准的推荐。实验结果表明，内容驱动的特征整合显著提升了推荐效果，但简单的多模态融合并不总是能带来预期的改进。'}}}, {'id': 'https://huggingface.co/papers/2605.27079', 'title': 'Trust Region Q Adjoint Matching', 'url': 'https://huggingface.co/papers/2605.27079', 'abstract': 'Abstract Trust Region Q-Adjoint Matching (TRQAM) addresses instability in off-policy reinforcement learning by adaptively controlling path-space KL divergence through projected dual descent, enabling stable fine-tuning of pretrained flow policies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Off-policy reinforcement learning of pretrained flow policies remains challenging due to the instability of optimization arising from the multi-step sampling process. Recently, Q-learning with Adjoint Matching (QAM) addressed this issue by reformulating into a memoryless stochastic optimal control (SOC) problem with a learned critic. However, QAM inherits a fundamental fragility of critic-guided improvement: small critic errors are amplified when critics are ill-conditioned, often leading to model collapse. This paper introduces Trust Region Q-Adjoint Matching (TRQAM), a stable off-policy fine-tuning algorithm that adaptively controls the path-space KL with pretrained flow policies through projected dual descent. Specifically, we optimize the trust-region parameter λ in SOC dynamics, and theoretically show that the path-space KL can be represented by a closed-form function of λ. As a result, our method can precisely control the exact deviation from pretrained flow policies, achieving stable off-policy RL. Through experiments on 50 OGBench tasks, TRQAM consistently outperforms prior arts in both offline RL and offline-to-online RL. In particular, TRQAM achieves an overall success rate of 68% in offline RL, substantially improves the strongest baseline at 46%.', 'score': 1, 'issue_id': 2380, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e07a4c4556d7d82a', 'authors': ['Yonghoon Dong', 'Kyungmin Lee', 'Changyeon Kim', 'Jaehyuk Kim', 'Jinwoo Shin'], 'affiliations': ['KAIST', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.27079.jpg', 'data': {'categories': ['#optimization', '#rl', '#training'], 'emoji': '🎯', 'ru': {'title': 'Стабильное внепольное обучение через адаптивный контроль доверительного региона', 'desc': 'Статья представляет Trust Region Q-Adjoint Matching (TRQAM) — алгоритм внепольного обучения с подкреплением, который решает проблему нестабильности при дообучении предварительно обученных flow-политик. Метод адаптивно контролирует KL-дивергенцию в пространстве траекторий через проектированный двойственный спуск, переформулируя задачу как безпамятную задачу стохастического оптимального управления с обучаемой критик-функцией. Авторы доказывают, что путем оптимизации параметра доверительной области λ можно точно контролировать отклонение от исходной политики, предотвращая коллапс модели, вызванный ошибками критика. Экспериментальная оценка на 50 задачах показывает, что TRQAM достигает 68% успешности в offline RL, значительно превосходя существующие методы.'}, 'en': {'title': 'Stabilizing Off-Policy RL with TRQAM', 'desc': 'The paper introduces Trust Region Q-Adjoint Matching (TRQAM), a new method for improving stability in off-policy reinforcement learning. It addresses the challenges of optimization instability caused by multi-step sampling in pretrained flow policies. By adaptively controlling the path-space KL divergence through projected dual descent, TRQAM ensures stable fine-tuning of these policies. Experimental results show that TRQAM significantly outperforms existing methods, achieving a 68% success rate in offline reinforcement learning tasks.'}, 'zh': {'title': '稳定的离线强化学习微调算法', 'desc': '信任区域Q-伴随匹配（TRQAM）通过自适应控制路径空间的KL散度，解决了离线强化学习中的不稳定性问题，从而实现了对预训练流政策的稳定微调。该方法利用投影对偶下降优化信任区域参数λ，并理论上证明了路径空间KL可以用λ的封闭形式函数表示。TRQAM在50个OGBench任务上的实验结果显示，其在离线强化学习和离线到在线强化学习中均优于现有方法，离线强化学习的整体成功率达到68%，显著提高了最强基线的46%。因此，TRQAM为离线强化学习提供了一种稳定的微调算法。'}}}, {'id': 'https://huggingface.co/papers/2606.05172', 'title': 'Is This Edit Correct? A Multi-Dimensional Benchmark for Reasoning-Aware Image Editing', 'url': 'https://huggingface.co/papers/2606.05172', 'abstract': 'Abstract RE-Edit benchmark evaluates image editing systems on five reasoning dimensions to assess logical consistency beyond visual plausibility.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion-based image editing has achieved strong visual fidelity under natural language instructions, yet most existing systems still operate at the level of surface instruction following, without reasoning about the implicit contextual constraints embedded in real user requests. This often leads to visually plausible but logically inconsistent edits. In this work, we introduce RE-Edit, a benchmark for REasoning-aware image Editing that evaluates image editing systems across five complementary reasoning dimensions: physical, environmental, cultural, causal, and referential. RE-Edit comprises 1,000 carefully curated samples, each designed such that visual plausibility alone is insufficient and correct editing requires satisfying implicit logical constraints. To support fine-grained analysis, we establish dimension-aligned evaluation criteria and conduct a comprehensive study of ten open-source and two commercial image editing models. Our results show that even advanced systems frequently struggle with implicit multi-dimensional reasoning despite producing high-quality visuals. We further present a lightweight reasoning-guided post-edit baseline as an initial exploration, illustrating how inserting explicit reasoning can help mitigate such failures in a model-agnostic manner.', 'score': 1, 'issue_id': 2376, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '671df32c2ec966f4', 'authors': ['Yixuan Ding', 'Wei Huang', 'Ruijie Quan', 'Xiaojuan Qi', 'Yi Yang'], 'affiliations': ['The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05172.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#cv', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Логичное редактирование изображений: от визуального правдоподобия к семантической согласованности', 'desc': 'В работе представлен бенчмарк RE-Edit для оценки систем редактирования изображений на основе диффузионных моделей. Бенчмарк проверяет логическую согласованность отредактированных изображений по пяти измерениям рассуждения: физическому, окружающему, культурному, причинному и референциальному. Исследование показало, что даже продвинутые системы часто не справляются с неявными многомерными ограничениями, хотя генерируют визуально правдоподобные результаты. Авторы предложили легкий метод постобработки, управляемый явными рассуждениями, который помогает снизить частоту логических ошибок независимо от архитектуры модели.'}, 'en': {'title': 'Enhancing Image Editing with Logical Reasoning', 'desc': 'The RE-Edit benchmark evaluates image editing systems by focusing on their ability to reason logically, not just create visually appealing images. It identifies five key reasoning dimensions: physical, environmental, cultural, causal, and referential, which are essential for understanding user requests. The benchmark consists of 1,000 samples that require more than just visual fidelity; they demand adherence to implicit logical constraints. The study reveals that even advanced image editing models often fail to meet these reasoning requirements, highlighting the need for improved reasoning capabilities in AI systems.'}, 'zh': {'title': '逻辑一致性：图像编辑的新标准', 'desc': 'RE-Edit基准测试评估图像编辑系统在五个推理维度上的表现，以评估逻辑一致性超越视觉可信度。尽管基于自然语言指令的图像编辑技术在视觉保真度上取得了显著进展，但许多现有系统仍然仅停留在表面指令的执行上，未能考虑用户请求中隐含的上下文约束。这常常导致视觉上可信但逻辑上不一致的编辑结果。我们提出的RE-Edit基准包含1000个精心策划的样本，旨在通过五个互补的推理维度来评估图像编辑系统的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.00644', 'title': 'ForeSci: Evaluating LLM Agents for Forward-Looking AI Research Judgment', 'url': 'https://huggingface.co/papers/2606.00644', 'abstract': "Abstract ForeSci is a temporally controlled benchmark that evaluates LLM agents' ability to make forward-looking research decisions from historical evidence across fast-moving AI domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI research often requires decisions before future evidence exists: which bottleneck to attack, which direction to pursue, or where a project should be positioned. We introduce ForeSci, a temporally controlled benchmark for evaluating whether LLM agents can make such forward-looking research judgements from historical evidence. ForeSci contains 500 tasks across four fast-moving AI domains and four decision families. Each task is paired with a cutoff-aligned offline knowledge base; post-cutoff papers are hidden during generation and used only for validation. To avoid random future-event prediction, tasks are derived from pre-cutoff taxonomy branches and evidence signals, and answer-generation backbones are selected to precede the task cutoffs. We evaluate native LLMs, Hybrid RAG, and three research-agent adaptations across four backbones. Results show that explicit evidence organization improves traceability and factual support, but gains depend strongly on the decision family. Diagnostics reveal a recurring evidence-decision decoupling: agents may cite relevant evidence while forecasting the wrong research object. ForeSci turns forward-looking AI research judgement into a controlled benchmark for evaluating research agents as decision-making systems.", 'score': 0, 'issue_id': 2378, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '381c23a5019ab85a', 'authors': ['Qiuyu Tian', 'Haojie Yin', 'Yingce Xia', 'Youyong Kong', 'Zequn Liu'], 'affiliations': ['Beijing Zhongguancun Academy', 'Duke Kunshan University', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2606.00644.jpg', 'data': {'categories': ['#rag', '#dataset', '#agents', '#benchmark'], 'emoji': '🔮', 'ru': {'title': 'Предсказание будущего науки из прошлого: бенчмарк для исследовательских агентов', 'desc': 'ForeSci — это бенчмарк с временным контролем для оценки способности агентов на основе больших языковых моделей принимать предвидящие решения о направлениях исследований, опираясь на исторические данные в быстро развивающихся областях AI. Бенчмарк содержит 500 задач из четырех доменов AI с использованием отсеченной по времени базы знаний, где статьи после контрольной даты скрыты во время генерации и используются только для валидации. Исследователи оценили нативные LLM, гибридные RAG-системы и адаптированные research-агенты, обнаружив, что явная организация доказательств улучшает факт-чекинг, но эффективность зависит от типа решения. Диагностика выявила систематическую проблему: агенты могут ссылаться на релевантные доказательства, но при этом предсказывать неправильные объекты исследования.'}, 'en': {'title': "Evaluating AI's Future Research Decisions with ForeSci", 'desc': 'ForeSci is a benchmark designed to assess the ability of large language model (LLM) agents to make informed research decisions based on historical data in rapidly evolving AI fields. It includes 500 tasks across four AI domains, focusing on different types of research decisions. The benchmark ensures that LLMs generate responses without access to future information, allowing for a fair evaluation of their predictive capabilities. Results indicate that while organizing evidence enhances decision-making accuracy, the effectiveness varies depending on the type of decision being made.'}, 'zh': {'title': '前瞻性研究决策的评估基准', 'desc': 'ForeSci是一个时间控制的基准，用于评估大型语言模型（LLM）代理从历史证据中做出前瞻性研究决策的能力。该基准包含500个任务，涵盖四个快速发展的人工智能领域和四个决策类别。每个任务都与一个截止对齐的离线知识库配对，确保生成过程中隐藏后截止的论文，仅用于验证。研究结果表明，明确的证据组织可以提高可追溯性和事实支持，但效果依赖于决策类别。'}}}, {'id': 'https://huggingface.co/papers/2606.05515', 'title': 'BRepCLIP: Contrastive Multimodal Pretraining on BRep Primitives for CAD Understanding', 'url': 'https://huggingface.co/papers/2606.05515', 'abstract': "Abstract BRepCLIP enables multimodal representation learning for CAD models by aligning boundary representation geometry with language and image embeddings through contrastive pretraining, achieving superior retrieval and classification performance compared to point-based methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Learning representations of CAD models is a largely open problem. While 3D representation learning has flourished around point clouds and meshes, the native format of CAD - boundary representations BReps, which encodes exact parametric surfaces, curves, and their topology, has received little attention as a representation learning substrate. We introduce BRepCLIP, the first framework to align BRep geometry with language and image embeddings through contrastive pretraining. We model each CAD object as a sequence of face and edge tokens with separate discrete vocabularies for surface and curve geometry, augmented with spatial and semantic descriptors that capture surface types (e.g., cylindrical, torus, NURBS) and curve primitives (e.g., line, arc, B-spline). A transformer encoder aggregates these tokens into a global BRep embedding, aligned with CLIP's text and image encoders via a joint contrastive objective. BRepCLIP generates more discriminative and semantically grounded embeddings than existing point-based alternatives, improving Top-1 retrieval over OpenShape by 40.4%, 22.0%, and 23.9% on ABC, CADParser, and Automate, respectively, and improving zero-shot classification on FabWave by 15% in Top-1 score. We further demonstrate its utility as a CAD-aware similarity metric for evaluating text and image-conditioned CAD generation, establishing the importance of structure-aware pretraining for multimodal CAD understanding. Project page is available at https://muhammadusama100.github.io/BrepClip2026/", 'score': 0, 'issue_id': 2380, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'a885f7f078fba913', 'authors': ['Muhammad Usama', 'Didier Stricker', 'Mohammad Sadil Khan', 'Muhammad Zeshan Afzal'], 'affiliations': ['DFKI', 'RPTU Kaiserslautern-Landau'], 'pdf_title_img': 'assets/pdf/title_img/2606.05515.jpg', 'data': {'categories': ['#multimodal', '#3d', '#architecture'], 'emoji': '🏗️', 'ru': {'title': 'Выравнивание граничных представлений CAD с текстом и изображениями через контрастивное обучение', 'desc': 'BRepCLIP — это первая система для мультимодального обучения представлений CAD-моделей, которая выравнивает граничные представления геометрии с текстовыми и визуальными эмбеддингами через контрастивное предварительное обучение. Модель кодирует геометрию CAD как последовательность токенов граней и рёбер с описаниями типов поверхностей и кривых, затем агрегирует их трансформатором для получения глобального эмбеддинга. Система достигает существенно лучших результатов в задачах поиска и классификации по сравнению с методами на основе облаков точек — улучшение на 40% в метрике Top-1 retrieval. BRepCLIP демонстрирует важность структурно-осознанного предварительного обучения для понимания CAD в многомодальных задачах, включая оценку генерации моделей по текстовым и изображениям описаниям.'}, 'en': {'title': 'Revolutionizing CAD Representation with BRepCLIP', 'desc': 'BRepCLIP is a novel framework designed for multimodal representation learning of CAD models by integrating boundary representation (BRep) geometry with language and image embeddings. It utilizes contrastive pretraining to align these different modalities, resulting in improved retrieval and classification performance over traditional point-based methods. The framework models CAD objects as sequences of tokens representing faces and edges, enhanced with spatial and semantic descriptors for better understanding of surface types and curve primitives. By employing a transformer encoder, BRepCLIP generates more effective embeddings, achieving significant performance gains in various benchmarks and demonstrating its potential for CAD-aware applications.'}, 'zh': {'title': 'BRepCLIP：多模态 CAD 表示学习的新突破', 'desc': 'BRepCLIP 是一种新框架，通过对比预训练将边界表示几何与语言和图像嵌入对齐，从而实现多模态表示学习。它将每个 CAD 对象建模为面和边的序列，并使用离散词汇表来表示表面和曲线几何。与现有的基于点的方法相比，BRepCLIP 生成了更具区分性和语义基础的嵌入，显著提高了检索和分类性能。该方法展示了结构感知预训练在多模态 CAD 理解中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.01753', 'title': 'Quality-Guided Semi-Supervised Learning for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2606.01753', 'abstract': 'Abstract A quality-guided semi-supervised learning framework for medical image segmentation that uses a dedicated quality predictor to improve pseudolabel reliability and segmentation performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training accurate medical image segmentation models requires large amounts of densely annotated data, which is costly and time-consuming to obtain. Semi-supervised learning (SSL) alleviates this by learning from both abundant unlabeled data and limited labeled data. However, most modern SSL methods rely on pseudolabels for unlabeled data, and typically assess their reliability through model confidence or uncertainty, measures that are self-referential and lack explicit grounding in segmentation quality. Instead, we propose a quality-guided SSL framework that trains a dedicated network to estimate segmentation quality from image-mask pairs. The predictor is trained on variable-quality masks generated through synthetic corruptions augmented with imperfect outputs from partially trained segmentation models, capturing realistic error patterns encountered during training. We integrate the quality predictor into SSL through two complementary mechanisms: a quality-aware regularization loss and a quality-based pseudolabel sample reweighting scheme. We show that our method serves as a drop-in enhancement to existing SSL frameworks. Extensive experiments across five datasets and multiple architectures demonstrate consistent improvements over competing SSL methods, advancing the state-of-the-art in semi-supervised medical image segmentation.', 'score': 0, 'issue_id': 2376, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'c6b8ae85014310eb', 'authors': ['Kumar Abhishek', 'Ghassan Hamarneh'], 'affiliations': ['School of Computing Science, Simon Fraser University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2606.01753.jpg', 'data': {'categories': ['#data', '#training', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'Качество выше доверия: предиктор для надежной полусупервизной сегментации медицинских изображений', 'desc': 'В работе предложен фреймворк полусупервизного обучения для сегментации медицинских изображений, который использует специализированный предиктор качества для повышения надежности псевдоразметок. Основная идея заключается в том, что вместо оценки надежности псевдоразметок через уверенность модели, авторы обучают отдельную нейросеть предсказывать качество сегментации на основе пар изображение-маска. Предиктор качества тренируется на синтетически поврежденных масках и реальных ошибках, возникающих во время обучения сегментационной модели. Предложенный метод интегрируется в полусупервизное обучение через две механизма: регуляризационную функцию потерь, взвешенную по качеству, и переобучение псевдоразметок на основе оценок качества.'}, 'en': {'title': 'Enhancing Medical Image Segmentation with Quality-Guided Learning', 'desc': 'This paper presents a new approach to improve medical image segmentation using a quality-guided semi-supervised learning (SSL) framework. It introduces a dedicated quality predictor that assesses the reliability of pseudolabels, which are used for training on unlabeled data. By training this predictor on various quality levels of masks, the framework captures realistic error patterns and enhances segmentation performance. The proposed method integrates quality assessment into SSL through regularization and sample reweighting, leading to significant improvements over existing SSL techniques in medical imaging tasks.'}, 'zh': {'title': '质量引导的半监督学习提升医学图像分割', 'desc': '本文提出了一种质量引导的半监督学习框架，用于医学图像分割。该框架使用专门的质量预测器来提高伪标签的可靠性和分割性能。通过训练一个网络来估计图像-掩膜对的分割质量，结合质量感知的正则化损失和伪标签样本重加权机制，增强了现有的半监督学习方法。实验结果表明，该方法在多个数据集和架构上均优于其他半监督学习方法，推动了医学图像分割的最新进展。'}}}, {'id': 'https://huggingface.co/papers/2606.01317', 'title': 'SABER: Benchmarking Operational Safety of LLM Coding Agents in Stateful Project Workspaces', 'url': 'https://huggingface.co/papers/2606.01317', 'abstract': 'Abstract Large language models deployed as coding agents exhibit significant safety violations in realistic project environments, necessitating new evaluation approaches beyond simple prompt refusal assessments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly deployed as coding agents, shifting safety from individual responses to action sequences. Existing benchmarks, however, primarily assess whether models refuse unsafe prompts, leaving impacts on stateful workspaces largely unexamined. We present SABER, a benchmark for environment-aware operational safety that places models in realistic agent-style projects and evaluates safety from the final environment state after a sequence of actions. Beyond binary safety-violation reports, SABER categorizes violations by cause, enabling analysis of model-specific safety profiles. Our evaluations show that even the best-performing model has more than a 54% harmful safety-violation rate (HSR), suggesting that current alignment remains insufficient for realistic project environments. SABER further reveals distinct safety profiles across models. Our benchmark is publicly available at https://github.com/sssr-lab/saber.', 'score': 0, 'issue_id': 2379, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '6a3706bfcdc50a1f', 'authors': ['Qi Hu', 'Yifeng Tang', 'Qinghua Wang', 'Lanyang Zhao', 'Pengji Zhang', 'Yuhao Qing', 'Xin Yao', 'Dong Huang', 'Lin Zhang', 'Zhuoran Ji'], 'affiliations': ['Carnegie Mellon University', 'National University of Singapore', 'Shandong University', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.01317.jpg', 'data': {'categories': ['#agents', '#security', '#open_source', '#benchmark', '#plp', '#alignment'], 'emoji': '⚠️', 'ru': {'title': 'Безопасность кодирующих агентов: за границами отказа от вредоносных запросов', 'desc': 'В статье представлен новый бенчмарк SABER для оценки безопасности больших языковых моделей, развёрнутых в качестве агентов для написания кода в реалистичных проектах. Традиционные подходы оценивают только отказ моделей от опасных запросов, но не учитывают влияние на реальное состояние рабочей среды и последовательности действий. Авторы показывают, что даже лучшие модели имеют более 54% вредоносных нарушений безопасности, что указывает на недостаточность текущих методов выравнивания. SABER категоризирует нарушения безопасности по причинам, позволяя провести детальный анализ профилей безопасности различных моделей.'}, 'en': {'title': 'Evaluating Coding Agent Safety with SABER', 'desc': 'This paper         const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (11)', '#agi', '#alignment (2)', '#architecture (12)', '#audio (1)', '#benchmark (20)', '#cv (5)', '#data (3)', '#dataset (16)', '#diffusion (3)', '#ethics (1)', '#games (1)', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (6)', '#interpretability', '#leakage (2)', '#long_context (3)', '#low_resource (1)', '#machine_translation (1)', '#math (2)', '#multilingual (3)', '#multimodal (18)', '#open_source (9)', '#optimization (13)', '#plp (5)', '#rag (1)', '#reasoning (12)', '#rl (7)', '#rlhf (2)', '#robotics (8)', '#science (2)', '#security (3)', '#small_models (2)', '#story_generation', '#survey', '#synthetic (3)', '#training (21)', '#transfer_learning (2)', '#video (9)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-06 00:01',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-06 00:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-06 00:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
