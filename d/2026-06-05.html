    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.05259', 'title': 'VideoKR: Towards Knowledge- and Reasoning-Intensive Video Understanding', 'url': 'https://huggingface.co/papers/2606.05259', 'abstract': 'Abstract VideoKR presents a large-scale video reasoning dataset and benchmark designed to enhance knowledge-intensive video understanding through expert-domain content and human-in-the-loop example generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce VideoKR, the first large-scale training corpus specifically designed to strengthen knowledge- and reasoning-intensive video understanding. It comprises 315K video reasoning examples over 145K newly collected, CC-licensed, expert-domain videos. We develop a human-in-the-loop, skill-oriented example generation pipeline that targets progressively deeper video reasoning capabilities while ensuring the difficulty, diversity, and reliability of both the examples and their CoT rationales. We also curate VideoKR-Eval, a new expert-annotated benchmark where questions require genuine video understanding and knowledge-intensive reasoning rather than textual shortcuts. Our experiments show that, under a standard SFTrightarrowGRPO pipeline, models post-trained on VideoKR outperform prior post-training approaches on knowledge-intensive video reasoning while remaining competitive on general video reasoning, highlighting data design as a key driver of progress in video reasoning. We further conduct comprehensive ablations to isolate the contributions of VideoKR, providing actionable insights for future work.', 'score': 11, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '563aa46945d306ab', 'authors': ['Lin Fu', 'Zheyuan Yang', 'Yang Wang', 'Tingyu Song', 'Arman Cohan', 'Yilun Zhao'], 'affiliations': ['Tongji University, Shanghai, China', 'University of Chinese Academy of Sciences, Beijing, China', 'Yale University, New Haven, CT, USA', 'Zhejiang University, Hangzhou, Zhejiang, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.05259.jpg', 'data': {'categories': ['#video', '#multimodal', '#benchmark', '#training', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Качественные данные как ключ к прогрессу в видеорассуждениях', 'desc': 'В работе представлен VideoKR — первый крупномасштабный набор данных для обучения моделей глубокому пониманию видеоконтента с использованием знаний и рассуждений. Датасет содержит 315K примеров рассуждений на основе 145K видео от экспертов, созданных с применением методологии human-in-the-loop для обеспечения высокого качества. Авторы разработали pipeline генерации примеров, ориентированный на постепенное усложнение задач рассуждения, с гарантией разнообразия и надежности как самих примеров, так и цепочек мышления (CoT). Эксперименты показывают, что модели, дообученные на VideoKR используя SFT и GRPO, значительно превосходят существующие подходы в задачах интенсивного рассуждения о видеоконтенте.'}, 'en': {'title': 'Enhancing Video Understanding with Knowledge-Driven Reasoning', 'desc': 'VideoKR is a large-scale dataset aimed at improving video reasoning by focusing on knowledge-intensive understanding. It includes 315,000 examples derived from 145,000 expert-domain videos, created through a human-in-the-loop process to ensure high quality and diversity. The dataset is designed to challenge models with complex reasoning tasks that require genuine understanding of video content. Experiments show that models trained on VideoKR significantly outperform previous methods in knowledge-intensive video reasoning, emphasizing the importance of well-structured data in advancing this field.'}, 'zh': {'title': '增强视频理解的知识推理数据集', 'desc': 'VideoKR是一个大规模的视频推理数据集，旨在通过专家领域内容和人机协作生成示例来增强知识密集型视频理解。该数据集包含315,000个视频推理示例，基于145,000个新收集的、具有CC许可的专家领域视频。我们开发了一种人机协作的示例生成管道，旨在逐步提升视频推理能力，同时确保示例及其推理的难度、多样性和可靠性。实验结果表明，在标准的SFTrightarrowGRPO管道下，基于VideoKR进行后训练的模型在知识密集型视频推理上优于之前的后训练方法，同时在一般视频推理上也保持竞争力，突显了数据设计在视频推理进展中的关键作用。'}}}, {'id': 'https://huggingface.co/papers/2606.05275', 'title': 'Personal AI Agent for Camera Roll VQA', 'url': 'https://huggingface.co/papers/2606.05275', 'abstract': "Abstract A conversational AI agent is developed for personal camera roll visual question answering, featuring hierarchical memory and specialized tools for navigating large visual datasets with personalized content.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We study the personal camera roll visual question answering setting. In this setting, a conversational AI assistant can access a user's personal camera roll and retrieve relevant photos to answer queries, ranging from simple factual questions (e.g., ``Name of the food I tried yesterday?'') to more open-ended ones (e.g., ``Recommend some dishes I have never eaten before''). Given the vast nature of the personal camera roll (i.e., multiple years, hundreds to thousands of photos), a successful AI assistant needs to understand a long-horizon, highly personalized visual content stream in order to navigate and locate the correct and/or relevant information. To support this, we collect and manually annotate questions that mimic real-world usage. The final dataset, camroll, contains 50 users, 31,476 images, and 2,500 QA pairs. We further design camroll-agent, a conversational AI agent equipped with hierarchical memory and a minimal set of tools for efficient navigation over large, personalized visual memory. Experimental results show that camroll-agent outperforms numerous baselines and methods for long-context understanding AI agents system. Together, the camroll dataset and camroll-agent highlight the gap in AI agents' long-context reasoning: personalized visual memory requires different approaches from standard long-context textual memory, especially when consistency, visual details, and user-specific context are present.", 'score': 8, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '34f924e13505969a', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#long_context', '#reasoning'], 'emoji': '📸', 'ru': {'title': 'Персонализированное понимание визуальной памяти через иерархическое структурирование и долгосрочный контекст', 'desc': 'В работе предлагается conversational AI агент для ответа на вопросы о личной фотогалерее пользователя. Агент использует иерархическую память и специализированные инструменты для эффективной навигации по большим наборам персонализированных изображений. Авторы создали датасет камroll с 31 476 изображениями и 2 500 парами вопрос-ответ от 50 пользователей, отражающими реальные сценарии использования. Результаты показывают, что предложенный агент превосходит базовые подходы при работе с долгосрочным контекстом и демонстрирует необходимость специальных методов для персонализированной визуальной памяти, отличающихся от стандартных подходов работы с текстовыми данными.'}, 'en': {'title': 'Revolutionizing Personal Photo Queries with AI', 'desc': "This paper presents a conversational AI agent designed for answering questions about a user's personal camera roll, which is a collection of their photos. The agent utilizes hierarchical memory to efficiently navigate through large datasets of personalized images, allowing it to respond to both specific and open-ended queries. A new dataset called camroll was created, containing thousands of images and annotated questions to train and evaluate the AI's performance. The results demonstrate that the camroll-agent significantly improves long-context understanding in visual memory compared to existing methods, emphasizing the need for tailored approaches in handling personalized visual data."}, 'zh': {'title': '个性化视觉问答的智能助手', 'desc': '本文介绍了一种用于个人相册视觉问答的对话式人工智能代理。该代理具备层次化记忆和专门工具，能够在庞大的个性化视觉数据集中进行导航。研究表明，成功的AI助手需要理解长期的、个性化的视觉内容流，以便准确定位相关信息。通过收集和手动标注问题，最终构建了包含50个用户、31,476张图片和2,500个问答对的数据集，展示了个性化视觉记忆与标准文本记忆在长上下文推理中的不同需求。'}}}, {'id': 'https://huggingface.co/papers/2606.06416', 'title': 'Unsupervised Skill Discovery for Agentic Data Analysis', 'url': 'https://huggingface.co/papers/2606.06416', 'abstract': 'Abstract DataCOPE is an unsupervised framework that discovers reusable data-analysis skills through verifier-guided exploration, improving analytical performance in both report-style and reasoning-style tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Inference-time skill augmentation provides a lightweight way to improve data-analytic agents by injecting reusable procedural knowledge without updating model parameters. However, discovering effective skills for data analysis remains challenging, as reliable supervision is expensive and success criteria vary across analytical formats. This raises the key question of how to discover reusable data-analysis skills from unlabeled exploration alone. We propose DataCOPE, an unsupervised verifier-guided skill discovery framework for data-analytic agents. DataCOPE derives verifier signals from the exploration trajectories and uses them to characterize relative quality or aggreement among trajectories. It iteratively coordinates a Data-Analytic Agent for trajectory generation, an Unsupervised Verifier for signal extraction, and a Skill Manager for contrastive skill distillation. For report-style analysis, we instantiate the verifier as an Adaptive Checklist Verifier that derives task-specific criteria, scores reports by verifiable coverage, and iteratively refines the checklist. For reasoning-style analysis, we instantiate it as an Answer Agreement Verifier that groups trajectories by answer agreement and uses self-consistency as an auxiliary signal. We evaluate DataCOPE on report-style analysis from Deep Data Research and reasoning-style analysis from DABStep. Across both settings, DataCOPE consistently improves held-out performance over baselines. Averaged across four model settings, DataCOPE improves the mean score by 9.71% and 32.30% on report-style and reasoning-style tasks respectively.', 'score': 4, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '863a52f8298a9a07', 'authors': ['Zhisong Qiu', 'Kangqi Song', 'Shengwei Tang', 'Shuofei Qiao', 'Lei Liang', 'Huajun Chen', 'Shumin Deng'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06416.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Самообучаемое открытие навыков аналитики данных без разметки', 'desc': 'DataCOPE — это фреймворк без учителя, который обнаруживает переиспользуемые навыки анализа данных через управляемое верификатором исследование. Система координирует работу трёх компонентов: агента анализа данных для генерации траекторий, непроверяемого верификатора для извлечения сигналов качества и менеджера навыков для дистилляции навыков через контрастивное обучение. Для отчётного анализа используется адаптивный верификатор чек-листов, а для рассуждений — верификатор согласованности ответов, опирающийся на принцип самосогласованности. Метод показывает улучшение производительности на 9,71% для отчётного анализа и на 32,30% для анализа с рассуждениями по сравнению с базовыми решениями.'}, 'en': {'title': 'Unlocking Data-Analysis Skills with Unsupervised Learning', 'desc': 'DataCOPE is an unsupervised framework designed to enhance data-analysis skills by using a verifier-guided exploration method. It allows data-analytic agents to improve their performance in both report-style and reasoning-style tasks without needing to update their model parameters. The framework discovers effective skills from unlabeled data by coordinating a trajectory generation process, extracting signals through an unsupervised verifier, and managing skill distillation. Evaluation results show that DataCOPE significantly boosts performance, achieving improvements of 9.71% and 32.30% in report-style and reasoning-style tasks, respectively.'}, 'zh': {'title': '无监督技能发现，提升数据分析能力', 'desc': 'DataCOPE是一个无监督框架，通过验证者引导的探索发现可重用的数据分析技能，从而提高报告式和推理式任务的分析性能。该框架在推理时增强技能，提供了一种轻量级的方法，通过注入可重用的程序知识来改善数据分析代理，而无需更新模型参数。尽管发现有效的数据分析技能仍然具有挑战性，但DataCOPE通过探索轨迹提取验证信号，迭代协调数据分析代理、无监督验证者和技能管理器，从而实现技能的对比蒸馏。实验结果表明，DataCOPE在报告式和推理式分析中均显著提高了性能，平均提升了9.71%和32.30%。'}}}, {'id': 'https://huggingface.co/papers/2606.06447', 'title': 'Latent Reasoning with Normalizing Flows', 'url': 'https://huggingface.co/papers/2606.06447', 'abstract': 'Abstract Latent reasoning framework using normalizing flows preserves autoregressive generation advantages while enabling efficient, probabilistic intermediate computation in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models often improve reasoning by generating explicit chain-of-thought (CoT), demonstrating the importance of intermediate computation. However, textual CoT forces this computation through a discrete, serial, and communication-oriented token stream: each reasoning step must be verbalized before the model can proceed, even when the underlying update is semantic, uncertain, or only partially formed. Latent reasoning offers a higher-bandwidth alternative by performing intermediate computation in compact continuous states before committing to text. Yet existing latent-reasoning methods often sacrifice key advantages that make CoT effective in autoregressive language models, including native left-to-right generation, probabilistic sampling, compatibility with KV-cache decoding, and tractable likelihood estimation. We propose NF-CoT, a latent reasoning framework that preserves these advantages by modeling continuous thoughts with normalizing flows. NF-CoT instantiates a TARFlow-style normalizing flow inside the LLM backbone, defining a tractable probability model over compact continuous thoughts distilled from explicit CoT. Continuous-thought positions are generated by an NF head, while text positions are generated by the standard LM head within the same causal stream. This design provides exact likelihoods for latent thoughts, enables probabilistic left-to-right decoding with the original KV cache, and supports direct policy-gradient optimization in the latent reasoning space. On code-generation benchmarks, NF-CoT improves pass rates over explicit-CoT and prior latent-reasoning baselines while substantially reducing intermediate-reasoning cost.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'b0e79afe0352bf47', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#reasoning', '#plp', '#optimization', '#training'], 'emoji': '🧠', 'ru': {'title': 'Скрытые мысли через нормализующие потоки: эффективное рассуждение без потери качества генерации', 'desc': 'В работе предложена NF-CoT — новая архитектура для латентного рассуждения в больших языковых моделях, которая использует нормализующие потоки для моделирования промежуточных мыслей в непрерывном пространстве. В отличие от явной цепочки рассуждений, где каждый шаг должен быть переведён в токены, этот подход позволяет выполнять вычисления в компактном непрерывном представлении, что экономит вычислительные ресурсы. Ключевое преимущество метода состоит в том, что он сохраняет все достоинства автарегрессивной генерации: левосторонний порядок генерации, вероятностное семплирование, совместимость с KV-кешем и возможность вычисления точного правдоподобия. На бенчмарках для генерации кода NF-CoT показывает улучшение показателей успешности по сравнению с явной цепочкой рассуждений и предыдущими методами латентного рассуждения при значительном снижении затрат на промежуточные вычисления.'}, 'en': {'title': 'Enhancing Reasoning in Language Models with NF-CoT', 'desc': 'This paper introduces NF-CoT, a novel latent reasoning framework that enhances large language models by integrating normalizing flows. It allows for efficient intermediate computations in a continuous state, rather than relying solely on discrete text generation. By preserving the advantages of autoregressive models, such as left-to-right generation and probabilistic sampling, NF-CoT improves reasoning capabilities without sacrificing performance. The framework demonstrates significant improvements in code generation tasks, achieving higher pass rates while reducing the costs associated with intermediate reasoning steps.'}, 'zh': {'title': '潜在推理的新突破：NF-CoT框架', 'desc': '这篇论文提出了一种名为NF-CoT的潜在推理框架，利用归一化流技术来保留自回归生成的优势，同时实现高效的概率中间计算。传统的链式思维（CoT）需要将每一步推理转化为文本，限制了计算的灵活性和效率。NF-CoT通过在紧凑的连续状态中进行中间计算，避免了这种限制，并且能够与现有的语言模型解码机制兼容。实验结果表明，NF-CoT在代码生成基准测试中表现优于传统的链式思维和其他潜在推理方法，同时显著降低了中间推理的成本。'}}}, {'id': 'https://huggingface.co/papers/2606.05769', 'title': 'Imagine Before You Predict: Interleaved Latent Visual Reasoning for Video Event Prediction', 'url': 'https://huggingface.co/papers/2606.05769', 'abstract': 'Abstract Future-L1, an interleaved latent visual reasoning framework, improves video event prediction by maintaining visual semantics in latent space during autoregressive decoding, achieving state-of-the-art results on FutureBench and TwiFF-Bench benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video event prediction (VEP) requires models to infer unobserved future states from partial video evidence. Existing video MLLMs usually verbalize intermediate future reasoning in text space: once visual evidence is verbalized, fine-grained motion, geometry, and interaction cues can be lost, leading to plausible but visually ungrounded hallucinations. We introduce Future-L1, an interleaved latent visual reasoning framework that lets an MLLM alternate between language tokens and continuous latent visual spans during autoregressive decoding. To train this capability, we construct Future-L1-50K by selecting examples where future visual hints help prediction and align latent states to future-frame embeddings, then further optimize sampled latent trajectories with LA-DAPO, a latent-aware RL objective with outcome-contrastive and temporal-diversity rewards. Future-L1 achieves new state-of-the-art results on both benchmarks: on FutureBench, it improves Qwen3-VL-8B from 61.0 to 85.4 and exceeds the previous best Video-CoE by 10.4 points; on TwiFF-Bench, it improves the average score from 2.44 to 3.04. These results suggest that future-oriented video reasoning benefits from preserving intermediate visual semantics in latent space rather than translating every reasoning step into text.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'e42b6e97d7f32691', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#rl', '#video', '#reasoning', '#multimodal', '#hallucinations', '#benchmark', '#optimization', '#training', '#dataset'], 'emoji': '🔮', 'ru': {'title': 'Предсказание будущего через скрытые визуальные рассуждения вместо текстовой вербализации', 'desc': 'Future-L1 — это фреймворк для предсказания событий в видео, который использует интерпретируемое рассуждение в скрытом пространстве вместо вербализации всех промежуточных шагов в текст. Модель чередует языковые токены и непрерывные визуальные представления во время авторегрессивного декодирования, сохраняя точные движения, геометрию и взаимодействия. Для обучения этой способности авторы создали датасет Future-L1-50K и применили LA-DAPO — объективную функцию усиленного обучения с контрастивными и временными вознаграждениями. Фреймворк достигает новых результатов на бенчмарках FutureBench и TwiFF-Bench, значительно превосходя предыдущие подходы.'}, 'en': {'title': 'Future-L1: Enhancing Video Predictions with Visual Semantics', 'desc': "The paper introduces Future-L1, a novel framework for video event prediction that enhances the model's ability to maintain visual information during the decoding process. By interleaving language tokens with continuous latent visual representations, Future-L1 prevents the loss of crucial visual details that often occurs when reasoning is expressed solely in text. The framework is trained using a specialized dataset, Future-L1-50K, which focuses on examples where visual cues are essential for accurate predictions. As a result, Future-L1 achieves state-of-the-art performance on key benchmarks, demonstrating that preserving visual semantics in latent space significantly improves future video reasoning."}, 'zh': {'title': '未来导向的视频推理新突破', 'desc': 'Future-L1是一种交错的潜在视觉推理框架，通过在自回归解码过程中保持潜在空间中的视觉语义，提升了视频事件预测的效果。该方法解决了现有视频多模态语言模型在中间推理时可能丢失细致的运动、几何和交互线索的问题。Future-L1通过在语言标记和连续潜在视觉片段之间交替，增强了模型的推理能力。实验结果表明，Future-L1在FutureBench和TwiFF-Bench基准测试中均取得了新的最佳成绩，证明了在潜在空间中保留中间视觉语义对未来导向的视频推理的益处。'}}}, {'id': 'https://huggingface.co/papers/2606.03092', 'title': 'The Shadow Price of Reasoning: Economic Perspective on Optimal Budget Allocation for LLMs', 'url': 'https://huggingface.co/papers/2606.03092', 'abstract': "Abstract Inference-time scaling is enhanced through constrained optimization that allocates computational resources based on economic principles, improving performance in resource-constrained environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Inference-time scaling has emerged as a critical avenue for enhancing Large Language Models' performance, yet real-world deployment is constrained by strict computational budgets. In this work, we formulate inference budget allocation as a global constrained optimization problem governed by economic principles. By modeling per-query reasoning utility with a shifted-surge function, we derive an optimal allocation policy based on a global shadow price that equilibrates marginal utility under resource scarcity. Based on this theory, we propose Constrained Latent-utility Equilibrium Allocation for Reasoning (CLEAR). It performs rational abandonment and reallocates resources from insolvent queries to solvable queries near their emergence thresholds.   Extensive experiments on several reasoning tasks with different traffic streams demonstrate that CLEAR significantly improves the Pareto frontier of total token cost versus mean accuracy. In resource-scarce regimes, CLEAR achieves up to a 3x improvement in global accuracy compared to uniform allocation.", 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'd5f9e5cca7c6b81f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#reasoning', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Умное распределение вычислений: экономика инференса LLM', 'desc': 'В работе предлагается метод оптимального распределения вычислительных ресурсов во время инференса больших языковых моделей, основанный на экономических принципах. Авторы формулируют задачу как проблему глобальной условной оптимизации и моделируют полезность рассуждений для каждого запроса с помощью специальной функции. На основе теории равновесия они разрабатывают алгоритм CLEAR, который перераспределяет вычислительные ресурсы, отказываясь от неперспективных запросов в пользу близких к решению. Эксперименты показывают, что предложенный подход улучшает соотношение качества и затрат токенов в 3 раза по сравнению с равномерным распределением.'}, 'en': {'title': 'Optimizing Resource Allocation for Enhanced Model Performance', 'desc': 'This paper presents a method called CLEAR, which optimizes how computational resources are allocated during inference for Large Language Models. It treats the allocation problem as a constrained optimization issue, using economic principles to maximize performance under limited resources. By modeling the utility of reasoning for each query, CLEAR reallocates resources from less solvable queries to those that are more likely to succeed. The results show that CLEAR can significantly enhance accuracy while reducing costs, achieving up to three times better performance in resource-constrained situations compared to traditional methods.'}, 'zh': {'title': '优化推理资源分配，提升模型性能', 'desc': '本文提出了一种基于经济原则的约束优化方法，以提高推理时间的资源分配效率。我们将推理预算分配建模为一个全局约束优化问题，并使用移位激增函数来描述每个查询的推理效用。通过这一理论，我们提出了CLEAR（约束潜在效用均衡分配），它能够在资源稀缺的情况下，合理放弃无效查询并将资源重新分配给可解决的查询。实验结果表明，CLEAR在多种推理任务中显著提高了总令牌成本与平均准确率的帕累托前沿。'}}}, {'id': 'https://huggingface.co/papers/2606.05979', 'title': 'World-Language-Action Model for Unified World Modeling, Language Reasoning, and Action Synthesis', 'url': 'https://huggingface.co/papers/2606.05979', 'abstract': 'Abstract World-language-action models combine textual instruction processing with robot state prediction through an autoregressive transformer backbone, enabling efficient long-horizon task execution and cross-embodiment learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose world-language-action (WLA) models as a new class of embodied foundation models. WLA takes textual instructions, images, and robot states as inputs to jointly predict textual subtasks, subgoal images, and robot actions, conjoining the world modeling interface to learn from extensive egocentric videos as in the world-action model (WAM) and the language reasoning capacities to solve complex long-horizon tasks as in vision-language-action (VLA) models. At the core of WLA lies an autoregressive (AR) Transformer backbone, instead of a bidirectional diffusion Transformer as in WAMs, to predict the next state, comprising the semantic-level textual intention and complementary fine-grained physical dynamics. The physical dynamics are supervised by the world modeling objective based on a dedicated World Expert, and are leveraged to ease the characterization of the state-action correlation for the Action Expert. WLA leverages meta-queries to make the world prediction implicitly impact the action generation so that the former can be disabled during inference. The world prediction can also be activated to enable test-time scaling for improved robot control. Our WLA-0 prototype, with 2B active parameters, achieves 40 ms per inference on an NVIDIA RTX 5090. Evaluations across simulated and real-world environments demonstrate that WLA-0 achieves state-of-the-art multi-task and long-horizon learning abilities, e.g., 92.94\\% success rate on RoboTwin2.0 Clean and 56.5\\% success rate on RMBench. WLA-0 also holds the promise to learn novel tasks directly from cross-embodiment robot videos without action annotations.', 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '6fda418bf328315e', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#training', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая модель для понимания языка, прогнозирования мира и управления роботом', 'desc': 'В статье предложены модели World-Language-Action (WLA) — новый класс встроенных foundation-моделей, которые принимают текстовые инструкции, изображения и состояния робота для совместного предсказания подзадач, промежуточных целей и действий робота. Архитектура основана на autoregressive Transformer, который предсказывает следующее состояние как на семантическом уровне (текстовые намерения), так и на уровне физической динамики. Модель использует специализированные эксперты для world modeling и action generation, с возможностью отключения предсказания мира во время инференса и использования test-time scaling для улучшения контроля. Прототип WLA-0 с 2 млрд активных параметров демонстрирует state-of-the-art результаты в многозадачном обучении и решении долгосрочных задач, достигая 92.94% успеха на RoboTwin2.0 и способности обучаться на видео разных типов роботов без аннотаций действий.'}, 'en': {'title': 'Empowering Robots with Language and Action Predictions', 'desc': 'The paper introduces world-language-action (WLA) models, which integrate text instructions, images, and robot states to predict actions and subgoals for robots. Utilizing an autoregressive transformer backbone, WLA models enhance long-horizon task execution by combining language reasoning with physical dynamics. The model learns from egocentric videos, allowing it to generalize across different robot embodiments without needing explicit action annotations. Evaluations show that WLA-0 achieves high success rates in both simulated and real-world tasks, demonstrating its effectiveness in multi-task learning and robot control.'}, 'zh': {'title': '世界语言行动模型：智能机器人新纪元', 'desc': '世界语言行动模型（WLA）是一种新型的具身基础模型，它结合了文本指令处理和机器人状态预测。WLA模型使用自回归变换器（AR Transformer）作为核心，能够有效地执行长时间任务并进行跨体现学习。该模型通过输入文本指令、图像和机器人状态，联合预测文本子任务、子目标图像和机器人动作，从而实现复杂任务的解决。WLA-0原型在模拟和真实环境中表现出色，展示了其在多任务和长时间学习能力上的先进性。'}}}, {'id': 'https://huggingface.co/papers/2606.05645', 'title': 'Discrete-WAM: Unified Discrete Vision-Action Token Editing for World-Policy Learning', 'url': 'https://huggingface.co/papers/2606.05645', 'abstract': 'Abstract Discrete-WAM introduces a unified discrete latent vision-action world policy that enables compositional causal reasoning and counterfactual reasoning in autonomous driving through aligned discrete tokens and a shared discrete diffusion framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous driving requires reasoning about how ego actions shape the evolution of the surrounding world. However, most end-to-end methods rely on direct state-to-action mappings, capturing correlations without explicitly modeling action-conditioned dynamics. Conversely, continuous-latent world models often lack compositional structure for causal reasoning across counterfactual futures. We introduce Discrete-WAM, a unified latent vision-action world policy that represents future visual states and ego actions as aligned discrete tokens, enabling compositional causal reasoning across alternative futures. Built upon this unified discrete alignment, Discrete-WAM establishes a shared discrete diffusion framework with unified generative tasks, jointly formulating world modeling, world-action policy, and hierarchical decision-enabled policy, supporting compositional generalization across diverse driving scenarios. Experiments on large-scale autonomous-driving benchmarks show that Discrete-WAM achieves competitive performance while supporting controllable generation and counterfactual reasoning, offering a principled path toward more reliable decision-making.', 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '37ae91fb3c2af33c', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#reasoning', '#diffusion', '#robotics', '#benchmark', '#agents', '#training'], 'emoji': '🚗', 'ru': {'title': 'Дискретные токены для причинного рассуждения в автономном вождении', 'desc': 'Discrete-WAM представляет единую модель мировой политики на основе дискретных латентных представлений для автономного вождения, которая объединяет визуальные состояния и действия в выровненные дискретные токены. Метод использует общую diffusion модель для совместного формирования трёх задач: моделирования окружающего мира, политики взаимодействия с миром и иерархической политики принятия решений. Такой подход обеспечивает композиционное причинно-следственное рассуждение и поддержку контрфактических сценариев, позволяя автономному агенту явно моделировать, как его действия влияют на эволюцию окружающей среды. Экспериментальные результаты на крупномасштабных бенчмарках показывают конкурентоспособную производительность при одновременной поддержке управляемой генерации и надёжного принятия решений.'}, 'en': {'title': 'Empowering Autonomous Driving with Compositional Causal Reasoning', 'desc': 'The paper presents Discrete-WAM, a novel approach for autonomous driving that integrates discrete latent representations for vision and action. This method allows for compositional causal reasoning, enabling the system to understand how its actions affect the environment and predict various future scenarios. Unlike traditional methods that focus solely on state-to-action mappings, Discrete-WAM utilizes a shared discrete diffusion framework to model the dynamics of the world and the actions taken. The results demonstrate that Discrete-WAM not only performs competitively on benchmarks but also enhances the ability to generate controlled and counterfactual scenarios, improving decision-making reliability.'}, 'zh': {'title': '离散世界模型：自动驾驶的因果推理新路径', 'desc': 'Discrete-WAM是一种统一的离散潜在视觉-行动世界策略，能够在自动驾驶中实现组合因果推理和反事实推理。它通过对齐的离散标记和共享的离散扩散框架来表示未来的视觉状态和自我行动。与传统的端到端方法不同，Discrete-WAM不仅捕捉状态与行动之间的相关性，还明确建模了基于行动的动态。实验表明，Discrete-WAM在大型自动驾驶基准测试中表现出色，支持可控生成和反事实推理，为更可靠的决策提供了原则性路径。'}}}, {'id': 'https://huggingface.co/papers/2606.06473', 'title': 'MLEvolve: A Self-Evolving Framework for Automated Machine Learning Algorithm Discovery', 'url': 'https://huggingface.co/papers/2606.06473', 'abstract': 'Abstract MLEvolve is an LLM-based multi-agent framework that enables long-horizon machine learning algorithm discovery through improved search mechanisms, memory systems, and adaptive coding strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language model (LLM) agents are increasingly applied to long-horizon tasks such as scientific discovery and machine learning engineering (MLE), where sustained self-evolution becomes a key capability. However, existing MLE agents suffer from inter-branch information isolation, memoryless search, and lack of hierarchical control, which together hinder long-horizon optimization. We present MLEvolve, an LLM-based self-evolving multi-agent framework for end-to-end machine learning algorithm discovery. By extending tree search to Progressive MCGS, MLEvolve enables cross-branch information flow through graph-based reference edges and gradually shifts the search from broad exploration to focused exploitation with an entropy-inspired progressive schedule. To allow the agent to evolve with accumulated experience, we introduce Retrospective Memory, which combines a cold-start domain knowledge base with a dynamic global memory for task-specific experience retrieval and reuse. For stable long-horizon iteration, we further decouple strategic planning from code generation with adaptive coding modes. Evaluation on MLE-Bench shows that MLEvolve achieves state-of-the-art performance across multiple dimensions including average medal rate and valid submission rate under a 12-hour budget (half the standard runtime). Moreover, MLEvolve also outperforms specialized algorithm discovery methods including AlphaEvolve on mathematical algorithm optimization tasks, demonstrating strong cross-domain generalization. Our code is available at https://github.com/InternScience/MLEvolve.', 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '4daf1faa889ece94', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#reasoning', '#open_source', '#science'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующийся агент для открытия алгоритмов машинного обучения', 'desc': 'MLEvolve — это многоагентный фреймворк на основе большой языковой модели для автоматического открытия алгоритмов машинного обучения на протяжении длительных горизонтов оптимизации. Система использует расширенный поиск на дереве (Progressive MCGS) с графовыми связями для обмена информацией между ветвями поиска и постепенного перехода от исследования к эксплуатации. Ретроспективная память объединяет базу знаний предметной области с динамической памятью для накопления и переиспользования опыта при решении задач. Фреймворк демонстрирует передовые результаты на бенчмарке MLE-Bench и превосходит специализированные методы поиска алгоритмов, включая AlphaEvolve.'}, 'en': {'title': 'Revolutionizing Algorithm Discovery with Self-Evolving Agents', 'desc': 'MLEvolve is a framework that uses large language models (LLMs) to help discover machine learning algorithms over long periods. It addresses issues like information isolation and memory limitations in existing agents by allowing them to share knowledge and learn from past experiences. The framework employs a unique search strategy that balances exploration and exploitation, enhancing the efficiency of the algorithm discovery process. Evaluations show that MLEvolve outperforms traditional methods, achieving better results in less time across various tasks.'}, 'zh': {'title': 'MLEvolve：自我演化的机器学习算法发现框架', 'desc': 'MLEvolve是一个基于大型语言模型（LLM）的多智能体框架，旨在通过改进的搜索机制、记忆系统和自适应编码策略，实现长期机器学习算法的发现。该框架解决了现有机器学习工程（MLE）智能体在信息隔离、无记忆搜索和缺乏层次控制等方面的问题，从而促进了长期优化。MLEvolve通过扩展树搜索到渐进式多分支图搜索（MCGS），实现了跨分支的信息流动，并采用熵启发的渐进调度，逐步将搜索从广泛探索转向集中利用。通过引入回顾性记忆，MLEvolve能够利用积累的经验进行自我演化，显著提升了在多维度上的性能表现。'}}}, {'id': 'https://huggingface.co/papers/2606.06021', 'title': 'OPRD: On-Policy Representation Distillation', 'url': 'https://huggingface.co/papers/2606.06021', 'abstract': "Abstract On-Policy Representation Distillation (OPRD) improves upon traditional on-policy distillation by aligning student and teacher representations in hidden-state space rather than just output space, resulting in reduced variance and improved training efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) supervises the student only in output space by matching next-token probabilities. This output-only paradigm has two limits: (1) sampling variance from Monte Carlo KL estimates over large vocabularies (e.g., Qwen's ~150k tokens) persists throughout training, and (2) it treats the teacher as a black-box, discarding all intermediate hidden states after the LM head. We propose On-Policy Representation Distillation (OPRD), which lifts distillation into hidden-state space by aligning student and teacher representations across selected layers on the same rollouts, bypassing the LM head entirely. Theoretically, OPRD eliminates sampling variance and provides richer per-layer structural information. Empirically, OPRD closes the student-teacher gap on AIME 2024/2025 and AIMO, while output-space OPD baselines plateau below the teacher. OPRD also trains 1.44x faster and uses 54% less memory than top-k OPD. Code: https://github.com/ShenzhiYang2000/OPRD.", 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'dc24657aa3e96889', 'authors': ['Shenzhi Yang', 'Guangcheng Zhu', 'Bowen Song', 'Haobo Wang', 'Mingxuan Xia', 'Xing Zheng', 'Yingfan Ma', 'Zhongqi Chen', 'Weiqiang Wang', 'Gang Chen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06021.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🔗', 'ru': {'title': 'Дистиллирование в пространстве скрытых представлений вместо выходных вероятностей', 'desc': 'В работе предлагается метод On-Policy Representation Distillation (OPRD), который улучшает традиционное дистиллирование моделей путём выравнивания представлений студента и учителя в пространстве скрытых состояний, а не только в выходном пространстве. Основная проблема классического дистиллирования заключается в высокой дисперсии при оценке KL-дивергенции на больших словарях и потере информации из промежуточных слоёв нейронной сети. Предлагаемый подход OPRD устраняет эти проблемы, выравнивая скрытые представления на одних и тех же выборках данных без использования головки языковой модели. Эмпирические результаты показывают, что OPRD значительно ускоряет обучение (в 1.44 раза), снижает потребление памяти на 54% и улучшает качество на сложных задачах математического рассуждения.'}, 'en': {'title': 'Aligning Hidden States for Efficient Model Training', 'desc': 'On-Policy Representation Distillation (OPRD) enhances the process of training a student model by aligning its hidden-state representations with those of a teacher model, rather than just focusing on the output predictions. This method addresses the limitations of traditional on-policy distillation, which only matches output probabilities and suffers from high variance due to large vocabularies. By utilizing hidden states, OPRD reduces sampling variance and captures more detailed structural information from the teacher model. As a result, OPRD not only improves training efficiency, achieving faster training times and lower memory usage, but also significantly narrows the performance gap between the student and teacher models.'}, 'zh': {'title': '提升蒸馏效率，优化模型训练', 'desc': '本文提出了一种新的方法，称为在线策略表示蒸馏（OPRD），旨在改进传统的在线策略蒸馏。与仅在输出空间进行匹配的传统方法不同，OPRD通过对齐学生和教师在隐藏状态空间的表示来提高训练效率。该方法消除了采样方差，并提供了更丰富的每层结构信息。实验结果表明，OPRD在多个基准测试中表现优于传统方法，训练速度更快，内存使用更少。'}}}, {'id': 'https://huggingface.co/papers/2606.05254', 'title': 'Flash-WAM: Modality-Aware Distillation for World Action Models', 'url': 'https://huggingface.co/papers/2606.05254', 'abstract': "Abstract Flash-WAM introduces a modality-aware step-distillation framework for world-action models that achieves real-time inference by adapting consistency functions to different noise regimes in video and action streams.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World-action models (WAMs) jointly generate future video and robot actions through iterative diffusion, achieving strong performance on manipulation benchmarks but requiring tens of denoising steps, a cost that precludes real-time control. Step distillation has emerged as the natural remedy, but off-the-shelf methods break down in the joint video-action setting because video and action streams use different SNR-shifted noise schedules and reach training with substantially different marginal noise distributions, an asymmetry that single-modality distillation methods cannot accommodate. We introduce Flash-WAM, a modality-aware step-distillation framework inspired by consistency distillation that selects the consistency function for each modality to match its noise regime: a linear-gradient-scaling parametrization for the action stream's low-noise regime, paired with a variance-preserving parametrization for the video stream's high-noise regime, grounded in a structural analysis of the consistency-function family that characterizes the achievable gradient scaling under the consistency boundary condition. Instantiated on LingBot-VA, Flash-WAM compresses inference to a single step in each modality. On RoboTwin 2.0, this reduces per-chunk latency from 8.1 seconds to 348 ms on NVIDIA L40S, a 23{times} speedup that enables real-time inference. Flash-WAM preserves task success on simulation benchmarks (85.5% RoboTwin 2.0, 95.7% LIBERO) and substantially recovers real-world performance (60% average on a Unitree G1 humanoid robot), while naive consistency distillation drops to 24% at the same step budget.", 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '86e973d9b157af94', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#video', '#diffusion', '#multimodal', '#robotics', '#inference', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Быстрые мировые модели действий через интеллектуальную дистилляцию', 'desc': 'Flash-WAM представляет собой фреймворк для пошагового дистилляции моделей мировых действий, который позволяет достичь инференса в реальном времени путём адаптации функций консистентности к различным режимам шума в видео и потоках действий. Основная проблема заключается в том, что видео и действия используют разные расписания шума и имеют существенно отличающиеся маргинальные распределения шума, с чем не справляются стандартные методы дистилляции. Авторы предлагают модально-осведомленный подход, выбирая различные параметризации консистентности для каждой модальности: линейное масштабирование градиента для низкошумного режима действий и сохраняющую дисперсию параметризацию для высокошумного режима видео. На практике Flash-WAM сокращает задержку инференса с 8.1 секунды до 348 миллисекунд, достигая 23-кратного ускорения, сохраняя при этом высокий успех задач как в симуляции, так и на реальном роботе.'}, 'en': {'title': 'Real-Time Inference with Modality-Aware Step-Distillation', 'desc': 'Flash-WAM is a new framework designed to improve the efficiency of world-action models (WAMs) by using a modality-aware step-distillation approach. This method adapts consistency functions to different noise levels in video and action streams, allowing for real-time inference. By optimizing the training process for each modality, Flash-WAM significantly reduces the time needed for inference from 8.1 seconds to just 348 milliseconds, achieving a 23-fold speedup. Despite this acceleration, it maintains high task success rates in simulations and recovers strong performance in real-world applications.'}, 'zh': {'title': 'Flash-WAM：实时推理的新突破', 'desc': 'Flash-WAM是一种模态感知的步骤蒸馏框架，旨在实现世界动作模型的实时推理。该框架通过为不同噪声环境适配一致性函数，解决了视频和动作流在联合训练中面临的噪声分布不一致问题。Flash-WAM在LingBot-VA上实现了每个模态的推理压缩到单步，显著提高了推理速度。实验结果表明，Flash-WAM在多个基准测试中保持了高任务成功率，并在真实世界应用中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2606.04351', 'title': 'Video2LoRA: Parametric Video Internalization for Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.04351', 'abstract': 'Abstract Video2LoRA enables efficient video processing in vision-language models by predicting Low-Rank Adaptation weights from video representations, reducing computational costs while maintaining video-faithful outputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Processing video in vision-language models is expensive: each frame occupies hundreds of tokens, and inference cost scales with every frame and every repeated query. We introduce Video2LoRA, a method for parametric video internalization. A perceiver hypernetwork reads the intermediate representations produced layer-by-layer as a frozen VLM encodes a video, and generates a Low-Rank Adaptation (LoRA) adapter in a single forward pass. Unlike standard LoRA fine-tuning, which requires iterative gradient updates, Video2LoRA predicts these weights directly from the video. Trained for SmolVLM2 500M and 2.2B on video summarization and captioning, Video2LoRA enables the same frozen VLM to answer queries from the adapter alone, with zero visual tokens in its context at query time. Video2LoRA is statistically non-inferior and equivalent to direct video-in-context inference across all five captioning benchmarks at both model scales, and across seven of eight video question answering benchmark-scale pairings. Although trained only on 12 frames at 384px, it remains stable up to 1,024 frames and 1024px, where direct video-in-context inference often degenerates. Across this sweep, it reduces answer-time visual-token load by up to 1,500x and query TTFT by 6-80x, while preserving video-faithful outputs. We also find that independently generated adapters for non-overlapping video segments can compose in rank space, suggesting a path toward chunked long-video internalization.', 'score': 0, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'f8f866e161ad73b1', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#small_models', '#video', '#multimodal', '#inference', '#training'], 'emoji': '🎬', 'ru': {'title': 'Эффективная видеообработка через предсказание адаптивных весов', 'desc': 'Video2LoRA предлагает эффективный способ обработки видео в vision-language моделях путём предсказания весов Low-Rank Adaptation (LoRA) непосредственно из промежуточных представлений видео. Вместо традиционной fine-tuning, которая требует итеративных градиентных обновлений, метод использует гиперсеть типа Perceiver для прямого предсказания параметров адаптера в один проход. Модель достигает статистической эквивалентности стандартному подходу с видео в контексте на эталонах видеосаммаризации и видеовопросов, при этом снижая вычислительные затраты в 6-80 раз за счёт исключения визуальных токенов из контекста запроса. Метод демонстрирует масштабируемость до 1024 кадров при сохранении адекватности выходов видео и возможностью композиции адаптеров для обработки длинных видео.'}, 'en': {'title': 'Efficient Video Processing with Low-Rank Adaptation', 'desc': 'Video2LoRA is a novel method that enhances video processing in vision-language models by predicting Low-Rank Adaptation (LoRA) weights directly from video representations. This approach significantly reduces the computational costs associated with processing each video frame, which typically requires handling a large number of tokens. By utilizing a perceiver hypernetwork, Video2LoRA generates LoRA adapters in a single forward pass, eliminating the need for iterative gradient updates. The method has been shown to maintain performance comparable to traditional video-in-context inference while drastically lowering the visual-token load and improving query response times.'}, 'zh': {'title': '高效视频处理的新方法：Video2LoRA', 'desc': 'Video2LoRA是一种高效的视频处理方法，旨在降低视觉语言模型中的计算成本，同时保持视频输出的真实性。该方法通过从视频表示中预测低秩适配器（LoRA）权重，避免了传统LoRA微调所需的迭代梯度更新。Video2LoRA能够在一次前向传递中生成适配器，使得冻结的视觉语言模型可以仅通过适配器回答查询，而无需在上下文中使用视觉标记。经过训练后，Video2LoRA在视频摘要和字幕生成任务中表现出色，显著减少了视觉标记的负担。'}}}];

        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment', '#architecture (5)', '#audio', '#benchmark (3)', '#cv', '#data', '#dataset (2)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (2)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (1)', '#optimization (4)', '#plp (1)', '#rag', '#reasoning (6)', '#rl (1)', '#rlhf', '#robotics (3)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (8)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-05 02:38',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-05 02:38')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-05 02:38')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
