th different traffic streams demonstrate that CLEAR significantly improves the Pareto frontier of total token cost versus mean accuracy. In resource-scarce regimes, CLEAR achieves up to a 3x improvement in global accuracy compared to uniform allocation.", 'score': 6, 'issue_id': 2375, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'd5f9e5cca7c6b81f', 'authors': ['Xu Wan', 'Speed Zhu', 'Jianwei Cai', 'Guang Chen', 'XiMing Huang', 'Wiggin Zhou', 'Mingyang Sun'], 'affiliations': ['Peking University', 'Tecent HY Team', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03092.jpg', 'data': {'categories': ['#reasoning', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Умное распределение вычислений: экономика инференса LLM', 'desc': 'В работе предлагается метод оптимального распределения вычислительных ресурсов во время инференса больших языковых моделей, основанный на экономических принципах. Авторы формулируют задачу как проблему глобальной условной оптимизации и моделируют полезность рассуждений для каждого запроса с помощью специальной функции. На основе теории равновесия они разрабатывают алгоритм CLEAR, который перераспределяет вычислительные ресурсы, отказываясь от неперспективных запросов в пользу близких к решению. Эксперименты показывают, что предложенный подход улучшает соотношение качества и затрат токенов в 3 раза по сравнению с равномерным распределением.'}, 'en': {'title': 'Optimizing Resource Allocation for Enhanced Model Performance', 'desc': 'This paper presents a method called CLEAR, which optimizes how computational resources are allocated during inference for Large Language Models. It treats the allocation problem as a constrained optimization issue, using economic principles to maximize performance under limited resources. By modeling the utility of reasoning for each query, CLEAR reallocates resources from less solvable queries to those that are more likely to succeed. The results show that CLEAR can significantly enhance accuracy while reducing costs, achieving up to three times better performance in resource-constrained situations compared to traditional methods.'}, 'zh': {'title': '优化推理资源分配，提升模型性能', 'desc': '本文提出了一种基于经济原则的约束优化方法，以提高推理时间的资源分配效率。我们将推理预算分配建模为一个全局约束优化问题，并使用移位激增函数来描述每个查询的推理效用。通过这一理论，我们提出了CLEAR（约束潜在效用均衡分配），它能够在资源稀缺的情况下，合理放弃无效查询并将资源重新分配给可解决的查询。实验结果表明，CLEAR在多种推理任务中显著提高了总令牌成本与平均准确率的帕累托前沿。'}}}, {'id': 'https://huggingface.co/papers/2606.05979', 'title': 'World-Language-Action Model for Unified World Modeling, Language Reasoning, and Action Synthesis', 'url': 'https://huggingface.co/papers/2606.05979', 'abstract': 'Abstract World-language-action models combine textual instruction processing with robot state prediction through an autoregressive transformer backbone, enabling efficient long-horizon task execution and cross-embodiment learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose world-language-action (WLA) models as a new class of embodied foundation models. WLA takes textual instructions, images, and robot states as inputs to jointly predict textual subtasks, subgoal images, and robot actions, conjoining the world modeling interface to learn from extensive egocentric videos as in the world-action model (WAM) and the language reasoning capacities to solve complex long-horizon tasks as in vision-language-action (VLA) models. At the core of WLA lies an autoregressive (AR) Transformer backbone, instead of a bidirectional diffusion Transformer as in WAMs, to predict the next state, comprising the semantic-level textual intention and complementary fine-grained physical dynamics. The physical dynamics are supervised by the world modeling objective based on a dedicated World Expert, and are leveraged to ease the characterization of the state-action correlation for the Action Expert. WLA leverages meta-queries to make the world prediction implicitly impact the action generation so that the former can be disabled during inference. The world prediction can also be activated to enable test-time scaling for improved robot control. Our WLA-0 prototype, with 2B active parameters, achieves 40 ms per inference on an NVIDIA RTX 5090. Evaluations across simulated and real-world environments demonstrate that WLA-0 achieves state-of-the-art multi-task and long-horizon learning abilities, e.g., 92.94\\% success rate on RoboTwin2.0 Clean and 56.5\\% success rate on RMBench. WLA-0 also holds the promise to learn novel tasks directly from cross-embodiment robot videos without action annotations.', 'score': 5, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '6fda418bf328315e', 'authors': ['Yi Yang', 'Zhihong Liu', 'Siqi Kou', 'Yiyang Chen', 'Yanzhe Hu', 'Jianbo Zhou', 'Boyuan Zhao', 'Zhijie Wei', 'Xiao Xia', 'Xueqi Li', 'Pengfei Liu', 'Zhijie Deng'], 'affiliations': ['ECUST', 'HUST', 'NJUPT', 'SCUT', 'SHU', 'SII', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2606.05979.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая модель для понимания языка, прогнозирования мира и управления роботом', 'desc': 'В статье предложены модели World-Language-Action (WLA) — новый класс встроенных foundation-моделей, которые принимают текстовые инструкции, изображения и состояния робота для совместного предсказания подзадач, промежуточных целей и действий робота. Архитектура основана на autoregressive Transformer, который предсказывает следующее состояние как на семантическом уровне (текстовые намерения), так и на уровне физической динамики. Модель использует специализированные эксперты для world modeling и action generation, с возможностью отключения предсказания мира во время инференса и использования test-time scaling для улучшения контроля. Прототип WLA-0 с 2 млрд активных параметров демонстрирует state-of-the-art результаты в многозадачном обучении и решении долгосрочных задач, достигая 92.94% успеха на RoboTwin2.0 и способности обучаться на видео разных типов роботов без аннотаций действий.'}, 'en': {'title': 'Empowering Robots with Language and Action Predictions', 'desc': 'The paper introduces world-language-action (WLA) models, which integrate text instructions, images, and robot states to predict actions and subgoals for robots. Utilizing an autoregressive transformer backbone, WLA models enhance long-horizon task execution by combining language reasoning with physical dynamics. The model learns from egocentric videos, allowing it to generalize across different robot embodiments without needing explicit action annotations. Evaluations show that WLA-0 achieves high success rates in both simulated and real-world tasks, demonstrating its effectiveness in multi-task learning and robot control.'}, 'zh': {'title': '世界语言行动模型：智能机器人新纪元', 'desc': '世界语言行动模型（WLA）是一种新型的具身基础模型，它结合了文本指令处理和机器人状态预测。WLA模型使用自回归变换器（AR Transformer）作为核心，能够有效地执行长时间任务并进行跨体现学习。该模型通过输入文本指令、图像和机器人状态，联合预测文本子任务、子目标图像和机器人动作，从而实现复杂任务的解决。WLA-0原型在模拟和真实环境中表现出色，展示了其在多任务和长时间学习能力上的先进性。'}}}, {'id': 'https://huggingface.co/papers/2606.05769', 'title': 'Imagine Before You Predict: Interleaved Latent Visual Reasoning for Video Event Prediction', 'url': 'https://huggingface.co/papers/2606.05769', 'abstract': 'Abstract Future-L1, an interleaved latent visual reasoning framework, improves video event prediction by maintaining visual semantics in latent space during autoregressive decoding, achieving state-of-the-art results on FutureBench and TwiFF-Bench benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video event prediction (VEP) requires models to infer unobserved future states from partial video evidence. Existing video MLLMs usually verbalize intermediate future reasoning in text space: once visual evidence is verbalized, fine-grained motion, geometry, and interaction cues can be lost, leading to plausible but visually ungrounded hallucinations. We introduce Future-L1, an interleaved latent visual reasoning framework that lets an MLLM alternate between language tokens and continuous latent visual spans during autoregressive decoding. To train this capability, we construct Future-L1-50K by selecting examples where future visual hints help prediction and align latent states to future-frame embeddings, then further optimize sampled latent trajectories with LA-DAPO, a latent-aware RL objective with outcome-contrastive and temporal-diversity rewards. Future-L1 achieves new state-of-the-art results on both benchmarks: on FutureBench, it improves Qwen3-VL-8B from 61.0 to 85.4 and exceeds the previous best Video-CoE by 10.4 points; on TwiFF-Bench, it improves the average score from 2.44 to 3.04. These results suggest that future-oriented video reasoning benefits from preserving intermediate visual semantics in latent space rather than translating every reasoning step into text.', 'score': 5, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'e42b6e97d7f32691', 'authors': ['Tianxiang Jiang', 'Linquan Wu', 'Sheng Xia', 'Songze Li', 'Ziang Yan', 'Haoyu Yang', 'Yu Qiao', 'Yi Wang'], 'affiliations': ['City University of Hong Kong', 'Fudan University', 'Nanjing University', 'Shanghai AI Laboratory', 'University of Electronic Science and Technology of China', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05769.jpg', 'data': {'categories': ['#rl', '#video', '#reasoning', '#multimodal', '#hallucinations', '#benchmark', '#optimization', '#training', '#dataset'], 'emoji': '🔮', 'ru': {'title': 'Предсказание будущего через скрытые визуальные рассуждения вместо текстовой вербализации', 'desc': 'Future-L1 — это фреймворк для предсказания событий в видео, который использует интерпретируемое рассуждение в скрытом пространстве вместо вербализации всех промежуточных шагов в текст. Модель чередует языковые токены и непрерывные визуальные представления во время авторегрессивного декодирования, сохраняя точные движения, геометрию и взаимодействия. Для обучения этой способности авторы создали датасет Future-L1-50K и применили LA-DAPO — объективную функцию усиленного обучения с контрастивными и временными вознаграждениями. Фреймворк достигает новых результатов на бенчмарках FutureBench и TwiFF-Bench, значительно превосходя предыдущие подходы.'}, 'en': {'title': 'Future-L1: Enhancing Video Predictions with Visual Semantics', 'desc': "The paper introduces Future-L1, a novel framework for video event prediction that enhances the model's ability to maintain visual information during the decoding process. By interleaving language tokens with continuous latent visual representations, Future-L1 prevents the loss of crucial visual details that often occurs when reasoning is expressed solely in text. The framework is trained using a specialized dataset, Future-L1-50K, which focuses on examples where visual cues are essential for accurate predictions. As a result, Future-L1 achieves state-of-the-art performance on key benchmarks, demonstrating that preserving visual semantics in latent space significantly improves future video reasoning."}, 'zh': {'title': '未来导向的视频推理新突破', 'desc': 'Future-L1是一种交错的潜在视觉推理框架，通过在自回归解码过程中保持潜在空间中的视觉语义，提升了视频事件预测的效果。该方法解决了现有视频多模态语言模型在中间推理时可能丢失细致的运动、几何和交互线索的问题。Future-L1通过在语言标记和连续潜在视觉片段之间交替，增强了模型的推理能力。实验结果表明，Future-L1在FutureBench和TwiFF-Bench基准测试中均取得了新的最佳成绩，证明了在潜在空间中保留中间视觉语义对未来导向的视频推理的益处。'}}}, {'id': 'https://huggingface.co/papers/2605.30159', 'title': 'Meta-Cognitive Memory Policy Optimization for Long-Horizon LLM Agents', 'url': 'https://huggingface.co/papers/2605.30159', 'abstract': "Abstract Memory-augmented language models struggle with long-horizon tasks due to information loss in recursive summaries, but a new method using belief entropy and metacognitive policy optimization improves performance by focusing on memory quality rather than just outcome success.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory-augmented LLM agents tackle complex long-horizon tasks by recursively summarizing interaction trajectories into compact memory. However, existing approaches typically train these memory policies using outcome-based reinforcement learning, failing to localize where intermediate memory quality degrades. As interactions unfold, ambiguous recursive summaries progressively discard task-relevant information and introduce semantic noise. This exacerbates belief deviation, obscuring the agent's estimate of the latent task state and ultimately derailing long-horizon reasoning. We therefore argue that memory optimization should focus not merely on trajectory-level success, but on the clarity of the belief induced by intermediate summaries. To this end, we introduce Belief Entropy, a self-supervised proxy that probes how uncertain the model remains about the latent task state given its current memory. Based on this proxy, we propose Metacognitive Memory Policy Optimization (MMPO). Instead of relying only on sparse outcome-based signals, MMPO provides fine-grained, memory-specific supervision via explicitly penalizing summaries that induce high epistemic uncertainty. Experiments show that MMPO consistently outperforms existing methods on diverse long-horizon tasks, maintaining 97.1% performance even when scaled to 1.75M-token contexts.", 'score': 5, 'issue_id': 2376, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '504e657efef87278', 'authors': ['Ziyan Liu', 'Zhezheng Hao', 'Yeqiu Chen', 'Hong Wang', 'Jingren Hou', 'Ruiyi Ding', 'Yongkang Yang', 'Wence Ji', 'Wei Xia', 'Feng Liu'], 'affiliations': ['Tencent', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30159.jpg', 'data': {'categories': ['#training', '#reasoning', '#optimization', '#rl', '#agents', '#long_context', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'От исхода к осознанию: оптимизация качества памяти в агентах LLM', 'desc': 'Статья рассматривает проблему потери информации в памяти агентов на основе больших языковых моделей при решении длительных задач. Авторы предлагают новый метод, использующий энтропию убеждений для оценки качества промежуточных резюме взаимодействий. Они разработали Metacognitive Memory Policy Optimization (MMPO) - метод оптимизации политики памяти на основе самоконтроля, который обеспечивает детальную оптимизацию качества памяти вместо фокуса только на успехе конечного результата. Эксперименты показывают, что MMPO превосходит существующие методы на задачах с длинными горизонтами, сохраняя высокую производительность даже при масштабировании до 1.75M токенов.'}, 'en': {'title': 'Enhancing Memory Quality for Long-Horizon Tasks in Language Models', 'desc': "This paper addresses the challenges faced by memory-augmented language models in handling long-horizon tasks, particularly the loss of important information during recursive summarization. The authors propose a new approach called Metacognitive Memory Policy Optimization (MMPO), which emphasizes the quality of memory rather than just the success of outcomes. By introducing the concept of Belief Entropy, they measure the uncertainty in the model's understanding of the task state based on its memory. The results demonstrate that MMPO significantly improves performance on long-horizon tasks by ensuring clearer and more reliable memory summaries."}, 'zh': {'title': '优化记忆质量，提升长时间任务表现', 'desc': '这篇论文探讨了增强记忆的语言模型在处理长时间任务时面临的信息丢失问题。研究提出了一种新的方法，利用信念熵和元认知策略优化来提高模型的性能，重点关注记忆的质量而不仅仅是结果的成功。通过引入信念熵，模型能够更好地评估其对潜在任务状态的信心，从而优化中间摘要的清晰度。实验结果表明，该方法在多种长时间任务上表现优异，能够在大规模上下文中保持高达97.1%的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.06294', 'title': 'Towards One-to-Many Temporal Grounding', 'url': 'https://huggingface.co/papers/2606.06294', 'abstract': 'Abstract One-to-Many Temporal Grounding addresses the challenge of localizing multiple disjoint video segments for a single textual query through a comprehensive benchmark, novel reward functions, and improved policy optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Temporal Grounding (TG) aims to localize video segments corresponding to a textual query. Prior research predominantly focuses on single-segment retrieval. Real-world scenarios, however, often require localizing multiple disjoint segments for a single query -- a setting we term One-to-Many Temporal Grounding (OMTG). Previous state-of-the-art MLLMs, optimized for one-to-one settings, struggle in this context, often yielding near-zero scores due to a lack of event cardinality perception. To bridge this gap, we present a systematic solution with three key contributions. First, we establish the first comprehensive OMTG benchmark, introducing Count Accuracy (C-Acc) and Effective Temporal F1 (EtF1) as evaluation metrics. Second, we curate a high-quality OMTG dataset comprising 56k samples through a sophisticated construction pipeline. Third, we develop novel temporal and caption reward functions specifically designed for OMTG. In particular, the caption reward leverages Chain-of-Thought reasoning over dense video captions to explicitly guide policy optimization toward both preciseness and completeness. Extensive experiments show our model achieves a new state-of-the-art EtF1 of 43.65\\% on OMTG Bench, outperforming Gemini 2.5 Pro and Seed-1.8 by 15.85\\% and 15.61\\%, respectively.', 'score': 4, 'issue_id': 2377, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '9b8aa63d63ae641c', 'authors': ['Qi Xu', 'Yue Tan', 'Shihao Chen', 'Jiahao Meng', 'Anna Wang', 'Shunping Ji', 'Hao Fei', 'Jason Li'], 'affiliations': ['Nanyang Technological University', 'National University of Singapore', 'Peking University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06294.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#video', '#dataset', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Поиск множественных событий в видео по текстовому описанию', 'desc': 'В статье рассматривается задача поиска нескольких несвязанных сегментов видео по одному текстовому запросу (One-to-Many Temporal Grounding). Авторы создали первый комплексный бенчмарк с новыми метриками оценки и датасет из 56 тысяч примеров. Они разработали специальные функции вознаграждения для обучения моделей, включая использование цепочки рассуждений для направления оптимизации политики. Предложенный подход достигает лучших результатов среди аналогов, превосходя Gemini 2.5 Pro и другие MLLM модели на бенчмарке OMTG.'}, 'en': {'title': 'Revolutionizing Video Segmentation: One-to-Many Temporal Grounding', 'desc': 'This paper introduces One-to-Many Temporal Grounding (OMTG), which focuses on identifying multiple separate video segments that correspond to a single text query. Unlike previous methods that only handled single-segment retrieval, OMTG addresses the complexity of localizing disjoint segments, which is more reflective of real-world scenarios. The authors present a new benchmark for OMTG, along with innovative evaluation metrics like Count Accuracy (C-Acc) and Effective Temporal F1 (EtF1). Additionally, they propose novel reward functions that enhance policy optimization by using Chain-of-Thought reasoning to improve the accuracy and completeness of the segment localization process.'}, 'zh': {'title': '一对多时间定位：视频片段的精准捕捉', 'desc': '本文提出了一种新的方法，解决了单个文本查询定位多个不相交视频片段的挑战，称为一对多时间定位（OMTG）。我们建立了第一个全面的OMTG基准，并引入了计数准确率（C-Acc）和有效时间F1（EtF1）作为评估指标。为了支持这一研究，我们构建了一个包含56,000个样本的高质量OMTG数据集，并开发了专门为OMTG设计的新型时间和标题奖励函数。实验结果表明，我们的模型在OMTG基准上达到了43.65%的新状态，显著超越了现有的最佳模型。'}}}, {'id': 'https://huggingface.co/papers/2606.06473', 'title': 'MLEvolve: A Self-Evolving Framework for Automated Machine Learning Algorithm Discovery', 'url': 'https://huggingface.co/papers/2606.06473', 'abstract': 'Abstract MLEvolve is an LLM-based multi-agent framework that enables long-horizon machine learning algorithm discovery through improved search mechanisms, memory systems, and adaptive coding strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language model (LLM) agents are increasingly applied to long-horizon tasks such as scientific discovery and machine learning engineering (MLE), where sustained self-evolution becomes a key capability. However, existing MLE agents suffer from inter-branch information isolation, memoryless search, and lack of hierarchical control, which together hinder long-horizon optimization. We present MLEvolve, an LLM-based self-evolving multi-agent framework for end-to-end machine learning algorithm discovery. By extending tree search to Progressive MCGS, MLEvolve enables cross-branch information flow through graph-based reference edges and gradually shifts the search from broad exploration to focused exploitation with an entropy-inspired progressive schedule. To allow the agent to evolve with accumulated experience, we introduce Retrospective Memory, which combines a cold-start domain knowledge base with a dynamic global memory for task-specific experience retrieval and reuse. For stable long-horizon iteration, we further decouple strategic planning from code generation with adaptive coding modes. Evaluation on MLE-Bench shows that MLEvolve achieves state-of-the-art performance across multiple dimensions including average medal rate and valid submission rate under a 12-hour budget (half the standard runtime). Moreover, MLEvolve also outperforms specialized algorithm discovery methods including AlphaEvolve on mathematical algorithm optimization tasks, demonstrating strong cross-domain generalization. Our code is available at https://github.com/InternScience/MLEvolve.', 'score': 4, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '4daf1faa889ece94', 'authors': ['Shangheng Du', 'Xiangchao Yan', 'Jinxin Shi', 'Zongsheng Cao', 'Shiyang Feng', 'Zichen Liang', 'Boyuan Sun', 'Tianshuo Peng', 'Yifan Zhou', 'Xin Li', 'Jie Zhou', 'Liang He', 'Bo Zhang', 'Lei Bai'], 'affiliations': ['East China Normal University', 'Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2606.06473.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#science'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующийся агент для открытия алгоритмов машинного обучения', 'desc': 'MLEvolve — это многоагентный фреймворк на основе большой языковой модели для автоматического открытия алгоритмов машинного обучения на протяжении длительных горизонтов оптимизации. Система использует расширенный поиск на дереве (Progressive MCGS) с графовыми связями для обмена информацией между ветвями поиска и постепенного перехода от исследования к эксплуатации. Ретроспективная память объединяет базу знаний предметной области с динамической памятью для накопления и переиспользования опыта при решении задач. Фреймворк демонстрирует передовые результаты на бенчмарке MLE-Bench и превосходит специализированные методы поиска алгоритмов, включая AlphaEvolve.'}, 'en': {'title': 'Revolutionizing Algorithm Discovery with Self-Evolving Agents', 'desc': 'MLEvolve is a framework that uses large language models (LLMs) to help discover machine learning algorithms over long periods. It addresses issues like information isolation and memory limitations in existing agents by allowing them to share knowledge and learn from past experiences. The framework employs a unique search strategy that balances exploration and exploitation, enhancing the efficiency of the algorithm discovery process. Evaluations show that MLEvolve outperforms traditional methods, achieving better results in less time across various tasks.'}, 'zh': {'title': 'MLEvolve：自我演化的机器学习算法发现框架', 'desc': 'MLEvolve是一个基于大型语言模型（LLM）的多智能体框架，旨在通过改进的搜索机制、记忆系统和自适应编码策略，实现长期机器学习算法的发现。该框架解决了现有机器学习工程（MLE）智能体在信息隔离、无记忆搜索和缺乏层次控制等方面的问题，从而促进了长期优化。MLEvolve通过扩展树搜索到渐进式多分支图搜索（MCGS），实现了跨分支的信息流动，并采用熵启发的渐进调度，逐步将搜索从广泛探索转向集中利用。通过引入回顾性记忆，MLEvolve能够利用积累的经验进行自我演化，显著提升了在多维度上的性能表现。'}}}, {'id': 'https://huggingface.co/papers/2606.05833', 'title': 'Learning Geometric Representations from Videos for Spatial Intelligent Multimodal Large Language Models', 'url': 'https://huggingface.co/papers/2606.05833', 'abstract': "Abstract GeoVR enhances multimodal large language models with 3D awareness by restructuring their semantic latent space through geometric knowledge distillation from 3D foundation models using multiple geometric targets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal Large Language Models (MLLMs) excel at 2D semantic understanding but lack intrinsic 3D awareness, resulting in representations that fail to maintain geometric and spatial consistency across video frames. Given the scarcity of large-scale 3D data, we present GeoVR, a novel framework that learns geometric representations using purely 2D video sequences. This approach effectively restructures the semantic latent space within MLLMs to unlock spatial intelligence. Rather than employing superficial feature mixing, GeoVR reshapes the internal representations of the MLLM by distilling geometry knowledge from pre-trained 3D foundation models. This is accomplished through a multi-objective learning strategy driven by four complementary geometric targets: (1) estimating inter-frame camera poses to embed varying viewpoint dynamics, (2) regressing dense depth maps to anchor physical distances, (3) predicting a metric scale factor for real-world calibration, and (4) distilling multi-scale 3D features to align the intermediate feature space. Guided by these explicit physical and geometric constraints, the model's internal representations naturally develop strong 3D awareness. Extensive experiments on spatial reasoning benchmarks demonstrate that GeoVR achieves state-of-the-art performance, establishing a new paradigm for endowing foundation models with spatial intelligence.", 'score': 3, 'issue_id': 2379, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'c8a961b4cb6b6dd9', 'authors': ['Haibo Wang', 'Lifu Huang'], 'affiliations': ['University of California, Davis'], 'pdf_title_img': 'assets/pdf/title_img/2606.05833.jpg', 'data': {'categories': ['#multimodal', '#training', '#3d', '#video'], 'emoji': '🎬', 'ru': {'title': 'Придание пространственного интеллекта большим языковым моделям через геометрическую дистилляцию', 'desc': 'GeoVR — это инновационная система, которая добавляет пространственное понимание в большие мультимодальные языковые модели, переструктурируя их внутреннее представление данных через дистилляцию геометрических знаний от 3D фундаментальных моделей. Система использует чисто двумерные видеопоследовательности для обучения трёхмерным представлениям, избегая необходимости в больших наборах 3D данных. Подход основан на многоцелевой стратегии обучения с четырьмя геометрическими целями: оценка поз камеры между кадрами, предсказание карт глубины, вычисление метрического масштаба и дистилляция многомасштабных 3D признаков. Благодаря явным физическим и геометрическим ограничениям модель развивает сильное трёхмерное восприятие и достигает лучших результатов в задачах пространственного рассуждения.'}, 'en': {'title': 'Unlocking 3D Awareness in Language Models with GeoVR', 'desc': "GeoVR is a framework that enhances large language models (MLLMs) by integrating 3D awareness into their understanding of semantics. It does this by restructuring the model's latent space using geometric knowledge from 3D models, even when only 2D video data is available. The framework employs a multi-objective learning strategy that focuses on four geometric targets, such as estimating camera poses and regressing depth maps, to improve spatial consistency. As a result, GeoVR significantly boosts the model's performance on spatial reasoning tasks, setting a new standard for incorporating spatial intelligence into foundation models."}, 'zh': {'title': 'GeoVR：赋予语言模型三维感知的新方法', 'desc': 'GeoVR 是一种新框架，通过几何知识蒸馏来增强多模态大型语言模型的三维感知能力。它利用纯二维视频序列学习几何表示，重构语义潜在空间，从而提升空间智能。GeoVR 采用多目标学习策略，结合四个几何目标来指导模型的内部表示，使其自然发展出强大的三维意识。实验结果表明，GeoVR 在空间推理基准测试中表现优异，开创了为基础模型赋予空间智能的新范式。'}}}, {'id': 'https://huggingface.co/papers/2606.06155', 'title': 'AffordanceVLA: A Vision-Language-Action Model Empowering Action Generation through Affordance-Aware Understanding', 'url': 'https://huggingface.co/papers/2606.06155', 'abstract': 'Abstract AffordanceVLA introduces a unified framework that uses structured affordance forecasting as an intermediate representation to improve the precision of perception-action mapping in robotic manipulation by leveraging vision-language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models leverage the rich world knowledge of pretrained vision-language models (VLMs) to enable instruction-following robotic manipulation. However, the structural mismatch between VLM semantic spaces and embodied control policies often hinders the learning of precise perception--action mappings. To address this challenge, we propose AffordanceVLA, a unified framework that introduces structured affordance forecasting as a task-oriented intermediate representation to establish a more precise and robust perception--action mapping. Specifically, we progressively model manipulation priors through three complementary components: 1) Which2Act for object-centric grounding via visual latent prediction to suppress distractions; 2) Where2Act for 2D interaction localization via affordance map estimation; and 3) How2Act for 3D geometric reasoning to guide manipulation policies. These affordance cues provide spatially grounded, semantically conditioned, and action-coupled intermediate representations, thereby naturally bridging vision, language and action. We integrate these modules into a Mixture-of-Transformer (MoT) architecture with specialized experts and train the model using a three-stage training strategy with a progressive data curriculum. To overcome the scarcity of dense affordance labels in robotic datasets, we also develop a robust automated data augmentation pipeline. Extensive experiments on simulation and real-world demonstrate that AffordanceVLA achieves strong performance across diverse manipulation scenarios.', 'score': 3, 'issue_id': 2379, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'bc9686ef45afc133', 'authors': ['Qize Yu', 'Jiadi You', 'Yuran Wang', 'Jiaqi Liang', 'Bowen Ping', 'Yang Tian', 'Yue Chen', 'Minghong Cai', 'Zeying Gong', 'Ruihai Wu', 'Yinchuan Li', 'Junwei Liang', 'Yingcong Chen'], 'affiliations': ['Hong Kong University of Science and Technology (Guangzhou)', 'Knowin AI', 'Peking University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.06155.jpg', 'data': {'categories': ['#multimodal', '#training', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Affordance как мост между языком и движением робота', 'desc': 'AffordanceVLA — это унифицированная система, которая использует предсказание affordance (доступности действий) как промежуточное представление для улучшения точности отображения между восприятием и действиями в робототехнике. Система объединяет три взаимодополняющих компонента: определение объектов через предсказание визуальных признаков, локализацию точек взаимодействия через карты affordance и геометрическое рассуждение в 3D для направления политик манипуляции. Модель обучается с использованием архитектуры Mixture-of-Transformer и трёхэтапной стратегии обучения с прогрессивной выборкой данных, а также специальной техники аугментации для компенсации недостатка размеченных данных. Экспериментальные результаты демонстрируют эффективность подхода как в симуляциях, так и в реальных сценариях манипуляции объектами.'}, 'en': {'title': 'Bridging Vision and Action for Smarter Robot Manipulation', 'desc': "AffordanceVLA is a new framework designed to enhance how robots understand and perform tasks by using structured affordance forecasting. It combines vision-language models to create a better connection between what a robot sees and how it should act. The framework includes three key components: Which2Act for identifying objects, Where2Act for locating interactions, and How2Act for understanding 3D movements. By integrating these components into a specialized architecture and using a smart training approach, AffordanceVLA improves the robot's ability to manipulate objects accurately in various situations."}, 'zh': {'title': '提升机器人操作精度的统一框架', 'desc': 'AffordanceVLA提出了一个统一框架，通过结构化的可供性预测作为中间表示，提升机器人操作中的感知-动作映射精度。该框架利用视觉-语言模型的丰富知识，支持指令跟随的机器人操作。为了解决视觉-语言模型语义空间与具体控制策略之间的结构不匹配问题，AffordanceVLA引入了三个互补组件来建模操作先验。通过这些组件，框架能够提供空间上有依据、语义上有条件、与动作相关的中间表示，从而有效连接视觉、语言和动作。'}}}, {'id': 'https://huggingface.co/papers/2606.05846', 'title': 'Towards Truly Multilingual ASR: Generalizing Code-Switching ASR to Unseen Language Pairs', 'url': 'https://huggingface.co/papers/2606.05846', 'abstract': 'Abstract Code-switching automatic speech recognition models show limited generalization across unseen language pairs despite attempts at model merging and domain generalization techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Automatic Speech Recognition (ASR) has become a key technology for human--AI interaction. However, code-switching ASR (CS-ASR) remains particularly challenging due to the severe scarcity of multilingual CS speech resources across diverse language pairs. Existing approaches primarily improve CS-ASR performance through synthetic CS speech generation or pair-specific fine-tuning on limited bilingual datasets. Nevertheless, these approaches face an inherent scalability limitation, as support for CS must be developed separately for language pairs whose number grows combinatorially with the number of supported languages. In this work, we investigate whether CS capabilities learned from a limited set of seen language pairs can generalize to unseen language pairs through model merging and domain generalization methods. Our experiments show that merged bilingual CS-ASR models modestly generalize to unseen language pairs, suggesting limited transfer of bilingual CS capabilities across language pairs.', 'score': 3, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '8c16a3fc97eda190', 'authors': ['Gio Paik', 'Hyunseo Shin', 'Soungmin Lee'], 'affiliations': ['AeryAI, Seoul, Republic of Korea', 'College of Computing, Georgia Institute of Technology, GA, USA', 'Department of Artificial Intelligence, University of Seoul, Seoul, Republic of Korea', 'Theta One Korea, Seoul, Republic of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2606.05846.jpg', 'data': {'categories': ['#dataset', '#audio', '#multilingual'], 'emoji': '🗣️', 'ru': {'title': 'Пределы обобщения в распознавании речи с кодовым переключением', 'desc': 'В статье изучается проблема автоматического распознавания речи с кодовым переключением между языками (CS-ASR). Авторы исследуют, могут ли модели, обученные на ограниченном наборе пар языков, обобщать полученные знания на неизвестные пары языков, используя методы слияния моделей и обобщения на новые домены. Результаты экспериментов показывают, что объединённые двуязычные CS-ASR модели демонстрируют лишь скромное обобщение на новые пары языков, указывая на ограниченную передачу двуязычных возможностей. Исследование выявляет фундаментальный вызов масштабируемости при поддержке кодового переключения для растущего числа языковых пар.'}, 'en': {'title': 'Unlocking Code-Switching: Limited Generalization in ASR Models', 'desc': 'This paper explores the challenges of code-switching automatic speech recognition (CS-ASR), which struggles to generalize across different language pairs. The authors investigate whether models trained on a few language pairs can effectively transfer their capabilities to new, unseen pairs using techniques like model merging and domain generalization. They find that while there is some modest generalization, the transfer of bilingual CS capabilities is limited. This highlights the need for more scalable solutions in developing CS-ASR systems for a growing number of language combinations.'}, 'zh': {'title': '提升代码切换语音识别的泛化能力', 'desc': '这篇论文探讨了代码切换自动语音识别（CS-ASR）模型在未见语言对上的泛化能力。尽管通过模型合并和领域泛化技术进行尝试，现有模型在不同语言对之间的表现仍然有限。研究表明，合并的双语CS-ASR模型在未见语言对上有一定的泛化能力，但这种能力的转移是有限的。作者的工作强调了在多语言环境中开发更具可扩展性的CS-ASR模型的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.04465', 'title': 'SePO: Self-Evolving Prompt Agent for System Prompt Optimization', 'url': 'https://huggingface.co/papers/2606.04465', 'abstract': "Abstract Self-Evolving Prompt Optimization (SePO) enhances agent performance by jointly optimizing both task and prompt agent system prompts through evolutionary search, demonstrating superior accuracy across diverse benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct System prompt optimization improves agent behavior without modifying the underlying model, yielding human-readable, model-agnostic instructions. Existing methods build a prompt agent that refines task agents' system prompts, yet leave the prompt agent's own system prompt hand-engineered and fixed. We propose Self-Evolving Prompt Optimization (SePO), which treats the prompt agent's own system prompt as an optimization target alongside task agents' system prompts. SePO adopts a self-referential design. A single prompt agent improves both task agents' system prompts and its own under an open-ended evolutionary search that maintains an archive of candidate prompts as stepping stones. Training proceeds in two stages: pre-training evolves the prompt agent on a multi-task pool, and fine-tuning then applies it to a target task. Across five benchmarks spanning math (AIME'25), abstract reasoning (ARC-AGI-1), graduate-level science (GPQA), code generation (MBPP), and logic puzzles (Sudoku), SePO consistently outperforms Manual-CoT, TextGrad, and MetaSPO, improving the average accuracy by 4.49 points compared to Manual-CoT. The prompt optimization skill from pre-training also generalizes to tasks beyond the pre-training mixture, rather than memorizing per-task prompts.", 'score': 3, 'issue_id': 2376, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '51ebca9e238ba358', 'authors': ['Wangcheng Tao', 'Han Wu', 'Weng-Fai Wong'], 'affiliations': ['City University of Hong Kong', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2606.04465.jpg', 'data': {'categories': ['#training', '#benchmark', '#optimization', '#reasoning', '#agents'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующая оптимизация: промпты учатся улучшать самих себя', 'desc': 'В статье представлен метод Self-Evolving Prompt Optimization (SePO), который одновременно оптимизирует системные промпты как для агентов задач, так и для самого агента оптимизации промптов с помощью эволюционного поиска. Ключевая инновация заключается в самореферентном подходе, когда единый агент улучшает промпты других агентов и собственный промпт, используя архив кандидатов как ступени развития. Метод предусматривает двухэтапное обучение: предварительное обучение на наборе разнородных задач и последующая тонкая настройка на целевой задаче. SePO демонстрирует улучшение точности на 4.49 процентных пункта по сравнению с базовыми методами на разнообразных бенчмарках, включая математику, логику и генерацию кода, при этом полученные промпты обобщаются на новые задачи.'}, 'en': {'title': 'Evolving Prompts for Superior AI Performance', 'desc': 'Self-Evolving Prompt Optimization (SePO) is a method that improves the performance of AI agents by optimizing both the prompts used for tasks and the prompts for the agent itself through an evolutionary search process. This approach allows the prompt agent to adapt and enhance its own instructions while also refining the prompts for task agents, without changing the underlying AI model. SePO operates in two stages: first, it pre-trains the prompt agent on a variety of tasks, and then fine-tunes it for specific tasks, leading to better performance across multiple benchmarks. The results show that SePO significantly increases accuracy compared to existing methods, demonstrating its effectiveness in generating adaptable and human-readable prompts.'}, 'zh': {'title': '自我进化，优化提示，提升性能', 'desc': '自我进化提示优化（SePO）通过进化搜索共同优化任务和提示代理系统提示，从而提升代理性能，显示出在多种基准测试中具有更高的准确性。该方法在不修改基础模型的情况下，通过生成可读的、与模型无关的指令来改善代理行为。与现有方法不同，SePO将提示代理的系统提示视为优化目标，并在开放式进化搜索中同时改进任务代理的系统提示。通过预训练和微调两个阶段，SePO在多个基准测试中表现优异，平均准确率比手动链（Manual-CoT）提高了4.49个百分点。'}}}, {'id': 'https://huggingface.co/papers/2606.05254', 'title': 'Flash-WAM: Modality-Aware Distillation for World Action Models', 'url': 'https://huggingface.co/papers/2606.05254', 'abstract': "Abstract Flash-WAM introduces a modality-aware step-distillation framework for world-action models that achieves real-time inference by adapting consistency functions to different noise regimes in video and action streams.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World-action models (WAMs) jointly generate future video and robot actions through iterative diffusion, achieving strong performance on manipulation benchmarks but requiring tens of denoising steps, a cost that precludes real-time control. Step distillation has emerged as the natural remedy, but off-the-shelf methods break down in the joint video-action setting because video and action streams use different SNR-shifted noise schedules and reach training with substantially different marginal noise distributions, an asymmetry that single-modality distillation methods cannot accommodate. We introduce Flash-WAM, a modality-aware step-distillation framework inspired by consistency distillation that selects the consistency function for each modality to match its noise regime: a linear-gradient-scaling parametrization for the action stream's low-noise regime, paired with a variance-preserving parametrization for the video stream's high-noise regime, grounded in a structural analysis of the consistency-function family that characterizes the achievable gradient scaling under the consistency boundary condition. Instantiated on LingBot-VA, Flash-WAM compresses inference to a single step in each modality. On RoboTwin 2.0, this reduces per-chunk latency from 8.1 seconds to 348 ms on NVIDIA L40S, a 23{times} speedup that enables real-time inference. Flash-WAM preserves task success on simulation benchmarks (85.5% RoboTwin 2.0, 95.7% LIBERO) and substantially recovers real-world performance (60% average on a Unitree G1 humanoid robot), while naive consistency distillation drops to 24% at the same step budget.", 'score': 3, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '86e973d9b157af94', 'authors': ['Arman Akbari', 'Ci Zhang', 'Arash Akbari', 'Lin Zhao', 'Yixiao Chen', 'Weiwei Chen', 'Xuan Zhang', 'Geng Yuan', 'Yanzhi Wang'], 'affiliations': ['EmbodyX Inc.', 'Northeastern University', 'University of Georgia'], 'pdf_title_img': 'assets/pdf/title_img/2606.05254.jpg', 'data': {'categories': ['#video', '#diffusion', '#multimodal', '#robotics', '#inference', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Быстрые мировые модели действий через интеллектуальную дистилляцию', 'desc': 'Flash-WAM представляет собой фреймворк для пошагового дистилляции моделей мировых действий, который позволяет достичь инференса в реальном времени путём адаптации функций консистентности к различным режимам шума в видео и потоках действий. Основная проблема заключается в том, что видео и действия используют разные расписания шума и имеют существенно отличающиеся маргинальные распределения шума, с чем не справляются стандартные методы дистилляции. Авторы предлагают модально-осведомленный подход, выбирая различные параметризации консистентности для каждой модальности: линейное масштабирование градиента для низкошумного режима действий и сохраняющую дисперсию параметризацию для высокошумного режима видео. На практике Flash-WAM сокращает задержку инференса с 8.1 секунды до 348 миллисекунд, достигая 23-кратного ускорения, сохраняя при этом высокий успех задач как в симуляции, так и на реальном роботе.'}, 'en': {'title': 'Real-Time Inference with Modality-Aware Step-Distillation', 'desc': 'Flash-WAM is a new framework designed to improve the efficiency of world-action models (WAMs) by using a modality-aware step-distillation approach. This method adapts consistency functions to different noise levels in video and action streams, allowing for real-time inference. By optimizing the training process for each modality, Flash-WAM significantly reduces the time needed for inference from 8.1 seconds to just 348 milliseconds, achieving a 23-fold speedup. Despite this acceleration, it maintains high task success rates in simulations and recovers strong performance in real-world applications.'}, 'zh': {'title': 'Flash-WAM：实时推理的新突破', 'desc': 'Flash-WAM是一种模态感知的步骤蒸馏框架，旨在实现世界动作模型的实时推理。该框架通过为不同噪声环境适配一致性函数，解决了视频和动作流在联合训练中面临的噪声分布不一致问题。Flash-WAM在LingBot-VA上实现了每个模态的推理压缩到单步，显著提高了推理速度。实验结果表明，Flash-WAM在多个基准测试中保持了高任务成功率，并在真实世界应用中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2606.03940', 'title': 'SEAOTTER: Sensor Embedded Autoencoding with One-Time Transcode for Efficient Reconstruction', 'url': 'https://huggingface.co/papers/2606.03940', 'abstract': 'Abstract A compression framework for cloud robotics combines learned latent representations with standard JPEG compatibility to achieve faster encoding and decoding while maintaining high perceptual quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In robotics systems, vast amounts of visual data are easily captured at high resolution using low-cost, low-power hardware. Yet, limited bandwidth and on-device compute resources prevent full utilization when transmitted via conventional codecs like JPEG/MPEG. Newer codecs, like AV1/AVIF, improve the rate-distortion trade-off, but demand far more resources for encoding, impractical without custom ASICs. Recent asymmetric autoencoders deliver high quality under extreme power and bandwidth constraints, but add prohibitive decoding cost and use bespoke formats that ignore decades of infrastructure built around standards like JPEG. To address these limitations, we introduce a compression framework for cloud robotics based on a Sensor Embedded Autoencoder paired with a One-Time Transcode for Efficient Reconstruction (SEAOTTER). Because the sensor, cloud, and consumer stages face very different power and bandwidth budgets, SEAOTTER combines the compactness of a learned latent with the broad usability of a standard JPEG file. Since naive transcoding degrades performance, we propose a learnable JPEG color and quantization transform that enables increased accuracy for global, dense, and vision-language-based perception. Using SEAOTTER, we train both general-purpose and task-aware transcoding pipelines for a pre-trained, frozen encoder. At a compression ratio of 200:1 and compared to AVIF, we observe 7 times faster encoding, 3.5 times faster decoding, and +8% ImageNet top-1 accuracy, while retaining compatibility with JPEG infrastructure. Our code is available at https://github.com/UT-SysML/seaotter .', 'score': 3, 'issue_id': 2377, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '2c798d28e43be2e7', 'authors': ['Dan Jacobellis', 'Neeraja J. Yadwadkar'], 'affiliations': ['Department of Electrical and Computer Engineering The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.03940.jpg', 'data': {'categories': ['#cv', '#robotics', '#inference'], 'emoji': '🤖', 'ru': {'title': 'Облачная робототехника через гибридное сжатие: нейросеть и JPEG в одном флаконе', 'desc': 'В статье предложена структура сжатия видеоданных для облачной робототехники под названием SEAOTTER, которая объединяет обученные скрытые представления с совместимостью стандарта JPEG. Система состоит из автоэнкодера, встроенного в датчик, и однократного перекодирования для эффективной реконструкции, что позволяет оптимизировать потребление энергии и пропускную способность на разных этапах обработки. Авторы разработали обучаемое преобразование цвета и квантизации JPEG, которое повышает точность для различных задач компьютерного зрения, включая детектирование и языковые модели. По сравнению с современным кодеком AVIF SEAOTTER обеспечивает 7-кратное ускорение кодирования, 3.5-кратное ускорение декодирования и лучшую точность при сжатии 200:1, сохраняя совместимость с существующей инфраструктурой JPEG.'}, 'en': {'title': 'Efficient Compression for Cloud Robotics with SEAOTTER', 'desc': 'This paper presents a new compression framework called SEAOTTER, designed for cloud robotics, which combines learned latent representations with JPEG compatibility. The framework addresses the challenges of limited bandwidth and computational resources in transmitting high-resolution visual data captured by low-cost hardware. By using a learnable JPEG color and quantization transform, SEAOTTER enhances performance while maintaining compatibility with existing JPEG standards. The results show significant improvements in encoding and decoding speeds, as well as increased accuracy in image recognition tasks, making it a practical solution for robotics applications.'}, 'zh': {'title': '云机器人压缩框架：高效编码与解码的结合', 'desc': '本文提出了一种用于云机器人技术的压缩框架，结合了学习到的潜在表示和标准JPEG兼容性，以实现更快的编码和解码，同时保持高感知质量。该框架名为SEAOTTER，利用传感器嵌入式自编码器和一次性转码技术，解决了传统编解码器在带宽和计算资源有限情况下的性能问题。通过引入可学习的JPEG颜色和量化变换，SEAOTTER在压缩比达到200:1的情况下，编码速度提高了7倍，解码速度提高了3.5倍，同时在ImageNet上提高了8%的准确率。该方法不仅提高了压缩效率，还保持了与现有JPEG基础设施的兼容性。'}}}, {'id': 'https://huggingface.co/papers/2606.02569', 'title': 'AdaCodec: A Predictive Visual Code for Video MLLMs', 'url': 'https://huggingface.co/papers/2606.02569', 'abstract': 'Abstract AdaCodec reduces video encoding redundancy by transmitting full visual tokens only when scene prediction fails, otherwise encoding compact inter-frame change descriptions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video is temporally redundant: adjacent frames usually share most objects, background, and layout. Yet existing video multimodal large language models (video MLLMs) usually encode each sampled frame as an independent RGB image, causing visual tokens to repeat content already present in earlier frames. This suggests a more direct video interface: send a full reference frame only when the scene cannot be predicted well from prior context, and otherwise transmit a compact description of inter-frame changes. We call this interface a predictive visual code, and instantiate it for video MLLMs as AdaCodec. AdaCodec spends full visual tokens on a reference frame only when its conditional predictive cost is high; otherwise, it encodes inter-frame changes, including motion and prediction residuals, as compact P-tokens. Across all eleven benchmarks, AdaCodec improves over the Qwen3-VL-8B per-frame RGB baseline at a matched visual-token budget. Even at 1/7 the budget, AdaCodec with 32k tokens surpasses the 224k baseline on all long-video benchmarks; on five general-video benchmarks, it raises the average score while substantially cutting time-to-first-token from 9.26s to 1.62s.', 'score': 3, 'issue_id': 2376, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '445c0a6d1837138a', 'authors': ['Haowen Hou', 'Zhen Huang', 'Zheming Liang', 'Qingyi Si', 'Chenglin Li', 'Shuai Dong', 'Kele Shao', 'Ruilin Li', 'Dianyi Wang', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['JD.com', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.02569.jpg', 'data': {'categories': ['#multimodal', '#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное кодирование видео через предсказание межкадровых изменений', 'desc': 'AdaCodec — это метод адаптивного кодирования видео для видео-LLM, который снижает избыточность путём передачи полных визуальных токенов только когда предсказание сцены неудачно. Вместо независимого кодирования каждого кадра как RGB-изображения, система использует полный опорный кадр только при высокой ошибке предсказания, а иначе передаёт компактное описание межкадровых изменений (движение и остатки предсказания) в виде P-токенов. Метод достигает улучшения качества на всех одиннадцати бенчмарках при сопоставимом бюджете визуальных токенов, а при бюджете в 1/7 от исходного превосходит базовую модель на всех долгоформатных видео-бенчмарках. Кроме того, AdaCodec существенно ускоряет время до первого токена с 9,26 секунд до 1,62 секунды.'}, 'en': {'title': 'Efficient Video Encoding with Predictive Visual Codes', 'desc': 'AdaCodec is a novel approach to video encoding that minimizes redundancy by only sending full visual tokens when the scene cannot be accurately predicted from previous frames. Instead of treating each frame as an independent RGB image, it leverages the temporal redundancy in video data by encoding compact descriptions of changes between frames. This method, termed predictive visual code, allows for efficient encoding by focusing on inter-frame changes when the predictive cost is low. As a result, AdaCodec significantly outperforms traditional methods in various benchmarks while reducing the time needed to start processing video data.'}, 'zh': {'title': '智能视频编码，提升效率！', 'desc': 'AdaCodec通过在场景预测失败时传输完整的视觉标记，减少视频编码的冗余。相邻帧通常共享大部分对象、背景和布局，因此在预测良好的情况下，仅需编码紧凑的帧间变化描述。该方法称为预测视觉编码，旨在提高视频多模态大语言模型的效率。实验结果表明，AdaCodec在多个基准测试中表现优于传统的逐帧RGB编码方法，显著提高了处理速度。'}}}, {'id': 'https://huggingface.co/papers/2605.30794', 'title': 'MechVQA: Benchmarking and Enhancing Multimodal LLMs on Comprehensive Mechanical Drawing Understanding', 'url': 'https://huggingface.co/papers/2605.30794', 'abstract': 'Abstract Mechanical engineering drawing understanding is improved through a specialized dataset and domain-specific model that outperforms existing baselines by leveraging multi-stage training and high-density visual question answering annotations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal Large Language Models (MLLMs) have demonstrated significant achievements in general visual question answering (VQA) tasks. However, they remain brittle on mechanical engineering drawings, where high annotation density and weak domain knowledge, compounded by unreliable spatial relation reasoning under strict projection rules and geometric constraints, make decisive cues easy to miss and frequently lead to wrong answers. To bridge this gap, we introduce the first comprehensive mechanical drawing understanding dataset, MechVQA, created through a semi-automated construction and quality-control pipeline. MechVQA contains 3.3k high-density pictures with 21K question-answer pairs, spanning 10 different fine-grained tasks across three capability levels: Recognition, Reasoning, and Judging, providing a testbed to evaluate and improve MLLM understanding on real-world mechanical drawings. On top of MechVQA, we then develop the MechVL model through a multi-stage training paradigm, building a strong domain-specialized baseline. Extensive experimental results demonstrate that MechVL outperforms the strongest closed-source baseline by 7.57 percentage points on the MechVQA total score, significantly enhancing mechanical drawing understanding ability and providing a reusable foundation for deploying MLLMs in mechanical design and inspection scenarios.', 'score': 3, 'issue_id': 2377, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'c16cc1f0623a32f7', 'authors': ['Qian Kou', 'Xiaofeng Shi', 'Yulin Li', 'Xiaosong Qiu', 'Xinyang Wang', 'Hua Zhou', 'Cao Dongxing'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI), China', 'Beijing University of Technology, China', 'Institute of Information Engineering, Chinese Academy of Sciences, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.30794.jpg', 'data': {'categories': ['#cv', '#training', '#benchmark', '#dataset', '#multimodal'], 'emoji': '📐', 'ru': {'title': 'Специализированная модель для понимания механических чертежей', 'desc': 'В работе представлен первый специализированный датасет MechVQA для понимания механических чертежей, содержащий 3.3k изображений с 21K вопросно-ответными парами высокой плотности аннотаций. Авторы показывают, что многомодальные большие языковые модели (MLLM) часто ошибаются на механических чертежах из-за сложных пространственных отношений и геометрических ограничений. Для решения этой проблемы разработана специализированная модель MechVL, использующая многоэтапное обучение и тонкую настройку на инженерных задачах. Экспериментальные результаты показывают, что MechVL превосходит существующие базовые модели на 7.57 процентных пункта и может применяться в проектировании и проверке механических систем.'}, 'en': {'title': 'Enhancing Mechanical Drawing Understanding with MechVQA and MechVL', 'desc': 'This paper presents a new dataset called MechVQA, designed to improve the understanding of mechanical engineering drawings by machine learning models. It addresses the challenges of visual question answering (VQA) in this domain, where existing models struggle due to complex spatial relations and high annotation density. The authors introduce the MechVL model, which is trained using a multi-stage approach to enhance its performance on tasks related to recognition, reasoning, and judging in mechanical drawings. Experimental results show that MechVL significantly outperforms previous models, providing a robust foundation for future applications in mechanical design and inspection.'}, 'zh': {'title': '提升机械图纸理解的创新方法', 'desc': '本文介绍了一种新的机械工程图纸理解方法，通过构建专门的数据集MechVQA和领域特定的模型，显著提高了现有基线的性能。MechVQA包含3300张高密度图片和21000个问答对，涵盖了识别、推理和判断等三个能力层次的十种细粒度任务。我们开发的MechVL模型采用多阶段训练策略，建立了强大的领域专用基线。实验结果表明，MechVL在MechVQA总分上比最强的闭源基线提高了7.57个百分点，显著增强了机械图纸的理解能力。'}}}, {'id': 'https://huggingface.co/papers/2606.06443', 'title': 'Revising Context, Shifting Simulated Stance: Auditing LLM-Based Stance Simulation in Online Discussions', 'url': 'https://huggingface.co/papers/2606.06443', 'abstract': "Abstract LLM-based stance simulation exhibits context sensitivity when subjected to counterfactual revisions, with both text-only and multimodal approaches showing robust stance transitions across different polarization mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly used to simulate social media users and infer how individuals may respond to online discussions. However, it remains unclear whether these simulations reflect precise user-specific beliefs or whether they are highly sensitive to semantically independent changes in conversational contexts. In this work, we study counterfactual context revision as a framework for auditing LLM-based stance simulation. Given an original online conversation, we first infer a target user's stance toward a specific topic. We then apply controlled revision strategies to the conversational context and simulate the user's stance again under the revised context. We compare text-only revision strategies with a multimodal one that incorporates meme-based context and evaluate two main effectiveness metrics, i.e., average directional stance shift and stance transition rate. The results reveal effective and robust stance transitions in both text-only and multimodal strategies across different polarization-preference mechanisms. Our study contributes an evaluation framework for understanding the context sensitivity of LLM-based stance simulation. More broadly, it highlights both the promise and risk of using LLMs to simulate online opinion dynamics.", 'score': 2, 'issue_id': 2378, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'bc87c22e02a6235d', 'authors': ['Xinnong Zhang', 'Wanting Shan', 'Hanjia Lyu', 'Zhongyu Wei', 'Jiebo Luo'], 'affiliations': ['Fudan University', 'University of Rochester'], 'pdf_title_img': 'assets/pdf/title_img/2606.06443.jpg', 'data': {'categories': [], 'emoji': '🎭', 'ru': {'title': 'Контекстная уязвимость: как LLM меняют мнение при малейшем изменении обстановки', 'desc': 'В статье исследуется, насколько чувствительны большие языковые модели к контекстным изменениям при симуляции позиций пользователей в онлайн-дискуссиях. Авторы используют методику контрфактических пересмотров для проверки надёжности моделирования — они изменяют контекст беседы и наблюдают, как меняется инферированная позиция пользователя. Исследование сравнивает текстовые и мультимодальные подходы (включая изображения-мемы) и измеряет среднее изменение позиции и вероятность её переворота. Результаты показывают, что LLM-модели демонстрируют значительную чувствительность к семантически независимым изменениям контекста, что указывает как на потенциал, так и на риски использования таких систем для моделирования общественного мнения.'}, 'en': {'title': 'Understanding Stance Sensitivity in LLM Simulations', 'desc': 'This paper investigates how large language models (LLMs) simulate user stances in online discussions, particularly when the context changes. It introduces a method called counterfactual context revision to assess how sensitive these simulations are to alterations in conversational context. The study compares text-only and multimodal approaches, including the use of memes, to see how effectively they can shift user stances. The findings indicate that both strategies can produce significant stance transitions, emphasizing the importance of context in LLM-based simulations of social media interactions.'}, 'zh': {'title': '探索LLM在立场模拟中的上下文敏感性', 'desc': '本研究探讨了基于大型语言模型（LLM）的立场模拟在面对反事实修订时的上下文敏感性。我们通过分析在线对话，推断用户对特定话题的立场，并在修改后的上下文中重新模拟用户的立场。研究比较了仅文本修订策略与结合表情包的多模态修订策略，评估了立场转变的有效性。结果显示，无论是文本还是多模态策略，在不同的极化机制下都能实现有效的立场转变，强调了LLM在模拟在线舆论动态中的潜力与风险。'}}}, {'id': 'https://huggingface.co/papers/2606.06447', 'title': 'Latent Reasoning with Normalizing Flows', 'url': 'https://huggingface.co/papers/2606.06447', 'abstract': 'Abstract Latent reasoning framework using normalizing flows preserves autoregressive generation advantages while enabling efficient, probabilistic intermediate computation in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models often improve reasoning by generating explicit chain-of-thought (CoT), demonstrating the importance of intermediate computation. However, textual CoT forces this computation through a discrete, serial, and communication-oriented token stream: each reasoning step must be verbalized before the model can proceed, even when the underlying update is semantic, uncertain, or only partially formed. Latent reasoning offers a higher-bandwidth alternative by performing intermediate computation in compact continuous states before committing to text. Yet existing latent-reasoning methods often sacrifice key advantages that make CoT effective in autoregressive language models, including native left-to-right generation, probabilistic sampling, compatibility with KV-cache decoding, and tractable likelihood estimation. We propose NF-CoT, a latent reasoning framework that preserves these advantages by modeling continuous thoughts with normalizing flows. NF-CoT instantiates a TARFlow-style normalizing flow inside the LLM backbone, defining a tractable probability model over compact continuous thoughts distilled from explicit CoT. Continuous-thought positions are generated by an NF head, while text positions are generated by the standard LM head within the same causal stream. This design provides exact likelihoods for latent thoughts, enables probabilistic left-to-right decoding with the original KV cache, and supports direct policy-gradient optimization in the latent reasoning space. On code-generation benchmarks, NF-CoT improves pass rates over explicit-CoT and prior latent-reasoning baselines while substantially reducing intermediate-reasoning cost.', 'score': 2, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'b0e79afe0352bf47', 'authors': ['Guancheng Tu', 'Xiangjun Fu', 'Suhao Yu', 'Yao Tang', 'Haoqiang Kang', 'Lianhui Qin', 'Yizhe Zhang', 'Jiatao Gu'], 'affiliations': ['Meta', 'UC San Diego', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2606.06447.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#plp', '#optimization', '#training'], 'emoji': '🧠', 'ru': {'title': 'Скрытые мысли через нормализующие потоки: эффективное рассуждение без потери качества генерации', 'desc': 'В работе предложена NF-CoT — новая архитектура для латентного рассуждения в больших языковых моделях, которая использует нормализующие потоки для моделирования промежуточных мыслей в непрерывном пространстве. В отличие от явной цепочки рассуждений, где каждый шаг должен быть переведён в токены, этот подход позволяет выполнять вычисления в компактном непрерывном представлении, что экономит вычислительные ресурсы. Ключевое преимущество метода состоит в том, что он сохраняет все достоинства автарегрессивной генерации: левосторонний порядок генерации, вероятностное семплирование, совместимость с KV-кешем и возможность вычисления точного правдоподобия. На бенчмарках для генерации кода NF-CoT показывает улучшение показателей успешности по сравнению с явной цепочкой рассуждений и предыдущими методами латентного рассуждения при значительном снижении затрат на промежуточные вычисления.'}, 'en': {'title': 'Enhancing Reasoning in Language Models with NF-CoT', 'desc': 'This paper introduces NF-CoT, a novel latent reasoning framework that enhances large language models by integrating normalizing flows. It allows for efficient intermediate computations in a continuous state, rather than relying solely on discrete text generation. By preserving the advantages of autoregressive models, such as left-to-right generation and probabilistic sampling, NF-CoT improves reasoning capabilities without sacrificing performance. The framework demonstrates significant improvements in code generation tasks, achieving higher pass rates while reducing the costs associated with intermediate reasoning steps.'}, 'zh': {'title': '潜在推理的新突破：NF-CoT框架', 'desc': '这篇论文提出了一种名为NF-CoT的潜在推理框架，利用归一化流技术来保留自回归生成的优势，同时实现高效的概率中间计算。传统的链式思维（CoT）需要将每一步推理转化为文本，限制了计算的灵活性和效率。NF-CoT通过在紧凑的连续状态中进行中间计算，避免了这种限制，并且能够与现有的语言模型解码机制兼容。实验结果表明，NF-CoT在代码生成基准测试中表现优于传统的链式思维和其他潜在推理方法，同时显著降低了中间推理的成本。'}}}, {'id': 'https://huggingface.co/papers/2606.03841', 'title': 'EvoDS: Self-Evolving Autonomous Data Science Agent with Skill Learning and Context Management', 'url': 'https://huggingface.co/papers/2606.03841', 'abstract': "Abstract EvoDS introduces a self-evolving autonomous data science agent that enhances its capabilities through skill acquisition and adaptive context management via reinforcement learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in Large Language Model (LLM) agents has enabled promising advances in automated data science. However, existing approaches remain fundamentally limited by their static action sets and lack of principled long-horizon context management, hindering their ability to accumulate reusable experience across tasks and operate reliably in multi-stage, iterative data science pipelines. To address these challenges, we introduce EvoDS, a self-evolving autonomous data science agent that learns to expand its skills and adaptively managing long-term context through agentic reinforcement learning. Specifically, EvoDS introduces two key strategies: (1) Autonomous Skill Acquisition (ASA) mechanism, which enables agents to synthesize, validate, and reuse executable skills; and (2) Adaptive Context Compression (ACC) strategy, which treats context management as a learned control problem rather than passive truncation. These strategies are orchestrated within a two-stage multi-agent training scheme, enabling EvoDS to autonomously improve over time. Theoretically, we prove that EvoDS's hierarchical design reduces tool-selection error, and its optimization objective aligns with an information bottleneck principle, ensuring efficient context use. Empirically, EvoDS outperforms state-of-the-art open-source data science agents by an average of 28.9% across four diverse benchmarks while eliminating out-of-token failures. Our code and data are available at https://github.com/usail-hkust/EvoDS.", 'score': 2, 'issue_id': 2376, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '5f2a4dadb304671a', 'authors': ['Zherui Yang', 'Fan Liu', 'Yansong Ning', 'Hao Liu'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2606.03841.jpg', 'data': {'categories': ['#training', '#benchmark', '#reasoning', '#optimization', '#rl', '#agents', '#long_context', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Самообучающийся агент, который растёт вместе с задачами', 'desc': 'EvoDS — это автономный агент на основе языковой модели, который самостоятельно развивается и улучшает свои способности в решении задач анализа данных. Агент использует механизм автономного приобретения навыков, позволяющий ему создавать, проверять и переиспользовать выполняемые скрипты и функции. Для эффективного управления контекстом в многоэтапных конвейерах EvoDS применяет адаптивное сжатие контекста, рассматривая его как управляемую задачу, а не простое усечение. Система обучается с помощью многоагентного обучения с подкреплением, что позволяет ей накапливать переиспользуемый опыт и превосходить существующие системы на 28,9% по среднему показателю.'}, 'en': {'title': 'EvoDS: The Future of Self-Evolving Data Science Agents', 'desc': 'EvoDS is a self-evolving autonomous data science agent that improves its skills and manages context using reinforcement learning. It addresses limitations of existing models by introducing Autonomous Skill Acquisition (ASA) for skill synthesis and validation, and Adaptive Context Compression (ACC) for better context management. This allows EvoDS to learn from past experiences and operate effectively in complex data science tasks. The agent has shown to outperform current leading models by nearly 29% across various benchmarks, demonstrating its advanced capabilities in automated data science.'}, 'zh': {'title': '自我进化的数据科学代理EvoDS', 'desc': 'EvoDS是一个自我进化的自主数据科学代理，通过强化学习增强其能力。它引入了自主技能获取机制和自适应上下文压缩策略，使得代理能够合成、验证和重用可执行技能，同时有效管理长期上下文。EvoDS在多阶段的数据科学流程中表现出色，能够在不同任务中积累可重用的经验。实验结果显示，EvoDS在四个基准测试中平均超越了最先进的开源数据科学代理28.9%。'}}}, {'id': 'https://huggingface.co/papers/2606.06486', 'title': 'Regret Minimization with Adaptive Opponents in Repeated Games', 'url': 'https://huggingface.co/papers/2606.06486', 'abstract': "Abstract Repeated policy regret provides a game-theoretic framework for analyzing adaptive opponents in repeated games, offering stronger equilibrium guarantees than traditional external regret through novel non-convex optimization algorithms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In this paper, we study regret minimization in repeated games with adaptive opponents who can respond based on histories of play. The standard metric of external regret in online learning is known to fail to capture such adaptivity. To account for players' counterfactual reasoning, we introduce {\\tt Repeated Policy Regret (RP-Regret)}, a game-theoretic metric that measures the difference between the realized and the best-in-hindsight accumulated utility when all players can respond to the history of play. Compared to existing regret notions in this setting, ours is native to repeated game playing, enabling stronger comparators and opponents with fewer constraints, while maintaining the possibility of finding better equilibria when all players minimize it. We first identify necessary conditions for obtaining {\\tt RP-Regret} sublinear in time, on the variation of the player's comparator strategies in the regret definition and on the memories of both the comparator and opponents' strategies. We then study additional conditions and provable algorithms to minimize {\\tt RP-Regret}, which is by definition non-convex in the strategy space. To address this challenge, we propose three algorithms: (i) one based on an optimization oracle, as assumed in some prior work in online non-convex learning; (ii) one that minimizes a convex and linearized surrogate of {\\tt RP-Regret} at each iteration; (iii) one that directly minimizes {\\tt RP-Regret} when opponents change strategies slowly. Furthermore, when all players can run algorithms to minimize the {\\tt RP-Regret} (or its linearized variant), certain subgame perfect equilibria of the repeated game can be learned. We also provide experiments showing that minimizing our regret notions can lead to more cooperative solutions with higher utility in games such as Stag-Hunt.", 'score': 1, 'issue_id': 2380, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '302b48e1f4989885', 'authors': ['Mingyang Liu', 'Asuman Ozdaglar', 'Tiancheng Yu', 'Kaiqing Zhang'], 'affiliations': ['Massachusetts Institute of Technology', 'OpenAI', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.06486.jpg', 'data': {'categories': ['#games', '#optimization', '#math', '#reasoning', '#rl'], 'emoji': '🎮', 'ru': {'title': 'Управление стратегией против адаптивных противников через новую метрику регрета', 'desc': 'В статье вводится новая метрика регрета повторяющейся политики (Repeated Policy Regret), которая лучше описывает игры против адаптивных противников, способных реагировать на историю игры, чем традиционный внешний регрет. Авторы доказывают необходимые условия для достижения сублинейного регрета и предлагают три алгоритма минимизации, включая методы с оптимизационным оракулом и выпуклой линеаризацией стратегии. Когда все игроки минимизируют эту метрику регрета, становится возможным обучение определённым совершенным в подыгре равновесиям повторяющейся игры. Экспериментальные результаты демонстрируют, что предложенный подход приводит к более кооперативным решениям с повышенной полезностью в играх типа Stag-Hunt.'}, 'en': {'title': 'Enhancing Game Strategies with Repeated Policy Regret', 'desc': "This paper introduces Repeated Policy Regret (RP-Regret), a new metric for analyzing adaptive opponents in repeated games. Unlike traditional external regret, RP-Regret accounts for players' ability to adjust their strategies based on past actions, providing stronger equilibrium guarantees. The authors propose three algorithms to minimize RP-Regret, addressing the challenges of non-convex optimization in strategy spaces. Their experiments demonstrate that minimizing RP-Regret can enhance cooperation and improve overall utility in games like Stag-Hunt."}, 'zh': {'title': '适应性对手下的重复博弈后悔最小化', 'desc': '本文研究了在适应性对手的重复博弈中最小化后悔的方法。我们引入了重复策略后悔（RP-Regret）这一博弈论指标，以衡量实际收益与最佳历史收益之间的差异。与传统的外部后悔度量相比，RP-Regret能够更好地适应重复博弈的特点，并提供更强的均衡保证。我们提出了三种算法来最小化RP-Regret，并通过实验表明，最小化后悔可以在博弈中实现更高的合作收益。'}}}, {'id': 'https://huggingface.co/papers/2606.05557', 'title': 'AURA: Intent-Directed Probing for Implicit-Need Surfacing in Situated LLM Agents', 'url': 'https://huggingface.co/papers/2606.05557', 'abstract': 'Abstract AURA enhances query answering by incorporating an intent inference step that estimates implicit needs and optimizes tool usage through gap scoring, achieving better implicit-need coverage and reduced probe consumption compared to standard approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A situated query like "where is Lin Wei?" often encodes more than its literal content: the user may also want to know whether Lin Wei is free, in a good mood, or worth interrupting now. Standard tool-use agents answer the literal question and stop. AURA inserts an inference step between scene perception and tool use that produces an IntentFrame: a structured estimate of the implicit need with a scalar gap score that controls per-query probe budget and tool selection. On a 100-query four-scene implicit-intent benchmark, AURA improves implicit-need coverage over ReAct-style probing (Delta = +0.07, p < 10^-6); three of four scenes are individually significant, the gain reproduces on a second backbone, and a prompt ablation attributes the lift to gap calibration rather than answer memorisation. On factual lookup the controller trades raw accuracy for 82% fewer probes and zero forbidden-tool violations on a privacy-sensitive slice; scope conditions are detailed in Limitations. Code, simulator, and benchmark are released at https://github.com/innovation64/AURA.', 'score': 1, 'issue_id': 2379, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '3c2385198e923792', 'authors': ['Yang Li', 'Jiaxiang Liu', 'Jiang Cai', 'Mingkun Xu'], 'affiliations': ['Guangdong Institute of Intelligence Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.05557.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Угадай невидимое: как агент учится понимать скрытые намерения пользователя', 'desc': 'AURA — это система, которая улучшает ответы на запросы пользователей путём добавления шага инференции для определения скрытых намерений. Система генерирует структурированное представление IntentFrame с оценкой gap score, которая контролирует использование инструментов и ограничивает количество запросов. На бенчмарке с сотней запросов AURA показывает значительное улучшение в покрытии неявных потребностей по сравнению с методом ReAct, при этом снижая количество зондирующих запросов. Подход успешно баланансирует точность ответов и эффективность использования ресурсов, особенно в задачах с ограничениями конфиденциальности.'}, 'en': {'title': 'AURA: Enhancing Query Understanding with Intent Inference', 'desc': "AURA is a machine learning framework that improves how queries are answered by adding an intent inference step. This step helps to understand the user's implicit needs, such as their emotional state or availability, beyond just the literal question asked. By using a structured estimate called an IntentFrame and a gap score, AURA optimizes the selection of tools and reduces the number of queries needed to get accurate answers. The results show that AURA significantly enhances implicit-need coverage while minimizing resource usage compared to traditional methods."}, 'zh': {'title': 'AURA：提升查询回答的智能化', 'desc': 'AURA通过引入意图推断步骤来增强查询回答能力，能够估计用户的隐含需求并优化工具使用。它通过差距评分来实现更好的隐含需求覆盖，并减少探测消耗。与标准方法相比，AURA在处理查询时能够更好地理解用户的意图，从而提高了查询的有效性。实验结果表明，AURA在隐含意图基准测试中表现优异，显著提高了隐含需求的覆盖率。'}}}, {'id': 'https://huggingface.co/papers/2606.05645', 'title': 'Discrete-WAM: Unified Discrete Vision-Action Token Editing for World-Policy Learning', 'url': 'https://huggingface.co/papers/2606.05645', 'abstract': 'Abstract Discrete-WAM introduces a unified discrete latent vision-action world policy that enables compositional causal reasoning and counterfactual reasoning in autonomous driving through aligned discrete tokens and a shared discrete diffusion framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous driving requires reasoning about how ego actions shape the evolution of the surrounding world. However, most end-to-end methods rely on direct state-to-action mappings, capturing correlations without explicitly modeling action-conditioned dynamics. Conversely, continuous-latent world models often lack compositional structure for causal reasoning across counterfactual futures. We introduce Discrete-WAM, a unified latent vision-action world policy that represents future visual states and ego actions as aligned discrete tokens, enabling compositional causal reasoning across alternative futures. Built upon this unified discrete align
