    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                    flag.classList.add('active');

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.06492', 'title': 'Code2LoRA: Hypernetwork-Generated Adapters for Code Language Models under Software Evolution', 'url': 'https://huggingface.co/papers/2606.06492', 'abstract': "Abstract Code2LoRA is a hypernetwork framework that generates repository-specific LoRA adapters for code language models, supporting both static and evolving codebases with efficient parameter-efficient fine-tuning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Code language models need repository-level context to resolve imports, APIs, and project conventions. Existing methods inject this knowledge as long inputs (retrieved through RAG or dependency analysis) or through per-repository fine-tuning and LoRA -- costly at repository scale and brittle to evolving codebases. We introduce Code2LoRA, a hypernetwork framework that generates repository-specific LoRA adapters, effectively injecting repository knowledge with zero inference-time token overhead. Code2LoRA supports two usage scenarios: Code2LoRA-Static converts a single repository snapshot into an adapter, suitable for comprehension of stable codebases; while Code2LoRA-Evo maintains an adapter backed by a GRU hidden state updated per code diff, suitable for active development of evolving codebases. To evaluate Code2LoRA against parameter-efficient fine-tuning baselines, we build RepoPeftBench, a benchmark of 604 Python repositories with two tracks: a static track with 40K training and 12K test assertion-completion tasks, and an evolution track with 215K commit-derived training and 87K commit-derived test tasks. On the static track, Code2LoRA-Static achieves 63.8% cross-repo and 66.2% in-repo exact match, matching the per-repository LoRA upper bound; on the evolution track, Code2LoRA-Evo achieves 60.3% cross-repo exact match (+5.2 pp over a single shared LoRA). Code2LoRA's code can be found at https://anonymous.4open.science/r/code2lora-6857; the model checkpoints and RepoPeftBench datasets can be found at https://huggingface.co/code2lora.", 'score': 44, 'issue_id': 2379, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'fe8c8104c7c90173', 'authors': ['Liliana Hotsko', 'Yinxi Li', 'Yuntian Deng', 'Pengyu Nie'], 'affiliations': ['University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.06492.jpg', 'data': {'categories': ['#plp', '#benchmark', '#training', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Гиперсетевые адаптеры для контекстного понимания кода в эволюционирующих репозиториях', 'desc': 'Code2LoRA — это гиперсетевой фреймворк, который генерирует специализированные LoRA адаптеры для языковых моделей кода, учитывая контекст конкретного репозитория. Вместо дорогостоящей переподготовки для каждого репозитория или использования длинного контекста через retrieval-augmented generation, подход использует гиперсеть для эффективной генерации параметров адаптера. Фреймворк поддерживает две сценария: Code2LoRA-Static для анализа стабильных кодовых баз и Code2LoRA-Evo для отслеживания развивающихся проектов через обновление скрытого состояния GRU при каждом коммите. Экспериментальная оценка на новом бенчмарке RepoPeftBench показывает, что подход достигает качества полной переподготовки на LoRA, одновременно значительно снижая вычислительные затраты.'}, 'en': {'title': 'Efficient Code Understanding with Code2LoRA', 'desc': 'Code2LoRA is a framework designed to create specific LoRA adapters for code language models, which helps them understand the context of different code repositories. It addresses the limitations of existing methods that either require long inputs or extensive fine-tuning, which can be inefficient and fragile for changing codebases. The framework offers two modes: one for static codebases, which generates an adapter from a single snapshot, and another for evolving codebases, which updates the adapter as the code changes. Evaluation on a benchmark of Python repositories shows that Code2LoRA significantly improves performance in both static and evolving scenarios compared to traditional fine-tuning methods.'}, 'zh': {'title': 'Code2LoRA：高效的代码库适配器生成框架', 'desc': 'Code2LoRA 是一个超网络框架，专门为代码语言模型生成特定于代码库的 LoRA 适配器，支持静态和动态代码库的高效参数微调。它通过零推理时间的令牌开销有效地注入代码库知识，解决了现有方法在大规模代码库中成本高和对动态代码库脆弱的问题。Code2LoRA 提供两种使用场景：Code2LoRA-Static 适用于稳定代码库的适配器生成，而 Code2LoRA-Evo 则适用于活跃开发中的动态代码库。通过构建 RepoPeftBench 基准，Code2LoRA 在静态和演变任务中均表现出色，展示了其在代码理解和适应性开发中的优势。'}}}, {'id': 'https://huggingface.co/papers/2606.05553', 'title': 'ArcANE: Do Role-Playing Language Agents Stay in Character at the Right Time?', 'url': 'https://huggingface.co/papers/2606.05553', 'abstract': "Abstract Role-playing language agents require dynamic character development that evolves through narratives, necessitating benchmarks that evaluate psychological trajectory alignment rather than static factual recall, with ArcANE demonstrating superior performance when character arc information is conditioned into models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Role-playing language agents (RPLAs) should play characters whose values and behavior evolve as the story progresses, not maintain a fixed persona. Existing benchmarks measure factual recall at a given chapter, not whether responses align with the character's psychological trajectory, especially in scenarios the source text never explores. We introduce ArcANE (Arc-Aware Narrative Evaluation), an automatically constructed benchmark spanning 17 novels and 80 principal characters. A Character Arc segments the narrative into phases along a psychological axis, and each probe poses the same scenario across phases, spanning both situations within the source text and situations beyond it. Across six models and six context modes, conditioning on the Character Arc tops every other context strategy on every model, and the gap is largest on scenarios outside the source text where retrieval has nothing to find. We further fine-tune open-weight models on the same data to obtain ArcANE-8B/32B, which widen the Arc advantage even more on scenarios outside the source text.", 'score': 40, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '25e3586a1201a10d', 'authors': ['Woojung Song', 'Nalim Kim', 'Sangjun Song', 'Chaewon Heo', 'Jongwon Lim', 'Yohan Jo'], 'affiliations': ['Graduate School of Data Science, Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05553.jpg', 'data': {'categories': ['#agents', '#training', '#benchmark', '#dataset'], 'emoji': '🎭', 'ru': {'title': 'Эволюция характера вместо статичной личности в языковых агентах', 'desc': 'Статья представляет ArcANE — бенчмарк для оценки языковых моделей в задаче ролевого взаимодействия, где агенты должны развивать характер персонажа в соответствии с его психологической траекторией на протяжении повествования. В отличие от существующих подходов, которые измеряют только точность фактического припоминания, предложенный метод оценивает способность моделей сохранять согласованность поведения персонажа на разных этапах истории. Бенчмарк построен на основе 17 романов и включает 80 главных персонажей с разбиением на фазы психологического развития. Экспериментальные результаты показывают, что обусловливание информацией о характере персонажа значительно превосходит другие стратегии контекстуализации, особенно для сценариев за пределами исходного текста.'}, 'en': {'title': 'Evolving Characters: The Key to Dynamic Role-Playing Agents', 'desc': 'This paper discusses the need for role-playing language agents (RPLAs) to develop characters that evolve over time, reflecting changes in values and behaviors as narratives progress. It introduces ArcANE, a new benchmark designed to evaluate how well these agents align with the psychological trajectories of characters rather than just recalling facts. The benchmark includes 17 novels and 80 characters, assessing responses to scenarios that may not be explicitly covered in the source material. The results show that conditioning models on character arc information significantly improves performance, especially in novel situations, highlighting the importance of dynamic character development in RPLAs.'}, 'zh': {'title': '动态角色发展，超越静态记忆', 'desc': '角色扮演语言代理（RPLA）需要在叙事中动态发展角色，以便角色的价值观和行为随着故事的进展而演变。现有的评估基准主要关注事实回忆，而不是角色的心理轨迹是否一致。我们提出了ArcANE（角色弧意识叙事评估），这是一个自动构建的基准，涵盖17部小说和80个主要角色。通过对角色弧的条件化，ArcANE在所有模型和上下文策略中表现优异，尤其是在源文本未涉及的情境中。'}}}, {'id': 'https://huggingface.co/papers/2606.04743', 'title': 'TIDE: Proactive Multi-Problem Discovery via Template-Guided Iteration', 'url': 'https://huggingface.co/papers/2606.04743', 'abstract': 'Abstract TIDE is a template-guided iterative framework for discovering hidden problems from context, using iterative discovery and thought templates to improve problem identification and resolution across document and code environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agents are widely deployed as assistants over documents, tools, and code. However, they typically act only on explicit user requests, which surface only the problems the user has noticed, while many other important problems coexist, hidden in plain sight, within the broader user context, with their total number unknown in advance. We frame this as the task of discovering multiple hidden problems from context, in which coexisting problems should be uncovered, grounded in supporting evidence, and paired with concrete actions. To this end, we introduce TIDE, a template-guided iterative framework with two complementary mechanisms. Specifically, motivated by the observation that single-pass prediction anchors on the most salient cases and yields generic claims, we propose iterative discovery, which surfaces a small batch of candidates per round while conditioning on what has already been found, so subsequent rounds extend coverage; and thought templates, reusable schemas distilled from previously solved cases that specify what contextual signals to attend to and how to connect them, anchoring each prediction in a recognizable problem class. We validate TIDE on two realistic settings, personal workspaces and software repositories, across four model backbones, showing substantial gains over single-shot and parallel multi-agent baselines on task coverage, identification, and resolution.', 'score': 36, 'issue_id': 2376, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'ffae835f407317d7', 'authors': ['Soyeong Jeong', 'Jinheon Baek', 'Minki Kang', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2606.04743.jpg', 'data': {'categories': ['#agents', '#plp'], 'emoji': '🔍', 'ru': {'title': 'Итеративное обнаружение скрытых проблем через шаблоны мышления', 'desc': 'TIDE — это шаблонный итеративный фреймворк для обнаружения скрытых проблем в контексте документов и кода. Метод использует итеративное открытие проблем, где каждый раунд находит новые кандидаты, обусловленные уже найденными случаями, что позволяет расширить охват. Авторы предлагают использовать шаблоны мышления — переиспользуемые схемы, извлеченные из ранее решённых задач, которые указывают, на какие сигналы контекста обращать внимание. Эксперименты на личных рабочих пространствах и программных репозиториях показывают значительное улучшение по сравнению с однопроходными и параллельными мультиагентными подходами.'}, 'en': {'title': 'Uncovering Hidden Problems with TIDE: Iterative Discovery and Thought Templates', 'desc': 'TIDE is a framework designed to uncover hidden problems in documents and code by using an iterative approach and thought templates. It addresses the limitation of traditional assistants that only respond to explicit user requests, which can miss many underlying issues. By employing iterative discovery, TIDE generates a series of problem candidates in rounds, building on previous findings to enhance problem coverage. The use of thought templates helps to focus on relevant contextual signals, ensuring that each identified problem is grounded in evidence and linked to actionable solutions.'}, 'zh': {'title': 'TIDE：揭示隐藏问题的智能框架', 'desc': 'TIDE是一个基于模板的迭代框架，旨在从上下文中发现隐藏的问题。它通过迭代发现和思维模板来提高问题识别和解决的效率，适用于文档和代码环境。该框架能够揭示共存的隐藏问题，并为每个问题提供具体的解决方案。通过在个人工作空间和软件库中的验证，TIDE在任务覆盖率、识别和解决方面表现出显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2606.05622', 'title': 'AdaPlanBench: Evaluating Adaptive Planning in Large Language Model Agents under World and User Constraints', 'url': 'https://huggingface.co/papers/2606.05622', 'abstract': "Abstract AdaPlanBench presents a dynamic interactive benchmark for evaluating LLM agents' ability to adaptively plan under progressively revealed world and user constraints through multi-turn interactions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Planning for real-world problems by language models often involves both world and user constraints, which may not be fully specified upfront and are progressively disclosed through interaction. However, existing benchmarks still underexplore adaptive planning under such progressively revealed dual constraints. To address this gap, we introduce AdaPlanBench, a dynamic interactive benchmark for evaluating whether Large Language Model (LLM) agents can adaptively plan and re-plan under progressively revealed world and user constraints. AdaPlanBench is built on 307 household tasks, with a scalable constraint construction pipeline that augments each task with dual constraints. At runtime, agents interact with the environment in a multi-turn protocol where hidden constraints are revealed only when the agent proposes a plan that violates them, requiring iterative plan revision under accumulating feedback. This makes planning challenging, as agents must infer and track constraints from feedback while re-planning effectively. Experiments on ten leading LLMs show that adaptive planning under dual constraints remains challenging, with the best model reaching only 67.75% accuracy. We further observe that performance degrades as more constraints accumulate, with user constraints posing a particularly large challenge and failures often stemming from weaker physical grounding and reduced effectiveness. These results establish AdaPlanBench as a testbed for dual-constrained interactive planning and highlight the challenge of reliable adaptation to dynamically revealed constraints in LLM agents.", 'score': 32, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'ddc0b845f6b3a171', 'authors': ['Jiayu Liu', 'Cheng Qian', 'Zhenhailong Wang', 'Bingxuan Li', 'Jiateng Liu', 'Heng Wang', 'Jeonghwan Kim', 'Yumeng Wang', 'Xiusi Chen', 'Yi R. Fung', 'Heng Ji'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.05622.jpg', 'data': {'categories': ['#agents', '#benchmark', '#open_source', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Адаптивное планирование под неизвестные ограничения: вызов для больших языковых моделей', 'desc': 'Статья представляет AdaPlanBench — динамический интерактивный бенчмарк для оценки способности LLM агентов адаптивно планировать под постепенно раскрываемые ограничения окружающего мира и предпочтения пользователя. Бенчмарк построен на 307 бытовых задачах с двойными ограничениями, которые раскрываются в процессе многошагового взаимодействия агента с окружением: скрытые ограничения становятся известны только при нарушении плана. Экспериментальные результаты показывают, что даже лучшие LLM достигают только 67,75% точности при адаптивном планировании, при этом производительность снижается с накоплением ограничений. Исследование выявило, что пользовательские ограничения особенно сложны для моделей, а основные ошибки связаны с недостаточным физическим осознанием и неэффективной переплани́ровкой.'}, 'en': {'title': 'Adaptive Planning Under Revealed Constraints', 'desc': 'AdaPlanBench is a new benchmark designed to test how well Large Language Model (LLM) agents can adapt their planning strategies when faced with constraints that are revealed over time. It focuses on real-world tasks where both world and user constraints are not fully known at the start and must be discovered through interaction. The benchmark involves a multi-turn process where agents must revise their plans based on feedback about hidden constraints, making the planning process more complex. Experiments show that even the best LLMs struggle with this adaptive planning, especially as the number of constraints increases, highlighting the need for better models that can handle dynamic environments.'}, 'zh': {'title': '动态约束下的自适应规划挑战', 'desc': 'AdaPlanBench是一个动态交互基准，用于评估大型语言模型（LLM）代理在逐步揭示的世界和用户约束下的自适应规划能力。该基准基于307个家庭任务，构建了一个可扩展的约束构建管道，为每个任务增加了双重约束。在运行时，代理通过多轮交互与环境互动，只有在代理提出的计划违反约束时，隐藏的约束才会被揭示，这要求代理在不断反馈下进行迭代计划修订。实验结果表明，在双重约束下的自适应规划仍然具有挑战性，最佳模型的准确率仅为67.75%。'}}}, {'id': 'https://huggingface.co/papers/2606.05259', 'title': 'VideoKR: Towards Knowledge- and Reasoning-Intensive Video Understanding', 'url': 'https://huggingface.co/papers/2606.05259', 'abstract': 'Abstract VideoKR presents a large-scale video reasoning dataset and benchmark designed to enhance knowledge-intensive video understanding through expert-domain content and human-in-the-loop example generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce VideoKR, the first large-scale training corpus specifically designed to strengthen knowledge- and reasoning-intensive video understanding. It comprises 315K video reasoning examples over 145K newly collected, CC-licensed, expert-domain videos. We develop a human-in-the-loop, skill-oriented example generation pipeline that targets progressively deeper video reasoning capabilities while ensuring the difficulty, diversity, and reliability of both the examples and their CoT rationales. We also curate VideoKR-Eval, a new expert-annotated benchmark where questions require genuine video understanding and knowledge-intensive reasoning rather than textual shortcuts. Our experiments show that, under a standard SFTrightarrowGRPO pipeline, models post-trained on VideoKR outperform prior post-training approaches on knowledge-intensive video reasoning while remaining competitive on general video reasoning, highlighting data design as a key driver of progress in video reasoning. We further conduct comprehensive ablations to isolate the contributions of VideoKR, providing actionable insights for future work.', 'score': 31, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '563aa46945d306ab', 'authors': ['Lin Fu', 'Zheyuan Yang', 'Yang Wang', 'Tingyu Song', 'Arman Cohan', 'Yilun Zhao'], 'affiliations': ['Tongji University, Shanghai, China', 'University of Chinese Academy of Sciences, Beijing, China', 'Yale University, New Haven, CT, USA', 'Zhejiang University, Hangzhou, Zhejiang, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.05259.jpg', 'data': {'categories': ['#video', '#multimodal', '#benchmark', '#training', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Качественные данные как ключ к прогрессу в видеорассуждениях', 'desc': 'В работе представлен VideoKR — первый крупномасштабный набор данных для обучения моделей глубокому пониманию видеоконтента с использованием знаний и рассуждений. Датасет содержит 315K примеров рассуждений на основе 145K видео от экспертов, созданных с применением методологии human-in-the-loop для обеспечения высокого качества. Авторы разработали pipeline генерации примеров, ориентированный на постепенное усложнение задач рассуждения, с гарантией разнообразия и надежности как самих примеров, так и цепочек мышления (CoT). Эксперименты показывают, что модели, дообученные на VideoKR используя SFT и GRPO, значительно превосходят существующие подходы в задачах интенсивного рассуждения о видеоконтенте.'}, 'en': {'title': 'Enhancing Video Understanding with Knowledge-Driven Reasoning', 'desc': 'VideoKR is a large-scale dataset aimed at improving video reasoning by focusing on knowledge-intensive understanding. It includes 315,000 examples derived from 145,000 expert-domain videos, created through a human-in-the-loop process to ensure high quality and diversity. The dataset is designed to challenge models with complex reasoning tasks that require genuine understanding of video content. Experiments show that models trained on VideoKR significantly outperform previous methods in knowledge-intensive video reasoning, emphasizing the importance of well-structured data in advancing this field.'}, 'zh': {'title': '增强视频理解的知识推理数据集', 'desc': 'VideoKR是一个大规模的视频推理数据集，旨在通过专家领域内容和人机协作生成示例来增强知识密集型视频理解。该数据集包含315,000个视频推理示例，基于145,000个新收集的、具有CC许可的专家领域视频。我们开发了一种人机协作的示例生成管道，旨在逐步提升视频推理能力，同时确保示例及其推理的难度、多样性和可靠性。实验结果表明，在标准的SFTrightarrowGRPO管道下，基于VideoKR进行后训练的模型在知识密集型视频推理上优于之前的后训练方法，同时在一般视频推理上也保持竞争力，突显了数据设计在视频推理进展中的关键作用。'}}}, {'id': 'https://huggingface.co/papers/2606.06428', 'title': 'Reinforcement Learning Elicits Contextual Learning of Unseen Language Translation', 'url': 'https://huggingface.co/papers/2606.06428', 'abstract': 'Abstract Reinforcement learning approach enables large language models to translate unseen languages by leveraging in-context linguistic knowledge rather than memorizing specific languages.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Prior work has shown that large language models (LLMs) can translate unseen or low-resource languages by undergoing continued training or even by encoding a grammar book in their context. However, both methods typically overfit specific languages, with limited zero-shot transfer at test time. To translate extremely low-resource languages at scale, we argue that LLMs must acquire the meta-skill of utilizing in-context linguistic knowledge rather than memorizing specific languages. In this paper, we propose a reinforcement learning (RL) approach to unseen language translation given rich linguistic context, using a surface-level translation metric (chrF) as the reward. Empirically, despite the lightweight reward, our RL-trained models effectively extract and apply relevant linguistic information from the provided context, leading to better translations on completely unseen languages than in-context learning or supervised fine-tuning. Our analyses suggest that outcome-based RL can extend beyond conventional reasoning tasks like math and coding to serve as a recipe for language learning from context.', 'score': 23, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '0da1051f81a9a0fb', 'authors': ['Hanxu Hu', 'Zdeněk Šnajdr', 'Pinzhen Chen', 'Jannis Vamvas', 'Rico Sennrich'], 'affiliations': ['ETH Zurich', 'Queens University Belfast', 'University of Zurich'], 'pdf_title_img': 'assets/pdf/title_img/2606.06428.jpg', 'data': {'categories': ['#reasoning', '#rl', '#machine_translation', '#transfer_learning', '#low_resource', '#multilingual'], 'emoji': '🌍', 'ru': {'title': 'Учимся переводить неизвестные языки через контекстное понимание', 'desc': 'В статье предлагается подход на основе обучения с подкреплением для перевода невиданных языков большими языковыми моделями. Вместо запоминания конкретных языков, модели обучаются извлекать и применять лингвистическую информацию из контекста, используя метрику chrF в качестве сигнала награды. Экспериментально показано, что RL-обученные модели эффективнее справляются с переводом языков с очень ограниченными ресурсами в сравнении с обучением в контексте и контролируемой дообучением. Результаты демонстрируют, что обучение с подкреплением на основе результатов может быть применено не только к задачам рассуждения, но и к изучению языков из контекста.'}, 'en': {'title': 'Empowering Language Models with Reinforcement Learning for Unseen Language Translation', 'desc': 'This paper presents a reinforcement learning (RL) approach to improve the translation of unseen languages using large language models (LLMs). Instead of memorizing specific languages, the models learn to utilize in-context linguistic knowledge, which enhances their ability to translate low-resource languages effectively. The authors demonstrate that using a surface-level translation metric as a reward allows the models to extract relevant linguistic information from context, resulting in superior translations compared to traditional methods. This research suggests that RL can be a powerful tool for language learning, extending its application beyond typical reasoning tasks.'}, 'zh': {'title': '利用上下文知识提升未见语言翻译能力', 'desc': '这篇论文探讨了强化学习在大型语言模型（LLMs）翻译未见语言中的应用。研究表明，LLMs可以通过利用上下文中的语言知识，而不是单纯记忆特定语言，来实现更好的翻译效果。作者提出了一种基于强化学习的方法，使用表面翻译指标（chrF）作为奖励，来优化翻译质量。实验结果显示，经过强化学习训练的模型在翻译完全未见的语言时，表现优于传统的上下文学习或监督微调方法。'}}}, {'id': 'https://huggingface.co/papers/2606.03312', 'title': 'RobotValues: Evaluating Household Robots When Human Values Conflict', 'url': 'https://huggingface.co/papers/2606.03312', 'abstract': "Abstract RobotValues benchmark evaluates household robot planners in value-conflict scenarios, revealing that vision-language models exhibit default value preferences and struggle to override them when instructed to prioritize conflicting values.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While household robots are often evaluated based on task completion, everyday domestic environments involve value-conflicting situations in which robots are expected to choose actions that prioritize other values than task success, such as human autonomy, efficiency, or social appropriateness. Yet, there are no benchmarks for evaluating robots' value preferences in such scenarios. We introduce RobotValues, a benchmark to evaluate household robot planners in 10K value-conflict scenarios. Each instance consists of a realistic household image with multiple plausible robot actions that prioritize different human values. We construct RobotValues through LLM-assisted scenario generation, stakeholder-grounded value extraction, image generation and automatic quality control. Using RobotValues we evaluate VLMs used in robotics and find that models exhibit default value preferences, including safety and accommodation, while underselecting privacy-prioritizing actions. When the models are instructed to prioritize specific values that conflict with their own preferences, they often fail to override their default actions, choosing incorrect actions for 80% of the time. These findings suggest that household robot evaluation should measure not only task completion or safety compliance, but also whether robots can choose among plausible actions when human values conflict.", 'score': 22, 'issue_id': 2376, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'a61a902a9ec748cf', 'authors': ['Jongwook Han', 'Hyeongjin Kim', 'Yohan Jo'], 'affiliations': ['Graduate School of Data Science, Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03312.jpg', 'data': {'categories': ['#benchmark', '#alignment', '#dataset', '#multimodal', '#robotics', '#ethics', '#open_source', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Роботы должны уважать ценности, а не только выполнять задачи', 'desc': 'В статье представлен бенчмарк RobotValues для оценки планировщиков домашних роботов в сценариях с конфликтующими ценностями. Исследователи создали набор из 10 тысяч сценариев с реалистичными изображениями кухни, где каждое действие робота отражает разные человеческие ценности. С помощью LLM были сгенерированы сценарии и проведена автоматическая проверка качества. Анализ показал, что видео-языковые модели имеют встроенные предпочтения (безопасность, помощь) и в 80% случаев не могут переопределить свои решения при инструкциях приоритизировать конфликтующие ценности.'}, 'en': {'title': 'Evaluating Robots Beyond Tasks: The Value Conflict Challenge', 'desc': 'The paper introduces the RobotValues benchmark, which assesses household robot planners in scenarios where different human values conflict. It highlights that current vision-language models (VLMs) tend to have default value preferences, such as prioritizing safety and accommodation, but struggle to adapt when instructed to prioritize conflicting values like privacy. The benchmark consists of 10,000 scenarios that present realistic household images with various actions that reflect different human values. The findings indicate that robots often fail to override their default preferences, making incorrect choices 80% of the time when faced with value conflicts, suggesting a need for more comprehensive evaluation metrics in robotic systems.'}, 'zh': {'title': '评估家庭机器人价值选择能力的新基准', 'desc': 'RobotValues基准测试评估家庭机器人在价值冲突场景中的规划能力。研究发现，视觉语言模型在面对价值冲突时，往往表现出默认的价值偏好，并且在被指示优先考虑冲突价值时，难以覆盖这些偏好。该基准通过生成真实的家庭图像和多种可能的机器人行动，构建了10,000个价值冲突场景。结果表明，家庭机器人评估不仅应关注任务完成或安全合规，还应考虑机器人在面对人类价值冲突时的选择能力。'}}}, {'id': 'https://huggingface.co/papers/2606.05275', 'title': 'Personal AI Agent for Camera Roll VQA', 'url': 'https://huggingface.co/papers/2606.05275', 'abstract': "Abstract A conversational AI agent is developed for personal camera roll visual question answering, featuring hierarchical memory and specialized tools for navigating large visual datasets with personalized content.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We study the personal camera roll visual question answering setting. In this setting, a conversational AI assistant can access a user's personal camera roll and retrieve relevant photos to answer queries, ranging from simple factual questions (e.g., ``Name of the food I tried yesterday?'') to more open-ended ones (e.g., ``Recommend some dishes I have never eaten before''). Given the vast nature of the personal camera roll (i.e., multiple years, hundreds to thousands of photos), a successful AI assistant needs to understand a long-horizon, highly personalized visual content stream in order to navigate and locate the correct and/or relevant information. To support this, we collect and manually annotate questions that mimic real-world usage. The final dataset, camroll, contains 50 users, 31,476 images, and 2,500 QA pairs. We further design camroll-agent, a conversational AI agent equipped with hierarchical memory and a minimal set of tools for efficient navigation over large, personalized visual memory. Experimental results show that camroll-agent outperforms numerous baselines and methods for long-context understanding AI agents system. Together, the camroll dataset and camroll-agent highlight the gap in AI agents' long-context reasoning: personalized visual memory requires different approaches from standard long-context textual memory, especially when consistency, visual details, and user-specific context are present.", 'score': 17, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '34f924e13505969a', 'authors': ['Thao Nguyen', 'Krishna Kumar Singh', 'Donghyun Kim', 'Yong Jae Lee', 'Yuheng Li'], 'affiliations': ['Adobe Research', 'Korea University', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.05275.jpg', 'data': {'categories': ['#long_context', '#reasoning'], 'emoji': '📸', 'ru': {'title': 'Персонализированное понимание визуальной памяти через иерархическое структурирование и долгосрочный контекст', 'desc': 'В работе предлагается conversational AI агент для ответа на вопросы о личной фотогалерее пользователя. Агент использует иерархическую память и специализированные инструменты для эффективной навигации по большим наборам персонализированных изображений. Авторы создали датасет камroll с 31 476 изображениями и 2 500 парами вопрос-ответ от 50 пользователей, отражающими реальные сценарии использования. Результаты показывают, что предложенный агент превосходит базовые подходы при работе с долгосрочным контекстом и демонстрирует необходимость специальных методов для персонализированной визуальной памяти, отличающихся от стандартных подходов работы с текстовыми данными.'}, 'en': {'title': 'Revolutionizing Personal Photo Queries with AI', 'desc': "This paper presents a conversational AI agent designed for answering questions about a user's personal camera roll, which is a collection of their photos. The agent utilizes hierarchical memory to efficiently navigate through large datasets of personalized images, allowing it to respond to both specific and open-ended queries. A new dataset called camroll was created, containing thousands of images and annotated questions to train and evaluate the AI's performance. The results demonstrate that the camroll-agent significantly improves long-context understanding in visual memory compared to existing methods, emphasizing the need for tailored approaches in handling personalized visual data."}, 'zh': {'title': '个性化视觉问答的智能助手', 'desc': '本文介绍了一种用于个人相册视觉问答的对话式人工智能代理。该代理具备层次化记忆和专门工具，能够在庞大的个性化视觉数据集中进行导航。研究表明，成功的AI助手需要理解长期的、个性化的视觉内容流，以便准确定位相关信息。通过收集和手动标注问题，最终构建了包含50个用户、31,476张图片和2,500个问答对的数据集，展示了个性化视觉记忆与标准文本记忆在长上下文推理中的不同需求。'}}}, {'id': 'https://huggingface.co/papers/2606.06042', 'title': 'LoomVideo: Unifying Multimodal Inputs into Video Generation and Editing', 'url': 'https://huggingface.co/papers/2606.06042', 'abstract': 'Abstract LoomVideo presents an efficient 5B-parameter unified architecture for video generation and editing that reduces computational overhead through novel conditioning mechanisms and multi-modal alignment techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Developing unified video generation and editing models capable of interpreting interleaved multimodal inputs is a promising yet challenging frontier field. Existing unified frameworks predominantly rely on massive models (typically 13B parameters or more) and incorporate source video conditions for editing by concatenating sequence tokens. This concatenation inevitably doubles the sequence length, quadrupling the computational complexity of the self-attention mechanism and introducing prohibitive overhead. To address these bottlenecks, we present LoomVideo, a highly efficient 5B-parameter unified architecture for both video generation and editing. LoomVideo replaces the standard text encoder with a Multimodal Large Language Model (MLLM) and employs Deepstack injection mechanism to align multi-layer MLLM features with the Diffusion Transformer (DiT). Crucially, we introduce a zero-overhead Scale-and-Add conditioning approach for video editing. By scaling and directly adding the clean source video latent to the noised target latent, this elegant design eliminates the need for token concatenation, drastically reducing computational cost while maintaining robust capabilities for complex, non-rigid edits. Furthermore, a Negative Temporal RoPE strategy is seamlessly integrated to handle multiple reference images. Extensive experiments demonstrate that our compact 5B model achieves state-of-the-art or highly competitive performance across comprehensive benchmarks, exhibiting exceptional superiority in e-commerce and fashion generation scenarios. Benefiting from the zero-overhead conditioning mechanism, LoomVideo achieves at least a 5.41x acceleration in inference speed compared to models of similar capabilities, paving the way for highly practical and efficient video foundation models.', 'score': 16, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '579845e4b6dbc41c', 'authors': ['Jianzong Wu', 'Hao Lian', 'Jiongfan Yang', 'Dachao Hao', 'Ye Tian', 'Yunhai Tong', 'Jingyuan Zhu', 'Biaolong Chen', 'Qiaosong Qi', 'Aixi Zhang', 'Wanggui He', 'Mushui Liu', 'Jinlong Liu', 'Hao Jiang'], 'affiliations': ['Alibaba Group', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06042.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#video', '#inference', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Эффективная унификация: генерация и редактирование видео без вычислительных потерь', 'desc': 'LoomVideo представляет компактную архитектуру с 5 миллиардами параметров для унифицированной генерации и редактирования видео. Модель использует многомодальную большую языковую модель (MLLM) вместо стандартного текстового кодировщика и применяет механизм Deepstack для выравнивания признаков MLLM с диффузионным трансформатором (DiT). Ключевая инновация — подход Scale-and-Add для кондиционирования видео при редактировании, который избегает конкатенации токенов и снижает вычислительные затраты в четыре раза. Модель достигает лучших или конкурентных результатов на бенчмарках и обеспечивает ускорение вывода минимум в 5.41 раза по сравнению с аналогичными моделями.'}, 'en': {'title': 'Efficient Video Generation and Editing with LoomVideo', 'desc': 'LoomVideo introduces a compact 5B-parameter architecture for video generation and editing, significantly reducing computational demands. It utilizes innovative conditioning mechanisms and multi-modal alignment techniques to enhance performance without the need for large models. By implementing a zero-overhead Scale-and-Add conditioning approach, LoomVideo avoids the computational burden of token concatenation, allowing for efficient processing of complex edits. The model demonstrates state-of-the-art performance in various benchmarks, particularly in e-commerce and fashion, while achieving a remarkable acceleration in inference speed.'}, 'zh': {'title': '高效视频生成与编辑的未来', 'desc': 'LoomVideo是一种高效的5B参数统一架构，专注于视频生成和编辑。它通过新颖的条件机制和多模态对齐技术，显著降低了计算开销。与传统的庞大模型相比，LoomVideo采用了多模态大语言模型，并引入了零开销的Scale-and-Add条件方法，避免了序列连接带来的复杂性。实验表明，该模型在电商和时尚生成场景中表现出色，推理速度比同类模型快至少5.41倍。'}}}, {'id': 'https://huggingface.co/papers/2606.06477', 'title': 'Complexity-Balanced Diffusion Splitting', 'url': 'https://huggingface.co/papers/2606.06477', 'abstract': "Abstract Complexity-Balanced Splitting (CBS) allocates generative capacity across specialized sub-networks by partitioning the diffusion timeline based on local complexity measures, improving synthesis quality without increasing inference cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Standard continuous-time generative models rely on monolithic architectures that must navigate vastly different signal regimes, from isotropic noise to intricate data distributions. While scaling model capacity improves performance, deploying a massive network uniformly across the entire generative timeline is inherently inefficient. In this work, we propose Complexity-Balanced Splitting (CBS), a principled framework for temporal capacity allocation that distributes the generative workload across multiple specialized sub-networks. Grounded in function approximation theory and de Boor's equidistribution principle, CBS partitions the diffusion timeline into segments of equal approximation burden, allocating more representational capacity to regions where the generative dynamics are more difficult to model. To estimate this local complexity, we introduce two complementary and tractable monitor functions: a spatial measure based on the flow's Dirichlet energy, and a geometric measure based on the acceleration of the sampling trajectories. Using a lightweight auxiliary model to estimate these complexity profiles, our approach eliminates the need for heuristic temporal splits or computationally expensive search procedures. Extensive evaluation across multiple architectures (SiT, JiT, and UNet) and datasets demonstrates that CBS consistently improves synthesis quality without increasing per-step inference cost. In particular, CBS improves FID by ~35% on SiT-XL with CFG relative to naive temporal partitioning. Project page is available at https://noamissachar.github.io/CBS/.", 'score': 15, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '7580355799e7aff0', 'authors': ['Noam Issachar', 'Dani Lischinski', 'Raanan Fattal'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.06477.jpg', 'data': {'categories': ['#optimization', '#diffusion'], 'emoji': '⚖️', 'ru': {'title': 'Балансировка вычислительных ресурсов по сложности в диффузионных моделях', 'desc': 'В работе предложен метод Complexity-Balanced Splitting (CBS) для оптимального распределения вычислительной мощности генеративной модели диффузии во времени. Вместо использования одной монолитной архитектуры на всех этапах генерации, метод разбивает временную шкалу диффузии на сегменты на основе локальных мер сложности сигнала. Для оценки сложности в каждый момент времени используются два дополнительных монитор-функции: пространственная мера на основе энергии Дирихле потока и геометрическая мера на основе ускорения траекторий сэмплирования. Экспериментальные результаты показывают, что CBS улучшает качество синтеза (на ~35% по метрике FID) без увеличения вычислительных затрат на шаг.'}, 'en': {'title': 'Efficient Generative Modeling with Complexity-Balanced Splitting', 'desc': 'The paper introduces Complexity-Balanced Splitting (CBS), a method that enhances generative model performance by efficiently distributing the workload across specialized sub-networks. It does this by analyzing the complexity of different segments in the diffusion timeline, allowing more resources to be allocated where the data is harder to model. CBS uses two innovative monitor functions to assess local complexity, which helps in making informed decisions about how to split the generative tasks. The results show that CBS significantly improves synthesis quality, achieving a notable reduction in FID scores without increasing inference costs.'}, 'zh': {'title': '复杂性平衡，提升生成质量！', 'desc': '复杂性平衡分割（CBS）是一种通过根据局部复杂性度量划分扩散时间线来分配生成能力的框架。它将生成工作负载分配到多个专门的子网络中，从而提高合成质量而不增加推理成本。CBS基于函数逼近理论和de Boor的均匀分布原理，将扩散时间线划分为相等的逼近负担段，并在生成动态更难建模的区域分配更多的表示能力。通过使用轻量级辅助模型来估计复杂性特征，CBS消除了对启发式时间划分或计算密集型搜索过程的需求。'}}}, {'id': 'https://huggingface.co/papers/2606.04703', 'title': 'Rethinking Continual Experience Internalization for Self-Evolving LLM Agents', 'url': 'https://huggingface.co/papers/2606.04703', 'abstract': 'Abstract Experience internalization enables continual learning in large language models by converting past interactions into reusable capabilities, with key findings on experience granularity, injection patterns, and internalization regimes for stable learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Experience internalization converts contextual experience from past interactions into reusable parametric capability, offering a promising path toward continual learning in large language models (LLMs). While prior work has predominantly focused on single-iteration transfer, we discover that under multi-iteration experience learning, existing methods suffer from a progressive capability collapse rather than compounding improvement. We systematically examine this failure through three vital dimensions of experience internalization: (1) Experience Granularity: We find that principle-level experience is more durable than instance-level experience, as it effectively abstracts transferable strategies away from trajectory-specific details. (2) Experience Injection Pattern: Our analysis reveals that step-wise injection significantly outperforms global injection by aligning experience with intermediate decision states, a property that is critical for long-horizon tool use. (3) Internalization Regime: We demonstrate that off-policy context-distillation on high-quality teacher trajectories provides a substantially more stable training signal than on-policy context-distillation, which is inherently limited by local corrections on student-induced flawed states. Together, these insights yield a simple yet robust recipe for stable and sustainable experience internalization, providing concrete guidance for engineering self-evolving and continually learning LLMs.', 'score': 15, 'issue_id': 2376, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '346f4effc2f4d3be', 'authors': ['Jingwen Chen', 'Wenkai Yang', 'Shengda Fan', 'Wenbo Nie', 'Chenxing Sun', 'Shaodong Zheng', 'Yangen Hu', 'Lu Pan', 'Ke Zeng', 'Yankai Lin'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Meituan', 'School of Software, Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.04703.jpg', 'data': {'categories': ['#training', '#optimization', '#rlhf', '#transfer_learning'], 'emoji': '🧠', 'ru': {'title': 'Стабильная интернализация опыта для континуального обучения языковых моделей', 'desc': 'Работа исследует интернализацию опыта в больших языковых моделях (LLM), позволяющую преобразовывать прошлые взаимодействия в переиспользуемые параметрические способности для континуального обучения. Авторы выявили, что при многократном обучении на опыте существующие методы страдают от прогрессивного коллапса способностей вместо накопления улучшений. Исследование систематически анализирует три ключевых аспекта: гранулярность опыта (принципиально-уровневый опыт долговечнее, чем опыт конкретных примеров), паттерны инъекции (пошаговая инъекция эффективнее глобальной) и режимы интернализации (внеполитическая контекстная дистилляция на качественных траекториях учителя стабильнее). Результаты исследования предоставляют практическое руководство для создания саморазвивающихся и континуально обучающихся LLM.'}, 'en': {'title': 'Transforming Past Interactions into Future Skills for LLMs', 'desc': "This paper discusses a method called experience internalization, which helps large language models (LLMs) learn continuously by turning past interactions into reusable skills. The authors found that learning from broader principles (experience granularity) is more effective than focusing on specific instances, as it allows for better generalization. They also discovered that injecting experiences step-by-step is more beneficial than doing it all at once, as it aligns better with the model's decision-making process. Lastly, they show that using high-quality examples from experienced models (off-policy context-distillation) leads to more stable learning compared to relying on the model's own recent experiences (on-policy context-distillation)."}, 'zh': {'title': '经验内化：大型语言模型的持续学习之道', 'desc': '这篇论文探讨了如何通过经验内化来实现大型语言模型的持续学习。研究发现，经验的粒度、注入模式和内化机制对学习的稳定性至关重要。具体来说，原则级的经验比实例级的经验更持久，逐步注入的方式优于全局注入。最后，使用高质量教师轨迹的离策略上下文蒸馏能提供更稳定的训练信号，从而促进模型的自我演化和持续学习。'}}}, {'id': 'https://huggingface.co/papers/2606.04811', 'title': 'Dream.exe: Can Video Generation Models Dream Executable Robot Manipulation?', 'url': 'https://huggingface.co/papers/2606.04811', 'abstract': 'Abstract Video generation models were evaluated through robotic manipulation tasks to assess their ability to reflect physical reality, revealing that visual quality does not predict executable motion accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generation models have made impressive strides in synthesizing visually compelling content, yet their outputs remain confined to the virtual domain. A natural question follows: how well do these models reflect the physical world when their generated videos leave the screen and enter reality? We propose robotic manipulation as a concrete, measurable window onto this question: if a model has truly internalized physical laws, the motion it depicts should translate into executable robot behavior. We introduce Dream.exe, an evaluation framework that operationalizes this criterion through a video-to-execution pipeline. Given a scene image and a task description, Dream.exe synthesizes a manipulation video, converts the generated motion into robot trajectories, and executes them in a physics simulator, yielding a grounding signal that purely visual metrics cannot offer. Using this pipeline, we evaluate 8 models spanning frontier closed-source generators, open-source generators, and robot-specific models. Our benchmark covers 101 manually curated manipulation tasks at three levels of physical complexity, measured across visual quality, trajectory fidelity, and execution success. Encouragingly, several models achieve measurable execution success, suggesting that generative priors learned from internet-scale data already encode meaningful physical knowledge. Yet visual quality proves a poor predictor of executability, exposing a dimension of model capability that standard visual evaluations do not capture. Dream.exe will be open-sourced at https://github.com/showlab/Dream.exe.', 'score': 12, 'issue_id': 2377, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'bc68daa95f81b5f2', 'authors': ['Rui Zhao', 'Kaiming Yang', 'Jifeng Zhu', 'Siyang Chen', 'Ziqi Wang', 'Weijia Wu', 'Kevin Qinghong Lin', 'Heng Wang', 'Mike Zheng Shou'], 'affiliations': ['Institute 1', 'Institute 2', 'Institute 3'], 'pdf_title_img': 'assets/pdf/title_img/2606.04811.jpg', 'data': {'categories': ['#robotics', '#open_source', '#benchmark', '#video', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Красивое видео ≠ реалистичное движение робота', 'desc': 'В работе предложена новая методология оценки моделей генерации видео через призму робототехники: авторы проверяют, насколько хорошо сгенерированные видео отражают физические законы реального мира. Для этого создан фреймворк Dream.exe, который преобразует видео в траектории движения робота и выполняет их в физическом симуляторе, получая объективный сигнал качества. Исследованы 8 современных генеративных моделей на наборе из 101 задачи манипулирования объектами, измеряемых по визуальному качеству, точности траекторий и успеху выполнения. Главное открытие: визуальное качество сгенерированного видео не предсказывает успех физического выполнения движений роботом, что показывает существование скрытого аспекта способностей моделей.'}, 'en': {'title': 'From Pixels to Actions: Evaluating Video Models in the Real World', 'desc': 'This paper evaluates video generation models by testing their ability to perform robotic manipulation tasks, revealing that high visual quality does not guarantee accurate motion execution. The authors introduce Dream.exe, a framework that connects generated videos to real-world robot actions, allowing for a practical assessment of how well these models understand physical laws. By synthesizing manipulation videos and translating them into robot trajectories, the framework provides a unique measure of performance that goes beyond traditional visual metrics. The study finds that while some models demonstrate successful execution, visual appeal alone is not a reliable indicator of their practical applicability in real-world scenarios.'}, 'zh': {'title': '视频生成与物理现实的桥梁', 'desc': '本论文评估了视频生成模型在机器人操作任务中的表现，以检验其反映物理现实的能力。研究发现，视觉质量并不能预测可执行的运动准确性。我们提出了Dream.exe评估框架，通过视频到执行的管道，将生成的运动转化为机器人轨迹，并在物理模拟器中执行。结果表明，尽管一些模型在执行成功率上表现良好，但视觉质量与可执行性之间的关系较弱，揭示了模型能力的一个新维度。'}}}, {'id': 'https://huggingface.co/papers/2606.02956', 'title': 'The Road Ahead in Autonomous Driving: The KITScenes Multimodal Dataset', 'url': 'https://huggingface.co/papers/2606.02956', 'abstract': 'Abstract KITScenes Multimodal dataset provides high-fidelity European driving data with comprehensive 3D maps and diverse urban environments for embodied AI research.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing autonomous driving datasets have enabled major progress, but fall short in sensor fidelity, map completeness, or geographic diversity. We present KITScenes Multimodal, a European dataset built around high-fidelity sensors and maps. Our fully synchronized sensor suite combines high-resolution global-shutter cameras, long-range lidar beyond 400m, 4D imaging radar, and redundant GNSS/INS localization. Our HD maps are, to our knowledge, the most complete of any sensor dataset, validated through autonomous driving trials on open-source software. For the first time in a public dataset, all driving-relevant traffic elements, such as traffic lights, are mapped in 3D to a reprojection-accurate level with full topological connectivity. Recorded in cities with irregular street layouts and mixed traffic modes, our dataset complements existing datasets by broadening the available geographic diversity. We also introduce four benchmarks, each advancing spatial learning for embodied AI: online HD map construction, long-range depth estimation, novel view synthesis, and end-to-end driving. Project page: https://kitscenes.com/', 'score': 12, 'issue_id': 2380, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '7afb57b87d30d1f0', 'authors': ['Richard Schwarzkopf', 'Fabian Immel', 'Alexander Blumberg', 'Jonas Merkert', 'Nils Rack', 'Kaiwen Wang', 'Fabian Konstantinidis', 'Julian Truetsch', 'Carlos Fernandez', 'Annika Bätz', 'Kevin Rösch', 'Marlon Steiner', 'Willi Poh', 'Yinzhe Shen', 'Royden Wagner', 'Felix Hauser', 'Dominik Strutz', 'Jaime Villa', 'Gleb Stepanov', 'Holger Caesar', 'Ömer Şahin Taş', 'Frank Bieder', 'Jan-Hendrik Pauls', 'Christoph Stiller'], 'affiliations': ['Delft University of Technology', 'FZI Research Center for Information Technology', 'Karlsruhe Institute of Technology', 'University Charles III of Madrid'], 'pdf_title_img': 'assets/pdf/title_img/2606.02956.jpg', 'data': {'categories': ['#open_source', '#dataset', '#benchmark', '#3d', '#multimodal', '#robotics'], 'emoji': '🚗', 'ru': {'title': 'Высокоточные европейские данные с совершенными картами для обучения автономного вождения', 'desc': 'KITScenes Multimodal — это новый набор данных для автономного вождения, собранный в европейских городах с использованием высокоточных датчиков включая камеры, лидар дальнего действия и радар. Датасет отличается наиболее полными HD-картами с трёхмерной разметкой всех дорожных элементов, включая светофоры, и полной топологической связностью. Авторы представляют четыре бенчмарка для оценки способности моделей к пространственному обучению: построение онлайн HD-карт, оценка глубины на дальних расстояниях, синтез новых видов и сквозное обучение вождению. Этот датасет дополняет существующие наборы данных большей географической разнообразностью и повышенной точностью сенсорных данных.'}, 'en': {'title': 'Elevating Autonomous Driving with High-Fidelity Data', 'desc': 'The KITScenes Multimodal dataset is designed to enhance embodied AI research by providing high-quality driving data from Europe, featuring detailed 3D maps and varied urban settings. It addresses limitations of previous datasets by offering superior sensor fidelity, comprehensive mapping, and geographic diversity. The dataset includes advanced sensors like high-resolution cameras, long-range lidar, and 4D imaging radar, ensuring precise localization and mapping of traffic elements in 3D. Additionally, it introduces four benchmarks that focus on improving spatial learning tasks such as HD map construction and depth estimation for autonomous driving applications.'}, 'zh': {'title': 'KITScenes：推动具身AI的高保真驾驶数据集', 'desc': 'KITScenes多模态数据集提供了高保真度的欧洲驾驶数据，配备全面的3D地图和多样的城市环境，旨在推动具身人工智能研究。与现有的自动驾驶数据集相比，该数据集在传感器精度、地图完整性和地理多样性方面有显著提升。我们使用高分辨率的全球快门相机、超过400米的长距离激光雷达、4D成像雷达和冗余的GNSS/INS定位系统，构建了一个完全同步的传感器系统。该数据集首次在公共数据集中以3D方式精确映射所有与驾驶相关的交通元素，并引入了四个基准测试，推动了具身人工智能的空间学习。'}}}, {'id': 'https://huggingface.co/papers/2606.06416', 'title': 'Unsupervised Skill Discovery for Agentic Data Analysis', 'url': 'https://huggingface.co/papers/2606.06416', 'abstract': 'Abstract DataCOPE is an unsupervised framework that discovers reusable data-analysis skills through verifier-guided exploration, improving analytical performance in both report-style and reasoning-style tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Inference-time skill augmentation provides a lightweight way to improve data-analytic agents by injecting reusable procedural knowledge without updating model parameters. However, discovering effective skills for data analysis remains challenging, as reliable supervision is expensive and success criteria vary across analytical formats. This raises the key question of how to discover reusable data-analysis skills from unlabeled exploration alone. We propose DataCOPE, an unsupervised verifier-guided skill discovery framework for data-analytic agents. DataCOPE derives verifier signals from the exploration trajectories and uses them to characterize relative quality or aggreement among trajectories. It iteratively coordinates a Data-Analytic Agent for trajectory generation, an Unsupervised Verifier for signal extraction, and a Skill Manager for contrastive skill distillation. For report-style analysis, we instantiate the verifier as an Adaptive Checklist Verifier that derives task-specific criteria, scores reports by verifiable coverage, and iteratively refines the checklist. For reasoning-style analysis, we instantiate it as an Answer Agreement Verifier that groups trajectories by answer agreement and uses self-consistency as an auxiliary signal. We evaluate DataCOPE on report-style analysis from Deep Data Research and reasoning-style analysis from DABStep. Across both settings, DataCOPE consistently improves held-out performance over baselines. Averaged across four model settings, DataCOPE improves the mean score by 9.71% and 32.30% on report-style and reasoning-style tasks respectively.', 'score': 10, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '863a52f8298a9a07', 'authors': ['Zhisong Qiu', 'Kangqi Song', 'Shengwei Tang', 'Shuofei Qiao', 'Lei Liang', 'Huajun Chen', 'Shumin Deng'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06416.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Самообучаемое открытие навыков аналитики данных без разметки', 'desc': 'DataCOPE — это фреймворк без учителя, который обнаруживает переиспользуемые навыки анализа данных через управляемое верификатором исследование. Система координирует работу трёх компонентов: агента анализа данных для генерации траекторий, непроверяемого верификатора для извлечения сигналов качества и менеджера навыков для дистилляции навыков через контрастивное обучение. Для отчётного анализа используется адаптивный верификатор чек-листов, а для рассуждений — верификатор согласованности ответов, опирающийся на принцип самосогласованности. Метод показывает улучшение производительности на 9,71% для отчётного анализа и на 32,30% для анализа с рассуждениями по сравнению с базовыми решениями.'}, 'en': {'title': 'Unlocking Data-Analysis Skills with Unsupervised Learning', 'desc': 'DataCOPE is an unsupervised framework designed to enhance data-analysis skills by using a verifier-guided exploration method. It allows data-analytic agents to improve their performance in both report-style and reasoning-style tasks without needing to update their model parameters. The framework discovers effective skills from unlabeled data by coordinating a trajectory generation process, extracting signals through an unsupervised verifier, and managing skill distillation. Evaluation results show that DataCOPE significantly boosts performance, achieving improvements of 9.71% and 32.30% in report-style and reasoning-style tasks, respectively.'}, 'zh': {'title': '无监督技能发现，提升数据分析能力', 'desc': 'DataCOPE是一个无监督框架，通过验证者引导的探索发现可重用的数据分析技能，从而提高报告式和推理式任务的分析性能。该框架在推理时增强技能，提供了一种轻量级的方法，通过注入可重用的程序知识来改善数据分析代理，而无需更新模型参数。尽管发现有效的数据分析技能仍然具有挑战性，但DataCOPE通过探索轨迹提取验证信号，迭代协调数据分析代理、无监督验证者和技能管理器，从而实现技能的对比蒸馏。实验结果表明，DataCOPE在报告式和推理式分析中均显著提高了性能，平均提升了9.71%和32.30%。'}}}, {'id': 'https://huggingface.co/papers/2606.06286', 'title': 'LLMs Can Leak Training Data But Do They Want To? A Propensity-Aware Evaluation of Memorization in LLMs', 'url': 'https://huggingface.co/papers/2606.06286', 'abstract': 'Abstract PropMe framework evaluates language model memorization by distinguishing between forced reproduction capabilities and natural propensity, using SimpleTrace for deterministic attribution and propensity-transformed metrics across open models and datasets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models can reproduce training data, but existing memorization evaluations mostly measure whether models can be forced to do so, rather than whether they do so under ordinary use. We introduce PropMe, a propensity-aware framework for memorization evaluation that contrasts prefix-based capability attacks with non-adversarial evaluations. We propose a metric transformation that, applied to existing functions, allows to create propensity metrics. We further introduce SimpleTrace, a lightweight tracing pipeline built on infini-gram that deterministically attributes model generations to large-scale training corpora and computes verbatim, near-verbatim, and propensity-transformed memorization metrics. Evaluating two fully-open models: Comma and DFM Decoder on two datasets: Common Pile and Dynaword in two languages, we find a consistent gap between capability and propensity: prefix attacks elicit substantially stronger memorization signals than generic or dataset-specific prompts, while propensity scores remain low overall. Thus, the models can reveal training data when directly elicited, but rarely do so in more common non-adversarial settings. We also find that DFM Decoder, which is continually pre-trained from Comma, exhibits reduced memorization and memorization propensity for Common Pile, confirming that memorization capability can decrease when later training emphasizes partially different data. Our results suggest, and we encourage, that memorization audits should report both worst-case extractability and ordinary leakage propensity in order to have a more comprehensive view of this phenomenon.', 'score': 7, 'issue_id': 2377, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '6b066e4ab448def7', 'authors': ['Gianluca Barmina', 'Peter Schneider-Kamp', 'Lukas Galke Poech'], 'affiliations': ['University of Southern Denmark'], 'pdf_title_img': 'assets/pdf/title_img/2606.06286.jpg', 'data': {'categories': ['#leakage', '#multilingual', '#open_source', '#benchmark', '#security', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Различие между принудительным воспроизведением и естественной утечкой обучающих данных в LLM', 'desc': 'В работе предложена система PropMe для оценки запоминания текста большими языковыми моделями, которая различает принудительное воспроизведение и естественную склонность к утечкам. Авторы разработали SimpleTrace — легковесный инструмент на основе infini-gram для детерминированной атрибуции сгенерированного текста к корпусам обучения с вычислением метрик запоминания. Экспериментальная оценка двух открытых моделей на двух датасетах показала устойчивый разрыв между способностью к воспроизведению при целенаправленных атаках и реальной склонностью утечек при обычном использовании. Результаты подтверждают, что модели могут раскрывать данные обучения только при специальном провоцировании, но редко делают это в естественных условиях.'}, 'en': {'title': 'Understanding Language Model Memorization: Capability vs. Propensity', 'desc': "The PropMe framework evaluates how well language models memorize training data by comparing forced reproduction with natural usage. It uses a method called SimpleTrace to track how model outputs relate to their training data, allowing for a better understanding of memorization metrics. The study shows that while models can reproduce training data under specific conditions, they do not do so frequently in regular use cases. The findings suggest that evaluations of memorization should consider both extreme cases and typical usage to provide a clearer picture of a model's memorization behavior."}, 'zh': {'title': '记忆评估：从强制到自然的转变', 'desc': 'PropMe框架通过区分强制再现能力和自然倾向来评估语言模型的记忆能力。我们提出了一种倾向感知的记忆评估方法，使用SimpleTrace追踪模型生成与训练数据的关系。研究发现，模型在直接引导下能够揭示训练数据，但在普通使用情况下则很少出现这种情况。我们的结果表明，记忆审计应同时报告最坏情况下的可提取性和普通泄漏倾向，以全面了解这一现象。'}}}, {'id': 'https://huggingface.co/papers/2606.06021', 'title': 'OPRD: On-Policy Representation Distillation', 'url': 'https://huggingface.co/papers/2606.06021', 'abstract': "Abstract On-Policy Representation Distillation (OPRD) improves upon traditional on-policy distillation by aligning student and teacher representations in hidden-state space rather than just output space, resulting in reduced variance and improved training efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) supervises the student only in output space by matching next-token probabilities. This output-only paradigm has two limits: (1) sampling variance from Monte Carlo KL estimates over large vocabularies (e.g., Qwen's ~150k tokens) persists throughout training, and (2) it treats the teacher as a black-box, discarding all intermediate hidden states after the LM head. We propose On-Policy Representation Distillation (OPRD), which lifts distillation into hidden-state space by aligning student and teacher representations across selected layers on the same rollouts, bypassing the LM head entirely. Theoretically, OPRD eliminates sampling variance and provides richer per-layer structural information. Empirically, OPRD closes the student-teacher gap on AIME 2024/2025 and AIMO, while output-space OPD baselines plateau below the teacher. OPRD also trains 1.44x faster and uses 54% less memory than top-k OPD. Code: https://github.com/ShenzhiYang2000/OPRD.", 'score': 6, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'dc24657aa3e96889', 'authors': ['Shenzhi Yang', 'Guangcheng Zhu', 'Bowen Song', 'Haobo Wang', 'Mingxuan Xia', 'Xing Zheng', 'Yingfan Ma', 'Zhongqi Chen', 'Weiqiang Wang', 'Gang Chen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06021.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🔗', 'ru': {'title': 'Дистиллирование в пространстве скрытых представлений вместо выходных вероятностей', 'desc': 'В работе предлагается метод On-Policy Representation Distillation (OPRD), который улучшает традиционное дистиллирование моделей путём выравнивания представлений студента и учителя в пространстве скрытых состояний, а не только в выходном пространстве. Основная проблема классического дистиллирования заключается в высокой дисперсии при оценке KL-дивергенции на больших словарях и потере информации из промежуточных слоёв нейронной сети. Предлагаемый подход OPRD устраняет эти проблемы, выравнивая скрытые представления на одних и тех же выборках данных без использования головки языковой модели. Эмпирические результаты показывают, что OPRD значительно ускоряет обучение (в 1.44 раза), снижает потребление памяти на 54% и улучшает качество на сложных задачах математического рассуждения.'}, 'en': {'title': 'Aligning Hidden States for Efficient Model Training', 'desc': 'On-Policy Representation Distillation (OPRD) enhances the process of training a student model by aligning its hidden-state representations with those of a teacher model, rather than just focusing on the output predictions. This method addresses the limitations of traditional on-policy distillation, which only matches output probabilities and suffers from high variance due to large vocabularies. By utilizing hidden states, OPRD reduces sampling variance and captures more detailed structural information from the teacher model. As a result, OPRD not only improves training efficiency, achieving faster training times and lower memory usage, but also significantly narrows the performance gap between the student and teacher models.'}, 'zh': {'title': '提升蒸馏效率，优化模型训练', 'desc': '本文提出了一种新的方法，称为在线策略表示蒸馏（OPRD），旨在改进传统的在线策略蒸馏。与仅在输出空间进行匹配的传统方法不同，OPRD通过对齐学生和教师在隐藏状态空间的表示来提高训练效率。该方法消除了采样方差，并提供了更丰富的每层结构信息。实验结果表明，OPRD在多个基准测试中表现优于传统方法，训练速度更快，内存使用更少。'}}}, {'id': 'https://huggingface.co/papers/2606.04880', 'title': 'MAOAM: Unified Object and Material Selection with Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.04880', 'abstract': "Abstract A unified vision-language model framework enables precise object and material selection through text or click interactions, supporting diverse editing workflows with improved robustness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Selection is a core operation in interactive image editing. To be practical, a user should be able to specify and disambiguate the desired selection region through either text or click-based interactions, and the system should support selecting not only objects but also other criteria, such as materials. Material-based selection is valuable for tasks like re-texturing surfaces or editing instances of a specific material. However, existing vision-language-model (VLM) based selection methods are object-centric and typically support a single interaction modality, limiting their applicability. In this work, we thus present Mask Any Object And Material (MAOAM), a unified selection framework that enables precise object and material-level selection across both text- and click-based interactions. MAOAM leverages a VLM with a segmentation head to produce pixel-accurate masks from user prompts: the VLM interprets the user's selection intent (object or material-level) and encodes visual entities, attributes, and spatial relations, while the segmentation head decodes the output token into a mask. A key challenge is the lack of material selection datasets with text annotations. We propose a scalable data generation pipeline: we collect real and synthetic images with material masks, and leverage VLMs to generate material descriptions with rich visual-semantics. We train MAOAM with a multi-task objective over click and text-based selection, along with an auxiliary VQA task derived from the material descriptions to facilitate deeper material understanding. Despite being trained with uni-modal prompts, our model exhibits an emergent improvement in selection when combining text and clicks at inference, enabling flexible image editing workflows. Experiments demonstrate accurate and coherent selections across diverse objects, materials, and interaction scenarios, highlighting robustness in practice.", 'score': 6, 'issue_id': 2380, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'c34acecdb845b8a5', 'authors': ['Jaden Park', 'Valentin Deschaintre', 'Jason Kuen', 'Kangning Liu', 'Iliyan Georgiev', 'Krishna Kumar Singh', 'Yong Jae Lee', 'Michael Fischer'], 'affiliations': ['Adobe Research', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.04880.jpg', 'data': {'categories': ['#dataset', '#data', '#architecture', '#multimodal', '#synthetic', '#cv'], 'emoji': '✂️', 'ru': {'title': 'Объединённое выделение объектов и материалов через текст и клики', 'desc': 'В статье представлена объединённая модель MAOAM, которая использует vision-language model с головой сегментации для точного выделения объектов и материалов в изображениях через текстовые или кликовые взаимодействия. Авторы предложили масштабируемый конвейер генерации данных, который автоматически создаёт аннотации материалов с использованием VLM для семантического описания текстур и материалов. Модель обучается многозадачной целевой функцией, включающей как текстовые, так и кликовые взаимодействия, плюс вспомогательная задача VQA для глубокого понимания материалов. Система демонстрирует способность объединять текст и клики во время инференса, достигая надёжных и согласованных результатов выделения в различных сценариях редактирования изображений.'}, 'en': {'title': 'Empowering Image Editing with Unified Object and Material Selection', 'desc': 'This paper introduces a unified vision-language model framework called Mask Any Object And Material (MAOAM) that enhances interactive image editing by allowing users to select objects and materials through both text and click interactions. The model utilizes a segmentation head to create precise pixel-accurate masks based on user input, effectively interpreting selection intent and understanding visual attributes and spatial relationships. A significant challenge addressed is the scarcity of material selection datasets, which the authors overcome by generating a scalable dataset of images with material masks and corresponding descriptions. The results show that MAOAM achieves improved selection accuracy and flexibility in editing workflows, demonstrating robustness across various interaction scenarios.'}, 'zh': {'title': '统一的对象与材料选择框架', 'desc': '本文提出了一种统一的视觉-语言模型框架，称为MAOAM，能够通过文本或点击交互实现精确的对象和材料选择。这种方法支持多种编辑工作流程，并提高了系统的鲁棒性。MAOAM利用视觉-语言模型和分割头生成像素级的选择掩码，能够理解用户的选择意图，并编码视觉实体、属性和空间关系。通过多任务训练，MAOAM在处理点击和文本选择时表现出色，能够灵活应对不同的图像编辑需求。'}}}, {'id': 'https://huggingface.co/papers/2606.03092', 'title': 'The Shadow Price of Reasoning: Economic Perspective on Optimal Budget Allocation for LLMs', 'url': 'https://huggingface.co/papers/2606.03092', 'abstract': "Abstract Inference-time scaling is enhanced through constrained optimization that allocates computational resources based on economic principles, improving performance in resource-constrained environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Inference-time scaling has emerged as a critical avenue for enhancing Large Language Models' performance, yet real-world deployment is constrained by strict computational budgets. In this work, we formulate inference budget allocation as a global constrained optimization problem governed by economic principles. By modeling per-query reasoning utility with a shifted-surge function, we derive an optimal allocation policy based on a global shadow price that equilibrates marginal utility under resource scarcity. Based on this theory, we propose Constrained Latent-utility Equilibrium Allocation for Reasoning (CLEAR). It performs rational abandonment and reallocates resources from insolvent queries to solvable queries near their emergence thresholds.   Extensive experiments on several reasoning tasks wi
