    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();

                });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.24329', 'title': 'GameplayQA: A Benchmarking Framework for Decision-Dense POV-Synced Multi-Video Understanding of 3D Virtual Agents', 'url': 'https://huggingface.co/papers/2603.24329', 'abstract': "Abstract GameplayQA presents a framework for evaluating multimodal large language models' perception and reasoning capabilities in 3D environments through annotated multiplayer gameplay videos.  AI-generated summary Multimodal LLMs are increasingly deployed as perceptual backbones for autonomous agents in 3D environments, from robotics to virtual worlds. These applications require agents to perceive rapid state changes, attribute actions to the correct entities, and reason about concurrent multi-agent behaviors from a first-person perspective, capabilities that existing benchmarks do not adequately evaluate. We introduce GameplayQA, a framework for evaluating agentic-centric perception and reasoning through video understanding. Specifically, we densely annotate multiplayer 3D gameplay videos at 1.22 labels/second, with time-synced, concurrent captions of states, actions, and events structured around a triadic system of Self, Other Agents, and the World, a natural decomposition for multi-agent environments. From these annotations, we refined 2.4K diagnostic QA pairs organized into three levels of cognitive complexity, accompanied by a structured distractor taxonomy that enables fine-grained analysis of where models hallucinate. Evaluation of frontier MLLMs reveals a substantial gap from human performance, with common failures in temporal and cross-video grounding, agent-role attribution, and handling the decision density of the game. We hope GameplayQA stimulates future research at the intersection of embodied AI, agentic perception, and world modeling.", 'score': 11, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '410af27b9f821a0f', 'authors': ['Yunzhe Wang', 'Runhui Xu', 'Kexin Zheng', 'Tianyi Zhang', 'Jayavibhav Niranjan Kogundi', 'Soham Hans', 'Volkan Ustun'], 'affiliations': ['University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2603.24329.jpg', 'data': {'categories': ['#interpretability', '#3d', '#reasoning', '#dataset', '#hallucinations', '#games', '#robotics', '#benchmark', '#agents', '#video', '#multimodal'], 'emoji': '🎮', 'ru': {'title': 'Оценка восприятия и рассуждений мультимодальных LLM в трёхмерном игровом мире', 'desc': 'GameplayQA представляет бенчмарк для оценки способностей мультимодальных больших языковых моделей воспринимать и рассуждать в трёхмерных окружениях через аннотированные видео многопользовательских игр. Исследователи плотно аннотировали видео игровых сцен с временной синхронизацией, создав 2.4K вопросов и ответов, организованных по трём уровням когнитивной сложности. Оценка передовых MLLM выявила значительный разрыв с человеческой производительностью, особенно в задачах временной привязки, атрибуции действий агентам и моделировании плотных сценариев принятия решений. Работа направлена на развитие встроенного ИИ и агентного восприятия в динамических многоагентных средах.'}, 'en': {'title': "Evaluating AI's Perception in 3D Gameplay", 'desc': 'GameplayQA is a new framework designed to assess how well multimodal large language models (LLMs) can perceive and reason in 3D environments using annotated gameplay videos. It focuses on evaluating the ability of AI agents to understand rapid changes, identify actions of different entities, and reason about interactions in multiplayer settings. The framework includes detailed annotations of gameplay at a high frequency, providing insights into the states, actions, and events occurring in the game. Initial evaluations show that current LLMs significantly lag behind human performance, particularly in areas like temporal understanding and agent-role recognition.'}, 'zh': {'title': '评估3D环境中智能体感知与推理的框架', 'desc': 'GameplayQA是一个评估多模态大型语言模型在3D环境中感知和推理能力的框架，特别是通过注释的多人游戏视频。该框架通过对游戏视频进行密集注释，提供了关于状态、动作和事件的时间同步的并发字幕，帮助模型理解多智能体环境中的复杂交互。我们还构建了2.4K的诊断问答对，分为三个认知复杂性级别，以便更好地分析模型的表现。通过评估前沿的多模态语言模型，我们发现它们在时间和跨视频的基础上存在显著的性能差距，显示出未来在具身人工智能和智能体感知领域的研究潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.24472', 'title': 'Why Does Self-Distillation (Sometimes) Degrade the Reasoning Capability of LLMs?', 'url': 'https://huggingface.co/papers/2603.24472', 'abstract': "Abstract Self-distillation in large language models can degrade mathematical reasoning performance by suppressing uncertainty expression, particularly affecting out-of-distribution tasks.  AI-generated summary Self-distillation has emerged as an effective post-training paradigm for LLMs, often improving performance while shortening reasoning traces. However, in mathematical reasoning, we find that it can reduce response length while degrading performance. We trace this degradation to the suppression of epistemic verbalization - the model's expression of uncertainty during reasoning. Through controlled experiments varying conditioning context richness and task coverage, we show that conditioning the teacher on rich information suppresses uncertainty expression, enabling rapid in-domain optimization with limited task coverage but harming OOD performance, where unseen problems benefit from expressing uncertainty and adjusting accordingly. Across Qwen3-8B, DeepSeek-Distill-Qwen-7B, and Olmo3-7B-Instruct, we observe performance drops of up to 40%. Our findings highlight that exposing appropriate levels of uncertainty is crucial for robust reasoning and underscore the importance of optimizing reasoning behavior beyond merely reinforcing correct answer traces.", 'score': 7, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': 'd8316a3b7c73d90c', 'authors': ['Jeonghye Kim', 'Xufang Luo', 'Minbeom Kim', 'Sangmook Lee', 'Dohyung Kim', 'Jiwon Jeon', 'Dongsheng Li', 'Yuqing Yang'], 'affiliations': ['KAIST', 'Microsoft Research', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.24472.jpg', 'data': {'categories': ['#math', '#training', '#small_models'], 'emoji': '🤔', 'ru': {'title': 'Неуверенность спасает мышление: почему дистилляция должна сохранять сомнения', 'desc': 'В статье исследуется проблема самодистилляции в больших языковых моделях, которая может ухудшить математические рассуждения путём подавления выражения неуверенности модели. Авторы обнаружили, что когда учитель дистилляции обусловлен богатой информацией, модель начинает скрывать свою неопределённость, что приводит к хорошей производительности на известных задачах, но резко снижает качество на задачах вне распределения обучающих данных. Через контролируемые эксперименты на нескольких моделях (Qwen3-8B, DeepSeek-Distill-Qwen-7B и других) продемонстрировано падение производительности до 40%. Исследование показывает, что для надёжного логического вывода критически важно сохранять адекватный уровень выражения неуверенности, а не просто усиливать запоминание правильных ответов.'}, 'en': {'title': 'Balancing Uncertainty for Better Reasoning in LLMs', 'desc': "This paper discusses the effects of self-distillation in large language models (LLMs) on their mathematical reasoning abilities. It finds that while self-distillation can improve performance in familiar tasks, it may hinder the model's ability to express uncertainty, which is vital for tackling new or out-of-distribution problems. The authors conducted experiments showing that rich contextual information during training can suppress uncertainty expression, leading to significant performance drops in unseen tasks. The study emphasizes the need for models to maintain a balance in uncertainty expression to enhance reasoning robustness."}, 'zh': {'title': '自我蒸馏与数学推理的平衡', 'desc': '在大型语言模型中，自我蒸馏可能会降低数学推理性能，因为它抑制了不确定性的表达，尤其是在分布外任务中。虽然自我蒸馏通常能提高性能并缩短推理过程，但在数学推理中，我们发现它可能会减少响应长度，同时降低性能。我们通过控制实验发现，丰富的信息条件会抑制模型的不确定性表达，从而在有限的任务覆盖下实现快速的领域内优化，但却损害了分布外性能。我们的研究表明，适当表达不确定性对于稳健的推理至关重要，强调了优化推理行为的重要性，而不仅仅是强化正确答案的轨迹。'}}}, {'id': 'https://huggingface.co/papers/2603.21618', 'title': '4DGS360: 360° Gaussian Reconstruction of Dynamic Objects from a Single Video', 'url': 'https://huggingface.co/papers/2603.21618', 'abstract': 'Abstract 4DGS360 presents a diffusion-free approach for 360° dynamic object reconstruction using 3D-native initialization and a 3D tracker called AnchorTAP3D to improve geometric consistency and handle occlusions.  AI-generated summary We introduce 4DGS360, a diffusion-free framework for 360^{circ} dynamic object reconstruction from casual monocular video. Existing methods often fail to reconstruct consistent 360^{circ} geometry, as their heavy reliance on 2D-native priors causes initial points to overfit to visible surface in each training view. 4DGS360 addresses this challenge through a advanced 3D-native initialization that mitigates the geometric ambiguity of occluded regions. Our proposed 3D tracker, AnchorTAP3D, produces reinforced 3D point trajectories by leveraging confident 2D track points as anchors, suppressing drift and providing reliable initialization that preserves geometry in occluded regions. This initialization, combined with optimization, yields coherent 360^{circ} 4D reconstructions. We further present iPhone360, a new benchmark where test cameras are placed up to 135^{circ} apart from training views, enabling 360^{circ} evaluation that existing datasets cannot provide. Experiments show that 4DGS360 achieves state-of-the-art performance on the iPhone360, iPhone, and DAVIS datasets, both qualitatively and quantitatively.', 'score': 4, 'issue_id': 1664, 'pub_date': '2026-03-23', 'pub_date_card': {'ru': '23 марта', 'en': 'March 23', 'zh': '3月23日'}, 'hash': '3607e52ea310addd', 'authors': ['Jae Won Jang', 'Yeonjin Chang', 'Wonsik Shin', 'Juhwan Cho', 'Nojun Kwak'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.21618.jpg', 'data': {'categories': ['#dataset', '#3d', '#video', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Полная 360° реконструкция динамических объектов через трёхмерное отслеживание без диффузионных моделей', 'desc': 'Статья представляет 4DGS360 — фреймворк для реконструкции динамических объектов со всех сторон (360°) из монокулярного видео без использования диффузионных моделей. Основная инновация заключается в трёхмерной инициализации, которая решает проблему переобучения на видимых поверхностях и лучше восстанавливает геометрию скрытых областей. Авторы разработали трёхмерный трекер AnchorTAP3D, который генерирует надёжные траектории точек в пространстве, используя якорные точки из двумерного отслеживания. Кроме того, представлен новый датасет iPhone360, позволяющий корректно оценивать качество реконструкции под углами до 135° от обучающих видов.'}, 'en': {'title': 'Revolutionizing 360° Object Reconstruction with 4DGS360', 'desc': 'The paper introduces 4DGS360, a novel framework for reconstructing dynamic 360° objects from standard monocular video without relying on diffusion methods. It utilizes a 3D-native initialization to enhance geometric consistency and effectively manage occlusions, which are common challenges in existing methods. The framework incorporates a 3D tracker called AnchorTAP3D that stabilizes 3D point trajectories by using reliable 2D track points as anchors, reducing drift and improving accuracy in occluded areas. The authors also present a new benchmark, iPhone360, for evaluating 360° reconstructions, demonstrating that 4DGS360 outperforms previous techniques on multiple datasets.'}, 'zh': {'title': '360°动态物体重建的新方法', 'desc': '4DGS360是一种无扩散的方法，用于从单目视频重建360°动态物体。该方法通过3D原生初始化和名为AnchorTAP3D的3D跟踪器来提高几何一致性，并处理遮挡问题。与传统方法依赖2D原生先验不同，4DGS360通过先进的3D初始化减少了遮挡区域的几何模糊。实验结果表明，4DGS360在多个数据集上都达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.21289', 'title': 'When Models Judge Themselves: Unsupervised Self-Evolution for Multimodal Reasoning', 'url': 'https://huggingface.co/papers/2603.21289', 'abstract': "Abstract A self-evolution training framework for multimodal reasoning uses unsupervised learning with self-consistency signals and group-relative policy optimization to improve performance without labeled data.  AI-generated summary Recent progress in multimodal large language models has led to strong performance on reasoning tasks, but these improvements largely rely on high-quality annotated data or teacher-model distillation, both of which are costly and difficult to scale. To address this, we propose an unsupervised self-evolution training framework for multimodal reasoning that achieves stable performance improvements without using human-annotated answers or external reward models. For each input, we sample multiple reasoning trajectories and jointly model their within group structure. We use the Actor's self-consistency signal as a training prior, and introduce a bounded Judge based modulation to continuously reweight trajectories of different quality. We further model the modulated scores as a group level distribution and convert absolute scores into relative advantages within each group, enabling more robust policy updates. Trained with Group Relative Policy Optimization (GRPO) on unlabeled data, our method consistently improves reasoning performance and generalization on five mathematical reasoning benchmarks, offering a scalable path toward self-evolving multimodal models. The code are available at https://github.com/OPPO-Mente-Lab/LLM-Self-Judge.", 'score': 4, 'issue_id': 1664, 'pub_date': '2026-03-22', 'pub_date_card': {'ru': '22 марта', 'en': 'March 22', 'zh': '3月22日'}, 'hash': 'c0e18364b9ef5779', 'authors': ['Zhengxian Wu', 'Kai Shi', 'Chuanrui Zhang', 'Zirui Liao', 'Jun Yang', 'Ni Yang', 'Qiuying Peng', 'Luyuan Zhang', 'Hangrui Xu', 'Tianhuang Su', 'Zhenyu Yang', 'Haonan Lu', 'Haoqian Wang'], 'affiliations': ['Hefei University of Technology', 'Nanyang Technological University', 'OPPO AI Center', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.21289.jpg', 'data': {'categories': ['#benchmark', '#math', '#training', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Самообучающиеся мультимодальные модели через групповую оптимизацию политики', 'desc': 'В работе предложена система самосовершенствующегося обучения для мультимодальных больших языковых моделей, которая использует неразмеченные данные и сигналы самосогласованности. Метод генерирует несколько траекторий рассуждений для каждого входа и моделирует их структуру внутри группы. Авторы вводят ограниченную модуляцию судьи для переweighting траекторий разного качества и преобразуют абсолютные оценки в относительные преимущества внутри групп. Предложенная оптимизация политики GRPO позволяет стабильно улучшать производительность на задачах математического рассуждения без использования аннотированных данных и внешних моделей вознаграждения.'}, 'en': {'title': 'Empowering Multimodal Reasoning Without Labels', 'desc': "This paper presents a self-evolution training framework designed for multimodal reasoning that operates without the need for labeled data. It utilizes unsupervised learning techniques, leveraging self-consistency signals from the model's own outputs to enhance performance. The framework employs Group Relative Policy Optimization (GRPO) to optimize reasoning trajectories, allowing the model to learn from its own reasoning processes. By modeling the quality of these trajectories and adjusting them based on relative advantages, the approach achieves significant improvements in reasoning tasks across multiple benchmarks."}, 'zh': {'title': '无监督自我进化：多模态推理的新路径', 'desc': '本文提出了一种自我进化训练框架，用于多模态推理，采用无监督学习和自一致性信号来提升性能，而无需标注数据。该方法通过对每个输入采样多个推理轨迹，并共同建模其组内结构，来实现稳定的性能提升。我们利用演员的自一致性信号作为训练先验，并引入有界评判者调制，持续重新加权不同质量的轨迹。通过在未标注数据上使用组相对策略优化（GRPO）进行训练，该方法在五个数学推理基准上持续提高推理性能和泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.24157', 'title': 'CarePilot: A Multi-Agent Framework for Long-Horizon Computer Task Automation in Healthcare', 'url': 'https://huggingface.co/papers/2603.24157', 'abstract': 'Abstract careflow is a benchmark for long-horizon automation in healthcare, and carepilot is a multimodal agent framework that uses actor-critic methods with dual-memory mechanisms to improve automated task execution in complex medical environments.  AI-generated summary Multimodal agentic pipelines are transforming human-computer interaction by enabling efficient and accessible automation of complex, real-world tasks. However, recent efforts have focused on short-horizon or general-purpose applications (e.g., mobile or desktop interfaces), leaving long-horizon automation for domain-specific systems, particularly in healthcare, largely unexplored. To address this, we introduce CareFlow, a high-quality human-annotated benchmark comprising complex, long-horizon software workflows across medical annotation tools, DICOM viewers, EHR systems, and laboratory information systems. On this benchmark, existing vision-language models (VLMs) perform poorly, struggling with long-horizon reasoning and multi-step interactions in medical contexts. To overcome this, we propose CarePilot, a multi-agent framework based on the actor-critic paradigm. The Actor integrates tool grounding with dual-memory mechanisms (long-term and short-term experience) to predict the next semantic action from the visual interface and system state. The Critic evaluates each action, updates memory based on observed effects, and either executes or provides corrective feedback to refine the workflow. Through iterative agentic simulation, the Actor learns to perform more robust and reasoning-aware predictions during inference. Our experiments show that CarePilot achieves state-of-the-art performance, outperforming strong closed-source and open-source multimodal baselines by approximately 15.26% and 3.38%, respectively, on our benchmark and out-of-distribution dataset.', 'score': 2, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '3c2df7116066b41d', 'authors': ['Akash Ghosh', 'Tajamul Ashraf', 'Rishu Kumar Singh', 'Numan Saeed', 'Sriparna Saha', 'Xiuying Chen', 'Salman Khan'], 'affiliations': ['Indian Institute of Technology Patna', 'Mohamed bin Zayed University of AI (MBZUAI)'], 'pdf_title_img': 'assets/pdf/title_img/2603.24157.jpg', 'data': {'categories': ['#healthcare', '#long_context', '#reasoning', '#rl', '#science', '#benchmark', '#dataset', '#agents', '#multimodal'], 'emoji': '🏥', 'ru': {'title': 'Интеллектуальный помощник для автоматизации сложных медицинских задач с долгосрочным планированием', 'desc': 'В работе представлена CareFlow — эталонный набор данных для автоматизации долгосрочных медицинских рабочих процессов, включающий сложные задачи в системах электронных медицинских записей и медицинских визуализаторов. Авторы предлагают CarePilot — мультимодальный фреймворк на основе метода актёр-критик, который использует двойную память (долгосрочную и краткосрочную) для улучшения предсказания следующего действия в медицинском интерфейсе. Актор интегрирует привязку инструментов и механизм памяти для выбора семантического действия, а критик оценивает качество действия и обновляет память на основе наблюдаемых эффектов. Экспериментальные результаты показывают, что CarePilot превосходит существующие мультимодальные модели на 15.26% в сравнении с закрытыми решениями и обеспечивает лучшую генерализацию на данных, отличных от обучающего набора.'}, 'en': {'title': 'Revolutionizing Healthcare Automation with CarePilot', 'desc': 'This paper introduces CareFlow, a benchmark designed for long-horizon automation in healthcare, focusing on complex workflows in medical environments. It highlights the limitations of existing vision-language models (VLMs) in handling long-horizon reasoning and multi-step tasks. To address these challenges, the authors propose CarePilot, a multimodal agent framework that utilizes actor-critic methods with dual-memory mechanisms to enhance task execution. CarePilot demonstrates significant improvements in performance, surpassing both closed-source and open-source baselines by notable margins on the CareFlow benchmark.'}, 'zh': {'title': '长时间医疗自动化的新突破', 'desc': '本论文介绍了CareFlow，这是一个用于医疗保健领域的长时间自动化基准测试。我们提出的CarePilot是一个多模态代理框架，采用演员-评论家方法和双重记忆机制，以提高在复杂医疗环境中的自动任务执行能力。通过对现有视觉-语言模型的评估，我们发现它们在长时间推理和多步骤交互方面表现不佳。CarePilot通过迭代的代理模拟学习，显著提升了推理能力，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.23638', 'title': 'Can LLM Agents Be CFOs? A Benchmark for Resource Allocation in Dynamic Enterprise Environments', 'url': 'https://huggingface.co/papers/2603.23638', 'abstract': 'Abstract EnterpriseArena benchmark evaluates large language models on long-horizon enterprise resource allocation, revealing significant challenges in sustained decision-making under uncertainty.  AI-generated summary Large language models (LLMs) have enabled agentic systems that can reason, plan, and act across complex tasks, but it remains unclear whether they can allocate resources effectively under uncertainty. Unlike short-horizon reactive decisions, allocation requires committing scarce resources over time while balancing competing objectives and preserving flexibility for future needs. We introduce EnterpriseArena, the first benchmark for evaluating agents on long-horizon enterprise resource allocation. It instantiates CFO-style decision-making in a 132-month enterprise simulator combining firm-level financial data, anonymized business documents, macroeconomic and industry signals, and expert-validated operating rules. The environment is partially observable and reveals the state only through budgeted organizational tools, forcing agents to trade off information acquisition against conserving scarce resources. Experiments on eleven advanced LLMs show that this setting remains highly challenging: only 16% of runs survive the full horizon, and larger models do not reliably outperform smaller ones. These results identify long-horizon resource allocation under uncertainty as a distinct capability gap for current LLM agents.', 'score': 2, 'issue_id': 1664, 'pub_date': '2026-03-24', 'pub_date_card': {'ru': '24 марта', 'en': 'March 24', 'zh': '3月24日'}, 'hash': 'c26703d76cd4e28d', 'authors': ['Yi Han', 'Lingfei Qian', 'Yan Wang', 'Yueru He', 'Xueqing Peng', 'Dongji Feng', 'Yankai Chen', 'Haohang Li', 'Yupeng Cao', 'Jimin Huang', 'Xue Liu', 'Jian-Yun Nie', 'Sophia Ananiadou'], 'affiliations': ['California State University', 'Columbia University', 'Georgia Institute of Technology', 'McGill University', 'Mohamed bin Zayed University of Artificial Intelligence', 'Stevens Institute of Technology', 'The Fin AI', 'University of Manchester', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2603.23638.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#agents', '#long_context'], 'emoji': '💰', 'ru': {'title': 'Долгосрочное распределение ресурсов — слабое место современных языковых агентов', 'desc': 'В статье представлен бенчмарк EnterpriseArena для оценки больших языковых моделей на задачах долгосрочного распределения ресурсов в корпоративной среде. Исследование показывает, что несмотря на способность LLM к рассуждению и планированию, они испытывают значительные трудности при принятии решений в условиях неопределённости на протяжении длительного времени. Бенчмарк включает симулятор работы компании с финансовыми данными, деловыми документами и макроэкономическими сигналами, где агентам необходимо эффективно распределять ограниченные ресурсы при частичной наблюдаемости окружения. Результаты экспериментов на одиннадцати передовых LLM выявляют критический пробел в возможностях современных агентов: только 16% запусков успешно завершают полный горизонт планирования.'}, 'en': {'title': 'Evaluating LLMs in Long-Term Resource Allocation Challenges', 'desc': "The paper introduces the EnterpriseArena benchmark, which assesses large language models (LLMs) on their ability to manage long-term resource allocation in uncertain environments. It highlights the complexity of making sustained decisions that require balancing immediate resource commitments with future flexibility. The benchmark simulates a CFO's decision-making process over 132 months, incorporating various financial and operational data while presenting a partially observable environment. Results indicate that current LLMs struggle with this task, with only 16% successfully navigating the entire simulation, revealing a significant gap in their capabilities for long-horizon planning."}, 'zh': {'title': '长期资源分配中的挑战与机遇', 'desc': 'EnterpriseArena基准测试评估大型语言模型在长期企业资源分配中的表现，揭示了在不确定性下持续决策的重大挑战。与短期反应性决策不同，资源分配需要在时间上承诺稀缺资源，同时平衡竞争目标并保留未来需求的灵活性。我们引入了EnterpriseArena，这是第一个用于评估代理在长期企业资源分配中的基准测试。实验结果表明，当前大型语言模型在不确定性下的长期资源分配能力存在明显的不足，只有16%的实验能够完成整个周期。'}}}, {'id': 'https://huggingface.co/papers/2603.22341', 'title': 'T-MAP: Red-Teaming LLM Agents with Trajectory-aware Evolutionary Search', 'url': 'https://huggingface.co/papers/2603.22341', 'abstract': 'Abstract T-MAP, a trajectory-aware evolutionary search method, discovers adversarial prompts that bypass safety measures and achieve harmful outcomes through tool interactions in LLM agents.  AI-generated summary While prior red-teaming efforts have focused on eliciting harmful text outputs from large language models (LLMs), such approaches fail to capture agent-specific vulnerabilities that emerge through multi-step tool execution, particularly in rapidly growing ecosystems such as the Model Context Protocol (MCP). To address this gap, we propose a trajectory-aware evolutionary search method, T-MAP, which leverages execution trajectories to guide the discovery of adversarial prompts. Our approach enables the automatic generation of attacks that not only bypass safety guardrails but also reliably realize harmful objectives through actual tool interactions. Empirical evaluations across diverse MCP environments demonstrate that T-MAP substantially outperforms baselines in attack realization rate (ARR) and remains effective against frontier models, including GPT-5.2, Gemini-3-Pro, Qwen3.5, and GLM-5, thereby revealing previously underexplored vulnerabilities in autonomous LLM agents.', 'score': 2, 'issue_id': 1664, 'pub_date': '2026-03-21', 'pub_date_card': {'ru': '21 марта', 'en': 'March 21', 'zh': '3月21日'}, 'hash': '350320070af91b25', 'authors': ['Hyomin Lee', 'Sangwoo Park', 'Yumin Choi', 'Sohyun An', 'Seanie Lee', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2603.22341.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Траектория уязвимости: поиск атак на агентов через взаимодействие с инструментами', 'desc': 'T-MAP — это метод эволюционного поиска, ориентированный на траектории выполнения, который автоматически генерирует adversarial prompts для обхода защитных механизмов LLM-агентов. В отличие от предыдущих подходов к red-teaming, которые сосредоточивались на вредоносных текстовых выводах, T-MAP выявляет уязвимости, возникающие при многошаговом взаимодействии с инструментами в экосистемах вроде Model Context Protocol. Метод использует информацию о траекториях выполнения для направленного поиска adversarial примеров, позволяя достичь вредоносных целей через реальное взаимодействие с инструментами. Экспериментальные результаты показывают, что T-MAP значительно превосходит базовые методы по частоте успешных атак и эффективен даже против передовых моделей.'}, 'en': {'title': 'Uncovering Hidden Vulnerabilities in LLMs with T-MAP', 'desc': 'The paper introduces T-MAP, a new method for finding adversarial prompts that can bypass safety measures in large language models (LLMs). Unlike previous methods that only focus on harmful text outputs, T-MAP considers the specific vulnerabilities that arise during multi-step tool interactions. By using a trajectory-aware evolutionary search approach, it effectively guides the discovery of prompts that lead to harmful outcomes. The results show that T-MAP significantly improves the rate of successful attacks compared to existing methods, highlighting new weaknesses in LLM agents.'}, 'zh': {'title': 'T-MAP：揭示LLM代理的新脆弱性', 'desc': 'T-MAP是一种基于轨迹的进化搜索方法，旨在发现能够绕过安全措施并通过工具交互实现有害结果的对抗性提示。与以往的红队测试方法不同，T-MAP关注多步骤工具执行中出现的特定代理脆弱性，尤其是在快速发展的模型上下文协议（MCP）生态系统中。该方法利用执行轨迹来指导对抗性提示的发现，能够自动生成攻击，既能绕过安全防护，又能通过实际工具交互可靠地实现有害目标。实证评估表明，T-MAP在攻击实现率（ARR）方面显著优于基线，并且在前沿模型（如GPT-5.2、Gemini-3-Pro、Qwen3.5和GLM-5）中依然有效，揭示了自主LLM代理中之前未被充分探索的脆弱性。'}}}, {'id': 'https://huggingface.co/papers/2603.24533', 'title': 'UI-Voyager: A Self-Evolving GUI Agent Learning via Failed Experience', 'url': 'https://huggingface.co/papers/2603.24533', 'abstract': 'Abstract A two-stage self-evolving mobile GUI agent named UI-Voyager is proposed, featuring rejection fine-tuning and group relative self-distillation to improve efficiency and performance in GUI automation tasks.  AI-generated summary Autonomous mobile GUI agents have attracted increasing attention along with the advancement of Multimodal Large Language Models (MLLMs). However, existing methods still suffer from inefficient learning from failed trajectories and ambiguous credit assignment under sparse rewards for long-horizon GUI tasks. To that end, we propose UI-Voyager, a novel two-stage self-evolving mobile GUI agent. In the first stage, we employ Rejection Fine-Tuning (RFT), which enables the continuous co-evolution of data and models in a fully autonomous loop. The second stage introduces Group Relative Self-Distillation (GRSD), which identifies critical fork points in group rollouts and constructs dense step-level supervision from successful trajectories to correct failed ones. Extensive experiments on AndroidWorld show that our 4B model achieves an 81.0% Pass@1 success rate, outperforming numerous recent baselines and exceeding human-level performance. Ablation and case studies further verify the effectiveness of GRSD. Our method represents a significant leap toward efficient, self-evolving, and high-performance mobile GUI automation without expensive manual data annotation.', 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '62992454932817e3', 'authors': ['Zichuan Lin', 'Feiyu Liu', 'Yijun Yang', 'Jiafei Lyu', 'Yiming Gao', 'Yicheng Liu', 'Zhicong Lu', 'Yangbin Yu', 'Mingyu Yang', 'Junyou Li', 'Deheng Ye', 'Jie Jiang'], 'affiliations': ['Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.24533.jpg', 'data': {'categories': ['#training', '#agents', '#rlhf', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Самоэволюционирующий агент для автоматизации мобильного интерфейса с усовершенствованным обучением на отказах', 'desc': 'В работе предлагается UI-Voyager — двухэтапный агент для автоматизации мобильного графического интерфейса, основанный на мультимодальных больших языковых моделях. На первом этапе используется методика Rejection Fine-Tuning, которая обеспечивает непрерывную совместную эволюцию данных и модели в полностью автономном цикле обучения. На втором этапе применяется Group Relative Self-Distillation для определения критических точек разветвления и создания плотного контроля на уровне отдельных шагов из успешных траекторий. Модель размером 4B достигает уровня производительности 81.0% Pass@1, превосходя как недавние базовые методы, так и человеческий уровень производительности.'}, 'en': {'title': 'Revolutionizing GUI Automation with Self-Evolving Agents', 'desc': 'The paper introduces UI-Voyager, a two-stage self-evolving mobile GUI agent designed to enhance GUI automation tasks. It utilizes Rejection Fine-Tuning (RFT) to continuously improve both data and models in an autonomous manner. The second stage employs Group Relative Self-Distillation (GRSD) to refine learning by focusing on successful trajectories and correcting failures. This approach leads to a significant improvement in performance, achieving an 81.0% success rate on AndroidWorld, surpassing many existing methods and even human performance.'}, 'zh': {'title': '高效自我进化的移动GUI代理', 'desc': '本文提出了一种名为UI-Voyager的两阶段自我进化移动GUI代理，旨在提高GUI自动化任务的效率和性能。第一阶段采用拒绝微调（RFT），实现数据和模型的持续共同进化。第二阶段引入群体相对自蒸馏（GRSD），通过识别关键分叉点并从成功轨迹中构建密集的逐步监督来纠正失败的轨迹。实验结果表明，UI-Voyager在AndroidWorld上的成功率达到81.0%，超越了许多现有基准，展现了高效、自我进化的移动GUI自动化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.24506', 'title': 'Toward Physically Consistent Driving Video World Models under Challenging Trajectories', 'url': 'https://huggingface.co/papers/2603.24506', 'abstract': 'Abstract PhyGenesis is a world model that generates high-fidelity driving videos with physical consistency by transforming invalid trajectories into plausible conditions and using a physics-enhanced video generator trained on real and simulated driving scenarios.  AI-generated summary Video generation models have shown strong potential as world models for autonomous driving simulation. However, existing approaches are primarily trained on real-world driving datasets, which mostly contain natural and safe driving scenarios. As a result, current models often fail when conditioned on challenging or counterfactual trajectories-such as imperfect trajectories generated by simulators or planning systems-producing videos with severe physical inconsistencies and artifacts. To address this limitation, we propose PhyGenesis, a world model designed to generate driving videos with high visual fidelity and strong physical consistency. Our framework consists of two key components: (1) a physical condition generator that transforms potentially invalid trajectory inputs into physically plausible conditions, and (2) a physics-enhanced video generator that produces high-fidelity multi-view driving videos under these conditions. To effectively train these components, we construct a large-scale, physics-rich heterogeneous dataset. Specifically, in addition to real-world driving videos, we generate diverse challenging driving scenarios using the CARLA simulator, from which we derive supervision signals that guide the model to learn physically grounded dynamics under extreme conditions. This challenging-trajectory learning strategy enables trajectory correction and promotes physically consistent video generation. Extensive experiments demonstrate that PhyGenesis consistently outperforms state-of-the-art methods, especially on challenging trajectories. Our project page is available at: https://wm-research.github.io/PhyGenesis/.', 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': 'c34ffc665a2ce6de', 'authors': ['Jiawei Zhou', 'Zhenxin Zhu', 'Lingyi Du', 'Linye Lyu', 'Lijun Zhou', 'Zhanqian Wu', 'Hongcheng Luo', 'Zhuotao Tian', 'Bing Wang', 'Guang Chen', 'Hangjun Ye', 'Haiyang Sun', 'Yu Li'], 'affiliations': ['Shenzhen Loop Area Institute', 'The Hong Kong Polytechnic University', 'Xiaomi EV', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.24506.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#video', '#robotics'], 'emoji': '🚗', 'ru': {'title': 'Физически согласованная генерация видео вождения для автономных систем', 'desc': 'PhyGenesis — это мировая модель, которая генерирует видео вождения с высокой точностью и физической согласованностью. Система состоит из двух компонентов: генератора физических условий, преобразующего невалидные траектории в физически реалистичные, и улучшенного видеогенератора, создающего многовидовые видео вождения. Для обучения модели используется гетерогенный датасет, включающий реальные видео вождения и синтетические сценарии из симулятора CARLA с различными сложными ситуациями. Такой подход позволяет моделировать физически непротиворечивые видеопоследовательности даже при нестандартных и экстремальных траекториях.'}, 'en': {'title': 'Driving Videos Reimagined: Realism Meets Physics with PhyGenesis', 'desc': 'PhyGenesis is a novel world model that enhances video generation for autonomous driving by ensuring physical consistency in the output. It addresses the limitations of existing models that struggle with challenging or unrealistic driving scenarios by transforming invalid trajectories into plausible conditions. The framework includes a physical condition generator and a physics-enhanced video generator, both trained on a diverse dataset that combines real-world and simulated driving scenarios. This approach allows for the generation of high-fidelity driving videos that maintain physical realism, even under extreme conditions, outperforming current state-of-the-art methods.'}, 'zh': {'title': 'PhyGenesis：高保真物理一致的驾驶视频生成', 'desc': 'PhyGenesis 是一个世界模型，能够生成高保真度且物理一致的驾驶视频。它通过将无效轨迹转化为合理的物理条件，并使用经过物理增强的视频生成器进行训练。该模型的关键在于两个部分：物理条件生成器和物理增强视频生成器。通过构建一个大规模的物理丰富数据集，PhyGenesis 在处理具有挑战性的轨迹时表现优异，生成的视频在视觉和物理上都保持一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.24458', 'title': 'OmniWeaving: Towards Unified Video Generation with Free-form Composition and Reasoning', 'url': 'https://huggingface.co/papers/2603.24458', 'abstract': 'Abstract OmniWeaving is an open-source video generation model that unifies multimodal inputs and complex reasoning capabilities through large-scale pretraining and intelligent agent inference.  AI-generated summary While proprietary systems such as Seedance-2.0 have achieved remarkable success in omni-capable video generation, open-source alternatives significantly lag behind. Most academic models remain heavily fragmented, and the few existing efforts toward unified video generation still struggle to seamlessly integrate diverse tasks within a single framework. To bridge this gap, we propose OmniWeaving, an omni-level video generation model featuring powerful multimodal composition and reasoning-informed capabilities. By leveraging a massive-scale pretraining dataset that encompasses diverse compositional and reasoning-augmented scenarios, OmniWeaving learns to temporally bind interleaved text, multi-image, and video inputs while acting as an intelligent agent to infer complex user intentions for sophisticated video creation. Furthermore, we introduce IntelligentVBench, the first comprehensive benchmark designed to rigorously assess next-level intelligent unified video generation. Extensive experiments demonstrate that OmniWeaving achieves SoTA performance among open-source unified models. The codes and model will be made publicly available soon. Project Page: https://omniweaving.github.io.', 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '39027ca16d339caa', 'authors': ['Kaihang Pan', 'Qi Tian', 'Jianwei Zhang', 'Weijie Kong', 'Jiangfeng Xiong', 'Yanxin Long', 'Shixue Zhang', 'Haiyi Qiu', 'Tan Wang', 'Zheqi Lv', 'Yue Wu', 'Liefeng Bo', 'Siliang Tang', 'Zhao Zhong'], 'affiliations': ['Nanyang Technological University', 'Tencent Hunyuan', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.24458.jpg', 'data': {'categories': ['#reasoning', '#training', '#benchmark', '#dataset', '#open_source', '#agents', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая модель для интеллектуальной генерации видео из мультимодальных входов', 'desc': 'OmniWeaving — это открытая модель для генерации видео, которая объединяет различные типы входных данных (текст, изображения, видео) и способна выполнять сложные рассуждения благодаря крупномасштабному предварительному обучению. Модель обучена работать как интеллектуальный агент, способный понимать сложные намерения пользователя и синтезировать видео на основе комбинированных мультимодальных входов. Авторы создали новый бенчмарк IntelligentVBench для оценки качества унифицированной генерации видео с элементами рассуждения. Модель демонстрирует лучшие результаты среди открытых альтернатив и закрывает значительный разрыв с коммерческими системами.'}, 'en': {'title': 'Unifying Video Generation with OmniWeaving', 'desc': 'OmniWeaving is a new open-source model for generating videos that combines different types of inputs like text and images while using advanced reasoning skills. It aims to improve upon existing proprietary models by providing a unified framework for video generation that can handle multiple tasks at once. The model is trained on a large dataset that includes various scenarios, allowing it to understand and create videos based on complex user requests. Additionally, the paper introduces IntelligentVBench, a benchmark for evaluating the performance of video generation models, showing that OmniWeaving performs exceptionally well compared to other open-source options.'}, 'zh': {'title': 'OmniWeaving：统一多模态视频生成的未来', 'desc': 'OmniWeaving是一种开源视频生成模型，能够通过大规模预训练和智能代理推理来统一多模态输入和复杂推理能力。与一些专有系统相比，开源替代方案在视频生成方面仍然落后。OmniWeaving通过利用多样化的预训练数据集，学习将文本、多图像和视频输入进行时间绑定，并推断用户的复杂意图。我们还推出了IntelligentVBench，这是第一个全面的基准，用于严格评估下一代智能统一视频生成。'}}}, {'id': 'https://huggingface.co/papers/2603.24440', 'title': 'CUA-Suite: Massive Human-annotated Video Demonstrations for Computer-Use Agents', 'url': 'https://huggingface.co/papers/2603.24440', 'abstract': "Abstract CUA-Suite introduces a large-scale ecosystem of expert video demonstrations and annotations for computer-use agents, providing continuous screen recordings and detailed reasoning annotations to advance desktop automation capabilities.  AI-generated summary Computer-use agents (CUAs) hold great promise for automating complex desktop workflows, yet progress toward general-purpose agents is bottlenecked by the scarcity of continuous, high-quality human demonstration videos. Recent work emphasizes that continuous video, not sparse screenshots, is the critical missing ingredient for scaling these agents. However, the largest existing open dataset, ScaleCUA, contains only 2 million screenshots, equating to less than 20 hours of video. To address this bottleneck, we introduce CUA-Suite, a large-scale ecosystem of expert video demonstrations and dense annotations for professional desktop computer-use agents. At its core is VideoCUA, which provides approximately 10,000 human-demonstrated tasks across 87 diverse applications with continuous 30 fps screen recordings, kinematic cursor traces, and multi-layerfed reasoning annotations, totaling approximately 55 hours and 6 million frames of expert video. Unlike sparse datasets that capture only final click coordinates, these continuous video streams preserve the full temporal dynamics of human interaction, forming a superset of information that can be losslessly transformed into the formats required by existing agent frameworks. CUA-Suite further provides two complementary resources: UI-Vision, a rigorous benchmark for evaluating grounding and planning capabilities in CUAs, and GroundCUA, a large-scale grounding dataset with 56K annotated screenshots and over 3.6 million UI element annotations. Preliminary evaluation reveals that current foundation action models struggle substantially with professional desktop applications (~60% task failure rate). Beyond evaluation, CUA-Suite's rich multimodal corpus supports emerging research directions including generalist screen parsing, continuous spatial control, video-based reward modeling, and visual world models. All data and models are publicly released.", 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '8d64e1ca235ed22b', 'authors': ['Xiangru Jian', 'Shravan Nayak', 'Kevin Qinghong Lin', 'Aarash Feizi', 'Kaixin Li', 'Patrice Bechard', 'Spandana Gella', 'Sai Rajeswar'], 'affiliations': ['McGill University', 'Mila', 'National University of Singapore', 'ServiceNow', 'Universite de Montreal', 'University of Oxford', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2603.24440.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Непрерывное видео вместо скриншотов — путь к более сильным агентам автоматизации', 'desc': 'CUA-Suite представляет большой набор данных из видео-демонстраций экспертов для обучения агентов компьютерного зрения, которые автоматизируют сложные задачи на рабочем столе. Ключевое отличие от предыдущих датасетов — использование непрерывных видео-потоков с разрешением 30 fps вместо отдельных скриншотов, что позволяет сохранить полную временную динамику взаимодействия человека с интерфейсом. Набор включает примерно 10 тысяч задач с детальными аннотациями рассуждений, трассировками курсора и охватывает 87 различных приложений, всего около 55 часов видео и 6 миллионов кадров. CUA-Suite также предоставляет бенчмарки для оценки способностей агентов к локализации UI-элементов и планированию, показывая, что современные модели имеют высокий уровень ошибок на профессиональных приложениях.'}, 'en': {'title': 'Empowering Desktop Automation with Continuous Video Insights', 'desc': 'CUA-Suite is a comprehensive resource designed to enhance the capabilities of computer-use agents (CUAs) through a large collection of expert video demonstrations and detailed annotations. It addresses the limitations of existing datasets by providing approximately 10,000 continuous video recordings of human interactions across 87 applications, totaling around 55 hours of footage. This dataset allows for a better understanding of the temporal dynamics involved in desktop workflows, which is crucial for training effective automation agents. Additionally, CUA-Suite includes benchmarks and grounding datasets to evaluate and improve the performance of CUAs in real-world applications.'}, 'zh': {'title': 'CUA-Suite：提升桌面自动化的新生态', 'desc': 'CUA-Suite是一个大型生态系统，专注于计算机使用代理的专家视频演示和注释，旨在提升桌面自动化能力。该系统提供了约10,000个任务的连续视频录制，涵盖87个不同应用程序，包含约55小时的专家视频和600万帧数据。与传统的稀疏截图数据集不同，CUA-Suite的连续视频保留了人类交互的完整时间动态，能够为现有代理框架提供更丰富的信息。CUA-Suite还包括评估CUA能力的基准和大规模注释数据集，支持多种研究方向。'}}}, {'id': 'https://huggingface.co/papers/2603.23478', 'title': 'UniFunc3D: Unified Active Spatial-Temporal Grounding for 3D Functionality Segmentation', 'url': 'https://huggingface.co/papers/2603.23478', 'abstract': 'Abstract UniFunc3D enables 3D scene functionality segmentation by treating multimodal large language models as active observers that perform joint semantic, temporal, and spatial reasoning through adaptive frame selection.  AI-generated summary Functionality segmentation in 3D scenes requires an agent to ground implicit natural-language instructions into precise masks of fine-grained interactive elements. Existing methods rely on fragmented pipelines that suffer from visual blindness during initial task parsing. We observe that these methods are limited by single-scale, passive and heuristic frame selection. We present UniFunc3D, a unified and training-free framework that treats the multimodal large language model as an active observer. By consolidating semantic, temporal, and spatial reasoning into a single forward pass, UniFunc3D performs joint reasoning to ground task decomposition in direct visual evidence. Our approach introduces active spatial-temporal grounding with a coarse-to-fine strategy. This allows the model to select correct video frames adaptively and focus on high-detail interactive parts while preserving the global context necessary for disambiguation. On SceneFun3D, UniFunc3D achieves state-of-the-art performance, surpassing both training-free and training-based methods by a large margin with a relative 59.9\\% mIoU improvement, without any task-specific training. Code will be released on our project page: https://jiaying.link/unifunc3d.', 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-24', 'pub_date_card': {'ru': '24 марта', 'en': 'March 24', 'zh': '3月24日'}, 'hash': '057e1ce6ae3956ae', 'authors': ['Jiaying Lin', 'Dan Xu'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.23478.jpg', 'data': {'categories': ['#3d', '#agents', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Мультимодальный LLM как активный наблюдатель для понимания функциональности 3D-сцен', 'desc': 'UniFunc3D представляет собой единый фреймворк для сегментации функциональности в 3D-сценах, который использует мультимодальные большие языковые модели в качестве активных наблюдателей. Метод выполняет совместное семантическое, временное и пространственное рассуждение через адаптивный выбор кадров видео, работая без обучения на конкретной задаче. Подход использует стратегию "от грубого к точному" для селективного внимания к высокодетальным интерактивным элементам при сохранении глобального контекста сцены. На датасете SceneFun3D метод достигает лучших результатов, превосходя существующие методы как с обучением, так и без него на 59.9% по метрике mIoU.'}, 'en': {'title': 'Revolutionizing 3D Scene Segmentation with Active Language Models', 'desc': 'UniFunc3D is a novel framework that enhances 3D scene functionality segmentation by leveraging multimodal large language models as active observers. It integrates semantic, temporal, and spatial reasoning in a single forward pass, allowing for effective grounding of natural-language instructions into precise interactive element masks. Unlike traditional methods that use fragmented pipelines and suffer from visual limitations, UniFunc3D employs a coarse-to-fine strategy for adaptive frame selection, focusing on detailed interactive components while maintaining overall context. This approach leads to significant performance improvements, achieving state-of-the-art results on the SceneFun3D dataset without requiring task-specific training.'}, 'zh': {'title': 'UniFunc3D：3D场景功能分割的新方法', 'desc': 'UniFunc3D 是一个用于 3D 场景功能分割的框架，它将多模态大语言模型视为主动观察者，通过自适应帧选择进行联合语义、时间和空间推理。该方法解决了现有技术在任务解析过程中存在的视觉盲点问题，避免了单一尺度、被动和启发式的帧选择限制。UniFunc3D 通过将语义、时间和空间推理整合到单次前向传播中，实现了任务分解与直接视觉证据的结合。该框架在 SceneFun3D 数据集上表现优异，超越了现有的训练和非训练方法，取得了 59.9% 的相对 mIoU 改进。'}}}, {'id': 'https://huggingface.co/papers/2603.23539', 'title': 'PLDR-LLMs Reason At Self-Organized Criticality', 'url': 'https://huggingface.co/papers/2603.23539', 'abstract': "Abstract PLDR-LLMs exhibit reasoning capabilities at self-organized criticality through metastable steady states that mirror second-order phase transitions, enabling generalization without benchmark evaluation.  AI-generated summary We show that PLDR-LLMs pretrained at self-organized criticality exhibit reasoning at inference time. The characteristics of PLDR-LLM deductive outputs at criticality is similar to second-order phase transitions. At criticality, the correlation length diverges, and the deductive outputs attain a metastable steady state. The steady state behaviour suggests that deductive outputs learn representations equivalent to scaling functions, universality classes and renormalization groups from the training dataset, leading to generalization and reasoning capabilities in the process. We can then define an order parameter from the global statistics of the model's deductive output parameters at inference. The reasoning capabilities of a PLDR-LLM is better when its order parameter is close to zero at criticality. This observation is supported by the benchmark scores of the models trained at near-criticality and sub-criticality. Our results provide a self-contained explanation on how reasoning manifests in large language models, and the ability to reason can be quantified solely from global model parameter values of the deductive outputs at steady state, without any need for evaluation of curated benchmark datasets through inductive output for reasoning and comprehension.", 'score': 1, 'issue_id': 1664, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '25e868f3b46697cf', 'authors': ['Burc Gokden'], 'affiliations': ['Fromthesky Research Labs LLC'], 'pdf_title_img': 'assets/pdf/title_img/2603.23539.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Рассуждение в языковых моделях через линзу физической критичности', 'desc': 'Исследование показывает, что большие языковые модели (LLM), обученные при самоорганизованной критичности, проявляют способности к рассуждению во время инференса. Характеристики выходных данных моделей при критичности демонстрируют сходство со второй фазовой переходной точкой, где корреляционная длина расходится и выходные данные достигают метастабильного стационарного состояния. Модель обучается представлениям, эквивалентным функциям масштабирования и универсальным классам, что обеспечивает способность к обобщению и рассуждению. Способность модели к рассуждению можно количественно оценить через параметр порядка глобальной статистики выходных параметров, без необходимости оценки на справочных наборах данных.'}, 'en': {'title': 'Reasoning at the Edge of Chaos: PLDR-LLMs Unleashed', 'desc': "This paper discusses how PLDR-LLMs (Pretrained Large Deep Reinforcement Learning Models) can reason effectively when they operate at a state known as self-organized criticality. At this critical point, the model's outputs resemble behaviors seen in physical systems undergoing second-order phase transitions, where small changes can lead to significant effects. The authors demonstrate that the model's reasoning capabilities improve when its order parameter is near zero, indicating a stable state of output. Importantly, the paper suggests that these reasoning abilities can be assessed using the model's global output statistics, eliminating the need for traditional benchmark evaluations."}, 'zh': {'title': '自组织临界性下的推理能力', 'desc': 'PLDR-LLM模型在自组织临界性下展现出推理能力，类似于二阶相变的特征。模型的推理输出在临界状态下达到一种亚稳态，表明其学习到的表示与缩放函数和重整化群相当。通过定义全局统计量的秩序参数，可以量化模型的推理能力，发现当秩序参数接近零时，推理效果最佳。我们的研究为大型语言模型的推理机制提供了自洽的解释，表明推理能力可以仅通过模型参数的全局值来量化，而无需依赖于特定的基准数据集。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (7)', '#agi', '#alignment', '#architecture', '#audio', '#benchmark (7)', '#cv', '#data', '#dataset (6)', '#diffusion', '#ethics', '#games (1)', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual', '#multimodal (8)', '#open_source (1)', '#optimization', '#plp', '#rag', '#reasoning (4)', '#rl (1)', '#rlhf (1)', '#robotics (2)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (4)', '#transfer_learning', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-26 04:27',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-26 04:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-26 04:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
