    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.21686', 'title': 'WorldMark: A Unified Benchmark Suite for Interactive Video World Models', 'url': 'https://huggingface.co/papers/2604.21686', 'abstract': "Abstract WorldMark establishes a standardized benchmark for evaluating interactive video generation models with unified controls, identical scenarios, and comprehensive evaluation metrics across multiple model architectures.  AI-generated summary Interactive video generation models such as Genie, YUME, HY-World, and Matrix-Game are advancing rapidly, yet every model is evaluated on its own benchmark with private scenes and trajectories, making fair cross-model comparison impossible. Existing public benchmarks offer useful metrics such as trajectory error, aesthetic scores, and VLM-based judgments, but none supplies the standardized test conditions -- identical scenes, identical action sequences, and a unified control interface -- needed to make those metrics comparable across models with heterogeneous inputs. We introduce WorldMark, the first benchmark that provides such a common playing field for interactive Image-to-Video world models. WorldMark contributes: (1) a unified action-mapping layer that translates a shared WASD-style action vocabulary into each model's native control format, enabling apples-to-apples comparison across six major models on identical scenes and trajectories; (2) a hierarchical test suite of 500 evaluation cases covering first- and third-person viewpoints, photorealistic and stylized scenes, and three difficulty tiers from Easy to Hard spanning 20-60s; and (3) a modular evaluation toolkit for Visual Quality, Control Alignment, and World Consistency, designed so that researchers can reuse our standardized inputs while plugging in their own metrics as the field evolves. We will release all data, evaluation code, and model outputs to facilitate future research. Beyond offline metrics, we launch World Model Arena (warena.ai), an online platform where anyone can pit leading world models against each other in side-by-side battles and watch the live leaderboard.", 'score': 28, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '7468e3753c61b0bf', 'authors': ['Xiaojie Xu', 'Zhengyuan Lin', 'Kang He', 'Yukang Feng', 'Xiaofeng Mao', 'Yuanyang Yin', 'Kaipeng Zhang', 'Yongtao Ge'], 'affiliations': ['Alaya Studio, Shanda AI Research Tokyo', 'Shanghai Innovation Institute', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.21686.jpg', 'data': {'categories': ['#multimodal', '#video', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Единый стандарт для честного сравнения моделей видеогенерирования', 'desc': 'Статья представляет WorldMark — первый стандартизированный бенчмарк для справедливого сравнения моделей интерактивного видеогенерирования. Авторы предлагают унифицированный интерфейс управления, который переводит общую WASD-схему действий в собственные форматы каждой модели, обеспечивая корректное сравнение на идентичных сценах и траекториях. Бенчмарк включает иерархическую тестовую коллекцию из 500 случаев оценки с различными точками зрения, стилями сцен и уровнями сложности. Авторы также предоставляют модульный инструмент оценки для анализа визуального качества, согласованности управления и консистентности виртуального мира, позволяя исследователям расширять метрики по мере развития области.'}, 'en': {'title': 'WorldMark: Standardizing Interactive Video Model Evaluation', 'desc': 'WorldMark is a new benchmark designed to evaluate interactive video generation models in a standardized way. It addresses the issue of inconsistent evaluation by providing identical scenarios and unified controls for various models like Genie and YUME. The benchmark includes a comprehensive test suite with 500 cases and a modular evaluation toolkit that allows researchers to assess visual quality and control alignment. Additionally, WorldMark features an online platform for real-time comparisons of different models, promoting fair competition and collaboration in the field.'}, 'zh': {'title': 'WorldMark：交互式视频生成模型的公平评估基准', 'desc': 'WorldMark是一个标准化的基准，用于评估交互式视频生成模型，提供统一的控制、相同的场景和全面的评估指标。它解决了不同模型在各自私有基准上评估的问题，使得跨模型比较变得公平可行。WorldMark包括一个统一的动作映射层，能够将共享的动作词汇转换为各模型的控制格式，并提供500个评估案例，涵盖不同视角和难度等级。该基准还配备了模块化评估工具包，支持视觉质量、控制一致性和世界一致性等多种评估，促进未来研究的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.19734', 'title': 'UniT: Toward a Unified Physical Language for Human-to-Humanoid Policy Learning and World Modeling', 'url': 'https://huggingface.co/papers/2604.19734', 'abstract': 'Abstract UniT enables human-to-humanoid transfer by creating a unified visual-language representation that bridges kinematic differences through cross-reconstruction mechanisms and shared latent spaces.  AI-generated summary Scaling humanoid foundation models is bottlenecked by the scarcity of robotic data. While massive egocentric human data offers a scalable alternative, bridging the cross-embodiment chasm remains a fundamental challenge due to kinematic mismatches. We introduce UniT (Unified Latent Action Tokenizer via Visual Anchoring), a framework that establishes a unified physical language for human-to-humanoid transfer. Grounded in the philosophy that heterogeneous kinematics share universal visual consequences, UniT employs a tri-branch cross-reconstruction mechanism: actions predict vision to anchor kinematics to physical outcomes, while vision reconstructs actions to filter out irrelevant visual confounders. Concurrently, a fusion branch synergies these purified modalities into a shared discrete latent space of embodiment-agnostic physical intents. We validate UniT across two paradigms: 1) Policy Learning (VLA-UniT): By predicting these unified tokens, it effectively leverages diverse human data to achieve state-of-the-art data efficiency and robust out-of-distribution (OOD) generalization on both humanoid simulation benchmark and real-world deployments, notably demonstrating zero-shot task transfer. 2) World Modeling (WM-UniT): By aligning cross-embodiment dynamics via unified tokens as conditions, it realizes direct human-to-humanoid action transfer. This alignment ensures that human data seamlessly translates into enhanced action controllability for humanoid video generation. Ultimately, by inducing a highly aligned cross-embodiment representation (empirically verified by t-SNE visualizations revealing the convergence of human and humanoid features into a shared manifold), UniT offers a scalable path to distill vast human knowledge into general-purpose humanoid capabilities.', 'score': 25, 'issue_id': 2033, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '3e445aed9cb01035', 'authors': ['Boyu Chen', 'Yi Chen', 'Lu Qiu', 'Jerry Bai', 'Yuying Ge', 'Yixiao Ge'], 'affiliations': ['The University of Hong Kong', 'Tsinghua University', 'XPENG Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2604.19734.jpg', 'data': {'categories': ['#multimodal', '#training', '#transfer_learning', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Единый язык действий для передачи навыков от человека к роботу', 'desc': 'Работа представляет UniT — фреймворк для передачи навыков от человека к гуманоидному роботу путём создания единого представления на основе визуального якоря. Система использует механизм кросс-реконструкции с тремя ветвями: действия предсказывают визуальные последствия, зрение восстанавливает действия, а слияние ветвей создает общее дискретное латентное пространство с независимой от кинематики физической семантикой. Подход валидирован в двух парадигмах — обучение политики (VLA-UniT) показывает лучшую выборочную эффективность и обобщение за пределами распределения, включая нулевой трансфер задач, а мировое моделирование (WM-UniT) реализует прямую трансферу человеческих действий на гуманоидов. Через выравнивание кросс-воплощённой динамики в едином скрытом пространстве метод демонстрирует масштабируемый путь для дистилляции человеческих знаний в общие возможности гуманоидных систем.'}, 'en': {'title': 'Bridging Human and Humanoid Actions with UniT', 'desc': 'The paper introduces UniT, a framework designed to facilitate the transfer of knowledge from humans to humanoid robots by creating a unified visual-language representation. It addresses the challenge of kinematic differences between humans and humanoids through a tri-branch cross-reconstruction mechanism that aligns actions with visual outcomes. By leveraging large amounts of human data, UniT enhances data efficiency and generalization in policy learning and world modeling tasks. The framework ultimately enables seamless action transfer from humans to humanoids, allowing for improved control in humanoid video generation.'}, 'zh': {'title': '统一人类与类人机器人能力的桥梁', 'desc': 'UniT（统一潜在动作标记器）通过创建统一的视觉-语言表示，解决了人类与类人机器人之间的转移问题。该框架利用三分支交叉重建机制，将人类的动作与类人机器人的运动联系起来，从而克服运动学差异带来的挑战。UniT在政策学习和世界建模两个范式中进行了验证，展示了其在数据效率和任务转移方面的优越性。最终，UniT为将人类知识转化为通用类人机器人能力提供了一条可扩展的路径。'}}}, {'id': 'https://huggingface.co/papers/2604.21689', 'title': 'StyleID: A Perception-Aware Dataset and Metric for Stylization-Agnostic Facial Identity Recognition', 'url': 'https://huggingface.co/papers/2604.21689', 'abstract': 'Abstract StyleID presents a human perception-aware dataset and evaluation framework for facial identity preservation under stylization, featuring two datasets derived from psychometric experiments and calibrated semantic encoders that improve correlation with human judgments.  AI-generated summary Creative face stylization aims to render portraits in diverse visual idioms such as cartoons, sketches, and paintings while retaining recognizable identity. However, current identity encoders, which are typically trained and calibrated on natural photographs, exhibit severe brittleness under stylization. They often mistake changes in texture or color palette for identity drift or fail to detect geometric exaggerations. This reveals the lack of a style-agnostic framework to evaluate and supervise identity consistency across varying styles and strengths. To address this gap, we introduce StyleID, a human perception-aware dataset and evaluation framework for facial identity under stylization. StyleID comprises two datasets: (i) StyleBench-H, a benchmark that captures human same-different verification judgments across diffusion- and flow-matching-based stylization at multiple style strengths, and (ii) StyleBench-S, a supervision set derived from psychometric recognition-strength curves obtained through controlled two-alternative forced-choice (2AFC) experiments. Leveraging StyleBench-S, we fine-tune existing semantic encoders to align their similarity orderings with human perception across styles and strengths. Experiments demonstrate that our calibrated models yield significantly higher correlation with human judgments and enhanced robustness for out-of-domain, artist drawn portraits. All of our datasets, code, and pretrained models are publicly available at https://kwanyun.github.io/StyleID_page/', 'score': 15, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': 'abe412be358fe172', 'authors': ['Kwan Yun', 'Changmin Lee', 'Ayeong Jeong', 'Youngseo Kim', 'Seungmi Lee', 'Junyong Noh'], 'affiliations': ['KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2604.21689.jpg', 'data': {'categories': ['#multimodal', '#cv', '#dataset', '#benchmark', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Сохранение личности в стилизованных портретах через восприятие человека', 'desc': 'В статье представлен набор данных StyleID и методология оценки сохранения личности человека при стилизации лиц, основанные на психометрических экспериментах с участием людей. Авторы выявили проблему существующих энкодеров идентичности, которые плохо работают при преобразовании портретов в различные стили (мультфильмы, эскизы, живопись), путая изменения текстуры и цвета с изменением личности. Они создали два набора данных: StyleBench-H для сравнения человеческих суждений о сходстве при разных уровнях стилизации и StyleBench-S из контролируемых психометрических экспериментов. Используя эти данные, исследователи дообучили семантические энкодеры для лучшего соответствия человеческому восприятию и достигли значительного улучшения корреляции с оценками людей.'}, 'en': {'title': 'Preserving Identity in Artistic Stylization with StyleID', 'desc': 'The paper introduces StyleID, a new dataset and evaluation framework designed to maintain facial identity during artistic stylization. It highlights the limitations of current identity encoders, which struggle to accurately recognize faces when their visual styles change. By creating two datasets, StyleBench-H and StyleBench-S, the authors provide tools for evaluating and improving the performance of these encoders based on human perception. The results show that their approach significantly enhances the correlation between machine outputs and human judgments, making it more effective for stylized portraits.'}, 'zh': {'title': '风格化中的身份保持：StyleID框架', 'desc': '本文介绍了StyleID，一个关注人类感知的面部身份保持数据集和评估框架，旨在解决在风格化过程中面部身份的一致性问题。StyleID包含两个数据集：StyleBench-H用于捕捉人类在不同风格强度下的同异验证判断，StyleBench-S则通过心理测量实验获得的识别强度曲线来提供监督。通过对现有语义编码器进行微调，StyleID提高了与人类感知的一致性，增强了模型在不同风格和强度下的鲁棒性。实验结果表明，经过校准的模型在与人类判断的相关性上显著提高，适用于艺术家绘制的肖像。'}}}, {'id': 'https://huggingface.co/papers/2604.21931', 'title': 'Seeing Fast and Slow: Learning the Flow of Time in Videos', 'url': 'https://huggingface.co/papers/2604.21931', 'abstract': 'Abstract Video speed manipulation and perception models are developed through self-supervised temporal reasoning, enabling speed detection, slow-motion video generation, and temporal super-resolution from in-the-wild sources.  AI-generated summary How can we tell whether a video has been sped up or slowed down? How can we generate videos at different speeds? Although videos have been central to modern computer vision research, little attention has been paid to perceiving and controlling the passage of time. In this paper, we study time as a learnable visual concept and develop models for reasoning about and manipulating the flow of time in videos. We first exploit the multimodal cues and temporal structure naturally present in videos to learn, in a self-supervised manner, to detect speed changes and estimate playback speed. We then show that these learned temporal reasoning models enable us to curate the largest slow-motion video dataset to date from noisy in-the-wild sources. Such slow-motion footage, typically filmed by high-speed cameras, contains substantially richer temporal detail than standard videos. Using this data, we further develop models capable of temporal control, including speed-conditioned video generation, which produces motion at specified playback speed, and temporal super-resolution, which tranforms low-FPS, blurry videos into high-FPS sequences with fine-grained temporal details. Our findings highlight time as a manipulable, perceptual dimension in video learning, opening doors to temporally controllable video generation, temporal forensics detection, and potentially richer world-models that understand how events unfold over time.', 'score': 12, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '224095e4ec05c6e0', 'authors': ['Yen-Siang Wu', 'Rundong Luo', 'Jingsen Zhu', 'Tao Tu', 'Ali Farhadi', 'Matthew Wallingford', 'Yu-Chiang Frank Wang', 'Steve Marschner', 'Wei-Chiu Ma'], 'affiliations': ['Cornell University', 'National Taiwan University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.21931.jpg', 'data': {'categories': ['#dataset', '#video', '#training'], 'emoji': '⏱️', 'ru': {'title': 'Время как управляемое измерение: от обнаружения скорости к управляемой генерации видео', 'desc': 'В этой работе исследуется время как обучаемое визуальное понятие в видео с использованием самоконтролируемого обучения. Авторы разработали модели для обнаружения изменений скорости воспроизведения и оценки темпа видео, используя мультимодальные сигналы и временную структуру. На основе этих моделей они создали крупнейший датасет видео в замедленном режиме из реальных источников и разработали методы временного контроля, включая условную генерацию видео и временную суперразрешающую способность. Работа открывает новые возможности для управления временем в видео, обнаружения манипуляций и создания более богатых моделей мира, понимающих развитие событий во времени.'}, 'en': {'title': 'Mastering Time: Manipulating Video Speed with AI', 'desc': 'This paper introduces models that can understand and manipulate the speed of videos using self-supervised learning techniques. It focuses on detecting changes in playback speed and generating slow-motion videos from various sources. By leveraging the natural temporal structure in videos, the authors create a large dataset of slow-motion footage, which is richer in detail than standard videos. The research paves the way for advanced applications in video generation and analysis, allowing for precise control over temporal aspects in visual content.'}, 'zh': {'title': '操控视频时间，重塑视觉体验', 'desc': '本文研究了视频速度操控和感知模型，利用自监督的时间推理方法，能够检测视频速度变化、生成慢动作视频，并实现时间超分辨率。我们通过视频中的多模态线索和时间结构，自主学习速度变化的检测和播放速度的估计。研究表明，学习到的时间推理模型可以从噪声源中整理出最大的慢动作视频数据集，这些视频包含比标准视频更丰富的时间细节。最终，我们开发了能够进行时间控制的模型，包括基于速度的视频生成和时间超分辨率，将低帧率模糊视频转化为高帧率的细致序列。'}}}, {'id': 'https://huggingface.co/papers/2604.21889', 'title': 'TingIS: Real-time Risk Event Discovery from Noisy Customer Incidents at Enterprise Scale', 'url': 'https://huggingface.co/papers/2604.21889', 'abstract': 'Abstract TingIS is an enterprise-grade incident discovery system that uses multi-stage event linking with LLMs, cascaded routing, and noise reduction to efficiently identify critical issues from high-volume, noisy customer reports.  AI-generated summary Real-time detection and mitigation of technical anomalies are critical for large-scale cloud-native services, where even minutes of downtime can result in massive financial losses and diminished user trust. While customer incidents serve as a vital signal for discovering risks missed by monitoring, extracting actionable intelligence from this data remains challenging due to extreme noise, high throughput, and semantic complexity of diverse business lines. In this paper, we present TingIS, an end-to-end system designed for enterprise-grade incident discovery. At the core of TingIS is a multi-stage event linking engine that synergizes efficient indexing techniques with Large Language Models (LLMs) to make informed decisions on event merging, enabling the stable extraction of actionable incidents from just a handful of diverse user descriptions. This engine is complemented by a cascaded routing mechanism for precise business attribution and a multi-dimensional noise reduction pipeline that integrates domain knowledge, statistical patterns, and behavioral filtering. Deployed in a production environment handling a peak throughput of over 2,000 messages per minute and 300,000 messages per day, TingIS achieves a P90 alert latency of 3.5 minutes and a 95\\% discovery rate for high-priority incidents. Benchmarks constructed from real-world data demonstrate that TingIS significantly outperforms baseline methods in routing accuracy, clustering quality, and Signal-to-Noise Ratio.', 'score': 9, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '394b57f36e304d41', 'authors': ['Jun Wang', 'Ziyin Zhang', 'Rui Wang', 'Hang Yu', 'Peng Di', 'Rui Wang'], 'affiliations': ['Ant Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.21889.jpg', 'data': {'categories': [], 'emoji': '🚨', 'ru': {'title': 'LLM-powered система для интеллектуального обнаружения инцидентов в облачных сервисах', 'desc': 'TingIS — это производственная система для обнаружения инцидентов, которая использует многоэтапное связывание событий с помощью LLM для эффективного извлечения критических проблем из шумных отчетов пользователей. Система применяет техники индексирования вместе с большими языковыми моделями для принятия решений о слиянии событий и получения действенной информации из небольшого количества разнообразных описаний. Каскадный механизм маршрутизации обеспечивает точную атрибуцию бизнесу, а многомерный конвейер снижения шума интегрирует доменные знания и статистические паттерны. В боевых условиях система достигает задержки оповещения P90 в 3,5 минуты и обнаруживает 95% высокоприоритетных инцидентов при пиковой пропускной способности 2000 сообщений в минуту.'}, 'en': {'title': 'TingIS: Smart Incident Discovery for Enterprise Resilience', 'desc': 'TingIS is an advanced system designed to discover incidents in enterprise environments by linking events through multiple stages using Large Language Models (LLMs). It addresses the challenges of high-volume, noisy customer reports by employing efficient indexing and a cascaded routing mechanism for accurate business attribution. The system also incorporates a noise reduction pipeline that utilizes domain knowledge and statistical patterns to filter out irrelevant data. With impressive performance metrics, TingIS processes thousands of messages per minute while maintaining a high discovery rate for critical incidents, outperforming traditional methods in accuracy and quality.'}, 'zh': {'title': 'TingIS：高效的企业级事件发现系统', 'desc': 'TingIS是一个企业级的事件发现系统，利用多阶段事件链接和大语言模型（LLMs）来高效识别客户报告中的关键问题。该系统通过级联路由和噪声减少技术，能够从大量嘈杂的数据中提取出可操作的情报。TingIS在处理高达每分钟2000条消息的生产环境中，达到了3.5分钟的警报延迟和95%的高优先级事件发现率。实验证明，TingIS在路由准确性、聚类质量和信噪比方面显著优于基线方法。'}}}, {'id': 'https://huggingface.co/papers/2604.20244', 'title': 'Hybrid Policy Distillation for LLMs', 'url': 'https://huggingface.co/papers/2604.20244', 'abstract': 'Abstract Hybrid Policy Distillation combines forward and reverse KL divergence approaches to improve knowledge distillation stability and efficiency across different model sizes and tasks.  AI-generated summary Knowledge distillation (KD) is a powerful paradigm for compressing large language models (LLMs), whose effectiveness depends on intertwined choices of divergence direction, optimization strategy, and data regime. We break down the design of existing KD methods and present a unified view that establishes connections between them, reformulating KD as a reweighted log-likelihood objective at the token level. We further propose Hybrid Policy Distillation (HPD), which integrates the complementary advantages of forward and reverse KL to balance mode coverage and mode-seeking, and combines off-policy data with lightweight, approximate on-policy sampling. We validate HPD on long-generation math reasoning as well as short-generation dialogue and code tasks, demonstrating improved optimization stability, computational efficiency, and final performance across diverse model families and scales. The code related to this work is available at https://github.com/zwhong714/Hybrid-Policy-Distillation.', 'score': 8, 'issue_id': 2034, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '66f29026f0fa7658', 'authors': ['Wenhong Zhu', 'Ruobing Xie', 'Rui Wang', 'Pengfei Liu'], 'affiliations': ['Department of Computer Science and Engineering, Shanghai Jiao Tong University', 'Large Language Department, Tencent', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.20244.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Гибридный подход к дистилляции: баланс между охватом и точностью', 'desc': 'Гибридная дистилляция политики (HPD) объединяет прямую и обратную дивергенцию Кульбака-Лейблера для улучшения стабильности и эффективности передачи знаний от больших языковых моделей к меньшим. Авторы переформулировали дистилляцию знаний как взвешенную задачу максимизации правдоподобия на уровне токенов и установили единообразное представление существующих методов. Предложенный метод HPD комбинирует преимущества прямой KL дивергенции (полнота мод) и обратной KL (концентрация на сильных модах), а также интегрирует оффлайновые данные с приблизительной онлайновой выборкой. Экспериментальные результаты на задачах математического рассуждения, диалога и генерации кода показывают улучшение стабильности обучения, вычислительной эффективности и итогового качества моделей.'}, 'en': {'title': 'Enhancing Knowledge Distillation with Hybrid Policy Distillation', 'desc': 'This paper introduces Hybrid Policy Distillation (HPD), a new method for knowledge distillation that enhances the stability and efficiency of training across various model sizes and tasks. It combines forward and reverse KL divergence approaches to optimize the learning process, allowing for better model performance. The authors reformulate knowledge distillation as a reweighted log-likelihood objective, which helps in understanding the connections between existing methods. HPD is validated through experiments on different tasks, showing improvements in optimization stability and computational efficiency.'}, 'zh': {'title': '混合策略蒸馏：提升知识蒸馏的稳定性与效率', 'desc': '混合策略蒸馏（HPD）结合了前向和反向KL散度的方法，以提高知识蒸馏在不同模型大小和任务中的稳定性和效率。知识蒸馏是一种强大的压缩大型语言模型的范式，其效果依赖于散度方向、优化策略和数据模式的选择。我们对现有的知识蒸馏方法进行了分析，并提出了一种统一的视角，将其重新表述为基于标记的加权对数似然目标。通过在长生成数学推理和短生成对话及代码任务上验证HPD，我们展示了其在优化稳定性、计算效率和最终性能方面的提升。'}}}, {'id': 'https://huggingface.co/papers/2604.20987', 'title': 'Co-Evolving LLM Decision and Skill Bank Agents for Long-Horizon Tasks', 'url': 'https://huggingface.co/papers/2604.20987', 'abstract': 'Abstract A co-evolution framework enables large language models to discover, retain, and reuse structured skills across episodes in long-horizon interactive environments through a learnable skill bank and skill pipeline.  AI-generated summary Long horizon interactive environments are a testbed for evaluating agents skill usage abilities. These environments demand multi step reasoning, the chaining of multiple skills over many timesteps, and robust decision making under delayed rewards and partial observability. Games are a good testbed for evaluating agent skill usage in environments. Large Language Models (LLMs) offer a promising alternative as game playing agents, but they often struggle with consistent long horizon decision making because they lack a mechanism to discover, retain, and reuse structured skills across episodes. We present COSPLAY, a co evolution framework in which an LLM decision agent retrieves skills from a learnable skill bank to guide action taking, while an agent managed skill pipeline discovers reusable skills from the agents unlabeled rollouts to form a skill bank. Our framework improves both the decision agent to learn better skill retrieval and action generation, while the skill bank agent continually extracts, refines, and updates skills together with their contracts. Experiments across six game environments show that COSPLAY with an 8B base model achieves over 25.1 percent average reward improvement against four frontier LLM baselines on single player game benchmarks while remaining competitive on multi player social reasoning games.', 'score': 6, 'issue_id': 2033, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '7fafd0a10efdbda2', 'authors': ['Xiyang Wu', 'Zongxia Li', 'Guangyao Shi', 'Alexander Duffy', 'Tyler Marques', 'Matthew Lyle Olson', 'Tianyi Zhou', 'Dinesh Manocha'], 'affiliations': ['Good Start Labs', 'Independent Researcher', 'Mohamed bin Zayed University of Artificial Intelligence', 'University of Maryland', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2604.20987.jpg', 'data': {'categories': ['#benchmark', '#rl', '#games', '#agents', '#reasoning'], 'emoji': '🎮', 'ru': {'title': 'Совместная эволюция навыков для долгосрочного планирования в языковых моделях', 'desc': 'В статье представлена система COSPLAY, которая использует совместную эволюцию для обучения больших языковых моделей (LLM) открывать и переиспользовать структурированные навыки в долгосрочных интерактивных окружениях. Основная идея заключается в том, что агент-решатель извлекает навыки из обучаемого банка навыков для принятия решений, а другой агент автоматически обнаруживает и накапливает переиспользуемые навыки из неразмеченных траекторий. Фреймворк одновременно улучшает способность агента к извлечению навыков и генерированию действий, а также позволяет банку навыков постоянно извлекать и уточнять новые навыки с их спецификациями. Экспериментальная оценка на шести игровых окружениях показала, что система достигает улучшения среднего вознаграждения на 25.1% по сравнению с передовыми LLM-моделями на однопользовательских тестах.'}, 'en': {'title': 'Empowering LLMs with Skill Discovery and Reuse for Better Decision Making', 'desc': 'This paper introduces COSPLAY, a co-evolution framework designed to enhance large language models (LLMs) in long-horizon interactive environments, such as games. The framework allows LLMs to discover, retain, and reuse structured skills through a learnable skill bank and a skill pipeline, improving their decision-making capabilities. By enabling multi-step reasoning and skill chaining, COSPLAY helps agents make better decisions under conditions of delayed rewards and partial observability. Experimental results demonstrate that COSPLAY significantly improves performance in single-player games while maintaining competitiveness in multiplayer scenarios.'}, 'zh': {'title': 'COSPLAY：提升长时间决策能力的共进化框架', 'desc': '本文提出了一种名为COSPLAY的共进化框架，旨在帮助大型语言模型（LLM）在长时间交互环境中发现、保留和重用结构化技能。该框架通过一个可学习的技能库和技能管道，使得决策代理能够从技能库中检索技能来指导行动，同时技能管道从未标记的回合中发现可重用的技能。实验表明，COSPLAY在六个游戏环境中表现出色，相较于四个前沿LLM基线，平均奖励提升超过25.1%。该方法不仅提高了决策代理的技能检索和行动生成能力，还使技能库代理能够持续提取、精炼和更新技能。'}}}, {'id': 'https://huggingface.co/papers/2604.10268', 'title': 'EditCrafter: Tuning-free High-Resolution Image Editing via Pretrained Diffusion Model', 'url': 'https://huggingface.co/papers/2604.10268', 'abstract': 'Abstract EditCrafter enables high-resolution image editing using pretrained text-to-image diffusion models through tiled inversion and noise-damped manifold-constrained guidance without requiring model tuning.  AI-generated summary We propose EditCrafter, a high-resolution image editing method that operates without tuning, leveraging pretrained text-to-image (T2I) diffusion models to process images at resolutions significantly exceeding those used during training. Leveraging the generative priors of large-scale T2I diffusion models enables the development of a wide array of novel generation and editing applications. Although numerous image editing methods have been proposed based on diffusion models and exhibit high-quality editing results, they are difficult to apply to images with arbitrary aspect ratios or higher resolutions since they only work at the training resolutions (512x512 or 1024x1024). Naively applying patch-wise editing fails with unrealistic object structures and repetition. To address these challenges, we introduce EditCrafter, a simple yet effective editing pipeline. EditCrafter operates by first performing tiled inversion, which preserves the original identity of the input high-resolution image. We further propose a noise-damped manifold-constrained classifier-free guidance (NDCFG++) that is tailored for high resolution image editing from the inverted latent. Our experiments show that the our EditCrafter can achieve impressive editing results across various resolutions without fine-tuning and optimization.', 'score': 4, 'issue_id': 2035, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': 'e633bf75828ed9bf', 'authors': ['Kunho Kim', 'Sumin Seo', 'Yongjun Cho', 'Hyungjin Chung'], 'affiliations': ['EverEx', 'MAUM.AI', 'Medipixel, Inc.', 'NC AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.10268.jpg', 'data': {'categories': [], 'emoji': '✏️', 'ru': {'title': 'Редактирование изображений любого размера без переобучения модели', 'desc': 'EditCrafter — это метод редактирования изображений высокого разрешения, который использует предобученные диффузионные модели текст-в-изображение без необходимости дообучения модели. Ключевой компонент — мозаичная инверсия, которая сохраняет исходное содержимое входного изображения при работе с произвольными разрешениями. Авторы предлагают улучшенное руководство классификатора без свободы выбора с подавлением шума, которое специально адаптировано для редактирования высокого разрешения в пространстве латентных переменных. Метод демонстрирует впечатляющие результаты редактирования на изображениях различных разрешений без оптимизации и дополнительного обучения.'}, 'en': {'title': 'EditCrafter: High-Resolution Image Editing Made Easy', 'desc': 'EditCrafter is a novel method for high-resolution image editing that utilizes pretrained text-to-image diffusion models without the need for model tuning. It addresses the limitations of existing methods that struggle with arbitrary aspect ratios and higher resolutions by employing tiled inversion to maintain the original image identity. The approach incorporates noise-damped manifold-constrained classifier-free guidance (NDCFG++) to enhance editing quality in high-resolution contexts. Experiments demonstrate that EditCrafter achieves impressive results across various resolutions, making it a versatile tool for image generation and editing applications.'}, 'zh': {'title': '高分辨率图像编辑的新方法：EditCrafter', 'desc': 'EditCrafter是一种高分辨率图像编辑方法，利用预训练的文本到图像扩散模型进行处理，而无需对模型进行调优。该方法通过分块反演和噪声抑制的流形约束无分类器引导，实现了对高分辨率图像的编辑。与传统的扩散模型编辑方法不同，EditCrafter能够处理任意长宽比和更高分辨率的图像，避免了不切实际的物体结构和重复问题。实验结果表明，EditCrafter在不同分辨率下都能实现令人印象深刻的编辑效果。'}}}, {'id': 'https://huggingface.co/papers/2604.21904', 'title': 'UniGenDet: A Unified Generative-Discriminative Framework for Co-Evolutionary Image Generation and Generated Image Detection', 'url': 'https://huggingface.co/papers/2604.21904', 'abstract': 'Abstract A unified generative-discriminative framework is proposed that enables co-evolutionary image generation and detection through symbiotic attention mechanisms and unified fine-tuning algorithms.  AI-generated summary In recent years, significant progress has been made in both image generation and generated image detection. Despite their rapid, yet largely independent, development, these two fields have evolved distinct architectural paradigms: the former predominantly relies on generative networks, while the latter favors discriminative frameworks. A recent trend in both domains is the use of adversarial information to enhance performance, revealing potential for synergy. However, the significant architectural divergence between them presents considerable challenges. Departing from previous approaches, we propose UniGenDet: a Unified generative-discriminative framework for co-evolutionary image Generation and generated image Detection. To bridge the task gap, we design a symbiotic multimodal self-attention mechanism and a unified fine-tuning algorithm. This synergy allows the generation task to improve the interpretability of authenticity identification, while authenticity criteria guide the creation of higher-fidelity images. Furthermore, we introduce a detector-informed generative alignment mechanism to facilitate seamless information exchange. Extensive experiments on multiple datasets demonstrate that our method achieves state-of-the-art performance. Code: https://github.com/Zhangyr2022/UniGenDet{https://github.com/Zhangyr2022/UniGenDet}.', 'score': 3, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '57fece40d3e1b48e', 'authors': ['Yanran Zhang', 'Wenzhao Zheng', 'Yifei Li', 'Bingyao Yu', 'Yu Zheng', 'Lei Chen', 'Jiwen Lu', 'Jie Zhou'], 'affiliations': ['Department of Automation, Tsinghua University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.21904.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Когда генератор и детектор работают вместе', 'desc': 'Предложена единая генеративно-дискриминативная архитектура, которая объединяет задачи генерации изображений и детектирования сгенерированных изображений. Авторы разработали механизм мультимодального самовнимания (self-attention), который создает симбиотическую связь между генератором и детектором, позволяя им взаимно улучшать друг друга. Единый алгоритм тонкой настройки обеспечивает обмен информацией между двумя компонентами: генератор учится создавать более реалистичные изображения, а детектор совершенствует интерпретируемость при определении подлинности. Экспериментальные результаты на различных датасетах демонстрируют, что предложенный подход достигает лучшей производительности в обеих задачах.'}, 'en': {'title': 'Bridging Image Generation and Detection for Enhanced Performance', 'desc': 'This paper introduces a new framework called UniGenDet that combines image generation and detection using a unified approach. It leverages symbiotic attention mechanisms to enhance the interaction between generative and discriminative models, allowing them to evolve together. The framework includes a unified fine-tuning algorithm that improves the quality of generated images while also aiding in the detection of authenticity. Experimental results show that this method outperforms existing techniques in both tasks, demonstrating the benefits of integrating these two previously separate domains.'}, 'zh': {'title': '统一生成与判别：图像生成与检测的共生进化', 'desc': '本文提出了一种统一的生成-判别框架，旨在通过共生注意机制和统一微调算法实现图像生成与检测的共同进化。近年来，图像生成和生成图像检测领域取得了显著进展，但这两个领域的发展相对独立，架构差异明显。我们设计了一种共生的多模态自注意机制，以弥合这两个任务之间的差距，从而提高真实性识别的可解释性，同时生成更高保真度的图像。实验结果表明，我们的方法在多个数据集上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.21375', 'title': 'VLAA-GUI: Knowing When to Stop, Recover, and Search, A Modular Framework for GUI Automation', 'url': 'https://huggingface.co/papers/2604.21375', 'abstract': 'Abstract VLAA-GUI is a modular GUI agent framework that addresses early stopping and repetitive loop issues through integrated components for verification, loop breaking, and search capabilities.  AI-generated summary Autonomous GUI agents face two fundamental challenges: early stopping, where agents prematurely declare success without verifiable evidence, and repetitive loops, where agents cycle through the same failing actions without recovery. We present VLAA-GUI, a modular GUI agentic framework built around three integrated components that guide the system on when to Stop, Recover, and Search. First, a mandatory Completeness Verifier enforces UI-observable success criteria and verification at every finish step -- with an agent-level verifier that cross-examines completion claims with decision rules, rejecting those lacking direct visual evidence. Second, a mandatory Loop Breaker provides multi-tier filtering: switching interaction mode after repeated failures, forcing strategy changes after persistent screen-state recurrence, and binding reflection signals to strategy shifts. Third, an on-demand Search Agent searches online for unfamiliar workflows by directly querying a capable LLM with search ability, returning results as plain text. We additionally integrate a Coding Agent for code-intensive actions and a Grounding Agent for precise action grounding, both invoked on demand when required. We evaluate VLAA-GUI across five top-tier backbones, including Opus 4.5, 4.6 and Gemini 3.1 Pro, on two benchmarks with Linux and Windows tasks, achieving top performance on both (77.5% on OSWorld and 61.0% on WindowsAgentArena). Notably, three of the five backbones surpass human performance (72.4%) on OSWorld in a single pass. Ablation studies show that all three proposed components consistently improve a strong backbone, while a weaker backbone benefits more from these tools when the step budget is sufficient. Further analysis also shows that the Loop Breaker nearly halves wasted steps for loop-prone models.', 'score': 3, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '9a9fbf82b2f5201d', 'authors': ['Qijun Han', 'Haoqin Tu', 'Zijun Wang', 'Haoyue Dai', 'Yiyang Zhou', 'Nancy Lau', 'Alvaro A. Cardenas', 'Yuhui Xu', 'Ran Xu', 'Caiming Xiong', 'Zeyu Zheng', 'Huaxiu Yao', 'Yuyin Zhou', 'Cihang Xie'], 'affiliations': ['CMU', 'Salesforce', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2604.21375.jpg', 'data': {'categories': ['#agents', '#multimodal', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Надёжные GUI-агенты без сбоев и циклов', 'desc': 'VLAA-GUI — это модульная структура для агентов, управляющих графическим интерфейсом, которая решает проблемы преждевременной остановки и циклических действий. Система использует три ключевых компонента: проверитель полноты, который подтверждает успешное завершение по визуальным критериям, разработчик циклов, который предотвращает повторяющиеся попытки через смену стратегии, и поисковый агент, который находит информацию о незнакомых операциях. Фреймворк достигает высокой производительности на нескольких LLM-моделях, включая Opus и Gemini, превосходя человеческий уровень на 77,5% в OSWorld и 61% в WindowsAgentArena.'}, 'en': {'title': 'Enhancing GUI Agents with VLAA-GUI: Stop, Recover, and Search!', 'desc': 'The paper introduces VLAA-GUI, a modular framework designed to enhance the performance of autonomous GUI agents by addressing two main issues: early stopping and repetitive loops. It incorporates three key components: a Completeness Verifier that ensures agents only declare success when there is visual evidence, a Loop Breaker that alters strategies after repeated failures, and a Search Agent that queries a language model for new workflows. The framework was tested on various advanced models, achieving superior performance on benchmarks compared to human capabilities. The results indicate that the integrated components significantly reduce inefficiencies and improve the overall effectiveness of GUI agents.'}, 'zh': {'title': '解决早期停止与循环问题的智能代理框架', 'desc': 'VLAA-GUI是一个模块化的图形用户界面代理框架，旨在解决早期停止和重复循环的问题。该框架包含三个集成组件，分别负责验证、打破循环和搜索能力。首先，完整性验证器确保每个完成步骤都有可观察的成功标准，并通过决策规则交叉检查完成声明。其次，循环打破器通过多层过滤机制来应对重复失败，最后，搜索代理能够在线查询不熟悉的工作流程，提升系统的灵活性和效率。'}}}, {'id': 'https://huggingface.co/papers/2604.21921', 'title': 'Context Unrolling in Omni Models', 'url': 'https://huggingface.co/papers/2604.21921', 'abstract': 'Abstract Omni is a unified multimodal model trained on diverse data types that enables context unrolling for improved reasoning across heterogeneous modalities.  AI-generated summary We present Omni, a unified multimodal model natively trained on diverse modalities, including text, images, videos, 3D geometry, and hidden representations. We find that such training enables Context Unrolling, where the model explicitly reasons across multiple modal representations before producing predictions. This process enables the model to aggregate complementary information across heterogeneous modalities, facilitating a more faithful approximation of the shared multimodal knowledge manifold and improving downstream reasoning fidelity. As a result, Omni achieves strong performance on both multimodal generation and understanding benchmarks, while demonstrating advanced multimodal reasoning capabilities, including in-context generation of text, image, video, and 3D geometry.', 'score': 3, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '57d91536da6a9609', 'authors': ['Ceyuan Yang', 'Zhijie Lin', 'Yang Zhao', 'Fei Xiao', 'Hao He', 'Qi Zhao', 'Chaorui Deng', 'Kunchang Li', 'Zihan Ding', 'Yuwei Guo', 'Fuyun Wang', 'Fangqi Zhu', 'Xiaonan Nie', 'Shenhan Zhu', 'Shanchuan Lin', 'Hongsheng Li', 'Weilin Huang', 'Guang Shi', 'Haoqi Fan'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.21921.jpg', 'data': {'categories': ['#multimodal', '#video', '#benchmark', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Единая мультимодальная модель для глубокого понимания через явное рассуждение', 'desc': 'Omni — это унифицированная мультимодальная модель, обученная на разнообразных типах данных, включая текст, изображения, видео, 3D-геометрию и скрытые представления. Ключевая особенность модели — техника Context Unrolling, которая позволяет модели явно рассуждать о множественных модальных представлениях перед генерацией предсказаний. Этот подход позволяет агрегировать дополнительную информацию между различными модальностями, что приводит к более точной аппроксимации общего мультимодального знания. В результате Omni достигает высокой производительности как на задачах генерации и понимания мультимодальных данных, так и демонстрирует продвинутые способности рассуждения, включая внутриконтекстную генерацию текста, изображений, видео и 3D-геометрии.'}, 'en': {'title': 'Omni: Unifying Multimodal Reasoning for Enhanced AI Understanding', 'desc': 'The paper introduces Omni, a unified multimodal model that is trained on various data types such as text, images, videos, and 3D geometry. This model employs a technique called Context Unrolling, which allows it to reason across different modalities before making predictions. By aggregating information from these diverse sources, Omni enhances its understanding and generation capabilities. Consequently, it shows improved performance on multimodal tasks and demonstrates advanced reasoning skills across different formats.'}, 'zh': {'title': 'Omni：统一多模态推理的未来', 'desc': 'Omni是一种统一的多模态模型，能够处理文本、图像、视频、3D几何和隐藏表示等多种数据类型。通过对不同模态的训练，Omni实现了上下文展开，使模型能够在生成预测之前，跨多个模态表示进行推理。这个过程使模型能够聚合来自不同模态的互补信息，从而更准确地近似共享的多模态知识空间，提高了推理的准确性。最终，Omni在多模态生成和理解的基准测试中表现出色，展现了先进的多模态推理能力。'}}}, {'id': 'https://huggingface.co/papers/2604.20398', 'title': 'WebGen-R1: Incentivizing Large Language Models to Generate Functional and Aesthetic Websites with Reinforcement Learning', 'url': 'https://huggingface.co/papers/2604.20398', 'abstract': 'Abstract A reinforcement learning framework for project-level website generation that combines structured scaffolding with multimodal rewards to produce functional and aesthetically pleasing multi-page sites from small language models.  AI-generated summary While Large Language Models (LLMs) excel at function-level code generation, project-level tasks such as generating functional and visually aesthetic multi-page websites remain highly challenging. Existing works are often limited to single-page static websites, while agentic frameworks typically rely on multi-turn execution with proprietary models, leading to substantial token costs, high latency, and brittle integration. Training a small LLM end-to-end with reinforcement learning (RL) is a promising alternative, yet it faces a critical bottleneck in designing reliable and computationally feasible rewards for website generation. Unlike single-file coding tasks that can be verified by unit tests, website generation requires evaluating inherently subjective aesthetics, cross-page interactions, and functional correctness. To this end, we propose WebGen-R1, an end-to-end RL framework tailored for project-level website generation. We first introduce a scaffold-driven structured generation paradigm that constrains the large open-ended action space and preserves architectural integrity. We then design a novel cascaded multimodal reward that seamlessly couples structural guarantees with execution-grounded functional feedback and vision-based aesthetic supervision. Extensive experiments demonstrate that our WebGen-R1 substantially transforms a 7B base model from generating nearly nonfunctional websites into producing deployable, aesthetically aligned multi-page websites. Remarkably, our WebGen-R1 not only consistently outperforms heavily scaled open-source models (up to 72B), but also rivals the state-of-the-art DeepSeek-R1 (671B) in functional success, while substantially exceeding it in valid rendering and aesthetic alignment. These results position WebGen-R1 as a viable path for scaling small open models from function-level code generation to project-level web application generation.', 'score': 3, 'issue_id': 2034, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': 'a14a36e320efdda0', 'authors': ['Juyong Jiang', 'Chenglin Cai', 'Chansung Park', 'Jiasi Shen', 'Sunghun Kim', 'Jianguo Li', 'Yue Wang'], 'affiliations': ['Ant Group', 'Electronics and Telecommunications Research Institute', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2604.20398.jpg', 'data': {'categories': ['#training', '#agents', '#small_models', '#multimodal', '#rl'], 'emoji': '🌐', 'ru': {'title': 'Трансформация малых моделей в генераторы функциональных веб-сайтов через обучение с подкреплением', 'desc': 'В статье предлагается фреймворк обучения с подкреплением (RL) для генерации многостраничных веб-сайтов с использованием небольших языковых моделей. Авторы вводят парадигму структурированной генерации на основе скаффолдинга, которая ограничивает пространство действий и сохраняет архитектурную целостность. Они разработали каскадную мультимодальную функцию награды, которая объединяет структурные гарантии с функциональной обратной связью на основе выполнения кода и визуальной оценкой эстетики. Результаты показывают, что модель на 7B параметров, обученная предложенным методом, производит развёртываемые веб-приложения, превосходя гораздо более крупные модели.'}, 'en': {'title': 'Transforming Small Models into Web Generation Powerhouses', 'desc': 'This paper presents WebGen-R1, a reinforcement learning framework designed for generating multi-page websites using small language models. It addresses the challenges of project-level website generation by combining structured scaffolding with multimodal rewards, which helps ensure both functionality and aesthetic quality. The framework improves upon existing methods by providing a structured approach to action selection and a novel reward system that evaluates both functional correctness and visual appeal. Experimental results show that WebGen-R1 significantly enhances the capabilities of smaller models, enabling them to produce deployable and visually appealing websites, outperforming larger models in several key metrics.'}, 'zh': {'title': 'WebGen-R1：项目级网站生成的新路径', 'desc': '本文提出了一种用于项目级网站生成的强化学习框架WebGen-R1，结合了结构化支架和多模态奖励，能够从小型语言模型生成功能性和美观的多页面网站。与现有的单页面静态网站生成方法不同，WebGen-R1通过引入结构驱动的生成范式，限制了开放的动作空间，确保了网站的架构完整性。我们设计了一种新颖的级联多模态奖励，结合了结构保证、功能反馈和视觉美学监督，解决了网站生成中主观美学和跨页面交互的评估问题。实验结果表明，WebGen-R1显著提升了小型模型的生成能力，使其能够生成可部署的多页面网站，并在功能成功率和美学一致性上超越了现有的开源模型。'}}}, {'id': 'https://huggingface.co/papers/2604.21193', 'title': 'Trust but Verify: Introducing DAVinCI -- A Framework for Dual Attribution and Verification in Claim Inference for Language Models', 'url': 'https://huggingface.co/papers/2604.21193', 'abstract': 'Abstract DAVinCI is a dual attribution and verification framework that enhances factual reliability and interpretability of large language models by attributing claims to internal components and external sources while verifying them through entailment-based reasoning.  AI-generated summary Large Language Models (LLMs) have demonstrated remarkable fluency and versatility across a wide range of NLP tasks, yet they remain prone to factual inaccuracies and hallucinations. This limitation poses significant risks in high-stakes domains such as healthcare, law, and scientific communication, where trust and verifiability are paramount. In this paper, we introduce DAVinCI - a Dual Attribution and Verification framework designed to enhance the factual reliability and interpretability of LLM outputs. DAVinCI operates in two stages: (i) it attributes generated claims to internal model components and external sources; (ii) it verifies each claim using entailment-based reasoning and confidence calibration. We evaluate DAVinCI across multiple datasets, including FEVER and CLIMATE-FEVER, and compare its performance against standard verification-only baselines. Our results show that DAVinCI significantly improves classification accuracy, attribution precision, recall, and F1-score by 5-20%. Through an extensive ablation study, we isolate the contributions of evidence span selection, recalibration thresholds, and retrieval quality. We also release a modular DAVinCI implementation that can be integrated into existing LLM pipelines. By bridging attribution and verification, DAVinCI offers a scalable path to auditable, trustworthy AI systems. This work contributes to the growing effort to make LLMs not only powerful but also accountable.', 'score': 2, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '10eee6ebef889a25', 'authors': ['Vipula Rawte', 'Ryan Rossi', 'Franck Dernoncourt', 'Nedim Lipka'], 'affiliations': ['Adobe', 'Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.21193.jpg', 'data': {'categories': [], 'emoji': '✅', 'ru': {'title': 'Двойная проверка истинности: от внутренних компонентов к внешним источникам', 'desc': 'DAVinCI — это двухступенчатая система для повышения надежности больших языковых моделей. На первом этапе система атрибутирует генерируемые утверждения к внутренним компонентам модели и внешним источникам, а на втором этапе верифицирует каждое утверждение с помощью логического вывода и калибровки уверенности. Экспериментальные результаты на датасетах FEVER и CLIMATE-FEVER показали улучшение точности классификации и метрик качества атрибуции на 5-20% по сравнению с базовыми подходами. Данная работа способствует созданию проверяемых и надежных систем на основе LLM, которые могут быть использованы в критичных областях как медицина и право.'}, 'en': {'title': 'Enhancing Trust in AI with Dual Attribution and Verification', 'desc': 'DAVinCI is a framework that improves the reliability and interpretability of large language models (LLMs) by linking generated claims to their sources and verifying them. It works in two steps: first, it attributes claims to both internal model components and external references; second, it checks these claims using entailment-based reasoning. The framework has been tested on various datasets, showing a significant increase in accuracy and precision compared to traditional methods. By combining attribution and verification, DAVinCI aims to create more trustworthy AI systems that can be audited effectively.'}, 'zh': {'title': '提升语言模型的可信度与可解释性', 'desc': 'DAVinCI是一个双重归因和验证框架，旨在提高大型语言模型的事实可靠性和可解释性。它通过将生成的声明归因于内部组件和外部来源，并通过基于蕴含的推理进行验证。研究表明，DAVinCI在多个数据集上的分类准确率、归因精度、召回率和F1分数提高了5-20%。该框架为现有的语言模型管道提供了可集成的模块化实现，推动了可审计和可信赖的人工智能系统的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.21300', 'title': 'Explainable Disentangled Representation Learning for Generalizable Authorship Attribution in the Era of Generative AI', 'url': 'https://huggingface.co/papers/2604.21300', 'abstract': "Abstract A novel variational autoencoder framework with supervised contrastive learning and discriminative disentanglement achieves superior performance in authorship attribution and AI-generated text detection while providing interpretable explanations.  AI-generated summary Learning robust representations of authorial style is crucial for authorship attribution and AI-generated text detection. However, existing methods often struggle with content-style entanglement, where models learn spurious correlations between authors' writing styles and topics, leading to poor generalization across domains. To address this challenge, we propose Explainable Authorship Variational Autoencoder (EAVAE), a novel framework that explicitly disentangles style from content through architectural separation-by-design. EAVAE first pretrains style encoders using supervised contrastive learning on diverse authorship data, then finetunes with a Variational Autoencoder (VEA) architecture using separate encoders for style and content representations. Disentanglement is enforced through a novel discriminator that not only distinguishes whether pairs of style/content representations belong to the same or different authors/content sources, but also generates natural language explanation for their decision, simultaneously mitigating confounding information and enhancing interpretability. Extensive experiments demonstrate the effectiveness of EAVAE. On authorship attribution, we achieve state-of-the-art performance on various datasets, including Amazon Reviews, PAN21, and HRS. For AI-generated text detection, EAVAE excels in few-shot learning over the M4 dataset. Code and data repositories are available onlinehttps://github.com/hieum98/avae https://huggingface.co/collections/Hieuman/document-level-authorship-datasets.", 'score': 1, 'issue_id': 2033, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '5c9cf5d97dfe5321', 'authors': ['Hieu Man', 'Van-Cuong Pham', 'Nghia Trung Ngo', 'Franck Dernoncourt', 'Thien Huu Nguyen'], 'affiliations': ['Adobe Research', 'University of Oregon'], 'pdf_title_img': 'assets/pdf/title_img/2604.21300.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Разделение стиля и содержания для интерпретируемого определения авторства', 'desc': 'Предложена новая архитектура вариационного автоэнкодера (VAE) с использованием supervised contrastive learning, которая разделяет авторский стиль от содержания текста через отдельные энкодеры. Модель предварительно обучается на задаче контрастного обучения, а затем дообучается с помощью дискриминатора, который не только различает пары представлений (embeddings), но и генерирует естественное объяснение своего решения. Фреймворк решает проблему запутанности стиля и содержания, которая приводит к плохой обобщаемости моделей на различные домены. Экспериментальные результаты показывают, что EAVAE достигает новых рекордов в определении авторства и детектировании текстов, сгенерированных нейросетями, особенно в режиме few-shot learning.'}, 'en': {'title': 'Disentangling Style and Content for Better Authorship Attribution', 'desc': 'This paper introduces the Explainable Authorship Variational Autoencoder (EAVAE), a new framework designed to improve authorship attribution and AI-generated text detection. EAVAE tackles the problem of content-style entanglement by separating the learning of writing style from the content itself, which helps the model generalize better across different domains. The framework employs supervised contrastive learning to pretrain style encoders and uses a Variational Autoencoder architecture to fine-tune the model with distinct encoders for style and content. Additionally, a novel discriminator is implemented to provide explanations for its decisions, enhancing interpretability while maintaining high performance on various datasets.'}, 'zh': {'title': '解耦风格与内容，提升文本归属与检测的可解释性', 'desc': '本文提出了一种新颖的可解释作者变分自编码器框架（EAVAE），结合了监督对比学习和判别性解耦，旨在提高作者归属和AI生成文本检测的性能。该方法通过设计上的分离，明确将风格与内容解耦，解决了现有方法在内容与风格纠缠方面的不足。EAVAE首先在多样的作者数据上使用监督对比学习预训练风格编码器，然后利用变分自编码器架构进行微调，采用独立的编码器来表示风格和内容。通过一个新颖的判别器，EAVAE不仅区分风格/内容表示是否来自同一作者，还生成自然语言解释，从而增强了解释性和减少混淆信息。'}}}, {'id': 'https://huggingface.co/papers/2604.16926', 'title': 'Test-Time Adaptation for EEG Foundation Models: A Systematic Study under Real-World Distribution Shifts', 'url': 'https://huggingface.co/papers/2604.16926', 'abstract': 'Abstract Test-time adaptation methods for EEG foundation models show inconsistent performance across distribution shifts, with optimization-free approaches demonstrating greater stability than gradient-based methods.  AI-generated summary Electroencephalography (EEG) foundation models have shown strong potential for learning generalizable representations from large-scale neural data, yet their clinical deployment is hindered by distribution shifts across clinical settings, devices, and populations. Test-time adaptation (TTA) offers a promising solution by enabling models to adapt to unlabeled target data during inference without access to source data, a valuable property in healthcare settings constrained by privacy regulations and limited labeled data. However, its effectiveness for EEG remains largely underexplored. In this work, we introduce NeuroAdapt-Bench, a systematic benchmark for evaluating test-time adaptation methods on EEG foundation models under realistic distribution shifts. We evaluate representative TTA approaches from other domains across multiple pretrained foundation models, diverse downstream tasks, and heterogeneous datasets spanning in-distribution, out-of-distribution, and extreme modality shifts (e.g., Ear-EEG). Our results show that standard TTA methods yield inconsistent gains and often degrade performance, with gradient-based approaches particularly prone to heavy degradation. In contrast, optimization-free methods demonstrate greater stability and more reliable improvements. These findings highlight the limitations of existing TTA techniques in EEG, provide guidance for future development, and underscore the need for domain-specific adaptation strategies.', 'score': 1, 'issue_id': 2032, 'pub_date': '2026-04-18', 'pub_date_card': {'ru': '18 апреля', 'en': 'April 18', 'zh': '4月18日'}, 'hash': 'a78e8acd8d99e54a', 'authors': ['Gabriel Jason Lee', 'Jathurshan Pradeepkumar', 'Jimeng Sun'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2604.16926.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#training'], 'emoji': '🧠', 'ru': {'title': 'Адаптация без оптимизации: стабильный путь для EEG моделей при распределительных сдвигах', 'desc': 'В работе представлен NeuroAdapt-Bench — первый систематический бенчмарк для оценки методов адаптации на этапе тестирования (TTA) на основе фундаментальных моделей EEG. Исследователи протестировали различные подходы TTA из других областей машинного обучения на множестве предобученных моделей, задач и наборов данных с распределения, включая экстремальные сдвиги модальностей. Результаты показали, что градиентные методы адаптации часто приводят к деградации производительности, тогда как оптимизационно-свободные методы демонстрируют большую стабильность и надежные улучшения. Выводы подчеркивают необходимость разработки специализированных стратегий адаптации, учитывающих особенности EEG-данных в клинических условиях.'}, 'en': {'title': 'Stability in EEG Adaptation: Optimize Without Gradients!', 'desc': 'This paper discusses the challenges of using test-time adaptation (TTA) methods for EEG foundation models, particularly when faced with distribution shifts in clinical settings. It highlights that while TTA can help models adapt to new, unlabeled data during inference, many existing methods show inconsistent performance, especially gradient-based approaches that often degrade results. The authors introduce NeuroAdapt-Bench, a benchmark designed to evaluate various TTA methods on EEG models under realistic conditions. Their findings suggest that optimization-free methods are more stable and effective, indicating a need for tailored adaptation strategies in the EEG domain.'}, 'zh': {'title': '提升脑电图模型稳定性的关键在于无优化方法', 'desc': '本研究探讨了在脑电图（EEG）基础模型中，测试时适应（TTA）方法在分布变化下的表现。我们发现，无优化的方法比基于梯度的方法更稳定，后者在性能上常常出现下降。为此，我们提出了NeuroAdapt-Bench，这是一个系统的基准测试，用于评估EEG基础模型在真实分布变化下的TTA方法。我们的结果表明，现有的TTA技术在EEG领域存在局限性，未来需要开发特定领域的适应策略。'}}}, {'id': 'https://huggingface.co/papers/2604.21668', 'title': 'Encoder-Free Human Motion Understanding via Structured Motion Descriptions', 'url': 'https://huggingface.co/papers/2604.21668', 'abstract': "Abstract Structured Motion Description (SMD) enables large language models to perform human motion reasoning by converting joint position sequences into structured natural language descriptions, achieving superior performance on motion question answering and captioning tasks.  AI-generated summary The world knowledge and reasoning capabilities of text-based large language models (LLMs) are advancing rapidly, yet current approaches to human motion understanding, including motion question answering and captioning, have not fully exploited these capabilities. Existing LLM-based methods typically learn motion-language alignment through dedicated encoders that project motion features into the LLM's embedding space, remaining constrained by cross-modal representation and alignment. Inspired by biomechanical analysis, where joint angles and body-part kinematics have long served as a precise descriptive language for human movement, we propose Structured Motion Description (SMD), a rule-based, deterministic approach that converts joint position sequences into structured natural language descriptions of joint angles, body part movements, and global trajectory. By representing motion as text, SMD enables LLMs to apply their pretrained knowledge of body parts, spatial directions, and movement semantics directly to motion reasoning, without requiring learned encoders or alignment modules. We show that this approach goes beyond state-of-the-art results on both motion question answering (66.7\\% on BABEL-QA, 90.1\\% on HuMMan-QA) and motion captioning (R@1 of 0.584, CIDEr of 53.16 on HumanML3D), surpassing all prior methods. SMD additionally offers practical benefits: the same text input works across different LLMs with only lightweight LoRA adaptation (validated on 8 LLMs from 6 model families), and its human-readable representation enables interpretable attention analysis over motion descriptions. Code, data, and pretrained LoRA adapters are available at https://yaozhang182.github.io/motion-smd/.", 'score': 0, 'issue_id': 2036, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '6dcf6380d1f78b85', 'authors': ['Yao Zhang', 'Zhuchenyang Liu', 'Thomas Ploetz', 'Yu Xiao'], 'affiliations': ['Aalto University, Espoo, Finland', 'Georgia Institute of Technology, Atlanta, GA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.21668.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#dataset', '#benchmark', '#reasoning', '#interpretability'], 'emoji': '🏃', 'ru': {'title': 'Текстовое описание движений как мост между физикой движения и знаниями языковых моделей', 'desc': 'Авторы предлагают Structured Motion Description (SMD) — детерминированный подход, который преобразует последовательности позиций суставов в структурированные текстовые описания на естественном языке, описывая углы суставов, движения частей тела и глобальную траекторию. Это позволяет LLM напрямую применять свои предобученные знания о частях тела, пространственных направлениях и семантике движений без необходимости в специализированных энкодерах и модулях выравнивания. Метод SMD достигает лучших результатов в задачах ответов на вопросы о движении и описания движений, превосходя предыдущие методы. Подход демонстрирует практическую универсальность: одинаковые текстовые входные данные работают с разными LLM с помощью легковесной LoRA адаптации, а интерпретируемое представление позволяет анализировать внимание модели.'}, 'en': {'title': 'Transforming Motion into Language for Better Understanding', 'desc': "The paper introduces Structured Motion Description (SMD), a method that transforms joint position sequences into structured natural language descriptions, enhancing human motion reasoning in large language models (LLMs). By using a rule-based approach, SMD allows LLMs to leverage their existing knowledge of body movements and spatial relationships without the need for complex encoders or alignment processes. This method significantly improves performance on motion question answering and captioning tasks, achieving state-of-the-art result
