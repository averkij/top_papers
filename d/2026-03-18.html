    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.16790', 'title': 'InCoder-32B: Code Foundation Model for Industrial Scenarios', 'url': 'https://huggingface.co/papers/2603.16790', 'abstract': 'Abstract InCoder-32B is a 32-billion-parameter code model trained on industrial datasets with extended context length and execution verification to improve performance in hardware-aware programming tasks.  \t\t\t\t\tAI-generated summary Recent code large language models have achieved remarkable progress on general programming tasks. Nevertheless, their performance degrades significantly in industrial scenarios that require reasoning about hardware semantics, specialized language constructs, and strict resource constraints. To address these challenges, we introduce InCoder-32B (Industrial-Coder-32B), the first 32B-parameter code foundation model unifying code intelligence across chip design, GPU kernel optimization, embedded systems, compiler optimization, and 3D modeling. By adopting an efficient architecture, we train InCoder-32B from scratch with general code pre-training, curated industrial code annealing, mid-training that progressively extends context from 8K to 128K tokens with synthetic industrial reasoning data, and post-training with execution-grounded verification. We conduct extensive evaluation on 14 mainstream general code benchmarks and 9 industrial benchmarks spanning 4 specialized domains. Results show InCoder-32B achieves highly competitive performance on general tasks while establishing strong open-source baselines across industrial domains.', 'score': 99, 'issue_id': 1540, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '9f709513c531f335', 'authors': ['Jian Yang', 'Wei Zhang', 'Jiajun Wu', 'Junhang Cheng', 'Shawn Guo', 'Haowen Wang', 'Weicheng Gu', 'Yaxin Du', 'Joseph Li', 'Fanglin Xu', 'Yizhi Li', 'Lin Jing', 'Yuanbo Wang', 'Yuhan Gao', 'Ruihao Gong', 'Chuan Hao', 'Ran Tao', 'Aishan Liu', 'Tuney Zheng', 'Ganqu Cui', 'Zhoujun Li', 'Mingjie Tang', 'Chenghua Lin', 'Wayne Xin Zhao', 'Xianglong Liu', 'Ming Zhou', 'Bryan Dai', 'Weifeng Lv'], 'affiliations': ['Beihang University', 'ELLIS', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'IQuest Research', 'Langboat', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Sichuan Univeristy', 'University of Manchester'], 'pdf_title_img': 'assets/pdf/title_img/2603.16790.jpg', 'data': {'categories': ['#plp', '#training', '#benchmark', '#open_source', '#synthetic', '#long_context', '#reasoning', '#dataset'], 'emoji': '⚙️', 'ru': {'title': 'Промышленное кодирование: большая модель для железа и оптимизации', 'desc': 'InCoder-32B — это большая языковая модель с 32 миллиардами параметров, предназначенная для решения промышленных задач программирования. Модель обучена на специализированных датасетах с расширенным контекстом до 128K токенов и включает проверку корректности кода через выполнение. Особенность подхода заключается в поэтапном обучении: общая предварительная подготовка, курирование промышленного кода, постепенное расширение контекста и финальная настройка с верификацией. Система демонстрирует сильные результаты как на общих бенчмарках программирования, так и на специализированных задачах в области проектирования микросхем, оптимизации GPU ядер и встроенных систем.'}, 'en': {'title': 'Empowering Industrial Programming with InCoder-32B', 'desc': 'InCoder-32B is a powerful code model with 32 billion parameters designed to handle complex programming tasks in industrial settings. It improves performance by using a unique training approach that includes general code pre-training and specialized training on industrial datasets. The model can process longer code contexts, extending from 8K to 128K tokens, which helps it understand intricate hardware-related programming needs. Evaluation results demonstrate that InCoder-32B excels in both general programming tasks and specific industrial applications, setting new benchmarks in the field.'}, 'zh': {'title': '工业编程的智能解决方案', 'desc': 'InCoder-32B 是一个拥有320亿参数的代码模型，专门针对工业数据集进行训练，旨在提高硬件相关编程任务的性能。该模型解决了在工业场景中，代码生成模型在硬件语义、特定语言结构和资源限制方面的表现下降问题。通过高效的架构，InCoder-32B 采用了从通用代码预训练到工业代码精炼的训练过程，并在训练中逐步扩展上下文长度。评估结果显示，InCoder-32B 在通用任务上表现出色，并在多个工业领域建立了强大的开源基准。'}}}, {'id': 'https://huggingface.co/papers/2603.15726', 'title': 'MiroThinker-1.7 & H1: Towards Heavy-Duty Research Agents via Verification', 'url': 'https://huggingface.co/papers/2603.15726', 'abstract': 'Abstract MiroThinker-1.7 and MiroThinker-H1 are research agents that enhance complex reasoning through structured planning, contextual reasoning, and tool interaction, with MiroThinker-H1 incorporating verification at local and global levels for more reliable multi-step problem solving.  \t\t\t\t\tAI-generated summary We present MiroThinker-1.7, a new research agent designed for complex long-horizon reasoning tasks. Building on this foundation, we further introduce MiroThinker-H1, which extends the agent with heavy-duty reasoning capabilities for more reliable multi-step problem solving. In particular, MiroThinker-1.7 improves the reliability of each interaction step through an agentic mid-training stage that emphasizes structured planning, contextual reasoning, and tool interaction. This enables more effective multi-step interaction and sustained reasoning across complex tasks. MiroThinker-H1 further incorporates verification directly into the reasoning process at both local and global levels. Intermediate reasoning decisions can be evaluated and refined during inference, while the overall reasoning trajectory is audited to ensure that final answers are supported by coherent chains of evidence. Across benchmarks covering open-web research, scientific reasoning, and financial analysis, MiroThinker-H1 achieves state-of-the-art performance on deep research tasks while maintaining strong results on specialized domains. We also release MiroThinker-1.7 and MiroThinker-1.7-mini as open-source models, providing competitive research-agent capabilities with significantly improved efficiency.', 'score': 62, 'issue_id': 1539, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'd91244e273e18197', 'authors': ['MiroMind Team', 'S. Bai', 'L. Bing', 'L. Lei', 'R. Li', 'X. Li', 'X. Lin', 'E. Min', 'L. Su', 'B. Wang', 'L. Wang', 'L. Wang', 'S. Wang', 'X. Wang', 'Y. Zhang', 'Z. Zhang', 'G. Chen', 'L. Chen', 'Z. Cheng', 'Y. Deng', 'Z. Huang', 'D. Ng', 'J. Ni', 'Q. Ren', 'X. Tang', 'B. L. Wang', 'H. Wang', 'N. Wang', 'C. Wei', 'Q. Wu', 'J. Xia', 'Y. Xiao', 'H. Xu', 'X. Xu', 'C. Xue', 'Z. Yang', 'Z. Yang', 'F. Ye', 'H. Ye', 'J. Yu', 'C. Zhang', 'W. Zhang', 'H. Zhao', 'P. Zhu'], 'affiliations': ['MiroMind Team'], 'pdf_title_img': 'assets/pdf/title_img/2603.15726.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#benchmark', '#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Агенты с проверяемым мышлением для надежного многоэтапного рассуждения', 'desc': 'В статье представлены исследовательские агенты MiroThinker-1.7 и MiroThinker-H1, которые улучшают способность к сложному многоэтапному рассуждению через структурированное планирование, контекстное понимание и взаимодействие с внешними инструментами. MiroThinker-H1 дополнительно включает механизмы верификации на локальном и глобальном уровнях, что позволяет оценивать промежуточные решения и проверять согласованность цепочки доказательств. Агенты обучаются специальной процедурой fine-tuning, которая повышает надежность каждого шага взаимодействия при решении сложных задач. Модели достигают передовых результатов на бенчмарках научных рассуждений, веб-исследований и финансового анализа, при этом открытые версии обеспечивают эффективность с конкурентными возможностями.'}, 'en': {'title': 'Enhancing Complex Reasoning with MiroThinker Agents', 'desc': 'MiroThinker-1.7 and MiroThinker-H1 are advanced research agents designed to tackle complex reasoning tasks through structured planning and contextual understanding. MiroThinker-1.7 enhances the reliability of multi-step problem solving by focusing on effective tool interaction and mid-training evaluations. MiroThinker-H1 builds on this by integrating verification processes that assess reasoning at both local and global levels, ensuring that each decision is supported by solid evidence. These agents have demonstrated state-of-the-art performance across various benchmarks, making them valuable tools for deep research in diverse fields.'}, 'zh': {'title': '增强复杂推理的智能代理', 'desc': 'MiroThinker-1.7和MiroThinker-H1是用于增强复杂推理的研究代理。MiroThinker-1.7通过结构化规划、上下文推理和工具交互来提高每一步的可靠性。MiroThinker-H1在此基础上增加了局部和全局验证功能，使多步骤问题解决更加可靠。该模型在开放网络研究、科学推理和金融分析等基准测试中表现出色，同时保持在专业领域的强劲结果。'}}}, {'id': 'https://huggingface.co/papers/2603.16669', 'title': 'Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation', 'url': 'https://huggingface.co/papers/2603.16669', 'abstract': "Abstract Kinema4D introduces a 4D generative robotic simulator that models robot-world interactions through precise kinematic control and spatiotemporal environmental reaction synthesis, enabling physically plausible and embodiment-agnostic simulations with zero-shot transfer capability.  \t\t\t\t\tAI-generated summary Simulating robot-world interactions is a cornerstone of Embodied AI. Recently, a few works have shown promise in leveraging video generations to transcend the rigid visual/physical constraints of traditional simulators. However, they primarily operate in 2D space or are guided by static environmental cues, ignoring the fundamental reality that robot-world interactions are inherently 4D spatiotemporal events that require precise interactive modeling. To restore this 4D essence while ensuring the precise robot control, we introduce Kinema4D, a new action-conditioned 4D generative robotic simulator that disentangles the robot-world interaction into: i) Precise 4D representation of robot controls: we drive a URDF-based 3D robot via kinematics, producing a precise 4D robot control trajectory. ii) Generative 4D modeling of environmental reactions: we project the 4D robot trajectory into a pointmap as a spatiotemporal visual signal, controlling the generative model to synthesize complex environments' reactive dynamics into synchronized RGB/pointmap sequences. To facilitate training, we curated a large-scale dataset called Robo4D-200k, comprising 201,426 robot interaction episodes with high-quality 4D annotations. Extensive experiments demonstrate that our method effectively simulates physically-plausible, geometry-consistent, and embodiment-agnostic interactions that faithfully mirror diverse real-world dynamics. For the first time, it shows potential zero-shot transfer capability, providing a high-fidelity foundation for advancing next-generation embodied simulation.", 'score': 56, 'issue_id': 1542, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'd09ce97bf1671e0a', 'authors': ['Mutian Xu', 'Tianbao Zhang', 'Tianqi Liu', 'Zhaoxi Chen', 'Xiaoguang Han', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University', 'SSE, CUHKSZ'], 'pdf_title_img': 'assets/pdf/title_img/2603.16669.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#dataset', '#diffusion', '#video', '#open_source', '#3d', '#synthetic'], 'emoji': '🤖', 'ru': {'title': '4D симулятор робото-мирного взаимодействия с нулевым обучением', 'desc': 'В работе представлен Kinema4D - генеративный робототехнический симулятор, который моделирует взаимодействие робота с окружающей средой в четырёхмерном пространстве-времени. Система разделяет задачу на две части: точное кинематическое управление роботом на основе URDF-моделей и генеративное синтезирование реакции окружающей среды через видеопредсказание. Авторы создали большой датасет Robo4D-200k с 201 426 эпизодами взаимодействия и соответствующими 4D-аннотациями для обучения модели. Предложенный подход демонстрирует физически корректные симуляции, инвариантные к типу робота, с возможностью нулевого обучения на новых сценариях.'}, 'en': {'title': 'Revolutionizing Robot Simulations with 4D Interactions', 'desc': 'Kinema4D is a novel 4D generative robotic simulator designed to accurately model how robots interact with their environments over time. It achieves this by using precise kinematic control to create detailed 4D trajectories for robot movements and by generating realistic environmental reactions that respond to these movements. The simulator operates in a spatiotemporal framework, allowing it to capture the dynamic nature of robot-world interactions, which traditional 2D simulators often overlook. With a large dataset called Robo4D-200k, Kinema4D demonstrates the ability to simulate complex interactions that are both physically plausible and adaptable to various robotic embodiments, showcasing its potential for zero-shot transfer learning.'}, 'zh': {'title': 'Kinema4D：开创四维机器人交互模拟的新纪元', 'desc': 'Kinema4D 是一个四维生成机器人模拟器，能够通过精确的运动学控制和时空环境反应合成来模拟机器人与世界的交互。它将机器人与环境的交互分解为精确的四维控制表示和生成的环境反应模型。该模拟器使用了一个名为 Robo4D-200k 的大型数据集，包含超过 20 万个高质量的四维注释的机器人交互实例。实验表明，Kinema4D 能够有效地模拟物理上合理、几何一致且与具体实现无关的交互，展现出零样本迁移的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.16870', 'title': 'Demystifing Video Reasoning', 'url': 'https://huggingface.co/papers/2603.16870', 'abstract': 'Abstract Diffusion-based video models demonstrate reasoning capabilities through denoising steps rather than frame sequences, exhibiting behaviors like working memory, self-correction, and perception-before-action within specialized transformer layers.  \t\t\t\t\tAI-generated summary Recent advances in video generation have revealed an unexpected phenomenon: diffusion-based video models exhibit non-trivial reasoning capabilities. Prior work attributes this to a Chain-of-Frames (CoF) mechanism, where reasoning is assumed to unfold sequentially across video frames. In this work, we challenge this assumption and uncover a fundamentally different mechanism. We show that reasoning in video models instead primarily emerges along the diffusion denoising steps. Through qualitative analysis and targeted probing experiments, we find that models explore multiple candidate solutions in early denoising steps and progressively converge to a final answer, a process we term Chain-of-Steps (CoS). Beyond this core mechanism, we identify several emergent reasoning behaviors critical to model performance: (1) working memory, enabling persistent reference; (2) self-correction and enhancement, allowing recovery from incorrect intermediate solutions; and (3) perception before action, where early steps establish semantic grounding and later steps perform structured manipulation. During a diffusion step, we further uncover self-evolved functional specialization within Diffusion Transformers, where early layers encode dense perceptual structure, middle layers execute reasoning, and later layers consolidate latent representations. Motivated by these insights, we present a simple training-free strategy as a proof-of-concept, demonstrating how reasoning can be improved by ensembling latent trajectories from identical models with different random seeds. Overall, our work provides a systematic understanding of how reasoning emerges in video generation models, offering a foundation to guide future research in better exploiting the inherent reasoning dynamics of video models as a new substrate for intelligence.', 'score': 54, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '9a0977193008117a', 'authors': ['Ruisi Wang', 'Zhongang Cai', 'Fanyi Pu', 'Junxiang Xu', 'Wanqi Yin', 'Maijunxian Wang', 'Ran Ji', 'Chenyang Gu', 'Bo Li', 'Ziqi Huang', 'Hokin Deng', 'Dahua Lin', 'Ziwei Liu', 'Lei Yang'], 'affiliations': ['Carnegie Mellon University', 'Nanyang Technological University', 'SenseTime Research', 'University of California, Berkeley', 'University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.16870.jpg', 'data': {'categories': ['#interpretability', '#reasoning', '#training', '#diffusion', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Рассуждение в видеомоделях: от шумов к смыслу через пошаговую диффузию', 'desc': 'В этой работе исследователи обнаружили, что диффузионные видеомодели демонстрируют способность к рассуждению не через последовательность кадров, а через этапы шумоподавления (denoising steps). Модели исследуют множество кандидатных решений на ранних этапах и постепенно сходятся к финальному ответу, процесс который авторы называют Chain-of-Steps. В трансформер-слоях видеомоделей выявлены специализированные механизмы: рабочая память для сохранения контекста, самокоррекция для восстановления от ошибок и восприятие перед действием, где ранние слои устанавливают семантическую основу, а поздние выполняют структурированные операции. На основе этих открытий предложена простая стратегия улучшения рассуждения через объединение траекторий от моделей с разными случайными инициализациями.'}, 'en': {'title': 'Unlocking Reasoning in Video Models through Denoising Steps', 'desc': 'This paper explores how diffusion-based video models demonstrate reasoning abilities not through sequential frames, but through denoising steps. The authors introduce the concept of Chain-of-Steps (CoS), showing that reasoning occurs as models evaluate multiple solutions during the denoising process. They identify key reasoning behaviors such as working memory, self-correction, and perception-before-action, which enhance model performance. The study also reveals how different layers in Diffusion Transformers specialize in various functions, leading to improved reasoning capabilities in video generation.'}, 'zh': {'title': '扩散模型：视频生成中的新推理机制', 'desc': '本研究探讨了基于扩散的视频模型如何通过去噪步骤展现推理能力，而非依赖于帧序列。我们提出了一个新的机制，称为步骤链（Chain-of-Steps, CoS），表明推理主要在去噪过程中进行。研究发现，这些模型在早期去噪步骤中探索多个候选解决方案，并逐步收敛到最终答案。此外，我们还识别出几种关键的推理行为，如工作记忆、自我修正和在行动前的感知，这些都对模型性能至关重要。'}}}, {'id': 'https://huggingface.co/papers/2603.16871', 'title': 'WorldCam: Interactive Autoregressive 3D Gaming Worlds with Camera Pose as a Unifying Geometric Representation', 'url': 'https://huggingface.co/papers/2603.16871', 'abstract': 'Abstract Video diffusion transformers enhanced with camera pose representation enable precise action control and long-term 3D consistency in interactive gaming environments through physics-based action spaces and geometric grounding.  \t\t\t\t\tAI-generated summary Recent advances in video diffusion transformers have enabled interactive gaming world models that allow users to explore generated environments over extended horizons. However, existing approaches struggle with precise action control and long-horizon 3D consistency. Most prior works treat user actions as abstract conditioning signals, overlooking the fundamental geometric coupling between actions and the 3D world, whereby actions induce relative camera motions that accumulate into a global camera pose within a 3D world. In this paper, we establish camera pose as a unifying geometric representation to jointly ground immediate action control and long-term 3D consistency. First, we define a physics-based continuous action space and represent user inputs in the Lie algebra to derive precise 6-DoF camera poses, which are injected into the generative model via a camera embedder to ensure accurate action alignment. Second, we use global camera poses as spatial indices to retrieve relevant past observations, enabling geometrically consistent revisiting of locations during long-horizon navigation. To support this research, we introduce a large-scale dataset comprising 3,000 minutes of authentic human gameplay annotated with camera trajectories and textual descriptions. Extensive experiments show that our approach substantially outperforms state-of-the-art interactive gaming world models in action controllability, long-horizon visual quality, and 3D spatial consistency.', 'score': 41, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '8392e56d405f0b0d', 'authors': ['Jisu Nam', 'Yicong Hong', 'Chun-Hao Paul Huang', 'Feng Liu', 'JoungBin Lee', 'Jiyoung Kim', 'Siyoon Jin', 'Yunsung Lee', 'Jaeyoon Jung', 'Suhwan Choi', 'Seungryong Kim', 'Yang Zhou'], 'affiliations': ['Adobe Research', 'KAIST', 'MAUM AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.16871.jpg', 'data': {'categories': ['#open_source', '#long_context', '#dataset', '#3d', '#games', '#video', '#diffusion', '#architecture'], 'emoji': '🎮', 'ru': {'title': 'Поза камеры как геометрический якорь для управления действиями и 3D-консистентности в генеративных игровых мирах', 'desc': 'Статья представляет видеодиффузионные трансформеры, улучшенные представлением позы камеры, для создания интерактивных игровых сцен. Авторы используют физически обоснованное пространство действий и представление в алгебре Ли для получения точных 6-степеневых свободы поз камеры, которые встраиваются в генеративную модель. Глобальные позы камеры служат пространственными индексами для извлечения релевантных прошлых наблюдений, обеспечивая геометрически согласованную навигацию на длинных горизонтах. Авторы представили крупномасштабный датасет с 3000 минутами игрового процесса, аннотированного траекториями камеры и текстовыми описаниями.'}, 'en': {'title': 'Enhancing Gaming with Camera Pose for Better Action Control and 3D Consistency', 'desc': 'This paper presents a novel approach to enhance video diffusion transformers for interactive gaming by incorporating camera pose representation. By treating camera pose as a geometric link between user actions and the 3D environment, the authors improve action control and maintain long-term consistency in gameplay. They introduce a physics-based action space and utilize Lie algebra to derive precise camera poses, which are integrated into the generative model for better alignment of actions. Additionally, a large-scale dataset of human gameplay is provided to support their findings, demonstrating significant improvements over existing models in terms of action controllability and visual quality.'}, 'zh': {'title': '相机姿态：实现精确动作与3D一致性的关键', 'desc': '本文提出了一种视频扩散变换器，结合相机姿态表示，能够在互动游戏环境中实现精确的动作控制和长期的3D一致性。通过物理基础的动作空间和几何基础，用户可以在生成的环境中进行探索。我们将相机姿态作为统一的几何表示，确保即时动作控制与长期3D一致性相结合。实验结果表明，该方法在动作可控性、长时间视觉质量和3D空间一致性方面显著优于现有的互动游戏世界模型。'}}}, {'id': 'https://huggingface.co/papers/2603.16448', 'title': 'TRUST-SQL: Tool-Integrated Multi-Turn Reinforcement Learning for Text-to-SQL over Unknown Schemas', 'url': 'https://huggingface.co/papers/2603.16448', 'abstract': 'Abstract TRUST-SQL addresses unknown schema text-to-SQL parsing through a four-phase protocol and dual-track GRPO strategy that improves credit assignment and outperforms baselines without pre-loaded metadata.  \t\t\t\t\tAI-generated summary Text-to-SQL parsing has achieved remarkable progress under the Full Schema Assumption. However, this premise fails in real-world enterprise environments where databases contain hundreds of tables with massive noisy metadata. Rather than injecting the full schema upfront, an agent must actively identify and verify only the relevant subset, giving rise to the Unknown Schema scenario we study in this work. To address this, we propose TRUST-SQL (Truthful Reasoning with Unknown Schema via Tools). We formulate the task as a Partially Observable Markov Decision Process where our autonomous agent employs a structured four-phase protocol to ground reasoning in verified metadata. Crucially, this protocol provides a structural boundary for our novel Dual-Track GRPO strategy. By applying token-level masked advantages, this strategy isolates exploration rewards from execution outcomes to resolve credit assignment, yielding a 9.9% relative improvement over standard GRPO. Extensive experiments across five benchmarks demonstrate that TRUST-SQL achieves an average absolute improvement of 30.6% and 16.6% for the 4B and 8B variants respectively over their base models. Remarkably, despite operating entirely without pre-loaded metadata, our framework consistently matches or surpasses strong baselines that rely on schema prefilling.', 'score': 39, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '820ab1c0edfe89d0', 'authors': ['Ai Jian', 'Xiaoyun Zhang', 'Wanrou Du', 'Jingqing Ruan', 'Jiangbo Pei', 'Weipeng Zhang', 'Ke Zeng', 'Xunliang Cai'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'Meituan', 'State Key Lab of Processors, Institute of Computing Technology, CAS', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.16448.jpg', 'data': {'categories': ['#plp', '#benchmark', '#training', '#rl', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Парсинг SQL без предварительной загрузки схемы через верификацию и обучение с подкреплением', 'desc': 'В работе предложен TRUST-SQL — метод для парсинга текста в SQL-запросы в условиях неизвестной схемы базы данных. Система использует четырёхфазный протокол, позволяющий агенту активно определять и верифицировать только релевантные таблицы из больших шумных метаданных. Авторы разработали оригинальную стратегию Dual-Track GRPO с маскированием преимуществ на уровне токенов, которая решает проблему приписания кредита путём разделения reward-ов за исследование и исполнение. Модель достигает улучшения на 30,6% и 16,6% для вариантов 4B и 8B соответственно и сравнивается с базовыми решениями, использующими полную схему.'}, 'en': {'title': 'Empowering SQL Parsing with Unknown Schemas', 'desc': 'TRUST-SQL is a novel approach to text-to-SQL parsing that tackles the challenge of unknown database schemas in real-world applications. It employs a four-phase protocol and a dual-track Generalized Reward Policy Optimization (GRPO) strategy to enhance credit assignment during the parsing process. By treating the task as a Partially Observable Markov Decision Process, it allows the agent to dynamically identify and verify relevant metadata instead of relying on a complete schema. The results show significant improvements in performance, achieving up to 30.6% better accuracy compared to traditional methods that use pre-loaded metadata.'}, 'zh': {'title': 'TRUST-SQL：未知模式下的智能 SQL 解析', 'desc': 'TRUST-SQL 是一种针对未知模式的文本到 SQL 解析方法，采用四阶段协议和双轨 GRPO 策略来改善信用分配。该方法不依赖于预加载的元数据，而是通过主动识别和验证相关子集来应对真实环境中的复杂数据库。我们将任务建模为部分可观察的马尔可夫决策过程，利用结构化的协议来确保推理基于经过验证的元数据。实验结果表明，TRUST-SQL 在多个基准测试中显著提高了性能，展示了其在没有预加载元数据的情况下仍能超越强基线的能力。'}}}, {'id': 'https://huggingface.co/papers/2603.13366', 'title': 'Thinking in Uncertainty: Mitigating Hallucinations in MLRMs with Latent Entropy-Aware Decoding', 'url': 'https://huggingface.co/papers/2603.13366', 'abstract': 'Abstract  Recent advancements in multimodal large reasoning models (MLRMs) have significantly improved performance in visual question answering. However, we observe that transition words (e.g., because, however, and wait) are closely associated with hallucinations and tend to exhibit high-entropy states. We argue that adequate contextual reasoning information can be directly extracted from the token probability distribution. Inspired by superposed representation theory, we propose leveraging latent superposed reasoning to integrate multiple candidate semantics and maintain latent reasoning trajectories. The hypothesis is that reliance on discrete textual inputs may drive the model toward sequential explicit reasoning, underutilizing dense contextual cues during high-entropy reasoning stages. Therefore, we propose constructing rich semantic representations from the token probability distributions to enhance in-context reasoning. With this goal, we present Latent Entropy-Aware Decoding (LEAD), an efficient plug-and-play decoding strategy that leverages semantic context to achieve reliable reasoning. The heart of our method lies in entropy-aware reasoning mode switching. The model employs probability-weighted continuous embeddings under high-entropy states and transitions back to discrete token embeddings as entropy decreases. Moreover, we propose a prior-guided visual anchor injection strategy that encourages the model to focus on visual information. Extensive experiments show that LEAD effectively mitigates hallucinations across various MLRMs on multiple benchmarks.', 'score': 34, 'issue_id': 1539, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '7539cb29bb0bede3', 'authors': ['Zhongxing Xu', 'Zhonghua Wang', 'Zhe Qian', 'Dachuan Shi', 'Feilong Tang', 'Ming Hu', 'Shiyan Su', 'Xiaocheng Zou', 'Wei Feng', 'Dwarikanath Mahapatra', 'Yifan Peng', 'Mingquan Lin', 'Zongyuan Ge'], 'affiliations': ['Cornell University', 'Georgia Tech', 'Khalifa University', 'Monash University', 'Northeastern University', 'University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2603.13366.jpg', 'data': {'categories': ['#interpretability', '#inference', '#benchmark', '#reasoning', '#hallucinations', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Избежать галлюцинаций через осведомлённое о энтропии декодирование с латентными рассуждениями', 'desc': 'Работа посвящена решению проблемы галлюцинаций в многомодальных больших моделях рассуждения при ответах на визуальные вопросы. Авторы заметили, что переходные слова часто связаны с галлюцинациями и характеризуются высокой энтропией, что указывает на неуверенность модели. Они предлагают извлекать контекстную информацию напрямую из распределения вероятностей токенов, используя суперпозиционные представления для интеграции нескольких семантических кандидатов. Основной вклад — метод LEAD, стратегия декодирования, которая адаптивно переключается между непрерывными вероятностными представлениями при высокой энтропии и дискретными токенами при низкой энтропии, сохраняя при этом якорные визуальные признаки.'}, 'en': {'title': 'Enhancing Visual Reasoning with Latent Entropy-Aware Decoding', 'desc': 'This paper discusses improvements in multimodal large reasoning models (MLRMs) for visual question answering, particularly addressing the issue of hallucinations caused by transition words. The authors propose a new method called Latent Entropy-Aware Decoding (LEAD), which enhances reasoning by utilizing token probability distributions to create richer semantic representations. By switching between probability-weighted continuous embeddings and discrete token embeddings based on entropy levels, the model can better manage high-entropy reasoning situations. Additionally, a visual anchor injection strategy is introduced to help the model focus on relevant visual information, leading to reduced hallucinations in MLRMs across various benchmarks.'}, 'zh': {'title': '提升推理能力，减少幻觉现象', 'desc': '最近，多模态大规模推理模型（MLRM）在视觉问答方面取得了显著进展。然而，我们发现过渡词（如因为、然而和等待）与幻觉密切相关，并且往往表现出高熵状态。我们提出通过潜在叠加推理来整合多个候选语义，并保持潜在推理轨迹，以增强上下文推理。我们的方法是构建丰富的语义表示，从而提高模型在高熵推理阶段的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2603.16856', 'title': 'Online Experiential Learning for Language Models', 'url': 'https://huggingface.co/papers/2603.16856', 'abstract': 'Abstract Online Experiential Learning enables continuous improvement of language models through deployment experience by extracting and consolidating experiential knowledge via on-policy distillation.  \t\t\t\t\tAI-generated summary The prevailing paradigm for improving large language models relies on offline training with human annotations or simulated environments, leaving the rich experience accumulated during real-world deployment entirely unexploited. We propose Online Experiential Learning (OEL), a framework that enables language models to continuously improve from their own deployment experience. OEL operates in two stages: first, transferable experiential knowledge is extracted and accumulated from interaction trajectories collected on the user side; second, this knowledge is consolidated into model parameters via on-policy context distillation, requiring no access to the user-side environment. The two stages are iterated to form an online learning loop, where the improved model collects higher-quality trajectories that yield richer experiential knowledge for subsequent rounds. We evaluate OEL on text-based game environments across multiple model scales and both thinking and non-thinking variants. OEL achieves consistent improvements over successive iterations, enhancing both task accuracy and token efficiency while preserving out-of-distribution performance. Our analysis further shows that extracted experiential knowledge is significantly more effective than raw trajectories, and that on-policy consistency between the knowledge source and the policy model is critical for effective learning.', 'score': 29, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'dbf14de310be2000', 'authors': ['Tianzhu Ye', 'Li Dong', 'Qingxiu Dong', 'Xun Wu', 'Shaohan Huang', 'Furu Wei'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.16856.jpg', 'data': {'categories': ['#optimization', '#games', '#transfer_learning'], 'emoji': '🔄', 'ru': {'title': 'Обучение языковых моделей из реального опыта развёртывания через on-policy дистилляцию', 'desc': 'В этой работе предлагается метод Online Experiential Learning (OEL), который позволяет языковым моделям непрерывно улучшаться на основе опыта, накопленного во время реального развёртывания. Фреймворк работает в два этапа: сначала извлекается и накапливается передаваемое знание из траекторий взаимодействия пользователей, затем это знание консолидируется в параметры модели через on-policy дистилляцию контекста без доступа к окружению пользователей. Два этапа итеративно повторяются, формируя цикл онлайн-обучения, где улучшенная модель собирает траектории более высокого качества. Экспериментальные результаты показывают, что OEL обеспечивает последовательное улучшение точности и эффективности токенов на текстовых играх, при этом извлечённое знание значительно эффективнее сырых траекторий.'}, 'en': {'title': 'Continuous Learning from Real-World Experience', 'desc': 'Online Experiential Learning (OEL) is a new framework designed to enhance language models by leveraging their real-world deployment experiences. It consists of two main stages: first, it gathers valuable knowledge from user interactions, and then it refines the model parameters using this knowledge through on-policy distillation. This process creates a continuous learning loop, allowing the model to improve iteratively by collecting better interaction data over time. OEL has been tested in text-based games, showing significant improvements in task accuracy and efficiency while maintaining performance on unseen data.'}, 'zh': {'title': '在线体验学习：持续改进语言模型的创新方法', 'desc': '在线体验学习（OEL）是一种新框架，旨在通过模型在实际部署中的经验不断改进语言模型。该方法分为两个阶段：首先，从用户交互中提取和积累可转移的经验知识；其次，通过在线策略蒸馏将这些知识整合到模型参数中。OEL形成一个在线学习循环，改进后的模型能够收集更高质量的交互轨迹，从而为后续迭代提供更丰富的经验知识。实验表明，OEL在多个文本游戏环境中表现出一致的性能提升，增强了任务准确性和令牌效率。'}}}, {'id': 'https://huggingface.co/papers/2603.08262', 'title': 'FinToolBench: Evaluating LLM Agents for Real-World Financial Tool Use', 'url': 'https://huggingface.co/papers/2603.08262', 'abstract': 'Abstract FinToolBench presents the first real-world benchmark for evaluating financial tool learning agents, featuring 760 executable tools and comprehensive evaluation criteria beyond simple execution success.  \t\t\t\t\tAI-generated summary The integration of Large Language Models (LLMs) into the financial domain is driving a paradigm shift from passive information retrieval to dynamic, agentic interaction. While general-purpose tool learning has witnessed a surge in benchmarks, the financial sector, characterized by high stakes, strict compliance, and rapid data volatility, remains critically underserved. Existing financial evaluations predominantly focus on static textual analysis or document-based QA, ignoring the complex reality of tool execution. Conversely, general tool benchmarks lack the domain-specific rigor required for finance, often relying on toy environments or a negligible number of financial APIs. To bridge this gap, we introduce FinToolBench, the first real-world, runnable benchmark dedicated to evaluating financial tool learning agents. Unlike prior works limited to a handful of mock tools, FinToolBench establishes a realistic ecosystem coupling 760 executable financial tools with 295 rigorous, tool-required queries. We propose a novel evaluation framework that goes beyond binary execution success, assessing agents on finance-critical dimensions: timeliness, intent type, and regulatory domain alignment. Furthermore, we present FATR, a finance-aware tool retrieval and reasoning baseline that enhances stability and compliance. By providing the first testbed for auditable, agentic financial execution, FinToolBench sets a new standard for trustworthy AI in finance. The tool manifest, execution environment, and evaluation code will be open-sourced to facilitate future research.', 'score': 29, 'issue_id': 1539, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'e1f7d653599a12d0', 'authors': ['Jiaxuan Lu', 'Kong Wang', 'Yemin Wang', 'Qingmei Tang', 'Hongwei Zeng', 'Xiang Chen', 'Jiahao Pi', 'Shujian Deng', 'Lingzhi Chen', 'Yi Fu', 'Kehua Yang', 'Xiao Sun'], 'affiliations': ['Hunan University', 'Shanghai AI Laboratory', 'Xiamen Tencent University'], 'pdf_title_img': 'assets/pdf/title_img/2603.08262.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#benchmark', '#agents', '#dataset'], 'emoji': '💰', 'ru': {'title': 'Реальный бенчмарк для оценки финансовых агентов с поддержкой инструментов', 'desc': 'FinToolBench представляет первый реальный бенчмарк для оценки финансовых агентов, способных работать с инструментами, включающий 760 исполняемых финансовых инструментов и 295 специализированных задач. В отличие от существующих оценок, которые сосредоточены на статическом анализе текстов или общих бенчмарках с игрушечными окружениями, этот бенчмарк предлагает реалистичную экосистему с реальными финансовыми API. Авторы предлагают инновационную систему оценки, которая выходит за рамки простой проверки успешного выполнения и оценивает агентов по критически важным для финансов параметрам: своевременность, тип намерения и соответствие нормативно-правовой базе. Также представлен базовый метод FATR, использующий финансовую осведомленность для улучшения стабильности и соответствия требованиям регулирования при извлечении инструментов.'}, 'en': {'title': 'FinToolBench: Elevating Financial AI Evaluation Standards', 'desc': 'FinToolBench is a groundbreaking benchmark designed specifically for evaluating financial tool learning agents, featuring 760 executable tools and a comprehensive set of evaluation criteria. This benchmark addresses the unique challenges of the financial sector, which requires more than just simple execution success, by incorporating dimensions like timeliness and regulatory compliance. Unlike previous benchmarks that focused on static analysis or limited mock tools, FinToolBench provides a realistic environment for testing agents in dynamic financial scenarios. Additionally, it introduces FATR, a baseline for finance-aware tool retrieval and reasoning, enhancing the stability and compliance of AI in financial applications.'}, 'zh': {'title': '金融工具学习的全新基准', 'desc': 'FinToolBench是第一个用于评估金融工具学习代理的真实世界基准，包含760个可执行工具和全面的评估标准。该基准超越了简单的执行成功，关注金融领域的动态交互和合规性。与现有的静态文本分析或文档问答评估不同，FinToolBench提供了一个真实的生态系统，结合了严格的工具查询和执行要求。通过引入FATR基线，FinToolBench为金融执行提供了可审计的测试平台，推动了金融领域可信AI的新标准。'}}}, {'id': 'https://huggingface.co/papers/2603.16139', 'title': 'Rethinking UMM Visual Generation: Masked Modeling for Efficient Image-Only Pre-training', 'url': 'https://huggingface.co/papers/2603.16139', 'abstract': 'Abstract A data-efficient training framework for unified multimodal models that uses image-only data for pre-training followed by fine-tuning with mixed data types achieves state-of-the-art performance with reduced computational requirements.  \t\t\t\t\tAI-generated summary Unified Multimodal Models (UMMs) are often constrained by the pre-training of their visual generation components, which typically relies on inefficient paradigms and scarce, high-quality text-image paired data. In this paper, we systematically analyze pre-training recipes for UMM visual generation and identify these two issues as the major bottlenecks.   To address them, we propose Image-Only Training for UMMs (IOMM), a data-efficient two-stage training framework.   The first stage pre-trains the visual generative component exclusively using abundant unlabeled image-only data, thereby removing the dependency on paired data for this costly phase. The second stage fine-tunes the model using a mixture of unlabeled images and a small curated set of text-image pairs, leading to improved instruction alignment and generative quality.   Extensive experiments show that IOMM not only improves training efficiency but also achieves state-of-the-art (SOTA) performance.   For example, our IOMM-B (3.6B) model was trained from scratch using only sim 1050 H800 GPU hours (with the vast majority, 1000 hours, dedicated to the efficient image-only pre-training stage). It achieves 0.89 on GenEval and 0.55 on WISE--surpassing strong baselines such as BAGEL-7B (0.82 & 0.55) and BLIP3-o-4B (0.84 & 0.50).   Code is available https://github.com/LINs-lab/IOMM{https://github.com/LINs-lab/IOMM}.', 'score': 26, 'issue_id': 1541, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '9a5b1961039d6b1c', 'authors': ['Peng Sun', 'Jun Xie', 'Tao Lin'], 'affiliations': ['Shanghai Innovation Institute', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16139.jpg', 'data': {'categories': ['#training', '#data', '#multimodal'], 'emoji': '🖼️', 'ru': {'title': 'Обучение мультимодальных моделей только на изображениях для экономии данных и вычислений', 'desc': 'Статья представляет IOMM — эффективный двухэтапный подход для обучения унифицированных мультимодальных моделей. На первом этапе визуальный генеративный компонент предварительно обучается только на немаркированных изображениях, что исключает зависимость от дорогостоящих парных данных текст-изображение. На втором этапе модель fine-tuning проводится на смеси немаркированных изображений и небольшого набора аннотированных пар текст-изображение для улучшения качества генерации. Экспериментальные результаты демонстрируют, что метод достигает state-of-the-art производительности при значительном снижении вычислительных затрат.'}, 'en': {'title': 'Efficient Training for Superior Multimodal Models', 'desc': 'This paper introduces a new training framework called Image-Only Training for Unified Multimodal Models (IOMM), which enhances the efficiency of training visual generative components. The first stage of IOMM uses only unlabeled image data for pre-training, eliminating the need for expensive paired text-image datasets. In the second stage, the model is fine-tuned with a mix of unlabeled images and a small number of curated text-image pairs, improving its performance and alignment with instructions. The results demonstrate that IOMM achieves state-of-the-art performance while significantly reducing computational costs compared to traditional methods.'}, 'zh': {'title': '高效训练统一多模态模型的创新方法', 'desc': '本文提出了一种数据高效的统一多模态模型（UMM）训练框架，称为图像单一训练（IOMM）。该框架分为两个阶段：第一阶段仅使用大量未标记的图像数据进行视觉生成组件的预训练，消除了对配对数据的依赖。第二阶段则使用未标记的图像和少量精心挑选的文本-图像对进行微调，从而提高了指令对齐和生成质量。实验结果表明，IOMM在训练效率和性能上均达到了最先进的水平。'}}}, {'id': 'https://huggingface.co/papers/2603.15132', 'title': 'WiT: Waypoint Diffusion Transformers via Trajectory Conflict Navigation', 'url': 'https://huggingface.co/papers/2603.15132', 'abstract': 'Abstract Waypoint Diffusion Transformers address trajectory conflicts in pixel-space flow matching by using semantic waypoints from pre-trained vision models to disentangle generation paths and accelerate training convergence.  AI-generated summary While recent Flow Matching models avoid the reconstruction bottlenecks of latent autoencoders by operating directly in pixel space, the lack of semantic continuity in the pixel manifold severely intertwines optimal transport paths. This induces severe trajectory conflicts near intersections, yielding sub-optimal solutions. Rather than bypassing this issue via information-lossy latent representations, we directly untangle the pixel-space trajectories by proposing Waypoint Diffusion Transformers (WiT). WiT factorizes the continuous vector field via intermediate semantic waypoints projected from pre-trained vision models. It effectively disentangles the generation trajectories by breaking the optimal transport into prior-to-waypoint and waypoint-to-pixel segments. Specifically, during the iterative denoising process, a lightweight generator dynamically infers these intermediate waypoints from the current noisy state. They then continuously condition the primary diffusion transformer via the Just-Pixel AdaLN mechanism, steering the evolution towards the next state, ultimately yielding the final RGB pixels. Evaluated on ImageNet 256x256, WiT beats strong pixel-space baselines, accelerating JiT training convergence by 2.2x. Code will be publicly released at https://github.com/hainuo-wang/WiT.git.', 'score': 21, 'issue_id': 1544, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '1ebbd1feaff5524e', 'authors': ['Hainuo Wang', 'Mingjia Li', 'Xiaojie Guo'], 'affiliations': ['College of Intelligence and Computing, Tianjin University, Tianjin 300350, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.15132.jpg', 'data': {'categories': ['#optimization', '#cv', '#diffusion', '#architecture', '#open_source', '#training'], 'emoji': '🛤️', 'ru': {'title': 'Семантические ориентиры для безконфликтной генерации изображений в пиксельном пространстве', 'desc': 'Статья представляет Waypoint Diffusion Transformers (WiT) — метод для генерации изображений в пиксельном пространстве, который решает проблему пересечения траекторий оптимального транспорта. Авторы используют семантические точки-ориентиры из предобученных моделей компьютерного зрения для разделения процесса генерации на более простые сегменты. Такая факторизация векторного поля позволяет избежать конфликтов траекторий и значительно ускорить сходимость обучения — в 2.2 раза по сравнению с существующими методами. Модель динамически предсказывает промежуточные waypoints на каждой итерации денойзинга, используя механизм Just-Pixel AdaLN для условной генерации финального RGB изображения.'}, 'en': {'title': 'Disentangling Trajectories with Waypoint Diffusion Transformers', 'desc': 'Waypoint Diffusion Transformers (WiT) tackle the problem of trajectory conflicts in pixel-space flow matching by utilizing semantic waypoints derived from pre-trained vision models. This approach helps to separate the generation paths, allowing for a more efficient training process without losing important information. By breaking down the optimal transport into segments that involve waypoints, WiT enhances the clarity of the pixel-space trajectories. The method has shown significant improvements in training speed, outperforming existing models on ImageNet.'}, 'zh': {'title': '解耦生成路径，提升训练效率', 'desc': 'Waypoint Diffusion Transformers（WiT）通过使用预训练视觉模型的语义路标，解决了像素空间流匹配中的轨迹冲突问题。该方法通过将生成路径解耦，加速了训练收敛。WiT将连续向量场分解为路标前和路标后两个部分，从而有效地解开了像素空间的轨迹。经过评估，WiT在ImageNet 256x256上超越了强大的像素空间基线，训练收敛速度提高了2.2倍。'}}}, {'id': 'https://huggingface.co/papers/2603.14465', 'title': 'AgentProcessBench: Diagnosing Step-Level Process Quality in Tool-Using Agents', 'url': 'https://huggingface.co/papers/2603.14465', 'abstract': 'Abstract AgentProcessBench introduces a benchmark for evaluating step-level effectiveness in tool-augmented agent interactions, featuring diverse trajectories with detailed human annotations to improve process-level understanding and model performance.  \t\t\t\t\tAI-generated summary While Large Language Models (LLMs) have evolved into tool-using agents, they remain brittle in long-horizon interactions. Unlike mathematical reasoning where errors are often rectifiable via backtracking, tool-use failures frequently induce irreversible side effects, making accurate step-level verification critical. However, existing process-level benchmarks are predominantly confined to closed-world mathematical domains, failing to capture the dynamic and open-ended nature of tool execution. To bridge this gap, we introduce AgentProcessBench, the first benchmark dedicated to evaluating step-level effectiveness in realistic, tool-augmented trajectories. The benchmark comprises 1,000 diverse trajectories and 8,509 human-labeled step annotations with 89.1% inter-annotator agreement. It features a ternary labeling scheme to capture exploration and an error propagation rule to reduce labeling ambiguity. Extensive experiments reveal key insights: (1) weaker policy models exhibit inflated ratios of correct steps due to early termination; (2) distinguishing neutral and erroneous actions remains a significant challenge for current models; and (3) process-derived signals provide complementary value to outcome supervision, significantly enhancing test-time scaling. We hope AgentProcessBench can foster future research in reward models and pave the way toward general agents. The code and data are available at https://github.com/RUCBM/AgentProcessBench.', 'score': 14, 'issue_id': 1539, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': 'ec48ca77bc37dff5', 'authors': ['Shengda Fan', 'Xuyan Ye', 'Yupeng Huo', 'Zhi-Yuan Chen', 'Yiju Guo', 'Shenzhi Yang', 'Wenkai Yang', 'Shuqi Ye', 'Jingwen Chen', 'Haotian Chen', 'Xin Cong', 'Yankai Lin'], 'affiliations': ['Beijing Jiaotong University', 'Renmin University of China', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.14465.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Пошаговая оценка надежности инструмент-ориентированных агентов', 'desc': 'AgentProcessBench представляет собой первый бенчмарк для оценки качества каждого шага в длинных последовательностях действий агентов, использующих инструменты. Бенчмарк содержит 1000 различных траекторий с 8509 человеческими аннотациями на уровне отдельных шагов, что позволяет более точно оценивать ошибки в процессе выполнения. Исследование показывает, что современные модели испытывают сложности в различении нейтральных и ошибочных действий, а сигналы обратной связи на уровне процесса значительно улучшают масштабируемость при инференсе. Полученные результаты открывают новые направления для разработки reward моделей и создания более надежных агентов.'}, 'en': {'title': 'Evaluating Step-Level Effectiveness in Tool-Using Agents', 'desc': 'AgentProcessBench is a new benchmark designed to assess how well tool-using agents perform at each step of their tasks. It includes 1,000 varied task trajectories and over 8,500 human-annotated steps to help improve understanding and performance of these agents. The benchmark addresses the challenges of evaluating agents in open-ended scenarios, where mistakes can have lasting effects, unlike in closed mathematical problems. By providing detailed annotations and a unique labeling system, it aims to enhance the development of more robust AI models that can effectively use tools in complex environments.'}, 'zh': {'title': '提升工具增强代理的逐步有效性', 'desc': 'AgentProcessBench是一个用于评估工具增强代理交互中逐步有效性的基准测试。它包含1000条多样化的轨迹和8509个经过人类标注的步骤注释，旨在提高过程级理解和模型性能。该基准采用三元标记方案来捕捉探索行为，并通过错误传播规则减少标注歧义。我们的实验表明，当前模型在区分中性和错误行为方面仍面临重大挑战，AgentProcessBench有望推动奖励模型的未来研究。'}}}, {'id': 'https://huggingface.co/papers/2603.16859', 'title': 'SocialOmni: Benchmarking Audio-Visual Social Interactivity in Omni Models', 'url': 'https://huggingface.co/papers/2603.16859', 'abstract': "Abstract SocialOmni presents a benchmark for evaluating social interactivity in omni-modal large language models across speaker identification, interruption timing, and natural interruption generation, revealing gaps between perceptual accuracy and conversational competence.  \t\t\t\t\tAI-generated summary Omni-modal large language models (OLMs) redefine human-machine interaction by natively integrating audio, vision, and text. However, existing OLM benchmarks remain anchored to static, accuracy-centric tasks, leaving a critical gap in assessing social interactivity, the fundamental capacity to navigate dynamic cues in natural dialogues. To this end, we propose SocialOmni, a comprehensive benchmark that operationalizes the evaluation of this conversational interactivity across three core dimensions: (i) speaker separation and identification (who is speaking), (ii) interruption timing control (when to interject), and (iii) natural interruption generation (how to phrase the interruption). SocialOmni features 2,000 perception samples and a quality-controlled diagnostic set of 209 interaction-generation instances with strict temporal and contextual constraints, complemented by controlled audio-visual inconsistency scenarios to test model robustness. We benchmarked 12 leading OLMs, which uncovers significant variance in their social-interaction capabilities across models. Furthermore, our analysis reveals a pronounced decoupling between a model's perceptual accuracy and its ability to generate contextually appropriate interruptions, indicating that understanding-centric metrics alone are insufficient to characterize conversational social competence. More encouragingly, these diagnostics from SocialOmni yield actionable signals for bridging the perception-interaction divide in future OLMs.", 'score': 13, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'd07f52b67b5e9347', 'authors': ['Tianyu Xie', 'Jinfa Huang', 'Yuexiao Ma', 'Rongfang Luo', 'Yan Yang', 'Wang Chen', 'Yuhui Zeng', 'Ruize Fang', 'Yixuan Zou', 'Xiawu Zheng', 'Jiebo Luo', 'Rongrong Ji'], 'affiliations': ['Department of Computer Science, University of Rochester', 'Institute of Artificial Intelligence, Xiamen University', 'Media Analytics and Computing Lab, Xiamen University', 'School of Informatics, Xiamen University', 'Sichuan Agricultural University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16859.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#dataset'], 'emoji': '🗣️', 'ru': {'title': 'Социальная интерактивность омни-модальных LLM: от восприятия к диалогу', 'desc': 'В статье представлен бенчмарк SocialOmni для оценки социальной интерактивности омни-модальных больших языковых моделей, которые одновременно обрабатывают аудио, видео и текст. Бенчмарк оценивает три ключевых аспекта: идентификацию говорящего, выбор момента для прерывания собеседника и качество генерации самого прерывания. Авторы показали, что существует значительный разрыв между точностью восприятия модели и её способностью генерировать контекстуально уместные реплики в динамичном диалоге. Результаты анализа 12 передовых омни-модальных моделей демонстрируют, что метрики понимания недостаточны для характеристики социальной компетентности в разговоре.'}, 'en': {'title': 'Bridging the Gap: Evaluating Social Interactivity in Language Models', 'desc': 'The paper introduces SocialOmni, a new benchmark designed to evaluate social interactivity in omni-modal large language models (OLMs). It focuses on three key aspects: identifying speakers, timing interruptions, and generating natural interruptions during conversations. The study reveals that while some models perform well in understanding speech, they often struggle with generating appropriate conversational responses. This highlights the need for more comprehensive metrics that assess both perception and interaction capabilities in OLMs.'}, 'zh': {'title': '提升全模态语言模型的社交互动能力', 'desc': 'SocialOmni是一个用于评估全模态大型语言模型社交互动能力的基准，主要关注说话者识别、打断时机和自然打断生成。现有的全模态语言模型基准主要集中在静态的准确性任务上，未能有效评估动态对话中的社交互动能力。通过对12000个样本的测试，SocialOmni揭示了不同模型在社交互动能力上的显著差异，并指出感知准确性与生成适当打断之间存在明显脱节。该基准为未来的全模态语言模型提供了改进社交互动能力的可行信号。'}}}, {'id': 'https://huggingface.co/papers/2603.16869', 'title': 'SegviGen: Repurposing 3D Generative Model for Part Segmentation', 'url': 'https://huggingface.co/papers/2603.16869', 'abstract': 'Abstract SegviGen repurposes pretrained 3D generative models for efficient 3D part segmentation using distinctive part colorization, achieving superior performance with minimal labeled data.  \t\t\t\t\tAI-generated summary We introduce SegviGen, a framework that repurposes native 3D generative models for 3D part segmentation. Existing pipelines either lift strong 2D priors into 3D via distillation or multi-view mask aggregation, often suffering from cross-view inconsistency and blurred boundaries, or explore native 3D discriminative segmentation, which typically requires large-scale annotated 3D data and substantial training resources. In contrast, SegviGen leverages the structured priors encoded in pretrained 3D generative model to induce segmentation through distinctive part colorization, establishing a novel and efficient framework for part segmentation. Specifically, SegviGen encodes a 3D asset and predicts part-indicative colors on active voxels of a geometry-aligned reconstruction. It supports interactive part segmentation, full segmentation, and full segmentation with 2D guidance in a unified framework. Extensive experiments show that SegviGen improves over the prior state of the art by 40% on interactive part segmentation and by 15% on full segmentation, while using only 0.32% of the labeled training data. It demonstrates that pretrained 3D generative priors transfer effectively to 3D part segmentation, enabling strong performance with limited supervision. See our project page at https://fenghora.github.io/SegviGen-Page/.', 'score': 12, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '8b69267a7d35d017', 'authors': ['Lin Li', 'Haoran Feng', 'Zehuan Huang', 'Haohua Chen', 'Wenbo Nie', 'Shaohua Hou', 'Keqing Fan', 'Pan Hu', 'Sheng Wang', 'Buyu Li', 'Lu Sheng'], 'affiliations': ['Beihang University', 'OriginArk', 'Renmin University of China', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16869.jpg', 'data': {'categories': ['#training', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Цветная роспись для понимания структуры 3D объектов', 'desc': 'SegviGen — это фреймворк, который переиспользует предобученные 3D генеративные модели для задачи сегментации частей 3D объектов. Вместо традиционных подходов, которые либо переносят 2D признаки в 3D через дистилляцию, либо требуют больших объемов размеченных данных, метод использует структурированные приоры из генеративной модели и инициирует сегментацию через характерную окраску частей. Фреймворк поддерживает интерактивную сегментацию, полную сегментацию и сегментацию с 2D руководством в едином подходе. Экспериментальные результаты показывают, что SegviGen превосходит существующие методы на 40% в интерактивной сегментации и на 15% в полной сегментации, используя при этом только 0,32% размеченных данных для обучения.'}, 'en': {'title': 'Efficient 3D Part Segmentation with Minimal Data', 'desc': 'SegviGen is a new framework that uses pretrained 3D generative models to improve the process of 3D part segmentation. Unlike traditional methods that often require large amounts of labeled data and can struggle with inconsistencies, SegviGen efficiently utilizes colorization to identify different parts of a 3D object. This approach allows for interactive and full segmentation while significantly reducing the need for extensive training resources. The results show that SegviGen outperforms previous methods, achieving better accuracy with only a small fraction of labeled data.'}, 'zh': {'title': 'SegviGen：高效的3D部件分割新方法', 'desc': 'SegviGen 是一个将预训练的 3D 生成模型用于高效 3D 部件分割的框架。它通过独特的部件上色技术，利用预训练模型中编码的结构先验，实现了在标注数据极少的情况下，显著提升分割性能。与传统方法相比，SegviGen 避免了跨视图不一致和模糊边界的问题，提供了交互式分割和全分割的统一框架。实验结果表明，SegviGen 在交互式分割上提高了 40%，在全分割上提高了 15%，仅使用了 0.32% 的标注训练数据。'}}}, {'id': 'https://huggingface.co/papers/2603.13398', 'title': 'Qianfan-OCR: A Unified End-to-End Model for Document Intelligence', 'url': 'https://huggingface.co/papers/2603.13398', 'abstract': 'Abstract Qianfan-OCR is a 4B-parameter vision-language model that unifies document parsing, layout analysis, and understanding while maintaining strong performance across multiple OCR benchmarks through its Layout-as-Thought mechanism.  \t\t\t\t\tAI-generated summary We present Qianfan-OCR, a 4B-parameter end-to-end vision-language model that unifies document parsing, layout analysis, and document understanding within a single architecture. It performs direct image-to-Markdown conversion and supports diverse prompt-driven tasks including table extraction, chart understanding, document QA, and key information extraction. To address the loss of explicit layout analysis in end-to-end OCR, we propose Layout-as-Thought, an optional thinking phase triggered by special think tokens that generates structured layout representations -- bounding boxes, element types, and reading order -- before producing final outputs, recovering layout grounding capabilities while improving accuracy on complex layouts. Qianfan-OCR ranks first among end-to-end models on OmniDocBench v1.5 (93.12) and OlmOCR Bench (79.8), achieves competitive results on OCRBench, CCOCR, DocVQA, and ChartQA against general VLMs of comparable scale, and attains the highest average score on public key information extraction benchmarks, surpassing Gemini-3.1-Pro, Seed-2.0, and Qwen3-VL-235B. The model is publicly accessible via the Baidu AI Cloud Qianfan platform.', 'score': 11, 'issue_id': 1543, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '4dea9edc9b5f9c8c', 'authors': ['Daxiang Dong', 'Mingming Zheng', 'Dong Xu', 'Chunhua Luo', 'Bairong Zhuang', 'Yuxuan Li', 'Ruoyun He', 'Haoran Wang', 'Wenyu Zhang', 'Wenbo Wang', 'Yicheng Wang', 'Xue Xiong', 'Ayong Zheng', 'Xiaoying Zuo', 'Ziwei Ou', 'Jingnan Gu', 'Quanhao Guo', 'Jianmin Wu', 'Dawei Yin', 'Dou Shen'], 'affiliations': ['Baidu AI Cloud'], 'pdf_title_img': 'assets/pdf/title_img/2603.13398.jpg', 'data': {'categories': ['#cv', '#benchmark', '#small_models', '#open_source', '#multimodal'], 'emoji': '📄', 'ru': {'title': 'Документы понимаются целиком: унифицированная модель для OCR с явным анализом макета', 'desc': 'Qianfan-OCR — это компактная визуально-языковая модель с 4 миллиардами параметров, которая объединяет распознавание текста, анализ макета и понимание документов в единую архитектуру. Модель выполняет прямое преобразование изображения в Markdown и поддерживает различные задачи, включая извлечение таблиц, анализ диаграмм и ответы на вопросы о документах. Для сохранения информации о макете документа авторы предложили механизм Layout-as-Thought — опциональный этап рассуждения, который генерирует структурированные представления макета перед финальным выводом. Модель достигает лучших результатов среди конкурирующих решений на нескольких бенчмарках и доступна через платформу Baidu AI Cloud.'}, 'en': {'title': 'Unifying Document Understanding with Qianfan-OCR', 'desc': 'Qianfan-OCR is a powerful vision-language model with 4 billion parameters that integrates document parsing, layout analysis, and understanding into one system. It utilizes a unique Layout-as-Thought mechanism to enhance layout representation, allowing for better accuracy in complex document layouts. The model excels in various tasks such as image-to-Markdown conversion, table extraction, and document question answering, achieving top scores on multiple OCR benchmarks. By combining these capabilities, Qianfan-OCR sets a new standard for end-to-end OCR performance while being accessible through the Baidu AI Cloud.'}, 'zh': {'title': 'Qianfan-OCR：统一文档解析与理解的强大模型', 'desc': 'Qianfan-OCR 是一个拥有 40 亿参数的视觉-语言模型，能够统一文档解析、布局分析和理解。它通过 Layout-as-Thought 机制，在多个 OCR 基准测试中保持强大的性能。该模型支持直接将图像转换为 Markdown，并能够处理表格提取、图表理解、文档问答和关键信息提取等多种任务。Qianfan-OCR 在多个基准测试中表现优异，尤其在复杂布局的准确性上有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.15401', 'title': 'SWE-Skills-Bench: Do Agent Skills Actually Help in Real-World Software Engineering?', 'url': 'https://huggingface.co/papers/2603.15401', 'abstract': "Abstract Agent skills provide limited benefits in software engineering tasks, with most skills offering no improvement and only a few showing meaningful gains.  \t\t\t\t\tAI-generated summary Agent skills, structured procedural knowledge packages injected at inference time, are increasingly used to augment LLM agents on software engineering tasks. However, their real utility in end-to-end development settings remains unclear. We present SWE-Skills-Bench, the first requirement-driven benchmark that isolates the marginal utility of agent skills in real-world software engineering (SWE). It pairs 49 public SWE skills with authentic GitHub repositories pinned at fixed commits and requirement documents with explicit acceptance criteria, yielding approximately 565 task instances across six SWE subdomains. We introduce a deterministic verification framework that maps each task's acceptance criteria to execution-based tests, enabling controlled paired evaluation with and without the skill. Our results show that skill injection benefits are far more limited than rapid adoption suggests: 39 of 49 skills yield zero pass-rate improvement, and the average gain is only +1.2%. Token overhead varies from modest savings to a 451% increase while pass rates remain unchanged. Only seven specialized skills produce meaningful gains (up to +30%), while three degrade performance (up to -10%) due to version-mismatched guidance conflicting with project context. These findings suggest that agent skills are a narrow intervention whose utility depends strongly on domain fit, abstraction level, and contextual compatibility. SWE-Skills-Bench provides a testbed for evaluating the design, selection, and deployment of skills in software engineering agents. SWE-Skills-Bench is available at https://github.com/GeniusHTX/SWE-Skills-Bench.", 'score': 10, 'issue_id': 1542, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'a7255095d34efb8a', 'authors': ['Tingxu Han', 'Yi Zhang', 'Wei Song', 'Chunrong Fang', 'Zhenyu Chen', 'Youcheng Sun', 'Lijie Hu'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence', 'Nanjing University', 'South China University of Technology', 'The University of New South Wales'], 'pdf_title_img': 'assets/pdf/title_img/2603.15401.jpg', 'data': {'categories': ['#open_source', '#plp', '#agents', '#benchmark'], 'emoji': '🛠️', 'ru': {'title': 'Навыки агентов в разработке ПО: ограниченная польза и узкая область применения', 'desc': 'В статье представлен SWE-Skills-Bench — первый бенчмарк для оценки реальной пользы навыков агентов в задачах разработки программного обеспечения. Исследователи протестировали 49 публичных навыков на 565 задачах из реальных GitHub репозиториев с явными критериями приёмки, используя детерминированную верификацию через интеграционные тесты. Результаты показали, что большинство навыков (39 из 49) не дают улучшения качества решений, а средний прирост составляет всего +1.2%, при этом затраты на токены могут возрасти на 451%. Только семь специализированных навыков демонстрируют значимый прирост (до +30%), тогда как три снижают производительность на 10%, что указывает на критическую важность совместимости навыков с контекстом проекта.'}, 'en': {'title': 'Evaluating the Real Impact of Agent Skills in Software Engineering', 'desc': 'This paper introduces SWE-Skills-Bench, a benchmark designed to evaluate the effectiveness of agent skills in software engineering tasks. It analyzes 49 public software engineering skills against real GitHub repositories and specific requirement documents, resulting in 565 task instances. The study reveals that most skills do not improve performance, with only a few showing significant benefits, while some even degrade performance due to mismatched guidance. The findings highlight the importance of context and domain fit in the utility of agent skills, suggesting that their application should be carefully considered in software development.'}, 'zh': {'title': '代理技能的效用有限，需谨慎使用', 'desc': '本论文探讨了在软件工程任务中，代理技能的实际效用。我们提出了SWE-Skills-Bench，这是第一个需求驱动的基准，旨在评估代理技能在真实软件工程中的边际效用。研究结果表明，绝大多数代理技能并未显著提高任务通过率，只有少数技能表现出有意义的提升。我们的发现强调了代理技能的有效性依赖于领域适配、抽象层次和上下文兼容性。'}}}, {'id': 'https://huggingface.co/papers/2603.09821', 'title': 'One-Eval: An Agentic System for Automated and Traceable LLM Evaluation', 'url': 'https://huggingface.co/papers/2603.09821', 'abstract': 'Abstract One-Eval is an agentic evaluation system that automates large language model assessment by converting natural-language requests into executable workflows with integrated benchmark planning, dataset handling, and customizable reporting.  \t\t\t\t\tAI-generated summary Reliable evaluation is essential for developing and deploying large language models, yet in practice it often requires substantial manual effort: practitioners must identify appropriate benchmarks, reproduce heterogeneous evaluation codebases, configure dataset schema mappings, and interpret aggregated metrics. To address these challenges, we present One-Eval, an agentic evaluation system that converts natural-language evaluation requests into executable, traceable, and customizable evaluation workflows. One-Eval integrates (i) NL2Bench for intent structuring and personalized benchmark planning, (ii) BenchResolve for benchmark resolution, automatic dataset acquisition, and schema normalization to ensure executability, and (iii) Metrics \\& Reporting for task-aware metric selection and decision-oriented reporting beyond scalar scores. The system further incorporates human-in-the-loop checkpoints for review, editing, and rollback, while preserving sample evidence trails for debugging and auditability. Experiments show that One-Eval can execute end-to-end evaluations from diverse natural-language requests with minimal user effort, supporting more efficient and reproducible evaluation in industrial settings. Our framework is publicly available at https://github.com/OpenDCAI/One-Eval.', 'score': 9, 'issue_id': 1539, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '0f93fc427fc47ba2', 'authors': ['Chengyu Shen', 'Yanheng Hou', 'Minghui Pan', 'Runming He', 'Zhen Hao Wong', 'Meiyi Qiang', 'Zhou Liu', 'Hao Liang', 'Peichao Lai', 'Zeang Sheng', 'Wentao Zhang'], 'affiliations': ['Beijing Institute of Technology', 'Beijing University of Posts and Telecommunications', 'Peking University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2603.09821.jpg', 'data': {'categories': ['#benchmark', '#agents', '#open_source', '#dataset'], 'emoji': '🔬', 'ru': {'title': 'От текста к тестированию: агентная система для автоматической оценки LLM', 'desc': 'One-Eval — это агентная система оценки, которая автоматизирует тестирование больших языковых моделей путём преобразования естественноязычных запросов в выполняемые рабочие процессы. Система включает компоненты для планирования бенчмарков, разрешения и нормализации датасетов, а также задаче-ориентированного выбора метрик и отчётности. Платформа интегрирует контрольные точки с участием человека для проверки и отката операций, сохраняя при этом трассировку данных для отладки и аудита. Экспериментально показано, что One-Eval эффективно выполняет комплексные оценки из различных естественноязычных запросов с минимальными усилиями пользователя.'}, 'en': {'title': 'Automating Language Model Evaluation with One-Eval', 'desc': 'One-Eval is an automated evaluation system designed for large language models, streamlining the assessment process by transforming natural language requests into executable workflows. It integrates several components, including NL2Bench for personalized benchmark planning and BenchResolve for automatic dataset handling and schema normalization. This system allows for customizable reporting and task-aware metric selection, enhancing the interpretability of evaluation results. Additionally, it includes human-in-the-loop checkpoints for oversight and maintains evidence trails for debugging, making evaluations more efficient and reproducible in practical applications.'}, 'zh': {'title': '自动化评估，简化语言模型评估流程', 'desc': 'One-Eval 是一个自动化评估系统，旨在简化大型语言模型的评估过程。它通过将自然语言请求转换为可执行的工作流程，集成了基准规划、数据集处理和可定制报告功能。该系统使用 NL2Bench 进行意图结构化和个性化基准规划，同时通过 BenchResolve 处理基准解析和数据集获取。One-Eval 还支持人机协作的检查点，确保评估过程的可追溯性和可调试性，从而提高评估的效率和可重复性。'}}}, {'id': 'https://huggingface.co/papers/2603.16844', 'title': 'M^3: Dense Matching Meets Multi-View Foundation Models for Monocular Gaussian Splatting SLAM', 'url': 'https://huggingface.co/papers/2603.16844', 'abstract': 'Abstract Multi-view foundation model enhanced with matching head and monocular Gaussian splatting SLAM achieves improved pose estimation and scene reconstruction accuracy.  \t\t\t\t\tAI-generated summary Streaming reconstruction from uncalibrated monocular video remains challenging, as it requires both high-precision pose estimation and computationally efficient online refinement in dynamic environments. While coupling 3D foundation models with SLAM frameworks is a promising paradigm, a critical bottleneck persists: most multi-view foundation models estimate poses in a feed-forward manner, yielding pixel-level correspondences that lack the
