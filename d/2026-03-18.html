 a new foundation for resource-aware, planning-based diffusion modeling. The code is available at https://github.com/UnicomAI/CoTj.', 'score': 0, 'issue_id': 1544, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'ee099b0e441866ee', 'authors': ['Ping Chen', 'Xiang Liu', 'Xingpeng Zhang', 'Fei Shen', 'Xun Gong', 'Zhaoxiang Liu', 'Zezhou Chen', 'Huan Hu', 'Kai Wang', 'Shiguo Lian'], 'affiliations': ['Data Science & Artificial Intelligence Research Institute, China Unicom', 'National University of Singapore', 'School of Computer Science and Software Engineering, Southwest Petroleum University', 'School of Computing and Artificial Intelligence, Southwest Jiaotong University', 'Unicom Data Intelligence, China Unicom'], 'pdf_title_img': 'assets/pdf/title_img/2603.14704.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Умное планирование траекторий для эффективной генерации с диффузионными моделями', 'desc': 'Статья представляет Chain-of-Trajectories (CoTj) — фреймворк для оптимизации диффузионных моделей, который позволяет динамически распределять вычислительные ресурсы в зависимости от сложности процесса удаления шума на каждом этапе. Основной инновацией является Diffusion DNA — низкоразмерная сигнатура, которая количественно оценивает сложность денойзинга и служит прокси для высокоразмерного пространства состояний, превращая генерацию в задачу планирования на ориентированном ациклическом графе. Предложенный подход заменяет фиксированный график дискретизации на адаптивный, контекстно-зависимый, позволяя системе сосредоточить вычислительные усилия на самых сложных фазах генерации. Экспериментальные результаты показывают, что CoTj улучшает качество генерируемых образцов и стабильность, одновременно снижая избыточные вычисления без необходимости переобучения модели.'}, 'en': {'title': 'Dynamic Planning for Enhanced Diffusion Modeling', 'desc': 'The Chain-of-Trajectories (CoTj) framework enhances diffusion models by allowing for more thoughtful planning through a method called Diffusion DNA. This approach addresses the limitations of traditional diffusion models, which often operate in a rigid manner due to the complexity of high-dimensional noise. By using a low-dimensional signature to assess denoising difficulty, CoTj reformulates the sampling process into a more manageable graph planning task. As a result, it allocates computational resources more effectively, leading to improved generative output quality and efficiency.'}, 'zh': {'title': '智能规划，优化扩散模型的计算资源', 'desc': '本论文提出了一种名为链式轨迹（Chain-of-Trajectories, CoTj）的框架，旨在为扩散模型提供更灵活的规划能力。通过引入扩散DNA，这种低维特征可以量化每个阶段的去噪难度，从而优化计算资源的分配。CoTj采用预测-规划-执行的范式，能够动态调整计算努力，专注于最具挑战性的生成阶段。实验结果表明，CoTj能够发现上下文感知的轨迹，提高输出质量和稳定性，同时减少冗余计算。'}}}, {'id': 'https://huggingface.co/papers/2603.13715', 'title': 'Measuring Primitive Accumulation: An Information-Theoretic Approach to Capitalist Enclosure in PIK2, Indonesia', 'url': 'https://huggingface.co/papers/2603.13715', 'abstract': 'Abstract  Large-scale land enclosure for speculative mega-development constitutes a non-equilibrium spatial process whose velocity, topology, and irreversibility remain poorly quantified. We study the Pantai Indah Kapuk 2 (PIK2) coastal mega-development north of Jakarta, Indonesia, using eight years (2017--2024) of Sentinel-2 land-use/land-cover (LULC) data at 10-meter resolution. The landscape is projected onto a Marxian probability simplex partitioning terrestrial pixels into Commons, Agrarian, and Capital fractions. Fisher-Rao (FR) geodesic distances on this simplex identify a transformation pulse of 0.405~rad/yr during 2019--2020, coinciding with major construction activity. Absorbing Markov chain analysis yields expected absorption times into the built environment of 46.0~years for cropland and 38.1~years for tree cover, with a pooled built-area self-retention rate of 96.4%. Percolation analysis reveals that a giant connected component containing 89--95% of all built pixels persists at occupation probabilities p in [0.096, 0.162], far below the random percolation threshold p_c approx 0.593, indicating planned rather than stochastic spatial growth. The box-counting fractal dimension of the urban boundary increases from d_f = 1.316 to 1.397, consistent with increasingly irregular frontier expansion. These results suggest that information-geometric and statistical-mechanical tools can characterize the kinematic and topological signatures of capitalist spatial accumulation with quantitative precision.', 'score': 0, 'issue_id': 1539, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': 'b5c73df88b9066e5', 'authors': ['Sandy Hardian Susanto Herho', 'Alfita Puspa Handayani', 'Karina Aprilia Sujatmiko', 'Faruq Khadami', 'Iwan Pramesti Anwar'], 'affiliations': ['Applied and Environmental Oceanography Research Group, Bandung Institute of Technology, Bandung, West Java 40132, Indonesia', 'Center for Agrarian Studies, Bandung Institute of Technology, Bandung, West Java 40132, Indonesia', 'Department of Earth and Planetary Sciences, University of California, Riverside, CA 92521, USA', 'School of Systems Science and Industrial Engineering, State University of New York, Binghamton, NY 13902, USA', 'Spatial Systems and Cadaster Research Group, Bandung Institute of Technology, Bandung, West Java 40132, Indonesia'], 'pdf_title_img': 'assets/pdf/title_img/2603.13715.jpg', 'data': {'categories': [], 'emoji': '🏗️', 'ru': {'title': 'Геометрия земельного захвата: количественный анализ необратимой урбанизации', 'desc': 'Исследование использует данные спутниковых снимков Sentinel-2 для анализа крупномасштабного освоения земель в индонезийском мегапроекте PIK2. Авторы применяют информационную геометрию и марковские цепи для количественной оценки необратимого преобразования ландшафта из сельскохозяйственных угодий в застроенную среду. Анализ показывает, что урбанизация происходит по планомерной схеме, а не случайно, с характерным временем поглощения естественных экосистем в пределах 40 лет. Фрактальный анализ границ городского развития выявляет усложнение пространственной структуры, что свидетельствует о геометрически упорядоченном характере капиталистического накопления в пространстве.'}, 'en': {'title': 'Quantifying Urban Growth: The Science of Planned Development', 'desc': 'This paper investigates the rapid development of the Pantai Indah Kapuk 2 area in Indonesia using advanced machine learning techniques on land-use data. It employs Fisher-Rao geodesic distances to analyze the transformation of land over time, particularly during significant construction phases. The study also utilizes absorbing Markov chain analysis to predict how long it will take for different land types to be converted into built environments. Additionally, it applies percolation theory to demonstrate that the urban growth is planned rather than random, highlighting the structured nature of capitalist land development.'}, 'zh': {'title': '量化资本主义空间积累的动态特征', 'desc': '这篇论文研究了印度尼西亚雅加达北部的Pantai Indah Kapuk 2（PIK2）沿海大型开发项目，使用了2017年至2024年的Sentinel-2土地利用/土地覆盖数据。研究表明，该地区的空间发展过程具有非平衡特征，且其速度和拓扑结构尚未得到充分量化。通过Fisher-Rao几何距离和吸收马尔可夫链分析，论文揭示了土地转变的时间和模式，显示出计划性而非随机的空间增长。结果表明，信息几何和统计力学工具能够精确地表征资本主义空间积累的运动学和拓扑特征。'}}}, {'id': 'https://huggingface.co/papers/2603.12396', 'title': 'Test-Time Strategies for More Efficient and Accurate Agentic RAG', 'url': 'https://huggingface.co/papers/2603.12396', 'abstract': 'Abstract Test-time modifications to the Search-R1 pipeline improve retrieval efficiency and answer accuracy through contextualization and de-duplication modules.  \t\t\t\t\tAI-generated summary Retrieval-Augmented Generation (RAG) systems face challenges with complex, multihop questions, and agentic frameworks such as Search-R1 (Jin et al., 2025), which operates iteratively, have been proposed to address these complexities. However, such approaches can introduce inefficiencies, including repetitive retrieval of previously processed information and challenges in contextualizing retrieved results effectively within the current generation prompt. Such issues can lead to unnecessary retrieval turns, suboptimal reasoning, inaccurate answers, and increased token consumption.   In this paper, we investigate test-time modifications to the Search-R1 pipeline to mitigate these identified shortcomings. Specifically, we explore the integration of two components and their combination: a contextualization module to better integrate relevant information from retrieved documents into reasoning, and a de-duplication module that replaces previously retrieved documents with the next most relevant ones. We evaluate our approaches using the HotpotQA (Yang et al., 2018) and the Natural Questions (Kwiatkowski et al., 2019) datasets, reporting the exact match (EM) score, an LLM-as-a-Judge assessment of answer correctness, and the average number of turns.   Our best-performing variant, utilizing GPT-4.1-mini for contextualization, achieves a 5.6% increase in EM score and reduces the number of turns by 10.5% compared to the Search-R1 baseline, demonstrating improved answer accuracy and retrieval efficiency.', 'score': 0, 'issue_id': 1541, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '72e5b6154580fc10', 'authors': ['Brian Zhang', 'Deepti Guntur', 'Zhiyang Zuo', 'Abhinav Sharma', 'Shreyas Chaudhari', 'Wenlong Zhao', 'Franck Dernoncourt', 'Puneet Mathur', 'Ryan Rossi', 'Nedim Lipka'], 'affiliations': ['Adobe Research', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2603.12396.jpg', 'data': {'categories': ['#agents', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Оптимизация поиска через контекстуализацию и дедупликацию', 'desc': 'В статье исследуются модификации pipeline поиска Search-R1, которые применяются на этапе тестирования для повышения эффективности систем RAG при ответе на сложные многошаговые вопросы. Авторы предлагают два модуля: модуль контекстуализации, который лучше интегрирует информацию из извлеченных документов в рассуждения, и модуль дедупликации, который заменяет уже обработанные документы на более релевантные альтернативы. Методика оценивается на датасетах HotpotQA и Natural Questions с использованием метрик точного совпадения и оценки LLM-судьей, а также подсчета количества итераций поиска. Предложенный подход показывает увеличение точности на 5.6% и сокращение количества поисковых запросов на 10.5% по сравнению с базовым алгоритмом.'}, 'en': {'title': 'Enhancing Retrieval Efficiency and Accuracy in RAG Systems', 'desc': 'This paper focuses on enhancing the Search-R1 pipeline used in Retrieval-Augmented Generation (RAG) systems to improve efficiency and accuracy when answering complex questions. The authors introduce two key modifications: a contextualization module that helps integrate relevant information from retrieved documents into the reasoning process, and a de-duplication module that ensures previously retrieved documents are replaced with new, relevant ones. By implementing these changes, the authors aim to reduce unnecessary retrievals and improve the overall quality of answers generated. Their experiments show that these modifications lead to a significant increase in answer accuracy and a reduction in the number of retrieval turns needed.'}, 'zh': {'title': '提升检索效率与答案准确性的创新方法', 'desc': '本文探讨了在测试阶段对Search-R1管道进行修改，以提高检索效率和答案准确性。我们引入了上下文化模块和去重模块，旨在更好地整合检索到的信息并减少重复检索。通过在HotpotQA和Natural Questions数据集上的评估，我们的最佳变体在答案准确性上提高了5.6%的EM分数，并减少了10.5%的检索轮次。研究结果表明，这些改进有效提升了检索增强生成系统的性能。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (5)', '#agents (11)', '#agi', '#alignment', '#architecture (6)', '#audio (1)', '#benchmark (17)', '#cv (4)', '#data (1)', '#dataset (11)', '#diffusion (6)', '#ethics (1)', '#games (2)', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (5)', '#interpretability (3)', '#leakage', '#long_context (4)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual (1)', '#multimodal (9)', '#open_source (14)', '#optimization (8)', '#plp (4)', '#rag (1)', '#reasoning (8)', '#rl (4)', '#rlhf', '#robotics (3)', '#science (1)', '#security', '#small_models (5)', '#story_generation', '#survey', '#synthetic (4)', '#training (13)', '#transfer_learning (3)', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-18 09:46',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-18 09:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-18 09:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
