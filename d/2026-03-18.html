requisite precision for rigorous geometric optimization. To address this, we present M^3, which augments the Multi-view foundation model with a dedicated Matching head to facilitate fine-grained dense correspondences and integrates it into a robust Monocular Gaussian Splatting SLAM. M^3 further enhances tracking stability by incorporating dynamic area suppression and cross-inference intrinsic alignment. Extensive experiments on diverse indoor and outdoor benchmarks demonstrate state-of-the-art accuracy in both pose estimation and scene reconstruction. Notably, M^3 reduces ATE RMSE by 64.3% compared to VGGT-SLAM 2.0 and outperforms ARTDECO by 2.11 dB in PSNR on the ScanNet++ dataset.', 'score': 7, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '75524de2a2bd675f', 'authors': ['Kerui Ren', 'Guanghao Li', 'Changjian Jiang', 'Yingxiang Xu', 'Tao Lu', 'Linning Xu', 'Junting Dong', 'Jiangmiao Pang', 'Mulin Yu', 'Bo Dai'], 'affiliations': ['Beijing Institute of Technology', 'Fudan University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16844.jpg', 'data': {'categories': ['#benchmark', '#cv', '#3d'], 'emoji': '🎥', 'ru': {'title': 'Сопоставление признаков в foundation models для точного SLAM из монокулярного видео', 'desc': 'Авторы предлагают M³ — систему для одновременной локализации и построения карты (SLAM), которая объединяет многовидовую foundation model с специализированной головкой сопоставления для получения высокоточных плотных соответствий между кадрами. Интеграция этого модуля в монокулярное Gaussian Splatting позволяет эффективно восстанавливать трёхмерную геометрию сцены в реальном времени с одной видеокамеры. Дополнительно используются техники динамического подавления и кросс-инференс выравнивания параметров камеры для повышения стабильности отслеживания позы. Экспериментальные результаты показывают значительное улучшение точности оценки позы и реконструкции сцены по сравнению с существующими методами.'}, 'en': {'title': 'M^3: Enhancing Pose Estimation with Multi-view Models and SLAM', 'desc': 'This paper introduces M^3, a novel approach that combines a Multi-view foundation model with a Matching head and Monocular Gaussian Splatting SLAM to enhance pose estimation and scene reconstruction. The Matching head improves the accuracy of pixel-level correspondences, which are crucial for precise geometric optimization in dynamic environments. By integrating dynamic area suppression and cross-inference intrinsic alignment, M^3 achieves greater tracking stability. Experimental results show that M^3 significantly outperforms existing methods, reducing average translation error and improving scene reconstruction quality.'}, 'zh': {'title': '提升姿态估计与场景重建的M^3模型', 'desc': '本文提出了一种名为M^3的多视角基础模型，结合了匹配头和单目高斯点云SLAM，以提高姿态估计和场景重建的准确性。该模型通过细致的密集对应关系，解决了传统多视角模型在几何优化中精度不足的问题。M^3还通过动态区域抑制和交叉推理内在对齐，增强了跟踪的稳定性。实验结果表明，M^3在姿态估计和场景重建方面的表现优于现有方法，显著降低了绝对轨迹误差。'}}}, {'id': 'https://huggingface.co/papers/2603.16189', 'title': 'Reliable Reasoning in SVG-LLMs via Multi-Task Multi-Reward Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.16189', 'abstract': "Abstract CTRL-S framework enhances SVG generation through chain-of-thought reasoning and multi-reward optimization, achieving better structural coherence and visual fidelity.  \t\t\t\t\tAI-generated summary With the rapid advancement of vision-language models, an increasing number of studies have explored their potential for SVG generation tasks. Although existing approaches improve performance by constructing large-scale SVG datasets and introducing SVG-specific tokens, they still suffer from limited generalization, redundant paths in code outputs, and a lack of explicit reasoning. In this work, we present CTRL-S (Chain-of-Thought Reinforcement Learning for SVG), a unified framework that introduces a chain-of-thought mechanism to explicitly expose the model's reasoning process during SVG generation. To support this structured reasoning, we construct SVG-Sophia, a high-quality dataset containing 145K samples across SVG code refinement, Text-to-SVG, and Image-to-SVG tasks. By training the model to generate group-level structured SVG code, CTRL-S significantly improves structural coherence and visual fidelity. Furthermore, we adopt the GRPO algorithm and design a multi-reward optimization framework, incorporating DINO, image-text similarity, format, and code efficiency rewards. Through joint multi-reward optimization and multi-task training, our approach systematically enhances overall generation capabilities. Extensive experiments show that CTRL-S outperforms existing methods, achieving higher task success rates, superior SVG code quality, and exceptional visual fidelity.", 'score': 7, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '2270d6daedcc57d2', 'authors': ['Haomin Wang', 'Qi Wei', 'Qianli Ma', 'Shengyuan Ding', 'Jinhui Yin', 'Kai Chen', 'Hongjie Zhang'], 'affiliations': ['Fudan University', 'Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16189.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Цепочка рассуждений и множественные награды для совершенной генерации векторной графики', 'desc': 'CTRL-S — это новая платформа для генерации SVG, которая использует механизм цепочки рассуждений для явного раскрытия процесса мышления модели во время создания векторной графики. Авторы построили высокачественный датасет SVG-Sophia с 145K образцами для различных задач преобразования. Фреймворк применяет алгоритм GRPO и мультивознаграждающую оптимизацию с использованием нескольких метрик оценки, включая качество кода и визуальную верность. Экспериментальные результаты демонстрируют превосходство CTRL-S над существующими методами в генерации структурированного SVG-кода и улучшении качества визуального вывода.'}, 'en': {'title': 'Enhancing SVG Generation with CTRL-S: Clear Reasoning and Multi-Reward Optimization', 'desc': 'The CTRL-S framework improves the generation of Scalable Vector Graphics (SVG) by using a chain-of-thought reasoning approach and a multi-reward optimization strategy. This method allows the model to clearly demonstrate its reasoning process, which enhances the quality and coherence of the generated SVG code. Additionally, the framework is supported by the SVG-Sophia dataset, which contains a diverse range of SVG tasks, helping to train the model effectively. As a result, CTRL-S achieves better performance in terms of task success rates and visual fidelity compared to previous methods.'}, 'zh': {'title': 'CTRL-S：提升SVG生成的智能推理与优化', 'desc': 'CTRL-S框架通过链式思维推理和多重奖励优化，提升了SVG生成的结构一致性和视觉保真度。该方法引入了链式思维机制，明确展示了模型在SVG生成过程中的推理过程。为了支持这种结构化推理，我们构建了SVG-Sophia数据集，包含145K个样本，涵盖SVG代码优化、文本到SVG和图像到SVG任务。通过联合多重奖励优化和多任务训练，CTRL-S显著提高了生成能力，实验结果表明其在任务成功率和SVG代码质量上优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.13875', 'title': 'GradMem: Learning to Write Context into Memory with Test-Time Gradient Descent', 'url': 'https://huggingface.co/papers/2603.13875', 'abstract': 'Abstract GradMem enables efficient context storage and retrieval in language models through gradient-based memory writing that outperforms traditional forward-only approaches.  \t\t\t\t\tAI-generated summary Many large language model applications require conditioning on long contexts. Transformers typically support this by storing a large per-layer KV-cache of past activations, which incurs substantial memory overhead. A desirable alternative is ompressive memory: read a context once, store it in a compact state, and answer many queries from that state. We study this in a context removal setting, where the model must generate an answer without access to the original context at inference time. We introduce GradMem, which writes context into memory via per-sample test-time optimization. Given a context, GradMem performs a few steps of gradient descent on a small set of prefix memory tokens while keeping model weights frozen. GradMem explicitly optimizes a model-level self-supervised context reconstruction loss, resulting in a loss-driven write operation with iterative error correction, unlike forward-only methods. On associative key--value retrieval, GradMem outperforms forward-only memory writers with the same memory size, and additional gradient steps scale capacity much more effectively than repeated forward writes. We further show that GradMem transfers beyond synthetic benchmarks: with pretrained language models, it attains competitive results on natural language tasks including bAbI and SQuAD variants, relying only on information encoded in memory.', 'score': 7, 'issue_id': 1543, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '0362bf82ac65331a', 'authors': ['Yuri Kuratov', 'Matvey Kairov', 'Aydar Bulatov', 'Ivan Rodkin', 'Mikhail Burtsev'], 'affiliations': ['MIPT', 'Yandex Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.13875.jpg', 'data': {'categories': ['#optimization', '#long_context'], 'emoji': '💾', 'ru': {'title': 'Градиентная оптимизация для сжатия контекста в языковых моделях', 'desc': 'GradMem — это метод для эффективного сжатия контекста в языковых моделях, который использует градиентную оптимизацию для записи информации в память. Вместо традиционного подхода с KV-кешем, модель выполняет несколько шагов градиентного спуска на специальных префиксных токенах памяти, оптимизируя функцию потерь для реконструкции контекста. Метод явно минимизирует ошибку восстановления контекста, обеспечивая итеративную коррекцию и более эффективное кодирование информации. GradMem показал превосходные результаты на задачах ассоциативного поиска ключ-значение и передаётся на естественные языковые задачи без прямого доступа к исходному контексту во время инференса.'}, 'en': {'title': 'Efficient Memory Management with GradMem', 'desc': 'GradMem is a novel approach that enhances memory efficiency in language models by using gradient-based memory writing. Unlike traditional methods that only process information in a forward manner, GradMem allows the model to optimize memory storage through gradient descent during inference. This technique enables the model to compactly store context and retrieve it effectively, even without direct access to the original data. As a result, GradMem demonstrates superior performance in associative key-value retrieval and achieves competitive results on various natural language tasks, leveraging the information encoded in its memory.'}, 'zh': {'title': 'GradMem：高效的上下文存储与检索', 'desc': 'GradMem是一种通过基于梯度的记忆写入方法，提升语言模型中上下文存储和检索效率的技术。与传统的仅向前处理方法相比，GradMem能够在推理时不依赖原始上下文，生成答案。它通过对少量前缀记忆标记进行梯度下降优化，显著减少了内存开销，并实现了自监督的上下文重建损失优化。实验表明，GradMem在关联键值检索任务中表现优于同等内存大小的传统方法，并在自然语言任务中也取得了竞争性结果。'}}}, {'id': 'https://huggingface.co/papers/2603.15929', 'title': 'Semi-Autonomous Formalization of the Vlasov-Maxwell-Landau Equilibrium', 'url': 'https://huggingface.co/papers/2603.15929', 'abstract': 'Abstract  We present a complete Lean 4 formalization of the equilibrium characterization in the Vlasov-Maxwell-Landau (VML) system, which describes the motion of charged plasma. The project demonstrates the full AI-assisted mathematical research loop: an AI reasoning model (Gemini DeepThink) generated the proof from a conjecture, an agentic coding tool (Claude Code) translated it into Lean from natural-language prompts, a specialized prover (Aristotle) closed 111 lemmas, and the Lean kernel verified the result. A single mathematician supervised the process over 10 days at a cost of \\$200, writing zero lines of code.   The entire development process is public: all 229 human prompts, and 213 git commits are archived in the repository. We report detailed lessons on AI failure modes -- hypothesis creep, definition-alignment bugs, agent avoidance behaviors -- and on what worked: the abstract/concrete proof split, adversarial self-review, and the critical role of human review of key definitions and theorem statements. Notably, the formalization was completed before the final draft of the corresponding math paper was finished.', 'score': 6, 'issue_id': 1540, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '498a97815d7f0be0', 'authors': ['Vasily Ilin'], 'affiliations': ['University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.15929.jpg', 'data': {'categories': ['#agents', '#plp', '#open_source', '#science', '#math'], 'emoji': '⚡', 'ru': {'title': 'AI доказывает теоремы плазмы: от гипотезы к формальной верификации без кода', 'desc': 'Работа представляет полную формализацию в Lean 4 теоремы равновесия для системы Власова-Максвелла-Ландау, описывающей динамику заряженной плазмы. Авторы продемонстрировали цикл автоматизированного математического исследования, где AI модель генерировала доказательства, агентские инструменты переводили их в код, а специализированные верификаторы проверяли корректность. Процесс был полностью задокументирован и завершён одним математиком за 10 дней с минимальными затратами без написания кода. Исследование выявило критические проблемы в взаимодействии AI с формальной математикой и показало эффективность комбинированного подхода с человеческим контролем ключевых определений и утверждений.'}, 'en': {'title': 'AI-Driven Proofs: Revolutionizing Mathematical Research', 'desc': 'This paper discusses the formalization of the Vlasov-Maxwell-Landau (VML) system, which models the behavior of charged plasma, using Lean 4. The research showcases an AI-assisted approach where an AI model generated proofs, a coding tool translated them, and a specialized prover verified the results, all under the supervision of a single mathematician. The process highlighted both successes and challenges in AI, such as issues with hypothesis creep and the importance of human oversight in defining key concepts. The entire development is publicly available, demonstrating transparency in the AI-assisted mathematical research process.'}, 'zh': {'title': 'AI辅助数学研究的成功案例', 'desc': '本文介绍了在Vlasov-Maxwell-Landau（VML）系统中平衡特征的完整Lean 4形式化，该系统描述了带电等离子体的运动。该项目展示了完整的AI辅助数学研究循环：AI推理模型生成了从猜想到证明的过程，编码工具将其从自然语言翻译为Lean，专门的证明器关闭了111个引理，Lean内核验证了结果。整个开发过程是公开的，所有人类提示和git提交都被归档。我们报告了AI失败模式的详细经验教训，以及成功的关键因素。'}}}, {'id': 'https://huggingface.co/papers/2603.15600', 'title': 'From Passive Observer to Active Critic: Reinforcement Learning Elicits Process Reasoning for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2603.15600', 'abstract': 'Abstract  Accurate process supervision remains a critical challenge for long-horizon robotic manipulation. A primary bottleneck is that current video MLLMs, trained primarily under a Supervised Fine-Tuning (SFT) paradigm, function as passive "Observers" that recognize ongoing events rather than evaluating the current state relative to the final task goal. In this paper, we introduce PRIMO R1 (Process Reasoning Induced Monitoring), a 7B framework that transforms video MLLMs into active "Critics". We leverage outcome-based Reinforcement Learning to incentivize explicit Chain-of-Thought generation for progress estimation. Furthermore, our architecture constructs a structured temporal input by explicitly anchoring the video sequence between initial and current state images. Supported by the proposed PRIMO Dataset and Benchmark, extensive experiments across diverse in-domain environments and out-of-domain real-world humanoid scenarios demonstrate that PRIMO R1 achieves state-of-the-art performance. Quantitatively, our 7B model achieves a 50% reduction in the mean absolute error of specialized reasoning baselines, demonstrating significant relative accuracy improvements over 72B-scale general MLLMs. Furthermore, PRIMO R1 exhibits strong zero-shot generalization on difficult failure detection tasks. We establish state-of-the-art performance on RoboFail benchmark with 67.0% accuracy, surpassing closed-source models like OpenAI o1 by 6.0%.', 'score': 5, 'issue_id': 1540, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '3a7e56ee74f0eab6', 'authors': ['Yibin Liu', 'Yaxing Lyu', 'Daqi Gao', 'Zhixuan Liang', 'Weiliang Tang', 'Shilong Mu', 'Xiaokang Yang', 'Yao Mu'], 'affiliations': ['Northeastern University', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'Xiamen University Malaysia', 'Xspark AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.15600.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#small_models', '#benchmark', '#video', '#rl', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Критический взгляд робота: от наблюдателя к судье процесса', 'desc': 'В статье представлена PRIMO R1 — нейросетевая модель мультимодального анализа видео размером 7 миллиардов параметров, которая превращает пассивные видеоанализаторы в активных критиков для оценки прогресса манипуляций робота. Модель обучается с помощью обучения с подкреплением на основе исходов, что побуждает систему генерировать цепочку рассуждений для оценки прогресса выполнения задач. Архитектура использует структурированный временной ввод, якорируя видеопоследовательность между начальным и текущим состояниями. Экспериментальные результаты показывают превосходную производительность как в контролируемых, так и в реальных сценариях, включая достижение 67% точности на бенчмарке RoboFail, превосходя модели OpenAI o1.'}, 'en': {'title': 'Transforming Observers into Active Critics for Robotic Supervision', 'desc': 'This paper addresses the challenge of effective supervision in robotic manipulation over long periods. It critiques existing video multi-modal large language models (MLLMs) that only observe events without assessing their relevance to task goals. The authors introduce PRIMO R1, a framework that uses Reinforcement Learning to enable these models to actively evaluate progress and generate reasoning chains. Their extensive experiments show that PRIMO R1 significantly outperforms previous models in accuracy and generalization, particularly in detecting failures in robotic tasks.'}, 'zh': {'title': '提升机器人操作的主动监督能力', 'desc': '本论文提出了一种新的框架PRIMO R1，用于提高长时间机器人操作的过程监督能力。与传统的被动观察者不同，PRIMO R1通过强化学习将视频多模态学习模型转变为主动的批评者，能够更好地评估当前状态与最终任务目标之间的关系。该框架通过明确的思维链生成来估计进展，并构建了一个结构化的时间输入，以连接初始状态和当前状态的图像。实验结果表明，PRIMO R1在多种环境中表现出色，特别是在失败检测任务上实现了67.0%的准确率，超越了现有的闭源模型。'}}}, {'id': 'https://huggingface.co/papers/2603.14152', 'title': 'SK-Adapter: Skeleton-Based Structural Control for Native 3D Generation', 'url': 'https://huggingface.co/papers/2603.14152', 'abstract': 'Abstract SK-Adapter enables precise 3D structural control by treating skeletons as direct inputs through a lightweight adapter network that injects learnable tokens into frozen 3D generation models via cross-attention mechanisms.  \t\t\t\t\tAI-generated summary Native 3D generative models have achieved remarkable fidelity and speed, yet they suffer from a critical limitation: inability to prescribe precise structural articulations, where precise structural control within the native 3D space remains underexplored. This paper proposes SK-Adapter, a simple and yet highly efficient and effective framework that unlocks precise skeletal manipulation for native 3D generation. Moving beyond text or image prompts, which can be ambiguous for precise structure, we treat the 3D skeleton as a first-class control signal. SK-Adapter is a lightweight structural adapter network that encodes joint coordinates and topology into learnable tokens, which are injected into the frozen 3D generation backbone via cross-attention. This smart design allows the model to not only effectively "attend" to specific 3D structural constraints but also preserve its original generative priors. To bridge the data gap, we contribute Objaverse-TMS dataset, a large-scale dataset of 24k text-mesh-skeleton pairs. Extensive experiments confirm that our method achieves robust structural control while preserving the geometry and texture quality of the foundation model, significantly outperforming existing baselines. Furthermore, we extend this capability to local 3D editing, enabling the region specific editing of existing assets with skeletal guidance, which is unattainable by previous methods. Project Page: https://sk-adapter.github.io/', 'score': 5, 'issue_id': 1539, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '9f51f81ea69dc26b', 'authors': ['Anbang Wang', 'Yuzhuo Ao', 'Shangzhe Wu', 'Chi-Keung Tang'], 'affiliations': ['The Hong Kong University of Science and Technology', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.14152.jpg', 'data': {'categories': ['#optimization', '#architecture', '#dataset', '#3d'], 'emoji': '🦴', 'ru': {'title': 'Скелет как точный язык управления 3D генерацией', 'desc': 'SK-Adapter — это лёгкая адаптерная сеть, которая позволяет точно контролировать структуру 3D моделей, используя скелеты как прямые входные сигналы. Метод кодирует координаты суставов и топологию в обучаемые токены, которые внедряются в замороженную базовую модель генерации через механизм кросс-внимания. Авторы создали большой датасет Objaverse-TMS с 24k парами текста, меша и скелета для обучения. SK-Adapter обеспечивает точный структурный контроль при сохранении геометрии и текстур исходной модели, а также позволяет редактировать отдельные области существующих 3D объектов.'}, 'en': {'title': 'Unlocking Precise 3D Control with SK-Adapter', 'desc': 'The paper introduces SK-Adapter, a novel framework that enhances 3D generative models by allowing precise control over structural articulations using skeletons as direct inputs. It employs a lightweight adapter network that transforms joint coordinates and topology into learnable tokens, which are integrated into existing 3D generation models through cross-attention mechanisms. This approach not only maintains the original generative capabilities of the model but also enables effective manipulation of 3D structures, addressing a significant limitation in current models. Additionally, the authors present the Objaverse-TMS dataset, which consists of 24,000 text-mesh-skeleton pairs, to support their method and demonstrate its superior performance in local 3D editing tasks.'}, 'zh': {'title': 'SK-Adapter：精确控制3D结构的新方法', 'desc': 'SK-Adapter是一种轻量级的适配器网络，通过交叉注意机制将可学习的标记注入到冻结的3D生成模型中，从而实现精确的3D结构控制。该方法将3D骨架视为一种重要的控制信号，超越了传统的文本或图像提示，解决了精确结构控制的不足。SK-Adapter能够有效地处理特定的3D结构约束，同时保持原始生成模型的特性。通过构建Objaverse-TMS数据集，作者验证了该方法在结构控制和局部3D编辑方面的优越性，显著超越了现有的基准。'}}}, {'id': 'https://huggingface.co/papers/2603.15653', 'title': 'Recursive Language Models Meet Uncertainty: The Surprising Effectiveness of Self-Reflective Program Search for Long Context', 'url': 'https://huggingface.co/papers/2603.15653', 'abstract': "Abstract Language models struggle with long-context handling, but a new framework called SRLM improves performance by incorporating uncertainty-aware self-reflection to guide programmatic context interaction, outperforming existing methods like RLM across various tasks and context lengths.  \t\t\t\t\tAI-generated summary Long-context handling remains a core challenge for language models: even with extended context windows, models often fail to reliably extract, reason over, and use the information across long contexts. Recent works like Recursive Language Models (RLM) have approached this challenge by agentic way of decomposing long contexts into recursive sub-calls through programmatic interaction at inference. While promising, the success of RLM critically depends on how these context-interaction programs are selected, which has remained largely unexplored. In this paper, we study this problem and introduce SRLM, a framework that augments programmatic context interaction with uncertainty-aware Self-Reflection. SRLM leverages three intrinsic signals: self consistency, reasoning length, and verbalized confidence. These serve as complementary indicators of a model's internal uncertainty, and the model uses them to evaluate and compare candidate context-interaction programs. Extensive experiments across diverse benchmark datasets, context lengths, and backbone models, show that SRLM consistently outperforms state-of-the-art baselines, yielding up to 22% improvement over RLM under the same time budget. Our findings show that recursion itself is not the primary driver of performance in RLM, and a simple self-reflective program search can match or surpass RLM without requiring self-query or explicit recursion mechanisms. We find that for context lengths within the model's window, RLMs with recursion often degrade performance relative to the base model, whereas SRLM yields consistent gains across both short and long contexts. We also find that RLM is less effective in tasks with semantically intensive nature, where heuristic program search is insufficient and broader contextual understanding is required, while self-reflection in SRLM provides a semantic signal that better steers reasoning in these scenarios.", 'score': 4, 'issue_id': 1539, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': 'ef39dcd658cad4bb', 'authors': ['Keivan Alizadeh', 'Parshin Shojaee', 'Minsik Cho', 'Mehrdad Farajtabar'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2603.15653.jpg', 'data': {'categories': ['#interpretability', '#long_context', '#inference', '#benchmark', '#reasoning', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Самосознание языковой модели как ключ к пониманию долгого контекста', 'desc': 'В работе предложена система SRLM, которая решает проблему обработки длинного контекста в языковых моделях путём программного взаимодействия с контекстом, дополненного неопределённостью-осведомлённой саморефлексией. Система использует три внутренних сигнала: согласованность ответов, длину рассуждений и вербализованную уверенность модели для оценки и выбора оптимальных программ взаимодействия с контекстом. Экспериментальные результаты показывают, что SRLM превосходит существующие методы, включая рекурсивные языковые модели, на 22% при одинаковом вычислительном бюджете. Подход демонстрирует особую эффективность на семантически сложных задачах, где саморефлексия обеспечивает лучшее направление процесса рассуждения по сравнению с простым поиском программ.'}, 'en': {'title': 'SRLM: Enhancing Long-Context Handling with Self-Reflection', 'desc': 'This paper introduces a new framework called SRLM that enhances how language models handle long contexts by using uncertainty-aware self-reflection. Unlike previous methods like Recursive Language Models (RLM), which rely on recursive sub-calls, SRLM evaluates context-interaction programs based on intrinsic signals of uncertainty. The framework shows significant improvements in performance, achieving up to 22% better results than RLM across various tasks and context lengths. The findings suggest that self-reflection is more effective than recursion for improving contextual understanding in language models.'}, 'zh': {'title': 'SRLM：提升长上下文处理的新框架', 'desc': '语言模型在处理长上下文时面临挑战。SRLM框架通过引入不确定性感知的自我反思，改善了程序化上下文交互的性能。该框架利用自我一致性、推理长度和语言信心等信号，帮助模型评估和比较上下文交互程序。实验结果表明，SRLM在多种任务和上下文长度下均优于现有方法，提升了模型的整体表现。'}}}, {'id': 'https://huggingface.co/papers/2603.16867', 'title': 'Efficient Reasoning on the Edge', 'url': 'https://huggingface.co/papers/2603.16867', 'abstract': 'Abstract Lightweight reasoning in small language models is enabled through LoRA adapters, budget forcing via reinforcement learning, parallel test-time scaling, and dynamic adapter switching under strict resource constraints.  \t\t\t\t\tAI-generated summary Large language models (LLMs) with chain-of-thought reasoning achieve state-of-the-art performance across complex problem-solving tasks, but their verbose reasoning traces and large context requirements make them impractical for edge deployment. These challenges include high token generation costs, large KV-cache footprints, and inefficiencies when distilling reasoning capabilities into smaller models for mobile devices. Existing approaches often rely on distilling reasoning traces from larger models into smaller models, which are verbose and stylistically redundant, undesirable for on-device inference. In this work, we propose a lightweight approach to enable reasoning in small LLMs using LoRA adapters combined with supervised fine-tuning. We further introduce budget forcing via reinforcement learning on these adapters, significantly reducing response length with minimal accuracy loss. To address memory-bound decoding, we exploit parallel test-time scaling, improving accuracy at minor latency increase. Finally, we present a dynamic adapter-switching mechanism that activates reasoning only when needed and a KV-cache sharing strategy during prompt encoding, reducing time-to-first-token for on-device inference. Experiments on Qwen2.5-7B demonstrate that our method achieves efficient, accurate reasoning under strict resource constraints, making LLM reasoning practical for mobile scenarios. Videos demonstrating our solution running on mobile devices are available on our project page.', 'score': 3, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '07b0743865c76537', 'authors': ['Yelysei Bondarenko', 'Thomas Hehn', 'Rob Hesselink', 'Romain Lepert', 'Fabio Valerio Massoli', 'Evgeny Mironov', 'Leyla Mirvakhabova', 'Tribhuvanesh Orekondy', 'Spyridon Stasis', 'Andrey Kuzmin', 'Anna Kuzina', 'Markus Nagel', 'Ankita Nayak', 'Corrado Rainone', 'Ork de Rooij', 'Paul N Whatmough', 'Arash Behboodi', 'Babak Ehteshami Bejnordi'], 'affiliations': ['Qualcomm'], 'pdf_title_img': 'assets/pdf/title_img/2603.16867.jpg', 'data': {'categories': ['#optimization', '#inference', '#reasoning', '#training', '#small_models', '#rl', '#transfer_learning'], 'emoji': '📱', 'ru': {'title': 'Лёгкие рассуждения в компактных моделях: от облака на мобильник', 'desc': 'В работе предложен метод включения цепочки рассуждений в маленькие языковые модели с использованием LoRA адаптеров и контролируемой тонкой настройки. Авторы применяют reinforcement learning для ограничения длины ответов, что значительно сокращает количество генерируемых токенов без существенной потери качества. Для решения проблемы памяти при декодировании используется параллельное масштабирование на этапе тестирования и динамическое переключение между адаптерами. Решение позволяет эффективно запускать логическое рассуждение на мобильных устройствах с ограниченными ресурсами, достигая практической применимости LLM на edge-девайсах.'}, 'en': {'title': 'Efficient Reasoning for Small Language Models on Mobile Devices', 'desc': 'This paper presents a method to enhance reasoning capabilities in small language models using LoRA adapters and reinforcement learning. The approach focuses on reducing the verbosity of reasoning outputs while maintaining accuracy, making it suitable for mobile devices. By implementing parallel test-time scaling and dynamic adapter switching, the method optimizes memory usage and response times. The results show that this lightweight reasoning technique allows for effective on-device inference under strict resource constraints.'}, 'zh': {'title': '轻量级推理，移动设备的理想选择', 'desc': '本论文提出了一种轻量级的方法，使小型语言模型能够进行推理，使用了LoRA适配器和监督微调相结合的技术。通过强化学习实现预算强制，显著减少了响应长度，同时保持了较小的准确性损失。我们还利用并行测试时间扩展来解决内存限制解码的问题，提高了准确性，延迟增加很小。最后，动态适配器切换机制在需要时激活推理，并在提示编码期间共享KV缓存，减少了设备推理的首次响应时间。'}}}, {'id': 'https://huggingface.co/papers/2603.15854', 'title': 'FlashSampling: Fast and Memory-Efficient Exact Sampling', 'url': 'https://huggingface.co/papers/2603.15854', 'abstract': 'Abstract FlashSampling enables efficient categorical sampling by fusing the operation into the language model head matmul, eliminating memory overhead and reducing decoding time by up to 19%.  \t\t\t\t\tAI-generated summary Sampling from a categorical distribution is mathematically simple, but in large-vocabulary decoding, it often triggers extra memory traffic and extra kernels after the LM head. We present FlashSampling, an exact sampling primitive that fuses sampling into the LM-head matmul and never materializes the logits tensor in HBM. The method is simple: compute logits tile-by-tile on chip, add Gumbel noise, keep only one maximizer per row and per vocabulary tile, and finish with a small reduction over tiles. The fused tiled kernel is exact because argmax decomposes over a partition; grouped variants for online and tensor-parallel settings are exact by hierarchical factorization of the categorical distribution. Across H100, H200, B200, and B300 GPUs, FlashSampling speeds up kernel-level decode workloads, and in end-to-end vLLM experiments, it reduces time per output token by up to 19% on the models we test. These results show that exact sampling, with no approximation, can be integrated into the matmul itself, turning a bandwidth-bound postprocessing step into a lightweight epilogue. Project Page: https://github.com/FlashSampling/FlashSampling.', 'score': 2, 'issue_id': 1539, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'a22c0c94a4f86da9', 'authors': ['Tomas Ruiz', 'Zhen Qin', 'Yifan Zhang', 'Xuyang Shen', 'Yiran Zhong', 'Mengdi Wang'], 'affiliations': ['FlashSampling', 'LMU Munich', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15854.jpg', 'data': {'categories': ['#inference', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Семплирование внутри матрицы: от узкого места к молниеносной скорости', 'desc': 'FlashSampling — это новый метод для эффективного категориального семплирования при декодировании языковых моделей. Вместо отдельного вычисления полного тензора логитов, метод встраивает семплирование прямо в операцию матричного умножения LM head, что исключает необходимость в дополнительной памяти. Алгоритм работает поблочно на чипе, добавляет шум Гумбеля и сохраняет только максимум для каждой строки, затем выполняет финальную редукцию. На практике FlashSampling сокращает время декодирования до 19% без какой-либо потери точности.'}, 'en': {'title': 'Speed Up Language Model Decoding with FlashSampling!', 'desc': "FlashSampling is a novel technique that enhances categorical sampling in language models by integrating it directly into the matrix multiplication (matmul) operation of the model's head. This approach eliminates the need for additional memory usage and reduces decoding time significantly, achieving up to a 19% speedup. The method involves computing logits in smaller tiles, applying Gumbel noise, and selecting the maximum value efficiently without generating the full logits tensor. By optimizing the sampling process, FlashSampling transforms a traditionally bandwidth-heavy operation into a more efficient and streamlined step in the decoding pipeline."}, 'zh': {'title': 'FlashSampling：高效的分类采样新方法', 'desc': 'FlashSampling是一种高效的分类采样方法，它将采样操作与语言模型的矩阵乘法（matmul）融合在一起，从而消除了内存开销，并将解码时间减少了多达19%。该方法通过逐块计算logits，添加Gumbel噪声，并在每行和每个词汇块中仅保留一个最大值，最后对块进行小规模的归约。FlashSampling的融合核是精确的，因为argmax在分区上是可分解的，适用于在线和张量并行设置的分组变体通过分层因式分解分类分布实现精确性。实验结果表明，FlashSampling在多个GPU上加速了内核级解码工作负载，并在端到端的vLLM实验中显著提高了输出令牌的处理速度。'}}}, {'id': 'https://huggingface.co/papers/2603.16861', 'title': 'MolmoB0T: Large-Scale Simulation Enables Zero-Shot Manipulation', 'url': 'https://huggingface.co/papers/2603.16861', 'abstract': 'Abstract Zero-shot sim-to-real transfer is demonstrated for robotic manipulation using large-scale synthetic data and vision-language models with flow-matching action heads, achieving high success rates without real-world fine-tuning.  \t\t\t\t\tAI-generated summary A prevailing view in robot learning is that simulation alone is not enough; effective sim-to-real transfer is widely believed to require at least some real-world data collection or task-specific fine-tuning to bridge the gap between simulated and physical environments. We challenge that assumption. With sufficiently large-scale and diverse simulated synthetic training data, we show that zero-shot transfer to the real world is not only possible, but effective for both static and mobile manipulation. We introduce MolmoBot-Engine, a fully open-source pipeline for procedural data generation across robots, tasks, and diverse simulated environments in MolmoSpaces. With it, we release MolmoBot-Data, a dataset of 1.8 million expert trajectories for articulated object manipulation and pick-and-place tasks. We train three policy classes: MolmoBot, a Molmo2-based multi-frame vision-language model with a flow-matching action head; MolmoBot-Pi0, which replicates the π_0 architecture to enable direct comparison; and MolmoBot-SPOC, a lightweight policy suitable for edge deployment and amenable to RL fine-tuning. We evaluate on two robotic platforms: the Franka FR3 for tabletop manipulation tasks and the Rainbow Robotics RB-Y1 mobile manipulator for door opening, drawer manipulation, cabinet interaction, and mobile pick-and-place. Without any real-world fine-tuning, our policies achieve zero-shot transfer to unseen objects and environments. On tabletop pick-and-place, MolmoBot achieves a success rate of 79.2% in real world evaluations across 4 settings, outperforming π_{0.5} at 39.2%. Our results demonstrate that procedural environment generation combined with diverse articulated assets can produce robust manipulation policies that generalize broadly to the real world. Technical Blog: https://allenai.org/blog/molmobot-robot-manipulation', 'score': 1, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '0331dd6170e63955', 'authors': ['Abhay Deshpande', 'Maya Guru', 'Rose Hendrix', 'Snehal Jauhri', 'Ainaz Eftekhar', 'Rohun Tripathi', 'Max Argus', 'Jordi Salvador', 'Haoquan Fang', 'Matthew Wallingford', 'Wilbert Pumacay', 'Yejin Kim', 'Quinn Pfeifer', 'Ying-Chun Lee', 'Piper Wolters', 'Omar Rayyan', 'Mingtong Zhang', 'Jiafei Duan', 'Karen Farley', 'Winson Han', 'Eli Vanderbilt', 'Dieter Fox', 'Ali Farhadi', 'Georgia Chalvatzaki', 'Dhruv Shah', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Princeton University', 'Technische Universität Darmstadt', 'University of California, Los Angeles', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.16861.jpg', 'data': {'categories': ['#open_source', '#training', '#synthetic', '#robotics', '#multimodal', '#transfer_learning', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'От симуляции к реальности: нулевая подгонка для манипуляторов', 'desc': 'Исследователи разработали подход для обучения роботов манипуляции без использования данных из реального мира. Они создали MolmoBot-Engine — систему для процедурной генерации синтетических данных и собрали датасет из 1.8 миллионов траекторий экспертов для обучения политик управления роботом. На основе vision-language модели Molmo2 с flow-matching головой для предсказания действий были обучены три класса политик, которые успешно переносятся на реальные роботов без дополнительной подгонки. Результаты показали, что MolmoBot достигает 79.2% успеха при выполнении задач манипуляции в реальном мире, значительно превосходя существующие подходы.'}, 'en': {'title': 'Zero-Shot Transfer: Robots Learn to Manipulate Without Real-World Data!', 'desc': 'This paper presents a method for zero-shot sim-to-real transfer in robotic manipulation, showing that robots can effectively operate in the real world using only synthetic data. The authors introduce the MolmoBot-Engine, an open-source framework for generating diverse training data, which includes a dataset of 1.8 million expert trajectories for various manipulation tasks. They train multiple policy models, including a vision-language model with flow-matching action heads, achieving high success rates in real-world tasks without any fine-tuning. The results indicate that with sufficient synthetic training data, robots can generalize their learned skills to new, unseen environments and objects effectively.'}, 'zh': {'title': '零-shot转移：模拟与现实的无缝连接', 'desc': '这篇论文展示了零-shot的模拟到现实转移在机器人操作中的应用，使用大规模合成数据和视觉-语言模型，成功率高且无需在现实世界中进行微调。研究挑战了传统观点，认为仅靠模拟数据无法有效转移到现实环境。通过足够大规模和多样化的合成训练数据，研究表明零-shot转移不仅可行，而且在静态和移动操作中都有效。论文还介绍了MolmoBot-Engine，这是一个开放源代码的程序数据生成管道，支持多种机器人和任务的操作。'}}}, {'id': 'https://huggingface.co/papers/2603.16777', 'title': 'Anticipatory Planning for Multimodal AI Agents', 'url': 'https://huggingface.co/papers/2603.16777', 'abstract': "Abstract TraceR1 is a two-stage reinforcement learning framework that enhances multimodal agents' planning capabilities through anticipatory trajectory reasoning and execution feedback refinement.  \t\t\t\t\tAI-generated summary Recent advances in multimodal agents have improved computer-use interaction and tool-usage, yet most existing systems remain reactive, optimizing actions in isolation without reasoning about future states or long-term goals. This limits planning coherence and prevents agents from reliably solving high-level, multi-step tasks. We introduce TraceR1, a two-stage reinforcement learning framework that explicitly trains anticipatory reasoning by forecasting short-horizon trajectories before execution. The first stage performs trajectory-level reinforcement learning with rewards that enforce global consistency across predicted action sequences. The second stage applies grounded reinforcement fine-tuning, using execution feedback from frozen tool agents to refine step-level accuracy and executability. TraceR1 is evaluated across seven benchmarks, covering online computer-use, offline computer-use benchmarks, and multimodal tool-use reasoning tasks, where it achieves substantial improvements in planning stability, execution robustness, and generalization over reactive and single-stage baselines. These results show that anticipatory trajectory reasoning is a key principle for building multimodal agents that can reason, plan, and act effectively in complex real-world environments.", 'score': 1, 'issue_id': 1541, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'a9e5a551b967a0b2', 'authors': ['Yongyuan Liang', 'Shijie Zhou', 'Yu Gu', 'Hao Tan', 'Gang Wu', 'Franck Dernoncourt', 'Jihyung Kil', 'Ryan A. Rossi', 'Ruiyi Zhang'], 'affiliations': ['Adobe Research', 'State University of New York at Buffalo', 'The Ohio State University', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.16777.jpg', 'data': {'categories': ['#agents', '#rl', '#benchmark', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Упреждающее предсказание траекторий для планирования мультимодальных агентов', 'desc': 'TraceR1 — это двухэтапная система обучения с подкреплением, которая улучшает возможности планирования мультимодальных агентов. На первом этапе модель обучается предсказывать короткие траектории будущих действий, получая награды за согласованность всей последовательности. На втором этапе система уточняется на основе обратной связи от реальных инструментов, повышая точность выполнения отдельных шагов. Метод продемонстрировал значительные улучшения в семи бенчмарках, показав, что упреждающее планирование траекторий — ключ к эффективной работе агентов в сложных реальных задачах.'}, 'en': {'title': 'Enhancing Multimodal Agents with Anticipatory Planning', 'desc': 'TraceR1 is a two-stage reinforcement learning framework designed to improve the planning abilities of multimodal agents. It focuses on anticipatory trajectory reasoning, allowing agents to predict future actions and outcomes before executing them. The first stage involves trajectory-level reinforcement learning to ensure that the predicted actions are consistent and coherent. The second stage fine-tunes these actions using feedback from execution, leading to better accuracy and reliability in complex tasks.'}, 'zh': {'title': '预期轨迹推理：提升多模态智能体的规划能力', 'desc': 'TraceR1 是一个两阶段的强化学习框架，旨在通过预期轨迹推理和执行反馈优化多模态智能体的规划能力。现有的多模态系统大多是反应式的，缺乏对未来状态和长期目标的推理，限制了其规划的连贯性。TraceR1 的第一阶段通过轨迹级强化学习来训练预期推理，确保预测的动作序列在全局上的一致性。第二阶段则利用执行反馈进行精细调整，提高步骤级的准确性和可执行性，从而在复杂环境中有效地进行推理、规划和行动。'}}}, {'id': 'https://huggingface.co/papers/2603.16343', 'title': 'Learning Human-Object Interaction for 3D Human Pose Estimation from LiDAR Point Clouds', 'url': 'https://huggingface.co/papers/2603.16343', 'abstract': 'Abstract Human-Object Interaction Learning framework addresses challenges in 3D human pose estimation from LiDAR point clouds by mitigating spatial ambiguity and class imbalance through contrastive learning and adaptive pooling techniques.  \t\t\t\t\tAI-generated summary Understanding humans from LiDAR point clouds is one of the most critical tasks in autonomous driving due to its close relationships with pedestrian safety, yet it remains challenging in the presence of diverse human-object interactions and cluttered backgrounds. Nevertheless, existing methods largely overlook the potential of leveraging human-object interactions to build robust 3D human pose estimation frameworks. There are two major challenges that motivate the incorporation of human-object interaction. First, human-object interactions introduce spatial ambiguity between human and object points, which often leads to erroneous 3D human keypoint predictions in interaction regions. Second, there exists severe class imbalance in the number of points between interacting and non-interacting body parts, with the interaction-frequent regions such as hand and foot being sparsely observed in LiDAR data. To address these challenges, we propose a Human-Object Interaction Learning (HOIL) framework for robust 3D human pose estimation from LiDAR point clouds. To mitigate the spatial ambiguity issue, we present human-object interaction-aware contrastive learning (HOICL) that effectively enhances feature discrimination between human and object points, particularly in interaction regions. To alleviate the class imbalance issue, we introduce contact-aware part-guided pooling (CPPool) that adaptively reallocates representational capacity by compressing overrepresented points while preserving informative points from interacting body parts. In addition, we present an optional contact-based temporal refinement that refines erroneous per-frame keypoint estimates using contact cues over time. As a result, our HOIL effectively leverages human-object interaction to resolve spatial ambiguity and class imbalance in interaction regions. Codes will be released.', 'score': 1, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '3a1d8655c55d7b67', 'authors': ['Daniel Sungho Jung', 'Dohee Cho', 'Kyoung Mu Lee'], 'affiliations': ['Dept. of ECE&ASRI, Seoul National University', 'IPAI, Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16343.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Взаимодействие человека и объектов для надёжной оценки позы в облаках точек', 'desc': 'В работе предложена структура HOIL для оценки трёхмерной позы человека из облаков точек LiDAR, которая учитывает взаимодействие человека с объектами. Авторы решают проблему пространственной неоднозначности между точками человека и объекта с помощью контрастного обучения, чувствительного к взаимодействиям. Для борьбы с дисбалансом классов (редкие точки в областях рук и ног) используется адаптивное пулинг с учётом контакта, которое перераспределяет представительскую способность признаков. Дополнительно применяется временное уточнение на основе контактных сигналов между кадрами для повышения точности оценки позы.'}, 'en': {'title': 'Enhancing 3D Human Pose Estimation through Human-Object Interaction', 'desc': 'The Human-Object Interaction Learning (HOIL) framework improves 3D human pose estimation from LiDAR point clouds by addressing spatial ambiguity and class imbalance. It uses contrastive learning to enhance the distinction between human and object points, especially in areas where they interact. Additionally, it employs adaptive pooling techniques to manage the uneven distribution of data points, ensuring that important features from interacting body parts are preserved. This approach ultimately leads to more accurate predictions of human poses in complex environments, which is crucial for applications like autonomous driving.'}, 'zh': {'title': '人-物交互助力3D姿态估计', 'desc': '本文提出了一种人-物交互学习框架，旨在解决从LiDAR点云中进行3D人类姿态估计的挑战。该框架通过对比学习和自适应池化技术，减轻了空间模糊性和类别不平衡的问题。具体来说，采用人-物交互感知的对比学习方法，提高了人类和物体点之间的特征区分能力。通过接触感知的部分引导池化，框架有效地重新分配了表示能力，从而改善了交互区域的关键点预测。'}}}, {'id': 'https://huggingface.co/papers/2603.16184', 'title': 'Polyglot-Lion: Efficient Multilingual ASR for Singapore via Balanced Fine-Tuning of Qwen3-ASR', 'url': 'https://huggingface.co/papers/2603.16184', 'abstract': "Abstract Polyglot-Lion, a compact multilingual ASR model family for Singapore's linguistic diversity, achieves competitive performance with significantly reduced training cost and improved inference speed through balanced fine-tuning of pretrained models.  \t\t\t\t\tAI-generated summary We present Polyglot-Lion, a family of compact multilingual automatic speech recognition (ASR) models tailored for the linguistic landscape of Singapore, covering English, Mandarin, Tamil, and Malay. Our models are obtained by fine-tuning Qwen3-ASR-0.6B and Qwen3-ASR-1.7B exclusively on publicly available speech corpora, using a balanced sampling strategy that equalizes the number of training utterances per language and deliberately omits language-tag conditioning so that the model learns to identify languages implicitly from audio. On 12 benchmarks spanning the four target languages, Polyglot-Lion-1.7B achieves an average error rate of 14.85, competitive with MERaLiON-2-10B-ASR (14.32) - a model 6x larger - while incurring a training cost of \\81 on a single RTX PRO 6000 GPU compared to 18,862 for the 128-GPU baseline. Inference throughput is approximately 20x faster than MERaLiON at 0.10 s/sample versus 2.02 s/sample. These results demonstrate that linguistically balanced fine-tuning of moderate-scale pretrained models can yield deployment-ready multilingual ASR at a fraction of the cost of larger specialist systems.", 'score': 1, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '698ed15c758ad5a4', 'authors': ['Quy-Anh Dang', 'Chris Ngo'], 'affiliations': ['Knovel Engineering Lab, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.16184.jpg', 'data': {'categories': ['#audio', '#inference', '#training', '#small_models', '#multilingual'], 'emoji': '🦁', 'ru': {'title': 'Компактные мультиязычные модели распознавания речи через сбалансированный fine-tuning', 'desc': 'В статье представлена Polyglot-Lion — семейство компактных мультиязычных моделей распознавания речи (ASR), разработанных для многоязычного ландшафта Сингапура с поддержкой английского, мандарина, тамильского и малайского языков. Модели получены путём fine-tuning предобученных моделей Qwen3-ASR на открытых речевых корпусах с использованием сбалансированной стратегии выборки и без явного кодирования языка, позволяя модели неявно определять язык из аудиосигнала. Polyglot-Lion-1.7B достигает конкурентоспособной частоты ошибок (14.85) при 6-кратном уменьшении размера модели и 230-кратном снижении стоимости обучения по сравнению с базовой системой. Предложенный подход демонстрирует, что сбалансированный fine-tuning модерируемых предобученных моделей позволяет создавать эффективные мультиязычные ASR-системы с минимальными вычислительными затратами.'}, 'en': {'title': "Efficient Multilingual ASR for Singapore's Linguistic Diversity", 'desc': "The paper introduces Polyglot-Lion, a series of compact multilingual automatic speech recognition (ASR) models designed for Singapore's diverse languages, including English, Mandarin, Tamil, and Malay. These models are fine-tuned from existing pretrained models using a balanced sampling method that ensures equal representation of each language in the training data. The results show that Polyglot-Lion-1.7B achieves a competitive error rate while being significantly smaller and cheaper to train than larger models. Additionally, it offers much faster inference speeds, demonstrating the effectiveness of balanced fine-tuning for multilingual ASR applications."}, 'zh': {'title': '平衡微调，低成本多语言识别', 'desc': 'Polyglot-Lion是一种针对新加坡语言多样性的紧凑型多语言自动语音识别（ASR）模型系列。该模型通过对预训练模型进行平衡微调，显著降低了训练成本并提高了推理速度。模型在英语、普通话、泰米尔语和马来语等四种语言上表现出色，平均错误率为14.85，接近一个六倍更大的模型。研究表明，适度规模的预训练模型经过语言平衡微调后，可以以较低的成本实现多语言ASR的部署。'}}}, {'id': 'https://huggingface.co/papers/2603.16063', 'title': 'ViT-AdaLA: Adapting Vision Transformers with Linear Attention', 'url': 'https://huggingface.co/papers/2603.16063', 'abstract': 'Abstract ViT-AdaLA adapts vision foundation models to linear attention Vision Transformers through attention alignment, feature alignment, and supervised fine-tuning to overcome quadratic complexity limitations.  \t\t\t\t\tAI-generated summary Vision Transformers (ViTs) based vision foundation models (VFMs) have achieved remarkable performance across diverse vision tasks, but suffer from quadratic complexity that limits scalability to long sequences. Existing linear attention approaches for ViTs are typically trained from scratch, requiring substantial computational resources, while linearization-based methods developed for large language model decoders do not transfer well to ViTs. To address these challenges, we propose ViT-AdaLA, a novel framework for effectively adapting and transferring prior knowledge from VFMs to linear attention ViTs. ViT-AdaLA consists of three stages: attention alignment, feature alignment, and supervised fine-tuning. In the attention alignment stage, we align vanilla linear attention with the original softmax-based attention in each block to approximate the behavior of softmax attention. However, residual approximation errors inevitably accumulate across layers. We mitigate this by fine-tuning the linearized ViT to align its final-layer features with a frozen softmax VFM teacher. Finally, the adapted prior knowledge is transferred to downstream tasks through supervised fine-tuning. Extensive experiments on classification and segmentation tasks demonstrate the effectiveness and generality of ViT-AdaLA over various state-of-the-art linear attention counterpart.', 'score': 1, 'issue_id': 1541, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '5945fab925181b6a', 'authors': ['Yifan Li', 'Seunghyun Yoon', 'Viet Dac Lai', 'Franck Dernoncourt', 'Jason Kuen', 'Yu Kong', 'Trung Bui'], 'affiliations': ['Adobe Research', 'Michigan State University'], 'pdf_title_img': 'assets/pdf/title_img/2603.16063.jpg', 'data': {'categories': ['#cv', '#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'От квадратичной сложности к линейной: адаптация Vision Transformers через выравнивание', 'desc': 'Статья представляет ViT-AdaLA — фреймворк для адаптации предобученных моделей зрения к Vision Transformers с линейным вниманием, решая проблему квадратичной сложности стандартного механизма внимания. Метод состоит из трёх этапов: выравнивание механизмов внимания через аппроксимацию softmax-внимания линейным вариантом, выравнивание признаков путём дистилляции знаний от замороженной учительской модели, и финальная настройка на целевых задачах. Подход успешно переносит знания из предобученных моделей вместо обучения с нуля, значительно снижая вычислительные затраты. Экспериментальные результаты на задачах классификации и сегментации демонстрируют эффективность и универсальность предложенного метода.'}, 'en': {'title': 'Transforming Vision Transformers for Efficient Attention', 'desc': 'ViT-AdaLA is a framework designed to adapt Vision Transformers (ViTs) to use linear attention, which helps reduce computational complexity when processing long sequences. It employs three main strategies: attention alignment, feature alignment, and supervised fine-tuning, to effectively transfer knowledge from traditional vision foundation models (VFMs) to linear attention ViTs. The attention alignment stage ensures that the linear attention mimics the behavior of the original softmax attention, while feature alignment helps reduce errors that accumulate through layers. Finally, the model is fine-tuned on specific tasks, demonstrating improved performance in classification and segmentation compared to existing linear attention methods.'}, 'zh': {'title': 'ViT-AdaLA：高效适应线性注意力的视觉变换器', 'desc': 'ViT-AdaLA是一种新框架，旨在将视觉基础模型（VFM）有效地适应到线性注意力的视觉变换器（ViT）中。该方法通过注意力对齐、特征对齐和监督微调三个阶段来克服传统ViT在处理长序列时的二次复杂性限制。首先，在注意力对齐阶段，将线性注意力与原始的softmax注意力进行对齐，以近似softmax注意力的行为。最后，通过监督微调将适应后的知识转移到下游任务中，实验结果表明ViT-AdaLA在分类和分割任务上优于现有的线性注意力方法。'}}}, {'id': 'https://huggingface.co/papers/2603.15309', 'title': 'CCTU: A Benchmark for Tool Use under Complex Constraints', 'url': 'https://huggingface.co/papers/2603.15309', 'abstract': 'Abstract  Solving problems through tool use under explicit constraints constitutes a highly challenging yet unavoidable scenario for large language models (LLMs), requiring capabilities such as function calling, instruction following, and self-refinement. However, progress has been hindered by the absence of dedicated evaluations. To address this, we introduce CCTU, a benchmark for evaluating LLM tool use under complex constraints. CCTU is grounded in a taxonomy of 12 constraint categories spanning four dimensions (i.e., resource, behavior, toolset, and response). The benchmark comprises 200 carefully curated and challenging test cases across diverse tool-use scenarios, each involving an average of seven constraint types and an average prompt length exceeding 4,700 tokens. To enable reliable evaluation, we develop an executable constraint validation module that performs step-level validation and enforces compliance during multi-turn interactions between models and their environments. We evaluate nine state-of-the-art LLMs in both thinking and non-thinking modes. Results indicate that when strict adherence to all constraints is required, no model achieves a task completion rate above 20%. Further analysis reveals that models violate constraints in over 50% of cases, particularly in the resource and response dimensions. Moreover, LLMs demonstrate limited capacity for self-refinement even after receiving detailed feedback on constraint violations, highlighting a critical bottleneck in the development of robust tool-use agents. To facilitate future research, we release the data and code.', 'score': 1, 'issue_id': 1539, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '2c546a8ff6501205', 'authors': ['Junjie Ye', 'Guoqiang Zhang', 'Wenjie Fu', 'Tao Gui', 'Qi Zhang', 'Xuanjing Huang'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15309.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🔗', 'ru': {'title': 'Когда LLM с инструментами не могут следовать правилам', 'desc': 'В статье представлена CCTU — бенчмарк для оценки способности больших языковых моделей использовать инструменты при наличии сложных ограничений. Авторы разработали таксономию из 12 категорий ограничений по четырём измерениям (ресурсы, поведение, набор инструментов и формат ответа) и создали 200 тестовых примеров с средней длиной промпта более 4700 токенов. Для надёжной оценки реализован модуль валидации ограничений, который проверяет соответствие на каждом шаге взаимодействия между моделью и окружением. Результаты показывают, что при строгом соблюдении всех ограничений ни одна из девяти протестированных LLM не достигает 20% успешных завершений задач, что указывает на критические проблемы в разработке надёжных агентов с использованием инструментов.'}, 'en': {'title': 'CCTU: Benchmarking Tool Use Under Constraints for LLMs', 'desc': 'This paper addresses the challenges faced by large language models (LLMs) when using tools under strict constraints. It introduces CCTU, a benchmark designed to evaluate LLM performance in complex scenarios involving multiple constraints. The benchmark includes 200 test cases that require models to navigate various resource, behavior, toolset, and response constraints. The findings reveal that current LLMs struggle significantly with constraint adherence, achieving low task completion rates and frequently violating constraints, indicating a need for improved self-refinement capabilities.'}, 'zh': {'title': '评估大型语言模型工具使用能力的新基准', 'desc': '本文介绍了CCTU，一个用于评估大型语言模型（LLMs）在复杂约束下工具使用能力的基准。CCTU基于12个约束类别的分类法，涵盖资源、行为、工具集和响应四个维度，包含200个精心策划的测试案例。研究表明，当要求严格遵守所有约束时，没有模型的任务完成率超过20%，且模型在超过50%的情况下违反约束，尤其是在资源和响应维度。此研究揭示了LLMs在自我改进能力方面的局限性，并为未来的研究提供了数据和代码。'}}}, {'id': 'https://huggingface.co/papers/2603.15674', 'title': 'Theoretical Foundations of Latent Posterior Factors: Formal Guarantees for Multi-Evidence Reasoning', 'url': 'https://huggingface.co/papers/2603.15674', 'abstract': 'Abstract Latent Posterior Factors provides a theoretical framework for combining heterogeneous evidence in probabilistic prediction tasks with formal guarantees for trustworthy AI applications.  AI-generated summary We present a complete theoretical characterization of Latent Posterior Factors (LPF), a principled framework for aggregating multiple heterogeneous evidence items in probabilistic prediction tasks. Multi-evidence reasoning arises pervasively in high-stakes domains including healthcare diagnosis, financial risk assessment, legal case analysis, and regulatory compliance, yet existing approaches either lack formal guarantees or fail to handle multi-evidence scenarios architecturally. LPF encodes each evidence item into a Gaussian latent posterior via a variational autoencoder, converting posteriors to soft factors through Monte Carlo marginalization, and aggregating factors via exact Sum-Product Network inference (LPF-SPN) or a learned neural aggregator (LPF-Learned).   We prove seven formal guarantees spanning the key desiderata for trustworthy AI: Calibration Preservation (ECE <= epsilon + C/sqrt(K_eff)); Monte Carlo Error decaying as O(1/sqrt(M)); a non-vacuous PAC-Bayes bound with train-test gap of 0.0085 at N=4200; operation within 1.12x of the information-theoretic lower bound; graceful degradation as O(epsilon*delta*sqrt(K)) under corruption, maintaining 88% performance with half of evidence adversarially replaced; O(1/sqrt(K)) calibration decay with R^2=0.849; and exact epistemic-aleatoric uncertainty decomposition with error below 0.002%. All theorems are empirically validated on controlled datasets spanning up to 4,200 training examples. Our theoretical framework establishes LPF as a foundation for trustworthy multi-evidence AI in safety-critical applications.', 'score': 1, 'issue_id': 1544, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '730d351d4dc8d68a', 'authors': ['Aliyu Agboola Alege'], 'affiliations': ['Epalea'], 'pdf_title_img': 'assets/pdf/title_img/2603.15674.jpg', 'data': {'categories': ['#ethics', '#reasoning', '#healthcare', '#math', '#training'], 'emoji': '🔐', 'ru': {'title': 'Надежное объединение разнородных доказательств с формальными гарантиями', 'desc': 'Работа представляет теоретическую основу для Latent Posterior Factors (LPF) — метода, который объединяет несколько разнородных источников информации при решении задач вероятностного предсказания. Авторы предлагают два подхода: LPF-SPN, использующий точный вывод в сумматорно-произведенных сетях, и LPF-Learned с нейросетевым агрегатором. Исследование доказывает семь формальных гарантий надежности AI, включая сохранение калибровки, контролируемые ошибки Монте-Карло и устойчивость к искажению данных. Все теоретические результаты подтверждены экспериментально на контролируемых датасетах, что делает этот подход пригодным для критичных по безопасности приложений в медицине и финансах.'}, 'en': {'title': 'Trustworthy AI through Latent Posterior Factors', 'desc': "The paper introduces Latent Posterior Factors (LPF), a framework designed to effectively combine different types of evidence in probabilistic prediction tasks. It addresses the challenges of multi-evidence reasoning in critical fields like healthcare and finance, where existing methods often lack reliability. LPF utilizes variational autoencoders to encode evidence into Gaussian latent posteriors and employs Monte Carlo methods for aggregation, ensuring robust predictions. The authors provide formal guarantees for the framework's performance, demonstrating its potential for trustworthy AI applications in high-stakes environments."}, 'zh': {'title': '潜在后验因子：可信赖的多证据AI基础', 'desc': '本论文提出了潜在后验因子（LPF）的理论框架，用于在概率预测任务中结合异构证据。LPF通过变分自编码器将每个证据项编码为高斯潜在后验，并通过蒙特卡洛边际化将后验转换为软因子。该框架在医疗诊断、金融风险评估等高风险领域具有重要应用，提供了七个正式保证，确保可信赖的人工智能。通过实验证明，LPF在多证据场景下表现出色，能够有效处理不确定性和校准问题。'}}}, {'id': 'https://huggingface.co/papers/2603.15670', 'title': "I Know What I Don't Know: Latent Posterior Factor Models for Multi-Evidence Probabilistic Reasoning", 'url': 'https://huggingface.co/papers/2603.15670', 'abstract': 'Abstract Latent Posterior Factors framework combines variational autoencoder latent posteriors with sum-product network inference to enable probabilistic reasoning over unstructured evidence while maintaining calibrated uncertainty estimates.  AI-generated summary Real-world decision-making, from tax compliance assessment to medical diagnosis, requires aggregating multiple noisy and potentially contradictory evidence sources. Existing approaches either lack explicit uncertainty quantification (neural aggregation methods) or rely on manually engineered discrete predicates (probabilistic logic frameworks), limiting scalability to unstructured data.   We introduce Latent Posterior Factors (LPF), a framework that transforms Variational Autoencoder (VAE) latent posteriors into soft likelihood factors for Sum-Product Network (SPN) inference, enabling tractable probabilistic reasoning over unstructured evidence while preserving calibrated uncertainty estimates. We instantiate LPF as LPF-SPN (structured factor-based inference) and LPF-Learned (end-to-end learned aggregation), enabling a principled comparison between explicit probabilistic reasoning and learned aggregation under a shared uncertainty representation.   Across eight domains (seven synthetic and the FEVER benchmark), LPF-SPN achieves high accuracy (up to 97.8%), low calibration error (ECE 1.4%), and strong probabilistic fit, substantially outperforming evidential deep learning, LLMs and graph-based baselines over 15 random seeds.   Contributions: (1) A framework bridging latent uncertainty representations with structured probabilistic reasoning. (2) Dual architectures enabling controlled comparison of reasoning paradigms. (3) Reproducible training methodology with seed selection. (4) Evaluation against EDL, BERT, R-GCN, and large language model baselines. (5) Cross-domain validation. (6) Formal guarantees in a companion paper.', 'score': 1, 'issue_id': 1544, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '51542c4772bef307', 'authors': ['Aliyu Agboola Alege'], 'affiliations': ['Epalea'], 'pdf_title_img': 'assets/pdf/title_img/2603.15670.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Объединение глубокого обучения и вероятностного вывода для надёжного агрегирования доказательств', 'desc': 'Авторы предлагают фреймворк Latent Posterior Factors, который объединяет вариационные автокодировщики с сетями sum-product для вероятностного вывода над неструктурированными данными. Метод преобразует скрытые апостериорные распределения VAE в мягкие факторы правдоподобия для SPN, сохраняя при этом калибровированные оценки неопределённости. Фреймворк реализован в двух вариантах: LPF-SPN с явным вероятностным выводом и LPF-Learned с обучаемой агрегацией, что позволяет сравнивать оба подхода. Экспериментальная оценка на восьми датасетах показала высокую точность и низкую ошибку калибровки, превосходя методы evidential deep learning и графовые модели.'}, 'en': {'title': 'Bridging Uncertainty and Probabilistic Reasoning with LPF', 'desc': 'The Latent Posterior Factors (LPF) framework integrates variational autoencoders with sum-product networks to enhance probabilistic reasoning over unstructured data. It addresses the challenge of aggregating noisy evidence while providing calibrated uncertainty estimates, which is crucial for real-world decision-making. LPF transforms VAE latent posteriors into soft likelihood factors, allowing for effective inference and comparison between probabilistic reasoning and learned aggregation methods. The framework demonstrates high accuracy and low calibration error across various domains, outperforming existing models in terms of probabilistic fit and scalability.'}, 'zh': {'title': '潜在后验因子：提升概率推理的框架', 'desc': '本文提出了一种名为潜在后验因子（Latent Posterior Factors, LPF）的框架，结合了变分自编码器（VAE）的潜在后验和和积网络（SPN）推理，能够在处理非结构化证据时进行概率推理，并保持校准的不确定性估计。该框架解决了现有方法在不确定性量化和可扩展性方面的局限性，提供了明确的概率推理与学习聚合的比较。通过在八个领域的实验，LPF-SPN展示了高达97.8%的准确率和低校准误差，显著优于其他基线模型。本文的贡献包括建立潜在不确定性表示与结构化概率推理之间的桥梁，以及提供可重复的训练方法和跨领域验证。'}}}, {'id': 'https://huggingface.co/papers/2603.16099', 'title': 'OneWorld: Taming Scene Generation with 3D Unified Representation Autoencoder', 'url': 'https://huggingface.co/papers/2603.16099', 'abstract': 'Abstract OneWorld enables 3D scene generation by performing diffusion in a unified 3D representation space using a 3D Unified Representation Autoencoder and specialized consistency losses.  \t\t\t\t\tAI-generated summary Existing diffusion-based 3D scene generation methods primarily operate in 2D image/video latent spaces, which makes maintaining cross-view appearance and geometric consistency inherently challenging. To bridge this gap, we present OneWorld, a framework that performs diffusion directly within a coherent 3D representation space. Central to our approach is the 3D Unified Representation Autoencoder (3D-URAE); it leverages pretrained 3D foundation models and augments their geometry-centric nature by injecting appearance and distilling semantics into a unified 3D latent space. Furthermore, we introduce token-level Cross-View-Correspondence (CVC) consistency loss to explicitly enforce structural alignment across views, and propose Manifold-Drift Forcing (MDF) to mitigate train-inference exposure bias and shape a robust 3D manifold by mixing drifted and original representations. Comprehensive experiments demonstrate that OneWorld generates high-quality 3D scenes with superior cross-view consistency compared to state-of-the-art 2D-based methods. Our code will be available at https://github.com/SensenGao/OneWorld.', 'score': 0, 'issue_id': 1539, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'e58c07ace00b9207', 'authors': ['Sensen Gao', 'Zhaoqing Wang', 'Qihang Cao', 'Dongdong Yu', 'Changhu Wang', 'Tongliang Liu', 'Mingming Gong', 'Jiawang Bian'], 'affiliations': ['AISphere', 'Mohamed bin Zayed University of Artificial Intelligence', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'University of Melbourne', 'University of Syndey'], 'pdf_title_img': 'assets/pdf/title_img/2603.16099.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🌍', 'ru': {'title': 'Диффузия в едином 3D пространстве для согласованной генерации сцен', 'desc': 'OneWorld представляет новый подход к генерации 3D сцен, выполняя диффузию прямо в единого 3D представлении вместо традиционных 2D латентных пространств. Ключевой компонент — 3D Unified Representation Autoencoder (3D-URAE), который объединяет претренированные 3D модели-основы и вводит информацию о внешнем виде и семантике в единое 3D латентное пространство. Авторы предлагают потоковую потерю Cross-View-Correspondence (CVC) для явного обеспечения согласованности между видами и Manifold-Drift Forcing (MDF) для уменьшения смещения экспозиции обучения-инференса. Эксперименты показывают, что метод генерирует высококачественные 3D сцены с превосходной межвидовой согласованностью в сравнении с современными 2D-методами.'}, 'en': {'title': 'OneWorld: Bridging 3D Scene Generation with Unified Diffusion', 'desc': 'OneWorld is a novel framework for generating 3D scenes by utilizing diffusion processes within a unified 3D representation space. It employs a 3D Unified Representation Autoencoder (3D-URAE) that enhances existing 3D models by integrating appearance and semantic information into a single latent space. The framework introduces a token-level Cross-View-Correspondence (CVC) consistency loss to ensure that different views of the scene maintain structural alignment. Additionally, it incorporates Manifold-Drift Forcing (MDF) to reduce biases during training and improve the robustness of the generated 3D representations.'}, 'zh': {'title': '统一3D表示，生成高质量场景', 'desc': 'OneWorld 是一个用于生成 3D 场景的框架，它通过在统一的 3D 表示空间中进行扩散来实现。该方法使用了 3D 统一表示自编码器（3D-URAE），并结合了预训练的 3D 基础模型，以增强几何特性并注入外观信息。为了确保不同视角之间的结构一致性，OneWorld 引入了基于标记的跨视角对应一致性损失（CVC）。此外，提出的流形漂移强制（MDF）方法可以减少训练和推理之间的偏差，从而生成高质量且视角一致的 3D 场景。'}}}, {'id': 'https://huggingface.co/papers/2603.15118', 'title': 'VAREX: A Benchmark for Multi-Modal Structured Extraction from Documents', 'url': 'https://huggingface.co/papers/2603.15118', 'abstract': 'Abstract VAREX is a multimodal benchmark for structured data extraction from government forms that uses synthetic PDF templates and evaluates models across four input modalities to assess the impact of input format on extraction accuracy.  \t\t\t\t\tAI-generated summary We introduce VAREX (VARied-schema EXtraction), a benchmark for evaluating multimodal foundation models on structured data extraction from government forms. VAREX employs a Reverse Annotation pipeline that programmatically fills PDF templates with synthetic values, producing deterministic ground truth validated through three-phase quality assurance. The benchmark comprises 1,777 documents with 1,771 unique schemas across three structural categories, each provided in four input modalities: plain text, layout-preserving text (whitespace-aligned to approximate column positions), document image, or both text and image combined. Unlike existing benchmarks that evaluate from a single input representation, VAREX provides four controlled modalities per document, enabling systematic ablation of how input format affects extraction accuracy -- a capability absent from prior benchmarks. We evaluate 20 models from frontier proprietary models to small open models, with particular attention to models <=4B parameters suitable for cost-sensitive and latency-constrained deployment. Results reveal that (1) below 4B parameters, structured output compliance -- not extraction capability -- is a dominant bottleneck; in particular, schema echo (models producing schema-conforming structure instead of extracted values) depresses scores by 45-65 pp (percentage points) in affected models; (2) extraction-specific fine-tuning at 2B yields +81 pp gains, demonstrating that the instruction-following deficit is addressable without scale; (3) layout-preserving text provides the largest accuracy gain (+3-18 pp), exceeding pixel-level visual cues; and (4) the benchmark most effectively discriminates models in the 60-95% accuracy band. Dataset and evaluation code are publicly available.', 'score': 0, 'issue_id': 1542, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '8a94f7847f144702', 'authors': ['Udi Barzelay', 'Ophir Azulai', 'Inbar Shapira', 'Idan Friedman', 'Foad Abo Dahood', 'Madison Lee', 'Abraham Daniels'], 'affiliations': ['IBM'], 'pdf_title_img': 'assets/pdf/title_img/2603.15118.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#optimization', '#benchmark', '#dataset', '#open_source', '#synthetic'], 'emoji': '📋', 'ru': {'title': 'Мультимодальный бенчмарк для извлечения данных из государственных форм с систематической оценкой влияния формата входных данных', 'desc': 'VAREX — это многомодальный бенчмарк для оценки моделей машинного обучения на задаче извлечения структурированных данных из государственных форм. Авторы использовали синтетические PDF-шаблоны, которые программно заполнялись случайными значениями, создавая детерминированную разметку с трёхуровневой проверкой качества. Бенчмарк включает 1777 документов с 1771 уникальными схемами данных, каждый из которых представлен в четырёх модальностях: чистый текст, текст с сохранением разметки, изображение документа и комбинация текста и изображения. Исследование показало, что для небольших моделей (≤4B параметров) основным узким местом является соответствие структуре выходных данных, а не сама точность извлечения, и что текст с сохранением разметки даёт большие улучшения чем визуальные признаки.'}, 'en': {'title': 'VAREX: Unlocking Structured Data Extraction Across Modalities', 'desc': 'VAREX is a new benchmark designed to evaluate how well machine learning models can extract structured data from government forms using different input formats. It uses a unique Reverse Annotation pipeline to create synthetic PDF templates, ensuring high-quality ground truth data. The benchmark includes a diverse set of 1,777 documents with various schemas and provides four input modalities: plain text, layout-preserving text, document images, and a combination of text and images. The findings highlight that for smaller models, the ability to produce structured outputs is more critical than extraction accuracy, and that fine-tuning can significantly improve performance without needing larger models.'}, 'zh': {'title': 'VAREX：多模态基准提升结构化数据提取准确性', 'desc': 'VAREX是一个用于从政府表单中提取结构化数据的多模态基准。它使用合成PDF模板，并通过四种输入模态评估模型的提取准确性。该基准包含1777个文档和1771个独特的模式，提供了纯文本、保留布局的文本、文档图像或文本与图像结合的四种输入方式。研究结果表明，模型的参数量对提取能力有显著影响，尤其是在结构输出合规性方面。'}}}, {'id': 'https://huggingface.co/papers/2603.14704', 'title': 'Chain-of-Trajectories: Unlocking the Intrinsic Generative Optimality of Diffusion Models via Graph-Theoretic Planning', 'url': 'https://huggingface.co/papers/2603.14704', 'abstract': 'Abstract Chain-of-Trajectories framework enables deliberative planning for diffusion models by using Diffusion DNA to dynamically allocate computational resources based on denoising difficulty.  AI-generated summary Diffusion models operate in a reflexive System 1 mode, constrained by a fixed, content-agnostic sampling schedule. This rigidity arises from the curse of state dimensionality, where the combinatorial explosion of possible states in the high-dimensional noise manifold renders explicit trajectory planning intractable and leads to systematic computational misallocation. To address this, we introduce Chain-of-Trajectories (CoTj), a train-free framework enabling System 2 deliberative planning. Central to CoTj is Diffusion DNA, a low-dimensional signature that quantifies per-stage denoising difficulty and serves as a proxy for the high-dimensional state space, allowing us to reformulate sampling as graph planning on a directed acyclic graph. Through a Predict-Plan-Execute paradigm, CoTj dynamically allocates computational effort to the most challenging generative phases. Experiments across multiple generative models demonstrate that CoTj discovers context-aware trajectories, improving output quality and stability while reducing redundant computation. This work establishes
