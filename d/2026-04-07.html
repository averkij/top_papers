    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.04707', 'title': 'OpenWorldLib: A Unified Codebase and Definition of Advanced World Models', 'url': 'https://huggingface.co/papers/2604.04707', 'abstract': 'Abstract OpenWorldLib presents a standardized framework for advanced world models that integrate perception, interaction, and long-term memory capabilities for comprehensive world understanding and prediction.  AI-generated summary World models have garnered significant attention as a promising research direction in artificial intelligence, yet a clear and unified definition remains lacking. In this paper, we introduce OpenWorldLib, a comprehensive and standardized inference framework for Advanced World Models. Drawing on the evolution of world models, we propose a clear definition: a world model is a model or framework centered on perception, equipped with interaction and long-term memory capabilities, for understanding and predicting the complex world. We further systematically categorize the essential capabilities of world models. Based on this definition, OpenWorldLib integrates models across different tasks within a unified framework, enabling efficient reuse and collaborative inference. Finally, we present additional reflections and analyses on potential future directions for world model research. Code link: https://github.com/OpenDCAI/OpenWorldLib', 'score': 139, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '700a297320bfa2a0', 'authors': ['DataFlow Team', 'Bohan Zeng', 'Daili Hua', 'Kaixin Zhu', 'Yifan Dai', 'Bozhou Li', 'Yuran Wang', 'Chengzhuo Tong', 'Yifan Yang', 'Mingkun Chang', 'Jianbin Zhao', 'Zhou Liu', 'Hao Liang', 'Xiaochen Ma', 'Ruichuan An', 'Junbo Niu', 'Zimo Meng', 'Tianyi Bai', 'Meiyi Qiang', 'Huanyao Zhang', 'Zhiyou Xiao', 'Tianyu Guo', 'Qinhan Yu', 'Runhao Zhao', 'Zhengpin Li', 'Xinyi Huang', 'Yisheng Pan', 'Yiwen Tang', 'Yang Shi', 'Yue Ding', 'Xinlong Chen', 'Hongcheng Gao', 'Minglei Shi', 'Jialong Wu', 'Zekun Wang', 'Yuanxing Zhang', 'Xintao Wang', 'Pengfei Wan', 'Yiren Song', 'Mike Zheng Shou', 'Wentao Zhang'], 'affiliations': ['Beijing Key Laboratory of Data Intelligence and Security', 'HKUST', 'Kling Team, Kuaishou Technology', 'National University of Singapore', 'Peking University', 'Shanghai Jiao Tong University', 'Sun Yat-sen University', 'Tsinghua University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2604.04707.jpg', 'data': {'categories': [], 'emoji': '🌍', 'ru': {'title': 'Унифицированный фреймворк для world models с восприятием, взаимодействием и памятью', 'desc': 'В работе представляется OpenWorldLib — унифицированный фреймворк для продвинутых world models, которые объединяют восприятие окружающей среды, взаимодействие с ней и долгосрочную память. Авторы предлагают четкое определение world model как модели, сосредоточенной на восприятии и оснащенной способностями к взаимодействию и долгосрочной памяти для понимания и прогнозирования сложного мира. Фреймворк систематически категоризирует существенные возможности world models и интегрирует модели различных задач в единую инфраструктуру для эффективного переиспользования и совместного вывода. Работа также содержит анализ перспективных направлений развития исследований в области world models.'}, 'en': {'title': 'Unifying World Models for Enhanced AI Understanding', 'desc': 'OpenWorldLib is a new framework designed to enhance world models in artificial intelligence by combining perception, interaction, and long-term memory. It aims to provide a clear and unified definition of world models, which are essential for understanding and predicting complex environments. The framework categorizes the key capabilities of these models and allows for the integration of various tasks, promoting efficient reuse and collaborative inference. This paper also discusses future research directions for improving world models.'}, 'zh': {'title': '构建全面理解世界的智能模型', 'desc': 'OpenWorldLib是一个标准化的框架，旨在整合感知、交互和长期记忆能力，以实现全面的世界理解和预测。本文提出了世界模型的清晰定义，强调其以感知为中心，并具备交互和长期记忆的能力。我们系统地对世界模型的基本能力进行了分类，并在统一框架内整合了不同任务的模型，以便高效重用和协同推理。最后，文章还对未来世界模型研究的潜在方向进行了反思和分析。'}}}, {'id': 'https://huggingface.co/papers/2604.04771', 'title': 'MinerU2.5-Pro: Pushing the Limits of Data-Centric Document Parsing at Scale', 'url': 'https://huggingface.co/papers/2604.04771', 'abstract': 'Abstract Training data engineering and optimized strategies improve document parsing performance without architectural changes, achieving state-of-the-art results on OmniDocBench v1.6.  AI-generated summary Current document parsing methods compete primarily on model architecture innovation, while systematic engineering of training data remains underexplored. Yet SOTA models of different architectures and parameter scales exhibit highly consistent failure patterns on the same set of hard samples, suggesting that the performance bottleneck stems from shared deficiencies in training data rather than architecture itself. Building on this finding, we present \\minerupro, which advances the state of the art solely through data engineering and training strategy optimization while keeping the 1.2B-parameter architecture of \\mineru completely fixed. At its core is a Data Engine co-designed around coverage, informativeness, and annotation accuracy: Diversity-and-Difficulty-Aware Sampling expands training data from under 10M to 65.5M samples while correcting distribution shift; Cross-Model Consistency Verification leverages output agreement among heterogeneous models to assess sample difficulty and generate reliable annotations; the Judge-and-Refine pipeline improves annotation quality for hard samples through render-then-verify iterative correction. A three-stage progressive training strategy -- large-scale pre-training, hard sample fine-tuning, and GRPO alignment -- sequentially exploits these data at different quality tiers. On the evaluation front, we fix element-matching biases in OmniDocBench~v1.5 and introduce a Hard subset, establishing the more discriminative OmniDocBench~v1.6 protocol. Without any architectural modification, \\minerupro achieves 95.69 on OmniDocBench~v1.6, improving over the same-architecture baseline by 2.71 points and surpassing all existing methods including models with over 200times more parameters.', 'score': 87, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '09f46d66e1c55d5b', 'authors': ['Bin Wang', 'Tianyao He', 'Linke Ouyang', 'Fan Wu', 'Zhiyuan Zhao', 'Tao Chu', 'Yuan Qu', 'Zhenjiang Jin', 'Weijun Zeng', 'Ziyang Miao', 'Bangrui Xu', 'Junbo Niu', 'Mengzhang Cai', 'Jiantao Qiu', 'Qintong Zhang', 'Dongsheng Ma', 'Yuefeng Sun', 'Hejun Dong', 'Wenzheng Zhang', 'Jutao Xiao', 'Jiayong Shi', 'Pengyu Liao', 'Xiaomeng Zhao', 'Huaping Zhong', 'Liqun Wei', 'Jing Yu', 'Jie Yang', 'Wei Li', 'Shasha Wang', 'Qianqian Wu', 'Xuanhe Zhou', 'Weijia Li', 'Zhenxiang Li', 'Zhongying Tu', 'Jiang Wu', 'Lijun Wu', 'Chao Xu', 'Kai Chen', 'Wentao Zhang', 'Yu Qiao', 'Bowen Zhou', 'Dahua Lin', 'Conghui He'], 'affiliations': ['Peking University', 'SenseTime', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04771.jpg', 'data': {'categories': ['#small_models', '#data', '#benchmark', '#training', '#dataset'], 'emoji': '📄', 'ru': {'title': 'Инжиниринг данных вместо архитектур: путь к совершенному распознаванию документов', 'desc': 'Статья демонстрирует, что узким местом в распознавании документов являются не архитектуры нейросетей, а качество и разнообразие обучающих данных. Авторы разработали Data Engine с тремя ключевыми компонентами: стратегией выборки образцов с учётом сложности, верификацией консистентности между моделями и итеративным уточнением аннотаций. Трёхэтапная схема обучения — предварительная обработка большого объёма данных, дообучение на сложных примерах и выравнивание через GRPO — последовательно использует данные разного качества. Благодаря инжинирингу данных при неизменной архитектуре модель достигла состояния искусства на улучшенном бенчмарке OmniDocBench v1.6, превзойдя модели с намного большим количеством параметров.'}, 'en': {'title': 'Revolutionizing Document Parsing Through Data Engineering', 'desc': 'This paper presents \textit{minerupro}, a novel approach to document parsing that enhances performance through advanced training data engineering rather than changes in model architecture. The authors identify that many existing models struggle with similar hard samples, indicating that the limitations are often due to the quality of training data. By implementing techniques such as Diversity-and-Difficulty-Aware Sampling and Cross-Model Consistency Verification, \textit{minerupro} significantly increases the training dataset and improves annotation accuracy. Ultimately, this method achieves state-of-the-art results on the OmniDocBench v1.6 benchmark, demonstrating that effective data strategies can lead to substantial performance gains without altering the underlying model structure.'}, 'zh': {'title': '通过数据工程提升文档解析性能', 'desc': '本论文探讨了如何通过训练数据工程和优化策略来提升文档解析性能，而不需要改变模型架构。研究表明，不同架构和参数规模的最先进模型在处理困难样本时表现出一致的失败模式，说明性能瓶颈主要源于训练数据的缺陷。为此，提出了\textit{minerupro}，通过数据工程和训练策略优化，保持1.2B参数架构不变，显著提升了性能。核心是一个数据引擎，专注于覆盖率、信息量和标注准确性，采用多种策略扩展和优化训练数据。'}}}, {'id': 'https://huggingface.co/papers/2604.04921', 'title': 'TriAttention: Efficient Long Reasoning with Trigonometric KV Compression', 'url': 'https://huggingface.co/papers/2604.04921', 'abstract': 'Abstract TriAttention addresses KV cache memory bottlenecks in LLMs by leveraging Q/K vector concentration in pre-RoPE space to improve key importance estimation and enable efficient long-context generation.  AI-generated summary Extended reasoning in large language models (LLMs) creates severe KV cache memory bottlenecks. Leading KV cache compression methods estimate KV importance using attention scores from recent post-RoPE queries. However, queries rotate with position during RoPE, making representative queries very few, leading to poor top-key selection and unstable reasoning. To avoid this issue, we turn to the pre-RoPE space, where we observe that Q and K vectors are highly concentrated around fixed non-zero centers and remain stable across positions -- Q/K concentration. We show that this concentration causes queries to preferentially attend to keys at specific distances (e.g., nearest keys), with the centers determining which distances are preferred via a trigonometric series. Based on this, we propose TriAttention to estimate key importance by leveraging these centers. Via the trigonometric series, we use the distance preference characterized by these centers to score keys according to their positions, and also leverage Q/K norms as an additional signal for importance estimation. On AIME25 with 32K-token generation, TriAttention matches Full Attention reasoning accuracy while achieving 2.5x higher throughput or 10.7x KV memory reduction, whereas leading baselines achieve only about half the accuracy at the same efficiency. TriAttention enables OpenClaw deployment on a single consumer GPU, where long context would otherwise cause out-of-memory with Full Attention.', 'score': 58, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'e7c64153874b7ec2', 'authors': ['Weian Mao', 'Xi Lin', 'Wei Huang', 'Yuxin Xie', 'Tianfu Fu', 'Bohan Zhuang', 'Song Han', 'Yukang Chen'], 'affiliations': ['MIT', 'NVIDIA', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2604.04921.jpg', 'data': {'categories': ['#optimization', '#architecture', '#long_context', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Концентрация векторов как ключ к эффективному кешированию внимания', 'desc': 'TriAttention решает проблему перегрузки памяти KV cache в больших языковых моделях, используя концентрацию векторов запросов и ключей в пространстве до применения RoPE. Авторы обнаружили, что Q и K векторы стабильно группируются вокруг фиксированных центров и предпочитают ключи на определённых расстояниях, что описывается тригонометрическим рядом. На основе этого наблюдения предложен метод оценки важности ключей через расстояния между позициями и нормы векторов. TriAttention достигает точности Full Attention при 10.7x сокращении памяти и 2.5x ускорении, позволяя запускать длинные контексты на потребительских GPU.'}, 'en': {'title': 'TriAttention: Boosting Efficiency in Long-Context Generation for LLMs', 'desc': 'TriAttention is a novel approach designed to tackle memory bottlenecks in large language models (LLMs) caused by key-value (KV) cache limitations. It focuses on the concentration of query (Q) and key (K) vectors in the pre-RoPE space, which allows for better estimation of key importance. By utilizing the stable distance preferences of these vectors, TriAttention enhances the selection of top keys, leading to improved reasoning accuracy. This method significantly increases throughput and reduces memory usage, enabling efficient long-context generation on standard consumer GPUs.'}, 'zh': {'title': 'TriAttention：高效解决大型语言模型的内存瓶颈', 'desc': 'TriAttention 通过利用预 RoPE 空间中的 Q/K 向量集中来解决大型语言模型（LLMs）中的 KV 缓存内存瓶颈问题。该方法改善了关键重要性估计，从而实现高效的长上下文生成。研究表明，Q/K 向量在预 RoPE 空间中高度集中，使得查询能够优先关注特定距离的键。TriAttention 在 AIME25 数据集上表现出与全注意力相当的推理准确性，同时实现了 2.5 倍的吞吐量提升或 10.7 倍的 KV 内存减少。'}}}, {'id': 'https://huggingface.co/papers/2604.04184', 'title': 'AURA: Always-On Understanding and Real-Time Assistance via Video Streams', 'url': 'https://huggingface.co/papers/2604.04184', 'abstract': 'Abstract AURA is an end-to-end streaming visual interaction framework that enables continuous video stream processing with real-time question answering and proactive responses through integrated context management and optimized deployment.  AI-generated summary Video Large Language Models (VideoLLMs) have achieved strong performance on many video understanding tasks, but most existing systems remain offline and are not well-suited for live video streams that require continuous observation and timely response. Recent streaming VideoLLMs have made progress, yet current approaches often rely on decoupled trigger-response pipelines or are limited to captioning-style narration, reducing their effectiveness for open-ended question answering and long-horizon interaction. We propose AURA (Always-On Understanding and Real-Time Assistance), an end-to-end streaming visual interaction framework that enables a unified VideoLLM to continuously process video streams and support both real-time question answering and proactive responses. AURA integrates context management, data construction, training objectives, and deployment optimization for stable long-horizon streaming interaction. It achieves state-of-the-art performance on streaming benchmarks and supports a real-time demo system with ASR and TTS running at 2 FPS on two 80G accelerators. We release the AURA model together with a real-time inference framework to facilitate future research.', 'score': 36, 'issue_id': 1821, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': '55c5f56ce057a794', 'authors': ['Xudong Lu', 'Yang Bo', 'Jinpeng Chen', 'Shuhan Li', 'Xintong Guo', 'Huankang Guan', 'Fang Liu', 'Dunyuan Xu', 'Peiwen Sun', 'Heyang Sun', 'Rui Liu', 'Hongsheng Li'], 'affiliations': ['CUHK MMLab', 'Huawei Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.04184.jpg', 'data': {'categories': ['#multimodal', '#video', '#benchmark', '#inference'], 'emoji': '🎥', 'ru': {'title': 'Видео-помощник, который смотрит и отвечает в реальном времени', 'desc': 'AURA — это сквозная система потоковой обработки видео на основе видео-LLM, которая позволяет непрерывно анализировать видеопоток в реальном времени. Система объединяет управление контекстом, конструирование данных и оптимизацию развёртывания для стабильного взаимодействия на длительных горизонтах наблюдения. Фреймворк поддерживает как ответы на вопросы пользователя, так и проактивные ответы, обеспечивая единый подход без разделения на отдельные компоненты триггер-ответ. Система достигает высокой производительности на потоковых бенчмарках и работает в реальном времени на стандартном оборудовании с интеграцией распознавания и синтеза речи.'}, 'en': {'title': 'AURA: Real-Time Video Understanding and Interaction', 'desc': 'AURA is a new framework designed for processing live video streams using advanced Video Large Language Models (VideoLLMs). It allows for real-time question answering and proactive responses by continuously analyzing video content. Unlike previous systems that were limited to offline processing or simple captioning, AURA integrates various components for effective long-term interaction. This framework not only improves performance on streaming tasks but also provides tools for researchers to build upon its capabilities.'}, 'zh': {'title': 'AURA：实时视频流的智能交互解决方案', 'desc': 'AURA是一个端到端的流媒体视觉交互框架，能够实现连续的视频流处理，并通过集成的上下文管理和优化部署提供实时问答和主动响应。现有的视频大语言模型（VideoLLMs）在视频理解任务上表现良好，但大多数系统仍然是离线的，不适合需要持续观察和及时响应的实时视频流。AURA通过统一的视频大语言模型，支持实时问答和主动响应，克服了传统方法的局限性。该框架在流媒体基准测试中表现出色，并支持实时演示系统，推动了未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.28301', 'title': 'LIBERO-Para: A Diagnostic Benchmark and Metrics for Paraphrase Robustness in VLA Models', 'url': 'https://huggingface.co/papers/2603.28301', 'abstract': 'Abstract Vision-Language-Action models show significant performance drops when handling paraphrased instructions due to surface-level matching rather than semantic understanding, highlighting the need for better linguistic generalization metrics.  AI-generated summary Vision-Language-Action (VLA) models achieve strong performance in robotic manipulation by leveraging pre-trained vision-language backbones. However, in downstream robotic settings, they are typically fine-tuned with limited data, leading to overfitting to specific instruction formulations and leaving robustness to paraphrased instructions underexplored. To study this gap, we introduce LIBERO-Para, a controlled benchmark that independently varies action expressions and object references for fine-grained analysis of linguistic generalization. Across seven VLA configurations (0.6B-7.5B), we observe consistent performance degradation of 22-52 pp under paraphrasing. This degradation is primarily driven by object-level lexical variation: even simple synonym substitutions cause large drops, indicating reliance on surface-level matching rather than semantic grounding. Moreover, 80-96% of failures arise from planning-level trajectory divergence rather than execution errors, showing that paraphrasing disrupts task identification. Binary success rate treats all paraphrases equally, obscuring whether models perform consistently across difficulty levels or rely on easier cases. To address this, we propose PRIDE, a metric that quantifies paraphrase difficulty using semantic and syntactic factors. Our benchmark and corresponding code are available at: https://github.com/cau-hai-lab/LIBERO-Para', 'score': 34, 'issue_id': 1824, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'aca8eae31d144b32', 'authors': ['Chanyoung Kim', 'Minwoo Kim', 'Minseok Kang', 'Hyunwoo Kim', 'Dahuin Jung'], 'affiliations': ['Chung-Ang University', 'Soongsil University'], 'pdf_title_img': 'assets/pdf/title_img/2603.28301.jpg', 'data': {'categories': ['#robotics', '#dataset', '#multimodal', '#reasoning', '#benchmark', '#synthetic', '#interpretability'], 'emoji': '🤖', 'ru': {'title': 'От поверхностного совпадения к семантическому пониманию в VLA моделях', 'desc': 'Исследование показывает, что модели Vision-Language-Action (VLA), которые управляют роботами, плохо обобщаются на перефразированные инструкции, теряя до 52% производительности. Авторы создали бенчмарк LIBERO-Para для анализа лингвистической обобщаемости моделей, варьируя выражения действий и ссылки на объекты независимо друг от друга. Проблема заключается в том, что VLA полагаются на поверхностное совпадение текста, а не на семантическое понимание: замена даже синонимов вызывает значительные ошибки. Для решения этой проблемы предложена метрика PRIDE, которая оценивает сложность перефразирования на основе семантических и синтаксических факторов.'}, 'en': {'title': 'Enhancing Linguistic Generalization in VLA Models', 'desc': 'This paper discusses the limitations of Vision-Language-Action (VLA) models in understanding paraphrased instructions, which leads to significant performance drops. The authors introduce LIBERO-Para, a benchmark designed to analyze how well these models generalize linguistically by varying action expressions and object references. They find that performance decreases by 22-52 percentage points when faced with paraphrased instructions, primarily due to reliance on surface-level matching rather than true semantic understanding. To improve evaluation, they propose a new metric called PRIDE, which measures the difficulty of paraphrases based on semantic and syntactic factors.'}, 'zh': {'title': '提升语言泛化能力，克服同义指令挑战', 'desc': '本文探讨了视觉-语言-动作模型在处理同义指令时的性能下降问题，主要是因为模型依赖表面匹配而非语义理解。我们引入了LIBERO-Para基准，旨在通过独立变化动作表达和对象引用来分析语言泛化能力。研究发现，在七种VLA配置中，模型在同义改写下的性能下降幅度达到22-52个百分点，主要是由于对象级别的词汇变化导致的。为了解决这一问题，我们提出了PRIDE指标，用于量化同义改写的难度，考虑了语义和句法因素。'}}}, {'id': 'https://huggingface.co/papers/2604.04911', 'title': 'SpatialEdit: Benchmarking Fine-Grained Image Spatial Editing', 'url': 'https://huggingface.co/papers/2604.04911', 'abstract': 'Abstract A new benchmark and dataset are introduced for evaluating fine-grained spatial editing capabilities, along with a model that demonstrates superior performance on spatial manipulation tasks.  AI-generated summary Image spatial editing performs geometry-driven transformations, allowing precise control over object layout and camera viewpoints. Current models are insufficient for fine-grained spatial manipulations, motivating a dedicated assessment suite. Our contributions are listed: (i) We introduce SpatialEdit-Bench, a complete benchmark that evaluates spatial editing by jointly measuring perceptual plausibility and geometric fidelity via viewpoint reconstruction and framing analysis. (ii) To address the data bottleneck for scalable training, we construct SpatialEdit-500k, a synthetic dataset generated with a controllable Blender pipeline that renders objects across diverse backgrounds and systematic camera trajectories, providing precise ground-truth transformations for both object- and camera-centric operations. (iii) Building on this data, we develop SpatialEdit-16B, a baseline model for fine-grained spatial editing. Our method achieves competitive performance on general editing while substantially outperforming prior methods on spatial manipulation tasks. All resources will be made public at https://github.com/EasonXiao-888/SpatialEdit.', 'score': 25, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'ca6692acafef356e', 'authors': ['Yicheng Xiao', 'Wenhu Zhang', 'Lin Song', 'Yukang Chen', 'Wenbo Li', 'Nan Jiang', 'Tianhe Ren', 'Haokun Lin', 'Wei Huang', 'Haoyang Huang', 'Xiu Li', 'Nan Duan', 'Xiaojuan Qi'], 'affiliations': ['JD Explore Academy', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04911.jpg', 'data': {'categories': ['#cv', '#dataset', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Точное пространственное редактирование изображений через синтетический датасет и специализированный бенчмарк', 'desc': 'В статье представлены новый бенчмарк SpatialEdit-Bench и синтетический датасет SpatialEdit-500k для оценки способностей моделей в пространственном редактировании изображений, включая манипуляции с объектами и ракурсами камеры. Авторы разработали модель SpatialEdit-16B, которая обучается на синтетических данных, сгенерированных с помощью контролируемого Blender-конвейера с точными аннотациями геометрических трансформаций. Бенчмарк одновременно измеряет перцептивную правдоподобность и геометрическую точность через анализ реконструкции ракурса и композиции кадра. Предложенный подход демонстрирует превосходные результаты на задачах пространственной манипуляции по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Spatial Editing with SpatialEdit-Bench and Dataset', 'desc': 'This paper presents a new benchmark called SpatialEdit-Bench for evaluating fine-grained spatial editing capabilities in machine learning models. It introduces a synthetic dataset, SpatialEdit-500k, which is generated using a Blender pipeline to provide high-quality training data for spatial manipulation tasks. The authors also propose a baseline model, SpatialEdit-16B, which shows improved performance in spatial editing compared to existing models. The benchmark and dataset aim to enhance the assessment of perceptual plausibility and geometric fidelity in AI-generated spatial edits.'}, 'zh': {'title': '细粒度空间编辑的新基准与模型', 'desc': '本文介绍了一个新的基准和数据集，用于评估细粒度空间编辑能力，并展示了一种在空间操作任务上表现优越的模型。AI生成的图像空间编辑可以进行基于几何的变换，允许对物体布局和相机视角进行精确控制。当前模型在细粒度空间操作方面表现不足，因此需要一个专门的评估套件。我们提出了SpatialEdit-Bench基准，结合感知可信度和几何保真度的测量，构建了一个合成数据集SpatialEdit-500k，并开发了基线模型SpatialEdit-16B，以实现更好的空间编辑效果。'}}}, {'id': 'https://huggingface.co/papers/2604.02176', 'title': "Adam's Law: Textual Frequency Law on Large Language Models", 'url': 'https://huggingface.co/papers/2604.02176', 'abstract': 'Abstract A novel framework for improving large language model performance through textual frequency analysis, including laws, distillation, and curriculum training approaches.  AI-generated summary While textual frequency has been validated as relevant to human cognition in reading speed, its relatedness to Large Language Models (LLMs) is seldom studied. We propose a novel research direction in terms of textual data frequency, which is an understudied topic, to the best of our knowledge. Our framework is composed of three units. First, this paper proposes Textual Frequency Law (TFL), which indicates that frequent textual data should be preferred for LLMs for both prompting and fine-tuning. Since many LLMs are closed-source in their training data, we propose using online resources to estimate the sentence-level frequency. We then utilize an input paraphraser to paraphrase the input into a more frequent textual expression. Next, we propose Textual Frequency Distillation (TFD) by querying LLMs to conduct story completion by further extending the sentences in the datasets, and the resulting corpora are used to adjust the initial estimation. Finally, we propose Curriculum Textual Frequency Training (CTFT) that fine-tunes LLMs in an increasing order of sentence-level frequency. Experiments are conducted on our curated dataset Textual Frequency Paired Dataset (TFPD) on math reasoning, machine translation, commonsense reasoning and agentic tool calling. Results show the effectiveness of our framework.', 'score': 25, 'issue_id': 1824, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '0a1c47788ed6a686', 'authors': ['Hongyuan Adam Lu', 'Z. L.', 'Victor Wei', 'Zefan Zhang', 'Zhao Hong', 'Qiqi Xiang', 'Bowen Cao', 'Wai Lam'], 'affiliations': ['FaceMind Corporation', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.02176.jpg', 'data': {'categories': ['#training', '#data', '#agents', '#dataset', '#reasoning', '#machine_translation', '#multilingual', '#optimization', '#synthetic', '#math'], 'emoji': '📊', 'ru': {'title': 'Частотность текста как ключ к совершенству языковых моделей', 'desc': 'Исследователи предложили новую парадигму для улучшения работы LLM через анализ частотности текстовых данных. Фреймворк состоит из трёх компонентов: Закона текстовой частотности, который показывает, что частые текстовые данные предпочтительны для обучения и промптинга; дистилляции через расширение предложений для уточнения частотных оценок; и куррикулярного обучения, которое настраивает модель в порядке возрастания частотности. Методология протестирована на различных задачах включая математическое рассуждение, машинный перевод и работу с инструментами, продемонстрировав эффективность подхода.'}, 'en': {'title': 'Boosting LLMs with Textual Frequency Insights', 'desc': 'This paper introduces a new framework aimed at enhancing the performance of large language models (LLMs) by focusing on textual frequency analysis. It consists of three main components: Textual Frequency Law (TFL), which emphasizes the importance of using frequently occurring text for model training; Textual Frequency Distillation (TFD), which involves generating new text based on existing data to improve model understanding; and Curriculum Textual Frequency Training (CTFT), which fine-tunes models by gradually introducing more frequent sentences. The proposed methods were tested on a specially created dataset, demonstrating significant improvements in various language tasks.'}, 'zh': {'title': '通过文本频率提升大型语言模型性能的创新框架', 'desc': '本文提出了一种新颖的框架，通过文本频率分析来提高大型语言模型（LLM）的性能。我们引入了文本频率法则（TFL），强调频繁的文本数据在提示和微调中应被优先考虑。接着，我们提出了文本频率蒸馏（TFD），通过查询LLM进行故事补全，进一步扩展数据集中的句子。最后，我们实施了课程文本频率训练（CTFT），按照句子频率的递增顺序对LLM进行微调，实验结果表明该框架的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.04901', 'title': 'FileGram: Grounding Agent Personalization in File-System Behavioral Traces', 'url': 'https://huggingface.co/papers/2604.04901', 'abstract': 'Abstract FileGram is a framework for personalized AI agents that uses file-system behavioral traces to enhance memory systems and agent personalization, featuring a data engine, diagnostic benchmark, and memory architecture built from atomic actions and content changes.  AI-generated summary Coworking AI agents operating within local file systems are rapidly emerging as a paradigm in human-AI interaction; however, effective personalization remains limited by severe data constraints, as strict privacy barriers and the difficulty of jointly collecting multimodal real-world traces prevent scalable training and evaluation, and existing methods remain interaction-centric while overlooking dense behavioral traces in file-system operations; to address this gap, we propose FileGram, a comprehensive framework that grounds agent memory and personalization in file-system behavioral traces, comprising three core components: (1) FileGramEngine, a scalable persona-driven data engine that simulates realistic workflows and generates fine-grained multimodal action sequences at scale; (2) FileGramBench, a diagnostic benchmark grounded in file-system behavioral traces for evaluating memory systems on profile reconstruction, trace disentanglement, persona drift detection, and multimodal grounding; and (3) FileGramOS, a bottom-up memory architecture that builds user profiles directly from atomic actions and content deltas rather than dialogue summaries, encoding these traces into procedural, semantic, and episodic channels with query-time abstraction; extensive experiments show that FileGramBench remains challenging for state-of-the-art memory systems and that FileGramEngine and FileGramOS are effective, and by open-sourcing the framework, we hope to support future research on personalized memory-centric file-system agents.', 'score': 24, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '3cc50b2ac22714c9', 'authors': ['Shuai Liu', 'Shulin Tian', 'Kairui Hu', 'Yuhao Dong', 'Zhe Yang', 'Bo Li', 'Jingkang Yang', 'Chen Change Loy', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University', 'Synvo AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.04901.jpg', 'data': {'categories': ['#dataset', '#agents', '#multimodal', '#benchmark'], 'emoji': '📁', 'ru': {'title': 'Персонализация AI-агентов через анализ поведения в файловой системе', 'desc': 'FileGram — это комплексная система для персонализированных AI-агентов, использующая трассы поведения в файловой системе для улучшения памяти и адаптации к пользователю. Фреймворк включает три компонента: генератор данных FileGramEngine, который создаёт реалистичные последовательности действий; диагностический бенчмарк FileGramBench для оценки систем памяти; и архитектуру FileGramOS, которая строит профили пользователей из атомарных операций и изменений контента. Подход преодолевает проблемы приватности и нехватки данных, организуя информацию в процедурные, семантические и эпизодические каналы памяти.'}, 'en': {'title': 'Empowering AI Personalization through File-System Insights', 'desc': 'FileGram is a novel framework designed to enhance the personalization of AI agents by utilizing behavioral traces from file systems. It addresses the limitations of existing methods that focus primarily on interaction data, which often neglects the rich information available in file-system operations. The framework consists of three main components: a data engine for generating realistic workflows, a diagnostic benchmark for evaluating memory systems, and a memory architecture that builds user profiles from detailed actions. By open-sourcing FileGram, the authors aim to foster further research in the area of personalized, memory-centric AI agents.'}, 'zh': {'title': '个性化AI代理的新框架：FileGram', 'desc': 'FileGram是一个个性化AI代理的框架，利用文件系统的行为轨迹来增强记忆系统和代理个性化。它包含三个核心组件：FileGramEngine、FileGramBench和FileGramOS，分别用于生成多模态动作序列、评估记忆系统和构建用户档案。该框架解决了现有方法在个性化方面的局限性，特别是在数据收集和隐私保护方面的挑战。通过开源该框架，我们希望支持未来在个性化记忆中心的文件系统代理方面的研究。'}}}, {'id': 'https://huggingface.co/papers/2604.04202', 'title': 'ClawArena: Benchmarking AI Agents in Evolving Information Environments', 'url': 'https://huggingface.co/papers/2604.04202', 'abstract': "Abstract ClawArena evaluates AI agents' ability to maintain accurate beliefs in dynamic, multi-source information environments through diverse professional scenarios and evaluation methods.  AI-generated summary AI agents deployed as persistent assistants must maintain correct beliefs as their information environment evolves. In practice, evidence is scattered across heterogeneous sources that often contradict one another, new information can invalidate earlier conclusions, and user preferences surface through corrections rather than explicit instructions. Existing benchmarks largely assume static, single-authority settings and do not evaluate whether agents can keep up with this complexity. We introduce ClawArena, a benchmark for evaluating AI agents in evolving information environments. Each scenario maintains a complete hidden ground truth while exposing the agent only to noisy, partial, and sometimes contradictory traces across multi-channel sessions, workspace files, and staged updates. Evaluation is organized around three coupled challenges: multi-source conflict reasoning, dynamic belief revision, and implicit personalization, whose interactions yield a 14-category question taxonomy. Two question formats, multi-choice (set-selection) and shell-based executable checks, test both reasoning and workspace grounding. The current release contains 64 scenarios across 8 professional domains, totaling 1{,}879 evaluation rounds and 365 dynamic updates. Experiments on five agent frameworks and five language models show that both model capability (15.4% range) and framework design (9.2%) substantially affect performance, that self-evolving skill frameworks can partially close model-capability gaps, and that belief revision difficulty is determined by update design strategy rather than the mere presence of updates. Code is available at https://github.com/aiming-lab/ClawArena.", 'score': 23, 'issue_id': 1821, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': '449deec7c20759df', 'authors': ['Haonian Ji', 'Kaiwen Xiong', 'Siwei Han', 'Peng Xia', 'Shi Qiu', 'Yiyang Zhou', 'Jiaqi Liu', 'Jinlong Li', 'Bingzhou Li', 'Zeyu Zheng', 'Cihang Xie', 'Huaxiu Yao'], 'affiliations': ['UNC-Chapel Hill', 'University of California, Berkeley', 'University of California, Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2604.04202.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Оценка способности AI-агентов адаптировать убеждения в динамической многоисточниковой среде', 'desc': 'ClawArena — это бенчмарк для оценки способности AI-агентов поддерживать точные представления о мире в динамических средах с информацией из множественных источников. Система тестирует агентов на решении трёх взаимосвязанных задач: разрешение конфликтов между противоречивыми источниками, пересмотр убеждений при появлении новой информации и адаптация к неявным предпочтениям пользователей. Бенчмарк содержит 64 сценария из 8 профессиональных областей с 1879 раундами оценки и использует две формы вопросов — выбор из множества вариантов и исполняемые команды. Эксперименты показали, что производительность агентов зависит как от выбранной языковой модели, так и от архитектуры фреймворка, и что сложность пересмотра убеждений определяется стратегией обновления информации.'}, 'en': {'title': "ClawArena: Testing AI's Belief Management in Dynamic Environments", 'desc': "ClawArena is a benchmark designed to assess AI agents' ability to maintain accurate beliefs in complex and changing information environments. It simulates real-world scenarios where information is scattered, contradictory, and evolves over time, challenging agents to adapt their beliefs accordingly. The evaluation focuses on three main challenges: reasoning through conflicting information from multiple sources, revising beliefs dynamically, and personalizing responses based on implicit user preferences. The benchmark includes a variety of scenarios across different professional domains, providing a comprehensive framework for testing AI performance in realistic settings."}, 'zh': {'title': '评估AI代理在动态信息环境中的信念保持能力', 'desc': 'ClawArena是一个评估人工智能代理在动态、多源信息环境中保持准确信念能力的基准。该基准通过多种专业场景和评估方法，考察代理如何在信息环境变化时维持正确的信念。现有的基准大多假设静态、单一权威的设置，未能评估代理在复杂环境中的表现。ClawArena引入了多源冲突推理、动态信念修正和隐式个性化等挑战，提供了64个场景和多种评估问题格式，以测试代理的推理能力和工作空间的基础。'}}}, {'id': 'https://huggingface.co/papers/2604.03679', 'title': 'LightThinker++: From Reasoning Compression to Memory Management', 'url': 'https://huggingface.co/papers/2604.03679', 'abstract': "Abstract LightThinker and LightThinker++ enable efficient large language model reasoning through dynamic compression and adaptive memory management, significantly reducing computational overhead while maintaining performance in complex tasks.  AI-generated summary Large language models (LLMs) excel at complex reasoning, yet their efficiency is limited by the surging cognitive overhead of long thought traces. In this paper, we propose LightThinker, a method that enables LLMs to dynamically compress intermediate thoughts into compact semantic representations. However, static compression often struggles with complex reasoning where the irreversible loss of intermediate details can lead to logical bottlenecks. To address this, we evolve the framework into LightThinker++, introducing Explicit Adaptive Memory Management. This paradigm shifts to behavioral-level management by incorporating explicit memory primitives, supported by a specialized trajectory synthesis pipeline to train purposeful memory scheduling. Extensive experiments demonstrate the framework's versatility across three dimensions. (1) LightThinker reduces peak token usage by 70% and inference time by 26% with minimal accuracy loss. (2) In standard reasoning, LightThinker++ slashes peak token usage by 69.9% while yielding a +2.42% accuracy gain under the same context budget for maximum performance. (3) Most notably, in long-horizon agentic tasks, it maintains a stable footprint beyond 80 rounds (a 60%-70% reduction), achieving an average performance gain of 14.8% across different complex scenarios. Overall, our work provides a scalable direction for sustaining deep LLM reasoning over extended horizons with minimal overhead.", 'score': 22, 'issue_id': 1821, 'pub_date': '2026-04-04', 'pub_date_card': {'ru': '4 апреля', 'en': 'April 4', 'zh': '4月4日'}, 'hash': '4456c2c188bef152', 'authors': ['Yuqi Zhu', 'Jintian Zhang', 'Zhenjie Wan', 'Yujie Luo', 'Shuofei Qiao', 'Zhengke Gui', 'Da Zheng', 'Lei Liang', 'Huajun Chen', 'Ningyu Zhang'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.03679.jpg', 'data': {'categories': ['#optimization', '#long_context', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Эффективные рассуждения: сжатие мыслей без потери логики', 'desc': 'В работе предлагается LightThinker — метод динамического сжатия промежуточных рассуждений в языковых моделях для снижения вычислительных затрат. Улучшенная версия LightThinker++ использует адаптивное управление памятью с явными примитивами памяти, которые обучаются на синтезированных траекториях. Метод достигает 70% сокращения использования токенов и 26% ускорения инференса при минимальной потере точности. На сложных задачах долгосрочного планирования система демонстрирует 60-70% снижение потребления памяти с улучшением точности на 14.8%.'}, 'en': {'title': 'Efficient Reasoning for Large Language Models with LightThinker', 'desc': 'The paper introduces LightThinker and its enhanced version LightThinker++ to improve the efficiency of large language models (LLMs) in reasoning tasks. These methods utilize dynamic compression to create compact representations of intermediate thoughts, reducing the computational burden without sacrificing performance. LightThinker++ further enhances this by implementing Explicit Adaptive Memory Management, which optimizes memory usage through behavioral-level management and specialized memory scheduling. Experimental results show significant reductions in token usage and inference time, while also improving accuracy in complex reasoning tasks, demonstrating a scalable approach for LLMs to handle extended reasoning efficiently.'}, 'zh': {'title': '高效推理，轻松应对复杂任务', 'desc': 'LightThinker和LightThinker++通过动态压缩和自适应内存管理，使大型语言模型的推理更加高效。这种方法显著减少了计算开销，同时在复杂任务中保持了性能。LightThinker能够将中间思维动态压缩为紧凑的语义表示，而LightThinker++则引入了显式自适应内存管理，优化了内存的使用。实验结果表明，该框架在多个维度上表现出色，能够在长时间的推理中保持稳定的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.02288', 'title': 'Unifying Group-Relative and Self-Distillation Policy Optimization via Sample Routing', 'url': 'https://huggingface.co/papers/2604.02288', 'abstract': "Abstract Sample-Routed Policy Optimization (SRPO) combines GRPO and SDPO advantages by routing correct samples to reward-aligned reinforcement and failed samples to targeted logit-level correction, achieving improved stability and performance in reinforcement learning with verifiable rewards.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a standard paradigm for post-training large language models. While Group Relative Policy Optimization (GRPO) is widely adopted, its coarse credit assignment uniformly penalizes failed rollouts, lacking the token-level focus needed to efficiently address specific deviations. Self-Distillation Policy Optimization (SDPO) addresses this by providing denser, more targeted logit-level supervision that facilitates rapid early improvement, yet it frequently collapses during prolonged training. We trace this late-stage instability to two intrinsic flaws: self-distillation on already-correct samples introduces optimization ambiguity, and the self-teacher's signal reliability progressively degrades. To resolve these issues, we propose Sample-Routed Policy Optimization (SRPO), a unified on-policy framework that routes correct samples to GRPO's reward-aligned reinforcement and failed samples to SDPO's targeted logit-level correction. SRPO further incorporates an entropy-aware dynamic weighting mechanism to suppress high-entropy, unreliable distillation targets while emphasizing confident ones. Evaluated across five benchmarks and two model scales, SRPO achieves both the rapid early improvement of SDPO and the long-horizon stability of GRPO. It consistently surpasses the peak performance of both baselines, raising the five-benchmark average on Qwen3-8B by 3.4% over GRPO and 6.3% over SDPO, while simultaneously yielding moderate response lengths and lowering per-step compute cost by up to 17.2%.", 'score': 22, 'issue_id': 1824, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '594e474a72139cbe', 'authors': ['Gengsheng Li', 'Tianyu Yang', 'Junfeng Fang', 'Mingyang Song', 'Mao Zheng', 'Haiyun Guo', 'Dan Zhang', 'Jinqiao Wang', 'Tat-Seng Chua'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'National University of Singapore', 'Tencent', 'University of Chinese Academy of Sciences', 'Wuhan AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.02288.jpg', 'data': {'categories': ['#rl', '#training', '#architecture', '#rlhf'], 'emoji': '🛣️', 'ru': {'title': 'Умная маршрутизация образцов для стабильного обучения с подкреплением', 'desc': 'В статье предложена новая методология Sample-Routed Policy Optimization (SRPO) для обучения с подкреплением с проверяемыми вознаграждениями при натройке больших языковых моделей. Метод комбинирует преимущества GRPO и SDPO, маршрутизируя корректные примеры на вознаграждение-ориентированное обучение, а неудачные примеры на целевую коррекцию на уровне логитов. SRPO включает механизм динамического взвешивания с учётом энтропии для подавления ненадёжных целей дистилляции. Экспериментально доказано, что метод достигает как быстрого начального улучшения SDPO, так и долгосрочной стабильности GRPO, превосходя обе базовые модели на пяти бенчмарках.'}, 'en': {'title': 'SRPO: The Best of Both Worlds in Reinforcement Learning', 'desc': "Sample-Routed Policy Optimization (SRPO) is a new approach in reinforcement learning that combines the strengths of two existing methods: Group Relative Policy Optimization (GRPO) and Self-Distillation Policy Optimization (SDPO). SRPO improves stability and performance by directing successful samples to GRPO's reward-based learning and directing unsuccessful samples to SDPO's focused logit-level corrections. This method also includes a dynamic weighting system that prioritizes reliable signals while reducing the impact of uncertain ones. The results show that SRPO outperforms both GRPO and SDPO in various benchmarks, achieving better performance and efficiency in training large language models."}, 'zh': {'title': '样本路由优化，提升强化学习性能', 'desc': '样本路由策略优化（SRPO）结合了群体相对策略优化（GRPO）和自蒸馏策略优化（SDPO）的优点，通过将正确样本路由到与奖励对齐的强化学习中，而将失败样本路由到目标对数级别的修正，从而提高了强化学习的稳定性和性能。SRPO采用了一种动态加权机制，能够抑制高熵、不可靠的蒸馏目标，同时强调可靠的信号。经过五个基准测试和两种模型规模的评估，SRPO在早期改进速度和长期稳定性方面均优于GRPO和SDPO。最终，SRPO在Qwen3-8B模型上平均提升了3.4%和6.3%的性能，同时降低了每步计算成本。'}}}, {'id': 'https://huggingface.co/papers/2604.04804', 'title': 'SkillX: Automatically Constructing Skill Knowledge Bases for Agents', 'url': 'https://huggingface.co/papers/2604.04804', 'abstract': 'Abstract SkillX is an automated framework that creates reusable skill libraries for LLM agents through hierarchical skill design, iterative refinement, and exploratory expansion to improve generalization and efficiency across different environments.  AI-generated summary Learning from experience is critical for building capable large language model (LLM) agents, yet prevailing self-evolving paradigms remain inefficient: agents learn in isolation, repeatedly rediscover similar behaviors from limited experience, resulting in redundant exploration and poor generalization. To address this problem, we propose SkillX, a fully automated framework for constructing a plug-and-play skill knowledge base that can be reused across agents and environments. SkillX operates through a fully automated pipeline built on three synergistic innovations: (i) Multi-Level Skills Design, which distills raw trajectories into three-tiered hierarchy of strategic plans, functional skills, and atomic skills; (ii) Iterative Skills Refinement, which automatically revises skills based on execution feedback to continuously improve library quality; and (iii) Exploratory Skills Expansion, which proactively generates and validates novel skills to expand coverage beyond seed training data. Using a strong backbone agent (GLM-4.6), we automatically build a reusable skill library and evaluate its transferability on challenging long-horizon, user-interactive benchmarks, including AppWorld, BFCL-v3, and τ^2-Bench. Experiments show that SkillKB consistently improves task success and execution efficiency when plugged into weaker base agents, highlighting the importance of structured, hierarchical experience representations for generalizable agent learning. Our code will be publicly available soon at https://github.com/zjunlp/SkillX.', 'score': 19, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'af585639d0d88567', 'authors': ['Chenxi Wang', 'Zhuoyun Yu', 'Xin Xie', 'Wuguannan Yao', 'Runnan Fang', 'Shuofei Qiao', 'Kexin Cao', 'Guozhou Zheng', 'Xiang Qi', 'Peng Zhang', 'Shumin Deng'], 'affiliations': ['Ant Digital Technologies, Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04804.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Иерархические переиспользуемые навыки для обобщения LLM-агентов', 'desc': 'SkillX — это автоматизированная система для создания переиспользуемых библиотек навыков LLM-агентов через иерархическое проектирование умений. Фреймворк использует трёхуровневую иерархию: стратегические планы, функциональные навыки и атомарные действия, извлекаемые из траекторий агентов. Система применяет итеративную оптимизацию навыков на основе обратной связи от выполнения и проактивное расширение покрытия навыков через валидацию новых умений. Экспериментальные результаты показывают, что созданная библиотека значительно улучшает успешность выполнения задач и эффективность слабых базовых агентов при переносе знаний между различными окружениями.'}, 'en': {'title': 'Empowering LLM Agents with Reusable Skills', 'desc': 'SkillX is an automated framework designed to create reusable skill libraries for large language model (LLM) agents, enhancing their ability to generalize and perform efficiently in various environments. It addresses the inefficiencies of current self-evolving paradigms by allowing agents to learn from a shared knowledge base rather than in isolation, reducing redundant exploration. The framework employs three key innovations: Multi-Level Skills Design for organizing skills hierarchically, Iterative Skills Refinement for improving skills based on feedback, and Exploratory Skills Expansion for generating new skills. Experiments demonstrate that integrating SkillX with weaker agents significantly boosts their task success and efficiency, showcasing the value of structured experience in agent learning.'}, 'zh': {'title': 'SkillX：提升LLM代理的技能库构建效率', 'desc': 'SkillX是一个自动化框架，通过分层技能设计、迭代优化和探索性扩展，为大型语言模型（LLM）代理创建可重用的技能库，以提高在不同环境中的泛化能力和效率。该框架解决了现有自我进化模式效率低下的问题，避免了代理在孤立环境中重复发现相似行为。SkillX通过多层次技能设计、自动技能修正和探索性技能扩展三大创新，构建了一个可插拔的技能知识库。实验表明，SkillX在较弱的基础代理中插入后，能够显著提高任务成功率和执行效率，强调了结构化的分层经验表示在可泛化代理学习中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.03253', 'title': 'Self-Execution Simulation Improves Coding Models', 'url': 'https://huggingface.co/papers/2604.03253', 'abstract': 'Abstract Code large language models can be trained to simulate program execution step-by-step, improving competitive programming performance through supervised fine-tuning and reinforcement learning with verifiable rewards.  AI-generated summary A promising research direction in enabling LLMs to generate consistently correct code involves addressing their inability to properly estimate program execution, particularly for code they generate. In this work, we demonstrate that Code LLMs can be trained to simulate program execution in a step-by-step manner and that this capability can be leveraged to improve competitive programming performance. Our approach combines supervised fine-tuning on natural language execution traces, textual explanations grounded in true execution, with reinforcement learning using verifiable rewards. We introduce two complementary objectives: output prediction given code and inputs, and solving competitive programming tasks with either ground-truth or self-predicted execution feedback. These objectives enable models to perform self-verification over multiple candidate solutions, and iterative self-fixing by simulating test execution. Across multiple competitive programming benchmarks, our method yields consistent improvements over standard reasoning approaches. We further present ablations and analysis to elucidate the role of execution simulation and its limitations.', 'score': 19, 'issue_id': 1823, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '9794eddc24adb7ed', 'authors': ['Gallil Maimon', 'Ori Yoran', 'Felix Kreuk', 'Michael Hassid', 'Gal Cohen', 'Pierre Chambon', 'Yossi Adi'], 'affiliations': ['FAIR team, Meta', 'Hebrew University of Jerusalem', 'Inria'], 'pdf_title_img': 'assets/pdf/title_img/2604.03253.jpg', 'data': {'categories': ['#training', '#optimization', '#plp', '#reasoning', '#rl'], 'emoji': '🔄', 'ru': {'title': 'Обучение кода LLM симулировать выполнение программ для самопроверки и исправления ошибок', 'desc': 'В этой работе исследователи показали, что большие языковые модели для работы с кодом можно обучить пошагово симулировать выполнение программ. Авторы использовали комбинацию supervised fine-tuning на трассировках выполнения и reinforcement learning с верифицируемыми наградами. Модели научились самопроверке через симуляцию тестового выполнения и итеративному самоисправлению ошибок. Метод демонстрирует стабильные улучшения в решении задач конкурентного программирования по сравнению со стандартными подходами рассуждения.'}, 'en': {'title': 'Enhancing Code Generation through Execution Simulation', 'desc': "This paper explores how large language models (LLMs) can be trained to simulate the execution of code step-by-step, which enhances their performance in competitive programming. The authors propose a method that combines supervised fine-tuning with reinforcement learning, using verifiable rewards to guide the training process. They introduce two main objectives: predicting outputs based on code and inputs, and solving programming tasks with feedback from actual or self-predicted execution. The results show that this approach leads to significant improvements in the models' ability to generate correct code and solve programming challenges compared to traditional reasoning methods."}, 'zh': {'title': '通过模拟执行提升编程竞赛表现', 'desc': '本文探讨了如何训练大型语言模型（LLM）逐步模拟程序执行，以提高其在竞赛编程中的表现。通过监督微调和使用可验证奖励的强化学习，我们的方法结合了自然语言执行轨迹和真实执行的文本解释。我们提出了两个互补的目标：根据代码和输入进行输出预测，以及利用真实或自我预测的执行反馈解决竞赛编程任务。这种方法在多个竞赛编程基准测试中显示出比标准推理方法更一致的改进。'}}}, {'id': 'https://huggingface.co/papers/2604.04917', 'title': 'Vero: An Open RL Recipe for General Visual Reasoning', 'url': 'https://huggingface.co/papers/2604.04917', 'abstract': 'Abstract Vero is an open vision-language model family that achieves state-of-the-art visual reasoning performance through scaled reinforcement learning data across diverse tasks, demonstrating that broad data coverage drives strong RL scaling rather than isolated task-specific patterns.  AI-generated summary What does it take to build a visual reasoner that works across charts, science, spatial understanding, and open-ended tasks? The strongest vision-language models (VLMs) show such broad visual reasoning is within reach, but the recipe behind them remains unclear, locked behind proprietary reinforcement learning (RL) pipelines with non-public data. We introduce Vero, a family of fully open VLMs that matches or exceeds existing open-weight models across diverse visual reasoning tasks. We scale RL data and rewards across six broad task categories, constructing Vero-600K, a 600K-sample dataset from 59 datasets, and designing task-routed rewards that handle heterogeneous answer formats. Vero achieves state-of-the-art performance, improving over four base models by 3.7-5.5 points on average across VeroEval, our suite of 30 challenging benchmarks. Starting from Qwen3-VL-8B-Instruct, Vero outperforms Qwen3-VL-8B-Thinking on 23 of 30 benchmarks without additional proprietary thinking data. When trained from the same base model, Vero-600K exceeds existing RL datasets across task categories. Systematic ablations reveal that different task categories elicit qualitatively distinct reasoning patterns that transfer poorly in isolation, suggesting that broad data coverage is the primary driver of strong RL scaling. All data, code, and models are released.', 'score': 14, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '032bab2d1ea29821', 'authors': ['Gabriel Sarch', 'Linrong Cai', 'Qunzhong Wang', 'Haoyang Wu', 'Danqi Chen', 'Zhuang Liu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.04917.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#cv', '#rl', '#multimodal', '#open_source', '#benchmark', '#training', '#dataset', '#science'], 'emoji': '🧠', 'ru': {'title': 'Открытая модель визуального рассуждения через масштабирование разнообразных данных', 'desc': 'Vero — это открытое семейство vision-language моделей, которые достигают лучших результатов в визуальном рассуждении благодаря масштабированию обучению с подкреплением на разнообразных задачах. Модели обучены на датасете Vero-600K, содержащем 600 тысяч примеров из 59 различных источников, с использованием специальных маршрутизированных наград для обработки разных форматов ответов. Исследование показало, что разные категории задач требуют качественно различных паттернов рассуждения, которые плохо переносятся при изоляции друг от друга. Вывод авторов заключается в том, что широкий охват данных, а не специализация на отдельных задачах, является главным фактором успешного масштабирования обучения с подкреплением.'}, 'en': {'title': 'Vero: Unlocking Visual Reasoning with Open Data', 'desc': 'Vero is a new family of open vision-language models (VLMs) that excels in visual reasoning tasks by utilizing a large and diverse dataset. It demonstrates that having a wide range of data is more effective for reinforcement learning (RL) than focusing on specific tasks. The model, Vero-600K, is built from 600,000 samples across 59 datasets and is designed to handle various answer formats through task-specific rewards. Vero achieves superior performance compared to existing models, showing that broad data coverage significantly enhances RL scaling and reasoning capabilities.'}, 'zh': {'title': 'Vero：开放的视觉语言模型，推动视觉推理的边界', 'desc': 'Vero是一个开放的视觉语言模型家族，通过扩展的强化学习数据在多种任务中实现了最先进的视觉推理性能。研究表明，广泛的数据覆盖能够推动强化学习的强大扩展，而不是孤立的特定任务模式。Vero-600K是一个包含60万个样本的数据集，来自59个不同的数据集，设计了适应多样答案格式的任务导向奖励。Vero在30个具有挑战性的基准测试中，平均提高了3.7到5.5分，展示了其在视觉推理任务中的卓越表现。'}}}, {'id': 'https://huggingface.co/papers/2604.04759', 'title': 'Your Agent, Their Asset: A Real-World Safety Analysis of OpenClaw', 'url': 'https://huggingface.co/papers/2604.04759', 'abstract': "Abstract Real-world safety evaluation of a personal AI agent reveals significant vulnerabilities when targeting its capability, identity, or knowledge dimensions, with existing defenses proving insufficient.  AI-generated summary OpenClaw, the most widely deployed personal AI agent in early 2026, operates with full local system access and integrates with sensitive services such as Gmail, Stripe, and the filesystem. While these broad privileges enable high levels of automation and powerful personalization, they also expose a substantial attack surface that existing sandboxed evaluations fail to capture. To address this gap, we present the first real-world safety evaluation of OpenClaw and introduce the CIK taxonomy, which unifies an agent's persistent state into three dimensions, i.e., Capability, Identity, and Knowledge, for safety analysis. Our evaluations cover 12 attack scenarios on a live OpenClaw instance across four backbone models (Claude Sonnet 4.5, Opus 4.6, Gemini 3.1 Pro, and GPT-5.4). The results show that poisoning any single CIK dimension increases the average attack success rate from 24.6% to 64-74%, with even the most robust model exhibiting more than a threefold increase over its baseline vulnerability. We further assess three CIK-aligned defense strategies alongside a file-protection mechanism; however, the strongest defense still yields a 63.8% success rate under Capability-targeted attacks, while file protection blocks 97% of malicious injections but also prevents legitimate updates. Taken together, these findings show that the vulnerabilities are inherent to the agent architecture, necessitating more systematic safeguards to secure personal AI agents. Our project page is https://ucsc-vlaa.github.io/CIK-Bench.", 'score': 9, 'issue_id': 1823, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'd3e6a0b3e092c78e', 'authors': ['Zijun Wang', 'Haoqin Tu', 'Letian Zhang', 'Hardy Chen', 'Juncheng Wu', 'Xiangyan Liu', 'Zhenlong Yuan', 'Tianyu Pang', 'Michael Qizhe Shieh', 'Fengze Liu', 'Zeyu Zheng', 'Huaxiu Yao', 'Yuyin Zhou', 'Cihang Xie'], 'affiliations': ['ByteDance', 'NUS', 'Tencent', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2604.04759.jpg', 'data': {'categories': ['#security', '#agents', '#alignment', '#benchmark'], 'emoji': '🔓', 'ru': {'title': 'Архитектурные уязвимости персональных AI-агентов требуют систематической защиты', 'desc': 'В статье представлена первая реальная оценка безопасности персональной AI-системы OpenClaw, которая имеет полный доступ к локальным ресурсам и интегрирована с чувствительными сервисами. Авторы предлагают таксономию CIK, которая объединяет уязвимости агента в три измерения: возможности (Capability), идентификацию (Identity) и знания (Knowledge). Проведённые эксперименты на 12 сценариях атак показали, что отравление любого из трёх измерений CIK увеличивает успешность атак с 24.6% до 64-74%, причём даже самые устойчивые модели демонстрируют трёхкратный рост уязвимостей. Исследование выявило, что существующие защиты недостаточны, и необходимо разработать более системные механизмы безопасности для персональных AI-агентов.'}, 'en': {'title': 'Strengthening Personal AI: Addressing Vulnerabilities in Capability, Identity, and Knowledge', 'desc': 'This paper evaluates the safety of OpenClaw, a personal AI agent, highlighting its vulnerabilities in three key areas: Capability, Identity, and Knowledge. The authors introduce the CIK taxonomy to analyze these dimensions and demonstrate that attacks targeting any of them significantly increase the likelihood of success. Through testing on various AI models, they find that even the most secure model shows a marked increase in vulnerability when any CIK dimension is compromised. The study concludes that existing defenses are inadequate, indicating a need for more robust security measures in personal AI systems.'}, 'zh': {'title': '个人AI代理的安全性亟待加强', 'desc': '本研究对个人AI代理OpenClaw进行了现实世界的安全评估，发现其在能力、身份和知识三个维度上存在显著的脆弱性。尽管现有的防御措施不足以应对这些漏洞，但我们提出的CIK分类法为安全分析提供了新的视角。评估结果显示，针对任一CIK维度的攻击成功率显著提高，最强的防御策略在能力攻击下仍有63.8%的成功率。研究表明，个人AI代理的架构本身存在固有的安全隐患，需要更系统的保护措施来确保其安全性。'}}}, {'id': 'https://huggingface.co/papers/2604.02073', 'title': 'PLUME: Latent Reasoning Based Universal Multimodal Embedding', 'url': 'https://huggingface.co/papers/2604.02073', 'abstract': 'Abstract PLUME introduces a latent reasoning framework for universal multimodal embedding that replaces explicit chain-of-thought reasoning with continuous latent state rollouts, achieving faster inference while maintaining performance on complex multimodal retrieval tasks.  AI-generated summary Universal multimodal embedding (UME) maps heterogeneous inputs into a shared retrieval space with a single model. Recent approaches improve UME by generating explicit chain-of-thought (CoT) rationales before extracting embeddings, enabling multimodal large language models to better infer complex query intent. However, explicit CoT incurs substantial inference overhead and can compress rich multimodal evidence into a narrow textual bottleneck. We propose PLUME, a latent reasoning framework that advances UME by replacing verbalized CoT with a short autoregressive rollout of continuous latent states. To support diverse multimodal queries, PLUME further introduces a semantic-anchor-guided transition adapter that steers latent rollout along different reasoning trajectories under the same fixed computation budget. To stabilize training, PLUME adopts a progressive explicit-to-latent curriculum that uses verbalized reasoning only as a temporary training scaffold and gradually transfers this behavior into hidden-state computation, eliminating explicit CoT at inference. On the 78-task MMEB-v2 benchmark, PLUME outperforms strong explicit-CoT UME baselines while reducing reasoning from hundreds of generated tokens to fewer than 10 latent steps, delivering over 30x faster inference. PLUME is especially well suited to retrieval settings where relevant evidence is dense, structurally complex, and difficult to organize through verbalized intermediate rationales, such as video and visual document retrieval. These results show that structured latent computation can preserve the benefits of intermediate reasoning without the overhead of explicit rationale generation, providing a stronger and more efficient paradigm for practical retrieval systems.', 'score': 8, 'issue_id': 1824, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'de1f07cf6b976678', 'authors': ['Chenwei He', 'Xiangzhao Hao', 'Tianyu Yang', 'Yuxiang Ma', 'Yuheng Jia', 'Lingxiang Wu', 'Chaoyang Zhao', 'Haiyun Guo', 'Jinqiao Wang'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Southeast University', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.02073.jpg', 'data': {'categories': ['#training', '#inference', '#multimodal', '#reasoning', '#optimization', '#benchmark', '#rag'], 'emoji': '⚡', 'ru': {'title': 'Скрытое рассуждение вместо явного: путь к эффективному мультимодальному поиску', 'desc': 'PLUME представляет фреймворк скрытого рассуждения для универсального мультимодального встраивания, который заменяет явное цепочечное рассуждение на непрерывные латентные состояния. Вместо генерации текстовых обоснований модель использует короткую авторегрессивную последовательность скрытых состояний, что существенно ускоряет инференс. Для поддержки разнообразных мультимодальных запросов вводится адаптер с семантическими якорями, направляющий латентное развёртывание по различным траекториям рассуждений. На бенчмарке MMEB-v2 PLUME превосходит базовые подходы с явным цепочечным рассуждением, ускоряя инференс более чем в 30 раз при сохранении качества на сложных задачах мультимодального поиска.'}, 'en': {'title': 'Faster Multimodal Retrieval with Latent Reasoning', 'desc': 'PLUME is a new framework for universal multimodal embedding that enhances the way different types of data are processed together. Instead of using explicit chain-of-thought reasoning, which can slow down the process, PLUME employs continuous latent state rollouts for faster inference. It introduces a method to guide these rollouts using semantic anchors, allowing the model to navigate different reasoning paths efficiently. This approach not only speeds up the retrieval process significantly but also maintains high performance on complex tasks, making it ideal for scenarios with dense and intricate data.'}, 'zh': {'title': 'PLUME：高效的多模态嵌入推理框架', 'desc': 'PLUME提出了一种潜在推理框架，用于通用多模态嵌入，取代了显式的思维链推理，采用连续的潜在状态展开，从而实现更快的推理速度，同时在复杂的多模态检索任务中保持性能。该框架通过引入语义锚点引导的过渡适配器，支持多样化的多模态查询，能够在相同的计算预算下沿不同的推理轨迹引导潜在展开。PLUME在训练过程中采用逐步的显式到潜在的课程，逐渐将显式推理转移到隐藏状态计算中，从而在推理时消除了显式思维链。在78个任务的MMEB-v2基准测试中，PLUME在推理速度上比强大的显式思维链基线快30倍以上，同时减少了推理步骤。'}}}, {'id': 'https://huggingface.co/papers/2604.04838', 'title': 'Less Detail, Better Answers: Degradation-Driven Prompting for VQA', 'url': 'https://huggingface.co/papers/2604.04838', 'abstract': "Abstract Visual question answering performance is enhanced by strategically reducing image fidelity to focus models on essential structural information rather than distracting details.  AI-generated summary Recent advancements in Vision-Language Models (VLMs) have significantly pushed the boundaries of Visual Question Answering (VQA).However,high-resolution details can sometimes become noise that leads to hallucinations or reasoning errors. In this paper,we propose Degradation-Driven Prompting (DDP), a novel framework that improves VQA performance by strategically reducing image fidelity to force models to focus on essential structural information. We evaluate DDP across two distinct tasks. Physical attributes targets images prone to human misjudgment, where DDP employs a combination of 80p downsampling, structural visual aids (white background masks and orthometric lines), and In-Context Learning (ICL) to calibrate the model's focus. Perceptual phenomena addresses various machine-susceptible visual anomalies and illusions, including Visual Anomaly (VA), Color (CI), Motion(MI),Gestalt (GI), Geometric (GSI), and Visual Illusions (VI).For this task, DDP integrates a task-classification stage with specialized tools such as blur masks and contrast enhancement alongside downsampling. Our experimental results demonstrate that less is more: by intentionally degrading visual inputs and providing targeted structural prompts, DDP enables VLMs to bypass distracting textures and achieve superior reasoning accuracy on challenging visual benchmarks.", 'score': 7, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'eeed7e69e87ff62e', 'authors': ['Haoxuan Han', 'Weijie Wang', 'Zeyu Zhang', 'Yefei He', 'Bohan Zhuang'], 'affiliations': ['State Key Lab of CAD&CG, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04838.jpg', 'data': {'categories': ['#cv', '#multimodal', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Меньше деталей — больше понимания: деградация для улучшения визуального рассуждения', 'desc': 'Статья предлагает метод Degradation-Driven Prompting (DDP) для улучшения качества Visual Question Answering путём стратегического снижения разрешения изображений. Авторы показывают, что высокое разрешение часто содержит шум, который приводит к галлюцинациям и ошибкам в рассуждениях Vision-Language моделей. Метод использует комбинацию понижающей дискретизации, структурных визуальных подсказок и In-Context Learning для фокусировки модели на существенной информации. Экспериментальные результаты демонстрируют, что намеренная деградация визуального входа позволяет моделям достичь более точных результатов при решении сложных задач визуального анализа.'}, 'en': {'title': 'Less is More: Enhancing VQA by Reducing Image Fidelity', 'desc': 'This paper introduces Degradation-Driven Prompting (DDP), a new approach to improve Visual Question Answering (VQA) by intentionally lowering image quality. By reducing image fidelity, the model can concentrate on important structural features instead of being distracted by unnecessary details. The authors evaluate DDP on two tasks: one focusing on physical attributes and the other on perceptual phenomena, using techniques like downsampling and visual aids. The results show that simplifying visual inputs can enhance reasoning accuracy in Vision-Language Models (VLMs).'}, 'zh': {'title': '降质驱动，提升视觉问答性能', 'desc': '本文提出了一种新的框架，称为降质驱动提示（DDP），旨在通过降低图像清晰度来提高视觉问答（VQA）的性能。研究表明，高分辨率的细节有时会导致模型产生幻觉或推理错误，因此DDP通过聚焦于重要的结构信息来减少干扰。我们在两个不同的任务上评估了DDP，包括物理属性和感知现象，使用了下采样、结构视觉辅助工具和上下文学习等技术。实验结果表明，故意降低视觉输入的质量可以帮助模型更好地理解和推理，从而在复杂的视觉基准测试中取得更高的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.04503', 'title': 'Memory Intelligence Agent', 'url': 'https://huggingface.co/papers/2604.04503', 'abstract': 'Abstract Memory Intelligence Agent framework integrates non-parametric and parametric memory systems with reinforcement learning to enable efficient reasoning and autonomous evolution in open-world environments.  AI-generated summary Deep research agents (DRAs) integrate LLM reasoning with external tools. Memory systems enable DRAs to leverage historical experiences, which are essential for efficient reasoning and autonomous evolution. Existing methods rely on retrieving similar trajectories from memory to aid reasoning, while suffering from key limitations of ineffective memory evolution and increasing storage and retrieval costs. To address these problems, we propose a novel Memory Intelligence Agent (MIA) framework, consisting of a Manager-Planner-Executor architecture. Memory Manager is a non-parametric memory system that can store compressed historical search trajectories. Planner is a parametric memory agent that can produce search plans for questions. Executor is another agent that can search and analyze information guided by the search plan. To build the MIA framework, we first adopt an alternating reinforcement learning paradigm to enhance cooperation between the Planner and the Executor. Furthermore, we enable the Planner to continuously evolve during test-time learning, with updates performed on-the-fly alongside inference without interrupting the reasoning process. Additionally, we establish a bidirectional conversion loop between parametric and non-parametric memories to achieve efficient memory evolution. Finally, we incorporate a reflection and an uns
