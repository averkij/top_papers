upervised judgment mechanisms to boost reasoning and self-evolution in the open world. Extensive experiments across eleven benchmarks demonstrate the superiority of MIA.', 'score': 6, 'issue_id': 1821, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '38f262d57d94d5b1', 'authors': ['Jingyang Qiao', 'Weicheng Meng', 'Yu Cheng', 'Zhihang Lin', 'Zhizhong Zhang', 'Xin Tan', 'Jingyu Gong', 'Kun Shao', 'Yuan Xie'], 'affiliations': ['East China Normal University', 'Harbin Institute of Technology', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.04503.jpg', 'data': {'categories': ['#optimization', '#agents', '#reasoning', '#rl', '#training'], 'emoji': '🧠', 'ru': {'title': 'Интеллектуальный агент с гибридной памятью для непрерывного самообучения', 'desc': 'Предложена новая архитектура Memory Intelligence Agent (MIA), которая объединяет непараметрическую память для хранения сжатых траекторий поиска и параметрическую память в виде обучаемого агента для планирования. Система использует чередующееся обучение с подкреплением для синхронизации компонентов Planner и Executor, обеспечивая эффективное рассуждение. Ключевой инновацией является способность модели эволюционировать во время тестирования через динамическое обновление параметров без прерывания процесса вывода. Двусторонний обмен между параметрической и непараметрической памятью, а также механизмы рефлексии позволяют агенту автономно развиваться в открытых окружениях.'}, 'en': {'title': 'Revolutionizing Reasoning with Memory Intelligence Agents', 'desc': 'The Memory Intelligence Agent (MIA) framework combines non-parametric and parametric memory systems with reinforcement learning to enhance reasoning and adaptability in dynamic environments. It features a Manager-Planner-Executor architecture where the Memory Manager stores compressed historical data, the Planner generates search strategies, and the Executor conducts information searches based on these plans. This framework addresses limitations of existing methods by allowing the Planner to evolve during inference and by facilitating efficient memory updates. Extensive testing shows that MIA outperforms traditional approaches in reasoning and autonomous evolution tasks.'}, 'zh': {'title': '记忆智能代理：高效推理与自主进化的未来', 'desc': '本文提出了一种新的记忆智能代理框架（MIA），结合了非参数和参数记忆系统与强化学习，以实现开放世界环境中的高效推理和自主进化。该框架由管理者、规划者和执行者组成，管理者负责存储压缩的历史搜索轨迹，规划者生成问题的搜索计划，执行者根据计划进行信息搜索和分析。通过交替强化学习方法，增强了规划者与执行者之间的协作，并允许规划者在测试时学习中不断进化。实验结果表明，MIA在多个基准测试中表现优越，克服了现有方法在记忆演化和存储成本上的局限。'}}}, {'id': 'https://huggingface.co/papers/2604.00830', 'title': 'Learning to Learn-at-Test-Time: Language Agents with Learnable Adaptation Policies', 'url': 'https://huggingface.co/papers/2604.00830', 'abstract': "Abstract Meta-TTL formulates adaptation policy discovery as a bi-level optimization problem to improve language agent performance through learned policies rather than hand-crafted ones.  AI-generated summary Test-Time Learning (TTL) enables language agents to iteratively refine their performance through repeated interactions with the environment at inference time. At the core of TTL is an adaptation policy that updates the actor policy based on experience from previous episodes, thereby improving future behavior. Existing methods rely on fixed, hand-crafted adaptation policies rather than optimizing them for downstream improvement. We argue that optimal adaptation policies should be learned from task environments, not hand-engineered based on human intuition. To achieve this, we introduce Meta-TTL, a framework that formulates the discovery of effective adaptation policies as a bi-level optimization problem. Within this framework, the inner loop executes the standard TTL process, measuring how effectively a candidate adaptation policy helps an agent correct errors across sequential episodes. Guided by the agent's performance, the outer loop employs evolutionary search over a diverse distribution of training tasks to iteratively refine the adaptation policy. We evaluate Meta-TTL on Jericho and WebArena-Lite across both in-distribution (ID) and out-of-distribution (OOD) settings, using multiple meta-agent backbones. Results on both benchmarks show that Meta-TTL consistently outperforms hand-crafted baselines, suggesting that the optimized adaptation policy encodes transferable strategies that generalize beyond the training task distribution.", 'score': 6, 'issue_id': 1824, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '9dccb1d650b7c2be', 'authors': ['Zhanzhi Lou', 'Hui Chen', 'Yibo Li', 'Qian Wang', 'Bryan Hooi'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2604.00830.jpg', 'data': {'categories': ['#transfer_learning', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'Автоматическое изучение адаптационных политик для языковых агентов через би-уровневую оптимизацию', 'desc': 'В работе предлагается Meta-TTL — фреймворк для автоматического обнаружения оптимальной политики адаптации языковых агентов путём формулировки задачи как би-уровневой оптимизации. Во внутреннем цикле выполняется стандартный процесс Test-Time Learning, где агент итеративно уточняет свою поведенческую политику через взаимодействие с окружением во время инференса. Во внешнем цикле используется эволюционный поиск по распределению обучающих задач для оптимизации самой адаптационной политики. Экспериментальные результаты на бенчмарках Jericho и WebArena-Lite показывают, что такой подход к обучению адаптационных политик превосходит ручно сконструированные базовые решения и демонстрирует хорошую обобщаемость на распределениях, не встречавшихся при обучении.'}, 'en': {'title': 'Learn to Adapt: Optimizing Language Agents with Meta-TTL', 'desc': 'The paper introduces Meta-TTL, a novel framework for discovering adaptation policies in language agents through bi-level optimization. This approach allows agents to learn from their interactions with the environment, refining their performance at inference time rather than relying on fixed, hand-crafted policies. By employing an inner loop for standard Test-Time Learning (TTL) and an outer loop for evolutionary search, Meta-TTL optimizes adaptation policies based on real-world task experiences. The results demonstrate that these learned policies significantly enhance agent performance across various environments, outperforming traditional methods.'}, 'zh': {'title': '优化适应策略，提升语言代理表现', 'desc': 'Meta-TTL将适应策略发现视为一个双层优化问题，以提高语言代理的性能。通过测试时学习（TTL），语言代理可以在推理时通过与环境的反复交互来逐步改进其表现。TTL的核心是一个适应策略，它根据之前的经验更新行为策略，从而改善未来的行为。我们提出Meta-TTL框架，通过优化适应策略来实现更好的任务表现，而不是依赖于人工设计的固定策略。'}}}, {'id': 'https://huggingface.co/papers/2604.04780', 'title': 'CLEAR: Unlocking Generative Potential for Degraded Image Understanding in Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2604.04780', 'abstract': 'Abstract CLEAR is a framework that enhances multimodal model robustness to image degradation by integrating generation and reasoning through supervised fine-tuning, latent representation bridging, and interleaved reinforcement learning.  AI-generated summary Image degradation from blur, noise, compression, and poor illumination severely undermines multimodal understanding in real-world settings. Unified multimodal models that combine understanding and generation within a single architecture are a natural fit for this challenge, as their generative pathway can model the fine-grained visual structure that degradation destroys. Yet these models fail to leverage their own generative capacity on degraded inputs. We trace this disconnect to two compounding factors: existing training regimes never ask the model to invoke generation during reasoning, and the standard decode-reencode pathway does not support effective joint optimization. We present CLEAR, a framework that connects the two capabilities through three progressive steps: (1) supervised fine-tuning on a degradation-aware dataset to establish the generate-then-answer reasoning pattern; (2) a Latent Representation Bridge that replaces the decode-reencode detour with a direct, optimizable connection between generation and reasoning; (3) Interleaved GRPO, a reinforcement learning method that jointly optimizes text reasoning and visual generation under answer-correctness rewards. We construct MMD-Bench, covering three degradation severity levels across six standard multimodal benchmarks. Experiments show that CLEAR substantially improves robustness on degraded inputs while preserving clean-image performance. Our analysis further reveals that removing pixel-level reconstruction supervision leads to intermediate visual states with higher perceptual quality, suggesting that task-driven optimization and visual quality are naturally aligned.', 'score': 5, 'issue_id': 1824, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '6c0cf2fc9b6d9c62', 'authors': ['Xiangzhao Hao', 'Zefeng Zhang', 'Zhenyu Zhang', 'Linhao Yu', 'Yao Chen', 'Yiqian Zhang', 'Haiyun Guo', 'Shuohuan Wang', 'Yu Sun'], 'affiliations': ['Baidu Inc.', 'Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.04780.jpg', 'data': {'categories': ['#security', '#reasoning', '#optimization'], 'emoji': '🔧', 'ru': {'title': 'Усиление мультимодальных моделей через интеграцию генерации и рассуждения', 'desc': 'В статье представляется CLEAR — фреймворк для повышения устойчивости мультимодальных моделей к деградации изображений, вызванной размытием, шумом и другими искажениями. Авторы предлагают три ключевых компонента: обучение с учителем на датасете с деградированными образцами, мост латентных представлений для прямой оптимизации, и чередующееся обучение с подкреплением для совместной оптимизации генерации и рассуждения. Эксперименты на новом бенчмарке MMD-Bench демонстрируют значительное улучшение робастности модели на деградированных входах без снижения производительности на чистых изображениях. Исследование показывает, что задачно-ориентированная оптимизация естественным образом улучшает воспринимаемое качество промежуточных визуальных представлений.'}, 'en': {'title': 'Enhancing Multimodal Robustness Against Image Degradation with CLEAR', 'desc': "The CLEAR framework aims to improve the robustness of multimodal models against image degradation caused by factors like blur and noise. It integrates generation and reasoning through a three-step process: fine-tuning on a dataset that includes degraded images, creating a direct connection between generation and reasoning, and using reinforcement learning to optimize both text reasoning and visual generation. This approach allows the model to better handle degraded inputs while maintaining performance on clean images. The results demonstrate that CLEAR enhances the model's ability to understand and generate content from degraded images, highlighting the importance of task-driven optimization for visual quality."}, 'zh': {'title': 'CLEAR：提升多模态模型鲁棒性的框架', 'desc': 'CLEAR是一个框架，通过整合生成和推理，增强多模态模型对图像退化的鲁棒性。图像模糊、噪声、压缩和光照不足等退化严重影响了多模态理解。CLEAR通过三个步骤连接生成和推理能力，首先在退化感知数据集上进行监督微调，然后使用潜在表示桥接替代传统的解码-重编码路径，最后采用交错的强化学习方法共同优化文本推理和视觉生成。实验表明，CLEAR在退化输入上显著提高了鲁棒性，同时保持了在清晰图像上的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.03993', 'title': 'Can LLMs Learn to Reason Robustly under Noisy Supervision?', 'url': 'https://huggingface.co/papers/2604.03993', 'abstract': "Abstract Reinforcement Learning with Verifiable Rewards faces challenges with noisy labels, but a proposed method called Online Label Refinement addresses this by progressively correcting labels based on policy improvement and consistency checks, demonstrating improved robustness across various mathematical reasoning benchmarks.  AI-generated summary Reinforcement Learning with Verifiable Rewards (RLVR) effectively trains reasoning models that rely on abundant perfect labels, but its vulnerability to unavoidable noisy labels due to expert scarcity remains critically underexplored. In this work, we take the first step toward a systematic analysis of noisy label mechanisms in RLVR. In contrast to supervised classification, most RLVR algorithms incorporate a rollout-based condition: a label's influence on training is contingent on whether the current policy can generate rollouts that realize it, a property that naturally extends to noisy labels. Based on this observation, we distinguish two types of noise: inactive noisy labels, which reduce data efficiency, and active noisy labels, which are reinforced and risk skewing the model toward incorrect distributions. From experiments on training with noisy samples, we identify an Early Correctness Coherence phenomenon: although noisy samples begin to lag behind in later stages, accuracy on both clean and noisy samples increases similarly in early training. Motivated by this dynamic, we propose Online Label Refinement (OLR), which progressively corrects potentially noisy labels with majority-voted answers when two conditions hold: a positive slope in the majority answer's rollout pass rate and stable historical consistency across updates, enabling gradual self-correction as the policy improves. We evaluate OLR on six in-distribution mathematical reasoning benchmarks (AIME24/25, AMC, MATH-500, Minerva, and Olympiad) and three out-of-distribution tasks (ARC-c, GPQA-diamond, and MMLU-pro). Across noise ratios from 0.1 to 0.9, OLR consistently improves robustness under both inactive and active noisy-label settings, achieving average gains of 3.6% to 3.9% on in-distribution benchmarks and 3.3% to 4.6% on out-of-distribution evaluations.", 'score': 5, 'issue_id': 1822, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': 'd91772ee4cc2b9c2', 'authors': ['Shenzhi Yang', 'Guangcheng Zhu', 'Bowen Song', 'Sharon Li', 'Haobo Wang', 'Xing Zheng', 'Yingfan Ma', 'Zhongqi Chen', 'Weiqiang Wang', 'Gang Chen'], 'affiliations': ['Ant Group', 'University of Wisconsin-Madison', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.03993.jpg', 'data': {'categories': ['#benchmark', '#rl', '#training', '#math'], 'emoji': '🔧', 'ru': {'title': 'Самокорректирующееся обучение с подкреплением через онлайн-очистку шумных меток', 'desc': 'Работа исследует проблему шумных меток в обучении с подкреплением с верифицируемыми наградами, которое используется для обучения моделей математическому рассуждению. Авторы предлагают метод Online Label Refinement, который постепенно исправляет потенциально ошибочные метки, используя большинственное голосование и проверки согласованности по мере улучшения политики. Метод различает два типа шума: неактивный шум, снижающий эффективность данных, и активный шум, который может исказить распределение модели. Экспериментальная оценка на математических бенчмарках показывает, что OLR достигает устойчивого улучшения на 3.6-4.6% в зависимости от типа датасета при различных уровнях шума.'}, 'en': {'title': 'Refining Noisy Labels for Robust Reinforcement Learning', 'desc': 'This paper addresses the challenges of noisy labels in Reinforcement Learning with Verifiable Rewards (RLVR), which can hinder the training of reasoning models. The authors introduce a method called Online Label Refinement (OLR) that progressively corrects labels based on the performance of the learning policy and consistency checks. They identify two types of noise in labels: inactive, which reduces efficiency, and active, which can skew model training. Through experiments, OLR shows significant improvements in robustness against noisy labels across various mathematical reasoning tasks, demonstrating its effectiveness in enhancing model accuracy.'}, 'zh': {'title': '在线标签精炼：提升强化学习的鲁棒性', 'desc': '本论文探讨了在可验证奖励的强化学习中，如何应对噪声标签带来的挑战。提出了一种名为在线标签精炼（Online Label Refinement, OLR）的方法，通过政策改进和一致性检查逐步修正标签。研究表明，OLR在多种数学推理基准测试中表现出更强的鲁棒性，能够有效处理无效和有效的噪声标签。实验结果显示，OLR在不同噪声比例下均能显著提高模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.01043', 'title': 'ONE-SHOT: Compositional Human-Environment Video Synthesis via Spatial-Decoupled Motion Injection and Hybrid Context Integration', 'url': 'https://huggingface.co/papers/2604.01043', 'abstract': 'Abstract ONE-SHOT enables compositional human-environment video generation through disentangled signals, dynamic positional embeddings, and hybrid context integration for improved control and diversity.  AI-generated summary Recent advances in Video Foundation Models (VFMs) have revolutionized human-centric video synthesis, yet fine-grained and independent editing of subjects and scenes remains a critical challenge. Recent attempts to incorporate richer environment control through rigid 3D geometric compositions often encounter a stark trade-off between precise control and generative flexibility. Furthermore, the heavy 3D pre-processing still limits practical scalability. In this paper, we propose ONE-SHOT, a parameter-efficient framework for compositional human-environment video generation. Our key insight is to factorize the generative process into disentangled signals. Specifically, we introduce a canonical-space injection mechanism that decouples human dynamics from environmental cues via cross-attention. We also propose Dynamic-Grounded-RoPE, a novel positional embedding strategy that establishes spatial correspondences between disparate spatial domains without any heuristic 3D alignments. To support long-horizon synthesis, we introduce a Hybrid Context Integration mechanism to maintain subject and scene consistency across minute-level generations. Experiments demonstrate that our method significantly outperforms state-of-the-art methods, offering superior structural control and creative diversity for video synthesis. Our project has been available on: https://martayang.github.io/ONE-SHOT/.', 'score': 5, 'issue_id': 1826, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '0e4f0e80d4fe40d1', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#architecture', '#video', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Композиционная генерация видео через разделение человека и окружения', 'desc': 'Работа предлагает ONE-SHOT, параметрически эффективный фреймворк для синтеза видео с людьми и окружением. Ключевая идея заключается в факторизации генеративного процесса на разделённые сигналы: механизм инъекции в каноническое пространство разделяет динамику человека от сигналов окружения через кросс-внимание. Авторы вводят Dynamic-Grounded-RoPE, новую стратегию позиционного кодирования, которая устанавливает пространственные соответствия без трёхмерного выравнивания. Для долгосрочного синтеза применяется гибридная интеграция контекста, обеспечивающая согласованность персонажа и сцены при генерации видео длительностью в минуты.'}, 'en': {'title': 'ONE-SHOT: Revolutionizing Human-Environment Video Generation', 'desc': 'The paper presents ONE-SHOT, a new framework for generating videos that feature both humans and their environments in a compositional manner. It addresses the challenge of editing subjects and scenes independently by using disentangled signals and a novel positional embedding strategy called Dynamic-Grounded-RoPE. This approach allows for better control over the generated content while maintaining flexibility, without relying on complex 3D pre-processing. The results show that ONE-SHOT outperforms existing methods, providing enhanced structural control and creative diversity in video synthesis.'}, 'zh': {'title': 'ONE-SHOT：提升视频生成的控制与多样性', 'desc': '本文提出了一种名为ONE-SHOT的框架，用于生成组合的人类与环境视频。该方法通过解耦信号、动态位置嵌入和混合上下文集成来提高控制能力和多样性。ONE-SHOT的关键在于将生成过程分解为独立的信号，利用交叉注意力机制将人类动态与环境线索解耦。实验结果表明，该方法在视频合成的结构控制和创意多样性方面显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2604.04787', 'title': 'AvatarPointillist: AutoRegressive 4D Gaussian Avatarization', 'url': 'https://huggingface.co/papers/2604.04787', 'abstract': "Abstract AvatarPointillist generates dynamic 4D Gaussian avatars using a decoder-only Transformer that autoregressively constructs point clouds with adaptive density and binding information for realistic animation.  AI-generated summary We introduce AvatarPointillist, a novel framework for generating dynamic 4D Gaussian avatars from a single portrait image. At the core of our method is a decoder-only Transformer that autoregressively generates a point cloud for 3D Gaussian Splatting. This sequential approach allows for precise, adaptive construction, dynamically adjusting point density and the total number of points based on the subject's complexity. During point generation, the AR model also jointly predicts per-point binding information, enabling realistic animation. After generation, a dedicated Gaussian decoder converts the points into complete, renderable Gaussian attributes. We demonstrate that conditioning the decoder on the latent features from the AR generator enables effective interaction between stages and markedly improves fidelity. Extensive experiments validate that AvatarPointillist produces high-quality, photorealistic, and controllable avatars. We believe this autoregressive formulation represents a new paradigm for avatar generation, and we will release our code inspire future research.", 'score': 3, 'issue_id': 1823, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': 'd284793bec244162', 'authors': ['Hongyu Liu', 'Xuan Wang', 'Yating Wang', 'Zijian Wu', 'Ziyu Wan', 'Yue Ma', 'Runtao Liu', 'Boyao Zhou', 'Yujun Shen', 'Qifeng Chen'], 'affiliations': ['Ant Group', 'City University of Hong Kong', 'HKUST'], 'pdf_title_img': 'assets/pdf/title_img/2604.04787.jpg', 'data': {'categories': [], 'emoji': '👤', 'ru': {'title': 'Автороgressивное поколение фотореалистичных 4D аватаров через облака точек', 'desc': 'AvatarPointillist представляет собой инновационный фреймворк для создания динамических 4D аватаров на основе 3D Gaussian Splatting. В основе метода лежит декодер-only трансформер, который автореgressивно генерирует облако точек с адаптивной плотностью, динамически подстраивая количество точек под сложность объекта. Одновременно с генерацией точек модель предсказывает информацию привязки для каждой точки, что позволяет реалистично анимировать аватар. Дополнительный Gaussian декодер преобразует сгенерированные точки в полные атрибуты Гауссианов, обеспечивая высокое качество и фотореалистичность итогового результата.'}, 'en': {'title': 'Revolutionizing Avatar Creation with Dynamic 4D Gaussian Models', 'desc': 'AvatarPointillist is a new method for creating dynamic 4D avatars from a single image using a decoder-only Transformer. This approach generates point clouds autoregressively, meaning it builds the 3D representation step by step, adjusting the density of points based on the complexity of the subject. The model also predicts binding information for each point, which helps in creating realistic animations. Our experiments show that this method produces high-quality, photorealistic avatars and sets a new standard for avatar generation in machine learning.'}, 'zh': {'title': '动态生成高质量4D高斯头像的创新方法', 'desc': 'AvatarPointillist 是一个新颖的框架，可以从单一的肖像图像生成动态的 4D 高斯头像。该方法的核心是一个仅使用解码器的 Transformer，它自回归地生成用于 3D 高斯点云的点。通过这种顺序生成的方法，可以根据对象的复杂性动态调整点的密度和数量。同时，模型还预测每个点的绑定信息，从而实现逼真的动画效果。实验结果表明，AvatarPointillist 能够生成高质量、逼真且可控的头像，代表了头像生成的新范式。'}}}, {'id': 'https://huggingface.co/papers/2604.04522', 'title': 'HDP: A Lightweight Cryptographic Protocol for Human Delegation Provenance in Agentic AI Systems', 'url': 'https://huggingface.co/papers/2604.04522', 'abstract': "Abstract  Agentic AI systems increasingly execute consequential actions on behalf of human principals, delegating tasks through multi-step chains of autonomous agents. No existing standard addresses a fundamental accountability gap: verifying that terminal actions in a delegation chain were genuinely authorized by a human principal, through what chain of delegation, and under what scope. This paper presents the Human Delegation Provenance (HDP) protocol, a lightweight token-based scheme that cryptographically captures and verifies human authorization context in multi-agent systems. An HDP token binds a human authorization event to a session, records each agent's delegation action as a signed hop in an append-only chain, and enables any participant to verify the full provenance record using only the issuer's Ed25519 public key and the current session identifier. Verification is fully offline, requiring no registry lookups or third-party trust anchors. We situate HDP within the existing landscape of delegation protocols, identify its distinct design point relative to OAuth 2.0 Token Exchange (RFC 8693), JSON Web Tokens (RFC 7519), UCAN, and the Intent Provenance Protocol (draft-haberkamp-ipp-00), and demonstrate that existing standards fail to address the multi-hop, append-only, human-provenance requirements of agentic systems. HDP has been published as an IETF Internet-Draft (draft-helixar-hdp-agentic-delegation-00) and a reference TypeScript SDK is publicly available.", 'score': 3, 'issue_id': 1822, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '84866ddf3f30d708', 'authors': ['Asiri Dalugoda'], 'affiliations': ['Helixar Limited, Auckland, New Zealand'], 'pdf_title_img': 'assets/pdf/title_img/2604.04522.jpg', 'data': {'categories': ['#agents'], 'emoji': '🔐', 'ru': {'title': 'Криптографический аудит цепочек делегирования в агентных системах', 'desc': 'В статье предлагается протокол Human Delegation Provenance (HDP) для отслеживания цепочек делегирования полномочий в системах с агентами искусственного интеллекта. HDP использует криптографические токены на основе Ed25519 для фиксации и проверки авторизации человека, регистрируя каждый шаг делегирования как подписанное звено в неизменяемой цепи. Протокол позволяет любому участнику верифицировать всю историю полномочий офлайн, без обращения к реестрам или третьим сторонам. Авторы сравнивают HDP с существующими стандартами OAuth 2.0, JWT и UCAN, доказывая, что они не решают задачу многоуровневого аудита человеческих полномочий в системах агентов.'}, 'en': {'title': 'Ensuring Accountability in Agentic AI with HDP Protocol', 'desc': 'This paper introduces the Human Delegation Provenance (HDP) protocol, which addresses the accountability gap in multi-agent systems where tasks are delegated by humans. HDP uses a lightweight, token-based approach to cryptographically verify that actions taken by autonomous agents were authorized by a human, detailing the chain of delegation. Each action is recorded as a signed hop in an append-only chain, allowing for easy verification of the entire authorization process without needing external registries. The authors compare HDP to existing protocols like OAuth 2.0 and JSON Web Tokens, highlighting its unique ability to meet the specific needs of agentic systems.'}, 'zh': {'title': '确保人类授权的多代理系统协议', 'desc': '本文提出了一种名为人类委托来源（HDP）协议的轻量级令牌方案，旨在解决多代理系统中人类授权的验证问题。HDP令牌通过加密方式捕捉和验证人类授权上下文，确保每个代理的委托行为都被记录在一个仅追加的链中。该协议允许任何参与者使用发行者的Ed25519公钥和当前会话标识符来离线验证完整的来源记录。与现有的委托协议相比，HDP在多跳、仅追加和人类来源要求方面具有独特的设计优势。'}}}, {'id': 'https://huggingface.co/papers/2604.03687', 'title': 'SciLT: Long-Tailed Classification in Scientific Image Domains', 'url': 'https://huggingface.co/papers/2604.03687', 'abstract': 'Abstract Scientific long-tailed recognition benefits from a proposed framework that leverages multi-level representations through adaptive feature fusion and dual-supervision learning to achieve balanced performance across all classes.  AI-generated summary Long-tailed recognition has benefited from foundation models and fine-tuning paradigms, yet existing studies and benchmarks are mainly confined to natural image domains, where pre-training and fine-tuning data share similar distributions. In contrast, scientific images exhibit distinct visual characteristics and supervision signals, raising questions about the effectiveness of fine-tuning foundation models in such settings. In this work, we investigate scientific long-tailed recognition under a purely visual and parameter-efficient fine-tuning (PEFT) paradigm. Experiments on three scientific benchmarks show that fine-tuning foundation models yields limited gains, and reveal that penultimate-layer features play an important role, particularly for tail classes. Motivated by these findings, we propose SciLT, a framework that exploits multi-level representations through adaptive feature fusion and dual-supervision learning. By jointly leveraging penultimate- and final-layer features, SciLT achieves balanced performance across head and tail classes. Extensive experiments demonstrate that SciLT consistently outperforms existing methods, establishing a strong and practical baseline for scientific long-tailed recognition and providing valuable guidance for adapting foundation models to scientific data with substantial domain shifts.', 'score': 3, 'issue_id': 1824, 'pub_date': '2026-04-04', 'pub_date_card': {'ru': '4 апреля', 'en': 'April 4', 'zh': '4月4日'}, 'hash': '22ba0e3977a54c2a', 'authors': ['Jiahao Chen', 'Bing Su'], 'affiliations': ['Renmin University of China, Gaoling School of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.03687.jpg', 'data': {'categories': ['#training', '#benchmark', '#cv'], 'emoji': '🔬', 'ru': {'title': 'Умная фузия признаков для сбалансированной классификации научных данных', 'desc': 'Статья посвящена задаче классификации научных изображений с несбалансированным распределением классов (long-tailed recognition). Авторы показали, что стандартная адаптация фундаментальных моделей к научным данным даёт ограниченные результаты из-за значительного различия в характеристиках изображений. Они предложили метод SciLT, который использует многоуровневые представления из разных слоёв нейронной сети и комбинирует их через адаптивное слияние признаков. Такой подход позволяет достичь сбалансированного качества предсказаний как для классов с большим количеством примеров, так и для редких классов.'}, 'en': {'title': 'Enhancing Scientific Image Recognition with SciLT Framework', 'desc': 'This paper introduces SciLT, a framework designed to improve long-tailed recognition in scientific images by using adaptive feature fusion and dual-supervision learning. It highlights the challenges of applying foundation models to scientific data, which often have different visual characteristics compared to natural images. The research shows that fine-tuning these models yields limited improvements, especially for tail classes, but emphasizes the importance of using features from both penultimate and final layers. Through extensive experiments, SciLT demonstrates superior performance across all classes, setting a new standard for recognizing scientific images with long-tailed distributions.'}, 'zh': {'title': '科学长尾识别的新框架', 'desc': '本论文提出了一种名为SciLT的框架，用于科学领域的长尾识别。该框架通过自适应特征融合和双重监督学习，利用多层次表示来实现各类的平衡性能。研究表明，倒数第二层特征在长尾类的识别中起着重要作用，尤其是在科学图像中。实验结果显示，SciLT在多个科学基准测试中优于现有方法，为科学数据的基础模型适应提供了有效的指导。'}}}, {'id': 'https://huggingface.co/papers/2604.04562', 'title': 'Paper Espresso: From Paper Overload to Research Insight', 'url': 'https://huggingface.co/papers/2604.04562', 'abstract': 'Abstract _paper espresso is an open-source platform that uses large language models to automatically discover, summarize, and analyze trending arxiv papers, providing multi-granularity trend analysis and revealing dynamics in ai research landscape.  AI-generated summary The accelerating pace of scientific publishing makes it increasingly difficult for researchers to stay current. We present Paper Espresso, an open-source platform that automatically discovers, summarizes, and analyzes trending arXiv papers. The system uses large language models (LLMs) to generate structured summaries with topical labels and keywords, and provides multi-granularity trend analysis at daily, weekly, and monthly scales through LLM-driven topic consolidation. Over 35 months of continuous deployment, Paper Espresso has processed over 13,300 papers and publicly released all structured metadata, revealing rich dynamics in the AI research landscape: a mid-2025 surge in reinforcement learning for LLM reasoning, non-saturating topic emergence (6,673 unique topics), and a positive correlation between topic novelty and community engagement (2.0x median upvotes for the most novel papers). A live demo is available at https://huggingface.co/spaces/Elfsong/Paper_Espresso.', 'score': 2, 'issue_id': 1826, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '3c1f9ebb50635516', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#open_source', '#science'], 'emoji': '☕', 'ru': {'title': 'Автоматическое отслеживание трендов в AI-исследованиях через LLM-анализ научных публикаций', 'desc': 'Paper Espresso — это открытая платформа, которая использует большие языковые модели для автоматического обнаружения, суммаризации и анализа популярных статей с arXiv. Система генерирует структурированные резюме со смысловыми метками и ключевыми словами, а также проводит анализ трендов на разных временных масштабах — дневном, недельном и месячном. За 35 месяцев работы платформа обработала более 13 300 статей и выявила важные закономерности в ландшафте AI-исследований, включая всплеск интереса к reinforcement learning для рассуждений LLM. Полученные структурированные метаданные открыто распространяются, позволяя сообществу лучше понимать динамику развития научных направлений.'}, 'en': {'title': 'Stay Ahead in AI Research with Paper Espresso!', 'desc': 'Paper Espresso is an innovative open-source platform that leverages large language models (LLMs) to automatically discover and summarize trending research papers from arXiv. It provides structured summaries with topical labels and keywords, enabling researchers to quickly grasp the essence of new studies. The platform also offers multi-granularity trend analysis, allowing users to track developments in AI research over daily, weekly, and monthly intervals. With over 13,300 papers processed, it reveals significant trends, such as a surge in reinforcement learning and a correlation between topic novelty and community engagement.'}, 'zh': {'title': '自动化分析，掌握AI研究动态', 'desc': 'Paper Espresso 是一个开源平台，利用大型语言模型自动发现、总结和分析 arXiv 上的热门论文。该系统生成结构化摘要，并提供多层次的趋势分析，帮助研究人员跟上快速变化的科学出版节奏。通过对超过 13,300 篇论文的处理，Paper Espresso 揭示了人工智能研究领域的动态变化，包括强化学习的激增和新兴主题的出现。该平台的分析结果显示，主题的新颖性与社区参与度之间存在正相关关系。'}}}, {'id': 'https://huggingface.co/papers/2604.04155', 'title': 'The Geometric Alignment Tax: Tokenization vs. Continuous Geometry in Scientific Foundation Models', 'url': 'https://huggingface.co/papers/2604.04155', 'abstract': "Abstract Foundation models in biology and physics suffer from geometric distortion due to discrete categorical bottlenecks, with continuous objectives showing significantly better preservation of system geometry compared to discrete tokenization approaches.  AI-generated summary Foundation models for biology and physics optimize predictive accuracy, but their internal representations systematically fail to preserve the continuous geometry of the systems they model. We identify the root cause: the Geometric Alignment Tax, an intrinsic cost of forcing continuous manifolds through discrete categorical bottlenecks. Controlled ablations on synthetic dynamical systems demonstrate that replacing cross-entropy with a continuous head on an identical encoder reduces geometric distortion by up to 8.5x, while learned codebooks exhibit a non-monotonic double bind where finer quantization worsens geometry despite improving reconstruction. Under continuous objectives, three architectures differ by 1.3x; under discrete tokenization, they diverge by 3,000x. Evaluating 14 biological foundation models with rate-distortion theory and MINE, we identify three failure regimes: Local-Global Decoupling, Representational Compression, and Geometric Vacuity. A controlled experiment confirms that Evo 2's reverse-complement robustness on real DNA reflects conserved sequence composition, not learned symmetry. No model achieves simultaneously low distortion, high mutual information, and global coherence.", 'score': 1, 'issue_id': 1826, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': 'e924b8a6d5fcd033', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.04155.jpg', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Непрерывные представления вместо дискретной квантизации для сохранения геометрии биологических систем', 'desc': 'В этой работе исследуется проблема геометрических искажений в фундаментальных моделях для биологии и физики, которые возникают из-за использования дискретной категориальной квантизации. Авторы показывают, что непрерывные функции потерь (в отличие от cross-entropy) значительно лучше сохраняют геометрию моделируемых систем, уменьшая искажения в 8,5 раза. Через анализ rate-distortion и взаимной информации выявлены три типа отказов в существующих биологических моделях: несогласованность локальных и глобальных представлений, чрезмерное сжатие информации и потеря геометрической структуры. Исследование демонстрирует, что ни одна из протестированных моделей не может одновременно достичь низкого искажения, высокой взаимной информации и глобальной согласованности.'}, 'en': {'title': 'Continuous Objectives Overcome Geometric Distortion in Foundation Models', 'desc': 'This paper discusses the limitations of foundation models in biology and physics, particularly how they struggle with geometric distortion when using discrete categorical bottlenecks. The authors introduce the concept of the Geometric Alignment Tax, which highlights the challenges of maintaining continuous geometry in these models. They demonstrate that using continuous objectives instead of discrete tokenization can significantly reduce geometric distortion, improving model performance. The study also identifies various failure modes in biological models, emphasizing the trade-offs between distortion, mutual information, and coherence in their representations.'}, 'zh': {'title': '优化几何保真度，提升基础模型表现', 'desc': '本论文探讨了生物学和物理学中的基础模型在处理几何失真时所面临的问题。研究发现，离散的分类瓶颈会导致模型无法有效保留系统的连续几何特性。通过对比连续目标和离散标记化方法，结果显示使用连续目标可以显著减少几何失真。论文还识别了三种失败模式，并提出了改进模型表现的潜在方法。'}}}, {'id': 'https://huggingface.co/papers/2604.03695', 'title': 'POEMetric: The Last Stanza of Humanity', 'url': 'https://huggingface.co/papers/2604.03695', 'abstract': 'Abstract POEMetric evaluates LLM poetry generation across basic, creative, and quality dimensions, revealing significant gaps between human and machine capabilities in poetic expression.  AI-generated summary Large Language Models (LLMs) can compose poetry, but how far are they from human poets? In this paper, we introduce POEMetric, the first comprehensive framework for poetry evaluation, examining 1) basic instruction-following abilities in generating poems according to a certain form and theme, 2) advanced abilities of showing creativity, lexical diversity, and idiosyncrasy, evoking emotional resonance, and using imagery and literary devices, and 3) general appraisal of the overall poem quality and estimation of authorship. We curated a human poem dataset - 203 English poems of 7 fixed forms annotated with meter, rhyme patterns and themes - and experimented with 30 LLMs for poetry generation based on the same forms and themes of the human data, totaling 6,090 LLM poems. Based on POEMetric, we assessed the performance of both human poets and LLMs through rule-based evaluation and LLM-as-a-judge, whose results were validated by human experts. Results show that, though the top model achieved high form accuracy (4.26 out of 5.00, with Gemini-2.5-Pro as a judge; same below) and theme alignment (4.99), all models failed to reach the same level of advanced abilities as human poets, who achieved unparalleled creativity (4.02), idiosyncrasy (3.95), emotional resonance (4.06), and skillful use of imagery (4.49) and literary devices (4.67). Humans also defeated the best-performing LLM in overall poem quality (4.22 vs. 3.20). As such, poetry generation remains a formidable challenge for LLMs. Data and codes are released at https://github.com/Bingru-Li/POEMetric.', 'score': 1, 'issue_id': 1825, 'pub_date': '2026-04-04', 'pub_date_card': {'ru': '4 апреля', 'en': 'April 4', 'zh': '4月4日'}, 'hash': '1dc5f2ac9d99806d', 'authors': ['Bingru Li', 'Han Wang', 'Hazel Wilkinson'], 'affiliations': ['Institute of Data and AI (IDAI)', 'University of Birmingham', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2604.03695.jpg', 'data': {'categories': [], 'emoji': '✨', 'ru': {'title': 'Машины пишут стихи, но душу им не дать', 'desc': 'В статье представлена POEMetric — первая комплексная система оценки поэзии, созданной большими языковыми моделями. Исследователи оценили способность 30 LLM генерировать стихи по различным критериям: соответствие форме, творческость, лексическое разнообразие, эмоциональный резонанс и мастерство использования литературных приёмов. Анализ 6090 сгенерированных моделями стихотворений показал, что хотя LLM хорошо справляются с технической стороной (точность формы и темы), они значительно отстают от человека в креативности и глубине художественного выражения. Результаты подтверждают, что генерация поэзии остаётся сложной задачей для современных нейросетей.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI Poetry Against Human Creativity', 'desc': 'The paper introduces POEMetric, a new framework designed to evaluate poetry generated by Large Language Models (LLMs) against human poets. It assesses three key dimensions: basic instruction-following, advanced creative abilities, and overall poem quality. The study reveals that while LLMs can generate poems that follow specific forms and themes, they significantly lag behind human poets in creativity, emotional depth, and the use of literary techniques. The findings highlight the ongoing challenges in achieving human-like poetic expression with AI.'}, 'zh': {'title': '诗歌生成：人类与机器的差距', 'desc': '本论文介绍了POEMetric，这是一个用于评估大型语言模型（LLM）生成诗歌的综合框架。我们通过分析基本的指令遵循能力、创造力和整体诗歌质量，揭示了人类诗人与机器在诗歌表达上的显著差距。研究结果表明，尽管LLM在形式和主题上表现良好，但在创造性、情感共鸣和文学技巧等高级能力上仍无法与人类诗人相提并论。总的来说，诗歌生成对LLM来说仍然是一个巨大的挑战。'}}}];

        }

            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

                document.getElementById('filter-logic-and').checked = true;

            const categories = new Set();

                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

            const categories = ['#3d', '#agents (6)', '#agi', '#alignment (1)', '#architecture (3)', '#audio', '#benchmark (12)', '#cv (4)', '#data (2)', '#dataset (7)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation (1)', '#math (2)', '#multilingual (1)', '#multimodal (6)', '#open_source (3)', '#optimization (9)', '#plp (1)', '#rag (1)', '#reasoning (8)', '#rl (5)', '#rlhf (1)', '#robotics (1)', '#science (2)', '#security (2)', '#small_models (1)', '#story_generation', '#survey', '#synthetic (2)', '#training (10)', '#transfer_learning (1)', '#video (2)'];

                categoryFiltersContainer.appendChild(button);

            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');

                selectedCategories.splice(index, 1);

            saveCategorySelection();

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);

                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));

            localStorage.setItem('sort_by', sortBy);

            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-07 13:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-07 13:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
