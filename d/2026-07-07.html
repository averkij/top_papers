печивает более точные предсказания при грубой интеграции.'}, 'en': {'title': 'Efficient Few-Step Generation with Perceptual Flow Matching', 'desc': 'Perceptual Flow Matching (PFM) is a new framework designed to enhance few-step generation in flow-matching models by supervising flow matching in a perceptual feature space. This approach allows for a significant reduction in the number of sampling steps needed for high-quality generation, cutting down from 35-50 steps to just 4-8. Unlike traditional methods that rely on teacher models or auxiliary networks, PFM integrates seamlessly into existing training pipelines with minimal changes. The results show that PFM not only improves generation quality but also reduces artifacts, demonstrating the effectiveness of using perceptual supervision in generative modeling.'}, 'zh': {'title': '感知流匹配：高效的少步生成新方法', 'desc': '感知流匹配（PFM）是一种简单而有效的框架，用于在流匹配模型中实现少步生成。与传统的变分自编码器（VAE）潜在空间中的速度回归不同，PFM在感知特征空间中进行流匹配的监督，利用预训练的感知模型。这个简单的改变显著提高了流匹配模型的少步生成能力，将采样步骤从35-50减少到4-8，同时保持生成质量。我们的实验表明，PFM在图像生成、视频生成和图像编辑任务中始终产生高质量的结果，且比现有的蒸馏方法产生更少的伪影。'}}}, {'id': 'https://huggingface.co/papers/2607.05391', 'title': 'LLM-as-a-Verifier: A General-Purpose Verification Framework', 'url': 'https://huggingface.co/papers/2607.05391', 'abstract': "Abstract LLM-as-a-Verifier introduces a probabilistic verification framework that scales across multiple dimensions to improve solution correctness assessment and agent performance across various benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling pre-training, post-training, and test-time compute have become the central paradigms for improving the capabilities of LLMs. In this work, we identify verification, the ability to determine the correctness of a solution, as a new scaling axis. To unlock this and demonstrate its effectiveness, we introduce LLM-as-a-Verifier, a general-purpose verification framework that provides fine-grained feedback for agentic tasks without requiring additional training. Unlike standard LM judges that prompt LLMs to produce discrete scores for candidate solutions, LLM-as-a-Verifier computes the expectation over the distribution of scoring token logits to generate continuous scores. This probabilistic formulation enables verification to scale along multiple dimensions: (1) score granularity, (2) repeated evaluation, and (3) criteria decomposition. In particular, we show that scaling the scoring granularity leads to better separation between positive and negative solutions, resulting in more calibrated comparisons. Moreover, scaling repeated evaluation and criteria decomposition consistently lead to additional gains in verification accuracy through variance and complexity reduction. We further introduce a cost-efficient ranking algorithm for selecting the best solution among candidates using the verifier's continuous scores. LLM-as-a-Verifier achieves state-of-the-art performance on Terminal-Bench V2 (86.5%), SWE-Bench Verified (78.2%), RoboRewardBench (87.4%), and MedAgentBench (73.3%). Beyond verification, the fine-grained signals from LLM-as-a-Verifier can also serve as a proxy for estimating task progress. We build an extension for Claude Code, enabling developers to monitor and improve their own agentic systems. Finally, we show that LLM-as-a-Verifier can provide dense feedback for RL, improving the sample efficiency of SAC and GRPO on robotics and mathematical reasoning benchmarks.", 'score': 7, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '5111f1e8e7c4d04e', 'authors': ['Jacky Kwok', 'Shulu Li', 'Pranav Atreya', 'Yuejiang Liu', 'Yixing Jiang', 'Chelsea Finn', 'Marco Pavone', 'Ion Stoica', 'Azalia Mirhoseini'], 'affiliations': ['NVIDIA Research', 'Stanford University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2607.05391.jpg', 'data': {'categories': ['#healthcare', '#training', '#optimization', '#agents', '#benchmark', '#reasoning', '#robotics', '#math', '#rl'], 'emoji': '✅', 'ru': {'title': 'Масштабируемая верификация через вероятностные оценки языковых моделей', 'desc': 'В статье предлагается фреймворк LLM-as-a-Verifier для вероятностной проверки корректности решений, основанный на вычислении математического ожидания по распределению логитов токенов вместо дискретных оценок. Основная идея состоит в масштабировании верификации как нового направления развития LLM через три аспекта: гранулярность оценок, повторные оценки и декомпозицию критериев. Предложенный метод достигает состояния искусства на нескольких бенчмарках (Terminal-Bench V2, SWE-Bench Verified, RoboRewardBench) и может использоваться для обучения с подкреплением благодаря генерированию плотной обратной связи. Фреймворк не требует дополнительного обучения и позволяет агентам лучше оценивать качество собственных решений.'}, 'en': {'title': 'Enhancing Solution Verification with LLM-as-a-Verifier', 'desc': 'The paper presents LLM-as-a-Verifier, a new framework that enhances the assessment of solution correctness in machine learning tasks. It introduces a probabilistic approach to verification, allowing for continuous scoring of solutions rather than discrete evaluations. This method improves the granularity of scores, enabling better differentiation between successful and unsuccessful solutions. Additionally, the framework demonstrates significant performance improvements across various benchmarks, making it a valuable tool for developers in optimizing agentic systems.'}, 'zh': {'title': 'LLM作为验证者：提升智能体性能的新方法', 'desc': 'LLM-as-a-Verifier提出了一种概率验证框架，旨在提高解决方案的正确性评估和智能体在各种基准测试中的表现。该框架通过计算评分标记的对数几率分布的期望值，生成连续的评分，而不是传统的离散评分。通过细化评分粒度、重复评估和标准分解，验证的准确性得到了显著提升。LLM-as-a-Verifier在多个基准测试中实现了最先进的性能，并为开发者提供了监控和改进智能体系统的工具。'}}}, {'id': 'https://huggingface.co/papers/2607.05155', 'title': 'EdgeBench: Unveiling Scaling Laws of Learning from Real-World Environments', 'url': 'https://huggingface.co/papers/2607.05155', 'abstract': 'Abstract Analysis of 38,000 hours of real-world agent interactions reveals log-sigmoid scaling laws for performance and exponential learning speed improvements across 134 diverse tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pretraining scaling laws reveal that model capability improves predictably with data and compute. But learning from real world environments after deployment remains far less understood. Analyzing roughly 38,000 hours of agent interaction with the environment across 134 real world tasks, we find, to the best of our knowledge, the first evidence that overall performance during environment learning follows a log-sigmoid scaling law with remarkably high precision, reaching R^2 = 0.998. Across model generations, we also find that agent learning speed roughly doubles every three months. This discovery stems from EdgeBench, a suite of 134 real world tasks with ultra-long horizons, spanning scientific discovery, software engineering, combinatorial optimization, professional knowledge work, formal mathematics, and interactive games. Each task sustains at least 12 hours of continuous agent operation under rich, multilevel feedback, and is built through substantial expert effort. We publicly release 51 tasks and our full evaluation framework to accelerate the study of how agents learn from real world experience.', 'score': 6, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '6e1a4655107681ee', 'authors': ['Deyao Zhu', 'Xin Zhou', 'Shengling Qin', 'Xuekai Zhu', 'Hangliang Ding', 'Shu Zhong', 'Zixin Wen', 'Zhonglin Xie', 'Chenhui Gou', 'Linxuan Ren', 'Yueyang Wang', 'Junfeng Zhong', 'Rui Liu', 'Tian Gao', 'Yangguang Lin', 'Jingyuan Zhang', 'Maojia Song', 'Xuan Qi', 'Jinhong Wu', 'Chenyang Zhang', 'Yinzhu Piao', 'Ziru Niu', 'Hongbin Lin', 'Lingxiang Meng', 'Peng Tang', 'Chengyao Tang', 'Shanyu Wu', 'Huanyu Zheng', 'Yu Liu', 'Liya Zhu', 'He Wang', 'Ming Ding', 'Ziyu Wan', 'Hao Liu', 'Sibo Wang', 'Haotian Zhu', 'Xintian Zhang', 'Nan Chai', 'Yipeng Liu', 'Panhao Lai', 'Sihang Yuan', 'Zixin Su', 'Ge Zhang', 'Wangchunshu Zhou', 'Yantao Du', 'Wenhao Huang', 'Guang Shi'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2607.05155.jpg', 'data': {'categories': ['#optimization', '#agents', '#benchmark', '#open_source', '#dataset', '#science'], 'emoji': '🤖', 'ru': {'title': 'Законы масштабирования обучения агентов в реальной среде', 'desc': 'В статье анализируются 38 000 часов взаимодействия агентов с реальной окружающей средой на 134 различных задачах. Исследователи обнаружили, что производительность агентов следует логистическому закону масштабирования с точностью R² = 0,998, что позволяет предсказывать улучшение способностей. Кроме того, выявлено, что скорость обучения агентов удваивается примерно каждые три месяца на протяжении разных поколений моделей. Для этого создана база EdgeBench из 134 реальных задач с очень длинными горизонтами планирования и многоуровневой обратной связью, частично выложенная в открытый доступ.'}, 'en': {'title': 'Unlocking Agent Learning: Scaling Laws and Rapid Progress', 'desc': 'This paper investigates how agents learn from real-world interactions by analyzing 38,000 hours of data across 134 tasks. It identifies log-sigmoid scaling laws that describe how agent performance improves with increased data and computational resources. The study also reveals that the learning speed of agents doubles approximately every three months, indicating rapid advancements in their capabilities. The findings are based on a comprehensive evaluation framework called EdgeBench, which includes a variety of complex tasks designed to enhance our understanding of agent learning in real environments.'}, 'zh': {'title': '揭示代理学习的对数- sigmoid规律', 'desc': '这篇论文分析了38,000小时的真实世界代理交互，揭示了性能的对数- sigmoid缩放规律和学习速度的指数提升。研究表明，模型能力随着数据和计算资源的增加而可预测地提高。尽管在部署后从真实环境中学习的过程仍然不够理解，但我们首次发现环境学习的整体性能遵循对数- sigmoid缩放规律，精度达到R^2 = 0.998。通过EdgeBench，我们提供了134个真实世界任务的评估框架，以加速对代理如何从真实世界经验中学习的研究。'}}}, {'id': 'https://huggingface.co/papers/2607.05376', 'title': 'MV-Forcing: Long Multi-View Video Generation via 4D-Grounded Spatio-Temporal Self-Forcing', 'url': 'https://huggingface.co/papers/2607.05376', 'abstract': "Abstract A video diffusion framework generates long, multi-view consistent videos by combining temporal and view-wise autoregression through 4D geometric bridging and spatio-temporal distillation techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in video diffusion models have enabled either long single-view generation through temporal autoregression, or short multi-view synthesis through bidirectional attention. However, generating long, multi-view consistent videos of dynamic scenes remains unsolved. In this work, we present MV-Forcing, a framework that composes temporal and view-wise autoregression within a single diffusion model by introducing a 4D geometric bridge between sequentially generated views. Our key insight is that an autoregressive 3D reconstruction model naturally interfaces between autoregressively generated views. Given a completed source view, we reconstruct its 3D structure and render a geometric prior of the next target viewpoint, which the diffusion model refines into a high-quality video. To extend generation beyond the teacher's fixed temporal window, we introduce a joint denoising regime where both view slots are initialized from noise during training, enabling temporally unbounded generation. We distill the model via Distribution Matching Distillation with Spatio-Temporal Self-Forcing, closing the train-inference exposure bias gap for both temporal and view-sequential autoregression. Extensive experiments on both synthetic and real-world data demonstrate that MV-Forcing produces geometrically consistent multi-view videos of dynamic scenes at arbitrary lengths and viewpoint counts using a single few-step student model.", 'score': 4, 'issue_id': 2585, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '124ec50a116d5a2d', 'authors': ['Gal Fiebelman', 'Hadar Averbuch-Elor', 'Sagie Benaim'], 'affiliations': ['Cornell University', 'The Hebrew University of Jerusalem'], 'pdf_title_img': 'assets/pdf/title_img/2607.05376.jpg', 'data': {'categories': ['#multimodal', '#training', '#video', '#synthetic', '#3d', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Многоракурсные видео без границ через геометрическое мостостроение', 'desc': 'Статья описывает MV-Forcing — фреймворк на основе диффузионных моделей для генерации длинных видеороликов с несколькими ракурсами, которые остаются геометрически согласованными. Ключевая идея заключается в использовании 4D геометрического моста, который соединяет последовательно генерируемые виды через автореgressивную 3D реконструкцию. Модель применяет совместный режим денойзинга и специальную дистилляцию (Distribution Matching Distillation со Spatio-Temporal Self-Forcing), что позволяет преодолеть проблему exposure bias между обучением и инференсом. Эксперименты показывают, что MV-Forcing может генерировать видео произвольной длины с несколькими ракурсами динамических сцен, используя компактную student модель.'}, 'en': {'title': 'Generating Long, Consistent Multi-View Videos with MV-Forcing', 'desc': 'This paper introduces MV-Forcing, a novel video diffusion framework that generates long, consistent videos from multiple viewpoints. It combines temporal and view-wise autoregression using a 4D geometric bridge, allowing for the reconstruction of 3D structures from generated views. The framework addresses the challenge of creating long videos of dynamic scenes by employing a joint denoising regime that enables unbounded temporal generation. Through extensive experiments, the authors demonstrate that MV-Forcing effectively produces high-quality, geometrically consistent multi-view videos using a single, efficient model.'}, 'zh': {'title': '生成一致的多视角视频的新方法', 'desc': '这篇论文提出了一种视频扩散框架，能够生成长时间、多视角一致的视频。通过结合时间自回归和视角自回归，利用4D几何桥接和时空蒸馏技术，解决了动态场景下长时间多视角视频生成的问题。MV-Forcing框架通过引入3D重建模型，增强了视角间的自回归生成能力，从而提高了视频质量。实验结果表明，该方法在合成和真实数据上都能生成几何一致的多视角视频，且生成长度和视角数量不受限制。'}}}, {'id': 'https://huggingface.co/papers/2607.05196', 'title': 'Unified Audio Intelligence Without Regressing on Text Intelligence', 'url': 'https://huggingface.co/papers/2607.05196', 'abstract': 'Abstract A unified audio-text large language model is presented that integrates audio and text processing through a shared transformer decoder, achieving superior performance across multiple audio and speech tasks while maintaining strong text reasoning capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio intelligence involves understanding, reasoning about, and generating both audio and speech. In this work, we introduce Nemotron-Labs-Audex-30B-A3B (Audex), a unified audio-text LLM built on Nemotron-Cascade-2-30B-A3B, a strong text-only MoE LLM. Audex adopts a simple unified design with a single Transformer decoder: audio inputs are encoded and projected into the text embedding space, while text tokens and quantized audio output tokens are treated uniformly during generation. This architecture enables strong audio-text fusion, seamless multimodal generation, and compatibility with standard LLM training and inference infrastructure. For training, we meticulously curate audio-text datasets comprising 157.4B audio tokens and 320.5B text tokens. We apply multi-stage supervised training on these datasets, followed by text-only Cascade RL and multi-domain on-policy distillation. Audex delivers state-of-the-art audio understanding, speech recognition and translation, text-to-speech, audio generation, and speech-to-speech generation, while preserving very compelling reasoning, alignment, knowledge, long-context, and agentic capabilities of its text-only LLM backbone with marginal or no regression. We release the model checkpoints to facilitate open research.', 'score': 4, 'issue_id': 2587, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '81cd8d134b29dcd2', 'authors': ['Zhifeng Kong', 'Sang-gil Lee', 'Jaehyeon Kim', 'Boxin Wang', 'Zihan Liu', 'Sungwon Kim', 'Yang Chen', 'Arushi Goel', 'Rajarshi Roy', 'Wenliang Dai', 'Zhuolin Yang', 'Yangyi Chen', 'Dongfu Jiang', 'Sreyan Ghosh', 'Tuomas Rintamaki', 'Andrew Tao', 'Jonathan Raiman', 'Mohammad Shoeybi', 'Bryan Catanzaro', 'Wei Ping'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.05196.jpg', 'data': {'categories': ['#dataset', '#audio', '#multimodal', '#translation', '#open_source', '#training', '#alignment', '#long_context'], 'emoji': '🎵', 'ru': {'title': 'Единый трансформер для понимания и генерации аудио и текста', 'desc': 'В работе представлена унифицированная мультимодальная большая языковая модель Audex, которая интегрирует обработку аудио и текста через единый трансформер-декодер. Модель кодирует аудиовходы и проецирует их в пространство текстовых эмбеддингов, обрабатывая текстовые токены и квантованные аудиотокены единообразно при генерации. Для обучения использованы тщательно подобранные датасеты с 157,4 млрд аудиотокенов и 320,5 млрд текстовых токенов, применены многоэтапное контролируемое обучение и RL-фино-тюнинг. Модель достигает государственных результатов в распознавании речи, синтезе речи, аудиогенерации и речевом переводе, сохраняя при этом мощные способности рассуждения и знания исходной текстовой модели.'}, 'en': {'title': 'Unifying Audio and Text for Superior Multimodal AI', 'desc': 'This paper introduces Audex, a large language model that effectively combines audio and text processing using a shared transformer decoder. By encoding audio inputs into a text embedding space, Audex achieves impressive performance in various audio and speech tasks while retaining strong text reasoning abilities. The model is trained on a vast dataset of audio and text tokens, employing advanced training techniques to enhance its multimodal capabilities. Audex sets a new standard in audio understanding and generation, demonstrating seamless integration of audio and text functionalities.'}, 'zh': {'title': '音频与文本的完美融合', 'desc': '本文介绍了一种统一的音频-文本大型语言模型，名为Audex，能够同时处理音频和文本。该模型通过共享的Transformer解码器实现音频和文本的融合，展现出在多种音频和语音任务上的优越性能。Audex采用简单的统一设计，将音频输入编码并投影到文本嵌入空间，确保在生成过程中音频和文本的处理方式一致。通过精心策划的音频-文本数据集和多阶段的监督训练，Audex在音频理解、语音识别和翻译等任务上达到了最先进的水平。'}}}, {'id': 'https://huggingface.co/papers/2607.01764', 'title': 'Mastermind: Strategy-grounded Learning for Repository-Scale Vulnerability Reproduction', 'url': 'https://huggingface.co/papers/2607.01764', 'abstract': 'Abstract A dual-loop framework named Mastermind is introduced that separates strategy learning from task-specific experience to improve vulnerability reproduction capabilities in software engineering agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Repository-level vulnerability reproduction is a demanding software engineering (SE) task: an agent must inspect a codebase, infer the input grammar that reaches a vulnerable path, construct a proof-of-conceptv(PoC), and verify that the crash disappears on the patched build. Recent LLM agents can often execute these steps when the approach is correct, yet they still fail by choosing the wrong strategy. This paper argues that strategy, rather than the full action trajectory, is the right learning unit for such SE agents: it is compact enough to optimize, concrete enough to guide execution, and stable enough to store and reuse across attempts. We present Mastermind, a dual-loop framework that separates transferable strategy learning from task-specific experience. A trainable planner learns reusable vulnerability-reproduction strategies through SFT and milestone-based GRPO, while an experience loop maintains task-local strategy records that guide subsequent attempts. The planner is trained independently of the executor, allowing strategy learning to improve multiple frozen executors without modifying their action-generation capability. We evaluate Mastermind on CyberGym using 260 training tasks and 200 held-out evaluation tasks. With GPT-5.5 as the frozen executor, Mastermind achieves an 84.5% pass rate, outperforming open-book PoC context (60.0%), Best-of-8 sampling (63.0%), and iterative improvement (77.0%). The same planner also improves GPT-5.4 mini and GLM~5.1 from 45.0% and 58.5% to 60.0% and 71.0%. These results demonstrate that learning high-level strategies is an effective and transferable mechanism for improving repository-scale SE agents.', 'score': 4, 'issue_id': 2583, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '4b51db410895bce4', 'authors': ['Mingzhe Du', 'Luu Anh Tuan', 'Tianyi Wu', 'Renyang Liu', 'Zhijiang Guo', 'Dong Huang', 'See-Kiong Ng'], 'affiliations': ['Nanyang Technological University', 'National University of Singapore', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2607.01764.jpg', 'data': {'categories': ['#plp', '#reasoning', '#transfer_learning', '#rlhf', '#agents', '#optimization', '#training'], 'emoji': '🎯', 'ru': {'title': 'Разделение стратегии и опыта для эффективного воспроизведения уязвимостей', 'desc': 'Работа представляет Mastermind — фреймворк с двумя циклами обучения для агентов в программной инженерии, который отделяет обучение стратегии от задачеспецифичного опыта. Ключевая идея заключается в том, что стратегия воспроизведения уязвимостей является оптимальной единицей обучения — она компактнее полной траектории действий, но достаточно конкретна для руководства выполнением. Обучаемый планировщик изучает переиспользуемые стратегии через supervised fine-tuning и GRPO с контрольными точками, а цикл опыта поддерживает локальные записи стратегий для направления последующих попыток. Эксперименты на датасете CyberGym показывают, что метод достигает 84,5% успешности, превосходя базовые подходы, и демонстрирует трансферабельность стратегий между разными моделями-исполнителями.'}, 'en': {'title': 'Mastermind: Elevating Software Agents with Strategic Learning', 'desc': 'The paper introduces Mastermind, a dual-loop framework designed to enhance the ability of software engineering agents to reproduce vulnerabilities. It emphasizes the importance of learning strategies separately from task-specific experiences, allowing agents to optimize their approach to vulnerability reproduction. By using a trainable planner for strategy learning and an experience loop for task-specific records, Mastermind enables agents to improve their performance without altering their core action generation capabilities. The framework shows significant improvements in pass rates for vulnerability reproduction tasks, demonstrating the effectiveness of high-level strategy learning in software engineering.'}, 'zh': {'title': 'Mastermind：提升软件工程代理的策略学习能力', 'desc': '本文介绍了一种名为Mastermind的双循环框架，旨在将策略学习与特定任务经验分开，以提高软件工程代理的漏洞重现能力。该框架通过可训练的规划器学习可重用的漏洞重现策略，并通过经验循环维护任务本地的策略记录，从而指导后续尝试。研究表明，策略学习比完整的行动轨迹更适合软件工程代理，因为它更紧凑、具体且稳定。通过在CyberGym上进行评估，Mastermind在260个训练任务和200个评估任务中表现出色，显示出高层策略学习是提升软件工程代理的有效机制。'}}}, {'id': 'https://huggingface.co/papers/2607.01793', 'title': 'Safety Testing LLM Agents at Scale: From Risk Discovery to Evidence-Grounded Verification', 'url': 'https://huggingface.co/papers/2607.01793', 'abstract': 'Abstract Automated safety testing framework Vera uses a three-stage pipeline to identify and test safety risks in LLM agents through structured risk taxonomies, combinatorial case generation, and adaptive sandbox execution with evidence-based verification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents increasingly perform autonomous actions through external tools, leading to complex and evolving safety risks. However, existing safety testing targets expert-designed safety violations, and the corresponding outcomes are evaluated by hard-coded rules, making them costly to extend as agents evolve. To this end, we present Vera, an end-to-end automated safety testing framework that instantiates software engineering testing principles for non-deterministic agents through a three-stage, self-reinforcing pipeline. First, a literature-driven exploration continuously discovers and structures emerging risks into taxonomies of safety risks, attack methods, and tool execution environments. Second, combinatorial composition across taxonomy dimensions produces executable safety cases, each specifying a concrete safety goal, a programmatically constructed initial state, and a deterministic verification predicate grounded in observable artifacts. Third, adaptive execution runs heterogeneous agents in isolated sandboxes where a control agent steers multi-turn interaction based on runtime observations, while evidence-grounded verifiers judge outcomes from environment state and tool-call evidence rather than model self-report. We evaluate Vera on four production agent frameworks (OpenClaw, Hermes, Codex, Claude Code), revealing substantial safety weaknesses, with average attack success rates reaching 93.9\\% under multi-channel attacks; we also release Vera-Bench, comprising 1600 executable safety cases spanning 124 risk categories across three execution settings. These results indicate that modular, executable testing infrastructure is essential for rigorous and maintainable safety evaluation of rapidly evolving agentic systems at scale. The code is publicly available at https://github.com/Yunhao-Feng/Vera.', 'score': 3, 'issue_id': 2583, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '505249af88025d1a', 'authors': ['Yunhao Feng', 'Ruixiao Lin', 'Ming Wen', 'Qinqin He', 'Yanming Guo', 'Yifan Ding', 'Yutao Wu', 'Jialuo Chen', 'Zhuoer Xu', 'Xiaohu Du', 'Jianan Ma', 'Zixing Chen', 'Xingjun Ma', 'Yunhao Chen', 'Xinhao Deng'], 'affiliations': ['Alibaba Group', 'AntGroup', 'Deakin University', 'Fudan University', 'Hunan Institute of Advanced Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01793.jpg', 'data': {'categories': ['#open_source', '#dataset', '#security', '#benchmark', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Автоматизированное тестирование безопасности LLM-агентов через структурированные таксономии рисков', 'desc': 'Vera — это автоматизированная система тестирования безопасности LLM-агентов, которая использует трёхэтапный конвейер для выявления и проверки рисков. На первом этапе система непрерывно обнаруживает и структурирует риски в таксономии, на втором создаёт исполняемые тестовые сценарии путём комбинаторного перебора, а на третьем запускает агентов в изолированных песочницах с адаптивным управлением и проверкой результатов по объективным артефактам. Исследование показало критические уязвимости в популярных фреймворках агентов с процентом успешных атак до 93,9%, что подтверждает необходимость модульного и масштабируемого подхода к тестированию безопасности.'}, 'en': {'title': 'Vera: A Smart Safety Testing Framework for Evolving AI Agents', 'desc': 'The paper introduces Vera, an automated safety testing framework designed to identify and mitigate safety risks in large language model (LLM) agents. It employs a three-stage pipeline that includes risk taxonomy structuring, combinatorial case generation, and adaptive sandbox execution for testing. Unlike traditional methods that rely on hard-coded rules, Vera uses evidence-based verification to assess outcomes, making it more adaptable to evolving agents. The framework has been tested on various production agent frameworks, revealing significant safety vulnerabilities and demonstrating the need for a modular testing infrastructure in the field of AI safety.'}, 'zh': {'title': 'Vera：智能代理的安全测试新框架', 'desc': 'Vera是一个自动化安全测试框架，旨在通过三阶段管道识别和测试大型语言模型（LLM）代理的安全风险。该框架利用文献驱动的方法构建安全风险分类法，并生成可执行的安全案例，以确保对代理行为的有效验证。Vera的自适应执行在隔离的沙箱中运行异构代理，通过控制代理的多轮交互来评估安全性。我们的评估显示，Vera能够揭示现有代理框架中的重大安全弱点，强调了模块化可执行测试基础设施在快速发展的智能系统中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2602.11688', 'title': 'GORGO: Online Tuning for Cross-Region Network-Aware LLM Serving', 'url': 'https://huggingface.co/papers/2602.11688', 'abstract': "Abstract GORGO is a proxy architecture that optimizes LLM inference load balancing by jointly considering network latency, prefill cost, and queueing delay through evolutionary strategy tuning on a new synthetic dataset.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Increasingly, LLM inference services proxy client requests to engine replicas distributed globally. Load-balancing policies must jointly account for factors including KV-cache locality, replica load, and variable network latency when optimizing for metrics like latency and TTFT. However, existing systems only evaluate a subset of these factors in their cost model, leading to uneven concentrations of load and KV-cache across replicas. We present GORGO, a proxy architecture that holistically factors network latency, prefill cost, and queueing delay using tunable parameters. Since open-source chat datasets such as LMSYS-Chat1M and WildChat-4.8M lack long-context, high prefix-reuse data, we release a synthetic dataset, ART-Chat-2.5M, from long-context production metadata. On a tuning window from ART-Chat-2.5M, evolutionary strategies guide the GORGO policy's parameters to directly optimize p95 TTFT. During held-out evaluation windows, we fix the parameter values learned from tuning and improve p95 TTFT by 6.9-15.5% and p95 end-to-end (E2E) latency by 14.3-30.9% over baseline load-balancing policies such as simple session affinity and prefix-cache. The code and ART-Chat-2.5M dataset can be found at https://github.com/Arcadia-Research-Team/GORGO.", 'score': 3, 'issue_id': 2584, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '6e32a50432327043', 'authors': ['Alessio Ricci Toniolo', 'Rome Thorstenson', 'Abinaya Dinesh'], 'affiliations': ['ART', 'Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2602.11688.jpg', 'data': {'categories': ['#optimization', '#open_source', '#inference', '#synthetic', '#dataset'], 'emoji': '⚖️', 'ru': {'title': 'Умная балансировка нагрузки через эволюционные стратегии', 'desc': 'GORGO — это архитектура прокси-сервера для оптимизации балансировки нагрузки при инференсе больших языковых моделей, которая одновременно учитывает сетевую задержку, стоимость prefill-этапа и очередь запросов. Авторы предлагают использовать эволюционные стратегии для настройки параметров политики балансировки на новом синтетическом датасете ART-Chat-2.5M, созданном из реальных данных с длинным контекстом. Система достигает улучшения метрики p95 TTFT на 6.9-15.5% и общей задержки на 14.3-30.9% по сравнению с базовыми методами балансировки. Публикуется открытый датасет и исходный код системы для применения в распределённых сервисах инференса.'}, 'en': {'title': 'Optimizing LLM Inference with GORGO: A Holistic Approach to Load Balancing', 'desc': 'GORGO is a new proxy architecture designed to improve the efficiency of large language model (LLM) inference by optimizing load balancing. It takes into account multiple factors such as network latency, prefill costs, and queueing delays, using evolutionary strategies to fine-tune its parameters. By addressing the limitations of existing systems that only consider a few factors, GORGO achieves better distribution of load and cache usage across replicas. The results show significant improvements in metrics like p95 TTFT and end-to-end latency compared to traditional load-balancing methods.'}, 'zh': {'title': 'GORGO：优化LLM推理的负载均衡新策略', 'desc': 'GORGO是一种代理架构，旨在通过共同考虑网络延迟、预填充成本和排队延迟来优化大规模语言模型（LLM）推理的负载均衡。该架构使用进化策略调优在一个新的合成数据集上进行训练，以提高系统的性能。现有的负载均衡策略往往只考虑部分因素，导致负载和KV缓存的不均匀分布。通过引入GORGO，研究人员能够在保持参数固定的情况下，显著提高95百分位的总推理时间（TTFT）和端到端延迟。'}}}, {'id': 'https://huggingface.co/papers/2607.02881', 'title': 'PraMem: Practice-derived Experiential Memory for Long-horizon Behavior Prediction', 'url': 'https://huggingface.co/papers/2607.02881', 'abstract': "Abstract Long-horizon behavior prediction is enhanced through PraMem, which transforms lengthy historical sequences into experiential memory for improved accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-horizon behavior prediction aims to infer a user's next action based on a lengthy historical sequence, playing a crucial role in artificial intelligence field. The rise of large language models (LLMs) offers a promising direction for sequential behavior prediction, yet LLMs struggle with latent behavioral pattern induction and model-intrinsic cognitive biases when tackling long-horizon behavior prediction. Prior memory management methods follow a context-compression paradigm that attempts to address this task by alleviating the historical sequence burden, yet fail to resolve the core challenges. In this paper, we advocate a paradigm shift that reframes the lengthy historical sequence from a burden into a valuable resource to be exploited, and accordingly propose PraMem, which conducts beforehand practice over the lengthy historical sequence to build an experiential memory, thereby serving as the assisted input for accurate long-horizon behavior prediction. Extensive experiments across diverse tasks demonstrate that PraMem achieves superior performance than prior methods, and more in-depth analyses provide valuable insights into the mechanism and evolution of the experiential memory. Code: https://github.com/icip-cas/PraMem.", 'score': 2, 'issue_id': 2583, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '87b59f9dd8112474', 'authors': ['Zhuoqun Li', 'Boxi Cao', 'Jiawei Chen', 'Hanshu Zhou', 'Ruoxi Xu', 'Guiping Jiang', 'Ruotong Pan', 'Tingting Gao', 'Han Li', 'Xiangyu Wu', 'Hongyu Lin', 'Yaojie Lu', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Fudan University', 'Kuaishou Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.02881.jpg', 'data': {'categories': ['#open_source', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Из бремени в ресурс: опытная память для предсказания долгосрочного поведения', 'desc': 'В статье предлагается метод PraMem для улучшения предсказания поведения пользователя на длительных горизонтах времени. Вместо сжатия исторической последовательности данных, авторы преобразуют её в опытную память через предварительное обучение на полной истории. Метод решает проблемы больших языковых моделей при работе с долгосрочными паттернами поведения и внутренними смещениями модели. Экспериментальные результаты показывают, что PraMem превосходит предыдущие подходы и обеспечивает более точные предсказания действий пользователя.'}, 'en': {'title': 'Transforming History into Memory for Better Predictions', 'desc': 'This paper introduces PraMem, a novel approach to enhance long-horizon behavior prediction by transforming lengthy historical sequences into experiential memory. Traditional methods often compress historical data, which can overlook important behavioral patterns and lead to cognitive biases in predictions. PraMem shifts this perspective by treating historical sequences as valuable resources, allowing for better utilization in predicting future actions. Experimental results show that PraMem outperforms existing methods, providing deeper insights into how experiential memory evolves and contributes to improved accuracy in predictions.'}, 'zh': {'title': '将历史序列转化为经验记忆，提升行为预测准确性', 'desc': '本文提出了一种新的方法PraMem，用于改善长时间行为预测的准确性。通过将冗长的历史序列转化为经验记忆，PraMem能够更有效地利用历史数据。与传统的上下文压缩方法不同，PraMem将历史序列视为一种宝贵资源，从而提升了模型的预测能力。实验结果表明，PraMem在多种任务中表现优于以往的方法，并提供了对经验记忆机制的深入分析。'}}}, {'id': 'https://huggingface.co/papers/2607.03296', 'title': 'Taste-aware music retrieval from audio embeddings', 'url': 'https://huggingface.co/papers/2607.03296', 'abstract': "Abstract Audio encoders from HEAR families are evaluated for taste prediction, with gated late-fusion showing superior rank correlation and the best models achieving human-level accuracy on held-out music.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Crossmodal correspondences between sound and taste are well established in psychology and neuroscience, but largely absent from content-based multimedia retrieval. We formalise taste-from-audio prediction as a content-based music information retrieval benchmark over a perceptually validated multi-source corpus, comparing ten frozen audio encoders from the four HEAR families under a shared multi-task regression head, with gated late-fusion as a configurable variant. In order to assess the effectiveness of the models, we compute absolute error and rank correlation. The strongest systems predict the five tastes within a macro RMSE of 0.134; on held-out real music their error is less than half a single rater's deviation from the consensus (RMSE 0.13 vs. 0.28), so the model tracks the group consensus more closely than an average human rater, and well below the previous state of the art baseline (0.219). On absolute error the encoders are statistically flat, with a single VGGish matching the best fusion, but gated late-fusion's advantage is confined to rank correlation (macro Pearson r 0.724 vs. 0.666). Operationalised as a content-based retrieval index, the predicted taste space ranks a 309-item pool far more faithfully than a CLAP-text baseline, which sits at chance; ridge probes and an audio-bandstop knockout read the strongest representations against documented sound-taste correspondences.", 'score': 2, 'issue_id': 2586, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'a2e6c28a30747397', 'authors': ['Matteo Spanio', 'Antonio Rodà'], 'affiliations': ['University of Padua'], 'pdf_title_img': 'assets/pdf/title_img/2607.03296.jpg', 'data': {'categories': ['#benchmark', '#audio', '#multimodal'], 'emoji': '🎵', 'ru': {'title': 'Предсказание вкуса из звука: достижение человеческого уровня с помощью аудиоэнкодеров', 'desc': 'В работе исследуется предсказание вкусовых характеристик на основе аудиозаписей с помощью замороженных аудиоэнкодеров из семейств HEAR. Авторы формализуют задачу как benchmark для музыкальной информационной системы поиска, сравнивая десять различных энкодеров под единой многозадачной регрессионной головкой с применением гated late-fusion как конфигурируемого варианта. Лучшие модели достигают человеческого уровня точности на тестовых данных, предсказывая пять вкусов с RMSE 0.13, что лучше среднего человеческого оценивателя (RMSE 0.28) и предыдущего state-of-the-art (0.219). Метод демонстрирует превосходство в ранговой корреляции (Pearson r 0.724), а полученное пространство вкусов показывает лучшую способность к контентному поиску в музыкальных индексах.'}, 'en': {'title': 'Predicting Taste from Music: A New Benchmark in Audio Analysis', 'desc': 'This paper evaluates audio encoders from the HEAR families for predicting taste based on music. It introduces a benchmark for content-based music information retrieval, focusing on how well audio can predict taste preferences. The study finds that gated late-fusion methods outperform other techniques in rank correlation, achieving human-level accuracy in taste prediction. The results indicate that the best models can predict tastes with a low error rate, outperforming average human raters and previous benchmarks.'}, 'zh': {'title': '音频编码器助力味觉预测的突破', 'desc': '本研究评估了HEAR系列的音频编码器在味觉预测方面的表现，采用了门控晚融合方法，显示出优越的排名相关性。我们将音频到味觉的预测形式化为一个基于内容的音乐信息检索基准，比较了来自四个HEAR系列的十个冻结音频编码器。最强的模型在宏观均方根误差（RMSE）为0.134的情况下，能够在真实音乐上实现接近人类水平的准确性。研究结果表明，门控晚融合在排名相关性方面具有优势，能够更准确地反映群体共识。'}}}, {'id': 'https://huggingface.co/papers/2606.28393', 'title': 'Transition-Aware best-of-N sampling for Longitudinal Chest X-ray Reports', 'url': 'https://huggingface.co/papers/2606.28393', 'abstract': 'Abstract A novel training-free sampling method for chest X-ray report generation that leverages longitudinal patient history by encoding changes between prior and current examinations through set-to-set distance metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In longitudinal clinical practice, every chest X-ray is read in the context of the patients prior exam, and much of what the radiologist communicates is the change from one visit to the next. To the best of our knowledge, we present the first training-free best-of-N sampling scheme for pre-trained chest X-ray report generators that is explicitly aware of this longitudinal prior to current transition. We call it transition-aware best-of-N sampling, each report is split into sentences and embedded into an unordered set in Rd; each (prior, current) pair is reduced to a fixed-dim directional vector via a set-to-set distance designed to encode the change between the two sets; and candidates are scored by cosine distance from their candidate transition vector to a cached bank of ground-truth training transition vectors, aggregated as min or kNN. We instantiate the framework with four directional set distances (mean-shift, novelty residual, directed-Hausdorff anchor, and cost-weighted optimal transport) and evaluate on a multi-visit AP-PA cohort, running inference under three prompts on three vision-language generators. Transition-aware best-of-N outperforms random selection across the board, with the largest relative gains on the Impression section.', 'score': 2, 'issue_id': 2586, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '5e96cf1c10b4c225', 'authors': ['Halil Ibrahim Gulluk', 'Max Van Puyvelde', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Department of Biomedical Data Science, Stanford University School of Medicine', 'Department of Electrical Engineering, Stanford University', 'Department of Mathematical Modelling, Statistics & Bioinformatics, Ghent University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28393.jpg', 'data': {'categories': ['#inference', '#multimodal', '#optimization', '#healthcare', '#science'], 'emoji': '🫁', 'ru': {'title': 'Учитываем прошлое: осознанная выборка отчётов с историей пациента', 'desc': 'Статья представляет новый метод генерации отчётов по рентгеновским снимкам грудной клетки, который не требует переобучения модели и учитывает историю пациента. Методология основана на кодировании изменений между предыдущим и текущим обследованием с использованием метрик расстояния между множествами предложений. Авторы предлагают схему выборки best-of-N, где каждый отчёт представляется как неупорядоченное множество векторов, а переход между обследованиями кодируется направленным вектором. Эксперименты показывают, что предложенный подход превосходит случайную выборку, особенно улучшая качество секции Impression.'}, 'en': {'title': 'Revolutionizing Chest X-Ray Reports with Transition-Aware Sampling', 'desc': "This paper introduces a new method for generating chest X-ray reports without the need for additional training. It focuses on understanding the changes in a patient's condition by comparing current and previous X-ray examinations. The method uses a unique sampling technique called transition-aware best-of-N sampling, which evaluates report candidates based on their similarity to known changes in patient history. By employing set-to-set distance metrics, the approach effectively captures the nuances of longitudinal data, leading to improved report generation performance."}, 'zh': {'title': '过渡感知的最佳N采样方法', 'desc': '这篇论文提出了一种新颖的无训练采样方法，用于生成胸部X光报告，利用患者的纵向历史记录。该方法通过编码先前和当前检查之间的变化，使用集合到集合的距离度量来实现。我们称之为“过渡感知的最佳N采样”，每个报告被分割成句子并嵌入到无序集合中。实验结果表明，该方法在生成报告时优于随机选择，尤其在印象部分取得了显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2607.05392', 'title': 'SynCity 3000: Bootstrapping Scene-Scale 3D Diffusion', 'url': 'https://huggingface.co/papers/2607.05392', 'abstract': 'Abstract SynCity 3000 generates large, coherent 3D scenes by adapting image-to-3D generators as convolutional operators through fine-tuning on synthetic scene data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present SynCity 3000, a framework for generating 3D scenes that are globally coherent while enabling fine-grained layout control. Building on the ability of current image-to-3D generators to produce complex 3D assets from a single image, we extend this capability to the scale of entire scenes by adapting the generator to be applicable as a convolutional operator. We achieve this by fine-tuning the model on scene-like data generated by a new synthetic data engine, which we propose to address the scarcity of 3D scene data for training. The convolutional generator is then applied to a dimetric image of the entire scene, generated from the user prompt, resulting in 3D scenes of arbitrary size and complexity. Across diverse prompts and layouts, SynCity 3000 produces large, coherent, and detailed scenes, addressing the shortcomings of prior approaches to 3D scene generation.', 'score': 1, 'issue_id': 2587, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '24608141779fe8e5', 'authors': ['Paul Engstler', 'Iro Laina', 'Christian Rupprecht', 'Andrea Vedaldi'], 'affiliations': ['Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2607.05392.jpg', 'data': {'categories': ['#open_source', '#synthetic'], 'emoji': '🏙️', 'ru': {'title': 'Свёрточная генерация 3D-сцен через синтетическое дообучение', 'desc': 'SynCity 3000 — это фреймворк для генерации больших трёхмерных сцен с глобальной согласованностью и точным контролем компоновки. Авторы адаптировали существующие генераторы изображение-в-3D как свёрточные операторы путём дообучения на синтетических данных сцен. Для решения проблемы дефицита тренировочных данных разработан новый синтетический генератор, создающий сценоподобные данные. Итоговый свёрточный генератор применяется к диметрическому изображению сцены, создавая трёхмерные объекты произвольного размера и сложности на основе пользовательских описаний.'}, 'en': {'title': 'Transforming Images into Vast 3D Worlds!', 'desc': 'SynCity 3000 is a novel framework that generates large and coherent 3D scenes by fine-tuning image-to-3D generators to work as convolutional operators. It leverages a synthetic data engine to create scene-like data, which helps overcome the lack of available 3D scene datasets for training. By adapting the generator, it can produce complex 3D assets from a single image and apply this capability to entire scenes. The result is a system that can generate detailed and coherent 3D environments based on user prompts, improving upon previous methods in 3D scene generation.'}, 'zh': {'title': '生成大型连贯的3D场景的创新框架', 'desc': 'SynCity 3000 是一个生成大型、连贯的 3D 场景的框架。它通过对合成场景数据进行微调，将图像到 3D 生成器适配为卷积操作符。该框架能够在用户提示下，从单一图像生成复杂的 3D 场景，并且支持精细的布局控制。通过使用新的合成数据引擎，SynCity 3000 解决了 3D 场景数据稀缺的问题，生成的场景具有任意大小和复杂性。'}}}, {'id': 'https://huggingface.co/papers/2607.05390', 'title': 'Deform360: A Massive Multi-view Visuotactile Dataset for Deformable World Models', 'url': 'https://huggingface.co/papers/2607.05390', 'abstract': 'Abstract A large-scale visuotactile dataset called Deform360 is introduced to study deformable object dynamics, enabling comparison between 2D video and 3D particle world models for robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Predicting object dynamics (i.e., world modeling) is a fundamental challenge for robotic manipulation, and modeling deformable objects presents a particularly difficult case due to their high-dimensional state spaces and complex material properties. While current world models approach this through two distinct paradigms: learning the dynamics over the 2D pixel space or more explicit 3D geometric space. A systematic understanding of their relative strengths and limitations remains elusive due to the lack of diverse, large-scale real-world data. To address this, we present Deform360, a large-scale visuotactile dataset featuring 198 daily-life objects, 1,980 interaction sequences, and over 215 hours of observations from 41 surround-view cameras and bimanual tactile grippers to capture both global motion and contact-induced local deformations. Leveraging a novel markerless visuotactile 3D tracking pipeline to extract dense geometry and motion, we systematically evaluate current state-of-the-art world models, comparing 2D video models against 3D particle models. Finally, we provide a preliminary demonstration indicating the real-world applicability of our dataset by performing robot planning tasks on deformable objects. Our analysis reveals key insights into the trade-offs between structural priors and scalability, providing a solid benchmark for future research in generalizable deformable object-centric world modeling. Project website: https://deform360.lhy.xyz', 'score': 1, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'ea2f0b8a60fbfad3', 'authors': ['Hongyu Li', 'Wanjia Fu', 'Xiaoyan Cong', 'Zekun Li', 'Binghao Huang', 'Hanxiao Jiang', 'Xintong He', 'Yiqing Liang', 'Rao Fu', 'Tao Lu', 'Srinath Sridhar', 'Kevin A. Smith', 'George Konidaris', 'Yunzhu Li'], 'affiliations': ['Brown University', 'Columbia University', 'Massachusetts Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.05390.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#open_source', '#robotics', '#synthetic', '#dataset', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Сравнение 2D и 3D world models для манипуляции деформируемыми объектами', 'desc': 'В работе представлен набор данных Deform360 для изучения динамики деформируемых объектов, содержащий наблюдения от 41 камеры и тактильных датчиков с 198 объектами в 1980 последовательностях взаимодействий. Авторы сравнивают два подхода к моделированию мира: предсказание динамики в 2D пиксельном пространстве и в явном 3D геометрическом пространстве с использованием частичных моделей. Разработана новая система маркерлесс отслеживания для извлечения плотной геометрии и движения объектов. Исследование выявляет компромиссы между структурными предположениями и масштабируемостью, предоставляя эталонный набор данных для развития обобщённых world models деформируемых объектов.'}, 'en': {'title': 'Deform360: Advancing Robotic Manipulation with Visuotactile Insights', 'desc': 'The paper introduces Deform360, a large-scale visuotactile dataset designed to enhance the understanding of deformable object dynamics in robotic manipulation. It captures extensive data from 198 everyday objects through 1,980 interaction sequences, utilizing 41 cameras and bimanual tactile grippers to observe both global movements and local deformations. The study compares the effectiveness of 2D video models and 3D particle models in predicting object dynamics, addressing the challenges posed by high-dimensional state spaces. By providing a comprehensive benchmark, the dataset aims to facilitate future research in developing more effective world models for handling deformable objects in real-world scenarios.'}, 'zh': {'title': '探索可变形物体动态的新视角', 'desc': '本文介绍了一个名为Deform360的大规模视觉触觉数据集，旨在研究可变形物体的动态特性。该数据集包含198种日常物品、1980个交互序列，以及来自41个全景摄像头和双手触觉抓取器的215小时观察数据。通过比较2D视频模型和3D粒子模型，本文系统评估了当前最先进的世界模型，并揭示了结构先验与可扩展性之间的权衡。最终，我们展示了该数据集在可变形物体机器人规划任务中的实际应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.03748', 'title': 'Bridging Interleaved Multi-Modal Reasoning as a Unified Decision Process', 'url': 'https://huggingface.co/papers/2607.03748', 'abstract': 'Abstract BRAID framework enables unified multi-modal reasoning by casting text-image interaction as a Markov decision process, allowing joint optimization through reinforcement learning with vision-language model guidance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified multi-modal models (UMMs) have shown promising interleaved text-image reasoning capabilities, yet effectively optimizing such multi-turn generation via reinforcement learning (RL) remains an open challenge. Existing approaches apply RL exclusively to text steps, relegating image generation to supervised surrogates, preventing policy gradients from propagating through the full interleaved trajectory across heterogeneous modalities. This leaves the potential of RL for UMMs largely untapped. In the paper, we introduce BRAID (Bridging inteRleAved multI-modal reasoning as a unified Decision process), a simple framework that casts multi-turn text-image-text reasoning as a unified Markov decision process (MDP), enabling joint optimization of textual and visual generation via a single, principled RL objective. BRAID computes a shared trajectory-level advantage and propagates it coherently into both text tokens and image denoising paths, each optimized through its modality-native policy gradient mechanism. To further address long-horizon credit assignment, BRAID employs a vision-language model (VLM) judge that scores each intermediate image on its reasoning utility, supplying dense turn-level feedback to sharpen learning at critical visual branches. Experiments on spatial reasoning and visual perception benchmarks show that BRAID consistently outperforms various baselines, confirming that a unified MDP formulation with vision-thinking guidance is essential for effective multi-modal reasoning.', 'score': 1, 'issue_id': 2587, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'b47414d647b9bb5f', 'authors': ['Zican Hu', 'Xuyang Hu', 'Yiming Liu', 'Zuwei Long', 'Wei Liu', 'Yunzhuo Hao', 'Jiawei Gu', 'Linjie Li', 'Yu Cheng', 'Zhenhong Sun', 'Weibo Gu', 'Xing Sun', 'Zhi Wang'], 'affiliations': ['Australian National University', 'Nanjing University', 'Shanghai AI Laboratory', 'Tencent Youtu Lab', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Washington', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.03748.jpg', 'data': {'categories': ['#rl', '#multimodal', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Единый марковский процесс для совместной оптимизации текста и изображений', 'desc': 'Статья представляет BRAID — фреймворк для единой оптимизации многомодальных моделей, который формулирует взаимодействие текста и изображений как марковский процесс принятия решений. Авторы решают проблему применения reinforcement learning одновременно к генерации текста и изображений, позволяя градиентам политики распространяться через всю траекторию с перемешанными модальностями. Фреймворк вычисляет общее преимущество на уровне траектории и применяет его к текстовым токенам и процессам денойзинга изображений через модально-специфичные механизмы градиентов. Для улучшения распределения кредита на длинных горизонтах используется vision-language модель в качестве судьи, обеспечивающей плотную обратную связь для оптимизации визуальных ветвлений.'}, 'en': {'title': 'BRAID: Unifying Text and Image Reasoning with Reinforcement Learning', 'desc': 'The BRAID framework introduces a new way to improve how machines understand and generate text and images together by treating their interactions as a Markov decision process (MDP). This approach allows for better optimization of both text and image outputs using reinforcement learning (RL), which has been challenging in previous methods. Unlike earlier techniques that only applied RL to text, BRAID enables a joint optimization process that enhances learning across both modalities. By incorporating a vision-language model to evaluate images during the reasoning process, BRAID provides valuable feedback that helps improve the overall performance in multi-modal tasks.'}, 'zh': {'title': 'BRAID：统一多模态推理的新方法', 'desc': 'BRAID框架通过将文本-图像交互视为马尔可夫决策过程，实现了统一的多模态推理。该方法允许通过强化学习与视觉语言模型的指导进行联合优化，解决了多轮生成中的挑战。BRAID计算共享的轨迹级优势，并将其一致地传播到文本和图像生成中，优化各自的策略梯度机制。实验结果表明，BRAID在空间推理和视觉感知基准测试中表现优于多种基线，证明了统一的MDP框架对于有效的多模态推理至关重要。'}}}, {'id': 'https://huggingface.co/papers/2607.02998', 'title': 'CONFLUX: A Latent Diusion Model for 3D Chest-CT Synthesis with RL Post-Training', 'url': 'https://huggingface.co/papers/2607.02998', 'abstract': 'Abstract A 3D latent diffusion model for chest CT generation that achieves high-fidelity results while enabling control over clinical attributes through metadata conditioning and reinforcement learning refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Controllable generative models of 3D medical images can synthesize volumes with specified clinical attributes, but this demands samples that are simultaneously high-fidelity, natively 3D, and faithful to the requested conditioning. We present CONFLUX, a latent diffusion model for chest computed tomography (CT): a 3D variational autoencoder compresses each volume, and a rectified-flow transformer generates in the latent space. Generation is conditioned on structured radiological metadata (18 abnormality findings, sex, age, and reconstruction kernel) through adaptive layer normalization. The model leads strong volumetric baselines on tri-planar Frechet distance (FID 32.3 vs. 74.6 for MAISI) while exposing direct control over clinical attributes. To strengthen that control we add an online reinforcement-learning post-training stage (group-relative policy optimization) that rewards how reliably a classifier recovers the requested findings from each generated volume. Judged by a separate, independent classifier, post-training removes 47% of the shortfall relative to real-scan reliability. We release the model and a ~200k synthetic chest-CT dataset with conditioning metadata spanning a wide variety of clinical findings.', 'score': 1, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '6296538970255e3e', 'authors': ['Max Van Puyvelde', 'Halil Ibrahim Gulluk', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Department of Biomedical Data Science, Stanford University School of Medicine', 'Department of Electrical Engineering, Stanford University', 'Department of Mathematical Modelling, Statistics & Bioinformatics, Ghent University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02998.jpg', 'data': {'categories': ['#healthcare', '#training', '#multimodal', '#open_source', '#synthetic', '#rl', '#dataset', '#3d', '#diffusion'], 'emoji': '🫁', 'ru': {'title': 'Управляемая генерация реалистичных 3D снимков грудной клетки с заданными клиническими признаками', 'desc': 'Авторы представляют CONFLUX — модель скрытой диффузии для генерации трёхмерных компьютерных томограмм грудной клетки. Модель использует вариационный автокодировщик для сжатия объёмов и трансформер на основе спрямлённых потоков для генерации в скрытом пространстве. Кондиционирование осуществляется через метаданные радиологических исследований (аномалии, пол, возраст, параметры реконструкции) с помощью адаптивной нормализации слоёв. Для улучшения контроля над клиническими атрибутами применяется этап постобучения с подкреплением (оптимизация политики на основе относительных групповых вознаграждений), который повышает надёжность восстановления запрашиваемых находок в сгенерированных томограммах на 47%.'}, 'en': {'title': 'CONFLUX: High-Fidelity 3D Chest CT Generation with Clinical Control', 'desc': "The paper introduces CONFLUX, a 3D latent diffusion model designed for generating high-quality chest CT images. It utilizes a variational autoencoder to compress 3D volumes and a transformer to generate images in the latent space, allowing for control over clinical attributes through metadata conditioning. The model achieves impressive results, significantly improving the fidelity of generated images while ensuring they align with specified clinical conditions. Additionally, an online reinforcement learning stage enhances the model's ability to produce reliable outputs that meet clinical expectations."}, 'zh': {'title': '高保真胸部CT生成与临床属性控制的创新模型', 'desc': '本文介绍了一种用于胸部CT生成的3D潜在扩散模型CONFLUX。该模型能够生成高保真度的医学图像，并通过元数据调节实现对临床属性的控制。使用3D变分自编码器压缩每个体积，并通过修正流变换器在潜在空间中生成图像。通过在线强化学习后训练阶段，模型显著提高了生成图像的临床属性可靠性。'}}}, {'id': 'https://huggingface.co/papers/2607.04410', 'title': 'AI Wizards at EXIST 2026: Hierarchical Soft-Label Learning for Multimodal Sexism Identification in Memes', 'url': 'https://huggingface.co/papers/2607.04410', 'abstract': 'Abstract A multimodal sexism identification system for memes uses hierarchical conditional soft-label prediction with vision-language embeddings and a lightweight Gated MLP trained via KL divergence and uncertainty weighting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present the AI Wizards submission to EXIST 2026 for multimodal sexism identification in memes. The task is composed of three, increasingly harder subtasks. We model them hierarchically as conditional soft-label prediction over empirical annotator distributions. Our system maps fixed Gemini Embedding 2 vision-language representations through a lightweight Gated MLP trained with KL divergence and homoscedastic uncertainty weighting. Our submissions ranked first on Task 2.3 and fourth on Tasks 2.1 and 2.2 on the official Soft-Soft leaderboards. The code is available at https://github.com/NLP-AI-Wizards/EXIST-2026', 'score': 0, 'issue_id': 2585, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'cbe6ae286e46a801', 'authors': ['Matteo Fasulo', 'Antonio Gravina', 'Luca Tedeschini', 'Luca Babboni'], 'affiliations': ['Everest Systems GmbH', 'Swiss Data Science Center, ETH Zürich', 'Villanova.ai S.P.A'], 'pdf_title_img': 'assets/pdf/title_img/2607.04410.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#benchmark', '#small_models'], 'emoji': '🔍', 'ru': {'title': 'Иерархическое предсказание мягких меток для детекции сексизма в мультимодальных данных', 'desc': 'В работе предлагается система для выявления сексизма в мемах с использованием многомодальных данных. Авторы применяют иерархический подход с предсказанием мягких меток, условно зависящих от распределения разметок аннотаторов. Система использует предобученные vision-language эмбеддинги от Gemini Embedding 2 и тренирует лёгкую нейросеть Gated MLP с помощью дивергенции Кульбака-Лейблера и взвешивания по неопределённости. Метод показал конкурентные результаты на соревновании EXIST 2026, заняв первое место на одной из задач.'}, 'en': {'title': 'Identifying Sexism in Memes with Multimodal AI', 'desc': "This paper presents a system designed to identify sexism in memes by analyzing both visual and textual elements. It employs a hierarchical approach using conditional soft-label prediction, which allows the model to learn from the distribution of human annotators' labels. The system utilizes vision-language embeddings from Gemini Embedding 2 and is powered by a lightweight Gated MLP that is trained using KL divergence and uncertainty weighting techniques. The results show strong performance, ranking first in one task and fourth in two others on the official leaderboards."}, 'zh': {'title': '多模态迷因性别歧视识别的创新系统', 'desc': '这篇论文介绍了一种多模态性别歧视识别系统，专门用于分析网络迷因。该系统采用分层条件软标签预测，结合视觉-语言嵌入和轻量级的门控多层感知机（Gated MLP），通过KL散度和不确定性加权进行训练。我们将任务分为三个逐渐增加难度的子任务，并通过经验标注者分布进行建模。我们的系统在官方排行榜上，任务2.3获得第一名，任务2.1和2.2分别获得第四名。'}}}, {'id': 'https://huggingface.co/papers/2607.04064', 'title': 'Speaker-Disentangled Chunk-Wise Regression for Syllabic Tokenization', 'url': 'https://huggingface.co/papers/2607.04064', 'abstract': 'Abstract A speaker-disentangled syllabic tokenizer regresses perturbed student representations toward clean teacher targets to improve syllable boundary detection and speech language modeling performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unsupervised syllabic tokenization aims to learn discrete syllabic tokens that capture latent linguistic content-related structure from raw speech. Recent syllabic tokenization methods employ teacher-student distillation of the pretrained HuBERT to organize latent speech frame representations into syllabic segments. However, when trained with an utterance-level cross-entropy objective, the model predicts speaker identity rather than linguistic content, thereby compromising the purity of syllabic tokens. To address this problem, we propose a speaker-disentangled syllabic tokenizer that regresses speaker-perturbed student representations toward clean teacher targets within fixed-length chunks. Experimental results demonstrate that our proposed method achieves state-of-the-art performance in syllable boundary detection and syllabic segment clustering. Moreover, a speech language model trained on our syllabic tokens achieves a 7% relative improvement in syntactic and semantic understanding over the phone-level SpiRit-LM.', 'score': 0, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'cd80f24e567431e8', 'authors': ['Ryota Komatsu', 'Kota Kawakita', 'Takuma Okamoto', 'Takahiro Shinozaki'], 'affiliations': ['Institute of Science Tokyo', 'National Institute of Information and Communications Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.04064.jpg', 'data': {'categories': ['#training', '#audio'], 'emoji': '🎙️', 'ru': {'title': 'Разделение информации говорящего для чистой слоговой токенизации речи', 'desc': 'В статье предложен метод обучения дискретных слоговых токенов из сырой речи с использованием дистилляции знаний между учителем и студентом. Основная проблема предыдущих подходов заключалась в том, что модель предсказывала характеристики говорящего вместо лингвистического содержания, что снижало качество токенизации. Авторы решают эту задачу путем регрессии возмущенных представлений студента к чистым целевым представлениям учителя с явным разделением информации о говорящем. Предложенный метод достигает лучших результатов в обнаружении границ слогов и показывает значительное улучшение производительности языковой модели речи.'}, 'en': {'title': 'Disentangling Speaker Identity for Better Syllabic Tokenization', 'desc': 'This paper introduces a new method for syllabic tokenization in speech processing, focusing on separating speaker identity from linguistic content. The proposed speaker-disentangled syllabic tokenizer uses a teacher-student model to refine student representations by aligning them with clean teacher targets, improving the accuracy of syllable boundary detection. By addressing the issue of speaker identity interference, the model enhances the quality of the generated syllabic tokens. Experimental results show that this approach not only excels in syllable boundary detection but also boosts the performance of a speech language model significantly.'}, 'zh': {'title': '解耦说话者的音节分词器提升语音理解', 'desc': '本文提出了一种说话者解耦的音节分词器，通过将受干扰的学生表示回归到干净的教师目标，来提高音节边界检测和语音语言建模的性能。该方法旨在从原始语音中学习离散的音节标记，以捕捉潜在的语言内容结构。与传统的音节分词方法不同，我们的方法避免了模型预测说话者身份的问题，从而提高了音节标记的纯度。实验结果表明，我们的方法在音节边界检测和音节段聚类方面达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2607.03751', 'title': 'Look Before You Leap: Distilling Tree Search into Action Evaluation for Frozen VLA Models', 'url': 'https://huggingface.co/papers/2607.03751', 'abstract': "Abstract A framework called SVA is introduced that enhances Vision-Language-Action models by decoupling action generation from consequence evaluation, thereby improving generalization and task success rates while reducing computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models acquire broad embodied capabilities through large-scale pretraining, yet their generalization remains far more fragile than that of LLMs and VLMs. The prevailing remedy, post-training via supervised fine-tuning or reinforcement learning, improves task-specific performance but narrows the generalist capability that makes pretraining valuable. We identify a key bottleneck: VLA failures stem not only from action generation but also from action evaluation. A diagnostic pass@k study confirms that frozen VLAs already contain competent behaviors in their output distribution, with overall success rates rising from 33% at pass@1 to 92% at pass@32. Inspired by this, we propose SVA (Search, Value, and Act), a simple framework that equips frozen VLA policies with long-term consequence awareness. SVA first uses Monte-Carlo tree search in simulation to fully explore the VLA's output distribution and collect diverse trajectories annotated with empirical returns; this knowledge is then distilled into a lightweight Q-value model that predicts the expected consequence of candidate actions; at deployment, the frozen VLA proposes multiple candidates and the evaluator selects the one with the highest uncertainty-regularized Q-value, requiring no simulator access. By decoupling action proposal from consequence evaluation, SVA preserves the generalization capacity of the VLA backbone while substantially improving task success rates. Experiments across embodied benchmarks show that SVA consistently improves generalization on unseen tasks and exhibits strong test-time scaling behavior. Strikingly, SVA enables a 9B VLA to outperform a 27B VLA by 7 points at 27% lower inference latency, suggesting that scaling test-time evaluation is more cost-effective than scaling model size.", 'score': 0, 'issue_id': 2587, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '423b9ba487a77d82', 'authors': ['Xinyi Xie', 'Zican Hu', 'Zhanyu Liu', 'Yicheng Dong', 'Wenhao Wu', 'Zhenhong Sun', 'Haoran Li', 'Chunlin Chen', 'Zhi Wang', 'Pichao Wang'], 'affiliations': ['Australian National University', 'Institute of Automation, Chinese Academy of Sciences', 'Nanjing University', 'Nvidia'], 'pdf_title_img': 'assets/pdf/title_img/2607.03751.jpg', 'data': {'categories': ['#benchmark', '#robotics', '#inference', '#multimodal', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Оценка действий важнее, чем их генерация', 'desc': 'В работе представлена система SVA, которая улучшает Vision-Language-Action модели путём разделения процесса генерации действий и оценки их последствий. Авторы выявили, что основной узкий момент в производительности VLA заключается не только в генерации действий, но и в их недостаточной оценке. Предложенный метод использует поиск в дереве Монте-Карло для изучения распределения выходов замороженной VLA модели и обучает лёгкую Q-ценностную модель предсказывать ожидаемые результаты действий. На этапе развёртывания система выбирает из нескольких кандидатов действия с наивысшей ценностью, сохраняя при этом обобщающую способность базовой модели.'}, 'en': {'title': 'Decoupling Action and Evaluation for Enhanced VLA Performance', 'desc': 'The paper introduces a framework called SVA (Search, Value, and Act) that enhances Vision-Language-Action (VLA) models by separating the processes of action generation and consequence evaluation. This separation allows for better generalization and higher success rates in tasks while also reducing computational costs. The framework utilizes Monte-Carlo tree search to explore the output distribution of frozen VLA models, collecting diverse trajectories to inform a lightweight Q-value model that predicts the outcomes of actions. By decoupling these processes, SVA maintains the generalist capabilities of VLA models while significantly improving their performance on unseen tasks.'}, 'zh': {'title': '解耦生成与评估，提升VLA模型的能力', 'desc': '本文介绍了一种名为SVA的框架，旨在通过将动作生成与后果评估解耦，增强视觉-语言-动作（VLA）模型的能力。该框架通过蒙特卡洛树搜索探索VLA的输出分布，收集多样化的轨迹，并将这些知识提炼成轻量级的Q值模型，以预测候选动作的预期后果。实验表明，SVA在未见任务上显著提高了模型的泛化能力，并且在测试时表现出强大的扩展性。值得注意的是，SVA使得一个9B的VLA在推理延迟降低27%的情况下，超越了一个27B的VLA，表明在测试时评估的扩展比模型规模的扩展更具成本效益。'}}}, {'id': 'https://huggingface.co/papers/2607.02904', 'title': 'Speaker-Aware Temporal Aggregation Strategies on Segment Representations for Depression Detection in Dyadic Interaction: A Benchmark Study', 'url': 'https://huggingface.co/papers/2607.02904', 'abstract': 'Abstract Temporal aggregation methods for speech-based depression detection show inconsistent performance across different backbones and training runs, highlighting the need for robust benchmarking criteria.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speech-based depression detection compresses features from short audio segments into one speaker-level decision, a step called temporal aggregation rarely studied on its own. Most benchmarks fix a single self-supervised encoder and a single hand-picked layer, so a reported gain may reflect the pipeline rather than the aggregation method itself. We introduce DEPOOL, a controlled benchmark that compares six aggregation architectures with six frozen speech backbones on an English and a Mandarin depression corpus, where each configuration learns which backbone layers matter rather than fixing one by hand. Across the resulting 72-configuration grid, a third of configurations collapse into predicting a single class for every speaker, a failure tied to the backbone as much as to the method, and the architecture that is most stable in a single-seed run becomes unreliable when training repeats across seeds. Robustness to backbone and seed, rather than average accuracy across a single pipeline, should be a first-class benchmarking criterion for temporal aggregation in clinical speech.', 'score': 0, 'issue_id': 2587, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '6d339a262e893dd1', 'authors': ['Anisha Pattanayak', 'Huang-Cheng Chou', 'Shrikanth Narayanan', 'Sudarsana Reddy Kadiri'], 'affiliations': ['Ming Hsieh Department of Electrical and Computer Engineering, University of Southern California, USA', 'Signal Analysis and Interpretation Laboratory (SAIL), University of Southern California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02904.jpg', 'data': {'categories': ['#audio', '#science', '#multilingual', '#benchmark', '#healthcare'], 'emoji': '🎙️', 'ru': {'title': 'Робастная оценка методов временной агрегации в детекции депрессии по речи', 'desc': 'В работе исследуется проблема агрегации временных признаков для определения депрессии по речи. Авторы предлагают DEPOOL — контролируемый бенчмарк, который сравнивает шесть архитектур агрегации с шестью замороженными моделями-кодировщиками речи на корпусах на английском и мандаринском языках. Результаты показывают, что треть конфигураций коллапсируют в предсказание одного класса для всех говорящих, и устойчивость метода зависит как от выбора backbone, так и от инициализации. Авторы утверждают, что робастность к изменению backbone и случайного инициализации должна быть основным критерием при оценке методов временной агрегации в клинических приложениях.'}, 'en': {'title': 'Enhancing Robustness in Speech-Based Depression Detection', 'desc': 'This paper addresses the challenges in speech-based depression detection, particularly focusing on the temporal aggregation methods used to combine short audio segments into a single decision. The authors introduce DEPOOL, a benchmarking framework that evaluates various aggregation architectures across multiple frozen speech backbones, allowing for a more comprehensive understanding of which features are most effective. They find that many configurations fail to generalize, often predicting a single class regardless of the input, indicating that both the choice of backbone and the aggregation method significantly impact performance. The study emphasizes the importance of robustness in benchmarking, advocating for a focus on stability across different training runs and architectures rather than just average accuracy.'}, 'zh': {'title': '鲁棒性是临床语音时间聚合的关键标准', 'desc': '本论文探讨了基于语音的抑郁检测中的时间聚合方法，指出不同的模型和训练过程导致性能不一致。我们提出了DEPOOL，一个控制基准，比较六种聚合架构与六种固定的语音模型在英语和普通话抑郁语料库上的表现。研究发现，许多配置在不同的训练种子下表现不稳定，导致模型在每个说话者上仅预测单一类别。我们强调，针对模型和种子的鲁棒性应成为临床语音时间聚合的首要基准标准。'}}}, {'id': 'https://huggingface.co/papers/2607.03068', 'title': 'PixCon: Clean-Positive Contrastive Learning for Foundation-Model Semi-Supervised Segmentation', 'url': 'https://huggingface.co/papers/2607.03068', 'abstract': 'Abstract PixCon is a semi-supervised semantic segmentation framework that uses clean-positive pixel-contrastive learning with per-class memory banks to improve accuracy over existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Semi-supervised semantic segmentation (SSSS) has long turned on one question, which pseudo-labels to trust, and answered it with ever more careful confidence filtering. Foundation backbones change the regime: with a DINOv2 teacher a strict threshold already retains a measured 98%-clean pseudo-label set, so the accuracy that remains lives not in the filter but in how the embedding space is structured by class. We propose PixCon, a clean-positive pixel-contrastive framework. PixCon maintains a per-class memory bank that admits only labeled pixels the student already classifies correctly, guaranteeing a contamination-free positive set (ρ_F=0) by construction, unlike prior contrastive SSSS banks (ReCo, U^2PL) built from confidence-filtered pseudo-labels. It is a single branch over a consistency backbone, adds no inference-time parameters, and needs no bank-specific threshold. A first-order analysis of the supervised-InfoNCE gradient explains why contamination hurts: its false-positive term scales as ρ_F/(1-ρ_F), which we measure (0.018 on Pascal, 0.106 on ADE20K) rather than assume. Across Pascal VOC, Cityscapes, and ADE20K, PixCon matches or improves a strong DINOv2-based UniMatch V2 baseline in a compute-matched one-switch protocol: it improves every Pascal-1/8 seed (a per-seed gain of about +0.2 mIoU) and its three-seed mean reaches 87.90, the published UniMatch V2-B figure. Because contamination is already rare under foundation-model teachers, our analysis indicates the ρ_F=0 guarantee acts chiefly as robustness as teachers weaken, while the accuracy gain comes from cleaner positive supervision, making clean-positive contrast a robust, low-cost default for foundation-model SSSS.', 'score': 0, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '4b9214d5abb5b357', 'authors': ['Ebenezer Tarubinga'], 'affiliations': ['Ebenworks Systems, Seoul, Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.03068.jpg', 'data': {'categories': ['#cv', '#training', '#optimization'], 'emoji': '🧩', 'ru': {'title': 'Чистые примеры вместо фильтрации: контрастивное обучение без загрязнения для сегментации', 'desc': 'PixCon представляет полусообщаемый фреймворк семантической сегментации, который использует контрастивное обучение на чистых положительных пиксельных примерах с банками памяти для каждого класса. В отличие от предыдущих методов, PixCon гарантирует отсутствие загрязнения в положительном наборе, сохраняя только те пиксели, которые студент-модель уже правильно классифицирует. Авторы анализируют, почему загрязнение псевдо-меток вредит обучению, и показывают, что влияние ложных позитивных примеров масштабируется с контролируемым коэффициентом. Метод демонстрирует улучшение или совпадение с сильной базовой линией DINOv2 на стандартных бенчмарках Pascal VOC, Cityscapes и ADE20K без добавления параметров на этапе инференса.'}, 'en': {'title': 'Clean-Positive Contrast for Robust Semantic Segmentation', 'desc': 'PixCon is a new framework for semi-supervised semantic segmentation that enhances accuracy by using clean-positive pixel-contrastive learning. It introduces per-class memory banks that only include correctly classified labeled pixels, ensuring a contamination-free positive set. This approach eliminates the need for complex confidence filtering and additional parameters during inference. The results show that PixCon outperforms existing methods, providing a more robust and efficient solution for semantic segmentation tasks.'}, 'zh': {'title': '干净正样本对比学习的语义分割新方法', 'desc': 'PixCon是一种半监督语义分割框架，采用干净正样本的像素对比学习，结合每类的记忆库，以提高准确性。该方法通过使用DINOv2教师模型，确保生成的伪标签集的准确性，避免了以往方法中伪标签的污染问题。PixCon的设计保证了每个类的记忆库只包含学生已经正确分类的标记像素，从而构建了一个无污染的正样本集。通过在多个数据集上的实验，PixCon在计算资源相匹配的情况下，达到了或超过了现有强基线的性能。'}}}]
