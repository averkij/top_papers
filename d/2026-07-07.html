    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {

                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.29526', 'title': 'The Mirage of Optimizing Training Policies: Monotonic Inference Policies as the Real Objective for LLM Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.29526', 'abstract': 'Abstract Training-inference mismatch in reinforcement learning for large language models leads to instability, which is addressed through a new policy optimization objective and framework that ensures consistent policy improvements between training and inference phases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) has gained growing attention in large language model (LLM) post-training, yet RL training remains fragile and can suffer from instability or collapse. One vital cause is training-inference mismatch: LLM adopts separate inference and training engines for generation efficiency and training precision, which in practice exhibits inconsistent probabilities for the same trajectories on training and inference sides, even with synchronized model parameters. This naturally induces a special type of off-policyness ever existing and poisoning the training. Prior works have made various efforts in addressing the off-policyness to stabilize the training policies under the mismatch. In this paper, we point out the objective misalignment neglected by existing works that an effective update to the policy in the training engine not necessarily ensures the improvement of the inference policy, i.e., the one used in deployment. To this end, we propose a new policy optimization objective for LLM RL, named Monotonic Inference Policy Improvement (MIPI). Following this principle, we introduce Monotonic Inference Policy Update (MIPU), a two-step LLM RL framework that constructs sampler-referenced candidate updates and selectively accepts synchronized candidates using an inference-side gap proxy. Experiments conducted on two model scales under high mismatch show that MIPU improves average reasoning performance and training stability.', 'score': 141, 'issue_id': 2576, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': 'e04605df9c9148f1', 'authors': ['Jing Liang', 'Hongyao Tang', 'Yi Ma', 'Yancheng He', 'Weixun Wang', 'Xiaoyang Li', 'Ju Huang', 'Wenbo Su', 'Jinyi Liu', 'Yan Zheng', 'Jianye Hao', 'Bo Zheng'], 'affiliations': ['Alibaba', 'Tianjin University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29526.jpg', 'data': {'categories': ['#rl', '#alignment', '#reasoning', '#training', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Согласование политики обучения и инференса в RL для языковых моделей', 'desc': 'Статья решает проблему несоответствия между обучением и инференсом при использовании Reinforcement Learning для больших языковых моделей. Авторы выявили, что политика, улучшенная во время обучения, не обязательно улучшает работу модели при развертывании, так как используются разные движки с несоответствующими вероятностями. Предложен новый критерий оптимизации политики под названием Monotonic Inference Policy Improvement, который обеспечивает согласованное улучшение на обеих этапах. Представлена двухступенчатая схема MIPU, которая выбирает кандидатов обновлений на основе прокси зазора инференса, что повышает стабильность обучения и качество решения задач.'}, 'en': {'title': 'Stabilizing RL in LLMs with Monotonic Policy Improvements', 'desc': 'This paper addresses the instability in reinforcement learning (RL) for large language models (LLMs) caused by training-inference mismatch. The authors introduce a new policy optimization objective called Monotonic Inference Policy Improvement (MIPI) to ensure consistent improvements in both training and inference phases. They also propose a two-step framework, Monotonic Inference Policy Update (MIPU), which selectively accepts updates based on a proxy that measures the gap between training and inference. Experimental results demonstrate that MIPU enhances reasoning performance and stabilizes training under conditions of high mismatch.'}, 'zh': {'title': '解决强化学习中的训练与推理不匹配问题', 'desc': '在强化学习中，大型语言模型的训练和推理阶段存在不匹配问题，导致不稳定性。本文提出了一种新的策略优化目标和框架，旨在确保训练和推理阶段之间的一致性。我们引入了单调推理策略改进（MIPI）和单调推理策略更新（MIPU），通过两步框架来优化策略。实验结果表明，MIPU在高不匹配情况下提高了推理性能和训练稳定性。'}}}, {'id': 'https://huggingface.co/papers/2607.02501', 'title': 'Embodied.cpp: A Portable Inference Runtime of Embodied AI Models on Heterogeneous Robots', 'url': 'https://huggingface.co/papers/2607.02501', 'abstract': 'Abstract Embodied.cpp is a portable C++ runtime that enables efficient deployment of vision-language-action and world-action models across heterogeneous edge devices through modular execution layers and optimized inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied AI models now span vision-language-action (VLA) models and world-action models (WAMs), but practical deployment remains fragmented across model-specific Python stacks, backend assumptions, and robot-side glue code, especially on heterogeneous edge devices. Existing inference runtimes are designed mainly for request-response serving and therefore do not satisfy the runtime contract of embodied deployment: multi-rate execution inside closed-loop control, latency-first batch-1 inference on heterogeneous hardware, and extensible embodied interfaces beyond fixed token I/O. We present Embodied.cpp, a portable C++ inference runtime for embodied models. Based on an architectural analysis of representative VLA models and WAMs, Embodied.cpp captures a shared execution path and organizes it into five layers: input adapters, sequence builders, backbone execution, head plugins, and deployment adapters. The runtime provides modular multi-rate execution, latency-first fused inference, and extensible operator and I/O support, enabling deployment across heterogeneous devices, robots, and simulators through one backend abstraction. We evaluate Embodied.cpp on two VLA models, HY-VLA and pi0.5, and on a preliminary WAM benchmark using a LingBot-VA Transformer block. The VLA deployments achieve successful closed-loop execution with 100.0% and 91.0% task success rates, respectively. The WAM benchmark reduces block memory from 312.2 MiB to 88.1 MiB. These results show that Embodied.cpp improves deployment efficiency while preserving high accuracy across diverse embodied model architectures.', 'score': 36, 'issue_id': 2576, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '0b9ba0ee6f0747df', 'authors': ['Ling Xu', 'Chuyu Han', 'Borui Li', 'Hao Wu', 'Shiqi Jiang', 'Ting Cao', 'Chuanyou Li', 'Sheng Zhong', 'Shuai Wang'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02501.jpg', 'data': {'categories': ['#multimodal', '#inference', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Единая среда выполнения для развёртывания воплощённых AI моделей на пограничных устройствах', 'desc': 'В статье представляется Embodied.cpp — портативная C++ среда выполнения для эффективного развёртывания моделей vision-language-action (VLA) и world-action (WAM) на гетерогенных пограничных устройствах. Архитектура системы организована в пять модульных слоёв: адаптеры входных данных, построители последовательностей, выполнение основной сети, плагины голов и адаптеры развёртывания, что обеспечивает гибкость при работе с разными аппаратными платформами. Среда выполнения поддерживает многочастотное выполнение, многоскоростное управление в замкнутом контуре и обеспечивает низкую задержку при batch-1 инференсе, что критично для роботизированных систем реального времени. Экспериментальные результаты показывают успешное выполнение задач с точностью до 100% для VLA моделей и значительное сокращение потребления памяти для WAM моделей.'}, 'en': {'title': 'Efficient Deployment of AI Models with Embodied.cpp', 'desc': 'Embodied.cpp is a C++ runtime designed to efficiently deploy vision-language-action (VLA) and world-action models (WAMs) on various edge devices. It addresses the challenges of fragmented deployment by providing a modular architecture that includes input adapters, sequence builders, backbone execution, head plugins, and deployment adapters. This runtime supports multi-rate execution and optimized inference, ensuring low latency and high performance across different hardware. Evaluation results demonstrate that Embodied.cpp achieves high task success rates and significantly reduces memory usage, enhancing deployment efficiency for embodied AI models.'}, 'zh': {'title': '高效部署的可移植 C++ 运行时', 'desc': 'Embodied.cpp 是一个可移植的 C++ 运行时，旨在高效地在异构边缘设备上部署视觉-语言-动作（VLA）模型和世界-动作模型（WAM）。该运行时通过模块化执行层和优化推理，解决了现有推理运行时在多速率执行和延迟优先推理方面的不足。Embodied.cpp 采用五个层次的结构，包括输入适配器、序列构建器、主干执行、头插件和部署适配器，支持跨设备的灵活部署。实验结果表明，Embodied.cpp 在不同模型架构上提高了部署效率，同时保持了高准确率。'}}}, {'id': 'https://huggingface.co/papers/2607.02461', 'title': 'OrbitQuant: Data-Agnostic Quantization for Image and Video Diffusion Transformers', 'url': 'https://huggingface.co/papers/2607.02461', 'abstract': 'Abstract OrbitQuant enables efficient post-training quantization for diffusion transformers by using a normalized rotated basis that eliminates the need for recalibration across different timesteps and modalities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion transformers (DiTs) achieve state-of-the-art image and video generation, but their multi-step sampling and growing parameter count make inference expensive. Post-training quantization (PTQ) is the natural remedy, yet DiT activations shift across timesteps, prompts, and guidance branches, forcing prior methods to re-fit calibration data for every new checkpoint or modality. We present OrbitQuant, a data-agnostic weight-activation quantizer that bypasses range estimation by quantizing in a normalized, rotated basis. In this basis, a randomized permuted block-Hadamard (RPBH) rotation concentrates each coordinate around one fixed, known marginal regardless of the input, so a single Lloyd-Max codebook serves all timesteps, prompts, and layers of a given input dimension. We extend the same quantizer to weight rows offline, absorbing the rotation into the weights so that it cancels inside each linear layer and only a forward rotation on the activations remains at runtime. The same recipe transfers from image to video with no per-modality tuning. Across FLUX.1, Z-Image-Turbo, Wan 2.1, and CogVideoX, it sets the state of the art for PTQ at several low-bit settings. It also pushes PTQ of image diffusion transformers to W2A4 with usable generation quality.', 'score': 27, 'issue_id': 2577, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'c66ee6dcac3c7333', 'authors': ['Donghyun Lee', 'Jitesh Chavan', 'Duy Nguyen', 'Sam Huang', 'Liming Jiang', 'Priyadarshini Panda', 'Timo Mertens', 'Saurabh Shukla'], 'affiliations': ['Cantina Labs', 'University of Illinois Urbana-Champaign', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2607.02461.jpg', 'data': {'categories': ['#video', '#optimization', '#diffusion', '#architecture', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Единая квантизация для всех модальностей через ротированный базис', 'desc': 'В статье представлен метод OrbitQuant для эффективного квантования диффузионных трансформеров после обучения без необходимости переобучения на разных временных шагах. Авторы используют нормализованный ротированный базис с блочным преобразованием Адамара, который стабилизирует активации и позволяет использовать единый кодовую книгу Lloyd-Max для всех слоёв и модальностей. Метод работает как с весами, так и с активациями, причём ротация интегрируется прямо в веса линейных слоёв и отменяется внутри них. Подход продемонстрировал лучшие результаты при квантовании диффузионных моделей генерации изображений и видео до 2-4 бит, включая W2A4 конфигурацию.'}, 'en': {'title': 'Efficient Quantization for Diffusion Transformers with OrbitQuant', 'desc': 'OrbitQuant is a novel method for post-training quantization (PTQ) specifically designed for diffusion transformers, which are used in generating images and videos. It introduces a normalized rotated basis that simplifies the quantization process, eliminating the need for recalibrating data for different timesteps and modalities. By using a randomized permuted block-Hadamard rotation, OrbitQuant allows for a single codebook to be effective across various inputs, making it more efficient. This approach not only enhances the performance of image diffusion transformers but also achieves state-of-the-art results in low-bit quantization settings without requiring additional tuning for different types of media.'}, 'zh': {'title': 'OrbitQuant：高效的扩散变换器后训练量化', 'desc': 'OrbitQuant 是一种高效的后训练量化方法，专为扩散变换器设计。它通过使用标准化的旋转基，消除了在不同时间步和模态之间重新校准的需求。该方法能够在不需要重新拟合校准数据的情况下，处理扩散变换器的激活变化。OrbitQuant 在多个低比特设置下，提升了图像和视频生成的后训练量化性能，达到了最新的技术水平。'}}}, {'id': 'https://huggingface.co/papers/2607.01804', 'title': 'VLA-Corrector: Lightweight Detect-and-Correct Inference for Adaptive Action Horizon', 'url': 'https://huggingface.co/papers/2607.01804', 'abstract': 'Abstract VLA-Corrector addresses limitations of action chunking in vision-language-action models by introducing a lightweight latent-space vision monitor that enables adaptive corrective replanning, improving robustness in contact-rich manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) foundation models have recently achieved strong progress in embodied intelligence. To reduce policy-call frequency while preserving temporal coherence, most generative policies adopt an action chunk mechanism, executing multiple future actions in an open-loop manner under a fixed action horizon. However, this "predict-then-blindly-execute" paradigm sacrifices closed-loop reactivity: in contact-rich physical interactions, even small local perturbations can rapidly amplify within the open-loop blind spot, leading to compounding errors and ultimately task failure. To address this limitation, we propose VLA-Corrector, a lightweight corrective inference framework for action-chunked VLA policies. Without modifying the backbone policy weights, VLA-Corrector introduces a lightweight Latent-space Vision Monitor (LVM) that continuously compares predicted and actual visual feature evolution, enabling online detection of visual dynamics deviations. Once persistent deviation is detected, the system triggers a truncation event, discards the remaining stale actions, and invokes corrective replanning via Online Gradient Guidance (OGG). The detect-and-correct mechanism of VLA-Corrector naturally induces an event-triggered adaptive action horizon: it preserves long-horizon execution when the current chunk remains reliable, and invokes short-horizon corrective replanning when execution begins to drift. In doing so, VLA-Corrector mitigates the trade-off imposed by static horizons between execution robustness and policy-call frequency. It can be integrated into different VLA models without further retraining the VLA backbone, interrupting compounding errors while preserving much of the efficiency benefit of action chunking and substantially improving robustness in long-horizon, contact-rich robotic manipulation tasks.', 'score': 23, 'issue_id': 2576, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'e032c4d775628526', 'authors': ['Yi Pan', 'Miao Pan', 'Qi Lu', 'Jiaming Huang', 'Man Zhang', 'Siteng Huang', 'Xin Li', 'Jie Zhang', 'Yongliang Shen', 'Xuhong Zhang', 'Wenqi Zhang'], 'affiliations': ['Alibaba DAMO Academy', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01804.jpg', 'data': {'categories': ['#multimodal', '#inference', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Адаптивная коррекция действий через мониторинг визуальной динамики', 'desc': 'Статья представляет VLA-Corrector — лёгкую систему коррекции для моделей зрения-языка-действия, которая решает проблему слепого выполнения действий при их группировке. Система использует монитор в пространстве латентных признаков для онлайн-обнаружения отклонений визуальной динамики от предсказаний модели. При обнаружении значительного отклонения система прерывает выполнение оставшихся действий и запускает адаптивное переплани\xadрование с помощью градиентной оптимизации. Такой подход позволяет значительно повысить надёжность манипуляционных задач с контактными взаимодействиями, сохраняя при этом эффективность за счёт группировки действий.'}, 'en': {'title': 'Enhancing Robustness in VLA Models with Adaptive Corrective Replanning', 'desc': 'The paper introduces VLA-Corrector, a framework designed to enhance the performance of vision-language-action (VLA) models in complex manipulation tasks. It addresses the limitations of traditional action chunking, which can lead to errors during physical interactions due to a lack of real-time feedback. VLA-Corrector employs a Latent-space Vision Monitor (LVM) to continuously assess the accuracy of predicted visual features against actual observations, allowing for timely corrective actions. This adaptive mechanism enables the model to maintain efficiency while improving robustness by dynamically adjusting the action horizon based on the reliability of ongoing actions.'}, 'zh': {'title': '自适应纠正，提升机器人操作鲁棒性', 'desc': 'VLA-Corrector 是一种轻量级的纠正推理框架，旨在解决视觉-语言-动作模型中动作分块的局限性。它通过引入潜在空间视觉监控器，能够实时检测视觉特征的偏差，从而实现自适应的纠正重规划。该系统在执行过程中能够根据实际情况调整动作的执行时间，避免了因固定时间范围导致的错误累积。VLA-Corrector 可以无缝集成到不同的 VLA 模型中，显著提高了在复杂物理交互中的执行鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.28551', 'title': 'DataComp-VLM: Improved Open Datasets for Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.28551', 'abstract': 'Abstract DataComp for VLMs (DCVLM) establishes a comprehensive benchmark for evaluating data curation strategies in vision-language models, demonstrating that data mixing rather than filtering significantly improves model performance at scale.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Building performant Vision-Language Models (VLMs) requires carefully curating large-scale training datasets, yet the community lacks systematic benchmarks for evaluating such curation strategies. We introduce DataComp for VLMs (DCVLM), a benchmark for controlled data-centric experiments to improve VLM training. As part of DCVLM, we collect 160 datasets spanning four data types -- image-caption pairs, multimodal interleaved documents, text-only, and instruction-tuning data -- into a corpus of 6T multimodal tokens. DCVLM allows participants to test curation strategies (filtering, mixing, formatting, sampling) across 1B-8B models and 6.25B-200B token budgets. Models are then evaluated on a carefully selected suite of up to 52 downstream benchmarks across 9 domains. We conduct extensive experiments on DCVLM and find that data mixing, not filtering, is key to a high-quality training dataset: instruction-heavy mixtures scale better than caption-heavy ones, with gains widening at larger scales. The resulting dataset, DCVLM-Baseline, enables training an 8B VLM to 63.6% accuracy on our 33-task core suite with 200B training tokens. Compared to FineVision, the state-of-the-art open VLM training dataset, this represents an improvement of +5.4pp. DCVLM and all accompanying artifacts will be made publicly available at https://www.datacomp.ai/dcvlm/.', 'score': 19, 'issue_id': 2577, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '11bdb8c98281e4f6', 'authors': ['Matteo Farina', 'Vishaal Udandarao', 'Thao Nguyen', 'Selim Kuzucu', 'Maximilian Böther', 'Andreas Hochlehnert', 'Adhiraj Ghosh', 'Marianna Nezhurina', 'Karsten Roth', 'Joschka Struber', 'Yuhui Zhang', 'Sebastian Dziadzio', 'Elaine Sui', 'Soumya Jahagirdar', 'Dhruba Ghosh', 'Hasan Hammoud', 'Thomas De Min', 'Simone Caldarella', 'Jehanzeb Mirza', 'Sedrick Keh', 'Mehdi Cherti', 'Hilde Kuehne', 'Bernt Schiele', 'Serena Yeung-Levy', 'Muhammad Ferjad Naeem', 'Federico Tombari', 'Ana Klimovic', 'Elisa Ricci', 'Matthias Bethge', 'Sewoong Oh', 'Ameya Prabhu', 'Alessio Tonioni', 'Jenia Jitsev', 'Massimiliano Mancini', 'Ludwig Schmidt', 'Nikhil Parthasarathy'], 'affiliations': ['ETH Zurich', 'Google Research', 'LAION', 'Max Planck Institute for Informatics', 'Meta', 'University of Bonn', 'University of Trento', 'University of Tübingen', 'University of Verona', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.28551.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#training', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Смешивание данных — ключ к качеству мультимодальных моделей', 'desc': 'DataComp for VLMs (DCVLM) — это комплексный бенчмарк для оценки стратегий курирования данных при обучении моделей зрения-языка. Исследователи собрали корпус из 160 датасетов, включающих 6 триллионов мультимодальных токенов, охватывающих четыре типа данных: пары изображение-подпись, мультимодальные документы, текстовые данные и инструкционные данные для настройки. Главный вывод работы заключается в том, что смешивание различных типов данных значительно более эффективно, чем фильтрация: модели лучше обучаются на данных, богатых инструкциями, а улучшения становятся более значительными при увеличении масштаба. Полученный датасет DCVLM-Baseline позволяет обучить 8B модель с точностью 63.6% на наборе из 33 задач, что на 5.4 процентных пункта превышает результаты существующих open-source датасетов.'}, 'en': {'title': 'Mixing Data, Maximizing Performance in VLMs!', 'desc': 'The paper introduces DataComp for VLMs (DCVLM), a benchmark designed to evaluate data curation strategies for vision-language models (VLMs). It highlights that data mixing, rather than filtering, significantly enhances model performance when training on large datasets. The benchmark includes a diverse collection of 160 datasets and allows for testing various curation strategies across different model sizes and token budgets. The findings indicate that instruction-heavy data mixtures yield better results, achieving a notable accuracy improvement over existing datasets.'}, 'zh': {'title': '数据混合提升视觉语言模型性能', 'desc': '本文介绍了数据混合在视觉语言模型（VLMs）训练中的重要性，提出了一个名为DataComp for VLMs（DCVLM）的基准，用于评估数据策划策略。研究表明，与数据过滤相比，数据混合能够显著提升模型在大规模训练中的表现。DCVLM收集了160个数据集，涵盖图像-文本对、多模态文档、纯文本和指令调优数据，形成了一个包含6万亿多模态标记的语料库。通过在多个下游基准测试中评估模型，发现以指令为主的数据混合在大规模训练中表现更佳，最终实现了在核心任务上达到63.6%的准确率。'}}}, {'id': 'https://huggingface.co/papers/2606.31227', 'title': 'Securing the AI Agent: A Unified Framework for Multi-Layer Agent Red Teaming', 'url': 'https://huggingface.co/papers/2606.31227', 'abstract': 'Abstract AI-Infra-Guard is an open-source framework that addresses AI infrastructure security through layered detection paradigms spanning infrastructure, protocol, agent behavior, and model layers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The fast growth of open-source AI infrastructure, from model serving engines and agent platforms to the Model Context Protocol (MCP) ecosystem and the language models themselves, has outpaced the security tooling available to defend it. We present AI-Infra-Guard, an open-source framework that organizes AI red teaming around a single observation: the attack surface of an AI agent is stratified across layers (infrastructure, protocol/tool, agent behavior, and model), and no single detection paradigm fits all of them. The framework therefore matches a paradigm to each layer, from deterministic rule matching over 75+ AI components and 1{,}400+ vulnerability rules, through LLM-driven agentic auditing of MCP servers and agent-skill packages and multi-turn black-box agent red teaming, to a jailbreak harness with 26+ attack operators over sixteen datasets. To our knowledge it is the only open-source framework to span all of these, including supply-chain auditing of the agent skills that increasingly extend AI agents. We release AI-Infra-Guard as open source so that layer-paradigm matching can serve as a practical foundation for agent security and a shared base for the community to build on.', 'score': 8, 'issue_id': 2576, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '75aea8d9dfa61d00', 'authors': ['Yong Yang', 'Xing Zheng', 'Huiyu Wu', 'Huangsheng Cheng', 'Xiaorong Shi', 'Jing Guo', 'Bo Yang', 'Yi Zhou', 'Xiangfan Wu', 'Zonghao Ying'], 'affiliations': ['Tencent Zhuque Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.31227.jpg', 'data': {'categories': ['#security', '#open_source'], 'emoji': '🛡️', 'ru': {'title': 'Многоуровневая защита: парадигма под каждый слой системы ИИ', 'desc': 'AI-Infra-Guard — это открытый фреймворк для обеспечения безопасности инфраструктуры искусственного интеллекта, который использует многоуровневый подход к обнаружению атак. Фреймворк организует красное тестирование ИИ агентов, распределяя методы защиты по четырем слоям: инфраструктура, протокол, поведение агента и сама модель. Система применяет разные парадигмы обнаружения для каждого уровня: от детерминированного анализа правил и уязвимостей через LLM-управляемый аудит серверов до черного ящика тестирования и взлома с использованием 26+ атакующих операторов. Фреймворк впервые охватывает все эти аспекты, включая проверку цепочки поставок для расширений агентов, обеспечивая комплексную безопасность открытых систем ИИ.'}, 'en': {'title': 'Layered Security for AI Infrastructure', 'desc': 'AI-Infra-Guard is an open-source framework designed to enhance the security of AI infrastructure by employing a multi-layered detection approach. It recognizes that the attack surface of AI agents is divided into different layers, including infrastructure, protocols, agent behavior, and models, each requiring tailored security measures. The framework utilizes various detection paradigms, such as deterministic rule matching and LLM-driven auditing, to address vulnerabilities across over 75 AI components and 1,400 vulnerability rules. By providing a comprehensive solution for AI security, AI-Infra-Guard aims to support the community in building safer AI systems.'}, 'zh': {'title': 'AI基础设施安全的分层防护', 'desc': 'AI-Infra-Guard是一个开源框架，旨在通过分层检测方法来解决AI基础设施的安全问题。该框架将AI红队活动组织在一个核心观察上，即AI代理的攻击面在基础设施、协议/工具、代理行为和模型层面上是分层的。针对每一层，框架匹配不同的检测范式，包括对75多个AI组件和1400多个漏洞规则的确定性规则匹配，以及基于大型语言模型的代理审计和多轮黑箱代理红队测试。AI-Infra-Guard是唯一一个涵盖所有这些层面的开源框架，旨在为代理安全提供实用基础，并为社区提供共享基础。'}}}, {'id': 'https://huggingface.co/papers/2607.01233', 'title': 'Measuring the Gap Between Human and LLM Research Ideas', 'url': 'https://huggingface.co/papers/2607.01233', 'abstract': 'Abstract Large language models generate research ideas that cluster around specific opportunity patterns and paradigms, diverging systematically from the broader and more diverse distributions found in human research papers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLMs are increasingly used to brainstorm research ideas, but existing evaluations mostly judge individual ideas by novelty, feasibility, or expert preference. We instead ask: how far are current LLM-generated ideas from human researchers? To characterize this gap, we build a large-scale evaluation framework for ideation from high-quality human research papers. For each paper, we reverse-engineer a small set of closely related prior works that likely inspired its core idea. LLMs are then prompted to generate a new idea from the set of paper titles and summaries. We introduce a two-axis research-taste taxonomy to profile each idea by its opportunity pattern and research paradigm, and use it to quantify the divergence between human and LLM ideas. Across idea sets generated by different LLMs, we observe a consistent distributional gap: LLM ideas are disproportionately concentrated around bridge-like opportunities and synthesis methods, whereas the human paper reference distribution spreads more broadly across ways of framing gaps and constructing contributions. This result suggests that strong LLMs can produce a range of reasonable ideas, but that range remains narrower than, and systematically shifted relative to, human research taste.', 'score': 5, 'issue_id': 2579, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '3c3933b0259a1007', 'authors': ['Ziyu Chen', 'Yilun Zhao', 'Arman Cohan'], 'affiliations': ['University of Chicago', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01233.jpg', 'data': {'categories': ['#benchmark', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Вкус машины уже человеческого: как LLM генерируют узкий спектр исследовательских идей', 'desc': 'Авторы исследуют, как большие языковые модели генерируют исследовательские идеи и обнаруживают, что эти идеи систематически отличаются от распределения идей человеческих исследователей. Они разработали масштабную систему оценки, которая использует высококачественные научные работы и создаёт для каждой из них набор связанных предыдущих публикаций, которые могли вдохновить её основную идею. LLM получают задачу генерировать новые идеи на основе названий и резюме этих статей. Авторы предложили двухосевую таксономию исследовательского вкуса, которая профилирует каждую идею по возможностям и парадигмам, и выяснили, что LLM сосредоточены на синтезе и связывающих возможностях, в то время как человеческие исследователи работают с более разнообразным спектром подходов.'}, 'en': {'title': 'Bridging the Gap: LLMs vs Human Research Ideas', 'desc': 'This paper investigates how large language models (LLMs) generate research ideas compared to human researchers. It finds that LLM-generated ideas tend to cluster around specific themes, while human ideas are more diverse and cover a wider range of topics. The authors create a framework to evaluate and compare these ideas, focusing on their opportunity patterns and research paradigms. The results show that while LLMs can produce valid ideas, they are less varied and systematically different from the preferences of human researchers.'}, 'zh': {'title': '大型语言模型与人类研究者的想法差距', 'desc': '这篇论文探讨了大型语言模型（LLM）生成的研究想法与人类研究者的想法之间的差距。研究发现，LLM生成的想法主要集中在特定的机会模式和研究范式上，而人类研究论文的想法则更加多样化。为了评估这种差距，研究者建立了一个大规模的评估框架，并通过反向工程分析相关的先前研究来生成新的想法。结果表明，尽管LLM能够产生合理的研究想法，但其范围仍然比人类研究者的想法要窄，且系统性地偏离了人类的研究口味。'}}}, {'id': 'https://huggingface.co/papers/2607.01420', 'title': 'MultAttnAttrib: Training-Free Multimodal Attribution in Long Document Question Answering', 'url': 'https://huggingface.co/papers/2607.01420', 'abstract': "Abstract MultAttnAttrib is a training-free multimodal attribution method that locates source evidence in documents using attention heads and calibrated thresholds, achieving superior accuracy and efficiency compared to existing approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As grounded QA systems are increasingly deployed in AI assistants, accurately attributing generated answers to evidence is critical for user trust and model safety. While unimodal attributions have been explored in depth, the multimodal setting remains relatively under-researched. As a result, we introduce MultAttnAttrib, a training-free attribution-generation method that leverages a model's prefill pass, selected attention heads, and calibrated thresholds to locate source evidence within a document. To establish baseline results for the method, we introduce MultAttrEval, a complementary benchmark dataset annotated with fine-grained, ground-truth attributions for answer components grounded in multimodal source documents. To our knowledge, this is the first evaluation dataset designed specifically for multimodal attribution in long-form documents. Experimental results show that MultAttnAttrib consistently outperforms a variety of attribution-generation methods, including several strong prompting-based approaches and matches the latest frontier models such as GPT 5.4. Our method not only substantially improves attribution accuracy for both unimodal and multimodal attribution types, but also produces attributions at up to one-seventh of the direct inference latency compared to prompting on the same base model.", 'score': 5, 'issue_id': 2577, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '5ce6a6cf54c09d2e', 'authors': ['Dang Quang Thien Tran', 'Quang V. Dang', 'Vinamra Tyagi', 'Sai Soorya Rao Veeravalli', 'Trang Nguyen', 'Ryan A. Rossi', 'Franck Dernoncourt', 'Nedim Lipka', 'Koustava Goswami', 'Samyadeep Basu'], 'affiliations': ['Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2607.01420.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Быстрая и точная атрибуция ответов в мультимодальных системах без обучения', 'desc': 'В работе предложен метод MultAttnAttrib для атрибуции в мультимодальных системах, который определяет источники информации в документах без обучения, используя головы внимания и откалиброванные пороги. Авторы создали первый датасет MultAttrEval с размеченными ссылками на доказательства для ответов, основанные на мультимодальных документах. Экспериментальные результаты показывают, что предложенный метод превосходит существующие подходы, включая основанные на промптировании, и достигает точности уровня GPT 5.4. Метод обеспечивает значительное ускорение вывода — атрибуции генерируются в семь раз быстрее, чем при использовании прямого инферирования.'}, 'en': {'title': 'Revolutionizing Evidence Attribution in AI with MultAttnAttrib', 'desc': 'MultAttnAttrib is a novel method for multimodal attribution that identifies the source evidence in documents without requiring training. It utilizes attention heads and calibrated thresholds to enhance the accuracy and efficiency of locating evidence for generated answers in AI systems. This approach addresses the gap in multimodal attribution research, providing a new benchmark dataset called MultAttrEval for evaluating attribution in long-form documents. Experimental results demonstrate that MultAttnAttrib outperforms existing methods, achieving higher accuracy and faster inference times.'}, 'zh': {'title': '无训练的多模态归因方法，提升准确性与效率', 'desc': 'MultAttnAttrib是一种无训练的多模态归因方法，利用注意力头和校准阈值在文档中定位源证据。与现有方法相比，它在准确性和效率上表现优越。该方法特别适用于AI助手中的基于证据的问答系统，增强了用户信任和模型安全性。我们还引入了MultAttrEval，这是一个专门为多模态归因设计的基准数据集，提供了细粒度的真实归因标注。'}}}, {'id': 'https://huggingface.co/papers/2607.02471', 'title': 'Interpretation-Oriented Cloud Removal via Observation-Anchored Residual Flow with Geo-Contextual Alignment', 'url': 'https://huggingface.co/papers/2607.02471', 'abstract': 'Abstract Geo-Anchored Cloud Removal framework addresses semantic drift in cloud removal by combining physically grounded residual inversion with semantic manifold constraints from vision foundation models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Cloud removal (CR) is essential for optical remote sensing, serving as a prerequisite for reliable downstream interpretation, such as semantic segmentation and change detection. However, existing CR approaches often prioritize visual realism while overlooking their impact on subsequent analytical tasks, leading to semantic drift and degraded downstream performance. To address this issue, we propose Geo-Anchored Cloud Removal (GACR), a unified framework that jointly ensures faithful reconstruction and robust interpretability. At its core, GACR incorporates Observation-Anchored Residual Flow (OAR-Flow), which reformulates CR as a physically grounded residual inversion process. By anchoring the generative trajectory to the cloudy observation rather than pure noise, OAR-Flow enables fast, stable, and faithful reconstruction. To further preserve semantic structures critical for downstream interpretation, GACR integrates Geo-Contextual Prior Alignment (GCPA) to constrain the reconstruction within a semantic manifold induced by a Vision Foundation Model (VFM). Consequently, GACR strictly maintains the spatial-semantic integrity of complex landscapes. Extensive experiments across six CR datasets and twelve downstream tasks demonstrate that GACR produces superior reconstruction quality while consistently improving downstream task accuracy. The code is available at https://github.com/wzy6055/GACR.', 'score': 4, 'issue_id': 2577, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '492a880402889305', 'authors': ['Ziyao Wang', 'Maonan Wang', 'Yucheng He', 'Xianping Ma', 'Ziyi Wang', 'Hongyang Zhang', 'Yirong Cheng', 'Man-on Pun'], 'affiliations': ['Faculty of Geosciences and Engineering, Southwest Jiaotong University', 'School of Science and Engineering, The Chinese University of Hong Kong, Shenzhen', 'Shanghai Ai Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.02471.jpg', 'data': {'categories': ['#training', '#open_source', '#architecture', '#cv'], 'emoji': '☁️', 'ru': {'title': 'Удаление облаков с сохранением семантической целостности спутниковых снимков', 'desc': 'Статья представляет GACR — фреймворк для удаления облаков в спутниковых снимках, который решает проблему семантического дрейфа путём комбинирования физически обоснованной инверсии остатков с ограничениями на семантическом многообразии от фундаментальных моделей зрения. В основе подхода лежит метод OAR-Flow, который переформулирует задачу удаления облаков как процесс инверсии остатков, привязанный к облачному наблюдению, что обеспечивает быструю и устойчивую реконструкцию. Для сохранения семантических структур, критичных для последующих задач, фреймворк интегрирует модуль GCPA, который ограничивает реконструкцию семантическим многообразием. Экспериментальная оценка на шести датасетах и двенадцати задачах показывает, что метод улучшает как качество восстановления, так и точность последующих операций обработки изображений.'}, 'en': {'title': 'Enhancing Cloud Removal with Semantic Integrity', 'desc': 'The Geo-Anchored Cloud Removal (GACR) framework improves cloud removal in optical remote sensing by addressing semantic drift. It combines a physically grounded approach with semantic constraints from vision foundation models to ensure accurate reconstruction and better interpretability. GACR uses Observation-Anchored Residual Flow (OAR-Flow) to stabilize the reconstruction process by linking it to actual observations rather than random noise. This method not only enhances the quality of cloud removal but also preserves important semantic information for downstream tasks like semantic segmentation and change detection.'}, 'zh': {'title': '地理锚定云去除：提升重建与语义一致性', 'desc': '本文提出了一种地理锚定云去除框架（GACR），旨在解决云去除中的语义漂移问题。该框架结合了物理基础的残差反演和来自视觉基础模型的语义流形约束。GACR通过观察锚定残差流（OAR-Flow）将云去除重新定义为一个物理基础的过程，从而实现快速、稳定和真实的重建。实验结果表明，GACR在六个云去除数据集和十二个下游任务中表现出色，显著提高了重建质量和下游任务的准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.00052', 'title': 'AGE: Adaptive-masking for Graph Embedding in Graph Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2607.00052', 'abstract': 'Abstract GraphRAG extends RAG by incorporating graph-structured data for LLMs, addressing latent feature misalignment through Adaptive-masking for Graph Embedding (AGE) that uses Transformer-based self-supervised learning with learnable node sampling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct GraphRAG is an extension of retrieval-augmented generation (RAG) that supports large language models (LLMs) by referring to graph-structured data as external knowledge. While this technique ideally captures intricate relationships, it often struggles with graph representations for LLMs, particularly for frozen LLMs, due to the misalignment between graph-based and text-based latent features. We tackle this issue by introducing the {\\it Adaptive-masking for Graph Embedding (AGE)}. AGE employs a Transformer in a mask-based self-supervised learning (SSL) approach. We designed the architecture similar to text embedding encoders, addressing the latent feature misalignment. In contrast to natural language texts, graphs are concise representations, and there exist {\\it key nodes} that hold dominant contextual information, which are challenging to predict from their surroundings. Masking such key nodes leads to inefficiency in the SSL process. Therefore, AGE focuses on predicting nodes apart from key nodes, utilizing a learnable node sampler. Our experimental results indicate that AGE significantly improves approaches using non-parametric search component in GraphQA tasks, achieving superior accuracy across four benchmark datasets with distinct characteristics.', 'score': 3, 'issue_id': 2576, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'cf310dfddbfbd177', 'authors': ['Bao Long Nguyen Huu', 'Atsushi Hashimoto'], 'affiliations': ['OMRON Corporation', 'OMRON SINIC Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2607.00052.jpg', 'data': {'categories': ['#graphs', '#rag', '#benchmark', '#transfer_learning', '#training', '#architecture'], 'emoji': '🕸️', 'ru': {'title': 'Адаптивное маскирование для согласования графовых и текстовых представлений в RAG', 'desc': 'GraphRAG расширяет технологию поиск-увеличенного поколения (RAG) путём интеграции графо-структурированных данных для работы с большими языковыми моделями. Основная проблема заключается в несовпадении скрытых признаков между графовыми и текстовыми представлениями, особенно для заморозленных LLM. Авторы предлагают Adaptive-masking for Graph Embedding (AGE) — подход самообучения на основе маскирования с использованием Transformer-архитектуры и обучаемого семплера узлов. Метод достигает значительного улучшения точности на задачах GraphQA благодаря правильной идентификации ключевых узлов графа и эффективной предсказательной стратегии.'}, 'en': {'title': 'Enhancing LLMs with Graph-Structured Data through Adaptive Masking', 'desc': 'GraphRAG enhances retrieval-augmented generation (RAG) by integrating graph-structured data to improve large language models (LLMs). It addresses the challenge of latent feature misalignment between graph and text representations through a novel method called Adaptive-masking for Graph Embedding (AGE). AGE utilizes a Transformer-based self-supervised learning approach that focuses on predicting non-key nodes, which helps in better graph representation. Experimental results show that this method significantly boosts accuracy in GraphQA tasks across various datasets.'}, 'zh': {'title': '图结构数据助力大型语言模型的创新', 'desc': 'GraphRAG 是一种扩展的检索增强生成（RAG）方法，它通过引入图结构数据来支持大型语言模型（LLMs）。该方法解决了图嵌入中的潜在特征不对齐问题，采用了自适应掩码图嵌入（AGE）技术，利用基于变换器的自监督学习和可学习的节点采样。AGE 通过掩码自监督学习的方法，专注于预测非关键节点，从而提高了图表示的效率。实验结果表明，AGE 在 GraphQA 任务中显著提升了准确性，超越了四个具有不同特征的基准数据集。'}}}, {'id': 'https://huggingface.co/papers/2606.31959', 'title': 'AnyBokeh: Physics-Guided Any-to-Any Bokeh Editing with Optical Fingerprint Transfer', 'url': 'https://huggingface.co/papers/2606.31959', 'abstract': 'Abstract AnyBokeh is a physics-guided framework for bokeh editing that estimates source blur states and transfers optical characteristics between different focus and aperture settings without requiring all-in-focus reconstruction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Depth-of-field control is a fundamental tool in photography, yet post-capture bokeh editing from a single image remains challenging. A practical editor should handle images captured under arbitrary focus and aperture settings. Existing methods typically assume an all-in-focus input, or first recover an all-in-focus image before rendering new bokeh. Such pipelines can discard useful blur cues from the source image and propagate reconstruction artifacts into the final edit. We introduce AnyBokeh, a physics-guided framework for any-to-any bokeh editing. Instead of treating source blur merely as a degradation to be removed, AnyBokeh estimates the source blur state with a signed circle-of-confusion map and a disparity map. By modeling the linear relation between signed circle of confusion and disparity difference, AnyBokeh estimates a source-specific optical fingerprint and transfers the source optical characteristics to the desired focus and aperture setting. A generative editor conditioned on both source and target circle-of-confusion maps then performs relative blur synthesis, enabling spatially adaptive deblurring, preservation, and defocus rendering. To support physically supervised learning, we further construct a high-fidelity synthetic dataset with accurate depth, focus distance, and full EXIF metadata. Experiments on real-world benchmarks show that AnyBokeh achieves faithful and controllable editing across any-to-any bokeh editing, all-in-focus-to-bokeh rendering, and defocus deblurring, while avoiding all-in-focus reconstruction and test-time bokeh-level calibration commonly required by existing approaches. The code and dataset will be available at https://github.com/itsmag11/AnyBokeh.', 'score': 2, 'issue_id': 2578, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '622f802da3d0cec4', 'authors': ['Xinyu Hou', 'Xiaoming Li', 'Zongsheng Yue', 'Chen Change Loy'], 'affiliations': ['Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31959.jpg', 'data': {'categories': [], 'emoji': '📸', 'ru': {'title': 'От любого боке к любому боке: редактирование глубины резкости без восстановления исходного изображения', 'desc': 'AnyBokeh — это физически обоснованная система для редактирования боке на фотографиях, которая оценивает исходное размытие и передает оптические характеристики между различными параметрами фокусировки и диафрагмы без необходимости восстановления полностью сфокусированного изображения. Вместо удаления размытия как артефакта, метод оценивает исходное состояние размытия через карту подписанного круга рассеяния и карту диспаритета, моделируя линейную связь между этими параметрами. Генеративный редактор, обусловленный картами исходного и целевого размытия, выполняет адаптивный синтез относительного размытия, позволяя избирательно деразмывать, сохранять или добавлять эффект размытия. Авторы создали высокачественный синтетический датасет с точной информацией о глубине и метаданными EXIF для обучения модели с физическим контролем.'}, 'en': {'title': 'Revolutionizing Bokeh Editing with AnyBokeh', 'desc': 'AnyBokeh is a novel framework designed for editing bokeh effects in photographs without needing an all-in-focus image. It intelligently estimates the blur state of the source image using a signed circle-of-confusion map and a disparity map, allowing for accurate transfer of optical characteristics. This approach enables spatially adaptive deblurring and defocus rendering, making it versatile for various focus and aperture settings. By utilizing a high-fidelity synthetic dataset for training, AnyBokeh achieves high-quality results while avoiding common pitfalls of traditional methods.'}, 'zh': {'title': 'AnyBokeh：无须全焦重建的模糊编辑新方法', 'desc': 'AnyBokeh是一个基于物理指导的模糊编辑框架，能够在不同的焦点和光圈设置下进行模糊编辑，而无需全焦重建。该方法通过估计源图像的模糊状态，并利用签名的模糊圆圈图和视差图来传递光学特性。AnyBokeh通过建模模糊圆圈与视差差异之间的线性关系，生成源特定的光学指纹，实现空间自适应去模糊和渲染。实验结果表明，AnyBokeh在任意模糊编辑和去模糊方面表现出色，避免了现有方法中常见的全焦重建和测试时模糊级别校准。'}}}, {'id': 'https://huggingface.co/papers/2606.31036', 'title': 'Teaching LLMs to Recommend and Defer in Underrepresented Epilepsy Care', 'url': 'https://huggingface.co/papers/2606.31036', 'abstract': 'Abstract A non-parametric prompt-learning framework called MANANA improves pediatric epilepsy treatment decisions by adapting to local prescribing practices and providing uncertainty-based deferral signals for low-confidence cases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Specialist epilepsy expertise is scarce in resource-constrained settings, making LLM-based decision support attractive for frontline clinicians managing longitudinal treatment. Such systems must adapt to local prescribing practice and know when to defer. We study this problem in Ugandan pediatric epilepsy care, predicting anti-seizure medication regimens from longitudinal unstructured clinic notes. Standard prompting achieves non-trivial agreement with physician prescriptions, but neurologist review shows that many errors reflect distribution-miscalibrated prescribing defaults rather than failures to parse the local record. We introduce MANANA, a non-parametric prompt-learning framework that learns local prescribing guidance from a small patient-level training set. MANANA converts observed prescription errors into auditable prompt memories, instantiated in single-agent and multi-agent variants, and improves over classical ML models, direct LLM prompting, and prompt-optimization baselines across two independently collected Ugandan cohorts. We further propose Bayesian prompt averaging, which converts the learned prompt trajectory into prescription likelihoods and an uncertainty-based deferral signal. On the independently collected held-out cohort, this improves visit-level top-3 prescription accuracy by 4-8 percentage points over prompt-optimization baselines and enables selective prediction: the system can auto-handle the most confident half of cases at 95% precision, or the most confident quarter at 99% precision, while deferring lower-confidence cases for specialist review.', 'score': 1, 'issue_id': 2580, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'b6d6993e844cff70', 'authors': ['Shreyas Rajesh', 'Kartik Sharma', 'Tonmoy Monsoor', 'Mehmet Yigit Turali', 'Richard Idro', 'Juliana Kayaga', 'Robert Sebunya', 'Tracy Tushabe Namata', 'Jessica Nichole Pasqua', 'Vwani Roychowdhury', 'Rajarshi Mazumder'], 'affiliations': ['Electrical and Computer Engineering, University of California, Los Angeles', 'Makerere University', 'Neurology, University of California, Los Angeles', 'St. Francis Hospital Nsambya'], 'pdf_title_img': 'assets/pdf/title_img/2606.31036.jpg', 'data': {'categories': ['#agents', '#healthcare', '#training', '#alignment', '#low_resource', '#science'], 'emoji': '🧠', 'ru': {'title': 'Адаптивные подсказки для решений в педиатрической медицине с отказом на основе неуверенности', 'desc': 'Авторы предлагают MANANA — фреймворк обучения подсказок для больших языковых моделей, который адаптирует рекомендации по лечению эпилепсии к местным практикам назначения лекарств в условиях ограниченных ресурсов. Система использует небольшой набор данных пациентов для обучения и преобразует ошибки предсказания в «память подсказок», которая улучшает качество предсказания схем противоэпилептических препаратов из клинических записей. Авторы применяют байесовское усреднение подсказок для получения вероятностей рецептов и сигналов неуверенности, позволяя системе автоматически отклонять низконадёжные случаи на рассмотрение специалистом. На независимых угорских когортах пациентов метод показал значительное улучшение точности предсказания и селективного прогнозирования по сравнению с базовыми подходами к оптимизации подсказок.'}, 'en': {'title': 'Empowering Pediatric Epilepsy Care with Adaptive Learning', 'desc': 'The paper presents MANANA, a non-parametric prompt-learning framework designed to enhance pediatric epilepsy treatment decisions by adapting to local prescribing practices. It addresses the challenge of scarce epilepsy expertise in resource-limited settings by utilizing large language models (LLMs) for decision support. MANANA improves prescription accuracy by learning from a small set of patient data and converting prescription errors into auditable prompt memories. Additionally, it introduces Bayesian prompt averaging to provide uncertainty-based signals, allowing the system to confidently handle high-certainty cases while deferring lower-confidence cases for specialist review.'}, 'zh': {'title': '提升儿童癫痫治疗决策的智能框架', 'desc': '这篇论文介绍了一种名为MANANA的非参数提示学习框架，旨在改善儿童癫痫治疗决策。该框架能够适应当地的处方实践，并为低信心病例提供基于不确定性的延迟信号。研究表明，MANANA通过从小规模患者训练集中学习当地处方指导，显著提高了处方准确性。与传统机器学习模型和直接提示优化方法相比，MANANA在乌干达的两个独立队列中表现更佳。'}}}, {'id': 'https://huggingface.co/papers/2405.03650', 'title': 'Generated Contents Enrichment', 'url': 'https://huggingface.co/papers/2405.03650', 'abstract': 'Abstract A joint adversarial framework enriches scene graphs using graph convolutional networks to generate semantically richer visual content from sparse scene descriptions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We study Generated Contents Enrichment (GCE), a conditional image-generation task in which a sparse scene description is first enriched through an explicit scene representation and then rendered into semantically richer visual content. Conventional image-generation systems can produce visually realistic outputs from limited scene descriptions, but the added content is usually implicit in the generator rather than represented as an inspectable intermediate structure. In contrast, GCE seeks to make scene enrichment explicit at the scene-representation level while examining its visual consequences during generation, with the goal of encouraging generated content that is visually plausible, structurally coherent, and semantically richer than the sparse input. To instantiate GCE, we propose a jointly trained adversarial framework that enriches scene graphs by modeling object semantics and inter-object relations. Our approach first represents the input description as a scene graph, where nodes model objects and edges capture inter-object relations. The framework uses graph convolutional networks to predict additional objects and their relations to the existing scene. Finally, the enriched scene graph is passed through the downstream image-generation pipeline to generate the corresponding visual content. We evaluate the framework with proxy scene graph enrichment metrics, image-quality comparisons, qualitative examples, and user studies on the Visual Genome dataset.', 'score': 1, 'issue_id': 2579, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '813f90f9e3c44fce', 'authors': ['Mahdi Naseri', 'Jiayan Qiu', 'Zhou Wang'], 'affiliations': ['University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2405.03650.jpg', 'data': {'categories': ['#diffusion', '#graphs'], 'emoji': '🎨', 'ru': {'title': 'Явное обогащение графов сцен для семантически насыщенной генерации изображений', 'desc': 'В работе предложен подход к обогащению сцены на основе граф-свёрточных сетей для генерации более информативного визуального контента из разреженных описаний. Метод использует состязательный фреймворк, который представляет входное описание сцены в виде графа, где узлы представляют объекты, а рёбра — отношения между ними. Граф-свёрточная сеть предсказывает дополнительные объекты и их взаимосвязи, явно обогащая структуру сцены на уровне представления. Обогащённый граф сцены затем используется для генерации визуального контента, что обеспечивает семантически более богатый результат по сравнению с исходным разреженным описанием.'}, 'en': {'title': 'Enriching Scene Graphs for Richer Visual Content', 'desc': 'This paper introduces a method called Generated Contents Enrichment (GCE) that enhances scene graphs to create more detailed visual content from sparse descriptions. It uses a joint adversarial framework and graph convolutional networks to explicitly model object semantics and their relationships within a scene. Unlike traditional image generation systems that rely on implicit content, GCE focuses on making the enrichment process transparent and inspectable. The enriched scene graphs are then used to generate images that are visually plausible and semantically richer than the original input.'}, 'zh': {'title': '通过图卷积网络丰富场景图，生成更具语义的视觉内容', 'desc': '本文提出了一种联合对抗框架，通过图卷积网络丰富场景图，从稀疏的场景描述中生成更具语义的视觉内容。我们研究了生成内容丰富性（GCE），这是一种条件图像生成任务，旨在通过明确的场景表示来丰富稀疏的场景描述。与传统的图像生成系统不同，GCE在场景表示层面上明确场景的丰富性，并在生成过程中检查其视觉效果。我们的框架通过建模对象语义和对象间关系，使用图卷积网络来预测额外的对象及其与现有场景的关系。'}}}];

        }

            window.history.pushState({}, '', newUrl);

            const sortDropdown = document.getElementById('sort-dropdown');

            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

                document.getElementById('filter-logic-and').checked = true;

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        }

            const index = selectedCategories.indexOf(category);
            if (index === -1) {

                button.classList.add('active');

                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));

                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }

            localStorage.setItem('selectedCategories', JSON.stringify('[]'));

                    ? articlesData

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);

            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);

                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-07 00:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-07 00:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
