    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.04425', 'title': 'UI-MOPD: Multi-Platform On-Policy Distillation for Continual GUI Agent Learning', 'url': 'https://huggingface.co/papers/2607.04425', 'abstract': 'Abstract Uni-GUI dataset and UI-MOPD method enable cross-platform GUI agent training by addressing limited data and platform-specific capability degradation through multi-teacher on-policy distillation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in multimodal foundation models and agent systems have driven GUI agents from single-platform task execution toward cross-platform interaction. However, building multi-platform GUI agents remains challenging. On one hand, high-quality and executable cross-platform interaction trajectories are still scarce, and existing data often suffer from limited platform coverage. On the other hand, different platforms exhibit distinct interaction conventions, making joint or continual training prone to behavioral pattern mixing, platform-specific capability degradation, and catastrophic forgetting. To address these challenges, we construct Uni-GUI, a high-quality cross-platform GUI interaction dataset, and propose UI-MOPD, the first method that incorporates multi-teacher on-policy distillation into continual learning for GUI agents. UI-MOPD dynamically selects a platform-specific teacher according to the current environment and transfers platform-specific behavioral priors to a shared policy through platform-conditioned distillation, enabling adaptation to new platforms while preserving capabilities on existing ones. Experiments on OSWorld and MobileWorld show that UI-MOPD achieves task success rates of 38.2% and 12.0%, respectively, demonstrating its effectiveness in balancing cross-platform capability retention and new-platform adaptation.   Project page: https://elispectre.github.io/UI-MOPD/.', 'score': 60, 'issue_id': 2584, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'df144294b20c4e10', 'authors': ['Niu Lian', 'Alan Chen', 'Zhehao Yu', 'Chengzhen Duan', 'Fazhan Liu', 'Hui Liu', 'Pei Fu', 'Jian Luan', 'Yaowei Wang', 'Shu-Tao Xia', 'Jinpeng Wang'], 'affiliations': ['Harbin Institute of Technology, Shenzhen', 'Peng Cheng Laboratory', 'Tsinghua Shenzhen International Graduate School, Tsinghua University', 'Xiaomi', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04425.jpg', 'data': {'categories': ['#multimodal', '#training', '#dataset', '#agents'], 'emoji': '🖥️', 'ru': {'title': 'Обучение кроссплатформных GUI-агентов через многоучительскую дистилляцию', 'desc': 'В статье представлен датасет Uni-GUI и метод UI-MOPD для обучения GUI-агентов, которые могут работать на разных платформах. Основная проблема заключалась в нехватке качественных данных о взаимодействиях пользователя с интерфейсом разных платформ и в том, что совместное обучение приводит к катастрофическому забыванию и деградации способностей агента. Авторы используют многоучительский on-policy дистилляцию, где платформо-специфичные учители передают свои знания общей политике через дистилляцию, что позволяет адаптироваться к новым платформам без потери навыков на существующих. Экспериментальные результаты показывают, что UI-MOPD достигает высокой точности на тестовых наборах OSWorld и MobileWorld, что подтверждает эффективность метода.'}, 'en': {'title': 'Empowering Cross-Platform GUI Agents with UI-MOPD', 'desc': "This paper introduces the Uni-GUI dataset and the UI-MOPD method to improve the training of GUI agents across different platforms. The challenges include a lack of high-quality interaction data and the risk of losing performance when adapting to new platforms. UI-MOPD uses a technique called multi-teacher on-policy distillation to help agents learn from platform-specific examples while maintaining their skills on previously learned platforms. The results show that this approach significantly enhances the agents' ability to perform tasks on multiple platforms without degrading their existing capabilities."}, 'zh': {'title': '跨平台GUI代理的智能适应', 'desc': '本文提出了Uni-GUI数据集和UI-MOPD方法，以解决跨平台GUI代理训练中的数据不足和平台特定能力下降的问题。通过多教师在线蒸馏，UI-MOPD能够动态选择平台特定的教师，并将行为先验转移到共享策略中。这样，代理可以在适应新平台的同时，保持在已有平台上的能力。实验结果表明，UI-MOPD在OSWorld和MobileWorld上的任务成功率分别为38.2%和12.0%，有效平衡了跨平台能力保留和新平台适应。'}}}, {'id': 'https://huggingface.co/papers/2607.05373', 'title': 'PixWorld: Unifying 3D Scene Generation and Reconstruction in Pixel Space', 'url': 'https://huggingface.co/papers/2607.05373', 'abstract': 'Abstract PixWorld presents a unified pixel-space diffusion approach for 3D reconstruction and generation that overcomes limitations of latent-space methods through direct image-level supervision and geometry-aware feature alignment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct 3D reconstruction and generation are commonly tackled by separate paradigms: pixel-based regression for reconstruction, and latent diffusion for generation. Recent works attempt to unify them in latent space, but with notable drawbacks: the diffusion objective is defined on latent features rather than the underlying 3D representation, and both branches suffer from information loss introduced by latent encoding, while requiring a pretrained Variational Autoencoder (VAE) or Representation Autoencoder (RAE). In this paper, we reformulate these two tasks under a unified pixel-space diffusion paradigm and introduce PixWorld, a single model that jointly addresses 3D reconstruction and generation. By supervising diffusion directly on rendered images, PixWorld removes the above limitations and aligns optimization with 3D scene fidelity. Beyond photometric and perceptual supervision that operates at the 2D image level and lacks 3D geometric awareness, we further introduce a geometry perception loss that aligns rendered views with their ground truth in the geometry-aware feature space of a pretrained 3D foundation model, providing 3D structural supervision. PixWorld consistently outperforms prior latent-space generation methods and matches state-of-the-art reconstruction methods, demonstrating the superiority of a unified pixel-space approach.', 'score': 44, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '3b332251ee08ef60', 'authors': ['Sensen Gao', 'Zhaoqing Wang', 'Qihang Cao', 'Dongdong Yu', 'Changhu Wang', 'Jia-Wang Bian'], 'affiliations': ['AISphere', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2607.05373.jpg', 'data': {'categories': ['#architecture', '#training', '#diffusion', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для трёхмерной реконструкции и генерации в пиксельном пространстве', 'desc': 'PixWorld представляет единый подход на основе диффузионных моделей в пиксельном пространстве для задач трёхмерной реконструкции и генерации. Метод преодолевает ограничения латентных подходов, обучаясь непосредственно на отрендеренных изображениях без необходимости в предобученных VAE или RAE. Авторы вводят потерю геометрического восприятия, которая выравнивает предсказанные виды с истинной геометрией в пространстве признаков трёхмерной фундаментальной модели, обеспечивая структурный контроль трёхмерной сцены. PixWorld достигает превосходных результатов в генерации и конкурентных показателей в реконструкции, демонстрируя эффективность единого пиксельного подхода.'}, 'en': {'title': 'Unifying 3D Reconstruction and Generation with Pixel-Space Diffusion', 'desc': 'PixWorld introduces a new method for 3D reconstruction and generation using a unified pixel-space diffusion approach. Unlike previous methods that rely on latent-space techniques, PixWorld directly supervises the diffusion process on rendered images, which helps maintain the integrity of the 3D representation. The model also incorporates a geometry perception loss that ensures the generated views align with the actual 3D structure, enhancing the quality of the output. Overall, PixWorld shows improved performance over existing methods by effectively combining reconstruction and generation tasks in a single framework.'}, 'zh': {'title': '统一像素空间，重建与生成的突破', 'desc': 'PixWorld提出了一种统一的像素空间扩散方法，用于3D重建和生成，克服了潜在空间方法的局限性。该方法通过直接在渲染图像上进行监督，消除了潜在编码带来的信息损失，并且不再依赖于预训练的变分自编码器（VAE）或表示自编码器（RAE）。此外，PixWorld引入了一种几何感知损失，使得渲染视图与真实几何特征对齐，从而提供3D结构监督。实验结果表明，PixWorld在性能上超越了以往的潜在空间生成方法，并与最先进的重建方法相匹配，展示了统一像素空间方法的优越性。'}}}, {'id': 'https://huggingface.co/papers/2607.04033', 'title': 'OmniOpt: Taxonomy, Geometry, and Benchmarking of Modern Optimizers', 'url': 'https://huggingface.co/papers/2607.04033', 'abstract': 'Abstract OmniOpt presents a unified framework for optimizer selection in large-scale model training by combining meta-pipeline transformations, norm-constrained linear minimization oracles, and a cross-domain benchmark to systematically analyze optimizer families and their trade-offs across different training objectives and model scales.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Optimizer selection for large-scale model training has become a system-level design decision constrained jointly by compute, memory, tuning budget, and task diversity, yet the landscape of over one hundred methods remains fragmented. We therefore present OmniOpt, a unified survey and benchmark cookbook of optimizers for the research community. OmniOpt rests on four coupled components. First, we treat every optimizer update as a structured transformation through a five-stage meta-pipeline, and show that most methods engage only one or two of these stages. Second, we use norm-constrained linear minimization oracles (LMOs) to unify different optimizers. Third, these two views ground a dual-dimension taxonomy, one dimension assigning each method to a mechanism family and the other recording the measurable training objectives it aims to improve. Fourth, and at the core of this paper, we instantiate the full taxonomy in a unified cross-domain benchmark spanning representative optimizers, model scales, and training regimes from language model pretraining to image classification, systematically analyzing each method family across multiple effect objectives and laying out their trade-offs. OmniOpt thus supplies the research community with an operational coordinate system for selecting optimizers under explicit mechanism and objective assumptions, and charts a direction for the future development of the optimizer community.', 'score': 43, 'issue_id': 2584, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'add1731367ae6681', 'authors': ['Siyuan Li', 'Jiabao Pan', 'Yumou Liu', 'Zhuoli Ouyang', 'Xin Jin', 'Xinglong Xu', 'Jingxuan Wei', 'Shengye Pang', 'Jintao Che', 'Xuanhe Zhou', 'Conghui He', 'Cheng Tan'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shanghai University', 'Southern University of Science and Technology', 'UCAS', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04033.jpg', 'data': {'categories': ['#training', '#survey', '#optimization', '#benchmark', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Унифицированная система выбора оптимизаторов для масштабируемого обучения моделей', 'desc': 'OmniOpt предлагает унифицированную систему для выбора оптимизаторов при обучении больших моделей, используя метапайплайн трансформаций и линейные оракулы с ограничениями нормы. Исследование классифицирует более сотни методов оптимизации по механизмам и целевым функциям обучения, создавая двумерную таксономию. Авторы разработали кросс-доменный бенчмарк, охватывающий предварительное обучение языковых моделей, классификацию изображений и другие задачи на разных масштабах. Эта работа предоставляет исследователям систематический подход к выбору оптимизаторов на основе явных механизмов и целевых предположений.'}, 'en': {'title': 'Streamlining Optimizer Selection for Large-Scale Training', 'desc': 'OmniOpt introduces a comprehensive framework for selecting optimizers in large-scale model training, addressing the complexities of various training objectives and model sizes. It combines meta-pipeline transformations and norm-constrained linear minimization oracles to create a systematic approach for analyzing over a hundred optimizer methods. The framework features a dual-dimension taxonomy that categorizes optimizers based on their mechanisms and the specific training objectives they target. By providing a unified benchmark, OmniOpt helps researchers make informed decisions about optimizer selection, enhancing the efficiency of model training across diverse tasks.'}, 'zh': {'title': '统一优化器选择框架', 'desc': 'OmniOpt是一个统一的框架，用于在大规模模型训练中选择优化器。它结合了元管道转换、范数约束线性最小化oracle和跨领域基准，系统地分析不同优化器家族及其在不同训练目标和模型规模下的权衡。该框架通过五个阶段的元管道将每个优化器更新视为结构化转换，并使用范数约束线性最小化oracle来统一不同的优化器。OmniOpt为研究社区提供了一个操作坐标系统，以便在明确的机制和目标假设下选择优化器，并为优化器社区的未来发展指明了方向。'}}}, {'id': 'https://huggingface.co/papers/2607.04438', 'title': 'ResearchStudio-Reel: Automate the Last Mile of Research from Paper to Poster, Video, and Blog', 'url': 'https://huggingface.co/papers/2607.04438', 'abstract': "Abstract ResearchStudio-Reel automates research dissemination by composing specialized skills around a shared paper extractor, generating consistent and editable artifacts including posters, videos, and blogs with hard pass/fail quality gates.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Research dissemination, turning a paper into a poster, a talk video, and a blog post, is still a manual last mile. Prior automation treats each artifact in isolation that each re-extract the paper from scratch, usually ship one-way renders the author cannot reopen in PowerPoint or Word, and gates quality on soft VLM-preference scores that plateau while load-bearing sections still read as empty. We argue this last mile is best built as a composition of skills: thin agent-readable contracts that share one upstream extractor and wrap deterministic primitives in a measured-fill loop whose exits are hard pass/fail render gates. We instantiate this as ResearchStudio-Reel, five Claude Code and Codex skills organized into one shared extractor (Paper2Assets), three editable generators (Paper2Poster, Paper2Video, Paper2Blog), and one interactive convergence layer (Paper2Reel). Paper2Assets extracts each paper once into a shared bundle that can be reused by every downstream skill; The three generators produce a print-ready poster, a synchronized talk video, and a bilingual blog that stay factually consistent and round-trip through PowerPoint or Word; Paper2Reel then binds all three into a self-contained HTML viewer whose section-level clicks jump the video, slides, captions, and blog to matching content. On the Paper2Poster benchmark, our posters lead every aesthetic and information sub-criterion against both prior automated systems and single-shot frontier LLMs, surpassing the authors' own on aesthetics under two held-out VLM judges and winning overall on 84% to 93% of papers; capability audits further show that, by uniquely pairing narration-aligned on-slide highlights with a bilingual blog gated by layout-aware DOCX repair, ResearchStudio-Reel is the only pipeline to ship all three editable artifacts. Project is available at https://aka.ms/ResearchStudio", 'score': 38, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'e13e3bec2b675675', 'authors': ['Lingao Xiao', 'Yalun Dai', 'Yangyu Huang', 'Qihao Zhao', 'Wenshan Wu', 'Hugo He', 'Ruishuo Chen', 'Jin Jiang', 'Qianli Ma', 'Jiahuan Zhang', 'Xin Zhang', 'Ying Xin', 'Yang Ou', 'Yan Xia', 'Scarlett Li', 'Longbo Huang', 'Zhipeng Zhang', 'Yang He', 'Yap Kim Hui', 'Yan Lu'], 'affiliations': ['CFAR, A*STAR', 'Microsoft Research', 'Nanyang Technological University', 'National University of Singapore', 'Peking University', 'Shanghai Jiao Tong University', 'Tsinghua University', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04438.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#video', '#benchmark', '#science', '#agents'], 'emoji': '📰', 'ru': {'title': 'Композиция навыков для автоматизации научной диссеминации с редактируемыми артефактами', 'desc': 'ResearchStudio-Reel автоматизирует распространение научных работ путём композиции специализированных навыков вокруг общего модуля извлечения информации из статей. Система генерирует согласованные и редактируемые артефакты (постеры, видео и блог-посты) с жёсткими критериями контроля качества вместо мягких оценок на основе предпочтений визуальных моделей. Ключевой инновацией является переиспользование единого извлечённого набора данных (Paper2Assets) для всех последующих генераторов, что обеспечивает факторическую согласованность и возможность редактирования в стандартных инструментах как PowerPoint и Word. Интерактивный уровень сходимости (Paper2Reel) объединяет все три артефакта в единый HTML-просмотровщик с синхронизацией между видео, слайдами, подписями и контентом блога.'}, 'en': {'title': 'Automating Research Dissemination with Consistent Artifacts', 'desc': 'ResearchStudio-Reel is a system designed to automate the process of turning academic papers into various formats like posters, videos, and blogs. It uses a shared paper extractor to ensure that all generated artifacts are consistent and editable, overcoming limitations of previous methods that treated each format separately. The system employs a composition of skills that includes hard quality gates to ensure high standards for the outputs. By integrating these components, ResearchStudio-Reel allows for a seamless transition between different formats while maintaining factual accuracy and aesthetic quality.'}, 'zh': {'title': '研究传播的自动化新纪元', 'desc': 'ResearchStudio-Reel 是一个自动化研究传播的工具，它通过共享的论文提取器组合专业技能，生成一致且可编辑的成果，包括海报、视频和博客。与以往的自动化方法不同，ResearchStudio-Reel 不再孤立处理每个成果，而是通过一个共享的提取器来提取论文，并在一个测量填充循环中包装确定性原语。该系统的三个生成器能够生成打印准备好的海报、同步的演讲视频和双语博客，确保内容的一致性，并可以在 PowerPoint 或 Word 中进行回转。通过这种方式，ResearchStudio-Reel 提供了一种创新的解决方案，提升了研究传播的效率和质量。'}}}, {'id': 'https://huggingface.co/papers/2607.04439', 'title': 'ResearchStudio-Idea: An Evidence-Grounded Research-Ideation Skill Suite from ML Conference Outcomes', 'url': 'https://huggingface.co/papers/2607.04439', 'abstract': 'Abstract ResearchStudio-Idea provides a skill suite for effective research ideation that combines literature search, novelty checking, and pattern-guided generation to produce traceable research proposals.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models have made research ideation increasingly accessible, yet effective idea development requires more than generating candidate directions. Researchers must ground a problem in current literature, identify meaningful bottlenecks, differentiate from existing solutions, and evaluate risks before committing to implementation. We present ResearchStudio-Idea as a reusable skill suite for this first mile of research ideation. The suite includes Paper-Search, a standalone multi-source literature search skill; Scoop-Check, a standalone prior-art collision checker for novelty claims; and IdeaSpark, the end-to-end skill that composes evidence grounding, pattern-guided generation, collision retrieval, audit, and idea-card rendering into one workflow. IdeaSpark is constructed from a corpus of 1,947 machine learning conference papers collected from ICLR, ICML, and NeurIPS between 2021 and 2025, including Oral papers, a separately tracked high-citation subset, and rejected submissions. Analysis of these outcomes reveals 31 recurring ideation sub-patterns, consolidated into 15 reusable ideation patterns. Each pattern is operationalized as a structured card containing research contexts, bottleneck types, differentiation strategies, supporting precedents, and common failure modes. Given a research problem and an evidence bundle, IdeaSpark evaluates evidence readiness, reconstructs the surrounding research context, identifies unresolved bottlenecks, selects relevant patterns, instantiates one candidate direction, retrieves potentially conflicting prior work, and performs outcome-informed auditing. This workflow transforms reusable ideation patterns into traceable research proposals. Blind automated-judge evaluations show that IdeaSpark consistently produces stronger research proposals than no-skill and generic-skill baselines while maintaining competitive novelty.', 'score': 35, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '60fd8c420ce99230', 'authors': ['Qihao Zhao', 'Yangyu Huang', 'Yalun Dai', 'Lingao Xiao', 'Jianjun Gao', 'Xin Zhang', 'Wenshan Wu', 'Scarlett Li', 'Yang He', 'Yan Lu', 'Yap Kim Hui'], 'affiliations': ['CFAR, A*STAR', 'Microsoft Research', 'Nanyang Technological University', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.04439.jpg', 'data': {'categories': ['#open_source', '#science'], 'emoji': '🧠', 'ru': {'title': 'Превращение паттернов идеации в обоснованные исследовательские предложения', 'desc': 'ResearchStudio-Idea — это набор навыков на основе больших языковых моделей для помощи исследователям на начальном этапе разработки идей. Система интегрирует поиск литературы, проверку новизны и генерацию, направляемую выявленными паттернами, чтобы создавать обоснованные и отслеживаемые исследовательские предложения. Авторы построили IdeaSpark — конечный инструмент рабочего процесса, который анализирует 1,947 научных статей из топ-конференций машинного обучения (ICLR, ICML, NeurIPS за 2021-2025 годы) и извлёк 15 переиспользуемых паттернов идеации. При получении исследовательской проблемы система оценивает готовность доказательств, восстанавливает контекст исследований, выявляет нерешённые проблемы, отбирает релевантные паттерны и формирует кандидата направления с проверкой конфликтов с существующими работами.'}, 'en': {'title': 'Transforming Research Ideas into Traceable Proposals', 'desc': 'The paper introduces ResearchStudio-Idea, a comprehensive skill suite designed to enhance research ideation by integrating literature search, novelty checking, and structured idea generation. It emphasizes the importance of grounding research problems in existing literature and identifying unique bottlenecks to differentiate from prior solutions. The suite features tools like Paper-Search for literature retrieval, Scoop-Check for assessing novelty, and IdeaSpark for generating structured research proposals based on identified patterns. Analysis of a large corpus of machine learning papers led to the identification of reusable ideation patterns, which are operationalized into structured cards to guide researchers in developing traceable and effective proposals.'}, 'zh': {'title': '研究构思的智能助手', 'desc': 'ResearchStudio-Idea 是一个用于有效研究构思的技能套件，结合了文献搜索、创新性检查和模式引导生成，能够生成可追溯的研究提案。该套件包括独立的文献搜索技能 Paper-Search、用于检查创新性声明的 Scoop-Check，以及整合了证据基础、模式引导生成和审计的 IdeaSpark。IdeaSpark 从 2021 到 2025 年间收集的 1,947 篇机器学习会议论文中构建，分析结果揭示了 31 种重复出现的构思子模式，并整合为 15 种可重用的构思模式。通过将可重用的构思模式转化为可追溯的研究提案，IdeaSpark 显示出比无技能和通用技能基线更强的研究提案生成能力，同时保持竞争力的创新性。'}}}, {'id': 'https://huggingface.co/papers/2607.02642', 'title': 'GigaWorld-1: A Roadmap to Build World Models for Robot Policy Evaluation', 'url': 'https://huggingface.co/papers/2607.02642', 'abstract': 'Abstract World models for robotic policy evaluation are systematically studied through a new benchmark, revealing that long-horizon rollout consistency and robot-specific controllability are more important than short-term visual realism for reliable policy assessment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Evaluating embodied robot foundation models remains a critical bottleneck; unlike large language models efficiently assessed via digital benchmarks, robotic policies require slow, costly real-world rollouts limited by hardware and human supervision, which has driven interest in world models as surrogate policy evaluators, yet the key properties that make a world model reliable for policy assessment remain poorly understood. This work presents a systematic study of world models for robotic policy evaluation and introduces WMBench, a benchmark constructed from real-robot teleoperation data and matched policy rollouts covering diverse manipulation tasks to enable controlled comparisons across model families, action encodings, rollout horizons, and evaluation metrics. Using WMBench, we analyze 7 video world models, 4 action representation schemes, and over 324,000 simulated policy rollouts paired with real robot executions, further enriching our analysis with large-scale community submissions from the CVPR 2026 GigaBrain Challenge, curated synthetic trajectories, and a training videos spanning more than 12,000 hours. Our experiments deliver three core insights: evaluator quality is dominated by long-horizon, action-faithful rollout consistency rather than short-term visual realism; pretraining gains stem not only from data scale but from balancing general world knowledge with robot-specific controllability; and architectural choices including action encoding, memory design, and evaluator-focused post-training strongly determine alignment with real-world robot behavior. Drawing on these results, we derive a practical design roadmap and realize it in GigaWorld-1, a world model specially optimized for policy evaluation, and we fully release our code, models, datasets, and toolkits to advance scalable evaluation research for embodied foundation models.', 'score': 29, 'issue_id': 2583, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'a93b4fe1650940f6', 'authors': ['GigaWorld Team', 'Angyuan Ma', 'Boyuan Wang', 'Bohan Li', 'Chaojun Ni', 'Guo Li', 'Guan Huang', 'Guosheng Zhao', 'Hao Li', 'Hengtao Li', 'Jingyu Liu', 'Jiwen Lu', 'Qiuping Deng', 'Tingdong Yu', 'Xuancheng Xu', 'Xinyu Zhou', 'Xiuwei Xu', 'Xinze Chen', 'Xiaofeng Wang', 'Xiaoyu Tian', 'Yang Wang', 'Yifan Chang', 'Yukun Zhou', 'Yun Ye', 'Zhenyu Wu', 'Zhanqian Wu', 'Zheng Zhu'], 'affiliations': ['GigaAI', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02642.jpg', 'data': {'categories': ['#synthetic', '#open_source', '#dataset', '#robotics', '#benchmark', '#video', '#optimization', '#training'], 'emoji': '🤖', 'ru': {'title': 'Консистентность на длинном горизонте важнее визуального реализма в мировых моделях для оценки робототехнических политик', 'desc': 'В этой работе представлен систематический анализ мировых моделей для оценки политик робототехники через новый бенчмарк WMBench, созданный на основе реальных данных телеуправления роботом и включающий более 324 000 симуляций. Исследование показывает, что для надёжной оценки политик критически важны последовательность прогнозирования на длинных горизонтах и специфичная для робота управляемость, а не краткосрочный визуальный реализм. Авторы анализируют 7 видеомировых моделей, 4 схемы кодирования действий и выявляют, что качество оценивателя зависит от предварительной подготовки, архитектурных решений и памяти модели. На основе полученных результатов разработана оптимизированная для оценки политик модель GigaWorld-1, а также выпущены код, датасеты и инструменты для развития исследований встроенных фундаментальных моделей.'}, 'en': {'title': 'Prioritizing Long-Horizon Consistency in Robotic Policy Evaluation', 'desc': 'This paper investigates the effectiveness of world models in evaluating robotic policies, emphasizing the importance of long-horizon rollout consistency and robot-specific controllability over short-term visual realism. The authors introduce WMBench, a benchmark that utilizes real-robot teleoperation data to facilitate controlled comparisons across various model families and evaluation metrics. Through extensive experiments involving over 324,000 simulated policy rollouts, the study reveals that the quality of evaluators is significantly influenced by their ability to maintain action fidelity over longer timeframes. The findings lead to the development of GigaWorld-1, a world model optimized for policy evaluation, with all resources made publicly available to enhance research in this area.'}, 'zh': {'title': '优化机器人策略评估的世界模型', 'desc': '本研究系统地探讨了用于机器人策略评估的世界模型，提出了一个新的基准WMBench。研究发现，长时间的策略执行一致性和特定机器人可控性比短期的视觉真实感更重要。通过分析多种视频世界模型和行动表示方案，研究揭示了评估器质量的关键因素。最终，研究团队开发了GigaWorld-1，一个专门优化用于策略评估的世界模型，并公开了相关代码和数据集，以推动机器人基础模型的评估研究。'}}}, {'id': 'https://huggingface.co/papers/2607.05247', 'title': 'Vision Pretraining for Dense Spatial Perception', 'url': 'https://huggingface.co/papers/2607.05247', 'abstract': 'Abstract Boundary modeling enables dense spatial perception by learning sub-pixel representations that enhance depth estimation and support embodied AI applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dense spatial perception is essential for physical intelligence, where visual systems are expected to recover structured, metric, and actionable representations from pixel observations. Modern visual foundation models tend to prioritize semantic invariance, often at the expense of detailed spatial understanding. In this work, we study vision pretraining through a boundary-centric lens, motivated by the premise that boundaries and shape discontinuities offer essential cues for perceiving geometric properties. Concretely, we propose masked boundary modeling, a self-supervised paradigm that dynamically learns sub-pixel boundary representations and subsequently leverages the discovered boundary-bearing tokens as masked targets to facilitate dense visual token learning. By scaling this framework, we develop LingBot-Vision and demonstrate its efficacy across a diverse set of downstream vision tasks with DINOv3 as a strong baseline. Remarkably, LingBot-Vision drives the progression from LingBot-Depth 1.0 to LingBot-Depth 2.0 for depth completion, and thereby yields enhanced depth estimation, a key pillar for embodied artificial intelligence. Our findings reveal that boundary modeling goes beyond simple line segments and instead serves as a scalable pretraining principle for learning spatially structured visual representations.', 'score': 28, 'issue_id': 2583, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'ecadf887c94f4549', 'authors': ['Zelin Fu', 'Bin Tan', 'Changjiang Sun', 'Shaohui Liu', 'Kecheng Zheng', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Nan Xue'], 'affiliations': ['robbyant'], 'pdf_title_img': 'assets/pdf/title_img/2607.05247.jpg', 'data': {'categories': ['#cv', '#training', '#optimization', '#robotics'], 'emoji': '🎯', 'ru': {'title': 'Границы как ключ к пониманию геометрии изображений', 'desc': 'В работе предложен метод граничного моделирования, который позволяет нейросети лучше понимать пространственную структуру изображений через обучение представлениям на уровне подпиксельных границ. Авторы используют самоконтролируемое обучение, где модель предсказывает найденные граничные токены в качестве целевых значений для плотного обучения визуальных признаков. Разработанная модель LingBot-Vision демонстрирует улучшение качества на различных задачах компьютерного зрения и особенно эффективна для задачи восстановления карт глубины. Исследование показывает, что граничное моделирование служит универсальным принципом предварительного обучения для извлечения пространственно-структурированных представлений.'}, 'en': {'title': 'Enhancing Depth Estimation through Boundary-Centric Learning', 'desc': 'This paper introduces a method called masked boundary modeling to improve depth estimation in visual systems. It focuses on learning sub-pixel boundary representations, which help in understanding geometric properties from images. The authors argue that traditional models often overlook detailed spatial information in favor of semantic understanding. By using this boundary-centric approach, they develop LingBot-Vision, which shows significant improvements in various vision tasks, particularly in depth completion for embodied AI applications.'}, 'zh': {'title': '边界建模：提升深度估计的关键', 'desc': '边界建模通过学习亚像素表示来增强深度估计，从而实现密集的空间感知。这种方法支持具身人工智能应用，帮助视觉系统从像素观察中恢复结构化和可操作的表示。我们提出了一种自监督的掩蔽边界建模方法，动态学习亚像素边界表示，并利用发现的边界标记作为掩蔽目标，促进密集视觉标记学习。研究表明，边界建模不仅限于简单的线段，而是作为一种可扩展的预训练原则，帮助学习空间结构化的视觉表示。'}}}, {'id': 'https://huggingface.co/papers/2607.04443', 'title': 'Wan-Streamer v0.2: Higher Resolution, Same Latency', 'url': 'https://huggingface.co/papers/2607.04443', 'abstract': "Abstract Wan-Streamer v0.2 enhances audio-visual interaction by increasing visual resolution while maintaining low latency through optimized thinker-performer architecture with multi-GPU parallel processing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Wan-Streamer v0.2, a latency-preserving upgrade of the native-streaming, end-to-end audio-visual interaction model. v0.2 keeps the v0.1 modeling formulation, but raises the interactive output stream from 192x336 to 640x368 while preserving approximately 200 ms model-side signal-to-signal latency at 25 FPS. The higher-resolution stream supports scene-grounded mid-shot agents whose posture, gaze, hands, nearby objects, and local scene layout remain legible during real-time conversation. To support the larger visual stream without adding user-visible delay, v0.2 keeps the thinker as a single-GPU low-latency path for streaming perception, the short language/state Transformer pass that builds the generation cache, and final decoding. The performer becomes a multi-GPU Ulysses-style context-parallel group for the expensive next-unit latent generation. Each performer rank writes incoming K/V into a pre-sharded local cache. The long high-resolution latent video sequence is split across ranks for denoising and gathered through Ulysses communication, while the much shorter audio latent sequence is generated without sequence sharding. In this split, the thinker's language/state computation reaches the performer only as K/V conditioning, so no separate language sequence has to be communicated inside the performer group. This concentrates additional hardware on visual generation while preserving the compact thinker-performer boundary, keeping total remote interaction latency at approximately 550 ms when a 350 ms bidirectional network budget is included.", 'score': 21, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '2c2747949a87b511', 'authors': ['Lianghua Huang', 'Zhi-Fan Wu', 'Yupeng Shi', 'Wei Wang', 'Mengyang Feng', 'Junjie He', 'Chen-Wei Xie', 'Yu Liu', 'Jingren Zhou', 'Ang Wang', 'Bang Zhang', 'Baole Ai', 'Chen Liang', 'Cheng Yu', 'Chongyang Zhong', 'Jinwei Qi', 'Kai Zhu', 'Pandeng Li', 'Peng Zhang', 'Wenyuan Zhang', 'Xinhua Cheng', 'Yitong Huang', 'Yun Zheng', 'Yuxiang Bao', 'Yuzheng Wang', 'Zoubin Bi'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.04443.jpg', 'data': {'categories': ['#inference', '#multimodal', '#audio', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Высокое разрешение в реальном времени: оптимизация многоGPU архитектуры для потокового аудиовизуального взаимодействия', 'desc': 'Wan-Streamer v0.2 — это модель для аудиовизуального взаимодействия в реальном времени, которая увеличивает разрешение визуального потока с 192x336 до 640x368, сохраняя низкую задержку около 200 мс на стороне модели. Архитектура использует оптимизированное разделение вычислений между компонентом тинкер (одиночный GPU) для потоковой обработки и компонентом перформер (многоGPU) для дорогостоящего генерирования видеолатентов. Для параллельной обработки больших высокоразрешённых видеопоследовательностей применяется контекстный параллелизм в стиле Улисса, позволяющий распределить вычисления по нескольким GPU без увеличения задержки. Общая задержка взаимодействия остаётся на уровне примерно 550 мс, включая 350 мс сетевой задержки туда и обратно.'}, 'en': {'title': 'Enhancing Audio-Visual Interaction with Low Latency', 'desc': 'Wan-Streamer v0.2 is an advanced model for audio-visual interaction that improves visual quality while keeping latency low. It achieves this by using a thinker-performer architecture with multi-GPU processing, allowing for higher resolution outputs without noticeable delays. The model maintains a signal-to-signal latency of around 200 ms at 25 frames per second, enabling clear real-time interactions. By optimizing the processing of visual and audio data, it ensures that users experience seamless communication with detailed visual representations.'}, 'zh': {'title': '提升音视频交互的低延迟高分辨率解决方案', 'desc': 'Wan-Streamer v0.2 是一种音视频交互模型的升级版本，旨在提高视觉分辨率并保持低延迟。该模型通过优化的思考者-执行者架构和多GPU并行处理，实现了从192x336提升到640x368的输出流，同时保持约200毫秒的信号延迟。更高的分辨率支持在实时对话中，场景中中景代理的姿势、视线、手部动作和周围物体的清晰可见。通过将思考者保持为单GPU低延迟路径，执行者则采用多GPU并行处理，确保在不增加用户可见延迟的情况下支持更大的视觉流。'}}}, {'id': 'https://huggingface.co/papers/2607.03973', 'title': 'MANCE: Manifold Aware Concept Erasure', 'url': 'https://huggingface.co/papers/2607.03973', 'abstract': 'Abstract Manifold constraint hypothesis enables improved concept erasure by projecting updates onto estimated representation manifolds, achieving state-of-the-art results in nonlinear concept removal.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Concept erasure aims to remove a target concept from a representation while preserving the other information encoded in it. This is difficult because representations encode many concepts that are often correlated with the erasure target, so removing the target risks damaging them. We propose the Manifold Constraint Hypothesis (MCH): if natural representations concentrate on a structured, lower-dimensional manifold, then interventions should be constrained to that manifold and better preserve other information encoded in the representation during interventions. We instantiate MCH in a new concept erasure method: MANifold aware Concept Erasure (MANCE). MANCE performs iterative updates to the representations using signals from a classifier that predicts a target concept. We estimate the manifold using representations obtained from natural inputs, and then we project the concept removal update to the estimated manifold. We perform extensive evaluation on 119 settings spanning text and vision, including 13 language models, three NLP concepts, and 40 CelebA-CLIP attributes. Employing MANCE on top of previous methods shows consistent improved leakage results. We also introduce MANCE+ and MANCE++, which prepend a closed-form erasure algorithm before employing MANCE, achieving better leakage--surgicality tradeoffs relative to matched full-space updates. MANCE++, our best method, achieves state-of-the-art results on nonlinear concept erasure. These results support MCH in the erasure setting: interventions should be constrained to the natural representation manifold.', 'score': 21, 'issue_id': 2586, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'f9e0970cf22f9bf3', 'authors': ['Matan Avitan', 'Yoav Goldberg', 'Yanai Elazar'], 'affiliations': ['Allen Institute for Artificial Intelligence', 'Bar-Ilan University'], 'pdf_title_img': 'assets/pdf/title_img/2607.03973.jpg', 'data': {'categories': ['#training', '#leakage', '#interpretability', '#multimodal', '#architecture'], 'emoji': '🧹', 'ru': {'title': 'Стирание концепций на естественных многообразиях представлений', 'desc': 'В статье предложена гипотеза о многообразии (Manifold Constraint Hypothesis), которая улучшает удаление концепций из представлений нейронных сетей путём проектирования обновлений на оценённое представительное многообразие. Авторы разработали метод MANCE, который итеративно удаляет целевую концепцию, используя сигналы от классификатора, одновременно сохраняя другую закодированную информацию в представлении. Метод протестирован на 119 различных сценариях, включая 13 языковых моделей и множество визуальных атрибутов, показав улучшение во всех экспериментах. Предложенные варианты MANCE+ и MANCE++ достигают лучшего соотношения между удалением информации и сохранением функциональности модели, став новым состоянием искусства в нелинейном удалении концепций.'}, 'en': {'title': 'Enhancing Concept Erasure with Manifold Constraints', 'desc': 'The paper introduces the Manifold Constraint Hypothesis (MCH), which suggests that concept erasure in machine learning can be improved by projecting updates onto a lower-dimensional manifold of natural representations. This approach helps to remove a specific concept from a representation while preserving other related information, addressing the challenge of correlated concepts. The authors present a new method called MANifold aware Concept Erasure (MANCE), which iteratively updates representations based on classifier signals and projects these updates onto the estimated manifold. Extensive evaluations demonstrate that MANCE and its enhanced versions, MANCE+ and MANCE++, achieve state-of-the-art results in nonlinear concept removal across various text and vision tasks.'}, 'zh': {'title': '流形约束假设：提升概念消除的有效性', 'desc': '本论文提出了流形约束假设（MCH），旨在通过将更新投影到估计的表示流形上，改善概念消除的效果。概念消除的目标是从表示中去除特定概念，同时保留其他信息，这一过程面临着许多相关概念的干扰。我们提出的MANCE方法通过分类器信号进行迭代更新，并将概念移除的更新投影到估计的流形上，从而更好地保护其他信息。实验结果表明，MANCE在多个文本和视觉任务中表现出色，验证了流形约束假设在概念消除中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.02646', 'title': 'EVA-Client: A Unified Data Collection, Inference, and Deployment Framework for Embodied Policies on Real Robots', 'url': 'https://huggingface.co/papers/2607.02646', 'abstract': 'Abstract EVA-Client is an open-source framework that unifies real-robot policy deployment, data collection, and evaluation through a component-decoupled architecture with inspectable execution workflows.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present EVA-Client, an open-source framework for deployment, data collection, and evaluation of trained manipulation policies on real robots. Sitting between a policy server and the physical hardware, EVA-Client unifies the real-robot stages of the policy iteration loop within a single codebase. It makes three contributions. First, a component-decoupled architecture in which robot backends, inference strategies, and transport middlewares form an orthogonal grid: adding a robot or a strategy touches only its own layer. Second, inspectable execution through Debug, Collect, and Eval workflows, with modes ranging from open-loop simulation to continuous real-time control. Third, every evaluation run doubles as a data collection, recording full rollouts in training-ready format alongside exhaustive logs and a side-by-side comparison viewer, so each evaluation feeds the next round of training rather than ending as an unrecorded impression. EVA-Client further consolidates major real-time inference strategies, synchronous and asynchronous execution, ACT-style temporal ensembling, Real-Time Chunking, and a naive-async ablation baseline, behind a single configuration surface.', 'score': 21, 'issue_id': 2584, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'bb96105e747c3109', 'authors': ['Heqing Yang', 'Yang Yi', 'Liyao Wang', 'Linqing Zhong', 'Donglin Yang', 'Ruipu Wu', 'Zitong Bai', 'Fengjiao Chen', 'Manyuan Zhang', 'Linjiang Huang', 'Si Liu'], 'affiliations': ['Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02646.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#open_source', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Единая платформа для итеративного развития политик манипуляции роботов', 'desc': 'EVA-Client — это открытая платформа для развёртывания обученных политик манипуляции на реальных роботах, которая объединяет этапы развёртывания, сбора данных и оценки в единой кодовой базе. Архитектура фреймворка построена на модульном принципе с ортогональной сеткой компонентов: бэкенды робота, стратегии инференса и промежуточное ПО независимы друг от друга. Платформа предоставляет инспектируемые рабочие процессы (Debug, Collect, Eval) с режимами от симуляции в открытом цикле до непрерывного управления в реальном времени. Каждый цикл оценки автоматически записывает полные траектории в формате, готовом для обучения, с подробными логами и средством сравнения результатов, что позволяет результатам каждой оценки питать следующий раунд обучения.'}, 'en': {'title': 'Streamlining Robot Policy Deployment and Evaluation', 'desc': 'EVA-Client is an open-source framework designed to streamline the deployment, data collection, and evaluation of manipulation policies on real robots. It features a component-decoupled architecture that allows for easy integration of different robot backends and inference strategies without affecting other components. The framework includes inspectable execution workflows that support various modes, from simulation to real-time control, enhancing the debugging and evaluation process. Additionally, each evaluation run serves as a data collection opportunity, ensuring that insights gained feed back into the training process, thus improving the overall learning loop.'}, 'zh': {'title': '统一真实机器人策略的开源框架', 'desc': 'EVA-Client是一个开源框架，旨在统一真实机器人策略的部署、数据收集和评估。它采用了组件解耦的架构，使得机器人后端、推理策略和传输中间件可以独立工作，便于添加新机器人或策略。该框架提供了可检查的执行工作流程，包括调试、收集和评估，支持从开放循环仿真到实时控制的多种模式。每次评估运行都同时进行数据收集，记录完整的训练数据和详细日志，为下一轮训练提供支持。'}}}, {'id': 'https://huggingface.co/papers/2607.04988', 'title': 'InternVLA-A1.5: Unifying Understanding, Latent Foresight, and Action for Compositional Generalization', 'url': 'https://huggingface.co/papers/2607.04988', 'abstract': 'Abstract InternVLA-A1.5 integrates pretrained vision-language models with future prediction in latent space to enable efficient robot manipulation with preserved semantics and long-horizon execution.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified models for robot manipulation aim to equip one policy with both the semantic priors of pretrained VLMs and the physical dynamics learned through future prediction. In practice, existing designs tend to erode the semantics of the pretrained backbone, suffer interference among heterogeneous objectives, and learn future prediction from scratch in pixel space, leaving the dynamics priors of pretrained video generators unexploited. We present InternVLA-A1.5, which builds the policy on a native VLM backbone that keeps training on VQA and subtask prediction, and attaches a lightweight unified expert for continuous action generation. Future prediction is recast as a latent-querying problem, where a small set of learnable foresight tokens condenses the task-relevant future into a compact latent code under the supervision of a frozen pretrained video generation model, so the policy inherits world-model dynamics priors without ever learning pixel-level generation. The video branch is discarded at inference, keeping real-time control. Pretrained on 1.2M robot episodes and 3M multimodal samples, InternVLA-A1.5 achieves the best overall results on all six simulation benchmarks. In the real world, the preserved semantics deliver the strongest compositional generalization on held-out instruction bindings, and the two designs together sustain long-horizon execution.', 'score': 17, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '6ce96e73e471dc5b', 'authors': ['Haoxiang Ma', 'Junhao Cai', 'Xiaoxu Xu', 'Hao Li', 'Yuyin Yang', 'Yang Tian', 'Jiafei Cao', 'Hongrui Zhu', 'Zherui Qiu', 'Zhaxizhuoma', 'Yuqiang Yang', 'Jiaqi Peng', 'Xueyuan Wei', 'Yangkun Zhu', 'Jiahao Jiang', 'Xing Gao', 'Hanqing Wang', 'Feng Yuan', 'Kailin Li', 'Xueyue Zhu', 'Tai Wang', 'Yan Ding', 'Jiangmiao Pang', 'Jia Zeng', 'Jingjing Zhang', 'Bowen Zhou', 'Yao Mu', 'Chunhua Shen', 'Weinan Zhang'], 'affiliations': ['Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2607.04988.jpg', 'data': {'categories': ['#video', '#training', '#multimodal', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Семантический робот через гибридное предсказание скрытых состояний', 'desc': 'InternVLA-A1.5 — это модель для управления роботами, которая объединяет предобученные видеоязыковые модели с предсказанием будущих состояний в скрытом пространстве. В отличие от существующих подходов, система сохраняет семантические знания предобученного backbone и эффективно использует динамические приоры видеогенераторов через механизм latent-querying. Предсказание будущего реализуется как задача сжатия информации о будущем в компактный скрытый код с помощью обучаемых токенов foresight, контролируемых замороженной моделью видеогенерации. Такая архитектура позволяет избежать обучения пиксель-уровневой генерации и достичь эффективного управления в реальном времени благодаря композиционной обобщаемости и долгоскоростной планировке действий.'}, 'en': {'title': 'Efficient Robot Manipulation with Semantic Preservation and Future Prediction', 'desc': 'InternVLA-A1.5 is a machine learning model that combines pretrained vision-language models (VLMs) with future prediction to enhance robot manipulation tasks. It maintains the semantic understanding from VLMs while also learning physical dynamics through a novel latent-querying approach, which uses foresight tokens to predict future actions without needing to generate pixel-level data. This method allows the model to leverage existing knowledge from pretrained video generators, improving efficiency and performance in real-time control scenarios. The model has been trained on a large dataset and demonstrates superior results in both simulation and real-world applications, particularly in maintaining compositional generalization and executing long-horizon tasks.'}, 'zh': {'title': '智能机器人操作的新突破', 'desc': 'InternVLA-A1.5 是一种将预训练的视觉-语言模型与潜在空间中的未来预测相结合的机器人操作方法。它通过保持语义和长时间执行的能力，提升了机器人在复杂任务中的表现。该方法利用轻量级的统一专家生成连续动作，并通过学习未来相关的潜在代码来继承世界模型的动态先验。经过在大量机器人和多模态样本上的预训练，InternVLA-A1.5 在六个仿真基准测试中取得了最佳结果。'}}}, {'id': 'https://huggingface.co/papers/2607.04605', 'title': 'Do All Visual Tokens Matter Equally? Object-Evidence Preserving Token Merging for Vision-Language Retrieval', 'url': 'https://huggingface.co/papers/2607.04605', 'abstract': 'Abstract Object-aware token merging framework SaMer compresses image-side tokens while preserving query-selectable visual evidence, achieving significant storage reduction and improved retrieval performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-vector vision-language retrieval preserves fine-grained visual evidence through maximum-similarity late interaction, but dense image-side tokens make storage and scoring expensive. Existing token compression methods reduce this cost, yet they can remove or collapse object- and region-level evidence that future query tokens may need to select. We propose SaMer, an object-aware token merging framework that compresses image-side post-projector tokens into K representative centroids while preserving the original late-interaction interface. SaMer uses object annotations only during training as a merge prior to discourage cross-instance mixing, requires no ground-truth bounding boxes or detectors at inference time, and adapts only the shared projection layer with frozen vision and language backbones. With K=64, SaMer removes more than 93% of image-side tokens and reduces ColPali storage by 16.09times, while improving R@1 on Flickr30K and MSCOCO. These gains arise because object-aware merging preserves query-selectable object evidence that pruning or feature-only pooling can remove or collapse. SaMer also outperforms compression baselines and shows stronger phrase-level grounding, suggesting that efficient multi-vector retrieval depends not only on reducing token count, but on preserving the evidence future query tokens need to select.', 'score': 14, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'fb8c08df9018d651', 'authors': ['Suhyeong Park', 'Junha Jung', 'Jungwoo Park', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences Inc.', 'Korea University', 'The Catholic University of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.04605.jpg', 'data': {'categories': ['#rag', '#optimization', '#multimodal', '#cv', '#inference'], 'emoji': '🎯', 'ru': {'title': 'Эффективная компрессия через объектно-ориентированное слияние токенов', 'desc': 'В статье предлагается SaMer — фреймворк объектно-ориентированного слияния токенов для компрессии изображений в многовекторной vision-language retrieval системе. Метод использует аннотации объектов во время обучения как приоритет слияния, чтобы избежать смешивания информации из разных объектов, а во время инференса работает без детекторов и bounding boxes. При К=64 SaMer удаляет более 93% токенов изображения и уменьшает хранилище ColPali в 16 раз, одновременно улучшая качество поиска на бенчмарках Flickr30K и MSCOCO. Ключевое преимущество метода заключается в том, что он сохраняет релевантную для запроса информацию об объектах, которую традиционные методы сжатия теряют.'}, 'en': {'title': 'Efficient Token Compression with Object Awareness', 'desc': 'The paper introduces SaMer, a framework designed to compress image-side tokens in a way that maintains important visual information for future queries. By merging tokens into representative centroids while keeping the original interaction structure intact, SaMer significantly reduces storage needs and enhances retrieval performance. It achieves this without requiring ground-truth bounding boxes during inference, making it more efficient. The results show that SaMer can remove over 93% of tokens while improving retrieval accuracy on popular datasets like Flickr30K and MSCOCO.'}, 'zh': {'title': '面向对象的令牌合并，提升检索效率', 'desc': 'SaMer是一种面向对象的令牌合并框架，旨在压缩图像侧的令牌，同时保留可供查询选择的视觉证据，从而显著减少存储需求并提高检索性能。该方法通过最大相似度的后期交互，保持细粒度的视觉证据，但密集的图像侧令牌使得存储和评分成本高昂。SaMer在训练过程中仅使用对象注释作为合并先验，避免了实例间的混合，并在推理时不需要真实的边界框或检测器。通过将图像侧的令牌压缩为K个代表性中心，SaMer在保持查询选择对象证据的同时，显著提高了检索效果。'}}}, {'id': 'https://huggingface.co/papers/2607.05061', 'title': 'KVpop -- Key-Value Cache Compression with Predictive Online Pruning', 'url': 'https://huggingface.co/papers/2607.05061', 'abstract': 'Abstract KVpop learns optimal key-value cache eviction by directly supervising keep-or-drop decisions using future-attention targets, achieving high performance with reduced memory usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Key-value (KV) cache growth is a major bottleneck in autoregressive decoding, as memory and bandwidth scale linearly with context length. Existing KV eviction methods often rely on static heuristics or proxy scores, which poorly track future token utility and cause brittle eviction as relevance shifts. To address this, we introduce KVpop, which learns a fixed-budget KV eviction policy by directly supervising the keep-or-drop decision. The scorer is trained against a novel future-attention target, computed efficiently without materializing dense attention maps. We further introduce a delayed memory-based scorer that, uniquely among learned eviction methods, defers scoring for a fixed number of steps to exploit near-future context. On AIME and HMMT mathematical reasoning, KVpop retains 98% of full-attention performance on Qwen3-4B at 75% KV cache compression and 97% at 88% compression, consistently outperforming established eviction baselines. Qwen3-8B shows even stronger results, reaching near-full teacher performance. These results show that supervising eviction with future-attention signals cuts memory costs while maintaining quality.', 'score': 12, 'issue_id': 2585, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '381ad61d6cbba1b2', 'authors': ['Lukas Hauzenberger', 'Niklas Schmidinger', 'Anamaria-Roberta Hartl', 'David Stap', 'Thomas Schmied', 'Sebastian Böck', 'Günter Klambauer', 'Sepp Hochreiter'], 'affiliations': ['Johannes Kepler University Linz', 'NXAI'], 'pdf_title_img': 'assets/pdf/title_img/2607.05061.jpg', 'data': {'categories': ['#inference', '#optimization', '#training', '#small_models', '#long_context'], 'emoji': '💾', 'ru': {'title': 'Обучаемое вытеснение из KV-кэша через сигналы будущего внимания', 'desc': 'KVpop — это метод обучения оптимальной политики вытеснения из кэша ключ-значение (KV) при автоматическом декодировании языковых моделей. Вместо использования статических эвристик, метод обучает скорер принимать решения о сохранении или удалении записей кэша, используя сигналы будущего внимания в качестве целевых меток. Оригинальная идея заключается в использовании отложенного скорера, который откладывает оценку на несколько шагов вперёд, чтобы лучше предсказать релевантность токена в контексте. На задачах математического рассуждения метод достигает сжатия кэша на 75-88% при сохранении 97-98% качества полного внимания.'}, 'en': {'title': 'Optimizing Cache Eviction with Future-Attention Signals', 'desc': 'The paper introduces KVpop, a machine learning approach that optimizes key-value (KV) cache eviction in autoregressive models. It directly supervises the decision to keep or drop cache entries using future-attention targets, which helps in predicting the utility of tokens more accurately. Unlike traditional methods that rely on static heuristics, KVpop adapts to changing relevance by employing a delayed memory-based scorer that considers near-future context. The results demonstrate that KVpop significantly reduces memory usage while maintaining high performance, achieving up to 98% of full-attention performance with substantial cache compression.'}, 'zh': {'title': 'KVpop：优化键值缓存驱逐的未来注意力学习', 'desc': 'KVpop是一种通过直接监督保留或丢弃决策来学习最佳键值缓存驱逐的方法，能够在减少内存使用的同时实现高性能。现有的键值驱逐方法通常依赖静态启发式或代理评分，无法有效跟踪未来令牌的效用，导致驱逐不稳定。KVpop通过引入新颖的未来注意力目标来训练评分器，能够高效计算而无需生成密集的注意力图。实验结果表明，KVpop在保持高性能的同时，显著降低了内存成本。'}}}, {'id': 'https://huggingface.co/papers/2607.04428', 'title': 'dOPSD: On-Policy Self-Distillation for Diffusion Language Models', 'url': 'https://huggingface.co/papers/2607.04428', 'abstract': "Abstract Diffusion large language models face challenges in reasoning enhancement through post-training, but a novel on-policy self-distillation method using internal denoising trajectories improves mathematical reasoning and code generation performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion large language models (dLLMs) generate text by iteratively denoising a masked sequence, offering a parallel alternative to autoregressive models, but eliciting strong reasoning through post-training remains difficult: supervised fine-tuning is off-policy and suffers from exposure bias, while reinforcement learning gives only sparse, sequence-level rewards and is hard to apply without tractable sequence likelihoods. On-policy self-distillation (OPSD) offers a promising alternative, using one model as both student and teacher to provide dense, token-level, on-policy supervision, but its effectiveness hinges on giving the teacher privileged information (PI) - typically an instance-specific ground-truth reference unavailable at inference - so the student ends up distilling a weak PI-free consensus policy that yields little improvement on dLLM reasoning. We introduce dOPSD, which instead derives the teacher's privilege directly from the student's own denoising trajectory, evaluating masked positions using later, more-decoded steps of that same trajectory rather than an external label, so the teacher's advantage emerges from the model's own decoding process; on Dream and LLaDA, dOPSD improves both in-domain math reasoning and out-of-domain code generation, outperforming supervised and on-policy baselines.", 'score': 12, 'issue_id': 2584, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'edf1485217fa46f3', 'authors': ['Phuong Tuan Dat', 'Qi Li', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.04428.jpg', 'data': {'categories': ['#training', '#optimization', '#plp', '#reasoning', '#math', '#diffusion'], 'emoji': '🔄', 'ru': {'title': 'Самодистилляция диффузионных моделей через собственные траектории денойзинга', 'desc': 'Статья описывает проблему улучшения способности к рассуждению в диффузионных больших языковых моделях через обучение после предварительной подготовки. Авторы предлагают метод on-policy самодистилляции (dOPSD), который использует внутренние траектории денойзинга модели для создания плотного, на политике обучающего сигнала на уровне токенов. В отличие от традиционного подхода, где учитель использует внешние эталонные ответы, в dOPSD привилегированная информация извлекается непосредственно из собственного процесса декодирования модели. Экспериментальные результаты показывают, что метод улучшает как математическое рассуждение, так и генерацию кода, превосходя базовые методы обучения с учителем и методы на политике.'}, 'en': {'title': 'Empowering Reasoning in dLLMs with Self-Distillation', 'desc': "This paper presents a new method called dOPSD that enhances the reasoning capabilities of diffusion large language models (dLLMs) through on-policy self-distillation. Traditional methods struggle with reasoning due to issues like exposure bias and sparse rewards, making it hard to improve performance after initial training. dOPSD innovatively uses the model's own denoising trajectory to provide better supervision, allowing the model to learn from its own decoding process rather than relying on external labels. As a result, this approach significantly boosts performance in mathematical reasoning and code generation tasks compared to existing methods."}, 'zh': {'title': '自蒸馏提升推理能力的新方法', 'desc': '这篇论文探讨了扩散大语言模型在后期训练中增强推理能力的挑战。提出了一种新的在线自蒸馏方法（dOPSD），通过利用模型自身的去噪轨迹来改进数学推理和代码生成性能。与传统的监督微调和强化学习方法相比，dOPSD能够提供更密集的、基于令牌的监督，从而提高推理效果。实验结果表明，dOPSD在数学推理和代码生成任务上均优于现有的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2607.05352', 'title': 'Multiplayer Interactive World Models with Representation Autoencoders', 'url': 'https://huggingface.co/papers/2607.05352', 'abstract': "Abstract A large-scale multiplayer world model trained on extensive gameplay data demonstrates stable long-horizon rollouts in a complex physics-based environment while maintaining coherence across multiple agents' actions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce the first multiplayer world model for highly dynamic environments governed by complex physical interactions. Whereas single-player world models treat the other agents as part of the environment, ours conditions on the action streams of multiple agents, learning to attribute changes in the scene to the correct player and to stay coherent under arbitrary combinations of their actions. We study this problem in the game of Rocket League, where players compete and cooperate under fast, tightly coupled dynamics. Trained on 10,000 hours of gameplay collected with publicly available bots, our 5-billion-parameter latent diffusion model generates four-player matches in real time, producing 20 frames per second on a single Nvidia B200 GPU. Although trained only on short clips, its rollouts stay stable far beyond the training horizon: distributional quality holds steady out to five minutes, the longest horizon we measure, and in practice we observe rollouts continuing for hours with no sign of collapse. We systematically investigate the central design choices: the video codec, the generative objective, and the multiplayer conditioning scheme. In addition, we characterize how behavior changes with model and data scale, including the capabilities that emerge and the failure modes that persist. We further develop targeted evaluations that probe the model's physical understanding rather than visual appearance alone. To support continued research on multiplayer world models, we release our dataset, our full training and inference codebase, and a live demo.", 'score': 10, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '760f7398ee64af0f', 'authors': ['Anthony Hu', 'Václav Volhejn', 'Adrien Ramanana Rahary', 'Chris Mulder', 'Aditya Makkar', 'Amélie Royer', 'Manu Orsini', 'Alyx Liao', 'Adam Jelley', 'Eloi Alonso', 'Florian Laurent', 'Fredrik Norén', 'James Swingos', 'Jan Hünermann', 'Kent Rollins', 'Lucas Hosseini', 'Matthieu Le Cauchois', 'Maxim Peter', 'Pim de Witte', 'Tim Brown', 'Vincent Micheli', 'Moritz Böhle', 'Gabriel de Marmiesse', 'Viktoriia Sharmanska', 'Lucia Specia', 'Michael Black', 'Patrick Pérez'], 'affiliations': ['Epic Games', 'Kyutai'], 'pdf_title_img': 'assets/pdf/title_img/2607.05352.jpg', 'data': {'categories': ['#video', '#training', '#games', '#benchmark', '#open_source', '#dataset', '#diffusion'], 'emoji': '🚀', 'ru': {'title': 'Мировая модель для многоагентных игр с физикой, обученная на реальном геймплее', 'desc': 'Авторы представляют первую мировую модель для многоагентных сценариев в высокодинамичных окружениях с комплексной физикой. Модель представляет собой пятимиллиардный диффузионный генератор, обученный на 10 000 часах геймплея в Rocket League, который обусловлен потоками действий всех игроков и корректно атрибутирует изменения сцены каждому агенту. Модель генерирует матчи четырёх игроков в реальном времени со стабильными роллаутами, превосходящими горизонт обучения: качество генерации остаётся устойчивым до пяти минут, а на практике наблюдаются роллауты длительностью часов без коллапса. Исследование включает анализ ключевых архитектурных решений, изучение масштабируемости и разработку специализированных метрик для оценки физического понимания модели.'}, 'en': {'title': 'Revolutionizing Multiplayer Dynamics with Stable World Models', 'desc': "This paper presents a novel multiplayer world model designed for complex environments where multiple agents interact dynamically. Unlike traditional single-player models, this approach conditions on the actions of all agents, allowing it to accurately attribute changes in the environment to specific players. The model, trained on extensive gameplay data from Rocket League, demonstrates impressive stability in long-term predictions, maintaining coherence in agent interactions over extended periods. The authors also provide insights into the model's design choices and its performance, contributing valuable resources for future research in multiplayer environments."}, 'zh': {'title': '多玩家世界模型：稳定的长时间模拟', 'desc': '这篇论文介绍了一种新的多玩家世界模型，能够在复杂的物理环境中进行稳定的长时间模拟。与单人世界模型不同，该模型能够根据多个代理的动作流进行条件学习，从而准确归因场景变化。研究在《火箭联盟》游戏中进行，模型在10,000小时的游戏数据上训练，能够实时生成四人比赛。尽管只在短片段上训练，该模型的模拟结果在五分钟内保持稳定，且在实际应用中可以持续数小时而不崩溃。'}}}, {'id': 'https://huggingface.co/papers/2607.00597', 'title': 'Multi-Turn Agentic Scientific Literature Search via Workflow Induction', 'url': 'https://huggingface.co/papers/2607.00597', 'abstract': "Abstract paper pilot is a multi-turn literature search agent that uses executable workflows to improve search accuracy and reduce errors by incorporating user feedback and controlled workflow corruption training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific literature search often requires more than retrieving papers from a single query: users' intents are underspecified, preference-dependent, and evolve through interaction. Existing search agents typically rely on fixed pipelines or implicit language-only reasoning, making their search strategies difficult to control, inspect, and refine. We introduce PaperPilot, a multi-turn literature search agent that frames scientific search as workflow induction. Given an anchor paper and a user query, PaperPilot constructs an executable DAG of paper-search operators, including keyword search, citation expansion, filtering, scoring, reranking, and evidence extraction. User feedback is then used to refine both the query and the workflow itself. We train PaperPilot with supervised workflow imitation and preference optimization over controlled workflow corruptions. Experiments show that PaperPilot-9B improves over the base Qwen3.5-9B toolset agent under multi-turn interaction, increasing Hit@5 from 58.0 to 77.0, MRR from 47.5 to 59.4, and nDCG@10 from 26.8 to 32.5, while reducing workflow execution errors from 9.5% to 0%. These results show that explicit, editable search workflows provide an effective and controllable interface for aligning literature search agents with complex scientific intent.", 'score': 9, 'issue_id': 2585, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'b4671cb330b88c52', 'authors': ['Jisen Li', 'Bingxuan Li', 'Nanyi Jiang', 'Xuying Ning', 'Xiyao Wang', 'Yifan Shen', 'Heng Wang', 'Yuqing Jian', 'Xiaoxia Wu', 'Ben Athiwaratkun', 'Pan Lu', 'Jiaxuan You', 'Bingxin Zhao'], 'affiliations': ['Stanford University', 'Together AI', 'University of Illinois Urbana-Champaign', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2607.00597.jpg', 'data': {'categories': ['#training', '#dataset', '#agents', '#small_models'], 'emoji': '🔍', 'ru': {'title': 'Явные редактируемые рабочие процессы для контролируемого поиска научной литературы', 'desc': 'PaperPilot — это многоходовой агент на основе LLM для поиска научной литературы, который представляет поиск как индукцию исполняемых рабочих процессов. Система строит направленный ациклический граф операторов поиска (поиск по ключевым словам, расширение цитирований, фильтрация, ранжирование), позволяя пользователю уточнять запрос и сам рабочий процесс через обратную связь. Модель обучается с помощью имитационного обучения и оптимизации предпочтений на контролируемо повреждённых рабочих процессах. Результаты показывают значительное улучшение метрик поиска (Hit@5 с 58.0 до 77.0) и полное устранение ошибок выполнения рабочего процесса при сохранении прозрачности и редактируемости системы.'}, 'en': {'title': 'Enhancing Literature Search with Interactive Workflows', 'desc': 'The paper introduces PaperPilot, a multi-turn literature search agent designed to enhance the accuracy of scientific literature searches. It utilizes executable workflows that adapt based on user feedback, allowing for a more interactive and refined search process. By framing the search as workflow induction, PaperPilot constructs a directed acyclic graph (DAG) of search operations, which can be adjusted according to user preferences. The results demonstrate significant improvements in search performance metrics and a reduction in execution errors, showcasing the effectiveness of controlled workflows in aligning search agents with user intent.'}, 'zh': {'title': 'PaperPilot：智能文献搜索的新方式', 'desc': 'PaperPilot 是一个多轮文献搜索代理，旨在通过用户反馈和受控工作流腐蚀训练来提高搜索准确性并减少错误。它将科学搜索视为工作流归纳，构建可执行的有向无环图（DAG），包括关键词搜索、引用扩展、过滤、评分、重排序和证据提取等操作。通过用户反馈，PaperPilot 能够不断优化查询和工作流，从而更好地满足用户的需求。实验结果表明，PaperPilot 在多轮交互中显著提高了搜索性能，同时减少了工作流执行错误。'}}}, {'id': 'https://huggingface.co/papers/2607.03524', 'title': 'Perceptual Flow Matching for Few-Step Generative Modeling', 'url': 'https://huggingface.co/papers/2607.03524', 'abstract': 'Abstract Perceptual Flow Matching enables efficient few-step generation by supervising flow matching in perceptual feature space, achieving high-quality results with reduced sampling steps and improved accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose Perceptual Flow Matching (PFM), a simple yet effective framework for few-step generation in flow-matching models. Rather than performing velocity regression in the conventional VAE latent space, PFM supervises flow matching in a perceptual feature space using pretrained perceptual models. This simple change substantially improves the few-step generation capability of flow-matching models, reducing the number of sampling steps from 35-50 to 4-8 while preserving generation quality. Unlike existing acceleration and distillation approaches, PFM requires neither teacher models nor auxiliary score networks and can be integrated into standard flow-matching training pipelines with minimal modifications. Extensive experiments on image generation, video generation, and image editing tasks demonstrate that PFM consistently produces high-quality results while producing fewer artifacts than existing distillation-based methods. We further show that perceptual supervision shifts the regression minimizer from mean-seeking to mode-seeking, biasing predictions toward on-manifold modes that remain accurate under coarse few-step integration. Our results reveal that standard flow-matching training can naturally yield high-quality few-step generators when supervised in an appropriate representation space. We hope this insight inspires future research into representation-aware objectives for efficient generative modeling.', 'score': 8, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'e0ff177c9273fc67', 'authors': ['Chuyang Zhao', 'Yifei Song', 'Hongfa Wang', 'Jianlong Yuan', 'Yuan Zhang', 'Siming Fu', 'Zhineng Chen', 'Huilin Deng', 'Haoyang Huang', 'Nan Duan'], 'affiliations': ['Fudan University', 'Joy Future Academy', 'Tsinghua University', 'USTC'], 'pdf_title_img': 'assets/pdf/title_img/2607.03524.jpg', 'data': {'categories': ['#video', '#training', '#multimodal', '#optimization', '#inference', '#diffusion'], 'emoji': '⚡', 'ru': {'title': 'Быстрая генерация в пространстве восприятия', 'desc': 'Авторы предлагают Perceptual Flow Matching (PFM) — метод для эффективной генерации с малым числом шагов в моделях потоковых траекторий. Вместо регрессии скорости в стандартном скрытом пространстве VAE, PFM использует перцептивное представление предобученных моделей для обучения соответствия потоков. Этот подход значительно сокращает количество шагов выборки с 35-50 до 4-8, сохраняя качество генерации, и не требует использования учителей или дополнительных вспомогательных сетей. Перцептивная супервизия смещает оптимизацию с поиска среднего значения к поиску модального пика, что обес
