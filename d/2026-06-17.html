    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.18216', 'title': 'Zone of Proximal Policy Optimization: Teacher in Prompts, Not Gradients', 'url': 'https://huggingface.co/papers/2606.18216', 'abstract': "Abstract Zone of Proximal Policy Optimization (ZPPO) improves knowledge distillation by using reformulated prompts that help students learn from both correct and incorrect responses, enhancing performance especially at smaller model sizes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Knowledge distillation transfers a teacher's competence to a small student but is brittle in the small-student regime: forcing the student to imitate logits from a much larger teacher concentrates it on the teacher's sharpest modes, hurting generalization on benchmark families beyond the training corpus. Reinforcement learning (RL) avoids logit imitation by training on the student's own rollouts. However, on questions where every rollout fails-yielding zero advantage and being silently discarded-injecting a stronger teacher's response into the policy gradient breaks the on-policy assumption and induces drift. We introduce Zone of Proximal Policy Optimization (ZPPO), inspired by Vygotsky's zone of proximal development, which keeps the teacher inside the prompt rather than the policy gradient. On hard questions, ZPPO constructs two reformulated prompts: a Binary Candidate-included Question (BCQ) pairs one correct teacher response with one incorrect student response as anonymized candidates the student must discriminate, and a Negative Candidate-included Question (NCQ) aggregates the student's wrong rollouts into a single prompt to surface their shared failure modes. A prompt replay buffer recirculates each hard question until it either graduates-the student's mean rollout accuracy on it reaches half- or is FIFO-evicted under finite capacity, amplifying BCQ and NCQ inside the student's current zone of proximal development. On the Qwen3.5 family at four student scales (0.8B-9B) with a 27B teacher, post-trained as vision-language models and evaluated on a 31-benchmark suite (16 VLM, 10 LLM, 5 Video), ZPPO outperforms off/on-policy distillation and GRPO, with the largest gains at the smallest scale.", 'score': 28, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4097529149e4add6', 'authors': ['Byung-Kwan Lee', 'Ximing Lu', 'Shizhe Diao', 'Minki Kang', 'Saurav Muralidharan', 'Karan Sapra', 'Andrew Tao', 'Pavlo Molchanov', 'Yejin Choi', 'Yu-Chiang Frank Wang', 'Ryo Hachiuma'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.18216.jpg', 'data': {'categories': ['#training', '#video', '#small_models', '#rlhf', '#multimodal'], 'emoji': '🎓', 'ru': {'title': 'Учитель в промпте: ZPPO для дистилляции через зону ближайшего развития', 'desc': 'В статье предложен новый метод Zone of Proximal Policy Optimization (ZPPO) для улучшения дистилляции знаний, который вдохновлен зоной ближайшего развития Выготского. Вместо того чтобы заставлять студент копировать логиты учителя, метод размещает учителя внутри промпта, создавая специальные вопросы с кандидатами (BCQ и NCQ), которые помогают студенту различать правильные и неправильные ответы. Алгоритм использует буфер повтора для циклирования сложных вопросов, пока студент не научится их решать или они не будут вытеснены из памяти. Экспериментальные результаты показывают, что ZPPO превосходит существующие методы дистилляции, особенно для малых моделей (0.8B-9B параметров) при обучении у большого учителя (27B параметров).'}, 'en': {'title': 'Empowering Small Models with ZPPO for Better Learning', 'desc': "The paper introduces Zone of Proximal Policy Optimization (ZPPO), a method that enhances knowledge distillation by using specially designed prompts to help smaller models learn from both correct and incorrect answers. This approach addresses the limitations of traditional distillation, where smaller models struggle to generalize due to imitating a larger teacher's outputs too closely. ZPPO employs two types of prompts: Binary Candidate-included Questions (BCQ) and Negative Candidate-included Questions (NCQ), which help students identify and learn from their mistakes. The method shows significant performance improvements, particularly for smaller models, when evaluated across various benchmarks."}, 'zh': {'title': '区域近端策略优化：提升小模型学习能力的关键', 'desc': '区域近端策略优化（ZPPO）通过重新设计的提示，改善了知识蒸馏，使学生能够从正确和错误的回答中学习，尤其在小模型上表现更佳。知识蒸馏将教师的能力转移到小学生身上，但在小学生的情况下容易出现问题。强化学习（RL）通过训练学生自己的回合来避免模仿教师的输出，但在每次回合都失败的问题上，注入教师的强响应会破坏策略梯度的假设。ZPPO通过构建两个重新设计的提示，帮助学生在困难问题上更好地学习，提升了学生的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.17861', 'title': 'GameCraft-Bench: Can Agents Build Playable Games End-to-End in a Real Game Engine?', 'url': 'https://huggingface.co/papers/2606.17861', 'abstract': 'Abstract End-to-end game generation presents significant challenges for coding agents, requiring them to create complete playable games from natural language descriptions while meeting specific evaluation criteria for engine grounding, artifact completeness, and interactive verification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Game generation is an emerging application of coding agents, requiring models to transform natural-language specifications into playable interactive systems. Unlike traditional coding tasks, game generation takes place within a game engine, where scripts, scenes, assets, rendering, and runtime interactions must jointly produce coherent gameplay. We formalize end-to-end game generation as the problem of producing a complete game artifact that realizes a specification through observable player-game interaction in a target environment. We argue that evaluating this setting requires three desiderata: Engine Grounding, Artifact Completeness, and Interactive Verification. We propose an interaction-grounded evaluation framework that assesses executable gameplay through replayed demonstrations and rubric-guided multimodal judging. We instantiate this framework as GameCraft-Bench, a benchmark comprising 140 Godot tasks across 15 game families. Evaluations of frontier coding agents show that end-to-end game generation remains highly challenging: the strongest agent achieves only 41.46%, and most agents score below 40%. Further analysis reveals that while agents often implement recognizable mechanics, they struggle to deliver complete games with sufficient content, functional visual feedback, and coherent presentation. See https://tongxuluo.github.io/gamecraft-bench-website for demos, code, and data.', 'score': 25, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'cc900eb14c4c70f2', 'authors': ['Tongxu Luo', 'Rongsheng Wang', 'Jiaxi Bi', 'Chenming Xu', 'Zhengyang Tang', 'Jianlong Chen', 'Juhao Liang', 'Ke Ji', 'Shuqi Guo', 'Yuhao Du', 'Fan Bu', 'Wenyu Du', 'Xiaotong Zhang', 'Kyle Li', 'Shaobo Wang', 'Linfeng Zhang', 'Yuxuan Liu', 'Xin Lai', 'Chenxin Li', 'Yiduo Guo', 'Zhexin Zhang', 'Xinyuan Wang', 'Tianyi Bai', 'Ziniu Li', 'Benyou Wang'], 'affiliations': ['DualverseAI', 'Hunyuan Team, Tencent', 'NUS', 'SJTU', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen', 'USTB'], 'pdf_title_img': 'assets/pdf/title_img/2606.17861.jpg', 'data': {'categories': ['#agents', '#plp', '#games', '#open_source', '#video', '#benchmark'], 'emoji': '🎮', 'ru': {'title': 'От описания к игре: оценка способности агентов создавать полноценные интерактивные системы', 'desc': 'В работе представлена задача автоматической генерации полноценных игр с использованием кодирующих агентов на основе естественного языка. Авторы формализуют проблему как создание完完整игровых артефактов, которые должны работать в игровом движке и быть проверяемыми через интерактивное взаимодействие с игроком. Предложена комплексная система оценки с тремя критериями: привязка к движку, полнота артефакта и интерактивная верификация. Создан бенчмарк GameCraft-Bench с 140 задачами на движке Godot, где даже самые мощные кодирующие агенты достигают только 41.46% успеха.'}, 'en': {'title': 'Transforming Words into Playable Worlds: The Challenge of Game Generation', 'desc': 'This paper addresses the challenges of end-to-end game generation using coding agents that convert natural language descriptions into playable games. It emphasizes the need for a comprehensive evaluation framework that includes engine grounding, artifact completeness, and interactive verification to assess the quality of generated games. The authors introduce GameCraft-Bench, a benchmark with 140 tasks designed to evaluate coding agents across various game genres. Despite advancements, the results indicate that current agents struggle to produce fully functional games, often lacking in content and coherent gameplay.'}, 'zh': {'title': '端到端游戏生成的挑战与评估', 'desc': '本文探讨了端到端游戏生成的挑战，要求编码代理从自然语言描述中创建完整的可玩游戏。游戏生成需要在游戏引擎中进行，涉及脚本、场景、资产、渲染和运行时交互的协调。我们提出了一个评估框架，强调引擎基础、工件完整性和交互验证，以评估可执行的游戏玩法。通过GameCraft-Bench基准测试，我们发现当前的编码代理在生成完整游戏方面仍面临重大困难。'}}}, {'id': 'https://huggingface.co/papers/2606.17200', 'title': 'ACE-Ego-0: Unifying Egocentric Human and Robotic Data for VLA Pretraining', 'url': 'https://huggingface.co/papers/2606.17200', 'abstract': 'Abstract A unified Vision-Language-Action pretraining framework leverages heterogeneous data sources including human egocentric videos and robot trajectories through a reliability-aware training approach that improves performance on embodied AI tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models benefit from large-scale and diverse embodied data, yet scaling robot trajectory collection is costly and labor-intensive. Recent advances show that large-scale egocentric human videos provide complementary real-world supervision in pretraining. However, joint training on human and robot data remains challenging due to divergences in action spaces, embodiment structures, temporal dynamics, and supervision quality. We introduce ACE-EGO-0, a unified VLA pretraining framework jointly leveraging heterogeneous data sources. To extract large-scale pretraining supervision from egocentric human videos, we build a scalable egocentric video-to-action pipeline that converts raw human videos into robot-format pseudo-action trajectories. To make these labels comparable with robot demonstrations, ACE-EGO-0 uses a unified action representation based on camera-space actions, morphology conditioning, and time-aligned action chunking. To robustly leverage noisy pseudo-action supervision from egocentric human videos, we formulate a reliability-aware training objective with a human auxiliary loss that concentrates supervision on reliable signals. We instantiate ACE-EGO-0 on 4.53K hours of robot and simulation data, together with 1.48K hours of pseudo-action-labeled egocentric human data. Experiments show that incorporating large-scale human supervision under reliability-aware weighting consistently improves both unified joint pretraining and supervised fine-tuning. ACE-EGO-0 achieves state-of-the-art performance on RoboCasa GR1 TableTop and RoboTwin 2.0, while demonstrating strong transfer to real-world bimanual manipulation.', 'score': 25, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '34733f28b27e239e', 'authors': ['Hao Li', 'Ganlong Zhao', 'Yufei Liu', 'Haotian Hou', 'Guoquan Ye', 'Tongyan Fang', 'Chunxiao Liu', 'Siyuan Huang', 'Jianbo Liu', 'Xiaogang Wang', 'Hongsheng Li'], 'affiliations': ['ACE Robotics', 'CUHK MMLab', 'CUHK, Shenzhen', 'SJTU', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2606.17200.jpg', 'data': {'categories': ['#dataset', '#training', '#cv', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Обучение роботов на человеческих действиях через надежное взвешивание данных', 'desc': 'В работе представлена единая предварительная обучающая система ACE-EGO-0, которая интегрирует данные из эгоцентрических видео людей и траекторий роботов для обучения моделей Vision-Language-Action. Основная проблема заключается в несовместимости данных из разных источников — разные пространства действий, структуры морфологии и качество разметки. Авторы решают эту задачу через унифицированное представление действий в пространстве камеры и разработку надежного метода обучения с вспомогательной функцией потерь, которая взвешивает важность каждого образца. Система достигает лучших результатов на бенчмарках RoboCasa и RoboTwin, успешно используя 1.48K часов синтетических разметок из человеческих видео в дополнение к данным роботов.'}, 'en': {'title': 'Bridging Human and Robot Learning for Enhanced AI Action Understanding', 'desc': 'This paper presents ACE-EGO-0, a new framework for pretraining models that understand both vision and language in the context of actions. It combines data from human videos and robot trajectories to improve performance in embodied AI tasks. The framework addresses challenges in aligning different action representations and ensures that the training focuses on reliable data through a specialized objective. By leveraging a large dataset of human and robot actions, ACE-EGO-0 achieves top performance in various robotic manipulation tasks.'}, 'zh': {'title': '统一视觉-语言-动作预训练框架的创新', 'desc': '本文提出了一种统一的视觉-语言-动作预训练框架，利用人类自我中心视频和机器人轨迹等异构数据源，通过可靠性感知的训练方法来提升在具身人工智能任务上的表现。该框架ACE-EGO-0能够将原始人类视频转换为机器人格式的伪动作轨迹，从而提取大规模的预训练监督信号。为了使这些标签与机器人演示可比，ACE-EGO-0采用了基于相机空间动作的统一动作表示。实验结果表明，在可靠性感知加权下，结合大规模人类监督显著提高了联合预训练和监督微调的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.09030', 'title': 'TRIAGE: Dialectical Reasoning for Explainable Risk Prediction on Irregularly Sampled Medical Time Series with LLMs', 'url': 'https://huggingface.co/papers/2606.09030', 'abstract': 'Abstract A framework called TRIAGE is proposed to improve clinical early warning systems by training large language models to generate dialectical reasoning for continuous risk scoring with better calibration and interpretability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Clinical early warning systems built on electronic health records, in which clinical observations are recorded as irregularly sampled medical time series (ISMTS), must deliver both calibrated risk scores for patient triage and interpretable rationales that clinicians can verify. Large Language Models (LLMs) have been explored for this task, yet they collapse graded clinical risk into overconfident binary predictions. This risk polarization undermines both calibration and cross-patient comparability. To address this, we propose TRIAGE, a framework that trains an LLM to generate dialectical reasoning over competing clinical outcomes by eliciting outcome-specific rationales. This dialectical formulation mitigates risk polarization, enabling a single LLM to yield continuous risk scores grounded in explicit clinical reasoning. Evaluated on three ISMTS benchmarks, TRIAGE achieves an average AUPRC improvement of 3.3% and reduces calibration error by 81% compared to the competitive baselines. An LLM-as-a-judge assessment further shows that our rationales surpass post-hoc explanations from the baseline by 20% in clinical reasoning quality. The source code is available at https://github.com/HyeongWon-Jang/TRIAGE .', 'score': 23, 'issue_id': 2444, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '55ea0ab9408e7978', 'authors': ['Hyeongwon Jang', 'Gyouk Chu', 'Changhun Kim', 'Joonhyung Park', 'Hangyul Yoon', 'Eunho Yang'], 'affiliations': ['AITRICS', 'KAIST', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.09030.jpg', 'data': {'categories': ['#training', '#reasoning', '#open_source', '#healthcare', '#science', '#interpretability', '#benchmark'], 'emoji': '⚕️', 'ru': {'title': 'Диалектические рассуждения в LLM для откалиброванного клинического риска', 'desc': 'В статье предлагается фреймворк TRIAGE для улучшения систем ранней клинической диагностики, который обучает большие языковые модели генерировать диалектические рассуждения над конкурирующими клиническими исходами. Система обрабатывает нерегулярно отсчитанные медицинские временные ряды из электронных медицинских карт и выдает откалиброванные оценки риска для триажа пациентов с интерпретируемыми обоснованиями. Диалектический подход предотвращает чрезмерную уверенность моделей в бинарных предсказаниях и позволяет генерировать непрерывные оценки риска на основе явного клинического рассуждения. На трёх бенчмарках TRIAGE показывает улучшение AUPRC на 3,3% в среднем и снижает ошибку калибровки на 81% по сравнению с базовыми методами.'}, 'en': {'title': 'TRIAGE: Enhancing Clinical Risk Scoring with Dialectical Reasoning', 'desc': 'The paper introduces TRIAGE, a framework designed to enhance clinical early warning systems by utilizing large language models (LLMs) for improved risk scoring. TRIAGE focuses on generating dialectical reasoning, which helps in producing continuous risk scores that are better calibrated and more interpretable for clinicians. By addressing the issue of risk polarization, where LLMs typically provide overconfident binary predictions, TRIAGE allows for nuanced clinical outcomes and rationales. The framework demonstrates significant improvements in risk score accuracy and reasoning quality when evaluated against existing benchmarks.'}, 'zh': {'title': 'TRIAGE：提升临床风险评分的辩证推理框架', 'desc': '本文提出了一种名为TRIAGE的框架，旨在通过训练大型语言模型生成辩证推理，从而改善临床早期预警系统的风险评分。该系统利用电子健康记录中的不规则采样医疗时间序列，提供经过校准的风险评分和可解释的推理。传统的大型语言模型在此任务中往往将风险简化为过于自信的二元预测，导致风险极化，影响了校准和跨患者的可比性。TRIAGE通过生成针对特定结果的推理，减轻了风险极化，使得单一的语言模型能够基于明确的临床推理提供连续的风险评分。'}}}, {'id': 'https://huggingface.co/papers/2606.17628', 'title': 'OPD-Evolver: Cultivating Holistic Agent Evolver via On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.17628', 'abstract': 'Abstract OPD-Evolver is a self-evolving agent framework that combines slow-fast co-evolution with on-policy self-distillation to enhance memory management and policy learning across multiple domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory has become a standard substrate for self-evolving agents, yet retaining experience is not the same as learning how to evolve through it. Existing memory agents can store trajectories, retrieve reflections, or accumulate skills, but often lack the holistic competence to select useful experience, act on it, write reusable knowledge, and maintain a growing repository. We introduce OPD-Evolver, a slow-fast co-evolution framework that cultivates such an agent evolver through on-policy self-distillation. In the fast loop, OPD-Evolver interacts with a four-level memory hierarchy to read, use, write, and maintain experience for rapid test-time evolution. In the slow loop, outcome-calibrated memory attribution and privileged hindsight distill these four abilities into the deployable policy. Across multi-domain benchmarks, OPD-Evolver surpasses memory systems such as ReasoningBank by up to 11.5%, and training-based methods such as Skill0 by ~5.8%. Further analysis shows that OPD-Evolver internalizes high-value experience and memory management, enabling OPD-Evolver-9B to challenge giant counterparts such as Qwen3.5-397B-A17B and Step-3.5-Flash, pointing beyond memory-augmented agents toward genuinely qualified agent evolvers.', 'score': 17, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e788b18d94ef2ac7', 'authors': ['Guibin Zhang', 'Xun Xu', 'Yanwei Yue', 'Zikun Su', 'Wangchunshu Zhou', 'Xiaobin Hu', 'Shuicheng Yan'], 'affiliations': ['Bytedance Inc.', 'LV-NUS Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.17628.jpg', 'data': {'categories': ['#training', '#agents', '#optimization', '#reasoning', '#small_models', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Самоэволюционирующий агент через сопряженную эволюцию памяти и политики', 'desc': 'OPD-Evolver — это фреймворк самоэволюционирующего агента, который использует двухуровневую сопряженную эволюцию (медленный и быстрый контуры) для улучшения управления памятью и обучения политики. В быстром контуре агент взаимодействует с четырехуровневой иерархией памяти для чтения, использования, записи и обслуживания опыта, а в медленном контуре применяется on-policy самодистилляция для интернализации этих навыков в развертываемую политику. Метод показывает превосходство над существующими системами на основе памяти и методами обучения на множестве бенчмарков, превосходя ReasoningBank на 11.5% и методы типа Skill0 на ~5.8%. Результаты демонстрируют, что агент успешно интернализирует высокоценный опыт и управление памятью, позволяя небольшой модели конкурировать с намного более крупными системами.'}, 'en': {'title': 'Empowering Agents to Evolve Through Experience', 'desc': 'OPD-Evolver is a novel framework designed for self-evolving agents that enhances their ability to manage memory and learn policies effectively. It employs a slow-fast co-evolution strategy combined with on-policy self-distillation, allowing the agent to interact with a structured memory system for better experience utilization. The framework enables the agent to not only store and retrieve information but also to select valuable experiences and distill them into actionable knowledge. In tests across various domains, OPD-Evolver demonstrated superior performance compared to existing memory systems and training-based methods, indicating its potential to advance the capabilities of intelligent agents.'}, 'zh': {'title': '自我进化智能体的未来', 'desc': 'OPD-Evolver是一种自我进化的智能体框架，结合了慢速和快速的共同进化以及基于策略的自我蒸馏，以增强多领域的记忆管理和策略学习。该框架通过四级记忆层次结构快速读取、使用、写入和维护经验，从而实现快速的测试时间进化。与现有的记忆系统相比，OPD-Evolver在多领域基准测试中表现出色，超越了ReasoningBank和Skill0等方法。进一步分析表明，OPD-Evolver能够内化高价值经验和记忆管理，推动智能体进化的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.16428', 'title': 'LectūraAgents: A Multi-Agent Framework for Adaptive Personalized AI-Assisted Learning and Embodied Teaching', 'url': 'https://huggingface.co/papers/2606.16428', 'abstract': "Abstract LectūraAgents is a multi-agent framework that enables personalized learning through adaptive embodied teaching by mimicking professor-student interactions and generating coordinated teaching actions aligned with learner profiles.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Effective personalized AI-assisted learning demands systems that can not only generate accurate learner-specific educational materials, but also dynamically adapt their instruction to diverse learners. However, existing educational agents have primarily focused on lecture content automation and simulations, which often fall short of modelling multimodal and embodied instructional methods tailored for the individual learner. To this end, we propose LectūraAgents - a multi-agent framework that enables personalized learning through end-to-end adaptive embodied teaching. At its core, LectūraAgents mirrors a professor-student relationship, in which a ProfessorAgent leads a collaborative team of specialized subordinate agents through research, planning, review, and embodied delivery of lecture contents that adapt to a learner's needs. The framework offers three main contributions: (1) a hierarchical multi-agent architecture for end-to-end personalized learning; (2) an adaptive embodied teaching mechanism, wherein the ProfessorAgent executes visible and pedagogically motivated teaching actions (e.g., handwrite, highlight, underline, etc.) over contents in a teaching environment; and (3) a Teaching Action-Speech Alignment (TASA) algorithm that employs salience-based heuristics and temporal semantic segmentation to generate coherent teaching action sequences aligned with learner profiles. We evaluate LectūraAgents on diverse courses at high school, undergraduate, and graduate levels using sample-specific rubric-based analysis; with generated lecture materials and teaching actions assessed and validated by expert educators. Experimental results show consistent gains in lecture content quality, embodied teaching quality, assessment, and personalization over existing approaches, positioning LectūraAgents as a pedagogically well-grounded framework for personalized learning at scale.", 'score': 17, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '83e27850bc1d2ee2', 'authors': ['Jaward Sesay', 'Yue Yu', 'Siwei Dong', 'Yemin Shi', 'Guangyao Chen', 'Börje F. Karlsson'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Beijing Institute of Technology', 'Cornell University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16428.jpg', 'data': {'categories': [], 'emoji': '👨\u200d🏫', 'ru': {'title': 'Многоагентная система для адаптивного персонализированного обучения с воплощённым преподаванием', 'desc': 'LectūraAgents — это многоагентная система, которая воспроизводит взаимодействие преподавателя и студента для персонализированного обучения. Фреймворк использует иерархическую архитектуру с главным агентом-профессором, координирующим специализированных подагентов для создания и адаптации учебных материалов под потребности конкретного ученика. Система реализует механизм воплощённого обучения, выполняя педагогически мотивированные действия (написание, выделение, подчёркивание) синхронизированно с речью через алгоритм TASA. Экспериментальная оценка на курсах различных уровней показала улучшение качества лекционного контента и эффективности персонализации обучения.'}, 'en': {'title': 'Personalized Learning Through Adaptive Teaching Agents', 'desc': "LectūraAgents is a multi-agent framework designed to enhance personalized learning by simulating professor-student interactions. It utilizes a hierarchical architecture where a leading ProfessorAgent coordinates specialized agents to create and deliver tailored educational content. The framework incorporates an adaptive embodied teaching mechanism, allowing the ProfessorAgent to perform interactive teaching actions that cater to individual learner needs. Additionally, the Teaching Action-Speech Alignment (TASA) algorithm ensures that the generated teaching actions are coherent and aligned with the learner's profile, resulting in improved educational outcomes."}, 'zh': {'title': '个性化学习的新纪元：LectūraAgents', 'desc': 'LectūraAgents 是一个多智能体框架，旨在通过模仿教授与学生的互动，实现个性化学习。该框架能够根据学习者的需求，动态调整教学内容和方式，提供适应性强的教学体验。LectūraAgents 的核心是教授智能体，它带领一组专门的子智能体，通过研究、规划和实施教学内容，确保教学方法符合个体学习者的特点。实验结果表明，LectūraAgents 在讲座内容质量、教学质量和个性化方面均优于现有方法，适合大规模个性化学习。'}}}, {'id': 'https://huggingface.co/papers/2606.15236', 'title': 'Show the Signal, Hide the Noise: Spectral Forcing for Pixel-Space Diffusion', 'url': 'https://huggingface.co/papers/2606.15236', 'abstract': 'Abstract Spectral Forcing, a time-conditional 2D-DCT low-pass operator, improves diffusion model efficiency by explicitly separating signal from noise in pixel-space models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pixel-space diffusion models are trained on full-bandwidth noisy images, yet the useful signal available to the denoiser is strongly frequency dependent. Under rectified-flow diffusion and natural-image power-law spectra, the per-band data-to-noise contour k^{*}(t) = (1-t)^{-2/α} separates a signal-bearing low-frequency region from a noise-dominated high-frequency region at each time t. We show that this implicit coarse-to-fine structure is not merely descriptive: it induces a capacity-allocation problem. A standard pixel-space denoiser must discover the moving bandwidth boundary internally and can spend computation on frequency-time regions where the optimal prediction collapses to deterministic baselines rather than data-distribution modeling. To make this boundary explicit, we introduce Spectral Forcing, a parameter-free, time-conditional 2D-DCT low-pass operator applied to the noisy input before the patch embedder. Its cutoff expands monotonically with the diffusion time and becomes the identity at the data endpoint. Through controlled synthetic experiments, we identify the regime in which the operator is beneficial: coarse patch tokenization and data whose high-frequency content is predominantly noise rather than essential signal. On ImageNet-256 with JiT-700M/32, Spectral Forcing consistently improves both FID and Inception Score across different training epochs, demonstrating robust gains throughout training; at finer tokenization, the spectral forcing is still competitive. We further insert the unchanged operator into SenseNova-U1, a unified text-to-image model, where it improves DPG-Bench and GenEval, showing that the input-side spectral prior transfers beyond class-conditional generation. These results suggest a route to capacity-efficient pixel-space diffusion by showing the signal and hiding the noise.', 'score': 12, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'c1874dc89c433cd9', 'authors': ['Weichen Fan', 'Haiwen Diao', 'Penghao Wu', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15236.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#diffusion', '#cv'], 'emoji': '📊', 'ru': {'title': 'Явное разделение сигнала и шума через спектральную фильтрацию', 'desc': 'В статье предложен метод Spectral Forcing для повышения эффективности диффузионных моделей, которые работают с изображениями в пиксельном пространстве. Авторы показывают, что при обучении таких моделей полезный сигнал и шум распределены неравномерно по частотам, что приводит к неэффективному использованию вычислительных ресурсов моделью. Spectral Forcing - это простой оператор низкочастотной фильтрации на основе дискретного косинусного преобразования, который явно разделяет сигнал от шума до того, как изображение попадает в основную нейросеть. Экспериментальные результаты демонстрируют улучшение качества генерации на ImageNet-256 и в моделях text-to-image без усложнения архитектуры.'}, 'en': {'title': 'Enhancing Diffusion Models by Separating Signal from Noise', 'desc': 'This paper introduces Spectral Forcing, a new method that enhances the efficiency of diffusion models by separating useful signals from noise in image data. It utilizes a time-conditional 2D-DCT low-pass operator to focus on low-frequency regions that carry important information while filtering out high-frequency noise. The authors demonstrate that this approach leads to better performance in generating images, as it allows the model to allocate computational resources more effectively. Experiments show that Spectral Forcing improves key metrics like FID and Inception Score, indicating its potential for enhancing pixel-space diffusion models.'}, 'zh': {'title': '光谱强制：提升扩散模型效率的关键', 'desc': '本论文提出了一种名为光谱强制（Spectral Forcing）的新方法，旨在提高扩散模型的效率。该方法通过在像素空间模型中明确区分信号和噪声，使用时间条件的二维离散余弦变换（2D-DCT）低通算子来处理噪声输入。研究表明，光谱强制能够在不同训练阶段持续改善模型的FID和Inception Score，尤其在高频内容主要为噪声的情况下表现优异。通过将这一方法应用于统一的文本到图像模型，进一步验证了其在生成任务中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.17905', 'title': 'ChLogic: Evaluating Robustness of Logical Reasoning in Chinese Expressions', 'url': 'https://huggingface.co/papers/2606.17905', 'abstract': 'Abstract ChLogic benchmark reveals persistent performance gaps between English and Chinese logical reasoning in large language models, influenced by surface realization differences and translation artifacts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models perform increasingly well on standardized logical reasoning benchmarks, but whether this ability remains robust beyond English is unclear. We introduce ChLogic, an English--Chinese aligned benchmark that tests whether models preserve logical reasoning performance when the same latent logical structure is expressed in English and diverse Chinese surface realizations. Built from formal logical templates, the benchmark contains three data sets: (i) the General aligned set, derived from 60 General Propositions across nine template families; (ii) the Difficult aligned set, derived from 40 Difficult Problems; and (iii) the Chinese-only set, covering 15 language-specific phenomenon types. Each aligned item pairs one English reference expression with five Chinese realizations. Experiments on Qwen3, Ministral, and GLM models reveal a persistent English--Chinese performance gap. Back-translation from standard Chinese into English often improves performance on the General aligned set, but produces mixed effects on the Difficult aligned set, where Qwen3-32B and GLM-5.1 perform worse after translation. These results indicate that Chinese surface realization, translation artifacts, and model-specific behavior jointly affect multilingual logical reasoning. Overall, ChLogic provides a useful stress test for the robustness of multilingual reasoning.', 'score': 5, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e76af59d386b7a80', 'authors': ['Peixian Zhou', 'Yuxu Chen', 'Chaorui Zhang', 'Wei Han', 'Bo Bai', 'Xueyan Niu'], 'affiliations': ['College of Mathematics, Sichuan University, China', 'Theory Lab, 2012 Labs, Huawei Technologies Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2606.17905.jpg', 'data': {'categories': ['#dataset', '#multilingual', '#reasoning', '#translation', '#low_resource', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Выявление разрывов в логическом мышлении между английским и китайским языками в больших языковых моделях', 'desc': 'В работе представлен бенчмарк ChLogic для оценки логического рассуждения в многоязычных больших языковых моделях. Бенчмарк содержит выравненные пары задач на логику на английском и китайском языках, полученные из формальных логических шаблонов, с целью проверить, сохраняют ли модели логические рассуждения при переходе между языками. Эксперименты на моделях Qwen3, Ministral и GLM выявили устойчивый разрыв в производительности между английским и китайским языками, который зависит от способа выражения поверхностной структуры и артефактов перевода. Результаты показывают, что китайская реализация поверхностной структуры, ошибки перевода и особенности конкретных моделей совместно влияют на многоязычное логическое рассуждение.'}, 'en': {'title': 'Bridging the Logic Gap: English vs. Chinese in AI Models', 'desc': 'The ChLogic benchmark investigates how well large language models perform logical reasoning in both English and Chinese. It highlights that there are significant performance gaps between the two languages, which are influenced by differences in how sentences are structured and translated. The benchmark consists of three datasets that test models on their ability to maintain logical reasoning across English and various Chinese expressions. Results show that while back-translation can help in some cases, it can also hinder performance, indicating that language-specific factors and model characteristics play a crucial role in multilingual reasoning.'}, 'zh': {'title': '多语言逻辑推理的挑战与机遇', 'desc': 'ChLogic基准测试揭示了大型语言模型在英语和中文逻辑推理之间存在持续的性能差距。这种差距受到表面实现差异和翻译伪影的影响。我们构建了ChLogic基准，测试模型在不同语言表述下是否能保持逻辑推理能力。实验结果表明，中文的表面实现和翻译过程对多语言逻辑推理的影响是复杂的。'}}}, {'id': 'https://huggingface.co/papers/2606.16154', 'title': 'A Gradient Perspective on RLVR Stability and Winner Advantage Policy Optimization', 'url': 'https://huggingface.co/papers/2606.16154', 'abstract': 'Abstract Training instability in reinforcement learning with verifiable rewards is analyzed through token-level gradient dynamics, leading to a stable policy optimization method that updates only on positive-advantage completions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning with verifiable rewards (RLVR) improves language-model reasoning, but GRPO-style optimization remains prone to collapse. We analyse this instability through token-level gradient dynamics, deriving a taxonomy that predicts how updates affect next-token probabilities and entropy. The taxonomy shows that stability depends jointly on the advantage sign and token distribution under the current policy. Motivated by this finding, we propose Winner Advantage Policy Optimization (WAPO), a simple online clipped policy-gradient objective that updates only on positive-advantage completions. Across mathematical reasoning and multi-hop QA benchmarks, WAPO improves training stability and matches or outperforms baselines across multiple model families. Full code can be found at https://github.com/layer6ai-labs/wapo.', 'score': 5, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'd40d60f12b0fe974', 'authors': ['Prasanth YSS', 'Zhichen Ren', 'Rasa Hosseinzadeh', 'Ilan Gofman', 'Yuqi Chen', 'Zhaoyan Liu', 'Guangwei Yu', 'Jesse C. Cresswell', 'Satya Krishna Gorti'], 'affiliations': ['Layer 6 AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.16154.jpg', 'data': {'categories': ['#training', '#optimization', '#rl', '#reasoning', '#open_source', '#architecture'], 'emoji': '⚖️', 'ru': {'title': 'Стабилизация обучения языковых моделей через оптимизацию с положительным преимуществом', 'desc': 'В работе анализируется нестабильность обучения в reinforcement learning с проверяемыми вознаграждениями через динамику градиентов на уровне токенов. Авторы предлагают классификацию, которая предсказывает, как обновления влияют на вероятности следующего токена и энтропию политики. На основе этого анализа разработан метод Winner Advantage Policy Optimization (WAPO), который обновляет политику только на основе примеров с положительным преимуществом. Экспериментально показано, что WAPO повышает стабильность обучения и превосходит baseline методы на задачах математического рассуждения и многошагового вопросно-ответного взаимодействия.'}, 'en': {'title': 'Stabilizing Reinforcement Learning with Positive Advantage Updates', 'desc': 'This paper addresses the challenges of training stability in reinforcement learning with verifiable rewards (RLVR). It examines how token-level gradient dynamics can lead to instability in policy optimization, particularly with GRPO-style methods. The authors introduce a new approach called Winner Advantage Policy Optimization (WAPO), which focuses on updating policies only when there are positive advantages. WAPO demonstrates improved stability and performance on various benchmarks, showing its effectiveness in enhancing training processes for language models.'}, 'zh': {'title': '赢家优势策略优化：提升强化学习稳定性', 'desc': '本文分析了在可验证奖励的强化学习中训练不稳定性的问题，特别是通过令牌级梯度动态来研究。我们提出了一种新的策略优化方法，称为赢家优势策略优化（WAPO），该方法仅在正优势完成时进行更新，从而提高了训练的稳定性。研究表明，稳定性与当前策略下的优势符号和令牌分布密切相关。通过在数学推理和多跳问答基准测试中的实验，WAPO在多个模型家族中提高了训练稳定性，并且在性能上与基线相当或更优。'}}}, {'id': 'https://huggingface.co/papers/2606.17730', 'title': 'ActWorld: From Explorable to Interactive World Model via Action-Aware Memory', 'url': 'https://huggingface.co/papers/2606.17730', 'abstract': 'Abstract ActWorld extends navigation-centric interactive world models to support object interaction through a chunk-autoregressive framework with hierarchical action-aware memory and persistent memory banks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Interactive world models aim to simulate environment dynamics under real-time user actions. However, their action vocabulary is largely confined to navigation: most actions correspond to motion (e.g., walk, turn, look around), while interaction with objects in the scene (e.g., pick up plates, open doors, or trigger physical responses) is either absent, restricted to game domains, or relegated to prompt-to-full-video scenarios. The resulting worlds are visually explorable but not truly actionable. In this work, we present ActWorld, an interactive world model that extends prior navigation-centric generators to support mid-rollout object interaction within a chunk-autoregressive framework. We argue that the navigation-interaction gap stems from two bottlenecks. First, a data bottleneck: the lack of human-object interaction data with accurate, dense labels. Second, a memory bottleneck: recency-biased history compression in existing world models discards the event-transition frames that causally determine subsequent object states, leading to an action-forgetting pathology. On the data side, we construct a 100K interaction video dataset, each annotated with per-chunk captions via chain-of-thought reasoning. On the model side, we introduce a hierarchical action-aware memory design that routes history compression by interaction importance, complemented by a persistent memory bank that maintains event-update and object-identity tokens across long rollouts. Experiments show that ActWorld supports both flexible navigation and rich object interaction within a single model, substantially improving interaction fidelity over navigation-only baselines without sacrificing viewpoint control. Project page is available at https://interactwm.github.io/ActWorld.', 'score': 3, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '670da40381704597', 'authors': ['Zhexiao Xiong', 'Yizhi Song', 'Hao Kang', 'Qing Yan', 'Liming Jiang', 'Jenson Yang', 'Zhoujie Fu', 'Stathi Fotiadis', 'Angtian Wang', 'Zichuan Liu', 'Bo Liu', 'Yiding Yang', 'Xin Lu', 'Nathan Jacobs'], 'affiliations': ['Intelligent Creation, ByteDance', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2606.17730.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Мир, в котором можно не только смотреть, но и действовать', 'desc': 'ActWorld — это интерактивная модель мира, которая расширяет возможности навигационно-ориентированных генеративных моделей, добавляя поддержку взаимодействия с объектами в сцене. Авторы выявили две основные проблемы: нехватку данных с аннотациями взаимодействий человека и объектов, а также потерю важной информации при сжатии истории в существующих моделях. Решение включает набор из 100K видео с аннотациями, иерархическую архитектуру памяти, чувствительную к важности действий, и персистентные банки памяти для сохранения ключевых событий. Модель успешно объединяет гибкую навигацию и реалистичное взаимодействие с объектами в единую систему.'}, 'en': {'title': 'Bridging Navigation and Interaction in Virtual Worlds', 'desc': 'ActWorld is a new interactive world model that enhances traditional navigation-focused models by enabling users to interact with objects in a simulated environment. It addresses two main challenges: the lack of detailed human-object interaction data and the limitations of memory in existing models that forget important actions. By creating a large dataset of interaction videos and implementing a hierarchical memory system, ActWorld allows for more complex actions like picking up objects or opening doors while maintaining smooth navigation. This results in a more immersive and actionable experience in virtual environments, bridging the gap between navigation and interaction.'}, 'zh': {'title': '打破导航与交互的界限，开启智能世界新篇章', 'desc': 'ActWorld 是一种扩展导航中心交互世界模型的框架，支持对象交互。它通过分块自回归框架和层次化的动作感知记忆来实现这一点。该模型解决了数据瓶颈和记忆瓶颈的问题，构建了一个包含10万条交互视频的数据集，并引入了持久记忆库。实验表明，ActWorld 在单一模型中支持灵活的导航和丰富的对象交互，显著提高了交互的真实感。'}}}, {'id': 'https://huggingface.co/papers/2606.18208', 'title': 'Looped World Models', 'url': 'https://huggingface.co/papers/2606.18208', 'abstract': 'Abstract Looped World Models introduce iterative latent state refinement through shared transformer blocks, achieving 100x parameter efficiency while adapting computational depth to prediction complexity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current world models face a fundamental tension: faithful long-horizon simulation demands deep computation, but deeper models are expensive to deploy and prone to compounding errors. We resolve this by introducing Looped World Models (LoopWM), which are the first looped architectures for world modelling. Our method iteratively refines latent environment states through a parameter-shared transformer block. This yield up to 100x parameter efficiency over conventional approaches with adaptive computation that automatically scales depth to match the complexity of each prediction step. Orthogonal to scaling model size and training data, LoopWM establishes iterative latent depth as a new scaling axis for world simulation, which might significantly push the community forward.', 'score': 2, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'e341bbcd047c0815', 'authors': ['Hongyuan Adam Lu', 'Z. L. Victor Wei', 'Qun Zhang', 'Jinrui Zeng', 'Bowen Cao', 'Lingwei Meng', 'Mocheng Li', 'Zezhong Wang', 'Haonan Yin', 'Naifu Xue', 'Minyu Chen', 'Cenyuan Zhang', 'Zefan Zhang', 'Hao Wei', 'Jiawei Zhou', 'Haoran Xu', 'Hao Yang', 'Ronglai Zuo', 'Tongda Xu', 'Yonghao Li', 'Jian Chen', 'Hebin Wang', 'Zeyu Gao', 'Yang Li', 'Wei Zhao', 'Qimin Zhong', 'Siqi Liu', 'Yumeng Zhang', 'Leyan Cui', 'Zhangyu Wang', 'Wai Lam'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.18208.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Эффективное моделирование мира через итеративное уточнение скрытых состояний', 'desc': 'В статье предложены Looped World Models - инновационная архитектура для моделирования окружающей среды, которая итеративно уточняет скрытые состояния через общие блоки трансформера. Метод достигает в 100 раз большей параметрической эффективности по сравнению с традиционными подходами благодаря адаптивному вычислению глубины. Решение позволяет избежать фундаментального противоречия между точностью долгосрочного моделирования и вычислительной сложностью. Таким образом, авторы открывают новое направление масштабирования - итеративную глубину латентного пространства для улучшения симуляции окружающей среды.'}, 'en': {'title': 'Revolutionizing World Models with Efficient Iterative Refinement', 'desc': 'Looped World Models (LoopWM) introduce a novel approach to world modeling by using iterative latent state refinement with shared transformer blocks. This method enhances parameter efficiency by up to 100 times compared to traditional models, allowing for more effective long-horizon simulations without the high computational costs. By adapting the computational depth based on the complexity of each prediction, LoopWM minimizes the risk of compounding errors that often occur in deeper models. This innovative architecture establishes a new dimension for scaling world simulation, potentially advancing the field significantly.'}, 'zh': {'title': '循环世界模型：高效的潜在状态精炼', 'desc': '循环世界模型（Looped World Models）通过共享的变换器块引入了迭代的潜在状态精炼，达到了100倍的参数效率，同时根据预测复杂性调整计算深度。当前的世界模型面临着一个根本性的矛盾：忠实的长时间模拟需要深度计算，但更深的模型部署成本高且容易产生累积误差。我们通过引入循环架构解决了这个问题，使得潜在环境状态能够通过参数共享的变换器块进行迭代精炼。循环世界模型为世界模拟建立了新的迭代潜在深度扩展轴，可能会显著推动该领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2606.18249', 'title': 'Unified Multimodal Autoregressive Modeling with Shared Context-Visual Tokenizer is Key to Unification', 'url': 'https://huggingface.co/papers/2606.18249', 'abstract': 'Abstract UniAR presents a unified autoregressive framework that uses a single discrete visual tokenizer to bridge visual understanding and generation, achieving state-of-the-art results in image generation and editing through multi-level feature fusion, bitwise quantization, and parallel prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified Multimodal Modeling aims to integrate visual understanding and generation within a single system. However, existing approaches typically rely on two disparate visual tokenizers, which splits the representation space and hinders truly unified modeling. We propose UniAR, a unified autoregressive framework where a single discrete visual tokenizer serves as the key bridge between understanding and generation, enabling a shared context in which the model can directly interpret its own generated visual tokens without additional re-encoding. UniAR adapts a pretrained vision encoder with multi-level feature fusion and a lookup-free bitwise quantization scheme, preserving both high-level semantics and low-level details while scaling the effective visual vocabulary at minimal cost. Building on this, the unified autoregressive model adopts parallel-bitwise-prediction to jointly predict spatially grouped, multi-level visual codes, substantially reducing visual sequence length and accelerating generation. Finally, a diffusion-based visual decoder operates on discrete visual tokens to decode high-fidelity images. Through large-scale pre-training, followed by supervised fine-tuning and reinforcement learning, UniAR achieves state-of-the-art performance on image generation and image editing while remaining competitive on multimodal understanding benchmarks. The project page is available at https://sharelab-sii.github.io/uniar-web.', 'score': 2, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4000a90251ade3a2', 'authors': ['Wujian Peng', 'Lingchen Meng', 'Yuxuan Cai', 'Xianwei Zhuang', 'Yuhuan Yang', 'Rongyao Fang', 'Chenfei Wu', 'Junyang Lin', 'Zuxuan Wu', 'Shuai Bai'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Qwen Team, Alibaba Inc.', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.18249.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#diffusion', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единый токенизатор для понимания и создания визуального контента', 'desc': 'UniAR представляет единую авторегрессивную архитектуру, которая использует один дискретный визуальный токенизатор для связи между пониманием и генерацией изображений. Модель применяет многоуровневое слияние признаков и побитовую квантизацию для сохранения как высокоуровневой семантики, так и низкоуровневых деталей. Параллельное предсказание битов позволяет значительно сократить длину визуальной последовательности и ускорить процесс генерации. После предварительного обучения на больших данных, мелкой настройки и обучения с подкреплением модель достигает лучших результатов в генерации и редактировании изображений.'}, 'en': {'title': 'UniAR: Bridging Visual Understanding and Generation with a Unified Tokenizer', 'desc': 'UniAR introduces a novel autoregressive framework that utilizes a single discrete visual tokenizer to enhance both visual understanding and generation. By integrating multi-level feature fusion and a unique bitwise quantization method, it effectively maintains high-level semantics and low-level details in image processing. The model employs parallel-bitwise-prediction to streamline the prediction of visual codes, which accelerates the generation process. As a result, UniAR achieves top-tier performance in image generation and editing tasks while also excelling in multimodal understanding evaluations.'}, 'zh': {'title': '统一自回归框架，连接视觉理解与生成', 'desc': 'UniAR是一个统一的自回归框架，使用单一的离散视觉标记器来连接视觉理解和生成。它通过多层特征融合、逐位量化和并行预测，实现了图像生成和编辑的最先进结果。UniAR的设计使得模型能够直接解释生成的视觉标记，而无需额外的重新编码，从而提高了效率。通过大规模预训练和监督微调，UniAR在图像生成和编辑方面达到了领先的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.18246', 'title': 'Variable-Width Transformers', 'url': 'https://huggingface.co/papers/2606.18246', 'abstract': 'Abstract A novel transformer architecture with nonuniform width allocation across layers achieves better performance and efficiency compared to uniform designs by utilizing a parameter-free residual resizing mechanism.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling model size, specifically depth and width, has driven significant progress in transformer-based language models. However, most architectures maintain a constant width across all layers, allocating a fixed parameter and computation budget evenly despite different layers potentially playing distinct computational roles. In this work, we empirically investigate nonuniform capacity allocation across network depth by proposing a times-shaped > <former architecture. This design maintains wider early and late layers while narrowing the middle layers, utilizing a parameter-free residual resizing mechanism. Across decoder-only language models ranging from 200M to 2B parameters (dense) and 3B parameters (MoE), our > <former consistently outperforms parameter-matched uniform baselines on language modeling loss. By reducing the average layer width, this architecture also requires fewer overall FLOPs (22% reduction under fitted loss-matched scaling curves) and smaller KV cache memory and I/O cost (15% reduction). In analysis, we show that this bottleneck structure results in qualitatively different representations in residual streams. Overall, our results demonstrate that nonuniform width allocation can result in more resource-optimal scaling of language models.', 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '58689a89a0def5b3', 'authors': ['Zhaofeng Wu', 'Oliver Sieberling', 'Shawn Tan', 'Rameswar Panda', 'Yury Polyanskiy', 'Yoon Kim'], 'affiliations': ['MIT', 'MIT-IBM Watson AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.18246.jpg', 'data': {'categories': ['#small_models', '#training', '#optimization', '#architecture'], 'emoji': '⏳', 'ru': {'title': 'Узкое горлышко: оптимальное распределение ширины в трансформерах', 'desc': 'В этой работе предлагается архитектура трансформера с неравномерным распределением ширины слоёв по глубине сети. Авторы показывают, что расширенные ранние и поздние слои в сочетании с узкими средними слоями превосходят стандартные архитектуры с единообразной шириной при одинаковом количестве параметров. Используется параметр-свободный механизм остаточного масштабирования (residual resizing), позволяющий эффективно соединять слои разной размерности. Предложенная архитектура снижает вычислительные затраты на 22% и требует меньше памяти для KV-кеша, демонстрируя преимущества неравномерного распределения ёмкости в языковых моделях.'}, 'en': {'title': 'Optimizing Transformer Efficiency with Nonuniform Layer Widths', 'desc': 'This paper introduces a new transformer architecture that varies the width of layers instead of keeping it constant, which improves both performance and efficiency. By using a parameter-free residual resizing mechanism, the model allocates more resources to the first and last layers while reducing the width of the middle layers. This nonuniform design leads to better language modeling results and requires fewer computational resources, such as FLOPs and memory. The findings suggest that adjusting layer widths based on their roles can optimize the scaling of language models more effectively than traditional uniform designs.'}, 'zh': {'title': '非均匀宽度分配，提升变换器效率', 'desc': '本文提出了一种新型的变换器架构，通过在各层之间采用非均匀的宽度分配，提升了性能和效率。与传统的均匀设计不同，该架构利用无参数的残差调整机制，使得早期和后期层的宽度更大，而中间层的宽度则较小。实验结果表明，这种非均匀的宽度分配在语言建模损失上优于参数匹配的均匀基线，并且减少了整体的计算量和内存开销。总的来说，非均匀宽度分配能够实现更具资源优化的语言模型扩展。'}}}, {'id': 'https://huggingface.co/papers/2606.18023', 'title': 'LoopCoder-v2: Only Loop Once for Efficient Test-Time Computation Scaling', 'url': 'https://huggingface.co/papers/2606.18023', 'abstract': "Abstract Parallel loop Transformers achieve better code generation performance with two loops due to refined representations, while additional loops cause diminishing returns and increased positional mismatch costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Looped Transformers scale latent computation by repeatedly applying shared blocks, but sequential looping increases latency and KV-cache memory with the loop count. Parallel loop Transformers (PLT) alleviate this cost through cross-loop position offsets (CLP) and shared-KV gated sliding-window attention, making loop count a practical design choice. We therefore study PLT loop-count selection through a gain--cost view: an extra loop may refine representations, but CLP also introduces a positional mismatch at each loop boundary. We instantiate this study by training LoopCoder-v2, a family of 7B PLT coders with different loop counts, from scratch on 18T tokens, followed by matched instruction tuning and evaluation. Empirically, the two-loop variant delivers broad gains over the non-looped baseline across code generation, code reasoning, agentic software engineering, and tool-use benchmarks, improving SWE-bench Verified from 43.0 to 64.4 points and Multi-SWE from 14.0 to 31.0 points. In contrast, variants with three or more loops regress, revealing a strongly non-monotonic loop-count effect. Our diagnostics show that loop 2 provides the main productive refinement, while later loops yield diminishing, oscillatory updates and reduced representational diversity. Because the CLP-induced mismatch remains roughly fixed as refinement gains shrink, the offset cost increasingly dominates. This gain--cost trade-off explains PLT's saturation at two loops and provides diagnostics for loop-count selection.", 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '8997ac871bf87b92', 'authors': ['Jian Yang', 'Shawn Guo', 'Wei Zhang', 'Tianyu Zheng', 'Yaxin Du', 'Haau-Sing Li', 'Jiajun Wu', 'Yue Song', 'Yan Xing', 'Qingsong Cai', 'Zelong Huang', 'Chuan Hao', 'Ran Tao', 'Xianglong Liu', 'Wayne Xin Zhao', 'Mingjie Tang', 'Weifeng Lv', 'Ming Zhou', 'Bryan Dai'], 'affiliations': ['Beihang University', 'IQuest Research', 'Langboat', 'Renming University of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.18023.jpg', 'data': {'categories': ['#architecture', '#agents', '#plp', '#training'], 'emoji': '🔄', 'ru': {'title': 'Два цикла - оптимум: параллельные трансформеры для синтеза кода', 'desc': 'В работе изучается использование параллельных циклических блоков в трансформерных моделях для генерации кода, где каждый цикл применяет одинаковые слои для уточнения представлений. Авторы показывают, что два цикла обеспечивают оптимальный баланс между улучшением качества представлений и вычислительными затратами, значительно улучшая производительность на задачах генерации и рассуждения о коде. Добавление третьего цикла и более приводит к регрессии качества, так как выигрыш от уточнения представлений становится меньше, чем потери от позиционного несоответствия на границах циклов. Исследование демонстрирует немонотонный эффект количества циклов и предлагает принципиальный подход к выбору оптимального числа итераций на основе анализа баланса между прибылью и затратами.'}, 'en': {'title': 'Maximizing Code Generation with Optimal Loop Counts', 'desc': 'This paper discusses Parallel Loop Transformers (PLT) which enhance code generation by using two loops for better representation. However, adding more loops leads to diminishing returns and increased costs due to positional mismatches. The authors introduce a method to balance the benefits of additional loops against the costs they incur, particularly focusing on cross-loop position offsets and shared-key value attention. Their experiments with LoopCoder-v2 show that while two loops significantly improve performance, adding more loops can actually degrade results, highlighting the importance of optimal loop count selection.'}, 'zh': {'title': '并行循环变换器：最佳循环次数为二', 'desc': '并行循环变换器（PLT）通过交叉循环位置偏移（CLP）和共享KV门控滑动窗口注意力机制，优化了代码生成性能。研究表明，增加循环次数虽然可以细化表示，但也会引入位置不匹配的成本。通过训练LoopCoder-v2，我们发现两循环变体在代码生成和推理任务中表现优异，而三循环及以上的变体则效果下降。最终，PLT的最佳设计选择是使用两个循环，以平衡收益和成本。'}}}, {'id': 'https://huggingface.co/papers/2606.17321', 'title': 'ProCUA-SFT Technical Report', 'url': 'https://huggingface.co/papers/2606.17321', 'abstract': "Abstract Training computer-use agents using a large-scale synthetic dataset with automated task generation and verification achieves significantly improved performance on desktop interaction benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training computer-use agents (CUAs) -- models that interact with graphical desktops through screenshots and keyboard/mouse actions -- requires large-scale, diverse trajectory data collected in full desktop environments. The largest public resource, AgentNet (22.5K human trajectories), leads to negative transfer when used for supervised fine-tuning (SFT): continuing training UI-TARS 7B on AgentNet causes OSWorld success rate to fall from 26.3% to 8-10%. We present ProCUA-SFT, a dataset of 3.1M step-level SFT samples distilled from 93K synthetic trajectories across 2,484 application combinations. The dataset is produced by a fully automated pipeline that (i) synthesizes grounded tasks on live desktops seeded with real-world content -- 912 spreadsheets from SpreadsheetBench, approximately 10K permissively-licensed presentations from Zenodo10K, and multi-application OSWorld configs -- and (ii) verifies each task's feasibility through binary precondition checking before rollout. A single VLM (Kimi-K2.5) serves as goal generator, precondition judge, and trajectory executor, eliminating planner-actor capability gaps. Each trajectory is expanded into step-prefix samples that exactly reproduce the context layout seen at inference time. Fine-tuning UI-TARS 7B on ProCUA-SFT for one epoch yields 45.0% on OSWorld -- an 18.7 percentage-point improvement over the base model and over 35% above AgentNet-trained counterparts. A subset of ProCUA was incorporated into the training data for the Nemotron 3 Nano Omni model, contributing to its computer-use capabilities.", 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '6eb91e170d1a4828', 'authors': ['Jaehun Jung', 'Ximing Lu', 'Brandon Cui', 'Muhammad Khalifa', 'Shaokun Zhang', 'Hao Zhang', 'Jin Xu', 'Amala Sanjay Deshmukh', 'Karan Sapra', 'Andrew Tao', 'Yejin Choi', 'Jan Kautz', 'Mingjie Liu', 'Yi Dong'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.17321.jpg', 'data': {'categories': ['#dataset', '#training', '#agents', '#open_source', '#synthetic', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Синтетические данные для обучения агентов автоматизации рабочего стола', 'desc': 'В работе представлен метод обучения агентов компьютерного взаимодействия с использованием большого синтетического датасета ProCUA-SFT, содержащего 3.1 млн примеров для supervised fine-tuning. Датасет создан полностью автоматизированным конвейером, который синтезирует задачи на реальных десктопах с проверкой корректности через предусловия, избегая проблемы отрицательного переноса обучения. Одна модель VLM используется для генерации целей, проверки выполнимости и исполнения траекторий, что устраняет разрыв в способностях между планировщиком и исполнителем. Результаты показывают увеличение точности на бенчмарке OSWorld с 26.3% до 45.0%, что превосходит обучение на существующем датасете AgentNet более чем в два раза.'}, 'en': {'title': 'Boosting Computer-Use Agents with Synthetic Data', 'desc': 'This paper introduces ProCUA-SFT, a large-scale synthetic dataset designed to enhance the training of computer-use agents (CUAs) that interact with graphical user interfaces. The dataset consists of 3.1 million step-level samples derived from 93,000 synthetic trajectories across various applications, addressing the limitations of existing datasets like AgentNet. By employing an automated pipeline for task generation and verification, the authors ensure that the tasks are feasible and relevant for training. Fine-tuning the UI-TARS 7B model on this new dataset results in a significant performance boost, demonstrating the effectiveness of synthetic data in improving agent capabilities.'}, 'zh': {'title': '合成数据集提升计算机使用代理性能', 'desc': '本论文介绍了一种名为ProCUA-SFT的数据集，用于训练计算机使用代理（CUA），该数据集包含310万步级的样本，来源于93,000个合成轨迹。通过自动化流程生成的任务在真实桌面环境中进行验证，确保了任务的可行性。与现有的AgentNet数据集相比，使用ProCUA-SFT进行微调可以显著提高模型在桌面交互基准上的表现，成功率从26.3%提升至45.0%。这表明，合成数据集在训练复杂的交互模型中具有重要的应用价值。'}}}, {'id': 'https://huggingface.co/papers/2606.15345', 'title': 'Beyond Monolingual Deep Research: Evaluating Agents and Retrievers with Cross-Lingual BrowseComp-Plus', 'url': 'https://huggingface.co/papers/2606.15345', 'abstract': "Abstract Research agents face significant challenges when evidence is in a different language than the query, with performance degrading even when gold evidence is provided directly.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deep research agents are increasingly evaluated on their ability to search for evidence, reason over retrieved sources, and produce grounded answers. Existing browsing benchmarks, however, largely assume that the user's query and the supporting evidence are written in the same language, leaving open whether agentic search systems can operate when relevant evidence appears in another language. We introduce XBCP (Cross-lingual BrowseComp-Plus), a controlled benchmark that preserves the English question-and-answer space of BrowseComp-Plus but varies the languages of the supporting documents. XBCP instantiates two complementary settings: in the cross-lingual setting, each query is paired with evidence in a single assigned language. In the multilingual setting, the full evidence corpus is distributed equally and randomly across 12 languages spanning high-resource and low-resource regimes. We evaluate four deep research agents using sparse and dense multilingual retrievers, measuring answer accuracy, evidence recall, search behavior, calibration, citation fidelity, and oracle retrieval. Results reveal substantial degradation when evidence is translated. Even strong, dense retrievers lose evidence recall, and agents become less calibrated and cite evidence less reliably. Notably, accuracy remains lower even when all gold evidence is supplied directly. These findings suggest that cross-lingual deep research exposes both retrieval failures and an independent, agent-side difficulty in integrating language-mismatched evidence.", 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'c5f562d63f83c981', 'authors': ['Yuheng Lu', 'Qingcheng Zeng', 'Heli Qi', 'Puxuan Yu', 'Fuheng Zhao', 'Rui Yang', 'Hitomi Yanaka', 'Naoto Yokoya', 'Weihao Xuan'], 'affiliations': ['Duke-NUS Medical School', 'Northwestern University', 'RIKEN AIP', 'Snowflake Inc.', 'The University of Tokyo', 'University of Utah', 'Waseda University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15345.jpg', 'data': {'categories': ['#multilingual', '#rag', '#agents', '#reasoning', '#translation', '#low_resource', '#benchmark'], 'emoji': '🌐', 'ru': {'title': 'Преодоление языковых барьеров в интеллектуальном поиске доказательств', 'desc': 'В работе представлен новый бенчмарк XBCP для оценки способности research агентов работать с доказательствами на других языках. Авторы обнаружили, что современные системы глубокого поиска и рассуждений значительно теряют в производительности, когда запрос и поддерживающие документы написаны на разных языках. Даже при использовании высокоточных многоязычных retrieverов и предоставлении правильных доказательств агенты испытывают трудности с интеграцией информации на иностранных языках и становятся менее калиброванными. Результаты демонстрируют, что кроссязычный поиск выявляет как проблемы в получении релевантных документов, так и внутренние ограничения самих агентов в обработке многоязычного контента.'}, 'en': {'title': 'Bridging Language Gaps in Research Agents', 'desc': "This paper addresses the challenges faced by research agents when they encounter evidence in a different language than the query. It introduces a new benchmark called XBCP, which tests the performance of these agents in both cross-lingual and multilingual settings. The study evaluates various deep research agents using different retrieval methods and measures their accuracy, recall, and citation reliability. Results indicate that performance significantly declines when evidence is in a different language, highlighting issues in both retrieval and the agents' ability to integrate mismatched evidence."}, 'zh': {'title': '跨语言检索的挑战与机遇', 'desc': '本研究探讨了在不同语言之间进行信息检索的挑战，尤其是当查询与证据不在同一语言时，研究代理的表现显著下降。我们提出了XBCP（跨语言浏览比较增强版）基准，旨在评估研究代理在处理多语言证据时的能力。通过对四种深度研究代理进行评估，结果显示即使提供了所有的金证据，代理的准确性仍然较低，且在证据回忆和引用可靠性方面存在显著问题。这表明跨语言深度研究不仅暴露了检索失败，还揭示了代理在整合语言不匹配证据时的独立困难。'}}}, {'id': 'https://huggingface.co/papers/2606.13811', 'title': 'Aligning Quantum Operators with Large Language Models', 'url': 'https://huggingface.co/papers/2606.13811', 'abstract': 'Abstract Large language models can be adapted to understand quantum operators by mapping unitary matrices into their latent space, enabling quantum circuit synthesis and language-conditioned gate constraint specification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Can Large Language Models (LLMs) understand and reason about quantum operators? Despite their remarkable capabilities in mathematics and symbolic reasoning, LLMs remain inherently blind to quantum representations such as unitary matrices. In this work, we take a step toward bridging this gap by introducing an approach that maps unitary operators into the latent space of an LLM, enabling unified modeling over quantum and linguistic inputs. We instantiate this idea on Clifford+T circuit synthesis over a Pauli rotation gate set, where our model achieves results competitive with state-of-the-art methods and scales consistently with training data, with no signs of saturation. Our approach further enables language-conditioned synthesis, allowing gate constraints unseen during training to be specified directly in natural language. This work suggests a path toward quantum--aware foundation models that can natively interpret and reason about quantum operations, which could have broader implications reaching across quantum compilation and algorithm discovery.', 'score': 1, 'issue_id': 2444, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'd0641f36e5220bb2', 'authors': ['Rogerio Feris', 'Yunchao Liu', 'Pengyuan Li', 'Hang Hua', 'David Kremer'], 'affiliations': ['IBM Quantum', 'IBM Research', 'MIT-IBM Computing Research Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.13811.jpg', 'data': {'categories': ['#training', '#reasoning', '#architecture', '#transfer_learning', '#science', '#multimodal'], 'emoji': '⚛️', 'ru': {'title': 'Мосту между языком и квантом: учим LLM понимать квантовые операторы', 'desc': 'В работе предложен метод адаптации большых языковых моделей для понимания квантовых операторов путём отображения унитарных матриц в скрытое пространство LLM. Модель обучается на задаче синтеза квантовых схем Clifford+T над базисом ротаций Паули и показывает результаты, конкурентные с современными методами. Подход поддерживает синтез, управляемый естественным языком, что позволяет задавать ограничения на квантовые вентили непосредственно текстом без переобучения. Работа демонстрирует потенциал создания квантово-осведомленных фундаментальных моделей, способных интерпретировать и рассуждать о квантовых операциях, с применениями в квантовой компиляции и открытии алгоритмов.'}, 'en': {'title': 'Bridging Language and Quantum: LLMs Meet Unitary Operators', 'desc': 'This paper explores how large language models (LLMs) can be adapted to understand quantum operators by mapping unitary matrices into their latent space. This adaptation allows for the synthesis of quantum circuits and the specification of gate constraints using natural language. The authors demonstrate their method on Clifford+T circuit synthesis, achieving competitive results with existing techniques while effectively scaling with training data. The findings suggest a future where LLMs can natively interpret quantum operations, potentially impacting quantum compilation and algorithm discovery.'}, 'zh': {'title': '量子算子的语言理解新突破', 'desc': '本研究探讨了大型语言模型（LLMs）如何理解量子算子。我们提出了一种方法，将单位矩阵映射到LLM的潜在空间，从而实现量子电路的合成和语言条件下的门约束指定。通过在Clifford+T电路合成中应用该方法，我们的模型在与最先进的方法竞争时表现出色，并且随着训练数据的增加，性能持续提升。此研究为量子感知基础模型的开发提供了新思路，使其能够原生地解释和推理量子操作。'}}}, {'id': 'https://huggingface.co/papers/2606.15142', 'title': 'MotionVLA: Vision-Language-Action Model for Humanoid Motion', 'url': 'https://huggingface.co/papers/2606.15142', 'abstract': 'Abstract A dual-stream frequency tokenizer and autoregressive model are proposed to improve humanoid motion generation by separately encoding pose and physical dynamics, achieving better diversity and consistency compared to single-codebook approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating realistic humanoid motion from scene images and text involves both low-frequency pose semantics and high-frequency physical dynamics. However, many existing methods tokenize motion with a single shared codebook, forcing heterogeneous motion signals into the same quantization space. Our frequency-domain analysis of human motion data reveals a clear mismatch between single-codebook quantization and motion statistics: five DCT coefficients capture 93% of joint-position energy but only 37% of joint-velocity energy, which can bias quantization toward pose statistics and under-represent high-frequency velocity components. A second challenge lies in adapting a standard autoregressive model to effectively model high-frequency physical signals in motion sequences. Therefore, we propose DSFT, a dual-stream frequency tokenizer that separates motion into Base and physical streams and compresses them independently with DCT truncation and BPE. Furthermore, we present MotionVLA, a Qwen3.5-based model that arranges Base and physical tokens in a unified sequence, where Phys tokens are predicted after Base tokens. Experiments on HumanML3D and MBench show that, despite using a lightweight 2B backbone, MotionVLA reduces the Diversity gap to real data by over 50% on HumanML3D and improves Motion-Condition Consistency by 3.8% on MBench, supporting frequency-aware dual-stream decoupling
