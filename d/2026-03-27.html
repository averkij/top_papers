    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.25040', 'title': 'Intern-S1-Pro: Scientific Multimodal Foundation Model at Trillion Scale', 'url': 'https://huggingface.co/papers/2603.25040', 'abstract': 'Abstract Intern-S1-Pro is a one-trillion-parameter scientific multimodal foundation model that enhances general and scientific capabilities through advanced agent functionalities and specialized task mastery across multiple scientific disciplines.  AI-generated summary We introduce Intern-S1-Pro, the first one-trillion-parameter scientific multimodal foundation model. Scaling to this unprecedented size, the model delivers a comprehensive enhancement across both general and scientific domains. Beyond stronger reasoning and image-text understanding capabilities, its intelligence is augmented with advanced agent capabilities. Simultaneously, its scientific expertise has been vastly expanded to master over 100 specialized tasks across critical science fields, including chemistry, materials, life sciences, and earth sciences. Achieving this massive scale is made possible by the robust infrastructure support of XTuner and LMDeploy, which facilitates highly efficient Reinforcement Learning (RL) training at the 1-trillion parameter level while ensuring strict precision consistency between training and inference. By seamlessly integrating these advancements, Intern-S1-Pro further fortifies the fusion of general and specialized intelligence, working as a Specializable Generalist, demonstrating its position in the top tier of open-source models for general capabilities, while outperforming proprietary models in the depth of specialized scientific tasks.', 'score': 29, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '8cf9621fde199c51', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#optimization', '#multimodal', '#open_source', '#rl', '#agents', '#inference', '#science', '#reasoning'], 'emoji': '🔬', 'ru': {'title': 'Триллион параметров для науки: специализированный универсалист', 'desc': 'Intern-S1-Pro представляет собой мультимодальную фундаментальную модель с триллионом параметров, специализирующуюся на научных задачах. Модель сочетает в себе мощные возможности обработки текста и изображений с расширенными агентскими функциями, позволяющими выполнять сложные многошаговые задачи. Система овладела более чем 100 специализированными задачами в различных научных дисциплинах: химии, материаловедении, биологии и науках о Земле. Достижение такого масштаба было возможно благодаря использованию инфраструктуры XTuner и LMDeploy для эффективного обучения с подкреплением при сохранении численной точности.'}, 'en': {'title': 'Intern-S1-Pro: A Trillion-Parameter Leap in Scientific Intelligence', 'desc': 'Intern-S1-Pro is a groundbreaking multimodal foundation model with one trillion parameters, designed to enhance both general and scientific intelligence. It excels in reasoning and image-text understanding, while also incorporating advanced agent functionalities for improved task execution. The model has been trained to master over 100 specialized scientific tasks across various fields, such as chemistry and life sciences. Its development leverages efficient Reinforcement Learning techniques and robust infrastructure, ensuring high precision and performance, positioning it as a leading open-source model in both general and specialized domains.'}, 'zh': {'title': '一万亿参数的科学多模态模型，推动智能与专业的融合', 'desc': 'Intern-S1-Pro是一个拥有一万亿参数的科学多模态基础模型，旨在通过先进的智能体功能和专业任务掌握来增强其通用和科学能力。该模型在推理和图像-文本理解方面表现出色，并具备强大的智能体能力。它在化学、材料、生命科学和地球科学等关键科学领域，掌握了超过100个专业任务。通过XTuner和LMDeploy的强大基础设施支持，Intern-S1-Pro实现了高效的强化学习训练，确保了训练和推理之间的精度一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.25319', 'title': 'MACRO: Advancing Multi-Reference Image Generation with Structured Long-Context Data', 'url': 'https://huggingface.co/papers/2603.25319', 'abstract': 'Abstract A large-scale dataset and benchmark are introduced to address limitations in multi-reference image generation by providing structured long-context supervision and standardized evaluation protocols.  AI-generated summary Generating images conditioned on multiple visual references is critical for real-world applications such as multi-subject composition, narrative illustration, and novel view synthesis, yet current models suffer from severe performance degradation as the number of input references grows. We identify the root cause as a fundamental data bottleneck: existing datasets are dominated by single- or few-reference pairs and lack the structured, long-context supervision needed to learn dense inter-reference dependencies. To address this, we introduce MacroData, a large-scale dataset of 400K samples, each containing up to 10 reference images, systematically organized across four complementary dimensions -- Customization, Illustration, Spatial reasoning, and Temporal dynamics -- to provide comprehensive coverage of the multi-reference generation space. Recognizing the concurrent absence of standardized evaluation protocols, we further propose MacroBench, a benchmark of 4,000 samples that assesses generative coherence across graded task dimensions and input scales. Extensive experiments show that fine-tuning on MacroData yields substantial improvements in multi-reference generation, and ablation studies further reveal synergistic benefits of cross-task co-training and effective strategies for handling long-context complexity. The dataset and benchmark will be publicly released.', 'score': 12, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '2deb4c847883f52a', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#benchmark', '#cv', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Структурированный датасет для овладения генерацией многоссылочных изображений', 'desc': 'В работе представлены MacroData — крупномасштабный датасет из 400 тысяч примеров для задачи генерации изображений по нескольким визуальным ссылкам, где каждый пример содержит до 10 опорных изображений. Датасет систематически организован по четырём направлениям: кастомизация, иллюстрация, пространственное рассуждение и временная динамика, обеспечивая полное покрытие пространства задач многоссылочной генерации. Авторы также предлагают MacroBench — стандартизированный бенчмарк из 4000 образцов для оценки согласованности генерируемых изображений при различных масштабах входных данных. Экспериментальные результаты демонстрируют значительные улучшения в качестве генерации после дообучения на новом датасете и выявляют синергетические эффекты совместного обучения на нескольких задачах.'}, 'en': {'title': 'Empowering Multi-Reference Image Generation with MacroData and MacroBench', 'desc': 'This paper introduces a new large-scale dataset called MacroData, which contains 400,000 samples for multi-reference image generation, addressing the limitations of existing datasets that focus on single or few references. The dataset is organized into four dimensions: Customization, Illustration, Spatial reasoning, and Temporal dynamics, allowing models to learn complex relationships between multiple reference images. Additionally, the authors present MacroBench, a benchmark with 4,000 samples designed to evaluate generative models on their ability to maintain coherence across various tasks and input scales. Experiments demonstrate that training on MacroData significantly enhances performance in multi-reference generation, highlighting the importance of structured long-context supervision.'}, 'zh': {'title': '多参考图像生成的新突破', 'desc': '本文介绍了一个大型数据集和基准，旨在解决多参考图像生成中的局限性。通过提供结构化的长上下文监督和标准化的评估协议，帮助模型更好地处理多个输入参考。我们提出的MacroData数据集包含40万个样本，每个样本最多包含10个参考图像，系统地组织在四个互补维度上。通过在MacroData上进行微调，实验表明多参考生成的性能显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.24755', 'title': 'SlopCodeBench: Benchmarking How Coding Agents Degrade Over Long-Horizon Iterative Tasks', 'url': 'https://huggingface.co/papers/2603.24755', 'abstract': "Abstract Software development is iterative, yet agentic coding benchmarks overwhelmingly evaluate single-shot solutions against complete specifications. Code can pass the test suite but become progressively harder to extend. Recent iterative benchmarks attempt to close this gap, but constrain the agent's design decisions too tightly to faithfully measure how code quality shapes future extensions. We introduce SlopCodeBench, a language-agnostic benchmark comprising 20 problems and 93 checkpoints, in which agents repeatedly extend their own prior solutions under evolving specifications that force architectural decisions without prescribing internal structure. We track two trajectory-level quality signals: verbosity, the fraction of redundant or duplicated code, and structural erosion, the share of complexity mass concentrated in high-complexity functions. No agent solves any problem end-to-end across 11 models; the highest checkpoint solve rate is 17.2%. Quality degrades steadily: erosion rises in 80% of trajectories and verbosity in 89.8%. Against 48 open-source Python repositories, agent code is 2.2x more verbose and markedly more eroded. Tracking 20 of those repositories over time shows that human code stays flat, while agent code deteriorates with each iteration. A prompt-intervention study shows that initial quality can be improved, but it does not halt degradation. These results demonstrate that pass-rate benchmarks systematically undermeasure extension robustness, and that current agents lack the design discipline iterative software development demands.  AI-generated summary Software development is iterative, yet agentic coding benchmarks overwhelmingly evaluate single-shot solutions against complete specifications. Code can pass the test suite but become progressively harder to extend. Recent iterative benchmarks attempt to close this gap, but constrain the agent's design decisions too tightly to faithfully measure how code quality shapes future extensions. We introduce SlopCodeBench, a language-agnostic benchmark comprising 20 problems and 93 checkpoints, in which agents repeatedly extend their own prior solutions under evolving specifications that force architectural decisions without prescribing internal structure. We track two trajectory-level quality signals: verbosity, the fraction of redundant or duplicated code, and structural erosion, the share of complexity mass concentrated in high-complexity functions. No agent solves any problem end-to-end across 11 models; the highest checkpoint solve rate is 17.2%. Quality degrades steadily: erosion rises in 80% of trajectories and verbosity in 89.8%. Against 48 open-source Python repositories, agent code is 2.2x more verbose and markedly more eroded. Tracking 20 of those repositories over time shows that human code stays flat, while agent code deteriorates with each iteration. A prompt-intervention study shows that initial quality can be improved, but it does not halt degradation. These results demonstrate that pass-rate benchmarks systematically undermeasure extension robustness, and that current agents lack the design discipline iterative software development demands.", 'score': 6, 'issue_id': 1682, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '1bbaa5f1beebbfcd', 'authors': ['Gabriel Orlanski', 'Devjeet Roy', 'Alexander Yun', 'Changho Shin', 'Alex Gu', 'Albert Ge', 'Dyah Adila', 'Frederic Sala', 'Aws Albarghouthi'], 'affiliations': ['MIT', 'University of Wisconsin-Madison', 'Washington State University'], 'pdf_title_img': 'assets/pdf/title_img/2603.24755.jpg', 'data': {'categories': ['#open_source', '#agents', '#plp', '#dataset', '#benchmark'], 'emoji': '📉', 'ru': {'title': 'Как AI-агенты теряют контроль над кодом при итеративной разработке', 'desc': 'В статье представлен новый бенчмарк SlopCodeBench для оценки способности AI-агентов разрабатывать код итеративно, то есть постепенно расширяя существующее решение при изменяющихся требованиях. Авторы отслеживают качество кода через две метрики: многословность (дублирование кода) и структурную эрозию (концентрацию сложности в отдельных функциях). Результаты показывают, что современные LLM-модели плохо справляются с длительными задачами разработки: качество кода неуклонно деградирует с каждой итерацией, в то время как код человека остаётся стабильным. Исследование демонстрирует, что существующие метрики оценивают агентов неполно и что AI-системам не хватает архитектурной дисциплины для настоящей разработки ПО.'}, 'en': {'title': 'Evaluating Iterative Code Quality with SlopCodeBench', 'desc': 'This paper introduces SlopCodeBench, a new benchmark designed to evaluate the iterative coding capabilities of agents. Unlike traditional benchmarks that focus on single-shot solutions, SlopCodeBench allows agents to extend their previous code under changing specifications, which better reflects real-world software development. The study measures two key quality indicators: verbosity, which indicates redundant code, and structural erosion, which shows how complexity accumulates in certain functions. Results reveal that agent-generated code tends to be more verbose and eroded over time compared to human-written code, highlighting the need for better design practices in agent coding.'}, 'zh': {'title': '迭代开发中的代码质量挑战', 'desc': '本论文介绍了SlopCodeBench，这是一个与语言无关的基准测试，包含20个问题和93个检查点，旨在评估代码在迭代开发中的质量。研究发现，尽管代码可以通过测试套件，但在扩展时变得越来越困难，且代码的冗余性和复杂性逐渐增加。通过对比48个开源Python代码库，发现代理生成的代码比人类代码更冗长且结构更差。结果表明，现有的基准测试未能有效衡量代码扩展的稳健性，当前的代理缺乏迭代软件开发所需的设计规范。'}}}, {'id': 'https://huggingface.co/papers/2603.23516', 'title': 'MSA: Memory Sparse Attention for Efficient End-to-End Memory Model Scaling to 100M Tokens', 'url': 'https://huggingface.co/papers/2603.23516', 'abstract': 'Abstract Memory Sparse Attention (MSA) enables large language models to process extremely long contexts with linear complexity and high efficiency through innovations like sparse attention and document-wise RoPE.  AI-generated summary Long-term memory is a cornerstone of human intelligence. Enabling AI to process lifetime-scale information remains a long-standing pursuit in   the field. Due to the constraints of full-attention architectures, the effective context length of large language models (LLMs) is typically   limited to 1M tokens. Existing approaches, such as hybrid linear attention, fixed-size memory states (e.g., RNNs), and external storage   methods like RAG or agent systems, attempt to extend this limit. However, they often suffer from severe precision degradation and rapidly   increasing latency as context length grows, an inability to dynamically modify memory content, or a lack of end-to-end optimization. These   bottlenecks impede complex scenarios like large-corpus summarization, Digital Twins, and long-history agent reasoning, while limiting memory   capacity and slowing inference. We present Memory Sparse Attention (MSA), an end-to-end trainable, efficient, and massively scalable memory   model framework. Through core innovations including scalable sparse attention and document-wise RoPE, MSA achieves linear complexity in both   training and inference while maintaining exceptional stability, exhibiting less than 9% degradation when scaling from 16K to 100M tokens.   Furthermore, KV cache compression, combined with Memory Parallel, enables 100M-token inference on 2xA800 GPUs. We also propose Memory   Interleaving to facilitate complex multi-hop reasoning across scattered memory segments. MSA significantly surpasses frontier LLMs,   state-of-the-art RAG systems, and leading memory agents in long-context benchmarks. These results demonstrate that by decoupling memory   capacity from reasoning, MSA provides a scalable foundation to endow general-purpose models with intrinsic, lifetime-scale memory.', 'score': 5, 'issue_id': 1682, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '0395e9106b6ff65e', 'authors': ['Yu Chen', 'Runkai Chen', 'Sheng Yi', 'Xinda Zhao', 'Xiaohong Li', 'Jianjin Zhang', 'Jun Sun', 'Chuanrui Hu', 'Yunyun Han', 'Lidong Bing', 'Yafeng Deng', 'Tianqiao Chen'], 'affiliations': ['Evermind', 'Peking University', 'Shanda Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.23516.jpg', 'data': {'categories': ['#optimization', '#rag', '#agents', '#inference', '#architecture', '#reasoning', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Линейная память без границ: внимание, которое масштабируется на сто миллионов токенов', 'desc': 'В статье представляется Memory Sparse Attention (MSA) — фреймворк для обработки экстремально длинных контекстов в большых языковых моделях с линейной сложностью вычислений. Основные инновации включают разреженное внимание и документарное позиционное кодирование RoPE, которые позволяют обрабатывать до 100 миллионов токенов с минимальной деградацией качества. Метод использует сжатие KV-кеша и параллельную память для эффективного выполнения на доступном оборудовании, поддерживая сложные многошаговые рассуждения через разреженные сегменты памяти. Предложенный подход превосходит существующие системы RAG и агентов, обеспечивая масштабируемую долгосрочную память для языковых моделей без потери производительности.'}, 'en': {'title': 'Unlocking Infinite Memory for AI with MSA', 'desc': 'Memory Sparse Attention (MSA) is a new framework that allows large language models to efficiently handle very long contexts with linear complexity. It introduces innovations like sparse attention and document-wise RoPE, which help maintain performance even as the context length increases significantly. Unlike previous methods that struggle with precision and speed, MSA enables dynamic memory content modification and end-to-end optimization. This makes it particularly effective for complex tasks such as summarizing large corpuses and reasoning over extensive historical data.'}, 'zh': {'title': '记忆稀疏注意力：赋予AI终身记忆的力量', 'desc': '记忆稀疏注意力（MSA）是一种新型的内存模型框架，能够以线性复杂度和高效性处理极长的上下文。通过稀疏注意力和文档级的RoPE等创新，MSA在训练和推理中保持了卓越的稳定性。与现有方法相比，MSA在处理长达100M个标记的上下文时，性能显著提升，且精度下降小于9%。这一技术为通用模型提供了内在的、生命周期级别的记忆能力，推动了复杂推理和大规模摘要等应用的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.25744', 'title': 'MuRF: Unlocking the Multi-Scale Potential of Vision Foundation Models', 'url': 'https://huggingface.co/papers/2603.25744', 'abstract': 'Abstract Multi-Resolution Fusion enables vision foundation models to leverage complementary inductive biases from different resolutions without architectural modifications or additional training.  AI-generated summary Vision Foundation Models (VFMs) have become the cornerstone of modern computer vision, offering robust representations across a wide array of tasks. While recent advances allow these models to handle varying input sizes during training, inference typically remains restricted to a single, fixed scale. This prevalent single-scale paradigm overlooks a fundamental property of visual perception: varying resolutions offer complementary inductive biases, where low-resolution views excel at global semantic recognition and high-resolution views are essential for fine-grained refinement. In this work, we propose Multi-Resolution Fusion (MuRF), a simple yet universally effective strategy to harness this synergy at inference time. Instead of relying on a single view, MuRF constructs a unified representation by processing an image at multiple resolutions through a frozen VFM and fusing the resulting features. The universality of MuRF is its most compelling attribute. It is not tied to a specific architecture, serving instead as a fundamental, training-free enhancement to visual representation. We empirically validate this by applying MuRF to a broad spectrum of critical computer vision tasks across multiple distinct VFM families - primarily DINOv2, but also demonstrating successful generalization to contrastive models like SigLIP2.', 'score': 3, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '60d311152c48642d', 'authors': ['Bocheng Zou', 'Mu Cai', 'Mark Stanley', 'Dingfu Lu', 'Yong Jae Lee'], 'affiliations': ['University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2603.25744.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization', '#cv'], 'emoji': '🔬', 'ru': {'title': 'Слияние нескольких разрешений для улучшения визуальных моделей без переобучения', 'desc': 'Статья предлагает Multi-Resolution Fusion (MuRF) — простой метод улучшения визуальных foundation models путем обработки изображений одновременно на нескольких разрешениях во время инференса. Авторы показывают, что низкие разрешения хорошо захватывают глобальную семантику, а высокие разрешения обеспечивают детальную информацию, и синергия между ними повышает качество представлений. Метод не требует переобучения модели и работает без изменения архитектуры, что делает его универсальным применением для различных задач компьютерного зрения. Эмпирически подтверждено, что MuRF эффективен для разных семейств foundation models, включая DINOv2 и контрастные модели как SigLIP2.'}, 'en': {'title': 'Harnessing the Power of Multiple Resolutions in Vision Models', 'desc': 'This paper introduces Multi-Resolution Fusion (MuRF), a technique that allows vision foundation models (VFMs) to utilize information from images at different resolutions during inference. By processing images at multiple scales, MuRF combines the strengths of low-resolution views for global understanding and high-resolution views for detailed analysis. This method does not require changes to the model architecture or additional training, making it a versatile enhancement applicable to various VFM types. The effectiveness of MuRF is demonstrated across several important computer vision tasks, showcasing its ability to improve visual representation universally.'}, 'zh': {'title': '多分辨率融合：提升视觉模型的表现', 'desc': '多分辨率融合（MuRF）是一种新方法，可以让视觉基础模型在推理时利用不同分辨率的互补偏置，而无需修改架构或额外训练。该方法通过在多个分辨率下处理图像，构建统一的特征表示，从而提高了视觉任务的表现。低分辨率视图擅长全局语义识别，而高分辨率视图则对细粒度的细化至关重要。MuRF的通用性使其能够适用于多种视觉模型，验证了其在多个计算机视觉任务中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.25551', 'title': 'Voxtral TTS', 'url': 'https://huggingface.co/papers/2603.25551', 'abstract': 'Abstract Voxtral TTS is a multilingual text-to-speech model that generates natural speech from short reference audio using a hybrid architecture combining semantic token generation and flow-matching for acoustic tokens.  AI-generated summary We introduce Voxtral TTS, an expressive multilingual text-to-speech model that generates natural speech from as little as 3 seconds of reference audio. Voxtral TTS adopts a hybrid architecture that combines auto-regressive generation of semantic speech tokens with flow-matching for acoustic tokens. These tokens are encoded and decoded with Voxtral Codec, a speech tokenizer trained from scratch with a hybrid VQ-FSQ quantization scheme. In human evaluations conducted by native speakers, Voxtral TTS is preferred for multilingual voice cloning due to its naturalness and expressivity, achieving a 68.4\\% win rate over ElevenLabs Flash v2.5. We release the model weights under a CC BY-NC license.', 'score': 2, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'aabbcbc5bb203c4f', 'authors': ['Alexander H. Liu', 'Alexis Tacnet', 'Andy Ehrenberg', 'Andy Lo', 'Chen-Yo Sun', 'Guillaume Lample', 'Henry Lagarde', 'Jean-Malo Delignon', 'Jaeyoung Kim', 'John Harvill', 'Khyathi Raghavi Chandu', 'Lorenzo Signoretti', 'Margaret Jennings', 'Patrick von Platen', 'Pavankumar Reddy Muddireddy', 'Rohin Arora', 'Sanchit Gandhi', 'Samuel Humeau', 'Soham Ghosh', 'Srijan Mishra', 'Van Phung', 'Abdelaziz Bounhar', 'Abhinav Rastogi', 'Adrien Sadé', 'Alan Jeffares', 'Albert Jiang', 'Alexandre Cahill', 'Alexandre Gavaudan', 'Alexandre Sablayrolles', 'Amélie Héliou', 'Amos You', 'Andrew Bai', 'Andrew Zhao', 'Angele Lenglemetz', 'Anmol Agarwal', 'Anton Eliseev', 'Antonia Calvi', 'Arjun Majumdar', 'Arthur Fournier', 'Artjom Joosen', 'Avi Sooriyarachchi', 'Aysenur Karaduman Utkur', 'Baptiste Bout', 'Baptiste Rozière', 'Baudouin De Monicault', 'Benjamin Tibi', 'Bowen Yang', 'Charlotte Cronjäger', 'Clémence Lanfranchi', 'Connor Chen', 'Corentin Barreau', 'Corentin Sautier', 'Cyprien Courtot', 'Darius Dabert', 'Diego de las Casas', 'Elizaveta Demyanenko', 'Elliot Chane-Sane', 'Emmanuel Gottlob', 'Enguerrand Paquin', 'Etienne Goffinet', 'Fabien Niel', 'Faruk Ahmed', 'Federico Baldassarre', 'Gabrielle Berrada', 'Gaëtan Ecrepont', 'Gauthier Guinet', 'Genevieve Hayes', 'Georgii Novikov', 'Giada Pistilli', 'Guillaume Kunsch', 'Guillaume Martin', 'Guillaume Raille', 'Gunjan Dhanuka', 'Gunshi Gupta', 'Han Zhou', 'Harshil Shah', 'Hope McGovern', 'Hugo Thimonier', 'Indraneel Mukherjee', 'Irene Zhang', 'Jacques Sun', 'Jan Ludziejewski', 'Jason Rute', 'Jérémie Dentan', 'Joachim Studnia', 'Jonas Amar', 'Joséphine Delas', 'Josselin Somerville Roberts', 'Julien Tauran', 'Karmesh Yadav', 'Kartik Khandelwal', 'Kilian Tep', 'Kush Jain', 'Laurence Aitchison', 'Laurent Fainsin', 'Léonard Blier', 'Lingxiao Zhao', 'Louis Martin', 'Lucile Saulnier', 'Luyu Gao', 'Maarten Buyl', 'Manan Sharma', 'Marie Pellat', 'Mark Prins', 'Martin Alexandre', 'Mathieu Poirée', 'Mathieu Schmitt', 'Mathilde Guillaumin', 'Matthieu Dinot', 'Matthieu Futeral', 'Maxime Darrin', 'Maximilian Augustin', 'Mert Unsal', 'Mia Chiquier', 'Mikhail Biriuchinskii', 'Minh-Quang Pham', 'Mircea Lica', 'Morgane Rivière', 'Nathan Grinsztajn', 'Neha Gupta', 'Olivier Bousquet', 'Olivier Duchenne', 'Patricia Wang', 'Paul Jacob', 'Paul Wambergue', 'Paula Kurylowicz', 'Philippe Pinel', 'Philomène Chagniot', 'Pierre Stock', 'Piotr Miłoś', 'Prateek Gupta', 'Pravesh Agrawal', 'Quentin Torroba', 'Ram Ramrakhya', 'Randall Isenhour', 'Rishi Shah', 'Romain Sauvestre', 'Roman Soletskyi', 'Rosalie Millner', 'Rupert Menneer', 'Sagar Vaze', 'Samuel Barry', 'Samuel Belkadi', 'Sandeep Subramanian', 'Sean Cha', 'Shashwat Verma', 'Siddhant Waghjale', 'Siddharth Gandhi', 'Simon Lepage', 'Sumukh Aithal', 'Szymon Antoniak', 'Tarun Kumar Vangani', 'Teven Le Scao', 'Théo Cachet', 'Theo Simon Sorg', 'Thibaut Lavril', 'Thomas Chabal', 'Thomas Foubert', 'Thomas Robert', 'Thomas Wang', 'Tim Lawson', 'Tom Bewley', 'Tom Edwards', 'Tyler Wang', 'Umar Jamil', 'Umberto Tomasini', 'Valeriia Nemychnikova', 'Vedant Nanda', 'Victor Jouault', 'Vincent Maladière', 'Vincent Pfister', 'Virgile Richard', 'Vladislav Bataev', 'Wassim Bouaziz', 'Wen-Ding Li', 'William Havard', 'William Marshall', 'Xinghui Li', 'Xingran Guo', 'Xinyu Yang', 'Yannic Neuhaus', 'Yassine El Ouahidi', 'Yassir Bendou', 'Yihan Wang', 'Yimu Pan', 'Zaccharie Ramzi', 'Zhenlin Xu'], 'affiliations': ['mistral.ai'], 'pdf_title_img': 'assets/pdf/title_img/2603.25551.jpg', 'data': {'categories': ['#multilingual', '#open_source', '#architecture', '#audio'], 'emoji': '🎤', 'ru': {'title': 'Клонирование голоса из трёх секунд аудио с гибридной архитектурой', 'desc': 'Voxtral TTS — это многоязычная модель синтеза речи, которая генерирует естественную речь из короткого образца аудио продолжительностью всего 3 секунды. Модель использует гибридную архитектуру, сочетающую авторегрессивную генерацию семантических токенов речи с методом flow-matching для акустических токенов. Для кодирования и декодирования используется специально разработанный кодек Voxtral с гибридной схемой квантования VQ-FSQ. Согласно оценкам носителей языков, модель превосходит конкурентов по естественности и выразительности синтезируемой речи, показав 68,4% предпочтения над аналогами.'}, 'en': {'title': 'Voxtral TTS: Natural Speech from Minimal Audio', 'desc': 'Voxtral TTS is a multilingual text-to-speech model that creates natural-sounding speech from short audio clips. It uses a hybrid architecture that combines the generation of semantic tokens with flow-matching techniques for acoustic tokens. The model employs a unique speech tokenizer called Voxtral Codec, which is trained using a new quantization method. In tests, Voxtral TTS was found to be more natural and expressive than a competing model, making it a strong choice for multilingual voice cloning.'}, 'zh': {'title': 'Voxtral TTS：自然流畅的多语言语音合成', 'desc': 'Voxtral TTS 是一个多语言文本到语音模型，可以从短的参考音频生成自然的语音。它采用了一种混合架构，结合了语义语音标记的自回归生成和声学标记的流匹配。Voxtral Codec 是一个从头开始训练的语音标记器，使用混合的 VQ-FSQ 量化方案进行编码和解码。经过母语者的评估，Voxtral TTS 在多语言语音克隆中因其自然性和表现力而受到青睐，赢得了 68.4% 的胜率。'}}}, {'id': 'https://huggingface.co/papers/2603.23883', 'title': 'BioVITA: Biological Dataset, Model, and Benchmark for Visual-Textual-Acoustic Alignment', 'url': 'https://huggingface.co/papers/2603.23883', 'abstract': 'Abstract A multimodal framework for biological species identification that aligns visual, textual, and acoustic data to learn unified representations capturing species-level semantics beyond traditional taxonomy.  AI-generated summary Understanding animal species from multimodal data poses an emerging challenge at the intersection of computer vision and ecology. While recent biological models, such as BioCLIP, have demonstrated strong alignment between images and textual taxonomic information for species identification, the integration of the audio modality remains an open problem. We propose BioVITA, a novel visual-textual-acoustic alignment framework for biological applications. BioVITA involves (i) a training dataset, (ii) a representation model, and (iii) a retrieval benchmark. First, we construct a large-scale training dataset comprising 1.3 million audio clips and 2.3 million images, covering 14,133 species annotated with 34 ecological trait labels. Second, building upon BioCLIP2, we introduce a two-stage training framework to effectively align audio representations with visual and textual representations. Third, we develop a cross-modal retrieval benchmark that covers all possible directional retrieval across the three modalities (i.e., image-to-audio, audio-to-text, text-to-image, and their reverse directions), with three taxonomic levels: Family, Genus, and Species. Extensive experiments demonstrate that our model learns a unified representation space that captures species-level semantics beyond taxonomy, advancing multimodal biodiversity understanding. The project page is available at: https://dahlian00.github.io/BioVITA_Page/', 'score': 2, 'issue_id': 1682, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': 'c3a1430ab413ec64', 'authors': ['Risa Shinoda', 'Kaede Shiohara', 'Nakamasa Inoue', 'Kuniaki Saito', 'Hiroaki Santo', 'Fumio Okura'], 'affiliations': ['Institute of Science Tokyo', 'OMRON SINIC X', 'The University of Osaka', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2603.23883.jpg', 'data': {'categories': ['#audio', '#multimodal', '#cv', '#dataset', '#benchmark'], 'emoji': '🦁', 'ru': {'title': 'Единое представление природы через звук, образ и слово', 'desc': 'В статье представляется BioVITA — новая мультимодальная система для идентификации биологических видов, которая объединяет визуальные, текстовые и акустические данные в единое пространство представлений. Авторы создали большой датасет, содержащий 1,3 миллиона аудиоклипов и 2,3 миллиона изображений 14 133 видов животных с 34 экологическими характеристиками. Модель использует двухэтапный процесс обучения для выравнивания акустических представлений с визуальными и текстовыми, основываясь на архитектуре BioCLIP2. Система демонстрирует способность решать задачи кросс-модального поиска на разных уровнях таксономии и выучивает семантику видов, выходящую за рамки традиционной классификации.'}, 'en': {'title': 'BioVITA: Unifying Visual, Textual, and Acoustic Data for Species Identification', 'desc': 'This paper presents BioVITA, a multimodal framework designed for identifying biological species by integrating visual, textual, and acoustic data. It addresses the challenge of aligning these different types of data to create a unified representation that captures the semantics of species beyond traditional classification methods. The framework includes a large-scale dataset with millions of images and audio clips, and employs a two-stage training process to enhance the alignment of audio with visual and textual information. The results show that BioVITA significantly improves the understanding of biodiversity by enabling effective cross-modal retrieval across various taxonomic levels.'}, 'zh': {'title': '多模态生物物种识别的新框架', 'desc': '本文提出了一种多模态框架BioVITA，用于生物物种识别，结合视觉、文本和音频数据，学习统一的表示，超越传统分类法。我们构建了一个包含130万音频片段和230万图像的大规模训练数据集，涵盖14133个物种及其生态特征标签。通过两阶段训练框架，有效地将音频表示与视觉和文本表示对齐。实验结果表明，BioVITA能够捕捉物种级别的语义，推动多模态生物多样性理解的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.25745', 'title': 'Less Gaussians, Texture More: 4K Feed-Forward Textured Splatting', 'url': 'https://huggingface.co/papers/2603.25745', 'abstract': 'Abstract LGTM is a feed-forward framework that enables high-fidelity 4K novel view synthesis by predicting compact Gaussian primitives with per-primitive textures, decoupling geometric complexity from rendering resolution.  AI-generated summary Existing feed-forward 3D Gaussian Splatting methods predict pixel-aligned primitives, leading to a quadratic growth in primitive count as resolution increases. This fundamentally limits their scalability, making high-resolution synthesis such as 4K intractable. We introduce LGTM (Less Gaussians, Texture More), a feed-forward framework that overcomes this resolution scaling barrier. By predicting compact Gaussian primitives coupled with per-primitive textures, LGTM decouples geometric complexity from rendering resolution. This approach enables high-fidelity 4K novel view synthesis without per-scene optimization, a capability previously out of reach for feed-forward methods, all while using significantly fewer Gaussian primitives. Project page: https://yxlao.github.io/lgtm/', 'score': 1, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'b1464db045e5830f', 'authors': ['Yixing Lao', 'Xuyang Bai', 'Xiaoyang Wu', 'Nuoyuan Yan', 'Zixin Luo', 'Tian Fang', 'Jean-Daniel Nahmias', 'Yanghai Tsin', 'Shiwei Li', 'Hengshuang Zhao'], 'affiliations': ['Apple', 'HKU'], 'pdf_title_img': 'assets/pdf/title_img/2603.25745.jpg', 'data': {'categories': ['#3d', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Текстуры вместо примитивов: масштабируемый синтез видов высокого разрешения', 'desc': 'LGTM — это feed-forward модель для синтеза новых видов 3D сцен в разрешении 4K, которая предсказывает компактные гауссовы примитивы с текстурами для каждого примитива. Существующие методы 3D Gaussian Splatting предсказывают примитивы, выравненные по пикселям, что приводит к квадратичному росту их количества с увеличением разрешения. LGTM решает эту проблему, разделяя геометрическую сложность и разрешение рендеринга благодаря использованию текстур на примитивах. Такой подход позволяет достичь высокого качества синтеза видов без оптимизации для каждой сцены, используя значительно меньше гауссовых примитивов.'}, 'en': {'title': 'LGTM: Efficient 4K View Synthesis with Fewer Gaussians', 'desc': 'The paper presents LGTM, a novel feed-forward framework designed for high-fidelity 4K novel view synthesis. It addresses the limitations of existing methods that predict pixel-aligned Gaussian primitives, which lead to a rapid increase in the number of primitives as resolution rises. By predicting compact Gaussian primitives with associated textures, LGTM effectively separates geometric complexity from rendering resolution. This innovation allows for efficient high-resolution synthesis without the need for per-scene optimization, significantly reducing the number of Gaussian primitives required.'}, 'zh': {'title': 'LGTM：高效的4K视图合成新方法', 'desc': 'LGTM是一种前馈框架，能够通过预测紧凑的高斯原语和每个原语的纹理，实现高保真度的4K新视图合成。与现有的3D高斯点云方法不同，LGTM将几何复杂性与渲染分辨率解耦，从而避免了随着分辨率增加而导致的原语数量呈平方增长的问题。该方法无需对每个场景进行优化，能够在使用显著更少的高斯原语的情况下，实现高分辨率合成。LGTM的创新使得高质量的4K合成成为可能，突破了前馈方法的限制。'}}}, {'id': 'https://huggingface.co/papers/2603.24943', 'title': 'FinMCP-Bench: Benchmarking LLM Agents for Real-World Financial Tool Use under the Model Context Protocol', 'url': 'https://huggingface.co/papers/2603.24943', 'abstract': 'Abstract FinMCP-Bench is a comprehensive benchmark for evaluating large language models on financial problem-solving through tool invocation and reasoning across multiple complexity levels.  AI-generated summary This paper introduces FinMCP-Bench, a novel benchmark for evaluating large language models (LLMs) in solving real-world financial problems through tool invocation of financial model context protocols. FinMCP-Bench contains 613 samples spanning 10 main scenarios and 33 sub-scenarios, featuring both real and synthetic user queries to ensure diversity and authenticity. It incorporates 65 real financial MCPs and three types of samples, single tool, multi-tool, and multi-turn, allowing evaluation of models across different levels of task complexity. Using this benchmark, we systematically assess a range of mainstream LLMs and propose metrics that explicitly measure tool invocation accuracy and reasoning capabilities. FinMCP-Bench provides a standardized, practical, and challenging testbed for advancing research on financial LLM agents.', 'score': 1, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '44a1a99a9809f5e1', 'authors': ['Jie Zhu', 'Yimin Tian', 'Boyang Li', 'Kehao Wu', 'Zhongzhi Liang', 'Junhui Li', 'Xianyin Zhang', 'Lifan Guo', 'Feng Chen', 'Yong Liu', 'Chi Zhang'], 'affiliations': ['Qwen DianJin Team, Alibaba Cloud Computing', 'Soochow University', 'YINGMI Wealth Management'], 'pdf_title_img': 'assets/pdf/title_img/2603.24943.jpg', 'data': {'categories': [], 'emoji': '💰', 'ru': {'title': 'Оценка финансовых агентов на основе LLM через вызов инструментов', 'desc': 'В работе представлена FinMCP-Bench — комплексный бенчмарк для оценки больших языковых моделей в решении финансовых задач через использование специальных инструментов и рассуждение. Бенчмарк содержит 613 примеров, охватывающих 10 основных сценариев и 33 подсценария с реальными и синтетическими запросами пользователей. Авторы включили 65 реальных финансовых протоколов и три типа задач разной сложности: использование одного инструмента, нескольких инструментов и многошаговые взаимодействия. Исследование предлагает метрики для измерения точности вызова инструментов и способности моделей к логическому рассуждению в финансовом контексте.'}, 'en': {'title': 'Evaluating Financial Intelligence in Language Models', 'desc': 'FinMCP-Bench is a new benchmark designed to evaluate large language models (LLMs) specifically for solving financial problems. It includes 613 diverse samples across 10 main scenarios and 33 sub-scenarios, featuring both real and synthetic queries. The benchmark assesses models on their ability to invoke financial model context protocols using single tools, multiple tools, and multi-turn interactions. By providing metrics for tool invocation accuracy and reasoning skills, FinMCP-Bench aims to enhance research on LLMs in the financial domain.'}, 'zh': {'title': '金融问题解决的基准评估', 'desc': 'FinMCP-Bench是一个全面的基准，用于评估大型语言模型在金融问题解决中的表现。它通过调用金融模型上下文协议，涵盖了613个样本，涉及10个主要场景和33个子场景，确保了多样性和真实性。该基准包含65个真实的金融模型上下文协议，并提供单工具、多工具和多轮对话三种样本类型，以评估模型在不同任务复杂度下的表现。通过使用这个基准，我们系统地评估了多种主流大型语言模型，并提出了明确测量工具调用准确性和推理能力的指标。'}}}, {'id': 'https://huggingface.co/papers/2603.25741', 'title': 'Vega: Learning to Drive with Natural Language Instructions', 'url': 'https://huggingface.co/papers/2603.25741', 'abstract': 'Abstract Vega is a unified Vision-Language-World-Action model that combines autoregressive and diffusion paradigms for instruction-based driving planning and trajectory generation.  AI-generated summary Vision-language-action models have reshaped autonomous driving to incorporate languages into the decision-making process. However, most existing pipelines only utilize the language modality for scene descriptions or reasoning and lack the flexibility to follow diverse user instructions for personalized driving. To address this, we first construct a large-scale driving dataset (InstructScene) containing around 100,000 scenes annotated with diverse driving instructions with the corresponding trajectories. We then propose a unified Vision-Language-World-Action model, Vega, for instruction-based generation and planning. We employ the autoregressive paradigm to process visual inputs (vision) and language instructions (language) and the diffusion paradigm to generate future predictions (world modeling) and trajectories (action). We perform joint attention to enable interactions between the modalities and use individual projection layers for different modalities for more capabilities. Extensive experiments demonstrate that our method not only achieves superior planning performance but also exhibits strong instruction-following abilities, paving the way for more intelligent and personalized driving systems.', 'score': 0, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '53b2a9563e1dbe89', 'authors': ['Sicheng Zuo', 'Yuxuan Li', 'Wenzhao Zheng', 'Zheng Zhu', 'Jie Zhou', 'Jiwen Lu'], 'affiliations': ['GigaAI', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25741.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🚗', 'ru': {'title': 'Персонализированное вождение через понимание инструкций на естественном языке', 'desc': 'Vega — это единая модель Vision-Language-World-Action, которая объединяет автрегрессивный и диффузионный подходы для планирования движения и генерации траекторий на основе инструкций. Авторы создали большой датасет InstructScene с 100 тысячами сцен, аннотированными разнообразными инструкциями вождения и соответствующими траекториями. Модель использует автрегрессивную парадигму для обработки визуальной информации и текстовых инструкций, а также диффузионную парадигму для предсказания будущего состояния и генерации траекторий движения. Механизм совместного внимания позволяет модальностям взаимодействовать между собой, что обеспечивает следование инструкциям и улучшает качество планирования маршрутов в автономном вождении.'}, 'en': {'title': 'Vega: Driving Intelligence through Language and Vision Integration', 'desc': 'Vega is a new model that integrates vision, language, and action for autonomous driving, allowing it to understand and follow user instructions. It combines two approaches: autoregressive for processing visual and language inputs, and diffusion for predicting future actions and trajectories. A large dataset called InstructScene was created, containing 100,000 scenes with various driving instructions to train the model. The results show that Vega performs better in planning and can effectively follow diverse instructions, enhancing personalized driving experiences.'}, 'zh': {'title': 'Vega：智能驾驶的新纪元', 'desc': 'Vega是一种统一的视觉-语言-世界-行动模型，结合了自回归和扩散范式，用于基于指令的驾驶规划和轨迹生成。该模型通过构建一个包含约10万个场景的驾驶数据集（InstructScene），为多样化的驾驶指令提供了丰富的注释。Vega利用自回归范式处理视觉输入和语言指令，同时使用扩散范式生成未来预测和轨迹。实验结果表明，Vega在规划性能和指令跟随能力上均表现优异，为更智能和个性化的驾驶系统铺平了道路。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture (3)', '#audio (2)', '#benchmark (3)', '#cv (4)', '#data', '#dataset (3)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (3)', '#open_source (4)', '#optimization (3)', '#plp (1)', '#rag (1)', '#reasoning (2)', '#rl (1)', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (1)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-27 04:28',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-27 04:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-27 04:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
