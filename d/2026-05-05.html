    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.27660', 'title': 'From Context to Skills: Can Language Models Learn from Context Skillfully?', 'url': 'https://huggingface.co/papers/2604.27660', 'abstract': 'Abstract A self-evolving framework autonomously discovers and refines context-specific skills for language models through a multi-agent self-play loop with Challenger, Reasoner, and Judge components, improving context learning performance without human supervision.  AI-generated summary Many real-world tasks require language models (LMs) to reason over complex contexts that exceed their parametric knowledge. This calls for context learning, where LMs directly learn relevant knowledge from the given context. An intuitive solution is inference-time skill augmentation: extracting the rules and procedures from context into natural-language skills. However, constructing such skills for context learning scenarios faces two challenges: the prohibitive cost of manual skill annotation for long, technically dense contexts, and the lack of external feedback for automated skill construction. In this paper, we propose Ctx2Skill, a self-evolving framework that autonomously discovers, refines, and selects context-specific skills without human supervision or external feedback. At its core, a multi-agent self-play loop has a Challenger that generates probing tasks and rubrics, a Reasoner that attempts to solve them guided by an evolving skill set, and a neutral Judge that provides binary feedback. Crucially, both the Challenger and the Reasoner evolve through accumulated skills: dedicated Proposer and Generator agents analyze failure cases and synthesize them into targeted skill updates for both sides, enabling automated skill discovery and refinement. To prevent adversarial collapse caused by increasingly extreme task generation and over-specialized skill accumulation, we further introduce a Cross-time Replay mechanism that identifies the skill set achieving the best balance across representative cases for the Reasoner side, ensuring robust and generalizable skill evolution. The resulting skills can be plugged into any language model to obtain better context learning capability. Evaluated on four context learning tasks from CL-bench, Ctx2Skill consistently improves solving rates across backbone models.', 'score': 23, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '5bace71eca6dd484', 'authors': ['Shuzheng Si', 'Haozhe Zhao', 'Yu Lei', 'Qingyi Wang', 'Dingwei Chen', 'Zhitong Wang', 'Zhenhailong Wang', 'Kangyang Luo', 'Zheng Wang', 'Gang Chen', 'Fanchao Qi', 'Minjia Zhang', 'Maosong Sun'], 'affiliations': ['AI', 'CUHK', 'DeepLang', 'FDU', 'THU', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2604.27660.jpg', 'data': {'categories': ['#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самообучающиеся навыки для понимания контекста без надзора', 'desc': 'Представлена Ctx2Skill — самоэволюционирующая система, которая автоматически открывает и совершенствует специализированные навыки для языковых моделей без участия человека. Система использует многоагентный цикл самоигры с компонентами Challenger, Reasoner и Judge, где агенты генерируют задачи, решают их и предоставляют обратную связь. Особый механизм Cross-time Replay предотвращает деградацию навыков и обеспечивает их устойчивость. Экспериментальные результаты на бенчмарке CL-bench показывают, что открытые навыки значительно улучшают способность моделей к обучению из контекста.'}, 'en': {'title': 'Autonomous Skill Evolution for Context Learning in Language Models', 'desc': 'This paper presents Ctx2Skill, a framework that helps language models autonomously learn and improve skills specific to different contexts without needing human input. It uses a multi-agent system where a Challenger creates tasks, a Reasoner tries to solve them using learned skills, and a Judge provides feedback on the performance. The framework evolves by analyzing failures and updating skills, which allows it to discover and refine context-specific abilities effectively. Additionally, a Cross-time Replay mechanism ensures that the skills developed are balanced and applicable across various scenarios, enhancing the overall context learning performance of language models.'}, 'zh': {'title': '自我演化的上下文技能发现与优化', 'desc': '本文提出了一种自我演化框架Ctx2Skill，能够自主发现和优化特定上下文的技能，提升语言模型的上下文学习能力，而无需人工监督。该框架通过多智能体自我对弈循环，包含挑战者、推理者和评判者三个组件，自动生成任务并提供反馈。挑战者生成探测任务，推理者利用不断演化的技能集进行求解，而评判者则提供二元反馈。通过引入跨时间重放机制，确保技能演化的稳健性和通用性，从而有效应对任务生成的极端情况和技能过度专业化的问题。'}}}, {'id': 'https://huggingface.co/papers/2605.02881', 'title': 'MolmoAct2: Action Reasoning Models for Real-world Deployment', 'url': 'https://huggingface.co/papers/2605.02881', 'abstract': "Abstract MolmoAct2 presents an open-action reasoning model for robotics that improves upon previous systems through specialized vision-language-model backbones, new datasets, open-weight action tokenizers, architectural redesign for continuous-action prediction, and adaptive reasoning for reduced latency.  AI-generated summary Vision-Language-Action (VLA) models aim to provide a single generalist controller for robots, but today's systems fall short on the criteria that matter for real-world deployment. Frontier models are closed, open-weight alternatives are tied to expensive hardware, reasoning-augmented policies pay prohibitive latency for their grounding, and fine-tuned success rates remain below the threshold for dependable use. We present MolmoAct2, a fully open action reasoning model built for practical deployment, advancing its predecessor along five axes. We introduce MolmoER, a VLM backbone specialized for spatial and embodied reasoning, trained on a 3.3M-sample corpus with a specialize-then-rehearse recipe. We release three new datasets spanning low-to-medium cost platforms, including MolmoAct2-BimanualYAM, 720 hours of teleoperated bimanual trajectories that constitute the largest open bimanual dataset to date, together with quality-filtered Franka (DROID) and SO100/101 subsets. We provide OpenFAST, an open-weight, open-data action tokenizer trained on millions of trajectories across five embodiments. We redesign the architecture to graft a flow-matching continuous-action expert onto a discrete-token VLM via per-layer KV-cache conditioning. Finally, we propose MolmoThink, an adaptive-depth reasoning variant that re-predicts depth tokens only for scene regions that change between timesteps, retaining geometric grounding at a fraction of prior latency. In the most extensive empirical study of any open VLA to date, spanning 7 simulation and real-world benchmarks, MolmoAct2 outperforms strong baselines including Pi-05, while MolmoER surpasses GPT-5 and Gemini Robotics ER-1.5 across 13 embodied-reasoning benchmarks. We release model weights, training code, and complete training data. Project page: https://allenai.org/blog/molmoact2", 'score': 13, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'eb9c35698ea822db', 'authors': ['Haoquan Fang', 'Jiafei Duan', 'Donovan Clay', 'Sam Wang', 'Shuo Liu', 'Weikai Huang', 'Xiang Fan', 'Wei-Chuan Tsai', 'Shirui Chen', 'Yi Ru Wang', 'Shanli Xing', 'Jaemin Cho', 'Jae Sung Park', 'Ainaz Eftekhar', 'Peter Sushko', 'Karen Farley', 'Angad Wadhwa', 'Cole Harrison', 'Winson Han', 'Ying-Chun Lee', 'Eli VanderBilt', 'Rose Hendrix', 'Suveen Ellawela', 'Lucas Ngoo', 'Joyce Chai', 'Zhongzheng Ren', 'Ali Farhadi', 'Dieter Fox', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Amazon', 'Cortex AI', 'Johns Hopkins University', 'National University of Singapore', 'University of Michigan', 'University of North Carolina at Chapel Hill', 'University of Pennsylvania', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.02881.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#open_source', '#robotics', '#optimization', '#training', '#dataset', '#benchmark', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Открытая модель рассуждения для практического развёртывания роботов', 'desc': 'MolmoAct2 — это открытая модель视觉-语言-действие для робототехники, которая объединяет специализированный backbone VLM под названием MolmoER для пространственного и воплощённого рассуждения с новыми наборами данных, включая самый большой открытый набор двурукой телеоперации. Модель использует инновационную архитектуру, которая комбинирует дискретный токенизатор действий OpenFAST с экспертом по непрерывным действиям через flow-matching и KV-cache conditioning. Авторы предлагают MolmoThink — адаптивный вариант рассуждения, который снижает задержку, переустанавливая токены глубины только для изменяющихся областей сцены. MolmoAct2 демонстрирует превосходные результаты на 7 бенчмарках симуляции и реального мира, превосходя закрытые модели и конкурирующие открытые системы при полной открытости кода и весов.'}, 'en': {'title': 'Empowering Robots with Open-Action Reasoning!', 'desc': 'MolmoAct2 is an advanced open-action reasoning model designed for robotics, enhancing previous systems with improved vision-language-model backbones and new datasets. It introduces specialized components like MolmoER for better spatial reasoning and OpenFAST for efficient action tokenization. The architecture has been redesigned to support continuous-action predictions while minimizing latency through adaptive reasoning techniques. Extensive testing shows that MolmoAct2 outperforms existing models, making it a significant step towards practical deployment in real-world robotic applications.'}, 'zh': {'title': 'MolmoAct2：机器人动作推理的新突破', 'desc': 'MolmoAct2是一个开放的动作推理模型，旨在提升机器人系统的性能。它通过专门的视觉-语言模型骨干、全新的数据集和开放权重的动作标记器来实现这一目标。该模型还进行了架构重设计，以支持连续动作预测，并采用自适应推理来降低延迟。通过广泛的实证研究，MolmoAct2在多个基准测试中超越了现有的强基线，展示了其在实际应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.00877', 'title': 'OceanPile: A Large-Scale Multimodal Ocean Corpus for Foundation Models', 'url': 'https://huggingface.co/papers/2605.00877', 'abstract': 'Abstract OceanPile presents a large-scale multimodal corpus for ocean science, combining diverse data types and a knowledge graph-guided instruction dataset to advance marine AI applications.  AI-generated summary The vast and underexplored ocean plays a critical role in regulating global climate and supporting marine biodiversity, yet artificial intelligence has so far delivered limited impact in this domain due to a fundamental data bottleneck. Specifically, ocean data are highly fragmented across disparate sources and inherently exhibit multi-modal, high-noise, and weakly labeled characteristics, lacking unified schemas and semantic alignment. Although Multimodal Large Language Models (MLLMs) have achieved remarkable success in general domains, their application to ocean science remains severely constrained by the absence of large-scale, well-aligned multimodal datasets tailored to marine environments. To bridge this gap, we introduce OceanPile, a large-scale multimodal corpus designed for ocean foundation models. It comprises three key components: OceanCorpus, a unified collection integrating sonar data, underwater imagery, marine science visuals, and scientific text from diverse authoritative sources; OceanInstruction, a high-quality instruction dataset synthesized via a novel pipeline guided by a hierarchical Ocean Concept Knowledge Graph; and OceanBenchmark, a manually curated evaluation benchmark for rigorous assessment. We establish a multi-stage quality control process to ensure scientific validity and alignment across modalities. Experimental validation demonstrates significant performance improvements for models trained on our data. All datasets are publicly released to advance the field of marine artificial intelligence and empower domain-specific MLLMs.', 'score': 7, 'issue_id': 2138, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '156562b4d18b4995', 'authors': ['Yida Xue', 'Ningyu Zhang', 'Tingwei Wu', 'Zhe Ma', 'Daxiong Ji', 'Zhao Wang', 'Guozhou Zheng', 'Huajun Chen'], 'affiliations': ['College of Computer Science and Technology, Zhejiang University', 'Ocean College, Zhejiang University', 'Ocean Research Center of Zhoushan, Zhejiang University', 'School of Software Technology, Zhejiang University', 'State Key Laboratory of Ocean Sensing', 'ZJU-Hangzhou Global Scientific and Technological Innovation Center'], 'pdf_title_img': 'assets/pdf/title_img/2605.00877.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Мультимодальный фундамент для искусственного интеллекта в морской науке', 'desc': 'OceanPile представляет крупномасштабный мультимодальный корпус данных для морской науки, объединяющий разнородные источники информации включая гидроакустические данные, подводные изображения и научные тексты. Авторы создали граф знаний по океанским концепциям для автоматической генерации высококачественного датасета инструкций, обеспечивающего семантическое выравнивание между модальностями. Введена многоэтапная процедура контроля качества, гарантирующая научную валидность и корректность разметки данных. Предложенный корпус позволяет обучать специализированные мультимодальные большие языковые модели для задач морской науки и значительно улучшает их производительность.'}, 'en': {'title': 'Empowering Marine AI with OceanPile: A Unified Multimodal Dataset', 'desc': 'OceanPile is a comprehensive multimodal dataset aimed at enhancing artificial intelligence applications in ocean science. It addresses the challenges of fragmented and noisy ocean data by integrating various data types, including sonar, imagery, and scientific texts, into a unified corpus. The dataset also features a guided instruction set based on a hierarchical knowledge graph, ensuring better alignment and understanding of marine concepts. By providing a robust evaluation benchmark and publicly releasing all components, OceanPile aims to significantly improve the performance of machine learning models in marine environments.'}, 'zh': {'title': '推动海洋科学的人工智能应用', 'desc': 'OceanPile是一个大规模的多模态语料库，旨在推动海洋科学中的人工智能应用。它结合了多种数据类型和知识图谱指导的指令数据集，以解决海洋数据的碎片化和噪声问题。该语料库包括海洋语料库、指令数据集和评估基准，确保了数据的科学有效性和跨模态的一致性。通过实验验证，使用OceanPile数据训练的模型表现出显著的性能提升，所有数据集均已公开发布，以促进海洋人工智能领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2405.13729', 'title': 'ComboStoc: Combinatorial Stochasticity for Diffusion Generative Models', 'url': 'https://huggingface.co/papers/2405.13729', 'abstract': 'Abstract Combining stochastic processes with diffusion models addresses combinatorial complexity limitations, accelerating training and enabling asynchronous generation across data modalities.  AI-generated summary In this paper, we study an under-explored but important factor of diffusion generative models, i.e., the combinatorial complexity. Data samples are generally high-dimensional, and for various structured generation tasks, additional attributes are combined to associate with data samples. We show that the space spanned by the combination of dimensions and attributes can be insufficiently covered by existing training schemes of diffusion generative models, potentially limiting test time performance. We present a simple fix to this problem by constructing stochastic processes that fully exploit the combinatorial structures, hence the name ComboStoc. Using this simple strategy, we show that network training is significantly accelerated across diverse data modalities, including images and 3D structured shapes. Moreover, ComboStoc enables a new way of test time generation which uses asynchronous time steps for different dimensions and attributes, thus allowing for varying degrees of control over them. Our code is available at: https://github.com/Xrvitd/ComboStoc', 'score': 3, 'issue_id': 2137, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '19e64bf81430cca0', 'authors': ['Rui Xu', 'Jiepeng Wang', 'Hao Pan', 'Yang Liu', 'Xin Tong', 'Shiqing Xin', 'Changhe Tu', 'Taku Komura', 'Wenping Wang'], 'affiliations': ['Microsoft Research Asia', 'Shandong University', 'Texas A&M University', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2405.13729.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🎲', 'ru': {'title': 'Комбинаторные стохастические процессы для ускоренного обучения диффузионных моделей', 'desc': 'В статье предложен метод ComboStoc, который объединяет стохастические процессы с диффузионными моделями для решения проблемы комбинаторной сложности. Авторы показывают, что при генерации структурированных данных существующие схемы обучения недостаточно покрывают пространство комбинаций измерений и атрибутов, что ограничивает качество моделей. Предложенный подход эксплуатирует комбинаторную структуру данных, что значительно ускоряет обучение сети на различных типах данных, включая изображения и 3D-объекты. Кроме того, метод позволяет использовать асинхронные временные шаги при генерации, обеспечивая гибкий контроль над отдельными атрибутами.'}, 'en': {'title': 'Accelerating Diffusion Models with ComboStoc', 'desc': 'This paper addresses the challenges of combinatorial complexity in diffusion generative models, which can hinder their performance on high-dimensional data. The authors introduce a method called ComboStoc that utilizes stochastic processes to better manage the combination of dimensions and attributes in data samples. By doing so, they enhance the training speed and effectiveness of these models across various data types, such as images and 3D shapes. Additionally, ComboStoc allows for asynchronous generation, providing more control over the generation process at test time.'}, 'zh': {'title': '利用组合结构加速扩散生成模型训练', 'desc': '本文探讨了扩散生成模型中的组合复杂性问题。数据样本通常是高维的，且在生成任务中需要结合额外属性。我们提出了一种名为ComboStoc的方法，通过构建随机过程来充分利用组合结构，从而加速网络训练。该方法还允许在测试时对不同维度和属性进行异步生成，提供了更灵活的控制方式。'}}}, {'id': 'https://huggingface.co/papers/2605.02222', 'title': 'Generative Modeling with Orbit-Space Particle Flow Matching', 'url': 'https://huggingface.co/papers/2605.02222', 'abstract': 'Abstract Orbit-Space Geometric Probability Paths (OGPP) presents a particle-native flow-matching framework that improves generative modeling of particle systems through orbit-space canonicalization, particle index embeddings, and geometric probability paths with arc-length-aware terminal velocities.  AI-generated summary We present Orbit-Space Geometric Probability Paths (OGPP), a particle-native flow-matching framework for generative modeling of particle systems. OGPP is motivated by two insights: (i) particles are defined up to permutation symmetries, so anonymous indexing inflates per-index target variance and yields curved, hard-to-learn flows; and (ii) particles live in physical space, so the flow terminal velocity has physical meaning and can encode geometric attributes, e.g., surface normals. OGPP instantiates three key components: (1) orbit-space canonicalization of the probability-path terminal endpoint, (2) particle index embeddings for role specialization, and (3) geometric probability paths with arc-length-aware terminal velocities that generate normals as a byproduct of the flow. We evaluate OGPP on minimal-surface benchmarks, where it reduces metric error by up to two orders of magnitude in a single inference step; on ShapeNet, where it matches the state of the art with 5x fewer steps and reaches airplane EMD comparable to DiT-3D with 26x fewer parameters and 5x fewer steps; and on single-shape encoding, where it produces normals and reconstructions competitive with 6D generators while operating entirely in 3D.', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a43f584ff0ccad95', 'authors': ['Sinan Wang', 'Jinjin He', 'Shenyifan Lu', 'Ruicheng Wang', 'Greg Turk', 'Bo Zhu'], 'affiliations': ['Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.02222.jpg', 'data': {'categories': ['#3d', '#diffusion', '#optimization', '#training', '#architecture'], 'emoji': '🌀', 'ru': {'title': 'Симметричный поток: генерация частиц без перестановочного шума', 'desc': 'OGPP представляет новый подход к генеративному моделированию систем частиц на основе flow matching. Ключевая идея заключается в учёте симметрии перестановок частиц через орбит-пространственную канонизацию, что снижает дисперсию целевой функции и упрощает обучение. Фреймворк использует встраивания индексов частиц для специализации ролей и геометрические пути вероятностей с терминальными скоростями, зависящими от длины дуги. Метод достигает значительного улучшения на бенчмарках минимальных поверхностей и ShapeNet, требуя значительно меньше шагов и параметров по сравнению с существующими методами.'}, 'en': {'title': 'Revolutionizing Particle Systems with OGPP', 'desc': 'The paper introduces Orbit-Space Geometric Probability Paths (OGPP), a new framework designed to enhance generative modeling of particle systems. It addresses the challenges of particle permutation symmetries and the physical meaning of flow terminal velocities by implementing orbit-space canonicalization and particle index embeddings. The framework also incorporates geometric probability paths that are aware of arc-length, allowing for the generation of surface normals as a byproduct. Experimental results show that OGPP significantly reduces metric error and achieves competitive performance with fewer computational resources compared to existing methods.'}, 'zh': {'title': '提升粒子系统生成建模的OGPP框架', 'desc': '本文提出了一种名为轨道空间几何概率路径（OGPP）的框架，旨在改进粒子系统的生成建模。OGPP通过轨道空间标准化、粒子索引嵌入和考虑弧长的终端速度的几何概率路径来实现这一目标。该方法解决了粒子在排列对称性下的匿名索引问题，从而减少了目标方差并提高了流的可学习性。实验结果表明，OGPP在多个基准测试中显著降低了度量误差，并在生成效率和参数使用上优于现有技术。'}}}, {'id': 'https://huggingface.co/papers/2605.02240', 'title': 'PhysicianBench: Evaluating LLM Agents in Real-World EHR Environments', 'url': 'https://huggingface.co/papers/2605.02240', 'abstract': 'Abstract PhysicianBench evaluates LLM agents on real clinical tasks requiring complex, multi-step workflows within electronic health record environments, revealing significant gaps in current agent capabilities.  AI-generated summary We introduce PhysicianBench, a benchmark for evaluating LLM agents on physician tasks grounded in real clinical setting within electronic health record (EHR) environments. Existing medical agent benchmarks primarily focus on static knowledge recall, single-step atomic actions, or action intent without verifiable execution against the environment. As a result, they fail to capture the long-horizon, composite workflows that characterize real clinical systems. PhysicianBench comprises 100 long-horizon tasks adapted from real consultation cases between primary care and subspecialty physicians, with each task independently reviewed by a separate panel of physicians. Tasks are instantiated in an EHR environment with real patient records and accessed through the same standard APIs used by commercial EHR vendors. Tasks span 21 specialties (e.g., cardiology, endocrinology, oncology, psychiatry) and diverse workflow types (e.g., diagnosis interpretation, medication prescribing, treatment planning), requiring an average of 27 tool calls per task. Solving each task requires retrieving data across encounters, reasoning over heterogeneous clinical information, executing consequential clinical actions, and producing clinical documentation. Each task is decomposed into structured checkpoints (670 in total across the benchmark) capturing distinct stages of completion graded by task-specific scripts with execution-grounded verification. Across 13 proprietary and open-source LLM agents, the best-performing model achieves only 46% success rate (pass@1), while open-source models reach at most 19%, revealing a substantial gap between current agent capabilities and the demands of real-world clinical workflows. PhysicianBench provides a realistic and execution-grounded benchmark for measuring progress toward autonomous clinical agents.', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '056dde8528b4e5d9', 'authors': ['Ruoqi Liu', 'Imran Q. Mohiuddin', 'Austin J. Schoeffler', 'Kavita Renduchintala', 'Ashwin Nayak', 'Prasantha L. Vemu', 'Shivam C. Vedak', 'Kameron C. Black', 'John L. Havlik', 'Isaac Ogunmola', 'Stephen P. Ma', 'Roopa Dhatt', 'Jonathan H. Chen'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02240.jpg', 'data': {'categories': ['#healthcare', '#dataset', '#benchmark', '#agents'], 'emoji': '👨\u200d⚕️', 'ru': {'title': 'Измерение способности LLM-агентов к автономной клинической деятельности', 'desc': 'PhysicianBench — это бенчмарк для оценки способностей LLM-агентов выполнять реальные задачи врачей в среде электронных медицинских записей (ЭМР). В отличие от существующих медицинских бенчмарков, которые сосредоточены на простом вспоминании знаний и отдельных действиях, PhysicianBench включает 100 сложных многошаговых рабочих процессов, адаптированных из реальных консультаций, охватывающих 21 медицинскую специальность. Каждая задача требует в среднем 27 вызовов инструментов и включает извлечение данных, клиническое рассуждение и выполнение действительных медицинских операций с проверкой на реальном окружении. Результаты показывают значительный разрыв: лучшие модели достигают только 46% успеха, а открытые модели — максимум 19%, что выявляет существенные ограничения современных LLM-агентов для клинических приложений.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Clinical Workflows', 'desc': 'PhysicianBench is a new benchmark designed to evaluate large language model (LLM) agents on complex clinical tasks within electronic health record (EHR) systems. Unlike previous benchmarks that focus on simple tasks or knowledge recall, PhysicianBench assesses agents on long-horizon workflows that reflect real physician activities, such as diagnosis and treatment planning. The benchmark includes 100 tasks across various medical specialties, requiring agents to perform multiple steps and make decisions based on diverse clinical data. Results show that current LLM agents struggle with these tasks, achieving only a 46% success rate, highlighting the need for improved capabilities in handling real-world clinical scenarios.'}, 'zh': {'title': '评估临床任务的智能代理基准', 'desc': 'PhysicianBench是一个用于评估大型语言模型（LLM）在真实临床任务中的表现的基准，特别是在电子健康记录（EHR）环境中。现有的医学代理基准主要关注静态知识回忆和单步操作，无法有效捕捉复杂的临床工作流程。PhysicianBench包含100个来自真实咨询案例的长期任务，涵盖21个专业领域，要求模型在真实患者记录中进行多步骤推理和执行。研究表明，当前的LLM代理在满足真实临床工作需求方面存在显著差距，最佳模型的成功率仅为46%。'}}}, {'id': 'https://huggingface.co/papers/2605.02730', 'title': 'Perceptual Flow Network for Visually Grounded Reasoning', 'url': 'https://huggingface.co/papers/2605.02730', 'abstract': 'Abstract Perceptual Flow Network addresses limitations in vision-language models by decoupling perception from reasoning and using variational reinforcement learning with multi-dimensional rewards for improved visual reasoning.  AI-generated summary Despite the success of Large-Vision Language Models (LVLMs), general optimization objectives (e.g., standard MLE) fail to constrain visual trajectories, leading to language bias and hallucination. To mitigate this, current methods introduce geometric priors from visual experts as additional supervision. However, we observe that such supervision is typically suboptimal: it is biased toward geometric precision and offers limited reasoning utility. To bridge this gap, we propose Perceptual Flow Network (PFlowNet), which eschews rigid alignment with the expert priors and achieves interpretable yet more effective visual reasoning. Specifically, PFlowNet decouples perception from reasoning to establish a self-conditioned generation process. Based on this, it integrates multi-dimensional rewards with vicinal geometric shaping via variational reinforcement learning, thereby facilitating reasoning-oriented perceptual behaviors while preserving visual reliability. PFlowNet delivers a provable performance guarantee and competitive empirical results, particularly setting new SOTA records on V* Bench (90.6%) and MME-RealWorld-lite (67.0%).', 'score': 0, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a0b0e850223cf874', 'authors': ['Yangfu Li', 'Yuning Gong', 'Hongjian Zhan', 'Teng Li', 'Yuanhuiyi Lyu', 'Tianyi Chen', 'Qi Liu', 'Ziyuan Huang', 'Zhihang Zhong', 'Dandan Zheng', 'Yue Lu'], 'affiliations': ['Ant Group', 'ECNU', 'HKUST', 'SCU', 'SJTU', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2605.02730.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#interpretability', '#hallucinations', '#optimization', '#cv', '#rl', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Разделение восприятия и мышления для честного визуального рассуждения', 'desc': 'Перцепционная сеть потоков (PFlowNet) решает проблему галлюцинаций в больших визуально-языковых моделях путём разделения восприятия и рассуждения. Метод использует вариационное обучение с подкреплением и многомерные награды для улучшения визуального рассуждения, отказываясь от жёсткого следования экспертным геометрическим приоритам. PFlowNet устанавливает самообусловленный процесс генерации, который балансирует между точностью визуального восприятия и качеством логических выводов. Модель достигает новых рекордов на бенчмарках V* Bench и MME-RealWorld-lite.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Superior Visual Understanding', 'desc': 'The Perceptual Flow Network (PFlowNet) improves vision-language models by separating perception from reasoning, allowing for better visual reasoning capabilities. It uses variational reinforcement learning with multi-dimensional rewards to enhance the reasoning process while maintaining visual accuracy. Unlike previous methods that relied heavily on geometric priors, PFlowNet offers a more flexible approach that avoids biases and hallucinations in language generation. This innovative framework has achieved state-of-the-art results on benchmark datasets, demonstrating its effectiveness in visual reasoning tasks.'}, 'zh': {'title': '感知流网络：解耦感知与推理的创新之路', 'desc': '感知流网络（PFlowNet）解决了视觉语言模型的局限性，通过将感知与推理解耦，使用变分强化学习和多维奖励来改善视觉推理。现有的大型视觉语言模型在优化目标上存在不足，导致视觉轨迹的偏差和幻觉现象。PFlowNet不再严格依赖于专家的几何先验，而是实现了更有效的视觉推理。该模型通过自我条件生成过程，结合多维奖励和几何塑形，促进了以推理为导向的感知行为，同时保持了视觉的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.02661', 'title': 'AcademiClaw: When Students Set Challenges for AI Agents', 'url': 'https://huggingface.co/papers/2605.02661', 'abstract': "Abstract AcademiClaw presents a comprehensive benchmark for evaluating AI agents on complex academic tasks spanning multiple domains, revealing significant capability gaps in current models.  AI-generated summary Benchmarks within the OpenClaw ecosystem have thus far evaluated exclusively assistant-level tasks, leaving the academic-level capabilities of OpenClaw largely unexamined. We introduce AcademiClaw, a bilingual benchmark of 80 complex, long-horizon tasks sourced directly from university students' real academic workflows -- homework, research projects, competitions, and personal projects -- that they found current AI agents unable to solve effectively. Curated from 230 student-submitted candidates through rigorous expert review, the final task set spans 25+ professional domains, ranging from olympiad-level mathematics and linguistics problems to GPU-intensive reinforcement learning and full-stack system debugging, with 16 tasks requiring CUDA GPU execution. Each task executes in an isolated Docker sandbox and is scored on task completion by multi-dimensional rubrics combining six complementary techniques, with an independent five-category safety audit providing additional behavioral analysis. Experiments on six frontier models show that even the best achieves only a 55\\% pass rate. Further analysis uncovers sharp capability boundaries across task domains, divergent behavioral strategies among models, and a disconnect between token consumption and output quality, providing fine-grained diagnostic signals beyond what aggregate metrics reveal. We hope that AcademiClaw and its open-sourced data and code can serve as a useful resource for the OpenClaw community, driving progress toward agents that are more capable and versatile across the full breadth of real-world academic demands. All data and code are available at https://github.com/GAIR-NLP/AcademiClaw.", 'score': 0, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '26fe24e98e2946f6', 'authors': ['Junjie Yu', 'Pengrui Lu', 'Weiye Si', 'Hongliang Lu', 'Jiabao Wu', 'Kaiwen Tao', 'Kun Wang', 'Lingyu Yang', 'Qiran Zhang', 'Xiuting Guo', 'Xuanyu Wang', 'Yang Wang', 'Yanjie Wang', 'Yi Yang', 'Zijian Hu', 'Ziyi Yang', 'Zonghan Zhou', 'Binghao Qiang', 'Borui Zhang', 'Chenning Li', 'Enchang Zhang', 'Feifan Chen', 'Feng Jian', 'Fengyin Sun', 'Hao Qiu', 'Hao Zheng', 'Haoran Zhu', 'Hongyu Liu', 'Jianbin Deng', 'Jiaxin Song', 'Jiaying Chi', 'Jiayou Shi', 'Jie Fang', 'Jinghui Zhong', 'Jingyu Zhou', 'Jinze Li', 'Junfeng Yi', 'Junyan Yu', 'Junzhi Xue', 'Ni Song', 'Pengyi Chen', 'Qi Chen', 'Quansheng Li', 'Rui Tao', 'Shenghai Gong', 'Shenhang Lu', 'Tianqi Shen', 'Tianxiang Zhu', 'Tiehan Kang', 'Tingyu Li', 'Wendi Wu', 'Xiao Shen', 'Xiao Zhou', 'Xiaotao Zhang', 'Xinrong Li', 'Xuankun Yang', 'Xun Zhang', 'Yan Li', 'Ye Lu', 'Yi Wang', 'Yibo Zhou', 'Yichi Zhang', 'Yihao Sun', 'Yijun Huang', 'Yixin Zhu', 'Yixuan Wu', 'Yuchen Sun', 'Yue Wu', 'Yuheng Sun', 'Yukun Li', 'Yutian Tu', 'Yuxuan Qin', 'Yuzhuo Wu', 'Zeyu Li', 'Zhengyu Lou', 'Zhenning Ran', 'Zizhu He', 'Pengfei Liu'], 'affiliations': ['GAIR', 'SII', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02661.jpg', 'data': {'categories': ['#science', '#agents', '#survey', '#multilingual', '#dataset', '#benchmark', '#open_source'], 'emoji': '🎓', 'ru': {'title': 'Когда студенческие задачи сильнее моделей: оценка реальных способностей AI агентов', 'desc': 'AcademiClaw представляет комплексный бенчмарк для оценки AI агентов на сложных академических задачах, охватывающих более 25 профессиональных областей. Набор данных включает 80 долгоинтервальных задач из реальных учебных процессов студентов, от олимпиадной математики до GPU-интенсивного машинного обучения. Каждая задача выполняется в изолированном окружении с использованием мультимерных метрик оценки и многомерного анализа безопасности. Эксперименты показывают, что лучшие современные модели достигают только 55% успешности, выявляя значительные пробелы в способностях и выраженные границы компетентности между различными предметными областями.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Academic Challenges', 'desc': 'AcademiClaw is a new benchmark designed to evaluate AI agents on complex academic tasks that reflect real university student workflows. It includes 80 challenging tasks across various domains, highlighting the limitations of current AI models in handling academic-level problems. The tasks are rigorously curated and scored using multi-dimensional rubrics, with a focus on safety and behavioral analysis. Initial experiments show that even the best AI models only achieve a 55% success rate, indicating significant gaps in their capabilities and providing insights for future improvements.'}, 'zh': {'title': '提升AI学术能力的基准测试', 'desc': 'AcademiClaw是一个全面的基准测试，用于评估AI代理在复杂学术任务上的表现，揭示了当前模型的能力差距。该基准包含80个复杂的任务，来源于大学生的真实学术工作流程，涵盖多个专业领域。通过严格的专家评审，从230个学生提交的候选任务中筛选而来，任务包括数学、语言学和强化学习等。实验结果显示，即使是最好的模型，及格率也仅为55%，并且在任务领域之间存在明显的能力边界和行为策略差异。'}}}, {'id': 'https://huggingface.co/papers/2605.02178', 'title': 'T^2PO: Uncertainty-Guided Exploration Control for Stable Multi-Turn Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.02178', 'abstract': "Abstract Token- and Turn-level Policy Optimization (T²PO) addresses multi-turn RL instability by controlling exploration at fine-grained levels through uncertainty monitoring and dynamic resampling.  AI-generated summary Recent progress in multi-turn reinforcement learning (RL) has significantly improved reasoning LLMs' performances on complex interactive tasks. Despite advances in stabilization techniques such as fine-grained credit assignment and trajectory filtering, instability remains pervasive and often leads to training collapse. We argue that this instability stems from inefficient exploration in multi-turn settings, where policies continue to generate low-information actions that neither reduce uncertainty nor advance task progress. To address this issue, we propose Token- and Turn-level Policy Optimization (T^2PO), an uncertainty-aware framework that explicitly controls exploration at fine-grained levels. At the token level, T^2PO monitors uncertainty dynamics and triggers a thinking intervention once the marginal uncertainty change falls below a threshold. At the turn level, T^2PO identifies interactions with negligible exploration progress and dynamically resamples such turns to avoid wasted rollouts. We evaluate T^2PO in diverse environments, including WebShop, ALFWorld, and Search QA, demonstrating substantial gains in training stability and performance improvements with better exploration efficiency. Code is available at: https://github.com/WillDreamer/T2PO.", 'score': 0, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '1937f4867e57d2c1', 'authors': ['Haixin Wang', 'Hejie Cui', 'Chenwei Zhang', 'Xin Liu', 'Shuowei Jin', 'Shijie Geng', 'Xinyang Zhang', 'Nasser Zalmout', 'Zhenyu Shi', 'Yizhou Sun'], 'affiliations': ['Amazon.com Inc.', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.02178.jpg', 'data': {'categories': ['#reasoning', '#agents', '#optimization', '#training', '#rl', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умное исследование через мониторинг неопределённости на уровне токенов и шагов', 'desc': 'В работе предложен метод Token- and Turn-level Policy Optimization (T²PO) для стабилизации обучения с подкреплением в многошаговых задачах. Основная идея заключается в контролировании исследования пространства действий на двух уровнях: на уровне токенов мониторится неопределённость и запускается вмешательство при стагнации, а на уровне шагов диалога выявляются взаимодействия с низким прогрессом исследования и перепробируются для избежания бесполезных траекторий. Метод решает проблему генерации моделью низкоинформативных действий, которые не снижают неопределённость и не продвигают решение задачи. Эксперименты на WebShop, ALFWorld и Search QA показывают значительное улучшение стабильности обучения и эффективности исследования.'}, 'en': {'title': 'Enhancing Multi-Turn RL Stability with T²PO', 'desc': 'The paper introduces Token- and Turn-level Policy Optimization (T²PO), a method designed to improve stability in multi-turn reinforcement learning (RL) by enhancing exploration strategies. It identifies that traditional methods often lead to ineffective actions that do not contribute to learning, causing training instability. T²PO addresses this by monitoring uncertainty at both the token and turn levels, allowing for targeted interventions when exploration is insufficient. The results show that T²PO significantly boosts training stability and performance across various environments by optimizing exploration efficiency.'}, 'zh': {'title': '细粒度探索，稳定多回合强化学习', 'desc': '本文提出了一种名为T²PO的多回合强化学习策略优化方法，旨在解决多回合训练中的不稳定性问题。该方法通过监测不确定性和动态重采样，在细粒度层面上控制探索过程。T²PO在令牌层面监控不确定性变化，并在不确定性变化低于阈值时进行干预；在回合层面识别探索进展微小的交互，并动态重采样以避免浪费训练资源。通过在多个环境中进行评估，T²PO显示出显著的训练稳定性和性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.01725', 'title': 'Motion-Aware Caching for Efficient Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2605.01725', 'abstract': 'Abstract MotionCache is a motion-aware caching framework that accelerates autoregressive video generation by dynamically adjusting denoising step frequencies based on pixel-level motion characteristics, achieving significant speedups while maintaining generation quality.  AI-generated summary Autoregressive video generation paradigms offer theoretical promise for long video synthesis, yet their practical deployment is hindered by the computational burden of sequential iterative denoising. While cache reuse strategies can accelerate generation by skipping redundant denoising steps, existing methods rely on coarse-grained chunk-level skipping that fails to capture fine-grained pixel dynamics. This oversight is critical: pixels with high motion require more denoising steps to prevent error accumulation, while static pixels tolerate aggressive skipping. We formalize this insight theoretically by linking cache errors to residual instability, and propose MotionCache, a motion-aware cache framework that exploits inter-frame differences as a lightweight proxy for pixel-level motion characteristics. MotionCache employs a coarse-to-fine strategy: an initial warm-up phase establishes semantic coherence, followed by motion-weighted cache reuse that dynamically adjusts update frequencies per token. Extensive experiments on state-of-the-art models like SkyReels-V2 and MAGI-1 demonstrate that MotionCache achieves significant speedups of 6.28times and 1.64times respectively, while effectively preserving generation quality (VBench: 1%downarrow and 0.01%downarrow respectively). The code is available at https://github.com/ywlq/MotionCache.', 'score': 0, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': 'ccb36bc81f726343', 'authors': ['Jing Xu', 'Yuexiao Ma', 'Songwei Liu', 'Xuzhe Zheng', 'Shiwei Liu', 'Chenqian Yan', 'Xiawu Zheng', 'Rongrong Ji', 'Fei Chao', 'Xing Wang'], 'affiliations': ['ByteDance', 'ELLIS Institute Tbingen', 'Key Laboratory of Multimedia Trusted Perception and Efficient Computing, Ministry of Education of China, Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.01725.jpg', 'data': {'categories': ['#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное кэширование по движению для ускорения видеогенерации', 'desc': 'MotionCache — это фреймворк кэширования, ориентированный на движение, который ускоряет авторегрессивную генерацию видео путём адаптивной настройки частоты шагов денойзинга на основе характеристик движения пикселей. Авторы выявили, что статичные области видео допускают агрессивное пропускание шагов денойзинга, в то время как пиксели с высоким движением требуют больше итераций для предотвращения накопления ошибок. Предложенный подход использует двухэтапную стратегию: в фазе разогрева устанавливается семантическая согласованность, затем применяется взвешенное по движению переиспользование кэша с динамической корректировкой частоты обновления токенов. Экспериментальные результаты на моделях SkyReels-V2 и MAGI-1 показывают ускорение в 6.28× и 1.64× соответственно при сохранении качества генерации.'}, 'en': {'title': 'Accelerating Video Generation with Motion-Aware Caching', 'desc': 'MotionCache is a novel framework designed to enhance the speed of autoregressive video generation by intelligently adjusting the frequency of denoising steps based on the motion characteristics of individual pixels. Traditional methods often skip denoising steps at a coarse level, which can lead to errors, especially in areas with high motion. By recognizing that dynamic pixels require more careful processing, MotionCache implements a strategy that first establishes coherence and then selectively reuses cache based on motion data. This approach results in significant speed improvements while maintaining high-quality video output, as demonstrated in experiments with advanced models.'}, 'zh': {'title': '运动感知缓存，加速视频生成', 'desc': 'MotionCache 是一个运动感知的缓存框架，通过根据像素级运动特征动态调整去噪步骤频率，加速自回归视频生成。该方法解决了现有粗粒度跳过策略无法捕捉细粒度像素动态的问题，从而提高了生成速度。通过理论分析，我们将缓存错误与残差不稳定性联系起来，提出了 MotionCache 的设计思路。实验结果表明，MotionCache 在保持生成质量的同时，分别实现了 6.28 倍和 1.64 倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2605.00932', 'title': 'Code World Model Preparedness Report', 'url': 'https://huggingface.co/papers/2605.00932', 'abstract': "Abstract The Code World Model demonstrates no additional frontier risks beyond current AI ecosystem concerns, leading to its release as an open-weight model.  AI-generated summary This report documents the preparedness assessment of Code World Model (CWM), a model for code generation and reasoning about code from Meta. We conducted pre-release testing across domains identified in our Frontier AI Framework as potentially presenting catastrophic risks, and also evaluated the model's misaligned propensities. Our assessment found that CWM does not pose additional frontier risks beyond those present in the current AI ecosystem. We therefore release it as an open-weight model.", 'score': 0, 'issue_id': 2138, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '3b4ae5c8d2ce8617', 'authors': ['Daniel Song', 'Peter Ney', 'Cristina Menghini', 'Faizan Ahmad', 'Aidan Boyd', 'Nathaniel Li', 'Ziwen Han', 'Jean-Christophe Testud', 'Saisuke Okabayashi', 'Maeve Ryan', 'Jinpeng Miao', 'Hamza Kwisaba', 'Felix Binder', 'Spencer Whitman', 'Jim Gust', 'Esteban Arcaute', 'Dhaval Kapil', 'Jacob Kahn', 'Ayaz Minhas', 'Tristan Goodman', 'Lauren Deason', 'Alexander Vaughan', 'Shengjia Zhao', 'Summer Yue'], 'affiliations': ['AI Security Team', 'MSL', 'Meta'], 'pdf_title_img': 'assets/pdf/title_img/2605.00932.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Безопасный код: открытая модель без дополнительных рисков', 'desc': 'В статье описывается оценка безопасности модели Code World Model (CWM) от Meta, предназначенной для генерации кода и анализа программного кода. Исследователи провели тестирование модели по различным критериям, включая потенциальные катастрофические риски согласно их Frontier AI Framework и проверку на нежелательное поведение. Анализ показал, что CWM не представляет дополнительных граничных рисков сверх уже существующих в экосистеме современных AI-систем. На основе результатов оценки модель была выпущена как открытая модель с доступными весами.'}, 'en': {'title': 'CWM: Safe Code Generation for All!', 'desc': 'The Code World Model (CWM) is a machine learning model designed for generating and reasoning about code. In a thorough assessment, it was tested for potential risks that could arise from its deployment, particularly in areas identified as high-risk in the Frontier AI Framework. The evaluation concluded that CWM does not introduce new risks beyond those already present in existing AI systems. As a result, the model is being released with open weights, allowing broader access and use.'}, 'zh': {'title': '代码世界模型：安全无新风险的开放发布', 'desc': '代码世界模型（CWM）是一种用于代码生成和推理的模型。经过评估，我们发现该模型在当前人工智能生态系统中并未引入额外的前沿风险。我们对其进行了预发布测试，确保其在潜在的灾难性风险领域表现良好。基于这些评估结果，我们决定将CWM作为开放权重模型发布。'}}}];

            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (4)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (5)', '#cv (1)', '#data', '#dataset (4)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (1)', '#interpretability (1)', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (3)', '#open_source (4)', '#optimization (4)', '#plp', '#rag', '#reasoning (3)', '#rl (2)', '#rlhf', '#robotics (1)', '#science (1)', '#security', '#small_models', '#story_generation', '#survey (1)', '#synthetic', '#training (4)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-05 05:36',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-05 05:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-05 05:36')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
