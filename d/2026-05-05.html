    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.02881', 'title': 'MolmoAct2: Action Reasoning Models for Real-world Deployment', 'url': 'https://huggingface.co/papers/2605.02881', 'abstract': "Abstract MolmoAct2 presents an open-action reasoning model for robotics that improves upon previous systems through specialized vision-language-model backbones, new datasets, open-weight action tokenizers, architectural redesign for continuous-action prediction, and adaptive reasoning for reduced latency.  AI-generated summary Vision-Language-Action (VLA) models aim to provide a single generalist controller for robots, but today's systems fall short on the criteria that matter for real-world deployment. Frontier models are closed, open-weight alternatives are tied to expensive hardware, reasoning-augmented policies pay prohibitive latency for their grounding, and fine-tuned success rates remain below the threshold for dependable use. We present MolmoAct2, a fully open action reasoning model built for practical deployment, advancing its predecessor along five axes. We introduce MolmoER, a VLM backbone specialized for spatial and embodied reasoning, trained on a 3.3M-sample corpus with a specialize-then-rehearse recipe. We release three new datasets spanning low-to-medium cost platforms, including MolmoAct2-BimanualYAM, 720 hours of teleoperated bimanual trajectories that constitute the largest open bimanual dataset to date, together with quality-filtered Franka (DROID) and SO100/101 subsets. We provide OpenFAST, an open-weight, open-data action tokenizer trained on millions of trajectories across five embodiments. We redesign the architecture to graft a flow-matching continuous-action expert onto a discrete-token VLM via per-layer KV-cache conditioning. Finally, we propose MolmoThink, an adaptive-depth reasoning variant that re-predicts depth tokens only for scene regions that change between timesteps, retaining geometric grounding at a fraction of prior latency. In the most extensive empirical study of any open VLA to date, spanning 7 simulation and real-world benchmarks, MolmoAct2 outperforms strong baselines including Pi-05, while MolmoER surpasses GPT-5 and Gemini Robotics ER-1.5 across 13 embodied-reasoning benchmarks. We release model weights, training code, and complete training data. Project page: https://allenai.org/blog/molmoact2", 'score': 156, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'eb9c35698ea822db', 'authors': ['Haoquan Fang', 'Jiafei Duan', 'Donovan Clay', 'Sam Wang', 'Shuo Liu', 'Weikai Huang', 'Xiang Fan', 'Wei-Chuan Tsai', 'Shirui Chen', 'Yi Ru Wang', 'Shanli Xing', 'Jaemin Cho', 'Jae Sung Park', 'Ainaz Eftekhar', 'Peter Sushko', 'Karen Farley', 'Angad Wadhwa', 'Cole Harrison', 'Winson Han', 'Ying-Chun Lee', 'Eli VanderBilt', 'Rose Hendrix', 'Suveen Ellawela', 'Lucas Ngoo', 'Joyce Chai', 'Zhongzheng Ren', 'Ali Farhadi', 'Dieter Fox', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Amazon', 'Cortex AI', 'Johns Hopkins University', 'National University of Singapore', 'University of Michigan', 'University of North Carolina at Chapel Hill', 'University of Pennsylvania', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.02881.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#open_source', '#robotics', '#optimization', '#training', '#dataset', '#benchmark', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Открытая модель рассуждения для практического развёртывания роботов', 'desc': 'MolmoAct2 — это открытая модель视觉-语言-действие для робототехники, которая объединяет специализированный backbone VLM под названием MolmoER для пространственного и воплощённого рассуждения с новыми наборами данных, включая самый большой открытый набор двурукой телеоперации. Модель использует инновационную архитектуру, которая комбинирует дискретный токенизатор действий OpenFAST с экспертом по непрерывным действиям через flow-matching и KV-cache conditioning. Авторы предлагают MolmoThink — адаптивный вариант рассуждения, который снижает задержку, переустанавливая токены глубины только для изменяющихся областей сцены. MolmoAct2 демонстрирует превосходные результаты на 7 бенчмарках симуляции и реального мира, превосходя закрытые модели и конкурирующие открытые системы при полной открытости кода и весов.'}, 'en': {'title': 'Empowering Robots with Open-Action Reasoning!', 'desc': 'MolmoAct2 is an advanced open-action reasoning model designed for robotics, enhancing previous systems with improved vision-language-model backbones and new datasets. It introduces specialized components like MolmoER for better spatial reasoning and OpenFAST for efficient action tokenization. The architecture has been redesigned to support continuous-action predictions while minimizing latency through adaptive reasoning techniques. Extensive testing shows that MolmoAct2 outperforms existing models, making it a significant step towards practical deployment in real-world robotic applications.'}, 'zh': {'title': 'MolmoAct2：机器人动作推理的新突破', 'desc': 'MolmoAct2是一个开放的动作推理模型，旨在提升机器人系统的性能。它通过专门的视觉-语言模型骨干、全新的数据集和开放权重的动作标记器来实现这一目标。该模型还进行了架构重设计，以支持连续动作预测，并采用自适应推理来降低延迟。通过广泛的实证研究，MolmoAct2在多个基准测试中超越了现有的强基线，展示了其在实际应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.27660', 'title': 'From Context to Skills: Can Language Models Learn from Context Skillfully?', 'url': 'https://huggingface.co/papers/2604.27660', 'abstract': 'Abstract A self-evolving framework autonomously discovers and refines context-specific skills for language models through a multi-agent self-play loop with Challenger, Reasoner, and Judge components, improving context learning performance without human supervision.  AI-generated summary Many real-world tasks require language models (LMs) to reason over complex contexts that exceed their parametric knowledge. This calls for context learning, where LMs directly learn relevant knowledge from the given context. An intuitive solution is inference-time skill augmentation: extracting the rules and procedures from context into natural-language skills. However, constructing such skills for context learning scenarios faces two challenges: the prohibitive cost of manual skill annotation for long, technically dense contexts, and the lack of external feedback for automated skill construction. In this paper, we propose Ctx2Skill, a self-evolving framework that autonomously discovers, refines, and selects context-specific skills without human supervision or external feedback. At its core, a multi-agent self-play loop has a Challenger that generates probing tasks and rubrics, a Reasoner that attempts to solve them guided by an evolving skill set, and a neutral Judge that provides binary feedback. Crucially, both the Challenger and the Reasoner evolve through accumulated skills: dedicated Proposer and Generator agents analyze failure cases and synthesize them into targeted skill updates for both sides, enabling automated skill discovery and refinement. To prevent adversarial collapse caused by increasingly extreme task generation and over-specialized skill accumulation, we further introduce a Cross-time Replay mechanism that identifies the skill set achieving the best balance across representative cases for the Reasoner side, ensuring robust and generalizable skill evolution. The resulting skills can be plugged into any language model to obtain better context learning capability. Evaluated on four context learning tasks from CL-bench, Ctx2Skill consistently improves solving rates across backbone models.', 'score': 118, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '5bace71eca6dd484', 'authors': ['Shuzheng Si', 'Haozhe Zhao', 'Yu Lei', 'Qingyi Wang', 'Dingwei Chen', 'Zhitong Wang', 'Zhenhailong Wang', 'Kangyang Luo', 'Zheng Wang', 'Gang Chen', 'Fanchao Qi', 'Minjia Zhang', 'Maosong Sun'], 'affiliations': ['AI', 'CUHK', 'DeepLang', 'FDU', 'THU', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2604.27660.jpg', 'data': {'categories': ['#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самообучающиеся навыки для понимания контекста без надзора', 'desc': 'Представлена Ctx2Skill — самоэволюционирующая система, которая автоматически открывает и совершенствует специализированные навыки для языковых моделей без участия человека. Система использует многоагентный цикл самоигры с компонентами Challenger, Reasoner и Judge, где агенты генерируют задачи, решают их и предоставляют обратную связь. Особый механизм Cross-time Replay предотвращает деградацию навыков и обеспечивает их устойчивость. Экспериментальные результаты на бенчмарке CL-bench показывают, что открытые навыки значительно улучшают способность моделей к обучению из контекста.'}, 'en': {'title': 'Autonomous Skill Evolution for Context Learning in Language Models', 'desc': 'This paper presents Ctx2Skill, a framework that helps language models autonomously learn and improve skills specific to different contexts without needing human input. It uses a multi-agent system where a Challenger creates tasks, a Reasoner tries to solve them using learned skills, and a Judge provides feedback on the performance. The framework evolves by analyzing failures and updating skills, which allows it to discover and refine context-specific abilities effectively. Additionally, a Cross-time Replay mechanism ensures that the skills developed are balanced and applicable across various scenarios, enhancing the overall context learning performance of language models.'}, 'zh': {'title': '自我演化的上下文技能发现与优化', 'desc': '本文提出了一种自我演化框架Ctx2Skill，能够自主发现和优化特定上下文的技能，提升语言模型的上下文学习能力，而无需人工监督。该框架通过多智能体自我对弈循环，包含挑战者、推理者和评判者三个组件，自动生成任务并提供反馈。挑战者生成探测任务，推理者利用不断演化的技能集进行求解，而评判者则提供二元反馈。通过引入跨时间重放机制，确保技能演化的稳健性和通用性，从而有效应对任务生成的极端情况和技能过度专业化的问题。'}}}, {'id': 'https://huggingface.co/papers/2604.28075', 'title': 'Repetition over Diversity: High-Signal Data Filtering for Sample-Efficient German Language Modeling', 'url': 'https://huggingface.co/papers/2604.28075', 'abstract': 'Abstract Training high-quality filtered data multiple times yields better performance than single-pass training on larger, less filtered datasets for non-English language models.  AI-generated summary Recent research has shown that filtering massive English web corpora into high-quality subsets significantly improves training efficiency. However, for high-resource non-English languages like German, French, or Japanese, aggressive filtering creates a strategic dilemma: should practitioners prioritize diversity by training once on large amounts of lightly filtered web data, or prioritize quality by strictly filtering for a high-quality core and repeating it over multiple epochs? We investigate this trade-off for German by constructing hierarchical quality filters applied to 500M web documents, comparing multi-epoch training on the filtered subsets against single-pass training on a diverse corpus. Our experiments across multiple model scales and token budgets show that repeating high-quality data consistently outperforms single-pass training on larger, less filtered sets. Notably, the performance gap persists even after 7 epochs. Our findings suggest that for non-English LLMs, semantic concentration through quality filtering offers a more viable path to efficient language modeling than simply maximizing unique data volume. We release our German language models (called Boldt), as well as our cleaned evaluation benchmarks to the research community. Our experiments indicate that they achieve state-of-the-art results despite training on 10-360x fewer tokens than comparable models.', 'score': 12, 'issue_id': 2139, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '7925677320476ffc', 'authors': ['Ansar Aynetdinov', 'Patrick Haller', 'Alan Akbik'], 'affiliations': ['Humboldt-Universität zu Berlin'], 'pdf_title_img': 'assets/pdf/title_img/2604.28075.jpg', 'data': {'categories': ['#optimization', '#training', '#multilingual', '#open_source', '#benchmark', '#dataset'], 'emoji': '🇩🇪', 'ru': {'title': 'Качество данных важнее объёма: несколько эпох на отфильтрованном корпусе лучше, чем одна эпоха на большом', 'desc': 'В исследовании показано, что для обучения языковых моделей на неанглийских языках эффективнее многократно обучать модель на небольшом наборе высококачественных данных, чем один раз обучать на большом объёме менее отфильтрованных данных. Авторы применили иерархические фильтры качества к 500 миллионам веб-документов на немецком языке и сравнили обучение с несколькими эпохами на отфильтрованных подмножествах с одноразовым обучением на разнообразном корпусе. Эксперименты на разных масштабах моделей и бюджетах токенов подтвердили, что повторение высококачественных данных постоянно превосходит одноразовое обучение на больших наборах, и этот эффект сохраняется даже после 7 эпох. Результаты указывают, что для неанглийских LLM концентрация на качестве фильтрации является более эффективным путём, чем просто максимизация объёма уникальных данных.'}, 'en': {'title': 'Quality Over Quantity: The Key to Better Non-English Language Models', 'desc': 'This paper explores the impact of data quality versus quantity in training non-English language models, specifically focusing on German. It demonstrates that using high-quality, filtered datasets multiple times leads to better model performance compared to training on larger, less filtered datasets just once. The authors constructed hierarchical quality filters to analyze the trade-off between diversity and quality in training data. Their findings indicate that prioritizing semantic concentration through rigorous filtering is more effective for efficient language modeling than simply increasing the volume of unique data.'}, 'zh': {'title': '高质量数据多次训练优于单次训练', 'desc': '本研究探讨了在非英语语言模型训练中，使用高质量过滤数据的多次训练与单次训练在大规模、低过滤数据集上的表现差异。我们以德语为例，构建了分层质量过滤器，比较了在过滤子集上进行多轮训练与在多样化语料库上进行单次训练的效果。实验结果表明，重复使用高质量数据的训练方法在性能上显著优于单次训练，即使在经过多达7个训练周期后，这一差距依然存在。我们的发现表明，对于非英语大语言模型，通过质量过滤实现语义集中比单纯增加数据量更有效。'}}}, {'id': 'https://huggingface.co/papers/2605.00814', 'title': 'Persistent Visual Memory: Sustaining Perception for Deep Generation in LVLMs', 'url': 'https://huggingface.co/papers/2605.00814', 'abstract': 'Abstract Large vision-language models suffer from visual signal dilution during long sequence generation, which is mitigated by a lightweight persistent visual memory module that maintains visual attention and improves reasoning performance.  AI-generated summary While autoregressive Large Vision-Language Models (LVLMs) demonstrate remarkable proficiency in multimodal tasks, they face a "Visual Signal Dilution" phenomenon, where the accumulation of textual history expands the attention partition function, causing visual attention to decay inversely with generated sequence length. To counteract this, we propose Persistent Visual Memory (PVM), a lightweight learnable module designed to ensure sustained, on-demand visual perception. Integrated as a parallel branch alongside the Feed-Forward Network (FFN) in LVLMs, PVM establishes a distance-agnostic retrieval pathway that directly provides visual embeddings for precise visual perception, thereby structurally mitigating the signal suppression inherent to deep generation. Extensive experiments on Qwen3-VL models demonstrate that PVM brings notable improvements with negligible parameter overhead, delivering consistent average accuracy gains across both 4B and 8B scales, particularly in complex reasoning tasks that demand persistent visual perception. Furthermore, in-depth analysis reveals that PVM can resist length-induced signal decay and accelerate internal prediction convergence.', 'score': 11, 'issue_id': 2140, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '1d11652670eb7905', 'authors': ['Siyuan Huang', 'Xiaoye Qu', 'Yafu Li', 'Tong Zhu', 'Zefeng He', 'Muxin Fu', 'Daizong Liu', 'Wei-Long Zheng', 'Yu Cheng'], 'affiliations': ['Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Tongji University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00814.jpg', 'data': {'categories': ['#reasoning', '#long_context'], 'emoji': '👁️', 'ru': {'title': 'Сохранение визуальной памяти для устойчивого восприятия в трансформерных моделях', 'desc': 'В статье рассматривается проблема ослабления визуального сигнала в больших видео-языковых моделях при генерации длинных последовательностей. Авторы предлагают модуль Persistent Visual Memory (PVM) — компактный обучаемый компонент, который поддерживает стабильное внимание к визуальной информации и предотвращает её деградацию. PVM интегрируется параллельно с Feed-Forward сетью и обеспечивает прямой доступ к визуальным эмбеддингам независимо от длины генерируемой последовательности. Экспериментальные результаты на Qwen3-VL демонстрируют значительные улучшения в задачах сложного рассуждения с минимальным увеличением параметров модели.'}, 'en': {'title': 'Enhancing Visual Attention in Long Sequence Generation with Persistent Memory', 'desc': 'This paper addresses the issue of visual signal dilution in large vision-language models (LVLMs) during long sequence generation. The authors introduce a solution called Persistent Visual Memory (PVM), which is a lightweight module that helps maintain visual attention throughout the generation process. By integrating PVM alongside the Feed-Forward Network, it provides a reliable way to access visual information, improving reasoning performance without significantly increasing model complexity. Experiments show that PVM enhances accuracy in complex tasks, effectively countering the decay of visual signals as sequence length increases.'}, 'zh': {'title': '持久视觉记忆：提升视觉语言模型的推理能力', 'desc': '本文探讨了大型视觉语言模型在生成长序列时面临的视觉信号稀释问题。为了解决这个问题，提出了一种轻量级的持久视觉记忆模块（PVM），它能够保持视觉注意力并提高推理性能。PVM作为并行分支集成在模型中，提供了直接的视觉嵌入，从而减轻了深度生成中的信号抑制。实验结果表明，PVM在复杂推理任务中显著提高了模型的准确性，同时参数开销极小。'}}}, {'id': 'https://huggingface.co/papers/2605.00877', 'title': 'OceanPile: A Large-Scale Multimodal Ocean Corpus for Foundation Models', 'url': 'https://huggingface.co/papers/2605.00877', 'abstract': 'Abstract OceanPile presents a large-scale multimodal corpus for ocean science, combining diverse data types and a knowledge graph-guided instruction dataset to advance marine AI applications.  AI-generated summary The vast and underexplored ocean plays a critical role in regulating global climate and supporting marine biodiversity, yet artificial intelligence has so far delivered limited impact in this domain due to a fundamental data bottleneck. Specifically, ocean data are highly fragmented across disparate sources and inherently exhibit multi-modal, high-noise, and weakly labeled characteristics, lacking unified schemas and semantic alignment. Although Multimodal Large Language Models (MLLMs) have achieved remarkable success in general domains, their application to ocean science remains severely constrained by the absence of large-scale, well-aligned multimodal datasets tailored to marine environments. To bridge this gap, we introduce OceanPile, a large-scale multimodal corpus designed for ocean foundation models. It comprises three key components: OceanCorpus, a unified collection integrating sonar data, underwater imagery, marine science visuals, and scientific text from diverse authoritative sources; OceanInstruction, a high-quality instruction dataset synthesized via a novel pipeline guided by a hierarchical Ocean Concept Knowledge Graph; and OceanBenchmark, a manually curated evaluation benchmark for rigorous assessment. We establish a multi-stage quality control process to ensure scientific validity and alignment across modalities. Experimental validation demonstrates significant performance improvements for models trained on our data. All datasets are publicly released to advance the field of marine artificial intelligence and empower domain-specific MLLMs.', 'score': 8, 'issue_id': 2138, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '156562b4d18b4995', 'authors': ['Yida Xue', 'Ningyu Zhang', 'Tingwei Wu', 'Zhe Ma', 'Daxiong Ji', 'Zhao Wang', 'Guozhou Zheng', 'Huajun Chen'], 'affiliations': ['College of Computer Science and Technology, Zhejiang University', 'Ocean College, Zhejiang University', 'Ocean Research Center of Zhoushan, Zhejiang University', 'School of Software Technology, Zhejiang University', 'State Key Laboratory of Ocean Sensing', 'ZJU-Hangzhou Global Scientific and Technological Innovation Center'], 'pdf_title_img': 'assets/pdf/title_img/2605.00877.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Мультимодальный фундамент для искусственного интеллекта в морской науке', 'desc': 'OceanPile представляет крупномасштабный мультимодальный корпус данных для морской науки, объединяющий разнородные источники информации включая гидроакустические данные, подводные изображения и научные тексты. Авторы создали граф знаний по океанским концепциям для автоматической генерации высококачественного датасета инструкций, обеспечивающего семантическое выравнивание между модальностями. Введена многоэтапная процедура контроля качества, гарантирующая научную валидность и корректность разметки данных. Предложенный корпус позволяет обучать специализированные мультимодальные большие языковые модели для задач морской науки и значительно улучшает их производительность.'}, 'en': {'title': 'Empowering Marine AI with OceanPile: A Unified Multimodal Dataset', 'desc': 'OceanPile is a comprehensive multimodal dataset aimed at enhancing artificial intelligence applications in ocean science. It addresses the challenges of fragmented and noisy ocean data by integrating various data types, including sonar, imagery, and scientific texts, into a unified corpus. The dataset also features a guided instruction set based on a hierarchical knowledge graph, ensuring better alignment and understanding of marine concepts. By providing a robust evaluation benchmark and publicly releasing all components, OceanPile aims to significantly improve the performance of machine learning models in marine environments.'}, 'zh': {'title': '推动海洋科学的人工智能应用', 'desc': 'OceanPile是一个大规模的多模态语料库，旨在推动海洋科学中的人工智能应用。它结合了多种数据类型和知识图谱指导的指令数据集，以解决海洋数据的碎片化和噪声问题。该语料库包括海洋语料库、指令数据集和评估基准，确保了数据的科学有效性和跨模态的一致性。通过实验验证，使用OceanPile数据训练的模型表现出显著的性能提升，所有数据集均已公开发布，以促进海洋人工智能领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.02661', 'title': 'AcademiClaw: When Students Set Challenges for AI Agents', 'url': 'https://huggingface.co/papers/2605.02661', 'abstract': "Abstract AcademiClaw presents a comprehensive benchmark for evaluating AI agents on complex academic tasks spanning multiple domains, revealing significant capability gaps in current models.  AI-generated summary Benchmarks within the OpenClaw ecosystem have thus far evaluated exclusively assistant-level tasks, leaving the academic-level capabilities of OpenClaw largely unexamined. We introduce AcademiClaw, a bilingual benchmark of 80 complex, long-horizon tasks sourced directly from university students' real academic workflows -- homework, research projects, competitions, and personal projects -- that they found current AI agents unable to solve effectively. Curated from 230 student-submitted candidates through rigorous expert review, the final task set spans 25+ professional domains, ranging from olympiad-level mathematics and linguistics problems to GPU-intensive reinforcement learning and full-stack system debugging, with 16 tasks requiring CUDA GPU execution. Each task executes in an isolated Docker sandbox and is scored on task completion by multi-dimensional rubrics combining six complementary techniques, with an independent five-category safety audit providing additional behavioral analysis. Experiments on six frontier models show that even the best achieves only a 55\\% pass rate. Further analysis uncovers sharp capability boundaries across task domains, divergent behavioral strategies among models, and a disconnect between token consumption and output quality, providing fine-grained diagnostic signals beyond what aggregate metrics reveal. We hope that AcademiClaw and its open-sourced data and code can serve as a useful resource for the OpenClaw community, driving progress toward agents that are more capable and versatile across the full breadth of real-world academic demands. All data and code are available at https://github.com/GAIR-NLP/AcademiClaw.", 'score': 7, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '26fe24e98e2946f6', 'authors': ['Junjie Yu', 'Pengrui Lu', 'Weiye Si', 'Hongliang Lu', 'Jiabao Wu', 'Kaiwen Tao', 'Kun Wang', 'Lingyu Yang', 'Qiran Zhang', 'Xiuting Guo', 'Xuanyu Wang', 'Yang Wang', 'Yanjie Wang', 'Yi Yang', 'Zijian Hu', 'Ziyi Yang', 'Zonghan Zhou', 'Binghao Qiang', 'Borui Zhang', 'Chenning Li', 'Enchang Zhang', 'Feifan Chen', 'Feng Jian', 'Fengyin Sun', 'Hao Qiu', 'Hao Zheng', 'Haoran Zhu', 'Hongyu Liu', 'Jianbin Deng', 'Jiaxin Song', 'Jiaying Chi', 'Jiayou Shi', 'Jie Fang', 'Jinghui Zhong', 'Jingyu Zhou', 'Jinze Li', 'Junfeng Yi', 'Junyan Yu', 'Junzhi Xue', 'Ni Song', 'Pengyi Chen', 'Qi Chen', 'Quansheng Li', 'Rui Tao', 'Shenghai Gong', 'Shenhang Lu', 'Tianqi Shen', 'Tianxiang Zhu', 'Tiehan Kang', 'Tingyu Li', 'Wendi Wu', 'Xiao Shen', 'Xiao Zhou', 'Xiaotao Zhang', 'Xinrong Li', 'Xuankun Yang', 'Xun Zhang', 'Yan Li', 'Ye Lu', 'Yi Wang', 'Yibo Zhou', 'Yichi Zhang', 'Yihao Sun', 'Yijun Huang', 'Yixin Zhu', 'Yixuan Wu', 'Yuchen Sun', 'Yue Wu', 'Yuheng Sun', 'Yukun Li', 'Yutian Tu', 'Yuxuan Qin', 'Yuzhuo Wu', 'Zeyu Li', 'Zhengyu Lou', 'Zhenning Ran', 'Zizhu He', 'Pengfei Liu'], 'affiliations': ['GAIR', 'SII', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02661.jpg', 'data': {'categories': ['#science', '#agents', '#survey', '#multilingual', '#dataset', '#benchmark', '#open_source'], 'emoji': '🎓', 'ru': {'title': 'Когда студенческие задачи сильнее моделей: оценка реальных способностей AI агентов', 'desc': 'AcademiClaw представляет комплексный бенчмарк для оценки AI агентов на сложных академических задачах, охватывающих более 25 профессиональных областей. Набор данных включает 80 долгоинтервальных задач из реальных учебных процессов студентов, от олимпиадной математики до GPU-интенсивного машинного обучения. Каждая задача выполняется в изолированном окружении с использованием мультимерных метрик оценки и многомерного анализа безопасности. Эксперименты показывают, что лучшие современные модели достигают только 55% успешности, выявляя значительные пробелы в способностях и выраженные границы компетентности между различными предметными областями.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Academic Challenges', 'desc': 'AcademiClaw is a new benchmark designed to evaluate AI agents on complex academic tasks that reflect real university student workflows. It includes 80 challenging tasks across various domains, highlighting the limitations of current AI models in handling academic-level problems. The tasks are rigorously curated and scored using multi-dimensional rubrics, with a focus on safety and behavioral analysis. Initial experiments show that even the best AI models only achieve a 55% success rate, indicating significant gaps in their capabilities and providing insights for future improvements.'}, 'zh': {'title': '提升AI学术能力的基准测试', 'desc': 'AcademiClaw是一个全面的基准测试，用于评估AI代理在复杂学术任务上的表现，揭示了当前模型的能力差距。该基准包含80个复杂的任务，来源于大学生的真实学术工作流程，涵盖多个专业领域。通过严格的专家评审，从230个学生提交的候选任务中筛选而来，任务包括数学、语言学和强化学习等。实验结果显示，即使是最好的模型，及格率也仅为55%，并且在任务领域之间存在明显的能力边界和行为策略差异。'}}}, {'id': 'https://huggingface.co/papers/2405.13729', 'title': 'ComboStoc: Combinatorial Stochasticity for Diffusion Generative Models', 'url': 'https://huggingface.co/papers/2405.13729', 'abstract': 'Abstract Combining stochastic processes with diffusion models addresses combinatorial complexity limitations, accelerating training and enabling asynchronous generation across data modalities.  AI-generated summary In this paper, we study an under-explored but important factor of diffusion generative models, i.e., the combinatorial complexity. Data samples are generally high-dimensional, and for various structured generation tasks, additional attributes are combined to associate with data samples. We show that the space spanned by the combination of dimensions and attributes can be insufficiently covered by existing training schemes of diffusion generative models, potentially limiting test time performance. We present a simple fix to this problem by constructing stochastic processes that fully exploit the combinatorial structures, hence the name ComboStoc. Using this simple strategy, we show that network training is significantly accelerated across diverse data modalities, including images and 3D structured shapes. Moreover, ComboStoc enables a new way of test time generation which uses asynchronous time steps for different dimensions and attributes, thus allowing for varying degrees of control over them. Our code is available at: https://github.com/Xrvitd/ComboStoc', 'score': 6, 'issue_id': 2137, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '19e64bf81430cca0', 'authors': ['Rui Xu', 'Jiepeng Wang', 'Hao Pan', 'Yang Liu', 'Xin Tong', 'Shiqing Xin', 'Changhe Tu', 'Taku Komura', 'Wenping Wang'], 'affiliations': ['Microsoft Research Asia', 'Shandong University', 'Texas A&M University', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2405.13729.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🎲', 'ru': {'title': 'Комбинаторные стохастические процессы для ускоренного обучения диффузионных моделей', 'desc': 'В статье предложен метод ComboStoc, который объединяет стохастические процессы с диффузионными моделями для решения проблемы комбинаторной сложности. Авторы показывают, что при генерации структурированных данных существующие схемы обучения недостаточно покрывают пространство комбинаций измерений и атрибутов, что ограничивает качество моделей. Предложенный подход эксплуатирует комбинаторную структуру данных, что значительно ускоряет обучение сети на различных типах данных, включая изображения и 3D-объекты. Кроме того, метод позволяет использовать асинхронные временные шаги при генерации, обеспечивая гибкий контроль над отдельными атрибутами.'}, 'en': {'title': 'Accelerating Diffusion Models with ComboStoc', 'desc': 'This paper addresses the challenges of combinatorial complexity in diffusion generative models, which can hinder their performance on high-dimensional data. The authors introduce a method called ComboStoc that utilizes stochastic processes to better manage the combination of dimensions and attributes in data samples. By doing so, they enhance the training speed and effectiveness of these models across various data types, such as images and 3D shapes. Additionally, ComboStoc allows for asynchronous generation, providing more control over the generation process at test time.'}, 'zh': {'title': '利用组合结构加速扩散生成模型训练', 'desc': '本文探讨了扩散生成模型中的组合复杂性问题。数据样本通常是高维的，且在生成任务中需要结合额外属性。我们提出了一种名为ComboStoc的方法，通过构建随机过程来充分利用组合结构，从而加速网络训练。该方法还允许在测试时对不同维度和属性进行异步生成，提供了更灵活的控制方式。'}}}, {'id': 'https://huggingface.co/papers/2605.01428', 'title': 'Hallucinations Undermine Trust; Metacognition is a Way Forward', 'url': 'https://huggingface.co/papers/2605.01428', 'abstract': "Abstract Generative AI models continue to produce factual errors despite improvements in reliability, with the key challenge being distinguishing known from unknown information rather than simply expanding knowledge boundaries.  AI-generated summary Despite significant strides in factual reliability, errors -- often termed hallucinations -- remain a major concern for generative AI, especially as LLMs are increasingly expected to be helpful in more complex or nuanced setups. Yet even in the simplest setting -- factoid question-answering with clear ground truth-frontier models without external tools continue to hallucinate. We argue that most factuality gains in this domain have come from expanding the model's knowledge boundary (encoding more facts) rather than improving awareness of that boundary (distinguishing known from unknown). We conjecture that the latter is inherently difficult: models may lack the discriminative power to perfectly separate truths from errors, creating an unavoidable tradeoff between eliminating hallucinations and preserving utility.   This tradeoff dissolves under a different framing. If we understand hallucinations as confident errors -- incorrect information delivered without appropriate qualification -- a third path emerges beyond the answer-or-abstain dichotomy: expressing uncertainty. We propose faithful uncertainty: aligning linguistic uncertainty with intrinsic uncertainty. This is one facet of metacognition -- the ability to be aware of one's own uncertainty and to act on it. For direct interaction, acting on uncertainty means communicating it honestly; for agentic systems, it becomes the control layer governing when to search and what to trust. Metacognition is thus essential for LLMs to be both trustworthy and capable; we conclude by highlighting open problems for progress towards this objective.", 'score': 4, 'issue_id': 2145, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '242aff122b607675', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#alignment', '#hallucinations', '#interpretability'], 'emoji': '🎯', 'ru': {'title': 'От расширения знаний к осознанию неопределённости: метакогниция как путь к надёжным языковым моделям', 'desc': 'В статье анализируется проблема галлюцинаций в генеративных моделях, показывая, что основной вызов заключается не в расширении знаний модели, а в улучшении её способности различать известную и неизвестную информацию. Авторы выдвигают гипотезу о неизбежном компромиссе между устранением ошибок и сохранением полезности моделей, так как им может не хватать дискриминативной способности идеально разделить истину от ошибок. Предлагается решение через концепцию верной неуверенности — согласование лингвистического выражения неопределённости с внутренней неуверенностью модели. Метакогниция — способность модели осознавать собственную неуверенность и действовать на её основе — признаётся критически важной для создания надёжных и функциональных LLM систем.'}, 'en': {'title': 'Embracing Uncertainty: A Path to Trustworthy AI', 'desc': "This paper discusses the ongoing issue of factual errors, or hallucinations, in generative AI models, particularly large language models (LLMs). It highlights that improvements in factual reliability have mainly come from increasing the model's knowledge base rather than enhancing its ability to distinguish between known and unknown information. The authors propose a new approach called 'faithful uncertainty,' which encourages models to express their uncertainty about information rather than providing confident but incorrect answers. They argue that incorporating metacognition, or self-awareness of uncertainty, is crucial for making LLMs more trustworthy and effective in complex tasks."}, 'zh': {'title': '提升生成式AI的可靠性：表达不确定性', 'desc': '生成式人工智能模型在可靠性方面有所改善，但仍然存在事实错误，主要挑战在于区分已知信息和未知信息，而不仅仅是扩展知识边界。尽管在事实可靠性方面取得了显著进展，但生成式AI的错误（通常称为幻觉）仍然是一个主要问题，尤其是在复杂或细微的场景中。我们认为，事实性提升主要来自于扩展模型的知识边界，而不是提高对该边界的意识。我们提出了一种新的思路，即通过表达不确定性来解决幻觉问题，这种方法可以帮助模型在保持实用性的同时减少错误。'}}}, {'id': 'https://huggingface.co/papers/2605.02240', 'title': 'PhysicianBench: Evaluating LLM Agents in Real-World EHR Environments', 'url': 'https://huggingface.co/papers/2605.02240', 'abstract': 'Abstract PhysicianBench evaluates LLM agents on real clinical tasks requiring complex, multi-step workflows within electronic health record environments, revealing significant gaps in current agent capabilities.  AI-generated summary We introduce PhysicianBench, a benchmark for evaluating LLM agents on physician tasks grounded in real clinical setting within electronic health record (EHR) environments. Existing medical agent benchmarks primarily focus on static knowledge recall, single-step atomic actions, or action intent without verifiable execution against the environment. As a result, they fail to capture the long-horizon, composite workflows that characterize real clinical systems. PhysicianBench comprises 100 long-horizon tasks adapted from real consultation cases between primary care and subspecialty physicians, with each task independently reviewed by a separate panel of physicians. Tasks are instantiated in an EHR environment with real patient records and accessed through the same standard APIs used by commercial EHR vendors. Tasks span 21 specialties (e.g., cardiology, endocrinology, oncology, psychiatry) and diverse workflow types (e.g., diagnosis interpretation, medication prescribing, treatment planning), requiring an average of 27 tool calls per task. Solving each task requires retrieving data across encounters, reasoning over heterogeneous clinical information, executing consequential clinical actions, and producing clinical documentation. Each task is decomposed into structured checkpoints (670 in total across the benchmark) capturing distinct stages of completion graded by task-specific scripts with execution-grounded verification. Across 13 proprietary and open-source LLM agents, the best-performing model achieves only 46% success rate (pass@1), while open-source models reach at most 19%, revealing a substantial gap between current agent capabilities and the demands of real-world clinical workflows. PhysicianBench provides a realistic and execution-grounded benchmark for measuring progress toward autonomous clinical agents.', 'score': 3, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '056dde8528b4e5d9', 'authors': ['Ruoqi Liu', 'Imran Q. Mohiuddin', 'Austin J. Schoeffler', 'Kavita Renduchintala', 'Ashwin Nayak', 'Prasantha L. Vemu', 'Shivam C. Vedak', 'Kameron C. Black', 'John L. Havlik', 'Isaac Ogunmola', 'Stephen P. Ma', 'Roopa Dhatt', 'Jonathan H. Chen'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02240.jpg', 'data': {'categories': ['#healthcare', '#dataset', '#benchmark', '#agents'], 'emoji': '👨\u200d⚕️', 'ru': {'title': 'Измерение способности LLM-агентов к автономной клинической деятельности', 'desc': 'PhysicianBench — это бенчмарк для оценки способностей LLM-агентов выполнять реальные задачи врачей в среде электронных медицинских записей (ЭМР). В отличие от существующих медицинских бенчмарков, которые сосредоточены на простом вспоминании знаний и отдельных действиях, PhysicianBench включает 100 сложных многошаговых рабочих процессов, адаптированных из реальных консультаций, охватывающих 21 медицинскую специальность. Каждая задача требует в среднем 27 вызовов инструментов и включает извлечение данных, клиническое рассуждение и выполнение действительных медицинских операций с проверкой на реальном окружении. Результаты показывают значительный разрыв: лучшие модели достигают только 46% успеха, а открытые модели — максимум 19%, что выявляет существенные ограничения современных LLM-агентов для клинических приложений.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Clinical Workflows', 'desc': 'PhysicianBench is a new benchmark designed to evaluate large language model (LLM) agents on complex clinical tasks within electronic health record (EHR) systems. Unlike previous benchmarks that focus on simple tasks or knowledge recall, PhysicianBench assesses agents on long-horizon workflows that reflect real physician activities, such as diagnosis and treatment planning. The benchmark includes 100 tasks across various medical specialties, requiring agents to perform multiple steps and make decisions based on diverse clinical data. Results show that current LLM agents struggle with these tasks, achieving only a 46% success rate, highlighting the need for improved capabilities in handling real-world clinical scenarios.'}, 'zh': {'title': '评估临床任务的智能代理基准', 'desc': 'PhysicianBench是一个用于评估大型语言模型（LLM）在真实临床任务中的表现的基准，特别是在电子健康记录（EHR）环境中。现有的医学代理基准主要关注静态知识回忆和单步操作，无法有效捕捉复杂的临床工作流程。PhysicianBench包含100个来自真实咨询案例的长期任务，涵盖21个专业领域，要求模型在真实患者记录中进行多步骤推理和执行。研究表明，当前的LLM代理在满足真实临床工作需求方面存在显著差距，最佳模型的成功率仅为46%。'}}}, {'id': 'https://huggingface.co/papers/2605.02178', 'title': 'T^2PO: Uncertainty-Guided Exploration Control for Stable Multi-Turn Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.02178', 'abstract': "Abstract Token- and Turn-level Policy Optimization (T²PO) addresses multi-turn RL instability by controlling exploration at fine-grained levels through uncertainty monitoring and dynamic resampling.  AI-generated summary Recent progress in multi-turn reinforcement learning (RL) has significantly improved reasoning LLMs' performances on complex interactive tasks. Despite advances in stabilization techniques such as fine-grained credit assignment and trajectory filtering, instability remains pervasive and often leads to training collapse. We argue that this instability stems from inefficient exploration in multi-turn settings, where policies continue to generate low-information actions that neither reduce uncertainty nor advance task progress. To address this issue, we propose Token- and Turn-level Policy Optimization (T^2PO), an uncertainty-aware framework that explicitly controls exploration at fine-grained levels. At the token level, T^2PO monitors uncertainty dynamics and triggers a thinking intervention once the marginal uncertainty change falls below a threshold. At the turn level, T^2PO identifies interactions with negligible exploration progress and dynamically resamples such turns to avoid wasted rollouts. We evaluate T^2PO in diverse environments, including WebShop, ALFWorld, and Search QA, demonstrating substantial gains in training stability and performance improvements with better exploration efficiency. Code is available at: https://github.com/WillDreamer/T2PO.", 'score': 2, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '1937f4867e57d2c1', 'authors': ['Haixin Wang', 'Hejie Cui', 'Chenwei Zhang', 'Xin Liu', 'Shuowei Jin', 'Shijie Geng', 'Xinyang Zhang', 'Nasser Zalmout', 'Zhenyu Shi', 'Yizhou Sun'], 'affiliations': ['Amazon.com Inc.', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.02178.jpg', 'data': {'categories': ['#reasoning', '#agents', '#optimization', '#training', '#rl', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умное исследование через мониторинг неопределённости на уровне токенов и шагов', 'desc': 'В работе предложен метод Token- and Turn-level Policy Optimization (T²PO) для стабилизации обучения с подкреплением в многошаговых задачах. Основная идея заключается в контролировании исследования пространства действий на двух уровнях: на уровне токенов мониторится неопределённость и запускается вмешательство при стагнации, а на уровне шагов диалога выявляются взаимодействия с низким прогрессом исследования и перепробируются для избежания бесполезных траекторий. Метод решает проблему генерации моделью низкоинформативных действий, которые не снижают неопределённость и не продвигают решение задачи. Эксперименты на WebShop, ALFWorld и Search QA показывают значительное улучшение стабильности обучения и эффективности исследования.'}, 'en': {'title': 'Enhancing Multi-Turn RL Stability with T²PO', 'desc': 'The paper introduces Token- and Turn-level Policy Optimization (T²PO), a method designed to improve stability in multi-turn reinforcement learning (RL) by enhancing exploration strategies. It identifies that traditional methods often lead to ineffective actions that do not contribute to learning, causing training instability. T²PO addresses this by monitoring uncertainty at both the token and turn levels, allowing for targeted interventions when exploration is insufficient. The results show that T²PO significantly boosts training stability and performance across various environments by optimizing exploration efficiency.'}, 'zh': {'title': '细粒度探索，稳定多回合强化学习', 'desc': '本文提出了一种名为T²PO的多回合强化学习策略优化方法，旨在解决多回合训练中的不稳定性问题。该方法通过监测不确定性和动态重采样，在细粒度层面上控制探索过程。T²PO在令牌层面监控不确定性变化，并在不确定性变化低于阈值时进行干预；在回合层面识别探索进展微小的交互，并动态重采样以避免浪费训练资源。通过在多个环境中进行评估，T²PO显示出显著的训练稳定性和性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.00529', 'title': 'Hierarchical Abstract Tree for Cross-Document Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2605.00529', 'abstract': 'Abstract Ψ-RAG addresses limitations in tree-based retrieval-augmented generation for cross-document multi-hop questions through a hierarchical abstract tree index and multi-granular retrieval agent.  AI-generated summary Retrieval-augmented generation (RAG) enhances large language models with external knowledge, and tree-based RAG organizes documents into hierarchical indexes to support queries at multiple granularities. However, existing Tree-RAG methods designed for single-document retrieval face critical challenges in scaling to cross-document multi-hop questions: (1) poor distribution adaptability, where k-means clustering introduces noise due to rigid distribution assumptions; (2) structural isolation, as tree indexes lack explicit cross-document connections; and (3) coarse abstraction, which obscures fine-grained details. To address these limitations, we propose Ψ-RAG, a tree-RAG framework with two key components. First, a hierarchical abstract tree index built through an iterative "merging and collapse" process that adapts to data distributions without a priori assumption. Second, a multi-granular retrieval agent that intelligently interacts with the knowledge base with reorganized queries and an agent-powered hybrid retriever. Ψ-RAG supports diverse tasks from token-level question answering to document-level summarization. On cross-document multi-hop QA benchmarks, it outperforms RAPTOR by 25.9% and HippoRAG 2 by 7.4% in average F1 score. Code is available at https://github.com/Newiz430/Psi-RAG.', 'score': 2, 'issue_id': 2139, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '2a0c8471f87df61e', 'authors': ['Ziwen Zhao', 'Menglin Yang'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.00529.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rag'], 'emoji': '🌳', 'ru': {'title': 'Адаптивное иерархическое дерево для многодокументного поиска в RAG системах', 'desc': 'В статье представляется Ψ-RAG, улучшенная система извлечения и генерации (RAG), которая решает проблемы древовидных методов при обработке многошаговых вопросов, требующих информации из нескольких документов. Основной вклад заключается в иерархическом индексе абстрактного дерева, построенном итеративным процессом слияния и схлопывания, который адаптируется к реальному распределению данных без предварительных предположений. Система включает многоуровневого агента поиска, который интеллектуально взаимодействует с базой знаний, переформулируя запросы и используя гибридный поиск для получения релевантной информации. Экспериментальные результаты показывают, что Ψ-RAG превосходит существующие методы на 25,9% по сравнению с RAPTOR и на 7,4% по сравнению с HippoRAG 2 по метрике F1.'}, 'en': {'title': 'Revolutionizing Multi-Hop Question Answering with Ψ-RAG', 'desc': 'Ψ-RAG is a novel framework designed to improve retrieval-augmented generation (RAG) for complex multi-hop questions across multiple documents. It introduces a hierarchical abstract tree index that adapts to data distributions, overcoming limitations of traditional tree-based methods that struggle with cross-document connections. Additionally, it features a multi-granular retrieval agent that enhances query interactions with the knowledge base, allowing for more precise information retrieval. The framework demonstrates significant performance improvements on cross-document QA tasks, outperforming existing models in average F1 score.'}, 'zh': {'title': 'Ψ-RAG：跨文档多跳问答的新突破', 'desc': 'Ψ-RAG是一种新的树形检索增强生成框架，旨在解决跨文档多跳问题中的局限性。它通过构建一个层次抽象树索引和多粒度检索代理来提高检索的灵活性和准确性。与传统的树形RAG方法相比，Ψ-RAG能够更好地适应数据分布，并且能够处理文档之间的连接。实验结果表明，Ψ-RAG在跨文档多跳问答基准测试中表现优于现有方法，提升了F1分数。'}}}, {'id': 'https://huggingface.co/papers/2605.02222', 'title': 'Generative Modeling with Orbit-Space Particle Flow Matching', 'url': 'https://huggingface.co/papers/2605.02222', 'abstract': 'Abstract Orbit-Space Geometric Probability Paths (OGPP) presents a particle-native flow-matching framework that improves generative modeling of particle systems through orbit-space canonicalization, particle index embeddings, and geometric probability paths with arc-length-aware terminal velocities.  AI-generated summary We present Orbit-Space Geometric Probability Paths (OGPP), a particle-native flow-matching framework for generative modeling of particle systems. OGPP is motivated by two insights: (i) particles are defined up to permutation symmetries, so anonymous indexing inflates per-index target variance and yields curved, hard-to-learn flows; and (ii) particles live in physical space, so the flow terminal velocity has physical meaning and can encode geometric attributes, e.g., surface normals. OGPP instantiates three key components: (1) orbit-space canonicalization of the probability-path terminal endpoint, (2) particle index embeddings for role specialization, and (3) geometric probability paths with arc-length-aware terminal velocities that generate normals as a byproduct of the flow. We evaluate OGPP on minimal-surface benchmarks, where it reduces metric error by up to two orders of magnitude in a single inference step; on ShapeNet, where it matches the state of the art with 5x fewer steps and reaches airplane EMD comparable to DiT-3D with 26x fewer parameters and 5x fewer steps; and on single-shape encoding, where it produces normals and reconstructions competitive with 6D generators while operating entirely in 3D.', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a43f584ff0ccad95', 'authors': ['Sinan Wang', 'Jinjin He', 'Shenyifan Lu', 'Ruicheng Wang', 'Greg Turk', 'Bo Zhu'], 'affiliations': ['Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.02222.jpg', 'data': {'categories': ['#3d', '#diffusion', '#optimization', '#training', '#architecture'], 'emoji': '🌀', 'ru': {'title': 'Симметричный поток: генерация частиц без перестановочного шума', 'desc': 'OGPP представляет новый подход к генеративному моделированию систем частиц на основе flow matching. Ключевая идея заключается в учёте симметрии перестановок частиц через орбит-пространственную канонизацию, что снижает дисперсию целевой функции и упрощает обучение. Фреймворк использует встраивания индексов частиц для специализации ролей и геометрические пути вероятностей с терминальными скоростями, зависящими от длины дуги. Метод достигает значительного улучшения на бенчмарках минимальных поверхностей и ShapeNet, требуя значительно меньше шагов и параметров по сравнению с существующими методами.'}, 'en': {'title': 'Revolutionizing Particle Systems with OGPP', 'desc': 'The paper introduces Orbit-Space Geometric Probability Paths (OGPP), a new framework designed to enhance generative modeling of particle systems. It addresses the challenges of particle permutation symmetries and the physical meaning of flow terminal velocities by implementing orbit-space canonicalization and particle index embeddings. The framework also incorporates geometric probability paths that are aware of arc-length, allowing for the generation of surface normals as a byproduct. Experimental results show that OGPP significantly reduces metric error and achieves competitive performance with fewer computational resources compared to existing methods.'}, 'zh': {'title': '提升粒子系统生成建模的OGPP框架', 'desc': '本文提出了一种名为轨道空间几何概率路径（OGPP）的框架，旨在改进粒子系统的生成建模。OGPP通过轨道空间标准化、粒子索引嵌入和考虑弧长的终端速度的几何概率路径来实现这一目标。该方法解决了粒子在排列对称性下的匿名索引问题，从而减少了目标方差并提高了流的可学习性。实验结果表明，OGPP在多个基准测试中显著降低了度量误差，并在生成效率和参数使用上优于现有技术。'}}}, {'id': 'https://huggingface.co/papers/2605.02730', 'title': 'Perceptual Flow Network for Visually Grounded Reasoning', 'url': 'https://huggingface.co/papers/2605.02730', 'abstract': 'Abstract Perceptual Flow Network addresses limitations in vision-language models by decoupling perception from reasoning and using variational reinforcement learning with multi-dimensional rewards for improved visual reasoning.  AI-generated summary Despite the success of Large-Vision Language Models (LVLMs), general optimization objectives (e.g., standard MLE) fail to constrain visual trajectories, leading to language bias and hallucination. To mitigate this, current methods introduce geometric priors from visual experts as additional supervision. However, we observe that such supervision is typically suboptimal: it is biased toward geometric precision and offers limited reasoning utility. To bridge this gap, we propose Perceptual Flow Network (PFlowNet), which eschews rigid alignment with the expert priors and achieves interpretable yet more effective visual reasoning. Specifically, PFlowNet decouples perception from reasoning to establish a self-conditioned generation process. Based on this, it integrates multi-dimensional rewards with vicinal geometric shaping via variational reinforcement learning, thereby facilitating reasoning-oriented perceptual behaviors while preserving visual reliability. PFlowNet delivers a provable performance guarantee and competitive empirical results, particularly setting new SOTA records on V* Bench (90.6%) and MME-RealWorld-lite (67.0%).', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a0b0e850223cf874', 'authors': ['Yangfu Li', 'Yuning Gong', 'Hongjian Zhan', 'Teng Li', 'Yuanhuiyi Lyu', 'Tianyi Chen', 'Qi Liu', 'Ziyuan Huang', 'Zhihang Zhong', 'Dandan Zheng', 'Yue Lu'], 'affiliations': ['Ant Group', 'ECNU', 'HKUST', 'SCU', 'SJTU', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2605.02730.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#interpretability', '#hallucinations', '#optimization', '#cv', '#rl', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Разделение восприятия и мышления для честного визуального рассуждения', 'desc': 'Перцепционная сеть потоков (PFlowNet) решает проблему галлюцинаций в больших визуально-языковых моделях путём разделения восприятия и рассуждения. Метод использует вариационное обучение с подкреплением и многомерные награды для улучшения визуального рассуждения, отказываясь от жёсткого следования экспертным геометрическим приоритам. PFlowNet устанавливает самообусловленный процесс генерации, который балансирует между точностью визуального восприятия и качеством логических выводов. Модель достигает новых рекордов на бенчмарках V* Bench и MME-RealWorld-lite.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Superior Visual Understanding', 'desc': 'The Perceptual Flow Network (PFlowNet) improves vision-language models by separating perception from reasoning, allowing for better visual reasoning capabilities. It uses variational reinforcement learning with multi-dimensional rewards to enhance the reasoning process while maintaining visual accuracy. Unlike previous methods that relied heavily on geometric priors, PFlowNet offers a more flexible approach that avoids biases and hallucinations in language generation. This innovative framework has achieved state-of-the-art results on benchmark datasets, demonstrating its effectiveness in visual reasoning tasks.'}, 'zh': {'title': '感知流网络：解耦感知与推理的创新之路', 'desc': '感知流网络（PFlowNet）解决了视觉语言模型的局限性，通过将感知与推理解耦，使用变分强化学习和多维奖励来改善视觉推理。现有的大型视觉语言模型在优化目标上存在不足，导致视觉轨迹的偏差和幻觉现象。PFlowNet不再严格依赖于专家的几何先验，而是实现了更有效的视觉推理。该模型通过自我条件生成过程，结合多维奖励和几何塑形，促进了以推理为导向的感知行为，同时保持了视觉的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.01725', 'title': 'Motion-Aware Caching for Efficient Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2605.01725', 'abstract': 'Abstract MotionCache is a motion-aware caching framework that accelerates autoregressive video generation by dynamically adjusting denoising step frequencies based on pixel-level motion characteristics, achieving significant speedups while maintaining generation quality.  AI-generated summary Autoregressive video generation paradigms offer theoretical promise for long video synthesis, yet their practical deployment is hindered by the computational burden of sequential iterative denoising. While cache reuse strategies can accelerate generation by skipping redundant denoising steps, existing methods rely on coarse-grained chunk-level skipping that fails to capture fine-grained pixel dynamics. This oversight is critical: pixels with high motion require more denoising steps to prevent error accumulation, while static pixels tolerate aggressive skipping. We formalize this insight theoretically by linking cache errors to residual instability, and propose MotionCache, a motion-aware cache framework that exploits inter-frame differences as a lightweight proxy for pixel-level motion characteristics. MotionCache employs a coarse-to-fine strategy: an initial warm-up phase establishes semantic coherence, followed by motion-weighted cache reuse that dynamically adjusts update frequencies per token. Extensive experiments on state-of-the-art models like SkyReels-V2 and MAGI-1 demonstrate that MotionCache achieves significant speedups of 6.28times and 1.64times respectively, while effectively preserving generation quality (VBench: 1%downarrow and 0.01%downarrow respectively). The code is available at https://github.com/ywlq/MotionCache.', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': 'ccb36bc81f726343', 'authors': ['Jing Xu', 'Yuexiao Ma', 'Songwei Liu', 'Xuzhe Zheng', 'Shiwei Liu', 'Chenqian Yan', 'Xiawu Zheng', 'Rongrong Ji', 'Fei Chao', 'Xing Wang'], 'affiliations': ['ByteDance', 'ELLIS Institute Tbingen', 'Key Laboratory of Multimedia Trusted Perception and Efficient Computing, Ministry of Education of China, Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.01725.jpg', 'data': {'categories': ['#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное кэширование по движению для ускорения видеогенерации', 'desc': 'MotionCache — это фреймворк кэширования, ориентированный на движение, который ускоряет авторегрессивную генерацию видео путём адаптивной настройки частоты шагов денойзинга на основе характеристик движения пикселей. Авторы выявили, что статичные области видео допускают агрессивное пропускание шагов денойзинга, в то время как пиксели с высоким движением требуют больше итераций для предотвращения накопления ошибок. Предложенный подход использует двухэтапную стратегию: в фазе разогрева устанавливается семантическая согласованность, затем применяется взвешенное по движению переиспользование кэша с динамической корректировкой частоты обновления токенов. Экспериментальные результаты на моделях SkyReels-V2 и MAGI-1 показывают ускорение в 6.28× и 1.64× соответственно при сохранении качества генерации.'}, 'en': {'title': 'Accelerating Video Generation with Motion-Aware Caching', 'desc': 'MotionCache is a novel framework designed to enhance the speed of autoregressive video generation by intelligently adjusting the frequency of denoising steps based on the motion characteristics of individual pixels. Traditional methods often skip denoising steps at a coarse level, which can lead to errors, especially in areas with high motion. By recognizing that dynamic pixels require more careful processing, MotionCache implements a strategy that first establishes coherence and then selectively reuses cache based on motion data. This approach results in significant speed improvements while maintaining high-quality video output, as demonstrated in experiments with advanced models.'}, 'zh': {'title': '运动感知缓存，加速视频生成', 'desc': 'MotionCache 是一个运动感知的缓存框架，通过根据像素级运动特征动态调整去噪步骤频率，加速自回归视频生成。该方法解决了现有粗粒度跳过策略无法捕捉细粒度像素动态的问题，从而提高了生成速度。通过理论分析，我们将缓存错误与残差不稳定性联系起来，提出了 MotionCache 的设计思路。实验结果表明，MotionCache 在保持生成质量的同时，分别实现了 6.28 倍和 1.64 倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2605.02028', 'title': 'Counting as a minimal probe of language model reliability', 'url': 'https://huggingface.co/papers/2605.02028', 'abstract': 'Abstract Studies of stable counting capacity reveal that large language models rely on finite internal states rather than general logical reasoning for rule execution, even when appearing to follow instructions.  AI-generated summary Large language models perform strongly on benchmarks in mathematical reasoning, coding and document analysis, suggesting a broad ability to follow instructions. However, it remains unclear whether such success reflects general logical competence, repeated application of learned procedures, or pattern matching that mimics rule execution. We investigate this question by introducing Stable Counting Capacity, an assay in which models count repeated symbols until failure. The assay removes knowledge dependencies, semantics and ambiguity from evaluation, avoids lexical and tokenization confounds, and provides a direct measure of procedural reliability beyond standard knowledge-based benchmarks. Here we show, across more than 100 model variants, that stable counting capacity remains far below advertised context limits. Model behavior is consistent neither with open-ended logic nor with stable application of a learned rule, but instead with use of a finite set of count-like internal states, analogous to counting on fingers. Once this resource is exhausted, the appearance of rule following disappears and exact execution collapses into guessing, even with additional test-time compute. These findings show that fluent performance in current language models does not guarantee general, reliable rule following.', 'score': 1, 'issue_id': 2145, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '860cb36bee566b82', 'authors': ['Tianxiang Dai', 'Jonathan Fan'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02028.jpg', 'data': {'categories': ['#math', '#interpretability', '#reasoning', '#benchmark'], 'emoji': '🧮', 'ru': {'title': 'Языковые модели считают пальцами, а не логикой', 'desc': 'В исследовании проанализирована способность больших языковых моделей к счёту через новый метод оценки Stable Counting Capacity, который измеряет, как долго модель может корректно считать повторяющиеся символы. Результаты показывают, что LLM опираются на ограниченный набор внутренних состояний, похожих на подсчёт на пальцах, а не на логическое рассуждение или применение выученных правил. Когда внутренние ресурсы исчерпываются, модели переходят от точного выполнения инструкций к случайному угадыванию, демонстрируя ненадёжность в следовании процедурам. Эти выводы указывают, что высокая производительность современных языковых моделей на бенчмарках не гарантирует способность к общему и надёжному выполнению правил.'}, 'en': {'title': "Counting on Fingers: The Limits of Language Models' Logic", 'desc': 'This paper investigates how large language models (LLMs) perform tasks that seem to require logical reasoning, specifically through a method called Stable Counting Capacity. The study reveals that these models rely on a limited set of internal states for counting, rather than demonstrating true logical competence. When pushed to their limits, the models fail to maintain consistent rule execution, leading to random guessing instead. This suggests that the impressive performance of LLMs in various tasks may not reflect genuine understanding or reasoning abilities, but rather a reliance on learned patterns and procedures.'}, 'zh': {'title': '大型语言模型的规则执行能力有限', 'desc': '这篇论文研究了大型语言模型在执行规则时的稳定计数能力，发现它们依赖有限的内部状态，而非一般的逻辑推理。尽管这些模型在数学推理、编码和文档分析等基准测试中表现出色，但其成功是否反映了真正的逻辑能力仍不明确。通过引入稳定计数能力的测试，研究者们发现模型在计数重复符号时的表现远低于预期的上下文限制。结果表明，当前语言模型的流畅表现并不保证其具备可靠的规则执行能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00932', 'title': 'Code World Model Preparedness Report', 'url': 'https://huggingface.co/papers/2605.00932', 'abstract': "Abstract The Code World Model demonstrates no additional frontier risks beyond current AI ecosystem concerns, leading to its release as an open-weight model.  AI-generated summary This report documents the preparedness assessment of Code World Model (CWM), a model for code generation and reasoning about code from Meta. We conducted pre-release testing across domains identified in our Frontier AI Framework as potentially presenting catastrophic risks, and also evaluated the model's misaligned propensities. Our assessment found that CWM does not pose additional frontier risks beyond those present in the current AI ecosystem. We therefore release it as an open-weight model.", 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '3b4ae5c8d2ce8617', 'authors': ['Daniel Song', 'Peter Ney', 'Cristina Menghini', 'Faizan Ahmad', 'Aidan Boyd', 'Nathaniel Li', 'Ziwen Han', 'Jean-Christophe Testud', 'Saisuke Okabayashi', 'Maeve Ryan', 'Jinpeng Miao', 'Hamza Kwisaba', 'Felix Binder', 'Spencer Whitman', 'Jim Gust', 'Esteban Arcaute', 'Dhaval Kapil', 'Jacob Kahn', 'Ayaz Minhas', 'Tristan Goodman', 'Lauren Deason', 'Alexander Vaughan', 'Shengjia Zhao', 'Summer Yue'], 'affiliations': ['AI Security Team', 'MSL', 'Meta'], 'pdf_title_img': 'assets/pdf/title_img/2605.00932.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Безопасный код: открытая модель без дополнительных рисков', 'desc': 'В статье описывается оценка безопасности модели Code World Model (CWM) от Meta, предназначенной для генерации кода и анализа программного кода. Исследователи провели тестирование модели по различным критериям, включая потенциальные катастрофические риски согласно их Frontier AI Framework и проверку на нежелательное поведение. Анализ показал, что CWM не представляет дополнительных граничных рисков сверх уже существующих в экосистеме современных AI-систем. На основе результатов оценки модель была выпущена как открытая модель с доступными весами.'}, 'en': {'title': 'CWM: Safe Code Generation for All!', 'desc': 'The Code World Model (CWM) is a machine learning model designed for generating and reasoning about code. In a thorough assessment, it was tested for potential risks that could arise from its deployment, particularly in areas identified as high-risk in the Frontier AI Framework. The evaluation concluded that CWM does not introduce new risks beyond those already present in existing AI systems. As a result, the model is being released with open weights, allowing broader access and use.'}, 'zh': {'title': '代码世界模型：安全无新风险的开放发布', 'desc': '代码世界模型（CWM）是一种用于代码生成和推理的模型。经过评估，我们发现该模型在当前人工智能生态系统中并未引入额外的前沿风险。我们对其进行了预发布测试，确保其在潜在的灾难性风险领域表现良好。基于这些评估结果，我们决定将CWM作为开放权重模型发布。'}}}, {'id': 'https://huggingface.co/papers/2605.00632', 'title': 'BlenderRAG: High-Fidelity 3D Object Generation via Retrieval-Augmented Code Synthesis', 'url': 'https://huggingface.co/papers/2605.00632', 'abstract': 'Abstract BlenderRAG enhances natural language to Blender code generation by leveraging a retrieval-augmented approach with a curated multimodal dataset, improving both compilation success and semantic alignment without fine-tuning.  AI-generated summary Automatic generation of executable Blender code from natural language remains challenging, with state-of-the-art LLMs producing frequent syntactic errors and geometrically inconsistent objects. We present BlenderRAG, a retrieval-augmented generation system that operates on a curated multimodal dataset of 500 expert-validated examples (text, code, image) across 50 object categories. By retrieving semantically similar examples during generation, BlenderRAG improves compilation success rates from 40.8% to 70.0% and semantic normalized alignment from 0.41 to 0.77 (CLIP similarity) across four state-of-the-art LLMs, without requiring fine-tuning or specialized hardware, making it immediately accessible for deployment. The dataset and code will be available at https://github.com/MaxRondelli/BlenderRAG.', 'score': 1, 'issue_id': 2145, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'dc5d3c6e214e7bdb', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#rag', '#dataset', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Поиск по примерам для точного синтеза 3D-кода из текста', 'desc': 'BlenderRAG — это система поколения с дополнением из извлечённых примеров, которая решает задачу синтеза кода Blender из естественного языка. Система работает с тщательно отобранным мультимодальным датасетом из 500 экспертных примеров, содержащих текст, код и изображения. Благодаря retrieval-augmentation подходу система значительно улучшает как успешность компиляции кода (с 40.8% до 70.0%), так и семантическое соответствие сгенерированных объектов (с 0.41 до 0.77 по CLIP). Метод не требует дополнительного обучения моделей и может быть сразу развёрнут на практике.'}, 'en': {'title': 'Enhancing Blender Code Generation with Retrieval-Augmented Learning', 'desc': 'BlenderRAG is a system that improves the generation of Blender code from natural language by using a retrieval-augmented approach. It utilizes a curated multimodal dataset containing 500 expert-validated examples, which helps in retrieving similar instances during the code generation process. This method significantly increases the success rate of code compilation and enhances the semantic alignment of generated objects. Notably, BlenderRAG achieves these improvements without the need for fine-tuning or specialized hardware, making it user-friendly for immediate deployment.'}, 'zh': {'title': 'BlenderRAG：提升自然语言到代码生成的利器', 'desc': 'BlenderRAG 是一种增强自然语言生成 Blender 代码的系统，采用了检索增强的方法。它使用了一个经过精心策划的多模态数据集，包含 500 个专家验证的示例，涵盖 50 个物体类别。通过在生成过程中检索语义相似的示例，BlenderRAG 显著提高了代码编译成功率和语义对齐度。该系统无需微调或特殊硬件，便于立即部署。'}}}, {'id': 'https://huggingface.co/papers/2604.25154', 'title': 'Prior-Aligned Data Cleaning for Tabular Foundation Models', 'url': 'https://huggingface.co/papers/2604.25154', 'abstract': "Abstract Deep reinforcement learning framework L2C2 addresses prior mismatch in tabular foundation models by sequentially applying data cleaning operators to align real-world data with synthetic training distributions, improving both accuracy and calibration.  AI-generated summary Tabular Foundation Models (TFMs) achieve state-of-the-art zero-shot accuracy on small tabular datasets by meta-learning over synthetic data-generating processes -- making them highly attractive for practitioners who cannot afford large annotated corpora. However, their in-context learning mechanism assumes approximately clean inputs: missing values, outliers, and duplicates in the real-world data create a prior mismatch that degrades both accuracy and confidence calibration simultaneously. Correcting this mismatch requires sequential decisions over cleaning operators whose interactions no static preprocessing rule can anticipate -a natural fit for reinforcement learning~(RL). We introduce L2C2, the first deep RL framework framing tabular data cleaning as prior alignment: a learned policy sequences operators to minimize the distributional gap between dirty input and the TFM's synthetic prior. Six experiments on ten OpenML benchmark datasets establish: 1) three of seven reward designs collapse to degenerate trivial cleaning strategies -- principled reward engineering is scientifically non-trivial; 2) the novel TFMAwareReward reward we propose selects structurally distinct pipelines on 4/10 datasets and achieves higher TabPFN accuracy on those diverging cases (mean 0.851 vs. 0.843; Wilcoxon p=0.063, n=4) while never underperforming; 3) parameterized cleaning actions improve best-found pipeline reward on 9/10 datasets (Wilcoxon p=0.004); and 4) a policy pre-trained on one single source dataset exceeds scratch training at the 2,000-step fine-tuning checkpoint on all three held-out datasets (up to +28.8% after full fine-tuning) demonstrating cross-dataset transfer of prior-alignment knowledge. These findings establish that prior alignment is a principled data preparation strategy for TFM deployment on real-world tabular data.", 'score': 0, 'issue_id': 2144, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '141036094f978455', 'authors': ['Laure Berti-Equille'], 'affiliations': ['IRD, ESPACE-DEV Montpellier, France'], 'pdf_title_img': 'assets/pdf/title_img/2604.25154.jpg', 'data': {'categories': ['#transfer_learning', '#rl', '#benchmark', '#synthetic', '#optimization', '#data'], 'emoji': '🧹', 'ru': {'title': 'Выравнивание распределений через обучение с подкреплением для foundation models на табличных данных', 'desc': 'В работе предложен фреймворк L2C2, использующий глубокое обучение с подкреплением для автоматизации очистки табличных данных. Система последовательно применяет операторы обработки данных, чтобы привести реальные данные в соответствие с синтетическим распределением, на котором обучены табличные foundation models. Авторы разработали специализированную функцию награды TFMAwareReward, которая позволяет избежать вырождения в тривиальные стратегии очистки и улучшает точность предсказаний. Эксперименты показывают, что политика, предобученная на одном датасете, успешно передает знания о выравнивании распределений на новые табличные данные.'}, 'en': {'title': 'Aligning Real-World Data with Deep Reinforcement Learning', 'desc': 'The paper introduces L2C2, a deep reinforcement learning framework designed to improve the performance of Tabular Foundation Models (TFMs) by addressing the issue of prior mismatch in real-world data. It does this by applying a sequence of data cleaning operators that align the dirty input data with the synthetic training distributions used by TFMs. The study shows that careful reward engineering is crucial for effective cleaning strategies, and the proposed TFMAwareReward can lead to better accuracy in certain cases. Additionally, the framework demonstrates the ability to transfer learned cleaning strategies across different datasets, enhancing the overall deployment of TFMs in practical applications.'}, 'zh': {'title': 'L2C2：优化表格数据清洗的深度强化学习框架', 'desc': '本文介绍了一种深度强化学习框架L2C2，旨在解决表格基础模型中的先验不匹配问题。通过顺序应用数据清洗操作，L2C2能够将真实数据与合成训练分布对齐，从而提高模型的准确性和置信度校准。研究表明，奖励设计对清洗策略的有效性至关重要，而我们提出的TFMAwareReward奖励机制在多个数据集上表现出色。最终，L2C2展示了先验对齐作为一种有效的数据准备策略，适用于真实世界的表格数据。'}}}];
