    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.07297', 'title': 'SWE-Explore: Benchmarking How Coding Agents Explore Repositories', 'url': 'https://huggingface.co/papers/2606.07297', 'abstract': "Abstract SWE-Explore introduces a benchmark for evaluating coding agents' repository exploration capabilities by requiring ranked lists of relevant code regions within line budgets, demonstrating that agentic exploration outperforms traditional retrieval methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Repository-level coding benchmarks such as SWE-bench have driven a rapid surge in the capabilities of coding agents. Yet they usually treat coding tasks as a holistic, binary prediction problem (e.g., resolved or unresolved), neglecting fine-grained agent capabilities such as repository understanding, context retrieval, code localization, and bug diagnosis. In this paper, we introduce SWE-Explore, a benchmark that isolates the evaluation of repository exploration, a critical capability of coding agents. Given a repository and an issue, SWE-Explore asks an explorer to return a ranked list of relevant code regions under a fixed line budget. SWE-Explore covers 848 issues across 10 programming languages and 203 open-source repositories. For each instance, we derive line-level ground truth from independent agent trajectories that successfully solved the same issue, distilling the specific code regions their solution paths actually consulted. We evaluate exploration along coverage, ranking, and context-efficiency dimensions, showing that these metrics strongly track downstream repair behavior. Across a broad set of retrieval methods, general coding agents, and specialized localizers, we find that agentic explorers form a clear tier above classical retrieval. While file-level localization is already strong for modern methods, line-level coverage and efficient ranking remain the key axes differentiating state-of-the-art explorers.", 'score': 77, 'issue_id': 2396, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '7f990b2afd19d230', 'authors': ['Shaoqiu Zhang', 'Yuhang Wang', 'Jialiang Liang', 'Yuling Shi', 'Wenhao Zeng', 'Maoquan Wang', 'Shilin He', 'Ningyuan Xu', 'Siyu Ye', 'Kai Cai', 'Xiaodong Gu'], 'affiliations': ['Independent Researcher', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'University of Illinois at Urbana-Champaign', 'Xinjiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.07297.jpg', 'data': {'categories': ['#dataset', '#plp', '#open_source', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Агентное исследование репозитория превосходит традиционный поиск кода', 'desc': 'В работе предложен бенчмарк SWE-Explore для оценки способности агентов понимать репозитории кода. Задача заключается в ранжировании релевантных участков кода в пределах ограничения по количеству строк. Авторы показывают, что агентные методы исследования кода значительно превосходят классические подходы извлечения информации. Бенчмарк покрывает 848 задач на 10 языках программирования и включает метрики для оценки полноты покрытия, качества ранжирования и эффективности использования контекста.'}, 'en': {'title': 'Elevating Code Exploration: Agentic Methods Outshine Traditional Retrieval', 'desc': 'The paper introduces SWE-Explore, a new benchmark designed to assess the repository exploration abilities of coding agents. Unlike traditional methods that treat coding tasks as binary outcomes, SWE-Explore focuses on fine-grained capabilities such as understanding repositories and retrieving relevant code. It requires agents to provide ranked lists of code regions based on a fixed line budget, covering a wide range of issues across multiple programming languages. The findings indicate that agentic exploration methods significantly outperform classical retrieval techniques in terms of coverage, ranking, and context efficiency, highlighting the importance of these metrics in effective code exploration.'}, 'zh': {'title': '代理探索超越传统检索方法', 'desc': 'SWE-Explore是一个用于评估编码代理在代码库探索能力的基准。它要求代理在固定的行数预算内返回相关代码区域的排名列表，显示出代理探索优于传统检索方法。该基准涵盖了848个问题，涉及10种编程语言和203个开源代码库，专注于细粒度的代理能力，如代码定位和上下文检索。研究表明，代理探索者在覆盖率、排名和上下文效率等方面表现出色，明显优于经典的检索方法。'}}}, {'id': 'https://huggingface.co/papers/2606.07082', 'title': 'On the Geometry of On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.07082', 'abstract': 'Abstract On-policy distillation exhibits distinct parameter space dynamics characterized by relaxed off-principal updates and subspace locking, forming a unique geometric pattern separate from supervised fine-tuning and reinforcement learning with verifiable rewards.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) is increasingly used to improve large language model reasoning, but its training dynamics remain poorly understood. We characterize the trajectory of OPD updates in parameter space and compare it with supervised fine-tuning (SFT) and reinforcement learning with verifiable rewards (RLVR). A suite of parameter-space diagnostics consistently places OPD in a relaxed off-principal regime: compared with SFT, its updates affect fewer weights and avoid principal directions more strongly, while compared with RLVR, they remain less tightly constrained. Beyond this static localization, OPD exhibits subspace locking: its cumulative updates rapidly enter a narrow low-dimensional channel. Constraining training to the update subspace formed early in training preserves OPD performance but substantially degrades SFT, indicating that the locked subspace is functionally sufficient for OPD. Control experiments further show that sparsifying the update tokens and shifting rollout generation off-policy preserve the rank dynamics, whereas mixing the OPD objective with RLVR changes them. Overall, these results suggest that OPD is not merely an intermediate point between SFT and RLVR, but induces its own update geometry in parameter space.', 'score': 45, 'issue_id': 2397, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': 'a413f606ff51b57a', 'authors': ['Zhennan Shen', 'Yanshu Li', 'Qingyu Yin', 'Chak Tou Leong', 'Zhilin Wang', 'Yanxu Chen', 'Rongduo Han', 'Sunbowen Lee', 'Yi R. Fung'], 'affiliations': ['BIT', 'BUPT', 'HKUST', 'Hong Kong PolyU', 'Nankai University', 'USTC', 'UT Austin', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.07082.jpg', 'data': {'categories': ['#training', '#reasoning', '#rl', '#optimization', '#interpretability'], 'emoji': '🔒', 'ru': {'title': 'Скрытая геометрия обновлений в on-policy дистилляции: блокировка подпространства в параметрическом пространстве', 'desc': 'В этой работе исследуются динамика обучения при on-policy дистилляции (OPD) — методе улучшения рассуждений больших языковых моделей. Авторы анализируют траектории обновлений параметров и сравнивают OPD с supervised fine-tuning и обучением с подкреплением, показывая, что OPD имеет уникальную геометрию с расслабленными off-principal обновлениями. Ключевое открытие заключается в том, что OPD демонстрирует блокировку подпространства: накопленные обновления быстро концентрируются в узком низкомерном канале параметрического пространства. Контрольные эксперименты подтверждают, что OPD — это не просто промежуточный метод между supervised fine-tuning и RL, а индуцирует собственную уникальную геометрию обновлений.'}, 'en': {'title': 'Unlocking the Unique Geometry of On-Policy Distillation', 'desc': 'This paper explores the training dynamics of on-policy distillation (OPD) in large language models, revealing its unique behavior in parameter space. OPD updates are characterized by relaxed off-principal updates, meaning they affect fewer model weights compared to supervised fine-tuning (SFT) and are less constrained than reinforcement learning with verifiable rewards (RLVR). The study also identifies a phenomenon called subspace locking, where OPD updates quickly converge into a narrow low-dimensional channel, which is crucial for maintaining performance. The findings indicate that OPD creates its own distinct update geometry, setting it apart from traditional training methods like SFT and RLVR.'}, 'zh': {'title': '政策蒸馏：独特的参数空间更新几何', 'desc': '本文探讨了在政策蒸馏（On-policy distillation, OPD）中参数空间的动态特征。研究发现，OPD的更新过程与监督微调（Supervised Fine-Tuning, SFT）和具有可验证奖励的强化学习（Reinforcement Learning with Verifiable Rewards, RLVR）有显著不同。OPD的更新影响的权重较少，并且更强烈地避免了主要方向，同时在训练过程中形成了一个低维通道。实验结果表明，OPD在参数空间中具有独特的更新几何特征，超越了SFT和RLVR的简单中介。'}}}, {'id': 'https://huggingface.co/papers/2606.09828', 'title': 'Latent Spatial Memory for Video World Models', 'url': 'https://huggingface.co/papers/2606.09828', 'abstract': 'Abstract Latent spatial memory for video world models stores 3D scene information directly in diffusion latent space, eliminating pixel-space reconstruction overhead and achieving faster generation with reduced memory usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video world models that maintain 3D spatial consistency across generated frames typically rely on explicit point cloud memory constructed in RGB space. This design is both computationally expensive, requiring repeated rendering and VAE encoding, and inherently lossy, as the round trip through pixel space discards rich features of the learned latent representation. In this paper, we introduce latent spatial memory for video world models, a persistent 3D cache that stores scene information directly in the diffusion latent space, avoiding pixel-space reconstruction. Building on this, we propose Mirage, a latent-space spatial memory framework that constructs the memory by lifting latent tokens into 3D via depth-guided back-projection and queries it by synthesizing novel views through direct latent-space warping. This unified formulation eliminates both the information loss of pixel-space reconstruction and the computational burden of repeated encoding and rendering. Experiments show that latent spatial memory achieves up to 10.57times faster end-to-end video generation and 55times reduction in memory footprint relative to explicit 3D baselines. Leveraging the geometric prior of the diffusion model, Mirage attains state-of-the-art performance on WorldScore and strong reconstruction quality on RealEstate10K.', 'score': 32, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '4d97ac6738aa003f', 'authors': ['Weijie Wang', 'Haoyu Zhao', 'Yifan Yang', 'Feng Chen', 'Zeyu Zhang', 'Yefei He', 'Zicheng Duan', 'Donny Y. Chen', 'Yuqing Yang', 'Bohan Zhuang'], 'affiliations': ['Adelaide University', 'Microsoft Research', 'Monash University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09828.jpg', 'data': {'categories': ['#3d', '#architecture', '#video'], 'emoji': '🎬', 'ru': {'title': 'Латентная память без пиксельных потерь', 'desc': 'В работе предлагается новый подход к видеомоделям мира, который хранит информацию о 3D сцене непосредственно в латентном пространстве диффузионной модели, избегая дорогостоящего восстановления в пиксельном пространстве. Авторы представляют фреймворк Mirage, который использует глубину для проецирования латентных токенов в 3D пространство и синтезирует новые виды сцены прямым преобразованием в латентном пространстве. Такой подход устраняет потери информации, возникающие при кодировании и декодировании, а также снижает вычислительные затраты на повторную визуализацию. Эксперименты показали, что латентная пространственная память достигает ускорения генерации видео в 10.57 раз и сокращения использования памяти в 55 раз по сравнению с явными 3D методами.'}, 'en': {'title': 'Revolutionizing Video Generation with Latent Spatial Memory', 'desc': 'This paper presents a new approach called latent spatial memory for video world models, which stores 3D scene information directly in a diffusion latent space. By avoiding the need for pixel-space reconstruction, this method significantly reduces computational costs and memory usage. The proposed framework, named Mirage, utilizes depth-guided back-projection to create a 3D memory from latent tokens and allows for novel view synthesis through latent-space warping. Experiments demonstrate that this approach can generate videos up to 10.57 times faster and with a 55 times smaller memory footprint compared to traditional methods.'}, 'zh': {'title': '潜在空间记忆：视频生成的新突破', 'desc': '本文提出了一种新的视频世界模型的潜在空间记忆方法，直接在扩散潜在空间中存储3D场景信息，从而消除了像素空间重建的开销。这种方法通过构建持久的3D缓存，避免了在RGB空间中构建显式点云内存的计算负担。我们提出的Mirage框架通过深度引导的反投影将潜在标记提升到3D，并通过直接的潜在空间变形合成新视图，从而实现了高效的查询。实验表明，潜在空间记忆在视频生成速度上提高了10.57倍，并且内存占用减少了55倍，展现了优越的性能和重建质量。'}}}, {'id': 'https://huggingface.co/papers/2509.10078', 'title': 'Human Psychometric Questionnaires Mischaracterize LLM Behavior', 'url': 'https://huggingface.co/papers/2509.10078', 'abstract': "Abstract Human psychometric questionnaires fail to reliably predict LLM behavior in real-world interactions, while generation-based profiling offers superior accuracy for understanding model responses to everyday user queries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We examine whether human psychometric questionnaires can serve as reliable tools for characterizing and predicting LLM behavior in everyday user interactions. We analyze eight open-source LLMs by comparing their value and personality profiles derived from two different methods: Likert self-reports on established questionnaires (PVQ-40/21 and BFI-44/10) and generation probabilities over value-laden responses to everyday user queries. The two profiles diverge substantially. Within-construct item consistency, often cited as evidence of stable LLM dispositions, disappears in generation probabilities. We attribute this gap to the fact that explicit lexical cues in established questionnaire items allow models to recognize the target construct and respond in alignment-consistent, socially desirable ways, whereas realistic user queries provide no such cues. In addition, demographic persona prompts shift models' responses to human questionnaires in ways consistent with real human patterns, but no such shifts appear in the generation probabilities of responses to realistic user queries, showing their limited ability to simulate the behaviors of target demographics in real-world user interactions. Overall, our study shows that human psychometric questionnaires are insufficient tools for predicting LLM behavior and suggests generation-based profiling as a more accurate measure.", 'score': 23, 'issue_id': 2397, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '5e0620b7b6955c1c', 'authors': ['Woojung Song', 'Dongmin Choi', 'Yoonah Park', 'Jongwook Han', 'Eun-Ju Lee', 'Yohan Jo'], 'affiliations': ['Department of Communication, Interdisciplinary Program in Artificial Intelligence, Seoul National University', 'Graduate School of Data Science, Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2509.10078.jpg', 'data': {'categories': ['#benchmark'], 'emoji': '🎭', 'ru': {'title': 'Генерирование правды: почему реальное поведение LLM видно только в естественных диалогах', 'desc': 'Исследование показывает, что традиционные психометрические анкеты, разработанные для людей, неэффективны для прогнозирования поведения LLM в реальных взаимодействиях. Авторы сравнили два подхода оценки личностных и ценностных профилей восьми open-source моделей: ответы на стандартные вопросники и вероятности генерации ответов на повседневные запросы пользователей. Обнаружилось существенное расхождение между методами, так как явные языковые подсказки в опросниках позволяют моделям распознать целевой конструкт и ответить социально желаемым образом, чего не происходит при реалистичных запросах. Исследование рекомендует использовать методы, основанные на анализе вероятностей генерации, как более надёжный инструмент для предсказания реального поведения LLM.'}, 'en': {'title': 'Generation-Based Profiling Outperforms Psychometric Questionnaires for LLM Behavior', 'desc': 'This paper investigates the effectiveness of human psychometric questionnaires in predicting the behavior of large language models (LLMs) during real-world interactions. The authors compare traditional self-report questionnaires with generation-based profiling methods to assess LLM responses to user queries. They find that the two profiling methods yield significantly different results, indicating that questionnaires may not accurately capture LLM behavior. The study concludes that generation-based profiling is a more reliable approach for understanding how LLMs respond to everyday user interactions.'}, 'zh': {'title': '生成基础分析：更准确的LLM行为预测工具', 'desc': '本研究探讨了人类心理测量问卷在预测大型语言模型（LLM）行为方面的可靠性。我们比较了基于问卷（如PVQ-40/21和BFI-44/10）和生成概率的两种方法，发现它们在价值和个性特征上存在显著差异。问卷中的明确词汇提示使模型能够以社会期望的方式作出一致的反应，而真实用户查询则缺乏这种提示。我们的研究表明，传统的心理测量问卷不足以有效预测LLM的行为，生成基础的分析方法更为准确。'}}}, {'id': 'https://huggingface.co/papers/2606.09803', 'title': 'Echo-Memory: A Controlled Study of Memory in Action World Models', 'url': 'https://huggingface.co/papers/2606.09803', 'abstract': 'Abstract Controlled study of memory mechanisms in action-conditioned world models reveals that memory structure and capacity significantly impact open-domain return performance beyond simple replay fidelity measures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Echo-Memory, a controlled study of memory mechanisms in action-conditioned world models. These models generate multi-segment videos from a first frame, text prompt, and camera-action sequence, but their central failure is often memory rather than local image synthesis: after the camera leaves and returns, the scene or salient object may silently change. Existing memory designs are hard to compare because gains are entangled with backbone, training, retrieval, and evaluation differences. Echo-Memory fixes the action-to-video interface and varies only how history is stored and read by the generator. Under a shared video diffusion backbone, optimizer, camera-action representation, sampler, and evaluation pipeline, we compare raw context, compression-based memory, spatial summaries with different read-out paths, and state-space recurrence. This matched matrix separates four otherwise conflated axes: capacity, compression, read-out, and recurrence. We also evaluate memory through a three-branch protocol: replay quality, in-domain loop revisit, and open-domain return probes. The branches routinely disagree, showing that replay fidelity is not a sufficient proxy for remembering a world. Three findings follow. Raw context is a strong capacity baseline and improves open-domain return far more than it improves replay metrics. Compactness is not a free substitute for capacity: aggressive spatial and hybrid-compression memories lose the salient evidence needed for return. Finally, block-wise state-space recurrence is the strongest open-domain return mechanism in our matrix, showing that the structure of implicit memory matters as much as the decision to use it. These results provide a compact protocol for studying memory in action world models beyond isolated replay metrics.', 'score': 22, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'd4e956887c13b98c', 'authors': ['Wayne King', 'Zeyue Xue', 'Yuxuan Bian', 'Jie Huang', 'Haoran Li', 'Yaowei Li', 'Yaofeng Su', 'Yuming Li', 'Haoyu Wang', 'Shiyi Zhang', 'Songchun Zhang', 'Yuwei Niu', 'Sihan Xu', 'Junhao Zhuang', 'Haoyang Huang', 'Nan Duan'], 'affiliations': ['Fudan University', 'Joy Future Academy, JD', 'Peking University', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong', 'Tsinghua University', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2606.09803.jpg', 'data': {'categories': ['#training', '#reasoning', '#interpretability', '#architecture', '#video'], 'emoji': '🧠', 'ru': {'title': 'Структура памяти важнее, чем объём: как учить модели запоминать мир', 'desc': 'В этой работе авторы проводят контролируемое исследование механизмов памяти в моделях мира, обусловленных действиями, которые генерируют видео на основе первого кадра, текстового описания и последовательности действий камеры. Они представляют Echo-Memory — методологию, которая фиксирует интерфейс действие-видео и варьирует только способы хранения и считывания истории в генераторе видеодиффузии. Исследование показывает, что структура и объем памяти существенно влияют на производительность в открытом домене возврата, причем простые метрики качества воспроизведения недостаточны для оценки способности модели запоминать мир. Авторы обнаруживают, что блочная рекуррентность состояния-пространства является самым эффективным механизмом памяти, подтверждая, что структура неявной памяти столь же важна, как и сама способность её использования.'}, 'en': {'title': 'Memory Matters: Enhancing Video Generation with Echo-Memory', 'desc': "This paper introduces Echo-Memory, a study focused on how memory mechanisms affect the performance of action-conditioned world models in generating videos. It highlights that traditional measures of memory, like replay fidelity, do not adequately capture a model's ability to remember and return to a scene after changes occur. The authors compare various memory designs, including raw context and compression-based methods, to understand their impact on video generation. Key findings indicate that raw context significantly enhances performance in open-domain scenarios, while compact memory solutions may lose critical information needed for effective recall."}, 'zh': {'title': '记忆机制对开放域性能的关键影响', 'desc': '本研究探讨了在动作条件下的世界模型中，记忆机制对性能的影响。我们提出了Echo-Memory，通过控制记忆的存储和读取方式，分析了不同记忆设计的效果。研究发现，原始上下文作为记忆的基线，显著提高了开放域的返回性能，而压缩型记忆则可能丢失重要信息。最后，块状状态空间递归被证明是最有效的开放域返回机制，强调了隐式记忆结构的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.09669', 'title': 'SpatialWorld: Benchmarking Interactive Spatial Reasoning of Multimodal Agents in Real-World Tasks', 'url': 'https://huggingface.co/papers/2606.09669', 'abstract': 'Abstract SpatialWorld presents a unified benchmark for evaluating interactive spatial understanding in multimodal agents through diverse real-world tasks with partial observability and text-based actions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spatial reasoning is a foundational capability for multimodal large language models (MLLMs) to perceive and operate within the physical world. However, existing benchmarks predominantly rely on passive evaluation (e.g., static VQA) or simulator-specific pipelines, failing to assess general interactive spatial understanding. We introduce SpatialWorld, a unified benchmark designed specifically for evaluating the interactive spatial understanding of multimodal agents in complex real-world tasks. Integrating eight heterogeneous simulation backends under a shared, simulator-agnostic protocol, SpatialWorld features 760 human-annotated tasks across diverse domains (e.g., household routines, travel, social collaboration). Agents must solve tasks under vision-only partial observability, actively gathering egocentric visual evidence and expressing decisions via a unified, text-based action interface native to MLLMs. For reliable evaluation, each task includes a human-validated initial state, a reference trajectory, and a terminal-state verifier. Evaluating 15 advanced agents reveals that robust spatial task solving remains challenging: the strongest model, GPT-5, achieves an average task success rate (TSR) of only 17.4%, while the leading open-source model, Qwen-3.5, reaches 14.1%. Further analysis exposes a clear mismatch between task success and execution efficiency, alongside substantial domain-specific performance variations. These bottlenecks in active exploration and long-horizon planning position SpatialWorld as a rigorous testbed for future spatial agents.', 'score': 21, 'issue_id': 2396, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'bbf60db0a9f8776b', 'authors': ['Hongcheng Gao', 'Hailong Qu', 'Jingyi Tang', 'Jiahao Wang', 'Zihao Huang', 'Hengkang Qiao', 'Shihong Huang', 'Junming Yang', 'Yi Li', 'Hongyixuan Yuan', 'Wenjie Li', 'Bohan Zeng', 'Wenbo Li', 'Bo Wang', 'Jianhui Liu', 'Olive Huang', 'Haoyang Huang', 'Wentao Zhang', 'Guoqing Huang', 'Nan Duan', 'Yinpeng Dong'], 'affiliations': ['Beijing Institute of Technology', 'Chongqing University', 'Joy Future Academy', 'Peking University', 'Shanghai Jiao Tong University', 'Southeast University', 'The University of Hong Kong', 'Tsinghua University', 'Xian Jiaotong University', 'ZenoMind AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.09669.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🌍', 'ru': {'title': 'Путь к настоящему пространственному интеллекту: бенчмарк для интерактивных агентов', 'desc': 'SpatialWorld представляет унифицированный бенчмарк для оценки интерактивного пространственного понимания мультимодальных агентов на основе больших языковых моделей в разнообразных реальных задачах с частичной наблюдаемостью. Бенчмарк интегрирует восемь различных симуляторов под единый протокол и включает 760 задач с аннотациями человека в разных областях, где агенты должны решать проблемы, используя только эгоцентрическое визуальное восприятие и текстовый интерфейс действий. Оценка 15 продвинутых моделей показала, что даже самая мощная модель GPT-5 достигает успешности решения задач только на уровне 17,4%, что указывает на существенные ограничения в активной разведке окружения. SpatialWorld создает строгую тестовую платформу для выявления слабых мест в планировании и интерактивном пространственном рассуждении мультимодальных агентов.'}, 'en': {'title': 'SpatialWorld: Advancing Interactive Spatial Understanding in Multimodal Agents', 'desc': 'SpatialWorld is a new benchmark designed to evaluate how well multimodal agents understand and interact with spatial environments through real-world tasks. Unlike previous benchmarks that only assess passive understanding, SpatialWorld focuses on interactive spatial reasoning, requiring agents to gather visual information and make decisions using text-based actions. It includes 760 tasks across various domains and uses multiple simulation backends to ensure a comprehensive evaluation. The results show that even advanced models struggle with spatial tasks, highlighting the need for improved exploration and planning capabilities in future agents.'}, 'zh': {'title': '空间理解的统一基准测试', 'desc': 'SpatialWorld是一个统一的基准，用于评估多模态智能体在复杂现实任务中的互动空间理解能力。该基准整合了八个不同的模拟后端，提供760个经过人工标注的任务，涵盖家庭日常、旅行和社交协作等多个领域。智能体在仅依赖视觉的部分可观察性下，需主动收集自我中心的视觉证据，并通过统一的文本动作接口表达决策。评估结果显示，尽管有先进的模型参与，空间任务的解决仍然具有挑战性，最强模型的任务成功率仅为17.4%。'}}}, {'id': 'https://huggingface.co/papers/2606.09079', 'title': 'FlashMemory-DeepSeek-V4: Lightning Index Ultra-Long Context via Lookahead Sparse Attention', 'url': 'https://huggingface.co/papers/2606.09079', 'abstract': 'Abstract Lookahead Sparse Attention with Neural Memory Indexer reduces GPU memory usage for long-context LLM inference while maintaining accuracy through proactive KV cache management and decoupled training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Conventional LLMs keep the full KV cache loaded during decoding, causing a severe GPU memory bottleneck for ultra-long context serving. In this report, we propose Lookahead Sparse Attention (LSA), a novel inference paradigm powered by a Neural Memory Indexer built upon the DeepSeek-V4 architecture. Rather than passively attending to all historical tokens, LSA proactively predicts future context demands and preserves only the query-critical KV chunks in the GPU memory. Crucially, we instantiate this architecture via a backbone-free decoupled training strategy. By formulating the indexer as a standard dual-encoder architecture, we train it independently using standard retrieval training frameworks without ever loading the massive backbone model into GPU memory.   We demonstrate that this "less is more" paradigm significantly maximizes serving efficiency while acting as an effective attention denoiser in tasks that rely on long-term global memory. Across primary long-context evaluation suites (e.g., LongBench-v2, LongMemEval, and RULER), FM-DS-V4 compresses the average physical KV cache footprint down to merely 13.5% of the full-context baseline, while consistently preserving or slightly elevating downstream accuracy (+0.6% absolute margin on average). Crucially, at extreme 500K scales, FlashMemory suppresses the physical KV cache overhead by over 90% without destabilizing the backbone\'s core reasoning capacities.', 'score': 15, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '226a9e95cdb5c9e5', 'authors': ['Yan Wang', 'Qifan Zhang', 'Jiachen Yu', 'Tian Liang', 'Dongyang Ma', 'Xiang Hu', 'Zibo Lin', 'Chunyang Li', 'Zhichao Wang', 'Jia Li', 'Yujiu Yang', 'Haitao Mi', 'Dong Yu'], 'affiliations': ['Independent Researchers', 'Tencent', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09079.jpg', 'data': {'categories': ['#inference', '#long_context', '#training', '#optimization', '#architecture'], 'emoji': '💾', 'ru': {'title': 'Меньше памяти, полная точность: умное управление KV кэшем для длинных контекстов', 'desc': 'В работе предлагается Lookahead Sparse Attention (LSA) — новая парадигма инференса, которая решает проблему нехватки GPU памяти при обработке длинных контекстов в LLM. Метод использует Neural Memory Indexer для проактивного предсказания того, какие KV кэши будут нужны в будущем, сохраняя в памяти только релевантные части. Уникальный подход заключается в декаплированной тренировке: индексер обучается отдельно как двойной энкодер без загрузки основной модели, что значительно упрощает процесс. Экспериментально показано, что метод сжимает KV кэш до 13.5% от исходного размера при масштабах до 500K токенов, сохраняя или даже улучшая точность модели.'}, 'en': {'title': 'Efficient Memory Management for Long-Context LLMs', 'desc': 'The paper introduces Lookahead Sparse Attention (LSA), a new method that reduces GPU memory usage during long-context inference in large language models (LLMs). It utilizes a Neural Memory Indexer to proactively manage key-value (KV) caches, only keeping essential data in memory while predicting future context needs. This approach allows for decoupled training, meaning the model can be trained without the large backbone model consuming GPU resources. The results show that LSA significantly decreases memory usage while maintaining or improving accuracy in long-context tasks.'}, 'zh': {'title': '前瞻稀疏注意力：高效的长上下文推理新方法', 'desc': '本文提出了一种名为前瞻稀疏注意力（Lookahead Sparse Attention, LSA）的新推理范式，旨在减少长上下文大语言模型（LLM）推理时的GPU内存使用，同时保持准确性。通过神经记忆索引器（Neural Memory Indexer）和解耦训练策略，LSA能够主动预测未来的上下文需求，仅保留对查询至关重要的键值（KV）块在GPU内存中。与传统LLM在解码过程中始终加载完整的KV缓存不同，LSA显著提高了服务效率，并在依赖长期全局记忆的任务中有效去噪注意力。实验结果表明，LSA在多个长上下文评估套件中将平均物理KV缓存占用压缩至仅为全上下文基线的13.5%，同时保持或略微提升下游任务的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.08415', 'title': 'CoVEBench: Can Video Editing Models Handle Complex Instructions?', 'url': 'https://huggingface.co/papers/2606.08415', 'abstract': 'Abstract A new benchmark called CoVEBench is introduced to evaluate compositional video editing capabilities, addressing limitations of existing models in handling complex, multi-step editing tasks while preserving spatiotemporal content.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While recent text-guided video editing models excel at elementary tasks (e.g., style transfer, object insertion), real-world user requests are highly compositional. A single prompt often demands multiple coupled edits, such as modifying subjects, actions, and camera views, while strictly preserving unrelated spatiotemporal content. Existing benchmarks, heavily constrained by isolated edits and coarse global metrics, fail to diagnose how models handle such complex workflows. To address this gap, we introduce CoVEBench, a compositional video editing benchmark comprising 416 curated source videos, 626 multi-point editing instructions, and 9,990 fine-grained checklist items. Covering diverse editing dimensions, CoVEBench evaluates models via MLLM-judged instruction compliance and video fidelity, alongside automated metrics for video quality. Extensive experiments reveal that compositional editing remains a profound challenge: current models frequently omit edits, violate preservation constraints, or introduce artifacts when handling multiple operations simultaneously. CoVEBench provides a challenging, diagnostic testbed to advance video editing toward realistic user workflows.', 'score': 11, 'issue_id': 2397, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': '08b7be82e956b287', 'authors': ['Jiangtao Wu', 'Jiaming Wang', 'Yiwen He', 'Yuanxing Zhang', 'Shihao Li', 'Dunyuan Liu', 'Xuedong Zhao', 'Jialu Chen', 'Zekun Moore Wang', 'Jiaheng Liu'], 'affiliations': ['Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.08415.jpg', 'data': {'categories': ['#survey', '#multimodal', '#benchmark', '#video'], 'emoji': '🎬', 'ru': {'title': 'Композиционное редактирование видео: от простых операций к реальным задачам', 'desc': 'В статье представлен новый бенчмарк CoVEBench для оценки способности моделей редактирования видео выполнять сложные композиционные задачи с несколькими шагами редактирования одновременно. Существующие модели редактирования видео на основе текстовых промптов хорошо справляются с простыми задачами, но не могут обрабатывать реалистичные запросы пользователей, которые требуют множественных связанных правок при сохранении неизменённого контента. BenchMark включает 416 видеороликов, 626 многоточечных инструкций редактирования и 9990 детальных элементов оценки, с использованием мультимодальных языковых моделей для судейства. Эксперименты показали, что композиционное редактирование остаётся сложной задачей, и текущие модели часто пропускают правки, нарушают ограничения сохранения или вносят артефакты при обработке нескольких операций.'}, 'en': {'title': 'CoVEBench: Advancing Compositional Video Editing Evaluation', 'desc': 'The paper introduces CoVEBench, a new benchmark designed to assess the capabilities of video editing models in performing complex, multi-step tasks while maintaining the integrity of spatiotemporal content. Unlike existing benchmarks that focus on simple edits, CoVEBench evaluates how well models can execute multiple, interconnected edits based on user prompts. It includes a comprehensive dataset with 416 source videos and 626 editing instructions, along with detailed metrics for assessing model performance. The findings highlight that current models struggle with compositional editing, often failing to meet user requirements or introducing errors during the editing process.'}, 'zh': {'title': 'CoVEBench：推动视频编辑的组合能力', 'desc': '本文介绍了一种新的基准测试工具CoVEBench，用于评估视频编辑模型的组合能力。现有模型在处理复杂的多步骤编辑任务时存在局限性，尤其是在保持时空内容的完整性方面。CoVEBench包含416个精心挑选的源视频和626个多点编辑指令，旨在通过多维度的编辑评估模型的表现。实验结果表明，当前模型在组合编辑任务中仍面临重大挑战，常常遗漏编辑、违反保留约束或在同时处理多个操作时引入伪影。'}}}, {'id': 'https://huggingface.co/papers/2606.08348', 'title': 'Bayesian-Agent: Posterior-Guided Skill Evolution for LLM Agent Harnesses', 'url': 'https://huggingface.co/papers/2606.08348', 'abstract': "Abstract Bayesian-Agent presents a framework that treats reusable skills and SOPs as hypotheses for model success, using Bayesian inference to guide agent behavior and improve task performance through posterior-guided harness optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents increasingly rely on external inference conditions: prompts, tools, memory, SOPs, skills, and harness feedback. These assets can improve task execution without changing model weights, but they are often revised by heuristic reflection or by reusing observed successes and failures as if counts alone were reliable belief. We introduce Bayesian-Agent, a native and cross-harness framework that treats reusable skills and SOPs as hypotheses about whether a frozen model will succeed under a particular prompt, context, and harness environment. Bayesian-Agent records verified trajectory evidence, maintains a feature-conditioned categorical posterior over each skill, and maps posterior state into inspectable actions such as patch, split, compress, retire, and explore. Model-facing prompts receive executable guardrails and failure-mode patches, while posterior summaries remain available for audit. With deepseek-v4-flash, incremental repair improves SOP-Bench from 80\\% to 95\\%, Lifelong AgentBench from 90\\% to 100\\%, and RealFin-Bench from 45\\% to 65\\%. We further evaluate Bayesian-Agent's native backend and optional GenericAgent, mini-swe-agent, and Claude Code backends. The results include positive, negative, saturated, and case-study settings, suggesting that agent skill evolution is best viewed as posterior-guided harness optimization rather than uncalibrated prompt accumulation. The source code is available at https://github.com/DataArcTech/Bayesian-Agent.", 'score': 11, 'issue_id': 2397, 'pub_date': '2026-06-06', 'pub_date_card': {'ru': '6 июня', 'en': 'June 6', 'zh': '6月6日'}, 'hash': '23959b0aa9804217', 'authors': ['Xiaojun Wu', 'Cehao Yang', 'Honghao Liu', 'Xueyuan Lin', 'Wenjie Zhang', 'Zhichao Shi', 'Xuhui Jiang', 'Chengjin Xu', 'Jia Li', 'Jian Guo'], 'affiliations': ['DataArcTech Ltd.', 'IDEA Research', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2606.08348.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Байесова оптимизация навыков агентов через апостериор-управляемое улучшение среды', 'desc': 'В статье представлена框架Bayesian-Agent, которая рассматривает переиспользуемые навыки и стандартные операционные процедуры как гипотезы о вероятности успеха модели. Система использует байесовский вывод для ведения апостериорного распределения над каждым навыком, записывая эмпирические свидетельства из истории выполнения задач. На основе апостериорного состояния агент выполняет структурированные действия: патчинг, разделение, сжатие, удаление или исследование новых навыков. Экспериментальные результаты показывают значительное улучшение производительности на нескольких бенчмарках, демонстрируя, что эволюция навыков агента лучше моделируется как управляемая апостериором оптимизация окружения, чем бесконтрольное накопление подсказок.'}, 'en': {'title': 'Optimizing Agent Skills with Bayesian Inference', 'desc': 'The paper introduces Bayesian-Agent, a framework that enhances agent performance by treating reusable skills and standard operating procedures (SOPs) as hypotheses for success. It employs Bayesian inference to optimize agent behavior without altering model weights, relying on external conditions like prompts and feedback. By recording evidence and maintaining a posterior distribution over skills, Bayesian-Agent enables informed decision-making for task execution. The framework demonstrates significant improvements in various benchmarks, suggesting that skill evolution should focus on optimizing harness conditions rather than merely accumulating prompts.'}, 'zh': {'title': '贝叶斯代理：优化技能演变的智能框架', 'desc': 'Bayesian-Agent 是一个框架，它将可重用的技能和标准操作程序（SOP）视为模型成功的假设。通过贝叶斯推断来指导代理行为，从而提高任务执行的性能。该框架记录验证过的轨迹证据，并维护每个技能的特征条件分类后验。研究表明，代理技能的演变应被视为后验引导的优化，而不是简单的提示累积。'}}}, {'id': 'https://huggingface.co/papers/2606.09826', 'title': 'OmniGameArena: A Unified UE5 Benchmark for VLM Game Agents with Improvement Dynamics', 'url': 'https://huggingface.co/papers/2606.09826', 'abstract': 'Abstract OmniGameArena presents a unified benchmark for evaluating vision-language model agents in diverse game settings with a reflection-based improvement protocol that tracks performance evolution and skill generalization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language model (VLM) agents are increasingly deployed in interactive game environments. Yet game benchmarks for VLM agents typically report a single first-attempt score per (agent, game) pair, focus on single-agent Solo play, and lack unified protocols for evaluating heterogeneous agent classes (commercial VLMs, open-weight VLMs, and specialized game policies) on the same footing. We address these gaps with OmniGameArena, a real-time benchmark of twelve newly built Unreal Engine 5 games spanning Solo (7), PvP (3), and Coop (2) with unified action interfaces, and the Improvement Dynamics Curve (IDC), an agentic-reflection harness in which a tool-using reflector LLM autonomously refines a bounded skill prompt across multiple rounds. Beyond cold-start leaderboard scores, IDC exposes two additional observables for each (agent, game) pair: how the score evolves across reflection rounds, and how the learned skill behaves on held-out task variants. We report these observables for twelve VLM agents on the cold-start leaderboard and four top agents under IDC.', 'score': 10, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'a4a10ed295d5eb84', 'authors': ['Mingxian Lin', 'Shengju Qian', 'Yuqi Liu', 'Yi-Hua Huang', 'Yiyu Wang', 'Wei Huang', 'Yitang Li', 'Fan Zhang', 'Zeyu Hu', 'Lingting Zhu', 'Xin Wang', 'Xiaojuan Qi'], 'affiliations': ['LIGHTSPEED', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09826.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#games', '#cv', '#open_source', '#agents'], 'emoji': '🎮', 'ru': {'title': 'Динамическое улучшение агентов с помощью рефлексии в играх', 'desc': 'OmniGameArena представляет единую систему для оценки визуально-языковых моделей (VLM) в различных игровых окружениях. Авторы вводят протокол Improvement Dynamics Curve (IDC), который использует отражающий LLM для автоматического улучшения навыков агента через несколько итераций. Бенчмарк включает двенадцать игр на Unreal Engine 5, охватывающих одиночную игру, PvP и кооперативные режимы с унифицированными интерфейсами действий. Система позволяет отслеживать не только начальную производительность, но и эволюцию результатов при улучшении, а также обобщение навыков на новые варианты задач.'}, 'en': {'title': 'Elevating VLM Agents: A Unified Benchmark for Game Performance', 'desc': "OmniGameArena is a new benchmark designed to evaluate vision-language model (VLM) agents in various gaming scenarios. It introduces a reflection-based improvement protocol that tracks how agents improve their performance over time and generalize their skills across different tasks. The benchmark includes twelve games built in Unreal Engine 5, covering solo, player versus player (PvP), and cooperative play, all with standardized action interfaces. By using the Improvement Dynamics Curve (IDC), the study provides insights into how agents' scores change through reflection and how well they adapt to new challenges."}, 'zh': {'title': 'OmniGameArena：多样化游戏环境中的视觉-语言模型评估新基准', 'desc': 'OmniGameArena 是一个统一的基准，用于评估视觉-语言模型代理在多样化游戏环境中的表现。该基准通过反思改进协议跟踪代理的性能演变和技能泛化。它涵盖了十二个新建的虚幻引擎5游戏，支持单人、玩家对战和合作模式，并提供统一的动作接口。通过改进动态曲线（IDC），该基准能够展示每个代理在多个回合中的得分演变及其在不同任务变体上的技能表现。'}}}, {'id': 'https://huggingface.co/papers/2606.03980', 'title': 'Skill-RM: Unifying Heterogeneous Evaluation Criteria via Agent Skill', 'url': 'https://huggingface.co/papers/2606.03980', 'abstract': 'Abstract Skill-RM presents a unified reward modeling framework that treats reward computation as a structured agentic task, enabling dynamic evidence aggregation and consistent evaluation across diverse applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reward models (RMs) provide critical feedback signals for LLM post-training, notably in reinforced fine-tuning (RFT) and reinforcement learning (RL) pipelines. However, current reward evaluation relies on heterogeneous criteria such as rule-based verifiers, ground-truth references, procedural checklists, and complex rubrics, where a unified mechanism to integrate all types of evidence remains unexplored. To this end, we propose Skill Reward Model (Skill-RM), a unified framework that reformulates reward modeling as the execution of a reusable Reward-Evaluation Skill. By treating reward computation as a structured agentic task, Skill-RM provides a consistent interface to orchestrate heterogeneous resources, dynamically selecting and aggregating evidence tailored to the specific requirements of each input. This approach enables the reward model to move beyond static evaluation, ensuring consistency and transparency across diverse tasks. Extensive experiments on reward benchmarks and downstream applications, including best-of-N selection and reinforcement learning, demonstrate that Skill-RM consistently outperforms traditional judge baselines. Our findings suggest that Skill-RM not only provides a unified solution for reward modeling but also achieves superior performance through the strategic and dynamic orchestration of evidence. The code is at https://github.com/Qwen-Applications/Skill-RM.', 'score': 9, 'issue_id': 2397, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '0637174503061a1a', 'authors': ['Tao Chen', 'Gangwei Jiang', 'Pengyu Cheng', 'Siyuan Huang', 'Yihao Liu', 'Jingwei Ni', 'Jiaqi Guo', 'Mengyu Zhou', 'Kai Tang', 'Junling Liu', 'Qinliang Su', 'Xiaoxi Jiang', 'Guanjun Jiang'], 'affiliations': ['ETH Zürich', 'Peking University', 'Qwen Large Model Application Team, Alibaba', 'Sun Yat-sen University', 'The Chinese University of Hong Kong', 'University of Zurich'], 'pdf_title_img': 'assets/pdf/title_img/2606.03980.jpg', 'data': {'categories': ['#agents', '#benchmark', '#rlhf', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Динамическая агрегация доказательств для единой модели наград', 'desc': 'В работе предлагается Skill-RM — единая система моделирования наград, которая рассматривает вычисление наград как структурированную агентную задачу. Фреймворк объединяет разнородные источники информации (верификаторы, эталонные ответы, контрольные списки и рубрики) в единый механизм оценки. Система динамически выбирает и агрегирует доказательства в зависимости от конкретных требований каждого примера, что обеспечивает согласованность и прозрачность оценки. Экспериментальные результаты показывают, что Skill-RM превосходит традиционные подходы к моделированию наград в задачах выбора лучших выборов и reinforcement learning.'}, 'en': {'title': 'Unified Reward Modeling for Consistent Evaluation', 'desc': 'Skill-RM introduces a new way to compute rewards in machine learning by treating it as a structured task that can adapt to different situations. This framework allows for the dynamic gathering and evaluation of evidence, making it easier to apply across various applications. Unlike traditional methods that rely on inconsistent criteria, Skill-RM provides a unified approach that ensures consistent and transparent evaluations. Experiments show that Skill-RM outperforms existing reward models, highlighting its effectiveness in reinforcement learning and other tasks.'}, 'zh': {'title': '统一奖励建模，动态证据聚合', 'desc': 'Skill-RM提出了一种统一的奖励建模框架，将奖励计算视为一个结构化的代理任务，从而实现动态证据聚合和跨多种应用的一致评估。该框架通过可重用的奖励评估技能，重新定义了奖励建模的执行方式，能够灵活选择和整合证据，以满足每个输入的特定需求。Skill-RM的设计使得奖励模型超越了静态评估，确保了在不同任务中的一致性和透明性。实验结果表明，Skill-RM在奖励基准和下游应用中表现优于传统的评判基线，提供了一个统一的解决方案并实现了卓越的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.09811', 'title': 'AHA-WAM:Asynchronous Horizon-Adaptive World-Action Modeling with Observation-Guided Context Routing', 'url': 'https://huggingface.co/papers/2606.09811', 'abstract': 'Abstract AHA-WAM is an asynchronous world-action model that uses dual Diffusion Transformers to enable efficient long-horizon planning and real-time action execution in robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World-action models have emerged as a promising paradigm for robot manipulation, jointly modeling visual scene dynamics and actions to inject physical priors into policy learning. However, existing world-action models couple world prediction and action execution at the same temporal resolution, forcing the world branch to model near-term frame variations that are redundant and weakly informative. We posit that strictly binding world prediction and action execution to the same temporal rhythm may underutilize the potential of the video branch for embodied control. Therefore, we propose AHA-WAM, an Asynchronous Horizon-Adaptive World-Action Model built on a dual Diffusion Transformer (DiT) architecture that reorganizes world-action modeling around this temporal asymmetry. AHA-WAM instantiates the video DiT as a low-frequency world planner that maintains rolling key-value memory over past observations and exposes reusable layerwise latent context encoding long-horizon scene evolution, while a high-frequency action DiT executes short action chunks in closed loop by querying this context through layerwise joint attention. To support asynchronous execution, we introduce horizon-adaptive offset training and Observation-Guided Video-Context Routing (OVCR), which together let the action expert exploit long-horizon world context while remaining responsive to real-time execution state without rerunning the video DiT. Experiments on RoboTwin and real-world manipulation tasks show that AHA-WAM achieves state-of-the-art performance without any robot-data pretraining, attaining 92.80% average success on RoboTwin and 78.3% success across 4 real-world tasks, while reaching 24.17 Hz closed-loop control with a 4.59x speedup over Fast-WAM.', 'score': 5, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '0030f00d5d2417bf', 'authors': ['Jisong Cai', 'Long Ling', 'Shiwei Chu', 'Zhongshan Liu', 'Jiayue Kang', 'Zhixuan Liang', 'Wenjie Xu', 'Yinan Mao', 'Weinan Zhang', 'Xiaokang Yang', 'Ru Ying', 'Ran Zheng', 'Yao Mu'], 'affiliations': ['Baidu AI Cloud', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.09811.jpg', 'data': {'categories': ['#training', '#diffusion', '#optimization', '#architecture', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Асинхронное планирование мира для синхронного управления роботом', 'desc': 'AHA-WAM — это асинхронная модель мира и действий, которая использует две модели диффузионных трансформеров для эффективного планирования на длинных горизонтах и выполнения действий в реальном времени при манипуляции роботом. Ключевая идея заключается в разделении временных разрешений: видео-ветвь работает на низкой частоте для предсказания динамики сцены и поддерживает долгосрочный контекст, а ветвь действий работает на высокой частоте для выполнения коротких последовательностей движений. Модель использует иерархическое внимание между слоями и механизм адаптивной маршрутизации контекста, что позволяет избежать избыточного моделирования близких кадров и повысить эффективность. Экспериментальные результаты показывают передовую производительность: 92.80% успешных попыток на симуляторе RoboTwin и 78.3% на реальных задачах с частотой управления 24.17 Гц, что в 4.59 раза быстрее конкурирующих подходов.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with Asynchronous Planning', 'desc': 'AHA-WAM is a novel asynchronous world-action model designed for robotic manipulation, utilizing dual Diffusion Transformers to enhance planning and action execution. It separates the world prediction and action execution processes, allowing for more efficient long-horizon planning by using a low-frequency world planner and a high-frequency action executor. This model introduces techniques like horizon-adaptive offset training and Observation-Guided Video-Context Routing to optimize the use of past observations while maintaining responsiveness in real-time tasks. Experimental results demonstrate that AHA-WAM outperforms existing models, achieving high success rates in both simulated and real-world environments without requiring pretraining on robot data.'}, 'zh': {'title': '异步世界-动作模型：高效机器人操作的新方法', 'desc': 'AHA-WAM是一种异步世界-动作模型，利用双重扩散变换器实现高效的长时间规划和实时动作执行，特别适用于机器人操作任务。该模型通过将世界预测和动作执行解耦，优化了时间节奏，使得机器人能够更好地利用视频信息进行控制。AHA-WAM采用低频率的世界规划器和高频率的动作执行器，能够在保持实时响应的同时，利用长时间的世界上下文信息。实验结果表明，AHA-WAM在多个任务中表现出色，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.09659', 'title': 'End-to-End Context Compression at Scale', 'url': 'https://huggingface.co/papers/2606.09659', 'abstract': "Abstract Encoder-decoder compression techniques are improved through architectural search and large-scale pretraining to create Latent Context Language Models that efficiently handle long contexts with better performance and memory usage compared to traditional KV cache methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-context language model inference is bottlenecked by memory, as the KV cache grows with context length. Recent techniques to compress the KV cache fall short: they either degrade model quality substantially or require considerable time and compute to compress a single long prompt. Furthermore, many methods require the input to fit within the target model's context window, and are generally incompatible with modern production inference engines. Encoder-decoder compressors, which map a long token sequence to a shorter sequence of latent embeddings consumed by a decoder, are an appealing alternative in principle. However, existing approaches are not competitive with KV cache compression on the accuracy-efficiency frontier. In this work, we revisit encoder-decoder compression and close this gap. We first perform an architecture search, pre-training many variants from scratch to determine how best to design and train encoder-decoder compressors. Guided by our findings, we continually pre-train a family of 0.6B-encoder, 4B-decoder models on over 350B tokens each, at compression ratios of 1:4, 1:8, and 1:16. We introduce Latent Context Language Models (LCLMs), a family of compressors that improve the Pareto frontier across general-task performance, compression speed, and peak memory usage. We demonstrate that LCLMs serve as efficient backbones for long-horizon agents, letting the agent skim through a compressed long context and adaptively expand relevant segments on demand.", 'score': 5, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'ec744005c50979cc', 'authors': ['Ang Li', 'Sean McLeish', 'Haozhe Chen', 'Nimit Kalra', 'Zaiqian Chen', 'Artem Gazizov', 'Venkata Anoop Suhas Kumar Morisetty', 'Bhavya Kailkhura', 'Harshitha Menon', 'Zhuang Liu', 'Brian R. Bartoldson', 'Tom Goldstein', 'Sanae Lotfi', 'Micah Goldblum', 'Pavel Izmailov'], 'affiliations': ['Columbia University', 'FAIR at Meta', 'Harvard University', 'Lawrence Livermore National Laboratory', 'New York University', 'Princeton University', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2606.09659.jpg', 'data': {'categories': ['#inference', '#long_context', '#training', '#open_source', '#optimization', '#architecture', '#agents'], 'emoji': '💾', 'ru': {'title': 'Эффективное сжатие контекста через латентные представления энкодер-декодер', 'desc': 'В работе предлагается улучшение методов сжатия KV-кэша в больших языковых моделях через архитектурный поиск и масштабное предобучение. Авторы разработали Latent Context Language Models (LCLM) — семейство моделей энкодер-декодер, которые эффективно сжимают длинные контексты в латентные представления. Модели предобучены на более чем 350 миллиардах токенов с коэффициентами сжатия 1:4, 1:8 и 1:16, достигая лучшего баланса между качеством, скоростью сжатия и потреблением памяти. LCLM можно использовать в качестве эффективных компонентов для агентов, которые могут выборочно расширять релевантные фрагменты сжатого контекста по требованию.'}, 'en': {'title': 'Revolutionizing Long Context Handling with Latent Context Language Models', 'desc': 'This paper presents Latent Context Language Models (LCLMs), which enhance encoder-decoder compression techniques for handling long contexts in language models. By conducting an architectural search and large-scale pretraining, the authors improve the efficiency and performance of these models compared to traditional key-value (KV) cache methods. LCLMs achieve better accuracy and memory usage while allowing for adaptive context expansion, making them suitable for long-horizon tasks. The study demonstrates that these models can effectively compress long token sequences into shorter latent embeddings, addressing the limitations of existing KV cache compression techniques.'}, 'zh': {'title': '潜在上下文语言模型：高效处理长上下文的创新', 'desc': '本论文提出了一种新的潜在上下文语言模型（LCLM），通过架构搜索和大规模预训练来改进编码器-解码器压缩技术。这种模型能够高效处理长上下文，并在性能和内存使用上优于传统的KV缓存方法。我们通过预训练多个变体，优化了编码器-解码器压缩器的设计，达到了更好的压缩比和速度。LCLM为长时间跨度的智能体提供了高效的支持，使其能够快速浏览压缩的长上下文，并根据需要动态扩展相关部分。'}}}, {'id': 'https://huggingface.co/papers/2606.08432', 'title': 'Trajectory-Refined Distillation', 'url': 'https://huggingface.co/papers/2606.08432', 'abstract': "Abstract On-policy distillation suffers from prefix failure where dense token-level supervision creates fragmented gradients; trajectory-refined distillation addresses this by correcting student rollouts at the trajectory level before distillation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) has become a central post-training tool for large language models (LLMs), providing dense per-token teacher supervision along the student's own rollouts. In this work, we identify a common structural cause underlying OPD, which we call prefix failure. Under prefix failure, dense per-token supervision induces a bimodal teacher mixture and fragmented gradients that token-level loss truncation or reweighting fail to address. This observation motivates us to move beyond token-level loss interventions toward trajectory-level output corrections. We thus propose Trajectory-Refined Distillation (TRD), a trajectory-level correction method that revises the student's rollout under the teacher guidance while within on-policy support. By correcting problematic prefixes before distillation, TRD mitigates prefix failure at its source. Moreover, TRD improves the exploration by exposing the student to alternative valid derivations under teacher guidance, even when the original rolls are already correct. TRD can also be applied to on-policy self-distillation (OPSD), a parameter-sharing variant that uses the student model conditioned on privileged informations as the teacher. Across a wide range of benchmarks and base models at multiple scales, TRD consistently outperforms prior baselines, improving single-attempt accuracy and broadening reasoning coverage. Code is available at https://github.com/louieworth/trd", 'score': 3, 'issue_id': 2397, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': 'c7c3dfe124faabf3', 'authors': ['Li Jiang', 'Haoran Xu', 'Yichuan Ding', 'Amy Zhang'], 'affiliations': ['McGill University', 'Mila Quebec AI Institute', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.08432.jpg', 'data': {'categories': ['#training', '#reasoning', '#rlhf', '#open_source', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Исправляйте ошибки на уровне траекторий, а не токенов', 'desc': "Работа раскрывает проблему 'prefix failure' при дистилляции моделей на собственных траекториях, когда плотный надзор на уровне токенов приводит к фрагментированным градиентам. Авторы предлагают метод Trajectory-Refined Distillation (TRD), который корректирует ошибочные префиксы на уровне целых траекторий под руководством учителя, а не пытается исправлять проблемы через перевешивание потерь отдельных токенов. Метод работает как с обычной дистилляцией, так и с самодистилляцией, и улучшает качество за счет использования альтернативных корректных решений при генерации. Экспериментально TRD показывает стабильное улучшение на различных бенчмарках и масштабах моделей."}, 'en': {'title': 'Correcting Prefix Failures for Better Distillation', 'desc': "This paper addresses a problem in on-policy distillation called prefix failure, where dense supervision at the token level leads to fragmented gradients. The authors propose a new method called Trajectory-Refined Distillation (TRD) that corrects the student's rollouts at the trajectory level before the distillation process. By focusing on trajectory-level corrections, TRD mitigates the issues caused by prefix failure and enhances the exploration of alternative valid outputs. The results show that TRD significantly improves accuracy and reasoning coverage across various benchmarks and models."}, 'zh': {'title': '轨迹精炼蒸馏：解决前缀失败的创新方法', 'desc': '本论文探讨了在政策蒸馏中存在的前缀失败问题，这种问题导致了密集的标记级监督产生了碎片化的梯度。为了解决这个问题，作者提出了一种新的方法，称为轨迹精炼蒸馏（TRD），它在轨迹级别上对学生的输出进行修正。TRD通过在蒸馏之前纠正有问题的前缀，从源头上减轻了前缀失败的影响。此外，TRD还通过教师指导让学生接触到其他有效的推导方式，从而提高了探索能力。'}}}, {'id': 'https://huggingface.co/papers/2606.09809', 'title': 'Evaluation Cards: An Interpretive Layer for AI Evaluation Reporting', 'url': 'https://huggingface.co/papers/2606.09809', 'abstract': 'Abstract AI evaluation results suffer from inconsistent reporting across platforms, prompting the development of EvalCards, an operational framework that standardizes benchmark metadata, evaluation data, and model information into a unified, interpretable record with four key interpretive signals.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI evaluation results are produced at scale but reported inconsistently across leaderboards, model cards, benchmark papers, and company blogs. The cost is interpretive: readers cannot reliably compare results across sources, identify what a report omits, or trace an aggregate claim to its underlying evidence. Recent efforts address isolated components but leave three gaps: they cover only narrow slices of the evaluation lifecycle and do not compose into a single interpretable record; they specify static representations that do not differentiate the questions different stakeholders bring to the same evidence; and they remain proposals on paper, lacking the extraction infrastructure required for adoption at scale. We present , an operational reporting layer that composes benchmark metadata, evaluation run data, and model metadata into a unified record. We (1) derive a reporting schema from a structured review of 52 papers and 10 stakeholder interviews, (2) implement four interpretive signals (reproducibility, documentation completeness, provenance and risk, and score comparability), rendered through reader modes calibrated to research and non-research audiences, and (3) deploy a monitoring tool that applies  across 5,816 models, 635 benchmarks, and 101,843 results, surfacing systematic gaps in current reporting practice.', 'score': 2, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'e5845f2779d6789d', 'authors': ['Avijit Ghosh', 'Anka Reuel', 'Jenny Chim', 'Wm. Matthew Kennedy', 'Srishti Yadav', 'Jennifer Mickel', 'Yanan Long', 'Andrew Tran', 'Anastassia Kornilova', 'Damian Stachura', 'Kevin Klyman', 'Felix Friedrich', 'Jeba Sania', 'Max Lamparth', 'Jan Batzner', 'Anoop Mishra', 'Eliya Habba', 'Yixiong Hao', 'Nathan Heath', 'Shalaleh Rismani', 'Usman Gohar', 'Andrea Loehr', 'David Manheim', 'Ruchira Dhar', 'Sree Harsha Nelaturu', 'Aarush Sinha', 'Leshem Choshen', 'Drishti Sharma', 'Ishan Khire', 'Amit Saha', 'Subramanyam Sahoo', 'Michael Hardy', 'Michael Alexander Riegler', 'Kabir Manghnani', 'Michelle Lin', 'Yanan Jiang', 'Yilin Huang', 'Asaf Yehudai', 'Jessica Ji', 'Aris Hofmann', 'Mubashara Akhtar', 'Nuno Moniz', 'Yacine Jernite', 'Stella Biderman', 'Zeerak Talat', 'Sanmi Koyejo', 'Mykel Kochenderfer', 'Irene Solaiman'], 'affiliations': ['Amherst College', 'Berkeley AI Safety Institute (BASIS)', 'DHBW Stuttgart', 'ETH Zurich & ETH AI Center', 'EleutherAI', 'Evals Consensus', 'Georgetown University', 'Georgia Institute of Technology', 'Harvard University', 'Hugging Face', 'IBM Research', 'IOL.Learn & Zuse Institute Berlin', 'Independent', 'Israel Institute of Technology', 'Massachusetts Institute of Technology', 'McGill University', 'Oxford Internet Institute', 'Quebec AI Institute, Université de Montréal', 'Queen Mary University of London', 'Simula', 'Stanford University', 'Syntony Research', 'TU Darmstadt', 'The Hebrew University of Jerusalem', 'Trustible', 'University of Chicago', 'University of Copenhagen', 'University of Edinburgh', 'University of Nebraska', 'University of Notre Dame', 'Weizenbaum Institute & Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2606.09809.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Унификация отчётности об оценке AI через стандартизированные карточки EvalCards', 'desc': 'Статья представляет EvalCards — операционный фреймворк, который стандартизирует отчётность о результатах оценки AI моделей, объединяя метаданные бенчмарков, данные экспериментов и информацию о моделях в единую интерпретируемую запись. Авторы разработали схему отчётности на основе анализа 52 научных работ и интервью с 10 заинтересованными сторонами, что позволяет решить проблему несогласованной публикации результатов оценки на разных платформах. В фреймворк встроены четыре интерпретативных сигнала: воспроизводимость, полнота документации, происхождение и риски, а также сравнимость оценок, адаптированные для разных типов пользователей. Инструмент был развёрнут в масштабе и применён к 5816 моделям, 635 бенчмаркам и 101843 результатам оценки, выявив систематические пробелы в текущей практике отчётности.'}, 'en': {'title': 'Standardizing AI Evaluation for Clearer Insights', 'desc': 'This paper introduces EvalCards, a framework designed to standardize the reporting of AI evaluation results across various platforms. It addresses the inconsistencies in how results are presented, making it difficult for users to compare and interpret data effectively. EvalCards compiles benchmark metadata, evaluation data, and model information into a single, interpretable record, enhancing clarity and usability. The framework includes four key interpretive signals to improve understanding for different stakeholders, ensuring that AI evaluation results are more accessible and reliable.'}, 'zh': {'title': '标准化评估，提升可比性', 'desc': '本论文提出了EvalCards，这是一个标准化的评估框架，旨在解决人工智能评估结果在不同平台上报告不一致的问题。EvalCards将基准元数据、评估数据和模型信息整合成一个统一且可解释的记录，提供四个关键的解释信号。通过对52篇论文和10次利益相关者访谈的结构化审查，论文制定了一个报告模式，并实现了可重复性、文档完整性、来源和风险、以及分数可比性等四个解释信号。该框架已在5816个模型、635个基准和101843个结果中应用，揭示了当前报告实践中的系统性缺口。'}}}, {'id': 'https://huggingface.co/papers/2606.09365', 'title': 'Experience Makes Skillful: Enabling Generalizable Medical Agent Reasoning via Self-Evolving Skill Memory', 'url': 'https://huggingface.co/papers/2606.09365', 'abstract': 'Abstract SkeMex is a self-evolving framework that enhances medical agents through structured skill memory, improving long-term clinical reasoning by distinguishing useful experiences and governing memory retention based on contextual utility.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Medical agent systems are increasingly expected to support interactive clinical decision making rather than only static question answering. In such settings, effective agents must reuse prior experience across evolving cases, yet existing memory mechanisms often retain raw historical traces that are redundant, noisy, and difficult to govern. More importantly, they rarely distinguish which memories are truly useful for future reasoning. This limits their ability to accumulate compact and reliable experience for long-horizon clinical reasoning. To close this gap, we propose SkeMex, a post-deployment self-evolution framework that improves medical agents through a skill-based memory without updating model weights. SkeMex distills informative interaction trajectories into structured skills that encode reusable procedural knowledge, and organizes them into a multi-branch repository spanning general, task-specific, and action-level experience. To determine which memories should be reused and retained, SkeMex estimates context-dependent utility from environment feedback and uses it to guide value-aware retrieval and repository governance. A closed-loop ``Read--Write--Assess--Govern" lifecycle further supports continual evolution by writing new skills, updating utilities, promoting useful memories, and removing harmful entries. Experiments across diverse clinical tasks show that SkeMex consistently outperforms representative memory-based agents in both offline and online settings. It also generalizes across model backbones and supports transferable skill memory. All data and code will be released publicly.', 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'c744978406243d69', 'authors': ['Haoran Sun', 'Wenjie Li', 'Yujie Zhang', 'Zekai Lin', 'Fanrui Zhang', 'Kaitao Chen', 'Xingqi He', 'Yichen Li', 'Mianxin Liu', 'Lei Liu', 'Yankai Jiang'], 'affiliations': ['Fudan University', 'Huazhong University of Science and Technology', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.09365.jpg', 'data': {'categories': [], 'emoji': '🏥', 'ru': {'title': 'Самоучащаяся система с умной памятью навыков для клинических решений', 'desc': 'SkeMex — это фреймворк самоэволюции для медицинских агентов, использующий структурированную память навыков для улучшения длительного клинического рассуждения. Система отличает полезный опыт от шума в исторических данных и управляет сохранением памяти на основе контекстной полезности, не обновляя веса модели. Навыки организованы в многоуровневое хранилище, охватывающее общие, специфичные для задачи и действие-уровневые знания, с использованием обратной связи окружения для оценки их релевантности. Циклический процесс «Чтение—Запись—Оценка—Управление» обеспечивает непрерывную эволюцию агента путём добавления новых навыков, удаления вредоносных записей и повышения полезного опыта.'}, 'en': {'title': 'Empowering Medical Agents with Evolving Skill Memory', 'desc': 'SkeMex is a framework designed to enhance medical agents by improving their memory systems for better clinical reasoning. It focuses on creating a structured skill memory that helps agents identify and retain useful experiences while discarding irrelevant ones. By using feedback from the environment, SkeMex evaluates the utility of memories to ensure that only the most beneficial information is kept for future use. This approach allows medical agents to evolve continuously without needing to change their underlying model weights, leading to more effective decision-making in clinical settings.'}, 'zh': {'title': '自我进化的医疗代理框架', 'desc': 'SkeMex是一个自我进化的框架，通过结构化的技能记忆来增强医疗代理，改善长期临床推理。它能够区分有用的经验，并根据上下文的实用性来管理记忆的保留。SkeMex提取有价值的互动轨迹，将其转化为可重用的程序性知识，并组织成多分支的经验库。通过环境反馈评估上下文相关的实用性，SkeMex指导记忆的检索和管理，从而支持医疗代理的持续进化。'}}}, {'id': 'https://huggingface.co/papers/2606.09348', 'title': 'PBSD: Privileged Bayesian Self-Distillation for Long-Horizon Credit Assignment', 'url': 'https://huggingface.co/papers/2606.09348', 'abstract': "Abstract Privileged Bayesian Self-Distillation enables fine-grained credit assignment in long-horizon tasks by converting sparse outcome rewards into calibrated turn-level signals through Bayesian evidence scoring and autoregressive decomposition.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-horizon agentic tasks pose a fundamental credit assignment challenge for outcome-base reinforcement learning: trajectory-level rewards verify final correctness but provide limited guidance on which intermediate reasoning steps or tool interactions contribute to the outcome. The difficulty is especially pronounced in multi-turn search agents, where successful trajectories may contain misleading actions and failed trajectories may contain valuable evidence-gathering steps. We propose PBSD (Privileged Bayesian Self-Distillation), a Bayes-calibrated self-distillation method for fine-grained credit assignment under sparse final rewards. PBSD measures trajectory quality through the posterior-to-prior probability ratio of the verified answer and applies Bayes' rule to convert this hard-to-estimate answer-side ratio into a tractable likelihood ratio between a standard student model and a privileged answer-conditioned teacher model. Autoregressive decomposition of this Bayesian evidence score yields turn-level signals that identify whether each intermediate turn supports or undermines the verified outcome. Consequently, PBSD provides a principled and elegant reweighting scheme that transforms sparse outcome supervision into Bayes-calibrated turn-level credit signals, while remaining fully compatible with standard policy optimization. Experiments demonstrate that PBSD consistently enhances performance across both in-domain and out-of-domain settings, and effectively transfers knowledge from short-context training to long-context inference, suggesting that its fine-grained credit assignment mechanism facilitates more effective policy learning and yields improved generalization.", 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'bd631101748523be', 'authors': ['Yang Tian', 'Rui Wang', 'Xumeng Wen', 'Junjie Li', 'Shizhao Sun', 'Lei Song', 'Jiang Bian', 'Bo Zhao'], 'affiliations': ['School of AI, Shanghai Jiao Tong University', 'XYZ AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.09348.jpg', 'da
