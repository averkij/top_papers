ta': {'categories': ['#long_context', '#training', '#reasoning', '#rl', '#transfer_learning', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Байесовское самодистиллирование для точного приписания кредита в долгосрочных задачах', 'desc': 'В статье предложен метод Privileged Bayesian Self-Distillation (PBSD) для решения проблемы приписания кредита в задачах с длинными горизонтами принятия решений в обучении с подкреплением. Метод преобразует разреженные финальные награды в калиброванные сигналы на уровне отдельных ходов, используя байесовское оценивание вероятностного отношения и авторегрессивную декомпозицию. PBSD применяет правило Байеса для конвертации сложно оцениваемого отношения правдоподобия между учительской моделью, обусловленной правильным ответом, и обычной ученической моделью. Экспериментальные результаты показывают, что метод улучшает производительность как в стандартных, так и в новых условиях, и хорошо обобщается при переходе от обучения с коротким контекстом к выводу с длинным контекстом.'}, 'en': {'title': 'Transforming Sparse Rewards into Detailed Feedback with PBSD', 'desc': "This paper introduces Privileged Bayesian Self-Distillation (PBSD), a method designed to improve credit assignment in reinforcement learning tasks that have sparse rewards. PBSD uses Bayesian evidence scoring to convert final outcome rewards into detailed turn-level feedback, helping to identify which actions contribute positively or negatively to the overall result. By applying Bayes' rule, it creates a likelihood ratio that allows for a more nuanced understanding of each step in a multi-turn process. The results show that PBSD enhances learning performance and generalization, making it easier for agents to learn from both short and long contexts."}, 'zh': {'title': '特权贝叶斯自蒸馏：提升长时间任务的信用分配', 'desc': '本论文提出了一种名为特权贝叶斯自蒸馏（PBSD）的方法，旨在解决长时间任务中的细粒度信用分配问题。通过贝叶斯证据评分和自回归分解，PBSD将稀疏的最终奖励转化为可校准的回合级信号，从而提供更明确的指导。该方法通过比较验证答案的后验与先验概率，生成每个中间步骤对最终结果的支持或削弱信号。实验结果表明，PBSD在多种任务中均能有效提升性能，并促进了从短上下文训练到长上下文推理的知识迁移。'}}}, {'id': 'https://huggingface.co/papers/2606.08548', 'title': 'OASIS: From Simulation Data Collection to Real-World Humanoid Loco-Manipulation', 'url': 'https://huggingface.co/papers/2606.08548', 'abstract': 'Abstract A simulation-data-driven framework for humanoid loco-manipulation that uses 3D generative models to create realistic assets and hierarchical visuomotor policies trained on simulated data achieves better zero-shot performance than real-robot training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in robot manipulation has been largely driven by learning from large-scale demonstrations. For humanoid robot loco-manipulation tasks, however, existing data sources force an unsatisfying tradeoff between trajectory quality and scalability. Real-world teleoperation provides the highest-quality trajectories but requires dedicated physical space and time-consuming scene resets. Simulation offers an alternative way out of this dilemma: it can produce clean, embodiment-aligned data at scale without any physical hardware. In this paper, we propose OASIS, a simulation-data-driven framework for humanoid loco-manipulation. OASIS automatically reconstructs realistic object assets from real-world images using a 3D generative model. Based on these assets, trajectories are first collected through teleoperation in simulation, and then augmented under diverse domain randomizations in a post-processing stage. With the resulting simulation data, we further design a hierarchical visuomotor policy for humanoid loco-manipulation. Extensive experiments on the real humanoid robot show that, under zero-shot deployment, the policy trained on our simulation data achieves higher success rates on most tasks than that trained on real-robot teleoperation data, owing largely to the broad lighting and environmental variations covered by our simulation rendering, which real-robot data fails to capture. The project page is available at https://oasis-humanoid.github.io/.', 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': '4b6aecbbf1995231', 'authors': ['Zehao Yu', 'Jiakun Zheng', 'Weiji Xie', 'Jiyuan Shi', 'Chenyun Zhang', 'Chenjia Bai', 'Xuelong Li'], 'affiliations': ['East China University of Science and Technology', 'Fudan University', 'Institute of Artificial Intelligence (TeleAI), China Telecom', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.08548.jpg', 'data': {'categories': ['#3d', '#robotics', '#training'], 'emoji': '🤖', 'ru': {'title': 'Симуляция вместо реальности: как генеративные модели улучшают обучение роботов', 'desc': 'В этой работе предлагается фреймворк OASIS для обучения гуманоидных роботов задачам локомоманипуляции, который использует генеративные 3D модели для создания реалистичных виртуальных объектов из реальных изображений. Траектории собираются в симуляции через телеоперацию и затем дополняются разнообразной доменной рандомизацией для расширения обучающего набора данных. На основе этих симуляционных данных обучается иерархическая визуомоторная политика глубокого обучения. Экспериментальные результаты показывают, что политика, обученная на симуляционных данных, достигает лучшей нулевой производительности на реальном роботе, чем модели, обученные на реальных данных телеопераций, благодаря лучшему покрытию разнообразия освещения и сцен.'}, 'en': {'title': 'OASIS: Simulated Success for Humanoid Robots', 'desc': 'This paper presents OASIS, a framework that enhances humanoid robot loco-manipulation by leveraging simulation data. It utilizes 3D generative models to create realistic object assets from real-world images, allowing for the generation of high-quality training data without the limitations of physical setups. The framework collects trajectories through teleoperation in a simulated environment and applies domain randomization to improve robustness. The results show that policies trained on this simulation data outperform those trained on real-robot data in zero-shot scenarios, highlighting the advantages of diverse training conditions.'}, 'zh': {'title': 'OASIS：模拟驱动的人形机器人操控新框架', 'desc': '本文提出了一种名为OASIS的框架，用于人形机器人在行走和操作任务中的应用。该框架利用3D生成模型从真实世界图像中重建逼真的物体资产，并在模拟环境中收集轨迹数据。通过对这些数据进行多样化的领域随机化处理，OASIS设计了一个层次化的视觉运动策略。实验结果表明，在零-shot部署下，基于模拟数据训练的策略在大多数任务上比基于真实机器人遥操作数据训练的策略表现更好。'}}}, {'id': 'https://huggingface.co/papers/2606.07299', 'title': 'DuMate-DeepResearch: An Auditable Multi-Agent System with Recursive Search and Rubric-Grounded Reasoning', 'url': 'https://huggingface.co/papers/2606.07299', 'abstract': 'Abstract A multi-agent framework for deep research tasks that addresses planning, evidence acquisition, and report synthesis through decoupled components and dynamic optimization mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deep Research (DR) has emerged as a new agentic paradigm to tackle complex, open-ended research tasks, demanding systems that can iteratively frame problems, acquire evidence, verify sources, and synthesize long-form reports. In practice, however, current DR systems are constrained by four interrelated limitations: long-horizon planning over an underspecified scope, the bottleneck of decomposing and scheduling such tasks within a single agent, hallucination risk in long-form synthesis, and limited process auditability. This technical report presents DuMate-DeepResearch, a multi-agent DR framework built on the Qianfan Agent Foundry. The framework decouples the Agent Core, which handles task understanding, planning, and scheduling, from an extensible Tool Ecosystem for retrieval, evidence acquisition, and report rendering, making every intermediate decision and tool invocation explicitly traceable. Building on this infrastructure, DuMate-DeepResearch further introduces three mechanisms: (i) a graph-based dynamic planning strategy expands the research roadmap coarse-to-fine and continuously revises it through reflection, re-planning, backtracking, and parallel branching; (ii) a recursive two-level execution design delegates each complex search sub-task to an inner Search Agent that runs its own planning loop, isolating noisy retrieval and stabilizing long-horizon execution; (iii) a rubric-based test-time optimization mechanism dynamically generates task-specific quality criteria and uses them as live reasoning scaffolds for evidence-grounded synthesis and adaptive stopping. Across two deep research benchmarks, DuMate-DeepResearch establishes new state-of-the-art results: the best overall score (58.03%) on DeepResearch Bench, and the best overall score (61.95%) on DeepResearch Bench II while ranking first in information recall and analysis.', 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '493fdfae2c376f6a', 'authors': ['Lingyong Yan', 'Can Xu', 'Yukun Zhao', 'Wenxuan Li', 'Qingyang Chen', 'Jiulong Wu', 'Wenli Song', 'Xiangnan Li', 'Weixian Shi', 'Yiqun Chen', 'Xuchen Ma', 'Yuchen Li', 'Jiashu Zhao', 'Shuaiqiang Wang', 'Jianmin Wu', 'Dawei Yin'], 'affiliations': ['Baidu AI Cloud'], 'pdf_title_img': 'assets/pdf/title_img/2606.07299.jpg', 'data': {'categories': ['#benchmark', '#hallucinations', '#reasoning', '#open_source', '#science', '#agents'], 'emoji': '🔬', 'ru': {'title': 'Разложенная многоагентная система для умного синтеза научных отчётов', 'desc': 'Статья представляет DuMate-DeepResearch — многоагентный фреймворк для выполнения сложных исследовательских задач, который разделяет функции между Core агентом (планирование и управление) и расширяемой экосистемой инструментов (поиск информации и синтез отчётов). Фреймворк использует три ключевых механизма: граф-ориентированное динамическое планирование с итеративной переработкой, рекурсивное двухуровневое выполнение с делегированием подзадач специализированному поисковому агенту и оптимизацию во время вывода на основе критериев качества. Система обеспечивает полную прозрачность всех промежуточных решений и вызовов инструментов, что снижает риск галлюцинаций при генерации длинных текстов и повышает надёжность долгосрочного планирования. Фреймворк достиг новых результатов на двух бенчмарках глубокого исследования, показав лучшую точность поиска информации и качество анализа.'}, 'en': {'title': 'Revolutionizing Deep Research with Multi-Agent Frameworks', 'desc': 'This paper introduces DuMate-DeepResearch, a multi-agent framework designed to enhance deep research tasks by addressing key limitations in current systems. It separates the core agent functions of task understanding and planning from a flexible tool ecosystem for evidence gathering and report creation, ensuring traceability of decisions. The framework employs a graph-based dynamic planning strategy for iterative problem framing and a recursive execution design to manage complex sub-tasks effectively. Additionally, it incorporates a rubric-based optimization mechanism to adaptively refine quality criteria during synthesis, achieving state-of-the-art performance on benchmark tests.'}, 'zh': {'title': '多智能体框架提升深度研究效率', 'desc': '本论文介绍了一种名为DuMate-DeepResearch的多智能体框架，旨在解决复杂的深度研究任务。该框架通过解耦组件和动态优化机制，处理任务理解、规划和调度，同时提供可追溯的工具生态系统。DuMate-DeepResearch引入了图形动态规划策略、递归执行设计和基于标准的优化机制，以提高研究的效率和准确性。实验结果表明，该框架在多个基准测试中取得了新的最佳成绩，展示了其在信息检索和分析方面的优势。'}}}, {'id': 'https://huggingface.co/papers/2606.05753', 'title': 'Cosine Misleads: Auxiliary Losses Reshape Vision Language Models, Not Their Latents', 'url': 'https://huggingface.co/papers/2606.05753', 'abstract': 'Abstract Research challenges the conventional wisdom in latent visual reasoning by demonstrating that cosine alignment between supervised latents and visual targets negatively correlates with model accuracy, while revealing that answers are decoded downstream from latents rather than within them.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Latent visual reasoning (LVR) inserts supervised latent tokens between perception and answer generation in vision-language models (VLMs). The field uses alignment between these latents and their visual targets, i.e., cosine similarity or mean squared error (MSE), as both the training loss and the quality metric, assuming that better alignment yields a better answer. We test this with a designed matrix of five LVR variants and find the assumption inverted: cosine alignment is negatively correlated with accuracy across all five (r=-0.94). To explain this, we introduce PRISM, a pair of inference-time diagnostics: a linear probe that asks where the answer is decodable, and a corruption test that asks whether the latent is load-bearing. The supervised latents are largely bypassed. Corrupting them shifts accuracy by at most four points. The answer is decodable downstream of the latent but not at it, and the size of this decodability gap predicts how much each variant relies on its latent under perturbation. Consistent with an Information Bottleneck reading of the loss, the auxiliary objective reshapes the language model via shared parameters rather than via the latent variable it nominally optimizes.', 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'adfe8e175ffa629b', 'authors': ['XiuYu Zhang', 'Junfeng Fang', 'Zhenkai Liang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.05753.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#reasoning', '#cv', '#interpretability'], 'emoji': '🔍', 'ru': {'title': 'Латенты не содержат ответ: переосмысление визуального рассуждения в VLM', 'desc': 'Исследование опровергает общепринятое мнение о латентном визуальном рассуждении в видео-языковых моделях, показывая, что косинусовое выравнивание между обученными латентами и визуальными целями отрицательно коррелирует с точностью модели. Авторы вводят PRISM — диагностический инструмент, который выявляет, что ответы декодируются не внутри латентов, а в слоях после них. Эксперименты демонстрируют, что вспомогательная объективная функция переформирует языковую модель через общие параметры, а не через латентную переменную. Исследование переосмысляет роль латентных представлений в информационных архитектурах моделей через призму теории информационного узкого места.'}, 'en': {'title': "Rethinking Latent Visual Reasoning: Alignment Doesn't Equal Accuracy", 'desc': "This paper challenges the traditional view of latent visual reasoning (LVR) in vision-language models (VLMs) by showing that better cosine alignment between supervised latents and visual targets does not lead to improved model accuracy. Instead, the research reveals that answers are derived from information downstream of the latents, indicating that the latents themselves are not crucial for decoding answers. The authors introduce PRISM, a diagnostic tool that assesses where answers can be decoded and whether the latents are essential for this process. Their findings suggest that the auxiliary objectives in training reshape the language model's performance without relying heavily on the latents, contradicting previous assumptions about their importance."}, 'zh': {'title': '潜在视觉推理的新视角', 'desc': '这篇论文挑战了潜在视觉推理的传统观念，表明监督潜在变量与视觉目标之间的余弦对齐与模型准确性呈负相关。研究发现，答案是在潜在变量之后解码的，而不是在潜在变量内部。通过设计五种潜在视觉推理变体的矩阵进行测试，结果显示余弦对齐与准确性之间的关系是反向的。引入的PRISM诊断工具表明，监督潜在变量在很大程度上被绕过，答案的解码主要发生在潜在变量的下游。'}}}, {'id': 'https://huggingface.co/papers/2606.05122', 'title': 'Self-Evaluation Is Already There: Eliciting Latent Judge Calibration in Base LLMs with Minimal Data', 'url': 'https://huggingface.co/papers/2606.05122', 'abstract': "Abstract Self-Evaluation Elicitation (SEE) method improves model calibration for quality assessment through calibration-coupled reinforcement learning and masked distillation, demonstrating transferable quality evaluation beyond specific judge preferences.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly evaluated by other models, raising a natural question: can a model predict how a judge will score its own output? We find that the ability is largely present before any targeted training: prompted few-shot, a base model already predicts an external judge's multi-attribute quality scores on open-ended responses well above chance across three benchmarks. We introduce Self-Evaluation Elicitation (SEE), a method that surfaces this latent ability through a short cycle comprising a calibration-coupled reinforcement learning phase that improves the answer and predicts the judge, followed by a masked distillation phase that sharpens the prediction while leaving the answer untouched. From 160 unique examples, roughly 31x fewer than a reinforcement learning baseline, SEE improves held-out calibration across three benchmarks while preserving answer quality. The elicited self-evaluation is sharply localized within the model's own token distribution and stable across judges it was never trained against, indicating a transferable notion of quality rather than a single judge's preference. These results reframe judge-aligned self-evaluation as a problem of elicitation rather than acquisition.", 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '350d502a0c9d6f0e', 'authors': ['XiuYu Zhang', 'Yi Shan', 'Junfeng Fang', 'Zhenkai Liang'], 'affiliations': ['Beijing University of Technology', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2606.05122.jpg', 'data': {'categories': ['#benchmark', '#training', '#rlhf', '#optimization', '#alignment'], 'emoji': '🪞', 'ru': {'title': 'Выявление скрытой способности моделей к объективной самооценке', 'desc': 'В статье предложен метод Self-Evaluation Elicitation (SEE), который позволяет языковым моделям предсказывать, как внешний судья оценит их собственные выходные данные. Метод использует комбинацию калибровки, связанной с обучением с подкреплением, и маскированной дистилляции для выявления латентной способности модели к самооценке. SEE требует значительно меньше примеров для обучения (в 31 раз меньше чем базовый подход) и улучшает калибровку модели при сохранении качества ответов. Полученная самооценка стабильна и передаваема между разными судьями, что указывает на универсальное понимание модели качества, а не просто адаптацию к предпочтениям конкретного судьи.'}, 'en': {'title': 'Enhancing Model Calibration Through Self-Evaluation Elicitation', 'desc': "The paper introduces the Self-Evaluation Elicitation (SEE) method, which enhances model calibration for quality assessment using calibration-coupled reinforcement learning and masked distillation. This approach allows models to predict how judges will score their outputs, demonstrating that this ability exists even before specific training. SEE effectively improves the model's predictions while maintaining the quality of the generated answers, achieving better calibration with significantly fewer examples than traditional reinforcement learning methods. The findings suggest that the model's self-evaluation capability is transferable across different judges, indicating a broader understanding of quality rather than being tied to individual preferences."}, 'zh': {'title': '提升模型自我评估能力的创新方法', 'desc': '自我评估引导（SEE）方法通过校准耦合的强化学习和掩蔽蒸馏，提升了模型的质量评估能力。该方法展示了超越特定评审偏好的可转移质量评估能力。研究发现，基础模型在没有针对性训练的情况下，已经能够较好地预测外部评审对其输出的多属性质量评分。SEE方法通过短周期的校准耦合强化学习和掩蔽蒸馏，显著提高了模型的自我评估能力，同时保持了答案的质量。'}}}, {'id': 'https://huggingface.co/papers/2606.04662', 'title': 'Why Muon Outperforms Adam: A Curvature Perspective', 'url': 'https://huggingface.co/papers/2606.04662', 'abstract': "Abstract Muon outperforms Adam in large language model training by reducing curvature penalties through lower normalized directional sharpness, particularly in middle and late training stages, with advantages amplified by data imbalance and heterogeneous curvature.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Muon improves training efficiency over Adam in large language-model training by about two times, but the local geometric source of this advantage remains unclear. Our work takes a first step toward demystifying Muon's superiority over Adam from a curvature perspective. First, we apply a second-order Taylor approximation to the training landscape and show that Muon achieves a larger one-step loss decrease than Adam at matched validation loss. The two optimizers have comparable first-order gains, but Muon consistently incurs a smaller second-order curvature penalty. Second, we decompose this curvature penalty into the squared update norm and Normalized Directional Sharpness (NDS). We find that Muon and Adam have comparable update norms, so Muon's smaller curvature penalty is driven by lower NDS, not update scale. Third, we study how training data and model structure shape Muon's NDS advantage. Using Zipf-Probabilistic Context-Free Grammar (PCFG) data with controlled imbalance, we show that data imbalance amplifies Muon's NDS advantage over Adam. A within-/cross-layer decomposition further shows that, in the middle and late stages of training, Muon's lower NDS is mainly sustained by smaller within-layer curvature. Beyond empirical evidence, we analyze stylized quadratic problems with heterogeneous curvature and gradient alignment toward high-curvature modes. We prove that Muon attains a smaller average NDS than GD by balancing update energy across curvature groups; when curvature heterogeneity is sufficiently strong, this also yields lower local quadratic loss after the same number of steps.", 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '7f5229b6dc61d961', 'authors': ['Shuche Wang', 'Fengzhuo Zhang', 'Jiaxiang Li', 'Dirk Bergemann', 'Zhuoran Yang'], 'affiliations': ['National University of Singapore', 'University of Minnesota', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.04662.jpg', 'data': {'categories': ['#math', '#optimization', '#training'], 'emoji': '📈', 'ru': {'title': 'Muon побеждает Adam через контроль геометрии ландшафта потерь', 'desc': 'В статье исследуется, почему оптимизатор Muon превосходит Adam при обучении больших языковых моделей, используя анализ кривизны ландшафта потерь. Авторы показывают, что Muon достигает большего снижения функции потерь на одном шаге благодаря меньшему штрафу за кривизну, особенно за счёт более низкой нормализованной направленной остроты (NDS). Они доказывают, что преимущество Muon проявляется сильнее на несбалансированных данных и усиливается гетерогенностью кривизны, при этом улучшение наиболее заметно на средних и поздних этапах обучения. Через анализ квадратичных задач авторы теоретически обосновывают, что Muon эффективнее распределяет энергию обновлений по группам с разной кривизной.'}, 'en': {'title': 'Muon: The Superior Optimizer for Language Models', 'desc': "This paper investigates the performance of the Muon optimizer compared to the Adam optimizer in training large language models. It reveals that Muon achieves better training efficiency by incurring lower curvature penalties, particularly in the middle and late stages of training. The authors analyze the training landscape using a second-order Taylor approximation, demonstrating that Muon consistently achieves a larger reduction in loss due to its smaller Normalized Directional Sharpness (NDS). Additionally, they show that data imbalance enhances Muon's advantages, particularly through its lower curvature in the training process."}, 'zh': {'title': 'Muon优化器：超越Adam的训练效率', 'desc': '本文探讨了Muon优化器在大语言模型训练中相较于Adam的优势，特别是在训练的中后期。Muon通过降低归一化方向锐度，减少了曲率惩罚，从而提高了训练效率，约为Adam的两倍。研究表明，Muon在相同验证损失下，能够实现更大的单步损失减少，且其较小的曲率惩罚主要源于较低的归一化方向锐度。数据不平衡和模型结构对Muon的优势也有显著影响，尤其是在训练的中后期，Muon的低方向锐度主要由较小的层内曲率维持。'}}}, {'id': 'https://huggingface.co/papers/2606.06523', 'title': 'Lean4Agent: Formal Modeling and Verification for Agent Workflow and Trajectory', 'url': 'https://huggingface.co/papers/2606.06523', 'abstract': "Abstract Large language models can be equipped with formal verification frameworks using dependent-type languages to improve multi-step workflow reliability and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Equipping Large Language Models (LLMs) to execute reliable multi-step workflows has become a central challenge in artificial intelligence. Despite recent advances in LLMs' agentic capabilities, most agent systems still lack formal methods for specifying, verifying, and debugging their workflow and execution trajectories. This challenge mirrors a long-standing problem in mathematics, where the ambiguity of natural languages (NLs) motivates the development of formal languages (FLs). Inspired by this paradigm, we propose **Lean4Agent**, to the best of our knowledge, the first framework that uses Lean4, a dependent-type FL to model and verify agent behavior. **Lean4Agent** launches **FormalAgentLib**, an extensible Lean4 library for formally modeling and verifying agent workflows' semantic consistency under explicit assumptions, and enabling localization of execution-time failures revealed by trajectories. Building on **FormalAgentLib**, we further develop **LeanEvolve**, which applies results in **FormalAgentLib** to revise workflows to enhance its capability. Extensive experiments on a hard problem subset of SWE-Bench-Verified and a subset of ELAIP-Bench across 5 leading LLMs indicate that the verification-passing workflows outperform the failing ones by an average of **11.94%**, and **LeanEvolve** further improves SWE performance by **7.47%** on average. Furthermore, **Lean4Agent** establishes a foundation for a new field of using expressive dependent-type FL to formally model and verify agent behavior.", 'score': 1, 'issue_id': 2397, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '889f97ed5c04f984', 'authors': ['Ruida Wang', 'Jerry Huang', 'Pengcheng Wang', 'Xuanqing Liu', 'Luyang Kong', 'Tong Zhang'], 'affiliations': ['Independent researcher', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.06523.jpg', 'data': {'categories': [], 'emoji': '✅', 'ru': {'title': 'Формальная верификация поведения LLM-агентов через зависимые типы', 'desc': 'В статье предлагается фреймворк Lean4Agent, который использует язык с зависимыми типами Lean4 для формальной верификации поведения LLM-агентов. Авторы разработали расширяемую библиотеку FormalAgentLib, позволяющую формально моделировать и проверять семантическую консистентность рабочих процессов агентов. На основе этой библиотеки был создан метод LeanEvolve для итеративного улучшения рабочих процессов с помощью результатов верификации. Эксперименты показали, что рабочие процессы, прошедшие формальную верификацию, работают на 11.94% лучше, а LeanEvolve дополнительно улучшает производительность на 7.47% в среднем.'}, 'en': {'title': 'Enhancing LLM Reliability with Formal Verification', 'desc': 'This paper introduces **Lean4Agent**, a framework that enhances large language models (LLMs) by integrating formal verification methods using a dependent-type language called Lean4. The goal is to improve the reliability and performance of multi-step workflows executed by LLMs, addressing the challenges of ambiguity in natural language processing. By utilizing **FormalAgentLib**, a library for modeling and verifying agent workflows, the framework allows for the identification and localization of execution-time failures. Experimental results show that workflows verified through this framework outperform those that do not undergo verification, demonstrating the effectiveness of formal methods in enhancing LLM capabilities.'}, 'zh': {'title': '用Lean4Agent提升大型语言模型的工作流可靠性', 'desc': '本论文提出了一种名为Lean4Agent的框架，旨在通过依赖类型语言来增强大型语言模型（LLMs）在多步骤工作流中的可靠性和性能。该框架利用FormalAgentLib库，能够正式建模和验证代理工作流的语义一致性，并定位执行时的失败。通过LeanEvolve，研究者进一步改进了工作流的能力，实验结果显示，经过验证的工作流在性能上优于未通过验证的工作流。Lean4Agent为使用表达性依赖类型形式语言正式建模和验证代理行为开辟了新的研究领域。'}}}, {'id': 'https://huggingface.co/papers/2606.08481', 'title': 'PIPE-Cypher: Automatic Enterprise Benchmark Generation for Text-to-Cypher Systems', 'url': 'https://huggingface.co/papers/2606.08481', 'abstract': 'Abstract A local benchmark-generation pipeline transforms live property graphs and seed queries into balanced NL-to-Cypher datasets for enterprise knowledge graphs, incorporating schema profiling, reverse-query grounding, and execution validation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Enterprise property graphs vary widely in schema structure, internal terminology, domain assumptions, governance constraints, and user interaction patterns. A deployment-relevant Text2Cypher benchmark therefore reflects the questions users and agents actually ask of that graph. Creating such a benchmark is difficult because schemas and values are unique, and graph structure changes over time. Each NL-query pair must also be executable, use real graph entities, preserve diversity, and remain balanced across query types and difficulty levels. We present PIPE-Cypher, a local benchmark-generation pipeline that turns a live property graph and optional seed queries from customer questions, analyst logs, or agent tool calls into balanced NL-to-Cypher benchmarks. PIPE-Cypher combines schema profiling, reverse-query grounding, constrained generation, deterministic Cypher governance, execution validation, redaction, diversity controls, and a calibrated local LLM judge. Using local Qwen3.5-9B generation and judging, PIPE-Cypher exports 3,000 accepted FinBench/SNB examples, completes three audited ablation suites, calibrates judge behavior with human labels, and evaluates 11 local downstream models. The resulting benchmark is deliberately discriminative: zero-shot transfer is weak, while a few-shot control shows that schema-specific example banks can help compatible model families. Together, PIPE-Cypher makes Text2Cypher benchmarking a repeatable process that evolves with the graph, its users, and its target workloads.', 'score': 0, 'issue_id': 2397, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': 'd052c9646e989d60', 'authors': ['Suraj Ranganath', 'Anish Raghavendra'], 'affiliations': ['Halıcıoglu School of Data Science and Computing, University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2606.08481.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#synthetic', '#agents', '#small_models', '#graphs', '#dataset'], 'emoji': '📊', 'ru': {'title': 'Автоматическая генерация адаптивных бенчмарков для преобразования языка в граф-запросы', 'desc': 'В статье представляется PIPE-Cypher — локальный конвейер генерации бенчмарков, который преобразует живые графы свойств предприятия и исходные запросы в сбалансированные датасеты для задачи Text2Cypher (преобразование естественного языка в запросы Cypher). Система использует профилирование схемы, обратное обоснование запросов, валидацию выполнения и локальную малую языковую модель для оценки качества. Авторы демонстрируют, что сгенерированные бенчмарки эффективны для оценки моделей, причём нулевой перенос знаний показывает слабые результаты, а few-shot обучение значительно улучшает производительность совместимых семейств моделей. Подход делает процесс создания специализированных бенчмарков повторяемым и адаптивным к изменениям графов знаний и требованиям пользователей.'}, 'en': {'title': 'Transforming Natural Language Queries into Cypher with PIPE-Cypher', 'desc': 'This paper introduces PIPE-Cypher, a pipeline designed to create balanced datasets for converting natural language (NL) queries into Cypher queries for knowledge graphs. It addresses the challenges of varying schema structures and user interactions by generating benchmarks that reflect real user questions. The pipeline incorporates techniques like schema profiling and execution validation to ensure that each query pair is executable and diverse. Ultimately, PIPE-Cypher aims to make the benchmarking process for Text2Cypher applications more systematic and adaptable to changes in graph structures and user needs.'}, 'zh': {'title': 'PIPE-Cypher：动态演变的Text2Cypher基准生成', 'desc': '本文介绍了一种名为PIPE-Cypher的本地基准生成管道，旨在将实时属性图和种子查询转化为平衡的自然语言到Cypher的数据集。该管道结合了模式分析、反向查询基础、执行验证等技术，以确保生成的查询对用户和代理的实际需求具有代表性。由于每个属性图的模式和结构独特，PIPE-Cypher能够处理这些变化并生成可执行的查询对。最终，PIPE-Cypher使得Text2Cypher基准测试成为一个可重复的过程，能够随着图的演变而不断更新。'}}}, {'id': 'https://huggingface.co/papers/2606.08324', 'title': 'Set-Based Transformer for Atmospheric Compensation in Standoff LWIR Hyperspectral Imaging', 'url': 'https://huggingface.co/papers/2606.08324', 'abstract': 'Abstract A lightweight deep learning framework is presented for atmospheric compensation in passive long-wave infrared hyperspectral imaging, enabling joint estimation of transmittance, atmospheric path radiance, and downwelling spectrum from multi-range radiance measurements.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Passive long-wave infrared (LWIR) hyperspectral imaging under a standoff geometry depends on atmospheric absorption and emission, as well as reflected radiance, thus making atmospheric compensation essential to get knowledge of a target of interest. Despite its importance, this compensation has been largely overlooked due to its practical and modeling difficulty. In this paper, we present a lightweight set-based deep learning framework that takes multiple radiance measurements, collected at different standoff ranges, as input and jointly estimates transmittance, atmospheric path radiance, and a shared downwelling spectrum. We analyze the learned representation with a sparse autoencoder and observe that several latent features do activate on geographically coherent subsets of the test data despite the absence of location supervision. Experiments on a MODTRAN generated standoff LWIR dataset demonstrate low spectral distortion across all estimated products. The dataset and code is publicly available at: https://factral.co/SAE-LWIR/', 'score': 0, 'issue_id': 2397, 'pub_date': '2026-06-06', 'pub_date_card': {'ru': '6 июня', 'en': 'June 6', 'zh': '6月6日'}, 'hash': 'c734d3a738d03f5a', 'authors': ['Fabian Perez', 'Nicolas Quintero', 'Jeferson Acevedo', 'Hoover Rueda-Chacon'], 'affiliations': ['Universidad Industrial de Santander'], 'pdf_title_img': 'assets/pdf/title_img/2606.08324.jpg', 'data': {'categories': [], 'emoji': '🌡️', 'ru': {'title': 'Атмосферная компенсация гиперспектральных снимков через глубокое обучение', 'desc': 'В работе предложена лёгкая нейросетевая архитектура для компенсации влияния атмосферы при пассивной гиперспектральной съёмке в дальнем инфракрасном диапазоне. Модель принимает радиометрические измерения с различных расстояний и совместно оценивает пропускание атмосферы, яркость атмосферного пути и нисходящий спектр излучения. Авторы проводят анализ выученных представлений с помощью разреженного автокодировщика и обнаруживают, что отдельные признаки активируются на географически связанных подмножествах данных без явного геолокационного надзора. Экспериментальная валидация на синтетическом датасете MODTRAN показывает низкие спектральные искажения во всех оценённых параметрах.'}, 'en': {'title': 'Revolutionizing Atmospheric Compensation in LWIR Imaging', 'desc': 'This paper introduces a lightweight deep learning framework designed for atmospheric compensation in passive long-wave infrared hyperspectral imaging. The framework processes multiple radiance measurements from different distances to jointly estimate key atmospheric parameters like transmittance and path radiance. It utilizes a sparse autoencoder to analyze learned representations, revealing that certain features correspond to coherent geographic areas without needing location data. Experimental results show that the framework effectively minimizes spectral distortion in the estimated outputs, making it a valuable tool for remote sensing applications.'}, 'zh': {'title': '轻量级深度学习框架实现大气补偿', 'desc': '本文提出了一种轻量级深度学习框架，用于被动长波红外高光谱成像中的大气补偿。该框架能够从多范围辐射测量中联合估计透射率、大气路径辐射和下行光谱。尽管大气补偿在目标识别中至关重要，但由于实际操作和建模的困难，往往被忽视。实验结果表明，该方法在估计产品中具有低光谱失真，且数据集和代码已公开。'}}}, {'id': 'https://huggingface.co/papers/2605.29463', 'title': 'Honest Lying: Understanding Memory Confabulation in Reflexive Agents', 'url': 'https://huggingface.co/papers/2605.29463', 'abstract': 'Abstract Agents relying on self-generated reflections can store confident but incorrect task interpretations, leading to persistent errors despite environment resets, which is identified through a new metric called Reflection Repetition Rate.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reflexion-style agents rely on self-generated reflections as memory, implicitly assuming that agents can accurately diagnose their own failures. We show that this assumption can fail systematically: across ALFWorld and HumanEval, agents store confident but incorrect interpretations of the task and continue acting on them across trials, even though the environment resets to the correct task each time. We call this failure mode memory confabulation and introduce the Reflection Repetition Rate (RRR), a log-based metric that detects repeated reliance on incorrect reflective content. Using RRR, we identify 16 frozen environments in ALFWorld, where 0 of 121 reflections mention the correct target object, and 4 analogous cases in HumanEval. Our mitigation replaces open-ended self-diagnosis with programmatic extraction of trajectory-level failure signals, increasing correct object mention from 0% to 86%, reducing RRR from 0.64 to 0.10, and solving 3 of 16 frozen ALFWorld environments, suggesting that reflective memory can reinforce false beliefs rather than correct them.', 'score': 0, 'issue_id': 2397, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'f26b9b3b53c1317c', 'authors': ['Prakhar Dixit', 'Sadia Kamal', 'Tim Oates'], 'affiliations': ['Department of Computer Science, University of Maryland Baltimore County, Baltimore, MD, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.29463.jpg', 'data': {'categories': ['#benchmark', '#hallucinations', '#reasoning', '#interpretability', '#agents'], 'emoji': '🪞', 'ru': {'title': 'Отражение ложных убеждений: как память агентов усиливает ошибки вместо их исправления', 'desc': "Статья исследует проблему 'конфабуляции памяти' в агентах, которые используют самогенерируемые размышления для обучения. Авторы показывают, что такие агенты могут уверенно запоминать неправильные интерпретации задач и упорно следовать им даже после перезагрузки окружения, вместо корректировки своего поведения. Для обнаружения этого явления предложена новая метрика Reflection Repetition Rate (RRR), которая отслеживает повторное использование некорректного рефлективного контента в логах агента. Авторы предлагают решение, заменяющее открытую самодиагностику на программное извлечение сигналов отказа из траекторий, что значительно улучшает производительность и снижает конфабуляцию."}, 'en': {'title': 'Reflective Memory: A Double-Edged Sword in Task Interpretation', 'desc': 'This paper discusses how agents that rely on their own reflections can mistakenly hold onto incorrect interpretations of tasks, leading to ongoing errors even after the environment is reset. The authors introduce a new metric called Reflection Repetition Rate (RRR) to measure how often agents repeat these incorrect reflections. They demonstrate that agents can confidently misinterpret tasks, as shown in experiments with ALFWorld and HumanEval, where incorrect reflections persisted despite correct task resets. To address this issue, the authors propose a method that replaces self-diagnosis with systematic extraction of failure signals, significantly improving the accuracy of task interpretations.'}, 'zh': {'title': '反思记忆可能导致错误信念的强化', 'desc': '本文探讨了依赖自我生成反思的智能体在任务理解中可能出现的错误。研究发现，这些智能体可能会存储自信但错误的任务解释，即使在环境重置后也会持续出现错误。我们引入了一个新的指标——反思重复率（Reflection Repetition Rate），用于检测智能体对错误反思内容的重复依赖。通过改进方法，我们能够显著提高智能体的正确任务识别率，表明反思记忆可能会强化错误信念，而不是纠正它们。'}}}, {'id': 'https://huggingface.co/papers/2605.24047', 'title': 'EMMA: Extracting Multiple physical parameters from Multimodal Data', 'url': 'https://huggingface.co/papers/2605.24047', 'abstract': 'Abstract EMMA is a physics-informed multimodal framework that directly recovers dynamical parameters from raw video, audio, and image data using a Liquid Time-Constant network and physics-constrained loss.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce EMMA, a physics-informed multimodal framework that recovers all identifiable dynamical parameters of a system directly from raw video, audio, and image-based time-series observations. Unlike prior video-only approaches that struggle with occluded states, hidden actuation inputs, or assumptions about known initial conditions and coordinate frames, EMMA performs joint inference of explicit parameters, implicit dynamical components, and calibration invariants within a unified continuous-time model. EMMA leverages a Liquid Time-Constant (LTC) network to learn latent dynamics from heterogeneous modalities while a physics-constrained loss enforces consistency with the governing differential equations. A unified feature pipeline enables consistent alignment across video trajectories, acoustic signatures, and chart-derived measurements, allowing EMMA to estimate parameters under forced, implicit, and multivariate dynamics without requiring segmentation masks, differentiable rendering, or specialized sensors. Across 100+ scenarios including five standard dynamical benchmarks (75 Delfys videos), real-world rover and quadrotor systems with hidden inputs, and simulation-chart case studies spanning biological and chaotic systems, EMMA delivers robust multi-parameter recovery and significantly outperforms existing single-modality and equation-discovery baselines. Our results establish EMMA as a general, scalable solution for physics-consistent model extraction from opportunistic multimodal data. Code and data are available at: https://github.com/ImpactLabASU/EMMA-CVPR2026', 'score': 0, 'issue_id': 2397, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '7affb35d0c13b474', 'authors': ['Farhat Shaikh', 'Ayan Banerjee', 'Sandeep Gupta'], 'affiliations': ['IMPACT Lab, School of Computing & Augmented Intelligence (SCAI), Arizona State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.24047.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#video', '#audio', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Восстановление физических параметров систем из мультимодальных данных с использованием физических ограничений', 'desc': 'EMMA — это физически информированная мультимодальная система, которая восстанавливает динамические параметры физических систем напрямую из видео, аудио и изображений, используя сети с жидкостными временными константами. В отличие от предыдущих подходов, работающих только с видео, EMMA справляется с закрытыми состояниями и скрытыми входами, выполняя совместный вывод явных параметров и неявных динамических компонент в едином непрерывном временном пространстве. Система использует физически обоснованную функцию потерь, которая обеспечивает соответствие дифференциальным уравнениям, управляющим системой. На более чем 100 сценариях, включая реальные робототехнические системы и хаотические процессы, EMMA демонстрирует надёжное восстановление многих параметров и превосходит существующие методы анализа одной модальности.'}, 'en': {'title': 'EMMA: Unifying Multimodal Data for Physics-Informed Parameter Recovery', 'desc': 'EMMA is a new framework that uses multiple types of data, like video, audio, and images, to find important parameters of dynamic systems. It employs a Liquid Time-Constant network to learn from these different data sources while ensuring that the results align with physical laws through a physics-constrained loss function. This approach allows EMMA to work effectively even when some data is missing or hidden, unlike previous methods that relied on only video data. By testing on various scenarios, EMMA shows it can accurately recover parameters and outperform existing methods that focus on single types of data.'}, 'zh': {'title': 'EMMA：多模态数据中的物理一致性模型提取', 'desc': 'EMMA是一个物理信息驱动的多模态框架，能够直接从原始视频、音频和图像数据中恢复动态参数。与以往仅依赖视频的方法不同，EMMA能够处理被遮挡状态和隐藏输入的情况，并在统一的连续时间模型中进行联合推断。它利用液态时间常数网络学习来自不同模态的潜在动态，同时通过物理约束损失确保与控制微分方程的一致性。EMMA在多个场景中表现出色，显著优于现有的单模态和方程发现基线，展示了其作为物理一致模型提取的通用解决方案的潜力。'}}}];

            window.history.pushState({}, '', newUrl);

            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            if (isDarkMode) {
                document.body.classList.remove('light-theme');

            res.sort();

                button.classList.remove('active');

            filterAndRenderArticles();

        function sortArticles() {

            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-09 06:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-09 06:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
