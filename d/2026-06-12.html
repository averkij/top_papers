    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.13681', 'title': 'EvoArena: Tracking Memory Evolution for Robust LLM Agents in Dynamic Environments', 'url': 'https://huggingface.co/papers/2606.13681', 'abstract': 'Abstract EvoArena benchmark and EvoMem memory paradigm address the challenge of dynamic environments in LLM agents by modeling progressive updates and structured memory evolution, showing improved performance on evolving tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language model (LLM) agents have achieved strong performance on a wide range of benchmarks, yet most evaluations assume static environments. In contrast, real-world deployment is inherently dynamic, requiring agents to continually align their knowledge, skills, and behavior with changing environments and updated task conditions. To address this gap, we introduce EvoArena, a benchmark suite that models environment changes as sequences of progressive updates across terminal, software, and social domains. We further propose EvoMem, a patch-based memory paradigm that records memory evolution as structured update histories, enabling agents to reason about environmental evolution through changes in their memory. Experiments show that current agents struggle on EvoArena, achieving an average accuracy of 39.6% across evolving terminal, software, and social-preference domains. EvoMem consistently improves performance, yielding an average gain of 1.5% on EvoArena and also improving standard benchmarks such as GAIA and LoCoMo by 6.1% and 4.8%. Beyond individual tasks, EvoMem further improves chain-level accuracy by 3.7% on EvoArena, where success requires completing a consecutive sequence of related evolutionary subtasks. Mechanistic analysis shows that EvoMem improves evidence capture in the memory, indicating better preservation of complete evolving environment states. Our results highlight the importance of modeling evolution in both evaluation and memory for reliable agent deployment.', 'score': 70, 'issue_id': 2417, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '21a8458402c26915', 'authors': ['Jundong Xu', 'Qingchuan Li', 'Jiaying Wu', 'Yihuai Lan', 'Shuyue Stella Li', 'Huichi Zhou', 'Bowen Jiang', 'Lei Wang', 'Jun Wang', 'Anh Tuan Luu', 'Caiming Xiong', 'Hae Won Park', 'Bryan Hooi', 'Zhiyuan Hu'], 'affiliations': ['Massachusetts Institute of Technology', 'Nanyang Technological University', 'National University of Singapore', 'Recursive', 'Singapore Management University', 'University College London', 'University of Pennsylvania', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.13681.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🧬', 'ru': {'title': 'Память, которая растет вместе с миром: агенты для динамических сред', 'desc': 'В статье представлены EvoArena — бенчмарк для оценки LLM агентов в динамических окружениях, и EvoMem — парадигма структурированной памяти, которая отслеживает эволюцию среды через историю обновлений. Авторы показывают, что современные агенты плохо справляются с эволюционирующими задачами (39.6% точность), но предложенный подход с памятью на основе патчей улучшает производительность на 1.5-6.1% в зависимости от задачи. EvoMem позволяет агентам лучше рассуждать об изменениях окружения, сохраняя полное состояние эволюционирующей среды в памяти. Исследование демонстрирует критическую важность моделирования эволюции как при оценке агентов, так и при проектировании их систем памяти для надежного развертывания.'}, 'en': {'title': 'Adapting LLMs to Evolving Environments with EvoArena and EvoMem', 'desc': 'The paper introduces EvoArena, a benchmark designed to evaluate large language model (LLM) agents in dynamic environments, where tasks evolve over time. It also presents EvoMem, a memory paradigm that tracks changes in memory as structured updates, allowing agents to adapt to these evolving conditions. Experiments reveal that traditional LLM agents perform poorly on EvoArena, but incorporating EvoMem leads to improved accuracy across various tasks. This research emphasizes the necessity of considering environmental evolution in both the assessment and memory management of LLM agents for effective real-world applications.'}, 'zh': {'title': '动态环境中的智能代理演变', 'desc': '本论文提出了EvoArena基准和EvoMem记忆范式，以应对大语言模型（LLM）代理在动态环境中的挑战。EvoArena通过将环境变化建模为逐步更新的序列，帮助代理在不断变化的任务条件下保持知识和技能的对齐。EvoMem则记录记忆演变的结构化更新历史，使代理能够通过记忆中的变化推理环境的演变。实验结果表明，EvoMem显著提高了代理在EvoArena上的表现，强调了在评估和记忆中建模演变的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.13679', 'title': 'InterleaveThinker: Reinforcing Agentic Interleaved Generation', 'url': 'https://huggingface.co/papers/2606.13679', 'abstract': "Abstract InterleaveThinker enables interleaved generation capabilities for image generators through a multi-agent pipeline with planner and critic agents, achieving performance comparable to state-of-the-art models while enhancing reasoning benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent image generators have demonstrated impressive photorealism and instruction-following capabilities in single-image generation and editing. However, constrained by their architectures, they cannot achieve interleaved generation (text-image sequence), which has crucial applications in visual narratives, guidance, and embodied manipulation. Even the latest open-source Unified Multimodal Models (UMMs) exhibit limited performance in this regard. In this paper, we introduce InterleaveThinker, the first multi-agent pipeline designed to endow any existing image generator with interleaved generation capabilities. Specifically, we employ a planner agent to organize the image-text input sequence, instructing the image generator on the required execution at each step. Subsequently, we introduce a critic agent to evaluate the generator's outputs, identify samples that deviate from the planned instructions, and refine the instructions for regeneration. To implement this pipeline, we construct the Interleave-Planner-SFT-80k and Interleave-Critic-SFT-112k to perform a format cold-start. Then we develop Interleave-Critic-RL-13k to reinforce the step-wise instruction correction capability within a generation trajectory using GRPO. Since a single interleaved generation trajectory may involve over 25 generator calls, optimizing the entire trajectory is computationally impractical. Therefore, we propose accuracy reward and step-wise reward, allowing single-step RL to effectively guide the entire generation trajectory. The results show that InterleaveThinker improves performance across various image generators. On interleaved generation benchmarks, it achieves performance comparable to Nano Banana and GPT-5. Surprisingly, it also significantly enhances the base model on reasoning-based benchmarks; for example, on 4-step FLUX.2-klein, we observe substantial gains on WISE and RISE.", 'score': 67, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '1fcc95a0ce543a8f', 'authors': ['Dian Zheng', 'Harry Lee', 'Manyuan Zhang', 'Kaituo Feng', 'Zoey Guo', 'Ray Zhang', 'Hongsheng Li'], 'affiliations': ['CUHK IMIXR', 'CUHK MMLab', 'Meituan'], 'pdf_title_img': 'assets/pdf/title_img/2606.13679.jpg', 'data': {'categories': ['#training', '#reasoning', '#rl', '#multimodal', '#benchmark', '#dataset', '#optimization', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Чередующееся поколение изображений через многоагентное взаимодействие планировщика и критика', 'desc': 'InterleaveThinker — это многоагентный конвейер, который добавляет возможность чередующегося поколения (последовательности текста и изображений) к существующим генераторам изображений. Система использует агента-планировщика для организации последовательности входных данных и агента-критика для оценки выходов и уточнения инструкций. Для обучения применяются два набора данных с инструкциями (SFT) и укрепление с помощью GRPO с новыми метриками вознаграждения, позволяющими эффективно оптимизировать всю траекторию генерации. Результаты демонстрируют, что InterleaveThinker достигает производительности, сравнимой с современными моделями, и улучшает показатели на бенчмарках рассуждения.'}, 'en': {'title': 'InterleaveThinker: Revolutionizing Image Generation with Multi-Agent Interleaving', 'desc': 'InterleaveThinker is a novel multi-agent system that enhances image generation by enabling interleaved generation, which combines text and image outputs in a sequence. It utilizes a planner agent to structure the input sequence and guide the image generator, while a critic agent evaluates the outputs and refines instructions for better results. This approach allows existing image generators to perform better in tasks requiring visual narratives and complex interactions. The system demonstrates competitive performance against leading models and shows significant improvements in reasoning tasks, indicating its versatility and effectiveness in various applications.'}, 'zh': {'title': '交错生成，图像生成的新突破', 'desc': 'InterleaveThinker 是一种多代理管道，能够为图像生成器提供交错生成能力。通过使用规划者和评论者代理，它在生成图像时能够更好地处理文本与图像的顺序关系。该方法不仅提升了现有图像生成模型的性能，还在推理基准测试中取得了显著进展。实验结果表明，InterleaveThinker 在交错生成基准上表现出色，达到了与最先进模型相当的水平。'}}}, {'id': 'https://huggingface.co/papers/2606.13673', 'title': 'SpatialClaw: Rethinking Action Interface for Agentic Spatial Reasoning', 'url': 'https://huggingface.co/papers/2606.13673', 'abstract': "Abstract SpatialClaw is a training-free framework that uses code as an action interface to enable flexible, stateful spatial reasoning in vision-language models, achieving superior performance across diverse 3D/4D spatial reasoning tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spatial reasoning, the ability to determine where objects are, how they relate, and how they move in 3D, remains a fundamental challenge for vision-language models (VLMs). Tool-augmented agents attempt to address this by augmenting VLMs with specialist perception modules, yet their effectiveness is bounded by the action interface through which those tools are invoked. In this work, we study how the design of this interface shapes the agent's capacity for open-ended spatial reasoning. Existing spatial agents either employ single-pass code execution, which commits to a full analysis strategy before any intermediate result is observed, or rely on a structured tool-call interface that often offers less flexibility for freely composing operations or tailoring the analysis to each task. Both designs offer limited flexibility for open-ended, complex 3D/4D spatial reasoning. We therefore propose SpatialClaw, a training-free framework for spatial reasoning that adopts code as the action interface. SpatialClaw maintains a stateful Python kernel pre-loaded with input frames and a suite of perception and geometry primitives, letting a VLM-backed agent write one executable cell per step conditioned on all prior outputs, enabling the agent to flexibly compose and manipulate perception results and adapt its analysis to both intermediate text and visual observations and the demands of each problem. Evaluated across 20 spatial reasoning benchmarks spanning a broad range of static and dynamic 3D/4D spatial reasoning tasks, SpatialClaw achieves 59.9% average accuracy, outperforming the recent spatial agent by +11.2 points, with consistent gains across six VLM backbones from two model families without any benchmark- or model-specific adaptation.", 'score': 56, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'abff338971caab5d', 'authors': ['Seokju Cho', 'Ryo Hachiuma', 'Abhishek Badki', 'Hang Su', 'Byung-Kwan Lee', 'Chan Hee Song', 'Sifei Liu', 'Subhashree Radhakrishnan', 'Seungryong Kim', 'Yu-Chiang Frank Wang', 'Min-Hung Chen'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.13673.jpg', 'data': {'categories': ['#reasoning', '#3d', '#cv', '#multimodal', '#benchmark', '#video', '#agents'], 'emoji': '🧭', 'ru': {'title': 'Код как рассуждение о пространстве: гибкий агент для 3D анализа', 'desc': 'SpatialClaw — это инновационный фреймворк, который использует код в качестве интерфейса для действий, позволяя видео-языковым моделям гибко решать задачи пространственного рассуждения в 3D и 4D пространстве. В отличие от существующих подходов, которые либо выполняют весь анализ за один раз, либо ограничены структурированным интерфейсом, SpatialClaw поддерживает состояние через Python ядро с набором инструментов восприятия и геометрических примитивов. Агент может писать и выполнять код пошагово, адаптируя стратегию анализа на основе промежуточных результатов, что обеспечивает значительно большую гибкость при работе со сложными задачами. Модель достигла среднюю точность 59,9% на 20 бенчмарках пространственного рассуждения, превзойдя предыдущие методы на 11,2 процентных пункта, демонстрируя универсальность без специализации под конкретные наборы данных.'}, 'en': {'title': 'Empowering Vision-Language Models with Flexible Spatial Reasoning', 'desc': 'SpatialClaw is a novel framework designed for spatial reasoning in vision-language models (VLMs) that does not require training. It utilizes code as an action interface, allowing for flexible and stateful interactions with spatial data. This approach enables agents to dynamically compose and manipulate perception results based on previous outputs, enhancing their ability to tackle complex 3D/4D reasoning tasks. The framework has demonstrated superior performance across various benchmarks, achieving a significant accuracy improvement over existing spatial agents.'}, 'zh': {'title': 'SpatialClaw：灵活的空间推理框架', 'desc': 'SpatialClaw 是一个无训练的框架，利用代码作为动作接口，使视觉语言模型能够灵活地进行状态感知的空间推理。空间推理是指确定物体的位置、关系和运动方式的能力，这对视觉语言模型来说仍然是一个基本挑战。现有的空间代理通常采用单次代码执行或结构化工具调用接口，限制了其在复杂空间推理中的灵活性。SpatialClaw 通过维护一个状态化的 Python 内核，允许代理根据先前的输出灵活地组合和操作感知结果，从而在多种空间推理任务中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2606.13473', 'title': 'MaxProof: Scaling Mathematical Proof with Generative-Verifier RL and Population-Level Test-Time Scaling', 'url': 'https://huggingface.co/papers/2606.13473', 'abstract': 'Abstract MaxProof is a test-time scaling framework that enhances mathematical proof generation by combining multiple proof-oriented capabilities and using population-level search with tournament selection to achieve competitive performance on high-level mathematical competitions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present MaxProof, a population-level test-time scaling framework for competition-level mathematical proof in the MiniMax-M3 series. M3 first trains three proof-oriented capabilities -- proof generation, proof verification, and critique-conditioned proof repair -- using a defense-in-depth generative verifier engineered for low false-positive rate. These capabilities are merged into a single released M3 model. At test time, MaxProof treats the model as a generator, verifier, refiner, and ranker, searches over a population of candidate proofs, and returns one final proof through tournament selection. With MaxProof test-time scaling, the M3 model reaches 35/42 on IMO 2025 and 36/42 on USAMO 2026, exceeding the human gold-medal threshold on both.', 'score': 50, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '0c741d689af9ac4a', 'authors': ['Jiacheng Chen', 'Xinyu Zhang', 'Shunkai Zhang', 'Yanmohan Wang', 'Lin Li', 'Tiancheng Qin', 'Qin Wang', 'Zhengmao Zhu', 'Tianle Li', 'Jingyang Li', 'Zehan Li', 'Binyang Jiang', 'Jin Zhu', 'Han Ding', 'Fei Yu', 'Chenyu Du', 'Zijian Song', 'Jiayuan Song', 'Zhi Zhang', 'Yunan Huang', 'Weiyu Cheng', 'Pengyu Zhao', 'Yu Cheng'], 'affiliations': ['Fudan University', 'MiniMax', 'Peking University', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13473.jpg', 'data': {'categories': ['#math', '#training', '#benchmark'], 'emoji': '🏆', 'ru': {'title': 'Турнирный отбор доказательств через популяционный поиск на этапе тестирования', 'desc': 'В работе представлен MaxProof — фреймворк масштабирования во время тестирования, который улучшает генерацию математических доказательств путём объединения нескольких специализированных возможностей: генерации доказательств, их верификации и критическо-обусловленного восстановления. Модель M3 обучается с использованием защиты в глубину на основе генеративного верификатора с низким уровнем ложных срабатываний. Во время тестирования MaxProof применяет популяционный поиск с турнирной селекцией для выбора наилучшего доказательства из множества кандидатов. Достигнутые результаты превышают порог золотой медали на олимпиадах IMO 2025 и USAMO 2026.'}, 'en': {'title': 'MaxProof: Elevating Mathematical Proofs with Competitive Intelligence', 'desc': 'MaxProof is a framework designed to improve the generation of mathematical proofs during testing. It integrates three key capabilities: generating proofs, verifying them, and repairing them based on critiques. By employing a population-level search strategy with tournament selection, MaxProof efficiently identifies the best proof from a set of candidates. This approach has led to impressive results in high-level mathematical competitions, surpassing human performance benchmarks.'}, 'zh': {'title': 'MaxProof：提升数学证明生成的竞争力', 'desc': 'MaxProof 是一个测试时扩展框架，旨在通过结合多种证明能力来增强数学证明生成。它使用种群级搜索和锦标赛选择方法，在高水平数学竞赛中实现竞争力表现。M3 模型首先训练了三种与证明相关的能力：证明生成、证明验证和基于批评的证明修复。测试时，MaxProof 将模型视为生成器、验证器、精炼器和排名器，搜索候选证明并通过锦标赛选择返回最终证明。'}}}, {'id': 'https://huggingface.co/papers/2606.12087', 'title': 'FORT-Searcher: Synthesizing Shortcut-Resistant Search Tasks for Training Deep Search Agents', 'url': 'https://huggingface.co/papers/2606.12087', 'abstract': 'Abstract A framework for creating shortcut-resistant training data for deep search agents by identifying and mitigating four shortcut risks in data synthesis processes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training deep search agents requires verifiable questions whose answers remain unavailable until sufficient evidence has been acquired through search. Existing synthesis methods often increase apparent difficulty by enriching graph structures, but structural complexity alone does not guarantee realized search difficulty: the intended search process can collapse through a cheaper identifying route. We formalize this gap with a shortcut-aware difficulty framework and identify four actionable shortcut risks: evidence co-coverage, single-clue selectivity, exposed constants, and prior-knowledge binding. To diagnose their realized effects, we use trajectory signatures including solving cost, answer hit time, and prior-shortcut rate. Guided by this framework, we introduce FORT, a Framework of Shortcut-Resistant Training-Data Synthesis. FORT constructs shortcut-resistant training data by controlling shortcut risks across entity selection, evidence graph construction, question formulation, and adversarial refinement. Experiments show that FORT induces longer pre-answer search and fewer shortcut patterns than existing open-source deep search datasets. Using the resulting trajectories, we train FORT-Searcher with supervised fine-tuning (SFT) only, and it achieves the best overall performance among comparable-size open-source search agents on challenging deep search benchmarks. Relevant resources will be made available at https://github.com/RUCAIBox/FORT-Searcher.', 'score': 45, 'issue_id': 2416, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'bd05e1a262687c1c', 'authors': ['Jia Deng', 'Yimeng Chen', 'Xiaoqing Xiang', 'Ziyang Zeng', 'Shuo Tang', 'Wayne Xin Zhao', 'Feng Chang', 'Chuan Hao', 'Yuan Wei', 'Ran Tao', 'Bryan Dai', 'Ji-Rong Wen'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'IQuest Research', 'KAUST', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.12087.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#graphs'], 'emoji': '🛣️', 'ru': {'title': 'Блокируем ярлычки: устойчивый синтез данных для глубокого поиска', 'desc': 'В статье предлагается фреймворк FORT для создания обучающих данных, устойчивых к ярлычкам (shortcuts), при обучении глубоких агентов поиска. Авторы формализуют проблему того, что сложные графовые структуры не гарантируют реальную сложность поиска, так как модель может найти более дешёвый путь к ответу вместо выполнения предполагаемого поиска. Они выявляют четыре типа рисков ярлычков и предлагают методы их контроля на этапах выбора сущностей, построения графов доказательств, формулирования вопросов и состязательной доработки. Эксперименты показывают, что FORT создаёт датасеты, где агентам требуется более глубокий поиск, и обученный на них поисковик достигает лучших результатов на сложных бенчмарках.'}, 'en': {'title': 'Building Smarter Search Agents with Shortcut-Resistant Data', 'desc': 'This paper presents a new framework called FORT, designed to create training data for deep search agents that avoids common shortcuts that can lead to misleading results. It identifies four specific risks that can cause shortcuts in data synthesis, such as relying on single clues or prior knowledge. By analyzing search trajectories, the framework helps ensure that the training data promotes genuine search difficulty rather than exploiting easier paths. The experiments demonstrate that FORT leads to improved search performance and longer search times, making it a valuable tool for developing more effective search agents.'}, 'zh': {'title': '构建抗捷径训练数据的创新框架', 'desc': '本文提出了一种创建抗捷径训练数据的框架，旨在为深度搜索代理识别和减轻四种捷径风险。通过引入捷径意识的难度框架，作者识别了证据共覆盖、单线索选择性、暴露常量和先验知识绑定等四种可操作的捷径风险。该框架通过控制实体选择、证据图构建、问题制定和对抗性优化等过程，构建抗捷径的训练数据。实验结果表明，使用该框架生成的数据在搜索过程中表现出更长的前答案搜索时间和更少的捷径模式。'}}}, {'id': 'https://huggingface.co/papers/2606.13392', 'title': 'MiniMax Sparse Attention', 'url': 'https://huggingface.co/papers/2606.13392', 'abstract': 'Abstract MiniMax Sparse Attention enables efficient processing of ultra-long contexts in large language models through blockwise sparsity and optimized GPU execution, achieving significant speedups while maintaining performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Ultra-long-context capability is becoming indispensable for frontier LLMs: agentic workflows, repository-scale code reasoning, and persistent memory all require the model to jointly attend over hundreds of thousands to millions of tokens, yet the quadratic cost of softmax attention makes this untenable at deployment scale. We introduce MiniMax Sparse Attention (MSA), a blockwise sparse attention built upon Grouped Query Attention (GQA). A lightweight Index Branch scores key-value blocks and independently selects a Top-k subset for each GQA group, enabling group-specific sparse retrieval while maintaining efficient block-level execution; the Main Branch then performs exact block-sparse attention over only the selected blocks. Designed around a principle of simplicity and scalability, MSA is deliberately streamlined, making it straightforward to deploy efficiently across a broad range of GPUs. To translate sparsity into practical speedups, we co-design MSA with a GPU execution path that uses exp-free Top-k selection and KV-outer sparse attention to improve tensor-core utilization under block-granular access. On a 109B-parameter model with native multimodal training, MSA performs on par with GQA while reducing per-token attention compute by 28.4x at 1M context. Paired with our co-designed kernel, MSA achieves 14.2x prefill and 7.6x decoding wall-clock speedups on H800. Our inference kernel is available at: https://github.com/MiniMax-AI/MSA. A production-grade natively multimodal model powered by MSA has been publicly released at: https://huggingface.co/MiniMaxAI/MiniMax-M3.', 'score': 41, 'issue_id': 2417, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'cd64fc31db67862f', 'authors': ['Xunhao Lai', 'Weiqi Xu', 'Yufeng Yang', 'Qiaorui Chen', 'Yang Xu', 'Lunbin Zeng', 'Xiaolong Li', 'Haohai Sun', 'Haichao Zhu', 'Vito Zhang', 'Pengyu Zhao'], 'affiliations': ['Huazhong University of Science and Technology', 'MiniMax', 'NVIDIA', 'Peking University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13392.jpg', 'data': {'categories': ['#architecture', '#inference', '#open_source', '#optimization', '#multimodal', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Блочная разреженность для молниеносной обработки миллионов токенов', 'desc': 'В статье представляется MiniMax Sparse Attention (MSA) — эффективный метод обработки сверхдлинных контекстов в больших языковых моделях через блочную разреженность внимания. Метод основан на Grouped Query Attention и использует лёгкий Index Branch для выбора Top-k наиболее релевантных блоков ключей и значений для каждой группы, что позволяет сохранить производительность модели. Авторы разработали оптимизированный GPU kernel с использованием экспоненциально-свободного Top-k отбора и KV-outer sparse attention для максимального использования тензорных ядер. На модели с 109 миллиардами параметров MSA достигает 28.4x сокращения вычислений внимания на контексте в 1 миллион токенов и ускорения 14.2x на этапе prefill и 7.6x на этапе декодирования на GPU H800.'}, 'en': {'title': 'Efficient Long-Context Processing with MiniMax Sparse Attention', 'desc': "MiniMax Sparse Attention (MSA) is a new method designed to improve the efficiency of large language models (LLMs) when processing very long texts. It uses a blockwise sparse attention mechanism that allows the model to focus on only the most relevant parts of the input, significantly reducing the computational cost associated with traditional attention methods. By implementing a lightweight Index Branch for selecting key-value blocks and a Main Branch for executing attention on these blocks, MSA achieves faster processing speeds while maintaining high performance. This approach not only enhances the model's ability to handle ultra-long contexts but also optimizes GPU usage, resulting in substantial speed improvements during inference."}, 'zh': {'title': '高效处理超长上下文的稀疏注意力', 'desc': 'MiniMax稀疏注意力（MSA）通过块状稀疏性和优化的GPU执行，能够高效处理超长上下文，显著提高速度同时保持性能。该方法基于分组查询注意力（GQA），采用轻量级索引分支对关键值块进行评分，并为每个GQA组独立选择Top-k子集，实现组特定的稀疏检索。MSA设计简洁且可扩展，便于在多种GPU上高效部署，并通过与GPU执行路径的共同设计，提升了张量核心的利用率。最终，MSA在109B参数模型上实现了每个token计算减少28.4倍的效果，同时在H800上实现了14.2倍的预填充和7.6倍的解码速度提升。'}}}, {'id': 'https://huggingface.co/papers/2606.13578', 'title': 'LabVLA: Grounding Vision-Language-Action Models in Scientific Laboratories', 'url': 'https://huggingface.co/papers/2606.13578', 'abstract': 'Abstract LabVLA, a vision-language-action model trained with a two-stage approach combining action token pretraining and flow matching, demonstrates superior performance on laboratory automation tasks through simulated data generation and robot-specific learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific laboratories increasingly rely on AI systems to reason about experiments, but the physical act of doing science remains largely outside their reach. AI can help read literature, generate hypotheses, and plan protocols, yet the execution of those protocols at the bench still requires a human operator. Vision-Language-Action (VLA) models provide one possible interface between written protocols and robot execution, but existing policies are trained mostly on household and tabletop demonstrations and rarely encounter the instruments, transparent liquids, or fixed protocol workflows found in scientific laboratories. Closing this gap requires both laboratory-specific supervision and a unified learning framework that can accommodate the diverse robot embodiments used to execute experimental protocols. We therefore identify data and embodiment as central bottlenecks alongside model design. To address the data side, we build RoboGenesis, a simulation-based workflow and data engine that composes configured laboratory workflows from atomic skills, validates and filters rollouts, and exports structured demonstrations across supported robot profiles. On the policy side, we present LabVLA, trained with a two-stage recipe: FAST action token pretraining first makes the Qwen3-VL-4B-Instruct backbone action aware before any continuous control is learned, and flow matching posttraining then attaches a DiT action expert under knowledge insulation. On the LabUtopia benchmark, LabVLA achieves the highest average success rate among all evaluated baselines under both in-distribution and out-of-distribution settings.', 'score': 38, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '7c980d7e78cd443e', 'authors': ['Baochang Ren', 'Xinjie Liu', 'Xi Chen', 'Yanshuo Liu', 'Chenxi Li', 'Daqi Gao', 'Zeqin Su', 'Jintao Xing', 'Zirui Xue', 'Rui Li', 'Xiangyu Zhao', 'Shuofei Qiao', 'Minting Pan', 'Wangmeng Zuo', 'Lei Bai', 'Dongzhan Zhou', 'Ningyu Zhang', 'Huajun Chen'], 'affiliations': ['Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.13578.jpg', 'data': {'categories': ['#architecture', '#synthetic', '#training', '#cv', '#science', '#multimodal', '#benchmark', '#dataset', '#open_source', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Робототехника для науки: обучение мультимодальных моделей на синтетических лабораторных данных', 'desc': 'LabVLA — это модель vision-language-action, специально разработанная для автоматизации лабораторных работ. Модель обучается двухэтапным методом: сначала происходит предварительное обучение токенов действий (action token pretraining), затем применяется flow matching для подстройки диффузионной модели. Для решения проблемы нехватки лабораторных данных авторы создали RoboGenesis — симуляционный конвейер, который генерирует синтетические демонстрации из атомарных навыков и адаптирует их под разные робототехнические платформы. LabVLA демонстрирует лучшую производительность на бенчмарке LabUtopia как при распределении внутри обучающей выборки, так и при выходе за её пределы.'}, 'en': {'title': 'Bridging Science and Robotics with LabVLA', 'desc': 'LabVLA is a vision-language-action model designed to improve laboratory automation by integrating action token pretraining and flow matching techniques. It addresses the challenge of executing scientific protocols by bridging the gap between written instructions and robotic execution, which has been limited by existing models trained on non-laboratory tasks. The model utilizes a simulation-based data engine called RoboGenesis to generate and validate structured demonstrations tailored for various robotic systems. As a result, LabVLA outperforms other models on the LabUtopia benchmark, showcasing its effectiveness in both familiar and novel laboratory environments.'}, 'zh': {'title': 'LabVLA：连接实验室与机器人执行的桥梁', 'desc': 'LabVLA是一种视觉-语言-动作模型，通过结合动作标记预训练和流匹配的两阶段方法，展示了在实验室自动化任务中的优越性能。该模型利用模拟数据生成和特定于机器人的学习，解决了科学实验中AI与实际操作之间的差距。为此，研究者们构建了RoboGenesis，一个基于模拟的工作流和数据引擎，能够生成和验证实验室工作流程。LabVLA在LabUtopia基准测试中，在所有评估的基线中实现了最高的平均成功率，显示了其在科学实验中的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.09426', 'title': 'WeaveBench: A Long-Horizon, Real-World Benchmark for Computer-Use Agents with Hybrid Interfaces', 'url': 'https://huggingface.co/papers/2606.09426', 'abstract': 'Abstract WeaveBench presents a comprehensive benchmark for evaluating computer-use agents across multiple interfaces, revealing significant challenges in long-horizon task orchestration and highlighting the limitations of traditional performance assessment methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Computer-use agents (CUAs) increasingly operate in runtimes that combine visual desktop control, command-line execution, code editing, browsers, and external tools. Existing benchmarks, however, often evaluate these interfaces as separable capabilities, leaving long-horizon cross-interface orchestration under-tested. Thus, we introduce WeaveBench, a long-horizon hybrid-interface benchmark with 114 tasks across 8 real-world work domains, grounded in real user requests and publicly verifiable artifacts. Each task requires agents to combine GUI observations/actions with CLI/code operations within a single trajectory. We evaluate these tasks on a real Ubuntu desktop inside deployed CLI-agent runtimes, augmented with a minimal desktop-control plugin. We also propose a companion trajectory-aware judge that inspects deliverables, files, screenshots, logs, and action traces, while detecting shortcut behaviors such as fabricated visual evidence or hard-coded metrics. Across frontier model-runtime pairings, the best PassRate reaches only 41.2%, showing the benchmark remains far from saturated. The trajectory-aware judge further reveals that outcome-only grading substantially overestimates agent performance. Overall, WeaveBench exposes a critical gap in CUA evaluation and provides an effective testbed to measure whether agents can orchestrate GUI, CLI, and code operations across long-horizon real-world tasks.', 'score': 31, 'issue_id': 2416, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '1d17973f316a0338', 'authors': ['Wanli Li', 'Bowen Zhou', 'Yunyao Yu', 'Zhou Xu', 'Yifan Yang', 'Dongsheng Li', 'Caihua Shan'], 'affiliations': ['Microsoft Research Asia', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09426.jpg', 'data': {'categories': ['#cv', '#benchmark', '#dataset', '#agents'], 'emoji': '🕸️', 'ru': {'title': 'От изолированных навыков к оркестрации: эволюция оценки агентов компьютерного управления', 'desc': 'WeaveBench представляет комплексный бенчмарк для оценки агентов компьютерного управления, которые взаимодействуют с несколькими интерфейсами одновременно. В отличие от существующих методов, бенчмарк фокусируется на долгогоризонтных задачах, требующих координации между графическим интерфейсом, командной строкой и операциями с кодом в едином траектории агента. Исследователи предложили специализированный оценщик, осведомленный о траектории выполнения, который анализирует артефакты и выявляет манипуляции вроде поддельных визуальных доказательств. Результаты показывают, что даже лучшие модели достигают только 41,2% успешности, указывая на значительный разрыв между текущими возможностями агентов и требуемым уровнем производительности.'}, 'en': {'title': 'WeaveBench: Bridging the Gap in CUA Evaluation', 'desc': 'WeaveBench is a new benchmark designed to evaluate computer-use agents (CUAs) that perform tasks across different interfaces like graphical user interfaces (GUIs) and command-line interfaces (CLIs). It addresses the challenge of long-horizon task orchestration, where agents must seamlessly integrate various operations over extended periods. The benchmark includes 114 tasks from real-world scenarios, requiring agents to combine visual and code-based actions in a single workflow. Additionally, a trajectory-aware judging system is introduced to provide a more accurate assessment of agent performance, revealing that traditional evaluation methods may overestimate their capabilities.'}, 'zh': {'title': 'WeaveBench：评估计算机使用代理的新基准', 'desc': 'WeaveBench是一个全面的基准测试，用于评估计算机使用代理在多个接口上的表现。它揭示了在长时间任务协调中存在的重大挑战，并强调了传统性能评估方法的局限性。该基准测试包含114个任务，涵盖8个真实工作领域，要求代理在单一轨迹中结合图形用户界面（GUI）和命令行界面（CLI）的操作。WeaveBench为评估计算机使用代理的能力提供了一个有效的平台，特别是在长时间的真实世界任务中。'}}}, {'id': 'https://huggingface.co/papers/2606.10768', 'title': 'N-GRPO: Embedding-Level Neighbor Mixing for Enhanced Policy Optimization', 'url': 'https://huggingface.co/papers/2606.10768', 'abstract': 'Abstract N-GRPO, a novel exploration strategy within GRPO framework, enhances mathematical reasoning in large language models through semantic neighbor mixing that maintains semantic consistency while injecting diversity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The success of Large Language Models in mathematical reasoning relies heavily on the generation of diverse and valid solution paths during the rollout phase. However, current rollout techniques face a fundamental trade-off: token-level sampling often yields redundant trajectories that differ only in rephrasing, while embedding-level methods utilizing random noise frequently disrupt semantic consistency. To resolve this, we introduce N-GRPO, a novel exploration strategy integrated into the Group Relative Policy Optimization (GRPO) framework. Rather than relying on token-level sampling or native embedding-level noise, our approach leverages Semantic Neighbor Mixing. This mechanism dynamically constructs input representations by mixing the embeddings of an anchor token and its nearest semantic neighbors, thereby injecting diversity while strictly adhering to the local semantic manifold. Experimental evaluations on the DeepSeek-R1-Distill-Qwen models across different sizes show that N-GRPO not only achieves consistent improvements over strong baselines on math reasoning benchmarks but also exhibits robust generalization capabilities on out-of-distribution tasks.', 'score': 15, 'issue_id': 2416, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': 'e4b1b4b6a880cf5b', 'authors': ['Xukun Zhu', 'Hang Yu', 'Peng Di', 'Linchao Zhu'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.10768.jpg', 'data': {'categories': ['#math', '#training', '#rlhf'], 'emoji': '🧮', 'ru': {'title': 'Разнообразие через семантическое соседство: N-GRPO для математического рассуждения', 'desc': 'В этой работе предложен N-GRPO — новый метод исследования пространства решений для улучшения математического рассуждения в больших языковых моделях. Авторы решают проблему баланса между разнообразием генерируемых путей решения и сохранением семантической согласованности, используя технику семантического микширования соседних эмбеддингов. Метод интегрирован в фреймворк Group Relative Policy Optimization и динамически конструирует входные представления путём смешивания эмбеддингов якорного токена с его ближайшими семантическими соседями. Экспериментальные результаты на моделях DeepSeek-R1-Distill-Qwen демонстрируют улучшение производительности на бенчмарках математического рассуждения и хорошую обобщаемость на out-of-distribution задачах.'}, 'en': {'title': 'Enhancing Math Reasoning with Semantic Neighbor Mixing', 'desc': 'The paper introduces N-GRPO, a new exploration strategy designed to improve mathematical reasoning in large language models. It operates within the Group Relative Policy Optimization (GRPO) framework and uses a technique called Semantic Neighbor Mixing to enhance diversity in solution paths while preserving semantic consistency. This approach avoids the pitfalls of traditional token-level sampling and embedding-level noise, which can lead to redundancy or loss of meaning. Experimental results demonstrate that N-GRPO significantly outperforms existing methods on math reasoning tasks and shows strong generalization on unseen data.'}, 'zh': {'title': 'N-GRPO：提升数学推理的多样性与一致性', 'desc': 'N-GRPO是一种新颖的探索策略，旨在提升大型语言模型在数学推理方面的表现。它通过语义邻居混合的方法，在保持语义一致性的同时引入多样性，从而生成有效的解决路径。与传统的基于token的采样和嵌入级别的随机噪声方法相比，N-GRPO能够更好地构建输入表示，确保语义的连贯性。实验结果表明，N-GRPO在数学推理基准测试中表现优异，并在不同任务上展现出强大的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2606.08063', 'title': 'Robust-U1: Can MLLMs Self-Recover Corrupted Visual Content for Robust Understanding?', 'url': 'https://huggingface.co/papers/2606.08063', 'abstract': "Abstract Robust-U1 enhances multimodal large language models' robustness against visual corruptions through self-recovery capabilities that improve both visual quality and reasoning performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal Large Language Models (MLLMs) have demonstrated remarkable success in visual understanding, yet their performance degrades significantly under real-world visual corruptions. While existing robustness enhancement approaches exist, they are limited: black-box feature alignment lacks interpretability, and white-box text-based reasoning cannot restore lost pixel-level details. This work investigates a fundamental research question: Can MLLMs recover corrupted visual content by themselves? To address this, we propose Robust-U1, a novel framework that equips MLLMs with explicit visual self-recovery capability for robust understanding. The approach comprises three core stages: supervised fine-tuning for initial reconstruction, reinforcement learning with dual rewards (pixel-level SSIM and semantic-level CLIP similarity) for aligning high visual quality, and multimodal reasoning that jointly considers both the corrupted input and the recovered image. Extensive experiments demonstrate that Robust-U1 achieves state-of-the-art robustness on the real-world corruption benchmark and maintains superior performance under adversarial corruptions on general VQA benchmarks. Analysis confirms that high-quality visual recovery directly enhances reasoning performance, establishing self-recovery as a critical mechanism for robust visual understanding. The source code is available at https://github.com/jqtangust/Robust-U1.", 'score': 14, 'issue_id': 2417, 'pub_date': '2026-06-06', 'pub_date_card': {'ru': '6 июня', 'en': 'June 6', 'zh': '6月6日'}, 'hash': '31a12eb8f65b94c6', 'authors': ['Jiaqi Tang', 'Jianmin Chen', 'Youyang Zhai', 'Wei Wei', 'Runtao Liu', 'Mengjie Zhao', 'Xiangyu Wu', 'Qingfa Xiao', 'Qifeng Chen'], 'affiliations': ['Nanjing University of Science and Technology, Nanjing, China', 'Northeastern University, Shenyang, China', 'Northwestern Polytechnical University, Xian, China', 'The Hong Kong University of Science and Technology (Guangzhou), Guangzhou, China', 'The Hong Kong University of Science and Technology, Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.08063.jpg', 'data': {'categories': ['#rl', '#benchmark', '#cv', '#open_source', '#security', '#multimodal', '#optimization', '#training'], 'emoji': '🔧', 'ru': {'title': 'Самовосстановление изображений для надёжного понимания в мультимодальных моделях', 'desc': 'Robust-U1 — это фреймворк, который дополняет мультимодальные большие языковые модели (MLLM) способностью к самовосстановлению повреждённых изображений для повышения их робастности. Авторы предлагают трёхэтапный подход: первоначальное обучение на размеченных данных для восстановления пикселей, обучение с подкреплением с двойными вознаграждениями (SSIM и CLIP similarity) для выравнивания качества, и совместное многомодальное рассуждение с использованием как повреждённого, так и восстановленного изображения. Экспериментальные результаты показывают, что предложенный метод достигает стабильной производительности на эталонных наборах данных с реальными артефактами и состязательными помехами. Исследование демонстрирует, что высокое качество визуального восстановления напрямую улучшает производительность модели в задачах визуального понимания.'}, 'en': {'title': 'Empowering MLLMs with Self-Recovery for Robust Visual Understanding', 'desc': 'Robust-U1 is a framework designed to improve the robustness of multimodal large language models (MLLMs) against visual corruptions. It introduces a self-recovery capability that allows these models to reconstruct corrupted visual content, enhancing both visual quality and reasoning performance. The framework operates in three stages: initial reconstruction through supervised fine-tuning, reinforcement learning for optimizing visual quality, and multimodal reasoning that integrates both the corrupted input and the recovered image. Experimental results show that Robust-U1 outperforms existing methods in handling real-world visual corruptions and adversarial scenarios, highlighting the importance of self-recovery in robust visual understanding.'}, 'zh': {'title': '自我恢复，提升视觉理解的鲁棒性', 'desc': 'Robust-U1 是一种增强多模态大语言模型（MLLMs）对视觉损坏的鲁棒性的新框架。它通过自我恢复能力来改善视觉质量和推理性能，解决了现有方法的局限性。该方法包括三个核心阶段：监督微调、双重奖励的强化学习和多模态推理。实验表明，Robust-U1 在真实世界的损坏基准测试中表现出色，证明了高质量的视觉恢复直接提升了推理性能。'}}}, {'id': 'https://huggingface.co/papers/2606.13376', 'title': 'MoVerse: Real-Time Video World Modeling with Panoramic Gaussian Scaffold', 'url': 'https://huggingface.co/papers/2606.13376', 'abstract': 'Abstract MoVerse generates real-time interactive video from single images by creating 360° panoramas and 3D Gaussian scaffolds, enabling efficient rendering through diffusion-based techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present MoVerse, a real-time video world model that creates an interactively navigable scene from a single narrow-field-of-view image. This setting is challenging because the input observes only a small fraction of the environment, while interactive roaming requires a complete surrounding world, persistent geometry, controllable camera motion, and temporally coherent high-fidelity observations. MoVerse addresses this problem by separating world construction from observation rendering. It first expands the input into a gravity-aligned 360^circ panorama with topology-aware diffusion, closing the missing field of view before 3D reasoning. It then lifts the panorama into a persistent 3D Gaussian scaffold using panoramic geometry-aware residual prediction, yielding a dense and directly renderable spatial memory. Finally, a Gaussian-conditioned video renderer translates scaffold renderings along user-specified camera trajectories into photorealistic video. To make this renderer practical for interaction, we train a bidirectional diffusion teacher for high-quality conditional rendering and distill it into a causal autoregressive student for bounded-latency streaming. This design combines the controllability and long-range consistency of explicit 3D representations with the perceptual quality of generative video models. MoVerse supports real-time scene roaming at 8~FPS on a single NVIDIA RTX~4090 GPU, demonstrating a practical path toward single-image world creation with interactive video output.', 'score': 8, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '5a714d2ea66c4120', 'authors': ['Yang Zhou', 'Ziheng Wang', 'Yuqin Lu', 'Haofeng Liu', 'Jun Liang', 'Shengfeng He', 'Jing Li'], 'affiliations': ['Columbia University', 'Orange Team, Youku Moku-Lab, HUJING Digital Media & Entertainment Group', 'Singapore Management University', 'South China University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.13376.jpg', 'data': {'categories': ['#diffusion', '#3d', '#multimodal', '#video'], 'emoji': '🌍', 'ru': {'title': 'От одного фото к интерактивному миру в 360°', 'desc': 'MoVerse — это модель видео-мира в реальном времени, которая создаёт интерактивно навигируемую 3D сцену из одного изображения. Система расширяет входное изображение в полнопанорамный вид на 360° с помощью диффузионной модели, затем преобразует панораму в трёхмерный гауссовский скаффолд для хранения геометрической информации. Для синтеза фотореалистичного видео используется двунаправленная диффузионная модель-учитель, которая затем дистиллируется в причинную авторегрессивную модель для потоковой передачи с ограниченной задержкой. Система достигает реального времени в 8 кадров в секунду на одном GPU, позволяя пользователям интерактивно навигировать по сгенерированной 3D сцене.'}, 'en': {'title': 'Transforming Single Images into Interactive 3D Worlds', 'desc': 'MoVerse is a machine learning model that generates interactive video from a single image by creating a 360° panorama and a 3D Gaussian scaffold. It effectively addresses the challenge of limited input views by expanding the image into a complete surrounding world, allowing for controllable camera motion and coherent video output. The model uses advanced techniques like topology-aware diffusion and Gaussian-conditioned rendering to produce high-quality, photorealistic videos. This approach enables real-time scene navigation, achieving 8 frames per second on powerful GPUs, showcasing a significant advancement in single-image world creation.'}, 'zh': {'title': '单图像生成实时交互视频的创新之路', 'desc': 'MoVerse是一种实时视频生成模型，它能够从单张图像创建可交互的360°全景视频。该模型通过将输入图像扩展为重力对齐的全景图，并利用拓扑感知的扩散技术来填补视野缺失，从而实现世界构建。接着，MoVerse将全景图提升为持久的3D高斯支架，利用几何感知的残差预测生成可直接渲染的空间记忆。最后，模型通过高斯条件视频渲染器将支架渲染转换为高保真视频，实现了在单张图像基础上进行实时场景漫游的可能性。'}}}, {'id': 'https://huggingface.co/papers/2606.13662', 'title': 'EurekAgent: Agent Environment Engineering is All You Need For Autonomous Scientific Discovery', 'url': 'https://huggingface.co/papers/2606.13662', 'abstract': 'Abstract Environment engineering enhances autonomous scientific discovery by designing structured agent environments that optimize behaviors like exploration and collaboration while mitigating issues such as reward hacking and human oversight friction, as demonstrated by the EurekAgent system that achieves state-of-the-art results across multiple domains with low computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM-based agents have shown increasing potential in automating scientific discovery. Given an optimizable metric and an execution environment, they can propose, validate, and iterate scientific solutions, and have produced results that outperform human-designed approaches. As model capabilities continue to improve, we argue that the bottleneck for autonomous scientific discovery is shifting from prescribing agent workflows to designing agent environments: the resources, constraints, and interfaces that shape agent behavior. We frame this as environment engineering: building environments that amplify productive behaviors, such as open-ended exploration, systematic artifact management, and inter-agent collaboration, while suppressing harmful behaviors, such as reward hacking and high-friction human oversight. We present EurekAgent, an environment-engineered agent system for metric-driven autonomous scientific discovery. EurekAgent engineers the environment along four dimensions: permissions engineering for bounded agent execution and isolated evaluation; artifact engineering for filesystem and Git-based collaboration; budget engineering for budget-aware exploration; and human-in-the-loop engineering for easy human supervision and intervention. EurekAgent sets new state-of-the-art results on multiple mathematics, kernel engineering, and machine learning tasks, including new state-of-the-art 26-circle packing results discovered with less than $11 in total API cost. We open-source our code and results, and call for environment engineering as a core research direction for developing reliable autonomous research agents.', 'score': 7, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '70d64644e3e943a3', 'authors': ['Amy Xin', 'Jiening Siow', 'Junjie Wang', 'Zijun Yao', 'Fanjin Zhang', 'Jian Song', 'Lei Hou', 'Juanzi Li'], 'affiliations': ['Department of Computer Science and Technology, Tsinghua University', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.13662.jpg', 'data': {'categories': ['#science', '#open_source', '#benchmark', '#alignment', '#agents'], 'emoji': '🔬', 'ru': {'title': 'Инженерия окружения: путь к надежным автономным исследовательским агентам', 'desc': 'В статье представляется концепция инженерии окружения для повышения эффективности автономных агентов в научных исследованиях. Авторы утверждают, что узким местом является не проектирование рабочих процессов агентов, а конструирование их окружения с учётом ресурсов, ограничений и интерфейсов. Система EurekAgent демонстрирует, как целенаправленное проектирование окружения по четырём измерениям — инженерия разрешений, управление артефактами, бюджет исследования и взаимодействие с человеком — усиливает продуктивное поведение и подавляет вредоносное. Система достигает новых рекордов на задачах из математики, машинного обучения и оптимизации при минимальных вычислительных затратах.'}, 'en': {'title': 'Empowering Autonomous Discovery through Environment Engineering', 'desc': 'This paper discusses the concept of environment engineering, which focuses on creating structured environments for autonomous agents to enhance scientific discovery. The EurekAgent system exemplifies this approach by optimizing agent behaviors like exploration and collaboration while minimizing issues such as reward hacking. The authors argue that as machine learning models improve, the challenge lies in designing effective environments rather than just workflows for agents. EurekAgent demonstrates significant advancements in various scientific tasks, achieving state-of-the-art results with low computational costs and emphasizing the importance of environment engineering in future research.'}, 'zh': {'title': '环境工程：自主科学发现的新方向', 'desc': '环境工程通过设计结构化的代理环境来增强自主科学发现，优化探索和协作等行为，同时减少奖励黑客和人类监督摩擦等问题。EurekAgent系统在多个领域中以低计算成本实现了最先进的结果。随着模型能力的不断提高，自主科学发现的瓶颈正在从规定代理工作流程转向设计代理环境。我们提出环境工程作为核心研究方向，以构建能够促进开放式探索和系统化管理的环境，同时抑制有害行为。'}}}, {'id': 'https://huggingface.co/papers/2606.09290', 'title': 'Visual Para-Thinker++: A Single-Policy Multi-Agent Framework for Visual Reasoning', 'url': 'https://huggingface.co/papers/2606.09290', 'abstract': 'Abstract A multi-agent framework with shared MLLM policy and role-specific training methods improves visual reasoning by reducing hallucinations and enabling efficient parallel processing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual reasoning requires integrating evidence distributed across regions, attributes, and relations, making single-chain reasoning prone to early perceptual commitment and hallucination. We propose Visual Para-Thinker++, a single-policy multi-agent framework in which one shared MLLM policy is instantiated as role-conditioned Main, Worker, and Summary Agents. The Main Agent decomposes the task with fixed allocation patterns; Worker Agents reason in parallel under context isolation; and the Summary Agent reconciles full Worker reasoning traces rather than majority-voting on final labels. The shared policy is trained by Multi-Agent Capability Injection and Role-Decoupled Multi-Agent Optimization, which assign role-specific rewards and advantages to corresponding token segments to reduce gradient conflict among collaborative roles. A native inference engine enables efficient multi-agent rollout through shared visual prefix and KV cache reuse. Across V*, CountBench, the RefCOCO family, and HallusionBench, Visual Para-Thinker++ consistently outperforms single-trajectory and inference-time parallel baselines, with especially strong gains on hallucination-sensitive visual reasoning.', 'score': 6, 'issue_id': 2417, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '46fd1bd01adde2fa', 'authors': ['Haoran Xu', 'Hongyu Wang', 'Yifei Gao', 'Jiaze Li', 'Zizhao Tong', 'Xiaofeng Zhang', 'Xiaosong Yuan'], 'affiliations': ['Hunan University', 'Jilin University', 'Shanghai Jiao Tong University', 'Tianjin University', 'University of Chinese Academy of Sciences', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09290.jpg', 'data': {'categories': ['#inference', '#reasoning', '#cv', '#hallucinations', '#agents', '#multimodal', '#optimization', '#training'], 'emoji': '🤝', 'ru': {'title': 'Многоагентное рассуждение с единой политикой: преодоление галлюцинаций через ролевое разложение', 'desc': 'В работе предложена система Visual Para-Thinker++, которая использует единую политику большой мультимодальной модели (MLLM), развёрнутую в виде нескольких агентов с разными ролями для улучшения визуального рассуждения. Основной агент декомпозирует задачу, рабочие агенты проводят параллельное рассуждение в условиях изоляции контекста, а итоговый агент примиряет полные трассы рассуждений рабочих вместо голосования по финальным ответам. Модель обучается специальными методами Multi-Agent Capability Injection и Role-Decoupled Multi-Agent Optimization, которые назначают роль-специфичные награды отдельным частям токенов для снижения конфликтов градиентов. Подход демонстрирует значительное снижение галлюцинаций и эффективную параллельную обработку на множественных бенчмарках.'}, 'en': {'title': 'Enhancing Visual Reasoning with Multi-Agent Collaboration', 'desc': 'This paper introduces Visual Para-Thinker++, a multi-agent framework designed to enhance visual reasoning in machine learning. It employs a shared MLLM policy with specialized roles for Main, Worker, and Summary Agents, allowing for efficient parallel processing and reducing the risk of hallucinations. The framework utilizes role-specific training methods to optimize collaboration among agents, minimizing conflicts during learning. Experimental results demonstrate that Visual Para-Thinker++ significantly outperforms traditional methods, particularly in tasks sensitive to hallucinations.'}, 'zh': {'title': '提升视觉推理的多智能体框架', 'desc': '本文提出了一种多智能体框架，名为Visual Para-Thinker++，通过共享的多语言大模型（MLLM）策略和角色特定的训练方法来提升视觉推理能力。该框架包括主智能体、工作智能体和总结智能体，主智能体负责任务分解，工作智能体在隔离的上下文中并行推理，而总结智能体则整合工作智能体的推理结果。通过多智能体能力注入和角色解耦优化，框架有效减少了协作角色之间的梯度冲突。实验结果表明，Visual Para-Thinker++在多个基准测试中表现优于传统的单轨迹推理方法，尤其在处理幻觉敏感的视觉推理任务时效果显著。'}}}, {'id': 'https://huggingface.co/papers/2606.12882', 'title': 'HarnessBridge: Learnable Bidirectional Controller for LLM Agent Harness', 'url': 'https://huggingface.co/papers/2606.12882', 'abstract': 'Abstract Learnable harness controller called HarnessBridge is introduced to parameterize agent-environment interfaces through bidirectional projections, achieving performance comparable to specialized harnesses with reduced computational overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly deployed as agents for long-horizon tasks, yet their performance is shaped not only by model capability and environment design, but also by the harness that mediates agent--environment interaction. Existing harnesses are largely manually engineered, making them difficult to scale as trajectories grow longer and interactions become more complex. In this work, we ask whether harness can be generated by a learnable plug-in module that can be trained in an end-to-end fashion. We introduce HarnessBridge, a lightweight learnable harness controller that parameterizes the agent--environment interface as a bidirectional projection. HarnessBridge learns two bidirectional projections: observation projection, which distills raw trajectories into compact, decision-relevant states, and action projection, which converts proposed actions into executable transitions or trajectory-grounded rejections. We train HarnessBridge on a harness supervision dataset via unified instruction tuning. On Terminal-Bench~2.0 and SWE-bench Verified, HarnessBridge matches or surpasses strong specialized harnesses while substantially reducing token usage and trajectory length, and generalizes from smaller generators to larger commercial models.', 'score': 5, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '8a4b707a1f4b6861', 'authors': ['Xiaoxuan Wang', 'Haixin Wang', 'Alexander Taylor', 'Jason Cong', 'Yizhou Sun', 'Wei Wang'], 'affiliations': ['University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2606.12882.jpg', 'data': {'categories': ['#architecture', '#training', '#agents'], 'emoji': '🌉', 'ru': {'title': 'Научись соединять агента с миром: обучаемый мост вместо ручного каркаса', 'desc': 'В работе представлена HarnessBridge — обучаемый контроллер интерфейса между агентом и окружением, который параметризует это взаимодействие через двусторонние проекции. Модель включает проекцию наблюдений, которая сжимает сырые траектории в компактные состояния, релевантные для принятия решений, и проекцию действий, которая преобразует предложенные действия в исполняемые переходы или отклонения. HarnessBridge обучается на специализированном датасете через инструкционный tuning и достигает производительности, сравнимой со специализированными harnesses, при этом значительно снижая использование токенов и длину траекторий.'}, 'en': {'title': 'HarnessBridge: Efficient Learning for Agent-Environment Interaction', 'desc': 'The paper introduces HarnessBridge, a learnable controller designed to improve the interaction between agents and their environments in machine learning tasks. It utilizes bidirectional projections to streamline the agent-environment interface, allowing for more efficient processing of long trajectories. By training on a harness supervision dataset, HarnessBridge can distill observations into relevant states and convert actions into executable transitions. This approach not only matches the performance of specialized harnesses but also reduces computational costs and enhances scalability for complex tasks.'}, 'zh': {'title': 'HarnessBridge：智能体与环境的高效交互控制器', 'desc': '本文介绍了一种可学习的控制器，称为HarnessBridge，它通过双向投影来参数化智能体与环境之间的接口，从而实现与专用控制器相当的性能，同时减少计算开销。随着长时间任务的复杂性增加，现有的控制器主要是手动设计的，难以扩展。HarnessBridge作为一个轻量级的可学习控制器，能够通过端到端的训练生成控制器，学习观察投影和动作投影。实验结果表明，HarnessBridge在多个基准测试中表现优异，能够有效减少令牌使用和轨迹长度。'}}}, {'id': 'https://huggingface.co/papers/2606.09304', 'title': 'SG-OPD: Sign-Gated On-Policy Distillation via Sign-Consistency Gating and Phased Teacher Sampling', 'url': 'https://huggingface.co/papers/2606.09304', 'abstract': "Abstract Sign-Gated On-Policy Distillation improves upon standard on-policy distillation by incorporating a binary verifier to filter teacher signals, resulting in better performance on mathematical reasoning tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) trains a student on its own trajectories with dense per-token supervision from a stronger teacher, and often outperforms off-policy distillation and standard reinforcement learning. However, we find that its effectiveness implicitly relies on two assumptions that frequently break in practice: trajectory-level alignment between the student and the teacher, and uniform token-level reliability of the teacher's preferences. We therefore propose Sign-Gated On-Policy Distillation (SG-OPD), which uses a binary verifier as a trust signal for the teacher at two complementary granularities: phased teacher sampling mixes in verifier-endorsed teacher rollouts at cold-start, and a sign-consistency gate extrapolates the distillation update on tokens where the teacher agrees with the verifier-correct direction and interpolates it where it disagrees. Experiments on competition-level mathematical reasoning benchmarks show that SG-OPD consistently outperforms standard OPD, with average gains of 1.98 and 7.50 at the per-sample and per-question levels, respectively.", 'score': 5, 'issue_id': 2417, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': '0f52c78fe90dd50b', 'authors': ['Haoran Xu', 'Hongyu Wang', 'Yifei Gao', 'Jiaze Li', 'Xiaofeng Zhang', 'Xiaosong Yuan'], 'affiliations': ['Hunan University', 'Jilin University', 'Shanghai Jiao Tong University', 'Tianjin University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09304.jpg', 'data': {'categories': ['#rl', '#reasoning', '#optimization', '#math', '#training'], 'emoji': '✅', 'ru': {'title': 'Доверительная фильтрация учительских сигналов через бинарную верификацию', 'desc': 'В статье предлагается улучшенный метод дистилляции на собственных траекториях (OPD), называемый Sign-Gated On-Policy Distillation (SG-OPD), который использует бинарный верификатор для фильтрации сигналов от учителя. Авторы выявили, что стандартная OPD полагается на два предположения, которые часто нарушаются на практике: выравнивание траекторий студента и учителя, а также надежность предпочтений учителя на уровне токенов. Предложенный метод применяет верификатор на двух уровнях детализации: фазовое смешивание одобренных учителем переходов в начале обучения и гейт согласованности знака, который экстраполирует обновления где учитель согласен с верификатором и интерполирует их в случае разногласия. Экспериментальная оценка на бенчмарках математического рассуждения показала устойчивое улучшение SG-OPD над стандартной OPD с средними прибавками 1.98 и 7.50 на уровне примеров и задач соответственно.'}, 'en': {'title': 'Enhancing Learning with Trust: Sign-Gated On-Policy Distillation', 'desc': "The paper introduces Sign-Gated On-Policy Distillation (SG-OPD), which enhances traditional on-policy distillation by using a binary verifier to filter the signals from a teacher model. This method addresses the limitations of standard on-policy distillation, which relies on the assumption that the teacher's guidance is always reliable and aligned with the student's learning trajectory. By incorporating a verifier, SG-OPD ensures that only trustworthy teacher signals are used, improving the quality of the learning process. Experiments demonstrate that SG-OPD significantly outperforms standard on-policy distillation in mathematical reasoning tasks, showcasing its effectiveness in real-world applications."}, 'zh': {'title': '改进的在线策略蒸馏方法提升数学推理能力', 'desc': '本论文提出了一种改进的在线策略蒸馏方法，称为Sign-Gated On-Policy Distillation（SG-OPD）。该方法通过引入一个二元验证器来过滤教师信号，从而提高在数学推理任务上的表现。SG-OPD在冷启动阶段混合了经过验证器认可的教师样本，并在教师与验证器一致的情况下进行蒸馏更新。实验结果表明，SG-OPD在竞争级数学推理基准测试中，平均提升了1.98和7.50的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.13364', 'title': 'VideoMDM: Towards 3D Human Motion Generation From 2D Supervision', 'url': 'https://huggingface.co/papers/2606.13364', 'abstract': 'Abstract VideoMDM trains 3D human motion priors from 2D poses using a diffusion framework with 2D reprojection loss and 3D motion regularizers, achieving near-3D supervised performance without requiring 3D ground truth.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce VideoMDM, a diffusion-based framework that trains 3D human motion priors directly from accurate 2D poses extracted from monocular videos, without any 3D ground truth. A pretrained 2D-to-3D lifter provides approximate 3D pose sequences that serve as a noisy teacher: these are diffused, denoised by the model in 3D, and supervised in 2D by reprojecting the prediction and comparing against accurate keypoints. We show that, under mild assumptions, a depth-weighted 2D reprojection loss is equivalent in expectation to direct 3D supervision, and we adapt standard 3D motion regularizers - velocity consistency and over-parameterized representation alignment - to this 2D setting. Unlike methods that lift 2D to 3D only at inference, VideoMDM learns a coherent 3D motion manifold during training. On HumanML3D it nearly closes the gap to fully 3D-supervised MDM (FID 0.88 vs 0.54); On real video datasets Fit3D and NBA the method learns to generate motions consistently preferred by humans, with strong quantitative results.', 'score': 3, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'f33b99f2211cf353', 'authors': ['Amir Mann', 'Gal Michael Harari', 'Merav Keidar', 'Or Litany'], 'affiliations': ['NVIDIA', 'Technion'], 'pdf_title_img': 'assets/pdf/title_img/2606.13364.jpg', 'data': {'categories': ['#synthetic', '#training', '#3d', '#diffusion', '#video'], 'emoji': '🎬', 'ru': {'title': 'Обучение 3D движений человека без 3D разметки через диффузию в 2D пространстве', 'desc': 'VideoMDM — это фреймворк на основе диффузионных моделей, который обучает приоры 3D движений человека, используя только 2D позы из монокулярных видео без 3D разметки. Ключевая идея заключается в использовании предобученного 2D-to-3D лифтера в качестве зашумленного учителя и применении переопроектирования в 2D пространство для супервизии, что математически эквивалентно прямой 3D супервизии при соответствующих условиях. Метод адаптирует стандартные регуляризаторы 3D движений, такие как консистентность скорости и выравнивание переопределённых представлений, к 2D постановке. На бенчмарках HumanML3D, Fit3D и NBA модель демонстрирует результаты, близкие к полностью 3D-супервизируемым подходам, при этом генерируя естественные движения, которые люди предпочитают.'}, 'en': {'title': 'Transforming 2D Poses into Realistic 3D Motion', 'desc': 'VideoMDM is a novel framework that trains 3D human motion models using only 2D poses from videos, eliminating the need for 3D ground truth data. It employs a diffusion process where a pretrained 2D-to-3D lifter provides approximate 3D poses, which are then refined through denoising and 2D reprojection loss. The method incorporates 3D motion regularizers to ensure the generated motions are coherent and realistic. Results show that VideoMDM achieves performance close to fully 3D-supervised methods while producing human-preferred motion outputs.'}, 'zh': {'title': 'VideoMDM：从2D姿态学习3D运动的创新方法', 'desc': 'VideoMDM是一种基于扩散框架的方法，它从单目视频中提取的2D姿态直接训练3D人类运动先验，而无需3D真实数据。该方法使用预训练的2D到3D转换器生成近似的3D姿态序列，并通过扩散和去噪过程来优化3D运动。通过将预测结果重新投影到2D并与准确的关键点进行比较，VideoMDM实现了有效的监督学习。实验结果表明，该方法在多个数据集上表现出色，接近完全3D监督的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.13120', 'title': 'EvoBrowseComp: Benchmarking Search Agents on Evolving Knowledge', 'url': 'https://huggingface.co/papers/2606.13120', 'abstract': 'Abstract EvoBrowseComp is an evolving benchmark with 800 contamination-free questions synthesized through a three-agent framework that ensures temporal freshness and prevents parametric memorization in search agent evaluation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Search Agents -- large language models augmented with search tools -- have intensified the need for future-proof evaluation benchmarks. Existing benchmarks such as BrowseComp rely on static knowledge, making them vulnerable to test-set contamination and parametric memorization. Consequently, models can achieve high scores through fact recall rather than genuine retrieval, obscuring true browsing competence via reasoning shortcuts.   In this paper, we introduce EvoBrowseComp, an evolving benchmark of 400 English and 400 Chinese contamination-free complex questions synthesized via live-web traversal. To collect these questions, we design a three-agent collaborative framework: (1) a QA synthesis agent that retrieves fresh knowledge from the live web to synthesize QA pairs; (2) an information filtering agent that filters retrieved knowledge in terms of credibility and popularity to block parametric shortcuts; and (3) a high-level guidance agent that formalizes questions into reasoning graphs to reduce logical redundancy and shortcuts in synthesized QA pairs. Because the framework supports fully automated synthesis, EvoBrowseComp can be regularly updated to prevent data contamination and maintain temporal freshness. Extensive experiments confirm its great difficulty, requiring broad horizontal search. It establishes a scalable paradigm for auto-updatable, high-difficulty benchmarking that keeps pace with both evolving world knowledge and advancing agent capabilities.', 'score': 2, 'issue_id': 2417, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '5f06740a7674fe48', 'authors': ['Yunhan Wang', 'Jiaan Wang', 'Lianzhe Huang', 'Xianfeng Zeng', 'Fandong Meng'], 'affiliations': ['Northeastern University, China', 'Weixin AI, Tencent Inc, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.13120.jpg', 'data': {'categories': ['#multilingual', '#dataset', '#agents', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Живой бенчмарк: защита от памяти через постоянное обновление', 'desc': 'В статье представлен EvoBrowseComp — динамически обновляемый бенчмарк для оценки поисковых агентов, содержащий 800 вопросов на английском и китайском языках, защищённых от утечки данных и параметрического запоминания. Бенчмарк синтезируется автоматически через трёхагентную систему: агент генерирует вопросы на основе свежей информации из живого веб-поиска, агент фильтрации проверяет достоверность источников, а направляющий агент структурирует вопросы в графы рассуждений. Благодаря полной автоматизации процесса, бенчмарк регулярно обновляется для поддержания актуальности знаний и предотвращения контаминации тестовых данных. Экспериментальная оценка показывает высокую сложность задач и требует от моделей глубокого горизонтального поиска информации.'}, 'en': {'title': 'EvoBrowseComp: A Fresh Approach to Evaluating Search Agents', 'desc': 'EvoBrowseComp is a new benchmark designed to evaluate search agents using 800 complex questions that are free from contamination. It employs a three-agent framework to ensure that the questions remain fresh and prevent models from simply memorizing answers. This benchmark addresses the limitations of existing static benchmarks by synthesizing questions through live web traversal, which enhances the evaluation of reasoning skills. The automated nature of EvoBrowseComp allows for regular updates, ensuring that it remains relevant as both knowledge and agent capabilities evolve.'}, 'zh': {'title': 'EvoBrowseComp：动态更新的高难度基准测试', 'desc': 'EvoBrowseComp是一个不断发展的基准测试，包含800个无污染的问题，旨在评估搜索代理的能力。它通过一个三代理框架生成，确保了时间的新鲜性并防止参数记忆。与现有的静态基准测试不同，EvoBrowseComp能够定期更新，避免数据污染，保持问题的时效性。该基准测试的设计使得模型在评估时需要进行广泛的搜索，而不仅仅是简单的事实回忆。'}}}, {'id': 'https://huggingface.co/papers/2606.13644', 'title': 'Surflo: Consistent 3D Surface Flow Model with Global State', 'url': 'https://huggingface.co/papers/2606.13644', 'abstract': 'Abstract Surflo compresses unposed RGB views into latent tokens and decodes 3D surface points through flow matching, enabling flexible resolution output and efficient processing compared to existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Geometry is invariant to viewpoint, which makes any collection of images a redundant encoding of a single 3D state. Existing feed-forward reconstruction models fail to exploit this: per-view methods emit overlapping, unaligned pointmaps that grow linearly with in
