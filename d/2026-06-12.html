put count, while global-latent methods commit to a fixed, low-resolution output. We introduce Surflo, which compresses a variable number of unposed RGB views into K latent tokens-one global state-and decodes oriented 3D surface points by independently transporting them from noise onto the surface via flow matching. This frees the output from any fixed grid or token budget: the same latent yields from a few thousand to a million points in a single forward pass. To suppress the local inconsistencies inherent to independent per-point decoding, an inference-time guidance term correlates nearby points by injecting a photometric gradient during ODE integration. Surflo matches or surpasses feed-forward baselines on surface metrics, runs an order of magnitude faster than optimization-based methods that require hundreds of views, and is the only feed-forward approach to combine a global latent with arbitrary-resolution decoding.', 'score': 2, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '164769719ff42201', 'authors': ['Antoine Guédon', 'Shu Nakamura', 'Nicolas Dufour', 'Jiahui Lei', 'Ko Nishino', 'Angjoo Kanazawa'], 'affiliations': ['Kyoto University', 'Kyutai', 'LIX, École polytechnique', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.13644.jpg', 'data': {'categories': ['#architecture', '#inference', '#3d', '#optimization'], 'emoji': '🌊', 'ru': {'title': 'Гибкое восстановление 3D поверхностей с произвольным разрешением через flow matching', 'desc': 'Surflo — это метод для реконструкции 3D поверхности из неотмеченных RGB изображений, который сжимает переменное количество изображений в K латентных токенов, представляющих глобальное состояние сцены. Декодирование 3D точек поверхности происходит через flow matching — независимое транспортирование каждой точки из шума на поверхность. Метод позволяет генерировать произвольное количество точек (от нескольких тысяч до миллиона) в одном forward pass, освобождая выход от фиксированного разрешения сетки. Для устранения локальной несогласованности при независимом декодировании точек используется guidance термин на этапе инференса, который коррелирует соседние точки через фотометрический градиент.'}, 'en': {'title': 'Surflo: Efficient 3D Surface Reconstruction from RGB Views', 'desc': 'Surflo is a novel machine learning method that compresses multiple unposed RGB images into a set of latent tokens, which represent a single 3D state. It decodes 3D surface points by using flow matching, allowing for flexible output resolutions and efficient processing. Unlike traditional methods that produce overlapping pointmaps or fixed-resolution outputs, Surflo can generate a variable number of points in a single pass, ranging from thousands to millions. Additionally, it incorporates a guidance term to enhance the consistency of the decoded points, achieving superior performance compared to existing feed-forward models.'}, 'zh': {'title': 'Surflo：高效灵活的3D重建新方法', 'desc': 'Surflo是一种新型的机器学习方法，它将未定姿态的RGB视图压缩成潜在标记，并通过流匹配解码3D表面点。这种方法能够灵活输出不同分辨率的结果，并且处理效率高于现有方法。Surflo利用全局状态的潜在标记，避免了传统方法中由于视图重叠而导致的点图不对齐问题。通过在推理时引入光度梯度，Surflo能够有效抑制局部不一致性，提供更高质量的3D重建。'}}}, {'id': 'https://huggingface.co/papers/2606.12575', 'title': 'High-Fidelity Two-Step Image Generation via Teacher-Aligned End-to-End Distillation', 'url': 'https://huggingface.co/papers/2606.12575', 'abstract': 'Abstract A 2-step image generation model is developed through distillation from an 8-step teacher using distribution-aligned adversarial learning, step-decoupled parameterization, and end-to-end training with iterative regularization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Few-step diffusion distillation has become increasingly mature for 4-8-step generation, yet pushing further to 2 steps remains challenging. In this work, we introduce Z-Image Turbo++, a high-quality 2-step image generation model distilled from the 8-step Z-Image Turbo teacher. Our method addresses the central bottlenecks of increased task difficulty and limited model capacity in 2-step generation through three simple but effective design choices tailored to this regime. First, we propose Distribution-Aligned Adversarial Learning, which uses teacher-generated images rather than external real images as real samples for GAN training, providing a more attainable and informative adversarial target. Second, we adopt Step-Decoupled Parameterization, assigning independent model parameters to the two denoising steps to better match their distinct capacity demands. Third, we perform End-to-End Training with Iterative Regularization, allowing the first step to receive gradients from final image quality while preserving a meaningful intermediate generation through an explicit step-1 loss. Together, these designs substantially narrow the quality gap between 2-step and 8-step generation in both qualitative and quantitative evaluations, highlighting the potential of carefully tailored distillation strategies for improving the quality-efficiency trade-off in few-step generation.', 'score': 2, 'issue_id': 2417, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'fdae339765551542', 'authors': ['Dongyang Liu', 'Ruoyi Du', 'David Liu', 'Dengyang Jiang', 'Liangchen Li', 'Qilong Wu', 'Zhen Li', 'Steven C. H. Hoi', 'Hongsheng Li', 'Peng Gao'], 'affiliations': ['The Chinese University of Hong Kong', 'Z-Image Team, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.12575.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Молниеносная генерация: дистилляция диффузионной модели в 2 шага', 'desc': 'В работе представлен Z-Image Turbo++, модель для генерации изображений всего за 2 шага, полученная путём дистилляции из 8-шагового учителя. Основной метод использует три ключевые техники: распределение-выравненное состязательное обучение с использованием изображений учителя в качестве реальных примеров, параметризацию с независимыми весами для каждого шага денойзинга, и сквозное обучение с итеративной регуляризацией для сохранения качества промежуточных результатов. Такой подход значительно сокращает разрыв в качестве между 2-шаговой и 8-шаговой генерацией, демонстрируя эффективность тщательно спроектированных стратегий дистилляции для улучшения компромисса между качеством и скоростью.'}, 'en': {'title': 'Turbocharging 2-Step Image Generation with Smart Distillation', 'desc': 'This paper presents Z-Image Turbo++, a novel 2-step image generation model that is distilled from an 8-step teacher model. The authors tackle the challenges of 2-step generation by introducing three key innovations: Distribution-Aligned Adversarial Learning, which uses images generated by the teacher model for training, Step-Decoupled Parameterization to optimize model capacity for each denoising step, and End-to-End Training with Iterative Regularization to enhance image quality. These strategies significantly improve the performance of 2-step generation, making it closer in quality to 8-step methods. The findings suggest that tailored distillation techniques can effectively enhance the balance between quality and efficiency in image generation tasks.'}, 'zh': {'title': '高效的2步图像生成模型', 'desc': '本文提出了一种通过蒸馏技术从8步生成模型中发展而来的2步图像生成模型。我们采用了分布对齐对抗学习、步骤解耦参数化和端到端训练等方法，解决了2步生成中的任务难度和模型容量限制。特别地，使用教师生成的图像作为真实样本进行对抗训练，使得生成的图像质量更高。最终，我们的模型在定性和定量评估中显著缩小了2步与8步生成之间的质量差距，展示了蒸馏策略在少步生成中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.12674', 'title': 'Evoflux: Inference-Time Evolution of Executable Tool Workflows for Compact Agents', 'url': 'https://huggingface.co/papers/2606.12674', 'abstract': 'Abstract Evoflux enables compact language models to execute tool workflows more reliably by using evolutionary search to repair failed plans during inference, significantly improving execution feasibility compared to traditional fine-tuning methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Compact language models (LMs) reduce cost, latency, and deployment risk for tool agents. Yet MCP-style tool use requires more than isolated function calling: an agent must discover tools from live catalogs, satisfy schemas, preserve dependencies across intermediate outputs, and ground final responses in executed evidence. Small planners often generate plausible workflow graphs that fail under tool resolution, parameter validation, dependency tracking, or execution. We argue that this failure mode is poorly handled by small-corpus distillation. A few hundred teacher traces can teach workflow format, but rarely cover the recovery behavior needed to repair failed plans over changing tool catalogs. We introduce Evoflux, an inference-time evolutionary search method that treats compact tool use as the repair of executable tool workflows. It evolves typed workflow graphs through structured edits, execution feedback, adaptive intensity, meta-guided redesign, and diversity pruning. On held-out MCP-Bench tasks spanning live MCP servers and 250 tools, Evoflux raises execution feasibility from roughly 3% to 17-24% across small planners. In contrast, SFT and SFT+DPO on the same search-mined data match, underperform, or collapse below zero-shot performance; ReAct reaches higher peaks, but with higher variance and token cost. These results show that execution-grounded search is more reliable under scarce teacher-trace budgets.', 'score': 2, 'issue_id': 2417, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '22dfd397aa02caec', 'authors': ['Kushal Raj Bhandari', 'Ling Yue', 'Ching-Yun Ko', 'Dhaval Patel', 'Shaowu Pan', 'Pin-Yu Chen', 'Jianxi Gao'], 'affiliations': ['IBM Research', 'Rensselaer Polytechnic Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.12674.jpg', 'data': {'categories': ['#inference', '#agents', '#small_models', '#benchmark'], 'emoji': '🔧', 'ru': {'title': 'Эволюционный поиск для надёжного восстановления планов в компактных агентах', 'desc': 'Evoflux — это метод эволюционного поиска, который позволяет компактным языковым моделям более надёжно выполнять рабочие процессы с инструментами путём восстановления неудачных планов во время инференции. В отличие от традиционного fine-tuning, который плохо справляется с восстановлением после ошибок валидации параметров и разрешения зависимостей, Evoflux использует структурированное редактирование графов рабочих процессов, обратную связь от исполнения и адаптивную интенсивность поиска. На бенчмарке MCP-Bench метод повышает вероятность успешного выполнения с 3% до 17-24%, превосходя методы supervised fine-tuning и reinforcement learning по надёжности при ограниченном количестве примеров обучения. Этот подход демонстрирует преимущество поиска, управляемого обратной связью от выполнения, для малых моделей с недостаточными объёмами обучающих данных.'}, 'en': {'title': 'Evoflux: Evolving Reliable Tool Workflows for Compact Language Models', 'desc': 'Evoflux is a method that enhances the reliability of compact language models when executing tool workflows by using evolutionary search to fix failed plans during inference. Traditional fine-tuning methods often struggle with the complexities of tool use, such as discovering tools and managing dependencies. Evoflux improves execution feasibility significantly, increasing success rates from about 3% to between 17% and 24% on various tasks. This approach demonstrates that using execution-grounded search is more effective than relying solely on small-corpus distillation for training models in dynamic environments.'}, 'zh': {'title': 'Evoflux：提升工具工作流执行可靠性的新方法', 'desc': 'Evoflux是一种进化搜索方法，旨在提高紧凑语言模型在执行工具工作流时的可靠性。它通过修复失败的计划，显著改善了执行的可行性，超越了传统的微调方法。该方法通过结构化编辑、执行反馈和多样性修剪等技术，进化出可执行的工具工作流图。实验结果表明，Evoflux在多个任务中将执行可行性从约3%提高到17-24%。'}}}, {'id': 'https://huggingface.co/papers/2606.13106', 'title': 'Demystifying Hidden-State Recurrence: Switchable Latent Reasoning with On-Policy Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.13106', 'abstract': 'Abstract A switchable latent reasoning framework uses explicit boundary tokens to enable trainable and interpretable latent reasoning through recurrent hidden states.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Latent chain-of-thought compresses reasoning by replacing visible reasoning traces with continuous hidden-state recurrence, but existing formulations are difficult to optimize with standard on-policy reinforcement learning (RL) and hard to interpret causally. Our key insight is that a single pair of explicit boundary tokens can address both issues at once: discrete entry and exit anchors make the latent block compatible with standard on-policy RL, and the same anchors offer a natural foothold for mechanistic analysis. Motivated by this, we propose SWITCH, a switchable latent reasoning framework. The model emits <swi> to enter latent mode and </swi> to exit. Because the boundaries are ordinary discrete tokens, the GRPO policy ratio is well-defined at every decision point. The same anchors also expose the latent steps to direct probing and causal intervention. We train the model with a visible-to-latent curriculum and a Switch-GRPO objective that propagates gradients through recurrent latent computation. SWITCH consistently outperforms prior hidden-state-recurrence latent reasoning approaches at similar scale. Mechanistic analysis through the boundary tokens further reveals three findings: (i) <swi> is a sharply localised, learned switching policy rather than a stylistic artefact; (ii) the latent step it opens performs problem-specific, causally important computation rather than acting as an inert placeholder; and (iii) that computation is concentrated at a single hidden-state transition on entry. Together, these results show that hidden-state-recurrence latent reasoning is both RL-trainable and open to direct mechanistic analysis, including of how on-policy RL itself improves the model from the inside.', 'score': 1, 'issue_id': 2417, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': 'c44aebce74731644', 'authors': ['Jiayu Yang', 'Chao Chen', 'Shengen Wu', 'Yinhong Liu', 'Yuxuan Fan', 'Lujundong Li', 'Songning Lai', 'Chengwei Qin', 'Zhijiang Guo'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'JoinQuant', 'NTU', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2606.13106.jpg', 'data': {'categories': ['#rl', '#architecture', '#reasoning', '#interpretability', '#training'], 'emoji': '🔀', 'ru': {'title': 'Явные границы скрытого мышления: интерпретируемое и оптимизируемое латентное рассуждение', 'desc': 'В работе предложена SWITCH — структурированная система для скрытого рассуждения, использующая явные граничные токены для входа и выхода из режима латентного вычисления. Модель генерирует специальные токены <swi> и </swi>, которые делают скрытые вычисления совместимыми со стандартным обучением с подкреплением на текущей политике (on-policy RL). Авторы применили curriculum learning для постепенного перехода от явного рассуждения к скрытому и разработали objetivo Switch-GRPO для оптимизации через рекуррентные латентные вычисления. Механистический анализ показывает, что граничные токены выполняют критически важные вычисления, специфичные для задачи, что делает скрытое рассуждение одновременно обучаемым и интерпретируемым.'}, 'en': {'title': 'SWITCH: Enhancing Latent Reasoning with Boundary Tokens', 'desc': "The paper introduces SWITCH, a novel framework for latent reasoning that utilizes explicit boundary tokens to enhance trainability and interpretability. By employing discrete tokens to mark entry and exit points in the reasoning process, the model aligns well with standard on-policy reinforcement learning (RL) techniques. This approach not only simplifies optimization but also allows for causal analysis of the reasoning steps. The findings demonstrate that the framework effectively combines latent reasoning with RL training, revealing important insights into the model's internal computations."}, 'zh': {'title': '可切换的潜在推理框架', 'desc': '这篇论文提出了一种可切换的潜在推理框架，使用显式边界标记来实现可训练和可解释的潜在推理。通过引入边界标记，模型能够与标准的在线强化学习兼容，并且便于进行机制分析。研究表明，这种框架在推理过程中能够有效地压缩推理链，并且在训练过程中表现优于以往的潜在推理方法。最终，论文展示了如何通过边界标记进行直接的因果干预和分析，从而提升模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.11096', 'title': 'IDEAL: In-DEpth ALignment Makes A Discrete Representation AutoEncoder', 'url': 'https://huggingface.co/papers/2606.11096', 'abstract': 'Abstract Representation autoencoders using deep learning frameworks can improve image reconstruction quality by combining shallow and deep visual feature representations for better semantic richness and visual fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Built on pretrained vision foundation models (VFMs), representation autoencoders (RAEs) have recently emerged as a promising approach for constructing semantically rich latent spaces for image generation. However, their reconstruction quality often remains suboptimal, largely because deep VFM representations do not preserve sufficient fine-grained visual detail. This limitation becomes even more severe after discretization, where missing low-level information is difficult to recover. In fact, we observe that shallow VFM features retain considerably richer local appearance and structural detail, which complements the high-level semantics carried by deep features used in existing RAEs. Motivated by this complementary property, we propose Ideal, an In-depth Alignment framework for discrete representation autoencoding. By jointly aligning quantized tokens with both shallow and deep VFM features, Ideal enables the resulting discrete visual tokens to preserve both visual fidelity and rich semantics. Extensive experiments demonstrate that Ideal yields superior reconstruction performance, achieving 0.61 rFID on ImageNet and outperforming the previous best method by 0.28. When used for autoregressive image generation, Ideal further produces a gFID of 1.89, establishing a new state of the art for autoregressive image generation.', 'score': 1, 'issue_id': 2417, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '821e4fc3e16aac54', 'authors': ['Yitong Chen', 'Zijie Diao', 'Junke Wang', 'Lingyu Kong', 'Yixuan Ren', 'Bo He', 'Yu-Gang Jiang', 'Zuxuan Wu'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Shanghai Innovation Institute', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.11096.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Слияние неглубоких и глубоких признаков для совершенной дискретной кодировки изображений', 'desc': 'В этой работе предлагается новый метод дискретного автоэнкодера представлений (RAE), который улучшает качество реконструкции изображений благодаря совместному использованию признаков из неглубоких и глубоких слоёв предобученных визуальных моделей. Авторы замечают, что неглубокие слои сохраняют больше локальных деталей и структурной информации, а глубокие слои — высокоуровневую семантику, что дополняет друг друга. Предложенный фреймворк Ideal выравнивает квантованные токены как с поверхностными, так и с глубокими признаками, что позволяет дискретным визуальным токенам сохранять одновременно визуальную точность и богатую семантику. Экспериментальные результаты показывают новое состояние искусства в задачах реконструкции и автогрессивной генерации изображений.'}, 'en': {'title': 'Enhancing Image Reconstruction with Ideal Framework', 'desc': 'This paper introduces Ideal, a new framework for representation autoencoders that enhances image reconstruction quality by integrating both shallow and deep visual feature representations. The authors highlight that while deep visual foundation models (VFMs) provide high-level semantic information, they often lack fine-grained details necessary for high-quality image generation. By aligning quantized tokens with both shallow and deep features, Ideal effectively captures both visual fidelity and rich semantics. Experimental results show that Ideal significantly improves reconstruction performance and sets a new benchmark in autoregressive image generation.'}, 'zh': {'title': '理想框架：提升图像重建质量的创新之路', 'desc': '本论文提出了一种名为Ideal的框架，用于改进图像重建质量。通过结合浅层和深层视觉特征，Ideal能够在离散表示自编码中实现更好的语义丰富性和视觉保真度。研究表明，浅层特征保留了更丰富的局部细节，这与深层特征的高层语义互补。实验结果显示，Ideal在ImageNet上实现了0.61的重建性能，超越了之前的最佳方法。'}}}, {'id': 'https://huggingface.co/papers/2606.08788', 'title': 'MaskAlign: Token-Subset Representation Alignment for Efficient Diffusion Training', 'url': 'https://huggingface.co/papers/2606.08788', 'abstract': 'Abstract Token-subset representation alignment method called MaskAlign improves diffusion transformer training by reducing reliance on complete token sets and maintaining stable alignment behavior under perturbations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Representation alignment with pretrained vision models has recently shown strong potential for accelerating diffusion transformer training. By aligning intermediate diffusion features with clean-image representations from self-supervised vision encoders, existing methods improve convergence and generation quality. However, such alignment also introduces a non-trivial constraint: diffusion models operate on noisy inputs whose usable information varies across timesteps, while the reference features are extracted from clean images. In this paper, we revisit this mismatch from a token-level perspective. We find that, under full-token representation alignment, tokens with large alignment-gradient norms exhibit a stable spatial preference, suggesting that the alignment objective does not affect all tokens uniformly and may encourage the model to rely on the complete set of clean-image tokens. To address this issue, we propose MaskAlign, a token-subset representation alignment method that applies alignment to randomly sampled token subsets during training. By exposing the model to different token subsets across iterations, MaskAlign reduces the dependence of representation alignment on the complete token set and encourages alignment behavior that is more stable under token-subset perturbations. To mitigate the information loss caused by directly dropping tokens, we further introduce a lightweight pre-mask token mixing block that shares information across tokens before masking.', 'score': 1, 'issue_id': 2417, 'pub_date': '2026-06-07', 'pub_date_card': {'ru': '7 июня', 'en': 'June 7', 'zh': '6月7日'}, 'hash': '0cb2cd9b1e76f7ed', 'authors': ['Lianyu Pang', 'Tianlin Pan', 'Cheng Da', 'Changqian Yu', 'Huan Yang', 'Kun Gai', 'Song Guo', 'Wenhan Luo'], 'affiliations': ['Kuaishou Technology', 'The Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.08788.jpg', 'data': {'categories': ['#architecture', '#cv', '#diffusion', '#optimization', '#training'], 'emoji': '🎭', 'ru': {'title': 'Выравнивание представлений через случайные подмножества токенов', 'desc': 'В статье предлагается метод MaskAlign для улучшения обучения диффузионных трансформеров путём выравнивания представлений (representation alignment) с предобученными моделями зрения. Авторы обнаружили, что при полном выравнивании всех токенов модель становится чрезмерно зависимой от полного набора чистых изображений, что приводит к нестабильности при возмущениях. Предложенный метод применяет выравнивание только к случайно выбранным подмножествам токенов во время обучения, что снижает эту зависимость и делает выравнивание более устойчивым. Дополнительно вводится лёгкий блок перемешивания токенов перед маскированием для компенсации потери информации.'}, 'en': {'title': 'Enhancing Diffusion Transformers with Token-Subset Alignment', 'desc': 'The paper introduces MaskAlign, a method that enhances the training of diffusion transformers by focusing on subsets of tokens instead of requiring all tokens for alignment. This approach helps maintain stable alignment behavior even when some tokens are perturbed or missing. By aligning intermediate diffusion features with representations from self-supervised vision models, MaskAlign improves both the convergence speed and the quality of generated outputs. Additionally, a pre-mask token mixing block is introduced to share information among tokens, reducing the impact of information loss when tokens are dropped during training.'}, 'zh': {'title': 'MaskAlign：提升扩散变换器训练的稳定性', 'desc': '本文提出了一种名为MaskAlign的子集表示对齐方法，旨在改善扩散变换器的训练。该方法通过在训练过程中随机抽取令牌子集进行对齐，减少了对完整令牌集的依赖，从而提高了对齐行为的稳定性。研究发现，完整令牌对齐会导致模型对干净图像令牌的过度依赖，而MaskAlign则通过不同的令牌子集暴露模型，缓解了这一问题。此外，本文还引入了一种轻量级的预掩码令牌混合模块，以在掩码之前共享令牌间的信息，进一步减少信息损失。'}}}, {'id': 'https://huggingface.co/papers/2606.08039', 'title': 'MuJoCo-Drones-Gym: A GPU-Accelerated Multi-Drone Simulator for Control and Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.08039', 'abstract': "Abstract A Gymnasium-compatible multi-drone simulation environment built on MuJoCo physics engine that supports flexible physics models, action interfaces, and observation spaces for reinforcement learning applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Robotic simulators are a cornerstone of modern research in aerial robotics, serving both as a vehicle for the development of new control algorithms and as the data source for training reinforcement learning (RL) policies. Yet, existing quadcopter learning environments often face a trade-off between physical fidelity, multi-agent support, and the throughput required by modern deep RL pipelines. In this paper, we present MuJoCo-Drones-Gym, an open-source Gymnasium-compatible multi-drone environment built on top of the MuJoCo physics engine. MuJoCo-Drones-Gym supports an arbitrary number of Bitcraze Crazyflie 2.x nano-quadcopters and exposes a modular API for selecting (i)~the physics model (rigid-body MuJoCo, explicit Python dynamics, or any subset of ground effect, blade drag, and inter-drone downwash), (ii)~the action interface (per-motor RPMs, collective normalized thrust, velocity setpoints, or PID waypoint commands), and (iii)~the observation space (kinematic state vectors, RGB / depth / segmentation cameras, or neighbourhood adjacency information). A PettingZoo ParallelEnv wrapper enables drop-in multi-agent reinforcement learning, while a suite of seven task environments, hover, velocity tracking, multi-drone hover, waypoint navigation, formation flight, gate racing, and a generic multi-agent template, demonstrates the breadth of the interface. We describe the environment design, the underlying physics and quadcopter dynamics, and illustrate its use through control and learning examples that mirror those of the closely related gym-pybullet-drones project, while taking advantage of MuJoCo's improved contact handling, rendering, and parallelizability.", 'score': 1, 'issue_id': 2417, 'pub_date': '2026-06-06', 'pub_date_card': {'ru': '6 июня', 'en': 'June 6', 'zh': '6月6日'}, 'hash': 'e41baa69b6689716', 'authors': ['Manan Tayal'], 'affiliations': ['TAU-Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2606.08039.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark', '#robotics'], 'emoji': '🚁', 'ru': {'title': 'Гибкая платформа для обучения многодроновых систем на основе реалистичной физики', 'desc': 'Авторы представляют MuJoCo-Drones-Gym — открытую симуляционную среду для обучения с подкреплением многодроновых систем на основе физического движка MuJoCo. Среда поддерживает гибкую конфигурацию физических моделей, интерфейсов управления и пространств наблюдений, что позволяет исследователям выбирать оптимальный баланс между точностью симуляции и вычислительной производительностью. Интеграция с фреймворком PettingZoo обеспечивает удобный API для мультиагентного обучения с подкреплением, а набор предзаданных задач демонстрирует универсальность платформы. Платформа превосходит существующие аналоги благодаря лучшей обработке контактов, возможностям рендеринга и параллелизации вычислений.'}, 'en': {'title': 'Empowering Multi-Drone Learning with MuJoCo-Drones-Gym', 'desc': 'This paper introduces MuJoCo-Drones-Gym, a versatile simulation environment for multi-drone applications compatible with Gymnasium, leveraging the MuJoCo physics engine. It allows researchers to customize various aspects such as physics models, action interfaces, and observation spaces, facilitating the development of reinforcement learning (RL) algorithms. The environment supports multiple drones, specifically the Bitcraze Crazyflie 2.x, and includes a range of tasks to test RL policies, from basic hovering to complex formation flying. By providing a modular API and enhanced physics capabilities, this platform aims to bridge the gap between high-fidelity simulations and the demands of modern deep RL training.'}, 'zh': {'title': '多无人机仿真环境的创新与应用', 'desc': '本文介绍了一个基于MuJoCo物理引擎的多无人机仿真环境MuJoCo-Drones-Gym，兼容Gymnasium，支持灵活的物理模型、动作接口和观察空间，适用于强化学习应用。该环境能够支持任意数量的Bitcraze Crazyflie 2.x纳米四旋翼，并提供模块化API，用户可以选择不同的物理模型、动作接口和观察空间。通过PettingZoo ParallelEnv包装器，该环境支持多智能体强化学习，并提供七个任务环境示例，展示了接口的广泛性。我们还描述了环境设计、物理基础和四旋翼动力学，并通过控制和学习示例展示其应用。'}}}, {'id': 'https://huggingface.co/papers/2606.13672', 'title': 'WEAVER, Better, Faster, Longer: An Effective World Model for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.13672', 'abstract': 'Abstract WEAVER is a multi-view world model architecture that achieves high fidelity, consistency, and efficiency in robotic manipulation tasks through flow-matching loss and demonstrates superior performance in policy evaluation, improvement, and test-time planning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The potential impacts of world models (WMs, i.e., learned simulators) on robotics are far-reaching -- policy evaluation, policy improvement, and test-time planning -- all with limited real-world interaction. To unlock these downstream capabilities, a WM needs to jointly satisfy three desiderata: (i) fidelity (i.e., producing simulated trajectories that correlate with reality), (ii) consistency (i.e., producing simulated trajectories that are coherent over long horizons), and (iii) efficiency (i.e., producing simulated trajectories quickly). We propose WEAVER (World Estimation Across Views for Embodied Reasoning): a WM architecture that simultaneously achieves all three desiderata, providing state-of-the-art results on robotic manipulation tasks. WEAVER is a multi-view WM trained to predict future latents and reward values via a flow-matching loss. We distill the key design decisions across model architecture, memory, and prediction objectives required to unlock the kinds of long-horizon dynamic manipulation tasks that have confounded prior world modeling approaches. We apply WEAVER in robotic hardware, demonstrating its effectiveness at policy evaluation (ρ=0.870 correlation with real-world success rate), policy improvement (real-world success rate improvement of 38% on top of the π_{0.5} robot foundation model), and test-time planning (real-world success rate improvement of 14% with a 5-10times speedup over prior WMs). WEAVER also demonstrates better performance than prior WMs when evaluated on out-of-distribution scenarios. Code, models, and videos at: https://arnavkj1995.github.io/WEAVER/ .', 'score': 0, 'issue_id': 2416, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '7c710e1f01651173', 'authors': ['Arnav Kumar Jain', 'Yilin Wu', 'Jesse Farebrother', 'Gokul Swamy', 'Andrea Bajcsy'], 'affiliations': ['Carnegie Mellon University', 'McGill University', 'Mila - Québec AI Institute', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2606.13672.jpg', 'data': {'categories': ['#robotics', '#architecture', '#video'], 'emoji': '🤖', 'ru': {'title': 'Модель мира для робототехники через многовидовые представления', 'desc': 'WEAVER — это архитектура модели мира на основе множественных представлений, которая обучается предсказывать будущие скрытые состояния и значения вознаграждения с помощью flow-matching потерь. Модель одновременно достигает высокую точность (соответствие симуляции реальности), последовательность (согласованность предсказаний на длинных горизонтах) и эффективность (быстрое генерирование траекторий). WEAVER применяется для оценки политик, их улучшения и планирования во время тестирования в задачах манипуляции роботами с минимальным взаимодействием с реальным миром. Результаты показывают значительное улучшение успешности выполнения задач на реальных роботах и лучшую обобщаемость на распределения данных, отличные от обучающих.'}, 'en': {'title': 'WEAVER: Revolutionizing Robotic Manipulation with Multi-View World Models', 'desc': 'WEAVER is a novel multi-view world model architecture designed for robotic manipulation tasks, focusing on high fidelity, consistency, and efficiency. It utilizes a flow-matching loss to predict future states and reward values, enabling effective policy evaluation and improvement with minimal real-world interaction. The architecture achieves superior performance by generating simulated trajectories that closely align with real-world outcomes, maintaining coherence over time, and doing so rapidly. By addressing the challenges of long-horizon dynamic manipulation, WEAVER outperforms previous models, demonstrating significant improvements in real-world success rates and planning efficiency.'}, 'zh': {'title': 'WEAVER：高效一致的多视角世界模型', 'desc': 'WEAVER是一种多视角世界模型架构，能够在机器人操作任务中实现高保真度、一致性和高效率。它通过流匹配损失来预测未来的潜在状态和奖励值，从而在策略评估、改进和测试时规划中表现出色。WEAVER同时满足了保真度、一致性和效率三个关键要求，提供了最先进的机器人操作结果。该模型在实际硬件上应用，显示出在策略评估和改进方面的显著效果，且在处理分布外场景时表现优于以往的世界模型。'}}}];

        let selectedCategories = [];

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');

            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (4)', '#agents (10)', '#agi', '#alignment (1)', '#architecture (7)', '#audio', '#benchmark (11)', '#cv (6)', '#data', '#dataset (4)', '#diffusion (4)', '#ethics', '#games', '#graphs (1)', '#hallucinations (1)', '#healthcare', '#inference (4)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (3)', '#multilingual (1)', '#multimodal (7)', '#open_source (5)', '#optimization (8)', '#plp', '#rag', '#reasoning (6)', '#rl (5)', '#rlhf (1)', '#robotics (3)', '#science (2)', '#security (1)', '#small_models (1)', '#story_generation', '#survey', '#synthetic (2)', '#training (11)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-12 07:16',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-12 07:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-12 07:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
