ent studies, the paper identifies trends and offers insights into when each method is most effective, paving the way for future advancements in LLM training.'}, 'zh': {'title': '统一视角下的后训练：SFT与RL的结合', 'desc': '预训练的大型语言模型（LLM）具有广泛的能力，但在特定任务或领域中，其准确性和推理的可靠性通常依赖于监督微调（SFT）或强化学习（RL）的后训练。尽管这两种方法常被视为独立的，但最近的理论和实证研究表明，SFT和RL之间存在密切的联系。本文提供了对LLM后训练的全面统一视角，深入分析了这两种技术的目标、算法结构和数据需求，并探讨了它们的相互作用。通过分析2023至2025年的应用研究，本文识别出新兴趋势，强调混合后训练范式的快速转变，并总结出关键要点，以阐明每种方法何时以及为何最有效。'}}}, {'id': 'https://huggingface.co/papers/2603.12529', 'title': 'TERMINATOR: Learning Optimal Exit Points for Early Stopping in Chain-of-Thought Reasoning', 'url': 'https://huggingface.co/papers/2603.12529', 'abstract': "Abstract TERMINATOR is an early-exit method for large reasoning models that reduces unnecessary computation by identifying optimal reasoning lengths for efficient chain-of-thought reasoning.  \t\t\t\t\tAI-generated summary Large Reasoning Models (LRMs) achieve impressive performance on complex reasoning tasks via Chain-of-Thought (CoT) reasoning, which enables them to generate intermediate thinking tokens before arriving at the final answer. However, LRMs often suffer from significant overthinking, spending excessive compute time even after the answer is generated early on. Prior work has identified the existence of an optimal reasoning length such that truncating reasoning at this point significantly shortens CoT outputs with virtually no change in performance. However, determining optimal CoT lengths for practical datasets is highly non-trivial as they are fully task and model-dependent. In this paper, we precisely address this and design TERMINATOR, an early-exit strategy for LRMs at inference to mitigate overthinking. The central idea underpinning TERMINATOR is that the first arrival of an LRM's final answer is often predictable, and we leverage these first answer positions to create a novel dataset of optimal reasoning lengths to train TERMINATOR. Powered by this approach, TERMINATOR achieves significant reductions in CoT lengths of 14%-55% on average across four challenging practical datasets: MATH-500, AIME 2025, HumanEval, and GPQA, whilst outperforming current state-of-the-art methods.", 'score': 3, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '94fdb8836b3ecbb3', 'authors': ['Alliot Nagle', 'Jakhongir Saydaliev', 'Dhia Garbaya', 'Michael Gastpar', 'Ashok Vardhan Makkuva', 'Hyeji Kim'], 'affiliations': ['ENS Paris-Saclay, France', 'EPFL, Switzerland', 'Télécom Paris (IP Paris), France', 'UT Austin, US'], 'pdf_title_img': 'assets/pdf/title_img/2603.12529.jpg', 'data': {'categories': ['#optimization', '#reasoning'], 'emoji': '🛑', 'ru': {'title': 'Знайте, когда остановиться: оптимальное прерывание рассуждений в больших моделях', 'desc': 'TERMINATOR — это метод ранней остановки для больших моделей рассуждения, который снижает вычислительные затраты, определяя оптимальные длины цепочки мыслей. Авторы заметили, что модели часто переусложняют рассуждения, продолжая генерировать токены даже после того, как ответ уже найден. Для решения этой проблемы они разработали стратегию, которая использует позиции первого появления ответа для создания набора данных оптимальных длин рассуждений. В результате TERMINATOR сокращает длину цепочки мыслей на 14-55% в среднем на четырёх сложных датасетах, одновременно улучшая качество решения.'}, 'en': {'title': 'Optimize Reasoning, Minimize Computation with TERMINATOR!', 'desc': 'TERMINATOR is a method designed to improve the efficiency of large reasoning models (LRMs) by reducing unnecessary computations during chain-of-thought (CoT) reasoning. It identifies optimal reasoning lengths, allowing the model to exit early when the final answer is likely to be reached, thus minimizing overthinking. By creating a dataset that captures the first answer positions, TERMINATOR trains the model to predict when to stop reasoning without sacrificing performance. This approach leads to a significant reduction in reasoning lengths, achieving 14%-55% shorter outputs while outperforming existing methods on various challenging datasets.'}, 'zh': {'title': 'TERMINATOR：优化推理长度，提升效率', 'desc': 'TERMINATOR是一种针对大型推理模型的早期退出方法，通过识别最佳推理长度来减少不必要的计算，从而提高链式思维推理的效率。大型推理模型在复杂推理任务中表现出色，但常常会出现过度思考的问题，导致计算时间过长。研究表明，存在一个最佳推理长度，截断推理可以显著缩短链式思维输出而几乎不影响性能。本文提出TERMINATOR，通过预测模型首次给出最终答案的位置，创建了一个新的最佳推理长度数据集，从而有效减少了推理长度。'}}}, {'id': 'https://huggingface.co/papers/2603.15206', 'title': 'Efficient Document Parsing via Parallel Token Prediction', 'url': 'https://huggingface.co/papers/2603.15206', 'abstract': 'Abstract  Document parsing, as a fundamental yet crucial vision task, is being revolutionized by vision-language models (VLMs). However, the autoregressive (AR) decoding inherent to VLMs creates a significant bottleneck, severely limiting parsing speed. In this paper, we propose Parallel-Token Prediction (PTP), a plugable, model-agnostic and simple-yet-effective method that enables VLMs to generate multiple future tokens in parallel with improved sample efficiency. Specifically, we insert some learnable tokens into the input sequence and design corresponding training objectives to equip the model with parallel decoding capabilities for document parsing. Furthermore, to support effective training, we develop a comprehensive data generation pipeline that efficiently produces large-scale, high-quality document parsing training data for VLMs. Extensive experiments on OmniDocBench and olmOCR-bench demonstrate that our method not only significantly improves decoding speed (1.6x-2.2x) but also reduces model hallucinations and exhibits strong generalization abilities.', 'score': 2, 'issue_id': 1524, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '86b2a4134e767877', 'authors': ['Lei Li', 'Ze Zhao', 'Meng Li', 'Zhongwang Lun', 'Yi Yuan', 'Xingjing Lu', 'Zheng Wei', 'Jiang Bian', 'Zang Li'], 'affiliations': ['Platform and Content Group, Tencent', 'Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.15206.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Параллельное предсказание токенов для ускорения парсинга документов', 'desc': 'В работе предлагается метод Parallel-Token Prediction (PTP) для ускорения работы vision-language models при решении задачи парсинга документов. Авторы вставляют обучаемые токены в последовательность и разрабатывают соответствующие целевые функции, позволяя модели генерировать несколько токенов параллельно вместо последовательного декодирования. Дополнительно создан конвейер генерации данных для производства высококачественных обучающих данных для парсинга документов. Экспериментальные результаты показывают улучшение скорости декодирования в 1.6-2.2 раза, снижение галлюцинаций модели и хорошую обобщающую способность.'}, 'en': {'title': 'Speeding Up Document Parsing with Parallel-Token Prediction', 'desc': 'This paper addresses the challenge of slow parsing speeds in document parsing tasks using vision-language models (VLMs) due to their autoregressive decoding nature. The authors introduce a method called Parallel-Token Prediction (PTP), which allows VLMs to generate multiple tokens simultaneously, enhancing sample efficiency. By incorporating learnable tokens into the input sequence and creating specific training objectives, the model gains the ability to decode in parallel. The proposed approach is validated through extensive experiments, showing significant improvements in decoding speed and reduced model hallucinations, while also demonstrating strong generalization capabilities.'}, 'zh': {'title': '提升文档解析速度的并行标记预测方法', 'desc': '本文提出了一种新的文档解析方法，称为并行标记预测（PTP），旨在提高视觉语言模型（VLMs）的解析速度。传统的自回归解码方式限制了解析的效率，而PTP通过插入可学习的标记并设计相应的训练目标，使模型能够并行生成多个未来标记。我们还开发了一个全面的数据生成管道，以高效地生产大规模、高质量的文档解析训练数据。实验结果表明，PTP显著提高了解码速度，并减少了模型的幻觉现象，展现了良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.15016', 'title': 'Riemannian Motion Generation: A Unified Framework for Human Motion Representation and Generation via Riemannian Flow Matching', 'url': 'https://huggingface.co/papers/2603.15016', 'abstract': 'Abstract  Human motion generation is often learned in Euclidean spaces, although valid motions follow structured non-Euclidean geometry. We present Riemannian Motion Generation (RMG), a unified framework that represents motion on a product manifold and learns dynamics via Riemannian flow matching. RMG factorizes motion into several manifold factors, yielding a scale-free representation with intrinsic normalization, and uses geodesic interpolation, tangent-space supervision, and manifold-preserving ODE integration for training and sampling. On HumanML3D, RMG achieves state-of-the-art FID in the HumanML3D format (0.043) and ranks first on all reported metrics under the MotionStreamer format. On MotionMillion, it also surpasses strong baselines (FID 5.6, R@1 0.86). Ablations show that the compact T+R (translation + rotations) representation is the most stable and effective, highlighting geometry-aware modeling as a practical and scalable route to high-fidelity motion generation.', 'score': 2, 'issue_id': 1524, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '7f589613424cb53c', 'authors': ['Fangran Miao', 'Jian Huang', 'Ting Li'], 'affiliations': ['Southern University of Science and Technology', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15016.jpg', 'data': {'categories': [], 'emoji': '🧘', 'ru': {'title': 'Геометрия движений: генерация анимаций в неевклидовом пространстве', 'desc': 'В работе предложен новый подход к генерации движений человека, который учитывает их геометрическую структуру в неевклидовом пространстве. Авторы представляют Riemannian Motion Generation (RMG) — унифицированный фреймворк, который представляет движение на произведении многообразий и обучает динамику через риманов flow matching. Метод факторизирует движение на несколько компонент многообразия, используя геодезическую интерполяцию и интегрирование дифференциальных уравнений с сохранением структуры многообразия. На стандартных бенчмарках HumanML3D и MotionMillion модель достигает лучших результатов, что показывает эффективность геометрически-осознанного моделирования для высокоточной генерации движений.'}, 'en': {'title': 'Riemannian Motion Generation: Elevating Human Motion with Geometry', 'desc': 'This paper introduces Riemannian Motion Generation (RMG), a new approach for generating human motion that respects the complex geometry of motion spaces. Instead of using traditional Euclidean methods, RMG operates on a product manifold, allowing for a more accurate representation of motion dynamics. The framework employs techniques like geodesic interpolation and tangent-space supervision to enhance training and sampling processes. Results show that RMG outperforms existing methods on benchmark datasets, demonstrating the effectiveness of geometry-aware modeling in producing realistic human movements.'}, 'zh': {'title': '黎曼运动生成：高保真运动的几何建模', 'desc': '人类运动生成通常在欧几里得空间中学习，但有效的运动遵循结构化的非欧几里得几何。我们提出了黎曼运动生成（RMG），这是一个统一框架，能够在乘积流形上表示运动，并通过黎曼流匹配学习动态。RMG将运动分解为多个流形因子，提供无尺度的表示和内在归一化，并使用测地线插值、切空间监督和保持流形的常微分方程积分进行训练和采样。在HumanML3D上，RMG在HumanML3D格式中实现了最先进的FID（0.043），并在MotionStreamer格式下的所有报告指标中排名第一。'}}}, {'id': 'https://huggingface.co/papers/2603.12743', 'title': 'MoKus: Leveraging Cross-Modal Knowledge Transfer for Knowledge-Aware Concept Customization', 'url': 'https://huggingface.co/papers/2603.12743', 'abstract': 'Abstract Knowledge-aware concept customization binds textual knowledge to visual concepts through a two-stage framework that learns visual anchors and updates textual knowledge for high-fidelity generation, supported by a new benchmark and cross-modal transfer capabilities.  \t\t\t\t\tAI-generated summary Concept customization typically binds rare tokens to a target concept. Unfortunately, these approaches often suffer from unstable performance as the pretraining data seldom contains these rare tokens. Meanwhile, these rare tokens fail to convey the inherent knowledge of the target concept. Consequently, we introduce Knowledge-aware Concept Customization, a novel task aiming at binding diverse textual knowledge to target visual concepts. This task requires the model to identify the knowledge within the text prompt to perform high-fidelity customized generation. Meanwhile, the model should efficiently bind all the textual knowledge to the target concept. Therefore, we propose MoKus, a novel framework for knowledge-aware concept customization. Our framework relies on a key observation: cross-modal knowledge transfer, where modifying knowledge within the text modality naturally transfers to the visual modality during generation. Inspired by this observation, MoKus contains two stages: (1) In visual concept learning, we first learn the anchor representation to store the visual information of the target concept. (2) In textual knowledge updating, we update the answer for the knowledge queries to the anchor representation, enabling high-fidelity customized generation. To further comprehensively evaluate our proposed MoKus on the new task, we introduce the first benchmark for knowledge-aware concept customization: KnowCusBench. Extensive evaluations have demonstrated that MoKus outperforms state-of-the-art methods. Moreover, the cross-model knowledge transfer allows MoKus to be easily extended to other knowledge-aware applications like virtual concept creation and concept erasure. We also demonstrate the capability of our method to achieve improvements on world knowledge benchmarks.', 'score': 2, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '574c99583564832f', 'authors': ['Chenyang Zhu', 'Hongxiang Li', 'Xiu Li', 'Long Chen'], 'affiliations': ['HKUST', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12743.jpg', 'data': {'categories': ['#transfer_learning', '#multimodal', '#benchmark', '#cv'], 'emoji': '🧠', 'ru': {'title': 'Связывание знаний с визуальными концепциями через кросс-модальную передачу', 'desc': 'В работе предлагается новый подход Knowledge-aware Concept Customization, который связывает текстовые знания с визуальными концепциями для высокофidelity генерации. Авторы представляют фреймворк MoKus с двумя этапами: обучение якорного представления для сохранения визуальной информации концепции и обновление текстовых знаний путем модификации ответов на запросы знаний. Ключевая идея основана на наблюдении о кросс-модальной передаче знаний, когда изменения в текстовой модальности естественным образом переносятся в визуальную при генерации. Для оценки предложенного метода введен новый бенчмарк KnowCusBench, и продемонстрирована применимость подхода к смежным задачам типа создания виртуальных концепций и удаления концепций.'}, 'en': {'title': 'Bridging Text and Visuals for Enhanced Concept Customization', 'desc': 'This paper introduces Knowledge-aware Concept Customization, a method that connects textual knowledge to visual concepts for better generation results. The proposed framework, MoKus, operates in two stages: first, it learns visual anchors to represent the target concepts, and second, it updates textual knowledge to enhance the generation process. By leveraging cross-modal knowledge transfer, MoKus effectively binds diverse textual information to visual representations, leading to high-fidelity outputs. The authors also present a new benchmark, KnowCusBench, to evaluate the performance of their method against existing approaches, showing significant improvements in various applications.'}, 'zh': {'title': '知识感知概念定制：视觉与文本的完美结合', 'desc': '知识感知概念定制是一种新任务，旨在将多样的文本知识与目标视觉概念绑定。我们提出了MoKus框架，通过两个阶段来实现这一目标：首先学习视觉概念的锚点表示，然后更新文本知识以实现高保真生成。该框架利用跨模态知识转移的特性，使得文本中的知识修改能够自然地转移到视觉生成中。通过引入新的基准KnowCusBench，我们的评估表明MoKus在性能上超越了现有的最先进方法，并且可以扩展到其他知识感知应用。'}}}, {'id': 'https://huggingface.co/papers/2603.13428', 'title': 'EvoClaw: Evaluating AI Agents on Continuous Software Evolution', 'url': 'https://huggingface.co/papers/2603.13428', 'abstract': "Abstract  With AI agents increasingly deployed as long-running systems, it becomes essential to autonomously construct and continuously evolve customized software to enable interaction within dynamic environments. Yet, existing benchmarks evaluate agents on isolated, one-off coding tasks, neglecting the temporal dependencies and technical debt inherent in real-world software evolution. To bridge this gap, we introduce DeepCommit, an agentic pipeline that reconstructs verifiable Milestone DAGs from noisy commit logs, where milestones are defined as semantically cohesive development goals. These executable sequences enable EvoClaw, a novel benchmark that requires agents to sustain system integrity and limit error accumulation, dimensions of long-term software evolution largely missing from current benchmarks. Our evaluation of 12 frontier models across 4 agent frameworks reveals a critical vulnerability: overall performance scores drop significantly from >80% on isolated tasks to at most 38% in continuous settings, exposing agents' profound struggle with long-term maintenance and error propagation.", 'score': 2, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '6858cff907d51ec3', 'authors': ['Gangda Deng', 'Zhaoling Chen', 'Zhongming Yu', 'Haoyang Fan', 'Yuhong Liu', 'Yuxin Yang', 'Dhruv Parikh', 'Rajgopal Kannan', 'Le Cong', 'Mengdi Wang', 'Qian Zhang', 'Viktor Prasanna', 'Xiangru Tang', 'Xingyao Wang'], 'affiliations': ['Army Research Office', 'Haven', 'OpenHands', 'Princeton', 'Stanford', 'UCR', 'UCSD', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2603.13428.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🧬', 'ru': {'title': 'Когда агенты забывают: как LLM теряют компетентность при долгосрочной разработке кода', 'desc': 'В статье представлена новая методология для оценки агентов на основе LLM, которые работают с кодом в течение длительного времени. Авторы разработали DeepCommit — систему, которая из шумных логов коммитов восстанавливает семантически связанные этапы разработки (Milestone DAGs), представляющие реальные цели проекта. На основе этой методологии создан бенчмарк EvoClaw, требующий от агентов поддерживать целостность системы и ограничивать накопление ошибок при длительной эволюции кода. Исследование показало критическую уязвимость: производительность современных моделей падает с >80% на изолированных задачах до максимум 38% в условиях непрерывной разработки, что указывает на серьёзные трудности агентов с долгосрочным поддержанием и распространением ошибок.'}, 'en': {'title': 'Empowering AI for Continuous Software Evolution', 'desc': 'This paper presents DeepCommit, a new framework designed to help AI agents manage software development over time. Unlike traditional benchmarks that focus on single coding tasks, DeepCommit emphasizes the importance of ongoing software evolution and maintenance. It introduces EvoClaw, a benchmark that tests agents on their ability to maintain system integrity while managing errors over time. The study reveals that many AI models perform well on isolated tasks but struggle significantly in continuous development scenarios, highlighting a critical gap in current AI capabilities for long-term software management.'}, 'zh': {'title': '构建智能代理的长期软件演化能力', 'desc': '随着人工智能代理越来越多地被部署为长期运行的系统，自动构建和持续演化定制软件以便在动态环境中进行交互变得至关重要。现有的基准测试主要评估代理在孤立的、一次性的编码任务上的表现，忽视了现实世界软件演化中固有的时间依赖性和技术债务。为了解决这个问题，我们提出了DeepCommit，这是一种代理管道，可以从嘈杂的提交日志中重建可验证的里程碑有向无环图（DAG），里程碑被定义为语义上连贯的开发目标。这些可执行的序列使得EvoClaw成为一种新基准，要求代理维持系统完整性并限制错误积累，这是当前基准测试中缺失的长期软件演化的重要维度。'}}}, {'id': 'https://huggingface.co/papers/2603.15389', 'title': 'When Does Sparsity Mitigate the Curse of Depth in LLMs', 'url': 'https://huggingface.co/papers/2603.15389', 'abstract': 'Abstract  Recent work has demonstrated the curse of depth in large language models (LLMs), where later layers contribute less to learning and representation than earlier layers. Such under-utilization is linked to the accumulated growth of variance in Pre-Layer Normalization, which can push deep blocks toward near-identity behavior. In this paper, we demonstrate that, sparsity, beyond enabling efficiency, acts as a regulator of variance propagation and thereby improves depth utilization. Our investigation covers two sources of sparsity: (i) implicit sparsity, which emerges from training and data conditions, including weight sparsity induced by weight decay and attention sparsity induced by long context inputs; and (ii) explicit sparsity, which is enforced by architectural design, including key/value-sharing sparsity in Grouped-Query Attention and expert-activation sparsity in Mixtureof-Experts. Our claim is thoroughly supported by controlled depth-scaling experiments and targeted layer effectiveness interventions. Across settings, we observe a consistent relationship: sparsity improves layer utilization by reducing output variance and promoting functional differentiation. We eventually distill our findings into a practical rule-of-thumb recipe for training deptheffective LLMs, yielding a notable 4.6% accuracy improvement on downstream tasks. Our results reveal sparsity, arising naturally from standard design choices, as a key yet previously overlooked mechanism for effective depth scaling in LLMs. Code is available at https://github.com/pUmpKin-Co/SparsityAndCoD.', 'score': 1, 'issue_id': 1525, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '18d67bc98dd19d4b', 'authors': ['Dilxat Muhtar', 'Xinyuan Song', 'Sebastian Pokutta', 'Max Zimmer', 'Nico Pelleriti', 'Thomas Hofmann', 'Shiwei Liu'], 'affiliations': ['ELLIS Institute Tubingen', 'ETH Zurich', 'Emory University', 'Max Planck Institute for Intelligent Systems', 'Technical University of Berlin', 'Tubingen AI Center', 'Zuse Institute Berlin'], 'pdf_title_img': 'assets/pdf/title_img/2603.15389.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🎯', 'ru': {'title': 'Разреженность как решение для эффективного обучения глубоких языковых моделей', 'desc': 'В работе исследуется проблема неэффективного использования глубоких слоёв в больших языковых моделях, вызванная накоплением дисперсии при распространении активаций. Авторы показывают, что разреженность (sparsity) — как естественно возникающая из условий обучения, так и явно введённая архитектурой — регулирует распространение дисперсии и улучшает эффективность глубоких сетей. Исследование охватывает различные источники разреженности: разреженность весов, разреженность внимания, групповое внимание к ключам и смешанные эксперты. Результаты подтверждают, что разреженность повышает использование слоёв, снижая выходную дисперсию и способствуя функциональной дифференциации слоёв.'}, 'en': {'title': 'Harnessing Sparsity for Deeper Learning in LLMs', 'desc': 'This paper addresses the issue of depth utilization in large language models (LLMs), where deeper layers often contribute less to learning. The authors identify that this under-utilization is caused by increased variance in Pre-Layer Normalization, leading to layers behaving almost identically. They propose that introducing sparsity, both implicit and explicit, can help regulate variance propagation and enhance the effectiveness of deeper layers. Their experiments show that applying sparsity improves layer utilization and accuracy in LLMs, providing a practical guideline for training more effective models.'}, 'zh': {'title': '稀疏性：提升深度利用的关键机制', 'desc': '最近的研究表明，在大型语言模型（LLMs）中，深度的诅咒使得后面的层对学习和表示的贡献低于前面的层。这种低效利用与预层归一化中的方差累积增长有关，可能导致深层块接近于恒等行为。本文展示了稀疏性不仅提高了效率，还作为方差传播的调节器，从而改善了深度利用。我们通过控制深度缩放实验和针对性层效能干预，验证了稀疏性在提高层利用率方面的有效性，最终提出了一种实用的训练深度有效LLMs的经验法则。'}}}, {'id': 'https://huggingface.co/papers/2603.14347', 'title': 'Motivation in Large Language Models', 'url': 'https://huggingface.co/papers/2603.14347', 'abstract': 'Abstract  Motivation is a central driver of human behavior, shaping decisions, goals, and task performance. As large language models (LLMs) become increasingly aligned with human preferences, we ask whether they exhibit something akin to motivation. We examine whether LLMs "report" varying levels of motivation, how these reports relate to their behavior, and whether external factors can influence them. Our experiments reveal consistent and structured patterns that echo human psychology: self-reported motivation aligns with different behavioral signatures, varies across task types, and can be modulated by external manipulations. These findings demonstrate that motivation is a coherent organizing construct for LLM behavior, systematically linking reports, choices, effort, and performance, and revealing motivational dynamics that resemble those documented in human psychology. This perspective deepens our understanding of model behavior and its connection to human-inspired concepts.', 'score': 1, 'issue_id': 1524, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': '933ab3f1c79bf189', 'authors': ['Omer Nahum', 'Asael Sklar', 'Ariel Goldstein', 'Roi Reichart'], 'affiliations': ['Cambridge University', 'Hebrew University', 'Reichman University', 'Technion'], 'pdf_title_img': 'assets/pdf/title_img/2603.14347.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Мотивация как организующий принцип поведения языковых моделей', 'desc': 'Исследователи изучают, проявляют ли большие языковые модели что-то подобное мотивации, как у людей. Они анализируют, как LLM сообщают о различных уровнях мотивации, как эти сообщения соотносятся с их поведением и можно ли на них влиять внешними факторами. Эксперименты показывают, что самооценённая мотивация согласуется с разными поведенческими паттернами, варьируется в зависимости от типа задачи и может модулироваться внешними воздействиями. Результаты демонстрируют, что мотивация является связным организующим конструктом для поведения LLM, систематически связывая отчёты, выбор, затраты усилий и производительность.'}, 'en': {'title': 'Unveiling Motivation in Language Models: A Human-Like Drive', 'desc': 'This paper explores the concept of motivation in large language models (LLMs) and how it influences their behavior. The authors investigate whether LLMs can express different levels of motivation and how these expressions correlate with their performance on various tasks. They find that LLMs show structured patterns similar to human motivation, where self-reported motivation affects their choices and effort. The study highlights that understanding motivation in LLMs can provide insights into their behavior and its parallels with human psychology.'}, 'zh': {'title': '揭示大型语言模型的动机动态', 'desc': '本研究探讨了大型语言模型（LLMs）是否表现出类似于人类的动机。我们发现，LLMs的自我报告动机与其行为之间存在一致的模式，且这种动机会因任务类型而异。外部因素也能影响LLMs的动机水平，显示出与人类心理学相似的动机动态。我们的发现表明，动机是理解LLMs行为的重要构建，能够系统地将报告、选择、努力和表现联系起来。'}}}, {'id': 'https://huggingface.co/papers/2603.14313', 'title': 'Mind the Shift: Decoding Monetary Policy Stance from FOMC Statements with Large Language Models', 'url': 'https://huggingface.co/papers/2603.14313', 'abstract': 'Abstract  Federal Open Market Committee (FOMC) statements are a major source of monetary-policy information, and even subtle changes in their wording can move global financial markets. A central task is therefore to measure the hawkish--dovish stance conveyed in these texts. Existing approaches typically treat stance detection as a standard classification problem, labeling each statement in isolation. However, the interpretation of monetary-policy communication is inherently relative: market reactions depend not only on the tone of a statement, but also on how that tone shifts across meetings. We introduce Delta-Consistent Scoring (DCS), an annotation-free framework that maps frozen large language model (LLM) representations to continuous stance scores by jointly modeling absolute stance and relative inter-meeting shifts. Rather than relying on manual hawkish--dovish labels, DCS uses consecutive meetings as a source of self-supervision. It learns an absolute stance score for each statement and a relative shift score between consecutive statements. A delta-consistency objective encourages changes in absolute scores to align with the relative shifts. This allows DCS to recover a temporally coherent stance trajectory without manual labels. Across four LLM backbones, DCS consistently outperforms supervised probes and LLM-as-judge baselines, achieving up to 71.1% accuracy on sentence-level hawkish--dovish classification. The resulting meeting-level scores are also economically meaningful: they correlate strongly with inflation indicators and are significantly associated with Treasury yield movements. Overall, the results suggest that LLM representations encode monetary-policy signals that can be recovered through relative temporal structure.', 'score': 1, 'issue_id': 1520, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': 'a0689cb0f571c249', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.14313.jpg', 'data': {'categories': ['#training', '#optimization'], 'emoji': '📊', 'ru': {'title': 'Разгадка монетарной политики через относительные временные сдвиги без разметки', 'desc': 'В работе предложен новый метод Delta-Consistent Scoring для определения тональности монетарной политики в заявлениях Федерального комитета по открытым рынкам без использования размеченных данных. Метод использует замороженные представления больших языковых моделей и моделирует одновременно абсолютную позицию и относительные изменения между последовательными заседаниями, создавая самоконтролируемую обучающую сигнал. Дельта-консистентность объективная функция стимулирует согласованность временной траектории позиций, позволяя восстановить монетарный тон без ручной разметки. Полученные оценки показывают сильную корреляцию с инфляционными показателями и существенную связь с движением доходности казначейских облигаций.'}, 'en': {'title': 'Understanding Monetary Policy Through Relative Tone Analysis', 'desc': 'This paper presents a new method called Delta-Consistent Scoring (DCS) for analyzing the tone of Federal Open Market Committee (FOMC) statements, which can influence financial markets. Instead of treating each statement as a separate classification task, DCS considers the relative changes in tone across different meetings. It uses large language models (LLMs) to generate continuous stance scores without needing manual labels, relying on the temporal structure of the statements. The results show that DCS effectively captures monetary-policy signals and correlates well with economic indicators, outperforming traditional supervised methods.'}, 'zh': {'title': '通过相对时间结构解码货币政策信号', 'desc': '本文介绍了一种新的方法，称为Delta-Consistent Scoring（DCS），用于分析美联储公开市场委员会（FOMC）声明中的鹰鸽立场。与传统的分类方法不同，DCS通过联合建模绝对立场和相对会议间的变化，来生成连续的立场评分，而无需手动标注。该方法利用连续会议作为自我监督的来源，学习每个声明的绝对立场分数和相邻声明之间的相对变化分数。实验结果表明，DCS在鹰鸽分类任务中表现优异，并且其生成的会议级别评分与经济指标有显著相关性。'}}}, {'id': 'https://huggingface.co/papers/2603.13884', 'title': 'SCoCCA: Multi-modal Sparse Concept Decomposition via Canonical Correlation Analysis', 'url': 'https://huggingface.co/papers/2603.13884', 'abstract': "Abstract  Interpreting the internal reasoning of vision-language models is essential for deploying AI in safety-critical domains. Concept-based explainability provides a human-aligned lens by representing a model's behavior through semantically meaningful components. However, existing methods are largely restricted to images and overlook the cross-modal interactions. Text-image embeddings, such as those produced by CLIP, suffer from a modality gap, where visual and textual features follow distinct distributions, limiting interpretability. Canonical Correlation Analysis (CCA) offers a principled way to align features from different distributions, but has not been leveraged for multi-modal concept-level analysis. We show that the objectives of CCA and InfoNCE are closely related, such that optimizing CCA implicitly optimizes InfoNCE, providing a simple, training-free mechanism to enhance cross-modal alignment without affecting the pre-trained InfoNCE objective. Motivated by this observation, we couple concept-based explainability with CCA, introducing Concept CCA (CoCCA), a framework that aligns cross-modal embeddings while enabling interpretable concept decomposition. We further extend it and propose Sparse Concept CCA (SCoCCA), which enforces sparsity to produce more disentangled and discriminative concepts, facilitating improved activation, ablation, and semantic manipulation. Our approach generalizes concept-based explanations to multi-modal embeddings and achieves state-of-the-art performance in concept discovery, evidenced by reconstruction and manipulation tasks such as concept ablation.", 'score': 1, 'issue_id': 1524, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '7e24ad0d07821187', 'authors': ['Ehud Gordon', 'Meir Yossef Levi', 'Guy Gilboa'], 'affiliations': ['Viterbi Faculty of Electrical and Computer Engineering, Technion Israel Institute of Technology, Haifa, Israel'], 'pdf_title_img': 'assets/pdf/title_img/2603.13884.jpg', 'data': {'categories': ['#multimodal', '#cv', '#interpretability', '#architecture'], 'emoji': '🔗', 'ru': {'title': 'Выравнивание мультимодальных эмбеддингов через концептуальный анализ', 'desc': 'Исследование посвящено интерпретируемости мультимодальных моделей, таких как CLIP, которые обрабатывают текст и изображения одновременно. Авторы предлагают использовать Canonical Correlation Analysis (CCA) для выравнивания признаков из разных модальностей и уменьшения разрыва между визуальными и текстовыми представлениями. Они вводят Concept CCA (CoCCA) — фреймворк, который объединяет концептуальное объяснение моделей с CCA, позволяя получить интерпретируемые и выравненные кроссмодальные эмбеддинги. Дополнительно предлагается Sparse Concept CCA (SCoCCA) с применением разреженности для получения более диагностируемых и дискриминативных концептов.'}, 'en': {'title': 'Enhancing Interpretability in Vision-Language Models with CoCCA', 'desc': 'This paper addresses the challenge of understanding how vision-language models make decisions, which is crucial for their use in sensitive applications. It introduces a new method called Concept CCA (CoCCA) that uses Canonical Correlation Analysis to align visual and textual features, improving interpretability. The authors also propose Sparse Concept CCA (SCoCCA), which enhances the clarity of concepts by enforcing sparsity, making them easier to analyze and manipulate. Overall, this work advances the field of concept-based explainability in multi-modal AI systems, achieving better performance in tasks related to concept discovery and manipulation.'}, 'zh': {'title': '跨模态对齐与可解释性的结合', 'desc': '本论文探讨了视觉-语言模型的内部推理，强调在安全关键领域部署人工智能的重要性。我们提出了一种基于概念的可解释性方法，通过语义上有意义的组件来表示模型的行为。我们引入了概念典型相关分析（CoCCA），该方法能够对跨模态嵌入进行对齐，并实现可解释的概念分解。进一步扩展为稀疏概念典型相关分析（SCoCCA），通过强制稀疏性来生成更具区分性的概念，从而提升了概念发现的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.13594', 'title': 'EnterpriseOps-Gym: Environments and Evaluations for Stateful Agentic Planning and Tool Use in Enterprise Settings', 'url': 'https://huggingface.co/papers/2603.13594', 'abstract': 'Abstract  Large language models are shifting from passive information providers to active agents intended for complex workflows. However, their deployment as reliable AI workers in enterprise is stalled by benchmarks that fail to capture the intricacies of professional environments, specifically, the need for long-horizon planning amidst persistent state changes and strict access protocols. In this work, we introduce EnterpriseOps-Gym, a benchmark designed to evaluate agentic planning in realistic enterprise settings. Specifically, EnterpriseOps-Gym features a containerized sandbox with 164 database tables and 512 functional tools to mimic real-world search friction. Within this environment, agents are evaluated on 1,150 expert-curated tasks across eight mission-critical verticals (including Customer Service, HR, and IT). Our evaluation of 14 frontier models reveals critical limitations in state-of-the-art models: the top-performing Claude Opus 4.5 achieves only 37.4% success. Further analysis shows that providing oracle human plans improves performance by 14-35 percentage points, pinpointing strategic reasoning as the primary bottleneck. Additionally, agents frequently fail to refuse infeasible tasks (best model achieves 53.9%), leading to unintended and potentially harmful side effects. Our findings underscore that current agents are not yet ready for autonomous enterprise deployment. More broadly, EnterpriseOps-Gym provides a concrete testbed to advance the robustness of agentic planning in professional workflows.', 'score': 1, 'issue_id': 1525, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '8993f908cc360b51', 'authors': ['Shiva Krishna Reddy Malay', 'Shravan Nayak', 'Jishnu Sethumadhavan Nair', 'Sagar Davasam', 'Aman Tiwari', 'Sathwik Tejaswi Madhusudhan', 'Sridhar Krishna Nemala', 'Srinivas Sunkara', 'Sai Rajeswar'], 'affiliations': ['Mila - Quebec AI Institute', 'ServiceNow Research', 'Universite de Montreal'], 'pdf_title_img': 'assets/pdf/title_img/2603.13594.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '🏢', 'ru': {'title': 'Оценка готовности агентов LLM к работе в реальных корпоративных системах', 'desc': 'В статье представлен EnterpriseOps-Gym — новый бенчмарк для оценки способности больших языковых моделей выполнять сложные задачи в корпоративной среде. Бенчмарк содержит 164 таблицы данных и 512 функциональных инструментов, а также 1150 экспертно составленных задач из восьми критически важных областей бизнеса. Оценка 14 передовых моделей показала, что даже лучшая модель (Claude Opus 4.5) достигает только 37.4% успеха, причём основным узким местом является стратегическое планирование в условиях изменяющегося состояния системы. Исследование выявило, что агенты на основе LLM в настоящее время не готовы к автономному развёртыванию в реальных корпоративных системах из-за недостаточной способности к отказу от выполнения невыполнимых задач.'}, 'en': {'title': 'Empowering AI Agents for Real-World Enterprise Challenges', 'desc': 'This paper discusses the limitations of large language models when used as active agents in enterprise settings. It introduces EnterpriseOps-Gym, a new benchmark designed to assess the ability of these models to perform complex planning tasks in realistic work environments. The benchmark includes a simulated environment with numerous database tables and tools, allowing for the evaluation of agents on a variety of tasks across different business sectors. The findings reveal that current models struggle with strategic reasoning and often fail to handle infeasible tasks, indicating they are not yet suitable for autonomous use in enterprises.'}, 'zh': {'title': '提升企业智能代理的计划能力', 'desc': '这篇论文讨论了大型语言模型在企业环境中的应用，特别是它们如何从被动的信息提供者转变为主动的工作代理。研究者们提出了一个新的基准测试工具，名为EnterpriseOps-Gym，旨在评估这些模型在复杂工作流程中的计划能力。通过模拟真实的企业环境，该工具包含了多个数据库表和功能工具，以测试模型在长时间规划和状态变化中的表现。研究结果显示，当前的模型在自主企业部署方面仍存在显著的局限性，特别是在战略推理和拒绝不切实际任务的能力上。'}}}, {'id': 'https://huggingface.co/papers/2603.15616', 'title': 'GlyphPrinter: Region-Grouped Direct Preference Optimization for Glyph-Accurate Visual Text Rendering', 'url': 'https://huggingface.co/papers/2603.15616', 'abstract': 'Abstract  Generating accurate glyphs for visual text rendering is essential yet challenging. Existing methods typically enhance text rendering by training on a large amount of high-quality scene text images, but the limited coverage of glyph variations and excessive stylization often compromise glyph accuracy, especially for complex or out-of-domain characters. Some methods leverage reinforcement learning to alleviate this issue, yet their reward models usually depend on text recognition systems that are insensitive to fine-grained glyph errors, so images with incorrect glyphs may still receive high rewards. Inspired by Direct Preference Optimization (DPO), we propose GlyphPrinter, a preference-based text rendering method that eliminates reliance on explicit reward models. However, the standard DPO objective only models overall preference between two samples, which is insufficient for visual text rendering where glyph errors typically occur in localized regions. To address this issue, we construct the GlyphCorrector dataset with region-level glyph preference annotations and propose Region-Grouped DPO (R-GDPO), a region-based objective that optimizes inter- and intra-sample preferences over annotated regions, substantially enhancing glyph accuracy. Furthermore, we introduce Regional Reward Guidance, an inference strategy that samples from an optimal distribution with controllable glyph accuracy. Extensive experiments demonstrate that the proposed GlyphPrinter outperforms existing methods in glyph accuracy while maintaining a favorable balance between stylization and precision.', 'score': 0, 'issue_id': 1523, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '07265d036837f57e', 'authors': ['Xincheng Shuai', 'Ziye Li', 'Henghui Ding', 'Dacheng Tao'], 'affiliations': ['Generative AI Lab, College of Computing and Data Science, Nanyang Technological University, Singapore', 'Institute of Big Data, College of Computer Science and Artificial Intelligence, Fudan University, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.15616.jpg', 'data': {'categories': [], 'emoji': '🔤', 'ru': {'title': 'Предпочтительное обучение для точной генерации символов в текстовом рендеринге', 'desc': 'В работе предлагается GlyphPrinter — метод генерации точных символов для визуализации текста, основанный на оптимизации предпочтений без явной модели награды, вдохновленный Direct Preference Optimization. Авторы создают датасет GlyphCorrector с аннотациями предпочтений на уровне регионов и предлагают Region-Grouped DPO (R-GDPO) — объективную функцию, которая оптимизирует внутри- и межвыборочные предпочтения в аннотированных областях текста. Это решение преодолевает ограничения методов на основе моделей награды, которые неточно определяют локализованные ошибки глифов, что часто приводит к некорректным результатам при усиленном обучении. Экспериментальные результаты показывают, что GlyphPrinter достигает значительного улучшения точности генерируемых символов при сохранении баланса между стилизацией и аккуратностью.'}, 'en': {'title': 'Enhancing Glyph Accuracy with Region-Grouped DPO', 'desc': 'This paper presents GlyphPrinter, a novel method for generating accurate glyphs in visual text rendering. It addresses the limitations of existing techniques that rely on large datasets and often overlook fine-grained glyph errors. By utilizing Direct Preference Optimization (DPO) and introducing a new dataset with region-level annotations, GlyphPrinter enhances glyph accuracy through a region-based objective. The method also incorporates Regional Reward Guidance to improve inference, resulting in superior performance compared to traditional approaches.'}, 'zh': {'title': '提升字形准确性的创新渲染方法', 'desc': '生成准确的字形对于视觉文本渲染至关重要，但这是一项具有挑战性的任务。现有方法通常依赖大量高质量场景文本图像进行训练，但字形变化的覆盖范围有限，过度的风格化往往会影响字形的准确性，尤其是在复杂或超出领域的字符上。我们提出了GlyphPrinter，这是一种基于偏好的文本渲染方法，消除了对显式奖励模型的依赖，并通过构建GlyphCorrector数据集和提出区域分组DPO（R-GDPO）来优化字形的准确性。实验结果表明，GlyphPrinter在字形准确性方面优于现有方法，同时在风格化和精度之间保持良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2603.15150', 'title': 'SNCE: Geometry-Aware Supervision for Scalable Discrete Image Generation', 'url': 'https://huggingface.co/papers/2603.15150', 'abstract': 'Abstract  Recent advancements in discrete image generation showed that scaling the VQ codebook size significantly improves reconstruction fidelity. However, training generative models with a large VQ codebook remains challenging, typically requiring larger model size and a longer training schedule. In this work, we propose Stochastic Neighbor Cross Entropy Minimization (SNCE), a novel training objective designed to address the optimization challenges of large-codebook discrete image generators. Instead of supervising the model with a hard one-hot target, SNCE constructs a soft categorical distribution over a set of neighboring tokens. The probability assigned to each token is proportional to the proximity between its code embedding and the ground-truth image embedding, encouraging the model to capture semantically meaningful geometric structure in the quantized embedding space. We conduct extensive experiments across class-conditional ImageNet-256 generation, large-scale text-to-image synthesis, and image editing tasks. Results show that SNCE significantly improves convergence speed and overall generation quality compared to standard cross-entropy objectives.', 'score': 0, 'issue_id': 1522, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '5952510e19f11897', 'authors': ['Shufan Li', 'Jiuxiang Gu', 'Kangning Liu', 'Zhe Lin', 'Aditya Grover', 'Jason Kuen'], 'affiliations': ['Adobe', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2603.15150.jpg', 'data': {'categories': ['#architecture', '#optimization', '#cv', '#training', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Мягкое обучение дискретных генераторов через соседний кросс-энтропийный минимум', 'desc': 'В работе предложен новый метод обучения SNCE для дискретной генерации изображений с большим VQ кодбуком. Вместо использования жестких one-hot целей, метод строит мягкое вероятностное распределение над соседними токенами, где вероятность пропорциональна близости embeddings кодов. Это способствует обучению модели захватывать семантически значимую геометрическую структуру в квантованном пространстве embeddings. Эксперименты на ImageNet, text-to-image синтезе и задачах редактирования показали, что SNCE значительно улучшает скорость сходимости и качество генерации по сравнению со стандартной кросс-энтропией.'}, 'en': {'title': 'Enhancing Image Generation with SNCE: A New Training Approach', 'desc': 'This paper introduces Stochastic Neighbor Cross Entropy Minimization (SNCE), a new training method for generative models that use large vector quantization (VQ) codebooks. The traditional approach of using hard one-hot targets is replaced with a soft categorical distribution that considers the proximity of neighboring tokens. This allows the model to better understand the geometric relationships in the embedding space, leading to improved image generation quality. Experiments demonstrate that SNCE enhances both the speed of training and the fidelity of generated images across various tasks.'}, 'zh': {'title': '优化大代码本生成模型的新方法', 'desc': '最近在离散图像生成方面的进展表明，增大VQ代码本的大小可以显著提高重建的保真度。然而，使用大VQ代码本训练生成模型仍然具有挑战性，通常需要更大的模型和更长的训练时间。本文提出了一种新的训练目标——随机邻域交叉熵最小化（SNCE），旨在解决大代码本离散图像生成器的优化问题。SNCE通过构建邻近标记的软分类分布，而不是使用硬的独热目标，来指导模型，从而提高生成质量和收敛速度。'}}}, {'id': 'https://huggingface.co/papers/2603.13962', 'title': 'sebis at ArchEHR-QA 2026: How Much Can You Do Locally? Evaluating Grounded EHR QA on a Single Notebook', 'url': 'https://huggingface.co/papers/2603.13962', 'abstract': 'Abstract  Clinical question answering over electronic health records (EHRs) can help clinicians and patients access relevant medical information more efficiently. However, many recent approaches rely on large cloud-based models, which are difficult to deploy in clinical environments due to privacy constraints and computational requirements. In this work, we investigate how far grounded EHR question answering can be pushed when restricted to a single notebook. We participate in all four subtasks of the ArchEHR-QA 2026 shared task and evaluate several approaches designed to run on commodity hardware. All experiments are conducted locally without external APIs or cloud infrastructure. Our results show that such systems can achieve competitive performance on the shared task leaderboards. In particular, our submissions perform above average in two subtasks, and we observe that smaller models can approach the performance of much larger systems when properly configured. These findings suggest that privacy-preserving EHR QA systems running fully locally are feasible with current models and commodity hardware. The source code is available at https://github.com/ibrahimey/ArchEHR-QA-2026.', 'score': 0, 'issue_id': 1525, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '2af1d1e492d18cc7', 'authors': ['Ibrahim Ebrar Yurt', 'Fabian Karl', 'Tejaswi Choppa', 'Florian Matthes'], 'affiliations': ['Technical University of Munich, School of Computation, Information and Technology, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2603.13962.jpg', 'data': {'categories': ['#healthcare', '#small_models', '#benchmark'], 'emoji': '🏥', 'ru': {'title': 'Приватные системы вопросно-ответного поиска по медицинским данным без облака', 'desc': 'В работе исследуется возможность создания систем вопросно-ответного поиска по электронным медицинским картам (EHR) на локальном оборудовании без использования облачных сервисов. Авторы участвовали в четырех подзадачах конкурса ArchEHR-QA 2026 и тестировали различные подходы, работающие на обычном оборудовании без доступа к внешним API. Результаты показывают, что меньшие модели при правильной настройке могут достигать производительности систем, в несколько раз больших по размеру. Исследование демонстрирует практическую осуществимость локальных систем QA с сохранением приватности медицинских данных на современном оборудовании.'}, 'en': {'title': 'Local Solutions for EHR Question Answering: Privacy Meets Performance', 'desc': 'This paper explores the development of clinical question answering systems that operate directly on electronic health records (EHRs) without relying on cloud-based models. The authors focus on creating solutions that can run on standard hardware, addressing privacy concerns and computational limitations in clinical settings. They participate in the ArchEHR-QA 2026 shared task, demonstrating that local systems can achieve competitive results compared to larger models. The findings indicate that with proper configuration, smaller models can perform similarly to larger ones, making local, privacy-preserving EHR QA systems a viable option.'}, 'zh': {'title': '本地化EHR问答系统的可行性', 'desc': '本研究探讨了在电子健康记录（EHR）上进行临床问题回答的可行性，尤其是在不依赖云计算的情况下。我们参与了ArchEHR-QA 2026共享任务的四个子任务，并评估了几种可以在普通硬件上运行的方法。实验结果表明，这些本地系统在共享任务排行榜上表现出色，尤其是在两个子任务中超过了平均水平。我们的发现表明，使用当前模型和普通硬件，隐私保护的EHR问答系统是可行的。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (4)', '#agi', '#alignment (1)', '#architecture (7)', '#audio (1)', '#benchmark (13)', '#cv (4)', '#data', '#dataset (8)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference', '#interpretability (1)', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (7)', '#open_source (4)', '#optimization (4)', '#plp (1)', '#rag (1)', '#reasoning (2)', '#rl (3)', '#rlhf (2)', '#robotics (2)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (11)', '#transfer_learning (1)', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-17 09:49',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-17 09:49')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-17 09:49')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
