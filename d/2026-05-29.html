le': 'Revolutionizing 4D Object Dynamics with Neural Object Kinematics', 'desc': 'Neural Object Kinematics (NeuROK) introduces a novel approach to simulating 4D dynamics of objects by utilizing a data-driven parameterization. This method combines a latent space representation with a transformer-based encoder-decoder architecture, allowing for realistic temporal deformations of various object types. Unlike traditional methods that rely on predefined physical models, NeuROK learns directly from a large-scale dataset, enabling it to generate plausible deformations without being limited to specific categories. The framework simplifies the simulation process by operating within a low-dimensional latent space, demonstrating significant improvements over existing techniques in dynamic object simulation.'}, 'zh': {'title': '神经物体运动学：简化四维动态模拟的革命性方法', 'desc': '神经物体运动学（NeuROK）通过结合潜在空间表示和基于变换器的编码解码，学习了一种数据驱动的四维动态物体模拟参数化方法。这种方法能够在不同物体类型之间实现真实的时间变形，克服了传统方法对预定义物理模型的依赖。我们的方法通过学习物体的所有可能状态的潜在空间，简化了动态生成过程，使得在经典物理的拉格朗日力学视角下，仅需考虑低维潜在空间中的动态。实验结果表明，该框架在多种动态物体类型上表现出显著的有效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2605.27891', 'title': 'SmartDirector: Keyframe-Conditioned Cinematic Video Generation with Narrative Pacing Control', 'url': 'https://huggingface.co/papers/2605.27891', 'abstract': 'Abstract SmartDirector enhances video generation by using multiple keyframes to improve narrative structure and temporal pacing through a two-stage process of low-resolution generation and high-resolution refinement.  AI-generated summary The narrative quality of a video fundamentally determines its perceptual value. Although existing video generation methods can produce visually appealing content, they predominantly rely on sparse conditioning signals such as text prompts or first/last frames, which limits precise control over narrative structure and temporal pacing. In this paper, we propose SmartDirector, a framework that enhances the narrative capacity of video generation models through multiple keyframes. SmartDirector supports flexible generation scenarios including single-shot generation, multi-shot narrative synthesis, and video extension. The framework operates in two stages: Director-Gen generates a low-resolution video conditioned on the provided keyframes, and Director-SR refines the output by exploiting high-resolution keyframes as semantic anchors to recover fine-grained details. To enable robust multi-keyframe training, we construct a data pipeline that curates single-shot and multi-shot sequences from movies. Extensive experiments demonstrate that SmartDirector substantially outperforms existing state-of-the-art approaches. We will release the code to facilitate further research.', 'score': 2, 'issue_id': 2337, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '0112213b1fa47079', 'authors': ['Zhida Zhang', 'Jie Ma', 'Zhan Peng', 'Haoxue Wu', 'Yang Han', 'Jun Liang', 'Jie Cao', 'Jing Li'], 'affiliations': ['HUST', 'NLPR, CISIA', 'Youku Moku-Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.27891.jpg', 'data': {'categories': ['#dataset', '#video', '#data'], 'emoji': '🎬', 'ru': {'title': 'Множественные опорные кадры для контролируемой генерации видео с улучшенным повествованием', 'desc': 'SmartDirector — это фреймворк для генерации видео, который использует несколько опорных кадров для улучшения повествовательной структуры и временного ритма. Система работает в два этапа: сначала генерируется видео низкого разрешения на основе условий keyframe, затем проводится уточнение высокого разрешения с использованием семантических якорей. Фреймворк поддерживает гибкие сценарии генерации, включая однокадровую генерацию, синтез многокадрового повествования и расширение видео. Авторы создали специальный конвейер подготовки данных из кинофильмов для обучения модели работе с несколькими опорными кадрами.'}, 'en': {'title': 'Enhancing Video Narratives with SmartDirector', 'desc': 'SmartDirector is a new framework for generating videos that improves storytelling and timing by using multiple keyframes. It works in two stages: first, it creates a low-resolution video based on the keyframes, and then it refines this video to add more detail and clarity. This method allows for better control over the narrative structure compared to traditional video generation techniques that rely on limited inputs. The framework can handle various video creation scenarios, making it a versatile tool for enhancing video quality and coherence.'}, 'zh': {'title': '智能导演：提升视频生成的叙事能力', 'desc': 'SmartDirector 是一种增强视频生成的框架，通过使用多个关键帧来改善叙事结构和时间节奏。该框架采用两阶段过程：首先生成低分辨率视频，然后通过高分辨率关键帧进行细化。与传统方法依赖稀疏条件信号不同，SmartDirector 提供了更灵活的生成场景，包括单镜头生成和多镜头叙事合成。实验结果表明，SmartDirector 在叙事质量上显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2605.26578', 'title': 'Is Position Bias in Dense Retrievers Built In-or Learned from Data?', 'url': 'https://huggingface.co/papers/2605.26578', 'abstract': 'Abstract Training data position distribution significantly influences positional bias in dense retrievers, with balanced training reducing sensitivity by up to 87% while maintaining competitive retrieval performance.  AI-generated summary Dense retrievers exhibit positional bias, favoring documents whose query-relevant information appears near the beginning and degrading retrieval performance when the information appears later. While prior work on positional bias in dense retrievers has largely focused on architectural explanations, we study how the positional distribution of evidence in training data affects retrieval-level bias direction. To test this, we construct synthetic position-targeted training sets in which query-relevant evidence appears at the beginning, middle, or end of documents, and fine-tune eight architecturally diverse pretrained models under position-skewed and balanced training distributions. At the ranking level, we observe a strong directional pattern across the examined models: skewed training distributions favor evidence at the corresponding positions. Position-balanced training reduces positional sensitivity by 57--87\\% on position-aware benchmarks, with competitive mean retrieval performance in our controlled setting. Representation-level analyses further suggest that fine-tuning often reshapes learned positional preferences, although pre-existing architectural or pretraining-specific tendencies persist in some models. These results identify training-position distribution as a major controllable factor in retrieval-level position bias and suggest balanced data curation as a practical mitigation strategy.', 'score': 2, 'issue_id': 2337, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '0216e049e888ef13', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#rag', '#benchmark', '#data'], 'emoji': '⚖️', 'ru': {'title': 'Сбалансированные данные исправляют позиционное смещение в поисковых моделях', 'desc': 'Исследование показывает, что позиционное распределение данных в обучающем наборе значительно влияет на позиционное смещение в плотных поисковых моделях. Авторы создали синтетические датасеты с доказательствами в начале, середине или конце документов и обучили восемь различных архитектур под позиционно-смещённое и сбалансированное распределение. Результаты демонстрируют, что сбалансированное обучение снижает позиционную чувствительность на 57-87% при сохранении конкурентоспособной производительности поиска. Анализ представлений показал, что fine-tuning переформирует усвоенные позиционные предпочтения моделей.'}, 'en': {'title': 'Balancing Training Data to Combat Positional Bias in Retrieval Models', 'desc': 'This paper investigates how the distribution of training data positions affects positional bias in dense retrievers, which are models used for information retrieval. It finds that when training data is balanced, the models show a significant reduction in sensitivity to positional bias, improving retrieval performance by up to 87%. The authors create synthetic training sets to analyze how the position of relevant information influences model behavior, revealing that skewed training leads to a preference for information located in specific positions. Ultimately, the study highlights the importance of balanced training data as a strategy to mitigate positional bias in retrieval systems.'}, 'zh': {'title': '平衡训练数据，减少检索偏差', 'desc': '本研究探讨了训练数据的位置分布如何影响密集检索器的位置信息偏差。通过构建合成的目标位置训练集，我们发现不平衡的训练分布会导致检索性能下降，尤其是当相关信息位于文档的后面时。平衡的训练数据能够显著降低位置信息的敏感性，减少高达87%的偏差，同时保持竞争力的检索性能。我们的分析表明，训练位置分布是影响检索级别位置偏差的重要因素，建议采用平衡的数据策划作为一种有效的缓解策略。'}}}, {'id': 'https://huggingface.co/papers/2605.29548', 'title': 'Why Larger Models Learn More: Effects of Capacity, Interference, and Rare-Task Retention', 'url': 'https://huggingface.co/papers/2605.29548', 'abstract': 'Abstract Larger models outperform smaller ones on complex and rare tasks due to reduced gradient interference and better resource allocation, enabling them to learn task features that smaller models miss even with infinite data.  AI-generated summary Larger models learn tasks smaller models do not. What drives this phenomenon? We develop a simple phenomenological argument that power-law scaling already suggests that a larger model will be able to learn a part of the data distribution that a smaller model fails to learn, even with infinite training data. To validate this claim and identify its causes, we study the effects of model scaling on a synthetic setup consisting of a mixture of tasks that show monotonic scaling curves. The results point to a data-induced competition over resources (neurons). Specifically, smaller models allocate their neurons to high frequency or low complexity tasks, and so they learn solutions that perform poorly on rare and complex tasks. Moreover, this happens even when solutions capable of expressing the desired task exist. We then assess how a larger model circumvents this data-centric bottleneck, finding that it traces to a reduced interference mechanism: larger models can allocate enough resources to common tasks that the gradient updates for those tasks become weak, which means that they do not overwrite rare-task features as they slowly accumulate. Finally, to further validate these claims, we pretrain OLMo models (4M to 4B parameters) on novel tasks of varying frequency and complexity. The results mirror those from our synthetic data experiments: only the larger OLMo models learn the infrequent and complex tasks, and these larger models embed more task features in their representations and show less gradient interference between tasks. Overall, we offer a data-centric account of why larger models learn tasks that smaller models fail to. This helps explain why larger models are better in practice, and it can inform practical questions concerning model sizing and training data mixtures.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '154ee55ac504d20c', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#small_models', '#architecture'], 'emoji': '📈', 'ru': {'title': 'Размер спасает редкое: как большие модели преодолевают конкуренцию за нейроны', 'desc': 'Исследование показывает, что большие модели превосходят маленькие в изучении редких и сложных задач благодаря лучшему распределению ресурсов нейронов. Авторы демонстрируют, что маленькие модели конкурируют за нейроны и отдают предпочтение частым и простым задачам, игнорируя редкие, даже если они могут их выучить. Большие модели решают эту проблему за счёт механизма снижения градиентной интерференции: они выделяют достаточно ресурсов частым задачам, чтобы те не перезаписывали признаки редких задач. Результаты подтверждены как на синтетических данных, так и на предобучении реальных моделей OLMo.'}, 'en': {'title': 'Larger Models Unlock Complex Task Learning', 'desc': 'This paper explores why larger machine learning models outperform smaller ones, especially on complex and rare tasks. It argues that larger models can better allocate their resources, allowing them to learn features from the data that smaller models miss, even when both are trained on infinite data. The study shows that smaller models tend to focus on simpler tasks, leading to poor performance on more complex ones due to resource competition. By analyzing the effects of model scaling, the authors demonstrate that larger models experience less gradient interference, enabling them to retain important features from rare tasks while still learning common ones.'}, 'zh': {'title': '大模型更胜一筹，破解复杂任务的秘密', 'desc': '较大的模型在复杂和稀有任务上表现优于较小的模型，因为它们能够更好地分配资源并减少梯度干扰。即使在无限训练数据的情况下，较小的模型也无法学习到某些任务特征。研究表明，较小的模型往往将资源分配给高频或低复杂度的任务，从而在稀有和复杂任务上表现不佳。较大的模型通过减少干扰机制，能够有效地学习这些稀有任务的特征，进而在实际应用中表现更好。'}}}, {'id': 'https://huggingface.co/papers/2605.29341', 'title': 'WorldMemArena: Evaluating Multimodal Agent Memory Through Action-World Interaction', 'url': 'https://huggingface.co/papers/2605.29341', 'abstract': 'Abstract Multimodal large language models require sophisticated memory systems that can track evolving environments and manage information dynamically across multiple sessions, with new benchmarks revealing limitations in current approaches.  AI-generated summary Multimodal large language models are increasingly deployed as long-horizon agents, where memory must do more than recall: it must track an evolving world, revise what has gone stale, and surface the right evidence at decision time. Existing benchmarks measure recall over static dialogue, collapse memory into a single end-of-task accuracy, and reduce visual observations to captions, leaving us unable to localize failures to writing, maintenance, retrieval, or use. The rise of agent harnesses that author their own memory sharpens this gap, since we have no principled way to compare hand-designed pipelines with self-managing alternatives. To close these gaps, we formulate multimodal agent memory as an Action-World Interaction Loop with an observable four-stage lifecycle, and instantiate it in WorldMemArena: 400 multi-session multimodal tasks spanning Lifelong Evolution (evolving personal and task states) and Agentic Execution (memory from real observations, actions, and feedback), annotated with gold memory points, updates, distractors, and evidence chains for stage-level diagnosis. This enables the first head-to-head comparison of long-context, manually designed (RAG and external memory systems), and harness-based memory agents. Results show that: (1) better memory writing and storage do not guarantee better performance; (2) multimodal memory still struggles to fully use visual evidence; (3) systems are unstable across domains and degrade on realistic agentic trajectories; and (4) harness memory is more flexible but remains costly and less reliable.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'c1a209bce6adc67b', 'authors': ['Chengzhi Liu', 'Yuzhe Yang', 'Sophia Xiao Pu', 'Yepeng Liu', 'Lin Long', 'Yichen Guo', 'Nuo Chen', 'Zhaotian Weng', 'Elena Kochkina', 'Simerjot Kaur', 'Charese Smiley', 'Xiaomo Liu', 'James Zou', 'Sheng Liu', 'Yuheng Bu', 'Songyou Peng', 'Xin Eric Wang'], 'affiliations': ['J.P. Morgan Chase', 'Stanford University', 'University of California, Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2605.29341.jpg', 'data': {'categories': ['#rag', '#multimodal', '#long_context', '#agents', '#reasoning', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Оценка и совершенствование долговременной памяти мультимодальных языковых агентов', 'desc': 'В работе предложен новый benchmark WorldMemArena для оценки систем памяти в мультимодальных больших языковых моделях, которые работают как агенты в динамически меняющихся окружениях. Авторы формализуют память агента как цикл взаимодействия "действие-мир" с четырьмя этапами жизненного цикла и создали набор из 400 многосеансовых задач с аннотациями для диагностики каждого этапа. Исследование показывает, что современные подходы к управлению памятью имеют серьёзные ограничения: лучшее написание и хранение информации не гарантирует лучшую производительность, системы плохо используют визуальную информацию и нестабильны на реальных траекториях взаимодействия. Результаты открывают путь к разработке более надежных и эффективных систем памяти для мультимодальных агентов.'}, 'en': {'title': 'Revolutionizing Memory Management in Multimodal AI', 'desc': 'This paper discusses the challenges faced by multimodal large language models in managing memory effectively across different sessions and evolving environments. It highlights the limitations of current benchmarks that fail to accurately assess memory performance in dynamic contexts. The authors propose a new framework called the Action-World Interaction Loop, which outlines a four-stage lifecycle for multimodal agent memory. They introduce WorldMemArena, a set of tasks designed to evaluate and compare various memory systems, revealing that improvements in memory management do not always lead to better overall performance.'}, 'zh': {'title': '提升多模态记忆系统的灵活性与可靠性', 'desc': '多模态大型语言模型需要复杂的记忆系统，以动态管理信息并跟踪不断变化的环境。现有的基准测试显示了当前方法的局限性，无法有效评估记忆的写入、维护和检索。我们提出了一种多模态代理记忆的四阶段生命周期模型，并在WorldMemArena中进行了实例化，以便进行系统的比较和诊断。研究结果表明，尽管记忆的写入和存储有所改善，但并不一定能提高性能，且多模态记忆在利用视觉证据方面仍然存在困难。'}}}, {'id': 'https://huggingface.co/papers/2605.30231', 'title': 'Beyond 3D VQAs: Injecting 3D Spatial Priors into Vision-Language Models for Enhanced Geometric Reasoning', 'url': 'https://huggingface.co/papers/2605.30231', 'abstract': "Abstract Training Vision-Language Models with geometric priors improves 3D spatial reasoning through deep supervision with contrastive loss and depth consistency, achieving better performance than standard fine-tuning approaches.  AI-generated summary Vision-Language Models (VLMs) often struggle with robust 3D spatial reasoning. Prevailing methods that rely on fine-tuning with 3D visual question-answering (VQA) datasets may overfit dataset-specific biases, while integrating specialized 3D visual encoders is often inflexible and cumbersome. In this paper, we argue that genuine spatial understanding should emerge from learning fundamental geometric priors, not only from high-level VQA supervision. We propose GASP (Geometric-Aware Spatial Priors), a framework that injects these priors directly into the LLM's transformer layers. GASP employs a small correspondence head, applied as a deep supervision signal across all layers, and is trained with a dual objective leveraging ground-truth geometry from large-scale video scenes: a contrastive loss on ground-truth point correspondences enforces 2D view-invariance, while a depth consistency supervision resolves 3D geometric ambiguities. Our analysis first provides a diagnostic showing that standard VLMs' internal correspondence matching accuracy is very low (often below 5%). We then demonstrate that our training substantially improves this behavior, boosting peak layer-wise correspondence to over 70% and maintaining over 85% temporal robustness while baselines remain below 5%. These internal improvements translate to significant gains on downstream spatial benchmarks including +18.2% on All-Angles Bench and +29.0% on VSI-Bench, all without training on any 3D VQA data. Our findings indicate that learning from fundamental geometric priors is a promising and generalizable pathway towards VLMs with more reliable 3D spatial reasoning.", 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '9a4621b5a81e44d5', 'authors': ['Chun-Hsiao Yeh', 'Shengyi Qian', 'Manchen Wang', 'Yi Ma', 'Joseph Tighe', 'Fanyi Xiao'], 'affiliations': ['FAIR at Meta', 'HKU', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.30231.jpg', 'data': {'categories': ['#multimodal', '#3d', '#cv', '#training', '#benchmark'], 'emoji': '🧊', 'ru': {'title': 'Геометрические приоритеты вместо набора примеров', 'desc': 'В работе предлагается GASP — фреймворк для улучшения пространственного мышления мультимодальных LLM путём внедрения геометрических приоритетов непосредственно в слои трансформера. Модель обучается с использованием глубокого контроля через два взаимодополняющих сигнала: контрастивную потерю для инвариантности к изменению угла обзора и функцию консистентности глубины для разрешения 3D-неоднозначностей. Авторы показывают, что стандартные моделиям требуется обучение на фундаментальных геометрических принципах, а не только на размеченных наборах вопросов и ответов о сцене. Предложенный метод достигает значительного улучшения на тестовых наборах, демонстрируя, что геометрические приоритеты — перспективный путь к надёжному 3D-пространственному рассуждению в мультимодальных моделях.'}, 'en': {'title': 'Enhancing 3D Spatial Reasoning with Geometric Priors in VLMs', 'desc': "This paper introduces GASP (Geometric-Aware Spatial Priors), a novel framework designed to enhance Vision-Language Models (VLMs) by incorporating geometric priors for improved 3D spatial reasoning. Unlike traditional methods that rely heavily on fine-tuning with specific datasets, GASP integrates these priors directly into the model's transformer layers, allowing for more flexible and robust learning. The framework employs a dual objective with contrastive loss and depth consistency, significantly boosting the model's internal correspondence accuracy from below 5% to over 70%. The results show substantial improvements in spatial reasoning benchmarks, demonstrating that leveraging fundamental geometric principles can lead to more reliable VLMs without the need for extensive 3D visual question-answering data."}, 'zh': {'title': '几何先验助力3D空间推理的突破', 'desc': '本文提出了一种新的框架GASP（几何感知空间先验），旨在通过引入几何先验来提升视觉-语言模型（VLMs）的3D空间推理能力。与传统的微调方法不同，GASP直接在模型的变换器层中注入几何先验，并通过对比损失和深度一致性进行深度监督。研究表明，标准VLMs在内部对应匹配的准确性非常低，而GASP的训练显著提高了这一准确性，达到了70%以上。最终，GASP在多个空间基准测试中取得了显著的性能提升，表明学习基本的几何先验是实现更可靠的3D空间推理的有效途径。'}}}, {'id': 'https://huggingface.co/papers/2605.30349', 'title': 'AdaState: Self-Evolving Anchors for Streaming Video Generation', 'url': 'https://huggingface.co/papers/2605.30349', 'abstract': 'Abstract Video diffusion models with adaptive state replacement generate more dynamic videos by evolving scene references rather than fixing to initial frames, using recurrent denoising as transition function.  AI-generated summary Autoregressive video diffusion models generate streaming video by producing frames sequentially, conditioning each chunk on previously generated content. These models are structurally anchored to the first frame: its key-value representation occupies a privileged position in the attention cache and serves as the primary scene reference throughout generation. As the cleanest and most error-free position in the cache, this anchor draws disproportionate attention, suppressing video dynamics, and locking scene composition to the initial viewpoint even as the scene naturally evolves. The result is a temporally shallow video in which motion, camera movement, and scene progression are dampened in favor of static consistency. To address this, we replace the static anchor with an adaptive state, a hidden latent that the model denoises alongside content at every chunk but never renders. Rather than referencing a frozen first frame, the model generates its own scene anchor at each step by attending to both the previous state and the current content, producing a reference that evolves with the generated content. Unlike standard video generation, which encodes an absolute notion of time, our formulation treats time as relative: every generation step sees the same positional structure regardless of how far generation has progressed, and the state transition is identical at every chunk. Together, these properties introduce a recurrence into the generation process, where denoising serves as the transition function, and the KV cache serves as the carrier, requiring no external module. Experiments demonstrate that the adaptive state substantially improves video dynamics, enabling richer motion and natural scene progression within generated videos.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'e254645dfcdb1312', 'authors': ['Yusuf Dalva', 'Pinar Yanardag'], 'affiliations': ['Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2605.30349.jpg', 'data': {'categories': ['#diffusion', '#training', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное состояние вместо статического якоря для динамичной генерации видео', 'desc': 'В статье предлагается метод улучшения видеодиффузионных моделей путём замены статического якоря (представления первого кадра) на адаптивное состояние — скрытый вектор, который модель денуизирует на каждом шаге генерации. Вместо того чтобы привязываться к неизменному первому кадру, модель создаёт собственный якорь сцены на каждом этапе, обращая внимание как на предыдущее состояние, так и на текущее содержимое. Подход вводит рекуррентность в процесс генерации, где денуизирование служит функцией перехода, а KV-кэш выступает носителем информации без необходимости дополнительных модулей. Экспериментально показано, что адаптивное состояние значительно улучшает динамику видео, обеспечивая более богатое движение и естественное развитие сцены.'}, 'en': {'title': 'Dynamic Video Generation with Adaptive State Replacement', 'desc': 'This paper presents a novel approach to video generation using adaptive state replacement in diffusion models. Instead of relying on a fixed initial frame as the main reference, the model dynamically evolves its scene anchor at each generation step. By treating time as relative and employing recurrent denoising, the model enhances video dynamics, allowing for more natural motion and scene progression. Experiments show that this method significantly improves the quality and richness of AI-generated videos.'}, 'zh': {'title': '自适应状态提升视频动态性', 'desc': '这篇论文介绍了一种视频扩散模型，通过自适应状态替换来生成更具动态性的视频。与传统模型固定在初始帧不同，该模型在每个生成步骤中动态调整场景参考，使用递归去噪作为过渡函数。通过这种方法，模型能够在生成过程中不断更新场景锚点，从而增强视频的运动感和自然场景进展。实验结果表明，自适应状态显著改善了视频的动态性，使生成的视频更丰富和自然。'}}}, {'id': 'https://huggingface.co/papers/2605.29157', 'title': 'Parallax: Parameterized Local Linear Attention for Language Modeling', 'url': 'https://huggingface.co/papers/2605.29157', 'abstract': 'Abstract Local Linear Attention is enhanced through parameterization and hardware-aware optimization to improve LLM training efficiency and performance while maintaining computational stability.  AI-generated summary Large Language Models (LLMs) have become the central paradigm in artificial intelligence, yet the core computational primitive of attention has remained structurally unchanged. Local Linear Attention (LLA) is an attention mechanism derived from nonparametric statistics in the test-time regression framework. In contrast to prior research on efficient attention variants, LLA upgrades the local constant estimate in softmax attention to a local linear estimate, yielding provably superior bias-variance tradeoffs for associative memory. However, LLA has not been scaled in LLM pretraining due to computational and numerical stability concerns. We introduce Parallax, a parameterized Local Linear Attention that is scalable for LLMs. Parallax eliminates the numerical solver in LLA and learns an extra query-like projector that probes the KV covariance. We place Parallax within a family of attention mechanisms connected by the bandwidth, the probe construction and the affine structure. We propose a hardware-aware algorithm that increases the arithmetic intensity over FlashAttention, shifting attention into a more compute bound regime. Our prototype decode kernel matches or outperforms FlashAttention 2/3 across diverse batch sizes and context lengths. We pretrain Parallax at 0.6B and 1.7B scales and find consistent perplexity improvements throughout pretraining with gains that transfer to downstream benchmarks. The advantage persists under both parameter-matched and compute-matched controls, demonstrating a Pareto improvement. We perform careful pretraining ablations and identify a novel phenomenon whereby Muon unlocks the capacity of Parallax. To our knowledge, this is the first empirical demonstration of strong architecture-optimizer codesign for attention mechanisms in the architecture research literature.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '6031c8f29e0cf037', 'authors': ['Yifei Zuo', 'Dhruv Pai', 'Zhichen Zeng', 'Alec Dewulf', 'Shuming Hu', 'Zhaoran Wang'], 'affiliations': ['Northwestern University', 'Tilde Research', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.29157.jpg', 'data': {'categories': ['#training', '#inference', '#optimization', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Масштабируемое локальное линейное внимание для эффективного обучения больших языковых моделей', 'desc': 'В работе представлен Parallax — параметризованный механизм локального линейного внимания, который решает проблемы масштабируемости и численной стабильности оригинального алгоритма LLA для обучения больших языковых моделей. Авторы разработали аппаратно-оптимизированный алгоритм, повышающий арифметическую интенсивность относительно FlashAttention и достигающий лучшей производительности декодирования. Предварительное обучение моделей масштаба 0.6B и 1.7B показывает стабильное улучшение перплексии на предварительном обучении и бенчмарках. Работа демонстрирует первый эмпирический пример успешного коразработки архитектуры внимания и оптимизатора (Muon) в исследованиях трансформеров.'}, 'en': {'title': 'Enhancing Attention: Parallax for Efficient LLM Training', 'desc': 'This paper introduces Parallax, a new parameterized Local Linear Attention (LLA) mechanism designed to enhance the training efficiency and performance of Large Language Models (LLMs). By replacing the traditional numerical solver in LLA with a learnable query-like projector, Parallax improves computational stability and scalability for LLM pretraining. The authors propose a hardware-aware optimization strategy that increases arithmetic intensity, allowing Parallax to outperform existing attention mechanisms like FlashAttention across various configurations. The results show consistent improvements in perplexity during pretraining, indicating that Parallax effectively enhances model performance while maintaining stability.'}, 'zh': {'title': '提升大型语言模型训练效率的局部线性注意力机制', 'desc': '本文提出了一种名为Parallax的参数化局部线性注意力机制，旨在提高大型语言模型（LLM）的训练效率和性能，同时保持计算的稳定性。Parallax通过消除局部线性注意力中的数值求解器，并学习额外的查询投影器，来探测键值（KV）协方差。研究表明，Parallax在不同的批量大小和上下文长度下，能够与FlashAttention 2/3相匹配或超越，并在预训练过程中持续改善困惑度。该研究首次展示了注意力机制的架构与优化器的强协同设计，推动了注意力机制的进一步发展。'}}}, {'id': 'https://huggingface.co/papers/2605.26485', 'title': 'OmniInteract: Benchmarking Real-World Streaming Interaction for Real-Time Omnimodal Assistants', 'url': 'https://huggingface.co/papers/2605.26485', 'abstract': 'Abstract OmniInteract presents a streaming benchmark for real-time omnimodal large language models that evaluates online audio-visual processing with temporal grounding and interactive response requirements.  AI-generated summary We introduce OmniInteract, a streaming benchmark for real-time omnimodal large language models evaluated through native online inference over audio-visual streams. Unlike offline video understanding or text-prompted streaming QA, OmniInteract preserves the original audio-visual stream and requires models to process it online, without access to future content. User queries and ambient sounds are embedded in the audio track, requiring models to detect multimodal triggers, decide when to respond, and answer while the stream unfolds. OmniInteract contains 250 videos with 1,430 temporally grounded response slots: 1,062 1Q1A slots across real-time, proactive, and nested scenarios, and 368 1QnA slots for continuous task monitoring and step guidance. Each slot includes a trigger, response window, and target answer. We evaluate response correctness, timing, invalid outputs, interruption handling, and context continuity using Interaction-Aware Quality-Timeliness F1, Interruption Diagnostic Suite, and Nested Chain Completion Score. Experiments show that current models remain weak in streaming interaction, with the best overall IA-QTF1 reaching only 0.368 and the best 1QnA IA-QTF1 only 0.052. Further study on mathematical reasoning in full-duplex settings shows that offline capability does not necessarily transfer to online interaction. Code and datasets will be made publicly accessible at https://github.com/Lucky-Lance/OmniInteract.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e7947dde7c256a3b', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#dataset', '#multimodal', '#video', '#audio', '#open_source', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Реальное время в потоке: оценка интерактивных омнимодальных моделей', 'desc': 'OmniInteract представляет бенчмарк для оценки омнимодальных больших языковых моделей в режиме реального времени. Этот бенчмарк требует от моделей обрабатывать потоки аудио-видео контента в онлайн-режиме, без доступа к будущему содержимому, обнаруживать мультимодальные триггеры и принимать решение о времени ответа. Датасет содержит 250 видео с 1430 временно привязанными слотами ответов различной сложности, включая сценарии реального времени и непрерывного мониторинга задач. Экспериментальные результаты показывают, что современные модели демонстрируют низкую производительность в потоковом взаимодействии, и навыки офлайн-обработки не переносятся эффективно на онлайн-сценарии.'}, 'en': {'title': 'Revolutionizing Real-Time Interaction with OmniInteract', 'desc': "OmniInteract introduces a new benchmark designed for evaluating real-time omnimodal large language models that process audio-visual streams. This benchmark requires models to interactively respond to user queries while analyzing the original audio-visual content without any foresight of future data. It includes 250 videos with specific response slots that test the models' ability to detect triggers and maintain context during streaming. The results indicate that current models struggle with streaming interactions, highlighting a gap between offline capabilities and real-time performance."}, 'zh': {'title': '实时多模态交互的新基准', 'desc': 'OmniInteract是一个用于实时多模态大语言模型的流式基准测试，专注于在线音视频处理和交互响应。与离线视频理解不同，OmniInteract要求模型在没有未来内容访问的情况下，实时处理原始音视频流。该基准包含250个视频和1430个时间定位的响应槽，评估模型的响应正确性、时效性和上下文连续性。实验结果表明，目前的模型在流式交互方面表现较弱，最好的IA-QTF1得分仅为0.368。'}}}, {'id': 'https://huggingface.co/papers/2605.13857', 'title': 'MoZoo:Unleashing Video Diffusion power in animal fur and muscle simulation', 'url': 'https://huggingface.co/papers/2605.13857', 'abstract': 'Abstract MoZoo generates high-fidelity animal videos from coarse meshes using diffusion models with novel attention mechanisms and a synthetic-to-real data pipeline.  AI-generated summary The creation of cinematic-quality animal effects necessitates the precise modeling of muscle and fur dynamics, a process that remains both labor-intensive and computationally expensive within traditional production workflows. While generative diffusion models have shown promise in diverse artistic workflows, their capacity for high-fidelity animal simulation remains largely unexploited. We present MoZoo, a generative dynamics solver that bypasses conventional refinement to synthesize high-fidelity animal videos from coarse meshes under multimodal guidance. We propose Role-Aware RoPE (RAR-RoPE) which employs role-based index remapping to synchronize motion alignment while decoupling reference information via fixed temporal offsets. Complementing this, Asymmetric Decoupled Attention partitions the latent sequence to enforce a unidirectional information flow, effectively preventing feature interference and improving computational efficiency. To address the scarcity of high-quality training data, we introduce MoZoo-Data, a synthetic-to-real pipeline that leverages a rendering engine and an inverse mapping approach to construct a large-scale dataset of paired sequences. Furthermore, we establish MoZooBench, a comprehensive benchmark with 120 mesh-video pairs. Experimental results demonstrate that MoZoo achieves high-fidelity fur simulation across diverse animal skeletons and layouts, preserving superior temporal and structural consistency.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '427e37c56f72b42f', 'authors': ['Dongxia Liu', 'Jie Ma', 'Xiaochen Yang', 'Jiancheng Zhang', 'Bin Xia', 'Zhehan Kan', 'Nisha Huang', 'Jun Liang', 'Wenming Yang', 'Jin Li'], 'affiliations': ['HUIJING Digital Media & Entertainment Group', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Glasgow'], 'pdf_title_img': 'assets/pdf/title_img/2605.13857.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#architecture', '#synthetic', '#video', '#diffusion', '#benchmark'], 'emoji': '🦁', 'ru': {'title': 'Кинематографическая анимация животных из простых сеток через диффузию', 'desc': 'MoZoo — это генеративная модель на основе диффузии, которая создает высокачественные видео животных из грубых 3D-моделей. Авторы предложили новые механизмы внимания: Role-Aware RoPE для синхронизации движений и асимметричное развязанное внимание для эффективной обработки информации. Для решения проблемы нехватки обучающих данных разработана синтетическая-реальная конвейер обработки данных (MoZoo-Data), который автоматически генерирует парные последовательности видео-сетки. Модель демонстрирует высокое качество симуляции шерсти и сохраняет временную и структурную согласованность для различных животных.'}, 'en': {'title': 'MoZoo: High-Fidelity Animal Video Generation with Diffusion Models', 'desc': 'MoZoo is a novel approach that generates high-quality animal videos from simple 3D models using advanced diffusion models. It introduces innovative techniques like Role-Aware RoPE and Asymmetric Decoupled Attention to enhance motion synchronization and computational efficiency. The method also addresses the challenge of limited training data by creating a synthetic-to-real data pipeline, which generates a large dataset of paired sequences. Experimental results show that MoZoo effectively simulates realistic fur dynamics and maintains consistency across various animal forms.'}, 'zh': {'title': 'MoZoo：高保真动物视频生成的新方法', 'desc': 'MoZoo 是一种生成模型，能够从粗糙的网格生成高保真的动物视频。它使用了新颖的注意力机制和合成到真实的数据管道，解决了传统制作流程中肌肉和毛发动态建模的复杂性。通过引入角色感知的 RoPE 和非对称解耦注意力，MoZoo 提高了运动对齐的精度和计算效率。为了克服高质量训练数据的不足，MoZoo 还构建了一个大型数据集和基准测试，展示了其在多种动物骨架和布局下的优越表现。'}}}, {'id': 'https://huggingface.co/papers/2605.30189', 'title': 'Token-Level Generalization in LoRA Adapter Backdoors: Attack Characterization and Behavioral Detection', 'url': 'https://huggingface.co/papers/2605.30189', 'abstract': 'Abstract LoRA adapters can be backdoored through training data poisoning while maintaining performance, with the backdoor activating at token feature level and being detectable through behavioral and weight-level statistics.  AI-generated summary We show that LoRA adapters, the dominant distribution format for fine-tuned LLMs, can be reliably backdoored through training data poisoning while preserving baseline task performance. On a Qwen 2.5 1.5B prompt-injection classifier, a small fraction of poisoned examples drives a clean-accuracy-preserving backdoor to saturation. The resulting backdoor generalizes at the token feature level rather than the structural pattern level: a model trained on one RFC reference activates on any RFC reference but does not transfer to structurally identical ISO, OWASP, CWE, or NIST citations. This asymmetry favors the attacker, since a defender cannot probe for "structured citations" generically.   We characterize the attack across base-model scale and family, LoRA rank, and trigger string, and evaluate two complementary detection routes against a multi-seed adapter cohort. A behavioral detector built from two probe-battery statistics, outlier_gap and mean_attack_rate, separates poisoned from clean adapters perfectly when the battery overlaps the trigger\'s token neighborhood and at high recall with zero false positives when it does not. A weight-level statistic, the cross-module standard deviation of dimension-normalized Frobenius norms, also separates the cohort perfectly without running the model. Combined, the two routes are robust to probe composition. Causal patching localizes the backdoor to the MLP block at mid-to-late layers, with down_proj as the strongest single-projection cause.   Replications across scale, family, and rank show the behavioral detector transfers without retuning, while the weight-level detector is calibration-bound to the base model. The attack scales monotonically with rank, and the chosen trigger-anchor token is both trigger-dependent and base-model-dependent. Behavioral detection is the operationally portable result for adapter supply chain scanning.', 'score': 0, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '083e6f1afb2c4872', 'authors': ['Travis Lelle'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.30189.jpg', 'data': {'categories': ['#security', '#training', '#open_source', '#small_models'], 'emoji': '🕳️', 'ru': {'title': 'Скрытые ловушки в адаптерах: как отравить LoRA и обнаружить атаку', 'desc': 'В работе исследуется уязвимость LoRA адаптеров — популярного формата распределения дообученных больших языковых моделей — к атакам через отравление обучающих данных. Авторы показывают, что даже при сохранении исходной точности на чистых данных, небольшое количество отравленных примеров может внедрить скрытый механизм активации на уровне токен-признаков. Критически, бэкдор обобщается на семантическом уровне (активируется на любых ссылках RFC), но не переносится на структурно идентичные паттерны других стандартов, что создает асимметрию в пользу атакующего. Для защиты предложены два дополняющих друг друга детектора: поведенческий, основанный на статистике зондирующих батарей, и детектор на уровне весов, использующий нормы Фробениуса без запуска модели.'}, 'en': {'title': 'Securing LoRA Adapters: Detecting Backdoors in Fine-Tuned Models', 'desc': "This paper discusses how LoRA adapters, which are commonly used for fine-tuning large language models (LLMs), can be compromised through a method called training data poisoning. The researchers found that even a small number of poisoned training examples can create a backdoor that does not affect the model's overall performance on clean tasks. The backdoor activates at the token feature level, meaning it can trigger on specific tokens rather than on general patterns, making it harder to detect. They propose two detection methods that can effectively identify poisoned adapters without needing to run the model, ensuring robust security against such attacks."}, 'zh': {'title': 'LoRA适配器的后门攻击与检测', 'desc': '本文探讨了LoRA适配器在训练数据中被恶意注入后门的可能性，同时保持其性能不变。研究表明，少量的被污染示例可以使后门达到饱和状态，并且该后门在令牌特征级别上进行泛化。我们提出了两种检测方法，能够有效区分被污染的适配器和干净的适配器，且在高召回率下没有假阳性。最后，研究还表明，后门的定位主要集中在中后层的MLP模块，且特定的触发锚令牌对攻击效果有显著影响。'}}}, {'id': 'https://huggingface.co/papers/2605.29486', 'title': 'PhoneWorld: Scaling Phone-Use Agent Environments', 'url': 'https://huggingface.co/papers/2605.29486', 'abstract': 'Abstract PhoneWorld is a pipeline that transforms real GUI trajectories and screenshots into controllable mobile environments, executable tasks, and automated verifiers, enabling scalable creation of phone-use benchmarks.  AI-generated summary A central bottleneck for phone-use agents is that controllable, reproducible environments covering real mobile behavior are hard to build at scale. Existing mobile-agent benchmarks have made important progress on evaluation, but they do not by themselves provide a scalable way to construct many new phone-use environments. We present PhoneWorld, a reusable pipeline that converts real GUI trajectories and screenshots into controllable phone-use environments, executable tasks, automatic verifiers, and training rollouts. Rather than hand-building one mobile benchmark at a time, PhoneWorld uses real trajectories to recover which screens matter, how screens connect, which interactions must change environment state, and which user goals admit automatic verification. From these signals, it builds runnable mock Android apps backed by read-only app content and mutable state, then derives executable tasks, rule-based verifiers, and training rollouts from the same environments. In its current instantiation, PhoneWorld covers 34 apps across 16 domains, spanning common consumer mobile behaviors such as search, browsing, shopping, booking, media, and social interaction. Under a fixed training budget, replacing 10K steps from an auxiliary AndroidWorld corpus in an AndroidWorld-based baseline with broad PhoneWorld supervision improves all four evaluation benchmarks at once, raising HYMobileBench by 17.7 points, AndroidControl by 6.0 points, AndroidWorld by 14.7 points, and PhoneWorld by 52.5 points. We then study two additional scaling questions: increasing the amount of PhoneWorld supervision strongly improves PhoneWorld performance, and under a fixed PhoneWorld budget, expanding app coverage yields even larger gains. Overall, PhoneWorld shifts the focus from building one mobile benchmark at a time to scaling the supply of phone-use environments themselves.', 'score': 0, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '64b61c59ad2a58ef', 'authors': ['Zhengyang Tang', 'Yuxuan Liu', 'Xin Lai', 'Junyi Li', 'Pengyuan Lyu', 'Jason', 'Yiduo Guo', 'Zhengyao Fang', 'Yang Ding', 'Yi Zhang', 'Weinong Wang', 'Huawen Shen', 'Xingran Zhou', 'Liang Wu', 'Fei Tang', 'Sunqi Fan', 'Shangpin Peng', 'Zheng Ruan', 'Anran Zhang', 'Benyou Wang', 'Rui Yan', 'Ji-Rong Wen', 'Chengquan Zhang', 'Han Hu'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Tencent Hunyuan', 'The Chinese University of Hong Kong, Shenzhen', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29486.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '📱', 'ru': {'title': 'Масштабируемое создание мобильных бенчмарков из реальных пользовательских траекторий', 'desc': 'PhoneWorld — это конвейер, который преобразует реальные траектории взаимодействия с мобильным интерфейсом и снимки экрана в контролируемые мобильные окружения с автоматическими верификаторами задач. Система анализирует реальное поведение пользователей, чтобы выделить ключевые экраны, их взаимосвязи и изменения состояния, необходимые для выполнения задач. На основе этих сигналов создаются работающие макеты приложений Android с неизменяемым контентом и изменяемым состоянием, из которых затем извлекаются исполняемые задачи и правила верификации. Подход позволяет масштабируемо конструировать бенчмарки для агентов, работающих с мобильными приложениями, вместо ручного создания каждого бенчмарка отдельно.'}, 'en': {'title': 'Transforming Mobile Benchmarking with PhoneWorld', 'desc': 'PhoneWorld is a novel pipeline designed to create scalable mobile environments by transforming real graphical user interface (GUI) trajectories and screenshots. It addresses the challenge of building reproducible environments for mobile agents by automating the generation of tasks and verifiers from real user interactions. By analyzing these trajectories, PhoneWorld identifies key screens, interactions, and user goals, allowing for the creation of runnable mock Android applications. This approach significantly enhances the performance of mobile benchmarks, demonstrating that increased supervision and broader app coverage lead to improved outcomes in evaluating mobile behaviors.'}, 'zh': {'title': 'PhoneWorld：可扩展的手机使用环境构建工具', 'desc': 'PhoneWorld是一个将真实的图形用户界面（GUI）轨迹和截图转化为可控的手机环境、可执行任务和自动验证器的管道。这一方法解决了构建可控、可重复的手机使用环境的难题，从而支持大规模创建手机使用基准。通过分析真实的用户轨迹，PhoneWorld能够识别重要的屏幕、屏幕之间的连接以及需要改变环境状态的交互。最终，PhoneWorld覆盖了34个应用程序，显著提高了多个评估基准的性能，推动了手机使用环境的可扩展性。'}}}];

                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-29 05:08',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-29 05:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-29 05:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
