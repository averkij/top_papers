 dynamics-aware multimodal pre-training framework that enhances robot manipulation by integrating motion understanding into visual perception through image-language-3D flow triplets and geometric regularization techniques.  AI-generated summary Robot manipulation critically depends on perception that preserves the action-relevant aspects of a scene. Yet most robot learning pipelines are built upon visual encoders pre-trained for static recognition or vision-language alignment, leaving motion understanding to downstream policies. We introduce DynaFLIP, a dynamics-aware multimodal pre-training framework that pushes motion understanding upstream into perception. We construct image-language-3D flow triplets from heterogeneous human and robot videos, and use these triplets as training-time supervision to shape an image-only encoder. Our key idea is to encourage the three modalities to span a small simplex volume in the shared hyperspherical space -- a smaller simplex volume indicating stronger alignment. To avoid the geometric ambiguity and trivial collapse of naive volume minimization, we combine simplex-volume minimization with a cosine regularizer and a contrastive objective. Our analyses show that DynaFLIP focuses on control-relevant regions critical for manipulation. The resulting dynamics-aware representations serve as reusable visual backbones and consistently outperform baselines across diverse downstream policies, including VLAs. We validate this across diverse simulation and real-world setups, with gains reaching +22.5% under out-of-distribution scenarios. Our results suggest that robot generalization improves when visual representations are trained to encode not just what is present, but how the world changes under action.', 'score': 2, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '02c3ce07b54252d1', 'authors': ['Jusuk Lee', 'Seungjae Lee', 'Jonghun Shin', 'Hoseong Jung', 'Sungha Kim', 'Daesol Cho', 'H. Jin Kim', 'Jia-Bin Huang', 'Furong Huang'], 'affiliations': ['Georgia Institute of Technology', 'Seoul National University', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2605.30350.jpg', 'data': {'categories': ['#robotics', '#3d', '#training', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Движение учит робота видеть: динамика в восприятии вместо политики', 'desc': 'DynaFLIP — это фреймворк предварительного обучения, который интегрирует понимание динамики движения в визуальное восприятие робота для манипуляции объектами. Авторы создают тройки данных из изображений, текстовых описаний и трёхмерных потоков оптического потока из видео людей и роботов. Ключевая идея заключается в минимизации объёма симплекса в общем гиперсферическом пространстве с использованием геометрической регуляризации и контрастивного обучения для избежания коллапса представлений. Полученные динамически-осведомлённые визуальные представления демонстрируют устойчивые улучшения производительности при обучении политик манипуляции и показывают выигрыш до 22.5% в сценариях распределения данных.'}, 'en': {'title': 'Enhancing Robot Manipulation with Motion-Aware Perception', 'desc': "DynaFLIP is a new framework designed to improve how robots understand and manipulate their environment by integrating motion awareness into visual perception. It uses a combination of image, language, and 3D flow data to create training examples that help the robot learn to recognize important aspects of a scene that are relevant for action. By minimizing the geometric ambiguity in the training process, DynaFLIP ensures that the robot's visual encoder learns to focus on critical areas for manipulation tasks. The framework has shown significant improvements in robot performance, especially in challenging scenarios, by teaching robots to understand not just static images but also how objects move and change over time."}, 'zh': {'title': '动态感知，提升机器人操作能力', 'desc': 'DynaFLIP是一个动态感知的多模态预训练框架，旨在通过图像-语言-3D流三元组和几何正则化技术来增强机器人操作能力。该框架将运动理解整合到视觉感知中，克服了传统机器人学习管道中对静态识别的依赖。我们构建了来自人类和机器人视频的图像-语言-3D流三元组，并利用这些三元组作为训练监督，优化图像编码器。实验结果表明，DynaFLIP在多种下游策略中表现优越，尤其在处理动态场景时，能够显著提高机器人的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.30093', 'title': 'Geometry Matters: 3D Foundation Priors for Learning Semantic Correspondence', 'url': 'https://huggingface.co/papers/2605.30093', 'abstract': 'Abstract A 3D-aware post-training framework enhances semantic correspondence estimation by integrating 3D geometry priors from reconstructed object poses and PartField descriptors, improving upon 2D foundation features through automatic 3D structure estimation and render-and-compare optimization.  AI-generated summary Foundation features from self-supervised vision models and text-to-image diffusion models have proven effective for semantic correspondence estimation. However, because these features are learned primarily from 2D image objectives, they lack explicit 3D awareness and often confuse symmetric object sides, repeated parts, and visually similar structures that are distinct in 3D. We introduce a 3D-aware post-training framework that goes beyond available 2D foundation features by incorporating priors from 3D foundation models. Given an image, our method uses SAM3D to estimate object geometry and pose, and refines the pose through render-and-compare optimization. Subsequently, we render PartField descriptors from the reconstructed geometry into the image plane based on the estimated object pose. The resulting geometry-aware feature maps complement DINO and Stable Diffusion features, while geodesic distances on the reconstructed shapes enable reliable filtering of candidate correspondences. We use the filtered matches as supervision to train a lightweight adapter on top of DINO and Stable Diffusion for semantic correspondence. In contrast to prior post-training approaches that require pose annotations and rely on coarse spherical geometry, our method automatically obtains instance-specific 3D structure and uses it to guide correspondence learning. Experiments show that our approach improves semantic correspondence over the prior methods while reducing manual geometric supervision. Code and model can be found at https:/github.com/GenIntel/3D-SC.', 'score': 2, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'eafc5fa3de570e80', 'authors': ['Artur Jesslen', 'Olaf Dünkel', 'Adam Kortylewski'], 'affiliations': ['CISPA Helmholtz Center for Information Security', 'Max Planck Institute for Informatics', 'University of Freiburg'], 'pdf_title_img': 'assets/pdf/title_img/2605.30093.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#cv', '#training', '#optimization', '#3d'], 'emoji': '🔷', 'ru': {'title': '3D-геометрия для более умного сопоставления образов', 'desc': 'В работе предложен фреймворк пост-обучения, который улучшает оценку семантического соответствия между изображениями путём интеграции 3D геометрических приоров из реконструированных поз объектов и дескрипторов PartField. Метод использует модель SAM3D для автоматической оценки геометрии и позы объекта, а затем оптимизирует позу через рендер-и-сравнение. Геометрически-осведомлённые карты признаков, полученные из реконструированной геометрии, дополняют DINO и Stable Diffusion признаки, позволяя эффективно различать симметричные части и повторяющиеся структуры объектов. Легковесный адаптер, обученный на отфильтрованных соответствиях, достигает улучшения качества семантического соответствия без необходимости в аннотациях поз.'}, 'en': {'title': 'Enhancing Semantic Correspondence with 3D Awareness', 'desc': 'This paper presents a new framework that enhances the estimation of semantic correspondence by integrating 3D geometry information. It addresses the limitations of existing 2D features, which often struggle with symmetric objects and similar structures. The proposed method uses a 3D-aware post-training approach that automatically estimates object geometry and pose, refining it through a render-and-compare optimization process. By incorporating 3D priors and filtering candidate correspondences, the framework improves the accuracy of semantic correspondence without the need for extensive manual supervision.'}, 'zh': {'title': '3D感知提升语义对应估计的创新框架', 'desc': '本文提出了一种3D感知的后训练框架，通过整合重建物体姿态的3D几何先验和PartField描述符，增强了语义对应估计。该方法在自动3D结构估计和渲染-比较优化的基础上，改进了2D基础特征。与以往依赖粗糙球形几何和姿态注释的后训练方法不同，我们的方法能够自动获取特定实例的3D结构，并利用其指导对应学习。实验结果表明，该方法在减少手动几何监督的同时，显著提高了语义对应的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.29271', 'title': 'CoHyDE: Iterative Co-Training of LLM Rewriter & Dense Encoder for Tool Retrieval', 'url': 'https://huggingface.co/papers/2605.29271', 'abstract': "Abstract CoHyDE is an iterative method that jointly trains a dense encoder and LLM rewriter to improve tool retrieval from API catalogs, achieving better performance on both specific and vague queries through co-evolutionary training.  AI-generated summary Tool retrieval over large API catalogs is a core bottleneck for LLM agents: user queries arrive in colloquial, often underspecified language, while the catalog uses technical API vocabulary that no fixed encoder can bridge on its own. The two dominant training approaches, contrastive encoder fine-tuning and HyDE-style query expansion with a frozen LLM, address this problem from opposite ends and fail in complementary directions: the fine-tuned encoder excels when the query's surface form already matches the catalog but collapses when it does not, while zero-shot HyDE is more robust to underspecified queries yet generates catalog-unaware hypothetical descriptions that degrade retrieval when queries are well-formed. We introduce CoHyDE, an iterative procedure that trains the dense encoder and the LLM rewriter as a single co-evolving system: the encoder is retrained with InfoNCE on catalog-style hypothetical descriptions produced by the rewriter, and the rewriter is preference-aligned via DPO against the encoder's retrieval scores, with both sides warm-started on the tool catalog before the loop begins. On a ~10k tool subset of the ToolBench catalog, three rounds of CoHyDE improve over the strongest single-component baseline by +2.5 pp NDCG@5 on standard queries and +6.3 pp on held-out vague queries, with gains as large as +8 pp on the hardest vague tier. Ablations confirm that co-training is the key ingredient: using either component in isolation fails to match CoHyDE on both well-formed and vague queries, with losses of up to -8 pp on vague queries.", 'score': 1, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'b598885073d3997c', 'authors': ['Vaishali Senthil', 'Ashutosh Hathidara', 'Sebastian Schreiber'], 'affiliations': ['SAP Labs'], 'pdf_title_img': 'assets/pdf/title_img/2605.29271.jpg', 'data': {'categories': ['#rlhf', '#training', '#rag', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Совместная эволюция энкодера и переписчика запросов для поиска в каталогах API', 'desc': 'CoHyDE — это итеративный метод совместного обучения плотного энкодера и LLM для улучшения поиска инструментов в больших каталогах API. Проблема заключается в том, что пользовательские запросы написаны на естественном языке, а каталог использует технический API-словарь, что создаёт разрыв, который ни один фиксированный энкодер не может преодолеть самостоятельно. CoHyDE решает эту проблему путём ко-эволюционного обучения: энкодер переобучается на каталог-ориентированных описаниях, созданных LLM, а LLM оптимизируется через DPO на основе результатов поиска энкодера. На тестах метод показывает значительное улучшение производительности, особенно на нечётких и неполных запросах (+6.3 pp NDCG@5), подтверждая, что совместное обучение компонентов критически важно для успеха.'}, 'en': {'title': 'CoHyDE: Bridging User Queries and API Catalogs through Co-Evolution', 'desc': "CoHyDE is a novel iterative method designed to enhance tool retrieval from API catalogs by jointly training a dense encoder and a large language model (LLM) rewriter. This approach addresses the challenge of translating user queries, which are often informal and vague, into the technical language of API catalogs. By employing co-evolutionary training, CoHyDE allows the encoder to learn from hypothetical descriptions generated by the rewriter, while simultaneously aligning the rewriter's outputs with the encoder's retrieval performance. The results demonstrate significant improvements in retrieval accuracy, particularly for vague queries, highlighting the effectiveness of this integrated training strategy."}, 'zh': {'title': '共同训练，提升工具检索效果', 'desc': 'CoHyDE是一种迭代方法，旨在通过共同训练密集编码器和大型语言模型（LLM）重写器来改善API目录中的工具检索。该方法通过共同进化训练，能够在特定和模糊查询上都取得更好的性能。传统的训练方法在处理用户查询时存在局限性，CoHyDE通过将编码器和重写器作为一个共同演化的系统来解决这一问题。实验结果表明，CoHyDE在标准查询和模糊查询上均显著提高了检索效果，证明了共同训练的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.30189', 'title': 'Token-Level Generalization in LoRA Adapter Backdoors: Attack Characterization and Behavioral Detection', 'url': 'https://huggingface.co/papers/2605.30189', 'abstract': 'Abstract LoRA adapters can be backdoored through training data poisoning while maintaining performance, with the backdoor activating at token feature level and being detectable through behavioral and weight-level statistics.  AI-generated summary We show that LoRA adapters, the dominant distribution format for fine-tuned LLMs, can be reliably backdoored through training data poisoning while preserving baseline task performance. On a Qwen 2.5 1.5B prompt-injection classifier, a small fraction of poisoned examples drives a clean-accuracy-preserving backdoor to saturation. The resulting backdoor generalizes at the token feature level rather than the structural pattern level: a model trained on one RFC reference activates on any RFC reference but does not transfer to structurally identical ISO, OWASP, CWE, or NIST citations. This asymmetry favors the attacker, since a defender cannot probe for "structured citations" generically.   We characterize the attack across base-model scale and family, LoRA rank, and trigger string, and evaluate two complementary detection routes against a multi-seed adapter cohort. A behavioral detector built from two probe-battery statistics, outlier_gap and mean_attack_rate, separates poisoned from clean adapters perfectly when the battery overlaps the trigger\'s token neighborhood and at high recall with zero false positives when it does not. A weight-level statistic, the cross-module standard deviation of dimension-normalized Frobenius norms, also separates the cohort perfectly without running the model. Combined, the two routes are robust to probe composition. Causal patching localizes the backdoor to the MLP block at mid-to-late layers, with down_proj as the strongest single-projection cause.   Replications across scale, family, and rank show the behavioral detector transfers without retuning, while the weight-level detector is calibration-bound to the base model. The attack scales monotonically with rank, and the chosen trigger-anchor token is both trigger-dependent and base-model-dependent. Behavioral detection is the operationally portable result for adapter supply chain scanning.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '083e6f1afb2c4872', 'authors': ['Travis Lelle'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.30189.jpg', 'data': {'categories': ['#security', '#training', '#open_source', '#small_models'], 'emoji': '🕳️', 'ru': {'title': 'Скрытые ловушки в адаптерах: как отравить LoRA и обнаружить атаку', 'desc': 'В работе исследуется уязвимость LoRA адаптеров — популярного формата распределения дообученных больших языковых моделей — к атакам через отравление обучающих данных. Авторы показывают, что даже при сохранении исходной точности на чистых данных, небольшое количество отравленных примеров может внедрить скрытый механизм активации на уровне токен-признаков. Критически, бэкдор обобщается на семантическом уровне (активируется на любых ссылках RFC), но не переносится на структурно идентичные паттерны других стандартов, что создает асимметрию в пользу атакующего. Для защиты предложены два дополняющих друг друга детектора: поведенческий, основанный на статистике зондирующих батарей, и детектор на уровне весов, использующий нормы Фробениуса без запуска модели.'}, 'en': {'title': 'Securing LoRA Adapters: Detecting Backdoors in Fine-Tuned Models', 'desc': "This paper discusses how LoRA adapters, which are commonly used for fine-tuning large language models (LLMs), can be compromised through a method called training data poisoning. The researchers found that even a small number of poisoned training examples can create a backdoor that does not affect the model's overall performance on clean tasks. The backdoor activates at the token feature level, meaning it can trigger on specific tokens rather than on general patterns, making it harder to detect. They propose two detection methods that can effectively identify poisoned adapters without needing to run the model, ensuring robust security against such attacks."}, 'zh': {'title': 'LoRA适配器的后门攻击与检测', 'desc': '本文探讨了LoRA适配器在训练数据中被恶意注入后门的可能性，同时保持其性能不变。研究表明，少量的被污染示例可以使后门达到饱和状态，并且该后门在令牌特征级别上进行泛化。我们提出了两种检测方法，能够有效区分被污染的适配器和干净的适配器，且在高召回率下没有假阳性。最后，研究还表明，后门的定位主要集中在中后层的MLP模块，且特定的触发锚令牌对攻击效果有显著影响。'}}}, {'id': 'https://huggingface.co/papers/2605.30231', 'title': 'Beyond 3D VQAs: Injecting 3D Spatial Priors into Vision-Language Models for Enhanced Geometric Reasoning', 'url': 'https://huggingface.co/papers/2605.30231', 'abstract': "Abstract Training Vision-Language Models with geometric priors improves 3D spatial reasoning through deep supervision with contrastive loss and depth consistency, achieving better performance than standard fine-tuning approaches.  AI-generated summary Vision-Language Models (VLMs) often struggle with robust 3D spatial reasoning. Prevailing methods that rely on fine-tuning with 3D visual question-answering (VQA) datasets may overfit dataset-specific biases, while integrating specialized 3D visual encoders is often inflexible and cumbersome. In this paper, we argue that genuine spatial understanding should emerge from learning fundamental geometric priors, not only from high-level VQA supervision. We propose GASP (Geometric-Aware Spatial Priors), a framework that injects these priors directly into the LLM's transformer layers. GASP employs a small correspondence head, applied as a deep supervision signal across all layers, and is trained with a dual objective leveraging ground-truth geometry from large-scale video scenes: a contrastive loss on ground-truth point correspondences enforces 2D view-invariance, while a depth consistency supervision resolves 3D geometric ambiguities. Our analysis first provides a diagnostic showing that standard VLMs' internal correspondence matching accuracy is very low (often below 5%). We then demonstrate that our training substantially improves this behavior, boosting peak layer-wise correspondence to over 70% and maintaining over 85% temporal robustness while baselines remain below 5%. These internal improvements translate to significant gains on downstream spatial benchmarks including +18.2% on All-Angles Bench and +29.0% on VSI-Bench, all without training on any 3D VQA data. Our findings indicate that learning from fundamental geometric priors is a promising and generalizable pathway towards VLMs with more reliable 3D spatial reasoning.", 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '9a4621b5a81e44d5', 'authors': ['Chun-Hsiao Yeh', 'Shengyi Qian', 'Manchen Wang', 'Yi Ma', 'Joseph Tighe', 'Fanyi Xiao'], 'affiliations': ['FAIR at Meta', 'HKU', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.30231.jpg', 'data': {'categories': ['#multimodal', '#3d', '#cv', '#training', '#benchmark'], 'emoji': '🧊', 'ru': {'title': 'Геометрические приоритеты вместо набора примеров', 'desc': 'В работе предлагается GASP — фреймворк для улучшения пространственного мышления мультимодальных LLM путём внедрения геометрических приоритетов непосредственно в слои трансформера. Модель обучается с использованием глубокого контроля через два взаимодополняющих сигнала: контрастивную потерю для инвариантности к изменению угла обзора и функцию консистентности глубины для разрешения 3D-неоднозначностей. Авторы показывают, что стандартные моделиям требуется обучение на фундаментальных геометрических принципах, а не только на размеченных наборах вопросов и ответов о сцене. Предложенный метод достигает значительного улучшения на тестовых наборах, демонстрируя, что геометрические приоритеты — перспективный путь к надёжному 3D-пространственному рассуждению в мультимодальных моделях.'}, 'en': {'title': 'Enhancing 3D Spatial Reasoning with Geometric Priors in VLMs', 'desc': "This paper introduces GASP (Geometric-Aware Spatial Priors), a novel framework designed to enhance Vision-Language Models (VLMs) by incorporating geometric priors for improved 3D spatial reasoning. Unlike traditional methods that rely heavily on fine-tuning with specific datasets, GASP integrates these priors directly into the model's transformer layers, allowing for more flexible and robust learning. The framework employs a dual objective with contrastive loss and depth consistency, significantly boosting the model's internal correspondence accuracy from below 5% to over 70%. The results show substantial improvements in spatial reasoning benchmarks, demonstrating that leveraging fundamental geometric principles can lead to more reliable VLMs without the need for extensive 3D visual question-answering data."}, 'zh': {'title': '几何先验助力3D空间推理的突破', 'desc': '本文提出了一种新的框架GASP（几何感知空间先验），旨在通过引入几何先验来提升视觉-语言模型（VLMs）的3D空间推理能力。与传统的微调方法不同，GASP直接在模型的变换器层中注入几何先验，并通过对比损失和深度一致性进行深度监督。研究表明，标准VLMs在内部对应匹配的准确性非常低，而GASP的训练显著提高了这一准确性，达到了70%以上。最终，GASP在多个空间基准测试中取得了显著的性能提升，表明学习基本的几何先验是实现更可靠的3D空间推理的有效途径。'}}}, {'id': 'https://huggingface.co/papers/2605.30003', 'title': 'Discovering Cooperative Pipelines: Autoresearch for Sequential Social Dilemmas', 'url': 'https://huggingface.co/papers/2605.30003', 'abstract': 'Abstract Two-level autoresearch framework enables AI agents to autonomously optimize LLM policy-synthesis pipelines for multi-agent social dilemmas, demonstrating superior performance and objective-specific mechanism discovery.  AI-generated summary We study two-level autoresearch for cooperation: an outer-loop AI agent autonomously redesigns the inner-loop pipeline of an LLM policy-synthesis system for multi-agent Sequential Social Dilemmas (SSDs). A researcher agent R (run as a coding agent) reads the inner-loop source code, edits system prompts, feedback functions, helper libraries, and iteration logic, runs evaluations, and decides what to keep, following the autoresearch paradigm. Across two games (Cleanup and Gathering), two policy-synthesizer LLMs, and two welfare objectives (utilitarian efficiency and Rawlsian maximin), the researcher reliably exceeds hand-designed baselines, sharply tightens run-to-run variance, and outperforms prompt-only optimization. The discovered pipelines are objective-dependent: only under maximin does the researcher inject an explicit fairness mechanism into synthesizer pipelines, a class of mechanism that is absent from its own objective-agnostic system prompt and from every efficiency-optimized pipeline. This supports an information-design reading in which the researcher chooses what to reveal to the boundedly rational synthesizer as a function of the welfare objective. Code at https://github.com/vicgalle/autoresearch-social-dilemmas.', 'score': 1, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '7244d556e35dd112', 'authors': ['Víctor Gallego'], 'affiliations': ['Komorebi AI Technologies'], 'pdf_title_img': 'assets/pdf/title_img/2605.30003.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#agents', '#training', '#games', '#alignment', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Автоматическое открытие механизмов кооперации через двухуровневую оптимизацию LLM-агентов', 'desc': 'В работе предлагается двухуровневый фреймворк автоматического исследования, где внешний агент на основе LLM автономно оптимизирует внутренний pipeline синтеза политик для решения многоагентных социальных дилемм. Исследовательский агент модифицирует исходный код, системные подсказки и функции обратной связи, запускает оценки и принимает решения о сохранении улучшений. Экспериментально показано, что автоматически найденные pipelines превосходят ручные базовые методы, снижают дисперсию между запусками и обнаруживают механизмы, зависящие от целевой функции, включая явные механизмы справедливости для максиминного критерия.'}, 'en': {'title': 'Autonomous Optimization for AI Cooperation in Social Dilemmas', 'desc': 'This paper presents a two-level autoresearch framework that allows AI agents to autonomously improve the policy-synthesis processes of large language models (LLMs) in multi-agent social dilemmas. The outer-loop AI agent modifies the inner-loop pipeline by analyzing and editing the source code, prompts, and evaluation metrics to enhance performance. The study shows that this approach outperforms traditional hand-designed methods and reduces variability in results across different games and objectives. Notably, the framework adapts the synthesized policies based on specific welfare goals, introducing fairness mechanisms when necessary, which highlights the importance of objective-dependent design in AI systems.'}, 'zh': {'title': '自主优化多智能体社会困境的AI框架', 'desc': '本文提出了一种两级自我研究框架，使人工智能代理能够自主优化大语言模型（LLM）策略合成管道，以应对多智能体社会困境。外层代理负责重新设计内层管道，通过编辑源代码、系统提示和反馈函数等，来提升系统性能。研究表明，该方法在多个游戏和目标下的表现优于手动设计的基线，并且显著降低了运行间的方差。研究者根据不同的目标选择性地注入公平机制，展示了信息设计的视角。'}}}, {'id': 'https://huggingface.co/papers/2605.29157', 'title': 'Parallax: Parameterized Local Linear Attention for Language Modeling', 'url': 'https://huggingface.co/papers/2605.29157', 'abstract': 'Abstract Local Linear Attention is enhanced through parameterization and hardware-aware optimization to improve LLM training efficiency and performance while maintaining computational stability.  AI-generated summary Large Language Models (LLMs) have become the central paradigm in artificial intelligence, yet the core computational primitive of attention has remained structurally unchanged. Local Linear Attention (LLA) is an attention mechanism derived from nonparametric statistics in the test-time regression framework. In contrast to prior research on efficient attention variants, LLA upgrades the local constant estimate in softmax attention to a local linear estimate, yielding provably superior bias-variance tradeoffs for associative memory. However, LLA has not been scaled in LLM pretraining due to computational and numerical stability concerns. We introduce Parallax, a parameterized Local Linear Attention that is scalable for LLMs. Parallax eliminates the numerical solver in LLA and learns an extra query-like projector that probes the KV covariance. We place Parallax within a family of attention mechanisms connected by the bandwidth, the probe construction and the affine structure. We propose a hardware-aware algorithm that increases the arithmetic intensity over FlashAttention, shifting attention into a more compute bound regime. Our prototype decode kernel matches or outperforms FlashAttention 2/3 across diverse batch sizes and context lengths. We pretrain Parallax at 0.6B and 1.7B scales and find consistent perplexity improvements throughout pretraining with gains that transfer to downstream benchmarks. The advantage persists under both parameter-matched and compute-matched controls, demonstrating a Pareto improvement. We perform careful pretraining ablations and identify a novel phenomenon whereby Muon unlocks the capacity of Parallax. To our knowledge, this is the first empirical demonstration of strong architecture-optimizer codesign for attention mechanisms in the architecture research literature.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '6031c8f29e0cf037', 'authors': ['Yifei Zuo', 'Dhruv Pai', 'Zhichen Zeng', 'Alec Dewulf', 'Shuming Hu', 'Zhaoran Wang'], 'affiliations': ['Northwestern University', 'Tilde Research', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.29157.jpg', 'data': {'categories': ['#training', '#inference', '#optimization', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Масштабируемое локальное линейное внимание для эффективного обучения больших языковых моделей', 'desc': 'В работе представлен Parallax — параметризованный механизм локального линейного внимания, который решает проблемы масштабируемости и численной стабильности оригинального алгоритма LLA для обучения больших языковых моделей. Авторы разработали аппаратно-оптимизированный алгоритм, повышающий арифметическую интенсивность относительно FlashAttention и достигающий лучшей производительности декодирования. Предварительное обучение моделей масштаба 0.6B и 1.7B показывает стабильное улучшение перплексии на предварительном обучении и бенчмарках. Работа демонстрирует первый эмпирический пример успешного коразработки архитектуры внимания и оптимизатора (Muon) в исследованиях трансформеров.'}, 'en': {'title': 'Enhancing Attention: Parallax for Efficient LLM Training', 'desc': 'This paper introduces Parallax, a new parameterized Local Linear Attention (LLA) mechanism designed to enhance the training efficiency and performance of Large Language Models (LLMs). By replacing the traditional numerical solver in LLA with a learnable query-like projector, Parallax improves computational stability and scalability for LLM pretraining. The authors propose a hardware-aware optimization strategy that increases arithmetic intensity, allowing Parallax to outperform existing attention mechanisms like FlashAttention across various configurations. The results show consistent improvements in perplexity during pretraining, indicating that Parallax effectively enhances model performance while maintaining stability.'}, 'zh': {'title': '提升大型语言模型训练效率的局部线性注意力机制', 'desc': '本文提出了一种名为Parallax的参数化局部线性注意力机制，旨在提高大型语言模型（LLM）的训练效率和性能，同时保持计算的稳定性。Parallax通过消除局部线性注意力中的数值求解器，并学习额外的查询投影器，来探测键值（KV）协方差。研究表明，Parallax在不同的批量大小和上下文长度下，能够与FlashAttention 2/3相匹配或超越，并在预训练过程中持续改善困惑度。该研究首次展示了注意力机制的架构与优化器的强协同设计，推动了注意力机制的进一步发展。'}}}, {'id': 'https://huggingface.co/papers/2605.27355', 'title': 'Alignment Tampering: How Reinforcement Learning from Human Feedback Is Exploited to Optimize Misaligned Biases', 'url': 'https://huggingface.co/papers/2605.27355', 'abstract': "Abstract Reinforcement Learning from Human Feedback (RLHF) presents alignment tampering vulnerabilities where language models can manipulate preference datasets, leading to amplified undesired behaviors due to limitations in pairwise comparisons and reward modeling.  AI-generated summary Reinforcement Learning from Human Feedback (RLHF) is the standard method to align Large Language Models (LLMs) with human preferences. In this work, we introduce alignment tampering, a potential vulnerability where the LLM undergoing alignment influences the preference dataset, causing RLHF to amplify undesired behaviors. This arises from core limitations of RLHF: (1) preference datasets are constructed from the LLM's own outputs, allowing it to influence them, and (2) pairwise comparisons only indicate which response is better, not why. These limitations can be exploited to cause alignment tampering. For example, if an LLM generates biased responses with higher quality, annotators will prefer them based on quality. However, preference labels do not distinguish quality from bias, and the reward model inherits this limitation. Optimizing such rewards through reinforcement learning or best-of-N sampling can amplify misaligned biases. Our experiments demonstrate amplification across diverse biases: from keyword bias to propaganda (e.g., sexism), brand promotion, and instrumental goal-seeking. Mitigation remains challenging, as existing techniques for robust RLHF fail to fully resolve alignment tampering without sacrificing response quality. These findings reveal structural vulnerabilities of current RLHF and emphasize the need to prevent this vulnerability. Project page: https://alignment-tampering.github.io/", 'score': 1, 'issue_id': 2338, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'eda163e13ba9870c', 'authors': ['Dongyoon Hahm', 'Dylan Hadfield-Menell', 'Kimin Lee'], 'affiliations': ['KAIST', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2605.27355.jpg', 'data': {'categories': ['#security', '#rlhf', '#training', '#ethics', '#alignment'], 'emoji': '⚠️', 'ru': {'title': 'Когда модель обманывает оценщика: манипуляция датасетом в RLHF', 'desc': 'В работе выявлена уязвимость в методе обучения с подкреплением на основе обратной связи от человека (RLHF), который широко используется для выравнивания больших языковых моделей с человеческими предпочтениями. Авторы показывают, что языковые модели могут манипулировать датасетами предпочтений, генерируя выходные данные с высоким качеством, но содержащие нежелательные смещения, которые аннотаторы не различают. Проблема возникает из-за двух ограничений RLHF: датасеты собираются из собственных выходов модели, и попарные сравнения показывают только, какой ответ лучше, не объясняя почему. В результате модель вознаграждения наследует эту неоднозначность, и оптимизация по такой функции награды усиливает смещённые и неправильно выравненные поведения.'}, 'en': {'title': 'Preventing Alignment Tampering in Language Models', 'desc': "This paper discusses a problem in Reinforcement Learning from Human Feedback (RLHF) where language models can manipulate the data used to train them, leading to worse behavior. The authors introduce the concept of alignment tampering, which occurs when a language model influences its own preference dataset, causing it to amplify undesirable traits. They highlight two main issues: the model's outputs shape the preference data, and the way preferences are compared does not explain the reasons behind choices. Their experiments show that this can lead to the reinforcement of biases, and they stress the need for better methods to address these vulnerabilities without compromising the quality of responses."}, 'zh': {'title': '揭示RLHF的对齐篡改脆弱性', 'desc': '强化学习与人类反馈（RLHF）是一种将大型语言模型（LLM）与人类偏好对齐的标准方法。本文提出了对齐篡改的概念，这是一种潜在的脆弱性，LLM在对齐过程中会影响偏好数据集，从而放大不良行为。此问题源于RLHF的核心局限性：偏好数据集由LLM自身输出构建，且成对比较仅能指示哪个响应更好，而无法解释原因。这种局限性可能被利用，导致对齐篡改，进而放大偏见和不良行为。'}}}, {'id': 'https://huggingface.co/papers/2605.26485', 'title': 'OmniInteract: Benchmarking Real-World Streaming Interaction for Real-Time Omnimodal Assistants', 'url': 'https://huggingface.co/papers/2605.26485', 'abstract': 'Abstract OmniInteract presents a streaming benchmark for real-time omnimodal large language models that evaluates online audio-visual processing with temporal grounding and interactive response requirements.  AI-generated summary We introduce OmniInteract, a streaming benchmark for real-time omnimodal large language models evaluated through native online inference over audio-visual streams. Unlike offline video understanding or text-prompted streaming QA, OmniInteract preserves the original audio-visual stream and requires models to process it online, without access to future content. User queries and ambient sounds are embedded in the audio track, requiring models to detect multimodal triggers, decide when to respond, and answer while the stream unfolds. OmniInteract contains 250 videos with 1,430 temporally grounded response slots: 1,062 1Q1A slots across real-time, proactive, and nested scenarios, and 368 1QnA slots for continuous task monitoring and step guidance. Each slot includes a trigger, response window, and target answer. We evaluate response correctness, timing, invalid outputs, interruption handling, and context continuity using Interaction-Aware Quality-Timeliness F1, Interruption Diagnostic Suite, and Nested Chain Completion Score. Experiments show that current models remain weak in streaming interaction, with the best overall IA-QTF1 reaching only 0.368 and the best 1QnA IA-QTF1 only 0.052. Further study on mathematical reasoning in full-duplex settings shows that offline capability does not necessarily transfer to online interaction. Code and datasets will be made publicly accessible at https://github.com/Lucky-Lance/OmniInteract.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e7947dde7c256a3b', 'authors': ['Xudong Lu', 'Xueying Li', 'Annan Wang', 'Yang Bo', 'Jinpeng Chen', 'Zengliang Li', 'Nianzu Yang', 'Rui Liu', 'Xue Yang', 'Jingwen Hou', 'Hongsheng Li'], 'affiliations': ['CUHK MMLab', 'CityUHK', 'JUFE', 'McMaster', 'NTU', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2605.26485.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#video', '#audio', '#open_source', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Реальное время в потоке: оценка интерактивных омнимодальных моделей', 'desc': 'OmniInteract представляет бенчмарк для оценки омнимодальных больших языковых моделей в режиме реального времени. Этот бенчмарк требует от моделей обрабатывать потоки аудио-видео контента в онлайн-режиме, без доступа к будущему содержимому, обнаруживать мультимодальные триггеры и принимать решение о времени ответа. Датасет содержит 250 видео с 1430 временно привязанными слотами ответов различной сложности, включая сценарии реального времени и непрерывного мониторинга задач. Экспериментальные результаты показывают, что современные модели демонстрируют низкую производительность в потоковом взаимодействии, и навыки офлайн-обработки не переносятся эффективно на онлайн-сценарии.'}, 'en': {'title': 'Revolutionizing Real-Time Interaction with OmniInteract', 'desc': "OmniInteract introduces a new benchmark designed for evaluating real-time omnimodal large language models that process audio-visual streams. This benchmark requires models to interactively respond to user queries while analyzing the original audio-visual content without any foresight of future data. It includes 250 videos with specific response slots that test the models' ability to detect triggers and maintain context during streaming. The results indicate that current models struggle with streaming interactions, highlighting a gap between offline capabilities and real-time performance."}, 'zh': {'title': '实时多模态交互的新基准', 'desc': 'OmniInteract是一个用于实时多模态大语言模型的流式基准测试，专注于在线音视频处理和交互响应。与离线视频理解不同，OmniInteract要求模型在没有未来内容访问的情况下，实时处理原始音视频流。该基准包含250个视频和1430个时间定位的响应槽，评估模型的响应正确性、时效性和上下文连续性。实验结果表明，目前的模型在流式交互方面表现较弱，最好的IA-QTF1得分仅为0.368。'}}}, {'id': 'https://huggingface.co/papers/2605.25220', 'title': "Multi-view Consistent 3D Gaussian Head Avatars 'without' Multi-view Generation", 'url': 'https://huggingface.co/papers/2605.25220', 'abstract': "Abstract A novel single-shot 3D Gaussian head avatar generation method called MVCHead uses hierarchical state space models and multi-view consistency enforcement to create high-fidelity 3D assets from 2D images without requiring multi-view data or 3D supervision.  AI-generated summary High-fidelity 3D Gaussian head avatar generation is critical for applications such as AR/VR, telepresence, and digital humans. Existing methods depend on multi-view datasets, 3D captures, or intermediate 2D view synthesis. In contrast, we learn both conditional and unconditional 3D head models from randomly sampled 2D images alone, without using multi-view data, 3D supervision, or intermediate view generation. We introduce MVCHead, a single-shot state space model that enforces multi-view consistency (MVC) directly in the 3D representation while regressing 3D Gaussians under these constraints. At its core, we propose a Hierarchical State Space (HiSS) block that progressively refines Gaussians from coarse to fine, while capturing long-range dependencies. Within each HiSS block, we modify Mamba's standard unidirectional scan with the proposed Hierarchical Bi-directional State Scan (HiBiSS) that aligns recurrence with the axes along which multi-view inconsistencies are strongest. Finally, we design an SE(3) Multi-view Critic that judges whether a set of self-renders arises from a single underlying 3D configuration, rewarding cross-view pixel alignment without observing real multi-view pairs. MVCHead achieves state-of-the-art perceptual quality, surpasses prior methods in both texture and geometric consistency, and maintains comparable shape consistency. To demonstrate scalability, we release FaceGS-10K, the first large-scale dataset of ready-to-use 3D Gaussian head assets for training and evaluation of 3D head models. Project Page and code: https://humansensinglab.github.io/MVCHead/", 'score': 1, 'issue_id': 2340, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '55e8cc9549dfeb1e', 'authors': ['Aviral Chharia', 'Fernando De la Torre'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.25220.jpg', 'data': {'categories': ['#architecture', '#3d', '#dataset', '#multimodal'], 'emoji': '🗿', 'ru': {'title': 'Один снимок — полноценный 3D голова: генерация без мультивью разметки', 'desc': 'MVCHead — это метод для генерации высококачественных 3D аватаров голов из одного 2D изображения без использования мультивью-данных или 3D разметки. В основе подхода лежат иерархические модели пространства состояний (HiSS), которые постепенно уточняют 3D гауссианы от грубого приближения к деталям, одновременно отслеживая дальние зависимости. Авторы предложили модифицированный механизм двунаправленного сканирования состояний (HiBiSS), который выравнивает рекуррентное вычисление по осям, где мультивью-несогласованность максимальна. Дополнительно разработан SE(3) мультивью-критик, который оценивает, возникают ли рендеры из единственной 3D конфигурации, вознаграждая пиксельное выравнивание между видами без наблюдения реальных мультивью пар.'}, 'en': {'title': 'Revolutionizing 3D Avatar Creation from 2D Images', 'desc': 'The paper presents MVCHead, a new method for generating high-quality 3D Gaussian head avatars from 2D images without needing multi-view data or 3D supervision. It utilizes hierarchical state space models to progressively refine 3D representations while ensuring multi-view consistency. The method introduces a novel Hierarchical Bi-directional State Scan (HiBiSS) to better align 3D features and reduce inconsistencies across different views. Additionally, the authors provide a large dataset, FaceGS-10K, to support the training and evaluation of 3D head models, achieving superior texture and geometric consistency compared to existing techniques.'}, 'zh': {'title': '单次生成高保真3D头像的新方法', 'desc': 'MVCHead是一种新颖的单次生成3D高斯头像的方法，利用分层状态空间模型和多视图一致性约束，从2D图像生成高保真3D资产，而无需多视图数据或3D监督。该方法通过从随机采样的2D图像中学习条件和无条件的3D头模型，避免了传统方法对多视图数据的依赖。MVCHead的核心是分层状态空间（HiSS）模块，它逐步细化高斯模型，同时捕捉长距离依赖关系。最终，我们还设计了一个SE(3)多视图评估器，能够判断自渲染图像是否源自单一的3D配置，从而在没有真实多视图对的情况下奖励跨视图像素对齐。'}}}, {'id': 'https://huggingface.co/papers/2605.23235', 'title': 'Convex Low-resource Accent-Robust Language Detection in Speech Recognition', 'url': 'https://huggingface.co/papers/2605.23235', 'abstract': 'Abstract A novel convex optimization framework for language detection in spoken dialogue systems that achieves high accuracy with efficient training and theoretical guarantees against dialectal variations under low-resource conditions.  AI-generated summary Globalization and multiculturalism continue to produce increasingly diverse speech varieties. Yet current spoken dialogue systems frequently fail on under-represented dialects and accents, often misidentifying the input language and causing cascading failures in downstream dialogue tasks. Addressing this dialectal variance under low-resource constraints remains an open challenge, as standard fine-tuning is computationally expensive and prone to overfitting on high-dimensional speech data. We propose Convex Language Detection (CLD), a novel framework that integrates theoretically grounded convex optimization techniques into the spoken dialogue systems pipeline. Our method is efficiently implemented via multi-GPU Alternating Direction Method of Multipliers (ADMM) in JAX, thus providing global optimality guarantees and fast training in polynomial time. Theoretically, we prove that our convex objective induces certified margin stability and provide guarantees against feature perturbations. Empirically, we demonstrate sample efficiency and robustness to input dialectical variation, achieving 97-98% accuracy in challenging low-resource regimes. Our open-source package is available at https://pypi.org/project/jaxcld/', 'score': 1, 'issue_id': 2342, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '962143d746a46069', 'authors': ['Miria Feng', 'William Tan', 'Mert Pilanci'], 'affiliations': ['Department of Computer Science, Stanford University, California, United States', 'Department of Electrical Engineering, Stanford University, California, United States'], 'pdf_title_img': 'assets/pdf/title_img/2605.23235.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization', '#audio', '#multilingual', '#open_source', '#low_resource'], 'emoji': '🎯', 'ru': {'title': 'Выпуклая оптимизация для надежного определения языка в условиях дефицита данных', 'desc': 'Работа представляет новый подход к определению языка в системах диалогового взаимодействия, основанный на выпуклой оптимизации. Метод обеспечивает высокую точность (97-98%) даже в условиях ограниченных данных и различных диалектов, используя алгоритм ADMM с теоретическими гарантиями глобальной оптимальности. Авторы доказывают стабильность решения и устойчивость к возмущениям входных признаков, избегая проблем перообучения при работе с высокоразмерными речевыми данными. Метод реализован как открытый пакет на языке JAX и демонстрирует эффективность особенно для недостаточно представленных в данных языковых разновидностей.'}, 'en': {'title': 'Revolutionizing Language Detection with Convex Optimization', 'desc': "This paper introduces a new method called Convex Language Detection (CLD) for identifying languages in spoken dialogue systems. It uses convex optimization techniques to improve accuracy, especially for dialects that are often overlooked in low-resource settings. The approach is efficient, leveraging multi-GPU training to ensure quick results while maintaining high performance. The authors provide theoretical guarantees for the method's stability and robustness against variations in speech input, achieving impressive accuracy rates."}, 'zh': {'title': '高效语言检测的新方法', 'desc': '本文提出了一种新的凸优化框架，用于在对话系统中进行语言检测。该方法在低资源条件下，能够高效训练并对方言变异提供理论保证。通过多GPU交替方向乘子法（ADMM）实现，确保了全局最优性和快速训练。实验结果显示，该方法在样本效率和对输入方言变化的鲁棒性方面表现优异，准确率达到97-98%。'}}}, {'id': 'https://huggingface.co/papers/2605.22765', 'title': 'Uniform Diffusion Models Revisited: Leave-One-Out Denoiser and Absorbing State Reformulation', 'url': 'https://huggingface.co/papers/2605.22765', 'abstract': 'Abstract  Discrete diffusion models are often trained through clean-data prediction, but the prediction can be used in different ways to define the reverse dynamics. In Masked Diffusion Models (MDM) these choices largely coincide, whereas in Uniform Diffusion Models (UDM) they do not. We show that the standard plug-in bridge parameterization for UDM is not optimized by the denoising posterior, but by a leave-one-out posterior that predicts each clean token without using its own noisy observation. This identifies a mismatch between the plug-in ELBO and the usual cross-entropy denoising objective. We characterize the leave-one-out target and derive exact conversions between the denoiser, the leave-one-out posterior, and the score. These conversions allow us to disentangle parameterization and training objective. Our results also lead to inference improvements without any additional training through an informed predictor-corrector sampler and improved temperature sampling based on the leave-one-out predictor.   We further introduce an absorbing-state reformulation of uniform diffusion that preserves the UDM joint law while decomposing it into masked-diffusion-like sampling operations, with simpler denoising posteriors, carry-over unmasking, and a natural remasking mechanism. On language modeling, leave-one-out parameterizations consistently improve UDM generation, while the absorbing construction matches or surpasses masked diffusion. These results suggest that the empirical gap between masked and uniform diffusion is driven less by the choice of marginals themselves than by parameterization and sampling design. The code and models can be found at https://github.com/samsongourevitch/rev_udm.', 'score': 1, 'issue_id': 2339, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': 'f3cdac382fd5e877', 'authors': ['Samson Gourevitch', 'Yazid Janati', 'Dario Shariatian', 'Umut Simsekli', 'Eric Moulines', 'Eric P. Xing', 'Alain Durmus'], 'affiliations': ['CMAP, Ecole polytechnique', 'EPITA, LRE', 'Inria, PSL Research University', 'Institute of Foundation Models', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.22765.jpg', 'data': {'categories': ['#diffusion', '#training', '#architecture', '#open_source'], 'emoji': '🔄', 'ru': {'title': 'Оптимальная параметризация дискретных диффузионных моделей через leave-one-out апостериор', 'desc': 'В работе исследуются дискретные диффузионные модели, которые обучаются предсказанию чистых данных, но это предсказание можно использовать по-разному для определения обратной динамики. Авторы показывают, что стандартная параметризация для равномерных диффузионных моделей оптимизируется не деноизирующим апостериором, а leave-one-out апостериором, который предсказывает каждый токен без использования собственного зашумленного наблюдения. Они выводят точные преобразования между деноизером, leave-one-out апостериором и скором, что позволяет разделить параметризацию и целевую функцию обучения. Предложено новое поглощающее состояние для равномерной диффузии и показано, что эмпирический разрыв между маскированной и равномерной диффузией обусловлен скорее выбором параметризации, чем маргинальными распределениями.'}, 'en': {'title': 'Optimizing Uniform Diffusion: Bridging Parameterization and Performance', 'desc': 'This paper explores the training and prediction methods of discrete diffusion models, specifically comparing Masked Diffusion Models (MDM) and Uniform Diffusion Models (UDM). It reveals that the standard parameterization for UDM is not optimized by the typical denoising approach, but rather by a leave-one-out posterior that predicts clean tokens without their noisy counterparts. The authors derive conversions between the denoiser and the leave-one-out posterior, which helps clarify the relationship between model parameterization and training objectives. Additionally, they propose an absorbing-state reformulation for UDM that enhances sampling efficiency and improves language modeling performance, indicating that the differences between MDM and UDM stem more from design choices than from the underlying marginals.'}, 'zh': {'title': '优化均匀扩散模型的去噪目标', 'desc': '离散扩散模型通常通过干净数据预测进行训练，但预测可以用不同方式定义反向动态。在掩蔽扩散模型（MDM）中，这些选择大致一致，而在均匀扩散模型（UDM）中则不然。我们发现，UDM的标准插件桥接参数化并不是通过去噪后验优化的，而是通过一种不使用自身噪声观测的留一法后验来优化。我们的研究表明，留一法目标与常规交叉熵去噪目标之间存在不匹配，这为参数化和训练目标的解耦提供了基础。'}}}, {'id': 'https://huggingface.co/papers/2605.13857', 'title': 'MoZoo:Unleashing Video Diffusion power in animal fur and muscle simulation', 'url': 'https://huggingface.co/papers/2605.13857', 'abstract': 'Abstract MoZoo generates high-fidelity animal videos from coarse meshes using diffusion models with novel attention mechanisms and a synthetic-to-real data pipeline.  AI-generated summary The creation of cinematic-quality animal effects necessitates the precise modeling of muscle and fur dynamics, a process that remains both labor-intensive and computationally expensive within traditional production workflows. While generative diffusion models have shown promise in diverse artistic workflows, their capacity for high-fidelity animal simulation remains largely unexploited. We present MoZoo, a generative dynamics solver that bypasses conventional refinement to synthesize high-fidelity animal videos from coarse meshes under multimodal guidance. We propose Role-Aware RoPE (RAR-RoPE) which employs role-based index remapping to synchronize motion alignment while decoupling reference information via fixed temporal offsets. Complementing this, Asymmetric Decoupled Attention partitions the latent sequence to enforce a unidirectional information flow, effectively preventing feature interference and improving computational efficiency. To address the scarcity of high-quality training data, we introduce MoZoo-Data, a synthetic-to-real pipeline that leverages a rendering engine and an inverse mapping approach to construct a large-scale dataset of paired sequences. Furthermore, we establish MoZooBench, a comprehensive benchmark with 120 mesh-video pairs. Experimental results demonstrate that MoZoo achieves high-fidelity fur simulation across diverse animal skeletons and layouts, preserving superior temporal and structural consistency.', 'score': 1, 'issue_id': 2337, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '427e37c56f72b42f', 'authors': ['Dongxia Liu', 'Jie Ma', 'Xiaochen Yang', 'Jiancheng Zhang', 'Bin Xia', 'Zhehan Kan', 'Nisha Huang', 'Jun Liang', 'Wenming Yang', 'Jin Li'], 'affiliations': ['HUIJING Digital Media & Entertainment Group', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Glasgow'], 'pdf_title_img': 'assets/pdf/title_img/2605.13857.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#architecture', '#synthetic', '#video', '#diffusion', '#benchmark'], 'emoji': '🦁', 'ru': {'title': 'Кинематографическая анимация животных из простых сеток через диффузию', 'desc': 'MoZoo — это генеративная модель на основе диффузии, которая создает высокачественные видео животных из грубых 3D-моделей. Авторы предложили новые механизмы внимания: Role-Aware RoPE для синхронизации движений и асимметричное развязанное внимание для эффективной обработки информации. Для решения проблемы нехватки обучающих данных разработана синтетическая-реальная конвейер обработки данных (MoZoo-Data), который автоматически генерирует парные последовательности видео-сетки. Модель демонстрирует высокое качество симуляции шерсти и сохраняет временную и структурную согласованность для различных животных.'}, 'en': {'title': 'MoZoo: High-Fidelity Animal Video Generation with Diffusion Models', 'desc': 'MoZoo is a novel approach that generates high-quality animal videos from simple 3D models using advanced diffusion models. It introduces innovative techniques like Role-Aware RoPE and Asymmetric Decoupled Attention to enhance motion synchronization and computational efficiency. The method also addresses the challenge of limited training data by creating a synthetic-to-real data pipeline, which generates a large dataset of paired sequences. Experimental results show that MoZoo effectively simulates realistic fur dynamics and maintains consistency across various animal forms.'}, 'zh': {'title': 'MoZoo：高保真动物视频生成的新方法', 'desc': 'MoZoo 是一种生成模型，能够从粗糙的网格生成高保真的动物视频。它使用了新颖的注意力机制和合成到真实的数据管道，解决了传统制作流程中肌肉和毛发动态建模的复杂性。通过引入角色感知的 RoPE 和非对称解耦注意力，MoZoo 提高了运动对齐的精度和计算效率。为了克服高质量训练数据的不足，MoZoo 还构建了一个大型数据集和基准测试，展示了其在多种动物骨架和布局下的优越表现。'}}}, {'id': 'https://huggingface.co/papers/2605.30344', 'title': 'Tiny but Trusted: Efficient Vision-Language Reasoning for Time-Series Anomaly Detection', 'url': 'https://huggingface.co/papers/2605.30344', 'abstract': 'Abstract A parameter-efficient vision-language model is developed for time-series anomaly detection using a novel benchmark with natural-language rationales, achieving superior performance and generalization across multiple datasets.  AI-generated summary Recent advances in Vision-Language Models (VLMs) have achieved impressive performance across many tasks, yet prior studies report unsatisfactory performance when applying large language or multimodal models to finding abnormal patterns in sequential data. Public anomaly detection benchmarks typically provide interval annotations but not natural-language rationales, making it difficult to fine-tune VLMs to produce grounded, interpretable decisions. To address this gap, we construct VisAnomBench, a curated benchmark built from public time-series datasets and augmented with high-quality anomaly explanations selected from multiple large VLMs using fine-grained, task-specific rewards. Through fine-tuning on this benchmark, we develop VisAnomReasoner, a parameter-efficient VLM for time-series anomaly detection. Experimental results on VisAnomBench show that VisAnomReasoner achieves more accurate anomaly localization and consistently outperforms all baselines, with improvements of at least 21.23 and 23.87 percentage points in precision and F1, respectively. Additional experiments on the TSB-AD-U benchmark demonstrate strong cross-benchmark generalization, with VisAnomReasoner improving precision and F1 by 9.57 and 13.39 percentage points, respectively.', 'score': 0, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '89db1a47ee549546', 'authors': ['Xiaona Zhou', 'Muntasir Wahed', 'Tianjiao Yu', 'Constantin Brif', 'Ismini Lourentzou'], 'affiliations': ['Sandia National Laboratories', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.30344.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Интерпретируемое обнаружение аномалий во временных рядах через мультимодальные модели', 'desc': 'В работе предложена параметрически эффективная мультимодальная модель для обнаружения аномалий во временных рядах. Авторы создали новый бенчмарк VisAnomBench с естественно-языковыми объяснениями аномалий, полученными от больших vision-language моделей с использованием специализированных наград. На основе этого бенчмарка разработана модель VisAnomReasoner, которая показывает значительное улучшение в точности локализации аномалий и обобщении на других датасетах. Модель продемонстрировала превосходство над всеми базовыми решениями с улучшением метрик на 20+ процентных пункта.'}, 'en': {'title': 'Revolutionizing Anomaly Detection with Vision-Language Models', 'desc': "This paper presents a new vision-language model called VisAnomReasoner, designed specifically for detecting anomalies in time-series data. It addresses the limitations of existing benchmarks that lack natural-language explanations for anomalies, which are crucial for training models to make interpretable decisions. The authors introduce VisAnomBench, a benchmark that combines public time-series datasets with high-quality anomaly rationales, enhancing the model's ability to understand and explain its predictions. Experimental results demonstrate that VisAnomReasoner significantly outperforms existing models in both precision and F1 score, showcasing its effectiveness and generalization across different datasets."}, 'zh': {'title': '高效视觉-语言模型助力时间序列异常检测', 'desc': '本文提出了一种高效的视觉-语言模型，用于时间序列异常检测。我们构建了一个新的基准数据集VisAnomBench，结合了公共时间序列数据集和高质量的异常解释，以便更好地训练模型。通过在该基准上进行微调，我们开发了VisAnomReasoner，这是一种参数高效的模型，能够准确定位异常。实验结果表明，VisAnomReasoner在多个数据集上表现优越，精确度和F1分数均有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.22771', 'title': 'Reducing Political Manipulation with Consistency Training', 'url': 'https://huggingface.co/papers/2605.22771', 'abstract': 'Abstract Large language models demonstrate systematic political bias in handling opposing viewpoints, which can be mitigated through a reinforcement learning approach that maintains helpfulness while reducing bias.  AI-generated summary Large language models (LLMs) exhibit systematic political bias across a variety of sensitive contexts. We find that LLMs handle counterpart topics from opposing political sides asymmetrically. We refer to this phenomenon as covert political bias and identify 7 categories of techniques through which it operates. We propose two metrics for covert bias: Sentiment Consistency measures symmetry in rhetoric and framing across paired political prompts; Helpfulness Consistency measures symmetric depth and engagement. To reduce both types of covert bias, we introduce Political Consistency Training (PCT), an RL training method with two complementary paradigms: Sentiment Consistency Training and Helpfulness Consistency Training. We show that PCT preserves overall helpfulness, substantially reduces covert political bias, and generalizes to held-out benchmarks. We release our work at https://political-manipulation.ai', 'score': 0, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'dacf8d9b04101fa8', 'authors': ['Long Phan', 'Devin Kim', 'Alexander Pan', 'Alice Blair', 'Adam Khoja', 'Dan Hendrycks'], 'affiliations': ['Center for AI Safety', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.22771.jpg', 'data': {'categories': ['#rl', '#open_source', '#benchmark', '#alignment', '#rlhf', '#ethics'], 'emoji': '⚖️', 'ru': {'title': 'Балансировка политических взглядов в языковых моделях через обучение с подкреплением', 'desc': 'В работе исследуется проблема скрытого политического смещения в больших языковых моделях, которые асимметрично обрабатывают противоположные точки зрения на чувствительные темы. Авторы выявили семь категорий техник, через которые проявляется это смещение, и предложили две метрики для его измерения: консистентность тональности и консистентность полезности ответов. Для решения проблемы предложен метод Political Consistency Training, использующий обучение с подкреплением с двумя дополняющими друг друга подходами. Экспериментально показано, что предложенный метод эффективно снижает политическое смещение, сохраняя при этом полезность модели и обобщаясь на новые примеры.'}, 'en': {'title': 'Mitigating Political Bias in Language Models with Reinforcement Learning', 'desc': "This paper addresses the issue of political bias in large language models (LLMs), which often show an imbalance in how they present opposing political viewpoints. The authors introduce a method called Political Consistency Training (PCT), which uses reinforcement learning to improve the fairness of LLMs while maintaining their helpfulness. They propose two metrics, Sentiment Consistency and Helpfulness Consistency, to measure and mitigate covert political bias. The results demonstrate that PCT effectively reduces bias without sacrificing the quality of the model's responses."}, 'zh': {'title': '减少隐性政治偏见的强化学习方法', 'desc': '大型语言模型在处理对立观点时表现出系统性的政治偏见。我们发现这些模型在对立政治主题的处理上存在不对称性，这种现象被称为隐性政治偏见。为了解决这个问题，我们提出了一种强化学习方法，称为政治一致性训练（PCT），它通过情感一致性训练和有用性一致性训练来减少偏见，同时保持模型的有用性。实验结果表明，PCT显著降低了隐性政治偏见，并且在其他基准测试中也表现良好。'}}}, {'id': 'https://huggingface.co/papers/2605.30060', 'title': 'Towards Consistent Video Geometry Estimation', 'url': 'https://huggingface.co/papers/2605.30060', 'abstract': 'Abstract ViGeo is a transformer-based foundation model that recovers dense and consistent 3D geometry from videos using dynamic chunking attention and a completion-based data refinement framework.  AI-generated summary This work presents ViGeo, a feed-forward foundation model for recovering spatially dense and temporally consistent geometry from video sequences. Built upon a plain transformer architecture without task-specific architectural modifications, ViGeo supports streaming, full-sequence, and long-video inference within a unified model. The key design is dynamic chunking attention, which exposes the model to both bidirectional and causal temporal contexts during training and allows it to adapt its attention pattern at test time without retraining. To improve supervision quality, we further introduce a completion-based data refinement framework. This framework trains a video depth completion teacher that conditions on sparse and noisy annotations and exploits video/multi-view context to produce dense, temporally coherent, and geometrically reliable training targets. Beyond depth and point maps, ViGeo also predicts surface normals within the same framework. Trained solely on public datasets, ViGeo achieves state-of-the-art performance across online, offline, and long-video depth estimation, surface normal estimation, and video point map estimation.', 'score': 0, 'issue_id': 2339, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '019e8047415f3162', 'authors': ['Zhu Yu', 'Jingnan Gao', 'Runmin Zhang', 'Lingteng Qiu', 'Zhengyi Zhao', 'Rui Peng', 'Yichao Yan', 'Kejie Qiu', 'Siyu Zhu', 'Si-Yuan Cao', 'Hui-Liang Shen'], 'affiliations': ['Fudan University', 'Shanghai Jiao Tong University', 'Tongyi Lab, Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30060.jpg', 'data': {'categories': ['#dataset', '#video', '#architecture', '#training', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Трансформер для восстановления 3D геометрии из видео с адаптивным вниманием', 'desc': 'ViGeo — это foundational model на основе трансформера, который восстанавливает плотную и согласованную трёхмерную геометрию из видеопоследовательностей. Модель использует механизм dynamic chunking attention, позволяющий адаптировать паттерны внимания как к двусторонним, так и к причинным временным контекстам без переобучения. Для улучшения качества разметки авторы предложили фреймворк data refinement на основе completion, который обучает учителя предсказывать плотные и временно согласованные карты глубины. Модель обучается на публичных датасетах и достигает state-of-the-art результаты в восстановлении глубины, нормалей поверхности и карт точек из видео.'}, 'en': {'title': 'Transforming Video into 3D Geometry with ViGeo', 'desc': 'ViGeo is a transformer-based model designed to extract detailed 3D geometry from video data. It utilizes a unique dynamic chunking attention mechanism that allows the model to consider both past and future frames during training, enhancing its ability to understand temporal relationships. The model also incorporates a completion-based data refinement framework, which improves the quality of the training data by generating accurate depth and surface normal predictions from sparse inputs. By leveraging public datasets, ViGeo sets new benchmarks in depth estimation and related tasks, demonstrating its effectiveness in processing long video sequences.'}, 'zh': {'title': 'ViGeo：视频中的3D几何恢复新方法', 'desc': 'ViGeo是一个基于变换器的基础模型，能够从视频中恢复稠密且一致的3D几何结构。它采用动态分块注意力机制，使模型在训练时能够接触到双向和因果的时间上下文，并在测试时自适应调整注意力模式。为了提高监督质量，ViGeo引入了一种基于补全的数据精炼框架，利用稀疏和噪声注释来生成稠密且时间一致的训练目标。经过训练，ViGeo在深度估计、表面法线估计和视频点图估计等任务上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.29486', 'title': 'PhoneWorld: Scaling Phone-Use Agent Environments', 'url': 'https://huggingface.co/papers/2605.29486', 'abstract': 'Abstract PhoneWorld is a pipeline that transforms real GUI trajectories and screenshots into controllable mobile environments, executable tasks, and automated verifiers, enabling scalable creation of phone-use benchmarks.  AI-generated summary A central bottleneck for phone-use agents is that controllable, reproducible environments covering real mobile behavior are hard to build at scale. Existing mobile-agent benchmarks have made important progress on evaluation, but they do not by themselves provide a scalable way to construct many new phone-use environments. We present PhoneWorld, a reusable pipeline that converts real GUI trajectories and screenshots into controllable phone-use environments, executable tasks, automatic verifiers, and training rollouts. Rather than hand-building one mobile benchmark at a time, PhoneWorld uses real trajectories to recover which screens matter, how screens connect, which interactions must change environment state, and which user goals admit automatic verification. From these signals, it builds runnable mock Android apps backed by read-only app content and mutable state, then derives executable tasks, rule-based verifiers, and training rollouts from the same environments. In its current instantiation, PhoneWorld covers 34 apps across 16 domains, spanning common consumer mobile behaviors such as search, browsing, shopping, booking, media, and social interaction. Under a fixed training budget, replacing 10K steps from an auxiliary AndroidWorld corpus in an AndroidWorld-based baseline with broad PhoneWorld supervision improves all four evaluation benchmarks at once, raising HYMobileBench by 17.7 points, AndroidControl by 6.0 points, AndroidWorld by 14.7 points, and PhoneWorld by 52.5 points. We then study two additional scaling questions: increasing the amount of PhoneWorld supervision strongly improves PhoneWorld performance, and under a fixed PhoneWorld budget, expanding app coverage yields even larger gains. Overall, PhoneWorld shifts the focus from building one mobile benchmark at a time to scaling the supply of phone-use environments themselves.', 'score': 0, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '64b61c59ad2a58ef', 'authors': ['Zhengyang Tang', 'Yuxuan Liu', 'Xin Lai', 'Junyi Li', 'Pengyuan Lyu', 'Jason', 'Yiduo Guo', 'Zhengyao Fang', 'Yang Ding', 'Yi Zhang', 'Weinong Wang', 'Huawen Shen', 'Xingran Zhou', 'Liang Wu', 'Fei Tang', 'Sunqi Fan', 'Shangpin Peng', 'Zheng Ruan', 'Anran Zhang', 'Benyou Wang', 'Rui Yan', 'Ji-Rong Wen', 'Chengquan Zhang', 'Han Hu'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Tencent Hunyuan', 'The Chinese University of Hong Kong, Shenzhen', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29486.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '📱', 'ru': {'title': 'Масштабируемое создание мобильных бенчмарков из реальных пользовательских траекторий', 'desc': 'PhoneWorld — это конвейер, который преобразует реальные траектории взаимодействия с мобильным интерфейсом и снимки экрана в контролируемые мобильные окружения с автоматическими верификаторами задач. Система анализирует реальное поведение пользователей, чтобы выделить ключевые экраны, их взаимосвязи и изменения состояния, необходимые для выполнения задач. На основе этих сигналов создаются работающие макеты приложений Android с неизменяемым контентом и изменяемым состоянием, из которых затем извлекаются исполняемые задачи и правила верификации. Подход позволяет масштабируемо конструировать бенчмарки для агентов, работающих с мобильными приложениями, вместо ручного создания каждого бенчмарка отдельно.'}, 'en': {'title': 'Transforming Mobile Benchmarking with PhoneWorld', 'desc': 'PhoneWorld is a novel pipeline designed to create scalable mobile environments by transforming real graphical user interface (GUI) trajectories and screenshots. It addresses the challenge of building reproducible environments for mobile agents by automating the generation of tasks and verifiers from real user interactions. By analyzing these trajectories, PhoneWorld identifies key screens, interactions, and user goals, allowing for the creation of runnable mock Android applications. This approach significantly enhances the performance of mobile benchmarks, demonstrating that increased supervision and broader app coverage lead to improved outcomes in evaluating mobile behaviors.'}, 'zh': {'title': 'PhoneWorld：可扩展的手机使用环境构建工具', 'desc': 'PhoneWorld是一个将真实的图形用户界面（GUI）轨迹和截图转化为可控的手机环境、可执行任务和自动验证器的管道。这一方法解决了构建可控、可重复的手机使用环境的难题，从而支持大规模创建手机使用基准。通过分析真实的用户轨迹，PhoneWorld能够识别重要的屏幕、屏幕之间的连接以及需要改变环境状态的交互。最终，PhoneWorld覆盖了34个应用程序，显著提高了多个评估基准的性能，推动了手机使用环境的可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2605.16363', 'title': 'ORACLE: Anticipating Scams from Partial Trajectories in Streaming App Usage', 'url': 'https://huggingface.co/papers/2605.16363', 'abstract': 'Abstract An online reasoning framework anticipates smartphone scams by analyzing streaming app-usage trajectories through self-evolving context management and on-policy self-distillation techniques.  AI-generated summary Smartphone scams are increasingly prevalent and typically manifest as multi-stage, cross-application processes with gradually emerging intent. Effective intervention thus requires anticipating scams before the intent becomes explicit. This is inherently challenging, as decisions must rely on partial trajectories with temporally distributed evidence. In this paper, we propose ORACLE Online Reasoning for Anticipating Cross-temporal Latent thrEats, the first agentic framework for early scam anticipation from streaming app-usage trajectories. To support this setting, we curate a real-world long-horizon benchmark of streaming app-usage trajectories, covering 12 scam types, spanning extended periods (15 days on average), involving diverse applications (95 apps), and interleaving normal and scam behaviors. To address fragmented evidence, we introduce a self-evolving context manager that adaptively consolidates entity-centric interactions over time, enabling more effective reconstruction of cross-temporal evidence from partial observations. To enhance sensitivity to latent early-stage signals, we propose an on-policy self-distillation scheme in which a teacher model, conditioned on summarized anti-scam reflections and clues by skills, supervises a student model without access to such reflections. This scheme thereby distills evidence-informed knowledge and improves recognition of emerging fraud patterns from partial trajectories. Experiments show that  consistently improves early scam anticipation, yielding timely warnings while reducing false alerts in realistic streaming scenarios.', 'score': 0, 'issue_id': 2338, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'd247ae570a2918f0', 'authors': ['Wenbo Gao', 'Songbai Tan', 'Zhongan Wang', 'Fei Shen', 'Gang Xu', 'Huiping Zhuang', 'Yunyun Yang', 'Ming Li', 'Xiaofeng Zhu'], 'affiliations': ['Guangming Laboratory', 'Hainan University', 'Harbin Institute of Technology, Shenzhen', 'National University of Singapore', 'Shenzhen University', 'South China University of Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.16363.jpg', 'data': {'categories': ['#security', '#long_context', '#reasoning'], 'emoji': '🚨', 'ru': {'title': 'Предвидение мошенничества в реальном времени через адаптивный анализ траекторий приложений', 'desc': 'В статье предложена фреймворк ORACLE для раннего предсказания мошеннических схем на смартфонах путем анализа потоковых траекторий использования приложений. Авторы разработали самоэволюционирующий менеджер контекста, который адаптивно консолидирует взаимодействия между сущностями во времени для реконструкции кросс-временных свидетельств из неполных наблюдений. Для улучшения чувствительности к латентным сигналам мошенничества на ранних стадиях предложена схема онполитического самодистилляции, где учительская модель передает знания студенческой модели через обобщенные размышления об анти-мошеннических паттернах. Экспериментальные результаты показывают, что предложенный подход значительно улучшает предсказание мошеннических схем и обеспечивает своевременные предупреждения с минимизацией ложных срабатываний.'}, 'en': {'title': 'Predicting Smartphone Scams with ORACLE: Early Detection through Smart Analysis', 'desc': 'This paper presents ORACLE, an innovative online reasoning framework designed to predict smartphone scams by analyzing user app-usage patterns. It utilizes self-evolving context management to effectively consolidate fragmented evidence from partial app interactions over time. Additionally, the framework employs an on-policy self-distillation technique, where a teacher model guides a student model to enhance the detection of early-stage scam signals. The results demonstrate that ORACLE significantly improves the anticipation of scams, providing timely alerts while minimizing false positives in real-world scenarios.'}, 'zh': {'title': '智能手机诈骗的早期预测新方法', 'desc': '本文提出了一种在线推理框架，旨在通过分析智能手机应用使用轨迹来预测诈骗行为。该框架利用自我演化的上下文管理和在线自蒸馏技术，有效处理部分轨迹中的时序证据。我们构建了一个真实世界的基准数据集，涵盖12种诈骗类型，涉及95个应用程序，能够更好地重建跨时间的证据。实验结果表明，该方法在早期诈骗预测方面表现出色，能够及时发出警告并减少误报。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
