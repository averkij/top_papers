analyses further suggest that fine-tuning often reshapes learned positional preferences, although pre-existing architectural or pretraining-specific tendencies persist in some models. These results identify training-position distribution as a major controllable factor in retrieval-level position bias and suggest balanced data curation as a practical mitigation strategy.', 'score': 11, 'issue_id': 2337, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '0216e049e888ef13', 'authors': ['Daegon Yu', 'SeungYoon Han', 'Woomyoung Park'], 'affiliations': ['Sionic AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.26578.jpg', 'data': {'categories': ['#training', '#rag', '#benchmark', '#data'], 'emoji': '⚖️', 'ru': {'title': 'Сбалансированные данные исправляют позиционное смещение в поисковых моделях', 'desc': 'Исследование показывает, что позиционное распределение данных в обучающем наборе значительно влияет на позиционное смещение в плотных поисковых моделях. Авторы создали синтетические датасеты с доказательствами в начале, середине или конце документов и обучили восемь различных архитектур под позиционно-смещённое и сбалансированное распределение. Результаты демонстрируют, что сбалансированное обучение снижает позиционную чувствительность на 57-87% при сохранении конкурентоспособной производительности поиска. Анализ представлений показал, что fine-tuning переформирует усвоенные позиционные предпочтения моделей.'}, 'en': {'title': 'Balancing Training Data to Combat Positional Bias in Retrieval Models', 'desc': 'This paper investigates how the distribution of training data positions affects positional bias in dense retrievers, which are models used for information retrieval. It finds that when training data is balanced, the models show a significant reduction in sensitivity to positional bias, improving retrieval performance by up to 87%. The authors create synthetic training sets to analyze how the position of relevant information influences model behavior, revealing that skewed training leads to a preference for information located in specific positions. Ultimately, the study highlights the importance of balanced training data as a strategy to mitigate positional bias in retrieval systems.'}, 'zh': {'title': '平衡训练数据，减少检索偏差', 'desc': '本研究探讨了训练数据的位置分布如何影响密集检索器的位置信息偏差。通过构建合成的目标位置训练集，我们发现不平衡的训练分布会导致检索性能下降，尤其是当相关信息位于文档的后面时。平衡的训练数据能够显著降低位置信息的敏感性，减少高达87%的偏差，同时保持竞争力的检索性能。我们的分析表明，训练位置分布是影响检索级别位置偏差的重要因素，建议采用平衡的数据策划作为一种有效的缓解策略。'}}}, {'id': 'https://huggingface.co/papers/2605.26029', 'title': 'CausaLab: A Scalable Environment for Interactive Causal Discovery Toward AI Scientists', 'url': 'https://huggingface.co/papers/2605.26029', 'abstract': "Abstract CausaLab evaluates LLM agents on causal discovery by requiring both accurate predictions and faithful recovery of underlying causal mechanisms through synthetic experimental scenarios.  AI-generated summary We introduce CausaLab, a scalable environment for evaluating interactive causal discovery by LLM agents. Unlike prior evaluations, CausaLab evaluates both whether an agent can solve a problem using causal evidence and whether its answer is grounded in a faithful recovered causal mechanism. Each episode places an agent in a synthetic laboratory: it receives prior measurement records, intervenes on a manipulator crystal, and predicts the resonance frequency of a held-out reactor crystal governed by the same mechanism. The hidden data-generating process is a randomly sampled structural causal model (SCM), so success requires recovering both a causal graph and structural equations rather than recalling prior knowledge.   Experiments show a persistent gap between prediction and mechanism recovery: in the purely observational 6-node setting, GPT-5.2-high reaches 92% task accuracy but only 0.471 all-edge F_1. Mixed observation-intervention strategies improve structural fidelity, while pure intervention remains difficult even for strong agents. We identify premature stopping as a major weakness and show that consistency verification mitigates it. CausaLab therefore separates predictive success from causal understanding and exposes current LLM agents' limits as experimental causal reasoners.", 'score': 9, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'b10ceac082626404', 'authors': ['Junlin Yang', 'Dylan Zhang', 'Xiangchen Song', 'Qirun Dai', 'Xiao Liu', 'Yuen Chen', 'Aniket Vashishtha', 'Jing Shi', 'Chenhao Tan', 'Hao Peng'], 'affiliations': ['Adobe', 'Carnegie Mellon University', 'Tsinghua University', 'University of Chicago', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.26029.jpg', 'data': {'categories': ['#dataset', '#synthetic', '#agents', '#reasoning', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'Различие между предсказанием и причинным пониманием в агентах', 'desc': 'CausaLab представляет масштабируемую среду для оценки способности LLM-агентов к причинному обнаружению. В отличие от существующих методов, система проверяет не только точность предсказаний, но и правильность восстановления лежащих в основе причинных механизмов через синтетические эксперименты. Агенты работают с синтетической лабораторией, где получают наблюдаемые данные, проводят интервенции и предсказывают результаты на основе скрытых структурных причинных моделей. Исследования выявляют существенный разрыв между точностью предсказаний и качеством восстановления причинной структуры, демонстрируя ограничения современных LLM в причинном рассуждении.'}, 'en': {'title': 'CausaLab: Bridging Prediction and Causal Understanding in LLMs', 'desc': 'CausaLab is a new framework designed to assess how well large language model (LLM) agents can discover causal relationships. It does this by testing their ability to make accurate predictions while also ensuring that these predictions are based on a true understanding of the underlying causal mechanisms. The evaluation involves agents working in a simulated lab environment where they must analyze data, perform interventions, and predict outcomes based on a hidden causal structure. Results indicate that while LLMs can achieve high prediction accuracy, they often struggle with accurately recovering the causal mechanisms, highlighting a gap in their causal reasoning capabilities.'}, 'zh': {'title': 'CausaLab：揭示因果推理的局限性', 'desc': 'CausaLab是一个用于评估大型语言模型（LLM）在因果发现方面表现的环境。它不仅要求模型能够准确预测结果，还要能够忠实地恢复潜在的因果机制。每个实验场景中，模型需要根据先前的测量记录进行干预，并预测由相同机制控制的反应器的共振频率。实验结果显示，尽管模型在预测任务上表现良好，但在因果机制恢复方面仍存在显著差距，揭示了当前LLM在因果推理方面的局限性。'}}}, {'id': 'https://huggingface.co/papers/2605.27995', 'title': 'AsyncTool: Evaluating the Asynchronous Function Calling Capability under Multi-Task Scenarios', 'url': 'https://huggingface.co/papers/2605.27995', 'abstract': 'Abstract LLM-based agents face significant challenges in asynchronous tool calling due to delayed responses, requiring improved task coordination and temporal reasoning capabilities.  AI-generated summary Large language model (LLM)-based agents have shown strong capabilities in using external tools to solve complex tasks. However, existing evaluations often overlook the temporal dimension of tool use, especially the impact of tool response latency, and are usually limited to single-task settings. In real-world applications, multiple tasks often need to be executed concurrently, and overall efficiency depends on whether an agent can use idle time while waiting for tool responses. We refer to this capability as asynchronous tool calling. To evaluate it, we propose AsyncTool, a benchmark for assessing LLM-based agents in interactive multi-task tool-use environments with delayed tool feedback. AsyncTool presents multiple heterogeneous tasks simultaneously and simulates realistic tool response latency during execution. Using a hybrid data evolution strategy, we construct a diverse asynchronous multitasking dataset that covers multiple scenarios and tool-use patterns. We evaluate models at the step, sub-task, and task levels, and introduce efficiency-oriented metrics to measure task coordination and completion efficiency. Extensive experiments show that delayed tool feedback poses substantial challenges to current agents and leads to clear performance degradation. Models that better coordinate task switching, dependency tracking, and state maintenance achieve stronger performance on AsyncTool. Our analysis identifies key failure modes of current tool-using agents and provides practical insights for designing future systems with stronger temporal reasoning and coordination capabilities.', 'score': 9, 'issue_id': 2337, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '16af879c234504d5', 'authors': ['Kou Shi', 'Ziao Zhang', 'Shiting Huang', 'Avery Nie', 'Zhen Fang', 'Qiuchen Wang', 'Lin Chen', 'Huaian Chen', 'Zehui Chen', 'Feng Zhao'], 'affiliations': ['University of Science and Technology of China', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2605.27995.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '⏱️', 'ru': {'title': 'Асинхронные инструменты: преодоление задержек в многозадачных агентах', 'desc': 'В работе предложен новый бенчмарк AsyncTool для оценки способности LLM-агентов выполнять асинхронные вызовы инструментов в многозадачной среде с реальными задержками ответов. Авторы показывают, что текущие модели плохо справляются с координацией задач и отслеживанием зависимостей при работе с отложенной обратной связью от инструментов. Исследование вводит новые метрики эффективности для измерения качества переключения между задачами и завершения работ в условиях асинхронности. Результаты указывают на необходимость улучшения темпоральных рассуждений и механизмов координации в агентах следующего поколения.'}, 'en': {'title': 'Enhancing LLM Agents with Asynchronous Tool Calling', 'desc': 'This paper addresses the challenges faced by large language model (LLM)-based agents when using external tools in environments with delayed responses. It introduces AsyncTool, a benchmark designed to evaluate these agents in multi-task settings where tool response latency is a factor. The study highlights the importance of asynchronous tool calling, where agents must efficiently manage multiple tasks while waiting for tool feedback. The findings reveal that improved task coordination and temporal reasoning are crucial for enhancing the performance of LLM-based agents in real-world applications.'}, 'zh': {'title': '提升异步工具调用能力，优化智能体表现', 'desc': '基于大型语言模型（LLM）的智能体在异步工具调用中面临显著挑战，主要是由于响应延迟，亟需提高任务协调和时间推理能力。现有评估往往忽视工具使用的时间维度，尤其是工具响应延迟的影响，通常局限于单任务设置。为了解决这一问题，我们提出了AsyncTool基准，旨在评估LLM智能体在交互式多任务工具使用环境中的表现，特别是在工具反馈延迟的情况下。通过构建多样化的异步多任务数据集，我们的实验表明，延迟的工具反馈对当前智能体造成了显著挑战，影响了其性能。'}}}, {'id': 'https://huggingface.co/papers/2605.30102', 'title': 'When Cloud Agents Meet Device Agents: Lessons from Hybrid Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2605.30102', 'abstract': 'Abstract Hybrid multi-agent systems combining large and small language models offer flexible inference trade-offs, but optimal architecture depends heavily on specific tasks and performance metrics.  AI-generated summary The design space of agentic AI inference spans two extremes: frontier large language models (LLMs), typically hosted in the cloud and offering strong performance across a wide range of tasks at substantially high cost, and more cost-efficient small language models (SLMs), which are amenable to on-device inference. Hybrid multi-agent systems (MASs) combining on-device and cloud models offer a promising middle ground, but they also introduce a complex and poorly understood design space in which task accuracy, monetary cost, and edge energy consumption are tightly coupled; in the absence of general design principles, hybrid components, although not the most prevalent choice, are typically introduced through ad hoc decisions tailored to specific domains. In this work, we examine this design space more systematically. We adapt two representative MAS architectures to support hybrid inference and study how individual design choices shift the operating point along the Pareto frontier of power, cost, and performance. Our findings paint a nuanced picture of hybrid MAS design: while SLMs can effectively benefit from LLM assistance, the optimal architecture is highly task-dependent, and greater frontier-level compute does not consistently translate to better performance.', 'score': 7, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'dd3208d819a93c4b', 'authors': ['Corrado Rainone', 'Davide Belli', 'Bence Major', 'Arash Behboodi'], 'affiliations': ['Qualcomm AI Research', 'Qualcomm Technologies, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.30102.jpg', 'data': {'categories': ['#small_models', '#agents', '#inference'], 'emoji': '⚖️', 'ru': {'title': 'Баланс между облаком и устройством: оптимизация гибридных агентов по Парето', 'desc': 'В статье исследуется дизайн гибридных многоагентных систем, которые объединяют большие языковые модели в облаке с малыми моделями на устройстве пользователя. Авторы адаптируют два представительных архитектуры многоагентных систем для поддержки гибридного вывода и анализируют, как различные проектные решения влияют на компромисс между производительностью, стоимостью и энергопотреблением. Исследование показывает, что малые модели могут эффективно использовать помощь больших моделей, но оптимальная архитектура сильно зависит от конкретной задачи. Полученные результаты подтверждают, что увеличение вычислительной мощности фронтальной модели не всегда гарантирует лучшую производительность системы.'}, 'en': {'title': 'Optimizing Hybrid AI: Balancing Power, Cost, and Performance', 'desc': 'This paper explores hybrid multi-agent systems (MAS) that combine large language models (LLMs) and small language models (SLMs) to optimize inference for various tasks. It highlights the trade-offs between performance, cost, and energy consumption when using these models in different configurations. The authors systematically analyze how design choices impact the balance of these factors, revealing that the best architecture is highly dependent on the specific task at hand. Their findings suggest that while SLMs can gain advantages from LLMs, simply using more powerful models does not always lead to improved outcomes.'}, 'zh': {'title': '混合多智能体系统：灵活的推理选择', 'desc': '这篇论文探讨了混合多智能体系统（MAS）的设计，结合了大型语言模型（LLMs）和小型语言模型（SLMs）。研究表明，最佳架构取决于具体任务和性能指标，且不同设计选择会影响功耗、成本和性能之间的平衡。虽然小型语言模型可以从大型语言模型的支持中受益，但并不是所有情况下都能提高性能。论文系统性地分析了这一设计空间，强调了在缺乏通用设计原则的情况下，混合组件的选择往往是针对特定领域的临时决策。'}}}, {'id': 'https://huggingface.co/papers/2605.29534', 'title': 'UI-KOBE: Knowledge-Oriented Behavior Exploration for Lightweight Graph-Guided GUI Agents', 'url': 'https://huggingface.co/papers/2605.29534', 'abstract': 'Abstract UI-KOBE framework enhances lightweight mobile GUI agents by incorporating reusable app-specific graph knowledge to improve task planning and execution efficiency.  AI-generated summary Recent advances in mobile GUI agents have shown strong potential for automating mobile tasks, but most effective systems still depend on large vision-language models for screenshot understanding and long-horizon planning. Small GUI agents that can be deployed directly on mobile devices are more attractive for practical use, offering lower inference cost and better protection of sensitive on-device information. However, due to limited model capacity, such lightweight agents remain unreliable when planning and executing GUI tasks end-to-end from screenshots alone. We propose Knowledge-Oriented Behavior Exploration (UI-KOBE), a framework that improves lightweight mobile GUI agents with reusable app-specific graph knowledge. UI-KOBE first autonomously explores a mobile application and constructs an app knowledge graph, where nodes represent distinct UI states and edges represent executable transitions. At runtime, a lightweight GUI agent uses the graph as external guidance: given a user task and the current screenshot, it identifies the current graph node and selects among self-loop actions, neighboring transitions, task completion, or fallback free actions associated with that node. By supporting runtime decisions with app-specific graph guidance, UI-KOBE reduces the burden of end-to-end GUI planning and helps lightweight models perform mobile GUI tasks more effectively, offering a practical step toward efficient, interpretable, and privacy-conscious on-device GUI agents.', 'score': 7, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '065b359c06a7c4fe', 'authors': ['Yuxiang Chai', 'Han Xiao', 'Xinyu Fu', 'Jinpeng Chen', 'Rui Liu', 'Hongsheng Li'], 'affiliations': ['CPII under InnoHK', 'CUHK MMLab', 'Huawei Research', 'Shenzhen Loop Area Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.29534.jpg', 'data': {'categories': [], 'emoji': '📱', 'ru': {'title': 'Знание как компас: навигация лёгких агентов по графу приложения', 'desc': 'Статья описывает фреймворк UI-KOBE для улучшения лёгких мобильных GUI-агентов путём использования переиспользуемого графового представления приложений. Система автономно исследует мобильное приложение и строит граф знаний, где вершины соответствуют UI-состояниям, а рёбра — возможным переходам между ними. Во время выполнения задачи агент использует этот граф как внешнее руководство, определяя текущее состояние и выбирая между доступными действиями. Благодаря графовой поддержке решений, фреймворк снижает сложность сквозного планирования и позволяет облегчённым моделям эффективнее выполнять задачи на мобильных устройствах с лучшей защитой конфиденциальности.'}, 'en': {'title': 'Empowering Lightweight GUI Agents with Knowledge Graphs', 'desc': 'The UI-KOBE framework enhances lightweight mobile GUI agents by integrating reusable app-specific graph knowledge to boost their task planning and execution efficiency. It addresses the limitations of small agents that struggle with end-to-end task execution from screenshots due to their limited model capacity. By autonomously exploring mobile applications and creating an app knowledge graph, UI-KOBE allows agents to make informed decisions based on the current UI state and available actions. This approach not only reduces the computational burden but also improves the reliability and privacy of mobile GUI task automation.'}, 'zh': {'title': '提升轻量级移动GUI代理的智能规划', 'desc': 'UI-KOBE框架通过引入可重用的应用特定图知识，增强了轻量级移动GUI代理的任务规划和执行效率。该框架首先自主探索移动应用，构建应用知识图，其中节点表示不同的用户界面状态，边表示可执行的转换。在运行时，轻量级GUI代理利用该图作为外部指导，根据用户任务和当前屏幕截图识别当前图节点，并选择合适的操作。通过支持基于应用特定图的运行时决策，UI-KOBE减轻了端到端GUI规划的负担，使轻量级模型能够更有效地执行移动GUI任务。'}}}, {'id': 'https://huggingface.co/papers/2605.29559', 'title': 'LiteCoder-Terminal: Scaling Long-Horizon Terminal Environments for Learning Language Agents', 'url': 'https://huggingface.co/papers/2605.29559', 'abstract': 'Abstract LiteCoder-Terminal-Gen enables scalable training of language agents for terminal environments through synthetic, executable environments that outperform traditional methods.  AI-generated summary Mastering terminal environments requires language agents capable of multi-step planning, feedback-grounded execution, and dynamic state adaptation. However, training such agents is currently bottlenecked by a reliance on scraped external repositories, which limits domain diversity, environment controllability, and the targeting of specific capability deficits. We introduce LiteCoder-Terminal-Gen, a zero-dependency synthesis pipeline that autonomously generates executable and verifiable terminal training environments directly from domain specifications. Using this framework, we construct two large-scale resources: LiteCoder-Terminal-SFT, comprising 11,255 expert trajectories across 10 domains, and LiteCoder-Terminal-RL, featuring 602 verifiable environments for trajectory-level preference optimization. Supervised fine-tuning of Qwen-family models on our SFT dataset yields agents that significantly outperform their base counterparts. Notably, our 32B variant achieves 29.06%, 18.54%, and 34.00% pass@1 on Terminal Bench 1.0, 2.0, and Pro, respectively. Furthermore, applying Direct Multi-turn Preference Optimization (DMPO) on our RL environments yields additional performance gains. These results systematically demonstrate that fully synthetic, executable environments offer a scalable and verifiable supervision signal for mastering complex, real-world command-line workflows.', 'score': 7, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '7857c2ec966a6414', 'authors': ['Xiaoxuan Peng', 'Kaiqi Zhang', 'Xinyu Lu', 'Boxi Cao', 'Yaojie Lu', 'Hongyu Lin', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.29559.jpg', 'data': {'categories': ['#rlhf', '#dataset', '#synthetic', '#agents', '#reasoning', '#training', '#open_source'], 'emoji': '💻', 'ru': {'title': 'Синтетические окружения для масштабируемого обучения терминальных агентов', 'desc': 'LiteCoder-Terminal-Gen предлагает методику синтетического генерирования тренировочных окружений для обучения языковых агентов работе с терминалом. Система автономно создает проверяемые и исполняемые окружения на основе спецификаций доменов, избегая зависимости от внешних репозиториев. Авторы построили два больших датасета: один с экспертными траекториями для supervised fine-tuning и другой с верифицируемыми окружениями для предпочтительной оптимизации. Эксперименты показывают, что модели, обученные на синтетических данных, значительно превосходят базовые версии и достигают высоких результатов на различных бенчмарках терминальных команд.'}, 'en': {'title': 'Revolutionizing Terminal Training with Synthetic Environments', 'desc': 'LiteCoder-Terminal-Gen is a framework designed to train language agents for terminal environments using synthetic environments. It addresses the limitations of traditional training methods by generating executable environments based on specific domain requirements. The framework produces two significant datasets: one for supervised fine-tuning and another for reinforcement learning, which help improve agent performance. The results show that agents trained with this method significantly outperform previous models in executing complex command-line tasks.'}, 'zh': {'title': '合成环境助力语言代理训练新突破', 'desc': 'LiteCoder-Terminal-Gen 是一种新型的合成训练管道，能够为终端环境生成可执行的训练环境，从而提高语言代理的训练效率。该方法克服了传统方法的局限性，能够自主生成多样化的环境，增强了代理的多步规划和动态状态适应能力。通过在我们的数据集上进行监督微调，Qwen系列模型的表现显著优于基础模型，尤其是在复杂的命令行工作流中。我们的研究表明，完全合成的可执行环境为训练语言代理提供了可扩展且可验证的监督信号。'}}}, {'id': 'https://huggingface.co/papers/2605.30268', 'title': 'PhyGenHOI: Physically-Aware 4D Generation of Dynamic Human-Object Interactions', 'url': 'https://huggingface.co/papers/2605.30268', 'abstract': 'Abstract PhyGenHOI synthesizes physically accurate 4D human-object interactions by combining motion diffusion models with material point method simulations using 3D Gaussian representations.  AI-generated summary We address the task of generating physically accurate and visually faithful 4D Human-Object Interaction (HOI). Given a static 3D human and target object represented as 3D Gaussian Splats (3DGS), our goal is to synthesize dynamic scenes where the human actively engages with the object through actions, such as punching or kicking, in accordance with a given input text. To this end, we introduce PhyGenHOI, a novel framework that couples generative human motion with an explicit physical object simulation. We model the human as a semantic agent driven by a Motion Diffusion Model (MDM) and the object as a physical agent simulated via the Material Point Method (MPM), utilizing 3D Gaussians as a unified, differentiable representation. We supervise their interaction through three coupled mechanisms: (1) A Windowed Attraction Loss that temporally synchronizes generative motion to intercept the object; (2) A Contact-Driven Re-simulation step that triggers physically consistent momentum transfer upon impact; and (3) A Masked Video-SDS objective that injects video-based priors to enhance contact fidelity. Experiments show PhyGenHOI generates physically consistent 4D HOI across diverse actions, humans, and objects, outperforming baselines. Project page and videos: https://omerbenishu.github.io/PhyGenHOI/', 'score': 6, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '7cd033852a43b1ce', 'authors': ['Omer Benishu', 'Gal Fiebelman', 'Sagie Benaim'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.30268.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#video', '#3d'], 'emoji': '🤝', 'ru': {'title': 'Физически реалистичный синтез взаимодействия человека с объектами через диффузию и физическую симуляцию', 'desc': 'PhyGenHOI - это фреймворк для синтеза физически точных 4D взаимодействий человека с объектами, объединяющий диффузионные модели движений с симуляциями методом материальных точек. Система представляет человека как семантического агента, управляемого моделью диффузии движений, а объект - как физического агента, симулируемого через метод материальных точек, используя 3D Gaussian Splats в качестве единого дифференцируемого представления. Для синхронизации взаимодействия применяются три механизма: временная синхронизация с помощью функции потерь привлечения, контактная пересимуляция для передачи импульса и видео-основанный objective для улучшения точности контактов. Эксперименты показывают, что метод генерирует физически согласованные 4D взаимодействия для разнообразных действий, персонажей и объектов.'}, 'en': {'title': 'Realistic 4D Human-Object Interactions with PhyGenHOI', 'desc': "PhyGenHOI is a framework designed to create realistic 4D human-object interactions by integrating motion diffusion models with physical simulations. It uses 3D Gaussian representations to model both the human and the object, allowing for dynamic scenes where the human interacts with the object based on input text. The framework employs a Motion Diffusion Model to generate human motion and a Material Point Method for simulating the object's physical behavior. Through three innovative mechanisms, it ensures that the generated interactions are both physically accurate and visually compelling, outperforming existing methods in generating diverse actions."}, 'zh': {'title': '合成真实的4D人机交互', 'desc': 'PhyGenHOI 是一个新颖的框架，旨在合成物理准确的 4D 人物与物体交互。它结合了运动扩散模型和材料点法模拟，使用 3D 高斯表示来生成动态场景。该方法通过三个耦合机制来监督人类与物体的交互，确保动作与物体的接触一致。实验结果表明，PhyGenHOI 在多种动作和对象上生成的 4D HOI 具有物理一致性，优于基线方法。'}}}, {'id': 'https://huggingface.co/papers/2605.29861', 'title': 'Towards Verifiable Multimodal Deep Research: A Multi-Agent Harness for Interleaved Report Generation', 'url': 'https://huggingface.co/papers/2605.29861', 'abstract': "Abstract Multi-agent system for generating reliable, visually informative multimodal reports by interleaving textual and visual evidence through specialized agents and verification mechanisms.  AI-generated summary Large Language Models (LLMs) have advanced autonomous agents from deep search, which retrieves concise factual answers, to deep research, which synthesizes scattered evidence into long-form reports. However, verifiable multimodal deep research remains challenging due to open-ended synthesis without deterministic ground truth and the need to interleave textual arguments with visual evidence. We propose Ptah, a multi-agent harness for interleaved report generation. Ptah orchestrates the lifecycle from user query to rendered web report through planning, research, and writing stages, where specialized agents construct visual-aware plans, collect claim-grounded evidence, maintain source-aligned images in a Visual Working Memory, and compose reports through declarative multimodal tool use. A verifier agent serves as the harness's acceptance function, enforcing factual grounding, citation fidelity, and cross-modal consistency throughout the workflow. We further introduce PtahEval, an evaluation protocol that augments existing benchmarks with image-level and presentation-level assessments. Experiments on deep research benchmarks show that Ptah produces more reliable, visually informative, and usable human-facing multimodal reports than strong baselines.", 'score': 6, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '3ee2623f0bf87103', 'authors': ['Chenghao Zhang', 'Guanting Dong', 'Yufan Liu', 'Tong Zhao', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.29861.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Мультиагентная система для генерации проверяемых мультимодальных отчётов с визуальными доказательствами', 'desc': 'Статья описывает Ptah — мультиагентную систему для создания надёжных мультимодальных отчётов, которые сочетают текстовые и визуальные доказательства. Система использует специализированные агенты для планирования исследования, сбора информации и написания отчётов, а также визуальную рабочую память для отслеживания релевантных изображений. Верификационный агент контролирует фактическую точность, корректность цитирования и согласованность между текстом и изображениями на протяжении всего процесса. Авторы предложили PtahEval — новый протокол оценки для измерения качества мультимодальных отчётов на уровне отдельных изображений и представления информации.'}, 'en': {'title': 'Ptah: Reliable Multimodal Report Generation with AI Agents', 'desc': 'This paper presents Ptah, a multi-agent system designed to generate reliable multimodal reports that combine text and visual evidence. It addresses the challenges of synthesizing information from various sources while ensuring factual accuracy and consistency between text and images. The system includes specialized agents that plan, research, and write reports, utilizing a Visual Working Memory to manage visual content. Additionally, PtahEval is introduced as a new evaluation protocol to assess the quality of these reports, demonstrating that Ptah outperforms existing methods in producing informative and usable outputs.'}, 'zh': {'title': 'Ptah：生成可靠的多模态报告的智能体系统', 'desc': '本论文提出了一种名为Ptah的多智能体系统，用于生成可靠且视觉信息丰富的多模态报告。该系统通过规划、研究和写作阶段，协调用户查询到网页报告的整个生命周期。Ptah利用专门的智能体构建视觉感知的计划，收集基于主张的证据，并在视觉工作记忆中维护源对齐的图像。通过引入验证智能体，确保了整个工作流程中的事实基础、引用准确性和跨模态一致性。'}}}, {'id': 'https://huggingface.co/papers/2605.26730', 'title': 'PRISM: A Multi-Dimensional Benchmark for Evaluating LLM Peer Reviewers', 'url': 'https://huggingface.co/papers/2605.26730', 'abstract': 'Abstract PRISM evaluates automated peer review systems across multiple dimensions using argument mining and retrieval-augmented verification, revealing that while LLMs match human performance in specific areas, no system consistently equals human reviewers across all evaluation criteria.  AI-generated summary The rapid growth in submissions to machine learning venues has strained the scientific peer-review system and intensified interest in LLM-based automated peer reviewers. However, how good these systems are actually, especially compared to human reviewers at catching scientific gaps, remains poorly understood. In this work, we introduce PRISM (Peer Review Intelligence via Structured Multi-dimensional assessment), a benchmarking framework that evaluates review quality across four dimensions: Depth of Analysis, Novelty Assessment,Flaw Identification & Major Issues Prioritization, and Multi-dimensional Constructiveness. Unlike most existing evaluations based on surface-level metrics like ROUGE and BLEU, or unconstrained LLM-as-a-judge prompting that conflates fluency with rigor, PRISM grounds each dimension in argument mining, retrieval-augmented verification, and consensus-based scoring. We apply PRISM to benchmark five leading automated reviewer systems and human reviewers on a stratified corpus of reviews from ICLR, ICML, and NeurIPS. The results reveal that LLMs can match or beat human reviewers on individual dimensions: comparable depth of analysis, stronger novelty verification, and highly accurate critique prioritization. However, no single system consistently matches the balanced performance of the human baseline across all dimensions at once. Each exhibits a distinct specialization profile with characteristic blind spots -- failure modes that aggregate metrics miss entirely. The implication is that LLM reviewers are best understood as targeted supplements to human review, effective within specific dimensions, but unreliable as standalone replacements. Our demo and key results can be found at https://khanhthanhdev.github.io/prism-page/.', 'score': 6, 'issue_id': 2339, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '20eee92e45f905fc', 'authors': ['Ngoc Phan Phuoc Loc', 'Toan Huynh La Viet', 'Thanh Tran Khanh', 'Duy A Nguyen', 'Tuan Anh Nguyen Pham', 'Thanh Nguyen', 'Nitesh V. Chawla', 'Wray Buntine', 'Kok-Seng Wong', 'Khoa D. Doan', 'Binh T. Nguyen'], 'affiliations': ['Monash University', 'University of Illinois, Urbana-Champaign', 'University of Notre Dame', 'VinUniversity'], 'pdf_title_img': 'assets/pdf/title_img/2605.26730.jpg', 'data': {'categories': ['#science', '#interpretability'], 'emoji': '🔍', 'ru': {'title': 'LLM-рецензенты: эксперты в деталях, но не универсальные заменители человека', 'desc': 'В статье представлена PRISM — фреймворк для комплексной оценки систем автоматизированного рецензирования научных работ на основе больших языковых моделей. Авторы вводят многомерное оценивание качества рецензий по четырём ключевым параметрам: глубина анализа, оценка новизны, выявление недостатков и приоритизация проблем. Исследование показало, что LLM могут превосходить человеческих рецензентов в отдельных измерениях, но ни одна система не демонстрирует сбалансированную производительность по всем критериям одновременно. Заключение состоит в том, что автоматизированные рецензенты на базе LLM более эффективны как дополнение к человеческому рецензированию в конкретных областях, нежели как полноценная замена.'}, 'en': {'title': 'PRISM: Enhancing Peer Review with Targeted AI Insights', 'desc': 'The paper introduces PRISM, a framework designed to evaluate automated peer review systems by examining their performance across four key dimensions: Depth of Analysis, Novelty Assessment, Flaw Identification, and Multi-dimensional Constructiveness. It highlights that while large language models (LLMs) can perform comparably to human reviewers in certain areas, they do not consistently achieve the same level of quality across all evaluation criteria. The study employs argument mining and retrieval-augmented verification to provide a more rigorous assessment than traditional metrics like ROUGE and BLEU. Ultimately, the findings suggest that LLMs should be viewed as complementary tools to human reviewers, excelling in specific tasks but lacking the comprehensive reliability of human judgment.'}, 'zh': {'title': 'PRISM：评估自动化同行评审的智能框架', 'desc': 'PRISM是一个评估自动化同行评审系统的框架，主要通过四个维度来衡量评审质量：分析深度、创新性评估、缺陷识别和主要问题优先级。研究表明，虽然大型语言模型（LLMs）在某些方面可以与人类评审者相媲美，但没有任何系统在所有评估标准上都能持续超越人类评审者。PRISM的评估方法基于论证挖掘和增强检索验证，避免了仅依赖表面指标的局限性。最终结果显示，LLMs在特定维度上表现出色，但仍需作为人类评审的补充，而非完全替代。'}}}, {'id': 'https://huggingface.co/papers/2605.29156', 'title': 'RUBRIC-ARROW: Alternating Pointwise Rubric Reward Modeling for LLM Post-training in Non-verifiable Domains', 'url': 'https://huggingface.co/papers/2605.29156', 'abstract': 'Abstract RUBRIC-ARROW presents an alternating framework for reward modeling that improves upon rubric-based methods by reducing ties and leveraging pairwise preference data for training.  AI-generated summary Pointwise reward modeling offers critical signals for LLM post-training, yet struggles with absolute scoring in subjective, non-verifiable settings. Rubric-based methods address this by decomposing evaluation into explicit criteria, but existing approaches typically depend on frontier LLMs and suffer from ties caused by hard Boolean aggregation. We present RUBRIC-ARROW, an alternating framework that jointly trains a rubric generator and a rubric-conditioned judge, with its RL stage using only pairwise preference data. Our method couples a probability-based scoring rule that reduces ties with phase-specific preference-based rewards and an alternating GRPO scheme that together train the pointwise evaluator. Extensive experiments show that RUBRIC-ARROW achieves competitive reward-modeling accuracy and yields consistent gains for downstream policy post-training.', 'score': 5, 'issue_id': 2338, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'e6e62cbaee79bbb2', 'authors': ['Haoxiang Jiang', 'Zihan Dong', 'Tianci Liu', 'Wanying Wang', 'Ran Xu', 'Tony Yu', 'Linjun Zhang', 'Haoyu Wang'], 'affiliations': ['Emory University', 'Georgia Institute of Technology', 'Purdue University', 'Rutgers University', 'University at Albany'], 'pdf_title_img': 'assets/pdf/title_img/2605.29156.jpg', 'data': {'categories': ['#training', '#rlhf'], 'emoji': '🏹', 'ru': {'title': 'Алтернирующий фреймворк для моделирования вознаграждений с гибкими критериями', 'desc': 'Работа представляет RUBRIC-ARROW — метод для обучения функций вознаграждения, которые оценивают выходы языковых моделей. Основная идея заключается в одновременном обучении генератора критериев оценки и судьи, который принимает решения на основе этих критериев. Авторы используют вероятностную систему подсчёта вместо жёсткой булевой логики, что снижает количество ничьих при сравнении ответов. Метод показывает хорошие результаты в моделировании вознаграждений и улучшает качество дообучения политики языковых моделей через усиленное обучение.'}, 'en': {'title': 'Enhancing Reward Modeling with RUBRIC-ARROW', 'desc': 'RUBRIC-ARROW introduces a new method for reward modeling in machine learning that enhances traditional rubric-based approaches. It reduces the occurrence of ties in evaluations by using pairwise preference data instead of absolute scoring, which can be subjective. The framework consists of a rubric generator and a rubric-conditioned judge that are trained together, improving the accuracy of pointwise evaluations. Experiments demonstrate that RUBRIC-ARROW not only achieves high reward-modeling accuracy but also benefits downstream policy training.'}, 'zh': {'title': 'RUBRIC-ARROW：提升奖励建模的交替框架', 'desc': 'RUBRIC-ARROW提出了一种交替框架，用于奖励建模，改进了基于评分标准的方法，减少了评分的平局情况，并利用成对偏好数据进行训练。该方法通过将评估分解为明确的标准来解决绝对评分在主观、不可验证环境中的困难。RUBRIC-ARROW同时训练评分标准生成器和条件评判器，使用成对偏好数据进行强化学习阶段。实验表明，RUBRIC-ARROW在奖励建模准确性上具有竞争力，并为下游策略后训练带来了持续的提升。'}}}, {'id': 'https://huggingface.co/papers/2605.29648', 'title': 'Verifiable Rewards Beyond Math and Code: Lightweight Corpus-Grounded Process Supervision for Factual Question Answering', 'url': 'https://huggingface.co/papers/2605.29648', 'abstract': 'Abstract CorVer, a corpus-grounded reward mechanism, enhances factual accuracy in question answering by providing efficient sentence-level feedback through Wikipedia co-occurrence statistics, outperforming neural verifiers while reducing training time.  AI-generated summary Applying reinforcement learning to improve factual accuracy in knowledge-intensive question answering faces a reward design dilemma. Response-level rewards provide only coarse supervision and cannot distinguish correct from incorrect statements within a reasoning trace. Sentence-level alternatives offer finer-grained feedback, but typically rely on NLI verifiers, LLM judges, or knowledge-verification pipelines that are expensive to deploy at RL scale and often unreliable for rare-entity facts, where accurate reward signals are especially important. We propose CorVer (Corpus Verify), a lightweight, plug-in-ready process reward that replaces neural verifiers with a corpus-grounded signal derived from Wikipedia co-occurrence statistics. CorVer assigns sentence-level credit and maps it to token-level advantages via a simple alignment, requiring only a 0.5B extractor and a single corpus lookup per sentence. Across 30 (model, benchmark) cells spanning six instruction-tuned models (3B to 14B) and five QA benchmarks, CorVer improves over the raw baseline for every cell, with an average TriviaQA gain of +4.1 pp. It also outperforms four neural-verifier baselines in 18 of 20 cells under their feasible configurations, while training 4.8 to 8.4x faster.', 'score': 4, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '9f73b8d814b1386f', 'authors': ['Shicheng Fan', 'Haochang Hao', 'Dehai Min', 'Weihao Liu', 'Philip S. Yu', 'Lu Cheng'], 'affiliations': ['University of Illinois Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2605.29648.jpg', 'data': {'categories': ['#rl', '#benchmark', '#rlhf', '#training', '#optimization', '#alignment', '#reasoning'], 'emoji': '✅', 'ru': {'title': 'Википедия вместо нейросетей: быстрая и надежная проверка фактов', 'desc': 'CorVer — это облегченный механизм вознаграждения на основе корпуса для обучения с подкреплением в задачах вопросно-ответного взаимодействия. Вместо дорогостоящих нейросетевых верификаторов система использует статистику сопряженности слов из Википедии для предоставления обратной связи на уровне предложений. Это позволяет более точно различать правильные и неправильные утверждения в цепочке рассуждений, особенно для редких сущностей. CorVer существенно превосходит базовые методы и конкурирующие подходы при значительном ускорении процесса обучения.'}, 'en': {'title': 'CorVer: Enhancing Factual Accuracy with Efficient Feedback', 'desc': 'The paper introduces CorVer, a new reward mechanism designed to improve the factual accuracy of question answering systems. It utilizes Wikipedia co-occurrence statistics to provide sentence-level feedback, which is more precise than traditional response-level rewards. This method allows for faster training times and better performance compared to existing neural verifiers. CorVer demonstrates significant improvements across various models and benchmarks, making it a valuable tool for enhancing knowledge-intensive question answering tasks.'}, 'zh': {'title': 'CorVer：提升问答准确性的轻量级奖励机制', 'desc': 'CorVer是一种基于语料库的奖励机制，通过维基百科的共现统计数据提供高效的句子级反馈，从而提高问答系统的事实准确性。与神经验证器相比，CorVer在训练时间上显著缩短，同时在多个基准测试中表现出色。它通过简单的对齐方法将句子级的奖励映射到标记级的优势，使用的资源非常少，仅需一个0.5B的提取器和每个句子的单一语料库查找。在30个模型和基准的测试中，CorVer在每个测试中都超过了原始基线，平均TriviaQA的提升达到4.1个百分点。'}}}, {'id': 'https://huggingface.co/papers/2605.29257', 'title': 'ChildVox: A Speech, Audio, and Large Audio-Language Model Benchmark in Understanding and Characterizing Sound across Childhood', 'url': 'https://huggingface.co/papers/2605.29257', 'abstract': "Abstract ChildVox presents a comprehensive benchmark for analyzing children's acoustic communication across developmental stages using diverse audio and speech models.  AI-generated summary We present ChildVox, a novel benchmark for characterizing the diverse acoustic signals through which children communicate. Specifically, ChildVox follows the full developmental trajectory from birth through school age, covering physiological sounds, non-linguistic vocalizations, canonical syllables, and spoken language. ChildVox integrates more than 20 sub-tasks across 17 child-centered audio and speech datasets, enabling systematic cross-corpus and cross-domain comparison. We evaluate a representative range of audio and speech foundation models, including self-supervised, ASR-oriented, and large audio-language models, on tasks including physiological sound classification, vocalization and canonical syllables modeling, and speech quality assessment and recognition. Benchmark results show that ChildVox provides a suite of high-performance models in recognizing a wide range of acoustic signals from children, supporting downstream applications such as characterizing children's language levels and tracking speech production with age.", 'score': 4, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'cef35167ec249bd8', 'authors': ['Tiantian Feng', 'Anfeng Xu', 'Xuan Shi', 'Aditya Kommineni', 'Shakhrul Iman Siam', 'Megan Micheletti', 'Zhonghao Shi', 'Helen Tager-Flusberg', 'Mi Zhang', 'Lynn K. Perry', 'Catherine Lord', 'Daniel Messinger', 'Shrikanth Narayanan'], 'affiliations': ['Boston University', 'Harvard University', 'The Ohio State University', 'University of California, Los Angeles', 'University of Miami', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2605.29257.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#benchmark', '#audio'], 'emoji': '👶', 'ru': {'title': 'Универсальный бенчмарк для понимания развития детской речи через акустические модели', 'desc': 'ChildVox — это комплексный бенчмарк для анализа акустической коммуникации детей на всех этапах развития, от рождения до школьного возраста. Он включает более 20 подзадач, охватывающих физиологические звуки, невербальные вокализации, канонические слоги и речь, объединяя 17 детских аудиодатасетов. Авторы оценили разнообразные модели фундаментального назначения, включая самоконтролируемые модели, ASR-модели и большие аудио-языковые модели. Результаты показывают, что эти модели хорошо распознают акустические сигналы детей и могут применяться для оценки языкового развития и отслеживания речевого прогресса с возрастом.'}, 'en': {'title': 'ChildVox: Unlocking the Sounds of Childhood Communication', 'desc': "ChildVox is a new benchmark designed to analyze how children communicate through sound as they grow. It covers various types of sounds, from basic physiological noises to complex spoken language, tracking development from birth to school age. The benchmark includes over 20 tasks and utilizes 17 different datasets focused on children's audio and speech. By evaluating various advanced audio and speech models, ChildVox aims to improve understanding of children's language development and assist in monitoring their speech production over time."}, 'zh': {'title': '儿童声学交流的全面基准', 'desc': 'ChildVox是一个全面的基准，用于分析儿童在不同发展阶段的声学交流。它涵盖了从出生到学龄的完整发展轨迹，包括生理声音、非语言发声、标准音节和口语。ChildVox整合了超过20个子任务，涉及17个以儿童为中心的音频和语音数据集，支持系统的跨数据集和跨领域比较。基准结果表明，ChildVox提供了一套高性能模型，能够识别儿童的多种声学信号，支持评估儿童的语言水平和随年龄变化的语音产生。'}}}, {'id': 'https://huggingface.co/papers/2605.30052', 'title': 'REPOT: Recoverable Program-of-Thought via Checkpoint Repair', 'url': 'https://huggingface.co/papers/2605.30052', 'abstract': 'Abstract RePoT improves upon one-shot Program-of-Thought by enabling deterministic verified replay and recovery through environment interaction, achieving higher success rates across multiple models and benchmarks.  AI-generated summary One-shot Program-of-Thought (PoT) emits a Python program that prints a primitive-action plan; a single invalid action silently invalidates the trajectory. We introduce RePoT (Recoverable PoT): a deterministic verified replay that walks the plan through the environment to its first invalid transition, then one LLM call that resumes from the verified prefix. RePoT costs at most one extra LLM call on the ~14% of problems where PoT fails. RePoT beats PoT by +3 to +11pp across four closed-model configurations on PuzzleZoo-775 and peaks at 96.9% vs 86.3% on gpt-5.4-mini-medium; against the matched-budget PoT-retry baseline, RePoT wins decisively on Gemini (+3.8pp, 95% CI [+2.2,+5.4]), is within sampling noise on GPT-medium and Claude, and loses on GPT-mini -- a capability-scaling pattern we begin to address with Adaptive RePoT, a rule-based dispatcher that routes between suffix repair and a fresh PoT retry based on verified-prefix length (preliminary). We replicate on PlanBench Blocksworld (+1.1 to +11.4pp) and on four open-weights models (+3.3 to +20.0pp on three of four). On Derail-550, our controlled recovery benchmark, every condition with access to checkpoint information clears >=30% on GPT-medium and >=70% on Gemini, vs <=3.1% for error-only feedback -- showing that checkpoint information, not the specific verified-prefix tail, is the load-bearing recovery signal.', 'score': 3, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'dcd0485def8ff7ee', 'authors': ['Parsa Mazaheri'], 'affiliations': ['University of California, Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2605.30052.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#benchmark', '#plp', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Восстановление после ошибок через проверенную переигровку планов', 'desc': 'RePoT улучшает метод Program-of-Thought путём введения детерминированной проверенной переигровки через взаимодействие с окружением. Когда LLM генерирует программу с неправильным действием, система воспроизводит программу до момента ошибки и вызывает модель заново только для восстановления с проверенного префикса. Это обходится в одно дополнительное обращение к LLM только в ~14% случаев отказа базового подхода. Метод демонстрирует значительный прирост качества: +3-11 процентных пункта на различных бенчмарках и моделях, достигая 96.9% точности против 86.3% у базовой версии.'}, 'en': {'title': 'RePoT: Enhancing Program-of-Thought with Reliable Recovery', 'desc': 'RePoT (Recoverable Program-of-Thought) enhances the one-shot Program-of-Thought by allowing for deterministic verified replay and recovery during environment interactions. This method improves success rates by addressing failures in action plans generated by PoT, where a single invalid action can derail the entire process. By utilizing a single additional call to a large language model (LLM) to resume from a verified prefix, RePoT effectively mitigates the impact of errors. The results show significant performance improvements across various models and benchmarks, demonstrating the effectiveness of checkpoint information in recovery processes.'}, 'zh': {'title': 'RePoT：提升思维程序的成功率', 'desc': 'RePoT（可恢复的思维程序）在一次性思维程序（PoT）的基础上进行了改进，通过环境交互实现了确定性验证重放和恢复，从而在多个模型和基准测试中提高了成功率。RePoT能够在PoT失败的情况下，仅需额外一次大型语言模型（LLM）调用，便能从验证的前缀恢复执行。实验结果显示，RePoT在PuzzleZoo-775的四个封闭模型配置中，成功率比PoT提高了3到11个百分点，最高达到96.9%。此外，RePoT在控制恢复基准Derail-550中表现出色，显示出检查点信息是有效恢复的关键。'}}}, {'id': 'https://huggingface.co/papers/2605.29548', 'title': 'Why Larger Models Learn More: Effects of Capacity, Interference, and Rare-Task Retention', 'url': 'https://huggingface.co/papers/2605.29548', 'abstract': 'Abstract Larger models outperform smaller ones on complex and rare tasks due to reduced gradient interference and better resource allocation, enabling them to learn task features that smaller models miss even with infinite data.  AI-generated summary Larger models learn tasks smaller models do not. What drives this phenomenon? We develop a simple phenomenological argument that power-law scaling already suggests that a larger model will be able to learn a part of the data distribution that a smaller model fails to learn, even with infinite training data. To validate this claim and identify its causes, we study the effects of model scaling on a synthetic setup consisting of a mixture of tasks that show monotonic scaling curves. The results point to a data-induced competition over resources (neurons). Specifically, smaller models allocate their neurons to high frequency or low complexity tasks, and so they learn solutions that perform poorly on rare and complex tasks. Moreover, this happens even when solutions capable of expressing the desired task exist. We then assess how a larger model circumvents this data-centric bottleneck, finding that it traces to a reduced interference mechanism: larger models can allocate enough resources to common tasks that the gradient updates for those tasks become weak, which means that they do not overwrite rare-task features as they slowly accumulate. Finally, to further validate these claims, we pretrain OLMo models (4M to 4B parameters) on novel tasks of varying frequency and complexity. The results mirror those from our synthetic data experiments: only the larger OLMo models learn the infrequent and complex tasks, and these larger models embed more task features in their representations and show less gradient interference between tasks. Overall, we offer a data-centric account of why larger models learn tasks that smaller models fail to. This helps explain why larger models are better in practice, and it can inform practical questions concerning model sizing and training data mixtures.', 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '154ee55ac504d20c', 'authors': ['Jing Huang', 'Daniel Wurgaft', 'Rachit Bansal', 'Laura Ruis', 'Naomi Saphra', 'David Alvarez-Melis', 'Andrew Kyle Lampinen', 'Christopher Potts', 'Ekdeep Singh Lubana'], 'affiliations': ['Anthropic', 'Kempner Institute at Harvard University', 'MIT', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29548.jpg', 'data': {'categories': ['#training', '#small_models', '#architecture'], 'emoji': '📈', 'ru': {'title': 'Размер спасает редкое: как большие модели преодолевают конкуренцию за нейроны', 'desc': 'Исследование показывает, что большие модели превосходят маленькие в изучении редких и сложных задач благодаря лучшему распределению ресурсов нейронов. Авторы демонстрируют, что маленькие модели конкурируют за нейроны и отдают предпочтение частым и простым задачам, игнорируя редкие, даже если они могут их выучить. Большие модели решают эту проблему за счёт механизма снижения градиентной интерференции: они выделяют достаточно ресурсов частым задачам, чтобы те не перезаписывали признаки редких задач. Результаты подтверждены как на синтетических данных, так и на предобучении реальных моделей OLMo.'}, 'en': {'title': 'Larger Models Unlock Complex Task Learning', 'desc': 'This paper explores why larger machine learning models outperform smaller ones, especially on complex and rare tasks. It argues that larger models can better allocate their resources, allowing them to learn features from the data that smaller models miss, even when both are trained on infinite data. The study shows that smaller models tend to focus on simpler tasks, leading to poor performance on more complex ones due to resource competition. By analyzing the effects of model scaling, the authors demonstrate that larger models experience less gradient interference, enabling them to retain important features from rare tasks while still learning common ones.'}, 'zh': {'title': '大模型更胜一筹，破解复杂任务的秘密', 'desc': '较大的模型在复杂和稀有任务上表现优于较小的模型，因为它们能够更好地分配资源并减少梯度干扰。即使在无限训练数据的情况下，较小的模型也无法学习到某些任务特征。研究表明，较小的模型往往将资源分配给高频或低复杂度的任务，从而在稀有和复杂任务上表现不佳。较大的模型通过减少干扰机制，能够有效地学习这些稀有任务的特征，进而在实际应用中表现更好。'}}}, {'id': 'https://huggingface.co/papers/2605.29341', 'title': 'WorldMemArena: Evaluating Multimodal Agent Memory Through Action-World Interaction', 'url': 'https://huggingface.co/papers/2605.29341', 'abstract': 'Abstract Multimodal large language models require sophisticated memory systems that can track evolving environments and manage information dynamically across multiple sessions, with new benchmarks revealing limitations in current approaches.  AI-generated summary Multimodal large language models are increasingly deployed as long-horizon agents, where memory must do more than recall: it must track an evolving world, revise what has gone stale, and surface the right evidence at decision time. Existing benchmarks measure recall over static dialogue, collapse memory into a single end-of-task accuracy, and reduce visual observations to captions, leaving us unable to localize failures to writing, maintenance, retrieval, or use. The rise of agent harnesses that author their own memory sharpens this gap, since we have no principled way to compare hand-designed pipelines with self-managing alternatives. To close these gaps, we formulate multimodal agent memory as an Action-World Interaction Loop with an observable four-stage lifecycle, and instantiate it in WorldMemArena: 400 multi-session multimodal tasks spanning Lifelong Evolution (evolving personal and task states) and Agentic Execution (memory from real observations, actions, and feedback), annotated with gold memory points, updates, distractors, and evidence chains for stage-level diagnosis. This enables the first head-to-head comparison of long-context, manually designed (RAG and external memory systems), and harness-based memory agents. Results show that: (1) better memory writing and storage do not guarantee better performance; (2) multimodal memory still struggles to fully use visual evidence; (3) systems are unstable across domains and degrade on realistic agentic trajectories; and (4) harness memory is more flexible but remains costly and less reliable.', 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'c1a209bce6adc67b', 'authors': ['Chengzhi Liu', 'Yuzhe Yang', 'Sophia Xiao Pu', 'Yepeng Liu', 'Lin Long', 'Yichen Guo', 'Nuo Chen', 'Zhaotian Weng', 'Elena Kochkina', 'Simerjot Kaur', 'Charese Smiley', 'Xiaomo Liu', 'James Zou', 'Sheng Liu', 'Yuheng Bu', 'Songyou Peng', 'Xin Eric Wang'], 'affiliations': ['J.P. Morgan Chase', 'Stanford University', 'University of California, Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2605.29341.jpg', 'data': {'categories': ['#rag', '#multimodal', '#long_context', '#agents', '#reasoning', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Оценка и совершенствование долговременной памяти мультимодальных языковых агентов', 'desc': 'В работе предложен новый benchmark WorldMemArena для оценки систем памяти в мультимодальных больших языковых моделях, которые работают как агенты в динамически меняющихся окружениях. Авторы формализуют память агента как цикл взаимодействия "действие-мир" с четырьмя этапами жизненного цикла и создали набор из 400 многосеансовых задач с аннотациями для диагностики каждого этапа. Исследование показывает, что современные подходы к управлению памятью имеют серьёзные ограничения: лучшее написание и хранение информации не гарантирует лучшую производительность, системы плохо используют визуальную информацию и нестабильны на реальных траекториях взаимодействия. Результаты открывают путь к разработке более надежных и эффективных систем памяти для мультимодальных агентов.'}, 'en': {'title': 'Revolutionizing Memory Management in Multimodal AI', 'desc': 'This paper discusses the challenges faced by multimodal large language models in managing memory effectively across different sessions and evolving environments. It highlights the limitations of current benchmarks that fail to accurately assess memory performance in dynamic contexts. The authors propose a new framework called the Action-World Interaction Loop, which outlines a four-stage lifecycle for multimodal agent memory. They introduce WorldMemArena, a set of tasks designed to evaluate and compare various memory systems, revealing that improvements in memory management do not always lead to better overall performance.'}, 'zh': {'title': '提升多模态记忆系统的灵活性与可靠性', 'desc': '多模态大型语言模型需要复杂的记忆系统，以动态管理信息并跟踪不断变化的环境。现有的基准测试显示了当前方法的局限性，无法有效评估记忆的写入、维护和检索。我们提出了一种多模态代理记忆的四阶段生命周期模型，并在WorldMemArena中进行了实例化，以便进行系统的比较和诊断。研究结果表明，尽管记忆的写入和存储有所改善，但并不一定能提高性能，且多模态记忆在利用视觉证据方面仍然存在困难。'}}}, {'id': 'https://huggingface.co/papers/2605.30347', 'title': 'NeuROK: Generative 4D Neural Object Kinematics', 'url': 'https://huggingface.co/papers/2605.30347', 'abstract': "Abstract Neural Object Kinematics learns a data-driven parameterization for 4D dynamic object simulation by combining latent space representation with transformer-based encoding-decoding, enabling realistic temporal deformations across diverse object types.  AI-generated summary Data-driven approaches have revolutionized 3D vision, enabling transformers to effectively reconstruct and generate static 3D objects. However, generating simulative 4D dynamics -- realistic temporal deformations of static objects under various physical conditions -- remains challenging and often ad hoc, despite its importance in building comprehensive 3D world models. Most existing methods assume a predefined physical model and use system identification to estimate parameters, restricting these methods to specific categories and small-scale datasets. We propose that these restrictions can be overcome by learning a data-driven kinematic state parameterization for object-centric physical systems. Specifically, we learn both a latent space representing all possible states of the object and a decoder that maps any sampled latent to a plausibly deformed shape of the object. We refer to this parameterization as Neural Object Kinematics (NeuROK), and learn a transformer-based encoder-decoder model on a curated large-scale 4D dataset. This formulation and the learned model significantly simplify the generation of simulative dynamics since we only need to consider the dynamics within a low-dimensional latent space from the Lagrangian mechanics' perspective in classical physics. We demonstrate the effectiveness and generality of this neural simulation framework across diverse dynamic object types, showing clear advantages over prior works. Project page: https://chen-geng.com/neurok", 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '56413a4e727bb353', 'authors': ['Chen Geng', 'Guangzhao He', 'Yue Gao', 'Yunzhi Zhang', 'Shangzhe Wu', 'Jiajun Wu'], 'affiliations': ['Cornell University', 'Stanford University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2605.30347.jpg', 'data': {'categories': ['#dataset', '#optimization', '#architecture', '#3d', '#training'], 'emoji': '🎬', 'ru': {'title': 'Нейросетевая параметризация кинематики для симуляции динамических объектов', 'desc': 'Статья представляет Neural Object Kinematics (NeuROK) — метод для моделирования динамики 4D объектов на основе данных. Авторы предлагают обучить параметризацию кинематического состояния объекта, которая включает латентное пространство, представляющее все возможные деформации объекта, и декодер для отображения латентных векторов в реалистичные формы. Для этого используется трансформер-модель энкодер-декодер, обученная на большом датасете 4D объектов. Подход позволяет упростить симуляцию динамики, работая в низкомерном латентном пространстве вместо явного задания физических моделей, и демонстрирует лучшие результаты по сравнению с существующими методами.'}, 'en': {'title': 'Revolutionizing 4D Object Dynamics with Neural Object Kinematics', 'desc': 'Neural Object Kinematics (NeuROK) introduces a novel approach to simulating 4D dynamics of objects by utilizing a data-driven parameterization. This method combines a latent space representation with a transformer-based encoder-decoder architecture, allowing for realistic temporal deformations of various object types. Unlike traditional methods that rely on predefined physical models, NeuROK learns directly from a large-scale dataset, enabling it to generate plausible deformations without being limited to specific categories. The framework simplifies the simulation process by operating within a low-dimensional latent space, demonstrating significant improvements over existing techniques in dynamic object simulation.'}, 'zh': {'title': '神经物体运动学：简化四维动态模拟的革命性方法', 'desc': '神经物体运动学（NeuROK）通过结合潜在空间表示和基于变换器的编码解码，学习了一种数据驱动的四维动态物体模拟参数化方法。这种方法能够在不同物体类型之间实现真实的时间变形，克服了传统方法对预定义物理模型的依赖。我们的方法通过学习物体的所有可能状态的潜在空间，简化了动态生成过程，使得在经典物理的拉格朗日力学视角下，仅需考虑低维潜在空间中的动态。实验结果表明，该框架在多种动态物体类型上表现出显著的有效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2605.30349', 'title': 'AdaState: Self-Evolving Anchors for Streaming Video Generation', 'url': 'https://huggingface.co/papers/2605.30349', 'abstract': 'Abstract Video diffusion models with adaptive state replacement generate more dynamic videos by evolving scene references rather than fixing to initial frames, using recurrent denoising as transition function.  AI-generated summary Autoregressive video diffusion models generate streaming video by producing frames sequentially, conditioning each chunk on previously generated content. These models are structurally anchored to the first frame: its key-value representation occupies a privileged position in the attention cache and serves as the primary scene reference throughout generation. As the cleanest and most error-free position in the cache, this anchor draws disproportionate attention, suppressing video dynamics, and locking scene composition to the initial viewpoint even as the scene naturally evolves. The result is a temporally shallow video in which motion, camera movement, and scene progression are dampened in favor of static consistency. To address this, we replace the static anchor with an adaptive state, a hidden latent that the model denoises alongside content at every chunk but never renders. Rather than referencing a frozen first frame, the model generates its own scene anchor at each step by attending to both the previous state and the current content, producing a reference that evolves with the generated content. Unlike standard video generation, which encodes an absolute notion of time, our formulation treats time as relative: every generation step sees the same positional structure regardless of how far generation has progressed, and the state transition is identical at every chunk. Together, these properties introduce a recurrence into the generation process, where denoising serves as the transition function, and the KV cache serves as the carrier, requiring no external module. Experiments demonstrate that the adaptive state substantially improves video dynamics, enabling richer motion and natural scene progression within generated videos.', 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'e254645dfcdb1312', 'authors': ['Yusuf Dalva', 'Pinar Yanardag'], 'affiliations': ['Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2605.30349.jpg', 'data': {'categories': ['#diffusion', '#training', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное состояние вместо статического якоря для динамичной генерации видео', 'desc': 'В статье предлагается метод улучшения видеодиффузионных моделей путём замены статического якоря (представления первого кадра) на адаптивное состояние — скрытый вектор, который модель денуизирует на каждом шаге генерации. Вместо того чтобы привязываться к неизменному первому кадру, модель создаёт собственный якорь сцены на каждом этапе, обращая внимание как на предыдущее состояние, так и на текущее содержимое. Подход вводит рекуррентность в процесс генерации, где денуизирование служит функцией перехода, а KV-кэш выступает носителем информации без необходимости дополнительных модулей. Экспериментально показано, что адаптивное состояние значительно улучшает динамику видео, обеспечивая более богатое движение и естественное развитие сцены.'}, 'en': {'title': 'Dynamic Video Generation with Adaptive State Replacement', 'desc': 'This paper presents a novel approach to video generation using adaptive state replacement in diffusion models. Instead of relying on a fixed initial frame as the main reference, the model dynamically evolves its scene anchor at each generation step. By treating time as relative and employing recurrent denoising, the model enhances video dynamics, allowing for more natural motion and scene progression. Experiments show that this method significantly improves the quality and richness of AI-generated videos.'}, 'zh': {'title': '自适应状态提升视频动态性', 'desc': '这篇论文介绍了一种视频扩散模型，通过自适应状态替换来生成更具动态性的视频。与传统模型固定在初始帧不同，该模型在每个生成步骤中动态调整场景参考，使用递归去噪作为过渡函数。通过这种方法，模型能够在生成过程中不断更新场景锚点，从而增强视频的运动感和自然场景进展。实验结果表明，自适应状态显著改善了视频的动态性，使生成的视频更丰富和自然。'}}}, {'id': 'https://huggingface.co/papers/2601.07525', 'title': 'Thinking Before Constraining: A Unified Decoding Framework for Large Language Models', 'url': 'https://huggingface.co/papers/2601.07525', 'abstract': 'Abstract A hybrid approach called In-Writing is proposed that combines free-form reasoning with structured generation by delaying constraint application until after a trigger token is generated, improving accuracy in classification and reasoning tasks.  AI-generated summary Natural generation allows Large Language Models (LLMs) to produce free-form responses with rich reasoning, yet the lack of structure makes outputs difficult to verify. Conversely, constrained decoding ensures standardized formats but can inadvertently restrict reasoning capabilities by imposing constraints too early in the generation process. We propose a hybrid approach, namely In-Writing, that combines free-form reasoning and structured generation in a single call. The model first performs unconstrained reasoning and only applies structured decoding after a trigger token is generated, explicitly decoupling reasoning from formatting. We establish that our trigger-token strategies are able to virtually eradicate premature triggering, a failure mode in which constrained decoding interrupts on-going reasoning. Evaluations across diverse datasets covering classification and reasoning tasks demonstrate that our approach outperforms the state-of-the-art by achieving accuracy gains of up to 27% over natural generation. Our code are available at: https://github.com/Nokia-Bell-Labs/InWriting.', 'score': 3, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '5b99efed2bff0d96', 'authors': ['Ngoc Trinh Hung Nguyen', 'Alonso Silva', 'Laith Zumot', 'Liubov Tupikina', 'Armen Aghasaryan', 'Mehwish Alam'], 'affiliations': ['Nokia', 'Nokia Bell Labs', 'Télécom Paris, Institut Polytechnique de Paris'], 'pdf_title_img': 'assets/pdf/title_img/2601.07525.jpg', 'data': {'categories': [], 'emoji': '⚙️', 'ru': {'title': 'Разум первым, формат после: гибридное поколение с триггер-токенами', 'desc': 'В статье предложен гибридный подход In-Writing, который объединяет свободное рассуждение с структурированной генерацией текста. Ключевая идея заключается в том, чтобы задерживать применение ограничений до момента, когда модель сгенерирует специальный триггер-токен, что позволяет явно разделить процесс рассуждения от форматирования вывода. Авторы разработали стратегии триггер-токенов, которые практически полностью исключают преждевременное включение ограничений - распространённую проблему, когда структурированное декодирование прерывает процесс логического размышления. Экспериментальная оценка на различных задачах классификации и рассуждения показала, что подход улучшает точность на 27% по сравнению с обычной свободной генерацией.'}, 'en': {'title': 'In-Writing: Unleashing Reasoning Before Structure', 'desc': 'The paper introduces a novel hybrid approach called In-Writing, which enhances the performance of Large Language Models (LLMs) by merging free-form reasoning with structured generation. This method allows the model to generate responses without constraints initially, promoting richer reasoning before applying any formatting rules. By delaying the application of constraints until after a specific trigger token is produced, the approach effectively prevents premature interruptions in reasoning. Evaluations show that In-Writing significantly improves accuracy in classification and reasoning tasks, outperforming existing methods by up to 27%.'}, 'zh': {'title': '自由推理与结构生成的完美结合', 'desc': '本文提出了一种名为In-Writing的混合方法，结合了自由形式推理和结构化生成。该方法通过在生成触发标记后再应用约束，从而提高分类和推理任务的准确性。自然生成允许大型语言模型（LLMs）产生丰富的推理响应，但缺乏结构使得输出难以验证。相反，受限解码虽然确保了标准化格式，但可能会过早限制推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.27891', 'title': 'SmartDirector: Keyframe-Conditioned Cinematic Video Generation with Narrative Pacing Control', 'url': 'https://huggingface.co/papers/2605.27891', 'abstract': 'Abstract SmartDirector enhances video generation by using multiple keyframes to improve narrative structure and temporal pacing through a two-stage process of low-resolution generation and high-resolution refinement.  AI-generated summary The narrative quality of a video fundamentally determines its perceptual value. Although existing video generation methods can produce visually appealing content, they predominantly rely on sparse conditioning signals such as text prompts or first/last frames, which limits precise control over narrative structure and temporal pacing. In this paper, we propose SmartDirector, a framework that enhances the narrative capacity of video generation models through multiple keyframes. SmartDirector supports flexible generation scenarios including single-shot generation, multi-shot narrative synthesis, and video extension. The framework operates in two stages: Director-Gen generates a low-resolution video conditioned on the provided keyframes, and Director-SR refines the output by exploiting high-resolution keyframes as semantic anchors to recover fine-grained details. To enable robust multi-keyframe training, we construct a data pipeline that curates single-shot and multi-shot sequences from movies. Extensive experiments demonstrate that SmartDirector substantially outperforms existing state-of-the-art approaches. We will release the code to facilitate further research.', 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '0112213b1fa47079', 'authors': ['Zhida Zhang', 'Jie Ma', 'Zhan Peng', 'Haoxue Wu', 'Yang Han', 'Jun Liang', 'Jie Cao', 'Jing Li'], 'affiliations': ['HUST', 'NLPR, CISIA', 'Youku Moku-Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.27891.jpg', 'data': {'categories': ['#dataset', '#video', '#data'], 'emoji': '🎬', 'ru': {'title': 'Множественные опорные кадры для контролируемой генерации видео с улучшенным повествованием', 'desc': 'SmartDirector — это фреймворк для генерации видео, который использует несколько опорных кадров для улучшения повествовательной структуры и временного ритма. Система работает в два этапа: сначала генерируется видео низкого разрешения на основе условий keyframe, затем проводится уточнение высокого разрешения с использованием семантических якорей. Фреймворк поддерживает гибкие сценарии генерации, включая однокадровую генерацию, синтез многокадрового повествования и расширение видео. Авторы создали специальный конвейер подготовки данных из кинофильмов для обучения модели работе с несколькими опорными кадрами.'}, 'en': {'title': 'Enhancing Video Narratives with SmartDirector', 'desc': 'SmartDirector is a new framework for generating videos that improves storytelling and timing by using multiple keyframes. It works in two stages: first, it creates a low-resolution video based on the keyframes, and then it refines this video to add more detail and clarity. This method allows for better control over the narrative structure compared to traditional video generation techniques that rely on limited inputs. The framework can handle various video creation scenarios, making it a versatile tool for enhancing video quality and coherence.'}, 'zh': {'title': '智能导演：提升视频生成的叙事能力', 'desc': 'SmartDirector 是一种增强视频生成的框架，通过使用多个关键帧来改善叙事结构和时间节奏。该框架采用两阶段过程：首先生成低分辨率视频，然后通过高分辨率关键帧进行细化。与传统方法依赖稀疏条件信号不同，SmartDirector 提供了更灵活的生成场景，包括单镜头生成和多镜头叙事合成。实验结果表明，SmartDirector 在叙事质量上显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2605.22189', 'title': 'Learning A Unified Risk Map for Autonomous Driving in Partially Observable Environments', 'url': 'https://huggingface.co/papers/2605.22189', 'abstract': 'Abstract A unified risk map modeling framework addresses occlusion challenges in autonomous driving by integrating traffic flow and collision risks through spatiotemporal modeling and diffusion-based scenario generation.  AI-generated summary Occlusion-aware prediction remains a critical challenge in autonomous driving due to the inherent uncertainty of unobserved regions. Existing approaches either overestimate risk based on reachable states or struggle to predict accurate trajectories under high occlusion uncertainty. To address these limitations, we propose a unified risk map modeling and learning framework for partially observable environments. Our method integrates traffic flow risk and collision risk through spatiotemporal modeling, enabling fine-grained assessment of occlusion-induced hazards. To address the scarcity of scenarios involving occluded interactions, we introduce a diffusion-based scenario generation framework that produces realistic yet adversarial scenarios. We integrate the modeling and learning of a unified risk map into a framework that supports risk-aware planning under partial observability. Experiments on the Waymo Open Motion Dataset show that our method significantly outperforms the state-of-the-art occlusion-aware baseline, improving minimum time-to-collision by 0.78 times and average time-to-collision by 1.67 times. The proposed framework offers a comprehensive and practical solution for risk-aware planning in partially observable environments.', 'score': 3, 'issue_id': 2337, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '2a73071b9af21457', 'authors': ['Jie Jia', 'Yaofeng Su', 'Zeyu Bao', 'Yun Hong', 'Bingzhao Gao', 'Zhongxue Gan', 'Wenchao Ding'], 'affiliations': ['Fudan University, China', 'Tongji University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.22189.jpg', 'data': {'categories': ['#dataset', '#training', '#robotics', '#agents'], 'emoji': '🚗', 'ru': {'title': 'Карты риска для вождения при скрытых препятствиях', 'desc': 'В работе предлагается единая схема моделирования карт риска для автономного вождения, которая обращает внимание на проблему окклюзии (скрытых объектов). Метод интегрирует риски, связанные с потоком трафика и столкновениями, используя пространственно-временное моделирование. Для генерации реалистичных сценариев с окклюзией авторы применяют диффузионные модели, что помогает компенсировать дефицит обучающих данных. Экспериментальные результаты на датасете Waymo показывают значительное улучшение показателей безопасности по сравнению с существующими методами.'}, 'en': {'title': 'Navigating the Unknown: A Unified Risk Map for Safer Autonomous Driving', 'desc': 'This paper presents a unified risk map modeling framework designed to tackle occlusion challenges in autonomous driving. It combines traffic flow and collision risks using spatiotemporal modeling, which allows for a detailed understanding of hazards caused by occlusions. The authors introduce a diffusion-based scenario generation method to create realistic scenarios that account for occluded interactions, enhancing the training of models in partially observable environments. Experimental results demonstrate that this approach significantly improves the prediction of time-to-collision metrics compared to existing methods, making it a valuable tool for risk-aware planning in autonomous systems.'}, 'zh': {'title': '统一风险地图：提升自动驾驶安全性', 'desc': '本文提出了一种统一的风险地图建模框架，旨在解决自动驾驶中的遮挡挑战。该框架通过时空建模和基于扩散的场景生成，整合了交通流风险和碰撞风险，从而实现对遮挡引发的危险的细致评估。我们的方法在部分可观察环境中进行建模和学习，能够生成真实且具有对抗性的场景，以应对遮挡交互的稀缺性。实验结果表明，该框架在风险感知规划方面显著优于现有方法，提升了碰撞时间的预测精度。'}}}, {'id': 'https://huggingface.co/papers/2605.30350', 'title': 'DynaFLIP: Rethinking Robotics Perception via Tri-Modal-Dynamics Guided Representation', 'url': 'https://huggingface.co/papers/2605.30350', 'abstract': 'Abstract DynaFLIP is a
