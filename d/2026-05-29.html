    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.29801', 'title': 'AgentDoG 1.5: A Lightweight and Scalable Alignment Framework for AI Agent Safety and Security', 'url': 'https://huggingface.co/papers/2605.29801', 'abstract': 'Abstract A lightweight and scalable agent safety alignment framework is proposed to address emerging threats from advanced AI models, featuring taxonomy-guided training with minimal samples and efficient deployment in real-world scenarios.  AI-generated summary Modern open-world agents such as OpenClaw exhibit powerful cross-environment execution capabilities yet introduce broad new safety risk sources. Meanwhile, advanced frontier AI models drastically lower attack barriers, rendering current agent alignment frameworks inadequate for real-world deployment. To tackle these emerging threats, we propose a lightweight and scalable agent safety alignment framework. Specifically, we update the agent safety taxonomy to accommodate emergent risks from Codex and OpenClaw execution scenarios. We further build a taxonomy-guided data engine with influence-function purification to train lightweight AgentDoG 1.5 variants (0.8B, 2B, 4B, and 8B parameters) using only around 1k samples, achieving comparable performance with leading closed-source models (e.g., GPT-5.4). Based on AgentDoG 1.5, we construct a highly efficient agentic safety SFT and RL training environment, which reduces deployment overhead in Docker-level environments by two orders of magnitude. Finally, we deploy AgentDoG 1.5 as a training-free online guardrail for real-time safety moderation. Extensive experimental results indicate that AgentDoG 1.5 achieves state-of-the-art performance in diverse and complex interactive agentic scenarios. All models and datasets are openly released.', 'score': 80, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'c8ad1f1d2eea970a', 'authors': ['Dongrui Liu', 'Yu Li', 'Zhonghao Yang', 'Peng Wang', 'Guanxu Chen', 'Yuejin Xie', 'Qinghua Mao', 'Wanying Qu', 'Yanxu Zhu', 'Tianyi Zhou', 'Leitao Yuan', 'Zhijie Zheng', 'Qihao Lin', 'Yimin Wang', 'Haoyu Luo', 'Shuai Shao', 'Chen Qian', 'Qingyu Liu', 'Ling Tang', 'Ruiyang Qin', 'Qihan Ren', 'Junxiao Yang', 'Kun Wang', 'Zhiheng Xi', 'Linfeng Zhang', 'Ranjie Duan', 'Bo Zhang', 'Wenjie Wang', 'Wen Shen', 'Qiaosheng Zhang', 'Yan Teng', 'Chaochao Lu', 'Rui Mei', 'Man Li', 'Jialing Tao', 'Xi Lin', 'Tianhang Zheng', 'Yong Liu', 'Quanshi Zhang', 'Lei Zhu', 'Xingjun Ma', 'Junhua Liu', 'Hui Xue', 'Xiaoxiang Zuo', 'Xiangnan He', 'Chao Shen', 'Xianglong Liu', 'Minlie Huang', 'Jing Shao', 'Xia Hu'], 'affiliations': ['AI45Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.29801.jpg', 'data': {'categories': ['#security', '#dataset', '#small_models', '#optimization', '#alignment', '#inference', '#agents', '#training', '#open_source'], 'emoji': '🛡️', 'ru': {'title': 'Безопасные агенты без больших данных: эффективное выравнивание через таксономию', 'desc': 'Предлагается легкий и масштабируемый фреймворк для выравнивания безопасности агентов, решающий проблемы риска от продвинутых AI моделей. Авторы обновили таксономию безопасности и разработали систему генерации данных, управляемую таксономией, которая использует функцию влияния для очистки данных. С помощью всего 1000 примеров они натренировали компактные варианты модели AgentDoG 1.5 (от 0.8B до 8B параметров), достигнув производительности, сравнимой с закрытыми моделями. Разработанный фреймворк успешно развёрнут как режим реального времени для защиты безопасности и снижает затраты на развёртывание в сто раз.'}, 'en': {'title': 'Lightweight Safety Alignment for Advanced AI Agents', 'desc': 'This paper presents a new framework for ensuring the safety of AI agents, particularly in complex environments. It introduces a taxonomy-guided training approach that requires only a small number of samples to effectively align agent behavior with safety standards. The framework is designed to be lightweight and scalable, making it suitable for real-world applications where advanced AI models pose new risks. The results show that the proposed AgentDoG 1.5 model performs comparably to leading models while significantly reducing deployment costs and improving safety moderation in real-time scenarios.'}, 'zh': {'title': '轻量级代理安全对齐框架的创新', 'desc': '本文提出了一种轻量级且可扩展的代理安全对齐框架，以应对先进人工智能模型带来的新兴威胁。该框架通过更新代理安全分类法，结合影响函数净化，使用约1000个样本训练出轻量级的AgentDoG 1.5变体，性能与领先的闭源模型相当。我们还构建了一个高效的安全训练环境，显著降低了在Docker环境中的部署开销。实验结果表明，AgentDoG 1.5在多样化和复杂的交互代理场景中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.30280', 'title': 'Qwen-VLA: Unifying Vision-Language-Action Modeling across Tasks, Environments, and Robot Embodiments', 'url': 'https://huggingface.co/papers/2605.30280', 'abstract': "Abstract A unified vision-language-action model is presented that integrates diverse embodied decision-making tasks through a shared architecture and training approach, demonstrating strong performance across manipulation, navigation, and trajectory prediction with generalization across different robot platforms and environments.  AI-generated summary Embodied intelligence is often studied through specialized models for individual tasks such as manipulation or navigation, resulting in fragmented capabilities and limited generalization across tasks, environments, and robot embodiments. In this work, we study whether heterogeneous embodied decision-making problems can be unified within a single vision-language-action model. We present Qwen-VLA, a unified embodied foundation model that extends Qwen's vision-language modeling stack from perception, understanding, and reasoning to continuous action and trajectory generation through a DiT-based action decoder. Qwen-VLA is trained with a large-scale joint pretraining recipe over diverse data sources, including robotics manipulation trajectories, human egocentric demonstrations, synthetic simulation data, vision-and-language navigation data, trajectory-centric supervision, and auxiliary vision-language data. To support multiple robot platforms, we introduce embodiment-aware prompt conditioning, where robot-specific textual descriptions specify the current embodiment and control convention. We further cast manipulation, navigation, and trajectory prediction into a unified action-and-trajectory prediction framework, enabling transferable visual grounding, spatial reasoning, and continuous action generation across robot morphologies, task families, and environments. Experiments on manipulation, navigation, and trajectory-centric benchmarks show consistent multi-task performance and out-of-distribution generalization under variations in scene layout, background, lighting, object configuration, and robot embodiment. Qwen-VLA-Instruct achieves 97.9% on LIBERO, 73.7% on Simpler-WidowX, 86.1%/87.2% on RoboTwin-Easy/Hard, 69.0% OSR on R2R, 59.6% SR on RxR, 76.9% average OOD success in real-world ALOHA experiments, and 26.6% zero-shot success on DOMINO dynamic manipulation.", 'score': 71, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '3f70ad85723085cc', 'authors': ['Qiuyue Wang', 'Mingsheng Li', 'Jian Guan', 'Jinhui Ye', 'Sicheng Xie', 'Yitao Liu', 'Junhao Chen', 'Zhixuan Liang', 'Jie Zhang', 'Xintong Hu', 'Xuhong Huang', 'Pei Lin', 'Junyang Lin', 'Dayiheng Liu', 'Shuai Bai', 'Jingren Zhou', 'Jiazhao Zhang', 'Haoqi Yuan', 'Gengze Zhou', 'Hang Yin', 'Ye Wang', 'Yiyang Huang', 'Zixing Lei', 'Wujian Peng', 'Delin Chen', 'Yingming Zheng', 'Jingyang Fan', 'Xianwei Zhuang', 'Xin Zhou', 'Haoyang Li', 'Anzhe Chen', 'Tong Zhang', 'Xuejing Liu', 'Yuchong Sun', 'Ruizhe Chen', 'Zhaohai Li', 'Chenxu Lü', 'Zhibo Yang', 'Tao Yu', 'Xionghui Chen'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2605.30280.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#synthetic', '#robotics', '#cv', '#transfer_learning', '#training', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Единая модель для всех задач робототехники: от манипуляции до навигации', 'desc': 'Представлена Qwen-VLA, единая foundation model для воплощённого интеллекта (embodied AI), которая объединяет задачи манипуляции, навигации и предсказания траекторий в одной архитектуре на основе vision-language-action парадигмы. Модель обучена на большом объёме разнородных данных: робототехнические траектории манипуляции, эгоцентрические демонстрации, синтетические симуляции и данные навигации. Для поддержки различных робототехнических платформ используется механизм embodiment-aware prompt conditioning с описаниями специфики каждого робота. Модель демонстрирует высокую производительность на множественных бенчмарках и хорошую обобщающую способность при изменении окружения, освещения и морфологии робота.'}, 'en': {'title': 'Unifying Embodied Intelligence for Versatile Robot Actions', 'desc': 'This paper introduces Qwen-VLA, a unified vision-language-action model designed to tackle various embodied decision-making tasks like manipulation, navigation, and trajectory prediction. By integrating these tasks into a single architecture, the model enhances generalization across different robot platforms and environments. It employs a DiT-based action decoder and is trained on a diverse dataset that includes robotics trajectories and human demonstrations. The approach also incorporates embodiment-aware prompt conditioning to adapt to specific robot characteristics, resulting in strong multi-task performance and effective out-of-distribution generalization.'}, 'zh': {'title': '统一的视觉-语言-行动模型，提升机器人智能', 'desc': '本文提出了一种统一的视觉-语言-行动模型，旨在通过共享架构和训练方法整合多种具身决策任务。该模型在操作、导航和轨迹预测等任务上表现出色，并能在不同的机器人平台和环境中实现良好的泛化能力。我们引入了Qwen-VLA模型，它通过DiT基础的行动解码器扩展了Qwen的视觉-语言建模能力，支持连续行动和轨迹生成。实验结果表明，Qwen-VLA在多任务性能和在不同场景变化下的泛化能力上均表现优异。'}}}, {'id': 'https://huggingface.co/papers/2605.29250', 'title': 'OmniRetrieval: Unified Retrieval across Heterogeneous Knowledge Sources', 'url': 'https://huggingface.co/papers/2605.29250', 'abstract': 'Abstract OmniRetrieval is a framework that handles diverse knowledge sources by identifying appropriate repositories and dispatching native queries to their respective execution engines, outperforming single-source approaches across multiple dataset types.  AI-generated summary Real-world information needs require access to structurally diverse knowledge sources, from unstructured text and relational tables to knowledge graphs and property graphs. Existing retrievers, however, operate over one source at a time under a fixed query language, leaving the broader landscape of available knowledge fragmented behind incompatible interfaces. A natural attempt at unification would collapse these sources into a shared space, but this erases the structural affordances (such as schemas, ontologies, compositional operators) that give each source its expressive power. Effective retrieval over diverse knowledge, therefore, requires not homogenization but an overarching layer that meets each source on its own terms. To achieve this, we present OmniRetrieval, a framework that takes any natural-language query, identifies appropriate knowledge sources, and dispatches source-native queries to their native execution engines. Across an extensive benchmark spanning 13 datasets and 309 distinct knowledge bases over text, relational, and graph-structured sources, OmniRetrieval exceeds single-source baselines, demonstrating that it can serve as a general-purpose interface to the heterogeneous sources while preserving the structural distinctions that make each source valuable.', 'score': 52, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '283457779df83b74', 'authors': ['Jinheon Baek', 'Soyeong Jeong', 'Sangwoo Park', 'Woongyeong Yeo', 'Minki Kang', 'Patara Trirat', 'Heejun Lee', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2605.29250.jpg', 'data': {'categories': ['#dataset', '#rag', '#benchmark'], 'emoji': '🗂️', 'ru': {'title': 'Универсальный интерфейс для поиска в разнородных источниках знаний', 'desc': 'OmniRetrieval — это фреймворк для работы с разнородными источниками знаний, который автоматически определяет подходящие репозитории и направляет запросы к соответствующим движкам выполнения. Система решает проблему фрагментации знания, сохраняя при этом уникальные структурные свойства каждого источника — схемы баз данных, онтологии и операторы композиции. Вместо унификации разнородных источников в единое пространство представления, фреймворк функционирует как надстройка, работающая с каждым источником на его собственных условиях. На обширном бенчмарке из 13 датасетов и 309 различных баз знаний OmniRetrieval превосходит однопеточные базовые подходы, демонстрируя эффективность универсального интерфейса к гетерогенным хранилищам данных.'}, 'en': {'title': 'Unifying Diverse Knowledge Sources with OmniRetrieval', 'desc': "OmniRetrieval is a novel framework designed to efficiently access and retrieve information from various types of knowledge sources, such as unstructured text, relational databases, and knowledge graphs. Unlike traditional retrieval systems that only work with one source at a time, OmniRetrieval intelligently identifies the best sources for a given query and formulates appropriate queries for each source's unique structure. This approach maintains the distinct characteristics of each knowledge source, allowing for more effective and expressive retrieval of information. The framework has been tested across multiple datasets and has shown superior performance compared to single-source methods, proving its capability as a versatile tool for diverse knowledge retrieval."}, 'zh': {'title': 'OmniRetrieval：多样知识源的统一检索框架', 'desc': 'OmniRetrieval是一个处理多样知识源的框架，它通过识别合适的知识库并向其各自的执行引擎发送本地查询，超越了单一来源的方法。现实世界的信息需求需要访问结构多样的知识源，包括非结构化文本、关系表、知识图谱和属性图。现有的检索器通常只能在一个来源上操作，导致知识的碎片化。OmniRetrieval通过为每个知识源提供一个独特的查询接口，保留了各个来源的结构特性，从而实现了有效的多样知识检索。'}}}, {'id': 'https://huggingface.co/papers/2605.25378', 'title': 'CollectionLoRA: Collecting 50 Effects in 1 LoRA via Multi-Teacher On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.25378', 'abstract': 'Abstract CollectionLoRA enables efficient deployment of multiple customized image editing effects by distilling numerous LoRAs into a single model through multi-teacher distillation and specialized mechanisms for concept isolation and generation.  AI-generated summary Customized image editing aims to equip pre-trained diffusion models with specific visual effects using limited paired data, typically via Low-Rank Adaptation (LoRA). As the number of desired effects grows, storing and dynamically loading numerous these effect LoRAs significantly increases deployment overhead. Furthermore, current pipelines typically cascade these effect LoRAs with acceleration modules for fast generation, which triggers severe parameter interference and results in concept bleeding and style degradation. We propose CollectionLoRA, a multi-teacher on-policy distillation framework capable of distilling the concepts of up to 50 different effect LoRAs along with few-step generation capabilities into a single LoRA. This fundamentally resolves the feature interference issue and significantly reduces deployment costs. Specifically, the method introduces (i) a Probabilistic Dual-Stream Routing mechanism that enables the model to randomly switch between data sources during training, effectively enhancing its generalization in unseen scenarios; (ii) an Asymmetric Orthogonal Prompting strategy to achieve concept isolation within the prompt space; (iii) a Coarse-to-Fine Distillation Objective to mitigate the distribution gap between the teacher and student models. Extensive evaluations show that CollectionLoRA distills all customized effects and few-step generation into a single LoRA, reducing deployment overhead while achieving concept fidelity comparable to or better than independently trained teacher models.', 'score': 48, 'issue_id': 2337, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'f7d82b392431a510', 'authors': ['Fangtai Wu', 'Hailong Guo', 'Shijie Huang', 'Jiayi Song', 'Yubo Huang', 'Mushui Liu', 'Zhao Wang', 'Yunlong Yu', 'Jiaming Liu', 'Ruihua Huang'], 'affiliations': ['Qwen Applications Business Group of Alibaba', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.25378.jpg', 'data': {'categories': ['#diffusion', '#transfer_learning', '#optimization'], 'emoji': '📦', 'ru': {'title': 'Упаковка множества эффектов в одну адаптацию', 'desc': 'CollectionLoRA — это метод для сжатия множества адаптированных моделей (LoRA) в одну единую модель через дистилляцию знаний от нескольких учителей. Подход решает проблему интерференции параметров при каскадировании различных эффектов редактирования изображений, используя специальные механизмы маршрутизации и ортогональной подсказки для изоляции концепций. Метод позволяет сжать до 50 различных эффектов редактирования и возможность быстрой генерации в одну LoRA, значительно снижая затраты на развёртывание. Экспериментальные результаты показывают, что модель сохраняет верность концепциям на уровне независимо обученных моделей, при этом уменьшая объём параметров и вычислительные требования.'}, 'en': {'title': 'Efficiently Unifying Image Editing Effects with CollectionLoRA', 'desc': 'CollectionLoRA is a novel framework that streamlines the deployment of multiple customized image editing effects by combining various Low-Rank Adaptation (LoRA) models into one. It addresses the challenges of parameter interference and style degradation that arise when using multiple effect LoRAs. The framework employs a multi-teacher distillation approach, allowing it to learn from up to 50 different effect models while maintaining high fidelity in the generated outputs. Key innovations include a dual-stream routing mechanism for improved generalization and an asymmetric prompting strategy for better concept isolation.'}, 'zh': {'title': '高效定制图像编辑的解决方案', 'desc': 'CollectionLoRA是一种高效的多教师蒸馏框架，能够将多达50种不同效果的LoRA概念蒸馏到一个单一的模型中。这种方法通过引入概率双流路由机制和非对称正交提示策略，解决了特征干扰问题，减少了部署成本。它还采用粗到细的蒸馏目标，缩小了教师模型与学生模型之间的分布差距。经过广泛评估，CollectionLoRA在保持概念保真度的同时，显著降低了部署开销。'}}}, {'id': 'https://huggingface.co/papers/2605.30263', 'title': 'minWM: A Full-Stack Open-Source Framework for Real-Time Interactive Video World Models', 'url': 'https://huggingface.co/papers/2605.30263', 'abstract': 'Abstract A comprehensive framework is presented for converting bidirectional video diffusion models into real-time interactive world models with controllable, causal, and low-latency capabilities through fine-tuning and distillation techniques.  AI-generated summary Recent video diffusion foundation models have achieved remarkable progress in high-quality video generation, yet turning them into real-time interactive video world models remains challenging. Interactive world models require controllable, causal, and low-latency rollout, which in practice demands a full pipeline spanning data construction, controllable fine-tuning, autoregressive training, few-step distillation, and streaming inference. In this work, we present minWM, a full-stack open-source framework for building real-time interactive video world models. minWM provides an end-to-end pipeline that converts existing bidirectional T2V/TI2V video foundation models into camera-controllable few-step autoregressive world models. Specifically, minWM first fine-tunes a bidirectional video diffusion model with camera control, and then applies the Causal Forcing / Causal Forcing++ pipeline, including AR diffusion training, causal ODE or causal consistency distillation, and asymmetric DMD, to distill it into a few-step autoregressive generator for low-latency rollout. The framework is modular and architecture-extensible: we instantiate it on representative open backbones, including Wan2.1-T2V-1.3B and HY1.5-TI2V-8B, covering both cross-attention-based condition injection and MMDiT-style architectures. minWM also supports adapting existing video world models, such as HY-WorldPlay, to new data distributions, training recipes, and latency targets. Beyond releasing runnable scripts, checkpoints, documentation, and inference code, we provide practical ablations on camera trajectory quality, controllability training steps, and minimal batch-size requirements. We hope minWM serves as a reproducible and extensible recipe for building and adapting real-time interactive video world models.   Project Page: [https://github.com/shengshu-ai/minWM](https://github.com/shengshu-ai/minWM)', 'score': 38, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'fae9281a71d493b9', 'authors': ['Min Zhao', 'Hongzhou Zhu', 'Bokai Yan', 'Zihan Zhou', 'Yimin Chen', 'Wenqiang Sun', 'Kaiwen Zheng', 'Guande He', 'Xiao Yang', 'Chongxuan Li', 'Fan Bao', 'Jun Zhu'], 'affiliations': ['HKUST', 'RUC', 'ShengShu', 'THU', 'UT-Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.30263.jpg', 'data': {'categories': ['#optimization', '#video', '#inference', '#diffusion', '#training', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'От статических диффузий к интерактивным мировым моделям реального времени', 'desc': 'Представлена полная система для преобразования двусторонних видео-диффузионных моделей в интерактивные мировые модели реального времени с управляемым поведением и низкой задержкой. Авторы разработали фреймворк minWM, который включает пайплайн из подготовки данных, контролируемой тонкой настройки, автрегрессивного обучения и дистилляции для конвертации foundation моделей в быстрые генераторы. Система поддерживает модульную архитектуру и работает с различными видео-диффузионными базовыми моделями, обеспечивая управление камерой и причинностью в генерации. Проект включает открытый исходный код, чекпойнты и практические рекомендации для воспроизводимости.'}, 'en': {'title': 'Transforming Video Diffusion into Real-Time Interactivity', 'desc': 'This paper introduces minWM, a framework designed to transform bidirectional video diffusion models into real-time interactive world models. It focuses on achieving controllable, causal, and low-latency video generation through techniques like fine-tuning and distillation. The framework includes a complete pipeline that allows for camera control and autoregressive training, making it suitable for interactive applications. By providing modular components and support for various architectures, minWM aims to facilitate the development and adaptation of video world models for different use cases.'}, 'zh': {'title': '实时交互式视频世界模型的构建与适应', 'desc': '本文提出了一个全面的框架，将双向视频扩散模型转换为具有可控性、因果性和低延迟能力的实时交互式世界模型。通过微调和蒸馏技术，minWM框架实现了从现有视频基础模型到相机可控的自回归世界模型的转变。该框架包括数据构建、可控微调、自回归训练和流式推理等完整流程，确保了低延迟的输出。minWM的模块化设计使其能够适应不同的架构和数据分布，促进了实时交互式视频世界模型的构建和适应。'}}}, {'id': 'https://huggingface.co/papers/2605.30346', 'title': 'YoCausal: How Far is Video Generation from World Model? A Causality Perspective', 'url': 'https://huggingface.co/papers/2605.30346', 'abstract': 'Abstract Video diffusion models exhibit arrow-of-time perception without true causal understanding, as demonstrated by a novel benchmark measuring causal cognition through reverse surprise and visual language model analysis.  AI-generated summary As video diffusion models (VDMs) advance toward world models, a key question arises: do they truly understand causality, or merely overfit to statistical temporal patterns? Existing benchmarks mostly rely on synthetic data, limiting real-world generalization due to the sim-to-real gap. We present YoCausal, a two-level benchmark inspired by the Violation of Expectation (VoE) paradigm from cognitive science. By temporally reversing real-world videos at zero cost as natural counterfactual samples, YoCausal establishes an arbitrarily extensible evaluation protocol. Level 1 introduces the Reverse Surprise Index (RSI), quantifying arrow-of-time perception via denoising loss. Level 2 introduces the Causality Cognition Index (CCI), which leverages a VLM to stratify datasets into causal and non-causal subsets, disentangling genuine causal reasoning from temporal bias. Evaluation of 13 state-of-the-art VDMs reveals that perceiving the arrow of time does not imply understanding causality, and a significant gap persists relative to human-level causal cognition.', 'score': 31, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'ea26ff62cc400e8b', 'authors': ['You-Zhe Xie', 'Yu-Hsuan Li', 'Jie-Ying Lee', 'Kaipeng Zhang', 'Yu-Lun Liu', 'Zhixiang Wang'], 'affiliations': ['National Yang Ming Chiao Tung University', 'Shanda AI Research Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2605.30346.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#video', '#reasoning', '#diffusion', '#benchmark'], 'emoji': '⏮️', 'ru': {'title': 'Стрела времени — не гарантия понимания причинности в видео-диффузионных моделях', 'desc': 'Авторы представляют YoCausal — бенчмарк для оценки понимания причинности в видео-диффузионных моделях, вдохновленный парадигмой нарушения ожиданий из когнитивной науки. Бенчмарк использует естественные контрфактические образцы, полученные путем обратного воспроизведения реальных видео, и вводит два метрики: индекс обратной неожиданности для измерения восприятия стрелы времени и индекс причинного познания, использующий видео-языковые модели для разделения причинных и временных закономерностей. Экспериментальная оценка 13 современных видео-диффузионных моделей показывает, что восприятие направления времени не гарантирует подлинное понимание причинности. Исследование выявляет значительный разрыв между способностями моделей и человеческим уровнем причинного мышления.'}, 'en': {'title': 'YoCausal: Bridging the Gap Between Perception and Causality in Video Models', 'desc': 'This paper introduces YoCausal, a benchmark designed to evaluate the causal understanding of video diffusion models (VDMs). It challenges the assumption that these models truly grasp causality, as they may only be recognizing statistical patterns in time. The benchmark consists of two levels: the Reverse Surprise Index (RSI) measures how well models perceive the arrow of time, while the Causality Cognition Index (CCI) uses a visual language model to differentiate between causal and non-causal data. The findings indicate that even advanced VDMs struggle with genuine causal reasoning, highlighting a gap compared to human cognitive abilities.'}, 'zh': {'title': '因果理解与时间感知的差距', 'desc': '视频扩散模型（VDMs）在时间感知方面表现出箭头时间的特征，但并不真正理解因果关系。我们提出了YoCausal，这是一个基于认知科学中期望违反（VoE）范式的双层基准，旨在评估因果认知。通过将真实世界视频反向处理，YoCausal提供了自然的反事实样本，建立了可扩展的评估协议。评估结果显示，尽管VDMs能够感知时间的箭头，但与人类的因果认知相比，仍存在显著差距。'}}}, {'id': 'https://huggingface.co/papers/2605.30248', 'title': 'GenClaw: Code-Driven Agentic Image Generation', 'url': 'https://huggingface.co/papers/2605.30248', 'abstract': 'Abstract GenClaw presents a code-driven agentic image generation framework that enables precise visual construction through conceptualization, sketching, and coloring stages, integrating programmatic logic with generative models.  AI-generated summary Image generation models have evolved from text-conditioned pixel synthesis toward multimodal agents endowed with visual comprehension and tool invocation capabilities. Yet, existing agents remain at the mercy of underlying black-box image models. Their workflow is trapped in a repetitive cycle of prompt rewriting for generation refinement, leaving them with no mechanism to directly manipulate the canvas. In essence, the potential of LLMs to serve as a genuine "brush" for precise visual construction remains largely untapped. In this paper, we propose GenClaw, a code-driven agentic image generation paradigm that empowers the agent to create like a human artist: first conceptualizing, then sketching, and finally coloring. Specifically, the agent first constructs the conceptual knowledge and context through search and reasoning. It then utilizes code (e.g., SVG, HTML, Three.js) to render executable visual sketches. Finally, it employs an image generation model to supplement textures, materials, and photorealism. In this workflow, code serves as a controllable intermediate canvas bridging linguistic reasoning and pixel synthesis, seamlessly integrating programmatic logic with the visual expressiveness of generative models. By transforming image generation from a black-box paradigm into a staged process akin to authentic human creation, GenClaw offers a step toward for highly controllable and interpretable visual generation systems.', 'score': 24, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'bca83640c3cb0fcc', 'authors': ['Junyan Ye', 'Jun He', 'Zilong Huang', 'Dongzhi Jiang', 'Xuan Yang', 'Rui Chen', 'Weijia Li'], 'affiliations': ['Sun Yat-sen University', 'Tencent Hunyuan', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30248.jpg', 'data': {'categories': ['#cv', '#multimodal', '#agents'], 'emoji': '🎨', 'ru': {'title': 'LLM как художник: от текста к коду и изображению через структурированный творческий процесс', 'desc': 'GenClaw представляет новую парадигму генерации изображений, в которой агент, управляемый большой языковой моделью, создает визуальный контент в три этапа: концептуализация через поиск и рассуждение, скетчинг с использованием кода (SVG, HTML, Three.js) и раскрашивание с помощью моделей генерации изображений. Код служит контролируемым промежуточным представлением, которое связывает языковое рассуждение LLM с синтезом пикселей, позволяя агенту точно манипулировать холстом вместо повторного переписывания подсказок. Такой подход трансформирует черный ящик традиционных моделей в интерпретируемый пошаговый процесс, имитирующий творческий процесс человека-художника. GenClaw демонстрирует, как интеграция программной логики с возможностями генеративных моделей достигает высокой степени контролируемости и объяснимости в системах визуальной генерации.'}, 'en': {'title': 'Empowering Image Creation: From Concept to Canvas with GenClaw', 'desc': 'GenClaw is a new framework for generating images that allows for more control and creativity, similar to how human artists work. It consists of three main stages: conceptualization, sketching, and coloring, where the agent first understands the idea, then creates a visual draft using code, and finally enhances it with realistic textures. This approach moves away from traditional black-box models that require constant prompt adjustments, enabling direct manipulation of the image canvas. By integrating programming logic with generative models, GenClaw aims to make image generation more interpretable and controllable.'}, 'zh': {'title': 'GenClaw：让AI像艺术家一样创作', 'desc': 'GenClaw是一种基于代码的图像生成框架，允许通过概念化、草图和上色阶段进行精确的视觉构建。该框架结合了程序逻辑和生成模型，使得生成过程不再是黑箱操作。通过这种方法，代理可以像人类艺术家一样进行创作，首先构建概念知识，然后绘制草图，最后进行上色。GenClaw将图像生成转变为一个分阶段的过程，提供了更高的可控性和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2605.30010', 'title': 'EarlyTom: Early Token Compression Completes Fast Video Understanding', 'url': 'https://huggingface.co/papers/2605.30010', 'abstract': 'Abstract EarlyTom is a training-free framework that compresses visual tokens early in the vision encoder to reduce time-to-first-token and computational costs while maintaining model accuracy.  AI-generated summary Video large language models (Video-LLMs) have demonstrated strong capabilities in video understanding tasks. However, their practical deployment is still hindered by the inefficiency introduced by processing massive amounts of visual tokens. Although recent approaches achieve extremely low token retention ratios while maintaining accuracy comparable to full-token baselines, most of them perform compression only at the late stage of prefilling, leaving the efficiency of the vision encoder unoptimized. In this paper, we first show that vision encoding contributes a large portion to the time-to-first-token (TTFT). Therefore, instead of compressing visual tokens only after the vision encoder, performing compression inside the encoder still leaves substantial room for exploration. Based on this insight, we propose EarlyTom, a training-free token compression framework that performs early-stage visual token compression inside the vision encoder, enabling significantly better TTFT reduction and higher throughput. In addition, we introduce a decoupled spatial token selection strategy that improves the overall compression effectiveness. EarlyTom reduces TTFT by up to 2.65x and FLOPs by up to 61% on a single NVIDIA A100 GPU for the LLaVA-OneVision-7B model, while maintaining accuracy comparable to the full-token baseline. These improvements substantially enhance the practicality of deploying Video-LLMs in real-world production scenarios.', 'score': 23, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '01d0484921c64e62', 'authors': ['Hesong Wang', 'Xin Jin', 'Lu Lu', 'Chenhaowen Li', 'Jian Chen', 'Qiang Liu', 'Huan Wang'], 'affiliations': ['Alibaba Cloud Computing', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30010.jpg', 'data': {'categories': ['#inference', '#optimization', '#video', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Ранее сжатие: ускорение видео-LLM через оптимизацию визуальных токенов на уровне энкодера', 'desc': 'EarlyTom — это фреймворк сжатия визуальных токенов, который не требует переобучения модели и работает внутри визуального энкодера на ранних стадиях обработки. Авторы показывают, что визуальное кодирование составляет значительную часть времени до первого токена (TTFT), и предлагают сжимать токены непосредственно внутри энкодера вместо того, чтобы делать это после его работы. Они вводят декупированную стратегию отбора пространственных токенов, которая улучшает эффективность сжатия. На примере модели LLaVA-OneVision-7B фреймворк достигает ускорения TTFT в 2.65 раза и сокращения вычислительных операций на 61% при сохранении точности исходной модели.'}, 'en': {'title': 'Early Token Compression for Faster Video Understanding', 'desc': 'EarlyTom is a novel framework designed to enhance the efficiency of video large language models (Video-LLMs) by compressing visual tokens early in the vision encoder. This approach significantly reduces the time-to-first-token (TTFT) and computational costs while preserving model accuracy. By implementing a decoupled spatial token selection strategy, EarlyTom optimizes the compression process, achieving up to 2.65 times faster TTFT and reducing FLOPs by 61%. These advancements make it more feasible to deploy Video-LLMs in practical applications, addressing the challenges posed by processing large volumes of visual tokens.'}, 'zh': {'title': 'EarlyTom：提升视频模型效率的创新框架', 'desc': 'EarlyTom 是一个无训练的框架，旨在通过在视觉编码器中早期压缩视觉标记，来减少首次标记的时间和计算成本，同时保持模型的准确性。该方法解决了视频大语言模型在处理大量视觉标记时的效率问题，优化了视觉编码器的性能。通过在编码器内部进行压缩，EarlyTom 显著提高了首次标记时间的减少和吞吐量。实验结果表明，EarlyTom 在保持准确性的同时，能够将首次标记时间减少多达 2.65 倍，FLOPs 降低多达 61%。'}}}, {'id': 'https://huggingface.co/papers/2605.30076', 'title': 'UniSteer: Text-Guided Flow Matching in Activation Space for Versatile LLM Steering', 'url': 'https://huggingface.co/papers/2605.30076', 'abstract': 'Abstract UniSteer uses text-guided activation flow matching to learn a universal conditional velocity field in activation space for controlling LLM behaviors and classification tasks.  AI-generated summary Activation-based control steers large language models (LLMs) by intervening on their internal representations during inference, and has emerged as an effective paradigm for controlling behaviors such as persona and style. However, existing methods often rely on fixed steering directions or task-specific intervention modules, making them difficult to adapt to fine-grained concepts and compositional constraints. We propose UniSteer, a text-guided activation flow matching model that learns a conditional distribution over residual-stream activations from natural-language conditions. Instead of fitting a separate intervention for each target behavior, UniSteer learns a universal conditional velocity field in activation space. At inference time, UniSteer performs flow inversion by partially transporting a source activation toward a latent state and regenerating it under a target textual condition before injecting it back into the frozen LLM. The same conditional model supports activation-space classification by selecting the textual label with the lowest reconstruction energy. Experiments on three target LLMs show that UniSteer provides a unified interface across behavioral control, truthfulness steering, fine-grained concept steering, multi-constraint instruction following, and activation-space classification.', 'score': 19, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '14795f9a30a0c438', 'authors': ['Yingdong Shi', 'Ruiming Zhang', 'Changming Li', 'Zhiyu Yang', 'Kaixing Zhang', 'Jingyi Yu', 'Kan Ren'], 'affiliations': ['ShanghaiTech University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30076.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Универсальное управление поведением LLM через условные потоки в пространстве активаций', 'desc': 'UniSteer — это модель, которая использует текстовые инструкции для управления поведением больших языковых моделей путём вмешательства во внутренние представления. Вместо того чтобы обучать отдельное вмешательство для каждого поведения, метод изучает универсальное условное поле скоростей в пространстве активаций с помощью flow matching. Во время вывода модель частично транспортирует активации в скрытое пространство согласно текстовому условию, а затем внедряет их обратно в замороженную LLM. Один унифицированный условный модель поддерживает управление поведением, направление истинности, контроль тонких концепций и классификацию в пространстве активаций.'}, 'en': {'title': 'Steering LLMs with Universal Activation Control', 'desc': 'UniSteer introduces a novel approach to control large language models (LLMs) by utilizing text-guided activation flow matching. This method allows for dynamic adjustments to the internal representations of LLMs during inference, enabling fine-tuned control over behaviors like persona and style. Unlike traditional methods that require specific interventions for each task, UniSteer learns a universal conditional velocity field in activation space, making it adaptable to various concepts and constraints. The model not only facilitates behavioral control but also supports classification tasks by selecting labels based on reconstruction energy, demonstrating its versatility across multiple applications.'}, 'zh': {'title': 'UniSteer：通用的激活控制模型', 'desc': 'UniSteer是一种基于文本引导的激活流匹配模型，旨在学习激活空间中的通用条件速度场，以控制大型语言模型（LLM）的行为和分类任务。该方法通过干预LLM的内部表示，能够有效地控制个性和风格等行为。与现有方法依赖固定的引导方向或特定任务的干预模块不同，UniSteer能够适应细粒度概念和组合约束。实验表明，UniSteer在行为控制、真实性引导、细粒度概念引导等多个任务中提供了统一的接口。'}}}, {'id': 'https://huggingface.co/papers/2605.30260', 'title': 'How LoRA Remembers? A Parametric Memory Law for LLM Finetuning', 'url': 'https://huggingface.co/papers/2605.30260', 'abstract': 'Abstract Research investigates the quantitative limits of parametric memory in large language models using LoRA as a probe, establishing a power law relationship and developing a threshold-guided optimization method for improved memory performance.  AI-generated summary Large Language Models (LLMs) must continuously learn and update knowledge to remain effective in dynamic real-world environments. While Low-Rank Adaptation (LoRA) is widely used for such memory updates, existing studies mainly rely on qualitative downstream evaluations, leaving the quantitative capacity limits and underlying dynamics of exact parametric memory largely unexplored. To bridge this gap, we employ LoRA as a controlled memory capacity probe within the latent space to systematically quantify exact parametric memory. We introduce the Parametric Memory Law, a robust power law linking loss reduction Delta L to effective parameters and sequence length. At the token level, fine-grained analysis reveals a deterministic phase transition, demonstrating that a prediction probability of p > 0.5 constitutes a sufficient condition for verbatim recall under greedy decoding. Driven by these insights, we introduce MemFT, a threshold-guided optimization strategy that dynamically redistributes the training budget toward sub-threshold tokens. Empirical evaluations demonstrate that MemFT can enhance memory fidelity and efficiency. Code will be released at https://github.com/zjunlp/ParametricMemoryLaw.', 'score': 19, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'b8238f4839899a49', 'authors': ['Ziwen Xu', 'Haiwen Hong', 'Linsong Yu', 'Benglei Cui', 'Longtao Huang', 'Hui Xue', 'Ningyu Zhang'], 'affiliations': ['Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30260.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Законы параметрической памяти: как LLM запоминают информацию', 'desc': 'В исследовании изучаются количественные границы параметрической памяти в больших языковых моделях, используя LoRA в качестве инструмента измерения. Авторы устанавливают степенную зависимость между снижением функции потерь и количеством эффективных параметров, называя это Законом параметрической памяти. На уровне отдельных токенов обнаружена детерминированная фазовая переходная точка: когда вероятность предсказания превышает 0.5, модель способна к точному воспроизведению информации. На основе этих закономерностей предложен метод MemFT, который динамически перераспределяет вычислительные ресурсы для улучшения точности и эффективности запоминания параметрами модели.'}, 'en': {'title': 'Unlocking Memory Limits in Language Models with LoRA', 'desc': 'This paper explores the limits of memory in large language models (LLMs) by using Low-Rank Adaptation (LoRA) to measure parametric memory capacity. It establishes a power law relationship between loss reduction and effective parameters, providing a quantitative framework for understanding memory dynamics. The authors introduce a new optimization method called MemFT, which improves memory performance by focusing training on critical tokens. Their findings reveal that a prediction probability greater than 0.5 is essential for accurate recall, leading to enhanced memory fidelity in LLMs.'}, 'zh': {'title': '提升大语言模型记忆性能的创新方法', 'desc': '本研究探讨了大语言模型中参数记忆的定量极限，使用低秩适应（LoRA）作为探针。我们建立了一个幂律关系，并开发了一种阈值引导的优化方法，以提高记忆性能。通过系统量化参数记忆，我们引入了参数记忆法则，揭示了损失减少与有效参数和序列长度之间的关系。最终，我们提出了MemFT策略，能够动态调整训练预算，从而提升记忆的准确性和效率。'}}}, {'id': 'https://huggingface.co/papers/2605.30073', 'title': 'Native Audio-Visual Alignment for Generation', 'url': 'https://huggingface.co/papers/2605.30073', 'abstract': 'Abstract NAVA enables joint audio-video generation with improved synchronization and controllability through native audio-visual alignment and context-conditioned denoising.  AI-generated summary Joint audio-video generation aims to synthesize temporally synchronized and semantically coherent visual-acoustic content. However, existing open-source methods mainly rely on either dual-tower designs with posterior alignment or fully unified tri-modal designs that mix textual context, audio and video in one shared space. The former weakens fine-grained audio-video co-evolution, while the latter couples semantic conditioning with low-level synchronization. To address these limitations, we propose NAVA, a Native Audio-Visual Alignment framework for joint audio-video generation. NAVA is built upon context-conditioned native audio-visual alignment: it first establishes audio-video correspondence in a dedicated interaction space, and then uses external context to condition the joint denoising process. Specifically, NAVA is instantiated with an Align-then-Fuse MMDiT architecture, which transitions from modality-aware audio-video alignment to modality-shared joint denoising. Furthermore, we introduce Timbre-in-Context Conditioning to associate reference timbre cues with corresponding speech spans to achieve controllable speech timbre. Experiments on Verse-Bench and Seed-TTS, together with a user study, demonstrate that NAVA achieves superior video quality, precise audio-visual synchronization, competitive audio quality, and stronger reference-timbre controllability using only 6.3B parameters.', 'score': 18, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '90535cccee0bf38c', 'authors': ['Longbin Ji', 'Guan Wang', 'Xuan Wei', 'Chenye Yang', 'Xiangrui Liu', 'Zhenyu Zhang', 'Shuohuan Wang', 'Yu Sun', 'Jingzhou He'], 'affiliations': ['Baidu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.30073.jpg', 'data': {'categories': ['#architecture', '#video', '#multimodal', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Синхронное совместное поколение аудио и видео через нативное выравнивание модальностей', 'desc': 'NAVA — это фреймворк для совместной генерации аудио и видео, который обеспечивает улучшенную синхронизацию и управляемость через нативное выравнивание аудиовизуального контента. В отличие от существующих методов, которые либо разделяют модальности, либо полностью их объединяют, NAVA использует специализированное пространство взаимодействия для установления соответствия между аудио и видео перед совместным процессом денуазинга. Архитектура Align-then-Fuse MMDiT позволяет переходить от модально-осознанного выравнивания к модально-разделяемому денуазингу. Кроме того, введено Timbre-in-Context Conditioning для управления тембром речи и достижения более точного контроля над генерируемым контентом.'}, 'en': {'title': 'NAVA: Synchronizing Audio and Video with Contextual Precision', 'desc': 'The paper presents NAVA, a framework designed for generating audio and video content that is both synchronized and contextually relevant. It improves upon existing methods by establishing a dedicated interaction space for audio-video alignment, allowing for better co-evolution of these modalities. NAVA employs a unique Align-then-Fuse architecture that enhances the denoising process by incorporating external context. Additionally, it introduces Timbre-in-Context Conditioning, which allows for precise control over speech timbre, resulting in high-quality audio-visual outputs with fewer parameters.'}, 'zh': {'title': 'NAVA：提升音视频生成的同步与可控性', 'desc': 'NAVA是一种用于联合音视频生成的框架，旨在提高音视频的同步性和可控性。它通过原生音视频对齐和上下文条件去噪来实现音视频内容的时序同步和语义一致。与现有方法不同，NAVA在专用的交互空间中建立音视频对应关系，并利用外部上下文来调节联合去噪过程。实验结果表明，NAVA在视频质量、音视频同步精度和音质方面表现优越，且只需6.3亿参数。'}}}, {'id': 'https://huggingface.co/papers/2605.30265', 'title': 'LoMo: Local Modality Substitution for Deeper Vision-Language Fusion', 'url': 'https://huggingface.co/papers/2605.30265', 'abstract': 'Abstract Vision-language models suffer from modality sensitivity due to training data bias, but a new data curation approach called Local Modality Substitution improves cross-modal representation alignment and reasoning performance.  AI-generated summary Vision-Language Models (VLMs) have achieved substantial progress across a wide range of understanding and reasoning tasks, driven by large-scale image-text training aimed at multimodal fusion. Ideally, replacing a textual question with its rendered-image counterpart should leave model performance essentially unaffected. In practice, however, such modality substitution induces dramatic performance degradation. We attribute this "carrier sensitivity" issue to an inherent bias in current training corpora. Across prevalent datasets such as image captioning, VQA, OCR, and web-sourced interleaved data, text and images are typically organized into distinct and asymmetric roles, with text serving as linguistic queries and images as visual references. Such data bias leads VLMs to exhibit distinct preferences for information acquisition across different modalities. Consequently, VLMs fail to align representations of semantically equivalent content across textual and visual carriers, making model reasoning fragile under modality substitution. To address this, we propose Local Modality Substitution (LoMo), a lightweight, architecture-agnostic data curation paradigm designed to provide supervision for cross-modal representational invariance between semantically equivalent text and image carriers. LoMo achieves this by reformulating single-modality prompts into seamlessly interleaved multimodal sequences. It dynamically selects target text spans and recasts them as rendered images, thereby preserving the same semantics across "text, visual, text" carriers. Extensive experiments across 13 diverse multimodal benchmarks demonstrate that LoMo significantly improves overall multimodal reasoning and yields deeper cross-modal fusion. Specifically, it delivers consistent gains across foundational models, improving over standard SFT by 2.67 points on LLaVA-OneVision-1.5-8B and 2.82 points on Qwen3.5-9B.', 'score': 17, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '0dc3c13768b27302', 'authors': ['Feng Han', 'Zhixiong Zhang', 'Zheming Liang', 'Yibin Wang', 'Jiaqi Wang'], 'affiliations': ['Fudan University', 'JD.COM', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.30265.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark', '#data'], 'emoji': '🔄', 'ru': {'title': 'Преодоление модальной чувствительности через перестановку носителей данных', 'desc': 'В работе выявлена проблема модальной чувствительности в видео-языковых моделях, которая возникает из-за асимметричного распределения ролей текста и изображений в обучающих данных. Авторы предлагают метод Local Modality Substitution (LoMo) — лёгкий подход к курированию данных, который создаёт мультимодальные последовательности путём замены текстовых фрагментов их визуальными представлениями. Это обеспечивает модели одинаковое понимание семантически эквивалентного контента независимо от его носителя — текста или изображения. Метод показывает стабильные улучшения на 13 мультимодальных бенчмарках и увеличивает качество кросс-модального выравнивания представлений в современных видео-языковых моделях.'}, 'en': {'title': 'Enhancing Vision-Language Models with Local Modality Substitution', 'desc': 'This paper addresses the issue of modality sensitivity in vision-language models (VLMs), which occurs due to biases in training data. The authors introduce a new data curation method called Local Modality Substitution (LoMo) that enhances the alignment of representations between text and images. By reformulating prompts to interleave text and images, LoMo helps VLMs maintain consistent semantics across different modalities. Experimental results show that LoMo significantly improves multimodal reasoning performance across various benchmarks, demonstrating its effectiveness in reducing carrier sensitivity.'}, 'zh': {'title': '局部模态替代：提升视觉语言模型的推理能力', 'desc': '本文探讨了视觉语言模型（VLMs）在跨模态表示对齐和推理性能方面的不足，主要是由于训练数据的偏差导致的模态敏感性问题。我们提出了一种新的数据整理方法，称为局部模态替代（LoMo），旨在改善语义等价的文本和图像载体之间的跨模态表示不变性。LoMo通过将单模态提示重新构造成无缝交错的多模态序列，动态选择目标文本片段并将其转换为渲染图像，从而保持相同的语义。实验结果表明，LoMo在多个多模态基准测试中显著提高了推理能力，增强了跨模态融合效果。'}}}, {'id': 'https://huggingface.co/papers/2605.29888', 'title': 'LaRA: Layer-wise Representation Analysis for Detecting Data Contamination in RL Post-Training', 'url': 'https://huggingface.co/papers/2605.29888', 'abstract': 'Abstract LaRA is a layer-wise representation analysis framework that detects data contamination in reinforcement learning-post-trained large language models by analyzing geometric deviations across model layers.  AI-generated summary Reinforcement learning (RL) post-training has shown to improve reasoning in large language models (LLMs). However, there has been little exploration on the problem of data contamination in RL post-training, potentially undermining generalization and evaluation reliability of the training process itself. Existing detection methods primarily rely on output-level signals such as likelihood or entropy, which become unreliable for RL-trained models since RL shapes behavior through trajectory-level rewards rather than token likelihoods. We propose LaRA, a layer-wise representation analysis framework for detecting contamination in RL post-trained LLMs. LaRA introduces three complementary metrics, measuring perturbation sensitivity, directional collapse, and local representation rigidity under controlled perturbations. We find that contamination produces progressive geometric deviations across layers, including amplified perturbation sensitivity, stronger directional collapse, and enhanced local rigidity. Based on our findings, we also develop a contamination detection protocol that aggregates representation-level deviations across layers and metrics. Experiments on RL-trained reasoning models show that our protocol outperforms existing output-level baselines for contamination detection.', 'score': 16, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '3d237b718b26d9a5', 'authors': ['Minju Gwak', 'Minseo Kwak', 'Dongseok Lee', 'Guijin Son', 'Alan Ritter', 'Jaehyung Kim'], 'affiliations': ['Georgia Institute of Technology', 'Seoul National University', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29888.jpg', 'data': {'categories': ['#leakage', '#rl', '#interpretability', '#reasoning', '#training'], 'emoji': '🔍', 'ru': {'title': 'Геометрический анализ слоёв для обнаружения загрязнения данных в RL-обученных моделях', 'desc': 'LaRA — это фреймворк для послойного анализа представлений, который обнаруживает загрязнение данных в больших языковых моделях, прошедших постобработку с использованием обучения с подкреплением. Авторы показывают, что существующие методы обнаружения на уровне выходов ненадёжны для RL-обученных моделей, так как обучение с подкреплением формирует поведение через награды на уровне траекторий, а не через вероятности токенов. Предложенный метод анализирует три геометрических метрики: чувствительность к возмущениям, коллапс направлений и локальную жёсткость представлений на разных слоях сети. Экспериментальные результаты демонстрируют, что протокол обнаружения загрязнения на основе представлений превосходит существующие методы анализа на уровне выходов.'}, 'en': {'title': 'Detecting Contamination in Reinforcement Learning Models with LaRA', 'desc': "LaRA is a framework designed to identify data contamination in large language models that have been fine-tuned using reinforcement learning. It focuses on analyzing the geometric changes in the model's internal layers rather than just the output signals, which can be misleading in this context. The framework introduces three key metrics to assess how the model's representations are affected by contamination, revealing significant deviations in behavior across layers. Experiments demonstrate that LaRA's approach is more effective than traditional methods that rely solely on output-level analysis."}, 'zh': {'title': 'LaRA：检测强化学习模型中的数据污染', 'desc': 'LaRA是一个层级表示分析框架，用于检测强化学习后训练的大型语言模型中的数据污染。该框架通过分析模型层之间的几何偏差，识别出数据污染对模型性能的影响。LaRA引入了三种互补的度量标准，分别测量扰动敏感性、方向崩溃和局部表示刚性。实验结果表明，LaRA在检测数据污染方面优于现有的输出级别基线方法。'}}}, {'id': 'https://huggingface.co/papers/2605.28424', 'title': 'Skill0.5: Joint Skill Internalization and Utilization for Out-of-Distribution Generalization in Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.28424', 'abstract': 'Abstract Skill0.5 is a novel agentic reinforcement learning framework that combines general skill internalization with task-specific skill utilization through a dynamic, difficulty-aware router to improve performance in complex task environments.  AI-generated summary Equipping large language models with explicit skills has emerged as a promising paradigm for enabling autonomous agents to solve complex tasks. Agent skills can be inherently divided into general skills for broad cognitive transfer and task-specific skills for dynamic execution. However, existing skill-based reinforcement learning (RL) methods typically force a rigid choice between full externalization, which incurs prohibitive context overhead, and full internalization, which risks overfitting and knowledge conflicts. To address this dilemma, we propose Skill0.5, a novel agentic RL framework that explicitly differentiates skill treatments by combining general skill internalization with task-specific skill utilization. Driven by a dynamic, difficulty-aware router, Skill0.5 streams tasks into distinct mastery tiers to apply tailored optimization strategies: it internalizes general skills via privileged distillation to build a cognitive foundation for hard tasks, while using diagnostic probing on easy tasks to penalize shortcuts and enforce specific skill utilization. Experiments on ALFWorld and WebShop demonstrate that Skill0.5 outperforms both memory-based and skill-based RL baselines, yielding performance improvements across both in-distribution and out-of-distribution scenarios.', 'score': 16, 'issue_id': 2338, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '57f3fadd218f1a84', 'authors': ['Jiapeng Zhu', 'Jianxiang Yu', 'Yibo Zhao', 'Chengcheng Han', 'Qi Gu', 'Xunliang Cai', 'Xiang Li', 'Weining Qian'], 'affiliations': ['East China Normal University', 'Meituan Longcat Team'], 'pdf_title_img': 'assets/pdf/title_img/2605.28424.jpg', 'data': {'categories': ['#rl', '#agents', '#training', '#alignment', '#transfer_learning', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Гибридный подход к интернализации и использованию навыков в обучении агентов с подкреплением', 'desc': 'Skill0.5 представляет собой инновационный фреймворк для обучения с подкреплением агентов, который разделяет обработку навыков на две стратегии: общие навыки интернализируются через дистилляцию привилегированного знания для построения когнитивной базы, а задачеспецифичные навыки активно используются во время выполнения задач. Ключевой компонент системы — это динамический маршрутизатор, осведомлённый о сложности задач, который распределяет их по уровням владения и применяет соответствующие оптимизационные стратегии. На сложных задачах агент полагается на интернализированные навыки, а на простых задачах использует диагностическое зондирование, чтобы предотвратить использование простых решений и обеспечить применение специфичных навыков. Экспериментальные результаты на средах ALFWorld и WebShop показывают превосходство Skill0.5 над базовыми подходами, основанными на памяти и навыках, как для распределённых, так и для внераспределённых сценариев.'}, 'en': {'title': 'Skill0.5: Bridging General and Task-Specific Skills in RL', 'desc': "Skill0.5 is a new framework in reinforcement learning that enhances how agents learn and apply skills. It cleverly combines general skills, which are useful across many tasks, with specific skills tailored for particular tasks. This approach uses a smart router that adjusts the difficulty of tasks, allowing the agent to learn foundational skills for harder tasks while ensuring it doesn't take shortcuts on easier ones. Experiments show that Skill0.5 performs better than traditional methods, making it more effective in various task scenarios."}, 'zh': {'title': 'Skill0.5：智能体强化学习的新突破', 'desc': 'Skill0.5是一种新颖的强化学习框架，旨在通过动态的、难度感知的路由器，将通用技能的内化与特定任务技能的利用相结合，以提高在复杂任务环境中的表现。该框架将技能分为通用技能和特定任务技能，前者用于广泛的认知转移，后者用于动态执行。Skill0.5通过特权蒸馏内化通用技能，为困难任务建立认知基础，同时在简单任务上使用诊断探测来惩罚捷径并强制执行特定技能的利用。实验结果表明，Skill0.5在ALFWorld和WebShop上超越了基于记忆和基于技能的强化学习基线，在分布内和分布外场景中均表现出性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.29507', 'title': 'Xetrieval: Mechanistically Explaining Dense Retrieval', 'url': 'https://huggingface.co/papers/2605.29507', 'abstract': 'Abstract Xetrieval is a mechanistic framework that explains dense retrieval by enhancing sentence embeddings with reasoning information and decomposing them into interpretable sparse features for retrieval decision explanations.  AI-generated summary Explaining why dense retrievers assign high relevance scores remains challenging because retrieval decisions are made through opaque high-dimensional embeddings. Existing explanations often focus on surface signals, such as lexical matches, token alignments, or post-hoc textual rationales, and thus provide limited insight into the latent factors that shape dense retrieval behavior at the embedding level. We propose Xetrieval, an embedding-level mechanistic framework for explaining dense retrieval. Xetrieval first introduces a lightweight reasoning internalizer that approximates Chain-of-Thought reasoning directly in the embedding space with a single forward pass, enriching sentence embeddings with reasoning-oriented information while avoiding expensive autoregressive generation. It then decomposes these reasoning-enhanced embeddings into sparse, human-interpretable features, each associated with a coherent natural language description. By aggregating sparse feature overlaps across multiple document-side views, Xetrieval provides feature-level explanations of individual retrieval decisions. Experiments on diverse retrievers and benchmarks show that Xetrieval uncovers coherent interpretable features, yields stronger pair-level intervention effects, and supports task-level feature steering. The project page and source code are available at https://hihiczx.github.io/Xetrieval .', 'score': 15, 'issue_id': 2340, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '09d93d71c3780326', 'authors': ['Zhixin Cai', 'Jun Bai', 'Yang Liu', 'Jiaqi Li', 'Yichi Zhang', 'Taichuan Li', 'Zhuofan Chen', 'Zixia Jia', 'Zilong Zheng', 'Wenge Rong'], 'affiliations': ['School of Computer Science and Engineering, Beihang University', 'State Key Laboratory of General Artificial Intelligence, BIGAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.29507.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#benchmark', '#interpretability', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Разбор чёрного ящика: интерпретируемые признаки в нейронном поиске', 'desc': 'Xetrieval — это механистический фреймворк для объяснения работы плотных извлекателей информации (dense retrievers), который обогащает векторные представления предложений информацией о рассуждениях. Фреймворк использует лёгкий модуль для интернализации цепочки рассуждений прямо в пространстве эмбеддингов без дорогостоящей автоматической генерации текста. Полученные эмбеддинги затем разлагаются на редкие, интерпретируемые признаки с описаниями на естественном языке, позволяя объяснить решения о релевантности на уровне признаков. Экспериментальные результаты показывают, что метод находит согласованные интерпретируемые признаки и позволяет контролировать поведение системы через эти признаки.'}, 'en': {'title': 'Unlocking Dense Retrieval: Clear Explanations through Xetrieval', 'desc': 'Xetrieval is a framework designed to explain how dense retrieval systems work by enhancing sentence embeddings with reasoning information. It addresses the challenge of understanding why certain documents are deemed relevant by breaking down high-dimensional embeddings into simpler, interpretable features. The framework uses a lightweight reasoning internalizer to enrich embeddings without the need for complex generation processes. By providing clear, human-readable explanations for retrieval decisions, Xetrieval improves transparency in dense retrieval systems and supports better decision-making in information retrieval tasks.'}, 'zh': {'title': 'Xetrieval：揭示密集检索的可解释性', 'desc': 'Xetrieval是一个机制框架，用于解释密集检索，通过增强句子嵌入的推理信息，并将其分解为可解释的稀疏特征，以解释检索决策。该框架首先引入轻量级的推理内部化器，直接在嵌入空间中近似链式思维推理，丰富句子嵌入的信息。然后，它将这些增强的嵌入分解为稀疏的、易于理解的特征，并为每个特征提供一致的自然语言描述。实验表明，Xetrieval能够揭示一致的可解释特征，并在多种检索器和基准测试中表现出更强的干预效果。'}}}, {'id': 'https://huggingface.co/papers/2605.30219', 'title': 'When Should Models Change Their Minds? Contextual Belief Management in Large Language Models', 'url': 'https://huggingface.co/papers/2605.30219', 'abstract': 'Abstract Language models struggle with managing long-term information through contextual belief management, which involves updating, preserving, and filtering relevant information, and can be improved using reinforcement learning and representation-level steering techniques.  AI-generated summary Long-horizon interactions require language models to manage accumulating information: when to update their state, when to preserve their state, and what to ignore. We study this challenge as Contextual Belief Management (CBM): maintaining a predicted belief state aligned with formal evidence while isolating task-irrelevant noise. To make CBM measurable, we introduce BeliefTrack, a closed-world benchmark spanning Rule Discovery and Circuit Diagnosis, where a finite belief space and symbolic verifiers enable exact turn-level evaluation. BeliefTrack diagnoses three failures: Failed Stay, Failed Update, and Failed Isolation. Across multiple LLMs, vanilla models exhibit severe CBM failures, while explicit belief-tracking prompts provide limited gains. In contrast, reinforcement learning with belief-state rewards reduces failure rates by 70.9\\% on average. Further probing reveals latent belief-state dynamics behind these failures, and representation-level steering reduces failure rates by 46.1\\% across two tasks\\footnote{Code is coming soon at https://github.com/zjunlp/CBM.', 'score': 14, 'issue_id': 2337, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'db32430b7563848c', 'authors': ['Haoming Xu', 'Weihong Xu', 'Zongrui Li', 'Mengru Wang', 'Yunzhi Yao', 'Chiyu Wu', 'Jin Shang', 'Yu Gong', 'Shumin Deng'], 'affiliations': ['HomologyAI', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30219.jpg', 'data': {'categories': ['#rl', '#long_context', '#alignment', '#reasoning', '#training', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Обучение моделей правильно помнить: управление контекстным состоянием через усиленное обучение', 'desc': "В работе исследуется проблема управления контекстным состоянием (Contextual Belief Management) в языковых моделях при обработке длинных последовательностей информации. Авторы предлагают BeliefTrack — бенчмарк для измерения способности LLM обновлять, сохранять и фильтровать релевантную информацию, выявляя три типа ошибок: неудачное сохранение состояния, неудачное обновление и неудачную фильтрацию шума. Решение предложено в виде применения reinforcement learning с вознаграждениями за правильное отслеживание состояния, что снижает процент ошибок на 70.9% в среднем. Дополнительно используются техники представленческого steering'а, которые снижают ошибки ещё на 46.1%, раскрывая латентную динамику управления состоянием в моделях."}, 'en': {'title': 'Enhancing Language Models with Contextual Belief Management', 'desc': "This paper addresses the challenge of long-term information management in language models through a concept called Contextual Belief Management (CBM). CBM focuses on how models can effectively update, preserve, and filter relevant information while ignoring irrelevant noise. The authors introduce a benchmark called BeliefTrack to evaluate CBM performance, identifying common failure modes in existing models. They demonstrate that using reinforcement learning and representation-level steering techniques significantly improves the models' ability to manage belief states, reducing failure rates substantially."}, 'zh': {'title': '提升语言模型的长期信息管理能力', 'desc': '本文探讨了语言模型在长期信息管理中的挑战，特别是上下文信念管理（CBM）。CBM涉及更新、保留和过滤相关信息，以保持与正式证据一致的预测信念状态。我们提出了BeliefTrack基准，能够精确评估模型在规则发现和电路诊断任务中的表现。通过强化学习和表示级引导技术，我们显著降低了CBM失败率，提升了模型的长期信息管理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.30332', 'title': 'Colored Noise Diffusion Sampling', 'url': 'https://huggingface.co/papers/2605.30332', 'abstract': "Abstract Diffusion models exhibit spectral bias in image synthesis, and a new sampling method called Colored Noise Sampling addresses this by dynamically allocating energy based on frequency-dependent schedules, leading to improved image quality metrics.  AI-generated summary Diffusion models achieve state-of-the-art image synthesis, with their generative trajectories fundamentally exhibiting a spectral bias, resolving low-frequency global structures early and high-frequency fine details later. Conventional stochastic differential equation (SDE) solvers fail to account for this dynamic, naively injecting uniform white noise throughout the entire process and misusing the finite energy budget. In this work, we establish a mathematical framework that reconsiders SDE inference as a targeted, frequency-decoupled energy transfer. Leveraging this framework, we introduce Colored Noise Sampling (CNS), a novel, training-free stochastic solver. Rather than injecting uniform white noise, CNS utilizes a dynamic, timestep- and frequency-dependent schedule that more efficiently allocates injected energy toward structurally unresolved frequency bands. By actively exploiting the model's inherent spectral bias, CNS systematically steers the generated distribution toward the true data manifold. Extensive experiments demonstrate that CNS significantly outperforms standard ODE and SDE baselines as a strictly plug-and-play, inference-time sampler substitution across diverse architectures (SiT, JiT, FLUX). Compared to standard sampling on ImageNet-256, CNS achieves substantial unguided FID reductions, improving from 8.26 to 6.27 on SiT-XL/2, 32.39 to 26.69 on JiT-B/16, and 11.88 to 8.31 on JiT-H/16, while yielding consistent relative FID improvements with Classifier-Free Guidance. Project page is available at https://hadardavidson.github.io/CNS/.", 'score': 11, 'issue_id': 2338, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '755f7bfa83b4ff43', 'authors': ['Hadar Davidson', 'Noam Issachar', 'Sagie Benaim'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.30332.jpg', 'data': {'categories': [], 'emoji': '🌈', 'ru': {'title': 'Адаптивный цветной шум для эффективного синтеза в диффузионных моделях', 'desc': 'В работе выявлена спектральная предвзятость диффузионных моделей при синтезе изображений, где низкие частоты разрешаются рано, а высокие — позже. Авторы предложили новый метод Colored Noise Sampling (CNS), который переформулирует процесс вывода как целенаправленный перенос энергии между частотными компонентами вместо использования равномерного белого шума. Метод CNS использует динамическое расписание, зависящее от временного шага и частоты, для более эффективного распределения энергии шума в неразрешённые частотные диапазоны. Экспериментальные результаты показывают значительное улучшение метрики FID на различных архитектурах диффузионных моделей без необходимости переобучения.'}, 'en': {'title': 'Enhancing Image Synthesis with Colored Noise Sampling', 'desc': 'This paper addresses the spectral bias observed in diffusion models used for image synthesis, where low-frequency structures are generated before high-frequency details. The authors propose a new sampling method called Colored Noise Sampling (CNS), which allocates energy based on frequency-dependent schedules rather than using uniform white noise. This approach allows for more efficient energy transfer during the sampling process, targeting unresolved frequency bands and improving image quality. Experimental results show that CNS significantly enhances performance metrics like FID compared to traditional sampling methods across various architectures.'}, 'zh': {'title': '彩色噪声采样：提升图像合成质量的新方法', 'desc': '扩散模型在图像合成中表现出频谱偏差，导致低频全局结构早期生成，而高频细节则较晚出现。传统的随机微分方程求解器未能考虑这一动态，导致在整个过程中均匀注入白噪声，浪费了有限的能量预算。本文提出了一种新的数学框架，将随机微分方程推理重新定义为针对性的、频率解耦的能量转移。基于此框架，我们引入了彩色噪声采样（CNS），通过动态的时间步和频率依赖调度，更有效地分配能量，从而显著提高图像质量。'}}}, {'id': 'https://huggingface.co/papers/2605.26578', 'title': 'Is Position Bias in Dense Retrievers Built In-or Learned from Data?', 'url': 'https://huggingface.co/papers/2605.26578', 'abstract': 'Abstract Training data position distribution significantly influences positional bias in dense retrievers, with balanced training reducing sensitivity by up to 87% while maintaining competitive retrieval performance.  AI-generated summary Dense retrievers exhibit positional bias, favoring documents whose query-relevant information appears near the beginning and degrading retrieval performance when the information appears later. While prior work on positional bias in dense retrievers has largely focused on architectural explanations, we study how the positional distribution of evidence in training data affects retrieval-level bias direction. To test this, we construct synthetic position-targeted training sets in which query-relevant evidence appears at the beginning, middle, or end of documents, and fine-tune eight architecturally diverse pretrained models under position-skewed and balanced training distributions. At the ranking level, we observe a strong directional pattern across the examined models: skewed training distributions favor evidence at the corresponding positions. Position-balanced training reduces positional sensitivity by 57--87\\% on position-aware benchmarks, with competitive mean retrieval performance in our controlled setting. Representation-level
