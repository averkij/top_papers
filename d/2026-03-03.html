    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.00912', 'title': 'VGGT-Det: Mining VGGT Internal Priors for Sensor-Geometry-Free Multi-View Indoor 3D Object Detection', 'url': 'https://huggingface.co/papers/2603.00912', 'abstract': "Abstract VGGT-Det enables sensor-geometry-free multi-view indoor 3D object detection by integrating a Visual Geometry Grounded Transformer encoder with attention-guided query generation and query-driven feature aggregation to effectively utilize semantic and geometric priors.  \t\t\t\t\tAI-generated summary Current multi-view indoor 3D object detectors rely on sensor geometry that is costly to obtain (i.e., precisely calibrated multi-view camera poses) to fuse multi-view information into a global scene representation, limiting deployment in real-world scenes. We target a more practical setting: Sensor-Geometry-Free (SG-Free) multi-view indoor 3D object detection, where there are no sensor-provided geometric inputs (multi-view poses or depth). Recent Visual Geometry Grounded Transformer (VGGT) shows that strong 3D cues can be inferred directly from images. Building on this insight, we present VGGT-Det, the first framework tailored for SG-Free multi-view indoor 3D object detection. Rather than merely consuming VGGT predictions, our method integrates VGGT encoder into a transformer-based pipeline. To effectively leverage both the semantic and geometric priors from inside VGGT, we introduce two novel key components: (i) Attention-Guided Query Generation (AG): exploits VGGT attention maps as semantic priors to initialize object queries, improving localization by focusing on object regions while preserving global spatial structure; (ii) Query-Driven Feature Aggregation (QD): a learnable See-Query interacts with object queries to 'see' what they need, and then dynamically aggregates multi-level geometric features across VGGT layers that progressively lift 2D features into 3D. Experiments show that VGGT-Det significantly surpasses the best-performing method in the SG-Free setting by 4.4 and 8.6 mAP@0.25 on ScanNet and ARKitScenes, respectively. Ablation study shows that VGGT's internally learned semantic and geometric priors can be effectively leveraged by our AG and QD.", 'score': 13, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b4008d0559b71d3a', 'authors': ['Yang Cao', 'Feize Wu', 'Dave Zhenyu Chen', 'Yingji Zhong', 'Lanqing Hong', 'Dan Xu'], 'affiliations': ['Hong Kong University of Science and Technology', 'Huawei', 'Sun Yat-Sen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.00912.jpg', 'data': {'categories': ['#architecture', '#cv', '#3d'], 'emoji': '📐', 'ru': {'title': 'Обнаружение 3D объектов без геометрии датчиков через геометрически обоснованный трансформер', 'desc': 'VGGT-Det представляет первый метод для обнаружения 3D объектов в помещениях на основе множественных видов без информации о калибровке камер. Система интегрирует трансформер Visual Geometry Grounded в конвейер обнаружения, используя семантические и геометрические приоры, извлекаемые непосредственно из изображений. Авторы предложили два ключевых компонента: внимание-управляемую генерацию запросов для инициализации объектных запросов через карты внимания, и запрос-управляемую агрегацию признаков для динамического объединения многоуровневых геометрических признаков. Экспериментальные результаты показывают значительное улучшение по сравнению с существующими методами на датасетах ScanNet и ARKitScenes.'}, 'en': {'title': 'Revolutionizing 3D Object Detection Without Sensor Geometry', 'desc': 'VGGT-Det is a novel framework designed for multi-view indoor 3D object detection without relying on sensor geometry, which is often difficult and expensive to obtain. It utilizes a Visual Geometry Grounded Transformer (VGGT) to infer 3D cues directly from images, allowing for more practical applications in real-world scenarios. The framework introduces two key innovations: Attention-Guided Query Generation, which enhances object localization by focusing on relevant regions, and Query-Driven Feature Aggregation, which dynamically combines geometric features to improve the transition from 2D to 3D. Experimental results demonstrate that VGGT-Det outperforms existing methods in this sensor-geometry-free context, showcasing its effectiveness in leveraging semantic and geometric information.'}, 'zh': {'title': '无传感器几何的室内三维物体检测新突破', 'desc': 'VGGT-Det是一种新型的室内三维物体检测框架，旨在实现无传感器几何信息的多视角检测。该方法结合了视觉几何基础变换器（VGGT）编码器，通过注意力引导的查询生成和查询驱动的特征聚合，有效利用语义和几何先验。与传统方法不同，VGGT-Det不依赖于昂贵的传感器几何输入，而是直接从图像中推断出强大的三维线索。实验结果表明，VGGT-Det在无传感器几何设置下的表现显著优于现有最佳方法。'}}}, {'id': 'https://huggingface.co/papers/2603.00541', 'title': 'Spectral Condition for μP under Width-Depth Scaling', 'url': 'https://huggingface.co/papers/2603.00541', 'abstract': 'Abstract A spectral framework for maximal update parameterization is developed to address stable feature learning and hyperparameter transfer in jointly scaled deep neural networks.  \t\t\t\t\tAI-generated summary Generative foundation models are increasingly scaled in both width and depth, posing significant challenges for stable feature learning and reliable hyperparameter (HP) transfer across model sizes. While maximal update parameterization (μP) has provided a principled solution to both problems for width scaling, existing extensions to the joint width-depth scaling regime remain fragmented, architecture- and optimizer-specific, and often rely on technically involved theories. In this work, we develop a simple and unified spectral framework for μP under joint width-depth scaling. Considering residual networks of varying block depths, we first introduce a spectral μP condition that precisely characterizes how the norms of weights and their per-step updates should scale with width and depth, unifying previously disparate μP formulations as special cases. Building on this condition, we then derive a general recipe for implementing μP across a broad class of optimizers by mapping the spectral constraints to concrete HP parameterizations. This approach not only recovers existing μP formulations (e.g., for SGD and AdamW) but also naturally extends to a wider range of optimizers. Finally, experiments on GPT-2 style language models demonstrate that the proposed spectral μP condition preserves stable feature learning and enables robust HP transfer under width-depth scaling.', 'score': 10, 'issue_id': 1301, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '836b8fa77be8f249', 'authors': ['Chenyu Zheng', 'Rongzhen Wang', 'Xinyu Zhang', 'Chongxuan Li'], 'affiliations': ['ByteDance Seed', 'Gaoling School of AI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00541.jpg', 'data': {'categories': ['#architecture', '#optimization', '#transfer_learning', '#training'], 'emoji': '📈', 'ru': {'title': 'Универсальная спектральная параметризация для стабильного масштабирования глубоких нейросетей', 'desc': 'В работе разработана спектральная основа для параметризации максимального обновления (μP), которая решает проблемы стабильного обучения признаков и переноса гиперпараметров в глубоких нейронных сетях при совместном масштабировании по ширине и глубине. Авторы вводят спектральное условие μP, которое точно описывает, как должны масштабироваться нормы весов и их обновления с изменением размера модели. На основе этого условия они получают универсальный рецепт реализации μP для широкого класса оптимизаторов, включая SGD и AdamW. Экспериментальная проверка на языковых моделях в стиле GPT-2 подтверждает, что предложенный метод сохраняет стабильность обучения признаков и обеспечивает надежный перенос гиперпараметров при масштабировании модели.'}, 'en': {'title': 'Unified Spectral Framework for Stable Deep Learning', 'desc': "This paper presents a new method called spectral maximal update parameterization (μP) to improve feature learning and hyperparameter transfer in deep neural networks that are scaled in both width and depth. The authors identify a specific condition that describes how the weights and their updates should change as the model's architecture varies, which helps unify different approaches to μP. They provide a straightforward way to apply this method across various optimization algorithms, ensuring that it works well with popular ones like SGD and AdamW. Experiments show that this new framework maintains stable learning and effective hyperparameter transfer, even as the model size changes."}, 'zh': {'title': '光谱框架：稳定特征学习与超参数转移的解决方案', 'desc': '本文提出了一种光谱框架，用于最大更新参数化（μP），以解决联合缩放深度神经网络中的稳定特征学习和超参数转移问题。随着生成基础模型在宽度和深度上的不断扩展，稳定特征学习和可靠的超参数转移面临重大挑战。我们引入了一种光谱μP条件，精确描述了权重的范数及其每步更新如何随着宽度和深度进行缩放，从而统一了之前不同的μP公式。通过这一框架，我们能够为多种优化器提供通用的μP实现方案，并在实验中验证了其在宽度-深度缩放下的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.01068', 'title': 'LLaDA-o: An Effective and Length-Adaptive Omni Diffusion Model', 'url': 'https://huggingface.co/papers/2603.01068', 'abstract': 'Abstract LLaDA-o is an omni diffusion model that uses a Mixture of Diffusion framework to jointly handle text understanding and visual generation through a shared attention backbone, achieving state-of-the-art performance in multimodal tasks.  \t\t\t\t\tAI-generated summary We present LLaDA-o, an effective and length-adaptive omni diffusion model for multimodal understanding and generation. LLaDA-o is built on a Mixture of Diffusion (MoD) framework that decouples discrete masked diffusion for text understanding and continuous diffusion for visual generation, while coupling them through a shared, simple, and efficient attention backbone that reduces redundant computation for fixed conditions. Building on MoD, we further introduce a data-centric length adaptation strategy that enables flexible-length decoding in multimodal settings without architectural changes. Extensive experiments show that LLaDA-o achieves state-of-the-art performance among omni-diffusion models on multimodal understanding and generation benchmarks, and reaches 87.04 on DPG-Bench for text-to-image generation, supporting the effectiveness of unified omni diffusion modeling. Code is available at https://github.com/ML-GSAI/LLaDA-o.', 'score': 6, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'cd5b782b5256c0d7', 'authors': ['Zebin You', 'Xiaolu Zhang', 'Jun Zhou', 'Chongxuan Li', 'Ji-Rong Wen'], 'affiliations': ['Ant Group', 'Beijing Key Laboratory of Research on Large Models and Intelligent Governance', 'Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.01068.jpg', 'data': {'categories': ['#open_source', '#architecture', '#multimodal', '#benchmark', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для текста и изображений', 'desc': 'LLaDA-o — это универсальная диффузионная модель, которая использует архитектуру Mixture of Diffusion для совместной обработки понимания текста и генерации изображений через общий механизм внимания. Модель разделяет дискретную маскированную диффузию для работы с текстом и непрерывную диффузию для создания визуального контента, при этом связывая их эффективным общим attention backbone. Введена стратегия адаптации длины, основанная на анализе данных, которая позволяет гибкое декодирование переменной длины в мультимодальных задачах без изменения архитектуры. Модель достигает лучших результатов среди омни-диффузионных моделей на бенчмарках мультимодального понимания и генерации, включая score 87.04 на DPG-Bench для задачи text-to-image.'}, 'en': {'title': 'LLaDA-o: Unifying Text and Image with Efficient Diffusion', 'desc': 'LLaDA-o is a novel omni diffusion model designed for both text understanding and visual generation. It utilizes a Mixture of Diffusion framework that separates the processes for handling text and images while still allowing them to work together efficiently through a shared attention mechanism. This model introduces a length adaptation strategy that allows for flexible decoding of varying lengths in multimodal tasks without needing to change the underlying architecture. The results demonstrate that LLaDA-o achieves top performance in multimodal benchmarks, particularly excelling in text-to-image generation tasks.'}, 'zh': {'title': 'LLaDA-o：多模态理解与生成的全能扩散模型', 'desc': 'LLaDA-o是一种全能扩散模型，采用混合扩散框架，能够同时处理文本理解和视觉生成。它通过共享的注意力骨干网络，将离散的文本扩散和连续的视觉扩散相结合，从而提高了计算效率。该模型还引入了一种以数据为中心的长度适应策略，支持在多模态设置中灵活解码，而无需改变模型结构。实验结果表明，LLaDA-o在多模态理解和生成任务中达到了最先进的性能，特别是在文本到图像生成方面表现优异。'}}}, {'id': 'https://huggingface.co/papers/2602.21320', 'title': 'Tool-R0: Self-Evolving LLM Agents for Tool-Learning from Zero Data', 'url': 'https://huggingface.co/papers/2602.21320', 'abstract': "Abstract Tool-R0 framework enables training general-purpose tool-calling agents through self-play reinforcement learning without initial datasets, achieving significant performance improvements over base models and supervised baselines.  \t\t\t\t\tAI-generated summary Large language models (LLMs) are becoming the foundation for autonomous agents that can use tools to solve complex tasks. Reinforcement learning (RL) has emerged as a common approach for injecting such agentic capabilities, but typically under tightly controlled training setups. It often depends on carefully constructed task-solution pairs and substantial human supervision, which creates a fundamental obstacle to open-ended self-evolution toward superintelligent systems. In this paper, we propose Tool-R0 framework for training general purpose tool-calling agents from scratch with self-play RL, under a zero-data assumption. Initialized from the same base LLM, Tool-R0 co-evolves a Generator and a Solver with complementary rewards: one proposes targeted challenging tasks at the other's competence frontier and the other learns to solve them with real-world tool calls. This creates a self-evolving cycle that requires no pre-existing tasks or datasets. Evaluation on different tool-use benchmarks show that Tool-R0 yields 92.5 relative improvement over the base model and surpasses fully supervised tool-calling baselines under the same setting. Our work further provides empirical insights into self-play LLM agents by analyzing co-evolution, curriculum dynamics, and scaling behavior.", 'score': 4, 'issue_id': 1301, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '432fde60b2011cdc', 'authors': ['Emre Can Acikgoz', 'Cheng Qian', 'Jonas Hübotter', 'Heng Ji', 'Dilek Hakkani-Tür', 'Gokhan Tur'], 'affiliations': ['ETH Zurich', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2602.21320.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#agents', '#benchmark', '#optimization', '#rl'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция агентов через сопэволюционное обучение с подкреплением', 'desc': 'В работе представлена框架 Tool-R0 для обучения универсальных агентов, способных использовать инструменты, через самоигровое обучение с подкреплением без предварительных датасетов. Система состоит из двух сопэволюционирующих компонентов: Генератора, который создаёт сложные задачи на границе компетентности, и Решателя, который их решает, используя реальные инструменты. Этот подход создаёт самоэволюционирующий цикл без необходимости в предварительных наборах задач или человеческого надзора. Экспериментальные результаты показывают, что Tool-R0 достигает улучшения на 92.5% относительно базовой модели и превосходит полностью контролируемые методы обучения инструментальным навыкам.'}, 'en': {'title': 'Empowering Agents: Self-Play Reinforcement Learning Without Data', 'desc': 'The Tool-R0 framework introduces a novel method for training tool-calling agents using self-play reinforcement learning without relying on any initial datasets. It utilizes a dual-agent system, where a Generator creates challenging tasks and a Solver learns to tackle them, fostering a self-evolving cycle. This approach allows the agents to improve their performance significantly, achieving a 92.5% relative improvement over base models. The study also offers insights into the dynamics of co-evolution and the scaling behavior of these agents in various tool-use scenarios.'}, 'zh': {'title': 'Tool-R0：无数据自我演化的工具调用代理训练框架', 'desc': 'Tool-R0框架通过自我对弈强化学习，能够在没有初始数据集的情况下训练通用的工具调用代理。该方法从同一基础大语言模型（LLM）开始，协同进化生成器和求解器，二者通过互补奖励相互促进。生成器提出具有挑战性的任务，而求解器则学习如何使用真实工具来解决这些任务。这种自我演化的循环使得代理能够在没有预先存在的任务或数据集的情况下不断提升性能。'}}}, {'id': 'https://huggingface.co/papers/2602.23906', 'title': 'Half-Truths Break Similarity-Based Retrieval', 'url': 'https://huggingface.co/papers/2602.23906', 'abstract': 'Abstract CLIP-style models exhibit vulnerabilities to half-truths where incorrect details can increase similarity scores, which is addressed through component-supervised fine-tuning that improves compositional understanding.  \t\t\t\t\tAI-generated summary When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '28069c4eb4339107', 'authors': ['Bora Kargi', 'Arnas Uselis', 'Seong Joon Oh'], 'affiliations': ['Konrad Zuse School of Excellence in Learning and Intelligent Systems (ELIZA)', 'University of Tubingen, Tubingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.23906.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение компонентам вместо предложений для понимания деталей в CLIP', 'desc': 'Статья исследует уязвимость моделей CLIP-стиля к полуправдам — ситуациям, когда добавление неправильного деталя к корректному описанию увеличивает схожесть между изображением и текстом. Авторы обнаружили, что контрастивное обучение на полных предложениях не гарантирует правильную привязку отдельных сущностей и отношений. Для решения этой проблемы предложен метод CS-CLIP, который разлагает описания на компоненты (сущности и отношения), создаёт минимально отредактированные контрпримеры и проводит дополнительную настройку модели. Предложенный подход значительно повышает точность на задаче обнаружения полуправд и улучшает общую производительность на бенчмарках композиционного понимания.'}, 'en': {'title': 'Enhancing CLIP: Tackling Half-Truths for Better Compositional Understanding', 'desc': "This paper discusses the vulnerabilities of CLIP-style models to 'half-truths', where adding incorrect details to a text description can misleadingly increase image-text similarity scores. The authors demonstrate that these models often prefer incorrect descriptions over correct ones, particularly when the added detail is a relation. To address this issue, they introduce a method called Component-Supervised CLIP (CS-CLIP), which fine-tunes the model by breaking down captions into individual entities and relations. This approach significantly improves the model's accuracy in identifying half-truths and enhances its overall compositional understanding."}, 'zh': {'title': '提升组合理解，减少半真相错误', 'desc': 'CLIP风格的模型在处理半真相时存在脆弱性，即错误的细节可能会提高相似度分数。我们提出了CS-CLIP（组件监督CLIP），通过将描述分解为实体和关系单元，并对模型进行微调，以确保正确的单元得分高于错误的单元。实验表明，CS-CLIP将半真相的准确率提高到69.3%，并在组合基准测试中平均提高了5.7分。这表明减少半真相错误有助于提升模型的组合理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.01710', 'title': 'Legal RAG Bench: an end-to-end benchmark for legal RAG', 'url': 'https://huggingface.co/papers/2603.01710', 'abstract': "Abstract Legal RAG Bench evaluates legal retrieval-augmented generation systems using a comprehensive dataset and factorial analysis, revealing that information retrieval significantly impacts performance more than language model capabilities.  \t\t\t\t\tAI-generated summary We introduce Legal RAG Bench, a benchmark and evaluation methodology for assessing the end-to-end performance of legal RAG systems. As a benchmark, Legal RAG Bench consists of 4,876 passages from the Victorian Criminal Charge Book alongside 100 complex, hand-crafted questions demanding expert knowledge of criminal law and procedure. Both long-form answers and supporting passages are provided. As an evaluation methodology, Legal RAG Bench leverages a full factorial design and novel hierarchical error decomposition framework, enabling apples-to-apples comparisons of the contributions of retrieval and reasoning models in RAG. We evaluate three state-of-the-art embedding models (Isaacus' Kanon 2 Embedder, Google's Gemini Embedding 001, and OpenAI's Text Embedding 3 Large) and two frontier LLMs (Gemini 3.1 Pro and GPT-5.2), finding that information retrieval is the primary driver of legal RAG performance, with LLMs exerting a more moderate effect on correctness and groundedness. Kanon 2 Embedder, in particular, had the largest positive impact on performance, improving average correctness by 17.5 points, groundedness by 4.5 points, and retrieval accuracy by 34 points. We observe that many errors attributed to hallucinations in legal RAG systems are in fact triggered by retrieval failures, concluding that retrieval sets the ceiling for the performance of many modern legal RAG systems. We document why and how we built Legal RAG Bench alongside the results of our evaluations. We also openly release our code and data to assist with reproduction of our findings.", 'score': 1, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '472dd4e171fb9d5d', 'authors': ['Abdur-Rahman Butler', 'Umar Butler'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.01710.jpg', 'data': {'categories': ['#open_source', '#dataset', '#hallucinations', '#benchmark', '#science', '#rag'], 'emoji': '⚖️', 'ru': {'title': 'Поиск информации — ключ к успеху юридических RAG систем', 'desc': 'В работе представлена Legal RAG Bench — контрольный набор данных и методология оценки для систем извлечения и генерации текста в юридической области, состоящая из 4876 отрывков уголовного права и 100 сложных вопросов, требующих экспертных знаний. Авторы использовали полнофакторный анализ и иерархическую декомпозицию ошибок для сравнения вклада компонентов поиска информации и языковых моделей в итоговую производительность системы. Результаты показывают, что качество поиска документов имеет значительно большее влияние на точность ответов, чем способности современных LLM-моделей, таких как Gemini 3.1 Pro и GPT-5.2. Исследование демонстрирует, что многие ошибки, приписываемые генерации галлюцинаций, на самом деле вызваны неудачами в компоненте поиска, что указывает на необходимость фокусировки на улучшении информационного поиска в RAG-системах.'}, 'en': {'title': 'Retrieval is Key: Unlocking Legal RAG Performance', 'desc': 'The paper introduces Legal RAG Bench, a benchmark designed to evaluate legal retrieval-augmented generation (RAG) systems. It highlights the importance of information retrieval in determining the performance of these systems, showing that retrieval capabilities outweigh the influence of language model (LLM) abilities. The study uses a dataset of 4,876 legal passages and 100 complex questions to assess various embedding models and LLMs, revealing that retrieval failures often lead to errors in generated responses. The findings emphasize that improving retrieval mechanisms can significantly enhance the overall effectiveness of legal RAG systems.'}, 'zh': {'title': '检索驱动法律生成系统的性能', 'desc': '本文介绍了Legal RAG Bench，这是一个用于评估法律检索增强生成系统的基准和评估方法。该基准包含4876个来自维多利亚刑事起诉书的段落，以及100个需要刑法和程序专家知识的复杂问题。研究发现，信息检索对法律RAG系统的性能影响显著，远超过语言模型的能力。通过评估不同的嵌入模型和大型语言模型，结果表明检索的准确性是影响法律RAG系统表现的主要因素。'}}}, {'id': 'https://huggingface.co/papers/2602.23952', 'title': 'CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2602.23952', 'abstract': 'Abstract CC-VQA addresses knowledge conflicts in visual question answering by incorporating visual-semantic conflict analysis and correlation-guided encoding-decoding mechanisms without requiring model retraining.  \t\t\t\t\tAI-generated summary Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose CC-VQA: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.', 'score': 1, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '826a23c6d1575458', 'authors': ['Yuyang Hong', 'Jiaqi Gu', 'Yujin Lou', 'Lubin Fan', 'Qi Yang', 'Ying Wang', 'Kun Ding', 'Yue Wu', 'Shiming Xiang', 'Jieping Ye'], 'affiliations': ['Alibaba Cloud Computing', 'MAIS, Institute of Automation', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2602.23952.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv'], 'emoji': '🤝', 'ru': {'title': 'Разрешение конфликтов знаний в визуальном ответе на вопросы без переобучения', 'desc': 'В этой работе предлагается метод CC-VQA для решения проблемы конфликтов знаний в системах визуального ответа на вопросы. Основная идея заключается в анализе визуально-семантических конфликтов между статическими знаниями, хранящимися в параметрах модели, и динамически извлекаемой информацией. Метод использует два ключевых компонента: анализ конфликтов на основе визуальной информации и корреляционно-управляемые механизмы кодирования-декодирования. Важное преимущество подхода в том, что он не требует переобучения модели и достигает улучшения точности на 3,3-6,4% по сравнению с существующими методами.'}, 'en': {'title': 'Resolving Knowledge Conflicts in Visual Question Answering', 'desc': 'CC-VQA is a novel approach to improve knowledge-based visual question answering (KB-VQA) by addressing conflicts between static knowledge in vision language models and dynamically retrieved information. It introduces two main components: Vision-Centric Contextual Conflict Reasoning, which analyzes conflicts between visual and semantic knowledge, and Correlation-Guided Encoding and Decoding, which optimizes how information is processed based on its relevance. This method does not require retraining the model, making it efficient and practical. Evaluations show that CC-VQA significantly enhances accuracy on various benchmarks, outperforming existing techniques.'}, 'zh': {'title': '解决视觉问答中的知识冲突', 'desc': 'CC-VQA是一种新颖的视觉问答方法，旨在解决知识冲突问题。它通过视觉-语义冲突分析和相关性引导的编码解码机制来处理动态检索信息与静态模型知识之间的矛盾，而无需重新训练模型。该方法的两个核心组件分别是视觉中心的上下文冲突推理和相关性引导的编码解码，能够有效识别和缓解冲突。经过在多个基准测试上的评估，CC-VQA在准确性上显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.01562', 'title': 'RubricBench: Aligning Model-Generated Rubrics with Human Standards', 'url': 'https://huggingface.co/papers/2603.01562', 'abstract': 'Abstract RubricBench is introduced as a benchmark for evaluating rubric-guided reward models in large language model alignment, addressing the lack of discriminative complexity and ground-truth annotations in existing benchmarks.  \t\t\t\t\tAI-generated summary As Large Language Model (LLM) alignment evolves from simple completions to complex, highly sophisticated generation, Reward Models are increasingly shifting toward rubric-guided evaluation to mitigate surface-level biases. However, the community lacks a unified benchmark to assess this evaluation paradigm, as existing benchmarks lack both the discriminative complexity and the ground-truth rubric annotations required for rigorous analysis. To bridge this gap, we introduce RubricBench, a curated benchmark with 1,147 pairwise comparisons specifically designed to assess the reliability of rubric-based evaluation. Our construction employs a multi-dimensional filtration pipeline to target hard samples featuring nuanced input complexity and misleading surface bias, augmenting each with expert-annotated, atomic rubrics derived strictly from instructions. Comprehensive experiments reveal a substantial capability gap between human-annotated and model-generated rubrics, indicating that even state-of-the-art models struggle to autonomously specify valid evaluation criteria, lagging considerably behind human-guided performance.', 'score': 0, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '17f186c0a37a9ac4', 'authors': ['Qiyuan Zhang', 'Junyi Zhou', 'Yufei Wang', 'Fuyuan Lyu', 'Yidong Ming', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Peng Kang', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'McGill - Mila & Quebec AI Institute', 'Tencent Hunyuan', 'University of Illinois Springfield'], 'pdf_title_img': 'assets/pdf/title_img/2603.01562.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#dataset', '#benchmark', '#alignment'], 'emoji': '📏', 'ru': {'title': 'Когда машины не могут оценивать сами: о важности человеческих рубрик', 'desc': 'RubricBench — это новый бенчмарк для оценки моделей вознаграждения, которые используют рубрики при выравнивании больших языковых моделей. Авторы выявили проблему: существующие бенчмарки не содержат достаточно сложных примеров для различения и не имеют аннотаций истинных рубрик. Они создали набор из 1147 парных сравнений с тщательно отобранными сложными случаями и экспертными аннотациями атомарных рубрик. Результаты показывают значительный разрыв между человеческими и автоматически генерируемыми рубриками, демонстрируя, что даже передовые модели не могут самостоятельно задавать валидные критерии оценки.'}, 'en': {'title': 'RubricBench: Elevating LLM Evaluation with Expert Annotations', 'desc': 'RubricBench is a new benchmark designed to evaluate rubric-guided reward models for aligning large language models (LLMs). It addresses the shortcomings of existing benchmarks by providing a set of 1,147 pairwise comparisons that include complex and nuanced examples. The benchmark uses expert-annotated rubrics to ensure high-quality evaluations, focusing on challenging samples that reveal biases in model outputs. Experiments show that current models still fall short in generating effective evaluation criteria compared to human annotations, highlighting the need for improved alignment techniques.'}, 'zh': {'title': 'RubricBench：提升语言模型对齐的评估标准', 'desc': 'RubricBench是一个新的基准，用于评估在大型语言模型对齐中基于评分标准的奖励模型。现有的基准缺乏足够的区分复杂性和真实的评分标准注释，无法进行严格的分析。RubricBench包含1147个成对比较，旨在评估基于评分标准的评估的可靠性。实验结果显示，人工注释的评分标准与模型生成的评分标准之间存在显著差距，表明即使是最先进的模型也难以独立指定有效的评估标准。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (1)', '#agi', '#alignment (1)', '#architecture (3)', '#audio', '#benchmark (6)', '#cv (2)', '#data', '#dataset (2)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (3)', '#open_source (4)', '#optimization (2)', '#plp', '#rag (1)', '#reasoning (1)', '#rl (1)', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (2)', '#transfer_learning (1)', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-03 04:08',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-03 04:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-03 04:08')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
