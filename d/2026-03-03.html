    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.00141', 'title': 'From Scale to Speed: Adaptive Test-Time Scaling for Image Editing', 'url': 'https://huggingface.co/papers/2603.00141', 'abstract': 'Abstract Image-CoT methods are extended to image editing with ADE-CoT, which improves efficiency and performance through adaptive resource allocation, edit-specific verification, and opportunistic stopping mechanisms.  \t\t\t\t\tAI-generated summary Image Chain-of-Thought (Image-CoT) is a test-time scaling paradigm that improves image generation by extending inference time. Most Image-CoT methods focus on text-to-image (T2I) generation. Unlike T2I generation, image editing is goal-directed: the solution space is constrained by the source image and instruction. This mismatch causes three challenges when applying Image-CoT to editing: inefficient resource allocation with fixed sampling budgets, unreliable early-stage verification using general MLLM scores, and redundant edited results from large-scale sampling. To address this, we propose ADaptive Edit-CoT (ADE-CoT), an on-demand test-time scaling framework to enhance editing efficiency and performance. It incorporates three key strategies: (1) a difficulty-aware resource allocation that assigns dynamic budgets based on estimated edit difficulty; (2) edit-specific verification in early pruning that uses region localization and caption consistency to select promising candidates; and (3) depth-first opportunistic stopping, guided by an instance-specific verifier, that terminates when intent-aligned results are found. Extensive experiments on three SOTA editing models (Step1X-Edit, BAGEL, FLUX.1 Kontext) across three benchmarks show that ADE-CoT achieves superior performance-efficiency trade-offs. With comparable sampling budgets, ADE-CoT obtains better performance with more than 2x speedup over Best-of-N.', 'score': 79, 'issue_id': 1304, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '213ff551a52eaa7d', 'authors': ['Xiangyan Qu', 'Zhenlong Yuan', 'Jing Tang', 'Rui Chen', 'Datao Tang', 'Meng Yu', 'Lei Sun', 'Yancheng Bai', 'Xiangxiang Chu', 'Gaopeng Gou', 'Gang Xiong', 'Yujun Cai'], 'affiliations': ['AMAP, Alibaba Group', 'Institute of Information Engineering, Chinese Academy of Sciences', 'School of Cyber Security, University of Chinese Academy of Sciences', 'University of Queensland'], 'pdf_title_img': 'assets/pdf/title_img/2603.00141.jpg', 'data': {'categories': ['#inference', '#benchmark', '#optimization', '#cv'], 'emoji': '✏️', 'ru': {'title': 'Умное редактирование: адаптивное распределение ресурсов для быстрого редактирования изображений', 'desc': 'Статья представляет ADE-CoT — адаптивный фреймворк для масштабирования на этапе тестирования, расширяющий методологию Image Chain-of-Thought на задачу редактирования изображений. В отличие от текстово-изобразительной генерации, редактирование изображений является целенаправленной задачей с ограниченным пространством решений, что требует специализированного подхода к распределению вычислительных ресурсов. Предложенный метод использует три ключевых стратегии: адаптивное выделение ресурсов на основе сложности редактирования, верификацию на основе редактируемых регионов и согласованности подписей, а также ранняя остановка с помощью специфичного для примера верификатора. Экспериментальные результаты на трёх современных моделях редактирования и трёх бенчмарках демонстрируют улучшение производительности более чем в 2 раза при сохранении качества.'}, 'en': {'title': 'Enhancing Image Editing Efficiency with ADE-CoT', 'desc': 'The paper introduces ADE-CoT, a novel framework designed to enhance image editing efficiency and performance by adapting resource allocation during the editing process. It addresses challenges faced by traditional Image-CoT methods, which are primarily focused on text-to-image generation, by implementing dynamic resource allocation based on the difficulty of the edits. Additionally, it employs edit-specific verification techniques to ensure that only the most promising edits are pursued, thereby reducing redundancy. Finally, the framework incorporates an opportunistic stopping mechanism that allows the process to terminate early when satisfactory results are achieved, leading to significant improvements in speed and effectiveness.'}, 'zh': {'title': '自适应编辑链式思维：提升图像编辑效率的创新方法', 'desc': '本文提出了一种名为自适应编辑链式思维（ADE-CoT）的方法，旨在提高图像编辑的效率和性能。该方法通过动态资源分配、特定编辑验证和机会性停止机制来解决图像编辑中的挑战。与传统的文本到图像生成不同，图像编辑是目标导向的，因此需要根据源图像和指令来限制解决方案空间。实验结果表明，ADE-CoT在多个基准测试中表现出色，能够在相同的采样预算下实现超过2倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2603.02138', 'title': 'OmniLottie: Generating Vector Animations via Parameterized Lottie Tokens', 'url': 'https://huggingface.co/papers/2603.02138', 'abstract': 'Abstract OmniLottie framework generates high-quality vector animations from multi-modal instructions using a specialized Lottie tokenizer and pretrained vision-language models.  \t\t\t\t\tAI-generated summary OmniLottie is a versatile framework that generates high quality vector animations from multi-modal instructions. For flexible motion and visual content control, we focus on Lottie, a light weight JSON formatting for both shapes and animation behaviors representation. However, the raw Lottie JSON files contain extensive invariant structural metadata and formatting tokens, posing significant challenges for learning vector animation generation. Therefore, we introduce a well designed Lottie tokenizer that transforms JSON files into structured sequences of commands and parameters representing shapes, animation functions and control parameters. Such tokenizer enables us to build OmniLottie upon pretrained vision language models to follow multi-modal interleaved instructions and generate high quality vector animations. To further advance research in vector animation generation, we curate MMLottie-2M, a large scale dataset of professionally designed vector animations paired with textual and visual annotations. With extensive experiments, we validate that OmniLottie can produce vivid and semantically aligned vector animations that adhere closely to multi modal human instructions.', 'score': 77, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'e5ad60e03fbafba9', 'authors': ['Yiying Yang', 'Wei Cheng', 'Sijin Chen', 'Honghao Fu', 'Xianfang Zeng', 'Yujun Cai', 'Gang Yu', 'Xingjun Ma'], 'affiliations': ['MMLab, The Chinese University of Hong Kong', 'Nanyang Technological University', 'SenseTime Research', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02138.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#dataset'], 'emoji': '✨', 'ru': {'title': 'От инструкций к движению: генерация векторных анимаций через мультимодальное понимание', 'desc': 'OmniLottie — это фреймворк для генерации векторных анимаций из мультимодальных инструкций, который использует специализированный Lottie-токенизатор для преобразования JSON-файлов в структурированные последовательности команд и параметров. На основе предобученных vision-language моделей система может обрабатывать текстовые и визуальные инструкции одновременно для создания высококачественных анимаций. Исследователи создали крупномасштабный датасет MMLottie-2M, содержащий профессионально разработанные векторные анимации с текстовыми и визуальными аннотациями. Эксперименты демонстрируют, что OmniLottie успешно генерирует семантически согласованные анимации, которые точно соответствуют мультимодальным инструкциям пользователя.'}, 'en': {'title': 'Transforming Instructions into Stunning Vector Animations', 'desc': 'OmniLottie is a framework designed to create high-quality vector animations from various types of instructions. It utilizes a specialized tokenizer to convert complex Lottie JSON files into manageable sequences that represent shapes and animation behaviors. By leveraging pretrained vision-language models, OmniLottie can interpret and execute multi-modal instructions effectively. Additionally, the framework is supported by a large dataset, MMLottie-2M, which enhances its ability to generate animations that are both visually appealing and semantically accurate.'}, 'zh': {'title': 'OmniLottie：多模态指令下的高质量矢量动画生成', 'desc': 'OmniLottie框架能够根据多模态指令生成高质量的矢量动画。我们专注于Lottie，这是一种轻量级的JSON格式，用于表示形状和动画行为。为了克服原始Lottie JSON文件中复杂的结构元数据和格式化标记带来的挑战，我们设计了一种Lottie分词器，将JSON文件转换为结构化的命令和参数序列。通过使用预训练的视觉语言模型，OmniLottie能够根据多模态指令生成生动且语义一致的矢量动画。'}}}, {'id': 'https://huggingface.co/papers/2603.01562', 'title': 'RubricBench: Aligning Model-Generated Rubrics with Human Standards', 'url': 'https://huggingface.co/papers/2603.01562', 'abstract': 'Abstract RubricBench is introduced as a benchmark for evaluating rubric-guided reward models in large language model alignment, addressing the lack of discriminative complexity and ground-truth annotations in existing benchmarks.  \t\t\t\t\tAI-generated summary As Large Language Model (LLM) alignment evolves from simple completions to complex, highly sophisticated generation, Reward Models are increasingly shifting toward rubric-guided evaluation to mitigate surface-level biases. However, the community lacks a unified benchmark to assess this evaluation paradigm, as existing benchmarks lack both the discriminative complexity and the ground-truth rubric annotations required for rigorous analysis. To bridge this gap, we introduce RubricBench, a curated benchmark with 1,147 pairwise comparisons specifically designed to assess the reliability of rubric-based evaluation. Our construction employs a multi-dimensional filtration pipeline to target hard samples featuring nuanced input complexity and misleading surface bias, augmenting each with expert-annotated, atomic rubrics derived strictly from instructions. Comprehensive experiments reveal a substantial capability gap between human-annotated and model-generated rubrics, indicating that even state-of-the-art models struggle to autonomously specify valid evaluation criteria, lagging considerably behind human-guided performance.', 'score': 30, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '17f186c0a37a9ac4', 'authors': ['Qiyuan Zhang', 'Junyi Zhou', 'Yufei Wang', 'Fuyuan Lyu', 'Yidong Ming', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Peng Kang', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'McGill - Mila & Quebec AI Institute', 'Tencent Hunyuan', 'University of Illinois Springfield'], 'pdf_title_img': 'assets/pdf/title_img/2603.01562.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#dataset', '#benchmark', '#alignment'], 'emoji': '📏', 'ru': {'title': 'Когда машины не могут оценивать сами: о важности человеческих рубрик', 'desc': 'RubricBench — это новый бенчмарк для оценки моделей вознаграждения, которые используют рубрики при выравнивании больших языковых моделей. Авторы выявили проблему: существующие бенчмарки не содержат достаточно сложных примеров для различения и не имеют аннотаций истинных рубрик. Они создали набор из 1147 парных сравнений с тщательно отобранными сложными случаями и экспертными аннотациями атомарных рубрик. Результаты показывают значительный разрыв между человеческими и автоматически генерируемыми рубриками, демонстрируя, что даже передовые модели не могут самостоятельно задавать валидные критерии оценки.'}, 'en': {'title': 'RubricBench: Elevating LLM Evaluation with Expert Annotations', 'desc': 'RubricBench is a new benchmark designed to evaluate rubric-guided reward models for aligning large language models (LLMs). It addresses the shortcomings of existing benchmarks by providing a set of 1,147 pairwise comparisons that include complex and nuanced examples. The benchmark uses expert-annotated rubrics to ensure high-quality evaluations, focusing on challenging samples that reveal biases in model outputs. Experiments show that current models still fall short in generating effective evaluation criteria compared to human annotations, highlighting the need for improved alignment techniques.'}, 'zh': {'title': 'RubricBench：提升语言模型对齐的评估标准', 'desc': 'RubricBench是一个新的基准，用于评估在大型语言模型对齐中基于评分标准的奖励模型。现有的基准缺乏足够的区分复杂性和真实的评分标准注释，无法进行严格的分析。RubricBench包含1147个成对比较，旨在评估基于评分标准的评估的可靠性。实验结果显示，人工注释的评分标准与模型生成的评分标准之间存在显著差距，表明即使是最先进的模型也难以独立指定有效的评估标准。'}}}, {'id': 'https://huggingface.co/papers/2603.00912', 'title': 'VGGT-Det: Mining VGGT Internal Priors for Sensor-Geometry-Free Multi-View Indoor 3D Object Detection', 'url': 'https://huggingface.co/papers/2603.00912', 'abstract': "Abstract VGGT-Det enables sensor-geometry-free multi-view indoor 3D object detection by integrating a Visual Geometry Grounded Transformer encoder with attention-guided query generation and query-driven feature aggregation to effectively utilize semantic and geometric priors.  \t\t\t\t\tAI-generated summary Current multi-view indoor 3D object detectors rely on sensor geometry that is costly to obtain (i.e., precisely calibrated multi-view camera poses) to fuse multi-view information into a global scene representation, limiting deployment in real-world scenes. We target a more practical setting: Sensor-Geometry-Free (SG-Free) multi-view indoor 3D object detection, where there are no sensor-provided geometric inputs (multi-view poses or depth). Recent Visual Geometry Grounded Transformer (VGGT) shows that strong 3D cues can be inferred directly from images. Building on this insight, we present VGGT-Det, the first framework tailored for SG-Free multi-view indoor 3D object detection. Rather than merely consuming VGGT predictions, our method integrates VGGT encoder into a transformer-based pipeline. To effectively leverage both the semantic and geometric priors from inside VGGT, we introduce two novel key components: (i) Attention-Guided Query Generation (AG): exploits VGGT attention maps as semantic priors to initialize object queries, improving localization by focusing on object regions while preserving global spatial structure; (ii) Query-Driven Feature Aggregation (QD): a learnable See-Query interacts with object queries to 'see' what they need, and then dynamically aggregates multi-level geometric features across VGGT layers that progressively lift 2D features into 3D. Experiments show that VGGT-Det significantly surpasses the best-performing method in the SG-Free setting by 4.4 and 8.6 mAP@0.25 on ScanNet and ARKitScenes, respectively. Ablation study shows that VGGT's internally learned semantic and geometric priors can be effectively leveraged by our AG and QD.", 'score': 27, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b4008d0559b71d3a', 'authors': ['Yang Cao', 'Feize Wu', 'Dave Zhenyu Chen', 'Yingji Zhong', 'Lanqing Hong', 'Dan Xu'], 'affiliations': ['Hong Kong University of Science and Technology', 'Huawei', 'Sun Yat-Sen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.00912.jpg', 'data': {'categories': ['#architecture', '#cv', '#3d'], 'emoji': '📐', 'ru': {'title': 'Обнаружение 3D объектов без геометрии датчиков через геометрически обоснованный трансформер', 'desc': 'VGGT-Det представляет первый метод для обнаружения 3D объектов в помещениях на основе множественных видов без информации о калибровке камер. Система интегрирует трансформер Visual Geometry Grounded в конвейер обнаружения, используя семантические и геометрические приоры, извлекаемые непосредственно из изображений. Авторы предложили два ключевых компонента: внимание-управляемую генерацию запросов для инициализации объектных запросов через карты внимания, и запрос-управляемую агрегацию признаков для динамического объединения многоуровневых геометрических признаков. Экспериментальные результаты показывают значительное улучшение по сравнению с существующими методами на датасетах ScanNet и ARKitScenes.'}, 'en': {'title': 'Revolutionizing 3D Object Detection Without Sensor Geometry', 'desc': 'VGGT-Det is a novel framework designed for multi-view indoor 3D object detection without relying on sensor geometry, which is often difficult and expensive to obtain. It utilizes a Visual Geometry Grounded Transformer (VGGT) to infer 3D cues directly from images, allowing for more practical applications in real-world scenarios. The framework introduces two key innovations: Attention-Guided Query Generation, which enhances object localization by focusing on relevant regions, and Query-Driven Feature Aggregation, which dynamically combines geometric features to improve the transition from 2D to 3D. Experimental results demonstrate that VGGT-Det outperforms existing methods in this sensor-geometry-free context, showcasing its effectiveness in leveraging semantic and geometric information.'}, 'zh': {'title': '无传感器几何的室内三维物体检测新突破', 'desc': 'VGGT-Det是一种新型的室内三维物体检测框架，旨在实现无传感器几何信息的多视角检测。该方法结合了视觉几何基础变换器（VGGT）编码器，通过注意力引导的查询生成和查询驱动的特征聚合，有效利用语义和几何先验。与传统方法不同，VGGT-Det不依赖于昂贵的传感器几何输入，而是直接从图像中推断出强大的三维线索。实验结果表明，VGGT-Det在无传感器几何设置下的表现显著优于现有最佳方法。'}}}, {'id': 'https://huggingface.co/papers/2603.02024', 'title': 'MMR-Life: Piecing Together Real-life Scenes for Multimodal Multi-image Reasoning', 'url': 'https://huggingface.co/papers/2603.02024', 'abstract': "Abstract MMR-Life benchmark evaluates multimodal large language models' reasoning capabilities across real-life scenarios using diverse multimodal multi-image questions.  \t\t\t\t\tAI-generated summary Recent progress in the reasoning capabilities of multimodal large language models (MLLMs) has empowered them to address more complex tasks such as scientific analysis and mathematical reasoning. Despite their promise, MLLMs' reasoning abilities across different scenarios in real life remain largely unexplored and lack standardized benchmarks for evaluation. To address this gap, we introduce MMR-Life, a comprehensive benchmark designed to evaluate the diverse multimodal multi-image reasoning capabilities of MLLMs across real-life scenarios. MMR-Life consists of 2,646 multiple-choice questions based on 19,108 images primarily sourced from real-world contexts, comprehensively covering seven reasoning types: abductive, analogical, causal, deductive, inductive, spatial, and temporal. Unlike existing reasoning benchmarks, MMR-Life does not rely on domain-specific expertise but instead requires models to integrate information across multiple images and apply diverse reasoning abilities. The evaluation of 37 advanced models highlights the substantial challenge posed by MMR-Life. Even top models like GPT-5 achieve only 58% accuracy and display considerable variance in performance across reasoning types. Moreover, we analyze the reasoning paradigms of existing MLLMs, exploring how factors such as thinking length, reasoning method, and reasoning type affect their performance. In summary, MMR-Life establishes a comprehensive foundation for evaluating, analyzing, and improving the next generation of multimodal reasoning systems.", 'score': 21, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '0917cc95793f30df', 'authors': ['Jiachun Li', 'Shaoping Huang', 'Zhuoran Jin', 'Chenlong Zhang', 'Pengfei Cao', 'Yubo Chen', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Advanced Interdisciplinary Sciences, University of Chinese Academy of Sciences', 'School of Artificial Intelligence, University of Chinese Academy of Sciences', 'The Key Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.02024.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Многомодальное логическое рассуждение: бенчмарк для оценки моделей в реальных ситуациях', 'desc': 'Авторы представляют MMR-Life — комплексный бенчмарк для оценки способностей многомодальных больших языковых моделей к логическому рассуждению в реальных сценариях. Бенчмарк содержит 2646 вопросов с множественным выбором, основанных на 19 108 изображениях из реальных контекстов, покрывая семь типов рассуждений: абдуктивное, аналогичное, причинное, дедуктивное, индуктивное, пространственное и временное. Исследование 37 продвинутых моделей показало, что даже лучшие модели вроде GPT-5 достигают только 58% точности и демонстрируют значительную вариативность результатов в зависимости от типа рассуждения. Анализ парадигм рассуждений в современных MLLM выявил, как длина рассуждений, методология и тип задачи влияют на производительность моделей.'}, 'en': {'title': 'MMR-Life: A New Benchmark for Real-World Multimodal Reasoning', 'desc': 'The MMR-Life benchmark is designed to assess the reasoning capabilities of multimodal large language models (MLLMs) in real-life situations. It includes 2,646 multiple-choice questions based on a diverse set of 19,108 images, covering various reasoning types such as abductive and deductive reasoning. This benchmark allows for a standardized evaluation of MLLMs without requiring domain-specific knowledge, focusing instead on their ability to integrate information from multiple images. The results show that even advanced models struggle with this benchmark, achieving only 58% accuracy, highlighting the need for further development in multimodal reasoning systems.'}, 'zh': {'title': 'MMR-Life：评估多模态推理能力的新基准', 'desc': 'MMR-Life基准测试评估多模态大型语言模型在现实场景中的推理能力，使用多样化的多图像问题。该基准包含2646个多项选择题，基于19108张主要来自现实世界的图像，涵盖七种推理类型。与现有的推理基准不同，MMR-Life不依赖于特定领域的专业知识，而是要求模型整合多张图像的信息并应用多种推理能力。通过对37个先进模型的评估，MMR-Life展示了显著的挑战，即使是顶尖模型如GPT-5的准确率也仅为58%。'}}}, {'id': 'https://huggingface.co/papers/2603.00889', 'title': 'CHIMERA: Compact Synthetic Data for Generalizable LLM Reasoning', 'url': 'https://huggingface.co/papers/2603.00889', 'abstract': "Abstract A synthetic reasoning dataset called CHIMERA is introduced to overcome data-centric challenges in training large language models for cross-domain reasoning, achieving performance comparable to much larger models.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) have recently exhibited remarkable reasoning capabilities, largely enabled by supervised fine-tuning (SFT)- and reinforcement learning (RL)-based post-training on high-quality reasoning data. However, reproducing and extending these capabilities in open and scalable settings is hindered by three fundamental data-centric challenges: (1) the cold-start problem, arising from the lack of seed datasets with detailed, long Chain-of-Thought (CoT) trajectories needed to initialize reasoning policies; (2) limited domain coverage, as most existing open-source reasoning datasets are concentrated in mathematics, with limited coverage of broader scientific disciplines; and (3) the annotation bottleneck, where the difficulty of frontier-level reasoning tasks makes reliable human annotation prohibitively expensive or infeasible. To address these challenges, we introduce CHIMERA, a compact synthetic reasoning dataset comprising 9K samples for generalizable cross-domain reasoning. CHIMERA is constructed with three key properties: (1) it provides rich, long CoT reasoning trajectories synthesized by state-of-the-art reasoning models; (2) it has broad and structured coverage, spanning 8 major scientific disciplines and over 1K fine-grained topics organized via a model-generated hierarchical taxonomy; and (3) it employs a fully automated, scalable evaluation pipeline that uses strong reasoning models to cross-validate both problem validity and answer correctness. We use CHIMERA to post-train a 4B Qwen3 model. Despite the dataset's modest size, the resulting model achieves strong performance on a suite of challenging reasoning benchmarks, including GPQA-Diamond, AIME 24/25/26, HMMT 25, and Humanity's Last Exam, approaching or matching the reasoning performance of substantially larger models such as DeepSeek-R1 and Qwen3-235B.", 'score': 16, 'issue_id': 1303, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'be499a198cd32730', 'authors': ['Xinyu Zhu', 'Yihao Feng', 'Yanchao Sun', 'Xianzhi Du', 'Pingzhi Li', 'Olli Saarikivi', 'Yun Zhu', 'Yu Meng'], 'affiliations': ['Apple, Cupertino, CA, USA', 'Department of Computer Science, University of North Carolina at Chapel Hill, Chapel Hill, NC, USA', 'Department of Computer Science, University of Virginia, Charlottesville, VA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.00889.jpg', 'data': {'categories': ['#training', '#reasoning', '#math', '#science', '#open_source', '#small_models', '#dataset', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Синтетические данные для умного рассуждения: мало примеров, большие результаты', 'desc': 'В статье представлен синтетический датасет CHIMERA, содержащий 9000 примеров для обучения больших языковых моделей кроссдоменному рассуждению. Датасет решает три ключевые проблемы: холодный старт без начальных данных с подробными цепочками рассуждений (CoT), ограниченное покрытие доменов (в основном только математика) и дороговизну человеческой аннотации. CHIMERA включает богатые синтетические траектории рассуждений, охватывает 8 научных дисциплин с иерархической таксономией и использует автоматизированный конвейер валидации с помощью сильных моделей. Модель Qwen3 размером 4B, обученная на CHIMERA, достигает производительности, сравнимой с гораздо более крупными моделями типа DeepSeek-R1 и Qwen3-235B на сложных бенчмарках.'}, 'en': {'title': 'CHIMERA: Bridging Data Gaps for Enhanced Reasoning in LLMs', 'desc': "The paper introduces CHIMERA, a synthetic reasoning dataset designed to enhance the training of large language models (LLMs) for cross-domain reasoning tasks. It addresses key challenges such as the cold-start problem, limited domain coverage, and the annotation bottleneck by providing 9,000 samples with rich, long Chain-of-Thought (CoT) trajectories across eight scientific disciplines. CHIMERA's automated evaluation pipeline ensures the validity and correctness of problems and answers, making it scalable for future use. The dataset enables a 4B Qwen3 model to achieve competitive reasoning performance, comparable to much larger models, demonstrating its effectiveness in improving LLM capabilities."}, 'zh': {'title': 'CHIMERA：跨领域推理的新突破', 'desc': '本文介绍了一种名为CHIMERA的合成推理数据集，旨在解决训练大型语言模型在跨领域推理中的数据中心挑战。CHIMERA包含9000个样本，具有丰富的长链推理轨迹，覆盖8个主要科学领域和1000多个细分主题。该数据集通过自动化评估管道，确保问题有效性和答案正确性。尽管数据集规模较小，使用CHIMERA后训练的4B Qwen3模型在多个推理基准测试中表现出色，接近或匹配更大模型的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2603.01940', 'title': 'CoVe: Training Interactive Tool-Use Agents via Constraint-Guided Verification', 'url': 'https://huggingface.co/papers/2603.01940', 'abstract': 'Abstract CoVe is a post-training data synthesis framework that generates high-quality training trajectories for interactive tool-use agents by incorporating task constraints as verification mechanisms, achieving superior performance compared to baseline models.  \t\t\t\t\tAI-generated summary Developing multi-turn interactive tool-use agents is challenging because real-world user needs are often complex and ambiguous, yet agents must execute deterministic actions to satisfy them. To address this gap, we introduce CoVe (Constraint-Verification), a post-training data synthesis framework designed for training interactive tool-use agents while ensuring both data complexity and correctness. CoVe begins by defining explicit task constraints, which serve a dual role: they guide the generation of complex trajectories and act as deterministic verifiers for assessing trajectory quality. This enables the creation of high-quality training trajectories for supervised fine-tuning (SFT) and the derivation of accurate reward signals for reinforcement learning (RL). Our evaluation on the challenging τ^2-bench benchmark demonstrates the effectiveness of the framework. Notably, our compact CoVe-4B model achieves success rates of 43.0\\% and 59.4\\% in the Airline and Retail domains, respectively; its overall performance significantly outperforms strong baselines of similar scale and remains competitive with models up to 17times its size. These results indicate that CoVe provides an effective and efficient pathway for synthesizing training data for state-of-the-art interactive tool-use agents. To support future research, we open-source our code, trained model, and the full set of 12K high-quality trajectories used for training.', 'score': 15, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '6b08d003eef251b0', 'authors': ['Jinpeng Chen', 'Cheng Gong', 'Hanbo Li', 'Ziru Liu', 'Zichen Tian', 'Xinyu Fu', 'Shi Wu', 'Chenyang Zhang', 'Wu Zhang', 'Suiyun Zhang', 'Dandan Tu', 'Rui Liu'], 'affiliations': ['Huawei Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.01940.jpg', 'data': {'categories': ['#benchmark', '#data', '#open_source', '#small_models', '#rl', '#agents', '#synthetic', '#training'], 'emoji': '🛠️', 'ru': {'title': 'Ограничения как проверка качества данных для обучения агентов', 'desc': 'CoVe — это фреймворк для синтеза данных обучения, который генерирует высококачественные траектории взаимодействия для агентов, работающих с инструментами. Фреймворк использует явные ограничения задач в двойной роли: для направления генерации сложных траекторий и для верификации их качества. Синтезированные траектории применяются для supervised fine-tuning и для получения сигналов вознаграждения в reinforcement learning. На бенчмарке τ²-bench компактная модель CoVe-4B показывает результаты, конкурентоспособные с моделями в 17 раз большего размера.'}, 'en': {'title': 'CoVe: Enhancing AI Training with Constraint-Verification', 'desc': 'CoVe is a framework that enhances the training of interactive tool-use agents by generating high-quality training data through a process called data synthesis. It incorporates task constraints that not only guide the creation of complex action sequences but also verify their correctness, ensuring that the agents can perform reliably in real-world scenarios. By using this method, CoVe improves the performance of agents in various domains, achieving notable success rates compared to traditional models. The framework is designed to facilitate both supervised fine-tuning and reinforcement learning, making it a valuable tool for developing advanced AI systems.'}, 'zh': {'title': 'CoVe：高效合成交互式工具使用代理的训练数据', 'desc': 'CoVe是一种后训练数据合成框架，旨在为交互式工具使用代理生成高质量的训练轨迹。它通过引入任务约束作为验证机制，确保生成的数据既复杂又正确，从而提高模型的性能。CoVe定义了明确的任务约束，这些约束不仅指导复杂轨迹的生成，还作为确定性验证器来评估轨迹质量。我们的实验表明，CoVe在多个领域的表现显著优于基线模型，提供了一条有效的路径来合成训练数据。'}}}, {'id': 'https://huggingface.co/papers/2603.00541', 'title': 'Spectral Condition for μP under Width-Depth Scaling', 'url': 'https://huggingface.co/papers/2603.00541', 'abstract': 'Abstract A spectral framework for maximal update parameterization is developed to address stable feature learning and hyperparameter transfer in jointly scaled deep neural networks.  \t\t\t\t\tAI-generated summary Generative foundation models are increasingly scaled in both width and depth, posing significant challenges for stable feature learning and reliable hyperparameter (HP) transfer across model sizes. While maximal update parameterization (μP) has provided a principled solution to both problems for width scaling, existing extensions to the joint width-depth scaling regime remain fragmented, architecture- and optimizer-specific, and often rely on technically involved theories. In this work, we develop a simple and unified spectral framework for μP under joint width-depth scaling. Considering residual networks of varying block depths, we first introduce a spectral μP condition that precisely characterizes how the norms of weights and their per-step updates should scale with width and depth, unifying previously disparate μP formulations as special cases. Building on this condition, we then derive a general recipe for implementing μP across a broad class of optimizers by mapping the spectral constraints to concrete HP parameterizations. This approach not only recovers existing μP formulations (e.g., for SGD and AdamW) but also naturally extends to a wider range of optimizers. Finally, experiments on GPT-2 style language models demonstrate that the proposed spectral μP condition preserves stable feature learning and enables robust HP transfer under width-depth scaling.', 'score': 12, 'issue_id': 1301, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '836b8fa77be8f249', 'authors': ['Chenyu Zheng', 'Rongzhen Wang', 'Xinyu Zhang', 'Chongxuan Li'], 'affiliations': ['ByteDance Seed', 'Gaoling School of AI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00541.jpg', 'data': {'categories': ['#architecture', '#optimization', '#transfer_learning', '#training'], 'emoji': '📈', 'ru': {'title': 'Универсальная спектральная параметризация для стабильного масштабирования глубоких нейросетей', 'desc': 'В работе разработана спектральная основа для параметризации максимального обновления (μP), которая решает проблемы стабильного обучения признаков и переноса гиперпараметров в глубоких нейронных сетях при совместном масштабировании по ширине и глубине. Авторы вводят спектральное условие μP, которое точно описывает, как должны масштабироваться нормы весов и их обновления с изменением размера модели. На основе этого условия они получают универсальный рецепт реализации μP для широкого класса оптимизаторов, включая SGD и AdamW. Экспериментальная проверка на языковых моделях в стиле GPT-2 подтверждает, что предложенный метод сохраняет стабильность обучения признаков и обеспечивает надежный перенос гиперпараметров при масштабировании модели.'}, 'en': {'title': 'Unified Spectral Framework for Stable Deep Learning', 'desc': "This paper presents a new method called spectral maximal update parameterization (μP) to improve feature learning and hyperparameter transfer in deep neural networks that are scaled in both width and depth. The authors identify a specific condition that describes how the weights and their updates should change as the model's architecture varies, which helps unify different approaches to μP. They provide a straightforward way to apply this method across various optimization algorithms, ensuring that it works well with popular ones like SGD and AdamW. Experiments show that this new framework maintains stable learning and effective hyperparameter transfer, even as the model size changes."}, 'zh': {'title': '光谱框架：稳定特征学习与超参数转移的解决方案', 'desc': '本文提出了一种光谱框架，用于最大更新参数化（μP），以解决联合缩放深度神经网络中的稳定特征学习和超参数转移问题。随着生成基础模型在宽度和深度上的不断扩展，稳定特征学习和可靠的超参数转移面临重大挑战。我们引入了一种光谱μP条件，精确描述了权重的范数及其每步更新如何随着宽度和深度进行缩放，从而统一了之前不同的μP公式。通过这一框架，我们能够为多种优化器提供通用的μP实现方案，并在实验中验证了其在宽度-深度缩放下的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.01068', 'title': 'LLaDA-o: An Effective and Length-Adaptive Omni Diffusion Model', 'url': 'https://huggingface.co/papers/2603.01068', 'abstract': 'Abstract LLaDA-o is an omni diffusion model that uses a Mixture of Diffusion framework to jointly handle text understanding and visual generation through a shared attention backbone, achieving state-of-the-art performance in multimodal tasks.  \t\t\t\t\tAI-generated summary We present LLaDA-o, an effective and length-adaptive omni diffusion model for multimodal understanding and generation. LLaDA-o is built on a Mixture of Diffusion (MoD) framework that decouples discrete masked diffusion for text understanding and continuous diffusion for visual generation, while coupling them through a shared, simple, and efficient attention backbone that reduces redundant computation for fixed conditions. Building on MoD, we further introduce a data-centric length adaptation strategy that enables flexible-length decoding in multimodal settings without architectural changes. Extensive experiments show that LLaDA-o achieves state-of-the-art performance among omni-diffusion models on multimodal understanding and generation benchmarks, and reaches 87.04 on DPG-Bench for text-to-image generation, supporting the effectiveness of unified omni diffusion modeling. Code is available at https://github.com/ML-GSAI/LLaDA-o.', 'score': 9, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'cd5b782b5256c0d7', 'authors': ['Zebin You', 'Xiaolu Zhang', 'Jun Zhou', 'Chongxuan Li', 'Ji-Rong Wen'], 'affiliations': ['Ant Group', 'Beijing Key Laboratory of Research on Large Models and Intelligent Governance', 'Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.01068.jpg', 'data': {'categories': ['#open_source', '#architecture', '#multimodal', '#benchmark', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для текста и изображений', 'desc': 'LLaDA-o — это универсальная диффузионная модель, которая использует архитектуру Mixture of Diffusion для совместной обработки понимания текста и генерации изображений через общий механизм внимания. Модель разделяет дискретную маскированную диффузию для работы с текстом и непрерывную диффузию для создания визуального контента, при этом связывая их эффективным общим attention backbone. Введена стратегия адаптации длины, основанная на анализе данных, которая позволяет гибкое декодирование переменной длины в мультимодальных задачах без изменения архитектуры. Модель достигает лучших результатов среди омни-диффузионных моделей на бенчмарках мультимодального понимания и генерации, включая score 87.04 на DPG-Bench для задачи text-to-image.'}, 'en': {'title': 'LLaDA-o: Unifying Text and Image with Efficient Diffusion', 'desc': 'LLaDA-o is a novel omni diffusion model designed for both text understanding and visual generation. It utilizes a Mixture of Diffusion framework that separates the processes for handling text and images while still allowing them to work together efficiently through a shared attention mechanism. This model introduces a length adaptation strategy that allows for flexible decoding of varying lengths in multimodal tasks without needing to change the underlying architecture. The results demonstrate that LLaDA-o achieves top performance in multimodal benchmarks, particularly excelling in text-to-image generation tasks.'}, 'zh': {'title': 'LLaDA-o：多模态理解与生成的全能扩散模型', 'desc': 'LLaDA-o是一种全能扩散模型，采用混合扩散框架，能够同时处理文本理解和视觉生成。它通过共享的注意力骨干网络，将离散的文本扩散和连续的视觉扩散相结合，从而提高了计算效率。该模型还引入了一种以数据为中心的长度适应策略，支持在多模态设置中灵活解码，而无需改变模型结构。实验结果表明，LLaDA-o在多模态理解和生成任务中达到了最先进的性能，特别是在文本到图像生成方面表现优异。'}}}, {'id': 'https://huggingface.co/papers/2603.01301', 'title': 'When Does RL Help Medical VLMs? Disentangling Vision, SFT, and RL Gains', 'url': 'https://huggingface.co/papers/2603.01301', 'abstract': 'Abstract Reinforcement learning enhances medical vision-language model performance primarily by sharpening output distributions when models already have sufficient reasoning support, with supervised fine-tuning expanding initial capability and enabling effective reinforcement learning.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) is increasingly used to post-train medical Vision-Language Models (VLMs), yet it remains unclear whether RL improves medical visual reasoning or mainly sharpens behaviors already induced by supervised fine-tuning (SFT). We present a controlled study that disentangles these effects along three axes: vision, SFT, and RL. Using MedMNIST as a multi-modality testbed, we probe visual perception by benchmarking VLM vision towers against vision-only baselines, quantify reasoning support and sampling efficiency via Accuracy@1 versus Pass@K, and evaluate when RL closes the support gap and how gains transfer across modalities. We find that RL is most effective when the model already has non-trivial support (high Pass@K): it primarily sharpens the output distribution, improving Acc@1 and sampling efficiency, while SFT expands support and makes RL effective. Based on these findings, we propose a boundary-aware recipe and instantiate it by RL post-training an OctoMed-initialized model on a small, balanced subset of PMC multiple-choice VQA, achieving strong average performance across six medical VQA benchmarks.', 'score': 5, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '08afd316434dba38', 'authors': ['Ahmadreza Jeddi', 'Kimia Shaban', 'Negin Baghbanzadeh', 'Natasha Sharan', 'Abhishek Moturu', 'Elham Dolatabadi', 'Babak Taati'], 'affiliations': ['KITE Research Institute, University Health Network, Canada', 'University of Toronto, Canada', 'Vector Institute, Canada', 'York University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.01301.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#optimization', '#multimodal', '#rl', '#reasoning', '#training'], 'emoji': '🔬', 'ru': {'title': 'Усиленное обучение заостряет, а не расширяет медицинское виденье моделей', 'desc': 'Авторы исследуют роль обучения с подкреплением (RL) в улучшении производительности медицинских видео-языковых моделей. Они обнаружили, что RL в основном заостряет распределение выходов, когда модель уже обладает достаточной способностью рассуждать, в то время как контролируемая тонкая настройка (SFT) расширяет базовые возможности модели. Исследование проведено на датасете MedMNIST и показывает, что RL наиболее эффективен, когда модель уже имеет высокий показатель Pass@K. На основе полученных результатов авторы предлагают рецепт для оптимального применения RL при обучении медицинских моделей визуального вопрос-ответа.'}, 'en': {'title': 'Reinforcement Learning Sharpens Medical Vision-Language Models', 'desc': 'This paper investigates how reinforcement learning (RL) can improve the performance of medical Vision-Language Models (VLMs) that have already undergone supervised fine-tuning (SFT). The authors conduct a controlled study to differentiate the effects of vision, SFT, and RL on model performance using the MedMNIST dataset. They find that RL is most beneficial when the model has already developed a solid reasoning foundation, as it primarily enhances the output distribution rather than building reasoning capabilities from scratch. The study concludes with a proposed method for effective RL post-training, demonstrating strong results across various medical visual question answering benchmarks.'}, 'zh': {'title': '强化学习提升医学视觉语言模型的性能', 'desc': '强化学习（RL）在医学视觉语言模型（VLM）的后训练中越来越多地被使用。研究表明，RL主要在模型已有足够推理支持的情况下，通过优化输出分布来提升性能。监督微调（SFT）则扩展了模型的初始能力，使得RL能够有效发挥作用。通过对MedMNIST的实验，我们发现RL在模型具备一定推理支持时最为有效，能够提高准确率和采样效率。'}}}, {'id': 'https://huggingface.co/papers/2603.01223', 'title': 'Learn Hard Problems During RL with Reference Guided Fine-tuning', 'url': 'https://huggingface.co/papers/2603.01223', 'abstract': "Abstract Reference-Guided Fine-Tuning (ReGFT) addresses reward sparsity in reinforcement learning for mathematical reasoning by using human-written solutions to create guided training trajectories that improve model performance.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) for mathematical reasoning can suffer from reward sparsity: for challenging problems, LLM fails to sample any correct trajectories, preventing RL from receiving meaningful positive feedback. At the same time, there often exist human-written reference solutions along with the problem (e.g., problems from AoPS), but directly fine-tuning on these solutions offers no benefit because models often cannot imitate human proofs that lie outside their own reasoning distribution.   We introduce Reference-Guided Fine-Tuning (ReGFT), a simple and effective method that utilizes human-written reference solutions to synthesize positive trajectories on hard problems and train on them before RL. For each problem, we provide the model with a partial reference solution and let it generate its own reasoning trace, ensuring the resulting trajectories remain in the model's reasoning space while still benefiting from reference guidance.   Fine-tuning on these reference-guided trajectories increases the number of solvable problems and produces a checkpoint that receives more positive rewards during RL. Across three benchmarks (AIME24, AIME25, BeyondAIME), ReGFT consistently improves supervised accuracy, accelerates DAPO training, and raises the final performance plateau of RL. Our results show that ReGFT effectively overcomes reward sparsity and unlocks stronger RL-based mathematical reasoning.", 'score': 4, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '556af67fc46aa6b0', 'authors': ['Yangzhen Wu', 'Shanda Li', 'Zixin Wen', 'Xin Zhou', 'Ameet Talwalkar', 'Yiming Yang', 'Wenhao Huang', 'Tianle Cai'], 'affiliations': ['ByteDance Seed', 'Carnegie Mellon University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.01223.jpg', 'data': {'categories': ['#rlhf', '#math', '#optimization', '#reasoning', '#rl', '#training'], 'emoji': '🧠', 'ru': {'title': 'Направляемая дополнительная обработка для преодоления разреженности вознаграждений в математическом рассуждении', 'desc': 'В работе предложен метод Reference-Guided Fine-Tuning (ReGFT) для решения проблемы разреженности вознаграждений при обучении с подкреплением в задачах математического рассуждения. Метод использует человеческие решения в качестве ориентиров: модель получает частичное решение и генерирует собственную траекторию рассуждений, оставаясь в пространстве своих возможностей при этом учась от эталонных примеров. Предварительная дополнительная обработка на таких направляемых траекториях увеличивает количество решаемых задач и подготавливает модель к более эффективному обучению с подкреплением. Эксперименты на трёх бенчмарках (AIME24, AIME25, BeyondAIME) показывают, что ReGFT улучшает точность, ускоряет обучение и повышает итоговую производительность математического рассуждения.'}, 'en': {'title': 'Unlocking Reinforcement Learning with Human Guidance', 'desc': 'The paper introduces Reference-Guided Fine-Tuning (ReGFT), a method designed to enhance reinforcement learning (RL) in mathematical reasoning by addressing the issue of reward sparsity. It leverages human-written solutions to create guided training trajectories, allowing models to generate their own reasoning paths while staying within their reasoning capabilities. By fine-tuning on these reference-guided trajectories, the model can improve its problem-solving abilities and receive more positive feedback during RL training. The results demonstrate that ReGFT significantly boosts accuracy and performance across multiple benchmarks, effectively overcoming challenges in RL for complex mathematical tasks.'}, 'zh': {'title': '参考引导微调：破解强化学习的奖励稀疏难题', 'desc': '本文提出了一种名为参考引导微调（ReGFT）的方法，旨在解决强化学习在数学推理中面临的奖励稀疏问题。通过利用人类编写的参考解，ReGFT能够生成指导性的训练轨迹，从而提高模型的表现。该方法通过提供部分参考解，让模型生成自己的推理过程，确保生成的轨迹仍在模型的推理空间内。实验结果表明，ReGFT在多个基准测试中显著提高了监督准确性，加速了训练过程，并提升了强化学习的最终表现。'}}}, {'id': 'https://huggingface.co/papers/2602.21320', 'title': 'Tool-R0: Self-Evolving LLM Agents for Tool-Learning from Zero Data', 'url': 'https://huggingface.co/papers/2602.21320', 'abstract': "Abstract Tool-R0 framework enables training general-purpose tool-calling agents through self-play reinforcement learning without initial datasets, achieving significant performance improvements over base models and supervised baselines.  \t\t\t\t\tAI-generated summary Large language models (LLMs) are becoming the foundation for autonomous agents that can use tools to solve complex tasks. Reinforcement learning (RL) has emerged as a common approach for injecting such agentic capabilities, but typically under tightly controlled training setups. It often depends on carefully constructed task-solution pairs and substantial human supervision, which creates a fundamental obstacle to open-ended self-evolution toward superintelligent systems. In this paper, we propose Tool-R0 framework for training general purpose tool-calling agents from scratch with self-play RL, under a zero-data assumption. Initialized from the same base LLM, Tool-R0 co-evolves a Generator and a Solver with complementary rewards: one proposes targeted challenging tasks at the other's competence frontier and the other learns to solve them with real-world tool calls. This creates a self-evolving cycle that requires no pre-existing tasks or datasets. Evaluation on different tool-use benchmarks show that Tool-R0 yields 92.5 relative improvement over the base model and surpasses fully supervised tool-calling baselines under the same setting. Our work further provides empirical insights into self-play LLM agents by analyzing co-evolution, curriculum dynamics, and scaling behavior.", 'score': 4, 'issue_id': 1301, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '432fde60b2011cdc', 'authors': ['Emre Can Acikgoz', 'Cheng Qian', 'Jonas Hübotter', 'Heng Ji', 'Dilek Hakkani-Tür', 'Gokhan Tur'], 'affiliations': ['ETH Zurich', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2602.21320.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#agents', '#benchmark', '#optimization', '#rl'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция агентов через сопэволюционное обучение с подкреплением', 'desc': 'В работе представлена框架 Tool-R0 для обучения универсальных агентов, способных использовать инструменты, через самоигровое обучение с подкреплением без предварительных датасетов. Система состоит из двух сопэволюционирующих компонентов: Генератора, который создаёт сложные задачи на границе компетентности, и Решателя, который их решает, используя реальные инструменты. Этот подход создаёт самоэволюционирующий цикл без необходимости в предварительных наборах задач или человеческого надзора. Экспериментальные результаты показывают, что Tool-R0 достигает улучшения на 92.5% относительно базовой модели и превосходит полностью контролируемые методы обучения инструментальным навыкам.'}, 'en': {'title': 'Empowering Agents: Self-Play Reinforcement Learning Without Data', 'desc': 'The Tool-R0 framework introduces a novel method for training tool-calling agents using self-play reinforcement learning without relying on any initial datasets. It utilizes a dual-agent system, where a Generator creates challenging tasks and a Solver learns to tackle them, fostering a self-evolving cycle. This approach allows the agents to improve their performance significantly, achieving a 92.5% relative improvement over base models. The study also offers insights into the dynamics of co-evolution and the scaling behavior of these agents in various tool-use scenarios.'}, 'zh': {'title': 'Tool-R0：无数据自我演化的工具调用代理训练框架', 'desc': 'Tool-R0框架通过自我对弈强化学习，能够在没有初始数据集的情况下训练通用的工具调用代理。该方法从同一基础大语言模型（LLM）开始，协同进化生成器和求解器，二者通过互补奖励相互促进。生成器提出具有挑战性的任务，而求解器则学习如何使用真实工具来解决这些任务。这种自我演化的循环使得代理能够在没有预先存在的任务或数据集的情况下不断提升性能。'}}}, {'id': 'https://huggingface.co/papers/2603.01710', 'title': 'Legal RAG Bench: an end-to-end benchmark for legal RAG', 'url': 'https://huggingface.co/papers/2603.01710', 'abstract': "Abstract Legal RAG Bench evaluates legal retrieval-augmented generation systems using a comprehensive dataset and factorial analysis, revealing that information retrieval significantly impacts performance more than language model capabilities.  \t\t\t\t\tAI-generated summary We introduce Legal RAG Bench, a benchmark and evaluation methodology for assessing the end-to-end performance of legal RAG systems. As a benchmark, Legal RAG Bench consists of 4,876 passages from the Victorian Criminal Charge Book alongside 100 complex, hand-crafted questions demanding expert knowledge of criminal law and procedure. Both long-form answers and supporting passages are provided. As an evaluation methodology, Legal RAG Bench leverages a full factorial design and novel hierarchical error decomposition framework, enabling apples-to-apples comparisons of the contributions of retrieval and reasoning models in RAG. We evaluate three state-of-the-art embedding models (Isaacus' Kanon 2 Embedder, Google's Gemini Embedding 001, and OpenAI's Text Embedding 3 Large) and two frontier LLMs (Gemini 3.1 Pro and GPT-5.2), finding that information retrieval is the primary driver of legal RAG performance, with LLMs exerting a more moderate effect on correctness and groundedness. Kanon 2 Embedder, in particular, had the largest positive impact on performance, improving average correctness by 17.5 points, groundedness by 4.5 points, and retrieval accuracy by 34 points. We observe that many errors attributed to hallucinations in legal RAG systems are in fact triggered by retrieval failures, concluding that retrieval sets the ceiling for the performance of many modern legal RAG systems. We document why and how we built Legal RAG Bench alongside the results of our evaluations. We also openly release our code and data to assist with reproduction of our findings.", 'score': 3, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '472dd4e171fb9d5d', 'authors': ['Abdur-Rahman Butler', 'Umar Butler'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.01710.jpg', 'data': {'categories': ['#open_source', '#dataset', '#hallucinations', '#benchmark', '#science', '#rag'], 'emoji': '⚖️', 'ru': {'title': 'Поиск информации — ключ к успеху юридических RAG систем', 'desc': 'В работе представлена Legal RAG Bench — контрольный набор данных и методология оценки для систем извлечения и генерации текста в юридической области, состоящая из 4876 отрывков уголовного права и 100 сложных вопросов, требующих экспертных знаний. Авторы использовали полнофакторный анализ и иерархическую декомпозицию ошибок для сравнения вклада компонентов поиска информации и языковых моделей в итоговую производительность системы. Результаты показывают, что качество поиска документов имеет значительно большее влияние на точность ответов, чем способности современных LLM-моделей, таких как Gemini 3.1 Pro и GPT-5.2. Исследование демонстрирует, что многие ошибки, приписываемые генерации галлюцинаций, на самом деле вызваны неудачами в компоненте поиска, что указывает на необходимость фокусировки на улучшении информационного поиска в RAG-системах.'}, 'en': {'title': 'Retrieval is Key: Unlocking Legal RAG Performance', 'desc': 'The paper introduces Legal RAG Bench, a benchmark designed to evaluate legal retrieval-augmented generation (RAG) systems. It highlights the importance of information retrieval in determining the performance of these systems, showing that retrieval capabilities outweigh the influence of language model (LLM) abilities. The study uses a dataset of 4,876 legal passages and 100 complex questions to assess various embedding models and LLMs, revealing that retrieval failures often lead to errors in generated responses. The findings emphasize that improving retrieval mechanisms can significantly enhance the overall effectiveness of legal RAG systems.'}, 'zh': {'title': '检索驱动法律生成系统的性能', 'desc': '本文介绍了Legal RAG Bench，这是一个用于评估法律检索增强生成系统的基准和评估方法。该基准包含4876个来自维多利亚刑事起诉书的段落，以及100个需要刑法和程序专家知识的复杂问题。研究发现，信息检索对法律RAG系统的性能影响显著，远超过语言模型的能力。通过评估不同的嵌入模型和大型语言模型，结果表明检索的准确性是影响法律RAG系统表现的主要因素。'}}}, {'id': 'https://huggingface.co/papers/2603.01425', 'title': 'LaSER: Internalizing Explicit Reasoning into Latent Space for Dense Retrieval', 'url': 'https://huggingface.co/papers/2603.01425', 'abstract': "Abstract LaSER introduces a self-distillation framework that embeds explicit reasoning into dense retrievers' latent space through dual-view training and multi-grained alignment, enabling efficient reasoning without autoregressive generation.  \t\t\t\t\tAI-generated summary LLMs have fundamentally transformed dense retrieval, upgrading backbones from discriminative encoders to generative architectures. However, a critical disconnect remains: while LLMs possess strong reasoning capabilities, current retrievers predominantly utilize them as static encoders, leaving their potential for complex reasoning unexplored. To address this, existing approaches typically adopt rewrite-then-retrieve pipelines to generate explicit CoT rationales before retrieval. However, this incurs prohibitive latency. In this paper, we propose LaSER, a novel self-distillation framework that internalizes explicit reasoning into the latent space of dense retrievers. Operating on a shared LLM backbone, LaSER introduces a dual-view training mechanism: an Explicit view that explicitly encodes ground-truth reasoning paths, and a Latent view that performs implicit latent thinking. To bridge the gap between these views, we design a multi-grained alignment strategy. Beyond standard output alignment, we introduce a trajectory alignment mechanism that synchronizes the intermediate latent states of the latent path with the semantic progression of the explicit reasoning segments. This allows the retriever to think silently and effectively without autoregressive text generation. Extensive experiments on both in-domain and out-of-domain reasoning-intensive benchmarks demonstrate that LaSER significantly outperforms state-of-the-art baselines. Furthermore, analyses across diverse backbones and model scales validate the robustness of our approach, confirming that our unified learning framework is essential for eliciting effective latent thinking. Our method successfully combines the reasoning depth of explicit CoT pipelines with the inference efficiency of standard dense retrievers.", 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b616af0b840adcef', 'authors': ['Jiajie Jin', 'Yanzhao Zhang', 'Mingxin Li', 'Dingkun Long', 'Pengjun Xie', 'Yutao Zhu', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.01425.jpg', 'data': {'categories': ['#benchmark', '#rag', '#optimization', '#reasoning', '#training'], 'emoji': '🧠', 'ru': {'title': 'Молчаливое мышление: рассуждение без слов в поисковых системах', 'desc': 'LaSER представляет фреймворк самодистилляции, который встраивает явное рассуждение в латентное пространство плотных поисковых систем через двойное обучение. Фреймворк использует явный вид, кодирующий правильные пути рассуждений, и латентный вид, выполняющий неявное мышление. Для синхронизации этих представлений применяется многоуровневая стратегия выравнивания, включая механизм выравнивания траекторий промежуточных скрытых состояний. Метод достигает качества явных цепей рассуждений без автореглессивной генерации текста, обеспечивая эффективность при сохранении способности к сложному логическому выводу.'}, 'en': {'title': 'Efficient Reasoning in Dense Retrieval with LaSER', 'desc': 'LaSER is a self-distillation framework designed to enhance dense retrievers by embedding explicit reasoning into their latent space. It employs a dual-view training approach, where one view focuses on explicit reasoning paths and the other on implicit latent thinking. This is achieved through a multi-grained alignment strategy that synchronizes the latent states with the explicit reasoning segments. The framework allows for efficient reasoning without the need for autoregressive generation, significantly improving performance on reasoning-intensive tasks compared to existing methods.'}, 'zh': {'title': '高效推理，智能检索的未来', 'desc': 'LaSER提出了一种自蒸馏框架，通过双视图训练和多粒度对齐，将显式推理嵌入到密集检索器的潜在空间中，从而实现高效推理，而无需自回归生成。该方法利用共享的LLM骨干，采用显式视图和潜在视图的双视图训练机制，显式视图编码真实的推理路径，潜在视图则进行隐式思考。通过设计多粒度对齐策略，LaSER能够同步潜在路径的中间状态与显式推理段的语义进展，使检索器能够在不生成文本的情况下进行有效的思考。实验结果表明，LaSER在推理密集的基准测试中显著超越了现有的最先进方法，验证了其在多种骨干和模型规模下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.00483', 'title': 'RAISE: Requirement-Adaptive Evolutionary Refinement for Training-Free Text-to-Image Alignment', 'url': 'https://huggingface.co/papers/2603.00483', 'abstract': 'Abstract RAISE is a training-free, requirement-driven evolutionary framework that adaptively improves text-to-image generation by dynamically allocating computational resources based on prompt complexity through iterative refinement actions.  \t\t\t\t\tAI-generated summary Recent text-to-image (T2I) diffusion models achieve remarkable realism, yet faithful prompt-image alignment remains challenging, particularly for complex prompts with multiple objects, relations, and fine-grained attributes. Existing training-free inference-time scaling methods rely on fixed iteration budgets that cannot adapt to prompt difficulty, while reflection-tuned models require carefully curated reflection datasets and extensive joint fine-tuning of diffusion and vision-language models, often overfitting to reflection paths data and lacking transferability across models. We introduce RAISE (Requirement-Adaptive Self-Improving Evolution), a training-free, requirement-driven evolutionary framework for adaptive T2I generation. RAISE formulates image generation as a requirement-driven adaptive scaling process, evolving a population of candidates at inference time through a diverse set of refinement actions-including prompt rewriting, noise resampling, and instructional editing. Each generation is verified against a structured checklist of requirements, enabling the system to dynamically identify unsatisfied items and allocate further computation only where needed. This achieves adaptive test-time scaling that aligns computational effort with semantic query complexity. On GenEval and DrawBench, RAISE attains state-of-the-art alignment (0.94 overall GenEval) while incurring fewer generated samples (reduced by 30-40%) and VLM calls (reduced by 80%) than prior scaling and reflection-tuned baselines, demonstrating efficient, generalizable, and model-agnostic multi-round self-improvement. Code is available at https://github.com/LiyaoJiang1998/RAISE.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '350fbe96d97942da', 'authors': ['Liyao Jiang', 'Ruichen Chen', 'Chao Gao', 'Di Niu'], 'affiliations': ['Department of ECE, University of Alberta, Canada', 'Huawei Technologies, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.00483.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Эволюционная оптимизация генерации изображений через адаптивное распределение ресурсов', 'desc': 'RAISE — это обучаемый-в-ходе-вывода эволюционный фреймворк для улучшения генерации изображений из текста, который адаптивно распределяет вычислительные ресурсы в зависимости от сложности запроса. Система использует популяционный поиск с разнообразными действиями уточнения, включая переформулировку промпта, пересэмплирование шума и редактирование инструкциями. Каждое поколение кандидатов проверяется против структурированного списка требований, что позволяет динамически выявлять неудовлетворённые условия и выделять вычисления только где это необходимо. RAISE достигает состояния искусства в выравнивании текста и изображения при значительном снижении количества сгенерированных образцов и вызовов видео-языковых моделей.'}, 'en': {'title': 'Adaptive Evolution for Enhanced Text-to-Image Generation', 'desc': 'RAISE is an innovative framework designed to enhance text-to-image generation without the need for prior training. It intelligently allocates computational resources based on the complexity of the prompts, allowing for iterative refinement of generated images. By employing a variety of actions such as prompt rewriting and noise resampling, RAISE ensures that each generated image meets specific requirements, thus improving alignment with the input prompts. This approach not only reduces the number of generated samples and calls to vision-language models but also achieves state-of-the-art performance in image alignment tasks.'}, 'zh': {'title': 'RAISE：自适应文本到图像生成的进化框架', 'desc': 'RAISE是一个无需训练的、需求驱动的进化框架，旨在通过动态分配计算资源来适应性地改善文本到图像的生成。该框架通过迭代优化过程，根据提示的复杂性进行计算资源的分配，从而提高生成图像的质量。RAISE将图像生成视为一个需求驱动的自适应缩放过程，通过多样化的优化操作（如提示重写、噪声重采样和指令编辑）来演化候选图像。实验结果表明，RAISE在生成样本数量减少的同时，达到了更高的提示-图像对齐度，展示了其高效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2602.23952', 'title': 'CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2602.23952', 'abstract': 'Abstract CC-VQA addresses knowledge conflicts in visual question answering by incorporating visual-semantic conflict analysis and correlation-guided encoding-decoding mechanisms without requiring model retraining.  \t\t\t\t\tAI-generated summary Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose CC-VQA: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '826a23c6d1575458', 'authors': ['Yuyang Hong', 'Jiaqi Gu', 'Yujin Lou', 'Lubin Fan', 'Qi Yang', 'Ying Wang', 'Kun Ding', 'Yue Wu', 'Shiming Xiang', 'Jieping Ye'], 'affiliations': ['Alibaba Cloud Computing', 'MAIS, Institute of Automation', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2602.23952.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv'], 'emoji': '🤝', 'ru': {'title': 'Разрешение конфликтов знаний в визуальном ответе на вопросы без переобучения', 'desc': 'В этой работе предлагается метод CC-VQA для решения проблемы конфликтов знаний в системах визуального ответа на вопросы. Основная идея заключается в анализе визуально-семантических конфликтов между статическими знаниями, хранящимися в параметрах модели, и динамически извлекаемой информацией. Метод использует два ключевых компонента: анализ конфликтов на основе визуальной информации и корреляционно-управляемые механизмы кодирования-декодирования. Важное преимущество подхода в том, что он не требует переобучения модели и достигает улучшения точности на 3,3-6,4% по сравнению с существующими методами.'}, 'en': {'title': 'Resolving Knowledge Conflicts in Visual Question Answering', 'desc': 'CC-VQA is a novel approach to improve knowledge-based visual question answering (KB-VQA) by addressing conflicts between static knowledge in vision language models and dynamically retrieved information. It introduces two main components: Vision-Centric Contextual Conflict Reasoning, which analyzes conflicts between visual and semantic knowledge, and Correlation-Guided Encoding and Decoding, which optimizes how information is processed based on its relevance. This method does not require retraining the model, making it efficient and practical. Evaluations show that CC-VQA significantly enhances accuracy on various benchmarks, outperforming existing techniques.'}, 'zh': {'title': '解决视觉问答中的知识冲突', 'desc': 'CC-VQA是一种新颖的视觉问答方法，旨在解决知识冲突问题。它通过视觉-语义冲突分析和相关性引导的编码解码机制来处理动态检索信息与静态模型知识之间的矛盾，而无需重新训练模型。该方法的两个核心组件分别是视觉中心的上下文冲突推理和相关性引导的编码解码，能够有效识别和缓解冲突。经过在多个基准测试上的评估，CC-VQA在准确性上显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2602.23906', 'title': 'Half-Truths Break Similarity-Based Retrieval', 'url': 'https://huggingface.co/papers/2602.23906', 'abstract': 'Abstract CLIP-style models exhibit vulnerabilities to half-truths where incorrect details can increase similarity scores, which is addressed through component-supervised fine-tuning that improves compositional understanding.  \t\t\t\t\tAI-generated summary When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '28069c4eb4339107', 'authors': ['Bora Kargi', 'Arnas Uselis', 'Seong Joon Oh'], 'affiliations': ['Konrad Zuse School of Excellence in Learning and Intelligent Systems (ELIZA)', 'University of Tubingen, Tubingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.23906.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение компонентам вместо предложений для понимания деталей в CLIP', 'desc': 'Статья исследует уязвимость моделей CLIP-стиля к полуправдам — ситуациям, когда добавление неправильного деталя к корректному описанию увеличивает схожесть между изображением и текстом. Авторы обнаружили, что контрастивное обучение на полных предложениях не гарантирует правильную привязку отдельных сущностей и отношений. Для решения этой проблемы предложен метод CS-CLIP, который разлагает описания на компоненты (сущности и отношения), создаёт минимально отредактированные контрпримеры и проводит дополнительную настройку модели. Предложенный подход значительно повышает точность на задаче обнаружения полуправд и улучшает общую производительность на бенчмарках композиционного понимания.'}, 'en': {'title': 'Enhancing CLIP: Tackling Half-Truths for Better Compositional Understanding', 'desc': "This paper discusses the vulnerabilities of CLIP-style models to 'half-truths', where adding incorrect details to a text description can misleadingly increase image-text similarity scores. The authors demonstrate that these models often prefer incorrect descriptions over correct ones, particularly when the added detail is a relation. To address this issue, they introduce a method called Component-Supervised CLIP (CS-CLIP), which fine-tunes the model by breaking down captions into individual entities and relations. This approach significantly improves the model's accuracy in identifying half-truths and enhances its overall compositional understanding."}, 'zh': {'title': '提升组合理解，减少半真相错误', 'desc': 'CLIP风格的模型在处理半真相时存在脆弱性，即错误的细节可能会提高相似度分数。我们提出了CS-CLIP（组件监督CLIP），通过将描述分解为实体和关系单元，并对模型进行微调，以确保正确的单元得分高于错误的单元。实验表明，CS-CLIP将半真相的准确率提高到69.3%，并在组合基准测试中平均提高了5.7分。这表明减少半真相错误有助于提升模型的组合理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.02203', 'title': 'Tool Verification for Test-Time Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02203', 'abstract': 'Abstract Test-time reinforcement learning with tool verification addresses consensus bias in large reasoning models by using external validation to improve reward estimation and model stability.  \t\t\t\t\tAI-generated summary Test-time reinforcement learning (TTRL) has emerged as a promising paradigm for self-evolving large reasoning models (LRMs), enabling online adaptation on unlabeled test inputs via self-induced rewards through majority voting. However, a spurious yet high-frequency unverified consensus can become a biased and reinforced reward signal, leading to incorrect mode collapse. We address this failure mode with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces test-time tool verification into reward estimation. Concretely, a verifier uses an external tool as evidence (e.g., from code execution) to upweight verified rollouts in a verification-aware voting, producing more reliable pseudo-labels for training. Across various math di
