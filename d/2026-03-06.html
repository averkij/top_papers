(ReID) called STMI. It improves the way foreground objects are represented and reduces background noise using a Segmentation-Guided Feature Modulation (SFM) module. The framework also includes a Semantic Token Reallocation (STR) module that efficiently extracts compact features without losing important information. Finally, the Cross-Modal Hypergraph Interaction (CHI) module helps in understanding complex relationships between different data types, making the system more effective in identifying objects across various scenarios.'}, 'zh': {'title': '多模态物体重识别的新框架', 'desc': '本文提出了一种新颖的多模态学习框架STMI，用于物体重识别（ReID）。该框架通过三个关键模块来增强前景表示，提取紧凑特征，并捕捉高阶语义关系。首先，分割引导特征调制模块利用生成的掩码来增强前景表示并抑制背景噪声。其次，语义令牌重新分配模块通过可学习的查询令牌和自适应重新分配机制提取信息丰富的表示，最后，跨模态超图交互模块构建统一的超图以捕捉不同模态之间的语义关系。'}}}, {'id': 'https://huggingface.co/papers/2603.05312', 'title': 'UltraDexGrasp: Learning Universal Dexterous Grasping for Bimanual Robots with Synthetic Data', 'url': 'https://huggingface.co/papers/2603.05312', 'abstract': 'Abstract A bimanual robotic grasping framework is presented that generates diverse grasp data through optimization and planning, enabling effective zero-shot sim-to-real transfer with high success rates on novel objects.  \t\t\t\t\tAI-generated summary Grasping is a fundamental capability for robots to interact with the physical world. Humans, equipped with two hands, autonomously select appropriate grasp strategies based on the shape, size, and weight of objects, enabling robust grasping and subsequent manipulation. In contrast, current robotic grasping remains limited, particularly in multi-strategy settings. Although substantial efforts have targeted parallel-gripper and single-hand grasping, dexterous grasping for bimanual robots remains underexplored, with data being a primary bottleneck. Achieving physically plausible and geometrically conforming grasps that can withstand external wrenches poses significant challenges. To address these issues, we introduce UltraDexGrasp, a framework for universal dexterous grasping with bimanual robots. The proposed data-generation pipeline integrates optimization-based grasp synthesis with planning-based demonstration generation, yielding high-quality and diverse trajectories across multiple grasp strategies. With this framework, we curate UltraDexGrasp-20M, a large-scale, multi-strategy grasp dataset comprising 20 million frames across 1,000 objects. Based on UltraDexGrasp-20M, we further develop a simple yet effective grasp policy that takes point clouds as input, aggregates scene features via unidirectional attention, and predicts control commands. Trained exclusively on synthetic data, the policy achieves robust zero-shot sim-to-real transfer and consistently succeeds on novel objects with varied shapes, sizes, and weights, attaining an average success rate of 81.2% in real-world universal dexterous grasping. To facilitate future research on grasping with bimanual robots, we open-source the data generation pipeline at https://github.com/InternRobotics/UltraDexGrasp.', 'score': 1, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '94c5842cfad55737', 'authors': ['Sizhe Yang', 'Yiman Xie', 'Zhixuan Liang', 'Yang Tian', 'Jia Zeng', 'Dahua Lin', 'Jiangmiao Pang'], 'affiliations': ['Peking University', 'Shanghai AI Laboratory', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05312.jpg', 'data': {'categories': ['#dataset', '#open_source', '#robotics', '#transfer_learning', '#synthetic', '#3d', '#data'], 'emoji': '🤖', 'ru': {'title': 'Универсальный захват двумя руками: от симуляции к реальности без дополнительного обучения', 'desc': 'Работа представляет UltraDexGrasp — фреймворк для универсального ловкого захвата двуручных роботов, который комбинирует оптимизационный синтез захватов с планированием демонстраций. Авторы создали большой датасет из 20 миллионов кадров разнообразных стратегий захвата на 1000 объектах, сгенерированный исключительно в симуляции. На основе этого датасета была обучена политика захвата с использованием архитектуры на базе облаков точек и механизма одностороннего внимания. Обученная только на синтетических данных модель достигает успешного нулевого переноса из симуляции в реальность с точностью 81.2% на новых объектах различных форм и размеров.'}, 'en': {'title': 'Empowering Bimanual Robots with Universal Dexterous Grasping', 'desc': 'This paper introduces UltraDexGrasp, a framework designed for bimanual robotic grasping that generates diverse grasp data through optimization and planning techniques. It addresses the limitations of current robotic grasping by creating a large-scale dataset, UltraDexGrasp-20M, which includes 20 million frames of grasping data across 1,000 different objects. The framework enables a grasp policy that utilizes point clouds and unidirectional attention to predict control commands, achieving effective zero-shot sim-to-real transfer. As a result, the policy demonstrates a high success rate of 81.2% when grasping novel objects in real-world scenarios.'}, 'zh': {'title': '双手机器人抓取的未来：UltraDexGrasp框架', 'desc': '本文提出了一种双手机器人抓取框架，能够通过优化和规划生成多样化的抓取数据，从而实现高成功率的零-shot模拟到现实转移。该框架名为UltraDexGrasp，结合了基于优化的抓取合成和基于规划的演示生成，创建了一个包含2000万个帧的多策略抓取数据集。通过使用合成数据训练的抓取策略，机器人能够在面对形状、大小和重量各异的新物体时，保持高达81.2%的成功率。该研究为双手机器人抓取的未来研究提供了重要的数据生成工具和资源。'}}}, {'id': 'https://huggingface.co/papers/2603.04736', 'title': 'Distribution-Conditioned Transport', 'url': 'https://huggingface.co/papers/2603.04736', 'abstract': 'Abstract Distribution-conditioned transport framework enables generalization to unseen distribution pairs and supports semi-supervised learning for scientific applications.  \t\t\t\t\tAI-generated summary Learning a transport model that maps a source distribution to a target distribution is a canonical problem in machine learning, but scientific applications increasingly require models that can generalize to source and target distributions unseen during training. We introduce distribution-conditioned transport (DCT), a framework that conditions transport maps on learned embeddings of source and target distributions, enabling generalization to unseen distribution pairs. DCT also allows semi-supervised learning for distributional forecasting problems: because it learns from arbitrary distribution pairs, it can leverage distributions observed at only one condition to improve transport prediction. DCT is agnostic to the underlying transport mechanism, supporting models ranging from flow matching to distributional divergence-based models (e.g. Wasserstein, MMD). We demonstrate the practical performance benefits of DCT on synthetic benchmarks and four applications in biology: batch effect transfer in single-cell genomics, perturbation prediction from mass cytometry data, learning clonal transcriptional dynamics in hematopoiesis, and modeling T-cell receptor sequence evolution.', 'score': 0, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'da3b85ec821bbbff', 'authors': ['Nic Fishman', 'Gokul Gowri', 'Paolo L. B. Fischer', 'Marinka Zitnik', 'Omar Abudayyeh', 'Jonathan Gootenberg'], 'affiliations': ['Beth Israel Deaconess Medical Center', 'Brigham and Womens Hospital', 'Harvard Medical School', 'Harvard University', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2603.04736.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#training'], 'emoji': '🔄', 'ru': {'title': 'Транспорт между распределениями, который учится на невидимых данных', 'desc': 'Статья представляет фреймворк распределительно-обусловленного транспорта (DCT), который позволяет моделям трансформации распределений обобщаться на невидимые пары распределений путём кондиционирования карт транспорта на выученные эмбеддинги исходного и целевого распределений. Фреймворк поддерживает полу-обучение, так как может обучаться на произвольных парах распределений и использовать данные из единственного условия для улучшения предсказания. DCT совместима с различными механизмами транспорта, включая потоковое согласование и модели на основе дивергенций (Вассерштейн, MMD). Эффективность подхода продемонстрирована на синтетических тестах и четырёх биологических приложениях: коррекция батч-эффектов в геномике одиночных клеток, предсказание возмущений и моделирование эволюции.'}, 'en': {'title': 'Generalizing Transport Models for Unseen Distributions', 'desc': 'The paper introduces a new framework called distribution-conditioned transport (DCT) that helps machine learning models generalize to new distribution pairs that were not seen during training. This is particularly useful in scientific applications where data can vary widely. DCT works by conditioning transport maps on learned embeddings of the source and target distributions, allowing for better predictions even with limited data. Additionally, it supports semi-supervised learning, meaning it can improve its predictions by using data from only one of the conditions.'}, 'zh': {'title': '分布条件传输：提升模型泛化能力的创新框架', 'desc': '本文提出了一种分布条件传输框架（DCT），旨在解决机器学习中源分布与目标分布之间的映射问题。DCT能够处理在训练过程中未见过的分布对，从而实现更好的泛化能力。该框架支持半监督学习，可以利用仅在一个条件下观察到的分布来提高传输预测的准确性。我们在生物学的多个应用中展示了DCT的实际性能优势，包括单细胞基因组学中的批次效应转移等。'}}}, {'id': 'https://huggingface.co/papers/2603.03942', 'title': 'Lightweight Visual Reasoning for Socially-Aware Robots', 'url': 'https://huggingface.co/papers/2603.03942', 'abstract': 'Abstract A lightweight language-to-vision feedback module enhances Vision-Language Models for robotics applications by enabling contextual reinterpretation of visual scenes through gated MLP layers.  \t\t\t\t\tAI-generated summary Robots operating in shared human environments must not only navigate, interact, and detect their surroundings, they must also interpret and respond to dynamic, and often unpredictable, human behaviours. Although recent advances have shown promise in enhancing robotic perception and instruction-following using Vision-Language Models (VLMs), they remain limited in addressing the complexities of multimodal human-robot interactions (HRI). Motivated by this challenge, we introduce a lightweight language-to-vision feedback module that closes the loop between an LLM and the vision encoder in VLMs. The module projects image-token hidden states through a gated Multi-Layer Perceptron (MLP) back into the encoder input, prompting a second pass that reinterprets the scene under text context. We evaluate this approach on three robotics-centred tasks: navigation in a simulated environment (Habitat), sequential scene description (Mementos-Robotics), and human-intention recognition (our HRI dataset). Results show that our method improves Qwen 2.5 (7B) by 3.3% (less distance), +0.057 description score, and +2.93% accuracy, with less than 3% extra parameters; Gemma 3 (4B) and LLaVA OV 1.5 (4B) show mixed navigation results but gains +0.111,+0.055 and +10.81%,+4.79% on the latter two tasks. Code is available at https://github.com/alessioGalatolo/VLM-Reasoning-for-Robotics', 'score': 0, 'issue_id': 1372, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '3d4dc1ef39669c40', 'authors': ['Alessio Galatolo', 'Ronald Cumbal', 'Alexandros Rouchitsas', 'Katie Winkle', 'Didem Gürdür Broo', 'Ginevra Castellano'], 'affiliations': ['Department of Information Technology, Uppsala University, Sweden'], 'pdf_title_img': 'assets/pdf/title_img/2603.03942.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Замкнутая обратная связь между языком и зрением для понимания роботами человеческого взаимодействия', 'desc': 'В работе предложен лёгкий модуль обратной связи языка-к-зрению, который улучшает видео-языковые модели для робототехники. Модуль проецирует скрытые представления токенов изображений через управляемые MLP-слои обратно в вход кодировщика зрения, позволяя переинтерпретировать сцену с учётом текстового контекста. Метод оценивается на трёх задачах робототехники: навигация в симуляции, описание сцен и распознавание намерений человека. Результаты показывают значительные улучшения характеристик при добавлении менее 3% дополнительных параметров.'}, 'en': {'title': 'Enhancing Robot Perception with Language-Driven Vision Reinterpretation', 'desc': 'This paper presents a new module that improves how robots understand and interact with their environments by combining language and vision. The module uses gated Multi-Layer Perceptrons (MLPs) to reinterpret visual scenes based on language input, enhancing the capabilities of Vision-Language Models (VLMs). By integrating feedback from language into the vision processing, robots can better navigate and respond to human behaviors in real-time. The proposed method shows significant performance improvements in various robotics tasks while maintaining a lightweight architecture.'}, 'zh': {'title': '增强机器人视觉理解的轻量级模块', 'desc': '本文提出了一种轻量级的语言到视觉反馈模块，旨在增强机器人应用中的视觉-语言模型（VLM）。该模块通过门控多层感知器（MLP）将图像标记的隐藏状态反馈到编码器输入中，从而在文本上下文下重新解释视觉场景。我们在三个以机器人为中心的任务上评估了该方法，包括模拟环境中的导航、顺序场景描述和人类意图识别。实验结果表明，该方法在提高机器人性能方面具有显著效果，且增加的参数量不足3%。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (5)', '#agi', '#alignment (1)', '#architecture (5)', '#audio', '#benchmark (8)', '#cv (2)', '#data (1)', '#dataset (7)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare (2)', '#inference (3)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (7)', '#open_source (3)', '#optimization (5)', '#plp (1)', '#rag (1)', '#reasoning (3)', '#rl (1)', '#rlhf', '#robotics (3)', '#science (2)', '#security', '#small_models (3)', '#story_generation', '#survey', '#synthetic (3)', '#training (7)', '#transfer_learning (1)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-06 14:35',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-06 14:35')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-06 14:35')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
