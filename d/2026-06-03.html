    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.01249', 'title': 'Trust Region On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.01249', 'abstract': 'Abstract Trust Region On-Policy Distillation (TrOPD) improves reliable token-level supervision in large language model distillation by using trust regions, outlier estimation, and off-policy guidance to address instability issues under distribution mismatch.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-Policy Distillation (OPD) is a fundamental technique for efficient post-training of large language models (LLMs), with broad applications in agent learning, multi-task enhancement, and model compression. However, OPD training becomes unstable when the teacher and student distributions differ substantially, as teacher supervision on student-generated tokens may yield unreliable policy gradients and even cause optimization failure. This work addresses reliable on-policy token-level supervision through credit assignment strategies, and proposes Trust Region On-Policy Distillation, TrOPD. It features the following characteristics: 1) Trust-Region On-Policy Learning: TrOPD performs OPD only in regions where the teacher provides reliable supervision, mitigating the optimization difficulty of the K1 reverse-KL estimator under distribution mismatch. 2) Outlier Estimation: For outlier regions, we explore gradient clipping, masking, and forward-KL estimation to reduce the adverse effects of unreliable supervision. 3) Off-Policy Guidance: The student continues generation from teacher prefixes and uses forward KL to imitate off-policy guidance, encouraging on-policy exploration toward reliable regions. Experiments show that TrOPD consistently outperforms SoTA OPD baselines, including OPD, EOPD, and REOPOLD, across mathematical reasoning, code generation, and general-domain benchmarks.', 'score': 11, 'issue_id': 2364, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'adddb5d4ccb7fb40', 'authors': ['Xingrun Xing', 'Haoqing Wang', 'Boyan Gao', 'Ziheng Li', 'Yehui Tang'], 'affiliations': ['Peking University', 'Samsung Research, Beijing, China', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.01249.jpg', 'data': {'categories': ['#training', '#rlhf', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Надёжная дистилляция через доверительные регионы и умное управление выбросами', 'desc': 'В статье представлен метод Trust Region On-Policy Distillation (TrOPD) для стабилизации дистилляции больших языковых моделей. Основная проблема заключается в нестабильности обучения when распределения учителя и студента существенно различаются, что приводит к ненадёжным градиентам политики. Авторы предлагают три ключевых компонента: обучение в доверительных областях для надёжного обучения, обработка выбросов через clipping и masking, а также off-policy guidance для исследования надёжных регионов. Экспериментальные результаты показывают, что TrOPD превосходит существующие методы on-policy distillation на задачах математического рассуждения, генерации кода и других бенчмарках.'}, 'en': {'title': 'Enhancing Distillation Stability with Trust Regions', 'desc': "The paper introduces Trust Region On-Policy Distillation (TrOPD), a method designed to enhance the reliability of token-level supervision in the distillation of large language models (LLMs). It addresses the instability that arises when the distributions of teacher and student models differ significantly, which can lead to unreliable policy gradients. TrOPD employs strategies such as trust-region learning to ensure that training occurs only in areas where the teacher's supervision is dependable, and it uses outlier estimation techniques to manage the impact of unreliable data. The method demonstrates superior performance compared to existing state-of-the-art on-policy distillation techniques across various tasks, including mathematical reasoning and code generation."}, 'zh': {'title': '信任区域提升在线蒸馏的可靠性', 'desc': '信任区域在线蒸馏（TrOPD）通过使用信任区域、异常值估计和离线指导，改善了大语言模型蒸馏中的可靠性问题。在线蒸馏（OPD）是一种高效的后训练技术，但当教师和学生的分布差异较大时，训练会变得不稳定。TrOPD 通过信用分配策略解决了在线令牌级监督的可靠性问题，确保在教师提供可靠监督的区域内进行优化。实验表明，TrOPD 在数学推理、代码生成和通用基准测试中，始终优于现有的 OPD 基线。'}}}, {'id': 'https://huggingface.co/papers/2606.02754', 'title': 'Ψ-Bench: Evaluating Persona-Sensitive Influencing in Persuasive Dialogues', 'url': 'https://huggingface.co/papers/2606.02754', 'abstract': "Abstract LLMs demonstrate limited effectiveness in persuasive conversation despite generating coherent arguments, with user-specific profiles significantly improving performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Personalization is a crucial capability of modern language agents. However, current research primarily positions personalized agents as passive responders to user preferences, limiting their ability to interact with users and provide suggestions or guidance proactively. To systematically evaluate such proactive personalization in realistic interactions, we propose Ψ-Bench, a benchmark for assessing LLMs' ability to influence realistic users through conversation. We design three real-world interaction scenarios that involve persuasion in Ψ-Bench, and endow simulated clients with personal characteristics through explicit user profiles derived from dialogue histories. We evaluate 10 frontier LLMs on Ψ-Bench and find that while most models can produce coherent and reasonable arguments, even state-of-the-art models still leave considerable room for improvement in persuasion. We also find that providing access to client profiles yields an average performance gain of 18.24\\%, highlighting the importance of user-specific information for effective persuasion. Overall, our work highlights persona-sensitive influencing as a challenging yet practical direction for evaluating and developing more proactive personalized LLM agents. Codes are available at: https://github.com/Hanpx20/Psi-Bench.", 'score': 7, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd591a5b16694e2d4', 'authors': ['Peixuan Han', 'Hongyi Du', 'Jiayu Liu', 'Yihang Sun', 'Yutong Liu', 'Jiaxuan You'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.02754.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Персонализированное убеждение: когда LLM должны влиять, а не просто отвечать', 'desc': 'В этой статье исследуется способность больших языковых моделей к убедительному общению с пользователями в реалистичных сценариях. Авторы предлагают Ψ-Bench, бенчмарк для оценки проактивной персонализации LLM, где модели должны влиять на поведение пользователей через диалог. Результаты показывают, что хотя современные модели генерируют связные аргументы, они значительно отстают в эффективности убеждения, а доступ к профилям пользователей улучшает качество на 18.24%. Исследование подчеркивает важность учета индивидуальных характеристик пользователя для разработки более продвинутых персонализированных языковых агентов.'}, 'en': {'title': 'Enhancing Persuasion in LLMs through User Personalization', 'desc': "This paper discusses the limitations of large language models (LLMs) in engaging users persuasively, despite their ability to generate coherent arguments. It introduces Ψ-Bench, a new benchmark designed to evaluate how well LLMs can influence users through personalized conversations. The study shows that incorporating user-specific profiles significantly enhances the models' persuasive capabilities, with an average performance improvement of 18.24%. The findings suggest that proactive personalization, where models actively guide and suggest to users, is a crucial area for future research in developing more effective conversational agents."}, 'zh': {'title': '个性化影响力：提升对话模型的说服能力', 'desc': '本论文探讨了大型语言模型（LLMs）在说服性对话中的局限性，尽管它们能够生成连贯的论点。研究表明，用户特定的个人资料显著提高了模型的表现。我们提出了Ψ-Bench，一个用于评估LLMs在真实对话中影响用户能力的基准，设计了三种涉及说服的真实互动场景。结果显示，尽管大多数模型能够生成合理的论点，但在说服能力上仍有很大的提升空间，强调了个性化信息在有效说服中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.01788', 'title': 'PlatonicNav: Unveiling Semantic Correspondence in Navigation with Platonic Topological Maps', 'url': 'https://huggingface.co/papers/2606.01788', 'abstract': 'Abstract A training-free framework for embodied navigation that uses a vision-only approach to create semantic maps and ground language goals through blind matching without paired vision-language data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied visual navigation, where an agent perceives a complex environment and acts to reach a goal from raw sensory input, underpins a wide range of applications such as household service robotics, assistive robotics, and large-scale autonomous exploration. However, recent attempts to unify vision-and-language navigation (VLN) and object goal navigation (ObjNav) remain at the level of architectural fusion, mixed-task training, and large vision-language pretraining, without examining whether independently trained vision and language encoders may already share a common semantic structure. Moreover, even object-centric topological maps still ground language goals through explicit cross-modal supervision such as CLIP or large vision-language models, leaving open whether such grounding is possible from a purely vision-built map. To address these challenges, we extend the Platonic Representation Hypothesis to embodied navigation and recast vision-only ObjNav, cross-modal ObjNav, and VLN as three different interfaces to the same object-centric semantic manifold. We further introduce PlatonicNav, a training-free framework whose Platonic Topological Map fuses geometric and semantic node distances from a self-supervised visual encoder, and grounds language goals via blind matching without any paired vision-language data. Extensive experiments on simulation benchmarks including HM3D-IIN, OVON, and R2R-CE on MP3D, together with deployment on Unitree Go2, demonstrate that PlatonicNav generalizes across tasks, modalities, and embodiments without explicit cross-modal training. Code: https://github.com/AIGeeksGroup/PlatonicNav. Website: https://aigeeksgroup.github.io/PlatonicNav.', 'score': 3, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'e37cc89226719899', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#robotics', '#agents'], 'emoji': '🗺️', 'ru': {'title': 'Единый семантический многообразие для навигации без обучения', 'desc': 'В работе предлагается PlatonicNav — фреймворк без обучения для навигации мобильного робота, который использует только визуальную информацию для создания семантических топологических карт. Авторы применяют гипотезу платонического представления к задачам воплощённой навигации, показывая, что независимо обученные визуальные и языковые кодеры уже обладают общей семантической структурой. Фреймворк объединяет геометрические и семантические расстояния из самоконтролируемого визуального энкодера и привязывает языковые цели через слепое сопоставление без парных данных видения-языка. Экспериментальная проверка на нескольких бенчмарках и физическом роботе доказывает, что подход обобщается на разные задачи, модальности и воплощения без явного кросс-модального обучения.'}, 'en': {'title': 'Navigating Without Training: The Power of PlatonicNav', 'desc': 'This paper presents a novel framework called PlatonicNav for embodied navigation that operates without the need for training on paired vision-language data. It introduces a concept known as the Platonic Topological Map, which combines geometric and semantic information from a visual encoder to create a semantic map. The framework allows for grounding language goals through a process called blind matching, which does not rely on explicit cross-modal supervision. Experimental results show that PlatonicNav effectively generalizes across various tasks and environments, demonstrating its versatility in navigation applications.'}, 'zh': {'title': '无训练的视觉导航新框架', 'desc': '这篇论文提出了一种无训练的框架，用于实现基于视觉的导航，能够通过盲匹配生成语义地图和语言目标，而无需配对的视觉-语言数据。研究表明，独立训练的视觉和语言编码器可能共享相同的语义结构，从而简化了导航任务。论文中引入了PlatonicNav框架，它通过自监督的视觉编码器融合几何和语义节点距离，并通过盲匹配来确定语言目标。实验结果表明，PlatonicNav在不同任务、模态和应用中具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2606.03159', 'title': 'NVIDIA OmniDreams: Real-Time Generative World Model for Closed-Loop Autonomous Vehicle Simulation', 'url': 'https://huggingface.co/papers/2606.03159', 'abstract': 'Abstract OmniDreams, a foundation generative world model trained from the Cosmos diffusion model, enables real-time action-conditioned video generation for autonomous driving policy evaluation in complex, unseen scenarios.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As autonomous vehicle capabilities advance, the safe evaluation of driving policies in long-tail scenarios remains a critical bottleneck. In closed-loop simulation, the driving policy model actively interacts with the environment, where its actions dynamically update the simulator state and directly influence the next set of generated sensor observations. While recent reconstruction-based neural simulators offer photorealism, they are fundamentally constrained by their initial captured data and struggle to generalize to highly dynamic or novel scenes. To overcome these limitations, we introduce OmniDreams, a foundation generative world model mid- and post-trained from the Cosmos diffusion model to autoregressively generate action-conditioned videos in real time. By leveraging the rich visual priors of Cosmos and mid- and post-training on 21k hours of driving scenarios, OmniDreams synthesizes complex, unobserved phenomena that are hard for traditional simulators to capture, such as extreme weather and unpredictable dynamic agent behaviors. Crucially, it autoregressively conditions its photorealistic sensor generation on past frames, the current simulator state, and immediate driving actions. Deployed in a closed-loop system with the Alpamayo 1 policy model and AlpaSim orchestrator, OmniDreams acts as a highly responsive, reactive environment, providing a scalable and comprehensive solution for training and evaluating next-generation autonomous driving policies. We additionally show preliminary results indicating that a world-action model (WAM) post-trained from OmniDreams achieves strong performance on the Physical AI Autonomous Vehicles NuRec dataset, surpassing the VLA-based Alpamayo 1.5 research policy model while using only 1/5 the total parameters. These results highlight the potential for a real-time world model like OmniDreams to also serve as a backbone for policy architectures.', 'score': 2, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '3d290f2c97003a0c', 'authors': ['NVIDIA', ':', 'Aarti Basant', 'Amlan Kar', 'Despoina Paschalidou', 'Fangyin Wei', 'Francesco Ferroni', 'Guillermo Garcia Cobo', 'Haithem Turki', 'Huan Ling', 'Jaewoo Seo', 'James Lucas', 'Jay Zhangjie Wu', 'Jialiang Wang', 'Jonathan Lorraine', 'Jun Gao', 'Kai He', 'Katarina Tothova', 'Kevin Xie', 'Michał Tyszkiewicz', 'Qi Wu', 'Riccardo de Lutio', 'Ruilong Li', 'Sanja Fidler', 'Seung Wook Kim', 'Tianchang Shen', 'Tianshi Cao', 'Tobias Pfaff', 'William Lew', 'Xindi Wu', 'Xuanchi Ren', 'Yifan Lu', 'Yuxuan Zhang', 'Zan Gojcic', 'Zian Wang'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.03159.jpg', 'data': {'categories': ['#training', '#video', '#multimodal', '#diffusion', '#robotics', '#optimization'], 'emoji': '🚗', 'ru': {'title': 'Генеративный мир для обучения автономного вождения в реальном времени', 'desc': 'OmniDreams — это обобщённая генеративная модель мира, созданная на основе диффузионной модели Cosmos, которая в реальном времени генерирует видео, обусловленные действиями агента. Модель обучена на 21 тысяче часов сценариев вождения и способна синтезировать сложные явления, которые традиционные симуляторы не могут захватить, такие как экстремальная погода и непредсказуемое поведение динамических объектов. OmniDreams используется в замкнутом контуре управления вместе с моделью политики Alpamayo для обучения и оценки политик автономного вождения в редких и незнакомых сценариях. Модель демонстрирует практическое применение генеративных подходов для создания реалистичных симуляторов, которые превосходят традиционные методы по способности обобщаться на новые ситуации.'}, 'en': {'title': 'Revolutionizing Autonomous Driving Evaluation with OmniDreams', 'desc': 'OmniDreams is a generative world model designed for real-time video generation to evaluate autonomous driving policies in complex scenarios. It uses the Cosmos diffusion model to create realistic simulations that adapt to the actions of the driving policy, allowing for dynamic interaction with the environment. Unlike traditional simulators, which are limited by their initial data, OmniDreams can generate novel situations, such as extreme weather and unpredictable behaviors, by leveraging extensive training on diverse driving scenarios. This innovative approach not only enhances the realism of simulations but also improves the training and evaluation of next-generation autonomous driving systems.'}, 'zh': {'title': 'OmniDreams：实时生成复杂驾驶场景的智能模型', 'desc': 'OmniDreams是一种基础生成世界模型，利用Cosmos扩散模型进行训练，能够实时生成基于动作的驾驶视频，以评估复杂场景下的自动驾驶策略。该模型通过与环境的闭环交互，动态更新模拟器状态，从而影响生成的传感器观察。与传统的重建神经模拟器相比，OmniDreams能够合成极端天气和不可预测的动态行为等复杂现象，克服了初始数据的限制。通过在21,000小时的驾驶场景上进行中后期训练，OmniDreams为下一代自动驾驶政策的训练和评估提供了可扩展的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.01717', 'title': 'Decentralized Instruction Tuning: Conflict-Aware Splitting and Weight Merging', 'url': 'https://huggingface.co/papers/2606.01717', 'abstract': 'Abstract Instruction tuning of large language models can be improved through decentralized training that partitions mixed datasets based on gradient conflicts and merges results via weighted averaging, achieving performance comparable to centralized methods with reduced communication overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Instruction tuning aligns large language models, including multimodal ones, with diverse user intents, but scaling to heterogeneous mixtures is hindered by gradient interference and bandwidth-heavy synchronization. We ask whether these two bottlenecks can be addressed jointly by training parts of the mixture independently and reconciling them once in parameter space. We develop a local quadratic theory inside a shared flat basin that yields three results: weight merging produces a curvature-weighted variance reduction; PCA-aligned conflict splitting maximizes this gain along high-curvature directions; and merging additionally acts as spectral filtering with implicit norm regularization. These results directly motivate MERIT, a decentralized merge-ready instruction-tuning pipeline that estimates dataset-level gradient conflicts, partitions the mixture along the top PCA conflict axes, fine-tunes each partition independently with no inter-partition communication, and merges once via token-weighted averaging. On Qwen2.5-VL-3B with 136 Vision-FLAN tasks, MERIT improves the 8-benchmark average from 54.3 (joint training) to 57.0. The same recipe scales to a 7B model on a 1.6M-example, 176-source mixture -- matching or exceeding centralized joint training with minimal cost overhead -- and transfers to text-only FLAN. Our code is available at https://github.com/naver-ai/merit.', 'score': 2, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'b5ceb096b68eb779', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#architecture', '#multimodal'], 'emoji': '🔀', 'ru': {'title': 'Децентрализованная настройка через умное слияние моделей', 'desc': 'В статье предложен метод MERIT для улучшения инструктивной настройки больших языковых моделей через децентрализованное обучение. Авторы разбивают смешанные датасеты на части, основываясь на конфликтах градиентов, а затем объединяют результаты с помощью взвешенного усреднения параметров. Теоретический анализ показывает, что слияние моделей обеспечивает редукцию дисперсии с учетом кривизны потерь и действует как спектральный фильтр. Экспериментально метод достигает качества централизованного обучения с существенно меньшей коммуникационной нагрузкой на мультимодальных моделях.'}, 'en': {'title': 'Decentralized Training for Enhanced Instruction Tuning', 'desc': 'This paper presents a method called MERIT for improving instruction tuning of large language models through decentralized training. It addresses issues of gradient conflicts and communication overhead by partitioning mixed datasets and training them independently before merging results. The approach utilizes a local quadratic theory to optimize weight merging and conflict splitting, enhancing performance while reducing the need for heavy synchronization. The results show that MERIT can achieve better or comparable performance to centralized methods with significantly lower costs, demonstrating its effectiveness across various model sizes and tasks.'}, 'zh': {'title': '去中心化的指令调优新方法', 'desc': '这篇论文提出了一种名为MERIT的去中心化指令调优方法，旨在提高大型语言模型的训练效率。通过将混合数据集根据梯度冲突进行分区，并在参数空间中合并结果，MERIT能够减少通信开销，同时保持与集中式方法相当的性能。研究表明，局部二次理论可以有效地减少权重合并后的曲率加权方差，并通过主成分分析（PCA）优化冲突分割。最终，MERIT在多个任务上实现了显著的性能提升，证明了其在处理异构数据集时的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.03979', 'title': 'Language Models Need Sleep: Learning to Self-Modify and Consolidate Memories', 'url': 'https://huggingface.co/papers/2606.03979', 'abstract': "Abstract Deep learning models with sleep and dreaming paradigms enable continual learning through memory consolidation and self-improvement phases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The past few decades have witnessed significant advances in the design of machine learning algorithms, from early studies on task-specific shallow models to more general deep Large Language Models (LLMs). Despite showing promising results in tasks that require instant prediction or in-context learning, existing models lack the ability to continually learn and effectively transfer their temporal in-context knowledge to their long-term parameters. Inspired by human learning process, we introduce a ''Sleep'' paradigm that allows the models to continually learn, distill their short-term fragile memories into stable long-term knowledge with replay, and recursively improve themselves with ''Dreaming'' process. In more detail, sleep consists of two stages: (1) Memory Consolidation: an upward distillation process, called Knowledge Seeding, where the memories of a smaller-self are distilled into a larger network to provide more capacity while preserving the knowledge. As a proof of concept, we present a new Generalized Distillation process for {Knowledge Seeding} (i.e., the combination of on-policy distillation with Reinforcement Learning (RL)-based imitation learning); (2) Dreaming: a self-improvement phase, where the model uses RL to generate a curriculum of synthetic data to rehearse new knowledge and refine existing capabilities without human supervision. Our experiments on long-horizon, continual learning, knowledge incorporation, and few-shot generalization tasks support the importance of the sleep stage.", 'score': 1, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '1d592ee347403532', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#architecture', '#rl'], 'emoji': '😴', 'ru': {'title': 'Непрерывное обучение через сон и сновидения: консолидация памяти для самосовершенствования моделей', 'desc': 'В работе предложена парадигма «Сна» для непрерывного обучения глубоких нейросетей, вдохновленная человеческим процессом обучения. Парадигма включает два этапа: консолидация памяти, где знания из меньшей сети дистиллируются в большую через процесс обобщенной дистилляции и обучение с подкреплением, и фаза «Сновидений», где модель самостоятельно генерирует синтетические данные для улучшения своих способностей. Предложенный подход позволяет моделям эффективно перемещать краткосрочные знания из контекста в долгосрочные параметры и рекурсивно улучшать себя без человеческого надзора. Экспериментальные результаты на задачах непрерывного обучения, долгосрочного планирования и обобщения на небольших наборах данных демонстрируют важность предложенной парадигмы.'}, 'en': {'title': 'Unlocking Continual Learning Through Sleep and Dreaming in AI', 'desc': "This paper presents a novel approach to continual learning in deep learning models by mimicking human sleep and dreaming processes. The proposed 'Sleep' paradigm allows models to consolidate short-term memories into long-term knowledge through a two-stage process: Memory Consolidation and Dreaming. Memory Consolidation involves distilling knowledge from a smaller model into a larger one, enhancing capacity while retaining information. The Dreaming phase enables self-improvement by generating synthetic data for the model to practice and refine its skills autonomously, leading to better performance in various learning tasks."}, 'zh': {'title': '通过睡眠与梦境实现持续学习的深度学习模型', 'desc': '这篇论文介绍了一种新的深度学习模型，通过引入“睡眠”和“梦境”范式来实现持续学习。模型在“睡眠”阶段进行记忆巩固，将短期记忆转化为长期知识，并在“梦境”阶段自我改进。具体来说，记忆巩固包括知识播种的过程，将小模型的记忆提炼到大模型中，以保留知识并增加容量。实验结果表明，这种睡眠阶段对长期学习和知识整合具有重要意义。'}}}, {'id': 'https://huggingface.co/papers/2606.03985', 'title': 'Humanoid-GPT: Scaling Data and Structure for Zero-Shot Motion Tracking', 'url': 'https://huggingface.co/papers/2606.03985', 'abstract': 'Abstract Humanoid-GPT is a GPT-style Transformer with causal attention trained on a billion-scale motion corpus that achieves zero-shot generalization to unseen motions and control tasks through scalable pre-training on diverse motion data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Humanoid-GPT, a GPT-style Transformer with causal attention trained on a billion-scale motion corpus for whole-body control. Unlike prior shallow MLP trackers constrained by scarce data and an agility-generalization trade-off, Humanoid-GPT is pre-trained on a 2B-frame retargeted corpus that unifies all major mocap datasets with large-scale in-house recordings. Scaling both data and model capacity yields a single generative Transformer that tracks highly dynamic behaviors while achieving unprecedented zero-shot generalization to unseen motions and control tasks. Extensive experiments and scaling analyses show that our model establishes a new performance frontier, demonstrating robust zero-shot generalization to unseen tasks while simultaneously tracking highly dynamic and complex motions.', 'score': 1, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '40cf2d057e0627fc', 'authors': ['Zekun Qi', 'Xuchuan Chen', 'Dairu Liu', 'Chenghuai Lin', 'Yunrui Lian', 'Sikai Liang', 'Zhikai Zhang', 'Yu Guan', 'Jilong Wang', 'Wenyao Zhang', 'Xinqiang Yu', 'He Wang', 'Li Yi'], 'affiliations': ['Galbot Inc.', 'Peking University', 'Shanghai Jiao Tong University', 'Shanghai Qi Zhi Institute', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03985.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Масштабный трансформер для реалистичного управления движениями человекоида', 'desc': 'Humanoid-GPT — это трансформер в стиле GPT с причинной аттентацией, обученный на корпусе из миллиарда кадров движений для управления полным телом человекоида. В отличие от предыдущих моделей, основанных на МЛП с ограниченными данными, эта модель предварительно обучена на 2 млрд кадров, объединяющих все основные датасеты захвата движений с большим объёмом внутренних записей. Масштабирование как данных, так и архитектуры модели позволило создать единый генеративный трансформер, который отслеживает сложные динамические движения и достигает нулевой обобщаемости на неиспользованные в обучении движения и задачи управления. Экспериментальные результаты и анализ масштабирования демонстрируют новый уровень производительности с надёжной нулевой обобщаемостью при одновременном отслеживании высокодинамичных и сложных движений.'}, 'en': {'title': 'Revolutionizing Motion Control with Zero-Shot Generalization', 'desc': 'Humanoid-GPT is a novel GPT-style Transformer designed for whole-body motion control, utilizing causal attention mechanisms. It is trained on a massive dataset comprising a billion motion frames, allowing it to generalize to new and unseen motion tasks without prior specific training. This model overcomes limitations of previous shallow MLP trackers by leveraging a diverse and extensive motion corpus, which includes major motion capture datasets and in-house recordings. The results indicate that Humanoid-GPT achieves superior performance in tracking complex behaviors and demonstrates remarkable zero-shot generalization capabilities.'}, 'zh': {'title': 'Humanoid-GPT：突破性的人形控制模型', 'desc': 'Humanoid-GPT是一种基于GPT的变换器，采用因果注意力机制，训练于十亿规模的运动数据集。与之前受限于数据稀缺的浅层多层感知器不同，Humanoid-GPT通过在一个包含2B帧的重定向数据集上进行预训练，能够实现对复杂动态行为的跟踪。该模型在未见过的运动和控制任务上实现了零-shot泛化，展现出强大的适应能力。实验结果表明，Humanoid-GPT在性能上达到了新的前沿，能够同时处理复杂的动态动作。'}}}, {'id': 'https://huggingface.co/papers/2606.03920', 'title': 'Benchmarking Visual State Tracking in Multimodal Video Understanding', 'url': 'https://huggingface.co/papers/2606.03920', 'abstract': "Abstract Current multimodal large language models struggle with visual state tracking in videos, performing poorly even when human-level capabilities are required, and existing agentic approaches do not effectively address these limitations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Understanding a video requires more than recognizing isolated moments, as humans continuously track entities, states, and events over time. This capacity for visual state tracking is fundamental to video understanding, yet remains underexplored in current evaluations of Multimodal Large Language Models (MLLMs). We introduce Visual STAte Tracking benchmark (VSTAT), a video-based benchmark designed to diagnose visual state tracking in MLLMs. VSTAT consists of 834 clips drawn from both synthetic and real-world videos, paired with 1,500 questions that cannot be answered from any single frame or short segment, requiring continuous perception and integration of events across the entire video stream. Despite their strong performance on existing video benchmarks, we find that state-of-the-art MLLMs perform far below humans and only modestly above answer-prior baselines. To analyze this gap, we compare MLLMs' thinking traces with the underlying video stream to understand why and when MLLMs fail on VSTAT. We find that MLLMs reason and track correctly in text, but fail at visually perceiving the events they need to track. Finally, our preliminary evaluation suggests that recent agentic approaches, including MLLM-based video agents and coding agents, do not readily resolve these failures, still falling short on VSTAT.", 'score': 1, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '69ce8d267bb230fa', 'authors': ['Sihyun Yu', 'Nanye Ma', 'Pinzhi Huang', 'Hyunseok Lee', 'Shusheng Yang', 'June Suk Choi', 'Ellis Brown', 'Oscar Michel', 'Boyang Zheng', 'Jinwoo Shin', 'Saining Xie'], 'affiliations': ['KAIST', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03920.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#interpretability', '#long_context', '#synthetic', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Диагностика слепоты языковых моделей к визуальному отслеживанию состояния в видео', 'desc': 'В работе представлен новый бенчмарк VSTAT для оценки способности мультимодальных больших языковых моделей (MLLM) отслеживать визуальное состояние в видео. Бенчмарк содержит 834 видеоклипа и 1500 вопросов, которые невозможно ответить из одного кадра и требуют непрерывного восприятия событий на протяжении всего видео. Авторы обнаружили, что современные MLLM значительно отстают от человека в этой задаче, при этом их рассуждения в тексте остаются корректными, но визуальное восприятие необходимых событий нарушается. Исследование показывает, что даже агентные подходы, основанные на MLLM и кодировании, не решают выявленные проблемы отслеживания состояния.'}, 'en': {'title': 'Enhancing Video Understanding: Bridging the Gap in Visual State Tracking', 'desc': "This paper addresses the limitations of multimodal large language models (MLLMs) in visual state tracking within videos. It introduces the Visual STAte Tracking benchmark (VSTAT), which evaluates MLLMs' ability to continuously perceive and integrate information across video clips. The study reveals that while MLLMs perform well on traditional benchmarks, they significantly underperform compared to humans on VSTAT, particularly in visually tracking events. The authors analyze the reasoning processes of MLLMs and find that their failures stem from inadequate visual perception, indicating that current agentic approaches do not effectively improve their performance."}, 'zh': {'title': '提升视频理解的视觉状态跟踪能力', 'desc': '当前的多模态大型语言模型在视频中的视觉状态跟踪方面表现不佳，尤其是在需要人类水平能力的情况下。理解视频不仅仅是识别孤立的瞬间，人类能够持续跟踪实体、状态和事件。我们提出了视觉状态跟踪基准（VSTAT），这是一个旨在诊断多模态大型语言模型视觉状态跟踪能力的视频基准。尽管现有模型在其他视频基准上表现良好，但在VSTAT上，它们的表现远低于人类，且仅略高于基线水平。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (3)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (2)', '#cv (1)', '#data', '#dataset', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (4)', '#open_source', '#optimization (1)', '#plp', '#rag', '#reasoning', '#rl (1)', '#rlhf (1)', '#robotics (2)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (4)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-03 02:55',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-03 02:55')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-03 02:55')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
