 'Angela Dai', 'Matthias Nießner'], 'affiliations': ['Computing Systems Lab, Huawei Technologies, Switzerland', 'Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2605.23888.jpg', 'data': {'categories': ['#cv', '#multimodal', '#3d'], 'emoji': '🏠', 'ru': {'title': 'Масштабируемая 3D реконструкция сцен через локальную генерацию с мультивидовым кондиционированием', 'desc': 'Авторы предлагают новый метод для 3D реконструкции сцен на основе мультивидов, который интегрирует генеративные приоры с кондиционированием по изображениям. Сцена разбивается на пересекающиеся локальные части, которые реконструируются независимо с использованием сильной генеративной модели Trellis.2. Механизм проекционного кондиционирования позволяет согласовать признаки из мультивидов в единое 3D представление, независимое от порядка камер. Метод производит высокочастотные, многовидово-согласованные и редактируемые PBR-меши внутренних помещений, превосходя существующие подходы на 16%.'}, 'en': {'title': 'Revolutionizing 3D Scene Reconstruction with Generative Models', 'desc': 'This paper presents a new method for creating detailed 3D models of indoor spaces using multiple images taken from different angles. It combines advanced generative 3D models with image data to ensure that the resulting mesh is both accurate and editable. The approach involves breaking down the scene into smaller, manageable sections, allowing for efficient processing and high-quality output. By leveraging a strong generative prior, the method achieves superior results compared to existing techniques, improving fidelity by 16%.'}, 'zh': {'title': '高保真三维场景重建的新方法', 'desc': '本文提出了一种新颖的三维场景重建方法，结合了生成性三维先验和多视图图像条件，以生成高保真、可编辑的室内环境网格重建。我们将场景重建视为在一组空间局部、重叠的块上进行条件三维生成，从而扩展到大规模场景。该方法继承了最先进的生成形状模型的保真度和完整性，并通过投影基础的条件机制，将多视图图像特征提升为与生成模型一致的三维表示。最终，我们的结果在保真度上超越了最前沿的重建方法，提升了16%。'}}}, {'id': 'https://huggingface.co/papers/2605.19282', 'title': 'Rethinking Muon Beyond Pretraining: Spectral Failures and High-Pass Remedies for VLA and RLVR', 'url': 'https://huggingface.co/papers/2605.19282', 'abstract': "Abstract Muon's spectral whitening approach in LLM pretraining is replaced by Pion, which uses a high-pass NS iteration to stabilize training in low-rank and low-SNR regimes while maintaining computational efficiency and supporting per-head updates.  AI-generated summary Muon is a matrix-aware optimizer that leverages Newton-Schulz (NS) iterations to enforce spectral gradient orthogonalization by driving all singular values of the momentum matrix toward 1. While this uniform spectral whitening enhances exploration and outperforms AdamW in LLM pretraining, we show it could lead to fundamental limitations beyond pretraining in two regimes: (i) cross-modality vision-language-action (VLA) training, where inherently low-rank action-module gradients cause amplification of noisy tail directions, and (ii) reinforcement learning with verifiable rewards (RLVR), where low-SNR gradients and the need to preserve per-head specialization from prior training make whitening unstable. To address these challenges, we propose Pion, a drop-in replacement for Muon that preserves its computational efficiency while replacing uniform spectral whitening with a two-stage Promotion+Suppression mechanism, which we call the high-pass NS iteration. This design induces a sharp spectral high-pass effect, anchoring dominant singular values at 1 while suppressing noisy tail components toward 0, with controllable filter strength. To preserve pretrained per-head heterogeneity, Pion also supports a per-head mode that applies updates independently across attention heads via a simple reshape, at no extra cost. In VLA training on LIBERO and LIBERO-Plus, Pion consistently outperforms both baselines across l_1-regression (VLA-Adapter) and flow-matching (VLANeXt) architectures, e.g., reaching 100% success rate on LIBERO Object after 1,500 training steps with VLA-Adapter, vs. 97.0% for Muon and only 32.2% for AdamW. The advantage of Pion further extends to a real Franka Research 3 robot with a pi_0.5 backbone under the DROID setup on three grasp-and-place tasks. In RLVR post-training on Qwen3-1.7B/4B with GRPO and GMPO, Pion also outperforms AdamW on MATH and GSM8K while Muon collapses to zero.", 'score': 4, 'issue_id': 2305, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'ff92c1333c495ae6', 'authors': ['Chongyu Fan', 'Gaowen Liu', 'Mingyi Hong', 'Ramana Rao Kompella', 'Sijia Liu'], 'affiliations': ['Cisco', 'IBM Research', 'Michigan State University', 'University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2605.19282.jpg', 'data': {'categories': ['#architecture', '#small_models', '#optimization', '#robotics', '#multimodal', '#rl', '#training'], 'emoji': '⚡', 'ru': {'title': 'Высокочастотная фильтрация вместо универсального спектрального отбеливания', 'desc': 'Статья представляет Pion — новый оптимизатор, который улучшает алгоритм Muon для обучения больших языковых моделей в сложных сценариях. Основная инновация заключается в замене универсального спектрального отбеливания на механизм высокочастотной фильтрации, который подавляет шумные компоненты градиентов при сохранении доминирующих сингулярных значений. Pion демонстрирует стабильность в режимах низкого ранга и низкого отношения сигнал-шум, сохраняя вычислительную эффективность и позволяя применять независимые обновления для каждой головы внимания. Метод показывает значительное улучшение на задачах мультимодального обучения и обучении с подкреплением с проверяемыми наградами по сравнению с базовыми методами.'}, 'en': {'title': 'Pion: Optimizing LLM Training with High-Pass Spectral Control', 'desc': 'This paper introduces Pion, a new optimization method for large language model (LLM) pretraining that improves upon the Muon approach. Pion utilizes a high-pass Newton-Schulz (NS) iteration to stabilize training in scenarios with low-rank and low-signal-to-noise ratio (SNR) gradients, while also allowing for efficient per-head updates. The method enhances performance in cross-modality vision-language-action (VLA) training and reinforcement learning with verifiable rewards (RLVR) by suppressing noisy gradient components. Experimental results show that Pion significantly outperforms both Muon and AdamW in various tasks, demonstrating its effectiveness in maintaining training stability and efficiency.'}, 'zh': {'title': 'Pion：优化大规模语言模型训练的新方法', 'desc': '本文提出了一种名为Pion的优化器，旨在替代Muon在大规模语言模型（LLM）预训练中的谱白化方法。Pion通过高通NS迭代机制，稳定低秩和低信噪比（SNR）条件下的训练，同时保持计算效率，并支持每个头的独立更新。与传统的均匀谱白化不同，Pion采用了双阶段的促进与抑制机制，有效地抑制了噪声成分，确保主导奇异值保持在1。实验结果表明，Pion在多模态训练和强化学习任务中均优于现有的优化器，显示出其在实际应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.17766', 'title': 'LatentUMM: Dual Latent Alignment for Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2605.17766', 'abstract': 'Abstract LatentUMM addresses multimodal consistency issues by constructing an enhanced shared latent space that explicitly aligns transformations between modalities and stabilizes latent dynamics during generation and re-encoding processes.  AI-generated summary Unified multimodal models (UMMs) achieve strong performance in both understanding and generation by learning a shared latent space, yet they often exhibit functional inconsistency between these two capabilities. We observe that this issue does not stem from a lack of shared representations, but from the absence of explicit alignment between the transformations that map into and out of the latent space. As a result, generation and re-encoding can follow inconsistent trajectories, leading to semantic drift under modality transitions. In this work, we propose LatentUMM, a framework that constructs an enhanced shared latent space to explicitly align these transformations and improve cross-modal consistency. LatentUMM consists of two stages. First, dual latent alignment enforces consistency at both the modality and capacity levels: cross-modal alignment uses a stronger embedding model to impose structured cross-modal semantics, while dual capacity alignment enforces bidirectional consistency under generation and re-encoding. Second, latent dynamics stabilization improves robustness via stochastic latent rollouts and preference optimization, favoring trajectories that better preserve semantic consistency. Experiments show that LatentUMM consistently improves multimodal consistency across diverse architectures. Code is available at: https://github.com/AIFrontierLab/TorchUMM/tree/main/src/umm/post_training/LatentUMM.', 'score': 4, 'issue_id': 2307, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'e56863f34a259560', 'authors': ['Yinyi Luo', 'Wenwen Wang', 'Hayes Bai', 'Marios Savvides', 'Jindong Wang'], 'affiliations': ['Carnegie Mellon University', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2605.17766.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#training'], 'emoji': '🔗', 'ru': {'title': 'Согласованность мультимодальных моделей через выравнивание латентных преобразований', 'desc': 'LatentUMM решает проблему несогласованности между возможностями понимания и генерации в унифицированных мультимодальных моделях. Авторы выявили, что проблема заключается не в отсутствии общего латентного пространства, а в отсутствии явного выравнивания между преобразованиями, которые отображают данные в латентное пространство и из него. Предложенный фреймворк использует двойное выравнивание латентных переменных на уровнях модальности и пропускной способности, а также стабилизацию динамики латентного пространства через стохастические развертывания и оптимизацию предпочтений. Экспериментальные результаты демонстрируют, что LatentUMM улучшает кроссмодальную согласованность на различных архитектурах моделей.'}, 'en': {'title': 'Enhancing Multimodal Consistency with LatentUMM', 'desc': 'LatentUMM is a framework designed to enhance the consistency of multimodal models by creating a shared latent space that aligns transformations between different modalities. It addresses the issue of functional inconsistency that arises during the generation and re-encoding processes, which can lead to semantic drift. The framework employs dual latent alignment to ensure consistency in both modality and capacity, while also stabilizing latent dynamics through stochastic rollouts. Experiments demonstrate that LatentUMM significantly improves cross-modal consistency across various architectures.'}, 'zh': {'title': '增强共享潜在空间，提升多模态一致性', 'desc': 'LatentUMM 是一种解决多模态一致性问题的框架，通过构建增强的共享潜在空间来明确对齐模态之间的转换，并在生成和重新编码过程中稳定潜在动态。该方法的核心在于双重潜在对齐，确保模态和容量层面的连贯性，同时通过随机潜在展开和偏好优化来增强鲁棒性。实验结果表明，LatentUMM 在不同架构中一致地提高了多模态一致性。该框架的代码可在 GitHub 上获取。'}}}, {'id': 'https://huggingface.co/papers/2605.23892', 'title': "Good Token Hunting: A Hitchhiker's Guide to Token Selection for Visual Geometry Transformers", 'url': 'https://huggingface.co/papers/2605.23892', 'abstract': 'Abstract Visual geometry transformers are accelerated through a two-stage token selection framework that reduces computational costs while maintaining performance.  AI-generated summary Visual geometry transformers have become powerful architectures for multi-view 3D reconstruction, enabling joint prediction of multiple 3D attributes in a feed-forward manner. However, their computational cost grows quadratically with the input sequence length due to the global attention layers inside these models. This limits both their scalability and efficiency. In this work, we address this challenge with a simple yet general strategy: restricting the number of key/value tokens that each query interacts with during global attention. To achieve effective token selection, we introduce a two-stage framework. First, an inter-frame selection step operates at the frame level to identify frames that should be preserved. Second, an intra-frame selection step further discards more redundant tokens within the selected frames. Our analysis highlights the advantage of a diversity-based strategy for inter-frame selection, which ensures broad coverage of the scene. For intra-frame selection, we show that layer-aware sparsification is necessary, with the selection process guided by the entropy of the global attention pattern. Our approach offers a superior speed-accuracy trade-off compared to existing solutions. Extensive experiments show that it accelerates visual geometry transformers by over 85% for scenes with 500 images while maintaining, or even improving, baseline performance, which hints that how our token selection strategy can play a crucial role in future applications of visual geometry transformers. Our project website is available at https://zsh2000.github.io/good-token-hunting.github.io.', 'score': 3, 'issue_id': 2306, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'b1767155e162b0c8', 'authors': ['Shuhong Zheng', 'Michael Oechsle', 'Erik Sandström', 'Marie-Julie Rakotosaona', 'Federico Tombari', 'Igor Gilitschenski'], 'affiliations': ['Google', 'Technical University of Munich', 'University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.23892.jpg', 'data': {'categories': ['#3d', '#inference', '#architecture', '#cv'], 'emoji': '⚡', 'ru': {'title': 'Охота за хорошими токенами: ускорение визуальных трансформеров через умный отбор', 'desc': 'Работа представляет метод ускорения визуальных геометрических трансформеров через двухэтапный механизм отбора токенов. Авторы решают проблему квадратичного роста вычислительной сложности механизма глобального внимания, ограничивая количество ключей и значений, с которыми взаимодействует каждый запрос. Предложенный подход включает отбор на уровне кадров с использованием стратегии, основанной на разнообразии, и внутрикадровую разреживание, направляемую энтропией паттернов внимания. Метод достигает ускорения более чем на 85% при обработке сцен с 500 изображениями, сохраняя или улучшая производительность модели.'}, 'en': {'title': 'Accelerating Visual Geometry Transformers with Smart Token Selection', 'desc': 'This paper presents a method to enhance visual geometry transformers by implementing a two-stage token selection framework. The approach reduces the computational burden associated with global attention layers, which typically increase costs quadratically with input length. By selectively choosing key/value tokens for each query, the method improves efficiency while preserving or even boosting performance. The results demonstrate a significant acceleration of over 85% in processing time for large scenes, indicating the potential for broader applications in 3D reconstruction tasks.'}, 'zh': {'title': '加速视觉几何变换器的令牌选择策略', 'desc': '本文提出了一种两阶段的令牌选择框架，以加速视觉几何变换器，同时降低计算成本。视觉几何变换器在多视角三维重建中表现出色，但由于全局注意力层的存在，其计算成本随着输入序列长度的增加而呈平方增长。我们通过限制每个查询与之交互的关键/值令牌数量来解决这一问题，首先在帧级别进行选择，然后在选定的帧内进一步剔除冗余令牌。实验结果表明，该方法在保持或提升基线性能的同时，能够将视觉几何变换器的速度提高超过85%。'}}}, {'id': 'https://huggingface.co/papers/2604.20665', 'title': 'The Expense of Seeing: Attaining Trustworthy Multimodal Reasoning Within the Monolithic Paradigm', 'url': 'https://huggingface.co/papers/2604.20665', 'abstract': 'Abstract Vision-Language Models often fail to faithfully synthesize multimodal data due to reliance on language priors over visual representation, necessitating new evaluation frameworks that prioritize semantic sufficiency over traditional multimodal gain metrics.  AI-generated summary The rapid proliferation of Vision-Language Models (VLMs) is often framed as enabling unified multimodal knowledge discovery but rests on an under-examined assumption: that current VLMs faithfully synthesise multimodal data. We argue they often do not, and this gap reflects a trustworthiness problem in the dominant Vision Encoder-Projector-LLM paradigm. Rather than extracting grounded knowledge from visual inputs, state-of-the-art models frequently exhibit functional blindness, i.e., exploiting strong language priors to bypass severe visual representation bottlenecks. In this work, we challenge the conventional methodology of multimodal evaluation, which relies on data ablation or new dataset creation and therefore conflates dataset biases with architectural incapacity. We propose an information-theoretic departure: the Modality Translation Protocol, designed to quantify what we call the Expense of Seeing. By translating semantic payloads rather than ablating them, we formulate three novel metrics -- the Toll (ToS), Curse (CoS), and Fallacy (FoS) of Seeing -- culminating in the Semantic Sufficiency Criterion (SSC). Furthermore, we hypothesise a Divergence Law of Multimodal Scaling: as the underlying language engines scale to unprecedented reasoning capabilities, the penalty of the visual knowledge bottleneck may increase rather than diminish. We argue the community should move beyond "multimodal gain" as a primary evaluation target. By elevating the SSC from a passive diagnostic constraint to an active architectural blueprint, we provide a foundation for guiding the next generation of AI systems toward genuine multimodal reasoning.', 'score': 3, 'issue_id': 2306, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '2272d8b81c793509', 'authors': ['Karan Goyal'], 'affiliations': ['IIIT Delhi, India'], 'pdf_title_img': 'assets/pdf/title_img/2604.20665.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#cv'], 'emoji': '👁️', 'ru': {'title': 'Истинное видение: от мультимодального прироста к семантической достаточности', 'desc': 'В статье анализируются проблемы Vision-Language Models, которые часто не синтезируют мультимодальные данные корректно, полагаясь на языковые приоры вместо визуальной информации. Авторы предлагают новую информационно-теоретическую методологию оценки — Modality Translation Protocol, которая вводит три метрики (Toll, Curse и Fallacy of Seeing) для измерения «стоимости видения». Они выдвигают гипотезу о законе расхождения при масштабировании мультимодальных моделей: при увеличении способностей языковой части узкое место визуального представления может только усугубляться. Авторы предлагают переориентировать оценку моделей с традиционного мультимодального прироста на критерий семантической достаточности для развития подлинно мультимодального рассуждения.'}, 'en': {'title': 'Rethinking Multimodal Evaluation: Beyond Language Bias', 'desc': "This paper critiques the current Vision-Language Models (VLMs) for their inability to effectively integrate visual and language data, often relying too heavily on language at the expense of visual understanding. The authors introduce a new evaluation framework called the Modality Translation Protocol, which focuses on measuring the 'Expense of Seeing' to better assess how well these models synthesize multimodal information. They propose three metrics to evaluate this synthesis: the Toll, Curse, and Fallacy of Seeing, leading to the Semantic Sufficiency Criterion (SSC). The paper argues for a shift in the evaluation focus from traditional multimodal gains to ensuring that models genuinely understand and utilize visual data alongside language."}, 'zh': {'title': '超越多模态增益，追求语义充分性', 'desc': '本文探讨了视觉-语言模型（VLMs）在合成多模态数据时的不足，主要是因为它们过于依赖语言先验而忽视视觉表示。我们提出了一种新的评估框架，强调语义充分性，而不是传统的多模态增益指标。通过引入模态翻译协议，我们定义了三种新指标，旨在量化视觉知识瓶颈的影响。我们认为，随着语言引擎的扩展，视觉知识瓶颈的惩罚可能会加剧，因此需要重新审视多模态评估的目标。'}}}, {'id': 'https://huggingface.co/papers/2605.17873', 'title': 'HINT-SD: Targeted Hindsight Self-Distillation for Long-Horizon Agents', 'url': 'https://huggingface.co/papers/2605.17873', 'abstract': 'Abstract HINT-SD is a targeted self-distillation framework that selects failure-relevant actions from full trajectories to improve long-horizon LLM agent training efficiency and effectiveness.  AI-generated summary Training long-horizon LLM agents with reinforcement learning is challenging because sparse outcome rewards reveal whether a task succeeds, but not which intermediate actions caused the outcome or how they should be corrected. Recent methods alleviate this issue by generating rewards or textual hints from turn-level action-output signals, or by using feedback-conditioned self-distillation. However, generating feedback at every turn is inefficient when many intermediate turns are already successful or neutral, and applying feedback at a fixed or misaligned turn often fails to supervise the actions that contributed to the failure. To bridge this gap, we propose HINT-SD, a targeted self-distillation framework that uses full-trajectory hindsight to select failure-relevant actions and applies feedback-conditioned distillation only on targeted action spans. Experiments on BFCL v3 and AppWorld show that our method improves over the dense per-turn feedback baseline by up to 18.80 percent while achieving 2.26times lower time per training step, suggesting that selecting where to distill is a key factor for both effective and efficient long-horizon agent training.', 'score': 3, 'issue_id': 2306, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '81996bea51b7fe2a', 'authors': ['Woongyeng Yeo', 'Yumin Choi', 'Taekyung Ki', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2605.17873.jpg', 'data': {'categories': ['#agents', '#training', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Умная дистилляция: обучай только то, что важно для ошибок', 'desc': 'HINT-SD — это фреймворк целевого самодистилляции, который решает проблему неэффективности обучения LLM-агентов с подкреплением на длительных горизонтах. Вместо генерации обратной связи на каждом шаге, метод анализирует полные траектории и выбирает только те действия, которые действительно привели к неудаче. Затем дистилляция, управляемая обратной связью, применяется только к выбранным действиям, что значительно снижает вычислительные затраты. Эксперименты показывают, что целевой подход улучшает качество обучения на 18.80% при одновременном снижении времени обучения в 2.26 раза.'}, 'en': {'title': 'Targeted Self-Distillation for Efficient LLM Training', 'desc': 'The paper introduces HINT-SD, a self-distillation framework designed to enhance the training of long-horizon LLM agents in reinforcement learning. It addresses the challenge of sparse rewards by focusing on failure-relevant actions from complete trajectories, rather than providing feedback at every turn. This targeted approach allows for more efficient training by applying feedback only to specific actions that contribute to failures. Experimental results demonstrate that HINT-SD significantly improves training efficiency and effectiveness compared to traditional methods, highlighting the importance of selective distillation in agent training.'}, 'zh': {'title': '选择性蒸馏，提升长时间跨度代理训练效率', 'desc': 'HINT-SD是一种针对性的自蒸馏框架，旨在从完整轨迹中选择与失败相关的动作，以提高长时间跨度大语言模型（LLM）代理的训练效率和效果。传统的强化学习方法在训练长时间跨度的LLM代理时面临挑战，因为稀疏的结果奖励只能显示任务是否成功，而无法指明哪些中间动作导致了结果或如何进行修正。HINT-SD通过利用完整轨迹的回顾，选择与失败相关的动作，并仅在目标动作区间应用反馈条件的蒸馏，从而解决了这一问题。实验结果表明，该方法在训练效率和效果上均优于传统的每步反馈方法。'}}}, {'id': 'https://huggingface.co/papers/2605.21856', 'title': 'The Illusion of Reasoning: Exposing Evasive Data Contamination in LLMs via Zero-CoT Truncation', 'url': 'https://huggingface.co/papers/2605.21856', 'abstract': "Abstract A black-box detection method called Zero-CoT Probe is introduced to identify data contamination in large language models by truncating reasoning processes and comparing performance on original and perturbed datasets.  AI-generated summary Large language models (LLMs) have demonstrated impressive reasoning abilities across a wide range of tasks, but data contamination undermines the objective evaluation of these capabilities. This problem is further exacerbated by malicious model publishers who use evasive, or indirect, contamination strategies, such as paraphrasing benchmark data to evade existing detection methods and artificially boost leaderboard performance. Current approaches struggle to reliably detect such stealthy contamination. In this work, we uncover a critical phenomenon: a model's generated reasoning steps actively mask its underlying memorization. Inspired by this, we propose the Zero-CoT Probe (ZCP), a novel black-box detection method that deliberately truncates the entire Chain-of-Thought (CoT) process to expose latent shortcut mappings. To further isolate memorization from the model's intrinsic problem-solving capabilities, ZCP compares the model's zero-CoT performance on the original benchmark against an isomorphically perturbed reference dataset. Furthermore, we introduce Contamination Confidence, a metric that quantifies both the likelihood and severity of contamination, moving beyond simple binary classifications. Extensive experiments on both previously identified contaminated models and specially fine-tuned contaminated models demonstrate that ZCP robustly detects both direct and evasive data contamination. The code for ZCP is accessible at https://github.com/Yifan-Lan/zero-cot-probe.", 'score': 1, 'issue_id': 2309, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '611b24f9e38a260e', 'authors': ['Yifan Lan', 'Yuanpu Cao', 'Hanyu Wang', 'Lu Lin', 'Jinghui Chen'], 'affiliations': ['The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21856.jpg', 'data': {'categories': ['#security', '#reasoning', '#leakage'], 'emoji': '🕵️', 'ru': {'title': 'Выявление скрытой меморизации через отключение цепочки рассуждений', 'desc': 'В работе предложен метод Zero-CoT Probe для обнаружения загрязнения данных в больших языковых моделях путём отключения цепочки рассуждений и сравнения производительности на исходном и возмущённом наборах данных. Авторы выявили, что процесс рассуждения маскирует скрытую меморизацию модели, поэтому удаление Chain-of-Thought позволяет обнажить прямые связи между входом и выходом. Метод сравнивает ноль-CoT производительность на оригинальных тестах с производительностью на изоморфно преобразованных контрольных наборах для изоляции меморизации от подлинных способностей модели. Введена метрика Contamination Confidence для количественной оценки вероятности и степени загрязнения, выходящая за рамки бинарной классификации.'}, 'en': {'title': 'Unmasking Contamination in Language Models with Zero-CoT Probe', 'desc': "The paper presents a new method called Zero-CoT Probe (ZCP) for detecting data contamination in large language models (LLMs). It addresses the challenge of identifying subtle contamination tactics used by malicious model publishers, which can distort performance evaluations. ZCP works by truncating the reasoning process of the model to reveal hidden memorization patterns and compares the model's performance on original and altered datasets. Additionally, it introduces a metric called Contamination Confidence to assess the extent of contamination, providing a more nuanced understanding than simple yes/no detections."}, 'zh': {'title': '揭示数据污染的黑箱检测新方法', 'desc': '本文介绍了一种名为Zero-CoT Probe的黑箱检测方法，用于识别大型语言模型中的数据污染。该方法通过截断推理过程，并比较原始数据集与扰动数据集的性能，来揭示模型的潜在记忆现象。我们提出的污染置信度指标可以量化污染的可能性和严重性，超越简单的二元分类。实验结果表明，Zero-CoT Probe能够有效检测直接和隐蔽的数据污染。'}}}, {'id': 'https://huggingface.co/papers/2605.21488', 'title': 'Equilibrium Reasoners: Learning Attractors Enables Scalable Reasoning', 'url': 'https://huggingface.co/papers/2605.21488', 'abstract': 'Abstract Equilibrium Reasoners enable scalable reasoning through task-conditioned attractors that guide latent dynamical systems toward valid solutions, achieving significant accuracy improvements through iterative test-time computation.  AI-generated summary Scaling test-time compute by iteratively updating a latent state has emerged as a powerful paradigm for reasoning. Yet the internal mechanisms that enable these iterative models to generalize beyond memorized patterns remain unclear. We hypothesize that generalizable reasoning arises from learning task-conditioned attractors: latent dynamical systems whose stable fixed points correspond to valid solutions.   We formalize this process through Equilibrium Reasoners (EqR), which enable test-time scaling without external verifiers or task-specific priors. EqR scales internal dynamics along two axes: depth, by running more iterations, and breadth, by aggregating stochastic trajectories from multiple initializations. Empirically, gains from test-time scaling are tightly coupled with stronger convergence toward solution-aligned attractors.   This attractor perspective allows neural networks to adaptively allocate test-time compute based on task difficulty. While simple cases converge within 1 to 5 iteration steps, harder cases benefit from massive test-time scaling. By unrolling up to the equivalent of 40,000 layers, scalable latent reasoning boosts accuracy from 2.6% for feedforward models to over 99% on Sudoku-Extreme. These results suggest that learned attractor landscapes provide a useful mechanistic lens for understanding scalable reasoning in iterative latent models.', 'score': 1, 'issue_id': 2310, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '31ae8e1813e9e38d', 'authors': ['Benhao Huang', 'Zhengyang Geng', 'Zico Kolter'], 'affiliations': ['CMU'], 'pdf_title_img': 'assets/pdf/title_img/2605.21488.jpg', 'data': {'categories': ['#architecture', '#training', '#interpretability', '#reasoning'], 'emoji': '🌀', 'ru': {'title': 'Аттракторные рассуждения: обучение в скрытых пространствах для масштабируемого логического вывода', 'desc': 'Equilibrium Reasoners — это новый подход к масштабируемым рассуждениям, основанный на изучении условных аттракторов в скрытых динамических системах. Модель использует итеративное обновление скрытого состояния во время тестирования, позволяя увеличивать вычисления как по глубине (больше итераций), так и по ширине (агрегирование траекторий из разных инициализаций). Эмпирически показано, что прибыль от масштабирования времени тестирования тесно связана с сходимостью к решениям-ориентированным аттракторам. На примере задачи Судоку модель достигает точности выше 99%, демонстрируя, что нейросети могут адаптивно распределять вычислительные ресурсы в зависимости от сложности задачи.'}, 'en': {'title': 'Harnessing Attractors for Scalable Reasoning in AI', 'desc': 'This paper introduces Equilibrium Reasoners (EqR), a novel approach that enhances reasoning in machine learning by using task-conditioned attractors. These attractors help guide latent dynamical systems to find valid solutions more effectively during test-time computation. The authors demonstrate that by iteratively updating the latent state and scaling the internal dynamics, the model can significantly improve accuracy, especially in complex tasks. The findings suggest that understanding the landscape of learned attractors is crucial for developing scalable reasoning capabilities in neural networks.'}, 'zh': {'title': '平衡推理器：可扩展推理的新视角', 'desc': '本文提出了平衡推理器（Equilibrium Reasoners），通过任务条件吸引子引导潜在动态系统朝向有效解，从而实现可扩展的推理。该方法在测试时通过迭代更新潜在状态，显著提高了准确性。我们假设可推广的推理源于学习任务条件吸引子，这些吸引子的稳定固定点对应有效解。实验结果表明，测试时的计算扩展与向解对齐的吸引子收敛性密切相关，表明学习的吸引子景观为理解迭代潜在模型中的可扩展推理提供了有用的机制视角。'}}}, {'id': 'https://huggingface.co/papers/2605.19354', 'title': 'Next-Acceleration-Scale Prediction for Autoregressive MRI Reconstruction', 'url': 'https://huggingface.co/papers/2605.19354', 'abstract': 'Abstract Discrete autoregressive MRI reconstruction using privileged information distillation achieves superior performance under extreme undersampling by leveraging visual autoregressive modeling techniques.  AI-generated summary MRI reconstruction is an inherently ill-posed inverse problem, since incomplete measurements admit many plausible solutions. This ambiguity becomes more severe under high acceleration, where pixel-domain continuous predictors tend to average over feasible reconstructions and suppress high-frequency anatomy. We address this limitation by moving reconstruction to discrete multi-scale latent space and posing it as autoregressive next-acceleration-scale prediction. Leveraging discrete priors proven effective in visual autoregressive modeling, our method restricts the solution to compact sequences of codebook tokens, enabling sharp reconstructions even from extremely sparse measurements. This discrete autoregressive formulation also aligns naturally with modern large language model post-training techniques. Building on this observation, we introduce on-policy privileged information distillation for visual autoregressive modeling, where a teacher is provided training only privileged context that is unavailable at inference, in our case fully sampled acquisitions, and supervises a student trained on its own rollouts, leading to consistent reconstruction gains. Through extensive experiments on the fastMRI benchmark, we show that our approach delivers improved reconstruction performance across diverse sampling patterns under extreme undersampling. Project website is https://yilmazkorkmaz1.github.io/discrete-mri-reconstruction-opd/{here}.', 'score': 0, 'issue_id': 2312, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '4505600405db329f', 'authors': ['Yilmaz Korkmaz', 'Vishal M. Patel'], 'affiliations': ['Johns Hopkins University, Baltimore MD 21218, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.19354.jpg', 'data': {'categories': ['#multimodal', '#healthcare', '#training', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Дискретное авторегрессионное восстановление МРI через дистилляцию привилегированной информации', 'desc': 'В работе предложен метод реконструкции МРI-изображений на основе дискретного авторегрессионного моделирования в скрытом пространстве, который эффективно работает при экстремальном подсэмплировании. Авторы используют подход из визуального авторегрессионного моделирования, ограничивая решение компактными последовательностями токенов кодбука, что позволяет избежать усреднения и сохранить резкие детали изображений. Для обучения модели применяется техника дистилляции привилегированной информации, где учитель имеет доступ к полносэмплированным данным только во время обучения, а студент обучается на основе собственных предсказаний. Экспериментальная оценка на бенчмарке fastMRI подтверждает превосходство метода при различных паттернах сэмплирования и сильном подсэмплировании.'}, 'en': {'title': 'Sharper MRI Reconstructions with Discrete Autoregressive Modeling', 'desc': 'This paper presents a novel method for reconstructing MRI images from very few samples using discrete autoregressive modeling techniques. The authors address the challenge of ambiguity in MRI reconstruction, especially under high acceleration, by transforming the problem into a discrete multi-scale latent space. By utilizing a codebook of tokens, their approach allows for sharper reconstructions, even when data is extremely sparse. Additionally, they introduce a training method called privileged information distillation, which enhances the learning process by using fully sampled data to guide the reconstruction of under-sampled images.'}, 'zh': {'title': '离散自回归MRI重建：极端欠采样下的优越表现', 'desc': '本文提出了一种基于特权信息蒸馏的离散自回归MRI重建方法，能够在极端欠采样情况下实现优越的性能。由于MRI重建是一个不适定的逆问题，缺失的测量会导致多种可能的解决方案，尤其在高加速下，这种模糊性更加严重。我们通过将重建转移到离散多尺度潜在空间，并将其视为自回归下一个加速尺度的预测，来解决这一限制。实验结果表明，我们的方法在不同采样模式下的重建性能显著提升。'}}}];

            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (4)', '#agents (5)', '#agi', '#alignment', '#architecture (7)', '#audio (1)', '#benchmark (8)', '#cv (7)', '#data', '#dataset (5)', '#diffusion (2)', '#ethics', '#games (1)', '#graphs (1)', '#hallucinations', '#healthcare (1)', '#inference (3)', '#interpretability (1)', '#leakage (1)', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (13)', '#open_source (3)', '#optimization (6)', '#plp', '#rag', '#reasoning (5)', '#rl (5)', '#rlhf (3)', '#robotics (1)', '#science (1)', '#security (1)', '#small_models (2)', '#story_generation', '#survey', '#synthetic', '#training (16)', '#transfer_learning (3)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-25 23:59',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-25 23:59')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-25 23:59')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
