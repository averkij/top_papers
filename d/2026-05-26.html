    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.23904', 'title': 'SkillOpt: Executive Strategy for Self-Evolving Agent Skills', 'url': 'https://huggingface.co/papers/2605.23904', 'abstract': 'Abstract SkillOpt introduces a systematic text-space optimizer for agent skills that trains skills as external agent state with stable updates and zero deployment inference overhead, achieving superior performance across multiple benchmarks and execution environments.  AI-generated summary Agent skills today are hand-crafted, generated one-shot, or evolved through loosely controlled self-revision, none of which behaves like a deep-learning optimizer for the skill, and none of which reliably improves over its starting point under feedback. We argue the skill should instead be trained as the external state of a frozen agent, with the same discipline that makes weight-space optimization reproducible. SkillOpt is, to our knowledge, the first systematic controllable text-space optimizer for agent skills: a separate optimizer model turns scored rollouts into bounded add/delete/replace edits on a single skill document, and an edit is accepted only when it strictly improves a held-out validation score. A textual learning-rate budget, rejected-edit buffer, and epoch-wise slow/meta update make skill training stable while adding zero inference-time model calls at deployment. Across six benchmarks, seven target models, and three execution harnesses (direct chat, Codex, Claude Code), SkillOpt is best or tied on all 52 evaluated (model, benchmark, harness) cells and beats every per-cell competitor among human, one-shot LLM, Trace2Skill, TextGrad, GEPA, and EvoSkill skills. On GPT-5.5 it lifts the average no-skill accuracy by +23.5 points in direct chat, by +24.8 inside the Codex agentic loop, and by +19.1 inside Claude Code. Transfer experiments further show that optimized skill artifacts retain value when moved across model scales, between Codex and Claude Code execution environments, and to a nearby math benchmark without further optimization.', 'score': 153, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'b26ee0731cfa8c41', 'authors': ['Yifan Yang', 'Ziyang Gong', 'Weiquan Huang', 'Qihao Yang', 'Ziwei Zhou', 'Zisu Huang', 'Yan Li', 'Xuemei Gao', 'Qi Dai', 'Bei Liu', 'Kai Qiu', 'Yuqing Yang', 'Dongdong Chen', 'Xue Yang', 'Chong Luo'], 'affiliations': ['Fudan University', 'Microsoft', 'Shanghai Jiao Tong University', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2605.23904.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#agents', '#transfer_learning', '#training'], 'emoji': '🎯', 'ru': {'title': 'Оптимизация навыков агентов как систематическая задача обучения внешнего состояния', 'desc': 'SkillOpt предлагает систематический оптимизатор навыков агентов в текстовом пространстве, который обучает навыки как внешнее состояние замороженного агента с использованием дисциплины, аналогичной оптимизации весов в глубоком обучении. Отдельная модель-оптимизатор преобразует оцененные траектории в контролируемые редакторские правки (добавление, удаление, замена) в документе навыка, принимая только улучшающие по валидационной метрике изменения. Метод включает текстовый бюджет обучения, буфер отклоненных правок и эпохвайз медленные обновления, обеспечивая стабильность обучения без дополнительных затрат на инференс во время развертывания. SkillOpt достигает лучших результатов на 52 комбинациях модель-бенчмарк-окружение, превосходя конкурирующие подходы и демонстрируя хорошую трансферность навыков между моделями и средами выполнения.'}, 'en': {'title': 'Revolutionizing Agent Skills with Systematic Text-Space Optimization', 'desc': 'SkillOpt is a novel approach that optimizes agent skills by treating them as an external state, allowing for stable updates without increasing deployment overhead. Unlike traditional methods that rely on hand-crafted or one-shot generated skills, SkillOpt employs a systematic text-space optimization technique that ensures improvements through controlled edits based on validation scores. This method utilizes a separate optimizer model to make precise adjustments to skill documents, ensuring that only beneficial changes are accepted. The results demonstrate significant performance gains across various benchmarks and models, showcasing the effectiveness of this new optimization strategy.'}, 'zh': {'title': '系统化的代理技能优化器', 'desc': 'SkillOpt 是一种系统化的文本空间优化器，用于代理技能的训练。它将技能视为外部代理状态，通过稳定的更新和零部署推理开销来实现优越的性能。与传统的手工制作或自我修正的技能生成方法不同，SkillOpt 采用深度学习优化器的方式进行技能训练。通过对技能文档进行有界的增删改操作，SkillOpt 在多个基准测试中表现出色，显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.20708', 'title': 'Rethinking Cross-Layer Information Routing in Diffusion Transformers', 'url': 'https://huggingface.co/papers/2605.20708', 'abstract': "Abstract Diffusion Transformers suffer from inefficient cross-layer information flow that traditional residual connections cannot address, prompting the introduction of a learnable, timestep-adaptive routing mechanism that improves training efficiency and model quality.  AI-generated summary Diffusion Transformers (DiTs) have become a de facto backbone of modern visual generation, and nearly every major axis of their design -- tokenization, attention, conditioning, objectives, and latent autoencoders -- has been extensively revisited. The residual stream that governs how information accumulates across layers, however, has been directly inherited from the original Transformer. In this paper, we present a systematic empirical analysis of cross-layer information flow in DiTs, jointly along depth and denoising timestep, and identify three concrete symptoms of traditional residual addition, namely monotonic forward magnitude inflation, sharp backward gradient decay, and pronounced block-wise redundancy. Motivated by this diagnosis, we propose Diffusion-Adaptive Routing (DAR), a drop-in residual replacement that performs learnable, timestep-adaptive, and non-incremental aggregation over the history of sublayer outputs. Moreover, the proposed DAR is compatible with many modern Transformer enhancement methods, such as REPA. On ImageNet 256times256, DAR improves SiT-XL/2 by 2.11 FID (7.56 vs.\\ 9.67) and matches the baseline's converged quality with 8.75times fewer training iterations. Stacked on top of REPA, it yields a 2times training acceleration in the early stage, suggesting cross-layer information routing as an underexplored design axis in diffusion modeling, one that operates orthogonally to existing representation-alignment objectives. Beyond pretraining, DAR can also be applied during the fine-tuning stage of large-scale T2I models and preserves high-frequency details during Distribution Matching Distillation.", 'score': 91, 'issue_id': 2306, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': 'aae64c7f56ba54e8', 'authors': ['Chao Xu', 'Maohua Li', 'Qirui Li', 'Yixuan Xu', 'Yanke Zhou', 'Yunhe Li', 'Cuifeng Shen', 'Hanlin Tang', 'Kan Liu', 'Tao Lan', 'Lin Qu', 'Shao-Qun Zhang'], 'affiliations': ['Alibaba Group', 'City University of Hong Kong', 'Nanjing University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20708.jpg', 'data': {'categories': ['#training', '#architecture', '#cv'], 'emoji': '🔄', 'ru': {'title': 'Адаптивная маршрутизация информации в диффузионных трансформерах', 'desc': 'В статье выявлены проблемы с потоком информации между слоями в Diffusion Transformers, которые унаследовали остаточные соединения из классической архитектуры. Авторы предлагают Diffusion-Adaptive Routing (DAR) — адаптивный механизм маршрутизации, который учитывает timestep денойзинга и позволяет более эффективно агрегировать выходы подслоёв. На задаче генерации изображений ImageNet 256×256 метод DAR улучшает качество генерации (FID с 9.67 до 7.56) и ускоряет тренировку в 8.75 раз. Предложенный подход совместим с другими методами улучшения Transformers и открывает новое направление оптимизации в диффузионном моделировании.'}, 'en': {'title': 'Enhancing Diffusion Transformers with Adaptive Routing', 'desc': 'This paper addresses the inefficiencies in information flow across layers in Diffusion Transformers (DiTs) caused by traditional residual connections. It introduces a new mechanism called Diffusion-Adaptive Routing (DAR), which allows for learnable and adaptive aggregation of information over time, improving both training efficiency and model performance. The authors provide empirical evidence of the limitations of existing methods, such as gradient decay and redundancy, and demonstrate that DAR significantly enhances model quality with fewer training iterations. Additionally, DAR is compatible with other Transformer enhancements, suggesting a new direction for improving diffusion modeling.'}, 'zh': {'title': '提升扩散变换器的信息流动效率', 'desc': '扩散变换器（DiTs）在信息流动方面存在效率低下的问题，传统的残差连接无法解决。本文提出了一种可学习的时间步自适应路由机制（DAR），旨在提高训练效率和模型质量。通过对跨层信息流的系统性实证分析，识别出传统残差加法的三个具体症状，并提出DAR作为残差的替代方案。实验结果表明，DAR在多个任务中显著提升了模型性能，并加快了训练速度。'}}}, {'id': 'https://huggingface.co/papers/2605.21573', 'title': 'Lens: Rethinking Training Efficiency for Foundational Text-to-Image Models', 'url': 'https://huggingface.co/papers/2605.21573', 'abstract': 'Abstract Lens is a compact 3.8B-parameter text-to-image model achieving superior performance with reduced training compute through dense caption datasets, multi-resolution batching, efficient architecture, and optimization techniques.  AI-generated summary We introduce Lens, a 3.8B-parameter T2I model that achieves performance competitive with, and in several cases surpassing, state-of-the-art models with more than 6B parameters across various benchmarks, while requiring significantly less training compute. For example, Lens requires only about 19.3% of the training compute used by Z-Image. The training efficiency of Lens stems from two key strategies beyond its compact model size. First, we maximize data information density per training batch by (i) training on Lens-800M, a dataset of 800M densely captioned image-text pairs whose captions are generated by GPT-4.1 and contain approximately 109 words on average, providing richer semantic supervision than conventional short captions, and (ii) constructing each batch from images with multiple resolutions and diverse aspect ratios, thereby enlarging the effective visual coverage of each optimization step. Second, we improve convergence speed through careful architectural choices, including adopting a semantic VAE that provides better latent representations and employing a strong language encoder that accelerates optimization while enabling multilingual generalization from English-only training data. After pre-training, we apply RL with taxonomy-driven prompts (Lens-RL-8K) and structured reward rubrics to suppress artifacts and improve visual quality, a reasoner module with training-free system prompt search to better align user requests with the model, and distillation-based acceleration for 4-step inference. Through efficient training and systematic optimization, Lens generalizes to arbitrary aspect ratios from 1:2 to 2:1 and resolutions up to 1440^2, and supports prompts in several commonly used languages. Thanks to its compact size, Lens generates a 1024^2 image in 3.15 seconds on a single NVIDIA H100 GPU, while its distilled turbo version performs 4-step generation in 0.84 seconds.', 'score': 89, 'issue_id': 2305, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '937ed264d691c449', 'authors': ['Dong Chen', 'Fangyun Wei', 'Ziyu Wan', 'Dongdong Chen', 'Jiawei Zhang', 'Jinjing Zhao', 'Sirui Zhang', 'Yang Yue', 'Zhiyang Liang', 'Baining Guo', 'Chong Luo', 'Jianmin Bao', 'Ji Li', 'Lei Shi', 'Qinhong Yang', 'Xiuyu Wu', 'Xuelu Feng', 'Yan Lu', 'Yanchen Dong', 'Yitong Wang', 'Yunuo Chen'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2605.21573.jpg', 'data': {'categories': ['#multilingual', '#dataset', '#small_models', '#optimization', '#inference', '#multimodal', '#rl', '#training', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Эффективная генерация изображений: максимум качества с минимумом вычислений', 'desc': 'Lens — это компактная модель преобразования текста в изображение с 3.8 млрд параметров, которая достигает качества моделей с 6+ млрд параметров, но требует в 5 раз меньше вычислений для обучения. Основные улучшения достигнуты за счёт использования плотно аннотированного датасета из 800М изображений с подробными подписями, сгенерированными GPT-4, и многомасштабного батчинга с различными разрешениями. Архитектурные решения включают семантический VAE для лучших латентных представлений и мощный языковый энкодер, обеспечивающий быструю сходимость и многоязычность. Финальная оптимизация применяет обучение с подкреплением, модуль-рассуждатель и дистилляцию для ускорения до 0.84 секунд на генерацию изображения.'}, 'en': {'title': 'Lens: Compact Powerhouse in Text-to-Image Generation', 'desc': "The paper presents Lens, a compact text-to-image (T2I) model with 3.8 billion parameters that outperforms larger models while using significantly less training compute. It achieves this by leveraging a dense dataset of 800 million image-text pairs with rich captions, enhancing the information density during training. Additionally, Lens employs a semantic variational autoencoder (VAE) and a robust language encoder to improve optimization speed and support multilingual capabilities. The model's efficient architecture allows it to generate high-quality images quickly, demonstrating its effectiveness across various resolutions and aspect ratios."}, 'zh': {'title': '高效紧凑的文本到图像模型Lens', 'desc': 'Lens是一个紧凑的3.8B参数文本到图像模型，通过密集的图像文本数据集和高效的架构实现了卓越的性能。它的训练计算需求显著低于传统的6B参数模型，使用的计算资源仅为Z-Image的19.3%。Lens通过最大化每个训练批次的数据信息密度和优化架构选择来提高训练效率。最终，Lens能够生成高质量的图像，并支持多种语言的提示，展现出强大的通用性和快速的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.22878', 'title': 'SciAtlas: A Large-Scale Knowledge Graph for Automated Scientific Research', 'url': 'https://huggingface.co/papers/2605.22878', 'abstract': "Abstract SciAtlas presents a large-scale, multi-disciplinary knowledge graph that enables structured topological reasoning for academic research by integrating millions of papers and entities to support automated scientific discovery.  AI-generated summary The exponential growth of global academic output has confronted researchers and AI agents with an unprecedented ``information explosion,'' where fragmented and unstructured knowledge organization impedes deep interdisciplinary integration. Current academic retrieval tools predominantly rely on superficial keyword matching or vector-space semantic retrieval, which lack the topological reasoning capabilities required to navigate complex logical connections. Agentic deep-research-based frameworks are often prone to logical hallucinations and consuming high inference costs. To bridge this gap, in this report, we introduce SciAtlas, a large-scale, multi-disciplinary, heterogeneous academic resource knowledge graph designed as a panoramic scientific evolution network. By integrating over 43M papers from 26 disciplines, and a total of 157M entities and 3B triplets, SciAtlas provides a structured topological cognitive substrate that dismantles disciplinary barriers and furnishes AI agents with a global perspective. Furthermore, we develop a neuro-symbolic retrieval algorithm featuring tri-path collaborative recall and graph reranking, achieving a seamless transition from simple semantic matching to deterministic association discovery. We also present key application directions of SciAtlas, including literature review, automated research trend synthesis, idea positioning, and academic trajectory exploration, to demonstrate that SciAtlas can serve as an effective ``cognitive map'' to empower the full loop of automated scientific research while significantly reducing reasoning costs. We have released the interfaces for KG retrieval and various downstream tasks in our GitHub repo.", 'score': 45, 'issue_id': 2307, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': 'c2dfa2dc36c4b43d', 'authors': ['Shuofei Qiao', 'Yunxiang Wei', 'Jiazheng Fan', 'Bin Wu', 'Busheng Zhang', 'Mengru Wang', 'Yuqi Zhu', 'Ningyu Zhang', 'Keyan Ding', 'Qiang Zhang', 'Huajun Chen'], 'affiliations': ['University College London', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22878.jpg', 'data': {'categories': ['#graphs', '#open_source', '#science'], 'emoji': '🗺️', 'ru': {'title': 'Граф научного знания как когнитивная карта для автоматизированных исследований', 'desc': 'SciAtlas — это большой многодисциплинарный граф знаний, интегрирующий более 43 миллионов научных работ и 157 миллионов сущностей для структурированного топологического рассуждения. Авторы разработали нейро-символьный алгоритм поиска с трёхпутевым совместным извлечением и переранжированием графов, который переходит от семантического сравнения к детерминированному обнаружению ассоциаций. SciAtlas служит когнитивной картой для автоматизированных научных исследований, преодолевая ограничения ключевых слов и векторного поиска в выявлении сложных логических связей. Система поддерживает множество приложений: литературные обзоры, синтез трендов исследований, позиционирование идей и анализ научных траекторий, одновременно снижая вычислительные затраты AI-агентов.'}, 'en': {'title': 'Empowering Research with a Structured Knowledge Graph', 'desc': 'SciAtlas is a comprehensive knowledge graph that integrates millions of academic papers and entities to enhance interdisciplinary research. It addresses the challenges of information overload and fragmented knowledge by providing structured topological reasoning capabilities. The system employs a neuro-symbolic retrieval algorithm that improves the accuracy of information retrieval beyond simple keyword matching. By offering a global perspective on scientific evolution, SciAtlas supports various applications such as literature reviews and automated research trend analysis, making it a valuable tool for researchers.'}, 'zh': {'title': 'SciAtlas：打破学科壁垒的智能科研新工具', 'desc': 'SciAtlas是一个大规模的多学科知识图谱，旨在通过整合超过4300万篇论文和157百万个实体，支持学术研究中的结构化拓扑推理。它解决了当前学术检索工具在复杂逻辑连接中的不足，提供了一个全景式的科学演化网络。通过开发神经符号检索算法，SciAtlas实现了从简单语义匹配到确定性关联发现的无缝过渡。该平台还支持文献综述、自动研究趋势合成等应用，显著降低推理成本，助力自动化科学研究。'}}}, {'id': 'https://huggingface.co/papers/2605.23463', 'title': 'StepAudio 2.5 Technical Report', 'url': 'https://huggingface.co/papers/2605.23463', 'abstract': 'Abstract StepAudio 2.5 is a unified audio-language model that matches specialized systems in ASR, TTS, and real-time spoken interaction by using task-tailored reinforcement learning from human feedback to optimize shared representations across different operational modes.  AI-generated summary Unified audio-language modeling has emerged as a prominent trend in modern speech systems, promising to bring the reasoning capabilities of large language models to auditory tasks. However, existing unified foundations often struggle to match the depth of specialized systems across automatic speech recognition (ASR), text-to-speech synthesis (TTS), and realtime spoken interaction. Bridging this gap remains an open challenge. This report presents StepAudio 2.5, a unified audio-language foundation model that matches or exceeds specialized systems across all three capabilities. Rather than treating these tasks as architecturally distinct, we operate on the premise that once text and audio share a multimodal representational space, task specialization becomes a matter of operational regimes: data construction, optimization targets, and decoding constraints. Guided by this insight, we advance the post-training paradigm from standard supervised learning to task-tailored Reinforcement Learning from Human Feedback (RLHF), using it as the primary mechanism to define complex optimization targets. We leverage this RLHF-centric alignment, alongside specialized decoding, to shape a shared backbone into three distinct operational modes. Concretely, the ASR branch advances transcription efficiency via verifiable multi-token decoding; the TTS branch achieves controllable, expressive synthesis through preference-based RLHF and context-rich supervision; and the Realtime branch realizes low-latency, persona-consistent dialogue via generative reward modeling within an RLHF framework. On standard benchmarks, StepAudio 2.5 achieves state-of-the-art results across ASR, TTS, and Realtime, demonstrating that a singular audio-language foundation can successfully internalize the distinct deployment objectives of speech understanding, generation, and live interaction.', 'score': 37, 'issue_id': 2306, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'ba479edc4460f036', 'authors': ['Bin Lin', 'Bo Zhao', 'Boyong Wu', 'Chao Yan', 'Chen Wu', 'Cheng Yi', 'Chengyuan Yao', 'Daijiao Liu', 'Fei Tian', 'Feng Tian', 'Haiyang Sun', 'Haoyang Zhang', 'Jiangjie Zhen', 'Jinglan Gong', 'Jun Chen', 'Li Xie', 'Peilin Li', 'Peng Yang', 'Pengfei Tan', 'Qingjian Lin', 'Runze Li', 'Shenghua Hu', 'Siyi Zhou', 'Wenwen Qu', 'Xiangyu Li', 'Xiangyu Tony Zhang', 'Xuerui Yang', 'Yang Yang', 'Yechang Huang', 'Yu Fu', 'Yuchu Luo', 'Yuxin Li', 'Yuxin Zhang', 'Zhengyan Sheng', 'Brian Li', 'Chang Zeng', 'Changlin Zhang', 'Chen Geng', 'Chenghao Dong', 'Chengli Feng', 'Dan Zhou', 'Danni Wan', 'Di Chen', 'Die Zhang', 'Dongqing Pang', 'Guanglong Yang', 'Guoqiang Hu', 'Huangxi Zhu', 'Jianzheng Gao', 'Jinghua Liang', 'Jinmei Wan', 'Junjie Yuan', 'Kang An', 'Lei Lei', 'Limin Zhong', 'Lun Cai', 'Mengqiang Ren', 'Min Xu', 'Mingliang Li', 'Mingxiao Li', 'Na Wang', 'Qiang Tong', 'Qiaoling Huang', 'Qingfu Du', 'Rui Wang', 'Shengchen Zhou', 'Shi Qiu', 'Shihao Peng', 'Shiliang Yang', 'Siqi Tu', 'Tianjiao Deng', 'Ting Xu', 'Tong Wang', 'WeiMing Niu', 'Wuxun Xie', 'Xianwei Zhang', 'Xianyu Feng', 'Xiaojia Liu', 'Xing Chen', 'Xiongbin Wu', 'Yan Wu', 'Yang Li', 'Yi Liu', 'Yifan Zhang', 'Yile Liu', 'Yongshen Long', 'Yu Luo', 'Yuanhao Ding', 'Yuhao Wang', 'Yuhe Yin', 'Yunfang Xu', 'Yuxiang Yang', 'Zhiguo Huang', 'Zhiyue Wu', 'Zichao Li', 'Zichao Zhou', 'Daxin Jiang', 'Future Li', 'Gang Yu', 'Xiangyu Zhang', 'Yibo Zhu'], 'affiliations': ['StepFun'], 'pdf_title_img': 'assets/pdf/title_img/2605.23463.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#benchmark', '#audio'], 'emoji': '🎵', 'ru': {'title': 'Единая модель для понимания, синтеза и диалога со звуком', 'desc': 'StepAudio 2.5 — это унифицированная аудио-языковая модель, которая объединяет возможности распознавания речи, синтеза речи и реального взаимодействия в одной архитектуре. Модель использует обучение с подкреплением на основе обратной связи человека для оптимизации общих представлений данных, которые адаптируются к разным режимам работы. Вместо создания отдельных систем для каждой задачи, авторы показывают, что специализация достигается через различные стратегии обработки данных, целевые функции и методы декодирования. На стандартных бенчмарках StepAudio 2.5 достигает лучших результатов во всех трёх задачах, демонстрируя, что единая модель может эффективно работать в разных сценариях применения речевых технологий.'}, 'en': {'title': 'Unifying Speech Tasks with StepAudio 2.5', 'desc': 'StepAudio 2.5 is an advanced audio-language model that integrates automatic speech recognition (ASR), text-to-speech synthesis (TTS), and real-time spoken interaction into a single framework. It utilizes task-tailored reinforcement learning from human feedback (RLHF) to optimize shared representations, allowing it to perform as well as or better than specialized systems. By treating audio and text as part of a multimodal space, it adapts to different operational modes for each task, enhancing efficiency and expressiveness. The model achieves state-of-the-art performance across all three capabilities, showcasing the potential of unified audio-language modeling in modern speech systems.'}, 'zh': {'title': '统一音频语言模型的未来', 'desc': 'StepAudio 2.5 是一个统一的音频语言模型，能够在自动语音识别（ASR）、文本到语音合成（TTS）和实时口语交互等任务中与专业系统相匹配。该模型通过人类反馈的强化学习（RLHF）来优化不同操作模式下的共享表示，从而提升性能。研究表明，当文本和音频共享多模态表示空间时，任务的专业化可以通过数据构建、优化目标和解码约束来实现。StepAudio 2.5 在标准基准测试中达到了ASR、TTS和实时交互的最先进结果，证明了一个统一的音频语言基础模型可以成功满足语音理解、生成和实时交互的不同目标。'}}}, {'id': 'https://huggingface.co/papers/2605.18018', 'title': 'See What I Mean: Aligning Vision and Language Representations for Video Fine-grained Object Understanding', 'url': 'https://huggingface.co/papers/2605.18018', 'abstract': 'Abstract SWIM is a training approach that aligns vision and language representations for fine-grained object understanding using only textual prompts by addressing cross-modal attention misalignment through mask supervision and a new dataset.  AI-generated summary We present SWIM (See What I Mean), a novel training strategy that aligns vision and language representations to enable fine-grained object understanding solely from textual prompts. Unlike existing approaches that require explicit visual prompts, such as masks or points, SWIM leverages mask supervision only during training to guide cross-modal attention, allowing the model to automatically attend to the user-specified object at inference. Our cross-attention analysis of pretrained multimodal large languagemodels (MLLMs) reveals a systematic discrepancy: Attribute words produce sharp, localized activations in the visual modality, whereas object nouns yield diffuse and scattered patterns due to semantic reference bias and distributed high-level representations. To address this misalignment, we construct NL-Refer, an enriched dataset, in which each object mask is paired with a precise natural language referring expression. SWIM extracts multi-layer cross-attention maps from object nouns and enforces spatial consistency with ground-truth masks. Experimental results demonstrate that SWIM substantially improves text-visual alignment and achieves superior performance over visual-prompt-based methods on fine-grained object understanding benchmarks. The code and data are available at https://github.com/HumanMLLM/SWIM{https://github.com/HumanMLLM/SWIM}.', 'score': 28, 'issue_id': 2306, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '9be7a930fe9856fc', 'authors': ['Boyuan Sun', 'Bowen Yin', 'Yuanming Li', 'Xihan Wei', 'Qibin Hou'], 'affiliations': ['NKIARI, Shenzhen Futian', 'Tongyi Lab, Alibaba Group', 'VCIP, CS, Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2605.18018.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#training'], 'emoji': '🎯', 'ru': {'title': 'Выравнивание текстовых и визуальных представлений для понимания объектов без визуальных подсказок', 'desc': 'Авторы представляют SWIM — метод обучения для выравнивания визуальных и языковых представлений в мультимодальных больших языковых моделях. Проблема заключается в том, что слова-атрибуты создают локализованные активации в визуальном модусе, а существительные-объекты производят размытые паттерны из-за смещения семантической привязки. Решение использует маски только во время обучения для направления кросс-внимания, позволяя модели автоматически фокусироваться на нужном объекте при инференсе. Авторы создали датасет NL-Refer и показали, что SWIM превосходит методы с визуальными подсказками в задачах детального понимания объектов.'}, 'en': {'title': 'Aligning Vision and Language for Better Object Understanding', 'desc': 'SWIM is a new training method that improves how machines understand objects by connecting visual and language information using only text prompts. It solves the problem of misalignment in attention between vision and language by using mask supervision during training, which helps the model focus on specific objects during inference. The researchers created a new dataset called NL-Refer, which pairs object masks with accurate natural language descriptions to enhance training. Experiments show that SWIM outperforms traditional methods that rely on visual prompts, leading to better object understanding.'}, 'zh': {'title': 'SWIM：用文本提示实现视觉与语言的完美对齐', 'desc': 'SWIM是一种新的训练方法，通过文本提示来对齐视觉和语言表示，以实现对细粒度物体的理解。与传统方法不同，SWIM在训练过程中仅使用掩码监督，避免了对显式视觉提示的依赖。研究发现，属性词在视觉模态中产生明确的激活，而物体名词则表现出分散的模式，这种不一致性通过构建NL-Refer数据集得以解决。实验结果表明，SWIM在文本与视觉的对齐上显著提升，并在细粒度物体理解基准测试中超越了基于视觉提示的方法。'}}}, {'id': 'https://huggingface.co/papers/2605.23899', 'title': 'From Raw Experience to Skill Consumption: A Systematic Study of Model-Generated Agent Skills', 'url': 'https://huggingface.co/papers/2605.23899', 'abstract': 'Abstract Language agents benefit from reusable skills that encode domain-specific procedures, but their effectiveness varies significantly across different extraction and consumption scenarios, requiring careful evaluation and meta-skill guidance to optimize performance.  AI-generated summary Language agents increasingly improve by reusing skills -- structured procedural artifacts distilled from past experience. In particular, domain-level and model-generated skills are especially promising. They offer fast adaptation within a domain by encoding domain-specific recurring procedures, and they scale beyond labor-intensive hand-crafting. However, while extraction methods continue to proliferate, understanding remains limited, with no comprehensive study spanning the full skill lifecycle -- experience generation, skill extraction, and skill consumption -- to ask whether such skills actually work, when they work, and what makes them succeed or fail. To close this gap, we build a utility-grounded evaluation framework that provides systematic experimental results across extractors and target agents, covering five diverse agentic task domains. We find that model-generated skills are beneficial on average but exhibit non-trivial negative transfer, and that neither extractors nor targets behave uniformly. A model can be a strong extractor yet a weak consumer, or vice versa, with skill utility independent of model scale or baseline task strength. To explain these patterns, we then dissect each lifecycle stage in depth, analyzing how experience composition shapes skill quality, what properties characterize useful skills, and how the same skill transfers across different consumers. Finally, we translate these findings into a concrete meta-skill that guides skill extraction toward the features tied to actual utility, which consistently improves skill quality across domains and substantially reduces negative transfer.', 'score': 22, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '328a009638ea26d9', 'authors': ['Zisu Huang', 'Jingwen Xu', 'Yifan Yang', 'Ziyang Gong', 'Qihao Yang', 'Muzhao Tian', 'Xiaohua Wang', 'Changze Lv', 'Xuemei Gao', 'Qi Dai', 'Bei Liu', 'Kai Qiu', 'Xue Yang', 'Dongdong Chen', 'Xiaoqing Zheng', 'Chong Luo'], 'affiliations': ['Fudan University', 'Microsoft Research', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.23899.jpg', 'data': {'categories': ['#benchmark', '#agents', '#transfer_learning', '#training', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Мастерство переиспользования: от извлечения навыков к их эффективному применению в агентах', 'desc': 'Работа исследует полный жизненный цикл переиспользуемых навыков в языковых агентах — от генерации опыта до извлечения и применения навыков. Авторы создали комплексную оценочную框架, которая систематически анализирует эффективность навыков на пяти различных задачах и обнаружила, что модели-генераторы навыков могут быть сильными извлекателями, но слабыми потребителями, и наоборот. Исследование показывает, что полезность навыков не зависит от масштаба модели и качеству выполнения базовой задачи, а отрицательный трансфер является серьёзной проблемой. Авторы предлагают мета-навык, который направляет извлечение навыков на основе признаков, связанных с реальной полезностью, что улучшает качество навыков и снижает отрицательный трансфер.'}, 'en': {'title': 'Optimizing Language Agents with Reusable Skills', 'desc': 'This paper discusses how language agents can improve their performance by reusing skills that are based on past experiences. It highlights the importance of evaluating these skills across different scenarios to understand when they work best. The authors create a framework to systematically study the entire lifecycle of skills, from generation to consumption, revealing that model-generated skills can be helpful but may also lead to negative transfer. They propose a meta-skill that enhances the extraction process, ensuring that the skills developed are more effective and reduce the chances of poor performance in different contexts.'}, 'zh': {'title': '优化语言代理技能的元技能指导', 'desc': '本文探讨了语言代理在不同场景下的技能重用问题，强调了技能的有效性因场景而异。研究表明，模型生成的技能在平均情况下是有益的，但也存在显著的负迁移现象。为了优化技能的提取和使用，本文建立了一个基于效用的评估框架，系统分析了技能生命周期的各个阶段。最后，提出了一种具体的元技能，旨在指导技能提取，提升技能质量并减少负迁移。'}}}, {'id': 'https://huggingface.co/papers/2605.23902', 'title': 'PiD: Fast and High-Resolution Latent Decoding with Pixel Diffusion', 'url': 'https://huggingface.co/papers/2605.23902', 'abstract': 'Abstract PiD introduces a pixel diffusion decoder that reformulates latent decoding as conditional pixel diffusion, enabling fast and high-quality image synthesis at high resolutions with reduced computational requirements.  AI-generated summary Most practical high-resolution text-to-image systems, including latent diffusion and autoregressive models, perform generation in a compact latent space, and a decoder maps the generated latents back to pixels. Yet the latent-to-pixel decoder is reconstruction-oriented, optimized to invert the encoder rather than synthesize more details, and becomes increasingly costly at megapixel scale. This drawback calls for a more expressive and efficient decoding paradigm. Motivated by recent progress in scalable pixel-space diffusion, we introduce PiD, a Pixel diffusion Decoder that reformulates latent decoding as conditional pixel diffusion, unifying decoding and upsampling into one generative module. By denoising directly in high-resolution pixel space, PiD synthesizes 4times and even 8times upscaled images with low latency. For latent conditioning, a lightweight sigma-aware adapter injects noise-corrupted latents into the pixel diffusion backbone, enabling PiD to decode partially denoised latents and terminate the latent diffusion process early. To further improve efficiency, we distill the model using DMD2, reducing inference to just 4 steps. PiD applies to both conventional VAE latents and semantic latents (e.g., SigLIP, DINOv2) used in recent RAE-based models. PiD decodes latents of 512 times 512 images into 2048 times 2048 pixels in under 1 second with 13 GB peak memory on a consumer RTX 5090, and as fast as 210 ms on a GB200 GPU, about 6times faster than cascaded diffusion-based super-resolution pipelines with better visual fidelity.', 'score': 21, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '6be198aa689c27d6', 'authors': ['Yifan Lu', 'Qi Wu', 'Jay Zhangjie Wu', 'Zian Wang', 'Huan Ling', 'Sanja Fidler', 'Xuanchi Ren'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2605.23902.jpg', 'data': {'categories': ['#training', '#inference', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Пиксельная диффузия: быстрое и качественное декодирование для изображений высокого разрешения', 'desc': 'PiD представляет новый подход к декодированию латентного пространства, переформулируя его как условную пиксельную диффузию. Вместо традиционного декодера, оптимизированного только для реконструкции, метод синтезирует детали напрямую в пространстве высокого разрешения, одновременно выполняя апсэмплинг. Легкий адаптер с учетом шума внедряет частично зашумленные латенты в пиксельную диффузию, позволяя рано завершить процесс латентной диффузии. Модель дополнительно оптимизирована путем дистилляции, достигая генерации изображений в 4-8 раз выше разрешения с низкой задержкой и потреблением памяти.'}, 'en': {'title': 'Revolutionizing Image Synthesis with Pixel Diffusion', 'desc': 'The paper introduces PiD, a Pixel diffusion Decoder that enhances the process of converting latent representations into high-resolution images. By using conditional pixel diffusion, PiD allows for faster and more detailed image synthesis while reducing computational costs. This method combines decoding and upsampling into a single generative module, enabling efficient denoising directly in pixel space. The model achieves impressive performance, decoding images at resolutions of 2048x2048 pixels in under one second, significantly outperforming traditional methods in both speed and image quality.'}, 'zh': {'title': '像素扩散解码：高效生成高分辨率图像的创新方法', 'desc': 'PiD（像素扩散解码器）提出了一种新的解码方法，将潜在解码重新定义为条件像素扩散。这种方法能够在高分辨率下快速生成高质量图像，同时减少计算需求。通过直接在高分辨率像素空间中去噪，PiD可以以低延迟合成4倍甚至8倍放大的图像。该模型适用于传统的变分自编码器潜在空间和最近基于RAE模型的语义潜在空间，显著提高了图像生成的效率和质量。'}}}, {'id': 'https://huggingface.co/papers/2605.23771', 'title': 'PhotoFlow: Agentic 3D Virtual Photography Missions', 'url': 'https://huggingface.co/papers/2605.23771', 'abstract': 'Abstract A Director-Reviewer-Reflector agent named PhotoFlow enables language-conditioned virtual photography by combining 3D spatial understanding with aesthetic judgment in arbitrary Blender scenes.  AI-generated summary Virtual photography asks an agent to enter a prepared 3D scene with no preselected camera pose or reference image, infer a suitable shot from scene information and a language intent, choose executable camera parameters, and render the final photograph. Recent progress in vision-language models makes this kind of spatial agent increasingly plausible, but the task stresses two capabilities that remain hard to evaluate together: complex 3D spatial understanding and abstract aesthetic judgment. We introduce PhotoFlow, a Director-Reviewer-Reflector agent for closed-loop camera search. The Director builds a soft photographic blueprint and proposes diverse candidate cameras; the Reviewer combines rule checks, visual critique, and pairwise incumbent selection; and the Reflector converts failures into region memory, dead-zone suppression, and high-explore relocation. We also introduce VPhotoBench, a benchmark of 47 open-license Blender scenes and 141 language-conditioned photography missions spanning subject placement, relational composition, and atmosphere/style. On held-out experiments, PhotoFlow achieves the strongest external quality-alignment composite and success rate among one-shot prediction, single-chain reflection, anchor-bank selection, and random search under a six-round rendering budget. To our knowledge, this is the first work to make language-conditioned virtual photography in arbitrary Blender scenes an executable agent task, and our results show that an LLM-centered spatial agent can already produce strong photographs in a setting designed to challenge both 3D reasoning and aesthetic choice.', 'score': 20, 'issue_id': 2306, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'fead8f5753b9af29', 'authors': ['Jiarui Guo', 'Haojia Wei', 'Yiming Zhang', 'Yifei Liu', 'Yuning Gong', 'Hongjie Zhang', 'Xue Yang', 'Zhihang Zhong'], 'affiliations': ['Cornell University', 'Northeastern University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Sichuan University', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.23771.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#3d', '#agents', '#multimodal'], 'emoji': '📸', 'ru': {'title': 'Агент виртуального фотографа: объединение пространственного понимания и эстетического вкуса через итеративный поиск', 'desc': 'В работе представлен агент PhotoFlow, который выполняет задачу языкообусловленной виртуальной фотографии в произвольных сценах Blender, объединяя понимание 3D-пространства с эстетическим суждением. Архитектура состоит из трёх компонентов: Director генерирует разнообразные кандидатуры параметров камеры, Reviewer проводит критическую оценку с использованием правил и визуального анализа, а Reflector улучшает поиск через обучение на ошибках и адаптивную релокацию. Авторы создали VPhotoBench — бенчмарк из 47 сцен Blender с 141 языковыми задачами, охватывающими размещение объектов, композицию и стилистику. Экспериментальные результаты демонстрируют, что этот LLM-центричный пространственный агент превосходит альтернативные методы поиска и успешно справляется с задачей виртуальной фотографии.'}, 'en': {'title': 'Empowering Virtual Photography with AI: PhotoFlow Unleashed!', 'desc': 'The paper presents PhotoFlow, an innovative agent designed for language-conditioned virtual photography in 3D environments. It integrates complex 3D spatial understanding with aesthetic judgment to generate suitable camera settings based on scene information and language prompts. The agent operates in a closed-loop system, where it proposes camera options, evaluates them, and learns from failures to improve future selections. Additionally, the authors introduce VPhotoBench, a benchmark for assessing the performance of such agents across various photography tasks in Blender scenes.'}, 'zh': {'title': '语言驱动的虚拟摄影新突破', 'desc': '本文介绍了一种名为PhotoFlow的代理，它结合了3D空间理解和审美判断，实现了语言条件下的虚拟摄影。PhotoFlow由三个部分组成：导演、评审和反思者，能够在没有预设相机位置的情况下，根据场景信息和语言意图推断合适的拍摄角度。通过引入VPhotoBench基准，评估了47个开放许可的Blender场景和141个语言条件摄影任务。实验结果表明，PhotoFlow在复杂的3D推理和审美选择中表现出色，能够生成高质量的虚拟照片。'}}}, {'id': 'https://huggingface.co/papers/2605.22570', 'title': 'VGenST-Bench: A Benchmark for Spatio-Temporal Reasoning via Active Video Synthesis', 'url': 'https://huggingface.co/papers/2605.22570', 'abstract': 'Abstract VGenST-Bench presents a video benchmark using generative models for active synthesis of controlled spatio-temporal reasoning scenarios with human quality control.  AI-generated summary Spatio-temporal reasoning is a core capability for Multimodal Large Language Models (MLLMs) operating in the real world. As such, evaluating it precisely has become an essential challenge. However, existing spatio-temporal reasoning benchmark datasets primarily rely on static image sets or passively curated video data, which limits the evaluation of fine-grained reasoning capabilities. In this paper, we introduce VGenST-Bench, a video benchmark that employs generative models to actively synthesize highly controlled and diverse evaluation scenarios. To construct VGenST-Bench, we propose a multi-agent pipeline incorporating a human quality control stage, ensuring the quality of all generated videos and QA pairs. We establish a comprehensive 3x2x2 video taxonomy, encompassing Spatial Scale, Perspective, and Scene Dynamics to span diverse scenarios. Furthermore, we design a hierarchical task suite that decouples low-level visual perception from high-level spatio-temporal reasoning. By shifting the paradigm from passive curation to active synthesis, VGenST-Bench enables fine-grained diagnosis of spatio-temporal understanding in MLLMs.', 'score': 20, 'issue_id': 2306, 'pub_date': '2026-05-21', 'pub_date_card': {'ru': '21 мая', 'en': 'May 21', 'zh': '5月21日'}, 'hash': '91e8aea30f4f8aaf', 'authors': ['Jinho Park', 'Youbin Kim', 'Hogun Park', 'Eunbyung Park'], 'affiliations': ['Department of Artificial Intelligence, Sungkyunkwan University', 'Department of Artificial Intelligence, Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2605.22570.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'От сбора к синтезу: генеративный бенчмарк для оценки пространственно-временного мышления в видео', 'desc': 'В статье представлен VGenST-Bench — набор данных для тестирования видео, созданный с помощью генеративных моделей для синтеза контролируемых сценариев пространственно-временного рассуждения. Авторы предлагают многоагентный конвейер с этапом контроля качества, обеспечивающий высокое качество сгенерированных видео и пар вопрос-ответ. Бенчмарк включает комплексную таксономию видео, охватывающую пространственный масштаб, перспективу и динамику сцены, а также иерархический набор задач, разделяющих низкоуровневое визуальное восприятие от высокоуровневого пространственно-временного рассуждения. Переходя от пассивной курации к активному синтезу данных, VGenST-Bench позволяет провести детальную диагностику способностей мультимодальных больших языковых моделей понимать пространственно-временные отношения.'}, 'en': {'title': 'Active Synthesis for Enhanced Spatio-Temporal Reasoning Evaluation', 'desc': "VGenST-Bench is a new video benchmark designed to improve the evaluation of spatio-temporal reasoning in Multimodal Large Language Models (MLLMs). Unlike previous datasets that used static images or passive video data, this benchmark actively generates diverse scenarios using generative models. It includes a human quality control step to ensure the videos and question-answer pairs are of high quality. The benchmark features a structured taxonomy and a task suite that separates visual perception from reasoning, allowing for a more detailed assessment of MLLMs' capabilities."}, 'zh': {'title': '主动合成，提升时空推理能力', 'desc': 'VGenST-Bench是一个视频基准，利用生成模型主动合成受控的时空推理场景，并进行人工质量控制。时空推理是多模态大型语言模型（MLLMs）在现实世界中运作的核心能力，因此准确评估这一能力变得至关重要。现有的时空推理基准数据集主要依赖静态图像或被动整理的视频数据，限制了对细粒度推理能力的评估。通过引入多代理管道和人类质量控制阶段，VGenST-Bench确保了生成视频和问答对的质量，并设计了一个分层任务套件，以解耦低级视觉感知与高级时空推理。'}}}, {'id': 'https://huggingface.co/papers/2605.21195', 'title': 'RankE: End-to-End Post-Training for Discrete Text-to-Image Generation with Decoder Co-Evolution', 'url': 'https://huggingface.co/papers/2605.21195', 'abstract': 'Abstract Discrete autoregressive text-to-image models suffer from latent covariate shift during policy optimization, which RankE addresses through end-to-end co-evolution of policy and decoder components.  AI-generated summary Discrete autoregressive (AR) text-to-image (T2I) models pair a VQ tokenizer with an AR policy, and current post-training pipelines optimize only the policy while keeping the VQ decoder frozen. Recent diffusion T2I work, exemplified by REPA-E, has shown that the VAE itself constitutes a key alignment bottleneck, yet no analogous investigation exists for discrete AR models. We show that policy-only optimization induces Latent Covariate Shift: as the policy evolves, the resulting token distribution diverges from the ground-truth distribution on which the decoder was trained, such that reward scores improve while decoded image quality degrades. To address this mismatch, we propose RankE, the first end-to-end post-training framework for discrete T2I generation. Rather than optimizing the policy against a fixed decoder, RankE co-evolves both components through alternating optimization: each module maximizes a ranking-based alignment objective while being regularized by a stability-preserving anchor suited to its parameter space. This co-evolution breaks the fidelity--alignment trade-off that plagues frozen-decoder approaches: on LlamaGen-XL (775M), standard RL improves CLIP but degrades FID, whereas RankE improves both simultaneously (FID 15.21, CLIP 33.76 on MS-COCO 30K). Consistent gains on Janus-Pro (1B) confirm that decoder co-evolution reliably converts reward optimization into pixel-space quality improvements.', 'score': 14, 'issue_id': 2306, 'pub_date': '2026-05-20', 'pub_date_card': {'ru': '20 мая', 'en': 'May 20', 'zh': '5月20日'}, 'hash': '2785865f34694f0d', 'authors': ['Siyong Jian', 'Siyuan Li', 'Luyuan Zhang', 'Zedong Wang', 'Xin Jin', 'Ying Li', 'Cheng Tan', 'Huan Wang'], 'affiliations': ['Hong Kong University of Science and Technology', 'Shanghai AI Lab', 'Tsinghua University', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.21195.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#multimodal', '#diffusion', '#training', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Совместная эволюция политики и декодера для устранения сдвига данных в дискретных текст-изображение моделях', 'desc': 'В статье изучается проблема сдвига скрытого распределения данных при оптимизации дискретных авторегрессивных моделей генерации изображений из текста. Авторы показывают, что оптимизация только политики при замороженном декодере приводит к расхождению между распределением токенов, которое генерирует обновленная политика, и распределением, на котором был обучен декодер. Предложен метод RankE, который совместно оптимизирует политику и декодер с использованием чередующейся оптимизации на основе функций ранжирования. Экспериментальные результаты показывают, что совместная эволюция компонентов одновременно улучшает как метрики выравнивания, так и качество декодированных изображений.'}, 'en': {'title': 'Co-evolving Policy and Decoder for Better Image Quality', 'desc': 'This paper introduces RankE, a novel framework for optimizing discrete autoregressive text-to-image (T2I) models. Traditional methods optimize the policy while keeping the decoder fixed, leading to a mismatch known as latent covariate shift, which degrades image quality. RankE addresses this issue by allowing both the policy and decoder to evolve together through alternating optimization, enhancing alignment and stability. The results show that this co-evolution improves both reward scores and image fidelity, outperforming previous methods on benchmark datasets.'}, 'zh': {'title': 'RankE：优化策略与解码器的共同进化', 'desc': '本文讨论了离散自回归文本到图像模型在策略优化过程中面临的潜在协变量转移问题。我们提出了RankE，这是第一个端到端的后训练框架，旨在同时优化策略和解码器组件。通过交替优化，RankE使得这两个模块共同进化，从而打破了固定解码器方法中存在的保真度与对齐之间的权衡。实验结果表明，RankE在图像质量和对齐度上均有显著提升，验证了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.23897', 'title': 'ETCHR: Editing To Clarify and Harness Reasoning', 'url': 'https://huggingface.co/papers/2605.23897', 'abstract': "Abstract A novel image editing approach called ETCHR is introduced that decouples visual reasoning from image generation, improving multimodal language model performance across multiple visual reasoning tasks through a two-stage training process.  AI-generated summary Multimodal Large Language Models have advanced visual reasoning, yet a purely textual chain of thought remains a bottleneck for questions that require fine-grained focus or view transformations. The ''think with images'' paradigm narrows this gap, but existing approaches are either constrained by fixed predefined toolkits or produce noisy intermediate images from unified multimodal methods. We pursue a third option: using a dedicated image editing model and decouple it with an understanding model. However, off-the-shelf image editors fail as reasoning assistants with two complementary gaps: a language-side gap, where editors trained as passive instruction-followers cannot map an abstract question to an appropriate visual transformation, and a generation-side gap, where edit correctness degrades as reasoning depth grows. Guided by this analysis, we introduce ETCHR (Editing To Clarify and Harness Reasoning), a question-conditioned, reasoning-aware image editor decoupled from the downstream understanding model and trained with a two-stage recipe targeted at the two gaps: Reasoning Imitation via supervised fine-tuning on edit trajectories, followed by Reasoning Enhancement with VLM-derived rewards for edit correctness and downstream reasoning accuracy. Since the editor is decoupled, ETCHR plugs into different open- and closed-source MLLMs in a training-free manner. Across five task families (fine-grained perception, chart understanding, logic reasoning, jigsaw restoration, and 3D understanding), ETCHR raises average Pass@1 from 55.95 to 60.77 (+4.82) with Qwen3-VL-8B, from 65.08 to 70.55 (+5.47) with Gemini-3.1-Flash-Lite, and from 76.55 to 81.16 (+4.61) with the 1T-parameter MoE model Kimi K2.5.", 'score': 10, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '38093cc60c2136eb', 'authors': ['Beichen Zhang', 'Yuhong Liu', 'Jinsong Li', 'Yuhang Zang', 'Jiaqi Wang', 'Dahua Lin'], 'affiliations': ['CPII under InnoHK', 'Shanghai AI Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.23897.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#multimodal', '#cv', '#training', '#reasoning'], 'emoji': '🎨', 'ru': {'title': 'Разделение рассуждения и генерации для усиления зрительного понимания', 'desc': 'В статье представлен метод ETCHR, который разделяет визуальное рассуждение и генерацию изображений для улучшения мультимодальных языковых моделей. Авторы предлагают использовать отдельный редактор изображений, который помогает модели рассуждать пошагово, преобразуя абстрактные вопросы в конкретные визуальные операции. Система обучается в два этапа: сначала имитация рассуждений на примерах траекторий редактирования, затем усиление рассуждений с помощью вознаграждений от визуальных моделей. Метод показывает значительные улучшения на различных задачах визуального понимания, повышая точность на 4-5% для разных моделей.'}, 'en': {'title': 'ETCHR: Enhancing Visual Reasoning through Decoupled Image Editing', 'desc': 'The paper presents ETCHR, a new image editing method that separates visual reasoning from image generation to enhance the performance of multimodal language models. This approach addresses limitations in existing models that struggle with complex visual tasks due to their reliance on fixed toolkits or noisy outputs. ETCHR employs a two-stage training process that focuses on improving reasoning imitation and edit correctness, allowing it to better interpret abstract questions and perform accurate visual transformations. By being decoupled from understanding models, ETCHR can be integrated with various multimodal language models without requiring additional training.'}, 'zh': {'title': 'ETCHR：解耦视觉推理与图像生成的创新编辑方法', 'desc': '本文介绍了一种新颖的图像编辑方法ETCHR，该方法将视觉推理与图像生成解耦，通过两阶段训练过程提高了多模态语言模型在多个视觉推理任务中的表现。传统的图像编辑工具在推理辅助方面存在语言和生成两个方面的缺陷，导致无法有效地将抽象问题映射到适当的视觉变换。ETCHR通过监督微调和基于奖励的增强训练，解决了这些缺陷，使其能够更好地理解和编辑图像。该方法在多个任务上显著提高了模型的表现，展示了其在多模态学习中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.23345', 'title': 'SCOPE: Simulating Cross-game Operations in Playable Environments for FPS World Models', 'url': 'https://huggingface.co/papers/2605.23345', 'abstract': 'Abstract SCOPE enables precise action response in FPS games by conditioning transformer blocks in video diffusion models to separate in-scope from out-of-scope visual effects without segmentation labels.  AI-generated summary Interactive world models for first-person shooter (FPS) games must resolve high-frequency overlapping control signals at every frame without disrupting unaffected regions. Existing methods inject actions globally and train on single titles, failing under dense FPS inputs. We observe that FPS actions are spatially selective: discrete events such as firing or reloading affect only a localized region around the weapon (the scope), while continuous camera and movement signals govern stable surroundings. We propose SCOPE, which inserts a conditioning module into each transformer block of a pretrained video diffusion model. It reshapes features into per-pixel temporal sequences so that each position computes its action response from local visual content. This separates in-scope effects from out-of-scope generation without segmentation labels. We also introduce CrossFPS, the first multi-game FPS dataset with frame-aligned action telemetry. It comprises 69K clips from 7 titles with 10-DoF controller signals, curated to remove gameplay bias. The model learns general visual-to-action mappings rather than game-specific patterns, enabling zero-shot transfer to unseen scenes. Experiments confirm strong action responsiveness, precise scope separation, and effective cross-game generalization.', 'score': 8, 'issue_id': 2306, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'a38bf3dc1068af7f', 'authors': ['Zizhao Tong', 'Hongfeng Lai', 'Zeqing Wang', 'Zhaohu Xing', 'Kexu Cheng', 'Haoran Xu', 'Zhao Pu', 'Shangwen Zhu', 'Ruili Feng', 'Jian Zhao', 'Yan Zhang', 'Hao Tang', 'Yeying Jin', 'Ling Shao'], 'affiliations': ['National University of Singapore', 'Shanghai Jiaotong University', 'State Key Laboratory of Multimedia Information Processing, School of Computer Science, Peking University', 'Tencent', 'The Hong Kong University of Science and Technology (Guangzhou)', 'UCAS-Terminus AI Lab, University of Chinese Academy of Sciences', 'University of Waterloo', 'Zhejiang University', 'Zhongguancun Institute of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2605.23345.jpg', 'data': {'categories': ['#dataset', '#games', '#open_source', '#transfer_learning', '#architecture', '#diffusion', '#video', '#training'], 'emoji': '🎮', 'ru': {'title': 'Локальная генерация действий в FPS через переобусловленные видео-диффузионные модели', 'desc': 'SCOPE — это метод для создания интерактивных моделей миров в играх жанра FPS, который использует видео-диффузионные модели с трансформерами для точного воспроизведения действий игрока. Ключевая идея заключается в том, что действия в шутерах имеют локальный характер: выстрелы и перезарядка влияют только на небольшую область вокруг оружия (прицел), в то время как движение камеры и персонажа воздействуют на окружение. Модель внедряет кондиционирующий модуль в каждый блок трансформера, позволяя каждому пиксельному положению независимо вычислять свой ответ на действие из локального визуального контента, разделяя эффекты внутри и вне прицела без использования сегментационных меток. Авторы также представили CrossFPS — первый мультиигровой датасет для FPS с выровненной по кадрам телеметрией действий из 7 игр, что обеспечивает нулевую трансферляемость модели на новые сцены.'}, 'en': {'title': 'SCOPE: Precision Action Response in FPS Games', 'desc': "The paper introduces SCOPE, a novel approach for enhancing action response in first-person shooter (FPS) games using transformer blocks in video diffusion models. It effectively distinguishes between in-scope and out-of-scope visual effects without the need for segmentation labels, allowing for more precise control in gameplay. By reshaping features into per-pixel temporal sequences, SCOPE enables localized action responses based on the visual context around the player's weapon. Additionally, the authors present CrossFPS, a comprehensive multi-game dataset that supports the model's ability to generalize across different FPS titles, demonstrating strong performance in action responsiveness and cross-game adaptability."}, 'zh': {'title': 'SCOPE：精准分离FPS游戏中的视效响应', 'desc': 'SCOPE是一种新方法，旨在提高第一人称射击游戏中的动作响应精度。它通过在视频扩散模型的每个变换器块中插入条件模块，能够在没有分割标签的情况下，将视效分为在视野内和视野外的效果。该方法利用空间选择性，确保局部区域的动作响应与周围环境稳定性相结合。通过引入CrossFPS数据集，SCOPE实现了跨游戏的通用性，使模型能够在未见场景中进行零样本迁移。'}}}, {'id': 'https://huggingface.co/papers/2605.23901', 'title': 'LLMs as Noisy Channels: A Shannon Perspective on Model Capacity and Scaling Laws', 'url': 'https://huggingface.co/papers/2605.23901', 'abstract': 'Abstract The Shannon Scaling Law models LLM training as information transmission over a noisy channel, explaining non-monotonic performance phenomena through signal-to-noise ratio interactions and demonstrating superior predictive accuracy over traditional scaling laws.  AI-generated summary Existing scaling laws for Large Language Models (LLMs), predominantly monotonic power laws, fail to explain emerging non-monotonic phenomena such as catastrophic overtraining and quantization-induced degradation, where performance deteriorates despite increased compute.   We propose the Shannon Scaling Law, a unified theoretical framework that models LLM training as information transmission over a noisy channel, grounded in the Shannon-Hartley theorem. By mapping model parameters to channel bandwidth and training tokens to signal power, our formulation explicitly captures the interaction between learning signal and intrinsic noise. This perspective reveals a fundamental Shannon capacity for LLMs: scaling model size or data without preserving a sufficient signal-to-noise ratio (SNR) inevitably amplifies noise, inducing a transition from monotonic improvement to U-shaped performance degradation.   We validate our theory through experiments on Pythia and OLMo2 under perturbations, including Gaussian noise, quantization and supervised fine-tuning on math, QA and code tasks. The Shannon Scaling Law consistently outperforms classical scaling laws and recent perturbation-aware laws, achieving strong R^2 scores and accurately capturing loss basins missed by prior approaches. It also extrapolates: fitted on leq6.9B Pythia models with leq180B tokens, it predicts the unseen 12B model up to 307B tokens at pooled R^2{=}0.847, while monotonic baselines collapse.', 'score': 7, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '8cefbbca322df85d', 'authors': ['Xu Ouyang', 'Deyi Liu', 'Yuhang Cai', 'Jing Liu', 'Yuan Yang', 'Chen Zheng', 'Thomas Hartvigsen', 'Yiyuan Ma'], 'affiliations': ['ByteDance Seed', 'University of California, Berkeley', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2605.23901.jpg', 'data': {'categories': ['#training', '#benchmark', '#math'], 'emoji': '📊', 'ru': {'title': 'Шумный канал обучения: когда больше данных означает хуже', 'desc': 'В статье предложен закон масштабирования Shannon для больших языковых моделей, который рассматривает обучение как передачу информации по зашумленному каналу. Традиционные степенные законы масштабирования не объясняют немонотонные явления, такие как катастрофическое переобучение и деградация производительности при квантизации. Новый подход использует теорему Шеннона-Хартли для моделирования взаимодействия между сигналом обучения и внутренним шумом, связывая параметры модели с пропускной способностью канала, а токены обучения с мощностью сигнала. Экспериментальная валидация на моделях Pythia и OLMo2 показывает, что закон Shannon значительно превосходит классические законы масштабирования по точности предсказания и экстраполяции.'}, 'en': {'title': 'Unlocking LLM Training: The Shannon Scaling Law', 'desc': 'The Shannon Scaling Law provides a new way to understand how Large Language Models (LLMs) are trained by treating it as a process of transmitting information through a noisy channel. This model explains why performance can sometimes worsen even when more computational resources are used, a phenomenon not captured by traditional scaling laws. By relating model parameters to channel bandwidth and training data to signal power, it highlights the importance of maintaining a good signal-to-noise ratio (SNR) during training. Experiments show that this law predicts performance more accurately than previous models, especially in challenging scenarios involving noise and quantization.'}, 'zh': {'title': '香农缩放定律：揭示LLM训练中的信号与噪声', 'desc': '香农缩放定律将大型语言模型（LLM）的训练视为在噪声信道上的信息传输，解释了非单调性能现象。该理论通过信噪比的相互作用，揭示了模型大小或数据的扩展如果不保持足够的信噪比，必然会放大噪声，导致性能下降。我们通过对Pythia和OLMo2的实验验证了这一理论，结果显示香农缩放定律在预测准确性上优于传统的缩放法则。该定律不仅能够解释过度训练和量化引起的性能退化，还能有效捕捉到之前方法未能识别的损失盆地。'}}}, {'id': 'https://huggingface.co/papers/2605.23903', 'title': 'Geo-Align: Video Generation Alignment via Metric Geometry Reward', 'url': 'https://huggingface.co/papers/2605.23903', 'abstract': 'Abstract Geo-Align presents a reinforcement learning framework for camera-controlled video re-rendering that improves generalization through scale-aware perceptual rewards and metric 3D estimation for camera trajectory extraction.  AI-generated summary Camera-controlled video generation has achieved remarkable progress in recent years. However, existing video-to-video re-rendering methods primarily rely on Supervised Fine-Tuning using synthetic datasets. At present, there is an extreme scarcity of synchronized, multi-view real-world video data. Consequently, the prevailing paradigm often exhibits limited generalization when processing out-of-distribution real-world videos, with models struggling to accurately adhere to physical scales and camera trajectories. To bridge this gap, we propose Geo-Align, the first Reinforcement Learning framework specifically designed for camera-controlled video re-rendering. Built upon a pretrained model, we optimize the model through a scale-aware perceptual reward mechanism. Specifically, we introduce a metric 3D estimator to extract precise camera trajectories from generated videos, explicitly penalizing deviations in rotation and translation. Furthermore, we meticulously designed a data pipeline strategy based on real-world conditioning videos and target camera trajectories derived from synthetic data, eliminating the reliance on paired data. Extensive experiments demonstrate that Geo-Align consistently outperforms existing supervised learning baselines in both precise camera controllability and visual fidelity, indicating the effectiveness of our method.', 'score': 6, 'issue_id': 2306, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '8dcef09f680609c2', 'authors': ['Zizun Li', 'Haoyu Guo', 'Runzhe Teng', 'Chunhua Shen', 'Tong He'], 'affiliations': ['Shanghai AI Lab', 'USTC', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2605.23903.jpg', 'data': {'categories': ['#rl', '#3d', '#video'], 'emoji': '🎥', 'ru': {'title': 'Обучение с подкреплением для точного контроля камеры в переотрисовке видео', 'desc': 'Geo-Align представляет фреймворк обучения с подкреплением для переотрисовки видео с контролем камеры, который улучшает обобщение благодаря масштабируемым перцептивным награждениям и метрической 3D оценке для извлечения траектории камеры. Исследование решает проблему низкой способности моделей к обобщению на реальных видео, которые находятся вне распределения обучающих данных, особенно в отношении физических масштабов и точной траектории камеры. Вместо классического supervised learning на синтетических датасетах, авторы применяют reinforcement learning с инновационной системой вознаграждений, которая явно штрафует ошибки в ротации и трансляции камеры. Экспериментальные результаты показывают, что Geo-Align превосходит существующие методы supervised learning по точности контроля камеры и качеству визуализации.'}, 'en': {'title': 'Revolutionizing Video Re-Rendering with Geo-Align', 'desc': 'Geo-Align introduces a novel reinforcement learning framework aimed at enhancing camera-controlled video re-rendering. It utilizes scale-aware perceptual rewards and a metric 3D estimator to accurately extract camera trajectories, addressing the limitations of existing methods that depend on synthetic datasets. By optimizing a pretrained model without the need for paired data, Geo-Align improves generalization to real-world videos, which often present challenges in maintaining physical accuracy. Experimental results show that this approach significantly outperforms traditional supervised learning techniques in both camera control and visual quality.'}, 'zh': {'title': 'Geo-Align：提升视频重渲染的智能框架', 'desc': 'Geo-Align提出了一种强化学习框架，用于相机控制的视频重渲染。该方法通过尺度感知的感知奖励和度量3D估计来改善模型的泛化能力。我们引入了一种度量3D估计器，以精确提取生成视频中的相机轨迹，并对旋转和位移的偏差进行惩罚。此外，Geo-Align在真实世界条件视频和合成数据的目标相机轨迹基础上设计了数据管道策略，消除了对配对数据的依赖。'}}}, {'id': 'https://huggingface.co/papers/2605.20177', 'title': 'From Seeing to Thinking: Decoupling Perception and Reasoning Improves Post-Training of Vision-Language Models', 'url': 'https://huggingface.co/papers/2605.20177', 'abstract': 'Abstract Staged training approaches that separately optimize visual perception, visual reasoning, and textual reasoning in vision-language models outperform unified training methods, leading to improved performance on visual reasoning tasks.  AI-generated summary Recent advances in vision-language models (VLMs) emphasize long chain-of-thought reasoning; yet, we find that their performance on visual tasks is primarily limited by a lack of visual perception as opposed to reasoning itself. In this work, we systematically study the interplay between perception and reasoning in VLM post-training by decomposing their capabilities into three separate training stages: visual perception, visual reasoning, and textual reasoning, incorporating specialized training data. We demonstrate that visual perception (a) requires targeted optimization with specialized data; (b) serves as a fundamental scaffold that should be solidified through staged training before refining visual reasoning; and (c) is more effectively learned via RL than caption-based SFT. Our experiments across multiple VLMs demonstrate that staged training consistently improves both visual perception and reasoning performance over merged training. Notably, models trained with our approach achieve 1.5% higher reasoning accuracy with 20.8% shorter reasoning traces, suggesting that superior perception reduces the need for excessive reasoning. Furthermore, we show that this capability-based staging represents a new curriculum dimension orthogonal to traditional difficulty-based curricula, and combining both yields further additive gains. Our staged-training models achieve superior performance among open-weight VLMs, establishing advanced results on several visual math and perception (e.g., +5.2% on WeMath and +3.7% on RealWorldQA) tasks compared with the base counterpart.', 'score': 6, 'issue_id': 2307, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '4e526b923ffa823a', 'authors': ['Juncheng Wu', 'Hardy Chen', 'Haoqin Tu', 'Xianfeng Tang', 'Freda Shi', 'Hui Liu', 'Hanqing Lu', 'Cihang Xie', 'Yuyin Zhou'], 'affiliations': ['Amazon', 'CIFAR AI', 'UC Santa Cruz', 'University of Waterloo', 'Vector Institute, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2605.20177.jpg', 'data': {'categories': ['#rl', '#training', '#reasoning', '#multimodal', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Фундамент восприятия: почему поэтапное обучение превосходит объединённый подход', 'desc': 'В работе показано, что поэтапное обучение vision-language моделей, разделяющее оптимизацию на три отдельных этапа (визуальное восприятие, визуальное рассуждение и текстовое рассуждение), превосходит единое обучение по качеству. Авторы демонстрируют, что визуальное восприятие является фундаментальным компонентом, который должен быть закреплен перед тонкой настройкой способности к рассуждениям, и что обучение с подкреплением эффективнее для этого этапа, чем описание изображений. Поэтапный подход приводит к улучшению точности рассуждений на 1,5% при одновременном сокращении длины цепочки рассуждений на 20,8%, что указывает на то, что хорошее восприятие снижает потребность в чрезмерном рассуждении. Предложенная стратегия обучения представляет новое измерение в curriculum learning, ортогональное традиционным подходам, основанным на сложности задач, и их комбинация дает дополнительные улучшения.'}, 'en': {'title': 'Staged Training: The Key to Enhanced Vision-Language Models', 'desc': 'This paper explores how separating the training of visual perception, visual reasoning, and textual reasoning in vision-language models (VLMs) leads to better performance on visual reasoning tasks. The authors argue that visual perception is crucial and should be optimized first, as it lays the groundwork for effective reasoning. They demonstrate that using reinforcement learning (RL) for training visual perception is more effective than traditional methods. Their experiments show that this staged training approach not only improves accuracy but also reduces the complexity of reasoning needed, highlighting a new way to structure training in machine learning.'}, 'zh': {'title': '分阶段训练提升视觉推理能力', 'desc': '本研究探讨了视觉-语言模型（VLM）中视觉感知、视觉推理和文本推理的分阶段训练方法。我们发现，视觉任务的表现主要受限于视觉感知的不足，而非推理能力。通过将模型能力分解为三个独立的训练阶段，我们证明了视觉感知需要针对性优化，并且在分阶段训练中应优先巩固。实验结果显示，采用分阶段训练的模型在视觉推理任务上表现优于合并训练的方法。'}}}, {'id': 'https://huggingface.co/papers/2605.23888', 'title': 'GenRecon: Bridging Generative Priors for Multi-View 3D Scene Reconstruction', 'url': 'https://huggingface.co/papers/2605.23888', 'abstract': 'Abstract A novel method for 3D scene reconstruction that integrates generative 3D priors with multi-view image conditioning to produce high-fidelity, editable mesh reconstructions of indoor environments.  AI-generated summary We introduce a new approach to high-fidelity 3D scene reconstruction from multi-view RGB images that tightly couples reconstruction with a strong generative 3D prior. We cast scene reconstruction as conditional 3D generation over a set of spatially-localized, overlapping chunks that together tile the scene, scaling generation to large scene extents. Crucially, we inherit the fidelity and completeness of state-of-the-art generative shape models -- we use Trellis.2 as an example -- which we generalize to the scene level. To this end, we propose a projection-based conditioning mechanism that lifts posed multi-view image features into a coherent 3D representation aligned with the generative model, independent of view ordering and spatially anchored to the scene, yielding high-fidelity, multi-view consistent generated geometry. This enables lifting the strong object-level prior of Trellis.2 to multi-view, scene-scale generation, producing faithful, editable PBR mesh reconstructions of indoor environments. As a result, we obtain high-fidelity results that outperform cutting-edge reconstruction methods by 16%.', 'score': 4, 'issue_id': 2305, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '10ca562055c6fb32', 'authors': ['Katharina Schmid', 'Nicolas von Lützow', 'Jozef Hladký',
