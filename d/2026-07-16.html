    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');

            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.12395', 'title': 'Ring-Zero: Scaling Zero RL to a Trillion Parameters for Emergent Reasoning', 'url': 'https://huggingface.co/papers/2607.12395', 'abstract': 'Abstract  Reinforcement learning with verifiable rewards without human-annotated data, often referred to as zero RL, has emerged as a powerful paradigm for eliciting chain-of-thought reasoning. However, due to computational constraints, existing studies are largely restricted to small models, leaving the training dynamics and emergent capabilities at a large scale unexplored. To meaningfully explore this frontier, we aim to elicit high-quality reasoning behaviors from the model. However, we find that naive scaling often suffers from poor readability, token redundancy, and a lack of adaptive reasoning depth. To address these challenges, we present a stable and efficient training pipeline, incorporating algorithmic and system optimizations such as clipped importance sampling, training-inference ratio correction, and mixed-precision control. Our experiments offer three key findings that validate the "bitter lesson" of scaling: (1) scaling to 1T parameters significantly enhances sample efficiency and performance ceilings; (2) the training process progresses sequentially through an initial discovery phase followed by a sharpening phase; and (3) the model spontaneously develops advanced cognitive behaviors, including anthropomorphism, structured formatting, self-verification, parallel reasoning, and context anxiety, rendering hand-crafted heuristics redundant. Evaluated on seven mathematical benchmarks, Ring-2.5-1T-Zero achieves competitive performance. Additionally, to assess CoT quality beyond final-answer correctness, we propose a structured evaluation framework across three dimensions: comprehensibility, reproducibility, and efficiency, where our model demonstrates clear advantages in producing structured and concise reasoning traces. By sharing our observed emergent phenomena, we hope to provide the community with deeper insights into scaling behaviors, particularly at the 1-trillion scale.', 'score': 60, 'issue_id': 2667, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': 'a92fe9d1c4c7b6f7', 'authors': ['Xinyu Tang', 'Gangqiang Cao', 'Yurou Liu', 'Yuliang Zhan', 'Xiaochong Lan', 'Yifan Li', 'Yuchen Yan', 'Han Peng', 'Zican Dong', 'Zhenduo Zhang', 'Tianshu Wang', 'Xinyu Kong', 'Zujie Wen', 'Wayne Xin Zhao', 'Zhiqiang Zhang', 'Jun Zhou'], 'affiliations': ['Ant Group', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.12395.jpg', 'data': {'categories': ['#math', '#optimization', '#benchmark', '#training', '#rl', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Масштабирование цепочек рассуждений без человеческих аннотаций', 'desc': 'В работе исследуется обучение с подкреплением без аннотаций человека (zero RL) для обучения моделей цепочкам рассуждений на масштабах до 1 триллиона параметров. Авторы предлагают стабильный и эффективный pipeline обучения с применением клипированного importance sampling, коррекции соотношения обучения-инференса и контроля смешанной точности. Экспериментальные результаты показывают, что масштабирование значительно улучшает эффективность выборки и производительность, а модель самостоятельно развивает продвинутые поведения вроде структурированного форматирования и самопроверки. Авторы представляют новую систему оценки качества цепочек рассуждений по трём измерениям: понятности, воспроизводимости и эффективности.'}, 'en': {'title': 'Unlocking Advanced Reasoning with Scalable Zero RL', 'desc': 'This paper discusses a new approach to reinforcement learning called zero RL, which does not require human-annotated data and focuses on improving reasoning capabilities in large models. The authors identify challenges in scaling models, such as readability and reasoning depth, and propose a robust training pipeline that includes various optimizations. Their findings reveal that scaling to 1 trillion parameters significantly improves performance and sample efficiency, while the model develops advanced reasoning behaviors autonomously. The paper also introduces a new evaluation framework to assess the quality of reasoning, demonstrating that their model excels in producing clear and structured reasoning outputs.'}, 'zh': {'title': '无人工标注数据的强化学习新突破', 'desc': '这篇论文探讨了无人工标注数据的强化学习（零强化学习），旨在提高模型的推理能力。研究发现，简单地扩大模型规模会导致可读性差、冗余和推理深度不足等问题。为了解决这些挑战，作者提出了一种稳定高效的训练流程，结合了多种算法和系统优化技术。实验结果表明，模型在达到1万亿参数时，能够自发发展出高级认知行为，并在多个数学基准测试中表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2607.13125', 'title': 'Boogu-Image-0.1: Boosting Open-Source Unified Multimodal Understanding and Generation', 'url': 'https://huggingface.co/papers/2607.13125', 'abstract': "Abstract  We introduce Boogu-Image-0.1, an open-source unified multimodal understanding and generation model family, comprising Base, Turbo, Edit, and Edit-Turbo variants. It delivers competitive performance in high-quality text-to-image generation, fast inference, instruction-based editing, and bilingual (Chinese-English) text rendering. Closed-source multimodal systems like Nano-Banana-Pro and GPT-Image-2 achieve strong performance through system-level integration rather than a single model, yet their internal practices remain largely undisclosed. In this work, we demonstrate that targeted improvements in model understanding, data quality, and training pipelines, coupled with agentic inference-time scaling, can substantially enhance generation and editing performance even under highly constrained compute budgets. Comprehensive evaluations show that Boogu-Image-0.1 consistently matches or surpasses other open-source models across standard benchmarks, and achieves results approaching leading closed-source systems. Notably, this is accomplished with only 208.62 million unique images. The base model's theoretical training cost is only approximately \\$400K. We share practical discussions that we believe are valuable to the broader research community, and release weights, code, and recipes under Apache 2.0 to advance the open ecosystem for unified multimodal understanding and generation. Our code is available here: https://github.com/Boogu-Project/Boogu-Image.", 'score': 53, 'issue_id': 2667, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': '6c92b75e12628a9a', 'authors': ['Guoxuan Chen', 'Chufeng Xiao', 'Haoran Yang', 'Siyue Xie', 'Binxiao Huang', 'Ming Zhang', 'Cheuk Him Chau', 'Xinyu Fu', 'Yingzhao Lian', 'Tom S. Y. Li', 'Jintao Lin', 'Bowen Dong', 'Zian Qian', 'Yuhao Liu', 'Yuxuan Hu', 'Weikang Shi', 'Bin Zou', 'Bowen Zheng', 'Haoxuan Che', 'Chang Chen', 'Yuyang He', 'Heyang Sun', 'Tianyu Huang', 'Chong Hou Choi', 'Cheng Gong', 'Han Shi', 'Haoli Bai', 'Xihui Liu', 'Hongsheng Li', 'Qifeng Chen', 'Chao Huang', 'Rui Liu', 'Chenyang Lei'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.13125.jpg', 'data': {'categories': ['#open_source', '#benchmark', '#training', '#agents', '#dataset', '#inference', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Эффективная мультимодальная модель нового поколения за доступную цену', 'desc': 'Авторы представляют Boogu-Image-0.1, семейство открытых мультимодальных моделей для понимания и генерации изображений с вариантами Base, Turbo, Edit и Edit-Turbo. Модель достигает конкурентоспособного качества в генерации текста в изображение, быстром инференсе, редактировании по инструкциям и двуязычном (китайско-английском) рендеринге текста. Авторы демонстрируют, что целевые улучшения в понимании модели, качестве данных и pipeline-ах обучения, в сочетании с масштабированием на этапе инференса, могут существенно улучшить качество при ограниченном бюджете вычислений. Модель обучена всего на 208.62 миллионах уникальных изображений и требует примерно 400K долларов на обучение, при этом превосходя другие открытые модели и приближаясь к ведущим закрытым системам.'}, 'en': {'title': 'Unlocking Multimodal Potential with Boogu-Image-0.1', 'desc': 'Boogu-Image-0.1 is a new open-source model family designed for multimodal understanding and generation, including variants like Base, Turbo, Edit, and Edit-Turbo. It excels in generating high-quality images from text, performing fast edits based on instructions, and rendering text in both Chinese and English. The model achieves competitive results against closed-source systems by focusing on improvements in model comprehension, data quality, and efficient training methods, all while maintaining a low computational cost. Comprehensive evaluations indicate that Boogu-Image-0.1 not only meets but often exceeds the performance of other open-source models, making significant contributions to the field of multimodal AI.'}, 'zh': {'title': '开源多模态模型的创新与突破', 'desc': '我们介绍了Boogu-Image-0.1，这是一个开源的统一多模态理解和生成模型系列，包括Base、Turbo、Edit和Edit-Turbo变体。该模型在高质量的文本到图像生成、快速推理、基于指令的编辑和中英文文本渲染方面表现出色。通过针对模型理解、数据质量和训练流程的改进，以及推理时的智能扩展，我们显著提升了生成和编辑性能，即使在计算资源有限的情况下也能实现。综合评估显示，Boogu-Image-0.1在标准基准测试中始终与其他开源模型相匹配或超越，并且其结果接近领先的闭源系统。'}}}, {'id': 'https://huggingface.co/papers/2607.13285', 'title': 'Harness Handbook: Making Evolving Agent Harnesses Readable,Navigable, and Editable', 'url': 'https://huggingface.co/papers/2607.13285', 'abstract': 'Abstract  The capability of a modern AI agent depends not only on its foundation model but also on its harness, which constructs prompts, manages state, invokes tools, and coordinates execution. As models, APIs, environments, and requirements evolve, the harness must be continually modified. Before such a change can be made, a developer or coding agent must identify all code locations that implement the target behavior. This is difficult because production harnesses are large, tightly coupled, and behaviorally distributed, while modification requests describe what the system should do and repositories are organized by files and modules. Code search, repository indexing, and long-context processing ease inspection, but still leave this behavior-to-code mapping to be recovered by hand. Behavior localization is therefore a central bottleneck in harness evolution. We introduce the Harness Handbook, a behavior-centric representation synthesized automatically from a harness codebase via static analysis and LLM-assisted structuring, linking each behavior to its corresponding source. We also introduce Behavior-Guided Progressive Disclosure (BGPD), which guides agents from high-level behaviors to relevant implementation details and verifies candidate locations against the current source. On diverse modification requests from two open-source harnesses, Handbook-Assisted planning improves behavior localization and edit-plan quality while using fewer planner tokens, with the largest gains on scattered sites, rarely executed paths, and cross-module interactions. Evolving complex agentic systems thus depends not only on generating edits, but also on determining where those edits should be made.', 'score': 48, 'issue_id': 2667, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': 'cea4c45deb287f98', 'authors': ['Ruhan Wang', 'Yucheng Shi', 'Zongxia Li', 'Zhongzhi Li', 'Yue Yu', 'Junyao Yang', 'Kishan Panaganti', 'Haitao Mi', 'Dongruo Zhou', 'Leoweiliang'], 'affiliations': ['Indiana University', 'National University of Singapore', 'Tencent HY LLM Frontier', 'Tencent Seattle', 'University of Georgia', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.13285.jpg', 'data': {'categories': [], 'emoji': '🗺️', 'ru': {'title': 'От поведения к коду: автоматическая локализация функций в агентных системах', 'desc': 'В статье рассматривается проблема локализации поведения в больших и сложных системах агентов, где код распределен по множеству модулей и файлов. Авторы представляют Harness Handbook — автоматически синтезируемое поведенческое представление кодовой базы, которое связывает каждое поведение системы с соответствующим исходным кодом через статический анализ и LLM-ассистирование. Они также предлагают метод Progressive Disclosure, управляемый поведением, который направляет агентов от высокоуровневого описания функций к релевантным деталям реализации и проверяет найденные места в коде. Экспериментальные результаты показывают, что предложенный подход значительно улучшает качество планирования модификаций и снижает требуемое количество токенов.'}, 'en': {'title': 'Streamlining AI Harness Evolution with Behavior-Centric Tools', 'desc': 'This paper discusses the importance of a harness in AI systems, which helps manage how AI models interact with tools and execute tasks. It highlights the challenge of modifying these harnesses due to their complexity and the difficulty in mapping behaviors to specific code locations. The authors propose the Harness Handbook, a tool that uses static analysis and large language models to automatically link behaviors to their source code. Additionally, they introduce Behavior-Guided Progressive Disclosure (BGPD) to assist developers in navigating from high-level behaviors to detailed implementation, improving the efficiency of code modifications.'}, 'zh': {'title': '智能代理的演进依赖于行为定位与代码修改', 'desc': '这篇论文探讨了现代人工智能代理的能力不仅依赖于基础模型，还依赖于其控制系统。控制系统负责构建提示、管理状态、调用工具和协调执行。随着模型和环境的变化，开发者需要识别代码中实现特定行为的位置，这一过程非常复杂。为了解决这个问题，论文提出了《控制手册》和行为引导的渐进披露方法，以帮助开发者更有效地进行代码修改和行为定位。'}}}, {'id': 'https://huggingface.co/papers/2607.13639', 'title': 'OvisOCR2 Technical Report', 'url': 'https://huggingface.co/papers/2607.13639', 'abstract': 'Abstract  We introduce OvisOCR2, a 0.8B document parsing model. OvisOCR2 is designed as an end-to-end parser: given a document page image, it generates a Markdown representation in natural reading order, covering text, formulas, tables, and visual regions. We build a data engine that combines filtered real-document annotations with synthetic pages whose rendered images and Markdown targets are derived from the same HTML source. The training recipe includes supervised fine-tuning, reinforcement learning on a 4B branch with a multi-component reward design, on-policy distillation into the 0.8B model, and model fusion. On OmniDocBench v1.6, OvisOCR2 achieves a state-of-the-art overall score of 96.58, placing an end-to-end model at the top of this leaderboard previously dominated by pipeline methods and highlighting the potential of end-to-end document parsing. On PureDocBench, OvisOCR2 also achieves the highest Avg3 score of 75.06. Beyond these two public benchmarks, we evaluate OvisOCR2 on an in-house benchmark designed to cover a broader set of long-tail and challenging scenarios. OvisOCR2 obtains the best overall performance among the compared methods, providing further evidence of its generalization and robustness. OvisOCR2 is available at https://huggingface.co/ATH-MaaS/OvisOCR2.', 'score': 40, 'issue_id': 2667, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '744fcaa1a35cacc9', 'authors': ['Shiyin Lu', 'Yinglun Li', 'Yu Xia', 'Yuhui Chen', 'An-Yang Ji', 'Jun-Peng Jiang', 'Qing-Guo Chen', 'Jianshan Zhao', 'En Lin', 'Haijun Li', 'Cheng Qin', 'Zhao Xu', 'Weihua Luo'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.13639.jpg', 'data': {'categories': ['#cv', '#benchmark', '#small_models', '#training', '#rl', '#dataset'], 'emoji': '📄', 'ru': {'title': 'Сквозной парсинг документов: превосходство единой нейросети над конвейерными методами', 'desc': 'Представлена OvisOCR2 — компактная модель с 0.8 млрд параметров для сквозного анализа документов, которая преобразует изображения страниц в структурированное Markdown-представление, включая текст, формулы, таблицы и визуальные элементы. Для обучения использован комбинированный подход: аннотации реальных документов с синтетическими страницами, созданными на основе HTML, а также многоступенчатый тренинг с применением контролируемой настройки, обучением с подкреплением на 4B модели и дистилляцией знаний. Модель достигла рекордного результата 96.58 баллов на бенчмарке OmniDocBench v1.6, впервые вынеся сквозной подход впереди традиционных конвейерных методов обработки документов. Результаты демонстрируют превосходную обобщаемость и робустность на разнообразных сценариях, включая редкие и сложные случаи.'}, 'en': {'title': 'Revolutionizing Document Parsing with OvisOCR2', 'desc': 'OvisOCR2 is a document parsing model that processes images of documents and converts them into a structured Markdown format. It utilizes an end-to-end approach, meaning it directly transforms the input image into the output format without needing separate steps. The model is trained using a combination of real and synthetic data, along with advanced techniques like reinforcement learning and model fusion to enhance its performance. OvisOCR2 has achieved top scores on multiple benchmarks, demonstrating its effectiveness and ability to handle complex document layouts.'}, 'zh': {'title': 'OvisOCR2：文档解析的新突破', 'desc': 'OvisOCR2是一个0.8亿参数的文档解析模型，旨在实现端到端的解析。它能够从文档页面图像生成自然阅读顺序的Markdown表示，涵盖文本、公式、表格和视觉区域。该模型通过结合真实文档注释和合成页面的数据引擎进行训练，并采用监督微调和强化学习等方法。OvisOCR2在多个基准测试中表现优异，展示了其在文档解析领域的潜力和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2607.12625', 'title': 'KnowAct-GUIClaw: Know Deeply, Act Perfectly, Personal GUI Assistant with Self-Evolving Memory and Skill', 'url': 'https://huggingface.co/papers/2607.12625', 'abstract': "Abstract  OpenClaw has emerged as a leading agent framework for complex task automation, yet it faces insufficient cross-platform GUI interaction support and a well-built self-evolution mechanism. These flaws limit its adaptation to diverse device ecosystems and prevent performance improvements through continuous learning from execution experience. To resolve these issues, we propose the Know Deeply, Act Perfectly paradigm for personal assistants, which holds that accumulated user interaction and task-running experience directly improve execution accuracy and efficiency, unifying cognitive comprehension and operational execution. Based on this paradigm, we introduce KnowAct-GUIClaw, a novel Know-Route-Act-Reflect framework designed to address OpenClaw's GUI manipulation deficits and break through its cross-platform and recursive self-improvement constraints. First, the host agent leverages accumulated interaction experience and task-relevant knowledge for long-horizon task decomposition and allocation (Know). Second, a pluggable GUI subagent with an experience-attributable memory system (Know) and self-evolving skill library (Act), enabling seamless cross-platform migration and fast-path integration. Especially, this framework continuously stores user profiles and feedback to improve the accuracy of task decomposition and tool calls. Extensive experiments across Android, iOS, HarmonyOS and Windows show that KnowAct-GUIClaw achieves superior efficiency, accuracy and cross-platform adaptability. Especially, the GUIClaw with open-source Kimi-2.6 models achieves the best performance (64.1%) on the long-horizon MobileWorld benchmark, beating all agentical frameworks and closed-source agentical models, e.g., Seed-2.0-Pro and GPT-5.5. Additionally, the knowledgeable memory and execution skills supported by our framework are transferable across diverse base models, improving by 8.5% with Kimi-2.6.", 'score': 35, 'issue_id': 2667, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'a48f8a343b485589', 'authors': ['Yunxin Li', 'Jinchao Li', 'Shibo Su', 'Zhenran Xu', 'Chenrui Zhao', 'Tongshu Bian', 'Xiaoman Liang', 'Meishan Zhang', 'Baotian Hu', 'Min Zhang'], 'affiliations': ['Harbin Institute of Technology', 'Shenzhen AI Training Platform', 'Shenzhen Loop Area Institute'], 'pdf_title_img': 'assets/pdf/title_img/2607.12625.jpg', 'data': {'categories': ['#multilingual', '#benchmark', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Самообучающийся агент для кроссплатформной автоматизации GUI через накопление опыта', 'desc': 'В статье представлена улучшенная система KnowAct-GUIClaw для автоматизации сложных задач на различных платформах, основанная на парадигме «Глубоко понимать, идеально действовать». Фреймворк использует архитектуру Know-Route-Act-Reflect, где главный агент разлагает задачи на основе накопленного опыта взаимодействия, а специализированные подагенты выполняют операции с GUI с адаптивной памятью и саморазвивающимися навыками. Система непрерывно учится из пользовательских профилей и обратной связи, улучшая точность декомпозиции задач и вызовов инструментов. Экспериментальные результаты на Android, iOS, HarmonyOS и Windows демонстрируют превосходную эффективность, точность и кроссплатформную адаптируемость по сравнению с закрытыми моделями.'}, 'en': {'title': 'Enhancing Task Automation with KnowAct-GUIClaw', 'desc': 'The paper introduces KnowAct-GUIClaw, a new framework designed to enhance the OpenClaw agent framework for task automation. It addresses limitations in cross-platform GUI interaction and self-evolution by implementing a Know Deeply, Act Perfectly paradigm. This approach utilizes accumulated user interaction data to improve task execution accuracy and efficiency through a structured process of knowledge acquisition, task decomposition, and skill application. Experimental results demonstrate that KnowAct-GUIClaw significantly outperforms existing models in terms of efficiency and adaptability across multiple operating systems.'}, 'zh': {'title': '深知行动，完美执行', 'desc': 'OpenClaw是一个用于复杂任务自动化的代理框架，但在跨平台GUI交互支持和自我进化机制方面存在不足。这些缺陷限制了它在不同设备生态系统中的适应性，并阻碍了通过执行经验的持续学习来提高性能。为了解决这些问题，我们提出了“深知行动完美”的范式，强调用户交互和任务执行经验的积累可以直接提高执行的准确性和效率。基于这一范式，我们引入了KnowAct-GUIClaw框架，旨在解决OpenClaw的GUI操作缺陷，并突破其跨平台和递归自我改进的限制。'}}}, {'id': 'https://huggingface.co/papers/2607.05910', 'title': 'PolicyShiftGuard: Benchmarking and Improving Policy-Adaptive Image Guardrails', 'url': 'https://huggingface.co/papers/2607.05910', 'abstract': 'Abstract  Image guardrails are typically trained and evaluated under a fixed safety policy, implicitly treating safety as an intrinsic property of an image. Real deployments are different: the same image may be allowed in one product, restricted in another, and newly disallowed when a policy boundary changes. We study policy-adaptive image guardrailing, where a model must decide whether an image violates the currently supplied policy and generalize to held-out policy definitions. We introduce PolicyShiftBench, a comprehensive benchmark with 2,000 policy-discriminative instances over 265 images, where each image is paired with 7.55 policy-conditioned prompts on average to test whether models adapt to the active policy rather than relying on image-level safety priors. We then propose PolicyShiftGuard, a compact policy-conditioned guardrail trained with a two-stage training recipe that combines Randomized Policy SFT (RP-SFT) with Boundary-Pair Policy Adaptation (BP-Adapt). BP-Adapt trains matched prompts for the same image and risk category using standard label supervision and a pairwise comparison loss that separates blocking policies from passing policies. Experiments show that existing VLMs and specialized guardrails remain brittle under policy shifts, while PolicyShiftGuard substantially improves policy-sensitive performance. The 7B model achieves SOTA performance of 76.9 Avg. F1 and 72.1 Avg. PSS on PolicyShiftBench, transfers well to UnSafeBench and SafeEditBench, and improves the latency-performance trade-off with a concise output format. Ablations confirm that matched pass/block boundary pairs are essential for stable policy adaptation.', 'score': 29, 'issue_id': 2667, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '861eeaebb01ba1b5', 'authors': ['Mingyang Song', 'Luxin Xu', 'Haoyu Sun', 'Minzhou Pan', 'Yu Cheng', 'Bo Li'], 'affiliations': ['Fudan University', 'The Chinese University of Hong Kong', 'Tongji University', 'University of Chicago', 'University of Illinois, Urbana-Champaign', 'Virtue AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.05910.jpg', 'data': {'categories': ['#cv', '#benchmark', '#security', '#training', '#dataset', '#ethics', '#multimodal'], 'emoji': '🛡️', 'ru': {'title': 'Гибкая защита: модели, которые адаптируются к политикам безопасности', 'desc': 'Работа решает проблему адаптации модели контроля безопасности изображений к различным политикам безопасности, которые могут меняться в зависимости от контекста развёртывания. Авторы создали набор данных PolicyShiftBench с 2000 примерами для оценки способности моделей адаптироваться к текущей политике вместо использования встроенных приоритетов безопасности на уровне изображения. Предложен метод PolicyShiftGuard, использующий двухэтапное обучение с рандомизированной fine-tuning под политики и адаптацией границ принятия решений через сравнение пар примеров. Экспериментальные результаты показывают, что существующие VLM модели не устойчивы к изменениям политик, а предложенный подход существенно улучшает адаптивность и обобщаемость на новые определения политик безопасности.'}, 'en': {'title': 'Adapting Image Guardrails to Evolving Safety Policies', 'desc': 'This paper addresses the challenge of adapting image guardrails to changing safety policies, which is crucial for real-world applications. It introduces PolicyShiftBench, a benchmark designed to evaluate how well models can adapt to different policy definitions using a diverse set of images and prompts. The authors propose a new model, PolicyShiftGuard, which employs a two-stage training process to enhance its ability to distinguish between images that comply with or violate current policies. Experimental results demonstrate that PolicyShiftGuard outperforms existing models in adapting to policy shifts, achieving state-of-the-art performance metrics.'}, 'zh': {'title': '政策适应性图像安全防护的创新研究', 'desc': '本文研究了图像安全防护的政策适应性，提出了一种新的模型来判断图像是否违反当前的安全政策。我们引入了PolicyShiftBench，这是一个包含2000个政策区分实例的基准测试，旨在评估模型在不同政策下的适应能力。我们提出的PolicyShiftGuard模型通过两阶段训练方法，结合随机化政策微调和边界对政策适应，显著提高了政策敏感性能。实验结果表明，PolicyShiftGuard在政策变化时表现出更强的稳定性和适应性。'}}}, {'id': 'https://huggingface.co/papers/2607.13960', 'title': 'GigaWorld-Policy-0.5: A Faster and Stronger WAM Empowered by AutoResearch', 'url': 'https://huggingface.co/papers/2607.13960', 'abstract': 'Abstract  World Action Models (WAMs) improve robot policy learning by jointly modeling actions and future visual observations, using future scene evolution as dense supervision for physically grounded action generation. However, a common design in existing WAMs is to explicitly generate future videos at inference time, incurring substantial computational overhead and hindering real-time closed-loop deployment. GigaWorld-Policy addresses this issue with an action-centered formulation, where future visual dynamics are used during training while action-only decoding is used at inference time. Building upon this framework, we present GigaWorld-Policy-0.5, an enhanced action-centered WAM designed for more efficient robot control. During pretraining, GigaWorld-Policy-0.5 adopts a mixed Action-Conditioned World Modeling (AC-WM) and WAM training strategy. This strengthens the coupling between visual dynamics and robot actions and improves the transferability of action representations for downstream policy learning. For efficient inference, GigaWorld-Policy-0.5 introduces a Mixture-of-Transformers architecture that separates visual dynamics modeling and action generation into specialized experts, reducing active computation during action-only inference and achieving 85 ms inference latency on a local RTX 4090 setup. In addition, we employ an agent-based AutoResearch pipeline to systematically search training configurations, enabling more efficient identification of optimal experimental setups while reducing the time and manual intervention required for hyperparameter tuning. Experiments and ablations show that GigaWorld-Policy-0.5 preserves the training benefits of future visual dynamics while improving inference efficiency for robot control.', 'score': 20, 'issue_id': 2667, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'de27433b98d9265a', 'authors': ['GigaWorld Team', 'Angen Ye', 'Angyuan Ma', 'Boyuan Wang', 'Chaojun Ni', 'Fangzheng Ye', 'Guan Huang', 'Guo Li', 'Guosheng Zhao', 'Haodong Yan', 'Hengtao Li', 'Jiwen Lu', 'Kai Wang', 'Mingming Yu', 'Qitang Hu', 'Qiuping Deng', 'Songling Liu', 'Xiaoyu Tian', 'Xiaofeng Wang', 'Xinyu Zhou', 'Xiuwei Xu', 'Xinze Chen', 'Yang Wang', 'Yejun Zeng', 'Yifan Chang', 'Yun Ye', 'Zhenyu Wu', 'Zhanqian Wu', 'Zheng Zhu'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.13960.jpg', 'data': {'categories': ['#training', '#architecture', '#inference', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Быстрое управление роботом без видеопредсказания при инференсе', 'desc': 'В этой работе предлагается улучшенная модель мировых действий для робототехники, которая во время обучения использует предсказание будущих визуальных наблюдений как плотный сигнал обратной связи, а при инференсе генерирует только действия без явного создания видео. Авторы вводят смешанную стратегию обучения, комбинирующую моделирование обусловленных действиями видеодинамик и полные модели мира, что улучшает связь между визуальной динамикой и действиями робота. Для повышения эффективности используется архитектура Mixture-of-Transformers с отдельными экспертами для визуальной динамики и генерации действий, достигая задержки 85 миллисекунд. Дополнительно применяется автоматический поиск конфигураций обучения через agent-based конвейер, снижающий ручные затраты на подбор гиперпараметров.'}, 'en': {'title': 'Efficient Robot Control with Action-Centered World Models', 'desc': 'The paper introduces GigaWorld-Policy-0.5, an advanced World Action Model (WAM) that enhances robot policy learning by focusing on action-centered formulations. It utilizes future visual dynamics during training but simplifies inference by generating actions without the need for future video generation, which reduces computational load. The model employs a Mixture-of-Transformers architecture to separate the tasks of visual dynamics modeling and action generation, achieving faster inference times. Additionally, an AutoResearch pipeline is used to optimize training configurations, making the process more efficient and less reliant on manual tuning.'}, 'zh': {'title': '高效机器人控制的新方法', 'desc': '世界动作模型（WAMs）通过联合建模动作和未来视觉观察，提升了机器人策略学习的效果。现有WAMs在推理时需要显式生成未来视频，这导致了计算开销大，影响实时闭环部署。GigaWorld-Policy通过以动作为中心的框架解决了这一问题，在训练时使用未来视觉动态，而在推理时仅解码动作。GigaWorld-Policy-0.5进一步优化了这一框架，提高了机器人控制的效率，同时保持了未来视觉动态的训练优势。'}}}, {'id': 'https://huggingface.co/papers/2607.12000', 'title': 'MetaView: Monocular Novel View Synthesis with Scale-Aware Implicit Geometry Priors', 'url': 'https://huggingface.co/papers/2607.12000', 'abstract': 'Abstract  Current visual generation models are capable of producing high-quality content, yet they lack a coherent perception of the spatial structure. Existing generative novel view synthesis methods typically introduce explicit geometry priors, which enforce spatial consistency but inherently restrict generalization in large view changes. In contrast, recent interactive generative methods favor implicit scene modeling, offering greater flexibility at the cost of precise camera control and geometry consistency. In this paper, we propose MetaView, a diffusion-based monocular novel view synthesis framework that enables rendering under large view changes from a single image. Our key insight is to combine implicit geometry modeling with minimal yet essential explicit 3D cues: we incorporate implicit geometry priors from a feed-forward geometry perception network to regularize structure without imposing restrictive reconstruction pipelines, while leveraging metric depth to anchor the generation to a metric scale. This design allows MetaView to achieve both geometry consistency and precise controllability. Extensive experiments demonstrate that, under challenging monocular large viewpoint changes, MetaView significantly outperforms existing methods and exhibits superior generalization. Our code is publicly available at https://github.com/KlingAIResearch/MetaView.', 'score': 19, 'issue_id': 2667, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '902fe93f7119794b', 'authors': ['Yufei Cai', 'Xuesong Niu', 'Hao Lu', 'Kun Gai', 'Kai Wu', 'Guosheng Lin'], 'affiliations': ['Kolors Team, Kuaishou Technology', 'Nanyang Technological University', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2607.12000.jpg', 'data': {'categories': [], 'emoji': '🎥', 'ru': {'title': 'Баланс между гибкостью и контролем в синтезе новых видов из одного изображения', 'desc': 'В статье предложена MetaView — диффузионная модель для синтеза новых видов (novel view synthesis) с одного изображения при больших изменениях точки зрения. Авторы решают проблему баланса между неявным моделированием сцены (которое обеспечивает гибкость) и явными геометрическими приорами (которые гарантируют пространственную консистентность). Ключевая идея — комбинировать неявные геометрические приоры из нейросети восприятия геометрии с минимальными явными 3D подсказками и метрической глубиной для якорения к реальной метрике. Экспериментальные результаты показывают, что MetaView значительно превосходит существующие методы при синтезе изображений с большими изменениями камеры и демонстрирует лучшую обобщаемость.'}, 'en': {'title': 'MetaView: Mastering View Synthesis with Geometry and Flexibility', 'desc': 'This paper introduces MetaView, a novel framework for generating images from a single view while maintaining spatial consistency. It combines implicit geometry modeling with essential explicit 3D cues to enhance the quality of generated views. By using a feed-forward geometry perception network, MetaView achieves better generalization and control over the generated content. The results show that it outperforms existing methods, especially in challenging scenarios with large viewpoint changes.'}, 'zh': {'title': 'MetaView：在大视角变化下的灵活生成', 'desc': '当前的视觉生成模型能够生成高质量的内容，但在空间结构的感知上存在不足。现有的生成新视角合成方法通常引入显式几何先验，以确保空间一致性，但这限制了在大视角变化下的泛化能力。与此不同，最近的交互式生成方法更倾向于隐式场景建模，提供了更大的灵活性，但牺牲了精确的相机控制和几何一致性。本文提出的MetaView是一种基于扩散的单目新视角合成框架，能够在大视角变化下从单张图像中进行渲染，结合了隐式几何建模和必要的显式3D线索，实现了几何一致性和精确控制。'}}}, {'id': 'https://huggingface.co/papers/2607.12752', 'title': 'Hallo4D: Multi-Modal Hallucination Mitigation for Consistent Spatio-Temporal Generation', 'url': 'https://huggingface.co/papers/2607.12752', 'abstract': 'Abstract  While recent advances in 3D generation have enabled impressive visual synthesis, existing methods often rely on 2D diffusion supervision without explicit mechanisms for geometric consistency, leading to spatial hallucinations such as duplicated structures and misaligned geometry. These issues become more severe in 4D generation, where maintaining consistency across viewpoints and temporal evolution introduces additional challenges, including jitter, identity flicker, and structural drift. We present Hallo4D, a unified and model-agnostic framework for mitigating spatiotemporal hallucinations in 3D and 4D content generation. Hallo4D introduces a generation-detection-correction paradigm that leverages large multimodal language models (LMMs) to identify and summarize spatial and temporal inconsistencies from multi-view and multi-frame renderings. These insights guide a consensus-driven image-space consistency optimization, where an LMM-based selector evaluates candidate corrections through multi-model voting, without requiring retraining or architectural modifications. To further improve temporal consistency and optimization efficiency, Hallo4D incorporates motion-aware keyframe sampling, LMM-guided initialization, and appearance alignment. We additionally introduce exposure-aware optimization and visibility pruning to enhance robustness under challenging viewpoints. Extensive experiments demonstrate that Hallo4D consistently outperforms strong baselines across diverse 3D and 4D generation settings, providing a scalable and generalizable solution for consistency-aware content generation.', 'score': 9, 'issue_id': 2667, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': '06a2c7da5ca07ca9', 'authors': ['Hongbo Wang', 'Huaibo Huang', 'Jie Cao', 'Jin Liu', 'Haoyang Tong', 'Ran He'], 'affiliations': ['MAIS&NLPR, Institute of Automation, Chinese Academy of Science, Beijing, 100190, China', 'Shanghaitech University', 'University of Chinese Academy of Sciences, Beijing, 101408, China'], 'pdf_title_img': 'assets/pdf/title_img/2607.12752.jpg', 'data': {'categories': ['#hallucinations', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Устранение галлюцинаций в пространстве и времени при синтезе 3D и 4D контента', 'desc': 'В статье представляется Hallo4D — универсальная система для устранения пространственно-временных артефактов при генерации трёхмерного и четырёхмерного контента. Метод использует парадигму «генерация-обнаружение-коррекция», где большие мультимодальные языковые модели анализируют несоответствия в многовидовых и многокадровых рендерах. На основе выявленных проблем выполняется консенсусная оптимизация в пространстве изображений с привлечением голосования нескольких моделей, без переобучения архитектур. Система включает учёт движения при выборе ключевых кадров, инициализацию на основе LMM и выравнивание внешнего вида, что обеспечивает высокую согласованность результатов.'}, 'en': {'title': 'Hallo4D: Enhancing Consistency in 3D and 4D Generation', 'desc': 'This paper presents Hallo4D, a framework designed to improve the consistency of 3D and 4D content generation by addressing common issues like spatial hallucinations and temporal inconsistencies. It utilizes a generation-detection-correction approach that employs large multimodal language models (LMMs) to identify and summarize inconsistencies in generated content. The framework optimizes image-space consistency through a consensus-driven method, allowing for corrections without needing to retrain models. Additionally, it enhances temporal consistency and efficiency with techniques like motion-aware keyframe sampling and exposure-aware optimization, demonstrating superior performance in various generation scenarios.'}, 'zh': {'title': 'Hallo4D：提升3D和4D生成一致性的创新框架', 'desc': '本文提出了一种名为Hallo4D的框架，旨在解决3D和4D内容生成中的时空幻觉问题。现有方法通常依赖于2D扩散监督，缺乏几何一致性机制，导致生成的图像出现重复结构和几何错位等问题。Hallo4D通过生成-检测-修正的范式，利用大型多模态语言模型（LMM）识别和总结多视角和多帧渲染中的时空不一致性，从而优化图像空间的一致性。实验结果表明，Hallo4D在多种3D和4D生成设置中均优于现有的强基线，提供了一种可扩展且通用的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2607.13124', 'title': 'ShortOPD: Recovering Pruned LLMs with Short-to-Long On-Policy Distillation', 'url': 'https://huggingface.co/papers/2607.13124', 'abstract': "Abstract  Structured pruning is a hardware-friendly way to compress LLMs, but it is mostly validated on multiple-choice recognition tasks, while the same compressed checkpoints can collapse on the free-form generation that deployment actually requires. Two observations trace this gap. First, greedy pass@1 nearly vanishes after compression, yet pass@k recovers substantially under repeated sampling: useful generations are demoted, not erased. Second, the recoverable regime fails mainly through suffix repetition. Recovery should therefore train on the compressed model's own on-policy states with dense token-level supervision, which On-Policy Distillation (OPD) provides by reusing the pre-compression model as a frozen teacher. However, long on-policy rollouts spend early recovery budget on low-information repetitive suffixes, delaying loss descent. To mitigate this waste, we propose \\shortopd, a short-to-long OPD schedule that detects teacher-confirmed repetitive suffixes, treats the surviving prefix as each rollout's effective length, and allocates future rollout budgets to the effective lengths the policy can currently use. Across math, code, and open-ended generation, \\shortopd\\ raises the compressed model's score to about 9times its unrecovered value and 1.6--4.4times standard recovery recipes (SFT w/o KD, KD, and SeqKD), and it matches a fixed 8192-token rollout horizon within two points using a quarter of the training time (8.5 vs.\\ 35.9 hours) and 71% fewer rollout tokens. We hope this recipe helps move structured pruning beyond marginal gains on perplexity and multiple-choice benchmarks, a step closer to deployment-ready generation quality.", 'score': 8, 'issue_id': 2667, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': '535642a6ab43a99e', 'authors': ['Qingyu Zhang', 'Qianhao Yuan', 'Hongyu Lin', 'Yaojie Lu', 'Xianpei Han', 'Le Sun', 'Xiang Li', 'Ming Xu', 'Jiarui Li', 'Xiuyin Zhao'], 'affiliations': ['ByteDance', 'Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.13124.jpg', 'data': {'categories': ['#training', '#optimization', '#inference'], 'emoji': '✂️', 'ru': {'title': 'Восстановление генерации в сжатых моделях через обучение на собственных состояниях', 'desc': 'В статье рассматривается проблема сжатия больших языковых моделей через структурную прунинг, которая хорошо работает на задачах распознавания, но приводит к деградации качества при генерации текста. Авторы замечают, что после сжатия модели теряют способность генерировать на первый проход, но восстанавливают её при повторной выборке, и основная проблема заключается в повторяющихся суффиксах в выводе. Предложенный метод On-Policy Distillation (OPD) использует исходную модель как учителя и применяет плотный супервизор на уровне токенов для обучения на собственных состояниях сжатой модели. Инновационная техника short-to-long расписания OPD определяет повторяющиеся суффиксы и эффективно распределяет бюджет обучения, достигая качества полноценной модели за четверть времени обучения.'}, 'en': {'title': 'Optimizing Compressed LLMs for Better Generation Quality', 'desc': "This paper discusses a method called structured pruning to compress large language models (LLMs) for better performance in free-form generation tasks. The authors identify that while traditional metrics like greedy pass@1 suffer after compression, using repeated sampling can recover useful outputs, indicating that important generations are still present but not easily accessed. They introduce On-Policy Distillation (OPD) to train on the compressed model's outputs, but find that early rollouts often waste resources on repetitive content. To address this, they propose a new approach, short-to-long OPD, which optimizes the training process by focusing on effective lengths of generated sequences, significantly improving the model's performance while reducing training time and resource usage."}, 'zh': {'title': '提升压缩模型生成质量的有效方法', 'desc': '结构化剪枝是一种适合硬件的压缩大语言模型（LLM）的方法，但它主要在多选识别任务上得到验证，而在实际需要的自由形式生成中，压缩后的检查点可能会崩溃。研究发现，压缩后贪婪的pass@1几乎消失，但在重复采样下，pass@k显著恢复：有用的生成被降级而不是消除。为了改善这一点，提出了短期到长期的On-Policy Distillation（OPD）调度，通过检测教师确认的重复后缀，优化每次回滚的有效长度，从而提高压缩模型的性能。实验结果表明，\texttt{shortopd}在数学、代码和开放式生成任务中显著提升了压缩模型的得分，接近于部署所需的生成质量。'}}}, {'id': 'https://huggingface.co/papers/2607.11523', 'title': 'Vinci2: Providing Proactive Assistance in Continuous Egocentric Videos', 'url': 'https://huggingface.co/papers/2607.11523', 'abstract': "Abstract  When should an intelligent assistant speak up without being asked? Continuous egocentric video offers rich, evolving context that enables a new form of assistance: one that is proactive rather than merely reactive. Yet existing approaches either wait passively for user queries or treat every detected event as requiring a response, without considering the user's history, current activity, or whether assistance would actually be welcome. We reframe proactive assistance as a context-dependent decision problem: the agent must not only perceive what is happening, but reason over accumulated temporal context to determine when and whether to intervene. To this end, we present Vinci2, a proactive egocentric assistance system that advances the on-device assistant Vinci from reactive response toward proactivity. On the evaluation side, we present EgoServe, the first large-scale benchmark for proactive assistance in continuous egocentric video. EgoServe comprises over 3,000 service instances organized along 4 temporal memory horizons, ranging from immediate safety alerts to long-term habit coaching, across 10 service categories. On the modeling side, we propose EgoMemo, a training-free, memory-augmented agent that maintains three complementary memory representations: multi-scale temporal summaries, a semantic knowledge graph, and visual embedding archives. At each timestep, EgoMemo performs retrieval-augmented reasoning to determine whether assistance is warranted and, if so, produces contextually grounded responses. Experiments demonstrate that EgoMemo establishes strong baselines on EgoServe while remaining competitive on existing egocentric benchmarks. Our benchmark and code are publicly available at https://sitonggong.github.io/EgoServe-page/{Vinci2}.", 'score': 4, 'issue_id': 2667, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '27f7e95d123e6e31', 'authors': ['Gong Sitong', 'Tianyu Yan', 'Caixin Kang', 'Bo Zheng', 'Xiang Ruan', 'Huchuan Lu', 'Kaipeng Zhang', 'Yoichi Sato', 'Yifei Huang'], 'affiliations': ['Alaya Lab', 'Dalian University of Technology', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2607.11523.jpg', 'data': {'categories': ['#rag', '#benchmark', '#video', '#agents', '#multimodal'], 'emoji': '👁️', 'ru': {'title': 'Проактивная помощь через память и контекст в эгоцентрическом видео', 'desc': 'Авторы представляют систему проактивного ассистента Vinci2, которая способна предлагать помощь без явного запроса пользователя, анализируя непрерывный видеопоток от эгоцентрической камеры. Они переформулируют задачу проактивной помощи как контекстно-зависимую проблему принятия решений, где модель должна не только распознать происходящее, но и рассуждать над накопленным временным контекстом. Для обучения и оценки предложены бенчмарк EgoServe с более чем 3000 примерами и модель EgoMemo с тремя типами памяти: многомасштабными временными суммами, семантическим графом знаний и архивами визуальных эмбеддингов. EgoMemo использует retrieval-augmented reasoning для определения необходимости вмешательства и генерации контекстуально обоснованных ответов.'}, 'en': {'title': 'Proactive Assistance: Knowing When to Speak Up', 'desc': "This paper introduces Vinci2, a proactive egocentric assistance system that enhances traditional reactive assistants by using continuous video context. It addresses the challenge of determining when to provide assistance by framing it as a context-dependent decision problem, taking into account the user's history and current activities. The system utilizes EgoMemo, a memory-augmented agent that employs multiple memory representations to reason about the need for intervention. The authors also present EgoServe, a large-scale benchmark for evaluating proactive assistance, demonstrating that their approach achieves strong performance on this new dataset."}, 'zh': {'title': '智能助手的主动介入：从反应到主动的转变', 'desc': '本论文探讨了智能助手在何时应主动发言而非被动响应的问题。我们提出了一种新的主动辅助系统Vinci2，它能够根据用户的历史和当前活动来判断何时介入。为此，我们引入了EgoMemo，一个增强记忆的代理，能够在每个时间点进行基于上下文的推理。通过EgoServe基准测试，我们验证了该系统在主动辅助方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.07702', 'title': 'From Noisy Traces to Root Causes: Structural Trajectory Analysis and Causal Extraction for Agent Optimization', 'url': 'https://huggingface.co/papers/2607.07702', 'abstract': 'Abstract  The optimization of long-horizon agents increasingly relies on reflection-based mechanisms, where a large language model (LLM) acts as an optimizer to diagnose agent failures and improve agent policies. However, real execution traces are difficult to use directly for optimization: large trace collections are often redundant and heterogeneous, making optimization inefficient and prone to overfitting to low-value failures; meanwhile, each individual trajectory also contains many irrelevant steps, while naive context reduction methods such as truncation or sliding windows can discard causally important evidence and produce misleading optimization signals. To resolve this dilemma, we introduce STRACE (Structural TRajectory Analysis and Causal Extraction), a framework that constructs high signal-noise optimization contexts for more precise and effective optimization. At the batch level, STRACE mines failure patterns to filter redundant traces and retain representative failures; within each selected trace, it performs causal localization over a textual dependency graph to remove non-causal steps and identify the true root-cause module for optimization. Empirical results demonstrate that STRACE significantly outperforms standard context-filtering baselines. Notably, on a challenging formal verification task (VeruSAGE-Bench), it successfully optimizes human-expert designed agents, delivering 1.4times success-rate improvement (42.5% to 58.5%). The code is available at https://github.com/moomight/STRACE .', 'score': 4, 'issue_id': 2667, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '18f4cc35c701c17e', 'authors': ['Ying Chang', 'Jiahang Xu', 'Xuan Feng', 'Chenyuan Yang', 'Peng Cheng', 'Yuqing Yang'], 'affiliations': ['Microsoft Research', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.07702.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Причинная фильтрация трасс для точной оптимизации агентов через LLM', 'desc': 'В работе предложен метод STRACE для оптимизации долгоживущих агентов с использованием отражающих механизмов, где большая языковая модель анализирует ошибки агента и улучшает его политику. Основная проблема заключается в том, что реальные трассы выполнения содержат много избыточной и несущественной информации, а простые методы сокращения контекста могут потерять важные причинные связи. STRACE решает эту проблему на двух уровнях: на уровне батча фильтрует дублирующиеся трассы и сохраняет репрезентативные ошибки, а внутри каждой трассы выполняет причинную локализацию через граф зависимостей текста для выявления корневых причин сбоев. Экспериментальные результаты показывают значительное улучшение: на задаче формальной верификации VeruSAGE-Bench достигнуто увеличение успешности с 42,5% до 58,5%.'}, 'en': {'title': 'Optimizing Agents with STRACE: Enhancing Efficiency through Causal Analysis', 'desc': 'This paper presents STRACE, a new framework designed to enhance the optimization of long-horizon agents by improving the use of execution traces. STRACE addresses the challenges of redundancy and heterogeneity in large trace collections, which can lead to inefficient optimization and overfitting. By mining failure patterns and performing causal localization, STRACE filters out irrelevant steps and focuses on the most significant failures for optimization. The results show that STRACE achieves a notable improvement in success rates for agent optimization tasks compared to traditional methods.'}, 'zh': {'title': '优化智能体的高效新方法：STRACE', 'desc': '本文提出了一种名为STRACE的框架，用于优化长时间跨度的智能体。该框架通过分析执行轨迹，过滤冗余数据并保留具有代表性的失败案例，从而提高优化的效率和准确性。STRACE还利用文本依赖图进行因果定位，去除无关步骤，识别真正的根本原因模块。实验结果表明，STRACE在优化人类专家设计的智能体方面显著优于传统的上下文过滤方法。'}}}, {'id': 'https://huggingface.co/papers/2607.12747', 'title': 'Tracing Agentic Failure from the Flow of Success', 'url': 'https://huggingface.co/papers/2607.12747', 'abstract': 'Abstract  Failure attribution for LLM-based agentic systems, i.e., identifying which steps in a failure trajectory caused the task to fail, is critical for debugging and improving these systems. Existing approaches either rely on prompting-based pipelines, which are computationally expensive, or require post-training on failure trajectories with step-level error annotations, which are costly to collect and difficult to scale. We argue that a practical failure attribution model should be lightweight and trainable without step-level supervision on failure data. To this end, we address unsupervised failure attribution, i.e., training exclusively on successful trajectories and identifying error steps at inference time given a failure trajectory. We propose OAT, which casts this problem as one-class learning with neural controlled differential equations, modeling the dynamical pattern of successful trajectories in latent space. At inference time, each step in a failure trajectory is assigned an anomaly score based on its deviation from the dynamics learned on successful trajectories, which is then used to form a set of error steps. With training on only 100 successful trajectories, experiments show that OAT is 200--5000 times faster than prompting-based baselines, and, at the same time, consistently outperforms them in both in-domain and out-of-distribution datasets with +20% and +7% F1 scores, respectively, demonstrating that OAT is a promising and efficient direction for diagnosing agentic system failures.', 'score': 3, 'issue_id': 2667, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': 'b4ce0409c5a93b46', 'authors': ['Samuel Yeh', 'Yiwen Zhu', 'Shaleen Deep', 'Sharon Li'], 'affiliations': ['Department of Computer Science, University of Wisconsin-Madison', 'Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2607.12747.jpg', 'data': {'categories': ['#training', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Быстрая диагностика ошибок агентов через обучение на успешных траекториях', 'desc': 'Статья решает проблему атрибуции ошибок в агентских системах на основе большых языковых моделей, то есть определения того, на каком шаге траектории выполнения произошла ошибка. Авторы предлагают метод OAT, который использует обучение на одном классе с нейронными контролируемыми дифференциальными уравнениями для моделирования динамики успешных траекторий в скрытом пространстве. Система обучается только на успешных примерах и не требует разметки ошибок на уровне шагов, что делает её практичной и масштабируемой. Экспериментальные результаты показывают, что OAT работает в 200-5000 раз быстрее чем методы на основе промптинга и достигает лучших результатов с улучшением F1-score на 20% и 7% на в-доменных и вне-доменных данных соответственно.'}, 'en': {'title': 'Efficient Failure Diagnosis for LLMs with OAT', 'desc': 'This paper presents a method for identifying the causes of failures in large language model (LLM)-based systems without needing extensive labeled data. The proposed model, OAT, uses unsupervised learning to analyze successful task trajectories and detect anomalies in failure cases. By employing neural controlled differential equations, OAT efficiently learns the dynamics of successful outcomes and assigns anomaly scores to each step in a failure trajectory. The results show that OAT is significantly faster and more effective than existing methods, making it a valuable tool for debugging and improving agentic systems.'}, 'zh': {'title': '高效故障归因：无监督学习的新方向', 'desc': '本文讨论了基于大型语言模型（LLM）的智能系统中的故障归因问题，即识别导致任务失败的步骤。现有方法要么依赖于计算成本高的提示管道，要么需要在失败轨迹上进行后训练，这些步骤的错误注释收集成本高且难以扩展。我们提出了一种轻量级的无监督故障归因模型，专注于仅使用成功轨迹进行训练，并在推理时识别错误步骤。我们的方法OAT通过神经控制微分方程将此问题视为单类学习，能够在仅使用100个成功轨迹的情况下，显著提高故障诊断的效率和准确性。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (4)', '#agi', '#alignment', '#architecture (1)', '#audio', '#benchmark (6)', '#cv (2)', '#data', '#dataset (3)', '#diffusion (1)', '#ethics (1)', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (3)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (3)', '#open_source (2)', '#optimization (3)', '#plp', '#rag (1)', '#reasoning (2)', '#rl (2)', '#rlhf', '#robotics (1)', '#science', '#security (1)', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (7)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

                articles = articles.slice(0, 50);

            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);

                let title = item["data"][currentLang]["title"];

                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `

                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>

                            🔺 ${item['score']}. ${item['title']}</p>

                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';

            }
        }

            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-16 07:19')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-16 07:19')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
