    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["–ľ–ł–Ĺ—É—ā—É", "–ľ–ł–Ĺ—É—ā—č", "–ľ–ł–Ĺ—É—ā"],
                hour: ["—á–į—Ā", "—á–į—Ā–į", "—á–į—Ā–ĺ–≤"],
                day: ["–ī–Ķ–Ĺ—Ć", "–ī–Ĺ—Ź", "–ī–Ĺ–Ķ–Ļ"],
                justNow: "—ā–ĺ–Ľ—Ć–ļ–ĺ —á—ā–ĺ",
                ago: "–Ĺ–į–∑–į–ī"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["ŚąÜťíü", "ŚąÜťíü", "ŚąÜťíü"],
                hour: ["ŚįŹśó∂", "ŚįŹśó∂", "ŚįŹśó∂"],
                day: ["Ś§©", "Ś§©", "Ś§©"],
                justNow: "ŚąöŚąö",
                ago: "ŚČć"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "—Ā—ā–į—ā–Ķ–Ļ";
            } else if (lastDigit === 1) {
                word = "—Ā—ā–į—ā—Ć—Ź";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "—Ā—ā–į—ā—Ć–ł";
            } else {
                word = "—Ā—ā–į—ā–Ķ–Ļ";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "ÁĮáŤģļśĖá"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.10400', 'title': 'SynthDocBench: Controlled Benchmark for Long-Context Visual Document Understanding', 'url': 'https://huggingface.co/papers/2607.10400', 'abstract': 'Abstract  Vision language models (VLMs) have achieved strong performance on visual document understanding benchmarks such as DocVQA, ChartQA, and MMLongBench-Doc. However, real-world documents combine multiple factors such as length, layout complexity, modality, and question difficulty, which makes it difficult to attribute model failures to specific causes. We introduce SynthDocBench, a fully synthetic benchmark for long-context visual document understanding that systematically controls factors including document length, layout structure, modality composition, and question type. The benchmark is constructed using a combinatorial design, each factor is varied independently across generated documents, enabling controlled analysis of model behavior. Documents are generated end to end using an LLM pipeline across six layout archetypes, with a 40 percent random override to prevent models from exploiting spurious correlations. Additionally, SynthDocBench spans long-context documents with substantially greater length and structural diversity than existing benchmarks. Evaluating seven frontier VLMs, we uncover three failure modes that existing benchmarks cannot surface: sharp degradation with document length, a systematic positional sensitivity in which the middle third of a document is hardest for five of six models and five of six models show a negative Early-to-Late trend (steepest decline: 8.3 percentage points), and breakdown of chart comprehension in long-document settings. These results suggest that current models may be overfitting to benchmark artifacts rather than achieving robust long-context visual document understanding.', 'score': 55, 'issue_id': 2659, 'pub_date': '2026-07-11', 'pub_date_card': {'ru': '11 –ł—é–Ľ—Ź', 'en': ' —ā—Ć —É—Ā—ā–ĺ–Ļ—á–ł–≤–ĺ–Ķ –Ņ–ĺ–Ĺ–ł–ľ–į–Ĺ–ł–Ķ –ī–Ľ–ł–Ĺ–Ĺ–ĺ–≥–ĺ –ļ–ĺ–Ĺ—ā–Ķ–ļ—Ā—ā–į.'}, 'en': {'title': 'Unveiling Model Weaknesses in Visual Document Understanding', 'desc': 'This paper introduces SynthDocBench, a new benchmark designed to evaluate vision language models (VLMs) on long-context visual document understanding. It systematically varies factors like document length, layout complexity, and question types to analyze model performance more effectively. The benchmark uses a combinatorial design to generate synthetic documents, allowing for controlled testing of VLMs. The study reveals critical failure modes in existing models, indicating that they may be overfitting to previous benchmarks rather than truly understanding complex documents.'}, 'zh': {'title': 'śŹ≠Á§ļŤßÜŤßČŤĮ≠Ť®Äś®°ŚěčÁöĄśĹúŚú®Áľļťô∑', 'desc': 'śú¨śĖášĽčÁĽćšļÜšłÄÁßćśĖįÁöĄŚüļŚáÜśĶčŤĮēŚ∑•ŚÖ∑SynthDocBenchÔľĆÁĒ®šļéŤĮĄšľįŤßÜŤßČŤĮ≠Ť®Äś®°ŚěčŚú®ťēŅśĖáśú¨ŤßÜŤßČśĖáś°£ÁźÜŤß£šł≠ÁöĄŤ°®Áéį„ÄāŤĮ•ŚüļŚáÜťÄöŤŅáÁ≥ĽÁĽüśéßŚą∂śĖáś°£ťēŅŚļ¶„ÄĀŚłÉŚĪÄÁĽďśěĄ„ÄĀś®°śÄĀÁĽĄŚźąŚíĆťóģťĘėÁĪĽŚěčÁ≠ČŚõ†Áī†ÔľĆŚłģŚä©ŚąÜśěźś®°ŚěčÁöĄŤ°Ćšłļ„ÄāÁ†ĒÁ©∂ŚŹĎÁéįÔľĆÁéįśúČś®°ŚěčŚú®Ś§ĄÁźÜťēŅśĖáś°£śó∂Ś≠ėŚú®šłČÁßćŚ§ĪŤī•ś®°ŚľŹÔľĆŚĆÖśč¨śĖáś°£ťēŅŚļ¶ŚĮľŤáīÁöĄśÄßŤÉĹśÄ•ŚČßšłčťôćŚíĆŚĮĻśĖáś°£šł≠ťóīťÉ®ŚąÜÁöĄśēŹśĄüśÄß„ÄāÁĽďśěúŤ°®śėéÔľĆŚĹďŚČćś®°ŚěčŚŹĮŤÉĹŤŅáŚļ¶śčüŚźąŚüļŚáÜśĶčŤĮēÁöĄÁČĻŚĺĀÔľĆŤÄĆśú™ŤÉĹŚģěÁéįÁ®≥ŚĀ•ÁöĄťēŅśĖáśú¨ŤßÜŤßČśĖáś°£ÁźÜŤß£„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.11886', 'title': 'Read It Back: Pretrained MLLMs Are Zero-Shot Reward Models for Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2607.11886', 'abstract': "Abstract  In this paper, we propose SpectraReward, a training-free reward function that turns pretrained MLLMs into off-the-shelf reward models for image-generation reinforcement learning. Instead of asking the MLLM to judge a generated image or answer decomposed verification questions, SpectraReward measures how well the original prompt can be recovered from the generated image through a single image-conditioned, teacher-forced forward pass. We use the average image-conditioned prompt log-likelihood as the reward, directly reusing the MLLM's pretrained image-text alignment ability without preference labels, reward-model fine-tuning. We further introduce Self-SpectraReward, a special case for unified multimodal models where the policy's own understanding branch serves as the reward model for its generation branch, forming a closed-loop self-improving framework without external reward models or external knowledge. Extensive experiments validate SpectraReward through a broad image-generation RL study covering two diffusion models, three RL algorithms, nine reward MLLM backbones from four MLLM families spanning 4B to 235B parameters, and five out-of-distribution text-to-image benchmarks. Results show that both SpectraReward and Self-SpectraReward significantly and consistently improve generation performance and outperform prior MLLM-derived reward training methods. Further analysis reveals that larger reward MLLMs are not always better, while Self-SpectraReward can match or surpass much larger external reward models, suggesting that reward-policy alignment is a key factor for effective image-generation RL. Project Page: https://huangrh99.github.io/SpectraReward/", 'score': 44, 'issue_id': 2654, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 –ł—é–Ľ—Ź', 'en': 'July 13', 'zh': '7śúą13śó•'}, 'hash': '6cd66e079f508eef', 'authors': ['Runhui Huang', 'Qihui Zhang', 'Zhe Liu', 'Yu Gao', 'Jie Wu', 'Hengshuang Zhao'], 'affiliations': ['ByteDance Seed', 'Peking University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.11886.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#benchmark', '#rl'], 'emoji': 'ūüé®', 'ru': {'title': '–ó–į–ľ–ļ–Ĺ—É—ā—č–Ļ —Ü–ł–ļ–Ľ —Ā–į–ľ–ĺ–ĺ—Ü–Ķ–Ĺ–ļ–ł –ī–Ľ—Ź —É–Ľ—É—á—ą–Ķ–Ĺ–ł—Ź –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ļ', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī–Ľ–į–≥–į–Ķ—ā—Ā—Ź SpectraReward ‚ÄĒ —Ą—É–Ĺ–ļ—Ü–ł—Ź –Ĺ–į–≥—Ä–į–ī—č, –ļ–ĺ—ā–ĺ—Ä–į—Ź –Ņ—Ä–Ķ–≤—Ä–į—Č–į–Ķ—ā –Ņ—Ä–Ķ–ī–≤–į—Ä–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–Ĺ—č–Ķ –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č–Ķ –Ī–ĺ–Ľ—Ć—ą–ł–Ķ —Ź–∑—č–ļ–ĺ–≤—č–Ķ –ľ–ĺ–ī–Ķ–Ľ–ł –≤ –≥–ĺ—ā–ĺ–≤—č–Ķ –ļ –ł—Ā–Ņ–ĺ–Ľ—Ć–∑–ĺ–≤–į–Ĺ–ł—é –ľ–ĺ–ī–Ķ–Ľ–ł –ĺ—Ü–Ķ–Ĺ–ļ–ł –ī–Ľ—Ź –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ļ. –í–ľ–Ķ—Ā—ā–ĺ —ā–ĺ–≥–ĺ —á—ā–ĺ–Ī—č –Ņ—Ä–ĺ—Ā–ł—ā—Ć –ľ–ĺ–ī–Ķ–Ľ—Ć —Ā—É–ī–ł—ā—Ć –ĺ —Ā–≥–Ķ–Ĺ–Ķ—Ä–ł—Ä–ĺ–≤–į–Ĺ–Ĺ–ĺ–ľ –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–ł, –ľ–Ķ—ā–ĺ–ī –ł–∑–ľ–Ķ—Ä—Ź–Ķ—ā –ļ–į—á–Ķ—Ā—ā–≤–ĺ –≤–ĺ—Ā—Ā—ā–į–Ĺ–ĺ–≤–Ľ–Ķ–Ĺ–ł—Ź –ł—Ā—Ö–ĺ–ī–Ĺ–ĺ–≥–ĺ —ā–Ķ–ļ—Ā—ā–ĺ–≤–ĺ–≥–ĺ –∑–į–Ņ—Ä–ĺ—Ā–į –ł–∑ –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł—Ź —á–Ķ—Ä–Ķ–∑ –Ņ—Ä—Ź–ľ–ĺ–Ļ –Ņ—Ä–ĺ—Ö–ĺ–ī –ľ–ĺ–ī–Ķ–Ľ–ł –ļ–ĺ–Ĺ–ī–ł—Ü–ł–ĺ–Ĺ–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź, –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É—Ź —Ā—Ä–Ķ–ī–Ĺ–Ķ–Ķ –Ľ–ĺ–≥–į—Ä–ł—Ą–ľ–ł—á–Ķ—Ā–ļ–ĺ–Ķ –Ņ—Ä–į–≤–ī–ĺ–Ņ–ĺ–ī–ĺ–Ī–ł–Ķ –ļ–į–ļ –Ĺ–į–≥—Ä–į–ī—É. –ź–≤—ā–ĺ—Ä—č —ā–į–ļ–∂–Ķ –Ņ—Ä–Ķ–ī–Ľ–į–≥–į—é—ā Self-SpectraReward ‚ÄĒ —Ā–Ņ–Ķ—Ü–ł–į–Ľ—Ć–Ĺ—č–Ļ —Ā–Ľ—É—á–į–Ļ –ī–Ľ—Ź —É–Ĺ–ł—Ą–ł—Ü–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č—Ö –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ, –≥–ī–Ķ –≤–Ķ—ā–≤—Ć –Ņ–ĺ–Ĺ–ł–ľ–į–Ĺ–ł—Ź –Ņ–ĺ–Ľ–ł—ā–ł–ļ–ł —Ā–Ľ—É–∂–ł—ā –ľ–ĺ–ī–Ķ–Ľ—Ć—é –ĺ—Ü–Ķ–Ĺ–ļ–ł –ī–Ľ—Ź –Ķ—Ď –≤–Ķ—ā–≤–ł –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł, —Ā–ĺ–∑–ī–į–≤–į—Ź –∑–į–ľ–ļ–Ĺ—É—ā—č–Ļ —Ü–ł–ļ–Ľ —Ā–į–ľ–ĺ—Ā–ĺ–≤–Ķ—Ä—ą–Ķ–Ĺ—Ā—ā–≤–ĺ–≤–į–Ĺ–ł—Ź –Ī–Ķ–∑ –≤–Ĺ–Ķ—ą–Ĺ–ł—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –Ĺ–į–≥—Ä–į–ī—č. –≠–ļ—Ā–Ņ–Ķ—Ä–ł–ľ–Ķ–Ĺ—ā–į–Ľ—Ć–Ĺ–į—Ź –≤–į–Ľ–ł–ī–į—Ü–ł—Ź –ĺ—Ö–≤–į—ā—č–≤–į–Ķ—ā –ī–≤–Ķ –ī–ł—Ą—Ą—É–∑–ł–ĺ–Ĺ–Ĺ—č–Ķ –ľ–ĺ–ī–Ķ–Ľ–ł, —ā—Ä–ł –į–Ľ–≥–ĺ—Ä–ł—ā–ľ–į RL –ł –ī–Ķ–≤—Ź—ā—Ć –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ —Ä–į–∑–Ľ–ł—á–Ĺ—č—Ö —Ā–Ķ–ľ–Ķ–Ļ—Ā—ā–≤, –ī–Ķ–ľ–ĺ–Ĺ—Ā—ā—Ä–ł—Ä—É—Ź –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ—č–Ķ —É–Ľ—É—á—ą–Ķ–Ĺ–ł—Ź –ł –Ņ—Ä–Ķ–≤–ĺ—Ā—Ö–ĺ–ī—Ā—ā–≤–ĺ –Ĺ–į–ī —Ā—É—Č–Ķ—Ā—ā–≤—É—é—Č–ł–ľ–ł –ľ–Ķ—ā–ĺ–ī–į–ľ–ł –Ĺ–į –ĺ—Ā–Ĺ–ĺ–≤–Ķ –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ.'}, 'en': {'title': 'Transforming MLLMs into Reward Models for Enhanced Image Generation', 'desc': "This paper introduces SpectraReward, a novel reward function that allows pretrained Multimodal Language Models (MLLMs) to be used as reward models in image generation tasks without additional training. Instead of evaluating generated images directly, SpectraReward assesses how well the original text prompt can be reconstructed from the generated image, using the log-likelihood of the prompt as the reward signal. The authors also present Self-SpectraReward, which utilizes the model's own understanding to create a self-improving feedback loop for image generation. Experimental results demonstrate that both SpectraReward and Self-SpectraReward enhance image generation performance significantly, outperforming traditional reward training methods and highlighting the importance of reward-policy alignment."}, 'zh': {'title': 'SpectraRewardÔľöśó†Ťģ≠ÁĽÉÁöĄŚõĺŚÉŹÁĒüśąźŚ•ĖŚäĪś®°Śěč', 'desc': 'śú¨śĖáśŹźŚáļšļÜšłÄÁßćŚźćšłļSpectraRewardÁöĄśó†Ťģ≠ÁĽÉŚ•ĖŚäĪŚáĹśēįÔľĆśó®Śú®ŚįÜťĘĄŤģ≠ÁĽÉÁöĄŚ§öś®°śÄĀŚ§ßŤĮ≠Ť®Äś®°ŚěčÔľąMLLMÔľČŤĹ¨ŚĆĖšłļŚõĺŚÉŹÁĒüśąźŚľļŚĆĖŚ≠¶šĻ†ÁöĄŚć≥ÁĒ®Ś•ĖŚäĪś®°Śěč„ÄāSpectraRewardťÄöŤŅáŚćēś¨°ŚõĺŚÉŹśĚ°šĽ∂ÁöĄŚČćŚźĎšľ†śí≠ÔľĆśĶčťáŹÁĒüśąźŚõĺŚÉŹšłéŚéüŚßčśŹźÁ§ļÁöĄśĀĘŚ§ćÁ®čŚļ¶ÔľĆŤÄĆšłćśėĮŤģ©MLLMŚą§śĖ≠ÁĒüśąźÁöĄŚõĺŚÉŹśąĖŚõěÁ≠ĒŚąÜŤß£ÁöĄť™ĆŤĮĀťóģťĘė„ÄāśąĎšĽ¨šĹŅÁĒ®ŚõĺŚÉŹśĚ°šĽ∂šłčÁöĄśŹźÁ§ļŚĮĻśēįšľľÁĄ∂ŚĻ≥ŚĚáŚÄľšĹúšłļŚ•ĖŚäĪÔľĆÁõīśé•Śą©ÁĒ®MLLMÁöĄťĘĄŤģ≠ÁĽÉŚõĺŚÉŹ-śĖáśú¨ŚĮĻťĹźŤÉĹŚäõÔľĆŤÄĆśó†ťúÄŚĀŹŚ•Ĺś†áÁ≠ĺśąĖŚ•ĖŚäĪś®°ŚěčŚĺģŤįÉ„Äāś≠§Ś§ĖÔľĆśąĎšĽ¨ŚľēŚÖ•šļÜSelf-SpectraRewardÔľĆšĹúšłļÁĽüšłÄŚ§öś®°śÄĀś®°ŚěčÁöĄÁČĻśģäśÉÖŚÜĶÔľĆŚĹĘśąźšłÄšł™ťó≠ÁéĮŤá™śąĎśĒĻŤŅõś°Üśě∂ÔľĆŤŅõšłÄś≠•ť™ĆŤĮĀšļÜSpectraRewardŚú®ŚõĺŚÉŹÁĒüśąźŚľļŚĆĖŚ≠¶šĻ†šł≠ÁöĄśúČśēąśÄß„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.05382', 'title': 'Search Beyond What Can Be Taught: Evolving the Knowledge Boundary in Agentic Visual Generation', 'url': 'https://huggingface.co/papers/2607.05382', 'abstract': 'Abstract  Visual generators excel at rendering, but they confidently fabricate what they do not know. User requests are unbounded, evolving, and deeply long-tailed: new characters, trending entities, post-cutoff events, and more. This world-knowledge bottleneck is structural: generators are trained on fixed corpora, but the visual world is open-ended. We construct SearchGen-20K and SearchGen-Bench, with 20,839 prompts spanning twelve failure categories and twenty-two domains, paired with a pre-executed multimodal SearchGen-Corpus-1M to support offline, reproducible research. On SearchGen-Bench, frontier open generators score only 21 to 28 out of 100, a 40-point collapse invisible to existing benchmarks. The natural remedy is to employ search tools, enabling agentic visual generation. However, we find that naive search fails: it retrieves indiscriminately, injecting noise into prompts the generator already handles. We trace the root cause to a generator-specific, evolving knowledge boundary: the divide between what a generator can internalize through training and what must remain in external context. Although this boundary is hard to specify in advance, we show that it is discoverable through a teach-then-search co-training framework. Even a minimal version of this co-training recipe produces monotonic improvement, laying the foundation for recursive self-improvement in visual generation that can meet world-knowledge-grounded requests. We release the full dataset, co-training corpus, and search corpus as a replayable harness for tool-augmented, world-knowledge-grounded visual generation.', 'score': 31, 'issue_id': 2659, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 –ł—é–Ľ—Ź', 'en': 'July 9', 'zh': '7śúą9śó•'}, 'hash': 'c290bb51e208eaf0', 'authors': ['Haozhe Wang', 'Weijia Feng', 'Jinpeng Yu', 'Che Liu', 'Ping Nie', 'Fangzhen Lin', 'Jiaming Liu', 'Ruihua Huang', 'Jimmy Lin', 'Wenhu Chen', 'Cong Wei'], 'affiliations': ['Hong Kong University of Science and Technology', 'Imperial College London', 'Qwen Applications', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2607.05382.jpg', 'data': {'categories': ['#cv', '#multimodal', '#benchmark', '#dataset', '#agents'], 'emoji': 'ūüĒć', 'ru': {'title': '–ü–ĺ–ł—Ā–ļ –≤ –Ņ–ĺ–ľ–ĺ—Č—Ć –Ņ–į–ľ—Ź—ā–ł: –≤–ł–∑—É–į–Ľ—Ć–Ĺ–į—Ź –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł—Ź —Ā –≤–Ĺ–Ķ—ą–Ĺ–ł–ľ –∑–Ĺ–į–Ĺ–ł–Ķ–ľ –ľ–ł—Ä–į', 'desc': '–í —Ä–į–Ī–ĺ—ā–Ķ –ł—Ā—Ā–Ľ–Ķ–ī—É–Ķ—ā—Ā—Ź –Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ–į –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č—Ö –≥–Ķ–Ĺ–Ķ—Ä–į—ā–ĺ—Ä–ĺ–≤, –ļ–ĺ—ā–ĺ—Ä—č–Ķ –Ĺ–Ķ –ľ–ĺ–≥—É—ā —Ā–ł–Ĺ—ā–Ķ–∑–ł—Ä–ĺ–≤–į—ā—Ć –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł—Ź –ĺ–Ī—ä–Ķ–ļ—ā–ĺ–≤ –ł —Ā–ĺ–Ī—č—ā–ł–Ļ, –ĺ—ā—Ā—É—ā—Ā—ā–≤—É—é—Č–ł—Ö –≤ –ł—Ö —ā—Ä–Ķ–Ĺ–ł—Ä–ĺ–≤–ĺ—á–Ĺ—č—Ö –ī–į–Ĺ–Ĺ—č—Ö. –ź–≤—ā–ĺ—Ä—č —Ā–ĺ–∑–ī–į–Ľ–ł –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ SearchGen-Bench —Ā 20,839 –Ņ—Ä–ĺ–ľ–Ņ—ā–į–ľ–ł, –≤—č—Ź–≤–ł–≤ –ļ—Ä–ł—ā–ł—á–Ķ—Ā–ļ–ĺ–Ķ –Ņ–į–ī–Ķ–Ĺ–ł–Ķ –ļ–į—á–Ķ—Ā—ā–≤–į —Ā–ĺ–≤—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č—Ö –≥–Ķ–Ĺ–Ķ—Ä–į—ā–ĺ—Ä–ĺ–≤ –ī–ĺ 21-28 –Ī–į–Ľ–Ľ–ĺ–≤ –ł–∑ 100. –ü—Ä–Ķ–ī–Ľ–ĺ–∂–Ķ–Ĺ–ĺ —Ä–Ķ—ą–Ķ–Ĺ–ł–Ķ –Ĺ–į –ĺ—Ā–Ĺ–ĺ–≤–Ķ –į–≥–Ķ–Ĺ—ā–Ĺ–ĺ–≥–ĺ –Ņ–ĺ–ī—Ö–ĺ–ī–į, –ĺ–Ī—ä–Ķ–ī–ł–Ĺ—Ź—é—Č–Ķ–≥–ĺ –Ņ–ĺ–ł—Ā–ļ –ł–Ĺ—Ą–ĺ—Ä–ľ–į—Ü–ł–ł —Ā –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–Ķ–Ļ —á–Ķ—Ä–Ķ–∑ś°Üśě∂co-training, –ļ–ĺ—ā–ĺ—Ä—č–Ļ –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź–Ķ—ā –ľ–ĺ–ī–Ķ–Ľ–ł —Ä–į–∑–Ľ–ł—á–į—ā—Ć –≥—Ä–į–Ĺ–ł—Ü—É —Ā–≤–ĺ–ł—Ö –∑–Ĺ–į–Ĺ–ł–Ļ –ł –ĺ–Ņ—Ä–Ķ–ī–Ķ–Ľ—Ź—ā—Ć, –ļ–ĺ–≥–ī–į —ā—Ä–Ķ–Ī—É–Ķ—ā—Ā—Ź –≤–Ĺ–Ķ—ą–Ĺ–ł–Ļ –ļ–ĺ–Ĺ—ā–Ķ–ļ—Ā—ā. –Ę–į–ļ–ĺ–Ļ –ľ–Ķ—ā–ĺ–ī –ĺ–Ī–Ķ—Ā–Ņ–Ķ—á–ł–≤–į–Ķ—ā –ľ–ĺ–Ĺ–ĺ—ā–ĺ–Ĺ–Ĺ–ĺ–Ķ —É–Ľ—É—á—ą–Ķ–Ĺ–ł–Ķ –ļ–į—á–Ķ—Ā—ā–≤–į –ł –∑–į–ļ–Ľ–į–ī—č–≤–į–Ķ—ā –ĺ—Ā–Ĺ–ĺ–≤—É –ī–Ľ—Ź —Ä–Ķ–ļ—É—Ä—Ā–ł–≤–Ĺ–ĺ–Ļ —Ā–į–ľ–ĺ–ĺ–Ņ—ā–ł–ľ–ł–∑–į—Ü–ł–ł –≤ –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ–ĺ–Ļ –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł, —Ā–Ņ–ĺ—Ā–ĺ–Ī–Ĺ–ĺ–Ļ —Ä–į–Ī–ĺ—ā–į—ā—Ć —Ā –∑–į–Ņ—Ä–ĺ—Ā–į–ľ–ł –Ĺ–į –∑–Ĺ–į–Ĺ–ł–Ķ —Ä–Ķ–į–Ľ—Ć–Ĺ–ĺ–≥–ĺ –ľ–ł—Ä–į.'}, 'en': {'title': 'Bridging Knowledge Gaps in Visual Generation', 'desc': "This paper addresses the limitations of visual generators that often create inaccurate content when faced with unfamiliar requests. It introduces SearchGen-20K and SearchGen-Bench, which consist of a large set of prompts designed to evaluate the performance of these generators across various domains. The authors identify a knowledge boundary that restricts generators from accessing up-to-date information, leading to poor performance on new or evolving topics. To overcome this, they propose a teach-then-search co-training framework that enhances the generator's ability to incorporate external knowledge, resulting in improved visual generation capabilities."}, 'zh': {'title': 'Á™ĀÁ†īÁü•ŤĮÜÁď∂ťĘąÔľĆŚģěÁéįśôļŤÉĹŤßÜŤßČÁĒüśąź', 'desc': 'ŤŅôÁĮáŤģļśĖáśéĘŤģ®šļÜŤßÜŤßČÁĒüśąźś®°ŚěčŚú®Ś§ĄÁźÜÁĒ®śą∑ŤĮ∑śĪāśó∂ÁöĄŚĪÄťôźśÄßÔľĆŚį§ŚÖ∂śėĮŚú®ťĚĘŚĮĻśú™Áü•šŅ°śĀĮśó∂ÁöĄŤá™šŅ°ťĒôŤĮĮ„ÄāšĹúŤÄÖśŹźŚáļšļÜSearchGen-20KŚíĆSearchGen-BenchŤŅôšł§šł™śēįśćģťõÜÔľĆśó®Śú®ŤĮĄšľįÁĒüśąźś®°ŚěčŚú®šłćŚźĆťĘÜŚüüŚíĆŚ§ĪŤī•ÁĪĽŚąęšł≠ÁöĄŤ°®Áéį„ÄāÁ†ĒÁ©∂ŚŹĎÁéįÔľĆÁéįśúČÁöĄÁĒüśąźś®°ŚěčŚú®ŤŅôšļõŚüļŚáÜśĶčŤĮēšł≠ŚĺóŚąÜŤĺÉšĹéÔľĆśėĺÁ§ļŚáļÁü•ŤĮÜÁď∂ťĘąÁöĄťóģťĘė„ÄāšłļšļÜŤß£ŚÜ≥ŤŅôšł™ťóģťĘėÔľĆŤģļśĖáśŹźŚáļšļÜšłÄÁßćśēô-ŚÜćśźúÁīĘÁöĄŚÖĪŚźĆŤģ≠ÁĽÉś°Üśě∂ÔľĆŤÉĹŚ§üŚłģŚä©ÁĒüśąźś®°ŚěčťÄźś≠•śĒĻŚĖĄŚÖ∂Áü•ŤĮÜŤĺĻÁēĆÔľĆšĽéŤÄĆśõīŚ•ĹŚúįśĽ°Ť∂≥ÁĒ®śą∑ÁöĄŤĮ∑śĪā„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.08317', 'title': 'Blind-Spots-Bench: Evaluating Blind Spots in Multimodal Models', 'url': 'https://huggingface.co/papers/2607.08317', 'abstract': 'Abstract  Modern AI models achieve strong performance on many established benchmarks, yet they still fail on tasks that humans find almost trivial, such as manipulating a string or drawing a dog with five legs. These examples suggest that existing benchmarks may under-measure persistent blind spots in current systems. We introduce blind-spots-bench, a benchmark designed to expose such blind spots through tasks that appear simple for humans but remain challenging for modern AI. We collect raw questions from students in an AI course, clean and annotate them with structured reference solutions, and propose a task taxonomy tailored to the resulting dataset of 235 samples. We further develop an automated grading pipeline to evaluate a wide range of models, including open-weight and closed-source language, vision-language, and image-generation models. Our analysis on blind-spots-bench reveals that closed-source frontier models can substantially outperform open-weight models with even approx10% gap, even when they attain comparable performance on existing benchmarks. A more fine-grained analysis shows that no single model dominates across all task types, and that some tasks remain challenging for all evaluated models. These results highlight the value of blind-spots-bench as a diagnostic stress test for identifying concrete weaknesses in current modern models.', 'score': 22, 'issue_id': 2657, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 –ł—é–Ľ—Ź', 'en': 'July 9', 'zh': '7śúą9śó•'}, 'hash': '129523b77195e42c', 'authors': ['Matteo Santelmo', 'Xiuying Wei', 'Israa Fakih', 'Felix Bauer', 'Juan Garcia Giraldo', 'Chengkun Li', 'Etienne Bamas', 'Emmanuel Abb√©'], 'affiliations': ['Ecole Polytechnique Federale de Lausanne (EPFL), Switzerland'], 'pdf_title_img': 'assets/pdf/title_img/2607.08317.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': 'ūüĒć', 'ru': {'title': '–í—č—Ź–≤–Ľ–Ķ–Ĺ–ł–Ķ —Ā–ļ—Ä—č—ā—č—Ö –ĺ–≥—Ä–į–Ĺ–ł—á–Ķ–Ĺ–ł–Ļ —Ā–ĺ–≤—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č—Ö AI –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ —á–Ķ—Ä–Ķ–∑ —Ā–Ņ–Ķ—Ü–ł–į–Ľ–ł–∑–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–Ļ –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ–Ķ–Ĺ–į –Ĺ–ĺ–≤–į—Ź –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ-–∑–į–ī–į—á–į blind-spots-bench, –ļ–ĺ—ā–ĺ—Ä–į—Ź –≤—č—Ź–≤–Ľ—Ź–Ķ—ā —Ā–Ľ–Ķ–Ņ—č–Ķ –Ņ—Ź—ā–Ĺ–į —Ā–ĺ–≤—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –ė–ė —á–Ķ—Ä–Ķ–∑ –Ņ—Ä–ĺ—Ā—ā—č–Ķ –ī–Ľ—Ź —á–Ķ–Ľ–ĺ–≤–Ķ–ļ–į, –Ĺ–ĺ —Ā–Ľ–ĺ–∂–Ĺ—č–Ķ –ī–Ľ—Ź –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –∑–į–ī–į—á–ł. –ė—Ā—Ā–Ľ–Ķ–ī–ĺ–≤–į—ā–Ķ–Ľ–ł —Ā–ĺ–Ī—Ä–į–Ľ–ł 235 –ĺ–Ī—Ä–į–∑—Ü–ĺ–≤ –≤–ĺ–Ņ—Ä–ĺ—Ā–ĺ–≤ –ĺ—ā —Ā—ā—É–ī–Ķ–Ĺ—ā–ĺ–≤, —Ä–į–∑—Ä–į–Ī–ĺ—ā–į–Ľ–ł —Ā—ā—Ä—É–ļ—ā—É—Ä–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—É—é —ā–į–ļ—Ā–ĺ–Ĺ–ĺ–ľ–ł—é –∑–į–ī–į—á –ł —Ā–ĺ–∑–ī–į–Ľ–ł –į–≤—ā–ĺ–ľ–į—ā–ł–∑–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–Ļ –ļ–ĺ–Ĺ–≤–Ķ–Ļ–Ķ—Ä –ĺ—Ü–Ķ–Ĺ–ļ–ł –ī–Ľ—Ź —ā–Ķ—Ā—ā–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź —Ä–į–∑–Ľ–ł—á–Ĺ—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ, –≤–ļ–Ľ—é—á–į—Ź –ĺ—ā–ļ—Ä—č—ā—č–Ķ –ł –∑–į–ļ—Ä—č—ā—č–Ķ language models, vision-language –ł image-generation –ľ–ĺ–ī–Ķ–Ľ–ł. –ź–Ĺ–į–Ľ–ł–∑ –Ņ–ĺ–ļ–į–∑–į–Ľ –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ—č–Ļ —Ä–į–∑—Ä—č–≤ (–ĺ–ļ–ĺ–Ľ–ĺ 10%) –ľ–Ķ–∂–ī—É –∑–į–ļ—Ä—č—ā—č–ľ–ł frontier-–ľ–ĺ–ī–Ķ–Ľ—Ź–ľ–ł –ł –ĺ—ā–ļ—Ä—č—ā—č–ľ–ł –ľ–ĺ–ī–Ķ–Ľ—Ź–ľ–ł, –Ĺ–Ķ—Ā–ľ–ĺ—ā—Ä—Ź –Ĺ–į —Ā—Ä–į–≤–Ĺ–ł–ľ—É—é –Ņ—Ä–ĺ–ł–∑–≤–ĺ–ī–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ—Ā—ā—Ć –Ĺ–į —Ā—É—Č–Ķ—Ā—ā–≤—É—é—Č–ł—Ö –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ–į—Ö. –†–Ķ–∑—É–Ľ—Ć—ā–į—ā—č –ī–Ķ–ľ–ĺ–Ĺ—Ā—ā—Ä–ł—Ä—É—é—ā —Ü–Ķ–Ĺ–Ĺ–ĺ—Ā—ā—Ć blind-spots-bench –ļ–į–ļ –ī–ł–į–≥–Ĺ–ĺ—Ā—ā–ł—á–Ķ—Ā–ļ–ĺ–≥–ĺ –ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā–į –ī–Ľ—Ź –≤—č—Ź–≤–Ľ–Ķ–Ĺ–ł—Ź –ļ–ĺ–Ĺ–ļ—Ä–Ķ—ā–Ĺ—č—Ö —Ā–Ľ–į–Ī–ĺ—Ā—ā–Ķ–Ļ —Ā–ĺ–≤—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č—Ö AI —Ā–ł—Ā—ā–Ķ–ľ.'}, 'en': {'title': "Uncovering AI's Hidden Weaknesses with Blind-Spots-Bench", 'desc': 'This paper introduces a new benchmark called blind-spots-bench, aimed at identifying weaknesses in modern AI models that are not captured by traditional benchmarks. The benchmark consists of tasks that are simple for humans but difficult for AI, revealing persistent blind spots in model performance. The authors collected and annotated a dataset of 235 samples from AI students, creating a structured task taxonomy for evaluation. Their findings indicate that closed-source models significantly outperform open-weight models on these tasks, emphasizing the need for more comprehensive testing to understand AI limitations.'}, 'zh': {'title': 'śŹ≠Á§ļAIś®°ŚěčÁöĄÁõ≤ÁāĻ', 'desc': 'ÁéįšĽ£šļļŚ∑•śôļŤÉĹś®°ŚěčŚú®ŤģłŚ§öŚüļŚáÜśĶčŤĮēšł≠Ť°®ÁéįŚáļŤČ≤ÔľĆšĹÜŚú®šłÄšļõšļļÁĪĽŤģ§šłļÁģÄŚćēÁöĄšĽĽŚä°šłäšĽćÁĄ∂Ś§ĪŤī•ÔľĆšĺčŚ¶āśďćšĹúŚ≠óÁ¨¶šł≤śąĖÁĒĽšłÄŚŹ™šļĒśĚ°ŤÖŅÁöĄÁčó„ÄāŤŅôŤ°®śėéÁéįśúČÁöĄŚüļŚáÜśĶčŤĮēŚŹĮŤÉĹśó†ś≥ēŚÖÖŚąÜśĶčťáŹŚĹďŚČćÁ≥ĽÁĽüÁöĄÁõ≤ÁāĻ„ÄāśąĎšĽ¨śŹźŚáļšļÜblind-spots-benchÔľĆŤŅôśėĮšłÄšł™śó®Śú®ťÄöŤŅáÁúčšľľÁģÄŚćēšĹÜŚĮĻÁéįšĽ£AIšĽćŚÖ∑śĆĎśąėśÄßÁöĄšĽĽŚä°śĚ•śŹ≠Á§ļŤŅôšļõÁõ≤ÁāĻÁöĄŚüļŚáÜśĶčŤĮē„ÄāśąĎšĽ¨ÁöĄŚąÜśěźśėĺÁ§ļÔľĆŚįĀťó≠śļźś®°ŚěčŚú®śüźšļõšĽĽŚä°šłäśėĺŤĎóšľėšļéŚľÄśĒĺśļźś®°ŚěčÔľĆšłĒś≤°śúČŚćēšłÄś®°ŚěčŚú®śČÄśúČšĽĽŚä°ÁĪĽŚěčšłäŚć†śćģšłĽŚĮľŚúįšĹć„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.12463', 'title': 'Function-Aware Fill-in-the-Middle as Mid-Training for Coding Agent Foundation Models', 'url': 'https://huggingface.co/papers/2607.12463', 'abstract': 'Abstract  Coding agents must integrate external tool returns into ongoing reasoning - a capability that standard left-to-right pretraining on code exposes only in its forward direction. We observe that the action-observation-continuation loop of a coding agent is structurally isomorphic to a function call site, where a caller binds arguments, a callee returns a value computed elsewhere, and downstream code consumes that value. This conditioning structure exists at internet scale in ordinary code. We exploit it through function-aware fill-in-the-middle (FIM) mid-training: a self-supervised objective that masks functions selected via program dependency graph analysis and a complexity-inferability double criterion. We mid-train Qwen2.5-Coder-Instruct (7B/14B) and Qwen3-8B on a 2.6B-token decontaminated corpus drawn from 968 GitHub repositories, then apply existing agentic post-training pipelines. Mid-training improves SWE-Bench-Verified by +2.8/+3.0 at 7B/14B and by +3.2 on Qwen3-8B; SWE-Bench-Lite gains are +3.7/+4.0/+5.4 on the same models. The improvement holds across two post-training pipelines (R2E-Gym, SWE-Smith) and on a non-Qwen2.5 base (Qwen3-8B with SWE-Lego). Beyond in-domain gains, mid-training also mitigates the capability erosion that agentic post-training otherwise inflicts on non-agent coding (e.g., LiveCodeBench) and non-coding tool-use benchmarks (tau-bench, BFCL): although the mid-training corpus contains Python code only, the function-call inductive bias survives post-training and yields consistent gains.', 'score': 18, 'issue_id': 2664, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 –ł—é–Ľ—Ź', 'en': 'July 14', 'zh': '7śúą14śó•'}, 'hash': 'f5de0dfdfd255109', 'authors': ['Yubo Wang', 'Jiarong Liang', 'Yuxuan Zhang', 'Xuye Liu', 'Cong Wei', 'Yuyu Zhang', 'Ping Nie', 'Wenhu Chen'], 'affiliations': ['NVIDIA', 'University of British Columbia', 'University of Waterloo', 'Vector Institute', 'Verdent AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.12463.jpg', 'data': {'categories': ['#training', '#plp', '#benchmark', '#agents'], 'emoji': 'ūüĒß', 'ru': {'title': '–ě–Ī—É—á–Ķ–Ĺ–ł–Ķ –ļ–ĺ–ī–ł—Ä—É—é—Č–ł—Ö –į–≥–Ķ–Ĺ—ā–ĺ–≤ —á–Ķ—Ä–Ķ–∑ —Ą—É–Ĺ–ļ—Ü–ł–ĺ–Ĺ–į–Ľ—Ć–Ĺ—É—é —Ā—ā—Ä—É–ļ—ā—É—Ä—É –ĺ–Ī—č—á–Ĺ–ĺ–≥–ĺ –ļ–ĺ–ī–į', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī–Ľ–ĺ–∂–Ķ–Ĺ –Ĺ–ĺ–≤—č–Ļ –ľ–Ķ—ā–ĺ–ī –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź –į–≥–Ķ–Ĺ—ā–ĺ–≤, –ļ–ĺ—ā–ĺ—Ä—č–Ķ –Ņ–ł—ą—É—ā –ļ–ĺ–ī –ł –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É—é—ā –≤–Ĺ–Ķ—ą–Ĺ–ł–Ķ –ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā—č. –ź–≤—ā–ĺ—Ä—č –∑–į–ľ–Ķ—ā–ł–Ľ–ł, —á—ā–ĺ —Ā—ā—Ä—É–ļ—ā—É—Ä–į –≤–∑–į–ł–ľ–ĺ–ī–Ķ–Ļ—Ā—ā–≤–ł—Ź –į–≥–Ķ–Ĺ—ā–į (–ī–Ķ–Ļ—Ā—ā–≤–ł–Ķ-–Ĺ–į–Ī–Ľ—é–ī–Ķ–Ĺ–ł–Ķ-–Ņ—Ä–ĺ–ī–ĺ–Ľ–∂–Ķ–Ĺ–ł–Ķ) –ł–∑–ĺ–ľ–ĺ—Ä—Ą–Ĺ–į –≤—č–∑–ĺ–≤—É —Ą—É–Ĺ–ļ—Ü–ł–ł –≤ –ĺ–Ī—č—á–Ĺ–ĺ–ľ –ļ–ĺ–ī–Ķ, –ł —ć—ā–į —Ā—ā—Ä—É–ļ—ā—É—Ä–į –≤—Ā—ā—Ä–Ķ—á–į–Ķ—ā—Ā—Ź –≤ –ĺ–≥—Ä–ĺ–ľ–Ĺ—č—Ö –ļ–ĺ–Ľ–ł—á–Ķ—Ā—ā–≤–į—Ö –≤ –ĺ—ā–ļ—Ä—č—ā—č—Ö —Ä–Ķ–Ņ–ĺ–∑–ł—ā–ĺ—Ä–ł—Ź—Ö. –ě–Ĺ–ł —Ä–į–∑—Ä–į–Ī–ĺ—ā–į–Ľ–ł —Ą—É–Ĺ–ļ—Ü–ł–ĺ–Ĺ–į–Ľ—Ć–Ĺ–ĺ-–ĺ—Ā–≤–Ķ–ī–ĺ–ľ–Ľ—Ď–Ĺ–Ĺ—É—é —ā–Ķ—Ö–Ĺ–ł–ļ—É –∑–į–Ņ–ĺ–Ľ–Ĺ–Ķ–Ĺ–ł—Ź –Ņ—Ä–ĺ–Ņ—É—Ā–ļ–ĺ–≤ (function-aware FIM) –ī–Ľ—Ź –Ņ—Ä–ĺ–ľ–Ķ–∂—É—ā–ĺ—á–Ĺ–ĺ–≥–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź, –ļ–ĺ—ā–ĺ—Ä–į—Ź –ľ–į—Ā–ļ–ł—Ä—É–Ķ—ā —Ą—É–Ĺ–ļ—Ü–ł–ł –Ĺ–į –ĺ—Ā–Ĺ–ĺ–≤–Ķ –į–Ĺ–į–Ľ–ł–∑–į –≥—Ä–į—Ą–į –∑–į–≤–ł—Ā–ł–ľ–ĺ—Ā—ā–Ķ–Ļ –Ņ—Ä–ĺ–≥—Ä–į–ľ–ľ—č. –†–Ķ–∑—É–Ľ—Ć—ā–į—ā—č –Ņ–ĺ–ļ–į–∑—č–≤–į—é—ā —É–Ľ—É—á—ą–Ķ–Ĺ–ł–Ķ –Ņ—Ä–ĺ–ł–∑–≤–ĺ–ī–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ—Ā—ā–ł –Ĺ–į –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ–į—Ö SWE-Bench –ł —Ā–ĺ—Ö—Ä–į–Ĺ–Ķ–Ĺ–ł–Ķ –Ĺ–į–≤—č–ļ–ĺ–≤ –ļ–ĺ–ī–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź, –Ĺ–Ķ—Ā–ľ–ĺ—ā—Ä—Ź –Ĺ–į —Ā–Ņ–Ķ—Ü–ł–į–Ľ–ł–∑–ł—Ä–ĺ–≤–į–Ĺ–Ĺ–ĺ–Ķ –ĺ–Ī—É—á–Ķ–Ĺ–ł–Ķ –į–≥–Ķ–Ĺ—ā–į–ľ.'}, 'en': {'title': 'Enhancing Coding Agents with Function-Aware Mid-Training', 'desc': "This paper discusses a new training method for coding agents that helps them better integrate external tool outputs into their reasoning processes. The authors introduce a technique called function-aware fill-in-the-middle (FIM) mid-training, which uses a self-supervised learning approach to improve the agent's ability to handle function calls in code. By analyzing program dependency graphs, the method masks certain functions during training, leading to significant performance improvements on various coding benchmarks. The results show that this mid-training not only enhances in-domain performance but also preserves capabilities in non-coding tasks, demonstrating the robustness of the learned function-call structure."}, 'zh': {'title': 'śŹźŚćáÁľĖÁ†ĀšĽ£ÁźÜÁöĄśé®ÁźÜŤÉĹŚäõ', 'desc': 'śú¨śĖáśéĘŤģ®šļÜÁľĖÁ†ĀšĽ£ÁźÜŚ¶āšĹēŚįÜŚ§ĖťÉ®Ś∑•ŚÖ∑ÁöĄŤŅĒŚõěÁĽďśěúśēīŚźąŚąįśĆĀÁĽ≠ÁöĄśé®ÁźÜšł≠„ÄāÁ†ĒÁ©∂ŚŹĎÁéįÔľĆÁľĖÁ†ĀšĽ£ÁźÜÁöĄŚä®šĹú-ŤßāŚĮü-ÁĽßÁĽ≠Śĺ™ÁéĮšłéŚáĹśēįŤįÉÁĒ®ÁĽďśěĄÁõłšľľÔľĆŤÉĹŚ§üśúČśēąŚą©ÁĒ®Á®čŚļŹšĺĚŤĶĖŚõĺŚąÜśěźśĚ•ŤŅõŤ°Ćšł≠śúüŤģ≠ÁĽÉ„ÄāťÄöŤŅáŚáĹśēįśĄüÁü•ÁöĄšł≠śúüŤģ≠ÁĽÉśĖĻś≥ēÔľĆśú¨śĖáŚú®Ś§öšł™ś®°ŚěčšłäŚģěÁéįšļÜśėĺŤĎóÁöĄśÄßŤÉĹśŹźŚćá„ÄāŤĮ•śĖĻś≥ēšłćšĽÖŚú®ÁČĻŚģöťĘÜŚüüŚÜÖŤ°®ÁéįŚáļŤČ≤ÔľĆŤŅėŚáŹŤĹĽšļÜŚźéśúüŤģ≠ÁĽÉŚĮĻťĚěšĽ£ÁźÜÁľĖÁ†ĀŤÉĹŚäõÁöĄšĺĶŤöÄ„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.11562', 'title': 'MonkeyOCRv2: A Visual-Text Foundation Model for Document AI', 'url': 'https://huggingface.co/papers/2607.11562', 'abstract': 'Abstract  Mainstream visual encoders are pretrained on natural images and cannot be effectively applied to document images without document-oriented adaptation, as dense text and fine-grained character strokes demand character-level visual perception. We present MonkeyOCRv2, a visual-text pretrained model for document AI. First, we construct MonkeyDoc v2, to our knowledge the largest document-image pretraining corpus, comprising 113 million images spanning 17 languages. Second, we propose a pretraining strategy that jointly learns image-to-text generation and pixel-level document reconstruction: the former aligns visual representations with textual content, while the latter preserves character strokes and layout details. Extensive experiments are conducted on five representative document analysis tasks, including text recognition, formula recognition, text detection, document tampering detection, and overlapping text segmentation. Replacing the original encoders with MonkeyOCRv2 consistently improves performance across all five tasks. Finally, we validate its effectiveness as the vision encoder of multimodal large language models on the more challenging tasks of document parsing and document understanding. Kept frozen and paired with a lightweight language model, it yields a 0.7B document parsing model that sets a new open-source state-of-the-art on MDPBench, a recent benchmark spanning digital-born and photographed documents across 17 languages, surpassing the previous best 3B dots.mocr by 2.8% absolute with a vision encoder roughly 11times smaller. The frozen encoder also powers a document understanding model that outperforms counterparts built on CLIP, DINO, and SAM across eight benchmarks under identical training settings. These results suggest that document-oriented visual pretraining can serve as a foundation for document intelligence in its own right.', 'score': 6, 'issue_id': 2659, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 –ł—é–Ľ—Ź', 'en': 'July 13', 'zh': '7śúą13śó•'}, 'hash': '10d3b1a039c5b81d', 'authors': ['Yuliang Liu', 'Zhang Li', 'Ziyang Zhang', 'Shuo Zhang', 'Qiang Liu', 'Jiajun Song', 'Zidun Guo', 'Xinhan Wang', 'Handong Zheng', 'Yang Liu', 'Dongliang Luo', 'Zhiyin Ma', 'Jiarui Zhang', 'Xiang Bai'], 'affiliations': ['Huazhong University of Science and Technology', 'Kingsoft Office'], 'pdf_title_img': 'assets/pdf/title_img/2607.11562.jpg', 'data': {'categories': ['#multilingual', '#cv', '#multimodal', '#benchmark', '#dataset', '#training', '#small_models'], 'emoji': 'ūüďĄ', 'ru': {'title': '–Ē–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–ĺ-–ĺ—Ä–ł–Ķ–Ĺ—ā–ł—Ä–ĺ–≤–į–Ĺ–Ĺ–ĺ–Ķ –Ņ—Ä–Ķ–ī–ĺ–Ī—É—á–Ķ–Ĺ–ł–Ķ –ļ–į–ļ –ĺ—Ā–Ĺ–ĺ–≤–į –ł–Ĺ—ā–Ķ–Ľ–Ľ–Ķ–ļ—ā–į –ī–Ľ—Ź —Ä–į–Ī–ĺ—ā—č —Ā –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–į–ľ–ł', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ–Ķ–Ĺ–į MonkeyOCRv2 ‚ÄĒ –≤–ł–∑—É–į–Ľ—Ć–Ĺ–ĺ-—ā–Ķ–ļ—Ā—ā–ĺ–≤–į—Ź –ľ–ĺ–ī–Ķ–Ľ—Ć, –Ņ—Ä–Ķ–ī–≤–į—Ä–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–Ĺ–į—Ź –Ĺ–į –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–į—Ö –ī–Ľ—Ź –∑–į–ī–į—á –į–Ĺ–į–Ľ–ł–∑–į –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–ĺ–≤. –ź–≤—ā–ĺ—Ä—č —Ā–ĺ–∑–ī–į–Ľ–ł MonkeyDoc v2, –ļ—Ä—É–Ņ–Ĺ–Ķ–Ļ—ą–ł–Ļ –ļ–ĺ—Ä–Ņ—É—Ā –ł–∑ 113 –ľ–ł–Ľ–Ľ–ł–ĺ–Ĺ–ĺ–≤ –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ļ –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–ĺ–≤ –Ĺ–į 17 —Ź–∑—č–ļ–į—Ö, –ł –Ņ—Ä–Ķ–ī–Ľ–ĺ–∂–ł–Ľ–ł —Ā—ā—Ä–į—ā–Ķ–≥–ł—é –Ņ—Ä–Ķ–ī–ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź, –ļ–ĺ—ā–ĺ—Ä–į—Ź —Ā–ĺ–≤–ľ–Ķ—Ā—ā–Ĺ–ĺ –ĺ–Ņ—ā–ł–ľ–ł–∑–ł—Ä—É–Ķ—ā –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł—é —ā–Ķ–ļ—Ā—ā–į –ł–∑ –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł—Ź –ł —Ä–Ķ–ļ–ĺ–Ĺ—Ā—ā—Ä—É–ļ—Ü–ł—é –Ņ–ł–ļ—Ā–Ķ–Ľ—Ć-—É—Ä–ĺ–≤–Ĺ—Ź –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–į. –ú–ĺ–ī–Ķ–Ľ—Ć –ī–Ķ–ľ–ĺ–Ĺ—Ā—ā—Ä–ł—Ä—É–Ķ—ā –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ—č–Ķ —É–Ľ—É—á—ą–Ķ–Ĺ–ł—Ź –Ĺ–į –Ņ—Ź—ā–ł –∑–į–ī–į—á–į—Ö –į–Ĺ–į–Ľ–ł–∑–į –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–ĺ–≤: —Ä–į—Ā–Ņ–ĺ–∑–Ĺ–į–≤–į–Ĺ–ł–Ķ —ā–Ķ–ļ—Ā—ā–į, —Ä–į—Ā–Ņ–ĺ–∑–Ĺ–į–≤–į–Ĺ–ł–Ķ —Ą–ĺ—Ä–ľ—É–Ľ, –ī–Ķ—ā–Ķ–ļ—Ü–ł—Ź —ā–Ķ–ļ—Ā—ā–į, –≤—č—Ź–≤–Ľ–Ķ–Ĺ–ł–Ķ –Ņ–ĺ–ī–ī–Ķ–Ľ–ĺ–ļ –ł —Ā–Ķ–≥–ľ–Ķ–Ĺ—ā–į—Ü–ł—Ź –Ņ–Ķ—Ä–Ķ–ļ—Ä—č–≤–į—é—Č–Ķ–≥–ĺ—Ā—Ź —ā–Ķ–ļ—Ā—ā–į. –ö–ĺ–≥–ī–į –ľ–ĺ–ī–Ķ–Ľ—Ć –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā—Ā—Ź –ļ–į–ļ –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č–Ļ —ć–Ĺ–ļ–ĺ–ī–Ķ—Ä –≤ –ľ–Ĺ–ĺ–≥–ĺ–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č—Ö –Ī–ĺ–Ľ—Ć—ą–ł—Ö —Ź–∑—č–ļ–ĺ–≤—č—Ö –ľ–ĺ–ī–Ķ–Ľ—Ź—Ö, –ĺ–Ĺ–į –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź–Ķ—ā —Ā–ĺ–∑–ī–į—ā—Ć –ļ–ĺ–ľ–Ņ–į–ļ—ā–Ĺ—č–Ļ 0.7B –Ņ–į—Ä—Ā–Ķ—Ä –ī–ĺ–ļ—É–ľ–Ķ–Ĺ—ā–ĺ–≤, –ļ–ĺ—ā–ĺ—Ä—č–Ļ –Ņ—Ä–Ķ–≤–ĺ—Ā—Ö–ĺ–ī–ł—ā –Ņ—Ä–Ķ–ī—č–ī—É—Č–ł–Ķ —Ä–Ķ—ą–Ķ–Ĺ–ł—Ź –Ņ—Ä–ł –ľ–Ķ–Ĺ—Ć—ą–Ķ–ľ —Ä–į–∑–ľ–Ķ—Ä–Ķ.'}, 'en': {'title': 'Revolutionizing Document AI with MonkeyOCRv2', 'desc': "This paper introduces MonkeyOCRv2, a visual-text pretrained model specifically designed for document images, addressing the limitations of traditional visual encoders that are trained on natural images. The authors create MonkeyDoc v2, a large dataset of 113 million document images in 17 languages, to enhance the model's training. They propose a dual pretraining strategy that focuses on both image-to-text generation and pixel-level document reconstruction, ensuring that the model captures fine details like character strokes and layout. The results show that MonkeyOCRv2 significantly improves performance on various document analysis tasks and sets a new benchmark for document parsing and understanding."}, 'zh': {'title': 'śĖáś°£śôļŤÉĹÁöĄśĖįŚüļÁ°ÄÔľöMonkeyOCRv2', 'desc': 'śú¨ŤģļśĖášĽčÁĽćšļÜMonkeyOCRv2ÔľĆŤŅôśėĮšłÄšł™ťíąŚĮĻśĖáś°£ŚõĺŚÉŹÁöĄŤßÜŤßČśĖáśú¨ťĘĄŤģ≠ÁĽÉś®°Śěč„ÄāśąĎšĽ¨śěĄŚĽļšļÜMonkeyDoc v2ÔľĆŤŅôśėĮŤŅĄšĽäšłļś≠ĘśúÄŚ§ßÁöĄśĖáś°£ŚõĺŚÉŹťĘĄŤģ≠ÁĽÉŤĮ≠śĖôŚļďÔľĆŚĆÖŚźę1.13šļŅŚľ†ŚõĺŚÉŹÔľĆś∂ĶÁõĖ17ÁßćŤĮ≠Ť®Ä„ÄāŤĮ•ś®°ŚěčťááÁĒ®šļÜšłÄÁßćŤĀĒŚźąŚ≠¶šĻ†ŚõĺŚÉŹŚąįśĖáśú¨ÁĒüśąźŚíĆŚÉŹÁī†ÁļßśĖáś°£ťáćŚĽļÁöĄťĘĄŤģ≠ÁĽÉÁ≠ĖÁē•ÔľĆšĽéŤÄĆśŹźťęėšļÜśĖáśú¨ŤĮÜŚąę„ÄĀŚÖ¨ŚľŹŤĮÜŚąęÁ≠ČšļĒšł™śĖáś°£ŚąÜśěźšĽĽŚä°ÁöĄśÄßŤÉĹ„ÄāŚģěť™ĆÁĽďśěúŤ°®śėéÔľĆMonkeyOCRv2Śú®śĖáś°£Ťß£śěźŚíĆÁźÜŤß£šĽĽŚä°šł≠Ť°®ÁéįšľėŚľāÔľĆŤ∂ÖŤ∂äšļÜÁéįśúČÁöĄśúÄšĹ≥ś®°Śěč„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.11111', 'title': 'Know Before Fix: QA-Driven Repository Knowledge Acquisition for Software Issue Resolution', 'url': 'https://huggingface.co/papers/2607.11111', 'abstract': "Abstract  LLM-based coding agents have significantly advanced automated software issue resolution, yet they remain highly prone to factual errors caused by insufficient repository understanding. Recent methods attempt to mitigate this limitation through pre-repair repository exploration; however, their fix-driven strategies explore repositories without identifying the agent's knowledge gaps, often yielding imprecise context that fails to bridge the underlying understanding deficit. In this paper, we propose ACQUIRE, a QA-driven framework for software issue resolution. Mirroring how experienced developers first comprehend unfamiliar code before attempting a fix, ACQUIRE explicitly acquires repository knowledge prior to repair. The framework decouples knowledge acquisition from patch generation through two stages: in the first stage, a Questioner and an Answerer collaborate to acquire structured repository knowledge, where the Questioner poses targeted questions and the Answerer produces evidence-grounded answers through autonomous exploration; in the second stage, the Resolver leverages the resulting QA knowledge to generate informed patches. By transforming implicit knowledge gaps into explicit, factually reliable understanding, ACQUIRE accelerates knowledge-intensive repair stages and enables more accurate resolution. Experiments on SWE-bench Verified demonstrate that ACQUIRE consistently outperforms representative pre-repair methods, raising Pass@1 by up to 4.4 percentage points with modest additional cost and time.", 'score': 6, 'issue_id': 2654, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 –ł—é–Ľ—Ź', 'en': 'July 13', 'zh': '7śúą13śó•'}, 'hash': '8b4ea103d176a81b', 'authors': ['Haotian Lin', 'Silin Chen', 'Xiaodong Gu', 'Yuling Shi', 'Chengxi Pan', 'Jiaqi Ge', 'Mengfan Li', 'Jianghong Huang', 'Mengchieh Chuang', 'Beijun Shen', 'Haibing Guan'], 'affiliations': ['Guangdong Technion-Israel Institute of Technology', 'Shanghai Jiao Tong University', 'University of Pittsburgh'], 'pdf_title_img': 'assets/pdf/title_img/2607.11111.jpg', 'data': {'categories': ['#agents', '#benchmark', '#plp'], 'emoji': 'ūüĒć', 'ru': {'title': '–°–Ņ—Ä–ĺ—Ā–ł—ā—Ć –Ņ–Ķ—Ä–Ķ–ī —ā–Ķ–ľ, –ļ–į–ļ —á–ł–Ĺ–ł—ā—Ć: —Ź–≤–Ĺ–ĺ–Ķ –ł–∑—É—á–Ķ–Ĺ–ł–Ķ –ļ–ĺ–ī–į –≤–ľ–Ķ—Ā—ā–ĺ —Ā–Ľ–Ķ–Ņ–ĺ–≥–ĺ –Ņ–ĺ–ł—Ā–ļ–į', 'desc': '–°—ā–į—ā—Ć—Ź –ĺ–Ņ–ł—Ā—č–≤–į–Ķ—ā ACQUIRE ‚ÄĒ —Ą—Ä–Ķ–Ļ–ľ–≤–ĺ—Ä–ļ –Ĺ–į –ĺ—Ā–Ĺ–ĺ–≤–Ķ –Ī–ĺ–Ľ—Ć—ą–ł—Ö —Ź–∑—č–ļ–ĺ–≤—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –ī–Ľ—Ź —Ä–į–∑—Ä–Ķ—ą–Ķ–Ĺ–ł—Ź –ĺ—ą–ł–Ī–ĺ–ļ –≤ –ļ–ĺ–ī–Ķ. –í–ľ–Ķ—Ā—ā–ĺ —ā–ĺ–≥–ĺ —á—ā–ĺ–Ī—č —Ā—Ä–į–∑—É –≥–Ķ–Ĺ–Ķ—Ä–ł—Ä–ĺ–≤–į—ā—Ć –ł—Ā–Ņ—Ä–į–≤–Ľ–Ķ–Ĺ–ł—Ź, —Ā–ł—Ā—ā–Ķ–ľ–į —Ā–Ĺ–į—á–į–Ľ–į —Ź–≤–Ĺ–ĺ –ł–∑—É—á–į–Ķ—ā —Ä–Ķ–Ņ–ĺ–∑–ł—ā–ĺ—Ä–ł–Ļ —á–Ķ—Ä–Ķ–∑ –ī–ł–į–Ľ–ĺ–≥ –≤–ĺ–Ņ—Ä–ĺ—Ā-–ĺ—ā–≤–Ķ—ā, –≥–ī–Ķ —Ā–Ņ–Ķ—Ü–ł–į–Ľ—Ć–Ĺ—č–Ļ –ľ–ĺ–ī—É–Ľ—Ć –∑–į–ī–į—Ď—ā —Ü–Ķ–Ľ–Ķ–≤—č–Ķ –≤–ĺ–Ņ—Ä–ĺ—Ā—č, –į –ī—Ä—É–≥–ĺ–Ļ –ľ–ĺ–ī—É–Ľ—Ć –Ĺ–į—Ö–ĺ–ī–ł—ā –ĺ—ā–≤–Ķ—ā—č –Ņ—É—ā—Ď–ľ –į–≤—ā–ĺ–ľ–į—ā–ł—á–Ķ—Ā–ļ–ĺ–≥–ĺ –ł—Ā—Ā–Ľ–Ķ–ī–ĺ–≤–į–Ĺ–ł—Ź –ļ–ĺ–ī–į. –ó–į—ā–Ķ–ľ —ā—Ä–Ķ—ā–ł–Ļ –ļ–ĺ–ľ–Ņ–ĺ–Ĺ–Ķ–Ĺ—ā –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā –Ņ–ĺ–Ľ—É—á–Ķ–Ĺ–Ĺ—č–Ķ –∑–Ĺ–į–Ĺ–ł—Ź –ī–Ľ—Ź –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł —ā–ĺ—á–Ĺ—č—Ö –Ņ–į—ā—á–Ķ–Ļ. –Ę–į–ļ–ĺ–Ļ –Ņ–ĺ–ī—Ö–ĺ–ī —ā—Ä–į–Ĺ—Ā—Ą–ĺ—Ä–ľ–ł—Ä—É–Ķ—ā –Ĺ–Ķ—Ź–≤–Ĺ—č–Ķ –Ņ—Ä–ĺ–Ī–Ķ–Ľ—č –≤ –∑–Ĺ–į–Ĺ–ł—Ź—Ö –≤ —Ź–≤–Ĺ–ĺ–Ķ –ł –Ĺ–į–ī—Ď–∂–Ĺ–ĺ–Ķ –Ņ–ĺ–Ĺ–ł–ľ–į–Ĺ–ł–Ķ, —á—ā–ĺ –Ņ—Ä–ł–≤–ĺ–ī–ł—ā –ļ –Ī–ĺ–Ľ–Ķ–Ķ —ā–ĺ—á–Ĺ–ĺ–ľ—É —Ä–į–∑—Ä–Ķ—ą–Ķ–Ĺ–ł—é –Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ –ł —É–Ľ—É—á—ą–į–Ķ—ā —Ä–Ķ–∑—É–Ľ—Ć—ā–į—ā—č –Ĺ–į 4.4 –Ņ—Ä–ĺ—Ü–Ķ–Ĺ—ā–Ĺ—č—Ö –Ņ—É–Ĺ–ļ—ā–į.'}, 'en': {'title': 'ACQUIRE: Bridging Knowledge Gaps for Better Software Fixes', 'desc': "This paper introduces ACQUIRE, a framework designed to improve automated software issue resolution by addressing the knowledge gaps of coding agents. Unlike previous methods that explore repositories without understanding the agent's limitations, ACQUIRE uses a two-stage process to first gather structured knowledge through a Questioner and Answerer system. This approach allows the agent to gain a clear understanding of the code before attempting to generate fixes. The results show that ACQUIRE significantly enhances the accuracy of software repairs, outperforming existing methods in terms of effectiveness while maintaining reasonable resource usage."}, 'zh': {'title': 'ACQUIREÔľöśŹźŚćáŤĹĮšĽ∂ťóģťĘėŤß£ŚÜ≥ÁöĄÁü•ŤĮÜŤé∑ŚŹĖś°Üśě∂', 'desc': 'śú¨śĖáśŹźŚáļšļÜšłÄÁßćŚźćšłļACQUIREÁöĄś°Üśě∂ÔľĆÁĒ®šļéŤĹĮšĽ∂ťóģťĘėÁöĄŤß£ŚÜ≥„ÄāŤĮ•ś°Üśě∂ťÄöŤŅáťóģÁ≠Ēť©ĪŚä®ÁöĄśĖĻŚľŹÔľĆť¶ĖŚÖąŤé∑ŚŹĖšĽ£Á†ĀŚļďÁöĄÁü•ŤĮÜÔľĆÁĄ∂ŚźéŚÜćŤŅõŤ°ĆšŅģŚ§ć„ÄāACQUIREŚąÜšłļšł§šł™ťė∂śģĶÔľöÁ¨¨šłÄťė∂śģĶÔľĆśŹźťóģŤÄÖŚíĆŚõěÁ≠ĒŤÄÖŚźąšĹúŤé∑ŚŹĖÁĽďśěĄŚĆĖÁöĄÁü•ŤĮÜÔľõÁ¨¨šļĆťė∂śģĶÔľĆŤß£ŚÜ≥ŤÄÖŚą©ÁĒ®ŤŅôšļõÁü•ŤĮÜÁĒüśąźšŅģŚ§ćŤ°•šłĀ„ÄāŚģěť™ĆÁĽďśěúŤ°®śėéÔľĆACQUIREŚú®ŚáÜÁ°ģśÄßŚíĆśēąÁéášłäšľėšļéÁéįśúČÁöĄťĘĄšŅģŚ§ćśĖĻś≥ē„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.08168', 'title': 'MuScriptor: An Open Model for Multi-Instrument Music Transcription', 'url': 'https://huggingface.co/papers/2607.08168', 'abstract': 'Abstract  Existing methods for automatic music transcription are often limited to single-instrument recordings or fail on complex, real music mixes. Although previous work utilizes synthetic training data, the resulting models generalize poorly, leading to largely unusable transcription output in realistic, multi-instrument settings. In this work, we analyze the effectiveness of synthetic data for pre-training while combining it with fine-tuning on real music audio and post-training using reinforcement learning. We further introduce conditioning on instrument presence to customize transcriptions. Finally, we release MuScriptor, an open-weight multi-instrument music transcription model that works on real-world music recordings from across a diverse range of musical genres.', 'score': 5, 'issue_id': 2658, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 –ł—é–Ľ—Ź', 'en': 'July 9', 'zh': '7śúą9śó•'}, 'hash': '580c349e859aa58e', 'authors': ['Simon Rouard', 'Michael Krause', 'Axel Roebel', 'Carl-Johann Simon-Gabriel', 'Alexandre D√©fossez'], 'affiliations': ['Kyutai', 'Mirelo AI', 'UMR STMS, IRCAM-CNRS Sorbonne Univ.'], 'pdf_title_img': 'assets/pdf/title_img/2607.08168.jpg', 'data': {'categories': ['#open_source', '#synthetic'], 'emoji': 'ūüéĶ', 'ru': {'title': '–°–ł–Ĺ—ā–Ķ–∑ –ł –ĺ–Ī—É—á–Ķ–Ĺ–ł–Ķ —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ –ī–Ľ—Ź —Ä–į—Ā—ą–ł—Ą—Ä–ĺ–≤–ļ–ł —Ä–Ķ–į–Ľ—Ć–Ĺ–ĺ–Ļ –ľ–Ĺ–ĺ–≥–ĺ–ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā–į–Ľ—Ć–Ĺ–ĺ–Ļ –ľ—É–∑—č–ļ–ł', 'desc': '–í —Ä–į–Ī–ĺ—ā–Ķ —Ä–Ķ—ą–į–Ķ—ā—Ā—Ź –∑–į–ī–į—á–į –į–≤—ā–ĺ–ľ–į—ā–ł—á–Ķ—Ā–ļ–ĺ–Ļ —Ä–į—Ā—ą–ł—Ą—Ä–ĺ–≤–ļ–ł –ľ—É–∑—č–ļ–ł –ī–Ľ—Ź –ľ–Ĺ–ĺ–≥–ĺ–ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā–į–Ľ—Ć–Ĺ—č—Ö –∑–į–Ņ–ł—Ā–Ķ–Ļ –Ņ—É—ā—Ď–ľ –ļ–ĺ–ľ–Ī–ł–Ĺ–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź –Ņ—Ä–Ķ–ī–≤–į—Ä–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ–≥–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź –Ĺ–į —Ā–ł–Ĺ—ā–Ķ—ā–ł—á–Ķ—Ā–ļ–ł—Ö –ī–į–Ĺ–Ĺ—č—Ö —Ā –ī–į–Ľ—Ć–Ĺ–Ķ–Ļ—ą–Ķ–Ļ —ā–ĺ–Ĺ–ļ–ĺ–Ļ –Ĺ–į—Ā—ā—Ä–ĺ–Ļ–ļ–ĺ–Ļ –Ĺ–į —Ä–Ķ–į–Ľ—Ć–Ĺ–ĺ–Ļ –ľ—É–∑—č–ļ–Ķ –ł –ł—Ā–Ņ–ĺ–Ľ—Ć–∑–ĺ–≤–į–Ĺ–ł–Ķ–ľ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ. –ź–≤—ā–ĺ—Ä—č –≤–≤–ĺ–ī—Ź—ā –ľ–Ķ—Ö–į–Ĺ–ł–∑–ľ –ĺ–Ī—É—Ā–Ľ–ĺ–≤–Ľ–ł–≤–į–Ĺ–ł—Ź –Ĺ–į–Ľ–ł—á–ł–Ķ–ľ –ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā–ĺ–≤, –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź—é—Č–ł–Ļ –ļ–į—Ā—ā–ĺ–ľ–ł–∑–ł—Ä–ĺ–≤–į—ā—Ć –Ņ–ĺ–Ľ—É—á–į–Ķ–ľ—č–Ķ —Ä–į—Ā—ą–ł—Ą—Ä–ĺ–≤–ļ–ł –Ņ–ĺ–ī –ļ–ĺ–Ĺ–ļ—Ä–Ķ—ā–Ĺ—č–Ļ —Ā–ĺ—Ā—ā–į–≤. –ü—Ä–Ķ–ī–Ľ–ĺ–∂–Ķ–Ĺ–Ĺ—č–Ļ –Ņ–ĺ–ī—Ö–ĺ–ī –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ —É–Ľ—É—á—ą–į–Ķ—ā –ĺ–Ī–ĺ–Ī—Č–į–Ķ–ľ–ĺ—Ā—ā—Ć –ľ–ĺ–ī–Ķ–Ľ–ł, —Ä–Ķ—ą–į—Ź –Ņ—Ä–ĺ–Ī–Ľ–Ķ–ľ—É –Ņ–Ľ–ĺ—Ö–ĺ–≥–ĺ –Ņ–Ķ—Ä–Ķ–Ĺ–ĺ—Ā–į —Ā —Ā–ł–Ĺ—ā–Ķ—ā–ł—á–Ķ—Ā–ļ–ł—Ö –ī–į–Ĺ–Ĺ—č—Ö –Ĺ–į —Ä–Ķ–į–Ľ—Ć–Ĺ—É—é –ľ—É–∑—č–ļ—É. –ė—Ā—Ā–Ľ–Ķ–ī–ĺ–≤–į—ā–Ķ–Ľ–ł –≤—č–Ņ—É—Ā–ļ–į—é—ā –ĺ—ā–ļ—Ä—č—ā—É—é –ľ–ĺ–ī–Ķ–Ľ—Ć MuScriptor, –ļ–ĺ—ā–ĺ—Ä–į—Ź —É—Ā–Ņ–Ķ—ą–Ĺ–ĺ —Ä–į–Ī–ĺ—ā–į–Ķ—ā –Ĺ–į –ľ–Ĺ–ĺ–≥–ĺ–ł–Ĺ—Ā—ā—Ä—É–ľ–Ķ–Ĺ—ā–į–Ľ—Ć–Ĺ—č—Ö –∑–į–Ņ–ł—Ā—Ź—Ö –ł–∑ —Ä–į–∑–Ĺ–ĺ–ĺ–Ī—Ä–į–∑–Ĺ—č—Ö –ľ—É–∑—č–ļ–į–Ľ—Ć–Ĺ—č—Ö –∂–į–Ĺ—Ä–ĺ–≤.'}, 'en': {'title': 'Transforming Music Transcription with Real-World Data and Reinforcement Learning', 'desc': 'This paper addresses the challenges of automatic music transcription, particularly in complex, multi-instrument recordings. It critiques existing methods that rely heavily on synthetic data, which often do not perform well in real-world scenarios. The authors propose a novel approach that combines synthetic pre-training with fine-tuning on actual music audio and reinforcement learning for improved accuracy. They also introduce MuScriptor, a versatile model designed to handle diverse musical genres and instrument combinations effectively.'}, 'zh': {'title': 'MuScriptorÔľöŚ§öšĻźŚô®ťü≥šĻźŤĹ¨ŚĹēÁöĄśĖįÁ™ĀÁ†ī', 'desc': 'ÁéįśúČÁöĄŤá™Śä®ťü≥šĻźŤĹ¨ŚĹēśĖĻś≥ēťÄöŚłłšĽÖťôźšļéŚćēšłÄšĻźŚô®ŚĹēťü≥ÔľĆśąĖŤÄÖŚú®Ś§ćśĚāÁöĄÁúüŚģěťü≥šĻźś∑∑Śźąšł≠Ť°®ÁéįšłćšĹ≥„ÄāŚįĹÁģ°šĻčŚČćÁöĄÁ†ĒÁ©∂Śą©ÁĒ®šļÜŚźąśąźŤģ≠ÁĽÉśēįśćģÔľĆšĹÜÁĒüśąźÁöĄś®°ŚěčŚú®ÁúüŚģěÁöĄŚ§öšĻźŚô®ÁéĮŚĘÉšł≠ś≥õŚĆĖŤÉĹŚäõŤĺÉŚ∑ģÔľĆŚĮľŤáīŤĹ¨ŚĹēŤĺďŚáļŚá†šĻéśó†ś≥ēšĹŅÁĒ®„Äāśú¨śĖáŚąÜśěźšļÜŚźąśąźśēįśćģŚú®ťĘĄŤģ≠ÁĽÉšł≠ÁöĄśúČśēąśÄßÔľĆŚĻ∂ÁĽďŚźąÁúüŚģěťü≥šĻźťü≥ťĘĎŤŅõŤ°ĆŚĺģŤįÉÔľĆšĽ•ŚŹäšĹŅÁĒ®ŚľļŚĆĖŚ≠¶šĻ†ŤŅõŤ°ĆŚźéŤģ≠ÁĽÉ„ÄāśąĎšĽ¨ŤŅėŚľēŚÖ•šļÜšĻźŚô®Ś≠ėŚú®ÁöĄśĚ°šĽ∂ÔľĆšĽ•ŚģöŚą∂ŤĹ¨ŚĹēÔľĆśúÄÁĽąŚŹĎŚłÉšļÜMuScriptorÔľĆŤŅôśėĮšłÄšł™ŚľÄśĒĺśĚÉťáćÁöĄŚ§öšĻźŚô®ťü≥šĻźŤĹ¨ŚĹēś®°ŚěčÔľĆŤÉĹŚ§üŚ§ĄÁźÜśĚ•Ťá™Ś§öÁßćťü≥šĻźť£éś†ľÁöĄÁúüŚģěťü≥šĻźŚĹēťü≥„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.10522', 'title': 'Towards Autonomous and Auditable Medical Imaging Model Development', 'url': 'https://huggingface.co/papers/2607.10522', 'abstract': 'Abstract  Large language model (LLM) agents are beginning to automate machine learning engineering (MLE) by coupling planning, code execution, debugging, and empirical feedback. Translating this capability to medical imaging remains difficult because each task imposes modality-specific experimentation and strict requirements for validation protocols and prediction artifacts. Here we introduce AMID, an autonomous multi-agent framework for medical imaging model development. AMID first proposes Data-Conditioned Method Planning, which refines coarse task-level search spaces into executable, parallelizable method lanes grounded in task-specific data analysis and runnable medical-imaging resources. It then develops Verification-Guided Two-Stage Optimization, moving from broad early exploration of diverse method lanes to selective exploitation of promising candidates while enforcing strict verification of validation protocols, metric computation, and prediction artifacts throughout the optimization. Across 20 medical imaging challenge tasks spanning diverse modalities and prediction types, AMID outperformed evaluated general-purpose MLE systems and, on several tasks, approached or matched strong human-designed challenge solutions. These results suggest that AMID can turn task-specific medical imaging model development from bespoke manual engineering into an agentic workflow for producing high-performing and auditable model artifacts across heterogeneous tasks.', 'score': 4, 'issue_id': 2658, 'pub_date': '2026-07-12', 'pub_date_card': {'ru': '12 –ł—é–Ľ—Ź', 'en': 'July 12', 'zh': '7śúą12śó•'}, 'hash': '72518496c216db01', 'authors': ['Shengyuan Liu', 'Jia-Xuan Jiang', 'Boyun Zheng', 'Cheng Wang', 'Zipei Wang', 'Wentao Pan', 'Hongtao Wu', 'Houwen Peng', 'Yu Gu', 'Lichao Sun', 'Yixuan Yuan'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Lehigh University', 'Microsoft Research', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.10522.jpg', 'data': {'categories': ['#science', '#cv', '#healthcare', '#multimodal', '#agents', '#optimization'], 'emoji': 'ūüŹ•', 'ru': {'title': '–ź–≥–Ķ–Ĺ—ā–Ĺ–į—Ź —Ā–ł—Ā—ā–Ķ–ľ–į –ī–Ľ—Ź –į–≤—ā–ĺ–ľ–į—ā–ł–∑–į—Ü–ł–ł —Ä–į–∑—Ä–į–Ī–ĺ—ā–ļ–ł –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –ľ–Ķ–ī–ł—Ü–ł–Ĺ—Ā–ļ–ĺ–Ļ –≤–ł–∑—É–į–Ľ–ł–∑–į—Ü–ł–ł', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ–Ķ–Ĺ–į AMID ‚ÄĒ –į–≤—ā–ĺ–Ĺ–ĺ–ľ–Ĺ–į—Ź –ľ—É–Ľ—Ć—ā–ł–į–≥–Ķ–Ĺ—ā–Ĺ–į—Ź —Ā–ł—Ā—ā–Ķ–ľ–į, –ļ–ĺ—ā–ĺ—Ä–į—Ź –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā LLM –ī–Ľ—Ź –į–≤—ā–ĺ–ľ–į—ā–ł–∑–į—Ü–ł–ł —Ä–į–∑—Ä–į–Ī–ĺ—ā–ļ–ł –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ –≤ –ľ–Ķ–ī–ł—Ü–ł–Ĺ—Ā–ļ–ĺ–Ļ –≤–ł–∑—É–į–Ľ–ł–∑–į—Ü–ł–ł. –°–ł—Ā—ā–Ķ–ľ–į –Ņ—Ä–ł–ľ–Ķ–Ĺ—Ź–Ķ—ā –ľ–Ķ—ā–ĺ–ī Data-Conditioned Method Planning, –ļ–ĺ—ā–ĺ—Ä—č–Ļ –į–ī–į–Ņ—ā–ł—Ä—É–Ķ—ā –Ņ—Ä–ĺ—Ā—ā—Ä–į–Ĺ—Ā—ā–≤–ĺ –Ņ–ĺ–ł—Ā–ļ–į –ľ–Ķ—ā–ĺ–ī–ĺ–≤ –Ņ–ĺ–ī —Ā–Ņ–Ķ—Ü–ł—Ą–ł–ļ—É –ļ–ĺ–Ĺ–ļ—Ä–Ķ—ā–Ĺ–ĺ–Ļ –∑–į–ī–į—á–ł –ł –ī–ĺ—Ā—ā—É–Ņ–Ĺ—č—Ö –ī–į–Ĺ–Ĺ—č—Ö. –ó–į—ā–Ķ–ľ –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā—Ā—Ź Verification-Guided Two-Stage Optimization, –ļ–ĺ—ā–ĺ—Ä–į—Ź —Ā–Ĺ–į—á–į–Ľ–į –ł—Ā—Ā–Ľ–Ķ–ī—É–Ķ—ā —Ä–į–∑–Ľ–ł—á–Ĺ—č–Ķ –Ņ–ĺ–ī—Ö–ĺ–ī—č, –į –∑–į—ā–Ķ–ľ —Ą–ĺ–ļ—É—Ā–ł—Ä—É–Ķ—ā—Ā—Ź –Ĺ–į —Ā–į–ľ—č—Ö –Ņ–Ķ—Ä—Ā–Ņ–Ķ–ļ—ā–ł–≤–Ĺ—č—Ö –ļ–į–Ĺ–ī–ł–ī–į—ā–į—Ö —Ā —Ā—ā—Ä–ĺ–≥–ĺ–Ļ –Ņ—Ä–ĺ–≤–Ķ—Ä–ļ–ĺ–Ļ –≤–į–Ľ–ł–ī–į—Ü–ł–ł. –Ě–į 20 —Ä–į–∑–Ľ–ł—á–Ĺ—č—Ö –ľ–Ķ–ī–ł—Ü–ł–Ĺ—Ā–ļ–ł—Ö –∑–į–ī–į—á–į—Ö AMID –Ņ–ĺ–ļ–į–∑–į–Ľ–į —Ä–Ķ–∑—É–Ľ—Ć—ā–į—ā—č, —Ā—Ä–į–≤–Ĺ–ł–ľ—č–Ķ —Ā —Ä—É—á–Ĺ–ĺ–Ļ —Ä–į–∑—Ä–į–Ī–ĺ—ā–ļ–ĺ–Ļ —ć–ļ—Ā–Ņ–Ķ—Ä—ā–ĺ–≤ –ł –Ņ—Ä–Ķ–≤–ĺ—Ā—Ö–ĺ–ī—Ź—Č–ł–Ķ —Ā—É—Č–Ķ—Ā—ā–≤—É—é—Č–ł–Ķ —Ā–ł—Ā—ā–Ķ–ľ—č –į–≤—ā–ĺ–ľ–į—ā–ł–∑–į—Ü–ł–ł –ľ–į—ą–ł–Ĺ–Ĺ–ĺ–≥–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź.'}, 'en': {'title': 'Automating Medical Imaging Model Development with AMID', 'desc': 'This paper presents AMID, an autonomous framework designed to enhance the development of medical imaging models using large language model (LLM) agents. AMID employs Data-Conditioned Method Planning to streamline the process by refining task-level searches into actionable methods based on specific data analysis. It also incorporates Verification-Guided Two-Stage Optimization, which balances exploration of various methods with a focus on validating results and metrics. The framework demonstrated superior performance over traditional machine learning engineering systems across multiple medical imaging tasks, indicating its potential to automate and improve model development in this field.'}, 'zh': {'title': 'AMIDÔľöŚĆĽŚ≠¶ŚĹĪŚÉŹś®°ŚěčŚľÄŚŹĎÁöĄśôļŤÉĹŚĆĖśĖįśĖĻś≥ē', 'desc': 'Ś§ßŚěčŤĮ≠Ť®Äś®°ŚěčÔľąLLMÔľČšĽ£ÁźÜŚľÄŚßčťÄöŤŅáŤßĄŚąí„ÄĀšĽ£Á†ĀśČßŤ°Ć„ÄĀŤįÉŤĮēŚíĆÁĽŹť™ĆŚŹćť¶ąśĚ•Ťá™Śä®ŚĆĖśúļŚô®Ś≠¶šĻ†Ś∑•Á®čÔľąMLEÔľČ„ÄāŚįÜŤŅôÁßćŤÉĹŚäõŚļĒÁĒ®šļéŚĆĽŚ≠¶ŚĹĪŚÉŹšĽćÁĄ∂ťĚĘšłīśĆĎśąėÔľĆŚõ†šłļśĮŹšł™šĽĽŚä°ťÉĹśúČÁČĻŚģöÁöĄŚģěť™ĆŤ¶ĀśĪāŚíĆšł•ś†ľÁöĄť™ĆŤĮĀŚćŹŤģģ„Äāśú¨śĖášĽčÁĽćšļÜAMIDÔľĆšłÄšł™ÁĒ®šļéŚĆĽŚ≠¶ŚĹĪŚÉŹś®°ŚěčŚľÄŚŹĎÁöĄŤá™šłĽŚ§öšĽ£ÁźÜś°Üśě∂„ÄāAMIDťÄöŤŅáśēįśćģśĚ°šĽ∂ÁöĄśĖĻś≥ēŤßĄŚąíŚíĆť™ĆŤĮĀŚľēŚĮľÁöĄšł§ťė∂śģĶšľėŚĆĖÔľĆśėĺŤĎóśŹźťęėšļÜŚĆĽŚ≠¶ŚĹĪŚÉŹšĽĽŚä°ÁöĄś®°ŚěčŚľÄŚŹĎśēąÁéáÔľĆŤ∂ÖŤ∂äšļÜšľ†ÁĽüÁöĄťÄöÁĒ®MLEÁ≥ĽÁĽü„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.07769', 'title': 'Principled Analysis of Deep Reinforcement Learning Evaluation and Design Paradigms', 'url': 'https://huggingface.co/papers/2607.07769', 'abstract': 'Abstract  Starting from the utilization of deep neural networks to approximate the state-action value function that led to winning one of the most challenging games, to algorithmic advancements that allowed solving problems without even explicitly stating the rules of the challenge at hand, reinforcement learning research has been the center of remarkable scientific progress for the past decade. In this paper, we focus on the key ingredients of this research progress and we analyze the canonical evaluation and design paradigms in reinforcement learning. We introduce the theoretical foundations of scaling laws in reinforcement learning and show that the asymptotic performance of reinforcement learning algorithms does not have a monotone relationship between performance rankings and data-regimes. We conduct large-scale experiments and our results demonstrate that a line of reinforcement learning research under the canonical design and evaluation paradigms resulted in incorrect conclusions. Our analysis and results provide a core analysis on scaling, capacity and complexity of deep reinforcement learning.', 'score': 4, 'issue_id': 2658, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 –ł—é–Ľ—Ź', 'en': 'July 8', 'zh': '7śúą8śó•'}, 'hash': 'dcce3f59cd558a05', 'authors': ['Ezgi Korkmaz'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07769.jpg', 'data': {'categories': ['#optimization', '#survey', '#games'], 'emoji': 'ūüďä', 'ru': {'title': '–ü–Ķ—Ä–Ķ–ĺ—Ü–Ķ–Ĺ—Ď–Ĺ–Ĺ—č–Ķ –Ņ–į—Ä–į–ī–ł–≥–ľ—č: –ļ–į–ļ –ľ–į—Ā—ą—ā–į–Ī–ł—Ä–ĺ–≤–į–Ĺ–ł–Ķ –ľ–Ķ–Ĺ—Ź–Ķ—ā –≤—č–≤–ĺ–ī—č –≤ –ĺ–Ī—É—á–Ķ–Ĺ–ł–ł —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –į–Ĺ–į–Ľ–ł–∑–ł—Ä—É—é—ā—Ā—Ź –ĺ—Ā–Ĺ–ĺ–≤–Ĺ—č–Ķ –Ņ–į—Ä–į–ī–ł–≥–ľ—č –ĺ—Ü–Ķ–Ĺ–ļ–ł –ł —Ä–į–∑—Ä–į–Ī–ĺ—ā–ļ–ł –į–Ľ–≥–ĺ—Ä–ł—ā–ľ–ĺ–≤ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ, –ļ–ĺ—ā–ĺ—Ä—č–Ķ –Ņ—Ä–ł–≤–Ķ–Ľ–ł –ļ –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ–ľ—É –Ņ—Ä–ĺ–≥—Ä–Ķ—Ā—Ā—É –≤ —Ä–Ķ—ą–Ķ–Ĺ–ł–ł —Ā–Ľ–ĺ–∂–Ĺ—č—Ö –∑–į–ī–į—á. –ź–≤—ā–ĺ—Ä—č –ł—Ā—Ā–Ľ–Ķ–ī—É—é—ā —ā–Ķ–ĺ—Ä–Ķ—ā–ł—á–Ķ—Ā–ļ–ł–Ķ –ĺ—Ā–Ĺ–ĺ–≤—č –∑–į–ļ–ĺ–Ĺ–ĺ–≤ –ľ–į—Ā—ą—ā–į–Ī–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź –≤ reinforcement learning –ł –Ņ–ĺ–ļ–į–∑—č–≤–į—é—ā, —á—ā–ĺ –į—Ā–ł–ľ–Ņ—ā–ĺ—ā–ł—á–Ķ—Ā–ļ–į—Ź –Ņ—Ä–ĺ–ł–∑–≤–ĺ–ī–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ—Ā—ā—Ć –į–Ľ–≥–ĺ—Ä–ł—ā–ľ–ĺ–≤ –Ĺ–Ķ –ł–ľ–Ķ–Ķ—ā –ľ–ĺ–Ĺ–ĺ—ā–ĺ–Ĺ–Ĺ–ĺ–Ļ –∑–į–≤–ł—Ā–ł–ľ–ĺ—Ā—ā–ł –ĺ—ā –ĺ–Ī—ä—Ď–ľ–į –ī–į–Ĺ–Ĺ—č—Ö. –ü—Ä–ĺ–≤–Ķ–ī—Ď–Ĺ–Ĺ—č–Ķ –ľ–į—Ā—ą—ā–į–Ī–Ĺ—č–Ķ —ć–ļ—Ā–Ņ–Ķ—Ä–ł–ľ–Ķ–Ĺ—ā—č –≤—č—Ź–≤–ł–Ľ–ł, —á—ā–ĺ –ľ–Ĺ–ĺ–≥–ł–Ķ –≤—č–≤–ĺ–ī—č, –Ņ–ĺ–Ľ—É—á–Ķ–Ĺ–Ĺ—č–Ķ –Ņ—Ä–ł –ł—Ā–Ņ–ĺ–Ľ—Ć–∑–ĺ–≤–į–Ĺ–ł–ł –ļ–į–Ĺ–ĺ–Ĺ–ł—á–Ķ—Ā–ļ–ł—Ö –Ņ–į—Ä–į–ī–ł–≥–ľ, –ĺ–ļ–į–∑–į–Ľ–ł—Ā—Ć –Ĺ–Ķ–ļ–ĺ—Ä—Ä–Ķ–ļ—ā–Ĺ—č–ľ–ł. –†–į–Ī–ĺ—ā–į –Ņ—Ä–Ķ–ī–ĺ—Ā—ā–į–≤–Ľ—Ź–Ķ—ā –ļ—Ä–ł—ā–ł—á–Ķ—Ā–ļ–ł–Ļ –į–Ĺ–į–Ľ–ł–∑ –ľ–į—Ā—ą—ā–į–Ī–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź, —Ď–ľ–ļ–ĺ—Ā—ā–ł –ł —Ā–Ľ–ĺ–∂–Ĺ–ĺ—Ā—ā–ł –≥–Ľ—É–Ī–ĺ–ļ–ĺ–≥–ĺ –ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź —Ā –Ņ–ĺ–ī–ļ—Ä–Ķ–Ņ–Ľ–Ķ–Ĺ–ł–Ķ–ľ.'}, 'en': {'title': 'Unraveling the Complexities of Reinforcement Learning Performance', 'desc': 'This paper explores the advancements in reinforcement learning (RL) over the past decade, particularly focusing on deep neural networks used to approximate state-action value functions. It critically examines the traditional evaluation and design paradigms in RL, revealing that the performance of algorithms does not consistently correlate with the amount of data used. The authors introduce theoretical foundations regarding scaling laws in RL, highlighting the complexities involved in algorithm performance. Through extensive experiments, they demonstrate that previous research under standard paradigms may have led to misleading conclusions about RL effectiveness.'}, 'zh': {'title': 'ś∑ĪŚļ¶ŚľļŚĆĖŚ≠¶šĻ†ÁöĄŚÖ≥ťĒģŚąÜśěźšłéŤĮĮŚĆļ', 'desc': 'śú¨ŤģļśĖáśéĘŤģ®šļÜś∑ĪŚļ¶ŚľļŚĆĖŚ≠¶šĻ†ÁöĄŚÖ≥ťĒģŤ¶ĀÁī†ÔľĆŚąÜśěźšļÜŚľļŚĆĖŚ≠¶šĻ†šł≠ÁöĄÁĽŹŚÖłŤĮĄšľįŚíĆŤģĺŤģ°ŤĆÉŚľŹ„ÄāśąĎšĽ¨šĽčÁĽćšļÜŚľļŚĆĖŚ≠¶šĻ†šł≠ŤßĄś®°ś≥ēŚąôÁöĄÁźÜŤģļŚüļÁ°ÄÔľĆŚĻ∂ŚĪēÁ§ļšļÜŚľļŚĆĖŚ≠¶šĻ†Áģóś≥ēÁöĄśłźŤŅĎśÄßŤÉĹšłéśÄßŤÉĹśéíŚźćŚíĆśēįśćģś®°ŚľŹšĻčťóīŚĻ∂ś≤°śúČŚćēŤįÉŚÖ≥Á≥Ľ„ÄāťÄöŤŅáŚ§ßŤßĄś®°Śģěť™ĆÔľĆśąĎšĽ¨ÁöĄÁĽďśěúŤ°®śėéÔľĆŚú®ÁĽŹŚÖłŤģĺŤģ°ŚíĆŤĮĄšľįŤĆÉŚľŹšłčÁöĄŚľļŚĆĖŚ≠¶šĻ†Á†ĒÁ©∂ŚĺóŚáļšļÜťĒôŤĮĮÁöĄÁĽďŤģļ„ÄāśąĎšĽ¨ÁöĄŚąÜśěźŚíĆÁĽďśěúšłļś∑ĪŚļ¶ŚľļŚĆĖŚ≠¶šĻ†ÁöĄŤßĄś®°„ÄĀŤÉĹŚäõŚíĆŚ§ćśĚāśÄßśŹźšĺõšļÜś†łŚŅÉŚąÜśěź„Äā'}}}, {'id': 'https://huggingface.co/papers/2603.28583', 'title': 'Navigating the Mirage: A Dual-Path Agentic Framework for Robust Misleading Chart Question Answering', 'url': 'https://huggingface.co/papers/2603.28583', 'abstract': 'Abstract  Despite the success of Vision-Language Models (VLMs), misleading charts remain a significant challenge due to their deceptive visual structures and distorted data representations. We present ChartCynics, an agentic dual-path framework designed to unmask visual deception via a "skeptical" reasoning paradigm. Unlike holistic models, ChartCynics decouples perception from verification: a Diagnostic Vision Path captures structural anomalies (e.g., inverted axes) through strategic ROI cropping, while an OCR-Driven Data Path ensures numerical grounding. To resolve cross-modal conflicts, we introduce an Agentic Summarizer optimized via a two-stage protocol: Oracle-Informed SFT for reasoning distillation and Deception-Aware GRPO for adversarial alignment. This pipeline effectively penalizes visual traps and enforces logical consistency. Evaluations on two benchmarks show that ChartCynics achieves 74.43% and 64.55% accuracy, providing an absolute performance boost of ~29% over the Qwen3-VL-8B backbone, outperforming state-of-the-art proprietary models. Our results demonstrate that specialized agentic workflows can grant smaller open-source models superior robustness, establishing a new foundation for trustworthy chart interpretation.', 'score': 3, 'issue_id': 2666, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 –ł—é–Ľ—Ź', 'en': 'July 14', 'zh': '7śúą14śó•'}, 'hash': 'e18fc14715622f9f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#cv', '#training', '#benchmark', '#agents', '#rlhf', '#multimodal'], 'emoji': 'ūüēĶÔłŹ', 'ru': {'title': '–°–ļ–Ķ–Ņ—ā–ł—á–Ķ—Ā–ļ–ł–Ļ –į–Ĺ–į–Ľ–ł–∑: –ĺ–Ī–Ĺ–į—Ä—É–∂–Ķ–Ĺ–ł–Ķ –ĺ–Ī–ľ–į–Ĺ–į –≤ –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č—Ö –ī–į–Ĺ–Ĺ—č—Ö —á–Ķ—Ä–Ķ–∑ –į–≥–Ķ–Ĺ—ā–Ĺ—č–Ķ —Ā–ł—Ā—ā–Ķ–ľ—č', 'desc': 'ChartCynics ‚ÄĒ —ć—ā–ĺ –į–≥–Ķ–Ĺ—ā–Ĺ–į—Ź —Ā–ł—Ā—ā–Ķ–ľ–į –Ĺ–į –ĺ—Ā–Ĺ–ĺ–≤–Ķ Vision-Language Models, —Ä–į–∑—Ä–į–Ī–ĺ—ā–į–Ĺ–Ĺ–į—Ź –ī–Ľ—Ź –≤—č—Ź–≤–Ľ–Ķ–Ĺ–ł—Ź –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č—Ö –ĺ–Ī–ľ–į–Ĺ–ĺ–≤ –≤ –ī–ł–į–≥—Ä–į–ľ–ľ–į—Ö –ł –≥—Ä–į—Ą–ł–ļ–į—Ö. –°–ł—Ā—ā–Ķ–ľ–į –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā –ī–≤—É—Ö–Ņ—É—ā–Ķ–≤–ĺ–Ļ –Ņ–ĺ–ī—Ö–ĺ–ī: –Ņ–Ķ—Ä–≤—č–Ļ –Ņ—É—ā—Ć –į–Ĺ–į–Ľ–ł–∑–ł—Ä—É–Ķ—ā —Ā—ā—Ä—É–ļ—ā—É—Ä–Ĺ—č–Ķ –į–Ĺ–ĺ–ľ–į–Ľ–ł–ł —á–Ķ—Ä–Ķ–∑ ROI-–ļ—Ä–ĺ–Ņ–ł–Ĺ–≥, –į –≤—ā–ĺ—Ä–ĺ–Ļ –Ņ—É—ā—Ć –ĺ–Ī–Ķ—Ā–Ņ–Ķ—á–ł–≤–į–Ķ—ā —á–ł—Ā–Ľ–ĺ–≤—É—é –≤–į–Ľ–ł–ī–į—Ü–ł—é —á–Ķ—Ä–Ķ–∑ OCR. –ú–ĺ–ī–Ķ–Ľ—Ć –ĺ–Ī—É—á–į–Ķ—ā—Ā—Ź —Ā–Ņ–Ķ—Ü–ł–į–Ľ—Ć–Ĺ—č–ľ –ľ–Ķ—ā–ĺ–ī–ĺ–ľ ‚ÄĒ Oracle-Informed SFT –ī–Ľ—Ź –ī–ł—Ā—ā–ł–Ľ–Ľ—Ź—Ü–ł–ł —Ä–į—Ā—Ā—É–∂–ī–Ķ–Ĺ–ł–Ļ –ł Deception-Aware GRPO –ī–Ľ—Ź —Ā–ĺ—Ā—ā—Ź–∑–į—ā–Ķ–Ľ—Ć–Ĺ–ĺ–Ļ –≤—č—Ä–į–≤–Ĺ–ł–≤–į–Ĺ–ł—Ź. –Ě–į —ā–Ķ—Ā—ā–ĺ–≤—č—Ö –Ĺ–į–Ī–ĺ—Ä–į—Ö —Ā–ł—Ā—ā–Ķ–ľ–į –ī–ĺ—Ā—ā–ł–≥–Ľ–į –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ–≥–ĺ –Ņ—Ä–ł—Ä–ĺ—Ā—ā–į –ļ–į—á–Ķ—Ā—ā–≤–į (29% –į–Ī—Ā–ĺ–Ľ—é—ā–Ĺ–ĺ–≥–ĺ —É–Ľ—É—á—ą–Ķ–Ĺ–ł—Ź), –ī–Ķ–ľ–ĺ–Ĺ—Ā—ā—Ä–ł—Ä—É—Ź, —á—ā–ĺ —Ā–Ņ–Ķ—Ü–ł–į–Ľ–ł–∑–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–Ķ –į–≥–Ķ–Ĺ—ā–Ĺ—č–Ķ –Ņ–ĺ–ī—Ö–ĺ–ī—č –ľ–ĺ–≥—É—ā –ĺ–Ī–Ķ—Ā–Ņ–Ķ—á–ł—ā—Ć –Ĺ–į–ī—Ď–∂–Ĺ–ĺ—Ā—ā—Ć –ł –ł–Ĺ—ā–Ķ—Ä–Ņ—Ä–Ķ—ā–ł—Ä—É–Ķ–ľ–ĺ—Ā—ā—Ć –ľ–Ķ–Ĺ—Ć—ą–ł—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ.'}, 'en': {'title': 'Unmasking Deception in Charts with ChartCynics', 'desc': 'This paper introduces ChartCynics, a new framework aimed at identifying misleading charts in Vision-Language Models (VLMs). It separates the processes of perception and verification, using a Diagnostic Vision Path to detect visual anomalies and an OCR-Driven Data Path to ensure accurate numerical representation. The framework employs an Agentic Summarizer that utilizes a two-stage optimization process to enhance reasoning and align against deceptive visuals. The results show that ChartCynics significantly improves accuracy over existing models, highlighting the effectiveness of specialized workflows in enhancing the reliability of chart interpretation.'}, 'zh': {'title': 'śŹ≠Á§ļŚõĺŤ°®šł≠ÁöĄŤßÜŤßČś¨ļť™ó', 'desc': 'ŚįĹÁģ°ŤßÜŤßČŤĮ≠Ť®Äś®°ŚěčÔľąVLMsÔľČŚŹĖŚĺóšļÜśąźŚäüÔľĆšĹÜŤĮĮŚĮľśÄßŚõĺŤ°®šĽćÁĄ∂śėĮšłÄšł™ťáćŚ§ßśĆĎśąėÔľĆŚõ†šłļŚģÉšĽ¨ŚÖ∑śúČś¨ļť™óśÄßÁöĄŤßÜŤßČÁĽďśěĄŚíĆśČ≠śõ≤ÁöĄśēįśćģŤ°®Á§ļ„ÄāśąĎšĽ¨śŹźŚáļšļÜChartCynicsÔľĆŤŅôśėĮšłÄÁßćŚŹĆŤ∑ĮŚĺĄś°Üśě∂ÔľĆśó®Śú®ťÄöŤŅá‚ÄúśÄÄÁĖĎ‚ÄĚÁöĄśé®ÁźÜŤĆÉŚľŹśŹ≠Á§ļŤßÜŤßČś¨ļť™ó„ÄāšłéśēīšĹďś®°ŚěčšłćŚźĆÔľĆChartCynicsŚįÜśĄüÁü•šłéť™ĆŤĮĀŤß£ŤÄ¶ÔľöŤĮäśĖ≠ŤßÜŤßČŤ∑ĮŚĺĄťÄöŤŅáśąėÁē•śÄßŚĆļŚüüŤ£ĀŚČ™śćēśćČÁĽďśěĄŚľāŚłłÔľąšĺčŚ¶āÔľĆŚŹćŤĹ¨ÁöĄŚĚźś†áŤĹīÔľČÔľĆŤÄĆOCRť©ĪŚä®ÁöĄśēįśćģŤ∑ĮŚĺĄÁ°ģšŅĚśēįŚÄľÁöĄŚáÜÁ°ģśÄß„ÄāśąĎšĽ¨ÁöĄŤĮĄšľįŤ°®śėéÔľĆChartCynicsŚú®šł§šł™ŚüļŚáÜśĶčŤĮēšł≠ŚąÜŚąęŤĺĺŚąįšļÜ74.43%ŚíĆ64.55%ÁöĄŚáÜÁ°ģÁéáÔľĆśŹźšĺõšļÜÁļ¶29%ÁöĄśÄßŤÉĹśŹźŚćáÔľĆŤ∂ÖŤ∂äšļÜśúÄŚÖąŤŅõÁöĄšłďśúČś®°Śěč„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.12450', 'title': 'Let RGB Be the Language of Vision', 'url': 'https://huggingface.co/papers/2607.12450', 'abstract': 'Abstract  This work introduces a unified formulation for vision models, where diverse forms of visual information beyond natural images, such as masks, depth maps, and other structured visual signals, are all represented as RGB images, while general visual tasks can be converted into a common RGB-to-RGB image editing problem. In this paradigm, different types of visual information internally share the same encoding and decoding architecture and parameters as natural images, enabling a single model to transfer across tasks through a unified visual interface, in a way analogous to how language models operate over text. We refer to this formulation as RGB In and RGB Out (RINO). Built upon a generic image editing backbone without task-specific fine-tuning, RINO demonstrates robust and competitive zero-shot performance on both dense understanding tasks such as segmentation and depth estimation (where we unify outputs as RGB), and dense-conditioned generation tasks such as pose-to-image generation (where we unify inputs as RGB). We hope this study provides useful insights toward general unified vision-language systems, where diverse visual tasks can be expressed, interpreted, and solved through a shared visual language. Code is available at https://github.com/yangtiming/RINO.', 'score': 3, 'issue_id': 2659, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 –ł—é–Ľ—Ź', 'en': 'July 14', 'zh': '7śúą14śó•'}, 'hash': '6a7f02e0fff62d78', 'authors': ['Timing Yang', 'Jinrui Yang', 'Xinlong Li', 'Yuhan Wang', 'Haoran Li', 'Yanqing Liu', 'Guoyizhe Wei', 'Jixuan Ying', 'Chen Wei', 'Rama Chellappa', 'Yuyin Zhou', 'Cihang Xie', 'Alan Yuille', 'Feng Wang'], 'affiliations': ['Carnegie Mellon University', 'Johns Hopkins University', 'Rice University', 'UC Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2607.12450.jpg', 'data': {'categories': ['#cv', '#architecture', '#multimodal'], 'emoji': 'ūüé®', 'ru': {'title': '–ě–ī–ł–Ĺ —Ź–∑—č–ļ –ī–Ľ—Ź –≤—Ā–Ķ—Ö –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č—Ö –∑–į–ī–į—á: —É–Ĺ–ł—Ą–ł—Ü–ł—Ä–ĺ–≤–į–Ĺ–Ĺ–ĺ–Ķ –≤–ł–ī–Ķ–Ĺ–ł–Ķ —á–Ķ—Ä–Ķ–∑ RGB', 'desc': '–†–į–Ī–ĺ—ā–į –Ņ—Ä–Ķ–ī–Ľ–į–≥–į–Ķ—ā —É–Ĺ–ł—Ą–ł—Ü–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–Ļ –Ņ–ĺ–ī—Ö–ĺ–ī –ļ –≤–ł–ī–Ķ–Ĺ–ł—é, –≥–ī–Ķ –≤—Ā–Ķ —ā–ł–Ņ—č –≤–ł–∑—É–į–Ľ—Ć–Ĺ–ĺ–Ļ –ł–Ĺ—Ą–ĺ—Ä–ľ–į—Ü–ł–ł (–ľ–į—Ā–ļ–ł, –ļ–į—Ä—ā—č –≥–Ľ—É–Ī–ł–Ĺ—č, —Ā—ā—Ä—É–ļ—ā—É—Ä–Ĺ—č–Ķ —Ā–ł–≥–Ĺ–į–Ľ—č) –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ—Ź—é—ā—Ā—Ź –≤ –≤–ł–ī–Ķ RGB-–ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ļ, –į —Ä–į–∑–Ľ–ł—á–Ĺ—č–Ķ –∑–į–ī–į—á–ł –ĺ–Ī—Ä–į–Ī–ĺ—ā–ļ–ł –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ļ —Ā–≤–ĺ–ī—Ź—ā—Ā—Ź –ļ –Ķ–ī–ł–Ĺ–ĺ–Ļ –∑–į–ī–į—á–Ķ —Ä–Ķ–ī–į–ļ—ā–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł—Ź RGB-to-RGB. –ú–ĺ–ī–Ķ–Ľ—Ć –ł—Ā–Ņ–ĺ–Ľ—Ć–∑—É–Ķ—ā –ĺ–ī–Ĺ—É –ĺ–Ī—Č—É—é –į—Ä—Ö–ł—ā–Ķ–ļ—ā—É—Ä—É —ć–Ĺ–ļ–ĺ–ī–Ķ—Ä–į-–ī–Ķ–ļ–ĺ–ī–Ķ—Ä–į –ī–Ľ—Ź –≤—Ā–Ķ—Ö —ā–ł–Ņ–ĺ–≤ –ī–į–Ĺ–Ĺ—č—Ö, —á—ā–ĺ –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź–Ķ—ā –ĺ–ī–Ĺ–ĺ–Ļ –ľ–ĺ–ī–Ķ–Ľ–ł —Ä–Ķ—ą–į—ā—Ć —Ä–į–∑–Ĺ—č–Ķ –∑–į–ī–į—á–ł —á–Ķ—Ä–Ķ–∑ —É–Ĺ–ł—Ą–ł—Ü–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–Ļ –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č–Ļ –ł–Ĺ—ā–Ķ—Ä—Ą–Ķ–Ļ—Ā, –į–Ĺ–į–Ľ–ĺ–≥–ł—á–Ĺ–ĺ —ā–ĺ–ľ—É, –ļ–į–ļ —Ź–∑—č–ļ–ĺ–≤—č–Ķ –ľ–ĺ–ī–Ķ–Ľ–ł —Ä–į–Ī–ĺ—ā–į—é—ā —Ā —ā–Ķ–ļ—Ā—ā–ĺ–ľ. RINO –ī–Ķ–ľ–ĺ–Ĺ—Ā—ā—Ä–ł—Ä—É–Ķ—ā –ļ–ĺ–Ĺ–ļ—É—Ä–Ķ–Ĺ—ā–ĺ—Ā–Ņ–ĺ—Ā–ĺ–Ī–Ĺ—É—é zero-shot –Ņ—Ä–ĺ–ł–∑–≤–ĺ–ī–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ—Ā—ā—Ć –ļ–į–ļ –Ĺ–į –∑–į–ī–į—á–į—Ö –Ņ–Ľ–ĺ—ā–Ĺ–ĺ–≥–ĺ –Ņ–ĺ–Ĺ–ł–ľ–į–Ĺ–ł—Ź —Ā—Ü–Ķ–Ĺ—č (—Ā–Ķ–≥–ľ–Ķ–Ĺ—ā–į—Ü–ł—Ź, –ĺ—Ü–Ķ–Ĺ–ļ–į –≥–Ľ—É–Ī–ł–Ĺ—č), —ā–į–ļ –ł –Ĺ–į –∑–į–ī–į—á–į—Ö —É—Ā–Ľ–ĺ–≤–Ĺ–ĺ–Ļ –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł (—ā—Ä–į–Ĺ—Ā—Ą–ĺ—Ä–ľ–į—Ü–ł—Ź –Ņ–ĺ–∑—č –≤ –ł–∑–ĺ–Ī—Ä–į–∂–Ķ–Ĺ–ł–Ķ) –Ī–Ķ–∑ —Ā–Ņ–Ķ—Ü–ł–į–Ľ–ł–∑–ł—Ä–ĺ–≤–į–Ĺ–Ĺ–ĺ–Ļ –ī–ĺ–ĺ–Ī—É—á–Ķ–Ĺ–ł—Ź. –ü–ĺ–ī—Ö–ĺ–ī –ĺ—ā–ļ—Ä—č–≤–į–Ķ—ā –Ņ—É—ā—Ć –ļ —Ā–ĺ–∑–ī–į–Ĺ–ł—é –Ķ–ī–ł–Ĺ—č—Ö –ľ—É–Ľ—Ć—ā–ł–ľ–ĺ–ī–į–Ľ—Ć–Ĺ—č—Ö —Ā–ł—Ā—ā–Ķ–ľ, –≥–ī–Ķ —Ä–į–∑–Ľ–ł—á–Ĺ—č–Ķ –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č–Ķ –∑–į–ī–į—á–ł —Ä–Ķ—ą–į—é—ā—Ā—Ź —á–Ķ—Ä–Ķ–∑ –ĺ–Ī—Č–ł–Ļ –≤–ł–∑—É–į–Ľ—Ć–Ĺ—č–Ļ —Ź–∑—č–ļ.'}, 'en': {'title': 'Unified Vision Processing with RINO: One Model, Many Tasks', 'desc': 'This paper presents a new approach called RGB In and RGB Out (RINO) for handling various types of visual information, such as masks and depth maps, by treating them all as RGB images. By using a common encoding and decoding architecture, RINO allows a single model to perform multiple visual tasks without needing specific adjustments for each task. This method achieves strong performance in both understanding tasks like segmentation and generation tasks like pose-to-image conversion, all while maintaining a unified visual interface. The goal is to advance the development of general vision-language systems that can interpret and solve diverse visual challenges using a shared framework.'}, 'zh': {'title': 'ÁĽüšłÄŤßÜŤßČś®°ŚěčÔľöRGBŤĺďŚÖ•ŤĺďŚáļÁöĄŚąõśĖį', 'desc': 'ŤŅôť°ĻŚ∑•šĹúśŹźŚáļšļÜšłÄÁßćÁĽüšłÄÁöĄŤßÜŤßČś®°Śěčś°Üśě∂ÔľĆŚįÜŚ§öÁßćŤßÜŤßČšŅ°śĀĮŚĹĘŚľŹÔľąŚ¶āśé©Á†Ā„ÄĀś∑ĪŚļ¶ŚõĺŚíĆŚÖ∂šĽĖÁĽďśěĄŚĆĖŤßÜŤßČšŅ°ŚŹ∑ÔľČťÉĹŤ°®Á§ļšłļRGBŚõĺŚÉŹ„ÄāťÄöŤŅáŤŅôÁßćśĖĻŚľŹÔľĆťÄöÁĒ®ŤßÜŤßČšĽĽŚä°ŚŹĮšĽ•ŤĹ¨ŚĆĖšłļšłÄšł™ŚÖĪŚźĆÁöĄRGBŚąįRGBÁöĄŚõĺŚÉŹÁľĖŤĺĎťóģťĘė„ÄāšłćŚźĆÁĪĽŚěčÁöĄŤßÜŤßČšŅ°śĀĮŚÖĪšļęÁõłŚźĆÁöĄÁľĖÁ†ĀŚíĆŤß£Á†Āśě∂śěĄÔľĆšĹŅŚĺóŚćēšłÄś®°ŚěčŤÉĹŚ§üŚú®šĽĽŚä°šĻčťóīŤŅõŤ°ĆŤŅĀÁßĽÔľĆÁĪĽšľľšļéŤĮ≠Ť®Äś®°ŚěčŚú®śĖáśú¨šłäÁöĄśďćšĹú„ÄāśąĎšĽ¨ÁßįŤŅôÁßćś°Üśě∂šłļRGBŤĺďŚÖ•ŚíĆRGBŤĺďŚáļÔľąRINOÔľČÔľĆŚģÉŚú®ŚĮÜťõÜÁźÜŤß£ŚíĆÁĒüśąźšĽĽŚä°šłäŚĪēÁ§ļšļÜŚľļŚ§ßÁöĄťõ∂-shotśÄßŤÉĹ„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.08046', 'title': "What LLM Forecasters Know but Don't Say: Probing Internal Representations for Calibration and Faithfulness", 'url': 'https://huggingface.co/papers/2607.08046', 'abstract': "Abstract  Large language models fine-tuned for forecasting can be accurate yet poorly calibrated, and their chain-of-thought (CoT) reasoning may not faithfully reflect the evidence behind a forecast. We ask whether internal representations offer a more direct window into both. Working with Eternis-Forecaster 8B on OpenForesight, we train representation-pooling probes on intermediate activations and find they achieve substantially better calibration; a result that also holds for GLM-4.7-Flash and GLM-4.5-Air. We then assess CoT faithfulness through evidence ablation and diversionary injection: removing an influential source in the prompt often changes the model's forecast while leaving the reasoning trace untouched. The same probes function as lie detectors: their activations track behavioral shifts far better than the reasoning trace does, and they also predict the direction of change in 84% of cases, including when the CoT conceals the perturbation's influence. Finally, forced answering reveals that forecasts are largely fixed before reasoning begins: a single pre-reasoning pass recovers the committed answer and confidence, and routing questions by the spread of this pre-set answer distribution saves 30-47% of generated tokens, with no loss of accuracy. Together, these results establish probing internal representations as a practical tool for calibrating, auditing, and triaging language model forecasters and reasoning models more broadly.", 'score': 3, 'issue_id': 2661, 'pub_date': '2026-07-09', 'pub_date_card': {'ru': '9 –ł—é–Ľ—Ź', 'en': 'July 9', 'zh': '7śúą9śó•'}, 'hash': '83b186a27fc4a270', 'authors': ['Rapha√ęl Sarfati', 'Pratyush Ranjan Tiwari', 'Siddharth Boppana', 'Christopher J. Earls', 'Srikar Varadaraj', 'Eric Ho'], 'affiliations': ['eternis', 'goodfire'], 'pdf_title_img': 'assets/pdf/title_img/2607.08046.jpg', 'data': {'categories': ['#interpretability', '#reasoning', '#training', '#inference'], 'emoji': 'ūüß†', 'ru': {'title': '–í–Ĺ—É—ā—Ä–Ķ–Ĺ–Ĺ–ł–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ–Ķ–Ĺ–ł—Ź –ļ–į–ļ –ĺ–ļ–Ĺ–ĺ –≤ –ł—Ā—ā–ł–Ĺ–Ĺ–ĺ–Ķ –ľ—č—ą–Ľ–Ķ–Ĺ–ł–Ķ —Ź–∑—č–ļ–ĺ–≤—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ', 'desc': '–í —Ä–į–Ī–ĺ—ā–Ķ –ł—Ā—Ā–Ľ–Ķ–ī—É–Ķ—ā—Ā—Ź –ļ–į–Ľ–ł–Ī—Ä–ĺ–≤–ļ–į –ļ—Ä—É–Ņ–Ĺ—č—Ö —Ź–∑—č–ļ–ĺ–≤—č—Ö –ľ–ĺ–ī–Ķ–Ľ–Ķ–Ļ, –ĺ–Ī—É—á–Ķ–Ĺ–Ĺ—č—Ö –Ĺ–į –∑–į–ī–į—á—É –Ņ—Ä–ĺ–≥–Ĺ–ĺ–∑–ł—Ä–ĺ–≤–į–Ĺ–ł—Ź, –ļ–ĺ—ā–ĺ—Ä—č–Ķ —á–į—Ā—ā–ĺ –ī–į—é—ā —ā–ĺ—á–Ĺ—č–Ķ –Ņ—Ä–Ķ–ī—Ā–ļ–į–∑–į–Ĺ–ł—Ź, –Ĺ–ĺ –Ņ–Ľ–ĺ—Ö–ĺ –ĺ—ā–ļ–į–Ľ–ł–Ī—Ä–ĺ–≤–į–Ĺ—č. –ź–≤—ā–ĺ—Ä—č –Ņ–ĺ–ļ–į–∑—č–≤–į—é—ā, —á—ā–ĺ –≤–Ĺ—É—ā—Ä–Ķ–Ĺ–Ĺ–ł–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ–Ķ–Ĺ–ł—Ź –ľ–ĺ–ī–Ķ–Ľ–ł (–Ņ—Ä–ĺ–ľ–Ķ–∂—É—ā–ĺ—á–Ĺ—č–Ķ –į–ļ—ā–ł–≤–į—Ü–ł–ł) –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź—é—ā –ĺ–Ī—É—á–ł—ā—Ć –∑–ĺ–Ĺ–ī—č, –ļ–ĺ—ā–ĺ—Ä—č–Ķ –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ —É–Ľ—É—á—ą–į—é—ā –ļ–į–Ľ–ł–Ī—Ä–ĺ–≤–ļ—É –Ņ—Ä–Ķ–ī—Ā–ļ–į–∑–į–Ĺ–ł–Ļ. –ė—Ā—Ā–Ľ–Ķ–ī–ĺ–≤–į–Ĺ–ł–Ķ —ā–į–ļ–∂–Ķ –≤—č—Ź–≤–Ľ—Ź–Ķ—ā, —á—ā–ĺ —Ä–į—Ā—Ā—É–∂–ī–Ķ–Ĺ–ł—Ź –≤ –≤–ł–ī–Ķ —Ü–Ķ–Ņ–ĺ—á–ļ–ł –ľ—č—Ā–Ľ–Ķ–Ļ —á–į—Ā—ā–ĺ –Ĺ–Ķ –ĺ—ā—Ä–į–∂–į—é—ā —Ä–Ķ–į–Ľ—Ć–Ĺ—č–Ķ –Ņ—Ä–ł—á–ł–Ĺ—č –Ņ—Ä–ĺ–≥–Ĺ–ĺ–∑–į: —É–ī–į–Ľ–Ķ–Ĺ–ł–Ķ –≤–į–∂–Ĺ—č—Ö –ł—Ā—ā–ĺ—á–Ĺ–ł–ļ–ĺ–≤ –ł–Ĺ—Ą–ĺ—Ä–ľ–į—Ü–ł–ł –ł–∑ –Ņ—Ä–ĺ–ľ–Ņ—ā–į –ľ–Ķ–Ĺ—Ź–Ķ—ā –Ņ—Ä–Ķ–ī—Ā–ļ–į–∑–į–Ĺ–ł–Ķ, –Ĺ–ĺ —Ü–Ķ–Ņ–ĺ—á–ļ–į —Ä–į—Ā—Ā—É–∂–ī–Ķ–Ĺ–ł–Ļ –ĺ—Ā—ā–į—Ď—ā—Ā—Ź –Ĺ–Ķ–ł–∑–ľ–Ķ–Ĺ–Ĺ–ĺ–Ļ. –Ě–į–ļ–ĺ–Ĺ–Ķ—Ü, –į–≤—ā–ĺ—Ä—č –ĺ–Ī–Ĺ–į—Ä—É–∂–ł–≤–į—é—ā, —á—ā–ĺ –ĺ–ļ–ĺ–Ĺ—á–į—ā–Ķ–Ľ—Ć–Ĺ—č–Ļ –Ņ—Ä–ĺ–≥–Ĺ–ĺ–∑ –≤–ĺ –ľ–Ĺ–ĺ–≥–ĺ–ľ –ĺ–Ņ—Ä–Ķ–ī–Ķ–Ľ—Ź–Ķ—ā—Ā—Ź –ī–ĺ –Ĺ–į—á–į–Ľ–į –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł–ł —Ä–į—Ā—Ā—É–∂–ī–Ķ–Ĺ–ł–Ļ, —á—ā–ĺ –Ņ–ĺ–∑–≤–ĺ–Ľ—Ź–Ķ—ā –∑–Ĺ–į—á–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ —Ā—ć–ļ–ĺ–Ĺ–ĺ–ľ–ł—ā—Ć —ā–ĺ–ļ–Ķ–Ĺ—č –Ī–Ķ–∑ –Ņ–ĺ—ā–Ķ—Ä–ł –ļ–į—á–Ķ—Ā—ā–≤–į.'}, 'en': {'title': 'Enhancing Forecast Accuracy with Internal Representation Probes', 'desc': "This paper investigates the calibration and reasoning accuracy of large language models used for forecasting. It introduces representation-pooling probes that analyze internal activations, showing they improve calibration significantly compared to traditional methods. The study also reveals that the models' chain-of-thought reasoning may not accurately reflect the evidence behind their forecasts, as internal representations can better indicate behavioral changes. Additionally, the findings suggest that forecasts are often determined before reasoning starts, allowing for more efficient token generation without sacrificing accuracy."}, 'zh': {'title': 'śŹźŚćáŤĮ≠Ť®Äś®°ŚěčťĘĄśĶčŤÉĹŚäõÁöĄśĖįśĖĻś≥ē', 'desc': 'śú¨ŤģļśĖáśéĘŤģ®šļÜŚ§ßŚěčŤĮ≠Ť®Äś®°ŚěčŚú®ťĘĄśĶčšĽĽŚä°šł≠ÁöĄŤ°®ÁéįÔľĆŚį§ŚÖ∂śėĮŚģÉšĽ¨ÁöĄŚáÜÁ°ģśÄßŚíĆś†°ŚáÜśÄß„ÄāÁ†ĒÁ©∂ŚŹĎÁéįÔľĆťÄöŤŅáŤģ≠ÁĽÉŚÜÖťÉ®Ť°®Á§ļÁöĄśéĘśĶčŚô®ÔľĆŚŹĮšĽ•śėĺŤĎóśŹźťęėś®°ŚěčÁöĄś†°ŚáÜśēąśěúÔľĆŚĻ∂šłĒŤŅôÁßćśĖĻś≥ēŚú®šłćŚźĆś®°ŚěčšłäŚĚáśúČśēą„ÄāśąĎšĽ¨ŤŅėŚŹĎÁéįÔľĆś®°ŚěčÁöĄśé®ÁźÜŤŅáÁ®čŚŹĮŤÉĹŚĻ∂šłćśÄĽśėĮŚŹćśė†ťĘĄśĶčŤÉĆŚźéÁöĄŤĮĀśćģÔľĆŚÜÖťÉ®Ť°®Á§ļŚŹĮšĽ•śõīŚ•ĹŚúįśŹ≠Á§ļś®°ŚěčÁöĄŤ°ĆšłļŚŹėŚĆĖ„ÄāśúÄŚźéÔľĆÁ†ĒÁ©∂Ť°®śėéÔľĆś®°ŚěčÁöĄťĘĄśĶčŚú®śé®ÁźÜŚľÄŚßčšĻčŚČćŚįĪŚ∑≤Śüļśú¨Á°ģŚģöÔľĆŤŅôšłļśŹźťęėŤĮ≠Ť®Äś®°ŚěčÁöĄťĘĄśĶčŤÉĹŚäõśŹźšĺõšļÜśĖįÁöĄśÄĚŤ∑Į„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.11079', 'title': 'Are LLMs Ready for Scientific Discovery? A Capability-Oriented Benchmark for AI Scientists', 'url': 'https://huggingface.co/papers/2607.11079', 'abstract': 'Abstract  Existing benchmarks for scientific data analysis evaluate LLMs primarily on code execution or workflow completion, overlooking that scientific analysis serves to support distinct types of scientific claims: hypothesis exploration, statistical inference, mechanistic explanation, each with different assumptions and validity criteria. We introduce SDABench, a benchmark that reorganizes evaluation around six capabilities (descriptive, exploratory, inferential, predictive, causal, and mechanistic) across five domains (Biology, Chemistry, Environment, Geography, Physics). SDABench comprises 527 real-data instances (SDA-Real) and 6000 synthetic instances (SDA-Synth), each in both multiple-choice and open-ended formats, constructed through an automated pipeline. Evaluating 15 representative LLMs, we find that models handle descriptive analysis well but degrade sharply on tasks requiring assumption selection, latent-process modeling, or mechanistic reasoning. SDABench further provides a five-stage error analysis framework that locates where LLMs fail: more advanced models more reliably identify the relevant scope and variables, but still struggle to select appropriate analytical procedures, model variable relationships, and draw valid conclusions.', 'score': 2, 'issue_id': 2666, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 –ł—é–Ľ—Ź', 'en': 'July 13', 'zh': '7śúą13śó•'}, 'hash': '6be85ecee3f198a0', 'authors': ['Chuhan Shi', 'Xiaoquan Ren', 'Sicheng Song', 'Haobo Li', 'Rui Sheng', 'Yushi Sun'], 'affiliations': ['East China Normal University', 'Hong Kong University of Science and Technology', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2607.11079.jpg', 'data': {'categories': ['#science', '#synthetic'], 'emoji': 'ūüĒ¨', 'ru': {'title': '–ě—Ü–Ķ–Ĺ–ļ–į –Ĺ–į—É—á–Ĺ–ĺ–≥–ĺ –ľ—č—ą–Ľ–Ķ–Ĺ–ł—Ź LLM: –ĺ—ā –ĺ–Ņ–ł—Ā–į–Ĺ–ł—Ź –ļ –ľ–Ķ—Ö–į–Ĺ–ł—Ā—ā–ł—á–Ķ—Ā–ļ–ĺ–ľ—É –ĺ–Ī—ä—Ź—Ā–Ĺ–Ķ–Ĺ–ł—é', 'desc': '–ź–≤—ā–ĺ—Ä—č –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ—Ź—é—ā SDABench ‚ÄĒ –Ĺ–ĺ–≤—č–Ļ –Ī–Ķ–Ĺ—á–ľ–į—Ä–ļ –ī–Ľ—Ź –ĺ—Ü–Ķ–Ĺ–ļ–ł LLM –≤ –Ĺ–į—É—á–Ĺ–ĺ–ľ –į–Ĺ–į–Ľ–ł–∑–Ķ –ī–į–Ĺ–Ĺ—č—Ö, –ļ–ĺ—ā–ĺ—Ä—č–Ļ –ļ–Ľ–į—Ā—Ā–ł—Ą–ł—Ü–ł—Ä—É–Ķ—ā –∑–į–ī–į—á–ł –Ĺ–Ķ –Ņ—Ä–ĺ—Ā—ā–ĺ –Ņ–ĺ –≤—č–Ņ–ĺ–Ľ–Ĺ–Ķ–Ĺ–ł—é –ļ–ĺ–ī–į, –į –Ņ–ĺ —ā–ł–Ņ–į–ľ –Ĺ–į—É—á–Ĺ—č—Ö —É—ā–≤–Ķ—Ä–∂–ī–Ķ–Ĺ–ł–Ļ: –ĺ–Ņ–ł—Ā–į—ā–Ķ–Ľ—Ć–Ĺ—č–Ļ –į–Ĺ–į–Ľ–ł–∑, –ł—Ā—Ā–Ľ–Ķ–ī–ĺ–≤–į—ā–Ķ–Ľ—Ć—Ā–ļ–ł–Ļ –į–Ĺ–į–Ľ–ł–∑, —Ā—ā–į—ā–ł—Ā—ā–ł—á–Ķ—Ā–ļ–ł–Ļ –≤—č–≤–ĺ–ī, –Ņ—Ä–Ķ–ī—Ā–ļ–į–∑–į–Ĺ–ł–Ķ, –Ņ—Ä–ł—á–ł–Ĺ–Ĺ–ĺ-—Ā–Ľ–Ķ–ī—Ā—ā–≤–Ķ–Ĺ–Ĺ—č–Ļ –ł –ľ–Ķ—Ö–į–Ĺ–ł—Ā—ā–ł—á–Ķ—Ā–ļ–ł–Ļ –į–Ĺ–į–Ľ–ł–∑. –Ď–Ķ–Ĺ—á–ľ–į—Ä–ļ —Ā–ĺ–ī–Ķ—Ä–∂–ł—ā 527 —Ä–Ķ–į–Ľ—Ć–Ĺ—č—Ö —ć–ļ–∑–Ķ–ľ–Ņ–Ľ—Ź—Ä–ĺ–≤ –ł 6000 —Ā–ł–Ĺ—ā–Ķ—ā–ł—á–Ķ—Ā–ļ–ł—Ö –Ņ—Ä–ł–ľ–Ķ—Ä–ĺ–≤ —Ā —Ä–Ķ–į–Ľ—Ć–Ĺ—č–ľ–ł –ī–į–Ĺ–Ĺ—č–ľ–ł, –ĺ—Ö–≤–į—ā—č–≤–į—é—Č–ł—Ö –Ņ—Ź—ā—Ć –Ĺ–į—É—á–Ĺ—č—Ö –ĺ–Ī–Ľ–į—Ā—ā–Ķ–Ļ. –ě—Ü–Ķ–Ĺ–ļ–į 15 LLM –Ņ–ĺ–ļ–į–∑–į–Ľ–į, —á—ā–ĺ –ľ–ĺ–ī–Ķ–Ľ–ł —Ö–ĺ—Ä–ĺ—ą–ĺ —Ā–Ņ—Ä–į–≤–Ľ—Ź—é—ā—Ā—Ź —Ā –ĺ–Ņ–ł—Ā–į—ā–Ķ–Ľ—Ć–Ĺ—č–ľ–ł –∑–į–ī–į—á–į–ľ–ł, –Ĺ–ĺ —Ä–Ķ–∑–ļ–ĺ —ā–Ķ—Ä—Ź—é—ā –Ņ—Ä–ĺ–ł–∑–≤–ĺ–ī–ł—ā–Ķ–Ľ—Ć–Ĺ–ĺ—Ā—ā—Ć –Ņ—Ä–ł –≤—č–Ī–ĺ—Ä–Ķ –Ņ—Ä–Ķ–ī–Ņ–ĺ–Ľ–ĺ–∂–Ķ–Ĺ–ł–Ļ, –ľ–ĺ–ī–Ķ–Ľ–ł—Ä–ĺ–≤–į–Ĺ–ł–ł —Ā–ļ—Ä—č—ā—č—Ö –Ņ—Ä–ĺ—Ü–Ķ—Ā—Ā–ĺ–≤ –ł –ľ–Ķ—Ö–į–Ĺ–ł—Ā—ā–ł—á–Ķ—Ā–ļ–ĺ–ľ —Ä–į—Ā—Ā—É–∂–ī–Ķ–Ĺ–ł–ł. –ź–≤—ā–ĺ—Ä—č —Ä–į–∑—Ä–į–Ī–ĺ—ā–į–Ľ–ł –Ņ—Ź—ā–ł—É—Ä–ĺ–≤–Ĺ–Ķ–≤—É—é —Ā—Ö–Ķ–ľ—É –į–Ĺ–į–Ľ–ł–∑–į –ĺ—ą–ł–Ī–ĺ–ļ, –ļ–ĺ—ā–ĺ—Ä–į—Ź –≤—č—Ź–≤–Ľ—Ź–Ķ—ā, —á—ā–ĺ –Ņ—Ä–ĺ–ī–≤–ł–Ĺ—É—ā—č–Ķ –ľ–ĺ–ī–Ķ–Ľ–ł –Ľ—É—á—ą–Ķ –ĺ–Ņ—Ä–Ķ–ī–Ķ–Ľ—Ź—é—ā –Ņ–Ķ—Ä–Ķ–ľ–Ķ–Ĺ–Ĺ—č–Ķ, –Ĺ–ĺ –ł—Ā–Ņ—č—ā—č–≤–į—é—ā —ā—Ä—É–ī–Ĺ–ĺ—Ā—ā–ł —Ā –≤—č–Ī–ĺ—Ä–ĺ–ľ –į–Ĺ–į–Ľ–ł—ā–ł—á–Ķ—Ā–ļ–ł—Ö –ľ–Ķ—ā–ĺ–ī–ĺ–≤ –ł –ĺ–Ī–ĺ—Ā–Ĺ–ĺ–≤–į–Ĺ–ł–Ķ–ľ –≤—č–≤–ĺ–ī–ĺ–≤.'}, 'en': {'title': 'SDABench: A New Standard for Evaluating Scientific Data Analysis in LLMs', 'desc': 'This paper presents SDABench, a new benchmark designed to evaluate large language models (LLMs) on their ability to perform scientific data analysis. Unlike existing benchmarks that focus mainly on code execution, SDABench assesses six key capabilities: descriptive, exploratory, inferential, predictive, causal, and mechanistic analysis across various scientific domains. The benchmark includes both real and synthetic data instances, allowing for a comprehensive evaluation of LLM performance. Results show that while LLMs excel in descriptive tasks, they struggle with more complex analyses that require deeper understanding of assumptions and relationships between variables.'}, 'zh': {'title': 'ÁßĎŚ≠¶śēįśćģŚąÜśěźÁöĄśĖįŚüļŚáÜÔľöSDABench', 'desc': 'ÁéįśúČÁöĄÁßĎŚ≠¶śēįśćģŚąÜśěźŚüļŚáÜšłĽŤ¶ĀŤĮĄšľįŚ§ßŚěčŤĮ≠Ť®Äś®°ŚěčÔľąLLMsÔľČŚú®šĽ£Á†ĀśČßŤ°ĆśąĖŚ∑•šĹúśĶĀÁ®čŚģĆśąźśĖĻťĚĘÁöĄŤ°®ÁéįÔľĆšĹÜŚŅĹŤßÜšļÜÁßĎŚ≠¶ŚąÜśěźśĒĮśĆĀšłćŚźĆÁĪĽŚěčÁßĎŚ≠¶šłĽŚľ†ÁöĄŚäüŤÉĹ„ÄāśąĎšĽ¨śŹźŚáļšļÜSDABenchÔľĆšłÄšł™ŚõīÁĽēŚÖ≠ÁßćŤÉĹŚäõÔľąśŹŹŤŅįśÄß„ÄĀśéĘÁīĘśÄß„ÄĀśé®śĖ≠śÄß„ÄĀťĘĄśĶčśÄß„ÄĀŚõ†śěúśÄßŚíĆśúļŚą∂śÄßÔľČťáćśĖįÁĽĄÁĽáŤĮĄšľįÁöĄŚüļŚáÜÔľĆś∂ĶÁõĖšļĒšł™ťĘÜŚüüÔľąÁĒüÁČ©Ś≠¶„ÄĀŚĆĖŚ≠¶„ÄĀÁéĮŚĘÉ„ÄĀŚúįÁźÜŚíĆÁČ©ÁźÜÔľČ„ÄāSDABenchŚĆÖŚźę527šł™ÁúüŚģěśēįśćģŚģěšĺčŚíĆ6000šł™ŚźąśąźŚģěšĺčÔľĆťááÁĒ®Ťá™Śä®ŚĆĖśĶĀÁ®čśěĄŚĽļÔľĆśŹźšĺõŚ§öť°ĻťÄČśč©ŚíĆŚľÄśĒĺŚľŹś†ľŚľŹ„ÄāŤĮĄšľį15šł™šĽ£Ť°®śÄßLLMsŚźéŚŹĎÁéįÔľĆś®°ŚěčŚú®śŹŹŤŅįśÄßŚąÜśěźšłäŤ°®ÁéįŤČĮŚ•ĹÔľĆšĹÜŚú®ťúÄŤ¶ĀťÄČśč©ŚĀáŤģĺ„ÄĀśĹúŚú®ŤŅáÁ®čŚĽļś®°śąĖśúļŚą∂śé®ÁźÜÁöĄšĽĽŚä°šłäŤ°®ÁéįśÄ•ŚČßšłčťôć„Äā'}}}, {'id': 'https://huggingface.co/papers/2607.11594', 'title': 'MAGIC: Transition-Aware Generation of Navigable Multi-Scene Game Worlds with Large Language Models', 'url': 'https://huggingface.co/papers/2607.11594', 'abstract': 'Abstract  Multi-scene navigation (clearing an objective in one bounded space and then crossing a portal into the next) is a defining feature of contemporary 3D games, but authoring it is laborious: every portal must have consistent endpoints on both sides, each interior must remain navigable once it is furnished, and the resulting connectivity must be kept consistent across many files. Recent large language model (LLM) and multimodal LLM (MLLM) scene generators have made single-interior synthesis dramatically cheaper, yet they produce one scene at a time and cannot, by naive repetition, yield a connected multi-scene world. We identify three obstacles that single-scene methods leave unsolved: cross-scene consistency, in-scene navigability, and the evaluation of whether a transition actually works. We present MAGIC, a prompt-to-project system that addresses all three. MAGIC is a four-stage pipeline that turns a single natural-language prompt into a runnable multi-scene game project: it plans a shared transition-aware intermediate representation, specifies each scene while enforcing portal reachability with a flood-fill validator, generates the scenes together with their transition scripts, and combines them into one project. Because existing single-scene fidelity metrics never execute a transition, we further introduce a transition-focused evaluation agent that runs each transition in play. On a new benchmark of 100 multi-scene cases, MAGIC produces an executable project for every case and reaches 0.99 precision, 0.95 recall, and 0.96 F1 on end-to-end transition identification; stage by stage, it recovers more ground-truth portals and yields markedly more navigable layouts than an LLM baseline and Holodeck. Our code is available at https://github.com/sereneee1201/MAGIC/.', 'score': 1, 'issue_id': 2666, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 –ł—é–Ľ—Ź', 'en': 'July 13', 'zh': '7śúą13śó•'}, 'hash': '3d5813939f5af7c4', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#open_source', '#games', '#dataset', '#3d', '#benchmark', '#agents', '#multimodal'], 'emoji': 'ūüéģ', 'ru': {'title': '–ě—ā —ā–Ķ–ļ—Ā—ā–į –ļ –ł–≥—Ä–ĺ–≤–ĺ–ľ—É –ľ–ł—Ä—É: –≥–Ķ–Ĺ–Ķ—Ä–į—Ü–ł—Ź –ľ–Ĺ–ĺ–≥–ĺ—Ā—Ü–Ķ–Ĺ—č –ł–≥—Ä —Ā –≥–į—Ä–į–Ĺ—ā–ł—Ä–ĺ–≤–į–Ĺ–Ĺ—č–ľ–ł –Ņ–Ķ—Ä–Ķ—Ö–ĺ–ī–į–ľ–ł', 'desc': '–í —Ā—ā–į—ā—Ć–Ķ –Ņ—Ä–Ķ–ī—Ā—ā–į–≤–Ľ—Ź–Ķ—ā—Ā—Ź MAGIC ‚ÄĒ —Ā–ł—Ā—ā–Ķ–ľ–į, –ļ–ĺ—ā–ĺ—Ä–į—Ź –Ņ—Ä–Ķ–≤—Ä–į—Č–į–Ķ—ā —ā–Ķ–ļ—Ā—ā–ĺ–≤–ĺ–Ķ –ĺ–Ņ–ł—         }

            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;

            sortDropdown.value = settingSortBy;

        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

            const categories = ['#3d (1)', '#agents (6)', '#agi', '#alignment', '#architecture (1)', '#audio', '#benchmark (9)', '#cv (6)', '#data', '#dataset (5)', '#diffusion', '#ethics', '#games (2)', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability (2)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (9)', '#open_source (2)', '#optimization (2)', '#plp (2)', '#rag', '#reasoning (1)', '#rl (1)', '#rlhf (2)', '#robotics', '#science (2)', '#security', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (3)', '#training (4)', '#transfer_learning', '#video'];

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));

            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {

            } else {

            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));

            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });

            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {

                    ? articlesData

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
