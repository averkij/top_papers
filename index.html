nce image regions during their thought process. The authors develop a scalable synthesis pipeline to train this method, which includes grounding visual objects and providing supervision based on their locations. The results demonstrate that incorporating visually grounded thinking significantly improves performance on various reasoning tasks, showing that models perform better when their reasoning is directly connected to visual evidence.'}, 'zh': {'title': '视觉基础思维：让推理更有依据', 'desc': '这篇论文介绍了一种称为视觉基础思维的新方法，它将自然语言推理与明确的视觉证据结合在一起。通过在推理过程中将语言思维与图像中的关键对象进行关联，模型能够更清晰地表达中间推理过程。为了训练这种能力，研究者们构建了一个可扩展的合成管道，提取所需的视觉对象并进行标注。实验结果表明，视觉基础思维显著提高了模型在计数和空间推理任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.20529', 'title': 'LedgerAgent: Structured State for Policy-Adherent Tool-Calling Agents', 'url': 'https://huggingface.co/papers/2606.20529', 'abstract': 'Abstract LEDGERAGENT is a method for customer service agents that maintains task states in a separate ledger to improve policy adherence and state management during tool calling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Policy-adherent tool-calling agents in customer-service domains must maintain task states across turns while calling tools and obeying domain policies. Task states consist of relevant facts, identifiers, constraints, and conditions observed through user interaction and tool calls. In standard agents, task states are not represented separately. Observations, tool returns, and policy instructions are placed in the prompt, leaving agents to reconstruct the relevant states from the prompt each time they decide what to do next. This design makes state management implicit, creating two common failure modes. An agent may retrieve the right facts but later ground its decision in stale, missing, or incorrect information; and a syntactically valid tool call may still violate a domain policy that depends on the current task state. We introduce LedgerAgent, an inference-time method for tool-calling agents that maintains observed task states in a separate ledger and renders the states into the prompt. The ledger is also used to check state-dependent policy constraints before environment-changing tool calls are executed, blocking policy violations. Across four customer-service domains and a mixed panel of open- and closed-weight models, LedgerAgent improves average passk over a standard prompt-based tool-calling approach, with the largest gains under stricter multi-trial consistency metrics.', 'score': 6, 'issue_id': 2462, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '54ab4e69021a1ffc', 'authors': ['Md Nayem Uddin', 'Amir Saeidi', 'Eduardo Blanco', 'Chitta Baral'], 'affiliations': ['Arizona State University', 'University of Arizona'], 'pdf_title_img': 'assets/pdf/title_img/2606.20529.jpg', 'data': {'categories': [], 'emoji': '📋', 'ru': {'title': 'Явное управление состоянием для соблюдения политик в агентах tool-calling', 'desc': 'LedgerAgent — это метод для агентов обслуживания клиентов, который отделяет управление состоянием задачи в отдельный реестр, чтобы улучшить соблюдение политик и управление состоянием при вызове инструментов. В стандартных агентах состояния задач неявно содержатся в контексте, что приводит к ошибкам при реконструкции информации и нарушениям политик, зависящих от текущего состояния. Предложенный метод явно ведёт реестр наблюдаемых состояний и использует его для проверки ограничений политик перед выполнением инструментов. Экспериментальная оценка на четырёх доменах обслуживания клиентов показывает улучшение метрик с особенно значительными результатами при строгих критериях согласованности.'}, 'en': {'title': 'Enhancing Customer Service Agents with Ledger-Based State Management', 'desc': 'LEDGERAGENT is a novel approach designed for customer service agents that enhances their ability to manage task states effectively. By maintaining a separate ledger for task states, it ensures that agents can adhere to policies and manage information accurately during tool calls. This method addresses common issues in standard agents, where task states are not explicitly represented, leading to potential errors in decision-making. The results show that LEDGERAGENT significantly improves performance across various customer service scenarios, particularly in maintaining consistency and compliance with domain policies.'}, 'zh': {'title': 'LEDGERAGENT：提升客户服务代理的任务状态管理', 'desc': 'LEDGERAGENT是一种用于客户服务代理的方法，它通过在单独的账本中维护任务状态来提高政策遵循性和状态管理。任务状态包括通过用户交互和工具调用观察到的相关事实、标识符、约束和条件。传统代理没有单独表示任务状态，而是将观察结果、工具返回和政策指令放在提示中，导致状态管理隐式化。LEDGERAGENT通过在推理时维护观察到的任务状态，并在执行工具调用前检查状态依赖的政策约束，从而有效阻止政策违规。'}}}, {'id': 'https://huggingface.co/papers/2606.20381', 'title': 'Rethinking Shrinkage Bias in LLM FP4 Pretraining: Geometric Origin, Systemic Impact, and UFP4 Recipe', 'url': 'https://huggingface.co/papers/2606.20381', 'abstract': 'Abstract Uniform 4-bit training with RHT-based quantization outperforms E2M1-based methods by eliminating shrinkage bias and improving training stability across large language model architectures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct FP4 training promises substantial reductions in memory and computation cost for LLM pretraining, yet current FP4 hardware paths and recipes, including NVIDIA Blackwell/Rubin-class systems and AMD MI350-series GPUs, remain centered on E2M1 data elements. In this study, we identify a fundamental limitation of that choice: non-uniform formats such as E2M1 inherently suffer from Shrinkage Bias, a systematic negative rounding error caused by the geometric asymmetry of their representable bins. We show that this bias accumulates multiplicatively across layers and is amplified by the Random Hadamard Transform (RHT), providing a unified explanation for the training instability observed in existing E2M1-based FP4 recipes. In contrast, uniform grids (E1M2/INT4) bypass this grid-geometry error and better convert the improved bucket utilization from RHT into higher quantization quality. Based on this finding, we propose UFP4, a uniform 4-bit training recipe that applies RHT to all three training GEMMs while restricting stochastic rounding to dY alone. On Dense 1.5B, MoE 7.9B, and MoE 124B long-run pretraining, UFP4 consistently achieves lower BF16-relative loss degradation than strong E2M1-based baselines, supported by scaling-law analysis and ablation studies. Our results suggest that future accelerators should support E1M2/INT4-style uniform 4-bit grids as first-class training primitives alongside E2M1.', 'score': 6, 'issue_id': 2459, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '9a2f299a0cb3e10d', 'authors': ['Qian Zhao', 'Kunlong Chen', 'Changxin Tian', 'Zhonghui Jiang', 'Haitao Zhang', 'Chaofan Yu', 'Peijie Jiang', 'Mingliang Gong', 'Jia Liu', 'Ziqi Liu', 'Zhiqiang Zhang', 'Jun Zhou'], 'affiliations': ['Ling Team, Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.20381.jpg', 'data': {'categories': ['#optimization', '#small_models', '#inference', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Равномерная 4-битная квантизация вместо асимметричных форматов для стабильного обучения LLM', 'desc': 'В этой работе авторы предлагают UFP4 — новый метод обучения больших языковых моделей с использованием 4-битной арифметики. Они выявили фундаментальное ограничение популярного формата E2M1: его неравномерная сетка представления чисел вызывает систематическую ошибку квантизации, которая накапливается при обучении. Исследователи показали, что равномерные форматы (E1M2/INT4) лучше работают с преобразованием Адамара и обеспечивают стабильное обучение сетей различных размеров. Экспериментальные результаты на моделях от 1.5B до 124B параметров демонстрируют превосходство предложенного подхода над существующими методами E2M1-квантизации.'}, 'en': {'title': 'UFP4: Revolutionizing 4-bit Training for Stable Language Models', 'desc': 'This paper introduces a new training method called UFP4 that uses uniform 4-bit quantization to improve the training of large language models (LLMs). It highlights the limitations of existing E2M1-based methods, which suffer from shrinkage bias and instability during training due to their non-uniform data representation. By employing Random Hadamard Transform (RHT) with uniform grids, UFP4 enhances quantization quality and reduces memory and computation costs. The results show that UFP4 outperforms traditional methods, suggesting a shift towards uniform quantization formats in future hardware designs.'}, 'zh': {'title': '均匀4位训练：提升大语言模型的稳定性与效率', 'desc': '本文提出了一种新的均匀4位训练方法UFP4，利用随机哈达玛变换（RHT）来提高大语言模型的训练稳定性。与传统的E2M1方法相比，UFP4消除了收缩偏差，减少了训练过程中的系统性负误差。研究表明，非均匀格式如E2M1在多层网络中会累积偏差，导致训练不稳定，而均匀格式（如E1M2/INT4）则能更好地利用RHT的优势。通过在多个模型上进行长时间预训练，UFP4在相对损失降幅上优于E2M1基线，表明未来的加速器应优先支持均匀4位训练。'}}}, {'id': 'https://huggingface.co/papers/2606.20521', 'title': 'HumanScale: Egocentric Human Video Can Outperform Real-Robot Data for Embodied Pretraining', 'url': 'https://huggingface.co/papers/2606.20521', 'abstract': 'Abstract Egocentric human video can effectively replace teleoperated robot trajectories for embodied model pretraining, achieving better performance with reduced data collection costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied foundation models are expected to benefit from data scaling like large language models, but face a much tighter data bottleneck. Teleoperated real-robot trajectories remain the dominant pretraining source due to their precise action supervision and embodiment alignment, yet their scalability is limited by high collection cost, acquisition difficulty, and low behavioral and environmental diversity. These limitations have sparked interest in egocentric human video as a scalable, substantially lower-cost, and more diverse alternative for embodied model pretraining. However, its effectiveness compared to teleoperated real-robot data remains underexplored. To address this question, we conduct a systematic study comparing egocentric human video and teleoperated real-robot trajectories as pretraining data sources for embodied foundation models, under fixed post-training and validation protocols. Surprisingly, we find that egocentric data, when processed through a carefully designed filtering and labeling pipeline, is not merely a viable substitute for model pretraining but can lead to superior performance. With the same amount of pretraining data, models pretrained on egocentric data achieve a 24% lower validation loss on real-robot action prediction, as well as 52.5% and 90% higher success rates on in-distribution and out-of-distribution real-robot task execution, respectively. This finding verifies a scalable paradigm for embodied foundation models: pretrain on egocentric human video to learn diverse world representations, then adapt with a small amount of labeled real-robot data for action-space alignment. We hope this study encourages broader exploration of egocentric data and offers guidance for data quality assessment before costly robot data collection.', 'score': 6, 'issue_id': 2458, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'bc43e0ba47791978', 'authors': ['Juncheng Ma', 'Jianxin Bi', 'Yufan Deng', 'Xuanran Zhai', 'Kewei Zhang', 'Ye Huang', 'Bo Liang', 'Shukai Gong', 'Jiankai Tu', 'Xiaotian Tang', 'Jiaxin Li', 'Kaiqi Chen', 'Duomin Wang', 'Yuqi Wang', 'Bingyi Kang', 'Eric Huang', 'Zhiyang Dou', 'Zhen Dong', 'Enze Xie', 'Wojciech Matusik', 'Tat-Seng Chua', 'Daquan Zhou'], 'affiliations': ['MIT', 'NUS', 'NVIDIA', 'PKU', 'UCSB'], 'pdf_title_img': 'assets/pdf/title_img/2606.20521.jpg', 'data': {'categories': ['#training', '#data', '#robotics', '#synthetic', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'От глаз человека к рукам робота: эгоцентрические видео как универсальный источник для обучения воплощённых моделей', 'desc': 'Исследование показывает, что эгоцентрические видео человека могут эффективно заменить телеоперируемые траектории робота при предварительном обучении воплощённых моделей фундамента. Авторы систематически сравнивают эти два источника данных и обнаруживают, что эгоцентрические данные при правильной фильтрации и разметке не только являются жизнеспособной альтернативой, но и превосходят робототехнические данные по производительности. Модели, предварительно обученные на эгоцентрических видео, достигают на 24% меньшей ошибки валидации при предсказании действий робота и на 52.5% и 90% выше успешности при выполнении задач в распределении и вне его соответственно. Предложенный подход — предварительное обучение на разнообразных эгоцентрических видео с последующей адаптацией на небольшом объёме размеченных робототехнических данных — открывает масштабируемую парадигму для развития воплощённых моделей фундамента.'}, 'en': {'title': 'Unlocking the Power of Egocentric Video for Robot Learning', 'desc': 'This paper explores the use of egocentric human video as a pretraining source for embodied foundation models, which traditionally rely on teleoperated robot trajectories. The authors find that egocentric video can outperform teleoperated data in model performance while being more cost-effective and diverse. By implementing a filtering and labeling pipeline, they demonstrate that models pretrained on egocentric data achieve significantly lower validation loss and higher success rates in real-robot tasks. This research suggests a new paradigm for training embodied models, emphasizing the potential of egocentric data to enhance learning and reduce reliance on expensive robot data collection.'}, 'zh': {'title': '自我中心视频：机器人模型预训练的新选择', 'desc': '本研究探讨了以自我中心的人类视频作为机器人模型预训练的数据来源。研究发现，经过精心设计的过滤和标记流程后，自我中心数据不仅可以替代传统的遥控机器人轨迹，还能显著提高模型性能。使用相同数量的预训练数据，自我中心数据的模型在真实机器人动作预测中验证损失降低了24%，并在任务执行成功率上分别提高了52.5%和90%。这表明自我中心视频为机器人模型提供了一种可扩展的预训练范式，能够学习多样的世界表示。'}}}, {'id': 'https://huggingface.co/papers/2606.19334', 'title': 'Freeing the Law with LOCUS: A Local Ordinance Corpus for the United States', 'url': 'https://huggingface.co/papers/2606.19334', 'abstract': 'Abstract A comprehensive corpus and access layer for U.S. local ordinance codes has been developed to enable machine-readable legal AI research, addressing the lack of authoritative legal text at scale for local regulations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Progress in legal AI increasingly depends on access to authoritative legal text at scale. Yet one of the most consequential layers of American law remains largely absent from existing machine-readable corpora: local ordinances. Local codes govern zoning, housing, business licensing, public health, noise, animal control, and many other domains of everyday regulation, but they are fragmented across vendor platforms designed for human browsing rather than bulk research access. We introduce LOCUS - the Local Ordinance Corpus for the United States - a comprehensive corpus and county-harmonized access layer for U.S. municipal and county ordinance codes. The raw corpus, available for release to researchers, represents nearly all publicly available municipal and county ordinance codes. The resulting raw corpus contains codes from 9,239 cities and counties. A smaller county-harmonized LOCUS access layer provides coverage for the largest 2,309 of 3,144 U.S. counties, accounting for a majority of the population. We use OCR to handle the myriad of document formats that have kept the law from being a public resource. We release the corpus with coverage metadata to support reproducibility, downstream legal AI research, and the incremental expansion of machine-readable access to local law. We train a collection of ModernBERT-based classifiers and scorers to facilitate analyzing U.S. local law among several dimensions, such as opacity and paternalism, that have not previously been studied at this scale. LOCUS-v1 and its derivative models are available at: https://huggingface.co/datasets/LocalLaws/LOCUS-v1', 'score': 6, 'issue_id': 2460, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'e262b693083d57b0', 'authors': ['Denis Peskoff', 'Joe Barrow', 'Christopher Vu', 'Diag Davenport'], 'affiliations': ['Independent', 'School of Information', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.19334.jpg', 'data': {'categories': ['#open_source', '#science'], 'emoji': '⚖️', 'ru': {'title': 'Машиночитаемый архив американского местного права для исследований в legal AI', 'desc': 'Авторы представляют LOCUS — комплексный корпус местных нормативно-правовых актов США, полученный путём применения OCR-технологий к разнообразным форматам документов. Этот датасет содержит кодексы из 9239 муниципалитетов и округов, обеспечивая машиночитаемый доступ к правовым текстам, которые раньше были недоступны для массового анализа. На основе ModernBERT авторы обучили классификаторы для анализа местного законодательства по различным критериям, включая сложность и патернализм. Создание этого ресурса открывает новые возможности для исследований в области legal AI и повышает доступность правовой информации.'}, 'en': {'title': 'Unlocking Local Law: The LOCUS Corpus for AI Research', 'desc': 'This paper presents LOCUS, a comprehensive corpus of U.S. local ordinance codes designed for machine-readable legal AI research. It addresses the challenge of fragmented access to local regulations, which are crucial for various aspects of daily life, such as zoning and public health. The corpus includes nearly all publicly available municipal and county codes from over 9,200 jurisdictions, with a harmonized access layer for the largest counties. Additionally, the authors employ OCR technology to convert diverse document formats into a usable resource, facilitating advanced analysis of local laws using ModernBERT-based classifiers.'}, 'zh': {'title': '构建机器可读的地方法规语料库', 'desc': '本文介绍了一个名为LOCUS的本地法规语料库，旨在为美国地方条例提供机器可读的法律文本。这一语料库解决了地方法规缺乏权威性法律文本的问题，涵盖了9239个城市和县的条例。通过光学字符识别（OCR）技术，LOCUS能够处理多种文档格式，使法律资源更加公开可用。研究人员可以利用这一语料库进行法律AI研究，分析地方法律的不同维度。'}}}, {'id': 'https://huggingface.co/papers/2606.16817', 'title': 'Understanding the Behaviors of Environment-aware Information Retrieval', 'url': 'https://huggingface.co/papers/2606.16817', 'abstract': 'Abstract Large language models can be trained via reinforcement learning to adapt query formulation strategies for different retrievers, with distinct optimal query styles and improved performance through retriever-specific guidance and model scaling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent retrieval-augmented generation (RAG) approaches have demonstrated strong capability in handling complex queries, yet current research overlooks a critical challenge: different retrievers require fundamentally different query formulation strategies for optimal performance. In this work, we present the first systematic analysis of how LLMs can learn to adapt their query formulation strategies for different retrievers via reinforcement learning (RL). Our empirical study reveals that RL effectively teaches an LLM to tailor its queries to specific retriever characteristics. We discover that different retrievers exhibit surprisingly distinct optimal query styles (e.g., descriptive vs. question-like), suggesting strategies learned for one retriever ineffective for another. We further show that performance can be enhanced by incorporating retriever-specific human guidance and by scaling model size. To facilitate learning over multi-retrieval-step trajectories, we introduce a branching-based rollout technique that improves training stability. Our work provides the first empirical evidence and actionable insights for building truly retriever-aware RAG systems. Code and resources are available at https://github.com/LCO-Embedding/Envs-aware-Information-Retrieval.', 'score': 6, 'issue_id': 2457, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '74ebd70fc3caf786', 'authors': ['Ruifeng Yuan', 'Chaohao Yuan', 'David Dai', 'Yu Rong', 'Hong Cheng', 'Hou Pong Chan', 'Chenghao Xiao'], 'affiliations': ['Alibaba DAMO Academy', 'Chinese University of Hong Kong', 'Fudan University', 'Shanghai University of Finance and Economics', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16817.jpg', 'data': {'categories': ['#rag', '#rl', '#training'], 'emoji': '🎯', 'ru': {'title': 'Адаптивная формулировка запросов: обучение LLM для разных поисковых систем', 'desc': "В этой работе исследуется, как большие языковые модели могут обучаться адаптировать стратегии формулирования запросов для разных поисковых систем с помощью обучения с подкреплением. Авторы показали, что разные retriever'ы требуют принципиально различные стили запросов для оптимальной производительности, например описательные или вопросительные форматы. Предложена техника ветвящегося rollout'а, которая улучшает стабильность обучения при работе с многошаговыми траекториями поиска. Исследование демонстрирует, что добавление специфической для retriever'а информации от человека и увеличение размера модели значительно повышают качество retrieval-augmented generation систем."}, 'en': {'title': 'Adapting Queries for Optimal Retrieval Performance', 'desc': 'This paper explores how large language models (LLMs) can be trained using reinforcement learning (RL) to adapt their query formulation strategies for different information retrievers. It highlights that various retrievers have unique optimal query styles, which means a query that works well for one retriever may not be effective for another. The authors demonstrate that RL can effectively teach LLMs to customize their queries based on the characteristics of specific retrievers, leading to improved performance. Additionally, they introduce a new technique to enhance training stability and provide insights for developing more effective retrieval-augmented generation systems.'}, 'zh': {'title': '通过强化学习优化查询策略，提升检索性能', 'desc': '本研究探讨了如何通过强化学习（RL）训练大型语言模型（LLM），使其能够为不同的检索器调整查询策略。我们发现，不同的检索器需要不同的查询形式，以达到最佳性能。通过实证研究，我们证明了RL能够有效地教会LLM根据特定检索器的特征定制查询。此外，我们还提出了一种基于分支的回滚技术，以提高训练的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2606.20083', 'title': 'Holo-World: Unified Camera, Object and Weather Control for Video World Model', 'url': 'https://huggingface.co/papers/2606.20083', 'abstract': 'Abstract A unified controllable video world model generates videos from a single image while preserving scene structure and transferring to target weather states through specialized parameterization and conditioning techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video world models are moving toward preserving an observed world under controllable camera and object motion while allowing its environmental state to change. Yet these controls remain isolated, and weather generation typically relies on a source video or reconstructed scene that already specifies future structure. We study a first-frame-anchored source-to-state setting, where the model starts from a single image and follows explicit camera and object controls and an optional weather instruction, then generates a video that either preserves the source world or transfers it to a target weather state. To address these challenges, we first build HoloStateData, a state video dataset that turns diverse videos into unified control samples for camera, object, and weather supervision. Second, we introduce Holo-World, a unified controllable video world model that jointly controls scene from a single image. Its Unified Scene Adapter factorizes world preservation and weather transfer into distinct parameter subspaces, using rendered background, geometry buffers, and object controls to maintain controlled scene structure while modeling weather-dependent appearance and particle effects. Additionally, Scene-Weather Decomposed CFG guides scene and weather residuals separately, strengthening target weather effects without over-amplifying the full condition. Quantitative and qualitative experiments demonstrate that Holo-World maintains precise camera and object control with consistent scene structure while transferring scenes into diverse target weather state, outperforming video-to-video weather editing baselines on weather-state generation. Our project page is available at https://xiangchenyin.github.io/Holo-World/.', 'score': 5, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'e8b9386dbafcbe3d', 'authors': ['Xiangchen Yin', 'Wenzhang Sun', 'Jiahui Yuan', 'Zijie Liu', 'Yinda Chen', 'Wei Li', 'Dachun Kai', 'Chunfeng Wang', 'Xiaoyan Sun'], 'affiliations': ['Institute of Artificial Intelligence, Hefei Comprehensive National Science Center', 'Li Auto', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.20083.jpg', 'data': {'categories': ['#synthetic', '#multimodal', '#dataset', '#video', '#diffusion'], 'emoji': '🌍', 'ru': {'title': 'Единое управление видео-миром: сохранение сцены и контроль погоды из одного кадра', 'desc': 'В работе предлагается единая модель видео-мира, которая генерирует видео из одного изображения с сохранением структуры сцены и возможностью переноса в целевые погодные условия. Авторы создали специализированный датасет HoloStateData для унифицированного обучения управления камерой, объектами и погодой. Ключевым вкладом является архитектура Holo-World с адаптером Unified Scene Adapter, который разделяет сохранение мира и передачу погодных эффектов в разные подпространства параметров. Метод достигает высокого качества генерации видео с точным управлением камерой и объектами при реалистичной трансформации погодных условий.'}, 'en': {'title': 'Transforming Single Images into Dynamic Weather-Responsive Videos', 'desc': 'This paper presents a new model called Holo-World that generates videos from a single image while allowing for controlled changes in weather conditions. It uses a dataset called HoloStateData to create unified control samples for managing camera movements, object interactions, and weather effects. The model separates the tasks of preserving the original scene structure and modifying the weather, ensuring that both can be controlled effectively. Experiments show that Holo-World outperforms existing methods in generating videos with accurate scene structure and realistic weather transitions.'}, 'zh': {'title': '从单图像生成可控天气视频的创新模型', 'desc': '这篇论文介绍了一种统一的可控视频世界模型，能够从单张图像生成视频，同时保持场景结构并通过特定的参数化和条件技术转移到目标天气状态。模型通过HoloStateData数据集，将多样化的视频转化为统一的控制样本，以实现对相机、物体和天气的监督。Holo-World模型将世界保持和天气转移分解为不同的参数子空间，使用渲染背景和几何缓冲区来维持受控的场景结构，同时模拟天气依赖的外观和粒子效果。实验结果表明，Holo-World在保持精确的相机和物体控制的同时，能够将场景转移到多样的目标天气状态，超越了现有的视频到视频天气编辑基线。'}}}, {'id': 'https://huggingface.co/papers/2606.19602', 'title': 'Configurable Clinical Information Extraction with Agentic RAG: What Works, What Breaks, and Why', 'url': 'https://huggingface.co/papers/2606.19602', 'abstract': 'Abstract ACIE, an agentic RAG system deployed in a clinical setting, demonstrates high accuracy in extracting medical information from complex patient contexts, achieving 96.5% acceptance rate by nuclear-medicine physicians across 7,326 judgments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Patient contexts span hundreds of heterogeneous documents and thousands of structured data points, yet the document-level metadata that AI systems need for retrieval and triage is absent or incomplete. Standard retrieval-augmented generation fails on this data, mishandling temporal reasoning, cross-document dependencies, and missing metadata. We deploy ACIE (Agentic Clinical Information Extraction) at University Medicine Essen: an on-premise agentic RAG pipeline that reasons over complete patient contexts and grounds every answer in source passages for clinician verification. We quantify the metadata gap, trace the architectural decisions it shaped, and evaluate extraction alongside an independent retrospective lymphoma registry study, in which nuclear-medicine physicians verify every extracted value against its cited sources. Across 7,326 judgments, clinicians accepted 96.5\\% of extractions, with per-type acceptance ranging from 80\\% to 99\\%.', 'score': 5, 'issue_id': 2460, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '6fb00a08648bc403', 'authors': ['Osman Alperen Çinar-Koraş', 'Marie Bauer', 'Sameh Khattab', 'Merlin Engelke', 'Moon Kim', 'Stephan Settelmeier', 'Shigeyasu Sugawara', 'Fabian Freisleben', 'Felix Nensa', 'Jens Kleesiek'], 'affiliations': ['Advanced Clinical Research Center, Fukushima Medical University, Fukushima, Japan', 'Department of Cardiology and Vascular Medicine, University Hospital Essen, Essen, Germany', 'Department of Physics, TU Dortmund University, Dortmund, Germany', 'Faculty of Computer Science, University of Duisburg-Essen, Essen, Germany', 'Institute for Artificial Intelligence in Medicine (IKIM), University Medicine Essen, Essen, Germany', 'Lamarr Institute for Machine Learning and Artificial Intelligence, TU Dortmund University, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2606.19602.jpg', 'data': {'categories': ['#rag', '#agents', '#healthcare'], 'emoji': '⚕️', 'ru': {'title': 'Агентный RAG для клинической информатики: от неполных данных к надёжности в медицинской практике', 'desc': 'ACIE — это агентная система RAG (retrieval-augmented generation), развёрнутая в клинической среде для извлечения медицинской информации из сложных контекстов пациентов. Система решает критическую проблему стандартного RAG: отсутствие или неполнота метаданных на уровне документов, что приводит к ошибкам в временных рассуждениях и кросс-документных зависимостях. Архитектура ACIE использует агентный подход, позволяющий рассуждать над полным контекстом пациента и обосновывать каждый ответ исходными фрагментами текста для верификации клиницистами. При оценке на 7,326 суждениях врачей-ядерных медиков система достигла 96,5% уровня принятия извлекаемых значений.'}, 'en': {'title': 'Revolutionizing Clinical Data Extraction with ACIE', 'desc': 'The paper presents ACIE, an advanced retrieval-augmented generation (RAG) system designed for clinical environments, which excels in extracting relevant medical information from complex patient data. It addresses challenges such as incomplete document-level metadata and the difficulties of temporal reasoning and cross-document dependencies that traditional RAG systems struggle with. By grounding its outputs in source passages, ACIE allows clinicians to verify the accuracy of the extracted information, achieving a remarkable 96.5% acceptance rate from nuclear-medicine physicians. The study highlights the importance of addressing metadata gaps and demonstrates the effectiveness of ACIE in improving clinical decision-making through precise information extraction.'}, 'zh': {'title': '智能医疗信息提取的未来', 'desc': 'ACIE是一种在临床环境中部署的智能信息提取系统，能够从复杂的患者背景中高效提取医疗信息。该系统在7326次判断中获得了核医学医生96.5%的接受率，显示出其高准确性。尽管患者背景包含大量异构文档和结构化数据点，但AI系统所需的文档级元数据往往缺失或不完整。ACIE通过对完整患者背景进行推理，并为临床医生验证每个答案提供源文献支持，成功解决了标准检索增强生成方法在时间推理和跨文档依赖性上的不足。'}}}, {'id': 'https://huggingface.co/papers/2606.19495', 'title': 'LooseControlVideo: Directorial Video Control using Spatial Blocking', 'url': 'https://huggingface.co/papers/2606.19495', 'abstract': 'Abstract LooseControlVideo enables intuitive 3D spatial control in text-to-video generation using sparse oriented 3D boxes as proxies, achieving superior trajectory accuracy and occlusion handling compared to existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Precise 3D spatial orchestration in text-to-video generation remains a significant challenge, particularly for multi-object scenes where semantic layout and temporal dynamics are often entangled. While existing depth-conditioned models achieve good structural fidelity, they necessitate dense, frame-accurate guidance that is labor-intensive to author for dynamic events involving deformable objects. We present LooseControlVideo, a framework that enables intuitive and expressive control by using sparse, oriented 3D boxes as a "blocking" proxy. This allows users to author high-level layout and trajectory while leveraging a video generative model to generate realistic occlusions, dynamics and interactions. We achieve this by fine-tuning a Wan 2.2 backbone on a video dataset annotated with DNOCS, a novel encoding for 3D size, orientation and depth-ordered occlusions. Furthermore, our method allows for localized refinement, such as adjusting a jump trajectory or adding an interaction, with minimal disruption to the global scene context. Extensive evaluations on the nuScenes, HO-3D, and BEHAVE benchmarks demonstrate that LooseControlVideo significantly outperforms existing 2D-box and flow-based baselines. Our findings indicate a 1.2x to 3x improvement in Trajectory Error; 2x improvement in Rigid Motion Consistency; and a 1.5x to 2x increase in Occlusion Accuracy over current state-of-the-art layout-conditioned models, demonstrating that oriented 3D primitives provide good geometric prior for complex, multi-agent video authoring.', 'score': 5, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'e2115271c2bd872b', 'authors': ['Shariq Farooq Bhat', 'Niloy J. Mitra', 'Kalyan Sunkavalli'], 'affiliations': ['Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.19495.jpg', 'data': {'categories': ['#3d', '#video', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Интуитивный контроль видео через 3D-боксы вместо плотных аннотаций', 'desc': 'LooseControlVideo — это система для управления генерацией видео из текста с помощью разреженных ориентированных 3D-боксов, которые служат прокси для пространственного контроля. Метод основан на файн-тюнинге видеогенеративной модели на датасете с аннотациями DNOCS, кодирующими размер, ориентацию и окклюзии объектов. Подход позволяет пользователям интуитивно контролировать расположение и траектории объектов, при этом модель автоматически генерирует реалистичные взаимодействия и перекрытия. Экспериментальные результаты показывают значительное улучшение по метрикам точности траекторий, консистентности движений и корректности обработки окклюзий по сравнению с существующими методами.'}, 'en': {'title': 'Intuitive 3D Control for Dynamic Video Generation', 'desc': 'LooseControlVideo is a novel framework for text-to-video generation that enhances 3D spatial control using sparse oriented 3D boxes. This approach allows users to intuitively manage the layout and movement of multiple objects in a scene while effectively handling occlusions and interactions. By fine-tuning a video generative model with a new encoding for 3D properties, the method achieves significant improvements in trajectory accuracy and motion consistency. Evaluations show that LooseControlVideo outperforms existing models, making it easier to create dynamic and realistic video content.'}, 'zh': {'title': 'LooseControlVideo：直观的3D视频生成控制', 'desc': 'LooseControlVideo 是一种新框架，旨在通过稀疏的定向 3D 盒子来实现文本到视频生成中的直观 3D 空间控制。与现有方法相比，它在轨迹准确性和遮挡处理方面表现更优。该方法允许用户在高层次上设计布局和轨迹，同时利用视频生成模型生成真实的遮挡和动态交互。通过在带有 DNOCS 注释的视频数据集上微调 Wan 2.2 主干网络，LooseControlVideo 显著提高了轨迹误差、刚体运动一致性和遮挡准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.18231', 'title': 'Adaptive Volumetric Mechanical Property Fields Invariant to Resolution', 'url': 'https://huggingface.co/papers/2606.18231', 'abstract': "Abstract AdaVoMP predicts dense spatially-varying mechanical properties for 3D objects using a sparse adaptive voxel structure and transformer encoder-decoder model, enabling realistic deformable simulations with improved accuracy and efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accurate mechanical properties (or materials) Young's modulus (E), Poisson's ratio (ν) and density (ρ) are essential for reliable physics simulation of digital worlds, but most 3D assets lack this information. We propose AdaVoMP, a method for predicting accurate dense spatially-varying (E, ν, ρ) for input 3D objects across representations, improving the resolution, accuracy, and memory efficiency over the state-of-the-art. The foundation of our technique is a sparse and adaptive voxel structure SAV that efficiently represents both the input 3D shape and the material field output. We replace the fixed-voxel model of the most accurate prior method, VoMP, with a novel sparse transformer encoder-decoder model that learns to generate a unique SAV autoregressively for every input shape to represent its materials, achieving a resolution 16^3times higher than prior art. Experiments show that AdaVoMP estimates more accurate volumetric properties, even with lesser test-time compute than all prior art. This allows us to convert high-resolution complex 3D objects into simulation-ready assets, resulting in realistic deformable simulations.", 'score': 5, 'issue_id': 2457, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': 'f5ba29903050f23d', 'authors': ['Rishit Dagli', 'Donglai Xiang', 'Vismay Modi', 'Xuning Yang', 'Gavriel State', 'David I. W. Levin', 'Maria Shugrina'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.18231.jpg', 'data': {'categories': [], 'emoji': '🧊', 'ru': {'title': 'Разреженные вокселевые сетки для точного предсказания механических свойств', 'desc': 'AdaVoMP — это метод для предсказания плотного поля механических свойств трёхмерных объектов, использующий разреженную адаптивную вокселевую структуру. Модель основана на трансформере с архитектурой энкодер-декодер, который автоматически генерирует оптимальную вокселевую сетку для каждого объекта. Предложенный подход достигает разрешения в 16³ раза выше, чем предыдущие методы, при этом требуя меньше вычислительных ресурсов. Это позволяет эффективно конвертировать сложные 3D-объекты в симуляционно-готовые активы с реалистичными деформациями.'}, 'en': {'title': 'Revolutionizing 3D Simulations with Adaptive Material Prediction', 'desc': "AdaVoMP is a novel method that predicts detailed mechanical properties like Young's modulus, Poisson's ratio, and density for 3D objects, which are crucial for realistic physics simulations. It utilizes a sparse adaptive voxel structure combined with a transformer encoder-decoder model to enhance the accuracy and efficiency of these predictions. By replacing traditional fixed-voxel models with a more flexible approach, AdaVoMP achieves significantly higher resolution in representing material properties. This advancement allows for the creation of high-quality, simulation-ready 3D assets with reduced computational requirements compared to previous methods."}, 'zh': {'title': 'AdaVoMP：提升3D物体机械属性预测的革命性方法', 'desc': 'AdaVoMP是一种预测3D物体稠密空间变化机械属性的方法，使用稀疏自适应体素结构和变换器编码器-解码器模型。这种方法能够提高物理仿真的准确性和效率，尤其是在缺乏材料信息的3D资产中。通过生成更高分辨率的杨氏模量、泊松比和密度，AdaVoMP在内存效率和准确性上超越了现有技术。实验表明，AdaVoMP在计算量更小的情况下，能够更准确地估计体积属性，从而实现真实的可变形仿真。'}}}, {'id': 'https://huggingface.co/papers/2606.18021', 'title': 'LegalHalluLens: Typed Hallucination Auditing and Calibrated Multi-Agent Debate for Trustworthy Legal AI', 'url': 'https://huggingface.co/papers/2606.18021', 'abstract': 'Abstract LegalHalluLens audits AI systems in legal workflows by identifying specific error patterns and directional biases in hallucinations across different claim types, enabling more reliable deployment through targeted diagnostic and mitigation approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI systems deployed in legal workflows hallucinate at rates that aggregate metrics report at ~52%, but this average conceals where errors concentrate and in which direction they run, leaving compliance officers without an actionable signal for trustworthy deployment. We present LegalHalluLens, an auditing framework with three components: typed hallucination profiles across four legally-motivated claim categories (numeric, temporal, obligation/entitlement, factual) over CUAD (Hendrycks et al., 2021); a Risk Direction Index (RDI) that reduces omission-versus-invention bias to a single deployment-comparable scalar; and a typed debate pipeline calibrated to both magnitudes and directions. Across 510 contracts and 249,252 clause-level instances we measure a within-model gap of approximately 38-40 pp between obligation/numeric and temporal claims that aggregate reporting hides, and show that two systems with matched 52% rates can carry opposite RDIs. The debate pipeline reduces fabricated detections by 45% with per-category gains tracking the diagnosis, matching commercial APIs with a substantially smaller backbone (4B active parameters). Typed profiles and RDI surface failure modes that aggregate metrics hide; we further show these diagnostics serve as calibration inputs for multi-agent debate pipelines, where Skeptic challenges and asymmetric gates targeted at measured failure modes outperform generically-tuned debate. The framework supports direction-aware procurement, accountability, and agent design for legal AI deployed in the wild.', 'score': 5, 'issue_id': 2460, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '18c15284913f6b99', 'authors': ['Lalit Yadav', 'Akshaj Gurugubelli'], 'affiliations': ['Independent Researcher, San Diego, CA, USA', 'Independent Researcher, Sunnyvale, CA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.18021.jpg', 'data': {'categories': ['#ethics', '#hallucinations', '#benchmark', '#science', '#multilingual', '#dataset', '#agents'], 'emoji': '⚖️', 'ru': {'title': 'Видеть скрытые ошибки: диагностика галлюцинаций в юридическом AI', 'desc': 'Статья представляет LegalHalluLens — фреймворк для аудита AI-систем, используемых в юридических процессах, который выявляет специфические ошибки галлюцинаций и их направленные смещения. Авторы показывают, что стандартные агрегированные метрики скрывают реальные закономерности ошибок: одна и та же общая точность может соответствовать разным типам ошибок в зависимости от категории клаимов (числовые, временные, обязательства, факты). Фреймворк включает типизированные профили галлюцинаций, индекс направленности риска (RDI) и конвейер дебатов между агентами, специально откалиброванный для выявленных типов ошибок. Экспериментально доказано, что целевые многоагентные дебаты с учётом диагностированных слабостей снижают ошибки на 45% и конкурируют с коммерческими API при меньшем размере модели.'}, 'en': {'title': 'Enhancing Legal AI Reliability with Targeted Auditing', 'desc': 'LegalHalluLens is an auditing framework designed to improve the reliability of AI systems used in legal workflows by identifying specific error patterns and biases in their outputs. It focuses on different types of claims, such as numeric and temporal, to provide detailed insights into where and how these systems tend to make mistakes. The framework includes a Risk Direction Index (RDI) that simplifies the understanding of biases, allowing compliance officers to make informed decisions about AI deployment. By utilizing a debate pipeline, LegalHalluLens significantly reduces false detections and enhances the accuracy of AI systems in legal contexts.'}, 'zh': {'title': '法律AI审计的创新框架', 'desc': 'LegalHalluLens 是一个审计框架，旨在识别法律工作流程中 AI 系统的错误模式和偏见。它通过分析不同类型的索赔，提供了针对性诊断和缓解方法，以提高 AI 系统的可靠性。研究表明，AI 系统在法律工作中出现幻觉的比例约为 52%，但这一平均值掩盖了错误的集中位置和方向。该框架的三个组成部分包括类型化幻觉档案、风险方向指数和类型化辩论管道，能够有效识别和减少错误。'}}}, {'id': 'https://huggingface.co/papers/2606.16429', 'title': 'Taylor-Calibrate: Principled Initialization for Hybrid Linear Attention Distillation', 'url': 'https://huggingface.co/papers/2606.16429', 'abstract': 'Abstract Hybrid linear attention models can be improved through a novel initialization technique that enhances conversion from pretrained Transformers by leveraging teacher attention statistics and alignment steps.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Hybrid linear attention models offer an appealing path to faster long-context inference: they reduce the quadratic cost and KV-cache burden of full softmax attention while retaining much of the quality of Transformer models. A practical way to obtain such models is to convert a pretrained Transformer instead of pretraining a new architecture from scratch, but this conversion is still brittle. Simply copying the teacher attention projections into a Gated DeltaNet (GDN) student does not specify the new recurrent decay, write, and output-gating dynamics. As a result, the converted model often starts in a poor dynamical regime and must spend many distillation tokens repairing initialization rather than learning the remaining teacher behavior. We propose Taylor-Calibrate, a lightweight initialization method for hybrid GDN students. The method uses Taylor-guided teacher attention statistics to set the value projection, memory timescale, write gates, and output gate, then applies a short per-layer alignment step to match each converted layer to the teacher output. Across four teacher settings and three retained-layer policies, Taylor-Calibrate gives substantially stronger zero-shot students, with up to an 88x improvement in a representative ablation, and reaches matched recovery targets with 4.9x--9.2x fewer training tokens than naive conversion.', 'score': 5, 'issue_id': 2458, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '999126052bfa9263', 'authors': ['Zhongzhu Zhou', 'Qingyang Wu', 'Junxiong Wang', 'Mayank Mishra', 'Shuaiwen Leon Song', 'Ben Athiwaratkun', 'Chenfeng Xu'], 'affiliations': ['Microsoft', 'The University of Sydney', 'The University of Texas at Austin', 'Together AI', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.16429.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Умная инициализация для быстрого внимания: от Трансформера к линейности', 'desc': 'В работе предлагается метод Taylor-Calibrate для улучшения инициализации гибридных моделей линейного внимания при конвертации из предобученных Трансформеров. Метод использует статистику внимания учителя и Taylor-разложение для оптимального выставления параметров проекции значений, масштабов памяти, вентилей записи и выходных вентилей студента. После инициализации применяется короткий этап выравнивания каждого слоя для соответствия выходам учителя. Экспериментальные результаты показывают, что предложенный подход достигает целевого качества с использованием в 4.9-9.2 раза меньше токенов дистилляции по сравнению с наивной конвертацией.'}, 'en': {'title': 'Enhancing Hybrid Attention with Smart Initialization', 'desc': 'This paper introduces a new initialization technique called Taylor-Calibrate for improving hybrid linear attention models, which are designed for faster long-context inference. The method enhances the conversion process from pretrained Transformers by utilizing teacher attention statistics and alignment steps, addressing the brittleness of previous conversion methods. By properly setting the value projection and gating dynamics, Taylor-Calibrate allows the converted models to start in a better dynamical regime, reducing the need for extensive training to correct initialization issues. The results show significant improvements in performance, achieving up to 88 times better efficiency in zero-shot tasks with fewer training tokens compared to traditional conversion methods.'}, 'zh': {'title': '提升混合线性注意力模型的初始化方法', 'desc': '混合线性注意力模型可以通过一种新颖的初始化技术得到改善，该技术利用教师注意力统计和对齐步骤来增强从预训练变换器的转换。该方法称为Taylor-Calibrate，能够有效设置值投影、记忆时间尺度、写入门和输出门，从而提高模型的性能。通过这种方法，转换后的模型在零-shot学习中表现显著提升，训练所需的标记数量减少了4.9到9.2倍。总的来说，这项研究为快速长上下文推理提供了一条有效的路径。'}}}, {'id': 'https://huggingface.co/papers/2606.20536', 'title': 'The FID Lottery: Quantifying Hidden Randomness in Generative-Model Evaluation', 'url': 'https://huggingface.co/papers/2606.20536', 'abstract': 'Abstract Analysis of FID variance across different training and sampling seeds reveals significant reproducibility issues in image generation evaluation, with retraining causing larger fluctuations than resampling, and recommends updated evaluation protocols with error bars and optimal guidance tuning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The Frechet Inception Distance (FID) is the de facto arbiter of image generation, yet most papers report just a single number from a single trained model using a single sampling seed. How reproducible is that number if we retrain the model, or merely resample from it? In this paper, we treat FID as a random variable on a two-axis panel of training and generation seeds, and measure its variance directly on several hundred SiT networks trained on class-conditional ImageNet 256x256. We report surprising findings: (a) Retraining the model using the same recipe with a different seed moves FID 3.2x more (in Inception feature space) than redrawing samples from a fixed network. (b) That gap is driven by three factors: random initialisation, data ordering, and the per-step Gaussian noise of the flow-matching loss. (c) Increasing compute or model size barely tightens the spread, holding the FID coefficient of variation (CoV) inside a 1-2% band. (d) Per-cell classifier-free-guidance tuning halves the spread but reshuffles which seeds work best, and a lucky training seed reaches the same FID with up to 2x less compute than an unlucky one. Based on these findings, we recommend a new FID evaluation protocol: evaluate under per-cell optimal guidance, treat any FID gap below the empirically measured ~1.3% CoV as inconclusive, and report an error bar over several training seeds rather than a single FID number.', 'score': 4, 'issue_id': 2460, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '5c1fe61340047459', 'authors': ['Nicolas Dufour', 'Alexei A. Efros', 'Patrick Pérez'], 'affiliations': ['Kyutai', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.20536.jpg', 'data': {'categories': ['#optimization', '#cv', '#benchmark', '#diffusion'], 'emoji': '🎲', 'ru': {'title': 'FID — не одно число: о воспроизводимости оценок генеративных моделей', 'desc': 'В статье анализируется воспроизводимость метрики Frechet Inception Distance (FID) при оценке качества генеративных моделей изображений. Авторы исследуют дисперсию FID по разным инициализациям обучения и семенам семплирования, обнаруживая, что переобучение модели вызывает значительно большие флуктуации метрики, чем простое переодинаковой сигенерирование выборок. Исследование показывает, что основные источники вариативности — случайная инициализация, порядок данных и стохастичность loss функции, а увеличение вычислительных ресурсов слабо влияет на разброс результатов. На основе полученных выводов авторы предлагают обновленный протокол оценки FID с использованием доверительных интервалов и оптимальной настройки guidance для каждой точки.'}, 'en': {'title': 'Enhancing FID Reliability: A Call for Better Evaluation Protocols', 'desc': 'This paper investigates the variability of the Frechet Inception Distance (FID) in image generation, highlighting significant reproducibility issues when evaluating models. It finds that retraining a model with a different seed causes greater fluctuations in FID than simply resampling from the same model. The study identifies factors such as random initialization and data ordering that contribute to this variance. The authors propose a new evaluation protocol that includes error bars and optimal guidance tuning to improve the reliability of FID measurements.'}, 'zh': {'title': '优化FID评估，提升图像生成可重复性', 'desc': '本文分析了图像生成评估中FID方差的可重复性问题，发现重新训练模型比重新采样导致更大的波动。研究表明，FID作为随机变量，其方差受随机初始化、数据顺序和每步高斯噪声的影响。增加计算资源或模型规模对FID的波动影响有限，而优化每个单元的无分类器引导调优可以显著减少波动。基于这些发现，建议更新FID评估协议，使用多个训练种子报告误差条而非单一FID值。'}}}, {'id': 'https://huggingface.co/papers/2606.19830', 'title': 'JAMER: Project-Level Code Framework Dataset and Benchmark on Professional Game Engines', 'url': 'https://huggingface.co/papers/2606.19830', 'abstract': "Abstract Game development frameworks and benchmarks were created using data from game jam competitions to evaluate code generation and project-level programming capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current AI-driven game development has made substantial progress in asset generation, gameplay design, and web-based game coding, yet project-level code engineering on professional game engines remains largely unexplored due to the absence of large-scale datasets and deterministic evaluation methods. We present JamSet and JamBench, the first project-level game code framework dataset and benchmark built on a professional game engine. Our key insight is that Game Jam competitions, community events where developers build complete games under tight time constraints, yield thousands of open-source projects suitable for this purpose. Building on the Godot engine's text-based format and headless execution mode, we design a deterministic verification pipeline from file integrity to runtime behavior collection, distilling 8,133 verified projects from over 240,000 repositories. Of these, 300 manually verified projects form JamBench; the rest constitute JamSet. JamBench defines theme-driven generation and code completion tasks, evaluated through a pipeline combining compilation pass rates, Structural Completeness Score (SCS), and Behavioral Alignment Score (BAS). Evaluation of 9 frontier models reveals a capability cliff as project scale increases, with runtime pass rates dropping from 80.4% on small projects to 5.7% on large ones (Task2a). Code Agents improve compilation rates yet yield no gains in runtime behavioral quality, indicating that the bottleneck lies in architectural design rather than syntactic correctness. Experiments validate JamSet as effective training data. All data and code are publicly available.", 'score': 3, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '54d4e81844481c2e', 'authors': ['Jianwen Sun', 'Chuanhao Li', 'Zizhen Li', 'Yukang Feng', 'Fanrui Zhang', 'Yifei Huang', 'Yu Dai', 'Kaipeng Zhang'], 'affiliations': ['Alaya Studio', 'Nankai University, Tianjin, China', 'Shanghai AI Laboratory, Shanghai, China', 'Shanghai Innovation Institute, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.19830.jpg', 'data': {'categories': ['#games', '#benchmark', '#dataset', '#plp', '#optimization', '#agents', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'От синтаксиса к архитектуре: оценка возможностей нейросетей в разработке полноценных игровых проектов', 'desc': 'Исследователи создали JamSet и JamBench — первый датасет и бенчмарк для оценки генерации кода игр на уровне полных проектов с использованием профессионального игрового движка Godot. Они собрали 8133 верифицированных проектов из Game Jam соревнований и разработали детерминированный конвейер проверки, включающий проверку целостности файлов и сбор данных о поведении во время выполнения. Бенчмарк содержит задачи генерации кода, управляемые тематикой, и оценивается через метрики компиляции, структурной полноты (SCS) и поведенческого выравнивания (BAS). Эксперименты с 9 frontier моделями выявили критический разрыв в производительности: точность выполнения падает с 80,4% на малых проектах до 5,7% на больших, что указывает на проблемы с архитектурным дизайном, а не синтаксической корректностью.'}, 'en': {'title': 'Unlocking Game Development: Evaluating AI in Project-Level Code Generation', 'desc': 'This paper introduces JamSet and JamBench, innovative frameworks and benchmarks for evaluating project-level code generation in game development. Utilizing data from game jam competitions, the authors created a dataset of 8,133 verified game projects, with 300 projects forming the benchmark for testing AI models. The study highlights a significant drop in performance of AI models as project complexity increases, indicating challenges in architectural design rather than just code syntax. The findings suggest that while AI can improve compilation rates, it struggles with maintaining runtime quality in larger projects, emphasizing the need for better model architectures.'}, 'zh': {'title': '游戏开发新基准：提升项目级编程能力', 'desc': '本文介绍了一个新的游戏开发框架和基准，旨在评估代码生成和项目级编程能力。我们创建了JamSet和JamBench，这是基于专业游戏引擎的第一个项目级游戏代码框架数据集和基准。通过分析游戏开发竞赛中产生的开源项目，我们提取了8133个经过验证的项目，并设计了一个确定性的验证流程。实验结果显示，随着项目规模的增加，模型的能力显著下降，表明架构设计是影响运行时行为质量的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2606.16827', 'title': 'No Resource, No Benchmarks, No Problem? Evaluating and Improving LLMs for Code Generation in No-Resource Languages', 'url': 'https://huggingface.co/papers/2606.16827', 'abstract': 'Abstract Research addresses code generation challenges for no-resource programming languages by developing benchmarks and proposing a method that combines further pre-training with weight difference transfer to create specialized instruction-following models at reduced computational cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) have significantly advanced the automation of software engineering tasks. One prominent example is code generation, where an LLM produces code in a specified programming language based on a natural language description. Most research in this area has focused on high-resource languages, such as Python or Java, which benefit from abundant training data. A smaller body of work has explored low-resource languages, which are underrepresented in training corpora. In contrast, no-resource languages for which LLMs have seen virtually no training data remain largely unstudied. These languages often emerge in industry, where organizations develop proprietary or domain-specific languages unsupported by commercial tools like GitHub Copilot. This results in the need for companies to deploy their own in-house code recommenders. To investigate possible solutions in this context, we build and release three code generation benchmarks for no-resource languages, based on two recently proposed programming languages for which very little training data is available. Using these benchmarks, we experiment several solutions to teach LLMs about no-resource languages, including prompt-based techniques as well as pre-training and fine-tuning exploiting the little data available. While further pre-training gives the largest performance gains for no-resource languages, applying it directly to instruction-tuned models harms their ability to follow instructions. To address this, we start from a base model, further pre-training it on the target language, and then inject instruction-following capabilities via weight diff transfer from an instruction model. Such an approach significantly improves code generation capabilities in no-resource settings, allowing companies to cheaply deploy a specialized instruct model without dealing with the computational cost of instruction fine-tuning.', 'score': 3, 'issue_id': 2459, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'a16b67c062baeb5d', 'authors': ['Alessandro Giagnorio', 'Alberto Martin-Lopez', 'Gabriele Bavota'], 'affiliations': ['SCORE Lab, I3US Institute, Universidad de Sevilla', 'SEART @ Software Institute, Università della Svizzera italiana'], 'pdf_title_img': 'assets/pdf/title_img/2606.16827.jpg', 'data': {'categories': ['#plp', '#optimization', '#low_resource', '#dataset', '#open_source', '#benchmark', '#transfer_learning', '#training'], 'emoji': '💻', 'ru': {'title': 'Обучение LLM генерировать код на языках без данных через трансфер весов', 'desc': 'Работа решает проблему генерации кода для языков программирования, на которых LLM практически не обучались. Авторы создают три новых бенчмарка для оценки моделей на редких языках и предлагают эффективный метод адаптации. Ключевой вклад — комбинация дополнительного предобучения базовой модели с трансфером различий весов от instruction-tuned модели, что позволяет избежать дорогостоящей дообучения. Такой подход дает значительные улучшения в генерации кода при минимальных вычислительных затратах.'}, 'en': {'title': 'Empowering Code Generation for No-Resource Languages', 'desc': 'This paper tackles the problem of generating code for programming languages that lack sufficient training data, known as no-resource languages. It introduces benchmarks specifically designed for these languages and proposes a novel method that combines further pre-training with weight difference transfer to enhance instruction-following capabilities in large language models (LLMs). The research shows that while further pre-training is beneficial, directly applying it to instruction-tuned models can hinder their performance. The proposed approach allows for the efficient creation of specialized models that can generate code in no-resource languages at a lower computational cost.'}, 'zh': {'title': '无资源语言的代码生成新方法', 'desc': '本研究解决了无资源编程语言的代码生成挑战，提出了基准测试并开发了一种方法，结合进一步的预训练和权重差异转移，以创建专门的指令跟随模型，降低计算成本。大语言模型（LLMs）在软件工程任务的自动化方面取得了显著进展，尤其是在代码生成领域。大多数研究集中在高资源语言上，而无资源语言几乎没有训练数据，导致相关研究较少。通过建立针对无资源语言的代码生成基准，研究者们探索了多种解决方案，以提高LLMs在这些语言上的代码生成能力。'}}}, {'id': 'https://huggingface.co/papers/2606.15760', 'title': 'The Data Manifold under the Microscope', 'url': 'https://huggingface.co/papers/2606.15760', 'abstract': 'Abstract A benchmarking framework is introduced to study data-manifold geometry by extending dSprites and COIL-20 datasets with additional transformation dimensions and dense sampling, enabling accurate estimation of curvature, reach, and volume for theoretical analysis and validation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A significant gap exists between theory and practice in deep learning. Generalization and approximation error bounds are often derived for simplified models or are too loose to be informative. Many rely on the manifold hypothesis and on geometric regularity such as intrinsic dimension, curvature, and reach. Progress requires insight into data-manifold geometry and suitable benchmarks, yet existing options are polarized: analytic manifolds with known geometry but limited applicability, or real-world datasets where geometry is only coarsely estimable. We introduce a benchmarking framework for studying data geometry. We repurpose and extend dSprites and COIL-20 with additional transformation dimensions and dense, axis-aligned sampling, and pair them with finite-difference estimators that recover curvature, reach, and volume at near-ground-truth accuracy in a regime where general-purpose estimators are unreliable or difficult to deploy. The framework is intended as a controlled testbed, useful as a calibration environment for geometric estimators and a sandbox for probing theoretical assumptions. To illustrate its use, we present two application studies, namely assessing the scaling behavior of the bounds of Genovese et al. and Fefferman et al., and tracking the layer-wise geometry of a β-VAE, highlighting the behavior of current bounds and the value of controlled benchmarks for guiding and validating future theory.   A reference implementation is available at https://github.com/koulakis/manifold-microscope.', 'score': 3, 'issue_id': 2460, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '526ce415d129097e', 'authors': ['Marios Koulakis', 'Constantin Seibold'], 'affiliations': ['Diagnostic and Interventional Radiology, University Clinic Heidelberg, Heidelberg, Germany', 'Independent Researcher, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2606.15760.jpg', 'data': {'categories': [], 'emoji': '🔬', 'ru': {'title': 'Контролируемый микроскоп для изучения геометрии данных', 'desc': 'Авторы представляют новый бенчмарк для изучения геометрии многообразий данных, расширяя классические датасеты dSprites и COIL-20 дополнительными преобразованиями и плотной выборкой. Они разработали методы конечных разностей для точной оценки кривизны, достижимости и объёма многообразий, близкие к истинным значениям. Фреймворк служит контролируемым тестбедом для калибровки геометрических оценщиков и проверки теоретических предположений о многообразной гипотезе в глубоком обучении. На примере приложений авторы демонстрируют использование бенчмарка для анализа поведения границ ошибок известных теорем и отслеживания слой-за-слоем геометрии β-VAE.'}, 'en': {'title': 'Bridging Theory and Practice in Data Geometry', 'desc': 'This paper presents a new benchmarking framework designed to explore the geometry of data manifolds by enhancing existing datasets like dSprites and COIL-20. The framework allows for precise estimation of geometric properties such as curvature, reach, and volume, which are crucial for understanding deep learning models. By providing a controlled environment for testing geometric estimators, it bridges the gap between theoretical analysis and practical application in machine learning. The authors demonstrate its utility through case studies that evaluate theoretical bounds and the geometry of a specific model, the β-VAE.'}, 'zh': {'title': '探索数据流形几何的新基准框架', 'desc': '本文介绍了一个基准框架，用于研究数据流形的几何特性。我们扩展了dSprites和COIL-20数据集，增加了额外的变换维度和密集采样，以便更准确地估计曲率、可达性和体积。该框架旨在作为一个受控测试平台，帮助校准几何估计器，并探讨理论假设。通过两个应用研究，我们展示了该框架的实用性，强调了受控基准在指导和验证未来理论中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.15527', 'title': 'Selective Synergistic Learning for Video Object-Centric Learning', 'url': 'https://huggingface.co/papers/2606.15527', 'abstract': 'Abstract Selective Synergistic Learning (SSync) addresses limitations in video object-centric learning by selectively distilling reliable cues through pseudo-labeling and transitive merging to improve object decomposition quality and robustness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Typical video object-centric learning (VOCL) approaches employ slot-based frameworks that rely on reconstruction-driven encoder-decoder architectures, where learning is mediated by two spatial maps: attention maps from the encoder and object maps from the decoder. As these two distinct maps exhibit different properties, a recent dense alignment strategy attempted to reconcile this discrepancy by enforcing agreement across all spatio-temporal patches via contrastive learning. However, this indiscriminate alignment inadvertently propagates the inherent weaknesses of each module, such as noisy encoder predictions and blurred decoder boundaries. Moreover, computing dense similarities across all pairs incurs a computational cost quadratic in the total number of spatio-temporal patches, severely limiting scalability. Motivated by this, we propose Selective Synergistic Learning (SSync). Instead of exhaustive patch-to-patch alignment, SSync prevents error propagation by selectively distilling only the most reliable cues: leveraging the encoder strictly for boundary refinement and the decoder for interior denoising. This is realized via a pseudo-labeling with linear complexity, eliminating the need for quadratic spatial comparisons. Also, to prevent the reinforcement of architectural biases like slot redundancy, we introduce a transitive pseudo-label merging that consolidates overlapping slots based on spatio-temporal activation consistency. Extensive studies demonstrate that SSync improves decomposition quality and serves as a versatile, plug-and-play module while also exhibiting exceptional robustness to slot configurations. Code is available at github.com/wjun0830/SSync.', 'score': 3, 'issue_id': 2457, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '40085d359cc76493', 'authors': ['WonJun Moon', 'Jae-Pil Heo'], 'affiliations': ['KAIST', 'Sungkyunkwan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15527.jpg', 'data': {'categories': ['#training', '#architecture', '#video'], 'emoji': '🎬', 'ru': {'title': 'Избирательное синергетическое обучение для надежного разложения объектов в видео', 'desc': 'В работе предлагается метод Selective Synergistic Learning (SSync) для улучшения обучения объектно-ориентированного представления видео. Вместо полного выравнивания всех пространственно-временных патчей, метод избирательно использует надежные сигналы: энкодер применяется для уточнения границ объектов, а декодер — для удаления шума во внутренней части. Подход использует псевдо-разметку с линейной сложностью вычислений, что значительно снижает вычислительные затраты по сравнению с квадратичными методами. Кроме того, введено трансформирующееся слияние псевдо-метак для консолидации перекрывающихся слотов на основе согласованности пространственно-временной активации.'}, 'en': {'title': 'Enhancing Video Object Learning with Selective Synergistic Cues', 'desc': 'Selective Synergistic Learning (SSync) enhances video object-centric learning by focusing on the most reliable cues through a process called pseudo-labeling and transitive merging. Unlike traditional methods that align all spatial patches, SSync selectively uses the encoder for refining boundaries and the decoder for reducing noise, which improves the quality of object decomposition. This approach reduces computational complexity from quadratic to linear, making it more scalable. The method also addresses architectural biases by merging overlapping slots based on their spatio-temporal consistency, leading to better robustness and versatility in various configurations.'}, 'zh': {'title': '选择性协同学习：提升视频物体分解的质量与鲁棒性', 'desc': '选择性协同学习（SSync）解决了视频物体中心学习中的一些局限性，通过伪标签和传递合并选择性地提取可靠线索，从而提高物体分解的质量和鲁棒性。传统的视频物体中心学习方法依赖于重建驱动的编码器-解码器架构，使用两个空间图：编码器的注意力图和解码器的物体图。SSync通过选择性提取最可靠的线索，避免了错误传播，利用编码器进行边界细化，解码器进行内部去噪。研究表明，SSync在分解质量上有显著提升，并且作为一个通用的模块展现出卓越的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.11273', 'title': 'Duration Aware Scheduling for ASR Serving Under Workload Drift', 'url': 'https://huggingface.co/papers/2603.11273', 'abstract': 'Abstract Duration-aware scheduling policies improve ASR serving latency by leveraging audio length as a predictor for processing time, with SJF and HRRN algorithms showing significant median latency reductions while maintaining throughput.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scheduling policies in large-scale Automatic Speech Recognition (ASR) serving pipelines play a key role in determining end-to-end (E2E) latency. Yet, widely used serving engines rely on first-come-first-served (FCFS) scheduling, which ignores variability in request duration and leads to head-of-line blocking under workload drift. We show that audio duration is an accurate proxy for job processing time in ASR models such as Whisper, and use this insight to enable duration-aware scheduling. We integrate two classical algorithms, Shortest Job First (SJF) and Highest Response Ratio Next (HRRN), into vLLM and evaluate them under realistic and drifted workloads. On LibriSpeech test-clean, compared to baseline, SJF reduces median E2E latency by up to 73% at high load, but increases 90th-percentile tail latency by up to 97% due to starvation of long requests. HRRN addresses this trade-off: it reduces median E2E latency by up to 28% while bounding tail-latency degradation to at most 24%. These gains persist under workload drift, with no throughput penalty and <0.1\\,ms scheduling overhead per request.', 'score': 3, 'issue_id': 2459, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'a46192f29fed7171', 'authors': ['Darshan Makwana', 'Yash Jogi', 'Harsh Kotta', 'Aayush Kubba'], 'affiliations': ['Sprinklr'], 'pdf_title_img': 'assets/pdf/title_img/2603.11273.jpg', 'data': {'categories': ['#inference', '#audio'], 'emoji': '⏱️', 'ru': {'title': 'Умное распределение очереди: длительность как ключ к низким задержкам в ASR-системах', 'desc': 'В статье исследуется применение алгоритмов планирования, учитывающих длительность аудио, для оптимизации задержек в системах обслуживания автоматического распознавания речи (ASR). Авторы показывают, что длина аудиофайла является надежным предиктором времени обработки запроса и интегрируют классические алгоритмы SJF и HRRN в систему vLLM. Алгоритм SJF достигает значительного снижения медианной задержки (до 73%), однако приводит к голоданию долгих запросов с увеличением хвостовых задержек. HRRN обеспечивает оптимальный баланс, снижая медианную задержку на 28% при ограничении деградации хвостовой задержки до 24%. Предложенный подход демонстрирует устойчивость к изменениям рабочей нагрузки без потери производительности системы.'}, 'en': {'title': 'Optimizing ASR Latency with Duration-Aware Scheduling', 'desc': 'This paper discusses how scheduling policies can enhance the performance of Automatic Speech Recognition (ASR) systems by considering the duration of audio inputs. It highlights the limitations of the traditional first-come-first-served (FCFS) approach, which can lead to inefficiencies due to varying request lengths. The authors propose using duration-aware scheduling methods, specifically Shortest Job First (SJF) and Highest Response Ratio Next (HRRN), to optimize latency while maintaining throughput. Their experiments show that SJF significantly reduces median latency but can increase tail latency, while HRRN offers a balanced improvement in both metrics under varying workloads.'}, 'zh': {'title': '基于音频时长的智能调度提升ASR性能', 'desc': '本论文提出了一种基于音频时长的调度策略，以改善自动语音识别（ASR）服务的延迟。通过利用音频时长作为处理时间的预测指标，研究表明，最短作业优先（SJF）和最高响应比下一个（HRRN）算法能够显著降低中位延迟，同时保持吞吐量。与传统的先到先服务（FCFS）调度相比，这些新算法在高负载下的中位延迟可减少多达73%。HRRN算法在降低延迟的同时，能够有效控制尾延迟的增加，确保系统在负载变化时仍能保持高效运行。'}}}, {'id': 'https://huggingface.co/papers/2603.24624', 'title': 'ReSyn: A Generalized Recursive Regular Expression Synthesis Framework', 'url': 'https://huggingface.co/papers/2603.24624', 'abstract': 'Abstract A divide-and-conquer framework named ReSyn enhances regex synthesis accuracy by decomposing complex problems, combined with a parameter-efficient synthesizer called Set2Regex that handles example permutation invariance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing Programming-By-Example (PBE) systems often rely on simplified benchmarks that fail to capture the high structural complexity of real-world regexes, such as deeper nesting and frequent use of union operations. To overcome the resulting performance drop, we propose ReSyn, a synthesizer-agnostic divide-and-conquer framework that decomposes complex synthesis problem into manageable sub-problems. We also introduce Set2Regex, a parameter-efficient synthesizer capturing the permutation invariance of examples. Experimental results demonstrate that ReSyn significantly boosts accuracy across various synthesizers, and its combination with Set2Regex establishes a new state-of-the-art on challenging real-world benchmark. The complete source code, datasets, and pre-trained model checkpoints are publicly available at https://github.com/mrseongminkim/ReSyn.', 'score': 2, 'issue_id': 2460, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': '75f04d0252fe77f1', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#dataset', '#plp', '#benchmark'], 'emoji': '🧩', 'ru': {'title': 'Разделяй сложность: синтез регулярных выражений через декомпозицию', 'desc': 'В работе предлагается ReSyn — фреймворк на основе метода «разделяй и властвуй», который разбивает сложную задачу синтеза регулярных выражений на более простые подзадачи для повышения точности. Авторы также представляют Set2Regex — эффективный синтезатор, который учитывает инвариантность перестановок в примерах, на которых обучается модель. Такой подход значительно улучшает производительность синтеза в системах Program-By-Example (PBE) на реальных, структурно сложных регулярных выражениях с глубокой вложенностью и частыми операциями объединения. Экспериментальные результаты показывают, что комбинация ReSyn с Set2Regex достигает новых рекордов на сложных реальных датасетах.'}, 'en': {'title': 'ReSyn: Enhancing Regex Synthesis with Divide-and-Conquer', 'desc': 'The paper presents ReSyn, a divide-and-conquer framework designed to improve the accuracy of regular expression (regex) synthesis. It addresses the limitations of existing Programming-By-Example (PBE) systems that struggle with complex regex structures, such as deep nesting and unions. ReSyn breaks down difficult synthesis tasks into smaller, more manageable sub-problems, making it easier for synthesizers to handle. Additionally, the paper introduces Set2Regex, a synthesizer that efficiently manages example permutation invariance, leading to significant accuracy improvements in real-world benchmarks.'}, 'zh': {'title': '分而治之，提升正则表达式合成准确性', 'desc': '本文提出了一种名为ReSyn的分而治之框架，旨在提高正则表达式合成的准确性。该框架通过将复杂问题分解为可管理的子问题，结合了一种名为Set2Regex的参数高效合成器，能够处理示例的排列不变性。现有的基于示例编程系统通常依赖于简化的基准测试，无法捕捉到真实世界正则表达式的高结构复杂性。实验结果表明，ReSyn显著提高了各种合成器的准确性，并与Set2Regex的结合在具有挑战性的真实世界基准上建立了新的最先进水平。'}}}];
