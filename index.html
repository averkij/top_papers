    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

            const isDarkMode = body.classList.contains('dark-theme');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.26164', 'title': 'DataFlex: A Unified Framework for Data-Centric Dynamic Training of Large Language Models', 'url': 'https://huggingface.co/papers/2603.26164', 'abstract': 'Abstract DataFlex is a unified framework for dynamic data-centric training of large language models that supports sample selection, domain mixture adjustment, and sample reweighting while maintaining compatibility with standard training workflows and enabling efficient large-scale deployment.  AI-generated summary Data-centric training has emerged as a promising direction for improving large language models (LLMs) by optimizing not only model parameters but also the selection, composition, and weighting of training data during optimization. However, existing approaches to data selection, data mixture optimization, and data reweighting are often developed in isolated codebases with inconsistent interfaces, hindering reproducibility, fair comparison, and practical integration. In this paper, we present DataFlex, a unified data-centric dynamic training framework built upon LLaMA-Factory. DataFlex supports three major paradigms of dynamic data optimization: sample selection, domain mixture adjustment, and sample reweighting, while remaining fully compatible with the original training workflow. It provides extensible trainer abstractions and modular components, enabling a drop-in replacement for standard LLM training, and unifies key model-dependent operations such as embedding extraction, inference, and gradient computation, with support for large-scale settings including DeepSpeed ZeRO-3. We conduct comprehensive experiments across multiple data-centric methods. Dynamic data selection consistently outperforms static full-data training on MMLU across both Mistral-7B and Llama-3.2-3B. For data mixture, DoReMi and ODM improve both MMLU accuracy and corpus-level perplexity over default proportions when pretraining Qwen2.5-1.5B on SlimPajama at 6B and 30B token scales. DataFlex also achieves consistent runtime improvements over original implementations. These results demonstrate that DataFlex provides an effective, efficient, and reproducible infrastructure for data-centric dynamic training of LLMs.', 'score': 112, 'issue_id': 1776, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'b566bd38ffcb2e95', 'authors': ['Hao Liang', 'Zhengyang Zhao', 'Meiyi Qiang', 'Mingrui Chen', 'Lu Ma', 'Rongyi Yu', 'Hengyi Feng', 'Shixuan Sun', 'Zimo Meng', 'Xiaochen Ma', 'Xuanlin Yang', 'Qifeng Cai', 'Ruichuan An', 'Bohan Zeng', 'Zhen Hao Wong', 'Chengyu Shen', 'Runming He', 'Zhaoyang Han', 'Yaowei Zheng', 'Fangcheng Fu', 'Conghui He', 'Bin Cui', 'Zhiyu Li', 'Weinan E', 'Wentao Zhang'], 'affiliations': ['Institute for Advanced Algorithms Research, Shanghai', 'LLaMA-Factory Team', 'OpenDataLab', 'OriginHub Technology', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2603.26164.jpg', 'data': {'categories': ['#benchmark', '#data', '#training', '#dataset'], 'emoji': '⚙️', 'ru': {'title': 'Единая платформа для интеллектуальной оптимизации тренировочных данных', 'desc': 'DataFlex — это единая платформа для динамической оптимизации данных при обучении больших языковых моделей, которая объединяет три основных подхода: выбор образцов, адаптацию смеси доменов и перевзвешивание данных. Фреймворк построен на базе LLaMA-Factory и полностью совместим со стандартными рабочими процессами обучения, обеспечивая масштабируемость благодаря поддержке DeepSpeed ZeRO-3. Экспериментальные результаты показывают, что динамический выбор образцов последовательно превосходит статическое обучение на полном наборе данных, а методы оптимизации смеси доменов улучшают точность и перплексию при предтренировании. DataFlex предоставляет исследователям и практикам единую воспроизводимую инфраструктуру для разработки и сравнения методов оптимизации данных при обучении LLM.'}, 'en': {'title': 'DataFlex: Revolutionizing Data-Centric Training for LLMs', 'desc': 'DataFlex is a comprehensive framework designed for enhancing the training of large language models (LLMs) by focusing on the data used during training. It allows for dynamic adjustments in sample selection, domain mixture, and sample reweighting, which can lead to better model performance. By integrating these features into a single platform, DataFlex ensures compatibility with existing training workflows and promotes reproducibility in experiments. The framework has shown significant improvements in training efficiency and model accuracy across various datasets and model architectures.'}, 'zh': {'title': 'DataFlex：动态数据中心训练的统一框架', 'desc': 'DataFlex是一个统一的框架，旨在动态数据中心训练大型语言模型。它支持样本选择、领域混合调整和样本重加权，同时与标准训练工作流程兼容，便于大规模部署。通过优化训练数据的选择、组成和加权，DataFlex提高了大型语言模型的性能。实验结果表明，动态数据选择在多个任务上优于静态全数据训练，展示了DataFlex在数据中心动态训练中的有效性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2604.02268', 'title': 'SKILL0: In-Context Agentic Reinforcement Learning for Skill Internalization', 'url': 'https://huggingface.co/papers/2604.02268', 'abstract': "Abstract SKILL0 enables LLM agents to internalize skills during training, allowing zero-shot autonomous behavior through a dynamic curriculum that reduces contextual overhead while improving task performance.  AI-generated summary Agent skills, structured packages of procedural knowledge and executable resources that agents dynamically load at inference time, have become a reliable mechanism for augmenting LLM agents. Yet inference-time skill augmentation is fundamentally limited: retrieval noise introduces irrelevant guidance, injected skill content imposes substantial token overhead, and the model never truly acquires the knowledge it merely follows. We ask whether skills can instead be internalized into model parameters, enabling zero-shot autonomous behavior without any runtime skill retrieval. We introduce SKILL0, an in-context reinforcement learning framework designed for skill internalization. SKILL0 introduces a training-time curriculum that begins with full skill context and progressively withdraws it. Skills are grouped offline by category and rendered with interaction history into a compact visual context, teaching he model tool invocation and multi-turn task completion. A Dynamic Curriculum then evaluates each skill file's on-policy helpfulness, retaining only those from which the current policy still benefits within a linearly decaying budget, until the agent operates in a fully zero-shot setting. Extensive agentic experiments demonstrate that SKILL0 achieves substantial improvements over the standard RL baseline (+9.7\\% for ALFWorld and +6.6\\% for Search-QA), while maintaining a highly efficient context of fewer than 0.5k tokens per step. Our code is available at https://github.com/ZJU-REAL/SkillZero.", 'score': 62, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'a7ad93367dd657fc', 'authors': ['Zhengxi Lu', 'Zhiyuan Yao', 'Jinyang Wu', 'Chengcheng Han', 'Qi Gu', 'Xunliang Cai', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Meituan', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02268.jpg', 'data': {'categories': ['#rl', '#agents', '#training'], 'emoji': '🧠', 'ru': {'title': 'Интернализация навыков в параметры модели через прогрессивное снижение контекста', 'desc': 'SKILL0 — это фреймворк обучения на основе reinforcement learning, который позволяет LLM агентам интернализировать навыки непосредственно в параметры модели, избегая необходимости в поиске умений во время вывода. Метод использует динамический учебный план, который постепенно снижает количество контекстной информации о навыках, начиная с полного описания и переходя к полностью нулевому переносу. Навыки организуются по категориям и представляются с историей взаимодействий в компактном визуальном формате, что позволяет модели обучаться вызову инструментов и многошаговому выполнению задач. Экспериментальные результаты показывают значительное улучшение производительности (на 9.7% для ALFWorld и на 6.6% для Search-QA) при сохранении эффективности контекста менее 500 токенов на шаг.'}, 'en': {'title': 'Empowering LLMs with Internalized Skills for Zero-Shot Performance', 'desc': 'The paper introduces SKILL0, a framework that allows large language model (LLM) agents to internalize skills during training, enabling them to perform tasks autonomously without needing to retrieve skills at runtime. By using a dynamic curriculum, SKILL0 reduces the contextual overhead and improves task performance through a structured approach to skill internalization. The framework employs in-context reinforcement learning, where skills are initially provided in full context and gradually reduced, allowing the model to learn effective tool usage and multi-turn task completion. Experimental results show that SKILL0 significantly outperforms traditional reinforcement learning methods while maintaining a compact context size, demonstrating its efficiency and effectiveness in zero-shot scenarios.'}, 'zh': {'title': 'SKILL0：让模型自主学习技能的创新框架', 'desc': 'SKILL0 是一种强化学习框架，旨在让大型语言模型（LLM）在训练过程中内化技能，从而实现零-shot 自主行为。通过动态课程设计，SKILL0 逐步减少上下文信息，提高任务表现，同时降低了模型在推理时的负担。该方法将技能按类别分组，并通过交互历史生成紧凑的视觉上下文，帮助模型学习工具调用和多轮任务完成。实验结果表明，SKILL0 在多个任务上显著优于传统的强化学习基线，且每步的上下文效率保持在 0.5k tokens 以下。'}}}, {'id': 'https://huggingface.co/papers/2604.02329', 'title': 'Generative World Renderer', 'url': 'https://huggingface.co/papers/2604.02329', 'abstract': 'Abstract A large-scale dynamic dataset derived from AAA games is introduced to improve generative inverse and forward rendering, featuring high-resolution synchronized RGB and G-buffer data alongside a novel VLM-based evaluation method that correlates well with human judgment.  AI-generated summary Scaling generative inverse and forward rendering to real-world scenarios is bottlenecked by the limited realism and temporal coherence of existing synthetic datasets. To bridge this persistent domain gap, we introduce a large-scale, dynamic dataset curated from visually complex AAA games. Using a novel dual-screen stitched capture method, we extracted 4M continuous frames (720p/30 FPS) of synchronized RGB and five G-buffer channels across diverse scenes, visual effects, and environments, including adverse weather and motion-blur variants. This dataset uniquely advances bidirectional rendering: enabling robust in-the-wild geometry and material decomposition, and facilitating high-fidelity G-buffer-guided video generation. Furthermore, to evaluate the real-world performance of inverse rendering without ground truth, we propose a novel VLM-based assessment protocol measuring semantic, spatial, and temporal consistency. Experiments demonstrate that inverse renderers fine-tuned on our data achieve superior cross-dataset generalization and controllable generation, while our VLM evaluation strongly correlates with human judgment. Combined with our toolkit, our forward renderer enables users to edit styles of AAA games from G-buffers using text prompts.', 'score': 42, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'af0923b06113c69d', 'authors': ['Zheng-Hui Huang', 'Zhixiang Wang', 'Jiaming Tan', 'Ruihan Yu', 'Yidan Zhang', 'Bo Zheng', 'Yu-Lun Liu', 'Yung-Yu Chuang', 'Kaipeng Zhang'], 'affiliations': ['Alaya Studio, Shanda AI Research Tokyo', 'National Taiwan University', 'National Yang Ming Chiao Tung University', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.02329.jpg', 'data': {'categories': ['#multimodal', '#cv', '#games', '#dataset', '#synthetic', '#open_source', '#video'], 'emoji': '🎮', 'ru': {'title': 'От синтетических данных игр к реалистичному рендерингу через VLM-оценку', 'desc': 'Авторы представляют крупномасштабный динамический датасет из AAA игр для улучшения обратного и прямого рендеринга. Датасет содержит 4 миллиона кадров с синхронизированными RGB и G-buffer данными высокого разрешения, а также включает разнообразные сцены, визуальные эффекты и сложные условия освещения. Для оценки качества обратного рендеринга в реальных условиях предложена новая методология на основе VLM, которая хорошо коррелирует с оценкой человека. Экспериментальные результаты показывают, что моделями, дообученными на этом датасете, достигается лучшая обобщаемость и возможность управляемой генерации контента.'}, 'en': {'title': 'Bridging the Gap in Rendering with AAA Game Data', 'desc': 'This paper presents a new large-scale dataset created from AAA video games to enhance generative inverse and forward rendering techniques. The dataset includes 4 million synchronized frames of high-resolution RGB images and G-buffer data, capturing various scenes and effects like weather changes and motion blur. A novel evaluation method based on Vision-Language Models (VLM) is introduced to assess the performance of inverse rendering in a way that aligns with human perception. The findings show that models trained on this dataset can generalize better across different datasets and allow for controllable video generation using text prompts.'}, 'zh': {'title': '提升渲染真实感的游戏数据集', 'desc': '本文介绍了一个大型动态数据集，来源于AAA游戏，旨在改善生成逆向和前向渲染。该数据集包含高分辨率的同步RGB和G-buffer数据，能够有效提升合成数据集的真实感和时间一致性。我们还提出了一种基于VLM的新评估方法，可以与人类判断高度相关。通过实验，使用该数据集微调的逆向渲染器在跨数据集泛化和可控生成方面表现优越。'}}}, {'id': 'https://huggingface.co/papers/2604.02029', 'title': 'The Latent Space: Foundation, Evolution, Mechanism, Ability, and Outlook', 'url': 'https://huggingface.co/papers/2604.02029', 'abstract': "Abstract Latent space is emerging as a fundamental computational substrate for language-based models, offering advantages over explicit token-level approaches through continuous representation that mitigates linguistic redundancy and sequential inefficiency.  AI-generated summary Latent space is rapidly emerging as a native substrate for language-based models. While modern systems are still commonly understood through explicit token-level generation, an increasing body of work shows that many critical internal processes are more naturally carried out in continuous latent space than in human-readable verbal traces. This shift is driven by the structural limitations of explicit-space computation, including linguistic redundancy, discretization bottlenecks, sequential inefficiency, and semantic loss. This survey aims to provide a unified and up-to-date landscape of latent space in language-based models. We organize the survey into five sequential perspectives: Foundation, Evolution, Mechanism, Ability, and Outlook. We begin by delineating the scope of latent space, distinguishing it from explicit or verbal space and from the latent spaces commonly studied in generative visual models. We then trace the field's evolution from early exploratory efforts to the current large-scale expansion. To organize the technical landscape, we examine existing work through the complementary lenses of mechanism and ability. From the perspective of Mechanism, we identify four major lines of development: Architecture, Representation, Computation, and Optimization. From the perspective of Ability, we show how latent space supports a broad capability spectrum spanning Reasoning, Planning, Modeling, Perception, Memory, Collaboration, and Embodiment. Beyond consolidation, we discuss the key open challenges, and outline promising directions for future research. We hope this survey serves not only as a reference for existing work, but also as a foundation for understanding latent space as a general computational and systems paradigm for next-generation intelligence.", 'score': 37, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '883d2ca7e05ff3a7', 'authors': ['Xinlei Yu', 'Zhangquan Chen', 'Yongbo He', 'Tianyu Fu', 'Cheng Yang', 'Chengming Xu', 'Yue Ma', 'Xiaobin Hu', 'Zhe Cao', 'Jie Xu', 'Guibin Zhang', 'Jiale Tao', 'Jiayi Zhang', 'Siyuan Ma', 'Kaituo Feng', 'Haojie Huang', 'Youxing Li', 'Ronghao Chen', 'Huacan Wang', 'Chenglin Wu', 'Zikun Su', 'Xiaogang Xu', 'Kelu Yao', 'Kun Wang', 'Chen Gao', 'Yue Liao', 'Ruqi Huang', 'Tao Jin', 'Cheng Tan', 'Jiangning Zhang', 'Wenqi Ren', 'Yanwei Fu', 'Yong Liu', 'Yu Wang', 'Xiangyu Yue', 'Yu-Gang Jiang', 'Shuicheng Yan'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'DeepWisdom', 'Fudan University', 'Hong Kong University of Science and Technology (Guangzhou)', 'Nanjing University', 'Nanyang Technological University', 'National University of Singapore', 'QuantaAlpha', 'Renmin University of China', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiatong University', 'Sun Yat-sen University', 'Tencent Hunyuan', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'Zhejiang Lab', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02029.jpg', 'data': {'categories': ['#reasoning', '#survey'], 'emoji': '🧠', 'ru': {'title': 'От токенов к невидимому пространству: латентное представление как новая парадигма языковых моделей', 'desc': 'Статья представляет комплексный обзор латентного пространства как фундаментального вычислительного субстрата для языковых моделей, который превосходит традиционный подход на уровне токенов благодаря непрерывному представлению. Авторы организуют исследование по пяти перспективам: основание, эволюция, механизм, способности и перспективы, анализируя архитектуру, представление, вычисления и оптимизацию. Латентное пространство поддерживает широкий спектр возможностей, включая рассуждение, планирование, моделирование, восприятие, память и воплощение. Обзор предлагает унифицированный ландшафт этой парадигмы как основу для понимания следующего поколения интеллектуальных систем.'}, 'en': {'title': 'Unlocking Language Models: The Power of Latent Space', 'desc': 'This paper discusses the importance of latent space in language-based models, highlighting its advantages over traditional token-level approaches. Latent space allows for continuous representation, which reduces issues like linguistic redundancy and inefficiencies in processing sequences. The authors provide a comprehensive overview of the evolution, mechanisms, and capabilities associated with latent space, categorizing their findings into five perspectives. They also identify challenges and future research directions, aiming to establish latent space as a foundational concept for advanced AI systems.'}, 'zh': {'title': '潜在空间：语言模型的新计算范式', 'desc': '潜在空间正在成为语言模型的基础计算平台，相比于显式的标记级方法，它通过连续表示减少了语言冗余和序列效率低下的问题。本文综述了潜在空间在语言模型中的应用，强调其与显式空间的区别，并探讨了该领域的发展历程。我们从机制和能力两个角度分析了潜在空间的技术现状，识别出架构、表示、计算和优化等主要发展方向。最后，文章讨论了当前面临的挑战和未来研究的潜在方向。'}}}, {'id': 'https://huggingface.co/papers/2604.01001', 'title': 'EgoSim: Egocentric World Simulator for Embodied Interaction Generation', 'url': 'https://huggingface.co/papers/2604.01001', 'abstract': 'Abstract  We introduce EgoSim, a closed-loop egocentric world simulator that generates spatially consistent interaction videos and persistently updates the underlying 3D scene state for continuous simulation. Existing egocentric simulators either lack explicit 3D grounding, causing structural drift under viewpoint changes, or treat the scene as static, failing to update world states across multi-stage interactions. EgoSim addresses both limitations by modeling 3D scenes as updatable world states. We generate embodiment interactions via a Geometry-action-aware Observation Simulation model, with spatial consistency from an Interaction-aware State Updating module. To overcome the critical data bottleneck posed by the difficulty in acquiring densely aligned scene-interaction training pairs, we design a scalable pipeline that extracts static point clouds, camera trajectories, and embodiment actions from in-the-wild large-scale monocular egocentric videos. We further introduce EgoCap, a capture system that enables low-cost real-world data collection with uncalibrated smartphones. Extensive experiments demonstrate that EgoSim significantly outperforms existing methods in terms of visual quality, spatial consistency, and generalization to complex scenes and in-the-wild dexterous interactions, while supporting cross-embodiment transfer to robotic manipulation. Codes and datasets will be open soon. The project page is at egosimulator.github.io.', 'score': 23, 'issue_id': 1776, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '93a5e9860947dfce', 'authors': ['Jinkun Hao', 'Mingda Jia', 'Ruiyan Wang', 'Xihui Liu', 'Ran Yi', 'Lizhuang Ma', 'Jiangmiao Pang', 'Xudong Xu'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.01001.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics', '#open_source', '#data', '#video'], 'emoji': '🥽', 'ru': {'title': 'Персистентная 3D симуляция эгоцентрического мира с обновлением состояний', 'desc': 'Авторы представляют EgoSim — замкнутую систему для симуляции эгоцентрического мира, которая генерирует видео с взаимодействиями, сохраняя пространственную согласованность и постоянно обновляя 3D сцену. Существующие симуляторы либо не имеют явной 3D привязки (что приводит к дрейфу структуры при изменении точки обзора), либо рассматривают сцену как статичную. EgoSim решает обе проблемы, моделируя 3D сцены как изменяемые состояния мира с помощью модели наблюдения, осведомлённой о геометрии и действиях. Для преодоления дефицита данных авторы разработали масштабируемый конвейер извлечения информации из больших эгоцентрических видео и систему EgoCap для дешевого сбора реальных данных со смартфонов.'}, 'en': {'title': 'EgoSim: Revolutionizing Egocentric Simulation with Dynamic 3D Interaction', 'desc': 'EgoSim is a novel egocentric world simulator that creates realistic interaction videos while continuously updating the 3D scene state. It overcomes limitations of previous simulators by ensuring spatial consistency and dynamic updates during multi-stage interactions. The simulator uses a Geometry-action-aware Observation Simulation model and an Interaction-aware State Updating module to enhance realism. Additionally, it features a scalable data collection pipeline that utilizes monocular egocentric videos to generate training data, making it effective for complex scenes and robotic manipulation tasks.'}, 'zh': {'title': 'EgoSim：动态更新的自我中心世界模拟器', 'desc': 'EgoSim 是一个闭环的自我中心世界模拟器，能够生成空间一致的交互视频，并持续更新基础的 3D 场景状态以实现连续模拟。现有的自我中心模拟器要么缺乏明确的 3D 基础，导致在视角变化下出现结构漂移，要么将场景视为静态，无法在多阶段交互中更新世界状态。EgoSim 通过将 3D 场景建模为可更新的世界状态来解决这两个问题。我们设计了一个可扩展的管道，从大规模单目自我中心视频中提取静态点云、相机轨迹和交互动作，以克服获取密集对齐场景-交互训练对的困难。'}}}, {'id': 'https://huggingface.co/papers/2604.01007', 'title': 'Omni-SimpleMem: Autoresearch-Guided Discovery of Lifelong Multimodal Agent Memory', 'url': 'https://huggingface.co/papers/2604.01007', 'abstract': 'Abstract An autonomous research pipeline discovers Omni-SimpleMem, a unified multimodal memory framework that significantly improves lifelong AI agent performance through automated architectural modifications, bug fixes, and prompt engineering rather than traditional hyperparameter tuning.  AI-generated summary AI agents increasingly operate over extended time horizons, yet their ability to retain, organize, and recall multimodal experiences remains a critical bottleneck. Building effective lifelong memory requires navigating a vast design space spanning architecture, retrieval strategies, prompt engineering, and data pipelines; this space is too large and interconnected for manual exploration or traditional AutoML to explore effectively. We deploy an autonomous research pipeline to discover Omni-SimpleMem, a unified multimodal memory framework for lifelong AI agents. Starting from a naïve baseline (F1=0.117 on LoCoMo), the pipeline autonomously executes {sim}50 experiments across two benchmarks, diagnosing failure modes, proposing architectural modifications, and repairing data pipeline bugs, all without human intervention in the inner loop. The resulting system achieves state-of-the-art on both benchmarks, improving F1 by +411% on LoCoMo (0.117to0.598) and +214% on Mem-Gallery (0.254to0.797) relative to the initial configurations. Critically, the most impactful discoveries are not hyperparameter adjustments: bug fixes (+175%), architectural changes (+44%), and prompt engineering (+188% on specific categories) each individually exceed the cumulative contribution of all hyperparameter tuning, demonstrating capabilities fundamentally beyond the reach of traditional AutoML. We provide a taxonomy of six discovery types and identify four properties that make multimodal memory particularly suited for autoresearch, offering guidance for applying autonomous research pipelines to other AI system domains. Code is available at this https://github.com/aiming-lab/SimpleMem.', 'score': 15, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'b220a0acaba264d5', 'authors': ['Jiaqi Liu', 'Zipeng Ling', 'Shi Qiu', 'Yanqing Liu', 'Siwei Han', 'Peng Xia', 'Haoqin Tu', 'Zeyu Zheng', 'Cihang Xie', 'Charles Fleming', 'Mingyu Ding', 'Huaxiu Yao'], 'affiliations': ['Cisco', 'UNC-Chapel Hill', 'University of California Berkeley', 'University of California, Santa Cruz', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2604.01007.jpg', 'data': {'categories': ['#multimodal', '#training', '#open_source', '#optimization', '#agents', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Автономное улучшение памяти AI-агентов через структурные изменения, а не подбор параметров', 'desc': 'Автономный исследовательский конвейер обнаружил Omni-SimpleMem — унифицированную мультимодальную систему памяти для долгоживущих AI-агентов, которая работает лучше традиционных подходов. Система была разработана путём автоматического изменения архитектуры, исправления ошибок в данных и инженерии промптов без прямого участия человека. Результаты показали значительное улучшение: F1 метрика выросла на 411% на LoCoMo и на 214% на Mem-Gallery. Важный вывод состоит в том, что наиболее ценные улучшения происходят не от подбора гиперпараметров, а от архитектурных изменений, исправления багов и оптимизации промптов.'}, 'en': {'title': 'Revolutionizing Lifelong AI with Autonomous Memory Frameworks', 'desc': 'This paper presents Omni-SimpleMem, a new multimodal memory framework designed to enhance the performance of lifelong AI agents. The framework is developed through an autonomous research pipeline that automates the process of architectural modifications, bug fixes, and prompt engineering, moving beyond traditional hyperparameter tuning. The results show significant improvements in performance, with F1 scores increasing by 411% and 214% on two benchmarks, demonstrating the effectiveness of the proposed approach. The study also introduces a taxonomy of discovery types and highlights the unique properties of multimodal memory that make it suitable for autonomous research applications.'}, 'zh': {'title': '自主研究管道助力终身AI记忆提升', 'desc': '这篇论文介绍了一种名为Omni-SimpleMem的统一多模态记忆框架，旨在提升终身AI代理的性能。通过自动化的架构修改、错误修复和提示工程，研究管道能够在没有人工干预的情况下进行实验，显著改善AI的记忆能力。研究表明，错误修复和架构变化对性能的提升贡献更大，超越了传统超参数调整的效果。该框架为多模态记忆的研究提供了新的方向，并为其他AI系统领域的自主研究管道应用提供了指导。'}}}, {'id': 'https://huggingface.co/papers/2604.02097', 'title': 'LatentUM: Unleashing the Potential of Interleaved Cross-Modal Reasoning via a Latent-Space Unified Model', 'url': 'https://huggingface.co/papers/2604.02097', 'abstract': 'Abstract LatentUM is a unified model that represents all modalities in a shared semantic latent space, enabling efficient cross-modal reasoning and generation without pixel-space mediation.  AI-generated summary Unified models (UMs) hold promise for their ability to understand and generate content across heterogeneous modalities. Compared to merely generating visual content, the use of UMs for interleaved cross-modal reasoning is more promising and valuable, e.g., for solving understanding problems that require dense visual thinking, improving visual generation through self-reflection, or modeling visual dynamics of the physical world guided by stepwise action interventions. However, existing UMs necessitate pixel decoding as a bridge due to their disjoint visual representations for understanding and generation, which is both ineffective and inefficient. In this paper, we introduce LatentUM, a novel unified model that represents all modalities within a shared semantic latent space, eliminating the need for pixel-space mediation between visual understanding and generation. This design naturally enables flexible interleaved cross-modal reasoning and generation. Beyond improved computational efficiency, the shared representation substantially alleviates codec bias and strengthens cross-modal alignment, allowing LatentUM to achieve state-of-the-art performance on the Visual Spatial Planning benchmark, push the limits of visual generation through self-reflection, and support world modeling by predicting future visual states within the shared semantic latent space.', 'score': 10, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'f29eb8cdb469ac92', 'authors': ['Jiachun Jin', 'Zetong Zhou', 'Xiao Yang', 'Hao Zhang', 'Pengfei Liu', 'Jun Zhu', 'Zhijie Deng'], 'affiliations': ['Shanghai Jiao Tong University', 'Tsinghua University', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2604.02097.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#benchmark'], 'emoji': '🌌', 'ru': {'title': 'Единое пространство для всех модальностей', 'desc': 'LatentUM — это единая модель, которая представляет все модальности в общем семантическом латентном пространстве, избегая необходимости декодирования в пиксельное пространство. Такой подход позволяет эффективно выполнять перекрёстное рассуждение и генерацию контента между различными модальностями без промежуточных преобразований. Модель демонстрирует превосходные результаты в задачах визуального планирования, улучшении генерации изображений через самоанализ и предсказании будущих состояний в физическом мире. Общее представление значительно снижает предвзятость кодека и укрепляет выравнивание между модальностями.'}, 'en': {'title': 'Unified Understanding Across Modalities with LatentUM', 'desc': 'LatentUM is a new unified model that integrates different types of data, like images and text, into a common semantic space. This allows the model to reason and generate content across these different modalities without needing to convert everything into pixel data first. By avoiding pixel-space mediation, LatentUM improves efficiency and reduces biases that can occur when using separate visual representations. As a result, it achieves top performance in tasks like visual planning and can better predict future visual scenarios based on its shared understanding of different data types.'}, 'zh': {'title': '统一模型：跨模态推理与生成的新突破', 'desc': 'LatentUM是一种统一模型，它将所有模态表示在一个共享的语义潜在空间中，从而实现高效的跨模态推理和生成，而无需依赖像素空间的中介。与传统的视觉内容生成相比，LatentUM在交错的跨模态推理中展现出更大的潜力，能够解决需要密集视觉思维的理解问题。该模型通过消除像素解码的需求，显著提高了计算效率，并减轻了编码器偏差，增强了跨模态对齐。LatentUM在视觉空间规划基准测试中表现出色，推动了通过自我反思改善视觉生成的能力，并支持通过预测未来视觉状态来建模物理世界。'}}}, {'id': 'https://huggingface.co/papers/2604.02190', 'title': 'UniDriveVLA: Unifying Understanding, Perception, and Action Planning for Autonomous Driving', 'url': 'https://huggingface.co/papers/2604.02190', 'abstract': 'Abstract UniDriveVLA is a unified vision-language-action model for autonomous driving that decouples spatial perception and semantic reasoning through a mixture-of-transformers architecture with expert coordination and progressive training.  AI-generated summary Vision-Language-Action (VLA) models have recently emerged in autonomous driving, with the promise of leveraging rich world knowledge to improve the cognitive capabilities of driving systems. However, adapting such models for driving tasks currently faces a critical dilemma between spatial perception and semantic reasoning. Consequently, existing VLA systems are forced into suboptimal compromises: directly adopting 2D Vision-Language Models yields limited spatial perception, whereas enhancing them with 3D spatial representations often impairs the native reasoning capacity of VLMs. We argue that this dilemma largely stems from the coupled optimization of spatial perception and semantic reasoning within shared model parameters. To overcome this, we propose UniDriveVLA, a Unified Driving Vision-Language-Action model based on Mixture-of-Transformers that addresses the perception-reasoning conflict via expert decoupling. Specifically, it comprises three experts for driving understanding, scene perception, and action planning, which are coordinated through masked joint attention. In addition, we combine a sparse perception paradigm with a three-stage progressive training strategy to improve spatial perception while maintaining semantic reasoning capability. Extensive experiments show that UniDriveVLA achieves state-of-the-art performance in open-loop evaluation on nuScenes and closed-loop evaluation on Bench2Drive. Moreover, it demonstrates strong performance across a broad range of perception, prediction, and understanding tasks, including 3D detection, online mapping, motion forecasting, and driving-oriented VQA, highlighting its broad applicability as a unified model for autonomous driving. Code and model have been released at https://github.com/xiaomi-research/unidrivevla', 'score': 6, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'cacddcde20f3429c', 'authors': ['Yongkang Li', 'Lijun Zhou', 'Sixu Yan', 'Bencheng Liao', 'Tianyi Yan', 'Kaixin Xiong', 'Long Chen', 'Hongwei Xie', 'Bing Wang', 'Guang Chen', 'Hangjun Ye', 'Wenyu Liu', 'Haiyang Sun', 'Xinggang Wang'], 'affiliations': ['Huazhong University of Science and Technology', 'SKL-IOTSC, University of Macau', 'Xiaomi EV'], 'pdf_title_img': 'assets/pdf/title_img/2604.02190.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#architecture', '#training'], 'emoji': '🚗', 'ru': {'title': 'Разделяй и властвуй: эксперты вместо компромиссов в автономном вождении', 'desc': 'UniDriveVLA — это единая модель vision-language-action для автономного вождения, которая разделяет задачи пространственного восприятия и семантического рассуждения через архитектуру mixture-of-experts с координацией между экспертами. Модель состоит из трёх специализированных трансформеров: для понимания сцены вождения, восприятия окружения и планирования действий, скоординированных через masked joint attention. Авторы применяют разреженную парадигму восприятия и трёхэтапную прогрессивную тренировку, которая улучшает пространственное восприятие без ущерба для способности языковой модели к рассуждению. Модель достигает state-of-the-art результатов в восемнадцати задачах, включая 3D детекцию, картографирование, предсказание движения и визуальный вопросно-ответный диалог для вождения.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Smarter Driving', 'desc': 'UniDriveVLA is a novel model designed for autonomous driving that separates spatial perception from semantic reasoning using a mixture-of-transformers architecture. This approach allows the model to utilize specialized experts for different tasks, such as understanding driving scenarios, perceiving the environment, and planning actions. By employing a progressive training strategy, UniDriveVLA enhances spatial perception without sacrificing the reasoning capabilities of vision-language models. The model has shown superior performance in various driving-related tasks, making it a versatile solution for autonomous driving applications.'}, 'zh': {'title': '统一视觉-语言-行动模型，提升自动驾驶智能', 'desc': 'UniDriveVLA是一种统一的视觉-语言-行动模型，专为自动驾驶设计。它通过混合变换器架构解耦空间感知和语义推理，解决了这两者之间的矛盾。该模型包含三个专家，分别负责驾驶理解、场景感知和行动规划，并通过掩蔽联合注意力进行协调。实验结果表明，UniDriveVLA在多个评估任务中表现优异，展示了其作为自动驾驶统一模型的广泛适用性。'}}}, {'id': 'https://huggingface.co/papers/2604.02296', 'title': 'VOID: Video Object and Interaction Deletion', 'url': 'https://huggingface.co/papers/2604.02296', 'abstract': 'Abstract VOID is a video object removal framework that uses vision-language models and video diffusion models to generate physically plausible scenes by leveraging causal reasoning and counterfactual reasoning.  AI-generated summary Existing video object removal methods excel at inpainting content "behind" the object and correcting appearance-level artifacts such as shadows and reflections. However, when the removed object has more significant interactions, such as collisions with other objects, current models fail to correct them and produce implausible results. We present VOID, a video object removal framework designed to perform physically-plausible inpainting in these complex scenarios. To train the model, we generate a new paired dataset of counterfactual object removals using Kubric and HUMOTO, where removing an object requires altering downstream physical interactions. During inference, a vision-language model identifies regions of the scene affected by the removed object. These regions are then used to guide a video diffusion model that generates physically consistent counterfactual outcomes. Experiments on both synthetic and real data show that our approach better preserves consistent scene dynamics after object removal compared to prior video object removal methods. We hope this framework sheds light on how to make video editing models better simulators of the world through high-level causal reasoning.', 'score': 5, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '0f40b01b533ac96c', 'authors': ['Saman Motamed', 'William Harvey', 'Benjamin Klein', 'Luc Van Gool', 'Zhuoning Yuan', 'Ta-Ying Cheng'], 'affiliations': ['INSAIT, Sofia University St. Kliment Ohridski', 'Netflix'], 'pdf_title_img': 'assets/pdf/title_img/2604.02296.jpg', 'data': {'categories': ['#dataset', '#cv', '#synthetic', '#diffusion', '#multimodal', '#video', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Физически обоснованное удаление объектов из видео через причинное рассуждение', 'desc': 'VOID — это фреймворк для удаления объектов из видео, который использует vision-language модели и видео диффузионные модели для создания физически правдоподобных сцен. Ключевая особенность подхода заключается в применении причинного рассуждения и контрфактического анализа для моделирования физических взаимодействий удаляемых объектов с окружением. Авторы создали новый парный датасет синтетических данных с использованием Kubric и HUMOTO, где удаление объекта требует корректировки его физических взаимодействий. Во время инференса vision-language модель идентифицирует затронутые регионы, а видео диффузионная модель генерирует физически согласованные результаты, превосходя существующие методы по сохранению динамики сцены.'}, 'en': {'title': 'VOID: Realistic Video Object Removal through Causal Reasoning', 'desc': 'The VOID framework addresses the challenge of video object removal by integrating vision-language models with video diffusion models. It focuses on generating realistic scenes when an object is removed, especially in complex interactions like collisions. To train the model, a new dataset was created that includes counterfactual scenarios where physical interactions are altered. The results demonstrate that VOID maintains consistent scene dynamics better than previous methods, enhancing the realism of video editing.'}, 'zh': {'title': 'VOID：物理合理的视频物体移除框架', 'desc': 'VOID是一个视频物体移除框架，利用视觉-语言模型和视频扩散模型生成物理上合理的场景。现有的视频物体移除方法在处理物体后面的内容和修正阴影、反射等外观伪影方面表现良好，但在处理物体与其他物体的复杂交互时，现有模型往往无法产生合理的结果。我们提出的VOID框架能够在这些复杂场景中进行物理合理的修复。通过生成新的配对数据集并使用视觉-语言模型和视频扩散模型，我们的方法在物体移除后更好地保持了场景动态的一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.01569', 'title': 'VideoZeroBench: Probing the Limits of Video MLLMs with Spatio-Temporal Evidence Verification', 'url': 'https://huggingface.co/papers/2604.01569', 'abstract': "Abstract VideoZeroBench presents a comprehensive benchmark for long-video question answering with rigorous spatio-temporal evidence verification, revealing significant gaps in current models' grounded video understanding capabilities.  AI-generated summary Recent video multimodal large language models achieve impressive results across various benchmarks. However, current evaluations suffer from two critical limitations: (1) inflated scores can mask deficiencies in fine-grained visual understanding and reasoning, and (2) answer correctness is often measured without verifying whether models identify the precise spatio-temporal evidence supporting their predictions. To address this, we present VideoZeroBench, a hierarchical benchmark designed for challenging long-video question answering that rigorously verifies spatio-temporal evidence. It comprises 500 manually annotated questions across 13 domains, paired with temporal intervals and spatial bounding boxes as evidence. To disentangle answering generation, temporal grounding, and spatial grounding, we introduce a five-level evaluation protocol that progressively tightens evidence requirements. Experiments show that even Gemini-3-Pro correctly answers fewer than 17% of questions under the standard end-to-end QA setting (Level-3). When grounding constraints are imposed, performance drops sharply: No model exceeds 1% accuracy when both correct answering and accurate spatio-temporal localization are required (Level-5), with most failing to achieve any correct grounded predictions. These results expose a significant gap between surface-level answer correctness and genuine evidence-based reasoning, revealing that grounded video understanding remains a bottleneck for long-video QA. We further analyze performance across minimal evidence spans, atomic abilities, and inference paradigms, providing insights for future research in grounded video reasoning. The benchmark and code will be made publicly available.", 'score': 5, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'c6d23af8d64be2cd', 'authors': ['Jiahao Meng', 'Tan Yue', 'Qi Xu', 'Haochen Wang', 'Zhongwei Ren', 'Weisong Liu', 'Yuhao Wang', 'Renrui Zhang', 'Yunhai Tong', 'Haodong Duan'], 'affiliations': ['BJTU', 'CASIA', 'CUHK', 'PKU', 'WHU'], 'pdf_title_img': 'assets/pdf/title_img/2604.01569.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video'], 'emoji': '🎬', 'ru': {'title': 'Проверка доказательств важнее, чем правильный ответ', 'desc': 'В статье представлен VideoZeroBench — комплексный бенчмарк для ответов на вопросы о длинных видео с проверкой пространственно-временных доказательств. Исследование показывает, что современные видеомультимодальные большие языковые модели дают завышенные оценки, не проверяя, действительно ли модели находят точные временные интервалы и пространственные границы, подтверждающие их ответы. Авторы предложили пятиуровневый протокол оценки, который прогрессивно усиливает требования к доказательствам, выявляя огромный разрыв между простой правильностью ответа и истинным обоснованным рассуждением. Результаты показывают, что даже лучшие модели достигают менее 1% точности, когда требуется одновременно правильный ответ и точная локализация в пространстве-времени, что указывает на необходимость развития обоснованного понимания видео.'}, 'en': {'title': 'Bridging the Gap in Grounded Video Understanding', 'desc': "VideoZeroBench is a new benchmark designed to improve long-video question answering by focusing on the verification of spatio-temporal evidence. It highlights the shortcomings of current models, which often achieve high scores without demonstrating true understanding of video content. The benchmark includes 500 annotated questions with specific temporal and spatial evidence, and it employs a five-level evaluation protocol to assess models' performance rigorously. Results show that existing models struggle significantly when required to provide accurate evidence for their answers, indicating a critical gap in grounded video understanding."}, 'zh': {'title': '揭示长视频问答的时空理解瓶颈', 'desc': 'VideoZeroBench是一个针对长视频问答的综合基准，重点验证时空证据的准确性。当前的视频多模态大语言模型在多个基准上表现出色，但存在评估不足的问题，导致模型的视觉理解能力被高估。该基准包含500个手动标注的问题，配有时空证据，旨在提高问答的准确性。实验结果显示，现有模型在严格的时空定位要求下表现不佳，揭示了基于证据的推理能力仍然是长视频问答的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2604.01676', 'title': 'GPA: Learning GUI Process Automation from Demonstrations', 'url': 'https://huggingface.co/papers/2604.01676', 'abstract': 'Abstract GUI Process Automation (GPA) offers robust, deterministic, and privacy-preserving vision-based robotic process automation with faster execution than current vision-language model approaches.  AI-generated summary GUI Process Automation (GPA) is a lightweight but general vision-based Robotic Process Automation (RPA), which enables fast and stable process replay with only a single demo. Addressing the fragility of traditional RPA and the non-deterministic risks of current vision language model-based GUI agents, GPA introduces three core benefits: (1) Robustness via Sequential Monte Carlo-based localization to handle rescaling and detection uncertainty; (2) Deterministic and Reliability safeguarded by readiness calibration; and (3) Privacy through fast, fully local execution. This approach delivers the adaptability, robustness, and security required for enterprise workflows. It can also be used as an MCP/CLI tool by other agents with coding capabilities so that the agent only reasons and orchestrates while GPA handles the GUI execution. We conducted a pilot experiment to compare GPA with Gemini 3 Pro (with CUA tools) and found that GPA achieves higher success rate with 10 times faster execution speed in finishing long-horizon GUI tasks.', 'score': 5, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '4472e3d35ed3afe8', 'authors': ['Zirui Zhao', 'Jun Hao Liew', 'Yan Yang', 'Wenzhuo Yang', 'Ziyang Luo', 'Doyen Sahoo', 'Silvio Savarese', 'Junnan Li'], 'affiliations': ['Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.01676.jpg', 'data': {'categories': ['#robotics', '#cv', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Детерминированная и надёжная автоматизация графического интерфейса через вероятностную локализацию', 'desc': 'В статье представлена система GUI Process Automation (GPA) — лёгкий и универсальный подход к автоматизации процессов на основе компьютерного зрения, позволяющий воспроизводить рабочие процессы по одной демонстрации. Система решает проблемы хрупкости традиционных RPA-систем и недетерминированности подходов на основе vision-language моделей, используя три ключевых механизма: Sequential Monte Carlo для локализации элементов интерфейса, калибровку готовности для гарантии надёжности и полностью локальное выполнение для приватности. GPA достигает большей надёжности и в 10 раз быстрее обрабатывает долгие последовательности GUI-задач по сравнению с современными моделями типа Gemini 3 Pro.'}, 'en': {'title': 'Fast, Reliable, and Private GUI Automation with GPA', 'desc': 'The paper presents GUI Process Automation (GPA), a new method for robotic process automation that is both fast and reliable. GPA uses vision-based techniques to automate tasks with only one demonstration, making it more efficient than traditional methods. It enhances robustness through Sequential Monte Carlo localization, ensuring accurate performance even with changes in the environment. Additionally, GPA prioritizes privacy by executing tasks locally, making it suitable for enterprise applications that require security and efficiency.'}, 'zh': {'title': '提升企业工作流的智能自动化', 'desc': 'GUI过程自动化（GPA）是一种基于视觉的机器人过程自动化，具有快速执行和隐私保护的优势。它通过单一演示实现快速稳定的过程重放，克服了传统RPA的脆弱性和当前视觉语言模型的非确定性风险。GPA的三大核心优势包括：通过序列蒙特卡洛定位提高鲁棒性，确保可靠性的准备校准，以及通过快速本地执行保护隐私。实验结果表明，GPA在完成长时间的GUI任务时，成功率更高且执行速度快10倍。'}}}, {'id': 'https://huggingface.co/papers/2604.02088', 'title': 'FlowSlider: Training-Free Continuous Image Editing via Fidelity-Steering Decomposition', 'url': 'https://huggingface.co/papers/2604.02088', 'abstract': "Abstract FlowSlider enables continuous image editing with slider-style control by decomposing updates into fidelity and steering components within Rectified Flow, providing stable strength control without additional training.  AI-generated summary Continuous image editing aims to provide slider-style control of edit strength while preserving source-image fidelity and maintaining a consistent edit direction. Existing learning-based slider methods typically rely on auxiliary modules trained with synthetic or proxy supervision. This introduces additional training overhead and couples slider behavior to the training distribution, which can reduce reliability under distribution shifts in edits or domains. We propose FlowSlider, a training-free method for continuous editing in Rectified Flow that requires no post-training. FlowSlider decomposes FlowEdit's update into (i) a fidelity term, which acts as a source-conditioned stabilizer that preserves identity and structure, and (ii) a steering term that drives semantic transition toward the target edit. Geometric analysis and empirical measurements show that these terms are approximately orthogonal, enabling stable strength control by scaling only the steering term while keeping the fidelity term unchanged. As a result, FlowSlider provides smooth and reliable control without post-training, improving continuous editing quality across diverse tasks.", 'score': 3, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '084cd883838f81e9', 'authors': ['Taichi Endo', 'Guoqing Hao', 'Kazuhiko Sumi'], 'affiliations': ['Aoyama Gakuin University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02088.jpg', 'data': {'categories': ['#cv', '#training'], 'emoji': '🎚️', 'ru': {'title': 'Слайдер для управления редактированием: без обучения и с полным контролем', 'desc': 'FlowSlider — это метод для непрерывного редактирования изображений без обучения, который позволяет пользователю контролировать интенсивность редактирования через слайдер. Метод разлагает процесс редактирования на две ортогональные компоненты: компоненту верности (сохранение исходного изображения) и компоненту управления (изменение в сторону целевого редактирования). Благодаря геометрическому анализу авторы показывают, что эти компоненты примерно независимы, что позволяет менять только интенсивность редактирования без изменения направления. Метод работает в рамках архитектуры Rectified Flow и не требует дополнительного обучения или синтетических данных, обеспечивая стабильный и надёжный контроль над редактированием изображений.'}, 'en': {'title': 'FlowSlider: Effortless Image Editing with Stable Control', 'desc': "FlowSlider is a novel method for continuous image editing that allows users to adjust edit strength using slider controls while ensuring the original image quality is maintained. It achieves this by breaking down the editing process into two components: a fidelity term that preserves the image's identity and structure, and a steering term that guides the edits towards the desired outcome. Unlike traditional methods that require additional training and can be affected by changes in data distribution, FlowSlider operates without any post-training, making it more reliable across different editing tasks. The method's design allows for smooth and stable control of edits, enhancing the overall quality of image editing."}, 'zh': {'title': 'FlowSlider：无训练的连续图像编辑新方法', 'desc': 'FlowSlider是一种新的连续图像编辑方法，它通过将更新分解为保真度和引导两个部分来实现滑块式控制。保真度部分确保源图像的身份和结构得以保持，而引导部分则推动语义向目标编辑过渡。与传统的学习基础滑块方法不同，FlowSlider不需要额外的训练，从而减少了训练负担，并提高了在不同编辑或领域下的可靠性。通过几何分析和实证测量，FlowSlider能够实现平滑且可靠的控制，提升了连续编辑的质量。'}}}, {'id': 'https://huggingface.co/papers/2603.27666', 'title': 'Gated Condition Injection without Multimodal Attention: Towards Controllable Linear-Attention Transformers', 'url': 'https://huggingface.co/papers/2603.27666', 'abstract': 'Abstract Controllable diffusion models using linear attention architectures enable secure on-device visual generation with improved multi-condition input handling and faster convergence.  AI-generated summary Recent advances in diffusion-based controllable visual generation have led to remarkable improvements in image quality. However, these powerful models are typically deployed on cloud servers due to their large computational demands, raising serious concerns about user data privacy. To enable secure and efficient on-device generation, we explore in this paper controllable diffusion models built upon linear attention architectures, which offer superior scalability and efficiency, even on edge devices. Yet, our experiments reveal that existing controllable generation frameworks, such as ControlNet and OminiControl, either lack the flexibility to support multiple heterogeneous condition types or suffer from slow convergence on such linear-attention models. To address these limitations, we propose a novel controllable diffusion framework tailored for linear attention backbones like SANA. The core of our method lies in a unified gated conditioning module working in a dual-path pipeline, which effectively integrates multi-type conditional inputs, such as spatially aligned and non-aligned cues. Extensive experiments on multiple tasks and benchmarks demonstrate that our approach achieves state-of-the-art controllable generation performance based on linear-attention models, surpassing existing methods in terms of fidelity and controllability.', 'score': 3, 'issue_id': 1776, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': 'd9aa4a55b028f13d', 'authors': ['Yuhe Liu', 'Zhenxiong Tan', 'Yujia Hu', 'Songhua Liu', 'Xinchao Wang'], 'affiliations': ['National University of Singapore', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.27666.jpg', 'data': {'categories': ['#inference', '#cv', '#diffusion', '#security', '#optimization', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Управляемая генерация на устройстве: диффузионные модели с линейным вниманием', 'desc': 'В работе предлагается новый фреймворк для управляемой генерации изображений, основанный на диффузионных моделях с линейной архитектурой внимания. Основная проблема состояла в том, что существующие методы контроля, такие как ControlNet, либо не поддерживают множество разнородных типов условий, либо сходятся медленно на линейных моделях внимания. Авторы разработали унифицированный модуль условной обработки с механизмом gating, работающий в двухпотоковом конвейере и эффективно интегрирующий различные типы входных условий. Предложенный подход обеспечивает возможность безопасной генерации изображений прямо на устройстве пользователя с улучшенной точностью и степенью управляемости.'}, 'en': {'title': 'Empowering On-Device Visual Generation with Linear Attention', 'desc': 'This paper presents a new approach to controllable diffusion models that utilize linear attention architectures for on-device visual generation. The proposed method addresses the challenges of existing frameworks, which struggle with handling multiple types of input conditions and slow convergence rates. By introducing a unified gated conditioning module in a dual-path pipeline, the model effectively integrates various conditional inputs, enhancing both fidelity and controllability. Experimental results show that this novel framework outperforms current methods, making it a significant advancement in secure and efficient image generation on edge devices.'}, 'zh': {'title': '安全高效的设备端可控生成', 'desc': '本论文探讨了一种基于线性注意力架构的可控扩散模型，旨在实现安全的设备端视觉生成。该模型能够更好地处理多种条件输入，并且收敛速度更快，适合在边缘设备上运行。我们提出了一种新颖的可控扩散框架，采用统一的门控条件模块，能够有效整合多类型的条件输入。实验结果表明，我们的方法在可控生成性能上达到了最先进的水平，超越了现有的技术。'}}}, {'id': 'https://huggingface.co/papers/2604.01666', 'title': 'DynaVid: Learning to Generate Highly Dynamic Videos using Synthetic Motion Data', 'url': 'https://huggingface.co/papers/2604.01666', 'abstract': 'Abstract DynaVid addresses limitations in video diffusion models by using synthetic motion data represented as optical flow to improve realistic video synthesis with dynamic motions and fine-grained motion control.  AI-generated summary Despite recent progress, video diffusion models still struggle to synthesize realistic videos involving highly dynamic motions or requiring fine-grained motion controllability. A central limitation lies in the scarcity of such examples in commonly used training datasets. To address this, we introduce DynaVid, a video synthesis framework that leverages synthetic motion data in training, which is represented as optical flow and rendered using computer graphics pipelines. This approach offers two key advantages. First, synthetic motion offers diverse motion patterns and precise control signals that are difficult to obtain from real data. Second, unlike rendered videos with artificial appearances, rendered optical flow encodes only motion and is decoupled from appearance, thereby preventing models from reproducing the unnatural look of synthetic videos. Building on this idea, DynaVid adopts a two-stage generation framework: a motion generator first synthesizes motion, and then a motion-guided video generator produces video frames conditioned on that motion. This decoupled formulation enables the model to learn dynamic motion patterns from synthetic data while preserving visual realism from real-world videos. We validate our framework on two challenging scenarios, vigorous human motion generation and extreme camera motion control, where existing datasets are particularly limited. Extensive experiments demonstrate that DynaVid improves the realism and controllability in dynamic motion generation and camera motion control.', 'score': 1, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '95ffcef0155121da', 'authors': ['Wonjoon Jin', 'Jiyun Won', 'Janghyeok Han', 'Qi Dai', 'Chong Luo', 'Seung-Hwan Baek', 'Sunghyun Cho'], 'affiliations': ['Microsoft Research Asia', 'POSTECH'], 'pdf_title_img': 'assets/pdf/title_img/2604.01666.jpg', 'data': {'categories': ['#dataset', '#synthetic', '#diffusion', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Синтетический optical flow для реалистичного синтеза видео с динамичными движениями', 'desc': 'DynaVid — это фреймворк для синтеза видео, который решает проблему нехватки примеров с динамичными движениями в обучающих данных путём использования синтетических данных движения, представленных как optical flow. Модель использует двухэтапный подход: сначала генератор движения создаёт паттерны движения, затем видеогенератор, управляемый движением, производит реалистичные видеокадры на основе этого движения. Использование синтетического optical flow позволяет декодировать только информацию о движении без искусственных артефактов внешнего вида, которые характерны для полностью синтезированных видео. Фреймворк демонстрирует значительное улучшение в реалистичности и управляемости при генерации видео с интенсивными движениями человека и экстремальными движениями камеры.'}, 'en': {'title': 'Enhancing Video Synthesis with Synthetic Motion Control', 'desc': 'DynaVid is a video synthesis framework that enhances video diffusion models by incorporating synthetic motion data represented as optical flow. This method addresses the challenges of generating realistic videos with dynamic motions and fine-grained control, which are often limited in traditional training datasets. By using synthetic motion, DynaVid provides diverse motion patterns and precise control signals, while maintaining visual realism by decoupling motion from appearance. The framework operates in two stages: first generating motion and then producing video frames based on that motion, leading to improved realism and controllability in dynamic scenarios.'}, 'zh': {'title': 'DynaVid：提升视频合成的真实感与动态控制', 'desc': 'DynaVid 是一种视频合成框架，旨在解决视频扩散模型在合成动态运动时的局限性。它通过使用光流表示的合成运动数据来提高视频合成的真实感和运动控制的精细度。该方法的两个主要优点是，合成运动提供了多样的运动模式和精确的控制信号，同时避免了合成视频的非自然外观。DynaVid 采用两阶段生成框架，首先合成运动，然后基于该运动生成视频帧，从而在学习动态运动模式的同时保持视觉真实感。'}}}, {'id': 'https://huggingface.co/papers/2604.01619', 'title': 'Automatic Image-Level Morphological Trait Annotation for Organismal Images', 'url': 'https://huggingface.co/papers/2604.01619', 'abstract': 'Abstract Sparse autoencoders trained on foundation-model features produce monosemantic neurons that enable scalable extraction of morphological traits from biological images through a modular annotation pipeline.  AI-generated summary Morphological traits are physical characteristics of biological organisms that provide vital clues on how organisms interact with their environment. Yet extracting these traits remains a slow, expert-driven process, limiting their use in large-scale ecological studies. A major bottleneck is the absence of high-quality datasets linking biological images to trait-level annotations. In this work, we demonstrate that sparse autoencoders trained on foundation-model features yield monosemantic, spatially grounded neurons that consistently activate on meaningful morphological parts. Leveraging this property, we introduce a trait annotation pipeline that localizes salient regions and uses vision-language prompting to generate interpretable trait descriptions. Using this approach, we construct Bioscan-Traits, a dataset of 80K trait annotations spanning 19K insect images from BIOSCAN-5M. Human evaluation confirms the biological plausibility of the generated morphological descriptions. We assess design sensitivity through a comprehensive ablation study, systematically varying key design choices and measuring their impact on the quality of the resulting trait descriptions. By annotating traits with a modular pipeline rather than prohibitively expensive manual efforts, we offer a scalable way to inject biologically meaningful supervision into foundation models, enable large-scale morphological analyses, and bridge the gap between ecological relevance and machine-learning practicality.', 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'd267603658a67bfc', 'authors': ['Vardaan Pahuja', 'Samuel Stevens', 'Alyson East', 'Sydne Record', 'Yu Su'], 'affiliations': ['The Ohio State University', 'University of Maine'], 'pdf_title_img': 'assets/pdf/title_img/2604.01619.jpg', 'data': {'categories': ['#dataset', '#science', '#synthetic', '#cv', '#multimodal', '#interpretability'], 'emoji': '🔬', 'ru': {'title': 'Автоматическое извлечение биологических признаков через интерпретируемые нейроны разреженных автокодировщиков', 'desc': 'В работе предложен метод извлечения морфологических признаков из биологических изображений с использованием разреженных автокодировщиков, обученных на признаках фундаментальных моделей. Авторы продемонстрировали, что такие автокодировщики создают мономодальные нейроны, которые избирательно активируются на значимых морфологических структурах организмов. На основе этого свойства была разработана модульный конвейер аннотирования, использующий vision-language модели для генерации интерпретируемых описаний признаков. Создан датасет Bioscan-Traits из 80K аннотаций морфологических признаков, что позволяет масштабировать процесс анализа в экологических исследованиях и избежать дорогостоящей ручной разметки.'}, 'en': {'title': 'Scalable Trait Annotation for Ecological Insights', 'desc': 'This paper presents a method for extracting morphological traits from biological images using sparse autoencoders trained on foundation-model features. The authors demonstrate that these autoencoders produce monosemantic neurons that activate on specific morphological parts, allowing for effective localization and annotation of traits. They introduce a modular annotation pipeline that combines vision-language prompting to generate interpretable trait descriptions, resulting in the creation of the Bioscan-Traits dataset with 80,000 annotations from 19,000 insect images. This approach significantly reduces the reliance on manual annotation, making large-scale ecological studies more feasible and efficient.'}, 'zh': {'title': '高效提取生物形态特征的智能方法', 'desc': '本研究提出了一种稀疏自编码器，利用基础模型特征训练，能够提取生物图像中的形态特征。形态特征是生物体的物理特征，对理解生物与环境的互动至关重要。通过构建一个模块化的注释管道，我们能够快速定位重要区域并生成可解释的特征描述。最终，我们创建了一个包含8万条特征注释的Bioscan-Traits数据集，支持大规模生态研究。'}}}, {'id': 'https://huggingface.co/papers/2604.02007', 'title': 'Apriel-Reasoner: RL Post-Training for General-Purpose and Efficient Reasoning', 'url': 'https://huggingface.co/papers/2604.02007', 'abstract': 'Abstract Apriel-Reasoner is a 15B-parameter language model trained with reproducible multi-domain reinforcement learning to improve reasoning efficiency and accuracy across diverse tasks while reducing inference costs.  AI-generated summary Building general-purpose reasoning models using reinforcement learning with verifiable rewards (RLVR) across diverse domains has been widely adopted by frontier open-weight models. However, their training recipes and domain mixtures are often not disclosed. Joint optimization across domains poses significant challenges: domains vary widely in rollout length, problem difficulty and sample efficiency. Further, models with long chain-of-thought traces increase inference cost and latency, making efficiency critical for practical deployment. We present Apriel-Reasoner, trained with a fully reproducible multi-domain RL post-training recipe on Apriel-Base, a 15B-parameter open-weight LLM, across five domains using public datasets: mathematics, code generation, instruction following, logical puzzles and function calling. We introduce an adaptive domain sampling mechanism that preserves target domain ratios despite heterogeneous rollout dynamics, and a difficulty-aware extension of the standard length penalty that, with no additional training overhead, encourages longer reasoning for difficult problems and shorter traces for easy ones. Trained with a strict 16K-token output budget, Apriel-Reasoner generalizes to 32K tokens at inference and improves over Apriel-Base on AIME 2025, GPQA, MMLU-Pro, and LiveCodeBench while producing 30-50% shorter reasoning traces. It matches strong open-weight models of similar size at lower token cost, thereby pushing the Pareto frontier of accuracy versus token budget.', 'score': 1, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '01561bc8e40b4e33', 'authors': ['Rafael Pardinas', 'Ehsan Kamalloo', 'David Vazquez', 'Alexandre Drouin'], 'affiliations': ['ServiceNow Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.02007.jpg', 'data': {'categories': ['#reasoning', '#inference', '#training', '#plp', '#open_source', '#optimization', '#rl', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Эффективное многодоменное рассуждение с адаптивной длиной цепочки мысли', 'desc': 'Apriel-Reasoner — это языковая модель с 15 миллиардами параметров, обученная с помощью воспроизводимого многодоменного reinforcement learning для улучшения эффективности и точности рассуждений. Модель использует адаптивный механизм выборки доменов, который сбалансирует разнородные характеристики обучающих данных, и модифицированный штраф за длину цепочки рассуждений, учитывающий сложность задач. Несмотря на бюджет вывода всего в 16K токенов во время обучения, модель обобщается до 32K токенов при инференсе и достигает лучших результатов на тестах AIME 2025, GPQA и других, производя при этом на 30-50% более короткие цепочки рассуждений. Модель устанавливает новый паретов фронтир баланса между точностью и стоимостью токенов для open-weight моделей сопоставимого размера.'}, 'en': {'title': 'Efficient Reasoning Across Domains with Apriel-Reasoner', 'desc': 'Apriel-Reasoner is a large language model designed to enhance reasoning capabilities through multi-domain reinforcement learning. It utilizes a unique training approach that allows it to efficiently handle various tasks, such as mathematics and code generation, while minimizing inference costs. The model incorporates an adaptive domain sampling method to maintain balance across different task difficulties and a length penalty that adjusts based on problem complexity. As a result, Apriel-Reasoner achieves improved performance on several benchmarks while producing shorter reasoning outputs compared to its predecessor, Apriel-Base.'}, 'zh': {'title': '提升推理效率与准确性的多领域模型', 'desc': 'Apriel-Reasoner 是一个拥有 150 亿参数的语言模型，采用可重复的多领域强化学习进行训练，以提高推理效率和准确性，同时降低推理成本。该模型在五个领域（数学、代码生成、指令跟随、逻辑难题和函数调用）上使用公共数据集进行训练。我们引入了一种自适应领域采样机制，能够在不同的领域动态中保持目标领域比例，并且采用了一种难度感知的标准长度惩罚扩展，鼓励在困难问题上进行更长的推理。最终，Apriel-Reasoner 在推理时能够扩展到 32K 令牌，并在多个基准测试中超越了 Apriel-Base，同时生成的推理轨迹缩短了 30-50%。'}}}, {'id': 'https://huggingface.co/papers/2604.00491', 'title': 'Executing as You Generate: Hiding Execution Latency in LLM Code Generation', 'url': 'https://huggingface.co/papers/2604.00491', 'abstract': 'Abstract Parallel execution paradigm for LLM-based coding agents reduces latency by executing code during generation rather than in sequential stages.  AI-generated summary Current LLM-based coding agents follow a serial execution paradigm: the model first generates the complete code, then invokes an interpreter to execute it. This sequential workflow leaves the executor idle during generation and the generator idle during execution, resulting in unnecessary end-to-end latency. We observe that, unlike human developers, LLMs produce code tokens sequentially without revision, making it possible to execute code as it is being generated. We formalize this parallel execution paradigm, modeling it as a three-stage pipeline of generation, detection, and execution, and derive closed-form latency bounds that characterize its speedup potential and operating regimes. We then present Eager, a concrete implementation featuring AST-based chunking, dynamic batching with gated execution, and early error interruption. We evaluate Eager across four benchmarks, seven LLMs, and three execution environments. Results show that Eager reduces the non-overlapped execution latency by up to 99.9% and the end-to-end latency by up to 55% across seven LLMs and four benchmarks.', 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '62c55ebdd7c01faa', 'authors': ['Zhensu Sun', 'Zhihao Lin', 'Zhi Chen', 'Chengran Yang', 'Mingyi Zhou', 'Li Li', 'David Lo'], 'affiliations': ['Beihang University', 'Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2604.00491.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Генерировать и выполнять одновременно: параллелизм для кодирующих агентов', 'desc': 'В работе предложена новая парадигма параллельного выполнения для агентов, основанных на больших языковых моделях, которые пишут код. Вместо того чтобы сначала полностью генерировать код, а затем его выполнять, система Eager начинает выполнять код во время его генерации. Авторы формализуют этот подход как трёхэтапный конвейер: генерация, детектирование и выполнение. В результате удаётся сократить задержку выполнения на 99,9% и общую время обработки на 55% благодаря использованию синтаксических деревьев, динамического батчинга и ранней обработки ошибок.'}, 'en': {'title': 'Revolutionizing Code Execution: Parallel Processing for LLMs', 'desc': 'This paper introduces a new approach for large language model (LLM)-based coding agents that allows for parallel execution of code, which significantly reduces latency. Traditionally, these agents generate code in a sequential manner, leading to idle times during both code generation and execution. The authors propose a three-stage pipeline that includes generation, detection, and execution, enabling code to be executed as it is being generated. Their implementation, called Eager, demonstrates a remarkable reduction in execution latency by up to 99.9% and overall latency by up to 55% across various benchmarks and LLMs.'}, 'zh': {'title': '并行执行，提升编码效率！', 'desc': '这篇论文提出了一种基于大语言模型（LLM）的并行执行范式，用于编码代理，以减少延迟。传统的编码代理采用串行执行方式，先生成完整代码再执行，导致生成和执行阶段的空闲时间。研究表明，LLM可以在生成代码的同时进行执行，从而提高效率。论文中介绍了Eager的具体实现，展示了其在多个基准测试中的显著性能提升。'}}}, {'id': 'https://huggingface.co/papers/2604.00829', 'title': 'LinguDistill: Recovering Linguistic Ability in Vision- Language Models via Selective Cross-Modal Distillation', 'url': 'https://huggingface.co/papers/2604.00829', 'abstract': "Abstract LinguDistill enables recovery of linguistic capabilities in vision-language models through adapter-free distillation using frozen language models as teachers, achieving performance close to pre-adaptation levels while maintaining visual task performance.  AI-generated summary Adapting pretrained language models (LMs) into vision-language models (VLMs) can degrade their native linguistic capability due to representation shift and cross-modal interference introduced during multimodal adaptation. Such loss is difficult to recover, even with targeted task-specific fine-tuning using standard objectives. Prior recovery approaches typically introduce additional modules that act as intermediate alignment layers to maintain or isolate modality-specific subspaces, which increases architectural complexity, adds parameters at inference time, and limits flexibility across models and settings. We propose LinguDis
