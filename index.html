    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.24764', 'title': 'World-R1: Reinforcing 3D Constraints for Text-to-Video Generation', 'url': 'https://huggingface.co/papers/2604.24764', 'abstract': 'Abstract World-R1 framework improves video generation by incorporating 3D constraints through reinforcement learning and specialized text datasets while maintaining visual quality and scalability.  AI-generated summary Recent video foundation models demonstrate impressive visual synthesis but frequently suffer from geometric inconsistencies. While existing methods attempt to inject 3D priors via architectural modifications, they often incur high computational costs and limit scalability. We propose World-R1, a framework that aligns video generation with 3D constraints through reinforcement learning. To facilitate this alignment, we introduce a specialized pure text dataset tailored for world simulation. Utilizing Flow-GRPO, we optimize the model using feedback from pre-trained 3D foundation models and vision-language models to enforce structural coherence without altering the underlying architecture. We further employ a periodic decoupled training strategy to balance rigid geometric consistency with dynamic scene fluidity. Extensive evaluations reveal that our approach significantly enhances 3D consistency while preserving the original visual quality of the foundation model, effectively bridging the gap between video generation and scalable world simulation.', 'score': 86, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '8c5e750f990daa29', 'authors': ['Weijie Wang', 'Xiaoxuan He', 'Youping Gu', 'Yifan Yang', 'Zeyu Zhang', 'Yefei He', 'Yanbo Ding', 'Xirui Hu', 'Donny Y. Chen', 'Zhiyuan He', 'Yuqing Yang', 'Bohan Zhuang'], 'affiliations': ['Independent Researcher', 'Microsoft Research', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24764.jpg', 'data': {'categories': ['#rlhf', '#rl', '#multimodal', '#video', '#dataset', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Трёхмерная согласованность видеогенерации через обучение с подкреплением', 'desc': 'World-R1 — это фреймворк, который улучшает генерацию видео путём введения трёхмерных ограничений с помощью reinforcement learning и специализированных текстовых датасетов. Авторы используют Flow-GRPO для оптимизации модели на основе обратной связи от предобученных 3D моделей и vision-language моделей, не изменяя при этом архитектуру исходной сети. Предложенная периодическая декуплированная стратегия обучения балансирует между геометрической согласованностью и динамикой сцены. Метод существенно повышает трёхмерную консистентность видео, сохраняя качество исходной модели и приближая видеогенерацию к масштабируемой мировой симуляции.'}, 'en': {'title': 'Bridging Video Generation and 3D Consistency', 'desc': 'The World-R1 framework enhances video generation by integrating 3D constraints using reinforcement learning techniques. It addresses the common issue of geometric inconsistencies found in existing video foundation models while ensuring high visual quality and scalability. By introducing a specialized text dataset for world simulation, the framework optimizes video generation through feedback from pre-trained 3D and vision-language models. This approach not only maintains structural coherence but also balances geometric consistency with dynamic scene fluidity, leading to improved 3D consistency in generated videos.'}, 'zh': {'title': '提升视频生成的3D一致性与视觉质量', 'desc': 'World-R1框架通过强化学习和专门的文本数据集，将视频生成与3D约束相结合，从而改善视频生成效果。现有的视频基础模型在视觉合成方面表现出色，但常常存在几何不一致的问题。我们提出的World-R1框架利用Flow-GRPO优化模型，确保结构一致性，同时不改变基础架构。通过周期性解耦训练策略，我们在保持动态场景流畅性的同时，平衡了刚性几何一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.22446', 'title': 'From Skills to Talent: Organising Heterogeneous Agents as a Real-World Company', 'url': 'https://huggingface.co/papers/2604.22446', 'abstract': 'Abstract OneManCompany (OMC) introduces an organizational framework for multi-agent systems that enables dynamic team assembly, governance, and improvement through portable agent identities and hierarchical decision-making processes.  AI-generated summary Individual agent capabilities have advanced rapidly through modular skills and tool integrations, yet multi-agent systems remain constrained by fixed team structures, tightly coupled coordination logic, and session-bound learning. We argue that this reflects a deeper absence: a principled organisational layer that governs how a workforce of agents is assembled, governed, and improved over time, decoupled from what individual agents know. To fill this gap, we introduce OneManCompany (OMC), a framework that elevates multi-agent systems to the organisational level. OMC encapsulates skills, tools, and runtime configurations into portable agent identities called Talents, orchestrated through typed organisational interfaces that abstract over heterogeneous backends. A community-driven Talent Market enables on-demand recruitment, allowing the organisation to close capability gaps and reconfigure itself dynamically during execution. Organisational decision-making is operationalised through an Explore-Execute-Review (E^2R) tree search, which unifies planning, execution, and evaluation in a single hierarchical loop: tasks are decomposed top-down into accountable units and execution outcomes are aggregated bottom-up to drive systematic review and refinement. This loop provides formal guarantees on termination and deadlock freedom while mirroring the feedback mechanisms of human enterprises. Together, these contributions transform multi-agent systems from static, pre-configured pipelines into self-organising and self-improving AI organisations capable of adapting to open-ended tasks across diverse domains. Empirical evaluation on PRDBench shows that OMC achieves an 84.67% success rate, surpassing the state of the art by 15.48 percentage points, with cross-domain case studies further demonstrating its generality.', 'score': 73, 'issue_id': 2070, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'eec54c7b8aeb3f1f', 'authors': ['Zhengxu Yu', 'Yu Fu', 'Zhiyuan He', 'Yuxuan Huang', 'Lee Ka Yiu', 'Meng Fang', 'Weilin Luo', 'Jun Wang'], 'affiliations': ['Digital Talent Market: https://one-man-company.com/market', 'Project Homepage: https://one-man-company.com', 'Repository: https://1mancompany.github.io/OneManCompany'], 'pdf_title_img': 'assets/pdf/title_img/2604.22446.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🏢', 'ru': {'title': 'Самоорганизующиеся AI-организации через динамическую комплектацию и иерархический контроль агентов', 'desc': 'OneManCompany (OMC) представляет организационную архитектуру для многоагентных систем, которая решает проблему статических конфигураций и жесткой координации. Система вводит концепцию портативных идентичностей агентов (Talents), содержащих навыки, инструменты и конфигурации, которые можно динамически переназначать через Talent Market. Управление решениями в организации реализуется через иерархический поиск Explore-Execute-Review (E²R), который объединяет планирование, выполнение и оценку в единый цикл обратной связи с гарантиями завершения и отсутствия deadlock. Экспериментальная оценка демонстрирует 84.67% успешность задач, превосходя существующие подходы на 15.48 процентных пункта.'}, 'en': {'title': 'Transforming Multi-Agent Systems into Adaptive AI Organizations', 'desc': 'OneManCompany (OMC) is a new framework designed for multi-agent systems that allows for flexible team formation and management. It introduces portable agent identities called Talents, which encapsulate various skills and tools, enabling dynamic recruitment and reconfiguration of agents during tasks. OMC employs a hierarchical decision-making process through an Explore-Execute-Review (E^2R) tree search, which integrates planning, execution, and evaluation in a continuous feedback loop. This approach enhances the adaptability and self-improvement of AI organizations, allowing them to tackle a wide range of tasks more effectively than traditional static systems.'}, 'zh': {'title': '动态组建与自我改进的智能体组织框架', 'desc': 'OneManCompany（OMC）提出了一种多智能体系统的组织框架，能够通过可移植的智能体身份和分层决策过程实现动态团队组建、治理和改进。该框架将技能、工具和运行时配置封装为称为“才能”的可移植智能体身份，并通过类型化的组织接口进行协调。OMC还引入了一种探索-执行-评审（E^2R）树搜索的方法，将规划、执行和评估统一在一个层次循环中，从而实现系统的自我组织和自我改进。实证评估表明，OMC在PRDBench上的成功率达到84.67%，超越了现有技术15.48个百分点，展示了其在多领域的适应性。'}}}, {'id': 'https://huggingface.co/papers/2604.24300', 'title': 'ReVSI: Rebuilding Visual Spatial Intelligence Evaluation for Accurate Assessment of VLM 3D Reasoning', 'url': 'https://huggingface.co/papers/2604.24300', 'abstract': "Abstract ReVSI addresses flaws in current spatial intelligence evaluation by creating a validated benchmark with improved annotations and controlled frame sampling conditions.  AI-generated summary Current evaluations of spatial intelligence can be systematically invalid under modern vision-language model (VLM) settings. First, many benchmarks derive question-answer (QA) pairs from point-cloud-based 3D annotations originally curated for traditional 3D perception. When such annotations are treated as ground truth for video-based evaluation, reconstruction and annotation artifacts can miss objects that are clearly visible in the video, mislabel object identities, or corrupt geometry-dependent answers (e.g., size), yielding incorrect or ambiguous QA pairs. Second, evaluations often assume full-scene access, while many VLMs operate on sparsely sampled frames (e.g., 16-64), making many questions effectively unanswerable under the actual model inputs. We improve evaluation validity by introducing ReVSI, a benchmark and protocol that ensures each QA pair is answerable and correct under the model's actual inputs. To this end, we re-annotate objects and geometry across 381 scenes from 5 datasets to improve data quality, and regenerate all QA pairs with rigorous bias mitigation and human verification using professional 3D annotation tools. We further enhance evaluation controllability by providing variants across multiple frame budgets (16/32/64/all) and fine-grained object visibility metadata, enabling controlled diagnostic analyses. Evaluations of general and domain-specific VLMs on ReVSI reveal systematic failure modes that are obscured by prior benchmarks, yielding a more reliable and diagnostic assessment of spatial intelligence.", 'score': 53, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '0dd97ae68d233b37', 'authors': ['Yiming Zhang', 'Jiacheng Chen', 'Jiaqi Tan', 'Yongsen Mao', 'Wenhu Chen', 'Angel X. Chang'], 'affiliations': ["Huawei Noah's Ark Lab", 'Simon Fraser University', 'University of Toronto', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.24300.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#video', '#survey', '#dataset', '#cv'], 'emoji': '🎬', 'ru': {'title': 'Честная проверка пространственного мышления видеомоделей', 'desc': 'В работе предложена улучшенная методология оценки пространственного понимания видеомоделями на базе нового бенчмарка ReVSI. Авторы выявили, что существующие тесты содержат артефакты из-за несоответствия между трёхмерными аннотациями, созданными для облаков точек, и видеоданными, что приводит к некорректным вопросно-ответным парам. Кроме того, они учитывают реальные условия работы видео-языковых моделей, которые обрабатывают разреженные кадры вместо полной последовательности. Благодаря переаннотированию данных, проверке вручную и вариативности по количеству кадров бенчмарк обеспечивает более надёжную диагностику способности моделей к пространственному анализу.'}, 'en': {'title': 'ReVSI: Elevating Spatial Intelligence Evaluation for VLMs', 'desc': "The paper introduces ReVSI, a new benchmark designed to improve the evaluation of spatial intelligence in vision-language models (VLMs). It addresses issues with existing benchmarks that use outdated 3D annotations, which can lead to incorrect question-answer pairs due to mislabeling and missing objects. ReVSI ensures that each question is answerable based on the model's actual inputs by re-annotating scenes and generating new QA pairs with human verification. This benchmark also allows for controlled evaluations across different frame budgets, revealing systematic failures in VLMs that previous benchmarks overlooked."}, 'zh': {'title': 'ReVSI：提升空间智能评估的可靠性', 'desc': 'ReVSI是一个新的基准测试，旨在解决当前空间智能评估中的缺陷。它通过改进的注释和受控的帧采样条件，确保每个问答对在模型的实际输入下都是可回答和正确的。我们重新注释了来自五个数据集的381个场景中的对象和几何信息，并使用专业的3D注释工具进行严格的偏差缓解和人工验证。通过提供多种帧预算的变体和细粒度的对象可见性元数据，ReVSI增强了评估的可控性，揭示了以往基准测试所掩盖的系统性失败模式。'}}}, {'id': 'https://huggingface.co/papers/2604.23775', 'title': 'Vision-Language-Action Safety: Threats, Challenges, Evaluations, and Mechanisms', 'url': 'https://huggingface.co/papers/2604.23775', 'abstract': 'Abstract Vision-Language-Action models present unique safety challenges due to their embodied nature, requiring unified approaches across multiple domains to address threats from data poisoning to adversarial attacks and ensuring secure deployment across various applications.  AI-generated summary Vision-Language-Action (VLA) models are emerging as a unified substrate for embodied intelligence. This shift raises a new class of safety challenges, stemming from the embodied nature of VLA systems, including irreversible physical consequences, a multimodal attack surface across vision, language, and state, real-time latency constraints on defense, error propagation over long-horizon trajectories, and vulnerabilities in the data supply chain. Yet the literature remains fragmented across robotic learning, adversarial machine learning, AI alignment, and autonomous systems safety. This survey provides a unified and up-to-date overview of safety in Vision-Language-Action models. We organize the field along two parallel timing axes, attack timing (training-time vs. inference-time and defense timing (training-time vs. inference-time, linking each class of threat to the stage at which it can be mitigated. We first define the scope of VLA safety, distinguishing it from text-only LLM safety and classical robotic safety, and review the foundations of VLA models, including architectures, training paradigms, and inference mechanisms. We then examine the literature through four lenses: Attacks, Defenses, Evaluation, and Deployment. We survey training-time threats such as data poisoning and backdoors, as well as inference-time attacks including adversarial patches, cross-modal perturbations, semantic jailbreaks, and freezing attacks. We review training-time and runtime defenses, analyze existing benchmarks and metrics, and discuss safety challenges across six deployment domains. Finally, we highlight key open problems, including certified robustness for embodied trajectories, physically realizable defenses, safety-aware training, unified runtime safety architectures, and standardized evaluation.', 'score': 40, 'issue_id': 2069, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': '3d7517f3707d37a9', 'authors': ['Qi Li', 'Bo Yin', 'Weiqi Huang', 'Ruhao Liu', 'Bojun Zou', 'Runpeng Yu', 'Jingwen Ye', 'Weihao Yu', 'Xinchao Wang'], 'affiliations': ['Monash University', 'National University of Singapore', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23775.jpg', 'data': {'categories': ['#alignment', '#security', '#agents', '#robotics', '#benchmark', '#multimodal', '#survey'], 'emoji': '🤖', 'ru': {'title': 'Безопасность воплощённых мультимодальных моделей: от атак к защите', 'desc': 'В статье рассматриваются уникальные угрозы безопасности для Vision-Language-Action моделей, которые объединяют зрение, язык и управление действиями в единую систему для воплощённого интеллекта. Авторы классифицируют атаки и защиты по времени их применения: на этапе обучения (отравление данных, бэкдоры) и на этапе инференса (adversarial patches, семантические jailbreaks). Предложенный обзор охватывает различные области угроз безопасности, включая оценку уязвимостей, методы защиты и развёртывание моделей в реальных приложениях. Исследование определяет открытые проблемы, такие как гарантированная робастность для траекторий действий и стандартизированные методы оценки безопасности.'}, 'en': {'title': 'Ensuring Safety in Vision-Language-Action Models', 'desc': "This paper discusses the safety challenges associated with Vision-Language-Action (VLA) models, which integrate visual, linguistic, and action-based intelligence. It highlights the unique risks these models face, such as data poisoning and adversarial attacks, due to their embodied nature and the complexity of their multimodal interactions. The authors provide a comprehensive overview of the current state of VLA safety, categorizing threats and defenses based on when they occur during the model's lifecycle. They also identify key areas for future research, emphasizing the need for robust safety measures and standardized evaluation methods in the deployment of VLA systems."}, 'zh': {'title': '确保视觉-语言-行动模型的安全性', 'desc': '视觉-语言-行动（VLA）模型由于其具身特性，面临独特的安全挑战。这些挑战包括数据中毒、对抗攻击等多种威胁，要求在多个领域采取统一的方法来确保安全部署。本文提供了VLA模型安全性的最新概述，区分了训练时和推理时的攻击与防御，并探讨了训练时间威胁和推理时间攻击。最后，文章强调了在具身轨迹、物理可实现防御和安全意识训练等方面的关键开放问题。'}}}, {'id': 'https://huggingface.co/papers/2604.24763', 'title': 'Tuna-2: Pixel Embeddings Beat Vision Encoders for Multimodal Understanding and Generation', 'url': 'https://huggingface.co/papers/2604.24763', 'abstract': "Abstract Tuna-2 is a unified multimodal model that performs visual understanding and generation directly from pixel embeddings without pretrained vision encoders, achieving state-of-the-art performance in multimodal benchmarks.  AI-generated summary Unified multimodal models typically rely on pretrained vision encoders and use separate visual representations for understanding and generation, creating misalignment between the two tasks and preventing fully end-to-end optimization from raw pixels. We introduce Tuna-2, a native unified multimodal model that performs visual understanding and generation directly based on pixel embeddings. Tuna-2 drastically simplifies the model architecture by employing simple patch embedding layers to encode visual input, completely discarding the modular vision encoder designs such as the VAE or the representation encoder. Experiments show that Tuna-2 achieves state-of-the-art performance in multimodal benchmarks, demonstrating that unified pixel-space modelling can fully compete with latent-space approaches for high-quality image generation. Moreover, while the encoder-based variant converges faster in early pretraining, Tuna-2's encoder-free design achieves stronger multimodal understanding at scale, particularly on tasks requiring fine-grained visual perception. These results show that pretrained vision encoders are not necessary for multimodal modelling, and end-to-end pixel-space learning offers a scalable path toward stronger visual representations for both generation and perception.", 'score': 34, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '71bcd20561e6e71c', 'authors': ['Zhiheng Liu', 'Weiming Ren', 'Xiaoke Huang', 'Shoufa Chen', 'Tianhong Li', 'Mengzhao Chen', 'Yatai Ji', 'Sen He', 'Jonas Schult', 'Belinda Zeng', 'Tao Xiang', 'Wenhu Chen', 'Ping Luo', 'Luke Zettlemoyer', 'Yuren Cong'], 'affiliations': ['Meta AI', 'The University of Hong Kong', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.24763.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная модель без предварительно обученных энкодеров', 'desc': 'Tuna-2 — это унифицированная мультимодальная модель, которая выполняет задачи понимания и генерации изображений напрямую из пиксельных эмбеддингов, отказываясь от предварительно обученных энкодеров зрения. Модель использует простые слои patch embedding для кодирования визуальной информации, полностью устраняя модульные архитектуры как VAE и representation encoder. Благодаря сквозному обучению в пиксельном пространстве Tuna-2 достигает результатов на уровне state-of-the-art в мультимодальных бенчмарках и конкурирует с подходами в латентном пространстве. Эксперименты показывают, что предварительно обученные энкодеры зрения не являются необходимыми для мультимодального моделирования, а сквозное обучение открывает масштабируемый путь к более сильным визуальным представлениям.'}, 'en': {'title': 'Tuna-2: Revolutionizing Multimodal Learning from Pixels', 'desc': 'Tuna-2 is a novel multimodal model that directly processes pixel embeddings for both visual understanding and generation, eliminating the need for pretrained vision encoders. This approach addresses the misalignment issues found in traditional models that use separate visual representations for different tasks. By utilizing simple patch embedding layers, Tuna-2 simplifies its architecture while achieving state-of-the-art results in multimodal benchmarks. The findings suggest that end-to-end learning from raw pixels can outperform conventional latent-space methods, particularly in tasks requiring detailed visual perception.'}, 'zh': {'title': 'Tuna-2：无编码器的多模态新突破', 'desc': 'Tuna-2是一种统一的多模态模型，能够直接从像素嵌入中进行视觉理解和生成，而无需预训练的视觉编码器。与传统模型依赖于预训练视觉编码器不同，Tuna-2通过简单的补丁嵌入层来编码视觉输入，简化了模型架构。实验表明，Tuna-2在多模态基准测试中表现出色，证明了基于像素空间的建模可以与潜在空间方法竞争。该模型的无编码器设计在大规模任务中实现了更强的多模态理解，尤其是在需要细致视觉感知的任务上。'}}}, {'id': 'https://huggingface.co/papers/2604.23781', 'title': 'ClawMark: A Living-World Benchmark for Multi-Turn, Multi-Day, Multimodal Coworker Agents', 'url': 'https://huggingface.co/papers/2604.23781', 'abstract': 'Abstract A benchmark for evaluating language-model agents in multi-day collaborative workflows with evolving environmental states across multiple service domains.  AI-generated summary Language-model agents are increasingly used as persistent coworkers that assist users across multiple working days. During such workflows, the surrounding environment may change independently of the agent: new emails arrive, calendar entries shift, knowledge-base records are updated, and evidence appears across images, scanned PDFs, audio, video, and spreadsheets. Existing benchmarks do not adequately evaluate this setting because they typically run within a single static episode and remain largely text-centric. We introduce , a benchmark for coworker agents built around multi-turn multi-day tasks, a stateful sandboxed service environment whose state evolves between turns, and rule-based verification. The current release contains 100 tasks across 13 professional scenarios, executed against five stateful sandboxed services (filesystem, email, calendar, knowledge base, spreadsheet) and scored by 1537 deterministic Python checkers over post-execution service state; no LLM-as-judge is invoked during scoring. We benchmark seven frontier agent systems. The strongest model reaches 75.8 weighted score, but the best strict Task Success is only 20.0\\%, indicating that partial progress is common while complete end-to-end workflow completion remains rare. Turn-level analysis shows that performance drops after the first exogenous environment update, highlighting adaptation to changing state as a key open challenge. We release the benchmark, evaluation harness, and construction pipeline to support reproducible coworker-agent evaluation.', 'score': 23, 'issue_id': 2069, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'f7a0f39155a0ee5e', 'authors': ['Fanqing Meng', 'Lingxiao Du', 'Zijian Wu', 'Guanzheng Chen', 'Xiangyan Liu', 'Jiaqi Liao', 'Chonghe Jiang', 'Zhenglin Wan', 'Jiawei Gu', 'Pengfei Zhou', 'Rui Huang', 'Ziqi Zhao', 'Shengyuan Ding', 'Ailing Yu', 'Bo Peng', 'Bowei Xia', 'Hao Sun', 'Haotian Liang', 'Ji Xie', 'Jiajun Chen', 'Jiajun Song', 'Liu Yang', 'Ming Xu', 'Qionglin Qiu', 'Runhao Fu', 'Shengfang Zhai', 'Shijian Wang', 'Tengfei Ma', 'Tianyi Wu', 'Weiyang Jin', 'Yan Wang', 'Yang Dai', 'Yao Lai', 'Youwei Shu', 'Yue Liu', 'Yunzhuo Hao', 'Yuwei Niu', 'Jinkai Huang', 'Jiayuan Zhuo', 'Zhennan Shen', 'Linyu Wu', 'Cihang Xie', 'Yuyin Zhou', 'Jiaheng Zhang', 'Zeyu Zheng', 'Mengkang Hu', 'Michael Qizhe Shieh'], 'affiliations': ['evolvent.co'], 'pdf_title_img': 'assets/pdf/title_img/2604.23781.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Оценка способности языковых моделей действовать как адаптивные рабочие помощники в изменяющейся среде', 'desc': 'В работе предлагается бенчмарк для оценки агентов на основе больших языковых моделей в многодневных рабочих процессах, где окружающая среда изменяется независимо от действий агента. Бенчмарк включает 100 задач в 13 профессиональных сценариях с пятью сервисами (файловая система, почта, календарь, база знаний, таблицы) и использует детерминированные проверки на основе состояния системы. Авторы протестировали семь современных агентских систем и обнаружили, что даже лучшие модели достигают только 20% полного успеха, в то время как производительность значительно падает после первого изменения окружения. Работа демонстрирует, что адаптация к изменяющемуся состоянию остаётся ключевой нерешённой проблемой при разработке персональных цифровых помощников.'}, 'en': {'title': 'Evaluating Language-Model Agents in Evolving Workflows', 'desc': 'This paper presents a new benchmark designed to evaluate language-model agents in collaborative workflows that span multiple days and involve changing environmental conditions. Unlike previous benchmarks that focus on static, text-based tasks, this benchmark incorporates evolving states from various service domains such as email and calendars. It includes 100 tasks across 13 professional scenarios, with performance assessed through deterministic Python checkers rather than relying on language models for evaluation. The findings reveal that while the best-performing agent achieves a weighted score of 75.8, complete task success is low, indicating significant challenges in adapting to dynamic environments.'}, 'zh': {'title': '动态环境下的语言模型代理评估基准', 'desc': '本文介绍了一种新的基准测试，用于评估语言模型代理在多天协作工作流程中的表现。这些工作流程中，环境状态会不断变化，例如新邮件的到达和日历条目的调整。现有的基准测试主要集中在静态的文本场景中，无法有效评估这种动态环境下的代理表现。我们提出的基准测试包含100个任务，涵盖13个专业场景，旨在支持对协作代理的可重复评估。'}}}, {'id': 'https://huggingface.co/papers/2604.22875', 'title': 'SketchVLM: Vision language models can annotate images to explain thoughts and guide users', 'url': 'https://huggingface.co/papers/2604.22875', 'abstract': "Abstract SketchVLM is a training-free framework that enables vision-language models to generate editable SVG overlays for visual explanations, improving reasoning accuracy and annotation quality across multiple benchmarks.  AI-generated summary When answering questions about images, humans naturally point, label, and draw to explain their reasoning. In contrast, modern vision-language models (VLMs) such as Gemini-3-Pro and GPT-5 only respond with text, which can be difficult for users to verify. We present SketchVLM, a training-free, model-agnostic framework that enables VLMs to produce non-destructive, editable SVG overlays on the input image to visually explain their answers. Across seven benchmarks spanning visual reasoning (maze navigation, ball-drop trajectory prediction, and object counting) and drawing (part labeling, connecting-the-dots, and drawing shapes around objects), SketchVLM improves visual reasoning task accuracy by up to +28.5 percentage points and annotation quality by up to 1.48x relative to image-editing and fine-tuned sketching baselines, while also producing annotations that are more faithful to the model's stated answer. We find that single-turn generation already achieves strong accuracy and annotation quality, and multi-turn generation opens up further opportunities for human-AI collaboration. An interactive demo and code are at https://sketchvlm.github.io/.", 'score': 16, 'issue_id': 2069, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '4d77d7e627368880', 'authors': ['Brandon Collins', 'Logan Bolton', 'Hung Huy Nguyen', 'Mohammad Reza Taesiri', 'Trung Bui', 'Anh Totti Nguyen'], 'affiliations': ['Adobe Research', 'Auburn University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22875.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '✏️', 'ru': {'title': 'Визуальные объяснения через редактируемые чертежи', 'desc': 'SketchVLM — это фреймворк без обучения, который позволяет видео-языковым моделям генерировать редактируемые SVG-наложения для визуального объяснения своих ответов на вопросы об изображениях. Система улучшает точность рассуждений на множестве бенчмарков, включающих задачи визуального анализа (навигация в лабиринтах, предсказание траекторий, подсчёт объектов) и рисования (разметка деталей, соединение точек, обозначение объектов). Благодаря использованию модель-агностичного подхода, SketchVLM достигает прироста точности до 28,5% и улучшает качество аннотаций в 1,48 раза по сравнению с базовыми методами. Фреймворк поддерживает как односторонние, так и многоходовые режимы взаимодействия между человеком и моделью, обеспечивая более прозрачное объяснение решений VLM.'}, 'en': {'title': 'Empowering Visual Explanations with Editable SVG Overlays', 'desc': 'SketchVLM is a novel framework that enhances vision-language models by allowing them to create editable SVG overlays for visual explanations. This approach addresses the limitations of traditional models that only provide text responses, making it easier for users to verify the reasoning behind answers. By applying SketchVLM across various benchmarks, it significantly boosts the accuracy of visual reasoning tasks and improves the quality of annotations. The framework is model-agnostic and does not require additional training, facilitating better human-AI collaboration in interpreting visual data.'}, 'zh': {'title': '视觉语言模型的新突破：可编辑的SVG叠加层', 'desc': 'SketchVLM是一个无需训练的框架，能够让视觉语言模型生成可编辑的SVG叠加层，以提供视觉解释。这种方法提高了推理准确性和注释质量，适用于多个基准测试。与传统的仅用文本回答问题的视觉语言模型不同，SketchVLM允许模型在输入图像上进行非破坏性的可视化解释。通过在七个基准测试中进行评估，SketchVLM在视觉推理任务的准确性上提高了多达28.5个百分点，注释质量也显著提升。'}}}, {'id': 'https://huggingface.co/papers/2604.24198', 'title': 'Rewarding the Scientific Process: Process-Level Reward Modeling for Agentic Data Analysis', 'url': 'https://huggingface.co/papers/2604.24198', 'abstract': 'Abstract DataPRM, a novel environment-aware generative process reward model, enhances LLM reasoning in dynamic data analysis by detecting silent errors and employing a reflection-aware ternary reward strategy, achieving superior performance on benchmark tasks.  AI-generated summary Process Reward Models (PRMs) have achieved remarkable success in augmenting the reasoning capabilities of Large Language Models (LLMs) within static domains such as mathematics. However, their potential in dynamic data analysis tasks remains underexplored. In this work, we first present a empirical study revealing that general-domain PRMs struggle to supervise data analysis agents. Specifically, they fail to detect silent errors, logical flaws that yield incorrect results without triggering interpreter exceptions, and erroneously penalize exploratory actions, mistaking necessary trial-and-error exploration for grounding failures. To bridge this gap, we introduce DataPRM, a novel environment-aware generative process reward model that (1) can serve as an active verifier, autonomously interacting with the environment to probe intermediate execution states and uncover silent errors, and (2) employs a reflection-aware ternary reward strategy that distinguishes between correctable grounding errors and irrecoverable mistakes. We design a scalable pipeline to construct over 8K high-quality training instances for DataPRM via diversity-driven trajectory generation and knowledge-augmented step-level annotation. Experimental results demonstrate that DataPRM improves downstream policy LLMs by 7.21% on ScienceAgentBench and 11.28% on DABStep using Best-of-N inference. Notably, with only 4B parameters, DataPRM outperforms strong baselines, and exhibits robust generalizability across diverse Test-Time Scaling strategies. Furthermore, integrating DataPRM into Reinforcement Learning yields substantial gains over outcome-reward baselines, achieving 78.73% on DABench and 64.84% on TableBench, validating the effectiveness of process reward supervision. Code is available at https://github.com/zjunlp/DataMind.', 'score': 14, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '0c1db61de634ba2e', 'authors': ['Zhisong Qiu', 'Shuofei Qiao', 'Kewei Xu', 'Yuqi Zhu', 'Lun Du', 'Ningyu Zhang', 'Huajun Chen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24198.jpg', 'data': {'categories': ['#small_models', '#rlhf', '#science', '#training', '#agents', '#benchmark', '#reasoning', '#dataset', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умная верификация процесса рассуждения в анализе данных', 'desc': 'В статье представлена DataPRM — модель вознаграждения процесса, которая улучшает способность больших языковых моделей к рассуждению в задачах анализа данных. Ключевая инновация заключается в том, что модель может активно взаимодействовать с окружением для выявления скрытых ошибок — логических ошибок, которые приводят к неправильным результатам без исключений интерпретатора. DataPRM использует стратегию трёхуровневого вознаграждения, которая различает исправляемые и неисправимые ошибки, а также не штрафует необходимые исследовательские действия модели. Экспериментальные результаты показывают значительное улучшение производительности: на 7,21% для ScienceAgentBench и на 11,28% для DABStep, при этом модель демонстрирует хорошую обобщаемость и работает эффективно даже с 4B параметрами.'}, 'en': {'title': 'Enhancing LLM Reasoning with DataPRM: A New Era in Dynamic Data Analysis', 'desc': 'The paper introduces DataPRM, a new generative process reward model designed to enhance the reasoning abilities of Large Language Models (LLMs) in dynamic data analysis. It addresses the limitations of existing Process Reward Models (PRMs) that struggle to identify silent errors and misinterpret exploratory actions as failures. DataPRM employs an environment-aware approach, actively verifying execution states to detect errors and using a reflection-aware ternary reward strategy to differentiate between correctable and irrecoverable mistakes. Experimental results show that DataPRM significantly improves the performance of LLMs on various benchmarks, demonstrating its effectiveness in dynamic environments.'}, 'zh': {'title': '提升动态数据分析的推理能力', 'desc': '本文提出了一种新颖的环境感知生成过程奖励模型DataPRM，旨在提升大型语言模型（LLM）在动态数据分析中的推理能力。DataPRM能够主动验证数据分析代理的执行状态，识别潜在的静默错误，并采用反思感知的三元奖励策略，区分可纠正的错误和不可恢复的错误。通过构建超过8000个高质量的训练实例，DataPRM在多个基准任务上表现出色，显著提高了下游策略LLM的性能。实验结果表明，DataPRM在不同的测试时间扩展策略中展现出强大的泛化能力，验证了过程奖励监督的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.21480', 'title': 'Efficient Agent Evaluation via Diversity-Guided User Simulation', 'url': 'https://huggingface.co/papers/2604.21480', 'abstract': 'Abstract DIVERT is a coverage-guided user simulation framework that efficiently evaluates large language models by reusing conversation prefixes and exploring diverse interaction paths through branching trajectories.  AI-generated summary Large language models (LLMs) are increasingly deployed as customer-facing agents, yet evaluating their reliability remains challenging due to stochastic, multi-turn interactions. Current evaluation protocols rely on linear Monte Carlo rollouts of complete agent-user conversations to estimate success. However, this approach is computationally inefficient, repeatedly regenerating identical early prefixes, and often fails to uncover deep failure modes that arise from rare user behaviors.   We introduce DIVERT (Diversity-Induced Evaluation via Branching of Trajectories), an efficient, snapshot-based, coverage-guided user simulation framework for systematic exploration of agent-user interactions. DIVERT captures the full agent-environment state at critical decision points and resumes execution from these snapshots, enabling reuse of shared conversation prefixes and reducing redundant computation. From each junction, the framework branches using targeted, diversity-inducing user responses, allowing directed exploration of alternative interaction paths.   By focusing evaluation on semantically diverse and underexplored trajectories, DIVERT improves both efficiency and coverage. Empirical results show that it discovers more failures per token compared to standard linear rollout protocols, while expanding the set of tasks on which failures are identified.', 'score': 11, 'issue_id': 2069, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '35cfec857c6860f9', 'authors': ['Itay Nakash', 'George Kour', 'Ateret Anaby-Tavor'], 'affiliations': ['IBM'], 'pdf_title_img': 'assets/pdf/title_img/2604.21480.jpg', 'data': {'categories': ['#agents', '#benchmark'], 'emoji': '🌳', 'ru': {'title': 'Ветвящаяся оценка: эффективное обнаружение отказов LLM через переиспользование префиксов', 'desc': 'DIVERT — это фреймворк для оценки больших языковых моделей, который использует техники ветвления траекторий и повторного использования префиксов диалогов. Вместо линейного воспроизведения полных разговоров, метод создаёт снимки состояния агента-LLM в критических точках и запускает выполнение с этих сохранённых позиций. Из каждой точки ветвления система исследует разнообразные пути взаимодействия, генерируя целенаправленные ответы пользователя для покрытия редких сценариев отказа. Такой подход значительно снижает вычислительные затраты и выявляет больше сбоев в поведении моделей по сравнению со стандартными методами оценки.'}, 'en': {'title': 'Efficiently Evaluating Language Models with Diverse User Simulations', 'desc': 'DIVERT is a user simulation framework designed to evaluate large language models (LLMs) more efficiently by reusing conversation prefixes and exploring various interaction paths. It addresses the limitations of traditional evaluation methods that rely on linear Monte Carlo rollouts, which can be computationally expensive and may miss rare failure modes. By capturing the agent-environment state at key decision points and branching from these snapshots, DIVERT allows for targeted exploration of diverse user responses. This approach not only enhances the efficiency of the evaluation process but also improves the coverage of potential failure scenarios in LLMs.'}, 'zh': {'title': 'DIVERT：高效评估大型语言模型的创新框架', 'desc': 'DIVERT是一个覆盖引导的用户模拟框架，旨在高效评估大型语言模型。它通过重用对话前缀和探索多样化的交互路径，解决了传统评估方法的低效问题。该框架在关键决策点捕捉完整的代理-环境状态，并从这些快照恢复执行，从而减少冗余计算。通过关注语义多样性和未充分探索的轨迹，DIVERT提高了评估的效率和覆盖率。'}}}, {'id': 'https://huggingface.co/papers/2604.19548', 'title': 'Taming Actor-Observer Asymmetry in Agents via Dialectical Alignment', 'url': 'https://huggingface.co/papers/2604.19548', 'abstract': 'Abstract Large language model agents exhibit cognitive bias where self-reflection and mutual auditing lead to inconsistent error attributions, which are addressed through a dialectical reasoning framework that promotes perspective-invariant decision making.  AI-generated summary Large Language Model agents have rapidly evolved from static text generators into dynamic systems capable of executing complex autonomous workflows. To enhance reliability, multi-agent frameworks assigning specialized roles are increasingly adopted to enable self-reflection and mutual auditing. While such role-playing effectively leverages domain expert knowledge, we find it simultaneously induces a human-like cognitive bias known as Actor-Observer Asymmetry (AOA). Specifically, an agent acting as an actor (during self-reflection) tends to attribute failures to external factors, whereas an observer (during mutual auditing) attributes the same errors to internal faults. We quantify this using our new Ambiguous Failure Benchmark, which reveals that simply swapping perspectives triggers the AOA effect in over 20% of cases for most models. To tame this bias, we introduce ReTAS (Reasoning via Thesis-Antithesis-Synthesis), a model trained through dialectical alignment to enforce perspective-invariant reasoning. By integrating dialectical chain-of-thought with Group Relative Policy Optimization, ReTAS guides agents to synthesize conflicting viewpoints into an objective consensus. Experiments demonstrate that ReTAS effectively mitigates attribution inconsistency and significantly improves fault resolution rates in ambiguous scenarios.', 'score': 8, 'issue_id': 2070, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '2aa0c002e56853f1', 'authors': ['Bobo Li', 'Rui Wu', 'Zibo Ji', 'Meishan Zhang', 'Hao Fei', 'Min Zhang', 'Mong-Li Lee', 'Wynne Hsu'], 'affiliations': ['Harbin Institute of Technology, Shenzhen', 'National University of Singapore', 'Sichuan University', 'University of Minnesota Twin Cities', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2604.19548.jpg', 'data': {'categories': ['#reasoning', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Преодоление когнитивной предвзятости в мультиагентных системах через диалектическое рассуждение', 'desc': 'Исследование выявило, что агенты на основе LLM проявляют когнитивную предвзятость, известную как асимметрия актёра-наблюдателя, когда при самоанализе и взаимной проверке они по-разному объясняют причины ошибок. Авторы создали новый бенчмарк Ambiguous Failure Benchmark для измерения этого эффекта и показали, что смена перспективы вызывает предвзятость более чем в 20% случаев. Для решения проблемы предложен метод ReTAS, который использует диалектическое рассуждение (тезис-антитезис-синтез) и обучается через метод Group Relative Policy Optimization. Экспериментальные результаты доказывают, что ReTAS эффективно устраняет противоречия в атрибуции ошибок и улучшает качество разрешения проблемных ситуаций.'}, 'en': {'title': 'Mitigating Cognitive Bias in AI with Dialectical Reasoning', 'desc': "This paper discusses how large language model agents can show cognitive bias, particularly when they reflect on their own actions or audit each other. The authors identify a specific bias called Actor-Observer Asymmetry (AOA), where agents attribute errors differently based on their role—either blaming external factors or internal faults. To address this issue, they propose a new framework called ReTAS, which uses dialectical reasoning to promote consistent decision-making across different perspectives. Their experiments show that ReTAS successfully reduces bias and improves the agents' ability to resolve faults in complex situations."}, 'zh': {'title': '消除认知偏差，实现一致决策', 'desc': '大型语言模型代理在自我反思和相互审计中表现出认知偏差，导致错误归因不一致。为了解决这个问题，本文提出了一种辩证推理框架，促进了视角不变的决策制定。通过引入ReTAS模型，利用辩证对齐训练，帮助代理合成冲突观点，形成客观共识。实验结果表明，ReTAS有效减少了归因不一致性，并显著提高了在模糊场景中的故障解决率。'}}}, {'id': 'https://huggingface.co/papers/2604.24762', 'title': 'OmniShotCut: Holistic Relational Shot Boundary Detection with Shot-Query Transformer', 'url': 'https://huggingface.co/papers/2604.24762', 'abstract': 'Abstract OmniShotCut formulates shot boundary detection as structured relational prediction using a shot query-based dense video Transformer, addressing limitations of existing methods through synthetic transition generation and a comprehensive benchmark.  AI-generated summary Shot Boundary Detection (SBD) aims to automatically identify shot changes and divide a video into coherent shots. While SBD was widely studied in the literature, existing state-of-the-art methods often produce non-interpretable boundaries on transitions, miss subtle yet harmful discontinuities, and rely on noisy, low-diversity annotations and outdated benchmarks. To alleviate these limitations, we propose OmniShotCut to formulate SBD as structured relational prediction, jointly estimating shot ranges with intra-shot relations and inter-shot relations, by a shot query-based dense video Transformer. To avoid imprecise manual labeling, we adopt a fully synthetic transition synthesis pipeline that automatically reproduces major transition families with precise boundaries and parameterized variants. We also introduce OmniShotCutBench, a modern wide-domain benchmark enabling holistic and diagnostic evaluation.', 'score': 6, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '083e67173df1abef', 'authors': ['Boyang Wang', 'Guangyi Xu', 'Zhipeng Tang', 'Jiahui Zhang', 'Zezhou Cheng'], 'affiliations': ['University of Massachusetts Amherst', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2604.24762.jpg', 'data': {'categories': ['#synthetic', '#benchmark', '#video', '#architecture', '#dataset', '#interpretability'], 'emoji': '🎬', 'ru': {'title': 'Структурированное предсказание границ кадров через синтетические переходы и трансформеры', 'desc': 'В статье предложен метод OmniShotCut для обнаружения границ кадров в видео, сформулированный как задача структурированного реляционного предсказания с использованием трансформера на основе запросов о кадрах. Авторы вводят полностью синтетический конвейер генерации переходов, который автоматически воспроизводит основные типы переходов с точными границами, избегая неточной ручной разметки. Метод совместно оценивает диапазоны кадров с учётом внутри-кадровых и между-кадровых отношений через плотный видео-трансформер. Кроме того, представлен новый бенчмарк OmniShotCutBench для комплексной оценки методов обнаружения границ кадров на разнообразных видео.'}, 'en': {'title': 'Revolutionizing Shot Boundary Detection with OmniShotCut', 'desc': 'OmniShotCut presents a new approach to shot boundary detection (SBD) by treating it as structured relational prediction. This method utilizes a shot query-based dense video Transformer to improve the accuracy of identifying shot changes in videos. It addresses the shortcomings of previous techniques, such as non-interpretable boundaries and reliance on low-quality annotations, by employing a synthetic transition generation pipeline. Additionally, the introduction of OmniShotCutBench provides a comprehensive benchmark for evaluating SBD methods across diverse scenarios.'}, 'zh': {'title': 'OmniShotCut：精准的镜头边界检测新方法', 'desc': 'OmniShotCut将镜头边界检测视为结构化关系预测，使用基于镜头查询的密集视频Transformer来解决现有方法的局限性。该方法通过合成过渡生成和全面基准测试，自动识别视频中的镜头变化并将其划分为连贯的镜头。与传统方法相比，OmniShotCut能够更准确地估计镜头范围，并处理镜头内和镜头间的关系。我们还引入了OmniShotCutBench，一个现代化的广域基准，支持全面和诊断性的评估。'}}}, {'id': 'https://huggingface.co/papers/2604.17565', 'title': 'UniGeo: Unifying Geometric Guidance for Camera-Controllable Image Editing via Video Models', 'url': 'https://huggingface.co/papers/2604.17565', 'abstract': 'Abstract UniGeo is a camera-controllable image editing framework that addresses geometric drift and structural degradation by injecting unified geometric guidance across representation, architecture, and loss function levels.  AI-generated summary Camera-controllable image editing aims to synthesize novel views of a given scene under varying camera poses while strictly preserving cross-view geometric consistency. However, existing methods typically rely on fragmented geometric guidance, such as only injecting point clouds at the representation level despite models containing multiple levels, and are mainly based on image diffusion models that operate on discrete view mappings. These two limitations jointly lead to geometric drift and structural degradation under continuous camera motion.   We observe that while leveraging video models provides continuous viewpoint priors for camera-controllable image editing, they still struggle to form stable geometric understanding if geometric guidance remains fragmented. To systematically address this, we inject unified geometric guidance across three levels that jointly determine the generative output: representation, architecture, and loss function.   To this end, we propose UniGeo, a novel camera-controllable editing framework. Specifically, at the representation level, UniGeo incorporates a frame-decoupled geometric reference injection mechanism to provide robust cross-view geometry context. At the architecture level, it introduces geometric anchor attention to align multi-view features. At the loss function level, it proposes a trajectory-endpoint geometric supervision strategy to explicitly reinforce the structural fidelity of target views.   Comprehensive experiments across multiple public benchmarks, encompassing both extensive and limited camera motion settings, demonstrate that UniGeo significantly outperforms existing methods in both visual quality and geometric consistency.', 'score': 6, 'issue_id': 2073, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': '457c2377ea4f4b72', 'authors': ['Hong Jiang', 'Wensong Song', 'Zongxing Yang', 'Ruijie Quan', 'Yi Yang'], 'affiliations': ['DBMI, HMS, Harvard University', 'ReLER, CCAI, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.17565.jpg', 'data': {'categories': ['#cv', '#multimodal', '#diffusion', '#architecture', '#video'], 'emoji': '📷', 'ru': {'title': 'Единая геометрическая направляющая для редактирования изображений с управлением камерой', 'desc': 'UniGeo - это фреймворк для редактирования изображений, управляемый камерой, который решает проблему геометрического смещения и деградации структуры путём внедрения единой геометрической направляющей на трёх уровнях: представления данных, архитектуры нейронной сети и функции потерь. Метод использует видеомодели для получения непрерывных априорных знаний о положении камеры и вводит механизм декаплированной геометрической инъекции, геометрическое якорное внимание для выравнивания многовидовых признаков и стратегию геометрического надзора с использованием траектории. Экспериментальная оценка на общедоступных бенчмарках показывает превосходство UniGeo в визуальном качестве и геометрической согласованности при различных амплитудах движения камеры. Такой многоуровневый подход к внедрению геометрических ограничений обеспечивает стабильное понимание структуры сцены при синтезе новых видов с изменяющимися позициями камеры.'}, 'en': {'title': 'Unified Geometric Guidance for Consistent Image Editing', 'desc': 'UniGeo is an innovative framework for camera-controllable image editing that enhances geometric consistency and structural integrity during continuous camera motion. It addresses the limitations of existing methods by providing unified geometric guidance at three critical levels: representation, architecture, and loss function. By incorporating mechanisms like frame-decoupled geometric reference injection and geometric anchor attention, UniGeo ensures robust cross-view geometry context and alignment of multi-view features. Experimental results show that UniGeo outperforms traditional approaches in both visual quality and geometric accuracy across various benchmarks.'}, 'zh': {'title': '统一几何指导，提升图像编辑质量', 'desc': 'UniGeo 是一个可通过相机控制的图像编辑框架，旨在解决几何漂移和结构退化问题。它通过在表示、架构和损失函数三个层面注入统一的几何指导，确保生成的图像在不同视角下保持几何一致性。UniGeo 采用了帧解耦几何参考注入机制、几何锚点注意力和轨迹端点几何监督策略，以增强目标视图的结构保真度。实验结果表明，UniGeo 在视觉质量和几何一致性方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2604.24003', 'title': 'Stabilizing Efficient Reasoning with Step-Level Advantage Selection', 'url': 'https://huggingface.co/papers/2604.24003', 'abstract': 'Abstract Short-context post-training induces reasoning compression but causes instability; Step-level Advantage Selection addresses this by selectively adjusting reasoning steps based on confidence and verification outcomes, improving accuracy-efficiency trade-off in reasoning tasks.  AI-generated summary Large language models (LLMs) achieve strong reasoning performance by allocating substantial computation at inference time, often generating long and verbose reasoning traces. While recent work on efficient reasoning reduces this overhead through length-based rewards or pruning, many approaches are post-trained under a much shorter context window than base-model training, a factor whose effect has not been systematically isolated. We first show that short-context post-training alone, using standard GRPO without any length-aware objective, already induces substantial reasoning compression-but at the cost of increasingly unstable training dynamics and accuracy degradation. To address this, we propose Step-level Advantage Selection (SAS), which operates at the reasoning-step level and assigns a zero advantage to low-confidence steps in correct rollouts and to high-confidence steps in verifier-failed rollouts, where failures often arise from truncation or verifier issues rather than incorrect reasoning. Across diverse mathematical and general reasoning benchmarks, SAS improves average Pass@1 accuracy by 0.86 points over the strongest length-aware baseline while reducing average reasoning length by 16.3%, yielding a better accuracy-efficiency trade-off.', 'score': 4, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '7d299c5cb6583af8', 'authors': ['Han Wang', 'Xiaodong Yu', 'Jialian Wu', 'Jiang Liu', 'Ximeng Sun', 'Mohit Bansal', 'Zicheng Liu'], 'affiliations': ['Advanced Micro Devices, Inc.', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2604.24003.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Умное сокращение рассуждений через выбор шагов по уверенности', 'desc': 'В статье исследуется проблема сжатия рассуждений в больших языковых моделях при обучении на коротком контексте, которое улучшает эффективность, но делает обучение нестабильным. Авторы предлагают метод Step-level Advantage Selection (SAS), который работает на уровне отдельных шагов рассуждения и избирательно корректирует их на основе уверенности модели и результатов проверки. Метод SAS присваивает нулевое преимущество неуверенным шагам в корректных последовательностях и уверенным шагам в неудачных последовательностях, различая ошибки усечения от настоящих логических ошибок. Предложенный подход достигает лучшего баланса между точностью и эффективностью, повышая точность на 0,86 пункта при одновременном сокращении длины рассуждения на 16,3%.'}, 'en': {'title': 'Optimizing Reasoning Steps for Better AI Performance', 'desc': 'This paper discusses a method called Step-level Advantage Selection (SAS) that improves reasoning in large language models (LLMs) by managing the steps taken during reasoning tasks. It highlights the problem of short-context post-training, which compresses reasoning but leads to instability and lower accuracy. SAS selectively adjusts reasoning steps based on their confidence and verification results, allowing the model to focus on more reliable steps. The results show that SAS enhances accuracy while also reducing the length of reasoning, achieving a better balance between accuracy and efficiency.'}, 'zh': {'title': '逐步优势选择：提升推理准确性与效率的关键', 'desc': '这篇论文探讨了短上下文后训练对推理过程的影响，发现它会导致推理压缩和训练不稳定。为了解决这个问题，提出了逐步优势选择（SAS）方法，通过根据置信度和验证结果选择性调整推理步骤。SAS在推理步骤层面上工作，能够提高推理的准确性和效率。实验结果表明，SAS在多个数学和一般推理基准上显著提高了准确率，同时减少了推理长度。'}}}, {'id': 'https://huggingface.co/papers/2604.21106', 'title': 'How Much Is One Recurrence Worth? Iso-Depth Scaling Laws for Looped Language Models', 'url': 'https://huggingface.co/papers/2604.21106', 'abstract': 'Abstract Research quantifies the computational value of recurrent connections in language models through a scaling law that establishes a recurrence-equivalence exponent of 0.46, indicating that additional recurrence provides partial but measurable capacity gains.  AI-generated summary We measure how much one extra recurrence is worth to a looped (depth-recurrent) language model, in equivalent unique parameters. From an iso-depth sweep of 116 pretraining runs across recurrence counts r in {1, 2, 4, 8} spanning {sim}50times in training compute, we fit a joint scaling law L = E + A,(N_once + r^φ N_rec)^{-α} + B,D^{-β} and recover a new recurrence-equivalence exponent φ= 0.46. Intuitively, φ tells us whether looping a block r times is equivalent in validation loss to r unique blocks of a non-looped model (full equivalence, φ{=}1) or to a single block run repeatedly with no capacity gain (φ{=}0). Our φ= 0.46 sits in between, so each additional recurrence predictably increases validation loss at matched training compute. For example, at r{=}4 a 410M looped model performs on par with a 580M non-looped model, but incurs the training cost of a 1B non-looped one. We demonstrate the utility of φ as a measurement tool on two probes. Truncated backpropagation lowers φ to 0.38, indicating that the loop mechanism is poorly trained under truncation, even though validation loss decreases. Conversely, hyperconnections raise φ to 0.65, a genuine capacity gain. Our method applies to any looped LM and separates true loop improvements from token-budget gains.', 'score': 4, 'issue_id': 2072, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '89ad720527138661', 'authors': ['Kristian Schwethelm', 'Daniel Rueckert', 'Georgios Kaissis'], 'affiliations': ['Hasso Plattner Institute for Digital Engineering', 'Imperial College London', 'Munich Center for Machine Learning (MCML)', 'TUM University Hospital', 'Technical University of Munich (TUM)', 'University of Potsdam'], 'pdf_title_img': 'assets/pdf/title_img/2604.21106.jpg', 'data': {'categories': ['#math', '#architecture', '#optimization', '#training'], 'emoji': '🔄', 'ru': {'title': 'Измерение стоимости рекуррентности: φ = 0.46 как мера эффективности циклических блоков', 'desc': 'В работе исследуется вычислительная стоимость рекуррентных соединений в языковых моделях путём установления закона масштабирования. Авторы вводят показатель эквивалентности рекуррентности φ = 0.46, который показывает, что добавление одного цикла эквивалентно добавлению 0.46 уникальных параметров. Через анализ 116 предварительно обученных моделей с разным количеством циклов они доказывают, что рекуррентность обеспечивает промежуточный прирост ёмкости модели между полной эквивалентностью и полным отсутствием выигрыша. Методология позволяет отделить действительные улучшения от артефактов и может быть применена к любой рекуррентной языковой модели.'}, 'en': {'title': 'Unlocking the Power of Recurrence in Language Models', 'desc': 'This paper investigates how adding recurrent connections to language models affects their performance and capacity. It introduces a recurrence-equivalence exponent, φ, which quantifies the value of these connections, finding that φ=0.46 indicates partial capacity gains from additional recurrence. The study shows that while more recurrences can improve validation loss, they do not equate to the same performance as having more unique parameters in a non-looped model. The findings also reveal that different training methods can influence the effectiveness of recurrence, with truncated backpropagation reducing φ and hyperconnections enhancing it.'}, 'zh': {'title': '递归连接提升语言模型能力的研究', 'desc': '本研究量化了语言模型中递归连接的计算价值，提出了一个递归等价指数为0.46的缩放法则，表明额外的递归提供了部分但可测量的能力提升。我们通过116次预训练运行，测量了额外递归对深度递归语言模型的价值，并建立了一个联合缩放法则。结果显示，递归次数的增加会在相同的训练计算下可预测地增加验证损失。我们的研究方法适用于任何循环语言模型，并能够区分真正的循环改进与令牌预算的提升。'}}}, {'id': 'https://huggingface.co/papers/2508.10180', 'title': 'For-Value: Efficient Forward-Only Data Valuation for finetuning LLMs and VLMs', 'url': 'https://huggingface.co/papers/2508.10180', 'abstract': 'Abstract For-Value is a forward-only data valuation framework that efficiently estimates data value using final hidden representations and prediction errors, enabling scalable batch processing without gradient computations.  AI-generated summary Data valuation is essential for enhancing the transparency and accountability of large language models (LLMs) and vision-language models (VLMs). However, existing methods typically rely on gradient computations, making them computationally prohibitive for billion-parameter models and precluding batch parallelization. In this work, we introduce For-Value, a forward-only data valuation framework that enables efficient batch-scalable value estimation while maintaining effectiveness. Leveraging the expressive power of pretrained LLMs/VLMs, we theoretically demonstrate that data valuation can be captured by the alignment between the final hidden representations and prediction errors at the last layer. In light of this insight, For-Value computes data value using a simple closed-form expression with a single forward pass, eliminating the need for costly backpropagation and enabling efficient batch calculating at scale. Extensive experiments show that For-Value matches or outperforms gradient-based baselines in detecting influential data and mislabeled data, while achieving significant efficiency improvements.', 'score': 4, 'issue_id': 2070, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '0509b98ddbd49108', 'authors': ['Wenlong Deng', 'Qi Zeng', 'Jiaming Zhang', 'Minghui Chen', 'Zixin Ding', 'Christos Thrampoulidis', 'Boying Gong', 'Xiaoxiao Li'], 'affiliations': ['Meta', 'University of British Columbia', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2508.10180.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Оценка ценности данных без градиентов — быстро и эффективно', 'desc': 'В статье предлагается For-Value — фреймворк для оценки ценности данных, который работает только с прямым проходом нейронной сети без вычисления градиентов. Авторы показали, что ценность данных можно вычислить через выравнивание между финальными скрытыми представлениями и ошибками предсказания на последнем слое модели. Метод использует простую замкнутую формулу для расчета значения данных с одним forward pass, что позволяет параллельно обрабатывать большие батчи данных. Экспериментально доказано, что For-Value не уступает градиентным методам в определении влиятельных и неправильно размеченных данных, но работает значительно быстрее на моделях с миллиардами параметров.'}, 'en': {'title': 'Efficient Data Valuation Without Gradients', 'desc': 'For-Value is a new framework designed to assess the value of data in machine learning models without needing complex gradient calculations. It focuses on using the final hidden representations and prediction errors from large language models (LLMs) and vision-language models (VLMs) to estimate data value efficiently. This method allows for scalable batch processing, making it suitable for models with billions of parameters. Experiments show that For-Value not only matches but can also exceed the performance of traditional gradient-based methods in identifying important and mislabeled data, all while being more efficient.'}, 'zh': {'title': '高效数据估值的新方法', 'desc': 'For-Value 是一种前向数据估值框架，能够高效地利用最终的隐藏表示和预测误差来估算数据价值。这种方法避免了梯度计算，使得在处理亿级参数模型时更加高效，并支持批量处理。通过利用预训练的语言模型和视觉语言模型的表达能力，For-Value 理论上证明了数据价值可以通过最后一层的隐藏表示与预测误差之间的对齐来捕捉。实验结果表明，For-Value 在检测重要数据和错误标记数据方面与基于梯度的方法相当或更优，同时显著提高了计算效率。'}}}, {'id': 'https://huggingface.co/papers/2604.23604', 'title': 'Learning to Identify Out-of-Distribution Objects for 3D LiDAR Anomaly Segmentation', 'url': 'https://huggingface.co/papers/2604.23604', 'abstract': 'Abstract A novel 3D LiDAR anomaly segmentation method operates directly in feature space to distinguish known from unknown objects, addressing limitations of existing datasets through mixed real-synthetic datasets with complex environments.  AI-generated summary Understanding the surrounding environment is fundamental in autonomous driving and robotic perception. Distinguishing between known classes and previously unseen objects is crucial in real-world environments, as done in Anomaly Segmentation. However, research in the 3D field remains limited, with most existing approaches applying post-processing techniques from 2D vision. To cover this lack, we propose a new efficient approach that directly operates in the feature space, modeling the feature distribution of inlier classes to constrain anomalous samples. Moreover, the only publicly available 3D LiDAR anomaly segmentation dataset contains simple scenarios, with few anomaly instances, and exhibits a severe domain gap due to its sensor resolution. To bridge this gap, we introduce a set of mixed real-synthetic datasets for 3D LiDAR anomaly segmentation, built upon established semantic segmentation benchmarks, with multiple out-of-distribution objects and diverse, complex environments. Extensive experiments demonstrate that our approach achieves state-of-the-art and competitive results on the existing real-world dataset and the newly introduced mixed datasets, respectively, validating the effectiveness of our method and the utility of the proposed datasets. Code and datasets are available at https://simom0.github.io/lido-page/.', 'score': 2, 'issue_id': 2073, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'be8758d7acf2acbd', 'authors': ['Simone Mosco', 'Daniel Fusaro', 'Alberto Pretto'], 'affiliations': ['University of Padova, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2604.23604.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#3d', '#open_source', '#robotics', '#synthetic'], 'emoji': '🤖', 'ru': {'title': 'Обнаружение аномалий в 3D LiDAR через моделирование признаков в пространстве', 'desc': 'Статья представляет новый метод сегментации аномалий в 3D LiDAR данных, работающий непосредственно в пространстве признаков для различения известных и неизвестных объектов. Метод моделирует распределение признаков известных классов, чтобы выявить аномальные образцы, что решает проблему ограниченности существующих подходов, основанных на постобработке из компьютерного зрения. Авторы создали набор смешанных реально-синтетических наборов данных с разнообразными и сложными окружающими средами, преодолевая проблему домена между реальными данными и симуляциями. Экспериментальные результаты подтверждают эффективность предложенного метода и ценность новых наборов данных для автономного вождения и робототехники.'}, 'en': {'title': 'Revolutionizing 3D LiDAR Anomaly Detection with Feature Space Segmentation', 'desc': 'This paper presents a new method for 3D LiDAR anomaly segmentation that works directly in feature space, allowing for better differentiation between known and unknown objects. It addresses the shortcomings of current datasets, which often lack complexity and variety, by introducing mixed real-synthetic datasets that include diverse environments and out-of-distribution objects. The proposed approach models the feature distribution of known classes to effectively identify anomalies, overcoming limitations of traditional 2D post-processing techniques. Experimental results show that this method achieves state-of-the-art performance on both existing and new datasets, highlighting its effectiveness in real-world applications.'}, 'zh': {'title': '创新3D LiDAR异常分割方法', 'desc': '本文提出了一种新颖的3D LiDAR异常分割方法，直接在特征空间中操作，以区分已知物体和未知物体。这种方法解决了现有数据集的局限性，通过混合真实和合成数据集来应对复杂环境中的挑战。我们的方法建模了内类的特征分布，以约束异常样本，并引入了多样化的复杂环境数据集，以弥补现有3D LiDAR异常分割数据集的不足。实验结果表明，我们的方法在现有真实世界数据集和新引入的混合数据集上均取得了最先进的竞争性结果，验证了我们方法的有效性和提出数据集的实用性。'}}}, {'id': 'https://huggingface.co/papers/2604.22880', 'title': 'TexOCR: Advancing Document OCR Models for Compilable Page-to-LaTeX Reconstruction', 'url': 'https://huggingface.co/papers/2604.22880', 'abstract': 'Abstract Research addresses limitations of existing OCR by focusing on reconstructing scientific PDFs into compilable LaTeX through a new benchmark and training corpus, demonstrating improved structural accuracy and compilation reliability using reinforcement learning with verifiable rewards.  AI-generated summary Existing document OCR largely targets plain text or Markdown, discarding the structural and executable properties that make LaTeX essential for scientific publishing. We study page-level reconstruction of scientific PDFs into compilable LaTeX and introduce TexOCR-Bench, a benchmark, and TexOCR-Train, a large-scale training corpus, for this task. TexOCR-Bench features a multi-dimensional evaluation suite that jointly assesses transcription fidelity, structural faithfulness, and end-to-end compilability. Leveraging TexOCR-Train, we train a 2B-parameter model, TexOCR, using supervised fine-tuning (SFT) and reinforcement learning (RL) with verifiable rewards derived from LaTeX unit tests that directly enforce compilability and referential integrity. Experiments across 21 frontier models on TexOCR-Bench show that existing systems frequently violate key document invariants, including consistent section structure, correct float placement, and valid label-reference links, which undermines compilation reliability and downstream usability. Our analysis further reveals that RL with verifiable rewards yields consistent improvements over SFT alone, particularly on structural and compilation metrics.', 'score': 2, 'issue_id': 2072, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': '011c7c9862096c7a', 'authors': ['Chengye Wang', 'Lin Fu', 'Zexi Kuang', 'Yilun Zhao'], 'affiliations': ['Yale University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22880.jpg', 'data': {'categories': ['#benchmark', '#rl', '#training', '#plp', '#dataset'], 'emoji': '📄', 'ru': {'title': 'LaTeX из PDF: обучение с подкреплением для надёжного преобразования научных документов', 'desc': 'Статья посвящена улучшению распознавания научных PDF-документов путём их преобразования в компилируемый LaTeX код. Авторы создали новый бенчмарк TexOCR-Bench и большой корпус TexOCR-Train для обучения модели, которая оценивает точность транскрипции, структурную верность и способность кода компилироваться. Они обучили 2-миллиардную модель, используя supervised fine-tuning и обучение с подкреплением, где награды основаны на верификации через unit-тесты LaTeX. Результаты показали, что применение reinforcement learning с проверяемыми наградами значительно улучшает структурную точность и надёжность компиляции по сравнению с одним supervised fine-tuning.'}, 'en': {'title': 'Revolutionizing OCR: From PDFs to Reliable LaTeX with Reinforcement Learning', 'desc': "This paper presents a new approach to improve Optical Character Recognition (OCR) for scientific documents by converting PDFs into compilable LaTeX. It introduces TexOCR-Bench, a benchmark for evaluating the accuracy and reliability of this conversion, and TexOCR-Train, a large dataset for training models. The authors utilize reinforcement learning with verifiable rewards to enhance the model's ability to maintain document structure and ensure successful compilation. Results show that their method significantly outperforms existing OCR systems in preserving key document features and improving usability."}, 'zh': {'title': '重构科学PDF，提升LaTeX编译可靠性', 'desc': '本研究针对现有光学字符识别（OCR）的局限性，提出了一种将科学PDF重构为可编译LaTeX的新方法。我们引入了TexOCR-Bench基准和TexOCR-Train训练语料库，以提高结构准确性和编译可靠性。通过使用带有可验证奖励的强化学习，我们训练了一个具有20亿参数的模型TexOCR，显著改善了文档的结构和编译性能。实验结果表明，现有系统在文档一致性方面存在问题，而我们的模型在结构和编译指标上表现出持续的改进。'}}}, {'id': 'https://huggingface.co/papers/2604.22841', 'title': 'ATTN-FIQA: Interpretable Attention-based Face Image Quality Assessment with Vision Transformers', 'url': 'https://huggingface.co/papers/2604.22841', 'abstract': 'Abstract ATTN-FIQA uses pre-softmax attention scores from Vision Transformers to assess face image quality without additional training or architectural changes.  AI-generated summary Face Image Quality Assessment (FIQA) aims to assess the recognition utility of face samples and is essential for reliable face recognition (FR) systems. Existing approaches require computationally expensive procedures such as multiple forward passes, backpropagation, or additional training, and only recent work has focused on the use of Vision Transformers. Recent studies highlighted that these architectures inherently function as saliency learners with attention patterns naturally encoding spatial importance. This work proposes ATTN-FIQA, a novel training-free approach that investigates whether pre-softmax attention scores from pre-trained Vision Transformer-based face recognition models can serve as quality indicators. We hypothesize that attention magnitudes intrinsically encode quality: high-quality images with discriminative facial features enable strong query-key alignments producing focused, high-magnitude attention patterns, while degraded images generate diffuse, low-magnitude patterns. ATTN-FIQA extracts pre-softmax attention matrices from the final transformer block, aggregate multi-head attention information across all patches, and compute image-level quality scores through simple averaging, requiring only a single forward pass through pre-trained models without architectural modifications, backpropagation, or additional training. Through comprehensive evaluation across eight benchmark datasets and four FR models, this work demonstrates that attention-based quality scores effectively correlate with face image quality and provide spatial interpretability, revealing which facial regions contribute most to quality determination.', 'score': 2, 'issue_id': 2070, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '734a8987a7843d1d', 'authors': ['Guray Ozgur', 'Tahar Chettaoui', 'Eduarda Caldeira', 'Jan Niklas Kolf', 'Marco Huber', 'Andrea Atzori', 'Naser Damer', 'Fadi Boutros'], 'affiliation
