    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.12191', 'title': 'Agentic Environment Engineering for Large Language Models: A Survey of Environment Modeling, Synthesis, Evaluation, and Application', 'url': 'https://huggingface.co/papers/2606.12191', 'abstract': 'Abstract Large language model agents require specialized environments for training and evaluation, which can be categorized by their engineering lifecycle stages and evolved through various paradigms including neural and symbolic approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Environments serve as interactive systems for large language model (LLM) based agents across diverse scenarios and play a crucial role in driving the continual evolution of model capabilities. Despite this importance, existing work lacks a systematic categorization and deep analysis. This paper systematically studies current researches on agentic environments from the perspective of the environment engineering lifecycle, covering their modeling, synthesis, evaluation and application. Specifically, the paper first introduces representative environments from the perspectives of eight attributes and eight domains, providing detailed analyses of their development paths and highlighting their core capabilities. Second, for automated environment synthesis, two paradigms are introduced, such as symbolic synthesis and neural synthesis. This paper also shows different environment evaluation methods in each paradigm. Thirdly, the corresponding environment applications from the perspective of agent-environment co-evolution are discussed. In specific, the paper characterizes the primary pathways for agent evolution in dynamic environments from four complementary perspectives: memory-centric experience evolution, orchestration-centric workflow evolution, trajectory-centric offline evolution, and exploration-centric online evolution. And three paradigms of environment evolution are identified, namely neural-driven, difficulty-driven, and scaling-driven approaches. At last, several promising future directions are discussed, including Environment-as-a-Service, Multi-agent Environments, and Neural-Symbolic Environments.', 'score': 33, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '0310d1612bd9de75', 'authors': ['Jiachun Li', 'Zhuoran Jin', 'Tianyi Men', 'Yupu Hao', 'Kejian Zhu', 'Lingshuai Wang', 'Dongqi Huang', 'Longxiang Wang', 'Shengjia Hua', 'Lu Wang', 'Jinshan Gao', 'Hongbang Yuan', 'Ruilin Xu', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['Key Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences, Beijing 100191, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.12191.jpg', 'data': {'categories': ['#survey'], 'emoji': '🏗️', 'ru': {'title': 'Инженерия окружений для интеллектуальных агентов: от синтеза к совместной эволюции', 'desc': 'В статье проводится систематический анализ окружений для обучения и оценки агентов на основе больших языковых моделей (LLM). Авторы рассматривают жизненный цикл разработки окружений, включая их моделирование, синтез и оценку, анализируя восемь ключевых атрибутов и областей применения. Работа описывает два парадигмы автоматического синтеза окружений: символический и нейронный синтез, а также методы их оценки для каждого подхода. Авторы также изучают совместную эволюцию агентов и окружений через четыре перспективы: эволюцию опыта через память, эволюцию рабочих процессов, эволюцию на основе офлайн-траекторий и исследовательскую эволюцию.'}, 'en': {'title': 'Evolving Environments for Intelligent Agents', 'desc': 'This paper explores the specialized environments needed for training and evaluating large language model (LLM) agents, categorizing them by their engineering lifecycle stages. It provides a systematic analysis of these environments, detailing their modeling, synthesis, evaluation, and application across various scenarios. The authors introduce two paradigms for automated environment synthesis—symbolic and neural—and discuss different evaluation methods for each. Additionally, the paper highlights pathways for agent evolution in dynamic environments and identifies future directions for research, such as Environment-as-a-Service and Multi-agent Environments.'}, 'zh': {'title': '大型语言模型代理的环境演化与应用', 'desc': '本文探讨了大型语言模型代理所需的专用环境，系统地分析了环境工程生命周期的各个阶段。研究涵盖了环境的建模、合成、评估和应用，介绍了八个属性和八个领域的代表性环境。文章还提出了符号合成和神经合成两种自动化环境合成范式，并讨论了不同的环境评估方法。最后，文章指出了未来的研究方向，包括环境即服务、多代理环境和神经符号环境。'}}}, {'id': 'https://huggingface.co/papers/2606.11926', 'title': 'Toward Generalist Autonomous Research via Hypothesis-Tree Refinement', 'url': 'https://huggingface.co/papers/2606.11926', 'abstract': 'Abstract An AI framework called Arbor enables autonomous scientific research by combining strategic coordination, isolated hypothesis testing, and a persistent knowledge tree to iteratively improve research outcomes across multiple domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific progress depends on a repeated loop of exploration, experimentation, and abstraction. Researchers test candidate directions, interpret the evidence, and carry the resulting lessons into later attempts. We study how an AI agent can run this loop autonomously over long horizons. We introduce Arbor, a general framework for autonomous research that combines a long-lived coordinator, short-lived executors, and Hypothesis Tree Refinement (HTR), a persistent tree that links hypotheses, artifacts, evidence, and distilled insights across time. The coordinator manages global research strategy over the tree, while executors implement and test individual hypotheses in isolated worktrees. As results return, Arbor updates the tree, propagates reusable lessons, refines the search frontier, and admits verified improvements. This design turns autonomous research from a sequence of local attempts into a cumulative process in which strategy, execution, and evidence are carried across time. We evaluate Arbor under Autonomous Optimization (AO), an operational setting where an agent improves an initial research artifact through iterative experimentation without step-level human supervision. Across six real research tasks in model training, harness engineering, and data synthesis, Arbor achieves the best held-out result on all six tasks, attaining more than 2.5x the average relative held-out gain of Codex and Claude Code under the same task interface and resource budget. On MLE-Bench Lite, Arbor reaches 86.36% Any Medal with GPT-5.5, the strongest result in our comparison.', 'score': 29, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'a8bf988d8e798fd9', 'authors': ['Jiajie Jin', 'Yuyang Hu', 'Kai Qiu', 'Qi Dai', 'Chong Luo', 'Guanting Dong', 'Xiaoxi Li', 'Tong Zhao', 'Xiaolong Ma', 'Gongrui Zhang', 'Zhirong Wu', 'Bei Liu', 'Zhengyuan Yang', 'Linjie Li', 'Lijuan Wang', 'Hongjin Qian', 'Yutao Zhu', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.11926.jpg', 'data': {'categories': ['#optimization', '#science'], 'emoji': '🌳', 'ru': {'title': 'Автономное научное исследование через накопление знаний в памяти агента', 'desc': 'Arbor — это фреймворк для автономного научного исследования, который использует AI агента для итеративного улучшения исследовательских артефактов. Система сочетает координатора, отвечающего за глобальную стратегию, с исполнителями, тестирующими гипотезы в изолированных окружениях. Ключевой компонент — дерево гипотез (Hypothesis Tree Refinement), которое сохраняет знания, связывая гипотезы, артефакты, доказательства и извлечённые уроки во времени. Архитектура превращает автономное исследование из последовательности отдельных попыток в кумулятивный процесс, где стратегия, выполнение и результаты накапливаются и переиспользуются.'}, 'en': {'title': 'Arbor: Revolutionizing Autonomous Scientific Research', 'desc': 'The paper presents Arbor, an AI framework designed for autonomous scientific research that enhances the process of exploration, experimentation, and learning. It features a long-lived coordinator that oversees research strategy and short-lived executors that test hypotheses in isolated environments. Arbor utilizes a Hypothesis Tree Refinement (HTR) system to maintain a persistent knowledge structure that connects hypotheses, evidence, and insights over time. The framework has demonstrated superior performance in various research tasks, significantly outperforming existing models in iterative experimentation without human intervention.'}, 'zh': {'title': 'Arbor：自主科学研究的新框架', 'desc': 'Arbor是一个人工智能框架，旨在通过战略协调、独立假设测试和持久知识树来实现自主科学研究。该框架通过一个长期协调者和多个短期执行者的结合，能够在多个领域中迭代改进研究结果。Arbor的假设树精炼（HTR）将假设、证据和洞察力连接在一起，使得研究过程能够在时间上持续积累。通过在没有人类监督的情况下进行自主优化，Arbor在六个真实研究任务中表现出色，超越了其他模型。'}}}, {'id': 'https://huggingface.co/papers/2606.09076', 'title': 'Beyond Scalar Rewards by Internalizing Reasoning into Score Distributions', 'url': 'https://huggingface.co/papers/2606.09076', 'abstract': "Abstract A teacher-student framework decouples complex reasoning from efficient reward deployment in text-to-image training, achieving superior preference accuracy and optimization performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reward models are central to text-to-image post-training, but visual preference is subjective and better represented as a distribution over rubric scores than as a deterministic scalar. Existing scalar, score-token, and pairwise reward models over-compress uncertainty and fine-grained score differences, while reasoning-based generative rewards provide stronger judgments but are costly to deploy and difficult to use as direct optimization signals. We propose Z-Reward, a teacher-student reward modeling framework that decouples reasoning-heavy judgment from efficient reward deployment. The teacher is a large VLM that uses reasoning to infer rubric-aligned score distributions, and is trained with Group-wise Direct Score Optimization (GDSO), which combines policy-gradient rewards from distribution expectations with direct pointwise and pairwise supervision on score distributions and score gaps. The student is trained with Reasoning-Internalized Score Distillation (RISD), which transfers the teacher's reasoning-conditioned score distribution into a compact VLM without requiring explicit reasoning chains at inference time. On our internally annotated evaluation set, the 27B GDSO teacher reaches 89.6% human preference accuracy, outperforming SFT, RewardDance, and GRPO, while the 9B RISD student reaches 88.6%, outperforming the OPD baseline and closely matching the larger teacher. We further show that Z-Reward can serve as a differentiable reward signal for text-to-image optimization, yielding a 41.3% net human-preference improvement over the SFT baseline.", 'score': 26, 'issue_id': 2410, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'f09bcaa774b70066', 'authors': ['Xin Jin', 'Huanqia Cai', 'Zhen Li', 'Zechao Zhan', 'Dengyang Jiang', 'Aiming Hao', 'Yuming Jiang', 'Chunle Guo', 'Peng Gao', 'Ming-Ming Cheng', 'Steven C. H. Hoi'], 'affiliations': ['Alibaba Group', 'Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2606.09076.jpg', 'data': {'categories': ['#training', '#rlhf', '#architecture', '#multimodal'], 'emoji': '🎓', 'ru': {'title': 'Учитель-ученик система для распределённого моделирования вознаграждения в генерации изображений', 'desc': 'В статье предложена новая система Z-Reward для обучения моделей вознаграждения в задаче text-to-image генерации, которая использует архитектуру учитель-ученик для разделения сложного рассуждения и эффективного развёртывания награды. Учитель представляет собой большую VLM модель, которая с помощью цепочек рассуждений предсказывает распределение оценок по рубрикам, обучаясь методом Group-wise Direct Score Optimization (GDSO). Ученик получает знания через Reasoning-Internalized Score Distillation (RISD), переводя распределение оценок учителя в компактную модель без необходимости явных цепочек рассуждений при инференсе. Экспериментальные результаты показывают, что 9B ученик достигает 88.6% точности предпочтений человека, близко приближаясь к качеству более крупного учителя, при этом обеспечивая 41.3% улучшение предпочтений в оптимизации text-to-image моделей.'}, 'en': {'title': 'Decoupling Reasoning and Reward for Better Image Generation', 'desc': 'This paper introduces the Z-Reward framework, which separates complex reasoning from efficient reward deployment in text-to-image training. It utilizes a teacher-student model where the teacher, a large visual language model (VLM), generates score distributions based on reasoning, while the student learns to replicate this without needing complex reasoning during inference. The framework improves preference accuracy by better capturing the uncertainty and nuances in visual preference scores compared to traditional scalar models. The results show that Z-Reward significantly enhances optimization performance, achieving high human preference accuracy in generated images.'}, 'zh': {'title': '教师-学生框架提升文本到图像训练效果', 'desc': '本文提出了一种教师-学生框架，旨在将复杂的推理与高效的奖励部署分开，以提高文本到图像训练的偏好准确性和优化性能。我们引入了Z-Reward模型，其中教师是一个大型视觉语言模型（VLM），负责推断与评分标准对齐的分数分布，而学生则通过推理内部化的分数蒸馏，将教师的推理条件分数分布转移到一个紧凑的VLM中。实验结果表明，27B GDSO教师模型在偏好准确性上达到了89.6%，而9B RISD学生模型也表现出色，达到了88.6%。此外，Z-Reward作为可微分的奖励信号，能够显著提升文本到图像优化的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.09323', 'title': 'TRL-Bench: Standardizing Cross-Paradigm Representation-Level Evaluation of Tabular Encoders', 'url': 'https://huggingface.co/papers/2606.09323', 'abstract': 'Abstract TRL-Bench establishes a standardized benchmark for evaluating tabular representation learning models across multiple granularities, revealing that encoder performance varies by task type and requires capability-specific assessment rather than single leaderboard rankings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tabular encoders are usually evaluated inside task-specific end-to-end pipelines, so models from different training paradigms are difficult to compare directly even when they operate on similar tabular signals. We introduce TRL-Bench, a multi-granular tabular representation learning (TRL) benchmark that standardizes cross-paradigm representation-level evaluation: each encoder exports row-, column-, or table embeddings through its supported wrapper, and shared lightweight heads probe them across three suites: TRL-CTbench (column/table), TRL-Rbench (row), and TRL-DLTE (compositional Data-Lake Table Enrichment spanning all three granularities). To support this standardized setting, we release curated benchmark assets and task reformulations, including 50 OpenML tables with 123 verified targets, 16 row-pair linkage rewrites, and a 47,772-table DLTE lake derived from 1,379 parent tables. Across 20 models and 16 tasks, TRL-Bench shows that once downstream conditions are standardized, encoder quality is capability-specific rather than captured by a single leaderboard. In TRL-CTbench, generic text encoders often lead on tasks with strong surface-text signal, while tabular specialists win where their pretraining objective aligns with the task. In TRL-Rbench, within-table prediction and cross-table linkage favor different training regimes, with atomic linkage performance correlating strongly with the row-matching stage of DLTE pipelines. In TRL-DLTE, the strongest pipelines combine capability-matched specialists rather than reuse a single encoder, and top end-to-end quality depends on non-additive compositional fit rather than per-stage marginal rank alone. TRL-Bench provides a common protocol for measuring reusable signal in exported tabular representations under shared downstream conditions. Code and data: https://github.com/LOGO-CUHKSZ/TRL-Bench', 'score': 22, 'issue_id': 2410, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'e9fb5f11bc86797d', 'authors': ['Wei Pang', 'Xiangru Jian', 'Hehan Li', 'Zhixuan Yu', 'Alex Xue', 'Jinyang Li', 'Zhengyuan Dong', 'Xinjian Zhao', 'Hao Xu', 'Chao Zhang', 'Reynold Cheng', 'M. Tamer Özsu', 'Tianshu Yu'], 'affiliations': ['The Chinese University of Hong Kong, Shenzhen', 'The University of Hong Kong', 'The University of Sydney', 'University of Waterloo', 'Université Lyon'], 'pdf_title_img': 'assets/pdf/title_img/2606.09323.jpg', 'data': {'categories': ['#dataset', '#optimization', '#open_source', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Стандартизация оценки табличных представлений: специализация вместо универсальности', 'desc': 'В статье представлен TRL-Bench, стандартизированный бенчмарк для оценки моделей обучения табличным представлениям данных на разных уровнях гранулярности. Авторы показывают, что энкодеры работают по-разному в зависимости от типа задачи, и их качество не может быть выражено одним рейтингом. Бенчмарк включает три набора задач: для оценки представлений столбцов и таблиц, строк, а также композиционного обогащения данных озер таблиц. Исследование демонстрирует, что оптимальные результаты достигаются при комбинировании специализированных энкодеров, выбранных под конкретную задачу, а не переиспользованием одной универсальной модели.'}, 'en': {'title': 'Standardizing Evaluation in Tabular Representation Learning', 'desc': 'TRL-Bench is a new benchmark designed to evaluate tabular representation learning models in a standardized way across different tasks. It highlights that the performance of encoders varies depending on the specific task, suggesting that evaluations should focus on capabilities rather than just overall rankings. The benchmark includes various evaluation suites that assess different types of embeddings, such as row, column, and table embeddings, using curated datasets. By providing a common framework, TRL-Bench allows for better comparisons of models trained under different paradigms and improves understanding of their strengths in specific tasks.'}, 'zh': {'title': 'TRL-Bench：表格表示学习的标准化评估基准', 'desc': 'TRL-Bench是一个标准化的基准，用于评估表格表示学习模型在不同粒度下的表现。研究发现，编码器的性能因任务类型而异，因此需要针对特定能力进行评估，而不是仅依赖单一的排行榜。该基准提供了多种评估套件，支持行、列和表的嵌入导出，并通过共享的轻量级头部进行探测。TRL-Bench为在共享下游条件下测量可重用信号提供了一个通用协议。'}}}, {'id': 'https://huggingface.co/papers/2606.10728', 'title': 'DeNovoSWE: Scaling Long-Horizon Environments for Generating Entire Repositories from Scratch', 'url': 'https://huggingface.co/papers/2606.10728', 'abstract': 'Abstract A large-scale dataset called DeNovoSWE is introduced for training code agents to generate entire software repositories from documentation, significantly improving performance on long-horizon software engineering tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As the capabilities of LLM-based code agents continue to advance, their expected role is expanding beyond localized bug fixing in existing codebases toward architecting and implementing complete software repositories from high-level specifications. However, training agents for such long-horizon software engineering tasks remains difficult due to the scarcity of large-scale, verifiable whole-repository generation data. In this paper, we introduce DeNovoSWE, a large-scale dataset for whole-repository generation. DeNovoSWE comprises 4,818 high-quality instances, where each instance requires generating a complete repository from documentation. Our dataset is automatically constructed through a carefully designed sandboxed agentic workflow, enabling scalable curation without human annotation. DeNovoSWE is constructed with "divide and conquer" and critic-repair philosophy. To balance data quality and diversity, we further introduce a difficulty-aware trajectory filtering strategy. Fine-tuning Qwen3-30B-A3B on DeNovoSWE substantially improves long-horizon SWE performance, raising its score on the challenging BeyondSWE-Doc2Repo benchmark from 5.8% to 47.2%.', 'score': 21, 'issue_id': 2410, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '2c1594c13243d648', 'authors': ['Jiale Zhao', 'Guoxin Chen', 'Fanzhe Meng', 'Wayne Xin Zhao', 'Ruihua Song', 'Ji-Rong Wen', 'Kai Jia'], 'affiliations': ['AweAI Team', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2606.10728.jpg', 'data': {'categories': ['#training', '#open_source', '#dataset', '#plp', '#agents', '#science', '#synthetic'], 'emoji': '🏗️', 'ru': {'title': 'Из документации в репозиторий: масштабный датасет для генерации полного ПО', 'desc': "В статье представлен большой датасет DeNovoSWE для обучения code агентов генерировать полные программные репозитории на основе документации. Датасет содержит 4818 высококачественных примеров и создан автоматически через специально разработанный workflow без ручной аннотации. При построении используется стратегия 'разделяй и властвуй' и философия критик-восстановления для сбалансирования качества и разнообразия данных. Fine-tuning модели Qwen3-30B-A3B на DeNovoSWE значительно улучшает производительность на задачах long-horizon software engineering, повышая результат на бенчмарке BeyondSWE-Doc2Repo с 5.8% до 47.2%."}, 'en': {'title': 'Empowering Code Agents with DeNovoSWE for Complete Repository Generation', 'desc': "The paper presents DeNovoSWE, a large-scale dataset designed to train code agents for generating complete software repositories from documentation. This dataset addresses the challenge of long-horizon software engineering tasks by providing 4,818 high-quality instances that require full repository generation. The dataset is created using an automated process that ensures scalability and quality without the need for human annotation. Fine-tuning a model on DeNovoSWE significantly enhances its performance on complex benchmarks, demonstrating the dataset's effectiveness in advancing the capabilities of LLM-based code agents."}, 'zh': {'title': 'DeNovoSWE：生成完整软件库的新数据集', 'desc': '本文介绍了一个名为DeNovoSWE的大规模数据集，用于训练代码代理生成完整的软件库。该数据集包含4818个高质量实例，每个实例都需要从文档生成一个完整的代码库。通过精心设计的沙盒代理工作流程，DeNovoSWE实现了可扩展的自动构建，避免了人工标注的需求。对Qwen3-30B-A3B进行微调后，使用DeNovoSWE显著提高了长时间跨度软件工程任务的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.12403', 'title': 'World Pilot: Steering Vision-Language-Action Models with World-Action Priors', 'url': 'https://huggingface.co/papers/2606.12403', 'abstract': 'Abstract World Pilot enhances Vision-Language-Action models by incorporating dynamic scene evolution and trajectory priors from a World-Action Model, achieving superior performance in zero-shot out-of-distribution manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models inherit semantic grounding from large-scale pretraining and perform competently across in-distribution manipulation tasks. This grounding, however, is built on static image-text pairs, whereas manipulation is a continuous, contact-rich process whose dynamics this pretraining cannot capture. We present World Pilot, a VLA framework that augments the policy with priors from a World-Action Model (WAM), routed into the decision chain through two complementary pathways. Latent Steering conditions the perception layer on a scene-evolution latent, and Action Steering supplies an anticipated trajectory as a motion prior to the action generator. Together the two priors equip the VLA with an anticipated view of the scene and a trajectory-level motion hint alongside its semantic conditioning, and the scene-evolution prior remains effective even when supplied by a video-pretrained world model that has not been action-post-trained. World Pilot attains a state-of-the-art Total success rate of 84.7% on the LIBERO-Plus zero-shot OOD benchmark and the highest success rate on every real-robot setting across four manipulation tasks, with the largest margins under shifts in viewpoint, geometry, deformable state, and pose. Project Website: https://world-pilot.github.io/', 'score': 15, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'e487ab43f537c2df', 'authors': ['Zefu Lin', 'Rongxu Cui', 'Junjia Xu', 'Xiaojuan Jin', 'Wenling Li', 'Lue Fan', 'Zhaoxiang Zhang'], 'affiliations': ['Beihang University', 'Institute of Automation, Chinese Academy of Sciences (CASIA)', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.12403.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Роботы учатся предвидеть: как мировые модели улучшают манипуляционные навыки', 'desc': 'World Pilot — это фреймворк для Vision-Language-Action моделей, который улучшает их способность к манипуляции объектами, интегрируя предсказания динамики сцены через World-Action Model. Система использует два дополнительных механизма: Latent Steering, который кондиционирует восприятие на латентном представлении эволюции сцены, и Action Steering, который предоставляет предсказанную траекторию движения. Такой подход позволяет VLA моделям получить прогнозируемый вид сцены и траекторный приоритет помимо семантического кодирования, достигая превосходных результатов в задачах out-of-distribution. World Pilot достигает рекордной точности 84.7% на бенчмарке LIBERO-Plus и лучшие результаты на реальных роботах при различных трансформациях сцены, включая изменения ракурса и деформируемых объектов.'}, 'en': {'title': 'Enhancing VLA with Dynamic Scene Awareness and Trajectory Prediction', 'desc': "World Pilot is a framework that improves Vision-Language-Action (VLA) models by integrating dynamic scene changes and trajectory predictions from a World-Action Model (WAM). Traditional VLA models rely on static image-text pairs, which do not effectively capture the continuous nature of manipulation tasks. By introducing two pathways—Latent Steering for scene evolution and Action Steering for motion hints—World Pilot enhances the model's ability to anticipate changes in the environment and plan actions accordingly. This approach leads to superior performance in zero-shot out-of-distribution manipulation tasks, achieving a remarkable success rate of 84.7% on the LIBERO-Plus benchmark."}, 'zh': {'title': '动态场景演变，提升视觉-语言-动作模型的能力', 'desc': 'World Pilot 是一种增强视觉-语言-动作模型的框架，通过引入动态场景演变和轨迹先验，提升了在零-shot 任务中的表现。该模型结合了来自世界动作模型的先验信息，使得在处理连续的、接触丰富的操作时更加有效。通过潜在引导和动作引导，World Pilot 能够为决策过程提供场景的预期视图和运动提示。最终，该模型在 LIBERO-Plus 基准测试中达到了 84.7% 的成功率，成为当前最先进的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.10479', 'title': 'ComBench: A Benchmark for Rigorous Proof Reasoning and Constructive Realization in Olympiad-Level Combinatorics', 'url': 'https://huggingface.co/papers/2606.10479', 'abstract': "Abstract A new benchmark called ComBench is introduced to evaluate large language models' combinatorial reasoning abilities through Olympiad-level problems that test both proof construction and explicit mathematical constructions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Combinatorics is central to Olympiad-level mathematical problem solving, requiring deep discrete reasoning, creative constructions, and rigorous structural insight. Recent evidence suggests that even today's strongest frontier models remain uneven on Olympiad combinatorics, revealing a gap in creative mathematical reasoning. We introduce ComBench, an Olympiad-level combinatorics benchmark for evaluating and diagnosing the combinatorial reasoning capabilities of large language models. ComBench contains 100 human-annotated competition-level problems organized around two complementary settings: analysis-centric problems, which primarily require rigorous mathematical arguments, and construction-centric problems, which require explicit constructions in addition to correctness justifications. The evaluation protocol combines rubric-guided proof grading with deterministic construction verification, exposing cases where proof quality and construction validity diverge. Experiments on frontier open- and closed-source models show that ComBench is far from saturated: the strongest model reaches 65.4% overall Avg. and 75.3% overall Best@4. We further find that Rigorous Proof Reasoning and Constructive Realization are distinct capabilities: Kimi-K2.6 trails GPT-5.5 on analysis-centric proof grading but surpasses it on construction-centric Best@4, while Existence and Construction problems remain consistently hardest across representative frontier models.", 'score': 14, 'issue_id': 2410, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '1c02227f50e629ff', 'authors': ['Shunkai Zhang', 'Haoran Zhang', 'Yun Luo', 'Qianjia Cheng', 'Haodi Lei', 'Yizhuo Li', 'Runzhe Zhan', 'Zhilin Wang', 'Bangjie Xu', 'Yucheng Su', 'Xinmiao Han', 'Xiaoye Qu', 'Dongrui Liu', 'Zhouchen Lin', 'Yu Qiao', 'Ning Ding', 'Yafu Li', 'Yu Cheng'], 'affiliations': ['Peking University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.10479.jpg', 'data': {'categories': ['#plp', '#math', '#benchmark'], 'emoji': '🧩', 'ru': {'title': 'Комбинаторное мышление: когда доказательства и конструкции требуют разных навыков', 'desc': 'В работе представлен ComBench — новый бенчмарк для оценки способностей больших языковых моделей решать олимпиадные задачи по комбинаторике, требующие как строгого логического доказательства, так и явного математического конструирования. Бенчмарк содержит 100 аннотированных вручную задач, разделённых на две категории: задачи, ориентированные на анализ (требующие математической аргументации), и задачи, ориентированные на конструирование (требующие явных построений с обоснованиями). Авторы предлагают комплексный протокол оценки, сочетающий оценку доказательств по рубрикам с детерминированной проверкой корректности конструкций. Экспериментальные результаты показывают, что современные LLM имеют значительный потенциал для улучшения: лучшая модель достигает 65.4% точности, при этом выявляются различия в способностях к доказательствам и конструированию.'}, 'en': {'title': 'ComBench: Bridging the Gap in Combinatorial Reasoning for Language Models', 'desc': 'The paper introduces ComBench, a new benchmark designed to assess the combinatorial reasoning abilities of large language models using challenging Olympiad-level problems. These problems focus on two main areas: analysis-centric tasks that require rigorous mathematical arguments and construction-centric tasks that involve explicit mathematical constructions. The evaluation method combines detailed proof grading with verification of construction validity, highlighting discrepancies between proof quality and construction correctness. Experiments reveal that current leading models still struggle with combinatorial reasoning, indicating a significant gap in their creative mathematical capabilities.'}, 'zh': {'title': 'ComBench：评估语言模型的组合推理能力', 'desc': '本文介绍了一种新的基准测试，称为ComBench，用于评估大型语言模型在组合推理能力方面的表现。ComBench专注于奥林匹克级别的数学问题，测试模型的证明构造和明确的数学构造能力。研究表明，即使是当前最强的模型在组合数学方面的表现也不均衡，显示出创造性数学推理的不足。ComBench包含100个经过人工标注的竞赛级问题，分为分析中心和构造中心两种类型，旨在全面评估模型的组合推理能力。'}}}, {'id': 'https://huggingface.co/papers/2606.12195', 'title': 'InternVideo3: Agentify Foundation Models with Multimodal Contextual Reasoning', 'url': 'https://huggingface.co/papers/2606.12195', 'abstract': 'Abstract InternVideo3 enhances long-horizon multimodal tasks through Multimodal Contextual Reasoning and efficient attention mechanisms, demonstrating strong performance on video understanding benchmarks and video agent capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in foundation models has shifted toward agentic behavior involving multi-step reasoning and tool use. However, open-source efforts largely focus on text-dominant settings, leaving long-horizon multimodal tasks underexplored. This gap is evident in video tasks requiring sustained temporal understanding and iterative interaction. We present InternVideo3, a framework enhancing these capabilities via Multimodal Contextual Reasoning (MCR). MCR treats understanding as a closed-loop process over a shared, evolving context containing observations, instructions, reasoning, tool actions, and memory. This frames long-video understanding as evidence accumulation and verification. To ensure efficiency, we introduce Multimodal Multi-head Latent Attention (M^2LA), a token-preserving reparameterization compressing KV-cache states while retaining the full token stream. Our staged training includes continued pretraining, short-to-long supervised fine-tuning, rule-based reinforcement learning, and on-policy distillation. Experiments show InternVideo3 achieves strong performance on benchmarks like Video-MME, MLVU, and EgoSchema. We further instantiate the model as a video agent with retrieval tools, demonstrating robust evidence-grounded behavior. Our results suggest that efficient context handling and closed-loop reasoning are vital for adapting open multimodal models toward long-horizon visually grounded agency.', 'score': 8, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '976005e868c86461', 'authors': ['Ziang Yan', 'Sheng Xia', 'Jiashuo Yu', 'Yue Wu', 'Tianxiang Jiang', 'Songze Li', 'Kanghui Tian', 'Yicheng Xu', 'Yinan He', 'Kai Chen', 'Limin Wang', 'Yu Qiao', 'Yi Wang'], 'affiliations': ['Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.12195.jpg', 'data': {'categories': ['#training', '#open_source', '#architecture', '#reasoning', '#long_context', '#agents', '#multimodal', '#video', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Долгосрочное понимание видео через замкнутое контекстное рассуждение и эффективную компрессию памяти', 'desc': 'InternVideo3 — это фреймворк для долгосрочного мультимодального понимания видео, основанный на принципе Multimodal Contextual Reasoning, который рассматривает процесс понимания как замкнутый цикл накопления и проверки свидетельств. Для обеспечения эффективности авторы предложили механизм Multimodal Multi-head Latent Attention, который сжимает KV-cache при сохранении полного потока токенов. Модель обучается многоэтапно: продолжение предобучения, fine-tuning с переходом от коротких к длинным видео, обучение с подкреплением и дистилляция. Результаты показывают сильную производительность на бенчмарках Video-MME, MLVU и EgoSchema, а также демонстрируют способность модели работать в качестве видеоагента с инструментами поиска.'}, 'en': {'title': 'Enhancing Long-Horizon Video Understanding with InternVideo3', 'desc': 'InternVideo3 is a framework designed to improve the understanding of long videos by using Multimodal Contextual Reasoning (MCR) and efficient attention mechanisms. MCR allows the model to process information as a continuous loop, integrating observations, instructions, and actions to enhance reasoning over time. The framework also introduces Multimodal Multi-head Latent Attention (M^2LA), which optimizes memory usage while maintaining the integrity of the data. Experiments show that InternVideo3 excels in video understanding tasks and can function effectively as a video agent, highlighting the importance of efficient context management in multimodal learning.'}, 'zh': {'title': '提升长时间多模态任务的智能理解', 'desc': 'InternVideo3 是一个增强长时间多模态任务的框架，采用多模态上下文推理（MCR）和高效的注意力机制。MCR 将理解视为一个闭环过程，处理观察、指令、推理、工具操作和记忆等共享上下文。通过引入多模态多头潜在注意力（M^2LA），该框架在保持完整的令牌流的同时，压缩了 KV-cache 状态。实验结果表明，InternVideo3 在视频理解基准测试中表现出色，展示了其在视频代理能力方面的强大性能。'}}}, {'id': 'https://huggingface.co/papers/2606.12344', 'title': 'Claw-SWE-Bench: A Benchmark for Evaluating OpenClaw-style Agent Harnesses on Coding Tasks', 'url': 'https://huggingface.co/papers/2606.12344', 'abstract': 'Abstract A new benchmark and adapter protocol called Claw-SWE-Bench enables fair comparison of diverse coding agents by standardizing evaluation conditions and revealing the importance of adapter design for effective code generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct General-purpose agents such as OpenClaw are increasingly used as autonomous tool users, but their coding ability is difficult to measure under SWE-bench: a generic agent does not by itself satisfy the clean Docker workspace, patch, and prediction contract required for scoring. We introduce Claw-SWE-Bench, a multilingual SWE-bench-style benchmark and adapter protocol that makes heterogeneous agent harnesses, or claws, comparable under fair settings including a fixed prompt, runtime budget, workspace contract, patch extraction procedure, and evaluator. The full benchmark contains 350 GitHub issue-resolution instances across 8 languages and 43 repositories, drawn from SWE-bench-Multilingual and SWE-bench-Verified-Mini after future-commit cleanup. We also release Claw-SWE-Bench Lite for faster validation, which is an 80-instance subset selected by a cost-aware, rank-aware procedure over 17 calibration columns. On the full benchmark, OpenClaw with a minimal direct-diff adapter scores only 19.1% Pass@1, whereas the full adapter reaches 73.4% with the same GLM 5.1 backbone, showing that adapter design is essential for enabling OpenClaw-style harnesses to perform coding tasks effectively. Across an OpenClaw times nine-model sweep and a five-claw times two-model sweep, model choice changes Pass@1 by 29.4 pp and harness choice by 27.4 pp under fixed models; systems with similar accuracy can differ substantially in total API cost. Claw-SWE-Bench therefore treats harness and cost accounting as first-class axes of SWE-style coding-agent evaluation, providing both a full benchmark and a low-cost reference set for reproducible comparison. The data is available at https://github.com/opensquilla/claw-swe-bench and https://huggingface.co/datasets/TokenRhythm/Claw-SWE-Bench.', 'score': 6, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'fd575f0fffd75b38', 'authors': ['Mengyu Zheng', 'Kai Han', 'Boxun Li', 'Haiyang Xu', 'Yuchuan Tian', 'Wei He', 'Hang Zhou', 'Jianyuan Guo', 'Hailin Hu', 'Lin Ma', 'Chao Xu', 'Guohao Dai', 'Lixue Xia', 'Yunchao Wei', 'Yunhe Wang', 'Yu Wang'], 'affiliations': ['Beijing Jiaotong University', 'City University of Hong Kong', 'Infinigence AI', 'Peking University', 'SEE Fund', 'Shanghai Jiaotong University', 'TokenRhythm Technologies', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.12344.jpg', 'data': {'categories': ['#open_source', '#dataset', '#plp', '#agents', '#multilingual', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'Стандартизация оценки кодирующих агентов через адаптивные протоколы', 'desc': 'В статье представлен новый бенчмарк Claw-SWE-Bench и стандартный протокол адаптеров для справедливого сравнения различных кодирующих агентов. Авторы показывают, что универсальные агенты, такие как OpenClaw, требуют специальных адаптеров для эффективной работы с задачами разрешения проблем на GitHub. Бенчмарк включает 350 примеров разрешения проблем на 8 языках программирования и предусматривает унифицированные условия оценки, включая фиксированный промпт и бюджет вычислений. Исследование демонстрирует, что выбор адаптера может увеличить успешность выполнения задач с 19.1% до 73.4%, а выбор модели и архитектуры агента существенно влияют на как точность, так и стоимость API-запросов.'}, 'en': {'title': 'Standardizing Coding Agent Evaluation with Claw-SWE-Bench', 'desc': 'The paper introduces Claw-SWE-Bench, a new benchmark and adapter protocol designed to standardize the evaluation of coding agents, allowing for fair comparisons across different models. It highlights the significance of adapter design in enhancing the performance of general-purpose coding agents like OpenClaw, which struggle to meet specific evaluation criteria. The benchmark includes 350 instances from various programming languages and emphasizes the impact of model and harness choices on coding task success rates. By treating harness design and cost as critical factors in evaluation, Claw-SWE-Bench aims to improve the reproducibility and effectiveness of coding agent assessments.'}, 'zh': {'title': '公平比较编码代理的全新基准', 'desc': 'Claw-SWE-Bench是一个新的基准和适配器协议，旨在通过标准化评估条件来公平比较不同的编码代理。它揭示了适配器设计在有效代码生成中的重要性。该基准包含350个跨8种语言的GitHub问题解决实例，提供了一个多语言的评估框架。研究表明，适配器设计对编码任务的有效性至关重要，且不同的模型和适配器选择会显著影响性能。'}}}, {'id': 'https://huggingface.co/papers/2606.11722', 'title': 'ICA Lens: Interpreting Language Models Without Training Another Dictionary', 'url': 'https://huggingface.co/papers/2606.11722', 'abstract': 'Abstract Independent component analysis (ICA) is revived as an efficient method for discovering interpretable directions in language model representations, offering a faster alternative to sparse autoencoder training while maintaining competitive performance in probing tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Finding interpretable directions in language-model representations is critical for understanding and controlling model behavior. Sparse autoencoders (SAEs) have become the standard tool for this purpose, but using them as the default first lens often requires training, storing, and evaluating large overcomplete dictionaries. This bottleneck limits rapid exploration and raises a fundamental question: how much interpretable structure is already visible from activation geometry before training another neural dictionary? Our intuition is simple: many interpretable directions are selective on tokens, and these directions should look less Gaussian than random directions. We therefore revisit independent component analysis (ICA), a classical method for finding non-Gaussian directions, as a compact lens for language-model interpretability. We find that ICA has been underestimated for LLM interpretability, because prior uses often relied on off-the-shelf ICA implementations that are brittle on LLM activations and lacked systematic tools for inspecting and evaluating the recovered directions. To bridge these gaps, we introduce ICALens, the first practical workflow for stable, efficient, and auditable ICA analysis of LLM representations. It combines an optimized GPU-parallel FastICA pipeline with LLM-specific stability recipes and better fitting diagnostics, enabling efficient and reliable layer-wise analysis. Across GPT-2 Small, Gemma 2 2B, and Qwen 3.5 2B Base, ICALens efficiently recovers compact, human-interpretable directions without per-layer gradient-based dictionary training. On SAEBench, ICA is competitive with public SAEs in sparse probing and outperforms them in targeted probe perturbation under small-to-medium budgets. These results suggest that ICA should not be viewed as a weak baseline, but as an efficient and complementary first lens for exploring language-model representations.', 'score': 6, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'c74f9ed1ab09acb3', 'authors': ['Sida Liu', 'Feijiang Han'], 'affiliations': ['Independent Researcher', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2606.11722.jpg', 'data': {'categories': ['#training', '#small_models', '#interpretability', '#architecture'], 'emoji': '🔍', 'ru': {'title': 'ICA как быстрая альтернатива для интерпретации представлений языковых моделей', 'desc': 'В этой работе авторы возрождают метод независимого анализа компонент (ICA) как эффективный инструмент для обнаружения интерпретируемых направлений в представлениях языковых моделей. Они показывают, что ICA работает быстрее, чем обучение разреженных автокодировщиков (SAE), требуя меньше вычислительных ресурсов на подготовку больших переполненных словарей. Авторы представляют ICALens — практический рабочий процесс с оптимизированным GPU-параллельным алгоритмом FastICA и специальными рецептами стабилизации для анализа представлений LLM. На бенчмарке SAEBench метод показывает конкурентные результаты с существующими разреженными автокодировщиками, демонстрируя, что ICA — это эффективная дополнительная линза для исследования поведения языковых моделей.'}, 'en': {'title': 'Unlocking Language Models: ICA as a Key to Interpretability', 'desc': 'This paper presents a new approach to understanding language model representations using Independent Component Analysis (ICA). ICA is shown to be a faster and more efficient method compared to traditional sparse autoencoders (SAEs) for discovering interpretable directions in model activations. The authors introduce ICALens, a practical workflow that enhances the stability and efficiency of ICA analysis specifically for language models. Their findings indicate that ICA can effectively recover interpretable directions without the need for extensive training, making it a valuable tool for probing and understanding model behavior.'}, 'zh': {'title': 'ICA：语言模型可解释性的高效新视角', 'desc': '独立成分分析（ICA）被重新评估为一种有效的方法，用于发现语言模型表示中的可解释方向。与稀疏自编码器（SAE）训练相比，ICA提供了更快的替代方案，同时在探测任务中保持竞争力。我们提出了ICALens，这是第一个稳定、高效且可审计的ICA分析工作流程，能够有效恢复紧凑且人类可解释的方向。研究结果表明，ICA在语言模型可解释性方面的潜力被低估，应该作为探索语言模型表示的高效补充工具。'}}}, {'id': 'https://huggingface.co/papers/2606.11683', 'title': 'Reason, Then Re-reason: Cross-view Revisiting Improves Spatial Reasoning', 'url': 'https://huggingface.co/papers/2606.11683', 'abstract': "Abstract A training-free framework for spatial reasoning from egocentric videos that enables revisiting conclusions through synthesized novel-view videos generated from predicted 3D geometry.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spatial reasoning from egocentric videos is inherently challenging because the observable evidence is constrained by the camera trajectory. Existing methods rely on single-turn inference, forcing models to resolve geometric ambiguity through semantic priors rather than verifiable evidence. We argue that spatial reasoning should be revisitable: conclusions formed under limited evidence should remain open to revision when complementary viewpoints become available. Building on this insight, we propose Reason, then Re-reason (ReRe), a training-free, inference-time framework with two phases: in the Reason Phase, an MLLM forms a spatial hypothesis from the original video; in the Re-reason Phase, it verifies or revises the hypothesis by observing a synthesized novel-view video. To enable effective cross-view revisiting, we design a Geometry-to-Video pipeline that renders strategically complementary novel views from predicted 3D geometry. These views feature an elevated, oblique perspective with scene-spanning coverage, while preserving the MLLM's native video interface without architectural modifications. Extensive evaluations on VSI-Bench and STI-Bench demonstrate that ReRe substantially boosts open-source MLLMs to rival proprietary state-of-the-art performance. Project page: https://zhenjiemao.github.io/ReRe/", 'score': 5, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '617797b64fdabef5', 'authors': ['Chaofan Ma', 'Zhenjie Mao', 'Yuhuan Yang', 'Fanqin Zeng', 'Yue Shi', 'Yingjie Zhou', 'Xiaofeng Cao', 'Jiangchao Yao'], 'affiliations': ['Cooperative Medianet Innovation Center, Shanghai Jiao Tong University', 'Shanghai Jiao Tong University', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2606.11683.jpg', 'data': {'categories': ['#3d', '#reasoning', '#inference', '#video', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'Переосмыслить пространство: пересматриваемое рассуждение через синтезированные виды', 'desc': 'Работа предлагает метод пространственного рассуждения из эгоцентрических видео, который не требует переобучения модели. Фреймворк состоит из двух этапов: сначала мультимодальная большая языковая модель (MLLM) формирует пространственную гипотезу на основе исходного видео, затем проверяет и пересматривает её, наблюдая синтезированное видео с новой точки зрения. Для создания дополняющих видовых ракурсов используется специально разработанный конвейер Geometry-to-Video, который генерирует виды с повышенной и косой перспективой из предсказанной 3D геометрии. Предложенный метод существенно улучшает производительность открытых MLLM, приближая их к качеству закрытых моделей-лидеров.'}, 'en': {'title': 'Revisiting Spatial Reasoning with Novel Views', 'desc': "This paper presents a new framework called Reason, then Re-reason (ReRe) for improving spatial reasoning in egocentric videos without the need for prior training. The approach consists of two phases: first, a machine learning language model (MLLM) generates a spatial hypothesis based on the original video, and then it revises this hypothesis using synthesized novel-view videos created from predicted 3D geometry. This method allows for revisiting conclusions as new viewpoints are introduced, addressing the limitations of existing single-turn inference methods that rely on semantic priors. The proposed Geometry-to-Video pipeline enhances the model's ability to verify hypotheses by providing complementary perspectives, leading to significant performance improvements in spatial reasoning tasks."}, 'zh': {'title': '空间推理的新视角：可重访的推理框架', 'desc': '本论文提出了一种无训练的空间推理框架，旨在从自我中心视频中进行推理。该框架允许通过合成的新视角视频来重新审视结论，这些视频是基于预测的三维几何生成的。我们认为，空间推理应该是可重访的，即在有限证据下形成的结论应在获得补充视角时保持开放修正。我们设计了一个名为Reason, then Re-reason (ReRe)的框架，分为两个阶段，首先形成空间假设，然后通过合成视频验证或修正该假设。'}}}, {'id': 'https://huggingface.co/papers/2606.12397', 'title': 'Redesign Mixture-of-Experts Routers with Manifold Power Iteration', 'url': 'https://huggingface.co/papers/2606.12397', 'abstract': 'Abstract Researchers propose a novel router redesign for Mixture-of-Experts models that aligns router rows with the principal singular directions of expert matrices using Manifold Power Iteration to improve model effectiveness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Router is the cornerstone component to the Mixture-of-Experts models. Serving as expert proxies, the rows of the router matrix compute their similarity to the MoE inputs to determine which subset of experts is activated. Ideally, each router row is designed to encode the expert matrix into this representative vector, such that its dot-product with token can better reflect token-expert affinity. However, there exists no design principles to enforce this condensation. In this paper, we propose to align each router row with the principal singular direction of the associated expert, as this direction provides the most expressive mathematical description of a matrix. Based on this principle, we propose a router redesign with Manifold Power Iteration (MPI). Specifically, it introduces a "Power-then-Retract" paradigm, where a power iteration step is performed on the router weights, followed by a retraction to impose a norm constraint to ensure both efficiency and stability. Theoretically, we show that MPI drives router rows to converge toward the principal singular directions of associated experts. Empirically, we pretrain MoE model across scales from 1B to 11B parameters to confirm that this alignment facilitates more effective MoE models.', 'score': 4, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '544c66b77a0731ed', 'authors': ['Songhao Wu', 'Ang Lv', 'Ruobing Xie', 'Yankai Lin'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Large Language Model Department, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2606.12397.jpg', 'data': {'categories': ['#optimization'], 'emoji': '🧭', 'ru': {'title': 'Маршрутизатор через главные сингулярные направления экспертов', 'desc': 'В этой работе предлагается новый подход к проектированию маршрутизатора в моделях Mixture-of-Experts путём выравнивания строк маршрутизатора с главными сингулярными направлениями матриц экспертов. Авторы используют метод Manifold Power Iteration, который реализует парадигму «Power-then-Retract», выполняя итерацию степени на весах маршрутизатора с последующей ретракцией для применения нормы-ограничения. Теоретически показано, что предложенный метод обеспечивает сходимость строк маршрутизатора к главным сингулярным направлениям соответствующих экспертов. Эмпирически подтверждено, что такое выравнивание улучшает эффективность MoE моделей масштабом от 1B до 11B параметров.'}, 'en': {'title': 'Aligning Routers for Enhanced Mixture-of-Experts Performance', 'desc': 'This paper introduces a new design for routers in Mixture-of-Experts (MoE) models that enhances their performance by aligning router rows with the main singular directions of expert matrices. The proposed method, called Manifold Power Iteration (MPI), uses a two-step process: first, it applies power iteration to the router weights, and then it retracts them to maintain stability and efficiency. This alignment helps the router rows better represent the expert matrices, improving the selection of activated experts based on input similarity. The authors demonstrate that this approach leads to more effective MoE models through extensive pretraining experiments with varying model sizes.'}, 'zh': {'title': '优化混合专家模型的路由器设计', 'desc': '本文提出了一种新颖的路由器重设计，旨在通过流形幂迭代方法将路由器行与专家矩阵的主奇异方向对齐，从而提高混合专家模型的有效性。路由器是混合专家模型的核心组件，负责计算与输入的相似度以决定激活的专家子集。我们提出的设计原则确保每个路由器行能够有效地编码专家矩阵，并通过与输入的点积更好地反映输入与专家的亲和力。通过在1B到11B参数规模的混合专家模型上进行预训练，我们验证了这种对齐方法能够促进更有效的模型性能。'}}}, {'id': 'https://huggingface.co/papers/2606.12373', 'title': 'Verifiable Environments Are LEGO Bricks: Recursive Composition for Reasoning Generalization', 'url': 'https://huggingface.co/papers/2606.12373', 'abstract': 'Abstract Recursive automated composition framework enables scalable reinforcement learning for language models by automatically combining verifiable environments through compositional operators.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement Learning (RL) with verifiable environments has emerged as a powerful approach for enhancing the reasoning capabilities of Large Language Models (LLMs). While prior research demonstrates that scaling environment quantity improves RL performance, existing manual or individual construction methods suffer from linear scaling limits, thereby hindering scalable reasoning generalization. This paper introduces RACES (Recursive Automated Composition for Environment Scaling), a framework that conceptualizes verifiable environments as composable building blocks that can be recursively assembled. The key insight is that when the codomain (output type) of one environment matches the domain (input type) of another, they can be automatically fused into a new verifiable environment, enabling recursive composition. RACES is implemented with 300 individual environments and defines a set of composition operators (SEQUENTIAL, PARALLEL, SORT, and SELECT) that induce diverse reasoning patterns. Extensive experiments show that RL training on these composite environments consistently enhances reasoning generalization. Specifically, RACES improves DeepSeek-R1-Distill-Qwen-14B by an average of 3.1 points (from 48.2 to 51.3) and boosts Qwen3-14B performance from 58.8 to 61.1 on six benchmarks, which are unseen during the construction of training environments. Moreover, RACES achieves performance comparable to training on 300 individual environments using only 50 base environments, demonstrating significant efficiency in environment utilization.', 'score': 3, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'c46513138c926729', 'authors': ['Hao Xiang', 'Qiaoyu Tang', 'Le Yu', 'Yaojie Lu', 'Xianpei Han', 'Ben He', 'Le Sun', 'Bowen Yu', 'Peng Wang', 'Hongyu Lin', 'Dayiheng Liu'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Qwen Team, Alibaba Group', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.12373.jpg', 'data': {'categories': ['#training', '#rl', '#reasoning', '#optimization', '#benchmark'], 'emoji': '🧩', 'ru': {'title': 'Рекурсивная композиция для масштабируемого обучения с подкреплением языковых моделей', 'desc': 'В статье представлена фреймворк RACES для масштабируемого обучения с подкреплением языковых моделей путём автоматического составления проверяемых сред. Основная идея заключается в том, что среды можно рассматривать как композиционные блоки, которые рекурсивно комбинируются, когда выходной тип одной среды соответствует входному типу другой. Фреймворк использует набор операторов композиции (SEQUENTIAL, PARALLEL, SORT и SELECT), которые порождают разнообразные паттерны рассуждений. Экспериментальные результаты показывают, что обучение на составленных средах значительно улучшает обобщение рассуждений: достигается прирост в 3.1 балла для DeepSeek-R1-Distill-Qwen-14B и рост производительности Qwen3-14B на 2.3 балла на невидимых бенчмарках.'}, 'en': {'title': 'RACES: Efficiently Scaling Reinforcement Learning with Composable Environments', 'desc': 'This paper presents RACES, a framework that enhances reinforcement learning for language models by using composable environments. It allows for the automatic combination of verifiable environments, which helps in scaling the reasoning capabilities of large language models. By defining composition operators, RACES can create diverse reasoning patterns and improve generalization in training. The results show that RACES can achieve high performance with fewer environments, making it an efficient approach for training language models.'}, 'zh': {'title': '递归组合，提升推理能力！', 'desc': '本文提出了一种递归自动组合框架RACES，用于增强语言模型的强化学习能力。该框架通过可组合的环境构建块，自动组合可验证的环境，从而实现可扩展的推理能力。RACES定义了一组组合操作符，能够生成多样化的推理模式，并在300个个体环境上进行实验，显示出显著的推理泛化能力提升。实验结果表明，RACES在使用仅50个基础环境的情况下，达到了与300个个体环境相当的性能，展示了环境利用的高效性。'}}}, {'id': 'https://huggingface.co/papers/2606.12370', 'title': 'Breaking Entropy Bounds: Accelerating RL Training via MTP with Rejection Sampling', 'url': 'https://huggingface.co/papers/2606.12370', 'abstract': 'Abstract Bebop addresses the efficiency bottleneck in reinforcement learning training of large language models by optimizing multi-token prediction techniques through entropy-aware sampling and novel training objectives that improve acceptance rates and inference throughput.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) has become a key component in modern large language models, yet the rollout stage remains the key bottleneck in RL training pipelines. Although Multi-Token Prediction (MTP) offers a natural solution to accelerate rollouts through speculative decoding, many studies have observed that MTP acceptance rates degrade significantly during RL training, leading to limited speedup performance. To address this bottleneck, we present Bebop, a systematic study of MTP in LLM post-training, and offer practical recipes to integrate MTP into large-scale RL pipelines. First, we reveal that the MTP acceptance rate is fundamentally bounded by the fluctuation of model entropy, which demonstrates a clear negative linear relationship with the rise of entropy in the RL stage. Second, we show that probabilistic rejection sampling largely alleviates the disturbance introduced by entropy in RL compared to greedy draft sampling. We further identify that the conventional MTP training objectives (cross-entropy or KL) are suboptimal in such settings, and therefore we propose a novel end-to-end TV loss that directly optimizes multi-step rejection sampling acceptance rate, yielding ~10% acceptance rate improvements, achieving up to 95% acceptance rates and up to 25% extra inference throughput gains across mathematical reasoning, code generation, and agentic tasks. Third, we test various online MTP training strategies during RL and show that pre-RL MTP training with e2e TV loss and rejection sampling achieves a consistent acceptance rate and speedup throughout the entire RL, eliminating the need for costly online MTP updating. We provide extensive experiments and analysis that validate our findings. Experimental results show our method achieves up to 1.8x end-to-end acceleration in async RL training of Qwen3.5, Qwen3.6, and Qwen3.7 models.', 'score': 2, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '1a297d185442d9cc', 'authors': ['Yucheng Li', 'Huiqiang Jiang', 'Yang Xu', 'Jianxin Yang', 'Yi Zhang', 'Yizhong Cao', 'Yuhao Shen', 'Fan Zhou', 'Rui Men', 'Jianwei Zhang', 'An Yang', 'Bowen Yu', 'Bo Zheng', 'Fei Huang', 'Junyang Lin', 'Dayiheng Liu', 'Jingren Zhou'], 'affiliations': ['Alibaba Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.12370.jpg', 'data': {'categories': ['#inference', '#training', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Ускорение обучения больших языковых моделей через оптимизацию многотокенового предсказания', 'desc': 'Bebop решает проблему неэффективности обучения с подкреплением больших языковых моделей, оптимизируя технику многотокенового предсказания через выборку с учётом энтропии и новые целевые функции. Авторы показали, что скорость принятия предсказаний напрямую зависит от флуктуации энтропии модели и предложили использовать вероятностную выборку с отклонением вместо жадной стратегии. Они разработали новую TV-функцию потерь, которая напрямую оптимизирует скорость принятия многошаговой выборки с отклонением, достигая ~10% улучшения и до 95% скорости принятия. Экспериментальные результаты показывают ускорение работы моделей Qwen в 1.8 раза при асинхронном обучении с подкреплением.'}, 'en': {'title': 'Bebop: Accelerating RL Training with Optimized Multi-Token Prediction', 'desc': 'The paper presents Bebop, a solution to improve the efficiency of reinforcement learning (RL) training for large language models (LLMs) by optimizing multi-token prediction (MTP) techniques. It identifies that the acceptance rates of MTP degrade during RL training due to fluctuations in model entropy, which negatively impacts performance. The authors propose a novel training objective, the end-to-end TV loss, which enhances acceptance rates and inference throughput by addressing the issues caused by entropy. Through extensive experiments, Bebop demonstrates significant improvements in acceptance rates and training speed, achieving up to 1.8 times faster RL training for various Qwen models.'}, 'zh': {'title': '提升强化学习效率的创新方法', 'desc': 'Bebop 论文解决了大语言模型强化学习训练中的效率瓶颈，优化了多标记预测技术。通过引入基于熵的采样和新颖的训练目标，Bebop 提高了接受率和推理吞吐量。研究表明，传统的多标记预测训练目标在这种情况下并不理想，因此提出了一种新的端到端 TV 损失函数。实验结果显示，该方法在 Qwen 模型的异步强化学习训练中实现了高达 1.8 倍的加速。'}}}, {'id': 'https://huggingface.co/papers/2606.11786', 'title': 'Lius: Translation Model Based Instructional Lingustic Using Continual Instruction Tuning In Kupang Malay', 'url': 'https://huggingface.co/papers/2606.11786', 'abstract': 'Abstract Continual Instruction Tuning enables effective fine-tuning of large language models for low-resource language translation, achieving superior performance compared to standard instruction tuning and multilingual models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) offer new potential for translation tasks but often experience performance degradation when handling low-resource languages. To address this limitation, we propose an approach for fine-tuning LLMs on a low-resource language, Kupang Malay. Our approach involves designing a set of instructions by leveraging explicit lexical and semantic features from a bilingual dictionary, and introducing Continual Instruction Tuning (CIT), a training paradigm that enables iterative instruction-based training. Experimental results demonstrate that our model, named Lius, yields notable improvements over standard instruction-tuned models by outperforming 4-6 points, and surpassing both Neural Machine Translation (NMT) and Multilingual LLM models by 10-13 points on several evaluation metrics. These findings highlight the potential of our approach to mitigate the reliance on large-scale parallel data in low-resource language translation.', 'score': 1, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '69f5b1dedda8c657', 'authors': ['Joanito Agili Lopo', 'Yunita Sari', 'Guntur Budi Herwanto'], 'affiliations': ['Department of Computer Science and Electronics Universitas Gadjah Mada'], 'pdf_title_img': 'assets/pdf/title_img/2606.11786.jpg', 'data': {'categories': ['#training', '#optimization', '#low_resource', '#multilingual', '#translation'], 'emoji': '🌍', 'ru': {'title': 'Итеративная инструкционная настройка для перевода низкоресурсных языков', 'desc': 'В этой работе предложен метод Continual Instruction Tuning (CIT) для эффективной адаптации больших языковых моделей на задачу машинного перевода для языков с ограниченными ресурсами. Авторы разработали набор инструкций на основе лексических и семантических признаков из двуязычного словаря и применили итеративную парадигму обучения на примере языка Купанг-малайский. Полученная модель Lius показала значительные улучшения, превосходя стандартные инструкции для настройки на 4-6 баллов и нейронные системы машинного перевода на 10-13 баллов по различным метрикам оценки. Результаты демонстрируют, что подход CIT успешно снижает зависимость от больших объёмов параллельных данных при переводе языков с низкими ресурсами.'}, 'en': {'title': 'Enhancing Low-Resource Language Translation with Continual Instruction Tuning', 'desc': 'This paper presents a method called Continual Instruction Tuning (CIT) to improve the translation of low-resource languages using large language models (LLMs). The authors focus on translating Kupang Malay by creating specific instructions based on bilingual dictionary features. Their experimental results show that the Lius model, which uses CIT, significantly outperforms traditional instruction-tuned models and other multilingual models. This approach reduces the need for extensive parallel data, making it easier to translate languages with fewer resources.'}, 'zh': {'title': '持续指令调优：提升低资源语言翻译的利器', 'desc': '本论文提出了一种新的方法，称为持续指令调优（CIT），用于对大型语言模型进行微调，以提高低资源语言的翻译效果。我们专注于库旁马来语，通过利用双语词典中的词汇和语义特征设计指令集，来增强模型的翻译能力。实验结果表明，我们的模型Lius在多个评估指标上比标准指令调优模型提高了4-6个百分点，且在神经机器翻译和多语言模型上超越了10-13个百分点。此研究展示了在低资源语言翻译中，减少对大规模平行数据依赖的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.12072', 'title': 'World Model Self-Distillation: Training World Models to Solve General Tasks', 'url': 'https://huggingface.co/papers/2606.12072', 'abstract': 'Abstract A scalable framework combines self-distillation and reinforcement learning to transfer task-solving abilities from vision-language models to video diffusion models without requiring labeled task-video data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pretrained video generators are promising visual world models that exhibit emergent task-solving abilities; however, their reliance on detailed textual descriptions limits their direct use for planning and decision-making. Existing approaches either outsource this reasoning to language or vision-language models, or rely on supervised fine-tuning with paired task-execution videos, which are costly to collect and difficult to scale. We propose a scalable framework that elicits task-solving ability in such models by combining self-distillation with reinforcement learning. Given an unlabeled scene image, a vision-language model generates a candidate task and a detailed step-by-step solution. The solution conditions a pretrained video diffusion model, the Demonstrator; we distill its behavior into an Executor conditioned only on the image and a short task prompt. This transfers execution knowledge from caption-guided generation to instruction-conditioned task solving without curated task-video supervision. We further improve the Executor with reinforcement learning from VLM feedback, exploiting the asymmetry between judging whether a sampled video satisfies a task and generating the solution. Experiments on our proposed WorldTasks-Benchmark and the DreamGen robotics benchmark show that the Executor surpasses the Demonstrator under our VLM-based evaluation protocol and transfers competitively to robotic tasks.', 'score': 0, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'e9ef6462b4e67544', 'authors': ['Sebastian Stapf', 'Pablo Acuaviva Huertos', 'Aram Davtyan', 'Paolo Favaro'], 'affiliations': ['University of Bern'], 'pdf_title_img': 'assets/pdf/title_img/2606.12072.jpg', 'data': {'categories': ['#training', '#rl', '#transfer_learning', '#dataset', '#benchmark', '#reasoning', '#diffusion', '#robotics', '#optimization', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Обучение видео-моделей решать задачи без размеченных данных через дистилляцию и подкрепление', 'desc': 'В работе предложена масштабируемая система для передачи навыков решения задач от vision-language моделей к видео диффузионным моделям без использования размеченных данных. Метод комбинирует self-distillation и reinforcement learning: vision-language модель генерирует задачу и пошаговое решение, которое кондиционирует модель Demonstrator, а её поведение дистиллируется в модель Executor, обученную только на изображении и коротком промпте. Executor дополнительно улучшается через reinforcement learning с использованием обратной связи от vision-language модели, эксплуатируя асимметрию между оценкой и генерацией решений. Эксперименты показывают, что Executor превосходит Demonstrator и успешно переносится на роботические задачи.'}, 'en': {'title': 'Empowering Video Models with Self-Distillation and Reinforcement Learning', 'desc': 'This paper presents a new framework that combines self-distillation and reinforcement learning to enhance video diffusion models by leveraging vision-language models. The approach allows these models to learn task-solving skills without needing labeled video data, which is often expensive and hard to obtain. By generating tasks and solutions from images, the framework distills knowledge from a pretrained model to create an Executor that can perform tasks based on minimal input. The results demonstrate that this method not only improves performance on benchmarks but also effectively transfers to real-world robotic applications.'}, 'zh': {'title': '无监督视频任务解决的新方法', 'desc': '这篇论文提出了一个可扩展的框架，结合自蒸馏和强化学习，将视觉语言模型的任务解决能力转移到视频扩散模型上，而无需标记的任务视频数据。通过给定未标记的场景图像，视觉语言模型生成候选任务和详细的逐步解决方案。这个解决方案为预训练的视频扩散模型提供条件，从而将执行知识从基于字幕的生成转移到基于指令的任务解决。实验结果表明，执行器在我们的评估协议下超越了演示者，并在机器人任务中表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2606.11324', 'title': 'Embodied-R1.5: Evolving Physical Intelligence via Embodied Foundation Models', 'url': 'https://huggingface.co/papers/2606.11324', 'abstract': 'Abstract Embodied-R1.5 is a unified embodied foundation model that integrates embodied reasoning capabilities and achieves state-of-the-art performance on embodied vision-language benchmarks through a multi-task balanced reinforcement learning approach.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Embodied-R1.5, a unified Embodied Foundation Model (EFM) that integrates comprehensive embodied reasoning capabilities, spanning embodied cognition, task planning, correction, and pointing, within a single architecture toward general physical intelligence. Leveraging three automated data construction pipelines to significantly expand the data coverage of critical capabilities, we build a large-scale data system of over 15B tokens, and design a multi-task balanced RL recipe to alleviate heterogeneous task conflicts. We further introduce a Planner-Grounder-Corrector (PGC) closed-loop framework that enables a single model to autonomously execute and self-correct over long-horizon tasks. With only 8B parameters, Embodied-R1.5 achieves SOTA on 16 out of 24 embodied VLM benchmarks, surpassing leading models like Gemini-Robotics-ER-1.5 and GPT-5.4. Benefiting from the internalized embodied capabilities, Embodied-R1.5 can be fine-tuned into a VLA with only a small amount of data, outperforming leading VLA models like π_{0.5} across 4 popular manipulation benchmark suites. We further conduct extensive zero-shot real-robot experiments, validating performance in instruction following, affordance grounding, articulated object manipulation, and long-horizon complex tasks, demonstrating strong generalization to the physical world. We open-source model weights, datasets, training code, and EmbodiedEvalKit, an evaluation framework tailored for embodied tasks, to facilitate future research in EFMs.', 'score': 0, 'issue_id': 2410, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '10c8f652d368b7d4', 'authors': ['Yifu Yuan', 'Yaoting Huang', 'Xianze Yao', 'Yutong Li', 'Shuoheng Zhang', 'Linqi Han', 'Pengyi Li', 'Jiangeng Sun', 'Wenting Jia', 'Zhao Zhang', 'Yuhao Liu', 'Ruihao Liao', 'Yucheng Hu', 'Qiyu Wu', 'Yuxiao Li', 'Zibin Dong', 'Fei Ni', 'Yan Zheng', 'Shuyang Gu', 'Yi Ma', 'Hongyao Tang', 'Han Hu', 'Jianye Hao'], 'affiliations': ['Tencent Hunyuan', 'Tianjin University'], 'pdf_title_img': 'assets/pdf/title_img/2606.11324.jpg', 'data': {'categories': ['#training', '#rl', '#open_source', '#dataset', '#reasoning', '#robotics', '#agents', '#multimodal', '#optimization', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Универсальный робот-помощник, который учится у своих ошибок', 'desc': "Embodied-R1.5 — это объединённая модель-основание для воплощённого интеллекта, которая интегрирует возможности рассуждения о физическом взаимодействии в единую архитектуру с 8 миллиардами параметров. Модель обучается на большом наборе данных из 15 миллиардов токенов, построенном с помощью трёх автоматизированных кон
