    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.14368', 'title': 'Where Should Diffusion Enter a Language Model? Geometry-Guided Hidden-State Replacement', 'url': 'https://huggingface.co/papers/2605.14368', 'abstract': 'Abstract DiHAL, a geometry-guided diffusion-transformer hybrid, identifies optimal layers for diffusion integration in pretrained transformers by using geometry-based proxies to select diffusion-friendly hidden-state interfaces, enabling more effective language modeling compared to traditional continuous diffusion approaches.  AI-generated summary Continuous diffusion language models lag behind autoregressive transformers, partly because diffusion is applied in spaces poorly suited to language denoising and token recovery. We propose DiHAL, a geometry-guided diffusion-transformer hybrid that asks where diffusion should enter a pretrained transformer. DiHAL scores layers with geometry-based proxies, selects a diffusion-friendly hidden-state interface, and replaces the lower transformer prefix with a diffusion bridge while retaining the upper layers and original LM head. By reconstructing the selected-layer hidden state rather than tokens, DiHAL avoids direct continuous-to-discrete recovery. Experiments on 8B-scale backbones show that the geometry score predicts effective shallow insertion layers under a fixed bridge-training protocol and that hidden-state recovery improves over continuous diffusion baselines in a diagnostic comparison matching the diffusion/recovery training budget. These results suggest that hidden-state geometry helps identify where diffusion-based replacement is feasible inside pretrained language models.', 'score': 11, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '4a682ee0fc61bdd2', 'authors': ['Injin Kong', 'Hyoungjoon Lee', 'Yohan Jo'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14368.jpg', 'data': {'categories': ['#training', '#architecture', '#diffusion', '#optimization'], 'emoji': '🧭', 'ru': {'title': 'Геометрия показывает куда встраивать диффузию в трансформеры', 'desc': 'В статье предлагается DiHAL — гибридный подход, объединяющий диффузионные модели и трансформеры для улучшения языкового моделирования. Авторы используют геометрические прокси для определения оптимальных слоёв трансформера, где следует интегрировать диффузионный процесс вместо попытки применять его ко всей модели. Предложенный метод заменяет нижние слои трансформера диффузионным мостом, восстанавливая скрытые состояния вместо токенов, что избегает проблемы прямого преобразования между непрерывным и дискретным пространствами. Экспериментальные результаты показывают, что геометрические оценки эффективно предсказывают слои для вставки диффузии и обеспечивают улучшение по сравнению с базовыми подходами непрерывной диффузии.'}, 'en': {'title': 'Revolutionizing Language Modeling with Geometry-Guided Diffusion', 'desc': 'The paper introduces DiHAL, a new model that combines diffusion processes with transformers to improve language modeling. It uses geometry-based methods to determine the best layers in a pretrained transformer for integrating diffusion, which helps in better recovering hidden states. Unlike traditional methods that focus on token recovery, DiHAL reconstructs hidden states directly, making the process more efficient. Experiments show that this approach outperforms existing continuous diffusion models by effectively utilizing the structure of the transformer.'}, 'zh': {'title': '几何引导的扩散-变换器混合模型', 'desc': 'DiHAL是一种几何引导的扩散-变换器混合模型，旨在通过几何代理选择适合扩散的隐藏状态接口，从而优化预训练变换器中的扩散集成层。与传统的连续扩散方法相比，DiHAL在语言建模方面表现更为有效。该模型通过重建选定层的隐藏状态，而不是直接恢复标记，避免了连续到离散的直接转换。实验结果表明，几何评分能够有效预测在固定桥接训练协议下的浅层插入层，并且隐藏状态恢复在诊断比较中优于连续扩散基线。'}}}, {'id': 'https://huggingface.co/papers/2605.14038', 'title': 'Model-Adaptive Tool Necessity Reveals the Knowing-Doing Gap in LLM Tool Use', 'url': 'https://huggingface.co/papers/2605.14038', 'abstract': 'Abstract Research reveals a disconnect between language models\' recognition of when tools are needed and their actual tool invocation behavior, identifying a "knowing-doing gap" in tool-use reliability.  AI-generated summary Large language models (LLMs) increasingly act as autonomous agents that must decide when to answer directly vs. when to invoke external tools. Prior work studying adaptive tool use has largely treated tool necessity as a model-agnostic property, annotated by human or LLM judge, and mostly cover cases where the answer is obvious (e.g., fetching the weather vs. paraphrasing text). However, tool necessity in the wild is more nuanced due to the divergence of capability boundaries across models: a problem solvable by a strong model on its own may still require tools for a weaker one. In this work, we introduce a model-adaptive definition of tool-necessity, grounded in each model\'s empirical performance. Following this definition, we compare the necessity against observed tool-call behavior across four models on arithmetic and factual QA dataset, and find substantial mismatches of 26.5-54.0% and 30.8-41.8%, respectively. To diagnose the failure, we decompose tool use into two stages: an internal cognition stage that reflects whether a model believes a tool is necessary, and an execution stage that determines whether the model actually makes a tool-call action. By probing the LLM hidden states, we find that both signals are often linearly decodable, yet their probe directions become nearly orthogonal in the late-layer, last-token regime that drives the next-token action. By tracing the trajectory of samples in the two-stage process, we further discover that the majority of mismatch is concentrated in the cognition-to-action transition, not in cognition itself. These results reveal a knowing-doing gap in LLM tool-use: improving tool-use reliability requires not only better recognition of when tools are needed, but also better translation of that recognition into action.', 'score': 7, 'issue_id': 2262, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '9ee000aa55bce87f', 'authors': ['Yize Cheng', 'Chenrui Fan', 'Mahdi JafariRaviz', 'Keivan Rezaei', 'Soheil Feizi'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2605.14038.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark'], 'emoji': '🔀', 'ru': {'title': 'Разрыв между знанием и действием: проблема надёжности использования инструментов в LLM', 'desc': 'Исследование выявляет расхождение между способностью языковых моделей распознавать необходимость использования инструментов и их фактическим поведением при вызове этих инструментов. Авторы вводят модель-адаптивное определение необходимости инструмента, основанное на эмпирической производительности каждой модели, и обнаруживают несоответствия от 26,5% до 54,0% на арифметических задачах. Они декомпозируют процесс использования инструментов на две стадии: внутреннее познание (осознание необходимости) и исполнение (фактический вызов), анализируя скрытые состояния LLM. Основной вывод показывает, что большинство ошибок происходит при переходе от распознавания потребности к действию, а не в самом процессе распознавания.'}, 'en': {'title': 'Bridging the Knowing-Doing Gap in Tool Use for Language Models', 'desc': 'This paper investigates the gap between language models\' understanding of when to use external tools and their actual behavior in invoking those tools, termed the "knowing-doing gap." It highlights that while models can recognize tool necessity, they often fail to act on that recognition, especially in complex scenarios. The authors propose a model-adaptive definition of tool necessity, which varies based on each model\'s performance capabilities. By analyzing the decision-making process in two stages—cognition and execution—they find that most discrepancies occur in the transition from recognizing the need for a tool to actually using it.'}, 'zh': {'title': '缩小工具使用的知行差距', 'desc': '本研究揭示了语言模型在识别工具需求与实际调用工具行为之间的脱节，形成了工具使用可靠性的“知行差距”。大型语言模型（LLMs）作为自主代理，需要判断何时直接回答，何时调用外部工具。我们提出了一种基于模型实际表现的工具必要性定义，并比较了四个模型在算术和事实问答数据集上的工具调用行为，发现存在显著的不匹配。研究表明，改善工具使用的可靠性不仅需要更好地识别工具的需求，还需要更有效地将这种识别转化为实际行动。'}}}, {'id': 'https://huggingface.co/papers/2605.17672', 'title': 'Stop When Reasoning Converges: Semantic-Preserving Early Exit for Reasoning Models', 'url': 'https://huggingface.co/papers/2605.17672', 'abstract': 'Abstract Researchers introduce PUMA, a framework that uses semantic redundancy detection to improve reasoning efficiency in large models by identifying when continued thinking provides no new insights, thus reducing computational waste while maintaining answer accuracy and reasoning quality.  AI-generated summary Large Reasoning Models (LRMs) achieve strong performance by generating long chains of thought (CoT), but often overthink, continuing to reason after a solution has already stabilized and thereby wasting tokens and increasing latency. Existing inference-time early-exit methods rely primarily on answer-level signals, such as confidence or trial-answer consistency, to decide when to stop. However, these signals mainly reflect answer readiness rather than reasoning convergence: they may trigger before the model has finished exploring or self-correcting, causing premature exits that can degrade final-answer accuracy and leave the retained reasoning chain semantically incomplete. We identify reasoning-level semantic redundancy as a complementary signal for semantic-preserving early exit: when successive steps no longer add novel progress and instead revisit established conclusions, the reasoning trajectory has likely converged. Building on this insight, we propose PUMA, a plug-and-play framework that combines a lightweight Redundancy Detector with answer-level verification. The detector flags semantically redundant candidate exits, while verification confirms whether stopping is safe, allowing PUMA to remove redundant continuation while preserving both answer accuracy and a coherent reasoning prefix. Across five LRMs and five challenging reasoning benchmarks, PUMA achieves 26.2% average token reduction while preserving accuracy and retained CoT quality. Additional experiments on code generation, zero-shot vision-language reasoning, and learned stopping-policy internalization further demonstrate that reasoning-level redundancy is a robust, transferable, and learnable signal for efficient reasoning. Our code is available at https://github.com/giovanni-vaccarino/PUMA.', 'score': 6, 'issue_id': 2262, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': '13382a26468baf69', 'authors': ['Dehai Min', 'Giovanni Vaccarino', 'Huiyi Chen', 'Yongliang Wu', 'Gal Yona', 'Lu Cheng'], 'affiliations': ['Google Research', 'Politecnico di Milano', 'University of Illinois Chicago', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.17672.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#open_source'], 'emoji': '🛑', 'ru': {'title': 'Останавливай рассуждение вовремя: семантическая избыточность как сигнал для эффективного вывода', 'desc': 'Исследователи представляют PUMA — фреймворк для оптимизации вывода больших языковых моделей, который использует детектор семантической избыточности для определения момента, когда дальнейшее рассуждение не добавляет новую информацию. В отличие от существующих методов ранней остановки, основанных на сигналах уверенности модели, PUMA анализирует сходимость цепочки мысли на уровне рассуждений, выявляя повторение уже установленных выводов. Фреймворк комбинирует детектор избыточности с верификацией ответа, позволяя безопасно останавливать вычисления и сокращать использование токенов на 26.2% без потери точности. Метод демонстрирует универсальность и применимость к различным задачам от логического вывода до генерации кода.'}, 'en': {'title': 'PUMA: Smart Reasoning for Efficient AI', 'desc': 'The paper presents PUMA, a framework designed to enhance the efficiency of large reasoning models (LRMs) by detecting semantic redundancy during reasoning processes. By identifying when further reasoning does not yield new insights, PUMA reduces unnecessary computational resources while ensuring the accuracy of the final answers. Unlike traditional early-exit methods that rely on answer-level signals, PUMA focuses on reasoning-level signals to determine when to stop processing. The results show that PUMA can significantly decrease token usage without compromising the quality of the reasoning chain or the accuracy of the answers.'}, 'zh': {'title': 'PUMA：提升推理效率的智能框架', 'desc': '研究人员提出了PUMA框架，通过语义冗余检测来提高大型模型的推理效率。该框架能够识别何时继续思考不会带来新的见解，从而减少计算浪费，同时保持答案的准确性和推理质量。现有的早期退出方法主要依赖于答案级信号，而PUMA则引入了推理级的语义冗余作为补充信号，以判断推理是否已经收敛。通过这一创新，PUMA在多个推理基准上实现了显著的令牌减少，同时保持了高质量的推理链。'}}}, {'id': 'https://huggingface.co/papers/2605.17260', 'title': 'LiteFrame: Efficient Vision Encoders Unlock Frame Scaling in Video LLMs', 'url': 'https://huggingface.co/papers/2605.17260', 'abstract': 'Abstract LiteFrame, a lightweight video encoder with Compressed Token Distillation training method, reduces latency and increases frame processing capacity for long-form video understanding in Video LLMs while maintaining accuracy.  AI-generated summary The fundamental challenge in scaling Video Large Language Models (Video LLMs) to long-form video lies in managing the explosion of visual-token context length. Existing strategies predominantly focus on "post-hoc" token reduction -- reducing visual tokens after feature extraction to alleviate the LLM\'s computational overhead. While these methods effectively reduce the number of visual tokens, we observe that the primary latency bottleneck then shifts from the LLM to the expensive per-frame processing of the vision encoder. To address this, we introduce LiteFrame, a strong, yet highly efficient video encoder backbone for Video LLMs. To train LiteFrame, we propose Compressed Token Distillation (CTD), a novel training framework that teaches a compact student vision encoder to directly predict information-dense, spatio-temporally compressed representations produced by a large teacher vision model, effectively bypassing redundant computation. When coupled with further Language Model Adaptation (LMA), this approach results in a new latency-accuracy Pareto frontier -- compared with InternVL3-8B, LiteFrame provides a 35% reduction in end-to-end latency while processing 8times more frames and improves average video understanding accuracy across multiple benchmarks. Our results demonstrate a new potential path to unlocking longer-form video understanding under fixed compute budgets.', 'score': 3, 'issue_id': 2262, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'cf5522a8f58126e7', 'authors': ['Jihwan Kim', 'Nikhil Parthasarathy', 'Danfeng Qin', 'Junhwa Hur', 'Deqing Sun', 'Bohyung Han', 'Ming-Hsuan Yang', 'Boqing Gong'], 'affiliations': ['Google DeepMind', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17260.jpg', 'data': {'categories': ['#long_context', '#multimodal', '#optimization', '#training', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Лёгкий видеокодировщик для понимания длинных видео через дистилляцию сжатых токенов', 'desc': 'В статье предложена LiteFrame — лёгкий видеокодировщик для Video LLMs, который решает проблему обработки длинных видео с высокой латентностью. Авторы разработали метод обучения Compressed Token Distillation (CTD), при котором компактная нейросеть-ученик учится воспроизводить сжатые пространственно-временные представления, полученные от большой учительской модели, избегая избыточных вычислений. При комбинировании с адаптацией языковой модели (LMA) подход достигает снижения латентности на 35% и обработки в 8 раз больше кадров в сравнении с InternVL3-8B при сохранении или улучшении точности. Метод открывает новые возможности для обработки длинных видеопоследовательностей при фиксированных вычислительных ресурсах.'}, 'en': {'title': 'Efficient Video Understanding with LiteFrame', 'desc': 'LiteFrame is a lightweight video encoder designed to enhance the efficiency of Video Large Language Models (Video LLMs) for long-form video understanding. It introduces a training method called Compressed Token Distillation (CTD), which allows a smaller vision encoder to learn from a larger model, reducing unnecessary computations. This approach not only decreases latency but also increases the number of frames processed simultaneously, improving overall accuracy. By integrating Language Model Adaptation (LMA), LiteFrame achieves a significant reduction in processing time while maintaining high performance across various benchmarks.'}, 'zh': {'title': 'LiteFrame：高效视频编码，提升长视频理解能力', 'desc': 'LiteFrame是一种轻量级视频编码器，采用压缩令牌蒸馏训练方法，旨在减少延迟并提高长视频理解的帧处理能力，同时保持准确性。该研究解决了在扩展视频大语言模型时，视觉令牌上下文长度爆炸的问题。通过引入LiteFrame和压缩令牌蒸馏（CTD）框架，LiteFrame能够高效地预测由大型教师视觉模型生成的信息密集型表示，从而避免冗余计算。与InternVL3-8B相比，LiteFrame在处理8倍帧数的同时，减少了35%的端到端延迟，并提高了多个基准测试中的视频理解准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.14589', 'title': 'EndPrompt: Efficient Long-Context Extension via Terminal Anchoring', 'url': 'https://huggingface.co/papers/2605.14589', 'abstract': 'Abstract EndPrompt extends large language model context windows by using a two-segment training approach that preserves semantic continuity while enabling efficient long-range positional learning through sparse supervision.  AI-generated summary Extending the context window of large language models typically requires training on sequences at the target length, incurring quadratic memory and computational costs that make long-context adaptation expensive and difficult to reproduce. We propose EndPrompt, a method that achieves effective context extension using only short training sequences. The core insight is that exposing a model to long-range relative positional distances does not require constructing full-length inputs: we preserve the original short context as an intact first segment and append a brief terminal prompt as a second segment, assigning it positional indices near the target context length. This two-segment construction introduces both local and long-range relative distances within a short physical sequence while maintaining the semantic continuity of the training text--a property absent in chunk-based simulation approaches that split contiguous context. We provide a theoretical analysis grounded in Rotary Position Embedding and the Bernstein inequality, showing that position interpolation induces a rigorous smoothness constraint over the attention function, with shared Transformer parameters further suppressing unstable extrapolation to unobserved intermediate distances. Applied to LLaMA-family models extending the context window from 8K to 64K, EndPrompt achieves an average RULER score of 76.03 and the highest average on LongBench, surpassing LCEG (72.24), LongLoRA (72.95), and full-length fine-tuning (69.23) while requiring substantially less computation. These results demonstrate that long-context generalization can be induced from sparse positional supervision, challenging the prevailing assumption that dense long-sequence training is necessary for reliable context-window extension. The code is available at https://github.com/clx1415926/EndPrompt.', 'score': 3, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'bcd42e822f38c788', 'authors': ['Han Tian', 'Luxuan Chen', 'Xinran Chen', 'Rui Kong', 'Fang Wang', 'Jiamin Chen', 'Jinman Zhao', 'Yuchen Li', 'Jiashu Zhao', 'Shuaiqiang Wang', 'Haoyi Xiong', 'Dawei Yin'], 'affiliations': ['Baidu Inc.', 'Nankai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14589.jpg', 'data': {'categories': ['#long_context', '#optimization', '#open_source', '#training', '#architecture'], 'emoji': '📚', 'ru': {'title': 'Расширение контекста без полноразмерного обучения', 'desc': 'EndPrompt — это метод расширения контекстного окна больших языковых моделей, использующий двусегментный подход обучения. Вместо дорогостоящего обучения на полноразмерных последовательностях, метод сохраняет исходный короткий контекст и добавляет краткий дополнительный сегмент с позиционными индексами, близкими к целевой длине окна. Такая конструкция позволяет модели обучаться на локальных и дальнодействующих относительных позиционных расстояниях при сохранении семантической непрерывности текста. Теоретический анализ, основанный на ротационных позиционных эмбеддингах, показывает, что этот подход индуцирует ограничение гладкости функции внимания и эффективно расширяет контекст с 8K до 64K токенов, превосходя существующие методы при значительно меньших вычислительных затратах.'}, 'en': {'title': 'Efficiently Extending Context Windows with EndPrompt', 'desc': 'The paper introduces EndPrompt, a novel method for extending the context window of large language models without the need for extensive training on long sequences. By using a two-segment training approach, it maintains semantic continuity while allowing for efficient learning of long-range positional information. This method leverages short training sequences, preserving the original context and adding a brief terminal prompt to introduce relative positional distances. The results show that EndPrompt significantly outperforms existing methods in context extension while requiring less computational resources.'}, 'zh': {'title': 'EndPrompt：高效扩展语言模型上下文窗口', 'desc': 'EndPrompt是一种通过两段训练方法扩展大型语言模型上下文窗口的技术。它在保持语义连续性的同时，利用稀疏监督实现高效的长距离位置学习。与传统的长序列训练方法相比，EndPrompt只需短训练序列即可有效扩展上下文窗口。实验结果表明，该方法在计算效率上显著优于其他长序列训练方法，同时在长上下文泛化能力上表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.15572', 'title': 'Measuring Maximum Activations in Open Large Language Models', 'url': 'https://huggingface.co/papers/2605.15572', 'abstract': 'Abstract Modern open LLMs exhibit wide variation in activation magnitudes across families and training stages, with maximum values spanning four orders of magnitude and showing complex scaling patterns that differ from simple size-based expectations.  AI-generated summary The dynamic range of activations is a first-order constraint for low-bit quantization, activation scaling, and stable LLM inference. Prior work characterized outlier features and massive activations on pre-2024 LLaMA-style models, and the downstream activation-quantization stack inherits that picture without revisiting it for the post-LLaMA open-model boom. We ask the deployment-oriented question: how large can activations get in modern open LLMs, and how does this magnitude vary across families, generations, and training stages? Under a unified pipeline (5,000-sample multi-domain corpus, family-specific tokenization, identical hooks across embeddings, hidden states, attention, MLP/MoE, SwiGLU gates, and final norm), we measure global and layerwise maxima on 27 checkpoints from 8 open families spanning dense, MoE, vision-language, intermediate-training, and instruction-tuned variants. We find that (i) global maxima span over nearly four orders of magnitude at comparable parameter counts, with Qwen3.5 and MoE checkpoints in the 10^2 to 10^3 range and Gemma3-27B-it reaching ~7 x 10^5; (ii) cross-family and cross-generation comparisons break simple monotonic scaling; and (iii) MoE checkpoints exhibit 14.0-23.4x lower peaks than matched-scale dense counterparts, while the residual stream carries the global maximum in 22/24 checkpoints. A lightweight INT-8 sanity check shows that measured maxima co-vary with low-bit reconstruction error via activation-scale selection. We conclude that maximum activation magnitude is a model property tied to family, architecture, and training stage - not a simple byproduct of size - and should be measured and reported alongside any open-weight release before low-bit deployment. The code is publicly available at https://github.com/clx1415926/Max_act_llm.', 'score': 2, 'issue_id': 2262, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '5f6b4c62a2d01543', 'authors': ['Luxuan Chen', 'Han Tian', 'Xinran Chen', 'Rui Kong', 'Fang Wang', 'Jiamin Chen', 'Yuchen Li', 'Jiashu Zhao', 'Shuaiqiang Wang', 'Haoyi Xiong', 'Dawei Yin'], 'affiliations': ['Baidu Inc.', 'Independent Researcher', 'Nankai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.15572.jpg', 'data': {'categories': ['#optimization', '#open_source', '#training', '#architecture', '#inference'], 'emoji': '📊', 'ru': {'title': 'Активации современных LLM: свойство архитектуры, а не размера', 'desc': 'В статье исследуются величины активаций в современных открытых LLM моделях, которые варьируются на четыре порядка величины в зависимости от семейства и этапа обучения. Авторы измерили максимальные активации на 27 чекпоинтах из 8 различных семейств моделей, используя унифицированный pipeline с идентичными методами измерения. Они обнаружили, что максимальные значения активаций - это фундаментальное свойство архитектуры и процесса обучения модели, а не просто следствие её размера, причём MoE модели показывают значительно меньшие пики активаций. Исследование демонстрирует, что величину максимальной активации необходимо измерять и публиковать перед развёртыванием моделей для низкоразрядного квантизирования.'}, 'en': {'title': 'Understanding Activation Magnitudes in Modern Open LLMs', 'desc': "This paper investigates the activation magnitudes in modern open large language models (LLMs) and how they vary across different model families and training stages. It highlights that the maximum activation values can differ significantly, spanning nearly four orders of magnitude, which challenges the assumption that larger models always have larger activations. The study emphasizes the importance of understanding these activation patterns for effective low-bit quantization and stable inference in LLMs. The findings suggest that maximum activation is influenced by the model's architecture and training rather than just its size, indicating a need for careful measurement and reporting in model releases."}, 'zh': {'title': '激活幅度：模型特性而非规模副产品', 'desc': '现代开放的大型语言模型（LLM）在激活幅度上表现出显著的差异，这种差异在不同模型家族和训练阶段之间变化很大。研究发现，激活的最大值可以跨越近四个数量级，并且这种变化并不符合简单的规模预期。通过对27个检查点的测量，发现不同模型在激活幅度上存在复杂的非单调关系，尤其是稀疏模型（MoE）在激活峰值上显著低于密集模型。我们得出结论，最大激活幅度是与模型家族、架构和训练阶段相关的特性，而不是简单的规模副产品，因此在低位部署之前应与开放权重一起报告。'}}}, {'id': 'https://huggingface.co/papers/2605.17199', 'title': 'Geometric Phase Transition Enables Extreme Hippocampal Memory Capacity', 'url': 'https://huggingface.co/papers/2605.17199', 'abstract': 'Abstract Superior spatial memory emerges from hippocampal population geometry transitioning from disorganized to crystalline states, enabling higher capacity and stability through topological rigidity and specific neural circuit dynamics.  AI-generated summary Memory systems can store vastly different amounts of information despite similar hardware constraints. Here, we show that superior spatial memory emerges from a discrete stiffening of hippocampal population geometry-a transition from disorganized to crystalline collective coding. Comparing food-caching chickadees to non-caching zebra finches, we found that the caching hippocampus maintains a topologically rigid, "crystalline" geometry with significantly higher geometric stability (Shesha 0.245 v 0.166) and nearly two-fold greater temporal coherence (Shesha 0.393 v 0.209), while the non-caching hippocampus resembles a disorganized "mist." This stability is actively constructed by synergistic circuit dynamics: excitatory neurons form the spatial scaffold while inhibitory populations contribute orthogonal decorrelation, a circuit motif in which excitatory and inhibitory populations occupy largely non-overlapping representational subspaces. A double dissociation with Valiant\'s Stable Memory Allocator, a model predicting that dedicated neuron ensembles underlie each memory, confirms this advantage reflects continuous topological organization rather than discrete neuron allocation: caching networks exhibit near-zero split-half allocation reliability despite their geometric superiority. Computational modeling across 10k configurations reveals topological rigidity as the mathematical prerequisite for scale: crystalline codes sustain high-fidelity readout beyond M=1k locations while mist codes fail below M=10, a >100-fold capacity advantage. This capacity requires a 169fold representational redundancy: a "geometric tax" stabilizing the manifold against biological noise. These results establish geometric stability as a candidate organizing principle of biological memory: evolution achieves high-capacity memory not by proliferating neurons, but by engineering the geometry of the neural code itself.', 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '6bd52388b203432e', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.17199.jpg', 'data': {'categories': ['#science'], 'emoji': '🧠', 'ru': {'title': 'Кристаллическая геометрия нейронного кода как основа высокоемкой памяти', 'desc': 'В исследовании показано, что превосходная пространственная память возникает благодаря переходу геометрии популяции нейронов гиппокампа из неупорядоченного состояния в кристаллическое, обеспечивающее топологическую жесткость. Сравнивая птиц, которые прячут пищу (бурые поползни) с теми, которые этого не делают (зебровые амадины), исследователи обнаружили, что упорядоченная геометрия кодирования обеспечивает большую стабильность и когерентность нейральных представлений. Стабильность поддерживается синергией возбуждающих и тормозных нейронов, занимающих непересекающиеся представительские подпространства. Вычислительное моделирование показало, что топологическая жесткость кристаллических кодов позволяет достичь более чем 100-кратного преимущества в емкости памяти по сравнению с неупорядоченными кодами.'}, 'en': {'title': 'Crystalline Geometry: The Key to Superior Spatial Memory', 'desc': 'This paper explores how the geometry of neural populations in the hippocampus affects spatial memory. It shows that a transition from a disorganized to a crystalline state in hippocampal coding leads to better memory capacity and stability. The study compares food-caching chickadees, which have a more organized hippocampal structure, to non-caching zebra finches, revealing that the former has a more stable and coherent memory representation. The findings suggest that enhancing the geometric organization of neural codes, rather than simply increasing neuron numbers, is key to improving memory performance.'}, 'zh': {'title': '几何稳定性：生物记忆的关键', 'desc': '这篇论文探讨了海马体的群体几何结构如何影响空间记忆的优越性。研究发现，具有更高记忆能力的动物（如储食的山雀）其海马体呈现出更为稳定的“晶体”几何结构，而非储食的动物则表现为无序的“雾状”结构。通过对比两种鸟类，研究表明，晶体几何结构能够提供更高的几何稳定性和时间一致性，这种稳定性是由兴奋性和抑制性神经元的协同动态构建的。最终，论文提出几何稳定性是生物记忆的一个重要组织原则，进化通过优化神经编码的几何结构来实现高容量记忆，而不是单纯增加神经元的数量。'}}}, {'id': 'https://huggingface.co/papers/2605.14278', 'title': 'KVPO: ODE-Native GRPO for Autoregressive Video Alignment via KV Semantic Exploration', 'url': 'https://huggingface.co/papers/2605.14278', 'abstract': 'Abstract ODENative online GRPO framework KVPO aligns streaming video generators with human preferences through causal-semantic exploration and velocity-field surrogate policy based on trajectory velocity energy.  AI-generated summary Aligning streaming autoregressive (AR) video generators with human preferences is challenging. Existing reinforcement learning methods predominantly rely on noise-based exploration and SDE-based surrogate policies that are mismatched to the deterministic ODE dynamics of distilled AR models, and tend to perturb low-level appearance rather than the high-level semantic storyline progression critical for long-horizon coherence. To address these limitations, we present KVPO, an ODE-native online Group Relative Policy Optimization (GRPO) framework for aligning streaming video generators. For diversity exploration, KVPO introduces a causal-semantic exploration paradigm that relocates the source of variation from stochastic noise to the historical KV cache. By stochastically routing historical KV entries, it constructs semantically diverse generation branches that remain strictly on the data manifold. For policy modeling, KVPO introduces a velocity-field surrogate policy based on Trajectory Velocity Energy (TVE), which quantifies branch likelihood in flow-matching velocity space and yields a reward-weighted contrastive objective fully consistent with the native ODE formulation. Experiments on multiple distilled AR video generators demonstrate consistent gains in visual quality, motion quality, and text-video alignment across both single-prompt short-video and multi-prompt long-video settings.', 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '72d3dd1f1e663176', 'authors': ['Ruicheng Zhang', 'Kaixi Cong', 'Jun Zhou', 'Zhizhou Zhong', 'Zunnan Xu', 'Shuiyang Mao', 'Wei Liu', 'Xiu Li'], 'affiliations': ['HKUST', 'Tsinghua University', 'Video Rebirth Project'], 'pdf_title_img': 'assets/pdf/title_img/2605.14278.jpg', 'data': {'categories': ['#training', '#video', '#rlhf', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Выравнивание видеогенераторов с человеческими предпочтениями через семантическую экспlorацию в ODE пространстве', 'desc': 'В работе предлагается KVPO — фреймворк для обучения потокового видеогенератора с подкреплением, выравнивая его с предпочтениями человека. Вместо традиционных методов с шумовой экспlorацией авторы используют причинно-семантический подход, где вариативность исходит из исторического KV cache вместо стохастического шума. Для моделирования политики предложена суррогатная политика на основе энергии траектории скорости (TVE), которая работает в пространстве скоростей, согласованном с ODE динамикой видеогенератора. Эксперименты показывают улучшение качества видео, движения и текстово-видео соответствия на различных видеогенераторах.'}, 'en': {'title': 'Enhancing Video Generation with Causal-Semantic Exploration', 'desc': 'The paper introduces KVPO, a new framework for improving the alignment of streaming video generators with human preferences using causal-semantic exploration. Unlike traditional methods that rely on noise-based exploration, KVPO utilizes historical key-value (KV) caches to create diverse video generation paths that maintain semantic coherence. It also employs a velocity-field surrogate policy based on Trajectory Velocity Energy (TVE) to better model the dynamics of video generation. Experiments show that KVPO enhances visual quality, motion consistency, and alignment with textual prompts in both short and long video formats.'}, 'zh': {'title': '对齐视频生成与人类偏好的新方法', 'desc': '本文提出了一种名为KVPO的在线GRPO框架，旨在通过因果语义探索和基于轨迹速度能量的代理策略来对齐流媒体视频生成器与人类偏好。现有的强化学习方法主要依赖噪声探索和随机微分方程（SDE）代理策略，这与确定性常微分方程（ODE）动态不匹配，导致低层次外观的扰动，而非高层次语义故事线的进展。KVPO通过将变化源从随机噪声转移到历史KV缓存，构建了语义多样的生成分支，确保生成内容保持在数据流形上。实验结果表明，KVPO在视觉质量、运动质量和文本-视频对齐方面均有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.17842', 'title': 'SNLP: Layer-Parallel Inference via Structured Newton Corrections', 'url': 'https://huggingface.co/papers/2605.17842', 'abstract': "Abstract Transformer models can achieve faster inference through parallel Newton-style updates that approximate sequential computations using structured Jacobian approximations and specialized regularization techniques.  AI-generated summary Autoregressive language models execute Transformer layers sequentially, creating a latency bottleneck that is not removed by conventional tensor or pipeline parallelism. We study whether this layerwise dependency can be relaxed by treating the hidden-state trace across layers as the solution of a nonlinear residual equation and solving it with parallel Newton-style updates. While this view is principled, exact Newton corrections require expensive Jacobian-vector products and naive fixed-point iterations are unstable on trained Transformers. We introduce Structured Newton Layer Parallelism (SNLP), a training and inference framework that replaces exact layer Jacobians with cheap architecture-induced surrogate dynamics. In residual Transformers, this yields Identity Newton (IDN), where the correction reduces to a prefix-sum-like update; in mHC-style architectures, HC Newton (HCN) uses the model's residual mixing matrix. We further introduce SNLP-aware regularization, which trains models to make one or a few structured Newton iterations accurately approximate the sequential forward. Experiments on nanochat-scale Transformers show that SNLP regularization improves layer-parallel compatibility and can also improve standard sequential perplexity, reducing baseline PPL by 4.7%-23.4%. At inference time, SNLP combined with layer fusion and chunkwise decomposition achieves practical wall-clock speedups: on a 0.5B Nanochat model, it reaches 2.3x speedup while still improving PPL by 6.1%. These results suggest that layer-parallel inference is not merely a numerical approximation to sequential execution, but can act as a useful solver-induced inference bias. We also characterize limitations: off-the-shelf pretrained models are less amenable to this procedure, and exact convergence recovers the sequential computation rather than providing monotonic inference-time scaling.", 'score': 0, 'issue_id': 2262, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'ca138af87356d781', 'authors': ['Ligong Han', 'Kai Xu', 'Hao Wang', 'Akash Srivastava'], 'affiliations': ['Core AI, IBM', 'MIT-IBM Watson AI Lab', 'Red Hat AI Innovation'], 'pdf_title_img': 'assets/pdf/title_img/2605.17842.jpg', 'data': {'categories': ['#small_models', '#optimization', '#training', '#architecture', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Параллельный вывод трансформеров через структурированные Newton-итерации', 'desc': 'В статье предложен метод Structured Newton Layer Parallelism (SNLP) для ускорения инференса трансформеров путём замены последовательного выполнения слоёв на параллельные Newton-подобные обновления. Авторы рассматривают скрытые состояния через слои как решение нелинейного остаточного уравнения и используют структурированные аппроксимации якобиана вместо точных, дорогостоящих вычислений. Введена специальная регуляризация при обучении, которая позволяет одной или нескольким Newton-итерациям хорошо приближать последовательный проход сети. Эксперименты показывают практическое ускорение вывода в 2.3x на моделях среднего размера при одновременном улучшении качества.'}, 'en': {'title': 'Speeding Up Transformers with Structured Parallel Updates', 'desc': 'This paper introduces Structured Newton Layer Parallelism (SNLP), a method to speed up inference in Transformer models by allowing parallel updates instead of sequential computations. It addresses the latency issues caused by autoregressive language models that process layers one at a time. By using structured Jacobian approximations and specialized regularization techniques, SNLP enables faster and more efficient training and inference. The results show significant improvements in both speed and perplexity, demonstrating that layer-parallel inference can effectively enhance model performance.'}, 'zh': {'title': '结构化牛顿层并行性：加速变换器推理的新方法', 'desc': '本文提出了一种新的训练和推理框架，称为结构化牛顿层并行性（SNLP），旨在加速变换器模型的推理过程。通过将隐藏状态视为非线性残差方程的解，并使用并行牛顿风格的更新，SNLP能够减少层间依赖性，从而提高推理速度。实验表明，SNLP正则化不仅改善了层并行兼容性，还降低了标准序列困惑度（PPL），在推理时实现了显著的速度提升。尽管预训练模型在此方法上效果较差，但SNLP展示了层并行推理的潜力，超越了传统的序列执行。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment', '#architecture (4)', '#audio', '#benchmark (1)', '#cv', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (2)', '#open_source (3)', '#optimization (6)', '#plp', '#rag', '#reasoning (1)', '#rl', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (6)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        }

            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-19 02:57',lang=currentLang);

                },
                en: {

                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-19 02:57')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-19 02:57')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
