ilize policy optimization. Guided by an autonomous progressive curriculum, the system naturally scales from simple atomic actions to complex tasks. Extensive experiments demonstrate that RoboEvolve (I) achieves superior effectiveness, elevating base planners by 30 absolute points and amplifying simulator success by 48% on average; (II) exhibits extreme data efficiency, surpassing fully supervised baselines with merely 500 unlabeled seeds--a 50x reduction; and (III) demonstrates robust continual learning without catastrophic forgetting.', 'score': 6, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '01b57309b362dd1c', 'authors': ['Harold Haodong Chen', 'Sirui Chen', 'Yingjie Xu', 'Wenhang Ge', 'Ying-Cong Chen'], 'affiliations': ['The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.13775.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#video', '#rl', '#training'], 'emoji': '🤖', 'ru': {'title': 'Соэволюция зрения и симуляции для масштабируемого обучения робото с минимумом данных', 'desc': 'RoboEvolve представляет инновационную систему для обучения робототехнических манипуляторов, которая объединяет модели зрения-языка и генерации видео в единую соэволюционную петлю обратной связи. Система решает проблему нехватки размеченных данных о физических взаимодействиях, используя неразмеченные изображения и синтезируя правдоподобные траектории манипулирования. Фреймворк включает две фазы обучения: дневную фазу исследования для обнаружения физически корректных поведений и ночную фазу консолидации для стабилизации оптимизации политики на примерах ошибок. Экспериментальные результаты показывают значительное улучшение эффективности на 30 процентных пункта, достижение 50-кратного снижения требуемых данных и способность к непрерывному обучению без катастрофического забывания.'}, 'en': {'title': 'Revolutionizing Robotic Learning with RoboEvolve', 'desc': 'RoboEvolve is a new framework that enhances robotic manipulation by integrating vision-language models (VLMs) and video generation models (VGMs) in a co-evolutionary process. This approach addresses the challenge of limited task-specific interaction data by allowing robots to learn from unlabeled images through a dual-phase mechanism. During the day, the system explores and discovers behaviors using a reward system, while at night, it consolidates learning by analyzing near-miss failures to improve its policies. The results show that RoboEvolve significantly improves performance and data efficiency, achieving better outcomes with far fewer training examples compared to traditional methods.'}, 'zh': {'title': 'RoboEvolve：提升机器人操作的智能进化框架', 'desc': 'RoboEvolve 是一个结合视觉-语言模型和视频生成模型的框架，旨在提高机器人操作的可扩展性和数据效率。该系统通过一个共进化的循环，利用无标签的种子图像进行自主数据合成，克服了语义-空间不对齐和物理幻觉的问题。RoboEvolve 采用双阶段机制，白天探索促进基于语义的行为发现，夜间巩固则通过挖掘“近失误”来稳定策略优化。实验表明，RoboEvolve 在有效性和数据效率上均优于传统方法，且具备强大的持续学习能力。'}}}, {'id': 'https://huggingface.co/papers/2605.12825', 'title': 'Orthrus: Memory-Efficient Parallel Token Generation via Dual-View Diffusion', 'url': 'https://huggingface.co/papers/2605.12825', 'abstract': 'Abstract Orthrus is a dual-architecture framework that combines autoregressive LLMs with diffusion models to achieve fast parallel token generation while maintaining exact inference fidelity through shared KV caches and consensus mechanisms.  AI-generated summary We introduce Orthrus, a simple and efficient dual-architecture framework that unifies the exact generation fidelity of autoregressive Large Language Models (LLMs) with the high-speed parallel token generation of diffusion models. The sequential nature of standard autoregressive decoding represents a fundamental bottleneck for high-throughput inference. While diffusion language models attempt to break this barrier via parallel generation, they suffer from significant performance degradation, high training costs, and a lack of rigorous convergence guarantees. Orthrus resolves this dichotomy natively. Designed to seamlessly integrate into existing Transformers, the framework augments a frozen LLM with a lightweight, trainable module to create a parallel diffusion view alongside the standard autoregressive view. In this unified system, both views attend to the exact same high-fidelity Key-Value (KV) cache; the autoregressive head executes context pre-filling to construct accurate KV representations, while the diffusion head executes parallel generation. By employing an exact consensus mechanism between the two views, Orthrus guarantees lossless inference, delivering up to a 7.8x speedup with only an O(1) memory cache overhead and minimal parameter additions.', 'score': 6, 'issue_id': 2224, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'c9ea36e01e3c1b6c', 'authors': ['Chien Van Nguyen', 'Chaitra Hegde', 'Van Cuong Pham', 'Ryan A. Rossi', 'Franck Dernoncourt', 'Thien Huu Nguyen'], 'affiliations': ['Adobe Research', 'Google DeepMind', 'University of Oregon'], 'pdf_title_img': 'assets/pdf/title_img/2605.12825.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#inference', '#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Параллельная генерация без потери качества: объединение скорости и точности', 'desc': 'Orthrus — это инновационная архитектура, которая объединяет автор егрессивные большие языковые модели с диффузионными моделями для быстрого параллельного генерирования токенов. Система использует общий кэш ключ-значение (KV) и механизм консенсуса между двумя компонентами, гарантируя точность вывода без потери качества. Фреймворк добавляет к замороженной LLM легкий обучаемый модуль, позволяя одновременно выполнять последовательное заполнение контекста и параллельную генерацию. Решение достигает ускорения до 7.8x с минимальными затратами памяти и параметров.'}, 'en': {'title': 'Orthrus: Fast and Accurate Token Generation Unleashed!', 'desc': 'Orthrus is a novel framework that merges autoregressive Large Language Models (LLMs) with diffusion models to enhance token generation speed while ensuring high accuracy. It addresses the slow sequential processing of traditional autoregressive models by introducing a parallel generation approach through diffusion models. This dual-architecture system utilizes a shared Key-Value (KV) cache, allowing both the autoregressive and diffusion components to work together efficiently. By implementing a consensus mechanism, Orthrus achieves fast inference with minimal memory overhead and maintains the fidelity of generated outputs.'}, 'zh': {'title': 'Orthrus：高效的双架构生成框架', 'desc': 'Orthrus 是一个双架构框架，结合了自回归大型语言模型（LLM）和扩散模型，以实现快速的并行标记生成，同时通过共享的键值缓存（KV caches）和共识机制保持精确的推理保真度。传统的自回归解码方式存在高吞吐量推理的瓶颈，而扩散语言模型虽然尝试通过并行生成来突破这一限制，但却面临性能下降和高训练成本的问题。Orthrus 通过将一个轻量级的可训练模块与冻结的 LLM 集成，创建了一个并行扩散视图，增强了标准的自回归视图。该框架通过精确的共识机制，确保无损推理，提供高达 7.8 倍的速度提升，同时仅增加 O(1) 的内存缓存开销和最小的参数增加。'}}}, {'id': 'https://huggingface.co/papers/2605.09433', 'title': 'Offline Preference Optimization for Rectified Flow with Noise-Tracked Pairs', 'url': 'https://huggingface.co/papers/2605.09433', 'abstract': 'Abstract Rectified flow models require prior noise information for effective preference optimization, which PNAPO addresses by augmenting preference data with noise samples and employing dynamic regularization for improved training efficiency.  AI-generated summary Existing preference datasets for text-to-image models typically store only the final winner/loser images. This representation is insufficient for rectified flow (RF) models, whose generation is naturally indexed by a specific prior noise sample and follows a nearly straight denoising trajectory. In contrast, prior DPO-style alignment for diffusion models commonly estimates trajectories using an independent forward noising process, which can be mismatched to the true reverse dynamics and introduces unnecessary variance. We propose Prior Noise-Aware Preference Optimization (PNAPO), an off-policy alignment framework specialized for rectified flow. PNAPO augments preference data by retaining the paired prior noises used to generate each winner/loser image, turning the standard (prompt, winner, loser) triplet into a sextuple. Leveraging the straight-line property of RF, we estimate intermediate states via noise-image interpolation, which constrains the trajectory estimation space and yields a tighter surrogate objective for preference optimization. In addition, we introduce a dynamic regularization strategy that adapts the DPO regularization based on (i) the reward gap between winner and loser and (ii) training progress, improving stability and sample efficiency. Experiments on state-of-the-art RF T2I backbones show that PNAPO consistently improves preference metrics while substantially reducing training compute.', 'score': 6, 'issue_id': 2225, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '01c29942137bc5d5', 'authors': ['Yunhong Lu', 'Qichao Wang', 'Hengyuan Cao', 'Xiaoyin Xu', 'Min Zhang'], 'affiliations': ['Shanghai Institute for Advanced Study', 'Shanghai Institute for Mathematics and Interdisciplinary Sciences', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09433.jpg', 'data': {'categories': ['#diffusion', '#rlhf', '#training', '#dataset', '#optimization', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Оптимизация предпочтений с учётом исходного шума для выпрямленных потоков', 'desc': 'Статья представляет PNAPO — новый метод оптимизации предпочтений для моделей выпрямленного потока (rectified flow), которые используются в генерации изображений из текста. Ключевая идея состоит в том, чтобы сохранять исходные шумовые образцы, использованные при генерации предпочитаемых и менее предпочитаемых изображений, превращая простые тройки данных в более информативные структуры. Метод использует прямую траекторию выпрямленного потока для более точной оценки промежуточных состояний через интерполяцию между шумом и изображением, что сужает пространство поиска и уменьшает дисперсию. Дополнительно авторы предлагают динамическую регуляризацию, которая адаптивно настраивает параметры обучения в зависимости от разницы в качестве между выигрышным и проигрышным изображениями, что повышает стабильность и эффективность обучения.'}, 'en': {'title': 'Enhancing Preference Optimization with Noise Awareness', 'desc': 'This paper introduces Prior Noise-Aware Preference Optimization (PNAPO), a method designed to enhance the training of rectified flow models in text-to-image generation. PNAPO improves preference optimization by incorporating prior noise samples into the preference data, transforming the typical triplet of (prompt, winner, loser) into a more informative sextuple. By leveraging the straight-line property of rectified flow, it estimates intermediate states through noise-image interpolation, which helps to refine the trajectory estimation for better performance. Additionally, a dynamic regularization strategy is implemented to adaptively improve training stability and efficiency based on the differences in rewards and the progress of training.'}, 'zh': {'title': '优先噪声感知，优化偏好选择！', 'desc': '本论文提出了一种名为优先噪声感知偏好优化（PNAPO）的框架，旨在提高修正流模型的训练效率。PNAPO通过保留生成每个胜者/败者图像所用的配对噪声，增强了偏好数据，从而将标准的（提示，胜者，败者）三元组转变为六元组。该方法利用修正流模型的直线特性，通过噪声-图像插值估计中间状态，从而限制了轨迹估计空间，并为偏好优化提供了更紧凑的代理目标。此外，PNAPO还引入了一种动态正则化策略，根据胜者和败者之间的奖励差距及训练进度调整正则化，提高了稳定性和样本效率。'}}}, {'id': 'https://huggingface.co/papers/2605.12913', 'title': 'Revisiting DAgger in the Era of LLM-Agents', 'url': 'https://huggingface.co/papers/2605.12913', 'abstract': "Abstract DAgger-style training for long-horizon language model agents combines supervised fine-tuning and reinforcement learning benefits by using teacher-student policy interpolation with on-policy interactions.  AI-generated summary Long-horizon LM agents learn from multi-turn interaction, where a single early mistake can alter the subsequent state distribution and derail the whole trajectory. Existing recipes fall short in complementary ways: supervised fine-tuning provides dense teacher supervision but suffers from covariate shift because it is trained on off-policy teacher trajectories; while reinforcement learning with verifiable rewards avoids this off-policy mismatch by learning from on-policy rollouts but with only sparse outcome feedback. We address this dilemma by revisiting Dataset Aggregation (DAgger) for multi-turn LM agents: the algorithm collects trajectories through a turn-level interpolation of student and teacher policies, and the student is then trained on these trajectories using supervised labels provided by the teacher. By directly interacting with environments, we expose the model to realistic states likely to be encountered during deployment, thereby effectively mitigating covariate shift. Besides, since the student is learned by mimicking the teacher's behavior, it receives rich feedback during learning. To demonstrate DAgger enjoys the benefits of both worlds, we tested the algorithm to train a software-engineering agent with 4B- and 8B-scale student models. On SWE-bench Verified, our DAgger-style training improves over the strongest post-training baseline by +3.9 points at 4B and +3.6 points at 8B. The resulting 4B agent reaches 27.3%, outperforming representative published 8B SWE-agent systems, while the 8B agent achieves 29.8%, surpassing SWE-Gym-32B and coming within 5 points of stronger 32B-scale agents. Together with consistent gains on the held-out SWE-Gym split, these results suggest the effectiveness of DAgger for modern long-horizon LM agents.", 'score': 5, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '0ac6b6eeda71452b', 'authors': ['Changhao Li', 'Rushi Qiang', 'Jiawei Huang', 'Chenxiao Gao', 'Chao Zhang', 'Niao He', 'Bo Dai'], 'affiliations': ['ETH Zurich', 'Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.12913.jpg', 'data': {'categories': ['#training', '#plp', '#benchmark', '#agents', '#reasoning', '#optimization'], 'emoji': '🎓', 'ru': {'title': 'DAgger для долгосрочных задач: синтез обучения у учителя и взаимодействия со средой', 'desc': 'В работе предлагается DAgger-подход для обучения языковых моделей, выполняющих долгосрочные задачи. Метод сочетает преимущества supervised fine-tuning и reinforcement learning через интерполяцию политик студента и учителя на каждом шаге диалога. Алгоритм собирает траектории взаимодействия со средой, что помогает избежать covariate shift и обеспечивает модель реалистичными состояниями. При тестировании на задаче разработки ПО модели размером 4B и 8B показали значительное улучшение: 4B агент достигнул 27.3%, превзойдя опубликованные системы на 8B параметрах.'}, 'en': {'title': 'DAgger: Bridging Supervised Learning and Reinforcement Learning for Language Models', 'desc': 'This paper presents a new training method for long-horizon language model (LM) agents that combines supervised fine-tuning and reinforcement learning using a technique called DAgger. The approach addresses the issue of covariate shift by allowing the student model to learn from both teacher-generated and its own on-policy interactions, which helps it adapt to realistic scenarios. By interpolating between the teacher and student policies, the model receives rich feedback and improves its performance on multi-turn tasks. The results show that this DAgger-style training significantly enhances the capabilities of software-engineering agents, outperforming existing models in various benchmarks.'}, 'zh': {'title': 'DAgger：长时间跨度语言模型的最佳训练方案', 'desc': '本文提出了一种针对长时间跨度语言模型代理的DAgger风格训练方法，结合了监督微调和强化学习的优点。该方法通过教师-学生策略插值和在线交互来解决现有方法的不足，避免了因离线教师轨迹导致的协变量偏移。通过直接与环境交互，模型能够接触到在实际部署中可能遇到的真实状态，从而有效减轻协变量偏移问题。此外，学生模型通过模仿教师的行为获得丰富的反馈，提升了学习效果。'}}}, {'id': 'https://huggingface.co/papers/2605.08518', 'title': 'Results and Retrospective Analysis of the CODS 2025 AssetOpsBench Challenge', 'url': 'https://huggingface.co/papers/2605.08518', 'abstract': 'Abstract  Competition retrospectives are useful when they explain what a leaderboard measured, how hidden evaluation changed conclusions, and which design patterns were rewarded. We revisit the CODS 2025  challenge, a privacy-aware Codabench competition on industrial multi-agent orchestration built on . We combine final rank sheets, a 300-submission server log, 149-team registrations, best-submission exports, the organizer winners report, the companion  system paper, and verified planning-track source trees. Five results stand out. First, the public planning leaderboard saturates at 72.73\\%, and richer prompts do not improve that peak. Second, hidden evaluation changes the story: public and private scores correlate moderately in planning (r{=}0.69) but negatively in execution (r{=}{-}0.13), with several 45.45\\% public execution systems reaching 63.64\\% on the hidden set. Third, the  term is numerically almost inert in the official composite -- combined on a 0--1 scale with 0--100 percentage scores, it contributes at most 0.05 points per track, and rescaling would swap the top two teams. Fourth, the competition is operationally account-based but substantively team-based: 149 registered teams reduce to 24 with non-zero public scores and 11 fully ranked, while 52.3\\% of deduplicated registrations list multiple usernames. Fifth, successful execution methods mostly improve guardrails -- response selection, contamination cleanup, fallback, and context control -- rather than novel agent architectures. These findings identify which behaviors the evaluation rewarded, and motivate scale-aware composites, skill-level diagnostics, and versioned artifact release.', 'score': 5, 'issue_id': 2223, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '2f9bcdd762ede06a', 'authors': ['Dhaval Patel', 'Chathurangi Shyalika', 'Suryanarayana Reddy Yarrabothula', 'Ling Yue', 'Shuxin Lin', 'Nianjun Zhou', 'James Rayfield'], 'affiliations': ['Artificial Intelligence Institute at University of South Carolina', 'IBM', 'Indian Institute of Technology, Bhilai', 'Rensselaer Polytechnic Institute', 'Steel Authority of India Limited'], 'pdf_title_img': 'assets/pdf/title_img/2605.08518.jpg', 'data': {'categories': ['#dataset', '#survey', '#benchmark', '#agents'], 'emoji': '🏆', 'ru': {'title': 'Как скрытая оценка переписывает итоги соревнования по многоагентным системам', 'desc': 'В статье анализируются результаты соревнования CODS 2025 по многоагентной оркестрации с приватностью, где исследователи изучили 300 логов отправок и данные 149 команд. Авторы обнаружили, что публичная лидербордная таблица достигает насыщения в 72.73%, а скрытая оценка значительно меняет выводы, особенно для задач исполнения, где корреляция между публичными и приватными оценками отрицательна. Исследование показало, что успешные методы исполнения главным образом улучшают механизмы безопасности и контроля контекста, а не создают новые архитектуры агентов. На основе полученных результатов авторы предлагают улучшить методологию оценки, внедрив масштабируемые композиты и диагностику по уровням умений.'}, 'en': {'title': 'Evaluating Success: Insights from CODS 2025 Challenge', 'desc': 'This paper analyzes the results of the CODS 2025 challenge, focusing on the effectiveness of various evaluation metrics in a multi-agent orchestration competition. It highlights that the public leaderboard reached a saturation point, indicating that richer prompts did not enhance performance. The study reveals discrepancies between public and hidden evaluation scores, suggesting that some systems performed better in private assessments. Additionally, it emphasizes that successful strategies were more about refining existing methods rather than introducing new architectures, pointing to the importance of evaluation design in competitions.'}, 'zh': {'title': '揭示评估奖励的行为模式', 'desc': '本文回顾了CODS 2025挑战赛的结果，分析了排行榜的测量标准和隐藏评估对结论的影响。研究发现，公共规划排行榜的最高分为72.73%，而更丰富的提示并未提高这一分数。隐藏评估显示，公共和私有分数在规划中有中等相关性，但在执行中则呈负相关。成功的执行方法主要改善了响应选择、污染清理、后备和上下文控制等方面，而不是新颖的代理架构。'}}}, {'id': 'https://huggingface.co/papers/2605.13037', 'title': 'MAP: A Map-then-Act Paradigm for Long-Horizon Interactive Agent Reasoning', 'url': 'https://huggingface.co/papers/2605.13037', 'abstract': 'Abstract Interactive LLM agents suffer from delayed environmental perception and epistemic bottlenecks due to reactive understanding during execution, which the proposed Map-then-Act Paradigm (MAP) addresses by acquiring environmental knowledge beforehand through global exploration, task-specific mapping, and knowledge-augmented execution.  AI-generated summary Current interactive LLM agents rely on goal-conditioned stepwise planning, where environmental understanding is acquired reactively during execution rather than established beforehand. This temporal inversion leads to Delayed Environmental Perception: agents must infer environmental constraints through trial-and-error, resulting in an Epistemic Bottleneck that traps them in inefficient failure cycles. Inspired by human affordance perception and cognitive map theory, we propose the Map-then-Act Paradigm (MAP), a plug-and-play framework that shifts environment understanding before execution. MAP consists of three stages: (1) Global Exploration, acquiring environment-general priors; (2) Task-Specific Mapping, constructing a structured cognitive map; and (3) Knowledge-Augmented Execution, solving tasks grounded on the map. Experiments show consistent gains across benchmarks and LLMs. On ARC-AGI-3, MAP enables frontier models to surpass near-zero baseline performance in 22 of 25 game environments. We further introduce MAP-2K, a dataset of map-then-act trajectories, and show that training on it outperforms expert execution traces, suggesting that understanding environments is more fundamental than imitation.', 'score': 4, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'c4d4a66e58380196', 'authors': ['Yuxin Liu', 'Ziang Ye', 'Yueqing Sun', 'Mingye Zhu', 'Jinwei Xiao', 'Zhuowen Han', 'Qi GU', 'Xunliang Cai', 'Lei Zhang'], 'affiliations': ['Institution of Automation, Chinese Academy of Sciences', 'Meituan', 'Tianjin University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.13037.jpg', 'data': {'categories': ['#reasoning', '#games'], 'emoji': '🗺️', 'ru': {'title': 'Сначала карта, потом действие: предварительное исследование вместо реактивного обучения', 'desc': 'В статье предложена парадигма Map-then-Act (MAP) для улучшения работы интерактивных LLM-агентов. Основная идея заключается в смещении понимания окружения с этапа исполнения задачи на этап предварительного исследования. Парадигма состоит из трёх стадий: глобальное исследование среды, построение когнитивной карты для конкретной задачи и исполнение с опорой на полученные знания. Эксперименты демонстрируют значительное улучшение производительности моделей на различных бенчмарках, включая ARC-AGI-3.'}, 'en': {'title': 'Map-then-Act: Enhancing LLMs with Proactive Environmental Understanding', 'desc': 'The paper introduces the Map-then-Act Paradigm (MAP) to improve the performance of interactive LLM agents by addressing their delayed environmental perception and epistemic bottlenecks. Instead of relying on reactive understanding during task execution, MAP emphasizes acquiring environmental knowledge through a structured approach that includes global exploration and task-specific mapping. This proactive strategy allows agents to build a cognitive map of their environment before attempting tasks, leading to more efficient problem-solving. Experimental results demonstrate that MAP significantly enhances the performance of LLMs across various benchmarks, indicating that a solid understanding of the environment is crucial for effective task execution.'}, 'zh': {'title': '地图-再行动：提升环境理解的智能框架', 'desc': '本论文提出了一种新的方法，称为地图-再行动范式（MAP），旨在解决交互式大型语言模型（LLM）在执行过程中对环境的延迟感知和知识瓶颈问题。MAP通过在执行之前进行全球探索、任务特定映射和知识增强执行，帮助模型提前获取环境知识。该方法分为三个阶段：全球探索获取环境的通用先验，任务特定映射构建结构化的认知地图，以及基于地图的知识增强执行。实验结果表明，MAP在多个基准测试中表现出显著的性能提升，证明了环境理解在任务执行中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.13030', 'title': 'FeatCal: Feature Calibration for Post-Merging Models', 'url': 'https://huggingface.co/papers/2605.13030', 'abstract': 'Abstract Feature drift analysis in model merging leads to FeatCal, a calibration method that reduces performance gaps through layer-wise weight updates without gradient descent, achieving superior benchmark results and efficiency.  AI-generated summary Model merging combines task experts into one model and avoids joint training, retraining, or deploying many expert models, but the merged model often still underperforms task experts. We study this performance gap through feature drift, the difference between features produced by the merged model and by the expert on the same input. Our theory decomposes this drift into upstream propagation and local mismatch, tracks how it propagates and combines through later layers in forward order, and links final feature drift to output drift. This view motivates FeatCal, which uses a small calibration set to calibrate the merged model weights layer by layer in forward order, reducing feature drift while staying close to merged weights and preserving the benefits of model merging. FeatCal uses an efficient closed-form solution to update model weights, with no gradient descent, iterative optimization, or extra modules. On the main CLIP and GLUE benchmarks, FeatCal beats Surgery and ProbSurgery, the closest post-merging calibration baselines: 85.5% vs. 77.0%/78.8% on CLIP-ViT-B/32 Task Arithmetic (TA) and 85.2% vs. 83.7%/82.2% on FLAN-T5-base GLUE. On CLIP-ViT-B/32, 8 examples per task reach 82.9%, and 256 examples per task take 53 seconds, about 4x faster than both baselines, showing better sample efficiency and lower calibration cost.', 'score': 4, 'issue_id': 2226, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '8f36b8e42dca71c8', 'authors': ['Yanggan Gu', 'Shuo Cai', 'Zihao Wang', 'Wenjun Wang', 'Yuanyi Wang', 'Pengkai Wang', 'Sirui Huang', 'Su Lu', 'Jianmin Wu', 'Hongxia Yang'], 'affiliations': ['InfiX.ai', 'PolyU-Daya Bay Technology and Innovation Research Institute', 'The Chinese University of Hong Kong', 'The Hong Kong Polytechnic University (PolyU)'], 'pdf_title_img': 'assets/pdf/title_img/2605.13030.jpg', 'data': {'categories': ['#training', '#benchmark', '#multimodal'], 'emoji': '🔧', 'ru': {'title': 'Калибровка объединённых моделей через анализ дрейфа признаков', 'desc': 'В работе предложен метод FeatCal для улучшения качества объединённых моделей путём анализа дрейфа признаков. Авторы разложили дрейф признаков на две компоненты: восходящее распространение и локальное несоответствие, что позволило понять, как ошибки накапливаются через слои сети. Предложенный подход калибрует веса модели послойно в прямом порядке, используя замкнутую форму решения без градиентного спуска. FeatCal достигает значительных улучшений на бенчмарках CLIP и GLUE, превосходя существующие методы постобработки при этом работая в 4 раза быстрее.'}, 'en': {'title': 'FeatCal: Bridging the Performance Gap in Merged Models', 'desc': 'This paper introduces FeatCal, a novel calibration method designed to improve the performance of merged machine learning models by addressing feature drift. Feature drift occurs when the features generated by the merged model differ from those produced by individual expert models, leading to a performance gap. FeatCal calibrates the weights of the merged model layer by layer, using a small calibration dataset, and does so without relying on gradient descent or iterative optimization. The method demonstrates significant improvements in benchmark tests, outperforming existing calibration techniques while being more efficient in terms of speed and sample usage.'}, 'zh': {'title': 'FeatCal：高效的模型合并校准方法', 'desc': '本文提出了一种名为FeatCal的校准方法，用于解决模型合并中的特征漂移问题。特征漂移是指合并模型与专家模型在相同输入下产生的特征差异。FeatCal通过逐层更新权重，利用小型校准集来减少特征漂移，而无需使用梯度下降或迭代优化。实验结果表明，FeatCal在主要基准测试中表现优于现有的校准方法，显示出更高的样本效率和更低的校准成本。'}}}, {'id': 'https://huggingface.co/papers/2605.13050', 'title': 'Context Training with Active Information Seeking', 'url': 'https://huggingface.co/papers/2605.13050', 'abstract': "Abstract Context optimization methods enhanced with active information seeking via search and browser tools achieve superior performance across diverse domains while maintaining data efficiency and robustness.  AI-generated summary Most existing large language models (LLMs) are expensive to adapt after deployment, especially when a task requires newly produced information or niche domain knowledge. Recent work has shown that, by manipulating and optimizing their context, LLMs can be tailored to downstream tasks without updating their weights. However, most existing methods remain closed-loop, relying solely on the model's intrinsic knowledge. In this paper, we equip these context optimizers with Wikipedia search and browser tools for active information seeking. We show that naively adding these tools to a standard sequential context optimization pipeline can actually degrade performance compared to baselines. However, when paired with a search-based training procedure that maintains and prunes multiple candidate contexts, active information seeking delivers consistent and substantial gains. We demonstrate these improvements across diverse domains, including low-resource translation (Flores+), health scenarios (HealthBench), and reasoning-heavy tasks (LiveCodeBench and Humanity's Last Exam). Furthermore, our method proves to be data-efficient, robust across different hyperparameters, and capable of generating effective textual contexts that generalize well across different models.", 'score': 3, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '7db49c79b1ca2d03', 'authors': ['Zeyu Huang', 'Adhiguna Kuncoro', 'Qixuan Feng', 'Jiajun Shen', 'Lucio Dery', 'Arthur Szlam', "Marc'Aurelio Ranzato"], 'affiliations': ['Google DeepMind', 'The University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2605.13050.jpg', 'data': {'categories': ['#reasoning', '#machine_translation', '#optimization', '#low_resource'], 'emoji': '🔍', 'ru': {'title': 'Контекст в поисках знаний: активный поиск информации для адаптации языковых моделей', 'desc': 'В статье предлагается метод оптимизации контекста для больших языковых моделей, дополненный инструментами активного поиска информации через Википедию и браузер. Авторы показали, что простое добавление этих инструментов может снизить производительность, но при использовании специальной процедуры обучения на основе поиска с отбором нескольких кандидатных контекстов достигаются значительные улучшения. Метод демонстрирует стабильный прогресс на разнообразных задачах: переводе с ограниченными данными, медицинских сценариях и логических задачах. Предложенный подход является экономным по данным, устойчивым к изменению гиперпараметров и хорошо обобщается между различными моделями.'}, 'en': {'title': 'Enhancing LLMs with Active Information Seeking for Better Context Optimization', 'desc': "This paper presents a novel approach to enhance context optimization methods for large language models (LLMs) by integrating active information seeking through search and browser tools. The authors highlight that traditional methods often rely on the model's existing knowledge, which can limit performance, especially in niche domains. By implementing a search-based training procedure that manages multiple candidate contexts, they demonstrate significant improvements in various tasks, including translation and reasoning. The proposed method is shown to be data-efficient and robust, allowing for effective context generation that generalizes well across different models."}, 'zh': {'title': '主动信息获取提升上下文优化性能', 'desc': '本文提出了一种通过主动信息获取来增强上下文优化方法的技术。这种方法结合了维基百科搜索和浏览工具，使得大型语言模型（LLMs）能够在不更新权重的情况下，适应新的任务和领域知识。研究表明，简单地将这些工具添加到标准的上下文优化流程中可能会导致性能下降，但通过与基于搜索的训练程序配合使用，可以显著提高性能。我们的实验结果显示，该方法在低资源翻译、健康场景和推理密集型任务等多个领域均表现出色，且具有数据效率和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.13542', 'title': 'RealICU: Do LLM Agents Understand Long-Context ICU Data? A Benchmark Beyond Behavior Imitation', 'url': 'https://huggingface.co/papers/2605.13542', 'abstract': 'Abstract RealICU benchmark evaluates large language models for ICU decision support using hindsight-annotated patient trajectories, revealing limitations in clinical recommendation accuracy and early interpretation bias.  AI-generated summary Intensive care units (ICU) generate long, dense and evolving streams of clinical information, where physicians must repeatedly reassess patient states under time pressure, underscoring a clear need for reliable AI decision support. Existing ICU benchmarks typically treat historical clinician actions as ground truth. However, these actions are made under incomplete information and limited temporal context of the underlying patient state, and may therefore be suboptimal, making it difficult to assess the true reasoning capabilities of AI systems. We introduce RealICU, a hindsight-annotated benchmark for evaluating large language models (LLMs) under realistic ICU conditions, where labels are created after senior physicians review the full patient trajectory. We formulate four physician-motivated tasks: assess Patient Status, Acute Problems, Recommended Actions, and Red Flag actions that risk unsafe outcomes. We partition each trajectory with 30-min windows and release two datasets: RealICU-Gold with 930-window annotations from 94 MIMIC-IV patients, and RealICU-Scale with 11,862 windows extended by Oracle, a physician-validated LLM hindsight labeler. Existing LLMs including memory-augmented ones performed poorly on RealICU, exposing two failure modes: a recall-safety tradeoff for clinical recommendations, and an anchoring bias to early interpretations of the patient. We further introduce ICU-Evo to study structured-memory agents that improves long-horizon reasoning but does not fully eliminate safety failures. Together, RealICU provides a clinically grounded testbed for measuring and improving AI sequential decision-support in high-stakes care. Project page: https://chengzhi-leo.github.io/RealICU-Bench/', 'score': 3, 'issue_id': 2226, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '220e1b09c0893364', 'authors': ['Chengzhi Shen', 'Weixiang Shen', 'Tobias Susetzky', 'Chen', 'Chen', 'Jun Li', 'Yuyuan Liu', 'Xuepeng Zhang', 'Zhenyu Gong', 'Daniel Rueckert', 'Jiazhen Pan'], 'affiliations': ['Imperial College London', 'LMU Munich', 'Munich Center for Machine Learning (MCML)', 'Sun Yat-sen University Cancer Center', 'TUM University Hospital', 'Technical University of Munich (TUM)', 'University of Oxford', 'University of Sheffield', 'Zhongshan Hospital Fudan University', 'relAI Konrad Zuse School of Excellence in Reliable AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.13542.jpg', 'data': {'categories': ['#healthcare', '#long_context', '#dataset', '#reasoning', '#science', '#benchmark', '#agents', '#hallucinations'], 'emoji': '🏥', 'ru': {'title': 'Проверка надежности языковых моделей для принятия клинических решений в реальных условиях интенсивной терапии', 'desc': 'В работе представлен бенчмарк RealICU для оценки больших языковых моделей в поддержке клинических решений в отделениях интенсивной терапии. Авторы создали аннотированный датасет с использованием ретроспективного анализа полной истории пациентов, где врачи проверили правильность рекомендаций после получения полной информации о состоянии. Исследование выявило два критических недостатка LLMs: компромисс между полнотой выявления проблем и безопасностью рекомендаций, а также смещение в сторону ранних интерпретаций состояния пациента. Авторы предложили архитектуру ICU-Evo на основе структурированной памяти для улучшения долгосрочного рассуждения, но отметили, что полностью устранить проблемы безопасности не удалось.'}, 'en': {'title': 'Enhancing AI Decision Support in ICU with RealICU Benchmark', 'desc': "The RealICU benchmark evaluates large language models (LLMs) for decision support in intensive care units (ICUs) by using hindsight-annotated patient data. It highlights the limitations of current models in accurately making clinical recommendations and reveals biases in early patient assessments. By creating a realistic evaluation framework, RealICU allows for a better understanding of AI reasoning capabilities in high-pressure medical environments. The benchmark includes tasks for assessing patient status and recommending actions, aiming to enhance AI's effectiveness in critical care settings."}, 'zh': {'title': '提升重症监护室AI决策支持的基准评估', 'desc': 'RealICU基准评估大型语言模型在重症监护室（ICU）决策支持中的表现，揭示了临床推荐准确性和早期解读偏差的局限性。该研究提出了一种后见注释的基准，旨在在真实的ICU条件下评估AI系统的推理能力。研究者设计了四个与医生相关的任务，包括评估患者状态、急性问题、推荐行动和风险警示行动。通过发布两个数据集，RealICU为提高AI在高风险护理中的决策支持提供了临床基础的测试平台。'}}}, {'id': 'https://huggingface.co/papers/2605.12925', 'title': 'AgentLens: Revealing The Lucky Pass Problem in SWE-Agent Evaluation', 'url': 'https://huggingface.co/papers/2605.12925', 'abstract': 'Abstract Software engineering agents are evaluated using a process-level framework that reveals differences between effective and ineffective approaches, identifying patterns like lucky passes and providing quality scoring for improved assessment.  AI-generated summary Evaluation of software engineering (SWE) agents is dominated by a binary signal: whether the final patch passes the tests. This outcome-only view treats a principled solution and a chaotic trial-and-error process as equivalent. We show that this equivalence is empirically false. We evaluate 2,614 OpenHands trajectories from eight model backends on 60 SWE-bench Verified tasks. Of these, 47 have enough passing trajectories to construct task-level process references, yielding a 1,815-trajectory evaluation subset. Among passing trajectories in this subset, 10.7% exhibit behavior we call a Lucky Pass: regression cycles, blind retries, missing verification, or temporally disordered exploration, implementation, and verification.   We introduce AgentLens, a framework for process-level assessment of SWE-agent trajectories, and release AgentLens-Bench, a dataset of 1,815 trajectories annotated with quality scores, waste signals, divergence points, and 47 task-level Prefix Tree Acceptor (PTA) references. AgentLens builds PTA references by merging multiple passing solutions for the same task, and uses a context-sensitive intent labeler to assign actions to Exploration, Implementation, Verification, or Orchestration based on trajectory history rather than tool identity alone.   On AgentLens-Bench, the quality score separates passing trajectories into Lucky, Solid, and Ideal tiers and further decomposes Lucky Passes into five recurring mechanisms. Across the eight model backends, Lucky rates range from 0.5% to 23.2%, and some models move by as many as five rank positions when ranked by quality score instead of pass rate. We release the anonymized project repository, including the AgentLens-Bench dataset and AgentLens SDK, at https://github.com/microsoft/code-agent-state-trajectories/.', 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'ad5c23e7ad6407c7', 'authors': ['Priyam Sahoo', 'Gaurav Mittal', 'Xiaomin Li', 'Shengjie Ma', 'Benjamin Steenhoek', 'Pingping Lin', 'Yu Hu'], 'affiliations': ['Microsoft', 'University of Illinois, Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.12925.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#dataset', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Оценка качества процесса вместо только результата в агентах программной инженерии', 'desc': 'В статье предложена система процессного уровня оценки агентов в области инженерии ПО, которая показывает, что простое прохождение тестов не отражает качество решения. Авторы выявили явление «Lucky Pass» — когда агент случайно проходит тесты через регрессивные циклы и слепые повторы вместо систематического подхода. Они разработали AgentLens — фреймворк с использованием Prefix Tree Acceptor для детальной оценки траекторий агентов и создали аннотированный датасет с метриками качества, сигналами потерь и точками расхождения. Результаты показывают, что различные модели значительно меняют свой рейтинг при оценке по качеству вместо простого подсчета пройденных тестов.'}, 'en': {'title': 'Evaluating Software Engineering Agents Beyond Pass Rates', 'desc': "This paper presents a new framework called AgentLens for evaluating software engineering (SWE) agents based on their process-level performance rather than just the binary outcome of passing tests. It identifies different patterns of behavior in agent trajectories, such as 'Lucky Passes', which are instances where agents succeed through non-optimal methods like blind retries or disordered actions. The study analyzes 2,614 trajectories and introduces a dataset, AgentLens-Bench, that includes quality scores and detailed annotations for better assessment of agent performance. By using this framework, the authors demonstrate that the quality of agent behavior can significantly differ from mere pass rates, revealing deeper insights into the effectiveness of SWE agents."}, 'zh': {'title': '提升软件工程代理评估的准确性', 'desc': '本文提出了一种新的评估软件工程代理的方法，称为AgentLens，旨在通过过程级框架分析代理的行为。研究表明，传统的仅依赖最终补丁是否通过测试的评估方式是不够的，因为它忽视了过程中的重要细节。通过分析2614个OpenHands轨迹，发现10.7%的成功轨迹存在所谓的“幸运通过”现象，这些现象可能导致错误的评估。AgentLens-Bench数据集提供了详细的质量评分和行为模式，有助于更准确地评估软件工程代理的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.12684', 'title': 'Visual Aesthetic Benchmark: Can Frontier Models Judge Beauty?', 'url': 'https://huggingface.co/papers/2605.12684', 'abstract': "Abstract Current multimodal models struggle to match human expert aesthetic judgment in comparative image selection tasks, as demonstrated by the Visual Aesthetic Benchmark which reveals significant performance gaps and shows that fine-tuning on expert examples can improve accuracy.  AI-generated summary Multimodal large language models (MLLMs) are now routinely deployed for visual understanding, generation, and curation. A substantial fraction of these applications require an explicit aesthetic judgment. Most existing solutions reduce this judgment to predicting a scalar score for a single image. We first ask whether such scores faithfully capture comparative preference: in a controlled study with eight expert annotators, score-derived rankings align poorly with the same annotators' direct comparisons, while direct ranking yields substantially higher inter-annotator agreement on best- and worst-image labels. Motivated by this finding, we introduce the Visual Aesthetic Benchmark (VAB), which casts aesthetic evaluation as comparative selection over candidate sets with matched subject matter. VAB contains 400 tasks and 1,195 images across fine art, photography, and illustration, with labels derived from the consensus of 10 independent expert judges per task. Evaluating 20 frontier MLLMs and six dedicated visual-quality reward models, we find that the strongest system identifies both the best and the worst image correctly across three random permutations of the candidate order in only 26.5% of tasks, far below the 68.9% achieved by human experts. Fine-tuning a 35B-parameter model on 2,000 expert examples brings its accuracy close to that of a 397B-parameter open-weight model, suggesting that the comparative signal in VAB is transferable. Together, these results expose a clear and measurable gap between current multimodal models and expert aesthetic judgment, and VAB provides the first set-based, expert-grounded testbed on which that gap can be tracked and closed.", 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'b2511125d9e2c1c0', 'authors': ['Yichen Feng', 'Yuetai Li', 'Chunjiang Liu', 'Yuanyuan Chen', 'Fengqing Jiang', 'Yue Huang', 'Hang Hua', 'Zhengqing Yuan', 'Kaiyuan Zheng', 'Luyao Niu', 'Bhaskar Ramasubramanian', 'Basel Alomair', 'Xiangliang Zhang', 'Misha Sra', 'Zichen Chen', 'Radha Poovendran', 'Zhangchen Xu'], 'affiliations': ['Bake AI', 'Carnegie Mellon University', 'King Abdulaziz City for Science and Technology', 'MIT-IBM Watson AI Lab', 'Stanford University', 'University of California, Santa Barbara', 'University of Notre Dame', 'University of Washington', 'Western Washington University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12684.jpg', 'data': {'categories': ['#cv', '#multimodal', '#training', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Сравнительное суждение об эстетике: преодолевая разрыв между моделями и экспертами', 'desc': 'В статье исследуется способность мультимодальных больших языковых моделей выносить эстетические суждения при выборе лучшего изображения из набора кандидатов. Авторы показали, что традиционные подходы, основанные на предсказании скалярной оценки для отдельного изображения, плохо согласуются с прямым сравнением эксперта, и предложили новый бенчмарк Visual Aesthetic Benchmark с 400 задачами на сравнение изображений. Оценка 20 современных мультимодальных моделей выявила значительный разрыв между их производительностью (26.5%) и экспертными суждениями (68.9%), хотя файн-тюнинг на примерах экспертов позволяет существенно улучшить результаты. Исследование демонстрирует, что сигнал о сравнительных предпочтениях в бенчмарке хорошо переносится на другие модели.'}, 'en': {'title': 'Bridging the Gap in AI Aesthetic Judgment', 'desc': 'This paper addresses the limitations of current multimodal models in making aesthetic judgments in image selection tasks. It highlights that existing models often predict a single score for images, which does not accurately reflect human preferences. The authors introduce the Visual Aesthetic Benchmark (VAB), a new framework for evaluating aesthetic quality through comparative selection of images, which shows better alignment with expert opinions. The findings reveal a significant performance gap between AI models and human experts, emphasizing the need for improved training methods to enhance aesthetic evaluation capabilities in AI.'}, 'zh': {'title': '缩小多模态模型与专家审美判断的差距', 'desc': '当前的多模态模型在比较图像选择任务中难以匹配人类专家的审美判断。我们通过视觉审美基准（VAB）展示了这一点，该基准将审美评估视为对候选集的比较选择。研究表明，现有模型在识别最佳和最差图像方面的准确性远低于人类专家。通过对模型进行微调，可以显著提高其准确性，缩小与专家判断之间的差距。'}}}, {'id': 'https://huggingface.co/papers/2605.11733', 'title': 'Position: LLM Inference Should Be Evaluated as Energy-to-Token Production', 'url': 'https://huggingface.co/papers/2605.11733', 'abstract': 'Abstract LLM inference should be evaluated as energy-to-token production under constraints of compute, power, cooling, and operational efficiency, requiring new metrics beyond traditional accuracy and latency measures.  AI-generated summary LLM inference is still evaluated mainly as a model or software problem: accuracy, latency, throughput, and hardware utilization. This is incomplete. At deployment scale, the relevant output is a quality-conditioned token produced under joint constraints from effective compute, delivered data-center power, cooling capacity, PUE, and utilization.   We argue that the ML community should treat inference as energy-to-token production. We formalize this view with a dimensionally consistent Token Production Function in which token rate is bounded by both compute-per-token and energy-per-token ceilings. Listed API prices vary by over an order of magnitude across providers, but we use price dispersion only as directional motivation, not as causal evidence of marginal cost. The core physical question is instead: under fixed quality and service targets, when does the binding constraint move from theoretical peak compute toward delivered power, cooling, and operational efficiency?   Under this framing, system optimizations -- latent KV-cache compression, sparse or heavily compressed attention, quantization, routing, and difficulty-adaptive reasoning -- are not merely local engineering tricks. They are energy-to-token levers because they reduce FLOPs/token, joules/token, memory traffic, or utilization losses under fixed (q^{*},s^{*}). We therefore call for inference papers and benchmarks to report Joules/token, active binding constraint, PUE-adjusted delivered power, and utilization-adjusted token output alongside accuracy and latency.', 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '8e0f5347a4c3267a', 'authors': ['Xiang Liu', 'Shimiao Yuan', 'Zhenheng Tang', 'Peijie Dong', 'Kaiyong Zhao', 'Qiang Wang', 'Bo Li', 'Xiaowen Chu'], 'affiliations': ['Guangzhou HKUST Fok Ying Tung Research Institute', 'HITSZ', 'HKUST', 'HKUST(GZ)', 'UCAS', 'XGRIDS'], 'pdf_title_img': 'assets/pdf/title_img/2605.11733.jpg', 'data': {'categories': ['#inference', '#optimization', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'От вычислений к энергии: новая парадигма оценки инференса больших моделей', 'desc': 'Статья переосмысливает эвалуацию инференса больших языковых моделей, предлагая рассматривать её как задачу производства токенов на единицу энергии с учётом физических ограничений центра обработки данных. Авторы формализуют эту идею через функцию производства токенов, которая показывает, что скорость генерации токенов ограничена одновременно вычислительной мощностью на токен и энергопотреблением на токен. Они аргументируют, что различные технические оптимизации (компрессия KV-кеша, разреженное внимание, квантизация) следует рассматривать не как локальные инженерные трюки, а как рычаги для улучшения энергетической эффективности. Авторы призывают переориентировать метрики оценки инференса: наряду с точностью и латентностью необходимо репортировать энергопотребление на токен, активные узкие места системы и откорректированные на PUE показатели утилизации.'}, 'en': {'title': 'Transforming Inference: From Accuracy to Energy Efficiency', 'desc': 'This paper proposes a new way to evaluate large language model (LLM) inference by focusing on energy-to-token production rather than just traditional metrics like accuracy and latency. It emphasizes that at scale, the efficiency of producing tokens is constrained by compute resources, power availability, and cooling capacity. The authors introduce a Token Production Function that considers both compute and energy limits, suggesting that optimizations in model architecture should be viewed as ways to improve energy efficiency. They advocate for the ML community to adopt new benchmarks that include energy metrics, which will provide a more comprehensive understanding of LLM performance in real-world applications.'}, 'zh': {'title': '将推理视为能量到令牌的生产', 'desc': '这篇论文提出了在机器学习推理中，应该将其视为在计算、功率、冷却和操作效率的约束下进行的能量到令牌的生产。传统的评估方法主要关注准确性和延迟，但在实际部署中，输出的质量受到多种因素的影响。作者建议使用一个一致的令牌生产函数来描述这种关系，并强调在固定质量和服务目标下，约束条件的转变。最后，论文呼吁在推理研究中报告每个令牌的能量消耗，以及其他相关的性能指标。'}}}, {'id': 'https://huggingface.co/papers/2605.10268', 'title': 'MemReread: Enhancing Agentic Long-Context Reasoning via Memory-Guided Rereading', 'url': 'https://huggingface.co/papers/2605.10268', 'abstract': 'Abstract MemReread addresses long-context reasoning challenges by avoiding intermediate retrieval and employing question decomposition with rereading to recover discarded information, maintaining linear time complexity.  AI-generated summary To tackle long-context reasoning tasks without the quadratic complexity of standard attention mechanisms, approaches based on agent memory have emerged, which typically maintain a dynamically updated memory when linearly processing document chunks. To mitigate the potential loss of latent evidence in this memorize-while-reading paradigm, recent works have integrated retrieval modules that allow agents to recall information previously discarded during memory overwriting. However, retrieval-based recall suffers from both evidence loss during memory formation and interference induced by invalid queries. To overcome these limitations, we propose MemReread. Built upon streaming reading, MemReread circumvents intermediate retrieval. It triggers question decomposition and rereading when the final memory is insufficient, enabling the recovery of indirect facts that were prematurely discarded. This design supports non-linear reasoning while preserving the inherent logical flow of document comprehension. To further enhance practicality, we introduce a reinforcement learning framework that enhances length extrapolation capability while dynamically determining the number of rereading passes based on task complexity, thereby flexibly controlling computational overhead. Extensive experiments demonstrate that MemReread consistently outperforms baseline frameworks on long-context reasoning tasks, while maintaining linear time complexity with respect to context length.', 'score': 2, 'issue_id': 2224, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '26912323341f38ac', 'authors': ['Baibei Ji', 'Xiaoyang Weng', 'Juntao Li', 'Zecheng Tang', 'Yihang Lou', 'Min Zhang'], 'affiliations': ['Peking University', 'Soochow University'], 'pdf_title_img': 'assets/pdf/title_img/2605.10268.jpg', 'data': {'categories': ['#long_context', '#agents', '#rag', '#rl', '#reasoning'], 'emoji': '🔄', 'ru': {'title': 'Повторное чтение вместо поиска: линейная обработка длинных контекстов', 'desc': 'MemReread решает задачу рассуждений на длинных контекстах, избегая промежуточного поиска и используя декомпозицию вопросов с повторным чтением для восстановления отброшенной информации. Метод обрабатывает документ потоком с линейной сложностью, сохраняя динамическую память о прочитанном. Когда финальной памяти недостаточно для ответа, система разбивает вопрос и перечитывает релевантные части, восстанавливая косвенные факты. Добавленный фреймворк усиленного обучения адаптивно определяет количество перечитываний в зависимости от сложности задачи, контролируя вычислительные затраты.'}, 'en': {'title': 'MemReread: Efficient Long-Context Reasoning through Rereading and Question Decomposition', 'desc': 'MemReread is a novel approach designed to improve long-context reasoning in machine learning by avoiding the need for intermediate retrieval of information. It uses a technique called question decomposition, which allows the model to reread parts of the text to recover important details that may have been overlooked. This method maintains linear time complexity, making it efficient even as the context length increases. Additionally, a reinforcement learning framework is integrated to adaptively manage rereading based on the complexity of the task, ensuring optimal performance without excessive computational costs.'}, 'zh': {'title': 'MemReread：高效的长上下文推理新方法', 'desc': 'MemReread 是一种新方法，旨在解决长上下文推理的挑战。它通过避免中间检索，采用问题分解和重读的方式来恢复被丢弃的信息，从而保持线性时间复杂度。该方法在处理文档时，能够有效地回收间接事实，支持非线性推理，同时保持文档理解的逻辑流。通过引入强化学习框架，MemReread 动态调整重读次数，灵活控制计算开销，实验证明其在长上下文推理任务中表现优于基线框架。'}}}, {'id': 'https://huggingface.co/papers/2605.08737', 'title': 'The Extrapolation Cliff in On-Policy Distillation of Near-Deterministic Structured Outputs', 'url': 'https://huggingface.co/papers/2605.08737', 'abstract': "Abstract On-policy distillation with reward extrapolation exhibits a safety threshold beyond which structured output tasks lose format preservation, with empirical validation showing performance parity at reduced parameter count when operating below this threshold.  AI-generated summary On-policy distillation (OPD) is widely used for LLM post-training. When pushed with a reward-extrapolation coefficient lambda > 1, the student can lift past the teacher in domain, but past a threshold lambda* the same step violates the output contract on structured-output tasks. In a single-position Bernoulli reduction, we derive a closed-form base-relative clip-safety threshold lambda*(p,b,c) determined by three measurable quantities: the teacher modal probability, the warm-start mass, and the importance-sampling clip strength. Above lambda*, the extrapolated fixed point exits the clip-safe region, changing training from format-preserving to format-collapsing. We extend the rule to calibrated K-ary listwise JSON tasks where a single binding equivalence class dominates the output contract and SFT retains parse headroom. On Amazon Fashion, three pre-registered tests--a fine-grid cliff interval, a budget-extension test, and a small-clip cross-prediction--fall within their locked prediction windows, with the small-clip value matching the closed-form prediction below grid resolution. Operating just below lambda*, ListOPD brings a 1.7B Qwen3 student to in-domain parity with an 8B-SFT baseline at one-fifth the parameters. The gain is driven primarily by format adherence: NDCG@1 on parsed outputs remains flat across lambda, while parse validity sharply changes at the predicted boundary. The cliff diagnostic is rubric-independent, whereas the parity claim uses a Gemini-graded rubric and inherits that evaluator's exposure.", 'score': 2, 'issue_id': 2223, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'f8b364ecc7cda484', 'authors': ['Xin Li', 'Hao Jiang', 'Annan Wang', 'Yichi Zhang', 'Chau Yuen'], 'affiliations': ['Nanyang Technological University, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.08737.jpg', 'data': {'categories': ['#alignment', '#small_models', '#rlhf', '#training', '#optimization'], 'emoji': '⚠️', 'ru': {'title': 'Безопасный порог дистилляции: баланс между производительностью и сохранением формата', 'desc': 'Работа изучает дистилляцию моделей с экстраполяцией вознаграждения (on-policy distillation), показывая, что существует критический порог lambda*, за которым модель-ученик начинает нарушать формат структурированного вывода. Авторы математически вывели замкнутую форму этого порога для задач с бинарным выбором и расширили её на многовариантные JSON-задачи. Экспериментально подтверждено, что при работе ниже критического порога небольшая модель (1.7B параметров) достигает качества большой модели (8B параметров), сохраняя корректность формата при уменьшении параметров в пять раз. Ключевой вывод: безопасность дистилляции определяется модальной вероятностью учителя, инициализацией и методом обрезания важности выборки.'}, 'en': {'title': 'Balancing Performance and Format in On-Policy Distillation', 'desc': 'This paper discusses on-policy distillation (OPD) in machine learning, particularly focusing on how reward extrapolation affects structured output tasks. It identifies a safety threshold, lambda*, beyond which the performance of the student model deteriorates, leading to format collapse instead of preservation. The authors derive a closed-form expression for lambda* based on key factors like teacher modal probability and importance-sampling clip strength. Empirical results show that operating just below this threshold allows a smaller student model to achieve performance parity with a larger teacher model while maintaining output format integrity.'}, 'zh': {'title': '在线策略蒸馏的安全阈值与格式保持', 'desc': '本文探讨了在奖励外推下的在线策略蒸馏（OPD）如何影响结构化输出任务的格式保持。当外推系数超过某个阈值时，学生模型的输出可能会违反格式约定，导致训练效果下降。我们推导出一个闭合形式的安全阈值，该阈值由教师模型的模态概率、热启动质量和重要性采样剪切强度等三个可测量量决定。在亚马逊时尚数据集上进行的实验表明，接近安全阈值的操作可以使较小参数的学生模型在特定任务上与大型教师模型的表现相当。'}}}, {'id': 'https://huggingface.co/papers/2605.05806', 'title': 'Retrieval from Within: An Intrinsic Capability of Attention-Based Models', 'url': 'https://huggingface.co/papers/2605.05806', 'abstract': 'Abstract INTRA demonstrates that attention-based models can perform retrieval directly from internal representations, unifying retrieval and generation while improving evidence recall and answer quality.  AI-generated summary Retrieval-augmented generation (RAG) typically treats retrieval and generation as separate systems. We ask whether an attention-based encoder-decoder can instead retrieve directly from its own internal representations. We introduce INTRA (INTrinsic Retrieval via Attention), a framework where decoder attention queries score pre-encoded evidence chunks that are then directly reused as context for generation. By construction, INTRA unifies retrieval and generation, eliminating the retriever-generator mismatch typical of RAG pipelines. This design also amortizes context encoding by reusing precomputed encoder states across queries. On question-answering benchmarks, INTRA outperforms strong engineered retrieval pipelines on both evidence recall and end-to-end answer quality. Our results demonstrate that attention-based models already possess a retrieval mechanism that can be elicited, rather than added as an external module.', 'score': 2, 'issue_id': 2228, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'b1edc403de4d4d63', 'authors': ['Elad Hoffer', 'Yochai Blau', 'Edan Kinderman', 'Ron Banner', 'Daniel Soudry', 'Boris Ginsburg'], 'affiliations': ['Department of Electrical Engineering, Technion, Haifa, Israel', 'NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2605.05806.jpg', 'data': {'categories': ['#rag', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Единая модель поиска и генерации через внутреннее внимание', 'desc': 'В статье представлена INTRA — фреймворк, который объединяет поиск релевантной информации и генерацию ответов внутри одной внимательной модели энкодер-декодер архитектуры. Вместо традиционного двухэтапного подхода RAG, где поиск и генерация разделены, INTRA использует запросы декодера для оценки предварительно закодированных фрагментов текста, которые затем переиспользуются в качестве контекста. Благодаря такой архитектуре модель избегает рассогласования между компонентами поиска и генерации, а также повышает эффективность за счет переиспользования закодированных состояний. На бенчмарках задач вопросно-ответного диалога INTRA показывает лучшие результаты как по полноте поиска доказательств, так и по качеству итоговых ответов.'}, 'en': {'title': 'Unifying Retrieval and Generation with INTRA', 'desc': 'The paper introduces INTRA, a novel framework that allows attention-based models to retrieve information directly from their internal representations. This approach unifies the processes of retrieval and generation, which are usually treated as separate in traditional systems. By using decoder attention to query pre-encoded evidence, INTRA enhances the quality of answers and improves the recall of relevant information. The results show that INTRA outperforms existing retrieval systems in question-answering tasks, highlighting the inherent retrieval capabilities of attention-based models.'}, 'zh': {'title': '统一检索与生成的注意力模型', 'desc': 'INTRA是一种基于注意力机制的模型，能够直接从内部表示中进行检索，从而将检索和生成过程统一起来。该框架通过解码器的注意力查询对预编码的证据块进行评分，并将其直接用作生成的上下文。INTRA消除了传统检索生成管道中常见的检索器与生成器的不匹配问题，并通过重用预计算的编码器状态来优化上下文编码。实验结果表明，INTRA在问答基准测试中在证据回忆和最终答案质量上均优于强大的工程化检索管道。'}}}, {'id': 'https://huggingface.co/papers/2605.13481', 'title': 'PersonalAI 2.0: Enhancing knowledge graph traversal/retrieval with planning mechanism for Personalized LLM Agents', 'url': 'https://huggingface.co/papers/2605.13481', 'abstract': 'Abstract PersonalAI 2.0 enhances LLM-based systems through external knowledge graph integration with dynamic multistage query processing and adaptive information search mechanisms.  AI-generated summary We introduce PersonalAI 2.0 (PAI-2), a novel framework, designed to enhance large language model (LLM) based systems through integration of external knowledge graphs (KG). The proposed approach addresses key limitations of existing Graph Retrieval-Augmented Generation (GraphRAG) methods by incorporating a dynamic, multistage query processing pipeline. The central point of PAI-2 design is its ability to perform adaptive, iterative information search, guided by extracted entities, matched graph vertices and generated clue-queries. Conducted evaluation over six benchmarks (Natural Questions, TriviaQA, HotpotQA, 2WikiMultihopQA, MuSiQue and DiaASQ) demonstrates improvement in factual correctness of generating answers compared to analogues methods (LightRAG, RAPTOR, and HippoRAG 2). PAI-2 achieves 4% average gain by LLM-as-a-Judge across four benchmarks, reflecting its effectiveness in reducing hallucination rates and increasing precision. We show that use of graph traversal algorithms (e.g. BeamSearch, WaterCircles) gain superior results compared to standard flatten retriever on average 6%, while enabled search plan enhancement mechanism gain 18% boost compared to disabled one by LLM-as-a-Judge across six datasets. In addition, ablation study reveals that PAI-2 achieves the SOTA result on MINE-1 benchmark, achieving 89% information-retention score, using LLMs from 7-14B tiers. Collectively, these findings underscore the potential of PAI-2 to serve as a foundational model for next-generation personalized AI applications, requiring scalable, context-aware knowledge representation and reasoning capabilities.', 'score': 1, 'issue_id': 2225, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '7b1f08388cb440f3', 'authors': ['Mikhail Menschikov', 'Matvey Iskornev', 'Alexander Kharitonov', 'Alina Bogdanova', 'Mikhail Belkin', 'Ekaterina Lisitsyna', 'Artyom Sosedka', 'Victoria Dochkina', 'Ruslan Kostoev', 'Ilia Perepechkin', 'Evgeny Burnaev'], 'affiliations': ['AIRI', 'Huawei', 'Sber', 'SberAI', 'Sberbank of Russia', 'Skoltech'], 'pdf_title_img': 'assets/pdf/title_img/2605.13481.jpg', 'data': {'categories': ['#benchmark', '#rag', '#graphs', '#hallucinations', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Граф знаний и адаптивный поиск для более точных и честных языковых моделей', 'desc': 'PersonalAI 2.0 — это фреймворк, который улучшает большие языковые модели путём интеграции внешних графов знаний и динамической многоэтапной обработки запросов. Система использует адаптивный итеративный поиск информации, направляемый извлеченными сущностями и сгенерированными вспомогательными запросами для повышения точности ответов. Методика показывает значительное улучшение на шести эталонных наборах данных, снижая галлюцинации модели на 4% в среднем и обеспечивая 18% прирост эффективности благодаря механизму планирования поиска. Подход достигает самых современных результатов, сохраняя 89% информации при использовании относительно компактных LLM объёмом 7-14 миллиардов параметров.'}, 'en': {'title': 'Enhancing LLMs with Dynamic Knowledge Integration', 'desc': 'PersonalAI 2.0 (PAI-2) is a new framework that improves large language model (LLM) systems by integrating external knowledge graphs (KG). It introduces a dynamic multistage query processing pipeline that enhances the retrieval of relevant information. PAI-2 allows for adaptive information searches, which helps in generating more accurate answers by reducing errors known as hallucinations. Evaluations show that PAI-2 outperforms existing methods in factual correctness and information retention across multiple benchmarks.'}, 'zh': {'title': '个人化AI的未来：PAI-2的创新之路', 'desc': 'PersonalAI 2.0（PAI-2）是一个新框架，旨在通过整合外部知识图谱来增强基于大型语言模型（LLM）系统的能力。该方法通过动态的多阶段查询处理管道，解决了现有图检索增强生成（GraphRAG）方法的关键局限性。PAI-2的设计核心在于其能够进行自适应的迭代信息搜索，利用提取的实体、匹配的图顶点和生成的线索查询进行指导。评估结果显示，PAI-2在多个基准测试中提高了生成答案的事实正确性，展现了其在减少幻觉率和提高精确度方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.13087', 'title': 'Vividh-ASR: A Complexity-Tiered Benchmark and Optimization Dynamics for Robust Indic Speech Recognition', 'url': 'https://huggingface.co/papers/2605.13087', 'abstract': "Abstract Research identifies studio-bias in multilingual ASR fine-tuning and proposes R-MFT method to improve spontaneous speech performance while maintaining efficiency.  AI-generated summary Fine-tuning multilingual ASR models like Whisper for low-resource languages often improves read speech but degrades spontaneous audio performance, a phenomenon we term studio-bias. To diagnose this mismatch, we introduce Vividh-ASR, a complexity-stratified benchmark for Hindi and Malayalam across four tiers: studio, broadcast, spontaneous, and synthetic noise. Through a controlled study of learning-rate timing and curriculum ordering, we find that early large parameter updates improve global WER by 12 absolute points, while a hard-to-easy curriculum adds gains for spontaneous speech. These findings motivate reverse multi-stage fine-tuning (R-MFT), a training recipe that enables a parameter-efficient 244M Whisper model to match or exceed conventionally fine-tuned 769M counterparts. Representational analysis via CKA and SVD reveals effective schedules concentrate adaptation in the decoder, preserving the pre-trained encoder's acoustic geometry. We release the benchmark and models.", 'score': 1, 'issue_id': 2225, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '2860f43072a9d1d5', 'authors': ['Kush Juvekar', 'Kavya Manohar', 'Aditya Srinivas Menon', 'Arghya Bhattacharya', 'Kumarmanas Nethil'], 'affiliations': ['Adalat AI, India'], 'pdf_title_img': 'assets/pdf/title_img/2605.13087.jpg', 'data': {'categories': ['#multilingual', '#benchmark', '#open_source', '#low_resource', '#training', '#small_models', '#audio', '#dataset', '#optimization'], 'emoji': '🎓', 'ru': {'title': 'Преодоление студийного смещения в многоязычном распознавании речи через обратное дообучение', 'desc': 'Исследование выявило проблему студийного смещения при дообучении многоязычных моделей автоматического распознавания речи на примере Whisper для низкоресурсных языков. Авторы предложили метод обратного многоэтапного дообучения (R-MFT), который улучшает производительность на спонтанной речи, сохраняя эффективность модели. Через анализ расписания обучения и curriculum learning они обнаружили, что правильный порядок обновления параметров позволяет 244M модели достичь результатов 769M модели. Представленный бенчмарк Vividh-ASR для хинди и малаялама включает речь в различных условиях для систематической оценки.'}, 'en': {'title': 'Enhancing Spontaneous Speech Recognition in Multilingual ASR', 'desc': "This paper addresses the issue of studio-bias in multilingual automatic speech recognition (ASR) systems, particularly when fine-tuning models for low-resource languages. The authors introduce a new benchmark called Vividh-ASR, which evaluates ASR performance across different audio types, including spontaneous speech. They propose a method called reverse multi-stage fine-tuning (R-MFT) that enhances the performance of a smaller ASR model while maintaining efficiency. Their findings suggest that careful management of learning rates and training sequences can significantly improve the model's ability to handle spontaneous speech."}, 'zh': {'title': '提升自发语音表现的反向微调方法', 'desc': '本研究识别了多语言自动语音识别（ASR）微调中的工作室偏差，并提出了反向多阶段微调（R-MFT）方法，以提高自发语音的表现，同时保持效率。我们引入了Vividh-ASR，这是一个针对印地语和马拉雅拉姆语的复杂性分层基准，涵盖工作室、广播、自发和合成噪声四个层次。通过对学习率时机和课程顺序的控制研究，我们发现早期的大参数更新可以将全局字错误率（WER）提高12个百分点，而从难到易的课程安排则对自发语音有额外的提升。我们的研究结果促使了R-MFT的提出，使得一个参数高效的244M Whisper模型能够与传统微调的769M模型相匹敌或超越。'}}}, {'id': 'https://huggingface.co/papers/2605.12995', 'title': 'F-GRPO: Factorized Group-Relative Policy Optimization for Unified Candidate Generation and Ranking', 'url': 'https://huggingface.co/papers/2605.12995', 'abstract': 'Abstract A unified framework combines candidate generation and ranking in a single autoregressive model using factorized group-relative policy optimization to address credit assignment challenges in end-to-end retrieval optimization.  AI-generated summary Traditional retrieval pipelines optimize utility through stages of candidate retrieval and reranking, where ranking operates over a predefined candidate set. Large Language Models (LLMs) broaden this into a generative process: given a candidate pool, an LLM can generate a subset and order it within a single autoregressive pass. However, this flexibility introduces a new optimization challenge: the model must search a combinatorial output space while receiving utility feedback only after the full ranked list is generated. Because this feedback is defined over the completed sequence, it cannot distinguish whether a poor result arises from failing to generate a relevant subset or from failing to rank that subset correctly. This credit assignment gap makes end-to-end optimization unstable and sample-inefficient. Existing systems often address this by separating candidate generation from ranking. However, such decoupling remains misaligned with downstream utility because ranking is limited by the candidate set it receives. To bridge this gap, we propose a unified framework that performs both within a single autoregressive rollout and optimizes them end-to-end via factorized group-relative policy optimization (F-GRPO). Our framework factorizes the policy into candidate generation and ranking while sharing a single LLM backbone, and jointly trains them with an order-invariant coverage reward and a position-aware utility reward. To address the resulting phase-specific credit assignment problem, we use separate group-relative advantages for generation and ranking within a two-phase sequence-level objective. Across sequential recommendation and multi-hop question answering benchmarks, F-GRPO improves top-ranked performance over GRPO and decoupled baselines, outperforms supervised alternatives, and remains competitive with strong zero-shot rerankers, with no architectural changes at inference time.', 'score': 1, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'bc2c0082eae9aaa1', 'authors': ['Rohan Surana', 'Gagan Mundada', 'Junda Wu', 'Xintong Li', 'Yizhu Jiao', 'Bowen Jin', 'Sizhe Zhou', 'Tong Yu', 'Ritwik Sinha', 'Jiawei Han', 'Jingbo Shang', 'Julian McAuley'], 'affiliations': ['Adobe Research', 'UC San Diego', 'University of Illinois at Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.12995.jpg', 'data': {'categories': ['#rl', '#training', '#rlhf', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Единая оптимизация генерации и ранжирования через факторизованную политику', 'desc': 'В статье предложена единая архитектура, которая объединяет генерацию кандидатов и их ранжирование в одной авторегрессивной модели на основе больших языковых моделей. Основная проблема заключается в том, что обратная связь по полезности приходит только после генерации всего отранжированного списка, что затрудняет определение, какой из двух этапов привёл к плохому результату. Авторы предлагают метод факторизованной групповой относительной оптимизации политики (F-GRPO), который разделяет политику на две части, но обучает их совместно с помощью отдельных наград за покрытие и позиционную полезность. Экспериментальные результаты на задачах последовательной рекомендации и многошаговых вопросо-ответных систем показывают, что такой подход улучшает качество ранжирования и конкурирует с сильными базовыми методами.'}, 'en': {'title': 'Unifying Candidate Generation and Ranking for Better Retrieval Optimization', 'desc': "This paper presents a new approach to improve retrieval optimization by combining candidate generation and ranking into a single autoregressive model. It addresses the credit assignment problem, where it's difficult to determine if poor results come from generating irrelevant candidates or from incorrect ranking. The proposed method, called factorized group-relative policy optimization (F-GRPO), allows for joint training of generation and ranking using shared resources, which enhances performance. The results show that this unified framework outperforms traditional methods in various benchmarks, making it more efficient and effective for tasks like recommendation and question answering."}, 'zh': {'title': '统一框架：候选生成与排序的完美结合', 'desc': '本文提出了一种统一框架，将候选生成和排序结合在一个自回归模型中，利用分解的组相对策略优化来解决端到端检索优化中的信用分配问题。传统的检索流程将候选检索和重新排序分为两个阶段，而大型语言模型（LLM）则将其扩展为生成过程，能够在一次自回归传递中生成并排序候选子集。为了克服生成和排序之间的信用分配差距，本文提出的框架在共享同一LLM主干的基础上，分解了策略并通过无序覆盖奖励和位置感知效用奖励进行联合训练。实验结果表明，该框架在序列推荐和多跳问答基准测试中，显著提高了排名性能，且在推理时无需架构更改。'}}}, {'id': 'https://huggingface.co/papers/2605.12997', 'title': 'Frequency Bias and OOD Generalization in Neural Operators under a Variable-Coefficient Wave Equation', 'url': 'https://huggingface.co/papers/2605.12997', 'abstract': 'Abstract Neural operators for PDE solving show different generalization behaviors under distribution shifts, with Fourier Neural Operators and Deep Operator Networks exhibiting distinct responses to smoothness and frequency variations.  AI-generated summary Neural operators learn to map initial conditions to the terminal solution of partial differential equations (PDEs), providing a surrogate for the full operator mapping. This enables rapid prediction across different input configurations. While recent neural operator architectures have demonstrated strong performance on diverse PDE tasks, their behavior under structured distribution shifts remains insufficiently understood. To investigate this, we study operator learning in a wave propagation setting governed by a one-dimensional variable-coefficient wave equation, using two representative architectures, the Fourier Neural Operator (FNO) and the Deep Operator Network (DeepONet). To examine their generalization under distribution shifts, we consider structured out-of-distribution (OOD) settings that independently vary input frequency and coefficient smoothness. The results show that under smoothness shifts, both models maintain stable performance, with FNO achieving lower error. In contrast, under frequency shifts, FNO exhibits a sharp increase in error under unseen high-frequency inputs, whereas DeepONet shows milder degradation despite higher overall error. Our analysis reveals that these differences arise from how each architecture represents and responds to variations in frequency structure. Together, these findings highlight a fundamental gap between strong in-distribution performance and generalization under distribution shifts in operator learning, underscoring the role of architectural representation bias in developing more reliable neural operators for physics-based PDE simulations beyond the training distribution.', 'score': 1, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'a7bf7eb24554a8a0', 'authors': ['Runlong Xie', 'An Luo'], 'affiliations': ['Independent Researcher', 'School of Statistics, University of Minnesota, MN, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.12997.jpg', 'data': {'categories': ['#math', '#science', '#architecture'], 'emoji': '📡', 'ru': {'title': 'Архитектура нейронного оператора определяет его устойчивость к распределительным сдвигам', 'desc': 'В статье исследуется поведение нейронных операторов при решении дифференциальных уравнений в условиях распределительных сдвигов. Авторы сравнивают Fourier Neural Operator и Deep Operator Network на примере волнового уравнения с переменными коэффициентами, варьируя частоту входных данных и гладкость коэффициентов. Результаты показывают, что FNO лучше справляется со сдвигами гладкости, но катастрофически теряет качество при появлении высоких частот вне обучающего распределения, тогда как DeepONet деградирует более плавно. Исследование демонстрирует критическую роль архитектурных особенностей в обобщении нейронных операторов на данные, не виданные во время обучения.'}, 'en': {'title': 'Understanding Neural Operators: Performance Under Distribution Shifts', 'desc': 'This paper investigates how different neural operator architectures, specifically Fourier Neural Operators (FNO) an
