ct precedent in reasoning RL.', 'score': 9, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'c0103974d6e3766b', 'authors': ['Chenchen Zhang'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2604.09459.jpg', 'data': {'categories': ['#benchmark', '#rl', '#training', '#survey', '#alignment', '#reasoning', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Распределение кредита в обучении больших моделей: от рассуждений к агентам', 'desc': 'В статье проводится систематический обзор методов распределения кредита (credit assignment) в обучении с подкреплением для больших языковых моделей. Авторы классифицируют 47 методов по двум измерениям: гранулярности распределения (токены, сегменты, шаги) и методологии (Монте-Карло, временные разности, модельные методы). Исследование выявляет различия между двумя режимами: reasoning RL, где нужно распределить вознаграждение внутри цепочки рассуждений, и agentic RL с многоходовым взаимодействием и стохастическими переходами. Авторы предлагают практические ресурсы включая таксономию, чек-лист и протокол бенчмарков для унификации будущих исследований.'}, 'en': {'title': 'Navigating Credit Assignment in Reinforcement Learning for Language Models', 'desc': 'This paper discusses the challenges of credit assignment in reinforcement learning (RL) for large language models (LLMs), focusing on how to determine which actions lead to specific outcomes. It identifies two main contexts: reasoning RL, which deals with assigning credit across many tokens in a single generation, and agentic RL, which involves interactions over multiple turns with complex environments. The authors categorize 47 credit assignment methods based on their granularity and methodology, providing a comprehensive overview of the current landscape. Additionally, they offer resources to aid future research, including a structured inventory of methods, a reporting checklist, and a benchmark protocol for evaluating credit assignment techniques.'}, 'zh': {'title': '强化学习中的信用分配新视野', 'desc': '这篇论文探讨了大语言模型强化学习中的信用分配方法，按粒度和方法论进行分类。信用分配问题在推理和代理环境中表现不同，推理强化学习需要在单一思维链中分配奖励，而代理强化学习则涉及多轮交互，增加了复杂性。作者调查了47种信用分配方法，并提供了结构化的文献清单、报告检查表和基准协议规范等资源。研究表明，从推理到代理的转变使得信用分配的策略变得更加复杂，推动了新方法的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.08706', 'title': 'Efficient RL Training for LLMs with Experience Replay', 'url': 'https://huggingface.co/papers/2604.08706', 'abstract': 'Abstract Experience replay techniques for large language model post-training balance staleness variance and computational costs while maintaining performance and policy entropy.  AI-generated summary While Experience Replay - the practice of storing rollouts and reusing them multiple times during training - is a foundational technique in general RL, it remains largely unexplored in LLM post-training due to the prevailing belief that fresh, on-policy data is essential for high performance. In this work, we challenge this assumption. We present a systematic study of replay buffers for LLM post-training, formalizing the optimal design as a trade-off between staleness-induced variance, sample diversity and the high computational cost of generation. We show that strict on-policy sampling is suboptimal when generation is expensive. Empirically, we show that a well-designed replay buffer can drastically reduce inference compute without degrading - and in some cases even improving - final model performance, while preserving policy entropy.', 'score': 9, 'issue_id': 1913, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '78b1574d749da54b', 'authors': ['Charles Arnal', 'Vivien Cabannes', 'Taco Cohen', 'Julia Kempe', 'Remi Munos'], 'affiliations': ['FAIR at Meta', 'NYU Courant Institute and CDS'], 'pdf_title_img': 'assets/pdf/title_img/2604.08706.jpg', 'data': {'categories': ['#rlhf', '#training', '#rl'], 'emoji': '♻️', 'ru': {'title': 'Переиспользование опыта вместо постоянной генерации', 'desc': 'В этой работе исследуются методы experience replay для дообучения больших языковых моделей, которые переиспользуют сохранённые примеры вместо постоянной генерации новых данных. Авторы показывают, что строгое требование использовать только свежие on-policy данные является субоптимальным, когда генерация дорогостоящая. Они формализируют оптимальный дизайн буфера replay как компромисс между дисперсией из-за устарелости данных, разнообразием выборок и вычислительными расходами. Эксперименты демонстрируют, что хорошо спроектированный replay buffer значительно снижает вычислительные затраты при сохранении или даже улучшении качества модели.'}, 'en': {'title': 'Revolutionizing LLM Training with Experience Replay', 'desc': 'This paper explores the use of Experience Replay techniques in the post-training phase of large language models (LLMs). It challenges the common belief that only fresh, on-policy data leads to optimal performance, suggesting that reusing past experiences can be beneficial. The authors present a systematic approach to designing replay buffers, balancing the trade-offs between staleness variance, sample diversity, and computational costs. Their findings indicate that a well-structured replay buffer can lower inference costs while maintaining or even enhancing model performance and policy entropy.'}, 'zh': {'title': '经验重放：提升大型语言模型训练效率的关键', 'desc': '本文探讨了在大型语言模型（LLM）后期训练中使用经验重放技术的有效性。经验重放是一种存储训练过程中的数据并多次重用的技术，通常用于强化学习，但在LLM中尚未得到充分应用。我们提出了一种系统性的方法来设计重放缓冲区，平衡数据的新鲜度、样本多样性和计算成本。研究表明，严格的在线采样在生成成本高时并非最佳选择，合理设计的重放缓冲区可以在不降低模型性能的情况下显著减少推理计算。'}}}, {'id': 'https://huggingface.co/papers/2604.09557', 'title': 'SPEED-Bench: A Unified and Diverse Benchmark for Speculative Decoding', 'url': 'https://huggingface.co/papers/2604.09557', 'abstract': 'Abstract Speculative Decoding evaluation requires diverse workloads to accurately measure performance, which existing benchmarks lack, prompting the introduction of SPEED-Bench for standardized assessment across semantic domains and serving regimes.  AI-generated summary Speculative Decoding (SD) has emerged as a critical technique for accelerating Large Language Model (LLM) inference. Unlike deterministic system optimizations, SD performance is inherently data-dependent, meaning that diverse and representative workloads are essential for accurately measuring its effectiveness. Existing benchmarks suffer from limited task diversity, inadequate support for throughput-oriented evaluation, and a reliance on high-level implementations that fail to reflect production environments. To address this, we introduce SPEED-Bench, a comprehensive suite designed to standardize SD evaluation across diverse semantic domains and realistic serving regimes. SPEED-Bench offers a carefully curated Qualitative data split, selected by prioritizing semantic diversity across the data samples. Additionally, it includes a Throughput data split, allowing speedup evaluation across a range of concurrencies, from latency-sensitive low-batch settings to throughput-oriented high-load scenarios. By integrating with production engines like vLLM and TensorRT-LLM, SPEED-Bench allows practitioners to analyze system behaviors often masked by other benchmarks. We highlight this by quantifying how synthetic inputs overestimate real-world throughput, identifying batch-size dependent optimal draft lengths and biases in low-diversity data, and analyzing the caveats of vocabulary pruning in state-of-the-art drafters. We release SPEED-Bench to establish a unified evaluation standard for practical comparisons of SD algorithms.', 'score': 8, 'issue_id': 1908, 'pub_date': '2026-02-10', 'pub_date_card': {'ru': '10 февраля', 'en': 'February 10', 'zh': '2月10日'}, 'hash': '7ce2f23cbfcc9972', 'authors': ['Talor Abramovich', 'Maor Ashkenazi', 'Carl', 'Putterman', 'Benjamin Chislett', 'Tiyasa Mitra', 'Bita Darvish Rouhani', 'Ran Zilberstein', 'Yonatan Geifman'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.09557.jpg', 'data': {'categories': ['#benchmark', '#inference', '#dataset'], 'emoji': '⚡', 'ru': {'title': 'Стандартизированная оценка спекулятивного декодирования для реальных сценариев использования', 'desc': 'В статье представлен SPEED-Bench — комплексный бенчмарк для оценки методов спекулятивного декодирования, которое ускоряет вывод больших языковых моделей. Авторы показывают, что производительность спекулятивного декодирования сильно зависит от характеристик данных и типа рабочей нагрузки, поэтому существующие бенчмарки недостаточны для объективной оценки. SPEED-Bench включает разнообразные задачи из разных предметных областей и поддерживает оценку как в режиме низкой задержки, так и в режиме высокой пропускной способности с различными уровнями параллелизма. Интеграция с промышленными фреймворками позволяет выявить скрытые особенности алгоритмов и предоставляет стандартизированный инструмент для сравнения различных подходов к спекулятивному декодированию.'}, 'en': {'title': 'SPEED-Bench: Standardizing Speculative Decoding Evaluation', 'desc': 'This paper introduces SPEED-Bench, a new benchmark designed to evaluate Speculative Decoding (SD) in Large Language Models (LLMs). It addresses the limitations of existing benchmarks that lack diversity and do not accurately reflect real-world performance. SPEED-Bench includes a Qualitative data split for semantic diversity and a Throughput data split for evaluating performance under different loads. By integrating with production engines, it provides a more realistic assessment of SD algorithms, helping practitioners understand system behaviors better.'}, 'zh': {'title': '推测解码评估的新标准', 'desc': '本文介绍了一种新的评估工具SPEED-Bench，用于标准化评估推测解码（Speculative Decoding, SD）在大型语言模型（LLM）推理中的性能。现有的基准测试缺乏多样性，无法准确反映SD的效果，而SPEED-Bench通过提供多种语义领域和真实服务场景的评估，解决了这一问题。它包括经过精心挑选的定性数据和吞吐量数据，支持从低延迟到高负载的多种评估场景。通过与生产引擎的集成，SPEED-Bench帮助研究人员更好地理解系统行为，推动SD算法的实际比较。'}}}, {'id': 'https://huggingface.co/papers/2604.11778', 'title': 'General365: Benchmarking General Reasoning in Large Language Models Across Diverse and Challenging Tasks', 'url': 'https://huggingface.co/papers/2604.11778', 'abstract': 'Abstract Large language models demonstrate limited general reasoning capabilities despite strong domain-specific performance, as revealed by a new benchmark assessing K-12 level reasoning across diverse problem types.  AI-generated summary Contemporary large language models (LLMs) have demonstrated remarkable reasoning capabilities, particularly in specialized domains like mathematics and physics. However, their ability to generalize these reasoning skills to more general and broader contexts--often termed general reasoning--remains under-explored. Unlike domain-specific reasoning, general reasoning relies less on expert knowledge but still presents formidable reasoning challenges, such as complex constraints, nested logical branches, and semantic interference. To address this gap, we introduce General365, a benchmark specifically designed to assess general reasoning in LLMs. By restricting background knowledge to a K-12 level, General365 explicitly decouples reasoning from specialized expertise. The benchmark comprises 365 seed problems and 1,095 variant problems across eight categories, ensuring both high difficulty and diversity. Evaluations across 26 leading LLMs reveal that even the top-performing model achieves only 62.8% accuracy, in stark contrast to the near-perfect performances of LLMs in math and physics benchmarks. These results suggest that the reasoning abilities of current LLMs are heavily domain-dependent, leaving significant room for improvement in broader applications. We envision General365 as a catalyst for advancing LLM reasoning beyond domain-specific tasks toward robust, general-purpose real-world scenarios. Code, Dataset, and Leaderboard: https://general365.github.io', 'score': 6, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '569bcf55bffd5a5f', 'authors': ['Junlin Liu', 'Shengnan An', 'Shuang Zhou', 'Dan Ma', 'Shixiong Luo', 'Ying Xie', 'Yuan Zhang', 'Wenling Yuan', 'Yifan Zhou', 'Xiaoyu Li', 'Ziwen Wang', 'Xuezhi Cao', 'Xunliang Cai'], 'affiliations': ['Meituan', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.11778.jpg', 'data': {'categories': ['#dataset', '#survey', '#benchmark', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Общее рассуждение LLM: за пределами специализации', 'desc': 'Авторы представляют новый бенчмарк General365 для оценки способности больших языковых моделей к общему рассуждению на уровне школьной программы. Исследование показывает, что несмотря на впечатляющие результаты в узкоспециализированных задачах (математика, физика), современные LLM достигают только 62,8% точности при решении разнообразных логических задач с ограниченным контекстом знаний. Бенчмарк включает 365 исходных задач и 1095 вариантов в восьми категориях, специально разработанных для отделения навыков логического мышления от специализированной экспертизы. Результаты указывают на сильную зависимость способности к рассуждению от предметной области и выявляют необходимость развития более общих и универсальных возможностей рассуждения в LLM.'}, 'en': {'title': 'Bridging the Gap: Enhancing General Reasoning in LLMs', 'desc': "This paper introduces General365, a benchmark designed to evaluate the general reasoning capabilities of large language models (LLMs) at a K-12 level. While LLMs excel in domain-specific tasks like mathematics and physics, their performance in general reasoning tasks is significantly lower, with top models achieving only 62.8% accuracy. General365 consists of 365 seed problems and 1,095 variants across eight categories, focusing on complex reasoning challenges without relying on specialized knowledge. The findings highlight the need for improvement in LLMs' ability to generalize reasoning skills to broader contexts beyond their trained domains."}, 'zh': {'title': '提升通用推理能力的挑战与机遇', 'desc': '大型语言模型在特定领域表现出色，但在一般推理能力上仍然有限。本文提出了一个新的基准测试——General365，旨在评估K-12水平的通用推理能力。该基准包含365个种子问题和1095个变体问题，涵盖八个类别，确保了高难度和多样性。评估结果显示，即使是表现最好的模型，其准确率也仅为62.8%，这表明当前模型的推理能力在很大程度上依赖于特定领域的知识。'}}}, {'id': 'https://huggingface.co/papers/2604.02340', 'title': 'Not All Denoising Steps Are Equal: Model Scheduling for Faster Masked Diffusion Language Models', 'url': 'https://huggingface.co/papers/2604.02340', 'abstract': 'Abstract Masked diffusion language models can be accelerated through strategic replacement of full models with smaller ones during specific denoising steps, achieving reduced computational costs with minimal impact on generation quality.  AI-generated summary Recent advances in masked diffusion language models (MDLMs) narrow the quality gap to autoregressive LMs, but their sampling remains expensive because generation requires many full-sequence denoising passes with a large Transformer and, unlike autoregressive decoding, cannot benefit from KV caching. In this work, we exploit the flexibility of the diffusion framework and study model scheduling, where a smaller MDLM replaces the full model at a subset of denoising steps. Across models trained on OpenWebText and LM1B, we show that early and late denoising steps are substantially more robust to such replacement than middle steps, enabling up to a 17% reduction in FLOPs with only modest degradation in generative perplexity under both unconditional and prefix-conditional generation, while preserving sample diversity. We support these findings with a step-importance analysis based on loss and KL divergence between small and large models across timesteps, as well as an exhaustive search over coarse step segments, both of which identify the middle of the diffusion trajectory as most sensitive consistently across datasets. Our results suggest that simple, architecture-agnostic scheduling rules can significantly accelerate MDLM sampling while largely preserving generation quality.', 'score': 6, 'issue_id': 1908, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': '9729babaa76827b1', 'authors': ['Ivan Sedykh', 'Nikita Sorokin', 'Valentin Malykh'], 'affiliations': ['ITMO University', 'MWS AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.02340.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#diffusion', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Динамическое расписание малых моделей для ускорения диффузионного декодирования', 'desc': 'В работе предложен метод ускорения вычислений для маскированных диффузионных языковых моделей путём замены полной модели на компактную версию на определённых этапах процесса денойзинга. Авторы обнаружили, что ранние и поздние стадии диффузии более устойчивы к использованию малых моделей, чем промежуточные шаги, где требуется полная сложность. Экспериментально показано, что такой подход снижает вычислительные затраты на 17% при минимальном падении качества генерации текста. Исследование использует анализ важности шагов на основе функции потерь и дивергенции Кульбака-Лейблера для выявления чувствительных участков траектории денойзинга.'}, 'en': {'title': 'Accelerating MDLMs with Smart Model Scheduling', 'desc': 'This paper discusses a method to speed up masked diffusion language models (MDLMs) by using smaller models during certain denoising steps. The authors found that replacing the full model with a smaller one in early and late steps does not significantly affect the quality of the generated text. This approach can reduce computational costs by up to 17% while maintaining diversity in the generated samples. The study also includes an analysis of the importance of different steps in the diffusion process, highlighting that middle steps are more sensitive to model size changes.'}, 'zh': {'title': '加速掩蔽扩散语言模型的简单调度策略', 'desc': '本研究探讨了如何通过在特定去噪步骤中用较小的模型替代完整的掩蔽扩散语言模型（MDLM），以加速模型的生成过程。我们发现，在去噪的早期和晚期步骤中，使用小模型替代大模型的效果更为稳健，能够减少高达17%的计算量，同时对生成质量的影响较小。通过对损失和KL散度的分析，我们确认了去噪过程中的中间步骤对模型替换最为敏感。我们的结果表明，简单的调度规则可以显著加快MDLM的采样速度，同时保持生成质量。'}}}, {'id': 'https://huggingface.co/papers/2604.10333', 'title': 'Zero-shot World Models Are Developmentally Efficient Learners', 'url': 'https://huggingface.co/papers/2604.10333', 'abstract': "Abstract A computational model called Zero-shot Visual World Model demonstrates how children can efficiently learn physical world understanding from limited first-person experiences, generating competent behavior across multiple benchmarks while mimicking developmental patterns and brain-like representations.  AI-generated summary Young children demonstrate early abilities to understand their physical world, estimating depth, motion, object coherence, interactions, and many other aspects of physical scene understanding. Children are both data-efficient and flexible cognitive systems, creating competence despite extremely limited training data, while generalizing to myriad untrained tasks -- a major challenge even for today's best AI systems. Here we introduce a novel computational hypothesis for these abilities, the Zero-shot Visual World Model (ZWM). ZWM is based on three principles: a sparse temporally-factored predictor that decouples appearance from dynamics; zero-shot estimation through approximate causal inference; and composition of inferences to build more complex abilities. We show that ZWM can be learned from the first-person experience of a single child, rapidly generating competence across multiple physical understanding benchmarks. It also broadly recapitulates behavioral signatures of child development and builds brain-like internal representations. Our work presents a blueprint for efficient and flexible learning from human-scale data, advancing both a computational account for children's early physical understanding and a path toward data-efficient AI systems.", 'score': 6, 'issue_id': 1907, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': 'c827b9689807cd53', 'authors': ['Khai Loong Aw', 'Klemen Kotar', 'Wanhee Lee', 'Seungwoo Kim', 'Khaled Jedoui', 'Rahul Venkatesh', 'Lilian Naing Chen', 'Michael C. Frank', 'Daniel L. K. Yamins'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2604.10333.jpg', 'data': {'categories': ['#benchmark', '#cv', '#architecture'], 'emoji': '👶', 'ru': {'title': 'Как научить модель учиться как ребёнок: эффективное усвоение физики мира из минимального опыта', 'desc': 'В работе предложена вычислительная модель Zero-shot Visual World Model, которая объясняет, как дети эффективно развивают понимание физического мира на основе ограниченного личного опыта. Модель строится на трёх принципах: разреженный предсказатель, разделяющий внешний вид и динамику; нулевоёмкостное оценивание через приблизительный причинный вывод; и композиция выводов для сложных способностей. Система демонстрирует компетентность в физическом понимании, воспроизводит детские поведенческие особенности и создаёт представления, подобные мозговым. Работа предлагает подход к эффективному обучению на человеческих объёмах данных, продвигая как понимание детского развития, так и создание экономных по данным AI систем.'}, 'en': {'title': 'Learning Like a Child: The Zero-shot Visual World Model', 'desc': 'The Zero-shot Visual World Model (ZWM) is a computational framework that explains how children learn to understand their physical environment with minimal experience. It operates on three key principles: separating visual appearance from motion dynamics, using causal inference for zero-shot learning, and combining simple inferences to develop complex skills. This model demonstrates that children can achieve high competence in physical scene understanding despite limited training data, a feat that current AI struggles to replicate. By mimicking developmental patterns and creating brain-like representations, ZWM offers insights into efficient learning processes that could enhance AI systems.'}, 'zh': {'title': '儿童学习物理世界的高效模型', 'desc': '这篇论文介绍了一种名为零-shot视觉世界模型（ZWM）的计算模型，展示了儿童如何从有限的第一人称经验中高效学习物理世界的理解。ZWM基于三个原则：稀疏的时间因子预测器、零-shot估计和推理的组合，能够在多个基准测试中生成能力。该模型能够从单个儿童的经验中学习，快速生成对物理理解的能力，并模仿儿童发展的行为特征。我们的研究为高效灵活的学习提供了蓝图，推动了对儿童早期物理理解的计算解释，并为数据高效的人工智能系统指明了方向。'}}}, {'id': 'https://huggingface.co/papers/2604.11521', 'title': 'Continuous Adversarial Flow Models', 'url': 'https://huggingface.co/papers/2604.11521', 'abstract': 'Abstract Continuous adversarial flow models improve image generation by using an adversarial objective with a learned discriminator to better align samples with target distributions, achieving superior results on ImageNet and text-to-image tasks.  AI-generated summary We propose continuous adversarial flow models, a type of continuous-time flow model trained with an adversarial objective. Unlike flow matching, which uses a fixed mean-squared-error criterion, our approach introduces a learned discriminator to guide training. This change in objective induces a different generalized distribution, which empirically produces samples that are better aligned with the target data distribution. Our method is primarily proposed for post-training existing flow-matching models, although it can also train models from scratch. On the ImageNet 256px generation task, our post-training substantially improves the guidance-free FID of latent-space SiT from 8.26 to 3.63 and of pixel-space JiT from 7.17 to 3.57. It also improves guided generation, reducing FID from 2.06 to 1.53 for SiT and from 1.86 to 1.80 for JiT. We further evaluate our approach on text-to-image generation, where it achieves improved results on both the GenEval and DPG benchmarks.', 'score': 5, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'a8d9133cbde367e6', 'authors': ['Shanchuan Lin', 'Ceyuan Yang', 'Zhijie Lin', 'Hao Chen', 'Haoqi Fan'], 'affiliations': ['Bytedance'], 'pdf_title_img': 'assets/pdf/title_img/2604.11521.jpg', 'data': {'categories': ['#training', '#benchmark', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Противоположные потоки для совершенной генерации изображений', 'desc': 'В статье предлагается метод непрерывных противоположных потоков (continuous adversarial flow models) — модель потоков в непрерывном времени, обученная с использованием антагонистической целевой функции. В отличие от классического flow matching, который использует фиксированный критерий среднеквадратичной ошибки, новый подход вводит обучаемый дискриминатор для управления процессом обучения. Измененная целевая функция индуцирует иное распределение, что эмпирически дает образцы, лучше согласованные с целевым распределением данных. Метод демонстрирует значительные улучшения в генерации изображений на ImageNet и в синтезе изображений по текстовым описаниям.'}, 'en': {'title': 'Enhancing Image Generation with Continuous Adversarial Flow Models', 'desc': 'This paper introduces continuous adversarial flow models, which enhance image generation by integrating an adversarial training objective with a learned discriminator. This method differs from traditional flow matching by not relying solely on mean-squared-error, allowing for better alignment of generated samples with the target data distribution. The proposed approach shows significant improvements in performance metrics, such as the Fréchet Inception Distance (FID), on tasks like ImageNet generation and text-to-image synthesis. Additionally, it can be applied to existing flow-matching models for post-training or used to train new models from scratch.'}, 'zh': {'title': '提升图像生成的对抗流模型', 'desc': '本文提出了一种连续对抗流模型，通过引入学习到的判别器来优化图像生成。与传统的流匹配方法不同，我们的方法使用对抗目标来指导训练，从而更好地对齐样本与目标分布。实验结果表明，该方法在ImageNet和文本到图像生成任务中表现优越，显著降低了FID指标。我们的模型可以在现有流匹配模型的基础上进行后训练，也可以从头开始训练。'}}}, {'id': 'https://huggingface.co/papers/2604.10688', 'title': 'SCOPE: Signal-Calibrated On-Policy Distillation Enhancement with Dual-Path Adaptive Weighting', 'url': 'https://huggingface.co/papers/2604.10688', 'abstract': 'Abstract SCOPE enhances on-policy distillation by adapting supervision paths based on trajectory correctness, using teacher-perplexity-weighted KL distillation for incorrect trajectories and student-perplexity-weighted MLE for correct ones, achieving superior reasoning performance.  AI-generated summary On-policy reinforcement learning has become the dominant paradigm for reasoning alignment in large language models, yet its sparse, outcome-level rewards make token-level credit assignment notoriously difficult. On-Policy Distillation (OPD) alleviates this by introducing dense, token-level KL supervision from a teacher model, but typically applies this supervision uniformly across all rollouts, ignoring fundamental differences in signal quality. We propose Signal-Calibrated On-Policy Distillation Enhancement (SCOPE), a dual-path adaptive training framework that routes on-policy rollouts by correctness into two complementary supervision paths. For incorrect trajectories, SCOPE performs teacher-perplexity-weighted KL distillation to prioritize instances where the teacher demonstrates genuine corrective capability, while down-weighting unreliable guidance. For correct trajectories, it applies student-perplexity-weighted MLE to concentrate reinforcement on low-confidence samples at the capability boundary rather than over-reinforcing already mastered ones. Both paths employ a group-level normalization to adaptively calibrate weight distributions, accounting for the intrinsic difficulty variance across prompts. Extensive experiments on six reasoning benchmarks show that SCOPE achieves an average relative improvement of 11.42% in Avg@32 and 7.30% in Pass@32 over competitive baselines, demonstrating its consistent effectiveness.', 'score': 5, 'issue_id': 1910, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '17cb8beb8be7b21e', 'authors': ['Binbin Zheng', 'Xing Ma', 'Yiheng Liang', 'Jingqing Ruan', 'Xiaoliang Fu', 'Kepeng Lin', 'Benchang Zhu', 'Ke Zeng', 'Xunliang Cai'], 'affiliations': ['Fudan University', 'Huazhong University of Science and Technology', 'Meituan', 'Nanjing University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.10688.jpg', 'data': {'categories': ['#rl', '#optimization', '#rlhf', '#training', '#reasoning', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Адаптивная дистилляция моделей через калибровку сигнала', 'desc': 'SCOPE улучшает дистилляцию моделей в on-policy обучении с подкреплением, адаптивно выбирая пути обучения на основе корректности траекторий. Для неправильных траекторий используется KL-дивергенция с весами на основе перплексии учителя, чтобы выделить случаи, где учитель действительно может исправить ошибки. Для правильных траекторий применяется максимум правдоподобия со взвешиванием по перплексии студента, концентрируясь на низконадежных примерах на границе способностей модели. Фреймворк показывает значительные улучшения на бенчмарках логического рассуждения, увеличивая производительность на 11.42% в среднем.'}, 'en': {'title': 'Enhancing Learning with Adaptive Supervision Paths', 'desc': 'SCOPE is a novel approach to on-policy distillation in reinforcement learning that improves the training of language models by adapting supervision based on the correctness of trajectories. It uses two distinct paths for supervision: one for incorrect trajectories that employs teacher-perplexity-weighted KL distillation, and another for correct trajectories that utilizes student-perplexity-weighted maximum likelihood estimation (MLE). This dual-path framework allows the model to focus on learning from high-quality signals while avoiding misleading guidance from less reliable sources. The results show that SCOPE significantly enhances reasoning performance across various benchmarks, demonstrating its effectiveness in improving model training.'}, 'zh': {'title': '基于正确性的自适应蒸馏提升推理性能', 'desc': 'SCOPE是一种增强的在线策略蒸馏方法，通过根据轨迹的正确性调整监督路径来提高推理性能。对于错误的轨迹，SCOPE使用教师困惑度加权的KL蒸馏，优先考虑教师能够有效纠正的实例。对于正确的轨迹，它采用学生困惑度加权的最大似然估计，集中强化低置信度样本的学习。实验结果表明，SCOPE在六个推理基准上相较于竞争基线平均提高了11.42%的Avg@32和7.30%的Pass@32，显示出其一致的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.10784', 'title': 'TorchUMM: A Unified Multimodal Model Codebase for Evaluation, Analysis, and Post-training', 'url': 'https://huggingface.co/papers/2604.10784', 'abstract': 'Abstract TorchUMM presents a unified codebase for evaluating and analyzing multimodal models across understanding, generation, and editing tasks with standardized protocols and diverse datasets.  AI-generated summary Recent advances in unified multimodal models (UMMs) have led to a proliferation of architectures capable of understanding, generating, and editing across visual and textual modalities. However, developing a unified framework for UMMs remains challenging due to the diversity of model architectures and the heterogeneity of training paradigms and implementation details. In this paper, we present TorchUMM, the first unified codebase for comprehensive evaluation, analysis, and post-training across diverse UMM backbones, tasks, and datasets. TorchUMM supports a broad spectrum of models covering a wide range of scales and design paradigms. Our benchmark encompasses three core task dimensions: multimodal understanding, generation, and editing, and integrates both established and novel datasets to evaluate perception, reasoning, compositionality, and instruction-following abilities. By providing a unified interface and standardized evaluation protocols, TorchUMM enables fair and reproducible comparisons across heterogeneous models and fosters deeper insights into their strengths and limitations, facilitating the development of more capable unified multimodal systems. Code is available at: https://github.com/AIFrontierLab/TorchUMM.', 'score': 5, 'issue_id': 1906, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': 'bd3ab2fe19fcbf81', 'authors': ['Yinyi Luo', 'Wenwen Wang', 'Hayes Bai', 'Hongyu Zhu', 'Hao Chen', 'Pan He', 'Marios Savvides', 'Sharon Li', 'Jindong Wang'], 'affiliations': ['Auburn University', 'Carnegie Mellon University', 'University of Wisconsin-Madison', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2604.10784.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '🔧', 'ru': {'title': 'Единая платформа для оценки мультимодальных моделей', 'desc': 'TorchUMM представляет собой единую кодовую базу для оценки и анализа унифицированных мультимодальных моделей, способных понимать, генерировать и редактировать текстово-визуальный контент. Платформа поддерживает разнообразные архитектуры моделей разного масштаба и применяет стандартизированные протоколы оценки для обеспечения справедливого сравнения. Бенчмарк включает три основные категории задач: мультимодальное понимание, генерацию и редактирование, используя как установленные, так и новые датасеты. Фреймворк позволяет проводить глубокий анализ сильных и слабых сторон моделей, а также облегчает последующее обучение и разработку более способных мультимодальных систем.'}, 'en': {'title': 'Unifying Multimodal Model Evaluation with TorchUMM', 'desc': 'TorchUMM is a comprehensive codebase designed for evaluating and analyzing unified multimodal models (UMMs) that can understand, generate, and edit content across visual and textual formats. It addresses the challenges posed by the variety of model architectures and training methods in the field. The framework includes standardized protocols and a diverse set of datasets to benchmark models on tasks like perception, reasoning, and instruction-following. By offering a unified interface, TorchUMM promotes fair comparisons and deeper insights into the capabilities and limitations of different multimodal systems.'}, 'zh': {'title': '统一多模态模型评估的利器', 'desc': 'TorchUMM是一个统一的代码库，用于评估和分析多模态模型在理解、生成和编辑任务中的表现。该框架解决了多模态模型架构多样性和训练方法异质性带来的挑战。TorchUMM支持多种模型，涵盖不同规模和设计范式，提供标准化的评估协议。通过统一接口，TorchUMM促进了不同模型之间的公平比较，帮助研究人员深入理解模型的优缺点。'}}}, {'id': 'https://huggingface.co/papers/2604.11547', 'title': 'Eliciting Medical Reasoning with Knowledge-enhanced Data Synthesis: A Semi-Supervised Reinforcement Learning Approach', 'url': 'https://huggingface.co/papers/2604.11547', 'abstract': 'Abstract MedSSR enhances medical reasoning in large language models through knowledge-enhanced data synthesis and semi-supervised reinforcement learning, improving performance on rare disease tasks while reducing reliance on expensive reasoning trace distillation.  AI-generated summary While large language models hold promise for complex medical applications, their development is hindered by the scarcity of high-quality reasoning data. To address this issue, existing approaches typically distill chain-of-thought reasoning traces from large proprietary models via supervised fine-tuning, then conduct reinforcement learning (RL). These methods exhibit limited improvement on underrepresented domains like rare diseases while incurring substantial costs from generating complex reasoning chains. To efficiently enhance medical reasoning, we propose MedSSR, a Medical Knowledge-enhanced data Synthesis and Semi-supervised Reinforcement learning framework. Our framework first employs rare disease knowledge to synthesize distribution-controllable reasoning questions. We then utilize the policy model itself to generate high-quality pseudo-labels. This enables a two-stage, intrinsic-to-extrinsic training paradigm: self-supervised RL on the pseudo-labeled synthetic data, followed by supervised RL on the human-annotated real data. MedSSR scales model training efficiently without relying on costly trace distillation. Extensive experiments on Qwen and Llama demonstrate that our method outperforms existing methods across ten medical benchmarks, achieving up to +5.93% gain on rare-disease tasks. Our code is available at https://github.com/tdlhl/MedSSR.', 'score': 4, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'a6403f10cbce2a0f', 'authors': ['Haolin Li', 'Shuyang Jiang', 'Ruipeng Zhang', 'Jiangchao Yao', 'Ya Zhang', 'Yanfeng Wang'], 'affiliations': ['CMIC, Shanghai Jiao Tong University', 'College of Computer Science and Artificial Intelligence, Fudan University', 'Department of Radiology, Shanghai Sixth Peoples Hospital Affiliated to Shanghai Jiao Tong University School of Medicine', 'Institute of Artificial Intelligence for Medicine, Shanghai Jiao Tong University School of Medicine', 'School of Artificial Intelligence, Shanghai Jiao Tong University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2604.11547.jpg', 'data': {'categories': ['#data', '#open_source', '#rl', '#training', '#dataset', '#synthetic', '#healthcare', '#reasoning', '#science'], 'emoji': '🏥', 'ru': {'title': 'Синтез знаний вместо дистилляции: эффективное обучение медицинским рассуждениям', 'desc': 'MedSSR — это фреймворк для улучшения медицинского рассуждения в больших языковых моделях через синтез данных на основе медицинских знаний и полусубъективное обучение с подкреплением. Метод решает проблему дефицита высококачественных данных для обучения, синтезируя вопросы о редких заболеваниях и используя саму модель для генерации псевдо-меток. Предложенный двухэтапный подход включает самосубъективное обучение с подкреплением на синтетических данных, а затем контролируемое обучение на реальных аннотированных данных. MedSSR достигает значительного улучшения производительности на медицинских тестах (до +5,93% на задачах редких заболеваний) без дорогостоящей дистилляции знаний от крупных моделей.'}, 'en': {'title': 'Enhancing Medical Reasoning with MedSSR', 'desc': 'MedSSR is a framework designed to improve medical reasoning in large language models by using knowledge-enhanced data synthesis and semi-supervised reinforcement learning. It addresses the challenge of limited high-quality reasoning data, particularly for rare diseases, by generating synthetic reasoning questions based on medical knowledge. The framework employs a two-stage training process that first uses self-supervised reinforcement learning on synthetic data, followed by supervised reinforcement learning on real, human-annotated data. This approach reduces the need for expensive reasoning trace distillation while significantly enhancing performance on rare disease tasks.'}, 'zh': {'title': 'MedSSR：提升医疗推理的新方法', 'desc': 'MedSSR是一种增强医疗推理的框架，结合了知识增强的数据合成和半监督强化学习。它通过合成可控的推理问题，利用稀有疾病的知识来提高模型在稀有疾病任务上的表现。与传统方法相比，MedSSR减少了对昂贵推理链蒸馏的依赖，提升了训练效率。实验结果表明，MedSSR在十个医疗基准测试中表现优于现有方法，尤其在稀有疾病任务上提高了5.93%的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.10799', 'title': 'Advancing Polish Language Modeling through Tokenizer Optimization in the Bielik v3 7B and 11B Series', 'url': 'https://huggingface.co/papers/2604.10799', 'abstract': 'Abstract The Bielik v3 PL series achieves improved language-specific performance through specialized Polish tokenization, FOCUS-based embeddings, and multi-stage training with supervised fine-tuning, direct preference optimization, and reinforcement learning.  AI-generated summary The development of the Bielik v3 PL series, encompassing both the 7B and 11B parameter variants, represents a significant milestone in the field of language-specific large language model (LLM) optimization. While general-purpose models often demonstrate impressive multilingual capabilities, they frequently suffer from a fundamental architectural inefficiency: the use of universal tokenizers. These tokenizers, typically designed to cover a broad spectrum of languages, often fail to capture the morphological nuances of specific languages like Polish, leading to higher fertility ratios, increased inference costs, and restricted effective context windows. This report details the transition from the universal Mistral-based tokenization to a dedicated Polish-optimized vocabulary for the Bielik v3 models, exploring the FOCUS-based embedding initialization, the multi-stage pretraining curriculum, and the subsequent post-training alignment involving Supervised Fine-Tuning, Direct Preference Optimization, and Reinforcement Learning through Group Relative Policy Optimization with verifiable rewards.', 'score': 4, 'issue_id': 1908, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '18c4c629bfd16d01', 'authors': ['Krzysztof Ociepa', 'Łukasz Flis', 'Remigiusz Kinas', 'Krzysztof Wróbel', 'Adrian Gwoździej'], 'affiliations': ['ACK Cyfronet AGH', 'Azurro', 'Enelpol', 'Jagiellonian University', 'SpeakLeash'], 'pdf_title_img': 'assets/pdf/title_img/2604.10799.jpg', 'data': {'categories': ['#training', '#multilingual', '#open_source', '#rl', '#low_resource', '#rlhf', '#inference', '#alignment'], 'emoji': '🇵🇱', 'ru': {'title': 'Специализированная языковая модель для польского: от универсального к оптимизированному', 'desc': 'Bielik v3 PL — это серия специализированных языковых моделей для польского языка, которые заменили универсальный токенизатор на оптимизированный для польской морфологии, что снизило затраты на инференс и улучшило контекстное окно. Модели использовали инициализацию эмбеддингов на основе FOCUS и многоэтапный процесс обучения, включающий supervised fine-tuning, direct preference optimization и reinforcement learning. Этот подход устранил архитектурную неэффективность общих многоязычных моделей, которые плохо захватывают специфические морфологические особенности польского языка. В результате получены варианты моделей с 7B и 11B параметров, которые превосходят универсальные модели по производительности на задачах на польском языке.'}, 'en': {'title': 'Optimizing Polish Language Models with Bielik v3', 'desc': "The Bielik v3 PL series enhances performance for the Polish language by implementing a specialized tokenization method that captures its unique morphological features. This model utilizes FOCUS-based embeddings to improve the representation of Polish text, addressing inefficiencies found in general-purpose models. The training process involves a multi-stage approach that includes supervised fine-tuning and reinforcement learning techniques to optimize the model's responses. Overall, this work demonstrates how targeted adaptations in language models can lead to significant improvements in language-specific tasks."}, 'zh': {'title': '专为波兰语优化的大型语言模型', 'desc': 'Bielik v3 PL系列通过专门的波兰语分词、FOCUS基础的嵌入和多阶段训练，显著提高了语言特定的性能。该系列包括7B和11B参数变体，标志着语言特定大型语言模型优化的重要里程碑。与通用模型相比，Bielik v3采用了专门优化的波兰语词汇，解决了通用分词器在处理波兰语时的不足。通过监督微调、直接偏好优化和强化学习等方法，进一步提升了模型的效果和效率。'}}}, {'id': 'https://huggingface.co/papers/2604.11666', 'title': 'Playing Along: Learning a Double-Agent Defender for Belief Steering via Theory of Mind', 'url': 'https://huggingface.co/papers/2604.11666', 'abstract': "Abstract Large language models face challenges in theory-of-mind reasoning for adversarial interactions, but reinforcement learning-trained AI double agents demonstrate improved belief manipulation and theory-of-mind capabilities through bidirectional reward optimization.  AI-generated summary As large language models (LLMs) become the engine behind conversational systems, their ability to reason about the intentions and states of their dialogue partners (i.e., form and use a theory-of-mind, or ToM) becomes increasingly critical for safe interaction with potentially adversarial partners. We propose a novel privacy-themed ToM challenge, ToM for Steering Beliefs (ToM-SB), in which a defender must act as a Double Agent to steer the beliefs of an attacker with partial prior knowledge within a shared universe. To succeed on ToM-SB, the defender must engage with and form a ToM of the attacker, with a goal of fooling the attacker into believing they have succeeded in extracting sensitive information. We find that strong frontier models like Gemini3-Pro and GPT-5.4 struggle on ToM-SB, often failing to fool attackers in hard scenarios with partial attacker prior knowledge, even when prompted to reason about the attacker's beliefs (ToM prompting). To close this gap, we train models on ToM-SB to act as AI Double Agents using reinforcement learning, testing both fooling and ToM rewards. Notably, we find a bidirectionally emergent relationship between ToM and attacker-fooling: rewarding fooling success alone improves ToM, and rewarding ToM alone improves fooling. Across four attackers with different strengths, six defender methods, and both in-distribution and out-of-distribution (OOD) evaluation, we find that gains in ToM and attacker-fooling are well-correlated, highlighting belief modeling as a key driver of success on ToM-SB. AI Double Agents that combine both ToM and fooling rewards yield the strongest fooling and ToM performance, outperforming Gemini3-Pro and GPT-5.4 with ToM prompting on hard scenarios. We also show that ToM-SB and AI Double Agents can be extended to stronger attackers, demonstrating generalization to OOD settings and the upgradability of our task.", 'score': 3, 'issue_id': 1908, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '33632a04bc31c319', 'authors': ['Hanqi Xiao', 'Vaidehi Patil', 'Zaid Khan', 'Hyunji Lee', 'Elias Stengel-Eskin', 'Mohit Bansal'], 'affiliations': ['UNC Chapel Hill', 'University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2604.11666.jpg', 'data': {'categories': ['#rl', '#benchmark', '#agents', '#reasoning', '#security', '#alignment'], 'emoji': '🕵️', 'ru': {'title': 'Двойные агенты: когда манипуляция убеждениями улучшает теорию психического состояния', 'desc': 'Исследование посвящено проблеме теории психического состояния (ToM) в больших языковых моделях при взаимодействии с враждебными агентами. Авторы предлагают новую задачу ToM-SB, где защитник должен действовать как двойной агент, манипулируя убеждениями атакующего. Стандартные модели, такие как Gemini и GPT, плохо справляются с этой задачей даже при подсказках о рассуждении о намерениях противника. Применение обучения с подкреплением с двусторонней оптимизацией наград показало, что улучшение способности к манипуляции убеждениями и развитие ToM взаимно усиливают друг друга, создавая более эффективных двойных агентов.'}, 'en': {'title': "Enhancing AI's Mind Reading: Double Agents in Adversarial Scenarios", 'desc': 'This paper addresses the limitations of large language models (LLMs) in understanding and manipulating the beliefs of adversarial agents, a skill known as theory-of-mind (ToM). It introduces a new challenge called ToM for Steering Beliefs (ToM-SB), where a defender must deceive an attacker into thinking they have successfully extracted sensitive information. The authors demonstrate that training AI models as Double Agents using reinforcement learning can enhance both their ToM capabilities and their ability to fool attackers. The findings reveal a strong correlation between ToM and the success of deception, suggesting that effective belief modeling is crucial for improving performance in adversarial interactions.'}, 'zh': {'title': 'AI双重代理：提升理论心智与欺骗能力的关键', 'desc': '大型语言模型在处理对抗性互动时面临理论心智推理的挑战，但通过强化学习训练的AI双重代理在信念操控和理论心智能力方面表现出色。我们提出了一种新的隐私主题的理论心智挑战，称为信念引导的理论心智（ToM-SB），其中防御者必须作为双重代理来引导攻击者的信念。研究发现，强大的前沿模型在ToM-SB上表现不佳，尤其是在面对部分先验知识的攻击者时。通过强化学习训练的AI双重代理能够有效提升理论心智和欺骗能力，显示出信念建模在成功中的关键作用。'}}}, {'id': 'https://huggingface.co/papers/2604.11716', 'title': 'SWE-AGILE: A Software Agent Framework for Efficiently Managing Dynamic Reasoning Context', 'url': 'https://huggingface.co/papers/2604.11716', 'abstract': "Abstract SWE-AGILE addresses reasoning limitations in software engineering by using dynamic context management to balance detailed analysis with computational efficiency.  AI-generated summary Prior representative ReAct-style approaches in autonomous Software Engineering (SWE) typically lack the explicit System-2 reasoning required for deep analysis and handling complex edge cases. While recent reasoning models demonstrate the potential of extended Chain-of-Thought (CoT), applying them to the multi-turn SWE task creates a fundamental dilemma: retaining full reasoning history leads to context explosion and ``Lost-in-the-Middle'' degradation, while discarding it would force the agent to redundantly re-reason at every step. To address these challenges, we propose SWE-AGILE, a novel software agent framework designed to bridge the gap between reasoning depth, efficiency, and context constraints. SWE-AGILE introduces a Dynamic Reasoning Context strategy, maintaining a ``sliding window'' of detailed reasoning for immediate continuity to prevent redundant re-analyzing, while compressing historical reasoning content into concise Reasoning Digests. Empirically, SWE-AGILE sets a new standard for 7B-8B models on SWE-Bench-Verified using only 2.2k trajectories and 896 tasks. Code is available at https://github.com/KDEGroup/SWE-AGILE.", 'score': 3, 'issue_id': 1907, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'e8343836c5455de1', 'authors': ['Shuquan Lian', 'Juncheng Liu', 'Yazhe Chen', 'Yuhong Chen', 'Hui Li'], 'affiliations': ['Key Laboratory of Multimedia Trusted Perception and Efficient Computing Ministry of Education of China, Xiamen University', 'Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.11716.jpg', 'data': {'categories': ['#small_models', '#reasoning', '#open_source', '#long_context', '#training', '#plp', '#agents'], 'emoji': '⚙️', 'ru': {'title': 'Умная память для агента: скользящее окно рассуждений вместо взрыва контекста', 'desc': 'Работа представляет SWE-AGILE — новый фреймворк для автономных агентов в инженерии ПО, который решает проблему балансировки между глубиной рассуждений и эффективностью использования контекста. Авторы вводят Dynamic Reasoning Context strategy, которая поддерживает скользящее окно детальных рассуждений для непрерывности анализа, одновременно сжимая исторические рассуждения в краткие Reasoning Digests. Подход преодолевает классическую дилемму: сохранение полной истории приводит к взрыву контекста и деградации качества, а её отбрасывание вызывает избыточные повторные анализы. SWE-AGILE достигает новых результатов на бенчмарке SWE-Bench-Verified для моделей размером 7B-8B, используя лишь 2.2k траекторий и 896 задач.'}, 'en': {'title': 'Balancing Depth and Efficiency in Software Engineering Reasoning', 'desc': "SWE-AGILE is a new framework designed to improve reasoning in software engineering tasks by managing context dynamically. It addresses the limitations of previous approaches that struggle with deep analysis and complex scenarios due to context overload. By using a 'sliding window' method, SWE-AGILE keeps relevant reasoning details accessible while summarizing older information into concise digests. This approach enhances both the depth of reasoning and computational efficiency, achieving impressive results on benchmark tasks with fewer resources."}, 'zh': {'title': 'SWE-AGILE：平衡推理深度与效率的创新框架', 'desc': 'SWE-AGILE 是一种新型的软件代理框架，旨在解决软件工程中的推理限制。它通过动态上下文管理，平衡详细分析与计算效率。该框架引入了动态推理上下文策略，保持详细推理的“滑动窗口”，以防止冗余的重新分析，同时将历史推理内容压缩为简洁的推理摘要。实验结果表明，SWE-AGILE 在 SWE-Bench-Verified 上为 7B-8B 模型设定了新的标准。'}}}, {'id': 'https://huggingface.co/papers/2604.11446', 'title': 'Low-rank Optimization Trajectories Modeling for LLM RLVR Acceleration', 'url': 'https://huggingface.co/papers/2604.11446', 'abstract': 'Abstract A nonlinear extrapolation framework for reinforcement learning with verifiable rewards in large language models that reduces computational overhead by modeling rank-1 parameter trajectories through LoRA training and predictor-based prediction-extend processes.  AI-generated summary Recently, scaling reinforcement learning with verifiable rewards (RLVR) for large language models (LLMs) has emerged as an effective training paradigm for significantly improving model capabilities, which requires guiding the model to perform extensive exploration and learning, leading to substantial computational overhead and becoming a key challenge. To reduce the number of training steps, Prior work performs linear extrapolation of model parameters. However, the dynamics of model parameter updates during RLVR training remain insufficiently understood. To further investigate the evolution of LLMs during RLVR training, we conduct empirical experiments and find that the rank-1 subspace of the model does not evolve linearly, and its dominance over the original parameters is further amplified during LoRA training. Based on the above insights, we propose the Nonlinear Extrapolation of low-rank trajectories (NExt), a novel framework that models and extrapolates low-rank parameter trajectories in a nonlinear manner. Concretely, we first train the model using LoRA and extract the rank-1 subspace of parameter differences at multiple training steps, which is then used for the subsequent nonlinear extrapolation. Afterward, we utilized the extracted rank-1 subspace to train a predictor, which can model the trajectory of parameter updates during RLVR, and then perform the predict-extend process to extrapolate model parameters, achieving the acceleration of RLVR. To further study and understand NExt, we conduct comprehensive experiments that demonstrate the effectiveness and robustness of the method. Our method reduces computational overhead by approximately 37.5\\% while remaining compatible with a wide range of RLVR algorithms and tasks. We release our code in https://github.com/RUCAIBox/NExt.', 'score': 3, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '01a479b0912a1ba9', 'authors': ['Zhipeng Chen', 'Tao Qian', 'Wayne Xin Zhao', 'Ji-Rong Wen'], 'affiliations': ['China University of Mining and Technology (Beijing)', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.11446.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Нелинейная экстраполяция низкорангового подпространства для ускорения обучения с наградами', 'desc': 'Статья предлагает метод NExt для ускорения обучения больших языковых моделей с помощью reinforcement learning с верифицируемыми наградами. Авторы обнаружили, что параметры модели эволюционируют нелинейно в пространстве низкого ранга, поэтому предлагают использовать LoRA для выделения одномерного подпространства разностей параметров. На основе выделенного подпространства они обучают предиктор для моделирования траектории обновления параметров и выполняют процесс экстраполяции. Метод достигает сокращения вычислительных затрат примерно на 37,5% при сохранении совместимости с различными алгоритмами RLVR.'}, 'en': {'title': 'Accelerating Reinforcement Learning with Nonlinear Extrapolation', 'desc': 'This paper introduces a new framework called Nonlinear Extrapolation of low-rank trajectories (NExt) for improving reinforcement learning with verifiable rewards in large language models. The authors identify that traditional linear extrapolation of model parameters is insufficient due to the nonlinear dynamics of parameter updates during training. By utilizing low-rank parameter trajectories extracted through LoRA training, NExt models these updates in a nonlinear way, significantly reducing computational overhead. Experimental results show that this approach can decrease training steps by about 37.5% while maintaining compatibility with various RLVR algorithms.'}, 'zh': {'title': '非线性外推，提升强化学习效率', 'desc': '本文提出了一种非线性外推框架，用于在大语言模型中进行强化学习与可验证奖励的结合。通过LoRA训练和基于预测的延伸过程，该方法能够有效减少计算开销。研究发现，模型参数的演变并非线性，而是通过低秩子空间的动态变化来实现的。最终，实验结果表明，该方法在保持与多种强化学习算法兼容的同时，计算开销降低了约37.5%。'}}}, {'id': 'https://huggingface.co/papers/2604.11737', 'title': 'Learning Long-term Motion Embeddings for Efficient Kinematics Generation', 'url': 'https://huggingface.co/papers/2604.11737', 'abstract': 'Abstract Efficient motion generation is achieved through compressed motion embeddings and conditional flow-matching models that produce realistic long-term motions from text prompts or spatial inputs.  AI-generated summary Understanding and predicting motion is a fundamental component of visual intelligence. Although modern video models exhibit strong comprehension of scene dynamics, exploring multiple possible futures through full video synthesis remains prohibitively inefficient. We model scene dynamics orders of magnitude more efficiently by directly operating on a long-term motion embedding that is learned from large-scale trajectories obtained from tracker models. This enables efficient generation of long, realistic motions that fulfill goals specified via text prompts or spatial pokes. To achieve this, we first learn a highly compressed motion embedding with a temporal compression factor of 64x. In this space, we train a conditional flow-matching model to generate motion latents conditioned on task descriptions. The resulting motion distributions outperform those of both state-of-the-art video models and specialized task-specific approaches.', 'score': 3, 'issue_id': 1911, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'ee2e2b06cd077b93', 'authors': ['Nick Stracke', 'Kolja Bauer', 'Stefan Andreas Baumann', 'Miguel Angel Bautista', 'Josh Susskind', 'Björn Ommer'], 'affiliations': ['Apple', 'CompVis @ LMU Munich Center for Machine Learning'], 'pdf_title_img': 'assets/pdf/title_img/2604.11737.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture', '#video'], 'emoji': '🎬', 'ru': {'title': 'Генерация реалистичных движений через сжатые эмбеддинги и flow-matching', 'desc': 'В этой работе предлагается эффективный метод генерации движений на основе сжатых эмбеддингов и условных flow-matching моделей. Авторы используют долгосрочные траектории из трекеров для обучения компактного представления движений с коэффициентом сжатия 64x. Условная flow-matching модель генерирует распределения движений в этом латентном пространстве, управляемые текстовыми описаниями или пространственными указаниями. Полученный подход превосходит по качеству как современные видеомодели, так и специализированные методы для конкретных задач.'}, 'en': {'title': 'Efficient Motion Generation with Compressed Embeddings', 'desc': 'This paper presents a method for generating realistic long-term motions using compressed motion embeddings and conditional flow-matching models. By learning a highly compressed motion representation with a temporal compression factor of 64x, the model efficiently captures scene dynamics from large-scale trajectory data. The approach allows for the generation of motions based on text prompts or spatial inputs, significantly improving the efficiency of motion synthesis. The results demonstrate that this method outperforms existing video models and specialized techniques in producing realistic motion distributions.'}, 'zh': {'title': '高效生成逼真运动的创新方法', 'desc': '本论文提出了一种高效的运动生成方法，通过压缩运动嵌入和条件流匹配模型，从文本提示或空间输入中生成逼真的长期运动。我们通过直接操作从大规模轨迹学习的长期运动嵌入，显著提高了场景动态建模的效率。该方法首先学习一个压缩比为64倍的运动嵌入，然后训练条件流匹配模型，根据任务描述生成运动潜变量。实验结果表明，生成的运动分布在性能上超越了现有的先进视频模型和特定任务的方法。'}}}, {'id': 'https://huggingface.co/papers/2604.10628', 'title': 'BMdataset: A Musicologically Curated LilyPond Dataset', 'url': 'https://huggingface.co/papers/2604.10628', 'abstract': 'Abstract A curated LilyPond dataset and adapted CodeBERT model demonstrate that expert-curated small datasets can outperform large noisy corpora for music understanding tasks.  AI-generated summary Symbolic music research has relied almost exclusively on MIDI-based datasets; text-based engraving formats such as LilyPond remain unexplored for music understanding. We present BMdataset, a musicologically curated dataset of 393 LilyPond scores (2,646 movements) transcribed by experts directly from original Baroque manuscripts, with metadata covering composer, musical form, instrumentation, and sectional attributes. Building on this resource, we introduce LilyBERT (weights can be found at https://huggingface.co/csc-unipd/lilybert), a CodeBERT-based encoder adapted to symbolic music through vocabulary extension with 115 LilyPond-specific tokens and masked language model pre-training. Linear probing on the out-of-domain Mutopia corpus shows that, despite its modest size (~90M tokens), fine-tuning on BMdataset alone outperforms continuous pre-training on the full PDMX corpus (~15B tokens) for both composer and style classification, demonstrating that small, expertly curated datasets can be more effective than large, noisy corpora for music understanding. Combining broad pre-training with domain-specific fine-tuning yields the best results overall (84.3% composer accuracy), confirming that the two data regimes are complementary. We release the dataset, tokenizer, and model to establish a baseline for representation learning on LilyPond.', 'score': 2, 'issue_id': 1908, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '19b50bdca5547b6b', 'authors': ['Matteo Spanio', 'Ilay Guler', 'Antonio Rodà'], 'affiliations': ['Boston University', 'Centro di Sonologia Computazionale (CSC), Department of Information Engineering, University of Padua'], 'pdf_title_img': 'assets/pdf/title_img/2604.10628.jpg', 'data': {'categories': ['#training', '#science', '#open_source', '#small_models', '#architecture', '#dataset'], 'emoji': '🎼', 'ru': {'title': 'Качество превыше количества: малые экспертные датасеты для понимания музыки', 'desc': 'Исследователи создали BMdataset — тщательно отобранный набор данных из 393 партитур LilyPond, переписанных экспертами с оригинальных барочных рукописей. На основе этого датасета они адаптировали модель CodeBERT, расширив её словарь специальными токенами формата LilyPond и обучив на задаче предсказания пропущенных элементов. Результаты показали, что маленький, профессионально подготовленный датасет превосходит большой шумный корпус в задачах классификации композитора и стиля музыки. Комбинирование предварительного обучения на больших данных с дообучением на качественном датасете обеспечило лучшие результаты, подтвердив дополнительность двух подходов.'}, 'en': {'title': 'Small Datasets, Big Impact: Mastering Music with LilyBERT', 'desc': 'This paper presents a new dataset called BMdataset, which consists of 393 expert-curated LilyPond scores, aimed at improving music understanding tasks. It introduces LilyBERT, a modified version of the CodeBERT model, specifically designed for symbolic music by incorporating LilyPond-specific vocabulary. The study shows that fine-tuning on this small, high-quality dataset can outperform models trained on much larger but noisier datasets. The results highlight the importance of combining broad pre-training with targeted fine-tuning for achieving better performance in music classification tasks.'}, 'zh': {'title': '小型专家数据集胜过大型噪声数据集', 'desc': '本研究展示了经过专家策划的小型数据集在音乐理解任务中可以超越大型噪声数据集。我们创建了BMdataset，这是一个包含393个LilyPond乐谱的音乐学数据集，专门从原始巴洛克手稿中转录而来。基于此数据集，我们引入了LilyBERT，这是一个经过调整的CodeBERT模型，专门用于符号音乐的编码。研究结果表明，尽管BMdataset的规模较小，但在作曲家和风格分类任务中，其表现优于大型数据集，证明了小型专家策划数据集的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.10425', 'title': 'DiningBench: A Hierarchical Multi-view Benchmark for Perception and Reasoning in the Dietary Domain', 'url': 'https://huggingface.co/papers/2604.10425', 'abstract': 'Abstract A new hierarchical, multi-view benchmark called DiningBench is introduced to evaluate vision-language models on fine-grained food classification, nutrition estimation, and visual question answering, revealing current models\' limitations in fine-grained visual discrimination and nutritional reasoning.  AI-generated summary Recent advancements in Vision-Language Models (VLMs) have revolutionized general visual understanding. However, their application in the food domain remains constrained by benchmarks that rely on coarse-grained categories, single-view imagery, and inaccurate metadata. To bridge this gap, we introduce DiningBench, a hierarchical, multi-view benchmark designed to evaluate VLMs across three levels of cognitive complexity: Fine-Grained Classification, Nutrition Estimation, and Visual Question Answering. Unlike previous datasets, DiningBench comprises 3,021 distinct dishes with an average of 5.27 images per entry, incorporating fine-grained "hard" negatives from identical menus and rigorous, verification-based nutritional data. We conduct an extensive evaluation of 29 state-of-the-art open-source and proprietary models. Our experiments reveal that while current VLMs excel at general reasoning, they struggle significantly with fine-grained visual discrimination and precise nutritional reasoning. Furthermore, we systematically investigate the impact of multi-view inputs and Chain-of-Thought reasoning, identifying five primary failure modes. DiningBench serves as a challenging testbed to drive the next generation of food-centric VLM research. All codes are released in https://github.com/meituan/DiningBench.', 'score': 2, 'issue_id': 1908, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': 'f8e70472f52f8861', 'authors': ['Song Jin', 'Juntian Zhang', 'Xun Zhang', 'Zeying Tian', 'Fei Jiang', 'Guojun Yin', 'Wei Lin', 'Yong Liu', 'Rui Yan'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Meituan', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2604.10425.jpg', 'data': {'categories': ['#multimodal', '#cv', '#open_source', '#benchmark', '#survey', '#dataset'], 'emoji': '🍽️', 'ru': {'title': 'Мерило для реалистичной оценки видение-языковых моделей в пищевой сфере', 'desc': 'В работе представлен DiningBench — новый иерархический бенчмарк с многоракурсными изображениями для оценки vision-language моделей в задачах классификации блюд, оценки питательной ценности и визуального вопросно-ответного взаимодействия. Бенчмарк содержит 3021 уникальное блюдо с усредненно 5,27 изображениями на каждое, включая сложные отрицательные примеры и верифицированные данные о питательности. Авторы провели масштабное тестирование 29 современных моделей и выявили, что современные VLM хорошо справляются с общим рассуждением, но плохо решают задачи тонкой классификации и точной оценки питательности. Исследование показало пять основных типов ошибок моделей и определило важность многоракурсных входов и цепочки рассуждений для улучшения производительности.'}, 'en': {'title': 'DiningBench: Elevating Food Understanding in AI', 'desc': 'This paper introduces DiningBench, a new benchmark for evaluating vision-language models (VLMs) specifically in the food domain. It focuses on three complex tasks: fine-grained food classification, nutrition estimation, and visual question answering. The benchmark includes 3,021 distinct dishes with multiple images per dish, allowing for a more detailed assessment of model performance. The study highlights the limitations of current VLMs in fine-grained visual tasks and nutritional reasoning, while also exploring the effects of multi-view inputs and reasoning strategies.'}, 'zh': {'title': 'DiningBench：食品领域的视觉-语言模型新基准', 'desc': '本文介绍了一种新的分层多视角基准测试，称为DiningBench，旨在评估视觉-语言模型在细粒度食品分类、营养估计和视觉问答方面的表现。现有模型在细粒度视觉辨别和营养推理方面存在局限性，DiningBench通过提供3021种不同菜肴的多视角图像来填补这一空白。该基准测试包含严格验证的营养数据，并对29种最先进的模型进行了广泛评估，结果显示当前模型在一般推理方面表现良好，但在细粒度视觉辨别和精确营养推理上存在显著困难。DiningBench为食品相关的视觉-语言模型研究提供了一个具有挑战性的测试平台。'}}}, {'id': 'https://huggingface.co/papers/2604.10718', 'title': 'SciPredict: Can LLMs Predict the Outcomes of Scientific Experiments in Natural Sciences?', 'url': 'https://huggingface.co/papers/2604.10718', 'abstract': 'Abstract SciPredict benchmark reveals that large language models struggle to accurately predict scientific experiment outcomes and cannot reliably assess prediction confidence, unlike human experts who show better calibration and performance when experiments are deemed predictable.  AI-generated summary Accelerating scientific discovery requires the identification of which experiments would yield the best outcomes before committing resources to costly physical validation. While existing benchmarks evaluate LLMs on scientific knowledge and reasoning, their ability to predict experimental outcomes - a task where AI could significantly exceed human capabilities - remains largely underexplored. We introduce SciPredict, a benchmark comprising 405 tasks derived from recent empirical studies in 33 specialized sub-fields of physics, biology, and chemistry. SciPredict addresses two critical questions: (a) can LLMs predict the outcome of scientific experiments with sufficient accuracy? and (b) can such predictions be reliably used in the scientific research process? Evaluations reveal fundamental limitations on both fronts. Model accuracies are 14-26% and human expert performance is approx20%. Although some frontier models exceed human performance model accuracy is still far below what would enable reliable experimental guidance. Even within the limited performance, models fail to distinguish reliable predictions from unreliable ones, achieving only approx20% accuracy regardless of their confidence or whether they judge outcomes as predictable without physical experimentation. Human experts, in contrast, demonstrate strong calibration: their accuracy increases from approx5% to approx80% as they deem outcomes more predictable without conducting the experiment. SciPredict establishes a rigorous framework demonstrating that superhuman performance in experimental science requires not just better predictions, but better awareness of prediction reliability. For reproducibility all our data and code are provided at https://github.com/scaleapi/scipredict', 'score': 2, 'issue_id': 1906, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '0fd93adca7e62d3b', 'authors': ['Udari Madhushani Sehwag', 'Elaine Lau', 'Haniyeh Ehsani Oskouie', 'Shayan Shabihi', 'Erich Liang', 'Andrea Toledo', 'Guillermo Mangialardi', 'Sergio Fonrouge', 'Ed-Yeremai Hernandez Cardona', 'Paula Vergara', 'Utkarsh Tyagi', 'Chen Bo Calvin Zhang', 'Pavi Bhatter', 'Nicholas Johnson', 'Furong Huang', 'Ernesto Gabriel Hernandez Montoya', 'Bing Liu'], 'affiliations': ['Human Frontier Collective', 'Princeton University', 'Scale AI', 'University of California, Los Angeles', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2604.10718.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'LLM не готовы предсказывать научные эксперименты: нужна не только точность, но и самосознание модели', 'desc': 'В статье представлен бенчмарк SciPredict, содержащий 405 задач из физики, биологии и химии, для оценки способности больших языковых моделей предсказывать результаты научных экспериментов. Исследование показало, что точность моделей составляет только 14-26%, что недостаточно для надёжного использования в научном процессе, хотя некоторые фронтирные модели немного превосходят человеческих экспертов (≈20% точности). Критическая проблема заключается в том, что LLM не способны правильно оценивать уверенность в своих предсказаниях и различать надёжные прогнозы от ненадёжных, достигая лишь ≈20% точности при калибровке. В отличие от моделей, человеческие эксперты демонстрируют отличную калибровку, увеличивая точность с ≈5% до ≈80% в зависимости от того, считают ли они результат предсказуемым без проведения эксперимента.'}, 'en': {'title': 'Unlocking Scientific Discovery: Bridging AI Predictions and Human Expertise', 'desc': 'The SciPredict benchmark evaluates the ability of large language models (LLMs) to predict outcomes of scientific experiments. It reveals that LLMs struggle with accuracy and confidence assessment, performing significantly worse than human experts. While some advanced models show improved performance, they still fall short of providing reliable guidance for experimental decisions. The study emphasizes that achieving superhuman performance in scientific prediction requires not only accurate outcomes but also a better understanding of the reliability of those predictions.'}, 'zh': {'title': '科学实验预测的挑战与机遇', 'desc': 'SciPredict基准测试揭示了大型语言模型在准确预测科学实验结果方面的不足，并且无法可靠地评估预测的可信度。与人类专家相比，AI模型在可预测的实验中表现较差，专家的准确性和表现更为优越。该研究引入了SciPredict基准，包含来自33个专业子领域的405个任务，旨在评估LLMs在科学实验结果预测中的能力。结果显示，尽管一些前沿模型的表现超过人类，但整体准确性仍远低于可靠的实验指导所需的水平。'}}}, {'id': 'https://huggingface.co/papers/2604.08921', 'title': 'TAIHRI: Task-Aware 3D Human Keypoints Localization for Close-Range Human-Robot Interaction', 'url': 'https://huggingface.co/papers/2604.08921', 'abstract': "Abstract TAIHRI is a vision-language model designed for egocentric human-robot interaction that enables precise 3D keypoint localization through 2D keypoint reasoning and next token prediction.  AI-generated summary Accurate 3D human keypoints localization is a critical technology enabling robots to achieve natural and safe physical interaction with users. Conventional 3D human keypoints estimation methods primarily focus on the whole-body reconstruction quality relative to the root joint. However, in practical human-robot interaction (HRI) scenarios, robots are more concerned with the precise metric-scale spatial localization of task-relevant body parts under the egocentric camera 3D coordinate. We propose TAIHRI, the first Vision-Language Model (VLM) tailored for close-range HRI perception, capable of understanding users' motion commands and directing the robot's attention to the most task-relevant keypoints. By quantizing 3D keypoints into a finite interaction space, TAIHRI precisely localize the 3D spatial coordinates of critical body parts by 2D keypoint reasoning via next token prediction, and seamlessly adapt to downstream tasks such as natural language control or global space human mesh recovery. Experiments on egocentric interaction benchmarks demonstrate that TAIHRI achieves superior estimation accuracy for task-critical body parts. We believe TAIHRI opens new research avenues in the field of embodied human-robot interaction. Code is available at: https://github.com/Tencent/TAIHRI.", 'score': 2, 'issue_id': 1906, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'ea63b41be91bf064', 'authors': ['Ao Li', 'Yonggen Ling', 'Yiyang Lin', 'Yuji Wang', 'Yong Deng', 'Yansong Tang'], 'affiliations': ['Futian Laboratory', 'Tencent Robotics', 'Tsinghua Shenzhen International Graduate School'], 'pdf_title_img': 'assets/pdf/title_img/2604.08921.jpg', 'data': {'categories': ['#3d', '#open_source', '#cv', '#multimodal', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Видение робота через глаза: точная локализация человеческих суставов для безопасного взаимодействия', 'desc': 'TAIHRI — это видео-языковая модель, специально разработанная для эгоцентрического взаимодействия человека и робота. Модель локализует 3D ключевые точки человеческого тела через анализ 2D ключевых точек и предсказание следующего токена. В отличие от традиционных методов реконструкции всего тела, TAIHRI сосредоточена на точной метрической локализации релевантных для конкретной задачи частей тела в 3D пространстве эгоцентрической камеры. Модель способна понимать команды на естественном языке и направлять внимание робота на наиболее важные суставы для безопасного и естественного физического взаимодействия.'}, 'en': {'title': 'TAIHRI: Precision in Human-Robot Interaction through Vision-Language Modeling', 'desc': 'TAIHRI is a vision-language model specifically designed for improving human-robot interaction by accurately localizing 3D keypoints of human bodies. Unlike traditional methods that focus on whole-body reconstruction, TAIHRI emphasizes the precise spatial localization of important body parts from an egocentric perspective. It utilizes 2D keypoint reasoning and next token prediction to achieve this, allowing robots to better understand user commands and focus on relevant actions. The model has shown superior performance in estimating critical body parts, paving the way for advancements in embodied human-robot interaction.'}, 'zh': {'title': 'TAIHRI：精准的人机交互关键点定位模型', 'desc': 'TAIHRI是一种视觉-语言模型，专为自我中心的人机交互设计，能够通过2D关键点推理和下一个标记预测实现精确的3D关键点定位。该模型关注于任务相关的身体部位在3D坐标系中的精确空间定位，而不仅仅是整体身体重建的质量。TAIHRI通过量化3D关键点到有限的交互空间，能够理解用户的运动指令，并引导机器人关注最相关的关键点。实验结果表明，TAIHRI在任务关键身体部位的估计精度上表现优越，推动了人机交互领域的新研究方向。'}}}, {'id': 'https://huggingface.co/papers/2604.11544', 'title': 'Time is Not a Label: Continuous Phase Rotation for Temporal Knowledge Graphs and Agentic Memory', 'url': 'https://huggingface.co/papers/2604.11544', 'abstract': 'Abstract RoMem introduces a temporal knowledge graph module that uses semantic speed gates and continuous phase rotation to distinguish persistent from evolving facts, achieving superior performance in temporal reasoning and agentic memory tasks.  AI-generated summary Structured memory representations such as knowledge graphs are central to autonomous agents and other long-lived systems. However, most existing approaches model time as discrete metadata, either sorting by recency (burying old-yet-permanent knowledge), simply overwriting outdated facts, or requiring an expensive LLM call at every ingestion step, leaving them unable to distinguish persistent facts from evolving ones. To address this, we introduce RoMem, a drop-in temporal knowledge graph module for structured memory systems, applicable to agentic memory and beyond. A pretrained Semantic Speed Gate maps each relation\'s text embedding to a volatility score, learning from data that evolving relations (e.g., "president of") should rotate fast while persistent ones (e.g., "born in") should remain stable. Combined with continuous phase rotation, this enables geometric shadowing: obsolete facts are rotated out of phase in complex vector space, so temporally correct facts naturally outrank contradictions without deletion. On temporal knowledge graph completion, RoMem achieves state-of-the-art results on ICEWS05-15 (72.6 MRR). Applied to agentic memory, it delivers 2-3x MRR and answer accuracy on temporal reasoning (MultiTQ), dominates hybrid benchmark (LoCoMo), preserves static memory with zero degradation (DMR-MSC), and generalises zero-shot to unseen financial domains (FinTMMBench).', 'score': 1, 'issue_id': 1919, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'a38c2bca5940fa01', 'authors': ['Weixian Waylon Li', 'Jiaxin Zhang', 'Xianan Jim Yang', 'Tiejun Ma', 'Yiwen Guo'], 'affiliations': ['Independent Researcher', 'LIGHTSPEED', 'University of Edinburgh', 'University of St Andrews'], 'pdf_title_img': 'assets/pdf/title_img/2604.11544.jpg', 'data': {'categories': ['#benchmark', '#graphs', '#agents', '#architecture', '#reasoning', '#dataset'], 'emoji': '⏰', 'ru': {'title': 'Геометрическая память: вращение фактов во времени вместо их удаления', 'desc': 'RoMem представляет новый модуль временных графов знаний для структурированной памяти агентов, который использует семантические вентили скорости для определения волатильности отношений. Предварительно обученный классификатор автоматически различает долгосрочные факты (например, "рождён в") от изменяющихся (например, "президент") на основе текстовых представлений. Непрерывная фазовая ротация в комплексном векторном пространстве позволяет автоматически "затемнить" устаревшие факты без их явного удаления, естественным образом отдавая приоритет актуальной информации. Метод достигает лучших результатов в задачах временного рассуждения и памяти автономных агентов, демонстрируя улучшения в 2-3 раза на бенчмарках временного вывода.'}, 'en': {'title': 'Revolutionizing Memory with RoMem: Distinguishing Facts Over Time', 'desc': 'RoMem is a novel temporal knowledge graph module designed t
