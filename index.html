    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.19195', 'title': 'Moebius: 0.2B Lightweight Image Inpainting Framework with 10B-Level Performance', 'url': 'https://huggingface.co/papers/2606.19195', 'abstract': 'Abstract A lightweight image inpainting framework achieves high-fidelity results with significantly reduced parameters and inference time through novel local-global interaction blocks and adaptive distillation strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While 10B-level industrial foundation models have pushed the boundaries of image inpainting, their prohibitive computational costs severely hinder practical deployment. Constructing a highly optimized task-specific specialist offers a promising solution; however, extreme structural compression inevitably triggers a severe representation bottleneck. To conquer this, we propose Moebius, a highly efficient lightweight inpainting framework. We systematically reconstruct the diffusion backbone by introducing the Local-λ Mix Interaction (LλMI) block. Comprising Local-λ and Interactive-λ modules, it elegantly summarizes spatial contexts and global semantic priors into fixed-size linear matrices, preserving complex latent interactions while drastically shedding parameters. Furthermore, to unlock the full representational capacity of this highly compact architecture, we synergistically pair it with an adaptive multi-granularity distillation strategy. Operating strictly within the latent space to avoid expensive pixel-space decoding, this strategy dynamically balances multiple gradient-based losses to achieve high-fidelity alignment. Extensive experiments across natural and portrait benchmarks demonstrate that this optimal synergy enables Moebius to rival or even surpass the generation quality of the 10B-level industrial generalist FLUX.1-Fill-Dev. Remarkably, Moebius achieves this using less than 2\\% of the parameters (0.22B vs. 11.9B) while delivering a >15times acceleration in total inference time, setting a new efficiency standard for high-fidelity inpainting. Project page at https://hustvl.github.io/Moebius.', 'score': 112, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'bb41fc4403d67c00', 'authors': ['Kangsheng Duan', 'Ziyang Xu', 'Wenyu Liu', 'Xiaohu Ruan', 'Xiaoxin Chen', 'Xinggang Wang'], 'affiliations': ['Huazhong University of Science and Technology', 'VIVO AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.19195.jpg', 'data': {'categories': ['#inference', '#cv', '#optimization', '#small_models', '#training', '#diffusion', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Эффективное восстановление изображений через компактные модели с локально-глобальным взаимодействием', 'desc': 'В работе представлена лёгкая модель для восстановления изображений (инпейнтинга), которая достигает высокого качества при минимальном количестве параметров. Авторы предложили архитектуру Moebius с блоками локально-глобального взаимодействия (LλMI), которые сжимают пространственный контекст и глобальную семантику в матрицы фиксированного размера. Для раскрытия полного потенциала компактной модели применена адаптивная многоуровневая дистилляция, работающая в скрытом пространстве и динамически балансирующая несколько градиентных функций потерь. Экспериментально показано, что Moebius превосходит большую модель FLUX.1-Fill-Dev, используя менее 2% параметров и достигая ускорения в 15 раз при сохранении высокого качества восстановления.'}, 'en': {'title': 'Moebius: High-Fidelity Inpainting with Unmatched Efficiency', 'desc': 'The paper presents Moebius, a lightweight image inpainting framework that achieves high-quality results with fewer parameters and faster inference times. It introduces innovative Local-λ Mix Interaction (LλMI) blocks that effectively capture both local and global image features while minimizing the model size. To enhance performance, Moebius employs an adaptive multi-granularity distillation strategy that optimizes learning within the latent space, avoiding costly pixel-space operations. Experimental results show that Moebius can match or exceed the performance of larger models while using significantly fewer resources, setting a new benchmark for efficiency in image inpainting.'}, 'zh': {'title': '高效轻量级图像修复新标准', 'desc': '本文提出了一种轻量级的图像修复框架Moebius，能够在显著减少参数和推理时间的情况下实现高保真度的修复效果。通过引入局部-全局交互模块和自适应蒸馏策略，Moebius有效地总结了空间上下文和全局语义信息。该框架在潜在空间中操作，避免了昂贵的像素空间解码，从而实现了高效的表示能力。实验结果表明，Moebius在自然和肖像基准测试中表现优异，甚至可以与10B级工业模型的生成质量相媲美。'}}}, {'id': 'https://huggingface.co/papers/2606.15133', 'title': 'DragMesh-2: Physically Plausible Dexterous Hand-Object Interaction with Articulated Objects', 'url': 'https://huggingface.co/papers/2606.15133', 'abstract': 'Abstract DragMesh-2 enables dexterous hand-object interaction through contact-driven manipulation, with PICA enhancing robustness under varying contact loads without tactile feedback.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dexterous interaction with articulated objects is important for household, assistive, and humanoid manipulation, where multi-finger hands can provide compliant contact patterns beyond parallel-jaw grasping. However, articulated-object manipulation differs from static-object manipulation: the target part cannot be directly actuated, and its motion must emerge through sustained physical hand--handle contact. This makes the transition from object-centric articulated generation to hand-driven dexterous hand--object interaction non-trivial, since geometric trajectory replay or open-loop execution does not model the contact dynamics required to move the articulated part. Moreover, policies trained only for task completion under fixed dynamics can overfit nominal contact loads, especially without tactile or force feedback, and may degrade when the contact load changes. To address these challenges, we present DragMesh-2, a contact-driven framework for dexterous interaction with articulated objects that extends articulated interaction from object-centric generation to hand-driven dexterous hand--object interaction, where articulated motion must arise through physical contact. We further propose PICA, a physically informed contact-aware training mechanism that injects physical signals into policy learning without tactile or force feedback, improving robustness and task success under changing contact loads. Finally, we conduct systematic evaluation across multiple damping conditions and articulated-object categories to study robustness under contact-load variation, and provide a pure-geometry dexterous interaction resource to support future loco-manipulation and humanoid hand--object interaction research. Across seven GAPartNet objects, DragMesh-2 achieves stronger robustness under contact-load variation than the compared methods while maintaining high task success across damping conditions.', 'score': 68, 'issue_id': 2458, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': 'dcd87f3a4a5c502e', 'authors': ['Tianshan Zhang', 'Yijia Duan', 'Yanjun Li', 'Zeyu Zhang', 'Hao Tang'], 'affiliations': ['School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15133.jpg', 'data': {'categories': ['#3d', '#robotics'], 'emoji': '✋', 'ru': {'title': 'Контактная динамика для ловкой манипуляции рукой', 'desc': 'DragMesh-2 — это контактно-ориентированная система для ловкого взаимодействия многопальцевой руки с шарнирными объектами, которая переходит от объект-центричного управления к управлению, управляемому движениями руки. Авторы предлагают PICA — механизм обучения, осведомленный о физике и контактах, который внедряет физические сигналы в обучение политики без использования тактильной обратной связи. Метод достигает робастности при изменяющихся контактных нагрузках за счет моделирования контактной динамики при манипуляции шарнирными объектами. Система демонстрирует высокую успешность выполнения задач на разнообразных объектах при различных условиях демпфирования.'}, 'en': {'title': 'Enhancing Dexterous Manipulation with Contact-Driven Techniques', 'desc': 'The paper introduces DragMesh-2, a framework designed for dexterous manipulation of articulated objects using contact-driven techniques. It addresses the challenges of transitioning from static to dynamic interactions, where the motion of the object is influenced by sustained contact with a multi-fingered hand. The authors also present PICA, a training mechanism that enhances the robustness of the manipulation policies by incorporating physical signals, even in the absence of tactile feedback. Through extensive evaluations, DragMesh-2 demonstrates improved performance in handling varying contact loads compared to existing methods, making it a valuable resource for future research in humanoid and loco-manipulation tasks.'}, 'zh': {'title': '灵巧交互：接触驱动的手-物体操作', 'desc': 'DragMesh-2 是一个用于灵巧手与物体交互的框架，能够通过接触驱动的方式进行操作。它解决了在没有触觉反馈的情况下，如何在不同接触负载下保持鲁棒性的问题。PICA 是一种物理信息驱动的接触感知训练机制，可以在政策学习中注入物理信号，从而提高任务成功率。通过对多种阻尼条件和关节物体类别的系统评估，DragMesh-2 在接触负载变化下表现出更强的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.20517', 'title': 'Multi-LCB: Extending LiveCodeBench to Multiple Programming Languages', 'url': 'https://huggingface.co/papers/2606.20517', 'abstract': "Abstract Multi-LCB addresses the limitation of LiveCodeBench by providing a multi-language benchmark for evaluating LLMs across twelve programming languages while maintaining contamination controls and evaluation protocols.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LiveCodeBench (LCB) has recently become a widely adopted benchmark for evaluating large language models (LLMs) on code-generation tasks. By curating competitive programming problems, constantly adding fresh problems to the set, and filtering them by release dates, LCB provides contamination-aware evaluation and offers a holistic view of coding capability. However, LCB remains restricted to Python, leaving open the question of whether LLMs can generalize across the diverse programming languages required in real-world software engineering.   We introduce Multi-LCB, a benchmark for evaluating LLMs across twelve programming languages, including Python. Multi-LCB transforms Python tasks from the LCB dataset into equivalent tasks in other languages while preserving LCB's contamination controls and evaluation protocol. Because it is fully compatible with the original LCB format, Multi-LCB will automatically track future LCB updates, enabling systematic assessment of cross-language code generation competence and requiring models to sustain performance well beyond Python.   We evaluated 24 LLMs for instruction and reasoning on Multi-LCB, uncovering evidence of Python overfitting, language-specific contamination, and substantial disparities in multilingual performance. Our results establish Multi-LCB as a rigorous new benchmark for multi-programming-language code evaluation, directly addressing LCB's primary limitation and exposing critical gaps in current LLM capabilities.", 'score': 48, 'issue_id': 2459, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'd2a2eb0f16aedb62', 'authors': ['Maria Ivanova', 'Pavel Zadorozhny', 'Rodion Levichev', 'Ivan Petrov', 'Adamenko Pavel', 'Ivan Lopatin', 'Alexey Kutalev', 'Dmitrii Babaev'], 'affiliations': ['GigaCode', 'Yandex School of Data Analysis, Applied AI Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.20517.jpg', 'data': {'categories': ['#plp', '#dataset', '#multilingual', '#open_source', '#benchmark', '#reasoning'], 'emoji': '🌍', 'ru': {'title': 'Многоязычная оценка языковых моделей: преодоление Python-центричности', 'desc': 'Статья представляет Multi-LCB, расширение популярного бенчмарка LiveCodeBench для оценки больших языковых моделей на задачах генерации кода на двенадцати языках программирования вместо одного Python. Авторы трансформировали существующие задачи из оригинального датасета в эквивалентные задачи на других языках, сохраняя при этом механизмы контроля контаминации данных и протоколы оценки. В исследовании было протестировано 24 LLM, что выявило переобучение моделей на Python, языкозависимую контаминацию и значительные различия в многоязычной производительности. Результаты демонстрируют, что Multi-LCB является строгим бенчмарком для оценки кросс-языковых способностей кодирования и выявляет критические пробелы в современных LLM.'}, 'en': {'title': 'Multi-LCB: Expanding Code Evaluation Beyond Python', 'desc': "Multi-LCB is a new benchmark designed to evaluate large language models (LLMs) across twelve programming languages, addressing the limitations of the existing LiveCodeBench (LCB) which only focuses on Python. It transforms Python coding tasks into equivalent tasks in other languages while maintaining strict contamination controls and evaluation protocols. The benchmark allows for systematic assessment of LLMs' performance in code generation across different languages, revealing issues like Python overfitting and language-specific biases. By evaluating 24 LLMs, Multi-LCB highlights significant gaps in multilingual performance, establishing itself as a crucial tool for understanding LLM capabilities in real-world software engineering."}, 'zh': {'title': '多语言基准，提升代码生成能力', 'desc': 'Multi-LCB是一个新的基准，用于评估大型语言模型（LLMs）在十二种编程语言上的表现，解决了LiveCodeBench（LCB）仅限于Python的局限性。它通过将LCB数据集中Python任务转换为其他语言的等效任务，保持了污染控制和评估协议。我们对24个LLMs进行了评估，发现了Python过拟合和语言特定污染的问题，以及多语言表现的显著差异。Multi-LCB为多编程语言代码评估提供了严格的新基准，揭示了当前LLMs能力的关键缺口。'}}}, {'id': 'https://huggingface.co/papers/2606.19419', 'title': 'Playful Agentic Robot Learning', 'url': 'https://huggingface.co/papers/2606.19419', 'abstract': 'Abstract Embodied robots learn reusable skills through self-directed play and exploration, then apply these skills to improve performance on downstream tasks without additional training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current agentic robot systems can write executable Code-as-Policy programs, observe feedback, and revise behavior across multiple attempts, but they remain largely task-driven: reusable skills are acquired only after explicit instructions. We study Playful Agentic Robot Learning, where an embodied coding agent uses self-directed play as a continual skill-learning stage before downstream tasks arrive. We introduce RATs, Robotics Agent Teams designed for play-time skill acquisition. During play, RATs proposes novel yet learnable exploratory tasks, plans and executes robot-code policies, verifies intermediate progress, diagnoses failures, retries with dense, step-level feedback, and distills successful executions into a persistent code skill library. At test time, the agent reuses relevant skills from this frozen library to help solve new tasks. Experiments in LIBERO-PRO and MolmoSpaces show that play-learned skills improve held-out downstream tasks over no-play and random-play baselines, with 20.6 and 17.0 percentage-point gains over CaP-Agent0 on LIBERO-PRO and MolmoSpaces, respectively. Moreover, the learned skills can be plugged into other inference-time Code-as-Policy agents by simply retrieving them into the context, improving RoboSuite and real-world transfer by 8.9 and 8.8 points, respectively, without finetuning the underlying model.', 'score': 43, 'issue_id': 2458, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '27f954d08c59c2bc', 'authors': ['Junyi Zhang', 'Jiaxin Ge', 'Hanjun Yoo', 'Letian Fu', 'Zihan Yang', 'Yaowei Liu', 'Raj Saravanan', 'Shaofeng Yin', 'Justin Yu', 'Dantong Niu', 'Zirui Wang', 'Roei Herzig', 'Ken Goldberg', 'Yutong Bai', 'David M. Chan', 'Ion Stoica', 'Angjoo Kanazawa', 'Jiahui Lei', 'Haiwen Feng', 'Trevor Darrell'], 'affiliations': ['Impossible Research', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.19419.jpg', 'data': {'categories': ['#agents', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Самостоятельная игра как путь к переиспользуемым навыкам робота', 'desc': 'В работе представлена система RATs для обучения робототехнических агентов через самостоятельную игру и исследование окружения. Агент использует код как политику поведения, предлагает собственные исследовательские задачи и накапливает переиспользуемые навыки в библиотеку во время игровой фазы. Эти навыки затем применяются для решения новых задач без дополнительного обучения модели, значительно улучшая производительность на различных бенчмарках. Метод демонстрирует, что предварительное изучение навыков через игру повышает эффективность переноса знаний и может быть применён к другим Code-as-Policy агентам через контекстное обучение.'}, 'en': {'title': 'Learning Through Play: Robots Master Skills for Future Tasks', 'desc': 'This paper presents a novel approach to robot learning called Playful Agentic Robot Learning, where robots learn skills through self-directed play rather than just following explicit instructions. The authors introduce Robotics Agent Teams (RATs) that create and execute exploratory tasks, allowing robots to develop a library of reusable skills. These skills can then be applied to new tasks without additional training, significantly improving performance in various environments. Experiments demonstrate that robots using play-learned skills outperform those that do not engage in play, showcasing the effectiveness of this learning method.'}, 'zh': {'title': '通过游戏学习技能，提升机器人任务表现', 'desc': '这篇论文研究了具身机器人如何通过自我导向的游戏和探索来学习可重用的技能，并在没有额外训练的情况下将这些技能应用于下游任务。我们提出了RATs（机器人代理团队），它们在游戏中提出新颖且可学习的探索任务，计划并执行机器人代码策略。通过不断的反馈和失败诊断，RATs能够将成功的执行过程提炼成持久的代码技能库。在测试时，代理可以从这个技能库中重用相关技能，从而提高在新任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.20515', 'title': 'S-Agent: Spatial Tool-Use Elicits Reasoning for Spatial Intelligence', 'url': 'https://huggingface.co/papers/2606.20515', 'abstract': 'Abstract S-Agent is a spatial reasoning framework that enhances visual language models with temporal memory and hierarchical spatial tools to enable continuous 3D world understanding from multi-view imagery.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Real-world spatial intelligence requires reasoning over a continuous and evolving 3D world, yet existing VLMs and tool-augmented agents largely remain tied to static, stateless inference from isolated visual observations. We introduce \\textsc{S-Agent}, a spatial tool-use agentic paradigm for understanding and reasoning over continuous multi-view images and videos. By formulating spatial reasoning as spatio-temporal evidence accumulation rather than isolated frame-level prediction, S-Agent reshapes spatial perception into scene-centric understanding beyond frame-centric recognition. Specifically, S-Agent casts the VLM as a semantic planner that decides what evidence is needed, while a hierarchy of spatial tools and experts grounds objects in 2D, lifts them into 3D geometric evidence, and aggregates this evidence into high-level spatial knowledge (e.g., counting, measurement, orientation, and relative position). Additionally, a temporal memory mechanism, including Scene Memory for maintaining the evolving scene state and Agent Memory for accumulating reasoning context, enables evidence integration across frames and reasoning steps. Comprehensive experiments on multi-view and video spatial reasoning benchmarks show that S-Agent consistently improves both open-source and closed-source VLMs in a training-free manner. Beyond inference-time augmentation, supervised fine-tuning (SFT) on S-Agent-generated spatial trajectories S-300K yields S-Agent-8B, a compact spatial agent that significantly surpasses similar-scale baselines (e.g., Qwen3-VL-8B) and performs comparably to advanced closed-source models (e.g., GPT-5.4 and Gemini 3).', 'score': 35, 'issue_id': 2458, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '4b755e35a630ca0a', 'authors': ['Yalun Dai', 'Hao Li', 'Shulin Tian', 'Runmao Yao', 'Yuhao Dong', 'Fangzhou Hong', 'Zhaoxi Chen', 'Fangfu Liu', 'Baoliang Tian', 'Dingwen Zhang', 'Tao Wang', 'Kim-Hui Yap', 'Ziwei Liu'], 'affiliations': ['ByteDance', 'NTU', 'NWPU', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2606.20515.jpg', 'data': {'categories': ['#video', '#3d', '#agents', '#cv', '#multimodal', '#benchmark'], 'emoji': '🌐', 'ru': {'title': 'Агент трёхмерного пространства с памятью для понимания мира', 'desc': 'S-Agent — это пространственный агент, который расширяет визуально-языковые модели механизмом временной памяти и иерархией пространственных инструментов для понимания трёхмерного мира на основе многовидовых изображений. Вместо изолированного анализа отдельных кадров система формулирует пространственное рассуждение как накопление спацио-временных свидетельств, трансформируя восприятие из кадр-центричного в сцена-центричное. Архитектура включает семантический планировщик на основе VLM, иерархию инструментов для локализации объектов в 2D, их проецирования в 3D и агрегации в пространственные знания, а также механизм памяти для интеграции информации через временные промежутки. Модель S-Agent-8B, обученная на синтетических данных, достигает значительного прироста производительности без переобучения и конкурирует с закрытыми моделями высокого уровня.'}, 'en': {'title': 'Revolutionizing 3D Understanding with S-Agent', 'desc': "S-Agent is a new framework designed to improve visual language models (VLMs) by incorporating spatial reasoning and temporal memory for better understanding of 3D environments. Unlike traditional VLMs that rely on static images, S-Agent processes continuous multi-view imagery and videos, allowing for dynamic scene interpretation. It utilizes a hierarchy of spatial tools to gather and analyze spatial evidence, transforming frame-based recognition into a more comprehensive scene-centric understanding. Additionally, S-Agent's temporal memory helps maintain context across frames, leading to enhanced reasoning capabilities and improved performance on spatial reasoning tasks."}, 'zh': {'title': 'S-Agent：空间推理的新范式', 'desc': 'S-Agent是一个空间推理框架，旨在通过时间记忆和层次空间工具增强视觉语言模型，以实现对多视角图像的连续3D世界理解。与传统的静态视觉观察不同，S-Agent将空间推理视为时空证据的积累，而不是孤立的帧级预测。它通过将视觉语言模型视为语义规划者，决定所需的证据，并利用空间工具和专家将对象从2D提升到3D几何证据。实验表明，S-Agent在多视角和视频空间推理基准测试中显著提高了现有模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.13416', 'title': 'DF3DV-1K: A Large-Scale Dataset and Benchmark for Distractor-Free Novel View Synthesis', 'url': 'https://huggingface.co/papers/2604.13416', 'abstract': 'Abstract A large-scale real-world dataset called DF3DV-1K is introduced to address the lack of clean and cluttered image sets for distractor-free radiance field research, containing 1,048 scenes with 89,924 images across 128 distractor types and 161 scene themes, along with a curated subset DF3DV-41 for robustness evaluation, and demonstrates improved performance when used to fine-tune a diffusion-based 2D enhancer for radiance field methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Advances in radiance fields have enabled photorealistic novel view synthesis. In several domains, large-scale real-world datasets have been developed to support comprehensive benchmarking and to facilitate progress beyond scene-specific reconstruction. However, for distractor-free radiance fields, a large-scale dataset with clean and cluttered images per scene remains lacking, limiting the development. To address this gap, we introduce DF3DV-1K, a large-scale real-world dataset comprising 1,048 scenes, each providing clean and cluttered image sets for benchmarking. In total, the dataset contains 89,924 images captured using consumer cameras to mimic casual capture, spanning 128 distractor types and 161 scene themes across indoor and outdoor environments. A curated subset of 41 scenes, DF3DV-41, is systematically designed to evaluate the robustness of distractor-free radiance field methods under challenging scenarios. Using DF3DV-1K, we benchmark nine recent distractor-free radiance field methods and 3D Gaussian Splatting, identifying the most robust methods and the most challenging scenarios. Beyond benchmarking, we demonstrate an application of DF3DV-1K by fine-tuning a diffusion-based 2D enhancer to improve radiance field methods, achieving average improvements of 0.96 dB PSNR and 0.057 LPIPS on the held-out set (e.g., DF3DV-41) and the On-the-go dataset. We hope DF3DV-1K facilitates the development of distractor-free vision and promotes progress beyond scene-specific approaches. The dataset and leaderboard are available at https://johnnylu305.github.io/df3dv1k_web/.', 'score': 28, 'issue_id': 2458, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'd458bba6c3551e83', 'authors': ['Cheng-You Lu', 'Yi-Shan Hung', 'Wei-Ling Chi', 'Hao-Ping Wang', 'Charlie Li-Ting Tsai', 'Yu-Cheng Chang', 'Yu-Lun Liu', 'Thomas Do', 'Chin-Teng Lin'], 'affiliations': ['National Yang Ming Chiao Tung University', 'University of Sydney', 'University of Technology Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2604.13416.jpg', 'data': {'categories': ['#diffusion', '#3d', '#cv', '#synthetic', '#benchmark', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Датасет для обучения методов синтеза видов без помех', 'desc': "Представлена DF3DV-1K — крупномасштабный датасет с 1048 сценами и 89924 изображениями, специально собранный для исследования радиационных полей без помех. Датасет содержит чистые и захламленные версии сцен с 128 типами помех, что позволяет оценивать робастность методов реконструкции. Авторы провели бенчмарк девяти методов distractor-free радиационных полей и 3D Gaussian Splatting на этом датасете. Показано, что fine-tuning диффузионного 2D enhancer'а на данных DF3DV-1K улучшает качество синтеза новых видов на 0.96 дB по метрике PSNR."}, 'en': {'title': 'Unlocking Distractor-Free Radiance Fields with DF3DV-1K', 'desc': 'The paper introduces DF3DV-1K, a large-scale dataset designed for research in distractor-free radiance fields, containing 1,048 scenes and 89,924 images. This dataset includes both clean and cluttered images, covering 128 types of distractors and 161 scene themes, which are essential for comprehensive benchmarking. A curated subset, DF3DV-41, is specifically created to evaluate the robustness of various radiance field methods under challenging conditions. The authors demonstrate that fine-tuning a diffusion-based 2D enhancer using this dataset leads to significant performance improvements in radiance field applications.'}, 'zh': {'title': 'DF3DV-1K：推动无干扰辐射场研究的关键数据集', 'desc': '本文介绍了一个名为DF3DV-1K的大规模真实世界数据集，旨在解决缺乏干扰物图像集的问题。该数据集包含1048个场景，提供了89924张图像，涵盖128种干扰物类型和161种场景主题。为了评估无干扰辐射场方法的鲁棒性，本文还设计了一个子集DF3DV-41。通过使用DF3DV-1K进行基准测试，本文展示了改进的辐射场方法的性能，推动了无干扰视觉的发展。'}}}, {'id': 'https://huggingface.co/papers/2606.19704', 'title': 'Beyond Static Leaderboards: Predictive Validity for the Evaluation of LLM Agents', 'url': 'https://huggingface.co/papers/2606.19704', 'abstract': 'Abstract Aggregate-score leaderboards in agent benchmarks fail to capture deployment-relevant dimensions and show rank instability, necessitating new evaluation frameworks based on predictive validity and out-of-distribution criteria.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agent benchmarks are growing fast, but no single benchmark touches more than four or five of the dimensions that deployment exposes. This paper aggregates the largest coordinated deep-dive of one MCP-based industrial-agent benchmark to date: fourteen parallel implementation studies covering new asset classes (including a multi-modal visual extension), alternative orchestrations, retrieval strategies, reasoning modes, infrastructure optimizations, and evaluation-methodology probes. Consolidating those studies with seven prior agent benchmarks, we argue that aggregate-score leaderboards systematically underspecify deployed-agent evaluation. Rankings derived from aggregate scores do not transfer to out-of-distribution settings; recent public-to-hidden competition retrospectives provide direct empirical evidence of this rank instability. We propose ranking configurations by predictive validity, the correlation between in-sample and out-of-sample rank, rather than in-sample mean, and report a twelve-tier measurement apparatus that exposes the deployment-relevant dimensions HELM and its agent-era successors collapse. The position is operationalized through three falsifiable out-of-distribution criteria with explicit thresholds; existing evidence partly supports it but is too thin to confirm. We close with a pre-registered pilot design and a field-level vision for what the next generation of agentic benchmarks should report.', 'score': 28, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'd5bb4ed829da3e50', 'authors': ['Dhaval C. Patel', 'Kaoutar El Maghraoui', 'Shuxin Lin', 'Yusheng Li', 'Tianjun Feng', 'Chun-Yi Tsai', 'Yihan Sun', 'Wei Alexander Xin', 'Akshat Bhandari', 'Tanisha Rathod', 'Aaron Fan', 'Sanskruti Vijay Shejwal', 'Tomas Pasiecznik', 'Sagar Chethan Kumar', 'Tanmay Agarwal', 'Rohith Kanathur', 'Sam Colman', 'Amaan Sheikh', 'Dev Bahl', 'Ann Li', 'Krish Veera', 'Alimurtaza Mustafa Merchant', 'Shambhawi Baswaraj Bhure', 'Sajal Kumar Goyla', 'Chengrui Li', 'Kirthana Natarajan', 'Rui Li', 'Thomas Ajai', 'Rujing Li', 'Vivek G. Iyer', 'Sanjaii Vijayakumar', 'Yitong Bai', 'Ayal Yakobe', 'Darief Maes', 'Yassine Jebbouri', 'Tianyang Xu', 'Thai Quoc On', 'Vera Mazeeva', 'Winston Li', 'Yuval Shemla', 'Yeshitha Bhuvanesh', 'Rushin Bhatt', 'Siddharth Chethan Gowda', 'Alisha Vinod', 'Caroline Cahill', 'Shriya Aishani Rachakonda', 'Yunfeng Chen', 'Aryaman Agrawal', 'Aman Upganlawar', 'Mao Le Jonathan Ang', 'Yubin Sally Go', 'Madhav Rajkondawar', 'Yang-Jung Chen', 'Trisha Maturi', 'Ananya Kapoor', 'Andrew Li', 'Shrey Arora', 'Mana Abbaszadeh', 'Shen Li', 'Charles Xu', 'Byeolah Kwon'], 'affiliations': ['IBM'], 'pdf_title_img': 'assets/pdf/title_img/2606.19704.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents', '#survey', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'От агрегированных баллов к предсказательной валидности в бенчмарках агентов', 'desc': 'В работе анализируется проблема агрегированных рейтингов в бенчмарках для агентов, которые не отражают важные аспекты развёртывания систем. Авторы провели координированное исследование на основе MCP-бенчмарка с четырнадцатью параллельными имплементациями, изучив различные архитектуры, стратегии поиска, режимы рассуждений и методологии оценки. Они показали, что рейтинги на основе агрегированных оценок нестабильны и не переносятся на распределения данных, отличные от обучающих. Авторы предлагают ранжировать конфигурации по предсказательной валидности — корреляции между рейтингом внутри выборки и вне её — и описывают систему из двенадцати уровней измерений для оценки развёртываемых агентов.'}, 'en': {'title': 'Rethinking Agent Evaluation: From Scores to Predictive Validity', 'desc': 'This paper critiques current aggregate-score leaderboards used in evaluating agent benchmarks, highlighting their failure to reflect real-world deployment scenarios and their instability in rankings. It presents a comprehensive study of a new industrial-agent benchmark, incorporating various dimensions such as multi-modal visual capabilities and different evaluation methodologies. The authors argue for a shift towards ranking agents based on predictive validity, which assesses how well in-sample rankings correlate with out-of-sample performance. They propose a new measurement framework with specific out-of-distribution criteria to better capture the complexities of agent deployment.'}, 'zh': {'title': '重新定义代理评估标准', 'desc': '本文讨论了现有的代理基准测试中聚合分数排行榜的不足，认为这些排行榜无法有效捕捉与实际部署相关的维度，并且存在排名不稳定的问题。研究表明，现有的基准测试通常只覆盖了部署中涉及的四到五个维度，无法全面评估代理的性能。作者提出了一种新的评估框架，基于预测有效性和超出分布的标准来重新配置排名。最后，文章提出了一个十二层的测量工具，旨在更好地反映代理在实际应用中的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.20506', 'title': 'FreeStyle: Free Control of Style-Content Dual-Reference Generation from Community LoRA Mining', 'url': 'https://huggingface.co/papers/2606.20506', 'abstract': 'Abstract FreeStyle is a scalable dual-reference generation framework that uses community LoRA mining to create large-scale style-content triplets while addressing content leakage through disentanglement mechanisms and a comprehensive benchmark.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Style-content dual-reference generation aims to synthesize an image that preserves the structure and semantics of a content reference while adopting the style of a separate style reference.Despite recent progress, this setting remains challenging because models must balance content fidelity, style alignment, and instruction following avoiding semantic leakage from the style reference.A key bottleneck is the lack of large-scale triplet data with clean content-style separation and broad long-tail style coverage.In this work, we propose FreeStyle, a scalable dual-reference generation framework based on community LoRA mining.We treat community LoRAs as compositional anchors for style and content, and design a rigorous generation and filtering pipeline to construct large-scale Style-Reference and Content-Reference triplets across multiple base models.To address content leakage, we adopt a two-stage curriculum with stage-specific disentanglement mechanisms: an attention-level enrichment constraint that suppresses style-reference leakage in the style-transfer stage, and a frequency-aware RoPE modulation strategy that targets positional-correspondence-based leakage in the harder dual-reference stage.We also introduce a benchmark covering both style-reference and dual-reference generation, with evaluations on style similarity, content preservation, aesthetics, instruction following, and leakage rejection. The benchmark incorporates a style-invariant Content Alignment Score (CAS) and introduces a calibrated VLM-based Rejection Score for evaluating generation reliability and leakage suppression.Extensive experiments show that our model achieves a strong balance among style alignment, content preservation, and leakage suppression.', 'score': 25, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '8c13a0359ae2ff4f', 'authors': ['Jinghong Lan', 'Wei Cheng', 'Yunuo Chen', 'Ziqi Ye', 'Peng Xing', 'Yixiao Fang', 'Rui Wang', 'Yufeng Yang', 'Xuanyang Zhang', 'Xianfang Zeng', 'Difan Zou', 'Gang Yu', 'Chi Zhang'], 'affiliations': ['Fudan University', 'StepFun', 'University of Hong Kong', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2606.20506.jpg', 'data': {'categories': ['#synthetic', '#multimodal', '#cv', '#dataset', '#benchmark', '#leakage', '#training'], 'emoji': '🎨', 'ru': {'title': 'Чистое разделение стиля и содержания через LoRA и целевую дезентанглицию', 'desc': 'FreeStyle — это масштабируемая система для двухреференцной генерации изображений, которая использует майнинг LoRA из сообщества для создания больших наборов данных тройок стиль-контент. Система решает проблему утечки контента через механизмы разделения признаков на двух этапах: ограничения на уровне внимания для подавления влияния стиля и модуляцию позиционного кодирования RoPE для более сложных случаев. Авторы предлагают комплексный бенчмарк, который оценивает сходство стилей, сохранение содержания, эстетику и способность модели отклонять утечки контента. Экспериментальные результаты показывают, что модель достигает хорошего баланса между выравниванием стиля, сохранением контента и подавлением нежелательных утечек.'}, 'en': {'title': 'Balancing Style and Content with FreeStyle Framework', 'desc': "FreeStyle is a novel framework designed for dual-reference image generation that effectively combines style and content from different sources. It utilizes community LoRA mining to create extensive datasets of style-content triplets while preventing content leakage through advanced disentanglement techniques. The framework includes a two-stage curriculum that enhances the model's ability to maintain content fidelity and style alignment without compromising the integrity of the references. Additionally, FreeStyle introduces a comprehensive benchmark for evaluating the quality of generated images based on various criteria, ensuring robust performance across different styles and content types."}, 'zh': {'title': 'FreeStyle：风格与内容的完美结合', 'desc': 'FreeStyle是一个可扩展的双参考生成框架，利用社区LoRA挖掘创建大规模的风格-内容三元组，同时通过解耦机制和全面的基准测试来解决内容泄漏问题。该框架旨在合成一幅图像，既保留内容参考的结构和语义，又采用独立风格参考的风格。尽管最近取得了一些进展，但在内容保真度、风格一致性和指令遵循之间的平衡仍然具有挑战性。我们的工作提出了FreeStyle，通过社区LoRA作为风格和内容的组合锚点，构建了一个严格的生成和过滤管道，以构造大规模的风格参考和内容参考三元组。'}}}, {'id': 'https://huggingface.co/papers/2606.20404', 'title': 'FlowBender: Feedback-Aware Training for Self-Correcting Conditional Flows', 'url': 'https://huggingface.co/papers/2606.20404', 'abstract': 'Abstract FlowBender is a closed-loop framework that addresses constraint satisfaction in diffusion and flow models by training networks to correct alignment errors using inference-time feedback, outperforming traditional supervised and guidance-based approaches across multiple tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Conditional diffusion and flow models routinely fail to satisfy the very constraints that define their task. For instance, a depth-conditioned model often produces images whose re-extracted depth disagrees with the input, even though the forward operator--the depth predictor defining the constraint--is available during both training and inference. Existing approaches generally fall into two categories: supervised models that treat the conditioning signal as a static cue and ignore alignment information at inference, and guidance-based methods that consult it through hand-tuned linear updates, typically trading fidelity to the condition against the plausibility of the generated sample. We argue that the fundamental gap in both paradigms is that the model is never trained to utilize its own alignment error. We introduce FlowBender, a closed-loop framework that treats this error as a first-class input, training the network to learn a correction policy conditioned on inference-time feedback. At each step, an unguided look-ahead pass estimates the clean signal, a task-specific deviation is computed via the forward operator, and a refinement pass consumes this signal to produce a corrected velocity. We propose several variants of FlowBender, including a gradient-based formulation for differentiable operators and a zero-order variant for non-differentiable settings such as JPEG compression. For efficient sampling, we introduce a prior-step shortcut that enables closed-loop correction at a minimal additional computational cost. Across image-to-image translation, restoration, and 3D mesh texturing, FlowBender consistently outperforms standard supervised baselines, alignment-loss-augmented training, and state-of-the-art inference-time guidance, improving fidelity and plausibility simultaneously rather than trading them against each other. Project page: https://flow-bender.github.io/', 'score': 19, 'issue_id': 2458, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '74630e273427885e', 'authors': ['Daniel Gilo', 'Sven Elflein', 'Ido Sobol', 'Or Litany'], 'affiliations': ['NVIDIA', 'Technion', 'University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.20404.jpg', 'data': {'categories': ['#inference', '#training', '#3d'], 'emoji': '🔄', 'ru': {'title': 'Обучение моделей исправлять свои ошибки выравнивания в реальном времени', 'desc': 'FlowBender — это замкнутая система для генеративных диффузионных и потоковых моделей, которая обучает нейронную сеть исправлять ошибки выравнивания, используя обратную связь во время инференса. В отличие от традиционных подходов, которые либо игнорируют информацию о выравнивании на этапе генерации, либо используют простые линейные корректировки, FlowBender обучает модель анализировать собственные ошибки и вырабатывать оптимальную стратегию коррекции. Фреймворк включает прямой проход для оценки сигнала, вычисление отклонения через оператор задачи и рефайнмент проход для генерации скорректированной скорости диффузии. Метод одновременно улучшает как верность ограничениям, так и правдоподобность сгенерированных образцов на задачах трансляции изображений, восстановления и текстурирования 3D-моделей.'}, 'en': {'title': 'FlowBender: Correcting Alignment Errors in Real-Time', 'desc': 'FlowBender is a novel framework designed to improve the performance of diffusion and flow models by addressing alignment errors during inference. It trains networks to utilize feedback from their own predictions, allowing them to correct mistakes in real-time rather than relying solely on static conditioning signals. This approach contrasts with traditional methods that either ignore alignment information or use fixed updates, which can compromise the quality of generated outputs. By treating alignment errors as valuable input, FlowBender enhances the fidelity and plausibility of generated samples across various tasks, such as image translation and restoration.'}, 'zh': {'title': 'FlowBender：闭环框架提升模型对齐精度', 'desc': 'FlowBender是一个闭环框架，旨在解决扩散和流模型中的约束满足问题。它通过在推理时反馈来训练网络，纠正对齐错误，从而在多个任务中超越传统的监督和基于引导的方法。现有方法通常忽视对齐信息，而FlowBender则将对齐误差视为重要输入，训练网络学习基于反馈的修正策略。通过这种方式，FlowBender在图像到图像的转换、修复和3D网格纹理等任务中，始终优于标准的监督基线和最先进的推理时引导方法。'}}}, {'id': 'https://huggingface.co/papers/2606.20563', 'title': 'JanusMesh: Fast and Zero-Shot 3D Visual Illusion Generation via Cross-Space Denoising', 'url': 'https://huggingface.co/papers/2606.20563', 'abstract': 'Abstract A fast, training-free framework generates text-driven 3D visual illusions by decoupling generation into cross-space dual-branch denoising and view-conditioned texture synthesis for seamless geometric fusion and semantic coherence.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Creating 3D visual illusions, a single 3D mesh that reveals entirely different semantics from various viewing angles, is a fascinating but tough challenge. Existing optimization-based methods are slow and can produce oversaturated colors. In contrast, naive stitching approaches fail to produce geometrically coherent objects. This results in visible unnatural seams and semantic leaks. In this paper, we present a fast and training-free framework for generating text-driven 3D visual illusions. Our approach decouples the generation into two stages. First, we propose a cross-space dual-branch denoising process. This process dynamically decodes 3D latents into voxel space for CLIP-guided orientation alignment and Signed Distance Field (SDF) blending, which ensures seamless geometric fusion. Second, we introduce a view-conditioned texture synthesis module that projects and aggregates view-specific 2D diffusion priors onto the fused geometry. Extensive experiments demonstrate that our method generates highly realistic, dual-semantic 3D illusions in just 3-5 minutes. It significantly outperforms existing methods in geometric integrity, semantic recognizability, and efficiency. Project page: https://siang1105.github.io/JanusMesh.github.io/', 'score': 19, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '2eca99dd11ccfe9b', 'authors': ['Siang-Ling Zhang', 'Huai-Hsun Cheng', 'Tsung-Ju Yang', 'Yu-Lun Liu'], 'affiliations': ['National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2606.20563.jpg', 'data': {'categories': ['#diffusion', '#3d', '#multimodal'], 'emoji': '🎭', 'ru': {'title': 'Текстовая магия: 3D иллюзии из разных углов', 'desc': 'В работе предлагается быстрый фреймворк без обучения для создания текстовых 3D иллюзий, которые выглядят по-разному с разных углов обзора. Метод использует двухэтапный подход: сначала применяется кросс-пространственный двойной денойзинг с использованием CLIP для ориентации и SDF для слияния геометрии, а затем синтезируется текстура на основе условий представления сцены. Фреймворк проецирует 2D приоры диффузионной модели на объединённую геометрию, обеспечивая семантическую согласованность и геометрическую целостность. Метод генерирует реалистичные 3D иллюзии с двойной семантикой за 3-5 минут, превосходя существующие подходы по качеству и скорости.'}, 'en': {'title': 'Fast and Seamless 3D Visual Illusions from Text', 'desc': "This paper presents a new method for creating 3D visual illusions from text descriptions without the need for extensive training. The approach separates the generation process into two main stages: first, it uses a dual-branch denoising technique to align 3D shapes with text prompts and ensure smooth geometry. Next, it applies a texture synthesis method that adapts textures based on the viewer's perspective, enhancing realism. The results show that this framework is faster and produces better quality 3D illusions compared to traditional methods, achieving high geometric and semantic fidelity."}, 'zh': {'title': '快速生成文本驱动的3D视觉幻觉', 'desc': '本文提出了一种快速且无需训练的框架，用于生成文本驱动的3D视觉幻觉。该方法将生成过程分为两个阶段：首先，通过交叉空间双分支去噪过程，实现3D潜在空间到体素空间的动态解码，确保几何融合的无缝性。其次，引入视角条件的纹理合成模块，将视角特定的2D扩散先验投影到融合的几何体上。实验表明，该方法在几何完整性、语义可识别性和效率方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2606.19531', 'title': 'ImageWAM: Do World Action Models Really Need Video Generation, or Just Image Editing?', 'url': 'https://huggingface.co/papers/2606.19531', 'abstract': 'Abstract ImageWAM demonstrates that pretrained image editing models can effectively replace video generation in world action models for robot control, achieving better performance with reduced computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World Action Models (WAMs) commonly rely on video generation to bridge visual world modeling and robot control. However, video-based WAMs face three coupled limitations: dense multi-frame future tokens make inference costly, full video prediction spends capacity on action-irrelevant temporal and appearance details, and long-horizon future imagination may introduce errors that mislead action prediction. These issues raise a simple question: Does world action model really need video generation? We propose ImageWAM, a simple WAM framework that repurposes pretrained image editing models for robot action prediction. In contrast to video generation, image editing provides a better-matched prior: it only needs to model a target-frame transformation, focuses on action-relevant current-to-target visual differences, and grounds task instructions to localized visual changes through edit pretraining. In practice, ImageWAM does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context. ImageWAM outperforms standard VLA baselines and matching competitive WAMs without additional policy pretraining across different simulator and real-world experiments. It also reduces FLOPs to 1/6 and latency to 1/4 of video-based WAMs. Attention analysis further shows that editing caches focus on task-relevant change regions, supporting image editing as an effective alternative to video-based world-action modeling.', 'score': 14, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'df612677557af1ac', 'authors': ['Yuyang Zhang', 'Wenyao Zhang', 'Zekun Qi', 'He Zhang', 'Haitao Lin', 'Jingbo Zhang', 'Yao Mu', 'Xiaokang Yang', 'Wenjun Zeng', 'Xin Jin'], 'affiliations': ['Eastern Institute of Technology', 'Shanghai Jiao Tong University', 'Tencent Robotics X', 'Tsinghua University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2606.19531.jpg', 'data': {'categories': ['#inference', '#architecture', '#cv', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От видео к редактированию: более эффективная мировая модель для робототехники', 'desc': 'В статье предложен ImageWAM — новый подход к моделям действий для управления роботами, который заменяет традиционную генерацию видео на переиспользование предобученных моделей редактирования изображений. Авторы показывают, что редактирование изображений обеспечивает лучше подходящий приор для мировой модели, так как фокусируется только на релевантных для действия визуальных изменениях, избегая траты вычислительных ресурсов на предсказание деталей, не влияющих на управление. Предложенный метод использует KV кэши из процесса денойзинга как компактный контекст мира-действия для кондиционирования эксперта действий на основе flow-matching. ImageWAM демонстрирует превосходную производительность по сравнению с видео-ориентированными методами, одновременно снижая вычислительную сложность в 6 раз и уменьшая задержку в 4 раза.'}, 'en': {'title': 'ImageWAM: Revolutionizing Robot Control with Image Editing Models', 'desc': 'ImageWAM introduces a novel approach to world action models (WAMs) by utilizing pretrained image editing models instead of traditional video generation methods for robot control. This method addresses the limitations of video-based WAMs, such as high computational costs and inaccuracies in long-term predictions. By focusing on action-relevant visual changes rather than generating full video sequences, ImageWAM enhances performance while significantly reducing computational resources. The results demonstrate that ImageWAM not only outperforms existing video-based models but also streamlines the inference process, making it a more efficient solution for robot action prediction.'}, 'zh': {'title': '图像编辑模型：机器人控制的新选择', 'desc': 'ImageWAM展示了预训练的图像编辑模型可以有效替代视频生成，用于机器人控制中的世界动作模型，从而实现更好的性能和更低的计算成本。传统的世界动作模型依赖视频生成，但面临多帧未来标记密集、视频预测消耗计算资源以及长时间预测可能引入错误等问题。ImageWAM通过重新利用图像编辑模型，专注于目标帧的转换，强调与动作相关的视觉差异，从而提高了机器人动作预测的准确性。实验结果表明，ImageWAM在不同的模拟器和真实世界实验中，性能优于标准视频生成的世界动作模型，并显著降低了计算复杂度。'}}}, {'id': 'https://huggingface.co/papers/2606.20545', 'title': 'Current World Models Lack a Persistent State Core', 'url': 'https://huggingface.co/papers/2606.20545', 'abstract': 'Abstract Current world models fail to maintain consistent world states when unobserved, indicating a need for design changes that prioritize physical state stability over appearance fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models are increasingly regarded as a decisive step toward artificial general intelligence, yet modeling the physical world demands more than rendering convincing frames on demand: it requires an internal world state that keeps evolving over time, decoupled from observation, so that objects endure and events run to their conclusions whether or not a camera is watching, much as the moon holds to its orbit when no one is looking. This requirement is a blind spot of existing benchmarks, which reward surface properties such as fidelity, motion, and camera controllability while never asking whether a generated world keeps evolving once it is unobserved. We introduce WRBench, the first systematic diagnostic benchmark that treats camera motion as an intervention on observability and resolves evaluation into a human-calibrated chain that asks whether the camera executes the requested interaction, whether the scene stays continuous and identifiable while in view, and whether a returning target remains consistent with the event that was set in motion. Across 9{,}600 videos from 23 models spanning four control paradigms, one finding proves stubborn: current systems maintain the observed world as a tracking shot, resuming a returning target in the state at which it was abandoned rather than advancing the event while it went unseen. Because this failure recurs across control paradigms, model families, and increments of scale, robust world-state evolution does not follow from cleaner imagery, tighter control, richer geometric priors, or sheer parameter count We therefore argue that the stability of the physical state kernel and the consistency of worldlines under viewpoint intervention should become first-class objectives of world-model design, so that a world model captures how the world will unfold rather than how the next frame appears.', 'score': 11, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '0064f201e8ff1a57', 'authors': ['Jinpeng Lu', 'Dexu Zhu', 'Haoyuan Shi', 'Linghan Cai', 'Guo Tang', 'Yinda Chen', 'Jie Cao', 'Duyu Tang', 'Yi Zhang', 'Yong Dai', 'Xiaozhu Ju'], 'affiliations': ['Beijing Innovation Center of Humanoid Robotics (X-Humanoid)', 'Dresden University of Technology', 'NLPR, Institute of Automation, Chinese Academy of Sciences', 'Peking University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.20545.jpg', 'data': {'categories': ['#video', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Физическое состояние важнее внешнего вида: переосмысление целей моделей мира', 'desc': 'В статье исследуется проблема современных моделей мира, которые не сохраняют консистентность физического состояния, когда объекты находятся вне поля зрения камеры. Авторы предлагают WRBench — первый систематический бенчмарк для диагностики этой проблемы, где камера используется как инструмент для проверки наблюдаемости сцены. Исследование 9600 видео из 23 моделей показывает, что все текущие системы при возврате камеры просто воспроизводят замороженное состояние объектов вместо естественного развития событий, происходивших во время отсутствия наблюдения. Авторы заключают, что стабильность физического состояния и консистентность мировых линий должны стать приоритетом при разработке моделей мира вместо фокуса на качество рендеринга и управляемость камеры.'}, 'en': {'title': 'Prioritizing Stability Over Appearance in World Models', 'desc': 'This paper discusses the limitations of current world models in machine learning, which struggle to maintain consistent states when not being observed. It emphasizes the importance of having a stable internal representation of the physical world that evolves independently of observation, similar to how real-world objects and events exist regardless of whether they are being watched. The authors introduce WRBench, a new benchmark designed to evaluate how well these models maintain continuity and consistency in the world state when the camera is not observing. They argue that improving the stability of the physical state and the consistency of events should be prioritized in the design of world models, rather than just focusing on visual fidelity.'}, 'zh': {'title': '稳定的物理状态是世界模型设计的核心', 'desc': '当前的世界模型在未观察时无法保持一致的世界状态，这表明需要设计变更，优先考虑物理状态的稳定性而非外观的真实感。为了实现人工通用智能，建模物理世界不仅需要生成逼真的画面，还需要一个不断演变的内部世界状态，与观察无关。现有基准测试忽视了这一点，主要关注表面属性，如真实感和运动控制，而没有考虑生成的世界在未观察时是否仍在演变。我们提出了WRBench，这是第一个系统化的诊断基准，旨在评估世界模型在不同控制范式下的表现，强调物理状态的稳定性和一致性应成为世界模型设计的首要目标。'}}}, {'id': 'https://huggingface.co/papers/2606.19980', 'title': 'ENPIRE: Agentic Robot Policy Self-Improvement in the Real World', 'url': 'https://huggingface.co/papers/2606.19980', 'abstract': 'Abstract ENPIRE framework enables autonomous robotics research through a closed-loop system that automates policy improvement via environment feedback, policy refinement, and evolutionary code optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Achieving dexterous robotic manipulation in the real world heavily relies on human supervision and algorithm engineering, which becomes a central bottleneck in the pursuit of general physical intelligence. Although emerging coding agents can generate code to automate algorithm search, their successes remain largely confined in digital environments. We conjecture that the missing abstraction to automate robotics research is a repeatable feedback loop for real-world policy improvement: reset the scene, execute a policy, verify the outcome, and refine the next iteration. To bridge this gap, we introduce ENPIRE, a harness framework for coding agents that instantiates this physical feedback routine with four core modules: an Environment module (EN) for automatic reset and verification, a Policy Improvement module (PI) that launches policy refinement, a Rollout module (R) to evaluate policies with one or multiple physical robots operating in parallel, and an Evolution module (E) in which coding agents analyze logs, consult literature, improve training infrastructure and algorithm code to address failure modes. This closed-loop system transforms real-world manipulation learning into a controllable optimization procedure, minimizing human effort while allowing fair ablations across training recipe and agent variants. Powered by ENPIRE, frontier coding agents can autonomously train a policy to achieve a 99% success rate on challenging, dexterous manipulation tasks, such as organizing a pin box, fastening a zip tie, and tool use, a process that further accelerates when we dispatch an agent team on a robot fleet. Our results suggest a practical and scalable path toward deploying coding agents to autonomously advancing robotics in the physical world.', 'score': 10, 'issue_id': 2457, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '235104ba37ea64ca', 'authors': ['Wenli Xiao', 'Jia Xie', 'Tonghe Zhang', 'Haotian Lin', 'Letian "Max" Fu', 'Haoru Xue', 'Jalen Lu', 'Yi Yang', 'Cunxi Dai', 'Zi Wang', 'Jimmy Wu', 'Guanzhi Wang', 'S. Shankar Sastry', 'Ken Goldberg', 'Linxi "Jim" Fan', 'Yuke Zhu', 'Guanya Shi'], 'affiliations': ['CMU', 'NVIDIA', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.19980.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Замкнутый цикл обучения: coding agents для автономного развития робототехники', 'desc': 'ENPIRE — это фреймворк, который использует coding agents для автоматизации исследований в робототехнике через замкнутый цикл обратной связи с реальным миром. Система включает четыре ключевых модуля: автоматический сброс и проверку окружения, улучшение политики, параллельное тестирование на робот-флоте и эволюцию кода с анализом ошибок. Фреймворк трансформирует обучение манипуляции в управляемую процедуру оптимизации, минимизируя человеческое вмешательство и позволяя проводить честные сравнения различных алгоритмов. Благодаря ENPIRE coding agents могут автономно обучать политики достигать 99% успеха в сложных манипуляционных задачах в реальном мире.'}, 'en': {'title': 'ENPIRE: Automating Robotics Research with Feedback Loops', 'desc': 'The ENPIRE framework revolutionizes autonomous robotics by creating a closed-loop system that enhances policy improvement through real-world feedback. It consists of four key modules: Environment for resetting and verifying tasks, Policy Improvement for refining strategies, Rollout for evaluating policies with multiple robots, and Evolution for analyzing performance and improving algorithms. This system minimizes the need for human intervention and allows for systematic testing of different training methods and agent types. With ENPIRE, coding agents can achieve high success rates in complex manipulation tasks, paving the way for scalable advancements in robotics.'}, 'zh': {'title': 'ENPIRE：自主机器人研究的新路径', 'desc': 'ENPIRE框架通过闭环系统实现自主机器人研究，自动化政策改进，利用环境反馈、政策细化和进化代码优化。该框架包含四个核心模块：环境模块（EN）用于自动重置和验证，政策改进模块（PI）进行政策细化，滚动模块（R）评估多个物理机器人并行操作的政策，以及进化模块（E）分析日志和改进算法代码。通过ENPIRE，前沿编码代理能够在复杂的灵巧操作任务中实现99%的成功率，显著减少人类的干预。我们的研究表明，ENPIRE为在物理世界中自主推进机器人技术提供了一条实用且可扩展的路径。'}}}, {'id': 'https://huggingface.co/papers/2606.19605', 'title': 'FAPO: Fully Autonomous Prompt Optimization of Multi-Step LLM Pipelines', 'url': 'https://huggingface.co/papers/2606.19605', 'abstract': 'Abstract FAPO optimizes LLM pipelines by combining prompt editing with structural changes, demonstrating superior performance across multiple benchmarks and security tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-step LLM pipelines fail through interactions among retrieval, reasoning, and formatting steps, so prompt-only optimization can miss bottlenecks in the chain. We present FAPO (Fully Autonomous Prompt Optimization), a framework that lets Claude Code optimize an LLM pipeline inside a standardized codebase. FAPO evaluates a pipeline, inspects intermediate steps, diagnoses failures, proposes scoped changes, and validates variants repeatedly to optimize against a score function. It first tries prompt edits and, only when prompt optimization appears insufficient, changes chain structure within the permitted scope when attribution identifies a structural bottleneck. Across six benchmarks and three task models, FAPO beats the baseline GEPA in 15 of 18 model-benchmark comparisons. In 11 model-benchmark comparisons, FAPO wins with non-overlapping mean pm trial-standard-deviation ranges, and the mean FAPO-GEPA gain is +14.1 pp. In the six HoVer and IFBench comparisons where prompt-first search escalated to structural changes, FAPO wins all six with a mean gain of +33.8 pp. FAPO also improves performance on security tasks: on CTIBench-RCM, a security CVE-to-CWE task, prompt-only FAPO lifts test accuracy by +4.0 pp on GPT-5, +7.1 pp on Foundation-Sec-8B-Instruct, and +2.0 pp on Foundation-Sec-8B-Reasoning. These results position FAPO as a state-of-the-art pipeline optimization technique for both general-purpose and security-focused tasks.', 'score': 10, 'issue_id': 2457, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '3c06789425acaf1a', 'authors': ['Paul Kassianik', 'Baturay Saglam', 'Huaibo Zhao', 'Blaine Nelson', 'Supriti Vijay', 'Aman Priyanshu', 'Amin Karbasi'], 'affiliations': ['Cisco Systems Inc.', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19605.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#training', '#agents', '#security'], 'emoji': '⚙️', 'ru': {'title': 'От редактирования промптов к переделке архитектуры: умная оптимизация LLM-конвейеров', 'desc': 'FAPO — это фреймворк для автоматической оптимизации многоэтапных LLM-пайплайнов, которые объединяют поиск информации, логический вывод и форматирование. Система сначала пытается улучшить пайплайн через редактирование промптов, а когда этого недостаточно, вносит структурные изменения в цепь обработки. Фреймворк проводит диагностику ошибок на промежуточных шагах и многократно валидирует варианты решения, получая прирост производительности в среднем на 14.1 процентных пункта относительно базового метода GEPA. FAPO показывает эффективность как на стандартных бенчмарках, так и на задачах безопасности, включая анализ уязвимостей CVE-к-CWE.'}, 'en': {'title': 'Optimize LLM Pipelines with FAPO: Smart Changes for Better Performance!', 'desc': 'FAPO (Fully Autonomous Prompt Optimization) enhances large language model (LLM) pipelines by integrating prompt editing with structural modifications. It identifies and addresses bottlenecks in the pipeline by evaluating intermediate steps and diagnosing failures, allowing for targeted optimizations. The framework first attempts to improve performance through prompt adjustments, and if necessary, it modifies the pipeline structure to resolve deeper issues. FAPO has demonstrated significant improvements over baseline methods across various benchmarks, particularly excelling in both general and security-related tasks.'}, 'zh': {'title': 'FAPO：优化LLM管道的新方法', 'desc': 'FAPO（完全自主提示优化）是一种优化大型语言模型（LLM）管道的框架，通过结合提示编辑和结构变化来提高性能。该方法能够评估管道、检查中间步骤、诊断失败并提出改进建议，从而优化模型的表现。FAPO在多个基准测试和安全任务中表现优异，超过了传统的GEPA方法。通过在提示优化不足时进行结构调整，FAPO在18个模型-基准比较中赢得了15个，显示出其在通用和安全任务中的先进性。'}}}, {'id': 'https://huggingface.co/papers/2606.17053', 'title': 'Context-Aware RL for Agentic and Multimodal LLMs', 'url': 'https://huggingface.co/papers/2606.17053', 'abstract': 'Abstract ContextRL enhances long-horizon reasoning and multimodal performance through reinforcement learning that rewards context selection for supporting query-answer pairs, achieving improvements over standard methods on diverse benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) often fail when answering requires identifying a small but decisive piece of evidence within a long or complex context, such as a single line in a tool trace or a subtle detail in an image. We propose ContextRL, a context-aware reinforcement learning (RL) method that improves long-horizon reasoning and multimodal performance through an indirect auxiliary objective. Instead of supervising only the final answer, ContextRL presents the model with a query, an answer, and two highly similar contexts, and rewards it for selecting the context that supports the query--answer pair, thereby encouraging fine-grained grounding. We construct contrastive context data in two domains: for coding agents, trajectories serve as contexts, yielding 1k pairs built via condition filtering; for multimodal reasoning, images serve as contexts, yielding 7K pairs built via generative editing and similarity search. ContextRL achieves average gains of +2.2% over standard GRPO on 5 long-horizon benchmarks, and +1.8% across 12 diverse visual question answering benchmarks. To disentangle the effect of the proposed objective from that of additional data, we compare against data-augmentation baselines that repurpose the same contrastive contexts as standard query--context--answer examples. These baselines provide little to no improvement, showing that the gains arise from the proposed context-selection objective rather than from the contrastive data alone.', 'score': 10, 'issue_id': 2460, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'd6f943a20ece6bbf', 'authors': ['Peiyang Xu', 'Bangzheng Li', 'Sijia Liu', 'Karthik R. Narasimhan', 'Pramod Viswanath', 'Prateek Mittal', 'Xingyu Fu'], 'affiliations': ['Princeton University', 'UC Davis'], 'pdf_title_img': 'assets/pdf/title_img/2606.17053.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#multimodal', '#reasoning', '#alignment', '#rlhf', '#dataset', '#agents', '#long_context', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Обучение моделей через вознаграждение правильного выбора контекста', 'desc': 'Авторы предлагают ContextRL — метод обучения с подкреплением, который улучшает способность больших языковых моделей к длительному рассуждению и мультимодальным задачам. Вместо прямого обучения на финальные ответы, метод награждает модель за правильный выбор контекста из двух похожих вариантов, поддерживающего пару вопрос-ответ. Для обучения авторы создали контрастивные датасеты в двух областях: траектории выполнения кода (1K пар) и визуальное мультимодальное понимание (7K пар). Метод показал улучшения на +2.2% в сравнении с базовым подходом на бенчмарках длительного рассуждения и +1.8% на задачах визуального вопрошания.'}, 'en': {'title': 'Empowering Models with Contextual Reinforcement Learning', 'desc': 'ContextRL is a novel reinforcement learning approach designed to enhance long-horizon reasoning and multimodal performance in large language models. It focuses on rewarding the model for selecting the most relevant context that supports a given query-answer pair, rather than just supervising the final answer. By constructing contrastive context data from coding and visual domains, ContextRL encourages fine-grained grounding, leading to improved performance on various benchmarks. The method demonstrates significant gains over standard techniques, highlighting the importance of context selection in complex reasoning tasks.'}, 'zh': {'title': 'ContextRL：提升推理与多模态性能的强化学习方法', 'desc': 'ContextRL是一种增强长时间推理和多模态性能的强化学习方法。它通过奖励模型选择支持查询-答案对的上下文，来提高模型的表现。与传统方法相比，ContextRL在多个基准测试中取得了显著的改进，特别是在长时间推理和视觉问答任务中。该方法通过构建对比上下文数据，促进了模型对细节的精细理解。'}}}, {'id': 'https://huggingface.co/papers/2606.16122', 'title': 'Thinking with Visual Grounding', 'url': 'https://huggingface.co/papers/2606.16122', 'abstract': 'Abstract Visually grounded thinking integrates natural-language reasoning with explicit visual evidence grounding in vision-language models, improving reasoning accuracy through scalable synthesis and reinforcement learning techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual thinking should not only sound right; it should show its evidence. While recent vision-language models (VLMs) can produce natural-language reasoning traces, these traces often leave the supporting image regions implicit, making them hard to verify and difficult to supervise. We introduce visually grounded thinking, a reasoning process in which models interleave natural-language thoughts with explicit point or box groundings of the visual evidence used at each step. This lets the model express intermediate reasoning in language while grounding key objects in the image regions they refer to. To train this behavior, we construct a scalable synthesis pipeline that distills correct visual reasoning traces, extracts the visual objects required by the traces, grounds them with a SAM3-based agent, and derives aligned point and box supervision from the resulting masks. We further propose grounding-aware reinforcement learning, which combines answer correctness rewards with dense grounding rewards that score whether generated object references match the correct image evidence. Across two counting benchmarks and four spatial reasoning benchmarks, adding visually grounded thinking to Gemma3-4B-IT consistently improves performance over the original model and the non-grounded thinking baseline. On spatial reasoning, the visually grounded thinking 4B models match, and in some cases surpass, Gemma3-27B-IT from the same model family. Our analysis shows that point grounding is well suited to counting, while box grounding benefits most from explicit grounding rewards on spatial tasks. Overall, our results show that VLMs think better when their intermediate thoughts are tied to the image regions that make them true.', 'score': 10, 'issue_id': 2457, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '378689b46a8fc889', 'authors': ['Junkai Zhang', 'Yihe Deng', 'Kai-Wei Chang', 'Wei Wang'], 'affiliations': ['University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2606.16122.jpg', 'data': {'categories': ['#rlhf', '#multimodal', '#benchmark', '#cv', '#training', '#agents', '#rl', '#interpretability', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Привязать мысли к доказательствам: визуально обоснованное рассуждение в vision-language моделях', 'desc': 'В работе предлагается подход визуально обоснованного мышления для vision-language моделей, при котором модель переплетает рассуждения на естественном языке с явным указанием визуальных доказательств на изображении. Для обучения этому поведению авторы разработали масштабируемый конвейер синтеза, который извлекает правильные следы рассуждений, грундирует визуальные объекты с помощью агента на основе SAM3 и получает размеченные точки и боксы. Они также предложили grounding-aware обучение с подкреплением, которое объединяет награды за правильность ответов с плотными наградами за грундинг, проверяя соответствие ссылок на объекты реальным областям изображения. Эксперименты на бенчмарках подсчета и пространственного рассуждения показали, что визуально обоснованное мышление значительно улучшает производительность моделей, позволяя компактным моделям сравняться с намного большими версиями.'}, 'en': {'title': 'Enhancing Reasoning with Visual Evidence in Language Models', 'desc': 'This paper introduces visually grounded thinking, a method that enhances reasoning in vision-language models (VLMs) by linking natural-language reasoning with specific visual evidence. It addresses the challenge of implicit visual support in reasoning traces by allowing models to explicitly refere
