gories': ['#transfer_learning'], 'emoji': '🔄', 'ru': {'title': 'Байт-уровневая дистилляция как универсальный мост между токенизаторами', 'desc': 'Работа предлагает метод дистилляции знаний между языковыми моделями с разными токенизаторами на уровне байтов. Вместо сложных эвристических подходов для выравнивания словарей, авторы используют общий байт-уровневый интерфейс как универсальное представление. Метод включает преобразование распределения вероятностей учителя в байт-уровневые вероятности и добавление лёгкого декодера студенту для дистилляции через общее представление. Несмотря на простоту, предложенный подход показывает конкурентные или лучшие результаты по сравнению с существующими методами на моделях от 1B до 8B параметров.'}, 'en': {'title': 'Simplifying Knowledge Transfer with Byte-Level Distillation', 'desc': 'This paper introduces Byte-Level Distillation (BLD), a method for transferring knowledge between language models that use different tokenizers. By operating at the byte level, BLD simplifies the process of cross-tokenizer distillation (CTD) and avoids the complexity of aligning different vocabularies. The authors demonstrate that BLD achieves competitive performance compared to more complex existing methods, even outperforming them on several benchmarks. This approach highlights the byte level as an effective common interface for knowledge transfer, while also acknowledging that challenges in CTD remain.'}, 'zh': {'title': '字节级蒸馏：简化跨分词器知识转移的有效方法', 'desc': '本文提出了一种名为字节级蒸馏（Byte-Level Distillation, BLD）的方法，旨在解决跨分词器知识转移的问题。通过在字节级别进行操作，BLD能够简化不同分词器之间的知识传递，避免了复杂的对齐策略。实验结果表明，尽管方法简单，BLD在多个基准测试中表现出色，甚至超过了一些复杂的现有方法。这表明字节级别是跨分词器知识转移的自然共同基础，但在所有任务和基准上仍需进一步改进。'}}}, {'id': 'https://huggingface.co/papers/2604.04514', 'title': 'SuperLocalMemory V3.3: The Living Brain -- Biologically-Inspired Forgetting, Cognitive Quantization, and Multi-Channel Retrieval for Zero-LLM Agent Memory Systems', 'url': 'https://huggingface.co/papers/2604.04514', 'abstract': 'Abstract A new local-first agent memory system implements comprehensive cognitive memory processes with enhanced retrieval and forgetting mechanisms, achieving superior performance in zero-LLM settings.  AI-generated summary AI coding agents operate in a paradox: they possess vast parametric knowledge yet cannot remember a conversation from an hour ago. Existing memory systems store text in vector databases with single-channel retrieval, require cloud LLMs for core operations, and implement none of the cognitive processes that make human memory effective.   We present SuperLocalMemory V3.3 ("The Living Brain"), a local-first agent memory system implementing the full cognitive memory taxonomy with mathematical lifecycle dynamics. Building on the information-geometric foundations of V3.2 (arXiv:2603.14588), we introduce five contributions: (1) Fisher-Rao Quantization-Aware Distance (FRQAD) -- a new metric on the Gaussian statistical manifold achieving 100% precision at preferring high-fidelity embeddings over quantized ones (vs 85.6% for cosine), with zero prior art; (2) Ebbinghaus Adaptive Forgetting with lifecycle-aware quantization -- the first mathematical forgetting curve in local agent memory coupled to progressive embedding compression, achieving 6.7x discriminative power; (3) 7-channel cognitive retrieval spanning semantic, keyword, entity graph, temporal, spreading activation, consolidation, and Hopfield associative channels, achieving 70.4% on LoCoMo in zero-LLM Mode A; (4) memory parameterization implementing Long-Term Implicit memory via soft prompts; (5) zero-friction auto-cognitive pipeline automating the complete memory lifecycle.   On LoCoMo, V3.3 achieves 70.4% in Mode A (zero-LLM), with +23.8pp on multi-hop and +12.7pp on adversarial. V3.2 achieved 74.8% Mode A and 87.7% Mode C; the 4.4pp gap reflects a deliberate architectural trade-off. SLM V3.3 is open source under the Elastic License 2.0, runs entirely on CPU, with over 5,000 monthly downloads.', 'score': 2, 'issue_id': 1950, 'pub_date': '2026-04-06', 'pub_date_card': {'ru': '6 апреля', 'en': 'April 6', 'zh': '4月6日'}, 'hash': '978bc60ce10520bd', 'authors': ['Varun Pratap Bhardwaj'], 'affiliations': ['Independent Researcher, Solution Architect India'], 'pdf_title_img': 'assets/pdf/title_img/2604.04514.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#architecture', '#training', '#agents', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Локальный мозг для AI: память без облака', 'desc': 'Представлена система памяти SuperLocalMemory V3.3 для AI агентов, которая работает локально без зависимости от облачных LLM и реализует полную когнитивную архитектуру памяти. Система использует новую метрику FRQAD для оценки качества векторных представлений и внедряет адаптивное забывание на основе кривой Эббингауза, связанное со сжатием эмбеддингов. Поиск информации осуществляется через семь каналов: семантический, ключевые слова, граф сущностей, временной, распространение активации, консолидация и ассоциативная память Хопфилда. На бенчмарке LoCoMo система достигает 70.4% точности в режиме без использования LLM с значительным улучшением на многошаговых задачах и состязательных примерах.'}, 'en': {'title': 'Empowering AI with Human-like Memory', 'desc': 'The paper introduces SuperLocalMemory V3.3, a local-first memory system designed to enhance cognitive memory processes in AI agents. It features advanced retrieval and forgetting mechanisms that allow for improved performance without relying on cloud-based large language models (LLMs). Key innovations include a new distance metric for high-fidelity embeddings, an adaptive forgetting curve, and a multi-channel retrieval system that mimics human memory. The system demonstrates significant improvements in memory efficiency and effectiveness, achieving notable performance metrics in zero-LLM settings.'}, 'zh': {'title': '本地优先的智能记忆系统：超越传统记忆的边界', 'desc': '本文介绍了一种新的本地优先代理记忆系统，名为SuperLocalMemory V3.3（"活脑"），它实现了全面的认知记忆过程，并增强了检索和遗忘机制。在零LLM环境下，该系统的性能优于现有的记忆系统，能够更好地模拟人类的记忆功能。该系统引入了五个重要的贡献，包括新的度量标准FRQAD和自适应遗忘机制，显著提高了记忆的区分能力。通过多通道的认知检索，SuperLocalMemory V3.3在LoCoMo测试中取得了70.4%的成绩，展示了其在本地记忆管理中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.15231', 'title': 'RadAgent: A tool-using AI agent for stepwise interpretation of chest computed tomography', 'url': 'https://huggingface.co/papers/2604.15231', 'abstract': 'Abstract RadAgent, a tool-using AI agent, enhances chest CT report generation through interpretable step-by-step reasoning traces that improve clinical accuracy, robustness, and faithfulness compared to existing 3D vision-language models.  AI-generated summary Vision-language models (VLM) have markedly advanced AI-driven interpretation and reporting of complex medical imaging, such as computed tomography (CT). Yet, existing methods largely relegate clinicians to passive observers of final outputs, offering no interpretable reasoning trace for them to inspect, validate, or refine. To address this, we introduce RadAgent, a tool-using AI agent that generates CT reports through a stepwise and interpretable process. Each resulting report is accompanied by a fully inspectable trace of intermediate decisions and tool interactions, allowing clinicians to examine how the reported findings are derived. In our experiments, we observe that RadAgent improves Chest CT report generation over its 3D VLM counterpart, CT-Chat, across three dimensions. Clinical accuracy improves by 6.0 points (36.4% relative) in macro-F1 and 5.4 points (19.6% relative) in micro-F1. Robustness under adversarial conditions improves by 24.7 points (41.9% relative). Furthermore, RadAgent achieves 37.0% in faithfulness, a new capability entirely absent in its 3D VLM counterpart. By structuring the interpretation of chest CT as an explicit, tool-augmented and iterative reasoning trace, RadAgent brings us closer toward transparent and reliable AI for radiology.', 'score': 1, 'issue_id': 1952, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '8a2a30d5a58b3023', 'authors': ['Mélanie Roschewitz', 'Kenneth Styppa', 'Yitian Tao', 'Jiwoong Sohn', 'Jean-Benoit Delbrouck', 'Benjamin Gundersen', 'Nicolas Deperrois', 'Christian Bluethgen', 'Julia Vogt', 'Bjoern Menze', 'Farhad Nooralahzadeh', 'Michael Krauthammer', 'Michael Moor'], 'affiliations': ['ETH AI Center', 'ETH Zurich', 'Heidelberg University', 'Stanford University', 'University of Zurich', 'Zurich University of Applied Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.15231.jpg', 'data': {'categories': ['#healthcare', '#multimodal', '#3d', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Прозрачное ИИ для радиологии через интерпретируемое пошаговое рассуждение', 'desc': 'RadAgent — это агент на основе больших языковых моделей, который генерирует отчеты по снимкам грудной клетки (CT) через пошаговое рассуждение с использованием инструментов. Система обеспечивает полную интерпретируемость процесса анализа, позволяя клиницистам проверять и валидировать промежуточные решения. По сравнению с существующими трёхмерными vision-language моделями, RadAgent достигает значительного улучшения клинической точности (на 6.0 пункта в macro-F1), устойчивости к adversarial атакам и впервые демонстрирует высокий уровень верности (faithfulness) в 37%. Прозрачное и итеративное рассуждение делает эту систему более надёжным инструментом для радиологии.'}, 'en': {'title': 'RadAgent: Transparent AI for Accurate Chest CT Reporting', 'desc': "RadAgent is an advanced AI tool designed to enhance the generation of chest CT reports by providing clear and interpretable reasoning for its decisions. Unlike traditional vision-language models, RadAgent allows clinicians to see the step-by-step process behind the AI's conclusions, improving trust and validation of the results. In tests, RadAgent demonstrated significant improvements in clinical accuracy, robustness against errors, and faithfulness of the reports compared to existing models. This innovative approach aims to make AI in radiology more transparent and reliable for medical professionals."}, 'zh': {'title': 'RadAgent：透明可靠的胸部CT报告生成工具', 'desc': 'RadAgent是一种工具使用的人工智能代理，旨在通过可解释的逐步推理过程来增强胸部CT报告的生成。与现有的3D视觉语言模型相比，RadAgent在临床准确性、鲁棒性和可信度方面都有显著提升。它为每个生成的报告提供了可检查的中间决策和工具交互的完整追踪，帮助临床医生理解报告结果的来源。实验结果显示，RadAgent在宏观F1和微观F1指标上分别提高了6.0和5.4点，鲁棒性在对抗条件下提高了24.7点，可信度达到了37.0%。'}}}, {'id': 'https://huggingface.co/papers/2604.15309', 'title': 'MM-WebAgent: A Hierarchical Multimodal Web Agent for Webpage Generation', 'url': 'https://huggingface.co/papers/2604.15309', 'abstract': 'Abstract MM-WebAgent is a hierarchical agentic framework that coordinates AIGC-based element generation for coherent and visually consistent webpage design through joint optimization of layout and multimodal content.  AI-generated summary The rapid progress of Artificial Intelligence Generated Content (AIGC) tools enables images, videos, and visualizations to be created on demand for webpage design, offering a flexible and increasingly adopted paradigm for modern UI/UX. However, directly integrating such tools into automated webpage generation often leads to style inconsistency and poor global coherence, as elements are generated in isolation. We propose MM-WebAgent, a hierarchical agentic framework for multimodal webpage generation that coordinates AIGC-based element generation through hierarchical planning and iterative self-reflection. MM-WebAgent jointly optimizes global layout, local multimodal content, and their integration, producing coherent and visually consistent webpages. We further introduce a benchmark for multimodal webpage generation and a multi-level evaluation protocol for systematic assessment. Experiments demonstrate that MM-WebAgent outperforms code-generation and agent-based baselines, especially on multimodal element generation and integration. Code & Data: https://aka.ms/mm-webagent.', 'score': 1, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'd37503e1cebf2a8a', 'authors': ['Yan Li', 'Zezi Zeng', 'Yifan Yang', 'Yuqing Yang', 'Ning Liao', 'Weiwei Guo', 'Lili Qiu', 'Mingxi Cheng', 'Qi Dai', 'Zhendong Wang', 'Zhengyuan Yang', 'Xue Yang', 'Ji Li', 'Lijuan Wang', 'Chong Luo'], 'affiliations': ['Microsoft Corporation', 'Shanghai Jiao Tong University', 'Tongji University', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.15309.jpg', 'data': {'categories': ['#multimodal', '#agents', '#dataset', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Согласованная генерация веб-страниц через иерархическую координацию мультимодального контента', 'desc': 'MM-WebAgent — это иерархическая агентская система для автоматического создания веб-страниц с использованием инструментов генеративного ИИ. Фреймворк решает проблему несогласованности стилей при независимой генерации элементов, координируя создание контента на нескольких уровнях абстракции. Система одновременно оптимизирует глобальный макет страницы, локальное мультимодальное содержимое и их интеграцию через иерархическое планирование и итеративную саморефлексию. Авторы предложили бенчмарк и многоуровневый протокол оценки, показав превосходство подхода над методами на основе кодогенерации.'}, 'en': {'title': 'Coherent Webpages through Hierarchical AIGC Coordination', 'desc': 'The paper introduces MM-WebAgent, a framework designed to improve the generation of webpages using Artificial Intelligence Generated Content (AIGC). It addresses the common issue of style inconsistency and lack of coherence when AIGC tools create webpage elements in isolation. By employing hierarchical planning and iterative self-reflection, MM-WebAgent optimizes both the layout and the integration of multimodal content. The framework not only enhances the visual consistency of webpages but also sets a new benchmark for evaluating multimodal webpage generation.'}, 'zh': {'title': '智能网页设计的新纪元：MM-WebAgent', 'desc': 'MM-WebAgent是一个层次化的智能框架，旨在通过联合优化网页布局和多模态内容，协调基于人工智能生成内容（AIGC）的元素生成，以实现一致且视觉上协调的网页设计。随着AIGC工具的快速发展，网页设计中可以按需生成图像、视频和可视化内容，但直接将这些工具集成到自动化网页生成中，常常导致风格不一致和整体连贯性差。MM-WebAgent通过层次规划和迭代自我反思，优化全球布局和局部多模态内容及其整合，生成一致且视觉上协调的网页。实验结果表明，MM-WebAgent在多模态元素生成和整合方面优于代码生成和基于智能体的基线。'}}}, {'id': 'https://huggingface.co/papers/2604.11661', 'title': 'Towards Autonomous Mechanistic Reasoning in Virtual Cells', 'url': 'https://huggingface.co/papers/2604.11661', 'abstract': 'Abstract Large language models are enhanced for biological research through a multi-agent framework that generates and validates mechanistic explanations using structured formalism and verified datasets.  AI-generated summary Large language models (LLMs) have recently gained significant attention as a promising approach to accelerate scientific discovery. However, their application in open-ended scientific domains such as biology remains limited, primarily due to the lack of factually grounded and actionable explanations. To address this, we introduce a structured explanation formalism for virtual cells that represents biological reasoning as mechanistic action graphs, enabling systematic verification and falsification. Building upon this, we propose VCR-Agent, a multi-agent framework that integrates biologically grounded knowledge retrieval with a verifier-based filtering approach to generate and validate mechanistic reasoning autonomously. Using this framework, we release VC-TRACES dataset, which consists of verified mechanistic explanations derived from the Tahoe-100M atlas. Empirically, we demonstrate that training with these explanations improves factual precision and provides a more effective supervision signal for downstream gene expression prediction. These results underscore the importance of reliable mechanistic reasoning for virtual cells, achieved through the synergy of multi-agent and rigorous verification.', 'score': 1, 'issue_id': 1950, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '1af27353ea4da9a4', 'authors': ['Yunhui Jang', 'Lu Zhu', 'Jake Fawkes', 'Alisandra Kaye Denton', 'Dominique Beaini', 'Emmanuel Noutahi'], 'affiliations': ['Korea Advanced Institute of Science and Technology (KAIST)', 'Recursion', 'University College London', 'Valence Labs'], 'pdf_title_img': 'assets/pdf/title_img/2604.11661.jpg', 'data': {'categories': ['#dataset', '#open_source', '#training', '#science', '#agents', '#benchmark'], 'emoji': '🧬', 'ru': {'title': 'Верифицированные механистические объяснения для точной биологии', 'desc': 'Статья представляет многоагентный фреймворк для улучшения больших языковых моделей в биологических исследованиях. Авторы вводят структурированный формализм представления биологических объяснений в виде механистических графов действий, что позволяет систематически проверять и опровергать гипотезы. Предложенная система VCR-Agent интегрирует получение знаний с биологическими данными и верификацию для автономного порождения обоснованных механистических объяснений. Демонстрируется, что обучение на верифицированных объяснениях из датасета VC-TRACES повышает точность предсказания экспрессии генов и улучшает качество рассуждений виртуальных клеток.'}, 'en': {'title': 'Empowering Biology with Verified Mechanistic Reasoning', 'desc': 'This paper presents a novel approach to enhance large language models (LLMs) for biological research by using a multi-agent framework. The framework, called VCR-Agent, generates and validates mechanistic explanations through structured action graphs, which represent biological reasoning. It utilizes a verified dataset, VC-TRACES, to improve the factual accuracy of the generated explanations and support downstream tasks like gene expression prediction. The findings highlight the significance of reliable mechanistic reasoning in advancing scientific discovery in biology.'}, 'zh': {'title': '增强生物研究的大语言模型', 'desc': '本论文提出了一种多智能体框架，旨在通过结构化形式和验证数据集来增强大语言模型在生物研究中的应用。我们引入了一种结构化解释形式，使用机制行动图表示生物推理，从而实现系统的验证和反驳。基于此，我们开发了VCR-Agent框架，能够自主生成和验证机制推理，并结合生物知识检索。通过使用VC-TRACES数据集，我们的实验证明了这种方法在基因表达预测中的有效性，强调了可靠机制推理的重要性。'}}}, {'id': 'https://huggingface.co/papers/2603.27844', 'title': 'Model Capability Dominates: Inference-Time Optimization Lessons from AIMO 3', 'url': 'https://huggingface.co/papers/2603.27844', 'abstract': 'Abstract Majority voting improves mathematical reasoning but is limited by correlated errors; diverse reasoning strategies and model capability are more impactful than prompt engineering.  AI-generated summary Majority voting over multiple LLM attempts improves mathematical reasoning, but correlated errors limit the effective sample size. A natural fix is to assign different reasoning strategies to different voters. The approach, Diverse Prompt Mixer, is tested on the AIMO 3 competition: 3 models, 23+ experiments, 50 IMO-level problems, one H100 80 GB, 5-hour limit. Every prompt-level intervention fails. High-temperature sampling already decorrelates errors; weaker strategies reduce accuracy more than they reduce correlation. Across an 8-point capability gap at equal N=8 and every optimization tested, model capability dominates. The gap between the best majority-vote score (42/50) and pass@20 (~45.5) is selection loss, not prompt loss. A verifier-based selector could close it. Prompt engineering cannot.', 'score': 0, 'issue_id': 1950, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'fa45e549dc9506e0', 'authors': ['Natapong Nitarach'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.27844.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#math', '#benchmark'], 'emoji': '🗳️', 'ru': {'title': 'Способность модели важнее, чем промпт: разнообразие рассуждений в большинственном голосовании', 'desc': 'В статье исследуется применение большинственного голосования для улучшения математического рассуждения LLM. Авторы показывают, что корреляция ошибок между моделями ограничивает эффективность этого подхода, и предлагают использовать разнообразные стратегии reasoning. Эксперименты на задачах IMO-уровня сложности демонстрируют, что способность самой модели намного важнее для качества, чем инженерия промптов. Основной разрыв в производительности объясняется потерей при отборе лучшего решения, а не недостатками самих промптов.'}, 'en': {'title': 'Diverse Strategies Outperform Majority Voting in AI Reasoning', 'desc': 'This paper discusses how majority voting can enhance mathematical reasoning in AI models, but highlights that correlated errors among models can limit its effectiveness. The authors propose a method called Diverse Prompt Mixer, which assigns different reasoning strategies to each model to reduce these correlations. They conducted extensive experiments using three models on challenging mathematical problems, finding that traditional prompt engineering methods did not improve performance. Ultimately, the study concludes that the capability of the models is more crucial than the prompts used, suggesting that a better selection mechanism could improve outcomes significantly.'}, 'zh': {'title': '多样化策略胜过提示工程', 'desc': '这篇论文探讨了多数投票在数学推理中的应用，指出其受到相关错误的限制。研究表明，采用多样化的推理策略和模型能力比单纯的提示工程更为重要。论文提出了一种名为多样化提示混合器的方法，并在AIMO 3比赛中进行了测试。结果显示，模型能力在优化过程中占主导地位，而提示工程的效果有限。'}}}, {'id': 'https://huggingface.co/papers/2604.13618', 'title': 'C2: Scalable Rubric-Augmented Reward Modeling from Binary Preferences', 'url': 'https://huggingface.co/papers/2604.13618', 'abstract': 'Abstract Cooperative yet Critical reward modeling (C2) enhances reward model reliability by enabling critical collaboration between a reward model and a rubric generator trained exclusively from binary preferences, achieving superior performance without requiring costly rubric annotations.  AI-generated summary Rubric-augmented verification guides reward models with explicit evaluation criteria, yielding more reliable judgments than single-model verification. However, most existing methods require costly rubric annotations, limiting scalability. Moreover, we find that rubric generation is vulnerable to a failure of cooperation; low-quality rubrics actively mislead reward models rather than help. Inspired by the principle of cooperative communication, we propose Cooperative yet Critical reward modeling (C2), a framework that significantly improves reward model judgments by having the reward model critically collaborate with a rubric generator trained solely from binary preferences. In C2, we synthesize helpful and misleading rubric pairs by measuring how each rubric shifts the reward model toward or away from the correct preference. Using these contrastive pairs, we train a cooperative rubric generator to propose helpful rubrics, and a critical verifier to assess rubric validity before making its judgment, following only rubrics it deems helpful at inference time. C2 outperforms reasoning reward models trained on the same binary preferences, with gains of up to 6.5 points on RM-Bench and 6.0 points length-controlled win rate on AlpacaEval 2.0. Without external rubric annotations, C2 enables an 8B reward model to match performance achieved with rubrics from a 4times larger model. Overall, our work demonstrates that eliciting deliberate cooperation in rubric-augmented verification makes reward models more trustworthy in a scalable way.', 'score': 0, 'issue_id': 1949, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '97a01746fa2e539f', 'authors': ['Akira Kawabata', 'Saku Sugawara'], 'affiliations': ['National Institute of Informatics', 'The Asahi Shimbun Company', 'The Graduate University for Advanced Studies (SOKENDAI)', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.13618.jpg', 'data': {'categories': ['#rlhf', '#training', '#benchmark'], 'emoji': '🤝', 'ru': {'title': 'Критическое сотрудничество для надёжной оценки качества ответов', 'desc': 'В работе предлагается метод C2 для улучшения надёжности моделей награды путём критического сотрудничества между моделью награды и генератором критериев оценки, обучаемым только на бинарных предпочтениях. Ключевая идея заключается в создании пар полезных и вводящих в заблуждение рубрик, которые измеряют, как каждая рубрика влияет на предпочтения модели награды. Модель обучается генерировать полезные критерии и проверять их валидность перед использованием, отклоняя те рубрики, которые сочтены неэффективными. Результаты показывают, что C2 превосходит другие методы обучения моделей награды на тех же бинарных предпочтениях, позволяя небольшой модели достичь производительности значительно более крупных моделей без дорогостоящих аннотаций.'}, 'en': {'title': 'Enhancing Reward Model Reliability through Cooperative Collaboration', 'desc': 'The paper introduces Cooperative yet Critical reward modeling (C2), a framework that enhances the reliability of reward models by fostering a critical collaboration between a reward model and a rubric generator. This approach utilizes rubrics generated from binary preferences, avoiding the need for expensive rubric annotations while still achieving high performance. C2 improves the quality of reward model judgments by training a cooperative rubric generator to create helpful rubrics and a critical verifier to assess their validity. The results show that C2 significantly outperforms traditional methods, demonstrating a scalable solution for more trustworthy reward modeling.'}, 'zh': {'title': '合作与关键：提升奖励模型的可靠性', 'desc': '本文提出了一种名为合作但关键的奖励建模（C2）的方法，旨在提高奖励模型的可靠性。C2通过让奖励模型与仅基于二元偏好的评分生成器进行关键合作，避免了昂贵的评分注释需求。该方法通过合成有用和误导性的评分对，训练合作评分生成器和关键验证器，从而提升了奖励模型的判断能力。实验结果表明，C2在多个基准测试中表现优于传统的奖励模型，证明了这种合作方式在可扩展性和可靠性上的优势。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (8)', '#agi', '#alignment (3)', '#architecture (5)', '#audio', '#benchmark (10)', '#cv (1)', '#data', '#dataset (5)', '#diffusion (4)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (4)', '#interpretability (2)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (8)', '#open_source (8)', '#optimization (6)', '#plp', '#rag (3)', '#reasoning (6)', '#rl (3)', '#rlhf (1)', '#robotics (2)', '#science (1)', '#security (1)', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (1)', '#training (8)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-17 11:45',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-17 11:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-17 11:45')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
