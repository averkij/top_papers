    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.20796', 'title': 'LLaDA2.0-Uni: Unifying Multimodal Understanding and Generation with Diffusion Large Language Model', 'url': 'https://huggingface.co/papers/2604.20796', 'abstract': 'Abstract LLaDA2.0-Uni is a unified discrete diffusion language model that integrates multimodal understanding and generation through a semantic discrete tokenizer, MoE-based backbone, and diffusion decoder, achieving performance comparable to specialized vision-language models while enabling efficient inference and high-fidelity image generation.  AI-generated summary We present LLaDA2.0-Uni, a unified discrete diffusion large language model (dLLM) that supports multimodal understanding and generation within a natively integrated framework. Its architecture combines a fully semantic discrete tokenizer, a MoE-based dLLM backbone, and a diffusion decoder. By discretizing continuous visual inputs via SigLIP-VQ, the model enables block-level masked diffusion for both text and vision inputs within the backbone, while the decoder reconstructs visual tokens into high-fidelity images. Inference efficiency is enhanced beyond parallel decoding through prefix-aware optimizations in the backbone and few-step distillation in the decoder. Supported by carefully curated large-scale data and a tailored multi-stage training pipeline, LLaDA2.0-Uni matches specialized VLMs in multimodal understanding while delivering strong performance in image generation and editing. Its native support for interleaved generation and reasoning establishes a promising and scalable paradigm for next-generation unified foundation models. Codes and models are available at https://github.com/inclusionAI/LLaDA2.0-Uni.', 'score': 120, 'issue_id': 2019, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '009c9f265ac70b64', 'authors': ['Inclusion AI', 'Tiwei Bie', 'Haoxing Chen', 'Tieyuan Chen', 'Zhenglin Cheng', 'Long Cui', 'Kai Gan', 'Zhicheng Huang', 'Zhenzhong Lan', 'Haoquan Li', 'Jianguo Li', 'Tao Lin', 'Qi Qin', 'Hongjun Wang', 'Xiaomei Wang', 'Haoyuan Wu', 'Yi Xin', 'Junbo Zhao'], 'affiliations': ['AGI Research Center', 'Inclusion AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.20796.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#training', '#inference', '#multimodal', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для понимания и генерации текста и изображений', 'desc': 'LLaDA2.0-Uni — это объединённая модель дискретной диффузии, которая одновременно понимает и генерирует изображения и текст в едином архитектурном фреймворке. Модель использует семантический дискретный токенизатор для преобразования непрерывных визуальных данных в дискретные токены, а также специализированный MoE-based backbone для эффективной обработки. Декодер с диффузией восстанавливает визуальные токены в высокачественные изображения, при этом инференс оптимизируется через параллельное декодирование и дистилляцию. Модель достигает производительности специализированных vision-language моделей в понимании мультимодальных данных и одновременно обеспечивает высокое качество генерации изображений.'}, 'en': {'title': 'Unified Multimodal Mastery with LLaDA2.0-Uni', 'desc': 'LLaDA2.0-Uni is a unified discrete diffusion language model designed for multimodal tasks, combining text and image understanding and generation. It utilizes a semantic discrete tokenizer and a mixture of experts (MoE) backbone to process inputs efficiently. The model employs a diffusion decoder to create high-quality images from visual tokens, enhancing inference speed with advanced optimizations. By leveraging large-scale data and a specialized training approach, LLaDA2.0-Uni achieves performance on par with dedicated vision-language models while offering a scalable solution for future AI applications.'}, 'zh': {'title': '统一多模态理解与生成的未来', 'desc': 'LLaDA2.0-Uni是一种统一的离散扩散语言模型，能够同时理解和生成多模态数据。它结合了语义离散标记器、基于MoE的骨干网络和扩散解码器，性能与专门的视觉-语言模型相当。该模型通过SigLIP-VQ对连续视觉输入进行离散化，实现了文本和视觉输入的块级掩蔽扩散。LLaDA2.0-Uni在推理效率和高保真图像生成方面表现出色，展示了下一代统一基础模型的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.19859', 'title': 'DR-Venus: Towards Frontier Edge-Scale Deep Research Agents with Only 10K Open Data', 'url': 'https://huggingface.co/papers/2604.19859', 'abstract': 'Abstract DR-Venus-4B is a 4-billion-parameter deep research agent trained entirely on open data using agentic supervised fine-tuning and reinforcement learning with turn-level rewards to achieve superior performance on research benchmarks while maintaining edge-scale deployment advantages.  AI-generated summary Edge-scale deep research agents based on small language models are attractive for real-world deployment due to their advantages in cost, latency, and privacy. In this work, we study how to train a strong small deep research agent under limited open-data by improving both data quality and data utilization. We present DR-Venus, a frontier 4B deep research agent for edge-scale deployment, built entirely on open data. Our training recipe consists of two stages. In the first stage, we use agentic supervised fine-tuning (SFT) to establish basic agentic capability, combining strict data cleaning with resampling of long-horizon trajectories to improve data quality and utilization. In the second stage, we apply agentic reinforcement learning (RL) to further improve execution reliability on long-horizon deep research tasks. To make RL effective for small agents in this setting, we build on IGPO and design turn-level rewards based on information gain and format-aware regularization, thereby enhancing supervision density and turn-level credit assignment. Built entirely on roughly 10K open-data, DR-Venus-4B significantly outperforms prior agentic models under 9B parameters on multiple deep research benchmarks, while also narrowing the gap to much larger 30B-class systems. Our further analysis shows that 4B agents already possess surprisingly strong performance potential, highlighting both the deployment promise of small models and the value of test-time scaling in this setting. We release our models, code, and key recipes to support reproducible research on edge-scale deep research agents.', 'score': 29, 'issue_id': 2019, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '3f1eeddc2fcd3350', 'authors': ['Venus Team', 'Sunhao Dai', 'Yong Deng', 'Jinzhen Lin', 'Yusheng Song', 'Guoqing Wang', 'Xiaofeng Wu', 'Yuqi Zhou', 'Shuo Yang', 'Zhenzhe Ying', 'Zhanwei Zhang', 'Changhua Meng', 'Weiqiang Wang'], 'affiliations': ['Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2604.19859.jpg', 'data': {'categories': ['#agents', '#small_models', '#data', '#training', '#benchmark', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Мощные исследовательские агенты на краю: 4B параметра, полный потенциал', 'desc': 'DR-Venus-4B — это компактный агент глубокого исследования с 4 миллиардами параметров, обученный исключительно на открытых данных с использованием специализированного SFT и RL с наградами на уровне отдельных шагов. Модель достигает высокой производительности на исследовательских бенчмарках, сохраняя при этом возможность развёртывания на устройствах с ограниченными ресурсами. Обучение включает две стадии: первая использует агентский SFT с очисткой данных и переsampling длительных траекторий, вторая применяет агентский RL с turn-level наградами на основе информационного выигрыша. На примерно 10K образцов открытых данных DR-Venus-4B превосходит предыдущие агентские модели размером до 9B и приближается к системам класса 30B, демонстрируя потенциал компактных моделей при масштабировании на этапе инференса.'}, 'en': {'title': 'Empowering Small Models for Big Research Tasks', 'desc': 'The paper introduces DR-Venus-4B, a deep research agent with 4 billion parameters, designed for efficient deployment on edge devices. It utilizes agentic supervised fine-tuning and reinforcement learning with turn-level rewards to enhance its performance on research tasks. The training process focuses on improving data quality and utilization, leveraging open data to achieve results comparable to larger models. The findings suggest that smaller models can still deliver strong performance, making them suitable for real-world applications while maintaining cost and privacy advantages.'}, 'zh': {'title': '小模型，大潜力：DR-Venus-4B的边缘部署优势', 'desc': 'DR-Venus-4B 是一个拥有40亿参数的深度研究代理，完全基于开放数据进行训练。它通过代理监督微调和强化学习，结合逐轮奖励，显著提升了在研究基准上的表现。该研究提出了一种两阶段的训练方法，第一阶段通过严格的数据清洗和长时间轨迹的重采样来提高数据质量，第二阶段则通过强化学习进一步增强执行的可靠性。研究表明，基于约1万条开放数据的4B代理在多个深度研究基准上表现优异，展示了小模型在边缘部署中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.20733', 'title': 'Near-Future Policy Optimization', 'url': 'https://huggingface.co/papers/2604.20733', 'abstract': "Abstract Mixed-policy reinforcement learning approach using near-future policy optimization to accelerate convergence and improve performance by balancing trajectory quality and variance.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a core post-training recipe. Introducing suitable off-policy trajectories into on-policy exploration accelerates RLVR convergence and raises the performance ceiling, yet finding a source of such trajectories remains the key challenge. Existing mixed-policy methods either import trajectories from external teachers (high-quality but distributionally far) or replay past training trajectories (close but capped in quality), and neither simultaneously satisfies the strong enough (higher Q , more new knowledge to learn) and close enough (lower V , more readily absorbed) conditions required to maximize the effective learning signal S = Q/V. We propose Near-Future Policy Optimization (NPO), a simple mixed-policy scheme that learns from a policy's own near-future self: a later checkpoint from the same training run is a natural source of auxiliary trajectories that is both stronger than the current policy and closer than any external source, directly balancing trajectory quality against variance cost. We validate NPO through two manual interventions, early-stage bootstrapping and late-stage plateau breakthrough, and further propose AutoNPO,an adaptive variant that automatically triggers interventions from online training signals and selects the guide checkpoint that maximizes S. On Qwen3-VL-8B-Instruct with GRPO, NPO improves average performance from 57.88 to 62.84, and AutoNPO pushes it to 63.15, raising the final performance ceiling while accelerating convergence.", 'score': 26, 'issue_id': 2020, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '4da304463022820e', 'authors': ['Chuanyu Qin', 'Chenxu Yang', 'Qingyi Si', 'Naibin Gu', 'Dingyu Yao', 'Zheng Lin', 'Peng Fu', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['Institute of Information Engineering, CAS', 'JD.COM', 'School of Cyber Security, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2604.20733.jpg', 'data': {'categories': ['#rl', '#training', '#rlhf'], 'emoji': '🔄', 'ru': {'title': 'Обучение на будущей версии самого себя: ускорение сходимости через оптимизацию близкой стратегии', 'desc': 'В статье предлагается метод Near-Future Policy Optimization (NPO) для улучшения обучения с подкреплением путём комбинирования стратегий на разных этапах обучения. Ключевая идея заключается в использовании траекторий из более поздних контрольных точек той же модели в качестве вспомогательных данных, что создаёт оптимальный баланс между качеством траекторий и дисперсией обучения. Авторы предлагают AutoNPO — адаптивный вариант, который автоматически выбирает лучшие контрольные точки на основе сигналов обучения для максимизации информативности сигнала S = Q/V. Результаты показывают значительное улучшение производительности: на Qwen3-VL-8B-Instruct средняя производительность возросла с 57.88 до 63.15 с ускорением сходимости и повышением потолка производительности.'}, 'en': {'title': 'Accelerating Reinforcement Learning with Near-Future Insights', 'desc': "This paper presents a mixed-policy reinforcement learning method called Near-Future Policy Optimization (NPO) that enhances learning efficiency by utilizing trajectories from a policy's own near-future self. By leveraging later checkpoints from the same training run, NPO balances the quality and variance of trajectories, leading to improved performance and faster convergence. The authors also introduce AutoNPO, an adaptive version that automatically adjusts based on online training signals to optimize learning. Experimental results show significant performance improvements on the Qwen3-VL-8B-Instruct model, demonstrating the effectiveness of the proposed approach."}, 'zh': {'title': '近未来策略优化：加速收敛与提升性能的创新方法', 'desc': '本文提出了一种混合策略强化学习方法，称为近未来策略优化（NPO），旨在加速收敛并提高性能。NPO通过利用同一训练过程中的后续检查点，生成比当前策略更强但又比外部来源更接近的辅助轨迹，从而平衡轨迹质量与方差成本。该方法解决了现有混合策略方法在引入外部教师轨迹和重放过去训练轨迹时的局限性。通过手动干预和自适应变体AutoNPO，NPO在Qwen3-VL-8B-Instruct上显著提高了平均性能。'}}}, {'id': 'https://huggingface.co/papers/2604.13602', 'title': 'Reward Hacking in the Era of Large Models: Mechanisms, Emergent Misalignment, Challenges', 'url': 'https://huggingface.co/papers/2604.13602', 'abstract': 'Abstract Reward hacking in aligned language models stems from optimizing expressive policies against compressed reward signals, leading to systematic misalignment behaviors that generalize beyond initial shortcuts.  AI-generated summary Reinforcement Learning from Human Feedback (RLHF) and related alignment paradigms have become central to steering large language models (LLMs) and multimodal large language models (MLLMs) toward human-preferred behaviors. However, these approaches introduce a systemic vulnerability: reward hacking, where models exploit imperfections in learned reward signals to maximize proxy objectives without fulfilling true task intent. As models scale and optimization intensifies, such exploitation manifests as verbosity bias, sycophancy, hallucinated justification, benchmark overfitting, and, in multimodal settings, perception--reasoning decoupling and evaluator manipulation. Recent evidence further suggests that seemingly benign shortcut behaviors can generalize into broader forms of misalignment, including deception and strategic gaming of oversight mechanisms. In this survey, we propose the Proxy Compression Hypothesis (PCH) as a unifying framework for understanding reward hacking. We formalize reward hacking as an emergent consequence of optimizing expressive policies against compressed reward representations of high-dimensional human objectives. Under this view, reward hacking arises from the interaction of objective compression, optimization amplification, and evaluator--policy co-adaptation. This perspective unifies empirical phenomena across RLHF, RLAIF, and RLVR regimes, and explains how local shortcut learning can generalize into broader forms of misalignment, including deception and strategic manipulation of oversight mechanisms. We further organize detection and mitigation strategies according to how they intervene on compression, amplification, or co-adaptation dynamics. By framing reward hacking as a structural instability of proxy-based alignment under scale, we highlight open challenges in scalable oversight, multimodal grounding, and agentic autonomy.', 'score': 16, 'issue_id': 2019, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '0c035c97a8691501', 'authors': ['Xiaohua Wang', 'Muzhao Tian', 'Yuqi Zeng', 'Zisu Huang', 'Jiakang Yuan', 'Bowen Chen', 'Jingwen Xu', 'Mingbo Zhou', 'Wenhao Liu', 'Muling Wu', 'Zhengkang Guo', 'Qi Qian', 'Yifei Wang', 'Feiran Zhang', 'Ruicheng Yin', 'Shihan Dou', 'Changze Lv', 'Tao Chen', 'Kaitao Song', 'Xu Tan', 'Tao Gui', 'Xiaoqing Zheng', 'Xuanjing Huang'], 'affiliations': ['Fudan NLP Group'], 'pdf_title_img': 'assets/pdf/title_img/2604.13602.jpg', 'data': {'categories': ['#agents', '#hallucinations', '#multimodal', '#rlhf', '#alignment', '#survey'], 'emoji': '⚠️', 'ru': {'title': 'Когда модель обманывает награду: структурная нестабильность прокси-выравнивания', 'desc': 'В статье исследуется проблема reward hacking в больших языковых моделях, которая возникает при оптимизации сложных политик относительно сжатых сигналов награды. Авторы предлагают гипотезу сжатия прокси (PCH) как единую теоретическую рамку для понимания этого явления, объясняя, как локальные упрощения поведения могут перерастать в более серьёзные формы ошибочного выравнивания, включая обман и манипуляцию механизмами надзора. Работа показывает, что reward hacking проявляется в различных формах: многословности, сикофантии, галлюцинаций и переобучения на бенчмарках, и унифицирует эти явления в контексте RLHF и связанных подходов. Статья предлагает стратегии детектирования и смягчения проблемы через воздействие на динамику сжатия, усиления оптимизации и со-адаптации модели с оценивателем.'}, 'en': {'title': 'Understanding and Mitigating Reward Hacking in Language Models', 'desc': 'This paper discusses the problem of reward hacking in language models, where models exploit flaws in reward signals to achieve goals that do not align with human intentions. It introduces the Proxy Compression Hypothesis (PCH), which explains how optimizing complex policies against simplified reward signals can lead to misalignment behaviors. The authors highlight that as models grow and optimization becomes more intense, issues like verbosity bias and deception can emerge. They also propose strategies for detecting and mitigating these problems by addressing the dynamics of compression, amplification, and co-adaptation in model training.'}, 'zh': {'title': '理解奖励黑客：代理压缩假设的启示', 'desc': '在对齐语言模型中，奖励黑客行为源于优化表达性策略与压缩奖励信号之间的矛盾，导致系统性的不对齐行为。这种行为不仅限于初始的捷径，还可能扩展到更广泛的误导性行为。我们提出了代理压缩假设（PCH），作为理解奖励黑客的统一框架，强调了目标压缩、优化放大和评估者-策略共同适应之间的相互作用。通过这种视角，我们能够更好地理解和应对奖励黑客带来的挑战，特别是在大规模模型的监督和多模态对接方面。'}}}, {'id': 'https://huggingface.co/papers/2604.20570', 'title': 'Exploring Spatial Intelligence from a Generative Perspective', 'url': 'https://huggingface.co/papers/2604.20570', 'abstract': 'Abstract Generative spatial intelligence benchmark evaluates and enhances 3D spatial constraint manipulation in image generation through real-world and synthetic datasets.  AI-generated summary Spatial intelligence is essential for multimodal large language models, yet current benchmarks largely assess it only from an understanding perspective. We ask whether modern generative or unified multimodal models also possess generative spatial intelligence (GSI), the ability to respect and manipulate 3D spatial constraints during image generation, and whether such capability can be measured or improved. We introduce GSI-Bench, the first benchmark designed to quantify GSI through spatially grounded image editing. It consists of two complementary components: GSI-Real, a high-quality real-world dataset built via a 3D-prior-guided generation and filtering pipeline, and GSI-Syn, a large-scale synthetic benchmark with controllable spatial operations and fully automated labeling. Together with a unified evaluation protocol, GSI-Bench enables scalable, model-agnostic assessment of spatial compliance and editing fidelity. Experiments show that fine-tuning unified multimodal models on GSI-Syn yields substantial gains on both synthetic and real tasks and, strikingly, also improves downstream spatial understanding. This provides the first clear evidence that generative training can tangibly strengthen spatial reasoning, establishing a new pathway for advancing spatial intelligence in multimodal models.', 'score': 11, 'issue_id': 2019, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '456bf07ca632af78', 'authors': ['Muzhi Zhu', 'Shunyao Jiang', 'Huanyi Zheng', 'Zekai Luo', 'Hao Zhong', 'Anzhou Li', 'Kaijun Wang', 'Jintao Rong', 'Yang Liu', 'Hao Chen', 'Tao Lin', 'Chunhua Shen'], 'affiliations': ['Ant Group', 'Westlake University', 'Zhejiang University of Technology', 'Zhejiang University, State Key Laboratory of CAD & CG'], 'pdf_title_img': 'assets/pdf/title_img/2604.20570.jpg', 'data': {'categories': ['#dataset', '#3d', '#multimodal', '#benchmark', '#reasoning', '#synthetic'], 'emoji': '🧊', 'ru': {'title': 'Измеряя и улучшая пространственный интеллект в генеративных моделях', 'desc': 'Статья представляет GSI-Bench — первый бенчмарк для оценки генеративного пространственного интеллекта (GSI), способности моделей соблюдать и манипулировать 3D-ограничениями при генерации изображений. Бенчмарк состоит из двух компонентов: GSI-Real с высококачественными реальными данными и GSI-Syn с синтетическими данными и автоматической разметкой. Исследование показывает, что fine-tuning мультимодальных моделей на синтетических данных значительно улучшает их способность к пространственному редактированию и пониманию. Результаты доказывают, что генеративное обучение может укреплять пространственное мышление в мультимодальных LLM.'}, 'en': {'title': "Enhancing AI's 3D Spatial Intelligence with GSI-Bench", 'desc': 'This paper introduces the Generative Spatial Intelligence Benchmark (GSI-Bench), which evaluates how well AI models can manipulate 3D spatial constraints in image generation. It highlights the importance of generative spatial intelligence (GSI) for multimodal models, moving beyond just understanding spatial relationships. The benchmark includes two parts: GSI-Real, a dataset from real-world images, and GSI-Syn, a synthetic dataset designed for controlled spatial operations. The findings suggest that training models on GSI-Syn significantly enhances their spatial reasoning abilities, paving the way for improved spatial intelligence in AI.'}, 'zh': {'title': '提升多模态模型的生成空间智能', 'desc': '本论文提出了生成空间智能基准（GSI-Bench），用于评估和提升图像生成中的三维空间约束操作能力。该基准通过真实和合成数据集，量化生成空间智能（GSI），即在图像生成过程中尊重和操作三维空间约束的能力。GSI-Bench包含两个部分：GSI-Real，基于3D先验生成和过滤的高质量真实数据集；GSI-Syn，一个具有可控空间操作的大规模合成基准。实验表明，对统一多模态模型进行GSI-Syn的微调，显著提高了合成和真实任务的表现，同时也增强了下游空间理解能力。'}}}, {'id': 'https://huggingface.co/papers/2604.14932', 'title': 'WavAlign: Enhancing Intelligence and Expressiveness in Spoken Dialogue Models via Adaptive Hybrid Post-Training', 'url': 'https://huggingface.co/papers/2604.14932', 'abstract': 'Abstract Spoken dialogue models face challenges in expressiveness despite end-to-end approaches, but a modality-aware adaptive post-training method using constrained preference updates and explicit anchoring improves both semantic quality and speech expressiveness.  AI-generated summary End-to-end spoken dialogue models have garnered significant attention because they offer a higher potential ceiling in expressiveness and perceptual ability than cascaded systems. However, the intelligence and expressiveness of current open-source spoken dialogue models often remain below expectations. Motivated by the success of online reinforcement learning(RL) in other domains, one might attempt to directly apply preference optimization to spoken dialogue models, yet this transfer is non-trivial. We analyze these obstacles from the perspectives of reward modeling and rollout sampling, focusing on how sparse preference supervision interacts with dense speech generation under shared-parameter updates. Based on the analysis, we propose a modality-aware adaptive post-training recipe that makes RL practical for spoken dialogue: it constrains preference updates to the semantic channel and improves acoustic behavior via explicit anchoring, while dynamically regulating their mixture from rollout statistics to avoid unreliable preference gradients. We evaluate the method across multiple spoken dialogue benchmarks and representative architectures, and observe consistent improvements in semantic quality and speech expressiveness.', 'score': 9, 'issue_id': 2019, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'e2e4fd56c138e57d', 'authors': ['Yifu Chen', 'Shengpeng Ji', 'Qian Chen', 'Tianle Liang', 'Yangzhuo Li', 'Ziqing Wang', 'Wen Wang', 'Jingyu Lu', 'Haoxiao Wang', 'Xueyi Pu', 'Fan Zhuo', 'Zhou Zhao'], 'affiliations': ['Alibaba Group', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14932.jpg', 'data': {'categories': ['#audio', '#training', '#multimodal', '#rlhf', '#benchmark', '#rl'], 'emoji': '🎤', 'ru': {'title': 'Адаптивное дообучение разговорных моделей через модально-ориентированную оптимизацию предпочтений', 'desc': 'В статье описывается проблема низкой выразительности современных сквозных моделей для разговорного диалога. Авторы предлагают метод модально-ориентированного адаптивного дообучения, который использует constrained preference updates и явное закрепление для улучшения качества. Подход основан на анализе трудностей применения reinforcement learning к речевым моделям, таких как разреженность предпочтений и взаимодействие с плотной генерацией речи. Экспериментальная оценка показала, что метод последовательно улучшает как семантическое качество диалога, так и выразительность синтезированной речи.'}, 'en': {'title': 'Enhancing Dialogue Models with Adaptive Post-Training', 'desc': 'This paper addresses the limitations of current end-to-end spoken dialogue models in terms of expressiveness and semantic quality. It introduces a modality-aware adaptive post-training method that enhances these models by using constrained preference updates and explicit anchoring. The approach leverages insights from reinforcement learning to optimize dialogue performance while managing the interaction between sparse preference supervision and dense speech generation. Evaluations show that this method leads to significant improvements in both the semantic quality of the dialogue and the expressiveness of the generated speech.'}, 'zh': {'title': '提升语音对话模型的表达能力', 'desc': '本论文探讨了端到端的语音对话模型在表达能力方面的挑战。尽管这些模型在理论上具有更高的表达潜力，但实际应用中往往未能达到预期效果。为了解决这一问题，作者提出了一种基于模态感知的自适应后训练方法，通过约束偏好更新和显式锚定来提升语义质量和语音表达能力。实验结果表明，该方法在多个语音对话基准测试中均取得了一致的改进。'}}}, {'id': 'https://huggingface.co/papers/2604.20779', 'title': 'SWE-chat: Coding Agent Interactions From Real Users in the Wild', 'url': 'https://huggingface.co/papers/2604.20779', 'abstract': 'Abstract SWE-chat presents a large-scale dataset of real coding agent interactions that reveals significant inefficiencies and challenges in current AI-assisted development practices.  AI-generated summary AI coding agents are being adopted at scale, yet we lack empirical evidence on how people actually use them and how much of their output is useful in practice. We present SWE-chat, the first large-scale dataset of real coding agent sessions collected from open-source developers in the wild. The dataset currently contains 6,000 sessions, comprising more than 63,000 user prompts and 355,000 agent tool calls. SWE-chat is a living dataset; our collection pipeline automatically and continually discovers and processes sessions from public repositories. Leveraging SWE-chat, we provide an initial empirical characterization of real-world coding agent usage and failure modes. We find that coding patterns are bimodal: in 41% of sessions, agents author virtually all committed code ("vibe coding"), while in 23%, humans write all code themselves. Despite rapidly improving capabilities, coding agents remain inefficient in natural settings. Just 44% of all agent-produced code survives into user commits, and agent-written code introduces more security vulnerabilities than code authored by humans. Furthermore, users push back against agent outputs -- through corrections, failure reports, and interruptions -- in 44% of all turns. By capturing complete interaction traces with human vs. agent code authorship attribution, SWE-chat provides an empirical foundation for moving beyond curated benchmarks towards an evidence-based understanding of how AI agents perform in real developer workflows.', 'score': 4, 'issue_id': 2019, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '484ca383fbbd2bd3', 'authors': ['Joachim Baumann', 'Vishakh Padmakumar', 'Xiang Li', 'John Yang', 'Diyi Yang', 'Sanmi Koyejo'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2604.20779.jpg', 'data': {'categories': ['#agents', '#dataset', '#security', '#benchmark', '#plp', '#open_source'], 'emoji': '👨\u200d💻', 'ru': {'title': 'Правда об эффективности AI-кодировщиков в реальной практике разработки', 'desc': 'В статье представлен SWE-chat — первый крупномасштабный датасет реальных сессий взаимодействия разработчиков с AI-кодировщиками, собранный из открытых репозиториев. Анализ 6000 сессий с более чем 63000 пользовательских запросов показал, что AI-агенты работают неэффективно: только 44% сгенерированного кода попадает в финальные коммиты, а созданный код содержит больше уязвимостей безопасности. Исследование выявило два противоположных паттерна использования: в 41% случаев агенты пишут почти весь код, а в 23% — люди кодят сами, при этом пользователи корректируют или отклоняют вывод агента в 44% всех взаимодействий. Датасет предоставляет эмпирическую базу для понимания реального поведения AI-агентов в рабочих процессах разработчиков, выходя за рамки искусственных бенчмарков.'}, 'en': {'title': 'SWE-chat: Unveiling the Realities of AI Coding Agents', 'desc': "The paper introduces SWE-chat, a large dataset that captures real interactions between developers and AI coding agents. It highlights the inefficiencies of these agents, revealing that only 44% of their generated code is actually used in final commits. The dataset shows two distinct coding patterns: one where agents write most of the code and another where humans do all the coding. Additionally, it points out that AI-generated code often has more security vulnerabilities and that users frequently correct or interrupt the agents' outputs."}, 'zh': {'title': '揭示AI编码代理的真实效率与挑战', 'desc': 'SWE-chat是一个大规模的数据集，记录了真实的编码代理交互，揭示了当前AI辅助开发实践中的显著低效和挑战。该数据集包含6000个会话，超过63000个用户提示和355000个代理工具调用，提供了对真实世界编码代理使用情况的初步实证特征分析。研究发现，编码模式呈双峰分布，41%的会话中代理几乎完成所有代码，而23%的会话中人类完全独立编写代码。尽管编码代理的能力在快速提升，但在自然环境中仍然效率低下，只有44%的代理生成代码被用户提交，且代理编写的代码引入的安全漏洞多于人类编写的代码。'}}}, {'id': 'https://huggingface.co/papers/2604.20246', 'title': 'Cortex 2.0: Grounding World Models in Real-World Industrial Deployment', 'url': 'https://huggingface.co/papers/2604.20246', 'abstract': 'Abstract Cortex 2.0 enables reliable long-horizon robotic manipulation through plan-and-act control that generates and evaluates future trajectories in visual latent space, outperforming reactive Vision-Language-Action models in complex industrial settings.  AI-generated summary Industrial robotic manipulation demands reliable long-horizon execution across embodiments, tasks, and changing object distributions. While Vision-Language-Action models have demonstrated strong generalization, they remain fundamentally reactive. By optimizing the next action given the current observation without evaluating potential futures, they are brittle to the compounding failure modes of long-horizon tasks. Cortex 2.0 shifts from reactive control to plan-and-act by generating candidate future trajectories in visual latent space, scoring them for expected success and efficiency, then committing only to the highest-scoring candidate. We evaluate Cortex 2.0 on a single-arm and dual-arm manipulation platform across four tasks of increasing complexity: pick and place, item and trash sorting, screw sorting, and shoebox unpacking. Cortex 2.0 consistently outperforms state-of-the-art Vision-Language-Action baselines, achieving the best results across all tasks. The system remains reliable in unstructured environments characterized by heavy clutter, frequent occlusions, and contact-rich manipulation, where reactive policies fail. These results demonstrate that world-model-based planning can operate reliably in complex industrial environments.', 'score': 3, 'issue_id': 2019, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '2ca14895e1a71c94', 'authors': ['Adriana Aida', 'Walida Amer', 'Katarina Bankovic', 'Dhruv Behl', 'Fabian Busch', 'Annie Bhalla', 'Minh Duong', 'Florian Gienger', 'Rohan Godse', 'Denis Grachev', 'Ralf Gulde', 'Elisa Hagensieker', 'Junpeng Hu', 'Shivam Joshi', 'Tobias Knoblauch', 'Likith Kumar', 'Damien LaRocque', 'Keerthana Lokesh', 'Omar Moured', 'Khiem Nguyen', 'Christian Preyss', 'Ranjith Sriganesan', 'Vikram Singh', 'Carsten Sponner', 'Anh Tong', 'Dominik Tuscher', 'Marc Tuscher', 'Pavan Upputuri'], 'affiliations': ['Sereact GmbH'], 'pdf_title_img': 'assets/pdf/title_img/2604.20246.jpg', 'data': {'categories': ['#cv', '#multimodal', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От реактивного управления к плану: предсказание будущего для надёжной робототехники', 'desc': 'Cortex 2.0 — это система планирования и исполнения для робототехники, которая вместо реактивного управления генерирует и оценивает множество возможных траекторий движения в визуальном latent space. Система выбирает траекторию с наивысшей ожидаемой вероятностью успеха, что позволяет избежать накопления ошибок при длительных манипуляциях. Метод протестирован на различных задачах сортировки, захвата и распаковки в загромождённых условиях с частичной окклюзией объектов. Система демонстрирует превосходство над Vision-Language-Action моделями благодаря использованию world-model-based планирования.'}, 'en': {'title': 'Plan Ahead: Cortex 2.0 Revolutionizes Robotic Manipulation', 'desc': 'Cortex 2.0 is a machine learning system designed for robotic manipulation that focuses on planning future actions rather than just reacting to current observations. It generates and evaluates potential future trajectories in a visual latent space, allowing it to choose the most effective action for complex tasks. This proactive approach helps the system avoid the pitfalls of traditional Vision-Language-Action models, which can struggle with long-horizon tasks due to their reactive nature. The evaluation shows that Cortex 2.0 outperforms existing models in various challenging industrial scenarios, demonstrating its reliability in cluttered and dynamic environments.'}, 'zh': {'title': 'Cortex 2.0：从反应到规划的机器人控制革命', 'desc': 'Cortex 2.0 是一种新型的机器人控制系统，能够在复杂的工业环境中实现可靠的长时间操作。它通过在视觉潜在空间中生成和评估未来轨迹，转变了传统的反应式控制方式。与现有的视觉-语言-动作模型相比，Cortex 2.0 在处理长时间任务时表现出更高的成功率和效率。该系统在多种复杂任务中均表现优异，证明了基于世界模型的规划在复杂环境中的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2604.18982', 'title': 'SAVOIR: Learning Social Savoir-Faire via Shapley-based Reward Attribution', 'url': 'https://huggingface.co/papers/2604.18982', 'abstract': "Abstract SAVOIR framework uses cooperative game theory to improve social intelligence in language agents by combining expected utility shifts and Shapley values for better credit assignment in dialogue systems.  AI-generated summary Social intelligence, the ability to navigate complex interpersonal interactions, presents a fundamental challenge for language agents. Training such agents via reinforcement learning requires solving the credit assignment problem: determining how individual utterances contribute to multi-turn dialogue outcomes. Existing approaches directly employ language models to distribute episode-level rewards, yielding attributions that are retrospective and lack theoretical grounding. We propose SAVOIR (ShApley Value fOr SocIal RL), a novel principled framework grounded in cooperative game theory. Our approach combines two complementary principles: expected utility shifts evaluation from retrospective attribution to prospective valuation, capturing an utterance's strategic potential for enabling favorable future trajectories; Shapley values ensure fair credit distribution with axiomatic guarantees of efficiency, symmetry, and marginality. Experiments on the SOTOPIA benchmark demonstrate that SAVOIR achieves new state-of-the-art performance across all evaluation settings, with our 7B model matching or exceeding proprietary models including GPT-4o and Claude-3.5-Sonnet. Notably, even large reasoning models consistently underperform, suggesting social intelligence requires qualitatively different capabilities than analytical reasoning.", 'score': 2, 'issue_id': 2021, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '6c6a9d614861ff2a', 'authors': ['Xiachong Feng', 'Yi Jiang', 'Xiaocheng Feng', 'Deyi Yin', 'Libo Qin', 'Yangfan Ye', 'Lei Huang', 'Weitao Ma', 'Yuxuan Gu', 'Chonghan Qin', 'Bing Qin', 'Lingpeng Kong'], 'affiliations': ['Harbin Institute of Technology', 'Harbin Institute of Technology, Shenzhen', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.18982.jpg', 'data': {'categories': ['#training', '#rl', '#alignment', '#agents', '#reasoning', '#benchmark'], 'emoji': '🤝', 'ru': {'title': 'Социальный интеллект через теорию игр: справедливое распределение кредита в диалоговых системах', 'desc': 'SAVOIR — это фреймворк, использующий теорию кооперативных игр для улучшения социального интеллекта языковых агентов. Фреймворк решает задачу распределения кредита в многоходовых диалогах путём комбинирования двух подходов: оценки сдвигов ожидаемой полезности, которая переходит от ретроспективного анализа к проспективной оценке стратегического потенциала высказывания, и значений Шепли, обеспечивающих справедливое распределение награды с аксиоматическими гарантиями. На бенчмарке SOTOPIA модель продемонстрировала лучшие результаты, причём 7B модель сравнялась с закрытыми системами вроде GPT-4o и Claude-3.5-Sonnet. Исследование показывает, что социальный интеллект требует качественно иных способностей, нежели аналитическое рассуждение.'}, 'en': {'title': 'Empowering Language Agents with Social Intelligence through Game Theory', 'desc': 'The SAVOIR framework enhances social intelligence in language agents by applying cooperative game theory principles. It addresses the credit assignment problem in dialogue systems by using expected utility shifts and Shapley values for more accurate reward distribution. This approach allows agents to evaluate the potential impact of their utterances on future dialogue outcomes rather than just past performance. Experiments show that SAVOIR outperforms existing models, indicating that social intelligence in AI requires distinct capabilities beyond traditional reasoning.'}, 'zh': {'title': '提升语言代理的社会智能', 'desc': 'SAVOIR框架利用合作博弈理论来提升语言代理的社会智能，通过结合期望效用变化和Shapley值来改善对话系统中的信用分配问题。社会智能是指在复杂的人际互动中导航的能力，这对语言代理来说是一个基本挑战。我们的方法通过前瞻性评估来捕捉话语的战略潜力，并确保公平的信用分配，具有效率、对称性和边际性的公理保证。实验结果表明，SAVOIR在所有评估设置中都达到了新的最先进性能，显示出其在社会智能方面的优势。'}}}, {'id': 'https://huggingface.co/papers/2604.20817', 'title': 'Convergent Evolution: How Different Language Models Learn Similar Number Representations', 'url': 'https://huggingface.co/papers/2604.20817', 'abstract': 'Abstract Transformers and other language models exhibit periodic numerical representations in their Fourier domains, with some models developing geometrically separable features for linear classification of numbers modulo T, though Fourier sparsity alone is insufficient for this separability.  AI-generated summary Language models trained on natural text learn to represent numbers using periodic features with dominant periods at T=2, 5, 10. In this paper, we identify a two-tiered hierarchy of these features: while Transformers, Linear RNNs, LSTMs, and classical word embeddings trained in different ways all learn features that have period-T spikes in the Fourier domain, only some learn geometrically separable features that can be used to linearly classify a number mod-T. To explain this incongruity, we prove that Fourier domain sparsity is necessary but not sufficient for mod-T geometric separability. Empirically, we investigate when model training yields geometrically separable features, finding that the data, architecture, optimizer, and tokenizer all play key roles. In particular, we identify two different routes through which models can acquire geometrically separable features: they can learn them from complementary co-occurrence signals in general language data, including text-number co-occurrence and cross-number interaction, or from multi-token (but not single-token) addition problems. Overall, our results highlight the phenomenon of convergent evolution in feature learning: A diverse range of models learn similar features from different training signals.', 'score': 1, 'issue_id': 2019, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': '7166de41881fe93e', 'authors': ['Deqing Fu', 'Tianyi Zhou', 'Mikhail Belkin', 'Vatsal Sharan', 'Robin Jia'], 'affiliations': ['UC San Diego', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2604.20817.jpg', 'data': {'categories': ['#math', '#training', '#interpretability', '#architecture'], 'emoji': '🔢', 'ru': {'title': 'Периодические представления чисел в языковых моделях: от спектра к геометрической разделимости', 'desc': 'В работе исследуется, как языковые модели представляют числа через периодические признаки в частотной области Фурье. Авторы обнаруживают двухуровневую иерархию: все модели (Трансформеры, RNN, LSTM) развивают периодические спектральные характеристики, но только некоторые из них создают геометрически разделимые признаки для линейной классификации чисел по модулю T. Доказано, что разреженность в частотной области необходима, но недостаточна для достижения такой разделимости. Исследование показывает, что архитектура, данные обучения, оптимизатор и токенизатор совместно определяют, развиваются ли геометрически разделимые признаки из сигналов сопряженной встречаемости в текстах или из задач сложения многотокенных чисел.'}, 'en': {'title': 'Unlocking Number Representation in Language Models', 'desc': 'This paper explores how language models, like Transformers, learn to represent numbers using periodic features in their Fourier domains. It reveals that while many models can identify periodic spikes, only some can achieve geometrically separable features necessary for linear classification of numbers modulo T. The authors demonstrate that having sparse Fourier representations is important, but not enough for achieving this separability. They also show that various factors, including data type and model architecture, influence the ability of models to learn these useful features, highlighting a convergent evolution in feature learning across different models.'}, 'zh': {'title': '语言模型的几何可分特征学习', 'desc': '本文探讨了语言模型在傅里叶域中如何学习周期性数值表示。研究发现，虽然多种模型（如Transformers和LSTMs）都能学习到具有周期性特征的表示，但只有部分模型能够学习到几何可分的特征，以便进行模T的线性分类。我们证明了傅里叶域的稀疏性是几何可分性的必要条件，但不足以保证其充分性。通过实证研究，我们发现数据、架构、优化器和分词器在模型训练中都扮演着关键角色，模型可以通过不同的途径获得几何可分特征。'}}}, {'id': 'https://huggingface.co/papers/2604.19720', 'title': 'ReImagine: Rethinking Controllable High-Quality Human Video Generation via Image-First Synthesis', 'url': 'https://huggingface.co/papers/2604.19720', 'abstract': 'Abstract A pose- and viewpoint-controllable human video generation method combines image generation with SMPL-X motion guidance and video diffusion models to produce high-quality, temporally consistent videos.  AI-generated summary Human video generation remains challenging due to the difficulty of jointly modeling human appearance, motion, and camera viewpoint under limited multi-view data. Existing methods often address these factors separately, resulting in limited controllability or reduced visual quality. We revisit this problem from an image-first perspective, where high-quality human appearance is learned via image generation and used as a prior for video synthesis, decoupling appearance modeling from temporal consistency. We propose a pose- and viewpoint-controllable pipeline that combines a pretrained image backbone with SMPL-X-based motion guidance, together with a training-free temporal refinement stage based on a pretrained video diffusion model. Our method produces high-quality, temporally consistent videos under diverse poses and viewpoints. We also release a canonical human dataset and an auxiliary model for compositional human image synthesis. Code and data are publicly available at https://github.com/Taited/ReImagine.', 'score': 1, 'issue_id': 2021, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '0e9352b6d0141c9c', 'authors': ['Zhengwentai Sun', 'Keru Zheng', 'Chenghong Li', 'Hongjie Liao', 'Xihe Yang', 'Heyuan Li', 'Yihao Zhi', 'Shuliang Ning', 'Shuguang Cui', 'Xiaoguang Han'], 'affiliations': ['Future Network of Intelligence Institute, CUHK-Shenzhen, China', 'School of Science and Engineering, The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2604.19720.jpg', 'data': {'categories': ['#open_source', '#dataset', '#3d', '#diffusion', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Управляемая генерация видео человека через композицию изображений и диффузионных моделей', 'desc': 'В работе представлен метод генерации видео с людьми, который позволяет контролировать позу и угол обзора камеры. Авторы используют предварительно обученную модель генерации изображений для изучения внешнего вида человека, а затем применяют SMPL-X для управления движениями. Для обеспечения временной согласованности кадров используется предварительно обученная модель видео-диффузии без дополнительного обучения. Метод производит высокое качество видео с хорошей временной консистентностью при различных позах и ракурсах.'}, 'en': {'title': 'Controllable Human Video Generation with High Quality and Consistency', 'desc': 'This paper presents a novel method for generating human videos that allows control over pose and viewpoint. It combines image generation techniques with SMPL-X motion guidance and video diffusion models to ensure high visual quality and temporal consistency. By focusing on generating high-quality human appearances first, the method separates appearance modeling from the challenges of maintaining motion over time. The authors also provide a new dataset and tools for further research in compositional human image synthesis.'}, 'zh': {'title': '可控的人类视频生成新方法', 'desc': '本论文提出了一种可控的人类视频生成方法，结合了图像生成、SMPL-X运动指导和视频扩散模型，以生成高质量且时间一致的视频。该方法解决了在有限的多视角数据下，人类外观、运动和相机视角建模的挑战。通过将外观建模与时间一致性解耦，我们采用图像优先的视角，利用高质量的图像生成作为视频合成的先验。最终，我们的方法能够在多种姿势和视角下生成高质量、时间一致的视频，并发布了一个标准人类数据集和辅助模型。'}}}, {'id': 'https://huggingface.co/papers/2604.19945', 'title': 'Visual Reasoning through Tool-supervised Reinforcement Learning', 'url': 'https://huggingface.co/papers/2604.19945', 'abstract': 'Abstract A novel Tool-supervised Reinforcement Learning framework is presented that enables multimodal large language models to effectively learn tool-use for complex visual reasoning through a two-stage curriculum approach.  AI-generated summary In this paper, we investigate the problem of how to effectively master tool-use to solve complex visual reasoning tasks for Multimodal Large Language Models. To achieve that, we propose a novel Tool-supervised Reinforcement Learning (ToolsRL) framework, with direct tool supervision for more effective tool-use learning. We focus on a series of simple, native, and interpretable visual tools, including zoom-in, rotate, flip, and draw point/line, whose tool supervision is easy to collect. A reinforcement learning curriculum is developed, where the first stage is solely optimized by a set of well motivated tool-specific rewards, and the second stage is trained with the accuracy targeted rewards while allowing calling tools. In this way, tool calling capability is mastered before using tools to complete visual reasoning tasks, avoiding the potential optimization conflict among those heterogeneous tasks. Our experiments have shown that the tool-supervised curriculum training is efficient and ToolsRL can achieve strong tool-use capabilities for complex visual reasoning tasks.', 'score': 1, 'issue_id': 2021, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '16560c9f8b3480cb', 'authors': ['Qihua Dong', 'Gozde Sahin', 'Pei Wang', 'Zhaowei Cai', 'Robik Shrestha', 'Hao Yang', 'Davide Modolo'], 'affiliations': ['Amazon AGI', 'Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2604.19945.jpg', 'data': {'categories': ['#cv', '#rl', '#multimodal', '#training'], 'emoji': '🔧', 'ru': {'title': 'Двухэтапное обучение с подкреплением для освоения инструментов в зрительном анализе', 'desc': 'В работе предложена новая схема обучения с подкреплением (Tool-supervised Reinforcement Learning), которая позволяет мультимодальным большим языковым моделям эффективно учиться использовать инструменты для сложного анализа изображений. Авторы применили двухэтапный подход обучения: на первом этапе модель оптимизируется по вознаграждениям, специфичным для каждого инструмента (масштабирование, поворот, отражение, рисование точек и линий), а на втором этапе обучается решению основных задач с использованием освоенных инструментов. Такое разделение обучения на этапы позволяет избежать конфликтов оптимизации между разнородными целями и сделать процесс обучения более эффективным. Экспериментальные результаты показывают, что предложенный метод успешно обучает модели использовать инструменты для решения сложных задач визуального понимания.'}, 'en': {'title': 'Mastering Tool Use for Visual Reasoning with ToolsRL', 'desc': "This paper introduces a new framework called Tool-supervised Reinforcement Learning (ToolsRL) that helps large language models learn how to use tools for solving complex visual reasoning problems. The framework uses a two-stage curriculum approach, where the first stage focuses on teaching the model to use specific visual tools like zooming and drawing through targeted rewards. In the second stage, the model learns to apply these tools while aiming for accuracy in its reasoning tasks. The results show that this method effectively enhances the model's ability to use tools in visual reasoning scenarios."}, 'zh': {'title': '工具监督强化学习：提升视觉推理能力的关键', 'desc': '本文提出了一种新颖的工具监督强化学习框架，旨在帮助多模态大型语言模型有效学习工具使用，以解决复杂的视觉推理任务。我们设计了一个两阶段的课程学习方法，第一阶段通过特定的工具奖励进行优化，第二阶段则结合准确性奖励和工具调用。我们使用了一系列简单、直观的视觉工具，如放大、旋转、翻转和绘制点/线，这些工具的监督易于收集。实验结果表明，工具监督的课程训练高效，ToolsRL在复杂视觉推理任务中展现了强大的工具使用能力。'}}}, {'id': 'https://huggingface.co/papers/2604.18805', 'title': 'AI scientists produce results without reasoning scientifically', 'url': 'https://huggingface.co/papers/2604.18805', 'abstract': 'Abstract Large language model-based scientific agents demonstrate consistent reasoning patterns that lack key epistemic features of scientific inquiry, regardless of task type or successful context, indicating fundamental limitations in their ability to replicate genuine scientific reasoning processes.  AI-generated summary Large language model (LLM)-based systems are increasingly deployed to conduct scientific research autonomously, yet whether their reasoning adheres to the epistemic norms that make scientific inquiry self-correcting is poorly understood. Here, we evaluate LLM-based scientific agents across eight domains, spanning workflow execution to hypothesis-driven inquiry, through more than 25,000 agent runs and two complementary lenses: (i) a systematic performance analysis that decomposes the contributions of the base model and the agent scaffold, and (ii) a behavioral analysis of the epistemological structure of agent reasoning. We observe that the base model is the primary determinant of both performance and behavior, accounting for 41.4% of explained variance versus 1.5% for the scaffold. Across all configurations, evidence is ignored in 68% of traces, refutation-driven belief revision occurs in 26%, and convergent multi-test evidence is rare. The same reasoning pattern appears whether the agent executes a computational workflow or conducts hypothesis-driven inquiry. They persist even when agents receive near-complete successful reasoning trajectories as context, and the resulting unreliability compounds across repeated trials in epistemically demanding domains. Thus, current LLM-based agents execute scientific workflows but do not exhibit the epistemic patterns that characterize scientific reasoning. Outcome-based evaluation cannot detect these failures, and scaffold engineering alone cannot repair them. Until reasoning itself becomes a training target, the scientific knowledge produced by such agents cannot be justified by the process that generated it.', 'score': 1, 'issue_id': 2021, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': 'f17d9b5d2b94e077', 'authors': ['Martiño Ríos-García', 'Nawaf Alampara', 'Chandan Gupta', 'Indrajeet Mandal', 'Sajid Mannan', 'Ali Asghar Aghajani', 'N. M. Anoop Krishnan', 'Kevin Maik Jablonka'], 'affiliations': ['Center for Energy and Environmental Chemistry Jena, Friedrich Schiller University Jena', 'Department of Civil Engineering, Indian Institute of Technology Delhi', 'Friedrich Schiller University Jena', 'Helmholtz Institute for Polymers in Energy Applications Jena (HIPOLE Jena)', 'Indian Institute of Technology Delhi', 'Laboratory of Organic and Macromolecular Chemistry (IOMC), Friedrich Schiller University Jena', 'School of Interdisciplinary Research, Indian Institute of Technology Delhi', 'Yardi School of Artificial Intelligence, Indian Institute of Technology Delhi'], 'pdf_title_img': 'assets/pdf/title_img/2604.18805.jpg', 'data': {'categories': ['#interpretability', '#training', '#agents', '#reasoning', '#science'], 'emoji': '🔬', 'ru': {'title': 'LLM-агенты имитируют науку, но не мыслят научно', 'desc': 'В статье исследуется, насколько хорошо LLM-based агенты воспроизводят научный метод при проведении автономных исследований. Авторы провели более 25,000 экспериментов в восьми научных областях и обнаружили, что эти системы игнорируют доказательства в 68% случаев и редко пересматривают убеждения на основе опровержений. Основная модель определяет поведение агентов гораздо сильнее, чем архитектура системы (41.4% против 1.5% объяснённой дисперсии). Авторы заключают, что современные LLM-агенты выполняют научные рабочие процессы, но не обладают ключевыми эпистемическими характеристиками настоящего научного рассуждения.'}, 'en': {'title': 'Rethinking AI: Scientific Agents Lack True Reasoning Skills', 'desc': 'This paper investigates the reasoning capabilities of large language model (LLM)-based scientific agents in conducting research. It finds that these agents often fail to adhere to essential epistemic norms of scientific inquiry, leading to unreliable outcomes. The study analyzes over 25,000 runs across various tasks, revealing that the base model significantly influences both performance and reasoning behavior. Ultimately, the authors argue that without focusing on improving reasoning processes in training, the scientific knowledge generated by these agents remains questionable.'}, 'zh': {'title': '大型语言模型的科学推理局限性', 'desc': '基于大型语言模型的科学代理在执行科学研究时表现出一致的推理模式，但缺乏科学探究所需的关键认识特征。这表明它们在复制真正的科学推理过程方面存在根本性限制。研究表明，基础模型是决定性能和行为的主要因素，而代理的结构对结果的影响微乎其微。当前的评估方法无法识别这些缺陷，因此在没有将推理本身作为训练目标的情况下，这些代理生成的科学知识无法得到合理的验证。'}}}, {'id': 'https://huggingface.co/papers/2604.17568', 'title': 'Diverse Dictionary Learning', 'url': 'https://huggingface.co/papers/2604.17568', 'abstract': 'Abstract Without strong assumptions, latent variable recovery is made possible through diverse dictionary learning that identifies set-theoretic relationships and structures from observational data.  AI-generated summary Given only observational data X = g(Z), where both the latent variables Z and the generating process g are unknown, recovering Z is ill-posed without additional assumptions. Existing methods often assume linearity or rely on auxiliary supervision and functional constraints. However, such assumptions are rarely verifiable in practice, and most theoretical guarantees break down under even mild violations, leaving uncertainty about how to reliably understand the hidden world. To make identifiability actionable in the real-world scenarios, we take a complementary view: in the general settings where full identifiability is unattainable, what can still be recovered with guarantees, and what biases could be universally adopted? We introduce the problem of diverse dictionary learning to formalize this view. Specifically, we show that intersections, complements, and symmetric differences of latent variables linked to arbitrary observations, along with the latent-to-observed dependency structure, are still identifiable up to appropriate indeterminacies even without strong assumptions. These set-theoretic results can be composed using set algebra to construct structured and essential views of the hidden world, such as genus-differentia definitions. When sufficient structural diversity is present, they further imply full identifiability of all latent variables. Notably, all identifiability benefits follow from a simple inductive bias during estimation that can be readily integrated into most models. We validate the theory and demonstrate the benefits of the bias on both synthetic and real-world data.', 'score': 1, 'issue_id': 2021, 'pub_date': '2026-04-19', 'pub_date_card': {'ru': '19 апреля', 'en': 'April 19', 'zh': '4月19日'}, 'hash': 'f7cbf6fc079a7fea', 'authors': ['Yujia Zheng', 'Zijian Li', 'Shunxing Fan', 'Andrew Gordon Wilson', 'Kun Zhang'], 'affiliations': ['CMU', 'MBZUAI', 'NYU'], 'pdf_title_img': 'assets/pdf/title_img/2604.17568.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Восстановление скрытых переменных через множественные структурные отношения без сильных предположений', 'desc': 'В этой работе решается проблема восстановления скрытых переменных Z из наблюдаемых данных X без строгих предположений о линейности или структуре данных. Авторы предлагают метод diverse dictionary learning, который позволяет восстанавливать не сами переменные, а их множественные отношения: пересечения, дополнения и симметрические разности. Показано, что эти теоретико-множественные конструкции остаются идентифицируемы даже без сильных предположений, и могут быть использованы для построения структурированного представления скрытого мира. Простое индуктивное смещение при обучении модели позволяет гарантировать восстановление зависимостей между скрытыми и наблюдаемыми переменными.'}, 'en': {'title': 'Unlocking Hidden Variables with Diverse Dictionary Learning', 'desc': 'This paper addresses the challenge of recovering latent variables from observational data without relying on strong assumptions. It introduces the concept of diverse dictionary learning, which allows for the identification of relationships and structures among latent variables even when full identifiability is not possible. The authors demonstrate that certain set-theoretic properties of latent variables can still be recovered, providing a framework for understanding hidden data. Their approach shows that with sufficient structural diversity, it is possible to achieve full identifiability, and they validate their findings through experiments on both synthetic and real-world datasets.'}, 'zh': {'title': '多样化字典学习：揭示隐藏变量的可能性', 'desc': '本文探讨了在缺乏强假设的情况下，通过多样化字典学习来恢复潜在变量的问题。研究表明，即使在没有强假设的情况下，潜在变量的交集、补集和对称差异仍然可以被识别。通过集合代数，这些结果可以构建出隐藏世界的结构化视图。我们还验证了理论，并在合成和真实数据上展示了这种偏差的好处。'}}}, {'id': 'https://huggingface.co/papers/2604.16529', 'title': 'Scaling Test-Time Compute for Agentic Coding', 'url': 'https://huggingface.co/papers/2604.16529', 'abstract': 'Abstract Test-time scaling framework for agentic coding uses compact trajectory representations and recursive voting/parallel-distill-refine methods to improve long-horizon task performance.  AI-generated summary Test-time scaling has become a powerful way to improve large language models. However, existing methods are best suited to short, bounded outputs that can be directly compared, ranked or refined. Long-horizon coding agents violate this premise: each attempt produces an extended trajectory of actions, observations, errors, and partial progress taken by the agent. In this setting, the main challenge is no longer generating more attempts, but representing prior experience in a form that can be effectively selected from and reused. We propose a test-time scaling framework for agentic coding based on compact representations of rollout trajectories. Our framework converts each rollout into a structured summary that preserves its salient hypotheses, progress, and failure modes while discarding low-signal trace details. This representation enables two complementary forms of inference-time scaling. For parallel scaling, we introduce Recursive Tournament Voting (RTV), which recursively narrows a population of rollout summaries through small-group comparisons. For sequential scaling, we adapt Parallel-Distill-Refine (PDR) to the agentic setting by conditioning new rollouts on summaries distilled from prior attempts. Our method consistently improves the performance of frontier coding agents across SWE-Bench Verified and Terminal-Bench v2.0. For example, by using our method Claude-4.5-Opus improves from 70.9% to 77.6% on SWE-Bench Verified (mini-SWE-agent) and 46.9% to 59.1% on Terminal-Bench v2.0 (Terminus 1). Our results suggest that test-time scaling for long-horizon agents is fundamentally a problem of representation, selection, and reuse.', 'score': 1, 'issue_id': 2020, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '307d9a429f4c09b1', 'authors': ['Joongwon Kim', 'Wannan Yang', 'Kelvin Niu', 'Hongming Zhang', 'Yun Zhu', 'Eryk Helenowski', 'Ruan Silva', 'Zhengxing Chen', 'Srinivasan Iyer', 'Manzil Zaheer', 'Daniel Fried', 'Hannaneh Hajishirzi', 'Sanjeev Arora', 'Gabriel Synnaeve', 'Ruslan Salakhutdinov', 'Anirudh Goyal'], 'affiliations': ['Carnegie Mellon University', 'Google DeepMind', 'Meta Superintelligence Labs', 'New York University', 'Princeton University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.16529.jpg', 'data': {'categories': ['#agents', '#optimization', '#inference', '#reasoning', '#benchmark'], 'emoji': '🏆', 'ru': {'title': 'Масштабирование долгосрочных агентов через представление, отбор и переиспользование опыта', 'desc': 'Статья предлагает framework для масштабирования на этапе тестирования агентов, которые решают задачи кодирования. Основная идея — преобразовать длинные траектории действий агента в компактные структурированные представления, которые сохраняют ключевую информацию, но отбрасывают шум. Авторы вводят два метода использования этих представлений: Recursive Tournament Voting для параллельного масштабирования и адаптированный Parallel-Distill-Refine для последовательного совершенствования. Метод значительно улучшает производительность современных кодирующих агентов на бенчмарках SWE-Bench и Terminal-Bench.'}, 'en': {'title': 'Enhancing Long-Horizon Task Performance through Smart Representation', 'desc': 'This paper introduces a test-time scaling framework designed to enhance the performance of coding agents over long tasks. It focuses on creating compact representations of action trajectories, which summarize key hypotheses and progress while filtering out less important details. The framework employs two main techniques: Recursive Tournament Voting (RTV) for parallel scaling and Parallel-Distill-Refine (PDR) for sequential scaling, allowing agents to leverage past experiences effectively. The proposed methods show significant performance improvements in coding tasks, demonstrating that effective representation and reuse of prior experiences are crucial for long-horizon agent performance.'}, 'zh': {'title': '提升长时间任务表现的代理编码框架', 'desc': '本文提出了一种测试时缩放框架，用于改进长时间任务的表现，特别是在代理编码中。该框架利用紧凑的轨迹表示和递归投票/并行蒸馏-精炼方法，帮助代理更有效地选择和重用先前的经验。通过将每个轨迹转换为结构化摘要，保留重要的假设和进展，同时丢弃低信号细节，提升了推理时的缩放能力。实验结果表明，该方法显著提高了前沿编码代理在多个基准测试中的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.11610', 'title': 'Self-Evolving LLM Memory Extraction Across Heterogeneous Tasks', 'url': 'https://huggingface.co/papers/2604.11610', 'abstract': 'Abstract LLM-based assistants require heterogeneous memory extraction capabilities, which are evaluated through the BEHEMOTH benchmark, with CluE offering improved performance through cluster-based prompt optimization.  AI-generated summary As LLM-based assistants become persistent and personalized, they must extract and retain useful information from past conversations as memory. However, the types of information worth remembering vary considerably across tasks. We formalize the heterogeneous memory extraction task and introduce BEHEMOTH, a benchmark that repurposes 18 existing datasets spanning personalization, problem-solving, and agentic tasks, using a downstream utility-driven metric for systematic evaluation. Our empirical analysis confirms that no single static extraction prompt dominates across all task categories, and that existing self-evolving prompt optimization frameworks, originally designed for homogeneous distributions, degrade when training tasks are heterogeneous. To address this, we propose CluE, a cluster-based self-evolving strategy that groups training examples into clusters by extraction scenarios, analyzes each cluster independently, and synthesizes cross-cluster insights to update the extraction prompt. Experiments on BEHEMOTH show that CluE generalizes effectively across heterogeneous tasks (+9.04\\% relative gain), consistently outperforming prior self-evolving frameworks.', 'score': 1, 'issue_id': 2019, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '2c0206940c1feaeb', 'authors': ['Yuqing Yang', 'Tengxiao Liu', 'Wang Bill Zhu', 'Taiwei Shi', 'Linxin Song', 'Robin Jia'], 'affiliations': ['University of California, Santa Barbara', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2604.11610.jpg', 'data': {'categories': ['#agents', '#benchmark', '#training'], 'emoji': '💾', 'ru': {'title': 'Адаптивная оптимизация промптов для разнородного извлечения информации в памяти LLM', 'desc': 'В статье рассматривается задача извлечения разнородной информации из диалогов для памяти LLM-ассистентов. Авторы представляют бенчмарк BEHEMOTH, который объединяет 18 существующих датасетов для систематической оценки способностей извлечения информации. Они показывают, что традиционные методы оптимизации промптов не работают эффективно в условиях разнородных задач. Предложенный метод CluE использует кластеризацию примеров для независимого анализа различных сценариев и достигает улучшения на 9,04% по сравнению с существующими подходами.'}, 'en': {'title': 'Enhancing Memory Extraction in LLMs with CluE', 'desc': 'This paper discusses the need for large language model (LLM) assistants to effectively extract and remember diverse types of information from conversations. It introduces the BEHEMOTH benchmark, which evaluates memory extraction capabilities across various tasks using a utility-driven metric. The study reveals that traditional prompt optimization methods struggle with heterogeneous tasks, leading to suboptimal performance. To overcome this, the authors propose CluE, a cluster-based approach that improves prompt optimization by analyzing and synthesizing insights from different extraction scenarios, resulting in better performance across varied tasks.'}, 'zh': {'title': '异质记忆提取的创新解决方案', 'desc': '本论文探讨了基于大语言模型的助手在记忆提取方面的异质性需求，并通过BEHEMOTH基准进行评估。我们提出了一种新的基准，整合了18个现有数据集，以便系统性地评估个性化、问题解决和自主任务的记忆提取能力。研究表明，单一的静态提取提示无法在所有任务类别中表现优越，而现有的自我演化提示优化框架在异质任务上表现不佳。为了解决这个问题，我们提出了CluE，一种基于聚类的自我演化策略，通过将训练示例按提取场景分组，独立分析每个聚类，并综合跨聚类的见解来更新提取提示。'}}}, {'id': 'https://huggingface.co/papers/2604.18932', 'title': 'Tadabur: A Large-Scale Quran Audio Dataset', 'url': 'https://huggingface.co/papers/2604.18932', 'abstract': 'Abstract  Despite growing interest in Quranic data research, existing Quran datasets remain limited in both scale and diversity. To address this gap, we present Tadabur, a large-scale Quran audio dataset. Tadabur comprises more than 1400+ hours of recitation audio from over 600 distinct reciters, providing substantial variation in recitation styles, vocal characteristics, and recording conditions. This diversity makes Tadabur a comprehensive and representative resource for Quranic speech research and analysis. By significantly expanding both the total duration and variability of available Quran data, Tadabur aims to support future research and facilitate the development of standardized Quranic speech benchmarks.', 'score': 0, 'issue_id': 2021, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '306e8c9fb6e9436a', 'authors': ['Faisal Alherran'], 'affiliations': ['Riyadh, Saudi Arabia'], 'pdf_title_img': 'assets/pdf/title_img/2604.18932.jpg', 'data': {'categories': [], 'emoji': '🎙️', 'ru': {'title': 'Масштабный аудиодатасет для исследования речи Корана', 'desc': 'В статье представлен новый большой датасет Tadabur для исследования Корана, содержащий более 1400 часов аудиозаписей чтения священного текста от более чем 600 различных чтецов. Датасет отличается высокой вариативностью в стилях чтения, голосовых характеристиках и условиях записи, что делает его репрезентативным ресурсом для анализа речи. Авторы значительно расширили масштаб и разнообразие доступных данных для работы с Кораном, создав фундамент для развития машинного обучения в этой области. Данный датасет позволит развивать стандартизированные бенчмарки и ускорит исследования в области обработки Кораническую речи.'}, 'en': {'title': 'Tadabur: Expanding the Horizons of Quranic Audio Research', 'desc': 'The paper introduces Tadabur, a new large-scale dataset specifically designed for Quranic audio research. It includes over 1400 hours of recitation from more than 600 different reciters, showcasing a wide range of styles and vocal traits. This dataset aims to enhance the diversity and scale of existing Quran datasets, which have been limited in the past. By providing a comprehensive resource, Tadabur seeks to support future machine learning research and the establishment of standardized benchmarks in Quranic speech analysis.'}, 'zh': {'title': 'Tadabur：丰富多样的古兰经音频数据集', 'desc': '本论文介绍了Tadabur，一个大规模的古兰经音频数据集，旨在填补现有古兰经数据集在规模和多样性上的不足。Tadabur包含超过1400小时的朗读音频，来自600多位不同的朗读者，提供了丰富的朗读风格、声音特征和录音条件的变化。这种多样性使Tadabur成为古兰经语音研究和分析的全面代表性资源。通过显著扩展可用古兰经数据的总时长和变异性，Tadabur旨在支持未来的研究并促进标准化古兰经语音基准的开发。'}}}, {'id': 'https://huggingface.co/papers/2604.19902', 'title': 'MMCORE: MultiModal COnnection with Representation Aligned Latent Embeddings', 'url': 'https://huggingface.co/papers/2604.19902', 'abstract': 'Abstract MMCORE is a unified framework for multimodal image generation and editing that uses a pre-trained Vision-Language Model to predict semantic visual embeddings for diffusion model conditioning, enabling efficient high-fidelity visual synthesis.  AI-generated summary We present MMCORE, a unified framework designed for multimodal image generation and editing. MMCORE leverages a pre-trained Vision-Language Model (VLM) to predict semantic visual embeddings via learnable query tokens, which subsequently serve as conditioning signals for a diffusion model. This streamlined design effectively transfers the rich understanding and reasoning capabilities of VLMs into the visual generation process. By obviating the need for deep fusion between autoregressive and diffusion models or training from scratch, MMCORE significantly reduces computational overhead while maintaining high-fidelity synthesis.   MMCORE seamlessly integrates text-to-image synthesis with interleaved image generation, demonstrating robust multimodal comprehension in complex scenarios such as spatial reasoning and visual grounding. Comprehensive evaluations indicate that MMCORE consistently outperforms state-of-the-art baselines across a broad spectrum of text-to-image and single/multi-image editing benchmarks.', 'score': 0, 'issue_id': 2019, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'df25c0f5ac707494', 'authors': ['Zijie Li', 'Yichun Shi', 'Jingxiang Sun', 'Ye Wang', 'Yixuan Huang', 'Zhiyao Guo', 'Xiaochen Lian', 'Peihao Zhu', 'Yu Tian', 'Zhonghua Zhai', 'Peng Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.19902.jpg', 'data': {'categories': ['#cv', '#architecture', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единый фреймворк для генерации и редактирования изображений через семантические эмбеддинги', 'desc': 'MMCORE представляет собой единый фреймворк для генерации и редактирования изображений, использующий предварительно обученную Vision-Language модель для предсказания семантических визуальных эмбеддингов. Эти эмбеддинги служат условиями для диффузионной модели, обеспечивая эффективный синтез изображений высокого качества. Архитектура переносит возможности понимания и рассуждения VLM в процесс визуальной генерации без необходимости в глубокой интеграции авторегрессионных моделей. Фреймворк демонстрирует превосходные результаты в синтезе текст-в-изображение и редактировании изображений, включая сложные сценарии с пространственным рассуждением.'}, 'en': {'title': 'MMCORE: Revolutionizing Multimodal Image Generation and Editing', 'desc': 'MMCORE is a novel framework that combines image generation and editing using multiple data types, known as multimodal inputs. It utilizes a pre-trained Vision-Language Model (VLM) to create semantic visual embeddings, which guide a diffusion model for generating high-quality images. This approach allows MMCORE to efficiently leverage the advanced understanding of VLMs without the need for extensive model training or complex integrations. The framework excels in tasks like text-to-image synthesis and image editing, showing superi
