    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2602.24233', 'title': 'Enhancing Spatial Understanding in Image Generation via Reward Modeling', 'url': 'https://huggingface.co/papers/2602.24233', 'abstract': 'Abstract A new reward model called SpatialScore is introduced to improve spatial relationship understanding in text-to-image generation through reinforcement learning with a large-scale dataset of preference pairs.  \t\t\t\t\tAI-generated summary Recent progress in text-to-image generation has greatly advanced visual fidelity and creativity, but it has also imposed higher demands on prompt complexity-particularly in encoding intricate spatial relationships. In such cases, achieving satisfactory results often requires multiple sampling attempts. To address this challenge, we introduce a novel method that strengthens the spatial understanding of current image generation models. We first construct the SpatialReward-Dataset with over 80k preference pairs. Building on this dataset, we build SpatialScore, a reward model designed to evaluate the accuracy of spatial relationships in text-to-image generation, achieving performance that even surpasses leading proprietary models on spatial evaluation. We further demonstrate that this reward model effectively enables online reinforcement learning for the complex spatial generation. Extensive experiments across multiple benchmarks show that our specialized reward model yields significant and consistent gains in spatial understanding for image generation.', 'score': 17, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'd7a7ec2f844d66c9', 'authors': ['Zhenyu Tang', 'Chaoran Feng', 'Yufan Deng', 'Jie Wu', 'Xiaojie Li', 'Rui Wang', 'Yunpeng Chen', 'Daquan Zhou'], 'affiliations': ['ByteDance', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2602.24233.jpg', 'data': {'categories': ['#rlhf', '#dataset', '#benchmark', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Специализированная модель вознаграждения для точного понимания пространства в генерации изображений', 'desc': 'В статье предлагается новая модель вознаграждения SpatialScore, которая улучшает понимание пространственных отношений в моделях text-to-image генерации. Авторы создали большой датасет SpatialReward-Dataset с более чем 80 тысячами пар предпочтений для обучения этой модели. Reward model SpatialScore оценивает точность пространственных отношений в сгенерированных изображениях и показывает результаты, превосходящие существующие решения. С помощью reinforcement learning на основе этой модели вознаграждения удается значительно улучшить качество генерации изображений со сложными пространственными отношениями.'}, 'en': {'title': 'Enhancing Spatial Understanding in Image Generation with SpatialScore', 'desc': 'The paper presents a new reward model called SpatialScore aimed at enhancing the understanding of spatial relationships in text-to-image generation. It utilizes a large-scale dataset, the SpatialReward-Dataset, which contains over 80,000 preference pairs to train the model. By employing reinforcement learning, SpatialScore evaluates the accuracy of spatial relationships, outperforming existing proprietary models in this area. The results indicate that this approach leads to significant improvements in generating images that accurately reflect complex spatial arrangements.'}, 'zh': {'title': '提升图像生成的空间理解能力', 'desc': '本文介绍了一种新的奖励模型SpatialScore，旨在通过强化学习提高文本到图像生成中的空间关系理解。我们构建了一个包含超过8万对偏好的SpatialReward-Dataset，以支持该模型的训练。SpatialScore能够评估文本到图像生成中空间关系的准确性，其性能甚至超过了领先的专有模型。通过广泛的实验，我们证明了该奖励模型在复杂空间生成中有效促进了在线强化学习，显著提升了图像生成的空间理解能力。'}}}, {'id': 'https://huggingface.co/papers/2602.23996', 'title': 'Accelerating Masked Image Generation by Learning Latent Controlled Dynamics', 'url': 'https://huggingface.co/papers/2602.23996', 'abstract': 'Abstract MIGM-Shortcut accelerates masked image generation by learning a lightweight model that predicts feature evolution velocity, achieving over 4x speedup with maintained quality.  \t\t\t\t\tAI-generated summary Masked Image Generation Models (MIGMs) have achieved great success, yet their efficiency is hampered by the multiple steps of bi-directional attention. In fact, there exists notable redundancy in their computation: when sampling discrete tokens, the rich semantics contained in the continuous features are lost. Some existing works attempt to cache the features to approximate future features. However, they exhibit considerable approximation error under aggressive acceleration rates. We attribute this to their limited expressivity and the failure to account for sampling information. To fill this gap, we propose to learn a lightweight model that incorporates both previous features and sampled tokens, and regresses the average velocity field of feature evolution. The model has moderate complexity that suffices to capture the subtle dynamics while keeping lightweight compared to the original base model. We apply our method, MIGM-Shortcut, to two representative MIGM architectures and tasks. In particular, on the state-of-the-art Lumina-DiMOO, it achieves over 4x acceleration of text-to-image generation while maintaining quality, significantly pushing the Pareto frontier of masked image generation. The code and model weights are available at https://github.com/Kaiwen-Zhu/MIGM-Shortcut.', 'score': 6, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '704d3753b0840e64', 'authors': ['Kaiwen Zhu', 'Quansheng Zeng', 'Yuandong Pu', 'Shuo Cao', 'Xiaohui Li', 'Yi Xin', 'Qi Qin', 'Jiayang Li', 'Yu Qiao', 'Jinjin Gu', 'Yihao Liu'], 'affiliations': ['Nanjing University', 'Nankai University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The University of Sydney', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2602.23996.jpg', 'data': {'categories': ['#inference', '#cv', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Предсказание динамики признаков для ускорения генерации изображений', 'desc': 'В работе предложен метод MIGM-Shortcut для ускорения моделей генерации изображений с масками путём обучения лёгкой модели, которая предсказывает скорость эволюции признаков. Авторы определили, что традиционные модели имеют вычислительную избыточность из-за многошагового двунаправленного внимания и потери информации при дискретизации токенов. Ключевая идея состоит в регрессии поля средней скорости изменения признаков, которая учитывает как предыдущие признаки, так и дискретизированные токены. На примере архитектуры Lumina-DiMOO метод достигает более чем 4-кратного ускорения при генерации изображений по тексту, сохраняя качество результатов.'}, 'en': {'title': 'Accelerating Masked Image Generation with MIGM-Shortcut', 'desc': 'The paper introduces MIGM-Shortcut, a novel approach to enhance the efficiency of Masked Image Generation Models (MIGMs) by predicting the velocity of feature evolution. By learning a lightweight model that integrates previous features and sampled tokens, it effectively reduces redundancy in computation and accelerates the generation process. This method achieves over 4x speedup in text-to-image generation while preserving the quality of the output. The proposed model demonstrates improved performance on state-of-the-art architectures, pushing the boundaries of efficiency in masked image generation.'}, 'zh': {'title': '加速掩蔽图像生成的轻量级模型', 'desc': 'MIGM-Shortcut是一种加速掩蔽图像生成的方法，通过学习一个轻量级模型来预测特征演变的速度，从而实现了超过4倍的加速，同时保持了生成质量。传统的掩蔽图像生成模型在双向注意力的多个步骤中效率较低，计算中存在显著的冗余。我们的方法通过结合先前的特征和采样的标记，回归特征演变的平均速度场，解决了现有方法在快速加速下的近似误差问题。MIGM-Shortcut在两个代表性的掩蔽图像生成架构和任务上应用，特别是在Lumina-DiMOO上实现了显著的加速效果。'}}}, {'id': 'https://huggingface.co/papers/2602.23898', 'title': 'Ref-Adv: Exploring MLLM Visual Reasoning in Referring Expression Tasks', 'url': 'https://huggingface.co/papers/2602.23898', 'abstract': "Abstract Ref-Adv is a challenging benchmark for referring expression comprehension that eliminates shortcut solutions by using complex linguistic expressions with minimal identifying information and hard distractors, revealing limitations in current multimodal LLMs' visual reasoning capabilities.  \t\t\t\t\tAI-generated summary Referring Expression Comprehension (REC) links language to region level visual perception. Standard benchmarks (RefCOCO, RefCOCO+, RefCOCOg) have progressed rapidly with multimodal LLMs but remain weak tests of visual reasoning and grounding: (i) many expressions are very short, leaving little reasoning demand; (ii) images often contain few distractors, making the target easy to find; and (iii) redundant descriptors enable shortcut solutions that bypass genuine text understanding and visual reasoning. We introduce Ref-Adv, a modern REC benchmark that suppresses shortcuts by pairing linguistically nontrivial expressions with only the information necessary to uniquely identify the target. The dataset contains referring expressions on real images, curated with hard distractors and annotated with reasoning facets including negation. We conduct comprehensive ablations (word order perturbations and descriptor deletion sufficiency) to show that solving Ref-Adv requires reasoning beyond simple cues, and we evaluate a broad suite of contemporary multimodal LLMs on Ref-Adv. Despite strong results on RefCOCO, RefCOCO+, and RefCOCOg, models drop markedly on Ref-Adv, revealing reliance on shortcuts and gaps in visual reasoning and grounding. We provide an in depth failure analysis and aim for Ref-Adv to guide future work on visual reasoning and grounding in MLLMs.", 'score': 4, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'df0f24b216c0f438', 'authors': ['Qihua Dong', 'Kuo Yang', 'Lin Ju', 'Handong Zhao', 'Yitian Zhang', 'Yizhou Wang', 'Huimin Zeng', 'Jianglin Lu', 'Yun Fu'], 'affiliations': ['Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23898.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#cv', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Честный тест визуального мышления мультимодальных моделей через сложные описания', 'desc': 'В работе представлен бенчмарк Ref-Adv для задачи понимания описательных выражений, который исключает использование упрощённых стратегий благодаря сложным лингвистическим структурам и минимальной избыточной информации. Датасет содержит сложные дистракторы и аннотирован различными типами рассуждений, включая отрицания, требуя от моделей истинного понимания текста и визуального анализа. Авторы проводят комплексный анализ с помощью пертурбаций и удаления дескрипторов, демонстрируя, что решение Ref-Adv требует сложного рассуждения, а не простых визуальных подсказок. Оценка современных мультимодальных LLM показывает значительное снижение производительности на новом бенчмарке по сравнению со стандартными датасетами, выявляя пробелы в визуальном рассуждении и привязке к тексту.'}, 'en': {'title': 'Ref-Adv: Elevating Visual Reasoning in Language Models', 'desc': "The paper introduces Ref-Adv, a new benchmark for referring expression comprehension (REC) that challenges current multimodal large language models (LLMs) by using complex linguistic expressions and hard distractors. Unlike previous benchmarks, Ref-Adv requires models to engage in deeper visual reasoning and avoid shortcut solutions, as it pairs intricate expressions with minimal identifying information. The dataset includes real images and is designed to test the models' ability to understand and ground language in visual contexts effectively. The results show that while models perform well on simpler benchmarks, they struggle significantly with Ref-Adv, highlighting their limitations in genuine visual reasoning."}, 'zh': {'title': 'Ref-Adv：提升视觉推理能力的挑战', 'desc': 'Ref-Adv是一个具有挑战性的基准，用于理解指代表达，旨在通过使用复杂的语言表达和困难的干扰项来消除捷径解决方案。这一基准揭示了当前多模态大语言模型在视觉推理能力方面的局限性。与传统基准相比，Ref-Adv要求模型在仅有必要信息的情况下，进行更深入的推理，而不是依赖简单的线索。通过对多种现代多模态大语言模型的评估，结果显示这些模型在Ref-Adv上的表现显著下降，表明它们在视觉推理和基础知识方面存在缺陷。'}}}, {'id': 'https://huggingface.co/papers/2602.24286', 'title': 'CUDA Agent: Large-Scale Agentic RL for High-Performance CUDA Kernel Generation', 'url': 'https://huggingface.co/papers/2602.24286', 'abstract': "Abstract CUDA Agent, a large-scale agentic reinforcement learning system, achieves state-of-the-art performance in CUDA kernel optimization by combining scalable data synthesis, skill-augmented development environment, and reinforcement learning techniques.  \t\t\t\t\tAI-generated summary GPU kernel optimization is fundamental to modern deep learning but remains a highly specialized task requiring deep hardware expertise. Despite strong performance in general programming, large language models (LLMs) remain uncompetitive with compiler-based systems such as torch.compile for CUDA kernel generation. Existing CUDA code generation approaches either rely on training-free refinement or fine-tune models within fixed multi-turn execution-feedback loops, but both paradigms fail to fundamentally improve the model's intrinsic CUDA optimization ability, resulting in limited performance gains. We present CUDA Agent, a large-scale agentic reinforcement learning system that develops CUDA kernel expertise through three components: a scalable data synthesis pipeline, a skill-augmented CUDA development environment with automated verification and profiling to provide reliable reward signals, and reinforcement learning algorithmic techniques enabling stable training. CUDA Agent achieves state-of-the-art results on KernelBench, delivering 100\\%, 100\\%, and 92\\% faster rate over torch.compile on KernelBench Level-1, Level-2, and Level-3 splits, outperforming the strongest proprietary models such as Claude Opus 4.5 and Gemini 3 Pro by about 40\\% on the hardest Level-3 setting.", 'score': 3, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'c9ca8055595a24fd', 'authors': ['Weinan Dai', 'Hanlin Wu', 'Qiying Yu', 'Huan-ang Gao', 'Jiahao Li', 'Chengquan Jiang', 'Weiqiang Lou', 'Yufan Song', 'Hongli Yu', 'Jiaze Chen', 'Wei-Ying Ma', 'Ya-Qin Zhang', 'Jingjing Liu', 'Mingxuan Wang', 'Xin Liu', 'Hao Zhou'], 'affiliations': ['ByteDance Seed', 'Institute for AI Industry Research (AIR), Tsinghua University', 'SIA-Lab of Tsinghua AIR and ByteDance Seed'], 'pdf_title_img': 'assets/pdf/title_img/2602.24286.jpg', 'data': {'categories': ['#plp', '#training', '#agents', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Агентное обучение с подкреплением для экспертизы в оптимизации GPU ядер', 'desc': 'CUDA Agent — это система обучения с подкреплением в масштабе, которая обучает языковые модели оптимизации CUDA ядер через три компонента: конвейер синтеза данных, развивающую среду с автоматической верификацией и профилированием для получения надёжных сигналов вознаграждения, и алгоритмические методы обучения с подкреплением. Система достигает состояния искусства в задаче оптимизации GPU ядер, превосходя компиляторы наподобие torch.compile на 92-100% и опережая мощные проприетарные модели на 40% на самых сложных тестах. Такой подход решает фундаментальную проблему недостаточной способности LLM к специализированной оптимизации кода, требующей глубокого понимания аппаратного обеспечения. Работа демонстрирует эффективность применения обучения с подкреплением для развития экспертизы в узкоспециализированных задачах оптимизации.'}, 'en': {'title': 'Revolutionizing CUDA Kernel Optimization with Reinforcement Learning', 'desc': "CUDA Agent is a cutting-edge reinforcement learning system designed to optimize CUDA kernels, which are essential for deep learning tasks. It utilizes a scalable data synthesis pipeline and a skill-augmented development environment to enhance the model's ability to generate efficient CUDA code. Unlike previous methods that relied on fixed feedback loops, CUDA Agent employs advanced reinforcement learning techniques for stable training and improved performance. As a result, it significantly outperforms existing systems, achieving remarkable speed improvements on various benchmark levels."}, 'zh': {'title': 'CUDA Agent：强化学习驱动的CUDA内核优化新纪元', 'desc': 'CUDA Agent 是一个大规模的强化学习系统，专注于优化 CUDA 内核，取得了最先进的性能。它结合了可扩展的数据合成、增强技能的开发环境和强化学习技术。与传统的编译器系统相比，CUDA Agent 在 KernelBench 上的表现显著提升，分别在 Level-1、Level-2 和 Level-3 分割上比 torch.compile 快 100%、100% 和 92%。该系统通过自动验证和分析提供可靠的奖励信号，从而实现稳定的训练和优化。'}}}, {'id': 'https://huggingface.co/papers/2602.24281', 'title': 'Memory Caching: RNNs with Growing Memory', 'url': 'https://huggingface.co/papers/2602.24281', 'abstract': 'Abstract Memory Caching enhances recurrent models by allowing their memory capacity to scale with sequence length, bridging the gap between traditional RNNs and Transformers in long-context tasks.  \t\t\t\t\tAI-generated summary Transformers have been established as the de-facto backbones for most recent advances in sequence modeling, mainly due to their growing memory capacity that scales with the context length. While plausible for retrieval tasks, it causes quadratic complexity and so has motivated recent studies to explore viable subquadratic recurrent alternatives. Despite showing promising preliminary results in diverse domains, such recurrent architectures underperform Transformers in recall-intensive tasks, often attributed to their fixed-size memory. In this paper, we introduce Memory Caching (MC), a simple yet effective technique that enhances recurrent models by caching checkpoints of their memory states (a.k.a. hidden states). Memory Caching allows the effective memory capacity of RNNs to grow with sequence length, offering a flexible trade-off that interpolates between the fixed memory (i.e., O(L) complexity) of RNNs and the growing memory (i.e., O(L^2) complexity) of Transformers. We propose four variants of MC, including gated aggregation and sparse selective mechanisms, and discuss their implications on both linear and deep memory modules. Our experimental results on language modeling, and long-context understanding tasks show that MC enhances the performance of recurrent models, supporting its effectiveness. The results of in-context recall tasks indicate that while Transformers achieve the best accuracy, our MC variants show competitive performance, close the gap with Transformers, and performs better than state-of-the-art recurrent models.', 'score': 3, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'ce478323f82ad06a', 'authors': ['Ali Behrouz', 'Zeman Li', 'Yuan Deng', 'Peilin Zhong', 'Meisam Razaviyayn', 'Vahab Mirrokni'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2602.24281.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '💾', 'ru': {'title': 'Кэширование памяти: объединение эффективности RNN с масштабируемостью Трансформеров', 'desc': 'В статье представлена техника Memory Caching (MC), которая улучшает рекуррентные модели путём кэширования контрольных точек состояния памяти. Этот подход позволяет эффективной ёмкости памяти RNN расти вместе с длиной последовательности, предоставляя гибкий компромисс между O(L) сложностью обычных RNN и O(L²) сложностью Трансформеров. Авторы предлагают четыре варианта MC с различными механизмами агрегации, включая вентильные и разреженные селективные механизмы. Экспериментальные результаты показывают, что MC значительно улучшает производительность рекуррентных моделей на задачах языкового моделирования и понимания длинного контекста, сокращая разрыв с Трансформерами.'}, 'en': {'title': 'Memory Caching: Bridging RNNs and Transformers for Long-Context Tasks', 'desc': 'This paper presents Memory Caching (MC), a technique that improves recurrent neural networks (RNNs) by allowing their memory to grow with the length of input sequences. Traditional RNNs struggle with long-context tasks due to their fixed-size memory, while Transformers excel but have higher computational costs. MC introduces a caching mechanism for memory states, enabling RNNs to achieve a balance between efficiency and performance. The authors demonstrate that their MC variants can compete with Transformers in recall tasks, enhancing the capabilities of recurrent models in language processing.'}, 'zh': {'title': '记忆缓存：提升递归模型的记忆能力', 'desc': '本文提出了一种名为记忆缓存（Memory Caching, MC）的技术，旨在增强递归神经网络（RNN）的记忆能力，使其能够随着序列长度的增加而扩展。MC通过缓存记忆状态的检查点，解决了传统RNN在长序列任务中的固定内存限制问题。实验结果表明，MC在语言建模和长上下文理解任务中显著提升了递归模型的性能，缩小了与变换器（Transformers）之间的差距。尽管变换器在准确性上表现最佳，但我们的MC变体在性能上具有竞争力，优于现有的最先进递归模型。'}}}, {'id': 'https://huggingface.co/papers/2602.24208', 'title': 'SenCache: Accelerating Diffusion Model Inference via Sensitivity-Aware Caching', 'url': 'https://huggingface.co/papers/2602.24208', 'abstract': 'Abstract A sensitivity-aware caching framework improves diffusion model inference efficiency by dynamically selecting cache timesteps based on model output sensitivity to input perturbations.  \t\t\t\t\tAI-generated summary Diffusion models achieve state-of-the-art video generation quality, but their inference remains expensive due to the large number of sequential denoising steps. This has motivated a growing line of research on accelerating diffusion inference. Among training-free acceleration methods, caching reduces computation by reusing previously computed model outputs across timesteps. Existing caching methods rely on heuristic criteria to choose cache/reuse timesteps and require extensive tuning. We address this limitation with a principled sensitivity-aware caching framework. Specifically, we formalize the caching error through an analysis of the model output sensitivity to perturbations in the denoising inputs, i.e., the noisy latent and the timestep, and show that this sensitivity is a key predictor of caching error. Based on this analysis, we propose Sensitivity-Aware Caching (SenCache), a dynamic caching policy that adaptively selects caching timesteps on a per-sample basis. Our framework provides a theoretical basis for adaptive caching, explains why prior empirical heuristics can be partially effective, and extends them to a dynamic, sample-specific approach. Experiments on Wan 2.1, CogVideoX, and LTX-Video show that SenCache achieves better visual quality than existing caching methods under similar computational budgets.', 'score': 1, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '871da998a929ee1d', 'authors': ['Yasaman Haghighi', 'Alexandre Alahi'], 'affiliations': ['Ecole Polytechnique Federale de Lausanne (EPFL)'], 'pdf_title_img': 'assets/pdf/title_img/2602.24208.jpg', 'data': {'categories': ['#inference', '#video', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умное кеширование на основе анализа чувствительности для ускорения диффузионных моделей', 'desc': 'Предложена структура чувствительного к чувствительности кеширования, которая оптимизирует вывод диффузионных моделей путём динамического выбора временных шагов для кеширования на основе анализа чувствительности выходных данных модели к возмущениям входов. Авторы формализуют ошибку кеширования через анализ чувствительности выходов модели относительно изменений зашумленной скрытой переменной и временного шага, показывая, что чувствительность является ключевым предиктором ошибки кеширования. На основе этого анализа предложен метод SenCache, который адаптивно выбирает временные шаги для кеширования на основе каждого образца отдельно, избегая необходимости обширной настройки гиперпараметров. Экспериментальные результаты на видеомоделях Wan 2.1, CogVideoX и LTX-Video демонстрируют лучшее визуальное качество SenCache по сравнению с существующими методами кеширования при сопоставимых вычислительных бюджетах.'}, 'en': {'title': 'Dynamic Caching for Efficient Diffusion Inference', 'desc': "This paper introduces a new caching framework called Sensitivity-Aware Caching (SenCache) that enhances the efficiency of diffusion model inference. It focuses on dynamically selecting which timesteps to cache based on how sensitive the model's outputs are to changes in the input. By analyzing the sensitivity of model outputs to perturbations, the authors provide a theoretical foundation for adaptive caching strategies. The results demonstrate that SenCache improves visual quality in video generation while maintaining similar computational costs compared to existing methods."}, 'zh': {'title': '敏感性驱动的动态缓存提升扩散模型效率', 'desc': '本论文提出了一种敏感性感知缓存框架，以提高扩散模型的推理效率。该框架通过动态选择缓存时间步，基于模型输出对输入扰动的敏感性来优化计算。我们分析了缓存误差，并发现敏感性是预测缓存误差的关键因素。实验结果表明，敏感性感知缓存（SenCache）在相似计算预算下，能够提供比现有缓存方法更好的视觉质量。'}}}, {'id': 'https://huggingface.co/papers/2602.23622', 'title': 'DLEBench: Evaluating Small-scale Object Editing Ability for Instruction-based Image Editing Model', 'url': 'https://huggingface.co/papers/2602.23622', 'abstract': "Abstract A new benchmark called DeepLookEditBench is introduced to evaluate instruction-based image editing models' capability in handling small-scale object editing, revealing significant performance gaps in this area.  \t\t\t\t\tAI-generated summary Significant progress has been made in the field of Instruction-based Image Editing Models (IIEMs). However, while these models demonstrate plausible adherence to instructions and strong reasoning ability on current benchmarks, their ability to edit small objects remains underexplored, despite its importance for precise local editing and refining details in both real and generated images. In this paper, we introduce DeepLookEditBench (DLEBench), the first benchmark dedicated to assessing the abilities of IIEMs in editing small-scale objects. Specifically, we construct a challenging testbed comprising 1889 samples across seven instruction types. In these samples, target objects occupy only 1%-10% of the image area, covering complex scenarios such as partial occlusion and multi-object editing. To ensure robust evaluation on this benchmark, we propose an evaluation protocol with refined score rubrics to minimize subjectivity and ambiguity in two criteria: Instruction Following and Visual Consistency. This protocol also introduces a dual-mode evaluation framework (Tool-driven and Oracle-guided Modes) addressing the misalignment between LMM-as-a-Judge and human judgements on DLEBench. Empirical results on 10 IIEMs reveal significant performance gaps in small-scale object editing, highlighting the need for specialized benchmarks to advance this ability.", 'score': 0, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '8438aed01f1baa04', 'authors': ['Shibo Hong', 'Boxian Ai', 'Jun Kuang', 'Wei Wang', 'FengJiao Chen', 'Zhongyuan Peng', 'Chenhao Huang', 'Yixin Cao'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University', 'Meituan'], 'pdf_title_img': 'assets/pdf/title_img/2602.23622.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Бенчмарк для оценки редактирования мелких объектов в изображениях по инструкциям', 'desc': 'В работе представлен новый бенчмарк DeepLookEditBench для оценки способности моделей редактирования изображений по инструкциям работать с малыми объектами на изображении. Бенчмарк содержит 1889 примеров с семью типами инструкций, где целевые объекты занимают только 1-10% площади изображения, включая сложные сценарии с частичным перекрытием и редактированием нескольких объектов. Авторы предложили протокол оценки с двухрежимной схемой (инструментальный и оракульный режимы) для минимизации субъективности при проверке следования инструкциям и визуальной согласованности. Эмпирические результаты на 10 моделях выявили значительные пробелы в способности редактировать малые объекты, подчеркнув необходимость специализированных бенчмарков для развития этой способности.'}, 'en': {'title': 'DeepLookEditBench: Bridging the Gap in Small-Scale Object Editing', 'desc': 'This paper presents DeepLookEditBench (DLEBench), a new benchmark designed to evaluate instruction-based image editing models (IIEMs) specifically for small-scale object editing. The benchmark includes 1889 samples with objects that occupy only 1%-10% of the image area, addressing complex scenarios like partial occlusion and multi-object editing. The authors propose a refined evaluation protocol to assess models based on Instruction Following and Visual Consistency, minimizing subjectivity in scoring. Results show that current IIEMs have significant performance gaps in editing small objects, indicating a need for focused improvements in this area.'}, 'zh': {'title': '小物体编辑能力的新基准测试', 'desc': '本文介绍了一个新的基准测试，名为DeepLookEditBench，旨在评估基于指令的图像编辑模型在小规模物体编辑方面的能力。尽管现有模型在遵循指令和推理能力上表现良好，但在小物体编辑方面的能力仍未得到充分探索。我们构建了一个包含1889个样本的测试集，涵盖了复杂场景，如部分遮挡和多物体编辑。通过提出评估协议和双模式评估框架，我们希望减少主观性和模糊性，从而更好地评估这些模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2602.22647', 'title': 'Vectorizing the Trie: Efficient Constrained Decoding for LLM-based Generative Retrieval on Accelerators', 'url': 'https://huggingface.co/papers/2602.22647', 'abstract': 'Abstract STATIC is an efficient constrained decoding method that uses a flattened prefix tree represented as a sparse matrix to accelerate generative retrieval on hardware accelerators while maintaining low latency and high throughput.  \t\t\t\t\tAI-generated summary Generative retrieval has emerged as a powerful paradigm for LLM-based recommendation. However, industrial recommender systems often benefit from restricting the output space to a constrained subset of items based on business logic (e.g. enforcing content freshness or product category), which standard autoregressive decoding cannot natively support. Moreover, existing constrained decoding methods that make use of prefix trees (Tries) incur severe latency penalties on hardware accelerators (TPUs/GPUs). In this work, we introduce STATIC (Sparse Transition Matrix-Accelerated Trie Index for Constrained Decoding), an efficient and scalable constrained decoding technique designed specifically for high-throughput LLM-based generative retrieval on TPUs/GPUs. By flattening the prefix tree into a static Compressed Sparse Row (CSR) matrix, we transform irregular tree traversals into fully vectorized sparse matrix operations, unlocking massive efficiency gains on hardware accelerators. We deploy STATIC on a large-scale industrial video recommendation platform serving billions of users. STATIC produces significant product metric impact with minimal latency overhead (0.033 ms per step and 0.25% of inference time), achieving a 948x speedup over a CPU trie implementation and a 47-1033x speedup over a hardware-accelerated binary-search baseline. Furthermore, the runtime overhead of STATIC remains extremely low across a wide range of practical configurations. To the best of our knowledge, STATIC enables the first production-scale deployment of strictly constrained generative retrieval. In addition, evaluation on academic benchmarks demonstrates that STATIC can considerably improve cold-start performance for generative retrieval. Our code is available at https://github.com/youtube/static-constraint-decoding.', 'score': 0, 'issue_id': 1280, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '6f82a62f359173bc', 'authors': ['Zhengyang Su', 'Isay Katsman', 'Yueqi Wang', 'Ruining He', 'Lukasz Heldt', 'Raghunandan Keshavan', 'Shao-Chuan Wang', 'Xinyang Yi', 'Mingyan Gao', 'Onkar Dalal', 'Lichan Hong', 'Ed Chi', 'Ningren Han'], 'affiliations': ['Google DeepMind', 'Yale University', 'YouTube'], 'pdf_title_img': 'assets/pdf/title_img/2602.22647.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Векторизация констrained decoding через разреженные матрицы для масштабируемой генеративной рекомендации', 'desc': 'Статья описывает STATIC — метод констrained decoding, который позволяет эффективно генерировать рекомендации с использованием больших языковых моделей при наличии ограничений на выходное пространство. Основная идея заключается в преобразовании древовидной структуры префиксов (Trie) в разреженную матрицу в формате CSR, что позволяет использовать векторизованные операции на GPU/TPU. Это преобразование устраняет узкие места при обходе нерегулярной структуры дерева и достигает ускорения в сотни и тысячи раз по сравнению с альтернативными подходами. Метод успешно развернут на промышленной платформе видеорекомендаций Google, обслуживающей миллиарды пользователей, с минимальной задержкой в процессе инференса.'}, 'en': {'title': 'Accelerating Constrained Decoding with STATIC', 'desc': 'STATIC is a novel constrained decoding method that enhances generative retrieval by utilizing a flattened prefix tree represented as a sparse matrix. This approach allows for efficient processing on hardware accelerators like TPUs and GPUs, significantly reducing latency while maintaining high throughput. By transforming traditional tree traversals into vectorized sparse matrix operations, STATIC achieves remarkable speed improvements over existing methods. The implementation of STATIC on a large-scale video recommendation platform demonstrates its effectiveness in real-world applications, particularly in improving cold-start performance for generative retrieval.'}, 'zh': {'title': 'STATIC：高效的约束解码技术', 'desc': 'STATIC是一种高效的约束解码方法，利用稀疏矩阵表示的扁平前缀树来加速生成检索，同时保持低延迟和高吞吐量。该方法特别适用于基于大语言模型的推荐系统，能够在硬件加速器上实现高效的约束解码。通过将前缀树扁平化为静态压缩稀疏行矩阵，STATIC将不规则的树遍历转化为完全向量化的稀疏矩阵操作，从而显著提高了效率。STATIC在一个大型工业视频推荐平台上部署，展现出显著的产品指标影响，且运行时开销极低。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment', '#architecture', '#audio', '#benchmark (3)', '#cv (3)', '#data', '#dataset (2)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (2)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (4)', '#open_source', '#optimization (2)', '#plp (1)', '#rag', '#reasoning (1)', '#rl (1)', '#rlhf (1)', '#robotics', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (1)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-02 05:47',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-02 05:47')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-02 05:47')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
