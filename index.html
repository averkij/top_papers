    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.27027', 'title': 'TAPS: Task Aware Proposal Distributions for Speculative Sampling', 'url': 'https://huggingface.co/papers/2603.27027', 'abstract': 'Abstract Speculative decoding effectiveness depends on draft model training data alignment with downstream tasks, with specialized drafters performing better when combined through confidence-based routing rather than simple averaging.  AI-generated summary Speculative decoding accelerates autoregressive generation by letting a lightweight draft model propose future tokens that a larger target model then verifies in parallel. In practice, however, draft models are usually trained on broad generic corpora, which leaves it unclear how much speculative decoding quality depends on the draft training distribution. We study this question with lightweight HASS and EAGLE-2 drafters trained on MathInstruct, ShareGPT, and mixed-data variants, evaluated on MT-Bench, GSM8K, MATH-500, and SVAMP. Measured by acceptance length, task-specific training yields clear specialization: MathInstruct-trained drafts are strongest on reasoning benchmarks, while ShareGPT-trained drafts are strongest on MT-Bench. Mixed-data training improves robustness, but larger mixtures do not dominate across decoding temperatures. We also study how to combine specialized drafters at inference time. Naive checkpoint averaging performs poorly, whereas confidence-based routing improves over single-domain drafts and merged-tree verification yields the highest acceptance length overall for both backbones. Finally, confidence is a more useful routing signal than entropy: rejected tokens tend to have higher entropy, but confidence produces much clearer benchmark-level routing decisions. These results show that speculative decoding quality depends not only on draft architecture, but also on the match between draft training data and downstream workload, and that specialized drafters are better combined at inference time than in weight space.', 'score': 113, 'issue_id': 1728, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'cb1b269d5cb120a1', 'authors': ['Mohamad Zbib', 'Mohamad Bazzi', 'Ammar Mohanna', 'Hasan Abed Al Kader Hammoud', 'Bernard Ghanem'], 'affiliations': ['American University of Beirut (AUB)', 'King Abdullah University of Science and Technology (KAUST)'], 'pdf_title_img': 'assets/pdf/title_img/2603.27027.jpg', 'data': {'categories': ['#inference', '#reasoning', '#training', '#optimization', '#architecture', '#transfer_learning'], 'emoji': '⚡', 'ru': {'title': 'Специализированное спекулятивное декодирование через маршрутизацию на основе уверенности', 'desc': 'В этой работе исследуется эффективность спекулятивного декодирования, которое ускоряет генерацию текста путём параллельной проверки токенов, предложенных лёгкой черновой моделью. Авторы показали, что качество спекулятивного декодирования зависит не только от архитектуры черновой модели, но и от соответствия её обучающих данных целевой задаче: модели, обученные на специализированных корпусах (например, MathInstruct), работают лучше на релевантных бенчмарках. При комбинировании нескольких специализированных черновых моделей во время вывода наивное усреднение весов показывает плохие результаты, тогда как маршрутизация на основе уверенности модели обеспечивает значительное улучшение. Исследование демонстрирует, что уверенность является более информативным сигналом для маршрутизации, чем энтропия, и что специализированные модели лучше комбинировать на этапе вывода, чем путём объединения весов.'}, 'en': {'title': 'Boosting Speculative Decoding with Specialized Draft Models', 'desc': 'This paper explores how the effectiveness of speculative decoding in machine learning is influenced by the training data of draft models. It finds that specialized draft models, when combined using confidence-based routing, outperform those combined through simple averaging. The study shows that training on task-specific data leads to better performance on relevant benchmarks, while mixed-data training enhances robustness. Additionally, it highlights that confidence is a more reliable signal for routing decisions than entropy, leading to improved outcomes in speculative decoding.'}, 'zh': {'title': '推测解码：训练数据与任务匹配的关键', 'desc': '本论文研究了推测解码的有效性，强调了草稿模型的训练数据与下游任务的一致性对性能的重要性。通过使用不同的草稿模型，如HASS和EAGLE-2，作者发现专门训练的模型在特定任务上表现更好。研究表明，基于信心的路由方法优于简单的平均方法，能够更有效地结合不同的草稿模型。最后，结果表明，推测解码的质量不仅依赖于模型架构，还与训练数据的匹配程度密切相关。'}}}, {'id': 'https://huggingface.co/papers/2603.28589', 'title': 'Towards a Medical AI Scientist', 'url': 'https://huggingface.co/papers/2603.28589', 'abstract': 'Abstract Medical AI Scientist represents the first autonomous research framework designed for clinical applications, enabling evidence-based hypothesis generation and manuscript drafting through clinician-engineer collaboration across three research modes.  AI-generated summary Autonomous systems that generate scientific hypotheses, conduct experiments, and draft manuscripts have recently emerged as a promising paradigm for accelerating discovery. However, existing AI Scientists remain largely domain-agnostic, limiting their applicability to clinical medicine, where research is required to be grounded in medical evidence with specialized data modalities. In this work, we introduce Medical AI Scientist, the first autonomous research framework tailored to clinical autonomous research. It enables clinically grounded ideation by transforming extensively surveyed literature into actionable evidence through clinician-engineer co-reasoning mechanism, which improves the traceability of generated research ideas. It further facilitates evidence-grounded manuscript drafting guided by structured medical compositional conventions and ethical policies. The framework operates under 3 research modes, namely paper-based reproduction, literature-inspired innovation, and task-driven exploration, each corresponding to a distinct level of automated scientific inquiry with progressively increasing autonomy. Comprehensive evaluations by both large language models and human experts demonstrate that the ideas generated by the Medical AI Scientist are of substantially higher quality than those produced by commercial LLMs across 171 cases, 19 clinical tasks, and 6 data modalities. Meanwhile, our system achieves strong alignment between the proposed method and its implementation, while also demonstrating significantly higher success rates in executable experiments. Double-blind evaluations by human experts and the Stanford Agentic Reviewer suggest that the generated manuscripts approach MICCAI-level quality, while consistently surpassing those from ISBI and BIBM. The proposed Medical AI Scientist highlights the potential of leveraging AI for autonomous scientific discovery in healthcare.', 'score': 63, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '73c83d5d474cb420', 'authors': ['Hongtao Wu', 'Boyun Zheng', 'Dingjie Song', 'Yu Jiang', 'Jianfeng Gao', 'Lei Xing', 'Lichao Sun', 'Yixuan Yuan'], 'affiliations': ['Lehigh University', 'Microsoft', 'Stanford University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.28589.jpg', 'data': {'categories': ['#agents', '#alignment', '#science', '#open_source', '#multimodal', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'AI учёный для клинических открытий', 'desc': 'Medical AI Scientist — это первая автономная исследовательская система, специально разработанная для клинических приложений. Она генерирует научные гипотезы на основе анализа медицинской литературы, используя механизм совместного рассуждения между врачом и инженером для обеспечения клинической обоснованности. Система работает в трёх режимах: воспроизведение исследований, инновация на основе литературы и задачно-ориентированная разработка, с прогрессивно возрастающим уровнем автономности. Экспериментальные оценки показали, что качество гипотез и черновиков рукописей, сгенерированных системой, превосходит результаты коммерческих LLM и соответствует стандартам ведущих конференций в области медицинской визуализации.'}, 'en': {'title': 'Revolutionizing Clinical Research with Autonomous AI', 'desc': 'The Medical AI Scientist is an innovative framework designed to enhance clinical research by autonomously generating hypotheses and drafting manuscripts. It combines the expertise of clinicians and engineers to ensure that research ideas are grounded in medical evidence, utilizing a co-reasoning mechanism for better traceability. The framework operates in three distinct research modes, allowing for varying levels of automation in scientific inquiry. Evaluations show that the Medical AI Scientist produces higher quality research ideas and manuscripts compared to existing AI systems, demonstrating its potential to revolutionize healthcare research.'}, 'zh': {'title': '医疗AI科学家：推动临床研究的自主创新', 'desc': '医疗人工智能科学家是首个专为临床应用设计的自主研究框架，能够通过临床医生与工程师的合作生成基于证据的假设和撰写手稿。该框架通过将广泛调查的文献转化为可操作的证据，促进了临床基础的创意生成，并提高了研究想法的可追溯性。它支持三种研究模式，包括基于论文的再现、文献启发的创新和任务驱动的探索，分别对应不同级别的自动化科学探究。综合评估表明，医疗人工智能科学家生成的研究想法质量显著高于现有商业大型语言模型，展示了AI在医疗领域自主科学发现的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.28767', 'title': 'Gen-Searcher: Reinforcing Agentic Search for Image Generation', 'url': 'https://huggingface.co/papers/2603.28767', 'abstract': 'Abstract A search-augmented image generation agent is presented that performs multi-hop reasoning and search to collect textual knowledge and reference images for grounded generation, trained with supervised fine-tuning and agentic reinforcement learning with dual reward feedback.  AI-generated summary Recent image generation models have shown strong capabilities in generating high-fidelity and photorealistic images. However, they are fundamentally constrained by frozen internal knowledge, thus often failing on real-world scenarios that are knowledge-intensive or require up-to-date information. In this paper, we present Gen-Searcher, as the first attempt to train a search-augmented image generation agent, which performs multi-hop reasoning and search to collect the textual knowledge and reference images needed for grounded generation. To achieve this, we construct a tailored data pipeline and curate two high-quality datasets, Gen-Searcher-SFT-10k and Gen-Searcher-RL-6k, containing diverse search-intensive prompts and corresponding ground-truth synthesis images. We further introduce KnowGen, a comprehensive benchmark that explicitly requires search-grounded external knowledge for image generation and evaluates models from multiple dimensions. Based on these resources, we train Gen-Searcher with SFT followed by agentic reinforcement learning with dual reward feedback, which combines text-based and image-based rewards to provide more stable and informative learning signals for GRPO training. Experiments show that Gen-Searcher brings substantial gains, improving Qwen-Image by around 16 points on KnowGen and 15 points on WISE. We hope this work can serve as an open foundation for search agents in image generation, and we fully open-source our data, models, and code.', 'score': 43, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '50bb94dd0b95f36f', 'authors': ['Kaituo Feng', 'Manyuan Zhang', 'Shuang Chen', 'Yunlong Lin', 'Kaixuan Fan', 'Yilei Jiang', 'Hongyu Li', 'Dian Zheng', 'Chenyang Wang', 'Xiangyu Yue'], 'affiliations': ['MMLab, CUHK', 'UC Berkeley', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2603.28767.jpg', 'data': {'categories': ['#agents', '#training', '#rl', '#dataset', '#cv', '#multimodal', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Агент поиска для знаний в генерации изображений', 'desc': 'В работе представлен агент для генерации изображений, который использует поиск информации для улучшения качества синтеза. Агент выполняет многошаговое рассуждение и поиск, собирая текстовые знания и эталонные изображения для обоснованной генерации. Модель обучается с помощью супервизированной тонкой настройки и reinforcement learning на основе двойной функции вознаграждения, которая комбинирует текстовые и визуальные сигналы. Авторы создали специализированные датасеты и бенчмарк KnowGen для оценки моделей, демонстрируя значительное улучшение качества генерации изображений.'}, 'en': {'title': 'Empowering Image Generation with Search-Augmented Intelligence', 'desc': 'This paper introduces Gen-Searcher, a novel image generation agent that enhances traditional models by integrating search capabilities for improved performance. It utilizes multi-hop reasoning to gather relevant textual knowledge and reference images, addressing the limitations of existing models that rely on static internal knowledge. The training process involves supervised fine-tuning followed by reinforcement learning, utilizing dual reward feedback to optimize learning from both text and images. The results demonstrate significant improvements in image generation quality, showcasing the potential of search-augmented approaches in AI-generated imagery.'}, 'zh': {'title': '搜索增强的图像生成代理：Gen-Searcher', 'desc': '本文提出了一种增强搜索的图像生成代理，能够进行多步推理和搜索，以收集文本知识和参考图像，从而实现基于真实信息的生成。与传统的图像生成模型不同，Gen-Searcher通过监督微调和带有双重奖励反馈的强化学习进行训练，克服了内部知识固定的限制。我们构建了专门的数据管道，并策划了两个高质量的数据集，以支持搜索密集型的提示和相应的真实合成图像。实验结果表明，Gen-Searcher在多个评估指标上显著提升了图像生成的质量，展示了搜索增强代理在图像生成领域的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.27771', 'title': 'Emergent Social Intelligence Risks in Generative Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2603.27771', 'abstract': 'Abstract Multi-agent systems with large generative models exhibit emergent collective behaviors and risks that mirror human societal pathologies without explicit instruction.  AI-generated summary Multi-agent systems composed of large generative models are rapidly moving from laboratory prototypes to real-world deployments, where they jointly plan, negotiate, and allocate shared resources to solve complex tasks. While such systems promise unprecedented scalability and autonomy, their collective interaction also gives rise to failure modes that cannot be reduced to individual agents. Understanding these emergent risks is therefore critical. Here, we present a pioneer study of such emergent multi-agent risk in workflows that involve competition over shared resources (e.g., computing resources or market share), sequential handoff collaboration (where downstream agents see only predecessor outputs), collective decision aggregation, and others. Across these settings, we observe that such group behaviors arise frequently across repeated trials and a wide range of interaction conditions, rather than as rare or pathological cases. In particular, phenomena such as collusion-like coordination and conformity emerge with non-trivial frequency under realistic resource constraints, communication protocols, and role assignments, mirroring well-known pathologies in human societies despite no explicit instruction. Moreover, these risks cannot be prevented by existing agent-level safeguards alone. These findings expose the dark side of intelligent multi-agent systems: a social intelligence risk where agent collectives, despite no instruction to do so, spontaneously reproduce familiar failure patterns from human societies.', 'score': 41, 'issue_id': 1725, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '737962cc9eefd1da', 'authors': ['Yue Huang', 'Yu Jiang', 'Wenjie Wang', 'Haomin Zhuang', 'Xiaonan Luo', 'Yuchen Ma', 'Zhangchen Xu', 'Zichen Chen', 'Nuno Moniz', 'Zinan Lin', 'Pin-Yu Chen', 'Nitesh V Chawla', 'Nouha Dziri', 'Huan Sun', 'Xiangliang Zhang'], 'affiliations': ['Allen Institute for AI', 'Bake AI', 'IBM Research', 'LMU Munich', 'Microsoft Research', 'Stanford University', 'The Ohio State University', 'University of California, Santa Barbara', 'University of Notre Dame', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.27771.jpg', 'data': {'categories': ['#security', '#ethics', '#alignment'], 'emoji': '👥', 'ru': {'title': 'Социальные патологии в коллективах AI агентов', 'desc': 'В работе исследуются чрезвычайные риски, возникающие при взаимодействии множества агентов на основе больших генеративных моделей. Авторы обнаружили, что такие системы спонтанно развивают коллективные патологии, такие как сговор и конформизм, которые зеркально отражают социальные дисфункции в человеческих обществах, несмотря на отсутствие явных инструкций к этому. Исследование охватывает различные сценарии взаимодействия, включая конкуренцию за общие ресурсы, последовательное сотрудничество с передачей информации и коллективное принятие решений. Выявленные проблемы социального интеллекта не могут быть решены существующими механизмами безопасности на уровне отдельных агентов.'}, 'en': {'title': 'Emergent Risks in Multi-Agent Systems: A Reflection of Human Society', 'desc': 'This paper explores how multi-agent systems using large generative models can develop unexpected collective behaviors that resemble societal issues, even without direct guidance. As these systems transition from labs to real-world applications, they face challenges like competition for resources and collaborative tasks, which can lead to emergent risks. The study reveals that behaviors such as collusion and conformity can frequently occur under realistic conditions, highlighting the limitations of individual agent safeguards. Understanding these emergent risks is crucial for ensuring the safe deployment of intelligent multi-agent systems.'}, 'zh': {'title': '智能多智能体系统的社会智能风险', 'desc': '多智能体系统中的大型生成模型展现出集体行为和风险，这些行为和风险在没有明确指令的情况下，反映了人类社会的病态。随着这些系统从实验室原型向现实世界部署，它们能够共同规划、协商和分配共享资源以解决复杂任务。尽管这些系统承诺提供前所未有的可扩展性和自主性，但它们的集体互动也带来了无法归结为单个智能体的失败模式。因此，理解这些新兴风险至关重要。'}}}, {'id': 'https://huggingface.co/papers/2603.27304', 'title': 'EpochX: Building the Infrastructure for an Emergent Agent Civilization', 'url': 'https://huggingface.co/papers/2603.27304', 'abstract': 'Abstract  General-purpose technologies reshape economies less by improving individual tools than by enabling new ways to organize production and coordination. We believe AI agents are approaching a similar inflection point: as foundation models make broad task execution and tool use increasingly accessible, the binding constraint shifts from raw capability to how work is delegated, verified, and rewarded at scale. We introduce EpochX, a credits-native marketplace infrastructure for human-agent production networks. EpochX treats humans and agents as peer participants who can post tasks or claim them. Claimed tasks can be decomposed into subtasks and executed through an explicit delivery workflow with verification and acceptance. Crucially, EpochX is designed so that each completed transaction can produce reusable ecosystem assets, including skills, workflows, execution traces, and distilled experience. These assets are stored with explicit dependency structure, enabling retrieval, composition, and cumulative improvement over time. EpochX also introduces a native credit mechanism to make participation economically viable under real compute costs. Credits lock task bounties, budget delegation, settle rewards upon acceptance, and compensate creators when verified assets are reused. By formalizing the end-to-end transaction model together with its asset and incentive layers, EpochX reframes agentic AI as an organizational design problem: building infrastructures where verifiable work leaves persistent, reusable artifacts, and where value flows support durable human-agent collaboration.', 'score': 39, 'issue_id': 1727, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': 'af5c7a6865a26631', 'authors': ['Huacan Wang', 'Chaofa Yuan', 'Xialie Zhuang', 'Tu Hu', 'Shuo Zhang', 'Jun Han', 'Shi Wei', 'Daiqiang Li', 'Jingping Liu', 'Kunyi Wang', 'Zihan Yin', 'Zhenheng Tang', 'Andy Wang', 'Henry Peng Zou', 'Philip S. Yu', 'Sen Hu', 'Qizhen Lan', 'Ronghao Chen'], 'affiliations': ['QuantaAlpha'], 'pdf_title_img': 'assets/pdf/title_img/2603.27304.jpg', 'data': {'categories': ['#agi', '#open_source'], 'emoji': '🏭', 'ru': {'title': 'От способностей моделей к организации труда: платформа для человеко-агентных производственных сетей', 'desc': 'В статье представляется EpochX — платформа для совместной работы людей и AI-агентов, основанная на системе кредитов. Авторы утверждают, что по мере развития больших языковых моделей ограничивающим фактором становится не сама способность к выполнению задач, а организация работы, верификация результатов и распределение вознаграждений в масштабе. Платформа позволяет декомпозировать задачи на подзадачи, выполнять их через явный workflow и создавать переиспользуемые артефакты (навыки, процессы, трассы выполнения). Система кредитов обеспечивает экономическую жизнеспособность сотрудничества, мотивируя участников через награды за выполнение и повторное использование активов.'}, 'en': {'title': 'EpochX: Redefining Human-Agent Collaboration through Task Management and Credits', 'desc': 'This paper introduces EpochX, a new marketplace designed for collaboration between humans and AI agents. It emphasizes the importance of organizing work and verifying tasks rather than just improving AI capabilities. EpochX allows users to post and claim tasks, breaking them down into smaller subtasks that can be executed with a clear workflow. The system also includes a credit mechanism to ensure economic viability, rewarding participants and creating reusable assets that enhance future collaborations.'}, 'zh': {'title': 'EpochX：人类与AI的协作新模式', 'desc': '这篇论文介绍了EpochX，一个为人类和AI代理创建的市场基础设施。它允许人类和代理作为平等参与者发布和认领任务，并通过明确的交付工作流程进行执行和验证。EpochX的设计使得每个完成的交易都能生成可重用的生态系统资产，如技能和工作流程，这些资产可以随着时间的推移进行检索和改进。此外，EpochX还引入了一种原生信用机制，以确保在实际计算成本下参与的经济可行性。'}}}, {'id': 'https://huggingface.co/papers/2603.27481', 'title': "On Token's Dilemma: Dynamic MoE with Drift-Aware Token Assignment for Continual Learning of Large Vision Language Models", 'url': 'https://huggingface.co/papers/2603.27481', 'abstract': "Abstract LLaVA-DyMoE addresses routing-drift-induced forgetting in multimodal continual instruction tuning by dynamically expanding mixture of experts with token-level assignment guidance and routing score regularizations.  AI-generated summary Multimodal Continual Instruction Tuning aims to continually enhance Large Vision Language Models (LVLMs) by learning from new data without forgetting previously acquired knowledge. Mixture of Experts (MoE) architectures naturally facilitate this by incrementally adding new experts and expanding routers while keeping the existing ones frozen. However, despite expert isolation, MoE-based continual learners still suffer from forgetting due to routing-drift: old-task tokens become mistakenly attracted to newly added experts, degrading performance on prior tasks. We analyze the failure mode at the token level and reveal the token's dilemma: ambiguous and old tokens in new-task data offer minimal learning benefit yet induce forgetting when routed to new experts, due to their ambiguous routing assignment during training. Motivated by this, we propose LLaVA-DyMoE, a dynamic MoE framework that incrementally expands the MoE with drift-aware token assignment. We characterize token types via their routing score distributions and apply targeted regularization. Specifically, a token-level assignment guidance steers ambiguous and old tokens away from new experts to preserve established routing patterns and alleviate routing-drift, while complementary routing score regularizations enforce expert-group separation and promote new-expert specialization. Extensive experiments demonstrate that our LLaVA-DyMoE effectively mitigates routing-drift-induced forgetting, achieving over a 7% gain in mean final accuracy and a 12% reduction in forgetting compared to baselines. The project page is https://zhaoc5.github.io/DyMoE.", 'score': 27, 'issue_id': 1725, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': 'fff0c7598b413409', 'authors': ['Chongyang Zhao', 'Mingsong Li', 'Haodong Lu', 'Dong Gong'], 'affiliations': ['University of New South Wales (UNSW Sydney)'], 'pdf_title_img': 'assets/pdf/title_img/2603.27481.jpg', 'data': {'categories': ['#training', '#architecture', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Динамическая смесь экспертов без дрейфа маршрутизации', 'desc': 'LLaVA-DyMoE решает проблему катастрофического забывания при непрерывном обучении мультимодальных больших языковых моделей, используя динамическое расширение архитектуры смесь экспертов. Авторы выявили, что при добавлении новых экспертов токены старых задач ошибочно направляются к новым экспертам, что приводит к деградации производительности на предыдущих задачах. Предложенный метод использует направление назначения на уровне токенов и регуляризацию весов маршрутизации, чтобы направлять неоднозначные и старые токены в существующие эксперты. Экспериментальные результаты показывают улучшение точности на 7% и снижение забывания на 12% по сравнению с базовыми методами.'}, 'en': {'title': 'Dynamic Experts for Continuous Learning Without Forgetting', 'desc': 'LLaVA-DyMoE is a framework designed to improve Large Vision Language Models (LVLMs) by addressing the issue of routing-drift-induced forgetting during continual instruction tuning. It utilizes a dynamic mixture of experts (MoE) architecture that allows for the addition of new experts while keeping existing ones stable. The framework introduces token-level assignment guidance to prevent old and ambiguous tokens from being misrouted to new experts, which helps maintain the performance on previous tasks. By applying targeted regularization techniques, LLaVA-DyMoE enhances expert specialization and reduces the forgetting of previously learned information, leading to significant improvements in accuracy and retention.'}, 'zh': {'title': '动态专家混合，减轻遗忘之痛', 'desc': 'LLaVA-DyMoE 是一种动态的专家混合框架，旨在解决多模态持续指令调优中的路由漂移引起的遗忘问题。该方法通过令牌级别的分配指导和路由得分正则化，动态扩展专家网络，保持已有专家的稳定性。研究表明，旧任务的令牌在新任务数据中容易被错误地引导到新专家，从而导致性能下降。LLaVA-DyMoE 通过针对性地引导模糊和旧令牌，减少了这种遗忘现象，提高了模型的最终准确率。'}}}, {'id': 'https://huggingface.co/papers/2603.28547', 'title': 'GEditBench v2: A Human-Aligned Benchmark for General Image Editing', 'url': 'https://huggingface.co/papers/2603.28547', 'abstract': 'Abstract A new benchmark and evaluation model for image editing are introduced to better assess visual consistency and human alignment in complex editing tasks.  AI-generated summary Recent advances in image editing have enabled models to handle complex instructions with impressive realism. However, existing evaluation frameworks lag behind: current benchmarks suffer from narrow task coverage, while standard metrics fail to adequately capture visual consistency, i.e., the preservation of identity, structure and semantic coherence between edited and original images. To address these limitations, we introduce GEditBench v2, a comprehensive benchmark with 1,200 real-world user queries spanning 23 tasks, including a dedicated open-set category for unconstrained, out-of-distribution editing instructions beyond predefined tasks. Furthermore, we propose PVC-Judge, an open-source pairwise assessment model for visual consistency, trained via two novel region-decoupled preference data synthesis pipelines. Besides, we construct VCReward-Bench using expert-annotated preference pairs to assess the alignment of PVC-Judge with human judgments on visual consistency evaluation. Experiments show that our PVC-Judge achieves state-of-the-art evaluation performance among open-source models and even surpasses GPT-5.1 on average. Finally, by benchmarking 16 frontier editing models, we show that GEditBench v2 enables more human-aligned evaluation, revealing critical limitations of current models, and providing a reliable foundation for advancing precise image editing.', 'score': 26, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '31dde14da7a0d831', 'authors': ['Zhangqi Jiang', 'Zheng Sun', 'Xianfang Zeng', 'Yufeng Yang', 'Xuanyang Zhang', 'Yongliang Wu', 'Wei Cheng', 'Gang Yu', 'Xu Yang', 'Bihan Wen'], 'affiliations': ['Nanyang Technological University', 'Southeast University', 'StepFun'], 'pdf_title_img': 'assets/pdf/title_img/2603.28547.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#cv', '#multimodal'], 'emoji': '🖼️', 'ru': {'title': 'Точная оценка редактирования: новый бенчмарк и модель для оценки визуальной согласованности', 'desc': 'В статье представлены GEditBench v2 — обширный бенчмарк для оценки моделей редактирования изображений, содержащий 1200 реальных запросов пользователей на 23 различные задачи редактирования. Авторы предложили PVC-Judge — модель парной оценки, специально обученную для оценки визуальной консистентности (сохранения идентичности, структуры и семантической согласованности между исходным и отредактированным изображениями) с использованием двух новых методов синтеза данных предпочтений. Также разработан VCReward-Bench — набор экспертно-аннотированных пар предпочтений для калибровки модели в соответствии с человеческими суждениями. Эксперименты показали, что PVC-Judge превосходит существующие открытые модели и даже GPT-4V на задачах оценки визуальной консистентности, обеспечивая более надежное основание для развития точных алгоритмов редактирования изображений.'}, 'en': {'title': 'Enhancing Image Editing Evaluation with GEditBench v2', 'desc': 'This paper introduces GEditBench v2, a new benchmark for evaluating image editing tasks that focuses on visual consistency and human alignment. It addresses the shortcomings of existing evaluation frameworks by providing a comprehensive dataset of 1,200 user queries across 23 tasks, including open-set editing instructions. The authors also present PVC-Judge, a novel model for assessing visual consistency through pairwise comparisons, which is trained using innovative data synthesis methods. Experiments demonstrate that PVC-Judge outperforms existing models, including GPT-5.1, and highlights the limitations of current image editing models, paving the way for more accurate evaluations.'}, 'zh': {'title': '提升图像编辑评估的视觉一致性与人类对齐', 'desc': '本文介绍了一种新的图像编辑基准和评估模型，以更好地评估复杂编辑任务中的视觉一致性和人类对齐。随着图像编辑技术的进步，模型能够处理复杂指令并生成逼真的图像。然而，现有的评估框架存在不足，现有基准任务覆盖面狭窄，标准指标无法充分捕捉编辑图像与原始图像之间的视觉一致性。为了解决这些问题，我们提出了GEditBench v2和PVC-Judge模型，提供了更全面的评估方法，推动了图像编辑的精确性。'}}}, {'id': 'https://huggingface.co/papers/2603.27646', 'title': 'PRBench: End-to-end Paper Reproduction in Physics Research', 'url': 'https://huggingface.co/papers/2603.27646', 'abstract': "Abstract PRBench evaluates AI agents' ability to reproduce scientific research by requiring them to implement algorithms from published papers and match original results, revealing significant challenges in formula implementation, debugging, and data accuracy.  AI-generated summary AI agents powered by large language models exhibit strong reasoning and problem-solving capabilities, enabling them to assist scientific research tasks such as formula derivation and code generation. However, whether these agents can reliably perform end-to-end reproduction from real scientific papers remains an open question. We introduce PRBench, a benchmark of 30 expert-curated tasks spanning 11 subfields of physics. Each task requires an agent to comprehend the methodology of a published paper, implement the corresponding algorithms from scratch, and produce quantitative results matching the original publication. Agents are provided only with the task instruction and paper content, and operate in a sandboxed execution environment. All tasks are contributed by domain experts from over 20 research groups at the School of Physics, Peking University, each grounded in a real published paper and validated through end-to-end reproduction with verified ground-truth results and detailed scoring rubrics. Using an agentified assessment pipeline, we evaluate a set of coding agents on PRBench and analyze their capabilities across key dimensions of scientific reasoning and execution. The best-performing agent, OpenAI Codex powered by GPT-5.3-Codex, achieves a mean overall score of 34%. All agents exhibit a zero end-to-end callback success rate, with particularly poor performance in data accuracy and code correctness. We further identify systematic failure modes, including errors in formula implementation, inability to debug numerical simulations, and fabrication of output data. Overall, PRBench provides a rigorous benchmark for evaluating progress toward autonomous scientific research.", 'score': 23, 'issue_id': 1725, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '0d5336be68aa8d24', 'authors': ['Shi Qiu', 'Junyi Deng', 'Yiwei Deng', 'Haoran Dong', 'Jieyu Fu', 'Mao Li', 'Zeyu Li', 'Zhaolong Zhang', 'Huiwen Zheng', 'Leidong Bao', 'Anqi Lv', 'Zihan Mo', 'Yadi Niu', 'Yiyang Peng', 'Yu Tian', 'Yili Wang', 'Ziyu Wang', 'Zi-Yu Wang', 'Jiashen Wei', 'Liuheng Wu', 'Aoran Xue', 'Leyi Yang', 'Guanglu Yuan', 'Xiarui Zhan', 'Jingjun Zhang', 'Zifan Zheng', 'Pengfei Liu', 'Linrui Zhen', 'Kaiyang Li', 'Qichang Li', 'Ziheng Zhou', 'Guo-En Nian', 'Yunwei Xiao', 'Qing-Hong Cao', 'Linjie Dai', 'Xu Feng', 'Peng Gao', 'Ying Gu', 'Chang Liu', 'Jia Liu', 'Ming-xing Luo', 'Yan-Qing Ma', 'Liang-You Peng', 'Huichao Song', 'Shufeng Wang', 'Chenxu Wang', 'Tao Wang', 'Yi-Nan Wang', 'Chengyin Wu', 'Pengwei Zhao', 'Hua Xing Zhu'], 'affiliations': ['Beijing Computational Science Research Center, China', 'School of Physics, Peking University, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.27646.jpg', 'data': {'categories': ['#agents', '#science', '#reasoning', '#dataset', '#benchmark', '#plp'], 'emoji': '🔬', 'ru': {'title': 'AI-агенты не готовы к самостоятельному воспроизведению научных исследований', 'desc': 'PRBench — это бенчмарк для оценки способности AI-агентов на основе больших языковых моделей воспроизводить научные исследования путём реализации алгоритмов из опубликованных работ. Задача требует от агентов понимания методологии, написания кода с нуля и получения результатов, совпадающих с оригинальными публикациями. Исследование показало, что даже лучшие AI-агенты достигают лишь 34% среднего балла и демонстрируют серьёзные проблемы с точностью данных, корректностью кода и отладкой численных симуляций. Бенчмарк включает 30 экспертных задач из различных областей физики и служит строгим инструментом для измерения прогресса в направлении автономных научных исследований.'}, 'en': {'title': "Evaluating AI's Ability to Reproduce Scientific Research", 'desc': "PRBench is a benchmark designed to test AI agents' ability to reproduce scientific research by implementing algorithms from published papers and achieving results that match the originals. It consists of 30 tasks across 11 physics subfields, requiring agents to understand methodologies and execute algorithms in a controlled environment. The evaluation revealed that even advanced AI models, like OpenAI Codex, struggle with end-to-end reproduction, achieving only a 34% success rate and facing challenges in data accuracy and code correctness. This highlights the need for further advancements in AI capabilities for reliable scientific research automation."}, 'zh': {'title': 'PRBench：评估AI在科学研究中的重现能力', 'desc': 'PRBench是一个评估AI代理在科学研究中重现能力的基准，要求它们从已发表的论文中实现算法并匹配原始结果。研究表明，尽管大型语言模型驱动的AI代理在推理和问题解决方面表现出色，但它们在从真实科学论文中进行端到端重现时仍面临重大挑战。该基准涵盖了11个物理学子领域的30个专家策划任务，要求代理理解论文的方法论并从头实现相应的算法。通过对AI代理的评估，发现它们在数据准确性和代码正确性方面表现不佳，整体成功率为零，揭示了科学研究中自动化的进展仍需努力。'}}}, {'id': 'https://huggingface.co/papers/2603.26639', 'title': 'Make Geometry Matter for Spatial Reasoning', 'url': 'https://huggingface.co/papers/2603.26639', 'abstract': "Abstract GeoSR enhances vision-language models' spatial reasoning capabilities by strategically incorporating geometry tokens through masking and guided fusion mechanisms.  AI-generated summary Empowered by large-scale training, vision-language models (VLMs) achieve strong image and video understanding, yet their ability to perform spatial reasoning in both static scenes and dynamic videos remains limited. Recent advances try to handle this limitation by injecting geometry tokens from pretrained 3D foundation models into VLMs. Nevertheless, we observe that naive token fusion followed by standard fine-tuning in this line of work often leaves such geometric cues underutilized for spatial reasoning, as VLMs tend to rely heavily on 2D visual cues. In this paper, we propose GeoSR, a framework designed to make geometry matter by encouraging VLMs to actively reason with geometry tokens. GeoSR introduces two key components: (1) Geometry-Unleashing Masking, which strategically masks portions of 2D vision tokens during training to weaken non-geometric shortcuts and force the model to consult geometry tokens for spatial reasoning; and (2) Geometry-Guided Fusion, a gated routing mechanism that adaptively amplifies geometry token contributions in regions where geometric evidence is critical. Together, these designs unleash the potential of geometry tokens for spatial reasoning tasks. Extensive experiments on both static and dynamic spatial reasoning benchmarks demonstrate that GeoSR consistently outperforms prior methods and establishes new state-of-the-art performance by effectively leveraging geometric information. The project page is available at https://suhzhang.github.io/GeoSR/.", 'score': 21, 'issue_id': 1726, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '79a5a3410695fd61', 'authors': ['Shihua Zhang', 'Qiuhong Shen', 'Shizun Wang', 'Tianbo Pan', 'Xinchao Wang'], 'affiliations': ['National University of Singapore, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.26639.jpg', 'data': {'categories': ['#cv', '#benchmark', '#training', '#reasoning', '#multimodal'], 'emoji': '🧬', 'ru': {'title': 'Геометрия имеет значение: принуждение моделей видения к пространственному рассуждению', 'desc': 'GeoSR — это фреймворк, который улучшает способность видео-языковых моделей к пространственному рассуждению путём интеграции геометрических токенов из предобученных 3D моделей. Авторы предлагают два ключевых механизма: маскирование 2D визуальных токенов, которое заставляет модель активнее использовать геометрическую информацию, и адаптивную гейтированную фьюжн, которая усиливает влияние геометрических токенов в критических регионах. Экспериментальные результаты показывают, что модель значительно превосходит предыдущие подходы в задачах пространственного рассуждения как на статичных сценах, так и на динамических видео. Основная идея заключается в том, чтобы заставить модель полагаться на геометрическую информацию, а не только на 2D визуальные сигналы.'}, 'en': {'title': 'Unlocking Geometry for Superior Spatial Reasoning in VLMs', 'desc': 'GeoSR is a framework that enhances the spatial reasoning abilities of vision-language models (VLMs) by integrating geometry tokens. It addresses the limitation of VLMs relying too much on 2D visual cues by introducing Geometry-Unleashing Masking, which encourages the model to focus on geometry tokens during training. Additionally, it employs Geometry-Guided Fusion to boost the influence of geometry tokens in critical areas, ensuring that spatial reasoning is informed by geometric information. Through extensive testing, GeoSR has shown to outperform previous methods, setting new benchmarks in spatial reasoning tasks.'}, 'zh': {'title': '让几何信息在空间推理中发挥作用', 'desc': 'GeoSR是一个增强视觉-语言模型空间推理能力的框架，通过引入几何标记来实现。它采用了几何释放掩码和几何引导融合机制，帮助模型更好地利用几何信息。通过在训练中掩盖部分2D视觉标记，GeoSR迫使模型依赖几何标记进行空间推理。实验结果表明，GeoSR在静态和动态空间推理任务中均优于之前的方法，展现了几何信息的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.27862', 'title': 'ImagenWorld: Stress-Testing Image Generation Models with Explainable Human Evaluation on Open-ended Real-World Tasks', 'url': 'https://huggingface.co/papers/2603.27862', 'abstract': 'Abstract ImagenWorld introduces a comprehensive benchmark for image generation and editing across multiple tasks and domains, featuring human annotations and explainable evaluation to assess model performance and failure modes.  AI-generated summary Advances in diffusion, autoregressive, and hybrid models have enabled high-quality image synthesis for tasks such as text-to-image, editing, and reference-guided composition. Yet, existing benchmarks remain limited, either focus on isolated tasks, cover only narrow domains, or provide opaque scores without explaining failure modes. We introduce ImagenWorld, a benchmark of 3.6K condition sets spanning six core tasks (generation and editing, with single or multiple references) and six topical domains (artworks, photorealistic images, information graphics, textual graphics, computer graphics, and screenshots). The benchmark is supported by 20K fine-grained human annotations and an explainable evaluation schema that tags localized object-level and segment-level errors, complementing automated VLM-based metrics. Our large-scale evaluation of 14 models yields several insights: (1) models typically struggle more in editing tasks than in generation tasks, especially in local edits. (2) models excel in artistic and photorealistic settings but struggle with symbolic and text-heavy domains such as screenshots and information graphics. (3) closed-source systems lead overall, while targeted data curation (e.g., Qwen-Image) narrows the gap in text-heavy cases. (4) modern VLM-based metrics achieve Kendall accuracies up to 0.79, approximating human ranking, but fall short of fine-grained, explainable error attribution. ImagenWorld provides both a rigorous benchmark and a diagnostic tool to advance robust image generation.', 'score': 17, 'issue_id': 1725, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '5b817f54c51ef354', 'authors': ['Samin Mahdizadeh Sani', 'Max Ku', 'Nima Jamali', 'Matina Mahdizadeh Sani', 'Paria Khoshtab', 'Wei-Chieh Sun', 'Parnian Fazel', 'Zhi Rui Tam', 'Thomas Chong', 'Edisy Kin Wai Chan', 'Donald Wai Tong Tsang', 'Chiao-Wei Hsu', 'Ting Wai Lam', 'Ho Yin Sam Ng', 'Chiafeng Chu', 'Chak-Wing Mak', 'Keming Wu', 'Hiu Tung Wong', 'Yik Chun Ho', 'Chi Ruan', 'Zhuofeng Li', 'I-Sheng Fang', 'Shih-Ying Yeh', 'Ho Kei Cheng', 'Ping Nie', 'Wenhu Chen'], 'affiliations': ['G-G-G Comfy Org', 'Independent', 'University of Illinois Urbana-Champaign', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2603.27862.jpg', 'data': {'categories': ['#diffusion', '#interpretability', '#dataset', '#cv', '#multimodal', '#benchmark'], 'emoji': '🖼️', 'ru': {'title': 'Объяснимое измерение качества генерации изображений во множестве задач и доменов', 'desc': 'ImagenWorld - это комплексный бенчмарк для оценки моделей генерации и редактирования изображений на основе диффузионных, авторегрессивных и гибридных архитектур. Он содержит 3.6K наборов условий охватывающих шесть задач (генерация и редактирование) и шесть предметных областей с 20K аннотаций человеком для детального анализа ошибок. Авторы предложили объяснимую схему оценки, которая помечает локальные ошибки на уровне объектов и сегментов, дополняя автоматические метрики на основе видео-языковых моделей. Исследование 14 моделей выявило, что системы лучше справляются с художественными стилями, но испытывают трудности с текстоемкими доменами, а современные VLM-метрики достигают точности Kendall до 0.79, приближаясь к человеческим оценкам.'}, 'en': {'title': 'ImagenWorld: A New Standard for Image Generation and Editing Evaluation', 'desc': 'ImagenWorld is a new benchmark designed to evaluate image generation and editing across various tasks and domains. It includes 3.6K condition sets for six core tasks and six topical domains, supported by 20K human annotations for detailed performance assessment. The benchmark highlights that models often perform better in generating images than in editing them, particularly with local changes. Additionally, it reveals that while closed-source models generally perform well, targeted data curation can improve results in text-heavy scenarios, and current evaluation metrics need to enhance their explainability.'}, 'zh': {'title': 'ImagenWorld：图像生成与编辑的全面基准', 'desc': 'ImagenWorld是一个全面的基准测试，旨在评估图像生成和编辑的多种任务和领域。它包含3.6K个条件集，涵盖六个核心任务和六个主题领域，并提供20K个细致的人类注释。该基准测试采用可解释的评估方案，标记局部对象和分段级别的错误，补充了自动化的VLM指标。通过对14个模型的大规模评估，发现模型在编辑任务上通常表现不如生成任务，尤其是在局部编辑方面。'}}}, {'id': 'https://huggingface.co/papers/2603.28762', 'title': 'On-the-fly Repulsion in the Contextual Space for Rich Diversity in Diffusion Transformers', 'url': 'https://huggingface.co/papers/2603.28762', 'abstract': 'Abstract Diffusion transformers can generate diverse visual outputs by applying repulsion in contextual space during the forward pass, maintaining visual quality and semantic accuracy while operating efficiently in streamlined models.  AI-generated summary Modern Text-to-Image (T2I) diffusion models have achieved remarkable semantic alignment, yet they often suffer from a significant lack of variety, converging on a narrow set of visual solutions for any given prompt. This typicality bias presents a challenge for creative applications that require a wide range of generative outcomes. We identify a fundamental trade-off in current approaches to diversity: modifying model inputs requires costly optimization to incorporate feedback from the generative path. In contrast, acting on spatially-committed intermediate latents tends to disrupt the forming visual structure, leading to artifacts. In this work, we propose to apply repulsion in the Contextual Space as a novel framework for achieving rich diversity in Diffusion Transformers. By intervening in the multimodal attention channels, we apply on-the-fly repulsion during the transformer\'s forward pass, injecting the intervention between blocks where text conditioning is enriched with emergent image structure. This allows for redirecting the guidance trajectory after it is structurally informed but before the composition is fixed. Our results demonstrate that repulsion in the Contextual Space produces significantly richer diversity without sacrificing visual fidelity or semantic adherence. Furthermore, our method is uniquely efficient, imposing a small computational overhead while remaining effective even in modern "Turbo" and distilled models where traditional trajectory-based interventions typically fail.', 'score': 16, 'issue_id': 1728, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'f0b8a03a03d73a8d', 'authors': ['Omer Dahary', 'Benaya Koren', 'Daniel Garibi', 'Daniel Cohen-Or'], 'affiliations': ['Snap Research, Israel', 'Tel Aviv University, Israel'], 'pdf_title_img': 'assets/pdf/title_img/2603.28762.jpg', 'data': {'categories': ['#training', '#architecture', '#multimodal', '#diffusion', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Репульсия в контекстном пространстве для разнообразной генерации изображений', 'desc': 'В работе предлагается новый метод для повышения разнообразия выходных изображений в диффузионных трансформерах при генерации текста-в-изображение. Авторы выявили проблему типичности смещения, когда модель сходится к узкому набору визуальных решений для одного промпта. Решение заключается в применении репульсии в контекстном пространстве — воздействии на многомодальные каналы внимания во время прямого прохода трансформера, между блоками обработки. Метод эффективно генерирует разнообразные изображения без потери визуального качества и семантической точности, работая даже с дистиллированными моделями.'}, 'en': {'title': 'Enhancing Diversity in Diffusion Transformers with Contextual Repulsion', 'desc': "This paper introduces a new method for enhancing diversity in visual outputs generated by Diffusion Transformers. The authors address the common issue of typicality bias in text-to-image models, which often produce similar results for the same input. They propose a technique that applies repulsion in the Contextual Space during the model's forward pass, allowing for a wider range of creative outputs without compromising visual quality. Their approach is efficient and effective, even in streamlined models, demonstrating that it is possible to achieve rich diversity while maintaining semantic accuracy."}, 'zh': {'title': '在上下文空间中实现图像生成的多样性', 'desc': '本论文提出了一种新的框架，通过在上下文空间中应用排斥机制，来提高扩散变换器生成图像的多样性。传统的文本到图像扩散模型在生成结果上往往缺乏多样性，导致创意应用受到限制。我们的方法通过在变换器的前向传播过程中对多模态注意力通道进行干预，能够在不牺牲视觉质量和语义准确性的情况下，生成丰富的多样性。实验结果表明，该方法在现代模型中具有高效性，能够有效克服传统方法的局限。'}}}, {'id': 'https://huggingface.co/papers/2603.27813', 'title': 'MuSEAgent: A Multimodal Reasoning Agent with Stateful Experiences', 'url': 'https://huggingface.co/papers/2603.27813', 'abstract': 'Abstract MuSEAgent enhances multimodal reasoning through stateful experience learning that abstracts interactions into decision experiences for improved policy-driven retrieval and adaptive search strategies.  AI-generated summary Research agents have recently achieved significant progress in information seeking and synthesis across heterogeneous textual and visual sources. In this paper, we introduce MuSEAgent, a multimodal reasoning agent that enhances decision-making by extending the capabilities of research agents to discover and leverage stateful experiences. Rather than relying on trajectory-level retrieval, we propose a stateful experience learning paradigm that abstracts interaction data into atomic decision experiences through hindsight reasoning. These experiences are organized into a quality-filtered experience bank that supports policy-driven experience retrieval at inference time. Specifically, MuSEAgent enables adaptive experience exploitation through complementary wide- and deep-search strategies, allowing the agent to dynamically retrieve multimodal guidance across diverse compositional semantic viewpoints. Extensive experiments demonstrate that MuSEAgent consistently outperforms strong trajectory-level experience retrieval baselines on both fine-grained visual perception and complex multimodal reasoning tasks. These results validate the effectiveness of stateful experience modeling in improving multimodal agent reasoning.', 'score': 16, 'issue_id': 1725, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '2db4456ba0fe92a1', 'authors': ['Shijian Wang', 'Jiarui Jin', 'Runhao Fu', 'Zexuan Yan', 'Xingjian Wang', 'Mengkang Hu', 'Eric Wang', 'Xiaoxi Li', 'Kangning Zhang', 'Li Yao', 'Wenxiang Jiao', 'Xuelian Cheng', 'Yuan Lu', 'Zongyuan Ge'], 'affiliations': ['Monash University', 'Renmin University of China', 'Shanghai Jiao Tong University', 'Southeast University', 'University of Hong Kong', 'Xiaohongshu Inc.', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.27813.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Обучение через состояние: как агент учится на опыте взаимодействий', 'desc': 'MuSEAgent — это мультимодальный агент рассуждений, который улучшает принятие решений путём извлечения опыта из прошлых взаимодействий. Вместо простого использования полных траекторий, система абстрагирует данные взаимодействия в отдельные атомарные решения через ретроспективное рассуждение. Эти решения организуются в отфильтрованный банк опыта, который поддерживает управляемое политикой извлечение на этапе вывода. Система использует адаптивные стратегии глубокого и широкого поиска для динамического получения мультимодального руководства и демонстрирует превосходство над базовыми методами в задачах визуального восприятия и мультимодального рассуждения.'}, 'en': {'title': 'Enhancing Decision-Making with Stateful Experience Learning', 'desc': 'MuSEAgent is a multimodal reasoning agent that improves decision-making by learning from past interactions, which are transformed into decision experiences. Instead of just retrieving past actions, it uses a stateful experience learning approach that organizes these experiences into a structured bank for better retrieval. This allows the agent to adaptively search for information using both wide and deep strategies, enhancing its ability to understand and synthesize information from various sources. The experiments show that MuSEAgent outperforms traditional methods in tasks requiring complex visual and multimodal reasoning.'}, 'zh': {'title': 'MuSEAgent：提升多模态推理的智能决策代理', 'desc': 'MuSEAgent是一种多模态推理代理，通过状态经验学习来增强决策能力。它将交互数据抽象为决策经验，利用回顾推理来提高信息检索和适应性搜索策略。与传统的轨迹级检索不同，MuSEAgent构建了一个质量过滤的经验库，以支持基于策略的经验检索。实验结果表明，MuSEAgent在视觉感知和复杂多模态推理任务上表现优于现有的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2603.28342', 'title': 'Kernel-Smith: A Unified Recipe for Evolutionary Kernel Optimization', 'url': 'https://huggingface.co/papers/2603.28342', 'abstract': 'Abstract Kernel-Smith is a GPU kernel generation framework that combines evolutionary algorithms with post-training reinforcement learning to optimize performance across different hardware backends.  AI-generated summary We present Kernel-Smith, a framework for high-performance GPU kernel and operator generation that combines a stable evaluation-driven evolutionary agent with an evolution-oriented post-training recipe. On the agent side, Kernel-Smith maintains a population of executable candidates and iteratively improves them using an archive of top-performing and diverse programs together with structured execution feedback on compilation, correctness, and speedup. To make this search reliable, we build backend-specific evaluation services for Triton on NVIDIA GPUs and Maca on MetaX GPUs. On the training side, we convert long-horizon evolution trajectories into step-centric supervision and reinforcement learning signals by retaining correctness-preserving, high-gain revisions, so that the model is optimized as a strong local improver inside the evolutionary loop rather than as a one-shot generator. Under a unified evolutionary protocol, Kernel-Smith-235B-RL achieves state-of-the-art overall performance on KernelBench with Nvidia Triton backend, attaining the best average speedup ratio and outperforming frontier proprietary models including Gemini-3.0-pro and Claude-4.6-opus. We further validate the framework on the MetaX MACA backend, where our Kernel-Smith-MACA-30B surpasses large-scale counterparts such as DeepSeek-V3.2-think and Qwen3-235B-2507-think, highlighting potential for seamless adaptation across heterogeneous platforms. Beyond benchmark results, the same workflow produces upstream contributions to production systems including SGLang and LMDeploy, demonstrating that LLM-driven kernel optimization can transfer from controlled evaluation to practical deployment.', 'score': 15, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '9e246078eaf5704f', 'authors': ['He Du', 'Qiming Ge', 'Jiakai Hu', 'Aijun Yang', 'Zheng Cai', 'Zixian Huang', 'Sheng Yuan', 'Qinxiu Cheng', 'Xinchen Xie', 'Yicheng Chen', 'Yining Li', 'Jiaxing Xie', 'Huanan Dong', 'Yaguang Wu', 'Xiangjun Huang', 'Jian Yang', 'Hui Wang', 'Bowen Zhou', 'Bowen Li', 'Qipeng Guo', 'Kai Chen'], 'affiliations': ['Fudan University', 'MetaX', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2603.28342.jpg', 'data': {'categories': ['#optimization', '#agents', '#rlhf', '#training', '#open_source', '#rl', '#benchmark', '#plp'], 'emoji': '⚡', 'ru': {'title': 'Эволюция кода через LLM: автоматическая оптимизация GPU-ядер', 'desc': 'Kernel-Smith — это фреймворк для автоматической генерации высокопроизводительных GPU-ядер, который объединяет эволюционные алгоритмы с обучением с подкреплением для оптимизации кода на различных аппаратных платформах. Система поддерживает популяцию кандидатов программ и итеративно улучшает их, используя архив лучших решений и структурированную обратную связь о компиляции и производительности. Фреймворк преобразует траектории эволюции в сигналы обучения с подкреплением, оптимизируя LLM как локальный улучшатель внутри эволюционного цикла, а не одноразовый генератор. Kernel-Smith достигает передовых результатов на бенчмарках, превосходя закрытые модели вроде Gemini и Claude, а также демонстрирует практическую применимость в production-системах.'}, 'en': {'title': 'Revolutionizing GPU Kernel Generation with Evolutionary Learning', 'desc': 'Kernel-Smith is a framework designed to generate high-performance GPU kernels by integrating evolutionary algorithms with post-training reinforcement learning. It maintains a population of candidate programs and improves them using feedback on their performance, ensuring they are optimized for different hardware backends. The framework employs backend-specific evaluation services to enhance reliability and performance during the optimization process. Kernel-Smith has achieved state-of-the-art results on various benchmarks, demonstrating its effectiveness in adapting to different platforms and contributing to real-world applications.'}, 'zh': {'title': 'Kernel-Smith：高性能GPU内核生成的进化与强化学习结合', 'desc': 'Kernel-Smith是一个GPU内核生成框架，结合了进化算法和后训练强化学习，以优化不同硬件平台的性能。该框架通过维护可执行候选程序的种群，并利用高性能程序的存档和结构化执行反馈来迭代改进这些程序。Kernel-Smith在NVIDIA和MetaX GPU上构建了特定后端的评估服务，以确保搜索的可靠性。最终，Kernel-Smith在多个基准测试中表现出色，展示了其在异构平台上的适应潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.28610', 'title': 'ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning', 'url': 'https://huggingface.co/papers/2603.28610', 'abstract': "Abstract ResAdapt is an input-side adaptation framework that dynamically allocates visual resources to improve multimodal large language models' efficiency in video tasks while maintaining high performance.  AI-generated summary Multimodal Large Language Models (MLLMs) achieve stronger visual understanding by scaling input fidelity, yet the resulting visual token growth makes jointly sustaining high spatial resolution and long temporal context prohibitive. We argue that the bottleneck lies not in how post-encoding representations are compressed but in the volume of pixels the encoder receives, and address it with ResAdapt, an Input-side adaptation framework that learns how much visual budget each frame should receive before encoding. ResAdapt couples a lightweight Allocator with an unchanged MLLM backbone, so the backbone retains its native visual-token interface while receiving an operator-transformed input. We formulate allocation as a contextual bandit and train the Allocator with Cost-Aware Policy Optimization (CAPO), which converts sparse rollout feedback into a stable accuracy-cost learning signal. Across budget-controlled video QA, temporal grounding, and image reasoning tasks, ResAdapt improves low-budget operating points and often lies on or near the efficiency-accuracy frontier, with the clearest gains on reasoning-intensive benchmarks under aggressive compression. Notably, ResAdapt supports up to 16x more frames at the same visual budget while delivering over 15% performance gain. Code is available at https://github.com/Xnhyacinth/ResAdapt.", 'score': 14, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'bf00bfef9394a24f', 'authors': ['Huanxuan Liao', 'Zhongtao Jiang', 'Yupu Hao', 'Yuqiao Tan', 'Shizhu He', 'Jun Zhao', 'Kun Xu', 'Kang Liu'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.28610.jpg', 'data': {'categories': ['#video', '#inference', '#rl', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Умное распределение визуального бюджета для эффективных видеомоделей', 'desc': 'ResAdapt — это фреймворк адаптации на входе, который динамически распределяет визуальные ресурсы для повышения эффективности мультимодальных больших языковых моделей при работе с видео. Вместо сжатия представлений после кодирования, метод оптимизирует количество пиксельных данных, поступающих в энкодер, добавляя лёгкий модуль Allocator к неизменённой архитектуре MLLM. Распределение бюджета формулируется как контекстный многорукий бандит и оптимизируется с помощью Cost-Aware Policy Optimization (CAPO), которая преобразует разреженную обратную связь в стабильный сигнал обучения. ResAdapt достигает высокой производительности при агрессивном сжатии, обрабатывая в 16 раз больше кадров при том же визуальном бюджете с улучшением производительности более чем на 15%.'}, 'en': {'title': 'Optimizing Visual Resources for Efficient Video Understanding', 'desc': 'ResAdapt is a framework designed to enhance the efficiency of multimodal large language models (MLLMs) in video tasks by optimizing how visual resources are allocated. It addresses the challenge of managing the increasing number of visual tokens while maintaining high performance in tasks requiring both spatial resolution and temporal context. By employing a lightweight Allocator that determines the visual budget for each frame before encoding, ResAdapt allows the MLLM backbone to function effectively without modification. The framework uses Cost-Aware Policy Optimization (CAPO) to train the Allocator, resulting in significant performance improvements, especially in reasoning-intensive tasks, while supporting a greater number of frames within the same visual budget.'}, 'zh': {'title': '动态分配视觉资源，提高多模态模型效率', 'desc': 'ResAdapt 是一个输入侧适应框架，旨在动态分配视觉资源，以提高多模态大语言模型在视频任务中的效率，同时保持高性能。该框架通过学习每帧应接收的视觉预算，解决了编码器接收像素数量过多的问题。ResAdapt 结合了轻量级的分配器和不变的多模态大语言模型主干，使得主干能够在接收经过操作转换的输入时，保持其原有的视觉标记接口。通过成本感知策略优化（CAPO）训练分配器，ResAdapt 在预算控制的视频问答、时间定位和图像推理任务中，显著提高了低预算操作点的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.27064', 'title': 'ChartNet: A Million-Scale, High-Quality Multimodal Dataset for Robust Chart Understanding', 'url': 'https://huggingface.co/papers/2603.27064', 'abstract': 'Abstract ChartNet is a large-scale multimodal dataset featuring 1.5 million chart samples with aligned visual, textual, and numerical components, designed to enhance chart interpretation and reasoning capabilities in multimodal models.  AI-generated summary Understanding charts requires models to jointly reason over geometric visual patterns, structured numerical data, and natural language -- a capability where current vision-language models (VLMs) remain limited. We introduce ChartNet, a high-quality, million-scale multimodal dataset designed to advance chart interpretation and reasoning. ChartNet leverages a novel code-guided synthesis pipeline to generate 1.5 million diverse chart samples spanning 24 chart types and 6 plotting libraries. Each sample consists of five aligned components: plotting code, rendered chart image, data table, natural language summary, and question-answering with reasoning, providing fine-grained cross-modal alignment. To capture the full spectrum of chart comprehension, ChartNet additionally includes specialized subsets encompassing human annotated data, real-world data, safety, and grounding. Moreover, a rigorous quality-filtering pipeline ensures visual fidelity, semantic accuracy, and diversity across chart representations. Fine-tuning on ChartNet consistently improves results across benchmarks, demonstrating its utility as large-scale supervision for multimodal models. As the largest open-source dataset of its kind, ChartNet aims to support the development of foundation models with robust and generalizable capabilities for data visualization understanding. The dataset is publicly available at https://huggingface.co/datasets/ibm-granite/ChartNet', 'score': 11, 'issue_id': 1735, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': '981a783f36078368', 'authors': ['Jovana Kondic', 'Pengyuan Li', 'Dhiraj Joshi', 'Isaac Sanchez', 'Ben Wiesel', 'Shafiq Abedin', 'Amit Alfassy', 'Eli Schwartz', 'Daniel Caraballo', 'Yagmur Gizem Cinar', 'Florian Scheidegger', 'Steven I. Ross', 'Daniel Karl I. Weidele', 'Hang Hua', 'Ekaterina Arutyunova', 'Roei Herzig', 'Zexue He', 'Zihan Wang', 'Xinyue Yu', 'Yunfei Zhao', 'Sicong Jiang', 'Minghao Liu', 'Qunshu Lin', 'Peter Staar', 'Luis Lastras', 'Aude Oliva', 'Rogerio Feris'], 'affiliations': ['Abaka AI', 'IBM Research', 'MIT', 'MIT-IBM Watson AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.27064.jpg', 'data': {'categories': ['#cv', '#multimodal', '#dataset'], 'emoji': '📊', 'ru': {'title': 'Мультимодальное понимание диаграмм через масштабный синтетический датасет', 'desc': 'ChartNet представляет собой масштабный мультимодальный датасет из 1.5 миллионов образцов графиков с синхронизированными визуальными, текстовыми и числовыми компонентами. Датасет создан с помощью инновационного конвейера синтеза на основе кода, который генерирует разнообразные диаграммы 24 типов, используя 6 библиотек визуализации. Каждый образец содержит пять согласованных элементов: исходный код, отрендеренное изображение диаграммы, таблицу данных, текстовое описание и пары вопрос-ответ с рассуждениями. Датасет позволяет значительно улучшить способность мультимодальных моделей к интерпретации графиков и рассуждению над геометрическими визуальными паттернами, структурированными данными и естественным языком.'}, 'en': {'title': 'ChartNet: Unlocking Chart Comprehension for AI', 'desc': 'ChartNet is a comprehensive multimodal dataset that includes 1.5 million chart samples, each containing visual, textual, and numerical elements. It aims to improve the ability of machine learning models to interpret and reason about charts, which is a challenge for current vision-language models. The dataset features a variety of chart types and is generated using a novel code-guided synthesis pipeline, ensuring high quality and diversity. By providing fine-grained cross-modal alignment and specialized subsets, ChartNet serves as a valuable resource for training models to enhance their understanding of data visualization.'}, 'zh': {'title': 'ChartNet：提升图表理解的多模态数据集', 'desc': 'ChartNet是一个大规模的多模态数据集，包含150万个图表样本，旨在提升多模态模型的图表解读和推理能力。该数据集结合了视觉、文本和数值组件，帮助模型共同推理几何视觉模式、结构化数据信息和自然语言。ChartNet采用新颖的代码引导合成管道生成多样化的图表样本，并确保样本之间的跨模态对齐。通过在ChartNet上进行微调，模型在各项基准测试中表现出显著提升，证明了其作为多模态模型大规模监督的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.28376', 'title': 'Marco DeepResearch: Unlocking Efficient Deep Research Agents via Verification-Centric Design', 'url': 'https://huggingface.co/papers/2603.28376', 'abstract': 'Abstract A verification-centric framework for deep research agents improves performance on complex benchmarks by incorporating error checking at multiple stages of development and inference.  AI-generated summary Deep research agents autonomously conduct open-ended investigations, integrating complex information retrieval with multi-step reasoning across diverse sources to solve real-world problems. To sustain this capability on long-horizon tasks, reliable verification is critical during both training and inference. A major bottleneck in existing paradigms stems from the lack of explicit verification mechanisms in QA data synthesis, trajectory construction, and test-time scaling. Errors introduced at each stage propagate downstream and degrade the overall agent performance. To address this, we present Marco DeepResearch, a deep research agent optimized with a verification-centric framework design at three levels: (1)~QA Data Synthesis: We introduce verification mechanisms to graph-based and agent-based QA synthesis to control question difficulty while ensuring answers are unique and correct; (2)~Trajectory Construction: We design a verification-driven trajectory synthesis method that injects explicit verification patterns into training trajectories; and (3)~Test-time scaling: We use Marco DeepResearch itself as a verifier at inference time and effectively improve performance on challenging questions. Extensive experimental results demonstrate that our proposed Marco DeepResearch agent significantly outperforms 8B-scale deep research agents on most challenging benchmarks, such as BrowseComp and BrowseComp-ZH. Crucially, under a maximum budget of 600 tool calls, Marco DeepResearch even surpasses or approaches several 30B-scale agents, like Tongyi DeepResearch-30B.', 'score': 10, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '1d5c3ce4881654cc', 'authors': ['Bin Zhu', 'Qianghuai Jia', 'Tian Lan', 'Junyang Ren', 'Feng Gu', 'Feihu Jiang', 'Longyue Wang', 'Zhao Xu', 'Weihua Luo'], 'affiliations': ['Alibaba International Digital Commerce'], 'pdf_title_img': 'assets/pdf/title_img/2603.28376.jpg', 'data': {'categories': ['#optimization', '#agents', '#training', '#reasoning', '#data', '#benchmark'], 'emoji': '✓', 'ru': {'title': 'Проверка на каждом шаге - путь к совершенству агентов исследования', 'desc': 'В работе представлен фреймворк Marco DeepResearch для обучения глубоких агентов исследования, который улучшает их производительность благодаря встроенным механизмам верификации на разных этапах разработки. Авторы решают проблему накопления ошибок путём добавления проверок в синтез QA-данных, конструирование обучающих траекторий и во время инференции. Фреймворк работает на трёх уровнях: контроль качества при создании вопросов и ответов, внедрение паттернов верификации в обучающие траектории и использование самого агента как верификатора на тестовом этапе. Эксперименты показывают, что Marco DeepResearch (8B параметров) значительно превосходит подобные модели и сравним с агентами в 30B параметров на сложных бенчмарках типа BrowseComp.'}, 'en': {'title': 'Enhancing Deep Research Agents with Verification for Superior Performance', 'desc': 'This paper introduces Marco DeepResearch, a deep research agent that enhances performance on complex tasks by implementing a verification-centric framework. The framework incorporates error checking at three critical stages: QA data synthesis, trajectory construction, and test-time scaling. By ensuring the accuracy of questions and answers, and by using verification patterns during training, the agent minimizes error propagation that typically degrades performance. Experimental results show that Marco DeepResearch outperforms larger models on challenging benchmarks, demonstrating the effectiveness of its verification mechanisms.'}, 'zh': {'title': '以验证为中心的深度研究代理框架', 'desc': '本文提出了一种以验证为中心的深度研究代理框架，旨在通过在开发和推理的多个阶段引入错误检查来提高在复杂基准上的性能。深度研究代理能够自主进行开放式调查，整合复杂的信息检索与多步骤推理，以解决现实世界的问题。为了在长期任务中保持这种能力，训练和推理过程中的可靠验证至关重要。我们提出的Marco DeepResearch在QA数据合成、轨迹构建和测试时扩展三个层面上进行了优化，显著提升了代理的整体性能。'}}}, {'id': 'https://huggingface.co/papers/2603.28766', 'title': 'HandX: Scaling Bimanual Motion and Interaction Generation', 'url': 'https://huggingface.co/papers/2603.28766', 'abstract': 'Abstract HandX presents a comprehensive foundation for bimanual hand motion synthesis including a new dataset, annotation method, and evaluation metrics for dexterous motion generation.  AI-generated summary Synthesizing human motion has advanced rapidly, yet realistic hand motion and bimanual interaction remain underexplored. Whole-body models often miss the fine-grained cues that drive dexterous behavior, finger articulation, contact timing, and inter-hand coordination, and existing resources lack high-fidelity bimanual sequences that capture nuanced finger dynamics and collaboration. To fill this gap, we present HandX, a unified foundation spanning data, annotation, and evaluation. We consolidate and filter existing datasets for quality, and collect a new motion-capture dataset targeting underrepresented bimanual interactions with detailed finger dynamics. For scalable annotation, we introduce a decoupled strategy that extracts representative motion features, e.g., contact events and finger flexion, and then leverages reasoning from large language models to produce fine-grained, semantically rich descriptions aligned with these features. Building on the resulting data and annotations, we benchmark diffusion and autoregressive models with versatile conditioning modes. Experiments demonstrate high-quality dexterous motion generation, supported by our newly proposed hand-focused metrics. We further observe clear scaling trends: larger models trained on larger, higher-quality datasets produce more semantically coherent bimanual motion. Our dataset is released to support future research.', 'score': 9, 'issue_id': 1733, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '9215e3b5aa264200', 'authors': ['Zimu Zhang', 'Yucheng Zhang', 'Xiyan Xu', 'Ziyin Wang', 'Sirui Xu', 'Kai Zhou', 'Bing Zhou', 'Chuan Guo', 'Jian Wang', 'Yu-Xiong Wang', 'Liang-Yan Gui'], 'affiliations': ['Snap Inc.', 'Specs Inc.', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2603.28766.jpg', 'data': {'categories': ['#open_source', '#synthetic', '#diffusion'], 'emoji': '🤲', 'ru': {'title': 'Фундамент для синтеза ловких двуручных движений с помощью аннотированных данных и больших языковых моделей', 'desc': 'HandX представляет комплексную основу для синтеза двурукого движения рук, включая новый датасет, метод аннотирования и метрики оценки для генерации ловких движений. Авторы решают проблему недостатка высокой точности в моделировании координации двух рук, артикуляции пальцев и контактных взаимодействий, которые часто упускаются в целостных моделях движения человека. Они предлагают масштабируемый подход к аннотированию данных, используя большие языковые модели для создания семантически богатых описаний на основе извлечённых признаков движения, таких как события контакта и сгибание пальцев. Экспериментальные результаты показывают, что диффузионные и авторегрессивные модели, обученные на
