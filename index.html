и шрифтами и ориентациями. Синтетические данные получены двумя способами: через улучшенный pipeline SynthWordArt для точного контролируемого синтеза и через комбинацию vision-language модели Qwen3-VL и Z-Image для повышения разнообразия и реалистичности. Предложенная модель использует энкодер для обработки произвольных форм и авторегрессивный декодер для моделирования сложных структур текста, преодолевая ограничения фиксированных шаблонов традиционных методов распознавания. Метод достигает 90.40% точности на бенчмарке WordArt-Bench, значительно превосходя существующие методы распознавания текста и специализированные vision-language модели.'}, 'en': {'title': 'Revolutionizing Artistic Text Recognition with WATER-S and WATERec', 'desc': 'This paper introduces a new approach to recognizing artistic text, specifically focusing on irregular layouts found in WordArt. It presents a large synthetic dataset called WATER-S, which is significantly larger than previous datasets, enhancing the diversity of training data for machine learning models. The authors also propose a specialized model architecture, WATERec, which can handle arbitrary-shaped inputs and complex layouts, overcoming limitations of traditional scene text recognition methods. Experimental results demonstrate that this new model achieves state-of-the-art accuracy on artistic text recognition tasks, outperforming existing models.'}, 'zh': {'title': '突破艺术文本识别的瓶颈', 'desc': '本文介绍了一种大规模合成数据集和专门的模型架构，以解决艺术文本识别的挑战。通过提高数据多样性和模型灵活性，本文提出的WATER任务比一般的场景文本识别更具挑战性。我们构建了一个包含200万条合成数据的WATER-S数据集，显著提升了艺术文本数据的规模。新提出的WATERec模型采用支持任意形状输入的视觉编码器和自回归解码器，成功突破了固定模板场景文本识别的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2606.23104', 'title': 'ReNIO: Reweighting Negative Trajectory Importance for LLM On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.23104', 'abstract': "Abstract ReNIO enhances on-policy distillation for language models by reweighting negative trajectories based on token-level probability ratios, improving reasoning performance in mathematical and code generation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) improves LLM reasoning by training a student model on its own generated outputs, but standard OPD treats all student-generated outputs (SGOs) equally regardless of their informativeness. We observe a consistent asymmetry in controlled filtering experiments: in both OPD and on-policy self distillation (OPSD), training only on incorrect SGOs outperforms training only on correct ones. Our further analysis suggests that models trained on correct-only SGOs tend to generate shorter reasoning traces and show weaker reflection behavior, while incorrect SGOs better preserve exploratory reasoning near the model's capability boundary. To exploit this signal without requiring full answer-containing rollouts, we introduce ReNIO, which Reweights Negative trajectory Importance for LLM On-policy distillation. By using the student-to-teacher probability ratio, ReNIO identifies pivotal tokens leading to wrong reasoning traces and aggregates their information into a normalized sample weight, inherently assigning larger weights to likely negative trajectories without observing the correctness of final-answer. Since Re-NIO only uses prefix-conditioned token probabilities, it preserves OPD's prefix training advantage over full-rollout reinforcement learning. Across both mathematical reasoning and code generation tasks, ReNIO improves both OPD and OPSD, with representative relative gains of up to 8.90% for Qwen3-1.7B and 10.00% for R1-Distill-Qwen-7B on mathematical reasoning benchmarks. Code repo: https://github.com/BDML-lab/ReNIO.", 'score': 5, 'issue_id': 2499, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'cb5efbac76aa36ef', 'authors': ['Chen Lin', 'Kedi Chen', 'Wei Zhang'], 'affiliations': ['East China Normal University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.23104.jpg', 'data': {'categories': ['#small_models', '#plp', '#rlhf', '#math', '#optimization', '#reasoning', '#open_source', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Переоценка негативных траекторий для умнее дистилляции языковых моделей', 'desc': 'В статье представляется метод ReNIO для улучшения обучения с дистилляцией на политике для языковых моделей. Авторы обнаружили асимметрию в том, что обучение студента только на неправильных выходах даёт лучший результат, чем обучение только на правильных, потому что неправильные примеры лучше сохраняют исследовательское поведение у границ возможностей модели. ReNIO переоценивает важность отрицательных траекторий, используя отношение вероятностей студента к учителю на уровне токенов, чтобы идентифицировать ключевые токены, ведущие к ошибочным рассуждениям. Метод показывает значительные улучшения (до 10%) в задачах математического рассуждения и генерации кода без необходимости полных попыток с ответами.'}, 'en': {'title': 'ReNIO: Boosting Reasoning by Reweighting Negative Outputs in Language Models', 'desc': 'ReNIO is a method that enhances on-policy distillation (OPD) for language models by reweighting negative outputs based on token-level probability ratios. This approach allows the model to focus on less informative outputs, which surprisingly leads to better reasoning performance in tasks like math and code generation. The key insight is that incorrect outputs can provide valuable exploratory reasoning signals, which are often overlooked in traditional training methods. By assigning greater importance to these negative trajectories, ReNIO improves the overall effectiveness of the learning process without needing complete answer rollouts.'}, 'zh': {'title': 'ReNIO：提升语言模型推理能力的新方法', 'desc': 'ReNIO是一种增强的在线策略蒸馏方法，旨在提高语言模型在数学推理和代码生成任务中的表现。它通过根据令牌级概率比重加权负向轨迹，优化了学生模型的训练过程。研究发现，训练仅基于错误生成输出的模型，能够更好地保留探索性推理，从而提升推理能力。ReNIO通过识别导致错误推理的关键令牌，赋予负向轨迹更大的权重，从而在不需要完整答案的情况下，提升了模型的推理性能。'}}}, {'id': 'https://huggingface.co/papers/2606.16316', 'title': 'RL-Index: Reinforcement Learning for Retrieval Index Reasoning', 'url': 'https://huggingface.co/papers/2606.16316', 'abstract': 'Abstract RL-Index introduces an agentic indexing framework that shifts reasoning from query time to indexing stage by using LLM-generated rationales and reinforcement learning to improve retrieval effectiveness and reduce latency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Retrieving external knowledge is essential for solving real-world tasks, yet it remains challenging when the relationship between a query and its relevant knowledge involves implicit and complex reasoning beyond surface-level semantic or lexical matching (e.g., mathematical problems relying on the same theorem or coding requiring deep reasoning). Existing approaches primarily rely on query-side reasoning (e.g., query rewriting), which introduces significant online latency and underutilizes the opportunity to perform reasoning over the knowledge corpus itself (i.e., index-side reasoning). In this paper, we propose RL-Index, an agentic indexing framework that formulates retrieval index reasoning as a reinforcement learning problem. Instead of performing reasoning at query time, RL-Index shifts reasoning to the indexing stage by augmenting documents with LLM-generated rationales that explicitly encode the latent query-knowledge relationship. To optimize the quality of these rationales, we employ Group Relative Policy Optimization (GRPO) and use retrieval similarity as a verifiable reward signal, enabling direct optimization of indexing decisions for retrieval effectiveness. Extensive experiments on the BRIGHT benchmark demonstrate that RL-Index consistently improves both retrieval and downstream question-answering performance, while significantly reducing online inference latency. Moreover, the learned rationale augmentation generalizes across diverse retrievers and generators, highlighting its robustness as a plug-and-play indexing strategy across different retrieval systems.', 'score': 5, 'issue_id': 2498, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '1b7dda04b5635c84', 'authors': ['Yongjia Lei', 'Nedim Lipka', 'Zhisheng Qi', 'Utkarsh Sahu', 'Koustava Goswami', 'Franck Dernoncourt', 'Ryan A. Rossi', 'Yu Wang'], 'affiliations': ['Adobe Research', 'University of Oregon'], 'pdf_title_img': 'assets/pdf/title_img/2606.16316.jpg', 'data': {'categories': ['#rl', '#agents', '#reasoning', '#optimization', '#benchmark', '#rag', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Переносим рассуждения с поиска на индексирование для ускорения и улучшения качества', 'desc': 'RL-Index предлагает агентный фреймворк для индексирования, который переносит рассуждения из этапа поиска на этап подготовки индекса. Система использует LLM для генерации обоснований документов, которые явно кодируют скрытые связи между запросами и релевантными документами. Оптимизация качества этих обоснований выполняется с помощью метода Group Relative Policy Optimization (GRPO), используя сигнал вознаграждения на основе релевантности при поиске. Экспериментально показано, что подход улучшает эффективность извлечения информации и ответов на вопросы, одновременно снижая задержку при онлайн-инференсе.'}, 'en': {'title': 'Revolutionizing Retrieval: Reasoning at Indexing, Not Query Time', 'desc': 'The paper presents RL-Index, a novel indexing framework that enhances information retrieval by shifting reasoning from the query stage to the indexing stage. It utilizes large language model (LLM)-generated rationales and reinforcement learning to improve the connection between queries and relevant knowledge, particularly for complex reasoning tasks. By employing Group Relative Policy Optimization (GRPO), the framework optimizes the quality of these rationales, leading to better retrieval effectiveness and reduced latency. Experiments show that RL-Index not only boosts retrieval and question-answering performance but also adapts well across various retrieval systems, making it a versatile solution.'}, 'zh': {'title': '智能索引：提升检索效率与降低延迟的创新方案', 'desc': 'RL-Index提出了一种智能索引框架，通过将推理从查询阶段转移到索引阶段，利用大型语言模型生成的推理和强化学习来提高检索效果并减少延迟。该方法解决了在查询与相关知识之间存在隐含和复杂推理关系时的检索挑战，尤其是在数学问题和深度推理的编码任务中。与传统的查询侧推理方法不同，RL-Index在索引阶段增强文档，明确编码潜在的查询-知识关系。实验结果表明，RL-Index在检索和后续问答性能上均有显著提升，同时显著降低了在线推理延迟。'}}}, {'id': 'https://huggingface.co/papers/2606.24083', 'title': 'CAVEWOMAN: How Large Language Models Behave Under Linguistic Input and Output Compression', 'url': 'https://huggingface.co/papers/2606.24083', 'abstract': 'Abstract Two-channel evaluation shows output compression reduces costs while input compression increases costs and degrades accuracy across models and datasets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct "Talk short. Drop grammar. Save token." This caveman style is widely promoted as a way to cut inference cost, but whether it actually saves anything depends on which channel (the user\'s prompt or the model\'s response) is being compressed. We present Cavewoman, a two-channel evaluation protocol that scores every generation on task accuracy, realized per-item cost, and reference-text agreement against the model\'s unconstrained reference. We evaluate eight models on five datasets at five reduction levels, with both channels measured on the same items. Output compression cuts realized cost on most API models (1.4-2.4x per model, up to 3x in the best case) and on all four open-weight models under public-tier pricing. Input compression has the opposite effect, a strict lose-lose: it raises net cost rather than lowering it (~1.15x on the five-benchmark mean, up to 1.8x on the worst dataset and 2.7x under stronger compression), because models compensate with longer responses even as accuracy collapses. Under the same setting, surface text diverges from the unconstrained reference: on the non-reasoning models, roughly half of all generations are correct yet their surface text no longer entails the model\'s own unconstrained baseline generation. The divergence survives length-controlled re-scoring, multiple-comparisons correction, and replication under complementary semantic measures. Code and data are available at https://github.com/danielle34/cavewoman.', 'score': 4, 'issue_id': 2498, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'edd2e1cb6c13717b', 'authors': ['Morayo Danielle Adeyemi', 'Ryan A. Rossi', 'Franck Dernoncourt'], 'affiliations': ['Adobe Research', 'Independent'], 'pdf_title_img': 'assets/pdf/title_img/2606.24083.jpg', 'data': {'categories': ['#dataset', '#inference', '#benchmark'], 'emoji': '💰', 'ru': {'title': 'Сжатие входа разоряет, сжатие выхода спасает', 'desc': 'Исследование показывает, что сжатие выходных данных модели уменьшает затраты на инференс, тогда как сжатие входных данных увеличивает затраты и снижает точность. Авторы разработали протокол Cavewoman для двухканального оценивания, который измеряет точность задачи, реальную стоимость и совпадение с эталонным выводом модели. Тестирование восьми языковых моделей на пяти наборах данных показало, что модели компенсируют ограничения входа более длинными ответами, что делает эту стратегию неэффективной. Исследование демонстрирует, что популярный подход к экономии токенов работает только при сжатии выходных данных, а не входных.'}, 'en': {'title': 'Compress Wisely: Output Cuts Costs, Input Hurts Accuracy!', 'desc': 'This paper investigates the effects of input and output compression on machine learning model performance and cost. It finds that while output compression can significantly reduce costs without sacrificing accuracy, input compression tends to increase costs and degrade model accuracy. The authors introduce a new evaluation protocol called Cavewoman, which assesses model outputs based on task accuracy, cost, and agreement with reference texts. Their experiments reveal that input compression leads to longer, less accurate responses, while output compression generally improves cost efficiency across various models and datasets.'}, 'zh': {'title': '压缩策略的双面性：输出有利，输入不利', 'desc': '这篇论文探讨了输入和输出压缩对机器学习模型的影响。研究发现，输出压缩可以降低成本，而输入压缩则会增加成本并降低准确性。作者提出了一种名为Cavewoman的评估协议，用于衡量生成内容的任务准确性和成本。通过对八个模型在五个数据集上的评估，结果显示输出压缩在大多数情况下是有利的，而输入压缩则是一个双输的局面。'}}}, {'id': 'https://huggingface.co/papers/2606.24033', 'title': 'RoPE-Aware Bit Allocation for KV-Cache Quantization', 'url': 'https://huggingface.co/papers/2606.24033', 'abstract': "Abstract Block-GTQ introduces a RoPE-aware bit allocation method for key-cache quantization that improves attention accuracy and downstream performance through adaptive bit distribution and packed cache serving.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing low-bit KV-cache quantizers often treat each cached key as a flat vector. Under RoPE, however, a key's contribution to a future attention logit decomposes into a position-dependent sum over two-dimensional frequency blocks. This makes key-cache quantization a block-wise bit-allocation problem: high-energy RoPE blocks are more sensitive to quantization error and should receive more bits. We introduce Block-GTQ, a RoPE-aware bit allocator for key-cache quantization built on TurboQuant-MSE(TQ-MSE). For each layer and KV head, Block-GTQ computes a label-free energy score for each RoPE block and greedily allocates integer bit widths by marginal gain. Under matched K/V bit budgets, Block-GTQ better preserves RoPE query-key logits on a ten-model diagnostic panel, cutting per-layer MAE by 32-80% at 2 and 3 b/dim K-only quantization and winning all 367/367 layer comparisons against uniform TQ-MSE. These fidelity gains translate to stronger downstream long-context retrieval, understanding, and reasoning. At K2V2 on Llama-3.1-8B-Instruct, Block-GTQ raises the six-task NIAH average from 70.6 to 97.4, and the LongBench-EN average from 36.87 to 53.31. On AIME 2024/2025 with DeepSeek-R1-Distill-Qwen-7B, without an fp16 recent-key buffer, Block-GTQ at K3V2 scores 51.7/37.5, close to fp16's 54.2/37.9, whereas uniform TQ-MSE collapses to 0.0/0.0. We further implement a packed-cache serving path. On a single H800 GPU with Qwen2.5-3B-Instruct, packed K3V3 achieves 3.24x KV-cache compression with fp16-comparable quality, runs 1.34x faster than fp16 FlashAttention2 at 128K context, reduces peak memory from 56.31 GB to 19.85 GB, and remains feasible at 256K and 512K where fp16 OOMs. Code is available at https://github.com/JIA-Lab-research/blockgtq.", 'score': 4, 'issue_id': 2497, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '50f31e4fc778260c', 'authors': ['Fengfeng Liang', 'Yuechen Zhang', 'Jiaya Jia'], 'affiliations': ['Hong Kong University of Science and Technology', 'MiMo, Xiaomi Corporation', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24033.jpg', 'data': {'categories': ['#optimization', '#training', '#inference', '#long_context', '#open_source'], 'emoji': '⚙️', 'ru': {'title': 'Умное сжатие памяти: RoPE-адаптивная квантизация KV-кеша для длинных контекстов', 'desc': 'В статье предлагается Block-GTQ — метод квантизации KV-кеша, который учитывает структуру RoPE-позиционного кодирования для более эффективного распределения битов между различными частотными блоками. Авторы показывают, что высокоэнергетические RoPE-блоки более чувствительны к ошибкам квантизации и должны получать больше битов, чем низкоэнергетические. Предложенный алгоритм использует жадное распределение битов на основе оценки энергии каждого блока и значительно улучшает точность внимания — снижает среднюю абсолютную ошибку на 32-80% при 2-3 битах на размерность. Метод позволяет достичь 3.24x сжатия KV-кеша на GPU, сохраняя качество, сопоставимое с fp16, и обеспечивает 1.34x ускорение для длинных контекстов.'}, 'en': {'title': 'Optimizing Key-Cache Quantization with RoPE-Aware Bit Allocation', 'desc': 'The paper presents Block-GTQ, a novel method for key-cache quantization that enhances attention accuracy by using a RoPE-aware bit allocation strategy. Unlike traditional methods that treat cached keys as flat vectors, Block-GTQ recognizes the importance of position-dependent frequency blocks, allowing for more effective bit distribution. By calculating energy scores for RoPE blocks, it allocates bits based on their sensitivity to quantization errors, significantly reducing mean absolute error (MAE) in attention logits. This approach not only improves model performance on various tasks but also achieves efficient memory usage and faster processing speeds compared to existing methods.'}, 'zh': {'title': '基于RoPE的智能位分配，提升量化性能', 'desc': 'Block-GTQ提出了一种基于RoPE的关键缓存量化位分配方法，通过自适应位分布和打包缓存服务来提高注意力准确性和下游性能。与传统的低位KV缓存量化器不同，Block-GTQ考虑了RoPE的影响，使得关键的贡献与位置相关，形成了一个基于块的位分配问题。该方法为每个RoPE块计算无标签的能量评分，并通过边际增益贪婪地分配整数位宽。实验结果表明，Block-GTQ在多个模型上显著提高了RoPE查询-关键的保真度，增强了长上下文的检索、理解和推理能力。'}}}, {'id': 'https://huggingface.co/papers/2606.25182', 'title': 'What Intermediate Layers Know: Detecting Jailbreaks from Entropy Dynamics', 'url': 'https://huggingface.co/papers/2606.25182', 'abstract': "Abstract Jailbreak attacks expose vulnerabilities in aligned large language models, revealing that harmful intent is encoded in structured intermediate uncertainty dynamics rather than output representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Jailbreak attacks reveal a persistent weakness in aligned Large Language Models: carefully crafted prompts can elicit policy-violating responses despite safety training. While most defenses operate at the prompt or output level, it remains unclear how harmful intent is encoded within the model's internal representations. We investigate this question by analyzing token-level predictive entropy trajectories across layers of a frozen LLM using the logit lens. We find that static aggregate statistics of prompt-level entropy (e.g., mean, variance) carry little discriminative signal, whereas features capturing how entropy evolves across token positions, such as monotonic rank-based trend scores, are substantially more informative. Importantly, this signal is not uniform across model depth: it is concentrated in intermediate layers and degrades at the final layer, indicating that jailbreak-relevant structure is most pronounced in mid-network representations rather than at the output head. Across multiple models (Llama, Qwen, Gemma) and adversarial benchmarks, these entropy dynamics provide architecture-consistent separation without additional training. Together, our findings show that jailbreak behavior is reflected in structured intermediate uncertainty dynamics, clarifying both which entropy-derived features encode harmful intent and where in the network that signal is most pronounced.", 'score': 3, 'issue_id': 2500, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'c2ca147bc9876834', 'authors': ['Sofiia Nikolenko', 'Michele Papucci', 'Mina Rezaei', 'Shireen Kudukkil Manchingal'], 'affiliations': ['Hugging Face', 'Mohamed bin Zayed University of Artificial Intelligence', 'Skolkovo Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.25182.jpg', 'data': {'categories': ['#alignment', '#security', '#interpretability', '#architecture'], 'emoji': '🔓', 'ru': {'title': 'Вредоносный умысел скрывается в промежуточной неопределённости сети', 'desc': 'В работе исследуется, как уязвимости к jailbreak-атакам кодируются во внутренних представлениях больших языковых моделей. Авторы анализируют динамику предсказательной энтропии токенов через слои модели, используя метод logit lens, и обнаруживают, что статические характеристики энтропии малоинформативны, а информативны признаки, отражающие эволюцию неопределённости на уровне позиций токенов. Ключевое открытие состоит в том, что сигнал о вредоносном намерении локализован в промежуточных слоях сети, а не в выходном слое, что указывает на специфическую структуру представлений, ответственных за jailbreak-поведение. Полученные закономерности в динамике энтропии демонстрируют состоятельность на различных моделях без дополнительного обучения и позволяют лучше понять механизм кодирования вредоносного поведения в LLM.'}, 'en': {'title': 'Unveiling Harmful Intent in Language Models Through Entropy Dynamics', 'desc': "This paper investigates how jailbreak attacks exploit vulnerabilities in large language models (LLMs) by analyzing the internal representations of these models. It reveals that harmful intent is encoded in the model's intermediate layers, specifically through the dynamics of predictive entropy rather than just the final output. The study shows that traditional defenses focusing on prompts or outputs are insufficient, as the critical signals are found in how entropy evolves across token positions in the model. By examining multiple models, the authors demonstrate that understanding these intermediate uncertainty dynamics can help identify and mitigate jailbreak behaviors effectively."}, 'zh': {'title': '揭示大型语言模型中的监控漏洞', 'desc': '本论文探讨了大型语言模型中的监控漏洞，特别是如何通过精心设计的提示引发违反政策的响应。研究发现，模型内部的有害意图并不是通过输出表示编码的，而是通过中间层的不确定性动态来体现。通过分析模型各层的预测熵轨迹，发现中间层的熵动态特征比静态统计量更具信息量。我们的研究表明，监狱突破行为反映在结构化的中间不确定性动态中，揭示了有害意图的编码特征及其在网络中的位置。'}}}, {'id': 'https://huggingface.co/papers/2606.20023', 'title': 'When Lower Privileges Suffice: Investigating Over-Privileged Tool Selection in LLM Agents', 'url': 'https://huggingface.co/papers/2606.20023', 'abstract': "Abstract LLM agents frequently select higher-privilege tools unnecessarily, and while safety alignment doesn't ensure least-privilege choices, a post-training defense can reduce excessive privilege use without sacrificing performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As LLM agents increasingly select tools autonomously, their choices among tools with different privileges become safety-relevant. However, prior tool-selection studies focus on safety-agnostic metadata preferences, leaving privilege-sensitive choices underexplored. To address this gap, we study over-privileged tool selection, in which an agent selects or escalates to a higher-privilege tool despite a sufficient lower-privilege alternative. We introduce ToolPrivBench to evaluate whether agents choose higher-privilege tools despite sufficient lower-privilege alternatives, measuring both initial selection and escalation after transient tool failures. Across eight domains and five recurring risk patterns, we find that over-privileged tool selection is common among mainstream LLM agents and is further amplified by transient failures. We further find that general safety alignment does not reliably transfer to least-privilege tool choice, while prompt-level controls provide only limited mitigation under transient failures. We therefore introduce a privilege-aware post-training defense that teaches agents to prefer sufficient lower-privilege tools and escalate only when necessary. Our mitigation experiments show that this defense substantially reduces unnecessary high-privilege tool use while preserving general capabilities.", 'score': 3, 'issue_id': 2498, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'f587712185b6d216', 'authors': ['Kaiyue Yang', 'Yuyan Bu', 'Jingwei Yi', 'Yuchi Wang', 'Biyu Zhou', 'Juntao Dai', 'Songlin Hu', 'Yaodong Yang'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Institute for Artificial Intelligence, Peking University', 'Institute of Information Engineering, Chinese Academy of Sciences', 'School of Cyber Security, University of Chinese Academy of Sciences', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.20023.jpg', 'data': {'categories': ['#agents', '#rlhf', '#benchmark', '#security', '#alignment'], 'emoji': '🔐', 'ru': {'title': 'Минимальные привилегии для LLM-агентов: защита от избыточного доступа', 'desc': 'В статье исследуется проблема, когда LLM-агенты часто выбирают инструменты с избыточными привилегиями, даже когда доступны более простые альтернативы. Авторы создали ToolPrivBench — бенчмарк для оценки умения агентов выбирать инструменты с минимально необходимыми привилегиями, включая сценарии с временными отказами. Они обнаружили, что стандартное выравнивание безопасности (safety alignment) не гарантирует выбор инструментов с наименьшими привилегиями. В качестве решения предложена специализированная техника постобучения, которая обучает агентов предпочитать достаточные инструменты с низкими привилегиями и избегать эскалации без необходимости, сохраняя при этом общую производительность.'}, 'en': {'title': 'Empowering LLMs with Least-Privilege Tool Selection', 'desc': 'This paper addresses the issue of large language model (LLM) agents selecting tools with higher privileges than necessary, which can pose safety risks. The authors introduce ToolPrivBench, a framework to evaluate how often agents choose over-privileged tools when lower-privilege options are available. They find that this over-selection is common and worsens during transient tool failures. To combat this, they propose a post-training defense that encourages agents to prefer lower-privilege tools, effectively reducing unnecessary privilege use while maintaining performance.'}, 'zh': {'title': '优化工具选择，降低不必要的权限使用', 'desc': '本论文研究了大型语言模型（LLM）代理在选择工具时常常不必要地选择高权限工具的问题。尽管安全对齐并不能确保选择最低权限的工具，但我们提出了一种后训练防御机制，可以减少过度权限的使用，同时不影响性能。我们开发了ToolPrivBench来评估代理在面对足够的低权限替代工具时，是否仍然选择高权限工具。实验结果表明，过度权限的选择在主流LLM代理中普遍存在，并且在工具暂时失效时更为严重。'}}}, {'id': 'https://huggingface.co/papers/2606.25605', 'title': 'Constraint Tax in Open-Weight LLMs: An Empirical Study of Tool Calling Suppression Under Structured Output Constraints', 'url': 'https://huggingface.co/papers/2606.25605', 'abstract': 'Abstract Tool Suppression occurs when JSON Schema constraints and tool calling are jointly enabled, preventing open-weight models from invoking tools despite maintaining schema compliance, with the issue stemming from grammar-based token masking that makes tool-call tokens unreachable during decoding.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tool Calling and Structured Output are two core capabilities of modern Agent systems, yet their interaction under joint deployment conditions remains insufficiently understood. This paper reports a reproducible phenomenon observed in a production Agent system: when Tool Calling and JSON Schema constraints are simultaneously enabled, multiple open-weight models cease invoking tools despite maintaining high schema compliance. We refer to this behavior as Tool Suppression. Through controlled experiments across multiple model families and deployment settings, we consistently reproduce Tool Suppression under joint constraints, while tool execution and schema compliance remain functional when evaluated independently. Further analysis reveals that JSON Schema constraints are compiled into grammar-based token masks, causing tool-call tokens to become unreachable during decoding. This provides an implementation-level explanation for the observed behavior. To interpret the phenomenon, we formulate the Constraint Priority Inversion (CPI) hypothesis, which suggests that schema satisfaction may dominate action-selection behavior under multiple simultaneous constraints. We present CPI as a behavioral hypothesis consistent with the observed evidence rather than a verified internal mechanism. To mitigate the problem, we propose Transparent Two-Pass Execution, an inference-time strategy that decouples tool execution from schema-constrained response generation. Experimental results show that this approach restores tool invocation while preserving structured output guarantees without requiring model retraining. These findings suggest that evaluating tool use and structured output separately may overlook important reliability issues in production Agent systems. Code, data, and docs will be released at https://github.com/Fzsama/Constrain-Tax-26-06.git.', 'score': 0, 'issue_id': 2499, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '8bf7aaf937d4fc29', 'authors': ['Fangzheng Li', 'Aimin Zhang', 'Chen Lv'], 'affiliations': ['Focus AI Center, Focus Technology Co., Ltd.', 'Nanjing University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.25605.jpg', 'data': {'categories': ['#agents', '#inference', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Когда ограничения схемы блокируют вызовы функций в языковых моделях', 'desc': 'В работе описывается явление Tool Suppression, когда одновременное использование JSON Schema ограничений и инструментов вызовов приводит к тому, что открытые языковые модели перестают вызывать функции, несмотря на соблюдение схемы. Авторы показали, что проблема возникает из-за грамматического маскирования токенов, которое делает токены вызова инструментов недостижимыми во время декодирования. Они предложили гипотезу инверсии приоритета ограничений, объясняющую, почему удовлетворение схеме доминирует над выбором действий при множественных одновременных ограничениях. Для решения проблемы предложена стратегия двухпроходного исполнения, которая отделяет выполнение инструментов от генерации структурированного выхода без переобучения модели.'}, 'en': {'title': 'Unblocking Tool Invocation in ML Models', 'desc': "This paper discusses a problem called Tool Suppression, which occurs when both JSON Schema constraints and tool calling are enabled in machine learning models. Despite the models being compliant with the schema, they fail to invoke tools due to grammar-based token masking that makes tool-call tokens inaccessible during the decoding process. The authors introduce the Constraint Priority Inversion (CPI) hypothesis to explain this behavior, suggesting that satisfying schema constraints can interfere with the model's ability to select actions. To address this issue, they propose a solution called Transparent Two-Pass Execution, which allows for effective tool invocation while maintaining structured output without needing to retrain the models."}, 'zh': {'title': '工具调用与Schema约束的相互影响', 'desc': '本文探讨了工具抑制现象，即在同时启用JSON Schema约束和工具调用时，开放权重模型无法调用工具，尽管仍然符合Schema要求。研究发现，这种现象源于基于语法的令牌掩码，使得工具调用令牌在解码过程中变得不可达。为了解释这一现象，提出了约束优先级反转（CPI）假设，认为在多个约束同时存在时，Schema的满足可能主导行动选择行为。为了解决这一问题，提出了透明的双通道执行策略，能够在不重新训练模型的情况下恢复工具调用，同时保持结构化输出的保证。'}}}, {'id': 'https://huggingface.co/papers/2606.20196', 'title': 'Distill Once, Adapt Life-Long: Exploring Dataset Distillation for Continual Test-Time Adaptation', 'url': 'https://huggingface.co/papers/2606.20196', 'abstract': 'Abstract DO-ALL is a test-time adaptation framework that uses dataset distillation to create synthetic anchors for stable long-term model performance without retaining source data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Continual Test-Time Adaptation (CTTA) aims to maintain model performance under evolving target domains by adapting online without labeled data. However, practical deployments often cannot retain the source dataset due to privacy or licensing constraints, and purely source-free CTTA methods tend to become unstable under long-term distribution shift, suffering from compounding self-training errors and catastrophic forgetting. We introduce DO-ALL (Distill Once, Adapt Life-Long), a plug-and-play framework that revisits source information in a compact and privacy-conscious form via Dataset Distillation (DD). Before deployment, DO-ALL performs DD to produce a small set of synthetic distilled anchors that summarize the source distribution. During adaptation, each target sample is matched with its most semantically aligned anchor, which provides a stable reference for various CTTA via source replay, representation alignment, and manifold-smoothing regularization. DO-ALL can be seamlessly integrated into existing CTTA algorithms, consistently improving long-term robustness across CIFAR100-C, ImageNet-C, and the CCC benchmark. This demonstrates the potential of leveraging DD to enable stable and continuous adaptation without retaining raw source data. The code is available at https://github.com/blue-531/DOALL.', 'score': 0, 'issue_id': 2499, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'bf710742e5a86f74', 'authors': ['Hyun-Kurl Jang', 'Jihun Kim', 'Hyeokjun Kweon', 'Kuk-Jin Yoon'], 'affiliations': ['Chung-Ang University, FOV Lab', 'KAIST, Visual Intelligence Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.20196.jpg', 'data': {'categories': ['#data', '#open_source', '#benchmark', '#synthetic', '#training'], 'emoji': '🔄', 'ru': {'title': 'Дистиллированные якоря для вечной адаптации модели без исходных данных', 'desc': 'DO-ALL представляет фреймворк для адаптации моделей во время тестирования, который использует дистилляцию датасета для создания синтетических якорей без сохранения исходных данных. Метод решает проблему нестабильности при долгосрочной адаптации к смещению распределения целевых данных, предотвращая накопление ошибок самообучения и катастрофическое забывание. Синтетические якоря используются как стабильные ориентиры при помощи механизмов источника-повтора, выравнивания представлений и регуляризации многообразия. Подход интегрируется в существующие алгоритмы непрерывной адаптации и демонстрирует улучшение робастности на бенчмарках CIFAR100-C, ImageNet-C и CCC без необходимости хранить исходные данные.'}, 'en': {'title': 'Stable Adaptation Without Source Data', 'desc': 'DO-ALL is a framework designed for continual test-time adaptation (CTTA) that enhances model performance over time without needing to keep the original training data. It uses dataset distillation to create a small set of synthetic anchors that represent the source data, allowing the model to adapt to new, evolving target domains. This approach helps prevent issues like catastrophic forgetting and self-training errors that can occur when adapting without source data. By integrating DO-ALL into existing CTTA methods, it improves long-term stability and robustness across various benchmarks.'}, 'zh': {'title': 'DO-ALL：无源数据的长期适应新方法', 'desc': 'DO-ALL是一个测试时适应框架，利用数据集蒸馏技术生成合成锚点，以实现长期模型性能的稳定，而无需保留源数据。该框架旨在在不断变化的目标领域中，通过在线适应来维持模型性能，且不依赖标记数据。DO-ALL通过数据集蒸馏在紧凑且注重隐私的形式中重新访问源信息，生成一小组合成蒸馏锚点。它可以无缝集成到现有的持续测试时适应算法中，显著提高长期鲁棒性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (8)', '#agi (1)', '#alignment (3)', '#architecture (10)', '#audio (2)', '#benchmark (12)', '#cv (4)', '#data (2)', '#dataset (6)', '#diffusion (3)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (6)', '#interpretability (2)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (12)', '#open_source (10)', '#optimization (6)', '#plp (2)', '#rag (2)', '#reasoning (7)', '#rl (2)', '#rlhf (3)', '#robotics (1)', '#science', '#security (2)', '#small_models (1)', '#story_generation', '#survey (2)', '#synthetic (6)', '#training (11)', '#transfer_learning', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-25 13:13',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-25 13:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-25 13:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
