    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.06291', 'title': 'AlayaWorld: Long-Horizon and Playable Video World Generation', 'url': 'https://huggingface.co/papers/2607.06291', 'abstract': 'Abstract AlayaWorld is an open-source framework for creating interactive generative worlds that enables real-time user interaction and supports diverse actions within a modular architecture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Game worlds have traditionally been built through labor-intensive production pipelines, making them costly to develop, difficult to customization, and expensive to modify after deployment. Recent advances in video world models offer a fundamentally different paradigm. Rather than explicitly authoring every component of a virtual environment, these models autoregressively synthesize future observations conditioned on the current world state and user interactions, enabling playable worlds to be generated online. Trained on both gameplay recordings and real-world videos, they can capture diverse visual appearances and physical dynamics, opening new opportunities for interactive applications beyond gaming, including embodied intelligence. In this paper, we present AlayaWorld, a full-stack open-source framework for building interactive generative worlds. AlayaWorld enables open-ended real-time interaction, allowing users to freely navigate and perform diverse actions such as combat, spell casting, and monster summoning. The framework unifies the complete development-from data preparation model architecture, model training, inference acceleration, and deployment-within a modular and extensible architecture. Alongside the framework, we release reproducible pipelines, reference implementations, evaluation tools, and comprehensive documentation, establishing a practical foundation for future research and real-time applications of generative world models.', 'score': 39, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '10274a0b0e27042e', 'authors': ['AlayaWorld Team', 'Kaipeng Zhang', 'Chuanhao Li', 'Yifan Zhan', 'Yongtao Ge', 'Yuanyang Yin', 'Jiaming Tan', 'Kang He', 'Liaoyuan Fan', 'Ruicong Liu', 'Xiaojie Xu', 'Xuangeng Chu', 'Zhen Li', 'Zhengyuan Lin', 'Zhixiang Wang', 'Zian Meng', 'Zihui Gao'], 'affiliations': ['Alaya Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.06291.jpg', 'data': {'categories': ['#training', '#inference', '#architecture', '#games', '#open_source', '#video'], 'emoji': '🎮', 'ru': {'title': 'Генеративные миры в реальном времени через видео-модели', 'desc': 'AlayaWorld — это открытый фреймворк для создания интерактивных генеративных миров, использующий видео-модели мира для синтеза динамичных виртуальных окружений в реальном времени. Вместо трудозатратного ручного проектирования игровых уровней, система автореgressively генерирует будущие наблюдения на основе текущего состояния мира и действий пользователя. Модель обучена на записях геймплея и видео из реального мира, что позволяет ей захватывать разнообразную визуальность и физическую динамику. Фреймворк предоставляет полный стек инструментов: от подготовки данных и обучения модели до оптимизации вывода и развёртывания.'}, 'en': {'title': 'Empowering Interactive Worlds with AlayaWorld', 'desc': 'AlayaWorld is an innovative open-source framework designed for creating interactive generative environments that allow real-time user engagement. It leverages advanced video world models to automatically generate game worlds based on user interactions and the current state of the environment, reducing the need for manual content creation. By training on gameplay recordings and real-world videos, it captures a wide range of visual and physical dynamics, making it applicable for various interactive applications beyond just gaming. The framework provides a comprehensive development ecosystem, including tools for data preparation, model training, and deployment, facilitating future research in generative world models.'}, 'zh': {'title': '构建互动生成世界的开源框架', 'desc': 'AlayaWorld是一个开源框架，用于创建互动生成的虚拟世界，支持实时用户交互和多样化的操作。与传统的游戏世界开发方式不同，AlayaWorld利用视频世界模型，通过自回归合成生成可玩世界，降低了开发成本和复杂性。该框架支持用户在虚拟环境中自由导航，进行战斗、施法和召唤等多种操作。我们还提供了可复现的开发流程、参考实现和评估工具，为未来的生成世界模型研究和实时应用奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2607.05511', 'title': 'Light-Omni: Reflex over Reasoning in Agentic Video Understanding with Long-Term Memory', 'url': 'https://huggingface.co/papers/2607.05511', 'abstract': "Abstract Light-Omni is a multimodal agent framework that enables efficient video understanding through dual contextual states, achieving faster and more accurate video processing by eliminating iterative reasoning while maintaining semantic alignment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic video understanding equips models with long-term memory to autonomously process and respond to continuous, long-horizon multimodal streams. However, advanced video agents often rely on ``detective-style'' iterative reasoning for action control (e.g., search) and evidence aggregation, incurring prohibitive costs and latency. We argue that such heavy reasoning primarily compensates for the lack of global context and semantic misalignment in retrieval. This paper introduces Light-Omni, a multimodal agent framework for reflexive and lightweight video understanding. It achieves this through dual contextual states that instantly build the required context in a single forward pass. First, we maintain a global state, a finite-sized multimodal script continuously consolidated from episodic memory, serving as the global context for Light-Omni. Through hierarchical merging, it preserves recent details while summarizing past events. Second, conditioned on this global context, we generate a parametric latent state that directly drives autonomous actions and produces retrieval embeddings, with minimal latency. Benefiting from this coupled design, Light-Omni achieves semantically aligned retrieval and reflexive responses while avoiding iterative reasoning. Extensive experiments validate the effectiveness of Light-Omni across multiple video benchmarks. Notably, it outperforms M3-Agent with an average 2.4% accuracy gain, a 12.1times speedup, and a 2.6times improvement in GPU memory efficiency. Furthermore, it serves as a memory system to enhance both the performance and efficiency of existing MLLMs. Project page: https://clare-nie.github.io/Light-Omni.", 'score': 17, 'issue_id': 2592, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '290f321dccb4ed94', 'authors': ['Chang Nie', 'Jiaju Wei', 'Junlan Feng', 'Chaoyou Fu', 'Caifeng Shan'], 'affiliations': ['Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2607.05511.jpg', 'data': {'categories': ['#benchmark', '#video', '#agents', '#multimodal', '#long_context', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Контекстное видеопонимание без итеративного рассуждения', 'desc': 'Light-Omni — это фреймворк мультимодального агента для эффективного анализа видео, который использует двойную систему контекстных состояний для обработки длинных видеопоследовательностей. Система поддерживает глобальное состояние, представляющее собой краткое описание видеоэпизодов, и параметрическое скрытое состояние, которое генерирует действия агента и эмбеддинги для поиска. Благодаря такой архитектуре модель избегает итеративного рассуждения, обеспечивая семантическое выравнивание и значительное ускорение обработки. Экспериментальные результаты показывают превосходство Light-Omni по точности, скорости и эффективности использования памяти по сравнению с существующими методами.'}, 'en': {'title': 'Light-Omni: Fast and Smart Video Understanding Without Iteration', 'desc': 'Light-Omni is a new framework designed for video understanding that uses dual contextual states to improve efficiency and accuracy. It eliminates the need for slow, iterative reasoning by maintaining a global state that consolidates information from memory, allowing for quick context building. This framework also generates a parametric latent state that drives actions and creates retrieval embeddings with minimal delay. As a result, Light-Omni achieves better performance in video processing tasks, outperforming existing models in speed and memory efficiency while ensuring semantic alignment.'}, 'zh': {'title': 'Light-Omni：高效视频理解的新框架', 'desc': 'Light-Omni是一种多模态代理框架，旨在通过双重上下文状态实现高效的视频理解。它通过消除迭代推理，保持语义一致性，从而加快视频处理速度并提高准确性。该框架利用全局状态和参数化潜在状态，能够快速生成所需的上下文并驱动自主行动。实验结果表明，Light-Omni在多个视频基准测试中表现优异，显著提高了准确性和处理效率。'}}}, {'id': 'https://huggingface.co/papers/2607.06560', 'title': 'Vision as Unified Multimodal Generation', 'url': 'https://huggingface.co/papers/2607.06560', 'abstract': 'Abstract A unified multimodal model formulates computer vision tasks as generation problems using natural language and visual prompts, achieving performance comparable to specialized systems across diverse vision tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We formulate computer vision as unified multimodal generation, where heterogeneous visual tasks are expressed in the native text and image generation spaces of a unified multimodal model, without task-specific architectures. Under this formulation, SenseNova-Vision uses natural-language instructions and optional visual prompts to specify tasks, target regions or views, and decoding conventions, and generates responses as text for symbolic outputs, images for dense spatial predictions, or mixed text-and-image outputs for compositional tasks. To support large-scale training, we convert diverse computer vision annotations into instruction-response examples compatible with these generation spaces, resulting in the SenseNova-Vision Corpus, a computer-vision instruction-response corpus spanning text, image, and mixed targets. Starting from an off-the-shelf pretrained unified multimodal model, SenseNova-Vision is trained primarily on this corpus, with auxiliary multimodal data used as a capability-preserving mixture, and requires no task-specific prediction heads or architectural modifications. The resulting model covers a broad range of vision tasks, including detection, OCR, keypoint estimation, segmentation, depth estimation, surface normal prediction, point maps, and camera pose estimation, while supporting language-defined variants that combine category, color, region, and other visual cues. Experiments show that a single unified model can match leading task-specialized systems across structured visual understanding, dense geometric prediction, segmentation, and multi-view visual geometry. These results suggest unified multimodal generation as a scalable route for integrating computer vision capabilities into general-purpose foundation models. The model and corpus are publicly available.', 'score': 15, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '3096eb5a576dd52b', 'authors': ['Xiaoyang Han', 'Jianhua Li', 'Kewang Deng', 'Zukai Chen', 'Xuanke Shi', 'Sihan Wang', 'Boxuan Li', 'Linyan Wang', 'Siyi Xie', 'Xin You', 'Jinsheng Quan', 'Zhongang Cai', 'Haiwen Diao', 'Ziwei Liu', 'Lei Yang', 'Dahua Lin', 'Quan Wang'], 'affiliations': ['Nanyang Technological University', 'Peking University', 'SenseTime Research', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06560.jpg', 'data': {'categories': ['#training', '#dataset', '#cv', '#architecture', '#open_source', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная модель для всех задач компьютерного зрения через генерацию', 'desc': 'В этой работе авторы предлагают единую мультимодальную модель, которая формулирует задачи компьютерного зрения как задачи генерации текста и изображений с использованием естественного языка и визуальных подсказок. Модель SenseNova-Vision обучается на специально созданном корпусе инструкций и ответов, который преобразует разнообразные аннотации из компьютерного зрения в примеры для генеративного обучения. Единая архитектура без специализированных голов классификации охватывает широкий спектр задач: детектирование объектов, распознавание текста, оценка позы ключевых точек, сегментация, оценка глубины и другие. Экспериментальные результаты показывают, что одна мультимодальная модель может достичь производительности специализированных систем, что открывает масштабируемый путь интеграции возможностей компьютерного зрения в foundational модели.'}, 'en': {'title': 'Unified Multimodal Generation for Versatile Computer Vision Tasks', 'desc': 'This paper presents a unified multimodal model that treats various computer vision tasks as generation problems, utilizing both natural language and visual prompts. The model, called SenseNova-Vision, can perform a wide range of tasks such as detection, segmentation, and depth estimation without needing specialized architectures. It leverages a newly created dataset, the SenseNova-Vision Corpus, which converts diverse computer vision annotations into instruction-response examples for training. The results indicate that this single model can achieve performance on par with specialized systems, highlighting the potential of unified multimodal generation in enhancing general-purpose models.'}, 'zh': {'title': '统一多模态生成：计算机视觉的新路径', 'desc': '这篇论文提出了一种统一的多模态模型，将计算机视觉任务视为生成问题，使用自然语言和视觉提示来实现。该模型在多种视觉任务上表现出与专用系统相当的性能，且无需特定任务的架构。SenseNova-Vision利用自然语言指令和可选的视觉提示来指定任务，并生成文本、图像或混合输出。实验表明，这种统一的多模态生成方法可以有效整合计算机视觉能力，适用于多种视觉理解和预测任务。'}}}, {'id': 'https://huggingface.co/papers/2607.02963', 'title': 'Parallelized Autoregressive Decoding for Omni-Modal Dense Video Captioning', 'url': 'https://huggingface.co/papers/2607.02963', 'abstract': 'Abstract A parallelized autoregressive framework for dense video captioning that improves generation efficiency by exploiting weak local dependencies across temporally distinct events while maintaining temporal grounding accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dense video captioning aims to generate temporally grounded descriptions of video events, benefiting both event-level video understanding and generation. In this domain, autoregressive video large language models have emerged as a prevalent paradigm due to their strong generative and cross-modal modeling capacity. However, generating dense captions under the token-by-token paradigm severely limits inference efficiency and hinders scalability as video length and event density increase. In this work, we propose a parallelized autoregressive framework that not only improves generation efficiency but also enhances temporally grounded captioning performance. Our key insight is to exploit the weak local dependencies across temporally distinct events to restructure the causal dependency graph, thereby enabling lossless parallel generation. Specifically, tokens with weak cross-event dependencies can be decoded in parallel, while tightly coupled tokens within each event retain sequential decoding to preserve local semantic coherence. To realize this insight, we introduce two key components for lossless parallel decoding: (1) a latent global planning mechanism that automatically learns the event-level structure and produces compact tokens encoding global inter-event causality while adaptively aggregating event-level audio-visual semantics, guiding subsequent dependency restructuring and parallel decoding; and (2) an event-factorized parallel decoding mechanism that effectively balances local focus with global inter-event awareness. Experiments on various benchmarks demonstrate the clear advantage of our approach in both efficiency and performance in omni-modal event grounding and captioning. Project website: https://github.com/showlab/PadCaptioner.', 'score': 11, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '3916710b68b2c723', 'authors': ['Wenzheng Zeng', 'Siyi Jiao', 'Chen Gao', 'Hwee Tou Ng', 'Mike Zheng Shou'], 'affiliations': ['National University of Singapore, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.02963.jpg', 'data': {'categories': ['#architecture', '#inference', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Параллельное ускорение генерации видеоописаний без потери качества', 'desc': 'В работе предложен параллелизованный авторегрессивный фреймворк для плотного описания видео, который повышает эффективность генерации, используя слабые локальные зависимости между событиями. Ключевая идея заключается в реструктуризации графа причинных зависимостей, что позволяет декодировать токены параллельно, сохраняя при этом последовательное декодирование внутри каждого события для локальной семантической согласованности. Авторы предлагают два основных компонента: механизм глобального планирования на скрытом уровне, который автоматически изучает структуру событий и направляет параллельное декодирование, и механизм факторизованного параллельного декодирования, балансирующий локальное и глобальное внимание. Экспериментальные результаты показывают значительные улучшения как в скорости генерации, так и в качестве описания видеособытий с временной привязкой.'}, 'en': {'title': 'Parallelized Autoregressive Framework for Efficient Video Captioning', 'desc': 'This paper presents a new method for dense video captioning that enhances efficiency by using a parallelized autoregressive framework. It addresses the limitations of traditional token-by-token generation, which slows down the process as video length and event density increase. The authors introduce a mechanism that allows for the simultaneous decoding of tokens with weak dependencies across different events, while still maintaining the necessary sequential decoding for closely related tokens. Their approach improves both the speed of caption generation and the accuracy of temporal grounding in video descriptions.'}, 'zh': {'title': '提升视频字幕生成效率的并行自回归框架', 'desc': '本文提出了一种并行自回归框架，用于密集视频字幕生成，旨在提高生成效率，同时保持时间上的准确性。通过利用时间上不同事件之间的弱局部依赖关系，重构因果依赖图，从而实现无损并行生成。该框架引入了两个关键组件：一个潜在的全局规划机制和一个事件因子化的并行解码机制，以平衡局部关注与全局事件意识。实验结果表明，该方法在效率和性能上均优于传统的逐个标记生成方法。'}}}, {'id': 'https://huggingface.co/papers/2607.03451', 'title': 'SkillOpt-Lite: Better and Faster Agent Self-evolution via One Line of Vibe', 'url': 'https://huggingface.co/papers/2607.03451', 'abstract': 'Abstract A minimal viable pipeline for skill optimization is proposed through Zeroth-Order optimization formalization, eliminating redundancies while maintaining convergence and generalization through trajectory exploration, consensus mining, and validation gating principles.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While skill optimization for autonomous agents has gained traction, existing methods rely on complex pipelines. This leaves a fundamental question unaddressed: What constitutes a minimal viable pipeline for skill optimization, where every component is justified by theory or empirical necessity? We formalize skill optimization via Zeroth-Order (ZO) optimization, mapping classical counterparts (central difference, trust regions) to recent literature. Noting that unlike blind numerical perturbations in classical ZO, skill trajectories serve as interpretable debugging feedback. Grounded in Claude Code philosophy and PAC learning, we establish three principles for convergence and generalization: file-system-based trajectory exploration, consensus attribute mining, and independent validation gating. Eliminating redundancies, we propose SkillOpt-Lite. It accelerates convergence and outperforms full SkillOpt: improving LiveMath by +8.8 points on GPT-5.5 and +25.4 points on GPT-5.4-nano, allowing the nano model to surpass standard GPT-5.4 optimized by SkillOpt. Finally, we integrate our framework into production coding agents like VSCode Copilot, enabling developers to evolve agent skills via one line of vibe. Because our framework treats all agent components simply as standard editable code, this minimal pipeline naturally generalizes to full harness optimization (HarnessOpt). On SpreadsheetBench, HarnessOpt enables GPT-5.4-nano to achieve 0.7758 accuracy, outperforming the larger GPT-5.5 running standard pipelines (0.7620). Code is available at https://github.com/EvolvingLMMs-Lab/SkillOpt-Lite.', 'score': 11, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '9be198da2c3e4cf0', 'authors': ['Yifei Shen', 'Bo Li', 'Xinjie Zhang'], 'affiliations': ['LMMs-Lab', 'Microsoft', 'NTU MMLab'], 'pdf_title_img': 'assets/pdf/title_img/2607.03451.jpg', 'data': {'categories': ['#benchmark', '#training', '#agents'], 'emoji': '⚡', 'ru': {'title': 'Минимальный конвейер оптимизации навыков без лишних компонентов', 'desc': 'В работе предлагается минимальный конвейер оптимизации навыков автономных агентов, формализованный через подход Zeroth-Order оптимизации, который исключает избыточные компоненты. Метод основан на трёх ключевых принципах: исследовании траекторий через файловую систему, добыче консенсусных атрибутов и независимой валидации результатов. SkillOpt-Lite демонстрирует ускоренную сходимость и превосходит полную версию метода, позволяя меньшим моделям достигать качества больших языковых моделей. Фреймворк успешно интегрирован в production-системы и обобщается на полную оптимизацию компонентов агентов.'}, 'en': {'title': 'Streamlining Skill Optimization with Minimal Viable Pipelines', 'desc': 'This paper introduces a streamlined approach to skill optimization for autonomous agents using Zeroth-Order (ZO) optimization. It emphasizes the importance of a minimal viable pipeline that justifies each component through theoretical and empirical evidence, contrasting with the complexity of existing methods. The authors propose three key principles—trajectory exploration, consensus mining, and validation gating—to enhance convergence and generalization. Their framework, SkillOpt-Lite, demonstrates significant performance improvements in coding tasks, showcasing its effectiveness in real-world applications like VSCode Copilot.'}, 'zh': {'title': '最小化技能优化管道的创新', 'desc': '本文提出了一种最小可行的技能优化管道，采用零阶优化形式化，消除了冗余，同时通过轨迹探索、共识挖掘和验证门控原则保持收敛性和泛化能力。我们将技能优化形式化为零阶优化，映射经典方法到最新文献中。与传统的盲目数值扰动不同，技能轨迹提供了可解释的调试反馈。最终，我们的框架被集成到生产编码代理中，使开发者能够通过简单的代码行来进化代理技能。'}}}, {'id': 'https://huggingface.co/papers/2607.03530', 'title': 'MentalThink: Shaping Thoughts in Mental SVG World', 'url': 'https://huggingface.co/papers/2607.03530', 'abstract': 'Abstract MentalThink enables multimodal large language models to perform visual-symbolic reasoning by generating and interpreting SVG code as an executable intermediate representation for spatial problem-solving.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce MentalThink, a visual-symbolic reasoning paradigm that equips Multimodal LLMs (MLLMs) with an executable mechanism for "mental" visualization. The core of MentalThink is a think-with-SVG pipeline, where the model learns to generate, render, and interpret scalable vector graphics (SVG) code as an intermediate visual representation for multi-turn reasoning. By creating structured vector sketches, the model can externalize spatial hypotheses, inspect them through deterministic rendering, and reason within a constrained geometric space, effectively mimicking the human process of mental imagery. We instantiate this paradigm through a two-stage training framework, combining Supervised Fine-Tuning (SFT) for SVG syntactic alignment with multi-turn Reinforcement Learning (RL) to encourage iterative inspection, revision, and refinement of intermediate visual hypotheses. Extensive evaluations demonstrate that MentalThink achieves superior performance on spatial understanding and reasoning benchmarks (e.g., 55.1% on VSIBench, 76.0% on MindCube), showing that executable vector graphics provide a verifiable visual workspace for dynamic perspective taking, visual reflection, and compositional scene construction.', 'score': 8, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'aeb64df91148ee67', 'authors': ['Kangheng Lin', 'Jisheng Yin', 'Dingming Li', 'En Yu', 'Yana Wei', 'Han Zhou', 'Liang Zhao', 'Hongyu Zhou', 'Hongbo Peng', 'Jianjian Sun', 'Zheng Ge', 'Xiangyu Zhang', 'Daxin Jiang', 'Jingyu Wang'], 'affiliations': ['State Key Laboratory of Networking and Switching Technology, Beijing University of Posts and Telecommunications', 'StepFun', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.03530.jpg', 'data': {'categories': ['#benchmark', '#training', '#rl', '#reasoning', '#optimization', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Мышление через векторную графику: обучение нейросетей пространственному рассуждению', 'desc': 'MentalThink позволяет мультимодальным большим языковым моделям выполнять пространственное рассуждение путём генерации и интерпретации SVG-кода как промежуточного представления для решения задач визуализации. Модель обучается создавать векторные эскизы, которые она затем может визуализировать и анализировать, таким образом экстернализируя пространственные гипотезы и проверяя их через детерминированный рендеринг. Для обучения используется двухэтапный подход: сначала применяется supervised fine-tuning для синтаксического выравнивания SVG, затем reinforcement learning для поощрения итеративного улучшения промежуточных визуальных представлений. Экспериментальные результаты показывают, что такой подход значительно улучшает производительность на задачах пространственного понимания и рассуждения.'}, 'en': {'title': 'Empowering LLMs with Visual-Symbolic Reasoning through SVG', 'desc': "MentalThink is a new approach that helps large language models (LLMs) understand and solve spatial problems by using SVG code as a visual tool. It allows these models to create and interpret graphics, which helps them visualize their reasoning process. The method involves a two-step training process: first, aligning the model with SVG syntax, and then using reinforcement learning to improve its ability to revise and refine its visual ideas. This innovative technique has shown to significantly enhance the models' performance in tasks requiring spatial understanding and reasoning."}, 'zh': {'title': 'MentalThink：让机器具备空间推理能力的视觉-符号推理', 'desc': 'MentalThink 是一种视觉-符号推理范式，旨在使多模态大语言模型（MLLMs）能够通过生成和解释 SVG 代码来进行空间问题解决。该方法的核心是 think-with-SVG 流程，模型学习生成、渲染和解释可缩放矢量图形（SVG）代码，作为多轮推理的中间视觉表示。通过创建结构化的矢量草图，模型能够外化空间假设，并通过确定性渲染进行检查，从而在受限的几何空间内进行推理，模拟人类的心理想象过程。经过广泛评估，MentalThink 在空间理解和推理基准测试中表现优异，证明了可执行的矢量图形为动态视角转换、视觉反思和组合场景构建提供了可验证的视觉工作空间。'}}}, {'id': 'https://huggingface.co/papers/2607.02980', 'title': 'Hierarchical Sparse Attention Done Right: Toward Infinite Context Modeling', 'url': 'https://huggingface.co/papers/2607.02980', 'abstract': 'Abstract Hierarchical Landmark Sparse Attention enables efficient long-context language modeling by learning chunk selection end-to-end, achieving performance comparable to full attention while extrapolating beyond training context lengths.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling modern large language models (LLMs) to long contexts is limited by the quadratic computation cost, and poor length extrapolation of dense attention. Chunk-wise sparse attention offers a promising alternative, but all existing methods fall short of full attention because of their inaccurate chunk selection. We propose Hierarchical Landmark Sparse (HiLS) Attention, a chunk-wise sparse attention mechanism that learns chunk selection end-to-end under the language-modeling (LM) loss. HiLS factorizes attention hierarchically: each query performs attention independently with each retrieved chunk to extract chunk-specific information, and the resulting outputs are fused according to chunk retrieval scores. By incorporating retrieval scores into the forward attention computation, HiLS optimizes them directly with the LM loss, enabling end-to-end retrieval learning and native sparse training. Experimental results show that HiLS-Attention achieves performance comparable to, and in some cases better than, full attention at in-domain context lengths. Meanwhile, HiLS-Attention extrapolates more than 64times the training context length with 90% retrieval accuracy, far beyond full attention. Moreover, existing full-attention models can be converted to HiLS-Attention with lightweight continued pretraining, preserving in-domain performance while acquiring ultra-long-context extrapolation. Together with its sparse KV access and computation, HiLS-Attention breaks the usual efficiency-performance trade-off, enabling long-context LLMs that are both more efficient and more effective on general long-context tasks than their full-attention counterparts.', 'score': 8, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '2eadf86f5f5d4f1e', 'authors': ['Xiang Hu', 'Xinyu Wei', 'Hao Gu', 'Minshen Zhang', 'Tian Liang', 'Huayang Li', 'Lei Zhu', 'Yan Wang', 'Sirui Han', 'Yushi Bai', 'Kewei Tu', 'Haitao Mi', 'Leo Liang'], 'affiliations': ['ShanghaiTech University', 'Tencent HY Team', 'The Hong Kong University of Science and Technology', 'University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2607.02980.jpg', 'data': {'categories': ['#optimization', '#long_context'], 'emoji': '🎯', 'ru': {'title': 'Умное разреженное внимание для длинных контекстов без потери качества', 'desc': 'Статья предлагает Hierarchical Landmark Sparse Attention — механизм разреженного внимания, который решает проблему квадратичной сложности вычислений при обработке длинных контекстов в больших языковых моделях. Метод использует иерархическую факторизацию внимания, где каждый запрос независимо взаимодействует с извлечёнными фрагментами текста, а результаты объединяются на основе оценок релевантности. Ключевое преимущество заключается в том, что выбор фрагментов оптимизируется непосредственно через функцию потерь языкового моделирования в процессе сквозного обучения. Экспериментальные результаты показывают, что предложенный подход достигает производительности полного внимания при стандартных длинах контекста, одновременно экстраполируя до 64 раз превышающих длину обучающихся данных контекстов.'}, 'en': {'title': 'Efficient Long-Context Modeling with HiLS Attention', 'desc': 'The paper introduces Hierarchical Landmark Sparse (HiLS) Attention, a new method for improving long-context language modeling in large language models (LLMs). It addresses the inefficiencies of traditional full attention mechanisms, which struggle with high computational costs and poor extrapolation capabilities. HiLS Attention learns to select relevant chunks of data end-to-end, optimizing the selection process using language modeling loss. This approach allows for efficient processing of long contexts while maintaining or even enhancing performance compared to full attention models.'}, 'zh': {'title': '高效长上下文建模的新方法', 'desc': '层次化地标稀疏注意力（HiLS Attention）是一种高效的长上下文语言建模方法，通过端到端学习选择块来实现。它采用分层的方式对注意力进行因式分解，使每个查询独立地与每个检索到的块进行注意力计算，从而提取特定块的信息。实验结果表明，HiLS注意力在领域内的上下文长度上表现与全注意力相当，甚至在某些情况下更好。同时，HiLS注意力能够在超过训练上下文长度的情况下进行推断，且检索准确率高达90%。'}}}, {'id': 'https://huggingface.co/papers/2607.05339', 'title': 'TREK: Distill to Explore, Reinforce to Refine', 'url': 'https://huggingface.co/papers/2607.05339', 'abstract': "Abstract TREK expands exploration support for policy optimization by using distillation for exploration rather than imitation, improving performance on challenging mathematical reasoning and agentic tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Group Relative Policy Optimization (GRPO) is effective when the current policy already samples useful reasoning trajectories, but it stalls on hard prompts whose correct solution modes lie outside the student's on-policy support. We propose TREK (Teacher-Routed Exploration via Forward KL), a simple staged procedure that uses distillation not for imitation but for exploration support expansion. A key advantage of TREK is its generality: because it only consumes verified output trajectories, it can use an external black-box teacher, a white-box teacher, or the same model given additional inference-time context, and it can efficiently identify which hard-prompt samples are most worth consolidating even when teacher internals are unavailable. TREK first identifies prompts where the unaided student has very low pass rate, queries a proposal source to produce verified candidate solutions, keeps the top-r proposals ranked by current student likelihood, applies a short forward-KL phase to pull those verified modes into the student's support, and then returns to standard on-policy GRPO refinement. On mathematical reasoning, TREK with DeepSeek-V4 proposals improves Qwen3 models across all tested scales on AIME 2024 and AIME 2025; for Qwen3-8B, it improves AIME 2025 from 36.9 to 40.3 and AIME 2024 from 47.9 to 51.1 (avg@16), while the self-context variant reaches 38.5 and 49.6 without an external teacher. On agentic tasks, TREK raises ALFWorld success rate from 75.8 to 82.8 and ScienceWorld success rate from 12.5 to 26.7; notably, on the hardest task types, TREK achieves high success rates early in training while unaided GRPO requires substantially more optimization steps to reach comparable levels.", 'score': 6, 'issue_id': 2593, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '7a487126ed77fe5b', 'authors': ['Yuanda Xu', 'Zhengze Zhou', 'Kayhan Behdin', 'Jelena Markovic-Voronov', 'Hejian Sang', 'Xiaomin Li', 'Wenhui Zhu', 'Xinchen Du', 'Aida Rahmattalabi', 'Ran He', 'Sen Na', 'Zhipeng Wang', 'Alborz Geramifard'], 'affiliations': ['Georgia Institute of Technology', 'Harvard University', 'LinkedIn Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2607.05339.jpg', 'data': {'categories': ['#training', '#agents', '#rl', '#reasoning', '#math', '#optimization'], 'emoji': '🚀', 'ru': {'title': 'Расширяем горизонты исследования через дистилляцию новых решений', 'desc': 'TREK — это метод оптимизации политики, который расширяет возможности исследования пространства решений для сложных задач математического рассуждения и агентных систем. Вместо использования дистилляции для имитации учителя, метод применяет её для расширения поддержки исследования, позволяя модели выходить за пределы известных ей решений. Алгоритм работает в два этапа: сначала определяет сложные примеры, получает правильные решения от учителя и тянет эти новые решения в распределение студента через прямую KL дивергенцию, затем продолжает обучение стандартным GRPO. Эксперименты показывают значительные улучшения на олимпиадных задачах AIME и агентных задачах, особенно на наиболее сложных примерах.'}, 'en': {'title': 'TREK: Expanding Exploration for Smarter Policy Optimization', 'desc': "The paper introduces TREK, a novel approach that enhances policy optimization in machine learning by using distillation for exploration rather than imitation. This method allows models to expand their exploration capabilities, particularly in complex reasoning and agentic tasks, by leveraging verified output trajectories from various types of teachers. TREK identifies challenging prompts where the model struggles and generates candidate solutions to improve performance, effectively integrating these solutions into the model's learning process. The results show significant improvements in success rates across different tasks, demonstrating TREK's effectiveness in optimizing learning strategies."}, 'zh': {'title': 'TREK：通过蒸馏扩展探索支持的策略优化', 'desc': 'TREK是一种通过蒸馏来扩展探索支持的策略优化方法，而不是模仿。它在数学推理和代理任务中表现出色，尤其是在面对困难提示时。TREK的关键优势在于其通用性，可以使用外部教师或同一模型的额外上下文来识别最有价值的样本。通过这种方法，TREK显著提高了模型在各种任务上的成功率，尤其是在早期训练阶段。'}}}, {'id': 'https://huggingface.co/papers/2607.05722', 'title': 'Nemotron-Labs-Diffusion: A Tri-Mode Language Model Unifying Autoregressive, Diffusion, and Self-Speculation Decoding', 'url': 'https://huggingface.co/papers/2607.05722', 'abstract': "Abstract Nemotron-Labs-Diffusion is a tri-mode language model that combines autoregressive, diffusion, and self-speculation decoding to achieve superior throughput and efficiency compared to existing models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Nemotron-Labs-Diffusion, a tri-mode language model (LM) that unifies AR, diffusion, and self-speculation decoding within a single architecture. Trained with a joint AR-diffusion objective, Nemotron-Labs-Diffusion can switch modes to sustain high throughput across deployment settings and concurrency levels. Our study shows that (1) AR and diffusion objectives are complementary: diffusion improves lookahead planning, while AR provides left-to-right linguistic priors. (2) In self-speculation mode, diffusion drafts while AR verifies, outperforming multi-token prediction (MTP) methods in both acceptance rate and real-device efficiency. (3) A speed-of-light analysis further demonstrates diffusion's long-term potential, with up to 76.5% more tokens per forward pass than self-speculation under an optimal sampler. Scaling to 3B, 8B, and 14B parameters, our Nemotron-Labs-Diffusion family, including base, instruct, and vision-language models, consistently outperforms state-of-the-art open-source AR and diffusion LMs in both accuracy and speed. For example, Nemotron-Labs-Diffusion-8B decodes 6x more tokens per forward than Qwen3-8B with comparable accuracy, translating to 4x higher throughput on SPEED-Bench with SGLang on a GB200 GPU.", 'score': 3, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'cfd2e3872e4930c1', 'authors': ['Yonggan Fu', 'Lexington Whalen', 'Abhinav Garg', 'Chengyue Wu', 'Maksim Khadkevich', 'Nicolai Oswald', 'Enze Xie', 'Daniel Egert', 'Sharath Turuvekere Sreenivas', 'Shizhe Diao', 'Chenhan Yu', 'Ye Yu', 'Weijia Chen', 'Sajad Norouzi', 'Jingyu Liu', 'Shiyi Lan', 'Ligeng Zhu', 'Jin Wang', 'Jindong Jiang', 'Morteza Mardani', 'Mehran Maghoumi', 'Song Han', 'Ante Jukić', 'Nima Tajbakhsh', 'Jan Kautz', 'Pavlo Molchanov'], 'affiliations': ['Georgia Tech', 'HKU', 'MIT', 'NVIDIA', 'University of Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2607.05722.jpg', 'data': {'categories': ['#diffusion', '#open_source', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Три способа декодирования в одной модели для максимальной эффективности', 'desc': 'Nemotron-Labs-Diffusion — это триплексная языковая модель, которая объединяет автерегрессивное декодирование, диффузионное декодирование и самоспекулятивное декодирование в единой архитектуре. Модель обучается с совместной целевой функцией, позволяющей ей переключаться между режимами для достижения высокой пропускной способности при различных сценариях развёртывания. Авторы демонстрируют, что диффузионный и автерегрессивный подходы дополняют друг друга: диффузия улучшает планирование будущих токенов, а автерегрессия обеспечивает лингвистические приоры. В режиме самоспекуляции диффузионный декодер генерирует кандидатов, а автерегрессивный их проверяет, что превосходит методы многотокенного предсказания по скорости и эффективности на реальных устройствах.'}, 'en': {'title': 'Revolutionizing Language Modeling with Tri-Mode Efficiency', 'desc': 'Nemotron-Labs-Diffusion is a novel tri-mode language model that integrates autoregressive (AR), diffusion, and self-speculation decoding techniques to enhance performance and efficiency. By training with a joint AR-diffusion objective, it can seamlessly switch between modes, optimizing throughput for various deployment scenarios. The model demonstrates that diffusion enhances planning capabilities while AR maintains linguistic coherence, and in self-speculation mode, it effectively combines both methods for improved prediction accuracy. With scalable architectures ranging from 3B to 14B parameters, Nemotron-Labs-Diffusion consistently surpasses existing state-of-the-art models in both speed and accuracy, achieving significant improvements in token generation rates.'}, 'zh': {'title': '三模式语言模型，效率与吞吐量的突破', 'desc': 'Nemotron-Labs-Diffusion是一种三模式语言模型，结合了自回归、扩散和自我推测解码，能够在效率和吞吐量上超越现有模型。该模型通过联合自回归和扩散目标进行训练，可以在不同的部署环境和并发水平下切换模式，以保持高吞吐量。研究表明，自回归和扩散目标是互补的，扩散有助于前瞻性规划，而自回归提供了从左到右的语言先验。在自我推测模式下，扩散进行草拟，而自回归进行验证，表现优于多标记预测方法。'}}}, {'id': 'https://huggingface.co/papers/2607.05147', 'title': 'DSpark: Confidence-Scheduled Speculative Decoding with Semi-Autoregressive Generation', 'url': 'https://huggingface.co/papers/2607.05147', 'abstract': 'Abstract DSpark enhances LLM inference speed by combining parallel draft generation with adaptive verification that reduces waste and improves throughput in high-concurrency settings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speculative decoding accelerates Large Language Model (LLM) inference by decoupling draft generation from target verification. While recent parallel drafters efficiently propose long token sequences in a single forward pass, they suffer from rapid acceptance decay due to a lack of inter-token dependencies. Furthermore, indiscriminately verifying these extended blocks wastes critical batch capacity on tokens with high rejection risks, severely degrading throughput in high-concurrency serving systems. We introduce DSpark, a speculative decoding framework that unifies high-throughput parallel generation with adaptive, load-aware verification. To maintain draft quality, DSpark utilizes a semi-autoregressive architecture, coupling a parallel backbone with a lightweight sequential module, to introduce intra-block dependency modeling and mitigate suffix decay. To optimize system efficiency, DSpark employs confidence-scheduled verification, dynamically tailoring the verification length for each request based on estimated prefix survival probabilities and engine-specific throughput profiles. On offline benchmarks across diverse domains, DSpark substantially improves the accepted length over state-of-the-art autoregressive and parallel drafters. When deployed within the DeepSeek-V4 serving system under live user traffic, DSpark successfully mitigates verification waste. Compared to the established production baseline (MTP-1), DSpark accelerates per-user generation speeds by 60 to 85 percent at matched throughput levels. More importantly, by preventing severe throughput degradation under strict interactivity constraints, it enables performance tiers that were previously unattainable, shifting the Pareto frontier of our serving system.', 'score': 3, 'issue_id': 2593, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '0c2cfd37058e5091', 'authors': ['Xin Cheng', 'Xingkai Yu', 'Chenze Shao', 'Jiashi Li', 'Yunfan Xiong', 'Yi Qian', 'Jiaqi Zhu', 'Shirong Ma', 'Xiaokang Zhang', 'Jiasheng Ye', 'Qinyu Chen', 'Chengqi Deng', 'Jiping Yu', 'Damai Dai', 'Zhengyan Zhang', 'Yixuan Wei', 'Yixuan Tan', 'Wenkai Yang', 'Runxin Xu', 'Yu Wu', 'Zhean Xu', 'Xuanyu Wang', 'Muyang Chen', 'Rui Tian', 'Xiao Bi', 'Zhewen Hao', 'Shaoyuan Chen', 'Huanqi Cao', 'Wentao Zhang', 'Anyi Xu', 'Huishuai Zhang', 'Dongyan Zhao', 'Wenfeng Liang'], 'affiliations': ['DeepSeek-AI', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2607.05147.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умная верификация для быстрого декодирования языковых моделей', 'desc': 'DSpark — это фреймворк спекулятивного декодирования, который ускоряет инференс больших языковых моделей, комбинируя параллельную генерацию черновиков с адаптивной верификацией. Для сохранения качества черновиков используется полуавторегрессивная архитектура, которая связывает параллельный магистральный модуль с лёгким последовательным модулем для моделирования внутри-блочных зависимостей между токенами. Система применяет верификацию, ориентированную на уверенность, динамически адаптируя длину проверки для каждого запроса на основе оценённых вероятностей выживания префиксов и профилей пропускной способности системы. При развёртывании в production на живом трафике DSpark достигает ускорения скорости генерации на 60-85% и предотвращает деградацию пропускной способности под строгими ограничениями интерактивности.'}, 'en': {'title': 'Accelerating LLM Inference with DSpark: Speed Meets Efficiency', 'desc': 'DSpark is a framework designed to enhance the speed of Large Language Model (LLM) inference by integrating parallel draft generation with adaptive verification methods. It addresses the issue of rapid acceptance decay in generated token sequences by introducing intra-block dependency modeling, which helps maintain draft quality. By employing confidence-scheduled verification, DSpark optimizes the verification process based on the likelihood of token acceptance, thus improving system efficiency. As a result, DSpark significantly boosts generation speeds while maintaining high throughput, making it suitable for high-concurrency environments.'}, 'zh': {'title': 'DSpark：提升LLM推理速度的创新框架', 'desc': 'DSpark是一种提高大型语言模型（LLM）推理速度的框架，它通过结合并行草稿生成和自适应验证来减少资源浪费并提高吞吐量。该方法利用半自回归架构，增强了草稿生成的质量，并引入了块内依赖建模，以减轻后缀衰减的问题。DSpark还采用了信心调度验证，根据请求的前缀生存概率动态调整验证长度，从而优化系统效率。通过在多种领域的离线基准测试中，DSpark显著提高了接受的长度，并在实际用户流量下加速了每用户的生成速度。'}}}, {'id': 'https://huggingface.co/papers/2607.06558', 'title': 'RynnWorld-Teleop: An Action-Conditioned World Model for Digital Teleoperation', 'url': 'https://huggingface.co/papers/2607.06558', 'abstract': "Abstract Digital teleoperation replaces physical robot interaction with generative world models to create diverse training data for robotics, enabling efficient zero-shot Sim2Real transfer and improved real-world performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling robot learning requires massive, diverse trajectory data, yet collection is currently bottlenecked by physical teleoperation, where every demonstration binds operator time to specific hardware and workspaces. We introduce digital teleoperation, a paradigm that decouples data collection from physical constraints by replacing the real robot with a generative world model. In this framework, an operator's hand-pose stream drives a robot-centric generative world model to synthesize high-fidelity egocentric videos from a single reference image. The recorded pose stream serves as an embodiment-agnostic action label transferable to any target robot via standard retargeting, yielding complete state-action trajectories for imitation learning independent of physical hardware. We instantiate this paradigm in RynnWorld-Teleop, a system that integrates depth-aware skeletal conditioning, progressive human-to-robot training on a video Diffusion Transformer, and streaming autoregressive distillation. This pipeline compresses the generative process into a single-pass inference, enabling 40+ FPS, real-time interactive generation on a single H100 GPU. Policies trained exclusively on RynnWorld-Teleop-generated data achieve effective zero-shot Sim2Real transfer across dexterous and diverse bimanual tasks. Moreover, augmenting real-world datasets with our digitally teleoperated data consistently improves success rates, demonstrating that RynnWorld-Teleop serves as a high-fidelity, scalable data engine for the next generation of robotic agents.", 'score': 2, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'ffa9cb54a75c69f3', 'authors': ['Haoyu Zhao', 'Xingyue Zhao', 'Hangyu Li', 'Biao Gong', 'Kehan Li', 'Siteng Huang', 'Xin Li', 'Deli Zhao', 'Zhongyu Li'], 'affiliations': ['Alibaba Group', 'Ant Group', 'CUHK', 'DAMO Academy, Alibaba Group', 'Hong Kong Embodied AI Lab', 'Hupan Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.06558.jpg', 'data': {'categories': ['#training', '#synthetic', '#transfer_learning', '#robotics', '#inference', '#diffusion', '#video'], 'emoji': '🤖', 'ru': {'title': 'Цифровая телеоперация: генеративные модели вместо физических роботов', 'desc': 'В работе предложен метод цифровой телеоперации, который заменяет физическое взаимодействие с роботом на использование генеративной модели мира для создания разнообразных обучающих данных. Оператор управляет позой руки, которая управляет диффузионной моделью, синтезирующей видео от первого лица робота из одного опорного изображения. Поток поз преобразуется в универсальные метки действий, которые можно перенести на любого робота через стандартную переориентировку, создавая полные траектории состояние-действие для обучения имитации. Система RynnWorld-Teleop достигает реал-тайма генерации (40+ FPS) и демонстрирует эффективный нулевой обучающий перенос на реальные задачи дексприусной бимануальной манипуляции, а также улучшает качество при дополнении реальных датасетов синтетическими данными.'}, 'en': {'title': 'Revolutionizing Robot Training with Digital Teleoperation', 'desc': "This paper presents a new approach called digital teleoperation, which allows robots to learn from generated data instead of relying on physical demonstrations. By using a generative world model, the system can create realistic training scenarios based on an operator's hand movements, enabling the collection of diverse trajectory data without the constraints of physical hardware. The method allows for the transfer of learned actions to different robots, facilitating imitation learning and improving performance in real-world tasks. The proposed system, RynnWorld-Teleop, demonstrates effective zero-shot Sim2Real transfer and enhances real-world datasets, making it a powerful tool for training advanced robotic agents."}, 'zh': {'title': '数字远程操作：机器人训练的新引擎', 'desc': '数字远程操作通过生成世界模型替代物理机器人交互，为机器人训练创造多样化的数据，促进高效的零-shot Sim2Real 转移和提升现实世界表现。该方法将数据收集与物理限制解耦，利用生成模型合成高保真度的自我中心视频，从而实现独立于具体硬件的模仿学习。我们在 RynnWorld-Teleop 系统中实现了这一框架，结合深度感知骨骼条件、渐进式人机训练和流式自回归蒸馏，压缩生成过程为单次推理。通过这种方式训练的策略在多样化的双手任务中实现了有效的零-shot Sim2Real 转移，并且增强现实世界数据集的成功率，证明了 RynnWorld-Teleop 是下一代机器人代理的高保真、可扩展数据引擎。'}}}, {'id': 'https://huggingface.co/papers/2607.06559', 'title': 'RynnWorld-4D: 4D Embodied World Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2607.06559', 'abstract': 'Abstract A multi-modal 4D world model generates synchronized RGB, depth, and optical flow data from single RGB-D images and language instructions, enabling efficient robotic manipulation through unified diffusion processes and inverse dynamics policy learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Robotic manipulation in the open world requires not only recognizing what a scene looks like, but also anticipating how its 3D structure moves under interaction. We argue that synchronized RGB, depth, and optical flow, namely RGB-DF, provide a physically grounded representation that captures the underlying 4D dynamics of a scene. Compared to 2D pixel videos, this multi-modal synergy aligns visual appearance with geometric structure and temporal motion, creating a representation space significantly closer to the low-level end-effector actions demanded by robotic systems, thereby narrowing the gap between world prediction and policy learning. Building on this insight, we introduce RynnWorld-4D, a generative model that co-produces future RGB frames, depth maps, and optical flow from a single RGB-D image and a language instruction within one unified diffusion process. This 4D world model features a tri-branch architecture that integrates cross-modal attention with frame-wise 3D RoPE, ensuring that appearance, geometry, and motion evolve consistently. To supply training data at scale, we curate Rynn4DDataset 1.0, a massive dataset of over 254.4 million frames across egocentric human and robotic manipulation videos with high-quality pseudo-labels for depth and optical flow. We further propose RynnWorld-4D-Policy, an inverse dynamics head that consumes the internal 4D representations of RynnWorld-4D in a single forward pass, bypassing expensive multi-step denoising, to output robot actions in a closed-loop manner. Experiments show that RynnWorld-4D produces temporally and spatially coherent 4D predictions, and that RynnWorld-4D-Policy achieves state-of-the-art performance on real-world dexterous bimanual manipulation tasks, particularly excelling in tasks demanding spatial precision and temporal coordination.', 'score': 2, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '4641477303c0630d', 'authors': ['Haoyu Zhao', 'Xingyue Zhao', 'Siteng Huang', 'Xin Li', 'Deli Zhao', 'Zhongyu Li'], 'affiliations': ['CUHK', 'DAMO Academy, Alibaba Group', 'Hong Kong Embodied AI Lab', 'Hupan Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.06559.jpg', 'data': {'categories': ['#training', '#dataset', '#synthetic', '#robotics', '#architecture', '#diffusion', '#multimodal', '#3d', '#video'], 'emoji': '🤖', 'ru': {'title': 'Единая диффузионная модель для генерации синхронизированных RGB-D и оптического потока в робототехнике', 'desc': 'В статье представлена мультимодальная 4D модель мира RynnWorld-4D, которая генерирует синхронизированные RGB-изображения, карты глубины и оптический поток из одного RGB-D изображения и языковых инструкций с помощью единого диффузионного процесса. Авторы утверждают, что такое мультимодальное представление RGB-DF обеспечивает физически обоснованное описание 4D динамики сцены, лучше отражающее низкоуровневые действия робота, чем двумерные видеопиксели. Архитектура модели использует трёхветвевую структуру с кросс-модальным вниманием и 3D RoPE для обеспечения согласованной эволюции внешнего вида, геометрии и движения. На основе 4D представлений модели предложена RynnWorld-4D-Policy — обратная динамическая политика, которая напрямую выводит действия робота без дорогостоящего многошагового денойзинга, достигая лучших результатов на задачах точной двурукой манипуляции.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with 4D World Models', 'desc': "This paper presents a multi-modal 4D world model that generates synchronized RGB images, depth maps, and optical flow data from single RGB-D images and language instructions. The model, called RynnWorld-4D, uses a unified diffusion process to create a comprehensive representation of a scene's dynamics, which is crucial for robotic manipulation. By integrating visual appearance, geometric structure, and motion, the model enhances the alignment between world prediction and policy learning, making it more effective for robots. Additionally, the paper introduces RynnWorld-4D-Policy, which efficiently generates robot actions based on the 4D representations, achieving high performance in complex manipulation tasks."}, 'zh': {'title': '构建智能机器人操作的4D世界模型', 'desc': '这篇论文介绍了一种多模态4D世界模型，能够从单个RGB-D图像和语言指令生成同步的RGB、深度和光流数据。这种模型通过统一的扩散过程和逆动力学策略学习，提升了机器人在开放世界中的操作效率。论文强调同步的RGB、深度和光流（RGB-DF）提供了一种物理基础的表示，能够捕捉场景的4D动态特性。通过构建RynnWorld-4D模型，研究者们实现了从单一图像生成未来的RGB帧、深度图和光流，显著提高了机器人操作的精确性和协调性。'}}}, {'id': 'https://huggingface.co/papers/2606.30026', 'title': 'MuseBench: Benchmarking Intent-Level Audiovisual Arts Understanding in MLLMs', 'url': 'https://huggingface.co/papers/2606.30026', 'abstract': "Abstract A comprehensive benchmark called Musebench is introduced to evaluate multimodal large language models on nuanced artistic understanding, revealing a significant gap between current models and human expert performance in creative domain expertise.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audiovisual arts encompass diverse creative disciplines, including cinema, visual arts, stage performance, and game design, where artistic meaning arises from deliberate combinations of visual, auditory, and narrative elements (e.g., fear amplified through claustrophobic framing, or grief conveyed through silence and lingering close-ups). True artistic understanding extends beyond recognizing what is depicted to reasoning about why it is expressed through particular creative choices. Despite the strong progress of multimodal large language models (MLLMs), this critical aspect of artistic understanding remains underexplored, as existing benchmarks largely measure perceptual recognition while overlooking reasoning about creative intent. To address this gap, we introduce Musebench, a comprehensive benchmark designed to evaluate MLLMs on nuanced artistic understanding. It comprises 4,016 questions spanning cinematic arts, static visual arts, stage performing arts, and game arts, distilled from over 10K candidate video essays that pair professional commentary with visual demonstration. To capture the open-ended nature of artistic analysis at scale, the benchmark combines single-select and variable-option multi-select questions. All questions are generated and refined through a four-phase iterative pipeline combining shortcut filtering, adversarial distractors, and expert validation. Comprehensive zero-shot evaluation of 28 state-of-the-art MLLMs reveals that even the best-performing model achieves only 48.29% accuracy, substantially below human expert performance of 87.18%, exposing a significant gap in current models' creative domain expertise.", 'score': 2, 'issue_id': 2593, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '41e563783fac0e27', 'authors': ['Yuxuan Fan', 'Gyusik Seo', 'Jing Hao', 'Jaemin Cho', 'Mohit Bansal', 'Jaehong Yoon'], 'affiliations': ['AI2', 'Johns Hopkins University', 'NTU Singapore', 'The University of Hong Kong', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2606.30026.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#survey', '#games', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Искусство понимать искусство: оценка творческой компетентности нейросетей', 'desc': 'В работе представлен Musebench — комплексный бенчмарк для оценки мультимодальных больших языковых моделей (MLLM) на способность глубокого понимания искусства в различных творческих дисциплинах, включая кинематографию, визуальные искусства, сценическое исполнение и дизайн видеоигр. Набор данных содержит 4016 вопросов, созданных на основе профессиональных видеоэссе, которые соединяют экспертные комментарии с визуальной демонстрацией творческих приёмов. Оценка 28 современных моделей MLLM показала, что лучшие из них достигают только 48.29% точности в понимании нюансов художественного выражения, что значительно отстаёт от эксперт-человека с результатом 87.18%. Исследование выявляет критический разрыв между текущими возможностями мультимодальных моделей и требуемым уровнем творческого понимания в анализе художественных произведений.'}, 'en': {'title': 'Bridging the Gap in Artistic Understanding for AI', 'desc': 'The paper introduces Musebench, a new benchmark for assessing multimodal large language models (MLLMs) in their understanding of artistic concepts across various creative fields. It highlights the inadequacy of current models in grasping the reasoning behind artistic choices, as they primarily focus on perceptual recognition rather than deeper creative intent. Musebench consists of 4,016 questions derived from professional commentary and visual examples, designed to evaluate nuanced artistic understanding. The findings reveal that even the top-performing MLLM only achieves 48.29% accuracy, indicating a significant gap compared to human experts who score 87.18%.'}, 'zh': {'title': '评估艺术理解的全新基准：Musebench', 'desc': '本文介绍了一个名为Musebench的综合基准，用于评估多模态大型语言模型在艺术理解方面的能力。研究发现，目前的模型在创意领域的表现与人类专家之间存在显著差距。Musebench包含4016个问题，涵盖电影艺术、静态视觉艺术、舞台表演艺术和游戏艺术，旨在评估模型对艺术创作意图的推理能力。尽管多模态大型语言模型取得了显著进展，但在艺术理解的关键方面仍然未得到充分探索。'}}}, {'id': 'https://huggingface.co/papers/2607.05803', 'title': 'Quantifying and Expanding the Theoretical Capacity of Late-Interaction Retrieval Models', 'url': 'https://huggingface.co/papers/2607.05803', 'abstract': 'Abstract MaxSim similarity can exactly replicate inner products between sparse vectors and supports logical operations, with Signed MaxSim extending this capability to real-valued vectors while improving retrieval performance on complex query types.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Late-interaction retrieval models that use the MaxSim similarity function have shown strong empirical performance, often outperforming single-vector dense and sparse retrieval models. Despite these empirical findings, little is known about the theoretical representation power of MaxSim and how it compares to other retrieval approaches. This paper shows by construction that MaxSim similarity can exactly replicate the inner product between any two non-negative k-sparse vectors with possibly infinite dimension, requiring only O(k) representation space. Moreover, there exist similarities that MaxSim can express while standard vector inner products with the same representation space cannot. Leveraging our theoretical framework, we introduce Signed MaxSim which allows late-interaction models to exactly replicate any real-valued inner product, something we prove standard MaxSim is not capable of. We also show that MaxSim can act as an aggregation of soft-OR operations and as an evaluator of logical expressions in positive Conjunctive Normal Form. Our findings show that MaxSim is at least as capable as standard vector inner products for any non-negative vectors and our extension, Signed MaxSim, is as capable for any vectors. Both similarities possess additional capabilities that inner product cannot replicate, marking one of the first theoretical justifications and quantifications of late-interaction methods. Our theoretical findings are supported empirically: on a retrieval task featuring queries with negations, Signed MaxSim improves out-of-domain performance significantly over a standard ColBERT/MaxSim baseline with nDCG@10 increasing from 0.597 to 1.000 under a vocabulary shift and from 0.008 to 0.788 on negation-only queries.', 'score': 1, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '657156556108130f', 'authors': ['Julian Killingback', 'Varad Ingale', 'Hamed Zamani', 'Cameron Musco'], 'affiliations': ['Center for Intelligent Information Retrieval, University of Massachusetts Amherst', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2607.05803.jpg', 'data': {'categories': ['#architecture', '#math', '#rag'], 'emoji': '🎯', 'ru': {'title': 'MaxSim: от эмпирики к теории позднего взаимодействия в информационном поиске', 'desc': 'Работа исследует теоретические свойства функции сходства MaxSim, используемой в моделях поздневзаимодействия для поиска информации. Авторы доказывают, что MaxSim может точно воспроизводить скалярное произведение между разреженными неотрицательными векторами с требованием лишь O(k) пространства представления. Они предлагают расширение Signed MaxSim, которое работает с вещественными векторами и демонстрирует способность моделировать логические операции, включая операции отрицания. Экспериментальные результаты показывают значительное улучшение производительности поиска при работе со сложными запросами, содержащими логические операции.'}, 'en': {'title': 'MaxSim: Revolutionizing Sparse Vector Retrieval with Logical Operations', 'desc': 'This paper introduces MaxSim similarity, a method that can replicate inner products between sparse vectors and perform logical operations. It extends this concept with Signed MaxSim, which enhances retrieval performance for complex queries involving real-valued vectors. The authors demonstrate that MaxSim can represent any non-negative k-sparse vector with only O(k) space, and it can express similarities that standard inner products cannot. Empirical results show that Signed MaxSim significantly outperforms traditional models in retrieval tasks, especially with queries that include negations.'}, 'zh': {'title': 'MaxSim：超越传统内积的相似度计算', 'desc': 'MaxSim相似度可以精确复制稀疏向量之间的内积，并支持逻辑运算。扩展的Signed MaxSim进一步提升了对实值向量的检索性能，尤其是在复杂查询类型上。本文构建了MaxSim的理论框架，证明其在表示能力上优于标准向量内积，并引入了Signed MaxSim以实现对任意实值内积的精确复制。我们的实证结果显示，Signed MaxSim在处理带有否定的查询时，显著提高了检索性能，验证了其理论优势。'}}}, {'id': 'https://huggingface.co/papers/2607.06442', 'title': 'SIEVE: Structure-Aware Data Selection for Imitation Learning with VLA Models', 'url': 'https://huggingface.co/papers/2607.06442', 'abstract': 'Abstract SIEVE is a structure-aware data selection method for vision-language-action imitation learning that identifies reusable visuo-motor primitives and transition interfaces to improve policy learning efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models are typically trained by imitation learning on large-scale robot demonstration datasets, but more data does not necessarily yield better policies due to redundancy, noise, and uneven coverage. Existing data selection methods often assess demonstrations at either the trajectory or state-action level, missing the reusable structures that compose long-horizon behaviors. In this paper, we propose SIEVE, a structure-aware data selection method for VLA imitation learning. SIEVE views demonstrations as compositions of reusable primitives and transition interfaces. It first discovers visuo-motor primitives from segmented trajectories, then allocates selection budgets to composition patterns by maximizing reuse-aware structural exposure under diminishing returns. Finally, it selects medoid trajectories within each composition-pattern bucket to retain central, stable, and imitation-friendly demonstrations. Experiments across multiple datasets, benchmarks, and VLA models show that SIEVE consistently outperforms competitive data selection baselines. Notably, SIEVE can surpass full-data training while using only 50% of demonstrations and 50% of training steps, suggesting that reusable structure, captured through primitives and transitions, is an important signal for efficient VLA imitation learning.', 'score': 1, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'd2f8d46b57b1682e', 'authors': ['Changti Wu', 'Bin Yu', 'Zhaolong Shen', 'Shijie Lian', 'Xiaopeng Lin', 'Cong Huang', 'Zhirui Zhang', 'Lei Zhang', 'Kai Chen'], 'affiliations': ['Beihang University', 'DeepCybo', 'East China Normal University', 'Harbin Institute of Technology', 'Huazhong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Zhongguancun Academy', 'Zhongguancun Institute of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2607.06442.jpg', 'data': {'categories': ['#training', '#robotics', '#data', '#optimization', '#multimodal'], 'emoji': '🧩', 'ru': {'title': 'Структурированный отбор данных через примитивы для эффективного обучения робототехнических моделей', 'desc': 'SIEVE — это метод структурно-осознанного отбора данных для обучения с подражанием в vision-language-action моделях, который выявляет переиспользуемые визуомоторные примитивы и интерфейсы переходов. Вместо простого анализа на уровне траекторий или пар состояние-действие, метод разлагает демонстрации на компоненты и определяет, какие из них наиболее полезны для обучения политики. SIEVE алгоритмически максимизирует структурное разнообразие выборки под контролем бюджета и выбирает репрезентативные траектории внутри каждой группы композиционных паттернов. Экспериментальные результаты показывают, что метод позволяет достичь качества полного датасета, используя лишь 50% демонстраций и 50% вычислительных шагов обучения.'}, 'en': {'title': 'Unlocking Efficiency in Imitation Learning with SIEVE', 'desc': 'The paper introduces SIEVE, a method designed to enhance the efficiency of policy learning in vision-language-action (VLA) imitation learning by focusing on reusable visuo-motor primitives and transition interfaces. Traditional data selection methods often overlook the underlying structures that form complex behaviors, leading to inefficiencies when training models on large datasets. SIEVE addresses this by identifying these reusable components from segmented trajectories and optimizing the selection of demonstrations based on their structural relevance. Experimental results demonstrate that SIEVE can achieve better performance than existing methods, even with reduced data, highlighting the importance of structured data in improving learning outcomes.'}, 'zh': {'title': 'SIEVE：高效模仿学习的结构感知数据选择', 'desc': 'SIEVE是一种结构感知的数据选择方法，旨在提高视觉-语言-动作模仿学习的策略学习效率。它通过识别可重用的视觉-运动原语和过渡接口，优化了数据选择过程。与传统方法不同，SIEVE关注于长时间行为的可重用结构，而不仅仅是轨迹或状态-动作层面。实验表明，SIEVE在多个数据集和基准测试中表现优于其他数据选择方法，显示出重用结构在高效模仿学习中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2607.03819', 'title': 'CGGS: Consistency-Augmented Geometric Gaussian Splatting for Ego-centric 3D Scene Generation', 'url': 'https://huggingface.co/papers/2607.03819', 'abstract': 'Abstract CGGS is a text-to-3D framework that enhances 3D-content-awareness and addresses geometric distortions through a multi-stage approach involving ego-centric generation, layout decoration, and geometric refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Challenges remain in ego-centric 3D scene generation due to limited view overlap and the dominant influence of individual perspectives on scene interpretation. These factors hinder the creation of viewpoint-consistent and semantically aligned visual content, as well as the construction of accurate geometric structures. In this paper, we propose CGGS, a text-to-3D framework aiming to enhance 3D-content-awareness and address geometric distortions in ego-centric scene generation. Firstly, the Ego-centric Generator is proposed by fine-tuning a Multi-View Latent Diffusion Model with consistency-augmented loss to generate consistent, high-fidelity 2D content aligned with textual descriptions. Then, Layout Decorator leverages optical flow and point-track correspondence to estimate depth, therefore producing dense point clouds as coarse layouts from the ego-centric 2D priors. Building on this initialization, Geometric Refiner is proposed to enhance 3D Gaussian reconstruction via an entropy-based Mutual Information Depth Loss (MID) combined with a hierarchical optimization scheme for improving visual quality and geometric structure. Comprehensive experiments demonstrate that softred{CGGS} outperforms previous methods in generating coherent and accurate text-driven 3D scenes. Project page: https://cggs-26.github.io/cggs26/.', 'score': 1, 'issue_id': 2593, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '72482c0a734b2e0d', 'authors': ['Zhenyu Sun', 'Xiaohan Zhang', 'Qi Liu', 'Huan Wang'], 'affiliations': ['School of Engineering, Westlake University', 'School of Future Technology, South China University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.03819.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'От слов к трёхмерным мирам: согласованная генерация эгоцентричных сцен', 'desc': 'CGGS — это фреймворк для генерации 3D-сцен из текстового описания, который решает проблему согласованности видов при эгоцентричном формировании контента. Подход использует трёхэтапную стратегию: сначала специализированная диффузионная модель генерирует согласованные 2D-изображения с loss-функцией для улучшения консистентности, затем на основе оптического потока и трекинга точек восстанавливается глубина и строится облако точек, наконец, гауссова реконструкция улучшается через энтропийную loss-функцию взаимной информации с иерархической оптимизацией. Экспериментальные результаты показывают, что метод превосходит существующие подходы в создании согласованных и геометрически точных 3D-сцен из текста.'}, 'en': {'title': 'Transforming Text into Accurate 3D Scenes with CGGS', 'desc': 'The CGGS framework is designed to improve the generation of 3D scenes from text descriptions by addressing challenges in ego-centric perspectives. It utilizes a multi-stage approach that includes generating high-quality 2D content, estimating depth for layout creation, and refining geometric structures. The framework employs advanced techniques like a Multi-View Latent Diffusion Model and an entropy-based Mutual Information Depth Loss to enhance the accuracy and coherence of the generated 3D content. Experimental results show that CGGS significantly outperforms existing methods in producing semantically aligned and visually consistent 3D scenes.'}, 'zh': {'title': 'CGGS：提升3D内容意识的文本到3D框架', 'desc': 'CGGS是一个文本到3D的框架，旨在增强3D内容意识并解决自我中心场景生成中的几何失真问题。该框架通过多阶段的方法，包括自我中心生成、布局装饰和几何精炼，来实现这一目标。首先，使用增强一致性的损失对多视角潜在扩散模型进行微调，以生成与文本描述一致的高保真2D内容。然后，通过光流和点轨迹对应估计深度，生成稠密点云作为粗略布局，最后通过基于熵的互信息深度损失和分层优化方案来提升3D重建的视觉质量和几何结构。'}}}, {'id': 'https://huggingface.co/papers/2607.02920', 'title': 'Layer-wise Cross-Lingual Depression Detection from Speech: Analysis with Contrastive Alignment', 'url': 'https://huggingface.co/papers/2607.02920', 'abstract': 'Abstract A supervised contrastive alignment framework maps WavLM embeddings from English and Mandarin into a shared clinical space for depression detection, addressing cross-lingual generalization challenges and revealing performance artifacts caused by speaker identity leakage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Significant disparities exist in the diagnosis and clinical presentation of depression across different linguistic populations. Speech-based depression detection performs well monolingually, but cross-lingual generalization remains an open challenge. A key reason is that prior work uses segment-level random splits without speaker grouping, leading to identity leakage that inflates reported metrics. We propose CLeaD, a supervised contrastive alignment framework that maps WavLM embeddings from English and Mandarin into a shared clinical space, without parallel data or target-language fine-tuning. Evaluating 52 Mandarin speakers, contrastive alignment modestly outperforms the baseline (
