        const articlesData = [{'id': 'https://huggingface.co/papers/2603.15594', 'title': 'OpenSeeker: Democratizing Frontier Search Agents by Fully Open-Sourcing Training Data', 'url': 'https://huggingface.co/papers/2603.15594', 'abstract': 'Abstract  Deep search capabilities have become an indispensable competency for frontier Large Language Model (LLM) agents, yet the development of high-performance search agents remains dominated by industrial giants due to a lack of transparent, high-quality training data. This persistent data scarcity has fundamentally hindered the progress of the broader research community in developing and innovating within this domain. To bridge this gap, we introduce OpenSeeker, the first fully open-source search agent (i.e., model and data) that achieves frontier-level performance through two core technical innovations: (1) Fact-grounded scalable controllable QA synthesis, which reverse-engineers the web graph via topological expansion and entity obfuscation to generate complex, multi-hop reasoning tasks with controllable coverage and complexity. (2) Denoised trajectory synthesis, which employs a retrospective summarization mechanism to denoise the trajectory, therefore promoting the teacher LLMs to generate high-quality actions. Experimental results demonstrate that OpenSeeker, trained (a single training run) on only 11.7k synthesized samples, achieves state-of-the-art performance across multiple benchmarks including BrowseComp, BrowseComp-ZH, xbench-DeepSearch, and WideSearch. Notably, trained with simple SFT, OpenSeeker significantly outperforms the second-best fully open-source agent DeepDive (e.g., 29.5% v.s. 15.3% on BrowseComp), and even surpasses industrial competitors such as Tongyi DeepResearch (trained via extensive continual pre-training, SFT, and RL) on BrowseComp-ZH (48.4% v.s. 46.7%). We fully open-source the complete training dataset and the model weights to democratize frontier search agent research and foster a more transparent, collaborative ecosystem.', 'score': 79, 'issue_id': 1521, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '46dcf51a769b2ee6', 'authors': ['Yuwen Du', 'Rui Ye', 'Shuo Tang', 'Xinyu Zhu', 'Yijun Lu', 'Yuzhu Cai', 'Siheng Chen'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15594.jpg', 'data': {'categories': ['#multilingual', '#benchmark', '#training', '#agents', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Открытый поисковый агент через синтез данных и очистку траекторий', 'desc': 'В работе представлен OpenSeeker — первый полностью открытый поисковый агент на основе LLM, достигающий лучших результатов благодаря двум инновационным методам. Первый метод — это контролируемый синтез вопросо-ответных пар, который обращает веб-граф и генерирует сложные многошаговые задачи рассуждения. Второй метод — синтез очищенных траекторий, использующий ретроспективное суммирование для улучшения качества действий, генерируемых учительскими LLM моделями. Модель, обученная на всего 11,7k синтезированных примерах с помощью SFT, достигает состояния art результатов на нескольких бенчмарках и превосходит промышленные системы, полностью открывая набор данных и веса модели для сообщества.'}, 'en': {'title': 'OpenSeeker: Democratizing High-Performance Search Agents', 'desc': 'This paper presents OpenSeeker, an open-source search agent designed to enhance the capabilities of Large Language Models (LLMs) in search tasks. It addresses the challenge of limited high-quality training data by introducing two key innovations: scalable controllable question-answer synthesis and denoised trajectory synthesis. These techniques allow OpenSeeker to generate complex reasoning tasks and improve the quality of actions produced by LLMs. Experimental results show that OpenSeeker achieves state-of-the-art performance on various benchmarks, outperforming both other open-source agents and some industrial models, while promoting transparency in research.'}, 'zh': {'title': '开放搜索代理，推动研究民主化', 'desc': '本文介绍了OpenSeeker，这是第一个完全开源的搜索代理，旨在解决高性能搜索代理开发中的数据稀缺问题。OpenSeeker通过两个核心技术创新实现了前沿性能：一是基于事实的可扩展可控问答合成，二是去噪轨迹合成。实验结果表明，OpenSeeker在多个基准测试中表现优异，甚至超越了许多工业竞争者。通过开放训练数据集和模型权重，本文希望推动搜索代理研究的民主化和透明化。'}}}, {'id': 'https://huggingface.co/papers/2603.15583', 'title': 'Grounding World Simulation Models in a Real-World Metropolis', 'url': 'https://huggingface.co/papers/2603.15583', 'abstract': 'Abstract  What if a world simulation model could render not an imagined environment but a city that actually exists? Prior generative world models synthesize visually plausible yet artificial environments by imagining all content. We present Seoul World Model (SWM), a city-scale world model grounded in the real city of Seoul. SWM anchors autoregressive video generation through retrieval-augmented conditioning on nearby street-view images. However, this design introduces several challenges, including temporal misalignment between retrieved references and the dynamic target scene, limited trajectory diversity and data sparsity from vehicle-mounted captures at sparse intervals. We address these challenges through cross-temporal pairing, a large-scale synthetic dataset enabling diverse camera trajectories, and a view interpolation pipeline that synthesizes coherent training videos from sparse street-view images. We further introduce a Virtual Lookahead Sink to stabilize long-horizon generation by continuously re-grounding each chunk to a retrieved image at a future location. We evaluate SWM against recent video world models across three cities: Seoul, Busan, and Ann Arbor. SWM outperforms existing methods in generating spatially faithful, temporally consistent, long-horizon videos grounded in actual urban environments over trajectories reaching hundreds of meters, while supporting diverse camera movements and text-prompted scenario variations.', 'score': 64, 'issue_id': 1520, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '83b9767a04e8e83a', 'authors': ['Junyoung Seo', 'Hyunwook Choi', 'Minkyung Kwon', 'Jinhyeok Choi', 'Siyoon Jin', 'Gayoung Lee', 'Junho Kim', 'JoungBin Lee', 'Geonmo Gu', 'Dongyoon Han', 'Sangdoo Yun', 'Seungryong Kim', 'Jin-Hwa Kim'], 'affiliations': ['KAIST AI', 'NAVER AI Lab', 'SNU AIIS'], 'pdf_title_img': 'assets/pdf/title_img/2603.15583.jpg', 'data': {'categories': ['#video', '#rag', '#dataset', '#multimodal'], 'emoji': '🌆', 'ru': {'title': 'Генеративная модель мира реального города через условную видео-генерацию', 'desc': 'Авторы представляют Seoul World Model (SWM) — генеративную модель, которая синтезирует видео реальных городских сцен вместо вымышленных окружений. Модель использует авторегрессивную генерацию видео с условием на основе поиска похожих изображений улиц (retrieval-augmented conditioning) и решает проблемы временного смещения, недостатка разнообразия траекторий и разреженности данных через cross-temporal pairing и синтетические датасеты. Метод включает Virtual Lookahead Sink для стабилизации долгоhorizon генерации и pipeline интерполяции представлений для создания согласованных тренировочных видео. Экспериментальная оценка на трех городах показывает, что SWM превосходит существующие видео-модели в генерации пространственно верных и временно согласованных видеопоследовательностей длиной в сотни метров с поддержкой различных движений камеры и текстовых условий.'}, 'en': {'title': 'Realistic City Simulations with Seoul World Model', 'desc': 'The Seoul World Model (SWM) is a novel city-scale generative model that creates realistic video simulations of the actual city of Seoul. It utilizes autoregressive video generation techniques, enhanced by retrieving nearby street-view images to ground its outputs in real-world data. The model addresses challenges such as temporal misalignment and data sparsity by employing cross-temporal pairing and a synthetic dataset that allows for diverse camera trajectories. Additionally, it introduces a Virtual Lookahead Sink to ensure stability in long-horizon video generation, resulting in high-quality, consistent, and contextually relevant urban simulations.'}, 'zh': {'title': '真实城市的动态视频生成模型', 'desc': '本文介绍了一种名为首尔世界模型（SWM）的城市规模世界模型，它基于真实的首尔市进行构建。SWM通过检索附近的街景图像来增强自回归视频生成，但这也带来了时间对齐、轨迹多样性和数据稀疏性等挑战。为了解决这些问题，研究者们采用了跨时间配对、大规模合成数据集和视图插值管道，以生成连贯的训练视频。SWM在生成空间真实、时间一致的长时间视频方面表现优于现有方法，支持多样的相机运动和文本提示场景变化。'}}}, {'id': 'https://huggingface.co/papers/2603.14473', 'title': 'AI Can Learn Scientific Taste', 'url': 'https://huggingface.co/papers/2603.14473', 'abstract': "Abstract  Great scientists have strong judgement and foresight, closely tied to what we call scientific taste. Here, we use the term to refer to the capacity to judge and propose research ideas with high potential impact. However, most relative research focuses on improving an AI scientist's executive capability, while enhancing an AI's scientific taste remains underexplored. In this work, we propose Reinforcement Learning from Community Feedback (RLCF), a training paradigm that uses large-scale community signals as supervision, and formulate scientific taste learning as a preference modeling and alignment problem. For preference modeling, we train Scientific Judge on 700K field- and time-matched pairs of high- vs. low-citation papers to judge ideas. For preference alignment, using Scientific Judge as a reward model, we train a policy model, Scientific Thinker, to propose research ideas with high potential impact. Experiments show Scientific Judge outperforms SOTA LLMs (e.g., GPT-5.2, Gemini 3 Pro) and generalizes to future-year test, unseen fields, and peer-review preference. Furthermore, Scientific Thinker proposes research ideas with higher potential impact than baselines. Our findings show that AI can learn scientific taste, marking a key step toward reaching human-level AI scientists.", 'score': 58, 'issue_id': 1520, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': '5653284bb836b249', 'authors': ['Jingqi Tong', 'Mingzhe Li', 'Hangcheng Li', 'Yongzhuo Yang', 'Yurong Mou', 'Weijie Ma', 'Zhiheng Xi', 'Hongji Chen', 'Xiaoran Liu', 'Qinyuan Cheng', 'Ming Zhang', 'Qiguang Chen', 'Weifeng Ge', 'Qipeng Guo', 'Tianlei Ying', 'Tianxiang Sun', 'Yining Zheng', 'Xinchi Chen', 'Jun Zhao', 'Ning Ding', 'Xuanjing Huang', 'Yugang Jiang', 'Xipeng Qiu'], 'affiliations': ['Central South University', 'Fudan University', 'OpenMOSS Team', 'Shanghai Innovation Institute', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.14473.jpg', 'data': {'categories': ['#science', '#alignment'], 'emoji': '🧬', 'ru': {'title': 'Учим AI развивать научный вкус через обратную связь сообщества', 'desc': "В этой работе предлагается метод обучения AI научному вкусу — способности оценивать и предлагать исследовательские идеи с высоким потенциалом влияния. Авторы формулируют задачу как проблему моделирования предпочтений и разработали подход под названием RLCF (обучение с подкреплением от обратной связи сообщества), используя сигналы из научного сообщества как supervision. Модель Scientific Judge обучается на 700K парах научных статей с высоким и низким цитированием, чтобы судить о качестве идей, а модель Scientific Thinker использует её как reward model для генерации перспективных исследовательских идей. Экспериментальные результаты показывают, что AI может научиться научному вкусу и предлагать идеи с более высоким потенциалом влияния, чем существующие baseline'ы."}, 'en': {'title': "Enhancing AI's Scientific Taste for Impactful Research", 'desc': 'This paper introduces a new approach called Reinforcement Learning from Community Feedback (RLCF) to enhance the scientific taste of AI systems. Scientific taste refers to the ability to evaluate and propose impactful research ideas, which has been less explored compared to other AI capabilities. The authors develop a model called Scientific Judge that learns to assess research papers based on citation metrics, and a policy model called Scientific Thinker that generates high-potential research proposals. Their experiments demonstrate that these models outperform existing large language models and can effectively generalize to new fields and future research trends.'}, 'zh': {'title': '提升AI的科学品味，迈向人类水平的科学家', 'desc': '这篇论文探讨了科学家的判断力和前瞻性，称之为科学品味。研究提出了一种新的训练范式，称为社区反馈强化学习（RLCF），旨在通过大规模社区信号来提升AI的科学品味。论文中，作者训练了一个名为Scientific Judge的模型，以判断高引用和低引用论文的研究想法，并使用该模型作为奖励模型来训练另一个模型Scientific Thinker，提出具有高潜在影响力的研究想法。实验结果表明，Scientific Judge在多个领域的表现优于现有的语言模型，而Scientific Thinker提出的研究想法也显示出更高的潜在影响力。'}}}, {'id': 'https://huggingface.co/papers/2603.15612', 'title': 'HSImul3R: Physics-in-the-Loop Reconstruction of Simulation-Ready Human-Scene Interactions', 'url': 'https://huggingface.co/papers/2603.15612', 'abstract': 'Abstract HSImul3R presents a unified framework for 3D reconstruction of human-scene interactions that bridges the perception-simulation gap through physics-grounded bidirectional optimization and reinforcement learning.  \t\t\t\t\tAI-generated summary We present HSImul3R, a unified framework for simulation-ready 3D reconstruction of human-scene interactions (HSI) from casual captures, including sparse-view images and monocular videos. Existing methods suffer from a perception-simulation gap: visually plausible reconstructions often violate physical constraints, leading to instability in physics engines and failure in embodied AI applications. To bridge this gap, we introduce a physically-grounded bi-directional optimization pipeline that treats the physics simulator as an active supervisor to jointly refine human dynamics and scene geometry. In the forward direction, we employ Scene-targeted Reinforcement Learning to optimize human motion under dual supervision of motion fidelity and contact stability. In the reverse direction, we propose Direct Simulation Reward Optimization, which leverages simulation feedback on gravitational stability and interaction success to refine scene geometry. We further present HSIBench, a new benchmark with diverse objects and interaction scenarios. Extensive experiments demonstrate that HSImul3R produces the first stable, simulation-ready HSI reconstructions and can be directly deployed to real-world humanoid robots.', 'score': 17, 'issue_id': 1521, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '5e9f9eb6ea44f1aa', 'authors': ['Yukang Cao', 'Haozhe Xie', 'Fangzhou Hong', 'Long Zhuo', 'Zhaoxi Chen', 'Liang Pan', 'Ziwei Liu'], 'affiliations': ['ACE Robotics', 'S-Lab, Nanyang Technological University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2603.15612.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#benchmark', '#rl', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Физически правильная реконструкция взаимодействий человека и окружения для робототехники', 'desc': 'HSImul3R представляет собой унифицированный фреймворк для трёхмерной реконструкции взаимодействий человека и сцены из обычных снимков и видео. Основная инновация заключается в физико-обоснованной двунаправленной оптимизации, которая использует симулятор физики как активного супервайзера для совместного уточнения динамики человека и геометрии сцены. Авторы применяют обучение с подкреплением в прямом направлении для оптимизации движений с контролем стабильности контактов, и оптимизацию вознаграждения симуляции в обратном направлении для улучшения геометрии сцены. Полученные реконструкции физически корректны, готовы к использованию в физических симуляторах и могут быть развёрнуты на реальных гуманоидных роботах.'}, 'en': {'title': 'Bridging the Perception-Simulation Gap in 3D Human-Scene Interactions', 'desc': "HSImul3R is a new framework designed for creating 3D models of how humans interact with their surroundings using casual video and image data. It addresses the common issue where visually appealing models do not follow physical laws, which can cause problems in simulations and AI applications. The framework uses a two-way optimization process that incorporates physics simulations to improve both human movements and the environment's structure. Additionally, HSImul3R includes a benchmark called HSIBench to test various objects and interactions, showing that it can produce stable and realistic 3D reconstructions suitable for real-world robots."}, 'zh': {'title': '人类与场景交互的稳定重建', 'desc': 'HSImul3R是一个统一框架，用于从稀疏视图图像和单目视频中重建人类与场景的交互。该方法通过物理基础的双向优化和强化学习，解决了感知与模拟之间的差距。它利用场景目标强化学习优化人类运动，并通过直接模拟奖励优化来改进场景几何。实验表明，HSImul3R能够生成稳定的、适合模拟的人类场景交互重建，并可直接应用于现实世界的人形机器人。'}}}, {'id': 'https://huggingface.co/papers/2603.15478', 'title': 'ViFeEdit: A Video-Free Tuner of Your Video Diffusion Transformer', 'url': 'https://huggingface.co/papers/2603.15478', 'abstract': 'Abstract  Diffusion Transformers (DiTs) have demonstrated remarkable scalability and quality in image and video generation, prompting growing interest in extending them to controllable generation and editing tasks. However, compared to the image counterparts, progress in video control and editing remains limited, mainly due to the scarcity of paired video data and the high computational cost of training video diffusion models. To address this issue, in this paper, we propose a video-free tuning framework termed ViFeEdit for video diffusion transformers. Without requiring any forms of video training data, ViFeEdit achieves versatile video generation and editing, adapted solely with 2D images. At the core of our approach is an architectural reparameterization that decouples spatial independence from the full 3D attention in modern video diffusion transformers, which enables visually faithful editing while maintaining temporal consistency with only minimal additional parameters. Moreover, this design operates in a dual-path pipeline with separate timestep embeddings for noise scheduling, exhibiting strong adaptability to diverse conditioning signals. Extensive experiments demonstrate that our method delivers promising results of controllable video generation and editing with only minimal training on 2D image data. Codes are available https://github.com/Lexie-YU/ViFeEdit.', 'score': 14, 'issue_id': 1520, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'd4ae68012629ac1f', 'authors': ['Ruonan Yu', 'Zhenxiong Tan', 'Zigeng Chen', 'Songhua Liu', 'Xinchao Wang'], 'affiliations': ['National University of Singapore', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15478.jpg', 'data': {'categories': ['#diffusion', '#training', '#video', '#architecture', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Видеоредактирование диффузионных трансформеров без видеоданных', 'desc': 'Статья представляет ViFeEdit — фреймворк для настройки видео диффузионных трансформеров без использования видеоданных. Авторы предлагают архитектурную переаметризацию, которая разделяет пространственную независимость от полного 3D-внимания, позволяя достичь контролируемой генерации и редактирования видео. Метод обучается только на 2D-изображениях, что значительно снижает вычислительные затраты. Двухпутевой конвейер с отдельными временными embeddings обеспечивает хорошую адаптацию к различным условным сигналам и сохраняет временную согласованность.'}, 'en': {'title': 'Video Editing Made Easy with 2D Images!', 'desc': 'This paper introduces ViFeEdit, a novel framework for video diffusion transformers that allows for video generation and editing without the need for video training data. By utilizing only 2D images, ViFeEdit employs an architectural reparameterization that separates spatial independence from 3D attention, ensuring high-quality visual edits while preserving temporal consistency. The framework operates through a dual-path pipeline, which enhances its adaptability to various conditioning signals. Experimental results show that ViFeEdit achieves effective controllable video generation and editing with minimal training requirements.'}, 'zh': {'title': '无视频数据的可控视频生成与编辑', 'desc': '本文提出了一种名为ViFeEdit的视频扩散变换器调优框架，旨在解决视频生成和编辑中的数据稀缺和计算成本问题。该方法不需要任何视频训练数据，仅使用2D图像即可实现多样化的视频生成和编辑。通过对现代视频扩散变换器的架构重新参数化，ViFeEdit能够在保持时间一致性的同时，实现视觉上真实的编辑。实验结果表明，该方法在仅使用少量2D图像数据的情况下，能够有效地进行可控的视频生成和编辑。'}}}, {'id': 'https://huggingface.co/papers/2603.15031', 'title': 'Attention Residuals', 'url': 'https://huggingface.co/papers/2603.15031', 'abstract': "Abstract  Residual connections with PreNorm are standard in modern LLMs, yet they accumulate all layer outputs with fixed unit weights. This uniform aggregation causes uncontrolled hidden-state growth with depth, progressively diluting each layer's contribution. We propose Attention Residuals (AttnRes), which replaces this fixed accumulation with softmax attention over preceding layer outputs, allowing each layer to selectively aggregate earlier representations with learned, input-dependent weights. To address the memory and communication overhead of attending over all preceding layer outputs for large-scale model training, we introduce Block AttnRes, which partitions layers into blocks and attends over block-level representations, reducing the memory footprint while preserving most of the gains of full AttnRes. Combined with cache-based pipeline communication and a two-phase computation strategy, Block AttnRes becomes a practical drop-in replacement for standard residual connections with minimal overhead.   Scaling law experiments confirm that the improvement is consistent across model sizes, and ablations validate the benefit of content-dependent depth-wise selection. We further integrate AttnRes into the Kimi Linear architecture (48B total / 3B activated parameters) and pre-train on 1.4T tokens, where AttnRes mitigates PreNorm dilution, yielding more uniform output magnitudes and gradient distribution across depth, and improves downstream performance across all evaluated tasks.", 'score': 13, 'issue_id': 1521, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '3c2bdb6b971624f7', 'authors': ['Kimi Team', 'Guangyu Chen', 'Yu Zhang', 'Jianlin Su', 'Weixin Xu', 'Siyuan Pan', 'Yaoyu Wang', 'Yucheng Wang', 'Guanduo Chen', 'Bohong Yin', 'Yutian Chen', 'Junjie Yan', 'Ming Wei', 'Y. Zhang', 'Fanqing Meng', 'Chao Hong', 'Xiaotong Xie', 'Shaowei Liu', 'Enzhe Lu', 'Yunpeng Tai', 'Yanru Chen', 'Xin Men', 'Haiqing Guo', 'Y. Charles', 'Haoyu Lu', 'Lin Sui', 'Jinguo Zhu', 'Zaida Zhou', 'Weiran He', 'Weixiao Huang', 'Xinran Xu', 'Yuzhi Wang', 'Guokun Lai', 'Yulun Du', 'Yuxin Wu', 'Zhilin Yang', 'Xinyu Zhou'], 'affiliations': ['MoonshotAI'], 'pdf_title_img': 'assets/pdf/title_img/2603.15031.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training'], 'emoji': '🔗', 'ru': {'title': 'Селективная агрегация слоёв через внимание вместо фиксированных остаточных связей', 'desc': 'В статье предлагается новый механизм остаточных соединений под названием Attention Residuals (AttnRes), который заменяет фиксированное накопление выходов слоёв на взвешенную агрегацию с помощью механизма внимания. Это решает проблему неконтролируемого роста скрытых состояний при увеличении глубины сети, когда вклад каждого слоя постепенно размывается. Для практического применения в больших моделях авторы предлагают Block AttnRes, который снижает память и вычислительные затраты, разбивая слои на блоки. Экспериментальные результаты показывают, что метод работает эффективно на моделях разного размера и улучшает производительность на разнообразных задачах, одновременно обеспечивая более равномерное распределение градиентов по глубине сети.'}, 'en': {'title': 'Enhancing Residual Connections with Attention for Better Model Performance', 'desc': 'This paper introduces Attention Residuals (AttnRes) as an improvement over traditional residual connections used in large language models (LLMs). Instead of using fixed weights to combine outputs from different layers, AttnRes employs softmax attention to selectively aggregate these outputs based on learned, input-dependent weights. To manage memory usage during training, the authors propose Block AttnRes, which organizes layers into blocks and attends to block-level representations, thus reducing overhead while maintaining performance benefits. Experiments show that AttnRes enhances model training by providing more consistent output magnitudes and gradient distributions, leading to better performance on various tasks.'}, 'zh': {'title': '动态聚合，提升模型表现', 'desc': '本文提出了一种新的残差连接方法，称为注意力残差（AttnRes），用于解决现代大语言模型中固定权重累积导致的隐藏状态增长问题。通过使用softmax注意力机制，AttnRes允许每一层根据输入动态选择性地聚合前面层的表示，从而提高了模型的表现。为了降低大规模模型训练中的内存和通信开销，本文还引入了块级注意力残差（Block AttnRes），将层划分为块并在块级表示上进行注意力计算。实验结果表明，AttnRes在不同模型规模上均能带来一致的性能提升，并有效改善了下游任务的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.10505', 'title': 'Safe and Scalable Web Agent Learning via Recreated Websites', 'url': 'https://huggingface.co/papers/2603.10505', 'abstract': 'Abstract VeriEnv enables safe and scalable training of web agents by creating synthetic, verifiable environments from real websites through language model-based cloning.  \t\t\t\t\tAI-generated summary Training autonomous web agents is fundamentally limited by the environments they learn from: real-world websites are unsafe to explore, hard to reset, and rarely provide verifiable feedback. We propose VeriEnv, a framework that treats language models as environment creators, automatically cloning real-world websites into fully executable, verifiable synthetic environments. By exposing controlled internal access via a Python SDK, VeriEnv enables agents to self-generate tasks with deterministic, programmatically verifiable rewards, eliminating reliance on heuristic or LLM-based judges. This design decouples agent learning from unsafe real-world interaction while enabling scalable self-evolution through environment expansion. Through experiments on web agent benchmarks, we show that agents trained with VeriEnv generalize to unseen websites, achieve site-specific mastery through self-evolving training, and benefit from scaling the number of training environments. Code and resources will be released at https://github.com/kyle8581/VeriEnv upon acceptance.', 'score': 13, 'issue_id': 1520, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'c7c820a1ec2088b0', 'authors': ['Hyungjoo Chae', 'Jungsoo Park', 'Alan Ritter'], 'affiliations': ['School of Interactive Computing, Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.10505.jpg', 'data': {'categories': ['#agents', '#training', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Синтетические клоны сайтов для безопасного обучения веб-агентов', 'desc': 'В статье предложена система VeriEnv, которая использует языковые модели для автоматического клонирования реальных веб-сайтов в синтетические, полностью исполняемые окружения для обучения веб-агентов. Система решает проблему безопасности и контролируемости тренировки агентов, предоставляя Python SDK для управления синтетическими окружениями и генерации задач с детерминированными, верифицируемыми наградами. Благодаря такому подходу исключается необходимость в эвристических оценках и судьях на базе LLM, а обучение агентов отделяется от рискованного взаимодействия с реальными веб-сайтами. Экспериментально показано, что агенты, обученные на VeriEnv, хорошо обобщаются на незнакомые сайты и могут самостоятельно развиваться через расширение набора тренировочных окружений.'}, 'en': {'title': 'Safe and Scalable Training for Web Agents with VeriEnv', 'desc': 'VeriEnv is a framework designed to train web agents safely and effectively by creating synthetic environments that mimic real websites. It uses language models to clone these websites into verifiable environments, allowing agents to learn without the risks associated with real-world exploration. The framework provides a Python SDK for agents to generate tasks and receive clear, programmatically verifiable rewards, which enhances their learning process. Experiments show that agents trained in VeriEnv can generalize well to new websites and improve their skills through self-evolution and increased training environments.'}, 'zh': {'title': '安全高效的网络代理训练框架', 'desc': 'VeriEnv 是一个框架，利用语言模型自动克隆真实网站，创建可验证的合成环境，从而安全地训练网络代理。通过提供 Python SDK，VeriEnv 允许代理自我生成任务，并获得可编程验证的奖励，避免了对启发式或大型语言模型评判的依赖。这个设计使得代理的学习与不安全的真实世界交互解耦，同时通过环境扩展实现可扩展的自我进化。实验表明，使用 VeriEnv 训练的代理能够在未见过的网站上进行泛化，并通过自我进化训练实现特定网站的精通。'}}}, {'id': 'https://huggingface.co/papers/2603.13391', 'title': 'WebVR: Benchmarking Multimodal LLMs for WebPage Recreation from Videos via Human-Aligned Visual Rubrics', 'url': 'https://huggingface.co/papers/2603.13391', 'abstract': 'Abstract  Existing web-generation benchmarks rely on text prompts or static screenshots as input. However, videos naturally convey richer signals such as interaction flow, transition timing, and motion continuity, which are essential for faithful webpage recreation. Despite this potential, video-conditioned webpage generation remains largely unexplored, with no dedicated benchmark for this task. To fill this gap, we introduce WebVR, a benchmark that evaluates whether MLLMs can faithfully recreate webpages from demonstration videos. WebVR contains 175 webpages across diverse categories, all constructed through a controlled synthesis pipeline rather than web crawling, ensuring varied and realistic demonstrations without overlap with existing online pages. We also design a fine-grained, human-aligned visual rubric that evaluates the generated webpages across multiple dimensions. Experiments on 19 models reveal substantial gaps in recreating fine-grained style and motion quality, while the rubric-based automatic evaluation achieves 96% agreement with human preferences. We release the dataset, evaluation toolkit, and baseline results to support future research on video-to-webpage generation.', 'score': 10, 'issue_id': 1520, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '32654687f769caa6', 'authors': ['Yuhong Dai', 'Yanlin Lai', 'Mitt Huang', 'Hangyu Guo', 'Dingming Li', 'Hongbo Peng', 'Haodong Li', 'Yingxiu Zhao', 'Haoran Lyu', 'Zheng Ge', 'Xiangyu Zhang', 'Daxin Jiang'], 'affiliations': ['StepFun', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.13391.jpg', 'data': {'categories': ['#video', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'От видеодемонстрации к веб-странице: бенчмарк для мультимодальных моделей', 'desc': 'В статье представлен WebVR — первый бенчмарк для оценки способности мультимодальных языковых моделей (MLLM) воссоздавать веб-страницы на основе видеодемонстраций. Авторы собрали набор данных из 175 веб-страниц разных категорий, созданных через контролируемый синтетический конвейер, что обеспечивает разнообразие и реалистичность без пересечения с существующими веб-ресурсами. Разработана детальная визуальная шкала оценки, основанная на человеческих предпочтениях, которая достигает 96% согласованности с экспертной оценкой при автоматической оценке. Эксперименты на 19 моделях выявили значительные пробелы в воссоздании стилевых деталей и качества анимации, демонстрируя перспективное направление для будущих исследований в генерации веб-контента из видео.'}, 'en': {'title': 'Revolutionizing Webpage Generation with Video Insights', 'desc': 'This paper introduces WebVR, a new benchmark for evaluating machine learning models that generate webpages from videos. Unlike traditional methods that use text prompts or static images, WebVR leverages the dynamic information in videos, such as interaction flow and motion continuity, to enhance webpage recreation. The benchmark includes 175 diverse webpages created through a controlled process, ensuring realistic examples without duplicating existing online content. The authors also present a detailed evaluation rubric that aligns with human judgment, revealing significant challenges in replicating fine-grained styles and motion quality in generated webpages.'}, 'zh': {'title': '视频驱动的网页生成新基准', 'desc': '现有的网页生成基准主要依赖文本提示或静态截图作为输入。然而，视频能够自然地传达更丰富的信号，如交互流程、过渡时机和运动连续性，这些对于真实网页的重建至关重要。尽管视频条件下的网页生成潜力巨大，但这一领域仍然未被充分探索，缺乏专门的基准。为此，我们推出了WebVR基准，评估机器学习语言模型能否从演示视频中忠实重建网页，并提供了数据集和评估工具以支持未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.15558', 'title': 'Panoramic Affordance Prediction', 'url': 'https://huggingface.co/papers/2603.15558', 'abstract': 'Abstract  Affordance prediction serves as a critical bridge between perception and action in embodied AI. However, existing research is confined to pinhole camera models, which suffer from narrow Fields of View (FoV) and fragmented observations, often missing critical holistic environmental context. In this paper, we present the first exploration into Panoramic Affordance Prediction, utilizing 360-degree imagery to capture global spatial relationships and holistic scene understanding. To facilitate this novel task, we first introduce PAP-12K, a large-scale benchmark dataset containing over 1,000 ultra-high-resolution (12k, 11904 x 5952) panoramic images with over 12k carefully annotated QA pairs and affordance masks. Furthermore, we propose PAP, a training-free, coarse-to-fine pipeline inspired by the human foveal visual system to tackle the ultra-high resolution and severe distortion inherent in panoramic images. PAP employs recursive visual routing via grid prompting to progressively locate targets, applies an adaptive gaze mechanism to rectify local geometric distortions, and utilizes a cascaded grounding pipeline to extract precise instance-level masks. Experimental results on PAP-12K reveal that existing affordance prediction methods designed for standard perspective images suffer severe performance degradation and fail due to the unique challenges of panoramic vision. In contrast, PAP framework effectively overcomes these obstacles, significantly outperforming state-of-the-art baselines and highlighting the immense potential of panoramic perception for robust embodied intelligence.', 'score': 8, 'issue_id': 1520, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'cfe55d462ffe61fc', 'authors': ['Zixin Zhang', 'Chenfei Liao', 'Hongfei Zhang', 'Harold Haodong Chen', 'Kanghao Chen', 'Zichen Wen', 'Litao Guo', 'Bin Ren', 'Xu Zheng', 'Yinchuan Li', 'Xuming Hu', 'Nicu Sebe', 'Ying-Cong Chen'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Knowin', 'MBZUAI', 'SJTU', 'UniTrento'], 'pdf_title_img': 'assets/pdf/title_img/2603.15558.jpg', 'data': {'categories': ['#cv', '#multimodal', '#benchmark', '#robotics', '#dataset', '#open_source'], 'emoji': '🌐', 'ru': {'title': 'Панорамное понимание окружающей среды для роботизированного интеллекта', 'desc': 'В статье предложен первый подход к прогнозированию affordance (доступных действий) с использованием панорамных 360-градусных изображений вместо традиционных узких полей зрения. Авторы создали большой датасет PAP-12K с более чем 12 тысячами аннотированных панорамных изображений высокого разрешения и предложили модель PAP, которая использует пошаговую фокусировку внимания, вдохновленную человеческой фовеальной системой зрения. Метод применяет рекурсивную визуальную маршрутизацию и адаптивный механизм взгляда для преодоления искажений панорамных изображений и извлечения точных масок объектов. Экспериментальные результаты показывают, что существующие методы прогнозирования affordance не справляются с панорамными изображениями, в то время как предложенный подход значительно превосходит базовые модели.'}, 'en': {'title': "Unlocking AI's Vision with Panoramic Affordance Prediction", 'desc': 'This paper introduces a new approach to affordance prediction in embodied AI by using panoramic images instead of traditional pinhole camera models. The authors present a large dataset called PAP-12K, which includes over 1,000 high-resolution panoramic images with detailed annotations for training models. They propose a novel framework, PAP, that mimics human visual processing to handle the complexities of panoramic images, including distortion and resolution challenges. Experimental results show that PAP significantly improves performance in affordance prediction compared to existing methods, demonstrating the advantages of panoramic perception in AI applications.'}, 'zh': {'title': '全景可供性预测：打破传统视野的限制', 'desc': '本论文探讨了全景可供性预测在具身人工智能中的重要性。现有研究主要基于针孔相机模型，导致视野狭窄和观察片段化，常常缺失整体环境上下文。我们提出了PAP-12K数据集，包含超过1000张超高分辨率全景图像及其标注的问答对和可供性掩码。通过PAP框架，我们展示了如何利用全景视觉克服传统方法的局限性，从而提升可供性预测的准确性和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.14145', 'title': 'MMOU: A Massive Multi-Task Omni Understanding and Reasoning Benchmark for Long and Complex Real-World Videos', 'url': 'https://huggingface.co/papers/2603.14145', 'abstract': 'Abstract  Multimodal Large Language Models (MLLMs) have shown strong performance in visual and audio understanding when evaluated in isolation. However, their ability to jointly reason over omni-modal (visual, audio, and textual) signals in long and complex videos remains largely unexplored. We introduce MMOU, a new benchmark designed to systematically evaluate multimodal understanding and reasoning under these challenging, real-world conditions. MMOU consists of 15,000 carefully curated questions paired with 9038 web-collected videos of varying length, spanning diverse domains and exhibiting rich, tightly coupled audio-visual content. The benchmark covers 13 fundamental skill categories, all of which require integrating evidence across modalities and time. All questions are manually annotated across multiple turns by professional annotators, ensuring high quality and reasoning fidelity. We evaluate 20+ state-of-the-art open-source and proprietary multimodal models on MMOU. The results expose substantial performance gaps: the best closed-source model achieves only 64.2% accuracy, while the strongest open-source model reaches just 46.8%. Our results highlight the challenges of long-form omni-modal understanding, revealing that current models frequently fail to apply even fundamental skills in long videos. Through detailed analysis, we further identify systematic failure modes and provide insights into where and why current models break.', 'score': 5, 'issue_id': 1520, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '5f985fef8c252047', 'authors': ['Arushi Goel', 'Sreyan Ghosh', 'Vatsal Agarwal', 'Nishit Anand', 'Kaousheik Jayakumar', 'Lasha Koroshinadze', 'Yao Xu', 'Katie Lyons', 'James Case', 'Karan Sapra', 'Kevin J. Shih', 'Siddharth Gururani', 'Abhinav Shrivastava', 'Ramani Duraiswami', 'Dinesh Manocha', 'Andrew Tao', 'Bryan Catanzaro', 'Mohammad Shoeybi', 'Wei Ping'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2603.14145.jpg', 'data': {'categories': ['#reasoning', '#multimodal', '#benchmark', '#audio', '#dataset', '#video', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Оценка омнимодального понимания: от простых задач к сложной реальности длинных видео', 'desc': 'В работе представлен новый бенчмарк MMOU для оценки способности многомодальных больших языковых моделей понимать и рассуждать на основе одновременно видео-, аудио- и текстовой информации в длинных видеороликах. Бенчмарк включает 15000 вопросов с тщательной ручной разметкой и 9038 видео различной длины из разных областей, охватывая 13 категорий фундаментальных навыков, требующих интеграции свидетельств из разных модальностей. Авторы провели оценку более 20 современных моделей и обнаружили существенные пробелы в производительности: лучшие закрытые модели достигают 64.2% точности, а лучшие открытые модели только 46.8%. Анализ выявил систематические ошибки и показал, что текущие модели испытывают значительные трудности с обработкой длинных видеоматериалов с несколькими модальностями.'}, 'en': {'title': 'Unlocking Multimodal Mastery: The MMOU Benchmark', 'desc': 'This paper introduces MMOU, a new benchmark for evaluating Multimodal Large Language Models (MLLMs) on their ability to understand and reason across visual, audio, and textual signals in long videos. The benchmark includes 15,000 questions linked to 9,038 diverse videos, focusing on 13 essential skills that require integrating information from multiple modalities over time. The evaluation of over 20 state-of-the-art models reveals significant performance gaps, with the best models achieving only moderate accuracy. The findings indicate that current MLLMs struggle with fundamental reasoning tasks in complex, long-form content, highlighting areas for improvement in multimodal understanding.'}, 'zh': {'title': '探索多模态理解的新基准', 'desc': '多模态大型语言模型（MLLMs）在视觉和音频理解方面表现出色，但在长视频中联合推理多种信号的能力尚未得到充分探索。我们提出了MMOU，这是一个新的基准，旨在系统评估在复杂真实环境下的多模态理解和推理能力。MMOU包含15,000个精心策划的问题，配对9038个不同长度的网络收集视频，涵盖多个领域并展示丰富的音视频内容。我们的评估显示，当前模型在长视频中的多模态理解面临重大挑战，许多模型在基本技能的应用上也存在明显不足。'}}}, {'id': 'https://huggingface.co/papers/2603.13364', 'title': 'FineRMoE: Dimension Expansion for Finer-Grained Expert with Its Upcycling Approach', 'url': 'https://huggingface.co/papers/2603.13364', 'abstract': 'Abstract  As revealed by the scaling law of fine-grained MoE, model performance ceases to be improved once the granularity of the intermediate dimension exceeds the optimal threshold, limiting further gains from single-dimension fine-grained design. To address this bottleneck, we propose FineRMoE (FineR-Grained MoE), an architecture that extends fine-grained expert design to both intermediate and output dimensions, aiming to enhance expert specialization beyond the single-dimension limit. We further introduce a bi-level sparse forward computation paradigm and a specialized routing mechanism to govern the activation. In addition, to obviate the prohibitive cost of training FineRMoE from scratch, we devise a generalized upcycling method to build FineRMoE in a cost-effective manner. Extensive experiments demonstrate the superior performance achieved by FineRMoE across ten standard benchmarks. Compared with the strongest baseline, FineRMoE achieves 6 times higher parameter efficiency, 281 times lower prefill latency, and 136 timese higher decoding throughput during inference.', 'score': 5, 'issue_id': 1520, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '830b806adba232fa', 'authors': ['Ning Liao', 'Xiaoxing Wang', 'Xiaohan Qin', 'Junchi Yan'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.13364.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Двумерная специализация экспертов: преодоление границ одномерной гранулярности', 'desc': 'Статья предлагает FineRMoE, новую архитектуру смеси экспертов (MoE), которая преодолевает ограничения одномерного дизайна, расширяя гранулярность на промежуточное и выходное измерения одновременно. Авторы вводят двухуровневую разреженную парадигму вычислений и специализированный механизм маршрутизации для эффективного управления активацией экспертов. Для практического применения предлагается обобщённый метод переобучения, позволяющий строить FineRMoE экономно, без переподготовки с нуля. Экспериментальные результаты показывают значительные улучшения: в 6 раз выше эффективность параметров и значительное снижение задержек при инференсе.'}, 'en': {'title': 'Unlocking Expert Potential with FineRMoE', 'desc': 'This paper introduces FineRMoE, a new architecture that improves the performance of mixture of experts (MoE) models by extending fine-grained design to both intermediate and output dimensions. The authors identify a limitation in existing models where performance plateaus when the granularity of the intermediate dimension is too high. To overcome this, they implement a bi-level sparse forward computation and a specialized routing mechanism to optimize expert activation. Additionally, they propose a cost-effective upcycling method to train FineRMoE, resulting in significant improvements in parameter efficiency and inference speed across multiple benchmarks.'}, 'zh': {'title': '突破单维限制，提升专家模型性能', 'desc': '本论文提出了一种新的模型架构，称为FineRMoE（细粒度专家混合模型），旨在克服单维细粒度设计的局限性。通过扩展细粒度专家设计到中间和输出维度，FineRMoE能够增强专家的专业化。我们还引入了一种双层稀疏前向计算范式和专门的路由机制，以优化激活过程。此外，论文中提出了一种通用的上循环方法，以经济高效的方式构建FineRMoE，实验结果显示其在多个基准测试中表现优越。'}}}, {'id': 'https://huggingface.co/papers/2603.12146', 'title': 'FlashMotion: Few-Step Controllable Video Generation with Trajectory Guidance', 'url': 'https://huggingface.co/papers/2603.12146', 'abstract': 'Abstract  Recent advances in trajectory-controllable video generation have achieved remarkable progress. Previous methods mainly use adapter-based architectures for precise motion control along predefined trajectories. However, all these methods rely on a multi-step denoising process, leading to substantial time redundancy and computational overhead. While existing video distillation methods successfully distill multi-step generators into few-step, directly applying these approaches to trajectory-controllable video generation results in noticeable degradation in both video quality and trajectory accuracy. To bridge this gap, we introduce FlashMotion, a novel training framework designed for few-step trajectory-controllable video generation. We first train a trajectory adapter on a multi-step video generator for precise trajectory control. Then, we distill the generator into a few-step version to accelerate video generation. Finally, we finetune the adapter using a hybrid strategy that combines diffusion and adversarial objectives, aligning it with the few-step generator to produce high-quality, trajectory-accurate videos. For evaluation, we introduce FlashBench, a benchmark for long-sequence trajectory-controllable video generation that measures both video quality and trajectory accuracy across varying numbers of foreground objects. Experiments on two adapter architectures show that FlashMotion surpasses existing video distillation methods and previous multi-step models in both visual quality and trajectory consistency.', 'score': 4, 'issue_id': 1520, 'pub_date': '2026-03-12', 'pub_date_card': {'ru': '12 марта', 'en': 'March 12', 'zh': '3月12日'}, 'hash': '146f41ab76077625', 'authors': ['Quanhao Li', 'Zhen Xing', 'Rui Wang', 'Haidong Cao', 'Qi Dai', 'Daoguo Dong', 'Zuxuan Wu'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Microsoft Research Asia', 'Shanghai Key Laboratory of Multimodal Embodied AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.12146.jpg', 'data': {'categories': ['#video', '#architecture', '#training', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Быстрая генерация видео с точным управлением траекториями объектов', 'desc': 'В работе предлагается FlashMotion — новый фреймворк для ускоренной генерации видео с контролем траектории движения объектов. Авторы решают проблему вычислительной неэффективности многошаговых процессов денойзинга, применяя дистилляцию к адаптерным архитектурам для управления траекторией. Метод включает три этапа: обучение адаптера траектории на многошаговом генераторе, дистилляция генератора в малошаговую версию и дополнительная тонкая настройка адаптера с использованием гибридной стратегии, объединяющей диффузионные и adversarial потери. Авторы также представляют FlashBench — новый бенчмарк для оценки качества видео и точности траектории при различном количестве объектов в сцене.'}, 'en': {'title': 'FlashMotion: Fast and Accurate Video Generation on Trajectories', 'desc': 'This paper presents FlashMotion, a new framework for generating videos that can follow specific paths with fewer processing steps. Traditional methods use complex multi-step processes that are slow and computationally heavy, but FlashMotion simplifies this by distilling a multi-step generator into a more efficient few-step version. The framework includes training a trajectory adapter for precise control and fine-tuning it with a combination of diffusion and adversarial techniques to ensure high-quality output. The authors also introduce FlashBench, a benchmark to evaluate the performance of their method in terms of video quality and trajectory accuracy, demonstrating that FlashMotion outperforms existing techniques.'}, 'zh': {'title': 'FlashMotion：高效生成可控轨迹视频的新方法', 'desc': '本文介绍了一种名为FlashMotion的新训练框架，用于生成可控轨迹的视频。该方法首先在多步视频生成器上训练轨迹适配器，以实现精确的轨迹控制。然后，将生成器蒸馏为少步版本，以加快视频生成速度。最后，通过结合扩散和对抗目标的混合策略对适配器进行微调，从而生成高质量且轨迹准确的视频。'}}}, {'id': 'https://huggingface.co/papers/2603.15500', 'title': 'Understanding Reasoning in LLMs through Strategic Information Allocation under Uncertainty', 'url': 'https://huggingface.co/papers/2603.15500', 'abstract': 'Abstract  LLMs often exhibit Aha moments during reasoning, such as apparent self-correction following tokens like "Wait," yet their underlying mechanisms remain unclear. We introduce an information-theoretic framework that decomposes reasoning into procedural information and epistemic verbalization - the explicit externalization of uncertainty that supports downstream control actions. We show that purely procedural reasoning can become informationally stagnant, whereas epistemic verbalization enables continued information acquisition and is critical for achieving information sufficiency. Empirical results demonstrate that strong reasoning performance is driven by uncertainty externalization rather than specific surface tokens. Our framework unifies prior findings on Aha moments and post-training experiments, and offers insights for future reasoning model design.', 'score': 3, 'issue_id': 1522, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '664f82b6d13ac3a4', 'authors': ['Jeonghye Kim', 'Xufang Luo', 'Minbeom Kim', 'Sangmook Lee', 'Dongsheng Li', 'Yuqing Yang'], 'affiliations': ['KAIST', 'Microsoft Research', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15500.jpg', 'data': {'categories': [], 'emoji': '💭', 'ru': {'title': 'Неопределённость как ключ к глубокому рассуждению в языковых моделях', 'desc': 'Авторы исследуют механизмы, лежащие в основе способности LLM к рассуждению, используя информационно-теоретический подход. Они разделяют процесс рассуждения на два компонента: процедурную информацию и экспертную вербализацию - явное выражение неопределённости. Исследование показывает, что чистая процедурная логика может привести к информационному застою, тогда как экспертная вербализация позволяет модели продолжать получение информации. Результаты демонстрируют, что высокая производительность в рассуждениях обусловлена экспресуализацией неопределённости, а не специфическими поверхностными токенами.'}, 'en': {'title': 'Unlocking Aha Moments: The Power of Uncertainty in Reasoning', 'desc': 'This paper explores how large language models (LLMs) demonstrate moments of insight, often marked by self-correction. The authors propose a new framework that separates reasoning into two parts: procedural information, which is the process of reasoning, and epistemic verbalization, which is the expression of uncertainty. They find that while procedural reasoning can become stagnant, expressing uncertainty through verbalization is essential for continuous learning and effective reasoning. The study shows that strong reasoning abilities are linked to how well models externalize their uncertainty, rather than just the specific words they use.'}, 'zh': {'title': '推理中的不确定性外化是关键', 'desc': '本文探讨了大型语言模型（LLMs）在推理过程中出现的“恍然大悟”时刻，尤其是在使用“等一下”等词汇后自我修正的现象。我们提出了一种信息论框架，将推理分解为程序性信息和认知外化，后者是支持后续控制行为的不确定性显性表达。研究表明，单纯的程序性推理可能导致信息停滞，而认知外化则促进信息的持续获取，对实现信息充足性至关重要。我们的实证结果显示，强大的推理表现源于不确定性的外化，而非特定的表面词汇。'}}}, {'id': 'https://huggingface.co/papers/2603.12529', 'title': 'TERMINATOR: Learning Optimal Exit Points for Early Stopping in Chain-of-Thought Reasoning', 'url': 'https://huggingface.co/papers/2603.12529', 'abstract': "Abstract TERMINATOR is an early-exit method for large reasoning models that reduces unnecessary computation by identifying optimal reasoning lengths for efficient chain-of-thought reasoning.  \t\t\t\t\tAI-generated summary Large Reasoning Models (LRMs) achieve impressive performance on complex reasoning tasks via Chain-of-Thought (CoT) reasoning, which enables them to generate intermediate thinking tokens before arriving at the final answer. However, LRMs often suffer from significant overthinking, spending excessive compute time even after the answer is generated early on. Prior work has identified the existence of an optimal reasoning length such that truncating reasoning at this point significantly shortens CoT outputs with virtually no change in performance. However, determining optimal CoT lengths for practical datasets is highly non-trivial as they are fully task and model-dependent. In this paper, we precisely address this and design TERMINATOR, an early-exit strategy for LRMs at inference to mitigate overthinking. The central idea underpinning TERMINATOR is that the first arrival of an LRM's final answer is often predictable, and we leverage these first answer positions to create a novel dataset of optimal reasoning lengths to train TERMINATOR. Powered by this approach, TERMINATOR achieves significant reductions in CoT lengths of 14%-55% on average across four challenging practical datasets: MATH-500, AIME 2025, HumanEval, and GPQA, whilst outperforming current state-of-the-art methods.", 'score': 3, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '94fdb8836b3ecbb3', 'authors': ['Alliot Nagle', 'Jakhongir Saydaliev', 'Dhia Garbaya', 'Michael Gastpar', 'Ashok Vardhan Makkuva', 'Hyeji Kim'], 'affiliations': ['ENS Paris-Saclay, France', 'EPFL, Switzerland', 'Télécom Paris (IP Paris), France', 'UT Austin, US'], 'pdf_title_img': 'assets/pdf/title_img/2603.12529.jpg', 'data': {'categories': ['#optimization', '#reasoning'], 'emoji': '🛑', 'ru': {'title': 'Знайте, когда остановиться: оптимальное прерывание рассуждений в больших моделях', 'desc': 'TERMINATOR — это метод ранней остановки для больших моделей рассуждения, который снижает вычислительные затраты, определяя оптимальные длины цепочки мыслей. Авторы заметили, что модели часто переусложняют рассуждения, продолжая генерировать токены даже после того, как ответ уже найден. Для решения этой проблемы они разработали стратегию, которая использует позиции первого появления ответа для создания набора данных оптимальных длин рассуждений. В результате TERMINATOR сокращает длину цепочки мыслей на 14-55% в среднем на четырёх сложных датасетах, одновременно улучшая качество решения.'}, 'en': {'title': 'Optimize Reasoning, Minimize Computation with TERMINATOR!', 'desc': 'TERMINATOR is a method designed to improve the efficiency of large reasoning models (LRMs) by reducing unnecessary computations during chain-of-thought (CoT) reasoning. It identifies optimal reasoning lengths, allowing the model to exit early when the final answer is likely to be reached, thus minimizing overthinking. By creating a dataset that captures the first answer positions, TERMINATOR trains the model to predict when to stop reasoning without sacrificing performance. This approach leads to a significant reduction in reasoning lengths, achieving 14%-55% shorter outputs while outperforming existing methods on various challenging datasets.'}, 'zh': {'title': 'TERMINATOR：优化推理长度，提升效率', 'desc': 'TERMINATOR是一种针对大型推理模型的早期退出方法，通过识别最佳推理长度来减少不必要的计算，从而提高链式思维推理的效率。大型推理模型在复杂推理任务中表现出色，但常常会出现过度思考的问题，导致计算时间过长。研究表明，存在一个最佳推理长度，截断推理可以显著缩短链式思维输出而几乎不影响性能。本文提出TERMINATOR，通过预测模型首次给出最终答案的位置，创建了一个新的最佳推理长度数据集，从而有效减少了推理长度。'}}}, {'id': 'https://huggingface.co/papers/2603.13428', 'title': 'EvoClaw: Evaluating AI Agents on Continuous Software Evolution', 'url': 'https://huggingface.co/papers/2603.13428', 'abstract': "Abstract  With AI agents increasingly deployed as long-running systems, it becomes essential to autonomously construct and continuously evolve customized software to enable interaction within dynamic environments. Yet, existing benchmarks evaluate agents on isolated, one-off coding tasks, neglecting the temporal dependencies and technical debt inherent in real-world software evolution. To bridge this gap, we introduce DeepCommit, an agentic pipeline that reconstructs verifiable Milestone DAGs from noisy commit logs, where milestones are defined as semantically cohesive development goals. These executable sequences enable EvoClaw, a novel benchmark that requires agents to sustain system integrity and limit error accumulation, dimensions of long-term software evolution largely missing from current benchmarks. Our evaluation of 12 frontier models across 4 agent frameworks reveals a critical vulnerability: overall performance scores drop significantly from >80% on isolated tasks to at most 38% in continuous settings, exposing agents' profound struggle with long-term maintenance and error propagation.", 'score': 2, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '6858cff907d51ec3', 'authors': ['Gangda Deng', 'Zhaoling Chen', 'Zhongming Yu', 'Haoyang Fan', 'Yuhong Liu', 'Yuxin Yang', 'Dhruv Parikh', 'Rajgopal Kannan', 'Le Cong', 'Mengdi Wang', 'Qian Zhang', 'Viktor Prasanna', 'Xiangru Tang', 'Xingyao Wang'], 'affiliations': ['Army Research Office', 'Haven', 'OpenHands', 'Princeton', 'Stanford', 'UCR', 'UCSD', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2603.13428.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🧬', 'ru': {'title': 'Когда агенты забывают: как LLM теряют компетентность при долгосрочной разработке кода', 'desc': 'В статье представлена новая методология для оценки агентов на основе LLM, которые работают с кодом в течение длительного времени. Авторы разработали DeepCommit — систему, которая из шумных логов коммитов восстанавливает семантически связанные этапы разработки (Milestone DAGs), представляющие реальные цели проекта. На основе этой методологии создан бенчмарк EvoClaw, требующий от агентов поддерживать целостность системы и ограничивать накопление ошибок при длительной эволюции кода. Исследование показало критическую уязвимость: производительность современных моделей падает с >80% на изолированных задачах до максимум 38% в условиях непрерывной разработки, что указывает на серьёзные трудности агентов с долгосрочным поддержанием и распространением ошибок.'}, 'en': {'title': 'Empowering AI for Continuous Software Evolution', 'desc': 'This paper presents DeepCommit, a new framework designed to help AI agents manage software development over time. Unlike traditional benchmarks that focus on single coding tasks, DeepCommit emphasizes the importance of ongoing software evolution and maintenance. It introduces EvoClaw, a benchmark that tests agents on their ability to maintain system integrity while managing errors over time. The study reveals that many AI models perform well on isolated tasks but struggle significantly in continuous development scenarios, highlighting a critical gap in current AI capabilities for long-term software management.'}, 'zh': {'title': '构建智能代理的长期软件演化能力', 'desc': '随着人工智能代理越来越多地被部署为长期运行的系统，自动构建和持续演化定制软件以便在动态环境中进行交互变得至关重要。现有的基准测试主要评估代理在孤立的、一次性的编码任务上的表现，忽视了现实世界软件演化中固有的时间依赖性和技术债务。为了解决这个问题，我们提出了DeepCommit，这是一种代理管道，可以从嘈杂的提交日志中重建可验证的里程碑有向无环图（DAG），里程碑被定义为语义上连贯的开发目标。这些可执行的序列使得EvoClaw成为一种新基准，要求代理维持系统完整性并限制错误积累，这是当前基准测试中缺失的长期软件演化的重要维度。'}}}, {'id': 'https://huggingface.co/papers/2603.15611', 'title': 'Code-A1: Adversarial Evolving of Code LLM and Test LLM via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.15611', 'abstract': 'Abstract  Reinforcement learning for code generation relies on verifiable rewards from unit test pass rates. Yet high-quality test suites are scarce, existing datasets offer limited coverage, and static rewards fail to adapt as models improve. Recent self-play methods unify code and test generation in a single model, but face a inherent dilemma: white-box access leads to self-collusion where the model produces trivial tests for easy rewards, yet black-box restriction yields generic tests that miss implementation-specific bugs. We introduce Code-A1, an adversarial co-evolution framework that jointly optimizes a Code LLM and a Test LLM with opposing objectives. The Code LLM is rewarded for passing more tests, while the Test LLM is rewarded for exposing more defects. This architectural separation eliminates self-collusion risks and safely enables white-box test generation, where the Test LLM can inspect candidate code to craft targeted adversarial tests. We further introduce a Mistake Book mechanism for experience replay and a composite reward balancing test validity with adversarial difficulty. Experiments on Qwen2.5-Coder models demonstrate that Code-A1 achieves code generation performance matching or exceeding models trained on human-annotated tests, while significantly improving test generation capability.', 'score': 1, 'issue_id': 1521, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '620a8574adb416c1', 'authors': ['Aozhe Wang', 'Yuchen Yan', 'Nan Zhou', 'Zhengxi Lu', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.15611.jpg', 'data': {'categories': ['#rl', '#architecture', '#plp', '#training'], 'emoji': '⚔️', 'ru': {'title': 'Враги на одной арене: противоборствующие нейросети для идеального кода', 'desc': 'В работе предлагается Code-A1 — фреймворк адверсариального сосуществования для обучения с подкреплением в генерации кода. Система использует два LLM с противоположными целями: Code LLM максимизирует количество пройденных тестов, а Test LLM стремится найти как можно больше дефектов. Такое разделение архитектуры устраняет проблему самоосложнения, когда модель генерирует тривиальные тесты для легких наград, и позволяет безопасно использовать белый ящик при генерации тестов. Эксперименты показывают, что Code-A1 достигает качества кодирования, сравнимого или превосходящего моделями, обученные на тестах, аннотированных человеком, при этом значительно улучшая способность к генерации тестов.'}, 'en': {'title': 'Adversarial Learning for Enhanced Code and Test Generation', 'desc': 'This paper presents Code-A1, a novel framework for improving code generation through reinforcement learning by using two separate models: a Code LLM and a Test LLM. The Code LLM generates code and is rewarded for passing tests, while the Test LLM creates tests aimed at finding bugs in the code, thus promoting adversarial learning. This approach prevents self-collusion, where the model might create easy tests for quick rewards, by allowing the Test LLM to analyze the code directly. The results show that Code-A1 not only matches the performance of models trained on human-created tests but also enhances the quality of test generation.'}, 'zh': {'title': 'Code-A1：优化代码与测试生成的对抗框架', 'desc': '本论文提出了一种名为Code-A1的对抗共进化框架，用于代码生成和测试生成的联合优化。该框架通过分离代码生成模型和测试生成模型，避免了自我勾结的问题，使得测试生成模型能够针对候选代码设计有针对性的对抗性测试。我们还引入了Mistake Book机制来进行经验重放，并通过复合奖励平衡测试有效性与对抗难度。实验结果表明，Code-A1在代码生成性能上与人类注释测试训练的模型相当或更优，同时显著提升了测试生成能力。'}}}, {'id': 'https://huggingface.co/papers/2603.13985', 'title': 'Supervised Fine-Tuning versus Reinforcement Learning: A Study of Post-Training Methods for Large Language Models', 'url': 'https://huggingface.co/papers/2603.13985', 'abstract': 'Abstract  Pre-trained Large Language Model (LLM) exhibits broad capabilities, yet, for specific tasks or domains their attainment of higher accuracy and more reliable reasoning generally depends on post-training through Supervised Fine-Tuning (SFT) or Reinforcement Learning (RL). Although often treated as distinct methodologies, recent theoretical and empirical developments demonstrate that SFT and RL are closely connected. This study presents a comprehensive and unified perspective on LLM post-training with SFT and RL. We first provide an in-depth overview of both techniques, examining their objectives, algorithmic structures, and data requirements. We then systematically analyze their interplay, highlighting frameworks that integrate SFT and RL, hybrid training pipelines, and methods that leverage their complementary strengths. Drawing on a representative set of recent application studies from 2023 to 2025, we identify emerging trends, characterize the rapid shift toward hybrid post-training paradigms, and distill key takeaways that clarify when and why each method is most effective. By synthesizing theoretical insights, practical methodologies, and empirical evidence, this study establishes a coherent understanding of SFT and RL within a unified framework and outlines promising directions for future research in scalable, efficient, and generalizable LLM post-training.', 'score': 1, 'issue_id': 1522, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': 'd662cad9412feff1', 'authors': ['Haitao Jiang', 'Wenbo Zhang', 'Jiarui Yao', 'Hengrui Cai', 'Sheng Wang', 'Rui Song'], 'affiliations': ['Amazon', 'North Carolina State University', 'UC Irvine', 'University of Illinois Urbana-Champaign', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.13985.jpg', 'data': {'categories': ['#training', '#rl', '#rlhf'], 'emoji': '🔄', 'ru': {'title': 'SFT и RL: единство в многообразии постобучения больших языковых моделей', 'desc': 'Статья представляет единый взгляд на этапы обучения больших языковых моделей с использованием контролируемой доподготовки (SFT) и обучения с подкреплением (RL). Авторы детально анализируют цели, алгоритмические структуры и требования к данным для обеих методик, а также раскрывают их глубокую связь и взаимодополняемость. Исследование показывает, что гибридные подходы, объединяющие SFT и RL, становятся основным трендом в современном обучении LLM и демонстрируют лучшие результаты. На основе теоретического анализа и практических примеров из 2023-2025 годов авторы создают согласованную концепцию постобучения и определяют перспективы для будущих исследований в области масштабируемого и эффективного обучения языковых моделей.'}, 'en': {'title': 'Unifying Supervised Fine-Tuning and Reinforcement Learning for Enhanced LLM Performance', 'desc': 'This paper explores the post-training techniques for Large Language Models (LLMs), focusing on Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL). It highlights how these two methods, often seen as separate, are actually interconnected and can be combined for better performance. The authors provide a detailed analysis of their objectives, algorithms, and data needs, while also discussing hybrid training approaches that utilize both SFT and RL. By reviewing recent studies, the paper identifies trends and offers insights into when each method is most effective, paving the way for future advancements in LLM training.'}, 'zh': {'title': '统一视角下的后训练：SFT与RL的结合', 'desc': '预训练的大型语言模型（LLM）具有广泛的能力，但在特定任务或领域中，其准确性和推理的可靠性通常依赖于监督微调（SFT）或强化学习（RL）的后训练。尽管这两种方法常被视为独立的，但最近的理论和实证研究表明，SFT和RL之间存在密切的联系。本文提供了对LLM后训练的全面统一视角，深入分析了这两种技术的目标、算法结构和数据需求，并探讨了它们的相互作用。通过分析2023至2025年的应用研究，本文识别出新兴趋势，强调混合后训练范式的快速转变，并总结出关键要点，以阐明每种方法何时以及为何最有效。'}}}, {'id': 'https://huggingface.co/papers/2603.12743', 'title': 'MoKus: Leveraging Cross-Modal Knowledge Transfer for Knowledge-Aware Concept Customization', 'url': 'https://huggingface.co/papers/2603.12743', 'abstract': 'Abstract Knowledge-aware concept customization binds textual knowledge to visual concepts through a two-stage framework that learns visual anchors and updates textual knowledge for high-fidelity generation, supported by a new benchmark and cross-modal transfer capabilities.  \t\t\t\t\tAI-generated summary Concept customization typically binds rare tokens to a target concept. Unfortunately, these approaches often suffer from unstable performance as the pretraining data seldom contains these rare tokens. Meanwhile, these rare tokens fail to convey the inherent knowledge of the target concept. Consequently, we introduce Knowledge-aware Concept Customization, a novel task aiming at binding diverse textual knowledge to target visual concepts. This task requires the model to identify the knowledge within the text prompt to perform high-fidelity customized generation. Meanwhile, the model should efficiently bind all the textual knowledge to the target concept. Therefore, we propose MoKus, a novel framework for knowledge-aware concept customization. Our framework relies on a key observation: cross-modal knowledge transfer, where modifying knowledge within the text modality naturally transfers to the visual modality during generation. Inspired by this observation, MoKus contains two stages: (1) In visual concept learning, we first learn the anchor representation to store the visual information of the target concept. (2) In textual knowledge updating, we update the answer for the knowledge queries to the anchor representation, enabling high-fidelity customized generation. To further comprehensively evaluate our proposed MoKus on the new task, we introduce the first benchmark for knowledge-aware concept customization: KnowCusBench. Extensive evaluations have demonstrated that MoKus outperforms state-of-the-art methods. Moreover, the cross-model knowledge transfer allows MoKus to be easily extended to other knowledge-aware applications like virtual concept creation and concept erasure. We also demonstrate the capability of our method to achieve improvements on world knowledge benchmarks.', 'score': 1, 'issue_id': 1521, 'pub_date': '2026-03-13', 'pub_date_card': {'ru': '13 марта', 'en': 'March 13', 'zh': '3月13日'}, 'hash': '574c99583564832f', 'authors': ['Chenyang Zhu', 'Hongxiang Li', 'Xiu Li', 'Long Chen'], 'affiliations': ['HKUST', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.12743.jpg', 'data': {'categories': ['#transfer_learning', '#multimodal', '#benchmark', '#cv'], 'emoji': '🧠', 'ru': {'title': 'Связывание знаний с визуальными концепциями через кросс-модальную передачу', 'desc': 'В работе предлагается новый подход Knowledge-aware Concept Customization, который связывает текстовые знания с визуальными концепциями для высокофidelity генерации. Авторы представляют фреймворк MoKus с двумя этапами: обучение якорного представления для сохранения визуальной информации концепции и обновление текстовых знаний путем модификации ответов на запросы знаний. Ключевая идея основана на наблюдении о кросс-модальной передаче знаний, когда изменения в текстовой модальности естественным образом переносятся в визуальную при генерации. Для оценки предложенного метода введен новый бенчмарк KnowCusBench, и продемонстрирована применимость подхода к смежным задачам типа создания виртуальных концепций и удаления концепций.'}, 'en': {'title': 'Bridging Text and Visuals for Enhanced Concept Customization', 'desc': 'This paper introduces Knowledge-aware Concept Customization, a method that connects textual knowledge to visual concepts for better generation results. The proposed framework, MoKus, operates in two stages: first, it learns visual anchors to represent the target concepts, and second, it updates textual knowledge to enhance the generation process. By leveraging cross-modal knowledge transfer, MoKus effectively binds diverse textual information to visual representations, leading to high-fidelity outputs. The authors also present a new benchmark, KnowCusBench, to evaluate the performance of their method against existing approaches, showing significant improvements in various applications.'}, 'zh': {'title': '知识感知概念定制：视觉与文本的完美结合', 'desc': '知识感知概念定制是一种新任务，旨在将多样的文本知识与目标视觉概念绑定。我们提出了MoKus框架，通过两个阶段来实现这一目标：首先学习视觉概念的锚点表示，然后更新文本知识以实现高保真生成。该框架利用跨模态知识转移的特性，使得文本中的知识修改能够自然地转移到视觉生成中。通过引入新的基准KnowCusBench，我们的评估表明MoKus在性能上超越了现有的最先进方法，并且可以扩展到其他知识感知应用。'}}}, {'id': 'https://huggingface.co/papers/2603.15150', 'title': 'SNCE: Geometry-Aware Supervision for Scalable Discrete Image Generation', 'url': 'https://huggingface.co/papers/2603.15150', 'abstract': 'Abstract  Recent advancements in discrete image generation showed that scaling the VQ codebook size significantly improves reconstruction fidelity. However, training generative models with a large VQ codebook remains challenging, typically requiring larger model size and a longer training schedule. In this work, we propose Stochastic Neighbor Cross Entropy Minimization (SNCE), a novel training objective designed to address the optimization challenges of large-codebook discrete image generators. Instead of supervising the model with a hard one-hot target, SNCE constructs a soft categorical distribution over a set of neighboring tokens. The probability assigned to each token is proportional to the proximity between its code embedding and the ground-truth image embedding, encouraging the model to capture semantically meaningful geometric structure in the quantized embedding space. We conduct extensive experiments across class-conditional ImageNet-256 generation, large-scale text-to-image synthesis, and image editing tasks. Results show that SNCE significantly improves convergence speed and overall generation quality compared to standard cross-entropy objectives.', 'score': 0, 'issue_id': 1522, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': '5952510e19f11897', 'authors': ['Shufan Li', 'Jiuxiang Gu', 'Kangning Liu', 'Zhe Lin', 'Aditya Grover', 'Jason Kuen'], 'affiliations': ['Adobe', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2603.15150.jpg', 'data': {'categories': ['#architecture', '#optimization', '#cv', '#training', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Мягкое обучение дискретных генераторов через соседний кросс-энтропийный минимум', 'desc': 'В работе предложен новый метод обучения SNCE для дискретной генерации изображений с большим VQ кодбуком. Вместо использования жестких one-hot целей, метод строит мягкое вероятностное распределение над соседними токенами, где вероятность пропорциональна близости embeddings кодов. Это способствует обучению модели захватывать семантически значимую геометрическую структуру в квантованном пространстве embeddings. Эксперименты на ImageNet, text-to-image синтезе и задачах редактирования показали, что SNCE значительно улучшает скорость сходимости и качество генерации по сравнению со стандартной кросс-энтропией.'}, 'en': {'title': 'Enhancing Image Generation with SNCE: A New Training Approach', 'desc': 'This paper introduces Stochastic Neighbor Cross Entropy Minimization (SNCE), a new training method for generative models that use large vector quantization (VQ) codebooks. The traditional approach of using hard one-hot targets is replaced with a soft categorical distribution that considers the proximity of neighboring tokens. This allows the model to better understand the geometric relationships in the embedding space, leading to improved image generation quality. Experiments demonstrate that SNCE enhances both the speed of training and the fidelity of generated images across various tasks.'}, 'zh': {'title': '优化大代码本生成模型的新方法', 'desc': '最近在离散图像生成方面的进展表明，增大VQ代码本的大小可以显著提高重建的保真度。然而，使用大VQ代码本训练生成模型仍然具有挑战性，通常需要更大的模型和更长的训练时间。本文提出了一种新的训练目标——随机邻域交叉熵最小化（SNCE），旨在解决大代码本离散图像生成器的优化问题。SNCE通过构建邻近标记的软分类分布，而不是使用硬的独热目标，来指导模型，从而提高生成质量和收敛速度。'}}}, {'id': 'https://huggingface.co/papers/2603.14313', 'title': 'Mind the Shift: Decoding Monetary Policy Stance from FOMC Statements with Large Language Models', 'url': 'https://huggingface.co/papers/2603.14313', 'abstract': 'Abstract  Federal Open Market Committee (FOMC) statements are a major source of monetary-policy information, and even subtle changes in their wording can move global financial markets. A central task is therefore to measure the hawkish--dovish stance conveyed in these texts. Existing approaches typically treat stance detection as a standard classification problem, labeling each statement in isolation. However, the interpretation of monetary-policy communication is inherently relative: market reactions depend not only on the tone of a statement, but also on how that tone shifts across meetings. We introduce Delta-Consistent Scoring (DCS), an annotation-free framework that maps frozen large language model (LLM) representations to continuous stance scores by jointly modeling absolute stance and relative inter-meeting shifts. Rather than relying on manual hawkish--dovish labels, DCS uses consecutive meetings as a source of self-supervision. It learns an absolute stance score for each statement and a relative shift score between consecutive statements. A delta-consistency objective encourages changes in absolute scores to align with the relative shifts. This allows DCS to recover a temporally coherent stance trajectory without manual labels. Across four LLM backbones, DCS consistently outperforms supervised probes and LLM-as-judge baselines, achieving up to 71.1% accuracy on sentence-level hawkish--dovish classification. The resulting meeting-level scores are also economically meaningful: they correlate strongly with inflation indicators and are significantly associated with Treasury yield movements. Overall, the results suggest that LLM representations encode monetary-policy signals that can be recovered through relative temporal structure.', 'score': 0, 'issue_id': 1520, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': 'a0689cb0f571c249', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.14313.jpg', 'data': {'categories': ['#training', '#optimization'], 'emoji': '📊', 'ru': {'title': 'Разгадка монетарной политики через относительные временные сдвиги без разметки', 'desc': 'В работе предложен новый метод Delta-Consistent Scoring для определения тональности монетарной политики в заявлениях Федерального комитета по открытым рынкам без использования размеченных данных. Метод использует замороженные представления больших языковых моделей и моделирует одновременно абсолютную позицию и относительные изменения между последовательными заседаниями, создавая самоконтролируемую обучающую сигнал. Дельта-консистентность объективная функция стимулирует согласованность временной траектории позиций, позволяя восстановить монетарный тон без ручной разметки. Полученные оценки показывают сильную корреляцию с инфляционными показателями и существенную связь с движением доходности казначейских облигаций.'}, 'en': {'title': 'Understanding Monetary Policy Through Relative Tone Analysis', 'desc': 'This paper presents a new method called Delta-Consistent Scoring (DCS) for analyzing the tone of Federal Open Market Committee (FOMC) statements, which can influence financial markets. Instead of treating each statement as a separate classification task, DCS considers the relative changes in tone across different meetings. It uses large language models (LLMs) to generate continuous stance scores without needing manual labels, relying on the temporal structure of the statements. The results show that DCS effectively captures monetary-policy signals and correlates well with economic indicators, outperforming traditional supervised methods.'}, 'zh': {'title': '通过相对时间结构解码货币政策信号', 'desc': '本文介绍了一种新的方法，称为Delta-Consistent Scoring（DCS），用于分析美联储公开市场委员会（FOMC）声明中的鹰鸽立场。与传统的分类方法不同，DCS通过联合建模绝对立场和相对会议间的变化，来生成连续的立场评分，而无需手动标注。该方法利用连续会议作为自我监督的来源，学习每个声明的绝对立场分数和相邻声明之间的相对变化分数。实验结果表明，DCS在鹰鸽分类任务中表现优异，并且其生成的会议级别评分与经济指标有显著相关性。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        const categoryToggle = document.getElementById('category-toggle');
