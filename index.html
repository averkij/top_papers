 больших, высококачественных датасетах, генерируют более связные и реалистичные двуручные движения.'}, 'en': {'title': 'HandX: Advancing Bimanual Motion Synthesis with Rich Data and Metrics', 'desc': 'The paper introduces HandX, a new framework for generating realistic bimanual hand motions, addressing the lack of detailed datasets and evaluation methods in this area. It presents a novel dataset that captures intricate finger movements and interactions, which are essential for dexterous tasks. The authors also propose a unique annotation method that utilizes large language models to create rich descriptions of hand motions based on key features. Their experiments show that larger, well-trained models can generate more coherent and realistic hand movements, paving the way for future advancements in motion synthesis.'}, 'zh': {'title': '双手运动合成的新基础——HandX', 'desc': 'HandX是一个全面的双手运动合成基础，包含新的数据集、注释方法和评估指标，旨在生成灵巧的手部动作。尽管人类运动合成技术迅速发展，但真实的手部运动和双手交互仍然未被充分探索。现有的全身模型往往忽视了驱动灵巧行为的细微线索，如手指的动作、接触时机和双手协调，而现有资源缺乏高保真度的双手序列。为了解决这个问题，我们提出了HandX，整合了数据、注释和评估，提供了高质量的双手交互数据集，支持未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.28713', 'title': 'DreamLite: A Lightweight On-Device Unified Model for Image Generation and Editing', 'url': 'https://huggingface.co/papers/2603.28713', 'abstract': 'Abstract DreamLite is a compact unified on-device diffusion model that supports both text-to-image generation and text-guided image editing with efficient training and inference.  AI-generated summary Diffusion models have made significant progress in both text-to-image (T2I) generation and text-guided image editing. However, these models are typically built with billions of parameters, leading to high latency and increased deployment challenges. While on-device diffusion models improve efficiency, they largely focus on T2I generation and lack support for image editing. In this paper, we propose DreamLite, a compact unified on-device diffusion model (0.39B) that supports both T2I generation and text-guided image editing within a single network. DreamLite is built on a pruned mobile U-Net backbone and unifies conditioning through in-context spatial concatenation in the latent space. It concatenates images horizontally as input, using a (target | blank) configuration for generation tasks and (target | source) for editing tasks. To stabilize the training of this compact model, we introduce a task-progressive joint pretraining strategy that sequentially targets T2I, editing, and joint tasks. After high-quality SFT and reinforcement learning, DreamLite achieves GenEval (0.72) for image generation and ImgEdit (4.11) for image editing, outperforming existing on-device models and remaining competitive with several server-side models. By employing step distillation, we further reduce denoising processing to just 4 steps, enabling our DreamLite could generate or edit a 1024 x 1024 image in less than 1s on a Xiaomi 14 smartphone. To the best of our knowledge, DreamLite is the first unified on-device diffusion model that supports both image generation and image editing.', 'score': 9, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '1a0568222cdaf5df', 'authors': ['Kailai Feng', 'Yuxiang Wei', 'Bo Chen', 'Yang Pan', 'Hu Ye', 'Songwei Liu', 'Chenqian Yan', 'Yuan Gao'], 'affiliations': ['Intelligent Creation Lab, ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2603.28713.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#open_source', '#small_models', '#inference', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Мобильная диффузия: генерация и редактирование изображений на устройстве за одну секунду', 'desc': 'DreamLite — это компактная диффузионная модель размером 0.39B параметров, которая работает непосредственно на мобильных устройствах и поддерживает как генерацию изображений по текстовому описанию, так и редактирование изображений по текстовым указаниям. Модель построена на основе оптимизированной мобильной архитектуры U-Net и использует инновационный метод объединения изображений в скрытом пространстве (латентном пространстве) для унификации обеих задач. Для стабилизации обучения компактной модели авторы применили поэтапную стратегию предварительного обучения, последовательно оптимизирующую генерацию, редактирование и совместные задачи. DreamLite достигает конкурентных результатов с серверными моделями и способна генерировать или редактировать изображение размером 1024×1024 менее чем за одну секунду на смартфоне.'}, 'en': {'title': 'DreamLite: Fast and Unified AI for Image Creation and Editing', 'desc': 'DreamLite is a novel on-device diffusion model designed for both text-to-image (T2I) generation and text-guided image editing, featuring a compact architecture with only 0.39 billion parameters. It utilizes a pruned mobile U-Net backbone and employs in-context spatial concatenation in the latent space to unify the conditioning for both tasks. The model is trained using a task-progressive joint pretraining strategy, which enhances its performance in generating and editing images. With efficient denoising processing, DreamLite can produce or modify high-resolution images in under one second on mobile devices, making it a significant advancement in on-device AI capabilities.'}, 'zh': {'title': 'DreamLite：统一的设备端扩散模型，支持生成与编辑', 'desc': 'DreamLite是一种紧凑的统一设备端扩散模型，支持文本到图像生成和文本引导的图像编辑。与传统的扩散模型相比，DreamLite的参数量仅为0.39亿，显著降低了延迟和部署难度。该模型采用修剪的移动U-Net作为基础，通过在潜在空间中进行上下文空间拼接来统一条件。经过高质量的监督微调和强化学习，DreamLite在图像生成和编辑任务中表现优异，能够在小米14手机上以不到1秒的时间生成或编辑1024 x 1024的图像。'}}}, {'id': 'https://huggingface.co/papers/2603.27065', 'title': 'Story2Proposal: A Scaffold for Structured Scientific Paper Writing', 'url': 'https://huggingface.co/papers/2603.27065', 'abstract': 'Abstract Story2Proposal is a contract-governed multi-agent framework that generates structured scientific manuscripts with improved consistency and visual alignment through coordinated agents operating under a shared visual contract.  AI-generated summary Generating scientific manuscripts requires maintaining alignment between narrative reasoning, experimental evidence, and visual artifacts across the document lifecycle. Existing language-model generation pipelines rely on unconstrained text synthesis with validation applied only after generation, often producing structural drift, missing figures or tables, and cross-section inconsistencies. We introduce Story2Proposal, a contract-governed multi-agent framework that converts a research story into a structured manuscript through coordinated agents operating under a persistent shared visual contract. The system organizes architect, writer, refiner, and renderer agents around a contract state that tracks section structure and registered visual elements, while evaluation agents supply feedback in a generate evaluate adapt loop that updates the contract during generation. Experiments on tasks derived from the Jericho research corpus show that Story2Proposal achieved an expert evaluation score of 6.145 versus 3.963 for DirectChat (+2.182) across GPT, Claude, Gemini, and Qwen backbones. Compared with the structured generation baseline Fars, Story2Proposal obtained an average score of 5.705 versus 5.197, indicating improved structural consistency and visual alignment.', 'score': 8, 'issue_id': 1726, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': 'e413e0a958b3f66e', 'authors': ['Zhuoyang Qian', 'Wei Shi', 'Xu Lin', 'Li Ling', 'Meng Luo', 'Ziming Wang', 'Zhiwei Zhang', 'Tengyue Xu', 'Gaoge Liu', 'Zhentao Zhang', 'Shuo Zhang', 'Ziqi Wang', 'Zheng Feng', 'Yan Luo', 'Shu Xu', 'Yongjin Chen', 'Zhibo Feng', 'Zhuo Chen', 'Bruce Yuan', 'Biao Wu', 'Harry Wang', 'Kris Chen'], 'affiliations': ['AgentAlpha Team'], 'pdf_title_img': 'assets/pdf/title_img/2603.27065.jpg', 'data': {'categories': [], 'emoji': '📋', 'ru': {'title': 'Многоагентный контрактный фреймворк для согласованной генерации научных манускриптов', 'desc': 'Story2Proposal — это многоагентная система, управляемая контрактом, которая преобразует исследовательский сюжет в структурированный научный манускрипт через координированных агентов. Система использует общий визуальный контракт для отслеживания структуры секций и зарегистрированных визуальных элементов, что обеспечивает согласованность между нарративом, экспериментальными доказательствами и графическими материалами. Фреймворк реализует цикл генерации-оценки-адаптации, где агенты архитектора, писателя, редактора и визуализатора работают в координации с обратной связью от оценивающих агентов. Эксперименты показали значительное улучшение качества: система превзошла базовые подходы на 55% по оценкам экспертов и достигла лучшей структурной согласованности и визуального выравнивания.'}, 'en': {'title': 'Transforming Research Stories into Structured Manuscripts with Story2Proposal', 'desc': 'The paper presents Story2Proposal, a multi-agent framework designed to generate structured scientific manuscripts with better consistency and visual alignment. It addresses the common issues in existing language models, such as structural drift and missing visual elements, by using a contract-governed approach. This framework employs coordinated agents that work together under a shared visual contract to ensure that narrative, evidence, and visuals are aligned throughout the document creation process. Experimental results demonstrate that Story2Proposal significantly outperforms existing methods in terms of expert evaluation scores, indicating its effectiveness in producing high-quality scientific documents.'}, 'zh': {'title': '智能生成科学手稿的新方法', 'desc': 'Story2Proposal是一个基于合同的多智能体框架，旨在生成结构化的科学手稿。该系统通过协调的智能体在共享的视觉合同下工作，从而提高了一致性和视觉对齐。与传统的文本生成方法不同，Story2Proposal在生成过程中持续跟踪文档结构和视觉元素，确保各部分之间的协调。实验结果表明，Story2Proposal在结构一致性和视觉对齐方面优于现有的生成基线。'}}}, {'id': 'https://huggingface.co/papers/2603.26728', 'title': 'SEAR: Schema-Based Evaluation and Routing for LLM Gateways', 'url': 'https://huggingface.co/papers/2603.26728', 'abstract': 'Abstract SEAR is a schema-based system for evaluating and routing LLM responses that uses structured signals derived from LLM reasoning to enable accurate, interpretable routing decisions across multiple providers.  AI-generated summary Evaluating production LLM responses and routing requests across providers in LLM gateways requires fine-grained quality signals and operationally grounded decisions. To address this gap, we present SEAR, a schema-based evaluation and routing system for multi-model, multi-provider LLM gateways. SEAR defines an extensible relational schema covering both LLM evaluation signals (context, intent, response characteristics, issue attribution, and quality scores) and gateway operational metrics (latency, cost, throughput), with cross-table consistency links across around one hundred typed, SQL-queryable columns. To populate the evaluation signals reliably, SEAR proposes self-contained signal instructions, in-schema reasoning, and multi-stage generation that produces database-ready structured outputs. Because signals are derived through LLM reasoning rather than shallow classifiers, SEAR captures complex request semantics, enables human-interpretable routing explanations, and unifies evaluation and routing in a single query layer. Across thousands of production sessions, SEAR achieves strong signal accuracy on human-labeled data and supports practical routing decisions, including large cost reductions with comparable quality.', 'score': 6, 'issue_id': 1728, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'ed0e4a4dc28cbc5a', 'authors': ['Zecheng Zhang', 'Han Zheng', 'Yue Xu'], 'affiliations': ['Infron.AI', 'Strukto.AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.26728.jpg', 'data': {'categories': [], 'emoji': '🛣️', 'ru': {'title': 'Структурированная маршрутизация LLM-запросов через умные сигналы качества', 'desc': 'SEAR — это система для оценки и маршрутизации ответов больших языковых моделей, которая использует структурированную схему данных для хранения сигналов качества, операционных метрик и информации о рассуждениях модели. Система применяет многоэтапное генерирование структурированных выходов через LLM-рассуждения вместо простых классификаторов, что позволяет захватывать сложную семантику запросов. SEAR интегрирует оценку качества и маршрутизацию в единый слой запросов к базе данных с сотнями типизированных SQL-доступных столбцов. На производственных данных система демонстрирует высокую точность сигналов и поддерживает практические решения по маршрутизации, включая значительное снижение затрат при сохранении качества ответов.'}, 'en': {'title': 'SEAR: Smart Routing for LLM Responses', 'desc': 'SEAR is a system designed to evaluate and route responses from large language models (LLMs) effectively. It uses a structured schema to gather detailed quality signals from LLM reasoning, which helps in making informed routing decisions across different service providers. By integrating evaluation metrics and operational data, SEAR ensures that the routing process is both interpretable and efficient. The system has demonstrated high accuracy in signal generation and has led to significant cost savings while maintaining response quality.'}, 'zh': {'title': 'SEAR：智能路由与评估的统一解决方案', 'desc': 'SEAR是一个基于模式的系统，用于评估和路由大型语言模型（LLM）的响应。它利用LLM推理生成的结构化信号，帮助在多个提供者之间做出准确且可解释的路由决策。SEAR定义了一个可扩展的关系模式，涵盖了LLM评估信号和网关操作指标，确保了数据的一致性。通过自包含的信号指令和多阶段生成，SEAR能够可靠地填充评估信号，从而实现复杂请求语义的捕捉和人类可解释的路由解释。'}}}, {'id': 'https://huggingface.co/papers/2603.25926', 'title': 'Density-aware Soft Context Compression with Semi-Dynamic Compression Ratio', 'url': 'https://huggingface.co/papers/2603.25926', 'abstract': 'Abstract A density-aware dynamic compression framework for large language models that uses a discrete ratio selector to adaptively compress contexts based on information density, outperforming static methods in context compression tasks.  AI-generated summary Soft context compression reduces the computational workload of processing long contexts in LLMs by encoding long context into a smaller number of latent tokens. However, existing frameworks apply uniform compression ratios, failing to account for the extreme variance in natural language information density. While adopting a density-aware dynamic compression ratio seems intuitive, empirical investigations reveal that models struggle intrinsically with operations parameterized by input dependent, continuous structural hyperparameters. To resolve this pitfall, we introduce Semi-Dynamic Context Compression framework. Our approach features a Discrete Ratio Selector, which predicts a compression target based on intrinsic information density and quantizes it to a predefined set of discrete compression ratios. It is efficiently jointly trained with the compressor on synthetic data, with the summary lengths as a proxy to create labels for compression ratio prediction. Extensive evaluations confirm that our density-aware framework, utilizing mean pooling as the backbone, consistently outperforms static baselines, establishing a robust Pareto frontier for context compression techniques. Our code, data and model weights are available at https://github.com/yuyijiong/semi-dynamic-context-compress', 'score': 4, 'issue_id': 1726, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '0b3ad154da3863fc', 'authors': ['Yijiong Yu', 'Shuai Yuan', 'Jie Zheng', 'Huazheng Wang', 'Ji Pei'], 'affiliations': ['DeepSolution', 'Oregon State University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25926.jpg', 'data': {'categories': ['#synthetic', '#optimization', '#long_context', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Умное сжатие контекста через дискретный выбор коэффициента на основе плотности информации', 'desc': 'В статье предлагается фреймворк динамической компрессии контекста для больших языковых моделей, который адаптивно выбирает коэффициент сжатия на основе информационной плотности текста. Вместо применения одинакового коэффициента сжатия для всего контекста, авторы используют Discrete Ratio Selector для предсказания оптимального коэффициента, квантизируя его к предопределённому набору дискретных значений. Фреймворк Semi-Dynamic Context Compression совместно обучается на синтетических данных, где длины резюме служат прокси для создания меток предсказания коэффициента сжатия. Экспериментальные результаты показывают, что подход, основанный на информационной плотности, превосходит статические методы компрессии и устанавливает устойчивую границу Парето для методов сжатия контекста.'}, 'en': {'title': 'Adaptive Compression for Efficient Language Processing', 'desc': 'This paper presents a new method for compressing long contexts in large language models (LLMs) called the Semi-Dynamic Context Compression framework. It introduces a Discrete Ratio Selector that adapts the compression ratio based on the information density of the input, rather than using a fixed ratio. This approach allows for more efficient processing of natural language, which often has varying levels of information density. The results show that this density-aware method significantly outperforms traditional static compression techniques in context compression tasks.'}, 'zh': {'title': '密度感知动态压缩，提升上下文处理效率', 'desc': '本文提出了一种密度感知的动态压缩框架，用于大型语言模型的上下文压缩。该框架使用离散比率选择器，根据信息密度自适应地压缩上下文，优于静态压缩方法。通过对合成数据的联合训练，模型能够有效预测压缩目标，并量化为预定义的离散压缩比率。实验结果表明，该框架在上下文压缩任务中表现出色，建立了一个稳健的帕累托前沿。'}}}, {'id': 'https://huggingface.co/papers/2603.28696', 'title': 'AdaptToken: Entropy-based Adaptive Token Selection for MLLM Long Video Understanding', 'url': 'https://huggingface.co/papers/2603.28696', 'abstract': "Abstract AdaptToken enables efficient long-video understanding by using model uncertainty to dynamically select relevant tokens across video segments, achieving improved accuracy and reduced inference time through global budget allocation and early stopping mechanisms.  AI-generated summary Long video understanding remains challenging for Multi-modal Large Language Models (MLLMs) due to high memory costs and context-length limits. Prior approaches mitigate this by scoring and selecting frames/tokens within short clips, but they lack a principled mechanism to (i) compare relevance across distant video clips and (ii) stop processing once sufficient evidence has been gathered. We propose AdaptToken, a training-free framework that turns an MLLM's self-uncertainty into a global control signal for long-video token selection. AdaptToken splits a video into groups, extracts cross-modal attention to rank tokens within each group, and uses the model's response entropy to estimate each group's prompt relevance. This entropy signal enables a global token budget allocation across groups and further supports early stopping (AdaptToken-Lite), skipping the remaining groups when the model becomes sufficiently certain. Across four long-video benchmarks (VideoMME, LongVideoBench, LVBench, and MLVU) and multiple base MLLMs (7B-72B), AdaptToken consistently improves accuracy (e.g., +6.7 on average over Qwen2.5-VL 7B) and continues to benefit from extremely long inputs (up to 10K frames), while AdaptToken-Lite reduces inference time by about half with comparable performance. Project page: https://haozheqi.github.io/adapt-token", 'score': 3, 'issue_id': 1733, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '215af031ec5b8e23', 'authors': ['Haozhe Qi', 'Kevin Qu', 'Mahdi Rad', 'Rui Wang', 'Alexander Mathis', 'Marc Pollefeys'], 'affiliations': ['EPFL', 'ETH Zurich', 'Microsoft Spatial AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.28696.jpg', 'data': {'categories': ['#long_context', '#benchmark', '#optimization', '#inference', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Адаптивный выбор токенов: делай только то, что важно', 'desc': 'AdaptToken — это фреймворк без обучения для эффективного понимания длинных видео с использованием мультимодальных больших языковых моделей. Система использует неопределённость модели как глобальный управляющий сигнал для динамического выбора релевантных токенов из видеосегментов. Фреймворк разделяет видео на группы, ранжирует токены внутри каждой группы через кросс-модальное внимание и использует энтропию ответов модели для оценки релевантности каждой группы. Механизм глобального распределения бюджета токенов и ранняя остановка обработки позволяют значительно улучшить точность и сократить время инференса на длинных видеоинформациях.'}, 'en': {'title': 'Efficient Long-Video Understanding with AdaptToken', 'desc': 'AdaptToken is a novel framework designed to enhance the understanding of long videos by leveraging model uncertainty for efficient token selection. It addresses the challenges faced by Multi-modal Large Language Models (MLLMs) in processing lengthy video content by dynamically allocating a global budget for relevant tokens across different segments. By utilizing cross-modal attention and response entropy, AdaptToken ranks the importance of video segments and allows for early stopping when sufficient information is gathered. This approach not only improves accuracy significantly but also reduces inference time, making it suitable for processing extremely long video inputs.'}, 'zh': {'title': '高效长视频理解的自适应标记选择', 'desc': 'AdaptToken 是一种高效的长视频理解方法，通过利用模型的不确定性动态选择相关的标记，从而提高准确性并减少推理时间。该方法将视频分成多个组，提取跨模态注意力来对每组内的标记进行排名，并使用模型的响应熵来估计每组的提示相关性。AdaptToken 还支持全局预算分配和早期停止机制，当模型对某组的判断足够确定时，可以跳过后续处理。在多个长视频基准测试中，AdaptToken 显著提高了准确性，并在处理极长输入时表现出色，同时 AdaptToken-Lite 还将推理时间减少了一半。'}}}, {'id': 'https://huggingface.co/papers/2603.26610', 'title': 'Think over Trajectories: Leveraging Video Generation to Reconstruct GPS Trajectories from Cellular Signaling', 'url': 'https://huggingface.co/papers/2603.26610', 'abstract': 'Abstract Cellular signaling records are transformed into GPS trajectories through map-visual video generation, achieving superior performance over traditional methods while maintaining scalability and cross-city applicability.  AI-generated summary Mobile devices continuously interact with cellular base stations, generating massive volumes of signaling records that provide broad coverage for understanding human mobility. However, such records offer only coarse location cues (e.g., serving-cell identifiers) and therefore limit their direct use in applications that require high-precision GPS trajectories. This paper studies the Sig2GPS problem: reconstructing GPS trajectories from cellular signaling. Inspired by domain experts often lay the signaling trace on the map and sketch the corresponding GPS route, unlike conventional solutions that rely on complex multi-stage engineering pipelines or regress coordinates, Sig2GPS is reframed as an image-to-video generation task that directly operates in the map-visual domain: signaling traces are rendered on a map, and a video generation model is trained to draw a continuous GPS path. To support this paradigm, a paired signaling-to-trajectory video dataset is constructed to fine-tune an open-source video model, and a trajectory-aware reinforcement learning-based optimization method is introduced to improve generation fidelity via rewards. Experiments on large-scale real-world datasets show substantial improvements over strong engineered and learning-based baselines, while additional results on next GPS prediction indicate scalability and cross-city transferability. Overall, these results suggest that map-visual video generation provides a practical interface for trajectory data mining by enabling direct generation and refinement of continuous paths under map constraints.', 'score': 3, 'issue_id': 1726, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'dd1df58fc14e4542', 'authors': ['Ruixing Zhang', 'Hanzhang Jiang', 'Leilei Sun', 'Liangzhe Han', 'Jibin Wang', 'Weifeng Lv'], 'affiliations': ['China Mobile Information Technology Center', 'H3I, Beihang University', 'The State Key Laboratory of Complex and Critical Software Environment, Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.26610.jpg', 'data': {'categories': [], 'emoji': '🗺️', 'ru': {'title': 'От сигналов к пути: генерация GPS-траекторий как задача видеогенерации на карте', 'desc': 'В этой работе решается задача восстановления точных GPS-траекторий из сигналов сотовых вышек, которые содержат только грубую информацию о локации. Авторы переформулировали проблему как задачу генерации видео на основе изображений: сигналы отображаются на карте, а модель видеогенерации рисует непрерывный GPS-путь. Для обучения построен парный датасет сигналов и траекторий, а для улучшения качества используется обучение с подкреплением на основе специальных наград. Экспериментальные результаты на больших реальных датасетах показывают значительное улучшение над базовыми методами с хорошей масштабируемостью и переносимостью между городами.'}, 'en': {'title': 'Transforming Cellular Signals into Accurate GPS Trajectories', 'desc': 'This paper addresses the challenge of converting cellular signaling records into accurate GPS trajectories, a task known as the Sig2GPS problem. Traditional methods struggle with the coarse location data provided by cellular signals, but this study proposes a novel approach that treats the problem as an image-to-video generation task. By rendering signaling traces on a map and training a video generation model, the authors achieve high-fidelity GPS path generation. The results demonstrate significant improvements over existing methods, showcasing the potential for scalable and transferable applications across different cities.'}, 'zh': {'title': '从信号到GPS轨迹的创新生成方法', 'desc': '本论文研究了如何从蜂窝信号记录重建GPS轨迹，提出了一种新的方法称为Sig2GPS。与传统的复杂工程流程不同，该方法将信号轨迹映射到地图上，并通过视频生成模型直接生成连续的GPS路径。为了支持这一方法，研究者构建了一个配对的信号到轨迹视频数据集，并引入了基于强化学习的优化方法来提高生成的精度。实验结果表明，该方法在大规模真实数据集上显著优于现有的工程和学习基线，展示了其在不同城市间的可扩展性和适用性。'}}}, {'id': 'https://huggingface.co/papers/2603.28669', 'title': 'Superintelligence and Law', 'url': 'https://huggingface.co/papers/2603.28669', 'abstract': 'Abstract  The prospect of artificial superintelligence -- AI agents that can generally outperform humans in cognitive tasks and economically valuable activities -- will transform the legal order as we know it. Operating autonomously or under only limited human oversight, AI agents will assume a growing range of roles in the legal system. First, in making consequential decisions and taking real-world actions, AI agents will become de facto subjects of law. Second, to cooperate and compete with other actors (human or non-human), AI agents will harness conventional legal instruments and institutions such as contracts and courts, becoming consumers of law. Third, to the extent AI agents perform the functions of writing, interpreting, and administering law, they will become producers and enforcers of law. These developments, whenever they ultimately occur, will call into question fundamental assumptions in legal theory and doctrine, especially to the extent they ground the legitimacy of legal institutions in their human origins. Attempts to align AI agents with extant human law will also face new challenges as AI agents will not only be a primary target of law, but a core user of law and contributor to law. To contend with the advent of superintelligence, lawmakers -- new and old -- will need to be clear-eyed, recognizing both the opportunity to shape legal institutions as society braces for superintelligence and the reality that, in the longer run, this may be a joint human-AI endeavor.', 'score': 2, 'issue_id': 1726, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '30d048b58531aab8', 'authors': ['Noam Kolt'], 'affiliations': ['Hebrew University of Jerusalem', 'Institute for Law & AI', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2603.28669.jpg', 'data': {'categories': ['#agi', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Право в эпоху суперинтеллекта: от объекта регулирования к соавтору закона', 'desc': 'В статье рассматривается влияние искусственного суперинтеллекта на правовую систему. Автор утверждает, что автономные AI-агенты будут выступать в трёх ролях: как субъекты права, принимающие решения и совершающие действия; как потребители права, использующие контракты и судебные институты; как создатели и администраторы права. Эти перемены поставят под сомнение фундаментальные предположения юридической теории, особенно те, которые связывают легитимность правовых институтов с их человеческим происхождением. Законодатели должны активно участвовать в формировании правовых норм для управления суперинтеллектом, понимая, что будущее права может стать совместным предприятием человека и AI.'}, 'en': {'title': 'AI Agents: The New Players in the Legal System', 'desc': 'This paper discusses the impact of artificial superintelligence on the legal system, highlighting how AI agents will increasingly take on roles traditionally held by humans. As these AI agents operate with autonomy, they will become subjects of law, making significant decisions and actions. Furthermore, they will engage with legal frameworks, acting as consumers and producers of law, which challenges existing legal theories that rely on human origins. Lawmakers must adapt to this evolving landscape, recognizing the potential for collaboration between humans and AI in shaping future legal institutions.'}, 'zh': {'title': '人工智能与法律的未来挑战', 'desc': '这篇论文探讨了人工超级智能对法律秩序的影响。随着AI代理在法律系统中扮演越来越多的角色，它们将成为法律的实际主体。AI代理不仅会利用合同和法院等法律工具，还会参与法律的创作和执行。法律理论和制度的基本假设将面临挑战，立法者需要清晰认识到与超级智能共存的机会与现实。'}}}, {'id': 'https://huggingface.co/papers/2603.28458', 'title': 'HISA: Efficient Hierarchical Indexing for Fine-Grained Sparse Attention', 'url': 'https://huggingface.co/papers/2603.28458', 'abstract': 'Abstract HISA improves sparse attention efficiency by replacing the traditional indexer with a hierarchical approach that reduces computational complexity from O(L²) to sub-quadratic scaling while maintaining selection fidelity.  AI-generated summary Token-level sparse attention mechanisms, exemplified by DeepSeek Sparse Attention (DSA), achieve fine-grained key selection by scoring every historical token for each query using a lightweight indexer, and then computing attention only over the selected subset. While the downstream sparse attention scales efficiently, the indexer still scans the entire prefix for every query, introducing an O(L^2) per-layer bottleneck that becomes prohibitive as context length grows. We propose HISA (Hierarchical Indexed Sparse Attention), a drop-in replacement for the indexer that transforms the search process from a flat token scan into a two-stage hierarchical procedure. First, a block-level coarse filter scores pooled block representatives to prune irrelevant regions. Then, a token-level refinement applies the original indexer only within the remaining candidate blocks. HISA preserves the exact token-level top-k sparsity pattern required by the downstream Sparse MLA operator and requires no additional training. On kernel-level benchmarks, HISA achieves a 2times speedup at 32K context length and 4times at 128K. On Needle-in-a-Haystack and LongBench, we directly replace the indexer in DeepSeek-V3.2 with HISA, without any fine-tuning. HISA closely matches the original DSA in quality while significantly outperforming block-sparse baselines. Moreover, the token selection sets produced by HISA and the original DSA exhibit a mean IoU greater than 99%, indicating that the efficiency gains come with virtually no impact on selection fidelity.', 'score': 2, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '42ed26f2613429fc', 'authors': ['Yufei Xu', 'Fanxu Meng', 'Fan Jiang', 'Yuxuan Wang', 'Ruijie Zhou', 'Jiexi Wu', 'Zhixin Pan', 'Zhaohui Wang', 'Xiaojuan Tang', 'Wenjie Pei', 'Tongxuan Liu', 'Di yin', 'Xing Sun', 'Muhan Zhang'], 'affiliations': ['DeepSeek-AI', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2603.28458.jpg', 'data': {'categories': ['#inference', '#architecture', '#long_context', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Иерархический поиск для преодоления квадратичного узкого места в разреженном внимании', 'desc': 'В статье предлагается HISA — иерархический подход для оптимизации механизма разреженного внимания в больших языковых моделях. Вместо сканирования всех токенов истории с временной сложностью O(L²), метод использует двухэтапную процедуру: сначала блочный фильтр отсеивает нерелевантные регионы, затем токен-уровневая фильтрация применяется только к оставшимся кандидатам. Предложенный подход не требует переобучения и может быть напрямую использован как замена в существующих моделях, достигая ускорения в 2-4 раза на длинных контекстах. Качество выбора токенов остаётся практически идентичным оригинальному методу с индексом пересечения наборов более 99%.'}, 'en': {'title': 'HISA: Hierarchical Efficiency for Sparse Attention', 'desc': 'The paper introduces HISA, a new method for improving the efficiency of sparse attention mechanisms in machine learning. By using a hierarchical approach, HISA reduces the computational complexity of the traditional indexer from O(L²) to a more efficient sub-quadratic scaling. This method involves a two-stage process where a coarse filter first eliminates irrelevant blocks, followed by a refined selection of tokens within the remaining blocks. HISA maintains the accuracy of token selection while significantly speeding up the process, achieving up to 4 times faster performance without additional training.'}, 'zh': {'title': '层次化索引，提升稀疏注意力效率', 'desc': 'HISA（层次索引稀疏注意力）通过采用层次化的方法来提高稀疏注意力的效率，显著降低了计算复杂度，从O(L²)减少到亚二次规模，同时保持选择的准确性。该方法首先通过块级粗过滤器对汇总的块代表进行评分，以剔除不相关的区域，然后在剩余候选块内应用原始索引器进行细化。HISA在32K上下文长度下实现了2倍的加速，在128K上下文长度下实现了4倍的加速，且无需额外训练。实验结果表明，HISA在质量上与原始的DeepSeek稀疏注意力相近，同时在效率上显著优于块稀疏基线。'}}}, {'id': 'https://huggingface.co/papers/2603.28069', 'title': 'MolmoPoint: Better Pointing for VLMs with Grounding Tokens', 'url': 'https://huggingface.co/papers/2603.28069', 'abstract': 'Abstract A vision-language model approach for grounding that directly selects visual tokens containing target concepts through specialized pointing tokens, achieving superior performance in image, GUI, video pointing, and tracking tasks.  AI-generated summary Grounding has become a fundamental capability of vision-language models (VLMs). Most existing VLMs point by generating coordinates as part of their text output, which requires learning a complicated coordinate system and results in a high token count. Instead, we propose a more intuitive pointing mechanism that directly selects the visual tokens that contain the target concept. Our model generates a special pointing token that cross-attends to the input image or video tokens and selects the appropriate one. To make this model more fine-grained, we follow these pointing tokens with an additional special token that selects a fine-grained subpatch within the initially selected region, and then a third token that specifies a location within that subpatch. We further show that performance improves by generating points sequentially in a consistent order, encoding the relative position of the previously selected point, and including a special no-more-points class when selecting visual tokens. Using this method, we set a new state-of-the-art on image pointing (70.7% on PointBench), set a new state-of-the-art among fully open models on GUI pointing (61.1% on ScreenSpotPro), and improve video pointing (59.1% human preference win rate vs. a text coordinate baseline) and tracking (+6.3% gain on Molmo2Track). We additionally show that our method achieves much higher sample efficiency and discuss the qualitative differences that emerge from this design change.', 'score': 2, 'issue_id': 1725, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '21b05d7cd0ec8a99', 'authors': ['Christopher Clark', 'Yue Yang', 'Jae Sung Park', 'Zixian Ma', 'Jieyu Zhang', 'Rohun Tripathi', 'Mohammadreza Salehi', 'Sangho Lee', 'Taira Anderson', 'Winson Han', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.28069.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#cv', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Прямой выбор визуальных токенов вместо координат для точного указания в видеоязыковых моделях', 'desc': "В работе предложен новый подход к грaunding'у в видеоязыковых моделях, который вместо генерации координат напрямую выбирает визуальные токены, содержащие целевые концепции. Модель использует специальные pointing-токены с кроссаттеншеном к входным изображениям или видео, обеспечивая многоуровневую точность за счет последовательного выбора областей с уточняющими токенами. Метод демонстрирует значительные улучшения на бенчмарках для указания точек, GUI-навигации и отслеживания объектов в видео. Предложенный подход превосходит существующие решения по точности и эффективности использования данных."}, 'en': {'title': 'Revolutionizing Pointing in Vision-Language Models', 'desc': 'This paper presents a novel vision-language model that enhances the grounding process by using specialized pointing tokens to directly select visual tokens containing target concepts. Unlike traditional models that generate coordinates, which complicates the learning process, this approach simplifies pointing by allowing the model to cross-attend to image or video tokens. The model further refines its selections by using additional tokens to identify subpatches and specific locations within those patches. As a result, the proposed method achieves state-of-the-art performance in various tasks, demonstrating improved sample efficiency and qualitative outcomes.'}, 'zh': {'title': '直观指向，提升视觉-语言模型性能', 'desc': '本文提出了一种视觉-语言模型的方法，通过专门的指向标记直接选择包含目标概念的视觉标记，从而在图像、图形用户界面（GUI）、视频指向和跟踪任务中实现了优越的性能。与现有模型通过生成坐标来指向不同，我们的方法采用更直观的指向机制，直接选择包含目标概念的视觉标记。该模型生成一个特殊的指向标记，能够交叉关注输入的图像或视频标记，并选择合适的标记。通过按顺序生成点并编码相对位置，我们的方法在图像指向和GUI指向等任务上设定了新的最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.27040', 'title': 'Unified Number-Free Text-to-Motion Generation Via Flow Matching', 'url': 'https://huggingface.co/papers/2603.27040', 'abstract': "Abstract Unified Motion Flow decomposes motion generation into prior and reaction stages using hierarchical and probabilistic approaches to handle variable agent counts effectively.  AI-generated summary Generative models excel at motion synthesis for a fixed number of agents but struggle to generalize with variable agents. Based on limited, domain-specific data, existing methods employ autoregressive models to generate motion recursively, which suffer from inefficiency and error accumulation. We propose Unified Motion Flow (UMF), which consists of Pyramid Motion Flow (P-Flow) and Semi-Noise Motion Flow (S-Flow). UMF decomposes the number-free motion generation into a single-pass motion prior generation stage and multi-pass reaction generation stages. Specifically, UMF utilizes a unified latent space to bridge the distribution gap between heterogeneous motion datasets, enabling effective unified training. For motion prior generation, P-Flow operates on hierarchical resolutions conditioned on different noise levels, thereby mitigating computational overheads. For reaction generation, S-Flow learns a joint probabilistic path that adaptively performs reaction transformation and context reconstruction, alleviating error accumulation. Extensive results and user studies demonstrate UMF' s effectiveness as a generalist model for multi-person motion generation from text. Project page: https://githubhgh.github.io/umf/.", 'score': 2, 'issue_id': 1728, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'be0add06fca63f09', 'authors': ['Guanhe Huang', 'Oya Celiktutan'], 'affiliations': ['Kings College London'], 'pdf_title_img': 'assets/pdf/title_img/2603.27040.jpg', 'data': {'categories': ['#training', '#architecture', '#multimodal', '#open_source', '#diffusion'], 'emoji': '💃', 'ru': {'title': 'Универсальная генерация многоагентных движений через иерархические потоки', 'desc': 'Unified Motion Flow — это метод генерации движений множества агентов, который разбивает задачу на два этапа: генерацию априорного движения и генерацию реакционного движения. Авторы предложили использовать единое латентное пространство для объединения разнородных датасетов движений и преодоления разрыва распределений. Pyramid Motion Flow работает с иерархическими разрешениями при разных уровнях шума для эффективности, а Semi-Noise Motion Flow обучается совместному вероятностному пути для адаптивного преобразования реакций и реконструкции контекста. Метод решает проблему генерации движений переменного числа персонажей из текстового описания без аккумуляции ошибок, характерной для авторегрессивных моделей.'}, 'en': {'title': 'Unified Motion Flow: Efficient Multi-Agent Motion Generation', 'desc': 'Unified Motion Flow (UMF) is a novel approach to generating motion for multiple agents by breaking down the process into two main stages: prior generation and reaction generation. It addresses the challenge of variable agent counts by using a unified latent space that connects different motion datasets, allowing for more efficient training. The method employs Pyramid Motion Flow (P-Flow) for generating motion priors at various resolutions, which reduces computational costs. Additionally, Semi-Noise Motion Flow (S-Flow) focuses on refining the generated motion through probabilistic transformations, minimizing errors that can occur during the generation process.'}, 'zh': {'title': '统一运动流：高效的多代理运动生成', 'desc': '统一运动流（UMF）将运动生成分解为先验和反应阶段，采用分层和概率方法来有效处理可变数量的代理。现有的生成模型在固定数量的代理上表现良好，但在可变代理上泛化能力较差。UMF通过使用统一的潜在空间来弥合异构运动数据集之间的分布差距，从而实现有效的统一训练。该方法通过金字塔运动流（P-Flow）和半噪声运动流（S-Flow）来优化运动生成过程，减少计算开销并缓解错误累积。'}}}, {'id': 'https://huggingface.co/papers/2603.27341', 'title': 'A Comparative Study in Surgical AI: Datasets, Foundation Models, and Barriers to Med-AGI', 'url': 'https://huggingface.co/papers/2603.27341', 'abstract': "Abstract Current vision language models struggle with surgical tool detection despite large-scale training, indicating fundamental limitations beyond compute and data availability.  AI-generated summary Recent Artificial Intelligence (AI) models have matched or exceeded human experts in several benchmarks of biomedical task performance, but have lagged behind on surgical image-analysis benchmarks. Since surgery requires integrating disparate tasks -- including multimodal data integration, human interaction, and physical effects -- generally-capable AI models could be particularly attractive as a collaborative tool if performance could be improved. On the one hand, the canonical approach of scaling architecture size and training data is attractive, especially since there are millions of hours of surgical video data generated per year. On the other hand, preparing surgical data for AI training requires significantly higher levels of professional expertise, and training on that data requires expensive computational resources. These trade-offs paint an uncertain picture of whether and to-what-extent modern AI could aid surgical practice. In this paper, we explore this question through a case study of surgical tool detection using state-of-the-art AI methods available in 2026. We demonstrate that even with multi-billion parameter models and extensive training, current Vision Language Models fall short in the seemingly simple task of tool detection in neurosurgery. Additionally, we show scaling experiments indicating that increasing model size and training time only leads to diminishing improvements in relevant performance metrics. Thus, our experiments suggest that current models could still face significant obstacles in surgical use cases. Moreover, some obstacles cannot be simply ``scaled away'' with additional compute and persist across diverse model architectures, raising the question of whether data and label availability are the only limiting factors. We discuss the main contributors to these constraints and advance potential solutions.", 'score': 1, 'issue_id': 1732, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': 'bcf36c33d3af34b1', 'authors': ['Kirill Skobelev', 'Eric Fithian', 'Yegor Baranovski', 'Jack Cook', 'Sandeep Angara', 'Shauna Otto', 'Zhuang-Fang Yi', 'John Zhu', 'Daniel A. Donoho', 'X. Y. Han', 'Neeraj Mainkar', 'Margaux Masson-Forsythe'], 'affiliations': ['Center for Applied AI, Chicago Booth, Chicago, IL, USA', 'Childrens National Hospital, Washington D.C., USA', 'Operations Management & Tolan Center for Healthcare, Chicago Booth, Chicago, IL, USA', 'Surgical Data Science Collective, Washington D.C., USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.27341.jpg', 'data': {'categories': ['#video', '#cv', '#benchmark', '#multimodal', '#healthcare', '#science'], 'emoji': '🔬', 'ru': {'title': 'Пределы масштабирования: почему AI всё ещё не готов к хирургии', 'desc': 'Статья исследует возможности современных Vision Language Models (визуально-языковых моделей) в задаче обнаружения хирургических инструментов, которая остаётся сложной даже для моделей с миллиардами параметров. Авторы проводят масштабирующие эксперименты и демонстрируют, что увеличение размера модели и объёма данных приводит только к уменьшающимся улучшениям в показателях производительности. Исследование показывает, что некоторые фундаментальные ограничения в хирургических приложениях не могут быть преодолены простым масштабированием вычислительных ресурсов и требуют иных подходов. Работа ставит под сомнение убеждение, что недостаток данных и вычислительной мощности - единственные препятствия для применения AI в медицинской практике.'}, 'en': {'title': 'Overcoming AI Limitations in Surgical Tool Detection', 'desc': "This paper investigates the challenges faced by current vision language models in detecting surgical tools, particularly in neurosurgery. Despite advancements in AI and the availability of large datasets, these models struggle to perform effectively in surgical contexts due to the complexity of integrating multimodal data and the need for expert knowledge in data preparation. The authors find that simply increasing model size and training time yields only marginal improvements, indicating that fundamental limitations exist beyond just data and compute resources. The study highlights the need for innovative solutions to overcome these obstacles and improve AI's role in surgical practice."}, 'zh': {'title': '外科工具检测中的AI挑战与机遇', 'desc': '当前的视觉语言模型在外科工具检测方面表现不佳，尽管经过大规模训练，这表明其存在超出计算和数据可用性的基本限制。尽管现代人工智能模型在生物医学任务中已达到或超过人类专家的水平，但在外科图像分析基准测试中仍然落后。我们通过对外科工具检测的案例研究，探讨了2026年可用的先进人工智能方法，发现即使是数十亿参数的模型和广泛的训练，当前的视觉语言模型在神经外科工具检测这一看似简单的任务上仍然不足。我们的实验表明，增加模型规模和训练时间只会导致相关性能指标的微小改善，暗示当前模型在外科应用中仍面临重大障碍。'}}}, {'id': 'https://huggingface.co/papers/2603.27055', 'title': 'Text Data Integration', 'url': 'https://huggingface.co/papers/2603.27055', 'abstract': 'Abstract  Data comes in many forms. From a shallow perspective, they can be viewed as being either in structured (e.g., as a relation, as key-value pairs) or unstructured (e.g., text, image) formats. So far, machines have been fairly good at processing and reasoning over structured data that follows a precise schema. However, the heterogeneity of data poses a significant challenge on how well diverse categories of data can be meaningfully stored and processed. Data Integration, a crucial part of the data engineering pipeline, addresses this by combining disparate data sources and providing unified data access to end-users. Until now, most data integration systems have leaned on only combining structured data sources. Nevertheless, unstructured data (a.k.a. free text) also contains a plethora of knowledge waiting to be utilized. Thus, in this chapter, we firstly make the case for the integration of textual data, to later present its challenges, state of the art and open problems.', 'score': 1, 'issue_id': 1732, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': 'bc4c24b87c4be0bc', 'authors': ['Md Ataur Rahman', 'Dimitris Sacharidis', 'Oscar Romero', 'Sergi Nadal'], 'affiliations': ['Universitat Politècnica de Catalunya'], 'pdf_title_img': 'assets/pdf/title_img/2603.27055.jpg', 'data': {'categories': [], 'emoji': '🔀', 'ru': {'title': 'Объединение структурированных и неструктурированных данных для единого доступа', 'desc': 'Статья рассматривает проблему интеграции разнородных данных, включая как структурированные, так и неструктурированные источники, в частности текстовые данные. Авторы указывают на то, что традиционные системы интеграции данных сосредоточены только на структурированной информации, игнорируя богатый потенциал текстовых документов. В работе обосновывается необходимость включения текстовых данных в процесс интеграции и рассматриваются основные вызовы этой задачи. Авторы также описывают современное состояние исследований и определяют нерешённые проблемы в области интеграции текстовых и структурированных данных.'}, 'en': {'title': 'Unlocking Knowledge: Integrating Structured and Unstructured Data', 'desc': 'This paper discusses the importance of integrating both structured and unstructured data in machine learning. While machines excel at processing structured data, unstructured data like text and images present unique challenges. The authors emphasize that unstructured data holds valuable information that can enhance data analysis and decision-making. They outline the current state of data integration systems and highlight the need for improved methods to effectively combine these diverse data types.'}, 'zh': {'title': '数据集成：连接结构化与非结构化数据的桥梁', 'desc': '数据有多种形式，可以分为结构化数据（如关系、键值对）和非结构化数据（如文本、图像）。机器在处理遵循精确模式的结构化数据方面表现良好，但数据的异构性给存储和处理不同类别的数据带来了挑战。数据集成是数据工程流程中的关键部分，它通过结合不同的数据源来提供统一的数据访问。本文首先论证了文本数据集成的重要性，随后讨论了其面临的挑战、现状和未解决的问题。'}}}, {'id': 'https://huggingface.co/papers/2603.27048', 'title': 'MOOZY: A Patient-First Foundation Model for Computational Pathology', 'url': 'https://huggingface.co/papers/2603.27048', 'abstract': 'Abstract A patient-first pathology foundation model named MOOZY uses a case transformer to model dependencies across multiple slides from the same patient, achieving superior performance on diverse clinical tasks through open, reproducible pretraining.  AI-generated summary Computational pathology needs whole-slide image (WSI) foundation models that transfer across diverse clinical tasks, yet current approaches remain largely slide-centric, often depend on private data and expensive paired-report supervision, and do not explicitly model relationships among multiple slides from the same patient. We present MOOZY, a patient-first pathology foundation model in which the patient case, not the individual slide, is the core unit of representation. MOOZY explicitly models dependencies across all slides from the same patient via a case transformer during pretraining, combining multi-stage open self-supervision with scaled low-cost task supervision. In Stage 1, we pretrain a vision-only slide encoder on 77,134 public slide feature grids using masked self-distillation. In Stage 2, we align these representations with clinical semantics using a case transformer and multi-task supervision over 333 tasks from 56 public datasets, including 205 classification and 128 survival tasks across four endpoints. Across eight held-out tasks with five-fold frozen-feature probe evaluation, MOOZY achieves best or tied-best performance on most metrics and improves macro averages over TITAN by +7.37%, +5.50%, and +7.83% and over PRISM by +8.83%, +10.70%, and +9.78% for weighted F1, weighted ROC-AUC, and balanced accuracy, respectively. MOOZY is also parameter efficient with 85.77M parameters, 14x smaller than GigaPath. These results demonstrate that open, reproducible patient-level pretraining yields transferable embeddings, providing a practical path toward scalable patient-first histopathology foundation models.', 'score': 1, 'issue_id': 1725, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'ae6a3934304e4557', 'authors': ['Yousef Kotp', 'Vincent Quoc-Huy Trinh', 'Christopher Pal', 'Mahdi S. Hosseini'], 'affiliations': ['CHUM, Université de Montréal, Montréal, Canada', 'CSSE, Concordia University, Montréal, Canada', 'Canada CIFAR Chair, Polytechnique Montréal, Montréal, Canada', 'Dept. of Pathology, McGill University, Montréal, Canada', 'IRIC, Université de Montréal, Montréal, Canada', 'Mila Québec AI Institute, Montréal, Canada', 'Université de Montréal, Montréal, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.27048.jpg', 'data': {'categories': ['#training', '#architecture', '#dataset', '#benchmark', '#healthcare'], 'emoji': '🔬', 'ru': {'title': 'Пациент в центре: foundation model для гистопатологии со слайд-зависимостями', 'desc': 'MOOZY — это foundation model для гистопатологии, которая моделирует зависимости между несколькими слайдами одного пациента, используя case transformer вместо традиционного подхода, ориентированного на отдельные слайды. Модель обучена на открытых данных в два этапа: сначала vision encoder претренируется на 77 тысячах публичных слайдов методом masked self-distillation, затем case transformer выравнивается с клинической семантикой через мультизадачное обучение на 333 задачах. Модель показывает лучшие или сравнимые результаты с существующими подходами, улучшая метрики на 7-10% и имея в 14 раз меньше параметров, чем конкурирующие решения. Этот пациент-центричный подход демонстрирует, что открытое воспроизводимое обучение на уровне пациента создаёт переносимые представления для разнообразных клинических задач.'}, 'en': {'title': 'MOOZY: Transforming Pathology with Patient-Centric Modeling', 'desc': 'MOOZY is a novel pathology foundation model designed to prioritize patient cases over individual slides, addressing limitations in current computational pathology methods. It utilizes a case transformer to effectively model relationships among multiple slides from the same patient, enhancing performance across various clinical tasks. The model undergoes a two-stage pretraining process, first using masked self-distillation on a large dataset of slide feature grids, followed by aligning these representations with clinical semantics through multi-task supervision. MOOZY demonstrates superior performance metrics compared to existing models, while being more parameter efficient, showcasing the potential of patient-first approaches in histopathology.'}, 'zh': {'title': '以患者为中心的病理模型MOOZY', 'desc': 'MOOZY是一种以患者为中心的病理基础模型，使用案例变换器来建模同一患者的多张切片之间的依赖关系。该模型通过开放和可重复的预训练，在多种临床任务中表现出色。MOOZY在预训练阶段结合了多阶段的自我监督和低成本的任务监督，显著提高了模型的性能。与现有方法相比，MOOZY在参数效率上也表现优异，展示了以患者为中心的病理模型的可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2603.28480', 'title': 'INSID3: Training-Free In-Context Segmentation with DINOv3', 'url': 'https://huggingface.co/papers/2603.28480', 'abstract': 'Abstract INSID3 demonstrates that frozen DINOv3 features can support versatile segmentation tasks without supervision or auxiliary models, achieving superior performance with reduced parameters.  AI-generated summary In-context segmentation (ICS) aims to segment arbitrary concepts, e.g., objects, parts, or personalized instances, given one annotated visual examples. Existing work relies on (i) fine-tuning vision foundation models (VFMs), which improves in-domain results but harms generalization, or (ii) combines multiple frozen VFMs, which preserves generalization but yields architectural complexity and fixed segmentation granularities. We revisit ICS from a minimalist perspective and ask: Can a single self-supervised backbone support both semantic matching and segmentation, without any supervision or auxiliary models? We show that scaled-up dense self-supervised features from DINOv3 exhibit strong spatial structure and semantic correspondence. We introduce INSID3, a training-free approach that segments concepts at varying granularities only from frozen DINOv3 features, given an in-context example. INSID3 achieves state-of-the-art results across one-shot semantic, part, and personalized segmentation, outperforming previous work by +7.5 % mIoU, while using 3x fewer parameters and without any mask or category-level supervision. Code is available at https://github.com/visinf/INSID3 .', 'score': 0, 'issue_id': 1738, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '6db2ed55b6366514', 'authors': ['Claudia Cuttano', 'Gabriele Trivigno', 'Christoph Reich', 'Daniel Cremers', 'Carlo Masone', 'Stefan Roth'], 'affiliations': ['ELIZA', 'MCML', 'Politecnico di Torino', 'TU Darmstadt', 'TU Munich', 'hessian.AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.28480.jpg', 'data': {'categories': ['#cv', '#architecture'], 'emoji': '🎯', 'ru': {'title': 'Одна модель для всех: универсальная сегментация без обучения на замороженных признаках DINOv3', 'desc': 'INSID3 демонстрирует, что замороженные признаки DINOv3 могут поддерживать разнообразные задачи сегментации без обучения и вспомогательных моделей. Подход основан на использовании плотных самообучаемых признаков, которые обладают сильной пространственной структурой и семантической соответственностью. Метод достигает сегментации концепций с различной детализацией (объекты, части, персонализированные экземпляры) только из одного примера аннотации. INSID3 превосходит существующие методы на +7.5% mIoU, используя при этом в 3 раза меньше параметров без необходимости в маскировании или разметке категорий.'}, 'en': {'title': 'Effortless Segmentation with Frozen DINOv3 Features', 'desc': 'The paper presents INSID3, a method that utilizes frozen DINOv3 features for segmentation tasks without the need for supervision or additional models. It addresses the limitations of existing methods that either require fine-tuning or combine multiple models, which can complicate the architecture. INSID3 leverages self-supervised learning to achieve effective semantic matching and segmentation at various levels of detail. The results show a significant improvement in performance, achieving state-of-the-art results while using fewer parameters and no supervision.'}, 'zh': {'title': '无监督分割的新突破：INSID3', 'desc': 'INSID3展示了冻结的DINOv3特征可以支持多种分割任务，而无需监督或辅助模型，且在参数减少的情况下实现了卓越的性能。该方法通过自监督学习的特征，能够在不同的粒度上进行概念分割，且不需要额外的训练过程。INSID3在一次性语义分割、部分分割和个性化分割任务中，超越了之前的研究，提升了7.5%的mIoU，同时使用的参数减少了三倍。该研究表明，单一的自监督骨干网络可以有效支持语义匹配和分割。'}}}, {'id': 'https://huggingface.co/papers/2603.27703', 'title': 'KAT-Coder-V2 Technical Report', 'url': 'https://huggingface.co/papers/2603.27703', 'abstract': 'Abstract KAT-Coder-V2 employs a specialized-agentic approach with domain-specific fine-tuning and reinforcement learning, enhanced by novel training methods and infrastructure for improved code generation performance.  AI-generated summary We present KAT-Coder-V2, an agentic coding model developed by the KwaiKAT team at Kuaishou. KAT-Coder-V2 adopts a "Specialize-then-Unify" paradigm that decomposes agentic coding into five expert domains - SWE, WebCoding, Terminal, WebSearch, and General - each undergoing independent supervised fine-tuning and reinforcement learning, before being consolidated into a single model via on-policy distillation. We develop KwaiEnv, a modular infrastructure sustaining tens of thousands of concurrent sandbox instances, and scale RL training along task complexity, intent alignment, and scaffold generalization. We further propose MCLA for stabilizing MoE RL training and Tree Training for eliminating redundant computation over tree-structured trajectories with up to 6.2x speedup. KAT-Coder-V2 achieves 79.6% on SWE-bench Verified (vs. Claude Opus 4.6 at 80.8%), 88.7 on PinchBench (surpassing GLM-5 and MiniMax M2.7), ranks first across all three frontend aesthetics scenarios, and maintains strong generalist scores on Terminal-Bench Hard (46.8) and tau^2-Bench (93.9). Our model is publicly available at https://streamlake.com/product/kat-coder.', 'score': 0, 'issue_id': 1728, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '71d56e9a31206dfc', 'authors': ['Fengxiang Li', 'Han Zhang', 'Haoyang Huang', 'Jinghui Wang', 'Jinhua Hao', 'Kun Yuan', 'Mengtong Li', 'Minglei Zhang', 'Pengcheng Xu', 'Wenhao Zhuang', 'Yizhen Shao', 'Zongxian Feng', 'Can Tang', 'Chao Wang', 'Chengxiao Tong', 'Fan Yang', 'Gang Xiong', 'Haixuan Gao', 'Han Gao', 'Hao Wang', 'Haochen Liu', 'Hongliang Sun', 'Jiabao Li', 'Jingwen Chang', 'Jun Du', 'Junyi Peng', 'Leizhen Cui', 'Meimei Jing', 'Mingqi Wu', 'Shangpeng Yan', 'Shaotong Qi', 'Suzhe Xu', 'Wenxuan Zhao', 'Xianda Sun', 'Xuan Xie', 'Yanbo Wang', 'Yao Xia', 'Yinghan Cui', 'Yingpeng Chen', 'Yong Wang', 'Yuze Shi', 'Zhiwei Shen', 'Ziyu Wang', 'Ming Sun', 'Lin Ye', 'Bin Chen'], 'affiliations': ['Kuaishou'], 'pdf_title_img': 'assets/pdf/title_img/2603.27703.jpg', 'data': {'categories': ['#plp', '#agents', '#training', '#rl', '#benchmark'], 'emoji': '🚀', 'ru': {'title': 'Специалисты в команде: от экспертов к универсальному кодировщику', 'desc': "KAT-Coder-V2 — это агентный кодировочный LLM, разработанный компанией Kuaishou, который использует парадигму «специализация-затем-унификация» для разложения задач кодирования на пять экспертных доменов. Каждый домен независимо обучается с помощью supervised fine-tuning и reinforcement learning, а затем все доменные эксперты объединяются в единую модель через on-policy distillation. Авторы разработали специализированную инфраструктуру KwaiEnv для масштабирования RL тренировки и предложили MCLA для стабилизации обучения смешанных экспертов, а также Tree Training для оптимизации вычислений. Модель достигла выдающихся результатов на benchmark'ах SWE-bench Verified (79.6%) и других задачах, конкурируя с лучшими коммерческими решениями."}, 'en': {'title': 'Specialized Agents for Superior Code Generation', 'desc': 'KAT-Coder-V2 is an advanced coding model that uses a specialized-agentic approach to enhance code generation. It breaks down the coding tasks into five expert domains, each trained separately using supervised fine-tuning and reinforcement learning, before merging them into a unified model. The model leverages a unique infrastructure called KwaiEnv, which allows for extensive concurrent training and improves efficiency through techniques like MCLA and Tree Training. As a result, KAT-Coder-V2 demonstrates impressive performance metrics, outperforming several existing models in various coding benchmarks.'}, 'zh': {'title': 'KAT-Coder-V2：专业化编码的未来', 'desc': 'KAT-Coder-V2 是一种专门的编码模型，采用了领域特定的微调和强化学习方法，以提高代码生成的性能。该模型通过“专业化-再统一”的范式，将编码任务分解为五个专家领域，分别是软件工程、网页编码、终端、网页搜索和通用领域。每个领域都经过独立的监督微调和强化学习，最后通过策略蒸馏整合为一个单一模型。KAT-Coder-V2 在多个基准测试中表现优异，显示出其在代码生成方面的强大能力。'}}}, {'id': 'https://huggingface.co/papers/2603.27593', 'title': 'STRIDE: When to Speak Meets Sequence Denoising for Streaming Video Understanding', 'url': 'https://huggingface.co/papers/2603.27593', 'abstract': 'Abstract STRIDE enables proactive video understanding by modeling temporal activation patterns through iterative denoising within sliding windows, improving timing decisions in streaming scenarios.  AI-generated summary Recent progress in video large language models (Video-LLMs) has enabled strong offline reasoning over long and complex videos. However, real-world deployments increasingly require streaming perception and proactive interaction, where video frames arrive online and the system must decide not only what to respond, but also when to respond. In this work, we revisit proactive activation in streaming video as a structured sequence modeling problem, motivated by the observation that temporal transitions in streaming video naturally form span-structured activation patterns. To capture this span-level structure, we model activation signals jointly over a sliding temporal window and update them iteratively as new frames arrive. We propose STRIDE (Structured Temporal Refinement with Iterative DEnoising), which employs a lightweight masked diffusion module at the activation interface to jointly predict and progressively refine activation signals across the window. Extensive experiments on diverse streaming benchmarks and downstream models demonstrate that STRIDE shows more reliable and temporally coherent proactive responses, significantly improving when-to-speak decision quality in online streaming scenarios.', 'score': 0, 'issue_id': 1736, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': '41d0b35796e9ca4b', 'authors': ['Junho Kim', 'Hosu Lee', 'James M. Rehg', 'Minsu Kim', 'Yong Man Ro'], 'affiliations': ['Google DeepMind', 'KAIST', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2603.27593.jpg', 'data': {'categories': ['#multimodal', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Структурированное уточнение: когда говорить в потоковом видео', 'desc': 'STRIDE — это метод для проактивного понимания видео в потоковых сценариях, который моделирует временные паттерны активации через итеративное денойзирование в скользящих окнах. Подход рассматривает активацию как структурированную задачу последовательного моделирования, где временные переходы в видео образуют паттерны типа span-структур. Модель использует облегченный masked diffusion модуль для совместного предсказания и прогрессивного уточнения сигналов активации по временному окну. Метод демонстрирует улучшение качества решений о времени ответа на видео в онлайн-сценариях с поточным поступлением кадров.'}, 'en': {'title': 'Proactive Video Understanding with STRIDE', 'desc': 'The paper introduces STRIDE, a method for enhancing video understanding in real-time streaming scenarios by focusing on temporal activation patterns. It addresses the challenge of making timely decisions about when to respond to incoming video frames. STRIDE employs a structured sequence modeling approach, utilizing a sliding window to iteratively refine activation signals as new frames are processed. The results show that STRIDE significantly improves the quality of proactive responses in streaming applications, making it more effective for real-world deployments.'}, 'zh': {'title': 'STRIDE：提升流媒体视频理解的主动性', 'desc': 'STRIDE是一种新方法，通过在滑动窗口内进行迭代去噪，建模视频的时间激活模式，从而实现主动的视频理解。该方法关注于流媒体场景中的时机决策，能够在视频帧实时到达时，决定何时以及如何响应。STRIDE通过联合建模滑动时间窗口内的激活信号，并在新帧到达时进行迭代更新，捕捉时间过渡的结构化特征。实验结果表明，STRIDE在流媒体基准测试中表现出更可靠和时间一致的主动响应，显著提高了在线流媒体场景中的何时发言决策质量。'}}}];

                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-31 21:32',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-31 21:32')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-31 21:32')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
