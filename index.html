    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.04379', 'title': 'Helios: Real Real-Time Long Video Generation Model', 'url': 'https://huggingface.co/papers/2603.04379', 'abstract': 'Abstract Helios is a 14 billion parameter autoregressive diffusion model for video generation that achieves real-time performance and high-quality long-video synthesis without conventional optimization techniques.  \t\t\t\t\tAI-generated summary We introduce Helios, the first 14B video generation model that runs at 19.5 FPS on a single NVIDIA H100 GPU and supports minute-scale generation while matching the quality of a strong baseline. We make breakthroughs along three key dimensions: (1) robustness to long-video drifting without commonly used anti-drifting heuristics such as self-forcing, error-banks, or keyframe sampling; (2) real-time generation without standard acceleration techniques such as KV-cache, sparse/linear attention, or quantization; and (3) training without parallelism or sharding frameworks, enabling image-diffusion-scale batch sizes while fitting up to four 14B models within 80 GB of GPU memory. Specifically, Helios is a 14B autoregressive diffusion model with a unified input representation that natively supports T2V, I2V, and V2V tasks. To mitigate drifting in long-video generation, we characterize typical failure modes and propose simple yet effective training strategies that explicitly simulate drifting during training, while eliminating repetitive motion at its source. For efficiency, we heavily compress the historical and noisy context and reduce the number of sampling steps, yielding computational costs comparable to -- or lower than -- those of 1.3B video generative models. Moreover, we introduce infrastructure-level optimizations that accelerate both inference and training while reducing memory consumption. Extensive experiments demonstrate that Helios consistently outperforms prior methods on both short- and long-video generation. We plan to release the code, base model, and distilled model to support further development by the community.', 'score': 13, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'd756ce8a3694d17a', 'authors': ['Shenghai Yuan', 'Yuanyang Yin', 'Zongjian Li', 'Xinwei Huang', 'Xiao Yang', 'Li Yuan'], 'affiliations': ['ByteDance', 'Canva', 'Chengdu Anu Intelligence', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04379.jpg', 'data': {'categories': ['#video', '#inference', '#training', '#open_source', '#optimization', '#diffusion', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Реальное видео за секунды: диффузия без компромиссов', 'desc': 'Helios — это авторегрессионная диффузионная модель для генерации видео с 14 миллиардами параметров, которая работает в реальном времени (19.5 FPS) на одном GPU. Модель решает проблему дрейфа содержимого в длинных видео через специальные стратегии обучения, имитирующие дрейф, без использования традиционных приёмов типа self-forcing и keyframe sampling. Архитектура с единым представлением входных данных поддерживает несколько задач: генерацию из текста (T2V), из изображения (I2V) и видео (V2V). Благодаря сжатию исторического контекста и оптимизациям на уровне инфраструктуры, модель достигает вычислительной эффективности сравнимой с моделями в 10 раз меньшего размера.'}, 'en': {'title': 'Helios: Real-Time Video Generation Revolutionized', 'desc': 'Helios is a cutting-edge video generation model with 14 billion parameters that operates in real-time, producing high-quality long videos without traditional optimization methods. It excels in generating minute-long videos at 19.5 frames per second on a single NVIDIA H100 GPU, while avoiding common issues like drifting and repetitive motion. The model employs innovative training strategies to simulate drifting and compresses context to enhance efficiency, achieving performance comparable to smaller models. Helios supports various tasks including text-to-video and image-to-video generation, and outperforms existing methods in extensive experiments, with plans for community access to its resources.'}, 'zh': {'title': 'Helios：高效视频生成的新突破', 'desc': 'Helios是一个具有140亿参数的自回归扩散模型，专注于视频生成。它能够在单个NVIDIA H100 GPU上以19.5帧每秒的速度实时生成高质量的长视频，而无需传统的优化技术。该模型在长视频漂移的鲁棒性、实时生成能力和训练效率上取得了突破，能够处理多种输入任务。实验结果表明，Helios在短视频和长视频生成方面均优于之前的方法。'}}}, {'id': 'https://huggingface.co/papers/2603.04257', 'title': 'Memex(RL): Scaling Long-Horizon LLM Agents via Indexed Experience Memory', 'url': 'https://huggingface.co/papers/2603.04257', 'abstract': 'Abstract A memory mechanism called Memex enables large language model agents to handle long-horizon tasks more effectively by maintaining compact context through structured summaries while storing full interaction details in an external database, allowing selective retrieval based on learned criteria.  \t\t\t\t\tAI-generated summary Large language model (LLM) agents are fundamentally bottlenecked by finite context windows on long-horizon tasks. As trajectories grow, retaining tool outputs and intermediate reasoning in-context quickly becomes infeasible: the working context becomes prohibitively long, eventually exceeds the context budget, and makes distant evidence harder to use even when it is still present. Existing solutions typically shorten context through truncation or running summaries, but these methods are fundamentally lossy because they compress or discard past evidence itself. We introduce Memex, an indexed experience memory mechanism that instead compresses context without discarding evidence. Memex maintains a compact working context consisting of concise structured summaries and stable indices, while storing full-fidelity underlying interactions in an external experience database under those indices. The agent can then decide when to dereference an index and recover the exact past evidence needed for the current subgoal. We optimize both write and read behaviors with our reinforcement learning framework MemexRL, using reward shaping tailored to indexed memory usage under a context budget, so the agent learns what to summarize, what to archive, how to index it, and when to retrieve it. This yields a substantially less lossy form of long-horizon memory than summary-only approaches. We further provide a theoretical analysis showing the potential of the Memex loop to preserve decision quality with bounded dereferencing while keeping effective in-context computation bounded as history grows. Empirically, on challenging long-horizon tasks, Memex agent trained with MemexRL improves task success while using a significantly smaller working context.', 'score': 2, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '5c5c414a4ada6481', 'authors': ['Zhenting Wang', 'Huancheng Chen', 'Jiayun Wang', 'Wei Wei'], 'affiliations': ['Center for Advanced AI, Accenture'], 'pdf_title_img': 'assets/pdf/title_img/2603.04257.jpg', 'data': {'categories': ['#rl', '#training', '#long_context', '#reasoning', '#optimization', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Эффективная долгосрочная память для LLM-агентов через индексированное хранилище', 'desc': 'В статье представлен механизм памяти Memex, который позволяет агентам на основе LLM эффективнее решать долгосрочные задачи благодаря поддержанию компактного контекста через структурированные резюме при сохранении полной информации о взаимодействиях в внешней базе данных. Система использует индексированные ссылки на архивированные взаимодействия, позволяя агенту избирательно извлекать необходимые данные при решении текущих подзадач. Для оптимизации поведения записи и чтения предложен фреймворк MemexRL на основе reinforcement learning с наградой, адаптированной к работе с ограниченным контекстом. Такой подход значительно снижает потери информации по сравнению с методами, использующими только резюме, и позволяет поддерживать высокое качество решений при растущей истории взаимодействий.'}, 'en': {'title': 'Memex: Enhancing Long-Horizon Task Performance with Smart Memory Management', 'desc': 'The paper introduces Memex, a memory mechanism designed for large language model (LLM) agents to improve their performance on long-horizon tasks. Unlike traditional methods that truncate or summarize past interactions, Memex retains full details in an external database while maintaining a compact context through structured summaries. This allows the agent to selectively retrieve relevant past evidence based on learned criteria, enhancing decision-making without losing important information. The approach is optimized using a reinforcement learning framework called MemexRL, which teaches the agent how to effectively manage memory and context for better task success.'}, 'zh': {'title': 'Memex：提升长时间任务处理的记忆机制', 'desc': 'Memex是一种记忆机制，旨在帮助大型语言模型（LLM）代理更有效地处理长时间跨度的任务。它通过结构化摘要保持紧凑的上下文，同时将完整的交互细节存储在外部数据库中，从而实现选择性检索。与传统方法不同，Memex不会丢弃过去的证据，而是通过压缩上下文来保留重要信息。通过强化学习框架MemexRL，代理能够学习如何总结、归档、索引和检索信息，从而在长时间跨度的任务中提高成功率。'}}}, {'id': 'https://huggingface.co/papers/2603.02604', 'title': 'Heterogeneous Agent Collaborative Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02604', 'abstract': 'Abstract HACRL enables collaborative reinforcement learning where heterogeneous agents share verified rollouts during training to improve collectively while maintaining independent operation at inference time, with HACPO achieving superior performance through efficient sample utilization and cross-agent knowledge transfer.  \t\t\t\t\tAI-generated summary We introduce Heterogeneous Agent Collaborative Reinforcement Learning (HACRL), a new learning paradigm that addresses the inefficiencies of isolated on-policy optimization. HACRL enables collaborative optimization with independent execution: heterogeneous agents share verified rollouts during training to mutually improve, while operating independently at inference time. Unlike LLM-based multi-agent reinforcement learning (MARL), HACRL does not require coordinated deployment, and unlike on-/off-policy distillation, it enables bidirectional mutual learning among heterogeneous agents rather than one-directional teacher-to-student transfer. Building on this paradigm, we propose HACPO, a collaborative RL algorithm that enables principled rollout sharing to maximize sample utilization and cross-agent knowledge transfer. To mitigate capability discrepancies and policy distribution shifts, HACPO introduces four tailored mechanisms with theoretical guarantees on unbiased advantage estimation and optimization correctness. Extensive experiments across diverse heterogeneous model combinations and reasoning benchmarks show that HACPO consistently improves all participating agents, outperforming GSPO by an average of 3.3\\% while using only half the rollout cost.', 'score': 2, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '908e7e06a5ecddde', 'authors': ['Zhixia Zhang', 'Zixuan Huang', 'Xin Xia', 'Deqing Wang', 'Fuzhen Zhuang', 'Shuai Ma', 'Ning Ding', 'Yaodong Yang', 'Jianxin Li', 'Yikun Ban'], 'affiliations': ['Beihang University', 'Bytedance China', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02604.jpg', 'data': {'categories': ['#training', '#rl', '#agents'], 'emoji': '🤝', 'ru': {'title': 'Совместное обучение гетерогенных агентов через безопасный обмен опытом', 'desc': 'В статье предлагается новая парадигма обучения с подкреплением под названием HACRL, где гетерогенные агенты совместно оптимизируются во время обучения путём обмена проверенными траекториями, но остаются независимыми во время инференса. На основе этой парадигмы разработан алгоритм HACPO, который реализует принципиальный обмен траекториями для максимизации эффективности использования образцов и передачи знаний между агентами. Алгоритм включает четыре специализированных механизма с теоретическими гарантиями на несмещённое оценивание преимуществ и корректность оптимизации. Экспериментальные результаты демонстрируют, что HACPO стабильно улучшает всех участвующих агентов и превосходит существующие методы на 3.3% при использовании в два раза меньше вычислительных ресурсов.'}, 'en': {'title': 'Collaborative Learning for Independent Agents', 'desc': 'The paper presents Heterogeneous Agent Collaborative Reinforcement Learning (HACRL), which allows different types of agents to work together during training by sharing verified experiences, or rollouts. This method enhances learning efficiency while allowing each agent to operate independently when making decisions in real-time. The proposed HACPO algorithm optimizes this collaboration by ensuring effective knowledge transfer and maximizing the use of training samples. It introduces mechanisms to address differences in agent capabilities and ensures accurate learning, leading to improved performance across various tasks compared to existing methods.'}, 'zh': {'title': '异构代理协作强化学习的创新之路', 'desc': 'HACRL（异构代理协作强化学习）是一种新的学习范式，旨在解决孤立的在线策略优化效率低下的问题。它允许异构代理在训练过程中共享经过验证的回合，以便相互提高，同时在推理时独立操作。与基于大型语言模型的多代理强化学习不同，HACRL不需要协调部署，并且支持异构代理之间的双向互学。基于这一范式，我们提出了HACPO算法，通过原则性的回合共享来最大化样本利用率和跨代理知识转移。'}}}, {'id': 'https://huggingface.co/papers/2603.04338', 'title': 'ArtHOI: Articulated Human-Object Interaction Synthesis by 4D Reconstruction from Video Priors', 'url': 'https://huggingface.co/papers/2603.04338', 'abstract': 'Abstract ArtHOI synthesizes articulated human-object interactions by formulating 4D reconstruction from monocular video priors, using optical flow for part segmentation and a decoupled reconstruction pipeline to achieve physically plausible and geometrically consistent interactions.  \t\t\t\t\tAI-generated summary Synthesizing physically plausible articulated human-object interactions (HOI) without 3D/4D supervision remains a fundamental challenge. While recent zero-shot approaches leverage video diffusion models to synthesize human-object interactions, they are largely confined to rigid-object manipulation and lack explicit 4D geometric reasoning. To bridge this gap, we formulate articulated HOI synthesis as a 4D reconstruction problem from monocular video priors: given only a video generated by a diffusion model, we reconstruct a full 4D articulated scene without any 3D supervision. This reconstruction-based approach treats the generated 2D video as supervision for an inverse rendering problem, recovering geometrically consistent and physically plausible 4D scenes that naturally respect contact, articulation, and temporal coherence. We introduce ArtHOI, the first zero-shot framework for articulated human-object interaction synthesis via 4D reconstruction from video priors. Our key designs are: 1) Flow-based part segmentation: leveraging optical flow as a geometric cue to disentangle dynamic from static regions in monocular video; 2) Decoupled reconstruction pipeline: joint optimization of human motion and object articulation is unstable under monocular ambiguity, so we first recover object articulation, then synthesize human motion conditioned on the reconstructed object states. ArtHOI bridges video-based generation and geometry-aware reconstruction, producing interactions that are both semantically aligned and physically grounded. Across diverse articulated scenes (e.g., opening fridges, cabinets, microwaves), ArtHOI significantly outperforms prior methods in contact accuracy, penetration reduction, and articulation fidelity, extending zero-shot interaction synthesis beyond rigid manipulation through reconstruction-informed synthesis.', 'score': 1, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '19293ef56eb19ac1', 'authors': ['Zihao Huang', 'Tianqi Liu', 'Zhaoxi Chen', 'Shaocong Xu', 'Saining Zhang', 'Lixing Xiao', 'Zhiguo Cao', 'Wei Li', 'Hao Zhao', 'Ziwei Liu'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)', 'Institute for AI Industry Research (AIR), Tsinghua University (THU)', 'S-Lab, Nanyang Technological University (NTU)', 'School of AIA, Huazhong University of Science and Technology', 'Zhejiang University (ZJU)'], 'pdf_title_img': 'assets/pdf/title_img/2603.04338.jpg', 'data': {'categories': ['#diffusion', '#video', '#cv', '#3d'], 'emoji': '🤝', 'ru': {'title': 'Из видео в физику: реконструкция взаимодействий человека и объектов без 3D разметки', 'desc': 'ArtHOI — это первая нулевая система для синтеза сочлененных взаимодействий человека и объектов путем формулирования задачи как 4D реконструкции из приоров видеодиффузионных моделей без 3D разметки. Метод использует оптический поток для сегментации движущихся частей и разделяет эту сложную задачу на два этапа: сначала восстанавливает сочленение объекта, затем синтезирует движение человека с учетом реконструированного состояния объекта. Обратный рендеринг 2D видео в 4D геометрически согласованную сцену обеспечивает физически правдоподобные взаимодействия с соблюдением контактов, сочленений и временной когерентности. Система значительно превосходит предыдущие подходы по точности контактов, снижению проникновения объектов и качеству восстановления артикуляции на сложных сценах вроде открывания холодильников и шкафов.'}, 'en': {'title': 'Revolutionizing Human-Object Interaction Synthesis with 4D Reconstruction', 'desc': 'The paper presents ArtHOI, a novel framework for synthesizing articulated human-object interactions (HOI) using 4D reconstruction from monocular video data. It addresses the challenge of generating realistic interactions without relying on 3D supervision by treating the video as a source for inverse rendering. The approach utilizes optical flow for part segmentation to differentiate between dynamic and static elements in the video, and employs a decoupled reconstruction pipeline to stabilize the optimization of human motion and object articulation. ArtHOI demonstrates significant improvements in contact accuracy and articulation fidelity across various articulated scenes, marking a step forward in zero-shot interaction synthesis.'}, 'zh': {'title': 'ArtHOI：从视频先验合成关节人-物体交互', 'desc': 'ArtHOI 是一种通过单目视频先验进行四维重建的方法，旨在合成物理上合理的关节人-物体交互。该方法利用光流进行部分分割，并采用解耦重建管道，以确保交互的几何一致性。ArtHOI 是首个零样本框架，能够在没有三维监督的情况下，从视频中重建完整的四维场景。通过对动态和静态区域的有效分离，ArtHOI 在多种关节场景中显著提高了接触准确性和关节保真度。'}}}, {'id': 'https://huggingface.co/papers/2603.03379', 'title': 'MemSifter: Offloading LLM Memory Retrieval via Outcome-Driven Proxy Reasoning', 'url': 'https://huggingface.co/papers/2603.03379', 'abstract': "Abstract MemSifter is a framework that uses a small proxy model to offload memory retrieval from large language models, employing reinforcement learning with task-performance rewards and training techniques like curriculum learning and model merging to improve long-term memory efficiency and accuracy.  \t\t\t\t\tAI-generated summary As Large Language Models (LLMs) are increasingly used for long-duration tasks, maintaining effective long-term memory has become a critical challenge. Current methods often face a trade-off between cost and accuracy. Simple storage methods often fail to retrieve relevant information, while complex indexing methods (such as memory graphs) require heavy computation and can cause information loss. Furthermore, relying on the working LLM to process all memories is computationally expensive and slow. To address these limitations, we propose MemSifter, a novel framework that offloads the memory retrieval process to a small-scale proxy model. Instead of increasing the burden on the primary working LLM, MemSifter uses a smaller model to reason about the task before retrieving the necessary information. This approach requires no heavy computation during the indexing phase and adds minimal overhead during inference. To optimize the proxy model, we introduce a memory-specific Reinforcement Learning (RL) training paradigm. We design a task-outcome-oriented reward based on the working LLM's actual performance in completing the task. The reward measures the actual contribution of retrieved memories by mutiple interactions with the working LLM, and discriminates retrieved rankings by stepped decreasing contributions. Additionally, we employ training techniques such as Curriculum Learning and Model Merging to improve performance. We evaluated MemSifter on eight LLM memory benchmarks, including Deep Research tasks. The results demonstrate that our method meets or exceeds the performance of existing state-of-the-art approaches in both retrieval accuracy and final task completion. MemSifter offers an efficient and scalable solution for long-term LLM memory. We have open-sourced the model weights, code, and training data to support further research.", 'score': 1, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '66b1364dcaf273f2', 'authors': ['Jiejun Tan', 'Zhicheng Dou', 'Liancheng Zhang', 'Yuyang Hu', 'Yiruo Cheng', 'Ji-Rong Wen'], 'affiliations': ['Gaoling School of Artificial Intelligence Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.03379.jpg', 'data': {'categories': ['#benchmark', '#rl', '#training', '#rag', '#long_context', '#small_models', '#open_source', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Умная разгрузка памяти: маленькая модель для большого интеллекта', 'desc': 'MemSifter — это фреймворк, который решает проблему эффективного управления долгосрочной памятью в больших языковых моделях, используя маленькую прокси-модель для отделения процесса извлечения информации от основной LLM. Оптимизация прокси-модели проводится с помощью обучения с подкреплением с наградой, ориентированной на результаты выполнения задач, а также применяется curriculum learning и model merging для улучшения качества. Предложенный подход не требует тяжёлых вычислений на этапе индексирования и добавляет минимальные затраты во время инференса. Экспериментальная оценка на восьми бенчмарках показала, что MemSifter достигает или превосходит существующие методы по точности извлечения информации и успешности выполнения задач.'}, 'en': {'title': 'Efficient Memory Retrieval for Large Language Models', 'desc': 'MemSifter is a framework designed to enhance the long-term memory capabilities of large language models (LLMs) by using a smaller proxy model for memory retrieval. It employs reinforcement learning to optimize the retrieval process based on task performance, ensuring that the most relevant memories are accessed efficiently. By integrating techniques like curriculum learning and model merging, MemSifter improves both the accuracy and efficiency of memory usage without overburdening the primary LLM. This innovative approach allows for effective memory management in LLMs, making it a scalable solution for complex tasks.'}, 'zh': {'title': 'MemSifter：高效的长期记忆检索框架', 'desc': 'MemSifter是一个框架，利用小型代理模型来减轻大型语言模型的内存检索负担。它采用强化学习，通过任务表现奖励和课程学习、模型合并等训练技术来提高长期记忆的效率和准确性。该方法避免了在索引阶段的重计算，并在推理过程中增加了最小的开销。通过在八个大型语言模型的内存基准测试中评估，MemSifter在检索准确性和最终任务完成度上均表现优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.03975', 'title': 'Phi-4-reasoning-vision-15B Technical Report', 'url': 'https://huggingface.co/papers/2603.03975', 'abstract': 'Abstract A compact open-weight multimodal reasoning model is presented that achieves competitive performance through careful architecture design, high-quality data curation, and a hybrid approach combining direct answering with chain-of-thought reasoning.  \t\t\t\t\tAI-generated summary We present Phi-4-reasoning-vision-15B, a compact open-weight multimodal reasoning model, and share the motivations, design choices, experiments, and learnings that informed its development. Our goal is to contribute practical insight to the research community on building smaller, efficient multimodal reasoning models and to share the result of these learnings as an open-weight model that is good at common vision and language tasks and excels at scientific and mathematical reasoning and understanding user interfaces. Our contributions include demonstrating that careful architecture choices and rigorous data curation enable smaller, open-weight multimodal models to achieve competitive performance with significantly less training and inference-time compute and tokens. The most substantial improvements come from systematic filtering, error correction, and synthetic augmentation -- reinforcing that data quality remains the primary lever for model performance. Systematic ablations show that high-resolution, dynamic-resolution encoders yield consistent improvements, as accurate perception is a prerequisite for high-quality reasoning. Finally, a hybrid mix of reasoning and non-reasoning data with explicit mode tokens allows a single model to deliver fast direct answers for simpler tasks and chain-of-thought reasoning for complex problems.', 'score': 0, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '309b5f7128928c10', 'authors': ['Jyoti Aneja', 'Michael Harrison', 'Neel Joshi', 'Tyler LaBonte', 'John Langford', 'Eduardo Salinas'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.03975.jpg', 'data': {'categories': ['#data', '#synthetic', '#training', '#reasoning', '#small_models', '#open_source', '#science', '#multimodal', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Компактная мультимодальная модель с гибридным рассуждением через качество данных', 'desc': 'В работе представлена компактная открытая мультимодальная модель Phi-4-reasoning-vision-15B, которая демонстрирует конкурентный уровень производительности благодаря тщательному проектированию архитектуры и высококачественной подготовке данных. Авторы показывают, что систематическая фильтрация, коррекция ошибок и синтетическое пополнение набора данных являются ключевыми факторами улучшения качества модели. Модель использует динамическую разрешимость кодировщиков для точного восприятия изображений, что обеспечивает более качественные рассуждения. Гибридный подход, сочетающий прямые ответы с chain-of-thought рассуждениями, позволяет модели быстро решать простые задачи и выполнять сложные рассуждения для научных и математических проблем.'}, 'en': {'title': 'Compact Multimodal Model for Efficient Reasoning', 'desc': 'This paper introduces Phi-4-reasoning-vision-15B, a compact multimodal reasoning model designed to perform well on various vision and language tasks. The model achieves competitive results by utilizing a thoughtful architecture, high-quality curated data, and a hybrid reasoning approach that combines direct answers with chain-of-thought reasoning. Key improvements stem from systematic data filtering, error correction, and synthetic data augmentation, emphasizing the importance of data quality in enhancing model performance. Additionally, the use of high-resolution encoders and explicit mode tokens allows the model to efficiently handle both simple and complex reasoning tasks.'}, 'zh': {'title': '高效紧凑的多模态推理模型', 'desc': '本文提出了一种紧凑的开放权重多模态推理模型，旨在通过精心的架构设计和高质量的数据整理，实现竞争力的性能。该模型结合了直接回答和思维链推理的方法，适用于视觉和语言任务，尤其在科学和数学推理方面表现出色。研究表明，仔细的架构选择和严格的数据整理能够使较小的开放权重多模态模型在训练和推理时计算量和标记数量显著减少。最后，混合推理和非推理数据的使用，使得模型能够快速回答简单问题，同时对复杂问题进行深入推理。'}}}, {'id': 'https://huggingface.co/papers/2603.03823', 'title': 'SWE-CI: Evaluating Agent Capabilities in Maintaining Codebases via Continuous Integration', 'url': 'https://huggingface.co/papers/2603.03823', 'abstract': "Abstract SWE-CI presents a repository-level benchmark for evaluating code generation agents' ability to maintain code quality through long-term software evolution cycles.  \t\t\t\t\tAI-generated summary Large language model (LLM)-powered agents have demonstrated strong capabilities in automating software engineering tasks such as static bug fixing, as evidenced by benchmarks like SWE-bench. However, in the real world, the development of mature software is typically predicated on complex requirement changes and long-term feature iterations -- a process that static, one-shot repair paradigms fail to capture. To bridge this gap, we propose SWE-CI, the first repository-level benchmark built upon the Continuous Integration loop, aiming to shift the evaluation paradigm for code generation from static, short-term functional correctness toward dynamic, long-term maintainability. The benchmark comprises 100 tasks, each corresponding on average to an evolution history spanning 233 days and 71 consecutive commits in a real-world code repository. SWE-CI requires agents to systematically resolve these tasks through dozens of rounds of analysis and coding iterations. SWE-CI provides valuable insights into how well agents can sustain code quality throughout long-term evolution.", 'score': 0, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '19da1f0c3109d4c9', 'authors': ['Jialong Chen', 'Xander Xu', 'Hu Wei', 'Chuan Chen', 'Bing Zhao'], 'affiliations': ['Alibaba Group', 'Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03823.jpg', 'data': {'categories': ['#benchmark', '#plp', '#agents'], 'emoji': '🔄', 'ru': {'title': 'От одноразовых исправлений к долгосрочной поддерживаемости кода', 'desc': 'SWE-CI представляет первый бенчмарк уровня репозитория для оценки способности агентов на основе LLM поддерживать качество кода во время длительных циклов эволюции программного обеспечения. В отличие от существующих подходов, которые оценивают однократное исправление ошибок, этот бенчмарк моделирует реальный процесс разработки с множественными итерациями требований и изменениями функциональности. Каждая из 100 задач охватывает в среднем 233 дня разработки и 71 последовательный коммит из реальных репозиториев кода. Агентам требуется пройти десятки раундов анализа и итераций кодирования, чтобы систематически разрешить поставленные задачи, что позволяет оценить их способность поддерживать долгосрочную поддерживаемость кода.'}, 'en': {'title': 'Evaluating Code Quality in Long-Term Software Evolution', 'desc': "SWE-CI introduces a new benchmark for assessing how well code generation agents can maintain code quality over time during software development. Unlike previous benchmarks that focus on short-term fixes, SWE-CI evaluates agents in a continuous integration context, reflecting real-world software evolution. The benchmark consists of 100 tasks that simulate long-term development, requiring agents to handle multiple iterations and changes in requirements. This approach helps to understand the agents' capabilities in ensuring code maintainability and quality throughout the software lifecycle."}, 'zh': {'title': '评估代码生成的长期可维护性', 'desc': 'SWE-CI是一个针对代码生成代理的基准测试，旨在评估其在长期软件演化周期中维持代码质量的能力。该基准测试基于持续集成循环，强调动态的长期可维护性，而不是静态的短期功能正确性。SWE-CI包含100个任务，每个任务平均涉及233天和71次连续提交的演化历史。通过这些任务，SWE-CI为评估代理在长期演化中保持代码质量提供了重要的见解。'}}}, {'id': 'https://huggingface.co/papers/2603.03447', 'title': 'Proact-VL: A Proactive VideoLLM for Real-Time AI Companions', 'url': 'https://huggingface.co/papers/2603.03447', 'abstract': 'Abstract Proact-VL is a multimodal framework that enables real-time interactive AI companions for gaming scenarios with low-latency responses and strong video understanding capabilities.  \t\t\t\t\tAI-generated summary Proactive and real-time interactive experiences are essential for human-like AI companions, yet face three key challenges: (1) achieving low-latency inference under continuous streaming inputs, (2) autonomously deciding when to respond, and (3) controlling both quality and quantity of generated content to meet real-time constraints. In this work, we instantiate AI companions through two gaming scenarios, commentator and guide, selected for their suitability for automatic evaluation. We introduce the Live Gaming Benchmark, a large-scale dataset with three representative scenarios: solo commentary, co-commentary, and user guidance, and present Proact-VL, a general framework that shapes multimodal language models into proactive, real-time interactive agents capable of human-like environment perception and interaction. Extensive experiments show Proact-VL achieves superior response latency and quality while maintaining strong video understanding capabilities, demonstrating its practicality for real-time interactive applications.', 'score': 0, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8174fc8f742bee96', 'authors': ['Weicai Yan', 'Yuhong Dai', 'Qi Ran', 'Haodong Li', 'Wang Lin', 'Hao Liao', 'Xing Xie', 'Tao Jin', 'Jianxun Lian'], 'affiliations': ['Microsoft Research Asia', 'Shenzhen University', 'South China University of Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03447.jpg', 'data': {'categories': ['#benchmark', '#video', '#inference', '#games', '#open_source', '#dataset', '#multimodal', '#agents'], 'emoji': '🎮', 'ru': {'title': 'Реактивные AI-компаньоны для игр в реальном времени', 'desc': 'Proact-VL представляет собой мультимодальный фреймворк для создания интерактивных AI-компаньонов в игровых сценариях с минимальной задержкой отклика. Основные вызовы включают обеспечение низкой латентности при обработке потока видео, автономное принятие решений о моменте ответа и контроль качества генерируемого контента в реальном времени. Авторы представляют Live Gaming Benchmark — крупномасштабный датасет с тремя типами сценариев: одиночный комментарий, совместный комментарий и пользовательское руководство. Экспериментально показано, что Proact-VL достигает превосходной латентности и качества ответов при сохранении сильных способностей в понимании видео.'}, 'en': {'title': 'Real-Time AI Companions for Gaming: Fast and Smart!', 'desc': 'Proact-VL is a multimodal framework designed to create interactive AI companions for gaming that respond quickly and understand video content effectively. It addresses challenges like low-latency inference, autonomous response timing, and balancing content quality and quantity. The framework is tested in two gaming scenarios, using a new dataset called the Live Gaming Benchmark, which includes solo commentary, co-commentary, and user guidance. Results show that Proact-VL excels in response speed and quality, making it suitable for real-time interactive applications.'}, 'zh': {'title': '实时互动AI伴侣的多模态框架', 'desc': 'Proact-VL是一个多模态框架，旨在为游戏场景提供实时互动的AI伴侣，具有低延迟响应和强大的视频理解能力。该框架解决了在连续流输入下实现低延迟推理、自动决定何时响应以及控制生成内容的质量和数量等三个主要挑战。通过评论员和引导者这两个游戏场景，Proact-VL展示了其在自动评估方面的适用性。实验结果表明，Proact-VL在响应延迟和质量上表现优越，同时保持强大的视频理解能力，证明了其在实时互动应用中的实用性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (4)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (3)', '#cv (1)', '#data (1)', '#dataset (1)', '#diffusion (2)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare', '#inference (2)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (2)', '#open_source (4)', '#optimization (3)', '#plp (1)', '#rag (1)', '#reasoning (2)', '#rl (3)', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic (1)', '#training (5)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-05 04:06',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-05 04:06')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-05 04:06')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
