d Deep Operator Networks (DeepONet), perform when faced with distribution shifts in solving partial differential equations (PDEs). The study focuses on their ability to generalize under changes in input frequency and coefficient smoothness, using a one-dimensional wave equation as a test case. Results indicate that while both models perform well under smoothness shifts, FNO struggles with high-frequency inputs, leading to a significant increase in error. This research highlights the importance of understanding architectural biases in neural operators to improve their reliability in real-world physics simulations.'}, 'zh': {'title': '神经算子的泛化能力与分布变化的关系', 'desc': '神经算子用于求解偏微分方程（PDE）时，在分布变化下表现出不同的泛化行为。傅里叶神经算子和深度算子网络在平滑性和频率变化的响应上存在显著差异。研究表明，在平滑性变化下，两种模型的性能稳定，而傅里叶神经算子的误差更低；而在频率变化下，傅里叶神经算子在未见的高频输入下误差急剧增加，而深度算子网络的降级较温和。此研究揭示了算子学习中强大的分布内性能与在分布变化下的泛化能力之间的基本差距。'}}}, {'id': 'https://huggingface.co/papers/2605.11680', 'title': 'ShapeCodeBench: A Renewable Benchmark for Perception-to-Program Reconstruction of Synthetic Shape Scenes', 'url': 'https://huggingface.co/papers/2605.11680', 'abstract': 'Abstract ShapeCodeBench presents a synthetic benchmark for perception-to-program reconstruction where models generate executable drawing programs from raster images, evaluated on multiple metrics including exact match and pixel accuracy.  AI-generated summary We introduce ShapeCodeBench, a synthetic benchmark for perception-to-program reconstruction: given a rendered raster image, a model must emit an executable drawing program that a deterministic evaluator re-renders and compares with the target. The v1 DSL has four primitives on a 512 x 512 black-on-white canvas, but every instance is generated from a seeded RNG, so fresh held-out sets can be created to reduce exact-instance contamination. We release a frozen eval_v1 split with 150 samples across easy, medium, and hard tiers, scored by exact match, pixel accuracy, foreground IoU, parse success, and execution success. We evaluate an empty-program floor, a classical computer-vision heuristic, Claude Opus 4.7 at high and max effort, and GPT-5.5 at medium and extra_high reasoning effort. The heuristic is competitive on easy scenes but collapses when overlaps fuse components; the strongest multimodal configuration preserves much of the foreground structure but still misses exact match because of small parameter errors. Best overall exact match remains low, so ShapeCodeBench is far from saturated. The benchmark code, frozen dataset, run artifacts, and paper sources are released to support independent replication and extension.', 'score': 1, 'issue_id': 2224, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '7129d3950b741fa6', 'authors': ['Shivam Kumar'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2605.11680.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#cv', '#plp', '#dataset', '#synthetic', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'От пикселя к коду: бенчмарк для восстановления программ рисования из изображений', 'desc': 'ShapeCodeBench — это синтетический бенчмарк для задачи восстановления программы из изображения, где модели должны генерировать исполняемые программы рисования на основе растровых изображений. Датасет создаётся процедурно с использованием детерминированного генератора случайных чисел, что позволяет создавать новые тестовые наборы и избежать загрязнения данных повторяющимися примерами. Оценка моделей проводится по нескольким метрикам: точное совпадение кода, точность пикселей, IoU переднего плана, успешность парсинга и успешность выполнения программы. Авторы провели комплексную оценку современных LLM-моделей, показав что даже самые мощные модели значительно отстают по метрике exact match, что указывает на высокую сложность задачи и потенциал для развития.'}, 'en': {'title': 'Transforming Images into Code: The ShapeCodeBench Challenge', 'desc': 'ShapeCodeBench is a new benchmark designed to evaluate how well models can convert images into executable drawing programs. It uses a specific drawing language with four basic commands to create images on a 512 x 512 canvas. The benchmark includes a variety of difficulty levels and measures performance using metrics like exact match and pixel accuracy. The results show that while some models perform well on simpler tasks, they struggle with more complex images, indicating that the benchmark is still challenging and not fully solved.'}, 'zh': {'title': 'ShapeCodeBench：感知到程序重建的新基准', 'desc': 'ShapeCodeBench 是一个用于感知到程序重建的合成基准，旨在评估模型从光栅图像生成可执行绘图程序的能力。该基准使用多个指标进行评估，包括精确匹配和像素准确度。模型在一个 512 x 512 的黑白画布上生成程序，并通过确定性评估器进行重渲染和比较。尽管当前的最佳精确匹配仍然较低，但该基准为独立复制和扩展提供了代码和数据集。'}}}, {'id': 'https://huggingface.co/papers/2605.12556', 'title': 'M2Retinexformer: Multi-Modal Retinexformer for Low-Light Image Enhancement', 'url': 'https://huggingface.co/papers/2605.12556', 'abstract': 'Abstract A multi-modal deep learning framework enhances low-light images by integrating depth cues, luminance priors, and semantic features through cross-attention fusion and adaptive gating mechanisms.  AI-generated summary Low-light image enhancement is challenging due to complex degradations, including amplified noise, artifacts, and color distortion. While Retinex-based deep learning methods have achieved promising results, they primarily rely on single-modality RGB information. We propose M2Retinexformer (Multi-Modal Retinexformer), a novel framework that extends Retinexformer by incorporating depth cues, luminance priors, and semantic features within a progressive refinement pipeline. Depth provides geometric context that is invariant to lighting variations, while luminance and semantic features offer explicit guidance on brightness distribution and scene understanding. Modalities are extracted at multiple scales and fused through cross-attention, with adaptive gating dynamically balancing illumination-guided self-attention and cross-attention based on the reliability of auxiliary cues. Evaluations on the LOL, SID, SMID, and SDSD benchmarks demonstrate overall improvements over Retinexformer and recent state-of-the-art methods. Code and pretrained weights are available at https://github.com/YoussefAboelwafa/M2Retinexformer', 'score': 1, 'issue_id': 2226, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '0db6d518026c6eb2', 'authors': ['Youssef Aboelwafa', 'Hicham G. Elmongui', 'Marwan Torki'], 'affiliations': ['Alexandria University, Egypt'], 'pdf_title_img': 'assets/pdf/title_img/2605.12556.jpg', 'data': {'categories': ['#architecture', '#cv', '#benchmark', '#multimodal'], 'emoji': '🌙', 'ru': {'title': 'Многомодальный Retinex: объединение глубины, яркости и семантики для ночной фотографии', 'desc': 'Авторы предложили M2Retinexformer — фреймворк для улучшения изображений при слабом освещении, который объединяет информацию о глубине сцены, яркости и семантические признаки через механизм кросс-внимания. В отличие от традиционных методов на основе Retinex, использующих только RGB-информацию, новый подход применяет многомодальное слияние признаков на нескольких масштабах. Адаптивные механизмы управления динамически балансируют внимание на основе надёжности вспомогательных сигналов, позволяя сети эффективно учитывать геометрический контекст и понимание сцены. Экспериментальная оценка на популярных бенчмарках подтвердила превосходство предложенного метода над существующими подходами.'}, 'en': {'title': 'Enhancing Low-Light Images with Multi-Modal Fusion', 'desc': 'This paper presents M2Retinexformer, a multi-modal deep learning framework designed to enhance low-light images by integrating various types of information. It combines depth cues, luminance priors, and semantic features to improve image quality, addressing issues like noise and color distortion. The framework uses cross-attention fusion and adaptive gating mechanisms to effectively balance different modalities during the enhancement process. Evaluations show that M2Retinexformer outperforms existing methods, demonstrating its effectiveness in low-light image enhancement tasks.'}, 'zh': {'title': '多模态深度学习提升低光照图像', 'desc': '本文提出了一种多模态深度学习框架M2Retinexformer，用于增强低光照图像。该框架通过交叉注意力融合和自适应门控机制，结合深度线索、亮度先验和语义特征，逐步优化图像质量。深度信息提供了对光照变化不敏感的几何上下文，而亮度和语义特征则为亮度分布和场景理解提供了明确指导。实验结果表明，M2Retinexformer在多个基准测试中优于现有的Retinexformer及其他最新方法。'}}}, {'id': 'https://huggingface.co/papers/2605.09591', 'title': 'From Pixels to Concepts: Do Segmentation Models Understand What They Segment?', 'url': 'https://huggingface.co/papers/2605.09591', 'abstract': 'Abstract CAFE is a new benchmark for evaluating concept-faithful segmentation in promptable models through attribute-level counterfactual manipulation, revealing that accurate mask prediction does not guarantee semantic grounding.  AI-generated summary Segmentation is a fundamental vision task underlying numerous downstream applications. Recent promptable segmentation models, such as Segment Anything Model 3 (SAM3), extend segmentation from category-agnostic mask prediction to concept-guided localization conditioned on high-level textual prompts. However, existing benchmarks primarily evaluate mask accuracy or object presence, leaving unclear whether these models faithfully ground the queried concept or instead rely on visually salient but semantically misleading cues. We introduce CAFE: Counterfactual Attribute Factuality Evaluation, a novel benchmark for evaluating concept-faithful segmentation in promptable segmentation models. Our CAFE is built on attribute-level counterfactual manipulation: the target region and ground-truth mask are preserved, while attributes such as surface appearance, context, or material composition are modified to introduce misleading semantic cues. The benchmark contains 2,146 paired test samples, each consisting of a target image, a ground-truth mask, a positive prompt, and a misleading negative prompt. These samples cover three counterfactual categories: Superficial Mimicry (SM), Context Conflict (CC), and Ontological Conflict (OC). We evaluate various model types and sizes on our CAFE. Experiments reveal a systematic gap between localization quality and concept discrimination: models often generate accurate masks even for misleading prompts, suggesting that strong mask prediction does not necessarily imply faithful semantic grounding. Our CAFE provides a controlled benchmark for diagnosing whether promptable segmentation models perform concept-faithful grounding rather than shortcut-driven mask retrieval.', 'score': 1, 'issue_id': 2225, 'pub_date': '2026-05-10', 'pub_date_card': {'ru': '10 мая', 'en': 'May 10', 'zh': '5月10日'}, 'hash': '06218104f924bc6a', 'authors': ['Shuang Liang', 'Zeqing Wang', 'Yuxian Li', 'Xihui Liu', 'Han Wang'], 'affiliations': ['CASIC, The University of Hong Kong', 'Department of Electrical and Computer Engineering, The University of Hong Kong', 'School of Computer Science and Engineering, Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.09591.jpg', 'data': {'categories': ['#cv', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🎭', 'ru': {'title': 'Точная маска — не залог истинного понимания: бенчмарк для оценки семантической верности в сегментации', 'desc': 'Авторы представляют CAFE — новый бенчмарк для оценки того, насколько хорошо модели сегментации с текстовыми подсказками понимают семантические концепции. Бенчмарк использует контрфактическое манипулирование атрибутами: изображения модифицируются так, чтобы вводить семантически неправильные визуальные подсказки, сохраняя при этом истинную маску объекта. Исследование показало критическую проблему: модели часто предсказывают точные маски даже для вводящих в заблуждение текстовых подсказок, что доказывает, что высокая точность локализации не гарантирует правильное семантическое понимание. Вывод демонстрирует необходимость развития более робастных методов оценки способности моделей осуществлять истинное концептуальное заземление вместо простого использования визуальных сокращений.'}, 'en': {'title': 'CAFE: Evaluating Concept-Faithful Segmentation in AI Models', 'desc': 'The paper introduces CAFE, a benchmark designed to assess how well promptable segmentation models maintain concept fidelity during segmentation tasks. It highlights that simply achieving accurate mask predictions does not ensure that the model understands the underlying concepts, as it may rely on misleading visual cues. CAFE employs attribute-level counterfactual manipulation to test models against various misleading prompts, revealing their ability to distinguish between true and false semantic cues. The findings indicate a significant gap between localization accuracy and genuine concept understanding, emphasizing the need for better evaluation methods in segmentation models.'}, 'zh': {'title': 'CAFE：评估概念忠实分割的新基准', 'desc': 'CAFE是一个新的基准，用于评估可提示模型中的概念忠实分割。通过属性级的反事实操作，CAFE揭示了准确的掩码预测并不保证语义的正确性。现有的分割模型在处理高层次文本提示时，可能依赖于视觉上显著但语义上误导的线索。CAFE基准包含2146个测试样本，旨在评估模型是否真正实现了概念的忠实定位，而不是简单的掩码检索。'}}}, {'id': 'https://huggingface.co/papers/2605.04651', 'title': 'FAAST: Forward-Only Associative Learning via Closed-Form Fast Weights for Test-Time Supervised Adaptation', 'url': 'https://huggingface.co/papers/2605.04651', 'abstract': 'Abstract FAAST enables efficient task adaptation by compiling labeled examples into fast weights through forward-only computation, achieving significant speedup and memory savings over traditional backpropagation methods.  AI-generated summary Adapting pretrained models typically involves a trade-off between the high training costs of backpropagation and the heavy inference overhead of memory-based or in-context learning. We propose FAAST, a forward-only associative adaptation method that analytically compiles labeled examples into fast weights in a single pass. By eliminating memory or context dependence, FAAST achieves constant-time inference and decouples task adaptation from pretrained representation. Across image classification and language modeling benchmarks, FAAST matches or exceeds backprop-based adaptation while reducing adaptation time by over 90% and is competitive to memory/context-based adaptation while saving memory usage by up to 95%. These results demonstrate FAAST as a highly efficient, scalable solution for supervised task adaptation, particularly for resource-constrained models. We release the code and models at https://github.com/baoguangsheng/faast.', 'score': 1, 'issue_id': 2227, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'c17fa6668f2f7c78', 'authors': ['Guangsheng Bao', 'Hongbo Zhang', 'Han Cui', 'Ke Sun', 'Yanbin Zhao', 'Juncai He', 'Yue Zhang'], 'affiliations': ['Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04651.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Молниеносная адаптация без обратного распространения', 'desc': 'FAAST — это метод быстрой адаптации предобученных моделей, который компилирует размеченные примеры в быстрые веса за один проход только через прямое распространение, без обратного распространения ошибки. Метод достигает постоянной сложности на этапе инференса и позволяет адаптировать модель к новым задачам независимо от её исходного представления. По сравнению с традиционными подходами на основе backprop, FAAST сокращает время адаптации более чем на 90%, а по сравнению с методами in-context learning экономит память на 95% при сохранении или превышении качества. Метод демонстрирует эффективность и масштабируемость на задачах классификации изображений и языкового моделирования.'}, 'en': {'title': 'FAAST: Fast and Efficient Task Adaptation for ML Models', 'desc': "FAAST is a novel method for adapting pretrained machine learning models efficiently. It compiles labeled examples into fast weights using a forward-only computation approach, which significantly reduces the time and memory needed compared to traditional backpropagation. This method allows for constant-time inference and separates task adaptation from the pretrained model's representation. FAAST has shown to be effective in both image classification and language modeling tasks, achieving faster adaptation times and lower memory usage while maintaining competitive performance."}, 'zh': {'title': 'FAAST：高效的任务适应新方法', 'desc': 'FAAST是一种高效的任务适应方法，通过前向计算将标记示例编译成快速权重，从而实现显著的速度提升和内存节省。与传统的反向传播方法相比，FAAST消除了对内存或上下文的依赖，实现了恒定时间的推理。该方法在图像分类和语言建模基准测试中表现出色，适应时间减少超过90%，并且在内存使用上节省高达95%。FAAST为资源受限的模型提供了一种高效、可扩展的监督任务适应解决方案。'}}}, {'id': 'https://huggingface.co/papers/2605.05704', 'title': 'SafeHarbor: Hierarchical Memory-Augmented Guardrail for LLM Agent Safety', 'url': 'https://huggingface.co/papers/2605.05704', 'abstract': "Abstract SafeHarbor is a novel framework for LLM agents that establishes precise decision boundaries through context-aware defense rules, featuring a hierarchical memory system and self-evolution mechanism to balance safety and utility.  AI-generated summary With the rapid evolution of foundation models, Large Language Model (LLM) agents have demonstrated increasingly powerful tool-use capabilities. However, this proficiency introduces significant security risks, as malicious actors can manipulate agents into executing tools to generate harmful content. While existing defensive mechanisms are effective, they frequently suffer from the over-refusal problem, where increased safety strictness compromises the agent's utility on benign tasks. To mitigate this trade-off, we propose SafeHarbor, a novel framework designed to establish precise decision boundaries for LLM agents. Unlike static guidelines, SafeHarbor extracts context-aware defense rules through enhanced adversarial generation. We design a local hierarchical memory system for dynamic rule injection, offering a training-free, efficient, and plug-and-play solution. Furthermore, we introduce an information entropy-based self-evolution mechanism that continuously optimizes the memory structure through dynamic node splitting and merging. Extensive experiments demonstrate that SafeHarbor achieves state-of-the-art performance on both ambiguous benign tasks and explicit malicious attacks, notably attaining a peak benign utility of 63.6\\% on GPT-4o while maintaining a robust refusal rate exceeding 93\\% against harmful requests. The source code is publicly available at https://github.com/ljj-cyber/SafeHarbor.", 'score': 1, 'issue_id': 2224, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '730e6d90d6ec6a2b', 'authors': ['Zhe Liu', 'Zonghao Ying', 'Wenxin Zhang', 'Quanchen Zou', 'Deyue Zhang', 'Dongdong Yang', 'Xiangzheng Zhang', 'Hao Peng'], 'affiliations': ['360 AI Security Lab, Beijing, China', 'Institute of Artificial Intelligence, Beihang University, Beijing, China', 'School of Cyber Science and Technology, Beihang University, Beijing, China', 'University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.05704.jpg', 'data': {'categories': ['#security', '#alignment', '#open_source'], 'emoji': '🛡️', 'ru': {'title': 'Контекстная защита без потери функциональности', 'desc': 'SafeHarbor — это фреймворк для защиты LLM агентов, который устанавливает точные границы принятия решений через контекстно-зависимые правила защиты. Система использует иерархическую память для динамического внедрения правил без необходимости переобучения модели. Фреймворк включает механизм самоэволюции на основе информационной энтропии, который непрерывно оптимизирует структуру памяти путём разбиения и объединения узлов. Подход решает проблему избыточного отказа, достигая высокой полезности на безопасных задачах (63.6% на GPT-4o) при сохранении надежного уровня отказа от вредоносных запросов (свыше 93%).'}, 'en': {'title': 'SafeHarbor: Balancing Safety and Utility in LLM Agents', 'desc': 'SafeHarbor is a new framework designed for Large Language Model (LLM) agents that aims to create clear decision boundaries using context-aware defense rules. It features a hierarchical memory system that allows for dynamic rule adjustments without the need for retraining, making it efficient and easy to implement. Additionally, SafeHarbor includes a self-evolution mechanism that optimizes its memory structure by adapting to new information, enhancing both safety and utility. The framework has shown impressive results, balancing high performance on benign tasks while maintaining strong defenses against malicious attacks.'}, 'zh': {'title': '安全与实用的平衡：SafeHarbor框架', 'desc': 'SafeHarbor是一个新颖的框架，旨在为大型语言模型（LLM）代理建立精确的决策边界。它通过上下文感知的防御规则，结合分层记忆系统和自我进化机制，平衡安全性和实用性。与静态指导原则不同，SafeHarbor通过增强的对抗生成提取动态防御规则。实验表明，SafeHarbor在模糊的良性任务和明确的恶意攻击中均表现出色，良性实用性高达63.6%，同时对有害请求的拒绝率超过93%。'}}}, {'id': 'https://huggingface.co/papers/2605.12770', 'title': 'WriteSAE: Sparse Autoencoders for Recurrent State', 'url': 'https://huggingface.co/papers/2605.12770', 'abstract': 'Abstract WriteSAE enables sparse autoencoder decomposition and editing of matrix cache writes in state-space and hybrid recurrent language models, achieving superior performance in token-level interventions compared to existing methods.  AI-generated summary We introduce WriteSAE, the first sparse autoencoder that decomposes and edits the matrix cache write of state-space and hybrid recurrent language models, where residual SAEs cannot reach. Existing SAEs read residual streams, but Gated DeltaNet, Mamba-2, and RWKV-7 write to a d_k times d_v cache through rank-1 updates k_t v_t^top that no vector atom can replace. WriteSAE factors each decoder atom into the native write shape, exposes a closed form for the per-token logit shift, and trains under matched Frobenius norm so atoms swap one cache slot at a time. Atom substitution beats matched-norm ablation on 92.4% of n=4{,}851 firings at Qwen3.5-0.8B L9 H4, the 87-atom population test holds at 89.8%, the closed form predicts measured effects at R^2=0.98, and Mamba-2-370M substitutes at 88.1% over 2,500 firings. Sustained three-position installs at 3times lift midrank target-in-continuation from 33.3% to 100% under greedy decoding, the first behavioral install at the matrix-recurrent write site.', 'score': 0, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '7177621db1d93f76', 'authors': ['Jack Young'], 'affiliations': ['Indiana University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12770.jpg', 'data': {'categories': ['#small_models', '#interpretability', '#training', '#architecture'], 'emoji': '🔍', 'ru': {'title': 'Разреженные автоэнкодеры для декодирования и редактирования матричных кэшей в рекуррентных моделях', 'desc': 'Работа представляет WriteSAE — первый разреженный автоэнкодер, который может разложить и редактировать операции записи в кэш матриц в моделях на основе state-space и гибридных рекуррентных архитектурах. В отличие от существующих SAE, которые работают с остаточными потоками, WriteSAE фактористирует каждый атом декодера в нативную форму записи и обеспечивает замкнутую форму для сдвига логитов на токене. Метод достигает высокой точности интервенций — замена атомов превосходит аблацию на 92.4% случаев, а закрытая форма предсказывает эффекты с R²=0.98. Это первый практический метод прямого редактирования на уровне матричной записи, позволяющий добиться значительного улучшения поведения модели при генерации.'}, 'en': {'title': 'Revolutionizing Token Interventions with WriteSAE', 'desc': 'The paper introduces WriteSAE, a novel sparse autoencoder designed for decomposing and editing matrix cache writes in state-space and hybrid recurrent language models. Unlike traditional sparse autoencoders that rely on residual streams, WriteSAE directly manipulates the matrix cache, allowing for more effective token-level interventions. The method demonstrates superior performance, achieving a high success rate in atom substitution and accurate predictions of logit shifts. Overall, WriteSAE represents a significant advancement in the manipulation of language model outputs, enhancing the efficiency of interventions in complex models.'}, 'zh': {'title': 'WriteSAE：提升语言模型的稀疏自编码器', 'desc': '本文介绍了WriteSAE，这是一种稀疏自编码器，能够对状态空间和混合递归语言模型中的矩阵缓存写入进行分解和编辑。与现有方法相比，WriteSAE在令牌级干预中表现出更优的性能。它通过将每个解码器原子分解为原生写入形状，并在匹配的Frobenius范数下进行训练，从而实现了原子的逐个替换。实验结果显示，WriteSAE在多个测试中超越了传统方法，证明了其在语言模型中的有效性。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        function getUrlParameters() {

            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (10)', '#agi', '#alignment (4)', '#architecture (12)', '#audio (1)', '#benchmark (23)', '#cv (6)', '#data (1)', '#dataset (11)', '#diffusion (6)', '#ethics', '#games (1)', '#graphs (2)', '#hallucinations (2)', '#healthcare (1)', '#inference (3)', '#interpretability (1)', '#leakage', '#long_context (4)', '#low_resource (2)', '#machine_translation (1)', '#math (1)', '#multilingual (1)', '#multimodal (12)', '#open_source (8)', '#optimization (15)', '#plp (3)', '#rag (4)', '#reasoning (11)', '#rl (7)', '#rlhf (3)', '#robotics (3)', '#science (2)', '#security (1)', '#small_models (3)', '#story_generation', '#survey (1)', '#synthetic (1)', '#training (19)', '#transfer_learning (2)', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {

            updateCategoryButtonStates();
        }

            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');

                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article =>

                );

                    ? articlesData

            console.log('filteredArticles', filteredArticles)

            filterAndRenderArticles();

            updateSelectedArticlesTitle();
            updateUrlWithCategories();

                const articleHTML = `

                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">

                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);

        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-14 16:07',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-14 16:07')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-14 16:07')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
