    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();

                    filterAndRenderArticles();
                });
            });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.24597', 'title': 'Qwen-AgentWorld: Language World Models for General Agents', 'url': 'https://huggingface.co/papers/2606.24597', 'abstract': 'Abstract Language-based world models enable agentic environment simulation across multiple domains and enhance general agent performance through scalable simulation and improved downstream task performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A world model predicts environment dynamics based on current observations and actions, serving as a core cognitive mechanism for reasoning and planning. In this work, we investigate how world modeling based on language models can further push the boundaries of general agents. (i) We first focus on building foundation models for agentic environment simulation. We introduce Qwen-AgentWorld-35B-A3B and Qwen-AgentWorld-397B-A17B, the first language world models capable of simulating agentic environments covering 7 domains via long chain-of-thought reasoning. Leveraging more than 10M environment interaction trajectories of 7 domains in real-world environments, we develop Qwen-AgentWorld through a three-stage training pipeline: CPT injects general-purpose world modeling capabilities from the state transition dynamics and augmented professional corpora, SFT activates next-state-prediction reasoning, and RL sharpens simulation fidelity through a tailored framework with hybrid rubric-and-rule rewards. To evaluate language world models, we present AgentWorldBench, a comprehensive benchmark constructed from real-world interactions of 5 frontier models on 9 established benchmarks. Empirical results demonstrate that Qwen-AgentWorld significantly outperforms existing frontier models. (ii) Beyond foundation models, we further investigate two complementary paradigms through which world modeling enhances general agents. First, as a decoupled environment simulator, Qwen-AgentWorld supports scalable and controllable simulation of thousands of real-world environments for agentic RL, yielding gains that surpass real-environment training alone. Second, as a unified agent foundation model, world-model training acts as a highly effective warm-up that improves downstream performance across 7 agentic benchmarks. Code: https://github.com/QwenLM/Qwen-AgentWorld', 'score': 83, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '2406602e3ef4e71d', 'authors': ['Yuxin Zuo', 'Zikai Xiao', 'Li Sheng', 'Fei Huang', 'Jianhong Tu', 'Yuxuan Liu', 'Tianyi Tang', 'Xiaomeng Hu', 'Yang Su', 'Qingfeng Lan', 'Yantao Liu', 'Qin Zhu', 'Yinger Zhang', 'Bowen Yu', 'Haiquan Zhao', 'Haiyang Xu', 'Jianxin Yang', 'Jiayang Cheng', 'Junyang Wang', 'Lianghao Deng', 'Mingfeng Xue', 'Tianyi Bai', 'Yang Fan', 'Yubo Ma', 'Yucheng Li', 'Zeyu Cui', 'Zhihai Wang', 'Zhihui Xie', 'Zhuorui Ye', 'An Yang', 'Dayiheng Liu', 'Jingren Zhou', 'Ning Ding'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2606.24597.jpg', 'data': {'categories': ['#reasoning', '#dataset', '#rl', '#agents', '#benchmark', '#open_source', '#training'], 'emoji': '🌍', 'ru': {'title': 'Языковые модели как универсальные симуляторы мира для обучения агентов', 'desc': 'В этой работе исследуется использование языковых моделей как модели мира для симуляции окружения агентов. Авторы представили Qwen-AgentWorld — первые языковые модели мира, способные симулировать окружение агентов в 7 различных доменах, обученные на более чем 10 млн траекториях взаимодействия с использованием трёхэтапного пайплайна обучения. Для оценки качества таких моделей предложена бенчмарка AgentWorldBench, построенная на реальных взаимодействиях. Результаты показывают, что языковые модели мира эффективны как для масштабируемой симуляции окружения в обучении с подкреплением, так и для предварительной подготовки, улучшающей производительность агентов на других задачах.'}, 'en': {'title': 'Revolutionizing Agent Simulation with Language Models', 'desc': 'This paper presents advancements in language-based world models that enhance the simulation of agentic environments, improving the performance of general agents. The authors introduce Qwen-AgentWorld, a series of language models capable of simulating environments across seven domains using long chain-of-thought reasoning. The model is trained through a three-stage pipeline that incorporates state transition dynamics, next-state prediction, and reinforcement learning to refine simulation accuracy. The results show that Qwen-AgentWorld outperforms existing models and supports scalable simulations, leading to better training outcomes for agents in various tasks.'}, 'zh': {'title': '语言模型助力智能体环境模拟的突破', 'desc': '本论文探讨了基于语言模型的世界模型如何提升智能体的环境模拟能力。我们提出了Qwen-AgentWorld系列模型，能够在七个领域中进行长链推理的智能环境模拟。通过三阶段的训练流程，这些模型利用真实环境中的交互轨迹，显著提高了模拟的准确性和智能体的表现。我们的实验结果表明，Qwen-AgentWorld在多个基准测试中超越了现有的前沿模型。'}}}, {'id': 'https://huggingface.co/papers/2606.24530', 'title': 'NatureBench: Can Coding Agents Match the Published SOTA of Nature-Family Papers?', 'url': 'https://huggingface.co/papers/2606.24530', 'abstract': "Abstract NatureBench presents a cross-disciplinary benchmark of 90 scientific tasks derived from Nature publications to assess AI coding agents' ability to achieve discovery rather than just reproduction, revealing that current agents primarily rely on methodological translation rather than genuine scientific innovation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce NatureBench, a cross-discipline benchmark of 90 tasks distilled from peer-reviewed Nature-family publications, designed to evaluate whether AI coding agents can move beyond reproduction toward discovery on real scientific problems. NatureBench is built on NatureGym, an automated pipeline that constructs a standardized, per-task containerized environment from a source paper, addressing the environment-fragmentation problem that has limited the credibility of prior agent-on-research benchmarks. Evaluating ten frontier agent configurations under a strict web-search-disabled protocol, we find that the strongest model surpasses SOTA on only 17.8% of tasks under the g>0.1 criterion. Analysis of method pathways reveals that agents succeed primarily through methodological translation, converting scientific tasks into familiar supervised prediction problems, rather than through genuine scientific invention. Failures are dominated by wrong method choice and insufficient compute budget, not by task misunderstanding. We release the benchmark, the NatureGym pipeline, and a public leaderboard with maintainer-side reproduction. Code: https://github.com/FrontisAI/NatureBench", 'score': 47, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '47b9126ac8a28659', 'authors': ['Yuru Wang', 'Lejun Cheng', 'Yuxin Zuo', 'Sihang Zeng', 'Bingxiang He', 'Che Jiang', 'Junlin Yang', 'Yuchong Wang', 'Kaikai Zhao', 'Weifeng Huang', 'Kai Tian', 'Zhenzhao Yuan', 'Jincheng Zhong', 'Weizhi Wang', 'Ning Ding', 'Bowen Zhou', 'Kaiyan Zhang'], 'affiliations': ['Frontis.AI', 'Horizon Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.24530.jpg', 'data': {'categories': ['#agents', '#plp', '#science', '#open_source', '#dataset', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'От репродукции к открытиям: как агенты переводят науку в кодирование', 'desc': 'В работе представлен NatureBench — это кроссдисциплинарный бенчмарк из 90 задач, извлечённых из публикаций в Nature, для оценки способности AI кодирующих агентов достигать научных открытий, а не просто воспроизводить результаты. Авторы построили NatureGym — автоматизированный конвейер, который создаёт стандартизированные контейнеризированные окружения для каждой задачи, решая проблему фрагментации окружений в предыдущих бенчмарках. Тестирование десяти передовых конфигураций агентов показало, что лучшая модель превосходит SOTA только на 17,8% задач, при этом анализ путей решения выявил, что агенты преимущественно используют методологическую трансляцию, переводя научные задачи в привычные задачи supervised learning, вместо подлинного научного творчества. Основные причины неудач — неправильный выбор метода и недостаточный вычислительный ресурс, а не непонимание задач.'}, 'en': {'title': 'Pushing AI Beyond Reproduction to Scientific Discovery', 'desc': 'NatureBench is a new benchmark that includes 90 scientific tasks taken from Nature publications to test AI coding agents on their ability to make discoveries instead of just reproducing existing work. The benchmark uses a system called NatureGym to create a consistent environment for each task, which helps solve issues with previous benchmarks that lacked credibility. The study found that the best AI models only performed better than the state-of-the-art on 17.8% of the tasks, indicating that they mainly rely on translating methods rather than innovating new scientific ideas. The research highlights that failures in AI performance are often due to poor method selection and limited computational resources, rather than a misunderstanding of the tasks.'}, 'zh': {'title': '超越复制，迈向科学发现的AI挑战', 'desc': 'NatureBench是一个跨学科的基准测试，包含90个来自《自然》出版物的科学任务，旨在评估人工智能编码代理在科学发现方面的能力。研究表明，目前的代理主要依赖于方法论的转换，而非真正的科学创新。NatureBench基于NatureGym构建，解决了以往研究基准中环境碎片化的问题。通过严格的评估，我们发现最强模型在仅17.8%的任务中超越了现有最佳水平，表明在科学任务中，代理的成功主要依赖于将任务转化为熟悉的监督学习问题。'}}}, {'id': 'https://huggingface.co/papers/2606.19930', 'title': 'MobileForge: Annotation-Free Adaptation for Mobile GUI Agents with Hierarchical Feedback-Guided Policy Optimization', 'url': 'https://huggingface.co/papers/2606.19930', 'abstract': 'Abstract MobileForge enables efficient adaptation of mobile GUI agents through annotation-free learning by combining real app interaction grounding with hierarchical feedback-guided policy optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct MLLM-based mobile GUI agents have made substantial progress in UI understanding and action execution, but adapting them to real target apps remains costly because mobile apps are numerous, frequently updated, and hard to cover with human-written tasks, demonstrations, or reward labels. Existing annotation-free GUI learning reduces manual supervision, yet lacks a unified substrate connecting target-app exploration, curriculum mining, rollout execution, and feedback, while policy optimization often relies on isolated rollouts and coarse rewards that are hard to convert into reliable improvement signals. We present MobileForge, an annotation-free adaptation system for mobile GUI agents. MobileForge consists of MobileGym, which grounds task generation and rollout evaluation in real mobile app interaction, and Hierarchical Feedback-Guided Policy Optimization (HiFPO), which turns trajectory outcomes, step-level process feedback, and corrective hints into hint-contextualized step-level GRPO updates. Using only automatically generated annotation-free adaptation data, MobileForge adapts Qwen3-VL-8B to 67.2% Pass@3 on AndroidWorld, close to the closed-data GUI-specialized GUI-Owl-1.5-8B base model at 69.0%. The MobileForge-adapted ForgeOwl-8B further reaches 77.6% Pass@3 on AndroidWorld and 41.0% success on the out-of-domain MobileWorld GUI-only split, establishing the strongest open-data mobile GUI agent in our evaluation. Code, data, and trained models will be released at https://mobile-forge.github.io/.', 'score': 34, 'issue_id': 2488, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '716ac9c2256b6076', 'authors': ['Guangyi Liu', 'Pengxiang Zhao', 'Gao Wu', 'Yiwen Yin', 'Mading Li', 'Liang Liu', 'Congxiao Liu', 'Zhang Qi', 'Mengyan Wang', 'Liang Guo', 'Yong Liu'], 'affiliations': ['Kuaishou Technology', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19930.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#agents', '#benchmark', '#training'], 'emoji': '📱', 'ru': {'title': 'Адаптация мобильных агентов без разметки через интерактивное обучение и иерархическую оптимизацию политики', 'desc': 'В статье представляется MobileForge - система адаптации мобильных GUI агентов без использования разметки данных. Система объединяет два компонента: MobileGym для генерации задач и оценки на реальных приложениях, и Hierarchical Feedback-Guided Policy Optimization (HiFPO) для преобразования обратной связи на уровне шагов в корректировки политики. Авторы показывают, что автоматически сгенерированные данные адаптации позволяют достичь высокой производительности - 67.2% Pass@3 на бенчмарке AndroidWorld, а адаптированная модель ForgeOwl-8B достигает 77.6% на том же бенчмарке. Подход демонстрирует, что эффективная адаптация GUI агентов возможна без дорогостоящей человеческой разметки, использую только взаимодействие с реальными приложениями и иерархическую обратную связь.'}, 'en': {'title': 'Efficient Adaptation of Mobile GUI Agents Without Annotations', 'desc': "MobileForge is a system designed to help mobile GUI agents learn to adapt to different applications without needing manual annotations. It combines real interactions with apps and a method called Hierarchical Feedback-Guided Policy Optimization (HiFPO) to improve the agents' performance. By using automatically generated data, MobileForge allows agents to learn from their experiences and feedback, making the adaptation process more efficient. The results show that MobileForge can achieve high success rates in navigating mobile apps, outperforming previous models that required more supervision."}, 'zh': {'title': '无注释适应，移动 GUI 代理的高效进化', 'desc': 'MobileForge 是一个无注释的移动 GUI 代理适应系统，通过结合真实应用交互和分层反馈引导的策略优化，实现了高效的适应。该系统包括 MobileGym，用于在真实移动应用交互中生成任务和评估执行效果，以及分层反馈引导的策略优化（HiFPO），将轨迹结果、逐步过程反馈和纠正提示转化为上下文相关的逐步更新。使用自动生成的无注释适应数据，MobileForge 将 Qwen3-VL-8B 的适应率提升至 67.2%，接近专门针对 GUI 的模型 GUI-Owl-1.5-8B 的 69.0%。经过 MobileForge 适应的 ForgeOwl-8B 在 AndroidWorld 上达到了 77.6% 的成功率，成为我们评估中最强的开放数据移动 GUI 代理。'}}}, {'id': 'https://huggingface.co/papers/2606.19926', 'title': 'MemGUI-Agent: An End-to-End Long-Horizon Mobile GUI Agent with Proactive Context Management', 'url': 'https://huggingface.co/papers/2606.19926', 'abstract': 'Abstract MemGUI-Agent addresses long-horizon mobile GUI task limitations through proactive context management using Context-as-Action (ConAct) to maintain critical information across extended sequences.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct MLLM-based mobile GUI agents have made substantial progress on short-horizon tasks, yet remain unreliable on long-horizon tasks that require retaining intermediate facts across many steps and app transitions. We attribute this limitation to ReAct-style prompting, which passively accumulates per-step records, leading to prompt explosion and dilution of critical cross-app facts. To address this, we introduce MemGUI-Agent, an end-to-end long-horizon mobile GUI agent with proactive context management. MemGUI-Agent is built on Context-as-Action (ConAct), which casts context management as first-class actions emitted by the same policy that selects UI actions. Instead of passively appending history, ConAct maintains three structured context fields: folded action history, folded UI state, and recent step record, preserving critical UI facts while keeping context compact. To make proactive context management learnable across model scales, we construct MemGUI-3K, a 2,956-trajectory dataset with full ConAct annotations for supervised training and offline analysis. Training an 8B model on MemGUI-3K produces MemGUI-8B-SFT, an 8B MemGUI-Agent that achieves the best open-data 8B performance on MemGUI-Bench and generalizes to the out-of-distribution MobileWorld benchmark. Code, data, and trained models will be released at https://memgui-agent.github.io/.', 'score': 33, 'issue_id': 2488, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'c145b615b37d0d5b', 'authors': ['Guangyi Liu', 'Gao Wu', 'Congxiao Liu', 'Pengxiang Zhao', 'Liang Liu', 'Mading Li', 'Qi Zhang', 'Mengyan Wang', 'Liang Guo', 'Yong Liu'], 'affiliations': ['Kuaishou Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19926.jpg', 'data': {'categories': ['#long_context', '#open_source'], 'emoji': '📱', 'ru': {'title': 'Активное управление контекстом для решения длительных задач мобильного интерфейса', 'desc': 'В статье предложен MemGUI-Agent — агент для выполнения длительных задач с мобильным графическим интерфейсом, который решает проблему накопления контекста через инновационный подход Context-as-Action (ConAct). Вместо пассивного добавления истории взаимодействий, метод активно управляет контекстом, выделяя его в отдельные действия наряду с выбором элементов UI. Авторы создали датасет MemGUI-3K из 2956 траекторий с полными аннотациями для обучения моделей методом supervised learning. Обученная 8-миллиардная модель MemGUI-8B-SFT достигает лучших результатов среди открытых 8B моделей и хорошо обобщается на распределениях вне обучающего набора.'}, 'en': {'title': 'Proactive Context Management for Long-Horizon Mobile GUI Tasks', 'desc': 'MemGUI-Agent is a mobile GUI agent designed to improve performance on long-horizon tasks by using a method called Context-as-Action (ConAct). This approach allows the agent to actively manage context rather than just passively accumulating information, which helps retain important details across multiple steps and app transitions. By structuring context into three fields—action history, UI state, and recent records—MemGUI-Agent keeps the information compact and relevant. The model is trained on a specially created dataset, MemGUI-3K, enabling it to achieve superior performance on benchmarks for mobile GUI tasks.'}, 'zh': {'title': '主动上下文管理，提升长时间任务表现', 'desc': 'MemGUI-Agent 通过主动的上下文管理来解决长时间移动图形用户界面任务的局限性，采用了上下文作为行动（ConAct）的方法，以保持关键信息在多个步骤和应用程序转换中的连续性。传统的 ReAct 风格提示方法在处理长时间任务时表现不佳，因为它们被动地积累每一步的记录，导致关键信息的稀释。MemGUI-Agent 通过将上下文管理视为由同一策略发出的首要行动，来提高任务的可靠性。我们构建了 MemGUI-3K 数据集，以支持监督训练和离线分析，从而使主动上下文管理在不同模型规模中可学习。'}}}, {'id': 'https://huggingface.co/papers/2606.23449', 'title': 'AOHP: An Open-Source OS-Level Agent Harness for Personalized, Efficient and Secure Interaction', 'url': 'https://huggingface.co/papers/2606.23449', 'abstract': 'Abstract AOHP presents an Android-based operating system framework that treats AI agents as first-class entities, enhancing task completion rates and reducing execution costs through specialized agent-oriented mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI agents are driving a new software paradigm, with the ability to autonomously call tools, extract information, manage memory, and complete tasks that span applications and data sources. Most existing end-user operating systems, however, are designed for application-centric workflows and offer little native support for AI agents. This mismatch limits the wider adoption of agents and leads to execution overhead and safety risks when running agents on conventional systems. While the concept of agent-native operating systems is emerging, the research community lacks an open testbed to explore the architectural primitives desired for agent-mediated interaction. We present AOHP (Android Open Harness Project), an OS-level agent harness built on the Android Open Source Project (AOSP). The core design principle of AOHP is to treat agents as first-class OS actors, enabling adaptive user interfaces and agent-friendly runtime environments. AOHP preserves the mature Android software and hardware ecosystem while introducing three agent-oriented system mechanisms: personalized service composition, efficient agent interfaces, and secure information flow. Based on preliminary experiments on challenging tasks covering key capabilities of OS agents, AOHP shows clear advantages in task completion (+21.12% completion rate), execution cost (-51.55% token cost), and security-policy compliance.', 'score': 25, 'issue_id': 2489, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'f1e70688539f5656', 'authors': ['Shanhui Zhao', 'Jiacheng Liu', 'Guohong Liu', 'Jichao Yan', 'Jialei Ye', 'Yuhao Yang', 'Hao Wen', 'Shizuo Tian', 'Yizhen Yuan', 'Yuxuan Chen', 'Yunxin Liu', 'Ju Ren', 'Ya-Qin Zhang', 'Chao Huang', 'Yao Guo', 'Yuanchun Li'], 'affiliations': ['Peking University', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.23449.jpg', 'data': {'categories': ['#robotics', '#agents'], 'emoji': '🤖', 'ru': {'title': 'AI агенты как основные субъекты операционной системы', 'desc': 'AOHP представляет операционную систему на базе Android, которая рассматривает AI агентов как первоклассные сущности системы. Основная идея заключается в создании специализированных механизмов на уровне ОС для оптимизации взаимодействия с агентами, включая персонализированную композицию сервисов и безопасный обмен информацией. Экспериментальные результаты демонстрируют существенные улучшения: повышение процента выполнения задач на 21.12%, снижение затрат токенов на 51.55% и лучшее соответствие политикам безопасности. Фреймворк AOHP, построенный на основе AOSP, сочетает зрелую экосистему Android с новыми агент-ориентированными возможностями системы.'}, 'en': {'title': 'Empowering AI Agents as First-Class Citizens in Android OS', 'desc': 'The AOHP (Android Open Harness Project) introduces a new framework for Android that prioritizes AI agents as essential components of the operating system. This framework enhances the efficiency of task completion and reduces costs by implementing specialized mechanisms tailored for agent interactions. Unlike traditional operating systems that focus on applications, AOHP creates an environment where agents can autonomously manage tasks, access tools, and handle data seamlessly. Preliminary results indicate that AOHP significantly improves task completion rates and reduces execution costs while maintaining security compliance.'}, 'zh': {'title': 'AI代理的新时代：AOHP操作系统框架', 'desc': 'AOHP是一个基于Android的操作系统框架，专门为AI代理提供支持，提升任务完成率并降低执行成本。该系统将AI代理视为操作系统的第一类实体，允许它们自主调用工具、提取信息和管理内存。与传统的以应用为中心的操作系统不同，AOHP为AI代理提供了更好的运行环境和用户界面。通过初步实验，AOHP在任务完成率和执行成本方面显示出显著优势。'}}}, {'id': 'https://huggingface.co/papers/2606.24855', 'title': 'OpenThoughts-Agent: Data Recipes for Agentic Models', 'url': 'https://huggingface.co/papers/2606.24855', 'abstract': 'Abstract An open-source data curation pipeline for training agentic language models is presented, demonstrating superior performance through systematic experimentation and scalable training data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic language models dramatically expand the applications of AI yet little is publicly known about how to curate training data for broadly capable agents. Existing open efforts such as SWE-Smith, SERA, and Nemotron-Terminal typically target a single benchmark, leaving open the question of how to train models that generalize across diverse agentic tasks. The OpenThoughts-Agent (OT-Agent) project addresses this gap with a fully open data curation pipeline for training agentic models. We conduct more than 100 controlled ablation experiments to systematically investigate each stage of the pipeline, yielding insights on the importance of task sources and diversity. We then assemble a training set of 100K examples from our pipeline and fine-tune Qwen3-32B on this dataset, which yields an average accuracy of 44.8% across seven agentic benchmarks and a 3.9 percentage point improvement over the strongest existing open data agentic model (Nemotron-Terminal-32B, 40.9%). Moreover, our training data exhibits strong scaling properties, outperforming alternative open datasets at every training set size in compute-controlled comparisons. We publicly release our training sets, data pipeline, experimental data, and models at openthoughts.ai to support future open research on agentic model training.', 'score': 22, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '24da46ddbc682aab', 'authors': ['Negin Raoof', 'Richard Zhuang', 'Marianna Nezhurina', 'Etash Guha', 'Atula Tejaswi', 'Ryan Marten', 'Charlie F. Ruan', 'Tyler Griggs', 'Alexander Glenn Shaw', 'Hritik Bansal', 'E. Kelly Buchanan', 'Artem Gazizov', 'Reinhard Heckel', 'Chinmay Hegde', 'Sankalp Jajee', 'Daanish Khazi', 'Emmanouil Koukoumidis', 'Xiangyi Li', 'Hange Liu', 'Shlok Natarajan', 'Harsh Raj', 'Nicholas Roberts', 'Ethan Shen', 'Nishad Singhi', 'Michael Siu', 'Ashima Suvarna', 'Hanwen Xing', 'Patrick Yubeaton', 'Robert Zhang', 'Leon Liangyu Chen', 'Xiaokun Chen', 'Steven Dillmann', 'Saadia Gabriel', 'Xunyi Jiang', 'Anurag Kashyap', 'Boxuan Li', 'Yein Park', 'Minh Pham', 'Sujay Sanghavi', 'Lin Shi', 'Ke Sun', 'Yixin Wang', 'Zhiwei Xu', 'Erica Zhang', 'Siyan Zhao', 'Wanjia Zhao', 'Jenia Jitsev', 'Alex Dimakis', 'Benjamin Feuer', 'Ludwig Schmidt'], 'affiliations': ['Amazon', 'BenchFlow', 'Bespoke Labs', 'Cornell Tech', 'Harvard Medical School', 'Harvard University', 'Independent Researcher', 'JSC', 'Korea University', 'LAION', 'Laude Institute', 'Medical University of South Carolina', 'Microsoft', 'Munich Center for Machine Learning', 'New York University', 'Northeastern University', 'Open-Ψ (Open-Sci) Collective', 'Oumi.AI', 'Stanford University', 'TU Darmstadt', 'TU Munich', 'The LLM Data Company', 'UC Berkeley', 'UC San Diego', 'UCLA', 'University of Michigan', 'University of Southern California', 'University of Texas at Austin', 'University of Washington', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.24855.jpg', 'data': {'categories': ['#data', '#dataset', '#agents', '#optimization', '#benchmark', '#open_source', '#training'], 'emoji': '🤖', 'ru': {'title': 'Открытый конвейер подготовки данных для обучения универсальных агентных моделей', 'desc': 'В статье представлена открытая система подготовки данных для обучения агентных языковых моделей, которые могут выполнять сложные задачи автономно. Авторы провели более 100 контролируемых экспериментов абляции, чтобы систематически исследовать каждый этап конвейера обработки данных и определить важность разнообразия источников задач. Они собрали датасет из 100 тысяч примеров и обучили модель Qwen3-32B, достигнув среднюю точность 44,8% на семи эталонных тестах агентов, улучшив результат на 3,9 процентных пункта относительно лучшей открытой альтернативы. Полученные обучающие данные демонстрируют хорошие масштабируемые свойства и превосходят альтернативные открытые датасеты при сравнении при одинаковом объёме вычислительных ресурсов.'}, 'en': {'title': 'Empowering AI with Open Data Curation for Agentic Models', 'desc': 'This paper introduces an open-source data curation pipeline designed for training agentic language models, which are AI models capable of performing a wide range of tasks. The authors conducted over 100 controlled experiments to analyze the effectiveness of different stages in the data curation process, focusing on the diversity and sources of tasks. They created a training dataset of 100,000 examples and fine-tuned a model, achieving a notable accuracy improvement over existing models. The results demonstrate that their approach not only enhances performance but also scales effectively, making it a valuable resource for future research in agentic model training.'}, 'zh': {'title': '开放数据整理，提升智能模型训练', 'desc': '本文介绍了一个开源的数据整理流程，用于训练具有自主能力的语言模型。通过系统实验和可扩展的训练数据，展示了优越的性能。OpenThoughts-Agent项目填补了现有模型在多样化任务上的训练数据缺口，提供了一个全面开放的数据整理管道。我们进行了100多次控制性消融实验，揭示了任务来源和多样性的重要性，并在此基础上构建了一个包含10万例的训练集。'}}}, {'id': 'https://huggingface.co/papers/2602.09379', 'title': 'LingxiDiagBench: A Multi-Agent Framework for Benchmarking LLMs in Chinese Psychiatric Consultation and Diagnosis', 'url': 'https://huggingface.co/papers/2602.09379', 'abstract': 'Abstract A large-scale multi-agent benchmark for evaluating LLMs in Chinese psychiatric diagnosis is introduced, highlighting challenges in dynamic consultation and the gap between consultation quality and diagnostic accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mental disorders are highly prevalent worldwide, but the shortage of psychiatrists and the inherent subjectivity of interview-based diagnosis create substantial barriers to timely and consistent mental-health assessment. Progress in AI-assisted psychiatric diagnosis is constrained by the absence of benchmarks that simultaneously provide realistic patient simulation, clinician-verified diagnostic labels, and support for dynamic multi-turn consultation. We present LingxiDiagBench, a large-scale multi-agent benchmark that evaluates LLMs on both static diagnostic inference and dynamic multi-turn psychiatric consultation in Chinese. At its core is LingxiDiag-16K, a dataset of 16,000 EMR-aligned synthetic consultation dialogues designed to reproduce real clinical demographic and diagnostic distributions across 12 ICD-10 psychiatric categories. Through extensive experiments across state-of-the-art LLMs, we establish key findings: (1) although LLMs achieve high accuracy on binary depression--anxiety classification (up to 92.3%), performance deteriorates substantially for depression--anxiety comorbidity recognition (43.0%) and 12-way differential diagnosis (28.5%); (2) dynamic consultation often underperforms static evaluation, indicating that ineffective information-gathering strategies significantly impair downstream diagnostic reasoning; (3) consultation quality assessed by LLM-as-a-Judge shows only moderate correlation with diagnostic accuracy, suggesting that well-structured questioning alone does not ensure correct diagnostic decisions. We release LingxiDiag-16K and the full evaluation framework to support reproducible research at https://github.com/Lingxi-mental-health/LingxiDiagBench.', 'score': 19, 'issue_id': 2489, 'pub_date': '2026-06-11', 'pub_date_card': {'ru': '11 июня', 'en': 'June 11', 'zh': '6月11日'}, 'hash': '06840ee2407fd3a8', 'authors': ['Shihao Xu', 'Tiancheng Zhou', 'Jiatong Ma', 'Yanli Ding', 'Yiming Yan', 'Ming Xiao', 'Guoyi Li', 'Haiyang Geng', 'Yunyun Han', 'Jianhua Chen', 'Yafeng Deng'], 'affiliations': ['EverMind AI Inc. California, USA', 'Shanghai Mental Health Center, Shanghai Jiao Tong University School of Medicine Shanghai, China', 'Tianqiao and Chrissy Chen Institute Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2602.09379.jpg', 'data': {'categories': ['#agents', '#reasoning', '#healthcare', '#science', '#open_source', '#low_resource', '#dataset', '#synthetic', '#multilingual', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Когда вопросы хорошие, но диагноз неправильный: пробелы LLM в психиатрической диагностике', 'desc': 'В работе представлена LingxiDiagBench — крупномасштабный бенчмарк для оценки больших языковых моделей (LLM) в задаче психиатрической диагностики на китайском языке. Ключевым компонентом является датасет LingxiDiag-16K с 16 000 синтетических диалогов консультаций, спроектированных для воспроизведения реальных клинических распределений по 12 категориям психических расстройств согласно МКБ-10. Исследование выявило критические проблемы: хотя модели достигают высокой точности на простой бинарной классификации (до 92,3%), их производительность резко падает при диагностике коморбидности (43,0%) и многоклассовой дифференциальной диагностике (28,5%). Установлено, что динамические многоходовые консультации часто показывают худшие результаты, чем статическая оценка, что указывает на недостаточно эффективные стратегии сбора информации и слабую корреляцию между качеством консультации и правильностью диагноза.'}, 'en': {'title': 'Enhancing AI in Psychiatric Diagnosis with LingxiDiagBench', 'desc': 'This paper introduces LingxiDiagBench, a benchmark designed to evaluate large language models (LLMs) in the context of psychiatric diagnosis in Chinese. It addresses the challenges of dynamic consultations and the discrepancies between consultation quality and diagnostic accuracy. The benchmark includes a dataset of 16,000 synthetic consultation dialogues that reflect real clinical scenarios across various psychiatric categories. The findings reveal that while LLMs perform well in simple classifications, their effectiveness drops significantly in more complex diagnostic tasks, highlighting the need for improved information-gathering strategies during consultations.'}, 'zh': {'title': '评估中文精神病诊断的智能基准', 'desc': '本文介绍了一个大型多智能体基准，旨在评估中文精神病诊断中的大型语言模型（LLMs）。该基准名为LingxiDiagBench，包含16,000个合成咨询对话，模拟真实的临床情况。研究发现，尽管LLMs在二元抑郁-焦虑分类上表现良好，但在抑郁-焦虑共病识别和多类别鉴别诊断中表现较差。此外，动态咨询的效果往往不如静态评估，表明信息收集策略的有效性对诊断推理至关重要。'}}}, {'id': 'https://huggingface.co/papers/2606.24876', 'title': 'FLAT: Feedforward Latent Triangle Splatting for Geometrically Accurate Scene Generation', 'url': 'https://huggingface.co/papers/2606.24876', 'abstract': 'Abstract Video diffusion models are adapted to decode explicit surface primitives directly from latent space, enabling high-quality 3D scene generation with improved geometric accuracy and real-time rendering capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating explorable 3D scenes from a single image requires strong generative priors and accurate geometric representations suitable for downstream use. Current video diffusion models offer high-quality generation and implicitly encode multi-view geometric structure in latent space. However, existing feedforward latent scene decoders typically output volumetric 3D Gaussians that lack a well-defined surface, limiting their use in simulation or standard graphics pipelines. This motivates decoding surface-aligned primitives that are not only renderable but also closer to explicit geometric assets. We ask whether compressed video diffusion latents can be mapped directly to explicit surface primitives in a single pass. To this end, we introduce FLAT and, for the first time, show that triangle splats can be decoded directly from video diffusion latents. Compared with decoding 3D Gaussians, predicting flat primitives is notoriously more challenging due to high sensitivity to primitive orientations, oftentimes leading to poor gradient flow. FLAT solves with two key ingredients: a ray-centered rotation parameterization for triangle regression and a novel product window function that improves gradient flow during differentiable triangle rendering. On standard benchmarks, FLAT achieves significantly better geometric accuracy while maintaining competitive visual quality compared to state-of-the-art feedforward baselines. We further show that a lightweight test-time refinement step converts the predicted triangle soup into a fully opaque, game-engine-ready representation that supports real-time rendering. By evaluating 3DGS, 2DGS, and triangle splatting variants under an identical training setup, we provide the first systematic analysis of representation tradeoffs in feedforward scene generation. The project page is available at https://flat-splat.github.io', 'score': 13, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '340e58f7c5d7463d', 'authors': ['Orest Kupyn', 'Goutam Bhat', 'Philipp Henzler', 'Fabian Manhardt', 'Christian Rupprecht', 'Federico Tombari'], 'affiliations': ['Google Research', 'TU Munich', 'University of Oxford, Visual Geometry Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.24876.jpg', 'data': {'categories': ['#benchmark', '#video', '#3d'], 'emoji': '🎮', 'ru': {'title': 'Декодирование явных поверхностей из видео диффузионных моделей для быстрого 3D рендеринга', 'desc': 'В этой работе авторы адаптировали видео diffusion модели для декодирования явных геометрических примитивов (треугольных сплатов) непосредственно из латентного пространства, что позволяет генерировать 3D сцены с высокой точностью геометрии. Основной вызов заключался в том, что предсказание плоских примитивов более сложно, чем декодирование 3D гауссианов из-за чувствительности к ориентации примитивов и проблем с градиентным потоком. Авторы предложили два ключевых решения: параметризацию ориентации, центрированную на луче, и новую функцию окна для улучшения градиентного потока при дифференцируемом рендеринге треугольников. Полученная система FLAT достигает лучшей геометрической точности, чем конкурирующие методы, и позволяет получить готовые к реальному времени 3D сцены, совместимые с игровыми движками.'}, 'en': {'title': 'FLAT: Transforming Latent Space into Accurate 3D Surfaces', 'desc': 'This paper presents FLAT, a novel approach that enhances video diffusion models to generate explicit surface primitives from latent space, improving the quality of 3D scene generation. By decoding triangle splats instead of traditional volumetric 3D Gaussians, FLAT achieves better geometric accuracy and is more suitable for real-time rendering applications. The method introduces a ray-centered rotation parameterization and a product window function to address challenges in gradient flow during triangle rendering. The results demonstrate that FLAT outperforms existing methods in both geometric fidelity and visual quality, making it a significant advancement in 3D scene generation.'}, 'zh': {'title': '从视频扩散模型生成高质量3D场景的创新方法', 'desc': '本论文提出了一种新方法FLAT，用于从视频扩散模型中直接解码显式表面原语，以生成高质量的3D场景。通过这种方法，能够实现更好的几何精度和实时渲染能力，克服了传统3D高斯体积输出的局限性。FLAT采用了新的三角形回归参数化和改进的梯度流函数，显著提高了几何准确性和视觉质量。最后，论文还展示了一种轻量级的测试时优化步骤，将预测的三角形转换为适合游戏引擎的完全不透明表示。'}}}, {'id': 'https://huggingface.co/papers/2606.23679', 'title': 'Semantic Browsing: Controllable Diversity for Image Generation', 'url': 'https://huggingface.co/papers/2606.23679', 'abstract': 'Abstract Text-to-image models are enhanced with controlled diversity through semantic browsing capabilities that enable structured navigation of image variations based on meaningful semantic decisions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern text-to-image models excel in visual fidelity and prompt adherence. However, this strict adherence comes at the cost of diversity: generated samples tend to collapse into a single visual interpretation. Existing methods to improve diversity produce outputs driven by incidental variations rather than meaningful design choices. This motivates a new variant of the diversity task where structure is enforced on the generated samples. We introduce a method for controlled diversity that enables Semantic Browsing, where users can navigate structured image galleries and experience creative exploration through a systematic traversal of meaningful, interpretable axes of variation. Achieving this level of semantic control requires a deep understanding of the scene. We exploit the fact that recent text-to-image models are trained on elaborated captions, effectively decoupling semantic decision-making from pixel generation. This enables a paradigm shift: instead of relying on stochastic variation within the text-to-image model, we induce diversity directly at the text level. By leveraging rich textual representations, we allow a Vision Language Model (VLM) to operate on the full scene context. To overcome the generic outputs typical of standard VLMs, we employ an agentic workflow that explicitly enforces structured variation attuned to the original prompt. We demonstrate that our method produces diverse and navigable design spaces where every variation corresponds to a specific, user-understandable semantic decision.', 'score': 13, 'issue_id': 2492, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '4050cd2852269aa1', 'authors': ['Sara Dorfman', 'Maya Vishnevsky', 'Omer Dahary', 'Or Patashnik', 'Daniel Cohen-Or'], 'affiliations': ['Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2606.23679.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Семантический браузинг: управляемое разнообразие в генерации изображений', 'desc': 'Статья представляет метод для управляемого разнообразия в текст-изображение моделях, позволяющий пользователям систематически исследовать вариации изображений через семантические оси. Вместо того чтобы полагаться на стохастическую вариацию внутри генеративной модели, авторы индуцируют разнообразие на уровне текстовых промптов, используя Vision Language Model для анализа полного контекста сцены. Метод использует агентный рабочий процесс, который обеспечивает структурированное варьирование, соответствующее исходному промпту пользователя. Предложенный подход позволяет создавать интерактивные галереи изображений, где каждое варьирование соответствует понятному пользователю семантическому решению.'}, 'en': {'title': 'Unlocking Creative Diversity in Text-to-Image Generation', 'desc': 'This paper presents a new approach to enhance text-to-image models by introducing controlled diversity through a method called Semantic Browsing. Traditional models often generate similar images due to strict adherence to prompts, leading to a lack of variety in outputs. The proposed method allows users to explore structured galleries of images based on meaningful semantic choices, rather than random variations. By leveraging rich textual representations and enforcing structured variation, the model enables a more creative and interpretable exploration of image generation.'}, 'zh': {'title': '通过语义浏览实现图像生成的多样性', 'desc': '这篇论文介绍了一种新的文本到图像模型，旨在通过语义浏览能力增强生成图像的多样性。传统模型在生成图像时往往过于严格，导致输出缺乏多样性，通常只呈现单一的视觉解读。新方法通过结构化的图像导航，允许用户基于有意义的语义决策探索图像变化，从而实现受控的多样性。通过利用丰富的文本表示，模型能够在生成图像时直接在文本层面引入多样性，创造出用户可理解的设计空间。'}}}, {'id': 'https://huggingface.co/papers/2606.22875', 'title': 'FedOT: Ownership Verification and Leakage Tracing via Watermarks for Federated LDMs', 'url': 'https://huggingface.co/papers/2606.22875', 'abstract': 'Abstract FedOT is a novel framework that enables ownership verification and leakage tracing in federated latent diffusion models by introducing chunked watermarking and latent vector transformation to prevent watermark removal attacks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training Latent Diffusion Models (LDMs) within Federated Learning (FL) has attracted increasing attention due to its ability to combine the powerful generative capacity of LDMs with the privacy-preserving properties of FL. However, FL requires sharing the global model with multiple participants, which risks unauthorized model distribution or resale by malicious clients. While an intuitive approach is to adopt existing VAE-based watermarking techniques for LDMs in FL, this strategy falls short in addressing such threats due to two fundamental challenges: (1) Existing methods support ownership verification but lack the ability to trace model leakage to a specific malicious client; (2) VAE-based watermarks are vulnerable, as they can be removed simply by replacing the decoder with a clean counterpart. In this paper, we propose FedOT, the first framework for ownership verification and leakage tracing in federated LDMs. Specifically, to address the first challenge, we design a chunked watermark, where the first part is for ownership verification, and the second part is used for client identification. Furthermore, to overcome the second challenge and secure the model against VAE replacement attack, we introduce Latent Vector Transformation (LVT), which strengthens the connection between the VAE and U-Net latent spaces by modifying the original latent distribution of the VAE. Consequently, any attempt to replace the VAE for watermark removal leads to significant image quality degradation, making the LDM model unusable. Extensive experiments demonstrate that FedOT achieves superior performance in both ownership verification and traceability. Project page: https://spyzixuan.github.io/FedOT/.', 'score': 9, 'issue_id': 2489, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '7cd076c2249dd2fb', 'authors': ['Wenlong Cheng', 'Yuan Gan', 'Yunqiu Xu', 'Jiaxu Miao'], 'affiliations': ['National University of Singapore', 'Northwest Normal University', 'Sun Yat-sen University', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2606.22875.jpg', 'data': {'categories': ['#leakage', '#diffusion', '#security'], 'emoji': '🔐', 'ru': {'title': 'Защита федеративных моделей диффузии: отслеживание утечек через адаптивные водяные знаки', 'desc': 'В статье представлена FedOT — фреймворк для верификации владения и отслеживания утечек в федеративных моделях латентной диффузии. Авторы предлагают метод разделённого водяного знака (chunked watermarking), где первая часть используется для проверки собственности, а вторая — для идентификации клиента. Для защиты от атак замены VAE-декодера применяется трансформация латентных векторов (Latent Vector Transformation), которая усиливает связь между латентными пространствами VAE и U-Net, изменяя исходное распределение. Таким образом, попытка удалить водяной знак путём замены VAE приводит к значительной деградации качества изображений, делая модель непригодной для использования.'}, 'en': {'title': 'Securing Federated Learning with FedOT: Ownership and Traceability Redefined', 'desc': "FedOT is a new framework designed to ensure ownership verification and trace model leakage in federated latent diffusion models (LDMs). It introduces chunked watermarking, which separates ownership verification from client identification, enhancing security against unauthorized use. Additionally, it employs Latent Vector Transformation (LVT) to strengthen the model's defenses against attacks that aim to remove watermarks by replacing components of the model. The results show that FedOT significantly improves both the verification of ownership and the ability to trace leaks back to specific malicious clients."}, 'zh': {'title': 'FedOT：保护联邦学习模型的所有权与安全', 'desc': 'FedOT是一个新颖的框架，旨在通过引入分块水印和潜在向量变换来实现联邦潜在扩散模型的所有权验证和泄漏追踪。该框架结合了潜在扩散模型的强大生成能力和联邦学习的隐私保护特性，解决了模型共享带来的安全风险。FedOT设计了分块水印，第一部分用于所有权验证，第二部分用于客户识别，从而有效应对恶意客户端的威胁。此外，通过潜在向量变换，FedOT增强了VAE与U-Net潜在空间之间的连接，防止了水印被移除的攻击。'}}}, {'id': 'https://huggingface.co/papers/2606.24428', 'title': 'Escaping the Self-Confirmation Trap: An Execute-Distill-Verify Paradigm for Agentic Experience Learning', 'url': 'https://huggingface.co/papers/2606.24428', 'abstract': 'Abstract EDV is a three-stage framework that uses multiple heterogeneous agents to collaboratively construct reliable experiences for LLM agents, preventing self-confirmatory errors through execute-distill-verify processes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Experience-driven self-evolution is critical for large language model (LLM) agents to improve through open-world interaction. However, existing experience learning methods mostly rely on single-agent loops, where the same agent executes tasks, summarizes outcomes, and determines memory content. This setup makes agents vulnerable to the Self-Confirmation Trap: wrong-but-self-consistent trajectories are misidentified as successful experience, leading to cumulative errors during retrieval and reuse. To address this issue, we propose EDV, an Execute-Distill-Verify framework for reliable experience learning. In the Execute stage, multiple heterogeneous agents explore the same task space in parallel to generate diverse candidate trajectories. In the Distill stage, a dedicated third-party agent comparatively analyzes these trajectories to produce candidate experiences, reducing executor-centric summarization bias. In the Verify stage, the execution group validates candidates via a consensus mechanism, and only approved experiences are written into shared or private memory. By decoupling the three stages, EDV transforms experience learning from isolated self-reflection into collaborative construction, filtering erroneous and noisy content before memory insertion. We evaluate EDV on three challenging long-horizon benchmarks: tau2-bench, Mind2Web and MMTB. Results show EDV consistently outperforms strong baselines, validating that reliable experience construction is essential for robust agent self-evolution. Our code is available at https://github.com/shidingz/EDV.', 'score': 8, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '9f8023a5ead9d999', 'authors': ['Shiding Zhu', 'Yudi Qi', 'Yajie Wang', 'Jiaze Li', 'Chao Song', 'Yaorui Shi', 'Yibo Miao', 'Hanqi Gao', 'Kai Zhang'], 'affiliations': ['Independent Researcher', 'Northwestern Polytechnical University', 'Shanghai Jiaotong University', 'Shenzhen International Graduate School, Tsinghua University', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24428.jpg', 'data': {'categories': [], 'emoji': '🤝', 'ru': {'title': 'Коллаборативное построение надёжного опыта для самоэволюции LLM-агентов', 'desc': 'В работе предложен фреймворк EDV, который использует несколько разнородных агентов для построения надёжного опыта LLM-агентов через процессы выполнения, дистилляции и верификации. Основная проблема заключается в ловушке самоподтверждения: агент может ошибочно считать неправильную, но самосогласованную траекторию успешным опытом, что приводит к накоплению ошибок при использовании памяти. Фреймворк разделяет процесс обучения на три этапа: в Execute несколько агентов параллельно исследуют пространство задач, в Distill третий агент анализирует траектории и снижает смещение, в Verify группа агентов консенсусом одобряет только надёжный опыт. Экспериментальные результаты на трёх сложных бенчмарках показывают, что коллаборативное построение опыта превосходит самостоятельное отражение и существенно улучшает эволюцию агентов.'}, 'en': {'title': 'Collaborative Experience Learning for Robust LLM Evolution', 'desc': 'The paper introduces EDV, a three-stage framework designed to enhance the reliability of experience learning in large language model (LLM) agents. It addresses the Self-Confirmation Trap, where agents mistakenly identify incorrect experiences as successful due to their isolated learning processes. EDV employs multiple heterogeneous agents to collaboratively explore tasks, distill diverse trajectories, and verify experiences through consensus, thus reducing bias and errors. The framework demonstrates superior performance on challenging benchmarks, highlighting the importance of collaborative experience construction for effective agent self-evolution.'}, 'zh': {'title': 'EDV：协作构建可靠经验的框架', 'desc': 'EDV是一个三阶段框架，利用多个异构代理协作构建可靠的经验，防止自我确认错误。该框架通过执行-提炼-验证的过程，提升大型语言模型（LLM）代理在开放世界交互中的自我进化能力。与传统的单代理学习方法不同，EDV通过并行探索生成多样化的候选轨迹，减少了执行者中心的总结偏差。最终，只有经过共识机制验证的经验才会被写入共享或私有记忆，从而提高了经验学习的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2606.24548', 'title': 'Are Text-to-Image Models Inductivist Turkeys? A Counterfactual Benchmark for Causal Reasoning', 'url': 'https://huggingface.co/papers/2606.24548', 'abstract': "Abstract Text-to-image models fail to generate counterfactual scenes because they rely on tightly coupled visual-textual patterns rather than causal reasoning, demonstrating limited understanding beyond pattern matching.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Text-to-image (T2I) generation models have achieved remarkable progress in producing visually realistic images from natural language prompts. Yet it remains unclear whether their success reflects genuine causal understanding or sophisticated pattern matching over visual-textual correlations. Inspired by Russell's inductivist turkey, we introduce Counterfactual-World (CF-World), a counterfactual benchmark designed to investigate whether text-to-image models can generate images under rules that systematically contradict real-world priors. CF-World organizes each scenario into three progressive levels: factual generation under ordinary world knowledge, explicit counterfactual generation with direct visual instructions, and implicit counterfactual generation requiring causal deduction from altered rules. We evaluate both open-source and closed-source T2I models using a Vision Language Model (VLM)-based evaluator (CF-Eval). Furthermore, we introduce two metrics: Prior Resistance Rate (PRR), which measures a model's ability to overcome entrenched real-world priors, and Reasoning Retention Rate (RRR), which assesses whether models can maintain reasoning-dependent counterfactual generation without explicit visual cues. Experiments show that all models exhibit sharp degradation from factual to counterfactual settings. Further analyses suggest that these failures arise because current T2I models encode world knowledge and visual appearances as tightly coupled patterns. Consequently, their heavy reliance on frequent visual co-occurrences within the training data forces them to default to familiar commonsense priors when tasked with rendering counterfactual worlds.", 'score': 5, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '7d51ec5948c78908', 'authors': ['Jiayi Lei', 'Yuandong Pu', 'Xingyu Han', 'Rongpeng Zhu', 'Jing Xu', 'Jinyao Wang', 'Zijian Zhou', 'Bin Fu', 'Yuewen Cao', 'Yihao Liu', 'Yongsheng Li'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24548.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal', '#cv'], 'emoji': '🔄', 'ru': {'title': 'За пределами корреляций: причинное рассуждение в генерации изображений из текста', 'desc': 'Исследование показывает, что модели генерации изображений из текста (T2I) не способны создавать контрфактические сцены, так как они полагаются на заученные визуально-текстовые корреляции вместо причинного рассуждения. Авторы предложили бенчмарк CF-World для оценки способности T2I моделей генерировать изображения в условиях, противоречащих реальному миру, с тремя уровнями сложности: факт, явный контрфактический сценарий и имплицитный, требующий логического вывода. Для оценки введены две метрики: Prior Resistance Rate (устойчивость к приоритетам) и Reasoning Retention Rate (сохранение логического рассуждения). Эксперименты демонстрируют резкое падение производительности всех моделей при переходе от факт к контрфактическим условиям, что указывает на отсутствие истинного причинного понимания.'}, 'en': {'title': 'Challenging T2I Models: Beyond Pattern Matching to Causal Reasoning', 'desc': "This paper examines the limitations of text-to-image (T2I) models in generating counterfactual scenes, highlighting their reliance on visual-textual patterns rather than true causal reasoning. The authors introduce a benchmark called Counterfactual-World (CF-World) to test the models' ability to create images that contradict real-world knowledge. They evaluate various T2I models using a Vision Language Model (VLM) and propose two new metrics: Prior Resistance Rate (PRR) and Reasoning Retention Rate (RRR) to measure the models' performance. Results indicate that these models struggle significantly when moving from factual to counterfactual scenarios, primarily due to their dependence on established visual patterns and commonsense knowledge."}, 'zh': {'title': '反事实生成的挑战与机遇', 'desc': '本文探讨了文本到图像生成模型在生成反事实场景时的局限性。这些模型依赖于视觉和文本之间的紧密模式，而不是因果推理，显示出它们的理解能力有限。我们提出了一个名为反事实世界（CF-World）的基准，旨在评估这些模型在与现实世界相悖的规则下生成图像的能力。实验结果表明，当前的模型在处理反事实生成时表现不佳，主要是因为它们过于依赖训练数据中的常见视觉模式。'}}}, {'id': 'https://huggingface.co/papers/2606.24888', 'title': 'DiffusionBench: On Holistic Evaluation of Diffusion Transformers', 'url': 'https://huggingface.co/papers/2606.24888', 'abstract': 'Abstract Researchers introduce NanoGen, a unified framework for training and evaluating diffusion transformers that demonstrates the need for comprehensive benchmarking beyond ImageNet class-conditional generation to assess true progress in generative modeling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion transformer (DiT) research on image generation has converged to a single evaluation setup: class-conditional generation on ImageNet. While methods improve the FID and related metrics, it is increasingly unclear whether they reflect real progress in generative modeling. The natural alternative, i.e., text-to-image (T2I) generation, is perceived as too costly or inconvenient to train and evaluate and is often skipped. We argue that this perception no longer holds. We introduce NanoGen, a unified DiT training and evaluation framework. NanoGen matches state-of-the-art DiT baselines on ImageNet and, with 12 lines of configuration change, also trains competitive text-to-image models. It currently supports RAE, VAE, pixel-space, and MeanFlow diffusion methods under both ImageNet and T2I setups. Under NanoGen, training T2I requires comparable compute to ImageNet. After training 21 latent diffusion models with NanoGen, we observe that method ranking shows no strong correlation between ImageNet and T2I generation: Pearson correlation is between -0.377 and -0.580 across three metrics. This suggests that a method which improves class-conditional ImageNet FID may show no corresponding improvement on T2I, clearly indicating the necessity of evaluating DiTs on both tasks. To this end, we summarize ImageNet and text-to-image results, which yields DiffusionBench, a holistic benchmark for DiT research. We recommend reporting DiffusionBench in place of ImageNet alone: methods that improve DiffusionBench are more likely to reflect broader progress.', 'score': 4, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'a317bb894a33b751', 'authors': ['Xingjian Leng', 'Jaskirat Singh', 'Zhanhao Liang', 'Ethan Smith', 'Martin Bell', 'Aninda Saha', 'Yuhui Yuan', 'Liang Zheng'], 'affiliations': ['Australian National University', 'Canva Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.24888.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#optimization', '#benchmark', '#diffusion', '#cv', '#open_source', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Диффузионные трансформеры нуждаются в справедливом сравнении', 'desc': 'Исследователи представляют NanoGen — унифицированный фреймворк для обучения и оценки диффузионных трансформеров, который показывает необходимость комплексного бенчмаркинга для оценки реального прогресса в генеративном моделировании. Авторы демонстрируют, что текущая практика оценки только на ImageNet недостаточна, так как рейтинг методов по T2I генерации показывает слабую корреляцию (от -0.377 до -0.580) с результатами ImageNet. NanoGen позволяет эффективно обучать как условную генерацию по классам, так и текст-изображение модели с сравнимыми вычислительными затратами, поддерживая различные методы диффузии и архитектуры компрессии. На основе результатов обучения 21 модели авторы предлагают DiffusionBench — комплексный бенчмарк, который лучше отражает прогресс в генеративном моделировании нежели оценка только на ImageNet.'}, 'en': {'title': 'NanoGen: Bridging the Gap in Generative Model Evaluation', 'desc': 'The paper presents NanoGen, a framework designed for training and evaluating diffusion transformers in generative modeling. It highlights the limitations of relying solely on ImageNet for benchmarking, as improvements in FID scores do not necessarily indicate real advancements in generative capabilities. The authors demonstrate that training text-to-image models using NanoGen is now feasible with similar computational costs to ImageNet. They propose DiffusionBench as a comprehensive benchmark that includes both ImageNet and text-to-image evaluations, emphasizing the importance of assessing models on multiple tasks to gauge true progress in the field.'}, 'zh': {'title': 'NanoGen：生成建模的新基准', 'desc': '研究人员提出了NanoGen，这是一个统一的框架，用于训练和评估扩散变换器（DiT），强调了在生成建模中进行全面基准测试的必要性，超越了仅依赖ImageNet的类别条件生成。尽管方法在FID等指标上有所改善，但这些指标是否真正反映了生成建模的进展变得越来越不明确。NanoGen能够在ImageNet上与最先进的DiT基线相匹配，并且通过少量配置更改，也能训练出具有竞争力的文本到图像（T2I）模型。研究表明，ImageNet和T2I生成之间的排名没有强相关性，强调了在这两项任务上评估DiT的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.24133', 'title': 'Holistic Data Scheduler for LLM Pre-training via Multi-Objective Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.24133', 'abstract': 'Abstract A novel online data mixing framework called Holistic Data Scheduler uses reinforcement learning with a multi-objective reward function to optimize large language model pre-training efficiency and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The composition of training data, governed by the diversity of sources and their mixing strategy, is a cornerstone of Large Language Model (LLM) pre-training. Online Data Mixing (ODM), the technique of adaptively adjusting data mixtures during training, has emerged as a promising direction to improve efficiency. However, existing methods are constrained by their reliance on a singular optimization perspective, which fundamentally overlooks the need for complex LLM pre-training to consider the dynamic data composition from multiple dimensions. To overcome this limitation, we introduce the Holistic Data Scheduler (HDS), a novel online data mixing framework. HDS formulates the data scheduling challenge as a reinforcement learning problem in a continuous control space and leverages the Soft Actor-Critic (SAC) algorithm for its stability and sample efficiency in exploring the high-dimensional policy space. At the core of HDS lies a novel multi-objective, holistic reward function that integrates three critical perspectives: a data-driven reward for quality, a loss-driven reward capturing inter-domain influence, and a model-driven reward based on weight norms. To validate our design and determine its optimal configuration, we conducted systematic experiments on LLMs of various sizes. On The Pile benchmark, HDS reaches the final validation perplexity of the next best method with 44% fewer training iterations. Furthermore, it achieves a 7.2% improvement on the MMLU 0-shot task along with consistent gains on other benchmarks, showcasing its ability to enhance both training efficiency and final model capability.', 'score': 3, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '41631ca50c052686', 'authors': ['Chenhao Dang', 'Jing Ma', 'Mingjie Liao'], 'affiliations': ['Alibaba Group', 'China Electronics Technology Group Corporation 15th Research Institute', 'Renmin University of China BRAIN'], 'pdf_title_img': 'assets/pdf/title_img/2606.24133.jpg', 'data': {'categories': ['#training', '#data', '#benchmark', '#rl', '#optimization'], 'emoji': '⚙️', 'ru': {'title': 'Умное расписание данных через обучение с подкреплением', 'desc': 'Статья представляет Holistic Data Scheduler (HDS) — новую систему для оптимизации смешивания данных во время обучения больших языковых моделей. Авторы формулируют задачу планирования данных как проблему обучения с подкреплением, используя алгоритм Soft Actor-Critic для стабильного поиска в высокомерном пространстве политик. Ключевой инновацией является многоцелевая функция вознаграждения, которая одновременно учитывает качество данных, взаимовлияние между доменами и нормы весов модели. Экспериментальные результаты показывают, что HDS достигает той же пропускной способности на 44% быстрее, чем лучший аналог, и улучшает производительность на бенчмарках на 7.2%.'}, 'en': {'title': 'Optimizing LLM Pre-Training with Holistic Data Scheduling', 'desc': 'The paper introduces the Holistic Data Scheduler (HDS), an innovative framework that uses reinforcement learning to optimize the pre-training of large language models (LLMs). HDS addresses the limitations of existing online data mixing methods by employing a multi-objective reward function that considers various aspects of data quality and model performance. By framing the data scheduling as a reinforcement learning problem, HDS utilizes the Soft Actor-Critic algorithm to efficiently explore complex data compositions. Experimental results demonstrate that HDS significantly reduces training iterations while improving model performance on multiple benchmarks.'}, 'zh': {'title': '整体数据调度器：提升语言模型训练效率的创新框架', 'desc': '这篇论文介绍了一种新的在线数据混合框架，称为整体数据调度器（HDS），它利用强化学习和多目标奖励函数来优化大型语言模型的预训练效率和性能。HDS通过将数据调度问题视为一个连续控制空间中的强化学习问题，使用Soft Actor-Critic算法来提高稳定性和样本效率。该框架的核心是一个新颖的多目标奖励函数，综合考虑了数据质量、领域间影响和模型权重等多个方面。实验结果表明，HDS在多个基准测试中显著提高了训练效率和模型能力。'}}}, {'id': 'https://huggingface.co/papers/2606.24112', 'title': 'ReMMD: Realistic Multilingual Multi-Image Agentic Verification for Multimodal Misinformation Detection', 'url': 'https://huggingface.co/papers/2606.24112', 'abstract': 'Abstract A comprehensive multimodal misinformation detection framework is introduced that handles complex, multilingual content with multiple images and diverse verification approaches, achieving superior performance while reducing computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal misinformation detection is increasingly important because viral posts now combine long multilingual narratives, several images, mixed provenance, and subtle text--image framing errors. Existing benchmarks and methods remain poorly matched to this setting: they usually isolate short captions, single images, binary labels, or one manipulation source, while agentic verification remains costly under realistic evidence search. We present ReMMD, a realistic multilingual multi-image agentic verification framework for multimodal misinformation detection. ReMMD includes ReMMDBench, a real-world multimodal misinformation detection benchmark with 500 samples, 2,756 images, five monolingual languages, two cross-lingual settings, three text-length tiers, multi-image posts, five-way veracity labels, eight distortion labels, evidence provenance, and rationales. It also includes ReMMD-Agent, a persistent-memory verifier that decomposes posts into atomic points, builds a reusable evidence set, and predicts structured L1/L2/L3 outputs. Across proprietary systems, open LVLMs, MMD-Agent, and T2-Agent, ReMMD-Agent obtains the best five-way veracity performance, with 41.80% accuracy and 39.12% macro-F1 using GPT-5.2, while reducing cost by 17.5% relative to MMD-Agent and 79.9% relative to T2-Agent. The project is available at https://dang-ai.github.io/ReMMD.', 'score': 2, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '6a23331e84a4bc69', 'authors': ['Chenhao Dang', 'Dantong Zhu', 'Jun Yang', 'Conghui He', 'Weijia Li'], 'affiliations': ['Central South University', 'China Electronics Technology Group Corporation 15th Research Institute', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiaotong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24112.jpg', 'data': {'categories': ['#agents', '#survey', '#open_source', '#low_resource', '#dataset', '#multilingual', '#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Эффективная верификация многомодальной дезинформации на нескольких языках', 'desc': 'В статье представлена комплексная система ReMMD для выявления дезинформации в многомодальном контенте, которая обрабатывает многоязычные посты с несколькими изображениями и разнородными источниками. Авторы создали ReMMDBench — бенчмарк с 500 образцами реальной дезинформации, включающий 2756 изображений на пяти языках и с пятиуровневыми метками истинности. Предложенный ReMMD-Agent использует агентный подход с постоянной памятью, разлагая посты на атомарные утверждения и строя переиспользуемые наборы доказательств для верификации. Система достигает лучшей производительности среди существующих решений, одновременно снижая вычислительные затраты на 17.5-79.9% по сравнению с конкурирующими методами.'}, 'en': {'title': 'ReMMD: Advanced Misinformation Detection for Multimodal Content', 'desc': 'This paper presents a new framework called ReMMD for detecting misinformation in multimodal content, which includes text and images in multiple languages. It addresses the challenges of existing methods that often focus on simpler, isolated cases and do not handle the complexity of real-world misinformation. ReMMD features a comprehensive benchmark, ReMMDBench, with a diverse set of samples and labels to evaluate performance effectively. The framework also includes an innovative verifier, ReMMD-Agent, which improves accuracy and reduces computational costs significantly compared to previous models.'}, 'zh': {'title': '多模态虚假信息检测的新突破', 'desc': '本文介绍了一种全面的多模态虚假信息检测框架，能够处理复杂的多语言内容，包括多张图片和多样的验证方法。该框架名为ReMMD，旨在提高检测性能，同时降低计算成本。ReMMD包含一个真实世界的基准测试集ReMMDBench，涵盖500个样本和2756张图片，支持多种语言和多种验证标签。通过使用ReMMD-Agent，该框架在多种系统中实现了最佳的五分类真实性检测性能，准确率达到41.80%。'}}}, {'id': 'https://huggingface.co/papers/2606.23997', 'title': 'ChartWalker: Benchmarking the Cross-Chart RAG Task', 'url': 'https://huggingface.co/papers/2606.23997', 'abstract': "Abstract ChartWalker presents a novel framework for cross-chart retrieval-augmented generation with hierarchical knowledge graph construction and structure-aware sampling for challenging multi-modal analytical tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Cross-Chart Retrieval-Augmented Generation (RAG) is critical for complex multi-modal analytical tasks in scientific, business, and political domains. However, existing benchmarks either focus on tables, which are well-structured and textualized, or generate cross-chart questions by simply extracting key points, which often induces lexical overlap between queries and evidence and yields logically inconsistent reasoning chains. To address this, we introduce ChartWalker, a novel framework for constructing challenging cross-chart RAG tasks. ChartWalker features a hierarchical knowledge graph construction method tailored to charts, which organizes entities and relations by granularity to preserve analytical structure. We then propose a structure-aware sampling algorithm that synthesizes semantically coherent, multi-hop reasoning paths, enabling explicit control over query difficulty and granularity for QA generation. Built with this framework, we release ChartWalker-Bench, a comprehensive benchmark spanning diverse domains and cross-chart query types. Extensive evaluations across major RAG paradigms reveal significant performance gaps, underscoring the benchmark's difficulty and utility. Furthermore, we provide ChartWalker-Agent, an agentic baseline to facilitate analysis and inspire future system design.", 'score': 2, 'issue_id': 2491, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'b05a124a1fcc0370', 'authors': ['Ning Tang', 'Chenghan Xie', 'Hanyang Yuan', 'Yi Li', 'Renhong Huang', 'Qian Kou', 'Xiaofeng Shi', 'Hua Zhou', 'Jiarong Xu'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Fudan University', 'Stanford University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.23997.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#science', '#rag', '#agents', '#multimodal', '#graphs', '#open_source', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'Структурированный поиск знаний для анализа диаграмм с многошаговым рассуждением', 'desc': 'ChartWalker представляет новую систему для кросс-диаграммного поиска с дополнением знаниями (RAG) с использованием иерархического графа знаний и структурированной выборкой данных. Авторы разработали метод построения иерархического графа знаний, специально адаптированный для диаграмм, который организует сущности и отношения по уровню детализации. Они также предложили алгоритм выборки, чувствительный к структуре, который создает многошаговые цепочки рассуждений с явным контролем над сложностью задачи. На основе этой системы авторы выпустили эталонный набор данных ChartWalker-Bench и предоставили базовый агент для облегчения анализа многомодальных данных.'}, 'en': {'title': 'ChartWalker: Enhancing Cross-Chart A
