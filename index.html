    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

            flags.forEach(flag => {

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.02800', 'title': 'Cosmos 3: Omnimodal World Models for Physical AI', 'url': 'https://huggingface.co/papers/2606.02800', 'abstract': "Abstract Cosmos 3 is an omnimodal world model that processes and generates multiple data types through a unified mixture-of-transformers architecture, achieving state-of-the-art performance in various understanding and generation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Cosmos 3, a family of omnimodal world models designed to jointly process and generate language, image, video, audio, and action sequences within a unified mixture-of-transformers architecture. By supporting highly flexible input-output configurations, Cosmos 3 seamlessly unifies critical modalities for Physical AI -- effectively subsuming vision-language models, video generators, world simulators, and world-action models into a single framework. Our evaluation demonstrates that Cosmos 3 establishes a new state-of-the-art across a diverse suite of understanding and generation tasks, demonstrating omnimodal world models as scalable, general-purpose backbones for embodied agents. Our post-trained Cosmos 3 models were ranked as the best open-source Text-to-Image and Image-to-Video models by Artificial Analysis, and the best policy model by RoboArena at the time the technical report was written. To accelerate open research and deployment in Physical AI, we make our code, model checkpoints, curated synthetic datasets, and evaluation benchmark available under the Linux Foundation's OpenMDW-1.1 https://openmdw.ai/license/1-1/ License at https://github.com/nvidia/cosmos}{github.com/nvidia/cosmos and https://huggingface.co/collections/nvidia/cosmos3 . The project website is available at https://research.nvidia.com/labs/cosmos-lab/cosmos3 .", 'score': 36, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'ec28bedf64a22037', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#robotics', '#synthetic', '#open_source', '#dataset', '#video', '#benchmark', '#architecture', '#multimodal'], 'emoji': '🌌', 'ru': {'title': 'Единая мультимодальная модель мира для физического ИИ', 'desc': 'Cosmos 3 — это мультимодальная модель мира, которая объединяет обработку и генерацию текста, изображений, видео, аудио и последовательностей действий в единой архитектуре на основе смеси трансформеров. Модель использует гибкие конфигурации входных и выходных данных, позволяя унифицировать различные модальности для физического искусственного интеллекта, включая модели зрения-языка, генераторы видео и симуляторы мира. Cosmos 3 достигает состояния науки во многих задачах понимания и генерации контента, функционируя как универсальный основной компонент для воплощённых агентов. Модель была признана лучшей открытой моделью для преобразования текста в изображения, изображения в видео и политик управления роботами согласно независимым оценкам.'}, 'en': {'title': 'Unified Omnimodal Intelligence for Physical AI', 'desc': 'Cosmos 3 is an advanced omnimodal world model that integrates various data types, including language, images, videos, audio, and actions, using a unified mixture-of-transformers architecture. This model excels in both understanding and generating tasks, setting new benchmarks in performance across multiple domains. By allowing flexible input-output configurations, it effectively combines the capabilities of vision-language models, video generators, and world simulators into one cohesive framework. The release of Cosmos 3 aims to enhance research and application in Physical AI, providing resources for the community to build upon its state-of-the-art capabilities.'}, 'zh': {'title': '全模态世界模型的未来', 'desc': 'Cosmos 3 是一种全模态世界模型，能够通过统一的混合变换器架构处理和生成多种数据类型。它支持灵活的输入输出配置，将视觉-语言模型、视频生成器、世界模拟器和世界行动模型整合到一个框架中。我们的评估表明，Cosmos 3 在多种理解和生成任务中达到了新的最先进水平，展示了全模态世界模型作为具身智能的可扩展通用基础。我们还提供了代码、模型检查点和合成数据集，以促进物理人工智能的开放研究和部署。'}}}, {'id': 'https://huggingface.co/papers/2606.02060', 'title': 'Where Do Deep-Research Agents Go Wrong? Span-Level Error Localization in Agent Trajectories', 'url': 'https://huggingface.co/papers/2606.02060', 'abstract': 'Abstract Deep-research agents can be audited using a claim-centric framework that identifies error spans in their reasoning trajectories, improving reliability assessment beyond just final answer evaluation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deep-research agents solve tasks through long trajectories of search, tool use, evidence inspection, and answer synthesis. Evaluation based on final answers shows whether an agent succeeds, but not which parts of the trajectory make the answer unreliable. We study span-level error localization for deep-research agents. We collect 2,790 real trajectories from two agent frameworks, three backbone models, and three benchmarks, convert raw logs into semantic spans, and annotate harmful error spans through LLM-assisted expert review. From these annotations, we build TELBench, a 1,000-instance benchmark for identifying error spans among normal exploration, failed searches, tentative hypotheses, and harmless noise. We further propose DRIFT, a claim-centric auditing framework that tracks agent claims, checks their support in trajectory evidence, and marks spans where unsupported or conflicting claims affect the answer path. Experiments across model families and auditing frameworks show that DRIFT improves span-level error localization and first-error accuracy by up to 30 percentage points. Our work provides a process-level view of reliability in deep-research agents.', 'score': 24, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '10e3d56eeaec92a4', 'authors': ['Jiaming Wang', 'Ziteng Feng', 'Jiangtao Wu', 'Ruihao Li', 'Qianqian Xie', 'Yuxiang Ren', 'He Zhu', 'Xueming Han', 'Fanyu Meng', 'Junlan Feng', 'Jiaheng Liu'], 'affiliations': ['JIUTIAN Research', 'NJU-LINK Team, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.02060.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Поиск ошибок в логике агентов через анализ отдельных утверждений', 'desc': 'Работа предлагает новый подход к проверке надёжности агентов глубокого поиска через анализ ошибок на уровне отдельных фрагментов их рассуждений. Авторы создали TELBench — бенчмарк из 1000 примеров с аннотированными ошибками в траекториях поиска, полученными от различных моделей. Они разработали фреймворк DRIFT, который отслеживает утверждения агента и проверяет их поддержку доказательствами в полученных траекториях. Предложенный метод показывает улучшение в идентификации ошибок на 30 процентных пунктов по сравнению с существующими подходами оценки.'}, 'en': {'title': 'Enhancing Reliability in AI with Claim-Centric Auditing', 'desc': "This paper introduces a new framework called DRIFT for auditing deep-research agents, which are AI systems that solve complex tasks through extensive reasoning processes. Instead of only evaluating the final answers, DRIFT focuses on identifying specific error spans in the agents' reasoning paths that may lead to unreliable conclusions. The authors collected a large dataset of agent trajectories and annotated them to create TELBench, a benchmark for assessing these error spans. The results show that using DRIFT significantly enhances the accuracy of error localization, providing a more detailed understanding of the reliability of deep-research agents."}, 'zh': {'title': '提升深度研究代理的可靠性评估', 'desc': '本文提出了一种基于声明的审计框架，用于深度研究代理的错误定位，超越了仅仅评估最终答案的可靠性。我们收集了2790个真实的推理轨迹，并将其转换为语义跨度，标注出有害的错误跨度。通过构建TELBench基准，我们能够识别正常探索、失败搜索和无害噪声中的错误跨度。实验结果表明，DRIFT框架在错误定位和首次错误准确性方面提高了多达30个百分点，提供了深度研究代理可靠性的过程级视角。'}}}, {'id': 'https://huggingface.co/papers/2606.03746', 'title': 'Qwen-Image-Flash: Beyond Objective Design', 'url': 'https://huggingface.co/papers/2606.03746', 'abstract': 'Abstract Few-step distillation for visual generative models benefits from systematic investigation of training recipes beyond just distillation objectives, leading to improved student performance through optimized data composition, teacher guidance, and task mixture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Few-step distillation has become an effective strategy for accelerating advanced visual generative models, yet prior work has largely focused on distillation objectives. In this work, we revisit few-step distillation from a complementary perspective, focusing on the training recipe that critically shapes student performance. Using Qwen-Image-2.0 as a representative case, we systematically investigate three factors in unified text-to-image generation and instruction-guided image editing distillation: data composition, teacher guidance, and task mixture. Our empirical analysis reveals several non-obvious behaviors, which motivate the development of Qwen-Image-Flash. Overall, our results suggest that effective few-step distillation requires not only carefully designed objectives, but also principled organization of the broader training pipeline.', 'score': 18, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '34175726d57be1c2', 'authors': ['Tianhe Wu', 'Kun Yan', 'Zikai Zhou', 'Lihan Jiang', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Ningyuan Tang', 'Shengming Yin', 'Xiaoyue Chen', 'Xiao Xu', 'Yilei Chen', 'Yuxiang Chen', 'Yan Shu', 'Yixian Xu', 'Yanran Zhang', 'Zihao Liu', 'Zhendong Wang', 'Zekai Zhang', 'Deqing Li', 'Liang Peng', 'Yi Wang', 'Jingren Zhou', 'Chenfei Wu'], 'affiliations': ['Alibaba'], 'pdf_title_img': 'assets/pdf/title_img/2606.03746.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Искусство подготовки рецепта для быстрого обучения визуальных моделей', 'desc': 'В этой работе авторы исследуют дистилляцию визуальных генеративных моделей, фокусируясь не только на функциях потерь, но и на общей подготовке данных и организации процесса обучения. Они систематически анализируют три ключевых фактора: композицию датасета, направление учителя и комбинацию задач для ускорения работы моделей текст-в-изображение и редактирования по инструкциям. Эмпирический анализ выявил неочевидные закономерности, которые привели к разработке Qwen-Image-Flash с улучшенной производительностью студента. Исследование демонстрирует, что эффективная дистилляция требует тщательного проектирования не только целевых функций, но и принципиальной организации всего pipeline обучения.'}, 'en': {'title': 'Optimizing Training Recipes for Better Distillation in Visual Models', 'desc': 'This paper explores few-step distillation in visual generative models, emphasizing the importance of training recipes beyond just the distillation objectives. It identifies three key factors that influence student model performance: data composition, teacher guidance, and task mixture. By analyzing these factors in the context of Qwen-Image-2.0, the authors uncover unexpected behaviors that inform the creation of a new model, Qwen-Image-Flash. The findings suggest that a well-structured training pipeline is crucial for enhancing the effectiveness of few-step distillation.'}, 'zh': {'title': '优化训练流程，提升生成模型性能', 'desc': '本文探讨了少步蒸馏在视觉生成模型中的应用，强调了训练配方的重要性。研究发现，数据组成、教师指导和任务混合是影响学生性能的关键因素。通过对Qwen-Image-2.0的实证分析，揭示了一些非显而易见的行为，促使了Qwen-Image-Flash的发展。总体而言，研究表明，成功的少步蒸馏不仅需要精心设计的目标，还需要合理组织更广泛的训练流程。'}}}, {'id': 'https://huggingface.co/papers/2606.04527', 'title': 'Echo-Infinity: Learning Evolving Memory for Real-Time Infinite Video Generation', 'url': 'https://huggingface.co/papers/2606.04527', 'abstract': "Abstract Echo Infinity enables real-time infinite video generation using learnable evolving memory and unified relative RoPE to overcome limitations in existing autoregressive methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Echo Infinity, an autoregressive (AR) framework towards real-time infinite video generation that employs a learnable evolving memory to dynamically filter, abstract, and compress any-length history at constant cost. Existing methods mainly curate memory with predefined KV-cache schedules, fixed-ratio heuristic compression, or inference-time RoPE adaptation. These designs inevitably lose historical information and amplify compounding errors due to their limited cache window and ignorance of autoregressive generation noise. Inspired by human memory consolidation, Echo-Infinity replaces handcrafted memory curation with learnable Memory Query, which are updated by attention and a gating mechanism when past frames are evicted from the local window. The queries are optimized end-to-end with the video diffusion transformers (DiTs), forming an evolving memory that supports arbitrary compression ratios with constant computation independent of video length. They also act as a generalizable generation prior, improving quality even when only the optimized initial state is used. We further introduce Unified Relative RoPE Recipe, which anchors the sink frames to start from id 0 and lets the newest frame id grow at most to the DiTs' pretrained maximum temporal RoPE id throughout training and inference, freeing the model from the finite RoPE constraint and closing the train-test RoPE extrapolation gap. In long and short video generation, Echo-Infinity achieves state-of-the-art performance, and, to our knowledge, demonstrates promising 24-hour (>1.3 M frames) real-time rollouts for the first time, suggesting a practical path toward infinite video generation.", 'score': 17, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'cadc8ce30a6c1eba', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Бесконечная память для бесконечного видео', 'desc': 'Echo Infinity — это автогрессивная модель для генерации видео в реальном времени, которая использует обучаемую эволюционирующую память для фильтрации и сжатия истории произвольной длины с константной вычислительной сложностью. В отличие от существующих методов с предопределёнными расписаниями KV-кэша и фиксированными коэффициентами сжатия, модель применяет механизм Memory Query, обновляемый через внимание и гейтинг при удалении старых кадров из локального окна. Авторы также предлагают Unified Relative RoPE Recipe, которая устраняет ограничения позиционного кодирования и закрывает разрыв между обучением и тестированием. Модель демонстрирует впечатляющие результаты, включая первую в своем роде генерацию видео в реальном времени продолжительностью 24 часа с более чем 1.3 миллионами кадров.'}, 'en': {'title': 'Revolutionizing Infinite Video Generation with Echo Infinity', 'desc': 'Echo Infinity is a novel autoregressive framework designed for real-time infinite video generation. It utilizes a learnable evolving memory system that dynamically manages historical data, allowing for efficient compression and abstraction without losing important information. By replacing traditional memory curation methods with a Memory Query mechanism, it minimizes compounding errors and enhances video quality. Additionally, the Unified Relative RoPE Recipe enables the model to operate beyond fixed temporal constraints, achieving state-of-the-art results in both short and long video generation.'}, 'zh': {'title': '实时无限视频生成的新突破', 'desc': 'Echo Infinity 是一种自回归框架，能够实时生成无限视频。它使用可学习的演变记忆来动态过滤、抽象和压缩任意长度的历史信息，从而克服了现有方法的局限性。与传统方法不同，Echo Infinity 通过注意力机制和门控机制更新记忆查询，形成一种支持任意压缩比的演变记忆。该方法在长短视频生成中表现出色，首次实现了超过 24 小时的实时视频生成。'}}}, {'id': 'https://huggingface.co/papers/2606.03503', 'title': 'ThoughtFold: Folding Reasoning Chains via Introspective Preference Learning', 'url': 'https://huggingface.co/papers/2606.03503', 'abstract': 'Abstract ThoughtFold addresses over-thinking in large reasoning models by using fine-grained preference learning to identify and eliminate redundant explorations in chain-of-thought reasoning processes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Reasoning Models (LRMs) have achieved remarkable progress thanks to Reinforcement Learning with Verifiable Rewards (RLVR) on Chain-of-Thoughts (CoTs). However, since long CoTs naturally contain trial and errors and mainstream RLVR approaches choose outcome-correct CoT trajectories for memorization, the redundant explorations in long CoTs are inevitably reinforced, which results in the over-thinking issues of LRMs. Previous attempts to resolve this issue mainly give more advantage to shorter trajectories, yet their learning signals are still outcome-based and cannot reduce the memorization of redundant explorations in long CoTs. Therefore, we propose ThoughtFold, a framework that leverages fine-grained preference learning to mitigate redundant explorations for efficient reasoning. ThoughtFold employs an introspective strategy to identify redundancy within each correct trajectory, which yields a spectrum of candidate sub-trajectories. Leveraging this spectrum, we introduce a masked preference optimization objective that explicitly penalizes redundant explorations and encourages the model to directly bridge essential reasoning segments, effectively folding its reasoning chains into a more concise path. Extensive experiments show that ThoughtFold significantly enhances efficiency. It reduces the token usage of DeepSeek-R1-Distill-Qwen-7B by approximately 56% while maintaining state-of-the-art accuracy.', 'score': 17, 'issue_id': 2371, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'f1baf043adfa7153', 'authors': ['Ziyan Liu', 'Xueda Shen', 'Yuzhe Gu', 'Songyang Gao', 'Kuikun Liu', 'Guangran Cheng', 'Chengqi Lyu', 'Dahua Lin', 'Wenwei Zhang', 'Kai Chen'], 'affiliations': ['MMLab, The Chinese University of Hong Kong', 'Shanghai Artificial Intelligence Laboratory', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.03503.jpg', 'data': {'categories': [], 'emoji': '✂️', 'ru': {'title': 'Складывание мыслей: компактное рассуждение через обучение предпочтениям', 'desc': 'ThoughtFold решает проблему избыточного мышления в больших моделях рассуждений, используя тонкозернистое обучение предпочтениям для выявления и устранения лишних исследований в цепочках мыслей. Основной подход основан на том, что стандартные методы обучения с подкреплением по результатам непреднамеренно усиливают запоминание избыточных исследований в длинных цепочках рассуждений. Авторы предлагают использовать интроспективную стратегию для выявления избыточности внутри корректных траекторий и применяют маскированную оптимизацию предпочтений, которая штрафует лишние исследования и поощряет модель напрямую связывать существенные сегменты рассуждений. Экспериментально доказано, что ThoughtFold сокращает использование токенов на 56% без потери точности.'}, 'en': {'title': 'Streamlining Reasoning: Reducing Redundancy in Large Models', 'desc': 'ThoughtFold is a framework designed to improve the efficiency of large reasoning models by addressing the problem of over-thinking during chain-of-thought reasoning. It uses fine-grained preference learning to identify and eliminate redundant explorations within reasoning processes, which often lead to unnecessary complexity. By employing a masked preference optimization objective, ThoughtFold penalizes these redundancies and encourages the model to focus on essential reasoning segments. Experimental results demonstrate that ThoughtFold can significantly reduce token usage while maintaining high accuracy, making reasoning more efficient.'}, 'zh': {'title': '优化推理，减少冗余探索', 'desc': 'ThoughtFold 是一个针对大型推理模型过度思考问题的框架。它通过细粒度的偏好学习来识别和消除链式思维过程中的冗余探索。该方法采用内省策略，识别每个正确轨迹中的冗余部分，并引入掩码偏好优化目标，明确惩罚冗余探索。实验表明，ThoughtFold 显著提高了推理效率，减少了约 56% 的令牌使用，同时保持了最先进的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.03890', 'title': 'OVO-S-Bench: A Hierarchical Benchmark for Streaming Spatial Intelligence in Multimodal LLMs', 'url': 'https://huggingface.co/papers/2606.03890', 'abstract': 'Abstract OVO-S-Bench presents a comprehensive benchmark for evaluating streaming spatial intelligence in multimodal language models through human-annotated questions spanning multiple abstraction levels.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal agents in robotics, AR, and autonomous driving must reason about places and layouts from continuous egocentric streams, often using evidence outside the current view. Existing benchmarks either evaluate offline over full videos or target events rather than spatial structure. We introduce OVO-S-Bench, a fully human-annotated benchmark for streaming spatial intelligence, comprising 1,680 questions over 348 source videos. Annotation involves 12 trained annotators, each also serving as a blind cross-reviewer, across roughly 804 person-hours of multi-round quality assurance. Each question carries a query timestamp and an evidence interval, and at evaluation, the model sees only the prefix preceding the query. Questions span four levels of increasing abstraction: instantaneous egocentric perception, spatiotemporal context tracking, spatial simulation and reasoning, and allocentric mapping. Across 38 proprietary and open-source MLLMs, Gemini-3.1-Pro trails human experts by 27 points, 59.2 vs. 86.6, with allocentric mapping as the dominant bottleneck. Notably, streaming and spatially fine-tuned MLLMs underperform their own backbones. We further find that chain-of-thought reasoning amplifies spatial errors when ungrounded in the stream. By exposing these limitations, OVO-S-Bench establishes a demanding testbed for next-generation streaming spatial MLLMs.', 'score': 17, 'issue_id': 2371, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '8f82348e2831e4aa', 'authors': ['Yifei Li', 'Pengyiang Liu', 'Yuhang Zang', 'Zhongyue Shi', 'Qi Fu', 'Hongye Hao', 'Jiwen Lu'], 'affiliations': ['Beihang University', 'Shanghai AI Laboratory', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03890.jpg', 'data': {'categories': ['#reasoning', '#robotics', '#benchmark', '#video', '#agents', '#survey', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'Потоковое пространственное мышление мультимодальных моделей', 'desc': 'В статье представлена OVO-S-Bench — комплексный бенчмарк для оценки потоковых пространственных способностей мультимодальных языковых моделей через вопросы, аннотированные людьми на разных уровнях абстракции. Бенчмарк содержит 1680 вопросов к 348 видео с эгоцентрической точки зрения, с множественными раундами проверки качества через 804 часов работы аннотаторов. Вопросы охватывают четыре уровня сложности: мгновенное восприятие, пространственно-временное отслеживание контекста, пространственное моделирование и аллоцентрическое картирование. Исследование показало, что лучшие современные MLLM отстают от человеческих экспертов на 27 пунктов, причем аллоцентрическое картирование является основным узким местом в их производительности.'}, 'en': {'title': 'Pushing the Boundaries of Spatial Intelligence in Multimodal Models', 'desc': 'OVO-S-Bench is a new benchmark designed to assess how well multimodal language models (MLMs) can understand and reason about spatial information in real-time scenarios. It includes 1,680 human-annotated questions that test various levels of spatial intelligence, from immediate perception to complex mapping. The benchmark highlights the challenges faced by current models, particularly in allocentric mapping, where they significantly lag behind human performance. By revealing these weaknesses, OVO-S-Bench aims to guide the development of more advanced streaming spatial intelligence in MLMs.'}, 'zh': {'title': '流媒体空间智能的全新基准测试', 'desc': 'OVO-S-Bench是一个全面的基准，用于评估多模态语言模型在流媒体空间智能方面的表现。该基准通过人类标注的问题，涵盖了多个抽象层次，共包含1680个问题和348个源视频。研究发现，现有的多模态语言模型在空间映射方面存在显著不足，尤其是在流媒体和空间精细调整的情况下。通过揭示这些局限性，OVO-S-Bench为下一代流媒体空间多模态语言模型提供了一个严格的测试平台。'}}}, {'id': 'https://huggingface.co/papers/2606.05008', 'title': 'M^3Eval: Multi-Modal Memory Evaluation through Cognitively-Grounded Video Tasks', 'url': 'https://huggingface.co/papers/2606.05008', 'abstract': 'Abstract Multi-modal models exhibit significant limitations in memory capabilities, particularly in maintaining disentangled representations and demonstrating human-like interference patterns, highlighting the need for improved memory mechanisms in video understanding systems.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As multi-modal models advance towards long-form video understanding, memory emerges as a critical capability. Despite substantial efforts in developing video datasets and benchmarks, existing works primarily focus on perception and reasoning, without systematically evaluating memory: what models retain, how faithfully information is preserved, and how robust memory remains under interference. To address this gap, we introduce M^3Eval, the first comprehensive evaluation framework and benchmark for probing different memory dimensions in multi-modal models. Grounded in cognitive psychology, our design features carefully constructed tasks that isolate key aspects of memory. Leveraging M^3Eval, we conduct extensive experiments across representative multi-modal models, revealing consistent weaknesses and distinctive behaviors. We find that models struggle to maintain disentangled representations when processing parallel video streams, exhibit interference patterns differing substantially from those observed in human memory, ground memory sources more reliably in the spatial domain than the temporal domain, and demonstrate limited symbolic memory. Collectively, our benchmark provides a valuable resource for future research, while our findings highlight memory as a fundamental yet underexplored capability and offer insights for designing more effective memory mechanisms in multi-modal models. Our code and dataset are available at https://pku-value-lab.github.io/m3eval-homepage.', 'score': 16, 'issue_id': 2371, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '5153339f019cbc3c', 'authors': ['Jie Huang', 'Ruixun Liu', 'Sirui Sun', 'Xinyi Yang', 'Yin Li', 'Yixin Zhu', 'Yiwu Zhong'], 'affiliations': ['Institute for Artificial Intelligence, Peking University', 'School of Intelligence Science and Technology, Peking University', 'School of Psychological and Cognitive Sciences, Peking University', 'State Key Laboratory of General Artificial Intelligence, Peking University', 'University of Wisconsin-Madison', 'Yuanpei College, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05008.jpg', 'data': {'categories': ['#dataset', '#video', '#multimodal', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Память как фундаментальный компонент мультимодальных моделей видеопонимания', 'desc': 'Статья представляет M³Eval — первый комплексный фреймворк для оценки памяти в мультимодальных моделях, разработанный на основе принципов когнитивной психологии. Исследование выявило, что современные модели плохо справляются с сохранением неперепутанных представлений при обработке параллельных видеопотоков и демонстрируют паттерны интерференции, существенно отличающиеся от человеческой памяти. Авторы обнаружили, что модели лучше локализуют информацию в пространственной области, чем в временной, и показывают ограниченные возможности в символической памяти. Эта работа предоставляет важный инструмент для развития более эффективных механизмов памяти в мультимодальных системах для понимания видео.'}, 'en': {'title': 'Enhancing Memory in Multi-Modal Video Understanding', 'desc': 'This paper discusses the limitations of multi-modal models in memory capabilities, particularly in video understanding. It highlights the need for better memory mechanisms to maintain clear and accurate representations while processing information. The authors introduce M^3Eval, a new evaluation framework designed to assess various memory aspects in these models, inspired by cognitive psychology. Through experiments, they reveal that current models struggle with memory retention and interference, suggesting that memory is a crucial area for future research and improvement.'}, 'zh': {'title': '提升多模态模型的记忆能力', 'desc': '多模态模型在记忆能力方面存在显著局限，尤其是在保持解耦表示和展示类人干扰模式方面。这表明在视频理解系统中需要改进记忆机制。我们提出了M^3Eval，这是第一个全面的评估框架和基准，用于探测多模态模型中的不同记忆维度。我们的研究发现，模型在处理并行视频流时难以保持解耦表示，并且其干扰模式与人类记忆有显著差异。'}}}, {'id': 'https://huggingface.co/papers/2606.03577', 'title': 'Eliciting Complex Spatial Reasoning in MLLMs through Wide-Baseline Matching', 'url': 'https://huggingface.co/papers/2606.03577', 'abstract': 'Abstract Wide-baseline matching presents a challenging spatial reasoning testbed for multimodal large language models, requiring systematic evaluation and training frameworks that current models lack, prompting the introduction of ReasonMatch-Bench and Dynamic Correspondence Reinforcement Learning to improve performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Wide-baseline matching (WBM) requires integrating geometric understanding, viewpoint changes, fine-grained perception, and occlusion reasoning, making it a challenging testbed for spatial reasoning in multimodal large language models (MLLMs) deployed in physical environments. However, current MLLMs lack systematic evaluation and training frameworks for these capabilities. We introduce ReasonMatch-Bench, a benchmark stratified by viewpoint displacement and matching granularity across indoor, outdoor, and object-centric scenarios, and show that current MLLMs still struggle with fine-grained wide-baseline correspondence: on a difficult 90-sample subset, human annotators achieve 84.0 F1, while the best existing baseline reaches 37.2. To bridge this gap, we build a scalable data-generation pipeline that automatically extracts wide-baseline view pairs from large-scale video-3D corpora, including RGB-D videos and SfM reconstructions, yielding diverse and verifiable supervision. We further propose Dynamic Correspondence Reinforcement Learning (DCRL), which combines Image-Level Viewpoint Progression and Point-Level Correspondence Curriculum to improve WBM training through verifiable rewards without explicit CoT supervision. Extensive experiments show that DCRL substantially improves ReasonMatch-Bench and transfers to related spatial benchmarks, while maintaining general visual understanding performance with modest gains on several benchmarks.', 'score': 11, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'a84aa69db0d6abf6', 'authors': ['Hao Zhong', 'Muzhi Zhu', 'Shenyan Zeng', 'Anzhou Li', 'Cong Chen', 'Hua Geng', 'Duochao Shi', 'Wentao Ye', 'Tao Lin', 'Hao Chen', 'Chunhua Shen'], 'affiliations': ['Ant Group', 'State Key Laboratory of CAD & CG, Zhejiang University', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03577.jpg', 'data': {'categories': ['#3d', '#synthetic', '#dataset', '#benchmark', '#rl', '#video', '#reasoning', '#cv', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Пространственное рассуждение в мультимодальных моделях через обучение с подкреплением', 'desc': 'В работе представлена новая задача сопоставления изображений с большим базовым расстоянием (wide-baseline matching) для оценки пространственного рассуждения в мультимодальных больших языковых моделях. Авторы вводят бенчмарк ReasonMatch-Bench, стратифицированный по углам обзора и гранулярности сопоставления, и показывают, что современные модели значительно отстают от человеческого уровня производительности. Для улучшения предлагается метод Dynamic Correspondence Reinforcement Learning (DCRL), который использует автоматически сгенерированные данные из видео и 3D реконструкций с применением curriculum learning. Экспериментальные результаты демонстрируют, что DCRL существенно улучшает качество сопоставления и обобщается на смежные пространственные задачи.'}, 'en': {'title': 'Enhancing Spatial Reasoning in MLLMs with ReasonMatch-Bench and DCRL', 'desc': "This paper addresses the challenges of wide-baseline matching (WBM) in multimodal large language models (MLLMs), which require advanced spatial reasoning skills. The authors introduce ReasonMatch-Bench, a new benchmark designed to evaluate MLLMs on their ability to handle varying viewpoint displacements and matching complexities in different environments. They also propose Dynamic Correspondence Reinforcement Learning (DCRL) to enhance training by providing verifiable rewards, thus improving the models' performance in WBM tasks. Experimental results demonstrate that DCRL significantly boosts the performance of MLLMs on ReasonMatch-Bench and related spatial benchmarks, while still achieving good general visual understanding."}, 'zh': {'title': '提升多模态模型的空间推理能力', 'desc': '宽基线匹配（WBM）是一个对多模态大型语言模型（MLLMs）进行空间推理的挑战性测试平台，涉及几何理解、视角变化、细粒度感知和遮挡推理等复杂任务。现有的MLLMs缺乏系统的评估和训练框架，因此我们引入了ReasonMatch-Bench，这是一个根据视角位移和匹配粒度分层的基准测试。为了缩小人类标注者与模型之间的性能差距，我们构建了一个可扩展的数据生成管道，并提出了动态对应强化学习（DCRL），以改进WBM的训练。实验结果表明，DCRL显著提升了ReasonMatch-Bench的表现，并在相关空间基准上也取得了良好的迁移效果。'}}}, {'id': 'https://huggingface.co/papers/2606.01993', 'title': 'MMG2Skill: Can Agents Distill In-the-Wild Guides into Self-Evolving Skills?', 'url': 'https://huggingface.co/papers/2606.01993', 'abstract': 'Abstract MMG2Skill framework converts web-based procedural guides into executable skills through closed-loop learning, improving agent performance across GUI control, gameplay, and card play tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Abundant procedural knowledge on the Web holds great potential for helping agents solve long-horizon tasks. However, such knowledge is often multimodal, heterogeneous, noisy, and implicitly assumes human executors, making it difficult to use directly as the skills required by agents. To bridge the gap between human-oriented guides and agent-executable skills, we formalize this problem as guide-to-skill learning: converting in-the-wild guides into executable skills and continuously improving them from trajectories observable to the agent. To evaluate the capability of existing agents on this task, we introduce MMG2Skill-Bench, the first benchmark designed for this problem. We further propose MMG2Skill, a closed-loop framework that compiles guides into editable skills, conditions a fixed vision-language model (VLM) agent on these skills during execution, and revises the skills from trajectory-level root-cause feedback without using benchmark scores. Across GUI control, open-ended gameplay, and strategic card play with six VLM backbones, MMG2Skill consistently outperforms vanilla baseline agents in every model-domain setting, achieving macro-average gains of +12.8 to +25.3 percentage points across backbones. Ablation studies show that directly prompting agents with raw guides can degrade performance, while both structured skill construction and trajectory-driven revision are necessary for the observed improvements. On success-inferable tasks, analyzer-based early stopping further prevents late-stage performance regressions and saves 25%-53% of attempts when the success signal is properly calibrated.', 'score': 11, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'f436177d44768f23', 'authors': ['Xinyu Che', 'Junqi Xiong', 'Yunfei Ge', 'Xinping Lei', 'Shihao Li', 'Hang Yan', 'Han Li', 'Yuanxing Zhang', 'Zhiqi Bai', 'Jinhua Hao', 'Ming Sun', 'Han Li', 'Jiaheng Liu'], 'affiliations': ['Kuaishou Technology', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01993.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#agents'], 'emoji': '🧩', 'ru': {'title': 'Из веб-гайдов в навыки агентов: замкнутое обучение через обратную связь', 'desc': 'Статья представляет MMG2Skill — фреймворк, который преобразует процедурные руководства из веб-источников в выполняемые навыки для AI-агентов через замкнутый цикл обучения. Авторы формализуют задачу как обучение преобразованию гайдов: компилирование неструктурированных инструкций в редактируемые навыки и их последовательное улучшение на основе траекторий действий агента. Для оценки способностей агентов введён первый бенчмарк MMG2Skill-Bench, охватывающий управление интерфейсом, игровые задачи и карточные игры. Экспериментальные результаты показывают значительные улучшения (+12.8-25.3%) по сравнению с базовыми моделями, при этом структурированное построение навыков и ревизия на основе обратной связи критичны для успеха.'}, 'en': {'title': 'Transforming Guides into Agent Skills with MMG2Skill', 'desc': 'The MMG2Skill framework transforms web-based procedural guides into executable skills for agents using a closed-loop learning approach. This method addresses the challenges posed by multimodal and noisy guides that are not directly usable by agents. By formalizing the process as guide-to-skill learning, the framework continuously improves agent performance through feedback from observable trajectories. The introduction of the MMG2Skill-Bench benchmark allows for the evaluation of agent capabilities in this context, demonstrating significant performance gains across various tasks.'}, 'zh': {'title': '将网络指南转化为智能技能的闭环学习', 'desc': 'MMG2Skill框架通过闭环学习将基于网络的程序指南转换为可执行的技能，从而提高代理在图形用户界面控制、游戏玩法和卡牌游戏任务中的表现。该框架解决了人类导向指南与代理可执行技能之间的差距，采用了指南到技能学习的方法。我们引入了MMG2Skill-Bench，这是第一个针对这一问题的基准测试。研究表明，结构化的技能构建和基于轨迹的修订对于性能提升是必不可少的。'}}}, {'id': 'https://huggingface.co/papers/2605.27492', 'title': 'Benchmarks are Not Enough: RAMP for Runtime Assessing of Agentic Models in Production Systems', 'url': 'https://huggingface.co/papers/2605.27492', 'abstract': 'Abstract Production-grounded evaluation framework RAMP assesses long-horizon software engineering agents through realistic compiler construction workloads and runtime analysis.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents are rapidly evolving from coding assistants into autonomous software engineering systems. However, existing evaluation methodologies remain largely centered on static, isolated, and short-horizon benchmarks that fail to capture the dynamic complexity of real-world production workflows. As a result, benchmark performance may poorly reflect practical capability under realistic runtime environments involving long execution chains, tool interactions, dependency management, and iterative feedback loops. We thus present RAMP, a production-grounded infrastructure for assessing long-horizon software engineering agents. Built upon the YatCC integrated platform, RAMP provides a unified runtime assessment architecture through standardized orchestration and execution interfaces. RAMP introduces realistic compiler-construction workloads with serial dependencies and complex toolchain interactions, together with a staged recovery mechanism for analyzing execution behavior under partial workflow failure. The framework further incorporates utility-oriented multi-dimensional metrics that jointly evaluate outcome quality and process efficiency. We conduct runtime assessments across 15 mainstream models and observe substantial capability degradation that remains largely invisible to conventional isolated benchmarks. Task completion rates progressively collapse across serial workflows, dropping from 100% in the initial stage to only 20% in the final stage, while none of the evaluated models successfully completes the entire pipeline. Runtime analysis reveals systematic failure propagation and significant resource inefficiencies, with computational costs differing by up to three orders of magnitude among comparable models. These findings suggest RAMP advances agentic model evaluation toward continuous, runtime-observable, and production-grounded assessment.', 'score': 10, 'issue_id': 2371, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'dded2dbe03572710', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#agents', '#plp', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'От статических бенчмарков к реальной оценке агентов в инженерии ПО', 'desc': 'В статье представлена система оценки RAMP для долгосрочных агентов в области инженерии программного обеспечения, которая использует реалистичные задачи конструирования компиляторов и анализ во время выполнения. Авторы показывают, что существующие бенчмарки недостаточно отражают сложность реальных производственных рабочих процессов с длинными цепочками выполнения, взаимодействием инструментов и итеративными петлями обратной связи. Экспериментальная оценка 15 основных моделей LLM выявила значительную деградацию способностей: коэффициент завершения задач падает со 100% на начальном этапе до 20% на финальном, при этом ни одна модель не смогла полностью завершить весь конвейер. Исследование продемонстрировало систематическое распространение ошибок и существенную неэффективность использования ресурсов, с разницей в вычислительных затратах до трех порядков величины между сравнимыми моделями.'}, 'en': {'title': 'RAMP: Revolutionizing Evaluation for Software Engineering Agents', 'desc': 'The paper introduces RAMP, a new evaluation framework designed to assess long-horizon software engineering agents in realistic production environments. Unlike traditional benchmarks that focus on short and isolated tasks, RAMP evaluates agents through complex compiler construction workloads that mimic real-world scenarios. It highlights the limitations of existing methodologies, showing that many models perform poorly in dynamic settings, with significant drops in task completion rates. By providing a comprehensive analysis of execution behavior and resource efficiency, RAMP aims to improve the evaluation of autonomous software engineering systems.'}, 'zh': {'title': 'RAMP：真实生产环境下的软件工程智能体评估新框架', 'desc': '本文提出了一种名为RAMP的评估框架，用于评估长时间跨度的软件工程智能体。RAMP通过现实的编译器构建工作负载和运行时分析，解决了现有评估方法无法反映真实生产工作流复杂性的不足。该框架提供了统一的运行时评估架构，并引入了多维度的效用导向指标，以综合评估结果质量和过程效率。研究表明，传统的孤立基准测试无法揭示智能体在实际运行环境中的能力退化，RAMP为智能体模型评估提供了更为动态和真实的基础。'}}}, {'id': 'https://huggingface.co/papers/2606.05158', 'title': 'Streaming Communication in Multi-Agent Reasoning', 'url': 'https://huggingface.co/papers/2606.05158', 'abstract': 'Abstract StreamMA enables efficient multi-agent reasoning by streaming intermediate results and leveraging reliable early steps to improve both latency and effectiveness across various reasoning tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-agent reasoning systems adopt a "generate-then-transfer" paradigm that forces end-to-end latency to scale linearly with pipeline depth. We introduce StreamMA, a multi-agent reasoning system that streams each reasoning step to downstream agents as soon as it is generated, pipelining adjacent agents and thus reducing latency. Surprisingly, this pipelining also improves effectiveness: because multi-step reasoning quality is non-uniform and early steps are more reliable than later ones, working with these reliable early steps instead of the full chain prevents error-prone late steps from misleading downstream agents. We formalize both advantages with the first closed-form joint analysis of stream, serial, and single protocols, deriving the effectiveness ordering, speedup upper bound, and cost ratio. Across eight reasoning benchmarks spanning mathematics, science, and code, two frontier LLMs (Claude Opus 4.6 and GPT-5.4), and three topologies (Chain, Tree, Graph), StreamMA outperforms both baselines (avg. +7.3 pp, max +22.4 pp on HMMT 2026; Claude Opus 4.6-high). Beyond these contributions, we discover a "step-level scaling law": increasing per-agent steps consistently improves both effectiveness and efficiency, a new scaling dimension orthogonal to and composable with agent-count scaling.', 'score': 9, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '06f6c0f38bb59d3d', 'authors': ['Zhen Yang', 'Xiaogang Xu', 'Wen Wang', 'Cong Chen', 'Xander Xu', 'Ying-Cong Chen'], 'affiliations': ['Alibaba Group', 'HKUST', 'HKUST(GZ)', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.05158.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#reasoning'], 'emoji': '⚡', 'ru': {'title': 'Потоковые многоагентные системы рассуждения с ранней фильтрацией ошибок', 'desc': 'StreamMA — это система многоагентного рассуждения, которая передаёт промежуточные результаты между агентами по мере их генерации вместо ожидания полного завершения цепочки. Такой потоковый подход снижает латентность благодаря конвейеризации соседних агентов и одновременно улучшает качество рассуждений, так как ранние шаги более надёжны, чем поздние. Авторы провели формальный анализ потокового, последовательного и монолитного протоколов, вывели верхнюю границу ускорения и доказали превосходство своего метода на восьми бенчмарках математики, науки и кода. Дополнительно открыто свойство масштабирования на уровне шагов: увеличение количества промежуточных шагов на агента одновременно повышает эффективность и производительность системы.'}, 'en': {'title': 'StreamMA: Pipelining for Faster and Smarter Multi-Agent Reasoning', 'desc': "StreamMA is a multi-agent reasoning system that enhances efficiency by streaming intermediate results to downstream agents, allowing for quicker responses in reasoning tasks. It adopts a 'generate-then-transfer' approach, which traditionally increases latency, but StreamMA mitigates this by pipelining adjacent agents. This method not only reduces latency but also improves the quality of reasoning, as it utilizes reliable early steps instead of relying on potentially misleading later steps. The paper presents a comprehensive analysis of the advantages of this streaming approach, demonstrating significant performance improvements across various reasoning benchmarks."}, 'zh': {'title': 'StreamMA：提升多智能体推理的效率与有效性', 'desc': 'StreamMA是一种高效的多智能体推理系统，通过流式传输中间结果来提高推理任务的延迟和有效性。该系统采用“生成-再传输”的范式，能够在生成每个推理步骤后立即将其传递给下游智能体，从而减少整体延迟。研究表明，早期步骤的可靠性高于后期步骤，因此使用这些可靠的早期结果可以避免后期错误对下游智能体的误导。通过对流式、串行和单一协议的联合分析，StreamMA在多个推理基准测试中表现优于传统方法，展示了其在数学、科学和代码推理中的优势。'}}}, {'id': 'https://huggingface.co/papers/2606.03972', 'title': 'AAD-1: Asymmetric Adversarial Distillation for One-Step Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2606.03972', 'abstract': 'Abstract AAD-1 framework improves one-step autoregressive image-to-video generation by breaking generator-discriminator symmetry and using phased training to prevent motion collapse and training instability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present AAD-1, an Asymmetric Adversarial Distillation framework for One-step autoregressive image-to-video generation. State-of-the-art methods adopt adversarial distillation but suffer from motion collapse and training instability, resulting in static videos. AAD-1 addresses these challenges through two key designs in architecture and training strategy. Our key architectural insight is to break the symmetry between generator and discriminator. While the generator remains causal to preserve autoregressive sampling capability, the discriminator attends bidirectionally over the full spatiotemporal context and produces a single holistic realism score for the entire video sequence. This asymmetric design enables the discriminator to effectively detect global temporal failures and long-range drift that cause motion collapse in autoregressive generation. To stabilize training, we introduce a phased strategy that first uses distribution matching to bootstrap a stable one-step generator, providing a warm-up phase that brings the student distribution closer to the teacher before adversarial distillation begins. Extensive experiments on VBench demonstrate that AAD-1 achieves state-of-the-art performance in one-step autoregressive video generation.', 'score': 8, 'issue_id': 2371, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '39ef8ac4c610dd1b', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Асимметричная дистилляция для стабильной генерации видео', 'desc': 'Представлена AAD-1 — фреймворк асимметричной состязательной дистилляции для генерации видео из одного изображения в режиме авторегрессии. Основная проблема существующих методов заключается в коллапсе движения и нестабильности обучения, что приводит к статичным видео. Ключевое решение — нарушение симметрии между генератором и дискриминатором: генератор остаётся причинным для сохранения способности к авторегрессивной выборке, а дискриминатор использует двунаправленное внимание для анализа полного пространственно-временного контекста. Дополнительно введена многофазная стратегия обучения, которая сначала использует matching распределений для стабилизации, а затем применяет состязательную дистилляцию.'}, 'en': {'title': 'Revolutionizing Video Generation with Asymmetric Adversarial Distillation', 'desc': 'The AAD-1 framework enhances one-step autoregressive image-to-video generation by introducing an asymmetric design between the generator and discriminator. This approach allows the generator to maintain its autoregressive capabilities while the discriminator evaluates the entire video context, improving the detection of motion issues. Additionally, a phased training strategy is implemented to stabilize the learning process, ensuring that the generator is effectively trained before adversarial distillation begins. As a result, AAD-1 significantly reduces motion collapse and training instability, achieving state-of-the-art performance in video generation tasks.'}, 'zh': {'title': '打破对称，稳定生成：AAD-1框架', 'desc': 'AAD-1框架通过打破生成器和判别器的对称性，改进了一步自回归图像到视频的生成。该方法采用了分阶段训练策略，以防止运动崩溃和训练不稳定的问题。生成器保持因果性以保留自回归采样能力，而判别器则在全时空上下文中双向关注，生成整个视频序列的整体真实感评分。通过这些设计，AAD-1在一步自回归视频生成中实现了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.02684', 'title': 'Filter, Then Reweight: Rethinking Optimization Granularity in On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.02684', 'abstract': 'Abstract FiRe-OPD improves on-policy distillation in large language models by filtering low-quality trajectories and applying soft reweighting to enhance informative token selection and optimization stability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-Policy distillation (OPD) in large language models is shifting from full-trace KL supervision toward more selective training paradigms. Recent OPD methods increasingly focus on selecting which trajectories to learn from, which tokens are most informative, and which supervision signals are most reliable. Motivated by this trend, we rethink optimization granularity of OPD and propose \\fireicon\\ FiRe-OPD (Filter, then Reweight), which jointly adjusts supervision signals at both trajectory and token levels. In details, FiRe-OPD first filters trajectories to remove low-quality rollout samples, and then applies soft reweighting within the retained trajectories to emphasize informative tokens. Compared with hard token selection, FiRe-OPD leverages a soft-weighting mechanism to effectively mitigate information loss and enhance optimization stability, thereby achieving finer-grained OPD optimization. We validate the effectiveness of FiRe-OPD across strong-to-weak, single-teacher, and multi-teacher settings, and demonstrate its superiority over recent token-level OPD methods ( (e.g., +6.25 on AIME 2024 in strong-to-weak, +18.81 on Miner in multi-teacher). Our code is available at https://github.com/YuYingLi0/FiRe-OPD.', 'score': 8, 'issue_id': 2371, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'cb2f1abfdd66ff0a', 'authors': ['Yuying Li', 'Leqi Zheng', 'Yongzi Yu', 'Wenrui Zhou', 'Xuchang Zhong', 'Xing Hu', 'Jing Jin', 'Huangjie Yuan', 'Tao Feng'], 'affiliations': ['BIT', 'HKUST', 'Meituan', 'THU', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.02684.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#training', '#optimization'], 'emoji': '🔥', 'ru': {'title': 'Умная фильтрация и мягкая переобозначение для точной дистилляции языковых моделей', 'desc': 'FiRe-OPD улучшает дистилляцию больших языковых моделей за счёт фильтрации низкокачественных траекторий и применения мягкой переобозначения весов для выбора информативных токенов. Метод работает на двух уровнях: сначала отфильтровывает неудачные образцы генерации, а затем переоценивает важность отдельных токенов в оставшихся данных. Использование мягкой переобозначения вместо жёсткого отбора токенов позволяет избежать потери информации и повысить стабильность оптимизации. Метод демонстрирует значительные улучшения на различных бенчмарках в сценариях дистилляции от сильной к слабой модели и многоучительного обучения.'}, 'en': {'title': 'Enhancing On-Policy Distillation with FiRe-OPD', 'desc': 'FiRe-OPD is a method that improves on-policy distillation (OPD) in large language models by focusing on the quality of training data. It filters out low-quality trajectories and uses a soft reweighting technique to prioritize informative tokens, which helps in stabilizing the optimization process. This approach allows for a more selective training paradigm, moving away from traditional full-trace KL supervision. The results show that FiRe-OPD outperforms existing token-level OPD methods, demonstrating its effectiveness in various training scenarios.'}, 'zh': {'title': '提升语言模型的在线策略蒸馏效果', 'desc': 'FiRe-OPD是一种改进的在线策略蒸馏方法，旨在提高大型语言模型的训练效果。它通过过滤低质量的轨迹，并对保留的轨迹进行软重加权，以增强信息性标记的选择和优化的稳定性。与传统的硬标记选择方法相比，FiRe-OPD采用软加权机制，有效减少信息损失，提升优化的精细度。实验结果表明，FiRe-OPD在多种设置下均优于现有的标记级在线策略蒸馏方法。'}}}, {'id': 'https://huggingface.co/papers/2606.04513', 'title': 'MapAgent: An Industrial-Grade Agentic Framework for City-scale Lane-level Map Generation', 'url': 'https://huggingface.co/papers/2606.04513', 'abstract': "Abstract MapAgent is an industrial-grade agentic architecture that combines vision-language processing with constraint-aware reasoning to produce specification-compliant lane maps, achieving high automation rates in large-scale urban mapping.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Lane-level maps are critical infrastructure for autonomous driving and lane-level navigation, yet constructing and maintaining standardized lane networks for hundreds of cities remains highly labor-intensive. Recent end-to-end vectorized mapping methods can predict lane geometry and topology directly from sensor data, but they typically treat mapping specifications and traffic regulations as implicit, dataset-dependent supervision. Moreover, in complex scenes (e.g., worn or missing markings and occlusions), correct lane configurations are often under-determined by visual evidence alone, making specification violations a major source of human post-editing. We propose MapAgent, an industrial-grade agentic architecture that augments a vectorization backbone for specification-compliant lane-map production. Rather than merely adding an agent loop to map prediction, MapAgent couples backbone perception with explicit specification verification, constraint-aware reasoning, and deterministic map editing under a bounded, verification-driven Judge-Planner-Worker loop. A vision-language Judge diagnoses errors by jointly inspecting visual evidence and draft vectors, while a tool-calling Planner generates minimal corrective edits with post-edit re-validation. To remain scalable for city-scale production, MapAgent is selectively triggered only on tiles with low backbone confidence, adding modest overhead while preserving throughput. Experiments on real-world datasets show consistent gains over strong production baselines, especially in complex and long-tail scenarios. Additionally, MapAgent has been integrated into Baidu Maps, supporting lane-level map generation for over 360 cities nationwide and elevating the overall production automation to over 95%, demonstrating MapAgent's practicality and effectiveness for large-scale lane-level map generation.", 'score': 7, 'issue_id': 2371, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '155e18bdb697e10d', 'authors': ['Deguo Xia', 'Zihan Li', 'Haochen Zhao', 'Dong Xie', 'Yuyao Kong', 'Xiyan Liu', 'Jizhou Huang', 'Mengmeng Yang', 'Diange Yang'], 'affiliations': ['Baidu', 'Institute of Information Engineering, Chinese Academy of Sciences', 'Tsinghua University', 'University of Macau'], 'pdf_title_img': 'assets/pdf/title_img/2606.04513.jpg', 'data': {'categories': ['#cv', '#reasoning', '#robotics', '#open_source', '#agents', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'Интеллектуальный агент для автоматического создания карт полос движения со спецификацией-проверкой', 'desc': 'MapAgent — это промышленная архитектура на основе агентов, которая объединяет обработку видения и языка с рассуждениями, учитывающими ограничения, для создания карт полос движения, соответствующих спецификациям. Система использует цикл Judge-Planner-Worker, где видео-языковая модель диагностирует ошибки, планировщик генерирует минимальные исправления, а рабочий применяет правки с повторной валидацией. Архитектура селективно активируется только для сложных участков с низкой уверенностью базовой модели, сохраняя масштабируемость для обработки масштабов целого города. Система достигла более 95% автоматизации при генерации карт полос для более 360 городов в Китае, значительно сокращая ручное редактирование.'}, 'en': {'title': 'MapAgent: Revolutionizing Lane Map Generation with Intelligent Reasoning', 'desc': 'MapAgent is a sophisticated architecture designed for creating lane maps that comply with specific regulations, which is essential for autonomous driving. It enhances traditional mapping methods by integrating vision-language processing with reasoning that considers constraints, ensuring that the generated maps meet required standards. The system uses a Judge-Planner-Worker loop to diagnose errors and make necessary corrections based on visual data and mapping specifications. By focusing on areas where confidence is low, MapAgent efficiently improves the accuracy of lane maps while maintaining high production rates, achieving over 95% automation in generating maps for numerous cities.'}, 'zh': {'title': 'MapAgent：高效的车道级地图生成解决方案', 'desc': 'MapAgent是一种工业级的智能架构，结合了视觉-语言处理和约束感知推理，能够生成符合规范的车道地图，从而在大规模城市制图中实现高自动化率。传统的车道网络构建和维护工作繁重，而MapAgent通过增强向量化基础架构，确保生成的地图符合交通规范。该系统通过视觉证据和草图向量的联合检查，诊断错误并生成最小的修正编辑，确保地图的准确性。实验结果表明，MapAgent在复杂场景中表现优异，已在百度地图中应用，支持全国360多个城市的车道级地图生成。'}}}, {'id': 'https://huggingface.co/papers/2606.03220', 'title': 'WebRISE: Requirement-Induced State Evaluation for MLLM-Generated Web Artifacts', 'url': 'https://huggingface.co/papers/2606.03220', 'abstract': 'Abstract WebRISE evaluates MLLM-generated web artifacts by analyzing interaction contracts that capture user intent transitions and requirement checks across multiple input modalities, revealing significant gaps in model performance and demonstrating superior error detection compared to traditional methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing benchmarks for MLLM-generated web artifacts assess interaction through local evidence and miss the requirement-induced states and transitions that determine whether a page works. We introduce WebRISE, which compiles task requirements into Interaction Contract Graphs (ICGs) of observable states, user-intent transitions, and DOM/visual assertions for implementation-agnostic browser execution. WebRISE spans 442 tasks across five input modalities (Text, Markdown, Sketch, Image, Video), with 5,495 transitions and 5,271 requirement checks that separate user-stated functions from implicit product-level constraints. Across 14 MLLMs, even the strongest model reaches only 65.6% transition validity and 66.3% requirement coverage, and visual quality is no proxy for behavior (Qwen3.6-35B-A3B on Markdown: V=80.8 yet T=15.5). Video gives the strongest interaction signal (+10.6 pp implicit coverage over Text), while implicit constraints persist; defect injection shows ICG-based scoring detects state errors at 2-16x the rate of checkpoint-style evaluation.', 'score': 7, 'issue_id': 2371, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'ddabc7865ff532de', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#video', '#multimodal', '#benchmark'], 'emoji': '🕸️', 'ru': {'title': 'Контрактные графы взаимодействия для надёжной оценки сгенерированных веб-интерфейсов', 'desc': 'В статье представлен WebRISE — фреймворк для оценки качества веб-артефактов, сгенерированных мультимодальными большими моделями зрения и языка (MLLM). Авторы вводят граф контрактов взаимодействия (ICG), который описывает наблюдаемые состояния, переходы намерений пользователя и проверки требований, позволяя оценивать работу сгенерированных страниц независимо от реализации. Бенчмарк включает 442 задачи с пятью модальностями входных данных (текст, Markdown, наброски, изображения, видео), содержащие более 5 тысяч переходов и проверок требований. Исследование показывает значительный разрыв в производительности современных MLLM — даже лучшие модели достигают только 65.6% корректности переходов и 66.3% покрытия требований, при этом высокое визуальное качество не гарантирует корректное поведение.'}, 'en': {'title': 'Bridging Gaps in MLLM Performance with WebRISE', 'desc': 'WebRISE is a tool that evaluates web content generated by machine learning language models (MLLMs) by analyzing how well they meet user intentions and requirements. It uses Interaction Contract Graphs (ICGs) to represent user interactions and checks if the generated web pages function correctly across different input types like text and images. The study shows that existing benchmarks often overlook important aspects of user requirements, leading to significant performance gaps in MLLM outputs. WebRISE demonstrates that it can detect errors more effectively than traditional methods, highlighting the importance of understanding user intent in web artifact generation.'}, 'zh': {'title': 'WebRISE：提升 MLLM 生成网页的评估能力', 'desc': 'WebRISE 是一种评估 MLLM 生成的网页工件的方法，通过分析用户意图转变和需求检查的交互合同，揭示了模型性能的显著差距，并展示了比传统方法更优的错误检测能力。现有的基准测试主要通过局部证据评估交互，忽略了决定页面功能的需求引导状态和转变。WebRISE 将任务需求编译成可观察状态、用户意图转变和 DOM/视觉断言的交互合同图（ICGs），适用于不同的浏览器执行。研究表明，尽管有14个 MLLM模型，最强的模型在转变有效性和需求覆盖率上仅达到65.6%和66.3%。'}}}, {'id': 'https://huggingface.co/papers/2606.04036', 'title': 'Self-Distilled Policy Gradient', 'url': 'https://huggingface.co/papers/2606.04036', 'abstract': 'Abstract A self-distilled policy-gradient framework combines on-policy self-distillation with verifier advantages and KL regularization to improve reinforcement learning stability and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy self-distillation, where a language model conditions on privileged context to supervise its own generations, is a promising source of dense supervision for sparse-reward reinforcement learning. Actually, it can be instantiated as an auxiliary full-vocabulary student-to-teacher reverse Kullback-Leibler divergence loss. We therefore propose SDPG, a self-distilled policy-gradient framework that combines group-relative verifier advantages with normalized standard deviation, exact full-vocabulary on-policy self-distillation, as well as reference-policy KL regularization. Empirically, SDPG improves stability and performance over RLVR and self-distillation baselines. The code is available at https://github.com/lauyikfung/SDPG.', 'score': 7, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '5ec035cb5da791e2', 'authors': ['Yifeng Liu', 'Shiyuan Zhang', 'Yifan Zhang', 'Quanquan Gu'], 'affiliations': ['Department of Computer Science, University of California, Los Angeles, CA, USA', 'Princeton AI Laboratory, Princeton University, Princeton, NJ, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.04036.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Самодистилляция политики для стабильного обучения с подкреплением', 'desc': 'В статье предлагается фреймворк SDPG, объединяющий самодистилляцию политики с преимуществами верификатора и KL-регуляризацией для улучшения обучения с подкреплением. Основная идея заключается в том, что языковая модель использует привилегированный контекст для контроля собственных генераций, обеспечивая плотный сигнал обучения в условиях разреженных наград. Самодистилляция реализуется как вспомогательная функция потерь, основанная на обратной дивергенции Кульбака-Лейблера между студентом и учителем. Экспериментальные результаты демонстрируют улучшение стабильности и производительности по сравнению с базовыми методами RLVR и самодистилляции.'}, 'en': {'title': 'Enhancing Reinforcement Learning Stability with Self-Distillation', 'desc': 'This paper introduces a self-distilled policy-gradient framework called SDPG, which enhances reinforcement learning by integrating on-policy self-distillation with verifier advantages and KL regularization. The framework allows a model to learn from its own outputs by using privileged context, providing dense supervision in environments with sparse rewards. SDPG employs a unique loss function based on reverse Kullback-Leibler divergence to facilitate this self-supervision. Experimental results show that SDPG achieves better stability and performance compared to existing methods like RLVR and other self-distillation approaches.'}, 'zh': {'title': '自蒸馏策略梯度框架提升强化学习性能', 'desc': '本文提出了一种自蒸馏策略梯度框架SDPG，旨在提高强化学习的稳定性和性能。该框架结合了基于组的验证者优势、标准差归一化、全词汇的自蒸馏以及KL正则化。通过在稀疏奖励的强化学习中使用自蒸馏，模型能够更好地利用特权上下文进行自我监督。实验结果表明，SDPG在稳定性和性能上优于现有的RLVR和自蒸馏基线。'}}}, {'id': 'https://huggingface.co/papers/2606.03031', 'title': 'AUDITFLOW: Executable Symbolic Environments for Structured Financial Reporting Verification', 'url': 'https://huggingface.co/papers/2606.03031', 'abstract': 'Abstract  Structured financial audit verification is difficult for language-model agents because correctness depends on structured evidence rather than text alone. A model must link reported facts to taxonomy concepts, traverse calculation or dimensional relations, and recompute expected values before applying an audit rule. We propose AuditFlow, a graph-grounded multi-agent framework that separates adaptive search from deterministic verification. AuditFlow builds a symbolic environment from a static US-GAAP taxonomy graph and a dynamic XBRL filing graph, and exposes it through typed tools for fact retrieval, taxonomy traversal, numerical checking, and rule evaluation. Two junior auditors inspect each case from regulatory and evidentiary views, while a senior auditor resolves disagreements and can request further investigation. The final reports are fused through evidential aggregation to produce an audit verdict, expected value, evidence trail, and trustworthiness score. On a FinAuditing-derived FinMR sample, AuditFlow reaches 82.09% joint audit accuracy under GPT-5.5, outperforming the strongest baseline by 14.93 points. Removing deterministic checks drops accuracy to 17.91%, showing that the symbolic environment performs the verification step that the model cannot reliably replace.', 'score': 5, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'e307b79a0f28286a', 'authors': ['Yan Wang', 'Xuguang Ai', 'Jaisal Patel', 'Xueqing Peng', 'Fengran Mo', 'Yupeng Cao', 'Haohang Li', 'Mingyu Cao', 'Lingfei Qian', 'Víctor Gutiérrez-Basulto'], 'affiliations': ['Cardiff University, UK', 'Rensselaer Polytechnic Institute, USA', 'Stevens Institute of Technology, USA', 'The Fin AI, USA', 'University of Surrey, UK', 'Université de Montréal, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2606.03031.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Гибридный мультиагентный аудит: символическая верификация превосходит языковые модели', 'desc': 'В статье предложена система AuditFlow, которая использует многоагентный подход для проверки финансовой отчётности с помощью языковых моделей. Система строит символическое окружение на основе графа стандартов GAAP и графа финансовых данных XBRL, предоставляя инструменты для поиска фактов, проверки расчётов и оценки правил аудита. Несколько агентов анализируют отчётность с разных точек зрения, а затем их выводы объединяются через агрегацию свидетельств для получения итогового вердикта аудита с оценкой надёжности. Экспериментальные результаты показывают, что детерминированная логическая верификация критична для надёжности системы, так как её отключение снижает точность с 82% до 18%.'}, 'en': {'title': 'Enhancing Financial Audits with Structured Verification', 'desc': 'This paper introduces AuditFlow, a multi-agent framework designed to enhance the accuracy of financial audits by integrating structured evidence with language models. It utilizes a symbolic environment built from US-GAAP and XBRL graphs to facilitate fact retrieval and verification processes. The framework employs a collaborative approach where junior auditors assess cases from different perspectives, while a senior auditor resolves any discrepancies. The results demonstrate that AuditFlow significantly improves audit accuracy, highlighting the importance of structured verification in financial auditing.'}, 'zh': {'title': 'AuditFlow：提升财务审计的智能化框架', 'desc': '本文提出了一种名为AuditFlow的多代理框架，用于结构化财务审计验证。该框架通过构建一个静态的US-GAAP分类图和动态的XBRL文件图，提供了一个符号环境，以支持事实检索、分类遍历、数值检查和规则评估。两个初级审计员从监管和证据的角度检查每个案例，而高级审计员负责解决分歧并可以请求进一步调查。实验结果表明，AuditFlow在审计准确性上达到了82.09%，显著优于其他基线模型，证明了符号环境在验证步骤中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.03197', 'title': 'MemTrain: Self-Supervised Context Memory Training', 'url': 'https://huggingface.co/papers/2606.03197', 'abstract': "Abstract A self-supervised training framework called MemTrain enhances long-horizon language model agents' memory capabilities through proxy tasks optimized via GRPO, improving downstream reasoning performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory is an indispensable capability for long-horizon LLM agents, enabling them to preserve and utilize information accumulated across extended interactions. Existing memory-agent approaches are typically trained end-to-end with reinforcement learning on downstream tasks. However, collecting high-quality annotated problems for memory-intensive scenarios is costly, and the resulting training data often lack sufficient diversity to cover general memory behaviors. In this work, we propose MemTrain, a self-supervised training framework for generally enhancing the context-memory capability of LLM agents for more effective downstream post-training. MemTrain introduces two coupled proxy tasks over unlabeled Wikipedia corpora: (1) an end-to-end masked reconstruction objective, which requires the model to recover masked entities after multiple rounds of memory updates, thereby encouraging memory maintenance from the final outcome perspective; and (2) an intermediate memory recall objective, which requires the model to reconstruct masked historical information using intermediate memory states, encouraging faithful compression and memory completeness throughout the interaction process. The two objectives are jointly optimized using GRPO. Extensive experiments on long-text QA and search-based QA benchmarks demonstrate that MemTrain consistently improves downstream memory-intensive reasoning performance across different models, achieving gains of up to 17.67 points over direct task-specific post-training.", 'score': 5, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '4f6d58361961b7a3', 'authors': ['Ziheng Li', 'Xingrun Xing', 'Haoqing Wang', 'Zhi-Hong Deng', 'Yehui Tang'], 'affiliations': ['Samsung Research, Beijing, China', 'State Key Laboratory of General Artificial Intelligence, School of Intelligence Science and Technology, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03197.jpg', 'data': {'categories': ['#synthetic', '#reasoning', '#rl', '#long_context', '#optimization', '#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самоконтролируемое обучение памяти для долгосрочных агентов на базе LLM', 'desc': 'В работе представлена MemTrain — самоконтролируемая система обучения для улучшения способности языковых моделей к сохранению и использованию информации в длительных взаимодействиях. Авторы предлагают два связанных прокси-задачи на немеченых данных: восстановление замаскированных сущностей после обновлений памяти и реконструкцию исторической информации из промежуточных состояний памяти. Обе задачи оптимизируются совместно с помощью алгоритма GRPO без необходимости дорогостоящей разметки специализированных данных. Экспериментальные результаты показывают, что MemTrain улучшает производительность на задачах с глубоким рассуждением на 17,67 пункта по сравнению с обучением, специфичным для конкретной задачи.'}, 'en': {'title': 'Enhancing Memory in Language Models with MemTrain', 'desc': 'MemTrain is a self-supervised training framework designed to improve the memory capabilities of long-horizon language model (LLM) agents. It uses two proxy tasks that leverage unlabeled data from Wikipedia to enhance memory maintenance and recall. The first task focuses on reconstructing masked entities after multiple memory updates, while the second task emphasizes recalling historical information from intermediate memory states. By optimizing these tasks with GRPO, MemTrain significantly boosts the reasoning performance of LLMs in memory-intensive applications, achieving notable improvements in various benchmarks.'}, 'zh': {'title': 'MemTrain：提升长时记忆的自监督训练框架', 'desc': 'MemTrain是一种自监督训练框架，旨在增强长时记忆语言模型（LL
