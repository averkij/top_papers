    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.20025', 'title': 'AutoResearchClaw: Self-Reinforcing Autonomous Research with Human-AI Collaboration', 'url': 'https://huggingface.co/papers/2605.20025', 'abstract': 'Abstract AutoResearchClaw is a multi-agent autonomous research system that improves scientific discovery through structured debate, self-healing execution, verifiable reporting, human collaboration, and evolutionary learning, outperforming previous systems on a benchmark while maintaining human oversight.  AI-generated summary Automating scientific discovery requires more than generating papers from ideas. Real research is iterative: hypotheses are challenged from multiple perspectives, experiments fail and inform the next attempt, and lessons accumulate across cycles. Existing autonomous research systems often model this process as a linear pipeline: they rely on single-agent reasoning, stop when execution fails, and do not carry experience across runs. We present AutoResearchClaw, a multi-agent autonomous research pipeline built on five mechanisms: structured multi-agent debate for hypothesis generation and result analysis, a self-healing executor with a Pivot/Refine decision loop that transforms failures into information, verifiable result reporting that prevents fabricated numbers and hallucinated citations, human-in-the-loop collaboration with seven intervention modes spanning full autonomy to step-by-step oversight, and cross-run evolution that converts past mistakes into future safeguards. On ARC-Bench, a 25-topic experiment-stage benchmark, AutoResearchClaw outperforms AI Scientist v2 by 54.7%. A human-in-the-loop ablation across seven intervention modes reveals that precise, targeted collaboration at high-leverage decision points consistently outperforms both full autonomy and exhaustive step-by-step oversight. We position AutoResearchClaw as a research amplifier that augments rather than replaces human scientific judgment. Code is available at https://github.com/aiming-lab/AutoResearchClaw.', 'score': 33, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '0ae2841ab47a50d7', 'authors': ['Jiaqi Liu', 'Shi Qiu', 'Mairui Li', 'Bingzhou Li', 'Haonian Ji', 'Siwei Han', 'Xinyu Ye', 'Peng Xia', 'Zihan Dong', 'Congyu Zhang', 'Letian Zhang', 'Guiming Chen', 'Haoqin Tu', 'Xinyu Yang', 'Lu Feng', 'Xujiang Zhao', 'Haifeng Chen', 'Jiawei Zhou', 'Xiao Wang', 'Weitong Zhang', 'Hongtu Zhu', 'Yun Li', 'Jieru Mei', 'Hongliang Fei', 'Jiaheng Zhang', 'Linjie Li', 'Linjun Zhang', 'Yuyin Zhou', 'Sheng Wang', 'Caiming Xiong', 'James Zou', 'Zeyu Zheng', 'Cihang Xie', 'Mingyu Ding', 'Huaxiu Yao'], 'affiliations': ['Carnegie Mellon University', 'Google', 'Meta', 'NEC Labs America', 'NUS', 'Recrusive.com', 'Rutgers University', 'Stanford University', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.20025.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#science', '#alignment', '#agents', '#hallucinations'], 'emoji': '🔬', 'ru': {'title': 'Многоагентная дебата вместо конвейера: как научить AI делать науку итеративно', 'desc': 'AutoResearchClaw — это многоагентная система для автоматизации научных исследований, которая моделирует итеративный процесс реальной науки через структурированные дебаты между агентами, самовосстанавливающийся исполнитель, преобразующий ошибки в информацию, и верифицируемую отчётность без галлюцинаций. Система включает механизмы сотрудничества с человеком в семи режимах и эволюционное обучение, которое переносит опыт между запусками, позволяя накапливать знания из прошлых ошибок. На бенчмарке ARC-Bench AutoResearchClaw превзошла предыдущие подходы на 54.7%, демонстрируя эффективность целенаправленного взаимодействия человека в критических точках принятия решений. Система позиционируется как усилитель человеческого научного суждения, а не его замена.'}, 'en': {'title': 'Empowering Science with Multi-Agent Collaboration', 'desc': 'AutoResearchClaw is an advanced multi-agent system designed to enhance scientific discovery through collaborative debate and iterative learning. It incorporates mechanisms like self-healing execution to learn from failures and structured reporting to ensure accuracy in results. Unlike traditional systems that follow a linear approach, AutoResearchClaw allows for human collaboration and adapts based on past experiences to improve future research outcomes. This system has demonstrated significant performance improvements over previous models, showcasing its potential as a powerful tool for researchers.'}, 'zh': {'title': '增强科学发现的智能体系统', 'desc': 'AutoResearchClaw 是一个多智能体自主研究系统，通过结构化辩论、自我修复执行、可验证报告、人类协作和进化学习来提升科学发现。与以往的系统相比，它在基准测试中表现更佳，同时保持人类的监督。该系统采用五种机制，包括多智能体辩论生成假设、自我修复执行器、可验证结果报告以及人机协作。AutoResearchClaw 被视为一种研究放大器，增强而非取代人类的科学判断。'}}}, {'id': 'https://huggingface.co/papers/2605.15529', 'title': 'Process Rewards with Learned Reliability', 'url': 'https://huggingface.co/papers/2605.15529', 'abstract': 'Abstract BetaPRM introduces a distributional approach to process reward models that predicts both success probabilities and prediction reliability, enabling adaptive computation allocation that reduces token usage while maintaining accuracy.  AI-generated summary Process Reward Models (PRMs) provide step-level feedback for reasoning, but current PRMs usually output only a single reward score for each step. Downstream methods must therefore treat imperfect step-level reward predictions as reliable decision signals, with no indication of when these predictions should be trusted. We propose BetaPRM, a distributional PRM that predicts both a step-level success probability and the reliability of that prediction. Given step-success supervision from Monte Carlo continuations, BetaPRM learns a Beta belief that explains the observed number of successful continuations through a Beta-Binomial likelihood, rather than regressing to the finite-sample success ratio as a point target. This learned reliability signal indicates when a step reward should be trusted, enabling downstream applications to distinguish reliable rewards from uncertain ones. As one application, we introduce Adaptive Computation Allocation (ACA) for PRM-guided Best-of-N reasoning. ACA uses the learned reliability signal to stop when a high-reward solution is reliable and to spend additional computation on uncertain candidate prefixes. Experiments across four backbones and four reasoning benchmarks show that BetaPRM improves PRM-guided Best-of-N selection while preserving standard step-level error detection. Built on this signal, ACA improves the accuracy--token tradeoff over fixed-budget Best-of-16, reducing token usage by up to 33.57% while improving final-answer accuracy.', 'score': 29, 'issue_id': 2271, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'ff7a2e1f721598eb', 'authors': ['Jinyuan Li', 'Langlin Huang', 'Chengsong Huang', 'Shaoyang Xu', 'Donghong Cai', 'Yuyi Yang', 'Wenxuan Zhang', 'Jiaxin Huang'], 'affiliations': ['Singapore University of Technology and Design', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2605.15529.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Надёжное распределение вычислений через вероятностные модели вознаграждения', 'desc': 'BetaPRM представляет собой распределительный подход к моделям вознаграждения процесса, который предсказывает не только вероятность успеха каждого шага, но и надёжность этого предсказания. Модель использует Beta-Binomial правдоподобие для обучения на результатах Монте-Карло продолжений, что позволяет определить, когда предсказаниям можно доверять. На основе этого сигнала надёжности авторы предлагают адаптивное распределение вычислений (ACA), которое динамически выбирает, когда остановиться при нахождении надёжного решения, а когда потратить больше ресурсов на неопределённые варианты. Экспериментальные результаты показывают, что BetaPRM сокращает потребление токенов до 33.57% при сохранении или улучшении точности на различных бенчмарках рассуждений.'}, 'en': {'title': 'BetaPRM: Trustworthy Rewards for Smarter Computation', 'desc': 'BetaPRM is a novel approach to Process Reward Models (PRMs) that enhances the prediction of success probabilities and the reliability of those predictions. Unlike traditional PRMs that provide a single reward score, BetaPRM outputs a distribution that indicates both the likelihood of success and the trustworthiness of that likelihood. This dual output allows downstream methods to make more informed decisions by distinguishing between reliable and uncertain reward signals. Additionally, the Adaptive Computation Allocation (ACA) method leverages this reliability information to optimize computation resources, leading to significant reductions in token usage while maintaining or improving accuracy in reasoning tasks.'}, 'zh': {'title': 'BetaPRM：提升奖励模型的可靠性与效率', 'desc': 'BetaPRM是一种新的奖励模型，采用分布式方法来预测成功概率和预测的可靠性。这种模型能够在保持准确性的同时，减少计算资源的使用。通过学习Beta信念，BetaPRM能够更好地判断每一步奖励的可信度，从而帮助下游应用区分可靠和不可靠的奖励信号。实验结果表明，BetaPRM在多个基准测试中表现优越，显著提高了决策的准确性，同时减少了计算成本。'}}}, {'id': 'https://huggingface.co/papers/2605.19995', 'title': 'CogOmniControl: Reasoning-Driven Controllable Video Generation via Creative Intent Cognition', 'url': 'https://huggingface.co/papers/2605.19995', 'abstract': 'Abstract Diffusion models applied in compressed image space generate high-quality images with lower computational cost and support flexible inputs like text or boxes.  AI-generated summary Recent diffusion models achieve strong photorealism and fluency in video generation, yet remain fragile under abstract, sparse or complex conditions, leading to poor performance in professional production workflows such as storyboard sketches and clay render conditions. Existing video generation models, either inject conditions through adapters or couple a generic vision-language model (VLM) within a diffusion backbone, leaving a capability gap and failing to produce the videos that align with the user\'s creative intent. We present CogOmniControl, a reasoning-driven framework that factorizes controllable video generation into creative intent cognition and generation. Specifically, we train a specialized CogVLM using authentic anime production data. Compared to generic VLMs, it generates more professional and clear outputs, accurately cognizing user creative intent from sparse and abstract conditions and tuning these cues into dense reasoning output. Besides, CogOmniDiT unifies the controls from various conditions through in-context generation and is aligned to the CogVLM reasoning outputs via reinforcement learning. Furthermore, leveraging CogVLM\'s robust capability in guiding video generation, we release its potential in planning specific evaluators and enable a Best-of-N selection for the generated videos. This integration transforms the entire framework into a closed-loop "harness-like" architecture. We further introduce CogReasonBench and CogControlBench, built from professional workflows data that carry genuine creative intent rather than simulated ones. Experiments on two benchmarks show that CogOmniControl surpassed the existing open-source models. The project website: https://um-lab.github.io/CogOmniControl/', 'score': 28, 'issue_id': 2272, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '1443e9776246cd38', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#open_source', '#multimodal', '#story_generation', '#architecture', '#benchmark', '#alignment', '#video', '#dataset', '#rlhf', '#diffusion', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Творческий контроль видео через рассуждающие модели', 'desc': 'Статья представляет CogOmniControl — фреймворк для управляемой генерации видео на основе диффузионных моделей. Авторы обучили специализированную видение-языковую модель (VLM) на аутентичных данных из производства анимации, которая способна понимать творческие намерения пользователя из разреженных и абстрактных условий. Система использует диффузионный трансформер (CogOmniDiT) для унификации управляющих сигналов через внутриконтекстную генерацию и обучение с подкреплением. Фреймворк реализует замкнутую архитектуру с оценками качества и выбором лучших вариантов, показывая превосходные результаты на профессиональных бенчмарках.'}, 'en': {'title': 'Harnessing Creative Intent for Superior Video Generation', 'desc': 'This paper introduces CogOmniControl, a new framework for generating videos that aligns closely with user creative intent. It utilizes a specialized vision-language model (CogVLM) trained on authentic anime production data to improve the quality and clarity of outputs, especially in complex scenarios. The framework incorporates a reasoning-driven approach that factors in user intent and generates videos accordingly, overcoming limitations of existing models. Additionally, it employs reinforcement learning to unify control mechanisms and enhance the overall video generation process, demonstrating superior performance in professional workflows.'}, 'zh': {'title': '智能视频生成的新突破', 'desc': '本论文提出了一种名为CogOmniControl的框架，用于控制视频生成，旨在提高生成视频的专业性和清晰度。该框架通过认知用户的创意意图，将视频生成过程分解为创意意图认知和生成两个部分。与传统的视觉语言模型相比，CogVLM能够更好地理解稀疏和抽象条件下的用户意图，并将其转化为密集的推理输出。此外，CogOmniDiT通过上下文生成统一了各种条件的控制，利用强化学习与CogVLM的推理输出对齐，从而提升了视频生成的质量。'}}}, {'id': 'https://huggingface.co/papers/2605.19769', 'title': 'OpenComputer: Verifiable Software Worlds for Computer-Use Agents', 'url': 'https://huggingface.co/papers/2605.19769', 'abstract': "Abstract OpenComputer presents a framework for creating verifiable software environments for computer-use agents through integrated state verification, self-improving layers, task synthesis, and evaluation systems across multiple desktop applications.  AI-generated summary We present OpenComputer, a verifier-grounded framework for constructing verifiable software worlds for computer-use agents. OpenComputer integrates four components: (1) app-specific state verifiers that expose structured inspection endpoints over real applications, (2) a self-evolving verification layer that improves verifier reliability using execution-grounded feedback, (3) a task-generation pipeline that synthesizes realistic and machine-checkable desktop tasks, and (4) an evaluation harness that records full trajectories and computes auditable partial-credit rewards. In its current form, OpenComputer covers 33 desktop applications and 1,000 finalized tasks spanning browsers, office tools, creative software, development environments, file managers, and communication applications. Experiments show that OpenComputer's hard-coded verifiers align more closely with human adjudication than LLM-as-judge evaluation, especially when success depends on fine-grained application state. Frontier agents struggle with end-to-end completion despite partial progress, and open-source models exhibit sharp drops from their OSWorld-Verified scores, exposing a persistent gap in robust computer automation.", 'score': 22, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '1ae9baeb25dc83bb', 'authors': ['Jinbiao Wei', 'Qianran Ma', 'Yilun Zhao', 'Xiao Zhou', 'Kangqi Ni', 'Guo Gan', 'Arman Cohan'], 'affiliations': ['University of North Carolina at Chapel Hill', 'University of Pennsylvania', 'Yale NLP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.19769.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🖥️', 'ru': {'title': 'Верифицируемые цифровые миры для агентов компьютерной автоматизации', 'desc': 'OpenComputer — это фреймворк для создания проверяемых программных сред, в которых агенты могут взаимодействовать с реальными приложениями. Система интегрирует четыре компонента: верификаторы состояния приложений, самообучающийся слой верификации на основе обратной связи, генератор синтетических задач и систему оценки с полным логированием траекторий. Фреймворк покрывает 33 десктопных приложения и 1000 задач, демонстрируя, что жёсткие верификаторы лучше согласуются с человеческой оценкой, чем использование LLM в качестве судьи. Результаты показывают значительный разрыв между возможностями фронтирных агентов и требуемой надёжностью для полной автоматизации компьютерных задач.'}, 'en': {'title': 'Building Trustworthy Software Worlds for AI Agents', 'desc': 'OpenComputer is a framework designed to create verifiable software environments for computer agents. It includes four main components: app-specific state verifiers for inspecting applications, a self-improving verification layer that enhances reliability, a task synthesis pipeline for generating realistic tasks, and an evaluation system that tracks performance and rewards. The framework currently supports 33 desktop applications and 1,000 tasks, demonstrating better alignment with human judgment compared to traditional evaluation methods. However, challenges remain for agents in completing tasks fully, highlighting the need for improved automation in complex environments.'}, 'zh': {'title': '构建可验证的软件环境，提升计算机代理的智能', 'desc': 'OpenComputer是一个框架，用于为计算机使用代理创建可验证的软件环境。它集成了四个主要组件，包括应用特定的状态验证器、自我演进的验证层、任务生成管道和评估系统。该框架支持33个桌面应用程序和1000个任务，能够生成真实且可机器检查的桌面任务。实验表明，OpenComputer的验证器在与人类裁决的一致性上优于大型语言模型的评估，尤其是在成功依赖于细粒度应用状态时。'}}}, {'id': 'https://huggingface.co/papers/2605.18984', 'title': 'Artifact-Bench: Evaluating MLLMs on Detecting and Assessing the Artifacts of AI-Generated Videos', 'url': 'https://huggingface.co/papers/2605.18984', 'abstract': "Abstract Artifact-Bench evaluates multimodal large language models' capability to detect and analyze artifacts in AI-generated videos, revealing significant limitations in artifact perception and reasoning.  AI-generated summary Recent video generative models have greatly improved the realism of AI-generated videos, yet their outputs still exhibit artifacts such as temporal inconsistencies, structural distortions, and semantic incoherence. While Multimodal Large Language Models (MLLMs) show strong visual understanding capabilities, their ability to perceive and reason about such artifacts remains unclear. Existing benchmarks often lack systematic evaluation of artifact-aware perception and fine-grained diagnostic reasoning, especially across diverse AI-generated video domains beyond photorealistic content. To address this gap, we introduce Artifact-Bench, a comprehensive benchmark for evaluating MLLMs on AI-generated video artifact detection and analysis. We first establish a three-level hierarchical taxonomy of realism artifacts, covering photorealistic, animated, and CG-style videos. Based on this taxonomy, Artifact-Bench defines three complementary tasks: real vs. AI-generated video classification, pairwise realism comparison, and fine-grained artifact identification. Experiments on 19 leading MLLMs reveal substantial limitations in artifact perception and reasoning, with many models approaching random or even below-random performance in challenging settings. We further observe significant misalignment between MLLM judgments and human perceptual preferences, highlighting their limited reliability as general evaluators for AI-generated video realism.", 'score': 21, 'issue_id': 2271, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '39cab4d304411d44', 'authors': ['Yuqi Tang', 'Yang Shi', 'Zhuoran Zhang', 'Qixun Wang', 'Xuehai Bai', 'Yue Ding', 'Ruizhe Chen', 'Bohan Zeng', 'Xinlong Chen', 'Xuanyu Zhu', 'Bozhou Li', 'Yuran Wang', 'Yifan Dai', 'Chengzhuo Tong', 'Xinyu Liu', 'Yiyan Ji', 'Yujie Wei', 'Yuhao Dong', 'Shilin Yan', 'Fengxiang Wang', 'Yi-Fan Zhang', 'Haotian Wang', 'Yuanxing Zhang', 'Pengfei Wan'], 'affiliations': ['CASIA', 'FDU', 'HDU', 'HKUST', 'HKUST(GZ)', 'Kling Team', 'NJU', 'NTU', 'PKU', 'SJTU', 'Shanghai AI Lab', 'THU', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2605.18984.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Мультимодальные модели не могут надёжно обнаруживать артефакты в видео, созданном ИИ', 'desc': 'В работе представлен набор данных Artifact-Bench для оценки способности мультимодальных больших языковых моделей (MLLM) обнаруживать и анализировать артефакты в видео, созданных с помощью искусственного интеллекта. Авторы создали трёхуровневую таксономию артефактов реалистичности, включающую фотореалистичные, анимационные и CG-видео, и определили три дополнительные задачи: классификацию видео, попарное сравнение реалистичности и детальную идентификацию артефактов. Экспериментальные результаты на 19 ведущих MLLM показали серьёзные ограничения в восприятии артефактов, причём многие модели демонстрировали производительность на уровне случайного выбора или даже ниже. Исследование выявило значительное несоответствие между оценками MLLM и предпочтениями человека, что подчёркивает ненадёжность этих моделей как универсальных оценивателей реалистичности AI-видео.'}, 'en': {'title': "Evaluating AI's Eye: Unveiling Limitations in Video Artifact Detection", 'desc': 'The paper introduces Artifact-Bench, a benchmark designed to evaluate the ability of multimodal large language models (MLLMs) to detect and analyze artifacts in AI-generated videos. Despite advancements in video generation, these models struggle with recognizing issues like temporal inconsistencies and structural distortions. The study reveals that many MLLMs perform poorly in artifact perception and reasoning, often yielding results close to random guessing. Additionally, there is a notable disconnect between MLLM assessments and human preferences, indicating that these models may not be reliable for evaluating video realism.'}, 'zh': {'title': '评估AI生成视频伪影的能力', 'desc': '本文介绍了Artifact-Bench，这是一个评估多模态大型语言模型（MLLMs）在检测和分析AI生成视频中的伪影能力的基准。尽管最新的视频生成模型在生成真实感视频方面取得了显著进展，但其输出仍然存在时间不一致、结构扭曲和语义不连贯等伪影问题。研究表明，MLLMs在感知和推理这些伪影方面存在显著局限，许多模型在复杂场景中的表现接近随机水平。通过建立伪影的分层分类法，Artifact-Bench定义了三个互补任务，以系统地评估MLLMs的伪影感知能力。'}}}, {'id': 'https://huggingface.co/papers/2605.18758', 'title': 'OmniGUI: Benchmarking GUI Agents in Omni-Modal Smartphone Environments', 'url': 'https://huggingface.co/papers/2605.18758', 'abstract': 'Abstract OmniGUI presents a novel multimodal benchmark for GUI agents that incorporates simultaneous audio, video, and image inputs to better simulate real smartphone interactions.  AI-generated summary Current benchmarks for graphical user interface (GUI) agents predominantly rely on static screenshots. However, real-world smartphone interaction routinely requires agents to process transient audio cues and temporal video dynamics that are tightly coupled with the moment of action. To bridge this gap, we introduce OmniGUI, the first step-level benchmark designed to evaluate GUI agents in omni-modal smartphone environments. OmniGUI provides continuous, interleaved multimodal inputs comprising static images, synchronous audio, and video clips at every action step. The dataset encompasses 709 expert-demonstrated episodes (2,579 action steps) across 29 applications, systematically annotated with objective multimodal dependency levels. Because dedicated omni-modal GUI agent frameworks are currently in their nascent stage, we select foundational omni-modal models capable of natively processing interleaved inputs to serve as agent proxies for our initial baselines. Our empirical evaluation reveals that while current models exhibit competency on visually static tasks, their action prediction performance degrades significantly in environments requiring synchronous temporal and auditory signals. Furthermore, ablation studies isolate specific operational bottlenecks, notably cross-modal interference when processing task-irrelevant environmental noise. The complete dataset, evaluation pipeline, and baseline prompts are provided in the supplementary material. Project page: https://omni-gui.github.io.', 'score': 11, 'issue_id': 2271, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '2b648df4d3c5b660', 'authors': ['Felix Henry', 'Xiaochen Lin', 'Jiangyou Zhu', 'Yangfan', 'Bingqian Zhang', 'Min Chen', 'Shiyu Huang'], 'affiliations': ['XPeng Motors'], 'pdf_title_img': 'assets/pdf/title_img/2605.18758.jpg', 'data': {'categories': ['#benchmark', '#audio', '#video', '#games', '#multimodal', '#dataset', '#agents'], 'emoji': '📱', 'ru': {'title': 'Мультимодальный синтез для понимания действий в интерфейсах смартфонов', 'desc': 'OmniGUI представляет первый бенчмарк для оценки GUI-агентов, который использует одновременно аудио, видео и изображения для более реалистичного моделирования взаимодействия со смартфонами. В отличие от существующих подходов, основанных только на статических скриншотах, этот датасет содержит синхронизированные мультимодальные входные данные на каждом шаге действия агента. Исследование показало, что современные модели хорошо справляются с визуально статичными задачами, но их производительность значительно снижается при необходимости обработки одновременных аудиосигналов и видеоданных. Авторы выявили, что основной проблемой является перекрёстная модальная интерференция, когда релевантные для задачи сигналы смешиваются с фоновым шумом.'}, 'en': {'title': 'Revolutionizing GUI Agents with Omni-Modal Inputs', 'desc': 'OmniGUI introduces a new benchmark for evaluating graphical user interface (GUI) agents by incorporating audio, video, and image inputs to reflect real smartphone interactions. Unlike traditional benchmarks that only use static images, OmniGUI allows agents to process dynamic audio and video cues that are essential for understanding context during actions. The dataset includes 709 expert-demonstrated episodes with detailed annotations on multimodal dependencies, making it a comprehensive resource for training and testing GUI agents. Initial evaluations show that while existing models perform well on static tasks, they struggle with tasks requiring simultaneous audio and video processing, highlighting the need for improved omni-modal capabilities.'}, 'zh': {'title': 'OmniGUI：智能手机多模态交互的新基准', 'desc': 'OmniGUI是一个新颖的多模态基准，旨在评估图形用户界面（GUI）代理在智能手机环境中的表现。与传统的静态截图基准不同，OmniGUI结合了音频、视频和图像输入，以更真实地模拟用户交互。该数据集包含709个专家演示的案例，涵盖29个应用程序，并对每个操作步骤进行了系统的多模态依赖级别标注。我们的研究表明，现有模型在处理静态任务时表现良好，但在需要同步音频和视频信号的环境中，其动作预测性能显著下降。'}}}, {'id': 'https://huggingface.co/papers/2605.19436', 'title': 'CEPO: RLVR Self-Distillation using Contrastive Evidence Policy Optimization', 'url': 'https://huggingface.co/papers/2605.19436', 'abstract': 'Abstract Contrastive Evidence Policy Optimization (CEPO) improves reinforcement learning with verifiable rewards by distinguishing decisive reasoning steps from filler tokens through contrastive teaching signals derived from rejected rollouts.  AI-generated summary When a model produces a correct solution under reinforcement learning with verifiable rewards (RLVR), every token receives the same reward signal regardless of whether it was a decisive reasoning step or a grammatical filler. A natural fix is to condition the model on the correct answer as a teacher, identifying tokens it would have generated differently had it known the answer. Prior work shows this either corrupts training by leaking the answer into the gradient, or produces a weak signal that cannot distinguish decisive steps from filler, since both look equally surprising relative to the model\'s baseline. We propose Contrastive Evidence Policy Optimization (CEPO), which asks a sharper question at every token: not just "does the correct answer favor this token?" but "does the correct answer favor it while the wrong answer disfavors it?" A token satisfying both is a genuine reasoning step; one satisfying neither is filler. The wrong-answer teacher is constructed from rejected rollouts already in the training batch, incurring no additional sampling cost. We prove CEPO inherits all structural safety guarantees of the prior state of the art while strictly sharpening credit at decisive tokens, with the improvement vanishing exactly at filler positions. Empirically, CEPO achieves 43.43% and 60.56% average accuracy across five multimodal mathematical reasoning benchmarks at 2B and 4B scale, respectively, versus 41.17% and 57.43% for GRPO under identical training budgets. Distribution-matching self-distillation methods (OPSD, SDPO) fall below the untrained baseline, empirically confirming the information leakage our theory predicts. Our code is available at https://github.com/ahmedheakl/CEPO.', 'score': 10, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'd9f9480d593932af', 'authors': ['Ahmed Heakl', 'Abdelrahman M. Shaker', 'Youssef Mohamed', 'Rania Elbadry', 'Omar Fetouh', 'Fahad Shahbaz Khan', 'Salman Khan'], 'affiliations': ['Australian National University', 'Linköping University', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.19436.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#math', '#open_source', '#multimodal', '#reasoning', '#training', '#small_models', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Контрастивное различение логических шагов от шумовых токенов в обучении с подкреплением', 'desc': 'Работа предлагает Contrastive Evidence Policy Optimization (CEPO) — метод для улучшения обучения с подкреплением на основе проверяемых вознаграждений. Основная идея заключается в различении ключевых шагов рассуждения от фiller-токенов путём использования контрастивных сигналов, полученных из отклонённых траекторий. Вместо того чтобы просто спрашивать, благоприятствует ли правильный ответ текущему токену, метод задаёт более острый вопрос: одновременно ли правильный ответ поддерживает токен, а неправильный — его отвергает. Экспериментальные результаты показывают значительное улучшение на бенчмарках математического рассуждения в мультимодальных задачах по сравнению с базовыми методами.'}, 'en': {'title': 'Sharpening Rewards for Decisive Reasoning in RL', 'desc': 'Contrastive Evidence Policy Optimization (CEPO) enhances reinforcement learning by effectively distinguishing between important reasoning steps and irrelevant filler tokens. It does this by using contrastive teaching signals from rejected rollouts, allowing the model to learn from both correct and incorrect answers. CEPO sharpens the reward signal for tokens that are genuinely contributing to the reasoning process while ensuring that filler tokens do not receive undue credit. This method not only maintains the safety guarantees of previous approaches but also improves accuracy on multimodal mathematical reasoning tasks significantly.'}, 'zh': {'title': '对比证据策略优化：提升强化学习的关键推理能力', 'desc': '对比证据策略优化（CEPO）通过对比教学信号来改进强化学习，能够区分关键推理步骤和无关填充符。传统的强化学习方法在奖励信号上对所有标记一视同仁，导致无法有效识别重要的推理步骤。CEPO提出了一种新方法，通过比较正确答案和错误答案对每个标记的影响，来识别真正的推理步骤。实验结果表明，CEPO在多个数学推理基准测试中表现优异，显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.11609', 'title': 'Anti-Self-Distillation for Reasoning RL via Pointwise Mutual Information', 'url': 'https://huggingface.co/papers/2605.11609', 'abstract': 'Abstract Anti-Self-Distillation reverses the direction of knowledge transfer in self-distillation to improve math reasoning efficiency and accuracy.  AI-generated summary On-policy self-distillation, where a student is pulled toward a copy of itself conditioned on privileged context (e.g., a verified solution or feedback), offers a promising direction for advancing reasoning capability without a stronger external teacher. Yet in math reasoning the gains are inconsistent, even when the same approach succeeds elsewhere. A pointwise mutual information analysis traces the failure to the privileged context itself: it inflates the teacher\'s confidence on tokens already implied by the solution (structural connectives, verifiable claims) and deflates it on deliberation tokens ("Wait", "Let", "Maybe") that drive multi-step search. We propose Anti-Self-Distillation (AntiSD), which ascends a divergence between student and teacher rather than descending it: this reverses the per-token sign and yields a naturally bounded advantage in one step. An entropy-triggered gate disables the term once the teacher entropy collapses, completing a drop-in replacement for default self-distillation. Across five models from 4B to 30B parameters on math reasoning benchmarks, AntiSD reaches the GRPO baseline\'s accuracy in 2 to 10x fewer training steps and improves final accuracy by up to 11.5 points. AntiSD opens a path to scalable self-improvement, where a language model bootstraps its own reasoning through its training signal.', 'score': 7, 'issue_id': 2271, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '61cbfc7e72234f28', 'authors': ['Guobin Shen', 'Xiang Cheng', 'Chenxiao Zhao', 'Lei Huang', 'Jindong Li', 'Dongcheng Zhao', 'Xing Yu'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.11609.jpg', 'data': {'categories': ['#math', '#reasoning', '#optimization', '#training', '#small_models'], 'emoji': '🔄', 'ru': {'title': 'Переворачивая знания: как научить модель учиться на себе эффективнее', 'desc': "В этой статье авторы предлагают новый подход под названием Anti-Self-Distillation (AntiSD), который переворачивает традиционное направление передачи знаний в self-distillation для улучшения способности моделей решать математические задачи. Анализ взаимной информации показал, что стандартная self-distillation с привилегированным контекстом неправильно распределяет уверенность между токенами: переоценивает вероятность структурных связок и недооценивает важные токены размышления типа 'Wait' и 'Let', которые необходимы для многошагового поиска решения. Вместо минимизации расхождения между студентом и учителем, AntiSD максимизирует его, естественным образом достигая лучшего баланса и добавляя затвор, активируемый энтропией. Экспериментальные результаты демонстрируют, что AntiSD достигает качества базовой модели в 2-10 раз быстрее и улучшает точность финального решения на 11.5 пункта."}, 'en': {'title': 'Reversing Knowledge Transfer for Better Math Reasoning', 'desc': "The paper introduces Anti-Self-Distillation (AntiSD), a novel approach that reverses the traditional self-distillation process to enhance mathematical reasoning in AI models. By utilizing on-policy self-distillation, the method allows a student model to learn from a version of itself that is informed by privileged context, such as verified solutions. The authors identify that previous self-distillation methods struggle due to inflated confidence on certain tokens, which hampers the model's ability to engage in multi-step reasoning. AntiSD effectively addresses this issue by promoting divergence between the student and teacher models, leading to improved accuracy and efficiency in training, achieving significant gains in fewer steps compared to standard methods."}, 'zh': {'title': '反自我蒸馏：提升数学推理的新方法', 'desc': '反自我蒸馏（Anti-Self-Distillation）通过逆转知识转移的方向，提升了数学推理的效率和准确性。该方法利用自我蒸馏中的学生模型，结合特定上下文（如验证过的解决方案或反馈），来增强推理能力。研究发现，传统自我蒸馏在数学推理中效果不佳，主要是因为特权上下文导致教师模型对某些令牌的信心过高，而对多步搜索的关键令牌信心不足。反自我蒸馏通过增加学生与教师之间的差异，优化了模型的训练过程，显著减少了训练步骤并提高了最终准确率。'}}}, {'id': 'https://huggingface.co/papers/2605.16003', 'title': 'Echo-Forcing: A Scene Memory Framework for Interactive Long Video Generation', 'url': 'https://huggingface.co/papers/2605.16003', 'abstract': 'Abstract Echo-Forcing addresses limitations in interactive long-video generation by decoupling historical memory and recent dynamics through hierarchical temporal memory, scene recall frames, and difference-aware memory decay mechanisms.  AI-generated summary Autoregressive video diffusion models enable open-ended generation through local attention and KV caching. However, existing training-free long-video optimization methods mainly focus on stable extension under a single prompt, making them difficult to handle interactive scenarios involving prompt switching, old scene forgetting, and historical scene recall. We identify the core bottleneck as the functional entanglement of historical KV states: stable anchors and recent dynamics are handled by the same cache policy, leading to outdated background contamination, delayed response to new prompts, and loss of long-range memory. To address this issue, we propose Echo-Forcing, a training-free scene memory framework specifically designed for interactive long video generation with three core mechanisms: (1) Hierarchical Temporal Memory, which decouples stable anchors, compressed history, and recent windows under relative RoPE; (2) Scene Recall Frames, which compresses historical scenes into spatially structured KV representations to support long-term recall; and (3) Difference-aware Memory Decay, which adaptively forgets conflicting tokens according to the discrepancy between old and new scenes. Based on these designs, Echo-Forcing uniformly supports smooth transitions, hard cuts, and long-range scene recall under a bounded cache budget. Extensive evaluations on VBench-Long further demonstrate that Echo-Forcing achieves the best overall performance in both long-video generation and interactive video generation settings. Our code is released in https://github.com/mingqiangWu/Echo-Forcing', 'score': 1, 'issue_id': 2271, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'bc42395d3077ef73', 'authors': ['Mingqiang Wu', 'Weilun Feng', 'Zhefeng Zhang', 'Haotong Qin', 'Yuqi Li', 'Guoxin Fan', 'Xiaokun Liu', 'Zhulin An', 'Libo Huang', 'Yongjun Xu', 'Chuanguang Yang'], 'affiliations': ['China University of Mining & Technology, Beijing', 'City College of New York, City University of New York', 'ETH Zürich', 'State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences, Beijing, China', 'University of Chinese Academy of Sciences, Beijing, China', 'Xiamen Institute of Data Intelligence, Xiamen, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.16003.jpg', 'data': {'categories': ['#diffusion', '#video', '#long_context', '#open_source', '#architecture', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Иерархическое управление памятью для интерактивной генерации видео', 'desc': 'Echo-Forcing решает проблему интерактивной генерации длинных видео путём разделения исторической памяти и недавней динамики с помощью иерархической временной памяти. Метод использует механизм напоминания сцен и адаптивное забывание конфликтующих токенов, чтобы улучшить управление KV-кэшем в диффузионных моделях. Это позволяет системе плавно переключаться между подсказками, забывать устаревшие фоны и вспоминать давние сцены в пределах ограниченного бюджета памяти. Экспериментальные результаты показывают превосходную производительность как при генерации длинных видео, так и при интерактивной генерации видео.'}, 'en': {'title': 'Decoupling Memory for Interactive Long-Video Generation', 'desc': 'The paper introduces Echo-Forcing, a novel framework aimed at improving interactive long-video generation by separating historical memory from recent dynamics. It employs three key mechanisms: Hierarchical Temporal Memory to manage stable and recent information, Scene Recall Frames for efficient long-term memory storage, and Difference-aware Memory Decay to selectively forget outdated information. This approach addresses challenges like prompt switching and scene recall, which are common in interactive scenarios. The results show that Echo-Forcing outperforms existing methods in generating coherent and contextually relevant long videos.'}, 'zh': {'title': 'Echo-Forcing：交互式长视频生成的新突破', 'desc': 'Echo-Forcing 是一种针对交互式长视频生成的场景记忆框架，旨在解决历史记忆和近期动态之间的功能纠缠问题。它通过层次时间记忆、场景回忆帧和差异感知记忆衰减机制来实现稳定的场景记忆管理。该方法能够支持平滑过渡、硬切换和长距离场景回忆，适应不同的交互场景。经过广泛评估，Echo-Forcing 在长视频生成和交互式视频生成中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.18855', 'title': 'Delta Attention Residuals', 'url': 'https://huggingface.co/papers/2605.18855', 'abstract': "Abstract Delta Attention Residuals improve layer-wise routing by attending to feature changes rather than cumulative states, resulting in better attention distributions and model performance across different scales.  AI-generated summary Attention Residuals replace standard additive residual connections with learned softmax attention over previous layer outputs, enabling selective cross-layer routing. However, standard Attention Residuals still attend over cumulative hidden states in previous layers, which are highly redundant. We show that this redundancy leads to routing collapse in deeper layers: attention weights become low-contrast and closer to uniform (max weight {approx}0.2), limiting the model's ability to select informative states in previous layers. This raises a key but underexplored design question: what layer-wise representations should be routed in Attention Residuals? To answer this question, we propose Delta Attention Residuals, which attend over deltas -- the change introduced by each sublayer (v_i = h_{i+1} - h_i) -- instead of cumulative states. Delta representations are structurally diverse and yield higher-contrast attention distributions (max weight {approx}0.6), enabling more selective and effective routing across layers. This principle applies at both per-sublayer and block granularity. Across all tested scales (220M--7.6B), Delta Attention Residuals consistently outperform both standard residuals and Attention Residuals, with 1.7--8.2\\% validation perplexity gains. Delta Attention Residuals also enables converting pretrained checkpoints into Delta Attention Residuals via standard fine-tuning. Code is available at https://github.com/wdlctc/delta-attention-residuals-code.", 'score': 1, 'issue_id': 2271, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'db076de98d4f1eb1', 'authors': ['Cheng Luo', 'Zefan Cai', 'Junjie Hu'], 'affiliations': ['Independent Researcher', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.18855.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Дельта-внимание: маршрутизация через изменения вместо состояний', 'desc': 'В статье предложен новый метод Delta Attention Residuals, который улучшает маршрутизацию между слоями нейронной сети путём внимания к изменениям признаков вместо накопленных состояний. Авторы показывают, что стандартные Attention Residuals страдают от избыточности и коллапса внимания в глубоких слоях, где веса внимания становятся близки к равномерному распределению. Delta Attention Residuals решает эту проблему, работая с дельтами — разностями между выходами последовательных слоёв, что приводит к более контрастному и избирательному распределению весов. Метод демонстрирует последовательное улучшение перплексии валидации на 1.7-8.2% во всех тестируемых масштабах моделей от 220M до 7.6B параметров.'}, 'en': {'title': 'Enhancing Neural Routing with Delta Attention Residuals', 'desc': 'Delta Attention Residuals enhance the routing of information in neural networks by focusing on the changes between layers instead of the cumulative outputs. This method replaces traditional additive connections with learned attention mechanisms that prioritize significant differences, leading to improved attention distributions. By addressing the redundancy in standard Attention Residuals, Delta Attention Residuals achieve higher contrast in attention weights, allowing for more effective selection of informative features. The results show consistent performance improvements across various model sizes, demonstrating the effectiveness of this new approach in reducing validation perplexity.'}, 'zh': {'title': '关注变化，提升模型性能', 'desc': '本文提出了一种新的模型结构，称为Delta Attention Residuals，旨在改善层间路由。与传统的残差连接不同，Delta Attention Residuals关注的是每一层的变化，而不是累积的状态，从而提高了注意力分布的效果。通过这种方法，模型能够更有效地选择有用的信息，避免了在深层网络中出现的冗余问题。实验结果表明，Delta Attention Residuals在不同规模的模型中均表现出更好的性能，验证困惑度提高了1.7%到8.2%。'}}}, {'id': 'https://huggingface.co/papers/2605.18827', 'title': 'Code-Guided Reasoning for Small Language Models: Evaluating Executable MCQA Scaffolds', 'url': 'https://huggingface.co/papers/2605.18827', 'abstract': 'Abstract Code-Guided Reasoning (CGR) evaluates how executable reasoning scaffolds enhance small language model performance on multiple-choice question answering tasks through standardized components and measured improvements.  AI-generated summary Multiple-choice QA benchmarks usually evaluate small language models (SLMs) as direct answerers, but deployed language-model systems increasingly rely on external scaffolds such as tools, code, and repeated model calls. We introduce Code-Guided Reasoning (CGR), an evaluation protocol and generated-program resource for measuring when executable reasoning scaffolds improve SLM performance on MCQA tasks. CGR standardizes six components: a normalized item interface, a direct solver prompt, a generator prompt, a Python scaffold, solver-call and extraction helpers, and a three-channel result record. On 20,498 retained result rows from a locally prepared MCQA bundle and six metadata-registered solver models, the observed non-zero-baseline partition shows 66.21% macro assisted accuracy versus 38.11% direct accuracy, a +28.10 percentage-point difference with a pair-bootstrap interval of [20.32, 36.43]. Under a stricter Ab > 30% direct-signal gate, the macro difference is +14.11 points. These estimates are descriptive. Assisted inference uses a larger solver-call budget, answer extraction is brittle, Time-MQA contains the observed regressions, and some generated programs violate the no-hard-coding instruction. CGR provides the trace package needed to interpret these results, including direct, assisted, and generator-side answers, partition definitions, generated programs, response metadata, and audits.', 'score': 1, 'issue_id': 2272, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd0511c3dbc7e97f6', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#small_models', '#plp', '#benchmark', '#optimization', '#reasoning'], 'emoji': '🔧', 'ru': {'title': 'Внешние инструменты и код значительно усиливают способность малых моделей к логическому рассуждению', 'desc': 'В статье представлен протокол оценки Code-Guided Reasoning (CGR), который измеряет, насколько исполняемые леса рассуждений улучшают производительность малых языковых моделей при решении задач множественного выбора. Авторы стандартизировали шесть компонентов: нормализованный интерфейс, прямой решатель, генератор программ на Python, вспомогательные функции и систему логирования результатов. Экспериментальные результаты показывают значительное улучшение точности с 38.11% при прямом ответе до 66.21% при использовании вспомогательных инструментов (разница +28.10 процентных пункта). CGR предоставляет полный набор трассировочных данных и сгенерированные программы для интерпретации и воспроизведения результатов.'}, 'en': {'title': 'Enhancing Language Models with Code-Guided Reasoning', 'desc': 'The paper introduces Code-Guided Reasoning (CGR), a new evaluation method that assesses how using executable reasoning tools can improve the performance of small language models (SLMs) in answering multiple-choice questions. It standardizes six components to create a structured approach for measuring the effectiveness of these scaffolds, which include prompts and Python code. The results show a significant improvement in accuracy when using CGR, with a macro assisted accuracy of 66.21% compared to 38.11% for direct answering. This indicates that integrating external reasoning tools can enhance the capabilities of language models in complex question-answering tasks.'}, 'zh': {'title': '代码引导推理提升语言模型表现', 'desc': '代码引导推理（CGR）评估可执行推理框架如何提升小型语言模型在多项选择问答任务中的表现。该研究提出了一种评估协议，标准化了六个组件，以便测量外部工具和代码对小型语言模型性能的影响。通过对20,498个结果的分析，发现使用可执行推理框架的准确率显著高于直接回答的准确率。CGR还提供了结果解释所需的追踪包，包括直接、辅助和生成侧的答案等信息。'}}}, {'id': 'https://huggingface.co/papers/2605.12623', 'title': 'DocAtlas: Multilingual Document Understanding Across 80+ Languages', 'url': 'https://huggingface.co/papers/2605.12623', 'abstract': 'Abstract DocAtlas framework creates high-fidelity OCR datasets across 82 languages using differential rendering and synthetic generation, demonstrating improved multilingual model adaptation through Direct Preference Optimization.  AI-generated summary Multilingual document understanding remains limited for low-resource languages due to scarce training data and model-based annotation pipelines that perpetuate existing biases. We introduce DocAtlas, a framework that constructs high-fidelity OCR datasets and benchmarks covering 82 languages and 9 evaluation tasks. Our dual pipelines, differential rendering of native DOCX documents and synthetic LaTeX-based generation for right-to-left scripts produce precise structural annotations in a unified DocTag format encoding layout, text, and component types, without learned models for core annotation. Evaluating 16 state-of-the-art models reveals persistent gaps in low-resource scripts. We show that Direct Preference Optimization (DPO) using rendering-derived ground truth as positive signal achieves stable multilingual adaptation, improving both in-domain (+1.9%) and out-of-domain (+1.8%) accuracy without measurable base-language degradation, where supervised fine-tuning degrades out-of-domain performance by up to 21%. Our best variant, DocAtlas-DeepSeek, improves +1.7% over the strongest baseline.', 'score': 1, 'issue_id': 2271, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '720b5f334a735f7f', 'authors': ['Ahmed Heakl', 'Youssef Mohamed', 'Abdullah Sohail', 'Rania Elbadry', 'Ahmed Nassar', 'Peter W. J. Staar', 'Fahad Shahbaz Khan', 'Imran Razzak', 'Salman Khan'], 'affiliations': ['IBM Research', 'MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2605.12623.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#multilingual', '#synthetic', '#data', '#machine_translation', '#optimization', '#low_resource', '#dataset'], 'emoji': '📄', 'ru': {'title': 'Многоязычное распознавание документов без деградации производительности', 'desc': 'В работе представлен фреймворк DocAtlas для создания высокачественных датасетов OCR на 82 языках с использованием дифференциального рендеринга и синтетической генерации документов. Авторы решают проблему ограниченного понимания многоязычных документов в низкоресурсных языках, предлагая две конвейерные линии: рендеринг нативных документов DOCX и синтетическую генерацию на основе LaTeX для языков с письмом справа налево. Для адаптации многоязычных моделей применяется метод Direct Preference Optimization с использованием ground truth из рендеринга как положительного сигнала, что обеспечивает стабильное улучшение производительности без деградации базового языка. Лучший вариант модели DocAtlas-DeepSeek показывает улучшение на 1.7% по сравнению с сильнейшим бейзлайном.'}, 'en': {'title': 'Empowering Multilingual OCR with DocAtlas', 'desc': 'The DocAtlas framework addresses the challenge of creating high-quality OCR datasets for 82 languages, particularly focusing on low-resource languages that often lack sufficient training data. It utilizes differential rendering and synthetic generation techniques to produce accurate structural annotations in a unified format, which helps in multilingual document understanding. By employing Direct Preference Optimization (DPO), the framework enhances model adaptation, achieving better accuracy in both in-domain and out-of-domain tasks without degrading performance on the base language. The results indicate that DocAtlas significantly outperforms existing methods, particularly in low-resource scripts, demonstrating its effectiveness in improving multilingual model performance.'}, 'zh': {'title': 'DocAtlas：提升多语言OCR的创新框架', 'desc': 'DocAtlas框架通过差异渲染和合成生成技术，创建了覆盖82种语言的高保真OCR数据集，旨在改善多语言模型的适应性。该框架采用双管道方法，利用原生DOCX文档的差异渲染和基于LaTeX的合成生成，提供统一的DocTag格式，精确编码布局、文本和组件类型。通过评估16种最先进的模型，发现低资源语言的表现仍然存在差距。我们展示了使用渲染生成的真实数据作为正信号的直接偏好优化（DPO）方法，能够在不降低基础语言性能的情况下，显著提高多语言适应性。'}}}, {'id': 'https://huggingface.co/papers/2605.20075', 'title': 'CopT: Contrastive On-Policy Thinking with Continuous Spaces for General and Agentic Reasoning', 'url': 'https://huggingface.co/papers/2605.20075', 'abstract': "Abstract CopT introduces a novel reasoning framework for LLMs that generates draft answers first, then uses contrastive verification and dynamic thinking to improve accuracy while reducing token consumption.  AI-generated summary Chain-of-thought (CoT) is a standard approach for eliciting reasoning capabilities from large language models (LLMs). However, the common CoT paradigm treats thinking as a prerequisite for answering, which can delay access to plausible answers and incur unnecessary token costs even when the model is able to identify an answer before extended thinking, a behavior known as performative reasoning. In this paper, we introduce CopT, a reformulated reasoning pipeline that reverses the usual order of thinking and answering. Instead of thinking before answering, CopT first elicits a draft answer and then invokes subsequent on-policy thinking conditioned on its own draft answer for reflection and correction. To assess whether the draft answer should be trusted, CopT recasts continuous embeddings as inference-time contrastive verifiers. Specifically, it contrasts the model's support for the same generated tokens under discrete-token inputs and continuous-embedding inputs, yielding a sequence-level reverse KL estimator for answer reliability. Our analysis shows that under certain assumptions, the expected estimate equals the mutual information between the unresolved latent state and the emitted answer token, explaining why it captures answer-relevant uncertainty rather than arbitrary uncertainty in the latent state. When the answer is deemed insufficiently reliable, CopT performs further on-policy thinking, where a second KL estimator dynamically controls draft-answer visibility, preserving useful partial information while reducing the risk of being misled by unreliable content. Across mathematics, coding, and agentic reasoning tasks, CopT improves peak accuracy by up to 23% and reduces token usage by up to 57% at comparable or higher accuracy, without any additional training. The code is available at https://github.com/sdc17/CopT.", 'score': 0, 'issue_id': 2272, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '2162cebf3e7ad5b8', 'authors': ['Dachuan Shi', 'Hanlin Zhu', 'Xiangchi Yuan', 'Wanjia Zhao', 'Kejing Xia', 'Wen Xiao', 'Wenke Lee'], 'affiliations': ['Georgia Tech', 'Microsoft', 'Stanford University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.20075.jpg', 'data': {'categories': ['#open_source', '#optimization', '#reasoning'], 'emoji': '🔄', 'ru': {'title': 'Сначала ответ, потом размышление: эффективное рассуждение через контрастную верификацию', 'desc': 'CopT предлагает новый подход к рассуждениям в больших языковых моделях, который сначала генерирует предварительный ответ, а затем использует контрастную верификацию для его оценки. Вместо традиционного подхода цепочки рассуждений, где модель думает перед ответом, CopT переворачивает этот порядок и размышляет после получения черновика ответа. Для проверки надежности ответа метод преобразует эмбеддинги в контрастные верификаторы, сравнивая поддержку модели для одинаковых токенов при дискретных и непрерывных входах. Экспериментально показано, что CopT повышает точность на задачах математики и кодирования на 23% и снижает потребление токенов на 57% без переобучения модели.'}, 'en': {'title': 'Revolutionizing Reasoning: Draft First, Think Later with CopT', 'desc': 'The paper presents CopT, a new reasoning framework for large language models (LLMs) that changes the traditional approach of generating answers. Instead of thinking first and then answering, CopT generates a draft answer initially and then refines it through contrastive verification and dynamic thinking. This method reduces token consumption and improves accuracy by allowing the model to assess the reliability of its draft answer before further reasoning. The results show significant improvements in accuracy and efficiency across various tasks without requiring additional training.'}, 'zh': {'title': 'CopT：颠覆传统推理，提升回答准确性！', 'desc': 'CopT提出了一种新颖的推理框架，旨在提高大型语言模型（LLMs）的回答准确性，同时减少令牌消耗。该方法首先生成草拟答案，然后通过对比验证和动态思考来改进答案。与传统的思考后回答的方式不同，CopT先生成答案，再进行反思和修正。实验表明，CopT在数学、编码和代理推理任务中，准确率提高了最多23%，令牌使用量减少了最多57%。'}}}, {'id': 'https://huggingface.co/papers/2605.19587', 'title': 'SceneCode: Executable World Programs for Editable Indoor Scenes with Articulated Objects', 'url': 'https://huggingface.co/papers/2605.19587', 'abstract': 'Abstract SceneCode enables programmable indoor scene generation by converting natural language prompts into executable code that produces interactive, simulation-ready environments with structured object representations.  AI-generated summary Indoor scene synthesis underpins embodied AI, robotic manipulation, and simulation-based policy evaluation, where a useful scene must specify not only what the environment looks like, but also how its objects are structured. Existing pipelines, however, typically represent generated content as static meshes and inherit articulation only from curated asset libraries, which limits object-level controllability and prevents new interactable assets from being produced on demand. We address this gap by formulating physically interactable indoor scene synthesis as programmatic world generation, and present SceneCode, a framework that compiles a natural language prompt into an executable, code-driven indoor world rather than a collection of opaque meshes. A room-level agentic backbone first turns the prompt into a structured house layout and emits per-object AssetRequests through a planner--designer--critic loop. Each request is then routed to one of five code-generation strategies and converted into a synthesized part-wise Blender Python programs that are validated through an execution-guided repair-and-refine loop. The resulting programs are compiled into simulation-ready assets, and exported as SDF for physics simulation. A persistent scene-state registry links object requests, executable programs, rendered geometry, and simulation assets, turning scene assembly into a traceable and locally editable world-building process. We evaluate SceneCode across scene-level synthesis, object-level asset quality, human judgment, and downstream robot interaction. Results show that executable world programs improve prompt-faithful indoor scene generation and produce assets with cleaner mesh structure, and simulator-loadable articulation metadata. Project page: https://scene-code.github.io/.', 'score': 0, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': 'a4e08b98b72c224f', 'authors': ['Puyi Wang', 'Yuhao Wang', 'Linjie Li', 'Zhengyuan Yang', 'Kevin Qinghong Lin', 'Yangguang Li', 'Yu Cheng'], 'affiliations': ['Microsoft', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.19587.jpg', 'data': {'categories': ['#games', '#multimodal', '#3d', '#robotics', '#agents'], 'emoji': '🏗️', 'ru': {'title': 'Программируемое генерирование сцен через компиляцию естественного языка в исполняемый код', 'desc': 'SceneCode — это система для создания интерактивных виртуальных сцен на основе естественного языка, которая генерирует исполняемый код вместо статических 3D-моделей. Система использует агентный подход для преобразования текстового описания в структурированный макет помещения и запросы к объектам, которые затем обрабатываются различными стратегиями генерации кода. Каждый сгенерированный объект проходит итеративное улучшение через цикл исправления и валидации, что позволяет создавать физически корректные и готовые к симуляции активы. Результаты показывают, что кодовый подход улучшает качество сцен, создаёт чистую геометрию и артикуляционные данные для роботических симуляций.'}, 'en': {'title': 'Transforming Language into Interactive Indoor Worlds', 'desc': 'SceneCode is a framework that transforms natural language descriptions into executable code for generating interactive indoor environments. It addresses the limitations of traditional methods that produce static meshes by allowing for dynamic, programmatic world generation. The system uses a structured approach to create room layouts and object requests, which are then processed through various code-generation strategies. This results in simulation-ready assets that enhance the controllability and interactivity of generated scenes, making them suitable for applications in embodied AI and robotics.'}, 'zh': {'title': '通过自然语言生成可编程室内场景', 'desc': 'SceneCode 是一个可以通过自然语言提示生成可编程室内场景的框架。它将提示转换为可执行的代码，从而创建互动的、适合模拟的环境，并具有结构化的物体表示。与传统方法不同，SceneCode 允许在对象级别进行更高的可控性，并支持按需生成新的可交互资产。通过这种方式，SceneCode 使得室内场景合成变得更加灵活和高效，适用于机器人操作和政策评估等应用。'}}}, {'id': 'https://huggingface.co/papers/2605.20104', 'title': 'Draft Less, Retrieve More: Hybrid Tree Construction for Speculative Decoding', 'url': 'https://huggingface.co/papers/2605.20104', 'abstract': "Abstract Graft is a training-free framework that enhances speculative decoding by dynamically combining pruning and retrieval operations to improve acceptance rates and inference speed without sacrificing accuracy.  AI-generated summary Speculative decoding (SD) accelerates large language model inference by leveraging a draft-then-verify paradigm. To maximize the acceptance rate, recent methods construct expansive draft trees, which unfortunately incur severe VRAM bandwidth and computational overheads that bottleneck end-to-end speedups. While dynamic-depth pruning can reduce this latency by removing marginal branches, it also discards potentially valid candidates, preventing the acceptance rate from reaching the upper bound of dense trees. In this paper, we identify a critical opportunity in resource allocation: the transition from dense to pruned drafting frees up significant computational budget. To break this Pareto tradeoff, we introduce Graft, a compensation framework that couples pruning and retrieval as mutually reinforcing operations. Pruning supplies sufficient budget for retrieval, while retrieval compensates for pruning-induced coverage loss and recovers accepted length. By employing a sequential `prune-then-graft' mechanism, Graft attaches highly predictive retrieved tokens into positions opened by pruning, filling the topological gaps with near-zero overhead. Graft is entirely training-free and lossless. Comprehensive evaluations show that Graft establishes a new Pareto frontier across practical deployment settings, including short-context generation, long-context generation, and large-scale models. On short-context benchmarks, it achieves up to 5.41times speedup and improves average speedup over EAGLE-3 by up to 21.8% on the large-scale Qwen3-235B. We also provide a preliminary exploration of applying Graft to the DFlash-style block drafting paradigm, offering initial evidence and insights for extending grafting beyond autoregressive draft trees.", 'score': 0, 'issue_id': 2271, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '05c605b2c2a2d6c0', 'authors': ['Yuhao Shen', 'Tianyu Liu', 'Xinyi Hu', 'Quan Kong', 'Baolin Zhang', 'Jun Dai', 'Jun Zhang', 'Shuang Ge', 'Lei Chen', 'Yue Li', 'Mingcheng Wan', 'Cong Wang'], 'affiliations': ['Qwen Applications Business Group of Alibaba', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.20104.jpg', 'data': {'categories': ['#open_source', '#long_context', '#rag', '#optimization', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Компенсированная обрезка: возвращаем скорость без потерь качества', 'desc': 'Graft — это framework без обучения, который улучшает спекулятивное декодирование путём динамического сочетания операций обрезки и поиска похожих примеров. Метод решает проблему компромисса между скоростью и качеством: обрезка уменьшает вычислительные затраты, но может отбросить валидные кандидаты, а поиск восполняет потери покрытия, добавляя высокопредсказуемые токены в места, освобождённые обрезкой. Фреймворк полностью не требует переобучения модели и гарантирует сохранение качества вывода. Экспериментальные результаты показывают ускорение до 5.41 раз на коротких последовательностях и улучшение на 21.8% по сравнению с EAGLE-3 на моделях масштаба 235B.'}, 'en': {'title': 'Graft: Speeding Up Language Models with Smart Pruning and Retrieval', 'desc': "Graft is a novel framework designed to enhance speculative decoding in large language models by integrating pruning and retrieval techniques. It addresses the challenge of balancing speed and accuracy by dynamically adjusting resource allocation, allowing for faster inference without losing the quality of generated outputs. By using a 'prune-then-graft' approach, Graft effectively fills gaps left by pruning with high-quality retrieved tokens, thus maintaining a high acceptance rate. The framework is training-free and demonstrates significant performance improvements, achieving up to 5.41 times speedup in short-context generation tasks compared to existing methods."}, 'zh': {'title': 'Graft：提升推测解码的新方法', 'desc': 'Graft是一种无需训练的框架，通过动态结合剪枝和检索操作来增强推测解码，旨在提高接受率和推理速度，同时不牺牲准确性。推测解码利用草稿-验证的模式加速大型语言模型的推理，但传统方法构建的庞大草稿树会导致显著的带宽和计算开销。Graft通过剪枝释放计算预算，并通过检索弥补剪枝带来的覆盖损失，从而打破了传统的权衡。综合评估表明，Graft在短上下文生成和大规模模型等实际应用中建立了新的性能边界。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment (2)', '#architecture (3)', '#audio (1)', '#benchmark (6)', '#cv', '#data (1)', '#dataset (4)', '#diffusion (2)', '#ethics', '#games (2)', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (3)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource (1)', '#machine_translation (1)', '#math (2)', '#multilingual (1)', '#multimodal (5)', '#open_source (7)', '#optimization (7)', '#plp (1)', '#rag (1)', '#reasoning (5)', '#rl (1)', '#rlhf (3)', '#robotics (1)', '#science (1)', '#security', '#small_models (3)', '#story_generation (1)', '#survey', '#synthetic (1)', '#training (3)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
