ropose Talker-T2AV, an autoregressive diffusion framework where high-level cross-modal modeling occurs in a shared backbone, while low-level refinement uses modality-specific decoders. A shared autoregressive language model jointly reasons over audio and video in a unified patch-level token space. Two lightweight diffusion transformer heads decode the hidden states into frame-level audio and video latents. Experiments on talking portrait benchmarks show Talker-T2AV outperforms dual-branch baselines in lip-sync accuracy, video quality, and audio quality, achieving stronger cross-modal consistency than cascaded pipelines.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'ce2e4abe7d04235f', 'authors': ['Zhen Ye', 'Xu Tan', 'Aoxiong Yin', 'Hongzhan Lin', 'Guangyan Zhang', 'Peiwen Sun', 'Yiming Li', 'Chi-Min Chan', 'Wei Ye', 'Shikun Zhang', 'Wei Xue'], 'affiliations': ['Hong Kong University of Science and Technology', 'Independent Researcher', 'National University of Singapore', 'Peking University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23586.jpg', 'data': {'categories': ['#video', '#multimodal', '#architecture', '#diffusion', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Раздельная обработка смысла и деталей для синтеза говорящей головы', 'desc': 'Talker-T2AV представляет новый подход к синтезу говорящего лица, использующий диффузионную модель с разделением задач между высокоуровневым кросс-модальным рассуждением и низкоуровневой модально-специфичной обработкой. Авторы показывают, что совместная генерация аудио и видео эффективнее каскадных методов, но существующие модели создают избыточное переплетение модальностей через механизм внимания на всех уровнях. Предложенная архитектура использует общий автарегрессивный языковой трансформер для семантического выравнивания аудио и видео, а специализированные диффузионные декодеры независимо синтезируют аудиосигнал и видеоконтент. Экспериментальные результаты демонстрируют превосходство метода по синхронизации губ, качеству видео и аудио в сравнении с существующими подходами.'}, 'en': {'title': 'Enhancing Talking Head Synthesis with Autoregressive Diffusion', 'desc': 'Talker-T2AV introduces a new method for creating talking head videos by using an autoregressive diffusion framework. This approach separates the high-level reasoning about audio and video from the detailed adjustments needed for each modality, which helps improve lip-sync accuracy and consistency between audio and video. Unlike previous models that mix these processes too closely, Talker-T2AV uses a shared backbone for high-level features while employing specific decoders for audio and video details. The results show that this method outperforms existing models in generating more coherent and high-quality talking head videos.'}, 'zh': {'title': 'Talker-T2AV：提升说话者合成的跨模态一致性', 'desc': 'Talker-T2AV提出了一种自回归扩散框架，用于合成说话者的头部图像，能够将高层次的跨模态推理与低层次的特定模态细化分开，从而提高了嘴唇同步的准确性和跨模态的一致性。现有的模型在去噪过程中通过广泛的注意力机制将模态耦合在一起，这种方式在处理高层语义和低层细节时并不理想。Talker-T2AV通过共享的主干网络进行高层次的跨模态建模，而低层次的细化则使用特定模态的解码器，从而避免了不必要的耦合，提高了效率。实验结果表明，Talker-T2AV在嘴唇同步准确性、视频质量和音频质量方面均优于双分支基线，展现出比级联管道更强的跨模态一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.23195', 'title': 'AnalogRetriever: Learning Cross-Modal Representations for Analog Circuit Retrieval', 'url': 'https://huggingface.co/papers/2604.23195', 'abstract': 'Abstract AnalogRetriever is a unified tri-modal retrieval framework that enhances analog circuit design by encoding schematics, descriptions, and netlists into a shared embedding space using vision-language models and graph convolutional networks.  AI-generated summary Analog circuit design relies heavily on reusing existing intellectual property (IP), yet searching across heterogeneous representations such as SPICE netlists, schematics, and functional descriptions remains challenging. Existing methods are largely limited to exact matching within a single modality, failing to capture cross-modal semantic relationships. To bridge this gap, we present AnalogRetriever, a unified tri-modal retrieval framework for analog circuit search. We first build a high-quality dataset on top of Masala-CHAI through a two-stage repair pipeline that raises the netlist compile rate from 22\\% to 100\\%. Built on this foundation, AnalogRetriever encodes schematics and descriptions with a vision-language model and netlists with a port-aware relational graph convolutional network, mapping all three modalities into a shared embedding space via curriculum contrastive learning. Experiments show that AnalogRetriever achieves an average Recall@1 of 75.2\\% across all six cross-modal retrieval directions, significantly outperforming existing baselines. When integrated into the AnalogCoder agentic framework as a retrieval-augmented generation module, it consistently improves functional pass rates and enables previously unsolved tasks to be completed. Our code and dataset will be released.', 'score': 1, 'issue_id': 2127, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '2ac83cf7818a96c9', 'authors': ['Yihan Wang', 'Lei Li', 'Yao Lai', 'Jing Wang', 'Yan Lu'], 'affiliations': ['Nanjing University of Posts and Telecommunications', 'The University of Hong Kong', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.23195.jpg', 'data': {'categories': ['#dataset', '#agents', '#rag', '#multimodal'], 'emoji': '🔌', 'ru': {'title': 'Кросс-модальный поиск аналоговых схем через мультимодальные встраивания', 'desc': 'AnalogRetriever представляет собой унифицированную фреймворк для поиска аналоговых схем, которая кодирует принципиальные схемы, текстовые описания и сетевые списки в общее пространство встраиваний. Система использует vision-language модели для обработки визуальной информации и графовые свёрточные сети для анализа топологии цепей. Обучение проводится с применением curriculum contrastive learning, что позволяет модели найти семантические связи между разными модальностями данных. Фреймворк достигает высокую точность поиска (75.2% Recall@1) и улучшает производительность когда интегрируется в генеративные системы с извлечением контекста.'}, 'en': {'title': 'Bridging Modalities for Enhanced Analog Circuit Retrieval', 'desc': 'AnalogRetriever is a tri-modal retrieval framework designed to improve analog circuit design by integrating different types of data such as schematics, descriptions, and netlists into a common embedding space. It utilizes advanced techniques like vision-language models and graph convolutional networks to effectively encode these diverse representations. The framework addresses the limitations of existing methods that only perform exact matching within a single modality, enabling better cross-modal semantic understanding. Experimental results demonstrate that AnalogRetriever significantly enhances retrieval performance and functional pass rates when used in conjunction with the AnalogCoder framework.'}, 'zh': {'title': '统一三模态检索，提升模拟电路设计', 'desc': 'AnalogRetriever 是一个统一的三模态检索框架，旨在通过使用视觉语言模型和图卷积网络，将电路图、描述和网表编码到共享的嵌入空间中，从而增强模拟电路设计。该框架解决了在不同表示（如 SPICE 网表、电路图和功能描述）之间进行检索的挑战，克服了现有方法仅限于单一模态的精确匹配的问题。通过构建高质量的数据集并采用课程对比学习，AnalogRetriever 能够有效地捕捉跨模态的语义关系。实验结果表明，该框架在六个跨模态检索方向上平均 Recall@1 达到 75.2%，显著优于现有基线。'}}}, {'id': 'https://huggingface.co/papers/2604.21984', 'title': 'Soft Anisotropic Diagrams for Differentiable Image Representation', 'url': 'https://huggingface.co/papers/2604.21984', 'abstract': 'Abstract  We introduce Soft Anisotropic Diagrams (SAD), an explicit and differentiable image representation parameterized by a set of adaptive sites in the image plane. In SAD, each site specifies an anisotropic metric and an additively weighted distance score, and we compute pixel colors as a softmax blend over a small per-pixel top-K subset of sites. We induce a soft anisotropic additively weighted Voronoi partition (i.e., an Apollonius diagram) with learnable per-site temperatures, preserving informative gradients while allowing clear, content-aligned boundaries and explicit ownership. Such a formulation enables efficient rendering by maintaining a per-query top-K map that approximates nearest neighbors under the same shading score, allowing GPU-friendly, fixed-size local computation. We update this list using our top-K propagation scheme inspired by jump flooding, augmented with stochastic injection to provide probabilistic global coverage. Training follows a GPU-first pipeline with gradient-weighted initialization, Adam optimization, and adaptive budget control through densification and pruning. Across standard benchmarks, SAD consistently outperforms Image-GS and Instant-NGP at matched bitrate. On Kodak, SAD reaches 46.0 dB PSNR with 2.2 s encoding time (vs. 28 s for Image-GS), and delivers 4-19 times end-to-end training speedups over state-of-the-art baselines. We demonstrate the effectiveness of SAD by showcasing the seamless integration with differentiable pipelines for forward and inverse problems, efficiency of fast random access, and compact storage.', 'score': 0, 'issue_id': 2135, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '105144f5c1d1a3c8', 'authors': ['Laki Iinbor', 'Zhiyang Dou', 'Wojciech Matusik'], 'affiliations': ['Independent Researcher', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2604.21984.jpg', 'data': {'categories': ['#architecture', '#cv', '#training'], 'emoji': '🎨', 'ru': {'title': 'Быстрое и эффективное представление изображений через обучаемые геометрические диаграммы', 'desc': 'В статье предлагается Soft Anisotropic Diagrams (SAD) — явное и дифференцируемое представление изображений, параметризованное адаптивными точками на плоскости изображения. Каждая точка определяет анизотропную метрику и взвешенную оценку расстояния, при этом цвет пикселя вычисляется как мягкий blend топ-K ближайших точек для каждого пикселя. Метод индуцирует мягкую взвешенную диаграмму Аполлония с обучаемыми температурами, сохраняя информативные градиенты и позволяя четкие границы, выровненные по содержанию. Подход обеспечивает эффективный рендеринг через GPU-дружественные локальные вычисления с фиксированным размером и демонстрирует значительные ускорения обучения и улучшенное качество по сравнению с современными методами типа Image-GS и Instant-NGP.'}, 'en': {'title': 'Revolutionizing Image Representation with Soft Anisotropic Diagrams', 'desc': 'The paper presents Soft Anisotropic Diagrams (SAD), a new image representation method that uses adaptive sites to create a flexible and differentiable model. Each site in SAD defines a unique distance metric and contributes to pixel color through a softmax blend of the nearest sites. This approach allows for efficient rendering and clear image boundaries while maintaining informative gradients, making it suitable for GPU computation. The results show that SAD significantly improves performance on standard benchmarks, achieving higher PSNR and faster encoding times compared to existing methods.'}, 'zh': {'title': '软各向异性图：高效图像表示的新方法', 'desc': '本文介绍了一种新的图像表示方法，称为软各向异性图（SAD），它通过一组自适应的点在图像平面上进行参数化。SAD使用每个点指定各向异性度量和加权距离分数，并通过对每个像素的前K个点进行softmax混合来计算像素颜色。该方法通过可学习的每个点温度生成软各向异性加权Voronoi划分，保持信息梯度的同时允许清晰的内容对齐边界。实验结果表明，SAD在标准基准测试中表现优于现有方法，具有更快的编码速度和更高的图像质量。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (4)', '#agi', '#alignment (2)', '#architecture (5)', '#audio (2)', '#benchmark (3)', '#cv (2)', '#data', '#dataset (2)', '#diffusion (4)', '#ethics', '#games (1)', '#graphs', '#hallucinations (1)', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context', '#low_resource (1)', '#machine_translation', '#math', '#multilingual (2)', '#multimodal (9)', '#open_source (5)', '#optimization (4)', '#plp (1)', '#rag (1)', '#reasoning (1)', '#rl (3)', '#rlhf (3)', '#robotics (2)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic (2)', '#training (8)', '#transfer_learning (2)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);

                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-04 22:05',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-04 22:05')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-04 22:05')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
