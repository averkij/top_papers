    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.26752', 'title': 'GLM-5V-Turbo: Toward a Native Foundation Model for Multimodal Agents', 'url': 'https://huggingface.co/papers/2604.26752', 'abstract': 'Abstract GLM-5V-Turbo integrates multimodal perception as a core reasoning component for agentic tasks, demonstrating strong performance in multimodal coding and visual tool use while maintaining text-only capabilities.  AI-generated summary We present GLM-5V-Turbo, a step toward native foundation models for multimodal agents. As foundation models are increasingly deployed in real environments, agentic capability depends not only on language reasoning, but also on the ability to perceive, interpret, and act over heterogeneous contexts such as images, videos, webpages, documents, GUIs. GLM-5V-Turbo is built around this objective: multimodal perception is integrated as a core component of reasoning, planning, tool use, and execution, rather than as an auxiliary interface to a language model. This report summarizes the main improvements behind GLM-5V-Turbo across model design, multimodal training, reinforcement learning, toolchain expansion, and integration with agent frameworks. These developments lead to strong performance in multimodal coding, visual tool use, and framework-based agentic tasks, while preserving competitive text-only coding capability. More importantly, our development process offers practical insights for building multimodal agents, highlighting the central role of multimodal perception, hierarchical optimization, and reliable end-to-end verification.', 'score': 70, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '9162bb9fcedc73c3', 'authors': ['GLM-V Team', ':', 'Wenyi Hong', 'Xiaotao Gu', 'Ziyang Pan', 'Zhen Yang', 'Yuting Wang', 'Yue Wang', 'Yuanchang Yue', 'Yu Wang', 'Yanling Wang', 'Yan Wang', 'Xijun Liu', 'Wenmeng Yu', 'Weihan Wang', 'Wei Li', 'Shuaiqi Duan', 'Sheng Yang', 'Ruiliang Lv', 'Mingdao Liu', 'Lihang Pan', 'Ke Ning', 'Junhui Ji', 'Jinjiang Wang', 'Jing Chen', 'Jiazheng Xu', 'Jiale Zhu', 'Jiale Cheng', 'Ji Qi', 'Guobing Gan', 'Guo Wang', 'Cong Yao', 'Zijun Dou', 'Zihao Zhou', 'Zihan Wang', 'Zhiqi Ge', 'Zhijie Li', 'Zhenyu Hou', 'Zhao Xue', 'Zehui Wang', 'Zehai He', 'Yusen Liu', 'Yukuo Cen', 'Yuchen Li', 'Yuan Wang', 'Yijian Lu', 'Yanzi Wang', 'Yadong Xue', 'Xinyu Zhang', 'Xinyu Liu', 'Wenkai Li', 'Tianyu Tong', 'Tianshu Zhang', 'Shengdong Yan', 'Qinkai Zheng', 'Mingde Xu', 'Licheng Bao', 'Jiaxing Xu', 'Jiaxin Fan', 'Jiawen Qian', 'Jiali Chen', 'Jiahui Lin', 'Haozhi Zheng', 'Haoran Wang', 'Haochen Li', 'Fan Yang', 'Dan Zhang', 'Chuangxin Zhao', 'Chengcheng Wu', 'Boyan Shi', 'Bowei Jia', 'Baoxu Wang', 'Peng Zhang', 'Debing Liu', 'Bin Xu', 'Juanzi Li', 'Minlie Huang', 'Yuxiao Dong', 'Jie Tang'], 'affiliations': ['Tsinghua University', 'Z.ai'], 'pdf_title_img': 'assets/pdf/title_img/2604.26752.jpg', 'data': {'categories': ['#rl', '#training', '#multimodal', '#agents', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Восприятие как ядро мультимодального рассуждения в агентных системах', 'desc': 'GLM-5V-Turbo представляет собой фундаментальную модель, которая интегрирует мультимодальное восприятие как основной компонент рассуждения для агентных систем. Модель обрабатывает разнородные контексты включая изображения, видео, веб-страницы и графические интерфейсы, используя их непосредственно в процессе планирования и выполнения задач. Разработка включала оптимизацию архитектуры модели, мультимодальное обучение, применение reinforcement learning и расширение инструментария для работы с различными модальностями. Модель демонстрирует сильные результаты в мультимодальном программировании и использовании визуальных инструментов, сохраняя при этом конкурентные способности в работе с текстом.'}, 'en': {'title': 'Empowering AI with Multimodal Perception for Enhanced Agentic Tasks', 'desc': 'GLM-5V-Turbo is a new model designed to enhance the capabilities of AI agents by integrating multimodal perception directly into their reasoning processes. This means that the model can understand and act on different types of information, like text, images, and videos, rather than just relying on language alone. The paper discusses improvements in model design, training methods, and how the model can effectively use tools in various contexts. Overall, GLM-5V-Turbo shows strong performance in tasks that require understanding multiple types of data while still being effective in text-only scenarios.'}, 'zh': {'title': '多模态智能体的未来：GLM-5V-Turbo', 'desc': 'GLM-5V-Turbo 是一种新型的多模态基础模型，旨在提升智能体在多种环境中的表现。它将多模态感知作为核心推理组件，能够处理图像、视频和文本等多种信息形式。通过改进模型设计和多模态训练，GLM-5V-Turbo 在视觉工具使用和多模态编码方面表现出色，同时保持了文本处理能力。该研究为构建多模态智能体提供了实用的见解，强调了多模态感知和可靠的端到端验证的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.24927', 'title': 'Large Language Models Explore by Latent Distilling', 'url': 'https://huggingface.co/papers/2604.24927', 'abstract': "Abstract Exploratory Sampling enhances LLM generation diversity by using a lightweight distiller to predict hidden representations and bias decoding toward novel semantic patterns.  AI-generated summary Generating diverse responses is crucial for test-time scaling of large language models (LLMs), yet standard stochastic sampling mostly yields surface-level lexical variation, limiting semantic exploration. In this paper, we propose Exploratory Sampling (ESamp), a decoding approach that explicitly encourages semantic diversity during generation. ESamp is motivated by the well-known observation that neural networks tend to make lower-error predictions on inputs similar to those encountered before, and incur higher prediction error on novel ones. Building on this property, we train a lightweight Distiller at test time to predict deep-layer hidden representations of the LLM from its shallow-layer representations to model the LLM's depth-wise representation transitions. During decoding, the Distiller continuously adapts to the mappings induced by the current generation context. ESamp uses the prediction error as a novelty signal to reweight candidate token extensions conditioned on the current prefix, thereby biasing decoding toward less-explored semantic patterns. ESamp is implemented with an asynchronous training--inference pipeline, with less than 5% worst case overhead (1.2% in the optimized release). Empirical results show that ESamp significantly boosts the Pass@k efficiency of reasoning models, showing superior or comparable performance to strong stochastic and heuristic baselines. Notably, ESamp achieves robust generalization across mathematics, science, and code generation benchmarks and breaks the trade-off between diversity and coherence in creative writing. Our code has released at: https://github.com/LinesHogan/tLLM.", 'score': 47, 'issue_id': 2094, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '64be93a6999d76e7', 'authors': ['Yuanhao Zeng', 'Ao Lu', 'Lufei Li', 'Zheng Zhang', 'Yexin Li', 'Kan Ren'], 'affiliations': ['School of Information Science and Technology, ShanghaiTech University, Shanghai, China', 'State Key Laboratory of General Artificial Intelligence, BIGAI, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.24927.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Исследовательская выборка: побеждая стереотипные ответы через предсказание семантической новизны', 'desc': 'В статье предлагается метод Exploratory Sampling для повышения разнообразия генерируемого текста большими языковыми моделями на этапе декодирования. Авторы обучают легкий дистиллятор предсказывать скрытые представления из глубоких слоев нейросети по представлениям из поверхностных слоев, используя ошибку предсказания как сигнал новизны. Во время генерации метод перевешивает вероятности токенов в сторону менее изученных семантических паттернов, избегая поверхностного лексического варьирования. Экспериментальные результаты показывают значительное улучшение эффективности на задачах рассуждения, математики, науки и генерации кода при минимальных вычислительных затратах.'}, 'en': {'title': 'Boosting Diversity in LLMs with Exploratory Sampling', 'desc': 'This paper introduces Exploratory Sampling (ESamp), a novel decoding method designed to enhance the diversity of responses generated by large language models (LLMs). By utilizing a lightweight distiller, ESamp predicts hidden representations and adjusts the decoding process to favor novel semantic patterns over common ones. The approach leverages the observation that LLMs perform better on familiar inputs, thus encouraging exploration of less common outputs during generation. Empirical results demonstrate that ESamp improves reasoning model efficiency and maintains coherence in creative writing, outperforming traditional sampling methods.'}, 'zh': {'title': '探索性采样：提升生成多样性的创新方法', 'desc': '本论文提出了一种名为探索性采样（Exploratory Sampling, ESamp）的方法，旨在提高大型语言模型（LLM）生成的多样性。通过使用轻量级的蒸馏器，ESamp能够预测隐藏表示，并在解码过程中引导生成朝向新颖的语义模式。该方法利用神经网络在处理新输入时的高预测误差，来调整候选词的扩展权重，从而鼓励语义多样性。实验结果表明，ESamp在推理模型的效率上显著提升，并在数学、科学和代码生成等基准测试中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2604.26951', 'title': 'Turning the TIDE: Cross-Architecture Distillation for Diffusion Large Language Models', 'url': 'https://huggingface.co/papers/2604.26951', 'abstract': "Abstract Researchers developed TIDE, a framework for cross-architecture distillation of diffusion large language models that improves performance through specialized modules for distillation strength modulation, context enrichment, and cross-tokenizer objectives.  AI-generated summary Diffusion large language models (dLLMs) offer parallel decoding and bidirectional context, but state-of-the-art dLLMs require billions of parameters for competitive performance. While existing distillation methods for dLLMs reduce inference steps within a single architecture, none address cross-architecture knowledge transfer, in which the teacher and student differ in architecture, attention mechanism, and tokenizer. We present TIDE, the first framework for cross-architecture dLLM distillation, comprising three modular components: (1) TIDAL, which jointly modulates distillation strength across training progress and diffusion timestep to account for the teacher's noise-dependent reliability; (2) CompDemo, which enriches the teacher's context via complementary mask splitting to improve predictions under heavy masking; and (3) Reverse CALM, a cross-tokenizer objective that inverts chunk-level likelihood matching, yielding bounded gradients and dual-end noise filtering. Distilling 8B dense and 16B MoE teachers into a 0.6B student via two heterogeneous pipelines outperforms the baseline by an average of 1.53 points across eight benchmarks, yielding notable gains in code generation, where HumanEval scores reach 48.78 compared to 32.3 for the AR baseline.", 'score': 35, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '6530301864065d23', 'authors': ['Gongbo Zhang', 'Wen Wang', 'Ye Tian', 'Li Yuan'], 'affiliations': ['Peking University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.26951.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#optimization', '#small_models', '#diffusion', '#benchmark', '#plp'], 'emoji': '🧬', 'ru': {'title': 'Трансархитектурная дистилляция диффузионных моделей через адаптивную модуляцию знаний', 'desc': 'Researchers разработали TIDE, фреймворк для дистилляции диффузионных больших языковых моделей между разными архитектурами. Фреймворк включает три ключевых компонента: модуль TIDAL для адаптивной модуляции силы дистилляции в зависимости от надежности учителя на разных шумовых уровнях, компонент CompDemo для обогащения контекста через разделение маски, и Reverse CALM для кросс-токенайзерной целевой функции с градиентной стабилизацией. Метод позволяет эффективно передавать знания от крупного учителя (8B и 16B параметров) к компактному студенту (0.6B параметров), достигая значительного прироста производительности на бенчмарках, особенно в генерации кода.'}, 'en': {'title': 'TIDE: Bridging Architectures for Enhanced Language Model Distillation', 'desc': 'The paper introduces TIDE, a novel framework designed for cross-architecture distillation of diffusion large language models (dLLMs). It enhances model performance by incorporating specialized modules that adjust the strength of distillation, enrich the context provided by the teacher model, and implement cross-tokenizer objectives. Unlike traditional methods that focus on single architecture distillation, TIDE facilitates knowledge transfer between models with different architectures and tokenizers. The results demonstrate that TIDE significantly improves the performance of smaller student models, particularly in tasks like code generation, achieving higher scores on benchmark tests.'}, 'zh': {'title': '跨架构蒸馏的创新框架TIDE', 'desc': '研究人员开发了TIDE框架，用于跨架构的扩散大语言模型（dLLM）蒸馏。该框架通过专门的模块来调节蒸馏强度、丰富上下文和实现跨分词器目标，从而提高性能。TIDE包含三个模块：TIDAL、CompDemo和Reverse CALM，分别用于调节蒸馏强度、增强教师模型的上下文和实现跨分词器的目标匹配。通过将8B和16B的教师模型蒸馏到0.6B的学生模型，TIDE在八个基准测试中平均提高了1.53分，尤其在代码生成任务中表现突出。'}}}, {'id': 'https://huggingface.co/papers/2604.26904', 'title': 'ClawGym: A Scalable Framework for Building Effective Claw Agents', 'url': 'https://huggingface.co/papers/2604.26904', 'abstract': 'Abstract ClawGym presents a scalable framework for developing Claw-style personal agents with synthetic training data, verified workspaces, and benchmark evaluation.  AI-generated summary Claw-style environments support multi-step workflows over local files, tools, and persistent workspace states. However, scalable development around these environments remains constrained by the absence of a systematic framework, especially one for synthesizing verifiable training data and integrating it with agent training and diagnostic evaluation. To address this challenge, we present ClawGym, a scalable framework that supports the full lifecycle of Claw-style personal agent development. Concretely, we construct ClawGym-SynData, a diverse dataset of 13.5K filtered tasks synthesized from persona-driven intents and skill-grounded operations, paired with realistic mock workspaces and hybrid verification mechanisms. We then train a family of capable Claw-style models, termed ClawGym-Agents, through supervised fine-tuning on black-box rollout trajectories, and further explore reinforcement learning via a lightweight pipeline that parallelizes rollouts across per-task sandboxes.To support reliable evaluation, we further construct ClawGym-Bench, a benchmark of 200 instances calibrated through automated filtering and human-LLM review. Relevant resources will be soon released at https://github.com/ClawGym.', 'score': 34, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '7bf11ab7c7c33d16', 'authors': ['Fei Bai', 'Huatong Song', 'Shuang Sun', 'Daixuan Cheng', 'Yike Yang', 'Chuan Hao', 'Renyuan Li', 'Feng Chang', 'Yuan Wei', 'Ran Tao', 'Bryan Dai', 'Jian Yang', 'Wayne Xin Zhao'], 'affiliations': ['Beihang University', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'IQuest Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.26904.jpg', 'data': {'categories': ['#rl', '#training', '#agents', '#dataset', '#benchmark'], 'emoji': '🦾', 'ru': {'title': 'Полный конвейер развития персональных агентов: от синтеза данных к масштабируемому обучению', 'desc': 'В статье представлена ClawGym — масштабируемая платформа для разработки персональных агентов, способных выполнять многошаговые задачи с локальными файлами и инструментами. Авторы создали синтетический датасет из 13,5K задач, сгенерированных на основе пользовательских интентов и операций, с реалистичными тестовыми окружениями и гибридными механизмами верификации. Модели обучались методом supervised fine-tuning на траекториях rollout и методами reinforcement learning с параллелизацией эксперимен. Для надежной оценки разработана специализированная бенчмарк-система ClawGym-Bench из 200 примеров, отфильтрованных автоматически и проверенных человеком и LLM.'}, 'en': {'title': 'Empowering Personal Agents with ClawGym Framework', 'desc': 'ClawGym is a comprehensive framework designed for creating personal agents that operate in Claw-style environments using synthetic training data. It addresses the challenges of developing these agents by providing a systematic approach to generate verifiable training datasets and integrating them into the training and evaluation processes. The framework includes ClawGym-SynData, a dataset with 13.5K tasks based on user intents and skills, and ClawGym-Agents, a series of models trained through supervised learning and reinforcement learning techniques. Additionally, ClawGym-Bench offers a benchmark for evaluating agent performance with 200 curated instances, ensuring reliable assessments of agent capabilities.'}, 'zh': {'title': 'ClawGym：智能体开发的新框架', 'desc': 'ClawGym是一个可扩展的框架，用于开发Claw风格的个人智能体，利用合成训练数据、经过验证的工作空间和基准评估。该框架支持多步骤工作流程，能够处理本地文件、工具和持久工作空间状态。为了克服缺乏系统性框架的挑战，ClawGym提供了一个完整的个人智能体开发生命周期支持。我们构建了ClawGym-SynData数据集，包含13500个经过筛选的任务，并训练了ClawGym-Agents模型，进一步探索了强化学习。'}}}, {'id': 'https://huggingface.co/papers/2604.26067', 'title': 'RADIO-ViPE: Online Tightly Coupled Multi-Modal Fusion for Open-Vocabulary Semantic SLAM in Dynamic Environments', 'url': 'https://huggingface.co/papers/2604.26067', 'abstract': 'Abstract RADIO-ViPE is an online semantic SLAM system that provides geometry-aware open-vocabulary grounding using raw monocular RGB video without requiring calibrated inputs or depth sensors.  AI-generated summary We present RADIO-ViPE (Reduce All Domains Into One -- Video Pose Engine), an online semantic SLAM system that enables geometry-aware open-vocabulary grounding, associating arbitrary natural language queries with localized 3D regions and objects in dynamic environments. Unlike existing approaches that require calibrated, posed RGB-D input, RADIO-ViPE operates directly on raw monocular RGB video streams, requiring no prior camera intrinsics, depth sensors, or pose initialization. The system tightly couples multi-modal embeddings -- spanning vision and language -- derived from agglomerative foundation models (e.g., RADIO) with geometric scene information. This coupling takes place in initialization, optimization and factor graph connections to improve the consistency of the map from multiple modalities. The optimization is wrapped within adaptive robust kernels, designed to handle both actively moving objects and agent-displaced scene elements (e.g., furniture rearranged during ego-centric session). Experiments demonstrate that RADIO-ViPE achieves state-of-the-art results on the dynamic TUM-RGBD benchmark while maintaining competitive performance against offline open-vocabulary methods that rely on calibrated data and static scene assumptions. RADIO-ViPE bridges a critical gap in real-world deployment, enabling robust open-vocabulary semantic grounding for autonomous robotics and unconstrained in-the-wild video streams. Project page: https://be2rlab.github.io/radio_vipe', 'score': 29, 'issue_id': 2096, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '2900b11579436ae7', 'authors': ['Zaid Nasser', 'Mikhail Iumanov', 'Tianhao Li', 'Maxim Popov', 'Jaafar Mahmoud', 'Sergey Kolyubin'], 'affiliations': ['Skolkovo Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.26067.jpg', 'data': {'categories': ['#robotics', '#3d', '#multimodal', '#video'], 'emoji': '🎥', 'ru': {'title': 'Семантическое понимание сцены из монокулярного видео без датчиков глубины', 'desc': 'RADIO-ViPE — это онлайн-система семантической SLAM, которая позволяет связывать естественные языковые запросы с трёхмерными объектами и регионами сцены, используя только сырой монокулярный RGB-видеопоток без необходимости в откалибровочных данных и датчиках глубины. Система объединяет мультимодальные эмбеддинги, полученные из фундаментальных моделей (например, RADIO), с геометрической информацией сцены на этапах инициализации, оптимизации и построения графа факторов. Оптимизация осуществляется с использованием адаптивных устойчивых функций потерь, которые способны обрабатывать движущиеся объекты и изменения в расположении элементов сцены. Экспериментальные результаты показывают, что система достигает лучшей производительности на динамических бенчмарках и открывает возможности для практического применения в робототехнике и обработке видео в условиях реального мира.'}, 'en': {'title': 'Revolutionizing 3D Mapping with Monocular Video!', 'desc': 'RADIO-ViPE is an innovative online semantic SLAM system that allows for open-vocabulary grounding of 3D regions and objects using only raw monocular RGB video. It eliminates the need for calibrated inputs or depth sensors, making it more accessible for real-world applications. The system integrates multi-modal embeddings from vision and language with geometric scene data, enhancing the accuracy of the generated maps. By employing adaptive robust kernels, RADIO-ViPE effectively manages dynamic environments, achieving state-of-the-art performance on benchmark tests while remaining competitive with traditional methods that require more complex setups.'}, 'zh': {'title': 'RADIO-ViPE：无校准视频的开放词汇语义SLAM', 'desc': 'RADIO-ViPE是一种在线语义SLAM系统，能够在动态环境中使用原始单目RGB视频进行几何感知的开放词汇基础。该系统不需要校准输入或深度传感器，直接处理单目视频流，简化了操作流程。通过将视觉和语言的多模态嵌入与几何场景信息紧密结合，RADIO-ViPE在初始化、优化和因子图连接中提高了地图的一致性。实验结果表明，RADIO-ViPE在动态TUM-RGBD基准测试中表现出色，能够为自主机器人和不受限制的视频流提供强大的开放词汇语义基础。'}}}, {'id': 'https://huggingface.co/papers/2604.24351', 'title': 'Diffusion Templates: A Unified Plugin Framework for Controllable Diffusion', 'url': 'https://huggingface.co/papers/2604.24351', 'abstract': 'Abstract Diffusion Templates presents a unified framework that decouples base-model inference from controllable capabilities, enabling modular and composable control methods across various diffusion model applications.  AI-generated summary Controllable diffusion methods have substantially expanded the practical utility of diffusion models, but they are typically developed as isolated, backbone-specific systems with incompatible training pipelines, parameter formats, and runtime hooks. This fragmentation makes it difficult to reuse infrastructure across tasks, transfer capabilities across backbones, or compose multiple controls within a single generation pipeline. We present Diffusion Templates, a unified and open plugin framework that decouples base-model inference from controllable capability injection. The framework is organized around three components: Template models that map arbitrary task-specific inputs to an intermediate capability representation, a Template cache that functions as a standardized interface for capability injection, and a Template pipeline that loads, merges, and injects one or more Template caches into the base diffusion runtime. Because the interface is defined at the systems level rather than tied to a specific control architecture, heterogeneous capability carriers such as KV-Cache and LoRA can be supported under the same abstraction. Based on this design, we build a diverse model zoo spanning structural control, brightness adjustment, color adjustment, image editing, super-resolution, sharpness enhancement, aesthetic alignment, content reference, local inpainting, and age control. These case studies show that Diffusion Templates can unify a broad range of controllable generation tasks while preserving modularity, composability, and practical extensibility across rapidly evolving diffusion backbones. All resources will be open sourced, including code, models, and datasets.', 'score': 5, 'issue_id': 2092, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'ed314aaae75473a8', 'authors': ['Zhongjie Duan', 'Hong Zhang', 'Yingda Chen'], 'affiliations': ['ModelScope Team, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2604.24351.jpg', 'data': {'categories': ['#cv', '#architecture', '#open_source', '#dataset', '#diffusion'], 'emoji': '🧩', 'ru': {'title': 'Унифицированная система модульного управления для диффузионных моделей', 'desc': 'Статья представляет Diffusion Templates — унифицированную систему управления диффузионными моделями, которая отделяет базовый вывод модели от дополнительных способностей управления. Фреймворк состоит из трёх компонентов: Template модели для преобразования входных данных, Template кэш как стандартный интерфейс и Template pipeline для загрузки и инъекции управления. Система поддерживает различные методы хранения параметров, такие как KV-Cache и LoRA, под единой абстракцией. Авторы демонстрируют применение фреймворка на задачах структурного управления, редактирования изображений, суперразрешения и других, показывая модульность и переиспользуемость компонентов.'}, 'en': {'title': 'Unifying Control in Diffusion Models with Templates', 'desc': "Diffusion Templates introduces a new framework that separates the core model's inference from the methods used to control its outputs. This approach allows for greater flexibility and reusability across different diffusion model applications, addressing the issue of incompatible systems. The framework consists of three main components: Template models for task-specific inputs, a Template cache for standardized capability injection, and a Template pipeline for integrating these capabilities into the base model. By supporting various control methods under a unified interface, Diffusion Templates enhances the modularity and extensibility of diffusion models for diverse tasks like image editing and super-resolution."}, 'zh': {'title': '扩散模板：统一可控生成的框架', 'desc': '扩散模板提出了一个统一的框架，将基础模型推理与可控能力解耦，从而实现各种扩散模型应用中的模块化和可组合控制方法。传统的可控扩散方法通常是孤立的，难以在不同任务之间重用基础设施或在单一生成管道中组合多个控制。该框架包括三个组件：模板模型、模板缓存和模板管道，能够支持不同的能力载体。通过这个设计，扩散模板可以统一多种可控生成任务，同时保持模块化、可组合性和实用的可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2604.26779', 'title': 'Accelerating RL Post-Training Rollouts via System-Integrated Speculative Decoding', 'url': 'https://huggingface.co/papers/2604.26779', 'abstract': "Abstract Speculative decoding accelerates RL post-training by preserving output distributions while improving rollout throughput, with projected 2.5x speedup at large scales.  AI-generated summary RL post-training of frontier language models is increasingly bottlenecked by autoregressive rollout generation, making rollout acceleration a central systems challenge. Many existing efficiency methods improve throughput by changing the rollout or optimization regime, for example, through off-policy execution, replay, or lower-precision generation. We study speculative decoding as a lossless acceleration primitive for RL rollouts that preserves the target model's output distribution. We implement speculative decoding in NeMo-RL with a vLLM backend, supporting both synchronous and asynchronous pipelines and enabling speculation during RL rollouts. This benefit is realizable across speculation mechanisms, such as pretrained MTP heads, small external draft models or even techniques such as Eagle3, which are traditionally applied after RL phase. This yields a deployment path for state-of-the-art speculative decoding inside RL training. In a reasoning post-training workload at 8B scale under synchronous RL, speculative decoding improves rollout throughput by 1.8x. Using a high-fidelity performance simulator, we project that combining speculative decoding with asynchronous RL yields up to 2.5x end-to-end training speedup at 235B scale.", 'score': 3, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'dd2de6d3b741b743', 'authors': ['Hayate Iso', 'Tiyasa Mitra', 'Sudipta Mondal', 'Rasoul Shafipour', 'Venmugil Elango', 'Terry Kong', 'Yuki Huang', 'Seonjin Na', 'Izzy Putterman', 'Benjamin Chislett', 'Maor Ashkenazi', 'Joseph Guman', 'Gerald Shen', 'Tugrul Konuk', 'Ashwath Aithal', 'Ritika Borkar', 'Ran Zilberstein', 'Bita Rouhani'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.26779.jpg', 'data': {'categories': ['#rl', '#training', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Спекулятивное декодирование как безопасное ускорение RL обучения языковых моделей', 'desc': 'В этой работе исследуется применение спекулятивного декодирования для ускорения генерации роллаутов в RL обучении больших языковых моделей. Авторы интегрировали спекулятивное декодирование в NeMo-RL, поддерживая синхронные и асинхронные конвейеры обработки, при этом сохраняя распределение выходов целевой модели. Метод совместим с различными механизмами спекуляции, включая предобученные MTP головы и небольшие вспомогательные модели. Реализация демонстрирует ускорение пропускной способности роллаутов в 1.8 раза при масштабе 8B и позволяет спроектировать ускорение 2.5 раза при масштабе 235B за счёт комбинации со асинхронным RL.'}, 'en': {'title': 'Accelerating RL Post-Training with Speculative Decoding', 'desc': 'This paper introduces speculative decoding as a method to enhance the efficiency of reinforcement learning (RL) post-training by maintaining the output distribution of language models while increasing the speed of rollouts. The authors highlight that traditional methods for improving rollout efficiency often alter the optimization process, which can compromise the quality of the generated outputs. By implementing speculative decoding within the NeMo-RL framework, they demonstrate significant improvements in rollout throughput, achieving a 1.8x increase in performance for synchronous RL tasks. Furthermore, they project that combining this technique with asynchronous RL could lead to a remarkable 2.5x speedup in training at larger model scales.'}, 'zh': {'title': '推测解码：加速强化学习的关键技术', 'desc': '本文探讨了一种名为“推测解码”的技术，它可以加速强化学习（RL）的后训练过程，同时保持输出分布不变。推测解码通过提高回合生成的效率，解决了当前大规模语言模型在自回归生成中的瓶颈问题。我们在NeMo-RL中实现了推测解码，支持同步和异步管道，从而在RL回合中实现推测。实验结果表明，在8B规模的推理后训练工作负载下，推测解码的回合吞吐量提高了1.8倍，结合异步RL可实现高达2.5倍的训练速度提升。'}}}, {'id': 'https://huggingface.co/papers/2604.26694', 'title': 'Unified 4D World Action Modeling from Video Priors with Asynchronous Denoising', 'url': 'https://huggingface.co/papers/2604.26694', 'abstract': 'Abstract X-WAM is a unified 4D world model that combines real-time robotic action execution with high-fidelity 4D world synthesis using pretrained video diffusion models and asynchronous noise sampling for improved efficiency and quality.  AI-generated summary We propose X-WAM, a Unified 4D World Model that unifies real-time robotic action execution and high-fidelity 4D world synthesis (video + 3D reconstruction) in a single framework, addressing the critical limitations of prior unified world models (e.g., UWM) that only model 2D pixel-space and fail to balance action efficiency and world modeling quality. To leverage the strong visual priors of pretrained video diffusion models, X-WAM imagines the future world by predicting multi-view RGB-D videos, and obtains spatial information efficiently through a lightweight structural adaptation: replicating the final few blocks of the pretrained Diffusion Transformer into a dedicated depth prediction branch for the reconstruction of future spatial information. Moreover, we propose Asynchronous Noise Sampling (ANS) to jointly optimize generation quality and action decoding efficiency. ANS applies a specialized asynchronous denoising schedule during inference, which rapidly decodes actions with fewer steps to enable efficient real-time execution, while dedicating the full sequence of steps to generate high-fidelity video. Rather than entirely decoupling the timesteps during training, ANS samples from their joint distribution to align with the inference distribution. Pretrained on over 5,800 hours of robotic data, X-WAM achieves 79.2% and 90.7% average success rate on RoboCasa and RoboTwin 2.0 benchmarks, while producing high-fidelity 4D reconstruction and generation surpassing existing methods in both visual and geometric metrics.', 'score': 2, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '6d8524c2b57cb263', 'authors': ['Jun Guo', 'Qiwei Li', 'Peiyan Li', 'Zilong Chen', 'Nan Sun', 'Yifei Su', 'Heyun Wang', 'Yuan Zhang', 'Xinghang Li', 'Huaping Liu'], 'affiliations': ['CASIA', 'Peking University', 'Tsinghua University', 'Xiaomi Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2604.26694.jpg', 'data': {'categories': ['#training', '#optimization', '#robotics', '#3d', '#multimodal', '#video', '#diffusion'], 'emoji': '🤖', 'ru': {'title': 'Единая мировая модель для робота: синтез действий и 4D-видения', 'desc': 'X-WAM — это единая модель мира, которая объединяет управление роботом в реальном времени с высокоточным синтезом 4D-сцен (видео + 3D-реконструкция) в одной архитектуре. Модель использует предтренированные видеодиффузионные модели и добавляет облегчённую ветвь для предсказания глубины, получая пространственную информацию эффективнее, чем предыдущие подходы. Авторы предложили асинхронное семплирование шума (ANS), которое оптимизирует качество генерации и скорость принятия решений робота независимо. Модель, предтренированная на 5800 часах робототехнических данных, достигла высокого процента успеха на бенчмарках RoboCasa и RoboTwin 2.0 с превосходной визуальной и геометрической точностью.'}, 'en': {'title': 'X-WAM: Revolutionizing 4D World Modeling for Robotics', 'desc': 'X-WAM is a new 4D world model that integrates real-time robotic actions with high-quality 4D world creation, using advanced video diffusion models. It improves upon previous models by effectively combining 2D and 3D data to enhance both action efficiency and world modeling quality. The model predicts future scenes by generating multi-view RGB-D videos and employs a unique method called Asynchronous Noise Sampling to optimize both action execution and video quality. Trained on extensive robotic data, X-WAM demonstrates superior performance in benchmarks, achieving high success rates while producing detailed 4D reconstructions.'}, 'zh': {'title': '统一4D世界模型，提升机器人智能执行', 'desc': 'X-WAM是一个统一的4D世界模型，结合了实时机器人动作执行和高保真4D世界合成。它利用预训练的视频扩散模型，预测多视角的RGB-D视频，从而高效获取空间信息。通过引入异步噪声采样（ANS），X-WAM在生成质量和动作解码效率之间实现了优化。经过5800小时的机器人数据预训练，X-WAM在RoboCasa和RoboTwin 2.0基准测试中取得了优异的成功率。'}}}, {'id': 'https://huggingface.co/papers/2604.24977', 'title': 'A Survey on LLM-based Conversational User Simulation', 'url': 'https://huggingface.co/papers/2604.24977', 'abstract': 'Abstract Large language models have significantly advanced conversational user simulation by enabling high-fidelity synthetic conversation generation, which is systematically surveyed and categorized under a novel taxonomy of user granularity and simulation objectives.  AI-generated summary User simulation has long played a vital role in computer science due to its potential to support a wide range of applications. Language, as the primary medium of human communication, forms the foundation of social interaction and behavior. Consequently, simulating conversational behavior has become a key area of study. Recent advancements in large language models (LLMs) have significantly catalyzed progress in this domain by enabling high-fidelity generation of synthetic user conversation. In this paper, we survey recent advancements in LLM-based conversational user simulation. We introduce a novel taxonomy covering user granularity and simulation objectives. Additionally, we systematically analyze core techniques and evaluation methodologies. We aim to keep the research community informed of the latest advancements in conversational user simulation and to further facilitate future research by identifying open challenges and organizing existing work under a unified framework.', 'score': 2, 'issue_id': 2092, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'c95edb50e0eb75ec', 'authors': ['Bo Ni', 'Leyao Wang', 'Yu Wang', 'Branislav Kveton', 'Franck Dernoncourt', 'Yu Xia', 'Hongjie Chen', 'Reuben Leura', 'Samyadeep Basu', 'Subhojyoti Mukherjee', 'Puneet Mathur', 'Nesreen Ahmed', 'Junda Wu', 'Li Li', 'Huixin Zhang', 'Ruiyi Zhang', 'Tong Yu', 'Sungchul Kim', 'Jiuxiang Gu', 'Zhengzhong Tu', 'Alexa Siu', 'Zichao Wang', 'David Seunghyun Yoon', 'Nedim Lipka', 'Namyong Park', 'Zihao Lin', 'Trung Bui', 'Yue Zhao', 'Tyler Derr', 'Ryan A. Rossi'], 'affiliations': ['Adobe Research', 'Cisco AI Research', 'Dolby Laboratories', 'Texas A&M University', 'UC Davis', 'University of California San Diego', 'University of California, Berkeley', 'University of Oregon', 'University of Southern California', 'Vanderbilt University', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24977.jpg', 'data': {'categories': [], 'emoji': '💬', 'ru': {'title': 'Большие языковые модели для реалистичной симуляции диалогового поведения пользователей', 'desc': 'В статье проводится систематический обзор методов симуляции пользователей в диалоговых системах на основе больших языковых моделей. Авторы предлагают новую таксономию, классифицирующую подходы по детализации моделирования пользователя и целям симуляции. Рассматриваются основные техники генерации синтетических диалогов и методологии их оценки. Работа объединяет существующие подходы в единую структуру и определяет открытые проблемы в данной области.'}, 'en': {'title': 'Advancing Conversational User Simulation with Large Language Models', 'desc': 'This paper discusses the advancements in conversational user simulation using large language models (LLMs). It introduces a new taxonomy that categorizes user simulation based on granularity and objectives, helping to clarify the different approaches in the field. The authors analyze key techniques and evaluation methods used in LLM-based simulations, providing a comprehensive overview of current research. The goal is to inform the research community about recent developments and highlight future challenges in conversational user simulation.'}, 'zh': {'title': '大型语言模型推动对话用户模拟的进步', 'desc': '大型语言模型在对话用户模拟方面取得了显著进展，能够生成高保真的合成对话。本文对基于大型语言模型的对话用户模拟进行了系统的调查和分类，提出了一种新的分类法，涵盖用户粒度和模拟目标。模拟对话行为是计算机科学中的一个关键研究领域，具有广泛的应用潜力。我们还分析了核心技术和评估方法，以促进未来的研究和解决现有挑战。'}}}, {'id': 'https://huggingface.co/papers/2604.26186', 'title': 'FASH-iCNN: Making Editorial Fashion Identity Inspectable Through Multimodal CNN Probing', 'url': 'https://huggingface.co/papers/2604.26186', 'abstract': 'Abstract FASH-iCNN is a multimodal system that identifies fashion house, era, and color tradition from garment photographs with high accuracy, revealing that texture and luminance are primary carriers of editorial identity.  AI-generated summary Fashion AI systems routinely encode the aesthetic logic of specific houses, editors, and historical moments without disclosing it. We present FASH-iCNN, a multimodal system trained on 87,547 Vogue runway images across 15 fashion houses spanning 1991-2024 that makes this cultural logic inspectable. Given a photograph of a garment, the system recovers which house produced it, which era it belongs to, and which color tradition it reflects. A clothing-only model identifies the fashion house at 78.2% top-1 across 14 houses, the decade at 88.6% top-1, and the specific year at 58.3% top-1 across 34 years with a mean error of just 2.2 years. Probing which visual channels carry this signal reveals a sharp dissociation: removing color costs only 10.6pp of house identity accuracy, while removing texture costs 37.6pp, establishing texture and luminance as the primary carriers of editorial identity. FASH-iCNN treats editorial culture as the signal rather than background noise, identifying which houses, eras, and color traditions shaped each output so that users can see not just what the system predicts but which houses, editors, and historical moments are encoded in that prediction.', 'score': 1, 'issue_id': 2092, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'b5c59acb547cc9b4', 'authors': ['Morayo Danielle Adeyemi', 'Ryan A. Rossi', 'Franck Dernoncourt'], 'affiliations': ['Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.26186.jpg', 'data': {'categories': ['#cv', '#dataset', '#multimodal'], 'emoji': '👗', 'ru': {'title': 'Текстура как язык моды: декодирование редакционной идентичности нейросетью', 'desc': 'FASH-iCNN — многомодальная нейронная сеть, обученная на 87 547 фотографиях с подиумов Vogue, которая идентифицирует дом моды, эпоху и цветовую традицию по фотографии одежды с высокой точностью. Модель достигает 78,2% точности в определении модного дома и 88,6% в определении десятилетия, при этом текстура и светимость служат основными носителями редакционной идентичности. Путём анализа визуальных каналов авторы выявили, что удаление текстуры снижает точность на 37,6 процентных пункта, тогда как удаление цвета — только на 10,6, что подтверждает доминирующую роль текстуры. Система позволяет инспектировать культурную логику, закодированную в AI-системах моды, делая видимыми влияния конкретных домов, редакторов и исторических моментов.'}, 'en': {'title': 'Decoding Fashion: Unveiling Identity Through Images', 'desc': 'FASH-iCNN is a multimodal machine learning system designed to analyze fashion photographs and accurately identify the fashion house, era, and color tradition of garments. It was trained on a large dataset of 87,547 Vogue runway images, allowing it to capture the aesthetic logic of various fashion houses from 1991 to 2024. The system demonstrates that texture and luminance are crucial features for recognizing editorial identity, with texture being significantly more important than color. By making the cultural logic behind fashion predictions inspectable, FASH-iCNN enhances our understanding of how fashion history and identity are encoded in visual data.'}, 'zh': {'title': '揭示时尚背后的文化逻辑', 'desc': 'FASH-iCNN 是一个多模态系统，能够从服装照片中高精度识别时尚品牌、时代和色彩传统。该系统基于 87,547 张来自 15 个时尚品牌的 Vogue T 台图片进行训练，涵盖了 1991 年至 2024 年的时尚历史。研究表明，纹理和亮度是传达编辑身份的主要因素，去除纹理会显著降低品牌识别的准确性。FASH-iCNN 使得用户能够理解每个预测背后的文化逻辑，揭示了时尚界的深层次信息。'}}}, {'id': 'https://huggingface.co/papers/2604.22868', 'title': 'Probing Visual Planning in Image Editing Models', 'url': 'https://huggingface.co/papers/2604.22868', 'abstract': 'Abstract Visual planning is reimagined as a single-step image transformation task using abstract puzzles for evaluation and training, revealing limitations in current neural models compared to human efficiency.  AI-generated summary Visual planning represents a crucial facet of human intelligence, especially in tasks that require complex spatial reasoning and navigation. Yet, in machine learning, this inherently visual problem is often tackled through a verbal-centric lens. While recent research demonstrates the promise of fully visual approaches, they suffer from significant computational inefficiency due to the step-by-step planning-by-generation paradigm. In this work, we present EAR, an editing-as-reasoning paradigm that reformulates visual planning as a single-step image transformation. To isolate intrinsic reasoning from visual recognition, we employ abstract puzzles as probing tasks and introduce AMAZE, a procedurally generated dataset that features the classical Maze and Queen problems, covering distinct, complementary forms of visual planning. The abstract nature of AMAZE also facilitates automatic evaluation of autoregressive and diffusion-based models in terms of both pixel-wise fidelity and logical validity. We assess leading proprietary and open-source editing models. The results show that they all struggle in the zero-shot setting, finetuning on basic scales enables remarkable generalization to larger in-domain scales and out-of-domain scales and geometries. However, our best model that runs on high-end hardware fails to match the zero-shot efficiency of human solvers, highlighting a persistent gap in neural visual reasoning.', 'score': 0, 'issue_id': 2095, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '605f20436cbb33f1', 'authors': ['Zhimu Zhou', 'Yanpeng Zhao', 'Qiuyu Liao', 'Bo Zhao', 'Xiaojian Ma'], 'affiliations': ['Renmin University of China', 'Shanghai Jiao Tong University', 'State Key Laboratory of General Artificial Intelligence, BIGAI'], 'pdf_title_img': 'assets/pdf/title_img/2604.22868.jpg', 'data': {'categories': ['#diffusion', '#reasoning', '#benchmark', '#dataset', '#cv'], 'emoji': '🧩', 'ru': {'title': 'От пошагового планирования к мгновенной трансформации: переосмысление визуального рассуждения', 'desc': 'В работе переосмыслена задача визуального планирования как трансформация изображения в один шаг, используя абстрактные головоломки для оценки и обучения моделей. Авторы предложили парадигму EAR (редактирование как рассуждение), которая заменяет пошаговое генеративное планирование на прямое преобразование изображения. Для оценки был создан датасет AMAZE с классическими головоломками (лабиринты и задачи с королевой), позволяющий оценить как пиксельную точность, так и логическую корректность решений. Результаты показывают, что даже лучшие модели редактирования существенно отстают от человеческой эффективности в нулевом приближении, хотя хорошо обучаются на малых масштабах.'}, 'en': {'title': 'Revolutionizing Visual Planning: From Step-by-Step to Single-Step Transformation', 'desc': 'This paper introduces a new approach to visual planning in machine learning, framing it as a single-step image transformation task. The authors highlight the limitations of current neural models in efficiently solving complex spatial reasoning problems compared to human capabilities. They propose the EAR paradigm, which uses abstract puzzles to evaluate and train models, and introduce the AMAZE dataset for this purpose. The findings reveal that while models can improve with fine-tuning, they still lag behind human performance in zero-shot scenarios, indicating a significant gap in neural visual reasoning.'}, 'zh': {'title': '视觉规划的新视角：单步图像转换', 'desc': '本论文将视觉规划重新定义为单步图像转换任务，使用抽象拼图进行评估和训练，揭示了当前神经模型在效率上与人类的差距。视觉规划是人类智能的重要组成部分，尤其是在需要复杂空间推理和导航的任务中。尽管最近的研究展示了完全视觉方法的潜力，但由于逐步生成的规划方式，这些方法在计算效率上存在显著问题。我们提出了EAR（编辑作为推理）范式，将视觉规划重新构建为单步图像转换，并引入AMAZE数据集，以便更好地评估模型的推理能力和逻辑有效性。'}}}];

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (2)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (3)', '#cv (3)', '#data', '#dataset (4)', '#diffusion (4)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (4)', '#open_source (2)', '#optimization (3)', '#plp (1)', '#rag', '#reasoning (2)', '#rl (3)', '#rlhf', '#robotics (2)', '#science', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (5)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-30 15:02',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-30 15:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-30 15:02')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
