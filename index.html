    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.00683', 'title': 'OCC-RAG: Optimal Cognitive Core for Faithful Question Answering', 'url': 'https://huggingface.co/papers/2606.00683', 'abstract': "Abstract Compact task-specialized language models demonstrate superior performance in multi-hop reasoning and faithfulness compared to larger general-purpose models through a novel training pipeline and structured reasoning traces.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in the development of language models has been defined by scale, with each generation absorbing more of the world's knowledge into its weights. However, many practical applications benefit more from robust reasoning than from extensive parametric knowledge. In this setting, task-specialized small language models (SLMs) offer a principled design choice. We introduce Optimal Cognitive Core (OCC), a family of SLMs built around this premise. As a variant of OCC, we present OCC-RAG, optimized for faithful question answering (QA) grounded in the provided context. This task directly aligns with the OCC design approach, requiring multi-hop reasoning over supplied passages while ignoring memorized knowledge. To train OCC-RAG, we implement a novel pipeline for synthesizing multi-context, multi-hop QA data at scale, producing a corpus of over three million examples targeting multi-hop reasoning, strict context faithfulness, and calibrated abstention. We release OCC-RAG-0.6B and OCC-RAG-1.7B, both mid-trained on this corpus. The models produce structured reasoning traces with source citations grounded in literal quotes from the context. Through OCC-RAG, we demonstrate that compact, task-specialized SLMs can match or exceed general-purpose models 2 -- 6x their size across multi-hop reasoning (HotpotQA, MuSiQue, TAT-QA), faithfulness (ConFiQA), and refusal (MuSiQue-Un) benchmarks.", 'score': 72, 'issue_id': 2366, 'pub_date': '2026-05-30', 'pub_date_card': {'ru': '30 мая', 'en': 'May 30', 'zh': '5月30日'}, 'hash': '95c13e9ef1534cea', 'authors': ['Maksim Savkin', 'Mikhail Goncharov', 'Alexander Gambashidze', 'Alla Chepurova', 'Dmitrii Tarasov', 'Nikita Andriianov', 'Daria Pugacheva', 'Vasily Konovalov', 'Andrey Galichin', 'Ivan Oseledets'], 'affiliations': ['OCC Team'], 'pdf_title_img': 'assets/pdf/title_img/2606.00683.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#training', '#rag', '#dataset', '#synthetic', '#reasoning', '#small_models'], 'emoji': '🧠', 'ru': {'title': 'Компактные специализированные модели с логическим рассуждением превосходят большие универсальные модели', 'desc': 'В статье представлены компактные специализированные языковые модели (SLM) под названием Optimal Cognitive Core (OCC), которые демонстрируют превосходную производительность в многошаговом логическом рассуждении и верности ответов по сравнению с крупными универсальными моделями. Авторы разработали инновационный конвейер обучения для синтеза больших объёмов данных вопрос-ответ с поддержкой многошагового рассуждения, включая более трёх миллионов примеров с требованием строгой верности контексту и откалиброванного отказа. Модели OCC-RAG генерируют структурированные трассы рассуждений с цитатами, привязанными к дословным цитатам из исходного текста. Экспериментальные результаты показывают, что маленькие специализированные модели размером 0.6B и 1.7B параметров превосходят или сравниваются с универсальными моделями, которые в 2-6 раз больше по размеру, на задачах многошагового рассуждения, верности и корректного отказа.'}, 'en': {'title': 'Compact Models, Superior Reasoning!', 'desc': 'This paper introduces a new family of small language models called Optimal Cognitive Core (OCC), which are designed for specific tasks like multi-hop reasoning and faithful question answering. Unlike larger general-purpose models, these task-specialized models focus on robust reasoning capabilities rather than just having a vast amount of knowledge. The authors present OCC-RAG, a variant optimized for question answering that relies on context rather than memorized information. They also describe a novel training method that generates a large dataset for multi-hop reasoning, demonstrating that these compact models can outperform larger models in various benchmarks.'}, 'zh': {'title': '紧凑型任务专用模型的优势', 'desc': '这篇论文介绍了一种名为最优认知核心（OCC）的任务专用小型语言模型（SLM），它在多跳推理和准确性方面表现优于大型通用模型。OCC-RAG是OCC的一个变体，专门优化用于基于提供的上下文进行准确的问答。为了训练OCC-RAG，研究者们开发了一种新颖的多上下文、多跳问答数据合成管道，生成了超过三百万个示例。通过OCC-RAG，研究表明紧凑的任务专用SLM在多跳推理和准确性基准上可以与其规模的通用模型相匹敌或超越。'}}}, {'id': 'https://huggingface.co/papers/2605.23895', 'title': 'From Activation to Causality: Discovery of Causal Visual Representations in the Human Brain', 'url': 'https://huggingface.co/papers/2605.23895', 'abstract': 'Abstract BrainCause framework uses generative and brain models to identify valid neural representations through causal testing, demonstrating that activation alone is insufficient for confirming concept representation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Identifying which brain regions represent a visual concept in the human brain is a central challenge in neuroscience. Existing approaches have localized coarse functional regions (e.g., faces, places) through activation maximization, identifying regions that activate strongly for a target concept relative to other concepts. Yet strong activation alone does not establish that a region represents the concept itself, as responses may instead be driven by correlated visual or semantic cues. We introduce BrainCause, an automated framework that combines generative and brain models to synthesize controlled stimuli and validate neural representations through targeted causal testing. Given a query specifying a concept of interest, our framework constructs targeted stimulus sets comprising concept images, counterfactual edits that remove the target concept while preserving other image content, and images with candidate correlated distractors. It then uses an image-to-fMRI encoding model to predict brain responses and searches for representations that respond specifically to the target concept over correlated alternatives. BrainCause returns validated candidate representations and proposes follow-up fMRI experiments to further test or extend its discoveries. Our approach successfully recovers known functional localizations and identifies new candidate representations across dozens of concepts, validated on both predicted and measured fMRI data. Critically, we show that without causal validation, a large fraction of localizations would be false positives, confirming that activation alone is insufficient evidence of representation.', 'score': 40, 'issue_id': 2366, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'f5dcb7077a56097b', 'authors': ['Yuval Golbari', 'Navve Wasserman', 'Matias Cosarinsky', 'Roman Beliy', 'Aude Oliva', 'Antonio Torralba', 'Michal Irani', 'Tamar Rott Shaham'], 'affiliations': ['Massachusetts Institute of Technology', 'Weizmann Institute of Science'], 'pdf_title_img': 'assets/pdf/title_img/2605.23895.jpg', 'data': {'categories': ['#cv', '#healthcare', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Активация мозга недостаточна: причинное тестирование для подтверждения представления концепций', 'desc': 'BrainCause — это фреймворк, который объединяет генеративные модели и модели мозга для выявления нейральных представлений концепций через причинное тестирование. Подход использует синтез контролируемых стимулов, включая изображения концепций, контрфактические варианты и отвлекающие факторы, а затем предсказывает активацию мозга с помощью моделей кодирования image-to-fMRI. Исследование доказывает, что простая активация мозга недостаточна для подтверждения представления концепции, так как реакция может быть вызвана коррелирующими визуальными или семантическими признаками. Фреймворк успешно восстанавливает известные функциональные локализации и идентифицирует новые кандидаты представлений, демонстрируя, что без причинной валидации большая часть выводов была бы ложными положительными результатами.'}, 'en': {'title': 'Causal Testing for True Neural Representation', 'desc': 'The BrainCause framework is designed to improve our understanding of how specific visual concepts are represented in the human brain. It combines generative models with brain imaging data to conduct causal testing, which helps to confirm whether a brain region truly represents a concept rather than just responding to correlated cues. By generating controlled stimuli and analyzing brain responses, BrainCause can identify valid neural representations and distinguish them from mere activation. This approach not only validates existing knowledge but also uncovers new insights into brain function, emphasizing the importance of causal validation in neuroscience.'}, 'zh': {'title': 'BrainCause：超越激活的因果验证', 'desc': 'BrainCause框架结合了生成模型和脑模型，通过因果测试来识别有效的神经表征，表明仅靠激活不足以确认概念表征。该方法针对特定概念构建刺激集，包括概念图像、去除目标概念的反事实编辑以及候选的相关干扰图像。通过图像到fMRI编码模型预测大脑反应，BrainCause能够寻找对目标概念特异性响应的表征。我们的研究成功恢复了已知的功能定位，并在多个概念中识别出新的候选表征，验证了因果验证的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.01249', 'title': 'Trust Region On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.01249', 'abstract': 'Abstract Trust Region On-Policy Distillation (TrOPD) improves reliable token-level supervision in large language model distillation by using trust regions, outlier estimation, and off-policy guidance to address instability issues under distribution mismatch.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-Policy Distillation (OPD) is a fundamental technique for efficient post-training of large language models (LLMs), with broad applications in agent learning, multi-task enhancement, and model compression. However, OPD training becomes unstable when the teacher and student distributions differ substantially, as teacher supervision on student-generated tokens may yield unreliable policy gradients and even cause optimization failure. This work addresses reliable on-policy token-level supervision through credit assignment strategies, and proposes Trust Region On-Policy Distillation, TrOPD. It features the following characteristics: 1) Trust-Region On-Policy Learning: TrOPD performs OPD only in regions where the teacher provides reliable supervision, mitigating the optimization difficulty of the K1 reverse-KL estimator under distribution mismatch. 2) Outlier Estimation: For outlier regions, we explore gradient clipping, masking, and forward-KL estimation to reduce the adverse effects of unreliable supervision. 3) Off-Policy Guidance: The student continues generation from teacher prefixes and uses forward KL to imitate off-policy guidance, encouraging on-policy exploration toward reliable regions. Experiments show that TrOPD consistently outperforms SoTA OPD baselines, including OPD, EOPD, and REOPOLD, across mathematical reasoning, code generation, and general-domain benchmarks.', 'score': 33, 'issue_id': 2364, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'adddb5d4ccb7fb40', 'authors': ['Xingrun Xing', 'Haoqing Wang', 'Boyan Gao', 'Ziheng Li', 'Yehui Tang'], 'affiliations': ['Peking University', 'Samsung Research, Beijing, China', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.01249.jpg', 'data': {'categories': ['#training', '#rlhf', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Надёжная дистилляция через доверительные регионы и умное управление выбросами', 'desc': 'В статье представлен метод Trust Region On-Policy Distillation (TrOPD) для стабилизации дистилляции больших языковых моделей. Основная проблема заключается в нестабильности обучения when распределения учителя и студента существенно различаются, что приводит к ненадёжным градиентам политики. Авторы предлагают три ключевых компонента: обучение в доверительных областях для надёжного обучения, обработка выбросов через clipping и masking, а также off-policy guidance для исследования надёжных регионов. Экспериментальные результаты показывают, что TrOPD превосходит существующие методы on-policy distillation на задачах математического рассуждения, генерации кода и других бенчмарках.'}, 'en': {'title': 'Enhancing Distillation Stability with Trust Regions', 'desc': "The paper introduces Trust Region On-Policy Distillation (TrOPD), a method designed to enhance the reliability of token-level supervision in the distillation of large language models (LLMs). It addresses the instability that arises when the distributions of teacher and student models differ significantly, which can lead to unreliable policy gradients. TrOPD employs strategies such as trust-region learning to ensure that training occurs only in areas where the teacher's supervision is dependable, and it uses outlier estimation techniques to manage the impact of unreliable data. The method demonstrates superior performance compared to existing state-of-the-art on-policy distillation techniques across various tasks, including mathematical reasoning and code generation."}, 'zh': {'title': '信任区域提升在线蒸馏的可靠性', 'desc': '信任区域在线蒸馏（TrOPD）通过使用信任区域、异常值估计和离线指导，改善了大语言模型蒸馏中的可靠性问题。在线蒸馏（OPD）是一种高效的后训练技术，但当教师和学生的分布差异较大时，训练会变得不稳定。TrOPD 通过信用分配策略解决了在线令牌级监督的可靠性问题，确保在教师提供可靠监督的区域内进行优化。实验表明，TrOPD 在数学推理、代码生成和通用基准测试中，始终优于现有的 OPD 基线。'}}}, {'id': 'https://huggingface.co/papers/2606.03985', 'title': 'Humanoid-GPT: Scaling Data and Structure for Zero-Shot Motion Tracking', 'url': 'https://huggingface.co/papers/2606.03985', 'abstract': 'Abstract Humanoid-GPT is a GPT-style Transformer with causal attention trained on a billion-scale motion corpus that achieves zero-shot generalization to unseen motions and control tasks through scalable pre-training on diverse motion data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Humanoid-GPT, a GPT-style Transformer with causal attention trained on a billion-scale motion corpus for whole-body control. Unlike prior shallow MLP trackers constrained by scarce data and an agility-generalization trade-off, Humanoid-GPT is pre-trained on a 2B-frame retargeted corpus that unifies all major mocap datasets with large-scale in-house recordings. Scaling both data and model capacity yields a single generative Transformer that tracks highly dynamic behaviors while achieving unprecedented zero-shot generalization to unseen motions and control tasks. Extensive experiments and scaling analyses show that our model establishes a new performance frontier, demonstrating robust zero-shot generalization to unseen tasks while simultaneously tracking highly dynamic and complex motions.', 'score': 32, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '40cf2d057e0627fc', 'authors': ['Zekun Qi', 'Xuchuan Chen', 'Dairu Liu', 'Chenghuai Lin', 'Yunrui Lian', 'Sikai Liang', 'Zhikai Zhang', 'Yu Guan', 'Jilong Wang', 'Wenyao Zhang', 'Xinqiang Yu', 'He Wang', 'Li Yi'], 'affiliations': ['Galbot Inc.', 'Peking University', 'Shanghai Jiao Tong University', 'Shanghai Qi Zhi Institute', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03985.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Масштабный трансформер для реалистичного управления движениями человекоида', 'desc': 'Humanoid-GPT — это трансформер в стиле GPT с причинной аттентацией, обученный на корпусе из миллиарда кадров движений для управления полным телом человекоида. В отличие от предыдущих моделей, основанных на МЛП с ограниченными данными, эта модель предварительно обучена на 2 млрд кадров, объединяющих все основные датасеты захвата движений с большим объёмом внутренних записей. Масштабирование как данных, так и архитектуры модели позволило создать единый генеративный трансформер, который отслеживает сложные динамические движения и достигает нулевой обобщаемости на неиспользованные в обучении движения и задачи управления. Экспериментальные результаты и анализ масштабирования демонстрируют новый уровень производительности с надёжной нулевой обобщаемостью при одновременном отслеживании высокодинамичных и сложных движений.'}, 'en': {'title': 'Revolutionizing Motion Control with Zero-Shot Generalization', 'desc': 'Humanoid-GPT is a novel GPT-style Transformer designed for whole-body motion control, utilizing causal attention mechanisms. It is trained on a massive dataset comprising a billion motion frames, allowing it to generalize to new and unseen motion tasks without prior specific training. This model overcomes limitations of previous shallow MLP trackers by leveraging a diverse and extensive motion corpus, which includes major motion capture datasets and in-house recordings. The results indicate that Humanoid-GPT achieves superior performance in tracking complex behaviors and demonstrates remarkable zero-shot generalization capabilities.'}, 'zh': {'title': 'Humanoid-GPT：突破性的人形控制模型', 'desc': 'Humanoid-GPT是一种基于GPT的变换器，采用因果注意力机制，训练于十亿规模的运动数据集。与之前受限于数据稀缺的浅层多层感知器不同，Humanoid-GPT通过在一个包含2B帧的重定向数据集上进行预训练，能够实现对复杂动态行为的跟踪。该模型在未见过的运动和控制任务上实现了零-shot泛化，展现出强大的适应能力。实验结果表明，Humanoid-GPT在性能上达到了新的前沿，能够同时处理复杂的动态动作。'}}}, {'id': 'https://huggingface.co/papers/2606.03458', 'title': 'KVarN: Variance-Normalized KV-Cache Quantization Mitigates Error Accumulation in Reasoning Tasks', 'url': 'https://huggingface.co/papers/2606.03458', 'abstract': 'Abstract KVarN is a calibration-free KV-cache quantizer that uses Hadamard rotation and dual-scaling variance normalization to reduce error accumulation during autoregressive decoding in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Test-time scaling is a powerful approach to obtain better reasoning in large language models, but it becomes memory-bottlenecked during long-horizon decoding, as the KV-cache grows. KV-cache quantization can help improve this, but current methods are evaluated under prefill-like settings and errors behave differently under autoregressive decoding. We show that in the latter regime, quantization errors accumulate across timesteps, driven primarily by incorrect token scales. We introduce KVarN, a calibration-free KV-cache quantizer that applies a Hadamard rotation followed by a dual-scaling variance normalization across both axes of the K and V matrices. We find that this combination fixes outlying token-scale errors and substantially reduces error accumulation over existing baselines. KVarN establishes a new state-of-theart for KV-cache quantization on generative benchmarks, including MATH500, AIME24 and HumanEval, at 2-bit precision. A vLLM implementation of the KVarN method is available at https://github.com/huawei-csl/KVarN', 'score': 26, 'issue_id': 2367, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '5376b002e16503f2', 'authors': ['Lorenz K. Muller', 'Philippe Bich', 'Chiara Boretti', 'Hyun-Min Chang', 'Jiawei Zhuang', 'Lukas Cavigelli'], 'affiliations': ['Huawei'], 'pdf_title_img': 'assets/pdf/title_img/2606.03458.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Экономия памяти при декодировании через умную квантизацию кэша внимания', 'desc': 'KVarN — это метод квантизации KV-cache без калибровки, который использует преобразование Адамара и двойную нормализацию дисперсии для снижения накопления ошибок при авторегрессивном декодировании в больших языковых моделях. Авторы показали, что при автоRegressive декодировании ошибки квантизации накапливаются со временем из-за неправильного масштабирования токенов. Предложенный метод применяет ротацию Адамара к матрицам K и V, а затем выполняет двойную нормализацию дисперсии по обеим осям, что эффективно устраняет выбросы в шкалах токенов. KVarN достигает лучших результатов для квантизации KV-cache при 2-битной точности на задачах вроде MATH500, AIME24 и HumanEval.'}, 'en': {'title': 'KVarN: Revolutionizing KV-Cache Quantization for Better Language Model Performance', 'desc': 'KVarN is a new method for quantizing key-value (KV) caches in large language models without needing calibration. It uses a technique called Hadamard rotation along with dual-scaling variance normalization to minimize errors that can build up during the decoding process. This is particularly important for autoregressive models, where errors can accumulate over time due to incorrect token scales. KVarN significantly improves performance on generative tasks, achieving state-of-the-art results in KV-cache quantization at 2-bit precision.'}, 'zh': {'title': 'KVarN：提升KV缓存量化的新方法', 'desc': 'KVarN是一种无需校准的KV缓存量化器，利用Hadamard旋转和双重缩放方差归一化来减少在大型语言模型自回归解码过程中错误的累积。该方法解决了在长时间解码中，由于KV缓存增长而导致的内存瓶颈问题。KVarN通过对K和V矩阵的两个轴应用Hadamard旋转和双重缩放方差归一化，显著减少了量化误差的累积。实验结果表明，KVarN在生成基准测试中，如MATH500、AIME24和HumanEval，达到了2位精度下的最新状态。'}}}, {'id': 'https://huggingface.co/papers/2606.02398', 'title': 'A Local Perturbation Theory for Cross-Domain Interference and Recovery in Multi-Domain RL', 'url': 'https://huggingface.co/papers/2606.02398', 'abstract': 'Abstract Multi-domain reinforcement learning in language models causes performance degradation through shared computational pathways, but targeted refresh and rollback techniques can selectively recover lost capabilities with minimal side effects.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) post-training improves large language models (LLMs) on individual domains such as mathematical reasoning, code generation, question answering, and creative writing (CW), but training on one domain often degrades performance on others. Existing explanations based on catastrophic forgetting or global gradient conflict are incomplete: substantial interference can occur even when full-model gradients are nearly orthogonal. We show that single-domain RL produces sparse, small-magnitude parameter edits with weak overlap among top-changed neurons, while different domains still share substantial active computation routes on which update directions determine whether they act synergistically or conflict. Guided by this observation, we prove under a local perturbation model of multi-domain RL that later-domain training harms an earlier domain mainly through a second-order damage term, which under the observed sparse route structure concentrates in a low-dimensional shared conflict subspace. Moreover, a short domain refresh contracts the harmful component on this subspace, enabling selective recovery with limited collateral damage. Consistent with the theory, a brief Re-Math refresh after Code rightarrow Math rightarrow QA rightarrow CW recovers Math from 57.66 to 66.04 while largely preserving performance on the other domains, yielding the best average score of 66.39. Beyond refresh, a training-free rollback on a sparse proxy conflict coordinate set for the Math-QA pair partially restores Math, providing direct proxy-level evidence for localized damage. These results provide a localized mechanistic account of interference and recovery in multi-domain RL.', 'score': 24, 'issue_id': 2365, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '6c12cce729818494', 'authors': ['Lei Yang', 'Siyu Ding', 'Deyi Xiong'], 'affiliations': ['Baidu Inc., Beijing, China', 'TJUNLP Lab, College of Intelligence and Computing, Tianjin University, Tianjin, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.02398.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#alignment', '#rl', '#training'], 'emoji': '🔄', 'ru': {'title': 'Локализованное восстановление способностей в многодоменном обучении с подкреплением', 'desc': 'В статье исследуется проблема деградации производительности больших языковых моделей при обучении с подкреплением на нескольких доменах одновременно. Авторы показали, что интерференция между доменами происходит не из-за глобального конфликта градиентов, а через локализованные общие вычислительные пути, где обновления параметров вызывают второго порядка повреждения. Предложены два метода восстановления потерянных способностей: краткое переобучение на проблемном домене (refresh) и обучение-свободный откат на разреженном наборе конфликтных координат (rollback). Экспериментальные результаты подтверждают теорию и демонстрируют эффективное восстановление производительности с минимальным влиянием на другие домены.'}, 'en': {'title': 'Recovering Lost Skills in Multi-Domain Reinforcement Learning', 'desc': 'This paper discusses how training language models using reinforcement learning (RL) on multiple domains can lead to performance issues due to shared computational pathways. It identifies that while RL can enhance performance in specific areas like math or coding, it can also degrade capabilities in other domains due to interference. The authors propose techniques like targeted refresh and rollback to recover lost skills with minimal negative impact on other areas. Their findings suggest that understanding the structure of shared computation can help mitigate the adverse effects of multi-domain training.'}, 'zh': {'title': '多领域强化学习中的干扰与恢复', 'desc': '这篇论文探讨了多领域强化学习在语言模型中的性能下降问题，主要是由于共享的计算路径导致的干扰。研究表明，单领域的强化学习会对模型参数进行稀疏的小幅度编辑，而不同领域之间仍然共享大量的计算路径。通过引入目标刷新和回滚技术，研究者能够选择性地恢复丢失的能力，同时对其他领域的影响最小。实验结果显示，短时间的领域刷新可以有效减少干扰，恢复模型在特定领域的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.03603', 'title': 'World Models Meet Language Models: On the Complementarity of Concrete and Abstract Reasoning', 'url': 'https://huggingface.co/papers/2606.03603', 'abstract': 'Abstract Controlled concrete reasoning combines visual simulation with abstract reasoning through a training method that uses privileged future information to improve prediction accuracy and robustness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models and multimodal large language models (MLLMs) provide complementary capabilities for predicting future outcomes from static visual observations. World models can generate concrete visual rollouts of possible futures, while MLLMs can reason abstractly over questions, goals, and rules. However, generated rollouts are stochastic and may be visually plausible but task-incorrect, making it necessary to determine when visual simulation is useful, whether a rollout is credible, and how it should influence the final answer. We formulate this problem as controlled concrete reasoning, where a model learns to invoke, verify, and integrate visual future simulation alongside abstract reasoning. To study this setting, we construct two human-verified benchmarks, VRQABench for controllable spatial lookahead and OpenWorldQA for open-domain physical prediction, and propose Privileged-Future On-Policy Self-Distillation (PF-OPSD). During training, PF-OPSD uses ground-truth future videos and answers only as teacher-side privileged context to evaluate on-policy concrete-reasoning trajectories, while the deployable student never observes true futures at test time. Experimental results show that PF-OPSD outperforms baseline by 10.6% and 10.9% on VRQABench and OpenWorldQA, respectively, while increasing robustness to noisy or conflicting rollouts. Our code and dataset are available at https://github.com/yczhou001/PF-OPSD.', 'score': 21, 'issue_id': 2365, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '6693e5161c821d12', 'authors': ['Yucheng Zhou', 'Wei Tao', 'Yiwen Guo', 'Jianbing Shen'], 'affiliations': ['Independent Researcher', 'LIGHTSPEED', 'University of Macau'], 'pdf_title_img': 'assets/pdf/title_img/2606.03603.jpg', 'data': {'categories': ['#dataset', '#optimization', '#benchmark', '#open_source', '#video', '#reasoning', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Синтез визуальной симуляции и логического мышления через привилегированное обучение', 'desc': "В работе предложен метод управляемого конкретного рассуждения, который комбинирует визуальную симуляцию с абстрактным логическим мышлением для улучшения предсказания будущих событий. Авторы используют привилегированную информацию о будущем на этапе обучения через метод самодистилляции PF-OPSD, где учитель получает доступ к истинным видео и ответам, а ученик учится предсказывать без такой информации. Предложены два benchmark'а (VRQABench и OpenWorldQA) с человеческой верификацией для оценки пространственного планирования и физических предсказаний. Экспериментальные результаты показывают улучшение на 10.6-10.9% и повышение устойчивости к шумным или конфликтующим симуляциям."}, 'en': {'title': 'Enhancing Predictions with Controlled Concrete Reasoning', 'desc': 'This paper introduces controlled concrete reasoning, which enhances prediction accuracy by combining visual simulation with abstract reasoning. It leverages world models to generate potential future scenarios and multimodal large language models (MLLMs) for abstract reasoning about tasks and goals. The authors propose a training method called Privileged-Future On-Policy Self-Distillation (PF-OPSD) that uses future information to guide the learning process without exposing the model to true future data during testing. Experimental results demonstrate that PF-OPSD significantly improves performance on two benchmarks while also increasing robustness against misleading visual simulations.'}, 'zh': {'title': '控制性具体推理：结合视觉与抽象的智能预测', 'desc': '这篇论文提出了一种控制性具体推理的方法，将视觉模拟与抽象推理结合起来。通过使用特权未来信息的训练方法，提升了预测的准确性和鲁棒性。研究中构建了两个基准测试，分别用于可控空间前瞻和开放领域物理预测，并提出了特权未来在线自蒸馏（PF-OPSD）方法。实验结果表明，PF-OPSD在这两个基准上均优于基线，且对噪声或冲突的结果具有更强的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.01961', 'title': 'AutoMedBench: Towards Medical AutoResearch with Agentic AI Models', 'url': 'https://huggingface.co/papers/2606.01961', 'abstract': 'Abstract AutoMedBench presents a comprehensive benchmark for autonomous medical-AI research that evaluates agent performance across five workflow stages, revealing validation as the weakest stage and highlighting the importance of reliable pipeline execution and verification in medical AI workflows.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous agents are increasingly expected to support end-to-end medical-AI research workflows, moving beyond isolated prediction tasks or short-form clinical question answering. However, existing medical agent benchmarks primarily evaluate final outputs, providing limited visibility into agent behavior within the research process. To address this gap, we present AutoMedBench, a workflow-aware benchmark for autonomous medical-AI research across diverse medical imaging and multimodal inference tasks, organizing agent execution into a unified five-stage workflow (S1-S5): Plan, Setup, Validate, Inference, and Submit. It comprises long-horizon tasks with each run averaging 33 agent turns, spanning five research tracks: segmentation, image enhancement, visual question answering (VQA), report generation, and lesion detection. Each task is evaluated under two difficulty tiers, Lite and Standard, which use the same data and metrics but differ in the amount of task-brief scaffolding, and each run is scored using both final task performance and S1-S5 stage scores, enabling stage-level analysis from the initial task brief to the final submitted artifact. Across thousands of recorded runs, stage-level scoring reveals that Validate is the weakest workflow stage on average, whereas Setup is the strongest, suggesting that current agents are better at making pipelines executable than at verifying their reliability. Post-run error analysis further shows that verification and submission failures dominate tagged errors, accounting for 37.7% and 38.1% of fired codes respectively, whereas task-understanding errors are rare at 0.9%, and runs with one fired error code have a 48% lower overall score than runs with no error code on average.', 'score': 20, 'issue_id': 2365, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'a886c8951418e2b2', 'authors': ['Junqi Liu', 'Salena Song', 'Yuhan Wang', 'Jiawei Mao', 'Hardy Chen', 'Xiaoke Huang', 'Tianhao Qi', 'Pengfei Guo', 'Yucheng Tang', 'Yufan He', 'Can Zhao', 'Andriy Myronenko', 'Dong Yang', 'Daguang Xu', 'Yuyin Zhou'], 'affiliations': ['NVIDIA', 'University of California, Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2606.01961.jpg', 'data': {'categories': ['#benchmark', '#science', '#agents', '#cv', '#healthcare', '#survey', '#multimodal'], 'emoji': '🏥', 'ru': {'title': 'От планирования к верификации: где ломаются медицинские AI агенты', 'desc': 'AutoMedBench представляет комплексный бенчмарк для оценки автономных агентов в медицинских AI исследованиях, разбивая рабочий процесс на пять этапов: планирование, подготовка, валидация, вывод и отправка результатов. Исследование включает долгосрочные задачи с множеством ходов агента, охватывающие сегментацию изображений, улучшение качества, ответы на визуальные вопросы, генерацию отчетов и обнаружение поражений. Анализ показал, что валидация является самым слабым этапом рабочего процесса, в то время как подготовка пайплайна выполняется наиболее успешно, что указывает на недостаток в проверке надежности создаваемых систем. Результаты демонстрируют, что основные ошибки связаны с верификацией и отправкой результатов, подчеркивая важность надежного выполнения и валидации в медицинских AI рабочих процессах.'}, 'en': {'title': 'Enhancing Medical AI: A Five-Stage Benchmark for Autonomous Agents', 'desc': 'AutoMedBench is a new benchmark designed to evaluate the performance of autonomous agents in medical AI research across five key workflow stages: Plan, Setup, Validate, Inference, and Submit. It highlights that the validation stage is the weakest point in the workflow, indicating a need for better reliability in medical AI systems. The benchmark assesses tasks in areas like segmentation and visual question answering, providing insights into agent behavior throughout the research process rather than just final outputs. By scoring both the overall task performance and individual stage performance, AutoMedBench allows for a detailed analysis of how well agents execute complex medical workflows.'}, 'zh': {'title': '提升医疗AI工作流程的验证能力', 'desc': 'AutoMedBench是一个全面的基准测试，旨在评估自主医疗人工智能在五个工作流程阶段的表现。研究发现，验证阶段是最薄弱的环节，强调了在医疗AI工作流程中可靠的管道执行和验证的重要性。该基准测试涵盖了多种医学成像和多模态推理任务，组织了一个统一的五阶段工作流程。通过对数千次运行的分析，结果显示，当前的代理在执行管道方面表现较好，但在验证其可靠性方面仍有待提高。'}}}, {'id': 'https://huggingface.co/papers/2605.30288', 'title': 'MIRA: Mid-training Rubric Anchoring for Source-Aware Data Selection', 'url': 'https://huggingface.co/papers/2605.30288', 'abstract': 'Abstract MIRA is a source-aware filtering framework for mid-training data selection in LLM development that uses self-anchored rubric discovery to balance scalability and semantic accuracy across heterogeneous data sources.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mid-training has become an important stage in modern LLM development, using large-scale curated mixtures to strengthen capabilities before final post-training. Its data selection problem is distinct: the data are optimized under a pretraining-style objective at near-pretraining scale, but are curated toward downstream capabilities and drawn from heterogeneous sources with different formats and training roles. As a result, effective selection requires both scalability and source-adaptive semantic criteria. Existing model-based methods scale well, but provide only implicit quality signals. Semantic selection methods offer stronger judgments, but usually assume fixed rubrics or standardized data formats. To address this mismatch, we propose MIRA, a source-aware filtering framework based on self-anchored rubric discovery. The key idea is to make rubric construction part of data selection: MIRA first discovers what should be evaluated for each source group, then distills those judgments into scalable student scorers for full-corpus filtering. On code-oriented mid-training with 21 sources and 5 source groups, MIRA outperforms selection baselines across nine code benchmarks and matches the full-corpus run while using only half the tokens.', 'score': 19, 'issue_id': 2367, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '18647284c5a76617', 'authors': ['Haowen Wang', 'Yaxin Du', 'Jian Yang', 'Jiajun Wu', 'Shukai Liu', 'Yuxuan Zhang', 'Pingjie Wang', 'Siheng Chen', 'Tuney Zheng', 'Ming Zhou', 'Xianglong Liu', 'Bryan Dai'], 'affiliations': ['Beihang University', 'IQuest Research', 'Langboat', 'Shanghai Jiao Tong University', 'University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2605.30288.jpg', 'data': {'categories': ['#data', '#training', '#plp'], 'emoji': '🔍', 'ru': {'title': 'Умный отбор данных через самостоятельное открытие критериев качества', 'desc': 'MIRA — это фреймворк для отбора данных на этапе mid-training при разработке больших языковых моделей, который использует самоанкорированное открытие критериев оценки. Метод решает проблему выбора данных из гетерогенных источников с разными форматами, балансируя между масштабируемостью и семантической точностью оценки качества. В отличие от существующих подходов, MIRA интегрирует построение критериев прямо в процесс отбора: сначала система открывает, что нужно оценивать для каждой группы источников, затем дистиллирует эти суждения в масштабируемые student-модели для фильтрации всего корпуса. На наборе данных с 21 источником MIRA достигает результатов, сопоставимых с использованием полного корпуса, но требует только половину токенов.'}, 'en': {'title': 'MIRA: Smart Data Selection for Better LLM Training', 'desc': 'MIRA is a framework designed to improve data selection during the mid-training phase of large language model (LLM) development. It utilizes self-anchored rubric discovery to create adaptable evaluation criteria that consider the diverse sources of training data. This approach balances the need for scalability with the requirement for semantic accuracy, allowing for effective filtering of data from various formats and roles. In tests, MIRA demonstrated superior performance in code-oriented tasks, achieving results comparable to full-corpus runs while using significantly fewer tokens.'}, 'zh': {'title': 'MIRA：源感知的中期训练数据选择框架', 'desc': 'MIRA是一个源感知的过滤框架，用于大规模语言模型（LLM）开发中的中期训练数据选择。它通过自锚定的评分标准发现，平衡了来自不同数据源的可扩展性和语义准确性。MIRA的核心思想是将评分标准的构建纳入数据选择过程，首先发现每个源组应评估的内容，然后将这些判断提炼成可扩展的评分器进行全语料过滤。在代码导向的中期训练中，MIRA在九个代码基准测试中超越了选择基线，并在仅使用一半的标记的情况下匹配了全语料运行的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.01599', 'title': 'TRON: Targeted Rule-Verifiable Online Environments for Visual Reasoning RL', 'url': 'https://huggingface.co/papers/2606.01599', 'abstract': 'Abstract TRON enables scalable and controllable reinforcement learning for visual reasoning through an online environment substrate that generates unlimited diverse training instances with verifiable answers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) for visual reasoning needs scalable, verifiable, and controllable training signals. Existing visual RL post-training trains on static curated datasets, with fixed image-question-answer samples bounded by their collection budget. In this work, we introduce TRON (Targeted, Rule-verifiable Online eNvironments), an online environment substrate: a training rollout is generated on demand by a controllable generator-verifier program that samples a fresh latent visual state, renders an image, asks a question, and exactly verifies the answer. A single run can therefore draw an unbounded stream of fresh instances at the difficulty level required by the current curriculum. The current TRON suite contains 520 environments organized into five ability buckets (spatial, mathematical, diagram, pattern/logic, and counting); the same substrate supports both a single full model trained on all buckets and per-bucket ability-specialist models, with no additional data collection. We also introduce a substrate analysis covering generation reliability, instance and level diversity, cross-environment near-duplicates, and base-model pass rate by difficulty level. RL post-training with METHOD consistently improves performance on ten external multimodal reasoning benchmarks across Qwen3-VL-4B, Qwen2.5-VL-7B, and MiMo-VL-7B-SFT.', 'score': 16, 'issue_id': 2365, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'ed887f7010bdbf79', 'authors': ['Tianze Yang', 'Yucheng Shi', 'Ruitong Sun', 'Jingyuan Huang', 'Ninghao Liu', 'Jin Sun'], 'affiliations': ['University of Georgia'], 'pdf_title_img': 'assets/pdf/title_img/2606.01599.jpg', 'data': {'categories': ['#dataset', '#optimization', '#benchmark', '#reasoning', '#cv', '#rl', '#training', '#multimodal'], 'emoji': '🎓', 'ru': {'title': 'Бесконечные верифицируемые окружения для обучения визуального рассуждения', 'desc': 'TRON представляет собой онлайн-среду для обучения с подкреплением визуальных моделей рассуждения, которая генерирует неограниченное количество разнообразных тренировочных примеров с верифицируемыми ответами. В отличие от существующих подходов, использующих статические наборы данных, TRON динамически создаёт задачи на лету через управляемую программу генератора-верификатора, которая может адаптироваться к уровню сложности в процессе обучения. Набор содержит 520 окружений, организованных по пяти категориям способностей (пространственное мышление, математика, диаграммы, логика и счёт), позволяя обучать как универсальные, так и специализированные модели. Экспериментальные результаты демонстрируют улучшение производительности на десяти внешних мультимодальных бенчмарках благодаря RL post-training.'}, 'en': {'title': 'TRON: Unlimited Training for Visual Reasoning in RL', 'desc': "TRON is a novel framework that enhances reinforcement learning (RL) for visual reasoning by providing an online environment that generates diverse training instances with guaranteed correct answers. Unlike traditional methods that rely on static datasets, TRON creates training scenarios on demand, allowing for scalable and controllable learning experiences. It features a generator-verifier system that produces fresh visual states, images, and questions, ensuring that the training material is tailored to the learner's current skill level. The TRON suite includes 520 environments categorized by different reasoning abilities, enabling both comprehensive and specialized training without the need for additional data collection."}, 'zh': {'title': 'TRON：无限生成的视觉推理训练环境', 'desc': 'TRON是一种增强学习框架，旨在通过在线环境生成多样化的训练实例来提升视觉推理能力。它能够实时生成图像、问题和可验证的答案，从而提供可控的训练信号。与传统的静态数据集不同，TRON可以根据当前的学习需求生成无限的训练样本。该系统包含520个环境，支持不同能力的模型训练，显著提高了在多模态推理基准上的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.03920', 'title': 'Benchmarking Visual State Tracking in Multimodal Video Understanding', 'url': 'https://huggingface.co/papers/2606.03920', 'abstract': "Abstract Current multimodal large language models struggle with visual state tracking in videos, performing poorly even when human-level capabilities are required, and existing agentic approaches do not effectively address these limitations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Understanding a video requires more than recognizing isolated moments, as humans continuously track entities, states, and events over time. This capacity for visual state tracking is fundamental to video understanding, yet remains underexplored in current evaluations of Multimodal Large Language Models (MLLMs). We introduce Visual STAte Tracking benchmark (VSTAT), a video-based benchmark designed to diagnose visual state tracking in MLLMs. VSTAT consists of 834 clips drawn from both synthetic and real-world videos, paired with 1,500 questions that cannot be answered from any single frame or short segment, requiring continuous perception and integration of events across the entire video stream. Despite their strong performance on existing video benchmarks, we find that state-of-the-art MLLMs perform far below humans and only modestly above answer-prior baselines. To analyze this gap, we compare MLLMs' thinking traces with the underlying video stream to understand why and when MLLMs fail on VSTAT. We find that MLLMs reason and track correctly in text, but fail at visually perceiving the events they need to track. Finally, our preliminary evaluation suggests that recent agentic approaches, including MLLM-based video agents and coding agents, do not readily resolve these failures, still falling short on VSTAT.", 'score': 15, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '69ce8d267bb230fa', 'authors': ['Sihyun Yu', 'Nanye Ma', 'Pinzhi Huang', 'Hyunseok Lee', 'Shusheng Yang', 'June Suk Choi', 'Ellis Brown', 'Oscar Michel', 'Boyang Zheng', 'Jinwoo Shin', 'Saining Xie'], 'affiliations': ['KAIST', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03920.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#interpretability', '#long_context', '#synthetic', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Диагностика слепоты языковых моделей к визуальному отслеживанию состояния в видео', 'desc': 'В работе представлен новый бенчмарк VSTAT для оценки способности мультимодальных больших языковых моделей (MLLM) отслеживать визуальное состояние в видео. Бенчмарк содержит 834 видеоклипа и 1500 вопросов, которые невозможно ответить из одного кадра и требуют непрерывного восприятия событий на протяжении всего видео. Авторы обнаружили, что современные MLLM значительно отстают от человека в этой задаче, при этом их рассуждения в тексте остаются корректными, но визуальное восприятие необходимых событий нарушается. Исследование показывает, что даже агентные подходы, основанные на MLLM и кодировании, не решают выявленные проблемы отслеживания состояния.'}, 'en': {'title': 'Enhancing Video Understanding: Bridging the Gap in Visual State Tracking', 'desc': "This paper addresses the limitations of multimodal large language models (MLLMs) in visual state tracking within videos. It introduces the Visual STAte Tracking benchmark (VSTAT), which evaluates MLLMs' ability to continuously perceive and integrate information across video clips. The study reveals that while MLLMs perform well on traditional benchmarks, they significantly underperform compared to humans on VSTAT, particularly in visually tracking events. The authors analyze the reasoning processes of MLLMs and find that their failures stem from inadequate visual perception, indicating that current agentic approaches do not effectively improve their performance."}, 'zh': {'title': '提升视频理解的视觉状态跟踪能力', 'desc': '当前的多模态大型语言模型在视频中的视觉状态跟踪方面表现不佳，尤其是在需要人类水平能力的情况下。理解视频不仅仅是识别孤立的瞬间，人类能够持续跟踪实体、状态和事件。我们提出了视觉状态跟踪基准（VSTAT），这是一个旨在诊断多模态大型语言模型视觉状态跟踪能力的视频基准。尽管现有模型在其他视频基准上表现良好，但在VSTAT上，它们的表现远低于人类，且仅略高于基线水平。'}}}, {'id': 'https://huggingface.co/papers/2606.03979', 'title': 'Language Models Need Sleep: Learning to Self-Modify and Consolidate Memories', 'url': 'https://huggingface.co/papers/2606.03979', 'abstract': "Abstract Deep learning models with sleep and dreaming paradigms enable continual learning through memory consolidation and self-improvement phases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The past few decades have witnessed significant advances in the design of machine learning algorithms, from early studies on task-specific shallow models to more general deep Large Language Models (LLMs). Despite showing promising results in tasks that require instant prediction or in-context learning, existing models lack the ability to continually learn and effectively transfer their temporal in-context knowledge to their long-term parameters. Inspired by human learning process, we introduce a ''Sleep'' paradigm that allows the models to continually learn, distill their short-term fragile memories into stable long-term knowledge with replay, and recursively improve themselves with ''Dreaming'' process. In more detail, sleep consists of two stages: (1) Memory Consolidation: an upward distillation process, called Knowledge Seeding, where the memories of a smaller-self are distilled into a larger network to provide more capacity while preserving the knowledge. As a proof of concept, we present a new Generalized Distillation process for {Knowledge Seeding} (i.e., the combination of on-policy distillation with Reinforcement Learning (RL)-based imitation learning); (2) Dreaming: a self-improvement phase, where the model uses RL to generate a curriculum of synthetic data to rehearse new knowledge and refine existing capabilities without human supervision. Our experiments on long-horizon, continual learning, knowledge incorporation, and few-shot generalization tasks support the importance of the sleep stage.", 'score': 14, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '1d592ee347403532', 'authors': ['Ali Behrouz', 'Farnoosh Hashemi', 'Vahab Mirrokni'], 'affiliations': ['Cornell University', 'Google'], 'pdf_title_img': 'assets/pdf/title_img/2606.03979.jpg', 'data': {'categories': ['#training', '#architecture', '#rl'], 'emoji': '😴', 'ru': {'title': 'Непрерывное обучение через сон и сновидения: консолидация памяти для самосовершенствования моделей', 'desc': 'В работе предложена парадигма «Сна» для непрерывного обучения глубоких нейросетей, вдохновленная человеческим процессом обучения. Парадигма включает два этапа: консолидация памяти, где знания из меньшей сети дистиллируются в большую через процесс обобщенной дистилляции и обучение с подкреплением, и фаза «Сновидений», где модель самостоятельно генерирует синтетические данные для улучшения своих способностей. Предложенный подход позволяет моделям эффективно перемещать краткосрочные знания из контекста в долгосрочные параметры и рекурсивно улучшать себя без человеческого надзора. Экспериментальные результаты на задачах непрерывного обучения, долгосрочного планирования и обобщения на небольших наборах данных демонстрируют важность предложенной парадигмы.'}, 'en': {'title': 'Unlocking Continual Learning Through Sleep and Dreaming in AI', 'desc': "This paper presents a novel approach to continual learning in deep learning models by mimicking human sleep and dreaming processes. The proposed 'Sleep' paradigm allows models to consolidate short-term memories into long-term knowledge through a two-stage process: Memory Consolidation and Dreaming. Memory Consolidation involves distilling knowledge from a smaller model into a larger one, enhancing capacity while retaining information. The Dreaming phase enables self-improvement by generating synthetic data for the model to practice and refine its skills autonomously, leading to better performance in various learning tasks."}, 'zh': {'title': '通过睡眠与梦境实现持续学习的深度学习模型', 'desc': '这篇论文介绍了一种新的深度学习模型，通过引入“睡眠”和“梦境”范式来实现持续学习。模型在“睡眠”阶段进行记忆巩固，将短期记忆转化为长期知识，并在“梦境”阶段自我改进。具体来说，记忆巩固包括知识播种的过程，将小模型的记忆提炼到大模型中，以保留知识并增加容量。实验结果表明，这种睡眠阶段对长期学习和知识整合具有重要意义。'}}}, {'id': 'https://huggingface.co/papers/2606.03159', 'title': 'NVIDIA OmniDreams: Real-Time Generative World Model for Closed-Loop Autonomous Vehicle Simulation', 'url': 'https://huggingface.co/papers/2606.03159', 'abstract': 'Abstract OmniDreams, a foundation generative world model trained from the Cosmos diffusion model, enables real-time action-conditioned video generation for autonomous driving policy evaluation in complex, unseen scenarios.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As autonomous vehicle capabilities advance, the safe evaluation of driving policies in long-tail scenarios remains a critical bottleneck. In closed-loop simulation, the driving policy model actively interacts with the environment, where its actions dynamically update the simulator state and directly influence the next set of generated sensor observations. While recent reconstruction-based neural simulators offer photorealism, they are fundamentally constrained by their initial captured data and struggle to generalize to highly dynamic or novel scenes. To overcome these limitations, we introduce OmniDreams, a foundation generative world model mid- and post-trained from the Cosmos diffusion model to autoregressively generate action-conditioned videos in real time. By leveraging the rich visual priors of Cosmos and mid- and post-training on 21k hours of driving scenarios, OmniDreams synthesizes complex, unobserved phenomena that are hard for traditional simulators to capture, such as extreme weather and unpredictable dynamic agent behaviors. Crucially, it autoregressively conditions its photorealistic sensor generation on past frames, the current simulator state, and immediate driving actions. Deployed in a closed-loop system with the Alpamayo 1 policy model and AlpaSim orchestrator, OmniDreams acts as a highly responsive, reactive environment, providing a scalable and comprehensive solution for training and evaluating next-generation autonomous driving policies. We additionally show preliminary results indicating that a world-action model (WAM) post-trained from OmniDreams achieves strong performance on the Physical AI Autonomous Vehicles NuRec dataset, surpassing the VLA-based Alpamayo 1.5 research policy model while using only 1/5 the total parameters. These results highlight the potential for a real-time world model like OmniDreams to also serve as a backbone for policy architectures.', 'score': 13, 'issue_id': 2364, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '3d290f2c97003a0c', 'authors': ['NVIDIA', ':', 'Aarti Basant', 'Amlan Kar', 'Despoina Paschalidou', 'Fangyin Wei', 'Francesco Ferroni', 'Guillermo Garcia Cobo', 'Haithem Turki', 'Huan Ling', 'Jaewoo Seo', 'James Lucas', 'Jay Zhangjie Wu', 'Jialiang Wang', 'Jonathan Lorraine', 'Jun Gao', 'Kai He', 'Katarina Tothova', 'Kevin Xie', 'Michał Tyszkiewicz', 'Qi Wu', 'Riccardo de Lutio', 'Ruilong Li', 'Sanja Fidler', 'Seung Wook Kim', 'Tianchang Shen', 'Tianshi Cao', 'Tobias Pfaff', 'William Lew', 'Xindi Wu', 'Xuanchi Ren', 'Yifan Lu', 'Yuxuan Zhang', 'Zan Gojcic', 'Zian Wang'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.03159.jpg', 'data': {'categories': ['#training', '#video', '#multimodal', '#diffusion', '#robotics', '#optimization'], 'emoji': '🚗', 'ru': {'title': 'Генеративный мир для обучения автономного вождения в реальном времени', 'desc': 'OmniDreams — это обобщённая генеративная модель мира, созданная на основе диффузионной модели Cosmos, которая в реальном времени генерирует видео, обусловленные действиями агента. Модель обучена на 21 тысяче часов сценариев вождения и способна синтезировать сложные явления, которые традиционные симуляторы не могут захватить, такие как экстремальная погода и непредсказуемое поведение динамических объектов. OmniDreams используется в замкнутом контуре управления вместе с моделью политики Alpamayo для обучения и оценки политик автономного вождения в редких и незнакомых сценариях. Модель демонстрирует практическое применение генеративных подходов для создания реалистичных симуляторов, которые превосходят традиционные методы по способности обобщаться на новые ситуации.'}, 'en': {'title': 'Revolutionizing Autonomous Driving Evaluation with OmniDreams', 'desc': 'OmniDreams is a generative world model designed for real-time video generation to evaluate autonomous driving policies in complex scenarios. It uses the Cosmos diffusion model to create realistic simulations that adapt to the actions of the driving policy, allowing for dynamic interaction with the environment. Unlike traditional simulators, which are limited by their initial data, OmniDreams can generate novel situations, such as extreme weather and unpredictable behaviors, by leveraging extensive training on diverse driving scenarios. This innovative approach not only enhances the realism of simulations but also improves the training and evaluation of next-generation autonomous driving systems.'}, 'zh': {'title': 'OmniDreams：实时生成复杂驾驶场景的智能模型', 'desc': 'OmniDreams是一种基础生成世界模型，利用Cosmos扩散模型进行训练，能够实时生成基于动作的驾驶视频，以评估复杂场景下的自动驾驶策略。该模型通过与环境的闭环交互，动态更新模拟器状态，从而影响生成的传感器观察。与传统的重建神经模拟器相比，OmniDreams能够合成极端天气和不可预测的动态行为等复杂现象，克服了初始数据的限制。通过在21,000小时的驾驶场景上进行中后期训练，OmniDreams为下一代自动驾驶政策的训练和评估提供了可扩展的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.03911', 'title': 'Bootstrap Your Generator: Unpaired Visual Editing with Flow Matching', 'url': 'https://huggingface.co/papers/2606.03911', 'abstract': "Abstract Bootstrap Your Generator framework enables unpaired training of flow matching editing models by leveraging base model knowledge and gradient routing for improved generalization in data-scarce scenarios.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern generative models possess a deep understanding of visual content, yet training them for image editing typically requires massive datasets of paired examples. This limits scalability, especially for video editing where collecting paired data is prohibitively expensive. We propose Bootstrap Your Generator (ByG), a general framework for unpaired training of flow matching editing models. It leverages the base model's knowledge without any external signal. Our approach pairs instruction-following cues extracted from the frozen model with cycle-consistency for structure preservation. To make this tractable, we propose to route gradients from downstream losses over clean predictions to noisy training states. We demonstrate state-of-the-art results on challenging data-scarce image and video editing scenarios. Extensive evaluations and user studies show that our method effectively generalizes to unseen domains and outperforms supervised baselines trained on millions of samples. Analysis reveals that our gradient routing bridges the train-inference gap, and extracting semantic cues from a base model provides a robust training signal that obviates the need for external reward models.", 'score': 12, 'issue_id': 2367, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '3357e278ef32d490', 'authors': ['Yoad Tewel', 'Yuval Atzmon', 'Gal Chechik', 'Lior Wolf'], 'affiliations': ['NVIDIA', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03911.jpg', 'data': {'categories': ['#video', '#training', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Обучение моделей редактирования без парных данных через знания базовой модели', 'desc': 'Статья представляет фреймворк Bootstrap Your Generator для обучения моделей редактирования изображений на основе flow matching без парных данных. Метод использует знания базовой модели и градиентную маршрутизацию для улучшения обобщения в сценариях с недостатком данных. Авторы применяют инструкции, извлеченные из замороженной модели, в сочетании с циклической консистентностью для сохранения структуры контента. Экспериментальные результаты показывают, что метод достигает лучших результатов в редактировании изображений и видео, превосходя контролируемые подходы, обученные на миллионах примеров.'}, 'en': {'title': 'Unpaired Training for Enhanced Image and Video Editing', 'desc': 'The Bootstrap Your Generator (ByG) framework allows for training flow matching editing models without needing paired data, which is often hard to obtain. It utilizes knowledge from a base model and employs gradient routing to enhance generalization, especially in situations with limited data. By combining instruction-following cues from a frozen model with cycle-consistency, ByG maintains the structure of images during editing. This method has shown to achieve superior results in both image and video editing tasks compared to traditional supervised methods, demonstrating its effectiveness in unseen domains.'}, 'zh': {'title': '无配对训练，提升生成模型的编辑能力', 'desc': '本文提出了一种名为"Bootstrap Your Generator"（ByG）的框架，旨在实现无配对数据的流匹配编辑模型训练。该方法利用基础模型的知识，通过梯度路由来提高在数据稀缺场景下的泛化能力。ByG结合了从冻结模型中提取的指令提示和循环一致性，以保持结构的完整性。实验结果表明，该方法在图像和视频编辑任务中表现出色，超越了传统的监督学习基线。'}}}, {'id': 'https://huggingface.co/papers/2606.02754', 'title': 'Ψ-Bench: Evaluating Persona-Sensitive Influencing in Persuasive Dialogues', 'url': 'https://huggingface.co/papers/2606.02754', 'abstract': "Abstract LLMs demonstrate limited effectiveness in persuasive conversation despite generating coherent arguments, with user-specific profiles significantly improving performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Personalization is a crucial capability of modern language agents. However, current research primarily positions personalized agents as passive responders to user preferences, limiting their ability to interact with users and provide suggestions or guidance proactively. To systematically evaluate such proactive personalization in realistic interactions, we propose Ψ-Bench, a benchmark for assessing LLMs' ability to influence realistic users through conversation. We design three real-world interaction scenarios that involve persuasion in Ψ-Bench, and endow simulated clients with personal characteristics through explicit user profiles derived from dialogue histories. We evaluate 10 frontier LLMs on Ψ-Bench and find that while most models can produce coherent and reasonable arguments, even state-of-the-art models still leave considerable room for improvement in persuasion. We also find that providing access to client profiles yields an average performance gain of 18.24\\%, highlighting the importance of user-specific information for effective persuasion. Overall, our work highlights persona-sensitive influencing as a challenging yet practical direction for evaluating and developing more proactive personalized LLM agents. Codes are available at: https://github.com/Hanpx20/Psi-Bench.", 'score': 11, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd591a5b16694e2d4', 'authors': ['Peixuan Han', 'Hongyi Du', 'Jiayu Liu', 'Yihang Sun', 'Yutong Liu', 'Jiaxuan You'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.02754.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Персонализированное убеждение: когда LLM должны влиять, а не просто отвечать', 'desc': 'В этой статье исследуется способность больших языковых моделей к убедительному общению с пользователями в реалистичных сценариях. Авторы предлагают Ψ-Bench, бенчмарк для оценки проактивной персонализации LLM, где модели должны влиять на поведение пользователей через диалог. Результаты показывают, что хотя современные модели генерируют связные аргументы, они значительно отстают в эффективности убеждения, а доступ к профилям пользователей улучшает качество на 18.24%. Исследование подчеркивает важность учета индивидуальных характеристик пользователя для разработки более продвинутых персонализированных языковых агентов.'}, 'en': {'title': 'Enhancing Persuasion in LLMs through User Personalization', 'desc': "This paper discusses the limitations of large language models (LLMs) in engaging users persuasively, despite their ability to generate coherent arguments. It introduces Ψ-Bench, a new benchmark designed to evaluate how well LLMs can influence users through personalized conversations. The study shows that incorporating user-specific profiles significantly enhances the models' persuasive capabilities, with an average performance improvement of 18.24%. The findings suggest that proactive personalization, where models actively guide and suggest to users, is a crucial area for future research in developing more effective conversational agents."}, 'zh': {'title': '个性化影响力：提升对话模型的说服能力', 'desc': '本论文探讨了大型语言模型（LLMs）在说服性对话中的局限性，尽管它们能够生成连贯的论点。研究表明，用户特定的个人资料显著提高了模型的表现。我们提出了Ψ-Bench，一个用于评估LLMs在真实对话中影响用户能力的基准，设计了三种涉及说服的真实互动场景。结果显示，尽管大多数模型能够生成合理的论点，但在说服能力上仍有很大的提升空间，强调了个性化信息在有效说服中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.01048', 'title': 'Decoupled Residual Denoising Diffusion Models for Unified and Data Efficient Image-to-Image Translation', 'url': 'https://huggingface.co/papers/2606.01048', 'abstract': 'Abstract Decoupled Residual Denoising Diffusion models (DRDD) improve unified image-to-image translation by separating noise diffusion for domain harmonization from residual diffusion for semantic mapping, enhancing data efficiency and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose Decoupled Residual Denoising Diffusion models (DRDD) for unified and data-efficient image-to-image (I2I) translation. While diffusion models have advanced I2I translation in terms of quality and diversity, we uncover a previously under-explored property in diffusion models. Crucially, beyond its conventional role of manifold lifting (i.e., moving data off low-dimensional manifolds), injecting Gaussian noise facilitates domain harmonization by implicitly aligning feature distributions across domains, a property particularly advantageous for unified I2I translation. However, existing diffusion models prematurely erode this harmonization effect, as noise and residuals are simultaneously removed in a single coupled diffusion process. To address this, DRDD decouples the diffusion process into two sequential and independent diffusion stages: (1) a stochastic noise diffusion for domain harmonization and manifold lifting, and (2) a deterministic residual diffusion that learns the core semantic mapping entirely within the fixed-noise domain. This decoupling preserves harmonization and manifold lifting effects throughout the transformation, substantially simplifying the learning of unified mappings across diverse tasks and domains. Notably, the noise diffusion stage is trained exclusively on abundant, unpaired target-domain images, greatly improving data efficiency. Comprehensive theoretical and empirical analysis demonstrates that DRDD is broadly compatible with mainstream diffusion models and consistently delivers robust, unified I2I translation, even under limited paired data. Our code is available at https://github.com/HKU-HealthAI/DRDD.', 'score': 11, 'issue_id': 2365, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '1b70fe93b82d6fb2', 'authors': ['Ziyue Lin', 'Jiahe Hou', 'Hongyu Xia', 'Xinrui Xie', 'Feifei Wang', 'Yuyin Zhou', 'Wei Wang', 'Jiawei Liu', 'Liangqiong Qu'], 'affiliations': ['Shenyang Institute of Automation, Chinese Academy of Sciences', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'University of California, Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2606.01048.jpg', 'data': {'categories': ['#open_source', '#architecture', '#cv', '#training', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Развязанная диффузия: разделение гармонизации и трансформации для универсального перевода изображений', 'desc': 'В работе предложены Decoupled Residual Denoising Diffusion models (DRDD) для задачи преобразования изображений между доменами. Авторы показали, что добавление гауссовского шума в диффузионные модели помогает гармонизировать распределения признаков между доменами, но существующие модели теряют этот эффект. Решение заключается в разделении процесса диффузии на два этапа: стохастическую диффузию шума для гармонизации доменов и детерминированную диффузию остатков для семантического отображения. Такое разделение улучшает эффективность обучения на ограниченных парных данных и обеспечивает единообразное преобразование изображений между различными задачами.'}, 'en': {'title': 'Decoupling for Enhanced Image Translation Efficiency', 'desc': 'The paper introduces Decoupled Residual Denoising Diffusion models (DRDD) to enhance image-to-image translation by separating the processes of noise diffusion and residual diffusion. This separation allows for better domain harmonization and semantic mapping, improving the efficiency and performance of the model. By decoupling these processes, DRDD maintains the benefits of noise diffusion while learning the essential mappings in a fixed-noise environment. The approach is shown to be effective even with limited paired data, making it a significant advancement in the field of diffusion models for image translation.'}, 'zh': {'title': '解耦残差去噪扩散模型：提升图像翻译效率', 'desc': '本文提出了一种新的模型，称为解耦残差去噪扩散模型（DRDD），用于统一和高效的数据图像到图像（I2I）翻译。该模型通过将噪声扩散和残差扩散分开，增强了数据的利用效率和性能。DRDD的第一阶段进行随机噪声扩散，以实现领域的协调，而第二阶段则进行确定性残差扩散，专注于语义映射。通过这种解耦，DRDD在不同任务和领域之间的统一映射学习变得更加简单，同时保持了领域协调的效果。'}}}, {'id': 'https://huggingface.co/papers/2606.03102', 'title': 'Small RL Controller, Large Language Model: RL-Guided Adaptive Sampling for Test-Time Scaling', 'url': 'https://huggingface.co/papers/2606.03102', 'abstract': 'Abstract Adaptive sampling for large language models is formulated as a Markov decision process and optimized using reinforcement learning to balance correctness, latency, and computational cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Test-time scaling improves the reasoning performance of large language models but incurs substantial cost in both total computation and latency. Existing adaptive sampling methods partially mitigate this issue by dynamically deciding when to stop sampling, yet they typically rely on heuristic rules or rely on distribution assumptions. In this work, we formulate adaptive sampling as a Markov decision process (MDP). We train a lightweight sampling controller with reinforcement learning (RL) to jointly balance answer correctness, latency, and computation cost. At each round, the controller decides to stop sampling or to acquire additional samples. Our method is lightweight which only relies on statistics of final answers, and can be trained and deployed on CPU. We further show that the resulting framework admits an interpretation as the Lagrangian relaxation of a constrained optimization problem with explicit budget constraints. Experiments against strong baselines such as ASC and ESC show that our method achieves improved trade-offs among answer correctness, sampling rounds, and total samples required.', 'score': 10, 'issue_id': 2365, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '99408e18bc8a271e', 'authors': ['Runpeng Dai', 'Tong Zheng', 'Rui Liu', 'Chengsong Huang', 'Hongtu Zhu'], 'affiliations': ['University of Maryland, College Park', 'University of North Carolina at Chapel Hill', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2606.03102.jpg', 'data': {'categories': ['#optimization', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Обучаемый контроллер для оптимального выбора количества образцов в LLM', 'desc': 'В работе предлагается новый подход к адаптивной выборке для больших языковых моделей, сформулированный как процесс принятия решений (MDP). Авторы обучают легковесный контроллер с помощью обучения с подкреплением, который одновременно балансирует три конфликтующих критерия: точность ответов, задержку и вычислительные затраты. На каждом шаге контроллер решает, продолжить ли выборку или остановиться, основываясь только на статистике финальных ответов. Метод допускает интерпретацию как релаксация Лагранжа задачи оптимизации с явными бюджетными ограничениями и показывает улучшенные компромиссы по сравнению с существующими методами.'}, 'en': {'title': 'Optimizing Sampling with Reinforcement Learning for Language Models', 'desc': 'This paper presents a new approach to adaptive sampling for large language models by treating it as a Markov decision process (MDP). The authors use reinforcement learning (RL) to create a lightweight controller that optimally decides when to stop sampling based on the trade-offs between correctness, latency, and computational cost. Unlike previous methods that depend on heuristics, this approach relies solely on the statistics of the final answers, making it efficient for deployment on CPUs. The results demonstrate that this method outperforms existing baselines in balancing the quality of answers with the resources used during sampling.'}, 'zh': {'title': '自适应采样：平衡正确性与效率的创
