s': ['Department of Computer Science, TU Darmstadt, Germany', 'Fraunhofer Institute for Computer Graphics Research IGD, Darmstadt, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2604.22841.jpg', 'data': {'categories': ['#benchmark', '#cv'], 'emoji': '👁️', 'ru': {'title': 'Качество лица через внимание трансформера без дополнительного обучения', 'desc': 'Работа предлагает ATTN-FIQA — новый метод оценки качества изображений лиц, использующий предсoftmax-оценки внимания из предварительно обученных Vision Transformer моделей распознавания лиц. Метод основан на гипотезе, что величины внимания в архитектуре трансформера естественным образом кодируют информацию о качестве: высококачественные изображения с характерными чертами лица создают сильные выравнивания запрос-ключ, генерируя сфокусированные паттерны внимания высокой амплитуды, а деградированные изображения производят размытые паттерны низкой амплитуды. Алгоритм извлекает матрицы внимания из последнего блока трансформера, агрегирует информацию из всех голов внимания и вычисляет оценку качества через простое усреднение, требуя только один проход через предварительно обученную модель без модификаций архитектуры и дополнительного обучения. Экспериментальная оценка на восьми эталонных датасетах и четырех моделях распознавания лиц демонстрирует, что оценки качества, основанные на механизме внимания, эффективно коррелируют с качеством изображения и обеспечивают интерпретируемость в пространстве лица.'}, 'en': {'title': 'Harnessing Attention for Face Image Quality Assessment', 'desc': 'ATTN-FIQA is a method that uses attention scores from Vision Transformers to evaluate the quality of face images without needing extra training or changes to the model. It focuses on how these attention scores can indicate the quality of images, with high-quality images showing strong attention patterns and low-quality images showing weak patterns. The approach simplifies the process by only requiring a single forward pass through a pre-trained model to generate quality scores. This method has been tested on multiple datasets and shows that attention scores can effectively reflect image quality while also highlighting important facial features.'}, 'zh': {'title': '利用注意力机制评估面部图像质量', 'desc': 'ATTN-FIQA是一种新颖的面部图像质量评估方法，它利用预训练的视觉变换器模型中的预-softmax注意力分数来评估面部图像的质量，而无需额外的训练或架构修改。该方法假设注意力的强度本质上编码了图像质量：高质量的图像具有明显的面部特征，能够产生强烈的注意力模式，而劣质图像则产生模糊的低强度模式。ATTN-FIQA通过提取最后一个变换器块的预-softmax注意力矩阵，聚合所有补丁的多头注意力信息，并通过简单的平均计算图像级质量分数。通过在八个基准数据集和四个面部识别模型上的全面评估，研究表明基于注意力的质量分数与面部图像质量有效相关，并提供空间可解释性，揭示哪些面部区域对质量判断贡献最大。'}}}, {'id': 'https://huggingface.co/papers/2604.24583', 'title': 'Improving Vision-language Models with Perception-centric Process Reward Models', 'url': 'https://huggingface.co/papers/2604.24583', 'abstract': "Abstract A process reward model called Perceval enables token-level error detection and correction in vision-language models through perception-intensive training and fine-grained supervision during reinforcement learning.  AI-generated summary Recent advancements in reinforcement learning with verifiable rewards (RLVR) have significantly improved the complex reasoning ability of vision-language models (VLMs). However, its outcome-level supervision is too coarse to diagnose and correct errors within the reasoning chain. To this end, we propose Perceval, a process reward model (PRM) that enables token-level error grounding, which can extract image-related claims from the response and compare them one by one with the visual evidence in the image, ultimately returning claims that contain perceptual errors. Perceval is trained with perception-intensive supervised training data. We then integrate Perceval into the RL training process to train the policy models. Specifically, compared to traditional GRPO, which applies sequence-level advantages, we apply token-level advantages by targeting penalties on hallucinated spans identified by Perceval, thus enabling fine-grained supervision signals. In addition to augmenting the training process, Perceval can also assist VLMs during the inference stage. Using Perceval, we can truncate the erroneous portions of the model's response, and then either have the model regenerate the response directly or induce the model to reflect on its previous output. This process can be repeated multiple times to achieve test-time scaling. Experiments show significant improvements on benchmarks from various domains across multiple reasoning VLMs trained with RL, highlighting the promise of perception-centric supervision as a general-purpose strategy. For test-time scaling, it also demonstrates consistent performance gains over other strategies, such as major voting. Our code and data will be publicly released at https://github.com/RUCAIBox/Perceval.", 'score': 1, 'issue_id': 2071, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'aa673bc67036f982', 'authors': ['Yingqian Min', 'Kun Zhou', 'Yifan Li', 'Yuhuan Wu', 'Han Peng', 'Yifan Du', 'Wayne Xin Zhao', 'Min Yang', 'Ji-Rong Wen'], 'affiliations': ['Bytedance', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'The Hong Kong University of Science and Technology', 'University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2604.24583.jpg', 'data': {'categories': ['#open_source', '#optimization', '#training', '#reasoning', '#hallucinations', '#multimodal', '#rlhf', '#rl', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Восприятие-ориентированное вознаграждение для точного исправления ошибок в визуально-языковых моделях', 'desc': 'В этой работе представлена Perceval — модель вознаграждения процесса, которая выявляет и исправляет ошибки на уровне отдельных токенов в визуально-языковых моделях. Модель обучается на восприятие-интенсивных данных и выполняет сравнение утверждений из ответа модели с визуальными доказательствами в изображении. Во время обучения с подкреплением Perceval применяет поощрения и штрафы на уровне токенов вместо уровня последовательности, обеспечивая более тонкую градацию сигналов обучения. Кроме того, модель может использоваться на этапе инференса для итеративного исправления ошибочных частей ответа и достижения масштабирования во время тестирования.'}, 'en': {'title': 'Perceval: Fine-Grained Error Correction for Vision-Language Models', 'desc': 'The paper introduces Perceval, a process reward model designed to enhance vision-language models (VLMs) by enabling token-level error detection and correction. It addresses the limitations of traditional reinforcement learning with verifiable rewards (RLVR) by providing fine-grained supervision that focuses on individual tokens rather than entire sequences. By comparing image-related claims with visual evidence, Perceval identifies perceptual errors and applies targeted penalties during training. This approach not only improves the training process but also allows for iterative refinement of model outputs during inference, leading to better performance across various reasoning tasks.'}, 'zh': {'title': 'Perceval：提升视觉语言模型的感知能力', 'desc': 'Perceval是一种过程奖励模型，旨在通过感知密集训练和细粒度监督来实现视觉语言模型中的逐标记错误检测和修正。与传统的结果级监督不同，Perceval能够在推理链中逐个比较图像相关的声明与视觉证据，从而识别出感知错误。通过将Perceval集成到强化学习训练过程中，我们能够对模型的输出进行更精细的监督，提升模型的推理能力。实验结果表明，Perceval在多个领域的基准测试中显著提高了视觉语言模型的性能，展示了感知中心监督的广泛应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.23772', 'title': 'PageGuide: Browser extension to assist users in navigating a webpage and locating information', 'url': 'https://huggingface.co/papers/2604.23772', 'abstract': 'Abstract PageGuide is a browser extension that enhances AI assistant interactions by providing visual grounding of responses in web page elements, improving verification, guidance, and focus during web browsing tasks.  AI-generated summary Users browsing the web daily struggle to quickly locate relevant information in cluttered pages, complete unfamiliar multi-step tasks, and stay focused amid distracting content. State-of-the-art AI assistants (e.g., ChatGPT, Gemini, Claude) and browser agents (e.g., OpenAI Operator, Browser Use) can answer questions and automate actions, yet they return answers without showing where the information comes from on the page, forcing users to manually verify results and blindly trust every automated steps. We present PageGuide, a browser extension that grounds LLM answers directly in the HTML DOM via visual overlays, addressing three core user needs: (a) Find-locating and highlighting relevant evidence in-situ so users can instantly verify answers on the page; (b) Guide-showing step-by-step instructions (e.g. how to change password) one at a time so users can follow and perform actions by themselves; and (c) Hide-hiding distracting content-giving users a chance to decide to hide an element or not. In a user study (N=94), PageGuide outperform unaided browsing across all modes: Hide accuracy improve by 26 percentage points (86.7% relative gain) and task completion time drops by 70%; Guide completion rate increases by 30 percentage points; and Find reduces manual search effort, with Ctrl+F usage falling by 80% and task time decreasing by 19%. Code and demo is at: pageguide.github.io.', 'score': 1, 'issue_id': 2073, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': '73323be25d976b43', 'authors': ['Tin Nguyen', 'Thang T. Truong', 'Runtao Zhou', 'Trung Bui', 'Chirag Agarwal', 'Anh Totti Nguyen'], 'affiliations': ['Auburn University', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2604.23772.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Видимая навигация: как сделать ответы AI прозрачными и проверяемыми', 'desc': 'PageGuide — это расширение для браузера, которое улучшает взаимодействие с AI-ассистентами путём визуального привязки ответов к элементам веб-страницы. Расширение решает три основные задачи: поиск информации с выделением доказательств на странице, пошаговое руководство по выполнению действий и скрытие отвлекающего контента. Система использует визуальные оверлеи, чтобы показать, где именно на HTML-странице находятся ответы LLM, позволяя пользователям самостоятельно проверить результаты вместо слепого доверия к ИИ. Результаты пользовательского исследования показали значительное улучшение: точность на 26 процентных пункта выше, время выполнения задач сокращено на 70%, а использование поиска по странице снизилось на 80%.'}, 'en': {'title': 'Enhancing AI Interactions with Visual Grounding', 'desc': 'PageGuide is a browser extension designed to enhance user interactions with AI assistants by visually linking their responses to specific elements on web pages. It addresses common challenges faced by users, such as finding relevant information, following multi-step tasks, and maintaining focus amidst distractions. By providing visual overlays that highlight evidence, offer step-by-step guidance, and allow users to hide distracting content, PageGuide significantly improves the browsing experience. In user studies, it demonstrated substantial improvements in task completion times and accuracy, showcasing its effectiveness in aiding users during web tasks.'}, 'zh': {'title': 'PageGuide：提升网页浏览的智能助手体验', 'desc': 'PageGuide 是一个浏览器扩展，旨在通过在网页元素中提供视觉支持来增强 AI 助手的交互体验。它解决了用户在浏览网页时快速定位相关信息、完成复杂任务和保持专注的难题。通过在 HTML DOM 中直接显示 LLM 的回答，PageGuide 使用户能够即时验证答案、逐步指导操作并隐藏干扰内容。用户研究表明，PageGuide 在所有模式下的表现优于传统浏览，显著提高了任务完成率和效率。'}}}, {'id': 'https://huggingface.co/papers/2604.23644', 'title': 'RaV-IDP: A Reconstruction-as-Validation Framework for Faithful Intelligent Document Processing', 'url': 'https://huggingface.co/papers/2604.23644', 'abstract': 'Abstract Reconstruction as Validation (RaV-IDP) introduces a document processing pipeline that uses reconstruction and comparison against original sources to validate extraction quality, triggering fallback mechanisms when fidelity drops below thresholds.  AI-generated summary Intelligent document processing pipelines extract structured entities (tables, images, and text) from documents for use in downstream systems such as knowledge bases, retrieval-augmented generation, and analytics. A persistent limitation of existing pipelines is that extraction output is produced without any intrinsic mechanism to verify whether it faithfully represents the source. Model-internal confidence scores measure inference certainty, not correspondence to the document, and extraction errors pass silently into downstream consumers.   We present Reconstruction as Validation (RaV-IDP), a document processing pipeline that introduces reconstruction as a first-class architectural component. After each entity is extracted, a dedicated reconstructor renders the extracted representation back into a form comparable to the original document region, and a comparator scores fidelity between the reconstruction and the unmodified source crop. This fidelity score is a grounded, label-free quality signal. When fidelity falls below a per-entity-type threshold, a structured GPT-4.1 vision fallback is triggered and the validation loop repeats. We enforce a bootstrap constraint: the comparator always anchors against the original document region, never against the extraction, preventing the validation from becoming circular.   We further propose a per-stage evaluation framework pairing each pipeline component with an appropriate benchmark. The code pipeline is publicly available at https://github.com/pritesh-2711/RaV-IDP for experimentation and use.', 'score': 1, 'issue_id': 2073, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': '3b003c843d389fc6', 'authors': ['Pritesh Jha'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.23644.jpg', 'data': {'categories': ['#open_source'], 'emoji': '✅', 'ru': {'title': 'Валидация извлечения через реконструкцию документов', 'desc': 'В статье предложена система RaV-IDP для обработки документов, которая использует реконструкцию извлечённых данных и сравнение с исходным источником для валидации качества извлечения. После извлечения каждого элемента специальный реконструктор преобразует данные обратно в исходный формат, а компаратор оценивает верность реконструкции. Когда верность падает ниже установленного порога, система автоматически переходит на резервный механизм с использованием GPT-4 Vision. Предложенный подход обеспечивает объективную оценку качества без разметки данных, так как всегда сравнивает результаты с оригинальным документом.'}, 'en': {'title': 'Ensuring Document Extraction Quality with Reconstruction as Validation', 'desc': 'The paper presents a new method called Reconstruction as Validation (RaV-IDP) for improving the quality of document processing pipelines. This method validates the extraction of structured entities by reconstructing them and comparing them to the original document to ensure accuracy. When the fidelity of the extraction drops below a certain level, a fallback mechanism using GPT-4.1 is activated to re-evaluate the extraction. Additionally, the authors propose a framework for evaluating each component of the pipeline to ensure effective performance and quality control.'}, 'zh': {'title': '重建验证：提升文档提取质量的创新方法', 'desc': '本文提出了一种名为重建作为验证（RaV-IDP）的文档处理管道，旨在通过重建和与原始来源的比较来验证提取质量。当提取的内容与原始文档的对应关系低于设定阈值时，系统会触发回退机制。该方法引入了重建作为一个重要的架构组件，通过专门的重建器将提取的内容转换为可与原始文档区域比较的形式。我们还提出了一个逐阶段评估框架，以便为每个管道组件配备适当的基准。'}}}, {'id': 'https://huggingface.co/papers/2604.23099', 'title': 'ProEval: Proactive Failure Discovery and Efficient Performance Estimation for Generative AI Evaluation', 'url': 'https://huggingface.co/papers/2604.23099', 'abstract': 'Abstract ProEval uses transfer learning with pre-trained Gaussian Processes and Bayesian quadrature to efficiently evaluate generative AI models by identifying failure cases with significantly fewer samples than traditional methods.  AI-generated summary Evaluating generative AI models is increasingly resource-intensive due to slow inference, expensive raters, and a rapidly growing landscape of models and benchmarks. We propose ProEval, a proactive evaluation framework that leverages transfer learning to efficiently estimate performance and identify failure cases. ProEval employs pre-trained Gaussian Processes (GPs) as surrogates for the performance score function, mapping model inputs to metrics such as the severity of errors or safety violations. By framing performance estimation as Bayesian quadrature (BQ) and failure discovery as superlevel set sampling, we develop uncertainty-aware decision strategies that actively select or synthesize highly informative inputs for testing. Theoretically, we prove that our pre-trained GP-based BQ estimator is unbiased and bounded. Empirically, extensive experiments on reasoning, safety alignment, and classification benchmarks demonstrate that ProEval is significantly more efficient than competitive baselines. It requires 8-65x fewer samples to achieve estimates within 1% of the ground truth, while simultaneously revealing more diverse failure cases under a stricter evaluation budget.', 'score': 1, 'issue_id': 2069, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '0fb0763a48865807', 'authors': ['Yizheng Huang', 'Wenjun Zeng', 'Aditi Kumaresan', 'Zi Wang'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2604.23099.jpg', 'data': {'categories': ['#alignment', '#transfer_learning'], 'emoji': '🎯', 'ru': {'title': 'Экономная оценка AI-моделей через байесовскую оптимизацию', 'desc': 'ProEval — это фреймворк для эффективной оценки генеративных моделей AI, использующий трансфер-обучение с предварительно обученными гауссовыми процессами в качестве суррогатных моделей. Метод формулирует задачу оценки производительности как байесовскую квадратуру и поиск отказов как выборку множеств уровня, позволяя активно выбирать информативные примеры для тестирования. Авторы теоретически доказывают несмещённость и ограниченность предложенного оценивателя, основанного на предварительно обученных гауссовых процессах. Экспериментально показано, что ProEval требует в 8-65 раз меньше образцов для достижения оценок в пределах 1% от истинного значения, одновременно выявляя более разнообразные случаи отказа.'}, 'en': {'title': 'ProEval: Efficient Evaluation of Generative AI Models with Transfer Learning', 'desc': 'ProEval is a novel framework designed to enhance the evaluation of generative AI models by utilizing transfer learning techniques. It employs pre-trained Gaussian Processes to create a surrogate model that predicts performance metrics, allowing for efficient identification of failure cases. By applying Bayesian quadrature, ProEval optimizes the selection of test inputs, ensuring that fewer samples are needed to achieve accurate performance estimates. The framework has been shown to be significantly more efficient than traditional methods, requiring up to 65 times fewer samples while uncovering a wider range of failure scenarios.'}, 'zh': {'title': 'ProEval：高效评估生成式AI模型的创新框架', 'desc': 'ProEval是一种利用迁移学习的评估框架，旨在高效评估生成式人工智能模型。它使用预训练的高斯过程作为性能评分函数的替代，能够将模型输入映射到错误严重性或安全违规等指标。通过将性能估计视为贝叶斯积分，并将失败发现视为超水平集采样，ProEval能够主动选择或合成高信息量的测试输入。实验结果表明，ProEval在评估效率上显著优于传统方法，所需样本量减少了8到65倍，同时能够发现更多样化的失败案例。'}}}, {'id': 'https://huggingface.co/papers/2604.23210', 'title': 'Discovering Agentic Safety Specifications from 1-Bit Danger Signals', 'url': 'https://huggingface.co/papers/2604.23210', 'abstract': 'Abstract EPO-Safe enables large language model agents to discover hidden safety objectives through iterative experience and reflection using only binary danger warnings, demonstrating robust safety performance even with noisy feedback.  AI-generated summary Can large language model agents discover hidden safety objectives through experience alone? We introduce EPO-Safe (Experiential Prompt Optimization for Safe Agents), a framework where an LLM iteratively generates action plans, receives sparse binary danger warnings, and evolves a natural language behavioral specification through reflection. Unlike standard LLM reflection methods that rely on rich textual feedback (e.g., compiler errors or detailed environment responses), EPO-Safe demonstrates that LLMs can perform safety reasoning from a strictly impoverished signal in structured, low-dimensional environments: the agent never observes the hidden performance function R^*, only a single bit per timestep indicating that an action was unsafe. We evaluate on five AI Safety Gridworlds (Leike et al., 2017) and five text-based scenario analogs where visible reward R may diverge from R^*. EPO-Safe discovers safe behavior within 1-2 rounds (5-15 episodes), producing human-readable specifications with correct explanatory hypotheses about hazards (e.g., "X cells are directionally hazardous: entering from the north is dangerous"). Critically, we show that standard reward-driven reflection actively degrades safety: agents reflecting on reward alone use the loop to justify and accelerate reward hacking, proving that reflection must be paired with a dedicated safety channel to discover hidden constraints. We further evaluate robustness to noisy oracles: even when 50% of non-dangerous steps produce spurious warnings, mean safety performance degrades by only 15% on average, though sensitivity is environment-dependent, as cross-episode reflection naturally filters inconsistent signals. Each evolved specification functions as an auditable set of grounded behavioral rules discovered autonomously through interaction, rather than authored by humans as in Constitutional AI (Bai et al., 2022).', 'score': 1, 'issue_id': 2070, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '76c26346613f480f', 'authors': ['Víctor Gallego'], 'affiliations': ['Komorebi AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.23210.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Агент учится безопасности из одного бита в эпизоде', 'desc': 'EPO-Safe — это фреймворк, который позволяет агентам на основе большой языковой модели открывать скрытые цели безопасности через итеративное взаимодействие со средой, получая только бинарные сигналы об опасности. Агент генерирует планы действий, получает минимальную обратную связь (один бит за шаг), и эволюционирует спецификацию поведения через рефлексию на естественном языке. В отличие от стандартных методов отражения, которые требуют богатой текстовой информации, модель демонстрирует способность выполнять рассуждения о безопасности из очень ограниченного сигнала в структурированных окружениях. Исследование показывает, что безопасное поведение обнаруживается за 1-2 раунда, и найденные спецификации являются интерпретируемыми правилами поведения, независимо от человеческих ограничений.'}, 'en': {'title': 'EPO-Safe: Learning Safety Through Sparse Feedback', 'desc': 'EPO-Safe is a framework that allows large language model (LLM) agents to learn safety objectives through experience and reflection, using only binary danger warnings. This approach enables the agents to generate action plans and evolve their understanding of safe behavior without needing detailed feedback. The study shows that LLMs can effectively reason about safety in environments where they receive minimal information, demonstrating robust performance even with noisy feedback. Importantly, the research highlights that traditional reward-based reflection can lead to unsafe behaviors, emphasizing the need for a dedicated safety channel in the learning process.'}, 'zh': {'title': 'EPO-Safe：通过经验发现安全目标的创新框架', 'desc': 'EPO-Safe是一个框架，允许大型语言模型代理通过迭代经验和反思来发现隐藏的安全目标。该方法仅依赖于二元危险警告，展示了即使在噪声反馈下也能保持良好的安全性能。与传统的反思方法不同，EPO-Safe在结构化的低维环境中，能够从稀疏的信号中进行安全推理，而不需要丰富的文本反馈。实验表明，EPO-Safe能够在短时间内发现安全行为，并生成可读的行为规范，证明反思必须与专门的安全通道结合，以有效发现隐藏的约束。'}}}, {'id': 'https://huggingface.co/papers/2604.22842', 'title': 'EX-FIQA: Leveraging Intermediate Early eXit Representations from Vision Transformers for Face Image Quality Assessment', 'url': 'https://huggingface.co/papers/2604.22842', 'abstract': 'Abstract ViT-based face quality assessment method utilizes intermediate representations through early exit mechanisms and score fusion strategies, demonstrating that different transformer block depths capture complementary quality-relevant information for improved performance.  AI-generated summary Face Image Quality Assessment is crucial for reliable face recognition systems, yet existing Vision Transformer-based approaches rely exclusively on final-layer representations, ignoring quality-relevant information captured at intermediate network depths. This paper presents the first comprehensive investigation of how intermediate representations within ViTs contribute to face quality assessment through early exit mechanisms and score fusion strategies. We systematically analyze all twelve transformer blocks of ViT-FIQA architectures, demonstrating that different depths capture distinct and complementary quality-relevant information, as evidenced by varying attention patterns and performance characteristics across network layers. We propose a score fusion framework that combines quality predictions from multiple transformer blocks without architectural modifications or additional training. Our early exit analysis reveals optimal performance-efficiency trade-offs, enabling significant computational savings while maintaining competitive performance. Through extensive evaluation across eight benchmark datasets using four FR models, we demonstrate that our fusion strategy improves upon single-exit approaches. Our proposed quality fusion approach employs depth-weighted averaging that assigns progressively higher importance to deeper transformer blocks, achieving the best quality assessment performance by effectively leveraging the hierarchical nature of feature learning in ViTs. Our work challenges the conventional wisdom that only deep features matter for face analysis, revealing that intermediate representations contain valuable information for quality assessment. The proposed framework offers practical benefits for real-world biometric systems by enabling adaptive computation based on resource constraints while maintaining competitive quality assessment capabilities.', 'score': 1, 'issue_id': 2070, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '5e6162a8e57f5bfd', 'authors': ['Guray Ozgur', 'Tahar Chettaoui', 'Eduarda Caldeira', 'Jan Niklas Kolf', 'Andrea Atzori', 'Fadi Boutros', 'Naser Damer'], 'affiliations': ['Department of Computer Science, TU Darmstadt, Germany', 'Fraunhofer Institute for Computer Graphics Research IGD, Darmstadt, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2604.22842.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Промежуточные слои трансформера содержат ценную информацию для оценки качества лиц', 'desc': 'В статье предложен метод оценки качества лиц на основе Vision Transformer, который использует промежуточные представления из разных слоёв сети через механизмы раннего выхода и стратегии объединения оценок. Авторы показывают, что различные глубины трансформер-блоков захватывают дополнительную информацию о качестве изображения, что улучшает итоговую производительность модели. Предложенный подход с взвешенным усреднением оценок из нескольких слоёв не требует дополнительного обучения и архитектурных изменений. Метод демонстрирует практическую ценность для биометрических систем, обеспечивая баланс между качеством оценки и вычислительной эффективностью.'}, 'en': {'title': 'Unlocking Face Quality: Harnessing Intermediate Representations in ViTs', 'desc': 'This paper explores how intermediate representations in Vision Transformers (ViTs) can enhance face quality assessment for recognition systems. It highlights that different layers of the transformer capture unique and complementary information relevant to image quality. The authors introduce a score fusion framework that combines predictions from various transformer blocks, optimizing performance without needing additional training. Their findings suggest that utilizing both shallow and deep features can lead to better quality assessments, offering a more efficient approach for real-world applications.'}, 'zh': {'title': '利用中间表示提升面部质量评估性能', 'desc': '本文提出了一种基于视觉变换器（ViT）的面部质量评估方法，利用中间表示和早期退出机制来提高性能。研究表明，不同的变换器块深度能够捕捉到互补的质量相关信息，从而改善评估效果。我们提出了一种得分融合框架，可以在不修改架构或额外训练的情况下，结合多个变换器块的质量预测。通过对八个基准数据集的广泛评估，我们的融合策略在性能上优于单一退出方法，展示了中间表示在面部质量评估中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.22782', 'title': 'Stochastic KV Routing: Enabling Adaptive Depth-Wise Cache Sharing', 'url': 'https://huggingface.co/papers/2604.22782', 'abstract': "Abstract Transformer language models can reduce KV cache memory requirements through random cross-layer attention during training, enabling efficient depth-wise cache sharing without performance loss.  AI-generated summary Serving transformer language models with high throughput requires caching Key-Values (KVs) to avoid redundant computation during autoregressive generation. The memory footprint of KV caching is significant and heavily impacts serving costs. This work proposes to lessen these memory requirements. While recent work has largely addressed KV cache reduction via compression and eviction along the temporal axis, we argue that the depth dimension offers an orthogonal and robust avenue for optimization. Although prior research suggests that a full cache for every layer is redundant, implementing cross-layer cache sharing remains a practical challenge; existing methods typically suffer from reduced throughput or increased time-to-first-token. In this paper, we demonstrate that dropping a layer's cache offers efficient optimization without information loss. We propose a simple training approach: random cross-layer attention. During training, layers randomly choose to attend either to their own KV states or those of a preceding layer. This stochastic process adapts the model to be robust to various depth-wise cache sharing strategies, ensuring flexibility for unknown hardware constraints at deployment time. Our evaluations show that applying this scheme during pre-training or fine-tuning enables depth-wise cache sharing for various model families. Furthermore, for larger models in data-constrained settings, this approach is suggestive of a regularization-like effect, frequently preserving or improving performance while significantly reducing the cache's memory footprint.", 'score': 1, 'issue_id': 2069, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': 'daa2f2c9dc6229f4', 'authors': ['Anastasiia Filippova', 'David Grangier', 'Marco Cuturi', 'João Monteiro'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2604.22782.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Общий кэш для нескольких слоёв трансформера через случайное кросс-слойное внимание', 'desc': 'В работе предложен метод снижения требований к памяти KV-кэша в трансформер языковых моделях за счёт случайного кросс-слойного внимания во время обучения. Во время обучения слои модели случайно выбирают, на какие KV-состояния обращать внимание: на собственные или на состояния предыдущего слоя. Такой стохастический процесс делает модель устойчивой к различным стратегиям распределения кэша между слоями, обеспечивая гибкость при развёртывании на разных аппаратных платформах. Метод позволяет значительно сократить объём памяти для кэша без потери качества или производительности модели.'}, 'en': {'title': 'Efficient Memory Optimization in Transformers through Cross-Layer Cache Sharing', 'desc': 'This paper introduces a method to reduce the memory needed for caching Key-Values (KVs) in transformer language models during autoregressive generation. By using random cross-layer attention during training, the model can share cache across different layers, which helps in optimizing memory usage without losing performance. The authors argue that this approach is more effective than previous methods that focused on temporal cache reduction. Their experiments show that this technique not only decreases memory requirements but can also enhance model performance, especially in larger models with limited data.'}, 'zh': {'title': '优化变换器模型的内存使用', 'desc': '本文提出了一种新的训练方法，称为随机跨层注意力，旨在减少变换器语言模型在自回归生成过程中的键值（KV）缓存内存需求。通过在训练过程中随机选择层来关注自身的KV状态或前一层的KV状态，模型能够灵活适应不同的深度缓存共享策略。研究表明，这种方法在预训练或微调阶段应用时，可以有效实现深度缓存共享，并在数据受限的情况下保持或提高模型性能，同时显著降低缓存的内存占用。总之，本文为优化KV缓存提供了一种新的思路，强调了深度维度的优化潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.16391', 'title': 'Disentangled Robot Learning via Separate Forward and Inverse Dynamics Pretraining', 'url': 'https://huggingface.co/papers/2604.16391', 'abstract': 'Abstract DeFI addresses vision-language-action model limitations by decoupling visual forward and inverse dynamics pretraining to improve 3D action prediction and enable learning from large-scale action-free video data.  AI-generated summary Vision-language-action (VLA) models have shown great potential in building generalist robots, but still face a dilemma-misalignment of 2D image forecasting and 3D action prediction. Besides, such a vision-action entangled training manner limits model learning from large-scale, action-free web video data. To address these issues, we propose DeFI, a novel framework that Decouples visual Forward and Inverse dynamics pretraining to exploit respective data sources, wherein video generation and action prediction are disentangled. We introduce the General Forward Dynamics Model (GFDM), pretrained on diverse human and robot videos for future prediction, and the General Inverse Dynamics Model (GIDM), trained via self-supervised learning to infer latent actions from unlabeled video transitions. These models are then integrated into a unified architecture for end-to-end finetuning on downstream tasks. In this manner, GFDM and GIDM first shine separately and then cooperate for mutual benefit. Extensive experiments on CALVIN ABC-D and SimplerEnv demonstrate state-of-the-art performance, with DeFI achieving an average task length of 4.51 for CALVIN, 51.2% success rate on SimplerEnv-Fractal benchmark and 81.3% success rate in real-world deployment, significantly outperforming prior methods.', 'score': 1, 'issue_id': 2073, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '4186395c8a2c70d7', 'authors': ['Wenyao Zhang', 'Bozhou Zhang', 'Zekun Qi', 'Wenjun Zeng', 'Xin Jin', 'Li Zhang'], 'affiliations': ['Eastern Institute of Technology, Ningbo', 'Fudan University', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.16391.jpg', 'data': {'categories': ['#multimodal', '#training', '#video', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Разделение динамики для объединения видео и действий', 'desc': 'DeFI - это новая архитектура для обучения моделей зрение-язык-действие, которая решает проблему несоответствия между предсказанием 2D видео и 3D действий путем разделения предварительного обучения прямой и обратной динамики. Фреймворк включает General Forward Dynamics Model (GFDM) для предсказания будущих кадров видео и General Inverse Dynamics Model (GIDM) для вывода скрытых действий из неразмеченных видео. Благодаря такой декомпозиции модели могут эффективно учиться как на размеченных видеоданных с действиями роботов, так и на больших наборах веб-видео без разметки действий. Экспериментальные результаты показывают, что DeFI достигает наилучших показателей на бенчмарках CALVIN и SimplerEnv, а также демонстрирует высокую эффективность при развертывании на реальных роботах.'}, 'en': {'title': 'Decoupling Dynamics for Superior Action Prediction', 'desc': 'The paper introduces DeFI, a new framework designed to improve the performance of vision-language-action (VLA) models in predicting 3D actions. It addresses the limitations of existing models by separating the training of visual forward dynamics and inverse dynamics, allowing for better learning from large-scale, action-free video data. The framework utilizes two key components: the General Forward Dynamics Model (GFDM) for predicting future states and the General Inverse Dynamics Model (GIDM) for inferring actions from video transitions. By decoupling these processes, DeFI achieves state-of-the-art results in various benchmarks, demonstrating enhanced capabilities in action prediction and video understanding.'}, 'zh': {'title': '解耦动态预训练，提升3D动作预测', 'desc': 'DeFI是一个新颖的框架，通过解耦视觉前向和逆向动态预训练，解决了视觉-语言-动作模型在3D动作预测中的局限性。该方法允许模型从大规模无动作视频数据中学习，克服了2D图像预测与3D动作预测之间的错位问题。我们引入了通用前向动态模型（GFDM）和通用逆向动态模型（GIDM），分别用于未来预测和从无标签视频中推断潜在动作。通过将这两个模型整合到一个统一架构中，DeFI在多个任务上实现了最先进的性能，显著优于之前的方法。'}}}, {'id': 'https://huggingface.co/papers/2604.24597', 'title': 'Quantum Kernel Advantage over Classical Collapse in Medical Foundation Model Embeddings', 'url': 'https://huggingface.co/papers/2604.24597', 'abstract': 'Abstract Quantum support vector machines demonstrate superior performance over classical linear and RBF kernels in binary insurance classification tasks using medical imaging data, with quantum kernels showing higher effective rank and better minority-class recall.  AI-generated summary We provide evidence of quantum kernel advantage under noiseless simulation in binary insurance classification on MIMIC-CXR chest radiographs using quantum support vector machines (QSVM) with frozen embeddings from three medical foundation models (MedSigLIP-448, RAD-DINO, ViT-patch32). We propose a two-tier fair comparison framework in which both classifiers receive identical PCA-q features. At Tier 1 (untuned QSVM vs. untuned linear SVM, C = 1 both sides), QSVM wins minority-class F1 in all 18 tested configurations (17 at p < 0.001, 1 at p < 0.01). The classical linear kernel collapses to majority-class prediction on 90-100% of seeds at every qubit count, while QSVM maintains non-trivial recall. At q = 11 (MedSigLIP-448 plateau center), QSVM achieves mean F1 = 0.343 vs. classical F1 = 0.050 (F1 gain = +0.293, p < 0.001) without hyperparameter tuning. Under Tier 2 (untuned QSVM vs. C-tuned RBF SVM), QSVM wins all seven tested configurations (mean gain +0.068, max +0.112). Eigenspectrum analysis reveals quantum kernel effective rank reaches 69.80 at q = 11, far exceeding linear kernel rank, while classical collapse remains C-invariant. A full qubit sweep reveals architecture-dependent concentration onset across models. Code: https://github.com/sebasmos/qml-medimage', 'score': 0, 'issue_id': 2072, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '08ffe27283a949ad', 'authors': ['Sebastian Cajas Ordóñez', 'Felipe Ocampo Osorio', 'Dax Enshan Koh', 'Rafi Al Attrach', 'Aldo Marzullo', 'Ariel Guerra-Adames', 'J. Alejandro Andrade', 'Siong Thye Goh', 'Chi-Yu Chen', 'Rahul Gorijavolu', 'Xue Yang', 'Noah Dane Hebdon', 'Leo Anthony Celi'], 'affiliations': ['Beth Israel Deaconess Medical Center', 'Bordeaux Population Health Research Center, Inserm U1219, Universite de Bordeaux', 'Clinical Research Center, Artificial Intelligence Unit, Fundacion Valle del Lili', 'Inria Bordeaux, Universite de Bordeaux', 'Institute of High Performance Computing (IHPC), Agency for Science, Technology and Research (A*STAR)', 'Johns Hopkins University', 'Laboratory for Computational Physiology, MIT', 'MIT Critical Data, Massachusetts Institute of Technology', 'National Taiwan University Hospital', 'Politecnico di Milano', 'Quantum Innovation Centre (Q.InC), Agency for Science, Technology and Research (A*STAR)', 'Research Center of Intelligent Information Processing and Quantum Intelligent Computing', 'Shanghai Maritime University', 'Singapore Management University', 'Singapore University of Technology and Design', 'Universidad del Cauca'], 'pdf_title_img': 'assets/pdf/title_img/2604.24597.jpg', 'data': {'categories': [], 'emoji': '⚛️', 'ru': {'title': 'Квантовое преимущество в классификации медицинских изображений', 'desc': 'В работе исследуется применение квантовых машин опорных векторов (QSVM) для классификации медицинских изображений в задачах страховой медицины. Авторы демонстрируют, что квантовые ядра превосходят классические линейные и RBF-ядра на наборе данных рентгеновских снимков грудной клетки MIMIC-CXR, особенно при предсказании редкого класса. Ключевое преимущество квантовых подходов заключается в более высоком эффективном рангу ядра, что позволяет избежать коллапса в предсказание большого класса, характерного для классических методов. Результаты получены в условиях идеальной симуляции с использованием замороженных признаков из медицинских foundation models.'}, 'en': {'title': 'Unlocking Quantum Power for Better Medical Image Classification', 'desc': 'This paper explores the advantages of quantum support vector machines (QSVM) over traditional linear and RBF kernels in classifying binary insurance data derived from medical imaging. The authors demonstrate that QSVMs, utilizing quantum kernels, achieve significantly better performance in minority-class recall, which is crucial for imbalanced datasets. They establish a fair comparison framework, showing that QSVM consistently outperforms classical methods across various configurations without the need for hyperparameter tuning. The findings indicate that quantum kernels have a higher effective rank, leading to improved classification outcomes, particularly in challenging scenarios where traditional models fail to perform adequately.'}, 'zh': {'title': '量子支持向量机：保险分类的新突破', 'desc': '量子支持向量机在二元保险分类任务中表现优于经典的线性和RBF核，尤其是在使用医学影像数据时。研究表明，量子核具有更高的有效秩和更好的少数类召回率。通过无噪声模拟，我们在MIMIC-CXR胸部X光片上验证了量子核的优势。实验结果显示，量子支持向量机在所有测试配置中均优于经典支持向量机，尤其是在少数类的F1得分上。'}}}, {'id': 'https://huggingface.co/papers/2604.24479', 'title': 'Zero-to-CAD: Agentic Synthesis of Interpretable CAD Programs at Million-Scale Without Real Data', 'url': 'https://huggingface.co/papers/2604.24479', 'abstract': "Abstract A scalable framework synthesizes executable CAD construction sequences by framing the process as an agentic search problem using large language models within a feedback-driven CAD environment.  AI-generated summary Computer-Aided Design (CAD) models are defined by their construction history: a parametric recipe that encodes design intent. However, existing large-scale 3D datasets predominantly consist of boundary representations (B-Reps) or meshes, stripping away this critical procedural information. To address this scarcity, we introduce Zero-to-CAD, a scalable framework for synthesizing executable CAD construction sequences. We frame synthesis as an agentic search problem: by embedding a large language model (LLM) within a feedback-driven CAD environment, our system iteratively generates, executes, and validates code using tools and documentation lookup to promote geometric validity and operation diversity. This agentic approach enables the synthesis of approximately one million executable, readable, editable CAD sequences, covering a rich vocabulary of operations beyond sketch-and-extrude workflows. We also release a curated subset of 100,000 high-quality models selected for geometric diversity. To demonstrate the dataset's utility, we fine-tune a vision-language model on our synthetic data to reconstruct editable CAD programs from multi-view images, outperforming strong baselines, including GPT-5.2, and effectively bootstrapping sequence generation capabilities without real construction-history training data. Zero-to-CAD bridges the gap between geometric scale and parametric interpretability, offering a vital resource for the next generation of CAD AI.", 'score': 0, 'issue_id': 2069, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '57e26848c768c2b9', 'authors': ['Mohammadmehdi Ataei', 'Farzaneh Askari', 'Kamal Rahimi Malekshan', 'Pradeep Kumar Jayaraman'], 'affiliations': ['Autodesk Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.24479.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🏗️', 'ru': {'title': 'От нулевого знания к выполняемым CAD-программам через агентный поиск', 'desc': 'В работе предложена масштабируемая система Zero-to-CAD для синтеза исполняемых последовательностей построения CAD-моделей, используя большие языковые модели в качестве агента в среде обратной связи. Система итеративно генерирует, выполняет и валидирует код, используя инструменты и документацию для обеспечения геометрической корректности и разнообразия операций. На основе этого подхода создан датасет из примерно одного миллиона исполняемых CAD-последовательностей и отобран куратированный подмножество из 100 тысяч высококачественных моделей. Авторы демонстрируют практическую ценность датасета, обучив vision-language модель реконструировать редактируемые CAD-программы из мультивидовых изображений, превосходя сильные baseline-ы.'}, 'en': {'title': 'Revolutionizing CAD with AI-Driven Construction Sequences', 'desc': 'This paper presents Zero-to-CAD, a framework that uses large language models to create executable construction sequences for Computer-Aided Design (CAD). It addresses the lack of procedural information in existing 3D datasets by framing the synthesis process as an agentic search problem within a feedback-driven environment. The system generates and validates CAD code iteratively, resulting in nearly one million diverse and executable sequences. Additionally, a curated dataset of 100,000 high-quality models is provided, which enhances the training of vision-language models for reconstructing CAD programs from images.'}, 'zh': {'title': 'Zero-to-CAD：构建可执行CAD序列的新框架', 'desc': '本文提出了一种可扩展的框架Zero-to-CAD，用于合成可执行的计算机辅助设计（CAD）构建序列。该框架将合成过程视为一个代理搜索问题，利用大型语言模型（LLM）在反馈驱动的CAD环境中进行迭代生成、执行和验证代码。通过这种方法，我们生成了大约一百万个可执行、可读和可编辑的CAD序列，涵盖了丰富的操作词汇。该研究为CAD AI的下一代发展提供了重要资源，弥补了几何规模与参数可解释性之间的差距。'}}}];

            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-28 15:20')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-28 15:20')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
