9', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '830e265f129fcc39', 'authors': ['Daniyel Ayupov', 'Artur Markov-Tsoy'], 'affiliations': ['DreamForge AI Lab, Kazakhstan'], 'pdf_title_img': 'assets/pdf/title_img/2606.30292.jpg', 'data': {'categories': ['#multimodal', '#video', '#inference', '#architecture'], 'emoji': '🎮', 'ru': {'title': 'Мировая модель с управлением в реальном времени на потребительском GPU', 'desc': 'DreamForge-World 0.1 Preview - это превью модели мира, адаптирующей архитектуру видеогенерации с остаточным путём действий для интерактивного симулирования окружения в реальном времени на потребительском оборудовании. Система расширяет автарегрессивный видеостек LongLive 1, добавляя поддержку управления с клавиатуры и мыши, мультимодальной инициализации и переподсказок во время генерации. Модель достигает 14-15 кадров в секунду на RTX 4090 при разрешении 480p с низким потреблением памяти, демонстрируя практичный подход к реализации мировых моделей на бюджетном оборудовании. Хотя система ещё не обладает полной способностью сохранения памяти, она открывает доступный путь для создания интерактивных симуляторов мира на потребительских GPU.'}, 'en': {'title': 'Real-Time World Simulation for Everyone', 'desc': 'DreamForge-World 0.1 Preview is a foundational model designed for real-time interactive world simulation on consumer hardware. It utilizes a video generation architecture with a residual action pathway, allowing it to operate efficiently with low computational resources. The system supports various interactive features such as live control and dual-view operation, achieving a frame rate of 14 to 15 FPS on an RTX 4090. While it is not yet a fully developed world simulator, it showcases a practical approach to creating controllable world models on consumer GPUs.'}, 'zh': {'title': '低计算需求的实时互动世界模拟', 'desc': 'DreamForge-World 0.1 Preview 是一个用于实时互动世界模拟的基础模型，适用于普通消费者硬件，具有低计算需求。该系统采用了 LongLive 1 自回归视频架构，并结合了残差动作路径，灵感来源于 Matrix-Game 系列。它支持实时键盘和鼠标控制、多模态初始化和双视图操作，能够在单个 RTX 4090 上以 480p 分辨率达到每秒 14 到 15 帧的速度。虽然 DF-World 0.1 Preview 还不是一个完整的世界模拟器，但它展示了在消费级 GPU 上实现实时可控世界模型预览的高性价比路径。'}}}, {'id': 'https://huggingface.co/papers/2606.30045', 'title': 'Walking in the Implicit: Interactive World Exploration via Neural Scene Representation', 'url': 'https://huggingface.co/papers/2606.30045', 'abstract': 'Abstract NeuWorld enables efficient interactive video generation by representing scenes as compact neural implicit states and using a transformer VAE with diffusion transformer for trajectory-conditioned rendering.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Interactive video generation systems for camera-controlled world exploration roll out growing sequences of latent video frames, entangling state transition with high-frequency observation synthesis. We propose Walking in the Implicit, a scene-centric paradigm that changes the rollout variable from frame latents to a fixed-length, renderable implicit state, termed Neural Implicit Scene (NIS). This factorizes interactive generation into stochastic transition of a compact scene state and deterministic pose-conditioned rendering given the sampled state. We instantiate this paradigm as NeuWorld: a transformer VAE learns locally anchored NIS from sparse posed frames, and a diffusion transformer evolves NIS conditioned on future camera trajectories and geometry-aware retrieved history. By reusing the VAE encoder as a unified conditioner, NeuWorld maps camera, reference-image, and history cues into the same NIS modality, avoiding external heterogeneous encoders. Trained from scratch on public posed-view data without pretrained video backbones or auxiliary 3D reconstructors, NeuWorld achieves strong long-horizon consistency with favorable inference efficiency.', 'score': 4, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '8234e0c229a298b4', 'authors': ['Zhiqi Li', 'Chengrui Dong', 'Zhenhua Du', 'Hangning Zhou', 'Cong Qiu', 'Hailong Qin', 'Mu Yang', 'Dongxu Wei', 'Peidong Liu'], 'affiliations': ['Afari Intelligent Drive', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.30045.jpg', 'data': {'categories': ['#video', '#open_source', '#training', '#architecture', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Прогулка в имплицитном пространстве: генерация видео через состояния сцен', 'desc': 'NeuWorld предлагает эффективную систему интерактивного видеогенерирования, которая представляет сцены в виде компактных нейронных имплицитных состояний вместо последовательности кадров. Система использует трансформер-основанный VAE для обучения этих состояний и диффузионный трансформер для рендеринга, обусловленного траекториями камеры. Ключевая идея заключается в факторизации генерирования на две части: стохастический переход компактного состояния сцены и детерминированный рендеринг на основе позиции камеры. Модель обучается на публичных данных с позированными видами без предобученных видеомоделей, достигая долгосрочной согласованности при высокой скорости инференса.'}, 'en': {'title': 'Revolutionizing Interactive Video Generation with Neural Implicit States', 'desc': "NeuWorld is a novel system for generating interactive videos by using a compact representation of scenes called Neural Implicit States (NIS). It employs a transformer-based Variational Autoencoder (VAE) combined with a diffusion transformer to create video frames based on camera movements. The approach separates the generation process into two parts: a stochastic transition of the scene state and a deterministic rendering based on the camera's position. By training on public data without relying on pre-existing models, NeuWorld demonstrates impressive consistency over long video sequences while maintaining efficient inference."}, 'zh': {'title': 'NeuWorld：高效的交互式视频生成新范式', 'desc': 'NeuWorld 是一种高效的交互式视频生成系统，它通过紧凑的神经隐式状态来表示场景，并使用变换器变分自编码器（VAE）与扩散变换器进行轨迹条件渲染。该系统将生成的潜在视频帧序列与高频观察合成相结合，改变了生成变量，从帧潜变量转变为固定长度的可渲染隐式状态，称为神经隐式场景（NIS）。这种方法将交互式生成分解为紧凑场景状态的随机转移和基于采样状态的确定性姿态条件渲染。NeuWorld 在公共姿态视图数据上从零开始训练，避免了使用预训练的视频骨干网络或辅助的3D重建器，展现出强大的长时间一致性和良好的推理效率。'}}}, {'id': 'https://huggingface.co/papers/2606.29705', 'title': 'GUICrafter: Weakly-Supervised GUI Agent Leveraging Massive Unannotated Screenshots', 'url': 'https://huggingface.co/papers/2606.29705', 'abstract': 'Abstract GUICrafter addresses GUI agent data challenges through a weakly-supervised approach using unannotated screenshots and a two-stage curriculum learning framework for visual grounding and reinforcement learning calibration.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Data, as the fundamental substrate of modern intelligence, has greatly driven the development of current foundation models. Naturally, researchers aim to extend this paradigm to the domain of GUI agents, hoping to build strong GUI agents through a similar paradigm. However, GUI agent data cannot be directly harvested from the internet, making it costly and difficult to collect at scale. As a result, current GUI agents suffer from poor cross-device generalization and limited visual grounding ability for fine-grained GUI elements. As an attempt to address data challenge in GUI agents, we propose GUICrafter, a weakly-supervised GUI agent leveraging massive unannotated screenshots to substantially reduce the reliance on expensive human annotations. GUICrafter explores a curriculum learning framework for training GUI agents through two progressive stages. First, the model learns visual grounding from large-scale unannotated screenshots and webpages, leveraging the rich contextual signals inherent in GUI interactions without human annotations. Then, in Stage 2, we leverage a small amount of high-quality data to calibrate the model via reinforcement learning. Experiments show that GUICrafter achieves competitive, or even superior, performance to advanced systems like UI-TARS while using only 0.1% of its data. Furthermore, under the same amount of annotated data, GUICrafter surpasses all previous methods such as GUI-R1. Code, data, and models are available at https://github.com/fansunqi/GUICrafter.', 'score': 4, 'issue_id': 2530, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '0f58d68e0ceeb02d', 'authors': ['Sunqi Fan', 'Lingshan Chen', 'Runqi Yin', 'Qingle Liu', 'Yongming Rao', 'Meng-Hao Guo', 'Shi-Min Hu'], 'affiliations': ['Tencent Hunyuan', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29705.jpg', 'data': {'categories': ['#training', '#data', '#dataset', '#rl', '#agents'], 'emoji': '🖥️', 'ru': {'title': 'Слабо-контролируемое обучение GUI агентов через curriculum learning', 'desc': 'GUICrafter решает проблему недостатка данных для обучения GUI агентов, используя слабо-контролируемый подход с неразмеченными скриншотами. Модель использует двухэтапное curriculum learning: на первом этапе агент учится визуальному пониманию элементов интерфейса из больших объемов неразмеченных данных, на втором этапе проводится калибровка с помощью reinforcement learning на небольшом наборе качественных аннотаций. Метод достигает сравнимых или лучших результатов, чем существующие системы, используя всего 0.1% от требуемого объема размеченных данных. Подход значительно улучшает обобщение модели на разных устройствах и повышает точность распознавания элементов интерфейса.'}, 'en': {'title': 'Empowering GUI Agents with Weakly-Supervised Learning', 'desc': "GUICrafter is a novel approach to developing GUI agents that addresses the challenges of data scarcity by utilizing a weakly-supervised learning method. It employs unannotated screenshots to train the model in two stages: first, it learns visual grounding from these images, and then it fine-tunes the model using a small set of high-quality annotated data through reinforcement learning. This method significantly reduces the need for expensive human annotations while improving the model's ability to generalize across different devices and accurately identify GUI elements. Experimental results demonstrate that GUICrafter outperforms existing systems with minimal data, showcasing its effectiveness in the field of GUI agent development."}, 'zh': {'title': 'GUICrafter：高效构建图形用户界面代理的创新方法', 'desc': 'GUICrafter是一种弱监督的图形用户界面（GUI）代理，旨在解决GUI代理数据的挑战。它利用大量未标注的截图，通过两阶段的课程学习框架进行视觉定位和强化学习校准。第一阶段，模型从未标注的截图和网页中学习视觉定位，利用GUI交互中的丰富上下文信号。第二阶段，使用少量高质量数据通过强化学习对模型进行校准，实验表明GUICrafter在数据使用效率上优于现有的先进系统。'}}}, {'id': 'https://huggingface.co/papers/2606.29225', 'title': 'PolicyGuard: A Dialogue-Grounded Sub-Agent Verifier for Policy Adherence in LLM Agents', 'url': 'https://huggingface.co/papers/2606.29225', 'abstract': "Abstract POLICYGUARD is a sub-agent verifier that enhances LLM agent policy adherence by providing contextual reasoning and conversation-specific feedback across multi-turn interactions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents handle user requests on behalf of organizations through tool calls and must follow the company policies stated in their system prompts. Prior work approaches this as a safeguarding problem -- external checks that block non-compliant agent actions. We argue that policy adherence is a broader problem: real workflows unfold across many turns, require explicit user confirmation and prerequisite reads, and hinge on the content of the dialogue rather than on any single argument value. Meeting this bar requires (i) full conversation context, (ii) self-reasoning over the policy and the current dialogue, and (iii) conversation-specific remediation that guides the agent's next turn -- three capabilities that prior safeguard work has often underestimated. We introduce POLICYGUARD, a sub-agent verifier that shares the agent's view of the dialogue, reasons over the policy in context, and provides actionable feedback for the agent's next turn. On tau^2-BENCH airline across three vendors (GPT-5.4, Claude Sonnet 4.6, Gemini 2.5 Pro) with four trials per setting, POLICYGUARD improves PASS4 by +12.0 / +6.0 / +12.0 pp. Per-call analyses show POLICYGUARD achieves higher policy-violation recall while blocking roughly half as often as argument-level guards.", 'score': 4, 'issue_id': 2531, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': 'fc47603d9f5eeb44', 'authors': ['Seongjae Kang', 'Taehyung Yu', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2606.29225.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Умная защита политик LLM агентов через контекстное рассуждение', 'desc': 'POLICYGUARD — это система верификации, которая помогает LLM агентам соблюдать политики организации во время многоходовых взаимодействий с пользователями. В отличие от простых проверок, которые блокируют отдельные действия, POLICYGUARD анализирует весь контекст диалога и использует самоусуждение для оценки соответствия политике. Система генерирует контекстную обратную связь и рекомендации, которые направляют агента на правильный путь в следующем шаге взаимодействия. Экспериментальные результаты показывают значительное улучшение соблюдения политик (+12.0-12.0 процентных пункта) при одновременном снижении ложных срабатываний в два раза по сравнению с методами уровня аргументов.'}, 'en': {'title': 'Enhancing LLM Policy Adherence with Contextual Reasoning', 'desc': "POLICYGUARD is a verification tool designed to ensure that large language model (LLM) agents adhere to organizational policies during multi-turn conversations. Unlike previous methods that focus solely on blocking non-compliant actions, POLICYGUARD emphasizes the importance of understanding the entire dialogue context and the need for explicit user confirmations. It incorporates three key capabilities: maintaining full conversation context, reasoning about policies in relation to the ongoing dialogue, and providing specific feedback for the agent's next response. The results show that POLICYGUARD significantly improves policy adherence while reducing unnecessary blocks compared to traditional methods."}, 'zh': {'title': '提升代理政策遵循的智能助手', 'desc': 'POLICYGUARD 是一种子代理验证器，旨在增强大型语言模型（LLM）代理在多轮交互中的政策遵循能力。它通过提供上下文推理和特定对话反馈，帮助代理在处理用户请求时遵循公司政策。与以往的外部检查方法不同，POLICYGUARD 强调在多轮对话中，代理需要理解整个对话上下文，并进行自我推理。通过这三种能力，POLICYGUARD 能够有效提高政策遵循率，同时减少不必要的阻止。'}}}, {'id': 'https://huggingface.co/papers/2606.28186', 'title': 'Cognitive Episodes in LLM Reasoning Traces Enable Interpretable Human Item Difficulty Prediction', 'url': 'https://huggingface.co/papers/2606.28186', 'abstract': 'Abstract Epi2Diff framework transforms LRM reasoning traces into cognitive episodes to predict human item difficulty more accurately than existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Predicting human item difficulty is central to educational assessment, where reliable estimates support fairness and effective test construction. Existing methods often depend on costly human calibration or item-level textual representations, providing limited evidence about the cognitive processes that make items difficult. We argue that difficulty should be viewed not only as a property of item text, but also as an observable consequence of the problem-solving burden an item induces. Large Reasoning Models (LRMs) offer scalable process evidence through reasoning traces, but such evidence must be structured to support interpretable modeling. To this end, we introduce Epi2Diff (Episode to Difficulty), a framework that maps LRM reasoning traces into cognitively grounded episode sequences. These episodes group trace segments into functional problem-solving states, enabling difficulty to be modeled through reasoning scale, effort allocation, and state transitions. Epi2Diff extracts compact episode-dynamic features and combines them with semantic item representations for human difficulty prediction. Experiments on four real-world human difficulty datasets show that Epi2Diff consistently outperforms strong baselines, including fine-tuned small language models, LLM in-context learning, and supervised LLM adaptation. On SAT-derived classification benchmarks, Epi2Diff achieves an 8.1% average relative gain over supervised LLM fine-tuning baselines. Further analyses show that harder items induce more effortful, iterative, and implementation-centered episode dynamics, rather than merely longer responses. These results demonstrate that cognitive episodes in LRM reasoning traces provide a predictive and interpretable process representation for human item difficulty, offering a new lens for educational measurement with reasoning models.', 'score': 4, 'issue_id': 2530, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '860e0531fd4d87a5', 'authors': ['Chenguang Wang', 'Ming Li', 'Xinyue Zeng', 'Zhuochun Li', 'Hong Jiao', 'Tianyi Zhou', 'Dawei Zhou'], 'affiliations': ['MBZUAI', 'University of Maryland', 'University of Pittsburgh', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2606.28186.jpg', 'data': {'categories': ['#reasoning', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Когнитивные эпизоды рассуждений для предсказания сложности тестовых заданий', 'desc': 'В статье представлена фреймворк Epi2Diff, которая преобразует трассы рассуждений больших моделей рассуждений в когнитивные эпизоды для более точного предсказания сложности заданий для человека. Авторы утверждают, что сложность задания следует рассматривать не только как свойство текста, но и как следствие когнитивной нагрузки при решении задачи. Фреймворк преобразует сегменты трассы рассуждений в функциональные состояния решения проблем и извлекает признаки динамики эпизодов для моделирования сложности через масштаб рассуждений и распределение усилий. Эксперименты на четырёх наборах данных показывают, что Epi2Diff превосходит базовые методы, включая fine-tuned LLM и LLM in-context learning, с улучшением на 8.1% в среднем.'}, 'en': {'title': 'Transforming Reasoning into Predictive Cognitive Episodes', 'desc': 'The Epi2Diff framework enhances the prediction of human item difficulty in educational assessments by transforming reasoning traces from Large Reasoning Models (LRMs) into cognitive episodes. This approach allows for a deeper understanding of the problem-solving processes that contribute to item difficulty, moving beyond traditional methods that rely on item text alone. By structuring reasoning traces into functional problem-solving states, Epi2Diff captures essential features related to reasoning scale and effort allocation. Experimental results demonstrate that Epi2Diff significantly outperforms existing models, providing a more interpretable and effective means of assessing item difficulty.'}, 'zh': {'title': 'Epi2Diff：精准预测人类项目难度的新方法', 'desc': 'Epi2Diff框架将大型推理模型（LRM）的推理轨迹转化为认知情节，以更准确地预测人类项目的难度。该方法不仅考虑项目文本的特性，还关注解决问题所带来的认知负担。通过将推理轨迹结构化为功能性问题解决状态，Epi2Diff能够提取紧凑的情节动态特征，并与语义项目表示结合，进行人类难度预测。实验结果表明，Epi2Diff在多个真实世界数据集上表现优于现有的强基线方法。'}}}, {'id': 'https://huggingface.co/papers/2606.27282', 'title': 'How Good Can Linear Models Be for Time-Series Forecasting?', 'url': 'https://huggingface.co/papers/2606.27282', 'abstract': 'Abstract Research demonstrates that preprocessing optimizations, particularly in context length, normalization, and regularization, can significantly improve time-series forecasting accuracy more effectively than scaling model architectures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Time-series forecasting research has been moving steadily toward larger architectures, from specialized transformers to general-purpose foundation models, on the assumption that capacity is what unlocks accuracy. We take the opposite position: most of the gap can be closed at far lower cost by tuning preprocessing rather than scaling models. We use Ridge regression as the testbed, since it has a closed-form solution and interpretable weights, which let the optimal hyperparameters be read off the search directly. We search over context length, local normalization, regularization, and augmentation on eight standard benchmarks and find three patterns. (1) Optimal lookback is strongly series-specific and often non-monotonic in forecast horizon, with fitted power-law exponents ranging from +0.46 on ETTm2 to -0.19 on Exchange and Traffic, challenging the convention that longer horizons need longer history. (2) Normalizing over a learned trailing fraction of the context, rather than its entirety, is almost universally preferred. (3) Series within the same dataset often disagree on hyperparameters; the optimal degree of cross-series sharing varies from fully shared to fully per-series. The resulting models beat prior linear forecasters on most dataset-horizon entries and exceed Transformer, MLP, and CNN baselines on six of eight benchmarks. The optimized hyperparameters also serve as a diagnostic on the data itself, revealing structures that larger models absorb silently into their learned parameters.', 'score': 4, 'issue_id': 2530, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '4e698692825020fa', 'authors': ['Lang Huang', 'Jinglue Xu', 'Luke Darlow'], 'affiliations': ['National Institute of Informatics, Japan', 'Sakana AI, Tokyo, Japan'], 'pdf_title_img': 'assets/pdf/title_img/2606.27282.jpg', 'data': {'categories': ['#data', '#training', '#benchmark', '#optimization', '#long_context'], 'emoji': '📊', 'ru': {'title': 'Предварительная обработка важнее масштаба: оптимизация гиперпараметров для прогнозирования временных рядов', 'desc': 'В статье исследуется, как оптимизация предварительной обработки данных, включая длину контекста, нормализацию и регуляризацию, может значительно улучшить качество прогнозирования временных рядов без увеличения архитектуры модели. Авторы используют гребневую регрессию как простой и интерпретируемый инструмент для поиска оптимальных гиперпараметров на восьми стандартных бенчмарках. Они обнаруживают, что оптимальная длина истории сильно зависит от конкретного ряда и часто немонотонна относительно горизонта прогноза, а нормализация по части контекста предпочтительнее полной нормализации. Оптимизированные модели превосходят как линейные методы, так и сложные архитектуры (трансформеры, MLP, CNN), демонстрируя, что качество часто определяется правильной подготовкой данных, а не масштабом сети.'}, 'en': {'title': 'Optimize Preprocessing, Not Just Model Size!', 'desc': 'This paper argues that improving time-series forecasting accuracy can be achieved more effectively through preprocessing optimizations rather than simply increasing model size. The authors focus on tuning aspects like context length, normalization, and regularization using Ridge regression, which allows for clear interpretation of hyperparameters. They identify three key patterns: optimal lookback varies by series and forecast horizon, normalization over a learned fraction of context is preferred, and hyperparameters differ significantly across series within the same dataset. Their findings show that these optimized models outperform traditional linear forecasters and even some advanced architectures like Transformers and CNNs on multiple benchmarks.'}, 'zh': {'title': '优化预处理，提升时间序列预测准确性', 'desc': '本研究表明，预处理优化，特别是在上下文长度、归一化和正则化方面，可以显著提高时间序列预测的准确性，效果优于单纯扩大模型架构。我们采用岭回归作为测试平台，因为它具有封闭形式的解和可解释的权重，便于直接读取最佳超参数。研究发现，最佳的回溯长度因序列而异，并且在预测范围内通常是非单调的，挑战了更长的预测范围需要更长历史的传统观念。此外，针对同一数据集的序列，最佳超参数的共享程度差异很大，优化后的超参数还可以作为数据本身的诊断工具，揭示出大型模型在学习参数中默默吸收的结构。'}}}, {'id': 'https://huggingface.co/papers/2606.27708', 'title': 'ZooClaw-FashionSigLIP2: Distilled Fine-tuning for Robust Fashion Retrieval', 'url': 'https://huggingface.co/papers/2606.27708', 'abstract': "Abstract A fashion-specialized vision-language model achieves superior retrieval performance through full fine-tuning with knowledge distillation and weight interpolation, outperforming existing methods on a new benchmark while addressing structural biases in existing datasets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Adapting a foundation vision-language encoder to a specialized retrieval task creates a fundamental tradeoff: gains on the target distribution come at the cost of the foundation model's broad generalization, and fashion retrieval is a stringent instance of this problem. We present ZooClaw-FashionSigLIP2, a fashion-specialized SigLIP2-base model that resolves this tradeoff with a simple recipe -- full fine-tuning with knowledge distillation on curated in-domain data, followed by \\wiseft~wortsman2022wiseft weight interpolation with the base model -- and outperforms LoRA, larger backbones (up to 1B parameters), and external training data. Under fair evaluation, ZooClaw-FashionSigLIP2 outperforms all baselines on every benchmark in our suite. In addition, we release ZooClaw-Fashion, a new high-quality fashion retrieval benchmark, and a systematic quality analysis of widely-used benchmarks that exposes and mitigates structural biases in their public ground truth. We open-source the model weights and all evaluation artifacts to facilitate future research.", 'score': 3, 'issue_id': 2532, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '1aeb172d885a191a', 'authors': ['Siqiao Xue', 'Chunxue Xu'], 'affiliations': ['ZooClaw.ai'], 'pdf_title_img': 'assets/pdf/title_img/2606.27708.jpg', 'data': {'categories': ['#dataset', '#training', '#benchmark', '#cv', '#multimodal'], 'emoji': '👗', 'ru': {'title': 'Специализированная модель компьютерного зрения для поиска моды без компромиссов в качестве', 'desc': 'В статье представлена специализированная модель обработки изображений и текста для задачи поиска в области моды, которая достигает превосходных результатов через полное дообучение с дистилляцией знаний и интерполяцией весов. Авторы решают фундаментальный компромисс между адаптацией к узкоспециализированной задаче и сохранением общих способностей базовой модели. Предложенный метод превосходит альтернативные подходы, включая LoRA и модели большего размера, при этом используя преимущественно внутридоменные данные. Кроме того, в работе представлен новый высококачественный бенчмарк для оценки моделей поиска в моде и анализ структурных смещений в существующих датасетах.'}, 'en': {'title': 'Revolutionizing Fashion Retrieval with ZooClaw-FashionSigLIP2', 'desc': 'This paper introduces ZooClaw-FashionSigLIP2, a vision-language model specifically designed for fashion retrieval tasks. It employs full fine-tuning combined with knowledge distillation and weight interpolation to enhance performance while addressing biases in existing datasets. The model demonstrates superior retrieval capabilities compared to previous methods, including larger models and those using external data. Additionally, the authors provide a new benchmark for fashion retrieval and analyze existing benchmarks to identify and correct structural biases.'}, 'zh': {'title': '时尚检索的新突破：ZooClaw-FashionSigLIP2', 'desc': '这篇论文介绍了一种专门针对时尚领域的视觉-语言模型，名为ZooClaw-FashionSigLIP2。该模型通过知识蒸馏和权重插值的全量微调，显著提高了检索性能，超越了现有方法。研究还提出了一个新的高质量时尚检索基准，并分析了现有基准中的结构性偏差。作者开源了模型权重和评估工具，以促进未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2606.26938', 'title': 'Focusing on What Matters: Saliency-Harnessing Accurate Routing for Diffusion MoE', 'url': 'https://huggingface.co/papers/2606.26938', 'abstract': "Abstract SharpMoE addresses routing inefficiencies in diffusion models by using clean latent features to guide salient token identification and employs trajectory routing loss for precise compute allocation during multi-step denoising.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mixture-of-Experts (MoE) architectures have emerged as a powerful paradigm for scaling diffusion models in visual generation. Recent advancements have focused on adaptively allocating computational resources across diverse tokens to improve efficiency and performance. However, we identify a routing assignment problem in existing diffusion MoE frameworks: the router fails to accurately allocate more computational resources to salient tokens. Our analysis attributes this failure to the router's reliance on noise-corrupted latent features throughout the denoising process. Such stochastic noise obscures the critical structural and textural information, thereby preventing the router from effectively distinguishing salient tokens. To address this, we propose SharpMoE, a post-training framework with a saliency-harnessing accurate routing mechanism, which utilizes clean latent features as a noise-free guidance signal for routing. By bypassing the noise-distorted inputs, SharpMoE provides the router with clear saliency guidance, enabling the identification of salient tokens even in high-noise stages. Furthermore, we introduce a trajectory routing loss to constrain the compute allocation throughout the multi-step denoising trajectory, ensuring precise resource allocation along the generation rollout. Extensive experiments demonstrate that SharpMoE serves as a versatile, plug-and-play solution that further enhances the pretrained, converged MoE models, achieving state-of-the-art performance in visual generation.", 'score': 3, 'issue_id': 2531, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '49eea46bee209983', 'authors': ['Haoyou Deng', 'Keyu Yan', 'Chaojie Mao', 'Xiang Wang', 'Yu Liu', 'Changxin Gao', 'Nong Sang'], 'affiliations': ['Key Laboratory of Image Processing and Intelligent Control, School of Artificial Intelligence and Automation, Huazhong University of Science and Technology', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.26938.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Точная маршрутизация в диффузионных MoE моделях через чистые скрытые признаки', 'desc': 'SharpMoE решает проблему неэффективной маршрутизации в диффузионных моделях, используя чистые скрытые признаки для определения важных токенов. Авторы выявили, что маршрутизаторы в архитектурах Mixture-of-Experts (MoE) не могут корректно выделить вычислительные ресурсы для значимых токенов из-за шума в латентном пространстве. Предложенный метод использует непискажённые скрытые векторы в качестве эталона для точной маршрутизации и добавляет траекторийную функцию потерь для контролирования распределения вычислений на каждом шаге генерации. Экспериментальные результаты показывают, что SharpMoE работает как универсальное расширение для предтренированных моделей и достигает лучших результатов в задачах визуальной генерации.'}, 'en': {'title': 'Enhancing Diffusion Models with SharpMoE for Efficient Token Routing', 'desc': 'SharpMoE improves the efficiency of diffusion models by using clean latent features to better identify important tokens during the denoising process. It addresses the issue of routing assignment where existing models struggle to allocate resources effectively to salient tokens due to reliance on noisy inputs. By implementing a post-training framework, SharpMoE provides a clearer guidance signal for routing, allowing for more accurate token identification. Additionally, the introduction of trajectory routing loss ensures that computational resources are allocated precisely throughout the multi-step denoising process, leading to enhanced performance in visual generation tasks.'}, 'zh': {'title': 'SharpMoE：提升扩散模型的路由效率', 'desc': 'SharpMoE 旨在解决扩散模型中的路由效率问题，通过使用干净的潜在特征来指导显著性标记的识别，并在多步去噪过程中采用轨迹路由损失以实现精确的计算资源分配。该方法利用清晰的潜在特征作为无噪声的指导信号，帮助路由器在高噪声阶段有效识别显著性标记。通过绕过噪声扭曲的输入，SharpMoE 提供了明确的显著性指导，从而提高了计算资源的分配效率。实验结果表明，SharpMoE 是一种灵活的即插即用解决方案，进一步提升了预训练的 MoE 模型在视觉生成中的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.30170', 'title': 'Beyond Drug Discovery: The Nanotechnology Molecular Optimization (NMO) Benchmark', 'url': 'https://huggingface.co/papers/2606.30170', 'abstract': 'Abstract The Nanotechnology Molecular Optimization (NMO) Benchmark introduces physics-based molecular design challenges that require new generative model approaches, moving beyond drug-discovery-focused metrics to enable scientific discovery in nanotechnology.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generative molecular design is shaped by simple proxy benchmarks for drug-like properties and models pretrained on large pharmaceutical datasets. This combination yields strong benchmark metrics but limits transferability to domains structurally distinct from drug discovery. To overcome this limitation and drive discovery toward real, scientifically grounded targets, we introduce the Nanotechnology Molecular Optimization (NMO) Benchmark, which bridges machine learning (ML) and quantum materials science. NMO acts simultaneously as a rigorous testbed for the ML community and a discovery engine for nanotechnology research. The suite replaces proxy oracles with quantum simulations and introduces strict protocols that prioritize scientific utility over leaderboard-oriented overfitting. The physics-based NMO tasks impose hard structural constraints and rugged fitness landscapes, posing fundamentally new requirements on generative models. Notably, advanced molecular optimization methods underperform much simpler approaches on the NMO tasks. We develop a new baseline method identifying the critical components to solve the NMO tasks, including a novel representation for modeling structural constraints and a domain-agnostic pretraining strategy to eliminate pharmaceutical dataset bias. Our results surpass state-of-the-art physical properties and reveal previously unknown structural motifs, offering new insights for the nanotechnology community and demonstrating that ML can drive genuine scientific discovery.', 'score': 2, 'issue_id': 2532, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'ce56c196b6ac1ec3', 'authors': ['Matthias Blaschke', 'Daniel Kienzle', 'Zsuzsanna Koczor-Benda', 'Julian Lorenz', 'Rainer Lienhart', 'Fabian Pauly'], 'affiliations': ['University of Augsburg', 'University of Warwick'], 'pdf_title_img': 'assets/pdf/title_img/2606.30170.jpg', 'data': {'categories': ['#science', '#dataset', '#optimization', '#synthetic', '#training', '#benchmark', '#multimodal'], 'emoji': '⚛️', 'ru': {'title': 'От фармацевтических метрик к реальному научному открытию: генеративные модели для нанотехнологии', 'desc': 'Статья представляет новый бенчмарк NMO для оценки генеративных моделей в задачах молекулярной оптимизации с применением квантовых симуляций вместо простых прокси-метрик. Авторы показывают, что современные методы, обученные на фармацевтических данных, плохо переносятся на задачи нанотехнологии с жесткими структурными ограничениями и сложными ландшафтами оптимизации. Исследователи разработали новый baseline подход, включающий специальное представление для моделирования ограничений и стратегию предобучения без смещения в сторону фармацевтических данных. Результаты демонстрируют, что правильная архитектура генеративной модели, освобожденная от фармацевтического bias, может открывать новые научные закономерности в нанотехнологии.'}, 'en': {'title': 'Revolutionizing Nanotechnology with Generative Models', 'desc': 'The Nanotechnology Molecular Optimization (NMO) Benchmark presents new challenges for generative models in molecular design, focusing on nanotechnology rather than traditional drug discovery. It replaces conventional proxy benchmarks with quantum simulations to ensure that the models are tested on scientifically relevant tasks. The NMO tasks impose strict structural constraints and complex fitness landscapes, which require innovative approaches to generative modeling. By developing a new baseline method that addresses these challenges, the study shows that machine learning can lead to significant discoveries in nanotechnology, moving beyond the limitations of existing pharmaceutical datasets.'}, 'zh': {'title': '推动纳米技术的科学发现', 'desc': '本论文介绍了纳米技术分子优化基准（NMO），旨在解决物理基础的分子设计挑战，推动纳米技术领域的科学发现。NMO基准通过量子模拟替代传统的药物性质代理，强调科学实用性而非排行榜的过拟合。该基准对生成模型提出了新的要求，特别是在结构约束和复杂适应度景观方面。研究结果表明，简单的方法在NMO任务中表现优于复杂的分子优化方法，揭示了新的结构特征，为纳米技术研究提供了新的见解。'}}}, {'id': 'https://huggingface.co/papers/2606.30308', 'title': 'The Surprising Effectiveness of Video Diffusion Models for Hand Motion Reconstruction', 'url': 'https://huggingface.co/papers/2606.30308', 'abstract': 'Abstract ViDiHand uses pretrained video diffusion model representations with hand-overlay rendering to reconstruct 4D hand motion directly from video frames without detectors or optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct 4D hand motion reconstruction from egocentric video is bottlenecked by clear limitations of existing methods: image-based pipelines depend on a detector that fails under heavy occlusion, while video-based methods rely on temporal modules learned only from scarce hand-pose annotations, a narrow signal insufficient to model motion dynamics, occlusion reasoning, and hand-object interaction. These capabilities, however, are exactly what video generative models must implicitly acquire when trained to synthesize coherent video at internet scale. Motivated by this, we present ViDiHand, which leverages the representations of a pretrained video diffusion model to reconstruct 4D two-hand pose. We adapt it via a hand-overlay rendering objective that specializes its features for hands while preserving its world priors. A decoder then recovers metric-scale pose from the adapted features. The whole pipeline operates directly on full frames--no detector, no infiller, and no test-time optimization. On ARCTIC, HOT3D, and HOI4D, ViDiHand substantially outperforms prior methods, establishing video diffusion models as a powerful new foundation for hand motion reconstruction and a promising route to scalable in-the-wild data collection for embodied AI. Project page: https://vidihand.github.io.', 'score': 2, 'issue_id': 2532, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '5351a1843787e66f', 'authors': ['Yuxi Wang', 'Chengkai Jin', 'Yufei Liu', 'Wenqi Ouyang', 'Tianyi Wei', 'Zhiwei Zeng', 'Siyuan Huang', 'Zhiqi Shen', 'Xingang Pan'], 'affiliations': ['Nanyang Technological University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.30308.jpg', 'data': {'categories': ['#diffusion', '#robotics', '#transfer_learning', '#video', '#multimodal'], 'emoji': '🖐️', 'ru': {'title': 'Видеодиффузионные модели как фундамент для восстановления движения рук', 'desc': 'ViDiHand представляет новый подход к восстановлению 4D-движения рук из видеокадров, используя представления предобученной видеодиффузионной модели. Метод применяет специализированную адаптацию через рендеринг наложения рук, которая сохраняет общие знания модели о мире. Декодер восстанавливает метрическую позу рук непосредственно из адаптированных признаков без использования детекторов и оптимизации во время тестирования. На эталонных наборах данных ARCTIC, HOT3D и HOI4D ViDiHand значительно превосходит существующие методы, демонстрируя потенциал видеодиффузионных моделей как мощного фундамента для задач восстановления движения.'}, 'en': {'title': 'Revolutionizing Hand Motion Reconstruction with Video Diffusion Models', 'desc': "ViDiHand is a novel approach for reconstructing 4D hand motion from video frames using pretrained video diffusion models. Unlike traditional methods that rely on detectors or optimization processes, ViDiHand directly utilizes video representations to capture hand movements effectively. It employs a hand-overlay rendering technique to adapt the model's features specifically for hand motion while maintaining contextual understanding of the environment. This method significantly improves performance on various datasets, showcasing the potential of video generative models in advancing hand motion reconstruction for applications in embodied AI."}, 'zh': {'title': 'ViDiHand：无检测器的四维手部运动重建新方法', 'desc': 'ViDiHand 是一种新方法，利用预训练的视频扩散模型直接从视频帧重建四维手部运动，而无需使用检测器或优化过程。现有方法在处理重遮挡时存在明显局限，图像基础的管道依赖于检测器，而视频基础的方法则依赖于稀缺的手势注释。ViDiHand 通过手部叠加渲染目标来调整模型特征，专注于手部的重建，同时保留世界先验知识。该方法在多个数据集上表现优异，展示了视频扩散模型在手部运动重建中的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.25363', 'title': 'TheoremGraph: Bridging Formal and Informal Mathematics', 'url': 'https://huggingface.co/papers/2606.25363', 'abstract': "Abstract A unified mathematical dependency graph connects informal and formal mathematics through semantic embedding and automated extraction from arXiv papers and Lean projects.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mathematical knowledge is organized around statements and their dependencies, but this structure is exposed unevenly: informal papers cite mostly at the document level, while formal libraries record fine-grained dependencies over a much smaller body of mathematics. We introduce TheoremGraph, a unified statement-level dependency graph spanning both informal and formal mathematics. On the informal side, we parse 11.7M theorem-like environments from mathematics arXiv and recover 18.3M candidate directed dependencies, each labeled by the extractor that proposed it so downstream users can trade coverage for precision. On the formal side, we release LeanGraph, a Lean 4 elaborator-level extractor producing 388,105 declaration nodes and 11.3M typed edges across 25 Lean projects. We bridge the two graphs by embedding generated natural-language slogans into a shared semantic space, linking related statements across papers and across the informal/formal divide; an LLM judge affirms 47,952 such matches above a 0.8 cosine floor, with the judge-acceptance rate rising from 48% across the floor to 87% in the >=0.9 tier. On formal concept retrieval, our name-and-signature representation with graph expansion comes within 0.5pp of LeanSearch v2's reranked Recall@10 (0.775 vs. 0.780) without an LM reranker. We release the dataset, extractors, HTTP API, and MCP interface as infrastructure for mathematical search, attribution, and retrieval-augmented reasoning, available at theoremsearch.com and huggingface.co/datasets/uw-math-ai/theorem-matching.", 'score': 2, 'issue_id': 2532, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'cbb8158945c1448a', 'authors': ['Simon Kurgan', 'Evan Wang', 'Eric Leonen', 'Sophie Szeto', 'Luke Alexander', 'Artemii Remizov', 'Jarod Alper', 'Giovanni Inchiostro', 'Vasily Ilin'], 'affiliations': ['University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.25363.jpg', 'data': {'categories': ['#open_source', '#science', '#multilingual', '#rag', '#dataset', '#benchmark', '#graphs', '#data'], 'emoji': '📐', 'ru': {'title': 'Мост между формальной и неформальной математикой через граф зависимостей утверждений', 'desc': 'В работе представлена TheoremGraph — единая база знаний, объединяющая неформальную математику из статей arXiv и формальную математику из проектов Lean через граф зависимостей на уровне утверждений. Авторы извлекли 18.3M потенциальных зависимостей из 11.7M теорем в arXiv и создали LeanGraph с 388,105 узлов декларирований и 11.3M типизированных рёбер из 25 проектов Lean. Для связывания неформальных и формальных графов использовалось семантическое вложение естественно-языковых описаний в общее пространство, что позволило найти 47,952 релевантных соответствий между утверждениями с высокой точностью. Разработанная система достигает результативности, сравнимой с SOTA решениями в задаче поиска математических концепций и служит основой для retrieval-augmented reasoning в математике.'}, 'en': {'title': 'Bridging Informal and Formal Mathematics with TheoremGraph', 'desc': 'This paper presents TheoremGraph, a mathematical dependency graph that connects informal and formal mathematics by utilizing semantic embedding and automated extraction techniques. It analyzes 11.7 million theorem-like environments from arXiv to identify 18.3 million candidate dependencies, while also creating LeanGraph from Lean 4 projects, which includes 388,105 declaration nodes and 11.3 million typed edges. The authors bridge the gap between informal and formal mathematics by embedding natural-language slogans into a shared semantic space, achieving high accuracy in matching related statements. The paper also introduces tools and datasets for enhancing mathematical search and retrieval, making them accessible for further research and applications.'}, 'zh': {'title': '统一数学依赖图：连接非正式与正式数学', 'desc': '本文介绍了一个统一的数学依赖图，连接了非正式和正式数学，通过语义嵌入和从arXiv论文及Lean项目的自动提取来实现。我们提出了TheoremGraph，这是一个涵盖非正式和正式数学的声明级依赖图。我们从数学arXiv解析了1170万个定理环境，恢复了1830万个候选有向依赖，并通过LeanGraph提取了388,105个声明节点和1130万个类型化边。该研究为数学搜索、归属和增强推理提供了基础设施，促进了非正式与正式数学之间的联系。'}}}, {'id': 'https://huggingface.co/papers/2606.23404', 'title': 'ReasoningLens: Hierarchical Visualization and Diagnostic Auditing for Large Reasoning Models', 'url': 'https://huggingface.co/papers/2606.23404', 'abstract': 'Abstract ReasoningLens is an open-source framework that provides hierarchical visualization and diagnostic auditing for complex reasoning chains in large reasoning models, enabling structured analysis and error detection through interactive hierarchies and automated auditing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The emergence of Large Reasoning Models has introduced exceptionally long Chain-of-Thought traces, creating a transparency burden where critical logic is often buried under massive procedural text. To address this, we present ReasoningLens, an open-source framework designed for the hierarchical visualization and diagnostic auditing of complex reasoning chains. ReasoningLens addresses information necropsy by: (1) structuring traces into interactive hierarchies that separate high-level strategy from low-level execution; (2) leveraging an agentic auditor for automated error detection and tool-augmented verification; and (3) synthesizing systemic reasoning profiles to reveal model-specific blind spots. By transforming unstructured walls of text into actionable insights, ReasoningLens provides a modular foundation for interpreting, debugging, and optimizing the next generation of reasoning-centric AI.', 'score': 2, 'issue_id': 2531, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'e7cc7920d3f5557e', 'authors': ['Jun Zhang', 'Jiasheng Zheng', 'Boxi Cao', 'Yaojie Lu', 'Hongyu Lin', 'Jia Zheng', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory Institute of Software, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.23404.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Структурированная интерпретация цепочек рассуждений моделей', 'desc': 'ReasoningLens — это фреймворк для визуализации и аудита длинных цепочек рассуждений в больших языковых моделях, которые генерируют расширенные traces мышления. Система структурирует эти трассы в интерактивные иерархии, отделяя высокоуровневую стратегию от низкоуровневой реализации. Фреймворк использует агентный аудитор для автоматического обнаружения ошибок и верификации логики в цепочках рассуждений. Инструмент помогает интерпретировать, отлаживать и оптимизировать поведение моделей, выявляя систематические пробелы в их рассуждениях.'}, 'en': {'title': 'Unraveling Complexity in AI Reasoning', 'desc': 'ReasoningLens is a framework that helps visualize and audit complex reasoning processes in large AI models. It organizes reasoning traces into clear hierarchies, making it easier to distinguish between overall strategies and detailed steps. The framework also includes an automated auditing tool that detects errors and verifies the reasoning paths taken by the model. By converting complex text into structured insights, ReasoningLens aids in understanding and improving reasoning-based AI systems.'}, 'zh': {'title': '推理链的可视化与审计新工具', 'desc': 'ReasoningLens是一个开源框架，旨在为大型推理模型中的复杂推理链提供分层可视化和诊断审计。它通过将推理链结构化为交互式层次，帮助用户区分高层策略与低层执行，从而提高透明度。该框架还利用自动化审计工具进行错误检测，帮助识别模型特定的盲点。通过将无结构的文本转化为可操作的见解，ReasoningLens为推理中心的人工智能的解释、调试和优化提供了模块化基础。'}}}, {'id': 'https://huggingface.co/papers/2606.29887', 'title': 'SafePyramid: A Hierarchical Benchmark for In-context Policy Guardrailing', 'url': 'https://huggingface.co/papers/2606.29887', 'abstract': "Abstract SafePyramid benchmark evaluates guardrail systems' ability to identify safety violations through in-context policy specification across multiple domains and complexity levels.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In real-world applications, guardrails are often expected to identify unsafe user-model interactions according to application-specific safety policies, rather than relying on predefined risk taxonomies. In this work, we study this setting under the paradigm of in-context policy guardrailing, where guardrails predict safety violations based on policy specifications provided in context. To systematically evaluate this capability, we introduce SafePyramid, a safety benchmark comprising 1,000 multi-turn conversations across 10 domains and 3,000 corresponding application-specific policies, which together contain 61,699 distinct natural-language rules. SafePyramid organizes the evaluation into three difficulty levels: L0 evaluates individual-rule understanding, L1 evaluates reasoning over rule dependencies, and L2 evaluates adaptation of full novel policy frameworks defined in context. To ensure benchmark quality, we employ a rigorous multi-stage pipeline to construct and validate the benchmark. Using SafePyramid, we evaluate 10 frontier LLMs and 5 policy-configurable guardrails and find that in-context policy guardrailing remains highly challenging: even the best-performing model, GPT-5.5, exactly identifies the full set of violated rules in only 54.0%, 35.3%, and 12.9% cases on L0, L1, and L2, respectively. These results highlight the limitations of current guardrails and call for stronger in-context policy guardrails that can reliably execute policies, resolve rule dependencies, and adapt to novel policy frameworks.", 'score': 1, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'e57767e6e7b9dc52', 'authors': ['Jiacheng Zhang', 'Haoyu He', 'Sen Zhang', 'Shen Wang', 'Xiaolei Xu', 'Yuhao Sun', 'Meng Shen', 'Feng Liu'], 'affiliations': ['ByteDance', 'The University of Melbourne'], 'pdf_title_img': 'assets/pdf/title_img/2606.29887.jpg', 'data': {'categories': ['#alignment', '#ethics', '#benchmark', '#dataset', '#reasoning'], 'emoji': '🛡️', 'ru': {'title': 'Контекстные политики безопасности: от простых правил к сложным фреймворкам', 'desc': 'В работе представлен бенчмарк SafePyramid для оценки систем безопасности (guardrails), которые должны идентифицировать нарушения политики безопасности на основе спецификаций, предоставленных в контексте диалога. Бенчмарк содержит 1000 многооборотных диалогов по 10 доменам с 3000 специфичными для приложения политиками и включает 61699 уникальных правил на естественном языке. Оценка организована по трём уровням сложности: L0 проверяет понимание отдельных правил, L1 оценивает логический вывод с учётом зависимостей между правилами, L2 проверяет адаптацию к полностью новым политикам. Экспериментальные результаты показывают, что даже лучшие современные LLM и guardrails борются с этой задачей, правильно определяя все нарушения в только 54%, 35% и 13% случаев на соответствующих уровнях.'}, 'en': {'title': 'Enhancing Guardrails for Safer AI Interactions', 'desc': 'The paper introduces SafePyramid, a benchmark designed to evaluate the effectiveness of guardrail systems in identifying safety violations based on in-context policy specifications. It consists of 1,000 multi-turn conversations across various domains, accompanied by 3,000 application-specific policies that include a vast number of natural-language rules. The evaluation is structured into three levels of difficulty, assessing individual rule understanding, reasoning over rule dependencies, and adaptation to new policy frameworks. Results show that even advanced models struggle with in-context policy guardrailing, indicating a need for improved systems that can better handle complex safety policies.'}, 'zh': {'title': '提升安全性：SafePyramid基准测试的探索', 'desc': 'SafePyramid基准测试评估了保护系统在多个领域和复杂性水平下识别安全违规行为的能力。该研究提出了一种基于上下文政策的保护方法，允许系统根据特定的安全政策预测违规行为。SafePyramid包含1000个多轮对话和3000个应用特定政策，涵盖61699条自然语言规则，分为三个难度级别进行评估。研究结果表明，当前的保护系统在执行政策和适应新政策框架方面仍面临重大挑战。'}}}, {'id': 'https://huggingface.co/papers/2606.30084', 'title': 'One Forward Beats Two: InnerZoom for Accurate and Efficient GUI Grounding', 'url': 'https://huggingface.co/papers/2606.30084', 'abstract': 'Abstract InnerZoom addresses GUI grounding challenges by preserving target-region awareness across decoder layers through a single-forward pass that bridges cross-layer evidence, achieving state-of-the-art performance with reduced computational cost.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct MLLM-based GUI grounding methods commonly formulate target localization as autoregressive coordinate generation, enabling models to leverage the strong instruction-following and semantic understanding capabilities of MLLMs. However, this formulation requires the model to retain region-level target evidence while decoding coordinate tokens with the spatial precision demanded by GUI clicking. Our diagnostic analysis reveals that target-region awareness emerges in intermediate decoder layers but is neither retained nor translated into the final coordinate prediction. Existing ZoomIn-style methods address this issue through an external crop-and-rerun pass, which improves localization but increases end-to-end latency and computational cost. To retain the accuracy benefits of two-pass zooming without this extra cost, we propose InnerZoom, a single-forward framework for cross-layer evidence bridging. InnerZoom transforms target-related cues from the original forward pass into a compact cross-layer evidence state, then preserves, refines, and reinjects this state throughout later decoding layers to guide coordinate prediction. Extensive experimental results suggest that InnerZoom-4B achieves state-of-the-art performance on all six GUI grounding benchmarks, obtaining 64.7 on OSWorld-G, 40.2 on UI-Vision, 73.1 on OSWorld-GR, and 87.6 on MMBench-GUI, surpassing the previous best results by 4.1, 3.2, 2.9, and 2.3 points, respectively. Under a controlled 4B setting, InnerZoom improves the same SFT+RL baseline by 5.3 points on average and outperforms two-pass ZoomIn by 1.3 points on average, while reducing end-to-end latency by up to 31.8% and TFLOPs by about 29%. Code and models will be publicly available.', 'score': 1, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'b8f4284428d398f0', 'authors': ['Chen Liu', 'Ling Chen', 'Hanzhang Zhou', 'Liangyu Chen', 'Chenglin Cai', 'Xin Yu', 'Steven Hoi', 'Yue Wang'], 'affiliations': ['MAI', 'Tongyi'], 'pdf_title_img': 'assets/pdf/title_img/2606.30084.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#inference', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Сохранение информации о цели внутри слоёв для точной локализации элементов интерфейса', 'desc': 'InnerZoom решает задачу локализации элементов графического интерфейса, сохраняя информацию о целевом регионе через все слои декодера в одном проходе модели. Авторы обнаружили, что информация о целевом регионе появляется во внутренних слоях декодера, но не сохраняется при генерации координат. Предложенный метод трансформирует информацию о целевом объекте в компактное представление и последовательно обновляет и перевпрыскивает его в следующие слои декодера для направления предсказания координат. InnerZoom достигает лучших результатов на всех бенчмарках при одновременном снижении вычислительных затрат на 29-31% по сравнению с двухпроходными подходами.'}, 'en': {'title': 'InnerZoom: Efficient GUI Grounding with Cross-Layer Awareness', 'desc': 'InnerZoom is a novel approach to improve GUI grounding by maintaining awareness of target regions throughout the decoding process. It does this by creating a compact state that captures important information from earlier layers and using it to enhance coordinate predictions in later layers. This method allows for accurate localization without the need for additional computationally expensive passes, thus reducing latency and resource usage. Experimental results show that InnerZoom outperforms existing methods on multiple benchmarks, achieving significant improvements in performance while being more efficient.'}, 'zh': {'title': 'InnerZoom：高效的GUI定位新方法', 'desc': 'InnerZoom 是一种新方法，旨在解决图形用户界面（GUI）定位中的挑战。它通过在解码器层之间保持目标区域的意识，使用单次前向传递来连接跨层证据，从而提高了性能并降低了计算成本。与传统的两次传递方法相比，InnerZoom 能够在不增加延迟的情况下，保持高精度的坐标预测。实验结果表明，InnerZoom 在多个 GUI 基准测试中表现优异，超越了之前的最佳结果。'}}}, {'id': 'https://huggingface.co/papers/2606.29686', 'title': 'PoseShield: Neural Collision Fields for Human Self-Collision Resolution', 'url': 'https://huggingface.co/papers/2606.29686', 'abstract': 'Abstract PoseShield addresses self-collision issues in SMPL-based human pose estimation by applying neural collision constraints in pose space through constrained optimization and Eikonal regularization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Self-collision remains a persistent challenge in SMPL-based human pose estimation and motion generation. Under extreme articulations or stochastic motion synthesis, generated meshes frequently exhibit self-penetrations, leading to physically implausible results. We propose PoseShield, a neural collision constraint defined directly in SMPL pose space. We formulate collision correction as a constrained optimization problem and connect the learned constraint with the Eikonal equation. Enforcing Eikonal regularization ensures non-vanishing gradients near the collision boundary, improving numerical stability and robustness of the optimization process. Unlike prior methods that operate in the mesh space or rely on heuristic penalties, our approach operates directly in the low-dimensional space of human poses and is theoretically grounded. The same learned constraint extends to human motion sequences, providing a generator-agnostic post-hoc collision corrector without retraining the underlying motion model. Experiments on a newly constructed SMPL pose benchmark show that our method achieves a 95.8% success rate and outperforms state-of-the-art baselines.', 'score': 1, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'c0670ff8114e65bb', 'authors': ['Zhengyuan Li', 'Zeyun Deng', 'Yifan Shen', 'Liangyan Gui', 'Miaolan Xie', 'Joseph Campbell', 'Xifeng Gao', 'Kui Wu', 'Zherong Pan', 'Aniket Bera'], 'affiliations': ['LightSpeed Studios, Bellevue WA 98004, USA', 'Purdue University, West Lafayette IN 47907, USA', 'University of Illinois Urbana-Champaign, Champaign IL 61820, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.29686.jpg', 'data': {'categories': [], 'emoji': '🚫', 'ru': {'title': 'Физически корректные позы через нейронные ограничения коллизий', 'desc': 'PoseShield решает проблему самопересечений в оценке позы человека на основе SMPL, применяя нейронные ограничения коллизий непосредственно в пространстве поз через оптимизацию с ограничениями и регуляризацию Эйконала. Метод формулирует коррекцию коллизий как задачу условной оптимизации, где нейронное ограничение связано с уравнением Эйконала для обеспечения устойчивых градиентов на границе столкновения. В отличие от предыдущих подходов, работающих в пространстве сеток, PoseShield оперирует в низкоразмерном пространстве человеческих поз и имеет теоретическое обоснование. Один раз обученное ограничение применяется как к отдельным позам, так и к последовательностям движений, работая как универсальный корректор без переобучения исходной модели.'}, 'en': {'title': 'PoseShield: Enhancing Human Pose Estimation with Neural Collision Constraints', 'desc': 'PoseShield tackles the problem of self-collision in human pose estimation using the SMPL model by introducing neural collision constraints directly in the pose space. It formulates the collision correction as a constrained optimization problem, enhancing the stability of the optimization process through Eikonal regularization. This method operates in the low-dimensional space of human poses, making it more efficient than previous techniques that worked in mesh space. The approach not only corrects collisions effectively but also applies to various human motion sequences without needing to retrain the motion model, achieving a high success rate in experiments.'}, 'zh': {'title': 'PoseShield：解决人体姿态自碰撞的创新方法', 'desc': 'PoseShield 解决了基于 SMPL 的人体姿态估计中的自碰撞问题。它通过在姿态空间中应用神经碰撞约束，使用约束优化和 Eikonal 正则化来实现。该方法直接在低维的人体姿态空间中操作，避免了以往方法在网格空间中的局限性。实验结果表明，PoseShield 在新构建的 SMPL 姿态基准上取得了 95.8% 的成功率，超越了现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2606.29501', 'title': 'Learning Transferable Dynamics Priors from Action to World Modeling', 'url': 'https://huggingface.co/papers/2606.29501', 'abstract': 'Abstract Action-conditioned world modeling enables transferable dynamics priors for robot learning through pretraining on large-scale manipulation data, supporting both simulator-based policy evaluation and video-action prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We study action-conditioned world modeling as a scalable way to learn transferable dynamics priors for robot learning. By pretraining a model to predict how actions drive visual scene evolution, the resulting world model captures reusable interaction dynamics beyond appearance-level video generation. Concretely, we pretrain a multi-view interactive base diffusion world model, A2World, on large-scale robot manipulation data with real action annotations. We validate the learned dynamics priors from two complementary perspectives. First, we adapt A2World into a task- or scene-specialized real-world simulator, A2World-sim, whose long-horizon rollouts support simulator-based policy evaluation and scalable what-if analysis by replacing real-robot rollouts with world model rollouts. Second, starting from the same pretrained weights, we adapt A2World into a video-action joint prediction model, A2World-policy, that predicts actions under visual and instruction conditioning. Experiments across simulation benchmarks and real-robot settings demonstrate that action-conditioned world model pretraining yields transferable dynamics priors that benefit both simulator-centric and policy-centric robot learning.', 'score': 1, 'issue_id': 2532, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': 'fc7b4b52951a8f35', 'authors': ['Ze Huang', 'Jiahui Zhang', 'Hairuo Liu', 'Chenxi Zhang', 'Ran Cheng', 'Li Zhang'], 'affiliations': ['McGill University, Montreal, QC, Canada', 'School of Data Science, Fudan University, Shanghai, China', 'Shanghai Innovation Institute, Shanghai, China', 'Shanghai Jiao Tong University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.29501.jpg', 'data': {'categories': ['#diffusion', '#robotics', '#transfer_learning', '#synthetic', '#training', '#video', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Действия обучают робота видеть будущее', 'desc': 'В статье предлагается метод обучения модели мира, обусловленной действиями робота, для получения переносимых приоритетов динамики в задачах робототехники. Модель предварительно обучается на большом наборе данных манипуляции роботов с аннотациями действий, позволяя захватить семантику взаимодействия, а не только визуальные изменения. Полученная модель может адаптироваться в специализированный симулятор для оценки политик и предсказания долгосрочных траекторий без реального робота. Демонстрируется, что такое предварительное обучение модели мира улучшает как симуляторные, так и политико-ориентированные подходы к обучению роботов.'}, 'en': {'title': 'Learning Dynamics for Robots: Action-Conditioned World Modeling', 'desc': 'This paper introduces action-conditioned world modeling as a method to create transferable dynamics priors for robot learning. By pretraining a model on extensive manipulation data, the authors develop a world model that understands how actions influence visual changes in a scene. They present two applications of this model: A2World-sim, a simulator for evaluating robot policies, and A2World-policy, which predicts actions based on visual inputs and instructions. The results show that this approach enhances both simulation and real-world robot learning by providing reusable dynamics knowledge.'}, 'zh': {'title': '基于动作的世界建模：提升机器人学习的动态先验', 'desc': '本文研究了基于动作的世界建模，旨在为机器人学习提供可转移的动态先验知识。通过在大规模操作数据上进行预训练，模型能够预测动作如何驱动视觉场景的演变，从而捕捉可重用的交互动态。我们提出了一个多视角交互基础扩散世界模型A2World，并将其应用于真实动作注释的机器人操作数据。实验结果表明，基于动作的世界模型预训练能够有效支持模拟器和策略中心的机器人学习。'}}}, {'id': 'https://huggingface.co/papers/2606.29655', 'title': 'Geometric Stability of Neural Population Codes: Regional Variation, Behavioral Relevance, and Circuit Dependence', 'url': 'https://huggingface.co/papers/2606.29655', 'abstract': 'Abstract Geometric stability measures the consistency of pairwise stimulus distances across trials, revealing a distinct aspect of neural representation that differs from temporal stability and decoding accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current models of representational reliability in neural populations focus on temporal stability: whether population centroids are preserved across sessions and days. This framing leaves a fundamental question unanswered: how reliably does the pairwise distance structure among stimuli reproduce across independent observations within a session? We argue that this property, geometric stability, constitutes an independent axis of representational analysis that existing frameworks do not capture. We formalize geometric stability as the Spearman rank correlation between split-half representational dissimilarity matrices (Shesha) and show that it is empirically dissociable from both temporal stability and decoding accuracy. Across 229 area-session observations spanning 68 brain regions in a visual discrimination task (Steinmetz et al. 2019), geometric stability predicts trial-by-trial neural-behavioral coupling (ρ= 0.18, p = 0.005) while centroid drift does not (ρ= 0.002, p = 0.976). The regional hierarchy, with striatum most stable (S = 0.44) and hippocampus least (S = 0.19), runs roughly opposite to the temporal stability hierarchy. Directionally consistent olfactory data (Bolding \\& Franks 2018) motivate an attractor network model in which recurrent excitatory coupling amplifies split-half RDM consistency by completing stimulus patterns from sparse feedforward input (ρ= +0.64, p = 0.010), providing a circuit-level account of how geometric stability emerges. These results establish geometric stability as a functionally relevant, circuit-dependent property of neural population codes, orthogonal to temporal drift measures and complementary to recent accounts of how recurrent connectivity balances representational stability with sequential dynamics in hippocampal circuits.', 'score': 1, 'issue_id': 2531, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': 'a1cb50850a896aba', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.29655.jpg', 'data': {'categories': ['#cv'], 'emoji': '🧠', 'ru': {'title': 'Геометрическая стабильность: независимое измерение структурированности нейронного кода', 'desc': 'В этой работе авторы вводят новый показатель геометрической стабильности нейронного кодирования, который измеряет согласованность попарных расстояний между стимулами в независимых наблюдениях. Это свойство оказывается независимым от традиционно изучаемой темпоральной стабильности и точности декодирования, формализуется через ранговую корреляцию матриц попарных различий (Shesha) и может быть вычислено на split-half данных. Анализ 229 наблюдений из 68 областей мозга показал, что геометрическая стабильность предсказывает нейро-поведенческую связь на уровне отдельных пробок, при этом иерархия стабильности по регионам обратна иерархии темпоральной стабильности. На основе обонятельных данных авторы предложили модель аттрактора, объясняющую возникновение геометрической стабильности как результат усиления рекуррентной связностью согласованности репрезентаций из разреженного входного сигнала.'}, 'en': {'title': 'Geometric Stability: A New Dimension in Neural Representation Analysis', 'desc': 'This paper introduces the concept of geometric stability, which measures how consistently the distances between stimuli are represented in the brain across different trials. Unlike traditional measures that focus on temporal stability, geometric stability assesses the reliability of pairwise distance structures within a single session. The authors formalize this concept using the Spearman rank correlation between split-half representational dissimilarity matrices, demonstrating its independence from temporal stability and decoding accuracy. Their findings suggest that geometric stability is a crucial aspect of neural representation that can predict neural-behavioral coupling, highlighting its importance in understanding neural population codes.'}, 'zh': {'title': '几何稳定性：神经表征的新维度', 'desc': '几何稳定性衡量了在不同试验中刺激之间距离的一致性，这与时间稳定性和解码准确性不同。现有的神经群体表征可靠性模型主要关注时间稳定性，即群体质心在不同会话和天数中的保持情况。本文提出几何稳定性作为一种独立的表征分析维度，并通过Spearman等级相关性来形式化这一概念。研究表明，几何稳定性与时间稳定性和解码准确性是可以区分的，并且在视觉辨别任务中，几何稳定性能够有效预测神经与行为的耦合。'}}}, {'id': 'https://huggingface.co/papers/2606.25393', 'title': 'Large-Scale Tunnel Air-Ground Collaboration With FLISP: Fast LiDAR-IMU Synchronized Path Planner', 'url': 'https://huggingface.co/papers/2606.25393', 'abstract': 'Abstract  Hydropower tunnel inspection is critical for infrastructure integrity yet remains inefficient and hazardous using manual methods. We propose FLISP (Fast LiDAR-IMU Synchronized Path Planner), a mapless planning framework for cooperative UGV-UAV inspection. Unlike traditional map-based paradigms, FLISP features three core contributions: (1) a unified architecture where a single UGV-mounted LiDAR-IMU suite drives synchronized path generation for both platforms; (2) platform-specific solvers utilizing an enhanced Firefly Algorithm for UGV obstacle avoidance and a dynamic iterative optimizer for UAV flight; and (3) a hierarchical refinement strategy ensuring kinematic feasibility without state estimation drift. Benchmarks in a 1.2 km operational tunnel demonstrate that FLISP circumvents structural bottlenecks of map-based methods, eliminating map rasterization overhead (Fast-LIO2 + A*) and sampling instability (LIO-SAM + RRT*). FLISP achieves a 100% success rate with 7 ms latency, representing a 7-fold speedup over grid-based and a three-order-of-magnitude improvement over sampling-based baselines. Validated in operational hydropower tunnels, this approach offers a scalable solution for robotic inspection in feature-degraded linear infrastructure. A demonstration video is available at https://youtu.be/Y_ezs1PfLJ4, and the code at https://github.com/ArchibaldGuo/FLISP.git.', 'score': 1, 'issue_id': 2532, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '5e8d642b3ec92b5c', 'authors': ['Fenghe Guo', 'Runjie Shen', 'Chenyang Sun', 'Junrui Zhang', 'Quanxi Zhan', 'Yongchun Wang', 'Junjie Zhang'], 'affiliations': ['College of Electronic and Information Engineering, Tongji University', 'Shanghai Research Institute for Intelligent Autonomous Systems, Tongji University', 'State Key Laboratory of Autonomous Intelligent Unmanned Systems, Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2606.25393.jpg', 'data': {'categories': [], 'emoji': '🚁', 'ru': {'title': 'Синхронное планирование пути для кооперативной инспекции без картографирования', 'desc': 'Статья предлагает FLISP — фреймворк планирования пути без построения карты для совместной инспекции туннелей с использованием робота-наземного аппарата (UGV) и дрона (UAV). В отличие от традиционных методов на основе карт, система использует единый набор датчиков LiDAR-IMU для синхронной генерации траекторий обоих платформ. Авторы применили оптимизированный алгоритм светлячка для избежания препятствий наземным роботом и динамический итеративный оптимизатор для полёта дрона с иерархической проверкой кинематической допустимости. Экспериментальная валидация в реальных туннелях гидроэлектростанций показала семикратное ускорение по сравнению с сеточными методами и трёхпорядковое улучшение относительно методов на основе случайной выборки.'}, 'en': {'title': 'Revolutionizing Tunnel Inspections with Mapless Robotics', 'desc': 'The paper presents FLISP, a novel framework for inspecting hydropower tunnels using unmanned ground vehicles (UGVs) and unmanned aerial vehicles (UAVs). It introduces a mapless planning approach that synchronizes path generation through a unified LiDAR-IMU system, enhancing efficiency and safety in inspections. FLISP employs specialized algorithms for obstacle avoidance in UGVs and optimized flight paths for UAVs, ensuring effective navigation without relying on traditional maps. The framework demonstrates significant performance improvements, achieving a 100% success rate and drastically reducing latency compared to existing methods.'}, 'zh': {'title': 'FLISP：高效的水电隧道检查解决方案', 'desc': '本文提出了一种名为FLISP的快速激光雷达-惯性测量单元同步路径规划框架，用于水电隧道的无人机和无人地面车辆的协作检查。FLISP的核心贡献包括：统一架构使得UGV和UAV能够同步生成路径；针对不同平台的求解器，UGV使用增强的萤火虫算法进行障碍物规避，而UAV则使用动态迭代优化器进行飞行；分层优化策略确保运动学可行性，避免状态估计漂移。通过在1.2公里的隧道中进行基准测试，FLISP展示了其在效率和稳定性上的显著优势，成功率达到100%，延迟仅为7毫秒。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (9)', '#agi', '#alignment (1)', '#architecture (5)', '#audio (1)', '#benchmark (16)', '#cv (6)', '#data (4)', '#dataset (10)', '#diffusion (4)', '#ethics (1)', '#games', '#graphs (1)', '#hallucinations', '#healthcare', '#inference (5)', '#interpretability (3)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (11)', '#open_source (7)', '#optimization (7)', '#plp', '#rag (1)', '#reasoning (5)', '#rl (1)', '#rlhf (2)', '#robotics (2)', '#science (4)', '#security', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (2)', '#training (11)', '#transfer_learning (3)', '#video (8)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
