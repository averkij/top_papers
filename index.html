erformance capabilities. By analyzing the decision-making process in two stages—cognition and execution—they find that most discrepancies occur in the transition from recognizing the need for a tool to actually using it.'}, 'zh': {'title': '缩小工具使用的知行差距', 'desc': '本研究揭示了语言模型在识别工具需求与实际调用工具行为之间的脱节，形成了工具使用可靠性的“知行差距”。大型语言模型（LLMs）作为自主代理，需要判断何时直接回答，何时调用外部工具。我们提出了一种基于模型实际表现的工具必要性定义，并比较了四个模型在算术和事实问答数据集上的工具调用行为，发现存在显著的不匹配。研究表明，改善工具使用的可靠性不仅需要更好地识别工具的需求，还需要更有效地将这种识别转化为实际行动。'}}}, {'id': 'https://huggingface.co/papers/2605.16839', 'title': 'CompactAttention: Accelerating Chunked Prefill with Block-Union KV Selection', 'url': 'https://huggingface.co/papers/2605.16839', 'abstract': 'Abstract CompactAttention improves chunked prefill attention efficiency by using Block-Union KV Selection to minimize KV block tables and enable in-place access without explicit compaction.  AI-generated summary Chunked prefill has become a widely adopted serving strategy for long-context large language models, but efficient attention computation in this regime remains challenging. Existing sparse attention methods are primarily designed for one-shot prefill and do not translate efficiently to chunked prefill: block-sparse kernels lose efficiency when the query length is limited by the chunk size, while fine-grained pattern search becomes costly when repeated over the accumulated KV cache at every chunk. QUOKA, a recent method that directly targets chunked prefill, avoids sparse-kernel overhead but relies on query-subsampled, token-level KV selection, which can miss query-specific KV entries and introduce explicit KV-copy overhead. To address these limitations, we propose CompactAttention, a chunked-prefill attention mechanism based on Block-Union KV Selection. CompactAttention treats 2D block-sparse masks as KV-selection signals rather than direct sparse-kernel execution plans, and converts them into GQA-aware per-group KV block tables through Q-block union and intra-group union. This construction produces the minimal block tables that preserve all KV blocks selected by the input masks under paged execution constraints, enabling selected KV blocks to be accessed in place without explicit KV compaction. On LLaMA-3.1-8B-Instruct, CompactAttention maintains accuracy close to dense attention on the RULER benchmark while delivering up to 2.72times attention speedup at 128K context length under chunked prefill.', 'score': 10, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '860028fdf62ee802', 'authors': ['Jiwon Song', 'Dongwon Jo', 'Beomseok Kang', 'Jae-Joon Kim'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.16839.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Ускорение внимания в LLM через умную выборку KV блоков', 'desc': 'Работа представляет CompactAttention, механизм внимания для эффективной обработки длинных контекстов в больших языковых моделях при использовании стратегии разбиения на блоки. Метод использует Block-Union KV Selection для минимизации таблиц KV блоков и позволяет получать доступ к ним без явного копирования. CompactAttention преобразует двумерные блочно-разреженные маски в таблицы KV блоков, учитывая особенности групповой квантизации внимания (GQA). Авторы достигли ускорения внимания в 2.72 раза на контекстах длиной 128K, сохраняя при этом точность, близкую к плотному вниманию.'}, 'en': {'title': 'Efficient Attention for Long Contexts with CompactAttention', 'desc': 'CompactAttention is a new method designed to improve the efficiency of attention computation in large language models that use chunked prefill strategies. It introduces Block-Union KV Selection, which minimizes the size of key-value (KV) block tables and allows for direct access to these blocks without needing to compact them first. This approach overcomes limitations of existing methods by treating block-sparse masks as signals for selecting KV pairs, rather than as plans for sparse-kernel execution. As a result, CompactAttention achieves significant speed improvements while maintaining accuracy, making it suitable for long-context applications.'}, 'zh': {'title': 'CompactAttention：高效的分块预填充注意力机制', 'desc': 'CompactAttention是一种改进的注意力机制，旨在提高分块预填充的效率。它通过使用块联合KV选择，减少KV块表的大小，并实现无显式压缩的就地访问。与现有的稀疏注意力方法相比，CompactAttention能够在保持准确性的同时，显著加快注意力计算速度。实验表明，在长上下文长度下，CompactAttention在RULER基准测试中表现出接近密集注意力的准确性，同时实现了高达2.72倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2605.15565', 'title': 'AstraFlow: Dataflow-Oriented Reinforcement Learning for Agentic LLMs', 'url': 'https://huggingface.co/papers/2605.15565', 'abstract': 'Abstract AstraFlow is a dataflow-oriented reinforcement learning system that enables efficient multi-policy collaborative training and elastic scaling across diverse compute resources for large language model agents.  AI-generated summary Reinforcement learning (RL) is increasingly used to improve the reasoning, coding, and tool-use capabilities of large language models, but agentic RL remains prohibitively expensive. Scaling RL to agentic LLMs requires supporting complex workloads, including multi-policy collaborative training, while efficiently using elastic, heterogeneous, and cross-region compute resources. Existing LLM RL systems support some of these capabilities, but each new extension often requires dedicated system engineering. This burden arises from trainer-centered control architectures and the lack of principled abstractions for RL system components. To address these limitations, we propose AstraFlow, a dataflow-oriented RL system that replaces conventional trainer-centered control with principled component abstractions. In AstraFlow, rollout services, dataflow management, and training are decoupled into autonomous components, enabling the system to natively support complex multi-policy agentic RL workloads and efficiently exploit diverse compute resources. We evaluate AstraFlow across math, code, search, and AgentBench workloads, showing that the same system supports multi-policy training, elastic scaling, heterogeneous cross-region execution, and composable data algorithms without system-level code changes. In multi-policy collaborative training, AstraFlow achieves comparable or better accuracy than existing RL systems while speeding up training time by 2.7x.', 'score': 10, 'issue_id': 2266, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '33b6b9c9e8ba6483', 'authors': ['Haizhong Zheng', 'Yizhuo Di', 'Jiahui Wang', 'Shuowei Jin', 'Xueshen Liu', 'Yongji Wu', 'Z. Morley Mao', 'Ion Stoica', 'Jiawei Zhao', 'Beidi Chen'], 'affiliations': ['Carnegie Mellon University', 'Meta', 'UC Berkeley', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2605.15565.jpg', 'data': {'categories': ['#rl', '#training', '#agents', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'Модульная архитектура потоков данных для масштабируемого обучения с подкреплением LLM агентов', 'desc': 'AstraFlow — это система обучения с подкреплением, ориентированная на потоки данных, которая позволяет эффективно обучать большие языковые модели с несколькими политиками одновременно. Система использует децентрализованную архитектуру, где сервисы генерации траекторий, управление потоками данных и обучение работают независимо как автономные компоненты. Это позволяет системе естественно поддерживать сложные рабочие нагрузки и эффективно использовать различные вычислительные ресурсы разных регионов без изменений кода. Экспериментальные результаты показывают ускорение обучения в 2.7 раза при сравнимой или лучшей точности по сравнению с существующими системами RL.'}, 'en': {'title': 'AstraFlow: Revolutionizing Reinforcement Learning for Large Language Models', 'desc': 'AstraFlow is a novel reinforcement learning (RL) system designed to enhance the training of large language models (LLMs) by enabling multi-policy collaborative training and efficient resource scaling. It addresses the challenges of existing RL systems, which often require extensive engineering for new features, by introducing a dataflow-oriented architecture that decouples key components like rollout services and data management. This design allows AstraFlow to efficiently utilize diverse computing resources and support complex workloads without needing system-level code changes. The system demonstrates significant improvements in training speed and accuracy across various tasks, outperforming traditional RL approaches.'}, 'zh': {'title': 'AstraFlow：高效的多策略强化学习系统', 'desc': 'AstraFlow 是一个面向数据流的强化学习系统，旨在高效地进行多策略协作训练，并在多种计算资源上实现弹性扩展，特别适用于大型语言模型代理。该系统通过将传统的以训练者为中心的控制架构替换为原则性组件抽象，解决了现有系统的局限性。AstraFlow 将回滚服务、数据流管理和训练解耦为自主组件，从而能够原生支持复杂的多策略代理强化学习工作负载。实验结果表明，AstraFlow 在多策略协作训练中实现了与现有系统相当或更好的准确性，同时训练时间提高了 2.7 倍。'}}}, {'id': 'https://huggingface.co/papers/2605.17242', 'title': 'From Runnable to Shippable: Multi-Agent Test-Driven Development for Generating Full-Stack Web Applications from Requirements', 'url': 'https://huggingface.co/papers/2605.17242', 'abstract': "Abstract TDDev automates test-driven development for web application generation by integrating requirement analysis, browser-based validation, and structured repair reporting to improve code quality and reduce human intervention.  AI-generated summary Coding agents can generate web applications from natural-language descriptions, yet a recent benchmark study shows that generated applications fail to meet functional requirements in over 70% of cases. The core difficulty is that web correctness cannot be assessed from source files or terminal output: the application must be deployed, exercised through simulated browser interactions, and failures must be translated into actionable repair signals -- steps that current agents cannot perform without human mediation.   We present TDDev, a framework that automates this closed loop through three stages: (1) converting high-level requirements into structured acceptance tests before any code is written, (2) deploying the application and validating it through browser-based interaction simulation, and (3) translating browser-observed failures into structured repair reports for the coding agent. Enabled by TDDev, we conduct the first controlled empirical study of Test-driven development (TDD) strategies for web application generation, comparing four development protocols across two coding agents, two backbone models, and two benchmarks. TDD infrastructure consistently improves generation quality by 34--48 percentage points over a no-TDD baseline. The central finding is that the optimal protocol depends on the model's generation style: models that build applications holistically benefit most from agentic enforcement, while models that extend code conservatively benefit from incremental enforcement. Mismatching protocol to generation style eliminates the TDD benefit entirely while multiplying token cost up to 25-fold. A user study confirms that TDDev reduces manual developer intervention to zero, shifting the workload from continuous prompt engineering to autonomous, feedback-driven refinement.", 'score': 9, 'issue_id': 2263, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'f3e6b94a2134bfec', 'authors': ['Yuxuan Wan', 'Tingshuo Liang', 'Jiakai Xu', 'Jingyu Xiao', 'Yintong Huo', 'Michael R Lyu'], 'affiliations': ['Columbia University', 'Singapore Management University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.17242.jpg', 'data': {'categories': ['#plp', '#agents', '#benchmark'], 'emoji': '🧪', 'ru': {'title': 'TDD для автоматической генерации веб-приложений: от требований к исправленному коду', 'desc': 'TDDev — это фреймворк, который автоматизирует разработку веб-приложений с использованием методологии TDD (test-driven development). Система преобразует требования в структурированные тесты приёмки, развёртывает приложение и валидирует его через имитацию взаимодействия браузера, а затем переводит обнаруженные ошибки в сигналы для исправления кода. Экспериментальное исследование показало, что применение TDD улучшает качество генерируемых приложений на 34-48 процентных пункта по сравнению с базовым подходом. Ключевой вывод заключается в том, что оптимальная стратегия зависит от стиля генерации модели: целостный подход требует строгого контроля агента, а инкрементальный — пошагового усиления.'}, 'en': {'title': 'Automating Test-Driven Development for Better Web Apps', 'desc': "TDDev is a framework designed to automate test-driven development (TDD) for generating web applications, enhancing code quality while minimizing human effort. It operates in three stages: first, it transforms high-level requirements into structured acceptance tests; second, it deploys the application and simulates browser interactions for validation; and third, it converts any failures observed during testing into actionable repair reports. The study shows that using TDD strategies significantly improves the quality of generated applications, with enhancements ranging from 34% to 48% compared to traditional methods. Additionally, the effectiveness of TDD depends on aligning the development protocol with the coding model's generation style, highlighting the importance of tailored approaches in automated development."}, 'zh': {'title': 'TDDev：自动化测试驱动开发的未来', 'desc': 'TDDev是一个自动化测试驱动开发的框架，旨在提高网页应用程序的代码质量并减少人工干预。它通过三个阶段实现这一目标：首先，将高层次需求转化为结构化的验收测试；其次，通过浏览器交互模拟部署和验证应用程序；最后，将浏览器观察到的失败转化为结构化的修复报告。研究表明，使用TDDev的测试驱动开发策略可以将生成质量提高34%到48%。此外，用户研究确认TDDev能够将开发者的手动干预减少到零，转而实现自主的、基于反馈的优化。'}}}, {'id': 'https://huggingface.co/papers/2605.12290', 'title': 'Targeted Neuron Modulation via Contrastive Pair Search', 'url': 'https://huggingface.co/papers/2605.12290', 'abstract': 'Abstract Contrastive neuron attribution identifies a small subset of MLP neurons that distinguish harmful from benign prompts in instruction-tuned language models, enabling effective behavioral steering without compromising output quality.  AI-generated summary Language models are instruction-tuned to refuse harmful requests, but the mechanisms underlying this behavior remain poorly understood. Popular steering methods operate on the residual stream and degrade output coherence at high intervention strengths, limiting their practical use. We introduce contrastive neuron attribution (CNA), which identifies the 0.1% of MLP neurons whose activations most distinguish harmful from benign prompts, requiring only forward passes with no gradients or auxiliary training. In instruct models, ablating the discovered circuit reduces refusal rates by over 50% on a standard jailbreak benchmark while preserving fluency and non-degeneracy across all steering strengths. Applying CNA to matched base and instruct models across Llama and Qwen architectures (from 1B to 72B parameters), we find that base models contain similar late-layer discrimination structures but steering these neurons produces only content shifts, not behavioral change. These results demonstrate that neuron-level intervention enables reliable behavioral steering without the quality tradeoffs of residual-stream methods. More broadly, our findings suggest that alignment fine-tuning transforms pre-existing discrimination structure into a sparse, targetable refusal gate.', 'score': 9, 'issue_id': 2263, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'fc8183e7a7e3cd56', 'authors': ['Sam Herring', 'Jake Naviasky', 'Karan Malhotra'], 'affiliations': ['Nous Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.12290.jpg', 'data': {'categories': ['#training', '#small_models', '#interpretability', '#security', '#architecture', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Хирургическое управление поведением языковых моделей через критические нейроны', 'desc': 'В статье предлагается метод контрастной атрибуции нейронов (CNA) для выявления небольшого набора нейронов в МЛП-слоях языковых моделей, которые отличают вредоносные запросы от безопасных. Метод требует только прямых проходов без градиентов и дополнительного обучения, позволяя эффективно управлять поведением модели. Авторы показывают, что удаление найденных нейронов снижает отказы от выполнения вредоносных команд более чем на 50% при сохранении качества генерируемого текста. Исследование демонстрирует, что точное воздействие на уровне нейронов обеспечивает надёжное управление поведением без компромисса в качестве, что характеризует выравнивание моделей как трансформацию структур различения в разреженный и управляемый механизм отказа.'}, 'en': {'title': 'Targeted Neuron Steering for Safer AI Outputs', 'desc': "This paper presents a method called Contrastive Neuron Attribution (CNA) that identifies specific neurons in multi-layer perceptrons (MLPs) of language models which can effectively distinguish between harmful and benign prompts. By focusing on just 0.1% of these neurons, CNA allows for behavioral steering of the model without degrading the quality of its outputs. Unlike traditional methods that interfere with the model's residual stream, CNA maintains fluency and coherence even at high intervention levels. The findings indicate that fine-tuning the model aligns its internal structures to create a targeted mechanism for refusing harmful requests, enhancing the model's safety without sacrificing performance."}, 'zh': {'title': '对比神经元归因：无损行为引导的新方法', 'desc': '对比神经元归因（CNA）是一种新方法，可以识别出少量的多层感知器（MLP）神经元，这些神经元能够区分有害和良性提示，从而实现有效的行为引导，而不影响输出质量。传统的引导方法通常会降低输出的一致性，限制了它们的实际应用。通过CNA，我们可以仅通过前向传播来识别出0.1%的关键神经元，这些神经元的激活最能区分有害和良性提示。我们的研究表明，针对这些神经元的干预可以在保持流畅性的同时，显著降低拒绝率，展示了神经元级别的干预能够实现可靠的行为引导。'}}}, {'id': 'https://huggingface.co/papers/2605.17933', 'title': 'AtlasVA: Self-Evolving Visual Skill Memory for Teacher-Free VLM Agents', 'url': 'https://huggingface.co/papers/2605.17933', 'abstract': 'Abstract AtlasVA is a teacher-free visual skill memory framework for vision-language model agents that uses spatial heatmaps, visual exemplars, and symbolic text skills to improve spatial decision-making in long-horizon tasks.  AI-generated summary Vision-language model (VLM) agents increasingly rely on memory-augmented reinforcement learning to reuse experience across long-horizon tasks, yet most existing frameworks store memory as text and depend on proprietary teacher models to summarize or refine it. This design is poorly matched to spatial decision making: geometric priors are compressed into lossy language, and sparse interaction is often supervised through delayed textual feedback rather than dense visually grounded signals. We argue that reusable experience for VLM agents should remain visually grounded. Based on this insight, we propose AtlasVA, a teacher-free visual skill memory framework that organizes memory into three complementary layers: spatial heatmaps, visual exemplars, and symbolic text skills. AtlasVA further evolves danger and affinity atlases directly from trajectory statistics and lightweight grid heuristics, and reuses these self-evolving atlases as potential-based shaping rewards for reinforcement learning. This unifies perception, memory, and optimization without external LLM supervision. Experiments on Sokoban, FrozenLake, 3D embodied navigation, and 3D robotic manipulation benchmarks show that AtlasVA consistently outperforms text-centric memory baselines and competitive VLM agents, with especially strong gains on spatially intensive tasks. Homepage: https://wangpan-ustc.github.io/AtlasvaWeb', 'score': 5, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'e5b50c9d6df6c894', 'authors': ['Pan Wang', 'Yihao Hu', 'Xiujin Liu', 'Jingchu Yang', 'Hang Wang', 'Zhihao Wen'], 'affiliations': ['Ant Group', 'Sun Yat-sen University', 'University of Michigan - Ann Arbor', 'University of Science and Technology of China', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17933.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark', '#agents', '#robotics', '#rl'], 'emoji': '🗺️', 'ru': {'title': 'Визуальная память вместо текстовой: пространственные навыки для агентов', 'desc': 'AtlasVA — это фреймворк визуальной памяти навыков для агентов на основе vision-language моделей, который не требует учителя. Система организует память в три взаимодополняющие слои: пространственные тепловые карты, визуальные примеры и символические текстовые навыки. Фреймворк автоматически эволюционирует карты опасности и сродства на основе статистики траекторий и использует их как потенциальные награды для обучения с подкреплением. Эксперименты на задачах пространственного решения проблем показывают, что AtlasVA превосходит текстоцентричные подходы, сохраняя опыт в визуальной форме без внешнего контроля.'}, 'en': {'title': 'Enhancing Spatial Decision-Making with Teacher-Free Visual Memory', 'desc': 'AtlasVA is a novel framework designed for vision-language model agents that enhances their ability to make spatial decisions without relying on teacher models. It organizes memory into three layers: spatial heatmaps for visual context, visual exemplars for concrete examples, and symbolic text skills for abstract reasoning. This approach allows agents to maintain a visually grounded memory, improving their performance in long-horizon tasks by using self-evolving atlases as rewards in reinforcement learning. Experiments demonstrate that AtlasVA significantly outperforms traditional text-based memory systems, especially in tasks requiring strong spatial reasoning.'}, 'zh': {'title': 'AtlasVA：无教师的视觉技能记忆框架', 'desc': 'AtlasVA是一种无教师的视觉技能记忆框架，旨在提高视觉语言模型代理在长时间任务中的空间决策能力。该框架通过空间热图、视觉示例和符号文本技能三层次组织记忆，避免了依赖文本的传统方法。AtlasVA直接从轨迹统计和轻量级网格启发式演化出危险和亲和力图谱，并将其作为强化学习的潜在奖励。实验结果表明，AtlasVA在空间密集型任务上表现优异，超越了以文本为中心的记忆基线和竞争性视觉语言模型代理。'}}}, {'id': 'https://huggingface.co/papers/2605.18749', 'title': 'WavFlow: Audio Generation in Waveform Space', 'url': 'https://huggingface.co/papers/2605.18749', 'abstract': 'Abstract WavFlow generates high-fidelity audio directly in raw waveform space using waveform patchify and amplitude lifting, achieving competitive performance on video-to-audio and text-to-audio benchmarks without intermediate latent representations.  AI-generated summary Modern audio generation predominantly relies on latent-space compression, introducing additional complexity and potential information loss. In this work, we challenge this paradigm with WavFlow, a framework that generates high-fidelity audio directly in raw waveform space without intermediate representations. To overcome the inherent difficulties of modeling high-dimensional and low-energy signals, we reshape audio into 2D token grids through waveform patchify and introduce amplitude lifting to align signal scales, enabling stable optimization via direct x-prediction in flow matching. To capture complex semantic alignment and temporal synchronization, we leverage an automated data pipeline to curate 5 million high-quality video-text-audio triplets, allowing the model to learn fine-grained acoustic patterns from scratch. Experimental results show that WavFlow achieves competitive performance on the video-to-audio benchmark VGGSound (FD_PaSST: 59.98, IS_PANNs: 17.40, DeSync: 0.44) and the text-to-audio benchmark AudioCaps (FD_PANNs: 10.63, IS_PANNs: 12.62), matching or exceeding the performance of established latent-based methods. Our work demonstrates that intermediate compression is not a prerequisite for high-quality synthesis, offering a simpler and more scalable alternative for multimodal audio generation.', 'score': 5, 'issue_id': 2268, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'fbc515b064c1b1fe', 'authors': ['Feiyan Zhou', 'Luyuan Wang', 'Shoufa Chen', 'Zhe Wang', 'Zhiheng Liu', 'Yuren Cong', 'Xiaohui Zhang', 'Fanny Yang', 'Belinda Zeng'], 'affiliations': ['Meta AI', 'Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2605.18749.jpg', 'data': {'categories': ['#audio', '#benchmark', '#multimodal', '#dataset'], 'emoji': '🌊', 'ru': {'title': 'Синтез аудио без сжатия: прямая генерация в пространстве волновой формы', 'desc': 'WavFlow — это новый подход к синтезу аудио, который генерирует высококачественные звуки непосредственно в пространстве сырой волновой формы, без промежуточного сжатия в скрытом пространстве. Модель использует техники пакетификации волновой формы и лифтинга амплитуды для преобразования одномерного аудиосигнала в двумерные сетки токенов, что позволяет стабилизировать оптимизацию через flow matching. Авторы создали автоматизированный конвейер обработки данных для подготовки 5 миллионов высококачественных видео-текст-аудио триплетов, что позволяет модели изучать тонкие акустические закономерности. Экспериментальные результаты показывают, что WavFlow достигает конкурентоспособной производительности на бенчмарках видео-в-аудио и текст-в-аудио, демонстрируя, что промежуточное сжатие не требуется для качественного синтеза.'}, 'en': {'title': 'Direct Audio Generation: Simplifying High-Fidelity Synthesis with WavFlow', 'desc': 'WavFlow is a new framework for generating high-quality audio directly from raw waveforms, bypassing the need for intermediate latent representations. This approach uses techniques like waveform patchify to reshape audio into 2D grids and amplitude lifting to ensure proper signal scaling. By training on a large dataset of 5 million video-text-audio pairs, WavFlow learns to produce detailed acoustic patterns effectively. The results show that it performs competitively on benchmarks for both video-to-audio and text-to-audio tasks, proving that high-quality audio synthesis can be achieved without complex compression methods.'}, 'zh': {'title': 'WavFlow：直接生成高保真音频的新方法', 'desc': 'WavFlow 是一种直接在原始波形空间中生成高保真音频的框架，采用波形补丁和幅度提升的方法，避免了中间潜在表示的复杂性和信息损失。该方法通过将音频重塑为二维标记网格，解决了高维低能量信号建模的困难，并通过直接的 x 预测实现稳定优化。WavFlow 利用自动化数据管道，整理了 500 万个高质量的视频-文本-音频三元组，使模型能够从零开始学习细致的声学模式。实验结果表明，WavFlow 在视频到音频和文本到音频的基准测试中表现出色，证明了中间压缩并不是高质量合成的必要条件。'}}}, {'id': 'https://huggingface.co/papers/2605.16865', 'title': 'MixSD: Mixed Contextual Self-Distillation for Knowledge Injection', 'url': 'https://huggingface.co/papers/2605.16865', 'abstract': "Abstract MixSD addresses knowledge injection in language models by aligning supervision with the model's native generation distribution, reducing catastrophic forgetting during fine-tuning.  AI-generated summary Supervised fine-tuning (SFT) is widely used to inject new knowledge into language models, but it often degrades pretrained capabilities such as reasoning and general-domain performance. We argue this forgetting arises because fine-tuning targets from humans or external systems diverge from the model's autoregressive distribution, forcing the optimizer to imitate low-probability token sequences. To address this problem, we propose MixSD, a simple external-teacher-free method for distribution-aligned knowledge injection. Instead of training on fixed targets, MixSD constructs supervision dynamically by mixing tokens from two conditionals of the base model itself: an expert conditional that observes the injected fact in context, and a naive conditional that reflects the model's original prior. The resulting supervision sequences preserve the factual learning signal while remaining substantially closer to the base model's distribution. We evaluate MixSD on two synthetic corpora that we construct to study factual recall and arithmetic function acquisition in a controlled setting, together with established benchmarks for open-domain factual question answering and knowledge editing. Across multiple model scales and settings, MixSD consistently achieves a better memorization-retention trade-off compared to SFT and on-policy self distillation baselines, retaining up to 100% of the base model's held-out capability while maintaining near-perfect training accuracy, whereas standard SFT retains as little as 1%. We further show that MixSD produces substantially lower-NLL supervision targets under the base model and reduces harmful movement along Fisher-sensitive parameter directions. These results suggest that aligning supervision with the model's native generation distribution is a simple and effective principle for knowledge injection that mitigates catastrophic forgetting.", 'score': 5, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '4dc15f0861c482e1', 'authors': ['Jiarui Liu', 'Lechen Zhang', 'Yongjin Yang', 'Yinghui He', 'Yingheng Wang', 'Weihao Xuan', 'Zhijing Jin', 'Mona Diab'], 'affiliations': ['Carnegie Mellon University', 'Cornell University', 'EuroSafeAI', 'Jinesis Lab, University of Toronto & Vector Institute', 'Max Planck Institute for Intelligent Systems, Tübingen, Germany', 'Princeton University', 'RIKEN AIP', 'The University of Tokyo', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.16865.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Выравнивание обучающих данных с естественным распределением модели для предотвращения забывания', 'desc': 'MixSD — это метод для внедрения новых знаний в языковые модели, который решает проблему катастрофического забывания при fine-tuning. Вместо использования фиксированных целевых последовательностей от человека, метод динамически конструирует обучающие данные путём смешивания токенов из двух условных распределений самой модели: экспертного условного распределения, которое видит новый факт, и наивного условного распределения, отражающего исходные знания модели. Такой подход сохраняет сигнал обучения для новых фактов, одновременно оставаясь близким к исходному распределению генерации модели. Экспериментальные результаты показывают, что MixSD значительно лучше балансирует между запоминанием новых знаний и сохранением старых способностей по сравнению со стандартным fine-tuning.'}, 'en': {'title': 'MixSD: Smart Knowledge Injection for Language Models', 'desc': "MixSD is a method designed to improve how language models learn new information without losing their existing knowledge. It does this by creating training targets that are more aligned with the model's natural way of generating text, which helps prevent a problem known as catastrophic forgetting. Instead of using fixed targets from external sources, MixSD dynamically mixes tokens from the model's own predictions to create a more relevant learning signal. This approach has been shown to significantly enhance the model's ability to retain previously learned information while accurately incorporating new facts."}, 'zh': {'title': '知识注入新方法：MixSD', 'desc': 'MixSD是一种针对语言模型知识注入的方法，通过将监督与模型的原生生成分布对齐，减少了在微调过程中出现的灾难性遗忘。传统的监督微调方法常常导致预训练能力的下降，特别是在推理和通用领域性能方面。MixSD通过动态构建监督信号，结合模型自身的两个条件分布，来保持事实学习信号，同时更接近基础模型的分布。实验结果表明，MixSD在多个模型规模和设置下，显著提高了记忆保持的平衡，保留了基础模型的能力，同时保持了接近完美的训练准确率。'}}}, {'id': 'https://huggingface.co/papers/2605.18652', 'title': 'MementoGUI: Learning Agentic Multimodal Memory Control for Long-Horizon GUI Agents', 'url': 'https://huggingface.co/papers/2605.18652', 'abstract': 'Abstract MementoGUI presents a memory framework for GUI agents that uses learned controllers for selective memory management and retrieval, improving long-horizon task performance through compressed visual and textual representations.  AI-generated summary Recent GUI agents have made substantial progress in visual grounding and action prediction, yet they remain brittle in long-horizon tasks that require maintaining task state across many interface transitions. Existing agents typically rely on raw history replay or text-only memory, which either overwhelms the model with redundant screenshots or discards localized visual evidence needed for future decisions. To address these limitations, we introduce MementoGUI, a plug-in agentic memory framework that equips MLLM-based GUI agents with MementoCore, a learned controller for online memory selection, compression, and retrieval. Rather than treating interaction history as a fixed context, MementoGUI formulates long-horizon GUI control as an online memory-control problem: working memory selectively preserves task-relevant interface events with textual summaries and ROI-level visual evidence, while episodic memory retrieves reusable past trajectories through learned relevance selection. MementoCore modularizes memory control into specialized operators for step processing, memory compression, episodic writing, and episodic selection, enabling plug-in memory augmentation without finetuning the GUI agent backbone. We further develop a scalable data curation pipeline that converts computer-use trajectories into memory-controller training data, introduce MementoGUI-Bench for evaluating long-horizon decision-making in GUI agents, and design MLLM-based metrics for semantic action matching, task progress, and memory consistency. Experiments on GUI-Odyssey, MM-Mind2Web, and MementoGUI-Bench show that MementoGUI consistently improves GUI agents over no-history, history-replay, and text-only memory baselines, with larger MementoCore backbones further strengthening memory-augmented GUI control.', 'score': 4, 'issue_id': 2265, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'a715806a80e39f82', 'authors': ['Ziyun Zeng', 'Hang Hua', 'Bocheng Zou', 'Mu Cai', 'Rogerio Feris', 'Jiebo Luo'], 'affiliations': ['MIT-IBM Watson AI Lab', 'University of Rochester', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.18652.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#multimodal', '#long_context', '#dataset', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Интеллектуальная память с выборочным сжатием для автоматизации работы с интерфейсами', 'desc': 'MementoGUI представляет систему управления памятью для агентов, взаимодействующих с графическим интерфейсом, которая использует обученные контроллеры для селективного управления и извлечения информации. Система решает проблему хрупкости долгосрочных задач, заменяя наивное воспроизведение истории или текстовую память на гибридный подход с рабочей памятью и эпизодической памятью. MementoCore модулирует управление памятью на специализированные операторы обработки, сжатия и отбора, которые работают без переобучения основной модели MLLM. Экспериментальные результаты показывают, что MementoGUI последовательно улучшает производительность GUI агентов на долгосрочных задачах, превосходя базовые методы с полной историей или только текстовыми воспоминаниями.'}, 'en': {'title': 'Enhancing GUI Agents with Smart Memory Management', 'desc': 'MementoGUI is a memory framework designed for GUI agents that enhances their ability to manage and retrieve information effectively during long tasks. It introduces MementoCore, a learned controller that optimizes memory selection and compression, allowing agents to focus on relevant visual and textual data. This approach transforms the way agents handle interaction history, treating it as a dynamic memory-control challenge rather than a static context. Experiments demonstrate that MementoGUI significantly outperforms traditional memory methods, leading to better decision-making in complex GUI environments.'}, 'zh': {'title': 'MementoGUI：提升长时间任务的记忆管理', 'desc': 'MementoGUI 是一个为图形用户界面（GUI）代理设计的记忆框架，利用学习到的控制器进行选择性记忆管理和检索，从而提高长时间任务的表现。该框架通过压缩的视觉和文本表示，解决了现有代理在长时间任务中保持任务状态的脆弱性。MementoGUI 将交互历史视为一个在线记忆控制问题，能够选择性地保留与任务相关的界面事件，并通过学习的相关性选择来检索可重用的过去轨迹。实验结果表明，MementoGUI 在多个基准测试中显著提升了 GUI 代理的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.17698', 'title': 'Agent Bazaar: Enabling Economic Alignment in Multi-Agent Marketplaces', 'url': 'https://huggingface.co/papers/2605.17698', 'abstract': 'Abstract Large language models deployed as autonomous economic agents exhibit systemic risks through market instability and deception, which can be evaluated and improved through specialized simulation frameworks and reinforcement learning techniques.  AI-generated summary The deployment of Large Language Models (LLMs) as autonomous economic agents introduces systemic risks that extend beyond individual capability failures. As agents transition to directly interacting with marketplaces, their collective behavior can amplify volatility and mask deception at scale. We introduce the Agent Bazaar, a multi-agent simulation framework for evaluating Economic Alignment, the capacity of agentic systems to preserve market stability and integrity. We identify two failure modes: (1) Algorithmic Instability in a B2C market ("The Crash"), where firms amplify price volatility until the market collapses, and (2) Sybil Deception in a C2C market ("The Lemon Market"), where a single deceptive agent controlling multiple coordinated seller identities floods the market with fraudulent listings, eroding trust and consumer welfare. We evaluate frontier and open-weight models across both scenarios and find that models largely fail to self-regulate, with failure severity varying by model rather than by size. We propose economically aligned harnesses, Stabilizing Firms and Skeptical Guardians, that improve outcomes but remain fragile under harder market conditions. To close this gap, we train agents with REINFORCE++ using an adaptive curriculum, producing a 9B model that outperforms all evaluated frontier and open-weight models. We propose the Economic Alignment Score (EAS), a 4-component scalar metric aggregating stability, integrity, welfare, and profitability, enabling direct cross-model comparison. Our results show that economic alignment is orthogonal to general capability and can be directly trained with targeted RL.', 'score': 4, 'issue_id': 2263, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': 'b1fd0051b83bc3c9', 'authors': ['Seth Karten', 'Cameron Crow', 'Chi Jin'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17698.jpg', 'data': {'categories': ['#optimization', '#training', '#agents', '#rl', '#security', '#benchmark', '#alignment'], 'emoji': '📊', 'ru': {'title': 'Обучение честных экономических агентов: контроль стабильности рынков через подкрепление', 'desc': 'Статья исследует системные риски, возникающие при использовании больших языковых моделей (LLM) в качестве автономных агентов на рынках. Авторы предлагают фреймворк Agent Bazaar для оценки экономического выравнивания - способности агентов сохранять стабильность и целостность рынка. В работе выявлены два типа отказов: алгоритмическая нестабильность, приводящая к краху цен, и обманчивые действия скоординированных агентов, наводняющих рынок поддельными предложениями. Авторы используют обучение с подкреплением (REINFORCE++) с адаптивным учебным планом для создания модели, которая превосходит существующие решения и вводят метрику Economic Alignment Score для сравнения моделей.'}, 'en': {'title': 'Aligning AI Agents for Stable Markets', 'desc': 'This paper discusses the risks associated with using Large Language Models (LLMs) as independent economic agents, particularly how they can cause market instability and deception. It introduces the Agent Bazaar, a simulation framework designed to assess the Economic Alignment of these agents, focusing on their ability to maintain market stability. The authors identify two main failure modes: Algorithmic Instability, which leads to market crashes, and Sybil Deception, where deceptive agents manipulate the market. They propose solutions like Stabilizing Firms and Skeptical Guardians, and demonstrate that training agents with a specialized reinforcement learning approach can significantly improve their economic alignment performance.'}, 'zh': {'title': '大型语言模型的经济对齐与市场稳定性', 'desc': '本论文探讨了大型语言模型作为自主经济代理时可能引发的系统性风险，包括市场不稳定和欺骗行为。这些风险在代理直接与市场互动时会被放大，导致价格波动和信任缺失。我们提出了Agent Bazaar，一个多代理模拟框架，用于评估经济对齐能力，以维护市场稳定性和完整性。通过强化学习技术，我们训练了代理以提高经济对齐分数，结果表明经济对齐与一般能力是正交的，可以通过针对性的强化学习直接训练。'}}}, {'id': 'https://huggingface.co/papers/2605.15482', 'title': 'FINESSE-Bench: A Hierarchical Benchmark Suite for Financial Domain Knowledge and Technical Analysis in Large Language Models', 'url': 'https://huggingface.co/papers/2605.15482', 'abstract': 'Abstract FINESSE-Bench presents a comprehensive suite of eight specialized financial benchmarks designed to evaluate large language models across multiple levels of professional competency and task types.  AI-generated summary Large language models (LLMs) are increasingly being applied to financial analysis, reporting, investment decision support, risk management, compliance, and professional training. However, robust evaluation of their domain competence in finance remains incomplete. Widely used open benchmarks such as FinQA, ConvFinQA, and TAT-QA have played an important role in advancing financial question answering and numerical reasoning, but they focus primarily on question answering over financial reports and do not provide an explicit hierarchy of professional difficulty. Broader resources, including FinanceBench, PIXIU, FinBen, and FLaME, expand the coverage of financial tasks, yet the problem of evaluating the transition from foundational knowledge to expert-level financial reasoning remains open. In this work, we present FINESSE-Bench, a suite of eight specialized benchmarks comprising 3,993 questions for hierarchical evaluation of financial competencies in LLMs. FINESSE-Bench combines exam-oriented datasets inspired by professional certifications (CFA-like Levels 1-3, CMT-like Level 2, and CFTe-like Level 1), applied trading task collections, and a Russian-language olympiad benchmark. This design enables evaluation of domain breadth, performance degradation as difficulty increases, the ability to solve computational tasks, and model behavior in specialized financial domains. We also describe a unified evaluation protocol covering multiple-choice questions, numerical answers, and short open-ended responses, together with an automated scoring scheme for freeform answers based on the LLM-as-judge paradigm. FINESSE-Bench is intended both as a complement to existing open financial benchmarks and as a tool for more substantive evaluation of professionally relevant financial competencies in large language models.', 'score': 4, 'issue_id': 2264, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '499fc90ae801621e', 'authors': ['Dmitry Stanishevskii', 'Nini Kamkia', 'Alexey Khoroshilov', 'Dmitry Zmitrovich', 'Denis Kokosinskii', 'Zhirayr Hayrapetyan', 'Andrei Kalmykov'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.15482.jpg', 'data': {'categories': ['#dataset', '#multilingual', '#benchmark', '#survey', '#science', '#low_resource'], 'emoji': '💰', 'ru': {'title': 'Иерархическая оценка финансовой компетентности языковых моделей', 'desc': 'В работе представлена FINESSE-Bench — набор из восьми специализированных бенчмарков с 3993 вопросами для иерархической оценки финансовых компетенций больших языковых моделей. Бенчмарк включает задания, вдохновленные профессиональными сертификациями (CFA уровни 1-3, CMT уровень 2, CFTe уровень 1), практические торговые задачи и олимпиаду на русском языке. Предложена унифицированная схема оценки, охватывающая тесты с множественным выбором, численные ответы и открытые вопросы с автоматической системой оценки на основе парадигмы LLM-as-judge. FINESSE-Bench позволяет оценить широту знаний моделей, деградацию производительности с ростом сложности и способность к решению вычислительных задач в специализированных финансовых областях.'}, 'en': {'title': 'Evaluating Financial Expertise in Language Models with FINESSE-Bench', 'desc': "FINESSE-Bench introduces a set of eight financial benchmarks aimed at assessing large language models (LLMs) on various levels of financial expertise and task complexity. This suite includes nearly 4,000 questions that evaluate LLMs' abilities in areas such as financial analysis, reporting, and risk management, while also addressing the transition from basic to expert-level reasoning. The benchmarks are inspired by professional certification exams and include a diverse range of tasks, allowing for a comprehensive evaluation of model performance as task difficulty increases. Additionally, FINESSE-Bench features a unified evaluation protocol and an automated scoring system to enhance the assessment of LLMs in specialized financial contexts."}, 'zh': {'title': '金融领域能力评估的新工具', 'desc': 'FINESSE-Bench 是一个全面的金融基准套件，包含八个专门的基准，用于评估大型语言模型在不同专业能力和任务类型上的表现。该套件包含 3993 个问题，旨在对金融领域的能力进行分层评估，结合了专业认证考试的题库和实际交易任务。FINESSE-Bench 还提供了统一的评估协议，涵盖多项选择题、数值答案和开放式回答，并采用自动评分机制。此工具旨在补充现有的金融基准，提供更深入的评估大型语言模型在金融专业能力方面的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.16893', 'title': 'NGM: A Plug-and-Play Training-Free Memory Module for LLMs', 'url': 'https://huggingface.co/papers/2605.16893', 'abstract': 'Abstract A training-free N-gram Memory module enhances language model performance by directly utilizing pretrained token embeddings for knowledge retrieval without requiring additional memory tables or retrieval pipelines.  AI-generated summary Recent studies introduce conditional memory modules that decouple knowledge storage from neural computation, enabling more direct knowledge access. Compared to MoE, which relies on dynamic computation paths, explicit lookup provides a more efficient knowledge retrieval mechanism. However, these approaches still depend on learned memory embeddings, requiring additional training and limiting flexibility. To address this, we propose N-gram Memory (NGM), a training-free, plug-and-play module composed of a Causal N-Gram Encoder and a Cosine-Gated Memory Injector. The Causal N-Gram Encoder directly averages the pretrained token embeddings of the backbone model to construct N-gram representations, thereby eliminating the need to train separate N-gram embeddings from scratch. This design requires neither an additional memory table nor a retrieval pipeline. The Cosine-Gated Memory Injector then uses a non-parametric cosine gate with ReLU to modulate the retrieved embeddings into the contextual representations. We evaluate NGM on the Qwen3 series from 0.6B to 14B across eight benchmarks. NGM improves average performance by 0.5 to 1.2 points, with particularly clear gains on code generation and knowledge-intensive tasks (e.g., +3.0 on LiveCodeBench and +3.03 on GPQA for Qwen3-14B). Moreover, NGM also improves performance in multimodal benchmarks (e.g., MMStar +1.53 on Qwen3-VL-2B).', 'score': 3, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': 'aeecb1a07c2faca1', 'authors': ['Yuwen Qu', 'Wenhui Dong', 'Chenyang Si', 'Caifeng Shan'], 'affiliations': ['Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2605.16893.jpg', 'data': {'categories': ['#training', '#multimodal', '#small_models', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Без обучения — прямой доступ к знаниям через N-граммную память', 'desc': 'В статье предлагается N-gram Memory (NGM) — модуль, который улучшает производительность языковых моделей без дополнительного обучения. Модуль использует уже предобученные эмбеддинги токенов, напрямую усредняя их для создания N-граммных представлений, что избегает необходимости обучения отдельных таблиц памяти. Извлеченные эмбеддинги модулируются в контекстные представления с помощью косинусного вентиля с ReLU-активацией. Экспериментальные результаты показывают улучшение производительности на 0.5-1.2 балла, особенно заметные на задачах генерации кода и знаниеёмких бенчмарках.'}, 'en': {'title': 'Training-Free N-gram Memory: Boosting Language Models Efficiently', 'desc': 'The paper introduces a novel N-gram Memory (NGM) module that enhances language model performance without the need for additional training. It utilizes pretrained token embeddings to create N-gram representations, allowing for efficient knowledge retrieval without separate memory tables. The module includes a Causal N-Gram Encoder and a Cosine-Gated Memory Injector, which modulates the embeddings into contextual representations. Evaluation shows that NGM significantly improves performance across various benchmarks, especially in code generation and knowledge-intensive tasks.'}, 'zh': {'title': '无训练的N-gram记忆模块提升语言模型性能', 'desc': '本文提出了一种无训练的N-gram记忆模块，旨在提升语言模型的性能。该模块直接利用预训练的token嵌入进行知识检索，无需额外的记忆表或检索管道。通过Causal N-Gram编码器和余弦门控记忆注入器，N-gram记忆模块能够高效地构建N-gram表示，并调节检索到的嵌入。实验结果表明，NGM在多个基准测试中显著提高了模型的表现，尤其在代码生成和知识密集型任务上表现突出。'}}}, {'id': 'https://huggingface.co/papers/2605.18743', 'title': 'Actionable World Representation', 'url': 'https://huggingface.co/papers/2605.18743', 'abstract': 'Abstract WorldString is a neural architecture that models object state manifolds from point clouds or RGB-D video streams, serving as a foundational component for physical world models with differentiable structure for policy learning integration.  AI-generated summary Inspired by the emergent behaviors in large language models that generalized human intelligence, the research community is pursuing similar emergent capabilities within world models, with a emphasis on modeling the physical world. Within the scope of physical world model, objects are the fundamental primitives that constitute physical reality. From humans to computers, nearly everything we interact with is an object. These objects are rarely static; they are actionable entities with varying states determined by their intrinsic properties. While current methods approach object action states either via video generation or dynamic scene reconstruction, none explicitly model this basic element in a unified, principled way to build an actionable object representation. We propose WorldString, a neural architecture capable of modeling the state manifold of real-world objects by learning directly from point clouds or RGB-D video streams. Serving as a versatile digital twin, it acts as a foundational building block for physical world models; thus, we name it WorldString. Sweetly, its fully differentiable structure seamlessly enables future integration with policy learning and neural dynamics.', 'score': 2, 'issue_id': 2264, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'b129b3a0d979cd7d', 'authors': ['Kunqi Xu', 'Jitao Li', 'Jianglong Ye', 'Tianshu Tang', 'Isabella Liu', 'Sifei Liu', 'Xueyan Zou'], 'affiliations': ['CalTech', 'NVIDIA', 'Tsinghua University - IEI Lab', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2605.18743.jpg', 'data': {'categories': ['#cv', '#3d', '#robotics', '#architecture'], 'emoji': '🌍', 'ru': {'title': 'Дифференцируемое цифровое представление динамических объектов для физических моделей мира', 'desc': 'WorldString — это нейросетевая архитектура, которая моделирует многообразие состояний объектов на основе облаков точек или видеопотоков RGB-D. Система обучается представлять объекты как динамические сущности с изменяющимися состояниями, что позволяет создавать универсальные цифровые двойники реальных предметов. Архитектура полностью дифференцируема, что обеспечивает её интеграцию с обучением политик и нейронными моделями динамики. WorldString служит фундаментальным компонентом для разработки физических моделей мира, способных к обучению с подкреплением и предсказанию действий объектов.'}, 'en': {'title': 'Modeling Object States for Intelligent Interaction', 'desc': 'WorldString is a neural architecture designed to model the various states of real-world objects using point clouds or RGB-D video streams. It aims to create a unified representation of objects, which are essential components of physical reality, by capturing their dynamic and actionable nature. Unlike existing methods that focus on video generation or scene reconstruction, WorldString provides a principled approach to understanding object states. Its differentiable structure allows for easy integration with policy learning, making it a valuable tool for developing advanced physical world models.'}, 'zh': {'title': 'WorldString：物体状态建模的新方法', 'desc': 'WorldString是一种神经网络架构，能够从点云或RGB-D视频流中建模物体状态流形。这种模型为物理世界模型提供了基础组件，支持与策略学习的整合。物体是构成物理现实的基本元素，WorldString通过学习真实世界物体的状态，提供了一种统一的可操作物体表示。其完全可微的结构使得未来与策略学习和神经动态的集成变得更加顺畅。'}}}, {'id': 'https://huggingface.co/papers/2605.18719', 'title': 'SafeDiffusion-R1: Online Reward Steering for Safe Diffusion Post-Training', 'url': 'https://huggingface.co/papers/2605.18719', 'abstract': 'Abstract A novel online reinforcement learning framework for diffusion models that improves safety without requiring supervised paired data or reward tuning, achieving state-of-the-art performance on multiple harm categories.  AI-generated summary Diffusion models have been widely studied for removing unsafe content learned during pre-training. Existing methods require expensive supervised data, either unsafe-text paired with safe-image groundtruth or negative/positive image pairs, making them impractical to scale. Furthermore, offline reinforcement learning and supervised fine-tuning approaches that generate synthetic data offline suffer from catastrophic forgetting, degrading generation quality. We propose a novel online reinforcement learning framework that addresses both data scarcity and model degradation through post-training with Group Relative Policy Optimization (GRPO) on both negative and positive text prompts. To eliminate the need for fine-tuning specialized safe/unsafe reward models, we introduce a steering reward mechanism that exploits an inherent property of CLIP embeddings: steering text representations toward positive safety directions and away from negative ones in the embedding space. Our online-policy approach enables the model to learn from diverse prompts, including explicit unsafe content, without catastrophic forgetting. Extensive experiments demonstrate that our method reduces inappropriate content to 18.07\\% (vs. 48.9\\% for SD v1.4) and nudity detections to 15 (vs. 646 baseline) while improving compositional generation quality from 42.08\\% to 47.83\\% on GenEval. Remarkably, these safety gains generalize to out-of-domain unsafe prompts across seven harm categories, achieving state-of-the-art performance without supervised paired data or reward tuning. Github: https://github.com/MAXNORM8650/SafeDiffusion-R1.', 'score': 2, 'issue_id': 2264, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '4a0b698b7d6dd8ca', 'authors': ['Komal Kumar', 'Ankan Deria', 'Abhishek Basu', 'Fahad Shamshad', 'Hisham Cholakkal', 'Karthik Nandakumar'], 'affiliations': ['Michigan State University (MSU), USA', 'Mohamed bin Zayed University of Artificial Intelligence (MBZUAI), UAE'], 'pdf_title_img': 'assets/pdf/title_img/2605.18719.jpg', 'data': {'categories': ['#diffusion', '#security', '#open_source', '#alignment'], 'emoji': '🛡️', 'ru': {'title': 'Безопасные диффузионные модели через онлайн-обучение без парных данных', 'desc': 'В работе предложена новая схема онлайн-обучения с подкреплением для диффузионных моделей, которая повышает безопасность генерируемого контента без необходимости в размеченных парных данных. Метод использует Group Relative Policy Optimization (GRPO) для обучения на позитивных и негативных текстовых промптах, а также вводит механизм направления вознаграждения на основе свойств CLIP-эмбеддингов. Онлайн-подход к обучению политики позволяет модели учиться на разнообразных промптах, включая явно вредоносный контент, избегая катастрофического забывания. Экспериментально доказано, что метод достигает состояния искусства по безопасности на семи категориях вреда, одновременно улучшая качество композиционной генерации.'}, 'en': {'title': 'Reinforcement Learning for Safer AI: No Supervision Needed!', 'desc': 'This paper presents a new online reinforcement learning framework designed for diffusion models, focusing on enhancing safety without the need for supervised paired data or reward tuning. The proposed method utilizes Group Relative Policy Optimization (GRPO) to effectively manage both positive and negative text prompts, addressing issues of data scarcity and model degradation. By implementing a steering reward mechanism based on CLIP embeddings, the framework guides the model to generate safer content while learning from a variety of prompts, including those with explicit unsafe content. The results show significant improvements in reducing inappropriate content and enhancing generation quality, achieving state-of-the-art performance across multiple harm categories.'}, 'zh': {'title': '在线强化学习提升扩散模型安全性', 'desc': '本文提出了一种新颖的在线强化学习框架，旨在提高扩散模型的安全性，而无需监督配对数据或奖励调优。该方法通过使用群体相对策略优化（GRPO）对负面和正面文本提示进行后训练，解决了数据稀缺和模型退化的问题。我们引入了一种引导奖励机制，利用CLIP嵌入的固有特性，将文本表示引导到积极的安全方向。实验结果表明，该方法在多个伤害类别上实现了最先进的性能，显著降低了不当内容的生成。'}}}, {'id': 'https://huggingface.co/papers/2605.17278', 'title': 'A2RBench: An Automatic Paradigm for Formally Verifiable Abstract Reasoning Benchmark Generation', 'url': 'https://huggingface.co/papers/2605.17278', 'abstract': 'Abstract Large language models demonstrate significant limitations in abstract reasoning abilities compared to human performance, particularly in complex 3D task understanding, while an automated benchmark pipeline shows that programmatic verification ensures solution uniqueness through cycle consistency.  AI-generated summary Abstract reasoning ability reflects the intelligence and generalization capacity of LLMs to extract and apply abstract rules. However, accurately measuring this ability remains challenging: existing benchmarks either rely on expensive manual annotation, limiting their scale, or risk measuring memorization rather than genuine reasoning. To address this, we introduce an automated pipeline named A2RBench, encompassing generation, expansion, evaluation, and analysis. Specifically, in the generation stage, LLMs create diverse tasks demanding genuine reasoning; in the expansion stage, LLMs reuse validated rules and expand new input spaces to generate task variations, achieving scaling. However, such a process may cause hallucinations. To eliminate it, we further establish a theoretical framework and prove that programmatic verification--testing whether the inverse operation perfectly reverses the forward operation (cycle consistency)--guarantees a unique solution. Through extensive evaluations on mainstream LLMs, we find: (1) Current LLMs exhibit fundamental deficiencies in abstract reasoning, with top models significantly underperforming humans on a representative subset (39.8% vs. 68.5%). (2) Current LLMs fall far short of 2D and 1D in the complexity of generated 3D tasks, revealing their lack of understanding of high-dimensional tasks. (3) Counterintuitively, inputs with higher information complexity can simplify the reasoning process.', 'score': 2, 'issue_id': 2264, 'pub_date': '2026-05-17', 'pub_date_card': {'ru': '17 мая', 'en': 'May 17', 'zh': '5月17日'}, 'hash': '47df70f42f0264f8', 'authors': ['Qingchuan Ma', 'Yuexiao Ma', 'Yongkang Xie', 'Tianyu Xie', 'Xiawu Zheng', 'Rongrong Ji'], 'affiliations': ['Institute of Artificial Intelligence, Xiamen University', 'Key Laboratory of Multimedia Trusted Perception and Efficient Computing, Ministry of Education of China, Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.17278.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#hallucinations', '#benchmark', '#survey', '#3d'], 'emoji': '🧠', 'ru': {'title': 'Измерение абстрактного мышления LLM через циклическую верификацию', 'desc': 'Авторы представляют A2RBench — автоматизированный конвейер для оценки способности LLM к абстрактному рассуждению, которая отражает интеллект и обобщающую способность моделей. Они разработали теоретический фреймворк, основанный на проверке циклической согласованности (обратная операция должна идеально обращать прямую операцию), гарантирующий уникальность решения и исключающий галлюцинации. Исследование показало, что современные LLM значительно отстают от человеческого уровня (39.8% против 68.5%) и испытывают серьёзные затруднения при работе с трёхмерными задачами по сравнению с двумерными и одномерными. Интересный вывод: входные данные с большей информационной сложностью могут упростить процесс рассуждения.'}, 'en': {'title': 'Enhancing Abstract Reasoning in LLMs with A2RBench', 'desc': 'This paper discusses the limitations of large language models (LLMs) in abstract reasoning, especially in understanding complex 3D tasks compared to human performance. It introduces an automated benchmarking pipeline called A2RBench, which includes stages for generating, expanding, evaluating, and analyzing tasks that require genuine reasoning. The authors highlight the challenge of measuring abstract reasoning accurately, as existing methods may either be costly or focus on memorization rather than true reasoning. They propose a programmatic verification method to ensure unique solutions through cycle consistency, revealing that current LLMs significantly underperform in abstract reasoning tasks.'}, 'zh': {'title': '提升抽象推理能力的自动化基准测试', 'desc': '大型语言模型在抽象推理能力上与人类相比存在显著局限，尤其是在复杂的三维任务理解方面。为了更好地评估这种能力，本文提出了一种自动化基准测试管道A2RBench，涵盖了生成、扩展、评估和分析四个阶段。通过程序化验证，确保了解决方案的唯一性，从而克服了现有基准测试的局限性。研究发现，当前的语言模型在抽象推理上表现不佳，尤其是在处理高维任务时，显示出对复杂任务的理解不足。'}}}, {'id': 'https://huggingface.co/papers/2605.16909', 'title': 'TOBench: A Task-Oriented Omni-Modal Benchmark for Real-World Tool-Using Agents', 'url': 'https://huggingface.co/papers/2605.16909', 'abstract': 'Abstract MM-ToolBench presents a comprehensive benchmark for evaluating omni-modal tool-use agents through closed-loop verification across diverse professional tasks.  AI-generated summary Tool-using agents are increasingly expected to operate across realistic professional workflows, where they must interpret multimodal inputs, coordinate external tools, inspect intermediate artifacts, and revise their actions before producing a final result. Existing benchmarks, however, often evaluate tool use, computer use, and multimodal reasoning in isolation, leaving a gap between benchmark settings and end-to-end omni-modal tool use in the real world. To address this gap, we introduce MM-ToolBench, a benchmark and evaluation harness for task-oriented omni-modal tool use. MM-ToolBench contains 100 executable tasks from two macro task families, Customer Service and Intelligent Creation, covering 20 subcategory slices and supported by 27 MCP servers with 324 tools. The central design of MM-ToolBench is closed-loop multimodal verification: agents must execute tools, inspect rendered or transformed artifacts, and self-correct when outputs fail task-specific requirements. To make such evaluation scalable and verifiable, MM-ToolBench couples MCP-based execution with task-specific grounded evaluators and a semi-automated construction pipeline for scenario discovery, task instantiation, evaluator synthesis, and human audit. Experiments on 15 contemporary agentic models show that MM-ToolBench remains highly challenging: Claude Opus 4.6, commonly regarded as one of the strongest coding-agent models, achieves only 32.0% task success, far below the 94.0% human benchmark. We envision MM-ToolBench as a practical foundation for evaluating and advancing next-generation omni-modal tool-using agents through closed-loop multimodal verification.', 'score': 2, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '70581324fc9d0957', 'authors': ['Zhiqiang Liu', 'Wenhui Dong', 'Yilang Tan', 'Yuwen Qu', 'Haochen Yin', 'Chenyang Si'], 'affiliations': ['Huazhong University of Science and Technology', 'Nanjing University', 'Southwest Jiaotong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.16909.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#benchmark', '#agents'], 'emoji': '🔧', 'ru': {'title': 'Мультимодальные агенты с замкнутым циклом проверки для работы с инструментами', 'desc': 'MM-ToolBench представляет комплексный бенчмарк для оценки мультимодальных агентов, которые работают с различными инструментами в замкнутом цикле обратной связи. Агенты должны интерпретировать входные данные разных модальностей, вызывать внешние инструменты, проверять промежуточные результаты и корректировать свои действия перед финальным ответом. Бенчмарк содержит 100 выполняемых задач из двух категорий с поддержкой 27 MCP-серверов и 324 инструментов, охватывая реальные профессиональные сценарии. Эксперименты показывают, что современные модели справляются с задачами на уровне 32%, что значительно ниже человеческого бенчмарка в 94%.'}, 'en': {'title': 'Bridging the Gap in Omni-Modal Tool Use Evaluation', 'desc': 'MM-ToolBench is a new benchmark designed to evaluate omni-modal tool-using agents in realistic professional tasks. It focuses on closed-loop verification, where agents must not only use tools but also inspect their outputs and make corrections if necessary. The benchmark includes 100 tasks across two main areas: Customer Service and Intelligent Creation, utilizing a variety of tools and evaluation methods. Initial tests show that even advanced models struggle to meet human performance levels, highlighting the challenges in developing effective omni-modal agents.'}, 'zh': {'title': '全模态工具使用的评估新基准', 'desc': 'MM-ToolBench是一个全面的基准测试，用于评估全模态工具使用代理在多种专业任务中的表现。该基准测试通过闭环验证，要求代理能够处理多模态输入、协调外部工具、检查中间结果并在最终结果之前进行自我修正。与现有基准测试不同，MM-ToolBench将工具使用、计算机使用和多模态推理结合在一起，填补了现实世界中全模态工具使用的空白。通过对15个现代代理模型的实验，MM-ToolBench显示出高度的挑战性，旨在为下一代全模态工具使用代理的评估和进步提供实用基础。'}}}, {'id': 'https://huggingface.co/papers/2605.18106', 'title': 'Symmetry-Compatible Principle for Optimizer Design: Embeddings, LM Heads, SwiGLU MLPs, and MoE Routers', 'url': 'https://huggingface.co/papers/2605.18106', 'abstract': 'Abstract Researchers developed symmetry-compatible optimizers that respect the equivariance structures of neural network parameters, improving training stability and performance over traditional coordinate-wise methods like Adam.  AI-generated summary A striking geometric disparity has long persisted in the practice of deep learning. While modern neural network architectures naturally exhibit rich symmetry and equivariance properties, popular optimizers such as Adam and its variants operate inherently coordinate-wise, rendering them unable to respect the equivariance structures of the parameter space. We address this disparity by introducing a symmetry-compatible principle for optimizer design: the gradient update rule should be equivariant under the symmetry group acting on the corresponding weight block. Following this principle, we first provide a unified perspective on bi-orthogonally equivariant updates for general matrix layers, as employed by stochastic spectral descent, Muon, Scion, and polar gradient methods. More importantly, by moving from orthogonal groups to permutation and shared-shift symmetries, we derive symmetry-compatible optimizers for parameter blocks whose symmetries differ from those of general matrix layers: embedding and LM head matrices, SwiGLU MLP projections, and MoE router matrices. These constructions include one-sided spectral, row-norm, hybrid row-norm/spectral, row-aware, column-aware, centered row-norm, and left-spectral updates. They yield an end-to-end layerwise optimizer stack in which each major matrix-valued parameter class is assigned an update whose equivariance matches its symmetry group. We corroborate this principle through pre-training experiments on dense and sparse MoE language models, including Qwen3-0.6B-style, Gemma 3 1B-style, OLMoE-1B-7B-style, and downsized gpt-oss architectures. Across these experiments, symmetry-compatible updates consistently improve final validation loss, and in several cases training stability, over corresponding AdamW updates.', 'score': 1, 'issue_id': 2268, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'e48e561f90c1742f', 'authors': ['Tim Tsz-Kit Lau', 'Weijie Su'], 'affiliations': ['University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2605.18106.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training', '#small_models'], 'emoji': '⚖️', 'ru': {'title': 'Симметричные оптимизаторы для уважения геометрических структур параметров нейросетей', 'desc': 'Исследователи разработали оптимизаторы, совместимые с симметриями нейронных сетей, которые учитывают эквивариантные структуры параметров модели. В отличие от традиционных методов вроде Adam, работающих поэлементно, новые оптимизаторы уважают геометрические симметрии различных типов слоев сети. Авторы предложили единый принцип проектирования: правило обновления градиента должно быть эквивариантно относительно группы симметрии соответствующего блока параметров. На примере предварительного обучения плотных и разреженных языковых моделей (MoE) показано, что симметрически совместимые обновления последовательно улучшают финальную функцию потерь и стабильность обучения по сравнению с AdamW.'}, 'en': {'title': 'Harnessing Symmetry for Better Optimizers in Neural Networks', 'desc': 'This paper introduces symmetry-compatible optimizers that align with the equivariance properties of neural network parameters, enhancing both training stability and performance. Traditional optimizers like Adam operate in a coordinate-wise manner, which fails to respect the inherent symmetries of neural networks. The authors propose a new principle for optimizer design that ensures gradient updates are equivariant to the symmetry group of the weight blocks. Their experiments demonstrate that these optimizers significantly reduce validation loss and improve training stability compared to standard AdamW updates.'}, 'zh': {'title': '对称兼容优化器：提升深度学习训练的稳定性与性能', 'desc': '研究人员开发了对称兼容的优化器，这些优化器尊重神经网络参数的等变结构，从而提高了训练的稳定性和性能，优于传统的坐标方式方法如Adam。现代神经网络架构自然展现出丰富的对称性和等变性特征，而流行的优化器如Adam及其变体则固有地以坐标方式运作，无法尊重参数空间的等变结构。本文提出了一种对称兼容的优化器设计原则：梯度更新规则应在作用于相应权重块的对称群下保持等变性。通过这一原则，我们为不同对称性的参数块（如嵌入矩阵和LM头矩阵）推导出对称兼容的优化器，并在多个预训练实验中验证了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.18727', 'title': "DexHoldem: Playing Texas Hold'em with Dexterous Embodied System", 'url': 'https://huggingface.co/papers/2605.18727', 'abstract': "Abstract DexHoldem presents a real-world benchmark for evaluating embodied agents in dexterous manipulation tasks, testing both primitive execution and higher-level perception and decision-making capabilities.  AI-generated summary Evaluating embodied systems on real dexterous hardware requires more than isolated primitive skills: an agent must perceive a changing tabletop scene, choose a context-appropriate action, execute it with a dexterous hand, and leave the scene usable for later decisions. We introduce DexHoldem, a real-world system-level benchmark built around Texas Hold'em dexterous manipulation with a ShadowHand. DexHoldem provides 1,470 teleoperated demonstrations across 14 Texas Hold'em manipulation primitives, a standardized physical policy benchmark, and an agentic perception benchmark that tests whether agents can recover the structured game state needed for embodied decision making. On primitive execution, π_{0.5} obtains the highest task completion rate (61.2%), while π_{0.5} and π_0 tie on scene-preserving success rate (47.5%). On agentic perception, Opus 4.7 obtains the best strict problem-level accuracy (34.3%), while GPT 5.5 obtains the best average field-wise accuracy (66.8%), exposing a gap between isolated visual sub-capabilities and complete routing-relevant state recovery. Finally, we instantiate the full embodied-agent loop in three case studies, where waiting, recovery dispatches, human-help requests, and repeated primitive execution reveal how perception and policy errors accumulate during closed-loop deployment. DexHoldem therefore evaluates dexterous tabletop execution, agentic perception, and embodied decision routing in a shared physical setting. Project page: https://dexholdem.github.io/Dexholdem/.", 'score': 1, 'issue_id': 2267, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '9913a4c9e68326d8', 'authors': ['Feng Chen', 'Tianzhe Chu', 'Li Sun', 'Pei Zhou', 'Zhuxiu Xu', 'Shenghua Gao', 'Yuexiang Zhai', 'Yanchao Yang', 'Yi Ma'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.18727.jpg', 'data': {'categories': ['#cv', '#benchmark', '#robotics', '#dataset', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Оценка полного цикла робототехнического манипулирования: от восприятия к действию', 'desc': 'DexHoldem представляет реальный бенчмарк для оценки воплощённых агентов в задачах ловкого манипулирования, включающий как выполнение примитивных операций, так и высокоуровневое восприятие и принятие решений. Система состоит из 1470 телеуправляемых демонстраций манипуляций с картами в Техасском холдеме, выполняемых робототехнической рукой ShadowHand, и предоставляет стандартизированный бенчмарк для оценки как политик примитивных действий, так и восприятия структурированного состояния игры. Экспериментальные результаты показывают значительный разрыв между изолированными способностями визуального понимания и полным восстановлением релевантного для решений состояния сцены. Полный цикл воплощённого агента в закрытом контуре демонстрирует, как ошибки восприятия и управления накапливаются во время развёртывания в реальных условиях.'}, 'en': {'title': 'Benchmarking Dexterous Manipulation in Real-World Scenarios', 'desc': "DexHoldem is a benchmark designed to assess embodied agents in dexterous manipulation tasks, particularly in the context of Texas Hold'em. It evaluates not only the agents' ability to perform basic actions but also their perception and decision-making skills in a dynamic environment. The benchmark includes a variety of teleoperated demonstrations and tests the agents' capabilities in recovering game states necessary for effective decision-making. Results show varying performance levels in task completion and perception accuracy, highlighting the challenges in integrating visual processing with action execution in real-world scenarios."}, 'zh': {'title': 'DexHoldem：评估灵巧操作的真实基准', 'desc': 'DexHoldem是一个用于评估具身智能体在灵巧操作任务中的真实基准。它不仅测试基本执行能力，还考察更高层次的感知和决策能力。该基准围绕德州扑克的灵巧操作构建，提供了大量的遥控演示和标准化的物理策略基准。通过DexHoldem，研究人员可以评估智能体在动态场景中的表现，以及它们在决策过程中如何处理感知和执行的挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.17894', 'title': 'Evaluating Cognitive Age Alignment in Interactive AI Agents', 'url': 'https://huggingface.co/papers/2605.17894', 'abstract': 'Abstract ChildAgentEval presents a psychometrically grounded benchmark for assessing cognitive age alignment in MLLM-based agents by comparing their reasoning performance against human developmental stages.  AI-generated summary While agentic AI and its core multimodal large language models (MLLMs) have demonstrated remarkable promise in language and visual reasoning across domains ranging from daily life to advanced scientific research, a profound gap remains between artificial and human intelligence. Despite the integration of powerful tools and advanced MLLMs, state-of-the-art AI agents frequently fail at foundational, seemingly simple tasks that a child can resolve with ease. Inspired by the Wechsler Intelligence Scale for Children (WISC), we introduce ChildAgentEval, the first psychometrically grounded interactive benchmark for evaluating cognitive age alignment in MLLM-based agents. ChildAgentEval systematically compares the reasoning performance of various MLLM-based interactive agents against age-specific human developmental stages, exposing where current agentic AI systems can and cannot simulate age-specific cognitive behavior.', 'score': 1, 'issue_id': 2265, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '463413aa489e7479', 'authors': ['Yifan Shen', 'Jiawen Zhang', 'Jian Xu', 'Junho Kim', 'Ismini Lourentzou', 'Xu Cao', 'Meihuan Huang'], 'affiliations': ['Hong Kong Polytechnic University', 'PediaMed AI', 'Peking University', 'Shenzhen Childrens Hospital', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.17894.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal', '#agents'], 'emoji': '🧒', 'ru': {'title': 'Оценка когнитивного возраста AI-агентов через детские задачи', 'desc': 'Статья представляет ChildAgentEval — первый психометрический бенчмарк для оценки когнитивного возраста агентов на основе мультимодальных больших языковых моделей (MLLM). Авторы вдохновились шкалой интеллекта Векслера для детей и создали интерактивный набор задач для сравнения способностей агентов с когнитивными возможностями людей разного возраста. Исследование выявляет критический разрыв между искусственным интеллектом и человеческим интеллектом, демонстрируя, что продвинутые MLLM-агенты часто не справляются с простыми задачами, которые легко решают дети. Бенчмарк систематически оценивает, где современные агенты могут и не могут моделировать возрастные когнитивные поведения.'}, 'en': {'title': "Bridging the Gap: Evaluating AI's Cognitive Age Alignment", 'desc': 'ChildAgentEval is a new benchmark designed to evaluate how well MLLM-based agents mimic human cognitive development. It compares the reasoning abilities of these AI agents to the cognitive skills of children at different ages, using a method inspired by the Wechsler Intelligence Scale for Children. The benchmark highlights the gaps in performance between AI and human intelligence, especially in tasks that children can easily accomplish. By systematically assessing these differences, ChildAgentEval aims to improve the design of AI systems to better align with human cognitive behaviors.'}, 'zh': {'title': '评估智能体认知年龄对齐的基准', 'desc': 'ChildAgentEval 是一个基于心理测量学的基准，用于评估基于多模态大型语言模型（MLLM）的智能体在认知年龄对齐方面的表现。该基准通过将智能体的推理能力与人类发展阶段进行比较，揭示了人工智能与人类智能之间的差距。尽管现代的 MLLM 在语言和视觉推理方面表现出色，但它们在一些基础任务上仍然无法与儿童相提并论。ChildAgentEval 旨在系统性地评估这些智能体在不同年龄段的认知行为模拟能力。'}}}, {'id': 'https://huggingface.co/papers/2605.18601', 'title': 'Incantation: Natural Language as the Action Interface for Multi-Entity Video World Models', 'url': 'https://huggingface.co/papers/2605.18601', 'abstract': 'Abstract Incantation enables interactive video world modeling with natural language conditioning for fine-grained multi-entity control and cross-entity generalization through novel video backbone and attention mechanisms.  AI-generated summary Modern interactive video world models have achieved impressive visual fidelity, yet lack fine-grained multi-entity control and cross-entity, cross-world generalization. We trace this gap to the action interface: standard control protocols (e.g. animation IDs, device inputs, scene-level captions) bind action semantics to specific entities or engines at design time. We propose natural language as the interface to unlock expressiveness that no prior interface can achieve, and we present Incantation, the first interactive video world model with per-latent-frame (0.25 s) natural-language conditioning that supports simultaneous multi-entity control and concept-level cross-entity transfer beyond any fixed rendering pipeline. We pair a pretrained bidirectional video backbone with frame-local text cross-attention, and enable real-time long-horizon streaming through ODE-initialized Self-Forcing distillation with a RoPE-decoupled sliding KV-cache. We surpass the Action-Index baseline on cross-entity transfer (89% vs. 43%) and out-of-vocabulary prompts (90% vs. 0%), and our 2-step student sustains 19.7 FPS at 480p with stable FVD over 2-hour rollouts. We further apply the same architecture and training recipe to The King of Fighters, changing only the per-entity action vocabulary slots. We have released a preview subset of the Incantation data
