F1: 0.640 vs. 0.622) under leave-one-speaker-out evaluation. It also improves depressed-class recall at intermediate layers (7-8), though the small test set limits generalizability. Two findings remain robust: model scaling degrades cross-lingual performance while improving monolingual English, and speaker identity leakage artificially inflated previously reported Mandarin F1 scores to 0.954, an artifact we reproduce and quantify.', 'score': 1, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'b51dde78918b1e89', 'authors': ['Anisha Pattanayak', 'Hanie Kang', 'Huang-Cheng Chou', 'Shrikanth Narayanan', 'Sudarsana Reddy Kadiri'], 'affiliations': ['Ming Hsieh Department of Electrical and Computer Engineering, University of Southern California, USA', 'Signal Analysis and Interpretation Laboratory (SAIL), University of Southern California, USA', 'Thomas Lord Department of Computer Science, University of Southern California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02920.jpg', 'data': {'categories': ['#multilingual', '#healthcare', '#multimodal', '#audio'], 'emoji': '🌍', 'ru': {'title': 'Преодоление языковых границ в диагностике депрессии через контрастивное выравнивание речевых представлений', 'desc': 'Статья описывает CLeaD — фреймворк для обнаружения депрессии через анализ речи на английском и мандаринском языках. Авторы используют supervised contrastive learning для отображения эмбеддингов WavLM в общее клиническое пространство без параллельных данных и дополнительной тонкой настройки на целевом языке. Исследование выявило критическую проблему в предыдущих работах: утечка информации об идентичности говорящего при случайном разделении данных на сегменты искусственно завышала метрики до 0.954 F1. Работа демонстрирует, что кросс-лингвистическое обобщение улучшается на промежуточных слоях нейронной сети, хотя масштабирование модели снижает производительность в мультилингвальном контексте.'}, 'en': {'title': 'Bridging Languages for Better Depression Detection', 'desc': 'This paper introduces CLeaD, a supervised contrastive alignment framework designed to improve depression detection across English and Mandarin languages. It addresses the issue of cross-lingual generalization by mapping WavLM embeddings into a shared clinical space, avoiding the pitfalls of speaker identity leakage that can skew performance metrics. The study shows that CLeaD achieves better performance than previous methods, particularly in recall for depressed individuals, despite the challenges posed by a small test set. Additionally, it highlights that larger models may enhance performance in one language while hindering it in another, and it quantifies the impact of identity leakage on prior evaluation scores.'}, 'zh': {'title': '跨语言抑郁检测的新方法', 'desc': '本研究提出了一种监督对比对齐框架CLeaD，旨在将WavLM嵌入从英语和普通话映射到共享的临床空间，以检测抑郁症。该方法解决了跨语言泛化的挑战，并揭示了由于说话者身份泄漏而导致的性能伪影。通过对52名普通话说话者的评估，CLeaD在留一说话者评估中表现出色，F1分数为0.640，优于基线的0.622。此外，模型扩展会降低跨语言性能，但提高了单语英语的表现。'}}}, {'id': 'https://huggingface.co/papers/2607.03509', 'title': 'Flex-Forcing: Towards a Unified Autoregressive and Bidirectional Video Diffusion Model', 'url': 'https://huggingface.co/papers/2607.03509', 'abstract': 'Abstract Flex-Forcing enables video diffusion models to operate under both bidirectional and autoregressive generation regimes through a flexible chunking mechanism over temporal and denoising steps, improving video quality and inference speed.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in large-scale generative models has substantially advanced video generation, yet existing methods remain constrained by a rigid inference paradigm. Bidirectional diffusion models excel at global coherence and visual fidelity but suffer from slow inference, while autoregressive models offer efficient and streaming generation at the cost of long-range consistency and exposure bias. We introduce Flex-Forcing, a unified training and inference framework that enables a video diffusion model to seamlessly operate under both bidirectional and autoregressive generation regimes. The core idea is a flexible chunking mechanism jointly defined over the temporal axis and denoising steps. This design allows the model to (1) perform flexible chunking according to different device budgets, (2) perform bidirectional inference across chunks for global structure planning, while generating frames autoregressively within each chunk for efficient and fine-grained synthesis, and (3) perform any-order, any-timestep autoregressive generation without the strict causal constraint. Extensive experiments on multiple video generation benchmarks demonstrate that Flex-Forcing achieves consistently better video quality, long-video stability than strong baselines with a rigid inference schedule, while offering faster inference.', 'score': 0, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '32b39cc727398700', 'authors': ['Xinyin Ma', 'Julius Berner', 'Chao Liu', 'Arash Vahdat', 'Weili Nie', 'Xinchao Wang'], 'affiliations': ['Electrical and Computer Engineering, National University of Singapore, Singapore', 'NVIDIA Research, California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2607.03509.jpg', 'data': {'categories': ['#diffusion', '#inference', '#benchmark', '#video'], 'emoji': '🎬', 'ru': {'title': 'Гибкое объединение двусторонней и авторегрессивной генерации видео', 'desc': 'В статье предлагается Flex-Forcing — единая архитектура для видео-диффузионных моделей, позволяющая работать как в двусторонних, так и в авторегрессивных режимах генерации через гибкую систему разбиения по временной оси и шагам денойзинга. Двусторонние модели обеспечивают глобальную согласованность, но медленны, а авторегрессивные быстры, но страдают от ошибок предсказания и потери долгосрочной консистентности. Предложенный подход позволяет модели гибко адаптироваться к вычислительным ограничениям, планировать глобальную структуру видео в двусторонних проходах между чанками и генерировать кадры авторегрессивно внутри чанков без строгих причинно-следственных ограничений. Экспериментальные результаты показывают, что Flex-Forcing достигает лучшего качества видео, стабильности на длинных последовательностях и ускоренного вывода по сравнению с существующими методами.'}, 'en': {'title': 'Flex-Forcing: Unifying Video Generation for Quality and Speed', 'desc': 'Flex-Forcing is a novel framework that enhances video diffusion models by allowing them to function in both bidirectional and autoregressive modes. This is achieved through a flexible chunking mechanism that optimizes the generation process over time and denoising steps. By enabling models to generate video frames efficiently while maintaining high visual quality and coherence, Flex-Forcing addresses the limitations of traditional methods. Experiments show that this approach not only improves video quality and stability but also accelerates inference speed compared to existing rigid models.'}, 'zh': {'title': '灵活生成，提升视频质量与速度', 'desc': 'Flex-Forcing是一种新颖的训练和推理框架，能够让视频扩散模型在双向和自回归生成模式下灵活运行。它通过在时间轴和去噪步骤上定义灵活的分块机制，提升了视频生成的质量和推理速度。该方法允许模型根据不同的设备预算进行灵活分块，并在每个分块内自回归生成帧，从而实现高效的细粒度合成。实验结果表明，Flex-Forcing在多个视频生成基准上表现出更好的视频质量和长视频稳定性。'}}}, {'id': 'https://huggingface.co/papers/2606.31329', 'title': '3D HAMSTER: Bridging Planning and Control in Hierarchical Vision Language Action Models through 3D Trajectory Guidance', 'url': 'https://huggingface.co/papers/2606.31329', 'abstract': 'Abstract 3D HAMSTER framework enhances robot manipulation by integrating a vision-language model with depth encoding to generate metrically accurate 3D trajectories for point cloud-based control policies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Hierarchical Vision-Language-Action (VLA) models decouple high-level planning from low-level control to improve generalization in robot manipulation. Recent work in this paradigm uses 2D end-effector trajectories predicted by a Vision-Language Model (VLM) as explicit guidance for a downstream policy. However, state-of-the-art low-level policies operate in 3D metric space on point clouds, and feeding them 2D guidance that lacks depth forces each waypoint to be assigned the depth of whatever scene surface lies beneath it, producing geometrically distorted trajectories. We propose 3D HAMSTER, a hierarchical framework that closes this gap by having the planner directly output metrically reliable 3D trajectories. We augment a VLM with a dedicated depth encoder and a dense depth reconstruction objective to predict 3D waypoint sequences, which are directly integrated into a pointcloudbased low-level policy. Across 3D trajectory prediction, simulation, and real-world manipulation, 3D HAMSTER consistently outperforms proprietary VLMs and 2D-guided baselines, with the largest gains under appearance-altering shifts and unseen language, spatial, and visual conditions. The project page is available at https://davian-robotics.github.io/3D_HAMSTER/.', 'score': 0, 'issue_id': 2593, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '91dafffbe20387b0', 'authors': ['Dongyoon Hwang', 'Byungkun Lee', 'Dongjin Kim', 'Hyojin Jang', 'Hoiyeong Jin', 'Jueun Mun', 'Minho Park', 'Hojoon Lee', 'Hyunseung Kim', 'Jaegul Choo'], 'affiliations': ['KAIST', 'Kakao Brain', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31329.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'От 2D к 3D: добавляем глубину в vision-language планирование для робот-манипуляторов', 'desc': 'В статье предлагается фреймворк 3D HAMSTER для улучшения манипуляции робота путём интеграции vision-language модели с кодировщиком глубины для генерации метрически точных 3D траекторий. Иерархический подход разделяет высокоуровневое планирование от низкоуровневого управления, где VLM предсказывает 3D waypoints вместо 2D координат, что устраняет геометрические искажения при работе с point cloud-ориентированными политиками. Модель дополнена специализированным энкодером глубины и объективом реконструкции плотной карты глубины для точного предсказания последовательностей точек в 3D пространстве. Экспериментальные результаты показывают превосходство 3D HAMSTER над baseline методами в задачах синтеза траекторий, симуляции и реальных робототехнических манипуляциях, особенно в условиях изменения внешнего вида сцены и неизвестных языковых или визуальных контекстов.'}, 'en': {'title': 'Enhancing Robot Manipulation with Accurate 3D Trajectories', 'desc': 'The 3D HAMSTER framework improves robot manipulation by combining a vision-language model with depth information to create accurate 3D movement paths for robots. It separates high-level planning from low-level control, allowing for better adaptability in various tasks. Unlike previous methods that used 2D trajectories, which could lead to distorted movements, 3D HAMSTER generates reliable 3D paths directly. This approach has shown superior performance in both simulations and real-world applications, especially in challenging conditions.'}, 'zh': {'title': '3D HAMSTER：提升机器人操作的3D轨迹生成', 'desc': '3D HAMSTER框架通过将视觉-语言模型与深度编码相结合，增强了机器人操作能力，能够生成精确的3D轨迹。该框架将高层规划与低层控制解耦，提高了机器人操作的泛化能力。与传统的2D轨迹指导不同，3D HAMSTER直接输出可靠的3D轨迹，避免了几何失真。通过在3D轨迹预测、仿真和实际操作中表现优异，该框架在各种条件下均优于现有的视觉-语言模型和2D指导基线。'}}}];

        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture (5)', '#audio (1)', '#benchmark (5)', '#cv (1)', '#data (1)', '#dataset (3)', '#diffusion (4)', '#ethics', '#games (2)', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (4)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual (1)', '#multimodal (8)', '#open_source (3)', '#optimization (7)', '#plp', '#rag (1)', '#reasoning (2)', '#rl (2)', '#rlhf', '#robotics (3)', '#science', '#security', '#small_models', '#story_generation', '#survey (1)', '#synthetic (2)', '#training (8)', '#transfer_learning (1)', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-08 05:15',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-08 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-08 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
