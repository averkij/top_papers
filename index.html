    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

                    filterAndRenderArticles();

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.28003', 'title': 'ResearchMath-14K: Scaling Research-Level Mathematics via Agents', 'url': 'https://huggingface.co/papers/2605.28003', 'abstract': 'Abstract ResearchMath-14k dataset and ResearchMath-Reasoning trajectories are introduced to advance research-level mathematical reasoning in language models, demonstrating that filtered open-problem attempts provide useful supervision for model improvement.  AI-generated summary The frontier of mathematics is defined by problems whose solutions are not yet known, yet it remains unclear whether language models can meaningfully engage with such problems without human intervention. A major obstacle is the lack of large-scale research-level math datasets. To this end, we introduce ResearchMath-14k, a set of 14{,}056 problems curated from academic sources via a multi-agent pipeline, making it the largest collection of research-level mathematical problems to date. We further generate ResearchMath-Reasoning, 220K teacher trajectories from two open models, where we observe recurring avoidance behaviors such as non-attempts and fabricated references. Interestingly, across eight open-weight models, newer generations produce 5.6times more references and 5.0times more fake references per trace. After agentic filtering of ResearchMath-Reasoning, fine-tuning Qwen3 models from 4B to 30B parameters improves over base models by 9.2 points on average. This shows that filtered open-problem attempts can provide useful supervision even without fully correct reasoning traces. We make ResearchMath-14k publicly available for future works on research-level mathematical reasoning.', 'score': 13, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '8a085b815578fb33', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#synthetic', '#science', '#math', '#reasoning', '#dataset', '#open_source', '#agents'], 'emoji': '🧮', 'ru': {'title': 'Фильтрованные неправильные попытки решают задачи: как учить модели на исследовательской математике без совершенства', 'desc': 'В статье представлены датасет ResearchMath-14k с 14 тысячами задач исследовательского уровня из академических источников и ResearchMath-Reasoning с 220 тысячами траекторий рассуждений от открытых моделей. Авторы обнаружили, что более новые модели генерируют больше галлюцинаций и неправильных ссылок при решении сложных математических задач. После фильтрации траекторий рассуждений с помощью агентского подхода, дообучение моделей Qwen привело к улучшению производительности на 9.2 балла в среднем. Исследование показывает, что даже неполные попытки решения открытых задач могут служить полезной обучающей информацией для совершенствования языковых моделей.'}, 'en': {'title': 'Empowering AI with ResearchMath-14k for Advanced Mathematical Reasoning', 'desc': 'This paper introduces the ResearchMath-14k dataset, which contains over 14,000 research-level mathematical problems, aimed at enhancing the capabilities of language models in solving complex math problems. The authors also present ResearchMath-Reasoning, a collection of 220,000 reasoning trajectories generated by open models, highlighting common issues like avoidance behaviors and inaccuracies in references. The study finds that filtering these reasoning attempts can significantly improve the performance of language models, with fine-tuning showing an average increase of 9.2 points. By making ResearchMath-14k publicly available, the authors aim to foster further advancements in mathematical reasoning within AI systems.'}, 'zh': {'title': '推动数学推理的研究级数据集', 'desc': '本文介绍了ResearchMath-14k数据集和ResearchMath-Reasoning轨迹，以推动语言模型在研究级数学推理方面的进展。该数据集包含14,056个从学术来源整理的问题，是迄今为止最大的研究级数学问题集合。研究还生成了220,000个教师轨迹，观察到模型在处理开放性问题时存在回避行为。通过对ResearchMath-Reasoning进行过滤，微调Qwen3模型后，模型性能平均提高了9.2分，表明即使没有完全正确的推理轨迹，过滤后的开放问题尝试也能提供有用的监督。'}}}, {'id': 'https://huggingface.co/papers/2605.28820', 'title': 'From Pixels to Words -- Towards Native One-Vision Models at Scale', 'url': 'https://huggingface.co/papers/2605.28820', 'abstract': 'Abstract NEO-ov is a native vision-language model that end-to-end learns cross-frame and pixel-word correspondences without modular components, enabling unified spatiotemporal modeling and competitive performance in visual perception tasks.  AI-generated summary Current vision-language models (VLMs) typically stitch together separate image encoders and language decoders via multi-stage alignment, a modular framework that inevitably fragments pixel-level signals across frames and scatters early pixel-word interactions. In parallel, native VLMs, despite impressive performance on single images, remain largely unexplored in multi-image, video understanding, and spatial intelligence. Hence, we introduce NEO-ov, a native foundation model that learns cross-frame and pixel-word correspondence end-to-end, without any external encoders, auxiliary adapters, or post-hoc fusion. By eliminating module boundaries entirely, NEO-ov enables fine-grained and unified spatiotemporal modeling to emerge natively inside the model. Notably, NEO-ov largely narrows the gap to modular counterparts while excelling at fine-grained visual perception, validating that native "one-vision" architectures are not only feasible but competitive at scale. Beyond empirical performance, we unveil systematic architectural analyses and detailed training recipes to facilitate subsequent native multimodal modeling. Our code and models are publicly available at: https://github.com/EvolvingLMMs-Lab/NEO.', 'score': 3, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '4fbe9f4edb761e41', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#multimodal', '#cv', '#video', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Единое видение: мультимодальная модель без модулей', 'desc': 'NEO-ov — это нативная модель визуально-языкового понимания, которая обучается сквозным образом находить соответствия между пикселями, словами и кадрами без модульных компонентов. В отличие от традиционных VLM, которые используют отдельные кодировщики и декодировщики, соединённые многоэтапной выравниванием, NEO-ov обрабатывает видео и пространственную информацию в едином архитектурном целом. Модель демонстрирует конкурентоспособную производительность в задачах восприятия и лучше справляется с мелкозернистым анализом изображений. Авторы предоставляют детальный анализ архитектуры и рецепты обучения для развития нативного мультимодального моделирования.'}, 'en': {'title': 'Unified Vision-Language Learning for Enhanced Perception', 'desc': 'NEO-ov is a novel vision-language model that learns to connect visual and textual information directly, without using separate components for images and words. This end-to-end approach allows it to understand relationships across multiple frames and pixels more effectively than traditional models, which often break down these connections. By removing modular boundaries, NEO-ov achieves a more integrated understanding of spatiotemporal data, making it particularly strong in visual perception tasks. The paper also provides insights into its architecture and training methods, paving the way for future advancements in native multimodal models.'}, 'zh': {'title': 'NEO-ov：一体化视觉-语言模型的创新', 'desc': 'NEO-ov是一种原生的视觉-语言模型，能够端到端地学习跨帧和像素-词的对应关系，而无需模块化组件。这种方法实现了统一的时空建模，并在视觉感知任务中表现出竞争力。与传统的视觉-语言模型不同，NEO-ov消除了模块边界，使得细粒度的时空建模能够在模型内部自然产生。我们的研究表明，原生的“一体化”架构不仅可行，而且在大规模应用中具有竞争力。'}}}, {'id': 'https://huggingface.co/papers/2605.27311', 'title': 'Chartographer: Counterfactual Chart Generation for Evaluating Vision-Language Models', 'url': 'https://huggingface.co/papers/2605.27311', 'abstract': 'Abstract Counterfactual charts are introduced to rigorously evaluate visual reasoning in chart question-answering by varying underlying data while keeping tasks fixed, revealing hidden model failures and generalization limitations.  AI-generated summary Chart question-answering (QA) benchmarks aim to pose questions that require visual reasoning to correctly answer, but models can often reach solutions through shortcuts or prior familiarity with a chart based on their own background knowledge. To strictly evaluate visual reasoning, we propose counterfactual charts where the chart-question task remains fixed, but underlying chart and the corresponding answer are varied. We introduce Chartographer, a framework to reverse engineer charts into executable code, validate reconstruction fidelity, generate seed-controlled counterfactual variants, and derive new answers from executable QA logic. We apply this framework to existing chart QA datasets and evaluate proprietary and open-source vision-language models (VLMs), measuring variation sensitivity and generalizability. Counterfactual charts reveal failures hidden by single-chart performance: VLMs often fail to generalize after answering the original chart correctly. We find failures are most prevalent when updated charts require novel visual reasoning pathways.', 'score': 3, 'issue_id': 2329, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'b88141da77dc38e5', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#multimodal'], 'emoji': '📊', 'ru': {'title': 'Контрфактические графики раскрывают истинные пределы обобщения моделей зрения', 'desc': 'В работе предложены контрфактические графики для объективной оценки способности моделей визуального восприятия к рассуждению при ответах на вопросы о диаграммах. Авторы разработали фреймворк Chartographer, который переводит графики в исполняемый код, генерирует варианты данных с фиксированной задачей, но измененными диаграммами и ответами. Эта методология позволяет выявить скрытые ошибки моделей, которые правильно отвечают на исходные графики, но не справляются с их модификациями. Исследование показало, что видео-языковые модели часто не обобщают знания, когда требуются новые пути визуального анализа.'}, 'en': {'title': 'Uncovering Hidden Failures in Chart Question-Answering with Counterfactuals', 'desc': 'This paper introduces counterfactual charts as a method to evaluate visual reasoning in chart question-answering tasks. By keeping the questions fixed while changing the underlying data, the authors can uncover hidden failures in models that may rely on shortcuts rather than true reasoning. The proposed framework, Chartographer, allows for the reverse engineering of charts into executable code, enabling the generation of controlled counterfactual variants and new answers. The study reveals that many vision-language models struggle to generalize their answers when faced with updated charts that require different reasoning approaches.'}, 'zh': {'title': '反事实图表：揭示视觉推理的潜在失败', 'desc': '本文介绍了反事实图表的概念，用于严格评估图表问答中的视觉推理能力。通过保持任务不变而改变底层数据，反事实图表揭示了模型的隐藏失败和泛化限制。我们提出了Chartographer框架，可以将图表逆向工程为可执行代码，并生成受控的反事实变体。研究表明，视觉语言模型在处理更新的图表时，常常无法有效泛化，尤其是在需要新的视觉推理路径时。'}}}, {'id': 'https://huggingface.co/papers/2605.28691', 'title': 'OSP-Next: Efficient High-Quality Video Generation with Sparse Sequence Parallelism, HiF8 Quantization, and Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.28691', 'abstract': 'Abstract OSP-Next is an efficient text-to-video generation model that combines sparse attention, parallelism, quantization, and reinforcement learning to achieve high-quality video synthesis with reduced computational costs.  AI-generated summary Diffusion Transformers achieve strong video generation quality, but the quadratic cost of full attention limits efficiency. We introduce OSP-Next, an efficient text-to-video generation model that integrates sparse attention, parallelism, quantization, and reinforcement learning. OSP-Next uses a hybrid full-sparse attention architecture, where the sparse component is implemented with Skiparse-2D Attention. This fixed-pattern mechanism applies token-wise and group-wise sparse attention along spatial dimensions, leveraging locality while maintaining native compatibility with FlashAttention kernels. Based on the local equivalence of rearrangement in Skiparse-2D Attention, we further propose Sparse Sequence Parallelism (SSP), which partitions subsequences across ranks and switches sparse patterns through a single All-to-All communication. Compared with Ulysses Sequence Parallelism (SP), SSP provides a native parallel strategy for sparse attention and reduces communication volume by 75%. OSP-Next also incorporates HiF8 quantization to enable stable joint training with 8-bit quantization and sparse fine-tuning, and applies Mix-GRPO post-training to improve the performance of the sparse model. Experiments show that OSP-Next achieves a VBench total score of 83.73%, surpassing the Wan2.1 baseline. Under the 5-second 720P and 5-second 768P settings, OSP-Next achieves up to 1.64times single-GPU speedup and over 1.52times eight-GPU speedup on NVIDIA H200 GPUs. In addition, with only a 0.4% drop in VBench total score, OSP-Next-HiF8 achieves 1.69times and 2.27times speedups under the two settings on a single Ascend 950PR, demonstrating the efficiency and performance of OSP-Next across hardware platforms.', 'score': 1, 'issue_id': 2329, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'c505db628ab773be', 'authors': ['Yunyang Ge', 'Xianyi He', 'Zezhong Zhang', 'Bin Lin', 'Bin Zhu', 'Xinhua Cheng', 'Li Yuan'], 'affiliations': ['Nanyang Technological University', 'Peking University', 'Rabbitpre AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.28691.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#training', '#inference', '#optimization', '#video', '#rlhf'], 'emoji': '⚡', 'ru': {'title': 'Быстрое видео из текста: разреженное внимание вместо полного', 'desc': 'OSP-Next — это эффективная модель для генерации видео из текста, которая использует разреженное внимание (sparse attention) вместо полного внимания трансформера, чтобы снизить квадратичную вычислительную сложность. Модель интегрирует параллелизм последовательностей, квантизацию и обучение с подкреплением для стабильного обучения с 8-битовой точностью. Архитектура использует гибридный подход с полным и разреженным вниманием, где разреженная часть реализована через Skiparse-2D Attention с фиксированным паттерном. Эксперименты показывают, что OSP-Next достигает ускорения вычислений в 1.6-2.3 раза на различных GPU при сохранении качества генерации видео на уровне 83.73% по метрике VBench.'}, 'en': {'title': 'Efficient Video Generation with OSP-Next', 'desc': 'OSP-Next is a novel model designed for generating videos from text, focusing on efficiency and quality. It utilizes sparse attention mechanisms to reduce computational costs while maintaining high video synthesis quality. The model incorporates techniques like parallel processing and quantization, allowing it to perform faster on various hardware setups. Experiments show that OSP-Next significantly outperforms previous models in speed and efficiency, making it a promising advancement in text-to-video generation.'}, 'zh': {'title': '高效文本到视频生成的未来', 'desc': 'OSP-Next是一种高效的文本到视频生成模型，结合了稀疏注意力、并行处理、量化和强化学习，以实现高质量的视频合成，同时降低计算成本。该模型采用混合的全稀疏注意力架构，通过Skiparse-2D注意力实现稀疏组件，利用空间维度的局部性来提高效率。OSP-Next还引入了稀疏序列并行性（SSP），通过单一的全对全通信来切换稀疏模式，从而减少通信量。实验结果表明，OSP-Next在多个设置下显著提高了生成速度和性能，展示了其在不同硬件平台上的高效性。'}}}, {'id': 'https://huggingface.co/papers/2605.27028', 'title': 'Less is More: Early Stopping Rollout for On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.27028', 'abstract': 'Abstract On-policy distillation suffers from teacher decay issues with later tokens, which are mitigated by Early Stopping Rollout that restricts training to initial response tokens, improving efficiency and stability.  AI-generated summary On-policy distillation has recently emerged as a promising alternative to standard sequence-level imitation, training a student by scoring its own rollouts with a teacher model. However, we observe ``Off-policy Teacher Decay\'\' problem in this paradigm: for the later tokens, with student\'s earlier trajectory as context that is off-policy to the teacher, the teacher\'s ability to produce a corrective score would decay, and may fall back to token-completion behavior learned in the pre-training stage. We empirically verify this problem, and we propose Early Stopping Rollout (ESR) to fix it: a simple yet effective distillation strategy that simply restricts the rollout generation to the first   response tokens. We show that ESR both surpasses the full rollout OPD performance across model size, family, tasks and training regime, and exhibit much higher GPU efficiency and training stability, especially under cross model family scenarios. We further investigate the mechanism behind this surprising performance and discovered "Cascading Alignment" and "Sub-mode Commitment" effect of ESR that may explain why it works effectively and even sometimes exceeding the teacher model performance. Besides, we show that this position-based token selection strategy cannot be fully explainable by KL divergence and entropy signals.', 'score': 1, 'issue_id': 2329, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'e1952f55e19ba659', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '✂️', 'ru': {'title': 'Ранняя остановка развёртки спасает дистилляцию от разложения учителя', 'desc': 'В статье изучается проблема дистилляции на политике, где учитель теряет качество при оценке поздних токенов студента, поскольку ранняя траектория студента не совпадает с распределением данных учителя. Авторы предлагают Early Stopping Rollout (ESR) — простую стратегию, которая ограничивает генерацию ответов только первыми токенами, что улучшает стабильность обучения и эффективность использования GPU. Эксперименты показывают, что ESR превосходит полную развёртку на разных размерах моделей, семействах архитектур и задачах. Исследование раскрывает механизмы работы ESR через эффекты каскадного выравнивания и фиксации подмоды, которые объясняют, почему ограничение длины может даже превзойти производительность учителя.'}, 'en': {'title': 'Enhancing On-Policy Distillation with Early Stopping Rollout', 'desc': "This paper addresses the challenges of on-policy distillation in machine learning, particularly the issue of 'Off-policy Teacher Decay' where the teacher model's scoring ability diminishes for later tokens in a sequence. The authors propose a solution called Early Stopping Rollout (ESR), which limits the training to only the initial response tokens, thereby enhancing both efficiency and stability during the training process. Through empirical studies, they demonstrate that ESR outperforms traditional full rollout methods across various model sizes and tasks, while also improving GPU efficiency. Additionally, the paper explores the underlying mechanisms of ESR, revealing effects like 'Cascading Alignment' and 'Sub-mode Commitment' that contribute to its effectiveness, even surpassing the performance of the teacher model in some cases."}, 'zh': {'title': '早停回滚：提升策略蒸馏效率的关键', 'desc': '本文探讨了在策略蒸馏中，教师模型在生成后续标记时的衰退问题。为了解决这一问题，提出了一种名为早停回滚（Early Stopping Rollout, ESR）的策略，该策略限制训练仅在初始响应标记上进行，从而提高了效率和稳定性。研究表明，ESR在不同模型规模、任务和训练方式下均优于传统的全回滚策略，并且在跨模型家族场景中表现出更高的GPU效率和训练稳定性。此外，本文还探讨了ESR的有效性机制，包括“级联对齐”和“子模式承诺”效应。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (1)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (1)', '#cv (2)', '#data', '#dataset (2)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (2)', '#open_source (2)', '#optimization (1)', '#plp', '#rag', '#reasoning (1)', '#rl', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (2)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-28 02:16',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-28 02:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-28 02:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
