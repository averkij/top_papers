    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.13779', 'title': 'MinT: Managed Infrastructure for Training and Serving Millions of LLMs', 'url': 'https://huggingface.co/papers/2605.13779', 'abstract': 'Abstract MinT is a managed infrastructure system that enables efficient low-rank adaptation training and serving by keeping base models resident and moving lightweight adapter revisions, scaling across multiple dimensions including large model architectures, reduced storage requirements, and distributed policy management.  AI-generated summary We present MindLab Toolkit (MinT), a managed infrastructure system for Low-Rank Adaptation (LoRA) post-training and online serving. MinT targets a setting where many trained policies are produced over a small number of expensive base-model deployments. Instead of materializing each policy as a merged full checkpoint, MinT keeps the base model resident and moves exported LoRA adapter revisions through rollout, update, export, evaluation, serving, and rollback, hiding distributed training, serving, scheduling, and data movement behind a service interface. MinT scales this path along three axes. Scale Up extends LoRA RL to frontier-scale dense and MoE architectures, including MLA and DSA attention paths, with training and serving validated beyond 1T total parameters. Scale Down moves only the exported LoRA adapter, which can be under 1% of base-model size in rank-1 settings; adapter-only handoff reduces the measured step by 18.3x on a 4B dense model and 2.85x on a 30B MoE, while concurrent multi-policy GRPO shortens wall time by 1.77x and 1.45x without raising peak memory. Scale Out separates durable policy addressability from CPU/GPU working sets: a tensor-parallel deployment supports 10^6-scale addressable catalogs (measured single-engine sweeps through 100K) and thousand-adapter active waves at cluster scale, with cold loading treated as scheduled service work and packed MoE LoRA tensors improving live engine loading by 8.5-8.7x. MinT thus manages million-scale LoRA policy catalogs while training and serving selected adapter revisions over shared 1T-class base models.', 'score': 129, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'c940d92f7b870239', 'authors': ['Mind Lab', ':', 'Song Cao', 'Vic Cao', 'Andrew Chen', 'Kaijie Chen', 'Cleon Cheng', 'Steven Chiang', 'Kaixuan Fan', 'Hera Feng', 'Huan Feng', 'Arthur Fu', 'Jun Gao', 'Hongquan Gu', 'Aaron Guan', 'Nolan Ho', 'Mutian Hong', 'Hailee Hou', 'Peixuan Hua', 'Charles Huang', 'Miles Jiang', 'Nora Jiang', 'Yuyi Jiang', 'Qiuyu Jin', 'Fancy Kong', 'Andrew Lei', 'Kyrie Lei', 'Alexy Li', 'Lucian Li', 'Ray Li', 'Theo Li', 'Zhihui Li', 'Jiayi Lin', 'Kairus Liu', 'Kieran Liu', 'Logan Liu', 'Xiang Liu', 'Irvine Lu', 'Maeve Luo', 'Runze Lv', 'Pony Ma', 'Verity Niu', 'Anson Qiu', 'Vincent Wang', 'Rio Yang', 'Maxwell Yao', 'Carrie Ye', 'Regis Ye', 'Wenlin Ye', 'Josh Ying', 'Danney Zeng', 'Yuhan Zhan', 'Anya Zhang', 'Di Zhang', 'Ruijia Zhang', 'Sueky Zhang', 'Ya Zhang', 'Wei Zhao', 'Ada Zhou', 'Changhai Zhou', 'Yuhua Zhou', 'Xinyue Zhu', 'Murphy Zhuang'], 'affiliations': ['Mind Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.13779.jpg', 'data': {'categories': ['#open_source', '#optimization', '#inference', '#rl', '#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Миллионы адаптеров на одной базовой модели', 'desc': 'MinT — это управляемая инфраструктурная система для эффективного обучения и развёртывания моделей с использованием низкорангового адаптера (LoRA). Система хранит базовую модель в памяти и перемещает лёгкие адаптеры через цикл обучения, экспорта, оценки и развёртывания, скрывая сложность распределённого обучения и обслуживания за единым интерфейсом. MinT масштабируется по трём направлениям: расширение на очень большие модели (вплоть до 1 триллиона параметров), сжатие размера адаптеров (менее 1% от базовой модели), и распределённое управление миллионами адаптеров в каталоге. Система достигает значительного ускорения (в 18 раз для плотных моделей и в 8.7 раза для MoE архитектур) благодаря оптимизированной работе с памятью и эффективной упаковке тензоров.'}, 'en': {'title': 'Efficiently Scaling Low-Rank Adaptation with MinT', 'desc': 'MinT is a managed infrastructure system designed for efficient Low-Rank Adaptation (LoRA) training and serving. It allows multiple trained policies to be created without needing to store full model checkpoints, instead keeping the base model in memory and using lightweight adapter revisions. This system scales across large model architectures and reduces storage needs while managing distributed training and serving seamlessly. MinT can handle millions of LoRA policies, optimizing both training and serving processes for large-scale AI applications.'}, 'zh': {'title': '高效管理低秩适应的基础设施系统', 'desc': 'MinT是一个管理基础设施系统，旨在高效地进行低秩适应训练和服务。它通过保持基础模型常驻并移动轻量级适配器修订，来减少存储需求并支持大规模模型架构。MinT在多个维度上进行扩展，包括支持超过1万亿参数的训练和服务。该系统能够管理百万级的LoRA策略目录，同时在共享的1T级基础模型上训练和服务选定的适配器修订。'}}}, {'id': 'https://huggingface.co/papers/2605.10616', 'title': 'MulTaBench: Benchmarking Multimodal Tabular Learning with Text and Image', 'url': 'https://huggingface.co/papers/2605.10616', 'abstract': 'Abstract Multimodal tabular learning benchmarks reveal that task-specific embedding tuning improves performance over frozen pretrained embeddings, particularly when modalities provide complementary predictive signals.  AI-generated summary Tabular Foundation Models have recently established the state of the art in supervised tabular learning, by leveraging pretraining to learn generalizable representations of numerical and categorical structured data. However, they lack native support for unstructured modalities such as text and image, and rely on frozen, pretrained embeddings to process them. On established Multimodal Tabular Learning benchmarks, we show that tuning the embeddings to the task improves performance. Existing benchmarks, however, often focus on the mere co-occurrence of modalities; this leads to high variance across datasets and masks the benefits of task-specific tuning. To address this gap, we introduce MulTaBench, a benchmark of 40 datasets, split equally between image-tabular and text-tabular tasks. We focus on predictive tasks where the modalities provide complementary predictive signal, and where generic embeddings lose critical information, necessitating Target-Aware Representations that are aligned with the task. Our experimental results demonstrate that the gains from target-aware representation tuning generalize across both text and image modalities, several tabular learners, encoder scales, and embedding dimensions. MulTaBench constitutes the largest image-tabular benchmarking effort to date, spanning high-impact domains such as healthcare and e-commerce. It is designed to enable the research of novel architectures which incorporate joint modeling and target-aware representations, paving the way for the development of novel Multimodal Tabular Foundation Models.', 'score': 108, 'issue_id': 2225, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'a779882e73bf73b0', 'authors': ['Alan Arazi', 'Eilam Shapira', 'Shoham Grunblat', 'Mor Ventura', 'Elad Hoffer', 'Gioia Blayer', 'David Holzmüller', 'Lennart Purucker', 'Gaël Varoquaux', 'Frank Hutter', 'Roi Reichart'], 'affiliations': ['ELLIS Institute Tübingen', 'NVIDIA', 'Prior Labs', 'Probabl', 'SODA Team, INRIA Saclay, Palaiseau', 'Technion Israel Institute of Technology', 'University of Freiburg'], 'pdf_title_img': 'assets/pdf/title_img/2605.10616.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🔀', 'ru': {'title': 'Адаптивные представления для мультимодального табулярного обучения', 'desc': 'Статья исследует обучение мультимодальных табулярных моделей, которые объединяют структурированные данные с неструктурированной информацией (текст и изображения). Авторы показывают, что настройка встраиваний (embeddings) под конкретную задачу значительно улучшает производительность по сравнению с использованием замороженных предтренированных представлений. Они предлагают новый бенчмарк MulTaBench из 40 датасетов, специально отобранных так, чтобы модальности предоставляли дополнительные предсказательные сигналы. Результаты демонстрируют, что целевые встраивания (target-aware representations), выравненные с задачей, приносят преимущества в различных модальностях, архитектурах и масштабах моделей.'}, 'en': {'title': 'Enhancing Multimodal Learning with Task-Specific Embedding Tuning', 'desc': 'This paper discusses the improvement of performance in multimodal tabular learning by tuning task-specific embeddings instead of using frozen pretrained ones. It highlights the limitations of existing benchmarks that often overlook the complementary nature of different data modalities, such as text and images. The authors introduce MulTaBench, a new benchmark consisting of 40 datasets that focus on predictive tasks where these modalities work together. Their findings show that tuning embeddings to be more aligned with specific tasks leads to better performance across various models and domains.'}, 'zh': {'title': '任务特定调优提升多模态学习性能', 'desc': '这篇论文探讨了多模态表格学习中的任务特定嵌入调优对性能的提升。研究表明，当不同模态提供互补的预测信号时，调优嵌入比使用冻结的预训练嵌入效果更好。为了验证这一点，作者提出了MulTaBench，这是一个包含40个数据集的基准测试，专注于图像-表格和文本-表格任务。实验结果显示，目标感知表示的调优在文本和图像模态中均能有效提升性能，推动了多模态表格基础模型的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.13724', 'title': 'AnyFlow: Any-Step Video Diffusion Model with On-Policy Flow Map Distillation', 'url': 'https://huggingface.co/papers/2605.13724', 'abstract': 'Abstract AnyFlow introduces a novel any-step video diffusion distillation framework that improves upon consistency distillation by optimizing full ODE sampling trajectories through flow-map transition learning and backward simulation techniques.  AI-generated summary Few-step video generation has been significantly advanced by consistency distillation. However, the performance of consistency-distilled models often degrades as more sampling steps are allocated at test time, limiting their effectiveness for any-step video diffusion. This limitation arises because consistency distillation replaces the original probability-flow ODE trajectory with a consistency-sampling trajectory, weakening the desirable test-time scaling behavior of ODE sampling. To address this limitation, we introduce AnyFlow, the first any-step video diffusion distillation framework based on flow maps. Instead of distilling a model for only a few fixed sampling steps, AnyFlow optimizes the full ODE sampling trajectory. To this end, we shift the distillation target from endpoint consistency mapping (z_{t}rightarrow z_{0}) to flow-map transition learning (z_{t}rightarrow z_{r}) over arbitrary time intervals. We further propose Flow Map Backward Simulation, which decomposes a full Euler rollout into shortcut flow-map transitions, enabling efficient on-policy distillation that reduces test-time errors (i.e., discretization error in few-step sampling and exposure bias in causal generation). Extensive experiments across both bidirectional and causal architectures, at scales ranging from 1.3B to 14B parameters, demonstrate that AnyFlow achieves performance matches or surpasses consistency-based counterparts in the few-step regime, while scaling with sampling step budgets.', 'score': 73, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '2c762411e08f1c5f', 'authors': ['Yuchao Gu', 'Guian Fang', 'Yuxin Jiang', 'Weijia Mao', 'Song Han', 'Han Cai', 'Mike Zheng Shou'], 'affiliations': ['MIT', 'NVIDIA', 'Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.13724.jpg', 'data': {'categories': ['#video', '#architecture', '#training', '#diffusion', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Гибкая дистилляция видео-диффузии для произвольного числа шагов семплирования', 'desc': 'AnyFlow представляет новую систему дистилляции видео-диффузии, которая улучшает консистентную дистилляцию путём оптимизации полных траекторий ODE-семплирования. Вместо того чтобы заменять исходную траекторию вероятностного потока ODE на траекторию консистентного семплирования, метод переходит от отображения конечной точки к обучению переходов потоковых отображений на произвольных временных интервалах. Предложенная техника Flow Map Backward Simulation разбивает полный Euler rollout на переходы потоковых отображений, что позволяет эффективно выполнять дистилляцию и снижать ошибки как в режиме малого числа шагов, так и в каузальной генерации. Экспериментальные результаты показывают, что AnyFlow превосходит или сравним с методами на основе консистентности при масштабировании по количеству шагов семплирования.'}, 'en': {'title': 'AnyFlow: Revolutionizing Video Generation with Flexible Sampling Trajectories', 'desc': 'AnyFlow is a new framework for video generation that enhances the process of consistency distillation by focusing on optimizing the entire trajectory of sampling using flow-map techniques. Traditional consistency distillation struggles when more sampling steps are used, leading to poorer performance, especially in video diffusion tasks. AnyFlow addresses this by shifting the focus from just endpoint consistency to learning transitions over any time interval, allowing for more flexible and effective video generation. The framework also introduces a method called Flow Map Backward Simulation, which helps reduce errors during testing, resulting in improved performance across various model sizes and architectures.'}, 'zh': {'title': 'AnyFlow：优化任意步视频生成的创新框架', 'desc': 'AnyFlow是一种新颖的任意步视频扩散蒸馏框架，旨在通过流图过渡学习和反向模拟技术优化完整的ODE采样轨迹，从而改进一致性蒸馏。传统的一致性蒸馏在测试时分配更多采样步骤时，模型性能往往会下降，限制了其在任意步视频扩散中的有效性。为了解决这一问题，AnyFlow将蒸馏目标从端点一致性映射转变为流图过渡学习，优化了完整的ODE采样轨迹。通过广泛的实验，AnyFlow在多个架构上表现出色，能够在少步采样的情况下与一致性基础的模型相匹配或超越，同时在采样步骤预算上具有良好的扩展性。'}}}, {'id': 'https://huggingface.co/papers/2605.13831', 'title': 'Training Long-Context Vision-Language Models Effectively with Generalization Beyond 128K Context', 'url': 'https://huggingface.co/papers/2605.13831', 'abstract': "Abstract Long-context continued pre-training enhances vision-language models' ability to handle extended documents while maintaining performance across diverse contexts through strategic data mixture design.  AI-generated summary Long-context modeling is becoming a core capability of modern large vision-language models (LVLMs), enabling sustained context management across long-document understanding, video analysis, and multi-turn tool use in agentic workflows. Yet practical training recipes remain insufficiently explored, particularly for designing and balancing long-context data mixtures. In this work, we present a systematic study of long-context continued pre-training for LVLMs, extending a 7B model from 32K to 128K context with extensive ablations on long-document data. We first show that long-document VQA is substantially more effective than OCR transcription. Building on this observation, our ablations further yield three key findings: i) for sequence-length distribution, balanced data outperforms target-length-focused data (e.g., 128K), suggesting that long-context ability requires generalizable key-information retrieval across various lengths and positions; ii) retrieval remains the primary bottleneck, favoring retrieval-heavy mixtures with modest reasoning data for task diversity; and iii) pure long-document VQA largely preserves short-context capabilities, suggesting that instruction-formatted long data reduces the need for short-data mixing. Based on these findings, we introduce MMProLong, obtained by long-context continued pre-training from Qwen2.5-VL-7B with only a 5B-token budget. MMProLong improves long-document VQA scores by 7.1% and maintains strong performance at 256K and 512K contexts beyond its 128K training window, without additional training. It further generalizes to webpage-based multimodal needle retrieval, long-context vision-text compression, and long-video understanding without task-specific supervision. Overall, our study establishes a practical LongPT recipe and an empirical foundation for advancing long-context vision-language models.", 'score': 70, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '549149b48f01777f', 'authors': ['Zhaowei Wang', 'Lishu Luo', 'Haodong Duan', 'Weiwei Liu', 'Sijin Wu', 'Ji Luo', 'Shen Yan', 'Shuai Peng', 'Sihang Yuan', 'Chaoyi Huang', 'Yi Lin', 'Yangqiu Song'], 'affiliations': ['ByteDance', 'HKUST'], 'pdf_title_img': 'assets/pdf/title_img/2605.13831.jpg', 'data': {'categories': ['#video', '#multimodal', '#training', '#benchmark', '#long_context', '#optimization'], 'emoji': '📄', 'ru': {'title': 'Сбалансированное дообучение для долгоконтекстного понимания документов в мультимодальных моделях', 'desc': 'В работе исследуется долгоконтекстное дообучение большых мультимодальных моделей (LVLM), которое позволяет им обрабатывать длинные документы и видео, сохраняя производительность на других задачах. Авторы провели систематическое исследование эффективности различных смесей данных при расширении контекста с 32K до 128K токенов, обнаружив, что сбалансированное распределение длин последовательностей и задачи на базе документов работают лучше, чем узкоспециализированные данные. На основе полученных выводов создана модель MMProLong, которая требует только 5B токенов дообучения и демонстрирует улучшение на 7.1% на задачах с длинными документами, одновременно сохраняя коротко-контекстные способности. Представленный подход обобщается на различные задачи долгоконтекстного понимания без дополнительной настройки модели.'}, 'en': {'title': 'Enhancing Vision-Language Models with Long-Context Pre-Training', 'desc': "This paper explores how long-context continued pre-training can improve vision-language models (LVLMs) for better handling of extended documents. The authors demonstrate that using balanced data mixtures during training enhances the model's ability to retrieve key information across various lengths and positions. They introduce a new model, MMProLong, which shows significant improvements in long-document visual question answering (VQA) and maintains strong performance even with longer contexts. The findings suggest that effective long-context modeling can be achieved without sacrificing short-context capabilities, paving the way for more versatile LVLM applications."}, 'zh': {'title': '长上下文预训练提升视觉-语言模型能力', 'desc': '本文研究了长上下文的持续预训练如何增强视觉-语言模型（LVLMs）处理长文档的能力。通过系统的实验，我们发现平衡的数据分布在长文档视觉问答（VQA）中表现优于专注于目标长度的数据。我们的研究还表明，检索能力是主要瓶颈，建议使用重检索的数据混合以提高任务多样性。此外，长文档VQA在保持短上下文能力的同时，减少了对短数据混合的需求。'}}}, {'id': 'https://huggingface.co/papers/2605.12411', 'title': 'Predicting Decisions of AI Agents from Limited Interaction through Text-Tabular Modeling', 'url': 'https://huggingface.co/papers/2605.12411', 'abstract': "Abstract AI agents can predict counterpart decisions in negotiation games by combining tabular features with LLM-based text representations and hidden states from a frozen observer model, outperforming direct prompting methods.  AI-generated summary AI agents negotiate and transact in natural language with unfamiliar counterparts: a buyer bot facing an unknown seller, or a procurement assistant negotiating with a supplier. In such interactions, the counterpart's LLM, prompts, control logic, and rule-based fallbacks are hidden, while each decision can have monetary consequences. We ask whether an agent can predict an unfamiliar counterpart's next decision from a few interactions. To avoid real-world logging confounds, we study this problem in controlled bargaining and negotiation games, formulating it as target-adaptive text-tabular prediction: each decision point is a table row combining structured game state, offer history, and dialogue, while K previous games of the same target agent, i.e., the counterpart being modeled, are provided in the prompt as labeled adaptation examples. Our model is built on a tabular foundation model that represents rows using game-state features and LLM-based text representations, and adds LLM-as-Observer as an additional representation: a small frozen LLM reads the decision-time state and dialogue; its answer is discarded, and its hidden state becomes a decision-oriented feature, making the LLM an encoder rather than a direct few-shot predictor. Training on 13 frontier-LLM agents and testing on 91 held-out scaffolded agents, the full model outperforms direct LLM-as-Predictor prompting and game+text features baselines. Within this tabular model, Observer features contribute beyond the other feature schemes: at K=16, they improve response-prediction AUC by about 4 points across both tasks and reduce bargaining offer-prediction error by 14%. These results show that formulating counterpart prediction as a target-adaptive text-tabular task enables effective adaptation, and that hidden LLM representations expose decision-relevant signals that direct prompting does not surface.", 'score': 42, 'issue_id': 2224, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '84524ca3df2b8f25', 'authors': ['Eilam Shapira', 'Moshe Tennenholtz', 'Roi Reichart'], 'affiliations': ['Technion Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.12411.jpg', 'data': {'categories': ['#training', '#multimodal', '#agents'], 'emoji': '🤝', 'ru': {'title': 'Скрытые состояния LLM как признаки для предсказания решений переговорщика', 'desc': 'В статье предлагается метод предсказания решений противника в переговорных играх путём объединения табличных признаков, текстовых представлений на основе LLM и скрытых состояний замороженной модели-наблюдателя. Задача формулируется как адаптивное предсказание на тексто-табличных данных, где агент должен предугадать действие неизвестного противника на основе нескольких предыдущих взаимодействий. Ключевая идея заключается в использовании LLM в качестве кодировщика признаков: модель читает состояние игры и диалог, а её скрытые состояния становятся информативными признаками для предсказания. Экспериментальные результаты показывают, что предложенный подход значительно превосходит прямое использование LLM в режиме few-shot, улучшая качество предсказания на 4 пункта по AUC и снижая ошибку прогнозирования предложений на 14%.'}, 'en': {'title': 'Predicting Negotiation Outcomes with Adaptive AI Insights', 'desc': 'This paper presents a method for AI agents to predict the decisions of their negotiation counterparts by integrating structured data with language model (LLM) representations. The approach formulates the prediction task as a target-adaptive text-tabular problem, where each decision point is represented as a combination of game state, offer history, and dialogue. By utilizing a frozen observer model, the AI captures hidden states that enhance decision-making without directly predicting outcomes from the LLM. The results demonstrate that this method significantly improves prediction accuracy compared to traditional prompting techniques, highlighting the value of hidden representations in understanding counterpart behavior.'}, 'zh': {'title': '通过目标自适应预测谈判对手决策', 'desc': '这篇论文探讨了如何通过结合表格特征和基于大语言模型（LLM）的文本表示，来预测谈判游戏中对手的决策。研究表明，使用冻结的观察者模型的隐藏状态可以显著提高预测准确性，超越直接提示的方法。模型通过将游戏状态、历史报价和对话信息整合为表格行，进行目标自适应的文本-表格预测。结果显示，隐藏的LLM表示能够揭示决策相关的信号，从而有效提升预测性能。'}}}, {'id': 'https://huggingface.co/papers/2605.13565', 'title': 'Qwen-Image-VAE-2.0 Technical Report', 'url': 'https://huggingface.co/papers/2605.13565', 'abstract': 'Abstract Qwen-Image-VAE-2.0 is a high-compression Variational Autoencoder suite that improves reconstruction fidelity and diffusability through enhanced architecture, large-scale training, and semantic alignment strategies.  AI-generated summary We present Qwen-Image-VAE-2.0, a suite of high-compression Variational Autoencoders (VAEs) that achieve significant advances in both reconstruction fidelity and diffusability. To address the reconstruction bottlenecks of high compression, we adopt an improved architecture featuring Global Skip Connections (GSC) and expanded latent channels. Moreover, we scale training to billions of images and incorporate a synthetic rendering engine to improve performance in text-rich scenarios. To tackle the convergence challenges of high-dimensional latent space, we implement an enhanced semantic alignment strategy to make the latent space highly amenable to diffusion modeling. To optimize computational efficiency, we leverage an asymmetric and attention-free encoder-decoder backbone to minimize encoding overhead. We present a comprehensive evaluation of Qwen-Image-VAE-2.0 on public reconstruction benchmarks. To evaluate performance in text-rich scenarios, we propose OmniDoc-TokenBench, a new benchmark comprising a diverse collection of real-world documents coupled with specialized OCR-based evaluation metrics. Qwen-Image-VAE-2.0 achieves state-of-the-art reconstruction performance, demonstrating exceptional capabilities in both general domains and text-rich scenarios at high compression ratio. Furthermore, downstream DiT experiments reveal our models possess superior diffusability, significantly accelerating convergence compared to existing high-compression baselines. These establish Qwen-Image-VAE-2.0 as a leading model with high compression, superior reconstruction, and exceptional diffusability.', 'score': 37, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '98b07c2f539a8330', 'authors': ['Zekai Zhang', 'Deqing Li', 'Kuan Cao', 'Yujia Wu', 'Chenfei Wu', 'Yu Wu', 'Liang Peng', 'Hao Meng', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Kun Yan', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiao Xu', 'Xiaoyue Chen', 'Yan Shu', 'Yanran Zhang', 'Yilei Chen', 'Yixian Xu', 'Yuxiang Chen', 'Zhendong Wang', 'Zihao Liu', 'Zikai Zhou', 'Yiliang Gu', 'Yi Wang', 'Xiaoxiao Xu', 'Lin Qu'], 'affiliations': ['Alibaba', 'Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2605.13565.jpg', 'data': {'categories': ['#multimodal', '#training', '#benchmark', '#dataset', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Высокосжатый VAE с идеальной реконструкцией для диффузионных моделей', 'desc': 'Представлен Qwen-Image-VAE-2.0 — набор вариационных автокодировщиков высокой степени сжатия, которые значительно улучшают качество реконструкции изображений и пригодность для диффузионных моделей. Архитектура использует глобальные пропускные соединения и расширенные каналы латентного пространства, обучена на миллиардах изображений с применением синтетической генерации для работы с текстом. Для решения проблем сходимости в высокомерном латентном пространстве применена улучшенная стратегия семантического выравнивания, делающая модель оптимальной для диффузионного моделирования. Модель демонстрирует передовые результаты на бенчмарках реконструкции и значительно ускоряет обучение последующих диффузионных моделей.'}, 'en': {'title': 'Revolutionizing Image Compression with Qwen-Image-VAE-2.0', 'desc': 'Qwen-Image-VAE-2.0 is a cutting-edge Variational Autoencoder designed for high compression while maintaining excellent image quality and adaptability. It features an advanced architecture with Global Skip Connections and expanded latent channels to enhance reconstruction fidelity. The model is trained on billions of images and utilizes a synthetic rendering engine to excel in scenarios with rich text. Additionally, it employs a semantic alignment strategy to improve the performance of diffusion modeling, making it a top choice for high-compression image tasks.'}, 'zh': {'title': '高压缩与卓越重建的完美结合', 'desc': 'Qwen-Image-VAE-2.0 是一种高压缩的变分自编码器（VAE）套件，旨在提高重建精度和可扩散性。该模型采用了改进的架构，包括全局跳跃连接（GSC）和扩展的潜在通道，以解决高压缩带来的重建瓶颈。通过对数十亿张图像进行大规模训练，并结合合成渲染引擎，模型在文本丰富的场景中表现出色。此外，Qwen-Image-VAE-2.0 在高维潜在空间的收敛性方面也进行了增强的语义对齐策略优化，展现了卓越的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.13062', 'title': 'Edit-Compass & EditReward-Compass: A Unified Benchmark for Image Editing and Reward Modeling', 'url': 'https://huggingface.co/papers/2605.13062', 'abstract': 'Abstract Recent image editing models have achieved remarkable progress in instruction following, multimodal understanding, and complex visual editing. However, existing benchmarks often fail to faithfully reflect human judgment, especially for strong frontier models, due to limited task difficulty and coarse-grained evaluation protocols. In parallel, reward models have become increasingly important for RL-based image editing optimization, yet existing reward model benchmarks still rely on unrealistic evaluation settings that deviate from practical RL scenarios. These limitations hinder reliable assessment of both image editing models and reward models. To address these challenges, we introduce Edit-Compass and EditReward-Compass, a unified evaluation suite for image editing and reward modeling. Edit-Compass contains 2,388 carefully annotated instances spanning six progressively challenging task categories, covering capabilities such as world knowledge reasoning, visual reasoning, and multi-image editing. Beyond broad task coverage, Edit-Compass adopts a fine-grained multidimensional evaluation framework based on structured reasoning and carefully designed scoring rubrics. In parallel, EditReward-Compass contains 2,251 preference pairs that simulate realistic reward modeling scenarios during RL optimization.  AI-generated summary Recent image editing models have achieved remarkable progress in instruction following, multimodal understanding, and complex visual editing. However, existing benchmarks often fail to faithfully reflect human judgment, especially for strong frontier models, due to limited task difficulty and coarse-grained evaluation protocols. In parallel, reward models have become increasingly important for RL-based image editing optimization, yet existing reward model benchmarks still rely on unrealistic evaluation settings that deviate from practical RL scenarios. These limitations hinder reliable assessment of both image editing models and reward models. To address these challenges, we introduce Edit-Compass and EditReward-Compass, a unified evaluation suite for image editing and reward modeling. Edit-Compass contains 2,388 carefully annotated instances spanning six progressively challenging task categories, covering capabilities such as world knowledge reasoning, visual reasoning, and multi-image editing. Beyond broad task coverage, Edit-Compass adopts a fine-grained multidimensional evaluation framework based on structured reasoning and carefully designed scoring rubrics. In parallel, EditReward-Compass contains 2,251 preference pairs that simulate realistic reward modeling scenarios during RL optimization.', 'score': 30, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '832056324fd0747a', 'authors': ['Xuehai Bai', 'Yang Shi', 'Yi-Fan Zhang', 'Xuanyu Zhu', 'Yuran Wang', 'Yifan Dai', 'Xinyu Liu', 'Yiyan Ji', 'Xiaoling Gu', 'Yuanxing Zhang'], 'affiliations': ['CASIA', 'HDU', 'Kling Team', 'PKU'], 'pdf_title_img': 'assets/pdf/title_img/2605.13062.jpg', 'data': {'categories': ['#cv', '#rl', '#multimodal', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Компасы оценки: точные бенчмарки для редактирования изображений и reward моделей', 'desc': 'Работа представляет новый набор бенчмарков для оценки моделей редактирования изображений и reward моделей. Существующие бенчмарки недостаточно отражают человеческие суждения из-за низкой сложности задач и грубых протоколов оценки, что особенно актуально для продвинутых моделей. Авторы предлагают Edit-Compass с 2388 аннотированными примерами, охватывающими шесть категорий возрастающей сложности, включая рассуждения о знаниях мира и многоизображенческое редактирование. EditReward-Compass дополняет набор 2251 парой предпочтений, моделирующей реалистичные сценарии обучения с подкреплением при оптимизации моделей редактирования.'}, 'en': {'title': 'Enhancing Image Editing Evaluation with Edit-Compass and EditReward-Compass', 'desc': 'This paper presents Edit-Compass and EditReward-Compass, two new evaluation frameworks designed to improve the assessment of image editing models and reward models in reinforcement learning (RL). Edit-Compass includes 2,388 annotated instances across six challenging task categories, focusing on skills like world knowledge reasoning and visual reasoning. It employs a fine-grained evaluation approach with structured reasoning and detailed scoring rubrics to better reflect human judgment. EditReward-Compass complements this by providing 2,251 preference pairs that create realistic scenarios for evaluating reward models during RL optimization.'}, 'zh': {'title': '统一评估图像编辑与奖励建模的解决方案', 'desc': '最近的图像编辑模型在遵循指令、多模态理解和复杂视觉编辑方面取得了显著进展。然而，现有的基准测试往往无法真实反映人类的判断，尤其是对于强大的前沿模型，因为任务难度有限且评估协议粗糙。同时，奖励模型在基于强化学习的图像编辑优化中变得越来越重要，但现有的奖励模型基准仍依赖于不切实际的评估设置，偏离了实际的强化学习场景。为了解决这些挑战，我们引入了Edit-Compass和EditReward-Compass，这是一个统一的图像编辑和奖励建模评估套件。'}}}, {'id': 'https://huggingface.co/papers/2605.12587', 'title': 'TrackCraft3R: Repurposing Video Diffusion Transformers for Dense 3D Tracking', 'url': 'https://huggingface.co/papers/2605.12587', 'abstract': "Abstract TrackCraft3R enables efficient dense 3D tracking from monocular video by adapting video diffusion transformers to follow physical points across frames using dual-latent representation and temporal RoPE alignment.  AI-generated summary Dense 3D tracking from monocular video is fundamental to dynamic scene understanding. While recent 3D foundation models provide reliable per-frame geometry, recovering object motion in this geometry remains challenging and benefits from strong motion priors learned from real-world videos. Existing 3D trackers either follow iterative paradigms trained from scratch on synthetic data or fine-tune 3D reconstruction models learned from static multi-view images, both lacking real-world motion priors. Pre-trained video diffusion transformers (video DiTs) offer rich spatio-temporal priors from internet-scale videos, making them a promising foundation for 3D tracking. However, their frame-anchored formulation, which generates each frame's content, is fundamentally mismatched with reference-anchored dense 3D tracking, which must follow the same physical points from a reference frame across time. We present TrackCraft3R, the first method to repurpose a video DiT as a feed-forward dense 3D tracker. Given a monocular video and its frame-anchored reconstruction pointmap, TrackCraft3R predicts a reference-anchored tracking pointmap that follows every pixel of the first frame across time in a single forward pass, along with its visibility. We achieve this through two designs: (i) a dual-latent representation that uses per-frame geometry latents and reference-anchored track latents as dense queries, and (ii) temporal RoPE alignment, which specifies the target timestamp of each track latent. Together, these designs convert the per-frame generative paradigm of video DiTs into a reference-anchored tracking formulation with LoRA fine-tuning. TrackCraft3R achieves state-of-the-art performance on standard sparse and dense 3D tracking benchmarks, while running 1.3x faster and using 4.6x less peak memory than the strongest prior method. We further demonstrate robustness to large motions and long videos.", 'score': 27, 'issue_id': 2224, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'ff89796dade244c4', 'authors': ['Jisu Nam', 'Jahyeok Koo', 'Soowon Son', 'Jaewoo Jung', 'Honggyu An', 'Junhwa Hur', 'Seungryong Kim'], 'affiliations': ['Google DeepMind', 'KAIST AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.12587.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#video', '#3d', '#transfer_learning', '#benchmark', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Отслеживание физических точек в видео через переадаптацию видеодиффузионных моделей', 'desc': 'TrackCraft3R — это метод для отслеживания плотных трёхмерных точек в монокулярном видео, который переадаптирует предобученные видеодиффузионные трансформеры для отслеживания физических точек через кадры. Метод использует двойное латентное представление, разделяя геометрические латенты кадров и якорированные относительно эталонного кадра латенты трехмерных треков. Временное выравнивание с помощью RoPE позволяет указать целевой временной момент для каждого трека, преобразуя порождающую парадигму видео-трансформеров в формулировку отслеживания, привязанную к эталонному кадру. Метод достигает лучших результатов на стандартных бенчмарках при этом работая быстрее и потребляя меньше памяти, чем предыдущие подходы.'}, 'en': {'title': 'Efficient Dense 3D Tracking with TrackCraft3R', 'desc': 'TrackCraft3R is a novel method for dense 3D tracking from monocular video, utilizing video diffusion transformers to effectively follow physical points over time. It introduces a dual-latent representation that combines per-frame geometry with reference-anchored tracking, allowing for accurate motion recovery. The method employs temporal RoPE alignment to ensure that tracking points correspond to the same physical locations across frames. TrackCraft3R outperforms existing techniques in both speed and memory efficiency while maintaining robustness in dynamic scenes.'}, 'zh': {'title': 'TrackCraft3R：高效的单目视频密集 3D 跟踪', 'desc': 'TrackCraft3R 是一种高效的单目视频密集 3D 跟踪方法，它通过适应视频扩散变换器来跟踪物理点。该方法使用双潜在表示和时间 RoPE 对齐，能够在单次前向传递中预测参考锚定的跟踪点图。与传统的 3D 跟踪器不同，TrackCraft3R 利用预训练的视频扩散变换器，提供丰富的时空先验，从而提高了跟踪精度。该方法在标准的稀疏和密集 3D 跟踪基准上表现出色，速度更快且内存占用更少。'}}}, {'id': 'https://huggingface.co/papers/2605.13511', 'title': 'Many-Shot CoT-ICL: Making In-Context Learning Truly Learn', 'url': 'https://huggingface.co/papers/2605.13511', 'abstract': 'Abstract Many-shot in-context learning for reasoning tasks exhibits different scaling behaviors than non-reasoning tasks, with demonstration ordering and selection significantly impacting performance.  AI-generated summary In-context learning (ICL) adapts large language models (LLMs) to new tasks by conditioning on demonstrations in the prompt without parameter updates. With long-context models, many-shot ICL can use dozens to hundreds of examples and achieve performance comparable to fine-tuning, yet current understanding of its scaling behavior is largely derived from non-reasoning tasks. We study many-shot chain-of-thought in-context learning (CoT-ICL) for reasoning and show that standard many-shot rules do not transfer. Across non-reasoning and reasoning-oriented LLMs and across non-reasoning and reasoning tasks, we find: (i) a setting-dependent scaling effect, where increasing the number of CoT demonstrations is unstable for non-reasoning LLMs and benefits mainly reasoning-oriented LLMs; (ii) similarity-based retrieval helps on non-reasoning tasks but fails on reasoning, since semantic similarity poorly predicts procedural (i.e., CoT) compatibility; and (iii) an order-scaling effect, where performance variance grows with more CoT demonstrations. We interpret these behaviors by viewing many-shot CoT-ICL as in-context test-time learning rather than scaled pattern matching, and suggests two principles: (i) demonstrations should be easy for the target model to understand, and (ii) they should be ordered to support a smooth conceptual progression. Guided by the principle, we propose Curvilinear Demonstration Selection (CDS), a simple ordering method that yields up to a 5.42 percentage-point gain on geometry with 64 demonstrations. Overall, our results reframe the long context window from a retrieval buffer into a structured curriculum for in-context test-time learning.', 'score': 26, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'e8e9cb85a3cae972', 'authors': ['Tsz Ting Chung', 'Lemao Liu', 'Mo Yu', 'Dit-Yan Yeung'], 'affiliations': ['Fudan Univeristy', 'Hong Kong University of Science and Technology', 'Wechat AI, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.13511.jpg', 'data': {'categories': ['#reasoning', '#long_context'], 'emoji': '📚', 'ru': {'title': 'Долгий контекст как структурированный учебный план для рассуждений', 'desc': 'Исследование показывает, что многошотовое обучение в контексте с цепочкой мыслей (CoT) для задач рассуждения ведет себя иначе, чем для обычных задач. Авторы обнаруживают, что увеличение количества примеров-демонстраций нестабильно для моделей без специализации на рассуждении, а подобие семантики плохо предсказывает совместимость процедурных цепочек мыслей. Они интерпретируют многошотовое CoT-ICL как обучение во время тестирования в контексте, а не как масштабирование распознавания паттернов. Предложенный метод Curvilinear Demonstration Selection упорядочивает примеры для плавного концептуального прогресса, достигая улучшения на 5,42 процентных пункта.'}, 'en': {'title': 'Optimizing Demonstration Order for Better Reasoning in Many-Shot Learning', 'desc': 'This paper explores how many-shot in-context learning (ICL) behaves differently for reasoning tasks compared to non-reasoning tasks. It highlights that the order and selection of demonstrations significantly affect the performance of large language models (LLMs) when solving reasoning problems. The authors introduce the concept of Curvilinear Demonstration Selection (CDS) to improve the effectiveness of demonstrations by ensuring they are easy to understand and ordered logically. Their findings suggest that many-shot CoT-ICL should be viewed as a structured learning process rather than just a method of pattern matching.'}, 'zh': {'title': '推理任务中的上下文学习新视角', 'desc': '本文研究了在推理任务中，许多示例的上下文学习（CoT-ICL）与非推理任务的不同扩展行为。我们发现，示例的顺序和选择对性能有显著影响，尤其是在推理导向的语言模型中。通过引入曲线演示选择（CDS）方法，我们能够提高模型在几何任务上的表现。总体而言，我们的研究将长上下文窗口重新定义为一种结构化的课程，以支持上下文测试时学习。'}}}, {'id': 'https://huggingface.co/papers/2605.13757', 'title': 'FrameSkip: Learning from Fewer but More Informative Frames in VLA Training', 'url': 'https://huggingface.co/papers/2605.13757', 'abstract': 'Abstract FrameSkip is a data-layer frame selection method that improves VLA policy training by prioritizing high-importance frames based on action variation and visual-coherence metrics.  AI-generated summary Vision-Language-Action (VLA) policies are commonly trained from dense robot demonstration trajectories, often collected through teleoperation, by sampling every recorded frame as if it provided equally useful supervision. We argue that this convention creates a temporal supervision imbalance: long low-change segments dominate the training stream, while manipulation-critical transitions such as alignment, contact, grasping, and release appear only sparsely. We introduce FrameSkip, a data-layer frame selection framework that scores trajectory frames using action variation, visual-action coherence, task-progress priors, and gripper-transition preservation, then remaps training samples toward high-importance frames under a target retention ratio. Because FrameSkip operates only in the dataloader, it leaves the VLA architecture, action head, training objective, and inference procedure unchanged. Across RoboCasa-GR1, SimplerEnv, and LIBERO, FrameSkip improves the success-retention trade-off over full-frame training and simpler frame selection variants, achieving a macro-average success rate of 76.15% across the three benchmarks compared with 66.50% for full-frame training while using a compressed trajectory view that retains 20% of unique frames in the main setting.', 'score': 19, 'issue_id': 2225, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'a83be557551d7050', 'authors': ['Bin Yu', 'Shijie Lian', 'Xiaopeng Lin', 'Zhaolong Shen', 'Yuliang Wei', 'Changti Wu', 'Hang Yuan', 'Haishan Liu', 'Bailing Wang', 'Cong Huang', 'Kai Chen'], 'affiliations': ['Beihang University', 'DeepCybo', 'East China Normal University', 'Harbin Institute of Technology', 'Huazhong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Zhongguancun Academy', 'Zhongguancun Institute of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2605.13757.jpg', 'data': {'categories': ['#benchmark', '#training', '#robotics', '#data', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Умный отбор кадров для эффективного обучения роботов', 'desc': 'В работе предлагается FrameSkip — метод отбора кадров на уровне данных, который улучшает обучение VLA-политик для роботов путём приоритизации важных кадров на основе метрик вариации действий и визуальной согласованности. Авторы указывают на проблему временного дисбаланса в обучении: длинные сегменты с минимальными изменениями доминируют в потоке обучения, тогда как критические для манипуляции переходы (выравнивание, контакт, захват, отпускание) встречаются редко. FrameSkip оценивает кадры траектории по вариации действий, согласованности визуально-действий и другим метрикам, затем переносит обучающие образцы к высоковажным кадрам, сохраняя целевую долю. Метод работает только на уровне загрузки данных, не изменяя архитектуру VLA, функцию потерь и процедуру инференса, что достигает среднего успеха 76.15% при использовании всего 20% уникальных кадров.'}, 'en': {'title': 'Prioritizing Key Frames for Better Robot Learning', 'desc': 'FrameSkip is a novel method designed to enhance Vision-Language-Action (VLA) policy training by selecting the most important frames from robot demonstration data. It addresses the issue of temporal supervision imbalance, where less critical frames dominate the training data, leading to suboptimal learning. By scoring frames based on action variation and visual coherence, FrameSkip prioritizes key moments in the trajectory, ensuring that critical actions like grasping and releasing are better represented. This approach significantly improves training efficiency and success rates without altering the underlying VLA architecture or training objectives.'}, 'zh': {'title': '优先选择重要帧，提升训练效果', 'desc': 'FrameSkip是一种数据层帧选择方法，通过基于动作变化和视觉一致性指标优先选择重要帧，从而改善视觉-语言-动作（VLA）策略的训练。传统上，VLA策略的训练依赖于密集的机器人演示轨迹，通常每帧都被视为同等重要，这导致了时间监督的不平衡。FrameSkip通过对轨迹帧进行评分，选择高重要性的帧进行训练，从而提高了成功率。实验结果表明，FrameSkip在多个基准测试中显著提高了成功率，相比于全帧训练，成功率从66.50%提升至76.15%。'}}}, {'id': 'https://huggingface.co/papers/2605.11550', 'title': 'The DAWN of World-Action Interactive Models', 'url': 'https://huggingface.co/papers/2605.11550', 'abstract': 'Abstract World-Action Interactive Models (WAIMs) jointly model scene evolution and actions through recursive refinement, enabling effective long-horizon planning in autonomous driving scenarios.  AI-generated summary A plausible scene evolution depends on the maneuver being considered, while a good maneuver depends on how the scene may evolve. Existing World Action Models (WAMs) largely miss this reciprocity, treating world prediction and action generation as either isolated parallel branches or rigid predict-then-plan pipelines. We formalize this perspective as World-Action Interactive Models (WAIMs), and instantiate it in autonomous driving with DAWN (Denoising Actions and World iNteractive model), a simple yet strong latent generative baseline. DAWN operates in a compact semantic latent space and couples a World Predictor with a World-Conditioned Action Denoiser: the predicted world hypothesis conditions action denoising, while the denoised action hypothesis is fed back to update the world prediction, so that both are recursively refined during inference. Rather than eliminating test-time world evolution altogether or rolling out the full future in pixel space, DAWN performs a short explicit latent rollout that is sufficient to support long-horizon trajectory generation in complex interactive scenes. Experiments show that DAWN achieves strong planning performance and favorable safety-related results across multiple autonomous driving benchmarks. More broadly, our results suggest that interactive world-action generation is a principled path toward truly actionable world models.', 'score': 15, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'c677562d46670597', 'authors': ['Hongbo Lu', 'Liang Yao', 'Chenghao He', 'Haoyu Wang', 'Xiang Gu', 'Xianfei Li', 'Wenlong Liao', 'Tao He', 'Pai Peng'], 'affiliations': ['COWARobot Co. Ltd', 'Hohai University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11550.jpg', 'data': {'categories': ['#architecture', '#training', '#robotics', '#benchmark', '#agents', '#diffusion', '#reasoning'], 'emoji': '🚗', 'ru': {'title': 'Взаимное уточнение предсказаний мира и действий для планирования в автономном вождении', 'desc': 'В работе представлены World-Action Interactive Models (WAIMs) — модели, которые совместно моделируют эволюцию сцены и действия агента через итеративное уточнение. Авторы показывают, что предсказание динамики мира и генерация действений тесно связаны: будущее развитие сцены зависит от выбранного маневра, а качество маневра зависит от того, как может развиваться сцена. Они предлагают DAWN — модель, работающая в компактном семантическом латентном пространстве, которая рекурсивно уточняет предсказания мира и действий на основе друг друга во время вывода. Экспериментальные результаты на бенчмарках автономного вождения демонстрируют эффективность подхода для долгоафоризмного планирования в сложных интерактивных сценах.'}, 'en': {'title': 'Revolutionizing Autonomous Driving with Interactive World-Action Models', 'desc': 'The paper introduces World-Action Interactive Models (WAIMs), which enhance long-term planning in autonomous driving by integrating scene evolution and action generation. Unlike traditional models that treat these processes separately, WAIMs allow for a reciprocal relationship where the predicted world influences action decisions and vice versa. The proposed DAWN model operates in a compact latent space, using a World Predictor and a World-Conditioned Action Denoiser to iteratively refine both world predictions and action plans. Experimental results demonstrate that DAWN excels in planning performance and safety across various autonomous driving scenarios, highlighting the importance of interactive world-action generation.'}, 'zh': {'title': '交互式世界-动作生成：自动驾驶的新路径', 'desc': '世界-动作交互模型（WAIMs）通过递归细化共同建模场景演变和动作，从而在自动驾驶场景中实现有效的长时间规划。好的场景演变依赖于所考虑的操作，而好的操作又依赖于场景的演变。现有的世界动作模型（WAMs）往往忽视这种相互关系，将世界预测和动作生成视为孤立的平行分支或僵化的预测-再规划管道。我们提出了世界-动作交互模型（WAIMs），并在自动驾驶中实现了DAWN（去噪动作和世界交互模型），通过在紧凑的语义潜在空间中操作，结合世界预测器和世界条件动作去噪器，实现了强大的规划性能和安全性。'}}}, {'id': 'https://huggingface.co/papers/2605.12964', 'title': 'Asymmetric Flow Models', 'url': 'https://huggingface.co/papers/2605.12964', 'abstract': "Abstract Asymmetric Flow Modeling enables efficient high-dimensional flow-based generation by restricting noise prediction to low-rank subspaces while maintaining full-dimensional data prediction, achieving superior performance in pixel-space text-to-image generation through effective fine-tuning from latent models.  AI-generated summary Flow-based generation in high-dimensional spaces is difficult because velocity prediction requires modeling high-dimensional noise, even when data has strong low-rank structure. We present Asymmetric Flow Modeling (AsymFlow), a rank-asymmetric velocity parameterization that restricts noise prediction to a low-rank subspace while keeping data prediction full-dimensional. From this asymmetric prediction, AsymFlow analytically recovers the full-dimensional velocity without changing the network architecture or training/sampling procedures. On ImageNet 256times256, AsymFlow achieves a leading 1.57 FID, outperforming prior DiT/JiT-like pixel diffusion models by a large margin. AsymFlow also provides the first-ever route for finetuning pretrained latent flow models into pixel-space models: aligning the low-rank pixel subspace to the latent space gives a seamless initialization that preserves the latent model's high-level semantics and structure, so finetuning mainly improves low-level mismatches rather than relearning pixel generation. We show that the pixel AsymFlow model finetuned from FLUX.2 klein 9B establishes a new state of the art for pixel-space text-to-image generation, beating its latent base on HPSv3, DPG-Bench, and GenEval while qualitatively showing substantially improved visual realism.", 'score': 12, 'issue_id': 2223, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'f761eff420bf84b3', 'authors': ['Hansheng Chen', 'Jan Ackermann', 'Minseo Kim', 'Gordon Wetzstein', 'Leonidas Guibas'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12964.jpg', 'data': {'categories': ['#cv', '#architecture', '#training', '#diffusion', '#transfer_learning', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Асимметричное моделирование потоков: от латентного к пиксельному пространству', 'desc': 'В статье представлен метод Asymmetric Flow Modeling (AsymFlow), который улучшает генерацию на основе потоков в высокоразмерных пространствах путём асимметричной параметризации скорости. Ключевая идея заключается в ограничении предсказания шума низкоранговым подпространством при сохранении полномерного предсказания данных, что позволяет аналитически восстановить полнопространственную скорость без изменения архитектуры сети. Метод достигает выдающихся результатов на ImageNet 256×256 с FID 1.57, превосходя предыдущие диффузионные модели пиксельного пространства. Кроме того, AsymFlow впервые предоставляет способ адаптации предобученных латентных моделей потоков в пиксельное пространство путём выравнивания низкорангового подпространства пикселей с латентным пространством.'}, 'en': {'title': 'Revolutionizing Text-to-Image Generation with Asymmetric Flow Modeling', 'desc': 'Asymmetric Flow Modeling (AsymFlow) is a novel approach in machine learning that enhances flow-based generation in high-dimensional spaces by focusing on low-rank subspaces for noise prediction. This method allows for efficient modeling of complex data while maintaining the ability to predict full-dimensional outputs. AsymFlow achieves superior performance in pixel-space text-to-image generation by fine-tuning pretrained latent models, ensuring that high-level semantics are preserved during the process. The results demonstrate a significant improvement in visual realism and a new state of the art in performance metrics like FID on benchmark datasets.'}, 'zh': {'title': '不对称流建模：高效的高维生成新方法', 'desc': '不对称流建模（Asymmetric Flow Modeling）通过将噪声预测限制在低秩子空间，同时保持全维数据预测，实现了高维流生成的高效性。这种方法在像素空间的文本到图像生成中表现出色，尤其是在对预训练潜在模型进行有效微调时。AsymFlow采用了一种秩不对称的速度参数化，能够在不改变网络架构或训练/采样过程的情况下，分析性地恢复全维速度。实验结果表明，AsymFlow在ImageNet数据集上取得了领先的1.57 FID，显著超越了之前的像素扩散模型。'}}}, {'id': 'https://huggingface.co/papers/2605.12004', 'title': 'Learning Agentic Policy from Action Guidance', 'url': 'https://huggingface.co/papers/2605.12004', 'abstract': 'Abstract Agentic reinforcement learning for large language models leverages action data from human interactions as reference guidance to improve exploration and reduce dependence on costly supervised fine-tuning.  AI-generated summary Agentic reinforcement learning (RL) for Large Language Models (LLMs) critically depends on the exploration capability of the base policy, as training signals emerge only within its in-capability region. For tasks where the base policy cannot reach reward states, additional training or external guidance is needed to recover effective learning signals. Rather than relying on costly iterative supervised fine tuning (SFT), we exploit the abundant action data generated in everyday human interactions. We propose ActGuide-RL, which injects action data as plan-style reference guidance, enabling the agentic policy to overcome reachability barriers to reward states. Guided and unguided rollouts are then jointly optimized via mixed-policy training, internalizing the exploration gains back into the unguided policy. Motivated by a theoretical and empirical analysis of the benefit-risk trade-off, we adopt a minimal intervention principle that invokes guidance only as an adaptive fallback, matching task difficulty while minimizing off-policy risk. On search-agent benchmarks, ActGuide-RL substantially improves over zero RL (+10.7 pp on GAIA and +19 pp on XBench with Qwen3-4B), and performs on par with the SFT+RL pipeline without any cold start. This suggests a new paradigm for agentic RL that reduces the reliance on heavy SFT data by using scalable action guidance instead.', 'score': 11, 'issue_id': 2225, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': '105359e2316457cc', 'authors': ['Yuxiang Ji', 'Zengbin Wang', 'Yong Wang', 'Shidong Yang', 'Ziyu Ma', 'Guanhua Chen', 'Zonghua Sun', 'Liaoni Wu', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group', 'Southern University of Science and Technology', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.12004.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#optimization', '#reasoning', '#alignment'], 'emoji': '🧭', 'ru': {'title': 'Направленное исследование для агентных LLM через справочные действия вместо дорогостоящей дообучения', 'desc': 'В статье предложен метод ActGuide-RL для обучения с подкреплением больших языковых моделей, который использует данные о действиях из человеческих взаимодействий как справочное руководство для исследования пространства состояний. Основная идея заключается в том, что базовая политика часто не может достичь состояний с вознаграждением, поэтому авторы инъецируют данные о действиях в виде плана-ориентира, позволяя агентной политике преодолеть барьеры достижимости. Метод использует совместную оптимизацию направленных и ненаправленных траекторий через смешанное обучение политик, что позволяет интернализировать выигрыши в исследовании обратно в базовую политику. Экспериментальные результаты показывают существенное улучшение над обучением без подкрепления и сопоставимость с дорогостоящим конвейером SFT+RL без холодного старта.'}, 'en': {'title': 'Empowering RL with Human Action Guidance', 'desc': 'This paper introduces ActGuide-RL, a novel approach in agentic reinforcement learning (RL) for large language models (LLMs). It utilizes action data from human interactions to enhance exploration and reduce the need for expensive supervised fine-tuning (SFT). The method allows the RL agent to overcome limitations in reaching reward states by using this action data as guidance. The results show significant improvements in performance on benchmark tasks, indicating a shift towards more efficient training methods in RL.'}, 'zh': {'title': '利用行动数据提升代理强化学习的探索能力', 'desc': '本文提出了一种名为ActGuide-RL的代理强化学习方法，旨在利用人类交互生成的行动数据来改善大语言模型的探索能力。该方法通过将行动数据作为参考指导，帮助代理政策克服到达奖励状态的障碍，从而减少对昂贵的监督微调的依赖。通过混合策略训练，指导和未指导的回合共同优化，使得未指导政策能够内化探索收益。实验结果表明，ActGuide-RL在多个基准测试中显著优于传统的零强化学习方法，展示了使用可扩展的行动指导的新范式。'}}}, {'id': 'https://huggingface.co/papers/2605.09942', 'title': 'HAGE: Harnessing Agentic Memory via RL-Driven Weighted Graph Evolution', 'url': 'https://huggingface.co/papers/2605.09942', 'abstract': 'Abstract HAGE introduces a weighted multi-relational memory framework that enables query-conditioned traversal over unified relational memory graphs, improving long-horizon reasoning accuracy through adaptive memory retrieval and reinforcement learning-based optimization.  AI-generated summary Memory retrieval in agentic large language model (LLM) systems is often treated as a static lookup problem, relying on flat vector search or fixed binary relational graphs. However, fixed graph structures cannot capture the varying strength, confidence, and query-dependent relevance of relationships between events. In this paper, we propose HAGE, a weighted multi-relational memory framework that reconceptualizes retrieval as sequential, query-conditioned traversal over a unified relational memory graph. Memory is organized as relation-specific graph views over shared memory nodes, where each edge is associated with a trainable relation feature vector encoding multiple relational signals. Given a query, an LLM-based classifier identifies the relational intent, and a routing network dynamically modulates the corresponding dimensions of the edge embedding. Traversal scores are computed via a learned combination of semantic similarity and these query-conditioned edge representations. This allows memory traversal to prioritize high-utility relational paths while softly suppressing noisy or weakly relevant connections. Beyond adaptive traversal, HAGE further introduces a reinforcement learning-based training framework that jointly optimizes routing behavior and edge representations using downstream tasks. Finally, empirical results demonstrate improved long-horizon reasoning accuracy and a favorable accuracy-efficiency trade-off compared to state-of-the-art agentic memory systems. Our code is available at https://github.com/FredJiang0324/HAGE_MVPReview.', 'score': 9, 'issue_id': 2224, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '9eaa5a260614cc89', 'authors': ['Dongming Jiang', 'Yi Li', 'Guanpeng Li', 'Qiannan Li', 'Bingzhe Li'], 'affiliations': ['Department of Computer Science, The University of Texas at Dallas', 'Department of Electrical and Computer Engineering, University of Florida', 'University of California, Davis'], 'pdf_title_img': 'assets/pdf/title_img/2605.09942.jpg', 'data': {'categories': ['#open_source', '#optimization', '#agents', '#graphs', '#rl', '#reasoning', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Адаптивная траверсификация многоуровневого графа памяти через условное маршрутизирование', 'desc': 'В статье предлагается HAGE — фреймворк взвешенной мультиреляционной памяти для агентов на основе больших языковых моделей. Вместо статического поиска по плоским векторам, система организует память как граф отношений, где каждое ребро имеет обучаемый вектор признаков, кодирующий различные сигналы отношений. При поступлении запроса классификатор определяет реляционное намерение, а маршрутизирующая сеть динамически модулирует соответствующие размерности представления ребер. Система обучается с помощью обучения с подкреплением, оптимизируя поведение маршрутизации и представления граней на основе задач, что улучшает точность рассуждений на длинных горизонтах.'}, 'en': {'title': 'HAGE: Dynamic Memory Retrieval for Enhanced Reasoning in LLMs', 'desc': 'The paper presents HAGE, a novel framework for enhancing memory retrieval in large language models (LLMs) by using a weighted multi-relational memory approach. Unlike traditional methods that rely on static graph structures, HAGE allows for dynamic, query-conditioned traversal of a unified relational memory graph, improving the accuracy of long-horizon reasoning. It incorporates a routing network that adjusts the relevance of relationships based on the query, enabling the model to prioritize important connections while minimizing noise. Additionally, HAGE employs reinforcement learning to optimize both the routing behavior and the representations of the memory edges, leading to better performance in reasoning tasks.'}, 'zh': {'title': 'HAGE：提升长时间推理的智能记忆框架', 'desc': 'HAGE提出了一种加权多关系记忆框架，能够在统一的关系记忆图上进行查询条件的遍历，从而提高长时间推理的准确性。该框架通过自适应记忆检索和基于强化学习的优化来实现，克服了传统静态查找方法的局限性。HAGE将记忆组织为特定关系的图视图，并通过可训练的关系特征向量来编码多种关系信号。实验结果表明，HAGE在长时间推理准确性和效率上优于现有的记忆系统。'}}}, {'id': 'https://huggingface.co/papers/2605.12975', 'title': 'Retrieval is Cheap, Show Me the Code: Executable Multi-Hop Reasoning for Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2605.12975', 'abstract': 'Abstract Multi-hop question answering is reformulated as program synthesis and execution, enabling structured reasoning, deterministic feedback, and improved performance over existing retrieval-augmented generation approaches.  AI-generated summary Retrieval-Augmented Generation (RAG) has become a standard approach for knowledge-intensive question answering, but existing systems remain brittle on multi-hop questions, where solving the task requires chaining multiple retrieval and reasoning steps. Key challenges are that current methods represent reasoning through free-form natural language, where intermediate states are implicit, retrieval queries can drift from intended entities, and errors are detected by the same model that produces them making self-reflection an unreliable, ungrounded signal.   We observe that multi-hop question answering is a typical form of step-by-step computation, and that this structured process aligns closely with how code-specialized language models are trained to operate. Motivated by this, we introduce \\pyrag, a framework that reformulates multi-hop RAG as program synthesis and execution. Instead of free-form reasoning trajectories, \\pyrag represents the reasoning process as an executable Python program over retrieval and QA tools, exposing intermediate states as variables, producing deterministic feedback through execution, and yielding an inspectable trace of the entire reasoning process. This formulation further enables compiler-grounded self-repair and execution-driven adaptive retrieval without any additional training.   Experiments on five QA benchmarks (PopQA, HotpotQA, 2WikiMultihopQA, MuSiQue, and Bamboogle) show that \\pyrag consistently outperforms strong baselines under both training-free and RL-trained settings, with especially large gains on compositional multi-hop datasets. Our code, data and models are publicly available at https://github.com/GasolSun36/PyRAG.', 'score': 7, 'issue_id': 2224, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '10b5339fdfad737f', 'authors': ['Jiashuo Sun', 'Jimeng Shi', 'Yixuan Xie', 'Saizhuo Wang', 'Jash Rajesh Parekh', 'Pengcheng Jiang', 'Zhiyi Shi', 'Jiajun Fan', 'Qinglong Zheng', 'Peiran Li', 'Shaowen Wang', 'Ge Liu', 'Jiawei Han'], 'affiliations': ['Hong Kong University of Science and Technology', 'Texas A&M University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.12975.jpg', 'data': {'categories': ['#open_source', '#rag', '#benchmark', '#reasoning', '#plp'], 'emoji': '🐍', 'ru': {'title': 'Рассуждения как исполняемый код вместо свободного текста', 'desc': 'В статье переформулируется задача многошагового поиска ответов как синтез и выполнение программ. Вместо свободного текста рассуждения представляются как исполняемый Python-код с явными промежуточными состояниями, что обеспечивает детерминированную обратную связь. Такой подход решает проблемы классических RAG-систем, где ошибки в цепочке рассуждений накапливаются и сложно отследить. Экспериментальные результаты показывают значительное улучшение производительности на пяти бенчмарках вопросно-ответных систем по сравнению с существующими методами.'}, 'en': {'title': 'Structured Reasoning for Multi-Hop QA with Pyrag', 'desc': 'This paper presents a new approach to multi-hop question answering by treating it as a program synthesis and execution problem. The proposed framework, called \textit{pyrag}, allows for structured reasoning by representing the reasoning process as an executable Python program, which improves the reliability of intermediate states and feedback. By using this method, the system can adaptively retrieve information and self-repair without needing additional training. Experiments show that \textit{pyrag} significantly outperforms existing methods, especially on complex multi-hop questions.'}, 'zh': {'title': '多跳问答的新方法：程序合成与执行', 'desc': '多跳问题回答被重新定义为程序合成和执行，这使得结构化推理成为可能，并且提供了确定性的反馈，从而在性能上超越了现有的检索增强生成方法。现有的知识密集型问答系统在处理多跳问题时表现不佳，因为这些问题需要多个检索和推理步骤的链式解决。当前方法通过自由形式的自然语言表示推理过程，导致中间状态隐含且检索查询可能偏离预期实体。我们提出的 \x10pyrag\x11 框架将多跳 RAG 重新构建为可执行的 Python 程序，提供了可检查的推理过程跟踪，并支持自我修复和自适应检索。'}}}, {'id': 'https://huggingface.co/papers/2605.11363', 'title': 'PresentAgent-2: Towards Generalist Multimodal Presentation Agents', 'url': 'https://huggingface.co/papers/2605.11363', 'abstract': 'Abstract PresentAgent-2 is an agentic framework that generates presentation videos from user queries by conducting research, creating multimodal slides, and producing interactive content across single, discussion, and interaction modes.  AI-generated summary Presentation generation is moving beyond static slide creation toward end-to-end presentation video generation with research grounding, multimodal media, and interactive delivery. We introduce PresentAgent-2, an agentic framework for generating presentation videos from user queries. Given an open-ended user query and a selected presentation mode, PresentAgent-2 first summarizes the query into a focused topic and performs deep research over presentation-friendly sources to collect multimodal resources, including relevant text, images, GIFs, and videos. It then constructs presentation slides, generates mode-specific scripts, and composes slides, audio, and dynamic media into a complete presentation video. PresentAgent-2 supports three independent presentation modes within a unified framework: Single Presentation, which generates a single-speaker narrated presentation video; Discussion, which creates a multi-speaker presentation with structured speaker roles, such as for asking guiding questions, explaining concepts, clarifying details, and summarizing key points; and Interaction, which independently supports answering audience questions grounded in the generated slides, scripts, retrieved evidence, and presentation context. To evaluate these capabilities, we build a multimodal presentation benchmark covering single presentation, discussion, and interaction scenarios, with task-specific evaluation criteria for content quality, media relevance, dynamic media use, dialogue naturalness, and interaction grounding. Overall, PresentAgent-2 extends presentation generation from document-dependent slide creation to query-driven, research-grounded presentation video generation with multimodal media, dialogue, and interaction. Code: https://github.com/AIGeeksGroup/PresentAgent-2. Website: https://aigeeksgroup.github.io/PresentAgent-2.', 'score': 7, 'issue_id': 2223, 'pub_date': '2026-05-12', 'pub_date_card': {'ru': '12 мая', 'en': 'May 12', 'zh': '5月12日'}, 'hash': 'd17e1d3694108cee', 'authors': ['Wei Wu', 'Ziyang Xu', 'Zeyu Zhang', 'Yang Zhao', 'Hao Tang'], 'affiliations': ['La Trobe University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2605.11363.jpg', 'data': {'categories': ['#open_source', '#video', '#multimodal', '#benchmark', '#agents'], 'emoji': '🎬', 'ru': {'title': 'От запроса к видеопрезентации: исследование, создание слайдов и интерактивное взаимодействие', 'desc': 'PresentAgent-2 — это агентский фреймворк, который преобразует пользовательские запросы в полноценные презентационные видео, проводя исследование источников и собирая мультимодальные ресурсы. Система создаёт слайды, генерирует скрипты и синтезирует аудио для трёх режимов: однодикторная презентация, дискуссия с несколькими спикерами и интерактивный режим ответов на вопросы аудитории. Фреймворк использует глубокий поиск информации для сбора текста, изображений, GIF-анимаций и видео, которые автоматически интегрируются в динамический видеоконтент. Разработана специализированная бенчмарк-база для оценки качества контента, релевантности медиа и естественности диалога в каждом из режимов презентации.'}, 'en': {'title': 'Transforming Queries into Engaging Presentation Videos', 'desc': 'PresentAgent-2 is an advanced framework designed to create presentation videos based on user queries. It begins by summarizing the query and conducting in-depth research to gather various multimedia resources like text, images, and videos. The framework supports three distinct presentation modes: Single Presentation, Discussion, and Interaction, each tailored for different presentation styles and audience engagement. By integrating these elements, PresentAgent-2 transforms traditional slide creation into a dynamic, interactive video generation process that enhances the overall presentation experience.'}, 'zh': {'title': '智能演示视频生成的未来', 'desc': 'PresentAgent-2 是一个智能框架，可以根据用户的查询生成演示视频。它通过对相关资料进行深入研究，收集多模态资源（如文本、图片、GIF 和视频），并构建演示幻灯片。该框架支持三种演示模式：单人演示、讨论和互动，能够生成不同风格的演示内容。通过建立多模态演示基准，PresentAgent-2 提供了高质量的内容和自然的对话交互。'}}}, {'id': 'https://huggingface.co/papers/2605.13775', 'title': 'RoboEvolve: Co-Evolving Planner-Simulator for Robotic Manipulation with Limited Data', 'url': 'https://huggingface.co/papers/2605.13775', 'abstract': 'Abstract RoboEvolve combines vision-language and video generation models in a co-evolutionary framework to enable scalable robotic manipulation with improved data efficiency and continuous learning capabilities.  AI-generated summary The scalability of robotic manipulation is fundamentally bottlenecked by the scarcity of task-aligned physical interaction data. While vision-language models (VLMs) and video generation models (VGMs) hold promise for autonomous data synthesis, they suffer from semantic-spatial misalignment and physical hallucinations, respectively. To bridge this gap, we introduce RoboEvolve, a novel framework that couples a VLM planner and a VGM simulator into a mutually reinforcing co-evolutionary loop. Operating purely on unlabeled seed images, RoboEvolve leverages a cognitive-inspired dual-phase mechanism: (i) daytime exploration fosters physically grounded behavioral discovery through a semantic-controlled multi-granular reward, and (ii) nighttime consolidation mines "near-miss" failures to stab
