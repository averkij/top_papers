    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.27377', 'title': 'DanceOPD: On-Policy Generative Field Distillation', 'url': 'https://huggingface.co/papers/2606.27377', 'abstract': 'Abstract A novel on-policy generative field distillation framework called DanceOPD is proposed to unify text-to-image generation, local editing, and global editing capabilities in flow-matching models through capability-specific routing and velocity-based training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern image generation demands a single model that unifies diverse capabilities, including text-to-image (T2I), local editing, and global editing. However, these capabilities are rarely naturally aligned and often conflict. For instance, editing tends to degrade T2I performance, while global and local editing interfere with each other. Consequently, effectively composing these capabilities has become a central challenge for image generation model training. To tackle this, we introduce DanceOPD, an on-policy generative field distillation framework for flow-matching models that routes each sample to one capability field, queries one low-noise student-induced state, and trains with a simple velocity MSE objective. With each capability source defined as a velocity field over the shared flow state space, the student learns from fields queried on its own rollout states to compose expert capabilities. This formulation also absorbs operator-defined fields such as classifier-free guidance. Comprehensive experiments on T2I, editing, realism-field absorption, and CFG absorption show that our approach improves multi-capability composition, strengthening target capabilities while preserving anchor generation quality. We believe this work establishes a practical route for generative field distillation in flow-matching models.', 'score': 10, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '84f437fdb7b3927e', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для генерации и редактирования изображений через дистилляцию полей скоростей', 'desc': 'В работе предлагается фреймворк DanceOPD для унификации нескольких возможностей генерации изображений в моделях flow-matching: генерация по тексту, локальное и глобальное редактирование. Ключевая идея заключается в маршрутизации выборок к специализированным полям скоростей, где каждое поле представляет отдельную способность модели. Студенческая модель обучается на состояниях собственных траекторий, извлекая знания из экспертных полей и композируя их способности через простой MSE-объектив для скорости. Подход демонстрирует улучшение композиции многоуровневых способностей, сохраняя качество базовой генерации при укреплении целевых задач редактирования.'}, 'en': {'title': 'Unifying Image Generation with DanceOPD: A New Era of Multi-Capability Models', 'desc': 'The paper introduces DanceOPD, a new framework designed to enhance image generation by integrating text-to-image generation, local editing, and global editing into a single model. It addresses the common issue where these capabilities conflict, leading to degraded performance when combined. By using an on-policy generative field distillation approach, DanceOPD routes samples to specific capability fields and employs a velocity-based training method to improve learning. The results demonstrate that this framework effectively strengthens the desired capabilities while maintaining high-quality image generation.'}, 'zh': {'title': '统一多种能力的生成框架', 'desc': '本文提出了一种新颖的在线生成场蒸馏框架，称为DanceOPD，旨在统一文本到图像生成、局部编辑和全局编辑能力。该框架通过能力特定的路由和基于速度的训练，解决了这些能力之间的冲突和不对齐问题。DanceOPD通过将每个样本路由到一个能力场，并使用简单的速度均方误差目标进行训练，从而有效地组合这些能力。实验结果表明，该方法在多能力组合方面表现出色，同时保持了生成质量。'}}}, {'id': 'https://huggingface.co/papers/2606.27313', 'title': 'ViQ: Text-Aligned Visual Quantized Representations at Any Resolution', 'url': 'https://huggingface.co/papers/2606.27313', 'abstract': 'Abstract ViQ presents a visual quantization framework that balances semantic richness and detail preservation in discrete representations, enabling efficient multimodal training with native-resolution inputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A unified representation for text and vision is a natural pursuit, as it enables simpler multimodal modeling and more efficient training. However, representing images as discrete signals in the same way as text inevitably introduces severe information loss. Existing work struggles to balance low-level details and high-level semantics in discrete representations: reconstruction-oriented representations often lack semantic information, whereas semantically stronger features typically suffer from severe loss of detail. We present ViQ, a Visual Quantized Representations framework, which is designed to balance semantics and details in discrete representations while supporting inputs at native resolutions, thereby enabling it to serve as a unified and general discrete representation for arbitrary visual inputs. Our approach structures quantization learning into two stages: text-aligned pre-training and feature discretization. With text-aligned pre-training, we enhance the visual encoder semantic-rich supervision from the pretrained language model and enable it to process native-resolution visual inputs. During discretization, we propose a proximal representation learning strategy to progressively compact the feature space, along with a position-aware head-wise quantization mechanism that enables flexible processing of arbitrary resolutions. Extensive experiments on multimodal tasks demonstrate that ViQ achieves competitive performance compared to state-of-the-art multimodal vision encoders with continuous and high-dimensional visual features, while maintaining high precision in low-level reconstruction. We also show that multimodal training with visual quantized representations largely improves efficiency, yielding up to 20\\%-70\\% acceleration with different base LLMs and training recipes.', 'score': 5, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1d5ef747b7990827', 'authors': ['Xumin Yu', 'Zuyan Liu', 'Zhenyu Yang', 'Yuhao Dong', 'Shengsheng Qian', 'Jiwen Lu', 'Han Hu', 'Yongming Rao'], 'affiliations': ['Nanyang Technological University', 'Tencent HY Vision Team', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27313.jpg', 'data': {'categories': ['#training', '#multimodal', '#inference', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Дискретные визуальные представления, которые понимают смысл и видят детали', 'desc': 'ViQ представляет новый подход к визуальной квантизации, который балансирует между сохранением высокоуровневой семантики и низкоуровневых деталей в дискретных представлениях изображений. Фреймворк использует двухэтапное обучение: сначала предобучение с выравниванием по текстовым моделям, затем дискретизация признаков с использованием проксимальной стратегии обучения. Метод поддерживает входные данные в исходном разрешении и позволяет эффективнее обучать мультимодальные модели. Экспериментальные результаты показывают, что ViQ достигает конкурентной производительности при одновременном ускорении обучения на 20-70% в сравнении с существующими подходами.'}, 'en': {'title': 'Balancing Semantics and Details in Visual Quantization', 'desc': 'ViQ introduces a visual quantization framework that effectively balances the preservation of low-level details and high-level semantic information in discrete representations. This framework allows for efficient multimodal training using native-resolution inputs, which is crucial for integrating text and vision. The approach involves a two-stage process: first, enhancing the visual encoder with semantic supervision from a pretrained language model, and second, applying a proximal representation learning strategy for feature discretization. Experimental results show that ViQ not only competes well with existing multimodal vision encoders but also significantly accelerates training efficiency by 20%-70%.'}, 'zh': {'title': '平衡语义与细节的视觉量化框架', 'desc': 'ViQ是一种视觉量化框架，旨在平衡离散表示中的语义丰富性和细节保留，从而实现高效的多模态训练。该框架支持原生分辨率输入，能够作为统一的离散表示处理任意视觉输入。ViQ通过文本对齐的预训练和特征离散化两个阶段来结构化量化学习，增强视觉编码器的语义监督。实验表明，ViQ在多模态任务中表现出色，相比于现有的多模态视觉编码器，具有更高的效率和精度。'}}}, {'id': 'https://huggingface.co/papers/2606.26907', 'title': 'Qwen-Image-Agent: Bridging the Context Gap in Real-World Image Generation', 'url': 'https://huggingface.co/papers/2606.26907', 'abstract': 'Abstract A unified agentic framework called Qwen-Image-Agent is proposed to address the context gap in text-to-image generation by progressively constructing complete generation context through planning, reasoning, searching, and memory mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While text-to-image (T2I) models have achieved remarkable progress, they struggle with real-world requests that are often underspecified, implicit, or dependent on up-to-date knowledge. We identify this challenge as the Context Gap: the mismatch between the user context and the sufficient generation context for T2I models. To bridge this gap, we propose Qwen-Image-Agent, a unified agentic framework that integrates plan, reason, search, memory and feedback in a context-centric manner. Qwen-Image-Agent treats user input as partial context and progressively constructs the generation context through Context-Aware Planning and Context Grounding. Specifically, Context-Aware Planning identifies missing context and plans how it should be acquired and used, while Context Grounding gathers this context from reason, search, memory, and feedback. To evaluate agentic image generation, we further introduce Image Agent Bench (IA-Bench), a benchmark covering four core image agent capabilities: Plan, Reason, Search, and Memory. Experiments on IA-Bench, Mindbench and WISE-Verified show that Qwen-Image-Agent outperforms strong baselines and achieves state-of-the-art performance.', 'score': 5, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '230aa6b52d1269cf', 'authors': ['Zekai Zhang', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Kun Yan', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiaoyue Chen', 'Xiao Xu', 'Yan Shu', 'Yanran Zhang', 'Yixian Xu', 'Yuxiang Chen', 'Zhendong Wang', 'Zihao Liu', 'Zikai Zhou', 'Huishuai Zhang', 'Dongyan Zhao', 'Chenfei Wu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.26907.jpg', 'data': {'categories': ['#agents', '#multimodal', '#dataset', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Агентский подход для устранения дефицита контекста в генерации изображений', 'desc': 'В статье предлагается агентский фреймворк Qwen-Image-Agent для решения проблемы дефицита контекста при генерации изображений по текстовому описанию. Система прогрессивно строит полный контекст для генерации через механизмы планирования, рассуждения, поиска информации и памяти. Фреймворк использует Context-Aware Planning для выявления недостающего контекста и Context Grounding для его сбора из различных источников. Авторы представляют новый бенчмарк Image Agent Bench для оценки способностей агента в планировании, рассуждении, поиске и использовании памяти, достигая лучших результатов на нескольких датасетах.'}, 'en': {'title': 'Bridging the Context Gap in Text-to-Image Generation', 'desc': "The paper introduces Qwen-Image-Agent, a new framework designed to improve text-to-image generation by addressing the 'Context Gap' problem. This gap occurs when the user’s input lacks sufficient detail for the model to generate accurate images. Qwen-Image-Agent uses a combination of planning, reasoning, searching, and memory to progressively build the necessary context for image generation. The framework is evaluated using a new benchmark called Image Agent Bench, demonstrating superior performance compared to existing models."}, 'zh': {'title': '弥补文本到图像生成的上下文差距', 'desc': '本文提出了一种统一的智能框架Qwen-Image-Agent，旨在解决文本到图像生成中的上下文差距问题。该框架通过规划、推理、搜索和记忆机制逐步构建完整的生成上下文。Qwen-Image-Agent将用户输入视为部分上下文，并通过上下文感知规划和上下文基础构建生成上下文。实验结果表明，Qwen-Image-Agent在多个基准测试中表现优异，达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.26790', 'title': 'OPID: On-Policy Skill Distillation for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.26790', 'abstract': 'Abstract On-policy skill distillation framework extracts dense hindsight supervision from completed trajectories to improve language agent training efficiency and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Outcome-based reinforcement learning provides a stable optimization backbone for language agents, but its sparse trajectory-level rewards provide little guidance on which intermediate decisions should be reinforced or suppressed. On-policy self-distillation offers dense token-level supervision, yet existing skill-conditioned variants often rely on external skill memories or retrieved privileged context, which are costly to maintain and can be mismatched with the state distribution induced by the current policy in multi-turn interaction. We propose OPID (On-Policy Skill Distillation), a framework that extracts skill supervision directly from completed on-policy trajectories. OPID represents trajectory hindsight as hierarchical skills: episode-level skills capture global workflows or failure-avoidance rules, while step-level skills capture local decision knowledge at critical timesteps. A critical-first routing mechanism uses step-level skills when critical decisions are identified and falls back to episode-level skills as default guidance otherwise. The selected skill is injected into the interaction history, allowing the old policy to re-score the same sampled response under both original and skill-augmented contexts. The resulting log-probability shift yields a token-level self-distillation advantage, which is combined with the outcome advantage for policy optimization. OPID thus preserves RL as the primary training objective while introducing dense, distribution-matched hindsight supervision. Experiments on ALFWorld, WebShop and Search-based QA demonstrate that OPID generally improves agent performance, sample efficiency, and robustness over outcome-only RL and existing skill-distillation baselines. Our code is available at https://github.com/jinyangwu/OPID/tree/main.', 'score': 3, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '831489f021ac14f0', 'authors': ['Shuo Yang', 'Jinyang Wu', 'Zhengxi Lu', 'Yuhao Shen', 'Fan Zhang', 'Lang Feng', 'Shuai Zhang', 'Haoran Luo', 'Zheng Lian', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Nanyang Technological University', 'The Chinese University of Hong Kong', 'Tongji University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26790.jpg', 'data': {'categories': ['#rl', '#agents', '#training'], 'emoji': '🎯', 'ru': {'title': 'Иерархическая самодистилляция для эффективного обучения языковых агентов', 'desc': 'В статье предложен фреймворк OPID для обучения языковых агентов, который извлекает плотное супервизирующее сигнал из завершённых траекторий с помощью самодистилляции. Авторы представляют hindsight траектории в виде иерархических навыков: навыки уровня эпизода захватывают глобальные рабочие процессы, а навыки уровня шага фокусируются на критических решениях. Специальный механизм маршрутизации выбирает между этими уровнями и вводит выбранный навык в контекст взаимодействия для переоценки ответов под исходным и дополненным контекстом. Фреймворк сочетает полученные логарифмические сдвиги вероятностей с функциями RL-награды, обеспечивая плотное распределение-согласованное супервизирование при сохранении RL как основного тренировочного объектива.'}, 'en': {'title': 'Enhancing Language Agent Training with On-Policy Skill Distillation', 'desc': 'The paper introduces OPID (On-Policy Skill Distillation), a framework designed to enhance the training of language agents by utilizing dense hindsight supervision from completed trajectories. It addresses the limitations of traditional reinforcement learning, which often relies on sparse rewards, by providing both episode-level and step-level skills for better decision-making guidance. OPID employs a critical-first routing mechanism to dynamically select the appropriate skill based on the importance of decisions, allowing for more effective learning. Experimental results show that OPID significantly improves agent performance, sample efficiency, and robustness compared to existing methods.'}, 'zh': {'title': '提升语言代理训练效率的技能蒸馏框架', 'desc': '本论文提出了一种名为OPID（On-Policy Skill Distillation）的框架，旨在通过从完成的策略轨迹中提取技能监督来提高语言代理的训练效率和性能。该框架将轨迹的回顾表示为层次化技能，包括全局工作流程的情节级技能和关键时刻的局部决策知识的步骤级技能。OPID采用关键优先路由机制，在识别到关键决策时使用步骤级技能，否则使用情节级技能作为默认指导。通过这种方式，OPID在保持强化学习作为主要训练目标的同时，引入了密集且与分布匹配的回顾监督。'}}}, {'id': 'https://huggingface.co/papers/2606.26217', 'title': 'Fast LeWorldModel', 'url': 'https://huggingface.co/papers/2606.26217', 'abstract': 'Abstract Fast-LeWM accelerates visual planning by replacing autoregressive rollout with parallel action-prefix prediction, reducing computational costs and latency accumulation during long-horizon predictions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Joint-Embedding Predictive Architectures (JEPAs), including recent LeWorldModel (LeWM), have become a promising foundation for reconstruction-free visual world models. For visual planning, however, LeWM evaluates candidate action sequences by repeatedly applying a local one-step latent transition model. This autoregressive rollout makes planning computationally expensive and exposes the predicted trajectory to accumulated latent errors as the horizon grows. We propose Fast LeWorldModel (Fast-LeWM), a fast latent world model that replaces repeated local rollout with action-prefix prediction. Given the current latent and a candidate action sequence, Fast-LeWM encodes its prefixes and predicts the future latents reached after executing those prefixes in parallel. By making action prefixes the basic prediction unit, Fast-LeWM directly models action effects accumulated to different extents over multiple horizons. This prefix-level supervision forces the model to learn how states continuously evolve under different action prefixes, rather than only fitting one-step state transitions. During planning, the predictor can use the last prefix token from the encoded action sequence to evaluate the corresponding future latent without explicitly rolling through each intermediate imagined state. Across multiple tasks, Fast-LeWM improves average success over LeWM while substantially reducing planning time, achieving lower open-loop latent loss whose growth becomes significantly slower as the rollout horizon increases.', 'score': 1, 'issue_id': 2505, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '1423e6724acc9721', 'authors': ['Yuntian Gao', 'Xiangyu Xu'], 'affiliations': ['Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26217.jpg', 'data': {'categories': ['#training', '#cv', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Параллельное предсказание вместо автогрессивного: ускорение визуального планирования', 'desc': 'В статье предлагается Fast-LeWM, ускоренная модель визуального мира на основе архитектуры JEPA, которая заменяет автогрессивный rollout параллельным предсказанием префиксов действий. Вместо многократного применения локального одношагового перехода в скрытом пространстве, модель кодирует префиксы последовательности действий и предсказывает будущие состояния параллельно для всех горизонтов. Такой подход к предсказанию на уровне префиксов позволяет модели напрямую моделировать накопленные эффекты действий и уменьшает накопление ошибок предсказания при длительном планировании. Экспериментальные результаты показывают улучшение успешности планирования и значительное снижение вычислительных затрат по сравнению с исходной LeWM.'}, 'en': {'title': 'Accelerating Visual Planning with Action-Prefix Prediction', 'desc': 'Fast-LeWM is a new approach to visual planning that speeds up the process by using action-prefix prediction instead of the traditional autoregressive rollout method. This change reduces both the computational costs and the errors that can build up over long prediction horizons. By focusing on action prefixes, Fast-LeWM allows the model to learn how states change over time with different actions, rather than just looking at single-step transitions. As a result, it not only improves the success rate in various tasks but also significantly cuts down the time needed for planning.'}, 'zh': {'title': '快速视觉规划的新方法', 'desc': 'Fast-LeWM是一种加速视觉规划的模型，通过用并行的动作前缀预测替代自回归的展开，降低了长时间预测的计算成本和延迟累积。该模型基于Qwen/Qwen2.5-Coder-32B-Instruct联合嵌入预测架构，成为无重建视觉世界模型的有希望基础。与传统的LeWM模型相比，Fast-LeWM通过编码动作前缀并并行预测未来状态，避免了重复的局部展开，从而提高了规划效率。实验表明，Fast-LeWM在多个任务中提高了成功率，同时显著减少了规划时间，降低了开放式潜在损失的增长速度。'}}}, {'id': 'https://huggingface.co/papers/2606.27364', 'title': 'PhysiFormer: Learning to Simulate Mechanics in World Space', 'url': 'https://huggingface.co/papers/2606.27364', 'abstract': 'Abstract PhysiFormer uses coordinate-space diffusion to generate physically-plausible 3D object motions without explicit inductive biases, enabling efficient multi-object reasoning and generalization to complex materials and geometries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present PhysiFormer, a diffusion transformer for physically-plausible 3D object motion. Unlike video world models that operate in view-dependent pixel space, PhysiFormer represents objects as 3D meshes expressed in world coordinates. Given the initial vertex positions and velocities, as well as object material type, rigid or elastic, the model samples future vertex trajectories. While related neural physics approaches build on ad-hoc latent spaces or explicitly enforce rigidity and causality, PhysiFormer shows that excellent results can be obtained without any such inductive biases, by casting vertex trajectory prediction as a single denoising diffusion process directly in world coordinates. The probabilistic formulation captures uncertainty in the learned dynamics, enabling diverse plausible futures from initial conditions, making this framework potentially useful for applications with unobserved uncertainty. The model features attention factorised over time, space, and objects for efficiency, enabling permutation-invariant multi-object reasoning without needing explicit object encoding. Trained on over 100k simulated trajectories, PhysiFormer generates rigid and elastic mechanics, and generalises to mixed-material settings, unseen real-world geometries, and larger object counts. It substantially outperforms autoregressive baselines in trajectory accuracy, rigidity preservation, and momentum-based physical consistency. Our results position coordinate-space diffusion as a promising step toward view-invariant, geometry-aware world modelling for robotics, graphics, and physical design. Visualisations, code, and models are available at https://yimingc9.github.io/physiformer.', 'score': 0, 'issue_id': 2505, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'cb8ae1ba18ba17c5', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#robotics', '#open_source', '#3d', '#training', '#diffusion', '#architecture'], 'emoji': '🌍', 'ru': {'title': 'Физика в координатах: диффузионный трансформер для реалистичного моделирования движений объектов', 'desc': 'PhysiFormer — это диффузионный трансформер, который предсказывает физически правдоподобные движения 3D объектов, работая непосредственно в мировых координатах вершин меша, а не в пиксельном пространстве видео. Модель использует вероятностную формулировку процесса шумоподавления, что позволяет ей генерировать разнообразные реалистичные траектории без явного внедрения индуктивных смещений для жёсткости или причинности. Архитектура основана на факторизованном внимании по времени, пространству и объектам, что обеспечивает эффективное рассуждение о нескольких объектах и инвариантность к перестановкам без явного кодирования объектов. На данных из более чем 100 тысяч симулированных траекторий модель успешно обучается моделировать твёрдую и упругую механику, хорошо обобщаясь на смешанные материалы, неизвестные геометрии и большее количество объектов.'}, 'en': {'title': 'Revolutionizing 3D Motion Prediction with Coordinate-Space Diffusion', 'desc': 'PhysiFormer is a novel diffusion transformer designed to predict realistic 3D object motions by using coordinate-space diffusion. It operates directly in world coordinates, representing objects as 3D meshes, which allows it to generate future vertex trajectories based on initial conditions and material types. Unlike traditional methods that rely on specific biases or latent spaces, PhysiFormer achieves high accuracy in motion prediction without these constraints, capturing uncertainty in dynamics. This model excels in multi-object reasoning and generalizes well to various materials and complex geometries, making it a significant advancement in the field of physics-based simulations.'}, 'zh': {'title': 'PhysiFormer：物理合理的3D运动生成新方法', 'desc': 'PhysiFormer是一种用于生成物理上合理的3D物体运动的扩散变换器。与依赖于像素空间的视频世界模型不同，PhysiFormer在世界坐标中表示物体为3D网格。该模型通过将顶点轨迹预测视为直接在世界坐标中进行的去噪扩散过程，避免了显式的归纳偏置。经过训练后，PhysiFormer在轨迹准确性和物理一致性方面显著优于自回归基线，展示了其在机器人、图形和物理设计等领域的潜在应用。'}}}, {'id': 'https://huggingface.co/papers/2606.26299', 'title': 'COrigami: An AI Pipeline for Co-Designing Flat-Foldable Visually Recognisable Origami', 'url': 'https://huggingface.co/papers/2606.26299', 'abstract': 'Abstract A computational origami system generates crease patterns from natural language using AI-driven optimization and aesthetic evaluation, enabling human-AI collaboration in mathematically constrained design.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While generative AI has achieved remarkable success in solving problems with verifiable solutions, generating physical art that satisfies both strict geometric constraints and subjective visual aesthetics remains a challenge. This paper presents an approach to tackle these difficulties in the domain of computational origami, a mathematically rigid environment that grounds artistic design within the equations of flat foldability. We present COrigami, an end-to-end AI-driven pipeline that assists the design cycle by generating crease patterns from natural language. Our pipeline involves generating a semantic stick figure, computing a base packing, solving for a flat-foldable crease pattern, shaping the flat-folded crease pattern, and refining the generated model using reinforcement learning driven by an autonomous aesthetic evaluation loop. Our system acts as a highly effective collaborative assistant, generating structural starting points that human artists can further expand and shape. By integrating algorithmic optimisation with autonomous aesthetic critique, this work demonstrates how AI systems can satisfy multi-objective physical constraints to enable reliable, mathematically grounded co-creativity.', 'score': 0, 'issue_id': 2505, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '9188a0d3b779c623', 'authors': ['Tom Zahavy', 'Shaobo Hou', 'Thomas Tumiel', 'James Doran', 'Francesco Faccio', 'Xidong Feng', 'Alex Havrilla', 'Igor Khytryi', 'Chenglei Li', 'Lisa Schut', 'Vivek Veeriah', 'Arijan Abrashi', 'Michał Kosmulski', 'Robert J. Lang', 'Nick Robinson', 'Brandon Wong', 'Marcus Chiam', 'Gloria Fang', 'Satinder Singh'], 'affiliations': ['Google', 'Google DeepMind', 'Independent', 'Stanford'], 'pdf_title_img': 'assets/pdf/title_img/2606.26299.jpg', 'data': {'categories': ['#rl', '#multimodal', '#architecture'], 'emoji': '📄', 'ru': {'title': 'AI-помощник для дизайна оригами: баланс математики и красоты', 'desc': 'В статье представлена система COrigami, которая генерирует паттерны складок для оригами на основе естественного языка, используя нейросетевые подходы и оптимизацию. Система решает сложную задачу одновременного удовлетворения строгих геометрических ограничений (плоской складываемости) и субъективных эстетических критериев через reinforcement learning. Конвейер включает генерацию семантической фигурки, вычисление базовой упаковки, поиск плоскостной складываемой схемы и итеративное улучшение с использованием автономной системы эстетической оценки. Работа демонстрирует, как AI может служить эффективным соавтором для художников, предоставляя математически обоснованные стартовые точки для творческого процесса.'}, 'en': {'title': 'AI-Powered Origami: Bridging Geometry and Aesthetics', 'desc': 'This paper introduces COrigami, an AI-driven system that generates crease patterns for origami from natural language descriptions. It combines generative AI techniques with reinforcement learning to ensure that the designs meet both geometric constraints and aesthetic preferences. The system operates through a series of steps, including creating a semantic representation, computing a base packing, and refining the crease patterns based on aesthetic evaluations. By facilitating collaboration between AI and human artists, COrigami enhances the design process in computational origami, allowing for innovative and mathematically sound creations.'}, 'zh': {'title': 'AI驱动的折纸艺术共创', 'desc': '这篇论文介绍了一种计算折纸系统，能够通过自然语言生成折痕图案，结合了人工智能优化和美学评估，促进人机协作。尽管生成式人工智能在解决可验证问题上取得了显著成功，但在满足严格几何约束和主观视觉美感的物理艺术创作中仍面临挑战。论文提出了COrigami，一个端到端的AI驱动管道，能够从自然语言生成折痕图案，并通过强化学习和自主美学评估不断优化生成的模型。该系统作为高效的协作助手，为人类艺术家提供结构性起点，展示了AI如何在满足多目标物理约束的同时，实现可靠的数学基础共创。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (2)', '#agi', '#alignment', '#architecture (5)', '#audio', '#benchmark (1)', '#cv (2)', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (3)', '#open_source (1)', '#optimization', '#plp', '#rag', '#reasoning', '#rl (2)', '#rlhf', '#robotics (1)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (5)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-26 02:35',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-26 02:35')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-26 02:35')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
