ше вычислительных ресурсов на подготовку больших переполненных словарей. Авторы представляют ICALens — практический рабочий процесс с оптимизированным GPU-параллельным алгоритмом FastICA и специальными рецептами стабилизации для анализа представлений LLM. На бенчмарке SAEBench метод показывает конкурентные результаты с существующими разреженными автокодировщиками, демонстрируя, что ICA — это эффективная дополнительная линза для исследования поведения языковых моделей.'}, 'en': {'title': 'Unlocking Language Models: ICA as a Key to Interpretability', 'desc': 'This paper presents a new approach to understanding language model representations using Independent Component Analysis (ICA). ICA is shown to be a faster and more efficient method compared to traditional sparse autoencoders (SAEs) for discovering interpretable directions in model activations. The authors introduce ICALens, a practical workflow that enhances the stability and efficiency of ICA analysis specifically for language models. Their findings indicate that ICA can effectively recover interpretable directions without the need for extensive training, making it a valuable tool for probing and understanding model behavior.'}, 'zh': {'title': 'ICA：语言模型可解释性的高效新视角', 'desc': '独立成分分析（ICA）被重新评估为一种有效的方法，用于发现语言模型表示中的可解释方向。与稀疏自编码器（SAE）训练相比，ICA提供了更快的替代方案，同时在探测任务中保持竞争力。我们提出了ICALens，这是第一个稳定、高效且可审计的ICA分析工作流程，能够有效恢复紧凑且人类可解释的方向。研究结果表明，ICA在语言模型可解释性方面的潜力被低估，应该作为探索语言模型表示的高效补充工具。'}}}, {'id': 'https://huggingface.co/papers/2606.03108', 'title': 'EvoTrainer: Co-Evolving LLM Policies and Training Harnesses for Autonomous Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.03108', 'abstract': 'Abstract EvoTrainer autonomously evolves both language model policies and training harnesses through empirical feedback, demonstrating superior performance in complex reasoning and coding tasks compared to traditional handcrafted approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous LLM training is often framed as recipe search, which leaves the training harness largely static. This limitation sharpens in agentic RL, where shifting bottlenecks and scalar rewards mask diverse failure modes. We introduce EvoTrainer, an autonomous training framework that co-evolves LLM policies and training-side harnesses through empirical feedback: it diagnoses rollout-level evidence, revises diagnostics, backtests interventions, and accumulates reusable skills. Evaluated on mathematical reasoning, competitive-programming code generation, and repository-level software engineering, EvoTrainer matches or exceeds the human-engineered RL references under the same data, codebase, and evaluation protocol, with the largest gain on long-horizon agentic SWE. Trajectory analyses show that retained strategies diverge across domains, evolving diagnostics prevent invalid high-scoring branches from being promoted, and reusable skills shape later search. Autonomous LLM RL should move beyond recipe search toward joint evolution of policies and the training harnesses that interpret them.', 'score': 9, 'issue_id': 2411, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '771d0a09a4aa23c9', 'authors': ['Guhong Chen', 'Yingcheng Shi', 'Yongbin Li', 'Binhua Li', 'Xander Xu', 'Hu Wei', 'Shiwen Ni', 'Min Yang', 'Jieping Ye'], 'affiliations': ['Alibaba Group', 'SUAT', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.03108.jpg', 'data': {'categories': ['#optimization', '#training', '#plp', '#open_source', '#reasoning', '#agents', '#rl'], 'emoji': '🧬', 'ru': {'title': 'Совместная эволюция: моделей и тренировок вместе', 'desc': 'EvoTrainer — это автономная система для совместной эволюции политик языковых моделей и обучающих механизмов на основе эмпирической обратной связи. Система анализирует данные траекторий, диагностирует ошибки, проверяет гипотезы и накапливает переиспользуемые навыки обучения. На задачах математического рассуждения, генерации кода и разработки программного обеспечения EvoTrainer показывает результаты, сравнимые или превосходящие ручные подходы к обучению с подкреплением. Исследование демонстрирует, что автономное обучение LLM должно выходить за пределы поиска рецептов к совместной эволюции моделей и интерпретирующих их обучающих систем.'}, 'en': {'title': 'Evolving Training for Superior Language Models', 'desc': 'EvoTrainer is a new framework that autonomously evolves both language model policies and their training environments using feedback from their performance. This approach outperforms traditional methods that rely on manually crafted training setups, especially in complex tasks like reasoning and coding. By continuously diagnosing and revising its strategies, EvoTrainer can adapt and improve its skills over time, leading to better results in various programming challenges. The research shows that this method not only matches but often exceeds the performance of human-designed reinforcement learning systems.'}, 'zh': {'title': '自主进化，超越传统训练方法', 'desc': 'EvoTrainer是一种自主进化的训练框架，能够同时进化语言模型策略和训练工具，通过经验反馈来提升性能。与传统的手工设计方法相比，EvoTrainer在复杂推理和编码任务中表现更为出色。该框架通过诊断回滚级别的证据、修订诊断、回测干预措施以及积累可重用技能，来实现策略和训练工具的共同进化。评估结果显示，EvoTrainer在数学推理、竞争编程代码生成和软件工程等任务中，能够匹配或超越人类设计的强化学习基准。'}}}, {'id': 'https://huggingface.co/papers/2606.11324', 'title': 'Embodied-R1.5: Evolving Physical Intelligence via Embodied Foundation Models', 'url': 'https://huggingface.co/papers/2606.11324', 'abstract': 'Abstract Embodied-R1.5 is a unified embodied foundation model that integrates embodied reasoning capabilities and achieves state-of-the-art performance on embodied vision-language benchmarks through a multi-task balanced reinforcement learning approach.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Embodied-R1.5, a unified Embodied Foundation Model (EFM) that integrates comprehensive embodied reasoning capabilities, spanning embodied cognition, task planning, correction, and pointing, within a single architecture toward general physical intelligence. Leveraging three automated data construction pipelines to significantly expand the data coverage of critical capabilities, we build a large-scale data system of over 15B tokens, and design a multi-task balanced RL recipe to alleviate heterogeneous task conflicts. We further introduce a Planner-Grounder-Corrector (PGC) closed-loop framework that enables a single model to autonomously execute and self-correct over long-horizon tasks. With only 8B parameters, Embodied-R1.5 achieves SOTA on 16 out of 24 embodied VLM benchmarks, surpassing leading models like Gemini-Robotics-ER-1.5 and GPT-5.4. Benefiting from the internalized embodied capabilities, Embodied-R1.5 can be fine-tuned into a VLA with only a small amount of data, outperforming leading VLA models like π_{0.5} across 4 popular manipulation benchmark suites. We further conduct extensive zero-shot real-robot experiments, validating performance in instruction following, affordance grounding, articulated object manipulation, and long-horizon complex tasks, demonstrating strong generalization to the physical world. We open-source model weights, datasets, training code, and EmbodiedEvalKit, an evaluation framework tailored for embodied tasks, to facilitate future research in EFMs.', 'score': 8, 'issue_id': 2410, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '10c8f652d368b7d4', 'authors': ['Yifu Yuan', 'Yaoting Huang', 'Xianze Yao', 'Yutong Li', 'Shuoheng Zhang', 'Linqi Han', 'Pengyi Li', 'Jiangeng Sun', 'Wenting Jia', 'Zhao Zhang', 'Yuhao Liu', 'Ruihao Liao', 'Yucheng Hu', 'Qiyu Wu', 'Yuxiao Li', 'Zibin Dong', 'Fei Ni', 'Yan Zheng', 'Shuyang Gu', 'Yi Ma', 'Hongyao Tang', 'Han Hu', 'Jianye Hao'], 'affiliations': ['Tencent Hunyuan', 'Tianjin University'], 'pdf_title_img': 'assets/pdf/title_img/2606.11324.jpg', 'data': {'categories': ['#training', '#rl', '#open_source', '#dataset', '#reasoning', '#robotics', '#agents', '#multimodal', '#optimization', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Универсальный робот-помощник, который учится у своих ошибок', 'desc': "Embodied-R1.5 — это объединённая модель-основание для воплощённого интеллекта, которая интегрирует возможности рассуждения о физическом взаимодействии в единую архитектуру с 8 миллиардами параметров. Модель обучается на большом наборе данных из 15 миллиардов токенов, построенном с помощью трёх автоматизированных конвейеров, и использует сбалансированный подход многозадачного обучения с подкреплением для разрешения конфликтов между задачами. Система реализует框架 Planner-Grounder-Corrector, позволяющей модели самостоятельно выполнять сложные долгосрочные задачи и исправлять свои ошибки. Модель достигает лучших результатов на 16 из 24 benchmark'ов для видео-языковых моделей воплощённого интеллекта и успешно работает на реальных робототехнических системах."}, 'en': {'title': 'Empowering Machines with Unified Embodied Intelligence', 'desc': 'Embodied-R1.5 is a cutting-edge Embodied Foundation Model (EFM) that combines various reasoning abilities to enhance physical intelligence in machines. It utilizes a multi-task balanced reinforcement learning strategy to effectively manage different tasks and improve performance on vision-language benchmarks. The model is built on a vast dataset of over 15 billion tokens, allowing it to learn and adapt to complex tasks autonomously. With only 8 billion parameters, it achieves state-of-the-art results on numerous benchmarks and demonstrates strong capabilities in real-world robotic applications.'}, 'zh': {'title': '具身智能的统一模型：Embodied-R1.5', 'desc': 'Embodied-R1.5 是一个统一的具身基础模型，集成了全面的具身推理能力，旨在实现通用的物理智能。该模型通过多任务平衡强化学习方法，在具身视觉-语言基准测试中取得了最先进的表现。我们构建了一个超过150亿个标记的大规模数据系统，并设计了一个闭环框架，使模型能够自主执行和自我纠正长时间任务。Embodied-R1.5 仅用8亿参数就超越了多个领先模型，展现出强大的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2606.12373', 'title': 'Verifiable Environments Are LEGO Bricks: Recursive Composition for Reasoning Generalization', 'url': 'https://huggingface.co/papers/2606.12373', 'abstract': 'Abstract Recursive automated composition framework enables scalable reinforcement learning for language models by automatically combining verifiable environments through compositional operators.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement Learning (RL) with verifiable environments has emerged as a powerful approach for enhancing the reasoning capabilities of Large Language Models (LLMs). While prior research demonstrates that scaling environment quantity improves RL performance, existing manual or individual construction methods suffer from linear scaling limits, thereby hindering scalable reasoning generalization. This paper introduces RACES (Recursive Automated Composition for Environment Scaling), a framework that conceptualizes verifiable environments as composable building blocks that can be recursively assembled. The key insight is that when the codomain (output type) of one environment matches the domain (input type) of another, they can be automatically fused into a new verifiable environment, enabling recursive composition. RACES is implemented with 300 individual environments and defines a set of composition operators (SEQUENTIAL, PARALLEL, SORT, and SELECT) that induce diverse reasoning patterns. Extensive experiments show that RL training on these composite environments consistently enhances reasoning generalization. Specifically, RACES improves DeepSeek-R1-Distill-Qwen-14B by an average of 3.1 points (from 48.2 to 51.3) and boosts Qwen3-14B performance from 58.8 to 61.1 on six benchmarks, which are unseen during the construction of training environments. Moreover, RACES achieves performance comparable to training on 300 individual environments using only 50 base environments, demonstrating significant efficiency in environment utilization.', 'score': 6, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'c46513138c926729', 'authors': ['Hao Xiang', 'Qiaoyu Tang', 'Le Yu', 'Yaojie Lu', 'Xianpei Han', 'Ben He', 'Le Sun', 'Bowen Yu', 'Peng Wang', 'Hongyu Lin', 'Dayiheng Liu'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Qwen Team, Alibaba Group', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.12373.jpg', 'data': {'categories': ['#training', '#rl', '#reasoning', '#optimization', '#benchmark'], 'emoji': '🧩', 'ru': {'title': 'Рекурсивная композиция для масштабируемого обучения с подкреплением языковых моделей', 'desc': 'В статье представлена фреймворк RACES для масштабируемого обучения с подкреплением языковых моделей путём автоматического составления проверяемых сред. Основная идея заключается в том, что среды можно рассматривать как композиционные блоки, которые рекурсивно комбинируются, когда выходной тип одной среды соответствует входному типу другой. Фреймворк использует набор операторов композиции (SEQUENTIAL, PARALLEL, SORT и SELECT), которые порождают разнообразные паттерны рассуждений. Экспериментальные результаты показывают, что обучение на составленных средах значительно улучшает обобщение рассуждений: достигается прирост в 3.1 балла для DeepSeek-R1-Distill-Qwen-14B и рост производительности Qwen3-14B на 2.3 балла на невидимых бенчмарках.'}, 'en': {'title': 'RACES: Efficiently Scaling Reinforcement Learning with Composable Environments', 'desc': 'This paper presents RACES, a framework that enhances reinforcement learning for language models by using composable environments. It allows for the automatic combination of verifiable environments, which helps in scaling the reasoning capabilities of large language models. By defining composition operators, RACES can create diverse reasoning patterns and improve generalization in training. The results show that RACES can achieve high performance with fewer environments, making it an efficient approach for training language models.'}, 'zh': {'title': '递归组合，提升推理能力！', 'desc': '本文提出了一种递归自动组合框架RACES，用于增强语言模型的强化学习能力。该框架通过可组合的环境构建块，自动组合可验证的环境，从而实现可扩展的推理能力。RACES定义了一组组合操作符，能够生成多样化的推理模式，并在300个个体环境上进行实验，显示出显著的推理泛化能力提升。实验结果表明，RACES在使用仅50个基础环境的情况下，达到了与300个个体环境相当的性能，展示了环境利用的高效性。'}}}, {'id': 'https://huggingface.co/papers/2606.12072', 'title': 'World Model Self-Distillation: Training World Models to Solve General Tasks', 'url': 'https://huggingface.co/papers/2606.12072', 'abstract': 'Abstract A scalable framework combines self-distillation and reinforcement learning to transfer task-solving abilities from vision-language models to video diffusion models without requiring labeled task-video data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pretrained video generators are promising visual world models that exhibit emergent task-solving abilities; however, their reliance on detailed textual descriptions limits their direct use for planning and decision-making. Existing approaches either outsource this reasoning to language or vision-language models, or rely on supervised fine-tuning with paired task-execution videos, which are costly to collect and difficult to scale. We propose a scalable framework that elicits task-solving ability in such models by combining self-distillation with reinforcement learning. Given an unlabeled scene image, a vision-language model generates a candidate task and a detailed step-by-step solution. The solution conditions a pretrained video diffusion model, the Demonstrator; we distill its behavior into an Executor conditioned only on the image and a short task prompt. This transfers execution knowledge from caption-guided generation to instruction-conditioned task solving without curated task-video supervision. We further improve the Executor with reinforcement learning from VLM feedback, exploiting the asymmetry between judging whether a sampled video satisfies a task and generating the solution. Experiments on our proposed WorldTasks-Benchmark and the DreamGen robotics benchmark show that the Executor surpasses the Demonstrator under our VLM-based evaluation protocol and transfers competitively to robotic tasks.', 'score': 6, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'e9ef6462b4e67544', 'authors': ['Sebastian Stapf', 'Pablo Acuaviva Huertos', 'Aram Davtyan', 'Paolo Favaro'], 'affiliations': ['University of Bern'], 'pdf_title_img': 'assets/pdf/title_img/2606.12072.jpg', 'data': {'categories': ['#training', '#rl', '#transfer_learning', '#dataset', '#benchmark', '#reasoning', '#diffusion', '#robotics', '#optimization', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Обучение видео-моделей решать задачи без размеченных данных через дистилляцию и подкрепление', 'desc': 'В работе предложена масштабируемая система для передачи навыков решения задач от vision-language моделей к видео диффузионным моделям без использования размеченных данных. Метод комбинирует self-distillation и reinforcement learning: vision-language модель генерирует задачу и пошаговое решение, которое кондиционирует модель Demonstrator, а её поведение дистиллируется в модель Executor, обученную только на изображении и коротком промпте. Executor дополнительно улучшается через reinforcement learning с использованием обратной связи от vision-language модели, эксплуатируя асимметрию между оценкой и генерацией решений. Эксперименты показывают, что Executor превосходит Demonstrator и успешно переносится на роботические задачи.'}, 'en': {'title': 'Empowering Video Models with Self-Distillation and Reinforcement Learning', 'desc': 'This paper presents a new framework that combines self-distillation and reinforcement learning to enhance video diffusion models by leveraging vision-language models. The approach allows these models to learn task-solving skills without needing labeled video data, which is often expensive and hard to obtain. By generating tasks and solutions from images, the framework distills knowledge from a pretrained model to create an Executor that can perform tasks based on minimal input. The results demonstrate that this method not only improves performance on benchmarks but also effectively transfers to real-world robotic applications.'}, 'zh': {'title': '无监督视频任务解决的新方法', 'desc': '这篇论文提出了一个可扩展的框架，结合自蒸馏和强化学习，将视觉语言模型的任务解决能力转移到视频扩散模型上，而无需标记的任务视频数据。通过给定未标记的场景图像，视觉语言模型生成候选任务和详细的逐步解决方案。这个解决方案为预训练的视频扩散模型提供条件，从而将执行知识从基于字幕的生成转移到基于指令的任务解决。实验结果表明，执行器在我们的评估协议下超越了演示者，并在机器人任务中表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2606.07881', 'title': 'Breaking the Bubble: Asynchronous Pipeline Parallel Training with Bounded Weight Inconsistency', 'url': 'https://huggingface.co/papers/2606.07881', 'abstract': 'Abstract PACI enables efficient asynchronous pipeline training by controlling forward/backward weight inconsistency through local gradient accumulation, achieving higher throughput and faster training time-to-accuracy without sacrificing stability or memory usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pipeline parallelism is essential for training large neural networks, but existing schedules trade off throughput, memory, and optimization consistency. Synchronous pipelines preserve forward/backward weight consistency but suffer from bubbles; asynchronous pipelines remove bubbles but introduce weight-version mismatch, typically requiring weight stashing, prediction, or correction mechanisms. We introduce PACI (Pipeline Asynchronous training with Controlled Inconsistency), a bubble-free asynchronous pipeline method that bounds forward/backward version drift without weight stashing, prediction, additional parameter copies, or global synchronization. The key idea is to use local gradient accumulation as a version-control mechanism: by slowing parameter-version evolution relative to pipeline delay, PACI limits the number of optimizer updates crossed by any micro-batch while preserving steady-state utilization. In GPT-style language-model pretraining, PACI matches the stability and final perplexity of synchronous 1F1B-flush, retains the same peak memory footprint, achieves fully utilized pipeline throughput, and improves training time-to-accuracy by up to 1.69times over the fastest flush baseline. These results show that forward/backward inconsistency need not be eliminated: when explicitly bounded, it can be safely traded for substantial efficiency gains.', 'score': 6, 'issue_id': 2411, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '9d740297996f8bd3', 'authors': ['Itay Elam', 'Eliron Rahimi', 'Avi Mendelson', 'Chaim Baskin'], 'affiliations': ['Ben-Gurion University of the Negev', 'Technion - Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.07881.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Контролируемая асинхронность вместо синхронизации: эффективный параллелизм конвейера через локальное накопление градиентов', 'desc': 'В работе представляется метод PACI для эффективного асинхронного обучения с параллелизмом конвейера, который контролирует несоответствие весов между прямым и обратным проходами через локальное накопление градиентов. Метод достигает полной утилизации конвейера без пузырьков простоя и без необходимости сохранения копий весов или глобальной синхронизации. PACI ограничивает дрейф версий параметров, замедляя их эволюцию относительно задержки в конвейере, что позволяет контролировать количество обновлений оптимизатора для каждого микро-батча. На задачах предварительного обучения языковых моделей метод показывает стабильность синхронных методов, сохраняет такой же расход памяти и ускоряет время обучения до заданной точности в 1.69 раза.'}, 'en': {'title': 'PACI: Boosting Neural Network Training Efficiency with Controlled Inconsistency', 'desc': 'PACI is a new method for training large neural networks more efficiently by using asynchronous pipeline techniques. It controls the inconsistency between forward and backward weights through local gradient accumulation, which helps maintain stability while speeding up training. Unlike traditional methods that either slow down training or require extra memory, PACI achieves high throughput without needing weight stashing or global synchronization. This approach allows for faster training times and improved accuracy, demonstrating that some level of inconsistency can be beneficial when managed properly.'}, 'zh': {'title': 'PACI：高效的异步管道训练方法', 'desc': 'PACI是一种高效的异步管道训练方法，通过局部梯度累积控制前向和后向权重不一致性，从而实现更高的吞吐量和更快的训练时间，而不牺牲稳定性或内存使用。传统的同步管道虽然保持权重一致性，但会产生空泡，而异步管道则消除了空泡，但引入了权重版本不匹配的问题。PACI通过限制参数版本的演变速度，避免了权重存储、预测或全局同步的需求，确保了训练过程的稳定性。实验结果表明，PACI在GPT风格的语言模型预训练中，能够在保持相同内存占用的情况下，显著提高训练效率。'}}}, {'id': 'https://huggingface.co/papers/2606.11289', 'title': 'i1: A Simple and Fully Open Recipe for Strong Text-to-Image Models', 'url': 'https://huggingface.co/papers/2606.11289', 'abstract': 'Abstract A comprehensive experimental study of text-to-image diffusion models reveals key design choices and training insights leading to the development of i1, a 3B-parameter model that matches leading performance while maintaining full openness.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion models have consistently driven progress in text-to-image generation. However, it is challenging to attribute recent progress to specific modeling and data choices: state-of-the-art open-weight models provide limited ablations, and do not disclose their training data and full training details. The research community needs fully open (weights, data, and code) models as a foundation for further research; yet existing fully open models still fall significantly short of leading models in performance. In this project, we conduct a systematic investigation of the modeling and data design choices in text-to-image diffusion training and inference with 300+ controlled experiments totaling 700K+ TPU v6e hours. Our experiments highlight several empirical findings (e.g., equal weighting is a strong default for mixing curated datasets) and simple design decisions (e.g., larger text encoder adapters improve performance with minimal added parameters) for training strong models. Guided by these insights, we train i1, a 3B-parameter text-to-image diffusion model using only publicly available datasets. i1 is competitive with leading models on five representative benchmarks (GenEval, DPG, PRISM, CVTG-2K, and LongText), and outperforms the best existing fully open model by 29.5 absolute percentage points on average. We provide the i1 checkpoints, training and inference code, and the data processing pipeline. Together, our findings and the i1 recipe establish a practical foundation for future open research in text-to-image diffusion models. Our code is available at https://github.com/zlab-princeton/i1.', 'score': 5, 'issue_id': 2410, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '8505736385225567', 'authors': ['Boya Zeng', 'Tianze Luo', 'Shu Pu', 'Jucheng Shen', 'Taiming Lu', 'Gabriel Sarch', 'Zhuang Liu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.11289.jpg', 'data': {'categories': ['#training', '#open_source', '#small_models', '#dataset', '#diffusion', '#multimodal', '#cv', '#optimization', '#benchmark'], 'emoji': '🖼️', 'ru': {'title': 'Открытая диффузионная модель i1: практический рецепт для синтеза изображений из текста', 'desc': 'В статье проведено комплексное экспериментальное исследование моделей диффузии для синтеза изображений из текста, включающее более 300 контролируемых экспериментов. Авторы выявили ключевые дизайн-решения и практики обучения, такие как равномерное взвешивание датасетов и использование более крупных адаптеров текстового энкодера. На основе этих инсайтов разработана модель i1 с 3 миллиардами параметров, которая конкурирует с лучшими моделями при использовании только публично доступных датасетов. Авторы обеспечивают полную открытость проекта, делясь весами модели, кодом обучения и инференса, что создаёт фундамент для дальнейших открытых исследований в области генеративных моделей диффузии.'}, 'en': {'title': 'Unlocking Open-Source Excellence in Text-to-Image Generation', 'desc': 'This paper presents a detailed study of text-to-image diffusion models, focusing on the design choices and training strategies that led to the creation of the i1 model, which has 3 billion parameters. The authors conducted over 300 experiments to identify effective modeling techniques and data handling practices, revealing that equal weighting of curated datasets and larger text encoder adapters significantly enhance model performance. i1 demonstrates competitive results against leading models on multiple benchmarks while being fully open in terms of weights, data, and code. This work aims to provide a solid foundation for future research in the field of text-to-image generation by making the i1 model and its training methodology publicly accessible.'}, 'zh': {'title': '开放研究的基础：i1模型的成功之路', 'desc': '这篇论文对文本到图像的扩散模型进行了全面的实验研究，揭示了关键的设计选择和训练见解，最终开发出一个名为i1的3B参数模型。i1在保持完全开放的同时，达到了领先的性能。研究表明，平等加权是混合策划数据集的强有力默认选择，而较大的文本编码器适配器可以在增加的参数极少的情况下显著提高性能。通过这些发现，i1在多个基准测试中表现出色，超越了现有完全开放模型的平均性能。'}}}, {'id': 'https://huggingface.co/papers/2606.07943', 'title': 'POISE: Position-Aware Undetectable Skill Injection on LLM Agents', 'url': 'https://huggingface.co/papers/2606.07943', 'abstract': "Abstract POISE is a stealthy skill-poisoning attack that embeds malicious triggers within benign-looking instructions, achieving high attack success rates while avoiding detection by LLM scanners that are overly sensitive to privileged tool operations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agent skills provide a lightweight mechanism for extending general-purpose agents, but their open format exposes them to skill-poisoning attacks. A practically dangerous injection must stay invisible: if executing the payload derails the user's legitimate task, the resulting failure signal invites inspection of the skill. We therefore evaluate attacks by Attack Success Rate, which requires the injected payload to execute and the user's task to still pass its verifier in the same trial. Prior skill-poisoning attacks face a reliability-stealth trade-off under this lens: YAML-header injections are reliably loaded but easily inspected, whereas stealthier body injections that place explicit malicious commands in the skill prose are less reliable because out-of-context commands invite the agent's own suspicion. We introduce POISE, a position-aware attack that compresses the trigger into a single, benign-looking body instruction, placing it at a feasible position and using a context-aware generator to blend it with nearby setup or prerequisite steps. On Skill-Inject with codex+gpt-5.2, POISE achieves an 89.3% ASR, 28.0 points above a random-placement body baseline and 2.6 points above a YAML-only baseline, while retaining the stealth advantage of body placement. That stealth is the decisive margin: because legitimate skill bodies naturally require privileged tool operations, LLM scanners are hyper-sensitive, falsely flagging 74.6% of clean skills on average across four judges and both benchmarks. Blending into these false alarms, POISE causes only 5.6% of poisoned variants to gain a new high-risk alert over their clean baselines, rendering current static defenses ineffective.", 'score': 4, 'issue_id': 2411, 'pub_date': '2026-06-06', 'pub_date_card': {'ru': '6 июня', 'en': 'June 6', 'zh': '6月6日'}, 'hash': 'e7cb41135ed2ed02', 'authors': ['Haochang Hao', 'Dehai Min', 'Zhifang Zhang', 'Yunbei Zhang', 'Miao Xu', 'Yingqiang Ge', 'Lu Cheng'], 'affiliations': ['Rutgers University', 'Tulane University', 'University of Illinois at Chicago', 'University of Queensland'], 'pdf_title_img': 'assets/pdf/title_img/2606.07943.jpg', 'data': {'categories': ['#alignment', '#security'], 'emoji': '🐍', 'ru': {'title': 'Скрытое отравление навыков через контекстное внедрение триггеров', 'desc': 'В статье представлена POISE — скрытая атака на отравление навыков агентов, которая встраивает вредоносные триггеры в безобидные инструкции. Авторы решают проблему надежности и скрытности: явные вредоносные команды легко обнаруживаются, а явные инъекции в заголовки надежны, но заметны. POISE использует позиционно-ориентированный подход, внедряя триггер в одну инструкцию тела навыка, благодаря чему достигает 89,3% успеха атаки при сохранении скрытности. Метод эффективен против современных LLM-сканеров, так как легитимные навыки естественным образом требуют привилегированных операций с инструментами, что приводит к ложным срабатываниям защиты.'}, 'en': {'title': 'POISE: Stealthy Skill-Poisoning for Undetectable Attacks', 'desc': "The paper introduces POISE, a stealthy skill-poisoning attack that cleverly embeds harmful triggers within seemingly harmless instructions. This method allows the attack to achieve high success rates while evading detection by large language model (LLM) scanners, which are overly sensitive to certain operations. POISE utilizes a position-aware strategy to integrate the malicious payload seamlessly into the skill's body, ensuring that it remains undetected while still executing successfully. The results show that POISE significantly outperforms previous methods in both attack success rate and stealth, highlighting the challenges in defending against such sophisticated attacks."}, 'zh': {'title': 'POISE：隐蔽的技能中毒攻击', 'desc': 'POISE是一种隐蔽的技能中毒攻击，能够在看似无害的指令中嵌入恶意触发器，从而实现高成功率并避免被大型语言模型（LLM）扫描器检测到。该攻击利用上下文感知生成器，将触发器压缩为单个无害的指令，并放置在合理的位置，以与周围的设置步骤融合。通过在Skill-Inject平台上进行测试，POISE的攻击成功率达到了89.3%，显著高于随机放置和仅使用YAML的基线。由于合法技能体自然需要特权工具操作，POISE能够有效地躲避当前的静态防御措施。'}}}, {'id': 'https://huggingface.co/papers/2605.11212', 'title': 'ReVision: Scaling Computer-Use Agents via Temporal Visual Redundancy Reduction', 'url': 'https://huggingface.co/papers/2605.11212', 'abstract': 'Abstract ReVision improves computer-use agent efficiency by removing redundant visual patches from consecutive screenshots while preserving spatial structure, reducing token usage by 46% and improving success rates.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Computer-use agents (CUAs) rely on visual observations of graphical user interfaces, where each screenshot is encoded into a large number of visual tokens. As interaction trajectories grow, the token cost increases rapidly, limiting the amount of history that can be incorporated under fixed context and compute budgets. This has resulted in no or very limited improvement in the performance when using history unlike other domains. We address this inefficiency by introducing ReVision, which is used to train multimodal language models on trajectories where redundant visual patches are removed using a learned patch selector that compares patch representations across consecutive screenshots while preserving spatial structure required by the model. Across three benchmarks, OSWorld, WebTailBench, and AgentNetBench, when processing trajectories with 5 history screenshots using Qwen2.5-VL-7B, ReVision reduces token usage by 46% on average while improving success rate by 3% over the no drop baseline. This establishes a clear efficiency gain, enabling agents to process longer trajectories with fewer tokens. With this improved efficiency, we revisit the role of history in CUAs and find that performance continues to improve as more past observations are incorporated when redundancy is removed.', 'score': 4, 'issue_id': 2414, 'pub_date': '2026-06-05', 'pub_date_card': {'ru': '5 июня', 'en': 'June 5', 'zh': '6月5日'}, 'hash': '400eb95a2ce005c9', 'authors': ['Amirhossein Abaskohi', 'Yuhang He', 'Peter West', 'Giuseppe Carenini', 'Pranit Chawla', 'Vibhav Vineet'], 'affiliations': ['Microsoft Research', 'University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2605.11212.jpg', 'data': {'categories': ['#multimodal', '#inference', '#cv', '#training', '#benchmark', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Эффективные агенты через удаление визуальной избыточности', 'desc': 'ReVision — это метод оптимизации компьютерных агентов, которые взаимодействуют с графическим интерфейсом, путём удаления избыточных визуальных патчей из последовательных скриншотов. Метод использует обученный селектор патчей для сравнения представлений визуальных элементов между соседними кадрами, при этом сохраняя пространственную структуру, необходимую мультимодальной языковой модели. На трёх бенчмарках (OSWorld, WebTailBench, AgentNetBench) ReVision снижает использование токенов на 46% в среднем и повышает успешность выполнения задач на 3%, что позволяет агентам обрабатывать более длинные траектории с меньшим объёмом вычислений. Исследование показывает, что при удалении избыточности производительность агентов продолжает улучшаться с увеличением количества исторических наблюдений.'}, 'en': {'title': 'Streamlining Visual Data for Smarter Agents', 'desc': 'ReVision enhances the efficiency of computer-use agents (CUAs) by eliminating redundant visual patches from consecutive screenshots, which helps maintain the necessary spatial structure. This method significantly reduces the number of visual tokens needed by 46%, allowing agents to process longer interaction histories without exceeding computational limits. By training multimodal language models with a learned patch selector, ReVision improves the success rates of CUAs by 3% compared to traditional methods. Overall, this approach demonstrates that optimizing token usage can lead to better performance in tasks requiring historical context.'}, 'zh': {'title': 'ReVision：提升计算机代理效率的创新方法', 'desc': 'ReVision是一种提高计算机使用代理（CUA）效率的方法，通过去除连续屏幕截图中的冗余视觉块，同时保持空间结构，从而减少了46%的标记使用量并提高了成功率。CUA依赖于图形用户界面的视觉观察，每个屏幕截图被编码为大量视觉标记。随着交互轨迹的增长，标记成本迅速增加，限制了在固定上下文和计算预算下可以纳入的历史量。ReVision通过引入学习的块选择器，去除冗余视觉块，从而提高了处理长轨迹的效率，允许代理在更少的标记下处理更多的历史观察。'}}}, {'id': 'https://huggingface.co/papers/2606.11854', 'title': 'Fine-tuning Multi-modal LLMs with ART: Art-based Reinforcement Training', 'url': 'https://huggingface.co/papers/2606.11854', 'abstract': "Abstract ART enables parameter-efficient fine-tuning of frozen multimodal language models by optimizing raw visual input through gradient backpropagation, achieving performance comparable to LoRA while supporting pre-compiled computational graphs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct There are two main Parameter-Efficient Fine-Tuning (PEFT) techniques for Large Language Models (LLMs). While Low-Rank Adaptation (LoRA) introduces additional weights between the LLM layers, Soft Prompting introduces additional fine-tuning-specific raw tokens to an LLM input. However, both require modification to the computational graphs of precompiled, preoptimized LLMs. As a result, neither is fully supported in high-throughput engines like vLLM. We propose fine-tuning with ART (Art-based Reinforcement Training). The method injects information into a frozen Multimodal Large Language Model (MLLM) by optimizing only its raw visual input, thus enabling the soft-token approach on pre-compiled computational graphs. It relies on backpropagation of gradients back into a plain pixel array and thus supports any fine-tuning objective. Moreover, the optimized visual input can be stylized as task-relevant computational artworks. The approach's effectiveness is confirmed for different sizes of a popular open Qwen architecture and for several textual benchmarks. Specifically, ART reaches accuracy competitive with LoRA across mathematics and structured-tool-use benchmarks.", 'score': 3, 'issue_id': 2412, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '970741c22ae19a5a', 'authors': ['Michal Chudoba', 'Sergey Alyaev', 'Petra Galuscakova', 'Tomasz Wiktorski'], 'affiliations': ['NORCE Research', 'University of Stavanger'], 'pdf_title_img': 'assets/pdf/title_img/2606.11854.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Искусство тонкой настройки: оптимизация визуального входа вместо весов модели', 'desc': 'В статье представлен метод ART для экономной тонкой настройки замороженных мультимодальных языковых моделей путём оптимизации визуального входа через градиентное распространение ошибки. Этот подход позволяет избежать модификации вычислительного графа модели, что делает его совместимым с высокопроизводительными движками типа vLLM, в отличие от традиционных методов LoRA и Soft Prompting. Метод опирается на обратное распространение градиентов непосредственно в пиксельный массив изображения, поддерживая любые цели обучения. Экспериментальные результаты на архитектуре Qwen показывают, что ART достигает точности, конкурентной LoRA, на математических и структурированных тестах.'}, 'en': {'title': 'Efficient Fine-Tuning with ART: Optimizing Visual Inputs for Language Models', 'desc': 'The paper introduces ART (Art-based Reinforcement Training), a novel method for fine-tuning frozen multimodal language models without altering their computational graphs. Unlike traditional techniques like LoRA and Soft Prompting, which modify model weights or inputs, ART optimizes raw visual inputs through gradient backpropagation. This allows for efficient parameter tuning while maintaining high throughput in engines like vLLM. The results demonstrate that ART achieves performance comparable to LoRA on various benchmarks, showcasing its effectiveness in enhancing model accuracy.'}, 'zh': {'title': 'ART：高效微调冻结模型的新方法', 'desc': 'ART（基于艺术的强化训练）是一种新的方法，可以在不修改预编译计算图的情况下，对冻结的多模态语言模型进行高效的微调。它通过优化原始视觉输入，利用梯度反向传播来注入信息，从而支持软提示方法。与传统的低秩适应（LoRA）和软提示方法相比，ART在多个文本基准测试中表现出色，达到了与LoRA相当的准确性。该方法的优势在于能够在高吞吐量引擎中有效运行，适用于各种任务。'}}}, {'id': 'https://huggingface.co/papers/2606.11990', 'title': 'Time-Series Foundation Model Embeddings for Remaining Useful Life Estimation', 'url': 'https://huggingface.co/papers/2606.11990', 'abstract': 'Abstract A lightweight approach combining a frozen pretrained time-series foundation model with a simple regression head achieves superior RUL prediction performance compared to various baseline methods on industrial sensor data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Remaining Useful Life (RUL) prediction is essential for industrial predictive maintenance, yet many learning-based approaches rely on extensive feature engineering or large labeled datasets to train task-specific sequence models. In this work, we introduce a lightweight learning approach, in which we leverage a frozen pretrained time-series foundation model (TSFM) and combine it with a small regression head for RUL estimation from multivariate sensor streams. More specifically, we use Chronos-2 as a frozen backbone to extract context window features and train a lightweight regression neural network for RUL prediction. Experiments on real-world industrial sensor data from two device types show that Chronos-2 features consistently improve over recurrent, convolutional, Transformer-based, and gradient-boosting baselines under the same preprocessing and evaluation protocol. We further analyze the impact of context length and find that performance improves significantly with longer histories, indicating that TSFM representation offer a practical and data-efficient alternative for RUL estimation in industrial settings.', 'score': 3, 'issue_id': 2411, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'e43f1a6ac94faee0', 'authors': ['Amir El-Ghoussani', 'Michele De Vita', 'Ronald Naumann', 'Valiseios Belagiannis'], 'affiliations': ['Friedrich-Alexander-Universität Erlangen-Nürnberg (FAU), Germany', 'Nokia Solutions and Networks GmbH & Co. KG, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2606.11990.jpg', 'data': {'categories': [], 'emoji': '⚙️', 'ru': {'title': 'Лёгкое предсказание долголетия: foundation model вместо сложной инженерии признаков', 'desc': 'В работе предложен лёгкий подход к предсказанию оставшегося срока службы (RUL) промышленного оборудования, использующий замороженную предварительно обученную foundation model для анализа временных рядов. Авторы комбинируют Chronos-2 в качестве backbone с простой регрессионной головкой для обработки многомерных данных с датчиков. Экспериментальная проверка на реальных промышленных данных показала, что признаки, извлечённые моделью Chronos-2, превосходят рекуррентные, свёрточные, Transformer-based и gradient-boosting методы при одинаковой предобработке. Анализ влияния длины контекста продемонстрировал, что производительность значительно улучшается с увеличением истории данных, что подтверждает эффективность и экономность по данным такого подхода для промышленных приложений.'}, 'en': {'title': 'Efficient RUL Prediction with Lightweight Time-Series Models', 'desc': 'This paper presents a novel method for predicting Remaining Useful Life (RUL) using a lightweight approach that combines a frozen pretrained time-series foundation model with a simple regression head. The authors utilize the Chronos-2 model to extract features from multivariate sensor data, which enhances the performance of RUL predictions without the need for extensive feature engineering or large labeled datasets. Experiments demonstrate that this method outperforms various baseline models, including recurrent and convolutional networks, as well as gradient-boosting techniques. Additionally, the study highlights the importance of context length, showing that longer historical data significantly improves prediction accuracy, making this approach efficient for industrial predictive maintenance.'}, 'zh': {'title': '轻量级模型助力工业RUL预测', 'desc': '本研究提出了一种轻量级的方法，通过结合一个冻结的预训练时间序列基础模型和一个简单的回归头，来实现剩余使用寿命（RUL）的预测。与传统的学习方法相比，该方法不需要大量的特征工程或标注数据，能够有效地从多变量传感器数据中进行RUL估计。我们使用Chronos-2作为冻结的基础模型，提取上下文窗口特征，并训练一个轻量级的回归神经网络。实验结果表明，该方法在工业传感器数据上表现优于多种基线方法，且随着上下文长度的增加，性能显著提升。'}}}, {'id': 'https://huggingface.co/papers/2606.05758', 'title': 'DRIFT: A Residual Flow Adapter for Decoding Continuous Outputs in Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.05758', 'abstract': 'Abstract DRIFT is a framework that adapts pretrained vision-language models for continuous decoding tasks by combining coarse prediction with iterative refinement through flow matching, improving performance across perception and planning tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Many modern vision-language models (VLMs) build on autoregressive decoding of discrete tokens. While text-based output interfaces enable scalable pretraining and strong zero-shot generalization across diverse tasks, they are poorly suited for problems that require precise continuous outputs, such as localizing temporal boundaries of events or generating robotic control actions. To address this challenge, we propose DRIFT, a general framework for adapting pretrained VLMs to continuous decoding tasks. DRIFT combines a base predictor, which provides a coarse estimate of the target output, with a generative refinement module based on flow matching that iteratively improves the prediction. This residual formulation transforms the generative modeling problem from learning a global output distribution to modeling a localized residual distribution around a strong prior, substantially simplifying optimization. We evaluate DRIFT on both perception and planning tasks, including visual grounding and robotic control. Across multiple tasks and architectures spanning MLLMs, VLAs, and WAMs, DRIFT consistently outperforms a strong set of regression- and generative-based solutions.', 'score': 3, 'issue_id': 2413, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '05409b91fb62c0e9', 'authors': ['Zhuoming Liu', 'Jinhong Lin', 'Kwan Man Cheng', 'Lin Zhang', 'Shayok Bagchi', 'Yin Li'], 'affiliations': ['University of Wisconsin-Madison', 'West Lafayette Jr./Sr. High School'], 'pdf_title_img': 'assets/pdf/title_img/2606.05758.jpg', 'data': {'categories': ['#robotics', '#architecture', '#cv', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'От дискретных токенов к плавному уточнению: адаптация vision-language моделей для непрерывных выходов', 'desc': 'DRIFT — это фреймворк для адаптации предобученных vision-language моделей к задачам непрерывного декодирования путём комбинирования грубого предсказания с итеративным уточнением через flow matching. Авторы решают проблему дискретного токенизирования, которое плохо подходит для задач, требующих точных непрерывных выходов, таких как локализация событий и управление роботом. Метод использует остаточную формулировку, где генеративный модуль уточняет предсказания в локальной области вокруг сильного априорного предсказания, значительно упрощая оптимизацию. DRIFT демонстрирует превосходящие результаты на разнообразных задачах восприятия и планирования, включая visual grounding и управление роботами.'}, 'en': {'title': 'DRIFT: Refining Vision-Language Models for Continuous Tasks', 'desc': 'The paper introduces DRIFT, a framework designed to enhance pretrained vision-language models for tasks that require continuous outputs. It combines a base predictor for initial coarse estimates with a generative refinement module that uses flow matching to iteratively improve these predictions. This approach shifts the focus from learning a complete output distribution to refining localized predictions, making the optimization process easier. DRIFT demonstrates superior performance in various perception and planning tasks, such as visual grounding and robotic control, compared to existing regression and generative methods.'}, 'zh': {'title': 'DRIFT：提升视觉-语言模型的连续解码能力', 'desc': 'DRIFT是一个框架，旨在将预训练的视觉-语言模型适应于连续解码任务。它通过结合粗略预测和基于流匹配的迭代精炼，提升了在感知和规划任务中的表现。该方法将生成建模问题转变为围绕强先验建模局部残差分布，从而简化了优化过程。我们在视觉定位和机器人控制等多个任务上评估了DRIFT，结果显示其在多种架构中均优于传统的回归和生成解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.03437', 'title': 'Large Language Models Are Overconfident in Their Own Responses', 'url': 'https://huggingface.co/papers/2606.03437', 'abstract': 'Abstract Instruction tuning degrades calibration in large language models, with chat templates exacerbating overconfidence through ownership bias, which can be mitigated by reframing model responses as user input during confidence assessment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Prior work has shown that instruction-tuned large language models (LLMs) are less well calibrated than their base pre-trained counterparts. However, little is known about the frequently used chat template\'s effect on the calibration of conversational LLMs. In this work, we investigate the mechanisms driving this miscalibration by decoupling the effects of the post-training algorithm and the chat format. We find that, while instruction tuning fundamentally harms calibration, the chat template aggravates the issue through an "ownership bias" -- models are significantly more confident in their own answers than in identical answers provided by a user. Extensive experiments across six recent open-weight LLMs, three benchmarks, and three confidence elicitation methods show that models assign up to 26% higher confidence to their own responses. Leveraging this insight, we propose a simple inference-time strategy: framing the model\'s answer as user input during confidence elicitation. This approach significantly reduces overconfidence and improves calibration by up to 26% without the need for retraining, narrowing the gap between base and instruction-tuned models.', 'score': 3, 'issue_id': 2411, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '6885662987a1fe76', 'authors': ['Mario Sanz-Guerrero', 'Manuel Mager', 'Katharina von der Wense'], 'affiliations': ['Johannes Gutenberg University Mainz, Germany', 'University of Colorado Boulder, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.03437.jpg', 'data': {'categories': ['#inference', '#training'], 'emoji': '🎭', 'ru': {'title': 'Преодоление предвзятости: переформулирование ответов для улучшения калибровки моделей', 'desc': 'В этой работе исследуется проблема калибровки больших языковых моделей после инструкционной подстройки. Авторы обнаружили, что chat-шаблоны усиливают переоценку уверенности моделей через эффект «предвзятости собственности» — модели намного более уверены в своих ответах, чем в идентичных ответах пользователя. Через эксперименты на шести современных LLM-ах и трёх бенчмарках показано, что модели присваивают на 26% выше уверенность своим собственным ответам. Предложен простой метод на этапе инференса: переформулирование ответа модели как пользовательского ввода при оценке уверенности, что улучшает калибровку без переобучения.'}, 'en': {'title': 'Mitigating Overconfidence in Language Models through User Framing', 'desc': "This paper explores how instruction tuning affects the calibration of large language models (LLMs), revealing that these models become less reliable in their confidence assessments after being tuned. It identifies a problem called 'ownership bias,' where models show higher confidence in their own generated responses compared to identical responses from users. The authors conducted experiments on multiple LLMs and found that this bias can lead to a 26% increase in overconfidence. To address this issue, they propose a method of framing model outputs as user inputs during confidence evaluation, which significantly improves calibration without requiring retraining."}, 'zh': {'title': '提升语言模型校准的简单策略', 'desc': '本研究探讨了指令调优对大型语言模型（LLMs）校准的影响，发现指令调优会降低模型的校准能力。我们还发现，聊天模板通过“所有权偏见”加剧了这一问题，即模型对自己生成的答案表现出更高的自信。通过对六个开放权重的LLMs进行广泛实验，我们发现模型对自己答案的自信度比用户提供的相同答案高出26%。为了解决这个问题，我们提出了一种简单的推理策略：在评估自信度时将模型的答案视为用户输入，这样可以显著降低过度自信，提高校准效果。'}}}, {'id': 'https://huggingface.co/papers/2606.12203', 'title': 'Adaptive Multi-Resolution Procedural Knowledge Compression for Large Language Models', 'url': 'https://huggingface.co/papers/2606.12203', 'abstract': 'Abstract SKIM is an adaptive multi-resolution soft token compression framework that efficiently compresses procedural skills while maintaining task performance and enabling lightweight offline compression for frequently updated community skills.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) are widely used to tackle complex tasks with autonomous workflows. Recently, reusable natural language skills have emerged as a popular paradigm to inject procedural knowledge into LLM applications. Since popular skills are often invoked repeatedly, placing their full text in every context significantly increases prefill cost and latency. While text compression techniques have the potential to solve this problem, most existing methods are designed to compress factual knowledge in documents instead of procedural knowledge, making them insufficient for skill compression. In this paper, we argue that an effective skill compression method should: 1) preserve logical dependencies among workflows and tool protocols, 2) enable lightweight, offline compression for frequently updated community skills, and 3) be adaptable to varying complexities across skills. To address this, we present SKIM (SKIll coMpression), an adaptive multi-resolution soft token compression framework for procedural skills. Depending on the complexity of each skill, SKIM creates different numbers of soft tokens that not only improve the efficiency of LLM inference, but also preserve the effectiveness of skill usage. Experiments indicate that SKIM compresses skills to 30 to 60 percent of their original token length while preserving task performance better than existing compression methods.We have released our code at https://github.com/bebr2/SKIM .', 'score': 2, 'issue_id': 2412, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'aa9c9fe5b85265fb', 'authors': ['Changyue Wang', 'Weihang Su', 'Qingyao Ai', 'Yichen Tang', 'Runzhong Qiao', 'Xuancheng Li', 'Min Zhang', 'Yiqun Liu'], 'affiliations': ['Department of Computer Science and Technology, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.12203.jpg', 'data': {'categories': [], 'emoji': '🗜️', 'ru': {'title': 'Умное сжатие процедурных навыков для эффективной работы LLM', 'desc': 'SKIM — это адаптивный фреймворк для сжатия процедурных навыков, использующий мягкие токены разного разрешения. Метод сохраняет логические зависимости между рабочими процессами и протоколами инструментов, необходимые для правильного выполнения задач. Система позволяет эффективно сжимать часто используемые навыки до 30-60% исходной длины без снижения качества работы LLM. Подход поддерживает легкое офлайн-сжатие для часто обновляемых навыков из сообщества и адаптируется к разной сложности процедур.'}, 'en': {'title': 'Efficient Skill Compression for Enhanced LLM Performance', 'desc': 'SKIM is a novel framework designed for compressing procedural skills in large language models (LLMs) while maintaining their performance. It uses an adaptive multi-resolution approach to create soft tokens that vary in number based on the complexity of each skill, enhancing efficiency during inference. This method addresses the limitations of existing compression techniques that focus on factual knowledge rather than procedural knowledge. Experiments show that SKIM can reduce the token length of skills by 30 to 60 percent without sacrificing task effectiveness, making it suitable for frequently updated community skills.'}, 'zh': {'title': 'SKIM：高效压缩程序技能的自适应框架', 'desc': 'SKIM是一种自适应的多分辨率软令牌压缩框架，旨在高效压缩程序技能，同时保持任务性能。它能够实现轻量级的离线压缩，适用于频繁更新的社区技能。SKIM根据每个技能的复杂性生成不同数量的软令牌，从而提高大型语言模型的推理效率，并保持技能使用的有效性。实验表明，SKIM能够将技能压缩到原始令牌长度的30%到60%，并且在任务性能上优于现有的压缩方法。'}}}, {'id': 'https://huggingface.co/papers/2606.11786', 'title': 'Lius: Translation Model Based Instructional Lingustic Using Continual Instruction Tuning In Kupang Malay', 'url': 'https://huggingface.co/papers/2606.11786', 'abstract': 'Abstract Continual Instruction Tuning enables effective fine-tuning of large language models for low-resource language translation, achieving superior performance compared to standard instruction tuning and multilingual models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) offer new potential for translation tasks but often experience performance degradation when handling low-resource languages. To address this limitation, we propose an approach for fine-tuning LLMs on a low-resource language, Kupang Malay. Our approach involves designing a set of instructions by leveraging explicit lexical and semantic features from a bilingual dictionary, and introducing Continual Instruction Tuning (CIT), a training paradigm that enables iterative instruction-based training. Experimental results demonstrate that our model, named Lius, yields notable improvements over standard instruction-tuned models by outperforming 4-6 points, and surpassing both Neural Machine Translation (NMT) and Multilingual LLM models by 10-13 points on several evaluation metrics. These findings highlight the potential of our approach to mitigate the reliance on large-scale parallel data in low-resource language translation.', 'score': 2, 'issue_id': 2410, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '69f5b1dedda8c657', 'authors': ['Joanito Agili Lopo', 'Yunita Sari', 'Guntur Budi Herwanto'], 'affiliations': ['Department of Computer Science and Electronics Universitas Gadjah Mada'], 'pdf_title_img': 'assets/pdf/title_img/2606.11786.jpg', 'data': {'categories': ['#training', '#optimization', '#low_resource', '#multilingual', '#machine_translation'], 'emoji': '🌍', 'ru': {'title': 'Итеративная инструкционная настройка для перевода низкоресурсных языков', 'desc': 'В этой работе предложен метод Continual Instruction Tuning (CIT) для эффективной адаптации больших языковых моделей на задачу машинного перевода для языков с ограниченными ресурсами. Авторы разработали набор инструкций на основе лексических и семантических признаков из двуязычного словаря и применили итеративную парадигму обучения на примере языка Купанг-малайский. Полученная модель Lius показала значительные улучшения, превосходя стандартные инструкции для настройки на 4-6 баллов и нейронные системы машинного перевода на 10-13 баллов по различным метрикам оценки. Результаты демонстрируют, что подход CIT успешно снижает зависимость от больших объёмов параллельных данных при переводе языков с низкими ресурсами.'}, 'en': {'title': 'Enhancing Low-Resource Language Translation with Continual Instruction Tuning', 'desc': 'This paper presents a method called Continual Instruction Tuning (CIT) to improve the translation of low-resource languages using large language models (LLMs). The authors focus on translating Kupang Malay by creating specific instructions based on bilingual dictionary features. Their experimental results show that the Lius model, which uses CIT, significantly outperforms traditional instruction-tuned models and other multilingual models. This approach reduces the need for extensive parallel data, making it easier to translate languages with fewer resources.'}, 'zh': {'title': '持续指令调优：提升低资源语言翻译的利器', 'desc': '本论文提出了一种新的方法，称为持续指令调优（CIT），用于对大型语言模型进行微调，以提高低资源语言的翻译效果。我们专注于库旁马来语，通过利用双语词典中的词汇和语义特征设计指令集，来增强模型的翻译能力。实验结果表明，我们的模型Lius在多个评估指标上比标准指令调优模型提高了4-6个百分点，且在神经机器翻译和多语言模型上超越了10-13个百分点。此研究展示了在低资源语言翻译中，减少对大规模平行数据依赖的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.11553', 'title': 'APEX: A Network-Native Time-Series Foundation Model for Forecasting and Anomaly Detection for Wireless Edge Operations', 'url': 'https://huggingface.co/papers/2606.11553', 'abstract': 'Abstract Network-native transformer model APEX demonstrates superior forecasting performance for wireless network telemetry compared to existing foundation models and traditional methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generic time-series foundation models transfer poorly to wireless network telemetry whose signals are bursty, zero-inflated, and coupled across protocol layers. We present APEX, a network-native, decoder-only transformer for forecasting enterprise AP telemetry, and evaluate it on DHCP degradation as a representative network task. APEX is pre-trained on 10-channel multivariate telemetry from ~4,500 production wireless networks (~100K AP time series, 34 metrics per AP), and is available as APEX-Large (269M, cloud) and APEX-Edge (10.5M, edge). On a 192-step (4-day) DHCP degradation benchmark, APEX-Large reduces MAE by 18% over the strongest foundation-model baseline (Toto) and 38% over SARIMA, with anomaly-detection F1 = 0.93, while APEX-Edge enables sub-second, privacy-preserving inference on AP-class edge hardware. These results suggest network-native pre-training is a practical foundation for proactive wireless operations.', 'score': 1, 'issue_id': 2413, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '047a695cd9d6789a', 'authors': ['Swadhin Pradhan', 'Niloo Bahadori', 'Peiman Amini'], 'affiliations': ['Cisco Systems, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.11553.jpg', 'data': {'categories': ['#inference', '#training', '#architecture', '#small_models', '#benchmark', '#dataset', '#multimodal'], 'emoji': '📡', 'ru': {'title': 'Специализированный трансформер для точного прогнозирования сетевой телеметрии', 'desc': 'В статье представлена APEX — специализированная трансформер-модель, разработанная специально для прогнозирования телеметрии беспроводных сетей. Авторы показывают, что универсальные foundation models плохо адаптируются к особенностям сетевых сигналов, которые характеризуются скачкообразностью и нулевой инфляцией. APEX предварительно обучена на многоканальных временных рядах из 4500 производственных беспроводных сетей и представлена в двух версиях: облачной (269M параметров) и граничной (10.5M параметров). Модель превосходит существующие подходы на 18-38% по метрике MAE при прогнозировании деградации DHCP и достигает F1 = 0.93 для обнаружения аномалий.'}, 'en': {'title': 'APEX: Transforming Wireless Network Forecasting', 'desc': 'The paper introduces APEX, a transformer model specifically designed for forecasting in wireless network telemetry. Unlike traditional time-series models, APEX effectively handles the unique characteristics of network data, such as burstiness and zero-inflation. It is pre-trained on extensive telemetry data from thousands of production networks, allowing it to outperform existing models in accuracy and anomaly detection. The results indicate that APEX is a valuable tool for enhancing proactive management of wireless networks.'}, 'zh': {'title': 'APEX：无线网络遥测的预测新标准', 'desc': 'APEX是一种专为无线网络遥测设计的变换器模型，能够显著提高预测性能。与传统方法和现有基础模型相比，APEX在处理突发性、零膨胀和跨协议层耦合的信号时表现更佳。该模型在来自约4500个生产无线网络的多通道遥测数据上进行预训练，能够有效预测企业接入点的遥测数据。实验结果表明，APEX在DHCP降级基准测试中，MAE降低了18%，并且在边缘硬件上实现了快速且保护隐私的推理。'}}}, {'id': 'https://huggingface.co/papers/2606.12385', 'title': 'Which Models Are Our Models Built On? Auditing Invisible Dependencies in Modern LLMs', 'url': 'https://huggingface.co/papers/2606.12385', 'abstract': "Abstract ModSleuth is an agentic system that recursively reconstructs large-scale dependency graphs for LLM development by analyzing public artifacts and resolving inconsistencies in documentation and artifact identities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern LLM training pipelines increasingly rely on other models to generate data, filter corpora, judge outputs, and guide development decisions. These dependencies are recursive: a model may depend on an upstream artifact whose own dependencies are documented only in separate releases and artifacts. As a result, the full dependency structure is fragmented across heterogeneous public artifacts, with complexity and recursive depth far outpacing humans' ability to trace. We introduce ModSleuth, an agentic system that recursively reconstructs LLM dependency graphs from public artifacts with source-grounded evidence. We find that the primary challenge is no longer information extraction, but defining what constitutes a dependency and reconciling artifact references across inconsistent documentation. We address these challenges through a formalization that distinguishes direct and indirect dependencies, represents heterogeneous pipeline roles through operation-centered relationships, and resolves artifact identities across names, versions, and repositories. Applying ModSleuth to four public-artifact-rich LLM releases, we recover 1,060 source-verified dependencies and construct large-scale dependency graphs of modern LLM development. These graphs reveal multi-hop license obligations, train-evaluation coupling, discrepancies between released and training-time artifacts, and documentation inconsistencies that would otherwise be difficult to uncover. We release ModSleuth and the resulting dependency graphs to support transparent analysis of the increasingly complex ecosystems underlying modern LLMs.", 'score': 1, 'issue_id': 2414, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '6f550e9254e6f611', 'authors': ['Sanjay Adhikesaven', 'Haoxiang Sun', 'Sewon Min'], 'affiliations': ['Allen Institute for AI', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.12385.jpg', 'data': {'categories': [], 'emoji': '🕵️', 'ru': {'title': 'Детективная система для раскрытия скрытых зависимостей в экосистеме LLM', 'desc': 'ModSleuth — это агентная система, которая автоматически восстанавливает сложные графы зависимостей между моделями и артефактами в процессе разработки LLM, анализируя публичные источники. Система решает проблему фрагментации информации: зависимости моделей рассредоточены по разным версиям, репозиториям и документации, что затрудняет их отслеживание. Авторы формализуют понятие зависимостей, различая прямые и косвенные связи, и разрешают противоречия в идентификации артефактов через их имена и версии. При применении к четырём крупным проектам система обнаружила более 1000 проверенных зависимостей и выявила скрытые проблемы: лицензионные обязательства, утечки информации между этапами обучения и тестирования.'}, 'en': {'title': 'Unraveling the Complexity of LLM Dependencies with ModSleuth', 'desc': 'ModSleuth is a system designed to analyze and reconstruct the complex dependency graphs involved in the development of large language models (LLMs). It addresses the challenge of fragmented information across various public artifacts by identifying both direct and indirect dependencies among them. The system formalizes relationships between different components in the LLM training pipeline, helping to resolve inconsistencies in documentation and artifact identities. By applying ModSleuth, researchers can uncover hidden dependencies and discrepancies, promoting transparency in the evolving landscape of LLM development.'}, 'zh': {'title': 'ModSleuth：重建语言模型的依赖关系图', 'desc': 'ModSleuth 是一个智能系统，能够递归重建大型依赖图，以支持大规模语言模型（LLM）的开发。它通过分析公共文档和解决文档及工件身份的不一致性，来识别和整理模型之间的依赖关系。该系统的主要挑战在于定义依赖关系的标准，并协调不同文档中的工件引用。通过对直接和间接依赖的形式化区分，ModSleuth 能够恢复源验证的依赖关系，并构建现代 LLM 开发的大规模依赖图。'}}}, {'id': 'https://huggingface.co/papers/2606.11482', 'title': 'Building Social World Models with Large Language Models', 'url': 'https://huggingface.co/papers/2606.11482', 'abstract': "Abstract Social World Model framework captures evolution of social beliefs in response to events through temporal pattern mining and evidence lower bound optimization without explicit human annotations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Understanding and predicting how social beliefs evolve in response to events -- from policy changes to scientific breakthroughs -- remains a fundamental challenge in social science. Given LLMs' commonsense knowledge and social intelligence, we ask: Can LLMs model the dynamics of social beliefs following social events? In this work, we introduce the concept of the Social World Model (SWM), a general framework designed to capture how social beliefs evolve in response to major events. SWM learns state-transition functions for social beliefs by mining temporal patterns in social data and optimizing the evidence lower bound, without the need for explicit human annotations linking events to belief shifts, or for expensive census data. To evaluate SWM, we introduce a benchmark, SWM-bench, derived from real-world prediction markets, specifically Kalshi and Polymarket. SWM-bench includes over 12k data points for social belief prediction tasks spanning diverse domains such as politics, finance, and cryptocurrency. Our experimental results show that SWM significantly outperforms time-series foundation models, achieving state-of-the-art results on Kalshi data and demonstrating competitive performance on Polymarket data, while offering interpretable insights into the underlying mechanisms of social belief dynamics.", 'score': 1, 'issue_id': 2414, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '44238dbde0fb9cce', 'authors': ['Haofei Yu', 'Yining Zhao', 'Guanyu Lin', 'Jiaxuan You'], 'affiliations': ['Carnegie Mellon University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.11482.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#dataset', '#science', '#training', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Моделирование эволюции социальных убеждений через паттерн-майнинг и вариационное обучение', 'desc': 'В работе представляется фреймворк Social World Model (SWM), который моделирует эволюцию социальных убеждений в ответ на события. Модель обучается функциям переходов состояний, используя временное паттерн-майнинг и оптимизацию вариационной нижней границы без явных человеческих аннотаций. Для оценки качества введен бенчмарк SWM-bench с более чем 12 тысячами примеров из реальных рынков предсказаний в областях политики, финансов и криптовалют. Экспериментальные результаты демонстрируют превосходство SWM над временными фундаментальными моделями с интерпретируемыми выводами о механизмах динамики социальных убеждений.'}, 'en': {'title': 'Modeling Social Beliefs: The Evolution Framework', 'desc': 'The Social World Model (SWM) framework aims to understand how social beliefs change in response to significant events without needing human annotations. It utilizes temporal pattern mining to learn how beliefs transition over time and optimizes the evidence lower bound for better predictions. SWM is evaluated using a benchmark called SWM-bench, which includes a large dataset from real-world prediction markets. The results show that SWM outperforms traditional time-series models and provides insights into the dynamics of social beliefs across various domains.'}, 'zh': {'title': '社会信念演变的智能模型', 'desc': '社会世界模型框架通过时间模式挖掘和证据下界优化，捕捉社会信念在事件响应中的演变，而无需明确的人类注释。该模型旨在理解和预测社会信念如何在政策变化和科学突破等重大事件后演变。社会世界模型（SWM）通过挖掘社会数据中的时间模式，学习社会信念的状态转移函数，并优化证据下界。实验结果表明，SWM在社交信念预测任务中显著优于传统的时间序列基础模型，提供了对社会信念动态机制的可解释性见解。'}}}, {'id': 'https://huggingface.co/papers/2606.10587', 'title': 'Towards Diverse Scientific Hypothesis Search with Large Language Models', 'url': 'https://huggingface.co/papers/2606.10587', 'abstract': 'Abstract Evolutionary framework for hypothesis generation that improves diversity and quality through multi-temperature sampling and information exchange across search levels.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) are on the rise for accelerating scientific discovery, most recently in advanced tasks such as generating valid scientific hypotheses. Yet in many discovery settings, the goal is not to identify a single best hypothesis since validation can be noisy and expensive, and scientists benefit from a set of high-quality alternative hypotheses that hedge against downstream uncertainty for the best solutions. Nevertheless, commonly used evolutionary search recipes tend to prioritize optimization over exploration in hypothesis generation, and the resulting selection pressure during the search process leads to diversity collapse. Motivated by these limitations, we formulate hypothesis search as a sampling problem, where the objective is to efficiently produce diverse, high-quality hypotheses under a fixed validation budget. Building on this perspective, we propose \\ours, an evolutionary framework inspired by the classical parallel tempering algorithm that searches hypotheses at multiple temperature levels and enables principled information exchange across temperatures to improve exploration without disrupting convergence. Across domains including molecular discovery, equation discovery, and algorithm discovery, our approach consistently improves both hypothesis quality and diversity under the same validation budget, and produces candidates that remain robust under more expensive downstream computational validations.', 'score': 1, 'issue_id': 2413, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '7faaf2bf3b82ca64', 'authors': ['Haorui Wang', 'Parshin Shojaee', 'Kazem Meidani', 'Kunyang Sun', 'José Miguel Hernández-Lobato', 'Teresa Head-Gordon', 'Jiajun He', 'Chandan K. Reddy', 'Chao Zhang', 'Yuanqi Du'], 'affiliations': ['Carnegie Mellon University', 'Georgia Institute of Technology', 'Microsoft Research New England', 'University of California, Berkeley', 'University of Cambridge', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2606.10587.jpg', 'data': {'categories': ['#science', '#training', '#architecture', '#reasoning', '#optimization'], 'emoji': '🧬', 'ru': {'title': 'Разнообразие гипотез через мультитемпературный эволюционный поиск', 'desc': 'В работе предлагается эволюционный фреймворк для генерации научных гипотез с использованием LLM, который формулирует задачу поиска как задачу семплирования. Метод вдохновлен алгоритмом параллельного отжига и проводит поиск гипотез на нескольких уровнях температур, обеспечивая информационный обмен между уровнями. Подход улучшает как качество, так и разнообразие генерируемых гипотез в рамках фиксированного бюджета валидации. Метод демонстрирует эффективность на различных задачах: молекулярное открытие, обнаружение уравнений и открытие алгоритмов.'}, 'en': {'title': 'Enhancing Hypothesis Generation with Diverse Evolutionary Sampling', 'desc': 'This paper presents a new evolutionary framework for generating scientific hypotheses that enhances both diversity and quality. It addresses the common issue in hypothesis generation where the focus on optimization can lead to a lack of variety, known as diversity collapse. By treating hypothesis search as a sampling problem, the authors introduce a method that utilizes multi-temperature sampling and allows for information exchange across different search levels. The proposed approach shows significant improvements in generating high-quality and diverse hypotheses across various scientific domains while adhering to a fixed validation budget.'}, 'zh': {'title': '多样性与质量并重的假设生成框架', 'desc': '本文提出了一种进化框架，用于生成假设，旨在通过多温度采样和跨搜索层级的信息交流来提高假设的多样性和质量。当前，科学发现中常常需要一组高质量的替代假设，而不仅仅是单一最佳假设。传统的进化搜索方法往往过于关注优化，导致假设生成过程中的多样性崩溃。我们的方法通过将假设搜索视为一个采样问题，能够在固定的验证预算下高效地产生多样且高质量的假设。'}}}, {'id': 'https://huggingface.co/papers/2606.10156', 'title': 'τ-Rec: A Verifiable Benchmark for Agentic Recommender Systems', 'url': 'https://huggingface.co/papers/2606.10156', 'abstract': 'Abstract A benchmark for agentic recommender systems is introduced that uses verifiable rewards and controlled dialogue constraints to evaluate conversational agent reliability, revealing significant performance gaps among leading models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As recommender systems transition toward agentic, multi-turn conversational interfaces, evaluation paradigms have struggled to keep pace. Current benchmarks often rely on "LLM-as-a-judge" evaluations, which introduce subjectivity, high costs and inconsistency. We present τ-Rec, a benchmark for agentic recommender systems that replaces subjective evaluation with verifiable rewards and a reveal-tagged elicitation (RTE) mechanism that controls how task constraints surface during dialogue. By testing agents against structured catalog predicates and employing a pass^k reliability metric, τ-Rec provides a systematic test for consistent reasoning. Our evaluation of nine configurations across five model families -- GPT-5.4, Claude Sonnet 4.6, Gemini 2.5 Flash, DeepSeek V4 Flash, Qwen3-32B and GPT-5 mini -- reveals a steep reliability cliff, where even the best model achieves only ~57% at pass^1 and ~38% at pass^4, highlighting a critical gap in current conversational agent deployment. All code and data are publicly available at https://github.com/nbharaths/tau-rec.', 'score': 1, 'issue_id': 2412, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'ef7d9b3d3218ee46', 'authors': ['Bharath Sivaram Narasimhan', 'Karthik R Narasimhan'], 'affiliations': ['Independent Researcher', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2606.10156.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '📊', 'ru': {'title': 'Верифицируемые награды для надёжной оценки диалоговых рекомендательных агентов', 'desc': 'В работе представлен τ-Rec — бенчмарк для оценки агентных рекомендательных систем, который заменяет субъективные оценки на основе LLM на верифицируемые награды и механизм управления ограничениями диалога. Авторы используют структурированные предикаты каталога и метрику pass^k надёжности для систематического тестирования консистентного рассуждения агентов. Оценка девяти конфигураций пяти семейств моделей выявила критический разрыв в производительности: даже лучшие модели достигают только ~57% при pass^1 и ~38% при pass^4. Результаты показывают серьёзные проблемы в надёжности современных диалоговых агентов для рекомендательных систем.'}, 'en': {'title': 'Bridging the Reliability Gap in Conversational Agents with τ-Rec', 'desc': 'This paper introduces τ-Rec, a new benchmark designed to evaluate agentic recommender systems using verifiable rewards and controlled dialogue constraints. It addresses the limitations of current evaluation methods that rely on subjective assessments from large language models (LLMs), which can be inconsistent and costly. By implementing a reveal-tagged elicitation mechanism and structured catalog predicates, τ-Rec allows for a more systematic and objective evaluation of conversational agents. The study reveals significant performance gaps among leading models, with the best achieving only about 57% reliability, indicating a need for improvement in conversational agent technology.'}, 'zh': {'title': '智能推荐系统的可靠性新基准', 'desc': '本文介绍了一种新的基准测试τ-Rec，用于评估智能推荐系统的可靠性。该基准通过可验证的奖励和受控对话约束，替代了主观评估方法，解决了现有评估的高成本和不一致性问题。研究显示，在对九种不同模型配置进行测试时，最佳模型的可靠性仅为57%（pass^1）和38%（pass^4），揭示了当前对话代理系统部署中的显著性能差距。所有代码和数据均可在公开平台获取。'}}}, {'id': 'https://huggingface.co/papers/2601.05212', 'title': 'FlowLet: Conditional 3D Brain MRI Synthesis using Wavelet Flow Matching', 'url': 'https://huggingface.co/papers/2601.05212', 'abstract': "Abstract FlowLet is a conditional generative framework that synthesizes age-conditioned 3D MRIs using flow matching in an invertible 3D wavelet domain, improving brain age prediction performance for underrepresented age groups.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Brain Magnetic Resonance Imaging (MRI) plays a central role in studying neurological development, aging, and diseases. One key application is Brain Age Prediction (BAP), which estimates an individual's biological brain age from MRI data. Effective BAP models require large, diverse, and age-balanced datasets, whereas existing 3D MRI datasets are demographically skewed, limiting fairness and generalizability. Acquiring new data is costly an
