    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.07708', 'title': 'Accurate, Interdisciplinary and Transparent Structure-property Understanding with Deep Native Structural Reasoning', 'url': 'https://huggingface.co/papers/2607.07708', 'abstract': 'Abstract SciReasoner is a multimodal scientific foundation model that enables interpretable structural reasoning across proteins, molecules, and crystals by discretizing structural elements into a unified vocabulary for enhanced prediction and scientific inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Structure-property relationships are foundational to biology, chemistry and materials science, where function, reactivity and physical response emerge from spatial, chemical and periodic organization. Mechanistically explaining these relationships requires interpreting structural evidence through scientific principles and physical constraints, from stereochemistry and bonding to symmetry, energetics and periodic order. However, applying artificial intelligence to this process presents a joint challenge of representation and reasoning: models must preserve domain-native structural information while showing how specific evidence supports predictions under these constraints. Here we introduce SciReasoner, a multimodal scientific foundation model for native structural reasoning across proteins, small molecules and inorganic crystals. SciReasoner discretizes coordinates, topologies and periodic connectivities into a unified structure-aware vocabulary, treating structural tokens as addressable evidence units during reasoning. In homology-controlled Gene Ontology prediction, SciReasoner improves Cellular Component annotation for low-homology and orphan-like proteins, increasing F_{max} from 0.42 to 0.55. In chemistry, it raises single-step retrosynthesis accuracy from 0.63 to 0.72 while generating fragment-level disconnection and precursor-verification traces. In materials science, its representations separate elemental and compound phases and resolve high- and low-band-gap regimes. Across 86 benchmarks, SciReasoner achieves state-of-the-art performance on 67 tasks. Double-blind expert evaluation rates its reasoning traces as preferred or at least comparable to those of a frontier large language model in 98% of cases. By making structure an inspectable substrate for reasoning under scientific constraints, SciReasoner connects accurate prediction with interpretable scientific inference.', 'score': 70, 'issue_id': 2604, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '8363cd358aac1a83', 'authors': ['Chen Tang', 'Yizhou Wang', 'Jianyu Wu', 'Lintao Wang', 'Shixiang Tang', 'Pengze Li', 'Encheng Su', 'Jun Yao', 'Jiabei Xiao', 'Yuqi Shi', 'Jielan Li', 'Hongxia Hao', 'Zhangyang Gao', 'Fang Wu', 'Ben Fei', 'Xiangyu Yue', 'Pan Tan', 'Bozitao Zhong', 'Jinouwen Zhang', 'Aoran Wang', 'Yan Lu', 'Jiaheng Liu', 'Xinzhu Ma', 'Liang Hong', 'Mingyue Zheng', 'Phil Torr', 'Bowen Zhou', 'Wanli Ouyang', 'Lei Bai'], 'affiliations': ['Fudan University', 'Nanjing University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Institute of Materia Medica, Chinese Academy of Sciences', 'Shanghai Jiao Tong University', 'Stanford University', 'The Chinese University of Hong Kong', 'The University of Science and Technology of China', 'University of Chinese Academy of Sciences', 'University of Oxford', 'University of Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2607.07708.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#architecture', '#benchmark', '#open_source', '#reasoning', '#science'], 'emoji': '🧬', 'ru': {'title': 'Структура как основа для интерпретируемых научных рассуждений', 'desc': 'SciReasoner — это мультимодальная научная фундаментальная модель, которая дискретизирует структурные элементы белков, молекул и кристаллов в единый словарь для интерпретируемого структурного рассуждения. Модель сохраняет важную доменную информацию о структурах и демонстрирует, как конкретные признаки поддерживают предсказания, подчиняясь научным принципам и физическим ограничениям. SciReasoner достигает высокой производительности на 67 из 86 тестовых задач, включая предсказание аннотаций генов, ретросинтез молекул и классификацию материалов. Эксперты оценили результаты модели как предпочтительные или сопоставимые с frontier LLM в 98% случаев благодаря интерпретируемым трассам рассуждений.'}, 'en': {'title': 'Unlocking Scientific Insights through Structural Reasoning', 'desc': 'SciReasoner is a multimodal foundation model designed to enhance scientific reasoning by interpreting structural data from proteins, molecules, and crystals. It achieves this by converting structural elements into a unified vocabulary, allowing for better predictions and scientific insights. The model excels in various domains, improving annotation accuracy in biology and chemistry, and effectively distinguishing between different material phases in materials science. With state-of-the-art performance across numerous benchmarks, SciReasoner not only predicts outcomes but also provides interpretable reasoning that aligns with scientific principles.'}, 'zh': {'title': 'SciReasoner：连接科学推理与准确预测的模型', 'desc': 'SciReasoner 是一种多模态科学基础模型，能够在蛋白质、分子和晶体之间进行可解释的结构推理。它通过将结构元素离散化为统一的词汇，增强了预测和科学推理的能力。该模型在基因本体预测、化学反应和材料科学中表现出色，显著提高了准确性。SciReasoner 通过将结构视为可检视的推理基础，连接了准确预测与可解释的科学推理。'}}}, {'id': 'https://huggingface.co/papers/2607.07608', 'title': 'Dual Latent Memory in Vision-Language-Action Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2607.07608', 'abstract': 'Abstract LaMem-VLA introduces a latent-memory-native framework that integrates historical experience into vision-language-action reasoning through coordinated memory components operating in the same latent space.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mainstream Vision-Language-Action (VLA) models predict actions primarily from the current observation under a Markovian assumption, thus struggling with long-horizon, temporally dependent tasks. Existing memory-augmented VLAs either expand the observation window or retrieve history from the memory bank as auxiliary policy-side context. However, they leave memory outside the native latent embedding space of VLA reasoning, preventing historical experience from being fluidly interleaved with multimodal reasoning and action formation. To this end, we introduce LaMem-VLA, a latent-memory-native framework that reconstructs historical experience into latent memory tokens and directly interweaves them with VLA reasoning. At its core, LaMem-VLA introduces four coordinated components: (i) a curator that organizes historical experience into two complementary short-term and long-term memory vaults; (ii) a seeker that queries both vaults using the multimodal cognition to retrieve context-relevant evidence; (iii) a condenser that reconstructs the retrieved evidence into compact short-term and long-term latent memory tokens; and (iv) a weaver that injects these memory tokens with the current observation and instruction into one continuous embedding sequence. By representing, retrieving, and consuming historical experience entirely in the same continuous latent space, LaMem-VLA enables memory to directly participate in VLA reasoning and guide action generation under a bounded context. Extensive experiments on SimplerEnv and LIBERO demonstrate the superiority of our LaMem-VLA.', 'score': 44, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '4260145f557b0252', 'authors': ['Hongyu Qu', 'Jianzhe Gao', 'Xiaobin Hu', 'Shaohuan Yang', 'Xinlei Yu', 'Rui Yan', 'Wenguan Wang', 'Xiangbo Shu', 'Shuicheng Yan'], 'affiliations': ['Nanjing University of Science and Technology', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07608.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#long_context', '#reasoning', '#agents', '#robotics'], 'emoji': '🧠', 'ru': {'title': 'Память в сердце VLA: встраивание исторического опыта в латентное пространство рассуждений', 'desc': 'В статье представляется LaMem-VLA — фреймворк для моделей Vision-Language-Action (VLA), который интегрирует исторический опыт напрямую в скрытое пространство рассуждений. Основная проблема состоит в том, что стандартные VLA модели работают под марковским предположением и предсказывают действия только из текущего наблюдения, что затрудняет решение долгосрочных задач. Предложенная система содержит четыре взаимодействующих компонента: куратор для организации памяти, сиквер для поиска релевантной информации, кондензер для сжатия опыта в токены и вивер для их встраивания в единую последовательность. Эксперименты показывают, что прямое участие памяти в латентном пространстве VLA значительно улучшает качество предсказания действий на долгих горизонтах.'}, 'en': {'title': 'Integrating Memory for Enhanced Vision-Language-Action Reasoning', 'desc': "LaMem-VLA is a new framework that enhances vision-language-action (VLA) reasoning by integrating historical experiences directly into the reasoning process. It uses a coordinated memory system that operates within the same latent space, allowing for a seamless blend of past experiences with current observations. The framework includes components that organize, retrieve, and reconstruct memories, making them readily available for decision-making. This approach improves the model's ability to handle complex tasks that require understanding of both immediate and historical context."}, 'zh': {'title': '历史经验与推理的完美结合', 'desc': 'LaMem-VLA提出了一种潜在记忆原生框架，通过协调的记忆组件将历史经验融入视觉-语言-行动推理中。该框架解决了现有模型在处理长期依赖任务时的不足，能够在同一潜在空间中流畅地交织历史经验与多模态推理。LaMem-VLA的核心包括四个协调组件：策展人、探寻者、凝聚者和编织者，分别负责组织历史经验、检索相关证据、重构记忆和注入当前观察。通过在连续的潜在空间中表示和利用历史经验，LaMem-VLA使得记忆能够直接参与推理过程，指导行动生成。'}}}, {'id': 'https://huggingface.co/papers/2607.07675', 'title': 'Scaling Mixture-of-Experts Video Pretraining for Embodied Intelligence', 'url': 'https://huggingface.co/papers/2607.07675', 'abstract': 'Abstract LingBot-Video presents a DiT-based video pretraining framework with Mixture-of-Experts architecture, specialized data augmentation, and multi-dimensional reward system for embodied intelligence applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite the recent promise in robot control, video generative models suffer from a domain mismatch due to their primary focus on content creation. For example, their design inherently prioritizes visual fidelity and creativity over computational efficiency and physical realism. In this work, we present LingBot-Video, a DiT-based video pretraining paradigm specifically tailored for embodied intelligence. From the architecture perspective, we adopt the Mixture-of-Experts (MoE), instead of dense, framework to achieve a better trade-off between modeling capacity and inference efficiency, and manage to scale it up from scratch. From the data perspective, we construct a data profiling engine that augments standard internet videos with extensive robot-oriented footage, encompassing manipulation, navigation, and egocentric perspectives, to equip the base model with an intrinsic understanding of actions and world dynamics. From the training perspective, we develop a multi-dimensional reward system to enforce the alignment regarding physical rationality and task completion, going beyond standard criteria such as aesthetics, prompt-following, and motion consistency. Comprehensive evaluations validate its performance and efficiency as a video foundation model. We contribute LingBot-Video as the inaugural large-scale, open-source MoE video foundation model to the community, in a pioneering effort to bridge digital creativity and physical actuation.', 'score': 39, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'd4086358994a5dbe', 'authors': ['Shuailei Ma', 'Jiaqi Liao', 'Xinyang Wang', 'Jingjing Wang', 'Chaoran Feng', 'Zijing Hu', 'Chong Bao', 'Zichen Xi', 'Yuqi Gan', 'Weisen Wang', 'Yanhong Zeng', 'Qin Zhao', 'Zifan Shi', 'Wei Wu', 'Hao Ouyang', 'Qiuyu Wang', 'Shangzhan Zhang', 'Jiahao Shao', 'Yipengjing Sun', 'Liangxiao Hu', 'Lunke Pan', 'Nan Xue', 'Kecheng Zheng', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Ka Leong Cheng'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07675.jpg', 'data': {'categories': ['#architecture', '#dataset', '#video', '#robotics', '#training'], 'emoji': '🤖', 'ru': {'title': 'Видеофундаментальная модель для воплощённого интеллекта роботов', 'desc': 'LingBot-Video — это предварительно обученная модель для генерации видео на основе архитектуры DiT с использованием смеси экспертов (Mixture-of-Experts), разработанная специально для задач воплощённого интеллекта и управления робототехникой. В отличие от стандартных видеомоделей, ориентированных на творческий контент, эта система оптимизирована на физическую реалистичность и вычислительную эффективность благодаря архитектуре MoE вместо плотных слоёв. Авторы создали специализированный движок для аугментации данных, дополняющий интернет-видео роботизированными кадрами с манипуляциями, навигацией и эгоцентрическими представлениями. Система обучается с использованием многомерной системы вознаграждений, которая обеспечивает физическую рациональность и выполнение задач, превосходя традиционные критерии эстетики и согласованности движений.'}, 'en': {'title': 'Bridging Digital Creativity with Physical Intelligence', 'desc': 'LingBot-Video introduces a novel video pretraining framework that utilizes a DiT architecture combined with a Mixture-of-Experts (MoE) design to enhance efficiency and modeling capacity for embodied intelligence tasks. This framework addresses the limitations of existing video generative models by focusing on physical realism and computational efficiency rather than just visual quality. It incorporates specialized data augmentation techniques that enrich standard videos with robot-centric content, allowing the model to better understand actions and environmental dynamics. Additionally, a multi-dimensional reward system is implemented to ensure that the model aligns with physical rationality and task completion, marking a significant advancement in the development of video foundation models for robotics.'}, 'zh': {'title': 'LingBot-Video：连接数字创意与物理执行的桥梁', 'desc': 'LingBot-Video 是一个基于 DiT 的视频预训练框架，采用混合专家架构，专注于增强体智能应用。该框架通过构建数据分析引擎，利用丰富的机器人相关视频来提升模型对动作和世界动态的理解。训练过程中，开发了多维奖励系统，以确保物理合理性和任务完成度的对齐。LingBot-Video 作为首个大规模开源的混合专家视频基础模型，为数字创意与物理执行之间架起了桥梁。'}}}, {'id': 'https://huggingface.co/papers/2607.07534', 'title': 'Infinite Worlds with Versatile Interactions', 'url': 'https://huggingface.co/papers/2607.07534', 'abstract': 'Abstract An advanced world modeling system with extended interaction capabilities, real-time processing, diverse interactive elements, and multi-agent behavior control for collaborative virtual environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present LingBot-World 2.0 (also known as LingBot-World-Infinity), an advanced iteration of LingBot-World featuring four distinct upgrades. (1) Our model achieves an unbounded interaction horizon while maintaining consistent output quality, benefiting from a carefully crafted causal pretraining paradigm. (2) Through distilling a real-time variant from the base model, our system guarantees rapid response time, sufficient to drive 720p video streams at 60 fps. (3) Compared to the previous version, this update introduces highly diverse interactive elements, comprising a broader spectrum of actions (e.g., attacking, archery, spell-casting, and shooting) alongside a richer variety of text-driven events. (4) We pioneer the integration of an agentic harness within the domain of world modeling, wherein a pilot agent is tasked with planning and executing character behaviors, while a director agent is responsible for synthesizing novel environmental elements as the scene progresses. Additionally, to facilitate a shared experience, we develop an interface that permits multiple players to simultaneously immerse themselves in this vivid world simulator. We pair our primary 14B model with a lightweight 1.3B counterpart, which supports effortless deployment on a single GPU.', 'score': 21, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '9d84744c34237508', 'authors': ['Zelin Gao', 'Qiuyu Wang', 'Jiapeng Zhu', 'Jingye Chen', 'Zichen Liu', 'Qingyan Bai', 'Jiahao Wang', 'Yufeng Yuan', 'Hanlin Wang', 'Yichong Lu', 'Ka Leong Cheng', 'Haojie Zhang', 'Jian Gao', 'Tianrui Feng', 'Yuzheng Liu', 'Yao Yao', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Hao Ouyang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07534.jpg', 'data': {'categories': ['#small_models', '#multimodal', '#video', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Бесконечные миры в реальном времени: агентное моделирование с неограниченным взаимодействием', 'desc': 'В статье представлена LingBot-World 2.0 — продвинутая система моделирования виртуальных миров с четырьмя ключевыми улучшениями. Модель достигает неограниченного горизонта взаимодействия при сохранении качества благодаря специально разработанной причинно-следственной предварительной тренировке. Система обеспечивает обработку в реальном времени, генерируя видеопотоки 720p при 60 fps за счет дистилляции облегченного варианта. В архитектуре введена агентная система с пилот-агентом для планирования действий персонажей и режиссер-агентом для синтеза окружающей среды, поддерживающая мультиагентное сотрудничество в общей виртуальной среде.'}, 'en': {'title': 'Empowering Collaborative Virtual Worlds with LingBot-World 2.0', 'desc': 'The paper introduces LingBot-World 2.0, an enhanced world modeling system designed for collaborative virtual environments. It features an unbounded interaction horizon and maintains high output quality through a causal pretraining approach. The system supports real-time processing, allowing it to handle 720p video at 60 fps, and includes a variety of interactive elements for richer user experiences. Additionally, it employs a multi-agent architecture where one agent plans character behaviors and another creates dynamic environmental elements, enabling multiple users to engage simultaneously.'}, 'zh': {'title': '无限交互，生动虚拟世界的未来', 'desc': 'LingBot-World 2.0 是一个先进的世界建模系统，具有扩展的交互能力和实时处理功能。该系统通过精心设计的因果预训练范式，实现了无限的交互视野，并保持输出质量的一致性。与之前的版本相比，这个更新引入了多样化的交互元素，包括更广泛的动作和丰富的文本驱动事件。我们还开发了一个多玩家接口，使多个用户能够同时沉浸在这个生动的虚拟世界中。'}}}, {'id': 'https://huggingface.co/papers/2607.04434', 'title': 'RoboDojo: A Unified Sim-and-Real Benchmark for Comprehensive Evaluation of Generalist Robot Manipulation Policies', 'url': 'https://huggingface.co/papers/2607.04434', 'abstract': 'Abstract RoboDojo presents a unified sim-and-real benchmark for evaluating generalist robot manipulation policies across diverse tasks and evaluation dimensions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist robot manipulation policies have advanced rapidly, yet existing benchmarks remain limited in systematically evaluating their capabilities. Many rely on simple, short-horizon, or skill-narrow tasks with limited capability coverage, and are often conducted only in simulation or only in the real world. Simulation enables scalable feedback but misses physical deployment challenges, while real-world evaluation is costly, time-consuming, and difficult to reproduce. We introduce RoboDojo, a unified sim-and-real benchmark for comprehensive evaluation of generalist robot manipulation policies. RoboDojo includes 42 simulation tasks and 18 real-world tasks covering diverse and complementary manipulation capabilities. The simulation benchmark evaluates five dimensions: generalization, memory, precision, long-horizon execution, and open-vocabulary instruction following, while the real-world benchmark exposes policies to challenging physical-world deployment conditions. RoboDojo supports scalable evaluation through heterogeneous parallel simulation in Isaac Sim and provides RoboDojo-RealEval, a reproducible real-world evaluation system with remote cloud access, standardized hardware, scene reset, evaluation protocol, and deployment interface. Together with XPolicyLab, policies can be integrated once and evaluated across simulation and real-world settings with minimal adaptation. We integrate 30 policies into XPolicyLab and evaluate them on RoboDojo, establishing a public leaderboard and systematic analysis of current policy performance. The website is available at http://robodojo-benchmark.com/.', 'score': 6, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '30aeccef8021ca46', 'authors': ['Tianxing Chen', 'Yue Chen', 'Zixuan Li', 'Junyuan Tang', 'Kailun Su', 'Haoran Lu', 'Weijie Wan', 'Baijun Chen', 'Songling Liu', 'Haowen Yan', 'Honghao Su', 'Zhiyang Dou', 'Kaixuan Wang', 'Dandan Zhang', 'Yunze Liu', 'Yan Qin', 'Qiwei Liang', 'Qiwei Wu', 'Zijian Lin', 'Wenwei Lin', 'Yuran Wang', 'Minghua He', 'Tianshu Wu', 'Ruihai Wu', 'Jingquan Zhou', 'Kai-Chong Lei', 'Haibao Yu', 'Yuanfeng Ji', 'Weiyang Jin', 'Guanyu Lin', 'Xiaofan Li', 'Qi Xiong', 'Renjing Xu', 'Zhongyu Li', 'Wenhao Chai', 'Enze Xie', 'Ziwei Wang', 'Yao Mu', 'Hao Dong', 'Wojciech Matusik', 'Mingyu Ding', 'Wenbo Ding', 'Ping Luo', 'Masayoshi Tomizuka'], 'affiliations': ['CMU', 'CUHK', 'HKUST (GZ)', 'IC', 'MIT', 'MMLab@HKU', 'NTU', 'NU', 'NUS', 'PKU', 'Princeton', 'SJTU', 'Stanford', 'THU', 'UC Berkeley', 'UNC', 'Yale', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2607.04434.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единый бенчмарк для оценки робот-манипуляторов от симуляции к реальности', 'desc': 'RoboDojo — это единый симуляционный и реальный бенчмарк для оценки обобщённых политик манипуляции роботов на разнообразных задачах. Бенчмарк включает 42 симуляционные и 18 реальные задачи, оценивающие способности обобщения, память, точность, выполнение долгосрочных инструкций и следование естественным командам. Система RoboDojo-RealEval обеспечивает воспроизводимую оценку в реальном мире с доступом через облако, стандартизированным оборудованием и протоколами, решая проблему дороговизны и сложности реальных экспериментов. Интеграция 30 политик и публичный лидерборд позволяют систематически анализировать производительность и прогресс в области манипуляционных политик.'}, 'en': {'title': 'RoboDojo: Bridging Simulations and Real-World Robot Evaluation', 'desc': 'RoboDojo is a new benchmark designed to evaluate robot manipulation policies in both simulated and real-world environments. It addresses the limitations of existing benchmarks by providing a comprehensive set of tasks that cover a wide range of manipulation capabilities. The benchmark includes 42 simulation tasks and 18 real-world tasks, assessing dimensions like generalization, precision, and long-horizon execution. By integrating policies into XPolicyLab, RoboDojo allows for scalable evaluation and comparison across different settings, facilitating advancements in robot manipulation research.'}, 'zh': {'title': 'RoboDojo：统一的机器人操作评估平台', 'desc': 'RoboDojo是一个统一的模拟与真实基准，用于评估通用机器人操作策略在多样任务和评估维度上的表现。现有的基准测试往往局限于简单或短期任务，无法全面评估机器人的能力。RoboDojo包含42个模拟任务和18个真实任务，涵盖多种操作能力，并提供了五个评估维度。通过异构并行模拟和可重复的真实评估系统，RoboDojo支持大规模评估，促进了机器人策略在不同环境中的应用。'}}}, {'id': 'https://huggingface.co/papers/2607.07386', 'title': 'Sparse Delta Memory: Scaling the State of Linear RNNs through Sparsity', 'url': 'https://huggingface.co/papers/2607.07386', 'abstract': 'Abstract Sparse Delta Memory extends gated linear RNNs with sparse addressing to dramatically increase hidden state capacity for improved long-context learning and retrieval while maintaining computational efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Linear attention models allow a fixed state size and a fixed amount of compute per token. However, due to their limited state size, linear attention models fall behind in long-context recall compared to softmax-attention-based transformer architectures. Increasing the state size of linear attention improves recall performance but at the cost of higher FLOPs. In this work, we introduce Sparse Delta Memory (SDM), an architecture that scales the hidden state of gated linear RNNs to orders of magnitude higher capacity using a sparse addressing scheme. SDM extends the Gated DeltaNet architecture by replacing the dense key-value outer product with sparse reads and writes to a large explicit memory. We show that, under an isoFLOP constraint and with an identical number of parameters, a higher state memory capacity significantly improves performance on in-context learning and long-context retrieval tasks. Moreover, by learning the initial state of the SDM memory and therefore using it as a parametric memory, we show that the model further improves on a wide range of common-knowledge and reasoning tasks.', 'score': 4, 'issue_id': 2606, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'e4f9d4baa623c3ea', 'authors': ['Loïc Cabannes', 'Pierre-Emmanuel Mazaré', 'Gergely Szilvasy', 'Matthijs Douze', 'Maria Lomeli', 'Ilze Amanda Auzina', 'Justin Carpentier', 'Gabriel Synnaeve', 'Hervé Jégou'], 'affiliations': ['ENS-PSL University', 'Inria Paris', 'Meta FAIR', 'University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2607.07386.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Расширенная память для линейных RNN через разреженную адресацию', 'desc': 'В работе предлагается Sparse Delta Memory (SDM) — архитектура, которая расширяет линейные рекуррентные нейросети с гейтингом за счёт разреженной адресации памяти, позволяя увеличить ёмкость скрытого состояния в разы. В отличие от стандартных линейных моделей внимания, которые используют плотное произведение ключей и значений, SDM применяет разреженные операции чтения и записи в большую явную память. При одинаковом количестве вычислений (FLOPs) и параметров модель достигает значительного улучшения в задачах долгоконтекстного обучения и извлечения информации. Кроме того, изучение начального состояния памяти позволяет использовать SDM как параметрическую память, что повышает производительность на различных задачах рассуждения и знаний.'}, 'en': {'title': 'Unlocking Long-Context Learning with Sparse Delta Memory', 'desc': 'Sparse Delta Memory (SDM) enhances gated linear RNNs by incorporating a sparse addressing mechanism, which allows for a much larger hidden state capacity. This improvement enables better long-context learning and retrieval without significantly increasing computational costs. Unlike traditional linear attention models that struggle with long-context recall, SDM maintains efficiency while boosting performance on various tasks. Additionally, by learning the initial state of the memory, SDM acts as a parametric memory, further enhancing its capabilities in common-knowledge and reasoning tasks.'}, 'zh': {'title': '稀疏增量记忆：提升长上下文学习的利器', 'desc': '稀疏增量记忆（SDM）是一种扩展门控线性RNN的新架构，旨在提高长上下文学习和检索的能力，同时保持计算效率。通过稀疏寻址机制，SDM显著增加了隐藏状态的容量，克服了线性注意力模型在长上下文回忆中的局限性。与传统的密集键值外积不同，SDM采用稀疏读写方式，利用大规模显式内存来提升性能。研究表明，在相同的计算量和参数数量下，SDM在上下文学习和长上下文检索任务中表现更佳。'}}}, {'id': 'https://huggingface.co/papers/2607.06838', 'title': 'WildCity: A Real-World City-Scale Testbed for Rendering, Simulation, and Spatial Intelligence', 'url': 'https://huggingface.co/papers/2607.06838', 'abstract': 'Abstract WildCity presents a large-scale multimodal dataset for urban navigation and spatial representation, enabling research into AI systems that can perceive and reason about city-scale environments similar to human cognitive capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Humans can navigate an unfamiliar city and gradually form a coherent spatial mental map spanning tens of square kilometers. Can AI build spatial representations at a comparable scale? Although recent foundation models have advanced scene reconstruction and embodied intelligence, scaling to entire cities remains an open challenge, primarily due to the lack of city-scale data. To bridge the gap, we introduce WildCity, a real-world multimodal dataset collected by autonomous fleets traversing complex urban environments. Our dataset includes 18 trajectories, each averaging 83.7 kilometers in length, and preserves the core challenges of in-the-wild perception, e.g., dynamic objects, lighting variations, and imperfect camera poses. We further establish an urban-tailored reconstruction baseline and convert the reconstructed environments into a closed-loop simulator. Beyond the dataset and baseline, we systematically analyze the key challenges on the path to simulation-ready urban digital twins: scalability, extrapolation, and uncertainty. Ultimately, WildCity aims to catalyze progress not only in city-scale rendering, but more broadly in the pursuit of AI that can perceive, remember, and reason across space at a scale comparable to human cognition. Project page: https://han-xiangyu.github.io/Wild-City/', 'score': 4, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '9c6125052d8526f6', 'authors': ['Xiangyu Han', 'Mengyu Yang', 'Jiaqi Li', 'Bowen Chang', 'Ziyu Chen', 'Hexu Zhao', 'Rahul Kumar Agrawal', 'Anthony Rodriguez', 'Fiona Hua', 'Marco Pavone', 'Chen Feng', 'Yiming Li'], 'affiliations': ['May Mobility', 'NVIDIA', 'New York University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06838.jpg', 'data': {'categories': [], 'emoji': '🏙️', 'ru': {'title': 'Обучение ИИ пространственному мышлению в масштабе целого города', 'desc': 'WildCity — это крупномасштабный мультимодальный датасет для изучения навигации и пространственного представления городских сред на уровне целого города. Датасет содержит 18 траекторий общей длиной более 1500 км, собранные с помощью автономных транспортных средств в реальных городских условиях с учётом сложностей реального восприятия. Авторы установили исходный уровень для реконструкции среды и создали замкнутый симулятор для работы с восстановленными окружениями. Исследование систематически анализирует ключевые вызовы для создания городских цифровых двойников: масштабируемость, экстраполяция и неопределённость в данных.'}, 'en': {'title': 'Empowering AI to Navigate Cities Like Humans', 'desc': "WildCity is a comprehensive dataset designed to enhance AI's ability to understand and navigate urban environments like humans do. It consists of extensive multimodal data collected from autonomous vehicles traveling through cities, capturing various challenges such as dynamic objects and changing lighting conditions. The dataset includes 18 long trajectories, allowing researchers to develop and test AI models for city-scale spatial reasoning and representation. By addressing issues like scalability and uncertainty, WildCity aims to advance the creation of digital twins of urban areas, facilitating better AI perception and reasoning capabilities."}, 'zh': {'title': 'WildCity：推动城市规模AI认知的进步', 'desc': 'WildCity是一个大规模的多模态数据集，旨在支持城市导航和空间表示的研究。该数据集由自主车队在复杂城市环境中收集，包含18条轨迹，平均长度为83.7公里。它保留了真实环境中的核心挑战，如动态物体、光照变化和摄像头姿态不完美。WildCity的目标是推动AI在城市规模的渲染和空间认知方面的进展，使其能够像人类一样感知、记忆和推理。'}}}, {'id': 'https://huggingface.co/papers/2606.30111', 'title': 'Automating the Design of Embodied Agent Architectures', 'url': 'https://huggingface.co/papers/2606.30111', 'abstract': 'Abstract Automated agent architecture search demonstrates potential for improving embodied agent performance while revealing challenges related to optimization signals, local optima, and credit assignment in simulation-based training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied agents are typically built as hand-designed compositions of perception, memory, planning, and action modules. This modularity exposes a large architectural design space, but current systems still rely on researcher intuition to choose where information is stored, how observations are processed, and how model calls are connected. Agent Architecture Search (AAS) automates such design for text-domain agents, but has not been systematically evaluated on perceptual embodied agents through simulator rollouts. We study this transfer. We introduce AgentCanvas, a typed-graph runtime that hosts embodied executors as editable node-and-wire programs with simulator-aware execution and episode-level logs, and KDLoop, a coding-agent search procedure that cycles through proposal, critique, experiment, and distillation, with triggered reflection after stalls. We evaluate three AAS variants across four embodied executors spanning vision-language navigation, embodied question answering, and language-conditioned manipulation. The resulting 3x4 matrix shows that architecture-level search can produce deployable and directional success-rate gains on embodied tasks, while one apparent high-scoring candidate is rejected as leak-bearing. At the same time, the experiments expose constraints that are muted in text-domain AAS: optimization signals can be masked by rollout noise, search can become trapped in local edit basins, and episode-level credit assignment only partially emerges even when detailed logs are available. These results characterize both the promise and the current limits of automated architecture search for embodied agents.', 'score': 4, 'issue_id': 2606, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'd5bfe9e24f2d6b0b', 'authors': ['Jian Zhou', 'Sihao Lin', 'Jin Li', 'Shuai Fu', 'Gengze Zhou', 'Qi Wu'], 'affiliations': ['Australian Institute for Machine Learning, University of Adelaide, SA, Australia'], 'pdf_title_img': 'assets/pdf/title_img/2606.30111.jpg', 'data': {'categories': ['#agents', '#robotics', '#cv', '#architecture', '#optimization', '#leakage'], 'emoji': '🤖', 'ru': {'title': 'Автоматический поиск архитектуры для воплощённых агентов: возможности и ограничения', 'desc': 'В статье исследуется автоматический поиск архитектуры агентов (AAS) для воплощённых агентов, которые взаимодействуют с окружением через симуляторы. Авторы предлагают AgentCanvas — типизированную граф-среду для редактирования архитектур агентов как программ с узлами и связями, а также KDLoop — процедуру поиска на основе кодирующего агента с циклами предложения, критики, экспериментов и дистилляции. Они оценивают три варианта AAS на четырёх разных задачах: навигация на основе видения и языка, ответы на вопросы и манипуляция объектами, обнаруживая как потенциалы для улучшения производительности, так и серьёзные ограничения — маскировку сигналов оптимизации шумом симуляции, попадание в локальные оптимумы и проблемы с назначением заслуг на уровне эпизодов.'}, 'en': {'title': 'Automating Agent Design for Better Performance', 'desc': 'This paper explores the use of automated agent architecture search (AAS) to enhance the performance of embodied agents, which are systems that interact with the physical world. The authors introduce AgentCanvas, a framework that allows for the design and testing of agent architectures in a simulation environment, and KDLoop, a method for iteratively improving these architectures. The study evaluates various AAS approaches on tasks like vision-language navigation and embodied question answering, revealing that while AAS can lead to improved performance, it also faces challenges such as optimization noise and local optima. Overall, the findings highlight both the potential benefits and the limitations of using automated methods for designing embodied agent architectures.'}, 'zh': {'title': '自动化架构搜索：具身代理的未来与挑战', 'desc': '这篇论文探讨了自动化代理架构搜索在提升具身代理性能方面的潜力，同时揭示了与优化信号、局部最优和信用分配相关的挑战。研究者们提出了AgentCanvas，一个支持可编辑节点和连接的图形运行时，以及KDLoop，一个循环进行提案、批评、实验和提炼的编码代理搜索程序。通过对三种AAS变体在四种具身执行器上的评估，结果显示架构级搜索能够在具身任务上实现可部署的成功率提升。尽管如此，实验也暴露了在文本领域AAS中不明显的限制，如优化信号可能被噪声掩盖，搜索可能陷入局部编辑盆地，以及即使有详细日志，回合级信用分配也仅部分显现。'}}}, {'id': 'https://huggingface.co/papers/2607.07508', 'title': 'Single-Rollout Asynchronous Optimization for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2607.07508', 'abstract': 'Abstract Asynchronous reinforcement learning with single-rollout optimization addresses stability issues in LLM training for complex tasks, outperforming existing methods in coding and reasoning benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) is becoming increasingly important for post-training large language models (LLMs). Previous RL pipelines for LLMs were mostly synchronous and batch-interleaved, which is inefficient for long-horizon agentic tasks. Recently, asynchronous RL has emerged as a more efficient alternative by updating the model as rollouts arrive. However, existing asynchronous RL systems often emphasize throughput, while leaving training stability and task effectiveness largely underexplored. For example, a key challenge is that group-wise sampling in the widely-used GRPO framework does not naturally fit asynchronous agentic training. In this paper, we present Single-rollout Asynchronous Optimization (SAO) to address the stability and off-policy challenges in asynchronous RL. To reduce off-policy effects and improve generalization, we replace group-wise sampling with single-rollout sampling, that is, using one rollout per prompt. We further improve this single-rollout strategy with practical value-model training designs. To improve optimization stability, we introduce a strict double-side token-level clipping strategy. SAO is able to train stably for one thousand steps and consistently outperform GRPO and its variants on agentic coding and reasoning benchmarks, such as SWE-Bench Verified, BeyondAIME, and IMOAnswerBench. We also demonstrate that single-rollout RL is particularly effective in a simulated online learning setting, where the model must adapt to changing evolving environments. To this end, SAO is successfully deployed in the agentic RL pipeline for training the open GLM-5.2 model (750B-A40B).', 'score': 3, 'issue_id': 2606, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'cdd9cf0fdd089529', 'authors': ['Zhenyu Hou', 'Yujiang Li', 'Jie Tang', 'Yuxiao Dong'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07508.jpg', 'data': {'categories': ['#reasoning', '#agents', '#benchmark', '#optimization', '#training', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Одиночный rollout — стабильное и эффективное асинхронное обучение LLM', 'desc': 'Статья представляет метод Single-rollout Asynchronous Optimization (SAO) для обучения больших языковых моделей с помощью reinforcement learning. Авторы решают проблемы нестабильности в асинхронном обучении, заменяя групповую выборку на единичные rollouts и применяя двусторонний token-level clipping для стабилизации оптимизации. Метод демонстрирует лучшие результаты по сравнению с существующими подходами на бенчмарках для задач кодирования и математического рассуждения, таких как SWE-Bench и IMOAnswerBench. SAO успешно применяется для обучения модели GLM-5.2 и показывает особую эффективность в условиях динамично меняющихся окружений.'}, 'en': {'title': 'Stability and Efficiency in Asynchronous RL for LLMs', 'desc': 'This paper introduces Single-rollout Asynchronous Optimization (SAO) to enhance the stability and effectiveness of asynchronous reinforcement learning (RL) for large language models (LLMs). Traditional RL methods often struggle with stability during training, especially for complex tasks, but SAO uses single-rollout sampling to minimize off-policy effects and improve generalization. The authors also implement a double-side token-level clipping strategy to further stabilize optimization. As a result, SAO outperforms existing methods like GRPO in various coding and reasoning benchmarks, demonstrating its effectiveness in dynamic learning environments.'}, 'zh': {'title': '单回合异步优化：提升大语言模型训练的稳定性与效率', 'desc': '本文提出了一种新的异步强化学习方法，称为单回合异步优化（SAO），旨在解决大语言模型（LLM）训练中的稳定性问题。与传统的同步方法相比，SAO通过每个提示使用单个回合采样来提高训练效率和泛化能力。为了增强优化的稳定性，本文还引入了一种严格的双侧令牌级裁剪策略。实验结果表明，SAO在编码和推理基准测试中表现优于现有的GRPO及其变体，能够在动态环境中有效适应。'}}}, {'id': 'https://huggingface.co/papers/2607.06624', 'title': 'AgentLens: Production-Assessed Trajectory Reviews for Coding Agent Evaluation', 'url': 'https://huggingface.co/papers/2607.06624', 'abstract': 'Abstract  We present AgentLens, a production-assessed benchmark for interactive code agents. Most code-agent benchmarks reduce a run to a single bit -- did the task pass? -- but the people who actually use these agents experience the entire trajectory: how the agent follows instructions, uses its tools, verifies its own work, recovers from mistakes, and talks to them along the way. AgentLens evaluates that whole trajectory. It pairs formal verification, where an objective check exists, with LLM-written trajectory reviews and side-by-side comparisons, so that each run yields a readable explanation of why the score is what it is. This makes AgentLens useful for more than ranking models: we use it to diagnose model behavior, compare successive versions of our own agent, and catch product regressions in a nightly evaluation pipeline. We release the benchmark as open source at https://github.com/agent-lens/agent-lens-bench.', 'score': 3, 'issue_id': 2607, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '20c3194bd2576d47', 'authors': ['Andrey Podivilov', 'Vadim Lomshakov', 'Sergey Savin', 'Matvei Startsev', 'Roman Pozharskiy', 'Maksim Parshin', 'Sergey Nikolenko'], 'affiliations': ['Explyt', 'St. Petersburg Department of the Steklov Institute of Mathematics', 'St. Petersburg State University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06624.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Оценка интерактивных агентов по всей траектории выполнения, а не только по финальному результату', 'desc': 'Авторы представляют AgentLens — бенчмарк для оценки интерактивных code-агентов, разработанный на основе реальных производственных требований. В отличие от традиционных бенчмарков, которые сводят результат к бинарному результату (прошло/не прошло), AgentLens анализирует всю траекторию выполнения: как агент следует инструкциям, использует инструменты, проверяет свою работу, восстанавливается после ошибок и взаимодействует с пользователем. Метрики объединяют формальную верификацию с оценками, написанными LLM, и сравнениями, обеспечивая каждый запуск детальным объяснением полученной оценки. Бенчмарк полезен не только для ранжирования моделей, но и для диагностики поведения агентов, сравнения версий и отслеживания регрессий в production.'}, 'en': {'title': 'Evaluating the Full Journey of Code Agents with AgentLens', 'desc': "AgentLens is a new benchmark designed to evaluate interactive code agents by assessing their entire performance trajectory rather than just a pass/fail outcome. It combines formal verification methods with reviews generated by large language models (LLMs) to provide detailed explanations of the agent's actions and decisions throughout the task. This comprehensive evaluation helps in diagnosing model behavior, comparing different versions of the agent, and identifying regressions in product performance. By making AgentLens open source, the authors aim to enhance the development and assessment of code agents in the machine learning community."}, 'zh': {'title': '全面评估交互式代码代理的工具', 'desc': 'AgentLens 是一个用于交互式代码代理的基准测试工具。与传统的基准测试只关注任务是否通过不同，AgentLens 评估整个执行过程，包括代理如何遵循指令、使用工具、验证工作、从错误中恢复以及与用户的互动。它结合了形式验证和大型语言模型生成的轨迹评审，提供了可读的解释，帮助用户理解评分的原因。AgentLens 不仅用于模型排名，还用于诊断模型行为、比较不同版本的代理以及在夜间评估管道中捕捉产品回归。'}}}, {'id': 'https://huggingface.co/papers/2607.03723', 'title': 'OmniTacTune: Policy-Agnostic Real-World RL for Tactile Residual Adaptation of Visual Policies', 'url': 'https://huggingface.co/papers/2607.03723', 'abstract': 'Abstract OmniTacTune enables efficient adaptation of tactile feedback to visual robot policies through a two-stage reinforcement learning approach that improves success rates in contact-rich manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual policies learned from human videos, teleoperation, and robot demonstrations offer scalable motion priors, but often fail in contact-rich manipulation, where success significantly depends on local force and contact geometry. Tactile sensing provides these complementary signals, yet tactile data remain costly to collect and hard to generalize across sensors, robots, and tasks. We introduce OmniTacTune, a policy-agnostic real-world RL pipeline that adapts tactile feedback to pretrained visual policies through residual correction. OmniTacTune uses a two-stage design: it first bootstraps tactile-aware learning from autonomous base-policy rollouts, then learns a lightweight tactile residual policy through online interaction. Extensive experiments show that OmniTacTune generalizes across diverse contact-rich tasks, visual base policies, and tactile representations. Across four real-world contact-rich tasks, it improves visual base policies from 5-40% success to 85-100% within 40-80 minutes, demonstrating an efficient path for adapting tactile feedback to scalable visual robot policies. Project page: https://colinyu1.github.io/omnitactune-site/', 'score': 3, 'issue_id': 2608, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '98e8fb1861ad9fdc', 'authors': ['Kelin Yu', 'Haode Zhang', 'Harish Ravichandar', 'Yunhai Han', 'Ruohan Gao'], 'affiliations': ['Georgia Institute of Technology', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.03723.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Тактильное чутье для роботов: улучшение визуальных политик через ощущение контакта', 'desc': 'OmniTacTune представляет метод эффективной адаптации тактильной обратной связи к визуальным политикам робота через двухэтапный подход обучения с подкреплением. Система решает проблему того, что визуальные политики, обученные на видео и демонстрациях, часто не справляются с манипуляциями, требующими точного контроля контакта и силовых взаимодействий. Авторы предлагают использовать остаточную коррекцию, которая дополняет предобученную визуальную политику легкой тактильной компонентой, обученной через прямое взаимодействие с роботом. Экспериментальные результаты показывают, что метод повышает успешность выполнения контактных манипуляционных задач с 5-40% до 85-100% всего за 40-80 минут обучения.'}, 'en': {'title': 'Enhancing Robot Manipulation with Tactile Feedback', 'desc': 'OmniTacTune is a novel reinforcement learning framework designed to enhance tactile feedback for visual robot policies, particularly in tasks that involve physical contact. It employs a two-stage approach where the first stage utilizes existing visual policies learned from various human demonstrations, while the second stage focuses on refining these policies with tactile data through a lightweight residual policy. This method addresses the challenges of collecting and generalizing tactile data across different robots and tasks. The results show significant improvements in task success rates, demonstrating the effectiveness of integrating tactile feedback into visual-based robotic manipulation.'}, 'zh': {'title': '高效适应触觉反馈的机器人策略', 'desc': 'OmniTacTune 是一种高效的强化学习方法，能够将触觉反馈适应于视觉机器人策略，从而提高在接触丰富的操作任务中的成功率。该方法通过两阶段的设计，首先从自主基础策略的回放中引导触觉感知学习，然后通过在线交互学习轻量级的触觉残差策略。尽管触觉数据的收集成本高且难以跨传感器、机器人和任务进行泛化，OmniTacTune 仍然能够在多种接触丰富的任务中实现良好的泛化效果。实验表明，该方法能够将视觉基础策略的成功率从5-40%提升至85-100%。'}}}, {'id': 'https://huggingface.co/papers/2607.04939', 'title': 'Teaching LLMs a Low-Resource Language: Enhancing Code Completion in Pharo', 'url': 'https://huggingface.co/papers/2607.04939', 'abstract': "Abstract Large language models can be adapted for low-resource programming languages through specialized training pipelines and benchmarks, achieving superior code completion performance compared to general-purpose models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) unlocked new possibilities in automated code writing, becoming the backbone of most code completion tools. While LLMs excel in mainstream languages, they often lack support for the so-called low-resource languages where training data is scarce. As a result, these languages lag behind in the quality of code completion tooling available to their communities. A concrete example is Pharo, a Smalltalk-inspired language whose IDE currently offers only single-token completion. In this work, we report on our experience bringing LLM-based code completion to Pharo. First, we describe an end-to-end pipeline that combines Pharo-specific data curation, continued pre-training and fine-tuning of open code LLMs. Second, we introduce a set of Pharo code completion benchmarks designed to evaluate whether models (i) learn Pharo's syntax and (ii) accurately complete masked Pharo code from real-world GitHub repositories. Third, we show empirically that Pharo-specialized models substantially outperform their original base checkpoints and also exceed the accuracy of substantially larger code LLMs on Pharo completion. Overall, our case study demonstrates the feasibility of bringing strong LLM-based code completion to low-resource programming languages, with models small enough to provide ``real-time'' in-IDE support.", 'score': 2, 'issue_id': 2604, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'e2852eaacf4174d7', 'authors': ['Kilian Kier', 'Alessandro Giagnorio', 'Omar AbedelKader', 'Oleksandr Zaitsev', 'Robert Peharz', 'Romain Robbes', 'Gabriele Bavota', 'Stéphane Ducasse'], 'affiliations': ['CIRAD, UMR SENS', 'CNRS, University of Bordeaux Bordeaux INP, LaBRI, UMR5800', 'Graz University of Technology', 'Lifeware SA', 'Software Institute USI Università della Svizzera italiana', 'Univ. Lille, Inria, CNRS, Centrale Lille UMR 9189 CRIStAL'], 'pdf_title_img': 'assets/pdf/title_img/2607.04939.jpg', 'data': {'categories': ['#training', '#low_resource', '#dataset', '#transfer_learning', '#data', '#benchmark', '#open_source', '#plp'], 'emoji': '🎯', 'ru': {'title': 'Мощное дополнение кода для языков программирования с малым объёмом данных', 'desc': 'В статье описывается подход к адаптации больших языковых моделей для низкоресурсных языков программирования на примере языка Pharo. Авторы разработали специализированный pipeline, включающий подготовку данных, дальнейшее предварительное обучение и fine-tuning открытых моделей для кодирования. Они создали набор бенчмарков для оценки способности модели изучать синтаксис Pharo и корректно завершать код из реальных репозиториев. Экспериментальные результаты показали, что специализированные модели значительно превосходят базовые модели и крупные универсальные LLM на задачах завершения кода на Pharo, обеспечивая при этом достаточно быстрый вывод для встроенной поддержки в IDE.'}, 'en': {'title': 'Empowering Low-Resource Languages with Tailored LLMs for Code Completion', 'desc': "This paper discusses how large language models (LLMs) can be effectively adapted for low-resource programming languages, specifically focusing on Pharo. It outlines a specialized training pipeline that includes data curation, continued pre-training, and fine-tuning of LLMs to improve code completion performance. The authors also introduce benchmarks to assess the models' understanding of Pharo's syntax and their ability to complete code accurately. The results show that these tailored models significantly outperform general-purpose LLMs, providing efficient in-IDE support for developers using low-resource languages."}, 'zh': {'title': '为低资源编程语言赋能：Pharo的代码补全新突破', 'desc': '本研究探讨了如何将大型语言模型（LLMs）应用于低资源编程语言，特别是Pharo语言。通过专门的数据整理、继续预训练和微调，研究团队成功提升了Pharo的代码补全性能。我们还设计了一套Pharo代码补全基准，以评估模型对Pharo语法的学习能力和代码补全的准确性。结果表明，针对Pharo优化的模型在代码补全方面显著优于原始模型，并且在实时IDE支持中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.05966', 'title': 'Imagined Rollouts are Kinematic, Not Dynamic: A Diagnosis of Long-Horizon World-Model Failure', 'url': 'https://huggingface.co/papers/2607.05966', 'abstract': "Abstract World models exhibit long-horizon failures due to kinematic rather than dynamic imagination, as demonstrated by measuring imagined kinematic-consistency error which remains flat while policy rewards collapse across friction boundaries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-horizon failure in world models is conventionally attributed to compounding error, a generic framing that does not distinguish what kind of error compounds. We propose a kinematic-vs-dynamic reframing: world models tend to imagine kinematically rather than dynamically. We operationalize this as the imagined Kinematic-Consistency Error, a per-step diagnostic that measures how far a rollout departs from a closed-form kinematic null, paired with a perturbation protocol that tests whether iKCE responds when physical conditions cross a regime boundary. We instantiate the diagnostic on a released DreamerV3 checkpoint trained on DMC walker-walk, where imagined iKCE runs roughly two orders of magnitude above that of matched real-physics rollouts. Across a friction sweep that crosses the gait-collapse boundary, the model's iKCE stays statistically flat even as the trained policy's reward collapses through the same range, providing the kinematic-not-dynamic signature. The diagnostic distinguishes kinematic from dynamic imagination at horizons longer than the embodiment's gait period.", 'score': 1, 'issue_id': 2606, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'c4ab3b0fb38f5a90', 'authors': ['Finn Rasmus Schäfer', 'Korbinian Moller', 'Yuan Gao', 'Christian Oefinger', 'Sebastian Schmidt', 'Johannes Betz'], 'affiliations': ['Autonomous Vehicle Systems Lab Technical University of Munich', 'Data Analytics and Machine Learning Group Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2607.05966.jpg', 'data': {'categories': ['#training', '#benchmark', '#robotics'], 'emoji': '🚶', 'ru': {'title': 'Мировые модели воображают движение, но не физику', 'desc': 'Исследование показывает, что мировые модели в reinforcement learning терпят неудачи на длительных горизонтах не из-за накопления ошибок, а потому что они воображают кинематику, а не динамику систем. Авторы предлагают метрику imagined Kinematic-Consistency Error (iKCE) для диагностики этой проблемы, которая измеряет отклонение от закрытой кинематической модели на каждом шаге. Проведённые эксперименты на модели DreamerV3 показали, что при изменении коэффициента трения через критическую границу значение iKCE остаётся стабильным, в то время как награда агента резко падает. Таким образом, диагностика позволяет различать кинематическое и динамическое воображение в world models и объясняет причины долгосрочных отказов в моделировании.'}, 'en': {'title': 'Kinematic vs. Dynamic: Unraveling World Model Failures', 'desc': "This paper discusses the limitations of world models in machine learning, particularly their tendency to fail over long time horizons due to kinematic errors rather than dynamic ones. The authors introduce a new metric called the imagined Kinematic-Consistency Error (iKCE) to measure how accurately a model's predictions align with kinematic principles. They demonstrate that while the model's performance drops significantly when faced with changes in physical conditions, the iKCE remains stable, indicating a failure to adapt dynamically. This research highlights the importance of distinguishing between kinematic and dynamic errors in improving the robustness of world models."}, 'zh': {'title': '运动学与动力学：长时间预测的关键区别', 'desc': '本论文探讨了世界模型在长时间预测中的失败，主要是由于运动学而非动力学的想象。我们提出了一种新的诊断方法，称为运动学一致性误差（iKCE），用于衡量模型在预测中与真实物理的偏差。研究表明，在跨越摩擦边界时，模型的iKCE保持平稳，而训练的策略奖励却显著下降，这表明模型在长时间预测中更倾向于运动学想象。通过这种方法，我们能够区分运动学和动力学的想象，特别是在超出身体步态周期的长时间范围内。'}}}, {'id': 'https://huggingface.co/papers/2607.06309', 'title': 'Token-Based Dual-view Fusion and Adaptation of Large Vision Models for Breast Cancer Classification', 'url': 'https://huggingface.co/papers/2607.06309', 'abstract': 'Abstract A token-centric dual-view learning framework unifies prompt-based adaptation and cross-view fusion in a frozen vision transformer to improve breast cancer classification from mammography images.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accurate breast cancer classification from mammography requires effective integration of complementary information from craniocaudal (CC) and mediolateral oblique (MLO) views, which provide a more complete characterization of breast abnormalities. However, existing multi-view learning approaches typically rely on feature-level aggregation or single-stage cross-attention, which can entangle view-specific and shared representations and restrict interaction to limited network depths. To address these limitations, we propose a token-centric dual-view learning framework that unifies prompt-based adaptation and cross-view fusion within a frozen vision transformer backbone. The framework reformulates inter-view interaction as structured token-level communication, where dedicated fusion tokens explicitly encode bidirectional information exchange between CC and MLO views via cross-attention, serving as intermediate carriers of cross-view dependencies rather than relying on direct feature fusion. Unlike conventional methods that apply fusion at a single layer, fusion modules are inserted at multiple transformer depths, enabling progressive and repeated interaction across the encoder hierarchy. Fusion tokens are reintegrated into the token sequence and refined by subsequent transformer layers, facilitating hierarchical propagation of complementary information while preserving view-specific structure. Experiments on VinDr-Mammo and CMMD datasets demonstrate consistent improvements over linear probing, prompt-only adaptation, and conventional fusion baselines. On the VinDr-Mammo BI-RADS classification task, the framework achieves 50.40% F1-score and 0.8090 AUC, including a 0.10 AUC improvement over a dual-view fusion baseline in the binary setting. Ablation studies further validate the effectiveness of token-based fusion and multi-depth interaction design.', 'score': 0, 'issue_id': 2608, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'a6ff81775bd26fe1', 'authors': ['Aysan Ghayouri Pirsoltan', 'Shima Babakordi', 'Mohammad Reza Mohammadi'], 'affiliations': ['School of Computer Engineering, Iran University of Science and Technology, Tehran, Iran'], 'pdf_title_img': 'assets/pdf/title_img/2607.06309.jpg', 'data': {'categories': ['#training', '#architecture', '#healthcare', '#multimodal', '#cv'], 'emoji': '🔗', 'ru': {'title': 'Двухвидовой трансформер с многоуровневым токен-центрическим слиянием для диагностики рака груди', 'desc': 'Предложен новый подход для классификации рака груди на маммографических снимках, использующий замороженный vision transformer с механизмом адаптации на основе промптов и многоуровневого взаимодействия между двумя проекциями груди (CC и MLO). Ключевая инновация заключается в использовании специальных токенов для кодирования информационного обмена между двумя видами через cross-attention на нескольких слоях трансформера, что позволяет постепенно распространять дополняющую информацию иерархически. Модель преодолевает ограничения существующих методов многовидового обучения, которые применяют слияние на одном уровне и могут перепутать специфичные для вида и общие представления. Экспериментальные результаты на датасетах VinDr-Mammo и CMMD показывают значительное улучшение по сравнению с базовыми методами адаптации и слияния признаков.'}, 'en': {'title': 'Enhancing Breast Cancer Detection with Dual-View Learning', 'desc': 'This paper presents a novel token-centric dual-view learning framework aimed at enhancing breast cancer classification from mammography images. It integrates prompt-based adaptation and cross-view fusion within a frozen vision transformer, allowing for better interaction between different imaging views (CC and MLO). By using structured token-level communication, the framework facilitates a more effective exchange of information between views, overcoming limitations of traditional methods that often mix view-specific and shared features. The proposed approach shows significant performance improvements on breast cancer classification tasks, demonstrating the advantages of multi-depth interaction and dedicated fusion tokens.'}, 'zh': {'title': '以令牌为中心的双视图学习提升乳腺癌分类', 'desc': '这篇论文提出了一种以令牌为中心的双视图学习框架，旨在提高乳腺癌的分类准确性。该框架结合了基于提示的适应和跨视图融合，利用冻结的视觉变换器来处理乳腺X光图像。通过在多个变换器深度插入融合模块，框架实现了视图间的结构化令牌级通信，促进了信息的双向交换。实验结果表明，该方法在多个数据集上优于传统的融合方法，显著提高了分类性能。'}}}, {'id': 'https://huggingface.co/papers/2607.00302', 'title': 'Wake up for Touch! Mask-isolated Tactile Alignment Learning in MLLMs', 'url': 'https://huggingface.co/papers/2607.00302', 'abstract': 'Abstract Splash is a mask-isolated tactile alignment learning framework that enables multimodal LLMs to acquire tactile sensing capabilities without sacrificing vision-language reasoning through selective parameter updating that prevents catastrophic forgetting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Touch supplies the physical grounding needed to perceive intrinsic material properties, such as friction and compliance, that vision alone often cannot resolve. Recent efforts for equipping multimodal LLMs with this tactile sense, however, expose a zero-sum trade-off: the limited parameter budget of compact models forces a choice between acquiring the new sensory modality and preserving the established vision-language reasoning. We present Splash, a mask-isolated tactile alignment learning framework for MLLMs. Splash quantifies the significance of each pretrained parameter, and partitions the parameter space into a dormant and critical subspace. While the frozen critical subspace acts as a stable anchor to safeguard general visual knowledge, Splash updates the isolated dormant subspace to internalize tactile alignment towards LLMs. This selective, non-destructive expansion effectively prevents catastrophic forgetting and ensures non-destructive modality expansion. Extensive experiments show that Splash effectively achieves tactile reasoning without additional inference overhead in the LLM part, demonstrating state-of-the-art performance on visuo-tactile benchmarks, including SSVTP, TVL, and TacQuad, while preserving its original general-purpose capabilities.', 'score': 0, 'issue_id': 2606, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '4ca6bcfa5eb0028b', 'authors': ['Yoonhyung Park', 'Minji Kim', 'Sungwon Moon', 'Jiyoung Lee'], 'affiliations': ['Ewha Womans University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00302.jpg', 'data': {'categories': ['#multimodal', '#training', '#benchmark'], 'emoji': '🤖👁️', 'ru': {'title': 'Осязание без потерь: селективное расширение способностей мультимодальных моделей', 'desc': 'Splash — это фреймворк для обучения выравниванию тактильных данных, который позволяет мультимодальным LLM овладеть способностью воспринимать тактильные ощущения, не теряя при этом навыки в обработке визуально-языковых задач. Метод использует селективное обновление параметров: модель разбивает пространство параметров на критическую часть (которая остаётся замороженной для сохранения общих знаний) и спящую часть (которая обновляется для интеграции тактильной информации). Такой подход эффективно предотвращает катастрофическое забывание и позволяет расширить возможности модели без ущерба для её исходных способностей. Эксперименты показали, что Splash достигает передовых результатов на тактильных бенчмарках, одновременно сохраняя универсальные возможности исходной модели.'}, 'en': {'title': 'Splash: Enhancing LLMs with Tactile Sensing Without Sacrificing Vision-Language Skills', 'desc': 'The paper introduces Splash, a framework designed to enhance multimodal large language models (LLMs) with tactile sensing abilities while maintaining their vision-language reasoning. It addresses the challenge of catastrophic forgetting, which occurs when a model loses previously learned information while acquiring new skills. Splash achieves this by selectively updating a dormant subspace of parameters, allowing the model to learn tactile properties without compromising its existing visual knowledge. The framework demonstrates superior performance on various visuo-tactile benchmarks, proving that it can expand capabilities without increasing inference costs.'}, 'zh': {'title': 'Splash：触觉与视觉语言推理的完美结合', 'desc': 'Splash是一个用于多模态大语言模型的触觉对齐学习框架，能够在不牺牲视觉-语言推理的情况下，使模型获得触觉感知能力。该框架通过选择性参数更新，避免了灾难性遗忘的问题。Splash将预训练参数的重要性进行量化，并将参数空间划分为休眠和关键子空间，以保护视觉知识的稳定性。实验结果表明，Splash在触觉推理方面表现出色，同时保持了模型的通用能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (4)', '#agi', '#alignment', '#architecture (6)', '#audio', '#benchmark (6)', '#cv (2)', '#data (1)', '#dataset (3)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference', '#interpretability (1)', '#leakage (1)', '#long_context (2)', '#low_resource (1)', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (2)', '#optimization (3)', '#plp (1)', '#rag', '#reasoning (3)', '#rl (2)', '#rlhf', '#robotics (6)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (8)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];
