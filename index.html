新方法', 'desc': '本文将大语言模型的自适应采样视为一个马尔可夫决策过程，并利用强化学习进行优化，以平衡正确性、延迟和计算成本。现有的自适应采样方法通常依赖启发式规则或分布假设，无法有效解决计算和延迟的高成本问题。我们的方法通过训练轻量级的采样控制器，动态决定是否停止采样或获取额外样本，从而实现更好的性能。实验结果表明，我们的方法在答案正确性、采样轮次和所需样本总数之间取得了更优的平衡。'}}}, {'id': 'https://huggingface.co/papers/2606.01770', 'title': 'Adaptive Auto-Harness: Sustained Self-Improvement for Agentic System Deployment on Open-Ended Task Streams', 'url': 'https://huggingface.co/papers/2606.01770', 'abstract': 'Abstract Adaptive Auto-Harness framework addresses dynamic task streams by decomposing performance gaps into evolution and adaptation losses, utilizing a stateful multi-agent evolver and harness tree with solve-time routing for sustained performance improvement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Auto-harness systems such as A-Evolve, GEPA, and Meta-Harness improve LLM agents by optimizing prompts, skills, tools, memories, and supporting infrastructure from execution feedback, but they are typically evaluated on fixed offline benchmarks. Real deployments instead present open-ended task streams: histories grow without a fixed endpoint, heterogeneous tasks require different harnesses, and problem distributions shift over time. These challenges make a single repeatedly and densely updated harness brittle, causing performance degradation as accuracy peaks early and then declines. This motivates sustained harness construction with task-wise adaptation. We introduce Adaptive Auto-Harness, a framework and system for such streams. The framework decomposes the gap to an oracle harness into evolution loss and adaptation loss. The system addresses these losses with a stateful multi-agent evolver, a harness tree with solve-time routing, and human-steering hooks for cases where history lacks the needed signal. Across prediction-market, security-competition, and event-forecasting streams, Adaptive Auto-Harness outperforms five existing auto-harness baselines and ablations attribute gains to better construction, routing, or targeted human steering. Code is available in https://github.com/A-EVO-Lab/AdaptiveHarness .', 'score': 10, 'issue_id': 2367, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'd65b9d12739f5fe4', 'authors': ['Zewen Liu', 'Zhan Shi', 'Yisi Sang', 'Bing He', 'Minhua Lin', 'Tianxin Wei', 'Dakuo Wang', 'Benoit Dumoulin', 'Wei Jin', 'Hanqing Lu'], 'affiliations': ['Amazon', 'Emory University', 'Northeastern University', 'The Pennsylvania State University', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2606.01770.jpg', 'data': {'categories': ['#training', '#benchmark', '#agents'], 'emoji': '🌳', 'ru': {'title': 'Адаптивная эволюция шаблонов для нестационарных потоков задач', 'desc': 'Статья представляет фреймворк Adaptive Auto-Harness для работы с динамическими потоками задач, где распределение проблем меняется со временем. Авторы разлагают разрыв в производительности на эволюционные потери и потери адаптации, используя многоагентный эволюционный алгоритм и иерархическое дерево шаблонов с маршрутизацией во время решения. Система автоматически оптимизирует промпты, навыки и инструменты LLM агентов для поддержания высокой производительности в условиях нестационарных задач, преодолевая проблемы хрупкости единого статического шаблона. Экспериментальная оценка на потоках задач предсказания рынков, безопасности и прогнозирования событий демонстрирует превосходство предложенного подхода над существующими методами автоматической оптимизации.'}, 'en': {'title': 'Harnessing Adaptation for Dynamic Task Mastery', 'desc': 'The Adaptive Auto-Harness framework enhances the performance of machine learning agents by addressing the challenges posed by dynamic task streams. It identifies performance gaps by breaking them down into evolution loss and adaptation loss, allowing for targeted improvements. The system employs a stateful multi-agent evolver and a harness tree with solve-time routing to adapt to varying tasks and shifting problem distributions. This approach leads to sustained performance improvements, outperforming existing auto-harness systems in diverse applications such as prediction markets and security competitions.'}, 'zh': {'title': '自适应自动工具：应对动态任务流的创新框架', 'desc': '自适应自动工具框架通过将性能差距分解为演化损失和适应损失，来应对动态任务流。该系统利用状态保持的多智能体演化器和具有求解时路由的工具树，以实现持续的性能提升。与传统的固定离线基准评估不同，真实部署面临开放式任务流的挑战，任务历史不断增长，且任务类型和问题分布随时间变化。自适应自动工具框架通过任务导向的适应性构建，显著提升了在预测市场、安全竞争和事件预测等任务流中的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.03264', 'title': 'PaddleOCR-VL-1.6: Expanding the Frontier of Document Parsing with Under-Optimized Region Refinement and Progressive Post-Training', 'url': 'https://huggingface.co/papers/2606.03264', 'abstract': 'Abstract PaddleOCR-VL-1.6 enhances document parsing performance through targeted data optimization and progressive post-training techniques, achieving state-of-the-art results on OmniDocBench v1.6.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce PaddleOCR-VL-1.6, an upgraded compact document parsing model built upon PaddleOCR-VL-1.5. Although PaddleOCR-VL-1.5 establishes a strong 0.9B baseline, its remaining errors concentrate in under-optimized regions where model behavior is unstable, data coverage is sparse, or supervision is unreliable. Rather than expanding the training corpus indiscriminately, PaddleOCR-VL-1.6 introduces a region-aware data optimization framework that identifies weak regions from the previous model, applies targeted enhancement to these regions, and improves the reliability of supervision signals. It further adopts a progressive post-training recipe based on curated data selection and reinforcement learning, pushing model performance to a higher level through staged optimization. PaddleOCR-VL-1.6 achieves a new state-of-the-art score of 96.33% on OmniDocBench v1.6, demonstrates strong competitiveness against top-tier VLMs, and provides a practical post-training recipe for the PaddleOCR-VL series.', 'score': 8, 'issue_id': 2365, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'daf74c08cd2dca13', 'authors': ['Zelun Zhang', 'Hongen Liu', 'Suyin Liang', 'Yubo Zhang', 'Yiqing Xiang', 'Jiaxuan Liu', 'Ting Sun', 'Manhui Lin', 'Yue Zhang', 'Changda Zhou', 'Tingquan Gao', 'Cheng Cui', 'Yi Liu', 'Dianhai Yu', 'Yanjun Ma'], 'affiliations': ['Baidu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.03264.jpg', 'data': {'categories': ['#dataset', '#data', '#benchmark', '#small_models', '#cv', '#rl', '#training', '#multimodal'], 'emoji': '📄', 'ru': {'title': 'Умная оптимизация слабых точек для идеального распознавания документов', 'desc': 'PaddleOCR-VL-1.6 — это улучшенная модель для распознавания и парсинга документов, которая строится на основе предыдущей версии 1.5. Ключевая инновация заключается в применении целевой оптимизации данных: система анализирует области, где модель показывает нестабильное поведение, и сосредотачивает усилия на улучшении именно этих участков вместо простого расширения набора данных. Модель использует прогрессивное постобучение с применением техник выбора данных и обучения с подкреплением для пошагового повышения качества. В результате PaddleOCR-VL-1.6 достигает новый рекордный результат 96.33% на бенчмарке OmniDocBench v1.6 и конкурирует с лучшими моделями зрения-языка.'}, 'en': {'title': 'Targeted Optimization for Superior Document Parsing', 'desc': 'PaddleOCR-VL-1.6 is an advanced document parsing model that improves upon its predecessor, PaddleOCR-VL-1.5, by focusing on specific areas where the previous model struggled. It uses a region-aware data optimization framework to enhance performance in under-optimized regions, ensuring better data coverage and more reliable supervision. Additionally, the model employs a progressive post-training approach that incorporates curated data selection and reinforcement learning to refine its capabilities further. As a result, PaddleOCR-VL-1.6 achieves a remarkable accuracy of 96.33% on the OmniDocBench v1.6 benchmark, setting a new standard in document parsing performance.'}, 'zh': {'title': '文档解析的新高度：PaddleOCR-VL-1.6', 'desc': 'PaddleOCR-VL-1.6 是一个升级版的文档解析模型，旨在通过针对性的数据优化和渐进式后训练技术来提升性能。该模型在 OmniDocBench v1.6 上达到了 96.33% 的新状态，显示出其在文档解析领域的竞争力。与之前的版本相比，PaddleOCR-VL-1.6 通过识别和增强模型表现不佳的区域，优化了数据覆盖和监督信号的可靠性。此外，它还采用了基于精选数据和强化学习的渐进式后训练方法，进一步提升了模型的整体表现。'}}}, {'id': 'https://huggingface.co/papers/2606.01788', 'title': 'PlatonicNav: Unveiling Semantic Correspondence in Navigation with Platonic Topological Maps', 'url': 'https://huggingface.co/papers/2606.01788', 'abstract': 'Abstract A training-free framework for embodied navigation that uses a vision-only approach to create semantic maps and ground language goals through blind matching without paired vision-language data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied visual navigation, where an agent perceives a complex environment and acts to reach a goal from raw sensory input, underpins a wide range of applications such as household service robotics, assistive robotics, and large-scale autonomous exploration. However, recent attempts to unify vision-and-language navigation (VLN) and object goal navigation (ObjNav) remain at the level of architectural fusion, mixed-task training, and large vision-language pretraining, without examining whether independently trained vision and language encoders may already share a common semantic structure. Moreover, even object-centric topological maps still ground language goals through explicit cross-modal supervision such as CLIP or large vision-language models, leaving open whether such grounding is possible from a purely vision-built map. To address these challenges, we extend the Platonic Representation Hypothesis to embodied navigation and recast vision-only ObjNav, cross-modal ObjNav, and VLN as three different interfaces to the same object-centric semantic manifold. We further introduce PlatonicNav, a training-free framework whose Platonic Topological Map fuses geometric and semantic node distances from a self-supervised visual encoder, and grounds language goals via blind matching without any paired vision-language data. Extensive experiments on simulation benchmarks including HM3D-IIN, OVON, and R2R-CE on MP3D, together with deployment on Unitree Go2, demonstrate that PlatonicNav generalizes across tasks, modalities, and embodiments without explicit cross-modal training. Code: https://github.com/AIGeeksGroup/PlatonicNav. Website: https://aigeeksgroup.github.io/PlatonicNav.', 'score': 8, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'e37cc89226719899', 'authors': ['Junlin Long', 'Zeyu Zhang', 'Xu Deng', 'Yiran Wang', 'Yue Yang', 'Luke Borgnolo', 'Maxwell Twelftree', 'Yang Zhao'], 'affiliations': ['La Trobe', 'Maincode', 'UNSW', 'USYD'], 'pdf_title_img': 'assets/pdf/title_img/2606.01788.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#robotics', '#agents'], 'emoji': '🗺️', 'ru': {'title': 'Единый семантический многообразие для навигации без обучения', 'desc': 'В работе предлагается PlatonicNav — фреймворк без обучения для навигации мобильного робота, который использует только визуальную информацию для создания семантических топологических карт. Авторы применяют гипотезу платонического представления к задачам воплощённой навигации, показывая, что независимо обученные визуальные и языковые кодеры уже обладают общей семантической структурой. Фреймворк объединяет геометрические и семантические расстояния из самоконтролируемого визуального энкодера и привязывает языковые цели через слепое сопоставление без парных данных видения-языка. Экспериментальная проверка на нескольких бенчмарках и физическом роботе доказывает, что подход обобщается на разные задачи, модальности и воплощения без явного кросс-модального обучения.'}, 'en': {'title': 'Navigating Without Training: The Power of PlatonicNav', 'desc': 'This paper presents a novel framework called PlatonicNav for embodied navigation that operates without the need for training on paired vision-language data. It introduces a concept known as the Platonic Topological Map, which combines geometric and semantic information from a visual encoder to create a semantic map. The framework allows for grounding language goals through a process called blind matching, which does not rely on explicit cross-modal supervision. Experimental results show that PlatonicNav effectively generalizes across various tasks and environments, demonstrating its versatility in navigation applications.'}, 'zh': {'title': '无训练的视觉导航新框架', 'desc': '这篇论文提出了一种无训练的框架，用于实现基于视觉的导航，能够通过盲匹配生成语义地图和语言目标，而无需配对的视觉-语言数据。研究表明，独立训练的视觉和语言编码器可能共享相同的语义结构，从而简化了导航任务。论文中引入了PlatonicNav框架，它通过自监督的视觉编码器融合几何和语义节点距离，并通过盲匹配来确定语言目标。实验结果表明，PlatonicNav在不同任务、模态和应用中具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2606.01717', 'title': 'Decentralized Instruction Tuning: Conflict-Aware Splitting and Weight Merging', 'url': 'https://huggingface.co/papers/2606.01717', 'abstract': 'Abstract Instruction tuning of large language models can be improved through decentralized training that partitions mixed datasets based on gradient conflicts and merges results via weighted averaging, achieving performance comparable to centralized methods with reduced communication overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Instruction tuning aligns large language models, including multimodal ones, with diverse user intents, but scaling to heterogeneous mixtures is hindered by gradient interference and bandwidth-heavy synchronization. We ask whether these two bottlenecks can be addressed jointly by training parts of the mixture independently and reconciling them once in parameter space. We develop a local quadratic theory inside a shared flat basin that yields three results: weight merging produces a curvature-weighted variance reduction; PCA-aligned conflict splitting maximizes this gain along high-curvature directions; and merging additionally acts as spectral filtering with implicit norm regularization. These results directly motivate MERIT, a decentralized merge-ready instruction-tuning pipeline that estimates dataset-level gradient conflicts, partitions the mixture along the top PCA conflict axes, fine-tunes each partition independently with no inter-partition communication, and merges once via token-weighted averaging. On Qwen2.5-VL-3B with 136 Vision-FLAN tasks, MERIT improves the 8-benchmark average from 54.3 (joint training) to 57.0. The same recipe scales to a 7B model on a 1.6M-example, 176-source mixture -- matching or exceeding centralized joint training with minimal cost overhead -- and transfers to text-only FLAN. Our code is available at https://github.com/naver-ai/merit.', 'score': 8, 'issue_id': 2364, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'b5ceb096b68eb779', 'authors': ['Minsik Choi', 'Geewook Kim'], 'affiliations': ['KAIST AI', 'Korea University', 'NAVER Cloud AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.01717.jpg', 'data': {'categories': ['#training', '#architecture', '#multimodal'], 'emoji': '🔀', 'ru': {'title': 'Децентрализованная настройка через умное слияние моделей', 'desc': 'В статье предложен метод MERIT для улучшения инструктивной настройки больших языковых моделей через децентрализованное обучение. Авторы разбивают смешанные датасеты на части, основываясь на конфликтах градиентов, а затем объединяют результаты с помощью взвешенного усреднения параметров. Теоретический анализ показывает, что слияние моделей обеспечивает редукцию дисперсии с учетом кривизны потерь и действует как спектральный фильтр. Экспериментально метод достигает качества централизованного обучения с существенно меньшей коммуникационной нагрузкой на мультимодальных моделях.'}, 'en': {'title': 'Decentralized Training for Enhanced Instruction Tuning', 'desc': 'This paper presents a method called MERIT for improving instruction tuning of large language models through decentralized training. It addresses issues of gradient conflicts and communication overhead by partitioning mixed datasets and training them independently before merging results. The approach utilizes a local quadratic theory to optimize weight merging and conflict splitting, enhancing performance while reducing the need for heavy synchronization. The results show that MERIT can achieve better or comparable performance to centralized methods with significantly lower costs, demonstrating its effectiveness across various model sizes and tasks.'}, 'zh': {'title': '去中心化的指令调优新方法', 'desc': '这篇论文提出了一种名为MERIT的去中心化指令调优方法，旨在提高大型语言模型的训练效率。通过将混合数据集根据梯度冲突进行分区，并在参数空间中合并结果，MERIT能够减少通信开销，同时保持与集中式方法相当的性能。研究表明，局部二次理论可以有效地减少权重合并后的曲率加权方差，并通过主成分分析（PCA）优化冲突分割。最终，MERIT在多个任务上实现了显著的性能提升，证明了其在处理异构数据集时的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.29288', 'title': 'Diagnosing Harmful Continuation in Answer-Correct Long-CoT Training Traces', 'url': 'https://huggingface.co/papers/2605.29288', 'abstract': 'Abstract Answer-correct long chain-of-thought traces can lead to different fine-tuning outcomes, with post-conclusion continuations identified as harmful to training, characterized by uncertainty-geometry mismatches and addressed through a lightweight boundary proxy method.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long chain-of-thought (CoT) traces are widely used as supervision for reasoning-oriented LLM SFT, yet answer-correct traces can still lead to markedly different fine-tuning outcomes. We study post-conclusion continuation in answer-correct long-CoT data: a continuation where the answer appears sufficiently supported, but the trace continues with additional reasoning that remains in the supervised target. To test its training effect, we use a delete-only editor to construct answer-preserving suffix removal and compare CoT-based SFT on the original and processed traces. We observe improved SFT outcomes after removing the editor-identified post-conclusion continuation, suggesting that this continuation is harmful to training in our setting. We therefore refer to this empirically supported phenomenon as harmful continuation. Beyond this intervention, we further characterize the removed post-conclusion continuation through uncertainty and hidden-state progress. We observe persistent local uncertainty together with weakened terminal-directional progress, forming an uncertainty--geometry mismatch. Finally, we instantiate Harmful Continuation Cut (HCC), a lightweight boundary proxy that approximates the editor-identified post-conclusion continuation boundary.', 'score': 8, 'issue_id': 2365, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '9d7702310755aa33', 'authors': ['Chen He', 'Yuhao Wu', 'Lei Wang', 'Wenxuan Zhang', 'Fumin Shen'], 'affiliations': ['Singapore Management University', 'Singapore University of Technology and Design', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.29288.jpg', 'data': {'categories': ['#training', '#data', '#alignment', '#reasoning'], 'emoji': '✂️', 'ru': {'title': 'Обрезание вредоносных продолжений рассуждений для оптимального обучения LLM', 'desc': 'В работе исследуется проблема вредоносного продолжения рассуждений в длинных цепочках рассуждений (CoT), которые используются для fine-tuning LLM. Авторы обнаружили, что даже когда ответ уже полностью обоснован, продолжение трассировки рассуждений негативно влияет на качество обучения, что характеризуется несоответствием между неопределённостью модели и прогрессом в скрытом пространстве. Они предложили метод Harmful Continuation Cut (HCC) — лёгкий прокси-инструмент для автоматического определения границы между необходимыми и вредоносными частями рассуждений. Эта работа демонстрирует, что селективное удаление избыточных рассуждений из обучающих данных значительно улучшает результаты SFT для моделей, ориентированных на логические выводы.'}, 'en': {'title': 'Cutting Harmful Continuations for Better Model Training', 'desc': "This paper investigates the impact of long chain-of-thought (CoT) traces on fine-tuning outcomes in large language models (LLMs). It identifies a phenomenon called 'harmful continuation', where additional reasoning after a correct answer negatively affects training. The authors propose a method to remove these harmful continuations, leading to improved supervised fine-tuning (SFT) results. They also introduce the Harmful Continuation Cut (HCC), a lightweight proxy to help identify and mitigate these detrimental continuations during training."}, 'zh': {'title': '去除有害后续，提升模型微调效果', 'desc': '本文研究了长链推理（CoT）数据中，正确答案的后续推理对模型微调的影响。尽管这些后续推理看似支持答案，但实际上会导致训练效果下降。我们通过删除后续推理的方式，发现去除这些有害的后续推理后，微调结果显著改善。最后，我们提出了一种轻量级的边界代理方法，称为有害后续切割（HCC），用于近似识别这些有害后续推理的边界。'}}}, {'id': 'https://huggingface.co/papers/2606.01476', 'title': 'OmniOPD: Logit-Free On-Policy Distillation via Speculative Verification', 'url': 'https://huggingface.co/papers/2606.01476', 'abstract': "Abstract OmniOPD addresses limitations of standard On-Policy Distillation by using chunk-level semantic similarity instead of token-level logits, improving learning reliability and performance with black-box teachers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-Policy Distillation (OPD) trains a student model on its own generative trajectories under dense token-level feedback from a stronger teacher, mitigating both the off-policy distribution shift of Supervised Fine-Tuning (SFT) and the sparse credit assignment of Reinforcement Learning (RL). However, standard OPD faces two coupled limitations. First, it requires direct access to the teacher's token-level logits, excluding a broad class of capable proprietary models from serving as teachers. Second, the token-level logit signal itself is brittle, depending on a narrow overlap of plausible next tokens between teacher and student, and prone to amplifying degenerate patterns such as repetition loops. In this paper, we introduce OmniOPD, a novel framework that addresses both limitations through a logit-free, chunk-level supervision signal. OmniOPD replaces deterministic logit matching with Monte Carlo rollouts that approximate the teacher's local preferences through a continuous semantic similarity metric over multi-token chunks, and concentrates this supervision via a peak-entropy scheduler that audits the student only at its high-uncertainty reasoning forks. A Dirichlet-Multinomial Bayesian prior and a base-model KL anchor further bound the variance of discrete sampling and prevent policy collapse across unaudited tokens. Across competitive benchmarks, OmniOPD surpasses the standard OPD approach by up to +28.64% on math, confirming that chunk-level semantic verification extracts a more reliable learning signal than token-level logit matching, whose high information density is offset by significant noise and brittleness. Furthermore, when paired with stronger black-box teachers such as Claude-4.5-Haiku and Gemini-2.5-Flash, OmniOPD achieves an additional +9.54% relative on math over its open-weight teacher counterpart, advancing the student past the performance of self-exploratory RL.", 'score': 7, 'issue_id': 2368, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': 'fec61bc1abe1a206', 'authors': ['Yuhang Zhou', 'Lizhu Zhang', 'Yifan Wu', 'Mingyi Wang', 'Peng Bo', 'Jiayi Liu', 'Xiangjun Fan', 'Zhuokai Zhao'], 'affiliations': ['Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.01476.jpg', 'data': {'categories': ['#optimization', '#math', '#rlhf', '#reasoning', '#training'], 'emoji': '🎯', 'ru': {'title': 'Семантическая дистилляция без логитов: от поточечного к блочному обучению', 'desc': 'OmniOPD — это новая методология дистилляции знаний, которая преодолевает ограничения стандартной On-Policy Distillation путём замены поточечного сравнения логитов на семантическое сравнение сегментов текста. Вместо требования прямого доступа к логитам учителя, метод использует Monte Carlo семплирование для аппроксимации предпочтений сильного учителя через непрерывную метрику семантического сходства. Система включает планировщик энтропии для концентрации обучающего сигнала на сложных участках рассуждений студента и Байесов приор для стабилизации обучения. На конкурентных бенчмарках OmniOPD демонстрирует значительное улучшение производительности, особенно в задачах математического рассуждения.'}, 'en': {'title': 'Unlocking Learning with Chunk-Level Supervision', 'desc': 'OmniOPD is a new framework that improves the training of student models by using chunk-level semantic similarity instead of relying on token-level logits from teachers. This approach allows it to work with black-box models, which are often proprietary and not accessible for direct feedback. By focusing on multi-token chunks and using a peak-entropy scheduler, OmniOPD provides a more stable and reliable learning signal, reducing issues like repetition loops. The results show that OmniOPD significantly outperforms traditional On-Policy Distillation methods, especially when paired with strong black-box teachers.'}, 'zh': {'title': '块级语义相似性提升学习可靠性', 'desc': 'OmniOPD是一种新颖的框架，旨在解决标准的在线策略蒸馏（OPD）中的两个主要限制。它通过使用块级语义相似性替代了基于标记的逻辑匹配，从而提高了学习的可靠性和性能。OmniOPD采用蒙特卡洛回滚方法，利用多标记块的连续语义相似性度量来近似教师的局部偏好，并通过高不确定性推理分叉的审计集中监督。实验结果表明，OmniOPD在数学基准测试中比标准OPD方法提高了28.64%的性能，证明了块级语义验证比标记级逻辑匹配更可靠。'}}}, {'id': 'https://huggingface.co/papers/2605.27346', 'title': 'MERIT: Learning Disentangled Music Representations for Audio Similarity', 'url': 'https://huggingface.co/papers/2605.27346', 'abstract': 'Abstract MERIT framework learns disentangled music representations for melody, rhythm, and timbre through conditional audio generation and source-separated stems, enabling nuanced musical queries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current music similarity models typically compute a single, monolithic score, entangling distinct musical dimensions like melody, rhythm, and timbre. This limits user control and interpretability, making it impossible to execute nuanced queries. We introduce MERIT, a framework for learning disentangled, factor-specific music representations tailored to these three core dimensions. To overcome the lack of isolated musical variations in real-world audio, we use a novel training strategy that uses conditional audio generation and source-separated stems to strongly encourage single-factor variation in training data. Our evaluations demonstrate strong factor-wise disentanglement. Each head responds strongly to its intended perceptual dimension while remaining near chance on the others, a representational property that holds across both the synthetic training domain and independent real-world audio.', 'score': 7, 'issue_id': 2365, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': 'ceac234dc1c6ac4a', 'authors': ['Abhinaba Roy', 'Junyi Liang', 'Dorien Herremans'], 'affiliations': ['Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2605.27346.jpg', 'data': {'categories': ['#audio', '#interpretability', '#synthetic', '#training', '#multimodal'], 'emoji': '🎵', 'ru': {'title': 'Разделённые представления музыки для точных музыкальных запросов', 'desc': 'В статье представлена система MERIT для обучения разделённых представлений музыки по трём ключевым компонентам: мелодии, ритму и тембру. Авторы предлагают новый метод обучения, использующий условную генерацию аудио и разделённые источники звука, чтобы каждый компонент варьировался независимо. Разработанный подход позволяет моделям лучше разобраться в отдельных музыкальных измерениях и отвечать на более точные и детальные запросы пользователей. Полученные результаты показывают, что каждое представление эффективно реагирует на свой компонент и игнорирует остальные, что подтверждено как на синтетических, так и на реальных аудиоданных.'}, 'en': {'title': 'Disentangling Music: MERIT for Nuanced Queries', 'desc': 'The MERIT framework is designed to learn separate music representations for melody, rhythm, and timbre, allowing for more detailed musical queries. Traditional music similarity models often produce a single score that combines these elements, which limits user control and understanding. MERIT addresses this by using conditional audio generation and source-separated stems to ensure that each musical dimension can be varied independently during training. Evaluations show that the framework effectively disentangles these factors, with each component responding specifically to its intended musical aspect while being less sensitive to the others.'}, 'zh': {'title': 'MERIT：解耦音乐表示的创新框架', 'desc': 'MERIT框架通过条件音频生成和源分离音轨学习解耦的音乐表示，专注于旋律、节奏和音色三个核心维度。这种方法克服了传统音乐相似性模型的局限性，使得用户能够进行更细致的音乐查询。通过新颖的训练策略，MERIT能够在训练数据中强烈鼓励单一因素的变化，从而实现更好的解耦效果。评估结果表明，每个因素在其预期的感知维度上表现出强烈的响应，而在其他维度上则接近随机，显示出良好的表示特性。'}}}, {'id': 'https://huggingface.co/papers/2606.03928', 'title': 'Value-Aware Stochastic KV Cache Eviction for Reasoning Models', 'url': 'https://huggingface.co/papers/2606.03928', 'abstract': 'Abstract Value-aware stochastic KV cache eviction method improves reasoning model accuracy under compression by protecting large-magnitude states and promoting diverse eviction decisions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reasoning models improve accuracy through extended chains of thought, but their long outputs create a memory and compute bottleneck. KV cache eviction methods reduce this cost by evicting unimportant key-value pairs from the cache, yet they often yield worse accuracy than selection-based sparse attention alternatives, which keep the full KV cache. We identify key factors crucial to KV cache eviction accuracy. First, a small fraction of value states have abnormally large magnitudes, and evicting them causes catastrophic failure where models enter repetitive reasoning loops. Second, introducing stochasticity during eviction improves accuracy by increasing cache diversity. Based on these findings, we propose Value-aware Stochastic KV Cache Eviction (VaSE), a training-free recipe that protects large-magnitude value states and promotes diverse eviction decisions. Across six reasoning tasks, Qwen3 models using VaSE with 4x KV cache compression yield higher average accuracies than SOTA selection method at the same sparsity, while outperforming the strongest eviction method by more than 4%. Overall, VaSE bridges the gap between efficiency and accuracy, supporting FlashAttention2 and enabling a static memory footprint for reasoning models.', 'score': 6, 'issue_id': 2365, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '9299f06c3ebf23c2', 'authors': ['Ting-Yun Chang', 'Harvey Yiyun Fu', 'Deqing Fu', 'Chenghao Yang', 'Jesse Thomason', 'Robin Jia'], 'affiliations': ['University of Chicago', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2606.03928.jpg', 'data': {'categories': ['#optimization', '#inference', '#long_context', '#reasoning', '#architecture', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Защита важных состояний при сжатии памяти моделей рассуждений', 'desc': 'Статья описывает метод Value-aware Stochastic KV Cache Eviction (VaSE) для сжатия кэша ключ-значение в моделях рассуждений. Авторы выявили, что некоторые значения состояний имеют аномально большие магнитуды, и их удаление приводит к катастрофическому отказу модели с зацикливанием. Предложенный метод защищает эти критические значения и добавляет стохастичность при удалении кэша для повышения разнообразия. VaSE достигает сжатия KV кэша в 4 раза, превосходя существующие методы отбора и удаления на тестах по рассуждению, без необходимости переобучения.'}, 'en': {'title': 'Enhancing Model Accuracy with Smart Cache Eviction', 'desc': 'The paper introduces a new method called Value-aware Stochastic KV Cache Eviction (VaSE) that enhances the accuracy of reasoning models while using less memory. It addresses the issue of cache eviction, where unimportant key-value pairs are removed to save resources, but often at the cost of model performance. The authors highlight that certain value states with large magnitudes are critical and should be preserved to avoid errors in reasoning. By incorporating randomness in the eviction process, VaSE promotes a more diverse selection of cache entries, leading to improved accuracy across various reasoning tasks compared to existing methods.'}, 'zh': {'title': '提升推理模型准确性的价值感知缓存驱逐方法', 'desc': '本文提出了一种价值感知的随机KV缓存驱逐方法（VaSE），旨在提高压缩下推理模型的准确性。该方法通过保护大幅度状态，避免模型进入重复推理循环，从而减少了重要信息的丢失。VaSE还通过引入随机性来增加缓存的多样性，进一步提升了模型的表现。实验结果表明，使用VaSE的模型在多个推理任务中表现优于现有的选择性稀疏注意力方法。'}}}, {'id': 'https://huggingface.co/papers/2606.03029', 'title': 'Conditional Hypothesis Generation for LLM-Based Text Analysis with Researcher-Specified Covariates', 'url': 'https://huggingface.co/papers/2606.03029', 'abstract': "Abstract Conditional hypothesis generation framework incorporates covariates to identify meaningful language differences across subgroups while addressing stratum imbalance and sign reversal challenges.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A core goal of computational social science is to discover interpretable differences in how language varies across outcomes of interest, such as political affiliation or instructional quality. Recent LLM-based hypothesis generation methods describe such differences in natural language, but select for globally discriminative patterns without accounting for covariates that shape the data based on researchers' domain knowledge. When covariates are ignored, selected patterns can reflect confounds rather than differences of substantive interest. We introduce conditional hypothesis generation, a framework that incorporates researcher-specified covariates to steer hypothesis discovery toward differences that hold within relevant subgroups. Two challenges arise: the target subgroup may be underrepresented (stratum imbalance), and the direction of a difference may reverse across subgroups (sign reversal). We propose two econometrics-inspired methods: one introduces feature--covariate interactions to detect sign reversals, and the other applies within-stratum demeaning and inverse-frequency reweighting to equalize underrepresented strata. Synthetic experiments show each method outperforms global baselines in its targeted setting, and expert evaluation on two real-world datasets confirms that covariate-aware generation surfaces more useful hypotheses within relevant subgroups.", 'score': 4, 'issue_id': 2368, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '9bedbcb362d2845d', 'authors': ['Paiheng Xu', 'Jing Liu', 'Wei Ai'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.03029.jpg', 'data': {'categories': ['#interpretability', '#synthetic'], 'emoji': '🔍', 'ru': {'title': 'Условная генерация гипотез: управление открытием знаний через ковариаты', 'desc': 'Статья представляет фреймворк условной генерации гипотез, который использует ковариаты для выявления значимых различий в языке между подгруппами данных. Метод решает две ключевые проблемы: дисбаланс представленности стратов и изменение знака эффекта при переходе между подгруппами. Авторы предлагают два подхода, вдохновленные эконометрикой: взаимодействие признаков с ковариатами для обнаружения разворотов эффекта и перевзвешивание данных для уравнивания недопредставленных групп. Экспериментальная оценка показывает, что учет ковариат при генерации гипотез LLM позволяет обнаружить более интерпретируемые и полезные для исследователей различия в языковых паттернах.'}, 'en': {'title': 'Uncovering Language Differences with Conditional Hypothesis Generation', 'desc': 'This paper presents a new framework for generating hypotheses that considers specific factors, called covariates, to better understand language differences among various groups. It addresses two main challenges: stratum imbalance, where some groups are underrepresented, and sign reversal, where the direction of differences can change across groups. By using methods inspired by econometrics, the framework improves the detection of meaningful language patterns that are relevant to specific subgroups. The results show that this approach leads to more useful and interpretable hypotheses compared to traditional methods that ignore these covariates.'}, 'zh': {'title': '条件假设生成：揭示语言差异的新方法', 'desc': '本文提出了一种条件假设生成框架，该框架通过引入协变量来识别不同子群体之间的语言差异，同时解决了层次不平衡和符号反转的挑战。计算社会科学的核心目标是发现语言在不同结果（如政治倾向或教学质量）之间的可解释差异。传统的基于大语言模型的假设生成方法往往忽视协变量，导致所选模式反映的是混淆因素而非实质性差异。我们的方法通过引入特征-协变量交互和层内去均值化等技术，能够更有效地发现相关子群体内的有意义假设。'}}}, {'id': 'https://huggingface.co/papers/2605.30039', 'title': 'Domain-Specific Data Synthesis for LLMs via Minimal Sufficient Representation Learning', 'url': 'https://huggingface.co/papers/2605.30039', 'abstract': 'Abstract DOMINO enables domain-specific data synthesis through an inductive approach that learns domain representations from reference examples, improving code benchmark performance without requiring explicit domain descriptions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models have demonstrated remarkable progress in general-purpose capabilities and can achieve strong performance in specific domains through fine-tuning on domain-specific data. However, acquiring high-quality data for target domains remains a significant challenge. Existing data synthesis approaches follow a deductive paradigm, heavily relying on explicit domain descriptions expressed in natural language and careful prompt engineering, limiting their applicability in real-world scenarios where domains are difficult to describe or formally articulate. In this work, we tackle the underexplored problem of domain-specific data synthesis through an inductive paradigm, where the target domain is defined only through a set of reference examples, particularly when domain characteristics are difficult to articulate in natural language. We propose a novel framework, DOMINO, that learns a minimal sufficient domain representation from reference samples and leverages it to guide the generation of domain-aligned synthetic data. DOMINO integrates prompt tuning with a contrastive disentanglement objective to separate domain-level patterns from sample-specific noise, mitigating overfitting while preserving core domain characteristics. Theoretically, we prove that DOMINO expands the support of the synthetic data distribution, ensuring greater diversity. Empirically, on challenging coding benchmarks where domain definitions are implicit, fine-tuning on data synthesized by DOMINO improves Pass@1 accuracy by up to 4.63\\% over strong, instruction-tuned backbones, demonstrating its effectiveness and robustness. This work establishes a new paradigm for domain-specific data synthesis, enabling practical and scalable domain adaptation without manual prompt design or natural language domain specifications.', 'score': 4, 'issue_id': 2367, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'c2fbedef7dd989e6', 'authors': ['Tong Ye', 'Hang Yu', 'Tengfei Ma', 'Xuhong Zhang', 'Jianguo Li', 'Peng Di', 'Peiyu Liu', 'Jianwei Yin', 'Wenhai Wang'], 'affiliations': ['Ant Group', 'Zhejiang University', 'vivo AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.30039.jpg', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Обучение от примеров: синтез данных без описания домена', 'desc': 'DOMINO — это фреймворк для синтеза данных, специфичных для конкретной предметной области, который использует индуктивный подход вместо традиционного дедуктивного. Система обучается на примерах из целевой области и выучивает её минимальное представление без необходимости в явном описании домена на естественном языке. Фреймворк комбинирует настройку промптов с контрастивным разделением, чтобы отделить основные характеристики домена от специфичных для конкретного примера артефактов. Экспериментально доказано, что DOMINO улучшает производительность LLM на задачах кодирования на 4.63% за счёт синтезированных данных с большей разнообразностью.'}, 'en': {'title': 'Revolutionizing Data Synthesis with DOMINO', 'desc': 'The paper introduces DOMINO, a framework for generating domain-specific data using an inductive approach that relies on reference examples instead of explicit domain descriptions. This method addresses the challenge of acquiring high-quality data in scenarios where domain characteristics are hard to articulate. By integrating prompt tuning with a contrastive disentanglement objective, DOMINO effectively separates relevant domain patterns from noise, enhancing the quality of synthetic data. The results show that fine-tuning models on data generated by DOMINO significantly improves performance on coding benchmarks, demonstrating its potential for scalable domain adaptation.'}, 'zh': {'title': 'DOMINO：无须明确描述的领域数据合成新范式', 'desc': 'DOMINO是一种通过归纳方法实现特定领域数据合成的框架，它从参考示例中学习领域表示，提升代码基准性能，而无需明确的领域描述。现有的数据合成方法依赖于演绎范式，要求使用自然语言进行详细的领域描述，这在实际应用中往往难以实现。DOMINO通过仅使用一组参考示例来定义目标领域，解决了这一问题，并通过对比解耦目标来分离领域模式与样本噪声，从而减少过拟合。实验证明，使用DOMINO合成的数据在编码基准测试中显著提高了准确率，展示了其有效性和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.00138', 'title': 'A Multi-AI-agent Framework Enabling End-to-end Finite Element Analysis for Solid Mechanics Problems', 'url': 'https://huggingface.co/papers/2606.00138', 'abstract': "Abstract AbaqusAgent is a multi-agent framework using large language models to automate finite element analysis by converting natural language instructions into executable simulations with high success rates across diverse solid mechanics problems.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Finite element analysis (FEA) is the most important numerical approach for solid mechanics. Challenges of FEA include a steep learning curve for entry-level users and potential false simulations due to incorrect definitions of key simulation components, such as boundary conditions, load cases, and solution variables. Years of engineering experience are usually necessary for real-world problem-solving. To address these issues, we present AbaqusAgent, a multi-agent framework grounded in large language models (LLMs) for solid mechanics analyses. AbaqusAgent is developed to facilitate analysis case generation and execution using Abaqus, one of the most widely used FEA packages, by turning users' natural-language instructions into executed FEA analyses and result visualization. AbaqusAgent is composed of six agents, including interpreter, architect, input writer, runner, reviewer, and visualizer agents, encompassing all the essential pre-processing and post-processing steps of standard FEA analyses. A wide variety of 50 solid mechanics problems have been successfully validated, achieving an overall success rate of 86%. Beyond improving the efficiency of FEA for solid mechanics problems and lowering the barrier to computational mechanics education, AbaqusAgent advances the human-simulation interaction paradigm and enables integration with AI-empowered optimization and material characterization workflows. The code is available at https://github.com/LIRAM-LIN/AbaqusAgent", 'score': 4, 'issue_id': 2367, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '6af86ab341ebd5c0', 'authors': ['Titu Ranjan Sarker', 'Muhammed Jawaad Zulqernine', 'Ling Yue', 'Shaowu Pan', 'Chenxi Wang', 'Shiyao Lin'], 'affiliations': ['Institute for Predictive Performance Methodologies', 'Rensselaer Polytechnic Institute', 'University of Texas at Arlington'], 'pdf_title_img': 'assets/pdf/title_img/2606.00138.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'От слов к симуляции: LLM-агенты для автоматизации метода конечных элементов', 'desc': 'AbaqusAgent — это многоагентная система на основе больших языковых моделей (LLM), которая автоматизирует анализ методом конечных элементов (МКЭ) путём преобразования естественного языка в исполняемые симуляции. Система состоит из шести специализированных агентов, которые выполняют все необходимые этапы предварительной и постварительной обработки при проведении анализа в пакете Abaqus. Фреймворк успешно валидирован на 50 различных задачах механики сплошных сред с общей точностью 86%, значительно снижая требования к опыту пользователя. Это решение облегчает доступ к вычислительной механике и открывает возможности для интеграции с AI-оптимизацией и автоматизированной идентификацией материалов.'}, 'en': {'title': 'Transforming Natural Language into Finite Element Analysis Success', 'desc': 'AbaqusAgent is a multi-agent framework that leverages large language models to streamline finite element analysis (FEA) by translating natural language commands into executable simulations. This system addresses common challenges in FEA, such as the steep learning curve and the risk of incorrect simulations due to misdefined parameters. By utilizing six specialized agents, AbaqusAgent manages all stages of FEA, from input preparation to result visualization, achieving an impressive success rate of 86% across various solid mechanics problems. This innovation not only enhances the efficiency of FEA but also makes computational mechanics more accessible to users with limited engineering experience.'}, 'zh': {'title': 'AbaqusAgent：用语言模型简化有限元分析', 'desc': 'AbaqusAgent是一个多智能体框架，利用大型语言模型自动化有限元分析（FEA），将自然语言指令转换为可执行的模拟。该框架解决了FEA学习曲线陡峭和关键组件定义错误导致的模拟不准确等问题。AbaqusAgent由六个智能体组成，涵盖了标准FEA分析的所有预处理和后处理步骤。通过成功验证50个固体力学问题，AbaqusAgent的整体成功率达到了86%。'}}}, {'id': 'https://huggingface.co/papers/2606.03748', 'title': 'Ultralytics YOLO26: Unified Real-Time End-to-End Vision Models', 'url': 'https://huggingface.co/papers/2606.03748', 'abstract': 'Abstract YOLO26 addresses real-time vision challenges through a unified model family with NMS-free inference, improved training strategies, and multi-task capabilities spanning detection, segmentation, and pose estimation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Real-time vision demands models that are accurate, efficient, and simple to deploy across diverse hardware. The YOLO family has become widely deployed for this reason, yet most YOLO detectors still rely on non-maximum suppression at inference, carry heavy detection heads due to Distribution Focal Loss, require long training schedules, and can leave the smallest objects without positive label assignments. We present Ultralytics YOLO26, a unified real-time vision model family that addresses these limitations through coordinated architecture and training advances. YOLO26 uses a dual-head design for native NMS-free end-to-end inference and removes DFL entirely, yielding a lighter head with unconstrained regression range. Its training pipeline combines MuSGD, a hybrid Muon-SGD optimizer adapted from large language model training; Progressive Loss, which shifts supervision toward the inference-time head; and STAL, a label assignment strategy that guarantees positive coverage for small objects. Beyond detection, YOLO26 introduces task-specific head and loss designs for instance segmentation, pose estimation, and oriented detection, producing consistent gains across tasks and scales. The family spans five scales (n/s/m/l/x) and supports detection, instance segmentation, pose estimation, classification, and oriented detection in a single pipeline, with an open-vocabulary extension, YOLOE-26, for text-, visual-, and prompt-free inference. Across all scales, YOLO26 achieves 40.9-57.5 mAP on COCO at 1.7-11.8 ms T4 TensorRT latency, advancing the accuracy-latency Pareto front over prior real-time detectors, while YOLOE-26x reaches 40.6 AP on LVIS minival under text prompting. Code and models are available at https://github.com/ultralytics/ultralytics.', 'score': 3, 'issue_id': 2367, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '4fc7458bf3b2a342', 'authors': ['Glenn Jocher', 'Jing Qiu', 'Mengyu Liu', 'Shuai Lyu', 'Fatih Cagatay Akyon', 'Muhammet Esat Kalfaoglu'], 'affiliations': ['Ultralytics'], 'pdf_title_img': 'assets/pdf/title_img/2606.03748.jpg', 'data': {'categories': ['#cv', '#training', '#inference', '#architecture'], 'emoji': '🎯', 'ru': {'title': 'Универсальное семейство моделей для эффективного компьютерного зрения без подавления пересечений', 'desc': 'YOLO26 — это унифицированное семейство моделей для решения задач компьютерного зрения в реальном времени. Архитектура использует двойную голову для NMS-free вывода и исключает Distribution Focal Loss для облегчения модели. Обучение базируется на инновационной схеме, включающей оптимизатор MuSGD, Progressive Loss и стратегию STAL, которая гарантирует покрытие малых объектов. Модельное семейство охватывает пять масштабов и поддерживает детекцию, сегментацию, оценку позы и другие задачи в единой архитектуре.'}, 'en': {'title': 'YOLO26: Real-Time Vision Made Efficient and Versatile', 'desc': 'YOLO26 is a new family of models designed for real-time vision tasks like detection, segmentation, and pose estimation. It improves upon previous YOLO models by eliminating the need for non-maximum suppression (NMS) during inference and simplifying the detection head, making it lighter and more efficient. The training process incorporates advanced techniques such as MuSGD and Progressive Loss to enhance performance, especially for small objects. With its multi-task capabilities and support for various scales, YOLO26 achieves high accuracy while maintaining low latency, making it suitable for diverse hardware deployments.'}, 'zh': {'title': 'YOLO26：统一的实时视觉解决方案', 'desc': 'YOLO26是一个统一的实时视觉模型系列，旨在解决检测、分割和姿态估计等任务中的挑战。它采用双头设计，实现了无非极大值抑制（NMS）的端到端推理，且去除了分布焦点损失（DFL），使得模型更加轻量化。训练过程中，YOLO26结合了多种优化策略，如MuSGD和渐进损失，确保小物体也能获得正标签。该模型支持多种任务和尺度，展现出在准确性和延迟方面的显著提升。'}}}, {'id': 'https://huggingface.co/papers/2606.01494', 'title': 'ClawHub Security Signals: When VirusTotal, Static Analysis, and SkillSpector Disagree', 'url': 'https://huggingface.co/papers/2606.01494', 'abstract': "Abstract Agent skills require layered security governance due to scanner disagreement, with findings showing varying detection rates across different scanner types and attack surfaces.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agent skills extend AI agents with reusable instructions, tools, scripts, references, and workflows, establishing a security boundary distinct from both model safety and traditional package-malware detection. ClawHub Security Signals is a sanitized dataset of 67,453 latest public OpenClaw skill versions. Each row pairs redacted SKILL.md content and sanitized bundled files where present with a final ClawScan registry verdict and evidence from three scanner families: VirusTotal, static heuristic analysis, and NVIDIA SkillSpector.   Rather than estimating malicious-skill prevalence, we study scanner disagreement. The three scanners rarely flag the same skills: any pair overlaps on at most 10.4% of their combined positives, only 0.69% of skills are flagged by all three, and 81.9% of flagged skills are identified by a single scanner. The disagreement is structured by attack surface. SkillSpector, which raises semantic agentic-risk advisories rather than malware-reputation signals, is positive for 19,209 of 25,504 suspicious rows (75.3%) but only 14 of 206 malicious rows (6.8%). The malicious-verdict region shows the inverse profile: 150 of 206 malicious rows (72.8%) are VirusTotal-positive, consistent with bundled-code malware evidence.   These results show that agent-skill security requires layered governance, not single-scanner allow/block decisions. The corpus is released as a sanitized silver-standard dataset: labels are the registry's automated verdicts, not human-annotated ground truth, and the release represents an early, versioned snapshot intended to support the community while a human-annotated subset is developed. Further research is encouraged, including models tailored for skill-security triage.", 'score': 3, 'issue_id': 2365, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '5f574deea4c567da', 'authors': ['Vincent Koc', 'Patrick Erichsen', 'Jacob Tomlinson', 'Agustin Rivera', 'Michael Appel', 'Nir Paz'], 'affiliations': ['NVIDIA', 'OpenClaw Foundation'], 'pdf_title_img': 'assets/pdf/title_img/2606.01494.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents', '#open_source', '#security'], 'emoji': '🔐', 'ru': {'title': 'Многоуровневая система безопасности для AI агентов на основе консенсуса нескольких сканеров', 'desc': 'В этой работе исследуется проблема обнаружения вредоносных навыков для AI агентов с использованием трёх различных сканеров безопасности. Авторы создали датасет ClawHub Security Signals из 67,453 публичных версий навыков и проанализировали согласованность verdictов между VirusTotal, статическим анализом и NVIDIA SkillSpector. Исследование показало значительное несогласие между сканерами: только 0,69% навыков флагируются всеми тремя сканерами, а 81,9% обнаруженных угроз определяются только одним сканером. На основе полученных результатов авторы рекомендуют использовать многоуровневый подход к управлению безопасностью навыков вместо принятия решений на основе одного сканера.'}, 'en': {'title': 'Layered Security Governance for AI Agent Skills', 'desc': 'This paper discusses the need for layered security governance in AI agent skills due to inconsistencies in detection rates among different security scanners. It highlights the creation of a dataset called ClawHub Security Signals, which includes various versions of AI skills and their detection results from three different scanners. The study reveals significant disagreement among scanners, with only a small percentage of skills being flagged by all three, indicating that relying on a single scanner for security decisions is insufficient. The findings suggest that a more comprehensive approach is necessary for evaluating the security of AI skills, paving the way for future research in skill-security models.'}, 'zh': {'title': '代理技能安全治理需分层策略', 'desc': '本论文探讨了代理技能的安全治理问题，指出不同扫描器在检测率上存在显著差异。研究表明，三种扫描器之间的重叠率极低，只有0.69%的技能被所有三种扫描器标记为恶意。为了应对这种扫描器之间的不一致性，作者建议采用分层的安全治理策略，而不是单一的允许或阻止决策。最后，研究提供了一个经过清洗的银标准数据集，以支持社区的进一步研究。'}}}, {'id': 'https://huggingface.co/papers/2606.00386', 'title': 'αDepth: Learning Single-Pass Soft Boundary Decomposition for Stereo Conversion', 'url': 'https://huggingface.co/papers/2606.00386', 'abstract': 'Abstract αDepth introduces a layered representation with Circular Alpha Representation (CAR) to address soft boundary challenges in stereo conversion through local boundary decomposition and efficient scene-level inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accurately modeling soft boundaries, e.g., hair and defocus blur, is a fundamental challenge in stereo conversion due to the ambiguous blending of foreground and background. Existing depth models primarily predict single-layer depth, leading to ambiguity in depth correspondence at soft boundaries. While matting techniques can capture opacity for layered modeling, they often struggle in complex scenes with multiple targets and usually require user intervention. This paper introduces αDepth, a layered representation that decomposes soft boundaries for high-fidelity stereo conversion. Specifically, we first resolve mixed color and depth ambiguity by estimating layered color and depth values at soft boundaries. Considering complex multi-target scenes, we design a Circular Alpha Representation (CAR) that shifts the paradigm from global target extraction to local boundary decomposition. Unlike prior matting methods restricted to a single foreground/background, CAR enables efficient scene-level inference without manual guidance. Extensive evaluations demonstrate that αDepth achieves state-of-the-art performance in stereo conversion, eliminating background bleeding and structural distortions at soft boundaries.', 'score': 3, 'issue_id': 2366, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '9ff481f7f3ed3771', 'authors': ['Xiang Zhang', 'Yang Zhang', 'Lukas Mehl', 'Karlis Martins Briedis', 'Markus Gross', 'Christopher Schroers'], 'affiliations': ['DisneyResearchStudios', 'ETH Zürich'], 'pdf_title_img': 'assets/pdf/title_img/2606.00386.jpg', 'data': {'categories': ['#cv', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Слоистая репрезентация для безупречной стерео-конверсии сложных сцен', 'desc': 'αDepth представляет новый подход к стерео-конверсии, используя многоуровневую репрезентацию с Circular Alpha Representation (CAR) для решения проблемы мягких границ между объектами. Основная идея заключается в разложении мягких границ (волосы, размытие фокуса) путём одновременного предсказания слоистых значений цвета и глубины, что устраняет неоднозначность в соответствии глубин. Circular Alpha Representation переходит от глобальной экстракции целевых объектов к локальному разложению границ, позволяя эффективно обрабатывать сложные сцены с несколькими объектами без ручного вмешательства пользователя. Метод достигает лучшей производительности в стерео-конверсии, полностью устраняя артефакты фона и деформации структур на мягких границах.'}, 'en': {'title': 'Revolutionizing Stereo Conversion with Layered Depth Representation', 'desc': 'The paper presents αDepth, a novel approach for stereo conversion that utilizes a Circular Alpha Representation (CAR) to effectively manage soft boundaries, such as hair and defocus blur. Traditional depth models often struggle with ambiguity in depth correspondence at these boundaries, as they typically predict single-layer depth. αDepth addresses this by decomposing soft boundaries into layered color and depth values, allowing for more accurate modeling in complex scenes. The CAR framework shifts the focus from global extraction to local boundary decomposition, enabling efficient scene-level inference without the need for user intervention, resulting in high-fidelity stereo outputs.'}, 'zh': {'title': 'αDepth：高保真立体转换的新方法', 'desc': 'αDepth提出了一种分层表示方法，使用圆形阿尔法表示（CAR）来解决立体转换中的软边界挑战。通过局部边界分解和高效的场景级推理，αDepth能够准确建模如头发和虚焦模糊等软边界。与传统的单层深度模型不同，αDepth通过估计软边界的分层颜色和深度值，消除了深度对应的模糊性。该方法在复杂场景中表现出色，避免了背景渗透和结构失真，达到了立体转换的最先进性能。'}}}, {'id': 'https://huggingface.co/papers/2606.02775', 'title': 'AURA: Action-Gated Memory for Robot Policies at Constant VRAM', 'url': 'https://huggingface.co/papers/2606.02775', 'abstract': 'Abstract AURA-Mem is a recurrent memory system that adapts to embodied AI constraints by writing only when observations affect actions, significantly reducing memory writes compared to traditional KV-cache approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The KV-cache is the right memory for datacenters but the wrong memory for robots. Datacenter inference batches many short requests and resets them, amortizing an attention cache across a crowd. Embodied agents instead run one long, non-resetting episode on bandwidth-limited edge hardware, where high-bandwidth memory and flash are scarce, flash has finite write endurance, and memory writes rather than compute can become the binding constraint.   AURA-Mem (Action-Utility Recurrent Adaptive Memory) targets this regime. It wraps a frozen vision-language-action backbone with a constant-size recurrent memory and a learned gate that writes only when the current observation would change the next action: memory that knows when to stay silent. Unlike reconstruction-based memory, the gate is trained directly against a closed-loop action-error signal. Its inference state is fixed at 4,224 bytes regardless of horizon, while a KV-cache grows to 6,061 times larger at 100,000 steps.   On a controlled synthetic benchmark, AURA-Mem matches the best O(1) baseline in accuracy while using 5.19-6.13 times fewer writes, and up to 9.19 times fewer writes on easier configurations. Budget-matched random and periodic schedules do not recover this gain, isolating the benefit to the action-surprise signal. On a trained closed-loop OpenVLA-OFT 7B panel on LIBERO-Long (n=60 episodes per arm), the gate does not hurt success: AURA-Mem matches the ungated base policy (0.233) and slightly exceeds an always-write KV arm (0.217), while using 7.0 times fewer writes and constant memory. We also instantiate an approximate-information-state value-loss bound as a methodology demonstration; at this scale, the bound is vacuous rather than a guarantee.', 'score': 2, 'issue_id': 2367, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '889622edae4f7abf', 'authors': ['Josef Chen'], 'affiliations': ['KAIKAKU'], 'pdf_title_img': 'assets/pdf/title_img/2606.02775.jpg', 'data': {'categories': ['#architecture', '#inference', '#robotics', '#agents', '#training'], 'emoji': '🤖', 'ru': {'title': 'Умная память для робота: пишем только когда это важно', 'desc': 'AURA-Mem — это система рекуррентной памяти, специально разработанная для робототехники и агентов на периферийных устройствах. В отличие от традиционного KV-cache, она записывает информацию в память только когда текущее наблюдение влияет на следующее действие, что значительно снижает количество операций записи. Система использует обучаемый гейт, управляемый сигналом ошибки в замкнутом цикле управления, и поддерживает постоянный размер памяти независимо от горизонта планирования. Экспериментальные результаты показывают, что AURA-Mem достигает сопоставимой точности с базовыми методами, при этом используя в 5-9 раз меньше операций записи в память.'}, 'en': {'title': 'Efficient Memory for Action-Driven AI', 'desc': 'AURA-Mem is a novel recurrent memory system designed for embodied AI, which optimizes memory usage by writing only when necessary, thus minimizing memory writes compared to traditional key-value (KV) caches. This system is particularly suited for robots that operate under constraints of limited bandwidth and finite memory resources, unlike datacenters that can afford to batch requests. AURA-Mem employs a learned gating mechanism that determines when to update memory based on the impact of observations on future actions, enhancing efficiency. In experiments, AURA-Mem demonstrated comparable accuracy to existing methods while significantly reducing memory writes, showcasing its effectiveness in real-time, action-driven environments.'}, 'zh': {'title': 'AURA-Mem：智能记忆，减少写入，提升效率', 'desc': 'AURA-Mem是一种递归记忆系统，专为适应具身人工智能的限制而设计。它仅在观察影响行动时进行写入，这大大减少了与传统KV缓存方法相比的内存写入次数。AURA-Mem通过一个固定大小的递归记忆和一个学习的门控机制来实现，只有在当前观察会改变下一个行动时才会写入。与重建基础的记忆不同，这个门控机制是直接针对闭环动作误差信号进行训练的。'}}}, {'id': 'https://huggingface.co/papers/2605.30581', 'title': 'Prior Availability in Industrial Visual Sim-to-Real: A Review of CAD-Guided and CAD-Unavailable Regimes', 'url': 'https://huggingface.co/papers/2605.30581', 'abstract': 'Abstract Industrial visual sim-to-real is reframed as a domain-gap problem categorized by prior availability, distinguishing CAD-available, CAD-unavailable, and boundary-prior settings for robust deployment across varied industrial conditions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Industrial visual sim-to-real is often described as transferring from synthetic images to real images, but industrial deployment usually involves a broader mismatch between available evidence and required decisions. A system may be built from CAD renderings, simulated RGB-D observations, normal reference images, synthetic defects, pretrained feature spaces, or language prompts, yet deployed under different sensors, lighting, materials, fixtures, calibration, production variation, and rare defect modes. This review reframes industrial visual sim-to-real as a domain-gap problem organized by prior availability. We distinguish CAD-available settings, where explicit object geometry can support rendering, calibration, pose estimation, segmentation, and test-time geometric verification; CAD-unavailable settings, where geometry is replaced by normal-reference appearance, feature distributions, teacher-student residuals, synthetic anomaly assumptions, foundation features, or vision-language priors; and boundary-prior settings, where approximate models, templates, reference views, or semantic correspondences preserve only part of the CAD role. This framing connects CAD-based detection and 6D pose-estimation literature with industrial anomaly and surface-inspection literature that is usually reviewed separately. To make the taxonomy concrete, we use empirical anchors on T-LESS/BOP, MVTec AD, and VisA. The anchors show that CAD render count alone does not close transfer; source-distribution design, detector capacity, and small real calibration can matter more. They also show that CAD at test time creates a distinct verification channel through mask, pose, and depth consistency, whereas CAD-unavailable inspection relies on calibrated normality and feature deviation. The review therefore argues against a single cross-task leaderboard and instead asks what prior grounds the deployment decision.', 'score': 2, 'issue_id': 2367, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'e67ffa1b33d2d028', 'authors': ['Chenxi Tao', 'Seung-Kyum Choi'], 'affiliations': ['George W. Woodruff School of Mechanical Engineering, Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.30581.jpg', 'data': {'categories': ['#transfer_learning', '#dataset', '#survey', '#benchmark', '#cv'], 'emoji': '🏭', 'ru': {'title': 'От синтетики к реальности: таксономия переноса знаний по наличию геометрических приоритетов', 'desc': 'В статье переосмысляется задача переноса синтетических изображений в реальные условия (sim-to-real) в промышленности как проблема сокращения расхождения между доменами. Авторы предлагают таксономию, различающую три категории в зависимости от наличия приоритетной информации: случаи с доступной CAD-геометрией, где можно использовать рендеринг и верификацию в тестовый момент; случаи без CAD, где применяются признаки и прецеденты; и пограничные случаи с приблизительными моделями. Экспериментальное исследование на стандартных бенчмарках показывает, что количество синтетических рендеров менее значимо, чем проектирование распределения исходных данных и калибровка на реальных данных, а тестовая верификация через маски и глубину работает по-разному в зависимости от доступности геометрии.'}, 'en': {'title': 'Bridging the Gap: From CAD to Real-World Visual Systems', 'desc': 'This paper discusses the challenges of transferring visual information from synthetic environments to real-world industrial applications, framing it as a domain-gap problem. It categorizes scenarios based on the availability of prior information, such as CAD models, which can significantly influence the effectiveness of visual systems. The authors highlight the importance of understanding different settings—CAD-available, CAD-unavailable, and boundary-prior—to improve deployment strategies across various industrial conditions. They emphasize that simply having CAD data is not enough; factors like source distribution and detector capabilities also play crucial roles in successful implementation.'}, 'zh': {'title': '重新定义工业视觉仿真与现实的差距问题', 'desc': '本文将工业视觉的仿真到现实问题重新定义为一个领域间差距问题，主要分为三种设置：CAD可用、CAD不可用和边界先验设置。这些设置帮助我们理解在不同工业条件下的稳健部署，尤其是在合成图像与真实图像之间的转移。文章指出，系统可以基于CAD渲染、模拟RGB-D观察、正常参考图像等构建，但在不同传感器、光照和材料下部署时会面临更广泛的不匹配。最后，作者强调了在测试时使用CAD的重要性，并提出不应仅依赖单一的跨任务排行榜，而应关注先验条件如何影响部署决策。'}}}, {'id': 'https://huggingface.co/papers/2606.03287', 'title': 'BA-T: An Iterative Transformer for Two-View Bundle Adjustment', 'url': 'https://huggingface.co/papers/2606.03287', 'abstract': 'Abstract BA-T is an iterative Transformer architecture that improves 3D reconstruction accuracy and cross-view consistency through structured updates inspired by bundle adjustment, using a lightweight design that requires only 16% of conventional decoder parameters.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Feed-forward models for 3D reconstruction have achieved strong performance using deep cross-view attention to exchange information across images. However, these approaches often depend on heavy decoder stacks and lack a structured mechanism for geometry refinement, resulting in poor multi-view consistency. We address this by drawing inspiration from classical bundle adjustment (BA), which can be viewed as an iterative information propagation process between poses and local geometry. Inspired by BA, we propose BA-T, an iterative Transformer that implements BA-style structured updates as a repeatable layer in implicit token space. Instead of relying on deep attention stacks, BA-T refines predictions based on latent residual by a single lightweight layer. Experiments demonstrate that BA-T progressively improves pose and reconstruction accuracy across iterations, achieves stronger cross-view consistency than conventional decoders, and matches or surpasses substantially larger models while using only 16% of their decoder parameters. BA-T provides a compact, efficient, and structural alternative to depth-heavy attention, enabling accurate 3D reconstruction within a lightweight architecture. The code will be made publicly at https://github.com/zhangganlin/BA-T.', 'score': 1, 'issue_id': 2366, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '2a9bda10ddcede3c', 'authors': ['Ganlin Zhang', 'Weirong Chen', 'Daniel Cremers', 'Xi Wang'], 'affiliations': ['ETH Zurich', 'MCML', 'TU Munich'], 'pdf_title_img': 'assets/pdf/title_img/2606.03287.jpg', 'data': {'categories': ['#3d', '#architecture', '#small_models'], 'emoji': '🏗️', 'ru': {'title': 'Итеративная геометрическая оптимизация через структурированное внимание', 'desc': 'Статья представляет BA-T — итеративную архитектуру Трансформера для 3D реконструкции, вдохновленную классическим методом связки снимков (bundle adjustment). Модель использует структурированные обновления в неявном пространстве токенов, позволяя уточнять геометрию через остатки предсказаний с помощью одного легкого слоя вместо глубоких стеков внимания. BA-T достигает лучшей согласованности между видами и сравнима с гораздо более крупными моделями, используя только 16% параметров их декодеров. Компактная архитектура обеспечивает эффективную 3D реконструкцию с прогрессивным улучшением точности позы и геометрии на каждой итерации.'}, 'en': {'title': 'Efficient 3D Reconstruction with BA-T: Lightweight and Accurate', 'desc': 'BA-T is a novel iterative Transformer architecture designed to enhance 3D reconstruction accuracy and cross-view consistency. It utilizes structured updates inspired by bundle adjustment, allowing for effective geometry refinement without the need for extensive decoder parameters. By employing a lightweight design that only requires 16% of the parameters of traditional decoders, BA-T achieves significant improvements in pose and reconstruction accuracy. This approach demonstrates that efficient architectures can outperform larger models while maintaining strong multi-view consistency.'}, 'zh': {'title': 'BA-T：轻量级的3D重建新选择', 'desc': 'BA-T是一种迭代的Transformer架构，通过受束调整启发的结构化更新，提高了3D重建的准确性和视图间一致性。该模型设计轻量，仅需传统解码器参数的16%。BA-T通过在隐式标记空间中实现BA风格的结构化更新，避免了依赖深层注意力堆栈的问题，从而实现几何精细化。实验表明，BA-T在迭代过程中逐步提高了姿态和重建精度，并在视图间一致性上超越了传统解码器。'}}}, {'id': 'https://huggingface.co/papers/2606.02578', 'title': 'Mitigating Perceptual Judgment Bias in Multimodal LLM-as-a-Judge via Perceptual Perturbation and Reward Modeling', 'url': 'https://huggingface.co/papers/2606.02578', 'abstract': 'Abstract Researchers identify a perceptual judgment bias in multimodal large language models where visual evidence is overlooked for textual plausibility, and propose a training framework using a perturbed dataset and reward modeling to improve perceptual fidelity and evaluation consistency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent multimodal large language models have demonstrated strong reasoning ability, yet their reliability as automated evaluators remains limited by a critical weakness: when visual evidence conflicts with textual cues, MLLM judges tend to reward plausible narratives over perceptually correct answers. We identify and systematically analyze this phenomenon, which we term Perceptual Judgment Bias. Through controlled visual perturbations, existing multimodal judges frequently anchor on the response text instead of their own visual perception, leading to inconsistent and non-verifiable evaluations. To address this issue, we introduce the Perceptually Perturbed Judgment Dataset, which constructs minimally edited counterfactual responses that isolate perceptual errors and enable verifiable supervision. Building on this dataset, we develop a unified training framework that combines a structured GRPO-based reward with a batch-ranking objective, achieving coherent global ordering without explicit pairwise labels. Experiments across diverse MLLM-as-a-Judge benchmarks show that our approach substantially improves perceptual fidelity, ranking coherence, and alignment with human evaluation. Our results establish a scalable and generalizable pathway for training multimodal judges that are perceptually grounded, interpretable, and robust to visual-reasoning conflicts.', 'score': 1, 'issue_id': 2367, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '201a3a4c985851cf', 'authors': ['Seojeong Park', 'Jiho Choi', 'Junyong Kang', 'Seonho Lee', 'Jaeyo Shin', 'Hyunjung Shim'], 'affiliations': ['Graduate School of Artificial Intelligence, KAIST, Republic of Korea', 'KRAFTON'], 'pdf_title_img': 'assets/pdf/title_img/2606.02578.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark', '#training', '#rlhf'], 'emoji': '👁️', 'ru': {'title': 'Обучение мультимодальных судей, устойчивых к зрительно-текстовым конфликтам', 'desc': 'Исследователи выявили смещение в суждениях мультимодальных больших языковых моделей, когда визуальная информация игнорируется в пользу текстовой правдоподобности. Авторы предложили систематический анализ этого явления через контролируемые визуальные возмущения и создали специализированный датасет с контрфактическими примерами. Они разработали унифицированный фреймворк обучения, сочетающий структурированное вознаграждение на основе GRPO с объективом ранжирования батчей для достижения согласованного глобального упорядочивания. Эксперименты демонстрируют, что подход значительно улучшает перцептивную верность оценок и выравнивание с человеческой оценкой.'}, 'en': {'title': 'Enhancing Visual Accuracy in Multimodal Language Models', 'desc': "This paper addresses a problem in multimodal large language models (MLLMs) where they tend to favor plausible text over accurate visual information, a phenomenon called Perceptual Judgment Bias. The authors propose a new training framework that utilizes a specially designed dataset, the Perceptually Perturbed Judgment Dataset, to help MLLMs better align their evaluations with visual evidence. By applying controlled visual changes and a structured reward model, the framework enhances the models' ability to make consistent and verifiable judgments. The results demonstrate significant improvements in the models' perceptual accuracy and coherence in evaluations, paving the way for more reliable multimodal assessments."}, 'zh': {'title': '提升多模态模型的感知判断准确性', 'desc': '本研究发现多模态大型语言模型在感知判断上存在偏差，尤其是在视觉证据与文本合理性冲突时，模型倾向于奖励文本上看似合理的叙述，而忽视视觉信息。为了解决这一问题，研究者提出了一种新的训练框架，利用扰动数据集和奖励建模来提高模型的感知准确性和评估一致性。通过构建感知扰动判断数据集，研究者能够隔离感知错误并实现可验证的监督。实验结果表明，该方法显著提升了多模态模型的感知准确性和与人类评估的一致性。'}}}, {'id': 'https://huggingface.co/papers/2605.27958', 'title': 'Pressure-Testing Deception Probes in LLMs: Scaling, Robustness, and the Geometry of Deceptive Representations', 'url': 'https://huggingface.co/papers/2605.27958', 'abstract': 'Abstract Linear probes for deception detection in large language models fail under distributional shifts despite high performance on clean data, revealing that deception is encoded through distributed sub-threshold features rather than simple linear directions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Linear probes trained on LLM activations are increasingly proposed as deception-detection metrics, yet report AUROC exceeding 0.96 on clean benchmarks while collapsing under distributional shift. This paper systematically pressure-tests probe-based metrics across the Gemma 3 model family (1B-27B parameters), diagnosing why they fail rather than merely documenting that they fail. We test four hypotheses about deception encoding: (1) single linear direction, (2) multi-dimensional subspace, (3) convex conic hull, (4) entropy proxy. Our design includes cross-domain transfer matrices, multi-dimensional probe analysis with permutation null baselines, entropy-residualization tests, and distractor evaluations across 8 stylistic shifts. We find that: (a) probes achieve near-perfect AUROC (>=0.998) on clean data but collapse under stylistic shifts; style-augmented probes recover near-perfect detection (mean AUROC 0.979-0.983) on unseen styles; (b) the single-direction hypothesis is rejected (k=1 captures only 0.61-0.80 AUROC), with cross-domain transfer failure confirmed as geometric rather than layer-mismatch-driven; (c) the entropy-proxy hypothesis is rejected (max |rho|=0.454, max Delta-AUROC after residualization=0.004); and (d) deception does not form a significant linear subspace (per-domain k*=0), yet multi-dimensional probes (k>=5) recover the signal through distributed sub-threshold features. Probe fragility reflects distributional narrowness rather than an architectural limitation: style-augmented probes recover near-perfect detection at both 4B and 27B, establishing that the inverse scaling pattern is a training-distribution artifact rather than a genuine scale-dependent phenomenon.', 'score': 1, 'issue_id': 2365, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '787397d40116a79e', 'authors': ['Sachin Kumar'], 'affiliations': ['LexisNexis, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.27958.jpg', 'data': {'categories': [], 'emoji': '🎭', 'ru': {'title': 'Обман скрывается в деталях: почему линейные зонды не видят распределённые признаки лжи', 'desc': 'В работе исследуется проблема детектирования обмана в больших языковых моделях с использованием линейных зондов (linear probes). Авторы обнаруживают, что зонды достигают высокой точности на чистых данных (AUROC > 0.96), но полностью теряют эффективность при распределительных сдвигах. Через серию экспериментов установлено, что обман кодируется не в простых линейных направлениях активаций, а через распределённые многомерные признаки, требующие по крайней мере пяти размерностей для восстановления сигнала. Расширение тренировочных данных стилистическими вариациями позволяет восстановить стабильное детектирование (AUROC 0.979-0.983) на невидимых стилях и показывает, что проблема заключается в узости распределения данных, а не в архитектурном ограничении модели.'}, 'en': {'title': 'Unveiling Deception: Beyond Linear Probes in Language Models', 'desc': 'This paper investigates the effectiveness of linear probes for detecting deception in large language models (LLMs) and reveals their limitations under different data distributions. Despite achieving high performance on clean datasets, these probes fail when faced with stylistic shifts, indicating that deception is represented through complex, distributed features rather than simple linear patterns. The authors conduct a series of tests to understand why these probes fail, rejecting several hypotheses about how deception is encoded. Ultimately, they find that multi-dimensional probes can successfully detect deception by leveraging sub-threshold features, highlighting the need for more
