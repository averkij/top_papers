    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                    flag.classList.add('active');

                flag.addEventListener('click', () => {

                const titleSign = document.getElementById('doomgrad-icon');

                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.04918', 'title': 'BandPO: Bridging Trust Regions and Ratio Clipping via Probability-Aware Bounds for LLM Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.04918', 'abstract': 'Abstract Band-constrained Policy Optimization addresses stability issues in reinforcement learning for large language models by replacing fixed clipping with a dynamic probability-aware projection method that prevents entropy collapse.  \t\t\t\t\tAI-generated summary Proximal constraints are fundamental to the stability of the Large Language Model reinforcement learning. While the canonical clipping mechanism in PPO serves as an efficient surrogate for trust regions, we identify a critical bottleneck: fixed bounds strictly constrain the upward update margin of low-probability actions, disproportionately suppressing high-advantage tail strategies and inducing rapid entropy collapse. To address this, we introduce Band-constrained Policy Optimization (BandPO). BandPO replaces canonical clipping with Band, a unified theoretical operator that projects trust regions defined by f-divergences into dynamic, probability-aware clipping intervals. Theoretical analysis confirms that Band effectively resolves this exploration bottleneck. We formulate this mapping as a convex optimization problem, guaranteeing a globally optimal numerical solution while deriving closed-form solutions for specific divergences. Extensive experiments across diverse models and datasets demonstrate that BandPO consistently outperforms canonical clipping and Clip-Higher, while robustly mitigating entropy collapse.', 'score': 41, 'issue_id': 1392, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '12d6b90e8c3f3c78', 'authors': ['Yuan Li', 'Bo Wang', 'Yufei Gao', 'Yuqian Yao', 'Xinyuan Wang', 'Zhangyue Yin', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2603.04918.jpg', 'data': {'categories': ['#training', '#rlhf', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Динамическое отсечение вместо фиксированного: спасаем исследование в обучении с подкреплением', 'desc': "Работа посвящена улучшению алгоритма PPO для обучения больших языковых моделей с подкреплением. Авторы выявили проблему: фиксированное отсечение (clipping) подавляет действия с низкой вероятностью и вызывает коллапс энтропии, что снижает исследовательские возможности агента. Предложенный метод Band-constrained Policy Optimization заменяет жёсткое отсечение на динамическое вероятностно-осведомленное проецирование, адаптивно изменяющее границы для каждого действия. Экспериментальные результаты показывают, что новый подход превосходит классическое clipping'нение и эффективно предотвращает коллапс энтропии."}, 'en': {'title': 'Dynamic Clipping for Stable Reinforcement Learning', 'desc': 'This paper introduces Band-constrained Policy Optimization (BandPO) to improve stability in reinforcement learning for large language models. It replaces the traditional fixed clipping method with a dynamic, probability-aware projection that allows for better exploration of low-probability actions. By using f-divergences to define trust regions, BandPO prevents rapid entropy collapse and enhances the performance of high-advantage strategies. Theoretical and experimental results show that BandPO outperforms existing methods while ensuring a globally optimal solution through convex optimization.'}, 'zh': {'title': '动态约束提升强化学习稳定性', 'desc': '带约束策略优化（BandPO）解决了大语言模型强化学习中的稳定性问题。它通过动态概率感知投影方法替代了固定的剪切机制，防止了熵崩溃。BandPO能够有效地扩展低概率动作的更新幅度，避免了高优势尾部策略的抑制。理论分析和实验结果表明，BandPO在多种模型和数据集上均优于传统的剪切方法。'}}}, {'id': 'https://huggingface.co/papers/2603.06569', 'title': 'Penguin-VL: Exploring the Efficiency Limits of VLM with LLM-based Vision Encoders', 'url': 'https://huggingface.co/papers/2603.06569', 'abstract': 'Abstract Penguin-VL demonstrates that text-only initialized vision encoders can achieve superior performance in multimodal understanding tasks compared to traditional contrastive pretraining methods, enabling efficient deployment on resource-constrained devices.  \t\t\t\t\tAI-generated summary Vision Language Model (VLM) development has largely relied on scaling model size, which hinders deployment on compute-constrained mobile and edge devices such as smartphones and robots. In this work, we explore the performance limits of compact (e.g., 2B and 8B) VLMs. We challenge the prevailing practice that state-of-the-art VLMs must rely on vision encoders initialized via massive contrastive pretraining (e.g., CLIP/SigLIP). We identify an objective mismatch: contrastive learning, optimized for discrimination, enforces coarse and category-level invariances that suppress fine-grained visual cues needed for dense captioning and complex VLM reasoning. To address this issue, we present Penguin-VL, whose vision encoder is initialized from a text-only LLM. Our experiments reveal that Penguin-Encoder serves as a superior alternative to traditional contrastive pretraining, unlocking a higher degree of visual fidelity and data efficiency for multimodal understanding. Across various image and video benchmarks, Penguin-VL achieves performance comparable to leading VLMs (e.g., Qwen3-VL) in mathematical reasoning and surpasses them in tasks such as document understanding, visual knowledge, and multi-perspective video understanding. Notably, these gains are achieved with a lightweight architecture, demonstrating that improved visual representation rather than model scaling is the primary driver of performance. Our ablations show that Penguin-Encoder consistently outperforms contrastive-pretrained encoders, preserving fine-grained spatial and temporal cues that are critical for dense perception and complex reasoning. This makes it a strong drop-in alternative for compute-efficient VLMs and enables high performance in resource-constrained settings. Code: https://github.com/tencent-ailab/Penguin-VL', 'score': 23, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'c28d1c06c1cfff4d', 'authors': ['Boqiang Zhang', 'Lei Ke', 'Ruihan Yang', 'Qi Gao', 'Tianyuan Qu', 'Rossell Chen', 'Dong Yu', 'Leoweiliang'], 'affiliations': ['Tencent AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.06569.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#open_source', '#optimization', '#video', '#inference'], 'emoji': '🐧', 'ru': {'title': 'От текста к видению: зачем контрастное обучение вредит мультимодальным моделям', 'desc': 'В работе Penguin-VL авторы показывают, что инициализация визуального кодировщика из текстового LLM превосходит традиционные методы контрастного обучения (CLIP/SigLIP) для мультимодальных моделей. Они выявили несоответствие между целями контрастного обучения, которое подавляет детальные визуальные признаки, необходимые для сложного понимания изображений и видео. Предложенный подход позволяет компактным VLM (2B-8B параметров) достигать качества крупных моделей, сохраняя пространственно-временные детали без увеличения размера. Это открывает возможность развертывания высокопроизводительных мультимодальных моделей на устройствах с ограниченными вычислительными ресурсами.'}, 'en': {'title': 'Penguin-VL: Lightweight Vision-Language Models Redefining Performance', 'desc': "Penguin-VL introduces a new approach to vision-language models (VLMs) by using a vision encoder initialized from a text-only language model, rather than relying on traditional contrastive pretraining methods. This innovative method enhances the model's ability to capture fine-grained visual details, which are essential for complex tasks like dense captioning and reasoning. The results show that Penguin-VL achieves competitive performance on various benchmarks while maintaining a lightweight architecture, making it suitable for deployment on devices with limited computational resources. Overall, this work challenges the notion that larger models are necessary for state-of-the-art performance, emphasizing the importance of effective visual representation instead."}, 'zh': {'title': '轻量级视觉编码器，超越传统对比预训练', 'desc': 'Penguin-VL展示了仅使用文本初始化的视觉编码器在多模态理解任务中可以超越传统的对比预训练方法。这种方法使得在资源受限的设备上高效部署成为可能。研究表明，Penguin-Encoder在视觉表现和数据效率上优于传统的对比预训练编码器，尤其在复杂推理和文档理解等任务中表现突出。通过保持细粒度的空间和时间线索，Penguin-VL为计算高效的多模态模型提供了强有力的替代方案。'}}}, {'id': 'https://huggingface.co/papers/2603.04639', 'title': 'RoboMME: Benchmarking and Understanding Memory for Robotic Generalist Policies', 'url': 'https://huggingface.co/papers/2603.04639', 'abstract': 'Abstract RoboMME presents a large-scale standardized benchmark for evaluating vision-language-action models in long-horizon robotic manipulation tasks requiring memory mechanisms.  \t\t\t\t\tAI-generated summary Memory is critical for long-horizon and history-dependent robotic manipulation. Such tasks often involve counting repeated actions or manipulating objects that become temporarily occluded. Recent vision-language-action (VLA) models have begun to incorporate memory mechanisms; however, their evaluations remain confined to narrow, non-standardized settings. This limits their systematic understanding, comparison, and progress measurement. To address these challenges, we introduce RoboMME: a large-scale standardized benchmark for evaluating and advancing VLA models in long-horizon, history-dependent scenarios. Our benchmark comprises 16 manipulation tasks constructed under a carefully designed taxonomy that evaluates temporal, spatial, object, and procedural memory. We further develop a suite of 14 memory-augmented VLA variants built on the π0.5 backbone to systematically explore different memory representations across multiple integration strategies. Experimental results show that the effectiveness of memory representations is highly task-dependent, with each design offering distinct advantages and limitations across different tasks. Videos and code can be found at our website https://robomme.github.io.', 'score': 9, 'issue_id': 1391, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'f5bb438a5214a7ad', 'authors': ['Yinpei Dai', 'Hongze Fu', 'Jayjun Lee', 'Yuejiang Liu', 'Haoran Zhang', 'Jianing Yang', 'Chelsea Finn', 'Nima Fazeli', 'Joyce Chai'], 'affiliations': ['Figure AI', 'Stanford University', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2603.04639.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#robotics', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Память - ключ к долгосрочным манипуляциям роботов', 'desc': 'RoboMME представляет крупномасштабный стандартизированный бенчмарк для оценки видео-языковых моделей действий в долгосрочных задачах манипулирования роботами, требующих механизмов памяти. Авторы создали набор из 16 манипуляционных задач, организованных в таксономию для оценки временной, пространственной, объектной и процедурной памяти. Они разработали 14 вариантов VLA моделей с дополненной памятью на базе π0.5 для систематического исследования различных представлений памяти и стратегий интеграции. Экспериментальные результаты показывают, что эффективность представлений памяти сильно зависит от задачи, и каждый дизайн имеет отличительные преимущества и ограничения.'}, 'en': {'title': 'RoboMME: Advancing Robotic Memory in Manipulation Tasks', 'desc': 'RoboMME is a benchmark designed to evaluate vision-language-action (VLA) models in complex robotic manipulation tasks that require memory. It focuses on long-horizon tasks where robots must remember past actions and handle occluded objects. The benchmark includes 16 tasks that assess various types of memory, such as temporal and spatial memory. Additionally, the study introduces 14 different memory-augmented VLA models to explore how different memory strategies impact performance across these tasks.'}, 'zh': {'title': 'RoboMME：推动机器人操作记忆机制的标准化评估', 'desc': 'RoboMME是一个大规模的标准化基准，用于评估在长时间机器人操作任务中需要记忆机制的视觉-语言-动作模型。这些任务通常涉及重复动作的计数或暂时被遮挡的物体操作。尽管最近的视觉-语言-动作模型开始引入记忆机制，但它们的评估仍然局限于狭窄的非标准化环境。RoboMME通过构建16个操作任务，系统性地评估时间、空间、物体和程序记忆，推动了VLA模型在历史依赖场景中的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.05706', 'title': 'Reasoning Models Struggle to Control their Chains of Thought', 'url': 'https://huggingface.co/papers/2603.05706', 'abstract': "Abstract Chain-of-thought controllability measures how effectively models can be constrained to follow reasoning steps, with findings showing significantly lower controllability in reasoning versus output generation, and varying impacts from model size, training methods, and task complexity.  \t\t\t\t\tAI-generated summary Chain-of-thought (CoT) monitoring is a promising tool for detecting misbehaviors and understanding the motivations of modern reasoning models. However, if models can control what they verbalize in their CoT, it could undermine CoT monitorability. To measure this undesirable capability -- CoT controllability -- we introduce the CoT-Control evaluation suite, which includes tasks that require models to solve problems while adhering to CoT instructions, e.g., reasoning about a genetics question without using the word 'chromosome'. We show that reasoning models possess significantly lower CoT controllability than output controllability; for instance, Claude Sonnet 4.5 can control its CoT only 2.7% of the time but 61.9% when controlling its final output. We also find that CoT controllability is higher for larger models and decreases with more RL training, test-time compute, and increased problem difficulty. CoT controllability failures extend even to situations in which models are given incentives (as opposed to direct requests) to evade CoT monitors, although models exhibit slightly higher controllability when they are told they are being monitored. Similarly, eliciting controllability by adversarially optimizing prompts does not meaningfully increase controllability. Our results leave us cautiously optimistic that CoT controllability is currently unlikely to be a failure mode of CoT monitorability. However, the mechanism behind low controllability is not well understood. Given its importance for maintaining CoT monitorability, we recommend that frontier labs track CoT controllability in future models.", 'score': 4, 'issue_id': 1391, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '5357013f6092c02c', 'authors': ['Chen Yueh-Han', 'Robert McCarthy', 'Bruce W. Lee', 'He He', 'Ian Kivlichan', 'Bowen Baker', 'Micah Carroll', 'Tomek Korbak'], 'affiliations': ['MATS', 'NYU', 'OpenAI', 'UCL', 'UPenn'], 'pdf_title_img': 'assets/pdf/title_img/2603.05706.jpg', 'data': {'categories': ['#interpretability', '#security', '#alignment', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Модели слабо контролируют свои рассуждения — хорошая новость для мониторинга AI', 'desc': 'В этой работе исследуется способность больших языковых моделей контролировать свои цепочки рассуждений (Chain-of-Thought), то есть скрывать или изменять свои промежуточные выводы при решении задач. Авторы разработали набор оценочных тестов CoT-Control, где модели должны решать задачи, придерживаясь определённых ограничений на формулировку рассуждений. Результаты показывают, что модели намного лучше контролируют финальный ответ (61,9%), чем промежуточные шаги рассуждений (2,7%), что позволяет надеяться на надёжность мониторинга мышления моделей. Исследование выявило, что контролируемость цепочки рассуждений растёт с размером модели, но снижается при увеличении обучения с подкреплением и сложности задач.'}, 'en': {'title': 'Enhancing AI Reasoning: The Challenge of Chain-of-Thought Controllability', 'desc': 'This paper investigates how well AI models can follow specific reasoning steps, termed chain-of-thought (CoT) controllability. The authors introduce the CoT-Control evaluation suite to measure how effectively models adhere to CoT instructions while solving problems. They find that reasoning models struggle with CoT controllability compared to their ability to control final outputs, with larger models performing better. The study suggests that while CoT controllability is crucial for monitoring AI behavior, its underlying mechanisms remain unclear, prompting a recommendation for future research to focus on this aspect.'}, 'zh': {'title': '提升链式思维可控性，确保模型推理可靠性', 'desc': '链式思维可控性是衡量模型在遵循推理步骤方面的有效性。研究发现，推理的可控性显著低于输出生成的可控性，并且受模型大小、训练方法和任务复杂度的影响。我们引入了CoT-Control评估套件，以测量模型在遵循链式思维指令时的能力。结果表明，推理模型的链式思维可控性较低，尤其在面对更复杂的问题时，表现更为明显。'}}}, {'id': 'https://huggingface.co/papers/2603.02083', 'title': 'π-StepNFT: Wider Space Needs Finer Steps in Online RL for Flow-based VLAs', 'url': 'https://huggingface.co/papers/2603.02083', 'abstract': 'Abstract Step-wise negative-aware fine-tuning enables efficient reinforcement learning for vision-language-action models by eliminating likelihood computation and auxiliary networks while improving generalization in complex environments.  \t\t\t\t\tAI-generated summary Flow-based vision-language-action (VLA) models excel in embodied control but suffer from intractable likelihoods during multi-step sampling, hindering online reinforcement learning. We propose \\textit{boldsymbolπ-StepNFT} (Step-wise Negative-aware Fine-Tuning), a critic-and-likelihood-free framework that requires only a single forward pass per optimization step and eliminates auxiliary value networks. We identify that wider exploration spaces necessitate finer-grained, step-wise guidance for alignment. Empirically, π-StepNFT unlocks latent potential on LIBERO with competitive few-shot robustness. Moreover, it achieves superior generalization on ManiSkill, outperforming value-based baselines in OOD scenarios by preventing overfitting to multimodal features. This property offers a scalable solution promising for complex real-world applications.', 'score': 4, 'issue_id': 1391, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'a2c500762221a639', 'authors': ['Siting Wang', 'Xiaofeng Wang', 'Zheng Zhu', 'Minnan Pei', 'Xinyu Cui', 'Cheng Deng', 'Jian Zhao', 'Guan Huang', 'Haifeng Zhang', 'Jun Wang'], 'affiliations': ['GigaAI', 'Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.02083.jpg', 'data': {'categories': ['#training', '#rlhf', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Пошаговая настройка без критика: эффективное обучение с подкреплением для робот-манипуляторов', 'desc': 'В статье предлагается метод π-StepNFT для эффективного обучения с подкреплением в моделях зрения-языка-действия (VLA), которые используются для управления роботами. Основная идея заключается в пошаговой настройке модели на основе негативных примеров, что позволяет избежать вычисления вероятности и исключить вспомогательные сети оценки значения. Авторы показывают, что для широких пространств исследования необходимна более детальная пошаговая направляющая информация для выравнивания поведения. Метод демонстрирует лучшую обобщаемость на сложных задачах и лучше справляется с распределением данных вне обучающего набора в сравнении с базовыми методами.'}, 'en': {'title': 'Efficient Reinforcement Learning with Step-wise Negative-aware Fine-Tuning', 'desc': 'This paper introduces a new method called Step-wise Negative-aware Fine-Tuning (StepNFT) for improving reinforcement learning in vision-language-action models. It simplifies the training process by removing the need for likelihood calculations and additional networks, allowing for more efficient learning. The method focuses on providing detailed guidance during exploration, which helps the model adapt better to complex environments. The results show that StepNFT enhances performance in few-shot learning and generalizes well in out-of-distribution scenarios, making it suitable for real-world applications.'}, 'zh': {'title': '逐步负向微调：提升强化学习效率的创新方法', 'desc': '本文提出了一种名为Step-wise Negative-aware Fine-Tuning（StepNFT）的方法，旨在提高视觉-语言-动作模型在强化学习中的效率。该方法通过消除对数似然计算和辅助网络，简化了优化过程，仅需一次前向传播即可完成每一步的优化。研究表明，在更广泛的探索空间中，逐步指导能够更好地对齐模型，从而提高其在复杂环境中的泛化能力。实验结果显示，StepNFT在LIBERO和ManiSkill数据集上表现出色，尤其在少样本学习和防止过拟合方面具有明显优势。'}}}, {'id': 'https://huggingface.co/papers/2603.06351', 'title': 'Dynamic Chunking Diffusion Transformer', 'url': 'https://huggingface.co/papers/2603.06351', 'abstract': 'Abstract Dynamic Chunking Diffusion Transformer adapts token sequence length based on image content and diffusion timestep, improving efficiency and performance over fixed-token approaches.  \t\t\t\t\tAI-generated summary Diffusion Transformers process images as fixed-length sequences of tokens produced by a static patchify operation. While effective, this design spends uniform compute on low- and high-information regions alike, ignoring that images contain regions of varying detail and that the denoising process progresses from coarse structure at early timesteps to fine detail at late timesteps. We introduce the Dynamic Chunking Diffusion Transformer (DC-DiT), which augments the DiT backbone with a learned encoder-router-decoder scaffold that adaptively compresses the 2D input into a shorter token sequence in a data-dependent manner using a chunking mechanism learned end-to-end with diffusion training. The mechanism learns to compress uniform background regions into fewer tokens and detail-rich regions into more tokens, with meaningful visual segmentations emerging without explicit supervision. Furthermore, it also learns to adapt its compression across diffusion timesteps, using fewer tokens at noisy stages and more tokens as fine details emerge. On class-conditional ImageNet 256{times}256, DC-DiT consistently improves FID and Inception Score over both parameter-matched and FLOP-matched DiT baselines across 4{times} and 16{times} compression, showing this is a promising technique with potential further applications to pixel-space, video and 3D generation. Beyond accuracy, DC-DiT is practical: it can be upcycled from pretrained DiT checkpoints with minimal post-training compute (up to 8{times} fewer training steps) and composes with other dynamic computation methods to further reduce generation FLOPs.', 'score': 1, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'd9b24860ceebfdb6', 'authors': ['Akash Haridas', 'Utkarsh Saxena', 'Parsa Ashrafi Fashi', 'Mehdi Rezagholizadeh', 'Vikram Appia', 'Emad Barsoum'], 'affiliations': ['Advanced Micro Devices Inc. (AMD)'], 'pdf_title_img': 'assets/pdf/title_img/2603.06351.jpg', 'data': {'categories': ['#3d', '#architecture', '#cv', '#training', '#video', '#inference'], 'emoji': '✂️', 'ru': {'title': 'Адаптивная компрессия токенов для эффективной генерации изображений', 'desc': "Предложен Dynamic Chunking Diffusion Transformer (DC-DiT), который адаптивно изменяет длину последовательности токенов в зависимости от содержимого изображения и этапа диффузии. Модель использует обучаемый механизм chunking, который сжимает однородные фоновые регионы в меньшее количество токенов, а детальные области в большее количество, при этом выполняя явное обучение сегментации без дополнительной разметки. Механизм также адаптирует сжатие на различных timestep'ах диффузии, используя меньше токенов на шумных стадиях и больше при появлении мелких деталей. Подход демонстрирует улучшение метрик качества (FID и Inception Score) при значительном сокращении вычислительных затрат и может быть применен к моделям, обученным ранее, с минимальными дополнительными затратами на обучение."}, 'en': {'title': 'Adaptive Tokenization for Enhanced Image Generation', 'desc': 'The Dynamic Chunking Diffusion Transformer (DC-DiT) enhances image processing by adapting the length of token sequences based on the content of the image and the stage of the diffusion process. Unlike traditional methods that use fixed-length tokens, DC-DiT employs a learned mechanism to compress less detailed areas into fewer tokens while allocating more tokens to complex regions. This adaptive approach not only improves computational efficiency but also enhances the quality of generated images, as evidenced by better FID and Inception Scores on ImageNet. Additionally, DC-DiT can be easily integrated with existing models, requiring significantly less training time and resources.'}, 'zh': {'title': '动态调整，提升图像生成效率', 'desc': '动态分块扩散变换器（DC-DiT）根据图像内容和扩散时间步长自适应调整令牌序列长度，从而提高了效率和性能。与固定令牌方法相比，DC-DiT通过学习的编码器-路由器-解码器框架，能够根据数据的不同特征动态压缩输入图像。该机制能够将均匀的背景区域压缩为更少的令牌，而将细节丰富的区域压缩为更多的令牌，且无需显式监督。DC-DiT在图像生成任务中表现出色，能够有效减少计算量并提高生成质量。'}}}, {'id': 'https://huggingface.co/papers/2603.06408', 'title': 'Physical Simulator In-the-Loop Video Generation', 'url': 'https://huggingface.co/papers/2603.06408', 'abstract': 'Abstract PSIVG integrates a physical simulator into video diffusion processes to generate physically consistent videos while maintaining visual quality and diversity.  \t\t\t\t\tAI-generated summary Recent advances in diffusion-based video generation have achieved remarkable visual realism but still struggle to obey basic physical laws such as gravity, inertia, and collision. Generated objects often move inconsistently across frames, exhibit implausible dynamics, or violate physical constraints, limiting the realism and reliability of AI-generated videos. We address this gap by introducing Physical Simulator In-the-loop Video Generation (PSIVG), a novel framework that integrates a physical simulator into the video diffusion process. Starting from a template video generated by a pre-trained diffusion model, PSIVG reconstructs the 4D scene and foreground object meshes, initializes them within a physical simulator, and generates physically consistent trajectories. These simulated trajectories are then used to guide the video generator toward spatio-temporally physically coherent motion. To further improve texture consistency during object movement, we propose a Test-Time Texture Consistency Optimization (TTCO) technique that adapts text and feature embeddings based on pixel correspondences from the simulator. Comprehensive experiments demonstrate that PSIVG produces videos that better adhere to real-world physics while preserving visual quality and diversity. Project Page: https://vcai.mpi-inf.mpg.de/projects/PSIVG/', 'score': 0, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'c3d008d6bdce6fd9', 'authors': ['Lin Geng Foo', 'Mark He Huang', 'Alexandros Lattas', 'Stylianos Moschoglou', 'Thabo Beeler', 'Christian Theobalt'], 'affiliations': ['A*STAR', 'Google', 'Max Planck Institute for Informatics, Saarland Informatics Campus', 'Saarbrucken Research Center for Visual Computing, Interaction and Artificial Intelligence', 'Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2603.06408.jpg', 'data': {'categories': ['#3d', '#video', '#multimodal', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Физически корректная генерация видео через диффузионные модели с интегрированным симулятором', 'desc': 'В работе предлагается PSIVG — новый метод для генерации видео с помощью diffusion моделей, который интегрирует физический симулятор в процесс генерации. Исходя из видео, созданного предварительно обученной моделью, система реконструирует 3D сцену и объекты, инициализирует их в физическом симуляторе и генерирует физически корректные траектории движения. Сгенерированные траектории затем направляют видео-генератор для создания спатио-временно согласованного движения. Дополнительно предложена техника оптимизации текстурной консистентности во время движения объектов, которая адаптирует эмбеддинги на основе соответствия пикселей из симулятора.'}, 'en': {'title': 'Bringing Physics to AI-Generated Videos with PSIVG', 'desc': 'The paper presents PSIVG, a framework that combines physical simulation with video diffusion processes to create videos that are both visually appealing and physically realistic. Traditional AI-generated videos often fail to follow basic physical laws, leading to unrealistic object movements and dynamics. PSIVG addresses this issue by using a physical simulator to generate consistent motion trajectories for objects in the video. Additionally, it employs a technique called Test-Time Texture Consistency Optimization to enhance texture quality during object movement, resulting in videos that are more coherent and visually diverse.'}, 'zh': {'title': '物理一致性与视觉质量的完美结合', 'desc': 'PSIVG是一种新颖的框架，将物理模拟器集成到视频扩散过程中，以生成符合物理规律的视频，同时保持视觉质量和多样性。传统的基于扩散的视频生成方法在遵循重力、惯性和碰撞等基本物理法则方面存在困难，导致生成的物体在帧间移动不一致。PSIVG通过重建4D场景和前景物体网格，并在物理模拟器中初始化它们，从而生成物理一致的轨迹。该方法还引入了测试时纹理一致性优化技术，以提高物体运动过程中的纹理一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.06199', 'title': 'FlashPrefill: Instantaneous Pattern Discovery and Thresholding for Ultra-Fast Long-Context Prefilling', 'url': 'https://huggingface.co/papers/2603.06199', 'abstract': 'Abstract FlashPrefill enables ultra-fast prefilling for large language models by discovering dynamic sparse attention patterns and using dynamic thresholding to eliminate long-tail distributions, achieving significant speedups across various sequence lengths.  \t\t\t\t\tAI-generated summary Long-context modeling is a pivotal capability for Large Language Models, yet the quadratic complexity of attention remains a critical bottleneck, particularly during the compute-intensive prefilling phase. While various sparse attention mechanisms have been explored, they typically suffer from either significant search latency or insufficient sparsity. In this paper, we propose FlashPrefill, a framework enabling ultra-fast prefilling via instantaneous pattern discovery and thresholding. FlashPrefill leverages a fast block-searching technique to simultaneously locate dynamic vertical, slash, and block-sparse attention patterns. Crucially, it introduces a dynamic thresholding mechanism that bypasses the prohibitive overhead of sorting or accumulating attention scores while effectively eliminating the long-tail distribution to enhance sparsity. Extensive evaluations demonstrate that FlashPrefill achieves a substantial leap in efficiency, delivering an unprecedented 27.78x speedup on 256K sequences. Notably, unlike existing methods that incur efficiency degradation on shorter contexts, FlashPrefill maintains a 1.71x speedup even at a 4K context length, demonstrating its robustness and practical utility across varying sequence scales.', 'score': 0, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '1dc6838add6c257c', 'authors': ['Qihang Fan', 'Huaibo Huang', 'Zhiying Wu', 'Juqiu Wang', 'Bingning Wang', 'Ran He'], 'affiliations': ['MAIS&NLPR, CASIA', 'UCAS', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.06199.jpg', 'data': {'categories': ['#architecture', '#inference', '#optimization', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Динамическая разреженность внимания для молниеносного prefilling', 'desc': 'FlashPrefill предлагает инновационный метод для ускорения этапа prefilling в больших языковых моделях, используя динамические разреженные паттерны внимания. Система применяет быстрый поиск блоков для одновременного выявления вертикальных, диагональных и блочно-разреженных паттернов внимания. Ключевой особенностью является динамическое пороговое усечение, которое эффективно устраняет длинный хвост распределения без затрат на сортировку весов внимания. Метод достигает беспрецедентного ускорения в 27.78 раза на длинных последовательностях и сохраняет стабильность производительности даже на коротких контекстах.'}, 'en': {'title': 'Ultra-Fast Prefilling with Dynamic Sparse Attention', 'desc': 'FlashPrefill is a novel framework designed to enhance the efficiency of large language models during the prefilling phase by utilizing dynamic sparse attention patterns. It employs a fast block-searching technique to quickly identify various attention patterns, such as vertical and block-sparse configurations. The introduction of dynamic thresholding allows the model to effectively reduce the long-tail distribution of attention scores without the need for time-consuming sorting processes. As a result, FlashPrefill achieves remarkable speed improvements, including a 27.78x increase in efficiency for long sequences while maintaining a 1.71x speedup for shorter contexts.'}, 'zh': {'title': 'FlashPrefill：超快速预填充的创新之路', 'desc': 'FlashPrefill 是一种新框架，旨在通过发现动态稀疏注意力模式来实现超快速的预填充。它采用快速块搜索技术，能够同时定位多种稀疏注意力模式，并引入动态阈值机制，避免了排序或累积注意力分数的高开销。通过有效消除长尾分布，FlashPrefill 显著提高了稀疏性，提升了效率。实验结果表明，在处理 256K 序列时，FlashPrefill 实现了高达 27.78 倍的速度提升，且在较短上下文长度下仍保持 1.71 倍的速度提升，显示出其在不同序列规模下的实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.05888', 'title': 'PixARMesh: Autoregressive Mesh-Native Single-View Scene Reconstruction', 'url': 'https://huggingface.co/papers/2603.05888', 'abstract': 'Abstract PixARMesh enables end-to-end 3D indoor scene mesh reconstruction from single RGB images using a unified model with cross-attention and autoregressive token generation.  \t\t\t\t\tAI-generated summary We introduce PixARMesh, a method to autoregressively reconstruct complete 3D indoor scene meshes directly from a single RGB image. Unlike prior methods that rely on implicit signed distance fields and post-hoc layout optimization, PixARMesh jointly predicts object layout and geometry within a unified model, producing coherent and artist-ready meshes in a single forward pass. Building on recent advances in mesh generative models, we augment a point-cloud encoder with pixel-aligned image features and global scene context via cross-attention, enabling accurate spatial reasoning from a single image. Scenes are generated autoregressively from a unified token stream containing context, pose, and mesh, yielding compact meshes with high-fidelity geometry. Experiments on synthetic and real-world datasets show that PixARMesh achieves state-of-the-art reconstruction quality while producing lightweight, high-quality meshes ready for downstream applications.', 'score': 0, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '2cf9d6c112f137e1', 'authors': ['Xiang Zhang', 'Sohyun Yoo', 'Hongrui Wu', 'Chuan Li', 'Jianwen Xie', 'Zhuowen Tu'], 'affiliations': ['Lambda, Inc.', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.05888.jpg', 'data': {'categories': ['#3d', '#architecture', '#cv'], 'emoji': '🏠', 'ru': {'title': 'От одной фотографии к полной 3D сетке комнаты', 'desc': 'PixARMesh представляет собой метод реконструкции трёхмерных сеток внутренних сцен прямо из одного RGB изображения с использованием единой нейронной сети. Модель использует механизм кросс-внимания для объединения пиксель-выравненных признаков изображения с глобальным контекстом сцены и энкодером облаков точек. Система работает автрегрессивно, генерируя последовательность токенов, содержащих информацию о контексте, позе объектов и геометрии сетки в единой последовательности. Метод достигает лучших результатов при реконструкции и производит компактные, высокого качества сетки, готовые к использованию в практических приложениях.'}, 'en': {'title': 'Revolutionizing 3D Scene Reconstruction from Single Images', 'desc': 'PixARMesh is a novel approach for reconstructing 3D indoor scenes from a single RGB image using a unified model. It employs cross-attention and autoregressive token generation to predict both the layout and geometry of objects in one go, unlike previous methods that required separate steps. This method enhances spatial reasoning by integrating pixel-aligned image features with global scene context. The results demonstrate that PixARMesh produces high-quality, lightweight meshes suitable for various applications, achieving state-of-the-art performance in reconstruction tasks.'}, 'zh': {'title': '从单张图像重建3D场景的创新方法', 'desc': 'PixARMesh是一种新方法，可以从单张RGB图像中端到端地重建3D室内场景网格。与以往依赖隐式有符号距离场和后期布局优化的方法不同，PixARMesh在一个统一模型中同时预测物体布局和几何形状。该方法利用交叉注意力机制，将点云编码器与像素对齐的图像特征和全局场景上下文相结合，从而实现准确的空间推理。实验表明，PixARMesh在合成和真实数据集上都达到了最先进的重建质量，生成的网格轻量且高质量，适合后续应用。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents', '#agi', '#alignment (1)', '#architecture (3)', '#audio', '#benchmark (1)', '#cv (3)', '#data', '#dataset', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (4)', '#open_source (1)', '#optimization (2)', '#plp', '#rag', '#reasoning (1)', '#rl (1)', '#rlhf (2)', '#robotics (2)', '#science', '#security (1)', '#small_models (1)', '#story_generation', '#survey', '#synthetic', '#training (3)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-09 05:53',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-09 05:53')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-09 05:53')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
