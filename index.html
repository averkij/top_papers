    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.06139', 'title': 'Listwise Policy Optimization: Group-based RLVR as Target-Projection on the LLM Response Simplex', 'url': 'https://huggingface.co/papers/2605.06139', 'abstract': 'Abstract Group-based policy gradient methods in reinforcement learning with verifiable rewards share a common geometric structure, leading to the development of Listwise Policy Optimization that explicitly handles target projection through divergence minimization for improved training performance and stability.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a standard approach for large language models (LLMs) post-training to incentivize reasoning capacity. Among existing recipes, group-based policy gradient is prevalent, which samples a group of responses per prompt and updates the policy via group-relative advantage signals. This work reveals that these optimization strategies share a common geometric structure: each implicitly defines a target distribution on the response simplex and projects toward it via first-order approximation. Building on this insight, we propose Listwise Policy Optimization (LPO) to explicitly conduct the target-projection, which demystifies the implicit target by restricting the proximal RL objective to the response simplex, and then projects the policy via exact divergence minimization. This framework provides (i) monotonic improvement on the listwise objective with bounded, zero-sum, and self-correcting projection gradients, and (ii) flexibility in divergence selection with distinct structural properties through the decoupled projection step. On diverse reasoning tasks and LLM backbones, LPO consistently improves training performance over typical policy gradient baselines under matched targets, while intrinsically preserving optimization stability and response diversity.', 'score': 11, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'a41f66f25e073e68', 'authors': ['Yun Qu', 'Qi Wang', 'Yixiu Mao', 'Heming Zou', 'Yuhang Jiang', 'Yingyue Li', 'Wutong Xu', 'Lizhou Cai', 'Weijie Liu', 'Clive Bai', 'Kai Yang', 'Yangkun Chen', 'Saiyong Yang', 'Xiangyang Ji'], 'affiliations': ['Department of Automation, Tsinghua University', 'LLM Department, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.06139.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#training', '#rl', '#optimization', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Явная проекция целевого распределения для оптимизации групповой политики', 'desc': 'Статья исследует групповые методы градиентной политики в обучении с подкреплением с проверяемыми наградами и обнаруживает их общую геометрическую структуру. Авторы предлагают Listwise Policy Optimization (LPO) — новый алгоритм, который явно проводит проекцию целевого распределения на симплекс ответов через минимизацию дивергенции. Метод обеспечивает монотонное улучшение целевой функции с гарантированно ограниченными градиентами проекции и позволяет гибко выбирать различные типы дивергенций. На различных задачах рассуждения и архитектурах больших языковых моделей LPO показывает стабильное улучшение качества обучения при сохранении разнообразия генерируемых ответов.'}, 'en': {'title': 'Enhancing Reinforcement Learning with Listwise Policy Optimization', 'desc': 'This paper introduces Listwise Policy Optimization (LPO), a new method in reinforcement learning that focuses on improving training performance and stability for large language models. It builds on the concept of group-based policy gradient methods, which use groups of responses to update policies based on relative advantages. The authors highlight a common geometric structure in these methods, which allows for a more explicit target projection through divergence minimization. LPO demonstrates consistent improvements in training outcomes while maintaining stability and diversity in responses across various reasoning tasks.'}, 'zh': {'title': '提升强化学习的稳定性与性能', 'desc': '本文提出了一种新的强化学习方法，称为列表策略优化（LPO），旨在提高训练性能和稳定性。LPO通过最小化散度，明确处理目标投影，从而优化策略。研究表明，现有的基于组的策略梯度方法共享相同的几何结构，这为LPO的提出提供了理论基础。通过在多种推理任务中应用，LPO在训练性能上优于传统的策略梯度基线，同时保持了优化的稳定性和响应的多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.08083', 'title': 'LLMs Improving LLMs: Agentic Discovery for Test-Time Scaling', 'url': 'https://huggingface.co/papers/2605.08083', 'abstract': 'Abstract AutoTTS automates test-time scaling strategy discovery by formulating it as controller synthesis over reasoning trajectories and probe signals, achieving improved accuracy-cost tradeoffs with minimal computational overhead.  AI-generated summary Test-time scaling (TTS) has become an effective approach for improving large language model performance by allocating additional computation during inference. However, existing TTS strategies are largely hand-crafted: researchers manually design reasoning patterns and tune heuristics by intuition, leaving much of the computation-allocation space unexplored. We propose an environment-driven framework, AutoTTS, that changes what researchers design: from individual TTS heuristics to environments where TTS strategies can be discovered automatically. The key to AutoTTS lies in environment construction: the discovery environment must make the control space tractable and provide cheap, frequent feedback for TTS search. As a concrete instantiation, we formulate width--depth TTS as controller synthesis over pre-collected reasoning trajectories and probe signals, where controllers decide when to branch, continue, probe, prune, or stop and can be evaluated cheaply without repeated LLM calls. We further introduce beta parameterization to make the search tractable and fine-grained execution trace feedback to improve discovery efficiency by helping the agent diagnose why a TTS program fails. Experiments on mathematical reasoning benchmarks show that the discovered strategies improve the overall accuracy--cost tradeoff over strong manually designed baselines. The discovered strategies generalize to held-out benchmarks and model scales, while the entire discovery costs only $39.9 and 160 minutes. Our data, and code will be open-source at https://github.com/zhengkid/AutoTTS.', 'score': 6, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '02c5a593e95ab947', 'authors': ['Tong Zheng', 'Haolin Liu', 'Chengsong Huang', 'Huiwen Bao', 'Sheng Zhang', 'Rui Liu', 'Runpeng Dai', 'Ruibo Chen', 'Chenxi Liu', 'Tianyi Xiong', 'Xidong Wu', 'Hongming Zhang', 'Heng Huang'], 'affiliations': ['Google', 'Meta', 'UMD', 'UNC', 'UVA', 'WUSTL'], 'pdf_title_img': 'assets/pdf/title_img/2605.08083.jpg', 'data': {'categories': ['#open_source', '#optimization', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Автоматическое открытие оптимальных стратегий масштабирования для языковых моделей', 'desc': 'AutoTTS предлагает автоматический подход к открытию стратегий масштабирования во время тестирования (TTS) путём формулирования задачи как синтеза контроллера над траекториями рассуждений и зондирующими сигналами. Вместо ручного проектирования эвристик исследователи создают окружение, в котором стратегии TTS могут быть обнаружены автоматически через поиск. Метод использует предсобранные траектории рассуждений и дешёвую обратную связь для эффективного поиска, включая параметризацию бета и детальные трассировки выполнения. Экспериментально показано, что обнаруженные стратегии улучшают компромисс между точностью и вычислительными затратами, обобщаются на новые задачи и масштабы моделей с минимальными затратами на поиск.'}, 'en': {'title': 'Automating Test-Time Scaling for Enhanced Model Performance', 'desc': 'AutoTTS is a framework that automates the discovery of test-time scaling (TTS) strategies for large language models, enhancing their performance during inference. Instead of relying on manually crafted heuristics, AutoTTS utilizes an environment-driven approach to explore the computation-allocation space more effectively. It formulates the TTS problem as controller synthesis, allowing for efficient decision-making on when to branch or prune during reasoning. The results demonstrate that the strategies discovered by AutoTTS achieve better accuracy-cost tradeoffs compared to traditional methods, with minimal computational overhead.'}, 'zh': {'title': '自动化测试时间缩放策略发现', 'desc': 'AutoTTS 是一个自动化的测试时间缩放策略发现框架，通过将其表述为控制器合成，利用推理轨迹和探测信号来实现更好的准确性与成本的权衡，同时保持最低的计算开销。传统的测试时间缩放策略主要依赖于人工设计，研究人员手动调整推理模式和启发式方法，导致计算分配空间未被充分探索。AutoTTS 通过构建环境，使得研究人员可以自动发现 TTS 策略，而不是单独设计每个启发式方法。实验结果表明，AutoTTS 发现的策略在数学推理基准测试中显著提高了准确性与成本的权衡，并且在不同的基准和模型规模上具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.06924', 'title': 'A^2RD: Agentic Autoregressive Diffusion for Long Video Consistency', 'url': 'https://huggingface.co/papers/2605.06924', 'abstract': 'Abstract A$^2$RD, an Agentic Auto-Regressive Diffusion architecture, addresses long video synthesis challenges through a closed-loop process with memory tracking, adaptive generation, and hierarchical self-improvement mechanisms.  AI-generated summary Synthesizing consistent and coherent long video remains a fundamental challenge. Existing methods suffer from semantic drift and narrative collapse over long horizons. We present A^2RD, an Agentic Auto-Regressive Diffusion architecture that decouples creative synthesis from consistency enforcement. A^2RD formulates long video synthesis as a closed-loop process that synthesizes and self-improves video segment-by-segment through a Retrieve--Synthesize--Refine--Update cycle. It comprises three core components: (i) Multimodal Video Memory that tracks video progression across modalities; (ii) Adaptive Segment Generation that switches among generation modes for natural progression and visual consistency; and (iii) Hierarchical Test-Time Self-Improvement that self-improves each segment at frame and video levels to prevent error propagation. We further introduce LVBench-C, a challenging benchmark with non-linear entity and environment transitions to stress-test long-horizon consistency. Across public and LVBench-C benchmarks spanning one- to ten-minute videos, A^2RD outperforms state-of-the-art baselines by up to 30% in consistency and 20% in narrative coherence. Human evaluations corroborate these gains while also highlighting notable improvements in motion and transition smoothness.', 'score': 5, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '8540a5b4ff6706c9', 'authors': ['Do Xuan Long', 'Yale Song', 'Min-Yen Kan', 'Tomas Pfister', 'Long T. Le'], 'affiliations': ['Google Cloud AI Research', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.06924.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Самоулучшающаяся диффузия для синтеза длинных видео без дрейфа смысла', 'desc': 'A²RD — это агентивная архитектура диффузионной модели для синтеза длинных видеоматериалов, которая использует замкнутый цикл Retrieve–Synthesize–Refine–Update для поэтапного генерирования и улучшения видеосегментов. Система включает три ключевых компонента: мультимодальную память видео для отслеживания прогрессии контента, адаптивную генерацию сегментов с выбором оптимального режима синтеза, и иерархическое самоулучшение на уровне кадров и видео для предотвращения накопления ошибок. Авторы представили новый бенчмарк LVBench-C с нелинейными переходами сущностей и окружения для проверки устойчивости моделей к долгосрочным зависимостям. Экспериментальные результаты демонстрируют превосходство A²RD над существующими методами на 30% по метрикам консистентности и 20% по связности повествования при синтезе видео длительностью от одной до десяти минут.'}, 'en': {'title': 'Revolutionizing Long Video Synthesis with A^2RD', 'desc': 'The paper introduces A^2RD, an innovative architecture designed for generating long videos while maintaining consistency and coherence. It employs a closed-loop process that allows for memory tracking and adaptive generation, addressing common issues like semantic drift. A^2RD operates through a Retrieve-Synthesize-Refine-Update cycle, enhancing video quality segment by segment. The architecture includes a Multimodal Video Memory, Adaptive Segment Generation, and Hierarchical Test-Time Self-Improvement, leading to significant improvements in video synthesis performance compared to existing methods.'}, 'zh': {'title': '长视频合成的新突破：A$^2$RD架构', 'desc': 'A$^2$RD是一种代理自回归扩散架构，旨在解决长视频合成中的挑战。它通过闭环过程进行视频合成，结合记忆跟踪、适应性生成和分层自我改进机制。该方法将长视频合成视为一个循环过程，通过检索、合成、精炼和更新的周期逐段生成和自我改进视频。实验结果表明，A$^2$RD在一致性和叙事连贯性方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2605.05997', 'title': '4DThinker: Thinking with 4D Imagery for Dynamic Spatial Understanding', 'url': 'https://huggingface.co/papers/2605.05997', 'abstract': 'Abstract 4DThinker enables vision-language models to perform dynamic spatial reasoning through 4D latent mental imagery, using scalable data generation and novel fine-tuning methods that outperform existing approaches.  AI-generated summary Dynamic spatial reasoning from monocular video is essential for bridging visual intelligence and the physical world, yet remains challenging for vision-language models (VLMs). Prior approaches either verbalize spatial-temporal reasoning entirely as text, which is inherently verbose and imprecise for complex dynamics, or rely on external geometric modules that increase inference complexity without fostering intrinsic model capability. In this paper, we present 4DThinker, the first framework that enables VLMs to "think with 4D" through dynamic latent mental imagery, i.e., internally simulating how scenes evolve within the continuous hidden space. Specifically, we first introduce a scalable, annotation-free data generation pipeline that synthesizes 4D reasoning data from raw videos. We then propose Dynamic-Imagery Fine-Tuning (DIFT), which jointly supervises textual tokens and 4D latents to ground the model in dynamic visual semantics. Building on this, 4D Reinforcement Learning (4DRL) further tackles complex reasoning tasks via outcome-based rewards, restricting policy gradients to text tokens to ensure stable optimization. Extensive experiments across multiple dynamic spatial reasoning benchmarks demonstrate that 4DThinker consistently outperforms strong baselines and offers a new perspective toward 4D reasoning in VLMs. Our code is available at https://github.com/zhangquanchen/4DThinker.', 'score': 3, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0591d33ab219c008', 'authors': ['Zhangquan Chen', 'Manyuan Zhang', 'Xinlei Yu', 'Xiang An', 'Bo Li', 'Xin Xie', 'ZiDong Wang', 'Mingze Sun', 'Shuang Chen', 'Hongyu Li', 'Xiaobin Hu', 'Ruqi Huang'], 'affiliations': ['LMMs-Lab', 'National University of Singapore', 'The Chinese University of Hong Kong', 'Tsinghua University, SIGS', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.05997.jpg', 'data': {'categories': ['#video', '#training', '#rl', '#reasoning', '#open_source', '#benchmark', '#multimodal', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Обучение моделей думать в четырёхмерном пространстве', 'desc': '4DThinker — это первая система, которая позволяет видео-языковым моделям выполнять динамическое пространственное рассуждение через внутреннее моделирование эволюции сцен в скрытом пространстве. Авторы разработали масштабируемый конвейер генерации данных без разметки, который синтезирует обучающие примеры из видео. Они предложили метод Dynamic-Imagery Fine-Tuning, который совместно обучает текстовые токены и четырёхмерные представления, а также 4D Reinforcement Learning для решения сложных задач рассуждения с использованием наград на основе результатов. Система показывает значительное улучшение по сравнению с существующими подходами на множестве бенчмарков пространственного рассуждения.'}, 'en': {'title': 'Empowering Vision-Language Models with 4D Dynamic Reasoning', 'desc': 'The paper introduces 4DThinker, a novel framework that enhances vision-language models (VLMs) by enabling them to perform dynamic spatial reasoning using 4D latent mental imagery. It addresses the limitations of previous methods that either rely on verbose text descriptions or complex external geometric modules. The framework includes a scalable data generation pipeline that creates 4D reasoning data from raw videos and employs Dynamic-Imagery Fine-Tuning (DIFT) to improve model grounding in dynamic visual semantics. Additionally, it incorporates 4D Reinforcement Learning (4DRL) to optimize reasoning tasks through outcome-based rewards, demonstrating superior performance on various benchmarks.'}, 'zh': {'title': '4DThinker：动态空间推理的新视角', 'desc': '4DThinker是一个新框架，使视觉-语言模型能够通过4D潜在心理图像进行动态空间推理。它采用可扩展的数据生成和新颖的微调方法，超越了现有的技术。该方法通过从原始视频合成4D推理数据，避免了繁琐的文本描述和外部几何模块的复杂性。实验结果表明，4DThinker在多个动态空间推理基准测试中表现优异，展示了视觉-语言模型在4D推理方面的新视角。'}}}, {'id': 'https://huggingface.co/papers/2605.06832', 'title': 'IntentGrasp: A Comprehensive Benchmark for Intent Understanding', 'url': 'https://huggingface.co/papers/2605.06832', 'abstract': "Abstract IntentGrasp is a benchmark for evaluating large language models' intent understanding capability, demonstrating poor performance across 20 models and showing significant improvements with intentional fine-tuning.  AI-generated summary Accurately understanding the intent behind speech, conversation, and writing is crucial to the development of helpful Large Language Model (LLM) assistants. This paper introduces IntentGrasp, a comprehensive benchmark for evaluating the intent understanding capability of LLMs. Derived from 49 high-quality, open-licensed corpora spanning 12 diverse domains, IntentGrasp is constructed through source datasets curation, intent label contextualization, and task format unification. IntentGrasp contains a large-scale training set of 262,759 instances and two evaluation sets: an All Set of 12,909 test cases and a more balanced and challenging Gem Set of 470 cases. Extensive evaluations on 20 LLMs across 7 families (including frontier models such as GPT-5.4, Gemini-3.1-Pro, and Claude-Opus-4.7) demonstrate unsatisfactory performance, with scores below 60% on All Set and below 25% on Gem set. Notably, 17 out of 20 tested models perform worse than a random-guess baseline (15.2%) on Gem Set, while the estimated human performance is ~81.1%, showing substantial room for improvement. To enhance such ability, this paper proposes Intentional Fine-Tuning (IFT), which fine-tunes the models on the training set in IntentGrasp, yielding significant gains of 30+ F1 points on All Set and 20+ points on Gem Set. Tellingly, the leave-one-domain-out (Lodo) experiments further demonstrate the strong cross-domain generalizability of IFT, verifying that it is a promising approach to substantially enhancing the intent understanding of LLMs. Overall, by benchmarking and boosting intent understanding ability, this study sheds light on a promising path towards more intentional, capable, and safe AI assistants for human benefits and social good.", 'score': 2, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '7f05e569461255b9', 'authors': ['Yuwei Yin', 'Chuyuan Li', 'Giuseppe Carenini'], 'affiliations': ['Department of Computer Science, University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2605.06832.jpg', 'data': {'categories': ['#training', '#benchmark', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Обучение LLM правильно понимать истинные намерения пользователя', 'desc': 'IntentGrasp — это комплексный бенчмарк для оценки способности больших языковых моделей понимать намерения в речи и текстах, созданный из 49 открытых корпусов 12 различных предметных областей. Оценка 20 современных LLM показала неудовлетворительные результаты: модели набирают менее 60% на основном наборе тестов и менее 25% на более сложном сбалансированном наборе. Для улучшения этих результатов авторы предложили метод Intentional Fine-Tuning (IFT), который дообучает модели на специализированном наборе данных IntentGrasp, достигая прироста более 30 пунктов F1-метрики. Эксперименты с исключением доменов показали сильную способность предложенного подхода к переносу на новые предметные области, делая IFT перспективным методом для развития более безопасных и компетентных AI-ассистентов.'}, 'en': {'title': 'Enhancing Intent Understanding in AI with IntentGrasp', 'desc': 'The paper introduces IntentGrasp, a benchmark designed to evaluate how well large language models (LLMs) understand intent in various forms of communication. It highlights that 20 tested models performed poorly, scoring below 60% on a comprehensive test set and below 25% on a more challenging subset. To improve performance, the authors propose Intentional Fine-Tuning (IFT), which significantly enhances intent understanding by fine-tuning models on the IntentGrasp training set. The results indicate that IFT can lead to substantial improvements, suggesting a pathway for developing more effective AI assistants.'}, 'zh': {'title': '提升大型语言模型的意图理解能力', 'desc': 'IntentGrasp是一个用于评估大型语言模型意图理解能力的基准，显示出20个模型的表现不佳。该基准由49个高质量的开放许可语料库构成，涵盖12个不同领域，包含262,759个训练实例。通过意图标签的上下文化和任务格式的统一，IntentGrasp提供了全面的评估工具。为提高模型的意图理解能力，本文提出了意图微调（IFT），在训练集上进行微调，显著提升了模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.08044', 'title': 'Fast Byte Latent Transformer', 'url': 'https://huggingface.co/papers/2605.08044', 'abstract': "Abstract Byte-level language models overcome slow autoregressive generation through diffusion-based parallel processing and speculative decoding techniques that improve both speed and quality.  AI-generated summary Recent byte-level language models (LMs) match the performance of token-level models without relying on subword vocabularies, yet their utility is limited by slow, byte-by-byte autoregressive generation. We address this bottleneck in the Byte Latent Transformer (BLT) through new training and generation techniques. First, we introduce BLT Diffusion (BLT-D), a new model and our fastest BLT variant, trained with an auxiliary block-wise diffusion objective alongside the standard next-byte prediction loss. This enables an inference procedure that generates multiple bytes in parallel per decoding step, substantially reducing the number of forward passes required to generate a sequence. Second, we propose two extensions inspired by speculative decoding that trade some of this speed for higher generation quality: BLT Self-speculation (BLT-S), in which BLT's local decoder continues generating past its normal patch boundaries to draft bytes, which are then verified with a single full-model forward pass; and BLT Diffusion+Verification (BLT-DV), which augments BLT-D with an autoregressive verification step after diffusion-based generation. All methods may achieve an estimated memory-bandwidth cost over 50% lower than BLT on generation tasks. Each approach offers its own unique advantages, together removing key barriers to the practical use of byte-level LMs.", 'score': 1, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'd2a48ff1875722fa', 'authors': ['Julie Kallini', 'Artidoro Pagnoni', 'Tomasz Limisiewicz', 'Gargi Ghosh', 'Luke Zettlemoyer', 'Christopher Potts', 'Xiaochuang Han', 'Srinivasan Iyer'], 'affiliations': ['FAIR at Meta', 'Stanford University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.08044.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Параллельная генерация текста в байт-уровневых моделях через диффузию и верификацию', 'desc': 'В работе предлагаются методы ускорения автарегрессивной генерации текста в байт-уровневых языковых моделях. Основной подход BLT Diffusion использует вспомогательную блочную диффузионную цель при обучении, что позволяет генерировать несколько байтов параллельно на каждом шаге декодирования. Авторы также представляют два расширения, вдохновленные спекулятивным декодированием: BLT Self-speculation, где локальный декодер генерирует драфт-байты за границами патча, и BLT Diffusion+Verification, объединяющий диффузионную генерацию с аутарегрессивной верификацией. Все предложенные методы снижают пиковое потребление памяти на более чем 50% по сравнению с базовой моделью при сохранении или улучшении качества генерации.'}, 'en': {'title': 'Speed and Quality Revolution in Byte-Level Language Models', 'desc': 'This paper presents the Byte Latent Transformer (BLT), a new type of byte-level language model that improves the speed and quality of text generation. It introduces BLT Diffusion (BLT-D), which allows for parallel byte generation, significantly speeding up the process compared to traditional autoregressive methods. Additionally, the paper explores two techniques, BLT Self-speculation and BLT Diffusion+Verification, which enhance generation quality by incorporating verification steps. Overall, these innovations reduce memory bandwidth costs and make byte-level models more practical for real-world applications.'}, 'zh': {'title': '提升字节级语言模型生成速度与质量的创新方法', 'desc': '本文介绍了一种新的字节级语言模型，称为字节潜在变换器（BLT），旨在解决传统自回归生成速度慢的问题。通过引入BLT扩散（BLT-D）模型，采用辅助的块级扩散目标，允许在解码步骤中并行生成多个字节，从而显著减少生成序列所需的前向传递次数。此外，文章还提出了两种基于推测解码的扩展方法，分别是BLT自我推测（BLT-S）和BLT扩散+验证（BLT-DV），以提高生成质量。所有方法在生成任务中都能实现超过50%的内存带宽成本降低，推动了字节级语言模型的实际应用。'}}}, {'id': 'https://huggingface.co/papers/2605.05558', 'title': 'Who Prices Cognitive Labor in the Age of Agents? Compute-Anchored Wages', 'url': 'https://huggingface.co/papers/2605.05558', 'abstract': 'Abstract AI agents function as a production technology converting compute capital into cognitive labor, shifting the wage-setting mechanism from labor markets to compute capital markets.  AI-generated summary A natural intuition about the economics of AI agents is that, because agents can be replicated at very low marginal cost, agent labor may be supplied highly elastically, placing downward pressure on cognitive-labor wages when it closely substitutes for human labor. We argue this framing is wrong in mechanism but partially correct in conclusion, and that the correction matters for both theory and policy. Agents are not labor; they are a production technology that converts compute capital K_c into effective units of cognitive labor L_A. Once this is recognized, the elastic-supply margin that anchors the equilibrium wage migrates from the labor market to the compute capital market. Building on the classic factor-pricing framework mankiw2020, we derive a Compute-Anchored Wage (CAW) bound stating that, on tasks where human and agent-produced cognitive labor are substitutes, the competitive human wage is bounded above by λcdot k cdot r_c, where r_c is the rental rate of compute capital, k is the compute intensity of one effective agent-produced cognitive labor unit, and λ is the relative human-to-agent productivity. We generalize the result through constant elasticity of substitution (CES) aggregation, separate substitutable from complementary tasks, and discuss factor-share consequences. The conclusion is concise: the price-setter for cognitive labor is no longer the labor market.', 'score': 1, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '65446b3d4f537ae9', 'authors': ['Siqi Zhu'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.05558.jpg', 'data': {'categories': ['#science', '#agents'], 'emoji': '💰', 'ru': {'title': 'Когда ценообразование труда зависит от цены GPU', 'desc': 'В работе авторы переосмысляют экономику AI-агентов, утверждая, что они не являются трудовыми ресурсами, а представляют собой производственную технологию, конвертирующую вычислительный капитал в когнитивный труд. Они выводят границу Compute-Anchored Wage (CAW), которая связывает заработную плату человека с ценой вычислительных ресурсов, интенсивностью вычислений и относительной производительностью. Анализ проводится в рамках классического фреймворка ценообразования факторов производства с использованием CES-функций для разделения задач на взаимозаменяемые и дополняющие. Ключевой вывод: рыночные механизмы определения цены когнитивного труда смещаются из рынка труда на рынок вычислительного капитала.'}, 'en': {'title': 'AI Agents: Redefining Wage Dynamics through Compute Capital', 'desc': 'This paper discusses how AI agents act as a new form of production technology that transforms compute capital into cognitive labor. It argues that instead of AI agents being treated as labor, they should be seen as a technology that influences wage-setting through compute capital markets. The authors introduce the concept of Compute-Anchored Wage (CAW), which indicates that human wages are now influenced by the cost of compute capital rather than traditional labor market dynamics. This shift has important implications for economic theory and policy regarding the relationship between human and AI-generated labor.'}, 'zh': {'title': '人工智能代理：重新定义认知劳动的工资机制', 'desc': '这篇论文探讨了人工智能代理作为一种生产技术的作用，它将计算资本转化为认知劳动。由于代理可以以极低的边际成本复制，因此它们的劳动供应可能会非常灵活，从而对人类劳动的工资产生下行压力。作者认为，代理并不是劳动，而是一种将计算资本转化为有效认知劳动的技术。这一认识改变了工资的平衡机制，使其从劳动市场转向计算资本市场。'}}}, {'id': 'https://huggingface.co/papers/2605.06702', 'title': 'CASCADE: Case-Based Continual Adaptation for Large Language Models During Deployment', 'url': 'https://huggingface.co/papers/2605.06702', 'abstract': 'Abstract Deployment-time learning enables large language model agents to adapt continuously during operation through episodic memory and contextual bandit optimization, improving performance across diverse tasks.  AI-generated summary Large language models (LLMs) have become a central foundation of modern artificial intelligence, yet their lifecycle remains constrained by a rigid separation between training and deployment, after which learning effectively ceases. This limitation contrasts with natural intelligence, which continually adapts through interaction with its environment. In this paper, we formalise deployment-time learning (DTL) as the third stage in the LLM lifecycle that enables LLM agents to improve from experience during deployment without modifying model parameters. We present CASCADE (CASe-based Continual Adaptation during DEployment), a general and principled framework that equips LLM agents with an explicit, evolving episodic memory. CASCADE formulates experience reuse as a contextual bandit problem, enabling principled exploration-exploitation trade-offs and establishing no-regret guarantees over long-term interactions. This design allows agents to accumulate, select, and refine task-relevant cases, transforming past experience into actionable knowledge. Across 16 diverse tasks spanning medical diagnosis, legal analysis, code generation, web search, tool use, and embodied interaction, CASCADE improves macro-averaged success rate by 20.9% over zero-shot prompting while consistently outperforming gradient-based and memory-based baselines. By reframing deployment as an adaptive learning process, this work establishes a foundation for continually improving AI systems.', 'score': 1, 'issue_id': 2193, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'd01703efb8e79a30', 'authors': ['Siyuan Guo', 'Yali Du', 'Hechang Chen', 'Yi Chang', 'Jun Wang'], 'affiliations': ['Hechang Chen', 'Jun Wang', 'Siyuan Guo', 'Yali Du', 'Yi Chang'], 'pdf_title_img': 'assets/pdf/title_img/2605.06702.jpg', 'data': {'categories': ['#training', '#rl', '#healthcare', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Обучение больших моделей прямо во время работы через память и оптимизацию опыта', 'desc': 'Статья описывает развёртывание-ориентированное обучение (DTL) для больших языковых моделей, которое позволяет агентам улучшаться во время работы без изменения параметров модели. Авторы представляют фреймворк CASCADE, который использует эпизодическую память и решает задачу контекстного многорукого бандита для оптимизации выбора прошлых примеров. Система накапливает, отбирает и уточняет релевантные случаи из опыта, преобразуя их в практически полезное знание с гарантиями отсутствия сожаления. CASCADE продемонстрировал улучшение успеха на 20,9% на 16 различных задачах, включая медицинскую диагностику, анализ юридических документов и написание кода.'}, 'en': {'title': 'Empowering AI: Learning on the Fly with CASCADE', 'desc': 'This paper introduces deployment-time learning (DTL) as a new phase in the lifecycle of large language models (LLMs), allowing them to learn and adapt while in use. The authors present CASCADE, a framework that utilizes episodic memory to help LLM agents improve their performance based on past experiences without changing their underlying model parameters. By treating experience reuse as a contextual bandit problem, CASCADE enables effective exploration and exploitation strategies, ensuring that agents can learn from their interactions over time. The results show that CASCADE significantly enhances performance across various tasks, demonstrating the potential for continuous improvement in AI systems during deployment.'}, 'zh': {'title': '部署时学习：让AI不断进步的关键', 'desc': '本文提出了一种新的学习方法，称为部署时学习（DTL），使大型语言模型（LLM）在运行过程中能够不断适应和改进。通过引入CASCADE框架，LLM代理可以利用显式的、不断发展的情景记忆来积累和选择与任务相关的经验。CASCADE将经验重用视为一个上下文赌博机问题，从而实现了探索与利用之间的平衡，并在长期交互中提供了无悔保证。通过在16个不同任务上的实验，CASCADE显著提高了成功率，展示了将部署视为适应性学习过程的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.07363', 'title': 'MISA: Mixture of Indexer Sparse Attention for Long-Context LLM Inference', 'url': 'https://huggingface.co/papers/2605.07363', 'abstract': "Abstract MISA replaces the dense token-wise indexing in sparse attention with a routed mixture-of-experts approach that reduces computational cost while maintaining performance and handling long contexts effectively.  AI-generated summary DeepSeek Sparse Attention (DSA) sets the state of the art for fine-grained inference-time sparse attention by introducing a learned token-wise indexer that scores every prefix token and selects the most relevant ones for the main attention. To remain expressive, the indexer uses many query heads (for example, 64 on DeepSeek-V3.2) that share the same selected token set; this multi-head design is precisely what makes the indexer the dominant cost on long contexts. We propose MISA (Mixture of Indexer Sparse Attention), a drop-in replacement for the DSA indexer that treats its indexer heads as a pool of mixture-of-experts. A lightweight router uses cheap block-level statistics to pick a query-dependent subset of only a few active heads, and only those heads run the heavy token-level scoring. This preserves the diversity of the original indexer pool while reducing the per-query cost from scoring every prefix token with every head to scoring it with only a handful of routed heads, plus a negligible router term computed on a small set of pooled keys. We further introduce a hierarchical variant of MISA that uses the routed pass to keep an enlarged candidate set and then re-ranks it with the original DSA indexer to recover the final selected tokens almost exactly. With only eight active heads and no additional training, MISA matches the dense DSA indexer on LongBench across DeepSeek-V3.2 and GLM-5 while running with eight and four times fewer indexer heads respectively, and outperforms HISA on average. It also preserves fully green Needle-in-a-Haystack heatmaps up to a 128K-token context and recovers more than 92% of the tokens selected by the DSA indexer per layer. Our TileLang kernel delivers roughly a 3.82 times speedup over DSA's original indexer kernel on a single NVIDIA H200 GPU.", 'score': 0, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '71197b8c5eba7365', 'authors': ['Ruijie Zhou', 'Fanxu Meng', 'Yufei Xu', 'Tongxuan Liu', 'Guangming Lu', 'Muhan Zhang', 'Wenjie Pei'], 'affiliations': ['outlook.com', 'stu.pku.edu.cn'], 'pdf_title_img': 'assets/pdf/title_img/2605.07363.jpg', 'data': {'categories': ['#inference', '#optimization', '#long_context', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Экспертная маршрутизация для эффективного разреженного внимания', 'desc': 'В работе предложен метод MISA, который заменяет плотное индексирование токенов в разреженном внимании на подход смеси экспертов. Это значительно снижает вычислительные затраты при обработке длинных контекстов, сохраняя качество работы модели. Легкий маршрутизатор выбирает небольшое подмножество головок внимания для каждого запроса, используя дешевые блочные статистики, что избегает необходимости вычисления оценок для каждого токена со всеми головками. Иерархический вариант MISA дополнительно переранжирует候выбранные токены исходным методом, достигая ускорения в 3.82 раза без потери качества на задачах с длинными контекстами.'}, 'en': {'title': 'Efficient Sparse Attention with Mixture-of-Experts', 'desc': 'The paper introduces MISA, a new method for sparse attention in machine learning that improves efficiency by using a mixture-of-experts approach. Instead of scoring every token with all query heads, MISA routes a small subset of active heads to reduce computational costs while maintaining performance. This method allows for effective handling of long contexts and retains the diversity of the original indexer. MISA achieves comparable results to the existing Dense Sparse Attention indexer while significantly speeding up processing times on large datasets.'}, 'zh': {'title': 'MISA：高效的稀疏注意力新选择', 'desc': 'MISA（混合索引稀疏注意力）通过路由混合专家的方法，替代了稠密的逐标记索引，从而降低了计算成本，同时保持了性能并有效处理长上下文。该方法引入了一种轻量级的路由器，利用低成本的块级统计信息选择少量活跃的查询头，减少了每个查询的计算负担。MISA在DeepSeek-V3.2和GLM-5上与稠密的DSA索引器表现相当，同时使用的索引头数量分别减少了八倍和四倍。此外，MISA在处理128K标记上下文时，能够保留原始DSA索引器选择的92%以上的标记。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (3)', '#agi', '#alignment (1)', '#architecture (2)', '#audio', '#benchmark (3)', '#cv', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (2)', '#open_source (2)', '#optimization (5)', '#plp', '#rag', '#reasoning (3)', '#rl (3)', '#rlhf', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (4)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-11 02:16',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-11 02:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-11 02:16')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
