    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.14777', 'title': 'JoyAI-VL-Interaction: Real-Time Vision-Language Interaction Intelligence', 'url': 'https://huggingface.co/papers/2606.14777', 'abstract': "Abstract A vision-language model operates continuously in real-time, making autonomous decisions about when to respond or delegate, enabling interactive systems that perceive and act upon environmental changes without user prompting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Many moments in the real world do not wait for a user to ask. A fire starts on a security monitor, an expression flickers across a video call, or a product a viewer wants flashes by in a livestream. Yet today's large models remain mostly turn-based by design: they answer only when addressed, and even video-call apps that appear interactive still operate as question-answer systems, reacting only when polled or prompted. We argue for a different paradigm: a model that is present in the world like a person. It continuously watches what is happening now, decides on its own whether to speak or stay silent, interacts in real time, and delegates to a background model when the problem is hard. To advance interaction models and their adoption across domains, we make two fully open-sourced contributions. First, we release JoyAI-VL-Interaction, an 8B-scale, vision-first VL-interaction model. The model makes the response decision internally, choosing each second to stay silent, respond, or delegate to a background model, and it excels at vision-triggered responsiveness and time awareness. We pair it with a transferable training recipe, from which capabilities we never trained for emerge, such as guiding a shopper through changing app screens or improvising a lecture from a slide deck. Second, we release a complete, deployable system built around that model. The system streams any ongoing video into the model, making it genuinely present in the world. All other components are pluggable, including ASR/TTS modules, memory, visualization UI, and a background brain that can connect to any API or agent. Across six real-world scenarios, human raters prefer JoyAI-VL-Interaction over the in-app video-call assistants of Doubao and Gemini by a wide margin. To our knowledge, this is the first open, vision-driven interaction model released together with its training recipe, data, and complete deployable system.", 'score': 119, 'issue_id': 2438, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': 'ae97d78f6f617417', 'authors': ['Dingyu Yao', 'Junhao Zhou', 'Chenxu Yang', 'Chuanyu Qin', 'Haowen Hou', 'Zheming Liang', 'Congcong Wang', 'Yuhang Cao', 'Shenglong Ye', 'Shuai Xie', 'Shuhuan Gu', 'Haoyang Huang', 'Qingyi Si', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['JD.com'], 'pdf_title_img': 'assets/pdf/title_img/2606.14777.jpg', 'data': {'categories': ['#video', '#training', '#agents', '#multimodal', '#open_source', '#dataset', '#cv'], 'emoji': '👁️', 'ru': {'title': 'Модель-помощник, которая видит и действует без приглашения', 'desc': 'В статье представлена модель зрения и языка, которая работает в реальном времени и самостоятельно принимает решения о том, когда ответить пользователю или переложить задачу на более мощную модель. Авторы предлагают новую парадигму взаимодействия, где модель постоянно наблюдает за окружением, как человек, вместо традиционного question-answer подхода. Они выпустили JoyAI-VL-Interaction - 8-миллиардную модель, которая использует vision-first архитектуру и обучена принимать решения о молчании, ответе или делегировании каждую секунду. Вместе с моделью авторы опубликовали полную систему для развертывания, включающую компоненты для обработки видеопотока, памяти, управления диалогом и интеграции с внешними сервисами.'}, 'en': {'title': 'Revolutionizing Interaction: A Real-Time Vision-Language Model', 'desc': 'This paper introduces a vision-language model that operates in real-time, allowing it to make autonomous decisions about when to respond or delegate tasks. Unlike traditional models that wait for user prompts, this model continuously observes its environment and interacts proactively, similar to human behavior. The authors present JoyAI-VL-Interaction, an 8B-scale model designed for vision-triggered responsiveness, which can decide to stay silent, respond, or delegate based on the context. Additionally, they provide a complete deployable system that integrates various components, demonstrating superior performance in real-world scenarios compared to existing video-call assistants.'}, 'zh': {'title': '实时互动的视觉语言模型', 'desc': '这篇论文介绍了一种新的视觉语言模型，能够实时自主决策，决定何时响应或委派任务。与传统的问答系统不同，这个模型像人一样持续观察环境，能够在没有用户提示的情况下进行互动。它的设计允许模型在每一秒内选择保持沉默、回应或将任务委派给后台模型，从而提高了响应速度和时间意识。论文还发布了一个完整的可部署系统，能够将实时视频流输入模型，使其真正融入现实世界。'}}}, {'id': 'https://huggingface.co/papers/2606.11176', 'title': 'Data Journalist Agent: Transforming Data into Verifiable Multimodal Stories', 'url': 'https://huggingface.co/papers/2606.11176', 'abstract': "Abstract A multi-agent framework automates data journalism by generating evidence-grounded, multimodal news stories while maintaining transparency and verifiability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Data tells stories that shape society; the data journalist's job is to turn raw information into stories non-experts can trust. A high-quality news feature takes a newsroom team weeks: hunting for context, running statistics, choosing an angle, and designing visuals. Recent agents handle individual steps well: data-science agents close the analysis loop, while design agents synthesize beautiful websites. But can an agent serve as a data journalist end to end? We introduce Data Journalist Agent (Data2Story), a multi-agent framework that orchestrates specialized roles into a single virtual newsroom. Data2Story contributes two innovations. (i) Claims are evidence-grounded: an Inspector links every number, angle, and asset back to data, code, or an external reference. (ii) Articles are multimodally generative: rather than defaulting to plain text and static charts, Data2Story reasons about what readers will want to see, then deploys multimodal tools, such as interactive maps for geography and audio for music. We evaluate Data2Story on 18 articles, each paired with the originally published expert piece, along four axes: (a) human-agent angle coverage; (b) rubric evaluation with 53 participants across five dimensions; (c) computer-use agents as judges, a cost-saving proxy for how readers navigate interactive articles; and (d) verifiability, where a coding verifier re-executes statements against the data and checks claims against references. Data2Story produces competitive, evidence-traceable multimedia stories, with particular strength in transparency and auditability. Human articles retain an edge in editorial angle, creative design, and presentation. We position Data2Story as a collaborator for journalists, enabling more evidence-based, transparent, and verifiable reporting. Code and demos are available at https://data2story.github.io.", 'score': 69, 'issue_id': 2438, 'pub_date': '2026-06-09', 'pub_date_card': {'ru': '9 июня', 'en': 'June 9', 'zh': '6月9日'}, 'hash': '261622beaf8c0ab0', 'authors': ['Kevin Qinghong Lin', 'Batu EI', 'Yuhong Shi', 'Pan Lu', 'Philip Torr', 'James Zou'], 'affiliations': ['Stanford University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.11176.jpg', 'data': {'categories': ['#agents', '#multimodal', '#open_source', '#story_generation', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Виртуальная редакция: агенты для прозрачной журналистики данных', 'desc': 'В статье представляется Data2Story — мультиагентный фреймворк, который автоматизирует работу журналистов данных, создавая многомодальные новостные статьи с полной верифицируемостью. Система включает специализированные агенты, которые координируют анализ данных, генерацию текста и создание визуализаций, функционируя как виртуальная редакция. Ключевая особенность — инспектор, который привязывает каждое утверждение к источнику данных или коду, обеспечивая прозрачность и проверяемость всех фактов. Оценка на 18 статьях показала, что агент создаёт конкурентоспособные материалы с преимуществом в прозрачности, хотя человеческие журналисты сохраняют лучшие результаты в редакционном подходе и креативном дизайне.'}, 'en': {'title': 'Automating Data Journalism with Evidence and Multimedia', 'desc': 'The paper presents Data Journalist Agent (Data2Story), a multi-agent framework designed to automate the process of data journalism. It integrates specialized roles to create evidence-based, multimodal news stories that enhance transparency and verifiability. Data2Story innovates by linking claims to data sources and employing various media formats, such as interactive maps and audio, to engage readers. While it produces competitive articles, human journalists still excel in creative design and editorial insight, positioning Data2Story as a supportive tool for enhancing journalistic practices.'}, 'zh': {'title': '数据新闻的智能化助手', 'desc': '这篇论文介绍了一种多智能体框架，名为Data Journalist Agent（Data2Story），旨在自动化数据新闻生成。该框架通过将多个专业角色整合到一个虚拟新闻室中，生成基于证据的多模态新闻故事。Data2Story的创新之处在于，它确保每个数据、角度和资产都有证据支持，并且能够生成互动地图和音频等多种形式的内容。通过对18篇文章的评估，Data2Story在透明性和可审计性方面表现出色，成为记者的有力助手。'}}}, {'id': 'https://huggingface.co/papers/2606.16993', 'title': 'DreamX-World 1.0: A General-Purpose Interactive World Model', 'url': 'https://huggingface.co/papers/2606.16993', 'abstract': "Abstract DreamX-World 1.0 is a interactive text/image-to-video model that generates long-horizon content with camera control and scene persistence using specialized encoding, training techniques, and optimization methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct DreamX-World 1.0 is a general-purpose interactive text/image-to-video world model for controllable long-horizon generation. It supports camera navigation, revisits to previously observed regions, and promptable events across photorealistic, game-style, and stylized domains. Our data engine combines camera-accurate Unreal Engine rendering, action-rich gameplay recordings, and real-world videos with recovered camera geometry. For camera control, we introduce E-PRoPE, a lightweight variant of projective positional encoding that retains PRoPE's projective camera geometry while applying camera-aware attention to spatially reduced tokens. We convert a bidirectional video generator into a few-step autoregressive world model using causal forcing, DMD-style distillation, and long-rollout training. Training on self-generated long-horizon contexts exposes the model to its own generated history and reduces the style and color drift that accumulates across autoregressive chunks. Memory-Conditioned Scene Persistence retrieves earlier views through camera-geometry-based retrieval, while residual recycling makes the conditioning path less sensitive to imperfect memory latents. Event Instruction Tuning adds composable event control, and reinforcement learning alignment recovers camera control and visual quality after distillation. With mixed-precision DiT execution, residual reuse, 75\\%-pruned VAE decoding, and asynchronous pipeline parallelism, DreamX-World 1.0 reaches up to 16\\,FPS on eight RTX\\,5090 GPUs. On our 5-second basic evaluation, DreamX-World 1.0 achieves a camera-control score of 73.75 and an overall score of 84.76, outperforming HY-WorldPlay 1.5 and LingBot-World in overall score, which achieve 80.79 and 80.45, respectively.", 'score': 57, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'b30d75f65feab1b1', 'authors': ['DreamX Team', 'Yancheng Bai', 'Rui Chen', 'Xiangxiang Chu', 'Rujing Dang', 'Hao Dou', 'Bingjie Gao', 'Qiwen Gu', 'Siyu Hong', 'Jiachen Lei', 'Geng Li', 'Jifan Li', 'Ruimin Lin', 'Qingfeng Shi', 'Bingze Song', 'Lei Sun', 'Jing Tang', 'Ruitian Tian', 'Jun Wang', 'Jiahong Wu', 'Pengfei Zhang', 'Shen Zhang', 'Jiashu Zhu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.16993.jpg', 'data': {'categories': ['#video', '#training', '#rl', '#alignment', '#multimodal', '#long_context', '#inference', '#architecture', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Интерактивный генератор длинных видеопоследовательностей с контролем камеры и памятью сцены', 'desc': 'DreamX-World 1.0 — это интерактивная модель-генератор видео, которая создает длинные последовательности контента на основе текста или изображения с поддержкой управления камерой и сохранением сцены. Модель использует специализированный метод кодирования E-PRoPE для точного контроля положения камеры и преобразует двунаправленный генератор видео в автрегрессивную мировую модель с помощью причинного форсирования и дистилляции. Для обеспечения устойчивости сцены применяется механизм памяти с извлечением предыдущих представлений по геометрии камеры и переиспользованием остатков нейронной сети. Модель достигает высокой скорости генерации (до 16 FPS) благодаря оптимизациям с использованием смешанной точности, обрезки VAE и параллелизма конвейера.'}, 'en': {'title': 'Interactive Video Generation with Camera Control and Scene Consistency', 'desc': 'DreamX-World 1.0 is an advanced model that creates videos from text and images, allowing users to control the camera and maintain consistent scenes over time. It uses innovative encoding and training methods to generate long-duration content in various styles, including photorealistic and game-like visuals. The model incorporates techniques like E-PRoPE for camera-aware attention and Memory-Conditioned Scene Persistence to enhance the retrieval of previous views. With its efficient architecture, DreamX-World 1.0 achieves high performance in generating interactive video content, surpassing previous models in quality and control.'}, 'zh': {'title': 'DreamX-World 1.0：可控的长时间视频生成新纪元', 'desc': 'DreamX-World 1.0 是一种交互式文本/图像到视频的模型，能够生成长时间的内容，并实现相机控制和场景持久性。该模型采用了专门的编码、训练技术和优化方法，支持在真实感、游戏风格和风格化领域中进行可控的长时间生成。通过结合准确的相机渲染和丰富的游戏录制，DreamX-World 1.0 能够在生成过程中回访之前观察的区域，并处理可提示的事件。该模型在自生成的长时间上下文上进行训练，减少了自回归生成过程中风格和颜色的漂移。'}}}, {'id': 'https://huggingface.co/papers/2606.17046', 'title': 'Geometric Action Model for Robot Policy Learning', 'url': 'https://huggingface.co/papers/2606.17046', 'abstract': 'Abstract A geometric action model leverages pretrained geometric foundation models to enable language-conditioned manipulation policies with improved accuracy, robustness, and efficiency in 3D physical environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist robot policies must follow user instructions while reasoning about how objects, cameras, and robot actions interact in the 3D physical world. Recent vision-language-action models (VLAs) and video world-action models (WAMs) inherit strong semantic or temporal priors from large-scale foundation models, but they still operate primarily on 2D image frames or 2D-derived latent spaces, leaving implicit the 3D geometry required for contact-rich manipulation. We propose the Geometric Action Model (GAM), a language-conditioned manipulation policy that directly repurposes a pretrained geometric foundation model (GFM) as a shared substrate for perception, temporal prediction, and action decoding. GAM splits the GFM at an intermediate layer: the shallow layers serve as an observation encoder, and a causal future predictor inserted at the split layer forecasts future latent tokens conditioned on language, proprioception, and action history. The predicted future tokens are then routed through the remaining GFM blocks for feature propagation and decoding, allowing a single backbone to produce both future geometry and actions. This design equips the GFM with language-conditioned temporal world modeling through minimal architectural modification while preserving its rich geometric priors. Across a broad suite of simulation and real-robot manipulation benchmarks, GAM is more accurate, more robust, faster, and lighter than current foundation-model-scale baselines.', 'score': 37, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '2073852ba3f7c80d', 'authors': ['Jisang Han', 'Seonghu Jeon', 'Jaewoo Jung', 'René Zurbrügg', 'Honggyu An', 'Tifanny Portela', 'Marco Hutter', 'Marc Pollefeys', 'Seungryong Kim', 'Sunghwan Hong'], 'affiliations': ['ETH AI Center', 'ETH Zurich', 'KAIST AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.17046.jpg', 'data': {'categories': ['#training', '#multimodal', '#architecture', '#robotics', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Трёхмерная геометрия как основа для управления манипулятором с помощью языка', 'desc': 'В статье предлагается Geometric Action Model (GAM) — модель для управления манипулятором робота, которая использует предобученную геометрическую foundation model для восприятия и планирования действий в трёхмерном пространстве. Авторы разделяют foundation model на две части: поверхностные слои используются как энкодер наблюдений, а каузальный предсказатель, вставленный в точку разделения, прогнозирует будущие скрытые представления на основе языковых инструкций и истории действий. Прогнозируемые представления затем обрабатываются оставшимися блоками модели для получения как предсказания геометрии сцены, так и команд управления робота. Такой подход позволяет сохранить богатые геометрические приоры foundation model при минимальных изменениях архитектуры и достигает лучшей точности, устойчивости и эффективности по сравнению с современными базовыми моделями.'}, 'en': {'title': 'Revolutionizing 3D Manipulation with Geometric Action Models', 'desc': 'The paper introduces the Geometric Action Model (GAM), which enhances language-conditioned manipulation policies in 3D environments by utilizing pretrained geometric foundation models. GAM improves the accuracy and efficiency of robot actions by integrating 3D geometry into the decision-making process, which is often overlooked in traditional vision-language-action models. By splitting the geometric foundation model at an intermediate layer, GAM effectively combines observation encoding with future prediction based on language and action history. The results demonstrate that GAM outperforms existing models in both simulation and real-world tasks, showcasing its robustness and speed.'}, 'zh': {'title': '几何动作模型：提升三维操作的智能策略', 'desc': '几何动作模型（GAM）利用预训练的几何基础模型，能够在三维物理环境中实现语言条件下的操作策略，提升了准确性、鲁棒性和效率。该模型通过将几何基础模型在中间层进行分割，浅层作为观察编码器，预测未来的潜在标记。GAM能够根据语言、运动感知和动作历史进行未来预测，并通过剩余的基础模型块进行特征传播和解码。实验结果表明，GAM在多种模拟和真实机器人操作基准测试中表现出更高的准确性和更快的速度。'}}}, {'id': 'https://huggingface.co/papers/2606.14066', 'title': 'FastContext: Training Efficient Repository Explorer for Coding Agents', 'url': 'https://huggingface.co/papers/2606.14066', 'abstract': "Abstract FastContext separates repository exploration from code solving in LLM agents using specialized exploration models that reduce token consumption and improve resolution rates.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Model (LLM) coding agents have achieved strong results on software engineering tasks, yet repository exploration remains a major bottleneck: locating relevant code consumes substantial token budget and pollutes the agent's context with irrelevant snippets. In most agents, the same model explores the repository and solves the task, leaving exploratory reads and searches in the solver's history. We present FastContext, a dedicated exploration subagent that separates repository exploration from solving. Invoked on demand, FastContext issues parallel tool calls and returns concise file paths and line ranges as focused context. FastContext is powered by specialized exploration models spanning 4B--30B parameters. We bootstrap them from strong reference-model trajectories and refine them with task-grounded rewards for broad first-turn search, multi-turn evidence gathering, and precise citation generation. Across SWE-bench Multilingual, SWE-bench Pro, and SWE-QA, integrating FastContext into Mini-SWE-Agent improves end-to-end resolution rates up to 5.5\\% while reducing coding-agent token consumption up to 60\\%, with marginal overhead. These results show that repository exploration can be separated from solving and handled effectively by specialized models. Code and data: https://github.com/microsoft/fastcontext", 'score': 34, 'issue_id': 2438, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '7f460fc7eb5f1536', 'authors': ['Shaoqiu Zhang', 'Maoquan Wang', 'Yuling Shi', 'Yuhang Wang', 'Xiaodong Gu', 'Yongqiang Yao', 'Rao Fu', 'Shengyu Fu'], 'affiliations': ['Microsoft', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14066.jpg', 'data': {'categories': ['#training', '#agents', '#multilingual', '#plp', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Специализированные модели для эффективного исследования кода', 'desc': 'FastContext разделяет задачу изучения репозитория и решение кода в LLM агентах, используя специализированные модели исследования. Это позволяет значительно снизить потребление токенов и повысить качество решений, так как основной агент не загромождается нерелевантными фрагментами кода. Специализированные модели размером от 4B до 30B параметров обучаются на примерах сильных моделей и оптимизируются с помощью reward-функций для поиска, сбора доказательств и точного цитирования. Интеграция FastContext улучшает показатели решения задач на 5.5% при одновременном сокращении расхода токенов на 60%.'}, 'en': {'title': 'Streamlining Code Exploration with FastContext', 'desc': 'FastContext introduces a new approach to improve the efficiency of Large Language Model (LLM) coding agents by separating the tasks of repository exploration and code solving. By using specialized exploration models, FastContext reduces the number of tokens consumed during the search for relevant code, which helps maintain a cleaner context for the solving phase. This method allows for parallel tool calls that provide concise and relevant context, enhancing the overall performance of the coding agents. The results demonstrate a significant improvement in resolution rates and a reduction in token usage, showcasing the effectiveness of dedicated exploration models in software engineering tasks.'}, 'zh': {'title': '分离探索与解决，提升代码生成效率', 'desc': 'FastContext 是一种新方法，它将代码库的探索与解决问题的过程分开，使用专门的探索模型来减少令牌消耗并提高解决率。传统的代码生成模型在处理软件工程任务时，往往会在同一个模型中进行代码库探索和任务解决，这导致了不必要的令牌消耗和上下文污染。FastContext 通过专门的探索子代理，能够并行调用工具，返回精确的文件路径和行范围，从而提供更集中的上下文。实验结果表明，将 FastContext 集成到 Mini-SWE-Agent 中，可以提高解决率并显著减少令牌消耗。'}}}, {'id': 'https://huggingface.co/papers/2606.16281', 'title': 'Who Should Lead Decoding Now? Tracking Reliable Trajectories for Ensembling Masked Diffusion Language Models', 'url': 'https://huggingface.co/papers/2606.16281', 'abstract': 'Abstract Masked diffusion language models exhibit unique decoding dynamics where reliable trajectories show stable confidence patterns, enabling iterative ensemble methods that transfer partially denoised sequences between models based on confidence evolution.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Masked Diffusion Language Models (MDLMs) have emerged as a distinct paradigm for sequence generation. As MDLMs become diverse in capabilities and knowledge coverage, an important question is how to combine their knowledge. Toward this, we first investigate the unique decoding dynamics of MDLMs. We find that successful generations exhibit stable confidence dynamics over answer-relevant positions, while unreliable trajectories can often be corrected by injecting promising intermediate states from other models. Guided by this observation, we propose TIE (Trajectory-based Iterative Ensembling), a knowledge fusion framework in which MDLMs iteratively identify reliable decoding trajectories and relay them across models. TIE tracks confidence dynamics over answer-relevant positions to determine which model currently follows a more reliable trajectory and selectively transfers partially denoised sequences across models. As the model on the more promising trajectory often changes across denoising steps, TIE allows different models to contribute complementary strengths at different stages of generation. Strong performance across diverse reasoning tasks, along with our analyses, suggests that TIE offers a practical approach to the underexplored problem of MDLM ensembling.', 'score': 22, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'b233007347d84d5a', 'authors': ['Heecheol Yun', 'Joonhyung Park', 'Joowon Kim', 'Eunho Yang'], 'affiliations': ['AITRICS', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2606.16281.jpg', 'data': {'categories': ['#training', '#interpretability', '#reasoning', '#diffusion', '#architecture', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Ансамблирование диффузионных моделей через отслеживание траекторий декодирования', 'desc': 'В статье исследуются уникальные динамики декодирования маскированных диффузионных языковых моделей (MDLM), которые показывают стабильные паттерны уверенности при успешной генерации. Авторы предлагают метод TIE (Trajectory-based Iterative Ensembling), который объединяет знания нескольких моделей путём отслеживания эволюции уверенности на релевантных позициях ответа. Система позволяет моделям обмениваться частично денойзированными последовательностями на разных этапах генерации, используя сильные стороны каждой модели в нужный момент. Экспериментальные результаты на задачах рассуждения демонстрируют эффективность предложенного подхода к ансамблированию диффузионных моделей.'}, 'en': {'title': 'Enhancing Sequence Generation with TIE: A New Approach to MDLM Ensembling', 'desc': 'This paper introduces a new method called TIE (Trajectory-based Iterative Ensembling) for improving the performance of Masked Diffusion Language Models (MDLMs) in generating sequences. The authors observe that reliable decoding paths in MDLMs show stable confidence levels, while unreliable paths can be corrected by using better intermediate outputs from other models. TIE works by tracking these confidence dynamics and selectively transferring partially denoised sequences between models to enhance the overall generation process. The results indicate that TIE effectively combines the strengths of different models, leading to improved performance on various reasoning tasks.'}, 'zh': {'title': '掩蔽扩散语言模型的知识融合新方法', 'desc': '本文探讨了掩蔽扩散语言模型（MDLMs）的解码动态特性，发现成功生成的序列在相关位置上表现出稳定的置信度动态。我们提出了一种名为TIE（基于轨迹的迭代集成）的知识融合框架，允许模型在生成过程中迭代识别可靠的解码轨迹，并在模型之间传递部分去噪序列。TIE通过跟踪置信度动态，选择当前更可靠的模型进行信息传递，从而在不同的去噪步骤中利用不同模型的优势。我们的实验结果表明，TIE在多种推理任务中表现出色，为MDLM集成问题提供了一种实用的方法。'}}}, {'id': 'https://huggingface.co/papers/2606.17049', 'title': 'BRDFusion: Physics Meets Generation for Urban Scene Inverse Rendering', 'url': 'https://huggingface.co/papers/2606.17049', 'abstract': 'Abstract BRDFusion combines physical modeling and generative priors to achieve high-quality inverse and forward rendering of urban scenes with precise control and artifact reduction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Inverse rendering of urban scenes from captured videos enables numerous applications, including content creation and autonomous driving simulation. Physically-based rendering methods follow and control lighting physics, but suffer from reconstruction and rendering artifacts. While generative models produce realistic videos, they offer limited consistency and controllability. We present BRDFusion, a unified framework that combines two complementary models for inverse and forward rendering. Specifically, BRDFusion recovers explicit, consistent scene properties with physical modeling and alleviates optimization ambiguity with generative priors. During forward rendering, the physical model provides controllable rendering from the scene configuration, and the generative model denoises and fixes artifacts. Therefore, our method produces high-quality videos while allowing precise control, outperforming baselines in real and synthetic scenes. Moreover, BRDFusion supports novel-view relighting, night simulation, and dynamic object insertion/editing. Project page: https://shigon255.github.io/brdfusion-page/', 'score': 16, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '6ac3c832d49d78ed', 'authors': ['Yi-Ruei Liu', 'Jie-Ying Lee', 'Zheng-Hui Huang', 'Yu-Lun Liu', 'Chih-Hao Lin'], 'affiliations': ['National Taiwan University', 'National Yang Ming Chiao Tung University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.17049.jpg', 'data': {'categories': ['#synthetic', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Синтез реалистичных видеосцен через слияние физики и генеративного интеллекта', 'desc': 'BRDFusion — это объединённая система для обратного и прямого рендеринга городских сцен, которая комбинирует физическое моделирование с генеративными моделями. Для восстановления свойств сцены используется физическое моделирование, которое обеспечивает точность и последовательность, а генеративные модели помогают устранить артефакты оптимизации. При прямом рендеринге физическая модель позволяет управлять освещением и материалами, а генеративная модель улучшает качество и удаляет визуальные ошибки. Методология поддерживает сложные задачи, такие как синтез новых ракурсов, ночное освещение и редактирование динамических объектов в видеопоследовательностях.'}, 'en': {'title': 'BRDFusion: Merging Physics and Generative Models for Superior Urban Scene Rendering', 'desc': 'BRDFusion is a novel framework that integrates physical modeling with generative priors to enhance the rendering of urban scenes. It addresses the challenges of reconstruction artifacts in physically-based rendering by leveraging the strengths of generative models for improved consistency and control. The framework allows for precise manipulation of scene properties during both inverse and forward rendering processes. As a result, BRDFusion produces high-quality videos suitable for various applications, including content creation and autonomous driving simulations, while outperforming existing methods.'}, 'zh': {'title': 'BRDFusion：高质量城市场景渲染的新方法', 'desc': 'BRDFusion是一种结合物理建模和生成先验的框架，用于高质量的城市场景逆向和正向渲染。它通过物理建模恢复明确且一致的场景属性，同时利用生成先验减少优化模糊性。该方法在正向渲染中提供可控的渲染效果，并通过生成模型去噪和修复伪影。BRDFusion在真实和合成场景中表现优于基线，支持新视角重光照、夜间模拟和动态物体插入/编辑。'}}}, {'id': 'https://huggingface.co/papers/2606.16140', 'title': 'VibeThinker-3B: Exploring the Frontier of Verifiable Reasoning in Small Language Models', 'url': 'https://huggingface.co/papers/2606.16140', 'abstract': 'Abstract VibeThinker-3B demonstrates that compact models can achieve state-of-the-art performance on verifiable reasoning tasks through specialized training techniques, challenging conventional scaling assumptions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct This technical report introduces VibeThinker-3B, a compact dense model with 3B parameters developed to investigate how far verifiable reasoning can be pushed within a strictly small-model regime. Building upon the Spectrum-to-Signal post-training paradigm, we systematically enhance the model through an optimized pipeline that includes curriculum-based supervised fine-tuning, multi-domain reinforcement learning, and offline self-distillation. Experimental evaluations demonstrate that VibeThinker-3B achieves frontier-level performance on highly demanding verifiable tasks. Specifically, it attains a score of 94.3 on AIME26 (improving to 97.1 with claim-level test-time scaling), an 80.2 Pass@1 on LiveCodeBench v6, and exhibits strong out-of-distribution generalization with a 96.1\\% acceptance rate on recent unseen LeetCode contests. This effectively places it in the performance band of first-tier reasoning systems, matching or exceeding flagship models that are orders of magnitude larger, such as DeepSeek V3.2, GLM-5, and Gemini 3 Pro. Furthermore, a score of 93.4 on IFEval confirms that this extreme reasoning enhancement does not compromise strict instruction controllability. Extending our previous 1.5B work, these findings motivate the Parametric Compression-Coverage Hypothesis, which views verifiable reasoning as compressible into compact reasoning cores, while open-domain knowledge and general-purpose competence require broad parameter coverage over facts, concepts, and long-tail scenarios. This perspective suggests that compact models are not merely deployment-efficient substitutes, but a complementary path toward frontier-level performance in parameter-dense capability regimes.', 'score': 15, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '638173bbb2a45c0e', 'authors': ['Sen Xu', 'Shixi Liu', 'Wei Wang', 'Jixin Min', 'Yingwei Dai', 'Zhibin Yin', 'Yirong Chen', 'Xin Zhou', 'Junlin Zhang'], 'affiliations': ['Sina Weibo Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.16140.jpg', 'data': {'categories': ['#rl', '#training', '#reasoning', '#open_source', '#small_models', '#benchmark', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Маленькие модели могут рассуждать как большие: компрессия логики в 3 миллиарда параметров', 'desc': 'В работе представлена модель VibeThinker-3B, компактная нейросеть с 3 миллиардами параметров, которая демонстрирует, что маленькие модели способны достигать состояния искусства в задачах верифицируемого рассуждения благодаря специализированным методам обучения. Авторы используют оптимизированный pipeline, включающий куррикулум-based supervised fine-tuning, multi-domain reinforcement learning и offline self-distillation, построенный на парадигме Spectrum-to-Signal post-training. Модель показывает впечатляющие результаты: 94.3 балла на AIME26, 80.2 Pass@1 на LiveCodeBench и 96.1% acceptance rate на свежих задачах LeetCode, превосходя значительно большие модели конкурентов. Авторы предлагают гипотезу параметрической компрессии, согласно которой верифицируемое рассуждение можно сжать в компактные ядра, тогда как общие знания требуют большего количества параметров.'}, 'en': {'title': 'Compact Models, Big Performance: VibeThinker-3B Redefines Reasoning Efficiency', 'desc': 'The paper presents VibeThinker-3B, a compact machine learning model with 3 billion parameters that excels in verifiable reasoning tasks. It utilizes advanced training techniques such as curriculum-based supervised fine-tuning and multi-domain reinforcement learning to enhance its performance. Experimental results show that VibeThinker-3B achieves high scores on various challenging benchmarks, demonstrating its ability to compete with much larger models. The findings support the idea that compact models can achieve state-of-the-art results while maintaining instruction controllability, suggesting a new approach to model efficiency in machine learning.'}, 'zh': {'title': '紧凑模型也能实现最先进的推理性能', 'desc': 'VibeThinker-3B 是一个拥有 30 亿参数的紧凑型模型，展示了小型模型在可验证推理任务中也能达到最先进的性能。该模型通过优化的训练流程，包括基于课程的监督微调、多领域强化学习和离线自蒸馏，系统性地提升了其能力。实验结果表明，VibeThinker-3B 在多个高难度可验证任务中表现出色，甚至在一些任务上超越了更大规模的模型。研究还提出了参数压缩覆盖假设，认为可验证推理可以压缩为紧凑的推理核心，而开放领域知识则需要广泛的参数覆盖。'}}}, {'id': 'https://huggingface.co/papers/2606.16519', 'title': 'BadWorld: Adversarial Attacks on World Models', 'url': 'https://huggingface.co/papers/2606.16519', 'abstract': 'Abstract BadWorld is a label-free adversarial framework that reveals structural vulnerabilities in visual world models by generating imperceptible perturbations that cause catastrophic failures in future rollouts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual world models (VWMs) synthesize interactive, action-conditioned rollouts from a single context image. However, it remains an open question how robust these models are to adversarial perturbations. Standard adversarial attacks fail to assess this vulnerability because attackers lack ground-truth future videos and cannot predict subsequent user controls. We introduce BadWorld, a label-free adversarial framework tailored for autoregressive VWMs that systematically overcomes both constraints. First, to bypass the need for future supervision, we propose a self-supervised velocity attack that directly disrupts the early denoising dynamics of the model. Second, to ensure the attack generalizes across unpredictable user actions, we formulate a trajectory-adaptive bi-level optimization that actively mines hard control sequences to forge control-agnostic perturbations. Evaluated on representative VWMs with continuous and discrete controls, BadWorld exposes severe structural fragility. Visually indistinguishable adversarial images reliably trigger catastrophic degradation in future rollouts, leading to incomplete denoising, structural collapse, and control inconsistency. These findings reveal critical risks for deploying VWMs in safety-critical systems while highlighting a practical mechanism for privacy protection.', 'score': 13, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'a521669d34a88409', 'authors': ['Linghui Shen', 'Mingyue Cui', 'Xingyi Yang'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16519.jpg', 'data': {'categories': [], 'emoji': '💥', 'ru': {'title': 'Незримые атаки разрушают будущее видеомоделей', 'desc': 'BadWorld — это фреймворк для поиска уязвимостей в визуальных мировых моделях, которые синтезируют будущие видеоролики из одного изображения. Авторы предлагают метод генерации незаметных состязательных возмущений, которые вызывают критические отказы при прогнозировании будущих кадров, обходя проблему отсутствия разметки видео. Для этого используется самообучаемая атака на скорость, которая нарушает ранние этапы денойзирования, и двухуровневая оптимизация траекторий, которая адаптируется к непредсказуемым действиям пользователя. Исследование демонстрирует серьёзные структурные уязвимости моделей, что указывает на риски их применения в критичных по безопасности системах.'}, 'en': {'title': 'Unmasking Vulnerabilities in Visual World Models with BadWorld', 'desc': "BadWorld is a novel adversarial framework designed to uncover weaknesses in visual world models (VWMs) by creating subtle perturbations that lead to significant failures in future predictions. Unlike traditional adversarial attacks, which require ground-truth future data, BadWorld employs a self-supervised velocity attack to disrupt the model's early denoising processes without needing future supervision. Additionally, it utilizes a bi-level optimization strategy to generate control-agnostic perturbations that adapt to various user actions, ensuring the attack's effectiveness across different scenarios. The results demonstrate that these imperceptible adversarial images can cause severe degradation in the model's performance, raising concerns about the reliability of VWMs in critical applications."}, 'zh': {'title': '揭示视觉世界模型的脆弱性', 'desc': 'BadWorld是一个无标签的对抗框架，旨在揭示视觉世界模型中的结构脆弱性。它通过生成不可察觉的扰动，导致未来的模型输出出现灾难性失败。该框架采用自监督速度攻击，直接干扰模型的去噪动态，并通过轨迹自适应的双层优化，挖掘困难的控制序列以生成与控制无关的扰动。研究表明，BadWorld能够有效暴露视觉世界模型的严重结构脆弱性，提示在安全关键系统中使用这些模型的风险。'}}}, {'id': 'https://huggingface.co/papers/2606.16838', 'title': 'OneRank: Unified Transformer-Native Ranking Architecture for Multi-Task Recommendation', 'url': 'https://huggingface.co/papers/2606.16838', 'abstract': 'Abstract OneRank presents a Transformer-native multi-task learning framework that integrates feature encoding and prediction to reduce inter-task interference and improve ranking performance in recommender systems.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-task learning (MTL) is essential in recommender systems to enable complementary learning among diverse user feedback. While modern industrial practices have shifted from DNNs to Transformer-centric architectures to strengthen sequence modeling and scaling capacity, they still decouple feature encoding from multi-task prediction, treating the Transformer as a task-agnostic encoder. This design fundamentally limits the performance and scalability by (1) creating an information bottleneck under heterogeneous task objectives, (2) inducing gradient interference that leads to the seesaw phenomenon, and (3) forcing a dataflow transition in which attention-based, context-adaptive representation learning is converted to static feed-forward task prediction with incompatible information read-write dynamics.   We propose OneRank, a Transformer-native multi-task ranking framework that eliminates encoder-predictor separation and introduces task-private channels for forward representation learning and backward optimization, enabling task-specialized learning while reducing inter-task interference. In the forward pass, OneRank learns task-specific representations bottom-up through task-conditioned information selection, candidate-aware contextualization, and controlled cross-task interaction. In the backward pass, cross-task gradient detachment isolates task-private parameter updates from shared knowledge extraction modules, preventing negative transfer. We further replace static task-specific MLP scorers with dynamic matching-based scoring for context-aware personalized ranking. By internalizing multi-task reasoning within the Transformer stack, OneRank establishes a unified and scalable architectural paradigm. Offline and online experiments on large-scale industrial datasets show that OneRank significantly outperforms state-of-the-art baselines while maintaining computational efficiency.', 'score': 12, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'b79848d3ded9e29a', 'authors': ['Jiakai Tang', 'Sunhao Dai', 'Kun Wang', 'Zhiluohan Guo', 'Yu Zhao', 'Cong Fu', 'Kangle Wu', 'Yabo Ni', 'Anxiang Zeng', 'Xu Chen', 'Jun Xu'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Nanyang Technological University', 'Shopee Pte. Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2606.16838.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Единая Трансформер-архитектура для согласованного многозадачного обучения в ранжировании', 'desc': 'OneRank представляет фреймворк многозадачного обучения, полностью встроенный в архитектуру Трансформера для рекомендательных систем. Основная идея заключается в устранении разделения между кодировщиком признаков и предиктором, что позволяет избежать информационного узкого места и конфликта градиентов между задачами. Фреймворк использует задаче-специфичные каналы, контролируемое взаимодействие между задачами и динамическую оценку для контекстно-зависимого ранжирования. Эксперименты на крупномасштабных промышленных данных показывают значительное улучшение качества при сохранении вычислительной эффективности.'}, 'en': {'title': 'OneRank: Unifying Multi-Task Learning with Transformers for Enhanced Recommendations', 'desc': 'OneRank is a new framework for multi-task learning in recommender systems that uses Transformers to improve how tasks interact. It combines feature encoding and prediction to minimize interference between different tasks, which helps in better ranking performance. By allowing tasks to learn from each other while keeping their unique characteristics, OneRank avoids common issues like information bottlenecks and gradient interference. The framework has shown to outperform existing methods in both offline and online tests, proving its effectiveness and efficiency in handling diverse user feedback.'}, 'zh': {'title': 'OneRank：提升推荐系统的多任务学习新框架', 'desc': 'OneRank是一个基于Transformer的多任务学习框架，旨在减少任务间干扰并提高推荐系统的排名性能。该框架通过消除特征编码与多任务预测的分离，采用任务专用通道进行前向表示学习和后向优化，从而实现任务专门化学习。OneRank在前向传播中通过任务条件的信息选择和上下文交互来学习任务特定的表示，而在后向传播中则通过隔离任务私有参数更新来防止负迁移。实验结果表明，OneRank在大规模工业数据集上显著优于现有的最先进方法，同时保持了计算效率。'}}}, {'id': 'https://huggingface.co/papers/2606.15300', 'title': 'CODA-BENCH: Can Code Agents Handle Data-Intensive Tasks?', 'url': 'https://huggingface.co/papers/2606.15300', 'abstract': 'Abstract Advanced agents struggle to effectively integrate data discovery with code execution in data-intensive environments, revealing a significant gap in current agentic capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Advanced agents are increasingly demonstrating the potential to operate as autonomous engineers, creating a growing demand for evaluation benchmarks that capture the complexity of real-world development. Such environments typically involve both complex code and large-scale data (i.e., file system). However, existing benchmarks usually evaluate code-centric or data-centric capabilities in isolation, leaving a clear gap with real development scenarios. In this paper, we bridge this gap by introducing CODA-BENCH, the first benchmark to jointly evaluate code and data intelligence in a data-intensive environment. We construct a data-intensive Linux sandbox based on the Kaggle ecosystem (containing hundreds of datasets), where agents must actively explore complex file hierarchies to identify relevant resources and generate code for data-driven analytical tasks. CODA-BENCH comprises 1,009 tasks spanning 31 communities, with each task environment containing an average of 980 files, simulating realistic data scale and noise. Evaluations of advanced agents reveal that even top-performing systems struggle to effectively integrate data discovery with code execution, achieving a success rate of only 61.1%. These results highlight a substantial gap in current agentic capabilities for data-intensive tasks and point to promising directions for future research.', 'score': 11, 'issue_id': 2438, 'pub_date': '2026-06-13', 'pub_date_card': {'ru': '13 июня', 'en': 'June 13', 'zh': '6月13日'}, 'hash': '7520fc8251f4af1f', 'authors': ['Yuxin Zhang', 'Ju Fan', 'Meihao Fan', 'Shaolei Zhang', 'Xiaoyong Du'], 'affiliations': ['Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.15300.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#plp', '#agents'], 'emoji': '📊', 'ru': {'title': 'Объединение поиска данных и выполнения кода в интеллектуальных агентах', 'desc': 'В статье представлена CODA-BENCH — первый бенчмарк для комплексной оценки способностей AI агентов в работе с кодом и данными одновременно. Авторы создали реалистичную среду на основе Linux песочницы с сотнями датасетов из экосистемы Kaggle, где агенты должны исследовать сложные файловые иерархии и писать код для аналитических задач. Бенчмарк включает 1009 задач с ненормально большим количеством файлов, имитируя реальные условия разработки. Результаты показали, что даже передовые модели достигают только 61.1% успеха, раскрывая значительный пробел в умении агентов интегрировать поиск данных с выполнением кода.'}, 'en': {'title': 'Bridging the Gap: CODA-BENCH for Data-Driven Code Execution', 'desc': 'This paper addresses the challenges faced by advanced agents in integrating data discovery with code execution in complex environments. It introduces CODA-BENCH, a novel benchmark designed to evaluate both code and data intelligence in a realistic, data-intensive setting. The benchmark consists of a Linux sandbox with numerous datasets, requiring agents to navigate complex file structures and generate code for analytical tasks. Results show that even the best agents struggle with this integration, achieving only a 61.1% success rate, indicating significant room for improvement in agent capabilities.'}, 'zh': {'title': 'CODA-BENCH：数据与代码智能的联合评估新基准', 'desc': '本文介绍了CODA-BENCH，这是第一个在数据密集环境中联合评估代码和数据智能的基准测试。现有的基准测试通常只关注代码或数据的能力，未能反映真实开发场景的复杂性。我们构建了一个基于Kaggle生态系统的数据密集Linux沙箱，包含数百个数据集，代理需要探索复杂的文件层次结构以识别相关资源并生成代码。评估结果显示，即使是表现最好的系统，在数据发现与代码执行的整合上也仅有61.1%的成功率，表明当前代理能力在数据密集任务中存在显著差距。'}}}, {'id': 'https://huggingface.co/papers/2606.17016', 'title': 'TokenPilot: Cache-Efficient Context Management for LLM Agents', 'url': 'https://huggingface.co/papers/2606.17016', 'abstract': 'Abstract TokenPilot is a dual-granularity context management framework that reduces inference costs in long-horizon LLM sessions by stabilizing prompt prefixes and conservatively managing context segments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As LLM agents are deployed in long-horizon sessions, context accumulation drives up inference costs. Existing approaches utilize text pruning or dynamic memory eviction to minimize token footprints; however, their unconstrained sequence mutations alter layouts, introducing prefix mismatches and cache invalidation. This reveals a critical trade-off between text sparsity and prompt cache continuity. To address this, we present TokenPilot, a dual-granularity context management framework. Globally, Ingestion-Aware Compaction acts as a framework harness to stabilize prompt prefixes and eliminate open-world environmental noise at the ingestion gate. Locally, Lifecycle-Aware Eviction monitors the ongoing residual utility of context segments, enforcing a conservative batch-turn schedule to offload content segments only when task relevance expires. Experiments on PinchBench and Claw-Eval under both isolated and continuous modes demonstrate that TokenPilot reduces costs by 61% and 56% in isolated mode, and 61% and 87% in continuous mode, while maintaining competitive performance compared to prior systems. TokenPilot has been integrated into LightMem2 at https://github.com/zjunlp/LightMem2.', 'score': 9, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '4a39dffdddf868f5', 'authors': ['Buqiang Xu', 'Zirui Xue', 'Dianmou Chen', 'Chenyang Fu', 'Chiyu Wu', 'Caiying Huang', 'Chen Jiang', 'Jizhan Fang', 'Xinle Deng', 'Yijun Chen', 'Yunzhi Yao', 'Xuehai Wang', 'Jin Shang', 'Gong Yu', 'Ningyu Zhang'], 'affiliations': ['HomologyAI', 'University of Electronic Science and Technology of China', 'Xian University of Electronic Science and Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.17016.jpg', 'data': {'categories': ['#agents', '#long_context', '#open_source', '#inference', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умное управление контекстом для экономии вычислений в длительных сессиях LLM', 'desc': 'TokenPilot — это фреймворк управления контекстом с двойной гранулярностью, который снижает затраты на инференс при длительных сессиях LLM путём стабилизации префиксов промптов и консервативного управления сегментами контекста. Авторы решают критический компромисс между разреженностью текста и непрерывностью кэша промптов, который возникает при использовании существующих методов обрезки и вытеснения памяти. На глобальном уровне Ingestion-Aware Compaction стабилизирует префиксы промптов и отфильтровывает шум, а на локальном уровне Lifecycle-Aware Eviction отслеживает релевантность сегментов контекста и ограничивает выгрузку данных. Экспериментальные результаты демонстрируют снижение затрат на 61–87% при сохранении конкурентоспособной производительности.'}, 'en': {'title': 'Efficient Context Management for Long-Horizon LLMs', 'desc': 'TokenPilot is a framework designed to manage context in long sessions with large language models (LLMs) efficiently. It stabilizes prompt prefixes and manages context segments to reduce inference costs, which can increase due to context accumulation. The framework uses two main strategies: Ingestion-Aware Compaction to stabilize prompts and Lifecycle-Aware Eviction to monitor and offload less relevant context. Experiments show that TokenPilot significantly lowers costs while maintaining performance compared to existing methods.'}, 'zh': {'title': 'TokenPilot：高效的上下文管理框架', 'desc': 'TokenPilot 是一个双粒度上下文管理框架，旨在通过稳定提示前缀和保守管理上下文段来降低长时间 LLM 会话中的推理成本。该框架通过全局的感知压缩和局部的生命周期感知驱逐来优化上下文的使用，确保在任务相关性过期之前，内容段不会被过早移除。实验结果表明，TokenPilot 在隔离模式和连续模式下分别降低了 61% 和 56% 的成本，同时保持了与之前系统的竞争性能。该框架已集成到 LightMem2 中，提供了更高效的上下文管理解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.15673', 'title': 'Where Did It Go Wrong? Process-Level Evaluation of Web Agents with Semantic State Tracking', 'url': 'https://huggingface.co/papers/2606.15673', 'abstract': 'Abstract WebStep benchmark enables process-level analysis of web agents through semantic MDP tracking, revealing detailed performance differences and error localization that terminal success metrics miss.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Web agents act through long interaction sequences, yet existing benchmarks evaluate only terminal success, discarding all process information and offering little guidance on improvement. In this work, we conduct a process-level analysis of web agents. We introduce WebStep, a benchmark of 1,800 task instances with controlled difficulty and automatic semantic state tracking. Each website exposes a deterministic semantic MDP alongside the GUI: the agent operates on the interface, while the environment records high-level states and transitions in the background, enabling fine-grained analysis without manual annotation. Based on the semantic trajectory, we first show that process metrics reveal differences invisible to outcome evaluation: three agents whose success rates cluster within 31-33% diverge in exploration reach versus execution accuracy. Then, decomposing by skill characterizes the nature of these differences, exposing opposite per-skill rankings hidden within the same website: e.g., on Housing, OpenAI CUA outperforms Qwen3.5 by 23.7% on commit actions yet underperforms it by 15.6% on filtering, pinpointing a concrete skill to improve even within a domain. Bifurcation analysis further localizes the decisive error that loses the task and shows that this error is agent-specific rather than shared. Finally, these differences widen as tasks grow harder: success rate is similar on easy tasks but separates sharply as exploration becomes more demanding. Our process-level analysis opens a new avenue in web agent evaluation, providing fine-grained and actionable insight into where and how each agent should be improved.', 'score': 9, 'issue_id': 2438, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '3965d8a8fa8f0302', 'authors': ['Jiwan Chung', 'JiHyuk Byun', 'Vibhav Vineet', 'Seon Joo Kim'], 'affiliations': ['Microsoft Research', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2606.15673.jpg', 'data': {'categories': ['#benchmark', '#games', '#agents'], 'emoji': '🕸️', 'ru': {'title': 'Процессный анализ веб-агентов раскрывает скрытые различия в производительности', 'desc': 'В работе представлен WebStep — бенчмарк для анализа веб-агентов на уровне отдельных шагов взаимодействия, а не только конечного результата. Авторы вводят автоматическое отслеживание семантических состояний через детерминированные марковские процессы решений (semantic MDP), что позволяет получать детальную информацию о производительности без ручной разметки. Анализ показывает, что метрики процесса выявляют различия между агентами, невидимые при оценке только финального успеха — например, агенты с похожей точностью отличаются по способности к исследованию состояния и корректности выполнения действий. Разложение ошибок по навыкам и бифуркационный анализ позволяют точно локализовать критические ошибки и определить конкретные области улучшения для каждого агента.'}, 'en': {'title': 'Unveiling Agent Performance: Beyond Success Rates with WebStep', 'desc': 'The paper introduces the WebStep benchmark, which allows for a detailed analysis of web agents by tracking their performance through semantic Markov Decision Processes (MDPs). Unlike traditional benchmarks that only measure final success rates, WebStep captures the entire process of interaction, providing insights into agent behavior and error localization. The study reveals that even agents with similar success rates can have significant differences in their exploration and execution capabilities. This process-level evaluation not only identifies specific skills that need improvement but also highlights that errors are unique to each agent, especially as task difficulty increases.'}, 'zh': {'title': 'WebStep：网络代理的过程级分析新方法', 'desc': 'WebStep基准测试通过语义MDP跟踪实现了对网络代理的过程级分析，揭示了终端成功指标无法捕捉的详细性能差异和错误定位。现有基准仅评估终端成功，忽略了过程信息，缺乏改进指导。本文介绍了WebStep，一个包含1800个任务实例的基准，具有可控的难度和自动语义状态跟踪。通过过程指标，我们能够识别出在相同成功率下不同代理的探索能力和执行准确性差异，从而为每个代理的改进提供具体的方向。'}}}, {'id': 'https://huggingface.co/papers/2606.16295', 'title': 'VisualClaw: A Real-Time, Personalized Agent for the Physical World', 'url': 'https://huggingface.co/papers/2606.16295', 'abstract': 'Abstract VisualClaw is a self-evolving multimodal agent that reduces deployment costs through hybrid encoding and skill evolution while improving video-QA accuracy across multiple benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision language models are serving as general-purpose interfaces for complex multimodal tasks. However, deployment still faces three gaps: VLMs typically incur high latency and cost when processing dense video frames and long prompts, the agent scaffold remains static after deployment, and standard video-QA benchmarks do not test whether agents can use visual evidence inside tool-using workspaces. We present VisualClaw, a self-evolving multimodal agent built around two principles. First, hybrid encoding reduces deployment cost by filtering less informative streaming frames with a cascaded gate and compressing the text skill bank through hot/cold top-k injection. Second, skill evolution lets the agent learn from failures: retrieved memories condition an evolver as direct concatenated context or as guided evidence, producing skill-bank updates that help future questions. Across 4 video-QA benchmarks with 2 VLMs, VisualClaw cuts per-question API cost by an average -98% versus full-frame upload and by -25.9% over the offline uniform 8 frame baseline, while boosting accuracy in most settings, e.g., an average +3.85% and a peak +15.80% on EgoSchema with Gemini 3 Flash. To address the gap, we curate VisualClawArena, a 200-scenario multimodal agentic benchmark built through a strict five-stage pipeline; models must use video evidence, documents, dynamic updates, and executable checks inside a workspace. On VisualClawArena, the same framework with computer-use agent backends improves macro accuracy by +2.9% for Codex (GPT-5.5) and +3.2% for Claude Code (Sonnet 4.6) over no-evolution baselines, with a -9.5% cost reduction compared to the uniform-sampled baseline. These properties make VisualClaw a natural fit for edge applications, where the cascade reduces a 1-hour streaming session from ~3,600 API uploads down to only 5-20 calls and the self-evolution makes it a perfect personalized assistant.', 'score': 7, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'effd030a77772b0c', 'authors': ['Haoqin Tu', 'Jianwen Chen', 'Zijun Wang', 'Siwei Han', 'Juncheng Wu', 'Hardy Chen', 'Haonian Ji', 'Kaiwen Xiong', 'Jiaqi Liu', 'Peng Xia', 'Jieru Mei', 'Hongliang Fei', 'Jason Eshraghian', 'Zeyu Zheng', 'Yuyin Zhou', 'Huaxiu Yao', 'Cihang Xie'], 'affiliations': ['Google', 'UC Berkeley', 'UC Santa Cruz', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2606.16295.jpg', 'data': {'categories': ['#video', '#agents', '#multimodal', '#open_source', '#inference', '#dataset', '#benchmark', '#optimization'], 'emoji': '🦅', 'ru': {'title': 'Самоэволюционирующий видеоагент с минимальными затратами', 'desc': 'VisualClaw — это самообучающийся мультимодальный агент, который снижает стоимость развертывания видеомоделей благодаря гибридной кодировке и эволюции навыков. Гибридная кодировка фильтрует малоинформативные кадры из видеопотока каскадным вентилем и сжимает банк текстовых навыков через инъекцию горячих/холодных топ-k элементов. Эволюция навыков позволяет агенту обучаться на своих ошибках: сохраненные воспоминания используются как контекст или как направляющее свидетельство для обновления банка навыков. На бенчмарках video-QA система достигает снижения стоимости API-запросов на 98% и одновременного повышения точности на 3-15%.'}, 'en': {'title': 'VisualClaw: Cost-Effective, Self-Evolving Multimodal Agent for Video QA', 'desc': 'VisualClaw is a multimodal agent designed to enhance video question-answering (QA) while minimizing deployment costs. It employs hybrid encoding techniques to efficiently process video frames and compress text inputs, significantly reducing API costs. The agent also features skill evolution, allowing it to learn from past mistakes and improve its performance over time. By addressing key challenges in video processing and evaluation, VisualClaw demonstrates improved accuracy and efficiency across multiple benchmarks.'}, 'zh': {'title': 'VisualClaw：自我进化的多模态智能体', 'desc': 'VisualClaw 是一种自我进化的多模态智能体，通过混合编码和技能进化来降低部署成本，同时提高视频问答的准确性。它利用 Qwen/Qwen2.5-Coder-32B-Instruct 视觉语言模型，作为复杂多模态任务的通用接口。VisualClaw 通过级联门过滤不太重要的视频帧，并通过热/冷 top-k 注入来压缩文本技能库，从而减少部署成本。此外，技能进化使得智能体能够从失败中学习，更新技能库以帮助未来的问题。'}}}, {'id': 'https://huggingface.co/papers/2606.15631', 'title': "Retrieve, Don't Retrain: Extending Vision Language Action Models to New Tasks at Test Time", 'url': 'https://huggingface.co/papers/2606.15631', 'abstract': "Abstract Retrieval-augmented vision-language-action policies eliminate per-task fine-tuning costs by using pre-trained models with indexed demonstrations, enabling efficient cross-embodiment generalization and task adaptation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Extending a vision-language-action (VLA) policy to a new task typically requires task-specific teleoperated demonstrations and per-task fine-tuning, making adaptation costly in both data collection and compute. In this paper, we show that this target-side per-task adaptation cost can be replaced by retrieval. Our retrieval-augmented policy is trained once on paired demonstrations from the target embodiment (query) and a cheaper embodiment (pool, e.g., human-hand video), then frozen. New tasks are added at deployment by appending pool-side demonstrations to a retrieval pool. The frozen policy conditions on retrieved trajectories at every control step, so new tasks are absorbed by indexing data rather than updating parameters. Fine-tuning is needed only to take on a new, unseen embodiment, not for each new task. We show that retrieval improves policies beyond a specific backbone, including standard VLA policies, but its effect is especially pronounced in Cosmos Policy, a video-generation-based world-action model (WAM). In this setting, retrieval supplies coarse task progression, while the WAM's future-image objective provides an additional visual consistency signal that strengthens the retrieval-conditioned actions. On PushT, we study how retrieval provides a reusable high-level motion prior for cross-embodiment generalization to unseen goal angles, while on RoboTwin 2.0 our method outperforms cross-embodiment baselines on unseen tasks, and we additionally demonstrate the method on a real robot.", 'score': 7, 'issue_id': 2438, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '8987450176dc5294', 'authors': ['Jeongeun Park', 'Juhan Park', 'Taekyung Kim', 'Sungjoon Choi', 'Dongyoon Han', 'Sangdoo Yun'], 'affiliations': ['Korea University', 'NAVER AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.15631.jpg', 'data': {'categories': ['#video', '#multimodal', '#robotics', '#rag', '#transfer_learning'], 'emoji': '🔍', 'ru': {'title': 'Поиск вместо переобучения: получение нового опыта через индексирование', 'desc': 'В работе предложен метод для адаптации политик зрительно-языковых действий (VLA) к новым задачам без переобучения, используя поиск похожих демонстраций из индексированного набора данных. Вместо дорогостоящей сборки задачно-специфичных данных и fine-tuning модели, замороженная политика обусловливается на извлеченные траектории во время вывода. Метод работает как для стандартных VLA, так и для видео-генеративных моделей мира (WAM), которые используют предсказание будущих кадров как дополнительный сигнал для улучшения качества. Подход продемонстрирован на задачах cross-embodiment обобщения и протестирован на реальном роботе, показывая превосходство над baseline методами.'}, 'en': {'title': 'Efficient Task Adaptation through Retrieval-Augmented Policies', 'desc': 'This paper presents a novel approach to vision-language-action (VLA) policies that reduces the need for costly fine-tuning for each new task. Instead of requiring specific demonstrations for every task, the proposed method utilizes a retrieval mechanism that allows the policy to adapt by indexing previously collected demonstrations. The policy is trained once and can incorporate new tasks by simply adding more demonstrations to a retrieval pool, making it efficient for cross-embodiment generalization. The results show that this retrieval-augmented approach enhances performance across various models, particularly in scenarios involving unseen tasks and embodiments.'}, 'zh': {'title': '检索增强策略：高效适应新任务的解决方案', 'desc': '本文提出了一种检索增强的视觉-语言-动作（VLA）策略，旨在消除每个任务的微调成本。通过使用预训练模型和索引演示，该方法实现了高效的跨实体泛化和任务适应。新任务的添加只需将演示添加到检索池中，而无需更新模型参数。我们的实验表明，检索方法在不同的策略上均能提升性能，尤其是在视频生成基础的世界动作模型（WAM）中效果显著。'}}}, {'id': 'https://huggingface.co/papers/2606.14832', 'title': 'PhoneHarness: Harnessing Phone-Use Agents through Mixed GUI, CLI, and Tool Actions', 'url': 'https://huggingface.co/papers/2606.14832', 'abstract': 'Abstract PhoneHarness presents a mixed-action benchmark and execution framework for evaluating phone-use agents on verifiable mobile workflows, demonstrating superior performance over existing approaches through deterministic action routing and auditable execution traces.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Phone agents are increasingly expected to complete real mobile workflows rather than merely predict the next screen action. However, much of the current mobile-agent literature still evaluates agents primarily as GUI controllers that observe a screen, emit taps and swipes, and are scored by target app state. Real phone-use tasks are broader: they require deciding when to use app GUIs, device-side commands, or structured tools, while leaving evidence that the intended side effect actually occurred. We introduce PhoneHarness, a mixed-action benchmark and execution harness for studying phone-use agents on verifiable mobile workflows. PhoneHarness runs a device-side agent loop over GUI, CLI, and host-side tool actions, combining deterministic action routing with bounded GUI delegation and auditable execution traces. Its benchmark, PhoneHarness Bench, evaluates whether agents complete tasks with observable side effects, not only whether they produce plausible final answers. On the annotated evaluation split, PhoneHarness reaches a 75.0% pass rate, outperforming the strongest non-PhoneHarness settings by 12.9 percentage points. PhoneHarness and PhoneHarness Bench therefore play distinct but mutually dependent roles: the harness makes mixed phone workflows executable, while the benchmark measures whether agents can use that harness reliably and safely. Our findings suggest that reliable phone automation depends on action-surface routing and verifiable execution, not only visual GUI control.', 'score': 7, 'issue_id': 2438, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '86b19a04c35151d6', 'authors': ['Chenxin Li', 'Zhengyao Fang', 'Zhengyang Tang', 'Pengyuan Lyu', 'Xingran Zhou', 'Xin Lai', 'Fei Tang', 'Liang Wu', 'Yiduo Guo', 'Weinong Wang', 'Junyi Li', 'Yi Zhang', 'Yang Ding', 'Huawen Shen', 'Sunqi Fan', 'Shangpin Peng', 'Zheng Ruan', 'Anran Zhang', 'Benyou Wang', 'Chengquan Zhang', 'Han Hu'], 'affiliations': ['Tencent Hunyuan', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.14832.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents', '#open_source'], 'emoji': '📱', 'ru': {'title': 'От визуального управления к многофункциональной мобильной автоматизации', 'desc': 'PhoneHarness представляет собой бенчмарк и фреймворк для оценки агентов, которые выполняют реальные мобильные рабочие процессы на телефонах. В отличие от существующих подходов, которые оценивают агентов только по их способности взаимодействовать с GUI, PhoneHarness требует от агентов использовать различные типы действий: взаимодействие с графическим интерфейсом, командную строку и структурированные инструменты. Система использует детерминированную маршрутизацию действий и сохраняет проверяемые следы выполнения для верификации того, что задачи действительно выполнены. Бенчмарк показывает превосходные результаты (75.0% успешного выполнения), что на 12.9 процентных пункта выше альтернативных подходов.'}, 'en': {'title': 'Revolutionizing Phone Automation with PhoneHarness', 'desc': 'PhoneHarness is a new framework designed to evaluate phone-use agents on real mobile tasks, rather than just predicting screen actions. It allows agents to interact with various interfaces, including graphical user interfaces (GUIs) and command-line interfaces (CLIs), while ensuring that their actions can be verified. The framework includes a benchmark called PhoneHarness Bench, which assesses whether agents achieve observable outcomes from their actions. Results show that PhoneHarness significantly improves performance, indicating that effective phone automation relies on reliable action routing and verifiable execution rather than solely on visual control.'}, 'zh': {'title': 'PhoneHarness：提升手机代理的可靠性与安全性', 'desc': 'PhoneHarness 是一个混合动作基准和执行框架，用于评估手机使用代理在可验证的移动工作流中的表现。与现有方法相比，它通过确定性动作路由和可审计的执行轨迹展示了更优的性能。该框架不仅关注代理的最终答案，还评估代理是否能够完成具有可观察副作用的任务。我们的研究表明，可靠的手机自动化依赖于动作表面路由和可验证的执行，而不仅仅是视觉 GUI 控制。'}}}, {'id': 'https://huggingface.co/papers/2606.06302', 'title': 'Tangram: Unlocking Non-Uniform KV Cache Compression for Efficient Multi-turn LLM Serving', 'url': 'https://huggingface.co/papers/2606.06302', 'abstract': "Abstract Multi-turn large language model serving faces memory constraints due to growing key-value cache, but a structured approach to non-uniform compression enables significant throughput improvements through static budget allocation and optimized memory management.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-turn LLM serving accumulates dialogue history whose Key-Value (KV) cache grows with every turn and every user, quickly exceeding the model weights themselves and making memory -- not compute -- the binding constraint on throughput. Non-uniform KV compression, which allocates heterogeneous budgets across attention heads, preserves accuracy far better than uniform schemes, yet remains impractical: modern serving stacks assume identical KV lengths across heads, so heterogeneity traps freed memory as page fragmentation, spends up to 25% of prefill time reclaiming scattered pages, and skews GPU workloads that inflate decode latency by up to 1.7times or burn 15--20% of each decode step on re-planning. We observe that this heterogeneity need not be discovered at runtime: head-wise retention follows a two-level structural regularity -- an input-invariant head ranking with narrowly bounded per-head ratios -- that can be calibrated offline from as few as 50 samples. Building on this insight, we present Tangram, a serving framework that statically resolves what prior systems handle dynamically: Budget Reservation fixes each head's post-compression footprint at scheduling time, eliminating page reclamation; Ragged Paging clusters similar-budget heads into independent page tables, turning fragmentation into reclaimable memory; and Ahead-of-Time Load Balancing precomputes balanced GPU partitions with zero runtime planning. Implemented on vLLM, Tangram serves as a drop-in substrate for existing non-uniform compression methods, matching their accuracy while improving end-to-end throughput by up to 2.6times over the full-KV baseline. Our implementation is publicly available at https://github.com/aiha-lab/TANGRAM.", 'score': 6, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'f3f64e7b9e06da75', 'authors': ['Hyungmin Kim', 'Minsoo Kim', 'Hongseok Kim', 'Jungwook Choi'], 'affiliations': ['Hanyang University', 'Rebellions'], 'pdf_title_img': 'assets/pdf/title_img/2606.06302.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Статическое распределение памяти для эффективного обслуживания многооборотных LLM', 'desc': 'В работе предложен метод оптимизации обслуживания больших языковых моделей в многооборотных диалогах путём неравномерного сжатия кэша ключ-значение (KV). Авторы обнаружили, что оптимальные коэффициенты сжатия для разных голов внимания следуют структурированной закономерности, которая может быть калибрована офлайн на небольших выборках. На основе этого был разработан фреймворк Tangram, который статически резервирует память для каждой головы внимания и использует упакованное разбиение страниц для устранения фрагментации памяти. Система достигает увеличения пропускной способности в 2.6 раза по сравнению с базовым подходом при сохранении точности существующих методов сжатия.'}, 'en': {'title': 'Optimizing Memory Management for Multi-Turn LLMs with Tangram', 'desc': 'This paper addresses the memory challenges faced by multi-turn large language models (LLMs) due to the increasing size of the key-value (KV) cache. It introduces a structured approach to non-uniform KV compression, which optimizes memory management and improves throughput by allocating different memory budgets to various attention heads. The proposed framework, Tangram, eliminates the need for dynamic memory reclamation
