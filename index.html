    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.18519', 'title': 'LLM Safety From Within: Detecting Harmful Content with Internal Representations', 'url': 'https://huggingface.co/papers/2604.18519', 'abstract': 'Abstract SIREN is a lightweight guard model that leverages internal layer features from LLMs to improve harmful content detection efficiency and performance.  AI-generated summary Guard models are widely used to detect harmful content in user prompts and LLM responses. However, state-of-the-art guard models rely solely on terminal-layer representations and overlook the rich safety-relevant features distributed across internal layers. We present SIREN, a lightweight guard model that harnesses these internal features. By identifying safety neurons via linear probing and combining them through an adaptive layer-weighted strategy, SIREN builds a harmfulness detector from LLM internals without modifying the underlying model. Our comprehensive evaluation shows that SIREN substantially outperforms state-of-the-art open-source guard models across multiple benchmarks while using 250 times fewer trainable parameters. Moreover, SIREN exhibits superior generalization to unseen benchmarks, naturally enables real-time streaming detection, and significantly improves inference efficiency compared to generative guard models. Overall, our results highlight LLM internal states as a promising foundation for practical, high-performance harmfulness detection.', 'score': 15, 'issue_id': 2056, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '29b1584fc517a680', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Внутренние слои LLM как основа для эффективной детекции вредоноса', 'desc': 'SIREN — это лёгкая модель-охранник, которая использует внутренние слои LLM для детектирования вредоносного контента. Вместо обычного подхода, когда анализируются только выходные представления, SIREN применяет линейное зондирование для определения нейронов, отвечающих за безопасность, и объединяет их адаптивной стратегией взвешивания слоёв. Модель работает без изменения исходной LLM и демонстрирует превосходные результаты на нескольких бенчмарках, используя в 250 раз меньше параметров, чем конкурентные решения. Предложенный подход обеспечивает лучшую обобщаемость на новые данные, поддерживает потоковую обработку в реальном времени и значительно повышает эффективность инференса.'}, 'en': {'title': 'Harnessing Internal Features for Superior Harmfulness Detection', 'desc': 'SIREN is a novel guard model designed to enhance the detection of harmful content in large language models (LLMs) by utilizing features from internal layers rather than just the final output layer. It identifies safety-related neurons through a technique called linear probing and combines these features using an adaptive strategy to create an effective harmfulness detector. This approach allows SIREN to achieve high performance with significantly fewer trainable parameters compared to existing models. The results demonstrate that SIREN not only outperforms current state-of-the-art models but also offers better generalization and efficiency for real-time applications.'}, 'zh': {'title': '利用内部特征提升有害内容检测的SIREN模型', 'desc': 'SIREN是一种轻量级的防护模型，利用大型语言模型（LLM）内部层的特征来提高有害内容检测的效率和性能。传统的防护模型主要依赖于终层表示，忽视了分布在内部层的丰富安全相关特征。SIREN通过线性探测识别安全神经元，并采用自适应层加权策略将其结合，从而在不修改基础模型的情况下构建有害性检测器。我们的评估表明，SIREN在多个基准测试中显著超越了现有的开源防护模型，同时使用的可训练参数少达250倍，展现出更好的泛化能力和实时检测能力。'}}}, {'id': 'https://huggingface.co/papers/2604.22152', 'title': 'dWorldEval: Scalable Robotic Policy Evaluation via Discrete Diffusion World Model', 'url': 'https://huggingface.co/papers/2604.22152', 'abstract': 'Abstract dWorldEval employs a discrete diffusion world model with unified token space mapping and transformer-based denoising to enable scalable robotics policy evaluation across diverse modalities.  AI-generated summary Evaluating robotics policies across thousands of environments and thousands of tasks is infeasible with existing approaches. This motivates the need for a new methodology for scalable robotics policy evaluation. In this paper, we propose dWorldEval, which uses a discrete diffusion world model as a scalable evaluation proxy for robotics policies. Specifically, dWorldEval maps all modalities - including vision, language, and robotic actions - into a unified token space, modeling them via a single transformer-based denoising network. In this paper, we propose dWorldEval, using a discrete diffusion world model as a scalable evaluation proxy for robotics policy. Specifically, it maps all modalities, including vision, language, and robotics action into a unified token space, then denoises them with a single transformer network. Building on this architecture, we employ a sparse keyframe memory to maintain spatiotemporal consistency. We also introduce a progress token that indicates the degree of task completion. At inference, the model jointly predicts future observations and progress token, allowing automatically determine success when the progress reaches 1. Extensive experiments demonstrate that dWorldEval significantly outperforms previous approaches, i.e., WorldEval, Ctrl-World, and WorldGym, on LIBERO, RoboTwin, and multiple real-robot tasks. It paves the way for a new architectural paradigm in building world simulators for robotics evaluation at scale.', 'score': 0, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'c69f05f7cd6c550c', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#robotics', '#benchmark', '#multimodal', '#architecture', '#diffusion'], 'emoji': '🤖', 'ru': {'title': 'Единое пространство токенов для масштабной оценки робототехнических политик', 'desc': 'dWorldEval представляет собой дискретную диффузионную модель мира для масштабируемой оценки политик робототехники. Система объединяет все модальности данных - визуальные, языковые и действия робота - в единое пространство токенов. Для денойзирования информации используется трансформер-сеть, дополненная памятью разреженных ключевых кадров для сохранения пространственно-временной согласованности. Модель позволяет автоматически определять успешность выполнения задачи через специальный токен прогресса и превосходит существующие подходы на нескольких бенчмарках.'}, 'en': {'title': 'Revolutionizing Robotics Policy Evaluation with dWorldEval', 'desc': 'dWorldEval introduces a novel discrete diffusion world model that serves as a scalable evaluation tool for robotics policies across various tasks and environments. It effectively integrates different modalities such as vision, language, and robotic actions into a single token space, which is processed by a transformer-based denoising network. The architecture includes a sparse keyframe memory to ensure spatiotemporal consistency and utilizes a progress token to track task completion. Experimental results show that dWorldEval outperforms existing methods, establishing a new standard for robotics policy evaluation.'}, 'zh': {'title': 'dWorldEval：可扩展的机器人策略评估新方法', 'desc': 'dWorldEval是一种新的机器人策略评估方法，采用离散扩散世界模型作为可扩展的评估代理。它将视觉、语言和机器人动作等多种模态映射到统一的令牌空间，并通过单一的基于变换器的去噪网络进行建模。该方法还引入了稀疏关键帧内存，以保持时空一致性，并使用进度令牌来指示任务完成的程度。实验结果表明，dWorldEval在多个真实机器人任务上显著优于之前的方法，展示了在大规模机器人评估中构建世界模拟器的新架构范式。'}}}, {'id': 'https://huggingface.co/papers/2604.22436', 'title': 'AgentSearchBench: A Benchmark for AI Agent Search in the Wild', 'url': 'https://huggingface.co/papers/2604.22436', 'abstract': 'Abstract AgentSearchBench presents a large-scale benchmark for agent search that addresses the challenge of identifying suitable AI agents for complex tasks by evaluating performance through execution-grounded signals rather than textual descriptions alone.  AI-generated summary The rapid growth of AI agent ecosystems is transforming how complex tasks are delegated and executed, creating a new challenge of identifying suitable agents for a given task. Unlike traditional tools, agent capabilities are often compositional and execution-dependent, making them difficult to assess from textual descriptions alone. However, existing research and benchmarks typically assume well-specified functionalities, controlled candidate pools, or only executable task queries, leaving realistic agent search scenarios insufficiently studied. We introduce AgentSearchBench, a large-scale benchmark for agent search in the wild, built from nearly 10,000 real-world agents across multiple providers. The benchmark formalizes agent search as retrieval and reranking problems under both executable task queries and high-level task descriptions, and evaluates relevance using execution-grounded performance signals. Experiments reveal a consistent gap between semantic similarity and actual agent performance, exposing the limitations of description-based retrieval and reranking methods. We further show that lightweight behavioral signals, including execution-aware probing, can substantially improve ranking quality, highlighting the importance of incorporating execution signals into agent discovery. Our code is available at https://github.com/Bingo-W/AgentSearchBench.', 'score': 0, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'a8c1a6c456dabcd7', 'authors': ['Bin Wu', 'Arastun Mammadli', 'Xiaoyu Zhang', 'Emine Yilmaz'], 'affiliations': ['Centre for Artificial Intelligence, University College London'], 'pdf_title_img': 'assets/pdf/title_img/2604.22436.jpg', 'data': {'categories': ['#dataset', '#open_source', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Поиск AI-агентов через сигналы исполнения, а не описания', 'desc': 'AgentSearchBench представляет крупномасштабный бенчмарк для поиска подходящих AI-агентов при выполнении сложных задач. В отличие от традиционных инструментов, возможности агентов часто зависят от их исполнения, поэтому текстовые описания недостаточны для оценки их пригодности. Авторы формализуют задачу поиска агентов как проблему информационного поиска и переранжирования, используя сигналы реального исполнения вместо семантического сходства. Эксперименты показывают, что поведенческие сигналы и выполнение пробных запросов значительно улучшают качество ранжирования агентов.'}, 'en': {'title': 'Revolutionizing Agent Discovery with Execution-Grounded Evaluation', 'desc': 'AgentSearchBench is a new benchmark designed to improve the search for AI agents that can perform complex tasks. It focuses on evaluating agents based on their actual performance during execution rather than just their textual descriptions. The research highlights the limitations of traditional methods that rely on semantic similarity, showing that they often fail to match agents with tasks effectively. By incorporating execution-grounded signals and behavioral indicators, this benchmark aims to enhance the accuracy of agent retrieval and ranking in real-world scenarios.'}, 'zh': {'title': '智能代理搜索的新基准', 'desc': 'AgentSearchBench是一个大规模的基准测试，旨在解决为复杂任务寻找合适AI代理的挑战。该基准通过执行基础的信号来评估代理的性能，而不仅仅依赖于文本描述。研究表明，传统的描述性检索方法在实际代理性能上存在显著差距，因此需要引入执行信号来提高代理发现的质量。我们的实验结果显示，轻量级的行为信号可以显著改善排名质量，强调了执行信号在代理搜索中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.22565', 'title': 'Learning Evidence Highlighting for Frozen LLMs', 'url': 'https://huggingface.co/papers/2604.22565', 'abstract': "Abstract HiLight enhances long-context reasoning in large language models by training a lightweight emphasis actor to highlight key evidence without modifying the original input or solver, using reinforcement learning with only the solver's task reward.  AI-generated summary Large Language Models (LLMs) can reason well, yet often miss decisive evidence when it is buried in long, noisy contexts. We introduce HiLight, an Evidence Emphasis framework that decouples evidence selection from reasoning for frozen LLM solvers. HiLight avoids compressing or rewriting the input, which can discard or distort evidence, by training a lightweight Emphasis Actor to insert minimal highlight tags around pivotal spans in the unaltered context. A frozen Solver then performs downstream reasoning on the emphasized input. We cast highlighting as a weakly supervised decision-making problem and optimize the Actor with reinforcement learning using only the Solver's task reward, requiring no evidence labels and no access to or modification of the Solver. Across sequential recommendation and long-context question answering, HiLight consistently improves performance over strong prompt-based and automated prompt-optimization baselines. The learned emphasis policy transfers zero-shot to both smaller and larger unseen Solver families, including an API-based Solver, suggesting that the Actor captures genuine, reusable evidence structure rather than overfitting to a single backbone.", 'score': 0, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'bb4f4e5bbfd2a5e0', 'authors': ['Shaoang Li', 'Yanhang Shi', 'Yufei Li', 'Mingfu Liang', 'Xiaohan Wei', 'Yunchen Pu', 'Fei Tian', 'Chonglin Sun', 'Frank Shyu', 'Luke Simon', 'Sandeep Pandey', 'Xi Liu', 'Jian Li'], 'affiliations': ['Meta AI', 'Stony Brook University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22565.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#rl', '#optimization', '#long_context', '#architecture', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Выделение доказательств без модификации модели', 'desc': 'HiLight — это фреймворк для улучшения рассуждений языковых моделей на длинных контекстах путём обучения лёгкого актора выделения ключевых фрагментов текста. Метод вставляет специальные теги подчёркивания вокруг важных частей исходного текста, не модифицируя сам контекст или саму модель-решатель. Обучение актора происходит с помощью обучения с подкреплением, используя только награду за выполнение задачи, без разметки доказательств и доступа к внутренним механизмам решателя. Подход показывает устойчивые улучшения на задачах рекомендации и вопросно-ответных системах, а политика выделения успешно переносится на другие семейства моделей без переобучения.'}, 'en': {'title': 'Highlighting Key Evidence for Better Reasoning', 'desc': 'HiLight is a framework designed to improve long-context reasoning in large language models (LLMs) by focusing on key evidence within lengthy inputs. It employs a lightweight Emphasis Actor that highlights important information without altering the original text or the reasoning model. This approach uses reinforcement learning to optimize the Actor based solely on the task rewards from the LLM, eliminating the need for evidence labels. HiLight has shown to enhance performance in tasks like sequential recommendation and long-context question answering, demonstrating its ability to generalize across different model architectures.'}, 'zh': {'title': 'HiLight：提升长文本推理的关键证据强调', 'desc': 'HiLight 是一种增强大型语言模型长文本推理能力的方法。它通过训练一个轻量级的强调演员来突出关键证据，而不改变原始输入或求解器。该方法使用强化学习，仅依赖求解器的任务奖励，避免了对输入的压缩或重写。实验表明，HiLight 在序列推荐和长文本问答任务中，性能优于强大的基于提示和自动提示优化的基线。'}}}, {'id': 'https://huggingface.co/papers/2604.22748', 'title': 'Agentic World Modeling: Foundations, Capabilities, Laws, and Beyond', 'url': 'https://huggingface.co/papers/2604.22748', 'abstract': 'Abstract World models are categorized into three capability levels and four law regimes to better understand and develop predictive environment models for AI agents across diverse domains.  AI-generated summary As AI systems move from generating text to accomplishing goals through sustained interaction, the ability to model environment dynamics becomes a central bottleneck. Agents that manipulate objects, navigate software, coordinate with others, or design experiments require predictive environment models, yet the term world model carries different meanings across research communities. We introduce a "levels x laws" taxonomy organized along two axes. The first defines three capability levels: L1 Predictor, which learns one-step local transition operators; L2 Simulator, which composes them into multi-step, action-conditioned rollouts that respect domain laws; and L3 Evolver, which autonomously revises its own model when predictions fail against new evidence. The second identifies four governing-law regimes: physical, digital, social, and scientific. These regimes determine what constraints a world model must satisfy and where it is most likely to fail. Using this framework, we synthesize over 400 works and summarize more than 100 representative systems spanning model-based reinforcement learning, video generation, web and GUI agents, multi-agent social simulation, and AI-driven scientific discovery. We analyze methods, failure modes, and evaluation practices across level-regime pairs, propose decision-centric evaluation principles and a minimal reproducible evaluation package, and outline architectural guidance, open problems, and governance challenges. The resulting roadmap connects previously isolated communities and charts a path from passive next-step prediction toward world models that can simulate, and ultimately reshape, the environments in which agents operate.', 'score': 0, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': '3f9e9e9d9dfa279a', 'authors': ['Meng Chu', 'Xuan Billy Zhang', 'Kevin Qinghong Lin', 'Lingdong Kong', 'Jize Zhang', 'Teng Tu', 'Weijian Ma', 'Ziqi Huang', 'Senqiao Yang', 'Wei Huang', 'Yeying Jin', 'Zhefan Rao', 'Jinhui Ye', 'Xinyu Lin', 'Xichen Zhang', 'Qisheng Hu', 'Shuai Yang', 'Leyang Shen', 'Wei Chow', 'Yifei Dong', 'Fengyi Wu', 'Quanyu Long', 'Bin Xia', 'Shaozuo Yu', 'Mingkang Zhu', 'Wenhu Zhang', 'Jiehui Huang', 'Haokun Gui', 'Haoxuan Che', 'Long Chen', 'Qifeng Chen', 'Wenxuan Zhang', 'Wenya Wang', 'Xiaojuan Qi', 'Yang Deng', 'Yanwei Li', 'Mike Zheng Shou', 'Zhi-Qi Cheng', 'See-Kiong Ng', 'Ziwei Liu', 'Philip Torr', 'Jiaya Jia'], 'affiliations': ['Chinese University of Hong Kong', 'Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'Nanyang Technological University', 'National University of Singapore', 'Singapore Management University', 'Singapore University of Technology and Design', 'University of Hong Kong', 'University of Oxford', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.22748.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark', '#video', '#multimodal'], 'emoji': '🌍', 'ru': {'title': 'Единая таксономия моделей мира: от предсказания к симуляции и трансформации', 'desc': 'В статье предложена таксономия моделей мира, которая классифицирует их по двум осям: три уровня возможностей (предиктор, симулятор и эволюционирующая модель) и четыре режима управляющих законов (физические, цифровые, социальные и научные). Авторы синтезируют более 400 работ и анализируют системы в области обучения с подкреплением, генерации видео, агентов для веб-интерфейсов и научных открытий. Исследование выявляет критические точки отказа моделей и предлагает принципы оценки, ориентированные на принятие решений. Работа создаёт единую концептуальную карту для развития моделей мира, позволяющих агентам не только предсказывать, но и активно моделировать окружающие среды.'}, 'en': {'title': 'Building Better AI: A Framework for Predictive World Models', 'desc': 'This paper introduces a framework for understanding and developing predictive environment models for AI agents, categorized into three capability levels and four law regimes. The capability levels include L1 Predictor, L2 Simulator, and L3 Evolver, each representing increasing complexity in how agents model their environments. The law regimes—physical, digital, social, and scientific—define the constraints that these models must adhere to and highlight potential failure points. By synthesizing existing research and proposing evaluation principles, the authors aim to bridge gaps between different research communities and advance the development of more effective world models for AI.'}, 'zh': {'title': '构建智能代理的世界模型框架', 'desc': '本论文将世界模型分为三个能力层级和四种法律范畴，以便更好地理解和开发用于AI代理的预测环境模型。能力层级包括L1预测器、L2模拟器和L3进化者，分别对应不同的模型学习和自我修正能力。法律范畴则涵盖物理、数字、社会和科学四个领域，决定了世界模型必须满足的约束条件。通过这一框架，论文综合了400多项研究，分析了模型基础的强化学习、视频生成等多个领域的代表性系统及其评估方法。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (2)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (3)', '#cv', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (2)', '#open_source (1)', '#optimization (1)', '#plp', '#rag', '#reasoning (1)', '#rl (2)', '#rlhf', '#robotics (1)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (1)', '#transfer_learning (1)', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-27 02:01',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-27 02:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-27 02:01')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
